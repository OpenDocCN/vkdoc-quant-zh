  \ requests\nfrom dotenv import load_dotenv, find_dotenv\nload_dotenv(find_dotenv())\n\
  API_KEY = os.environ.get('AV_KEY')\nTODAY = pd.Timestamp.today().normalize()\n```\n\
  \n\n\n#### `get_price`\n\n现在我们来编写一个 `get_price` 函数，它会访问 Alpha Vantage，进行一些数据清洗，然后返回一个\
  \ pandas DataFrame。\n\n```\ndef get_price(ticker, outputsize=\"compact\", most_recent=False):\n\
  URL = 'https://www.alphavantage.co/query?'\npayload = {\n'function': 'TIME_SERIES_DAILY_ADJUSTED',\n\
  'symbol': ticker,\n'apikey': API_KEY,\n'outputsize': outputsize\n}\nr = requests.get(URL,\
  \ params=payload)\np = pd.DataFrame(r.json()['Time Series (Daily)']).T['4\\. close']\n\
  df = pd.DataFrame({ticker: p.apply(float)})\ndf.index = pd.to_datetime(df.index)\n\
  if most_recent:\nreturn df.tail(1)\nreturn df\nprint(get_price('AMZN')[:10])\nAMZN\n\
  2018-01-04  1209.59\n2018-01-05  1229.14\n2018-01-08  1246.87\n2018-01-09  1252.70\n\
  2018-01-10  1254.33\n2018-01-11  1276.68\n2018-01-12  1305.20\n2018-01-16  1304.86\n\
  2018-01-17  1295.00\n2018-01-18  1293.32\n```\n\n如果我们剖析一下 `get_price` 函数内的 requests\
  \ 调用，会得到如下结果：\n\n```\nURL = 'https://www.alphavantage.co/query?'\npayload = {\n\
  'function': 'TIME_SERIES_DAILY_ADJUSTED',\n'symbol': 'AMZN',\n'apikey': API_KEY,\n\
  'outputsize': 'compact'\n}\nr = requests.get(URL, params=payload)\nprint(r.json().keys())\n\
  dict_keys(['Meta Data', 'Time Series (Daily)'])\n```\n\n可以看到，我们需要的数据会包含在 JSON 对象的\
  \ `Time Series (Daily)` 键中。\n\n```\np = pd.DataFrame(r.json()['Time Series (Daily)'])\n\
  print(p.head()[p.columns[:4]])\n2018-01-04 2018-01-05 2018-01-08 2018-01-09\n1\\\
  . open            1205.0000  1217.5100  1236.0000  1256.9000\n2\\. high        \
  \    1215.8700  1229.1400  1253.0800  1259.3300\n3\\. low             1204.6600\
  \  1210.0000  1232.0300  1241.7600\n4\\. close           1209.5900  1229.1400  1246.8700\
  \  1252.7000\n5\\. adjusted close  1209.5900  1229.1400  1246.8700  1252.7000\n\
  ```\n\n不幸的是，返回的数据是“宽”格式而非“长”格式。我们通过调用 `.T` 将其整理^(³²)并转置为长格式。同时，我们只获取 `'4\\. close'`\
  \ 这一列，忽略其余数据。\n\n```\np = pd.DataFrame(r.json()['Time Series (Daily)']).T['4\\.\
  \ close']\np.head()\n2018-01-04    1209.5900\n2018-01-05    1229.1400\n2018-01-08\
  \    1246.8700\n2018-01-09    1252.7000\n2018-01-10    1254.3300\nName: 4\\. close,\
  \ dtype: object\n```\n\n由于返回的所有值都是字符串，我们还需要对对象进行一些额外的转换。让我们将数字转换为浮点数，重新放入 DataFrame，并将日期转换为日期格式。\n\
  \n```\nticker = 'AMZN'\ndf = pd.DataFrame({ticker: p.apply(float)})\ndf.index =\
  \ pd.to_datetime(df.index)\nprint(df.head())\nAMZN\n2018-01-04  1209.59\n2018-01-05\
  \  1229.14\n2018-01-08  1246.87\n2018-01-09  1252.70\n2018-01-10  1254.33\n```\n\
  \n考虑到我们要构建包含多个股票代码的投资组合，我们把 `get_prices` 函数封装到一个更大的函数中，以处理多个股票代码。\n\n#### `get_historical`\n\
  \n以下是 `get_historical` 的代码：\n\n```\ndef get_historical(tickers, start_date, end_date):\n\
  df = pd.DataFrame(index=pd.date_range(start_date, end_date, freq=\"D\"))\nfor t\
  \ in tickers:\ndf = pd.concat([\ndf,\nget_price(t, outputsize=\"full\")],\naxis=1,\n\
  join_axes=[df.index]\n)\ndf = df.fillna(method='ffill').dropna()\nreturn df\n```\n\
  \n这个 `get_historical` 函数会遍历每个股票代码，并将清洗后的响应数据绑定到一个主 DataFrame 对象上。该函数使我们能够获取任意数量上市公司在任意时间跨度内的数据和收盘价。\n\
