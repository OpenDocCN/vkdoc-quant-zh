  \n可惜的是，我们从未将循环 A 的逻辑封装成函数。所以，就把它当作家庭作业吧！一旦你将循环 A 函数化，就可以对其运行同样的 `%%timeit` 魔法命令，亲自感受速度差异。\n\
  \n先用少量行数试试，再大幅增加行数。随着行数增加，速度差异会变得惊人！\n\n### 预算\n\n> 破产不是选项，现金流永远至上。\n> \n> ——A$AP\
  \ Rocky\n\n从记事起，我就一直痴迷于预算规划，最初用笔和纸，后来用 Excel，再后来用 R，现在用 Python。\n\n虽然有一些优秀的在线工具可以帮助你制定预算，但我总觉得它们有所欠缺。虽然大多数预算应用在衡量月度收支方面表现出色，但我发现它们在情景规划或捕捉整体现金流状况方面并不特别出色。\n\
  \n当我制定预算时，我想知道每个时间点的银行余额，以便将更多资金用于储蓄，减少饮酒开销，或规划度假时间。\n\n做预算时，必须记住现金流为王。如果在月内的任何时刻，你的预算显示支出超过实际可用资金，那么月底是否平衡就无关紧要了。每一天都必须平衡。\n\
  \n## 日期\n\n要制定预算，我们必须处理日期。不幸的是，在 Python 中处理日期有点麻烦。Python 中常用的日期/时间格式有效有六种，但要让每种格式协调工作很棘手，需要进行一些转换。\n\
  \n这是 StackOverflow^(²¹) 上 2014 年发布的一张精彩的“现状”图（遗憾的是，四年后情况变化不大）：\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figa_HTML.jpg](img/469615_1_En_5_Figa_HTML.jpg)\n\
  \n全面讨论日期格式超出了本书的范围；不过，我将强制执行两条规则，这将大大简化我们的工作，并帮助我们避开在 Python 中处理日期的大多数固有问题。\n\n\
  以下是我的两条规则：\n\n* 将所有内容强制转换为 `Timestamp`。\n* 对所有内容调用 `.normalize`。\n\n### datetime\n\
  \nPython 自带 `datetime`。因此，我们可以直接创建 `datetime.datetime` 对象和 `datetime.date` 对象，如下所示：\n\
  \n```\nimport datetime\ndate_1 = datetime.datetime.now()\nprint(date_1)\nprint(date_1.__repr__())\n\
  print(type(date_1))\ndate_2 = datetime.date.today()\nprint(date_2)\nprint(date_2.__repr__())\n\
  print(type(date_2))\n2018-05-29 21:34:10.877373\ndatetime.datetime(2018, 5, 29,\
  \ 21, 34, 10, 877373)\n2018-05-29\ndatetime.date(2018, 5, 29)\n```\n\n`datetime.date`\
  \ 和 `datetime.datetime` 对象也可以手动创建，按照以下模式填写每个对象：`(year, month, day, hour, minute,\
  \ second, millisecond)`。\n\n```\ndatetime.datetime(1993, 6, 7, 15, 16, 0)\ndatetime.datetime(1993,\
  \ 6, 7, 15, 16)\n```\n\n## Timestamp\n\npandas 提供了 `Timestamp` 类型，其行为在很大程度上类似于 `datetime.datetime`\
  \ 对象，但与 DataFrame 和 DatetimeIndex（我们将在本章后面使用）配合良好。此外，`Timestamp` 还附带了一些非常实用的功能（即\
  \ `.normalize`）。\n\n要将 `datetime.datetime` 或 `datetime.date` 对象转换为 `Timestamp`，我们可以使用\
  \ `to_datetime` 函数，或者直接将对象包装在 `Timestamp` 中。两种方法都有效。\n\n```\nimport pandas as pd\n\
  print(pd.Timestamp(date_1))\nprint(pd.to_datetime(date_1))\n2018-05-29 21:34:10.877373\n\
  2018-05-29 21:34:10.877373\n```\n\n更重要的是，我们可以像创建 `datetime.datetime()` 那样，通过手动填写函数参数来从头创建\
  \ `Timestamp`。\n\n```\ndate_3 = pd.Timestamp(1993, 6, 7, 15, 16, 0)\ndate_3\nTimestamp('1993-06-07\
  \ 15:16:00')\n```\n\n#### .normalize\n\n在日期时间上下文中，归一化意味着剥离所有时间信息，只保留日期部分附加到对象上。如果所有内容都是\
  \ `Timestamp` 类型，这很简单：\n\n```\nprint(date_1)\ndate_1 = pd.Timestamp(date_1)\nprint(date_1)\n\
  print(date_1.normalize())\n2018-05-29 21:34:10.877373\n2018-05-29 21:34:10.877373\n\
  2018-05-29 00:00:00\n```\n\n如你所见，`.normalize` 方法将时间元数据设置为 00:00:00，这有助于我们稍后将各部分粘合在一起。\n\
  \n\n\n## 时间跨度\n\n要制定预算，我们需要确定一个时间跨度。我倾向于将所有内容限定在一年内，因为说实话，预测更远的未来是徒劳的。\n\n在本章的剩余部分，我将引用这里定义的全局变量，因此请确保运行以下代码：\n\
  \n```\nTODAY = pd.Timestamp('today').normalize()\nprint(TODAY)\nEND = TODAY + datetime.timedelta(days=365)\n\
  print(END)\n2018-05-29 00:00:00\n2019-05-29 00:00:00\n```\n\n请随意调整 `TODAY`（起始）和\
  \ `END` 变量以满足你的需求。^(²²)\n\n请务必记得对所有内容使用 `.normalize()`！否则，当你跟着所有示例操作时，你会碰得头破血流。\n\
  \n在定义好起始和结束日期后，我们可以用 pandas 创建一个空的日历对象，它利用由 `date_range` 函数创建的 `DatetimeIndex`。\n\
  \n```\ncalendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))\n```\n\
  \n通过 `.head()` 查看 `DataFrame` 对象的内部，我们可以看到有一系列按天递增的日期。\n\n```\nprint(calendar.head())\n\
  Empty DataFrame\nColumns: []\nIndex: [2018-05-29 00:00:00, 2018-05-30 00:00:00,\
  \ 2018-05-31 00:00:00, 2018-06-01 00:00:00, 2018-06-02 00:00:00]\n```\n\n`pd.date_range()`\
  \ 函数非常灵活。它可以通过向 `freq` 参数传递偏移别名^(²³) 来接受不同的日期增量。\n\n在预算制定中非常实用的两个偏移别名是 `SM` 和 `MS`。前者是“半月末频率（15\
  \ 号和月末）”的别名，非常适合处理收入这类情况；后者是“月初频率”的别名，对于房租这类支出很有用。\n\n## 现金流\n\n以下是一些如何使用偏移别名的示例：\n\
  \n```\n# 半月末频率（15 号和月末）\nprint('Semi-month End:')\nsm = pd.date_range(start=TODAY,\
  \ end=END, freq=\"SM\")\nprint(sm)\nprint('\\n')\n## 月初频率\nprint('Month Start:')\n\
  ms = pd.date_range(start=TODAY, end=END, freq=\"MS\")\nprint(ms)\nSemi-month End:\n\
  DatetimeIndex(['2018-05-31', '2018-06-15', '2018-06-30', '2018-07-15',\n'2018-07-31',\
  \ '2018-08-15', '2018-08-31', '2018-09-15',\n'2018-09-30', '2018-10-15', '2018-10-31',\
  \ '2018-11-15',\n'2018-11-30', '2018-12-15', '2018-12-31', '2019-01-15',\n'2019-01-31',\
  \ '2019-02-15', '2019-02-28', '2019-03-15',\n'2019-03-31', '2019-04-15', '2019-04-30',\
  \ '2019-05-15'],\ndtype='datetime64[ns]', freq='SM-15')\nMonth Start:\nDatetimeIndex(['2018-06-01',\
  \ '2018-07-01', '2018-08-01', '2018-09-01',\n'2018-10-01', '2018-11-01', '2018-12-01',\
  \ '2019-01-01',\n'2019-02-01', '2019-03-01', '2019-04-01', '2019-05-01'],\ndtype='datetime64[ns]',\
  \ freq=\"MS\")\n```\n\n如果我们想将收入（例如，每月 1000 美元，分两次发放）映射到日历对象上，我们可以创建一个新的 DataFrame，其索引跨越全年，并且\
  \ `freq='SM'`。\n\n```\nincome = pd.DataFrame(\n    data={'income': 1000},\n    index=pd.date_range(start=TODAY,\
  \ end=END, freq=\"SM\")\n)\nprint(income.head())\nincome\n2018-05-31    1000\n2018-06-15\
  \    1000\n2018-06-30    1000\n2018-07-15    1000\n2018-07-31    1000\n```\n\n类似地，对于房租（例如，每月\
  \ 1500 美元），我们可以将 DataFrame 包装在 `DatetimeIndex`（由便捷的 `date_range` 函数创建）周围，并设置 `freq='MS'`。\n\
  \n```\nrent = pd.DataFrame(\n    data={'rent': -1500},\n    index=pd.date_range(start=TODAY,\
  \ end=END, freq=\"MS\")\n)\nprint(rent.head())\nrent\n2018-06-01 -1500\n2018-07-01\
  \ -1500\n2018-08-01 -1500\n2018-09-01 -1500\n2018-10-01 -1500\n```\n\n现在我们有了一个包含全年每一天的空日历对象，以及两个“现金流”对象（`income`\
  \ 和 `rent`），我们可以使用 `pd.concat()` 将这些 DataFrame 拼接起来。如果你的 `Timestamp` 没有归一化，这将无法正常工作。\n\
  \n|   | income | rent |\n| --- | --- | --- |\n| 2018-05-29 | 0.0 | 0.0 |\n| 2018-05-30\
  \ | 0.0 | 0.0 |\n| 2018-05-31 | 1000.0 | 0.0 |\n| 2018-06-01 | 0.0 | -1500.0 |\n\
  | 2018-06-02 | 0.0 | 0.0 |\n\n```\ncalendar = pd.concat([calendar, income], axis=1).fillna(0)\n\
  calendar = pd.concat([calendar, rent], axis=1).fillna(0)\ncalendar.head(5)\n```\n\
  \n请注意以下几点：\n\n*   在 `pd.concat()` 中将 `axis` 设置为 `1`，是为了告诉 pandas 我们希望沿着列轴进行拼接（连接）。\n\
  *   每次连接操作后都会调用 `.fillna(0)` 方法，以将 NaN 值填充为 0。（因为我们每月第一天支付房租，所以在索引为 `2018-XX-02`\
  \ 处的房租单元格会是 NaN 值。）\n\n使用 `.loc`（pandas 中基于标签位置索引的方法）查看这个“已填充”的 `calendar` 对象的内部，我们可以看到连接成功了！\n\
  \n|   | income | rent |\n| --- | --- | --- |\n| 2019-01-30 | 0.0 | 0.0 |\n| 2019-01-31\
  \ | 1000.0 | 0.0 |\n| 2019-02-01 | 0.0 | -1500.0 |\n| 2019-02-02 | 0.0 | 0.0 |\n\
  \n```\ncalendar.loc[\n    (calendar.index >= '2019-01-30') &\n    (calendar.index\
  \ <= '2019-02-02')\n]\n```\n\n## 总计\n\n现在，要全面了解每个时间点的现金流，我们只需汇总每天的 `income` 和 `rent`\
  \ 列，并使用 `cumsum()` 计算累计总和。\n\n|   | income | rent | total | cum_total |\n| --- |\
  \ --- | --- | --- | --- |\n| 2019-05-29 | 0.0 | 0.0 | 0.0 | 6000.0 |\n\n```\ncalendar['total']\
  \ = calendar.sum(axis=1)\ncalendar['cum_total'] = calendar['total'].cumsum()\ncalendar.tail(1)\n\
  ```\n\n对 `calendar` 对象运行 `.tail()` 方法，我们可以看到到年底时我们预计会在银行里有 6000 美元。太棒了！然而，我们还不能庆祝，因为预算中隐藏着一个问题，通过绘制图表就能发现。\n\
  \n## 可视化\n\n在我们的 `total` 和 `cum_total` 列上运行一些基础 matplotlib 代码，会得到以下结果：\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figb_HTML.jpg](img/469615_1_En_5_Figb_HTML.jpg)\n\
  \n```\nfrom matplotlib import pyplot as plt\n%matplotlib inline\nplt.figure(figsize=(10,\
  \ 5))\nplt.plot(calendar.index, calendar.total, label='Daily Total')\nplt.plot(calendar.index,\
  \ calendar.cum_total, label='Cumulative Total')\nplt.legend()\n```\n\n尽管我们的预算显示到年底银行里会有\
  \ 6000 美元，但在年初的某个时刻，由于我们的房租支出与收入进账的时间错配，我们将被迫透支。同样，你的图表可能会因起始日期不同而有所差异。\n\n\n\n\
  ### 更新\n\n由于我们处理的是一个玩具示例，只需对问题“点石成金”，在起始银行账户余额上增加 2000 美元即可（要是生活真这么简单就好了）。\n\n```\n\
  bank = pd.DataFrame(\ndata={'bank': 2000},\nindex=pd.date_range(start=TODAY, end=TODAY)\n\
  )\nprint(bank)\nbank\n2018-05-29  2000\ncalendar = pd.concat([calendar, bank], axis=1).fillna(0)\n\
  ```\n\n问题应该就此解决了！现在我们必须重新计算总额。\n\n遗憾的是，还有另一个问题。如果对整个 DataFrame 执行 `.sum`，它将把总额加到总额上，导致每日数值变得混乱。\n\
  \n```\ncalendar.sum(axis=1).head()\n2018-05-29    2000.0\n2018-05-30       0.0\n\
  2018-05-31    3000.0\n2018-06-01   -3500.0\n2018-06-02    -500.0\nFreq: D, dtype:\
  \ float64\n```\n\n要防止这种情况发生，我们可以删除 `total` 和 `cum_total` 列，或者将它们设置为零。\n\n我将演示第一种方法。而且，由于我们还要重复执行几次这个操作，将逻辑封装在一个函数里应该更合理。\n\
  \n```\ndef update_totals(df):\n    # 检查这些列是否存在于数据框中\n    if df.columns.isin(['total',\
  \ 'cum_total']).any():\n        # 如果存在，则将它们设为 0\n        df['total'] = 0\n     \
  \   df['cum_total'] = 0\n    # 重新计算 total 和 cumulative_total\n    df['total'] =\
  \ df.sum(axis=1)\n    df['cum_total'] = df['total'].cumsum()\n    return df\n```\n\
  \n### 注意\n\nDataFrame 的行为有点像列表/集合/字典，因此我们可以通过简单的 `in` 调用来检查列成员关系。\n\n|   | income\
  \ | rent | total | cum_total | bank |\n|---|---|---|---|---|---|\n| 2019-05-29 |\
  \ 0.0 | 0.0 | 0.0 | 8000.0 | 0.0 |\n\n```\ncalendar = update_totals(calendar)\n\
  calendar.tail(1)\n```\n\n太棒了！现在我们打算在年底结余 8000 美元。\n\n让我们再次绘制 `calendar` 对象，以确保全年保持正数。同时，我们不妨也将绘图逻辑封装到一个函数中。\n\
  \n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figc_HTML.jpg](img/469615_1_En_5_Figc_HTML.jpg)\n\
  \n```\ndef plot_budget(df):\n    plt.figure(figsize=(10, 5))\n    plt.plot(df.index,\
  \ df.total, label='每日总额')\n    plt.plot(df.index, df.cum_total, label='累计总额')\n\
  \    plt.legend()\nplot_budget(calendar)\n```\n\n问题解决了！我们的现金流为正，总额也不再异常了。\n\n##\
  \ 假期一\n\n鉴于我们现金流为正，全年呈上升趋势，我们去度假吧！你觉得七月初（或者从 `TODAY` 日期起两个月后）花 2500 美元去哥伦比亚旅行怎么样？我觉得不错！我们可以像添加租金或收入一样，将假期添加到预算中。\n\
  \n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figd_HTML.jpg](img/469615_1_En_5_Figd_HTML.jpg)\n\
  \n```\nvacation = pd.DataFrame(\n    data={'vacation': -2500},\n    index=[pd.Timestamp('2018-07-01').normalize()]\n\
  )\nprint(vacation)\nvacation\n2018-07-01     -2500\ncalendar = pd.concat([calendar,\
  \ vacation], axis=1).fillna(0)\ncalendar = update_totals(calendar)\nplot_budget(calendar)\n\
  ```\n\n哇哦。等等。如果我们在七月份花掉 2500 美元，我们的资金将血本无归。\n\n我认为我们应该把想象中的假期推迟几个月，或者想办法用极少的预算完成哥伦比亚之旅。\n\
  \n目前，我们先去掉假期，考虑一些更“紧迫”的问题。\n\n```\ncalendar = calendar.drop('vacation', axis=1)\n\
  ```\n\n## 自然语言\n\n现金流并不规律。我们可能有一些在特定日期发生的开支，或者按越来越奇怪的周期收到薪酬。如果能用纯自然语言定义这些频率，而不必依赖\
  \ pandas 的偏移量别名，那就太好了。\n\n幸运的是，有一个名为 Recurrent^(²⁴) 的优秀库，可以帮我们完成大部分繁重的解析工作。\n\n\
  例如，我们可以用自然语言定义任意频率。\n\n```\nfrequency = 'every week until July 10th' # 尝试几种不同的月-日组合！\n\
  ```\n\n然后，我们从 `recurrent` 导入 `RecurringEvent` 类。\n\n```\n!pip install recurrent\n\
  from recurrent import RecurringEvent\n```\n\n接着，使用 `.parse` 方法进行解析。\n\n```\nr =\
  \ RecurringEvent()\nr.parse(frequency)\n'RRULE:INTERVAL=1;FREQ=WEEKLY;UNTIL=20180710'\n\
  ```\n\n`.parse` 将允许我们生成符合 iCalendar RFC^(²⁵) 标准的重复规则（称为 *rrule*）。相应的 rrule 使我们能够执行许多酷炫的操作，例如检查任意日期之前或之后的第一次出现、计算事件在给定时间范围内发生的次数，或者，对我们而言，生成日期计划表。\n\
  \n为了处理 rrule，我们需要再导入一个库。\n\n```\nfrom dateutil import rrule\n```\n\n将来自我们的 `RecurringEvent`\
  \ 的 `RFC` rrule 字符串传递给 `rrule.rrulestr`，将创建我们所需的 rrule 对象。\n\n```\nrr = rrule.rrulestr(r.get_RFC_rrule())\n\
  rr\n```\n\n现在，“every week until July 10th”已被转换为一个 rrule，我们可以生成从今天到一年后之间所有可能发生的日期。\n\
  \n```\nrr.between(TODAY, END)\n[datetime.datetime(2018, 5, 29, 21, 38, 42),\ndatetime.datetime(2018,\
  \ 6, 5, 21, 38, 42),\ndatetime.datetime(2018, 6, 12, 21, 38, 42),\ndatetime.datetime(2018,\
  \ 6, 19, 21, 38, 42),\ndatetime.datetime(2018, 6, 26, 21, 38, 42),\ndatetime.datetime(2018,\
  \ 7, 3, 21, 38, 42)]\n```\n\n我认为这个输出非常令人印象深刻。然而，`.between` 方法破坏了本章开头设定的两条日期规则。\n\
  \n输出的类型不是 `Timestamp`，而且数值没有标准化。让我们通过列表推导式同时解决这两个问题。\n\n```\n[pd.to_datetime(date).normalize()\
  \ for date in rr.between(TODAY, END)]\n[Timestamp('2018-05-29 00:00:00'),\nTimestamp('2018-06-05\
  \ 00:00:00'),\nTimestamp('2018-06-12 00:00:00'),\nTimestamp('2018-06-19 00:00:00'),\n\
  Timestamp('2018-06-26 00:00:00'),\nTimestamp('2018-07-03 00:00:00')]\n```\n\n###\
  \ get_dates\n\n现在，我们可以围绕这些日期创建一个 DatetimeIndex，并将它们放入 DataFrame 对象中。但在此之前，让我们创建一个\
  \ `get_dates` 函数，该函数输出一个类型为 `Timestamp` 的标准化日期列表，并且能够处理原始日期（例如“2018-06-07”）和自然语言（例如“every\
  \ week until July 10th”）：\n\n```\ndef get_dates(frequency):\n    # 先让 pandas 尝试处理单个日期\n\
  \    try:\n        return [pd.Timestamp(frequency).normalize()]\n    except ValueError:\n\
  \        pass\n    # 使用 recurrent 解析频率\n    try:\n        r = RecurringEvent()\n\
  \        r.parse(frequency)\n        rr = rrule.rrulestr(r.get_RFC_rrule())\n  \
  \      return [\n            pd.to_datetime(date).normalize()\n            for date\
  \ in rr.between(TODAY, END)\n        ]\n    except ValueError as e:\n        raise\
  \ ValueError('无效的频率')\n```\n\n该函数中的逻辑与我们之前执行的操作基本相同；不过，我添加了一些额外的错误处理，遵循“请求原谅而非许可”^(²⁶)的模式，先尝试让\
  \ `pd.Timestamp` 处理原始日期，然后退而求其次使用 Recurrent 库的 `.parse` 方法。\n\n让我们试试这个新函数。\n\n```\n\
  get_dates('2019-01-01')\n[Timestamp('2019-01-01 00:00:00')]\nget_dates('every week\
  \ until July 10th')\n[Timestamp('2018-05-29 00:00:00'),\nTimestamp('2018-06-05 00:00:00'),\n\
  Timestamp('2018-06-12 00:00:00'),\nTimestamp('2018-06-19 00:00:00'),\nTimestamp('2018-06-26\
  \ 00:00:00'),\nTimestamp('2018-07-03 00:00:00')]\nget_dates('this will not work')\n\
  \nValueError                    Traceback (most recent call last)\nin get_dates(frequency)\n\
  \        10         r.parse(frequency)\n---> 11         rr = rrule.rrulestr(r.get_RFC_rrule())\n\
  \        12         return [pd.to_datetime(date).normalize() for date in rr.between(TODAY,\
  \ END)]\nValueError: not enough values to unpack (expected 2, got 1)\nin get_dates(frequency)\n\
  \        12         return [\n        13              pd.to_datetime(date).normalize()\n\
  \        14              for date in rr.between(TODAY, END)\n        15        \
  \ ]\n        16     except ValueError as e:\n---> 17         raise ValueError('无效的频率')\n\
  ValueError: 无效的频率\n```\n\n一切似乎都运行正常！\n\n\n\n## 乐趣\n\n我们的预算目前还相当简陋。说实话，完全按预算生活并没有带来多少乐趣。在这个小例子中，我们工作（为了产生收入）来支付房租，嗯，差不多就这样。而且，我们不得不取消一次度假，因为我们负担不起。\n\
  \n在本节中，让我们通过安排一些夜生活（每周五和周六各 `$40`）来改善我们这惨淡的虚构生活。\n\n```\ndates = get_dates('every\
  \ week on Friday and Saturday')\ndates[:10] # first ten instances of the recurrance\
  \ rule\n[Timestamp('2018-06-01 00:00:00'),\nTimestamp('2018-06-02 00:00:00'),\n\
  Timestamp('2018-06-08 00:00:00'),\nTimestamp('2018-06-09 00:00:00'),\nTimestamp('2018-06-15\
  \ 00:00:00'),\nTimestamp('2018-06-16 00:00:00'),\nTimestamp('2018-06-22 00:00:00'),\n\
  Timestamp('2018-06-23 00:00:00'),\nTimestamp('2018-06-29 00:00:00'),\nTimestamp('2018-06-30\
  \ 00:00:00')]\n```\n\n要将这些日期封装成一个 `DataFrame` 对象，我们必须把这个列表转换成 `DatetimeIndex` 对象。唯一的问题是\
  \ `pd.DatetimeIndex` 只接受 pandas 的 `Series`。但实际上这根本不是问题！\n\n```\npd.Series(dates).head()\n\
  0   2018-06-01\n1   2018-06-02\n2   2018-06-08\n3   2018-06-09\n4   2018-06-15\n\
  dtype: datetime64[ns]\npd.DatetimeIndex(pd.Series(dates))\nDatetimeIndex(['2018-06-01',\
  \ '2018-06-02', '2018-06-08', '2018-06-09',\n'2018-06-15', '2018-06-16', '2018-06-22',\
  \ '2018-06-23',\n'2018-06-29', '2018-06-30',\n...\n'2019-04-26', '2019-04-27', '2019-05-03',\
  \ '2019-05-04',\n'2019-05-10', '2019-05-11', '2019-05-17', '2019-05-18',\n'2019-05-24',\
  \ '2019-05-25'],\ndtype='datetime64[ns]', length=104, freq=None)\n```\n\n如果我们将 `Timestamp`\
  \ 列表包装进一个 `Series`，再放进 `DatetimeIndex`，那么我们就可以沿用贯穿全书的基本模式。\n\n```\ndates = get_dates('every\
  \ week on Friday and Saturday')\nfun = pd.DataFrame(\n    data={'fun': -40},\n \
  \   index=pd.DatetimeIndex(pd.Series(dates))\n)\nprint(fun.head())\nfun\n2018-06-01\
  \  -40\n2018-06-02  -40\n2018-06-08  -40\n2018-06-09  -40\n2018-06-15  -40\n```\n\
  \n将这个 `fun` 对象拼接到我们的 `calendar` 对象上易如反掌。\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Fige_HTML.jpg](img/469615_1_En_5_Fige_HTML.jpg)\n\
  \n```\ncalendar = pd.concat([calendar, fun], axis=1).fillna(0)\ncalendar = update_totals(calendar)\n\
  plot_budget(calendar)\n```\n\n|   | income | rent | total | cum_total | bank | fun\
  \ |\n|---|--------|------|-------|-----------|------|-----|\n| 2019-05-25 | 0.0\
  \ | 0.0 | -40.0 | 3840.0 | 0.0 | -40.0 |\n| 2019-05-26 | 0.0 | 0.0 | 0.0 | 3840.0\
  \ | 0.0 | 0.0 |\n| 2019-05-27 | 0.0 | 0.0 | 0.0 | 3840.0 | 0.0 | 0.0 |\n| 2019-05-28\
  \ | 0.0 | 0.0 | 0.0 | 3840.0 | 0.0 | 0.0 |\n| 2019-05-29 | 0.0 | 0.0 | 0.0 | 3840.0\
  \ | 0.0 | 0.0 |\n\n```\ncalendar.tail()\n```\n\n看来我们的预算还能承受得起一点周末的乐趣！\n\n## YAML\n\
  \n尽管目前为止一切顺利，但向预算中添加新的支出/收入项仍是一个相当繁琐的过程。我们需要先生成 `DataFrame` 对象，然后拼接到主 `calendar`\
  \ 对象上，最后更新总额。如果能一次性定义所有预算项目，并且只计算一次总额，那就太好了。\n\nYAML 来救场了！YAML 是一种类似于 JSON 但更具人类可读性的文件格式。我们可以将所有预算项目整理到一个\
  \ YAML 文件中，像这样：\n\n> **注意：** `PyYAML` 应该随 Anaconda 一起安装了。如果没有，请尝试以下命令：`!pip install\
  \ pyyaml`\n\n```\nimport yaml\nbudget = yaml.load('''\nbank:\n  frequency: today\n\
  \  amount: 2000\nincome:\n  frequency: every 2 weeks on Friday\n  amount: 1000\n\
  rent:\n  frequency: every month\n  amount: -1500\nfun:\n  frequency: every week\
  \ on Friday and Saturday\n  amount: -40\n''')\n```\n\n运行 `yaml.load` 后，这会将所有内容转换成\
  \ Python 的 `dict`。\n\n```\nbudget\n{'bank': {'amount': 2000, 'frequency': 'today'},\n\
  \ 'fun': {'amount': -40, 'frequency': 'every week on Friday and Saturday'},\n 'income':\
  \ {'amount': 1000, 'frequency': 'every 2 weeks on Friday'},\n 'rent': {'amount':\
  \ -1500, 'frequency': 'every month'}}\n```\n\n将预算放入字典后，我们现在可以遍历所有键（`k`）和值（`v`），获取每个\
  \ `v` 对应的频率和金额，创建一个 `DataFrame` 对象，并将其拼接到主 `calendar` 对象上。之后，我们就可以计算总额，而无需在每一步后都更新它们了。\n\
  \n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figf_HTML.jpg](img/469615_1_En_5_Figf_HTML.jpg)\n\
  \n```\ncalendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))\nfor k,\
  \ v in budget.items():\n    frequency = v.get('frequency')\n    amount = v.get('amount')\n\
  \    dates = get_dates(frequency)\n    i = pd.DataFrame(\n        data={k: amount},\n\
  \        index=pd.DatetimeIndex(pd.Series(dates))\n    )\n    calendar = pd.concat([calendar,\
  \ i], axis=1).fillna(0)\ncalendar['total'] = calendar.sum(axis=1)\ncalendar['cum_total']\
  \ = calendar['total'].cumsum()\nplot_budget(calendar)\n```\n\n## 函数化\n\n让我们快速将预算逻辑函数化，以便测试更多场景。\n\
  \n```\ndef build_calendar(budget):\n    calendar = pd.DataFrame(index=pd.date_range(start=TODAY,\
  \ end=END))\n    for k, v in budget.items():\n        frequency = v.get('frequency')\n\
  \        amount = v.get('amount')\n        dates = get_dates(frequency)\n      \
  \  i = pd.DataFrame(\n            data={k: amount},\n            index=pd.DatetimeIndex(pd.Series(dates))\n\
  \        )\n        calendar = pd.concat([calendar, i], axis=1).fillna(0)\n    calendar['total']\
  \ = calendar.sum(axis=1)\n    calendar['cum_total'] = calendar['total'].cumsum()\n\
  \    return calendar\n```\n\n"
