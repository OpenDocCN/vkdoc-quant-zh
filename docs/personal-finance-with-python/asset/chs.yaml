  不幸的是，如果你现在尝试运行`xirr()`，会遇到`NameError: name ''xirr'' is not defined`错误。它未定义是因为 Python
  实际上并没有内置`xirr`函数。


  不过，没关系。我们自己来实现一个！^(¹³)


  ### xnpv


  在我们自己实现之前，还记得我说过内部收益率（IRR/XIRR）与净现值（NPV/XNPV）紧密相关吗？好吧，如果我们想定义一个`xirr`函数，首先必须构建一个`xnpv`函数。


  就是这个：


  ```

  def xnpv(rate, values, dates):

  ''''''复制 XNPV()函数的功能''''''

  min_date = min(dates)

  return sum([

  value / (1 + rate)**((date - min_date).days / 365)

  for value, date

  in zip(values, dates)

  ])

  ```


  别担心！我知道它看起来有点吓人，但我保证它没那么糟糕。


  让我们放慢节奏，分解一下`xnpv`，这样我们就能真正理解它的工作原理了。函数的核心部分就是这个东西：


  ```

  value / (1 + rate)**((date - min_date).days

  ```


  如果我们从`df`对象中取出所有的值和日期，就能看到它的作用。


  ```

  values = df.total

  dates = df.date

  print(''值:'', list(values))

  print(''日期:'', list(dates))

  值: [-3000, 1000, 1000, 1000, 1000]

  日期: [Timestamp(''2017-01-01 00:00:00''), Timestamp(''2018-01-01 00:00:00''), Timestamp(''2019-01-01
  00:00:00''), Timestamp(''2020-01-01 00:00:00''), Timestamp(''2021-01-01 00:00:00'')]

  ```


  我们还需要一个随机的折现率（别担心，稍后我们会更改它；只需将其视为借贷成本）以及`dates`列表中的最小日期。


  ```

  rate = 0.05

  min_date = min(dates)

  print(min_date)

  2017-01-01 00:00:00

  ```


  有了这些元素后，我们就可以对列表中第一个值（Python 从 0 开始索引，所以第一个值是`data[0]`）运行`xnpv`函数的核心部分。


  ```

  date = dates[0]

  value = values[0]

  value / (1 + rate)**((date - min_date).days / 365)

  -3000.0

  ```


  我们所做的只是将-3000 美元折现到现在，但它本身就已经是现值了，因为它关联的是第一个（最小）日期值。


  如果我们转向第二笔现金流（1000 美元）并将其折现到现在，情况就会更具指导意义。


  ```

  date = dates[1]

  value = values[1]

  print(value)

  value / (1 + rate)**((date - min_date).days / 365)


  952.3809523809523

  ```


  我们可以继续为每个日期-值对运行此公式，或者我们可以偷懒，将所有内容包裹在一个列表推导式中，并使用`zip`同时将所有现金流折现到现在。


  ```

  intermediate_step = [

  value / (1 + rate)**((date - min_date).days / 365)

  for value, date

  in zip(values, dates)

  ]

  print(intermediate_step)

  [-3000.0, 952.3809523809523, 907.0294784580499, 863.837598531476, 822.5925101174964]

  ```



  好的，作为一名高级文档工程师和翻译员，我会遵循您给出的注意事项和示例，将以下英文文本翻译成中文。



  ### 说明


  列表推导式是在 Python 中创建列表的一种非常简便的方法。它们遵循以下格式：`[expression for item in list if conditional]`。


  而 `zip` 就像一条拉链，将两个不同列表中的值聚合在一起，并返回一个结果。


  将所有现值都存储在对象 `intermediate_step` 的列表中后，剩下的工作就是将所有值求和并打印结果。


  ```

  print(sum(intermediate_step))

  xnpv(0.05, df.total, df.date)

  545.8405394879746

  545.8405394879746

  ```


  看到了吧，`xnpv` 其实没那么难！


  这一切意味着什么？嗯，假设贴现率为 5%（我们随机选择了这个值，但你可以把它看作是你的资本成本或从其他潜在投资机会中可能获得的回报），那么我们所有预期现金流的净现值就是
  545.84 美元。


  ### xirr


  搞定了 `xnpv` 之后，构建一个 `xirr` 函数就相对简单了。之所以简单，是因为 IRR 就是 NPV 等于 0 时的贴现率。如果愿意，我们实际上可以通过反复试错的过程手动推导出内部收益率。


  ```

  xnpv(0.05, df.total, df.date)

  545.8405394879746

  print(xnpv(0.04, df.total, df.date))

  print(xnpv(0.06, df.total, df.date))

  print(xnpv(0.07, df.total, df.date))

  print(xnpv(0.08, df.total, df.date))

  print(xnpv(0.09, df.total, df.date))

  print(xnpv(0.11, df.total, df.date))

  print(xnpv(0.12, df.total, df.date))

  print(xnpv(0.125, df.total, df.date))

  print(xnpv(0.1255, df.total, df.date))

  print(xnpv(0.1258, df.total, df.date))

  print(xnpv(0.12583, df.total, df.date))

  print(xnpv(0.12586, df.total, df.date))

  629.8033770546891

  464.97917229138625

  387.0698546137953

  311.9718737447598

  239.55263528320688

  102.25737356965487

  37.15205553499129

  5.437960934594116

  2.2965732963834853

  0.4143376303915147

  0.22622105096445466

  0.038123913067124704

  ```


  虽然有些繁琐，但可行！


  因为最后一个值非常接近 0，我们可以得出结论，我们矿机的内部收益率大约为 12.586%。太棒了！然而，一直手动调整 `xnpv` 函数并非理想之选。如果我们有一个能自动找到零点的函数就好了。


  这要难得多，所以与其自己编写一个“找零点”的函数，不如借助 SciPy 库中的牛顿-拉夫逊优化方法。


  ```

  from scipy.optimize import newton

  def xirr(values, dates):

  ''''''复制 XIRR() 函数的功能''''''

  return newton(lambda r: xnpv(r, values, dates), 0)

  xirr(df.total, df.date)

  0.1258660808393406

  ```


  详细解释 `newton()` 函数的工作原理超出了本书的范围。如果你有兴趣了解更多，维基百科^(¹⁴)上有一个很好的页面介绍了它的工作原理。


