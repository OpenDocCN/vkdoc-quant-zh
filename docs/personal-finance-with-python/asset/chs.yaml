- '# 2. 利润


  > 你知道，你得花钱才能赚钱。

  >

  > ——Chief Keef


  几周前，我奶奶问我是否应该投点钱到比特币里。我不知道该怎么回答她。但我知道，在一本关于金融的书里，我至少得对比特币和加密货币稍作提及。


  对于不熟悉的人来说，像比特币（以及以太坊、狗狗币、Zcash）这样的加密货币是数字资产，旨在充当交易媒介，并利用密码学来保障交易安全、控制新货币的创造以及验证资产转移。


  因为我觉得这很有趣，我打算用狗狗币^(¹¹)作为贯穿本章剩余部分的线索。但老实说，这些概念并不仅限于狗狗币（甚至不限于加密货币）。它们适用于任何你需要花钱才能赚钱的场景。


  所以，如果你不喜欢加密货币或狗狗币（我绝不怪你），请耐心听我讲。狗狗币似乎比谈论其他随机的东西（比如一个柠檬水摊位）有趣得多。


  ## 挖矿


  ![../images/469615_1_En_2_Chapter/469615_1_En_2_Figa_HTML.jpg](img/469615_1_En_2_Figa_HTML.jpg)


  如果你对狗狗币感兴趣并想拥有一些，可以通过以下方式之一：


  * 购买它

  * 通过称为*挖矿*的过程生成它


  购买狗狗币很简单。但挖矿更有趣。简单来说（非常粗略地简化），挖掘狗狗币需要在你的计算机上安装一个程序，该程序利用你的硬件来解决计算量极大的数学问题。


  解决一个问题，获得一个狗狗币。就这么简单。


  虽然你可以在笔记本电脑上运行挖矿应用程序，但那些真正认真挖矿的人（无论是挖狗狗币还是其他币）会选择在专门的矿机上运行这类应用程序。不过，一台像样的矿机可能非常昂贵。一台矿机需要专门的图形处理单元（GPU）、一块好的主板、大容量内存、一个不错的
  CPU、一个机箱、一些风扇以及许多其他组件。如今，随便花个 3000 美元买一套挖矿设备配件已经很常见了。


  为了本章的目的，我们假设先期投入 3000 美元购买必要组件。


  如果我们在初始投资的基础上挖到了 6000 美元，简单计算一下就会知道，我们实现的利润是 3000 美元，我们的投资回报率（ROI）如下：


  ```

  r = 6000

  i = 3000

  print(f''{(r - i) / i * 100}%'')

  100.0%

  ```


  ## ROI


  很爽，对吧？不，因为 ROI 是一个非常具有误导性的衡量指标。它之所以有误导性，是因为它没有考虑我们收回资金所花费的时间。


  也许我们在六个月内挖到了 6000 美元。或者，也可能花了六年。无论是几个月还是几年，计算结果和答案都是一样的。两者都得出 100%的 ROI。




  ## 内部收益率（IRR）


  投资回报率（ROI）在不同时间跨度内得出相同数值，这一事实理应让我们感到困扰（反正我挺困扰的）。毕竟时间就是金钱，对吧？而且今天的 3000 美元比明天的 3000
  美元，或者更确切地说比明年的 3000 美元更值钱。


  此外，投资像矿机这样的项目，会妨碍我们投资其他项目，比如一个柠檬水摊。ROI 无法捕捉到这些机会成本。


  然而，内部收益率（IRR）可以做到。IRR 是使潜在投资的净现值为零的折现率。


  重要的是，如果你的投资预期 IRR 为 5%，但你的借贷成本为 8%，你就不应该投资该机会或项目。但当数字反过来——即 IRR 超过借贷成本时——你就应该投资！


  ### =IRR()


  在我们这个虚构的例子中，初始投入是 3000 美元。但先别急着让资金翻倍，让我们稍微回归现实，假设我们的狗狗币矿机在未来四年内每年产生 1000 美元的被动收入。


  |     | 日期       | 收入 | 支出   |

  | --- | ---------- | ---- | ------ |

  | 0   | 2017-01-01 | 0    | -3000  |

  | 1   | 2018-01-01 | 1000 | 0      |

  | 2   | 2019-01-01 | 1000 | 0      |

  | 3   | 2020-01-01 | 1000 | 0      |

  | 4   | 2021-01-01 | 1000 | 0      |


  要计算此示例的 IRR，我们可以打开 Excel，汇总现金流入和流出，然后使用内置的`=IRR()`公式来获得所需结果。


  |     | 日期       | 收入 | 支出   | 合计   |

  | --- | ---------- | ---- | ------ | ------ |

  | 0   | 2017-01-01 | 0    | -3000  | -3000  |

  | 1   | 2018-01-01 | 1000 | 0      | 1000   |

  | 2   | 2019-01-01 | 1000 | 0      | 1000   |

  | 3   | 2020-01-01 | 1000 | 0      | 1000   |

  | 4   | 2021-01-01 | 1000 | 0      | 1000   |


  如果`total`位于 Excel 的`D`列，那么应用公式`=IRR(D0:D4)`将得出约 13%的结果。然而，`=IRR()`有些笨拙且不灵活。该公式假设我们的现金流入和流出是按固定周期发生的。


  如果我们的矿机产生的收入流量如下所示：


  |     | 日期       | 收入 | 支出 | 合计 |

  | --- | ---------- | ---- | ---- | ---- |

  | 0   | 2017-01-01 | 40   | -3000| -2960|

  | 1   | 2017-01-25 | 40   | -50  | -10  |

  | 2   | 2017-02-12 | 80   | -50  | 30   |

  | 3   | 2017-02-14 | 100  | -30  | 70   |

  | 4   | 2017-03-04 | 100  | -20  | 80   |

  | 5   | 2017-04-23 | 160  | -30  | 130  |

  | 6   | 2017-05-07 | 140  | -20  | 120  |

  | 7   | 2017-05-21 | 140  | -40  | 100  |

  | 8   | 2017-06-04 | 80   | -40  | 40   |

  | 9   | 2017-06-19 | 180  | -30  | 150  |

  | 10  | 2017-07-16 | 360  | -40  | 320  |

  | 11  | 2017-08-27 | 160  | -30  | 130  |

  | 12  | 2017-09-24 | 240  | -20  | 220  |

  | 13  | 2017-10-21 | 420  | -50  | 370  |

  | 14  | 2017-11-19 | 400  | -20  | 380  |

  | 15  | 2017-12-03 | 340  | -40  | 300  |

  | 16  | 2017-12-17 | 360  | -40  | 320  |

  | 17  | 2017-12-31 | 540  | -40  | 500  |


  那么`=IRR()`将得出错误结果，因为该公式根本不理解附带的日期信息。幸运的是，`IRR()`有一个名为`=XIRR()`的配套函数，可以处理不规则的现金流。


  `XIRR`公式将金额值与日期值对应起来，因此运行`=XIRR(D0:D17, A0:A17)`将得出正确的 IRR，而`=IRR(D0:D17)`则会返回一些极其不稳定的结果。


  ## pandas


  ![../images/469615_1_En_2_Chapter/469615_1_En_2_Figb_HTML.jpg](img/469615_1_En_2_Figb_HTML.jpg)


  虽然 Excel 完全适合计算 IRR/XIRR，但现在是时候将这项任务转移到 Python 和 pandas 上了。因为尽管 Excel 擅长处理这类简单任务，但当我们要涉及本书中有趣（且更复杂）的部分时，它就无法胜任了。


  那么，我们现在就换个思路，启动 nteract（或 Jupyter Notebook），开始用 pandas 来烹饪吧。


  ### read_excel


  pandas 非常好的一点是，它能够很好地处理我们现有的所有`.xlsx`和`.xls`数据。pandas 的`read_excel`函数是一个很好的起点，它可以将工作表和工作簿转换为
  pandas 原生的 DataFrame 格式。


  ### 注意


  我已将本章的数据存储在名为`data/no ../data`的文件夹中。如果你从设置章节文件下载的`xirr.xlsx`文件在别处，比如在你的下载文件夹中，请相应更改路径。你将使用`''Downloads/xirr.xlsx''`或`''Downloads/data/xirr.xlsx''`。


  |     | 日期       | 收入 | 支出   |

  | --- | ---------- | ---- | ------ |

  | 0   | 2017-01-01 | 0    | -3000  |

  | 1   | 2018-01-01 | 1000 | 0      |

  | 2   | 2019-01-01 | 1000 | 0      |

  | 3   | 2020-01-01 | 1000 | 0      |

  | 4   | 2021-01-01 | 1000 | 0      |


