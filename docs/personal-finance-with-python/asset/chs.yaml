  \    -24\nGE      149\ndtype: object\n2017-06-30 00:00:00:\nAMZN    -5\nCSCO   \
  \ 63\nGE      97\ndtype: object\n2017-09-30 00:00:00:\nAMZN      0\nCSCO    -83\n\
