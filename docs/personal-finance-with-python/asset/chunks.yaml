    ## pandas


    ![../images/469615_1_En_2_Chapter/469615_1_En_2_Figb_HTML.jpg](images/469615_1_En_2_Chapter/469615_1_En_2_Figb_HTML.jpg)


    Although Excel is perfectly suitable for calculating IRR/XIRR, it’s time we move
    this party to Python and pandas. Because while Excel excels at this simple stuff,
    it’s not going to cut it when we get to the fun (and more complex) parts of this
    book.


    So, let’s switch gears now, fire up nteract (or a Jupyter Notebook), and start
    cooking with pandas.


    ### read_excel


    One of the really nice things about pandas is that it’s well equipped to deal
    with all of our existing `.xlsx` and `.xls` data. The pandas `read_excel` function
    is a great place to start as it can turn sheets and workbooks into the panda-native
    DataFrame format.


    ### Note


    I’ve stored the data for this chapter in a folder called `data/no ../data`. If
    the `xirr.xlsx` file you downloaded from the setup chapter file is somewhere different,
    like in your Downloads folder, change the path to match. You’ll use either `''Downloads/xirr.xlsx''`
    or `''Downloads/data/xirr.xlsx''`.


    |   | date       | income | expenses |

    | - | ---------- | ------ | -------- |

    | 0 | 2017-01-01 | 0      | -3000    |

    | 1 | 2018-01-01 | 1000   | 0        |

    | 2 | 2019-01-01 | 1000   | 0        |

    | 3 | 2020-01-01 | 1000   | 0        |

    | 4 | 2021-01-01 | 1000   | 0        |


    ```

    import pandas as pd

    df = pd.read_excel(''data/xirr.xlsx'', sheet_name="regular")

    df

    ```


    To replicate the IRR workflow we just ran in Excel, we first have to create a
    new `total` column in our DataFrame object by using the pandas square-bracket
    notation.


    |   | date       | income | expenses | total |

    | - | ---------- | ------ | -------- | ----- |

    | 0 | 2017-01-01 | 0      | -3000    | -3000 |

    | 1 | 2018-01-01 | 1000   | 0        | 1000  |

    | 2 | 2019-01-01 | 1000   | 0        | 1000  |

    | 3 | 2020-01-01 | 1000   | 0        | 1000  |

    | 4 | 2021-01-01 | 1000   | 0        | 1000  |


    ```

    df[''total''] = df.income + df.expenses

    df

    ```


    Once the total column is created, we can run `xirr()` on top of the `.total` and
    `.date` columns.


    ```

    xirr(df.total, df.date)

    0.1258660808393406

    ```


    And boom. That’s it. Chapter. Over.


    SIKE!^([^(12)](#fn12))


    Unfortunately, if you try to run `xirr()` right now, you’ll hit a `NameError:
    name ''xirr'' is not defined`. It’s not defined because Python doesn’t actually
    come with an `xirr` function.


    It’s cool, though. We’ll roll our own!^([^(13)](#fn13))


    ### xnpv


    Just before we roll our own, remember when I said that the internal rate of return
    (IRR/XIRR) is tightly coupled with net present value (NPV/XNPV)? Well, if we want
    to define an `xirr` function, we first have to build an `xnpv` function.


    Here it is:


    ```

    def xnpv(rate, values, dates):

    ''''''Replicates the XNPV() function''''''

    min_date = min(dates)

    return sum([

    value / (1 + rate)**((date - min_date).days / 365)

    for value, date

    in zip(values, dates)

    ])

    ```


    Don’t worry! I know it looks kind of intimidating, but I promise it’s not that
    bad.


    Let’s slow things down and break apart `xpnv` so that we can actually see what’s
    going on. The essential part of the function is just this thing:


    ```

    value / (1 + rate)**((date - min_date).days

    ```


    If we grab all the values and dates from the `df` object, we can see what it does.


    ```

    values = df.total

    dates = df.date

    print(''Values:'', list(values))

    print(''Dates:'', list(dates))

    Values: [-3000, 1000, 1000, 1000, 1000]

    Dates: [Timestamp(''2017-01-01 00:00:00''), Timestamp(''2018-01-01 00:00:00''),
    Timestamp(''2019-01-01 00:00:00''), Timestamp(''2020-01-01 00:00:00''), Timestamp(''2021-01-01
    00:00:00'')]

    ```


    We also need a random discount rate (don’t worry, we’re going to change it later;
    just think of this as the cost of borrowing) and the minimum date in the `dates`
    list.


    ```

    rate = 0.05

    min_date = min(dates)

    print(min_date)

    2017-01-01 00:00:00

    ```


    Once we have these pieces, we can run the meat of the `xpnv` function on top of
    the first values in each list (Python starts indexing at 0, so the first value
    is at `data[0]`).


    ```

    date = dates[0]

    value = values[0]

    value / (1 + rate)**((date - min_date).days / 365)

    -3000.0

    ```


    All we did was bring -$3,000 to the present, but it was already in the present
    because it was attached to the first (minimum) date value.


    If we turn to the second cash flow ($1,000) and bring it to the present, things
    become a little bit more instructive.


    ```

    date = dates[1]

    value = values[1]

    print(value)

    value / (1 + rate)**((date - min_date).days / 365)


    952.3809523809523

    ```


    We could continue running this formula for each date-value pair, or we could be
    lazy and wrap everything in a list comprehension and use `zip` to bring all the
    cash flows to the present at the same time.


    ```

    intermediate_step = [

    value / (1 + rate)**((date - min_date).days / 365)

    for value, date

    in zip(values, dates)

    ]

    print(intermediate_step)

    [-3000.0, 952.3809523809523, 907.0294784580499, 863.837598531476, 822.5925101174964]

    ```'
