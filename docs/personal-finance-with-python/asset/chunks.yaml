    \   [5](#469615_1_En_3_Chapter.xhtml#Fn5_source)   [6](#469615_1_En_3_Chapter.xhtml#Fn6_source)\n\
    \n# 4. Amortize\n\n> Yeah, I’m paid, and I don’t got a debt (hah).\n> \n> —Migos\n\
    \nI have a personal aversion to debt. It seems like a lot of Millennials do. Even\
    \ though I try to avoid it, I can appreciate that debt can be a fantastic tool,\
    \ if (and when) it’s used correctly. It’s just that…most people don’t use it correctly.\n\
    \nIn my opinion, debt is used incorrectly when you buy stuff that won’t help you\
    \ get back out of debt. A vacation is a good example. However, if you take on\
    \ debt to buy something that will propel you forward and will help you pay it\
    \ back, debt can super powerful.\n\nA couple of chapters ago we talked about Dogecoin\
    \ mining. Implicit in the example was the concept of spending money to make money.\
    \ The chapter assumed that a decent mining rig would set us back about $3,000\
    \ CAD (or as we learned previous chapter, around $2,341 USD). Most people don’t\
    \ have that kind of money sitting liquid.\n\nIf you have only a couple hundred\
    \ dollars to your name, the Dogecoin game is out of the question, unless, of course,\
    \ you decide to go into debt.\n\n(If you’re sick of Dogecoin at this point, pretend\
    \ that you need $3,000 for a new laptop!)\n\nQuick disclaimer: debt is a super-complex\
    \ subject. To narrow the focus for this book, we’ll just explore a personal loan.\n\
    \n## Banks\n\n![../images/469615_1_En_4_Chapter/469615_1_En_4_Figa_HTML.png](images/469615_1_En_4_Chapter/469615_1_En_4_Figa_HTML.png)\n\
    \nWhen it comes to the amount of total interest that you will pay on a personal\
    \ loan, banks often obfuscate the details.\n\nLet’s say we need $3,000 for our\
    \ Dogecoin rig. We shop around and come back with three viable options from Pineapple\
    \ Imperial Bank, Orange National Bank, and Banana Dominion Bank.\n\nOur decision\
    \ will, of course, be dependent on the monthly payment we can realistically afford;\
    \ however, let’s eschew that constraint for a moment and evaluate things on a\
    \ total interest basis.\n\nHere are the options: Pineapple Imperial is offering\
    \ us $3,000 at an interest rate of 5.75 percent for 14 months. Orange National\
    \ will do $3,000 at 3.99 percent for 20 months. And, Banana Dominion is prepared\
    \ to lend us what we need at 8.99 percent for 8 months. Notice that each bank\
    \ lists only the term length and the interest rate.\n\nIf the term lengths were\
    \ all the same, Orange National would be a no-brainer. But given that each option\
    \ has a different term length, how do we choose between them? To figure out which\
    \ option is the least expensive on a total interest cost basis, we need to turn\
    \ to amortization schedules.\n\n## Amortization\n\nAn *amortization schedule*\
    \ is a table that details each periodic payment on an amortizing loan (like a\
    \ personal loan). *Amortization* refers to the process of paying off a loan over\
    \ time through regular payments. On an amortizing loan, a portion of each payment\
    \ is for interest, while the remaining amount is applied against the principal\
    \ balance.\n\n## Payment\n\nBecause each of the three options are fixed-payment\
    \ personal loans, we can calculate the monthly payments with the following formula:\n\
    \n![$$ P=\\frac{r(PV)}{1-\\left(1+r\\right)-n} $$](images/469615_1_En_4_Chapter/469615_1_En_4_Chapter_TeX_Equa.png)\n\
    \nwhere:\n\n```\nP = Payment\nPV = Present value (the loan)\nr = Rate per period\n\
    n = Number of periods\n```\n\nIf we use the Pineapple Imperial loan to start,\
    \ we can apply the payment formula in Python with the following code block:\n\n\
    ```\nloan = 3000.00\nrate = 0.0575\nterm = 14\npayment = loan * (rate / 12) /\
    \ (1 - (1 + (rate / 12))**(-term))\nprint(round(payment, 2))\n222.07\n```\n\n\
    There are a couple of things to note. First, the double asterisk (`**`) is Python\
    \ notation for exponentiation. Second, we divide the (interest) rate by 12 because\
    \ most banks charge interest on a monthly basis (and there are 12 months in a\
    \ year).\n\nIf you can’t be bothered to remember the payment formula for an amortizing\
    \ loan, numpy has a handy `pmt` function that can do it for you.\n\n```\nimport\
    \ numpy as np\npayment = np.round(-np.pmt(rate/12, term, loan), 2)\nprint(payment)\n\
    222.07\n```"
