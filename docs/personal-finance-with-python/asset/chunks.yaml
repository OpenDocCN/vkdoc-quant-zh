    ### `get_historical`


    Here’s the code for `get_historical`:


    ```

    def get_historical(tickers, start_date, end_date):

    df = pd.DataFrame(index=pd.date_range(start_date, end_date, freq="D"))

    for t in tickers:

    df = pd.concat([

    df,

    get_price(t, outputsize="full")],

    axis=1,

    join_axes=[df.index]

    )

    df = df.fillna(method=''ffill'').dropna()

    return df

    ```


    This `get_historical` function will loop through each ticker and bind the cleaned-up
    response to a main DataFrame object. The function will enable us to fetch data
    and close prices for any number of listed companies across any arbitrary length
    of time.


