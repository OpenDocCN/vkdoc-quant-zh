    \ | 0.03 |\n\n```\norange\n```\n\n由于每个对象都是 pandas DataFrame 中的摊销计划表，我们可以像这样访问利息列：\n\
    \n```\nbanana['interest']\n0      NaN\n1    22.23\n2    19.52\n3    16.79\n4 \
    \   14.04\n5    11.28\n6     8.49\n7     5.68\n8     2.85\nName: interest, dtype:\
    \ object\n```\n\n我们通过调用 `.sum()` 来计算总和。\n\n```\nbanana['interest'].sum()\n100.88\n\
    ```\n\n我们汇总了每笔贷款的利息。\n\n```\nprint(banana['interest'].sum())\nprint(orange['interest'].sum())\n\
    print(pineapple['interest'].sum())\n100.88\n105.82999999999997\n108.93999999999998\n\
    ```\n\n可以看到，香蕉领地银行的贷款是最划算的（如果划算指的是支付的利息最少）。\n\n不过，需要注意的是，香蕉领地选项的每月还款额远高于橙子国民贷款。因此，我们可能会认为，为了最终减轻月度负担，多付\
    \ 5 美元也是值得的！\n\n## 结论\n\n我曾随口提过，应尽可能预分配资源，并期望你无条件相信。永远不要轻信没有证据的说法！\n\n如果你想了解循环\
    \ B 比循环 A 快多少，可以针对该函数运行一些 `%%timeit` Jupyter 魔法命令。\n\n```\n%%timeit\nam(3000,\
    \ 0.0575, 14)\n6.9 ms ± 877 μs per loop (mean ± std. dev. of 7 runs, 100 loops\
    \ each)\n```\n\n可惜的是，我们从未将循环 A 的逻辑封装成函数。所以，就把它当作家庭作业吧！一旦你将循环 A 函数化，就可以对其运行同样的\
    \ `%%timeit` 魔法命令，亲自感受速度差异。\n\n先用少量行数试试，再大幅增加行数。随着行数增加，速度差异会变得惊人！\n\n# 预算\n\n\
    > 破产不是选项，现金流永远至上。\n> \n> ——A$AP Rocky\n\n从记事起，我就一直痴迷于预算规划，最初用笔和纸，后来用 Excel，再后来用\
    \ R，现在用 Python。\n\n虽然有一些优秀的在线工具可以帮助你制定预算，但我总觉得它们有所欠缺。虽然大多数预算应用在衡量月度收支方面表现出色，但我发现它们在情景规划或捕捉整体现金流状况方面并不特别出色。\n\
    \n当我制定预算时，我想知道每个时间点的银行余额，以便将更多资金用于储蓄，减少饮酒开销，或规划度假时间。\n\n做预算时，必须记住现金流为王。如果在月内的任何时刻，你的预算显示支出超过实际可用资金，那么月底是否平衡就无关紧要了。每一天都必须平衡。\n\
    \n## 日期\n\n要制定预算，我们必须处理日期。不幸的是，在 Python 中处理日期有点麻烦。Python 中常用的日期/时间格式有效有六种，但要让每种格式协调工作很棘手，需要进行一些转换。\n\
    \n这是 StackOverflow^(²¹) 上 2014 年发布的一张精彩的“现状”图（遗憾的是，四年后情况变化不大）：\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figa_HTML.jpg](img/469615_1_En_5_Figa_HTML.jpg)\n\
    \n全面讨论日期格式超出了本书的范围；不过，我将强制执行两条规则，这将大大简化我们的工作，并帮助我们避开在 Python 中处理日期的大多数固有问题。\n\n\
    以下是我的两条规则：\n\n* 将所有内容强制转换为 `Timestamp`。\n* 对所有内容调用 `.normalize`。\n\n### datetime\n\
    \nPython 自带 `datetime`。因此，我们可以直接创建 `datetime.datetime` 对象和 `datetime.date` 对象，如下所示：\n\
    \n```\nimport datetime\ndate_1 = datetime.datetime.now()\nprint(date_1)\nprint(date_1.__repr__())\n\
    print(type(date_1))\ndate_2 = datetime.date.today()\nprint(date_2)\nprint(date_2.__repr__())\n\
    print(type(date_2))\n2018-05-29 21:34:10.877373\ndatetime.datetime(2018, 5, 29,\
    \ 21, 34, 10, 877373)\n2018-05-29\ndatetime.date(2018, 5, 29)\n```\n\n`datetime.date`\
    \ 和 `datetime.datetime` 对象也可以手动创建，按照以下模式填写每个对象：`(year, month, day, hour, minute,\
    \ second, millisecond)`。\n\n```\ndatetime.datetime(1993, 6, 7, 15, 16, 0)\ndatetime.datetime(1993,\
    \ 6, 7, 15, 16)\n```\n\n## Timestamp\n\npandas 提供了 `Timestamp` 类型，其行为在很大程度上类似于\
    \ `datetime.datetime` 对象，但与 DataFrame 和 DatetimeIndex（我们将在本章后面使用）配合良好。此外，`Timestamp`\
    \ 还附带了一些非常实用的功能（即 `.normalize`）。\n\n要将 `datetime.datetime` 或 `datetime.date` 对象转换为\
    \ `Timestamp`，我们可以使用 `to_datetime` 函数，或者直接将对象包装在 `Timestamp` 中。两种方法都有效。\n\n```\n\
    import pandas as pd\nprint(pd.Timestamp(date_1))\nprint(pd.to_datetime(date_1))\n\
    2018-05-29 21:34:10.877373\n2018-05-29 21:34:10.877373\n```\n\n更重要的是，我们可以像创建 `datetime.datetime()`\
    \ 那样，通过手动填写函数参数来从头创建 `Timestamp`。\n\n```\ndate_3 = pd.Timestamp(1993, 6, 7, 15,\
    \ 16, 0)\ndate_3\nTimestamp('1993-06-07 15:16:00')\n```\n\n### .normalize\n\n\
    在日期时间上下文中，归一化意味着剥离所有时间信息，只保留日期部分附加到对象上。如果所有内容都是 `Timestamp` 类型，这很简单：\n\n```\n\
    print(date_1)\ndate_1 = pd.Timestamp(date_1)\nprint(date_1)\nprint(date_1.normalize())\n\
    2018-05-29 21:34:10.877373\n2018-05-29 21:34:10.877373\n2018-05-29 00:00:00\n\
    ```\n\n如你所见，`.normalize` 方法将时间元数据设置为 00:00:00，这有助于我们稍后将各部分粘合在一起。\n"
- fmt: "# Horizon\n\nTo build a budget, we need a time horizon. I like to constrain\
    \ everything to a year because, honestly, predicting further into the future is\
    \ a fool’s errand.\n\nI’ll be referencing the globals defined here for the rest\
    \ of the chapter, so make sure you run this code:\n\n```\nTODAY = pd.Timestamp('today').normalize()\n\
    print(TODAY)\nEND = TODAY + datetime.timedelta(days=365)\nprint(END)\n2018-05-29\
    \ 00:00:00\n2019-05-29 00:00:00\n```\n\nFeel free to arbitrarily adjust the `TODAY`\
    \ (start) and `END` variables to match your needs.^([^(22)](#fn22))\n\nJust please\
    \ remember to `.normalize()` everything! Otherwise, you’re going to smash your\
    \ head against the wall as we work through all the examples.\n\nAfter we’ve defined\
    \ our start and end dates, we can create an empty calendar object with pandas\
    \ that leverages a `DatetimeIndex` created by the `date_range` function.\n\n```\n\
    calendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))\n```\n\nPeeking\
    \ inside the `DataFrame` object with `.head()`, we can see that there are a bunch\
    \ of dates that increment by one day.\n\n```\nprint(calendar.head())\nEmpty DataFrame\n\
    Columns: []\nIndex: [2018-05-29 00:00:00, 2018-05-30 00:00:00, 2018-05-31 00:00:00,\
    \ 2018-06-01 00:00:00, 2018-06-02 00:00:00]\n```\n\nThe `pd.date_range()` function\
    \ is super flexible. It can accept different date increments by passing offset\
    \ aliases^([^(23)](#fn23)) to the `freq` argument.\n\nTwo offset aliases that\
    \ are endlessly useful in budgeting are `SM` and `MS`. The former, an alias for\
    \ “semi-month-end frequency (15th and end of month),” is great for something like\
    \ income, and the latter, an alias for “month start frequency” is useful for an\
    \ expense like rent.\n\n# Flows\n\nHere are some examples of how to use the offset\
    \ aliases:\n\n```\n# semi-month end frequency (15th and end of month)\nprint('Semi-month\
    \ End:')\nsm = pd.date_range(start=TODAY, end=END, freq=\"SM\")\nprint(sm)\nprint('\\\
    n')\n# month start frequency\nprint('Month Start:')\nms = pd.date_range(start=TODAY,\
    \ end=END, freq=\"MS\")\nprint(ms)\nSemi-month End:\nDatetimeIndex(['2018-05-31',\
    \ '2018-06-15', '2018-06-30', '2018-07-15',\n'2018-07-31', '2018-08-15', '2018-08-31',\
    \ '2018-09-15',\n'2018-09-30', '2018-10-15', '2018-10-31', '2018-11-15',\n'2018-11-30',\
    \ '2018-12-15', '2018-12-31', '2019-01-15',\n'2019-01-31', '2019-02-15', '2019-02-28',\
    \ '2019-03-15',\n'2019-03-31', '2019-04-15', '2019-04-30', '2019-05-15'],\ndtype='datetime64[ns]',\
    \ freq='SM-15')\nMonth Start:\nDatetimeIndex(['2018-06-01', '2018-07-01', '2018-08-01',\
    \ '2018-09-01',\n'2018-10-01', '2018-11-01', '2018-12-01', '2019-01-01',\n'2019-02-01',\
    \ '2019-03-01', '2019-04-01', '2019-05-01'],\ndtype='datetime64[ns]', freq=\"\
    MS\")\n```\n\nIf we want to map earnings ($1,000 bimonthly, for example) onto\
    \ our calendar object, we can create a new DataFrame with an index that spans\
    \ the entire year and that has `freq='SM'`.\n\n```\nincome = pd.DataFrame(\n \
    \   data={'income': 1000},\n    index=pd.date_range(start=TODAY, end=END, freq=\"\
    SM\")\n)\nprint(income.head())\nincome\n2018-05-31    1000\n2018-06-15    1000\n\
    2018-06-30    1000\n2018-07-15    1000\n2018-07-31    1000\n```\n\nSimilarly,\
    \ for rent ($1,500 per month, for instance), we can wrap a DataFrame around a\
    \ `DatetimeIndex` (created by the convenient `date_range` function) with `freq='MS'`.\n\
    \n```\nrent = pd.DataFrame(\n    data={'rent': -1500},\n    index=pd.date_range(start=TODAY,\
    \ end=END, freq=\"MS\")\n)\nprint(rent.head())\nrent\n2018-06-01 -1500\n2018-07-01\
    \ -1500\n2018-08-01 -1500\n2018-09-01 -1500\n2018-10-01 -1500\n```\n\nNow that\
    \ we have an empty calendar object with each date for an entire year and two “cash\
    \ flow” objects (`income` and `rent`), we can stitch these DataFrames together\
    \ with `pd.concat()`. If your `Timestamp`s aren’t normalized, this won’t work.\n\
    \n|   | income | rent |\n| --- | --- | --- |\n| 2018-05-29 | 0.0 | 0.0 |\n| 2018-05-30\
    \ | 0.0 | 0.0 |\n| 2018-05-31 | 1000.0 | 0.0 |\n| 2018-06-01 | 0.0 | -1500.0 |\n\
    | 2018-06-02 | 0.0 | 0.0 |\n\n```\ncalendar = pd.concat([calendar, income], axis=1).fillna(0)\n\
    calendar = pd.concat([calendar, rent], axis=1).fillna(0)\ncalendar.head(5)\n```\n\
    \nNote the following:\n\n*   `axis` is set to `1` in `pd.concat()` to tell pandas\
    \ that we want to stitch (concatenate) along the column’s axis.\n*   The `.fillna(0)`\
    \ method is called after each concatenate operation to fill NaN values with 0.\
    \ (Because we pay rent on the first of each month, the cell for rent at index\
    \ `2018-XX-02` will be a NaN value.)\n\nPeeking inside this “filled-in” `calendar`\
    \ object with `.loc` (a label-location-based indexer method from pandas), we can\
    \ see that concatenations worked!\n\n|   | income | rent |\n| --- | --- | ---\
    \ |\n| 2019-01-30 | 0.0 | 0.0 |\n| 2019-01-31 | 1000.0 | 0.0 |\n| 2019-02-01 |\
    \ 0.0 | -1500.0 |\n| 2019-02-02 | 0.0 | 0.0 |\n\n```\ncalendar.loc[\n    (calendar.index\
    \ >= '2019-01-30') &\n    (calendar.index <= '2019-02-02')\n]\n```\n\n# Totals\n\
    \nNow, to get a holistic picture of our cash flows for each moment in time, we\
    \ just have to total up the `income` and `rent` columns for each day and compute\
    \ the running total with `cumsum()`.\n\n|   | income | rent | total | cum_total\
    \ |\n| --- | --- | --- | --- | --- |\n| 2019-05-29 | 0.0 | 0.0 | 0.0 | 6000.0\
    \ |\n\n```\ncalendar['total'] = calendar.sum(axis=1)\ncalendar['cum_total'] =\
    \ calendar['total'].cumsum()\ncalendar.tail(1)\n```\n\nRunning the `.tail()` method\
    \ on the `calendar` object, we can see that we’re meant to end the year with $6,000\
    \ in the bank. Great! However, we can’t celebrate just yet because there’s a problem\
    \ lurking in our budget that can be unearthed with some plotting.\n\n# Visualization\n\
    \nRunning some vanilla matplotlib on top of our `total` and `cum_total` columns\
    \ yields the following:\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figb_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figb_HTML.jpg)\n\
    \n```\nfrom matplotlib import pyplot as plt\n%matplotlib inline\nplt.figure(figsize=(10,\
    \ 5))\nplt.plot(calendar.index, calendar.total, label='Daily Total')\nplt.plot(calendar.index,\
    \ calendar.cum_total, label='Cumulative Total')\nplt.legend()\n```\n\nAlthough\
    \ our budget has us ending the year with $6,000 in the bank, there’s a moment\
    \ near the start of the year where we will be forced into overdraft because of\
    \ how our rent outflows stack against our income inflows. Again, your graph might\
    \ be different depending on your starting date."
  raw: '## Horizon


    To build a budget, we need a time horizon. I like to constrain everything to a
    year because, honestly, predicting further into the future is a fool’s errand.


    I’ll be referencing the globals defined here for the rest of the chapter, so make
    sure you run this code:


    ```

    TODAY = pd.Timestamp(today'').normalize()

    print(TODAY)

    END = TODAY + datetime.timedelta(days=365)

    print(END)

    2018-05-29 00:00:00

    2019-05-29 00:00:00

    ```


    Feel free to arbitrarily adjust the `TODAY` (start) and `END` variables to match
    your needs.^([^(22)](#fn22))


    Just please remember to .normalize everything! Otherwise, you’re going to smash
    your head against the wall as we work through all the examples.


    After we’ve defined our start and end dates, we can create an empty calendar object
    with pandas that leverages a `DatetimeIndex` created by the `date_range` function.


    ```

    calendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))

    ```


    Peeking inside the `DataFrame` object with `.head()`, we can see that there are
    a bunch of dates that increment by one day.


    ```

    print(calendar.head())

    Empty DataFrame

    Columns: []

    Index: [2018-05-29 00:00:00, 2018-05-30 00:00:00, 2018-05-31 00:00:00, 2018-06-01
    00:00:00, 2018-06-02 00:00:00]

    ```


    The `pd.date_range` function is super flexible. It can accept different date increments
    by passing offset aliases^([^(23)](#fn23)) to the `freq` argument.


    Two offset aliases that are endlessly useful in budgeting are `SM` and `MS`. The
    former, an alias for “semi-month-end frequency (15th and end of month),” is great
    for something like income, and the latter, an alias for “month start frequency”
    is useful for an expense like rent.


    ## Flows


    Here are some examples of how to use the offset aliases:


    ```

    # semi-month end frequency (15th and end of month)

    print(''Semi-month End:'')

    sm = pd.date_range(start=TODAY, end=END, freq="SM")

    print(sm)

    print(''\n'')

    # month start frequency

    print(''Month Start:'')

    ms = pd.date_range(start=TODAY, end=END, freq="MS")

    print(ms)

    Semi-month End:

    DatetimeIndex([''2018-05-31'', ''2018-06-15'', ''2018-06-30'', ''2018-07-15'',

    ''2018-07-31'', ''2018-08-15'', ''2018-08-31'', ''2018-09-15'',

    ''2018-09-30'', ''2018-10-15'', ''2018-10-31'', ''2018-11-15'',

    ''2018-11-30'', ''2018-12-15'', ''2018-12-31'', ''2019-01-15'',

    ''2019-01-31'', ''2019-02-15'', ''2019-02-28'', ''2019-03-15'',

    ''2019-03-31'', ''2019-04-15'', ''2019-04-30'', ''2019-05-15''],

    dtype=''datetime64[ns]'', freq=''SM-15'')

    Month Start:

    DatetimeIndex([''2018-06-01'', ''2018-07-01'', ''2018-08-01'', ''2018-09-01'',

    ''2018-10-01'', ''2018-11-01'', ''2018-12-01'', ''2019-01-01'',

    ''2019-02-01'', ''2019-03-01'', ''2019-04-01'', ''2019-05-01''],

    dtype=''datetime64[ns]'', freq="MS")

    ```


    If we want to map earnings ($1,000 bimonthly, for example) onto our calendar object,
    we can create a new DataFrame with an index that spans the entire year and that
    has `freq=''SM''`.


    ```

    income = pd.DataFrame(

    data={''income'': 1000},

    index=pd.date_range(start=TODAY, end=END, freq="SM")

    )

    print(income.head())

    income

    2018-05-31    1000

    2018-06-15    1000

    2018-06-30    1000

    2018-07-15    1000

    2018-07-31    1000

    ```


    Similarly, for rent ($1,500 per month, for instance), we can wrap a DataFrame
    around a `DatetimeIndex` (created by the convenient `date_range` function) with
    `freq=''MS''`.


    ```

    rent = pd.DataFrame(

    data={''rent'': -1500},

    index=pd.date_range(start=TODAY, end=END, freq="MS")

    )

    print(rent.head())

    rent

    2018-06-01 -1500

    2018-07-01 -1500

    2018-08-01 -1500

    2018-09-01 -1500

    2018-10-01 -1500

    ```


    Now that we have an empty calendar object with each date for an entire year and
    two “cash flow” objects (income and rent), we can stitch these DataFrames together
    with `pd.concat`. If your `Timestamp`s aren’t normalized, this won’t work.


    |   | income | rent |

    | --- | --- | --- |

    | 2018-05-29 | 0.0 | 0.0 |

    | 2018-05-30 | 0.0 | 0.0 |

    | 2018-05-31 | 1000.0 | 0.0 |

    | 2018-06-01 | 0.0 | -1500.0 |

    | 2018-06-02 | 0.0 | 0.0 |


    ```

    calendar = pd.concat([calendar, income], axis=1).fillna(0)

    calendar = pd.concat([calendar, rent], axis=1).fillna(0)

    calendar.head(5)

    ```


    Note the following:


    *   `axis` is set to `1` in `pd.concat` to tell pandas that we want to stitch
    (concatenate) along the column’s axis.


    *   The `.fillna(0)` method is called after each concatenate operation to fill
    NaN values with 0\. (Because we pay rent on the first of each month, the cell
    for rent at index 2018-XX-02 will be a NaN value.)


    Peeking inside this “filled-in” `calendar` object with `.loc` (a label-location-based
    indexer method from pandas), we can see that concatenations worked!


    |   | income | rent |

    | --- | --- | --- |

    | 2019-01-30 | 0.0 | 0.0 |

    | 2019-01-31 | 1000.0 | 0.0 |

    | 2019-02-01 | 0.0 | -1500.0 |

    | 2019-02-02 | 0.0 | 0.0 |


    ```

    calendar.loc[

    (calendar.index >= ''2019-01-30'') &

    (calendar.index <= ''2019-02-02'')

    ]

    ```


    ## Totals


    Now, to get a holistic picture of our cash flows for each moment in time, we just
    have to total up the income and rent columns for each day and compute the running
    total with `cumsum()`.


    |   | income | rent | total | cum_total |

    | --- | --- | --- | --- | --- |

    | 2019-05-29 | 0.0 | 0.0 | 0.0 | 6000.0 |


    ```

    calendar[''total''] = calendar.sum(axis=1)

    calendar[''cum_total''] = calendar[''total''].cumsum()

    calendar.tail(1)

    ```


    Running the `.tail` method on the calendar object, we can see that we’re meant
    to end the year with $6,000 in the bank. Great! However, we can’t celebrate just
    yet because there’s a problem lurking in our budget that can be unearthed with
    some plotting.


    ## Visualization


    Running some vanilla matplotlib on top of our total and cum_total columns yields
    the following:


    ![../images/469615_1_En_5_Chapter/469615_1_En_5_Figb_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figb_HTML.jpg)


    ```

    from matplotlib import pyplot as plt

    %matplotlib inline

    plt.figure(figsize=(10, 5))

    plt.plot(calendar.index, calendar.total, label=''Daily Total'')

    plt.plot(calendar.index, calendar.cum_total, label=''Cumulative Total'')

    plt.legend()

    ```


    Although our budget has us ending the year with $6,000 in the bank, there’s a
    moment near the start of the year where we will be forced into overdraft because
    of how our rent outflows stack against our income inflows. Again, your graph might
    be different depending on your starting date.'
  trans: "\n# 时间跨度\n\n要制定预算，我们需要确定一个时间跨度。我倾向于将所有内容限定在一年内，因为说实话，预测更远的未来是徒劳的。\n\n在本章的剩余部分，我将引用这里定义的全局变量，因此请确保运行以下代码：\n\
    \n```\nTODAY = pd.Timestamp('today').normalize()\nprint(TODAY)\nEND = TODAY +\
    \ datetime.timedelta(days=365)\nprint(END)\n2018-05-29 00:00:00\n2019-05-29 00:00:00\n\
    ```\n\n请随意调整 `TODAY`（起始）和 `END` 变量以满足你的需求。^(²²)\n\n请务必记得对所有内容使用 `.normalize()`！否则，当你跟着所有示例操作时，你会碰得头破血流。\n\
    \n在定义好起始和结束日期后，我们可以用 pandas 创建一个空的日历对象，它利用由 `date_range` 函数创建的 `DatetimeIndex`。\n\
    \n```\ncalendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))\n```\n\
