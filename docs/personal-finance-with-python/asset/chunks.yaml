    \n# YAML\n\n尽管目前为止一切顺利，但向预算中添加新的支出/收入项仍是一个相当繁琐的过程。我们需要先生成 `DataFrame` 对象，然后拼接到主\
    \ `calendar` 对象上，最后更新总额。如果能一次性定义所有预算项目，并且只计算一次总额，那就太好了。\n\nYAML 来救场了！YAML 是一种类似于\
    \ JSON 但更具人类可读性的文件格式。我们可以将所有预算项目整理到一个 YAML 文件中，像这样：\n\n> **注意：** `PyYAML` 应该随\
    \ Anaconda 一起安装了。如果没有，请尝试以下命令：`!pip install pyyaml`\n\n```\nimport yaml\nbudget\
    \ = yaml.load('''\nbank:\n  frequency: today\n  amount: 2000\nincome:\n  frequency:\
    \ every 2 weeks on Friday\n  amount: 1000\nrent:\n  frequency: every month\n \
    \ amount: -1500\nfun:\n  frequency: every week on Friday and Saturday\n  amount:\
    \ -40\n''')\n```\n\n运行 `yaml.load` 后，这会将所有内容转换成 Python 的 `dict`。\n\n```\nbudget\n\
    {'bank': {'amount': 2000, 'frequency': 'today'},\n 'fun': {'amount': -40, 'frequency':\
    \ 'every week on Friday and Saturday'},\n 'income': {'amount': 1000, 'frequency':\
    \ 'every 2 weeks on Friday'},\n 'rent': {'amount': -1500, 'frequency': 'every\
    \ month'}}\n```\n\n将预算放入字典后，我们现在可以遍历所有键（`k`）和值（`v`），获取每个 `v` 对应的频率和金额，创建一个 `DataFrame`\
    \ 对象，并将其拼接到主 `calendar` 对象上。之后，我们就可以计算总额，而无需在每一步后都更新它们了。\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figf_HTML.jpg](img/469615_1_En_5_Figf_HTML.jpg)\n\
    \n```\ncalendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))\nfor\
    \ k, v in budget.items():\n    frequency = v.get('frequency')\n    amount = v.get('amount')\n\
    \    dates = get_dates(frequency)\n    i = pd.DataFrame(\n        data={k: amount},\n\
    \        index=pd.DatetimeIndex(pd.Series(dates))\n    )\n    calendar = pd.concat([calendar,\
    \ i], axis=1).fillna(0)\ncalendar['total'] = calendar.sum(axis=1)\ncalendar['cum_total']\
    \ = calendar['total'].cumsum()\nplot_budget(calendar)\n```\n\n# 函数化\n\n让我们快速将预算逻辑函数化，以便测试更多场景。\n\
    \n```\ndef build_calendar(budget):\n    calendar = pd.DataFrame(index=pd.date_range(start=TODAY,\
    \ end=END))\n    for k, v in budget.items():\n        frequency = v.get('frequency')\n\
    \        amount = v.get('amount')\n        dates = get_dates(frequency)\n    \
    \    i = pd.DataFrame(\n            data={k: amount},\n            index=pd.DatetimeIndex(pd.Series(dates))\n\
    \        )\n        calendar = pd.concat([calendar, i], axis=1).fillna(0)\n  \
    \  calendar['total'] = calendar.sum(axis=1)\n    calendar['cum_total'] = calendar['total'].cumsum()\n\
    \    return calendar\n```\n\n# 度假 II\n\n虽然我们可能无法在七月负担得起哥伦比亚的 $2,500，但如果我们在八月去哈利法克斯，花费\
    \ $1,000 呢？\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figg_HTML.jpg](img/469615_1_En_5_Figg_HTML.jpg)\n\
    \n```\nbudget = yaml.load('''\nbank:\n  frequency: today\n  amount: 2000\nincome:\n\
    \  frequency: every 2 weeks on Friday\n  amount: 1000\nrent:\n  frequency: every\
    \ month\n  amount: -1500\nfun:\n  frequency: every week on Friday and Saturday\n\
    \  amount: -40\nvacation:\n  frequency: 2018-08-01\n  amount: -1000\n''')\ncalendar\
    \ = build_calendar(budget)\nplot_budget(calendar)\n```\n\n看起来不错！而且，我们似乎甚至还能攒下一些钱以备不时之需。让我们草拟一下，看看从“八月起的每个星期一”向储蓄账户存入\
    \ `$50` 会是什么样子。\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figh_HTML.jpg](img/469615_1_En_5_Figh_HTML.jpg)\n\
    \n```\nbudget = yaml.load('''\nbank:\n  frequency: today\n  amount: 2000\nincome:\n\
    \  frequency: every 2 weeks on Friday\n  amount: 1000\nrent:\n  frequency: every\
    \ month\n  amount: -1500\nfun:\n  frequency: every week on Friday and Saturday\n\
    \  amount: -40\nvacation:\n  frequency: 2018-08-01\n  amount: -1000\nsavings:\n\
    \  frequency: every Monday starting in August\n  amount: -50\n''')\ncalendar =\
    \ build_calendar(budget)\nplot_budget(calendar)\n```\n\n# 加载 YAML\n\n我们一直将预算定义为内联\
    \ YAML。如果你想将输入与代码分开（这是一个好主意），我们可以稍微调整工作流程来适应。\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figi_HTML.jpg](img/469615_1_En_5_Figi_HTML.jpg)\n\
    \n```\nwith open('data/budget.yaml', 'r') as f:\n    inputs = yaml.load(f)\ncalendar\
    \ = build_calendar(budget)\nplot_budget(calendar)\n```\n\n使用 `with` 块来打开和关闭 `.yaml`\
    \ 文件，实际上是我们唯一需要做的调整！\n\n# 结论\n\n希望你享受本章的学习。我在编写本章时也乐趣无穷。但有一点需要注意：虽然这个预算工具功能强大，但如果你决定使用它，不要过分沉迷。每个季度更新一次你的\
