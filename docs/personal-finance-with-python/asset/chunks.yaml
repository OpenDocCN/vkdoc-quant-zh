    ```

    balance = loan

    for i in range(1, term + 1):

    interest = round(rate/12 * balance, 2)

    principal = payment - interest

    balance = balance - principal

    df = df.append(

    pd.DataFrame({

    ''month'': [i],

    ''payment'': [payment],

    ''interest'': [interest],

    ''principal'': [principal],

