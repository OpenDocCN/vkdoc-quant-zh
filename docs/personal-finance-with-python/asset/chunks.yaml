    80  2017-12-28   21.99

    81  2018-01-07   17.99

    82  2018-01-31  158.19

    ```


    Rolling the values into a running total can be accomplished with the following:


    ```python

    purchases[''cumsum''] = purchases[''amount''].cumsum()

    print(purchases.tail())

    date   amount   cumsum

    78  2017-12-24    62.53  4906.19

    79  2017-12-27    43.99  4950.18

    80  2017-12-28    21.99  4972.17

    81  2018-01-07    17.99  4990.16

    82  2018-01-31   158.19  5148.35

    ```


    We can now see that I’ve spent a grand total of $5,148.35 on Amazon since 2012.
    Crazy!


    # Forecast


    To forecast with Prophet, we need to massage the `purchases` DataFrame to conform
    to a specific input structure. Prophet inputs are always a DataFrame with two
    columns: `ds` and `y`. The `ds` (datestamp) column must contain a date, and the
    `y` column must be numeric and represents the measurement we want to forecast.


    ```python

    purchases = purchases[[''date'', ''cumsum'']]

    purchases.columns = [''ds'', ''y'']

    print(purchases.head())

    ds       y

    0  2012-07-25   82.55

    1  2012-12-10  143.56

    2  2013-02-19  155.10

    3  2013-02-24  221.77

    4  2013-04-20  229.76

    ```


    Let’s import Prophet.


    ```python

    from fbprophet import Prophet

    ```


    Instantiate an instance of the `Prophet` class and fit it into the purchases data.


    ```python

    m = Prophet(daily_seasonality=False)

    m.fit(purchases)

    ```


    To forecast values one year into the future, we need to use the `.make_future_dataframe`
    method with the `periods` argument set to 365.


    ```python

    future = m.make_future_dataframe(periods=365)

    print(future.tail())

    ds

    443 2019-01-27

    444 2019-01-28

    445 2019-01-29

    446 2019-01-30

    447 2019-01-31

    ```


    Predicting my total spending on Amazon through 2018 and into 2019 is now dead
    simple. We just have to call the `predict` method on top of the `future` DataFrame
    that we created earlier.


    ```python

    forecast = m.predict(future)

    ```


    Let’s inspect the `forecast` object:


    |    | `ds`       | `yhat`       | `yhat_lower`  | `yhat_upper`  |

    |----|------------|--------------|---------------|---------------|

    | 443| 2019-01-27 | 7914.330291  | 7656.482987   | 8137.708873   |

    | 444| 2019-01-28 | 7891.583392  | 7633.735995   | 8129.905842   |

    | 445| 2019-01-29 | 7875.415396  | 7619.920169   | 8102.319783   |

    | 446| 2019-01-30 | 7924.375719  | 7667.813754   | 8148.685988   |

    | 447| 2019-01-31 | 7985.795633  | 7740.228707   | 8224.416333   |


    ```python

    forecast[[''ds'', ''yhat'', ''yhat_lower'', ''yhat_upper'']].tail()

    ```


    We can see that I am meant to spend a cumulative total of $7,985 (`yhat`) on Amazon.
    But now that I know that, I’m keen to ratchet back my spending!


    # Visualize


    Prophet comes packaged with a really great `plot` convenience method. Running
    it on top of the `m` object, we can get a better sense of the trend.


    ![../images/469615_1_En_7_Chapter/469615_1_En_7_Figa_HTML.jpg](images/469615_1_En_7_Chapter/469615_1_En_7_Figa_HTML.jpg)


    ```python

    %matplotlib inline

    m.plot(forecast)

    ```


    The library also includes a `plot_components` method that prints panels for trend,
    weekly, and yearly seasonalities if present.


    ![../images/469615_1_En_7_Chapter/469615_1_En_7_Figb_HTML.jpg](images/469615_1_En_7_Chapter/469615_1_En_7_Figb_HTML.jpg)


    ```python

    m.plot_components(forecast)

    ```


    Based on these panels, we can see that I spend a lot on Amazon in June and on
    Thursdays and that ever since I got Prime 2015 my spending has been growing significantly!


    # Conclusion


    If you think that using my own personal spending data is a bit silly, you’re 100
    percent right. Honestly, I could have borrowed a more “professional” dataset from
    somewhere else, but where’s the fun in that?


    Like I said, this chapter was mostly meant to be a bonus. But in all seriousness,
    I hope you can see that learning pandas pays incredible dividends because it is
    the industry standard for managing and working with data in Python.


    If you get good at pandas (and you should be by now!), you can extend that knowledge
    into some pretty interesting areas, such as time-series forecasting.


