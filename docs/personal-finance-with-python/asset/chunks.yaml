    # 3. Convert


    > All this foreign money I can’t count what I’m making.

    >

    > —Yung Lean


    You probably didn’t notice, but all the values in the previous chapter were in
    Canadian dollars (CAD). Everything was in CAD because I’m from Canada.


    Confusing and annoying, right? Like what even is a Canadian dollar, and what in
    Drake’s name is it worth? Alright, I shouldn’t be that patronizing; you probably
    have a decent idea about the value of a dollar in Canada as it’s closely coupled
    with a United States dollar (USD).


    But we should be precise. It’s not enough to say that CAD is just kind of like
    USD! Let’s actually figure out the exact exchange rate.


    ![../images/469615_1_En_3_Chapter/469615_1_En_3_Figa_HTML.jpg](images/469615_1_En_3_Chapter/469615_1_En_3_Figa_HTML.jpg)


    Although Googling for the answer is totally legit, there’s no fun in that! And
    if we have a couple hundred values and need to convert them to handful of different
    currencies, Google might not be the best solution.


    Faced with a repetitive problem, I’m quick to reach for Python.


    Unfortunately, though, when it comes to converting in Python, the story is a lot
    like IRR. The language *can* do it; it just can’t do it on its own.


    Python needs a little help—help in the form of an exchange rate API and the `requests`^([^(15)](#fn15))
    library.


    You can install `requests` by executing the following:


    ```

    !pip install requests

    ```


    ## openexchangerates.org


    If and when I need to convert a bunch of values, I like to use the Open Exchange
    Rates API.


    - It’s easy to use.

    - It’s updated hourly for more than 200 currencies.

    - It’s free (for up to 1,000 requests per month).


    To follow along, sign up and register^([^(16)](#fn16)) for a free API key.


    ![../images/469615_1_En_3_Chapter/469615_1_En_3_Figb_HTML.jpg](images/469615_1_En_3_Chapter/469615_1_En_3_Figb_HTML.jpg)'
