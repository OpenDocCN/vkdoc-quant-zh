    If `total` is in Excel column `D`, then applying the formula `=IRR(D0:D4)` will
    get us something close to 13 percent. However, `=IRR()` is a bit clunky and inflexible.
    The formula assumes that our inflows and outflows occur on a regular basis.


    If our mining rig instead generates income that flows like this:


