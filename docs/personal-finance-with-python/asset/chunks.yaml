    ## YAML


    Although it’s worked so far, adding a new outflow/inflow to our budget is a bit
    of an arduous process. We have to first generate the DataFrame object, stitch
    it onto our main `calendar` object, and then update the totals. It would be nice
    to define our budget items all at once and calculate the totals just once.


    YAML to the rescue! YAML is a file format that’s a bit like JSON but is slightly
    more human-readable. We can take all of our budget items and stuff it into a YAML
    file like this:


    ### Note


    PyYAML should have been installed with Anaconda. If not, try the following:!pip
    install pyyaml


    ```

    import yaml

    budget = yaml.load(''''''

    bank:

    frequency: today

    amount: 2000

    income:

    frequency: every 2 weeks on Friday

    amount: 1000

    rent:

    frequency: every month

    amount: -1500

    fun:

    frequency: every week on Friday and Saturday

    amount: -40

    '''''')

    ```


    After running `yaml.load`, this just turns everything into a Python `dict`.


    ```

    budget

    {''bank'': {''amount'': 2000, ''frequency'': ''today''},

    ''fun'': {''amount'': -40, ''frequency'': ''every week on Friday and Saturday''},

    ''income'': {''amount'': 1000, ''frequency'': ''every 2 weeks on Friday''},

    ''rent'': {''amount'': -1500, ''frequency'': ''every month''}}

    ```


    With our budget in a dictionary, we can now iterate through all of the keys (`k`)
    and values (`v`), get the frequency and amounts attached to each `v`, create a
    DataFrame object, and concatenate it to the main `calendar` object. After this
    point we can compute the totals without having to update them after each step.


    ![../images/469615_1_En_5_Chapter/469615_1_En_5_Figf_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figf_HTML.jpg)


    ```

    calendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))

    for k, v in budget.items():

    frequency = v.get(''frequency'')

    amount = v.get(''amount'')

    dates = get_dates(frequency)

    i = pd.DataFrame(

    data={k: amount},

    index=pd.DatetimeIndex(pd.Series(dates))

    )

    calendar = pd.concat([calendar, i], axis=1).fillna(0)

    calendar[''total''] = calendar.sum(axis=1)

    calendar[''cum_total''] = calendar[''total''].cumsum()

    plot_budget(calendar)

    ```


    ## Functionize


    Let’s quickly functionize our budget logic so that we might test a couple more
    scenarios.


    ```

    def build_calendar(budget):

    calendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))

    for k, v in budget.items():

    frequency = v.get(''frequency'')

    amount = v.get(''amount'')

    dates = get_dates(frequency)

    i = pd.DataFrame(

    data={k: amount},

    index=pd.DatetimeIndex(pd.Series(dates))

    )

    calendar = pd.concat([calendar, i], axis=1).fillna(0)

    calendar[''total''] = calendar.sum(axis=1)

    calendar[''cum_total''] = calendar[''total''].cumsum()

    return calendar

    ```


    ## Vacation II


    Although we might not be able to stomach $2,500 in Colombia in July, what if we
    did Halifax in August for $1,000?


    ![../images/469615_1_En_5_Chapter/469615_1_En_5_Figg_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figg_HTML.jpg)


    ```

    budget = yaml.load(''''''

    bank:

    frequency: today

    amount: 2000

    income:

    frequency: every 2 weeks on Friday

    amount: 1000

    rent:

    frequency: every month

    amount: -1500

    fun:

    frequency: every week on Friday and Saturday

    amount: -40

    vacation:

    frequency: 2018-08-01

    amount: -1000

    '''''')

    calendar = build_calendar(budget)

    plot_budget(calendar)

    ```


    Looks good! And, it looks like we might even be able to stow away some money for
    a rainy day. Let’s sketch out what $50 to savings on “every Monday starting in
    August” would look like.


    ![../images/469615_1_En_5_Chapter/469615_1_En_5_Figh_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figh_HTML.jpg)


    ```

    budget = yaml.load(''''''

    bank:

    frequency: today

    amount: 2000

    income:

    frequency: every 2 weeks on Friday

    amount: 1000

    rent:

    frequency: every month

    amount: -1500

    fun:

    frequency: every week on Friday and Saturday

    amount: -40

    vacation:

    frequency: 2018-08-01

    amount: -1000

    savings:

    frequency: every Monday starting in August

    amount: -50

    '''''')

    calendar = build_calendar(budget)

    plot_budget(calendar)

    ```


    ## Loading YAML


    We have been defining our budget as inline YAML. If you want to keep your inputs
    separate from your code (which is a good idea), we can adjust our workflow ever
    so slightly to accommodate.


    ![../images/469615_1_En_5_Chapter/469615_1_En_5_Figi_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figi_HTML.jpg)


    ```

    with open(''data/budget.yaml'', ''r'') as f:

    inputs = yaml.load(f)

    calendar = build_calendar(budget)

    plot_budget(calendar)

    ```


    Using a `with` block to open and close the `.yaml` file is really the only adjustment
    that we have to make!


    ## Conclusion


    I hope you had fun with this chapter. I had a bunch of fun writing it. But a word
    of caution: although this budget tool can be incredibly powerful, if you do decide
    to use it, don’t be obsessive about it. Update your `.yaml` file every quarter
    to see where you’re at and where you’re headed. Otherwise, if you try to update
    it every day, you’re going to go crazy.


