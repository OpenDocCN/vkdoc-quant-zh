    > \n> ——Migos\n\n我个人对债务有抵触情绪。似乎很多千禧一代也是如此。尽管我试图避免债务，但我明白，如果（并且当）使用得当，债务可以是一个了不起的工具。只是……大多数人并没有正确使用它。\n\
