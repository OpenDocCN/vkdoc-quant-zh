- fmt: '# Anaconda


    The easiest way to get everything that you’ll need for this book is to install
    Anaconda.^([³](#fn3)) Just go to the Anaconda website and download the relevant
    distribution for your operating system.


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figa_HTML.jpg](images/469615_1_En_1_Chapter/469615_1_En_1_Figa_HTML.jpg)


    Anaconda works on Windows, macOS, and Linux. I run macOS, so I’m going to demo
    that install process.


    For those who are not on macOS, Anaconda has some excellent install documentation
    available online.^([⁴](#fn4))


    Once you’ve downloaded the distribution, open the installer and click through
    all the prompts.


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figb_HTML.jpg](images/469615_1_En_1_Chapter/469615_1_En_1_Figb_HTML.jpg)


    Anaconda will install an up-to-date Python 3.6 and above release, as well as a
    bunch of useful Python packages such as `pandas`, `numpy`,^([⁵](#fn5)) and `beautifulsoup`.^([⁶](#fn6))


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figc_HTML.jpg](images/469615_1_En_1_Chapter/469615_1_En_1_Figc_HTML.jpg)


    After installation, open Terminal—or your preferred command-line interface—and
    run all the bits after the `$` to make sure that Anaconda did its thing.


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figd_HTML.png](images/469615_1_En_1_Chapter/469615_1_En_1_Figd_HTML.png)


    If your Python is in `Users/<your name>/anaconda3/bin/python` and typing in `python`
    spits out something like `Python 3.6.4 |Anaconda`, then you’re almost ready to
    rock and roll. Just one more thing…


    ## nteract


    ### Note


    If you already know how to use Jupyter Notebooks, this step isn’t strictly necessary.
    However, nteract is pretty darn slick; you should give it a fair shake!


    To actually run Python code, you’ll need a Jupyter^([⁷](#fn7)) Notebook interface
    called nteract. While Jupyter is an open-source web application that allows you
    to create documents that contain live code (and was installed for you with Anaconda),
    nteract is a super user-friendly desktop-based skin for Jupyter. You can download
    nteract from the nteract.io website.^([⁸](#fn8))


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Fige_HTML.png](images/469615_1_En_1_Chapter/469615_1_En_1_Fige_HTML.png)


    Once it’s downloaded and installed, you can load a fresh Jupyter Notebook by clicking
    the nteract icon. You will be greeted with a screen that looks like this:


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figf_HTML.jpg](images/469615_1_En_1_Chapter/469615_1_En_1_Figf_HTML.jpg)


    With a blank slate, you can now run arbitrary Python code inside empty cells,
    the results of which will be printed just below the input cell.


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figg_HTML.jpg](images/469615_1_En_1_Chapter/469615_1_En_1_Figg_HTML.jpg)


    To execute code inside a cell, just hit `Shift+Enter`. To insert a new cell, just
    select Edit ➤ New Code Cell or use the shortcut `Cmd+Shift+N`. You can find a
    list of all the macOS (and Windows) shortcuts in the nteract `USER_GUIDE.md`.^([⁹](#fn9))


    Quickly make sure that imports are working for you by running the following:


    ```

    import pandas as pd

    ```


    If everything is in working order, nothing should’ve happened!


    However, if after executing `import pandas as pd` you get something like this:


    ```

    ModuleNotFoundError           Traceback (most recent call last)

    in ()

    ----> 1 import pandas as pd

    ModuleNotFoundError: No module named ''pandas''

    ```


    then reinstall Anaconda and make sure your `PATH` is properly configured.^([^(10)](#fn10))


    ### pip install


    Sometimes you’ll hit a legitimate `ModuleNotFoundError: No module named [PACKAGE
    NAME]` error. This happens when a module/library/package (I’ll use these terms
    interchangeably) isn’t yet installed on your machine. Often these errors can be
    remedied by running the following in a Notebook cell, or without the leading `!`
    inside Terminal:


    ```

    !pip install [PACKAGE NAME]

    ```


    I’ll try my best to call out these installs when you need them. But if you hit
    a `ModuleNotFoundError`, I trust that you’ll know what to do (Google is your friend)!


    ## Data


    Some examples in the following chapters will require data that I’ve curated specifically
    for this book. You can download these data files by clicking the **Download Source
    Code** button located at [`www.apress.com/9781484238011`](http://www.apress.com/9781484238011),
    or by navigating to my personal Github repository, located at [`https://github.com/maxhumber/pfwp`](https://github.com/maxhumber/pfwp).


    # 2. Profit


    > You know, you got to spend money to make money.

    >

    > —Chief Keef


    A couple of weeks ago my grandma asked me if she should put some money into Bitcoin.
    I didn’t know what to tell her. But I knew that in a book about finance I would
    have to at least give Bitcoin and cryptocurrencies at least a little bit of lip
    service.


    For the uninitiated, cryptocurrencies like Bitcoin (and Ethereum, Dogecoin, and
    Zcash) are digital assets that are designed to function as a medium of exchange
    and that use cryptography to secure transactions, to control the creation of new
    money, and to verify asset transfer.


    Because I think it’s hilarious, I’m going to use Dogecoin^([^(11)](#fn11)) as
    the glue for the rest of this chapter. But honestly, these ideas extend beyond
    Dogecoin (and crypto for that matter). They apply whenever you have to spend money
    to make money.


    So, if you’re not a fan of crypto or Dogecoin (I certainly don’t blame you), bear
    with me. Dogecoin just seemed like a lot more fun to talk about than something
    else random, like a lemonade stand.


    ## Mining


    ![../images/469615_1_En_2_Chapter/469615_1_En_2_Figa_HTML.jpg](images/469615_1_En_2_Chapter/469615_1_En_2_Figa_HTML.jpg)


    If you’re interested in Dogecoin and want to own some, you can do one of the following:


    * Buy it

    * Generate it through a process called *mining*


    Buying Dogecoin is straightforward. But mining is more interesting. To grossly
    oversimplify things, to mining Dogecoin requires the installation of a program,
    on your computer that uses your hardware to solve computationally expensive math
    problems.


    Solve a problem. Get a Dogecoin. Easy-peasy.


    While you can run mining applications on your laptop, those serious about mining—for
    Dogecoin or otherwise—opt to run these sorts of applications on specialized rigs.
    A decent rig can be incredibly expensive, though. A mining rig requires specialized
    graphical processing units (GPUs), a good motherboard, a lot of RAM, a decent
    CPU, a case, some fans, and a bunch of other components. Casually dropping $3,000
    on parts for a mining setup is pretty standard these days.


    For the purposes of this chapter, let’s pretend that we front $3,000 for the necessary
    components.


    If we mine $6,000 on top of our initial investment, some quick math will tell
    us that our realized profit is $3,000 and our return on investment (ROI) is as
    follows:


    ```

    r = 6000

    i = 3000

    print(f''{(r - i) / i * 100}%'')

    100.0%

    ```


    ## ROI


    Dope, right? Nope, because ROI is a super-misleading measurement. It’s misleading
    because it doesn’t factor in how long it took to make back our money.


    Perhaps we mined $6,000 in six months. Or, maybe it took us six years. Whether
    months or years, the calculation and the answer are the same. Both yield a 100
    percent ROI.'
