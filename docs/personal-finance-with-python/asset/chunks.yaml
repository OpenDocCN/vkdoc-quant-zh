    is iCalendar RFC^([^(25)](#fn25)) compliant. The corresponding rrule will enable
    us to do a bunch of cool things such as checking for the first occurrence before
    or after an arbitrary date, calculating how many times an event will occur in
    a given timeframe, or, for our purposes, generating a schedule of dates.


    To handle rrules, we’ll need one more import.


    ```

    from dateutil import rrule

    ```


    Passing the `RFC` rrule string from our `RecurrentEvent` to `rrule.rrulestr` will
    create the rrule object that we need.


    ```

