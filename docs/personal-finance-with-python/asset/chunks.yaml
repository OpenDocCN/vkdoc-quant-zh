    ## Rebalance


    To test our rebalancing logic, we’ll back-test across 2017 and execute orders
    on a quarterly-end frequency by using the `Q` offset alias from pandas.


    ```

    dates = pd.date_range(''2017-01-01'', ''2017-12-31'', freq="Q").tolist()

    for d in dates:

    prices = historical_prices.loc[d]

    update_prices(portfolio, prices)

