    # Anaconda


    获取本书所需全部内容的最简单方法是安装 Anaconda。^(³) 只需访问 Anaconda 官网，下载适用于你操作系统的相应发行版即可。


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figa_HTML.jpg](img/469615_1_En_1_Figa_HTML.jpg)


    Anaconda 适用于 Windows、macOS 和 Linux。我使用的是 macOS，因此将以此为例演示安装过程。


    如果你使用的不是 macOS，Anaconda 官网上有非常优秀的安装文档可供参考。^(⁴)


    下载发行版后，打开安装程序，按提示点击下一步即可。


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figb_HTML.jpg](img/469615_1_En_1_Figb_HTML.jpg)


    Anaconda 会安装最新的 Python 3.6 及以上版本，以及一系列实用的 Python 包，例如 `pandas`、`numpy`^(⁵) 和 `beautifulsoup`。^(⁶)


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figc_HTML.jpg](img/469615_1_En_1_Figc_HTML.jpg)


    安装完成后，打开终端（Terminal）——或你偏好的命令行界面——并运行 `$` 之后的所有命令，以确保 Anaconda 安装成功。


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figd_HTML.png](img/469615_1_En_1_Figd_HTML.png)


    如果你的 Python 位于 `Users/<你的用户名>/anaconda3/bin/python` 路径下，并且输入 `python` 后显示类似 `Python
    3.6.4 |Anaconda` 的信息，那么你已经万事俱备，只欠最后一步了……


    ## nteract


    ### 注意


    如果你已经会使用 Jupyter Notebooks，这一步并非必须。不过，nteract 界面相当酷炫，值得一试！


    要实际运行 Python 代码，你需要一个名为 nteract 的 Jupyter^(⁷) Notebook 界面。Jupyter 是一个开源的 Web 应用程序，允许你创建包含实时代码的文档（并已随
    Anaconda 一同安装），而 nteract 则是 Jupyter 的一个基于桌面的超级用户友好型界面。你可以从 nteract.io 网站下载 nteract。^(⁸)


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Fige_HTML.png](img/469615_1_En_1_Fige_HTML.png)


    下载并安装后，点击 nteract 图标即可加载一个新的 Jupyter Notebook。你会看到一个类似这样的界面：


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figf_HTML.jpg](img/469615_1_En_1_Figf_HTML.jpg)


    现在，你拥有了一块空白画布，可以在空单元格中运行任意的 Python 代码，运行结果将直接显示在输入单元格下方。


    ![../images/469615_1_En_1_Chapter/469615_1_En_1_Figg_HTML.jpg](img/469615_1_En_1_Figg_HTML.jpg)


    要执行单元格内的代码，只需按 `Shift+Enter`。要插入新单元格，选择“编辑 ➤ 新代码单元格”或使用快捷键 `Cmd+Shift+N`。你可以在
    nteract 的 `USER_GUIDE.md` 中找到所有 macOS（及 Windows）快捷键的完整列表。^(⁹)


    快速确认导入功能是否正常，请运行以下代码：


    ```

    import pandas as pd

    ```


    如果一切正常，应该什么都不会发生！


    但是，如果执行 `import pandas as pd` 后出现类似这样的错误：


    ```

    ModuleNotFoundError           Traceback (most recent call last)

    in ()

    ----> 1 import pandas as pd

    ModuleNotFoundError: No module named ''pandas''

    ```


    那么请重新安装 Anaconda，并确保你的 `PATH` 环境变量已正确配置。^(¹⁰)


    ### pip install


    有时你会遇到一个合理的 `ModuleNotFoundError: No module named [包名]` 错误。这是因为你的机器上尚未安装该模块/库/包（我会互换使用这些术语）。通常可以通过在
    Notebook 单元格中运行以下命令（或在终端中运行去除前导 `!` 的相同命令）来解决这些错误：


    ```

    !pip install [包名]

    ```


    我会尽力在需要时提醒你进行这些安装。但如果你遇到了 `ModuleNotFoundError`，我相信你知道该怎么做（谷歌是你的好朋友）！


    ## 数据


    后续章节中的一些示例将用到我为本书专门整理的数据。你可以点击位于 [`www.apress.com/9781484238011`](http://www.apress.com/9781484238011)
    的 **下载源代码** 按钮，或访问我位于 [`https://github.com/maxhumber/pfwp`](https://github.com/maxhumber/pfwp)
    的个人 Github 仓库来下载这些数据文件。


    # 2. 利润


    > 你知道，你得花钱才能赚钱。

    >

    > ——Chief Keef


    几周前，我奶奶问我是否应该投点钱到比特币里。我不知道该怎么回答她。但我知道，在一本关于金融的书里，我至少得对比特币和加密货币稍作提及。


    对于不熟悉的人来说，像比特币（以及以太坊、狗狗币、Zcash）这样的加密货币是数字资产，旨在充当交易媒介，并利用密码学来保障交易安全、控制新货币的创造以及验证资产转移。


    因为我觉得这很有趣，我打算用狗狗币^(¹¹)作为贯穿本章剩余部分的线索。但老实说，这些概念并不仅限于狗狗币（甚至不限于加密货币）。它们适用于任何你需要花钱才能赚钱的场景。


    所以，如果你不喜欢加密货币或狗狗币（我绝不怪你），请耐心听我讲。狗狗币似乎比谈论其他随机的东西（比如一个柠檬水摊位）有趣得多。


    ## 挖矿


    ![../images/469615_1_En_2_Chapter/469615_1_En_2_Figa_HTML.jpg](img/469615_1_En_2_Figa_HTML.jpg)


    如果你对狗狗币感兴趣并想拥有一些，可以通过以下方式之一：


    * 购买它

    * 通过称为*挖矿*的过程生成它


    购买狗狗币很简单。但挖矿更有趣。简单来说（非常粗略地简化），挖掘狗狗币需要在你的计算机上安装一个程序，该程序利用你的硬件来解决计算量极大的数学问题。


    解决一个问题，获得一个狗狗币。就这么简单。


    虽然你可以在笔记本电脑上运行挖矿应用程序，但那些真正认真挖矿的人（无论是挖狗狗币还是其他币）会选择在专门的矿机上运行这类应用程序。不过，一台像样的矿机可能非常昂贵。一台矿机需要专门的图形处理单元（GPU）、一块好的主板、大容量内存、一个不错的
    CPU、一个机箱、一些风扇以及许多其他组件。如今，随便花个 3000 美元买一套挖矿设备配件已经很常见了。


    为了本章的目的，我们假设先期投入 3000 美元购买必要组件。


    如果我们在初始投资的基础上挖到了 6000 美元，简单计算一下就会知道，我们实现的利润是 3000 美元，我们的投资回报率（ROI）如下：


    ```

    r = 6000

    i = 3000

    print(f''{(r - i) / i * 100}%'')

    100.0%

    ```


    ## ROI


    很爽，对吧？不，因为 ROI 是一个非常具有误导性的衡量指标。它之所以有误导性，是因为它没有考虑我们收回资金所花费的时间。


    也许我们在六个月内挖到了 6000 美元。或者，也可能花了六年。无论是几个月还是几年，计算结果和答案都是一样的。两者都得出 100%的 ROI。

    '
- fmt: '## IRR


    The fact that ROI nets out to the same value for different time horizons should
    bug us (it bugs me). Time is money after all, right? And $3,000 today is worth
    more than $3,000 tomorrow, or the next year for that matter.


    On top of that, investing in something like a mining rig precludes us from investing
    in something else, like a lemonade stand. ROI doesn’t capture any of that.


    The internal rate of return (IRR), however, does. IRR is the discount rate at
    which the net present value of a potential investment is 0.


    Importantly, if your investment has an expected IRR of 5 percent but your cost
    of borrowing is 8 percent, you should not invest in the opportunity or venture.
    But when the numbers are reversed—that is to say that the IRR exceeds the cost
    of borrowing—you should invest!


    ### =IRR()


    At this point in our imaginary example we’re in for $3,000. But instead of doubling
    our money, let’s bring things ever so slightly back to Earth and pretend that
    our Dogecoin rig generates $1,000 in passive income each year over the next four
    years.


    |   | date       | income | expenses |

    | - | ---------- | ------ | -------- |

    | 0 | 2017-01-01 | 0      | -3000    |

    | 1 | 2018-01-01 | 1000   | 0        |

    | 2 | 2019-01-01 | 1000   | 0        |

    | 3 | 2020-01-01 | 1000   | 0        |

    | 4 | 2021-01-01 | 1000   | 0        |


    To calculate the IRR for this example, we can fire up Excel, total up the inflows
    and outflows, and use the built-in `=IRR()` formula to get what we need.


    |   | date       | income | expenses | total |

    | - | ---------- | ------ | -------- | ----- |

    | 0 | 2017-01-01 | 0      | -3000    | -3000 |

    | 1 | 2018-01-01 | 1000   | 0        | 1000  |

    | 2 | 2019-01-01 | 1000   | 0        | 1000  |

    | 3 | 2020-01-01 | 1000   | 0        | 1000  |

