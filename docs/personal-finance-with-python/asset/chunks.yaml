    ## English


    Cash flows are irregular. We might have expenses that occur on specific days or
    get paid on increasingly weird schedules. It would be nice to define these frequencies
    in raw English, instead of having to rely on pandas offset aliases.


    Fortunately, there’s a wonderful library called Recurrent^([^(24)](#fn24)) that
    can do most of the heavy lifting parsing for us.


    For instance, we can define an arbitrary frequency in English.


    ```

    frequency = ''every week until July 10th'' # try a couple of different month-day
    combinations!

    ```


    We then import the `RecurringEvent` class from `recurrent`.


    ```

