    At this point our portfolio is instantiated, but there are still a lot of gaps
    in the data structure. Gaps are caused by a lack of prices.


    ```

    print(portfolio)

    date price target  allocation  shares  market_value

    AMZN  NaN   NaN    0.4           0       0             0

    CSCO  NaN   NaN    0.3           0       0             0

    GE    NaN   NaN    0.3           0       0             0

    CASH  NaN   NaN      0           0   10000             0

    ```


    To fill in these gaps, let’s build a function with which we can update prices.
    Although we could theoretically use the `.at` method from before to build this
    function, the `.update` method is a little more legible here.


    ```

    def update_prices(portfolio, prices):

    prices[''CASH''] = 1

    portfolio.update(pd.DataFrame({''price'': prices}))

    portfolio.date = prices.name

    portfolio.market_value = portfolio.shares * portfolio.price

    ```


    To use `update_prices`, we pass the function our portfolio and a pandas `Series`
    object that contains prices for a specific day.


    ```

    # fake for right now

    prices = pd.Series(

    name=''2018-01-01'',

    data={''AMZN'': 945.21,''CSCO'': 30.52, ''GE'': 29.27}

    )

    print(prices)

    update_prices(portfolio, prices)

    AMZN    945.21

    CSCO     30.52

    GE       29.27

    Name: 2018-01-01, dtype: float64

    ```


    The neat thing about this function is that it updates the values in place. Running
    `print(portfolio)` in a Jupyter cell, we can see how the function changed the
    object.


    ```

    print(portfolio)

    date   price target  allocation  shares market_value

    AMZN 2018-01-01  945.21    0.4           0       0            0

    CSCO 2018-01-01   30.52    0.3           0       0            0

    GE   2018-01-01   29.27    0.3           0       0            0

    CASH 2018-01-01       1      0           0   10000        10000

    ```


    Right now all the `market_value`s are set to 0 because we haven’t executed any
    buy orders yet.


    ## Orders


    With our portfolio object complete, let’s build a `get_order` function that will
    calculate the buy and sell orders we need to execute to achieve balance against
    target allocations at arbitrary moments in time.


    ```

    def get_order(portfolio):

    total_value = portfolio.market_value.sum()

    order = (

    (total_value * portfolio.target // portfolio.price)

    - portfolio.shares

    ).drop(''CASH'')

    return order

    ```


    The `get_order` function is fairly straightforward; the only interesting part
    is this thing: `//`.


    The `//` is the Python floor division operator. `get_order` uses floor division
    because we can’t buy fractional shares on the stock market!


    If we want to buy AMZN, we have to buy whole shares.


    ```

    total_value = 10000

    target = 0.4

    price = 945.21

    AMZN = (total_value * target // price) - 0

    print(AMZN)

    4.0

    ```


    Without floor division, the `get_order` function would tell us to buy fractional
    units.


    ```

    (total_value * target / price) - 0

    4.231863818622316

    ```


    Using `get_order` is as simple as passing the function our portfolio object as
    the sole argument.


    ```

    order = get_order(portfolio)

    print(order)

    AMZN      4

    CSCO     98

    GE      102

    dtype: object

    ```


    Importantly, `get_order` doesn’t actually do anything to the portfolio object.
    This because we might want to maintain control over whether to place the order
    and make the necessary trades to rebalance, or not.


    ## Deposit


    Because we’re disciplined investors (*wink wink*), let’s add a `deposit` function
    into the mix. Most of this should be self-explanatory.


    ```

    def deposit(portfolio, amount):

    portfolio.at[''CASH'', ''shares''] += amount

    portfolio.at[''CASH'', ''market_value''] = portfolio.at[''CASH'', ''shares'']

    deposit(portfolio, 1000)

    ```


    Running `get_order` on top of `portfolio` now yields the following:


    ```

    order = get_order(portfolio)

    print(order)

    AMZN      4

    CSCO    108

    GE      112

    dtype: object

    ```


    That’s pretty much it! With the `instantiate_portfolio`, `update_prices`, `get_order`,
    and `deposit` functions built, we have all the ingredients we need to rebalance
    any basket of securities.


    It’s a bit anticlimatic, isn’t it?


    Let’s keep going and put all our functions into action. While we’re at it, we
    might as well use real stock quotes, instead of faking it like when we tested
    `update_prices`.


    ## Simulate


    Because our `get_order` function doesn’t alter the portfolio object, let’s implement
    a function that simulates the execution of buy/sell orders.


    ```

    def simulate_process_order(portfolio, order):

    starting_cash = portfolio.at[''CASH'', ''shares'']

    cash_adjustment = np.sum(order * portfolio.price)

    portfolio.shares += order

    portfolio.market_value = portfolio.shares * portfolio.price

    portfolio.at[''CASH'', ''shares''] = starting_cash - cash_adjustment

    portfolio.market_value = portfolio.shares * portfolio.price

    portfolio.allocation = (

    portfolio.market_value / portfolio.market_value.sum()

    )

    ```


    The `simulate_process_order` function takes the portfolio object and a pandas
    series object to buy and sell securities.


    ```

