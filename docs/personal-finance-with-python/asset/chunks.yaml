    `get_order`函数相当直接；唯一有趣的部分是`//`这个运算符。


    `//`是 Python 的向下整除运算符。`get_order`使用向下整除是因为我们无法在股票市场上购买零碎股票！


    如果我们想购买 AMZN 股票，必须购买整股。


