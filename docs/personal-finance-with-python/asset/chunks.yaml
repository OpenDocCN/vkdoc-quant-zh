    \ Imperial (5.75 percent, 14 months), Orange National (3.99 percent, 20 months),\
    \ and Banana Dominion (8.99 percent, 8 months) loans without repeating ourselves.\n\
    \n```\nloan = 3000\npineapple = am(loan, 0.0575, 14)\norange = am(loan, 0.0399,\
    \ 20)\nbanana = am(loan, 0.0889, 8)\n```\n\nPeering into one of the schedules,\
    \ we can see everything working as expected.\n\n| month | payment | interest |\
    \ principal | balance |\n| --- | --- | --- | --- | --- |\n| 0 | 0 | NaN | NaN\
    \ | NaN | 3000 |\n| 1 | 1 | 155.29 | 9.97 | 145.32 | 2854.68 |\n| 2 | 2 | 155.29\
    \ | 9.49 | 145.8 | 2708.88 |\n| 3 | 3 | 155.29 | 9.01 | 146.28 | 2562.6 |\n| 4\
    \ | 4 | 155.29 | 8.52 | 146.77 | 2415.83 |\n| 5 | 5 | 155.29 | 8.03 | 147.26 |\
    \ 2268.57 |\n| 6 | 6 | 155.29 | 7.54 | 147.75 | 2120.82 |\n| 7 | 7 | 155.29 |\
    \ 7.05 | 148.24 | 1972.58 |\n| 8 | 8 | 155.29 | 6.56 | 148.73 | 1823.85 |\n| 9\
    \ | 9 | 155.29 | 6.06 | 149.23 | 1674.62 |\n| 10 | 10 | 155.29 | 5.57 | 149.72\
    \ | 1524.9 |\n| 11 | 11 | 155.29 | 5.07 | 150.22 | 1374.68 |\n| 12 | 12 | 155.29\
    \ | 4.57 | 150.72 | 1223.96 |\n| 13 | 13 | 155.29 | 4.07 | 151.22 | 1072.74 |\n\
    | 14 | 14 | 155.29 | 3.57 | 151.72 | 921.02 |\n| 15 | 15 | 155.29 | 3.06 | 152.23\
    \ | 768.79 |\n| 16 | 16 | 155.29 | 2.56 | 152.73 | 616.06 |\n| 17 | 17 | 155.29\
    \ | 2.05 | 153.24 | 462.82 |\n| 18 | 18 | 155.29 | 1.54 | 153.75 | 309.07 |\n\
    | 19 | 19 | 155.29 | 1.03 | 154.26 | 154.81 |\n| 20 | 20 | 155.29 | 0.51 | 154.78\
    \ | 0.03 |\n\n```\norange\n```\n\nBecause each object is an amortization schedule\
    \ inside of a pandas DataFrame, we can access the interest column like this:\n\
    \n```\nbanana['interest']\n0      NaN\n1    22.23\n2    19.52\n3    16.79\n4 \
    \   14.04\n5    11.28\n6     8.49\n7     5.68\n8     2.85\nName: interest, dtype:\
    \ object\n```\n\nWe sum everything up with a call to `.sum()`.\n\n```\nbanana['interest'].sum()\n\
    100.88\n```\n\nWe sum up the interest for each loan.\n\n```\nprint(banana['interest'].sum())\n\
    print(orange['interest'].sum())\nprint(pineapple['interest'].sum())\n100.88\n\
    105.82999999999997\n108.93999999999998\n```\n\nWe can see that the Banana Dominion\
    \ Bank loan is the best bang for our buck (if by bang we mean the least amount\
    \ of interest paid).\n\nHowever, it’s important to note that the monthly payment\
    \ for the Banana Dominion option is a lot more than the Orange National loan.\
    \ Because of this, we might decide that an extra $5, for what would ultimately\
    \ be less of a monthly burden, is worth it!\n\n## Conclusion\n\nI casually dropped\
    \ the idea that you should pre-allocate where possible and expected you to believe\
    \ me on faith. Never believe anyone without evidence!\n\nIf you want to see how\
    \ much quicker Loop B is against Loop A, you can run some `%%timeit` Jupyter magic\
    \ against the function.\n\n```\n%%timeit\nam(3000, 0.0575, 14)\n6.9 ms ± 877 μs\
    \ per loop (mean ± std. dev. of 7 runs, 100 loops each)\n```\n\nUnfortunately,\
    \ we never wrapped the logic for Loop A into a function. So, consider it homework!\
    \ Once you’ve functionized Loop A, you can run the same `%%timeit` magic on top\
    \ of it and see the speed difference for yourself.\n\nTry it with a few rows and\
    \ then with a whole bunch more. The speed differences become incredible as the\
    \ number of rows increases!\n\n# Budget\n\n> Going broke is not an option, always\
    \ on that cash flow.\n> \n> —A$AP Rocky\n\nI’ve been obsessed with budgeting for\
    \ as long as I can remember, first with pen and paper, then with Excel, then with\
    \ R, and now with Python.\n\nThere are some wonderful online tools that can help\
    \ you build a budget; however, I’ve always found them to be lacking. While most\
    \ budget apps are great for measuring monthly inflows and outflows, I haven’t\
    \ found them to be particularly great for scenario planning or for capturing the\
    \ holistic cash flow picture.\n\nWhen I build a budget, I want to know what my\
    \ bank balance will be at each moment in time so that I might allocate more money\
    \ to savings, spend less on booze, or plan when I can take a vacation.\n\nWhen\
    \ budgeting, it’s important to remember that cash flow is king. If at any moment\
    \ during the month your budget has you spending more money than you actually have,\
    \ it really doesn’t matter if everything balances at the end of the month. Everything\
    \ needs to balance every day.\n\n## Dates\n\nTo build a budget, we have to work\
    \ with dates. Unfortunately, working with dates is a bit of a nightmare in Python.\
    \ There are effectively six separate date/time formats in Python that are commonly\
    \ used, but making each format work in concert is tricky and requires some conversion.\n\
    \nHere’s a great “state of the union” picture posted on StackOverflow^([^(21)](#fn21))\
    \ in 2014 (sadly not much has changed in four years):\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figa_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figa_HTML.jpg)\n\
    \nA full discussion of date formatting is beyond the scope of this book; however,\
    \ I’m going to enforce two rules that will make our lives tremendously more easy\
    \ and allow us to sidestep most of the inherent problems in working with dates\
    \ in Python.\n\nHere are my two rules:\n\n* Coerce everything into a `Timestamp`.\n\
    * `.normalize` all the things.\n\n### datetime\n\nPython ships with `datetime`.\
    \ Consequently, we can create `datetime.datetime` objects and `datetime.date`\
    \ objects out of the box like this:\n\n```\nimport datetime\ndate_1 = datetime.datetime.now()\n\
    print(date_1)\nprint(date_1.__repr__())\nprint(type(date_1))\ndate_2 = datetime.date.today()\n\
    print(date_2)\nprint(date_2.__repr__())\nprint(type(date_2))\n2018-05-29 21:34:10.877373\n\
    datetime.datetime(2018, 5, 29, 21, 34, 10, 877373)\n2018-05-29\ndatetime.date(2018,\
    \ 5, 29)\n```\n\n`datetime.date` and `datetime.datetime` objects can also be created\
    \ manually by filling out each object according to the following pattern: `(year,\
    \ month, day, hour, minute, second, millisecond)`.\n\n```\ndatetime.datetime(1993,\
    \ 6, 7, 15, 16, 0)\ndatetime.datetime(1993, 6, 7, 15, 16)\n```\n\n## Timestamp\n\
    \npandas ships with the `Timestamp` type that largely behaves like a `datetime.datetime`\
    \ object but plays nice with DataFrames and DatetimeIndexes (both of which we’ll\
    \ leverage later in the chapter). Additionally, `Timestamp` comes packaged with\
    \ a couple of really neat features (namely, `.normalize`).\n\nTo convert from\
    \ a `datetime.datetime` or `datetime.date` object to a `Timestamp`, we can lean\
    \ on the `to_datetime` function or just wrap our object in a `Timestamp`. Both\
    \ ways are valid.\n\n```\nimport pandas as pd\nprint(pd.Timestamp(date_1))\nprint(pd.to_datetime(date_1))\n\
    2018-05-29 21:34:10.877373\n2018-05-29 21:34:10.877373\n```\n\nWhat’s more, we\
    \ can create `Timestamp`s from scratch by manually filling in the function arguments\
    \ much like we did for `datetime.datetime()`.\n\n```\ndate_3 = pd.Timestamp(1993,\
    \ 6, 7, 15, 16, 0)\ndate_3\nTimestamp('1993-06-07 15:16:00')\n```\n\n### .normalize\n\
    \nNormalizing in the context of datetimes means stripping all of the time information\
    \ and just leaving the date bits attached to the object. If everything is in a\
    \ `Timestamp`, this is trivial:\n\n```\nprint(date_1)\ndate_1 = pd.Timestamp(date_1)\n\
    print(date_1)\nprint(date_1.normalize())\n2018-05-29 21:34:10.877373\n2018-05-29\
    \ 21:34:10.877373\n2018-05-29 00:00:00\n```\n\nAs you can see, the `.normalize`\
    \ method sets the time metadata to 00:00:00, which will help us to glue things\
    \ together later."
