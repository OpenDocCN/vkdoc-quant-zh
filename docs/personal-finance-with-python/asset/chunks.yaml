- fmt: '# Prophet


    There are hundreds of open-source libraries for forecasting in Python. One that
    I really like is Prophet. According to the GitHub repo,^([^(35)](#fn35)) “Prophet
    is a procedure for forecasting time series data. It is based on an additive model
    where non-linear trends are fit with yearly and weekly seasonality, plus holidays.
    It works best with daily periodicity data with at least one year of historical
    data. Prophet is robust to missing data, shifts in the trend, and large outliers.”
    That’s all to say that if you give Prophet historical data, it will attempt to
    extrapolate into the future for you.


    Installing Prophet on your machine is a bit more involved, but the README^([^(36)](#fn36))
    is incredibly detailed. Install the library now before you continue with this
    chapter.


    # Purchases


    To demonstrate how Prophet works, we need some historical data. Given that this
    book concerns personal finance, I thought it would be fun to go ultra-personal
    and curate data on me.


    The `purchases.csv` file, which was included in the initial data download from
    Chapter [1](#469615_1_En_1_Chapter.xhtml), contains all of my Amazon purchases
    since 2012. It has 83 rows and 2 columns (`date` and `amount`).


    ### Note


    If you don’t care for my data (and you really shouldn’t!), just coerce your own
    values into the same structure, and you’ll be ready to rock.


    Load pandas and the purchases data.


    ```python

