- fmt: "# 6. Invest\n\n> Invest in your future, don’t dilute your finances.\n> \n\
    > —Kendrick Lamar\n\nI am not an authority on investing. So, I can’t (and won’t)\
    \ tell you which stocks you should pick or how you should structure your personal\
    \ investment portfolio. I can, however, give you an awesome mechanism for setting\
    \ up asset allocations and adhering to a routine of continuous rebalancing.\n\n\
    Rebalancing^([^(27)](#fn27)) your investment portfolio against target allocations\
    \ is a good idea because it keeps risk in check and forces you to remove the emotion\
    \ from your investment decisions.\n\nWhen your portfolio is up, it’s really hard\
    \ to sell, and when you take a hit, it’s just as hard to buy. A strategy of automated\
    \ or semi-automated rebalancing will force you to buy and sell even when your\
    \ emotions are trying to get the best of you.\n\nBut before we explore investing\
    \ and rebalancing with Python, here are a couple of words on trade-offs.\n\n##\
    \ Trade-Offs\n\nI had a hard time writing the technical parts for this chapter\
    \ because you can really go hard on all this stuff if you want to (and I encourage\
    \ you to!).\n\nInitially, I wrote everything so that it was encapsulated in a\
    \ Python class, then I refactored everything to work with SQLite, and then I refactored\
    \ it all again to simple functions powered by `pandas`.\n\nI ultimately settled\
    \ on `pandas` and functions because this is a `pandas` book and it kept with the\
    \ theme. Besides, functions are just way easier to read and use. `Pandas` might\
    \ not be the best choice for scaling things up to production.\n\nThere are real\
    \ trade-offs in programming. Often we have to choose between good enough and heavily\
    \ polished, with the latter often taking ten times the time and effort of the\
    \ former. Polished will get you coverage for all the edge cases, but good enough\
    \ will get you where you need to go fast.\n\nI’m all in for “good enough.”\n\n\
    ## Instantiate\n\nWith the preamble out of the way, let’s design a portfolio and\
    \ get investing! I’ve chosen three random stocks to get us started: Amazon (`AMZN`^([^(28)](#fn28))),\
    \ Cisco (`CSCO`^([^(29)](#fn29))), and General Electric (`GE`^([^(30)](#fn30))).\
    \ We’ll try to hold the securities in target allocations of 40 percent, 30 percent,\
    \ and 30 percent, respectively.\n\nTo maintain balance against our target allocations,\
    \ we will need to execute buy and sell trades after market movements, deposits,\
    \ and withdrawals.\n\nLet’s start by defining our target allocations as a dictionary.\n\
    \n```\ntargets = {\n'AMZN': 0.40, # Amazon\n'CSCO': 0.30, # Cisco\n'GE': 0.30\
    \ # GE\n}\n```\n\nTo instantiate a portfolio, we might build up a `DataFrame`\
    \ from scratch like this:\n\n```\nimport pandas as pd\nimport numpy as np\nportfolio\
    \ = pd.DataFrame(\nindex=list(targets.keys()) + ['CASH'],\ndata={\n'date': '2018-01-01',\n\
    'price': [np.NaN, np.NaN, np.NaN, 1],\n'target': [0.4, 0.3, 0.3, 0],\n'allocation':\
    \ [0, 0, 0, 1],\n'shares': [0, 0, 0, 10000],\n'market_value': [0, 0, 0, 10000]\n\
    }\n)\nprint(portfolio)\nallocation        date   market_value  price  shares \
    \ target\nAMZN         0  2018-01-01             0    NaN       0     0.4\nCSCO\
    \         0  2018-01-01             0    NaN       0     0.3\nGE           0 \
    \ 2018-01-01             0    NaN       0     0.3\nCASH         1  2018-01-01\
    \         10000    1.0   10000     0.0\n```\n\nAlternatively, we can build a reusable\
    \ function that will work for arbitrary stocks and targets.\n\n```\ndef instantiate_portfolio(targets,\
    \ starting_balance):\ntargets['CASH'] = 0\ntickers = list(targets.keys())\ndf\
    \ = pd.DataFrame(\nindex=tickers,\ncolumns=[\n'date','price','target',\n'allocation','shares','market_value'\n\
    ]\n)\ndf.shares = 0\ndf.market_value = 0\ndf.allocation = 0\ndf.update(\npd.DataFrame\n\
    .from_dict(targets, orient=\"index\")\n.rename(columns={0:'target'})\n)\ndf.at['CASH',\
    \ 'shares'] = starting_balance\nreturn df\n```\n\nInstantiating a portfolio with\
    \ this function will look like this:\n\n```\nportfolio = instantiate_portfolio(\n\
    {'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3},\n\n)\nprint(portfolio)\ndate price target\
    \ allocation shares market_value\nAMZN   NaN   NaN    0.4          0      0  \
    \          0\nCSCO   NaN   NaN    0.3          0      0            0\nGE     NaN\
    \   NaN    0.3          0      0            0\nCASH   NaN   NaN      0       \
    \   0  10000            0\n```\n\nGiven that I’ve packed a lot into the `instantiate_portfolio`\
    \ function, let’s spend a few moments unpacking it.\n\nFirst, you might’ve noticed\
    \ that we set `targets['CASH'] = 0`. This is required because cash will behave\
    \ a little differently from regular securities in our model portfolio.\n\nThough\
    \ we will rebalance stocks, we don’t have to, nor should we, rebalance cash. Cash\
    \ in our portfolio will just act as a buffer and overflow. Adding `CASH` to our\
    \ dictionary has this effect:\n\n```\nprint(targets)\ntargets['CASH'] = 0\nprint(targets)\n\
    {'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3}\n{'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3, 'CASH':\
    \ 0}\n```\n\nSecond, just after the line where we set the value for the `CASH`\
    \ key, there’s this: `list(targets.keys())`.\n\nThis code snippet converts all\
    \ the dictionary keys to a list so that we can use it as an index to build a pandas\
    \ `DataFrame`.\n\n```\nlist(targets.keys())\n['AMZN', 'CSCO', 'GE']\n```\n\nFurther\
    \ down the `instantiate_portfolio` function, we call `.from_dict` . This piece\
    \ of code simply generates a pandas `DataFrame` from a dictionary.\n\n```\nprint(pd.DataFrame.from_dict(targets,\
    \ orient=\"index\"))\n\nAMZN  0.4\nCSCO  0.3\nGE    0.3\n```\n\nUnfortunately,\
    \ the method isn’t smart enough to set the column name, so we manually rename\
    \ the `0` column.\n\n```\nprint(\npd.DataFrame\n.from_dict(targets, orient=\"\
    index\")\n.rename(columns={0:'target'})\n)\ntarget\nAMZN     0.4\nCSCO     0.3\n\
    GE       0.3\n```\n\nThis `DataFrame` created by `.from_dict` is used in a call\
    \ to update the target values at their respective index locations.\n\nThe last\
    \ piece of the `instantiate_portfolio` function worth highlighting is the `.at`\
    \ method. Using `.at` is a great way to set values at specific index and column\
    \ locations.\n\nHere’s how `.at` works in practice:\n\n```\ndf = pd.DataFrame(index=['CASH',\
    \ 'GE'], data={'shares': [0, 1]})\nprint(df)\ndf.at['CASH', 'shares'] = 10000\n\
    print(df)\nshares\nCASH       0\nGE         1\nshares\nCASH   10000\nGE      \
    \   1\n```"
  raw: "# 6. Invest\n\n> Invest in your future, don’t dilute your finances.\n> \n\
    > —Kendrick Lamar\n\nI am not an authority on investing. So, I can’t (and won’t)\
    \ tell you which stocks you should pick or how you should structure your personal\
    \ investment portfolio. I can, however, give you an awesome mechanism for setting\
    \ up asset allocations and adhering to a routine of continuous rebalancing.\n\n\
    Rebalancing^([^(27)](#fn27)) your investment portfolio against target allocations\
    \ is a good idea because it keeps risk in check and forces you to remove the emotion\
    \ from your investment decisions.\n\nWhen your portfolio is up, it’s really hard\
    \ to sell, and when you take a hit, it’s just as hard to buy. A strategy of automated\
    \ or semi-automated rebalancing will force you to buy and sell even when your\
    \ emotions are trying to get the best of you.\n\nBut before we explore investing\
    \ and rebalancing with Python, here are a couple of words on trade-offs.\n\n##\
    \ Trade-Offs\n\nI had a hard time writing the technical parts for this chapter\
    \ because you can really go hard on all this stuff if you want to (and I encourage\
    \ you to!).\n\nInitially, I wrote everything so that it was encapsulated in a\
    \ Python class, then I refactored everything to work with SQLite, and then I refactored\
    \ it all again to simple functions powered by pandas.\n\nI ultimately settled\
    \ on pandas and functions because this is a pandas book and it kept with the theme.\
    \ Besides, functions are just way easier to read and use. Pandas might not be\
    \ the best choice for scaling things up to production.\n\nThere are real trade-offs\
    \ in programming. Often we have to choose between good enough and heavily polished,\
    \ with the latter often taking ten times the time and effort of the former. Polished\
    \ will get you coverage for all the edge cases, but good enough will get you where\
    \ you need to go fast.\n\nI’m all in for “good enough.”\n\n## Instantiate\n\n\
    With the preamble out of the way, let’s design a portfolio and get investing!\
    \ I’ve chosen three random stocks to get us started: Amazon (AMZN^([^(28)](#fn28))),\
    \ Cisco (CSCO^([^(29)](#fn29))), and General Electric (GE^([^(30)](#fn30))). We’ll\
    \ try to hold the securities in target allocations of 40 percent, 30 percent,\
    \ and 30 percent, respectively.\n\nTo maintain balance against our target allocations,\
    \ we will need to execute buy and sell trades after market movements, deposits,\
    \ and withdrawals.\n\nLet’s start by defining our target allocations as a dictionary.\n\
    \n```\ntargets = {\n'AMZN': 0.40, # Amazon\n'CSCO': 0.30, # Cisco\n'GE': 0.30\
    \ # GE\n}\n```\n\nTo instantiate a portfolio, we might build up a DataFrame from\
    \ scratch like this:\n\n```\nimport pandas as pd\nimport numpy as np\nportfolio\
    \ = pd.DataFrame(\nindex=list(targets.keys()) + ['CASH'],\ndata={\n'date': '2018-01-01',\n\
    'price': [np.NaN, np.NaN, np.NaN, 1],\n'target': [0.4, 0.3, 0.3, 0],\n'allocation':\
    \ [0, 0, 0, 1],\n'shares': [0, 0, 0, 10000],\n'market_value': [0, 0, 0, 10000]\n\
    }\n)\nprint(portfolio)\nallocation        date   market_value  price  shares \
    \ target\nAMZN         0  2018-01-01             0    NaN       0     0.4\nCSCO\
    \         0  2018-01-01             0    NaN       0     0.3\nGE           0 \
    \ 2018-01-01             0    NaN       0     0.3\nCASH         1  2018-01-01\
    \         10000    1.0   10000     0.0\n```\n\nAlternatively, we can build a reusable\
    \ function that will work for arbitrary stocks and targets.\n\n```\ndef instantiate_portfolio(targets,\
    \ starting_balance):\ntargets['CASH'] = 0\ntickers = list(targets.keys())\ndf\
    \ = pd.DataFrame(\nindex=tickers,\ncolumns=[\n'date','price','target',\n'allocation','shares','market_value'\n\
    ]\n)\ndf.shares = 0\ndf.market_value = 0\ndf.allocation = 0\ndf.update(\npd.DataFrame\n\
    .from_dict(targets, orient=\"index\")\n.rename(columns={0:'target'})\n)\ndf.at['CASH',\
    \ 'shares'] = starting_balance\nreturn df\n```\n\nInstantiating a portfolio with\
    \ this function will look like this:\n\n```\nportfolio = instantiate_portfolio(\n\
    {'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3},\n\n)\nprint(portfolio)\ndate price target\
    \ allocation shares market_value\nAMZN   NaN   NaN    0.4          0      0  \
    \          0\nCSCO   NaN   NaN    0.3          0      0            0\nGE     NaN\
    \   NaN    0.3          0      0            0\nCASH   NaN   NaN      0       \
    \   0  10000            0\n```\n\nGiven that I’ve packed a lot into the `instantiate_portfolio`\
    \ function, let’s spend a few moments unpacking it.\n\nFirst, you might’ve noticed\
    \ that we set `targets['CASH'] = 0`. This is required because cash will behave\
    \ a little differently from regular securities in our model portfolio.\n\nThough\
    \ we will rebalance stocks, we don’t have to, nor should we, rebalance cash. Cash\
    \ in our portfolio will just act as a buffer and overflow. Adding `CASH` to our\
    \ dictionary has this effect:\n\n```\nprint(targets)\ntargets['CASH'] = 0\nprint(targets)\n\
    {'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3}\n{'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3, 'CASH':\
    \ 0}\n```\n\nSecond, just after the line where we set the value for the `CASH`\
    \ key, there’s this: `list(targets.keys())`.\n\nThis code snippet converts all\
    \ the dictionary keys to a list so that we can use it as an index to build a pandas\
    \ DataFrame.\n\n```\nlist(targets.keys())\n['AMZN', 'CSCO', 'GE']\n```\n\nFurther\
    \ down the `instantiate_portfolio` function, we call `.from_` `dict` . This piece\
    \ of code simply generates a pandas DataFrame from a dictionary.\n\n```\nprint(pd.DataFrame.from_dict(targets,\
    \ orient=\"index\"))\n\nAMZN  0.4\nCSCO  0.3\nGE    0.3\n```\n\nUnfortunately,\
    \ the method isn’t smart enough to set the column name, so we manually rename\
    \ the 0 column.\n\n```\nprint(\npd.DataFrame\n.from_dict(targets, orient=\"index\"\
    )\n.rename(columns={0:'target'})\n)\ntarget\nAMZN     0.4\nCSCO     0.3\nGE  \
    \     0.3\n```\n\nThis DataFrame created by `.from_dict` is used in a call to\
    \ update the target values at their respective index locations.\n\nThe last piece\
    \ of the `instantiate_portfolio` function worth highlighting is the `.at` method.\
    \ Using `.at` is a great way to set values at specific index and column locations.\n\
    \nHere’s how `.at` works in practice:\n\n```\ndf = pd.DataFrame(index=['CASH',\
    \ 'GE'], data={'shares': [0, 1]})\nprint(df)\ndf.at['CASH', 'shares'] = 10000\n\
    print(df)\nshares\nCASH       0\nGE         1\nshares\nCASH   10000\nGE      \
    \   1\n```"
  trans: "\n# 6. 投资\n\n> 投资你的未来，不要稀释你的财富。\n> \n> ——肯德里克·拉马尔\n\n我不是投资领域的权威。因此，我无法（也不会）告诉你应该选择哪些股票，或者你应该如何构建个人投资组合。但我可以为你提供一个极好的机制，用于设定资产配置并坚持持续再平衡的例行程序。\n\
    \n根据目标配置对你的投资组合进行再平衡^(²⁷)是一个好主意，因为它能控制风险，并迫使你从投资决策中剔除情绪因素。\n\n当你的投资组合上涨时，你很难卖出；而当它遭受打击时，你又同样很难买入。采用自动化或半自动化的再平衡策略，即使在你情绪波动、试图战胜理性时，也能迫使你执行买入和卖出操作。\n\
    \n但在我们探索如何使用 Python 进行投资和再平衡之前，先来谈谈权衡取舍。\n\n## 权衡取舍\n\n在撰写本章的技术部分时，我遇到了困难，因为如果你想的话，你真的可以在这些内容上大做文章（而且我鼓励你这么做！）。\n\
    \n最初，我将所有内容都封装在一个 Python 类中，然后我重构了所有代码，使其能与 SQLite 协同工作，接着我又将其全部重构为基于 `pandas`\
    \ 的简单函数。\n\n我最终选择了 `pandas` 和函数，因为这是一本关于 `pandas` 的书，这样保持了主题的一致性。此外，函数也更加易于阅读和使用。虽然从规模化生产的角度来看，`Pandas`\
    \ 可能不是最佳选择。\n\n编程中存在着真实的权衡取舍。我们常常需要在“足够好”和“高度精良”之间做出选择，后者往往需要花费前者十倍以上的时间和精力。精良的代码能覆盖所有边界情况，而足够好的代码能让你快速达成目标。\n\
    \n我完全支持“足够好”。\n\n## 实例化\n\n讲完开场白，让我们来设计一个投资组合，开始投资吧！我选择了三只随机股票来启动：亚马逊（`AMZN`^(²⁸)）、思科（`CSCO`^(²⁹)）和通用电气（`GE`^(³⁰)）。我们将尝试分别以\
    \ 40%、30% 和 30% 的目标配置持有这些证券。\n\n为了保持与目标配置的平衡，我们需要在市场价格波动、存款和提款后执行买入和卖出交易。\n\n\
    首先，我们将目标配置定义为一个字典。\n\n```\ntargets = {\n'AMZN': 0.40, # 亚马逊\n'CSCO': 0.30, # 思科\n\
    'GE': 0.30   # 通用电气\n}\n```\n\n要实例化一个投资组合，我们可以像这样从头开始构建一个 `DataFrame`：\n\n```\n\
    import pandas as pd\nimport numpy as np\nportfolio = pd.DataFrame(\nindex=list(targets.keys())\
    \ + ['CASH'],\ndata={\n'date': '2018-01-01',\n'price': [np.NaN, np.NaN, np.NaN,\
    \ 1],\n'target': [0.4, 0.3, 0.3, 0],\n'allocation': [0, 0, 0, 1],\n'shares': [0,\
    \ 0, 0, 10000],\n'market_value': [0, 0, 0, 10000]\n}\n)\nprint(portfolio)\nallocation\
    \        date   market_value  price  shares  target\nAMZN         0  2018-01-01\
    \             0    NaN       0     0.4\nCSCO         0  2018-01-01           \
    \  0    NaN       0     0.3\nGE           0  2018-01-01             0    NaN \
    \      0     0.3\nCASH         1  2018-01-01         10000    1.0   10000    \
    \ 0.0\n```\n\n或者，我们可以构建一个可重用的函数，使其能适用于任意股票和目标。\n\n```\ndef instantiate_portfolio(targets,\
    \ starting_balance):\ntargets['CASH'] = 0\ntickers = list(targets.keys())\ndf\
    \ = pd.DataFrame(\nindex=tickers,\ncolumns=[\n'date','price','target',\n'allocation','shares','market_value'\n\
    ]\n)\ndf.shares = 0\ndf.market_value = 0\ndf.allocation = 0\ndf.update(\npd.DataFrame\n\
    .from_dict(targets, orient=\"index\")\n.rename(columns={0:'target'})\n)\ndf.at['CASH',\
    \ 'shares'] = starting_balance\nreturn df\n```\n\n使用此函数实例化投资组合将如下所示：\n\n```\n\
    portfolio = instantiate_portfolio(\n{'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3},\n\n\
    )\nprint(portfolio)\ndate price target allocation shares market_value\nAMZN  \
    \ NaN   NaN    0.4          0      0            0\nCSCO   NaN   NaN    0.3   \
    \       0      0            0\nGE     NaN   NaN    0.3          0      0     \
    \       0\nCASH   NaN   NaN      0          0  10000            0\n```\n\n鉴于我在\
    \ `instantiate_portfolio` 函数中打包了很多内容，让我们花点时间来拆解它。\n\n首先，你可能注意到了我们设置了 `targets['CASH']\
    \ = 0`。这是必要的，因为在我们的模型投资组合中，现金的行为将与常规证券略有不同。\n\n虽然我们会再平衡股票，但我们没有必要、也不应该再平衡现金。投资组合中的现金只充当缓冲区和溢出池。将\
    \ `CASH` 添加到我们的字典中会产生如下效果：\n\n```\nprint(targets)\ntargets['CASH'] = 0\nprint(targets)\n\
    {'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3}\n{'AMZN': 0.4, 'CSCO': 0.3, 'GE': 0.3, 'CASH':\
    \ 0}\n```\n\n其次，就在我们为 `CASH` 键设置值的那一行之后，出现了这一行：`list(targets.keys())`。\n\n这段代码将所有字典键转换为一个列表，以便我们可以将其用作索引来构建\
    \ pandas `DataFrame`。\n\n```\nlist(targets.keys())\n['AMZN', 'CSCO', 'GE']\n```\n\
    \n再往下看 `instantiate_portfolio` 函数，我们调用了 `.from_dict`。这段代码只是从一个字典生成一个 pandas `DataFrame`。\n\
    \n```\nprint(pd.DataFrame.from_dict(targets, orient=\"index\"))\n\nAMZN  0.4\n\
    CSCO  0.3\nGE    0.3\n```\n\n不幸的是，这个方法不够智能，无法自动设置列名，所以我们手动重命名了 `0` 列。\n\n```\n\
    print(\npd.DataFrame\n.from_dict(targets, orient=\"index\")\n.rename(columns={0:'target'})\n\
    )\ntarget\nAMZN     0.4\nCSCO     0.3\nGE       0.3\n```\n\n这个由 `.from_dict` 创建的\
    \ `DataFrame` 被用于调用 `update` 函数，以更新各自的索引位置上的目标值。\n\n`instantiate_portfolio` 函数中最后一个值得强调的部分是\
    \ `.at` 方法。使用 `.at` 是在特定的索引和列位置设置值的绝佳方式。\n\n以下是在实践中 `.at` 的工作原理：\n\n```\ndf =\
    \ pd.DataFrame(index=['CASH', 'GE'], data={'shares': [0, 1]})\nprint(df)\ndf.at['CASH',\
    \ 'shares'] = 10000\nprint(df)\nshares\nCASH       0\nGE         1\nshares\nCASH\
    \   10000\nGE         1\n```\n"
- fmt: '# Prices


    At this point our `portfolio` is instantiated, but there are still a lot of gaps
    in the data structure. Gaps are caused by a lack of prices.


    ```

    print(portfolio)

    date price target  allocation  shares  market_value

    AMZN  NaN   NaN    0.4           0       0             0

    CSCO  NaN   NaN    0.3           0       0             0

    GE    NaN   NaN    0.3           0       0             0

    CASH  NaN   NaN      0           0   10000             0

    ```


    To fill in these gaps, let’s build a function with which we can update prices.
    Although we could theoretically use the `.at` method from before to build this
    function, the `.update` method is a little more legible here.


    ```

    def update_prices(portfolio, prices):

    prices[''CASH''] = 1

    portfolio.update(pd.DataFrame({''price'': prices}))

    portfolio.date = prices.name

    portfolio.market_value = portfolio.shares * portfolio.price

    ```


    To use `update_prices`, we pass the function our portfolio and a pandas `Series`
    object that contains prices for a specific day.


    ```

    # fake for right now

    prices = pd.Series(

    name=''2018-01-01'',

    data={''AMZN'': 945.21,''CSCO'': 30.52, ''GE'': 29.27}

    )

    print(prices)

    update_prices(portfolio, prices)

    AMZN    945.21

    CSCO     30.52

    GE       29.27

    Name: 2018-01-01, dtype: float64

    ```


    The neat thing about this function is that it updates the values in place. Running
    `print(portfolio)` in a Jupyter cell, we can see how the function changed the
    object.


    ```

    print(portfolio)

    date   price target  allocation  shares market_value

    AMZN 2018-01-01  945.21    0.4           0       0            0

    CSCO 2018-01-01   30.52    0.3           0       0            0

    GE   2018-01-01   29.27    0.3           0       0            0

    CASH 2018-01-01       1      0           0   10000        10000

    ```


    Right now all the `market_value`s are set to 0 because we haven’t executed any
    buy orders yet.


    # Orders


    With our portfolio object complete, let’s build a `get_order` function that will
    calculate the buy and sell orders we need to execute to achieve balance against
    target allocations at arbitrary moments in time.


    ```

    def get_order(portfolio):

    total_value = portfolio.market_value.sum()

    order = (

    (total_value * portfolio.target // portfolio.price)

    - portfolio.shares

    ).drop(''CASH'')

    return order

    ```


    The `get_order` function is fairly straightforward; the only interesting part
    is this thing: `//`.


    The `//` is the Python floor division operator. `get_order` uses floor division
    because we can’t buy fractional shares on the stock market!


    If we want to buy AMZN, we have to buy whole shares.


    ```

    total_value = 10000

    target = 0.4

    price = 945.21

    AMZN = (total_value * target // price) - 0

    print(AMZN)

    4.0

    ```


    Without floor division, the `get_order` function would tell us to buy fractional
    units.


    ```

    (total_value * target / price) - 0

    4.231863818622316

    ```


    Using `get_order` is as simple as passing the function our portfolio object as
    the sole argument.


    ```

    order = get_order(portfolio)

    print(order)

    AMZN      4

    CSCO     98

    GE      102

    dtype: object

    ```


    Importantly, `get_order` doesn’t actually do anything to the portfolio object.
    This because we might want to maintain control over whether to place the order
    and make the necessary trades to rebalance, or not.


    # Deposit


    Because we’re disciplined investors (*wink wink*), let’s add a `deposit` function
    into the mix. Most of this should be self-explanatory.


    ```

    def deposit(portfolio, amount):

    portfolio.at[''CASH'', ''shares''] += amount

    portfolio.at[''CASH'', ''market_value''] = portfolio.at[''CASH'', ''shares'']

    deposit(portfolio, 1000)

    ```


    Running `get_order` on top of `portfolio` now yields the following:


    ```

    order = get_order(portfolio)

    print(order)

    AMZN      4

    CSCO    108

    GE      112

    dtype: object

    ```


    That’s pretty much it! With the `instantiate_portfolio`, `update_prices`, `get_order`,
    and `deposit` functions built, we have all the ingredients we need to rebalance
    any basket of securities.


    It’s a bit anticlimatic, isn’t it?


    Let’s keep going and put all our functions into action. While we’re at it, we
    might as well use real stock quotes, instead of faking it like when we tested
    `update_prices`.


    # Simulate


    Because our `get_order` function doesn’t alter the portfolio object, let’s implement
    a function that simulates the execution of buy/sell orders.


    ```

    def simulate_process_order(portfolio, order):

    starting_cash = portfolio.at[''CASH'', ''shares'']

    cash_adjustment = np.sum(order * portfolio.price)

    portfolio.shares += order

    portfolio.market_value = portfolio.shares * portfolio.price

    portfolio.at[''CASH'', ''shares''] = starting_cash - cash_adjustment

    portfolio.market_value = portfolio.shares * portfolio.price

    portfolio.allocation = (

    portfolio.market_value / portfolio.market_value.sum()

    )

    ```


    The `simulate_process_order` function takes the portfolio object and a pandas
    series object to buy and sell securities.


    ```

    simulate_process_order(portfolio, order)

    print(portfolio)

    date   price target allocation  shares market_value

    AMZN  2018-01-01  945.21    0.4   0.343713       4      3780.84

    CSCO  2018-01-01   30.52    0.3   0.299651     108      3296.16

    GE    2018-01-01   29.27    0.3   0.298022     112      3278.24

    CASH  2018-01-01       1      0  0.0586145  644.76       644.76

    ```


    # Quotes


    Years ago everyone was using the Google and Yahoo Finance APIs to access financial
    market data. For some reason both companies shuttered access to these services,
    and ever since we’ve all been scrambling to find a replacement.


    As of this writing, I’m using a free API from Alpha Vantage to access stock quotes.
    It’s a bit clunky, but it’s accurate and will be perfect for our purposes.


    Given that the process for connecting to the Alpha Vantage API closely parallels
    the process for connecting to the Open Exchange Rates API, I’m going to go through
    this section a bit more quickly.


    Register for an API key at alphavantage.co.^([^(31)](#fn31))


    ![../images/469615_1_En_6_Chapter/469615_1_En_6_Figa_HTML.jpg](images/469615_1_En_6_Chapter/469615_1_En_6_Figa_HTML.jpg)


    (You barely have to create an account; it’s awesome.)


