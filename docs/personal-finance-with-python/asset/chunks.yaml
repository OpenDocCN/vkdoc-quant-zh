- fmt: '# Secrets


    Once you’ve registered, you can find your unique API key in the Open Exchange
    Rates Dashboard. Your key will look something like this:


    ```

    9a156a49bc84f849fde848

    ```


    Every request we make against the Open Exchange Rates API will need this key attached;
    otherwise, we won’t get any data back from the service.


    You might be inclined to shove your key into a Python script or Jupyter Notebook.
    Resist the urge! Keeping secrets (like a key) in plain sight is a recipe for disaster.
    If you decide to share your code with someone, they will have access to your key
    and can—if they’re so inclined—abuse it and get your key blacklisted.


    To hack ourselves out of this problem, we need to keep our API key a secret. There
    are a bunch of ways to handle secrets in Python. One way is to use environment
    variables and the `dotenv` library.


    ```

    !pip install -U python-dotenv

    ```


    With `dotenv`, you create and save an `.env` file (with Atom, VS Code, TextEdit
    or something similar) in the same directory/folder that contains your script or
    Jupyter Notebook and then stuff your secrets inside of it.


    ![../images/469615_1_En_3_Chapter/469615_1_En_3_Figc_HTML.jpg](images/469615_1_En_3_Chapter/469615_1_En_3_Figc_HTML.jpg)


    Once that’s defined, you can load up your secrets by following the pattern.


    ```

    import os

    from dotenv import load_dotenv, find_dotenv

    load_dotenv(find_dotenv())

    API_KEY = os.environ.get(''OPX_KEY'')

    print(API_KEY)

    >>> 9a156a49bc84f8ce156a4749bc848

    ```


    Again, your key will be different. Mine is fake, so don’t even try.


    # Documentation


    With our keys properly hidden, we can start making requests against the Open Exchange
    Rates API. Reading through the API documentation, we can see that our queries
    have to conform to the following structure:


    ![../images/469615_1_En_3_Chapter/469615_1_En_3_Figd_HTML.jpg](images/469615_1_En_3_Chapter/469615_1_En_3_Figd_HTML.jpg)


    Loading up a browser and sticking a URL into the search bar will yield the following:


    ```

    {

    "disclaimer": "Usage subject to terms: https://openexchangerates.org/terms",

    "license": "https://openexchangerates.org/license",

    "timestamp": 1519588738,

    "base": "USD",

    "rates": {

    "CAD": 1.303016,

    "USD": 1

    }

    }

    ```


    Sick. We got data back!


    However, manually coercing everything into a URL is not the best or preferred
    way of doing things.


    Instead, it’s a lot better (and a lot easier) to build on top of the `requests`
    library and fit all of our “query params” into a params payload, like so:


    ```

    import requests

    API_KEY = os.environ.get(''OPX_KEY'')

    r = requests.get(

    ''https://openexchangerates.org/api/latest.json'',

    params = {

    ''app_id'': API_KEY,

    ''symbols'': ''CAD,USD'',

    ''show_alternative'': ''true''

    }

    )

    ```


    The response from Open Exchange Rates will now be stored as JSON inside the `r`
    object and can be accessed with the following:


    ```

    rates_ = r.json()[''rates'']

    rates_

    {''CAD'': 1.303016, ''USD'': 1}

    ```


    Given that `rates_` is just a dictionary, we can access key-value pairs with the
    `.get` method and run some conversions according to the formula.


    ```

    symbol_from = ''CAD''

    symbol_to = ''USD''

    value = 3000

    value * 1/rates_.get(symbol_from) * rates_.get(symbol_to)

    2302.350853711697

    ```


    Your values will probably be different because exchange rates move all the time.


    # Encapsulate


    Although we did just successfully convert from CAD to USD, we have a lot of variables
    swirling around our environment that can quickly turn our code into spaghetti.
    To get out of our impending pasta doom, we should encapsulate all of our logic
    into a Python class.


    ```

    class CurrencyConverter:

    def __init__(self, symbols, API_KEY):

    self.API_KEY = API_KEY

    self.symbols = symbols

    self._symbols = '',''.join([str(s) for s in symbols])

    r = requests.get(

    ''https://openexchangerates.org/api/latest.json'',

    params = {

    ''app_id'': self.API_KEY,

    ''symbols'': self._symbols,

    ''show_alternative'': ''true''

    }

    )

    self.rates_ = r.json()[''rates'']

    self.rates_[''USD''] = 1

    def convert(self, value, symbol_from, symbol_to, round_output=True):

    try:

    x = (value

    * 1/self.rates_.get(symbol_from)

    * self.rates_.get(symbol_to))

    if round_output:

    return round(x, 2)

    else:

    return x

    except TypeError:

    print(''Unavailable or invalid symbol'')

    return None

    ```


    You can think of classes in Python as just a nice way to keep all our code together
    and a bit more legible.


    Most everything in the `CurrencyConverter` class should look familiar. The only
    new bits are the following:


    ```

    self._symbols = '',''.join([str(s) for s in symbols])

    ```


    This takes a list like `[''CAD'', ''USD'']` and turns it into the comma-separated
    format required by the API and some error handling in the `.convert` method (the
    name for a function attached to a class).


    With everything now inside of a class, we can instantiate a currency converter
    with this:


    ```

    API_KEY = os.environ.get("OPX_KEY")

    c = CurrencyConverter([''CAD'', ''USD''], API_KEY)

    ```


    Converting values now just requires us to use the `.convert` method.


    ```

    print(c.convert(3000, ''CAD'', ''USD''))

    print(c.convert(5000, ''USD'', ''CAD''))

    2302.35

    6515.08

    ```


    ## show_alternative


    The Open Exchange Rates API is incredibly robust, and it actually includes access
    points for alternative cryptocurrencies. This means that it’s totally legit to
    instantiate a new `CurrencyConverter` with ETH (Ethereum), BTC (Bitcoin), and
    DOGE (Dogecoin) on top of CAD and USD.


    ```

    c = CurrencyConverter([''CAD'', ''USD'', ''DOGE'', ''ETH'', ''BTC''], API_KEY)

    ```


    With all the currencies stored inside of a dictionary attached to the `CurrencyConverter`
    object:


    ```

    c.rates_

    {''BTC'': 0.00013350885,

    ''CAD'': 1.303016,

    ''DOGE'': 289.975486957,

    ''ETH'': 0.0017451855,

    ''USD'': 1}

    ```


    we can, again, run the `.convert` method and find out that $3,000 CAD is equal
    to the following:


    ![../images/469615_1_En_3_Chapter/469615_1_En_3_Fige_HTML.png](images/469615_1_En_3_Chapter/469615_1_En_3_Fige_HTML.png)


    ```

    c.convert(3000, ''CAD'', ''DOGE'')

    667625.31

    ```'
