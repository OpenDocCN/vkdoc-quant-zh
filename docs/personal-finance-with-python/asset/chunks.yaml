    r = RecurringEvent()

    r.parse(frequency)

    rr = rrule.rrulestr(r.get_RFC_rrule())

    return [

    pd.to_datetime(date).normalize()

    for date in rr.between(TODAY, END)

    ]

    except ValueError as e:

    raise ValueError(''Invalid frequency'')

    ```


    The logic in this function is mostly identical to the operations that we performed
    earlier; however, I’ve added some additional error handling in the pattern of
    “Ask forgiveness, not permission”^([^(26)](#fn26)) that tries to let `pd.Timestamp`
    do its thing with raw dates and then falls back on `.parse` from the Recurrent
    library.


