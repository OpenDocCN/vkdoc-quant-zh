    With the payment calculated, we can build an amortization schedule on top of a
    pandas DataFrame. To start, let’s instantiate the first row of the schedule.


    ```

    import pandas as pd

    balance = loan

    df = pd.DataFrame({

    ''month'': [0],

    ''payment'': [np.NaN],

    ''interest'': [np.NaN],

    ''principal'': [np.NaN],

    ''balance'': [balance]

    })

    print(df)

    balance  interest  month  payment  principal

    0   3000.0       NaN      0      NaN        NaN

    ```


    While the first row (at index 0) has the balance set to the amount borrowed, the
    interest, payment, and principal (remaining) are all set to `NaN` (not a number)
    because loan payments kick in after a full month has elapsed.


    With our DataFrame instantiated, we can now calculate the interest and principal
    portions for the first payment by running the following:


    ```

    interest = round(rate/12 * balance, 2)

    principal = payment - interest

    balance = balance - principal

    print(interest)

    print(principal)

    print(balance)

    14.38

    207.69

    2792.31

    ```


    To execute these calculations for each payment in sequence, we can wrap the logic
    in a loop and append the calculated values to the `df` object with month 0 already
    filled in.


    |   | month | payment | interest | principal | balance |

    | --- | --- | --- | --- | --- | --- |

    | 0 | 0 | NaN | NaN | NaN | 3000.00 |

