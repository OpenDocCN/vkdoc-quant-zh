    df

    ```


    一旦创建了合计列，我们就可以在`.total`和`.date`列上运行`xirr()`。


    ```

    xirr(df.total, df.date)

    0.1258660808393406

    ```


    看，就是这样。本章结束。


    骗你的！^(¹²)


    不幸的是，如果你现在尝试运行`xirr()`，会遇到`NameError: name ''xirr'' is not defined`错误。它未定义是因为
    Python 实际上并没有内置`xirr`函数。


    不过，没关系。我们自己来实现一个！^(¹³)


    ### xnpv


    在我们自己实现之前，还记得我说过内部收益率（IRR/XIRR）与净现值（NPV/XNPV）紧密相关吗？好吧，如果我们想定义一个`xirr`函数，首先必须构建一个`xnpv`函数。


    就是这个：


    ```

    def xnpv(rate, values, dates):

    ''''''复制 XNPV()函数的功能''''''

    min_date = min(dates)

    return sum([

    value / (1 + rate)**((date - min_date).days / 365)

    for value, date

    in zip(values, dates)

    ])

    ```


    别担心！我知道它看起来有点吓人，但我保证它没那么糟糕。


    让我们放慢节奏，分解一下`xnpv`，这样我们就能真正理解它的工作原理了。函数的核心部分就是这个东西：


    ```

    value / (1 + rate)**((date - min_date).days

    ```


    如果我们从`df`对象中取出所有的值和日期，就能看到它的作用。


    ```

    values = df.total

    dates = df.date

    print(''值:'', list(values))

    print(''日期:'', list(dates))

    值: [-3000, 1000, 1000, 1000, 1000]

    日期: [Timestamp(''2017-01-01 00:00:00''), Timestamp(''2018-01-01 00:00:00''), Timestamp(''2019-01-01
    00:00:00''), Timestamp(''2020-01-01 00:00:00''), Timestamp(''2021-01-01 00:00:00'')]

    ```


    我们还需要一个随机的折现率（别担心，稍后我们会更改它；只需将其视为借贷成本）以及`dates`列表中的最小日期。


    ```

    rate = 0.05

    min_date = min(dates)

    print(min_date)

    2017-01-01 00:00:00

    ```


    有了这些元素后，我们就可以对列表中第一个值（Python 从 0 开始索引，所以第一个值是`data[0]`）运行`xnpv`函数的核心部分。


    ```

    date = dates[0]

    value = values[0]

    value / (1 + rate)**((date - min_date).days / 365)

    -3000.0

    ```


    我们所做的只是将-3000 美元折现到现在，但它本身就已经是现值了，因为它关联的是第一个（最小）日期值。


    如果我们转向第二笔现金流（1000 美元）并将其折现到现在，情况就会更具指导意义。


    ```

    date = dates[1]

    value = values[1]

    print(value)

    value / (1 + rate)**((date - min_date).days / 365)


    952.3809523809523

    ```


    我们可以继续为每个日期-值对运行此公式，或者我们可以偷懒，将所有内容包裹在一个列表推导式中，并使用`zip`同时将所有现金流折现到现在。


    ```

    intermediate_step = [

    value / (1 + rate)**((date - min_date).days / 365)

    for value, date

    in zip(values, dates)

    ]

    print(intermediate_step)

    [-3000.0, 952.3809523809523, 907.0294784580499, 863.837598531476, 822.5925101174964]

    ```

    '
- fmt: '### Note


    List comprehensions are a really easy way to create lists in Python. They follow
    this format: `[expression for item in list if conditional]`.


    And `zip` just acts like a zipper, aggregating values from two different lists
    and returning one thing.


    With a list of all the present values stored in the object `intermediate_step`,
    the only thing left is to sum up all the values and print out the result.


    ```

    print(sum(intermediate_step))

    xnpv(0.05, df.total, df.date)

    545.8405394879746

    545.8405394879746

    ```


    See, `xnpv` isn’t that bad!


    What does it all mean? Well, at a discount rate of 5 percent (we randomly picked
    this value, but think of it as your cost of capital or the return you might get
    from another potential investment opportunity), the net present value of all our
    expected cash flows is $545.84.


    ### xirr


    With `xnpv` in the bag and out of the way, building an `xirr` function is somewhat
    trivial. It’s trivial because IRR is just NPV but set to 0. If we want, we can
    actually derive the internal rate of return manually through a process of trial
    and error.


    ```

    xnpv(0.05, df.total, df.date)

    545.8405394879746

    print(xnpv(0.04, df.total, df.date))

    print(xnpv(0.06, df.total, df.date))

    print(xnpv(0.07, df.total, df.date))

    print(xnpv(0.08, df.total, df.date))

    print(xnpv(0.09, df.total, df.date))

    print(xnpv(0.11, df.total, df.date))

    print(xnpv(0.12, df.total, df.date))

    print(xnpv(0.125, df.total, df.date))

    print(xnpv(0.1255, df.total, df.date))

    print(xnpv(0.1258, df.total, df.date))

    print(xnpv(0.12583, df.total, df.date))

    print(xnpv(0.12586, df.total, df.date))

    629.8033770546891

    464.97917229138625

    387.0698546137953

    311.9718737447598

    239.55263528320688

    102.25737356965487

    37.15205553499129

    5.437960934594116

    2.2965732963834853

    0.4143376303915147

    0.22622105096445466

    0.038123913067124704

    ```


    Exhausting but doable!


    Because the last value is pretty damn close to 0, we can conclude that the IRR
    for our mining rig is around 12.586 percent. Great! However, futzing around with
    our `xnpv` function is from ideal. It would be nice if we had a function that
    could find the zero for us.


    This is a lot harder, so instead of rolling our own "zero-finder," let’s lean
    on the Newton-Raphson optimization method from the SciPy library.


    ```

    from scipy.optimize import newton

    def xirr(values, dates):

    ''''''Replicates the XIRR() function''''''

    return newton(lambda r: xnpv(r, values, dates), 0)

    xirr(df.total, df.date)

    0.1258660808393406

    ```


    Breaking down the `newton()` function is a bit outside the scope of this book.
    If you’re curious to learn more, Wikipedia^([^(14)](#fn14)) has a great page on
    how it all works.


    ## Again!


    Now that we have all the pieces built and a solid workflow for calculating IRR,
    let’s apply our process to the irregular cash flow schedule from earlier.


    |   | date | income | expenses | total |

    | --- | --- | --- | --- | --- |

    | 0 | 2017-01-01 | 40 | -3000 | -2960 |

    | 1 | 2017-01-25 | 40 | -50 | -10 |

    | 2 | 2017-02-12 | 80 | -50 | 30 |

    | 3 | 2017-02-14 | 100 | -30 | 70 |

    | 4 | 2017-03-04 | 100 | -20 | 80 |

    | 5 | 2017-04-23 | 160 | -30 | 130 |

    | 6 | 2017-05-07 | 140 | -20 | 120 |

    | 7 | 2017-05-21 | 140 | -40 | 100 |

    | 8 | 2017-06-04 | 80 | -40 | 40 |

    | 9 | 2017-06-19 | 180 | -30 | 150 |

    | 10 | 2017-07-16 | 360 | -40 | 320 |

    | 11 | 2017-08-27 | 160 | -30 | 130 |

    | 12 | 2017-09-24 | 240 | -20 | 220 |

    | 13 | 2017-10-21 | 420 | -50 | 370 |

    | 14 | 2017-11-19 | 400 | -20 | 380 |

    | 15 | 2017-12-03 | 340 | -40 | 300 |

    | 16 | 2017-12-17 | 360 | -40 | 320 |

    | 17 | 2017-12-31 | 540 | -40 | 500 |


    ```

    df = pd.read_excel(''data/xirr.xlsx'', sheet_name="irregular")

    df[''total''] = df.income + df.expenses

    df

    ```


    ```

    xirr(df.total, df.date)

    0.13812581670383556

    ```


    To the moon!


    ![../images/469615_1_En_2_Chapter/469615_1_En_2_Figc_HTML.jpg](images/469615_1_En_2_Chapter/469615_1_En_2_Figc_HTML.jpg)


    ## Conclusion


    Before we close out this chapter, I should lay down a couple of things.


    Please don’t invest in Dogecoin (or crypto or mining) because of me or because
    of this chapter. The space is crazy, and if I’m honest, you’re probably going
    to get burned playing with the stuff. If you want to get into mining, do your
    homework!


    It’s possible that you’re thinking, "That was a lot of work to calculate the IRR
    when Excel does it for free. Why do I need Python?" That’s a super-fair question.
    Although Python has a steep learning curve, the payoffs are huge. My hope is that
    the need for Python will become self-evident in the chapters to follow.


