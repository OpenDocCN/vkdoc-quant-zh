    ```\n\n哇哦。等等。如果我们在七月份花掉 2500 美元，我们的资金将血本无归。\n\n我认为我们应该把想象中的假期推迟几个月，或者想办法用极少的预算完成哥伦比亚之旅。\n\
    \n目前，我们先去掉假期，考虑一些更“紧迫”的问题。\n\n```\ncalendar = calendar.drop('vacation', axis=1)\n\
    ```\n\n## 自然语言\n\n现金流并不规律。我们可能有一些在特定日期发生的开支，或者按越来越奇怪的周期收到薪酬。如果能用纯自然语言定义这些频率，而不必依赖\
    \ pandas 的偏移量别名，那就太好了。\n\n幸运的是，有一个名为 Recurrent^(²⁴) 的优秀库，可以帮我们完成大部分繁重的解析工作。\n\n\
    例如，我们可以用自然语言定义任意频率。\n\n```\nfrequency = 'every week until July 10th' # 尝试几种不同的月-日组合！\n\
    ```\n\n然后，我们从 `recurrent` 导入 `RecurringEvent` 类。\n\n```\n!pip install recurrent\n\
    from recurrent import RecurringEvent\n```\n\n接着，使用 `.parse` 方法进行解析。\n\n```\nr\
    \ = RecurringEvent()\nr.parse(frequency)\n'RRULE:INTERVAL=1;FREQ=WEEKLY;UNTIL=20180710'\n\
    ```\n\n`.parse` 将允许我们生成符合 iCalendar RFC^(²⁵) 标准的重复规则（称为 *rrule*）。相应的 rrule 使我们能够执行许多酷炫的操作，例如检查任意日期之前或之后的第一次出现、计算事件在给定时间范围内发生的次数，或者，对我们而言，生成日期计划表。\n\
    \n为了处理 rrule，我们需要再导入一个库。\n\n```\nfrom dateutil import rrule\n```\n\n将来自我们的 `RecurringEvent`\
    \ 的 `RFC` rrule 字符串传递给 `rrule.rrulestr`，将创建我们所需的 rrule 对象。\n\n```\nrr = rrule.rrulestr(r.get_RFC_rrule())\n\
    rr\n```\n\n现在，“every week until July 10th”已被转换为一个 rrule，我们可以生成从今天到一年后之间所有可能发生的日期。\n\
    \n```\nrr.between(TODAY, END)\n[datetime.datetime(2018, 5, 29, 21, 38, 42),\n\
    datetime.datetime(2018, 6, 5, 21, 38, 42),\ndatetime.datetime(2018, 6, 12, 21,\
    \ 38, 42),\ndatetime.datetime(2018, 6, 19, 21, 38, 42),\ndatetime.datetime(2018,\
    \ 6, 26, 21, 38, 42),\ndatetime.datetime(2018, 7, 3, 21, 38, 42)]\n```\n\n我认为这个输出非常令人印象深刻。然而，`.between`\
    \ 方法破坏了本章开头设定的两条日期规则。\n\n输出的类型不是 `Timestamp`，而且数值没有标准化。让我们通过列表推导式同时解决这两个问题。\n\n\
    ```\n[pd.to_datetime(date).normalize() for date in rr.between(TODAY, END)]\n[Timestamp('2018-05-29\
    \ 00:00:00'),\nTimestamp('2018-06-05 00:00:00'),\nTimestamp('2018-06-12 00:00:00'),\n\
    Timestamp('2018-06-19 00:00:00'),\nTimestamp('2018-06-26 00:00:00'),\nTimestamp('2018-07-03\
    \ 00:00:00')]\n```\n\n### get_dates\n\n现在，我们可以围绕这些日期创建一个 DatetimeIndex，并将它们放入\
    \ DataFrame 对象中。但在此之前，让我们创建一个 `get_dates` 函数，该函数输出一个类型为 `Timestamp` 的标准化日期列表，并且能够处理原始日期（例如“2018-06-07”）和自然语言（例如“every\
    \ week until July 10th”）：\n\n```\ndef get_dates(frequency):\n    # 先让 pandas 尝试处理单个日期\n\
    \    try:\n        return [pd.Timestamp(frequency).normalize()]\n    except ValueError:\n\
    \        pass\n    # 使用 recurrent 解析频率\n    try:\n        r = RecurringEvent()\n\
    \        r.parse(frequency)\n        rr = rrule.rrulestr(r.get_RFC_rrule())\n\
    \        return [\n            pd.to_datetime(date).normalize()\n            for\
    \ date in rr.between(TODAY, END)\n        ]\n    except ValueError as e:\n   \
    \     raise ValueError('无效的频率')\n```\n\n该函数中的逻辑与我们之前执行的操作基本相同；不过，我添加了一些额外的错误处理，遵循“请求原谅而非许可”^(²⁶)的模式，先尝试让\
    \ `pd.Timestamp` 处理原始日期，然后退而求其次使用 Recurrent 库的 `.parse` 方法。\n\n让我们试试这个新函数。\n\n\
    ```\nget_dates('2019-01-01')\n[Timestamp('2019-01-01 00:00:00')]\nget_dates('every\
    \ week until July 10th')\n[Timestamp('2018-05-29 00:00:00'),\nTimestamp('2018-06-05\
    \ 00:00:00'),\nTimestamp('2018-06-12 00:00:00'),\nTimestamp('2018-06-19 00:00:00'),\n\
    Timestamp('2018-06-26 00:00:00'),\nTimestamp('2018-07-03 00:00:00')]\nget_dates('this\
    \ will not work')\n\nValueError                    Traceback (most recent call\
    \ last)\nin get_dates(frequency)\n        10         r.parse(frequency)\n--->\
    \ 11         rr = rrule.rrulestr(r.get_RFC_rrule())\n        12         return\
    \ [pd.to_datetime(date).normalize() for date in rr.between(TODAY, END)]\nValueError:\
    \ not enough values to unpack (expected 2, got 1)\nin get_dates(frequency)\n \
    \       12         return [\n        13              pd.to_datetime(date).normalize()\n\
    \        14              for date in rr.between(TODAY, END)\n        15      \
    \   ]\n        16     except ValueError as e:\n---> 17         raise ValueError('无效的频率')\n\
    ValueError: 无效的频率\n```\n\n一切似乎都运行正常！\n"
- fmt: "# Fun\n\nOur budget is still fairly simplistic. Honestly, living exactly according\
    \ to it doesn’t inspire much fun. In this toy example, we work (to generate an\
    \ income) to pay off our rent, and, well, that’s pretty much it. Plus, we had\
    \ to scrap a vacation because we couldn’t afford it.\n\nLet’s fix our bleak imaginary\
    \ lives in this section by embedding some nights out (`$40` each Friday and Saturday).\n\
    \n```\ndates = get_dates('every week on Friday and Saturday')\ndates[:10] # first\
    \ ten instances of the recurrance rule\n[Timestamp('2018-06-01 00:00:00'),\nTimestamp('2018-06-02\
    \ 00:00:00'),\nTimestamp('2018-06-08 00:00:00'),\nTimestamp('2018-06-09 00:00:00'),\n\
    Timestamp('2018-06-15 00:00:00'),\nTimestamp('2018-06-16 00:00:00'),\nTimestamp('2018-06-22\
    \ 00:00:00'),\nTimestamp('2018-06-23 00:00:00'),\nTimestamp('2018-06-29 00:00:00'),\n\
    Timestamp('2018-06-30 00:00:00')]\n```\n\nTo wrap these dates into a `DataFrame`\
    \ object, we have to turn the list into a `DatetimeIndex` object. The only problem\
    \ is that `pd.DatetimeIndex` accepts only a pandas `Series`. But it’s actually\
    \ no problem!\n\n```\npd.Series(dates).head()\n0   2018-06-01\n1   2018-06-02\n\
    2   2018-06-08\n3   2018-06-09\n4   2018-06-15\ndtype: datetime64[ns]\npd.DatetimeIndex(pd.Series(dates))\n\
    DatetimeIndex(['2018-06-01', '2018-06-02', '2018-06-08', '2018-06-09',\n'2018-06-15',\
    \ '2018-06-16', '2018-06-22', '2018-06-23',\n'2018-06-29', '2018-06-30',\n...\n\
    '2019-04-26', '2019-04-27', '2019-05-03', '2019-05-04',\n'2019-05-10', '2019-05-11',\
    \ '2019-05-17', '2019-05-18',\n'2019-05-24', '2019-05-25'],\ndtype='datetime64[ns]',\
    \ length=104, freq=None)\n```\n\nIf we wrap our list of `Timestamp`s in a `Series`\
    \ in a `DatetimeIndex`, we can follow largely the same pattern that we’ve been\
    \ using for the entire chapter.\n\n```\ndates = get_dates('every week on Friday\
    \ and Saturday')\nfun = pd.DataFrame(\n    data={'fun': -40},\n    index=pd.DatetimeIndex(pd.Series(dates))\n\
    )\nprint(fun.head())\nfun\n2018-06-01  -40\n2018-06-02  -40\n2018-06-08  -40\n\
    2018-06-09  -40\n2018-06-15  -40\n```\n\nStitching this `fun` object onto our\
    \ calendar object is a cinch.\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Fige_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Fige_HTML.jpg)\n\
    \n```\ncalendar = pd.concat([calendar, fun], axis=1).fillna(0)\ncalendar = update_totals(calendar)\n\
    plot_budget(calendar)\n```\n\n|   | income | rent | total | cum_total | bank |\
    \ fun |\n|---|--------|------|-------|-----------|------|-----|\n| 2019-05-25\
    \ | 0.0 | 0.0 | -40.0 | 3840.0 | 0.0 | -40.0 |\n| 2019-05-26 | 0.0 | 0.0 | 0.0\
    \ | 3840.0 | 0.0 | 0.0 |\n| 2019-05-27 | 0.0 | 0.0 | 0.0 | 3840.0 | 0.0 | 0.0\
    \ |\n| 2019-05-28 | 0.0 | 0.0 | 0.0 | 3840.0 | 0.0 | 0.0 |\n| 2019-05-29 | 0.0\
    \ | 0.0 | 0.0 | 3840.0 | 0.0 | 0.0 |\n\n```\ncalendar.tail()\n```\n\nIt looks\
    \ like our budget can stomach a little weekend fun!\n\n# YAML\n\nAlthough it’s\
    \ worked so far, adding a new outflow/inflow to our budget is a bit of an arduous\
    \ process. We have to first generate the `DataFrame` object, stitch it onto our\
    \ main `calendar` object, and then update the totals. It would be nice to define\
    \ our budget items all at once and calculate the totals just once.\n\nYAML to\
    \ the rescue! YAML is a file format that’s a bit like JSON but is slightly more\
    \ human-readable. We can take all of our budget items and stuff it into a YAML\
    \ file like this:\n\n> **Note:** `PyYAML` should have been installed with Anaconda.\
    \ If not, try the following: `!pip install pyyaml`\n\n```\nimport yaml\nbudget\
    \ = yaml.load('''\nbank:\n  frequency: today\n  amount: 2000\nincome:\n  frequency:\
    \ every 2 weeks on Friday\n  amount: 1000\nrent:\n  frequency: every month\n \
    \ amount: -1500\nfun:\n  frequency: every week on Friday and Saturday\n  amount:\
    \ -40\n''')\n```\n\nAfter running `yaml.load`, this just turns everything into\
    \ a Python `dict`.\n\n```\nbudget\n{'bank': {'amount': 2000, 'frequency': 'today'},\n\
    \ 'fun': {'amount': -40, 'frequency': 'every week on Friday and Saturday'},\n\
    \ 'income': {'amount': 1000, 'frequency': 'every 2 weeks on Friday'},\n 'rent':\
    \ {'amount': -1500, 'frequency': 'every month'}}\n```\n\nWith our budget in a\
    \ dictionary, we can now iterate through all of the keys (`k`) and values (`v`),\
    \ get the frequency and amounts attached to each `v`, create a `DataFrame` object,\
    \ and concatenate it to the main `calendar` object. After this point we can compute\
    \ the totals without having to update them after each step.\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figf_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figf_HTML.jpg)\n\
    \n```\ncalendar = pd.DataFrame(index=pd.date_range(start=TODAY, end=END))\nfor\
    \ k, v in budget.items():\n    frequency = v.get('frequency')\n    amount = v.get('amount')\n\
    \    dates = get_dates(frequency)\n    i = pd.DataFrame(\n        data={k: amount},\n\
    \        index=pd.DatetimeIndex(pd.Series(dates))\n    )\n    calendar = pd.concat([calendar,\
    \ i], axis=1).fillna(0)\ncalendar['total'] = calendar.sum(axis=1)\ncalendar['cum_total']\
    \ = calendar['total'].cumsum()\nplot_budget(calendar)\n```\n\n# Functionize\n\n\
    Let’s quickly functionize our budget logic so that we might test a couple more\
    \ scenarios.\n\n```\ndef build_calendar(budget):\n    calendar = pd.DataFrame(index=pd.date_range(start=TODAY,\
    \ end=END))\n    for k, v in budget.items():\n        frequency = v.get('frequency')\n\
    \        amount = v.get('amount')\n        dates = get_dates(frequency)\n    \
    \    i = pd.DataFrame(\n            data={k: amount},\n            index=pd.DatetimeIndex(pd.Series(dates))\n\
    \        )\n        calendar = pd.concat([calendar, i], axis=1).fillna(0)\n  \
    \  calendar['total'] = calendar.sum(axis=1)\n    calendar['cum_total'] = calendar['total'].cumsum()\n\
    \    return calendar\n```\n\n# Vacation II\n\nAlthough we might not be able to\
    \ stomach `$2,500` in Colombia in July, what if we did Halifax in August for `$1,000`?\n\
    \n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figg_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figg_HTML.jpg)\n\
    \n```\nbudget = yaml.load('''\nbank:\n  frequency: today\n  amount: 2000\nincome:\n\
    \  frequency: every 2 weeks on Friday\n  amount: 1000\nrent:\n  frequency: every\
    \ month\n  amount: -1500\nfun:\n  frequency: every week on Friday and Saturday\n\
    \  amount: -40\nvacation:\n  frequency: 2018-08-01\n  amount: -1000\n''')\ncalendar\
    \ = build_calendar(budget)\nplot_budget(calendar)\n```\n\nLooks good! And, it\
    \ looks like we might even be able to stow away some money for a rainy day. Let’s\
    \ sketch out what `$50` to savings on \"every Monday starting in August\" would\
    \ look like.\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figh_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figh_HTML.jpg)\n\
    \n```\nbudget = yaml.load('''\nbank:\n  frequency: today\n  amount: 2000\nincome:\n\
    \  frequency: every 2 weeks on Friday\n  amount: 1000\nrent:\n  frequency: every\
    \ month\n  amount: -1500\nfun:\n  frequency: every week on Friday and Saturday\n\
    \  amount: -40\nvacation:\n  frequency: 2018-08-01\n  amount: -1000\nsavings:\n\
    \  frequency: every Monday starting in August\n  amount: -50\n''')\ncalendar =\
    \ build_calendar(budget)\nplot_budget(calendar)\n```\n\n# Loading YAML\n\nWe have\
    \ been defining our budget as inline YAML. If you want to keep your inputs separate\
    \ from your code (which is a good idea), we can adjust our workflow ever so slightly\
    \ to accommodate.\n\n![../images/469615_1_En_5_Chapter/469615_1_En_5_Figi_HTML.jpg](images/469615_1_En_5_Chapter/469615_1_En_5_Figi_HTML.jpg)\n\
    \n```\nwith open('data/budget.yaml', 'r') as f:\n    inputs = yaml.load(f)\ncalendar\
    \ = build_calendar(budget)\nplot_budget(calendar)\n```\n\nUsing a `with` block\
    \ to open and close the `.yaml` file is really the only adjustment that we have\
    \ to make!\n\n# Conclusion\n\nI hope you had fun with this chapter. I had a bunch\
    \ of fun writing it. But a word of caution: although this budget tool can be incredibly\
    \ powerful, if you do decide to use it, don’t be obsessive about it. Update your\
    \ `.yaml` file every quarter to see where you’re at and where you’re headed. Otherwise,\
    \ if you try to update it every day, you’re going to go crazy.\n\nFootnotes [1](#469615_1_En_5_Chapter.xhtml#Fn1_source)\
    \   [2](#469615_1_En_5_Chapter.xhtml#Fn2_source)   [3](#469615_1_En_5_Chapter.xhtml#Fn3_source)\
    \   [4](#469615_1_En_5_Chapter.xhtml#Fn4_source)   [5](#469615_1_En_5_Chapter.xhtml#Fn5_source)\
    \   [6](#469615_1_En_5_Chapter.xhtml#Fn6_source)"
