    okay because we had to round the payment to two decimal places because there’s
    no such thing as a fractional penny.)


    Though we did just successfully build an amortization schedule in Python and pandas,
    the loop strategy that we used isn’t exactly super efficient.


    What we just did basically looks like this:


    ![../images/469615_1_En_4_Chapter/469615_1_En_4_Figb_HTML.jpg](images/469615_1_En_4_Chapter/469615_1_En_4_Figb_HTML.jpg)


    While appending rows onto rows is fine for when we have to loop through only a
    couple of items, if and when faced with several hundred thousand (or even millions
    of) rows, things will quickly slow to a crawl.


    ## Loop B


    An alternative (and more efficient) way to construct an amortization schedule
    with a loop involves building all the rows that we need before we iterate instead
    of appending them at runtime.


    Building everything (or pre-allocating space) at the beginning allows us to achieve
    some pretty incredible speed gains and kind of looks like this:


    ![../images/469615_1_En_4_Chapter/469615_1_En_4_Figc_HTML.jpg](images/469615_1_En_4_Chapter/469615_1_En_4_Figc_HTML.jpg)


    With all of the rows prebuilt, we basically fill them up with values as we calculate
    them.


    Adjusting our code to fit this pre-allocation pattern is pretty easy. All we have
    to do is build out an empty DataFrame with 5 columns and 15 rows (15 because the
    example requires 14 months plus a zeroth month).


    ```

    balance = loan

    index = range(0, term + 1)

    columns = [''month'', ''payment'', ''interest'', ''principal'', ''balance'']

    df = pd.DataFrame(index=index, columns=columns)

    ```


    Instantiating the first row can be achieved with the `.iloc` method from pandas.


    ```

    df.iloc[0][''month''] = 0

    df.iloc[0][''balance''] = balance

    ```


    Running the actual loop is accomplished with `df.iloc[i][COLUMN]` for each column.


    I’ve stopped the loop prematurely so that we can see what’s happening at each
    step.


    |   | month | payment | interest | principal | balance |

    | --- | --- | --- | --- | --- | --- |

    | 0 | 0 | NaN | NaN | NaN | 3000 |

    | 1 | 1 | 222.07 | 14.38 | 207.69 | 2792.31 |

    | 2 | 2 | 222.07 | 13.38 | 208.69 | 2583.62 |

    | 3 | 3 | 222.07 | 12.38 | 209.69 | 2373.93 |

    | 4 | 4 | 222.07 | 11.38 | 210.69 | 2163.24 |

    | 5 | 5 | 222.07 | 10.37 | 211.7 | 1951.54 |

    | 6 | 6 | 222.07 | 9.35 | 212.72 | 1738.82 |

    | 7 | 7 | 222.07 | 8.33 | 213.74 | 1525.08 |

    | 8 | 8 | 222.07 | 7.31 | 214.76 | 1310.32 |

    | 9 | 9 | 222.07 | 6.28 | 215.79 | 1094.53 |

    | 10 | 10 | 222.07 | 5.24 | 216.83 | 877.7 |

    | 11 | NaN | NaN | NaN | NaN | NaN |

    | 12 | NaN | NaN | NaN | NaN | NaN |

    | 13 | NaN | NaN | NaN | NaN | NaN |

    | 14 | NaN | NaN | NaN | NaN | NaN |


    ```

    for i in range(1, 11):

    interest = round(rate/12 * balance, 2)

    principal = payment - interest

    balance = balance - principal

    df.iloc[i][''month''] = i

    df.iloc[i][''payment''] = payment

    df.iloc[i][''interest''] = interest

    df.iloc[i][''principal''] = principal

    df.iloc[i][''balance''] = balance

    df

    ```


    At index 10 the remaining balance of the loan is $877, and we have four more payments
    to make. Without truncating the loop at `range(1, 11)`, the amortization schedule
    will continue to run through month 14 and will generate the same schedule as before.


    ## Functionize


    Now that we have the efficient amortization logic assembled, let’s wrap our code
    into a function called `am`.


    ```

    def am(loan, rate, term):

    payment = np.round(-np.pmt(rate/12, term, loan), 2)

    balance = loan

    index = range(0, term + 1)

    columns = [''month'', ''payment'', ''interest'', ''principal'', ''balance'']

    df = pd.DataFrame(index=index, columns=columns)

    df.iloc[0][''month''] = 0

    df.iloc[0][''balance''] = balance

    for i in range(1, term + 1):

    interest = round(rate/12 * balance, 2)

    principal = payment - interest

    balance = balance - principal

    df.iloc[i][''month''] = i

    df.iloc[i][''payment''] = payment

    df.iloc[i][''interest''] = interest

    df.iloc[i][''principal''] = principal

    df.iloc[i][''balance''] = balance

    return df

    ```'
