  \n## 相关性严重程度检测\n\n清单 3-17 使用特征值法检测相关性严重程度。它纳入了*特征值*，即在线性变换后我们考虑的向量，以及特征向量，也称为特征负荷（见表\
  \ 3-6）。\n\n**表 3-6**  \n特征矩阵\n\n| | 特征值 | `social_contri` | `lending_rate` | `gdp_growth`\
  \ | `fin_cons` |\n| --- | --- | --- | --- | --- | --- |\n| `social_contri` | 2.741814\
  \ | 0.571562 | -0.727660 | -0.363008 | -0.109782 |\n| `lending_rate` | 0.078913\
  \ | -0.477992 | -0.051401 | -0.774123 | 0.411844 |\n| `gdp_growth` | 0.403418 |\
  \ -0.355849 | -0.015693 | -0.257158 | -0.898329 |\n| `fin_cons` | 0.775854 | 0.564103\
  \ | 0.683829 | -0.450365 | -0.106477 |\n\n```python\neigenvalues, eigenvectors =\
  \ np.linalg.eig(dfcorr)\neigenvalues = pd.DataFrame(eigenvalues)\neigenvalues.columns\
