- "# 4. 预测增长\n\n时间序列分析涉及检查序列数据中的模式和趋势，以预测序列的未来值。时间序列模型种类繁多，包括自回归移动平均模型（ARIMA）（p, d,\
  \ q），该模型在前值与当前值之间应用线性变换（自回归）、积分（随机游走）和移动平均。有一种包含季节性的 ARIMA 模型，称为季节性 ARIMA (P, D,\
  \ Q) x (p, d, q)。本章考虑加法模型，该模型通过平滑参数识别非线性。就本书而言，您可以将时间序列分析视为线性回归的扩展，因为它研究的是序列数据。主要区别在于，在时间序列分析中，您需要按时间对数据进行排序，这使得其假设比线性回归模型严格得多。在训练模型之前，您必须使用增强迪基-富勒检验来检验*平稳性*，检验是否存在白噪声，并检验自相关性。\n\
  \n本章研究美国每年生产的最终商品和服务市场价值的这些趋势（见公式 4-1）：\n\n- 方向性运动——持续向上的运动是上升趋势，持续向下的运动是下降趋势\n\
  - 季节性——持续的逐年运动（向上或向下）\n- 不规则成分——也称为残差成分\n\n最后，该模型预测未来的经济活动。请注意，它并非描述数据的集中趋势，因为前一章已完成该工作。\n\
  \n本章使用由 Facebook 开发的名为 Prophet 的 Python 库。该库基于加法模型。\n\n在继续之前，请确保您的环境中已安装`fbprophet`库。要在\
  \ Python 环境中安装`fbprophet`库，请使用`pip install fbprophet`。同样地，要在 Conda 环境中安装该库，请使用`conda\
  \ install -c conda-forge fbprophet`。您还需要安装`pystan`库。在 Python 环境中执行此操作，请使用`pip install\
  \ pystan`，在 Conda 环境中，请使用`conda install -c conda-forge pystan`。\n\n列表 4-1 提取了美国\
  \ GDP 增长数据（年百分比）并绘制了该序列（见图 4-1）。\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig1_HTML.png](img/516940_1_En_4_Fig1_HTML.png)\n\
  \n**图 4-1**  \n美国 GDP 增长折线图\n\n```python\nimport wbdata\nimport matplotlib.pyplot\
  \ as plt\n%matplotlib inline\ncountry = [\"USA\"]\nindicator = {\"FI.RES.TOTL.CD\"\
  :\"gdp_growth\"}\ndf = wbdata.get_dataframe(indicator, country=country, convert_date=True)\n\
  df.plot(kind=\"line\",color=\"green\",lw=4)\nplt.title(\"The U.S. GDP growth (annual\
  \ %)\")\nplt.xlabel(\"Dates\")\nplt.ylabel(\"GDP growth (annual %)\")\nplt.legend(loc=\"\
