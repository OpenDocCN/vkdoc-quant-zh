  \ -7.092189e+12。下一节将概述相关方法，并解释针对此问题应使用哪种相关方法。\n\n\n\n## 相关性分析\n\n与协方差分析展示变量如何相互变化不同，*相关性分析*用于估计变量之间的依赖关系。主要有三种相关性方法——皮尔逊相关方法（可估计连续变量之间的依赖关系）、肯德尔方法（可估计分类变量之间的依赖关系）以及斯皮尔曼方法（同样可估计分类变量之间的关联关系）。宏观经济数据通常是连续的，因此本章使用皮尔逊相关方法。本书大部分章节都使用此方法，但第\
  \ 5 章除外，该章使用了肯德尔方法。公式 2-7 用于估计协方差，然后将该估计值除以预测变量和响应变量的离散程度，从而得到皮尔逊相关系数。\n\n![$$ {r}_{xy}=\\\
