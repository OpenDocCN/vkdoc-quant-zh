  ### 结论


  本章涵盖了深度学习。它解析了基本的深度学习概念。它介绍了使用 `scikit-learn` 库开发人工神经网络的技术。您学习了如何开发和评估一种浅层人工神经网络——受限玻尔兹曼机，包括多层感知器。基于研究结果，通过应用
