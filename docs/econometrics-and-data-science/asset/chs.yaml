  ## 结构方程模型估计


  SEM 通过应用最大似然法或广义最小二乘法对变量进行操作。当回归的隐式假设不满足时，最大似然法仍然有效，它能确定最适合数据的参数。广义最小二乘法则对变量进行回归。代码清单
  10-11 构建了模型的假设框架。


  ```

  import semopy

  import wbdata

  from semopy import Model

  import semopy

  import wbdata

  from semopy import Model

  mod = """   life_exp ~ gdp_per_capita

  final_con ~ inflation + life_exp + gdp_per_capita

  """

