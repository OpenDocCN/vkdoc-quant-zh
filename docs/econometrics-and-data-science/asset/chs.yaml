  ## 人工神经网络结构构建


  列表 8-16 构建了一个函数来创建神经网络的架构。输入层的激活函数是 ReLu。这意味着模型将作用于变量——城市人口、人均 GNI（按 Atlas 方法计算，以当前美元计）以及
  GDP 增长率（年百分比）——并生成输出。列表 8-16 在输入层中包含了一个额外节点。在输出层，网络应用 sigmoid 函数（它作用于这些预测变量并生成南非预期寿命的下降或上升）。用于训练的损失函数是
  `binary_crossentropy`。指定此损失函数告知神经网络它将处理一个分类变量。用于评估神经网络的指标是 `accuracy`，我们应用 `adam`
  优化器随机选择变量。我们还处理了梯度消失问题并加快了训练过程。


  ```

  def create_dnn_model():

  model = Sequential()

  model.add(Dense(4, input_dim=3, activation="relu"))

  model.add(Dense(1, activation="sigmoid"))

  model.compile(loss="binary_crossentropy", optimizer="adam", metrics=["accuracy"])

  return model

