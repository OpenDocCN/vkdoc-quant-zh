  \ Statsmodels 开发普通最小二乘回归模型\n\n本节介绍最常用的回归模型，称为普通最小二乘模型，该模型用于估计截距和系数，同时减少残差（请回顾公式\
  \ 2-1）。\n\n代码清单 2-12 将数据转换为所需格式。首先构造一个 `x` 数组（美国贷款利率的数据点）和一个 `y` 数组（美国最终消费支出（现价美元）的数据点）。\n\
  \n然后对数据进行重塑，以便普通最小二乘回归模型能更好地学习数据，接着通过应用 `train_test_split()` 方法将数据分割为训练数据和测试数据。最后，它通过应用\
  \ `StandardScaler()` 方法对数据进行标准化处理，使得数据点的均值为 0，标准差为 1。\n\n为了验证美国贷款利率影响美国最终消费支出的论断，你需要计算\
  \ p 值以确定该关系的显著性。此外，你还需要确定普通最小二乘模型在估计最终消费支出的未来值时损失了多少信息。为了进一步评估所选模型的性能，你必须估计 R² 分数。\n\
  \n表 2-7 概述了用于检验美国贷款利率与美国最终消费支出之间关系显著性的估计器类型。它还展示了模型如何学习可用的美国宏观经济数据，以及如何生成美国最终消费支出的未来实例，包括在估计这些实例时产生的误差。此外，它还详细说明了模型在多大程度上解释了美国贷款利率的变化如何影响美国最终消费支出的变化。总之，它有助于你决定是否必须接受所建立宏观经济现象的存在，以及你可以在多大程度上依赖该模型来估计未来实例。\n\
