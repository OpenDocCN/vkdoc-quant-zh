  \n### 轮廓系数法\n\n你可以依赖轮廓系数法来确定模型在多大程度上做出了合理的推测（见清单 7-15）。它估计了平均最近聚类距离与类内距离之间的差值，以及最大平均最近聚类距离与类内距离。它返回一个从\
  \ -1 到 1 的值，其中 -1 表示模型很差，0 表示模型一般，1 表示模型在推测方面表现优异。\n\n```\nfrom sklearn import metrics\n\
  metrics.silhouette_score(df, y_predkmeans)\n0.43409785393807543\nListing 7-15\n\
  Find Silhouette Score\n```\n\n轮廓系数得分为 0.43401。这意味着该分类器在估计非洲国家的人均国民总收入标签方面表现一般。\n\
  \n### 结论\n\n本章介绍了一种用于聚类的无监督机器学习模型，即 *K-Means 模型*。我们使用默认超参数开发了一个模型，并估计了非洲国家人均国民总收入值之间的距离。随后，根据人均国民总收入将这些国家分组到不同的聚类中。本章以对无监督机器学习的讨论作为结束。\n\
  \n\n\n"
- '# 8. 应用人工神经网络解决经济问题


  深度学习通过使用人工神经网络来操作一组预测变量并预测未来的响应变量，从而扩展了机器学习。人工神经网络是一组节点，它们在输入层接收输入值，并在随后的隐藏层（介于输入层和输出层之间的层）中对这些值进行转换。这个隐藏层会转换节点，并分配不同的*权重*（决定输入值对输出值影响程度的向量参数）和*偏置*（一个始终为
  1 的平衡值）。之后，它们通过应用激活函数在输出层生成一组输出值。人工神经网络是深度学习的一部分，它通过构建模型并以复制人类神经活动为基础，推动了机器学习的发展。*传播*是训练网络的过程（通常通过反向传播，即从输出层开始反向更新权重）。


  传统的机器学习模型最适合处理小规模数据。增加数据量会带来新的问题，因为传统模型的计算成本很高。大多数集成模型（用于解决回归和分类问题的模型）在训练的初始阶段过于乐观，并且大部分预测都是正确的。例如，梯度开始时看起来很小，然后随着数据量的增加而扩大——这种现象被称为*梯度消失问题*。梯度下降算法应对了这个问题，这是构建网络的基础。


  在继续之前，请确保你的环境中已安装 `tensorflow` 库。要在 Python 环境中安装 `tensorflow` 库，请使用 `pip install
  tensorflow`。同样，要在 Conda 环境中安装该库，请使用 `conda install -c conda-forge tensorflow`。同时安装
  Keras 库。在 Python 环境中，使用 `pip install keras`；在 Conda 环境中，使用 `conda install -c conda-forge
  keras`。


