  \n**图 4-3**  \n美国 GDP 增长箱线图\n\n图 4-3 显示不再有异常值。\n\n\n\n### 平稳性检测\n\n如果序列数据中存在随机性（单位根），则表示该数据是平稳的，这意味着变量的均值几乎是恒定的或接近均值。大多数时间序列分析模型都假设序列具有单位根。最常见的平稳性检验是增广迪基-福勒检验（见列表\
  \ 4-6），它扩展了迪基-福勒检验。应用增广迪基-福勒检验时，请确保 `p-value` 是显著的。表 4-2 定义了滞后数、F 统计量百分比和 `p-value`。\n\
  \n**表 4-2** 增广迪基-福勒检验结果\n\n| 变量 | 值 |\n| --- | --- |\n| `ADF F% Statistics` | -0.962163\
  \ |\n| `P-value` | 0.766813 |\n| `No. of Lags Used` | 0.000000 |\n| `No. of Observations`\
  \ | 60.000000 |\n\n```\nfrom statsmodels.tsa.stattools import adfuller\nadfullerreport\
  \ = adfuller(df[\"gdp_growth\"])\nadfullerreportdata = pd.DataFrame(adfullerreport[0:4],\n\
  columns = [\"Values\"],\nindex=[\"ADF F% statistics\",\n\"P-value\",\n\"No. of lags\
  \ used\",\n\"No. of observations\"])\nadfullerreportdata\n列表 4-6\n增广迪基-福勒检验结果\n\
  ```\n\n表 4-2 显示该序列不存在平稳性，因为 `p-value` 大于 0.5。通常，您需要在建模前对序列进行差分。请注意，该检验有一个原假设，认为序列非平稳；同时还有一个备择假设，认为序列是平稳的。\n\
  \n### 随机白噪声检测\n\n列表 4-7 生成一组随机变量，并检查数据的均值是否接近 0（见图 4-4）。\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig4_HTML.png](img/516940_1_En_4_Fig4_HTML.png)\n\
  \n**图 4-4** 随机白噪声\n\n```\nfrom pandas.plotting import autocorrelation_plot\nrandval\
  \ = np.random.randn(1000)\nautocorrelation_plot(randval)\nplt.title(\"Random white\
  \ noise\")\nplt.show()\n列表 4-7\n随机白噪声\n```\n\n图 4-4 显示均值在 0 附近。这表明序列在不同滞后期上的模式是相似的。\n\
  \n## 自相关检测\n\n在简单线性回归中，相关分析在模型开发中起着至关重要的作用。然而，时间序列分析关注的是独立观测值（`y`）与随时间变化的独立观测值（`y[t]`）之间的序列统计依赖性。列表\
  \ 4-8 是一个自相关函数，用于理解不同滞后期的自相关性（见图 4-5）。当自相关系数落于图 4-5 中的蓝色区域时，它们是显著的。\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig5_HTML.png](img/516940_1_En_4_Fig5_HTML.png)\n\
  \n**图 4-5** 美国 GDP 增长率（年百分比）ACF\n\n```\nfrom statsmodels.graphics.tsaplots import\
  \ plot_acf\nplot_acf(df[\"gdp_growth\"])\nplt.title(\"\")\nplt.xlabel(\"Lag\")\n\
  plt.ylabel(\"ACF\")\nplt.title(\"The U.S. GDP growth (annual %) autocorrelation\"\
  )\nplt.show()\n列表 4-8\n美国 GDP 增长率（年百分比）ACF\n```\n\n列表 4-9 展示了 `lag1` 中的独立观测值（见图\
  \ 4-6）。滞后图有助于解释任何滞后（`y[t]` 之间的间隔）与相关性之间的关系。\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig6_HTML.png](img/516940_1_En_4_Fig6_HTML.png)\n\
  \n**图 4-6** 美国 GDP 增长率滞后图\n\n```\nfrom pandas.plotting import lag_plot\nlag_plot(df[\"\
  gdp_growth\"])\nplt.title(\"The U.S. GDP growth (annual %) lag 1\")\nplt.show()\n\
  列表 4-9\n美国 GDP 增长率（年百分比）滞后图\n```\n\n图 4-6 显示，在 `lag1` 中，`y[t]` 和 `y[(t+1)]` 之间存在相关关系。\n\
  \n## 不同的单变量时间序列模型\n\n本章将时间序列分析应用于一个连续变量。以下各节概述了不同的时间序列分析模型。\n\n### 自回归积分滑动平均模型\n\
  \n自回归积分滑动平均模型（ARIMA）意味着它对前向值和当前值（自回归）、整合（随机游走）以及滑动平均（前向值和当前值的权重）应用线性变换。它是最常见的时间序列模型。该模型假设前向值之间存在线性关系，并且序列是平稳的。不仅如此，它还考虑了当前权重与前向加权值之间的差异。\n\
  \n### 季节性自回归积分滑动平均模型\n\n季节性自回归积分滑动平均模型（SARIMA）扩展了 ARIMA 模型，它考虑了季节性（一种持续的逐年变动——上升或下降）。公式\
  \ 4-1 是 SARIMA 的公式。\n\n![$$ {Y}_t={S}_t+{T}_t+{I}_t+\\varepsilon i $$](img/516940_1_En_4_Chapter_TeX_Equ1.png)\n\
  \n（公式 4-1）\n\n其中，`S[t]` 表示季节性，`T[t]` 表示趋势，`I[t]` 表示不规则性，`ε[i]` 是误差项。SARIMA 考虑了季节性，但没有考虑公共假日等事件的影响。为了解决这个问题，开发人员经常使用加法模型。\n\
  \n## 加法模型\n\n加法模型考虑了公共假日等事件的影响。它通过包含平滑参数和添加非线性，调整函数中的非线性属性，并将预测范围缩小到特定的置信区间。开发加法模型最可靠的库是\
  \ FB Prophet。列表 4-10 对数据进行了重新整理（见表 4-3）。\n\n**表 4-3** 美国 GDP 增长率（年百分比）重新整理后的数据\n\
  \n| 日期 | `gdp_growth` | `ds` | `y` |\n| --- | --- | --- | --- |\n| 2020-01-01 |\
  \ 1.822831e+11 | 1.822831e+11 | 2020-01-01 |\n| 2019-01-01 | 1.822831e+11 | 1.822831e+11\
  \ | 2019-01-01 |\n| 2018-01-01 | 1.822831e+11 | 1.822831e+11 | 2018-01-01 |\n| 2017-01-01\
  \ | 1.822831e+11 | 1.822831e+11 | 2017-01-01 |\n| 2016-01-01 | 1.822831e+11 | 1.822831e+11\
  \ | 2016-01-01 |\n| ... | ... | ... | ... |\n| 1964-01-01 | 1.672549e+10 | 1.672549e+10\
  \ | 1964-01-01 |\n| 1963-01-01 | 1.687865e+10 | 1.687865e+10 | 1963-01-01 |\n| 1962-01-01\
  \ | 1.725246e+10 | 1.725246e+10 | 1962-01-01 |\n| 1961-01-01 | 1.882553e+10 | 1.882553e+10\
  \ | 1961-01-01 |\n| 1960-01-01 | 1.966416e+10 | 1.966416e+10 | 1960-01-01 |\n\n\
  ```\ndf = df.reset_index()\ndf[\"ds\"] = df[\"gdp_growth\"]\ndf[\"y\"] = df[\"date\"\
  ]\ndf.set_index(\"date\")\n列表 4-10\n重新整理美国 GDP 增长率（年百分比）数据\n```\n\n## 加法模型开发\n\n\
  使用 FB Prophet 库开发加法模型相当简单。列表 4-11 调用了 `Prophet()` 并训练了模型。\n\n```\nfrom fbprophet\
  \ import Prophet\nm = Prophet()\nm.fit(df)\n列表 4-11\n训练加法模型\n```\n\n\n\n## 加法模型预测\n\
  \n清单 4-12 构建了一个未来三年的数据框，并绘制了加法模型预测的数据点。\n\n```\nfuture = m.make_future_dataframe(periods=3)\n\
  forecast = m.predict(future)\nm.plot(forecast)\nplt.title(\"The U.S. GDP growth\
  \ (annual %) forecast\")\nplt.xlabel(\"Date\")\nplt.ylabel(\"GDP growth (annual\
  \ %)\")\nplt.show()\nListing 4-12\nPlot U.S. GDP Growth Forecast\n```\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig7_HTML.png](img/516940_1_En_4_Fig7_HTML.png)\n\
  \n图 4-7\n\n美国 GDP 增长预测\n\n图 4-7 显示美国 GDP 增长将出现激增。下一节将讨论季节性分解——时间序列分析的一个重要方面。然而，考虑到该数据的结构，我们不会提供示例。显而易见，该图没有正确显示日期。\n\
  \n### 季节性分解\n\n季节性分解涉及将序列数据分解为几个组成部分，以便开发者能更好地理解该序列。这些组成部分包括：\n\n- 季节性，代表随时间变化的永久性模式。\n\
  - 趋势，代表序列中随时间变化的暂时性持续模式。\n- 不规则波动，代表美国 GDP 增长数据的变异性。\n\n鉴于数据收集的频率以及美国 GDP 增长的数据点较少，本章不涉及季节性分解。这些数据是每年收集的，我们无法将季节性分解为每日和每周的季节性。然而，理解季节性分解的工作原理仍然很重要。\n\
  \n### 结论\n\n本章介绍了一种名为加法模型的时间序列分析模型。在拟合模型之前，您学习了如何通过检验平稳性、白噪声、自相关和正态性来确认时间序列分析的假设。此后，本章涵盖了趋势、季节性和残差。该模型预测美国年度\
  \ GDP 增长将出现主导性的上升趋势。下一章将介绍一种名为*逻辑回归*的分类方法。当您想操作预测变量以生成二元输出值时，可以使用此模型。\n\n"
- "# 5. 应用逻辑回归对经济数据进行分类\n\n本章应用逻辑回归来研究在响应变量为分类变量（即仅限于少数几个类别）时变量之间关系的性质。该模型是最常见的非线性模型，通常被称为*分类*。它使用\
  \ Sigmoid 函数对数据进行建模。\n\n图 5-1 展示了分类器如何操作预测变量以生成二元输出值。方程 5-1 显示了 sigmoid 方程。\n\n\
  ![$$ s(x)=\\frac{1}{}1+e-x $$](img/516940_1_En_5_Chapter_TeX_Equ1.png)\n\n（方程 5-1）\n\
  \n您可能已经注意到宏观经济数据通常是连续的。不必担心，您仍然可以对这类数据执行逻辑回归。您需要做的只是根据方向（上升或下降）对响应变量进行分类。这可以基于一个\
  \ S 形公式，即所谓的 *sigmoid 形状*（参见图 5-1）。\n\n![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig1_HTML.png](img/516940_1_En_5_Fig1_HTML.png)\n\
  \n图 5-1\n\nSigmoid 函数\n\n![$$ \\left(\\right)\\frac{}{}1+-x $$](img/516940_1_En_5_Chapter_TeX_Equa.png)\n\
  \n在线性回归中，响应变量是连续的。另一方面，在逻辑回归中，响应变量是二元的，并且可以应用于多类分类。此外，分类器不对数据的线性关系和正态性做出极端假设。\n\n\
  ## 本章背景\n\n本章通过应用一组其他经济指标——城市人口、人均国民总收入（Atlas 法，现价美元）和 GDP 增长（年百分比）——来预测南非出生时预期寿命（总年数）的增减。*人均国民总收入*是一个国家公民的平均国民收入，此处指南非的情况。表\
  \ 5-1 概述了本章研究的南非宏观经济指标。\n\n表 5-1\n\n本章涉及的宏观经济指标\n\n| 代码 | 指标 |\n| --- | --- |\n\
  | `SP.URB.TOTL` | 南非城市人口 |\n| `NY.GNP.PCAP.CD` | 南非人均国民总收入，Atlas 法（现价美元） |\n| `NY.GDP.MKTP.KD.ZG`\
  \ | 南非 GDP 增长（年百分比） |\n| `SP.DYN.LE00.IN` | 南非出生时预期寿命，总计（年） |\n\n## 理论框架\n\n图 5-2\
  \ 提供了本问题的框架。\n\n![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig2_HTML.png](img/516940_1_En_5_Fig2_HTML.png)\n\
  \n图 5-2\n\n框架\n\n### 城市人口\n\n城市人口代表人口密度高的区域（即城市）中的人口。清单 5-1 和图 5-3 展示了南非的城市人口。\n\
  \n![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig3_HTML.png](img/516940_1_En_5_Fig3_HTML.png)\n\
  \n图 5-3\n\n南非城市人口\n\n```\nimport wbdata\ncountry  = [\"ZAF\"]\nindicators = {\"\
  SP.URB.TOTL\":\"urban_pop\"}\nurban_pop = wbdata.get_dataframe(indicators, country=country,\
  \ convert_date=True)\nurban_pop.plot(kind=\"line\",color=\"green\",lw=4)\nplt.title(\"\
  S.A. urban population\")\nplt.ylabel(\"Urban population\")\nplt.xlabel(\"Date\"\
  )\nplt.show()\nListing 5-1\nSouth Africa’s Urban Population\n```\n\n图 5-3 显示自 1960\
  \ 年以来南非城市人口强劲增长。\n\n### 人均国民总收入，Atlas 法\n\n人均国民总收入代表一个国家公民的平均收入。在此示例中，我们应用 Atlas\
  \ 法。清单 5-2 和图 5-4 展示了南非的人均国民总收入。\n\n![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig4_HTML.png](img/516940_1_En_5_Fig4_HTML.png)\n\
  \n图 5-4\n\n南非人均国民总收入\n\n```\ncountry  = [\"ZAF\"]\nindicators = {\"NY.GNP.PCAP.CD\"\
  :\"gni_per_capita\"}\ngni_per_capita = wbdata.get_dataframe(indicators, country=country,\
  \ convert_date=True)\ngni_per_capita.plot(kind=\"line\",color=\"orange\",lw=4)\n\
