- "# 7. 按大洲层级对人均国民总收入进行聚类\n\n本章介绍无监督机器学习。在无监督机器学习中，你不会分割数据，而是将整个数据集呈现给模型，让模型自行发现数据中的模式，无需任何监督。鉴于本章涵盖聚类分析，因此将介绍最简单的无监督机器学习模型，称为*k-means*。`k-means`方法易于理解。在进行聚类分析时，没有真正的响应变量——你以同样的方式处理所有变量。也没有预测变量，因此不存在预测/预报的情况。你仅需分析数据中的模式。\n\
  \n`k-means`模型根据值的相似性对其进行分组。首先，模型找出彼此接近的值，并估计它们之间的距离。然后，确定这组值的中心，并以某种方式拉伸这些值，使它们都落在同一个簇内。它通过实施距离估计来寻找组内的相似性。最常见的距离估计方法是欧几里得距离估计。公式\
  \ 7-1 展示了欧几里得方程。\n\n![$$ J={\\sum}_{i=1}^k{\\sum}_{i=1}^c{\\left|\\left|{x}_i^J-{C}_j\\\
  right|\\right|}² $$](img/516940_1_En_7_Chapter_TeX_Equ1.png)\n\n（公式 7-1）\n\n其中，`J`代表目标函数，`k`代表聚类数量，`n`代表案例数量，`x_i^J`代表*案例*[*j*]，`C[j]`代表`j`的质心。\n\
  \n该模型与其他模型的不同之处在于，它假设你是基于数据分析来确定聚类数量。要确定聚类数量，你可以应用肘部曲线或碎石图。\n\n\n\n## 本章背景\n\n本章基于数据中存在三个簇的假设来探讨问题。它通过应用以下三个标签对非洲国家进行分组：\n\
  \n- 低人均国民总收入（GNI）\n- 中等人均国民总收入\n- 高人均国民总收入\n\n本章运用肘部曲线来判断关于数据的这一假设是否正确，然后对非洲国家的全部人均国民总收入数据使用\
  \ k-means 模型。由于存在众多变量，因此并未描述全部数据。\n\n要进行聚类分析，首先需要执行描述性分析，然后进行降维处理，将高维数据降至少数几个维度。前面的章节介绍了名为主成分分析（PCA）的降维技术。该技术能缩减数据，使你能够通过应用散点图以二维形式呈现数据。清单\
