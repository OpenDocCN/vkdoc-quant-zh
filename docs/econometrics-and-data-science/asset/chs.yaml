  \n### 结论\n\n本章介绍了如何应用普通最小二乘回归模型来寻找横截面数据的答案。该方法首先确定了数据点的分布，然后处理了缺失的数据点和异常值。接着，它检验了美国贷款利率（百分比）与最终消费支出（现价美元）之间的联合变异性和关联性。然后，它应用了皮尔逊相关方法，发现美国贷款利率与美国最终消费支出之间存在负相关。\n\
