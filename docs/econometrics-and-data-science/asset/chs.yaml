  \ 代表误差项（参考公式 2-2）。\n\n![$$ i{\\hat{\\varepsilon}}_i=y-\\hat{y} $$](img/516940_1_En_2_Chapter_TeX_Equ2.png)\n\
  \n**（公式 2-2）**\n\n其中 `ε[i]` 是误差项（也称为*残差项*）——代表 `yi`（实际的美国最终消费支出）与 ![$$ \\hat{y}\
  \ $$](img/516940_1_En_2_Chapter_TeX_IEq6.png)`[i]`（预测的美国最终消费支出）之间的差值。\n\n带帽号（^）的变量（样本回归函数）与不带帽号的变量（总体回归函数）之间存在区别。我们是从总体样本中估计那些带帽号的变量，而不是从整个总体中估计。\n\
  \n## 本章背景\n\n本章使用普通最小二乘回归模型来确定预测变量（美国贷款利率，以百分比表示）与响应变量（最终消费支出，以现价美元计）之间的线性关系。表 2-1\
  \ 概述了本章使用的宏观经济指标。\n\n**表 2-1**  \n本章使用的美国宏观经济指标\n\n| 代码 | 标题 |\n| --- | --- |\n\
  | `FR.INR.LEND` | 贷款利率（以百分比表示） |\n| `NY.GDP.MKTP.KD.ZG` | 最终消费支出（以现价美元计） |\n\n##\
  \ 理论框架\n\n图 2-2 展示了本章探讨的关系。它建立了研究假设。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig2_HTML.png](img/516940_1_En_2_Fig2_HTML.png)\n\
  \n**图 2-2**  \n理论框架\n\n**假设**\n\n`H[0]`：美国贷款利率（%）与最终消费支出（现价美元）之间无显著差异。\n\n`H[A]`：美国社会缴款与最终消费支出（现价美元）之间存在显著差异。\n\
  \n该研究假设旨在确定美国贷款利率的变化是否会影响最终消费支出（现价美元）。\n\n### 贷款利率\n\n贷款利率估计了私营银行对短期和中期贷款收取的利息率。我们以年百分比表示该估计值。图\
  \ 2-3 展示了从 1960 年到 2020 年美国私营银行对短期和中期融资收取的利率。在继续之前，请确保您的环境中已安装 Matplotlib 库。要在 Python\
  \ 环境中安装 Matplotlib 库，请使用 `pip install matplotlib`。同样，要在 Conda 环境中安装该库，请使用 `conda\
  \ install -c conda-forge matplotlib`。见列表 2-1。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig3_HTML.jpg](img/516940_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3**  \n美国贷款利率\n\n```\nimport wbdata\nfrom matplotlib.pyplot import\n%matplotlib\
