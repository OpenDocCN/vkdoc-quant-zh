- '# 经济设计


  经济设计基于这样一种理念：如果我们能够准确估计宏观经济现象，就可以设计出有助于管理经济的机制。如前所述，有多个成熟的机构可以提供可靠的实际宏观经济数据。请注意，我们无法估计整体人口，但可以使用样本（人口的代表），因为统计估计中存在误差。由于有可靠的宏观经济数据源池，我们可以应用这些数据，并通过应用定量模型来研究一致的模式，从而理解经济状况。当我们确信某个模型能够准确估计我们意图估计的目标且效果显著时，就可以应用该模型来预测经济事件。请记住，科学事业的主要目的是通过应用定量模型来预测事件并控制其底层机制。


  计量经济学运用统计原理来估计总体参数，但最终的检验标准始终是经济意识形态。只有经济理论能够验证/反驳结果，这些结果可进一步用于确定因果关系/相关性等。显而易见，政治在现代生活中占据着至关重要的地位。政治情绪通常伴随着对经济及其应然状态的坚定信念。这些信念可能并不反映经济现实。当有关经济的信念荒谬不实时，就无法用设计的解决方案来应对紧迫的社会问题。要令人满意地解决经济问题，你必须持有合乎逻辑的观点；否则，情感、标准假设和权威知识会稀释你对经济的分析。


  总之，政策制定者应用计量经济学来设计和修订经济政策，以便正确解决经济问题。这意味着他们需要研究历史经济事件，开发复杂的定量模型，并应用这些模型的研究结果（前提是这些结果可靠）来驱动经济政策。计量经济学是一种寻找经济相关问题答案的方法。以证据为导向的政策制定者通过应用实际数据来推动政策制定举措，而不是依赖政治和经济意识形态。


  ## 理解统计学


  统计学是致力于在原始数据中发现一致模式，从而对已知现象得出逻辑结论的领域。它涉及研究数据的集中趋势（均值）和离散程度（标准差），然后应用定量模型研究关于该现象的理论主张。此外，商业机构将其应用于临时报告、研究和业务流程控制中。研究人员还将统计学应用于自然科学、物理科学、化学、工程学和社会科学等领域。它是定量研究的支柱。


  ### 机器学习建模


  统计学与机器学习之间存在联系。在本书中，我们将机器学习视为统计学的延伸，它融合了计算机科学等领域的技术。机器学习方法源于统计原理和方法。我们以“应用”和“自动化”为导向来处理机器学习问题。通过机器学习，最终目标不是得出某种结论，而是自动化单调的任务，并为这些自主任务确定可复制的模式。图
  1-2 展示了定量模型如何运作。


  ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig2_HTML.png](img/516940_1_En_1_Fig2_HTML.png)


  *图 1-2——基础机器学习模型*


  图 1-2 展示了基本的机器学习模型流程。首先，我们从数据库中提取数据，然后进行预处理和分割。接着，通过应用一个接收预测变量并对其进行操作以生成输出值的函数来对数据进行建模。变量代表一个我们可以观察和估计的过程。在机器学习中，将模型部署为网页应用或网页应用的一部分是常见做法。


  ### 深度学习建模


  深度学习应用模拟人类神经结构的人工神经网络（一种相互连接的节点网络）。人工神经网络是一组节点，它在输入层接收输入值，将输入值转换到后续的隐藏层（输入层和输出层之间的层），该隐藏层对它们进行转换并分配不同的*权重*（决定输入值对输出值影响程度的向量参数）和*偏置*（一个平衡值，通常为
  1）。它是机器学习的一个子类，旨在解决我们在传统定量模型中遇到的一些困难。例如，梯度消失问题——在训练过程的初始阶段梯度很小，随着我们添加更多数据而增大的情况。还有其他类型的人工神经网络，例如受限玻尔兹曼机——一个位于隐藏层和输出层之间的浅层网络，多层感知器——具有两个以上隐藏层的神经网络，循环神经网络——用于处理序列数据的神经网络，以及卷积神经网络——用于降维的神经网络，常用于计算机视觉。本书涵盖了受限玻尔兹曼机和多层感知器。图
  1-3 展示了一个多层感知器分类器。


  ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig3_HTML.png](img/516940_1_En_1_Fig3_HTML.png)


  *图 1-3——多层感知器分类器示例*


  图 1-3 显示，多层感知器分类器由一个输入层组成，该层获取输入值（X1、X2 和 X3）并将它们传递到第一个隐藏层。该层随后获取这些值，并通过应用一个函数（在此例中为
  Sigmoid 函数）对其进行转换。它传递一个输出值，该值随后被传递到第二个隐藏层，第二个隐藏层也获取输入值。该过程反复进行——它转换值并将它们传递到输出层，并生成一个输出值，在图
  1-3 中表示为 `Y`。我们认识到网络用于学习数据结构训练过程，即反向传播（反向更新权重）。第 8 章将介绍深度学习。



