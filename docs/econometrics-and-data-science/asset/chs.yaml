- "# 3. 应用回归的多变量消费研究\n\n上一章涵盖了多元线性回归——一种通过应用单个预测变量来预测连续响应变量的模型。在实际情况下，你可能会遇到不止一个预测变量，因此本章介绍了将多个变量恰当地拟合到回归方程中的方法。它应用普通最小二乘回归模型来确定美国社会缴款（现价本币单位）、贷款利率（百分比）以及\
  \ GDP（国内生产总值）年度增长百分比的变化是否会影响最终消费支出（现价美元）的变化。\n\n首先，该模型检查数据是否来自正态分布。接着，它应用皮尔逊相关方法来研究变量之间的相关性，然后运用特征矩阵来确定变量间的多重共线性严重程度。随后，它通过应用一种称为*主成分分析*的降维技术将数据降至二维。然后，它将预测变量拟合到回归模型中，以预测美国最终消费支出。最后，它确定了残差的集中趋势和分布，并研究了随着训练数据增加，模型如何学习做出可靠的预测。\n\
  \n## 本章背景\n\n预测变量包括美国社会缴款（现价本币单位）、贷款利率（百分比）和 GDP 增长（年度百分比），响应变量是美国最终消费支出（现价美元）。表\
  \ 3-1 概述了宏观经济指标并展示了它们的代码。\n\n**表 3-1**  \n本章所用美国宏观经济指标\n\n| 代码 | 标题 |\n| --- | ---\
  \ |\n| `GC.REV.SOCL.CN` | 美国社会缴款（现价本币单位） |\n| `FR.INR.LEND` | 美国贷款利率（百分比） |\n| `NY.GDP.MKTP.KD.ZG`\
  \ | 美国 GDP 增长（年度百分比） |\n| `NE.CON.TOTL.CD` | 美国最终消费支出（现价美元） |\n\n### 社会缴款（现价本币单位）\n\
  \n社会缴款是指组织与员工共同缴纳的社会保障费用（参见代码清单 3-1）。其中可能还包括政府为保险而追加的缴款。图 3-1 展示了美国 1971 年至 2021\
  \ 年的社会缴款情况。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig1_HTML.png](img/516940_1_En_3_Fig1_HTML.png)\n\
  \n**图 3-1**  \n美国社会缴款（现价本币单位）\n\n```\nimport wbdata\ncountry = [\"USA\"]\nindicator\
  \ = {\"GC.REV.SOCL.CN\":\"social_contri\"}\nsocial_contri = wbdata.get_dataframe(indicator,\
  \ country=country, convert_date=True)\nsocial_contri.plot(kind=\"line\",color=\"\
  green\",lw=4)\nplt.title(\"The U.S. social contributions\")\nplt.ylabel(\"Social\
  \ contributions\")\nplt.xlabel(\"Date\")\nplt.show()\n```\n\n**代码清单 3-1**  \n美国社会缴款（现价本币单位）\n\
  \n图 3-1 显示了从 1971 年到 2020 年美国社会缴款数据明显的上升趋势。这表明目前美国的组织与员工对社会保障的缴费比以往任何时候都多。请注意，这些信息并未考虑通货膨胀——该指标并未完全反映这些缴款的实际变化。\n\
  \n### 贷款利率\n\n贷款利率是指金融机构在向客户提供贷款时收取的费率（参见代码清单 3-2）。它反映了借贷成本。低贷款利率意味着借款人在偿还债务时支付的费用较少。相反，高利率则意味着借贷成本较高。图\
  \ 3-2 展示了美国 1971 年至 2020 年的贷款利率。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig2_HTML.png](img/516940_1_En_3_Fig2_HTML.png)\n\
  \n**图 3-2**  \n美国贷款利率\n\n```\ncountry = [\"USA\"]\nindicator = {\"FR.INR.LEND\"\
  :\"lending_rate\"}\nlending_rate = wbdata.get_dataframe(indicator, country=country,\
  \ convert_date=True)\nsocial_contri.plot(kind=\"line\",color=\"orange\",lw=4)\n\
  plt.title(\"The U.S. lending interest rate (%)\")\nplt.ylabel(\"Lending interest\
  \ rate (%)\")\nplt.xlabel(\"Date\")\nplt.show()\n```\n\n**代码清单 3-2**  \n美国贷款利率\n\
  \n图 3-2 显示，在过去五十年里，美国贷款利率增长了超过 1.25%。\n\n\n\n### GDP 增长（年度百分比）\n\n`GDP` 代表国内生产总值。它估算了一个国家家庭每年消费的最终商品和服务的市场价值。它是诊断经济体健康状况的典型指标，因为它传达了一个国家的经济产出。估算\
  \ `GDP` 主要有两种方法：使用*名义* `GDP`（不考虑通货膨胀的 `GDP` 估算值），以及使用*实际* `GDP`（考虑通货膨胀的 `GDP` 估算值）。公式\
  \ 3-1 是 `GDP` 的公式。\n\n![$$ Y=C+I+G+\\left(X-M\\right) $$](img/516940_1_En_3_Chapter_TeX_Equ1.png)\n\
  \n（公式 3-1）\n\n其中 `Y` 代表 `GDP`，`C` 代表消费支出，`I` 代表投资，`G` 代表政府支出，`X` 代表出口，`M` 代表进口。图\
  \ 3-3 显示了 1971 年至 2020 年美国 `GDP` 年度百分比增长的变化。见代码清单 3-3。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig3_HTML.png](img/516940_1_En_3_Fig3_HTML.png)\n\
  \n**图 3-3**  \n美国 GDP 增长\n\n```\ncountry = [\"USA\"]\ngdp_growth = {\"NY.GDP.MKTP.KD.ZG\"\
  :\"gdp_growth\"}\ngdp_growth = wbdata.get_dataframe(indicator, country=country,\
  \ convert_date=True)\ngdp_growth.plot(kind=\"line\",color=\"navy\",lw=4)\nplt.title(\"\
  The U.S. GDP growth (annual %)\")\nplt.ylabel(\"GDP growth (annual %)\")\nplt.xlabel(\"\
  Date\")\nplt.show()\n```\n\n**代码清单 3-3**  \n美国 GDP 增长（年度百分比）\n\n图 3-3 显示了美国 `GDP`\
  \ 的锯齿状模式，该指标已根据通货膨胀进行了调整。1981 年，美国经历了 `GDP` 的最大变化。而在 2019 年，经济活动则非常低迷（`GDP` 增长了\
  \ 2.161176）。\n\n### 最终消费支出\n\n最终消费支出是家庭购买的所有商品和服务的市场价值（见代码清单 3-4）。这包括汽车和个人电脑等耐用品。图\
  \ 3-4 展示了按现价美元计算的美国最终消费支出。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig4_HTML.png](img/516940_1_En_3_Fig4_HTML.png)\n\
