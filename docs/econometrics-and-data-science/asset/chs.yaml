  \ 60 年代初以来，美国 GDP 增长呈上升趋势。2012 年初，美国 GDP 增长有所下降，随后在 2015 年恢复增长势头。列表 4-2 用平均值替代了任何缺失值。\n\
  \n```python\ndf[\"gdp_growth\"] = df[\"gdp_growth\"].fillna(df[\"gdp_growth\"].mean())\n\
