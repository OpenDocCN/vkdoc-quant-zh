  代码清单 7-6\n标准化数据\n```\n\n图 7-2 以二维散点图的形式展示了非洲各国的人均国民总收入。\n\n### 聚类数量检测\n\n代码清单 7-8\
  \ 使用肘部曲线来确定在训练 k-means 模型之前应包含的聚类数量。肘部曲线以*特征值*（线性变换后的标量向量）为 y 轴，以 *k* 值为 x 轴。\n\n\
  ```python\npca = PCA(n_components=3).fit(std_df)\npca_df = pca.transform(std_df)\n\
  pca_df = pca.transform(std_df)\nfrom sklearn.cluster import KMeans\nNc = range(1,20)\n\
  kmeans = [KMeans(n_clusters=i) for i in Nc]\nscores = [kmeans[i].fit(pca_df).score(pca_df)\
  \ for i in range(len(kmeans))]\nfig, ax = plt.subplots()\nplt.plot(Nc, scores,color=\"\
  navy\",lw=4)\nplt.xlabel(\"聚类数量\")\nplt.title(\"肘部曲线\")\nplt.ylabel(\"得分\")\nplt.show()\n\
  代码清单 7-8\n肘部曲线\n```\n\n![../images/516940_1_En_7_Chapter/516940_1_En_7_Fig3_HTML.png](img/516940_1_En_7_Fig3_HTML.png)\n\
  \n**图 7-3**  \n肘部曲线\n\n图 7-3 展示了肘部曲线。x 轴为 k 值（代表聚类数量），y 轴为畸变程度（代表特征值——线性变换后得到的标量）。y\
  \ 轴在很大程度上反映了该数据中变量之间相关性的严重程度，也称为 WSS（组内平方和）。要确定应包含多少个聚类，您需要确定*临界点*。要选择临界点，您需要识别肘部曲线开始急剧弯曲的那个点。在本例中，聚类数量为三个。\n\
  \n\n\n## K-Means 模型开发\n\n清单 7-9 通过应用所有数据和聚类数量（三个）来训练 K-Means 模型。\n\n```\nkmeans\
  \ = KMeans(n_clusters=3,\ncopy_x=False,\nmax_iter= 1,\nn_init= 10,\ntol= 1.0)\n\
