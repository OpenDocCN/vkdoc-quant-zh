  \n**图 4-2**  \n美国 GDP 增长分布\n\n图 4-2 显示，美国 GDP 增长数据中存在异常值。列表 4-5 用缺失值替代了异常值，并检查了新的分布。\n\
  \n```python\ndf['gdp_growth'] = np.where((df[\"gdp_growth\"] > 2.999999e+11),df[\"\
