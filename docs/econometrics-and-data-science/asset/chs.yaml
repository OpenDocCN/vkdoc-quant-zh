  ### 结构方程模型


  结构方程模型包含一组用于确定变量间因果关系的模型。它包括因子分析、路径分析和回归分析。它有助于我们研究中介关系，从而检测其他变量的存在如何削弱或增强预测变量与响应变量之间结构性关系的本质。图
  1-4 展示了一个假想框架，概述了直接和间接的结构关系。


  ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig4_HTML.png](img/516940_1_En_1_Fig4_HTML.png)


  **图 1-4** 基础结构方程模型


  图 1-4 演示了一个假想框架，该框架展示了人均 GDP 增长（年增长率）、通货膨胀、消费者价格指数（百分比）和最终消费支出（以当前美元计）之间的结构关系。此外，它还突出了预期寿命对人均
  GDP 增长与最终消费支出之间关系的中介效应。第 10 章介绍了结构方程模型。


  ## 宏观经济数据来源


  有数个库可用于提取宏观经济数据。本书使用了其中较为突出的一个库，名为 `wbdata`。该库从世界银行数据库¹提取数据。或者，你也可以直接从世界银行网站提取数据。此外，还有其他宏观经济数据源可供使用，例如圣路易斯联邦储备银行（联邦储备经济数据）数据库²和国际货币基金组织数据库³等。


  本书主要使用 `world-bank-data` 库，因为它提供了广泛的社会指标。在继续之前，请确保安装了 `world-bank-data` 库。这将使开发定量模型的过程大大简化，因为你无需编写大量代码。要在
  Python 环境中安装该库，请使用 `pip install wbdata`。如果你使用的是 Anaconda 环境，请使用 `conda install wbdata`。在本书付印时，该库的版本为
  v0.3.0。代码清单 1-1 展示了如何检索宏观经济数据。


  ```

  import wbdata

  country = ["USA"]

  indicator = {"FI.RES.TOTL.CD":"gdp_growth"}

  df = wbdata.get_dataframe(indicator, country=country, convert_date=True)

  ```


