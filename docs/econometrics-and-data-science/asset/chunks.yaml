    | 2018-01-01 | 38348227.0 | 3200.508475 | 0.787056 | 63.857 | -0.004273 | 1 |

    | 2017-01-01 | 37540921.0 | 3200.508475 | 1.414513 | 63.538 | -0.004996 | 1 |

