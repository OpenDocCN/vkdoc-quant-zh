    ## Restricted Boltzmann Machine Classifier


    The restricted Boltzmann machine classifier is a simple artificial neural network
    that consists of one hidden layer and one visible layer. Figure [8-2](#516940_1_En_8_Chapter.xhtml#Fig2)
    shows the structure of a restricted Boltzmann machine classifier.


    ![../images/516940_1_En_8_Chapter/516940_1_En_8_Fig2_HTML.png](images/516940_1_En_8_Chapter/516940_1_En_8_Fig2_HTML.png)


    Figure 8-2


    Restricted Boltzmann machine structure


    Figure [8-2](#516940_1_En_8_Chapter.xhtml#Fig2) shows that each node in the hidden
    layer automatically retrieves input values, transforms the retrieved input data
    by applying an activation function, and transmits the data to the visible layer.
    The restricted Boltzmann machine classifier estimates the gradient from the left
    to the right—this learning process is called the *forward propagation* process.


    ## Restricted Boltzmann Machine Classifier Development


    Listing [8-2](#516940_1_En_8_Chapter.xhtml#PC2) is the Restricted Boltzmann Machine
    Development classifier, applying default hyperparameters. Notice that it applies
    the `Pipeline()` method to set parameters of the final classifier, including those
    of the restricted Boltzmann machine and logistic regression classifier.


    ```

    from sklearn.neural_network import BernoulliRBM

    from sklearn.linear_model import LogisticRegression

    rbm = BernoulliRBM()

    logreg = LogisticRegression()

    from sklearn.pipeline import Pipeline

    rbmclassifier = Pipeline(steps=[("rbm",rbm),("logreg",logreg)])

    rbmclassifier.fit(x_train,y_train)

