    model.summary()

    Listing 3-22

    Model Evaluation

    ```


    Table [3-9](#516940_1_En_3_Chapter.xhtml#Tab9) shows that the ordinary least-squares
    regression model explains 81.0% of the variability in the model. This means that
    the model is an exemplary learner. It also shows that only the relationship between
    the U.S. social contributions and the final consumption expenditure is significant.


    It also indicates that:


    - For each unit change in the U.S. social contributions, the U.S. final consumption
    expenditure increases by `3.858e+12`.

    - For each unit change in the U.S. lending interest rate, the U.S. final consumption
    expenditure decreases by `1.845e+11`.

    - For each unit change in the U.S. GDP growth, the U.S. final consumption expenditure
    decreases by `-1.617e+11`.


    Last, the ordinary least-squares model explains 90% of the variability in the
    data. This means that the model is exemplary in predicting the U.S. final consumption
    expenditure.


