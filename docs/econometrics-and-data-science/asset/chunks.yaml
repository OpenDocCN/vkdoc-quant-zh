    ## Correlation Severity Detection


    Listing [3-17](#516940_1_En_3_Chapter.xhtml#PC17) uses the Eigen method to detect
    the correlation severity. It incorporates *eigenvalues*, which are vectors we
    consider after a linear transform, and eigenvectors, also called Eigen loadings
    (see Table [3-6](#516940_1_En_3_Chapter.xhtml#Tab6)).


    Table 3-6


    Eigen Matrix


    |   | Eigen Values | social_contri | lending_rate | gdp_growth | fin_cons |

    | --- | --- | --- | --- | --- | --- |

    | `social_contri` | 2.741814 | 0.571562 | -0.727660 | -0.363008 | -0.109782 |

    | `lending_rate` | 0.078913 | -0.477992 | -0.051401 | -0.774123 | 0.411844 |

    | `gdp_growth` | 0.403418 | -0.355849 | -0.015693 | -0.257158 | -0.898329 |

    | `fin_cons` | 0.775854 | 0.564103 | 0.683829 | -0.450365 | -0.106477 |


    ```

    eigenvalues, eigenvectors = np.linalg.eig(dfcorr)

    eigenvalues = pd.DataFrame(eigenvalues)

    eigenvalues.columns = ["Eigen values"]

    eigenvectors = pd.DataFrame(eigenvectors)

    eigenvectors.columns = df.columns

    eigenvectors = pd.DataFrame(eigenvectors)

    eigenmatrix = pd.concat([eigenvalues, eigenvectors],axis=1)

    eigenmatrix.index = df.columns

    eigenmatrix

    Listing 3-17

    Determine Correlation Severity

    ```


    Table [3-7](#516940_1_En_3_Chapter.xhtml#Tab7) explains how to interpret the Eigen
    matrix.


    Table 3-7


    Eigen Matrix Interpretation


    | Eigenvalue Score | Description |

    | --- | --- |

    | > 100 | There is extreme multicollinearity. |

    | 10 - 100 | There is moderate multicollinearity. |

    | 0 - 10 | There is slight multicollinearity. |


    Based on Table [3-6](#516940_1_En_3_Chapter.xhtml#Tab6), there is multicollinearity
    in the data. Therefore, you need to perform a dimension reduction.


    ## Dimension Reduction


    It is time-consuming to individually investigate each relationship among the variables
    when there are many of them. Listing [3-18](#516940_1_En_3_Chapter.xhtml#PC18)
    reduces the data and Figure [3-12](#516940_1_En_3_Chapter.xhtml#Fig12) demonstrates
    the variance ratio of each component.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig12_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig12_HTML.png)


    Figure 3-12


    Individual variance


    ```

    from sklearn.decomposition import PCA

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    std_df = scaler.fit_transform(df)

    pca = PCA()

    pca.fit_transform(std_df)

    pca_variance = pca.explained_variance_

    plt.figure(figsize=(8, 6))

    plt.bar(range(4), pca_variance, align="center", label="Individual variance")

    plt.legend()

    plt.ylabel("Variance ratio")

    plt.xlabel("Principal components")

    plt.title("Individual variance")

    plt.show()

    Listing 3-18

    Dimension Reduction

    ```


    Figure [3-12](#516940_1_En_3_Chapter.xhtml#Fig12) shows that the variance of the
    first component is over 2.5\. Listing [3-19](#516940_1_En_3_Chapter.xhtml#PC19)
    reduces the data so that there are two dimensions (see Figure [3-13](#516940_1_En_3_Chapter.xhtml#Fig13)).
    You can then apply principal component analysis, which determines how latent variables
    (also called *components*) best explain the model.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig13_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig13_HTML.png)


