    method to validate the performance of the default ordinary least-squares regression
    model over different subsets of the same data. It applies R² to find a score,
    since `sklearn` does not calculate the adjusted R². It then estimates the mean
    and standard deviation of the validation score.


    ```

    from sklearn.model_selection import cross_val_score

    def get_val_score(scores):

    lm_scores = cross_val_score(scores, x_train, y_train, scoring="r2")

    print("CV mean: ", np.mean(scores))

    print("CV std: ", np.std(scores))

