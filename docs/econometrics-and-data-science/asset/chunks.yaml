    estimate the intercept and coefficients of the logistic regression model.


    ```

    logregclassifier.coef_

    array([[-0.09342681, -1.02609323,  0.35329756]])

    Listing 5-23

    Coefficients

    ```


    ```

    logregclassifier.intercept_

    array([1.47270205])

    Listing 5-22

    Intercept

    ```


    ## Logistic Regression Confusion Matrix


    To investigate the logistic regression model’s performance, Listing [5-24](#516940_1_En_5_Chapter.xhtml#PC24)
    creates a *confusion* matrix (see Table [5-8](#516940_1_En_5_Chapter.xhtml#Tab8)).
    To evaluate a classification model, you apply evaluation metrics that are different
    from linear regression models. In classification, you analyze how accurate and
    precise a model is (see Table [5-10](#516940_1_En_5_Chapter.xhtml#Tab10)). The
    initial step involves constructing a confusion matrix (see Table [5-8](#516940_1_En_5_Chapter.xhtml#Tab8)).


    Table 5-8


    Logistic Classifier Confusion Matrix


    |   | **Predicted: Decreasing Life Expectancy** | **Predicted: Increasing Life
    Expectancy** |

    | --- | --- | --- |

    | **Actual: Decreasing Life Expectancy** | 0 | 3 |

    | **Actual: Increasing Life Expectancy** | 1 | 8 |


    ```

    from sklearn import metrics

    y_predlogregclassifier = logregclassifier.predict(x_test)

    cmatlogregclassifier = pd.DataFrame(metrics.confusion_matrix(y_test,y_predlogregclassifier),
    index=["Actual: Decreasing life expectancy",

    "Actual: Increasing life expectancy"],

    columns = ("Predicted: Decreasing life expectancy",

    "Predicted: Increasing life expectancy"))

    cmatlogregclassifier

    Listing 5-24

    Logistic Classifier Confusion Matrix

    ```


    ## Logistic Regression Confusion Matrix Interpretation


    Table [5-9](#516940_1_En_5_Chapter.xhtml#Tab9) interprets the results of Table
    [5-8](#516940_1_En_5_Chapter.xhtml#Tab8).


    Table 5-9


    Logistic Classifier Confusion Matrix Interpretation


    | Metric | Interpretation |

    | --- | --- |

    | True Positive | The logistic classifier did not predict a decreasing life expectancy
    at birth when life expectancy was actually decreasing in South Africa. |

    | True Negative | The logistic classifier predicted an increasing life expectancy
