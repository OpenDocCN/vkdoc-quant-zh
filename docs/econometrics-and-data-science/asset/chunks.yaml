    \ [2-1](#516940_1_En_2_Chapter.xhtml#PC1).\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig3_HTML.jpg](images/516940_1_En_2_Chapter/516940_1_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3**  \nThe U.S. lending interest rate\n\n```\nimport wbdata\nfrom\
    \ matplotlib.pyplot import\n%matplotlib inline\ncountry  = [\"USA\"]\nindicator\
    \ = {\"FP.CPI.TOTL.ZG\":\"lending_rate\"}\ninflation_cpi = wbdata.get_dataframe(indicator,\
    \ country=country,  convert_date=True)\ninflation_cpi.plot(kind=\"line\",color=\"\
    green\",lw=4)\nplt.title(\"The U.S. lending interest rate (%)\")\nplt.ylabel(\"\
    Lending interest rate (%)\")\nplt.xlabel(\"Date\")\nplt.legend(loc=\"best\")\n\
    plt.show()\nListing 2-1\nThe U.S. Lending Interest Rate\n```\n\nFigure [2-3](#516940_1_En_2_Chapter.xhtml#Fig3)\
    \ demonstrates that from 1960 to 1980, the rate that U.S.-based banks charged\
    \ as interest for private short-term and mid-term financing grew from 1.45% to\
    \ 13.55% (the highest peak). Following that, in the early 1980s, the rate sharply\
    \ declined, then it remained stagnant. It also shows that the lending interest\
    \ rate reached its lowest point in 2008. In summary, acquiring debt from U.S.-based\
    \ banks was more expensive in the late 1970s, and relatively cheap in 2008."
