    \ model to determine the linear relationship between the predictor variable (the\
    \ U.S. lending interest rate as a percentage) and the response variable (final\
    \ consumption expenditure in current U.S. dollars). Table [2-1](#516940_1_En_2_Chapter.xhtml#Tab1)\
