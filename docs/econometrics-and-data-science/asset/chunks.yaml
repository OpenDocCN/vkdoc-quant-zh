- fmt: '### Structural Equation Modeling


    The structural equation model includes a set of models that determine the nature
    of causal relationships among sets of variables. It includes factor analysis,
    path analysis, and regression analysis. It helps us investigate mediating relationships,
    so we can detect how the presence of other variables weakens or strengthens the
    nature of the structural relationship between the predictor variable and the response
    variable. Figure [1-4](#516940_1_En_1_Chapter.xhtml#Fig4) shows a hypothetical
    framework that outlines direct and indirect structural relationships.


    ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig4_HTML.png](images/516940_1_En_1_Chapter/516940_1_En_1_Fig4_HTML.png)


    **Figure 1-4** Fundamental structural equation model


    Figure [1-4](#516940_1_En_1_Chapter.xhtml#Fig4) demonstrates a hypothetical framework
    representing the structural relationship between GDP per capita growth (as an
    annual percentage), inflation, consumer price index (as a percentage), and final
    consumption expenditure (in current U.S. dollars). In addition, it highlights
    the mediating effects of life expectancy on the relationship between GDP per capita
    growth and final consumption expenditure. Chapter [10](#516940_1_En_10_Chapter.xhtml)
    covers structural equation modeling.


    ## Macroeconomic Data Sources


    There are several libraries that are used to extract macroeconomic data. This
    book uses one of the more prominent libraries, called `wbdata`. This library extracts
    data from the World Bank database^([¹](#fn1)). Alternatively, you can extract
    the data from the World Bank website directly. In addition, there are other macroeconomic
    sources you can use, such as the St. Louis Fed (Federal Reserve Economic) database^([²](#fn2))
    and the International Monetary Fund database^([³](#fn3)), among others.


    This book uses the `world-bank-data` library as the principal library because
    it offers a wide range of social indicators. Before you proceed, ensure that you
    install the `world-bank-data` library. This will make the process of developing
    quantitative models much simpler, as you will not have to write considerable chunks
    of code. To install the library in the Python environment, use `pip install wbdata`.
    Provided you are using the Anaconda environment, use `conda install wbdata`. At
    the point of printing this book, the version of the library was v0.3.0. Listing
    [1-1](#516940_1_En_1_Chapter.xhtml#PC1) shows how to retrieve the macroeconomic
    data.


    ```

    import wbdata

    country = ["USA"]

    indicator = {"FI.RES.TOTL.CD":"gdp_growth"}

    df = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    ```


    **Listing 1-1** Loading Data from the World Bank Library


    `wbdata` extracts the data and loads it into a `pandas` dataframe. Figure [1-5](#516940_1_En_1_Chapter.xhtml#Fig5)
    demonstrates the `wbdata` workflow.


    ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig5_HTML.png](images/516940_1_En_1_Chapter/516940_1_En_1_Fig5_HTML.png)


    **Figure 1-5** World Bank library workflow


    Extracting data from the `wbdata` library requires that you specify the country
    ID. Given that the World Bank includes several countries, it is burdensome to
    know the IDs of all of them. The most convenient way to find a country’s ID is
    to search for it by name (see Listing [1-2](#516940_1_En_1_Chapter.xhtml#PC2)).
    For this example, we entered `China`, and it returned Chinese countries, including
    their IDs.


    ```

    wbdata.search_countries("China")

    id    name

    ----  --------------------

    CHN   China

    HKG   Hong Kong SAR, China

    MAC   Macao SAR, China

    TWN   Taiwan, China

    ```


    **Listing 1-2** Searching for a Country ID


    Extracting data from the `wbdata` library requires that you specify the economic
    indicator’s ID as well. Given that the World Bank includes several macroeconomic
    indicators, it is burdensome to know the IDs of all the indicators. The most convenient
    way to find an indicator’s ID is to search for it by name (see Listing [1-3](#516940_1_En_1_Chapter.xhtml#PC3)).
    For this example, we entered `inflation` and it returned all indicators that contain
    the word "inflation," including their IDs.


    ```

    wbdata.search_indicators("inflation")

    id                    name

    --------------------  -------------------------------------------------

    FP.CPI.TOTL.ZG        Inflation, consumer prices (annual %)

    FP.FPI.TOTL.ZG        Inflation, food prices (annual %)

    FP.WPI.TOTL.ZG        Inflation, wholesale prices (annual %)

    NY.GDP.DEFL.87.ZG     Inflation, GDP deflator (annual %)

    NY.GDP.DEFL.KD.ZG     Inflation, GDP deflator (annual %)

    NY.GDP.DEFL.KD.ZG.AD  Inflation, GDP deflator: linked series (annual %)

    ```


    **Listing 1-3** Searching for Macroeconomic Data


    The `wbdata` library includes several data sources, like World Development Indicators,
    Worldwide Governance Indicators, Subnational Malnutrition Database, International
    Debt Statistics, and International Debt Statistics: DSSI, among others. This book
    focuses predominantly on sources that provide economic data. It also covers social
    indicators. Listing [1-4](#516940_1_En_1_Chapter.xhtml#PC4) demonstrates how to
    retrieve indicator sources using `wbdata.get_source()` (see Table [1-1](#516940_1_En_1_Chapter.xhtml#Tab1)).


