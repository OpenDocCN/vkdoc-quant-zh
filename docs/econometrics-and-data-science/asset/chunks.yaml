- fmt: '# Multilayer Perceptron (MLP) Classifier


    This section covers the Multilayer Perceptron classifier—an extension of the restricted
    Boltzmann machine classifier, also called the *vanilla model*. It is a restricted
    Boltzmann machine classifier with more than one hidden layer. It comprises three
    layers (see Figure [8-6](#516940_1_En_8_Chapter.xhtml#Fig6)).


    ![../images/516940_1_En_8_Chapter/516940_1_En_8_Fig6_HTML.png](images/516940_1_En_8_Chapter/516940_1_En_8_Fig6_HTML.png)


    Figure 8-6


    Example of a Multilayer Perceptron classifier


    Figure [8-6](#516940_1_En_8_Chapter.xhtml#Fig6) shows that the model includes
    the input layer, which retrieves input values and transmits them to the first
    hidden layer. That hidden layer receives the values and transforms them by applying
    a function (in this case, the Sigmoid function). The output value is transmitted
    to the second hidden layer, which receives the transmitted values and processes
    them (it transforms the values and transmits them to the output layer.).


    ## Multilayer Perceptron (MLP) Classifier Model Development


    Listing [8-8](#516940_1_En_8_Chapter.xhtml#PC8) develops the Multilayer Perceptron
    classifier by applying default hyper-parameters.


