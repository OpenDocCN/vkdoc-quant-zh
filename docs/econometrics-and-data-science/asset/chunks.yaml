    ## 季节性分解


    季节性分解涉及将序列数据分解为几个组成部分，以便开发者能更好地理解该序列。这些组成部分包括：


    - 季节性，代表随时间变化的永久性模式。

    - 趋势，代表序列中随时间变化的暂时性持续模式。

    - 不规则波动，代表美国 GDP 增长数据的变异性。


    鉴于数据收集的频率以及美国 GDP 增长的数据点较少，本章不涉及季节性分解。这些数据是每年收集的，我们无法将季节性分解为每日和每周的季节性。然而，理解季节性分解的工作原理仍然很重要。


    ## 结论


    本章介绍了一种名为加法模型的时间序列分析模型。在拟合模型之前，您学习了如何通过检验平稳性、白噪声、自相关和正态性来确认时间序列分析的假设。此后，本章涵盖了趋势、季节性和残差。该模型预测美国年度
    GDP 增长将出现主导性的上升趋势。下一章将介绍一种名为*逻辑回归*的分类方法。当您想操作预测变量以生成二元输出值时，可以使用此模型。


    # 5. 应用逻辑回归对经济数据进行分类


    本章应用逻辑回归来研究在响应变量为分类变量（即仅限于少数几个类别）时变量之间关系的性质。该模型是最常见的非线性模型，通常被称为*分类*。它使用 Sigmoid
    函数对数据进行建模。


    图 5-1 展示了分类器如何操作预测变量以生成二元输出值。方程 5-1 显示了 sigmoid 方程。


    ![$$ s(x)=\frac{1}{}1+e-x $$](img/516940_1_En_5_Chapter_TeX_Equ1.png)


    （方程 5-1）


    您可能已经注意到宏观经济数据通常是连续的。不必担心，您仍然可以对这类数据执行逻辑回归。您需要做的只是根据方向（上升或下降）对响应变量进行分类。这可以基于一个
    S 形公式，即所谓的 *sigmoid 形状*（参见图 5-1）。


    ![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig1_HTML.png](img/516940_1_En_5_Fig1_HTML.png)


    图 5-1


    Sigmoid 函数


    ![$$ \left(\right)\frac{}{}1+-x $$](img/516940_1_En_5_Chapter_TeX_Equa.png)


    在线性回归中，响应变量是连续的。另一方面，在逻辑回归中，响应变量是二元的，并且可以应用于多类分类。此外，分类器不对数据的线性关系和正态性做出极端假设。


