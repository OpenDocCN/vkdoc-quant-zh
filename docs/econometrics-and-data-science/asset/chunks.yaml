    ## 通货膨胀与消费者价格


    通货膨胀与消费者价格指标共同用于估算通胀率。部分估算基于消费者价格指数（即普通消费者为商品或服务支付的平均成本）的年度变化。这是判断特定国家生活成本的一个典型指标。代码清单
