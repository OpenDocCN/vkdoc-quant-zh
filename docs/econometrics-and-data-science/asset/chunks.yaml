    \ = np.mean(trainscorelogreg,axis=1)\ntrainscorelogreg_std = np.std(trainscorelogreg,axis=1)\n\
    testscorelogreg_mean = np.mean(testscorelogreg,axis=1)\ntestscorelogreg_std =\
    \ np.std(testscorelogreg,axis=1)\nfig, ax = plt.subplots()\nplt.plot(trainsizelogreg,trainscorelogreg_mean,\
    \ label=\"Training R2 score\", color=\"red\",lw=4)\nplt.plot(trainsizelogreg,testscorelogreg_mean,\
    \ label=\"Validation R2 score\",color=\"navy\", lw=4)\nplt.title(\"OLS learning\
    \ curve\")\nplt.xlabel(\"Training set size\")\nplt.ylabel(\"R2 score\")\nplt.legend(loc=4)\n\
    plt.show()\n```\n\n**代码清单 2-26**  \n普通最小二乘回归模型学习曲线\n\n图 2-15 表明，在整个训练过程中，交叉验证的\
    \ R²分数始终低于训练集的 R²分数——这意味着当你进行重复测试时，训练中的 R²分数很高。在验证阶段，随着普通最小二乘回归模型接近数据中的第十个数据点，它开始难以预测美国最终消费支出的数据点。与此同时，在训练期间，回归器始终能成功预测数据点。\n\
    \n## 结论\n\n本章介绍了如何应用普通最小二乘回归模型来寻找横截面数据的答案。该方法首先确定了数据点的分布，然后处理了缺失的数据点和异常值。接着，它检验了美国贷款利率（百分比）与最终消费支出（现价美元）之间的联合变异性和关联性。然后，它应用了皮尔逊相关方法，发现美国贷款利率与美国最终消费支出之间存在负相关。\n\
    \n随后，本章向你展示了如何使用`statsmodels`和`scikit-learn`库开发普通最小二乘回归模型。使用`statsmodels`开发的模型性能优于使用`scikit-learn`开发的模型。\n\
    \n# 3. 应用回归的多变量消费研究\n\n上一章涵盖了多元线性回归——一种通过应用单个预测变量来预测连续响应变量的模型。在实际情况下，你可能会遇到不止一个预测变量，因此本章介绍了将多个变量恰当地拟合到回归方程中的方法。它应用普通最小二乘回归模型来确定美国社会缴款（现价本币单位）、贷款利率（百分比）以及\
    \ GDP（国内生产总值）年度增长百分比的变化是否会影响最终消费支出（现价美元）的变化。\n\n首先，该模型检查数据是否来自正态分布。接着，它应用皮尔逊相关方法来研究变量之间的相关性，然后运用特征矩阵来确定变量间的多重共线性严重程度。随后，它通过应用一种称为*主成分分析*的降维技术将数据降至二维。然后，它将预测变量拟合到回归模型中，以预测美国最终消费支出。最后，它确定了残差的集中趋势和分布，并研究了随着训练数据增加，模型如何学习做出可靠的预测。\n\
    \n## 本章背景\n\n预测变量包括美国社会缴款（现价本币单位）、贷款利率（百分比）和 GDP 增长（年度百分比），响应变量是美国最终消费支出（现价美元）。表\
    \ 3-1 概述了宏观经济指标并展示了它们的代码。\n\n**表 3-1**  \n本章所用美国宏观经济指标\n\n| 代码 | 标题 |\n| --- |\
    \ --- |\n| `GC.REV.SOCL.CN` | 美国社会缴款（现价本币单位） |\n| `FR.INR.LEND` | 美国贷款利率（百分比）\
    \ |\n| `NY.GDP.MKTP.KD.ZG` | 美国 GDP 增长（年度百分比） |\n| `NE.CON.TOTL.CD` | 美国最终消费支出（现价美元）\
    \ |\n\n### 社会缴款（现价本币单位）\n\n社会缴款是指组织与员工共同缴纳的社会保障费用（参见代码清单 3-1）。其中可能还包括政府为保险而追加的缴款。图\
    \ 3-1 展示了美国 1971 年至 2021 年的社会缴款情况。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig1_HTML.png](img/516940_1_En_3_Fig1_HTML.png)\n\
    \n**图 3-1**  \n美国社会缴款（现价本币单位）\n\n```\nimport wbdata\ncountry = [\"USA\"]\nindicator\
    \ = {\"GC.REV.SOCL.CN\":\"social_contri\"}\nsocial_contri = wbdata.get_dataframe(indicator,\
    \ country=country, convert_date=True)\nsocial_contri.plot(kind=\"line\",color=\"\
    green\",lw=4)\nplt.title(\"The U.S. social contributions\")\nplt.ylabel(\"Social\
    \ contributions\")\nplt.xlabel(\"Date\")\nplt.show()\n```\n\n**代码清单 3-1**  \n\
    美国社会缴款（现价本币单位）\n\n图 3-1 显示了从 1971 年到 2020 年美国社会缴款数据明显的上升趋势。这表明目前美国的组织与员工对社会保障的缴费比以往任何时候都多。请注意，这些信息并未考虑通货膨胀——该指标并未完全反映这些缴款的实际变化。\n\
    \n### 贷款利率\n\n贷款利率是指金融机构在向客户提供贷款时收取的费率（参见代码清单 3-2）。它反映了借贷成本。低贷款利率意味着借款人在偿还债务时支付的费用较少。相反，高利率则意味着借贷成本较高。图\
    \ 3-2 展示了美国 1971 年至 2020 年的贷款利率。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig2_HTML.png](img/516940_1_En_3_Fig2_HTML.png)\n\
    \n**图 3-2**  \n美国贷款利率\n\n```\ncountry = [\"USA\"]\nindicator = {\"FR.INR.LEND\"\
    :\"lending_rate\"}\nlending_rate = wbdata.get_dataframe(indicator, country=country,\
    \ convert_date=True)\nsocial_contri.plot(kind=\"line\",color=\"orange\",lw=4)\n\
    plt.title(\"The U.S. lending interest rate (%)\")\nplt.ylabel(\"Lending interest\
    \ rate (%)\")\nplt.xlabel(\"Date\")\nplt.show()\n```\n\n**代码清单 3-2**  \n美国贷款利率\n\
    \n图 3-2 显示，在过去五十年里，美国贷款利率增长了超过 1.25%。\n"
- fmt: "### GDP Growth (Annual Percentage)\n\n`GDP` stands for Gross Domestic Product.\
    \ It estimates the market value of finished goods and services that households\
    \ of a country consume annually. It is an exemplary indicator for diagnosing the\
    \ health of an economy, as it conveys the country's economic production. There\
    \ are two main ways of estimating `GDP`, using the *nominal* `GDP` (a `GDP` estimate\
    \ that does not consider inflation), and using the *real* `GDP`, which is a `GDP`\
    \ estimate that considers inflation. Equation 3-1 is the `GDP` formula.\n\n![$$\
    \ Y=C+I+G+\\left(X-M\\right) $$](images/516940_1_En_3_Chapter/516940_1_En_3_Chapter_TeX_Equ1.png)\n\
    \n(Equation 3-1)\n\nWhere `Y` represents `GDP`, `C` represents consumer spending,\
    \ `I` represents investments, `G` represents government spending, `X` represents\
    \ exports, and `M` represents imports. Figure [3-3](#516940_1_En_3_Chapter.xhtml#Fig3)\
    \ shows the changes in annual percentage growth of the `GDP` in the U.S. from\
    \ 1971 to 2020. See Listing [3-3](#516940_1_En_3_Chapter.xhtml#PC3).\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig3_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig3_HTML.png)\n\
    \n**Figure 3-3**  \nThe U.S. GDP growth\n\n```\ncountry = [\"USA\"]\ngdp_growth\
    \ = {\"NY.GDP.MKTP.KD.ZG\":\"gdp_growth\"}\ngdp_growth = wbdata.get_dataframe(indicator,\
    \ country=country, convert_date=True)\ngdp_growth.plot(kind=\"line\",color=\"\
    navy\",lw=4)\nplt.title(\"The U.S. GDP growth (annual %)\")\nplt.ylabel(\"GDP\
    \ growth (annual %)\")\nplt.xlabel(\"Date\")\nplt.show()\n```\n\n**Listing 3-3**\
    \  \nThe U.S. GDP Growth (Annual %)\n\nFigure [3-3](#516940_1_En_3_Chapter.xhtml#Fig3)\
    \ shows the zig zag pattern of the U.S. `GDP`, which has been adjusted for inflation.\
    \ In 1981, the United States experienced its highest change in `GDP`. In 2019,\
    \ on the other hand, economic activity was very low (the `GDP` grew by 2.161176).\n\
    \n### Final Consumption Expenditure\n\nThe final consumption expenditure is the\
    \ market value of all goods and services purchased by households (see Listing\
    \ [3-4](#516940_1_En_3_Chapter.xhtml#PC4)). This includes durable products such\
    \ as cars and personal computers. Figure [3-4](#516940_1_En_3_Chapter.xhtml#Fig4)\
    \ illustrates the U.S. final consumption expenditure in current U.S. dollars.\n\
    \n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig4_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig4_HTML.png)\n\
    \n**Figure 3-4**  \nThe U.S. final consumption expenditure\n\n```\ncountry = [\"\
    USA\"]\nindicator = {\"NE.CON.TOTL.CD\":\"fin_cons\"}\nfin_cons = wbdata.get_dataframe(indicator,\
    \ country=country, convert_date=True)\nsocial_contri.plot(kind=\"line\",color=\"\
    red\",lw=4)\nplt.title(\"The U.S. FCE\")\nplt.ylabel(\"FCE\")\nplt.xlabel(\"Date\"\
    )\nplt.show()\n```\n\n**Listing 3-4**  \nThe U.S. Final Consumption Expenditure\
    \ (Current U.S. Dollars)\n\nFigure [3-4](#516940_1_En_3_Chapter.xhtml#Fig4) shows\
    \ an extreme upward trend in the U.S. final consumption expenditure data, which\
    \ was slightly disrupted in 2012. Next, you explore a theoretical framework in\
    \ order to have some background on the phenomenon.\n\n## Theoretical Framework\n\
    \nThis chapter applies the multivariate regression method to determine whether\
    \ a set of predictor variables (the U.S. social contributions, the lending interest\
    \ rate, and the `GDP` growth) influence the response variable (the U.S. final\
    \ consumption expenditure). Figure [3-5](#516940_1_En_3_Chapter.xhtml#Fig5) shows\
    \ the theoretical framework of the problem at hand.\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig5_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig5_HTML.png)\n\
    \n**Figure 3-5**  \nTheoretical framework\n\nBased on Figure [3-5](#516940_1_En_3_Chapter.xhtml#Fig5),\
    \ the chapter tests the following hypotheses.\n\n**HYPOTHESES 1**  \n`H[0]`: There\
    \ is no significant difference between the U.S. social contributions and the final\
    \ consumption expenditure.  \n`H[A]`: There is a significant difference between\
    \ the U.S. social contributions and the final consumption expenditure.\n\n**HYPOTHESES\
    \ 2**  \n`H[0]`: There is no significant difference between the U.S. lending interest\
    \ rate and the final consumption expenditure.  \n`H[A]`: There is a significant\
    \ difference between the U.S. lending interest rate and the final consumption\
    \ expenditure.\n\n**HYPOTHESES 3**  \n`H[0]`: There is no significant difference\
    \ between the U.S. GDP growth and the final consumption expenditure.  \n`H[A]`:\
    \ There is a significant difference between the U.S. GDP growth and the final\
    \ consumption expenditure.\n\nThis chapter applies the ordinary least-squares\
    \ regression model to investigate whether changes in the following three affect\
    \ the consumption patterns in U.S. households:\n\n*   The rate financial institutions\
    \ in the U.S. charge customers for lending\n*   The annual growth in the U.S.\
    \ economic activities considering inflation\n*   Contributions that U.S. organizations\
    \ and citizens make to social security\n\nListing [3-5](#516940_1_En_3_Chapter.xhtml#PC5)\
    \ applies `wbdata` to acquire data associated with the U.S. social contributions,\
    \ the lending interest rate, the `GDP` growth, and final consumption expenditure\
    \ (see Table [3-2](#516940_1_En_3_Chapter.xhtml#Tab2)).\n\n**Table 3-2**  \nLoad\
    \ the U.S. Macroeconomic Data\n\n| Date | social_contri | lending_rate | gdp_growth\
    \ | fin_cons |\n| --- | --- | --- | --- | --- |\n| 2020-01-01 | 1.420776e+12 |\
    \ 3.544167 | -3.486140 | NaN |\n| 2019-01-01 | 1.402228e+12 | 5.282500 | 2.161177\
    \ | 1.753966e+13 |\n| 2018-01-01 | 1.344612e+12 | 4.904167 | 2.996464 | 1.688457e+13\
    \ |\n| 2017-01-01 | 1.283672e+12 | 4.096667 | 2.332679 | 1.608306e+13 |\n| 2016-01-01\
    \ | 1.224603e+12 | 3.511667 | 1.711427 | 1.543082e+13 |\n\n```\ncountry = [\"\
    USA\"]\nindicator = {\"GC.REV.SOCL.CN\":\"social_contri\",\n\"FR.INR.LEND\":\"\
    lending_rate\",\n\"NY.GDP.MKTP.KD.ZG\":\"gdp_growth\",\n\"NE.CON.TOTL.CD\":\"\
