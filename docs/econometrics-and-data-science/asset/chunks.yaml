    Figure [3-11](#516940_1_En_3_Chapter.xhtml#Fig11) shows the distribution of the
    U.S. social contributions, lending interest rate, and the final consumption expenditure,
    including the statistical dependence among these variables. Use the command in
    Listing [3-16](#516940_1_En_3_Chapter.xhtml#PC16) to view these pair plots.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig11_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig11_HTML.png)


