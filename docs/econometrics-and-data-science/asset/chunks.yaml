  raw: '## Ordinary Least-Squares Regression Model Learning Curve


    Figure [2-15](#516940_1_En_2_Chapter.xhtml#Fig15) shows how the ordinary least-squares
    model learns to explain the variability in the relationship between the U.S. lending
    interest rate and the final U.S. consumption expenditure as the train test size
    increases. In summary, it shows how the R² score changes as you increase the train
    test size. See Listing [2-26](#516940_1_En_2_Chapter.xhtml#PC26).


    ![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig15_HTML.png](images/516940_1_En_2_Chapter/516940_1_En_2_Fig15_HTML.png)


    Figure 2-15


    Ordinary least-squares regression model learning curve


    ```

    from sklearn.model_selection import learning_curve

    trainsizelogreg, trainscorelogreg, testscorelogreg = learning_curve(lm, x,y,cv=5,
    n_jobs=-1, scoring="r2", train_sizes=np.linspace(0.1,1.0,50))

    trainscorelogreg_mean = np.mean(trainscorelogreg,axis=1)

    trainscorelogreg_std = np.std(trainscorelogreg,axis=1)

    testscorelogreg_mean = np.mean(testscorelogreg,axis=1)

    testscorelogreg_std = np.std(testscorelogreg,axis=1)

    fig, ax = plt.subplots()

    plt.plot(trainsizelogreg,trainscorelogreg_mean, label="Training R2 score", color="red",lw=4)

    plt.plot(trainsizelogreg,testscorelogreg_mean, label="Validation R2 score",color="navy",
    lw=4)

    plt.title("OLS learning curve")

    plt.xlabel("Training set size")

    plt.ylabel("R2 score")

    plt.legend(loc=4)

    plt.show()

    Listing 2-26

    Ordinary Least-Squares Regression Model Learning Curve

    ```


    Figure [2-15](#516940_1_En_2_Chapter.xhtml#Fig15) demonstrates that the cross-validation
    R² score is lower than the training R² score throughout the training process—this
    indicates that the R² score is high in training when you carry out repeated tests.
    During the validation stage, as the ordinary least-squares regression model approaches
    the tenth data point in the data, it begins to encounter difficulties predicting
    data points of the U.S. final consumption expenditure. Meanwhile, during training,
    the regressor consistently predicts the data points.


    ## Conclusion


    This chapter introduced a way of finding answers to cross-sectional data by applying
    the ordinary least-squares regression model. It first determined the spread of
    data points, then handled any missing data points and outliers. Then it examined
    the joint variability and association between the U.S. lending interest rate (as
    a percentage) and the final consumption expenditure (in current U.S. dollars).
    Next, it applied the Pearson correlation method and found that there was negative
    correlation between the U.S. lending interest rate and the final U.S. consumption
    expenditure.


    Following that, the chapter showed you how to develop the ordinary least-squares
    regression model using the `statsmodels` and `scikit-learn` libraries. The model
    developed using `statsmodels` showed superior performance compared to the one
    developed using `scikit-learn`.


    # 3. Multivariate Consumption Study Applying Regression


    The last chapter covered multivariate linear regression—a model for predicting
    continuous response variables by applying a single predictor variable. There will
    be cases where you’ll have more than one predictor variable, so this chapter presents
    ways of properly fitting multiple variables into a regression equation. It applies
    the ordinary least-squares regression model to determine whether changes in the
    U.S. social contributions (the current LCU), lending interest rate (as a percentage),
    and GDP (Gross Domestic Product) growth as an annual percentage influence changes
    in the final consumption expenditure (in current U.S. dollars).


    To begin, this model checks whether the data comes from a normal distribution.
    Following that, it applies the Pearson correlation method to investigate the correlation
    among the variables, and then it implements the Eigen matrix to determine the
    severity among the variables. It then reduces the data into two dimensions by
    applying a dimension reduction technique called *principal component analysis*.
    It then fits the predictor variables into the regression model to predict the
    U.S. final consumption expenditure. Finally, it determines the central tendency
    and distribution of residuals and investigates how the model learns to make reliable
    predictions as you increase training data.


    ## Context of This Chapter


    Predictor variables include the U.S. social contributions (current LCU), lending
    interest rate (as a percentage), and GDP growth (as an annual percentage) and
    the response variable is the U.S. final consumption expenditure (in current U.S.
    dollars). Table [3-1](#516940_1_En_3_Chapter.xhtml#Tab1) outlines macroeconomic
    indicators and shows their code.


    Table 3-1


    The U.S. Macroeconomic Indicators for This Chapter


    | Code | Title |

    | --- | --- |

    | `GC.REV.SOCL.CN` | The U.S. social contributions (current LCU) |

    | `FR.INR.LEND` | The U.S. lending interest rate (as a percentage) |

    | `NY.GDP.MKTP.KD.ZG` | The U.S. GDP growth (as an annual percentage) |

    | `NE.CON.TOTL.CD` | The U.S. final consumption expenditure (in current U.S. dollars)
    |


    ### Social Contributions (Current LCU)


    Social contributions represent social security contributions by both organizations
    and employees (see Listing [3-1](#516940_1_En_3_Chapter.xhtml#PC1)). This might
    additionally include contributions that the government adds for insurance. Figure
    [3-1](#516940_1_En_3_Chapter.xhtml#Fig1) illustrates the U.S. social contributions
    from 1971 to 2021.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig1_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig1_HTML.png)


    Figure 3-1


    The U.S. social contributions (current LCU)


    ```

    import wbdata

    country = ["USA"]

    indicator = {"GC.REV.SOCL.CN":"social_contri"}

    social_contri = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    social_contri.plot(kind="line",color="green",lw=4)

    plt.title("The U.S. social contributions")

    plt.ylabel("Social contributions")

    plt.xlabel("Date")

    plt.show()

    Listing 3-1

    The U.S. Social Contributions (Current LCU)

    ```


    Figure [3-1](#516940_1_En_3_Chapter.xhtml#Fig1) shows an unmistakable upward trend
    in the U.S. social contribution data from 1971 to 2020\. This shows that U.S.-based
    organizations and employees currently contribute to social security more than
    ever. Note that this information does not account for inflation—the indicator
    does not fully capture the change in those contributions.


    ### Lending Interest Rate


    A lending interest rate represents a rate at which financial institutions charge
    their customers when providing them with loans (see Listing [3-2](#516940_1_En_3_Chapter.xhtml#PC2)).
    It reflects the cost of borrowing money. A low lending interest rate indicates
    that borrowers pay less when servicing debt. In contrast, a high interest rate
    indicates that the cost of borrowing money is high. Figure [3-2](#516940_1_En_3_Chapter.xhtml#Fig2)
    illustrates the U.S. lending interest rate from 1971 to 2020.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig2_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig2_HTML.png)


    Figure 3-2


    The U.S. lending interest rate


    ```

    country = ["USA"]

    indicator = {"FR.INR.LEND":"lending_rate"}

    lending_rate = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    social_contri.plot(kind="line",color="orange",lw=4)

    plt.title("The U.S. lending interest rate (%)")

    plt.ylabel("Lending interest rate (%)")

    plt.xlabel("Date")

    plt.show()

    Listing 3-2

    The U.S. Lending Interest Rate

    ```


    Figure [3-2](#516940_1_En_3_Chapter.xhtml#Fig2) shows that the U.S. lending interest
    rate has grown by over 1.25% in the last five decades.'
  trans: "\n# 普通最小二乘回归模型学习曲线\n\n图 2-15 展示了随着训练-测试集规模增大，普通最小二乘模型如何学习解释美国贷款利率与美国最终消费支出之间关系的变异性。简而言之，它展示了当你增加训练-测试集大小时，R²分数如何变化。参见代码清单\
    \ 2-26。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig15_HTML.png](img/516940_1_En_2_Fig15_HTML.png)\n\
    \n**图 2-15**  \n普通最小二乘回归模型学习曲线\n\n```\nfrom sklearn.model_selection import learning_curve\n\
    trainsizelogreg, trainscorelogreg, testscorelogreg = learning_curve(lm, x,y,cv=5,\
