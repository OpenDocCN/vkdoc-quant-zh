    ## Cluster Number Detection


    Listing [7-8](#516940_1_En_7_Chapter.xhtml#PC8) uses the Elbow curve to identify
    the number of clusters to include prior to training the k-means model. An elbow
    plots the *eigenvalue* (a scalar vector after a linear transformation) on the
    y-axis and the number of *k* on the x-axis.


    ```

    pca = PCA(n_components=3).fit(std_df)

    pca_df = pca.transform(std_df)

    pca_df = pca.transform(std_df)

    from sklearn.cluster import KMeans

    Nc = range(1,20)

    kmeans = [KMeans(n_clusters=i) for i in Nc]

    scores = [kmeans[i].fit(pca_df).score(pca_df) for i in range(len(kmeans))]

    fig, ax = plt.subplots()

    plt.plot(Nc, scores,color="navy",lw=4)

    plt.xlabel("No. of clusters")

    plt.title("Elbow curve")

    plt.ylabel("Score")

    plt.show()

    Listing 7-8

    Elbow Curve

    ```


    ![../images/516940_1_En_7_Chapter/516940_1_En_7_Fig3_HTML.png](images/516940_1_En_7_Chapter/516940_1_En_7_Fig3_HTML.png)


    Figure 7-3


    Elbow curve


    Figure [7-3](#516940_1_En_7_Chapter.xhtml#Fig3) shows the elbow curve. The x-axis
    is the number of k (representing the number of clusters), and the y-axis is the
    distortion (representing the eigenvalues—a scalar retrieved after a linear transformation).
    The y-axis reveals a lot regarding the severity of correlation among variables
    in this data, also called WSS (within clusters of sums of squares). To determine
    how many clusters you must include, you need to determine the *cut-off point*
    . To select the cut-off point, you need to identify the point at which the elbow
    curve starts to drastically bend. In this case, the number of clusters is three.'
