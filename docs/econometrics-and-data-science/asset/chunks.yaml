- fmt: '# Framing Structural Relationships


    SEM enables you to investigate direct and indirect effects. Figure [10-2](#516940_1_En_10_Chapter.xhtml#Fig2)
    shows that the variable *m* mediates the structural relationship between *x* and
    *y*. The mediator helps determine whether *m* weakens or strengthens the relationship.


    ![../images/516940_1_En_10_Chapter/516940_1_En_10_Fig2_HTML.png](images/516940_1_En_10_Chapter/516940_1_En_10_Fig2_HTML.png)


    Figure 10-2


    Structural equation model


    In Figure [10-2](#516940_1_En_10_Chapter.xhtml#Fig2), *x* represents the predictor
    variable, *y* represents the response variable, and *m* represents the mediating
    variable. SEM will study the direct effect of *x* on *y* and the indirect effects
    of *m* on the relationship between *x* and *y* at the same time. This will enable
    you to have multiple equations.


    # Context of This Chapter


    Figure [10-3](#516940_1_En_10_Chapter.xhtml#Fig3) demonstrates the hypothetical
    framework that this chapter explores.


    The primary research questions are:


    - To what extent does Swedish GDP per capita growth (as an annual percentage)
    influence the final consumption expenditure (in current U.S. dollars)?

    - How does Swedish inflation/consumer price index (as a percentage) impact the
    final consumption expenditure (in current U.S. dollars)?


    The secondary research questions include:


    - Does Swedish life expectancy at birth (in years) affect the relationship between
    GDP per capita growth (as an annual percentage) and the final consumption expenditure
    (in current U.S. dollars)?


    Based on these research questions, the research hypotheses are as follows:


    - H[0]: Swedish inflation/consumer price index (as a percentage) do not impact
    final consumption expenditure (in current U.S. dollars).

    - H[A]: Swedish inflation/consumer price index (as a percentage) impact the final
    consumption expenditure (in current U.S. dollars).

    - H[0]: Swedish GDP per capita growth (as an annual percentage) does not impact
    the final consumption expenditure (in current U.S. dollars).

    - H[A]: Swedish GDP per capita growth (as an annual percentage) impacts final
    consumption expenditure (in current U.S. dollars).

    - H[0]: Swedish life expectancy does not affect the relationship between GDP per
    capita growth (as an annual percentage) and the final consumption expenditure
    (in current U.S. dollars).

    - H[A]: Swedish life expectancy does affect the relationship between GDP per capita
    growth (as an annual percentage) and final consumption expenditure (in current
    U.S. dollars).


