    testscorelogreg_std = np.std(testscorelogreg,axis=1)

    fig, ax = plt.subplots()

    plt.plot(trainsizelogreg,trainscorelogreg_mean, label="Training R2 score", color="red",lw=4)

    plt.plot(trainsizelogreg,testscorelogreg_mean, label="Validation R2 score",color="navy",lw=4)

    plt.title("OLS learning curve")

    plt.xlabel("Training set size")

    plt.ylabel("R2 score")

    plt.legend(loc=4)

    plt.show()

    Listing 3-37

    Ordinary Least-Squares Regression Model Learning Curve

    ```


    Figure [3-19](#516940_1_En_3_Chapter.xhtml#Fig19) shows that the cross-validation
    R² score is constant, and the training R² score is low in the first data point,
    but it increases thereafter.


    ## Conclusion


    This chapter used the ordinary least-squares regression model to investigate whether
    there is a significant difference between the U.S. social contributions (current
    LCU), the lending interest rate (as a percentage), the GDP growth (as an annual
    percentage), and the final consumption expenditure (in current U.S. dollars).
    The model found an extreme positive correlation between the U.S. social contributions
    and final consumption, a moderate negative correlation between the U.S. lending
    interest rate and final consumption, and a moderate negative correlation between
    the U.S. GDP growth and final consumption. The `statsmodels` model and the `scikit-learn`
    model do not violate regression assumptions and are both exemplary in predicting
    the U.S. final consumption expenditure, but the `scikit-learn` model has greater
    predictive power.


    # 4. Forecasting Growth


    Time series analysis involves examining patterns and trends in sequential data
    to forecast the values of a series. There is a myriad of time series models, including
    Autoregressive Moving Average (ARIMA) (p, d, q), which applies linear transformation
    between preceding and current values (autoregressive), integrative (random walk),
    and moving averages. One ARIMA model includes seasonality, called Seasonal ARIMA
    (P, D, Q) x (p, d, q). This chapter considers the additive model, which recognizes
    non-linearity through smooth parameters. For the purposes of this book, you can
    consider time series analysis an extension of linear regression, as it studies
    sequential data. The principal difference is that, in time series analysis, you
    order data over time, which makes assumptions much stricter than in linear regression
    models. Before training the model, you must test for *stationarity* using the
    Augmented Dickey-Fuller test, test for the presence of white noise, and test for
    autocorrelation.


    This chapter investigates these trends in the market value of finished goods and
    services produced in the U.S. annually (see Equation 4-1):


    *   A guiding movement—Persistent movement uphill is an upward trend and a persistent
    movement downward is a downward trend


    *   Seasonality—A persistent year-to-year movement (either uphill or downhill)


    *   Irregular components—Also called residual components


    Lastly, the model forecasts future economic activities. Note that it does not
    describe the central tendency of the data because the preceding chapter did so.


    This chapter uses the Python library called Prophet, which was developed by Facebook.
    It is grounded on the additive model.


    Before you proceed, be sure that you have the `fbprophet` library installed in
    your environment. To install the `fbprophet` library in a Python environment,
    use `pip install fbprophet`. Equally, to install the library in a Conda environment,
    use `conda install -c conda-forge fbprophet`. You also need to install the `pystan`
    library. To do so in a Python environment, use `pip install pystan` and in a Conda
    environment, use `conda install -c conda-forge pystan`.


