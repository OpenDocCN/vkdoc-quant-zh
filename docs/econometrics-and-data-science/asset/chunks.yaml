    \ %) distribution\")\nplt.ylabel(\"Values\")\nplt.show()\n```\n\n**Listing 4-5**\
    \  \nReplacing the Outliers\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig3_HTML.jpg](images/516940_1_En_4_Chapter/516940_1_En_4_Fig3_HTML.jpg)\n\
