- fmt: "# Correlation Analysis\n\nUnlike covariance analysis, which shows how variables\
    \ vary with respect to each other, *correlation analysis* estimates the dependency\
    \ among variables. There are three principal correlation methods—the Pearson correlation\
    \ method, which can estimate dependency among continuous variables, the Kendall\
    \ method, which can estimate dependency among categorical variables, and the Spearman\
    \ method, which also can estimate an association among categorical variables.\
    \ Macroeconomic data is often continuous, so this chapter uses the Pearson correlation\
    \ method. Most of the chapters in this book use this method, except for Chapter\
    \ [5](#516940_1_En_5_Chapter.xhtml), which uses the Kendall method. Equation [2-7](#516940_1_En_2_Chapter.xhtml#Equ7)\
    \ estimates the covariance, then divides the estimate by the dispersion in the\
    \ predictor variable and the response variable to retrieve a Pearson correlation\
    \ coefficient.\n\n![$$ {r}_{xy}=\\frac{\\sum_{i=1}^n{\\left({x}_i-\\underset{\\\
    _}{x}\\right)}^2{\\left({y}_i-\\underset{\\_}{y}\\right)}^2}{\\sqrt{\\sum_{i=1}^n{\\\
    left({x}_i-\\underset{\\_}{x}\\right)}^2{\\sum}_{i=1}^n{\\left({y}_i-\\underset{\\\
    _}{y}\\right)}^2}} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ7.png)\n\
    \n(Equation 2-7)\n\nWhere `r[xy]` is the Pearson correlation coefficient. You\
    \ can estimate that coefficient by dividing the covariance between the U.S. lending\
    \ interest rate and the U.S. final consumption expenditure by the square root\
    \ of the sum of the deviations. Listing [2-10](#516940_1_En_2_Chapter.xhtml#PC10)\
    \ retrieves the Pearson correlation matrix (see Table [2-5](#516940_1_En_2_Chapter.xhtml#Tab5)).\n\
    \n**Table 2-5**  \n**Pearson Correlation Matrix**\n\n| | lending_rate | final_consumption\
    \ |\n| --- | --- | --- |\n| `lending_rate` | 1.000000 | -0.635443 |\n| `final_consumption`\
    \ | -0.635443 | 1.000000 |\n\n```\ndfcorr = df.corr(method=\"pearson\")\ndfcorr\n\
    Listing 2-10\nPearson Correlation Matrix\n```\n\nTable [2-6](#516940_1_En_2_Chapter.xhtml#Tab6)\
    \ interprets the Pearson correlation coefficients outlined in Table [2-5](#516940_1_En_2_Chapter.xhtml#Tab5).\n\
    \n**Table 2-6**  \n**Interpretation of Pearson Correlation Coefficients**\n\n\
    | Relationship | Pearson Correlation Coefficient | Findings |\n| --- | --- | ---\
    \ |\n| The U.S. lending interest rate (%) and the final consumption expenditure\
    \ (in current U.S. dollars) | -0.635443 | There is an extreme negative correlation\
    \ between the U.S. lending interest rate (%) and the final consumption expenditure\
    \ (in current U.S. dollars). |\n\nFigure [2-8](#516940_1_En_2_Chapter.xhtml#Fig8)\
    \ shows the statistical difference between the U.S. lending interest rate and\
    \ the final consumption expenditure. Before you proceed, be sure that you have\
    \ the `seaborn` library installed in your environment. To install the `seaborn`\
    \ library in a Python environment, use `pip install seaborn`. Equally, to install\
    \ the library in a Conda environment, use `conda install -c anaconda seaborn`.\
    \ See Listing [2-11](#516940_1_En_2_Chapter.xhtml#PC11).\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig8_HTML.jpg](images/516940_1_En_2_Chapter/516940_1_En_2_Fig8_HTML.jpg)\n\
    \n**Figure 2-8**  \nThe U.S. lending interest rate and the final U.S. consumption\
    \ expenditure joint plot\n\n```\nimport seaborn as sns\nsns.jointplot(x = \"lending_rate\"\
    , y=\"final_consumption\", data=df, kind=\"reg\",color=\"navy\")\nplt.show()\n\
    Listing 2-11\nPairwise Scatter Plot\n```\n\nFigure [2-8](#516940_1_En_2_Chapter.xhtml#Fig8)\
    \ confirms that there is a negative correlation between the U.S. lending interest\
    \ rate and the final consumption expenditure.\n\n# Ordinary Least-Squares Regression\
    \ Model Development Using Statsmodels\n\nThe section covers the most commonly\
    \ used regression model, called the ordinary least-squares model, which estimates\
    \ the intercept and coefficients, while diminishing residuals (refer back to Equation\
    \ 2-1).\n\nListing [2-12](#516940_1_En_2_Chapter.xhtml#PC12) converts the data\
    \ to the required format. It begins by constructing an `x` array (the data points\
    \ of the U.S. lending interest rate) and a `y` array (the data points of the U.S.\
    \ final consumption expenditure in current U.S. dollars).\n\nIt then shapes the\
    \ data so that the ordinary least-squares regression model better studies the\
    \ data, then splits the data into training and test data, by applying the `train_test_split()`\
    \ method. Lastly, it standardizes the data in such a way that the mean data point\
    \ is 0 and the standard deviation is 1; it does this by applying the `StandardScaler()`\
    \ method.\n\nTo test the claim that the U.S. lending interest rate influences\
    \ the U.S. final consumption expenditure, you find the p-value to determine the\
    \ significance of the relationship. In addition, you determine how the ordinary\
    \ least-squares model expresses the amount of information it lost when estimating\
    \ the future values of the final consumption expenditure. To further assess the\
    \ chosen model’s performance, you must estimate the R² score.\n\nTable [2-7](#516940_1_En_2_Chapter.xhtml#Tab7)\
    \ outlines the type of estimator applied to test the significance of the relationship\
    \ between the U.S. lending interest rate and the final U.S. consumption expenditure.\
    \ It also shows how the model learns the available U.S. macroeconomic data, and\
    \ how it generates future instances of the final U.S. consumption expenditure,\
    \ including the errors it makes when estimating those instances. In addition,\
    \ it details the extent to which the model explains how changes in the U.S. lending\
    \ interest rate influence changes in the final U.S. consumption expenditure. In\
    \ summary, it helps you decide whether you must accept the existence of the established\
    \ macroeconomic phenomenon, including the degree to which you can rely on the\
    \ model to estimate future instances.\n\n**Table 2-7**  \n**Ordinary Least-Squares\
    \ Regression Model Results**\n\n| Dep. Variable | y | R-squared | 0.443 |\n| ---\
    \ | --- | --- | --- |\n| Model | OLS | Adj. R-squared | 0.431 |\n| Method | Least\
    \ Squares | F-Statistic | 36.64 |\n| Date | Wed, 04 Aug 2021 | Prob (F-statistic)\
