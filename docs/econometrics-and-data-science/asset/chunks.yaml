    coefficients outlined in Table [2-5](#516940_1_En_2_Chapter.xhtml#Tab5).


    Table 2-6


    Interpretation of Pearson Correlation Coefficients


    | Relationship | Pearson Correlation Coefficient | Findings |

    | --- | --- | --- |

    | The U.S. lending interest rate (%) and the final consumption expenditure (in
    current U.S. dollars) | -0.635443 | There is an extreme negative correlation between
    the U.S. lending interest rate (%) and the final consumption expenditure (in current
    U.S. dollars). |


    Figure [2-8](#516940_1_En_2_Chapter.xhtml#Fig8) shows the statistical difference
    between the U.S. lending interest rate and the final consumption expenditure.
