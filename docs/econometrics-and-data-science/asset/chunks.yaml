    Random White Noise

    ```


    Figure [4-4](#516940_1_En_4_Chapter.xhtml#Fig4) shows that the mean value is around
    0. This indicates that the series’ patterns are similar across different lags.


    ## Autocorrelation Detection


    In simple linear regression, correlation analysis plays a crucial role in model
    development. Time series analysis, however, is interested in the serial statistical
    dependence between independent observations (`y`) and independent observations
    over time (`y[t]`). Listing [4-8](#516940_1_En_4_Chapter.xhtml#PC8) is an autocorrelation
    function that makes sense of autocorrelation across varying lags (see Figure [4-5](#516940_1_En_4_Chapter.xhtml#Fig5)).
    When autocorrelation coefficients are within the blue region in Figure [4-5](#516940_1_En_4_Chapter.xhtml#Fig5),
    they are significant.


    ![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig5_HTML.png](images/516940_1_En_4_Chapter/516940_1_En_4_Fig5_HTML.png)


    **Figure 4-5** U.S. GDP growth (annual %) ACF


