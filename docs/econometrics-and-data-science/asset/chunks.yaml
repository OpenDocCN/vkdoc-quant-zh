    \ analysis, you have to *standardize* the data (center the data so the mean value\
    \ is `0` and the standard deviation is `1`).\n\n![../images/516940_1_En_7_Chapter/516940_1_En_7_Fig2_HTML.png](images/516940_1_En_7_Chapter/516940_1_En_7_Fig2_HTML.png)\n\
    \n**Figure 7-2**  \nTwo-dimensional data\n\n```python\nfrom sklearn.decomposition\
    \ import PCA\npca2 = PCA(n_components=3)\npca2.fit(std_df)\nx_3d = pca2.transform(std_df)\n\
    plt.scatter(x_3d[:,0], x_3d[:,2], c=df['South Africa'],cmap=\"viridis\",s=200)\n\
    plt.title(\"Africa Inequality 2-D Data\")\nplt.xlabel(\"y\")\nplt.show()\nListing\
    \ 7-7\nReduce the Data\n```\n\n```python\nfrom sklearn.preprocessing import StandardScaler\n\
    scaler = StandardScaler()\nstd_df = scaler.fit_transform(df)\nListing 7-6\nStandardize\
    \ the Data\n```\n\nFigure [7-2](#516940_1_En_7_Chapter.xhtml#Fig2) shows the GNI\
    \ per capita of African countries in a two-dimensional scatter plot.\n\n## Cluster\
    \ Number Detection\n\nListing [7-8](#516940_1_En_7_Chapter.xhtml#PC8) uses the\
    \ Elbow curve to identify the number of clusters to include prior to training\
    \ the k-means model. An elbow plots the *eigenvalue* (a scalar vector after a\
    \ linear transformation) on the y-axis and the number of *k* on the x-axis.\n\n\
    ```python\npca = PCA(n_components=3).fit(std_df)\npca_df = pca.transform(std_df)\n\
    pca_df = pca.transform(std_df)\nfrom sklearn.cluster import KMeans\nNc = range(1,20)\n\
    kmeans = [KMeans(n_clusters=i) for i in Nc]\nscores = [kmeans[i].fit(pca_df).score(pca_df)\
    \ for i in range(len(kmeans))]\nfig, ax = plt.subplots()\nplt.plot(Nc, scores,color=\"\
    navy\",lw=4)\nplt.xlabel(\"No. of clusters\")\nplt.title(\"Elbow curve\")\nplt.ylabel(\"\
    Score\")\nplt.show()\nListing 7-8\nElbow Curve\n```\n\n![../images/516940_1_En_7_Chapter/516940_1_En_7_Fig3_HTML.png](images/516940_1_En_7_Chapter/516940_1_En_7_Fig3_HTML.png)\n\
    \n**Figure 7-3**  \nElbow curve\n\nFigure [7-3](#516940_1_En_7_Chapter.xhtml#Fig3)\
    \ shows the elbow curve. The x-axis is the number of k (representing the number\
    \ of clusters), and the y-axis is the distortion (representing the eigenvalues—a\
    \ scalar retrieved after a linear transformation). The y-axis reveals a lot regarding\
    \ the severity of correlation among variables in this data, also called WSS (within\
    \ clusters of sums of squares). To determine how many clusters you must include,\
    \ you need to determine the *cut-off point*. To select the cut-off point, you\
    \ need to identify the point at which the elbow curve starts to drastically bend.\
    \ In this case, the number of clusters is three."
