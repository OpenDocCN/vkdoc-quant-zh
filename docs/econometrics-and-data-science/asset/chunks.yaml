    # 9. 通货膨胀模拟


    本章使用蒙特卡洛模拟模型，研究不同情景对英国通货膨胀和消费者价格（以年百分比计）的影响。具体而言，它运用该模型来确定该国中央政府债务在多次试验中发生变化的概率。此方法在处理序列数据时非常有用。

