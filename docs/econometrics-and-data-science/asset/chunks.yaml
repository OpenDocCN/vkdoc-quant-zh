    Find Silhouette Score

    ```


    The silhouette score is 0.43401. This means that the classifier is mediocre in
    estimating labels of GNI per capita for the African countries.


    ## Conclusion


    This chapter introduced an unsupervised machine learning model for clustering,
    called the *k-means model*. It developed a model with default hyperparameters.
    It estimated the distance between the values of GNI per capita in Africa’s countries.
    Afterward, it grouped the countries into clusters by GNI per capita. This chapter
    concludes with the discussion of unsupervised machine learning.'
