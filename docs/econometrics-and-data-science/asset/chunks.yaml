    # Artificial Neural Network Prototyping Using Keras


    Listing [8-14](#516940_1_En_8_Chapter.xhtml#PC14) reprocesses the data. This procedure
    is like the one applied in the preceding section. The difference is that this
    process further breaks down the data into validation data.


    ```

    from sklearn.preprocessing import StandardScaler

    x = df.iloc[::,0:3]

    scaler = StandardScaler()

    x= scaler.fit_transform(x)

    y = df.iloc[::,-1]

    from sklearn.model_selection import train_test_split

    x_train, x_test, y_train, y_test = train_test_split(x,y,test_size=0.2,random_state=0)

    x_train, x_val, y_train, y_val = train_test_split(x_train,y_train,test_size=0.1,random_state=0)

    Listing 8-14

    Data Reprocessing

    ```


    Listing [8-15](#516940_1_En_8_Chapter.xhtml#PC15) trains the neural network. It
    begins by importing `Sequential`, `Dense` and `KerasClassifier` from the `keras`
    library (see Listing [8-15](#516940_1_En_8_Chapter.xhtml#PC15)).


    ```

    from keras import Sequential

    from keras.layers import Dense

    from keras.wrappers.scikit_learn import KerasClassifier

    Listing 8-15

    Import Dependencies

    ```


    # Artificial Neural Network Structuring


    Listing [8-16](#516940_1_En_8_Chapter.xhtml#PC16) builds a function to create
    the architecture of the neural network. The activation function in the input layer
    is ReLu. This means that the model will operate on the variables—urban population,
    GNI per capita, Atlas method (in current U.S. dollars), and GDP growth (as an
    annual percentage)—and generate output. Listing [8-16](#516940_1_En_8_Chapter.xhtml#PC16)
    includes an extra node in the input layer. In the output layer, the network applies
    the sigmoid (it operates on these predictor variables and generates decreasing
    or increasing life expectancy) in South Africa. The loss function applied to the
    training is `binary_crossentropy`. Specifying this loss function informs the neural
    network that it will deal with a categorical variable. The metric applied to evaluate
    the neural network is `accuracy` and we apply the `adam` optimizer to select variables
    at random. We also approach the vanishing gradient problem and quicken the training
    process.


    ```

    def create_dnn_model():

    model = Sequential()

    model.add(Dense(4, input_dim=3, activation="relu"))

    model.add(Dense(1, activation="sigmoid"))

    model.compile(loss="binary_crossentropy", optimizer="adam", metrics=["accuracy"])

    return model

    Listing 8-16

    Build Network Architecture

    ```


    ### Network Wrapping


    Listing [8-17](#516940_1_En_8_Chapter.xhtml#PC17) wraps the classifier, so we
    apply the `scikit-learn` library functionalities.


    ```

    model = KerasClassifier(build_fn=create_dnn_model)

    Listing 8-17

    Wrap Keras Classifier

    ```


    Listing [8-18](#516940_1_En_8_Chapter.xhtml#PC18) trains the neural network on
    64 epochs, applying a batch size of 15. Note that you can fiddle with the settings
    by trying other batch sizes and epochs (they frequently give different model performance
    results).


    ```

    history = model.fit(x_train, y_train, validation_data=(x_val, y_val), epochs=64,
    batch_size=15)

    history

    Listing 8-18

    Train Neural Network

    ```


    ### Keras Classifier Confusion Matrix


    Listing [8-19](#516940_1_En_8_Chapter.xhtml#PC19) creates a confusion matrix (see
    Table [8-8](#516940_1_En_8_Chapter.xhtml#Tab8)).


    **Table 8-8** Keras Classifier Confusion Matrix


    | | **Predicted: Decreasing Life Expectancy** | **Predicted: Increasing Life Expectancy**
    |

    |---|---|---|

    | **Actual: Decreasing Life Expectancy** | 0 | 2 |

    | **Actual: Increasing Life Expectancy** | 1 | 9 |


    ```

    y_predkeras = model.predict(x_test)

    cmatkeras = pd.DataFrame(metrics.confusion_matrix(y_test,y_predkeras),

    index=["Actual: Decreasing life expectancy",

    "Actual: Increasing life expectancy"],

    columns = ("Predicted: Decreasing life expectancy",

    "Predicted: Increasing life expectancy"))

    cmatkeras

    Listing 8-19

    Keras Classifier Confusion Matrix

    ```


