    Listing 2-2

    The U.S. Final Consumption Expenditure (Current U.S. Dollars)

    ```


    Figure [2-4](#516940_1_En_2_Chapter.xhtml#Fig4) shows that there has been an uninterruptible
    upswing in the market value of general goods and services that U.S. households
    purchased since 1970.


    ## The Normality Assumption


    A normal distribution is also called a Gaussian distribution. This book uses these
    terms interchangeably. This distribution shows saturation data points around the
    mean data point. Ordinary least-squares regression models assume data points saturate
    the mean data point, thus you must detect normality before training the model
    on the U.S. lending interest rate and the final consumption expenditure data.


    ### Normality Detection


    Normality detection involves investigating the central tendency of data points.
    If the U.S. lending interest rate and the final consumption expenditure data saturates
    the mean data point, you can summarize the data using the central data points.
    An additional implicit assumption is that the errors follow the normality assumption,
    which makes them easier to deal with. To detect normality, you must estimate the
    mean data point (see Equation [2-3](#516940_1_En_2_Chapter.xhtml#Equ3)).


    ![$$ \underset{\_}{x}=\frac{x_1+{x}_2x+{x}_3\dots {x}_i}{n} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ3.png)


    (Equation 2-3)


    Where ![$$ \underset{\_}{x} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq7.png)
    is the mean value, *x*[1] is the first data point, *x*[2] is the second data point,
    and so forth, and *n* represents the total number of data points. You divide the
    count of data points by degrees of freedom. Alternatively, you can find the median
    data point (the central data point). To determine the dispersion, estimate the
    standard deviation (see Equation [2-4](#516940_1_En_2_Chapter.xhtml#Equ4)).


    ![$$ s=\sqrt{\frac{\sum_{i=1}^n{\left({x}_i-\underset{\_}{x}\right)}^2}{n-1}}
    $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ4.png)


    (Equation 2-4)


    After estimating the standard deviation, you square it to find the variance (see
    Equation [2-5](#516940_1_En_2_Chapter.xhtml#Equ5)).


    ![$$ {s}^2=\frac{\sum_{i=1}^n{\left({x}_i-\underset{\_}{x}\right)}^2}{n-1} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ5.png)


    (Equation 2-5)


    Listing [2-3](#516940_1_En_2_Chapter.xhtml#PC3) retrieves data relating to the
    U.S. lending interest and the final consumption expenditure data from the World
    Bank. See Table [2-2](#516940_1_En_2_Chapter.xhtml#Tab2).


    Table 2-2


    The U.S. Lending Interest Rate and Final Consumption Expenditure Data


    | Date | lending_rate | final_consumption |

    | --- | --- | --- |

    | 2020 | 3.544167 | NaN |

    | 2019 | 5.282500 | 1.753966e+13 |

    | 2018 | 4.904167 | 1.688457e+13 |

    | 2017 | 4.096667 | 1.608306e+13 |

    | 2016 | 3.511667 | 1.543082e+13 |


    ```

    country  = ["USA"]

    indicators = {"FR.INR.LEND":"lending_rate",

    "NE.CON.TOTL.CD":"final_consumption"}

    df = wbdata.get_dataframe(indicators, country=country, freq="M", convert_date=False)

    df.head()

    Listing 2-3

    Load the U.S. Lending Interest Rate and Final Consumption Expenditure Data

    ```


    Table [2-2](#516940_1_En_2_Chapter.xhtml#Tab2) shows that data points are missing
    from the data. Listing [2-4](#516940_1_En_2_Chapter.xhtml#PC4) substitutes the
    missing data points with the mean value.


    ```

    df["lending_rate"] = df["lending_rate"].fillna(df["lending_rate"].mean())

    df["final_consumption"] = df["final_consumption"].fillna(df["final_consumption"].mean())

    Listing 2-4

    Replacing Missing Data Points with the Mean Value

    ```'
  trans: "\n### 最终消费支出（现价美元）\n\n最终消费支出是指经济体中家庭购买的普通商品和服务的市场价值（参见列表 2-2）。图 2-4 展示了\
    \ 1960 年至 2020 年美国最终消费支出的变化情况。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig4_HTML.jpg](img/516940_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4  \n美国最终消费支出\n\n```\ncountry = [\"USA\"]\nindicator = {\"NE.CON.TOTL.CD\"\
    :\"final_consumption\"}\nfinal_consumption = wbdata.get_dataframe(indicator, country=country,\
    \ convert_date=True)\nfinal_consumption.plot(kind=\"line\",color=\"orange\",lw=4)\n\
    plt.title(\"The U.S. FCE\")\nplt.ylabel(\"FCE\")\nplt.xlabel(\"Date\")\nplt.legend(loc=\"\
    best\")\nplt.show()\n```\n列表 2-2  \n美国最终消费支出（现价美元）\n\n图 2-4 显示，自 1970 年以来，美国家庭购买的普通商品和服务的市场价值呈现持续上升趋势。\n\
    \n## 正态性假设\n\n正态分布也称为高斯分布。本书将互换使用这两个术语。该分布显示数据点围绕均值数据点聚集。普通最小二乘回归模型假设数据点围绕均值数据点聚集，因此在对美国贷款利率和最终消费支出数据训练模型之前，必须检测正态性。\n\
    \n### 正态性检测\n\n正态性检测涉及研究数据点的集中趋势。如果美国贷款利率和最终消费支出数据围绕均值数据点聚集，则可以使用中心数据点来概括数据。另一个隐含的假设是误差服从正态性假设，这使得误差更容易处理。为了检测正态性，必须估计均值数据点（参见方程\
    \ 2-3）。\n\n![$$\\underset{\\_}{x}=\\frac{x_1+{x}_2x+{x}_3\\dots{x}_i}{n}$$](img/516940_1_En_2_Chapter_TeX_Equ3.png)\n\
    \n（方程 2-3）\n\n其中 ![$$\\underset{\\_}{x}$$](img/516940_1_En_2_Chapter_TeX_IEq7.png)\
    \ 是均值，`x[1]` 是第一个数据点，`x[2]` 是第二个数据点，依此类推，`n` 表示数据点的总数。将数据点的计数除以自由度。或者，可以找到中位数数据点（中心数据点）。要确定离散程度，请估计标准差（参见方程\
    \ 2-4）。\n\n![$$s=\\sqrt{\\frac{\\sum_{i=1}^n{\\left({x}_i-\\underset{\\_}{x}\\\
    right)}²}{n-1}}$$](img/516940_1_En_2_Chapter_TeX_Equ4.png)\n\n（方程 2-4）\n\n在估计标准差后，将其平方以求得方差（参见方程\
    \ 2-5）。\n\n![$${s}²=\\frac{\\sum_{i=1}^n{\\left({x}_i-\\underset{\\_}{x}\\right)}²}{n-1}$$](img/516940_1_En_2_Chapter_TeX_Equ5.png)\n\
    \n（方程 2-5）\n\n列表 2-3 从世界银行检索了与美国贷款利率和最终消费支出数据相关的数据。参见表 2-2。\n\n表 2-2  \n美国贷款利率与最终消费支出数据\n\
    \n| 日期 | 贷款利率 | 最终消费支出 |\n| --- | --- | --- |\n| 2020 | 3.544167 | NaN |\n| 2019\
    \ | 5.282500 | 1.753966e+13 |\n| 2018 | 4.904167 | 1.688457e+13 |\n| 2017 | 4.096667\
    \ | 1.608306e+13 |\n| 2016 | 3.511667 | 1.543082e+13 |\n\n```\ncountry  = [\"\
    USA\"]\nindicators = {\"FR.INR.LEND\":\"lending_rate\",\n\"NE.CON.TOTL.CD\":\"\
    final_consumption\"}\ndf = wbdata.get_dataframe(indicators, country=country, freq=\"\
    M\", convert_date=False)\ndf.head()\n```\n列表 2-3  \n加载美国贷款利率与最终消费支出数据\n\n表 2-2\
    \ 显示数据中存在缺失的数据点。列表 2-4 用均值替换了缺失的数据点。\n\n```\ndf[\"lending_rate\"] = df[\"lending_rate\"\
    ].fillna(df[\"lending_rate\"].mean())\ndf[\"final_consumption\"] = df[\"final_consumption\"\
    ].fillna(df[\"final_consumption\"].mean())\n```\n列表 2-4  \n用均值替换缺失数据点\n"
- fmt: '# Descriptive Statistics


    There are several ways to visualize and summarize the distribution of data. The
    simplest way involves the use of a box plot. Box plots can also help detect normality.
    This plot confirms the location of the median data point. It also informs you
    about the length of the distribution tail, thus adequately supporting you in diagnosing
    outliers in the data. Figure [2-5](#516940_1_En_2_Chapter.xhtml#Fig5) shows a
    box plot of the U.S. lending interest rate created by the code in Listing [2-5](#516940_1_En_2_Chapter.xhtml#PC5).


    ![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig5_HTML.jpg](images/516940_1_En_2_Chapter/516940_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    The U.S. lending interest rate


    ```

    df["lending_rate"].plot(kind="box",color="green")

    plt.title("The U.S. lending interest rate (%)")

    plt.ylabel("Values")

