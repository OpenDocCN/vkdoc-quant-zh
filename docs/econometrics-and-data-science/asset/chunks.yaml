    ## Ordinary Least-Squares Regression Model Development Using Scikit-Learn


    The preceding section revealed a way to develop and evaluate the ordinary least-squares
    model using the `statsmodels` library . Findings show that the expressed macroeconomic
    phenomenon does indeed exist. You cannot fully rely on the model to predict future
    instances of the U.S. final consumption expenditure, given the poor performance
    obtained in the test.


    This section studies the same phenomenon, but applies a different machine learning
    library to develop and assess the model. It uses a popular open source library
    called `scikit-learn` . Developing this model is similar to the way it was done
    in the previous section. This approach has a competitive edge over `statsmodels`
    because it provides an easier way to control how the model behaves and to validate
    its performance. In addition, it has a wide range of regression models, i.e.,
    Ridge, Lasso, and ElasticNet, among others. This chapter does not cover those
    models. All you need to know for now is that these models extend the ordinary
    least-squares model by introducing a term that penalizes the model for errors
    it makes in the test. The primary difference between `statsmodels` and `sklearn`
    is that `statsmodels` is better at hypothesis testing and `sklearn` is better
    at predictions and does not return t-statistics. See Listing [2-13](#516940_1_En_2_Chapter.xhtml#PC13).


    ```

    x = np.array(df["lending_rate"])

    y = np.array(df["final_consumption"])

    x = x.reshape(-1,1)

    y = y.reshape(-1,1)

    x_train, x_test, y_train, y_test = train_test_split(x,y,test_size=0.2, random_state=0)

    scaler = StandardScaler()

    x_train = scaler.fit_transform(x_train)

    x_test = scaler.transform(x_test)

    from sklearn.linear_model import LinearRegression

    lm = LinearRegression()

    lm.fit(x_train,y_train)

    Listing 2-13

    Ordinary Least-Squares Regression Model Development Applying Scikit-Learn

