    ## Other Ordinary Least-Squares Regression Model Performance Metrics


    Other ordinary least-squares regression model performance metrics include the
    following:


    *   **Mean Absolute Error**—Represents the average magnitude of the errors prior
    to regressing the variables.


    *   **Mean Squared Error**—Represents an average of the sum of errors.


    *   **Root-MSE**—Represents the variability explained after regressing variables.
    Apply RMSE when you do not want huge residuals.


    *   **R-squared**—Represents the extent to which a regressor explains the variability
    in the data.


    ```

    from sklearn import metrics

    MAE = metrics.mean_absolute_error(y_test,predicted_values)

    MSE = metrics.mean_squared_error(y_test,predicted_values)

    RMSE = np.sqrt(MSE)

    EV = metrics.explained_variance_score(y_test,predicted_values)

    R2 = metrics.r2_score(y_test,predicted_values)

    lmmodelevation = [[MAE,MSE,RMSE,EV,R2]]

    lmmodelevationdata = pd.DataFrame(lmmodelevation, index=["Values"],columns=("Mean
    absolute error", "Mean squared error", "Root mean squared error", "Explained variance
    score", "R-squared"))

    lmmodelevationdata

    Listing 2-25

    Ordinary Least-Squares Regression Model Performance Matrix

    ```


