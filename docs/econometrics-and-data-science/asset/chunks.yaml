    *   绝对拟合指数 (AFI)：通过应用似然比检验等测试来确定模型是否拟合数据。应用这些指数时，应重点关注 χ²（卡方）值。

    *   增量拟合指数：包括规范拟合指数 (NFI)，它比较模型的 χ2 值与空模型的 χ2 值；以及比较拟合指数 (CFI)，它在考虑样本量的情况下比较模型的
