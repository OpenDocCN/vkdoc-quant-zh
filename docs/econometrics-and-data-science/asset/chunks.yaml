- fmt: '# Introduction to Econometrics


    This chapter explains data science techniques applied to the field of *econometrics*.
    To begin, it covers the relationship between economics and quantitative methods,
    which paves the way for the econometrics field. It also covers the relevance of
    econometrics in devising and revising the economic policies of a nation. It then
    summarizes machine learning, deep learning, and structural equation modeling.
    To conclude, it reveals ways to extract macroeconomic data using a standard Python
    library.


    ## Econometrics


    *Econometrics* is a social science subclass that investigates broad business activities
    at the macro level, i.e., at the country, region, or continent level. It is an
    established social science field that employs statistical models to investigate
    theoretical claims about macroeconomic phenomena. Figure [1-1](#516940_1_En_1_Chapter.xhtml#Fig1)
    is a simplification of econometrics. Organizations like the statistical bureau
    capture economic activities across time, which they make available to the public.
    Practitioners, such as economists, research analysts, and statisticians alike,
    extract the data and model it using algorithms grounded on theoretical frameworks
    in order to make future predictions.


    ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig1_HTML.jpg](images/516940_1_En_1_Chapter/516940_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1**


    Econometrics


    Before you proceed with the contents of this book, be sure that you understand
    the basic concepts that relate to economics and statistics.'
