    ## Different Univariate Time Series Models


    This chapter applies time series analysis to a continuous variable. The following
    sections contain an overview of the different time series analysis models.


    ### The Autoregressive Integrated Moving Average


    Autoregressive Integrated Moving Average is an ARIMA model, which means that it
    applies linear transformation between preceding and current values (autoregressive),
    integrative (random walk), and moving averages, which are weights of preceding
    and current values. It is the most common time series model. This model assumes
    that there is a linear relationship between the preceding values and that the
    series is stationary. Not only that, it also considers the difference between
    current weights and proceeding weighted values.


    ### The Seasonal Autoregressive Integrated Moving Average Model


    The Seasonal Autoregressive Integrated Moving Average (SARIMA) extends the ARIMA
    model, which considers seasonality (a persistent year-to-year movement—either
    uphill or downhill). Equation [4-1](#516940_1_En_4_Chapter.xhtml#Equ1) is the
    SARIMA formula.


    ![$$ {Y}_t={S}_t+{T}_t+{I}_t+\varepsilon i $$](images/516940_1_En_4_Chapter/516940_1_En_4_Chapter_TeX_Equ1.png)


    (Equation 4-1)


    Where *S*[*t*] represents seasonality, *T*[*t*] represents a trend, *I*[*t*] represents
    irregularities, and *ε*[*i*] is the error in terms. SARIMA considers seasonality
    and does not consider the effects of events like public holidays. To approach
    this problem, developers frequently apply the additive model.


    ## The Additive Model


    The additive model considers the effects of events like public holidays. It adjusts
    non-linear properties in a function and narrows the forecast to a certain confidence
    interval, by including smooth parameters and adding non-linearity. The most reliable
    library for developing an additive model is FB Prophet. Listing [4-10](#516940_1_En_4_Chapter.xhtml#PC10)
    repurposes the data (see Table [4-3](#516940_1_En_4_Chapter.xhtml#Tab3)).


