    | --- | --- |

    | 2020-01-01 | -3.593456 |

    | 2019-01-01 | 2.335558 |

    | 2018-01-01 | 3.034061 |

    | 2017-01-01 | 3.281329 |

    | 2016-01-01 | 2.605572 |


