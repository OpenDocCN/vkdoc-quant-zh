- fmt: '# Economic Design


    Economic design is grounded on the notion that if we can accurately estimate macroeconomic
    phenomenon, we can devise mechanisms that help manage it. As mentioned, there
    are several well-established organizations from which one can extract factual
    macroeconomic data. Note that we cannot estimate the whole population, but we
    can use a sample (a representative of the population) because there are errors
    in statistical estimations. Because there is a pool of reliable macroeconomic
    data sources, we can apply the data and investigate consistent patterns by applying
    quantitative models to make sense of an economy. When we are confident that a
    model estimates what we intend it to estimate and does so exceptionally, we can
    apply such a model to predict economic events. Remember that the primary purpose
    of a scientific enterprise is to predict events and control underlying mechanisms
    by applying quantitative models.


    Econometrics uses statistical principles to estimate the parameters of a population,
    but the ultimate litmus test is always economic ideology. Only economic theory
    can validate/invalidate the results, which can be further used to determine causation/correlation,
    etc. It should be apparent that politics occupies a paramount role in modern life.
    At most, the political sentiments typically accompany a firm belief about the
    economy and how it ought to be. Such beliefs might not reflect economic reality.
    When the considered belief about the economy is absurd, there is no way of combating
    pressing societal problems with devised solutions. To satisfactorily solve an
    economic problem, you must have a logical view; otherwise, feelings, standard
    assumptions, and authoritarian knowledge dilute your analysis of an economy.


    In summary, policymakers apply econometrics to devise and revise economic policies
    so that they can correctly solve economic problems. This entails that they investigate
    historical economic events, develop complex quantitative models, and apply findings
    of those models (provided they are reliable) to drive economic policies. Econometrics
    is an approach for finding answers to questions that relate to the economy. Policymakers
    who are evidence-oriented drive policymaking initiatives by applying factual data
    rather than depending on political and economic ideologies.


    ## Understanding Statistics


    Statistics is the field concerned with discovering consistent patterns in raw
    data to derive a logical conclusion regarding a recognized phenomenon. It involves
    investigating the central tendency (the mean value) and dispersion of data (the
    standard deviation) and then studying theoretical claims about the phenomenon
    by applying quantitative models. In addition, business institutions apply it in
    ad hoc reporting, research, and business process controls. Researchers, in addition,
    apply statistics in fields like natural sciences, physical sciences, chemistry,
    engineering, and social sciences, among other fields. It is the backbone of quantitative
    research.


    ### Machine Learning Modeling


    There is a link between statistics and machine learning. In this book, we consider
    machine learning an extension of statistics that incorporates techniques from
    fields like computer science. Machine learning methods derive from statistical
    principles and methods. We approach machine learning problems with "applications"
    and "automation" in mind. With machine learning, the end goal is not to derive
    some conclusion but to automate monotonous tasks and determine replicable patterns
    for those autonomous tasks. Figure [1-2](#516940_1_En_1_Chapter.xhtml#Fig2) shows
    how quantitative models operate.


    ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig2_HTML.png](images/516940_1_En_1_Chapter/516940_1_En_1_Fig2_HTML.png)


    *Figure 1-2 — Fundamental machine learning model*


    Figure [1-2](#516940_1_En_1_Chapter.xhtml#Fig2) demonstrates the basic machine
    learning model flow. Initially, we extract the data from a database, then preprocess
    and split it. This is followed by modeling the data by applying a function that
    receives a predictor variable and operates it to generate an output value. A variable
    represents a process that we can observe and estimate. It is common practice in
    machine learning to deploy models as web applications or as part of web applications.


    ### Deep Learning Modeling


    Deep learning applies artificial neural networks (a reciprocal web of nodes) that
    imitate the human neural structure. Artificial neural networks are a group of
    nodes that receive input values in the input layer, transform them to the subsequent
    hidden layer (a layer between the input and output layer), which transforms them
    and allots varying *weights* (vector parameters that determine the extent of influence
    input values have on output values) and *bias* (a balance value which is 1). It
    is a subclass of machine learning that combats some difficulties that we encounter
    with conventional quantitative models. For instance, the vanishing gradient problem—a
    case in which the gradient is minimal at the initial phase of the training process
    and increases as we include more data. There are other types of artificial neural
    networks, i.e. Restricted Boltzmann Machine—a shallow network between the hidden
    layer and output layer, Multilayer Perceptron—a neural network with over two hidden
    layers, Recurrent Neural Network—a neural network for solving sequential data,
    and Convolutional Neural Network—a neural network for dimension reduction, frequently
    applied in computer vision. This covers the Restricted Boltzmann Machine and Multilayer
    Perceptron. Figure [1-3](#516940_1_En_1_Chapter.xhtml#Fig3) shows a Multilayer
    Perceptron classifier.


    ![../images/516940_1_En_1_Chapter/516940_1_En_1_Fig3_HTML.png](images/516940_1_En_1_Chapter/516940_1_En_1_Fig3_HTML.png)


    *Figure 1-3 — Example of a Multilayer Perceptron classifier*


    Figure [1-3](#516940_1_En_1_Chapter.xhtml#Fig3) shows that the Multilayer Perceptron
    classifier is composed of an input layer that retrieves input values (X1, X2,
    and X3) and conveys them to the first hidden layer. That layer then retrieves
    the values and transforms them by applying a function (in our case, the Sigmoid
    function). It conveys an output value, which is then conveyed to the second hidden
    layer, which also retrieves the input values. The process reiterates—it transforms
    values and conveys them to the output layer and produces an output value represented
    as `Y` in Figure [1-3](#516940_1_En_1_Chapter.xhtml#Fig3). We recognized the training
    process that networks apply to learn the structure of the data, recognized as
    backward propagation (updating weights in reverse). Chapter [8](#516940_1_En_8_Chapter.xhtml)
    covers deep learning.'
