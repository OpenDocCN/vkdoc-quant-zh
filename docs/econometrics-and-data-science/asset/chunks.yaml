  raw: '## Correlation Analysis


    Unlike covariance analysis, which shows how variables vary with respect to each
    other, *correlation analysis* estimates the dependency among variables. There
    are three principal correlation methods—the Pearson correlation method, which
    can estimate dependency among continuous variables, the Kendall method, which
    can estimate dependency among categorical variables, and the Spearman method,
    which also can estimate an association among categorical variables. Macroeconomic
    data is often continuous, so this chapter uses the Pearson correlation method.
    Most of the chapters in this book use this method, except for Chapter [5](#516940_1_En_5_Chapter.xhtml),
    which uses the Kendall method. Equation [2-7](#516940_1_En_2_Chapter.xhtml#Equ7)
    estimates the covariance, then divides the estimate by the dispersion in the predictor
    variable and the response variable to retrieve a Pearson correlation coefficient.


    ![$$ {r}_{xy}=\frac{\sum_{i=1}^n{\left({x}_i-\underset{\_}{x}\right)}^2{\left({y}_i-\underset{\_}{y}\right)}^2}{\sqrt{\sum_{i=1}^n{\left({x}_i-\underset{\_}{x}\right)}^2{\sum}_{i=1}^n{\left({y}_i-\underset{\_}{y}\right)}^2}}
    $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ7.png)


    (Equation 2-7)


    Where *r*[*xy*] is the Pearson correlation coefficient. You can estimate that
    coefficient by dividing the covariance between the U.S. lending interest rate
    and the U.S. final consumption expenditure by the square root of the sum of the
    deviations. Listing [2-10](#516940_1_En_2_Chapter.xhtml#PC10) retrieves the Pearson
    correlation matrix (see Table [2-5](#516940_1_En_2_Chapter.xhtml#Tab5)).


    Table 2-5


    Pearson Correlation Matrix


    |   | lending_rate | final_consumption |

    | --- | --- | --- |

    | `lending_rate` | 1.000000 | -0.635443 |

    | `final_consumption` | -0.635443 | 1.000000 |


    ```

    dfcorr = df.corr(method="pearson")

    dfcorr

    Listing 2-10

    Pearson Correlation Matrix

    ```


