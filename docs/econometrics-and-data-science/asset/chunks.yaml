    ## Ordinary Least-Squares Regression Model Development Using Statsmodels


    The section covers the most commonly used regression model, called the ordinary
    least-squares model, which estimates the intercept and coefficients, while diminishing
    residuals (refer back to Equation 2-1).


    Listing [2-12](#516940_1_En_2_Chapter.xhtml#PC12) converts the data to the required
    format. It begins by constructing an x array (the data points of the U.S. lending
    interest rate) and a y array (the data points of the U.S. final consumption expenditure
    in current U.S. dollars).


    It then shapes the data so that the ordinary least-squares regression model better
    studies the data, then splits the data into training and test data, by applying
    the `train_test_split()` method. Lastly, it standardizes the data in such a way
    that the mean data point is 0 and the standard deviation is 1; it does this by
    applying the `StandardScaler()` method.


    To test the claim that the U.S. lending interest rate influences the U.S. final
    consumption expenditure, you find the p-value to determine the significance of
    the relationship. In addition, you determine how the ordinary least-squares model
    expresses the amount of information it lost when estimating the future values
    of the final consumption expenditure. To further assess the chosen model’s performance,
    you must estimate the R² score.


    Table [2-7](#516940_1_En_2_Chapter.xhtml#Tab7) outlines the type of estimator
    applied to test the significance of the relationship between the U.S. lending
    interest rate and the final U.S. consumption expenditure. It also shows how the
    model learns the available U.S. macroeconomic data, and how it generates future
    instances of the final U.S. consumption expenditure, including the errors it makes
    when estimating those instances. In addition, it details the extent to which the
    model explains how changes in the U.S. lending interest rate influence changes
    in the final U.S. consumption expenditure. In summary, it helps you decide whether
    you must accept the existence of the established macroeconomic phenomenon, including
    the degree to which you can rely on the model to estimate future instances.


