    \ future states in the series data of the world GDP growth (as an annual percentage).\n\
    \n# 7. Clustering GNI Per Capita on a Continental Level\n\nThis chapter covers\
    \ unsupervised machine learning. In unsupervised machine learning, you do not\
    \ fragment data, rather you present the model with the entire data set and allow\
    \ the model to discover patterns in the data on its own, without any supervision.\
    \ Given that this chapter covers cluster analysis, it introduces the simplest\
    \ unsupervised machine learning model, called *k-means*. The `k-means` method\
    \ is easy to comprehend. When you’re conducting cluster analysis, there is no\
    \ real response variable—you treat all the variables the same. There is no predictor\
    \ variable either, so there is no case of prediction/forecasting. You only analyze\
    \ the patterns in the data.\n\nThe `k-means` model groups values based on their\
    \ similarities. First, the model finds values that are close to each other and\
    \ estimates the distance between them. Thereafter, it determines the center of\
