- fmt: '# 8. Solving Economic Problems Applying Artificial Neural Networks


    Deep learning extends machine learning by using artificial neural networks to
    operate a set of predictor variables and predict future response variables. Artificial
    neural networks are a group of nodes that receive input values in the input layer
    and transform them in the subsequent hidden layer (a layer in between the input
    and output layer). This hidden layer transforms the nodes and allots varying *weights*
    (vector parameters that determine the extent of influence input values have on
    output values) and *bias* (a balance value which invariably is 1). Following that,
    they generate a set of output values in the output layer by applying an activation
    function. Artificial neural networks are part of deep learning, which advances
    machine learning through structuring models and by replicating human neural activity
    as the base. *Propagation* is the process of training networks (often through
    backward propagation, which involves updating weights in reserves, from the output
    layer).


    Traditional machine learning models are most suitable to small data. Increasing
    the volume of data presents fresh problems, as conventional models are computationally
    expensive. Most ensemble models (those that solve regression and classification
    problems) are excessively optimistic in the beginning phases of training and get
    most of the predictions correct. For instance, a gradient seems small at first
    and then expands as you increase data—this phenomenon is called the *vanishing
    gradient problem*. The gradient descent algorithm contends with this problem,
    which forms the basis for structuring the network.


    Before you proceed, be sure that you have the `tensorflow` library installed in
    your environment. To install the `tensorflow` library in a Python environment,
    use `pip install tensorflow`. Equally, to install the library in a Conda environment,
    use `conda install -c conda-forge tensorflow`. Install the Keras library as well.
    On a Python environment, use `pip install keras` and on the Conda environment,
    use `conda install -c conda-forge keras`.


    ## Context of This Chapter


    This chapter predicts changes in life expectancy at birth in South Africa by applying
    a set of economic indicators—urban population, GNI per capita, Atlas method (in
    current U.S. dollars), and GDP growth (as an annual percentage). Table 8-1 outlines
    South Africa’s macroeconomic indicators that this chapter investigates.


    Table 8-1


    South Africa’s Macroeconomic Indicators for This Chapter


    | ID | Indicators |

    | --- | --- |

    | `SP.URB.TOTL` | South Africa’s urban population |

    | `NY.GNP.PCAP.CD` | South Africa’s GNI per capita, Atlas method (in current U.S.
    dollars) |

    | `NY.GDP.MKTP.KD.ZG` | South Africa’s GDP growth (as an annual percentage) |

    | `SP.DYN.LE00.IN` | South Africa’s life expectancy at birth (in years) |


    ## Theoretical Framework


    Figure 8-1 illustrates the hypothetical framework for this chapter.


    ![../images/516940_1_En_8_Chapter/516940_1_En_8_Fig1_HTML.png](images/516940_1_En_8_Chapter/516940_1_En_8_Fig1_HTML.png)


    Figure 8-1


    Theoretical framework


    The code in Listing 8-1 performs the data manipulation tasks.


    ```

    country = ["ZAF"]

    indicator = {"SP.URB.TOTL":"urban_pop",

    "NY.GNP.PCAP.CD":"gni_per_capita",

    "NY.GDP.MKTP.KD.ZG":"gdp_growth",

    "SP.DYN.LE00.IN":"life_exp"}

    df = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    df["urban_pop"] = df["urban_pop"].fillna(df["urban_pop"].mean())

    df["gni_per_capita"] = df["gni_per_capita"].fillna(df["gni_per_capita"].mean())

    df["gdp_growth"] = df["gdp_growth"].fillna(df["gdp_growth"].mean())

    df["life_exp"] = df["life_exp"].fillna(df["life_exp"].mean())

    df[''gni_per_capita''] = np.where((df["gni_per_capita"] > 5000),df["gni_per_capita"].mean(),df["gni_per_capita"])

    df[''pct_change''] = df["life_exp"].pct_change()

    df = df.dropna()

    df[''direction''] = np.sign(df[''pct_change'']).astype(int)

    df["direction"] = pd.get_dummies(df["direction"])

    df[''pct_change''] = df["life_exp"].pct_change()

    df = df.dropna()

    df[''direction''] = np.sign(df[''pct_change'']).astype(int)

    df["direction"] = pd.get_dummies(df["direction"])

    del df["pct_change"]

    del df["life_exp"]

    from sklearn.preprocessing import StandardScaler

    x = df.iloc[::,0:3]

    scaler = StandardScaler()

    x= scaler.fit_transform(x)

    y = df.iloc[::,-1]

    from sklearn.model_selection import train_test_split

    x_train, x_test, y_train, y_test = train_test_split(x,y,test_size=0.2,random_state=0)

    Listing 8-1

    Data Preprocessing

    ```


    ## Restricted Boltzmann Machine Classifier


    The restricted Boltzmann machine classifier is a simple artificial neural network
    that consists of one hidden layer and one visible layer. Figure 8-2 shows the
    structure of a restricted Boltzmann machine classifier.


    ![../images/516940_1_En_8_Chapter/516940_1_En_8_Fig2_HTML.png](images/516940_1_En_8_Chapter/516940_1_En_8_Fig2_HTML.png)


    Figure 8-2


    Restricted Boltzmann machine structure


    Figure 8-2 shows that each node in the hidden layer automatically retrieves input
    values, transforms the retrieved input data by applying an activation function,
    and transmits the data to the visible layer. The restricted Boltzmann machine
    classifier estimates the gradient from the left to the right—this learning process
    is called the *forward propagation* process.


    ## Restricted Boltzmann Machine Classifier Development


    Listing 8-2 is the Restricted Boltzmann Machine Development classifier, applying
    default hyperparameters. Notice that it applies the `Pipeline()` method to set
    parameters of the final classifier, including those of the restricted Boltzmann
    machine and logistic regression classifier.


    ```

    from sklearn.neural_network import BernoulliRBM

    from sklearn.linear_model import LogisticRegression

    rbm = BernoulliRBM()

    logreg = LogisticRegression()

    from sklearn.pipeline import Pipeline

    rbmclassifier = Pipeline(steps=[("rbm",rbm),("logreg",logreg)])

    rbmclassifier.fit(x_train,y_train)

    Listing 8-2

    Restricted Boltzmann Machine Classifier Development

    ```'
