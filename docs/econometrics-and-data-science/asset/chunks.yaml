    \n## 结论\n\n本章介绍了高斯混合模型，这是一种隐马尔可夫模型（HMM）。鉴于状态数量是预定义的（其中`0`代表第一种状态，`1`代表第二种状态），我们使用两个分量来探索该模型。然后，我们将该模型应用于世界\
    \ GDP 增长（年百分比）的序列数据，以预测未来状态。\n\n# 7. 按大洲层级对人均国民总收入进行聚类\n\n本章介绍无监督机器学习。在无监督机器学习中，你不会分割数据，而是将整个数据集呈现给模型，让模型自行发现数据中的模式，无需任何监督。鉴于本章涵盖聚类分析，因此将介绍最简单的无监督机器学习模型，称为*k-means*。`k-means`方法易于理解。在进行聚类分析时，没有真正的响应变量——你以同样的方式处理所有变量。也没有预测变量，因此不存在预测/预报的情况。你仅需分析数据中的模式。\n\
    \n`k-means`模型根据值的相似性对其进行分组。首先，模型找出彼此接近的值，并估计它们之间的距离。然后，确定这组值的中心，并以某种方式拉伸这些值，使它们都落在同一个簇内。它通过实施距离估计来寻找组内的相似性。最常见的距离估计方法是欧几里得距离估计。公式\
    \ 7-1 展示了欧几里得方程。\n\n![$$ J={\\sum}_{i=1}^k{\\sum}_{i=1}^c{\\left|\\left|{x}_i^J-{C}_j\\\
    right|\\right|}² $$](img/516940_1_En_7_Chapter_TeX_Equ1.png)\n\n（公式 7-1）\n\n其中，`J`代表目标函数，`k`代表聚类数量，`n`代表案例数量，`x_i^J`代表*案例*[*j*]，`C[j]`代表`j`的质心。\n\
    \n该模型与其他模型的不同之处在于，它假设你是基于数据分析来确定聚类数量。要确定聚类数量，你可以应用肘部曲线或碎石图。\n"
- fmt: '### Context of This Chapter


    This chapter approaches the problem with the assumption that there are three clusters
    in the data. It groups African countries by applying these three labels:


    - Low GNI (gross national income) per capita

    - Moderate GNI per capita

    - High GNI per capita


    It applies the elbow curve to determine whether this assumption regarding the
    data is correct. It then uses the k-means model on the entire GNI per capita data
    of African countries. Given that there are many variables, it does not describe
    all the data.


    To conduct the cluster analysis, you first need to perform descriptive analysis,
    and then you perform dimension reduction to reduce any high-dimensional data into
    a few dimensions. Previous chapters covered the dimension reduction technique
    called Principal Component Analysis (PCA). This technique reduces data so you
    can represent it in two dimensions by applying a scatter plot. Listing [7-1](#516940_1_En_7_Chapter.xhtml#PC1)
    retrieves the GNI per capita data for this chapter (see Table [7-1](#516940_1_En_7_Chapter.xhtml#Tab1)).


