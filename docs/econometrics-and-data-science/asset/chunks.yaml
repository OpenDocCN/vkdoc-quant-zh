    # 多层感知器（MLP）分类器


    本节将介绍多层感知器分类器——它是受限玻尔兹曼机分类器的一种扩展，也被称为*原始模型*。它是指具有多个隐藏层的受限玻尔兹曼机分类器。该模型包含三个层（见图
    8-6）。


    ![../images/516940_1_En_8_Chapter/516940_1_En_8_Fig6_HTML.png](img/516940_1_En_8_Fig6_HTML.png)


