    Listing [3-21](#516940_1_En_3_Chapter.xhtml#PC21) develops a multivariate ordinary
    least-squares regression model by applying the `statsmodels` library to determine
    whether there is a significant difference in the relationship between the U.S.
    social contributions, the lending interest rate, and the final consumption expenditure.
    Table [3-8](#516940_1_En_3_Chapter.xhtml#Tab8) highlights the values of the U.S.
    final consumption expenditure that the model predicts.


    Table 3-8


    Predictions (Statsmodels)


    |   | Predicted FCE |

    |---|---|

    | 0 | 1.785433e+12 |

    | 1 | 3.810297e+12 |

    | 2 | 1.727029e+12 |

    | 3 | 7.169544e+12 |

    | 4 | 1.272881e+13 |


    ```

    import statsmodels.api as sm

    x_constant = sm.add_constant(x_train)

    x_test = sm.add_constant(x_test)

    model = sm.OLS(y_train,x_constant).fit()

    pd.DataFrame(model.predict(x_constant), columns = ["Predicted FCE"]).head()

    Listing 3-21

    Develop a Multivariate Model Applying Statsmodels

    ```


