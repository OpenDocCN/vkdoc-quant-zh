  raw: '### GDP Growth (Annual Percentage)


    GDP stands for Gross Domestic Product. It estimates the market value of finished
    goods and services that households of a country consume annually. It is an exemplary
    indicator for diagnosing the health of an economy, as it conveys the country’s
    economic production. There are two main ways of estimating GDP, using the *nominal*
    GDP (a GDP estimate that does not consider inflation), and using the *real* GDP,
    which is a GDP estimate that considers inflation. Equation 3-1 is the GDP formula.


    ![$$ Y=C+I+G+\left(X-M\right) $$](images/516940_1_En_3_Chapter/516940_1_En_3_Chapter_TeX_Equ1.png)


    (Equation 3-1)


    Where *Y* represents GDP, *C* represents consumer spending, *I* represent investments,
    *G* represents government spending, *X* represents exports, and *M* represents
    imports. Figure [3-3](#516940_1_En_3_Chapter.xhtml#Fig3) shows the changes in
    annual percentage growth of the GDP in the U.S. from 1971 to 2020\. See Listing
    [3-3](#516940_1_En_3_Chapter.xhtml#PC3).


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig3_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig3_HTML.png)


    Figure 3-3


    The U.S. GDP growth


    ```

    country = ["USA"]

    gdp_growth = {"NY.GDP.MKTP.KD.ZG":"gdp_growth"}

    gdp_growth = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    gdp_growth.plot(kind="line",color="navy",lw=4)

    plt.title("The U.S. GDP growth (annual %)")

    plt.ylabel("GDP growth (annual %)")

    plt.xlabel("Date")

    plt.show()

    Listing 3-3

    The U.S. GDP Growth (Annual %)

    ```


    Figure [3-3](#516940_1_En_3_Chapter.xhtml#Fig3) shows the zig zag pattern of the
    U.S. GDP, which has been adjusted for inflation. In 1981, the United States experienced
    its highest change in GDP. In 2019, on the other hand, economic activity was very
    low (the GDP grew by 2.161176).


    ### Final Consumption Expenditure


    The final consumption expenditure is the market value of all goods and services
    purchased by households (see Listing [3-4](#516940_1_En_3_Chapter.xhtml#PC4)).
    This includes durable products such as cars and personal computers. Figure [3-4](#516940_1_En_3_Chapter.xhtml#Fig4)
    illustrates the U.S. final consumption expenditure in current U.S. dollars.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig4_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig4_HTML.png)


    Figure 3-4


    The U.S. final consumption expenditure


    ```

    country = ["USA"]

    indicator = {"NE.CON.TOTL.CD":"fin_cons"}

    fin_cons = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    social_contri.plot(kind="line",color="red",lw=4)

    plt.title("The U.S. FCE")

    plt.ylabel("FCE")

    plt.xlabel("Date")

    plt.show()

    Listing 3-4

    The U.S. Final Consumption Expenditure (Current U.S. Dollars)

    ```


    Figure [3-4](#516940_1_En_3_Chapter.xhtml#Fig4) shows an extreme upward trend
    in the U.S. final consumption expenditure data, which was slightly disrupted in
    2012\. Next, you explore a theoretical framework in order to have some background
    on the phenomenon.


    ## Theoretical Framework


    This chapter applies the multivariate regression method to determine whether a
    set of predictor variables (the U.S. social contributions, the lending interest
    rate, and the GDP growth) influence the response variable (the U.S. final consumption
    expenditure). Figure [3-5](#516940_1_En_3_Chapter.xhtml#Fig5) shows the theoretical
    framework of the problem at hand.


    ![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig5_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig5_HTML.png)


    Figure 3-5


    Theoretical framework


    Based on Figure [3-5](#516940_1_En_3_Chapter.xhtml#Fig5), the chapter tests the
    following hypotheses.


    HYPOTHESES 1


    H[0]: There is no significant difference between the U.S. social contributions
    and the final consumption expenditure.


    H[A]: There is a significant difference between the U.S. social contributions
    and the final consumption expenditure.


    HYPOTHESES 2


    H[0]: There is no significant difference between the U.S. lending interest rate
    and the final consumption expenditure.


    H[A]: There is a significant difference between the U.S. lending interest rate
    and the final consumption expenditure.


    HYPOTHESES 3


    H[0]: There is no significant difference between the U.S. GDP growth and the final
    consumption expenditure.


    H[A]: There is a significant difference between the U.S. GDP growth and the final
    consumption expenditure.


    This chapter applies the ordinary least-squares regression model to investigate
    whether changes in the following three affect the consumption patterns in U.S.
    households:


    *   The rate financial institutions in the U.S. charge customers for lending


    *   The annual growth in the U.S. economic activities considering inflation


    *   Contributions that U.S. organizations and citizens make to social security


    Listing [3-5](#516940_1_En_3_Chapter.xhtml#PC5) applies `wbdata` to acquire data
    associated with the U.S. social contributions, the lending interest rate, the
    GDP growth, and final consumption expenditure (see Table [3-2](#516940_1_En_3_Chapter.xhtml#Tab2)).


