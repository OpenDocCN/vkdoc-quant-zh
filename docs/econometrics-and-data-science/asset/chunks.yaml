- fmt: '# Structural Equation Model Estimation


    SEM operates on variables by applying the Maximum Likelihood method or the general
    least-squares method. The Maximum Likelihood method works when the implicit assumptions
    of regression are not satisfied and it determines the parameters that best fit
    the data. The general least-squares method regresses the variables. Listing [10-11](#516940_1_En_10_Chapter.xhtml#PC11)
    structures the model’s hypothetical framework.


    ```

    import semopy

    import wbdata

    from semopy import Model

    import semopy

    import wbdata

    from semopy import Model

    mod = """   life_exp ~ gdp_per_capita

    final_con ~ inflation + life_exp + gdp_per_capita

    """

    Listing 10-11

    Develop Hypothetical Structure

    ```


    # Structural Equation Model Development


    Listing [10-12](#516940_1_En_10_Chapter.xhtml#PC12) trains SEM with the default
    hyperparameters.


    ```

    m = Model(mod)

    m.fit(df)

    SolverResult(fun=0.549063553713184, success=True, n_it=18, x=array([-0.33778359,
    -0.19991271, -0.92551867, -0.04842324,  8.35819007,

    1.2715286 ]), message=''Optimization terminated successfully'', name_method=''SLSQP'',
    name_obj=''MLW'')

