    # 6. Finding Hidden Patterns in World Economy and Growth


    This chapter introduces decision-making using a Hidden Markov model (HMM). Specifically,
    it focuses on the Gaussian Mixture model, which is an unsupervised machine learning
    Hidden Markov model used with time-series data. The beauty of this model is its
    lack of sensitivity to non-stationary data. After reading this chapter, you will
    better understand how the Gaussian Mixture model works and will know how to develop
    one. Note that HMM is an unsupervised learner, which means you can perform an
    investigation without any predetermined research hypothesis.


    This chapter assumes there are two classes, called *states* in Markov decision-making.
    A series contains continuous values, and at times, you’ll want to classify the
    series. For instance, you can classify a series as having an “upward trend” or
    a “downward trend,” where state `0` represents the upward trend and state `1`
    represents the downward trend. This is where Markov modeling comes in. Markov
    modeling involves sequential recognition of current and preceding states, then
    models to forecast future states. Although it is a useful method for discovering
    hidden states in a series, there are insufficient metrics for evaluating the models—the
    most you can get is the mean and covariance at each state.


    Before you proceed, make sure you have the `hmmlearn` library installed in your
    environment. To install the `hmmlearn` library in a Python environment, use `pip
    install hmmlearn`. Equally, to install the library in a Conda environment, use
    `conda install -c conda-forge hmmlearn`.'
