    ## Residual Analysis


    A *residual* represents an estimate of the difference between the data points
    that the linear regression method estimates and the actual data points. Equation
    [2-10](#516940_1_En_2_Chapter.xhtml#Equ10) defines residuals.


    ![$$ {\varepsilon}_i=y-\hat{y} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ10.png)


    (Equation 2-10)


    The ordinary least-squares regression model comes with the normality assumption.


    ```

    plt.scatter(y_test,predicted_values,color="navy",s=200)

    plt.title("The U.S. actual and predicted FCE")

    plt.xlabel("Actual U.S. FCE")

    plt.ylabel("Predicted U.S. FCE")

    plt.show()

    Listing 2-22

    The U.S. Actual and Predicted Values of Final Consumption Expenditures

    ```


    ![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig12_HTML.jpg](images/516940_1_En_2_Chapter/516940_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    The U.S. actual and predicted values of the final consumption expenditures


    Figure [2-12](#516940_1_En_2_Chapter.xhtml#Fig12) shows that the actual data points
    and the predicted data points of the U.S. final consumption expenditure are randomly
    distributed. Figure [2-13](#516940_1_En_2_Chapter.xhtml#Fig13) shows the central
    tendency and the dispersion of residuals.


    ![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig13_HTML.png](images/516940_1_En_2_Chapter/516940_1_En_2_Fig13_HTML.png)


    Figure 2-13


    Ordinary least-squares regression model residual distribution


    ```

    residuals = y_test - predicted_values

    residuals = pd.DataFrame(residuals)

    residuals.columns = ["Residuals"]

    residuals.plot(kind="box",color="navy")

    plt.title("Model residual distribution")

    plt.ylabel("Values")

    plt.show()

    Listing 2-23

    Ordinary Least-Squares Regression Model Residual Distribution

    ```


    Figure [2-13](#516940_1_En_2_Chapter.xhtml#Fig13) shows that the mean data point
    is far from 0\. This indicates that the ordinary least-squares regression model
    does not meet the assumption. Figure [2-14](#516940_1_En_2_Chapter.xhtml#Fig14)
    shows the serial correlation. It shows the number of *lags* (how far back the
    residuals in the present time are related to themselves) on the x-axis and the
    autocorrelation in the y-axis. Straight lines with blue dots are the autocorrelation
    coefficients. If there are any autocorrelation correlation coefficients that are
    outside the statistical control (the blue region), the model does not meet the
    regression assumptions.


    ![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig14_HTML.png](images/516940_1_En_2_Chapter/516940_1_En_2_Fig14_HTML.png)


    Figure 2-14


    Ordinary least-squares regression model residuals autocorrelation


    ```

    from statsmodels.graphics.tsaplots import plot_acf

    plot_acf(residuals)

    plt.title("Model residuals autocorrelation")

    plt.xlabel("Lags")

    plt.ylabel("ACF")

    plt.show()

    Listing 2-24

    Ordinary Least-Squares Regression Model Residual Autocorrelation

    ```


    Figure [2-14](#516940_1_En_2_Chapter.xhtml#Fig14) demonstrates that after the
    lag, there are no autocorrelation coefficients that are outside the blue region
    (the confidence interval).


    ### Other Ordinary Least-Squares Regression Model Performance Metrics


    Other ordinary least-squares regression model performance metrics include the
    following:


    *   **Mean Absolute Error**—Represents the average magnitude of the errors prior
    to regressing the variables.


    *   **Mean Squared Error**—Represents an average of the sum of errors.


    *   **Root-MSE**—Represents the variability explained after regressing variables.
    Apply RMSE when you do not want huge residuals.


    *   **R-squared**—Represents the extent to which a regressor explains the variability
    in the data.


    ```

    from sklearn import metrics

    MAE = metrics.mean_absolute_error(y_test,predicted_values)

    MSE = metrics.mean_squared_error(y_test,predicted_values)

    RMSE = np.sqrt(MSE)

    EV = metrics.explained_variance_score(y_test,predicted_values)

    R2 = metrics.r2_score(y_test,predicted_values)

    lmmodelevation = [[MAE,MSE,RMSE,EV,R2]]

    lmmodelevationdata = pd.DataFrame(lmmodelevation, index=["Values"],columns=("Mean
    absolute error", "Mean squared error", "Root mean squared error", "Explained variance
    score", "R-squared"))

    lmmodelevationdata

    Listing 2-25

    Ordinary Least-Squares Regression Model Performance Matrix

    ```


    Table 2-9


    Ordinary Least-Squares Regression Model Performance Matrix


    |   | Mean Absolute Error | Mean Squared Error | Root Mean Squared Error | Explained
    Variance Score | R-Squared |

    | --- | --- | --- | --- | --- | --- |

    | **Values** | 2.501582e+12 | 1.023339e+25 | 3.198966e+12 | 0.524619 | 0.513118
    |


    Table [2-9](#516940_1_En_2_Chapter.xhtml#Tab9) shows that the ordinary least-squares
    regression model explains 51.31% of the variability in the data. The magnitude
    average of the errors prior to regressing variables is 2.501582e+12 and the average
    sum of error is 1.023339e+25\. Last, the explained variance score is 52.46%, further
    confirming mediocrity in the model.'
