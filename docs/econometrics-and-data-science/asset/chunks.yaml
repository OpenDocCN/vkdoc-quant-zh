    # 10. Economic Causal Analysis Applying Structural Equation Modeling


    This last chapter of a book introduces ways of approaching economic problems by
    applying various quantitative techniques. It covers the structural equation model
    (SEM). Note that this is not a single method, but a framework that includes multiple
    methods. This method serves many purposes. It applies covariance analysis, for
    investigating joint variability, correlation analysis, for investigating statistical
    dependence, factor analysis, for investigating the variability explained by the
    data about the model, and multivariate regression analysis, for investigating
    how various predictor variables influence the response variable. It also uses
    path analysis, for investigating structural models without measurement models.


    The structural equation models include a set of models that determine the nature
    of causal relationships among sets of variables. It includes factor analysis,
    path analysis, and regression analysis. It helps developers investigate mediating
    relationships, so they can detect how the presence of other variables weakens
    or strengthens the nature of the structural relationship between the predictor
    variable and the response variable.


    SEM has an advantage over the models previously covered, as it investigates multiple
    relationships to predict multiple response variables at the same time. Figure
    [10-1](#516940_1_En_10_Chapter.xhtml#Fig1) shows how the models covered in the
    preceding chapters work. Most models focus on the direct influence of the predictor
    variables on a response variable.


    ![../images/516940_1_En_10_Chapter/516940_1_En_10_Fig1_HTML.png](images/516940_1_En_10_Chapter/516940_1_En_10_Fig1_HTML.png)


    Figure 10-1


    Machine learning model


    Figure [10-1](#516940_1_En_10_Chapter.xhtml#Fig1) shows that `x` has a direct
    influence on `y`. A function may be used to operate on a predictor variable (`x`)
    and generate an output value (`y`). When there is more than one response variable,
    the model experiences problems. It is also tedious to estimate multiple equations
    separately. This is where SEM comes in. SEM handles more than the predictor variable.
    In addition, it enables developer to consider the mediating effects of other variables.'
