- fmt: "## Ordinary Least-Squares Regression Model Learning Curve\n\nFigure [3-19](#516940_1_En_3_Chapter.xhtml#Fig19)\
    \ shows how the ordinary least-squares model learns to explain the variability\
    \ in the relationship among the U.S. social contributions, the lending interest\
    \ rate, the GDP growth, and the increasing and decreasing final consumption expenditure.\
    \ See Listing [3-37](#516940_1_En_3_Chapter.xhtml#PC37).\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig19_HTML.png](images/516940_1_En_3_Chapter/516940_1_En_3_Fig19_HTML.png)\n\
    \n**Figure 3-19**  \nOrdinary least-squares regression model learning curve\n\n\
    ```python\nfrom sklearn.model_selection import learning_curve\ntrainsizelogreg,\
    \ trainscorelogreg, testscorelogreg = learning_curve(lm, x,y,cv=5, n_jobs=-1,\
    \ scoring=\"r2\", train_sizes=np.linspace(0.1,1.0,50))\ntrainscorelogreg_mean\
    \ = np.mean(trainscorelogreg,axis=1)\ntrainscorelogreg_std = np.std(trainscorelogreg,axis=1)\n\
    testscorelogreg_mean = np.mean(testscorelogreg,axis=1)\ntestscorelogreg_std =\
    \ np.std(testscorelogreg,axis=1)\nfig, ax = plt.subplots()\nplt.plot(trainsizelogreg,trainscorelogreg_mean,\
    \ label=\"Training R2 score\", color=\"red\",lw=4)\nplt.plot(trainsizelogreg,testscorelogreg_mean,\
    \ label=\"Validation R2 score\",color=\"navy\",lw=4)\nplt.title(\"OLS learning\
    \ curve\")\nplt.xlabel(\"Training set size\")\nplt.ylabel(\"R2 score\")\nplt.legend(loc=4)\n\
    plt.show()\n```\n\n**Listing 3-37**  \nOrdinary Least-Squares Regression Model\
    \ Learning Curve\n\nFigure [3-19](#516940_1_En_3_Chapter.xhtml#Fig19) shows that\
    \ the cross-validation R² score is constant, and the training R² score is low\
    \ in the first data point, but it increases thereafter.\n\n## Conclusion\n\nThis\
    \ chapter used the ordinary least-squares regression model to investigate whether\
    \ there is a significant difference between the U.S. social contributions (current\
    \ LCU), the lending interest rate (as a percentage), the GDP growth (as an annual\
    \ percentage), and the final consumption expenditure (in current U.S. dollars).\
    \ The model found an extreme positive correlation between the U.S. social contributions\
    \ and final consumption, a moderate negative correlation between the U.S. lending\
    \ interest rate and final consumption, and a moderate negative correlation between\
    \ the U.S. GDP growth and final consumption. The `statsmodels` model and the `scikit-learn`\
    \ model do not violate regression assumptions and are both exemplary in predicting\
    \ the U.S. final consumption expenditure, but the `scikit-learn` model has greater\
    \ predictive power.\n\n# 4. Forecasting Growth\n\nTime series analysis involves\
    \ examining patterns and trends in sequential data to forecast the values of a\
    \ series. There is a myriad of time series models, including Autoregressive Moving\
    \ Average (ARIMA) (p, d, q), which applies linear transformation between preceding\
    \ and current values (autoregressive), integrative (random walk), and moving averages.\
    \ One ARIMA model includes seasonality, called Seasonal ARIMA (P, D, Q) x (p,\
    \ d, q). This chapter considers the additive model, which recognizes non-linearity\
    \ through smooth parameters. For the purposes of this book, you can consider time\
    \ series analysis an extension of linear regression, as it studies sequential\
    \ data. The principal difference is that, in time series analysis, you order data\
    \ over time, which makes assumptions much stricter than in linear regression models.\
    \ Before training the model, you must test for *stationarity* using the Augmented\
    \ Dickey-Fuller test, test for the presence of white noise, and test for autocorrelation.\n\
    \nThis chapter investigates these trends in the market value of finished goods\
    \ and services produced in the U.S. annually (see Equation 4-1):\n\n- A guiding\
    \ movement—Persistent movement uphill is an upward trend and a persistent movement\
    \ downward is a downward trend\n- Seasonality—A persistent year-to-year movement\
    \ (either uphill or downhill)\n- Irregular components—Also called residual components\n\
    \nLastly, the model forecasts future economic activities. Note that it does not\
    \ describe the central tendency of the data because the preceding chapter did\
    \ so.\n\nThis chapter uses the Python library called Prophet, which was developed\
    \ by Facebook. It is grounded on the additive model.\n\nBefore you proceed, be\
    \ sure that you have the `fbprophet` library installed in your environment. To\
    \ install the `fbprophet` library in a Python environment, use `pip install fbprophet`.\
    \ Equally, to install the library in a Conda environment, use `conda install -c\
    \ conda-forge fbprophet`. You also need to install the `pystan` library. To do\
    \ so in a Python environment, use `pip install pystan` and in a Conda environment,\
    \ use `conda install -c conda-forge pystan`.\n\nListing [4-1](#516940_1_En_4_Chapter.xhtml#PC1)\
    \ extracts the U.S. GDP growth data (as an annual percentage) and plots the series\
    \ (see Figure [4-1](#516940_1_En_4_Chapter.xhtml#Fig1)).\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig1_HTML.png](images/516940_1_En_4_Chapter/516940_1_En_4_Fig1_HTML.png)\n\
    \n**Figure 4-1**  \nThe U.S. GDP growth line plot\n\n```python\nimport wbdata\n\
    import matplotlib.pyplot as plt\n%matplotlib inline\ncountry = [\"USA\"]\nindicator\
    \ = {\"FI.RES.TOTL.CD\":\"gdp_growth\"}\ndf = wbdata.get_dataframe(indicator,\
    \ country=country, convert_date=True)\ndf.plot(kind=\"line\",color=\"green\",lw=4)\n\
    plt.title(\"The U.S. GDP growth (annual %)\")\nplt.xlabel(\"Dates\")\nplt.ylabel(\"\
    GDP growth (annual %)\")\nplt.legend(loc=\"best\")\nplt.show()\n```\n\n**Listing\
    \ 4-1**  \nThe U.S. GDP Growth (Annual Percentage) Line Plot\n\nFigure [4-1](#516940_1_En_4_Chapter.xhtml#Fig1)\
    \ demonstrates an upward trend in the GDP growth in the United States since the\
    \ early 1960s. In early 2012, the U.S. GDP growth declined and then regained momentum\
    \ in 2015. Listing [4-2](#516940_1_En_4_Chapter.xhtml#PC2) substitutes any missing\
    \ values with the mean value.\n\n```python\ndf[\"gdp_growth\"] = df[\"gdp_growth\"\
    ].fillna(df[\"gdp_growth\"].mean())\n```\n\n**Listing 4-2**  \nReplacing Missing\
    \ Values with the Mean Value\n\n## Descriptive Statistics\n\nListing [4-3](#516940_1_En_4_Chapter.xhtml#PC3)\
    \ retrieves Table [4-1](#516940_1_En_4_Chapter.xhtml#Tab1), which outlines the\
    \ descriptive statistics.\n\n**Table 4-1**  \nDescriptive Statistics\n\n| | gdp_growth\
    \ |\n| --- | --- |\n| Count | 6.100000e+01 |\n| Mean | 1.822831e+11 |\n| Std |\
    \ 1.646309e+11 |\n| Min | 1.483107e+10 |\n| 25% | 4.416213e+10 |\n| 50% | 1.441768e+11\
    \ |\n| 75% | 1.904648e+11 |\n| Max | 6.283697e+11 |\n\n```python\ndf.describe()\n\
    ```\n\n**Listing 4-3**  \nDescriptive Statistics\n\nTable [4-1](#516940_1_En_4_Chapter.xhtml#Tab1)\
    \ shows that:\n\n- The mean value of GDP growth in the United States is 6.000000e+01.\n\
    - The independent data points of GDP growth in the United States deviate from\
    \ the mean by 1.748483e+11. See Listing [4-4](#516940_1_En_4_Chapter.xhtml#PC4).\n\
    \n```python\ndf.plot(kind=\"box\",color=\"green\")\nplt.title(\"The U.S. GDP growth\
    \ (annual %) distribution\")\nplt.ylabel(\"Values\")\nplt.show()\n```\n\n**Listing\
    \ 4-4**  \nThe U.S. GDP Growth Distribution\n\n![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig2_HTML.jpg](images/516940_1_En_4_Chapter/516940_1_En_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2**  \nThe U.S. GDP growth distribution\n\nFigure [4-2](#516940_1_En_4_Chapter.xhtml#Fig2)\
    \ shows that there are outliers in the GDP growth data in the United States. Listing\
