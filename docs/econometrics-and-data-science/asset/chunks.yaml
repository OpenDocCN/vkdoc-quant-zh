    ## Seasonal Decomposition


    Seasonal decomposition involves fragmenting sequential data into a few components,
    so developers can better comprehend the series. Such components include:


    - Seasonality, which represents a permanent pattern over time.

    - Trends, which are temporary persistent patterns in a series over time.

    - Irregularities, which represent the variability of the U.S. GDP growth data.


    This chapter does not cover seasonal decomposition given the frequency at which
    the data is collected and the fact that there are only a few data points of U.S.
    GDP growth. They collect data annually, and we cannot break seasonality down into
    daily and weekly seasonality. It is, however, important to comprehend how seasonal
    decomposition works.


    ## Conclusion


    This chapter introduced a time series analysis model called the additive model.
    Prior to fitting the model, you learned how to confirm time series analysis assumptions
    by testing for stationarity, white noise, autocorrelation, and normality. Thereafter,
    the chapter covered trends, seasonality, and residuals. The model forecasted a
    dominant upward forthcoming trend in the annual U.S. GDP growth. The next chapter
    introduces a classification method called *logistic regression*. You use this
    model when you want to operate predictor variables to generate a binary output
    value.


    # 5. Classifying Economic Data Applying Logistic Regression


    This chapter applies logistic regression to investigate the nature of the relationship
    between variables when the response variable is a category (meaning it’s limited
    to only a few classes). This model is the most common non-linear model and it’s
    often called *classification*. It uses a Sigmoid function to model the data.


    Figure [5-1](#516940_1_En_5_Chapter.xhtml#Fig1) demonstrates that the classifier
    operates on a predictor variable to generate a binary output value. Equation [5-1](#516940_1_En_5_Chapter.xhtml#Equ1)
    shows the sigmoid equation.


    ![$$ s(x)=\frac{1}{}1+e-x $$](images/516940_1_En_5_Chapter/516940_1_En_5_Chapter_TeX_Equ1.png)


    (Equation 5-1)


    You might have recognized that macroeconomic data is often continuous. Worry not,
    as you can still perform logistic regression on this kind of data. All you need
    to do is categorize the response variable based on direction (upward or downward).
    You can base this on a formula of an S-shape, called the *sigmoid shape* (see
    Figure [5-1](#516940_1_En_5_Chapter.xhtml#Fig1)).


    ![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig1_HTML.png](images/516940_1_En_5_Chapter/516940_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Sigmoid function


    ![$$ \left(\right)\frac{}{}1+-x $$](images/516940_1_En_5_Chapter/516940_1_En_5_Chapter_TeX_Equa.png)


    In linear regression, the response variable is continuous. On the other hand,
    in logistic regression, the response variable is binary and can be applied to
    multiclass classification. In addition, classifiers do not make extreme assumptions
    about the linearity and normality of the data.


