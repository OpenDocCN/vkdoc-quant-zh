  trans: "\n# 2. 应用回归的单变量消费研究\n\n本章介绍标准单变量（或简单）线性回归模型，即普通最小二乘模型，该模型在减小残差的同时估计截距和斜率（见公式\
    \ 2-1）。它应用该模型来确定美国银行贷款利率与美国家庭每年消费的商品和服务市场价值之间的关系。本章内容包括进行协方差分析、相关性分析、模型开发、交叉验证、超参数优化以及模型性能分析的方法。\n\
    \n普通最小二乘模型是最常见的参数化方法之一。它对数据建立了强有力的假设——即期望数据满足*正态性*（变量值围绕均值分布）和*线性*（自变量与因变量之间存在关联）。本章使用最常见的参数化方法，即*普通最小二乘模型*，来研究预测变量（自变量）与响应变量（因变量）之间的关联。该方法基于一条直线方程（见图\
    \ 2-1）。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig1_HTML.png](img/516940_1_En_2_Fig1_HTML.png)\n\
    \n**图 2-1**  \n最佳拟合线\n\n图 2-1 显示了一条红色直线和独立的绿色数据点——该直线穿过这些数据点。公式 2-1 展示了普通最小二乘方程。\n\
    \n![$$ \\hat{y}={\\hat{\\beta}}_0+{\\hat{\\beta}}_1{\\hat{X}}_1+{\\hat{\\varepsilon}}_i\
    \ $$](img/516940_1_En_2_Chapter_TeX_Equ1.png)\n\n**（公式 2-1）**\n\n其中，![$$ \\hat{y}\
    \ $$](img/516940_1_En_2_Chapter_TeX_IEq1.png) 是预测的响应变量（本例中为预期的美国最终消费支出），![$$ {\\\
    hat{\\beta}}_0 $$](img/516940_1_En_2_Chapter_TeX_IEq2.png) 代表截距——表示响应变量的均值（本例中为以美元计价的美国最终消费支出），![$$\
    \ 1{\\hat{X}}_1 $$](img/516940_1_En_2_Chapter_TeX_IEq3.png) 代表预测变量（本例中为美国贷款利率），![$$\
    \ {\\hat{\\beta}}_1 $$](img/516940_1_En_2_Chapter_TeX_IEq4.png) 是斜率——表示 `X`（美国贷款利率）与最终消费支出（现价美元）之间关系的方向。观察图\
    \ 2-1 中的红色直线——斜率为正）。最后，![$$ i{\\hat{\\varepsilon}}_i $$](img/516940_1_En_2_Chapter_TeX_IEq5.png)\
    \ 代表误差项（参考公式 2-2）。\n\n![$$ i{\\hat{\\varepsilon}}_i=y-\\hat{y} $$](img/516940_1_En_2_Chapter_TeX_Equ2.png)\n\
    \n**（公式 2-2）**\n\n其中 `ε[i]` 是误差项（也称为*残差项*）——代表 `yi`（实际的美国最终消费支出）与 ![$$ \\hat{y}\
    \ $$](img/516940_1_En_2_Chapter_TeX_IEq6.png)`[i]`（预测的美国最终消费支出）之间的差值。\n\n带帽号（^）的变量（样本回归函数）与不带帽号的变量（总体回归函数）之间存在区别。我们是从总体样本中估计那些带帽号的变量，而不是从整个总体中估计。\n\
    \n## 本章背景\n\n本章使用普通最小二乘回归模型来确定预测变量（美国贷款利率，以百分比表示）与响应变量（最终消费支出，以现价美元计）之间的线性关系。表\
    \ 2-1 概述了本章使用的宏观经济指标。\n\n**表 2-1**  \n本章使用的美国宏观经济指标\n\n| 代码 | 标题 |\n| --- | ---\
    \ |\n| `FR.INR.LEND` | 贷款利率（以百分比表示） |\n| `NY.GDP.MKTP.KD.ZG` | 最终消费支出（以现价美元计）\
    \ |\n\n## 理论框架\n\n图 2-2 展示了本章探讨的关系。它建立了研究假设。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig2_HTML.png](img/516940_1_En_2_Fig2_HTML.png)\n\
    \n**图 2-2**  \n理论框架\n\n**假设**\n\n`H[0]`：美国贷款利率（%）与最终消费支出（现价美元）之间无显著差异。\n\n`H[A]`：美国社会缴款与最终消费支出（现价美元）之间存在显著差异。\n\
    \n该研究假设旨在确定美国贷款利率的变化是否会影响最终消费支出（现价美元）。\n\n### 贷款利率\n\n贷款利率估计了私营银行对短期和中期贷款收取的利息率。我们以年百分比表示该估计值。图\
    \ 2-3 展示了从 1960 年到 2020 年美国私营银行对短期和中期融资收取的利率。在继续之前，请确保您的环境中已安装 Matplotlib 库。要在\
    \ Python 环境中安装 Matplotlib 库，请使用 `pip install matplotlib`。同样，要在 Conda 环境中安装该库，请使用\
    \ `conda install -c conda-forge matplotlib`。见列表 2-1。\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig3_HTML.jpg](img/516940_1_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3**  \n美国贷款利率\n\n```\nimport wbdata\nfrom matplotlib.pyplot import\n%matplotlib\
    \ inline\ncountry  = [\"USA\"]\nindicator = {\"FP.CPI.TOTL.ZG\":\"lending_rate\"\
    }\ninflation_cpi = wbdata.get_dataframe(indicator, country=country,  convert_date=True)\n\
    inflation_cpi.plot(kind=\"line\",color=\"green\",lw=4)\nplt.title(\"The U.S. lending\
    \ interest rate (%)\")\nplt.ylabel(\"Lending interest rate (%)\")\nplt.xlabel(\"\
    Date\")\nplt.legend(loc=\"best\")\nplt.show()\n列表 2-1\n美国贷款利率\n```\n\n图 2-3 显示，从\
    \ 1960 年到 1980 年，美国银行对私营短期和中期贷款收取的利率从 1.45% 增长到 13.55%（最高峰值）。此后，在 1980 年代初，利率急剧下降，然后保持停滞。该图还显示贷款利率在\
    \ 2008 年达到最低点。总之，在 1970 年代末从美国银行获得债务的成本更高，而在 2008 年则相对便宜。\n"
- fmt: "### Final Consumption Expenditure (in Current U.S. Dollars)\n\nThe final consumption\
    \ expenditure is the market value of general goods and services that households\
    \ in an economy purchase (see Listing [2-2](#516940_1_En_2_Chapter.xhtml#PC2)).\
    \ Figure [2-4](#516940_1_En_2_Chapter.xhtml#Fig4) demonstrates the U.S. final\
    \ consumption expenditure from 1960 to 2020.\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig4_HTML.jpg](images/516940_1_En_2_Chapter/516940_1_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4  \nThe U.S. final consumption expenditure\n\n```\ncountry = [\"USA\"\
    ]\nindicator = {\"NE.CON.TOTL.CD\":\"final_consumption\"}\nfinal_consumption =\
    \ wbdata.get_dataframe(indicator, country=country, convert_date=True)\nfinal_consumption.plot(kind=\"\
    line\",color=\"orange\",lw=4)\nplt.title(\"The U.S. FCE\")\nplt.ylabel(\"FCE\"\
    )\nplt.xlabel(\"Date\")\nplt.legend(loc=\"best\")\nplt.show()\n```\nListing 2-2\
    \  \nThe U.S. Final Consumption Expenditure (Current U.S. Dollars)\n\nFigure [2-4](#516940_1_En_2_Chapter.xhtml#Fig4)\
    \ shows that there has been an uninterruptible upswing in the market value of\
    \ general goods and services that U.S. households purchased since 1970.\n\n##\
    \ The Normality Assumption\n\nA normal distribution is also called a Gaussian\
    \ distribution. This book uses these terms interchangeably. This distribution\
    \ shows saturation data points around the mean data point. Ordinary least-squares\
    \ regression models assume data points saturate the mean data point, thus you\
    \ must detect normality before training the model on the U.S. lending interest\
    \ rate and the final consumption expenditure data.\n\n### Normality Detection\n\
    \nNormality detection involves investigating the central tendency of data points.\
    \ If the U.S. lending interest rate and the final consumption expenditure data\
    \ saturates the mean data point, you can summarize the data using the central\
    \ data points. An additional implicit assumption is that the errors follow the\
    \ normality assumption, which makes them easier to deal with. To detect normality,\
    \ you must estimate the mean data point (see Equation [2-3](#516940_1_En_2_Chapter.xhtml#Equ3)).\n\
    \n![$$\\underset{\\_}{x}=\\frac{x_1+{x}_2x+{x}_3\\dots{x}_i}{n}$$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ3.png)\n\
    \n(Equation 2-3)\n\nWhere ![$$\\underset{\\_}{x}$$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq7.png)\
    \ is the mean value, `x[1]` is the first data point, `x[2]` is the second data\
    \ point, and so forth, and `n` represents the total number of data points. You\
    \ divide the count of data points by degrees of freedom. Alternatively, you can\
    \ find the median data point (the central data point). To determine the dispersion,\
    \ estimate the standard deviation (see Equation [2-4](#516940_1_En_2_Chapter.xhtml#Equ4)).\n\
    \n![$$s=\\sqrt{\\frac{\\sum_{i=1}^n{\\left({x}_i-\\underset{\\_}{x}\\right)}^2}{n-1}}$$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ4.png)\n\
    \n(Equation 2-4)\n\nAfter estimating the standard deviation, you square it to\
    \ find the variance (see Equation [2-5](#516940_1_En_2_Chapter.xhtml#Equ5)).\n\
    \n![$${s}^2=\\frac{\\sum_{i=1}^n{\\left({x}_i-\\underset{\\_}{x}\\right)}^2}{n-1}$$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ5.png)\n\
    \n(Equation 2-5)\n\nListing [2-3](#516940_1_En_2_Chapter.xhtml#PC3) retrieves\
    \ data relating to the U.S. lending interest and the final consumption expenditure\
    \ data from the World Bank. See Table [2-2](#516940_1_En_2_Chapter.xhtml#Tab2).\n\
    \nTable 2-2  \nThe U.S. Lending Interest Rate and Final Consumption Expenditure\
    \ Data\n\n| Date | lending_rate | final_consumption |\n| --- | --- | --- |\n|\
    \ 2020 | 3.544167 | NaN |\n| 2019 | 5.282500 | 1.753966e+13 |\n| 2018 | 4.904167\
    \ | 1.688457e+13 |\n| 2017 | 4.096667 | 1.608306e+13 |\n| 2016 | 3.511667 | 1.543082e+13\
    \ |\n\n```\ncountry  = [\"USA\"]\nindicators = {\"FR.INR.LEND\":\"lending_rate\"\
    ,\n\"NE.CON.TOTL.CD\":\"final_consumption\"}\ndf = wbdata.get_dataframe(indicators,\
    \ country=country, freq=\"M\", convert_date=False)\ndf.head()\n```\nListing 2-3\
    \  \nLoad the U.S. Lending Interest Rate and Final Consumption Expenditure Data\n\
    \nTable [2-2](#516940_1_En_2_Chapter.xhtml#Tab2) shows that data points are missing\
    \ from the data. Listing [2-4](#516940_1_En_2_Chapter.xhtml#PC4) substitutes the\
    \ missing data points with the mean value.\n\n```\ndf[\"lending_rate\"] = df[\"\
    lending_rate\"].fillna(df[\"lending_rate\"].mean())\ndf[\"final_consumption\"\
    ] = df[\"final_consumption\"].fillna(df[\"final_consumption\"].mean())\n```\n\
    Listing 2-4  \nReplacing Missing Data Points with the Mean Value"
  raw: '### Final Consumption Expenditure (in Current U.S. Dollars)


    The final consumption expenditure is the market value of general goods and services
    that households in an economy purchase (see Listing [2-2](#516940_1_En_2_Chapter.xhtml#PC2)).
    Figure [2-4](#516940_1_En_2_Chapter.xhtml#Fig4) demonstrates the U.S. final consumption
    expenditure from 1960 to 2020.


    ![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig4_HTML.jpg](images/516940_1_En_2_Chapter/516940_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    The U.S. final consumption expenditure


    ```

    country = ["USA"]

    indicator = {"NE.CON.TOTL.CD":"final_consumption"}

    final_consumption = wbdata.get_dataframe(indicator, country=country, convert_date=True)

    final_consumption.plot(kind="line",color="orange",lw=4)

    plt.title("The U.S. FCE")

    plt.ylabel("FCE")

    plt.xlabel("Date")

    plt.legend(loc="best")

