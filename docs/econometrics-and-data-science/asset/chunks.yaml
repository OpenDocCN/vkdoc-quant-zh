- fmt: '# Applying the Hidden Markov Model


    The Hidden Markov model determines preceding hidden states and forecasts future
    hidden states in a series. For this book, we treat the hidden states as classes.
    The preceding chapter presented ways of approaching sequential problems using
    a time series. In addition, it briefly covered binary classification and linear
    regression. This chapter develops a Gaussian Mixture model to forecast two states
    (decreasing world GDP growth and increasing world GDP growth). The Gaussian Mixture
    draws assumptions regarding the data by default. Whenever you come across the
    word "Gaussian," think of *normality* (variables saturated around the true mean
    value). This method splits the Gaussian distribution into halves, then determines
    the probability of a value falling with a certain state. This process happens
    incrementally.


    In summary, this example investigates the hidden patterns in the world GDP growth
    (as an annual percentage), whether decreasing or increasing. It then applies this
    model to forecast decreasing and increasing world GDP growth for a specific year.
    See Listing [6-1](#516940_1_En_6_Chapter.xhtml#PC1) and Table [6-1](#516940_1_En_6_Chapter.xhtml#Tab1).


