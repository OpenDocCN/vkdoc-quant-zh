    ## Context of the Book


    Each chapter of this book starts by covering the underlying concepts of a particular
    model. The chapters show ways to extract macroeconomic data for exploration, including
    techniques to ensure that the structure of the data is suitable for a chosen model
    and meets preliminary requirements. In addition, the chapters reveal possible
    ways of establishing a hypothetical framework and testable hypotheses. They discuss
    how to investigate hypotheses by employing a quantitative model that operates
    a set of variables to generate output values.


    For each model in this book, there are ways to evaluate it. Each chapter also
    includes visuals that will help you better understand the structure of the data
    and the results.


    ## Practical Implications


    This book expands on the present body of knowledge on econometrics. It covers
    ways through which you can apply data science techniques to discover patterns
    in macroeconomic data and draw meaningful insights. It intends on accelerating
    evidence-based economic design—devising and revising economic policies based on
    evidence that we derive from quantitative-driven models. This book is for professionals
    who seek to approach some of the world’s most pressing problems by applying data
    science and machine learning techniques. In summary, it will enable you to detect
    *why* specific social and economic activities occur, and help you predict the
    likelihood of future activities occurring. The book assumes that you have some
    basic understanding of key concepts of statistics and economics.


