    # 6. 发现世界经济与增长中的隐藏模式


    本章介绍使用隐马尔可夫模型（HMM）进行决策制定。具体来说，它侧重于高斯混合模型，这是一种用于时间序列数据的无监督机器学习隐马尔可夫模型。该模型的美妙之处在于它对非平稳数据不敏感。阅读完本章后，您将更好地理解高斯混合模型的工作原理，并知道如何开发一个模型。请注意，HMM
    是一个无监督学习器，这意味着您可以在没有任何预设研究假设的情况下进行研究。


    本章假设有两个类别，在马尔可夫决策中称为*状态*。一个序列包含连续值，有时您会对序列进行分类。例如，您可以将一个序列归类为“上升趋势”或“下降趋势”，其中状态`0`代表上升趋势，状态`1`代表下降趋势。这就是马尔可夫建模的用武之地。马尔可夫建模涉及对当前状态和先前状态的顺序识别，然后对未来的状态进行建模预测。尽管它是发现序列中隐藏状态的一种有用方法，但用于评估模型的指标不足——您最多只能得到每个状态的均值和协方差。


    在继续之前，请确保您的环境中安装了`hmmlearn`库。要在 Python 环境中安装`hmmlearn`库，请使用`pip install hmmlearn`。同样，要在
    Conda 环境中安装该库，请使用`conda install -c conda-forge hmmlearn`。

