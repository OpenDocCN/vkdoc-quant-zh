- fmt: '# Understanding Simulation


    This chapter considers the Monte Carlo simulation model. It’s an unsupervised
    model, given that it does not split the data—the model explores the entire data
    set. It learns the entire data across multiple trials to account for the possibility
    of an event occurring. In addition, it investigates the impact of different scenarios
    of Great Britain’s central government debt by applying the Monte Carlo model—which
    determines the probability of a change in central government debt across ten scenarios
    (the number of simulations). This model is used in finance scenarios to determine
    risks and uncertainty relating to investing in a certain asset class.


    This method reproduces values in variables across varying iterations. By doing
    so, it enables you to examine changes in the data numerous times. There are many
    simulation methods (i.e., agent-based simulation, discrete event simulation, system
    dynamics simulation, and Monte Carlo simulation). This chapter only acquaints
    you with the most common simulation method—the Monte Carlo simulation method.
    It simulates changes and recognizes patterns in past occurrences and forecast
    values of a sequence, thus enabling developers to replicate events in the real
    world.


    Unlike models covered in the preceding chapters (besides k-means), this model
    does not require you to split the data. In addition to that, it enables repetitive
    examination of data, thus providing a clear picture of changes. Moreover, it does
    not contain sophisticated metrics for evaluation; the best you can do is the max
    drawdown (extreme negative peaks), including the mean and standard deviation of
    the simulation results. Using simulation methods is widespread in finance for
    understanding risk without exposing oneself (learn more here^([⁴](#fn4))).


    This model is suitable for policymakers, as it can help them have clarity when
    considering uncertainty in economic events. It can help them decide when to devise
    and revise policies that impact borrowing activities. It is very intuitive, and
    you apply it to a variable across multiple trials to generate output (a simulation).


    Before you proceed, ensure you have the `pandas_montecarlo` library installed
    in your environment. To install the `pandas_montecarlo` library in a Python environment,
    use `pip install pandas-montecarlo`. Equally, to install the library in a Conda
    environment, use `conda install pandas_montecarlo`.


