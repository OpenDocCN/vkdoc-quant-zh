    ## K-Means Model Evaluation


    The k-means model does not make extreme assumptions about the data. You can apply
    it with no predetermined hypothesis—it establishes truth about the data rather
    than testing claims. It also does not have robust model evaluation matrices.


    ### The Silhouette Methods


    You can depend on the Silhouette method to determine the extent to which the model
    makes intelligent guesstimates (see Listing [7-15](#516940_1_En_7_Chapter.xhtml#PC15)).
    It estimates the difference between the mean nearest-cluster distance and the
    intra-cluster distance and the maximum mean nearest-cluster distance and the intra-cluster
    distance. It returns values that range from -1 to 1, where -1 indicates a poor
    model, 0 indicates a mediocre model, and 1 indicates a model that’s exemplary
    in making guesstimates.


    ```

    from sklearn import metrics

    metrics.silhouette_score(df, y_predkmeans)

    0.43409785393807543

