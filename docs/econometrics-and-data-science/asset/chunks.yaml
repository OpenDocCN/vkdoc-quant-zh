    图 8-6 显示，该模型包含输入层，它负责获取输入值并将其传输到第一个隐藏层。第一个隐藏层接收这些值，并通过应用一个函数（此处为 Sigmoid 函数）对其进行转换。转换后的输出值被传输到第二个隐藏层，第二个隐藏层接收这些值并进一步处理（它转换这些值，然后将结果传输到输出层）。


    ## 多层感知器（MLP）分类器模型开发


