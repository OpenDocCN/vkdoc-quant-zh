  trans: "\n### GDP 增长（年度百分比）\n\n`GDP` 代表国内生产总值。它估算了一个国家家庭每年消费的最终商品和服务的市场价值。它是诊断经济体健康状况的典型指标，因为它传达了一个国家的经济产出。估算\
    \ `GDP` 主要有两种方法：使用*名义* `GDP`（不考虑通货膨胀的 `GDP` 估算值），以及使用*实际* `GDP`（考虑通货膨胀的 `GDP`\
    \ 估算值）。公式 3-1 是 `GDP` 的公式。\n\n![$$ Y=C+I+G+\\left(X-M\\right) $$](img/516940_1_En_3_Chapter_TeX_Equ1.png)\n\
    \n（公式 3-1）\n\n其中 `Y` 代表 `GDP`，`C` 代表消费支出，`I` 代表投资，`G` 代表政府支出，`X` 代表出口，`M` 代表进口。图\
    \ 3-3 显示了 1971 年至 2020 年美国 `GDP` 年度百分比增长的变化。见代码清单 3-3。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig3_HTML.png](img/516940_1_En_3_Fig3_HTML.png)\n\
    \n**图 3-3**  \n美国 GDP 增长\n\n```\ncountry = [\"USA\"]\ngdp_growth = {\"NY.GDP.MKTP.KD.ZG\"\
    :\"gdp_growth\"}\ngdp_growth = wbdata.get_dataframe(indicator, country=country,\
    \ convert_date=True)\ngdp_growth.plot(kind=\"line\",color=\"navy\",lw=4)\nplt.title(\"\
    The U.S. GDP growth (annual %)\")\nplt.ylabel(\"GDP growth (annual %)\")\nplt.xlabel(\"\
    Date\")\nplt.show()\n```\n\n**代码清单 3-3**  \n美国 GDP 增长（年度百分比）\n\n图 3-3 显示了美国 `GDP`\
    \ 的锯齿状模式，该指标已根据通货膨胀进行了调整。1981 年，美国经历了 `GDP` 的最大变化。而在 2019 年，经济活动则非常低迷（`GDP` 增长了\
    \ 2.161176）。\n\n### 最终消费支出\n\n最终消费支出是家庭购买的所有商品和服务的市场价值（见代码清单 3-4）。这包括汽车和个人电脑等耐用品。图\
    \ 3-4 展示了按现价美元计算的美国最终消费支出。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig4_HTML.png](img/516940_1_En_3_Fig4_HTML.png)\n\
    \n**图 3-4**  \n美国最终消费支出\n\n```\ncountry = [\"USA\"]\nindicator = {\"NE.CON.TOTL.CD\"\
    :\"fin_cons\"}\nfin_cons = wbdata.get_dataframe(indicator, country=country, convert_date=True)\n\
    social_contri.plot(kind=\"line\",color=\"red\",lw=4)\nplt.title(\"The U.S. FCE\"\
    )\nplt.ylabel(\"FCE\")\nplt.xlabel(\"Date\")\nplt.show()\n```\n\n**代码清单 3-4**\
    \  \n美国最终消费支出（现价美元）\n\n图 3-4 显示了美国最终消费支出数据极度上升的趋势，该趋势在 2012 年略有中断。接下来，你将探索一个理论框架，以便对该现象有所了解。\n\
    \n## 理论框架\n\n本章应用多元回归方法来确定一组预测变量（美国社会缴款、贷款利率和 `GDP` 增长）是否会影响响应变量（美国最终消费支出）。图 3-5\
    \ 展示了当前问题的理论框架。\n\n![../images/516940_1_En_3_Chapter/516940_1_En_3_Fig5_HTML.png](img/516940_1_En_3_Fig5_HTML.png)\n\
    \n**图 3-5**  \n理论框架\n\n基于图 3-5，本章检验了以下假设。\n\n**假设 1**  \n`H[0]`：美国社会缴款与最终消费支出之间无显著差异。\
    \  \n`H[A]`：美国社会缴款与最终消费支出之间存在显著差异。\n\n**假设 2**  \n`H[0]`：美国贷款利率与最终消费支出之间无显著差异。\
    \  \n`H[A]`：美国贷款利率与最终消费支出之间存在显著差异。\n\n**假设 3**  \n`H[0]`：美国 GDP 增长与最终消费支出之间无显著差异。\
    \  \n`H[A]`：美国 GDP 增长与最终消费支出之间存在显著差异。\n\n本章应用普通最小二乘回归模型来研究以下三个因素的变化是否会影响美国家庭的消费模式：\n\
    \n*   美国金融机构向客户收取的贷款利率\n*   考虑通货膨胀后的美国经济活动年度增长\n*   美国组织和公民向社会保障体系缴纳的缴款\n\n代码清单\
