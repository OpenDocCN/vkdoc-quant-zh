- fmt: '# Logistic Regression ROC Curve


    Listing [5-26](#516940_1_En_5_Chapter.xhtml#PC26) estimates the trade-offs between
    sensitivity (FPR) and specificity (TPR) as the logistic regression classifier
    distinguishes between increasing and decreasing life expectancy at birth in South
    Africa (see Figure [5-16](#516940_1_En_5_Chapter.xhtml#Fig16)).


    Equation 5-2 defines the true positive rate:


    ![$$ TPR=\frac{TP}{} TP+ FN $$](images/516940_1_En_5_Chapter/516940_1_En_5_Chapter_TeX_Equ2.png)


    (Equation 5-2)


    Where `TP` is the true positive (the inclination of a classifier to make appropriate
    predictions when they occurred) and the `FP` is the false positive (the inclination
    of a classifier to make appropriate predictions when they did not occur).


    Equation 5-3 defines the true positive rate:


    ![$$ FPR=\frac{FP}{} TN+ FP $$](images/516940_1_En_5_Chapter/516940_1_En_5_Chapter_TeX_Equ3.png)


    (Equation 5-3)


    ```

    y_predlogregclassifier_proba = logregclassifier.predict_proba(x_test)[::,1]

    fprlogregclassifier, tprlogregclassifier, _ = metrics.roc_curve(y_test,y_predlogregclassifier_proba)

    auclogregclassifier = metrics.roc_auc_score(y_test,y_predlogregclassifier_proba)

    fig, ax = plt.subplots()

    plt.plot(fprlogregclassifier, tprlogregclassifier,label="auc: "+str(auclogregclassifier),color="navy",lw=4)

    plt.plot([0,1],[0,1],color="red",lw=4)

    plt.xlim([0.00,1.01])

    plt.ylim([0.00,1.01])

    plt.title("Logistic ROC curve")

    plt.xlabel("Sensitivity")

    plt.ylabel("Specificity")

    plt.legend(loc=4)

    plt.show()

    Listing 5-26

    Logistic Regression ROC Curve

    ```


    ![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig16_HTML.png](images/516940_1_En_5_Chapter/516940_1_En_5_Fig16_HTML.png)


    Figure 5-16


    Logistic regression ROC curve


    To detect whether the logistic regression is a suitable class predictor, investigate
    the area under the curve (AUC) score. If the value exceeds 0.81, the model is
    considered exemplary. Figure [5-16](#516940_1_En_5_Chapter.xhtml#Fig16) shows
    that on average, the logistic regression classifier is 88.88% accurate when predicting
    life expectancy in South Africa.


    # Logistic Regression Precision-Recall Curve


    Listing [5-27](#516940_1_En_5_Chapter.xhtml#PC27) estimates the trade-off between
    precision and the thresholds, as the logistic regression classifier distinguishes
    between increasing and decreasing life expectancy in South Africa (see Figure
    [5-17](#516940_1_En_5_Chapter.xhtml#Fig17)).


    ![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig17_HTML.jpg](images/516940_1_En_5_Chapter/516940_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Logistic regression classifier Precision-recall curve


    ```

    precisionlogregclassifier, recalllogregclassifier, thresholdlogregclassifier =
    metrics.precision_recall_curve(y_test,y_predlogregclassifier)

    apslogregclassifier = metrics.average_precision_score(y_test,y_predlogregclassifier)

    fig, ax = plt.subplots()

    plt.plot(precisionlogregclassifier, recalllogregclassifier,label="aps: " +str(apslogregclassifier),color="navy",lw=4)

    plt.axhline(y=0.5, color="red",lw=4)

    plt.title("Logistic precision-recall curve")

    plt.xlabel("Precision")

    plt.ylabel("Recall")

    plt.legend(loc=4)

    plt.show()

    Listing 5-27

    Logistic Regression Classifier Precision-Recall Curve

    ```


    Figure [5-17](#516940_1_En_5_Chapter.xhtml#Fig17) shows that, on average, the
    logistic regression classifier is 69.44% precise when distinguishing between increasing
    and decreasing life expectancy in South Africa.


    # Logistic Regression Learning Curve


    Listing [5-28](#516940_1_En_5_Chapter.xhtml#PC28) demonstrates how the logistic
    regression classifier learns to correctly distinguish between increasing and decreasing
    life expectancy at birth in South Africa as the training test size increases (see
    Figure [5-18](#516940_1_En_5_Chapter.xhtml#Fig18)).


    ![../images/516940_1_En_5_Chapter/516940_1_En_5_Fig18_HTML.jpg](images/516940_1_En_5_Chapter/516940_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Logistic regression learning curve


    ```

    from sklearn.model_selection import learning_curve

    trainsizelogregclassifier, trainscorelogregclassifier, testscorelogregclassifier
    = learning_curve(logregclassifier, x, y, cv=5, n_jobs=-1, scoring="accuracy",
    train_sizes=np.linspace(0.1,1.0,50))

    trainscorelogregclassifier_mean = np.mean(trainscorelogregclassifier,axis=1)

    trainscorelogregclassifier_std = np.std(trainscorelogregclassifier,axis=1)

    testscorelogregclassifier_mean = np.mean(testscorelogregclassifier,axis=1)

    testscorelogregclassifier_std = np.std(testscorelogregclassifier,axis=1)

    fig, ax = plt.subplots()

    plt.plot(trainsizelogregclassifier, trainscorelogregclassifier_mean, color="red",
    label="Training accuracy score",lw=4)

    plt.plot(trainsizelogregclassifier, testscorelogregclassifier_mean,color="navy",label="Cross
    validation accuracy score",lw=4)

    plt.title("Logistic classifier learning curve")

