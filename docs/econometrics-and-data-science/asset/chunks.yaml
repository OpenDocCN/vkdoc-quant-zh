    \ | --- |\n| `FR.INR.LEND` | Lending interest rate (as a percentage) |\n| `NY.GDP.MKTP.KD.ZG`\
    \ | Final consumption expenditure (in current U.S. dollars) |\n\n## Theoretical\
    \ Framework\n\nFigure [2-2](#516940_1_En_2_Chapter.xhtml#Fig2) shows the relationship\
    \ that this chapter explores. It establishes the research hypothesis.\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig2_HTML.png](images/516940_1_En_2_Chapter/516940_1_En_2_Fig2_HTML.png)\n\
    \n**Figure 2-2**  \nTheoretical framework\n\n**HYPOTHESES**\n\n`H[0]`: There is\
    \ no significant difference between the U.S. lending interest rate (%) and the\
    \ final consumption expenditure (in current U.S. dollars).\n\n`H[A]`: There is\
    \ a significant difference between U.S. social contributions and the final consumption\
    \ expenditure (in current U.S. dollars).\n\nThe research hypothesis seeks to determine\
    \ whether a change in the U.S. lending interest rate influences the final consumption\
    \ expenditure (in current U.S. dollars).\n\n### Lending Interest Rate\n\nThe lending\
    \ interest rate estimates the rate that private banks charge as interest for short-term\
    \ and mid-term loans. We express the estimate as an annual percentage. Figure\
    \ [2-3](#516940_1_En_2_Chapter.xhtml#Fig3) demonstrates the rate that U.S.-based\
