    Perceptron classifier learns to correctly distinguish between increasing and decreasing
    life expectancy at birth in South Africa as the training test size increases (see
    Figure [8-9](#516940_1_En_8_Chapter.xhtml#Fig9)).


    ![../images/516940_1_En_8_Chapter/516940_1_En_8_Fig9_HTML.png](images/516940_1_En_8_Chapter/516940_1_En_8_Fig9_HTML.png)


