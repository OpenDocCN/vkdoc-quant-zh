    \ |\n| --- | --- | --- | --- | --- |\n| 2020-01-01 | 1.420776e+12 | 3.544167 |\
    \ -3.486140 | NaN |\n| 2019-01-01 | 1.402228e+12 | 5.282500 | 2.161177 | 1.753966e+13\
    \ |\n| 2018-01-01 | 1.344612e+12 | 4.904167 | 2.996464 | 1.688457e+13 |\n| 2017-01-01\
    \ | 1.283672e+12 | 4.096667 | 2.332679 | 1.608306e+13 |\n| 2016-01-01 | 1.224603e+12\
    \ | 3.511667 | 1.711427 | 1.543082e+13 |\n\n```\ncountry = [\"USA\"]\nindicator\
    \ = {\"GC.REV.SOCL.CN\":\"social_contri\",\n\"FR.INR.LEND\":\"lending_rate\",\n\
    \"NY.GDP.MKTP.KD.ZG\":\"gdp_growth\",\n\"NE.CON.TOTL.CD\":\"fin_cons\"}\ndf =\
    \ wbdata.get_dataframe(indicator, country=country, convert_date=True)\ndf.head()\n\
    ```\n\n**代码清单 3-5**  \n加载美国宏观经济数据\n"
