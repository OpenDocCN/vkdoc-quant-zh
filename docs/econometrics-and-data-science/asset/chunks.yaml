    Most machine learning models are exceedingly sensitive to missing data points
    (blank data points in a certain column or row). Consequently, you have to replace
    them with a central value (the mean or median value). When applying the `pandas`
    library, you can use the `fillna()` method with a central value that must be used
    for each missing value in a certain column. Listing [3-6](#516940_1_En_3_Chapter.xhtml#PC6)
    substitutes the missing data points with the mean value and Listing [3-7](#516940_1_En_3_Chapter.xhtml#PC7)
    shows the U.S. social contributions distribution.


