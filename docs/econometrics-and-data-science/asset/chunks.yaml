    ## Conclusion


    This chapter introduced SEM. It explored the structural relationships between
    Swedish GDP per capita growth, inflation/consumer price index, and final consumption
    expenditure. In addition, it explored the mediating effect of Swedish life expectancy
    on the relationship between GDP per capita growth and final consumption expenditure.


    First, it explained how to develop a theoretical framework that you can test by
    applying the method. Second, it covered how to determine joint variability by
    applying covariance, how to determine association by applying the Pearson correlation,
    and how to determine the severity of correlation by applying Eigen matrix. You
    saw how to reduce the data by applying the principal component analysis. Lastly,
    you developed SEM and found that the results are significant.


