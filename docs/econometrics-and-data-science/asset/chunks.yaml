    # 应用隐马尔可夫模型


    隐马尔可夫模型能确定序列中的前一个隐藏状态，并预测未来的隐藏状态。在本书中，我们将隐藏状态视为类别。前一章介绍了使用时序数据解决序列问题的方法，此外还简要涵盖了二分类和线性回归。本章将开发一个高斯混合模型来预测两种状态（全球
    GDP 增长下降和全球 GDP 增长上升）。高斯混合模型会默认对数据做出一些假设。当你看到“高斯”这个词时，请联想到*正态性*（变量围绕真实均值分布）。该方法将高斯分布分成两半，然后确定某个值落入特定状态的概率。这个过程是逐步进行的。


