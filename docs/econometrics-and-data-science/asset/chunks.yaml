    confusion matrix (see Table [8-8](#516940_1_En_8_Chapter.xhtml#Tab8)).


    **Table 8-9** Keras Classifier Confusion Matrix Interpretation


    | Metric | Interpretation |

    |---|---|

    | True Positive | The Keras classifier did not predict decreasing life expectancy
    when there was actually decreasing life expectancy in South Africa times. |

    | True Negative | The Keras classifier predicted increasing life expectancy when
    there was actually increasing life expectancy in South Africa (two times). |

    | True Positive | The Keras classifier predicted decreasing life expectancy when
    there was actually increasing life expectancy in South Africa (one time). |

    | False Negative | The Keras classifier predicted increasing life expectancy when
    there was actually decreasing life expectancy in South Africa (nine times). |


