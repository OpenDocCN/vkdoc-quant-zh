    *   Absolute Fit Index (AFI) determines whether the model fits the data by applying
    tests like the Likelihood Ratio test. When applying these indices, focus mostly
    on the χ² (Chi-Square) value.

    *   Incremental Fit Index includes the Normed-Fit Index (NFI), which compares
