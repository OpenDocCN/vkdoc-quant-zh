    ## Conclusion


    This chapter introduced the Gaussian Mixture model, which is a type of Hidden
    Markov model (HMM). It explored the model using two components, given that there
    was a predetermined number of states (where `0` represented the first state and
    `1` represented the second state). It then applied the model to forecast future
    states in the series data of the world GDP growth (as an annual percentage).


    # 7. Clustering GNI Per Capita on a Continental Level


    This chapter covers unsupervised machine learning. In unsupervised machine learning,
    you do not fragment data, rather you present the model with the entire data set
    and allow the model to discover patterns in the data on its own, without any supervision.
    Given that this chapter covers cluster analysis, it introduces the simplest unsupervised
    machine learning model, called *k-means* *.* The k-means method is easy to comprehend.
    When you’re conducting cluster analysis, there is no real response variable—you
    treat all the variables the same. There is no predictor variable either, so there
    is no case of prediction/forecasting. You only analyze the patterns in the data.


    The k-means model groups values based on their similarities. First, the model
    finds values that are close to each other and estimates the distance between them.
    Thereafter, it determines the center of the group of values and stretches those
    values in such a way that the values are within a cluster. It finds similarities
    in groups by implementing distance estimation. The most common distance estimation
    method is Euclidean distance estimation. Equation 7-1 exhibits the Euclidean equation.


    ![$$ J={\sum}_{i=1}^k{\sum}_{i=1}^c{\left|\left|{x}_i^J-{C}_j\right|\right|}^2
    $$](images/516940_1_En_7_Chapter/516940_1_En_7_Chapter_TeX_Equ1.png)


    (Equation 7-1)


    Where *J* represents the objective function, *$k$* represents the number of clusters,
    *n* represents the number of cases, ![$$ {x}_i^J $$](images/516940_1_En_7_Chapter/516940_1_En_7_Chapter_TeX_IEq1.png)
    represents *Case*[*j*], and *C*[*j*] represents the centroids of *j*.


    This model varies from other models in the sense that it assumes that you find
    the number of clusters based on the analysis of data. To determine the number
    of clusters, you apply the elbow curve or the scree plot.'
