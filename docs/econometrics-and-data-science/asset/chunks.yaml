    trainsizemlp, trainscoremlp, testscoremlp = learning_curve(mlp, x, y, cv=5, n_jobs=-1,
    scoring="accuracy", train_sizes=np.linspace(0.1,1.0,50))

    trainscoremlp_mean = np.mean(trainscoremlp,axis=1)

