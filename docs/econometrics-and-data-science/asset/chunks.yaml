- fmt: '### Stationarity Detection


    Sequential data is stationary if there is randomness in the data (unit root),
    indicating that the mean of the variable is almost constant or near the mean.
    Most time series analysis models assume that a series has a unit root. The most
    common stationarity test is the Augmented Dickey-Fuller test (see Listing [4-6](#516940_1_En_4_Chapter.xhtml#PC6))—it
    extends the Dickey-Fuller test. When applying the Augmented Dickey-Fuller test,
    be sure that the `p-value` is significant. Table [4-2](#516940_1_En_4_Chapter.xhtml#Tab2)
    defines the number of lags, the F-statistics %, and the `p-value`.


    **Table 4-2** Augmented Dickey-Fuller Results


    | Variable | Value |

    | --- | --- |

    | `ADF F% Statistics` | -0.962163 |

    | `P-value` | 0.766813 |

    | `No. of Lags Used` | 0.000000 |

    | `No. of Observations` | 60.000000 |


    ```

    from statsmodels.tsa.stattools import adfuller

    adfullerreport = adfuller(df["gdp_growth"])

    adfullerreportdata = pd.DataFrame(adfullerreport[0:4],

    columns = ["Values"],

    index=["ADF F% statistics",

    "P-value",

    "No. of lags used",

    "No. of observations"])

    adfullerreportdata

    Listing 4-6

    Augmented Dickey-Fuller Results

    ```


    Table [4-2](#516940_1_En_4_Chapter.xhtml#Tab2) shows that there is no stationarity
    in the series, given that the `p-value` is greater than 0.5. Normally, you would
    differentiate the series prior to modeling. Note that the test holds a null hypothesis,
    which suggests that the series is not stationary; it also holds an alternative
    hypothesis that assumes that the series is stationary.


    ### Random White Noise Detection


    Listing [4-7](#516940_1_En_4_Chapter.xhtml#PC7) generates a set of random variables
    and checks whether the mean value of the data is close to 0 (see Figure [4-4](#516940_1_En_4_Chapter.xhtml#Fig4)).


    ![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig4_HTML.png](images/516940_1_En_4_Chapter/516940_1_En_4_Fig4_HTML.png)


    **Figure 4-4** Random white noise


