  raw: '## Making a Continuous Variable a Binary


    Listing [5-19](#516940_1_En_5_Chapter.xhtml#PC19) retrieves the annual changes
    in South Africa’s life expectancy at birth. It then determines the direction of
    the series. Last, it *binarizes* the response variable, by applying the `get_dummies()`
    method . Binarizing a method means making it categorical (i.e., a “no” or “yes”,
    where you code “no” as `0` and “yes” as `1`).


    ```

    df[''pct_change''] = df["life_exp"].pct_change()

    df = df.dropna()

    df[''direction''] = np.sign(df[''pct_change'']).astype(int)

    df["direction"] = pd.get_dummies(df["direction"])

    df.head()

    Listing 5-19

    Binarize the Response Variable

    ```


    Table [5-7](#516940_1_En_5_Chapter.xhtml#Tab7) includes two new columns, pct_change
    and Direction. In this chapter, we use Direction as the response variable. We
    are not going to cover life expectancy and pct_change in this model, so you can
    delete the columns.


    Table 5-7


    New Dataframe


    | Date | urban_pop | gni_per_capita | gdp_growth | life_exp | pct_chage | Direction
    |

    | --- | --- | --- | --- | --- | --- | --- |

