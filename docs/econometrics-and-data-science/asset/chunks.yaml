    \ the standard univariate (or simple) linear regression model, called the ordinary\
    \ least-squares model, which estimates the intercept and slope while diminishing\
    \ the residuals (see Equation 2-1). It applies the model to determine the relationship\
    \ between the interest rates that U.S. banks charge for lending and the market\
    \ value of goods and services that U.S. households consume annually. It includes\
    \ ways of conducting covariance analysis, correlation analysis, model development,\
    \ cross-validation, hyperparameter optimization, and model performance analysis.\n\
    \nThe ordinary least-squares model is one of the most common parametric methods.\
    \ It establishes powerful claims regarding the data—it expects *normality* (values\
    \ of a variable saturating the mean value) and *linearity* (an association between\
    \ an independent variable and a dependent variable). This chapter uses the most\
    \ common parametric method, called the *ordinary least-squares model,* to investigate\
    \ the association between the predictor variable (the independent variable) and\
    \ the response variable (the dependent variable). It’s based on a straight-line\
    \ equation (see Figure [2-1](#516940_1_En_2_Chapter.xhtml#Fig1)).\n\n![../images/516940_1_En_2_Chapter/516940_1_En_2_Fig1_HTML.png](images/516940_1_En_2_Chapter/516940_1_En_2_Fig1_HTML.png)\n\
    \n**Figure 2-1**  \nLine of best fit\n\nFigure [2-1](#516940_1_En_2_Chapter.xhtml#Fig1)\
    \ shows a straight line in red and the independent data points in green—the line\
    \ cuts through the data points. Equation [2-1](#516940_1_En_2_Chapter.xhtml#Equ1)\
    \ shows the ordinary least-squares equation.\n\n![$$ \\hat{y}={\\hat{\\beta}}_0+{\\\
    hat{\\beta}}_1{\\hat{X}}_1+{\\hat{\\varepsilon}}_i $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ1.png)\n\
    \n**(Equation 2-1)**\n\nWhere ![$$ \\hat{y} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq1.png)\
    \ is the predicted response variable (the expected the U.S. final consumption\
    \ expenditure in this example), ![$$ {\\hat{\\beta}}_0 $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq2.png)\
    \ represents the intercept—representing the mean value of the response variable\
    \ (the U.S. final consumption expenditure in U.S. dollars for this example), ![$$\
    \ 1{\\hat{X}}_1 $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq3.png)\
    \ represents the predictor variable (the U.S. lending interest rate in this example),\
    \ and ![$$ {\\hat{\\beta}}_1 $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq4.png)\
    \ is the slope—representing the direction of the relationship between `X` (the\
    \ U.S. lending interest rate) and the final consumption expenditure (in current\
    \ U.S. dollars). Look at the straight red line in Figure [2-1](#516940_1_En_2_Chapter.xhtml#Fig1)—the\
    \ slope is positive). Finally, ![$$ i{\\hat{\\varepsilon}}_i $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq5.png)\
    \ represents the error in terms (refer to Equation [2-2](#516940_1_En_2_Chapter.xhtml#Equ2)).\n\
    \n![$$ i{\\hat{\\varepsilon}}_i=y-\\hat{y} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_Equ2.png)\n\
    \n**(Equation 2-2)**\n\nWhere `ε[i]` is the error in term (also called the *residual\
    \ term* )—representing the difference between `yi` (the actual U.S. final consumption\
    \ expenditure) and ![$$ \\hat{y} $$](images/516940_1_En_2_Chapter/516940_1_En_2_Chapter_TeX_IEq6.png)`[i]`\
    \ (the predicted U.S. final consumption expenditure).\n\nThere is a difference\
    \ between variables with a hat/caret (which are sample regression functions) and\
    \ without one (population regression functions). We estimate those containing\
    \ a hat/caret from a sample of the population, rather than from the entire population.\n\
