    |

    | True Positive | The logistic classifier predicted a decreasing life expectancy
    at birth when life expectancy was actually increasing in South Africa (one time).
    |

    | False Negative | The logistic classifier predicted an increasing life expectancy
    at birth when life expectancy was actually decreasing in South Africa (eight times).
    |


