    from statsmodels.graphics.tsaplots import plot_acf

    plot_acf(df["gdp_growth"])

    plt.title("")

    plt.xlabel("Lag")

    plt.ylabel("ACF")

    plt.title("The U.S. GDP growth (annual %) autocorrelation")

    plt.show()

    Listing 4-8

    The U.S. GDP Growth (Annual %) ACF

    ```


    Listing [4-9](#516940_1_En_4_Chapter.xhtml#PC9) demonstrates independent observations
    in `lag1` (see Figure [4-6](#516940_1_En_4_Chapter.xhtml#Fig6)). A lag plot helps
    explain any lags (the space between `y[t]` ) against the correlation.


    ![../images/516940_1_En_4_Chapter/516940_1_En_4_Fig6_HTML.png](images/516940_1_En_4_Chapter/516940_1_En_4_Fig6_HTML.png)


