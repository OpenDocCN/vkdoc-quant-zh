  接下来，我们识别趋势跟踪策略的交易信号，首先创建一个信号列，根据两条移动平均线的大小关系指示预期仓位。如代码清单 7-10 所示。


  ```

  #### 识别买入信号

  df_goog[''signal''] = np.where(df_goog[short_ma] > df_goog[long_ma], 1, 0)

  #### 识别卖出信号

  df_goog[''signal''] = np.where(df_goog[short_ma] < df_goog[long_ma], -1, df_goog[''signal''])

