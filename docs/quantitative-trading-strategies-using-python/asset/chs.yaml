  \ 2-9** 对所有价格水平的成交量变化进行可视化\n\n## 本章小结\n\n在本章中，我们介绍了电子市场的基础知识以及不同类型的电子订单，包括市价单、止损单、限价单以及其他形式的动态订单（例如，钉住单、移动止损、触及市价单、触及限价单和撤单）。我们讨论了订单匹配系统和订单流的机制。\n\
