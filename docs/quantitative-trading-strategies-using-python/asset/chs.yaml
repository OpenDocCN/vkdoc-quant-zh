  \n**图 8-3**  \n说明使用不同检验和策略制定进行协整以生成交易信号的过程\n\n下一节将更深入地讨论平稳性。\n\n## 平稳性\n\n股票价格是时间序列数据。平稳时间序列是指该序列的统计特性（包括不同时间点的均值、方差和协方差）保持恒定，不随时间变化。因此，平稳时间序列的特征是数据中没有可观察到的趋势或周期。\n\
  \n我们以正态分布为例。正态分布 `y = f(x; μ, σ)` 是一个概率密度函数，它假设一组固定的参数：均值 `μ` 作为中心趋势，标准差 `σ` 作为与平均值的平均偏差，将输入\
  \ `x` 映射到概率输出 `y`。概率分布的具体形式如下：\n\n![y = f(x; μ, σ) = 1 / sqrt(2πσ²) * e^(-(x-μ)²\
  \ / (2σ²))](img/605529_1_En_8_Chapter_TeX_Equa.png)\n\n一个广泛使用的正态分布是标准正态分布，指定 `μ\
  \ = 0` 且 `σ = 1`。得到的概率密度函数为：\n\n![y = f(x; μ, σ) = 1 / sqrt(2π) * e^(-x² / 2)](img/605529_1_En_8_Chapter_TeX_Equb.png)\n\
  \n我们可以使用 NumPy 的 `random.normal()` 函数生成遵循此特定形式的随机样本。在代码清单 8-1 中，我们定义了一个函数 `generate_normal_sample()`，通过以列表形式传入输入参数\
  \ `μ` 和 `σ` 来生成正态分布的随机样本。\n\n```\n#### 从正态分布生成随机样本\ndef generate_normal_sample(params):\n\
  \"\"\"\n输入：params，包含 params[0] 中的均值和 params[1] 中的标准差\n输出：一个由输入参数化后的正态分布的随机样本\n\"\
  \"\"\nmean = params[0]\nsd = params[1]\nreturn np.random.normal(mean, sd)\n```\n\
  \n**代码清单 8-1**  \n生成正态分布样本\n\n现在我们通过指定一个标准正态分布来生成一个样本：\n\n```\n#### 从标准正态分布生成样本\n\
  >>> print(generate_normal_sample([0,1]))\n0.09120471661981977\n```\n\n为了观察从非平稳分布生成的样本所受到的影响，我们将指定三个不同的非平稳分布。具体来说，我们将生成\
  \ 100 个样本，这些样本遵循均值或标准差递增的分布。代码清单 8-2 执行了 100 轮随机抽样，并将结果与标准正态分布的样本进行比较。\n\n```\n\
  #### 为平稳和非平稳分布各生成 100 个随机样本\nT = 100\nstationary_list, nonstationary_list1, nonstationary_list2\
  \ = [], [], []\nfor i in range(T):\n#### 生成一个平稳样本并添加到列表\nstationary_list.append(generate_normal_sample([0,1]))\n\
  #### 生成一个均值递增的非平稳样本并添加到列表\nnonstationary_list1.append(generate_normal_sample([i,1]))\n\
  # # 生成一个均值和标准差都递增的非平稳样本并添加到列表\nnonstationary_list2.append(generate_normal_sample([i,np.sqrt(i)]))\n\
  x = range(T)\n#### 将列表绘制为折线图，并为每条线添加标签\nplt.plot(x, stationary_list, label='平稳')\n\
  plt.plot(x, nonstationary_list1, label='均值递增的非平稳')\nplt.plot(x, nonstationary_list2,\
  \ label='均值和标准差都递增的非平稳')\n#### 设置坐标轴标签\nplt.xlabel('样本索引')\nplt.ylabel('样本值')\n\
  #### 添加图例\nplt.legend()\n#### 显示图表\nplt.show()\n```\n\n**代码清单 8-2**  \n从平稳和非平稳正态分布生成样本\n\
  \n运行代码将生成图 8-4，其中随着我们在后续轮次中增加幅度，变化的均值和标准差带来的影响变得更加明显。\n\n![比较平稳和非平稳正态分布样本的折线图。](img/605529_1_En_8_Fig4_HTML.jpg)\n\
  \n\n\n#### 平稳性与协整检验\n\n样本值与样本索引的折线图。图中包含一条水平波动的线（表示平稳序列），以及两条线性上升且波动的线（分别表示均值递增的非平稳序列，以及均值递增且标准差轻微振荡的非平稳序列）。\n\
  \n**图 8-4**\n\n从不同参数设定的非平稳分布中生成正态分布随机样本\n\n请注意，我们可以使用增强型迪基-富勒（ADF）检验来检查序列是否平稳。`stationarity_test()`\
  \ 函数定义在清单 8-3 中，它接受两个输入：待检验平稳性的时间序列，以及用于与 p 值比较并判断统计显著性的显著性水平。注意，p 值是通过 `adfuller()`\
  \ 函数从检验结果对象中作为第二个参数获取的。详见清单 8-3。\n\n```python\n#### test for stationarity\ndef stationarity_test(x,\
  \ threshold=0.05):\n    \"\"\"\n    input:\n    x: a list of scalar values\n   \
  \ threshold: significance level\n    output: print out message on stationarity\n\
  \    \"\"\"\n    pvalue = adfuller(x)[1]\n    if pvalue < threshold:\n        return\
  \ 'p-value is ' + str(pvalue) + '. The series is likely stationary.'\n    else:\n\
  \        return 'p-value is ' + str(pvalue) + '. The series is likely non-stationary.'\n\
  ```\n\n**清单 8-3** 时间序列平稳性检验\n\n让我们将此函数应用于之前的时间序列数据。结果表明，ADF 检验能够根据预设的显著性水平区分时间序列是否平稳（参数固定）：\n\
  \n```\n>>> print(stationarity_test(stationary_list))\n>>> print(stationarity_test(nonstationary_list1))\n\
  >>> print(stationarity_test(nonstationary_list2))\np-value is 1.2718058919122438e-12\\\
  . The series is likely stationary.\np-value is 0.9925665941220737\\. The series\
  \ is likely non-stationary.\np-value is 0.9120355459829741\\. The series is likely\
  \ non-stationary.\n```\n\n让我们看一个具体示例，了解如何检验两只股票之间的协整关系。\n\n## 协整检验\n\n本节提供了一个使用\
  \ Engle-Granger 两步法执行协整检验的示例。以下是所涉及步骤的总体概述：\n\n-   使用普通最小二乘法（OLS）估计一只股票（作为因变量）与另一只股票（作为自变量）之间的线性回归模型系数。\n\
  -   计算线性回归模型的残差。\n-   使用单位根检验（如增强型迪基-富勒（ADF）检验）检验残差的平稳性。\n-   如果残差是平稳的，则两只股票存在协整关系。如果残差是非平稳的，则两只股票不存在协整关系。\n\
  \n让我们用两只股票（谷歌和微软）来演示这一过程。清单 8-4 导入必要的包并下载 2022 年全年的每日股票价格。我们将使用调整后的收盘价进行协整检验。\n\n\
  ```python\nimport os\nimport random\nimport numpy as np\nimport yfinance as yf\n\
  import pandas as pd\nfrom statsmodels.tsa.stattools import adfuller\nfrom statsmodels.regression.linear_model\
  \ import OLS\nimport statsmodels.api as sm\nfrom matplotlib import pyplot as plt\n\
  %matplotlib inline\nSEED = 8\nrandom.seed(SEED)\nnp.random.seed(SEED)\n#### download\
  \ data from yfinance\nstart_date  = \"2022-01-01\"\nend_date  = \"2022-12-31\"\n\
  stocks = ['GOOG','MSFT']\ndf = yf.download(stocks, start=start_date, end=end_date)['Adj\
  \ Close']\n>>> df.head()\nGOOG       MSFT\nDate\n2022-01-03 145.074493 330.813873\n\
  2022-01-04 144.416504 325.141357\n2022-01-05 137.653503 312.659882\n2022-01-06 137.550995\
  \ 310.189301\n2022-01-07 137.004501 310.347382\n```\n\n**清单 8-4** 导入包并下载股票数据\n\n\
  现在我们来深入研究这两只股票之间的线性回归模型。我们将谷歌股票视为（唯一的）自变量，微软股票视为待预测的因变量。该模型假定以下形式：\n\n![$$ y={\\\
  beta}_0+{\\beta}_1x+\\epsilon $$](img/605529_1_En_8_Chapter_TeX_Equc.png)\n\n其中，`β[0]`\
  \ 表示截距，`β[1]` 是这两只股票之间拟合的线性直线的斜率。`ϵ` 表示未被预测变量 `x` 建模的随机噪声。请注意，我们假设 `x` 和 `y` 之间存在线性关系，这在现实环境中不太可能成立。`ϵ`\
  \ 的另一个名称是残差，它被解释为预测值 `β[0] + β[1]*x` 与目标值 `y` 之间的（垂直）距离。即，`ϵ = y - (β[0] + β[1]*x)`。\n\
  \n我们的关注点随后将转向这些残差，目的是评估残差时间序列是否平稳。让我们首先从线性回归模型中获取残差。\n\n在清单 8-5 中，我们将第一只股票分配为目标变量\
  \ `Y`，第二只股票分配为预测变量 `X`。然后，我们使用 `add_constant()` 函数向 `X` 变量添加一列 1，这也可以视为将截距项 `β[0]`\
  \ 纳入的偏置技巧。接下来，我们使用 `OLS()` 函数构建一个线性回归模型对象，通过调用 `fit()` 函数执行学习，并将残差计算为目标值与通过 `predict()`\
  \ 方法获得的预测值之间的差值。\n\n```python\n#### build linear regression model\n#### Extract\
  \ prices for two stocks of interest\n#### target var: Y; predictor: X\nY = df[stocks[0]]\n\
  X = df[stocks[1]]\n#### estimate linear regression coefficients of stock1 on stock2\n\
  X_with_constant = sm.add_constant(X)\nmodel = OLS(Y, X_with_constant).fit()\nresiduals\
  \ = Y - model.predict()\n```\n\n**清单 8-5** 从 OLS 中提取残差\n\n模型对象本质上是模型权重（也称为参数）和控制数据从输入到输出流动的架构的集合。让我们访问模型权重：\n\
  \n\n\n```\n#### 访问模型权重\n>>> print(model.params)\nconst   -47.680218\nMSFT      0.610303\n\
  dtype: float64\n```\n\n模型中包含两个参数：`const` 对应 *β*[0]，`MSFT` 对应 *β*[1]。\n\n除了使用 `predict()`\
  \ 方法获取预测值外，我们还可以构建显式的预测表达式并手动计算。也就是说，我们可以按如下方式计算预测值 ![$$ {\\left\\{\\hat{y}\\right\\\
  }}_{i=1}^N $$](img/605529_1_En_8_Chapter_TeX_IEq1.png)：\n\n![$$ \\hat{y_i}={\\beta}_0+{\\\
  beta}_1{x}_i,i\\in \\left\\{1,\\dots, N\\right\\} $$](img/605529_1_En_8_Chapter_TeX_Equd.png)\n\
  \n以下代码片段实现了该表达式，并手动计算了模型预测值。我们还使用 `equals()` 函数检查手动计算的残差是否与之前的值相等：\n\n```\n####\
  \ 替代方法\nresiduals2 = Y - (model.params['const'] + model.params[stocks[1]] * X)\n\
  #### 检查两组残差是否相同\nprint(residuals.equals(residuals2))\n```\n\n最后，我们再次使用增强迪基-富勒（ADF）检验来测试残差序列的平稳性。该检验可以使用\
  \ `statsmodels` 包中的 `adfuller()` 函数进行。每个统计检验都有两个相关指标：检验统计量和 p 值。这两个指标都传达了关于原假设统计显著性的相同信息，其中\
  \ p 值是一种标准化指标，因此更易于解读。p 值常用的阈值（也称为显著性水平）为 5%。也就是说，如果统计检验得出的 p 值小于 5%，我们就可以在 95%\
  \ 的置信水平下安全地拒绝原假设，接受备择假设。如果 p 值大于 5%，则无法拒绝原假设，并判定这两只股票不存在协整关系。\n\n原假设通常代表现状。在使用恩格尔-格兰杰检验进行协整检验时，原假设是这两只股票不存在协整关系，即历史价格在长期内不呈现线性关系。备择假设是这两只股票存在协整关系，表现为两者之间存在线性关系且残差序列平稳。\n\
  \n现在，让我们执行 ADF 检验，并使用显著性水平 5% 的结果来判断这两只股票是否协整。在代码清单 8-6 中，我们将 `adfuller()` 函数应用于预测残差，并输出检验统计量和\
  \ p 值。随后通过 if-else 语句判断是否有足够信心拒绝原假设，从而认定这两只股票是协整的。\n\n```\n#### 检验残差的平稳性\nadf_test\
  \ = adfuller(residuals)\nprint(f\"ADF 检验统计量: {adf_test[0]}\")\nprint(f\"p 值: {adf_test[1]}\"\
  )\nif adf_test[1] < 0.05:\n    print(\"这两只股票是协整的。\")\nelse:\n    print(\"这两只股票不是协整的。\"\
  )\nADF 检验统计量: -3.179800920038961\np 值: 0.021184058997635733\n这两只股票是协整的。\n代码清单 8-6\n\
  检验残差的平稳性\n```\n\n结果表明，由于 p 值较小（2%），谷歌和微软股票是协整的。事实上，根据我们之前对最大回撤的分析，谷歌和微软的股价总体上趋于同步变动。然而，随着\
  \ ChatGPT 在必应搜索中的引入，整体格局可能开始发生变化。这种协整性（同向变动）可能会逐渐减弱，因为该工具为微软提供了制胜的一切（得益于网络搜索的少量收入），而谷歌则面临失利（主要收入来自网络搜索）。\n\
  \n接下来，我们将讨论另一个密切相关但不同的统计概念：相关性。\n\n## 相关性与协整性\n\n相关性和协整性都是用于分析两个时间序列数据集之间关系的重要统计指标。相关性量化了两个时间序列之间线性关联的程度。本质上，它揭示了两个变量是否同向增减以及这种关系的强度。相关系数的取值范围在\
  \ -1 到 1 之间。系数为 1 表示完全正线性关系，-1 表示完全负线性关系，而 0 则表示不存在任何线性关系。\n\n相比之下，协整性关注的是两个可能非平稳的时间序列之间的长期均衡关系。如果两个时间序列是协整的，则表明它们共享一个共同的长期趋势，而不受短期波动的影响。因此，虽然这两个时间序列在短期内可能不呈现线性相关，但在适当组合后，它们在长期内可以展现出平稳的模式。这使得分析师能够发现被暂时性市场波动所掩盖的持久关系。\n\
  \n以下代码片段提供了一个具有相关性但不协整的两个时间序列的示例。我们首先从正态分布中抽取两个包含 100 个随机值的序列，其均值不同但方差相同。然后进行累积求和操作，并将结果存储为\
  \ Pandas Series 对象。最后，我们将这两个序列在 DataFrame 中水平合并，并调用 `plot()` 函数，将两个序列绘制成线图：\n\n\
  ```\nnp.random.seed(123)\nX = np.random.normal(1, 1, 100)\nY = np.random.normal(2,\
  \ 1, 100)\nX = pd.Series(np.cumsum(X), name='X')\nY = pd.Series(np.cumsum(Y), name='Y')\n\
  pd.concat([X, Y], axis=1).plot()\n```\n\n运行代码将生成图 8-5。如设计所示，序列 Y 比序列 X 具有更高的漂移，并且在全部\
  \ 100 个数据点的历史区间内表现出高度的相关性（或同向变动）。\n\n![](img/605529_1_En_8_Fig5_HTML.jpg)\n\n一张\
  \ Y 轴与 X 轴的折线图。图中包含两条从原点开始上升且波动的线，分别代表 X 和 Y。Y 线比 X 线上升得更快。\n\n图 8-5\n\n展示两个高度相关但不协整的序列的演变过程\n\
  \n让我们计算精确的相关系数和协整性 p 值。在以下代码片段中，我们调用 `corr()` 方法获取 X 与 Y 的相关系数，并使用 `statsmodels`\
  \ 包中的 `coint()` 函数执行协整检验并获取相应的 p 值。`coint()` 函数执行的是增强的恩格尔-格兰杰两步协整检验，与我们之前手动执行的两步过程类似。结果表明，这两个序列高度相关，但并非协整。\n\
  \n```\nfrom statsmodels.tsa.stattools import coint\n#### 计算相关系数\n>>> print('相关系数:\
  \ ' + str(X.corr(Y)))\n#### 执行协整检验\nscore, pvalue, _ = coint(X,Y)\n>>> print('协整检验\
  \ p 值: ' + str(pvalue))\n相关系数: 0.994833254077976\n协整检验 p 值: 0.17830098966789126\n\
  ```\n\n在下一节中，我们将深入探讨配对交易策略的具体实现。\n\n\n\n#### 实现配对交易策略\n\n作为一种市场中性交易策略，配对交易利用历史数据，通过特定的统计检验程序，识别出两只具有协整关系的股票。策略同时对这两只股票建立多头和空头头寸。因此，无论市场对这两只股票是上涨还是下跌，只要它们的相对价差保持不变，配对交易策略就不会受到影响。实际上，该策略监控的是两只股票之间的价差（该价差应随时间保持相对稳定），并在出现短期价格波动时，根据预设的阈值进行交易操作。\n\
  \n我们首先下载股票价格数据。本次将聚焦于几家主要科技巨头的股票代码：谷歌、微软、苹果、特斯拉、Meta 和奈飞。以下代码片段下载了 2022 全年的历史股价，并将调整后的收盘价提取到\
  \ `df` 变量中：\n\n```\n#### 从 yfinance 下载数据\nstocks = ['GOOG','MSFT','AAPL','TSLA','META','NFLX']\n\
  df = yf.download(stocks, start=start_date, end=end_date)['Adj Close']\n```\n\n接下来，我们分析每一个独特的股票对，并进行协整检验，以寻找那些具有长期均衡关系的股票对。\n\
  \n## 识别协整的股票对\n\n我们的搜索空间中共有六只股票，从而产生总共 ![$$ {C}_6²=15 $$](img/605529_1_En_8_Chapter_TeX_IEq2.png)\
  \ 个股票对。可以通过 `itertools` 包中的 `combinations()` 函数生成所有独特股票对的列表，如代码清单 8-7 所示。\n\n```\n\
  from itertools import combinations\n#### 获取所有股票对\nstock_pairs = list(combinations(df.columns,\
  \ 2))\n>>> stock_pairs\n[('AAPL', 'GOOG'),\n('AAPL', 'META'),\n('AAPL', 'MSFT'),\n\
  ('AAPL', 'NFLX'),\n('AAPL', 'TSLA'),\n('GOOG', 'META'),\n('GOOG', 'MSFT'),\n('GOOG',\
  \ 'NFLX'),\n('GOOG', 'TSLA'),\n('META', 'MSFT'),\n('META', 'NFLX'),\n('META', 'TSLA'),\n\
  ('MSFT', 'NFLX'),\n('MSFT', 'TSLA'),\n('NFLX', 'TSLA')]\n代码清单 8-7\n生成所有独特的股票对\n\
  ```\n\n这 15 个独特的股票对以元组形式存储在一个列表中。每个元组都将在下一节中进行协整检验。\n\n## 测试成对协整\n\n在代码清单 8-8 中，我们遍历每个股票对，并使用\
  \ `coint()` 函数执行恩格尔-格兰杰检验。对于每个独特的股票对，我们首先通过按列名子集化来提取对应的 DataFrame，然后使用这两个时间序列进行协整检验，以获得检验分数和\
  \ p 值。接着将 p 值与预设阈值进行比较，并打印结果，以评估检验结果是否具有统计显著性。\n\n```\nthreshold = 0.1\n#### 对每个股票对运行恩格尔-格兰杰协整检验\n\
  for pair in stock_pairs:\n    # 根据当前股票对子集化 df\n    df2 = df[list(pair)]\n    # 对当前股票对执行检验\n\
  \    score, pvalue, _ = coint(df2.values[:,0], df2.values[:,1])\n    # 检查当前股票对是否具有协整关系\n\
  \    if pvalue < threshold:\n        print(pair, 'are cointegrated')\n    else:\n\
  \        print(pair, 'are not cointegrated')\n代码清单 8-8\n对每个独特股票对执行协整检验\n```\n\n\
  请注意，这里阈值设置为 10% 而不是之前的 5%，因为如果设置为 5%，检验将显示没有协整的股票对。事实证明，`coint()` 函数与我们之前手动实现的检验程序略有不同。例如，`coint()`\
  \ 函数假定的时间序列顺序可能不一致。\n\n运行代码将产生以下结果：\n\n```\n('AAPL', 'GOOG') are not cointegrated\n\
  ('AAPL', 'META') are not cointegrated\n('AAPL', 'MSFT') are not cointegrated\n('AAPL',\
  \ 'NFLX') are not cointegrated\n('AAPL', 'TSLA') are not cointegrated\n('GOOG',\
  \ 'META') are not cointegrated\n('GOOG', 'MSFT') are cointegrated\n('GOOG', 'NFLX')\
  \ are not cointegrated\n('GOOG', 'TSLA') are not cointegrated\n('META', 'MSFT')\
  \ are not cointegrated\n('META', 'NFLX') are not cointegrated\n('META', 'TSLA')\
  \ are not cointegrated\n('MSFT', 'NFLX') are not cointegrated\n('MSFT', 'TSLA')\
  \ are not cointegrated\n('NFLX', 'TSLA') are not cointegrated\n```\n\n结果显示，在 10%\
  \ 的显著性水平阈值下，只有谷歌和微软的股票价格具有协整关系。这两只股票将成为我们接下来配对交易策略的重点，首先需要识别出这两只股票之间的平稳价差。\n\n##\
  \ 获取价差\n\n如前所述，价差是一个时间序列，源自配对交易策略中两只股票的历史数据。计算价差的方法有很多，我们将采用协整检验程序中使用的那个方法。具体来说，我们将价差定义为两只股票之间线性回归模型的残差。如果它们通过了协整检验，我们就有信心（高达\
  \ 90% 的置信水平）认为，这两只股票通过线性组合，能够产生一个平稳的价差时间序列。\n\n代码清单 8-9 生成了价差时间序列，并用折线图进行了可视化。和之前一样，我们首先提取预测变量\
  \ `X` 和目标变量 `Y`，通过向 `X` 添加一列常数项来应用偏置技巧，运行线性回归模型，最后将目标值与预测值之间的残差作为价差。\n\n```\n####\
  \ 计算 GOOG 和 MSFT 的价差\nY = df[\"GOOG\"]\nX = df[\"MSFT\"]\n#### 估计线性回归系数\nX_with_constant\
  \ = sm.add_constant(X)\nmodel = OLS(Y, X_with_constant).fit()\n#### 将残差作为价差\nspread\
  \ = Y - model.predict()\nspread.plot(figsize=(12,6))\n代码清单 8-9\n计算价差\n```\n\n运行代码将生成图\
  \ 8-6。此时的价差看起来像是白噪声，即遵循正态分布的高斯分布。由于不同股票的价差尺度不同，建议将它们标准化到同一个标量上，以便于比较和制定策略。下一节将介绍将价差转换为\
  \ z 分数的过程。\n\n![](img/605529_1_En_8_Fig6_HTML.jpg)\n\n一张价差相对于日期的折线图。曲线呈现波动，带有尖锐的高峰和低谷。曲线在波动中上升，然后下降，并再次上升和下降。\n\
  \n图 8-6\n将价差可视化为线性回归模型的残差\n\n\n\n#### 转换为 Z 分数\n\nZ 分数（z-score）衡量的是每日价差偏离其均值多少个标准差。这是一种标准化分数，可用于比较不同分布。用\
  \ `x` 表示原始观测值，则 Z 分数计算公式如下：\n\n![$$ z=\\frac{x-\\mu }{\\sigma } $$](img/605529_1_En_8_Chapter_TeX_Eque.png)\n\
  \n其中 `μ` 和 `σ` 分别表示时间序列的均值和标准差。\n\n因此，Z 分数的绝对值表示当前观测值以标准差为单位偏离均值的程度，而 Z 分数的正负则表明偏离方向是高于均值（正\
  \ Z 分数）还是低于均值（负 Z 分数）。\n\n例如，假设某个分布的均值为 10，标准差为 2。若某观测值为 8，则该观测值的 Z 分数为 `(10-8)/2\
  \ = 1`。换言之，该观测值距分布均值有一个标准差的距离。\n\n在假设检验中，Z 分数常用于评估观测值的统计显著性。当 Z 分数大于或等于 1.96（或小于或等于\
  \ -1.96）时，对应 p 值为 0.05 或更小，这是评估统计显著性的常用阈值。\n\n在代码清单 8-10 中，我们通过均值为 0、标准差为 1 的标准正态分布，展示了其概率密度函数（PDF）的可视化结果。首先，我们使用\
  \ `np.linspace()` 函数生成一组等间距的输入值作为 Z 分数，然后使用位置参数为 0（对应均值）和尺度参数为 1（对应标准差）的 `norm.pdf()`\
  \ 函数，获取标准正态分布 PDF 中对应的概率值。同时，我们对小于 -1.96 和大于 1.96 的区域进行了着色，其中 Z 分数 1.96 对应统计检验中\
  \ 95% 的显著性水平。换句话说，大于等于 1.96 的 Z 分数占总概率的 5%，小于等于 -1.96 的 Z 分数也同样占 5%。\n\n```\n####\
  \ 通过生成均值为 0、标准差为 1 的标准正态分布来演示 Z 分数\nfrom scipy.stats import norm\n#### 输入：无界标量，此处假定范围为\
  \ [-5, 5]\nx = np.linspace(-5, 5, 100)\n#### 输出：介于 0 和 1 之间的概率\ny = norm.pdf(x,\
  \ loc=0, scale=1)\n#### 设置绘图\nfig, ax = plt.subplots()\n#### 绘制正态分布的概率密度函数\nax.plot(x,\
  \ y)\n#### 对 Z 分数 >=1.96 和 <= -1.96 的区域进行着色\nz_critical = 1.96\nx_shade = np.linspace(z_critical,\
  \ 5, 100)\ny_shade = norm.pdf(x_shade, loc=0, scale=1)\nax.fill_between(x_shade,\
  \ y_shade, color='red', alpha=0.3)\nz_critical2 = -1.96\nx_shade2 = np.linspace(-5,\
  \ z_critical2, 100)\ny_shade2 = norm.pdf(x_shade2, loc=0, scale=1)\nax.fill_between(x_shade2,\
  \ y_shade2, color='red', alpha=0.3)\n#### 添加标签和标题\nax.set_xlabel('Z 分数')\nax.set_ylabel('概率密度')\n\
  #### 添加垂直线以标示 Z 分数为 1.96 和 -1.96 的位置\nax.axvline(x=z_critical, linestyle='--', color='red')\n\
  ax.axvline(x=z_critical2, linestyle='--', color='red')\n#### 显示图形\nplt.show()\n\
  ```\n\n运行代码将生成图 8-7。\n\n![一张概率密度与 Z 分数的折线图，呈对称钟形曲线，在 Z 分数为 0 处达到峰值。两条垂直虚线分别位于 Z\
  \ 分数为 -2 和 2 处，垂直线与曲线尾部之间的区域已着色。](img/605529_1_En_8_Fig7_HTML.jpg)\n\n在假设检验的语境中，着色区域代表在原假设成立时观察到\
  \ Z 分数大于 1.96 的概率。执行统计检验会给出一个 Z 分数。在单侧检验中，如果 Z 分数高于 1.96 或低于 -1.96，我们将在 0.05 的显著性水平下拒绝原假设，转而支持备择假设，因为原假设下观察到该现象的概率太小了。\n\
  \n总而言之，我们将 Z 分数作为一种标准化分数，用于衡量某个观测值距离其分布均值有多少个标准差。它被用于假设检验中，以判断某个观测值的统计显著性，即该事件在原假设下发生的概率。显著性水平通常设定为\
  \ 0.05。我们可以利用 Z 分数来计算在原假设下观测到与当前观测值同等极端值的概率。最后，我们决定是拒绝原假设，还是无法拒绝原假设。\n\n现在，让我们回到之前的运行示例。由于股票价格经常波动，我们转而采用移动平均法来推导运行均值和运行标准差。也就是说，每个每日价差在滚动窗口内，都会对应一个基于价差集合计算出的运行均值和运行标准差。在代码清单\
  \ 8-11 中，我们使用窗口大小为 10 来推导运行均值和运行标准差，并应用变换得到标准化的价差，即 Z 分数。\n\n```\n#### 转换为 Z 分数\n\
  #### Z 分数衡量价差偏离其均值多少个标准差\n#### 使用移动窗口推导均值和标准差\nwindow_size = 10\nspread_mean = spread.rolling(window=window_size).mean()\n\
  spread_std = spread.rolling(window=window_size).std()\nzscore = (spread - spread_mean)\
  \ / spread_std\nzscore.plot(figsize=(12,6))\n```\n\n运行代码将生成图 8-8，此时标准化后的价差看起来更接近正态分布，如同白噪声。\n\
  \n![一张 Z 分数与日期的折线图，曲线水平波动，伴有尖锐的高峰和低谷。](img/605529_1_En_8_Fig8_HTML.jpg)\n\n由于我们使用窗口大小为\
  \ 10，移动平均序列中的前 9 个观测值会显示为 NA。我们先使用 `first_valid_index()` 函数找到第一个有效索引，然后对 Z 分数序列进行子集选取，以去除这些初始的\
  \ NA 值，如下代码所示：\n\n```\n#### 去除初始的 NA 天数\nfirst_valid_idx = zscore.first_valid_index()\n\
  zscore = zscore[first_valid_idx:]\n>>> zscore\nDate\n2022-01-14    1.123748\n2022-01-18\
  \    1.245480\n2022-01-19    0.742031\n2022-01-20    0.211878\n2022-01-21    0.064889\n\
  ...\n2022-12-23    1.618937\n2022-12-27    0.977235\n2022-12-28    0.807607\n2022-12-29\
  \   -0.230086\n2022-12-30   -0.137035\n名称：GOOG，长度：242，dtype：float64\n```\n\n下一节将使用\
  \ Z 分数来制定交易策略。\n\n\n\n### 制定交易策略\n\n如前所述，配对交易策略利用 z-score 来应对价差的短期波动，对两只协整资产进行多空操作，并从价差的长期均值回归中获利。\n\
  \n当上一节计算出的 z-score 穿过特定阈值时，就会产生交易信号。例如，当 z-score 低于 –2 时，我们可以做多第一只股票并做空第二只股票，这意味着价差比平时更负，且价差长期内很有可能回归其均值。同样，当\
  \ z-score 高于 2 时，我们可以做空第一只股票并做多第二只股票，这表明价差比平时更正，且价差很有可能回归其均值。这些构成了我们的入场信号。\n\n另一方面，当我们持有一个未平仓头寸时，股票可能会在极短时间内朝不利方向移动。为了保护利润并止损，我们可以设置一个充当止损订单的离场信号。例如，假设我们在前一步\
  \ z-score 低于 –2 时建立了一个多头头寸。我们可以设置另一个阈值，当 z-score 返回一个小值（比如 –1）时平仓。穿过此阈值表明价差已回归其均值。\n\
  \n以下列表总结了建立和退出多头与空头头寸的交易信号制定规则：\n\n- **多头入场**：当 z-score 低于预设的负阈值（例如 –2）时，对第一只股票建立多头头寸。\n\
  - **多头离场**：当 z-score 向上穿过另一个预设的负阈值（例如 –1）时，平掉第一只股票的多头头寸。\n- **空头入场**：当 z-score 高于预设的正阈值（例如\
  \ 2）时，对第二只股票建立空头头寸。\n- **空头离场**：当 z-score 向下穿过另一个预设的正阈值（例如 1）时，平掉第二只股票的空头头寸。\n\n\
  在实现中管理这四种信号时，我们可以为每只股票维护一个`Pandas Series`对象，其中每个值为 1（代表多头）、–1（代表空头）或 0（代表平仓）。为简化流程，我们还假设每只股票的多头和空头头寸也是同时建立和同时平仓。换句话说，当对一只股票建立多头头寸时，我们会同时对另一只股票建立空头头寸。\n\
  \n图 8-9 将这四个交易信号叠加到了之前的 z-score 时间序列上。外部阈值 2 和 –2 代表多头和空头头寸的入场信号，内部阈值 1 和 –1 代表现有头寸的离场信号。在这两个阈值之间，我们仅维持当前头寸不变。\n\
  \n![](img/605529_1_En_8_Fig9_HTML.jpg)\n\n一张显示 z-score 相对于日期的折线图。曲线水平波动，伴有尖锐的高峰和低谷。在\
  \ z-score –2、–1、1 和 2 处有四条水平线。图中还对水平线之间划分出的 5 个区域内的交易信号进行了说明。\n\n**图 8-9** – 说明基于预设入场和离场阈值为\
  \ z-score 制定交易信号的过程\n\n在代码清单 8-12 中，我们首先分别初始化入场和离场阈值。我们创建两个 `Pandas Series` 对象（`stock1_position`\
  \ 和 `stock2_position`）来存储每只股票的每日头寸。基于当前的 z-score 以及建立或退出多头或空头头寸的预设阈值，我们在一个循环中检查每日的\
  \ z-score，并根据以下规则将其匹配到信号生成的四种情况之一：\n\n- 如果 z-score 低于 –2 且股票 1 没有先前头寸，则做多股票 1，做空股票\
  \ 2。\n- 如果 z-score 高于 2 且股票 2 没有先前头寸，则做空股票 1，做多股票 2。\n- 如果 z-score 介于 –1 和 1 之间，则平掉股票\
  \ 1 和股票 2 的头寸。\n- 其余情况，即 z-score 介于 –2 和 –1 之间或介于 1 和 2 之间时，维持股票 1 和股票 2 的现有头寸。\n\
  \n```\n#### 设置入场和离场信号的阈值\nentry_threshold = 2.0\nexit_threshold = 1.0\n#### 将每日头寸初始化为零\n\
  stock1_position = pd.Series(data=0, index=zscore.index)\nstock2_position = pd.Series(data=0,\
  \ index=zscore.index)\n#### 为每只股票生成每日入场和离场信号\nfor i in range(1, len(zscore)):\n\
  \    # zscore2 and no existing short position for stock 2\n    elif zscore[i] >\
  \ entry_threshold and stock2_position[i-1] == 0:\n        stock1_position[i] = -1\
  \ # 做空股票 1\n        stock2_position[i] = 1 # 做多股票 2\n    # -1<zscore<1\n    elif\
  \ abs(zscore[i]) < exit_threshold:\n        stock1_position[i] = 0 # 平掉现有头寸\n  \
  \      stock2_position[i] = 0\n    # -2<zscore<-1 or 1<zscore<2\n    else:\n   \
  \     stock1_position[i] = stock1_position[i-1] # 维持现有头寸\n        stock2_position[i]\
  \ = stock2_position[i-1]\n```\n\n**代码清单 8-12** – 实现配对交易\n\n现在我们就可以计算配对交易策略的总利润了。在代码清单\
  \ 8-13 中，我们首先使用每只股票的 `pct_change()` 函数，从有效索引开始，获取每日百分比变化。这些每日收益率将根据前一交易日持有的头寸进行调整。换句话说，将平移后的头寸与每日收益率相乘，得到该策略下每只股票的每日收益率，并将可能的\
  \ NA 值用零填充。最后，我们将两只股票的每日收益率相加，转换为 `1+R` 收益率，并使用 `cumprod()` 函数执行顺序复利计算，以获取财富指数。\n\
  \n```\n#### 计算每只股票的收益率\nstock1_returns = (df[\"GOOG\"][first_valid_idx:].pct_change()\
  \ * stock1_position.shift(1)).fillna(0)\nstock2_returns = (df[\"MSFT\"][first_valid_idx:].pct_change()\
  \ * stock2_position.shift(1)).fillna(0)\n#### 计算策略的总收益率\ntotal_returns = stock1_returns\
  \ + stock2_returns\ncumulative_returns = (1 + total_returns).cumprod()\n#### 绘制累积收益曲线\n\
  >>> cumulative_returns.plot()\n```\n\n**代码清单 8-13** – 计算累积收益率\n\n运行上述代码生成图 8-10。\n\
  \n![](img/605529_1_En_8_Fig10_HTML.jpg)\n\n一张显示累积收益率相对于日期的折线图。曲线在 2022 年 1 月至 2023\
  \ 年 1 月期间呈阶梯式向上波动。\n\n**图 8-10** – 配对交易策略的累积收益率\n\n通过以下代码提取的最终收益率显示，配对交易策略在交易年度末实现了\
  \ 14.1% 的总利润。\n\n同样，这个结果还需要在投资资产选择、交易时段和评估指标方面进行更严格的回测。\n\n## 总结\n\n在本章中，我们介绍了统计套利和假设检验的概念，以及基于配对交易策略的实现细节。我们首先梳理了制定配对交易策略的总体流程，并介绍了协整和平稳性等新概念。接着，我们比较了协整和相关性的区别，两者密切相关但截然不同。最后，我们通过一个案例研究，介绍了如何使用配对交易策略计算累积收益率。\n\
  \n在下一章中，我们将介绍贝叶斯优化，这是一种用于搜索交易策略最优参数的原则性方法。\n\n\n\n## 练习题\n\n-   评估所选股票对在牛市和熊市期间分别的协整性。结果是否存在显著差异？如果存在，讨论可能的原因。\n\
