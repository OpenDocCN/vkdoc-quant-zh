  \n最后，我们提取所有实验的均值和标准差，如代码清单 9-12 所示。\n\n```\ndef extract_last_entry(x):\ntmp = []\n\
  for i in range(4):\ntmp.append(x[i][-1])\nreturn tmp\nrst_df = pd.DataFrame({\n\"\
  EI\": [np.mean(extract_last_entry(best_observed_ei_all)), np.std(extract_last_entry(best_observed_ei_all))],\n\
