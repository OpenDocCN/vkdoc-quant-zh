  \ 周期 SMA 比 3 周期 SMA 更平滑。\n\n![](img/605529_1_En_5_Fig12_HTML.jpg)\n\n一张价格对日期的多线图展示了\
  \ 2022 年 1 月至 2023 年 1 月期间调整收盘价、SMA 3 和 SMA 20 的变化。所有三条曲线都有波动趋势。\n\n图 5-12\n\n将每日价格与\
  \ 3 周期和 20 周期 SMA 一同可视化\n\n下一节将重点介绍指数移动平均线（EMA）。\n\n\n\n### 深入理解指数移动平均线\n\n指数移动平均线（EMA），也称为指数加权移动平均线（EWMA），是另一种移动平均线，它对最近的数据点赋予了更高的权重和重要性。这与简单移动平均线（对周期内所有数据点赋予相同权重）相比是一个关键的区别。\n\
  \n指数移动平均线（EMA）是一种广泛使用的方法，用于减少数据中的噪音并识别长期趋势。每个 EMA 值都是历史价格和当前价格的加权组合。每个价格点的权重随时间逐渐递减，从而给予近期数据点更大的权重。其计算公式如下：\n\
  \n![$$ EWM{\\mathrm{A}}_t=\\left\\{\\begin{array}{c}{S}_0,\\kern0.5em t=0\\\\ {}\\\
  upalpha {\\mathrm{S}}_t+\\left(1-\\alpha \\right) EWM{\\mathrm{A}}_{t-1},\\kern0.5em\
  \ t&gt;0\\end{array}\\right. $$](img/605529_1_En_5_Chapter_TeX_Equf.png)\n\n其中，α\
  \ 是平滑因子，取值范围在 0 到 1 之间。平滑因子 α 决定了相对于现有 EMA，最新价格所获得的权重。α 值越高，近期价格的影响就越大。\n\n至于时间\
  \ *t* = 0 时的第一个 EWMA 值，默认选择是设置 `EWMA[0] = S[0]`。因此，EMA 假设近期数据比旧数据更相关。这种假设有其合理性，因为与简单移动平均线相比，EMA\
  \ 能更快地对变化做出反应，因而对近期的波动更为敏感。这也意味着函数不需要指定窗口大小，因为所有历史数据点都会被使用。\n\n需要注意的是，虽然 EMA 比 SMA\
  \ 能提供更准确和及时的信号，但由于它对短期价格波动更敏感，因此也可能产生更多的虚假信号。\n\n可以通过调用 Pandas `Series` 对象的 `ewm()`\
  \ 方法，然后使用 `mean()` 提取平均值来计算 EMA。我们可以在 `ewm()` 中设置 `alpha` 参数，以直接控制当前观测值相对于历史观测值的重要性。请参阅代码清单\
  \ 5-13 的示例，其中我们设置 α = 0.1 以赋予历史价格更大的权重。\n\n```\nalpha = 0.1\ndf2['EWM_'+str(alpha)]\
  \ = df2['Adj Close'].ewm(alpha=alpha, adjust=False).mean()\ndf2.head()\nAdj Close\
  \  SMA-3      SMA-20 EWM_0.1\nDate\n2022-01-03 180.434296 NaN        NaN    180.434296\n\
  2022-01-04 178.144302 NaN        NaN    180.205296\n2022-01-05 173.405685 177.328094\
  \ NaN    179.525335\n2022-01-06 170.510956 174.020315 NaN    178.623897\n2022-01-07\
  \ 170.679489 171.532043 NaN    177.829456\n代码清单 5-13\n创建 EMA 序列\n```\n\n我们观察到 EMA\
  \ 序列中没有缺失值。实际上，由于 EMA 加权方案的设计，第一个条目就是原始价格本身。\n\n和往常一样，我们验证一下计算过程，以确保我们的理解是正确的。以下代码片段手动计算了第二个\
  \ EMA 值，该值与使用 `ewm()` 函数获得的值相同：\n\n```\nalpha=0.1\n>>> alpha*df2['Adj Close'][1]\
  \ + (1-alpha)*df2['Adj Close'][0]\n180.73006591796877\n```\n\n我们继续创建另一个 α = 0.5\
  \ 的 EMA 序列。换句话说，我们为当前观测值和历史观测值分配了相等的权重：\n\n```\nalpha = 0.5\ndf2['EWM_'+str(alpha)]=\
  \ df2['Adj Close'].ewm(alpha=alpha, adjust=False).mean()\ndf2.head()\nAdj Close\
  \  SMA-3      SMA-20 EWM_0.1    EWM_0.5\nDate\n2022-01-03 180.434296 NaN       \
  \ NaN    180.434296 180.434296\n2022-01-04 178.144302 NaN        NaN    180.205296\
  \ 179.289299\n2022-01-05 173.405685 177.328094 NaN    179.525335 176.347492\n2022-01-06\
  \ 170.510956 174.020315 NaN    178.623897 173.429224\n2022-01-07 170.679489 171.532043\
  \ NaN    177.829456 172.054357\n```\n\n让我们将所有移动平均线放在一个图表中。在这里，`plot()` 函数将全部四列视为四个独立的序列，并针对索引列进行绘制，如代码清单\
  \ 5-14 所示。\n\n```\ndf2.plot(linewidth=3, figsize=(12,6))\nplt.title('带有 SMA 和 EWM\
  \ 的每日调整收盘价', fontsize=20)\nplt.xlabel('日期', fontsize=16)\nplt.ylabel('价格', fontsize=16)\n\
  代码清单 5-14\n绘制所有移动平均线\n```\n\n运行这些命令将生成图 5-13。我们注意到 `EWM_0.1`（红线）接近 `SMA-20`（绿线），两者都对历史观测值赋予了更大的权重。另外两个移动平均线也是如此。对于\
  \ EMA，较小的权重因子 *α* 会导致高度平滑，而较大的值则会导致对近期变化做出更快的响应。\n\n![](img/605529_1_En_5_Fig13_HTML.png)\n\
  \n一幅价格相对于日期的多线图展示了 2022 年 1 月至 2023 年 1 月期间调整收盘价、`SMA-3`、`SMA-20`、`EWM_0.1` 和 `EWM_0.5`\
  \ 的变化。所有三条曲线都呈现出波动趋势。\n\n**图 5-13** 使用不同配置的 SMA 和 EMA 可视化每日收盘价\n\n在了解了如何计算这些移动平均线之后，下一节将展示如何将它们作为技术指标来开发趋势跟踪策略。\n\
  \n\n\n### 实现趋势跟踪策略\n\n基于移动平均线的趋势跟踪策略运作方式如下：存在两条移动平均线，一条短期移动平均线和一条长期移动平均线。当短期移动平均线上穿长期移动平均线时，发出买入信号，趋势交易者对该资产建立多头仓位。当短期移动平均线下穿长期移动平均线时，发出卖出信号，趋势交易者对该资产建立空头仓位。因此，该策略基于两条移动平均线的交叉点：一条是短期（快速）移动平均线，另一条是长期（慢速）移动平均线。\n\
  \n请注意，此框架也适用于只有一条移动平均线序列的情况。在这种情况下，当当前价格高于移动平均线时，趋势交易者会买入资产；当当前价格低于移动平均线时，则会卖出资产。此类交易行为的主要理由是，当价格高于移动平均线时，可能存在上升趋势，反之亦然。两条线之间的*交叉点*会产生交易信号。\n\
  \n其他动量相关技术指标，例如 RSI 和 MACD，也可用于发出入场或离场信号。\n\n在下一节中，我们将使用长期和短期移动平均线实现一个趋势跟踪交易策略。使用此策略，我们实质上是在每个时间点寻找交易信号。也就是说，我们要决定在每个时间步长是买入、卖出还是持有资产。该信号由两条移动平均线的交叉点生成。我们假设执行交易操作时不产生交易成本，并且市场具有流动性（市场上有足够的苹果股票）且是完备的（不存在套利机会）。\n\
  \n让我们回顾一下我们将使用的主要 DataFrame。以下命令使用 `info()` 函数打印出摘要信息：\n\n```\n>>> df2.info()\n\n\
  DatetimeIndex: 251 entries, 2022-01-03 00:00:00-05:00 to 2022-12-30 00:00:00-05:00\n\
  Data columns (total 5 columns):\n#   Column     Non-Null Count  Dtype\n---  ------\
  \     --------------  -----\n0   Adj Close  251 non-null    float64\n1   SMA-3 \
  \     249 non-null    float64\n2   SMA-20     232 non-null    float64\n3   EWM_0.1\
  \    251 non-null    float64\n4   EWM_0.5    251 non-null    float64\ndtypes: float64(5)\n\
  memory usage: 19.9 KB\n```\n\n现在，我们将使用 `SMA-3` 和 `SMA-20` 分别作为短期和长期移动平均线，它们的交叉点将产生交易信号。我们留作练习，尝试使用不同窗口大小的\
  \ SMA 以及不同加权方案的 EMA。\n\n请注意，我们只能使用截至昨天的信息来为明天做出交易决策。我们不能使用今天的信息，因为在交易日中间收盘价尚不可用。为了强制执行此要求，我们可以将移动平均线向未来移动一天，如下面的代码片段所示。这本质上说明今天的移动平均线是根据截至昨天的历史信息得出的。\n\
  \n```\n#### 向未来移动一天，以便每天使用截至昨天的信息来为明天做出交易决策\ndf2['SMA-3'] = df2['SMA-3'].shift(1)\n\
  df2['SMA-20'] = df2['SMA-20'].shift(1)\n```\n\n现在让我们实现交易规则：如果 `SMA-3 > SMA-20` 则买入，如果\
  \ `SMA-3 < SMA-20` 则卖出。可以使用 `np.where()` 函数创建这样的 `if-else` 条件，如清单 5-15 所示。\n\n```\n\
  #### 识别买入信号\ndf2['signal'] = np.where(df2['SMA-3'] > df2['SMA-20'], 1, 0)\n####\
  \ 识别卖出信号\ndf2['signal'] = np.where(df2['SMA-3'] < df2['SMA-20'], -1, df2['signal'])\n\
  df2.dropna(inplace=True)\n清单 5-15\n创建并识别买入和卖出信号\n```\n\n此处，一个正常交易日会在信号列中取值为 1 或\
  \ –1。当出现缺失值或其他特殊情况时，我们将其设置为 0。我们还使用 `dropna()` 函数通过删除包含任何 NA/缺失值的行，来确保 DataFrame\
  \ 具有良好的质量。\n\n我们可以按如下方式检查信号列的频率分布：\n\n```\n>>> df2['signal'].value_counts()\n-1\
  \    135\n1     96\nName: signal, dtype: int64\n```\n\n结果显示下跌天数多于上涨天数，这证实了前文显示的价格序列下行趋势。\n\
  \n接下来，我们介绍一个称为*买入并持有*的基准策略，它简单意味着我们在整个期间结束时持有一股苹果股票。此外，我们将使用对数收益率而不是原始收益率来简化计算。因此，我们不是对连续股价进行除法运算得到![$$\
  \ \\frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq5.png)，而是取差值 `log(S[t+1])\
  \ - log(S[t])` 得到![$$ \\log \\frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq6.png)，然后可以对其取指数转换回![$$\
  \ \\frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq7.png)。\n\n以下代码片段计算了瞬时对数单期收益率，其中我们首先取调整后收盘价的对数，然后调用\
  \ `diff()` 函数获得连续价格对之间的差值：\n\n```\ndf2['log_return_buy_n_hold'] = np.log(df2['Adj\
  \ Close']).diff()\n```\n\n现在来计算趋势跟踪策略的单期收益率。回顾我们之前创建的 `signal` 列。该列表示我们在每个单期是做多（值为\
  \ 1）还是做空（值为 –1）。这也表明，如果 `S[t+1] > S[t]`，对数收益率![$$ \\log \\frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq8.png)为正，如果\
  \ `S[t+1] < S[t]`，则为负。当资产从 `S[t]` 移动到 `S[t+1]` 时，这创建了以下四种场景：\n\n* 当我们做多资产且其对数收益率为正时，趋势跟踪策略报告正收益，即\
  \ `1 * log(S[t+1]/S[t])`。\n* 当我们做多资产且其对数收益率为负时，趋势跟踪策略报告负收益，即 `1 * log(S[t+1]/S[t])`。\n\
  * 当我们做空资产且其对数收益率为正时，趋势跟踪策略报告负收益，即 `-1 * log(S[t+1]/S[t])`。\n* 当我们做空资产且其对数收益率为负时，趋势跟踪策略报告正收益，即\
  \ `-1 * log(S[t+1]/S[t])`。\n\n总结这四种场景，我们可以通过将 `signal` 与 `log_return_buy_n_hold`（基于买入并持有策略的单期对数收益率）相乘，得到趋势跟踪策略的单期对数收益率，如清单\
  \ 5-16 所示。\n\n```\ndf2['log_return_trend_follow'] = df2['signal'] * df2['log_return_buy_n_hold']\n\
  清单 5-16\n计算趋势跟踪策略的对数收益率\n```\n\n\n\n与买入并持有策略相比，关键区别在于趋势跟踪策略会生成额外的做空操作。也就是说，当股价下跌时，买入并持有策略会产生亏损，而趋势跟踪策略则会在交易信号指示做空时*如果*盈利。因此，创建一个良好的交易信号至关重要。\n\
  \n接下来，我们创建明确的交易行为。`signal` 列告诉我们，在趋势跟踪策略下，是否应对给定资产做多或做空。但这并不意味着我们每个时期都需要进行交易。如果连续两个时期的\
  \ `signal` 保持不变，我们就只需维持现有头寸，按兵不动。换句话说，这个特定交易日没有交易行为。这适用于 `signal` 列中连续出现两个 1 或 -1\
  \ 的情况。\n\n另一方面，当交易信号出现符号转换，即从 1 变为 -1 或从 -1 变为 1 时，我们就会采取行动。前者意味着从持有一单位股票变为做空该股票，而后者则相反。\n\
  \n要创建交易行为，我们可以再次对 `signal` 列使用 `diff()` 方法，如下所示：\n\n```\ndf2['action'] = df2.signal.diff()\n\
  ```\n\n我们可以使用 `value_counts()` 函数对不同交易行为的频率进行计数：\n\n```\n>>> df2['action'].value_counts()\n\
  0.0    216\n2.0      7\n-2.0      7\nName: action, dtype: int64\n```\n\n结果显示，绝大多数交易日都不需要采取行动。在有交易行为的\
  \ 14 天中，有 7 天是从空头转为多头，另外 7 天是从多头转为空头。\n\n我们可以将这些交易行为可视化为股价和移动平均线图表上的三角形。在代码清单 5-17\
  \ 中，当短期移动平均线上穿长期移动平均线时，我们用朝上的绿色三角形表示买入行为。另一方面，当短期移动平均线下穿长期移动平均线时，我们用朝下的红色三角形表示卖出行为。\n\
  \n```\nplt.rcParams['figure.figsize'] = 12, 6\nplt.grid(True, alpha = .3)\nplt.plot(df2['Adj\
  \ Close'], label = 'Adj Close')\nplt.plot(df2['SMA-3'], label = 'SMA-3')\nplt.plot(df2['SMA-20'],\
  \ label = 'SMA-20')\nplt.plot(df2.loc[df2.action == 2].index, df2['SMA-3'][df2.action\
  \ == 2], '^',\ncolor = 'g', markersize = 12)\nplt.plot(df2[df2.action == -2].index,\
  \ df2['SMA-20'][df2.action == -2], 'v',\ncolor = 'r', markersize = 12)\nplt.legend(loc=1);\n\
  代码清单 5-17\n可视化交易行为\n```\n\n运行这些命令将生成图 5-14。同样，我们使用绿色三角形表示从空头转为多头，使用红色三角形表示从多头转为空头。\n\
  \n![](img/605529_1_En_5_Fig14_HTML.jpg)\n\n一张价格对日期的多线图展示了 2022 年 3 月至 2023 年 1 月期间调整后收盘价、SMA-3\
  \ 和 SMA-20 的变化趋势。所有三条曲线均呈波动下降趋势。\n\n图 5-14\n\n可视化交易行为，包括从空头转为多头（绿色三角形）和从多头转为空头（红色三角形）\n\
  \n让我们分析两种交易策略在每个时期的累计收益率。具体来说，如果我们比较这两种交易策略，假设在 2022 年初持有一股苹果股票，我们想知道在 2022 年底的最终百分比收益率。\n\
  \n回顾一下，为了获得最终收益率（减去 1 之后），我们需要在每个时期乘以 1+R 收益率来进行复利计算。我们还知道 1+R 收益率等于两个连续价格之间的除法，即\
  \ `1+Rt,t+1 = St+1/St`。因此，为了计算最终收益率，我们首先使用 `np.exp()` 函数将对数收益率转换为通常的百分比格式，然后使用 `cumprod()`\
  \ 方法执行累积乘积操作来进行复利计算。这通过代码清单 5-18 实现，其中我们省略了减去 1 的最后一步，并报告了 1+R 收益率。\n\n```\nplt.plot(np.exp(df2['log_return_buy_n_hold']).cumprod(),\
  \ label='买入并持有')\nplt.plot(np.exp(df2['log_return_trend_follow']).cumprod(), label='趋势跟踪')\n\
  plt.legend(loc=2)\nplt.title(\"不同交易策略的累计收益率\")\nplt.grid(True, alpha=.3)\n代码清单 5-18\n\
  可视化累计收益率\n```\n\n运行这些命令将生成图 5-15，该图显示趋势跟踪策略明显优于买入并持有策略。然而，请注意，这是一个简化场景，未考虑交易成本和其他市场因素。要评估该交易策略（以及许多其他策略）在现实世界中的表现，还需要进行更多分析和测试。\n\
  \n![](img/605529_1_En_5_Fig15_HTML.jpg)\n\n一张价格对日期的多线图展示了 2022 年 2 月至 2023 年 1 月期间买入并持有策略与趋势跟踪策略的趋势变化。两条曲线均呈波动趋势。\n\
  \n图 5-15\n\n比较一股苹果股票的买入并持有策略与趋势跟踪策略的累计收益率\n\n最后，我们比较两种策略的最终收益率：\n\n```\n#### 买入并持有策略的最终收益率\n\
  >>> np.exp(df2['log_return_buy_n_hold']).cumprod()[-1] -1\n-0.25156586984649587\n\
  #### 趋势跟踪策略的最终收益率\n>>> np.exp(df2['log_return_trend_follow']).cumprod()[-1] -1\n\
  0.0711944903093773\n```\n\n结果表明，坚持买入并持有策略会亏损 25%，而使用趋势跟踪策略则能产生 7%的最终收益率。\n\n## 总结\n\
  \n在本章中，我们介绍了流行的趋势跟踪策略的基础知识及其在 Python 中的实现。我们从一个处理对数收益率的练习开始，然后过渡到作为常用技术指标的不同移动平均线，包括简单移动平均线和指数移动平均线。最后，我们讨论了如何使用该策略生成交易信号并计算绩效指标，这将作为我们后续深入探讨其他候选策略时的一个良好基准策略。\n\
  \n## 练习题\n\n-   从数学角度解释为什么对数收益率是对称的。\n-   在计算移动平均线时，如果某一天的股价数据缺失，应如何处理？\n-   窗口大小如何影响简单移动平均线的平滑度？α\
  \ 对指数移动平均线的平滑度有何影响？\n-   修改代码，计算移动中位数而非移动平均值。讨论中位数与平均值的区别。同一个滚动窗口内的最大值和最小值呢？\n-\
  \   切换到指数移动平均线来推导交易信号，并讨论结果。\n-   从数学上证明对数收益率在时间上具有可加性，并解释此性质在资产收益率背景下的重要性。\n- \
  \  假设数据中有多个缺失的价格点，你将如何修改移动平均线计算来处理这些空缺？你的方法可能存在哪些潜在问题？\n-   尝试为简单移动平均线使用不同的窗口大小，并为指数移动平均线使用不同的α值。讨论这些参数如何影响移动平均线对价格变化的敏感性。你将如何为这些参数选择最优值？\n\
  \n\n\n"
- "# 6. 动量交易策略\n\n动量交易是一种利用价格变动强度作为开仓基础的策略，可对一篮子资产进行做多或做空。该策略根据近期价格趋势的强弱，买入和/或卖出选定的一组资产，其假设前提是：如果价格变动背后有足够的力量，这些趋势将延续同一方向。采用动量交易时，交易者意图利用价格变动的力量或速度来确定投资头寸。他们会根据近期价格趋势的势头，在精心挑选的资产中建立多头或空头头寸。关键的是，支撑这种方法的核心前提是：现有趋势在其力量足够强劲的情况下，将持续向同一方向发展。\n\
  \n当某项资产呈现上涨趋势并录得更高价格时，它总会吸引更广泛交易者和投资者的更多关注。资产所获得的这种高度关注会进一步推高其市场价格。这种动量会持续，直到大量卖方入场并穿透市场，提供充足的资产供应。一旦市场上有足够多的卖方，动量就会改变方向，迫使资产价格走低。这本质上是供需之间的价格动态。此时，市场参与者可能会重新评估该资产的公允价格，由于近期价格飙升，该资产可能被视为估值过高。\n\
  \n换言之，随着更多卖方涌入市场，动量改变其运行轨迹，推动资产价格向下移动。这本质上代表了经典的供需动态，以及从买方多于卖方的环境向卖方多于买方的环境转变。另外请注意，虽然价格趋势可能持续较长时期，但它们最终会在某个时点发生逆转。因此，识别这些拐点并相应调整头寸的能力同样重要。\n\
  \n## 动量交易介绍\n\n动量交易者寻求在给定方向上识别趋势的主要驱动资产，利用预期的价格变化和预期的价格波动，而不是专注于预测趋势的顶峰。动量交易者不是试图寻找趋势的顶部和底部，而是关注价格变动的顶部和底部区间，这意味利用市场羊群效应以及跟随代表最显著价格变动的多数派的倾向。\n\
  \n这种方法本质上是利用市场羊群行为，即交易者倾向于跟随大多数市场共识的现象。在强劲的上涨或下跌趋势时期，许多交易者和投资者可能会决定随大流，做多或做空热门资产，从而启动或增强现有的动量。因此，动量交易在某种程度上是一种自我强化的机制：随着更多交易者识别出新兴趋势，他们通过增加买入或卖出力量来增强该趋势的强度。这进而吸引了更多市场参与者，进一步强化了已识别的趋势。这个过程一直持续，直到市场动态发生转变——要么由于基本面变化，要么由于市场情绪变化——导致现有趋势停滞或逆转。这种趋势的周期性特征构成了动量交易策略的特点，尽管把握动量的开始和结束（即入场点和出场点）极其困难。事实上，需要运用不同的技术指标来尝试完成这一任务。\n\
  \n### 深入探讨动量交易\n\n动量交易建立在三个核心要素的融合之上：成交量、波动性和时间框架。\n\n- **成交量**：这表示在特定时间框架内交易的资产数量。高交易量通常表明对该资产兴趣浓厚，并可能预示着该资产价格变动中新趋势的开始。相反，低成交量可能表明对该资产兴趣缺失，可能导致趋势反转。因此，成交量在确认趋势的强度和可持续性方面起着至关重要的作用。\n\
  \n- **波动性**：波动性代表资产价格在短时间内的变化程度。较高的波动性对应着更大的价格波动，如果这种变动是有利的方向，能为动量交易者提供良好的交易机会。然而，波动性是一把双刃剑，因为它也增加了重大亏损的风险。因此，理解和管理波动性是动量交易的关键方面。\n\
  \n- **时间框架**：时间框架代表已识别趋势的预期持续时间。根据不同的时间框架，动量交易者可能会进行日内交易，在一天内开仓和平仓（称为日内交易），或者持有头寸数周或数月（称为头寸交易）。时间框架的选择会影响交易的风险和回报特征，因为日内交易显然比头寸交易波动性更大。\n\
  \n在制定动量交易策略时，这些因素可以通过技术分析进行量化并整合在一起。该过程通常涉及分析历史价格数据和交易量，然后应用技术指标来识别潜在的交易信号。本质上，动量交易要求在潜在价格变动发生之前识别它们，并利用这些趋势来产生回报。\n\
  \n### 与趋势跟踪策略的对比\n\n趋势跟踪策略和动量交易策略都基于动量概念，旨在捕捉资产的持续方向性运动或持续性表现。这两种策略都建立在对资产价格在一段时间内有朝特定方向移动的倾向（即动量现象）的观察之上。尽管基础相同，但两种策略的应用和侧重点却大相径庭。\n\
  \n我们已经讨论过，动量交易策略本质上是截面性质的。它涉及在特定时间点比较不同资产的动量，并投资于表现出最高动量的资产。这种比较分析发生在特定时间点，旨在比较多个资产之间的相对表现。因此，动量交易通常被描述为一种相对动量策略。\n\
  \n相比之下，趋势跟踪策略利用时间序列动量，仅关注资产自身随时间推移的历史表现。它分析单个资产在其自身历史中横跨多个时间点的价格模式，以识别潜在的交易信号。因此，趋势跟踪策略是绝对动量策略的一个实例。它强调单个资产的历史趋势，并旨在从其延续中获利。\n\
  \n\n\n### 观察回溯窗口的作用\n\n回溯窗口在趋势跟踪和动量交易策略中的应用各不相同，这取决于它们独特的操作需求和目标。\n\n如前章所述，趋势跟踪策略采用两个回溯窗口。这两个窗口（一个短期、一个长期）分别计算各自的移动平均线作为技术指标。这些移动平均线的交叉或金叉/死叉会生成交易信号，指示趋势方向的转变以及采取行动（买入或卖出）的恰当时机。因此，趋势跟踪策略中的双重回溯窗口是决策的基础，帮助交易者识别市场趋势的潜在转变。\n\
  \n相反，动量交易策略使用单一的、统一的回溯窗口来评估一系列资产。该窗口有助于识别在特定回溯期内表现最佳的资产。随后，另一个统一的前瞻窗口用于确定在做出交易决策后持有头寸的周期。本质上，回溯窗口根据资产过去的表现帮助选择投资目标，而前瞻窗口则提供了持有投资的时限，前提是假设资产的动量在此期间将持续。\n\
  \n因此，回溯窗口和前瞻窗口在动量交易中都至关重要，分别帮助交易者识别高动量资产和定义投资持有期。这些窗口的战略性运用为驾驭不断波动的市场动态提供了一种结构化的方法。\n\
  \n让我们详细阐述其区别。图 6-1 展示了按常规交易间隔（如前瞻窗口所示）选择三只股票的特征。每个交易决策（实线绿框所示）都考虑了同一回溯窗口内的历史股价。该交易决策可能是在特定时间点买入动量最高（基于历史平均收益率等指标）的股票，并卖出动量最低的股票。我们评估所有三只股票，并根据滚动回溯窗口，定期（即前瞻窗口）做出交易决策。\n\
  \n![](img/605529_1_En_6_Fig1_HTML.jpg)\n\n股价随时间变化的折线图。图中包含股票 A、股票 B 和股票 C 的三条波动曲线以及两条垂直条柱。条柱表示做出交易决策的时间点。此外，还标示了两个统一的回溯窗口，用于评估所有资产的动量。\n\
  \n**图 6-1**  \n三只股票的动量交易策略特征图示\n\n动量交易策略在股票市场中尤为有效，它提供了一种系统化的方法来比较和分析同类资产。该策略对股票宇宙（在此例中为三只股票）进行横截面分析，根据各成分股在特定回溯期内的相对表现进行评估和排序。这一过程使交易者能够识别强势股和潜在滞涨股，利用它们近期的动量作为未来表现的代理指标。\n\
  \n在做出交易决策时，动量策略通常采用双管齐下的方法，建立一个包含两条“腿”的投资组合。第一条腿是“多头”腿，由预计将维持强劲上涨价格动能的排名靠前的资产组成。交易者买入这些股票，预期其价格上涨，旨在未来以更高价格卖出。第二条腿是“空头”腿，由显示出价格动能下降迹象的排名靠后的资产组成。交易者卖出这些股票，通常通过卖空操作，即借入股票在市场上卖出，意图日后以更低价格买回。其理念是从这些资产预期的价格下跌中获利。通过做多具有强劲正动量的资产并做空具有负动量的资产，只要所识别的动量在持有期内持续，交易者就有可能从上涨和下跌的市场中获利。\n\
  \n请注意，基于相对动量原理的动量策略，会维持其多头和空头头寸，而不受更广泛市场趋势的影响。这些策略的运作前提是：表现最强和最弱的股票将延续各自的轨迹，从而在投资宇宙中保持其相对位置。换言之，在牛市环境中，上涨动能最强的股票预计将跑赢大盘。同时，在熊市阶段，这些同样具有高动量的股票价格可能下跌，但其表现仍预计将优于其他下跌更快的股票。相反，排名靠后的、显示出动能下降的股票预计将跑输大盘。在上涨的市场中，这些股票的价值可能会增加，但增速慢于市场。类似地，在下跌市场中，这些股票预计会比大盘下跌得更快。因此，无论市场是牛市还是熊市，动量策略都依赖于相对表现的持续性。\n\
  \n\n\n### 趋势跟踪策略详解\n\n趋势跟踪策略与动量交易策略在操作方式和交易频率上存在根本差异。趋势跟踪是一种基于时间序列的策略，它利用不同回溯周期（一个较短、一个较长）的移动平均线来生成交易信号。\n\
  \n如图 6-2 所示，趋势跟踪策略在每个时间点计算两条移动平均线，其中一条采用较长回溯窗口，另一条采用较短回溯窗口。当两条移动平均线发生交叉，即它们的相对位置从一个时间点变化到下一个时间点时，就会产生交易信号。例如，当短期移动平均线上穿长期移动平均线时，通常被视为**看涨**信号；而当它下穿时，则为**看跌**信号。\n\
  \n![](img/605529_1_En_6_Fig2_HTML.jpg)\n\n一张价格与时间的折线图。图中显示股票 A 呈波动上升曲线，并带有一条垂直柱线。该柱线表示交易间隔并非固定，而是完全由数据驱动。同时，该图在曲线上方和下方分别标注了较长和较短的回溯窗口。\n\
  \n**图 6-2**  \n单一股票趋势跟踪策略的特征描述\n\n与动量交易策略（要求基于预定义的前瞻窗口进行定期交易）不同，趋势跟踪策略没有固定的交易频率设置。相反，它完全由当前数据驱动。交易操作依据移动平均线的相互作用做出，因此交易频率可能更低，但时机更具策略性。这种机制使趋势跟踪策略能够根据市场走势灵活调整，适应性更佳。\n\
  \n需要注意的是，在趋势跟踪策略中，核心关注点是某项资产是否处于上升或下降趋势。采用该策略时，交易者不会像动量策略那样关注不同资产之间的相对表现，而是侧重于识别并利用单个资产已形成的价格趋势。该策略的基本假设是：那些在一段时间内持续上涨或下跌的资产价格，将继续保持相同方向的运动。因此，当资产呈现上升趋势时，交易者会做多；当呈现下降趋势时，则会做空。其操作原则是，只要趋势持续，就“顺势而为”。市场的“趋势性”完全决定了该策略的交易决策。\n\
  \n总之，尽管这两种策略都旨在利用市场动量，但趋势跟踪策略依赖于对同一资产历史价格中绝对动量的时间序列分析，而动量交易策略则依赖于对多种资产间相对动量的横截面分析。因此，这两者从根本上存在差异。\n\
  \n下一节将介绍如何使用 Python 实现动量交易策略。\n\n## 实现动量交易策略\n\n道琼斯工业平均指数（DJIA，常简称为“道指”）是一个广受欢迎的股票指数，由\
  \ 30 家总部位于美国、覆盖多个行业的大型上市公司组成。其代表的多行业特性使其成为评估市场整体趋势和表现的有效指标。然而，与其他更广泛的指数（如包含美国 500\
  \ 家最大上市公司的`S&P 500`，后者能更准确地反映市场动态）相比，道指的样本池被认为相对较小。\n\n在本节中，我们将以道琼斯工业平均指数的成分股作为参考范围，采用动量交易策略。这将涉及分析这些股票在指定时间段内的各自价格趋势以及彼此之间的相对表现，以识别潜在的投资机会。我们的策略将寻求从表现优异股票的持续动量中获利，同时做空表现不佳的股票，并预期这些趋势在短期至中期内将持续。换言之，我们将通过对\
  \ 30 只成分股中表现最佳的股票做多、对表现最差的股票做空来做出交易决策。\n\n首先，我们需要获取这 30 只股票的股票代码。\n\n\n\n### 获取道琼斯指数股票代码\n\
  \n维基百科页面提供了这些股票的列表，网址为 [`https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average`](https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average)。我们不会手动将这些代码复制粘贴到编码控制台中，而是利用一个名为\
  \ `Beautiful Soup` 的网页抓取包。这是一个广泛用于解析 HTML 和 XML 文档的 Python 包。我们将使用该包创建解析树，并从特定的\
  \ HTML 页面中提取数据。\n\n首先，如清单 6-1 所示，我们导入以下包：其中 `bs4` 是 Beautiful Soup 包，`requests`\
  \ 包用于发送 HTTP 请求，而 `yfinance` 用于在获取股票代码后下载财务数据。\n\n```\nimport pandas as pd\nimport\
  \ requests\nfrom bs4 import BeautifulSoup\nimport os\nimport numpy as np\nimport\
  \ pandas as pd\nimport yfinance as yf\nListing 6-1\nImporting relevant packages\n\
  ```\n\n接下来，我们编写一个名为 `fetch_info()` 的函数来完成抓取任务。如清单 6-2 所示，我们首先将网页链接赋值给 `url` 变量，并将头部信息存储在\
  \ `headers` 变量中。头部信息是访问网站时必需的元数据。然后，我们通过 `requests.get()` 方法发送一个 GET 请求，从指定的网页链接获取信息，并使用\
  \ `BeautifulSoup()` 从抓取到的 HTML 文件中提取并解析数据，存储在 `soup` 变量中。接着，我们可以通过将特定的节点名称（此处为 `table`）传递给\
  \ `find_all()` 函数来定位数据，使用 Pandas 的 `read_html()` 函数将 HTML 数据读取为 DataFrame 格式，并在返回\
  \ DataFrame 对象之前删除不必要的列（`Notes` 列）。最后，如果抓取失败，函数将通过 `try-except` 控制语句打印错误信息。\n\n\
  ```\ndef fetch_info():\ntry:\nurl = \"https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average\"\
  \nheaders = {\n'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:101.0)\
  \ Gecko/20100101 Firefox/101.0',\n'Accept': 'application/json',\n'Accept-Language':\
  \ 'en-US,en;q=0.5',\n}\n#### Send GET request\nresponse = requests.get(url, headers=headers)\n\
  soup = BeautifulSoup(response.content, \"html.parser\")\n#### Get the symbols table\n\
  tables = soup.find_all('table')\n#  #  Convert table to dataframe\ndf = pd.read_html(str(tables))[1]\n\
  #### Cleanup\ndf.drop(columns=['Notes'], inplace=True)\nreturn df\nexcept:\nprint('Error\
  \ loading data')\nreturn None\nListing 6-2\nFetching relevant information from the\
  \ web page\n```\n\n现在，让我们调用该函数，将结果存储在 `dji_df` 中，并输出前五行，如下所示：\n\n```\n#### get DJI\
  \ components (ticker symbols)\ndji_df = fetch_info()\n>>> dji_df.head()\nCompany\
  \           Exchange  Symbol  Industry                Date added    Index weighting\n\
  0  3M                NYSE      MMM     Conglomerate            1976-08-09    2.41%\n\
  1  American Express  NYSE      AXP     Financial services      1982-08-30    3.02%\n\
  2  Amgen             NASDAQ    AMGN    Biopharmaceutical       2020-08-31    5.48%\n\
  3  Apple             NASDAQ    AAPL    Information technology  2015-03-19    2.84%\n\
  4  Boeing            NYSE      BA      Aerospace and defense   1987-03-12    3.36%\n\
  ```\n\n然后，我们可以提取 `Symbol` 列的值，并将其转换为列表格式：\n\n```\ntickers = dji_df.Symbol.values.tolist()\n\
  ```\n\n拥有了道琼斯指数股票代码后，我们现在可以使用 `yfinance` 包下载这些股票代码对应的股票价格。\n\n### 下载股票价格\n\n调用 `download()`\
  \ 函数时需要指定三个输入参数：股票代码、开始日期和结束日期。在此例中，我们将开始日期设置为 `2021-01-01`，结束日期设置为 `2022-09-01`，如清单\
  \ 6-3 所示。\n\n```\nstart_date = \"2021-01-01\"\nend_date = \"2022-09-01\"\ndf = yf.download(tickers,\
  \ start=start_date, end=end_date)\nListing 6-3\nDownloading the daily stock prices\
  \ of DJI tickers\n```\n\n我们将重点关注后续分析所需的调整后收盘价：\n\n```\n#### use the adjusted closing\
  \ prices for follow-up analysis\ndf = df['Adj Close']\n```\n\n至此，我们已经存储了道指 30 只成分股的股票价格，其中每列代表一只股票代码，每行代表一个相应的交易日。DataFrame\
  \ 的索引遵循日期时间格式。\n\n接下来，我们将日度股票价格转换为月度收益率。\n\n\n\n### 计算月收益率\n\n要从原始日度股价数据转换为月度收益率，我们需要经历几个步骤。第一步是使用\
  \ `pct_change()` 方法将价格转换为每日百分比收益率。如前一章所介绍，此函数会自动计算所有交易日的简单百分比收益率。由于这是日收益率，我们需要通过复利计算同一月份内所有日收益率，并将期末收益率作为月度收益率，从而将其汇总为月收益率。分解来看，我们需要将所有交易日按月分组，然后计算每个月的期末收益率。清单\
  \ [6-4] 将所有操作一步到位地串联起来，生成的月度收益率存储在 `mth_return_df` 中。\n\n```\nmth_return_df = df.pct_change().resample(\"\
  M\").agg(lambda x: (x+1).prod()-1)\n清单 6-4\n从日度价格生成月度收益率\n```\n\n虽然将相关操作串联起来看起来更简洁，但如果这是我们第一次接触这些操作，这并非学习它们的最佳方式。让我们分解这些操作。第一个操作是调用\
  \ `pct_change()` 方法，这是一个在许多场景下广泛使用的便捷函数。接下来是 `resample()` 函数，这是一个用于时间序列数据频率转换和重采样的便捷方法。让我们用一些虚拟数据来理解这个函数。\n\
  \n以下代码片段创建了一个 Pandas Series 对象，其中包含九个从零到八的整数，并由九个一分钟时间戳索引：\n\n```\n#### 创建一个包含 9\
  \ 个一分钟时间戳的序列\nindex = pd.date_range('1/1/2000', periods=9, freq='T')\nseries = pd.Series(range(9),\
  \ index=index)\n>>> series\n2000-01-01 00:00:00    0\n2000-01-01 00:01:00    1\n\
  2000-01-01 00:02:00    2\n2000-01-01 00:03:00    3\n2000-01-01 00:04:00    4\n2000-01-01\
  \ 00:05:00    5\n2000-01-01 00:06:00    6\n2000-01-01 00:07:00    7\n2000-01-01\
  \ 00:08:00    8\nFreq: T, dtype: int64\n```\n\n然后，我们将序列聚合成三分钟区间，并汇总落入同一区间内时间戳的值，如下列代码片段所示：\n\
  \n```\n>>> series.resample('3T').sum()\n2000-01-01 00:00:00     3\n2000-01-01 00:03:00\
  \    12\n2000-01-01 00:06:00    21\nFreq: 3T, dtype: int64\n```\n\n从结果可以看出，`resample()`\
  \ 函数按指定区间完成了聚合操作，其后跟的方法则对区间内的数据进行汇总。\n\n回到我们的运行示例，我们将原始日收益率降采样为月收益率，因此每个月仅用一个数据点表示，而不是典型的\
  \ 30 个。聚合操作遵循相同的过程来累积所有日收益率：转换为 `1+R` 格式，进行复利计算，然后再转换回简单收益率。\n\n这里的新内容是 lambda 函数。我们使用\
  \ `x` 符号来表示一个通用的输入参数。在此例中，它将是给定月份内的所有原始日收益率。由于此 lambda 函数执行的是自定义操作，我们使用 `agg()`\
  \ 函数来执行这个自定义函数，而不是像之前那样使用内置函数如 `sum()`。\n\n至此，我们已经将日收益率转换为月度表示形式，其中每一个月度收益率都代表了该月内日收益率复利计算后的期末收益率。接下来，我们使用历史月度收益率来计算另一个指标，以指示当前月份的股票表现。\n\
  \n### 计算六个月期末收益率\n\n我们知道，仅根据当前月份的收益率做出交易决策存在两方面的缺陷。首先，我们过度依赖当前月份，忽略了历史表现。其次，我们面临数据窥探的风险。也就是说，要计算某个月份中某一天的月度收益率，如果这一天不是该月的最后一天，我们就会窥探同一个月内所有未来的日收益率，以计算该月的期末收益率。\n\
  \n我们首先关注第一点，稍后再回到第二点。显然，我们需要找到一种方法，在生成当前月份的交易信号时纳入历史月度收益率。然而，与用于股票价格的移动平均线不同，使用相同算术平均值计算的历史平均月度收益率本质上是忽略了序列复利过程的。因此，我们需要将历史月度收益率视为一个序列过程，并对这些收益率进行复利计算（直到一个特定的回望窗口），以获得期末月度收益率。\n\
  \n这个期末月度收益率随后将作为选股和交易开仓的动量指标。这涉及到选择一个特定大小的回望窗口。假设窗口大小为六。现在，为了滚动计算每个月的六个月期末收益率，我们可以使用\
  \ `rolling()` 函数，该函数与计算移动平均线所用的函数相同。唯一的变化是，在将指针向后滚动六个月后，我们不再使用 `mean()` 取平均值，而是在\
  \ `apply()` 函数中使用 `np.prod` 对这些 `1+R` 月度收益率的乘积进行计算，以完成复利过程，如清单 [6-5] 所示。\n\n```\n\
  #### 获取过去 6 个月的历史累积收益率，作为当前月份的期末收益率\npast_cum_return_df = (mth_return_df+1).rolling(6).apply(np.prod)\
  \ - 1\n清单 6-5\n计算六个月累积收益率\n```\n\n至此，我们已经计算出了六个月的期末月度收益率，即包括当前月份在内的过去六个月的累积收益率。这也解释了为什么在前面的结果中，前五个月显示为空值，而累积月度收益率是从第六个月才开始出现的。\n\
  \n接下来，我们看看如何使用这些期末收益率来生成交易信号。\n\n\n\n### 生成交易信号\n\n我们将回溯窗口固定为过去的六个月。动量交易策略涉及另一个前视窗口，用于确定未来的交易周期。具体来说，假设我们在当前月份制定交易策略并做出交易决策。如果前视周期为\
  \ 1 个月，这些新头寸将在下个月持续一整月。然后，我们可以在下月底衡量这些头寸的表现。在这种情况下，前视窗口的大小被设置为 1。\n\n此外，我们不能使用形成月份的月度期末收益率来生成交易信号，因为它使用了该月份内未来的日收益率。当处于形成月份中间时，我们可以使用的是上个月的月度期末收益率，即衡量期结束时。衡量期代表所有历史观测数据的集合，因此当将可用数据限制在该期限内时，可以避免数据窥探。图\
  \ 6-3 说明了这种微妙之处。\n\n![](img/605529_1_En_6_Fig3_HTML.jpg)\n\n一个带有 6 个标记点的时间线。每个刻度代表月末。标记的点分别表示：包含\
  \ 6 个月回溯窗口的历史衡量期、6 个月的月度期末收益率、交易形成期、当前时间点，以及包含 1 个月前视窗口的表现期。\n\n**图 6-3** 说明投资周期中的衡量期、形成期和评估期\n\
  \n由于我们的数据截至 2022-08-31，我们将使用 2022-07-31 作为交易形成期。为了生成交易策略，我们将使用索引为 2022-06-30 的前一个月的月度期末收益率作为衡量期的结束点。我们借助`datetime`包来编码这两个日期，如代码清单\
  \ 6-6 所示。\n\n```\nimport datetime as dt\nend_of_measurement_period = dt.datetime(2022,6,30)\n\
  formation_period = dt.datetime(2022,7,31)\nListing 6-6\n识别衡量期与形成期\n```\n\n然后，这些日期将用于对存储在\
  \ `past_cum_return_df` 中的累积月度收益率 DataFrame 进行切片。在下面的代码片段中，我们将 `end_of_measurement_period`\
  \ 变量传递给 `past_cum_return_df` 的 `.loc[]` 属性，以在行级别执行基于标签的索引。由于结果是按 30 个股票代码索引的 Pandas\
  \ Series，我们将使用 `reset_index()` 方法将其索引重置为从零开始的整数，并将股票代码作为结果 DataFrame 中的一列。以下代码片段显示了衡量期结束时的累积期末收益率：\n\
  \n```\nend_of_measurement_period_return_df = past_cum_return_df.loc[end_of_measurement_period]\n\
  end_of_measurement_period_return_df = end_of_measurement_period_return_df.reset_index()\n\
  >>> end_of_measurement_period_return_df.head()\nindex      2022-06-30 00:00:00-04:00\n\
  0     AAPL      -0.227936\n1     AMGN       0.099514\n2     AXP       -0.144964\n\
  3     BA        -0.320882\n4     CAT       -0.126977\n```\n\n这 30 只道琼斯工业平均指数成分股的六个月月度期末收益率代表了每只股票的相对动量。我们可以使用以下代码片段观察正向和负向动量最高的股票代码和收益率：\n\
  \n```\n#### 正向最高动量\n>>> end_of_measurement_period_return_df.loc[end_of_measurement_period_return_df.iloc[:,1].idxmax()]\n\
  index                             CVX\n2022-06-30 00:00:00-04:00    0.256955\nName:\
  \ 7, dtype: object\n#### 负向最高动量\nend_of_measurement_period_return_df.loc[end_of_measurement_period_return_df.iloc[:,1].idxmin()]\n\
  index                             DIS\n2022-06-30 00:00:00-04:00   -0.390535\nName:\
  \ 8, dtype: object\n```\n\n这里，我们分别使用了 `idxmax()` 和 `idxmin()` 方法返回最大值和最小值的索引。\n\n\
  如果我们想要做多或做空某只资产，这两只股票将是最佳选择。与其只关注每个方向（做多和做空）中的一只股票，我们可以扩大范围，使用分位数方法进行股票选择。例如，我们可以根据所有股票的收益率将其分为五个组（也称为分位数或百分位数），并制定一个交易策略，做多顶部百分位中的股票，同时做空底部百分位中的股票。\n\
  \n为了获得每个收益率的所属分位数，我们可以使用 Pandas 的 `qcut()` 函数，该函数接收一个 Pandas Series，并根据其分位数将其切割成预先指定数量的组，从而将连续变量离散化为类别变量，更具体地说，是序数变量。以下代码片段提供了一个简短的示例：\n\
  \n```\n>>> pd.qcut(series, 5, labels=False)\n2000-01-01 00:00:00    0\n2000-01-01\
  \ 00:01:00    0\n2000-01-01 00:02:00    1\n2000-01-01 00:03:00    1\n2000-01-01\
  \ 00:04:00    2\n2000-01-01 00:05:00    3\n2000-01-01 00:06:00    3\n2000-01-01\
  \ 00:07:00    4\n2000-01-01 00:08:00    4\nFreq: T, dtype: int64\n```\n\n因此，`qcut()`\
  \ 函数根据分位数将序列按排名顺序分为五组。我们现在可以类似地对收益率进行排名，并将结果存储在一个名为 `rank` 的新列中，如代码清单 6-7 所示。\n\n\
  ```\nend_of_measurement_period_return_df['rank'] = pd.qcut(end_of_measurement_period_return_df.iloc[:,1],\
  \ 5, labels=False)\n>>> end_of_measurement_period_return_df.head()\nindex      2022-06-30\
  \ 00:00:00-04:00      rank\n0     AAPL      -0.227936                       1\n\
  1     AMGN       0.099514                       4\n2     AXP       -0.144964   \
  \                    2\n3     BA        -0.320882                       0\n4   \
  \  CAT       -0.126977                       2\nListing 6-7\n基于累积期末月度收益率对股票进行排序\n\
  ```\n\n我们现在可以使用这一列来选择表现最好和最差的股票。具体来说，我们将做多排名为 4 的股票，做空排名为 0 的股票。让我们通过代码清单 6-8 来观察这两组中的股票代码。\n\
  \n```\nlong_stocks = end_of_measurement_period_return_df.loc[end_of_measurement_period_return_df[\"\
  rank\"]==4,\"index\"].values\n>>> long_stocks\narray(['AMGN', 'CVX', 'IBM', 'KO',\
  \ 'MRK', 'TRV'], dtype=object)\nshort_stocks = end_of_measurement_period_return_df.loc[end_of_measurement_period_return_df[\"\
  rank\"]==0,\"index\"].values\n>>> short_stocks\narray(['BA', 'CRM', 'CSCO', 'DIS',\
  \ 'HD', 'NKE'], dtype=object)\nListing 6-8\n获取将做多或做空的股票代码\n```\n\n确定了要买入或卖出的股票组后，我们将执行交易操作并持有这些头寸一个月。由于当前期间是\
  \ 2022-07-31，我们将在 2022-08-31 评估该动量策略的样本外表现。\n\n\n\n### 评估样本外表现\n\n首先，我们从 `mth_return_df`\
  \ 中分别获取多头和空头头寸在 2022-08-31 索引处的月度收益。如代码清单 6-9 所示，我们使用 `dateutil` 包中的 `relativedelta`\
  \ 函数将 `formation_period` 向前推移一个月，从而得到评估期。这构成了 `.loc[]` 属性中的行级条件。对于列级条件，我们使用 `isin()`\
  \ 方法将列子集限定为多头头寸中的股票代码。多头头寸在评估期的表现结果存储在 `long_return_df` 中。\n\n```python\nfrom dateutil.relativedelta\
  \ import relativedelta\nlong_return_df = mth_return_df.loc[formation_period +  relativedelta(months=1),\
  \ \\ mth_return_df.columns.isin(long_stocks)]\n>>> long_return_df\nAMGN   -0.021474\n\
  CVX    -0.026156\nIBM    -0.005517\nKO     -0.038336\nMRK    -0.044549\nTRV    \
  \ 0.018526\nName: 2022-08-31 00:00:00-04:00, dtype: float64\n```\n\n*代码清单 6-9*：获取评估期多头头寸中股票的表现\n\
  \n结果显示，大部分表现最佳的股票价格都在下跌，这直接反映了该时期的市场情绪。我们可以类似地获取空头头寸中表现最差股票的评估期表现，如代码清单 6-10 所示。\n\
  \n```python\nshort_return_df = mth_return_df.loc[formation_period +  relativedelta(months=1),\
  \ \\ mth_return_df.columns.isin(short_stocks)]\n>>> short_return_df\nBA      0.005900\n\
  CRM    -0.151614\nCSCO   -0.014327\nDIS     0.056362\nHD     -0.035350\nNKE    -0.073703\n\
  Name: 2022-08-31 00:00:00-04:00, dtype: float64\n```\n\n*代码清单 6-10*：获取评估期空头头寸中股票的表现\n\
  \n现在，我们基于这两个头寸计算评估期的收益。我们假设两个头寸均为等权重投资组合。因此，最终收益是各个头寸中所有成分股收益的平均值。此外，由于我们对表现最差的股票持有空头头寸，我们要从这些股票的空头头寸中减去平均收益，同时加上多头头寸的平均收益。代码清单\
  \ 6-11 完成了计算。\n\n```python\nmomentum_profit = long_return_df.mean() - short_return_df.mean()\n\
  >>> momentum_profit\n0.015870799817079288\n```\n\n*代码清单 6-11*：计算总利润\n\n因此，动量交易策略报告的最终月度收益率为\
  \ 1.587%。现在，我们将其与买入并持有策略进行比较。\n\n### 与买入并持有策略的比较\n\n我们假设一个以道琼斯工业平均指数为基准的买入并持有策略。这意味着在\
  \ 2021-01-01 同一交易期开始时建立该指数的多头头寸，并一直持有至 2022-09-01。我们首先通过传递 `\"^DJI\"` 作为股票代码来下载该指数的数据，如下代码片段所示：\n\
  \n```python\ndf_dji = yf.download(\"^DJI\", start=start_date, end=end_date)\n```\n\
  \n接下来，我们采用相同的方法计算月度终端收益率，如代码清单 6-12 所示。\n\n```python\nbuy_n_hold_df = df_dji['Adj\
  \ Close'].pct_change().resample(\"M\").agg(lambda x: (x+1).prod()-1)\n>>> buy_n_hold_df.head()\n\
  Date\n2021-01-31 00:00:00-05:00   -0.007983\n2021-02-28 00:00:00-05:00    0.031677\n\
  2021-03-31 00:00:00-04:00    0.066247\n2021-04-30 00:00:00-04:00    0.027085\n2021-05-31\
  \ 00:00:00-04:00    0.019324\nFreq: M, Name: Adj Close, dtype: float64\n```\n\n\
  *代码清单 6-12*：计算买入并持有策略的月度终端收益率\n\n然后，我们可以获取评估期的月度收益率，如下代码片段所示：\n\n```python\n>>>\
  \ buy_n_hold_df.loc[formation_period + relativedelta(months=1),]\n-0.04063613884907047\n\
  ```\n\n因此，买入并持有策略在同一评估期内报告的月度收益率为 –4.064%。尽管动量交易策略表现更好，但我们远不能就此宣称胜利。还需要对多个时期的样本外表现进行更稳健的回测。\n\
  \n## 本章小结\n\n在本章中，我们研究了动量交易策略及其在 Python 中的实现。我们首先将其与上一章的趋势跟踪策略进行比较，讨论了它们在时间序列和横截面分析方面的联系与区别，以及回溯窗口和前瞻窗口的不同用法。接着，我们使用月度收益实现该策略，重点介绍了信号生成和样本外表现评估的过程。\n\
  \n在下一章中，我们将学习一种系统化的方法，通过回测来评估不同的交易策略。\n\n## 练习题\n\n*   尝试调整动量交易策略的参数（如窗口大小），并评估其表现。\n\
