- "# 4. 理解风险与回报\n\n任何金融资产都具有其特征性的风险与回报。回报是指其带来的财务收益，例如资产价值的百分比增长。我们希望尽可能最大化资产的百分比回报。然而，更高的回报往往伴随着更高的风险，这里的风险指的是这种回报的波动性。也就是说，一项资产在其历史回报中表现出剧烈波动，使其未来前景比诸如债券之类稳定、与预期收益偏差很小的产品更具不确定性。作为投资者，获利的目标归结为在最大化回报的同时，最小化风险。\n\
  \n回报是衡量某项投资在特定时期内财务收益或损失的指标。它可以按初始投资额的百分比计算，并考虑资本增值、股息和利息支付等因素。回报可以是已实现的（已收到）或未实现的（预期在未来收到）。有多种衡量回报的方法，包括绝对回报、年化回报和风险调整后回报。\n\
  \n风险是投资回报的波动性或不确定性。它代表因市场波动、经济状况和公司特定事件等因素造成潜在损失的可能性。风险有多种类型，包括市场风险、信用风险、流动性风险和操作风险等。通常，风险较高的投资往往会提供更高的潜在回报，以补偿这种增大的不确定性。\n\
  \n\n\n## 风险与回报的权衡\n\n在风险与回报的权衡中，低回报资产通常伴随着低风险，而高回报资产则伴随着高风险。这对于市场上的大多数金融工具都适用。例如，债券作为一种固定收益资产，通常被视为无风险资产，提供较低的回报且几乎不承担风险。股票市场提供更高的回报，但由于未来的不确定性和不可预测性，往往表现出更高的波动性。在这种权衡下，投资者只有愿意承担更多风险（即更高的亏损概率），才能获得更高的回报并赚取更多利润。\n\
  \n适当的风险-回报权衡取决于多种因素，包括投资者的风险承受能力、距离退休的年数以及弥补损失资金的潜力。这种权衡还取决于特定持仓的时间跨度。例如，头寸交易者通常会长期持有一个头寸，这使交易者有机会从熊市风险中恢复过来，并参与牛市行情，期望资产价值在长期内增长。另一方面，波段交易者甚至日内交易者则会短期持有头寸，通过投机资产价格变动来寻求利润。当投资者只能进行短期投资时，同一类股票（例如普通股）会带来更高的风险。\n\
  \n需要注意的是，每项单独资产都有其自身的风险和回报特征，而一组资产可以形成一个具有全新风险和回报特性的投资组合。在投资组合层面，风险-回报权衡评估的是持仓的集中度或分散度，以及投资组合的构成是否带来过高风险或回报潜力低于预期。因此，风险-回报权衡既适用于单一资产，也适用于资产组合。\n\
  \n然而，一个多元化的投资组合通常能降低单个投资头寸所带来的风险。跨不同资产类别、行业和地域进行多元化配置，有助于减轻表现不佳的资产对整体回报的影响，从而提供一种更均衡的风险管理方法。更好地理解风险-回报权衡以及各种多元化策略，使我们能够量身定制投资组合，以实现预期的财务目标，同时有效管理与投资相关的固有风险。\n\
  \n让我们绘制一个二维坐标系来表征风险与回报。我们通常将风险放在横轴上，回报放在纵轴上。如图 4-1 所示，左下象限代表低风险和低回报。代表性产品包括固定收益工具，如债券和国库券。移至右上象限，则是与高风险和高回报相关的产品，例如股票和衍生品。另外两个象限则较少见。例如，很难看到低风险高回报的金融工具。公司可能急需资金，从而发行回报率较高的债券，但陷入这种状况本身已经意味着违约风险的增加。另一方面，出现低回报但高风险的产品可能性极低，因为这有悖于交易追求利润最大化的本质。\n\
  \n![](img/605529_1_En_4_Fig1_HTML.jpg)\n\n一个回报与风险平面被分为四个象限。从右上角顺时针看：高回报高风险，例如股票和衍生品；高风险低回报，甚至更常见；低风险低回报，例如固定收益产品；低风险高回报，较为少见。\n\
  \n**图 4-1**  \n说明风险和回报特征的四个象限\n\n在下一节中，我们将首先理解作为金融资产绩效衡量标准的回报的基本原理。理解回报对于我们评估不同投资的成功程度，并在管理投资组合时做出明智的决策至关重要。\n\
  \n## 分析回报\n\n回报是大多数投资者在考察特定投资工具时首要关注的指标。它表示金融资产在特定时期内的价值变化。它可以以绝对数值（例如，盈利或亏损的美元金额）或初始投资价值的百分比来表示。作为衡量资产或投资组合绩效的关键指标，回报使我们能够进行跨投资比较。\n\
  \n当以百分比衡量时，其范围理论上可以从负无穷到正无穷。假设资产价格从 `S[t - 1]` 变为 `S[t]`。价格变动为 `S[t] - S[t - 1]`，可能是正值或负值。考虑到资产价格在不同时间点会变化，并且多种资产具有不同的价格水平，很难评估价格变动\
  \ `S[t] - S[t - 1]` 是大还是小。为了标准化这些价格变动并使其更易于比较，一个更广泛使用的衡量标准是百分比回报 `R[t]`，其定义如下：\n\
  \n```\nR_t = (S_t - S_{t-1}) / S_{t-1}\n```\n\n这个公式本质上衡量的是资产价格变动相对于前一时期资产价格（即基准）的比例。它使我们能够从价格过渡到回报。因此，这种资产价格的百分比变化能够让我们评估和比较不同的资产。通过计算百分比回报\
  \ `R[t]`，我们可以有效地将关注点从原始价格变动转移到资产价格的比例变动上。这种转变使我们能够相对于基准（即前一时期的资产价格）来评估不同投资的表现。当评估具有不同价格水平或经历不同幅度价格波动的投资时，这种标准化尤其有用。\n\
  \n请注意，我们也可以将回报写作 `R[t - 1, t]`，以强调回报衡量的是从 `t - 1` 时期到 `t` 时期价格的相对变化：\n\n```\nR_{t-1,t}\
  \ = (S_t - S_{t-1}) / S_{t-1}\n```\n\n让我们分析一些模拟的回报数据，使这些计算更加具体。\n\n\n\n### 处理模拟收益率\n\
  \n在代码清单 4-1 中，我们首先创建了两个包含五个元素（或五个周期）的列表，分别代表两种不同资产的收益率，并分别存储在 `asset_return1` 和\
  \ `asset_return2` 中。我们构造的收益率使得它们的平均收益率相同。我们可以使用 `==` 运算符来验证这一相等性。\n\n```\nasset_return1\
  \ = [0.05, 0.3, -0.1, 0.35, 0.2]\nasset_return2 = [0.5, -0.2, 0.3, 0.5, -0.3]\n\
  >>> print(np.mean(asset_return1))\n>>> print(np.mean(asset_return2))\n>>> print(np.mean(asset_return1)\
  \ == np.mean(asset_return2))\n0.16\n0.16\nTrue\n代码清单 4-1\n模拟两种资产的收益率\n```\n\n接下来，我们将这两个列表合并到一个\
  \ Pandas DataFrame 中，以便于操作。这可以通过将两个列表包装在一个字典中，并将其传递给 `pd.DataFrame()` 函数来实现：\n\n\
  ```\nreturn_df = pd.DataFrame({\"Asset1\":asset_return1, \"Asset2\":asset_return2})\n\
  >>> return_df\n```\n\n打印 `return_df` 变量会生成以下内容，两个列表现在显示为 DataFrame 中的两列：\n\n```\n\
  Asset1 Asset2\n0      0.05   0.5\n1      0.30  -0.2\n2     -0.10   0.3\n3      0.35\
  \   0.5\n4      0.20  -0.3\n```\n\n为了便于可视化分析，我们使用 `.plot.bar()` 方法将这两个收益率序列绘制成条形图：\n\
  \n```\n>>> return_df.plot.bar()\n```\n\n运行此命令会生成图 4-2。该图表明，尽管平均收益率相同，但这两项资产的风险状况明显不同。具体来说，资产\
  \ 2（橙色条形图）比资产 1（蓝色条形图）更不稳定。\n\n![](img/605529_1_En_4_Fig2_HTML.jpg)\n\n一个分组正负条形图，显示了资产\
  \ 1 和资产 2 的收益率概况。资产 2 的概况比资产 1 的波动性更大。\n\n图 4-2\n将收益率可视化为条形图\n\n同样，当我们稍后介绍更精确的定义时，这种更高波动性的概念会更加具体。现在，我们可以简单地调用\
  \ `std()` 函数来计算这两列的标准差（波动性的另一个称呼）：\n\n```\n>>> return_df.std()\nAsset1    0.185068\n\
  Asset2    0.384708\ndtype: float64\n```\n\n请注意，`std()` 是按列应用的。类似地，我们可以调用 `mean()`\
  \ 函数来计算每列的平均值：\n\n```\n>>> return_df.mean()\nAsset1    0.16\nAsset2    0.16\ndtype:\
  \ float64\n```\n\n结果与我们之前使用 `np.mean()` 的计算结果一致。这个例子表明，仅仅关注资产的平均收益率是不够的。事实上，如果只报告资产的平均收益率而不考虑其波动性，可能会产生误导。\n\
  \n为了说明差异，假设我们对两项资产的初始投资均为 100 美元。要按顺序计算每个周期的滚动资产价值，我们首先将百分比收益率加 1，形成 1+R 格式。以资产\
  \ 1 为例。如下所示，运行以下代码片段后，我们可以使用 1.05 计算第一个周期后的资产价值为 100 美元 × 1.05，第二个周期后的资产价值为 100\
  \ 美元 × 1.05 × 1.30，以此类推：\n\n```\n>>> return_df + 1\nAsset1 Asset2\n0    1.05   1.5\n\
  1    1.30   0.8\n2    0.90   1.3\n3    1.35   1.5\n4    1.20   0.7\n```\n\n无需手动累乘这些百分比收益率，一个名为\
  \ `cumprod()` 的便利函数可以为我们完成这项工作。因此，我们可以将此函数应用于之前格式为 1+R 的 DataFrame，然后乘以 100 美元，从而获得每个周期的资产价值，如下面的代码片段所示：\n\
  \n```\ninit_investment = 100\ncum_value = (return_df + 1).cumprod()*100\n>>> cum_value\n\
  Asset1     Asset2\n0    105.0000   150.0\n1    136.5000   120.0\n2    122.8500 \
  \  156.0\n3    165.8475   234.0\n4    199.0170   163.8\n```\n\n我们可以类似地将资产价值的演变绘制成折线图：\n\
  \n```\n>>> cum_value.plot.line()\n```\n\n运行此命令会生成图 4-3。尽管资产 2 在大部分时期看起来收益更高，但实际上它在最后一个时期的最终收益率更低。因此，这张图的一个关键启示是：平均收益率相同的两项资产，其最终收益率可能完全不同。\n\
  \n![](img/605529_1_En_4_Fig3_HTML.jpg)\n\n一张显示资产 1 和资产 2 收益递增概况的多折线图。在大部分时期，资产 2\
  \ 的概况比资产 1 的收益更高。\n\n图 4-3\n将资产价值的演变过程可视化\n\n### 1+R 格式\n\n回顾一下，要计算从周期 *t*−1 到 *t*\
  \ 的收益率 *R*[*t*−1, *t*]，我们需要两个周期的资产价格 *S*[*t*−1] 和 *S*[*t*]。通过简单的变换，我们可以将收益率表示如下：\n\
  \n![$$ 1+{R}_{t-1,t}=\\frac{S_t}{S_{t-1}} $$](img/605529_1_En_4_Chapter_TeX_Equc.png)\n\
  \n这就是所谓的 1+R 格式，其中我们使用 1+*R*[*t*−1, *t*] 来表示当前周期资产价格 *S*[*t*] 相对于前一周期资产价格 *S*[*t*−1]\
  \ 的百分比。在获得 1+R 收益率 1+*R*[*t*−1, *t*] 后，我们可以轻松地计算出收益率 *R*[*t*−1, *t*]：\n\n![$$ {R}_{t-1,t}=\\\
  frac{S_t}{S_{t-1}}-1 $$](img/605529_1_En_4_Chapter_TeX_Equd.png)\n\n我们使用这种格式的一个原因在于计算的便利性。由于价格是从开始到结束按一列排列的，我们可以简单地将价格列向上移动一行以获得下一周期的价格，然后在另一列中计算比率\
  \ ![$$ \\frac{S_t}{S_{t-1}} $$](img/605529_1_En_4_Chapter_TeX_IEq1.png)（即 1+*R*[*t*−1,\
  \ *t*]）。然后我们可以减去 1，为每个周期求出 *R*[*t*−1, *t*]。\n\n图 4-4 说明了使用 1+R 格式收益率的好处。额外的步骤是通过将价格列向上移动一个单位来创建一个偏移列。计算\
  \ 1+R 格式的收益率既直接又快速，因为这是两列之间在所有行上同时进行的直接除法。这避免了使用循环。然后我们减去 1 来恢复相同的收益率。\n\n![](img/605529_1_En_4_Fig4_HTML.jpg)\n\
  \n一个包含 3 个等式的流程图，定义了收益率是资产价格的百分比变化。包含时间、价格、偏移价格和 1+R 收益率列的 3 个表格的流程图，展示了通过偏移价格列并进行除法可以轻松计算收益率。\n\
  \n图 4-4\n使用 1+R 格式说明收益率的计算过程，这种格式提供了一种更便捷的计算收益率的方法\n\n另外，请注意偏移列中的最后一行是 `NA`，这是因为在最后一个时间点没有更多的未来价格可用。这也导致\
  \ 1+R 收益率列为 `NA`。我们稍后将在代码中演示计算过程。现在，先消化并接受 1+R 格式的收益率作为描述资产收益率的一种等效方式，是很好的做法。\n\n\
  \n\n### 终端收益（Terminal Return）\n\n终端收益指的是在最后一个时间段相对于初始收益的回报，即`R[0, T]`。假设我们有从`t =\
  \ 0`到`t = T`的价格数据。要计算第`T`期的终端收益`R[0, T]`，我们可以取初始价格`S[0]`和终端价格`S[T]`，计算它们的比率，然后减去\
  \ 1，得到：\n\n![$$ {R}_{0,T}=\\frac{S_T}{S_0}-1 $$](img/605529_1_En_4_Chapter_TeX_Eque.png)\n\
  \n这种方法本质上忽略了中间收益，只考虑了初始和终端的资产价格。通过仅关注初始和终端资产价格，该指标提供了一种简化的投资增长或衰退视图，忽略了中间的波动。这在评估投资的长期表现或比较不同资产在较长时期内的增长时特别有用。然而，请注意，终端收益并不能提供有关投资波动性或风险的见解，因为它只考虑了初始和终端资产价格。\n\
  \n计算这个值还有另一种方法。我们不是只关注初始和终端价格，而是将整个价格演变过程视为一个序列，从一个价格点变化到另一个价格点。因此，第`T`期（或任意第`t`期）的终端收益是所有先前格式化为`1+R`的收益相乘，然后减去\
  \ 1 的结果。数学上，我们有：\n\n![$$ {R}_{0,T}=\\left(1+{R}_{0,1}\\right)\\left(1+{R}_{1,2}\\\
  right)\\dots \\left(1+{R}_{T-1,T}\\right)-1 $$](img/605529_1_En_4_Chapter_TeX_Equf.png)\n\
  \n代入格式化为`1+R`的收益定义，得到以下结果：\n\n![$$ {R}_{0,T}=\\frac{S_1}{S_0}\\frac{S_2}{S_1}\\\
  dots \\frac{S_T}{S_{T-1}}-1 $$](img/605529_1_En_4_Chapter_TeX_Equg.png)\n\n在约去同类项后，这实际上就是我们最初提出的公式。通过这样做，我们承认了每个时期收益对整体投资表现的复合效应。这种方法更全面，因为它考虑了投资期间的所有价格变化。\n\
  \n图 4-5 阐述了终端收益的计算过程。\n\n![](img/605529_1_En_4_Fig5_HTML.jpg)\n\n一个包含 3 个方程的流程图，展示了计算终端收益的\
  \ 3 个步骤：使用初始和终端资产价格、转换为`1+R`方法、以及在代入格式化为`1+R`的收益定义后还原之前的方程。\n\n**图 4-5** 通过不同方法计算终端收益\n\
  \n### 含股息的股票收益\n\n请注意，在计算资产收益时，还需要考虑股息。这意味着我们以当前价格持有股票，同时也享有它所带来的股息。先前对收益的定义称为价格收益，它仅考虑股票的价格变动。将股息与当前股票价格相加则被称为总收益，这更加符合实际情况。在分析股票表现时，几乎总是使用总收益。总收益与价格收益之差即为股息。\n\
  \n股票的总收益计算如下：\n\n![$$ {R}_{t-1,t}=\\frac{S_t+{D}_{t-1,t}}{S_{t-1}}-1=\\frac{S_t+{D}_{t-1,t}-{S}_{t-1}}{S_{t-1}}\
  \ $$](img/605529_1_En_4_Chapter_TeX_Equh.png)\n\n在此方程中，总收益用`R[t - 1, t]`表示，即从时间`t\
  \ - 1`到时间`t`的收益。`S[t]`和`S[t - 1]`分别代表时间`t`和时间`t - 1`的股票价格。`D[t - 1, t]`代表在`t - 1`到`t`期间内支付的股息。\n\
  \n总收益通过结合资本增值（即股票价格的上涨）和股息收入，提供了对投资表现更全面的评估。这对于注重收益的投资者尤其相关，他们专注于通过资本利得和股息相结合的方式最大化回报。\n\
  \n要计算股票的总收益，公式考虑了期初的股票价格、期末的股票价格以及期间内支付的任何股息。通过将期末股票价格与股息之和除以期初股票价格，然后减去 1，我们便得到以百分比表示的总收益。\n\
  \n## 多期收益\n\n终端收益也可以被视为多期收益，或是在一个合并时间段内的收益。由于演变过程是顺序的，我们需要按顺序对每个时期的收益进行复利计算。当我们拥有格式化为`1+R`的收益时，很容易通过将中间的`1+R`收益相乘/复利计算，然后减去\
  \ 1，来得到多期收益。\n\n多期收益是衡量投资在一系列连续时期内表现的一个指标。回顾一下，终端收益可以通过`R[0, T] = (1 + R[0, 1])(1\
  \ + R[1, 2])…(1 + R[T - 1, T]) - 1`来计算。当我们计算两期收益`R[t, t + 2]`时，公式变为：\n\n![$$ {R}_{t,t+2}=\\\
  left(1+{R}_{t,t+1}\\right)\\left(1+{R}_{t+1,t+2}\\right)-1 $$](img/605529_1_En_4_Chapter_TeX_Equi.png)\n\
  \n这种方法允许我们在考虑每个时期收益对下一个时期的复合效应的情况下，计算这两个时期的总收益。因此，使用两个时期的`1+R`格式化收益，复利收益很容易计算。图\
  \ 4-6 阐述了计算两期收益的复利过程。\n\n![](img/605529_1_En_4_Fig6_HTML.jpg)\n\n一个带有数学表达式的流程图，解释了使用两个时期的`1+R`格式化收益计算累积两期收益，并通过减去\
  \ 1 调整为百分比收益的过程。\n\n**图 4-6** 通过将两个单期收益以`1+R`格式复利计算，随后减去 1 进行调整，从而计算两期收益\n\n类似地，对于`n`期收益，公式可以泛化为：\n\
  \n![$$ {R}_{t,t+n}=\\left(1+{R}_{t,t+1}\\right)\\left(1+{R}_{t+1,t+2}\\right)\\\
  dots \\left(1+{R}_{t+n-1,t+n}\\right)-1 $$](img/605529_1_En_4_Chapter_TeX_Equj.png)\n\
  \n通过将所有`n`期的`1+R`格式化收益相乘，然后减去 1，我们可以确定在整个`n`期投资期限内的复利收益。\n\n让我们看一个简单的例子。假设我们对一个资产进行两期投资，第一期的收益是\
  \ 10%，第二期的收益是-2%。要计算复利收益，我们的第一步是将两个单期收益都转换成`1+R`格式，分别得到`1.1`和`0.98`。然后我们将这两个数字相乘并减去\
  \ 1：\n\n![$$ \\left(1+0.1\\right)\\left(1-0.02\\right)-1\\approx 0.078=7.8\\% $$](img/605529_1_En_4_Chapter_TeX_Equk.png)\n\
  \n请注意，我们不应该将两期终端收益计算为`10% - 2% = 8%`，这忽略了复利效应。通过按顺序计算，将每个时期的`1+R`收益相乘，才能确保我们得到正确的结果。这些乘法运算给出了`1+R`格式下的终端收益，我们再减去\
  \ 1 以得到收益本身。\n\n\n\n### 年化收益率\n\n当我们知道如何计算任何资产的最终收益率后，下一个问题是如何比较不同时间周期的资产。例如，有些收益率是日度的，而另一些则是月度、季度或年度的。答案是年化，即我们将收益率统一到年的时间尺度上进行公平比较。\n\
  \n年化收益率是比较不同投资期限资产表现的关键步骤。通过将收益率转换为年化基准，我们可以更轻松地在标准化时间尺度上评估和比较各类资产的表现。这一过程有助于创造公平的竞争环境，并促进明智决策。\n\
  \n年化收益率的整体流程如下：\n\n-   计算给定期间的`1+R`格式收益率。\n-   将`1+R`格式的收益率乘以每年的期数次方。\n-   减一，将结果从`1+R`格式转换回收益率本身。\n\
  \n让我们看一个例子。假设我们有一个每月产生 1%收益率的资产。要计算年化收益率，我们需要将时间范围扩大到一年。然而，简单地将 12 乘以 1%是错误的。为了进行顺序复利计算，我们需要为每个月构建`1+R`格式的收益率（`1\
  \ + 0.01`），将 12 个月全部相乘得到`(1 + 0.01)¹²`，最后减一得到`(1 + 0.01)¹² − 1 ≈ 12.68%`，这高于 12%。因此，计算年化收益率涉及推导`1+R`格式的收益率，将这些收益率乘以每年的期数，再减一以从`1+R`转换为`R`。\n\
  \n这个计算表明年化收益率为 12.68%，高于简单将月度 1%收益率乘以 12 的结果。这个差异源于复利效应，这是年化收益率时必须考虑的一个基本因素。\n\n\
  ### 从价格数据计算单期收益率\n\n我们通常从资产的价格数据入手，通过一个过程来计算收益率。本节将演示如何实现这一点。\n\n以下命令创建了一个包含三个价格点的列表，这些价格点将用于计算类似于前文两期收益率示例的不同收益率：\n\
  \n```\nprices = [0.1, 0.2, -0.05]\n```\n\n基于前两个价格点可以计算第一期收益率。我们首先要得到`1+R`格式的收益率，然后减一转换为普通收益率：\n\
  \n```\n>>> prices[1]/prices[0] – 1\n1.0\n```\n\n类似地，我们可以计算第二期的普通收益率如下：\n\n```\n\
  >>> prices[2]/prices[1] – 1\n-1.25\n```\n\n当列表变大时，手动计算这些单期收益率会很不方便。一个更便捷的方法是借用平移价格的思想。通过在列表中进行适当的索引操作可以实现平移。例如，以下代码片段分别选取了最后两个价格和最初两个价格：\n\
  \n```\n>>> print(prices[1:])\n[0.2, -0.05]\n>>> print(prices[:-1])\n[0.1, 0.2]\n\
  ```\n\n现在我们可以一次性对相应元素进行除法运算。但是，我们需要将两个列表都转换为 NumPy 数组，才能进行逐元素相乘：\n\n```\n>>> print(np.array(prices[1:])/np.array(prices[:-1])-1)\n\
  [ 1\\.   -1.25]\n```\n\n另一种方法是依赖 Pandas 生态系统，它在底层实现了许多 NumPy 计算。让我们通过将字典转换为 Pandas\
  \ DataFrame，使用与之前相同的技巧：\n\n```\nprices_df = pd.DataFrame({\"price\":prices})\n>>>\
  \ prices_df\nprice\n0    0.10\n1    0.20\n2   -0.05\n```\n\n对 Pandas DataFrame 进行子集选取的常用方法是通过\
  \ `iloc()` 方法，它基于行和列的位置索引返回元素。以下代码片段分别选取了最后两个和最初两个元素：\n\n```\n>>> prices_df.iloc[1:]\n\
  price\n1    0.20\n2   -0.05\n>>> prices_df.iloc[:-1]\nprice\n0    0.1\n1    0.2\n\
  ```\n\n请注意此处第一列中的索引。这些是在创建 Pandas DataFrame 时分配的默认行级索引，即使在子集选取操作后，这些索引也保持不变。在尝试合并两个\
  \ DataFrame 时，索引不一致很容易导致问题。在这种情况中，当我们对这两个 DataFrame 进行除法运算时，会得到一个不想要的结果：\n\n```\n\
  >>> prices_df.iloc[1:]/prices_df.iloc[:-1]\nprice\n0    NaN\n1    1.0\n2    NaN\n\
  ```\n\n这种看似异常的行为背后的原因是，两个 DataFrame 都试图寻找具有*相同*索引的对应元素。当找不到对应元素时，就会出现 `NaN` 值。\n\
  \n为了纠正这一点，我们可以只从这些 DataFrame 中提取 value 属性。我们只需要对一个 DataFrame 执行此操作，因为另一个 DataFrame\
  \ 会自动转换为 value 的格式。以下代码片段展示了正确方法，其结果与之前相同：\n\n```\n>>> prices_df.iloc[1:].values/prices_df.iloc[:-1]\
  \ – 1\nprice\n0    1.00\n1   -1.25\n>>> prices_df.iloc[1:]/prices_df.iloc[:-1].values\
  \ – 1\nprice\n1    1.00\n2   -1.25\n```\n\n让我们再稍微深入探讨一下平移操作。事实上，有一个同名的函数。例如，要将价格向下平移一个单位，我们可以向\
  \ Pandas DataFrame 对象的 `shift()` 函数传递参数 1，如下所示：\n\n```\n>>> prices_df.shift(1)\n\
  price\n0    NaN\n1    0.1\n2    0.2\n```\n\n注意，第一个元素被填充为 `NaN`，因为在第一个价格之前没有值。然后，我们可以将原始\
  \ DataFrame 除以平移后的 DataFrame，得到单期 `1+R` 格式的收益率序列，再减一得到普通收益率：\n\n```\n>>> prices_df/prices_df.shift(1)\
  \ - 1\nprice\n0    NaN\n1    1.00\n2   -1.25\n```\n\n最后，我们还有一个更实用的函数可以一次性完成这些计算。这个函数是\
  \ `pct_change()`，它计算 DataFrame 中连续两个值之间的百分比变化：\n\n```\nreturns_df = prices_df.pct_change()\n\
  >>> returns_df\nprice\n0    NaN\n1    1.00\n2   -1.25\n```\n\n同样，第一个条目是 `NaN`，因为没有前一个价格点。\n\
  \n接下来，我们继续计算累计的两期最终收益率。\n\n### 计算两期最终收益率\n\n最终收益率来自于对先前各单期收益率进行复利计算。在单期的情况下，最终收益率与单期收益率相同。在下面的例子中，我们使用一个包含单期收益率的简单\
  \ DataFrame（`returns_df`）来计算两期最终收益率。该过程包括以下步骤：\n\n-   将单期收益率加一转换为`1+R`格式。\n-   计算`1+R`格式收益率的乘积。\n\
  -   减一，将结果转换回最终收益率。\n\n具体来说，为了计算两期最终收益率，我们首先获得`1+R`格式的单期收益率：\n\n```\n>>> returns_df\
  \ + 1\nprice\n0    NaN\n1    2.00\n2   -0.25\n```\n\n然后，我们调用 NumPy 的 `prod()` 函数将数组中的所有元素相乘，并忽略\
  \ `NaN` 值。这样我们就得到了`1+R`格式的最终收益率，从中减一即可转换为普通最终收益率：\n\n```\n>>> np.prod(returns_df\
  \ + 1) – 1\nprice   -1.5\ndtype: float64\n```\n\n同样也有对应的 Pandas 方法，可以得到相同的结果：\n\n\
  ```\n>>> (returns_df+1).prod() – 1\nprice   -1.5\ndtype: float64\n```\n\n\n\n###\
  \ 计算年化收益率\n\n我们考虑三种不同回报频率的场景，包括日回报`0.0001`、月回报`0.01`和季度回报`0.05`。其计算过程与以年度为标记计算多期期末收益相同：\n\
  \n-   将每个时期的普通回报转换为`1+R`格式。\n-   将`1+R`格式的回报进行乘方，指数为一年中的期数。\n-   减去 1，将结果转换回普通回报。\n\
  \n对于日回报，我们假设一年共有 252 个交易日，这是处理每日价格数据时的典型假设。我们遵循同样的步骤：将每个时期的普通回报转换为`1+R`回报，将这些单期回报复利/相乘直到满一年，再减去\
  \ 1，转换回普通的期末收益：\n\n```\nr = 0.0001\n>>> (1+r)**252-10\n0.025518911987694626\n```\n\
  \n对于月回报，由于一年有 12 个月，我们将对其进行 12 次复利计算：\n\n```\nr = 0.01\n>>> (1+r)**12-1\n0.12682503013196977\n\
  ```\n\n最后，一年有四个季度，因此我们对其进行四次复利计算：\n\n```\nr = 0.05\n>>> (1+r)**4-1\n0.21550625000000023\n\
  ```\n\n现在，我们将在下一节转向风险分析。\n\n## 分析风险\n\n资产的风险与波动性相关，其重要性等于甚至高于回报。波动性是评估投资风险的关键指标，因为它代表了资产回报的不确定性或波动程度。更高的波动性意味着更高的风险，因为资产价格可能出现更显著的涨跌。为了量化与投资相关的风险，我们必须理解波动性的概念及其计算方法。\n\
  \n回顾图 4-3 中两项资产的回报。尽管平均回报相同，但资产 2 比资产 1 的波动性更大。资产 2 偏离均值的频率更高，幅度也更大。因此，波动性衡量的是偏离均值的程度。本节将正式定义波动性的概念。\n\
  \n在探讨波动性之前，让我们先引入方差和标准差的概念。\n\n### 介绍方差与标准差\n\n方差和标准差是两种广泛使用的统计量，用于描述数据围绕其均值的离散程度。假设总共有*N*个回报\
  \ ![$$ {\\left\\{{R}_i\\right\\}}_{i=1}^N $$](img/605529_1_En_4_Chapter_TeX_IEq2.png)。我们知道平均回报*R*[*P*]是通过对所有回报取平均值计算得出的：\n\
  \n![$$ {R}_P=\\frac{\\sum_{i=1}^N{R}_i}{N} $$](img/605529_1_En_4_Chapter_TeX_Equl.png)\n\
  \n这里，平均回报*R*[*P*]描述了资产或投资组合回报的中心趋势。也就是说，平均而言，回报为*R*[*P*]。它也常被称为回报的算术平均值。\n\n接下来是衡量偏离均值的程度。对于任意回报*R*[*i*]，它与*R*[*P*]的距离为*R*[*i*]\
  \ − *R*[*P*]。然而，这个距离可能是正值或负值。由于总共有*N*个回报，因此有*N*个距离，将这些距离直接相加似乎不是一个好主意，因为正负距离会相互抵消。方差衡量方法提出，我们不直接对这些距离求和，而是先将距离平方，然后再对这些平方距离取平均值。从数学上讲，回报的方差表示如下：\n\
  \n![$$ {\\sigma}_P²=\\frac{\\sum_{i=1}^N{\\left({R}_i-{R}_P\\right)}²}{N} $$](img/605529_1_En_4_Chapter_TeX_Equm.png)\n\
  \n这里，*R*[*i*] − *R*[*P*] 也意味着对原始回报*R*[*i*]进行去均值处理，即从原始回报*R*[*i*]中减去平均回报*R*[*P*]。这给出了偏离均值的程度。此外，通过平方这些偏差，正负项相互抵消的问题不复存在；所有去均值后的回报最终都变为正值或零。最后，我们将这些平方偏差的平均值作为该回报序列的方差。观察图\
  \ 4-3 也能直观地看出，资产 2 的方差大于资产 1。\n\n尽管方差总结了偏离平均回报的平均程度，但其单位是平均回报的平方距离，导致单位的解释比较困难。在实践中，我们通常对方差取平方根，将其恢复到与回报相同的量纲。得到的结果称为标准差，此时的偏差已被标准化并具有可比性。\n\
  \n![$$ {\\sigma}_P=\\sqrt{\\frac{\\sum_{i=1}^N{\\left({R}_i-{R}_P\\right)}²}{N}}\
  \ $$](img/605529_1_En_4_Chapter_TeX_Equn.png)\n\n这也是我们衡量波动性的指标。它衡量了价格围绕平均价格的波动幅度，是衡量回报离散程度的直接指标。波动性越高，偏离平均回报的程度就越大。图\
  \ 4-7 总结了常见统计量的定义，如均值、方差（包括总体方差和样本方差）和标准差（在金融语境下也称为波动性）。\n\n![一组 4 个数学方程，定义了 1.\
  \ 平均回报，算术平均值，2. 方差，总体，3. 方差，样本，4. 标准差，波动性。](img/605529_1_En_4_Fig7_HTML.jpg)\n\n\
  **图 4-7** - 总结了常见的统计量，包括均值、方差（总体和样本）和标准差（也称为波动性）\n\n总之，方差和标准差是理解投资风险的基本统计量。它们描述了回报相对于其均值的离散程度，有助于估算资产或投资组合的潜在波动性。这些统计量在评估投资组合配置中的风险承受能力方面也发挥着重要作用。\n\
  \n\n\n## 年化波动率\n\n与收益率类似，波动率也需要进行年化处理，以确保公平比较。如果不进行年化，就很难比较月度数据与日度数据的波动率。\n\n年化波动率的公式基于这样一个事实：波动率随时间段\
  \ `T` 的平方根增加而增加。年化收益率 `σ[P, T]` 可按如下公式计算：\n\n![$$ {\\sigma}_{P,T}=\\sqrt{T}{\\sigma}_P\
  \ $$](img/605529_1_En_4_Chapter_TeX_Equo.png)\n\n其中 `σ[P]` 是我们的单期波动率，可以是日度、月度或季度波动率。该表达式基于收益率呈正态分布且相互独立的假设。我们仅需直观理解此公式，而无需深入技术细节。\n\
  \n时间段 `T` 代表完整的时间周期。因此，日度收益率对应 `T = 252`，月度收益率对应 `T = 12`，季度收益率对应 `T = 4`。我们只需将该时间段的平方根与原始单期波动率相乘，即可得到年化波动率。\n\
  \n回顾一下，我们可以按照以下步骤计算年化波动率：\n\n- 计算给定数据（日、月或季度收益率）的单期波动率（`σ[P]`）。\n- 确定每年的周期数（`T`）。对于日度收益率，`T\
  \ = 252`（一年的交易日数）；对于月度收益率，`T = 12`；对于季度收益率，`T = 4`。\n- 将单期波动率（`σ[P]`）乘以每年周期数（`T`）的平方根，得到年化波动率，即：![$$\
  \ {\\sigma}_{P,T}=\\sqrt{T}{\\sigma}_P $$](img/605529_1_En_4_Chapter_TeX_IEq3.png)。\n\
  \n请记住，收益率呈正态分布且相互独立的假设是此方法成立的关键。使用这种方法进行年化波动率处理，使我们能够在同一标准下比较不同频率收益率的资产波动率，从而更轻松地评估和管理与不同投资相关的风险。\n\
  \n当单期波动率 `σ[P]` 固定时，我们的年化波动率 `σ[P, T]` 会随着 `T` 的增加而增长。由于平方根运算，`σ[P, T]` 的这种增长是 `T`\
  \ 的非线性函数。随着时间段 `T` 的增加，年化波动率也会增加，但由于平方根函数的作用，其增长速度会逐渐减慢。这意味着当日度收益率和月度收益率具有相同的单期波动率时，日度收益率将具有更高的年化波动率。这在直觉上是合理的，因为它捕捉到了在使用月度数据等较长的时间框架时被平滑掉的短期波动，并且我们预期日度数据相比月度数据会呈现出更多的变化。\n\
  \n我们也可以从另一个角度来看待这个公式。将等式两边平方，即可得到两边的年化方差，如下所示：\n\n![$$ {\\sigma}_{P,T}²=T{\\sigma}_P²\
  \ $$](img/605529_1_En_4_Chapter_TeX_Equp.png)\n\n现在，年化方差 ![$$ {\\sigma}_{P,T}² $$](img/605529_1_En_4_Chapter_TeX_IEq4.png)\
  \ 随着时间 `T` 线性增长。图 4-8 展示了这里的微妙之处。\n\n![](img/605529_1_En_4_Fig8_HTML.jpg)\n\n两张关于\
  \ σ下标 P, T 与 T 的折线图显示：年化波动率（σ下标 P, T = √T × σ下标 P）随 T 非线性上升；年化方差（σ²下标 P, T = T ×\
  \ σ²下标 P）随 T 线性上升。\n\n**图 4-8** 比较年化波动率与年化方差的差异。当给定固定的单期波动率或方差时，年化波动率随时间非线性增长，而年化方差随时间线性增长\n\
  \n让我们看一个简单的例子。假设某股票日度收益率序列的标准差为 `0.1%`。其年化波动率可计算如下：\n\n```\n0.001 * sqrt(252) ≈\
  \ 1.59%\n```\n\n\n\n### 通过夏普比率结合风险与收益\n\n现在我们有了衡量特定资产的两个指标：收益和风险；两者都可以进行年化处理。一种资产可能表现出低收益和低风险，而另一种资产可能带来更高收益，但同时也伴随着更高风险。我们希望将这两个指标结合起来，创建出一个单一的风险调整后收益指标。\n\
  \n一种方法是将平均收益 `R[P]` 除以波动率 `σ[P]`，得到 ![$$ \\frac{R_P}{\\sigma_P} $$](img/605529_1_En_4_Chapter_TeX_IEq5.png)。然而，平均收益\
  \ `R[P]` 并未提供关于整体市场状况的信息。我们无法确定较高的 ![$$ \\frac{R_P}{\\sigma_P} $$](img/605529_1_En_4_Chapter_TeX_IEq6.png)\
  \ 比率是源于投资组合本身还是市场的繁荣。因此，在分子中考虑整体市场基准会更好。这就是夏普比率的用武之地。\n\n夏普比率是一种衡量指标，通过将投资组合的超额收益除以其波动率来计算，以评估风险调整后的表现。这里的超额收益是指高于某个行业基准的收益，通常使用无风险收益率，例如国库券或债券的收益率。通过这个标准化指标，我们现在可以在考虑整体市场状况的同时，比较不同的资产或投资组合。然后我们会选择夏普比率更高的资产或投资组合。\n\
  \n从数学上讲，夏普比率的定义如下：\n\n![$$ Sharpe\\ ratio=\\frac{R_P-{R}_f}{\\sigma_p} $$](img/605529_1_En_4_Chapter_TeX_Equr.png)\n\
  \n其中 `R[P]` 是投资组合的平均收益，`R[f]` 是无风险利率，`σ[p]` 是投资组合的波动率。较高的夏普比率表明，与其他投资或整体市场相比，该投资在相同风险水平下能产生更高的收益。在比较不同投资时，夏普比率较高的投资被认为更具吸引力，因为它提供了更好的风险调整后收益。通过纳入无风险利率，夏普比率能更准确地评估一项投资相对于整体市场状况的表现。\n\
  \n让我们看一个例子。假设我们有两个投资组合，其收益和波动率分别为 (5%, 20%) 和 (10%, 50%)。显然，投资组合 2 比投资组合 1 盈利更高，但波动也更大。这种波动性会降低投资组合\
  \ 2 的吸引力。为了使用单一指标比较这两个投资组合，我们按如下方式计算 ![$$ \\frac{R_P}{\\sigma_P} $$](img/605529_1_En_4_Chapter_TeX_IEq7.png)：\n\
  \n![$$ \\frac{0.05}{0.2}=0.25&gt;\\frac{0.1}{0.5}=0.2 $$](img/605529_1_En_4_Chapter_TeX_Equs.png)\n\
  \n因此，使用风险调整后的指标衡量，投资组合 1 更具吸引力。现在假设市场的无风险利率为 3%。现在我们关注两个投资组合的超额收益，并使用夏普比率进行比较：\n\
  \n![$$ \\frac{0.05-0.03}{0.2}=0.1&lt;\\frac{0.1-0.03}{0.5}=0.14 $$](img/605529_1_En_4_Chapter_TeX_Equt.png)\n\
  \n现在投资组合 2 变得更具吸引力了。这是因为在考虑市场基准后，投资组合 2 确实提供了比投资组合 1 更好的收益。代码清单 4-2 演示了此例中的比较。\n\
  \n```\np1_ret = 0.05\np1_vol = 0.2\np2_ret = 0.1\np2_vol = 0.5\nrisk_free_rate =\
  \ 0.03\n>>> p1_ret / p1_vol\n0.25\n>>> p2_ret / p2_vol\n0.2\n>>> (p1_ret - risk_free_rate)\
  \ / p1_vol\n0.1\n>>> (p2_ret - risk_free_rate) / p2_vol\n0.14\n代码清单 4-2\n计算夏普比率\n\
  ```\n\n图 4-9 总结了风险调整后收益的不同衡量标准。\n\n![](img/605529_1_En_4_Fig9_HTML.jpg)\n\n一组 2\
  \ 个用于计算风险调整后收益的数学表达式，将收益风险比率定义为 `R 下标 P` 除以 `sigma 下标 P`，将夏普比率定义为 `R 下标 P` 减去 `R\
  \ 下标 f`，再除以 `sigma 下标 P`。\n\n图 4-9\n\n不同的风险调整后收益。从（年化）收益中减去无风险利率得到超额收益，该超额收益考虑了市场基准的表现。\n\
  \n接下来，我们将在下一节中使用一些真实数据来计算上述指标。\n\n### 使用股票价格数据\n\n在本节中，我们将下载苹果（AAPL）和谷歌（GOOG）截至今日的股票价格数据。在代码清单\
  \ 4-3 中，我们指定开始日期为“2023-01-01”，默认结束日期由系统当前日期自动确定，在撰写本文时为 2023 年 1 月 20 日。\n\n```\n\
  import yfinance as yf\nprices_df = yf.download([\"AAPL\",\"GOOG\"], start=\"2023-01-01\"\
  )\n>>> prices_df.head()\n代码清单 4-3\n使用 yfinance 下载股票数据\n```\n\n运行代码会生成图 4-10。请注意这里的多级列。这里有两级列，第一级表示价格类型，第二级表示股票代码。此外，DataFrame\
  \ 的索引采用 `datetime` 格式。\n\n![](img/605529_1_En_4_Fig10_HTML.jpg)\n\n一个包含 5 行日期时间格式数据的表格，列包括调整收盘价、收盘价、最高价、最低价、开盘价和交易量，每个列又分为苹果和谷歌两个子列。\n\
  \n图 4-10\n\n打印苹果和谷歌每日股票价格的前几行\n\n接下来，我们希望关注这两只股票的每日调整后收盘价，索引改为日期格式而非 `datetime`\
  \ 格式。代码清单 4-4 完成了这两项任务。\n\n```\n#### 将 datetime 索引转换为日期格式\nprices_df.index = prices_df.index.date\n\
  #### 保留调整后的收盘价\nprices_df = prices_df['Adj Close']\n>>> prices_df.head()\nAAPL \
  \      GOOG\n2023-01-03 125.070000 89.699997\n2023-01-04 126.360001 88.709999\n\
  2023-01-05 125.019997 86.769997\n2023-01-06 129.619995 88.160004\n2023-01-09 130.149994\
  \ 88.800003\n代码清单 4-4\n按日期索引并选择每日调整后收盘价\n```\n\n在这里，我们访问了索引的 `date` 属性，并将其赋值给 DataFrame\
  \ 的 `index` 属性。然后，我们将使用 `pct_change()` 实用函数计算 1+R 格式的收益率：\n\n```\nreturns_df = prices_df.pct_change()\n\
  >>> returns_df.head()\nAAPL      GOOG\n2023-01-03  NaN       NaN\n2023-01-04  0.010314\
  \ -0.011037\n2023-01-05 -0.010605 -0.021869\n2023-01-06  0.036794  0.016019\n2023-01-09\
  \  0.004089  0.007260\n```\n\n同样，第一行为空，因为其之前没有数据点。我们可以使用 `dropna()` 函数删除这一行：\n\n\
  ```\nreturns_df = returns_df.dropna()\n>>> returns_df.head()\nAAPL      GOOG\n2023-01-04\
  \  0.010314 -0.011037\n2023-01-05 -0.010605 -0.021869\n2023-01-06  0.036794  0.016019\n\
  2023-01-09  0.004089  0.007260\n2023-01-10  0.004456  0.004955\n```\n\n所有包含任何 `NA`\
  \ 值的行都会被移除。\n\n接下来，我们计算这两只股票收益率序列的均值、方差和标准差。\n\n\n\n#### 计算均值、方差和标准差\n\n通过调用`returns_df`的`mean()`方法，可以获得按列计算的收益算术平均值：\n\
  \n```\n>>> returns_df.mean()\nAAPL    0.007228\nGOOG    0.004295\ndtype: float64\n\
  ```\n\n看起来苹果在年初的表现优于谷歌。要计算收益的标准差或波动率，可以使用`std()`函数。然而，为了演示按列操作，我们在输入参数中显式指定`axis=0`，这意味着标准差应沿列方向计算：\n\
  \n```\n>>> returns_df.std(axis=0)\nAAPL    0.012995\nGOOG    0.016086\ndtype: float64\n\
  ```\n\n在最初几天，谷歌的股价波动高于苹果。现在让我们尝试设置`axis=1`：\n\n```\n>>> returns_df.std(axis=1)\n\
  2023-01-04    0.015097\n2023-01-05    0.007965\n2023-01-06    0.014690\n2023-01-09\
  \    0.002242\n2023-01-10    0.000352\n2023-01-11    0.009001\n2023-01-12    0.002259\n\
  2023-01-13    0.000308\n2023-01-17    0.011068\n2023-01-18    0.000882\n2023-01-19\
  \    0.016097\ndtype: float64\n```\n\n结果显示的是两只股票组合的每日标准差。\n\n现在我们通过前面描述的精确步骤，演示如何手动计算波动率。第一步是去除每日收益的均值，得到与（算术）均值的偏差：\n\
  \n```\ndeviations_df = returns_df - returns_df.mean()\n>>> deviations_df.head()\n\
  AAPL      GOOG\n2023-01-04  0.003086 -0.015332\n2023-01-05 -0.017833 -0.026164\n\
  2023-01-06  0.029566  0.011724\n2023-01-09 -0.003139  0.002964\n2023-01-10 -0.002772\
  \  0.000660\n```\n\n下一步是平方这些偏差，这样在求和时它们就不会相互抵消。平方相当于将元素提升到 2 次幂，使用双星号表示法：\n\n```\n\
  squared_deviations_df = deviations_df**2\n>>> squared_deviations_df.head()\nAAPL\
  \     GOOG\n2023-01-04 0.000010 2.350688e-04\n2023-01-05 0.000318 6.845668e-04\n\
  2023-01-06 0.000874 1.374582e-04\n2023-01-09 0.000010 8.787273e-06\n2023-01-10 0.000008\
  \ 4.352158e-07\n```\n\n第三步，使用`mean()`函数对这些每日平方偏差求平均值：\n\n```\nvariance = squared_deviations_df.mean()\n\
  >>> variance\nAAPL    0.000154\nGOOG    0.000235\ndtype: float64\n```\n\n最后一步是对方差取平方根，得到波动率：\n\
  \n```\nvolatility = np.sqrt(variance)\n>>> volatility\nAAPL    0.012390\nGOOG  \
  \  0.015337\ndtype: float64\n```\n\n注意，这个结果与使用`std()`函数得到的结果不同！造成差异的原因是`std()`函数计算的是样本标准差，其分母除以`N`−1，而我们的手动计算中分母除以`N`。\n\
  \n为了纠正这一点，让我们重新审视第三步，这次将平方偏差之和除以`N`−1。在代码清单 4-5 中，我们首先使用`shape()`函数的第一个维度（行维度）获取行数`N`，然后根据方差公式代入计算。\n\
  \n```\nnum_rows = squared_deviations_df.shape[0]\nvariance2 = squared_deviations_df.sum()\
  \ / (num_rows-1)\n>>> variance2\nAAPL    0.000169\nGOOG    0.000259\ndtype: float64\n\
  代码清单 4-5 计算样本方差\n```\n\n现在取平方根得到的结果与使用`std()`函数相同：\n\n```\nvolatility2 = np.sqrt(variance2)\n\
  >>> volatility2\nAAPL    0.012995\nGOOG    0.016086\ndtype: float64\n```\n\n现在我们得到了衡量每日收益围绕均值离散程度的单期波动率，下一节将计算年化波动率。\n\
  \n#### 计算年化波动率\n\n根据将单期波动率年化为年度波动率的公式，我们可以按如下方式计算年化波动率，其中一年的总时段长度`T`=252：\n\n```\n\
  annualized_vol = returns_df.std()*np.sqrt(252)\n>>> annualized_vol\nAAPL    0.206289\n\
  GOOG    0.255356\ndtype: float64\n```\n\n我们也可以通过将 252 提升到 0.5 次幂来计算 252 的平方根，结果相同：\n\
  \n```\nannualized_vol = returns_df.std()*(252**0.5)\n>>> annualized_vol\nAAPL  \
  \  0.206289\nGOOG    0.255356\ndtype: float64\n```\n\n下一节将介绍收益的年化计算。\n\n## 计算年化收益\n\
  \n这里需要注意的一点是，收益遵循序贯复利过程。这意味着一旦我们获得了单期平均收益，就需要按照相应的频率将其复利化以达到一年的长度。为了计算单期平均收益，我们取收益的几何平均数。在这种情况下，几何平均数是比算术平均数更好的选择，因为它考虑了序贯复利的影响。\n\
  \n具体来说，我们首先按如下方式计算收益的几何平均数。需要注意的是，在分析资产的累计收益时，几何平均数与序贯复利性质相一致：\n\n```\nreturns_per_day\
  \ = (returns_df+1).prod()**(1/returns_df.shape[0]) - 1\n>>> returns_per_day\nAAPL\
  \    0.007153\nGOOG    0.004178\ndtype: float64\n```\n\n让我们分解这里的操作序列。首先，我们为每一天在`(returns_df+1)`中构造\
  \ 1+R 收益，然后使用`prod()`函数执行序贯复利，以获得 1+R 格式的累计终期收益。在减 1 之前，我们将其提升到 1/`N`次幂，其中`N`是 DataFrame\
  \ 的行数。这给出了 1+R 格式的收益几何平均数。这里我们不使用算术平均数。\n\n现在进入年化部分。如代码清单 4-6 所示，我们假设一个固定的每日收益作为几何平均数，并将其向前滚动一年，对应\
  \ 252 个交易日。再次强调，在 1+R 收益和普通收益之间进行转换。\n\n```\nannualized_return = (returns_per_day+1)**252-1\n\
  >>> annualized_return\nAAPL    5.025830\nGOOG    1.859802\ndtype: float64\n代码清单\
  \ 4-6 年化每日收益\n```\n\n看起来苹果在最初几天的表现远好于谷歌。\n\n还有另一种计算年化收益的方法，速度更快：\n\n```\nannualized_return\
  \ = (returns_df+1).prod()**(252/returns_df.shape[0])-1\n>>> annualized_return\n\
  AAPL    5.025830\nGOOG    1.859802\ndtype: float64\n```\n\n这里的关键变化是，我们将终期收益提升到 252/`N`次幂。这是一种标准化做法，将每日尺度转换到年度尺度。\n\
  \n## 计算夏普比率\n\n最后，让我们计算两只股票的夏普比率。我们假设无风险利率为 3%，通过从年化收益中减去该利率来计算超额收益，然后除以年化波动率得到夏普比率。如代码清单\
  \ 4-7 所示：\n\n```\nriskfree_rate = 0.03\nexcess_return = annualized_return - riskfree_rate\n\
  sharpe_ratio = excess_return/annualized_vol\n>>> sharpe_ratio\nAAPL    24.217681\n\
  GOOG     7.165694\ndtype: float64\n代码清单 4-7 计算夏普比率\n```\n\n因此，作为风险调整后收益的夏普比率，苹果在最初几天远高于谷歌。\n\
  \n\n\n## 总结\n\n在本章中，我们探讨了任何金融资产的两个关键特征：**风险**与**收益**。收益是指资产带来的财务回报，而风险则代表这种收益的波动性或不确定性。作为投资者，我们的目标是在最小化风险的同时最大化收益。\n\
  \n我们介绍了表示和计算收益的不同方式，包括简单收益、期末收益、多期收益以及`1+R`格式的收益。理解这些收益形式之间的关联，对于在不同形式之间进行转换非常重要。\n\
  \n随后，我们重点讨论了风险-收益权衡，即低收益资产通常与低风险相关，而高收益资产则与高风险相关。为了更好地比较不同投资工具的风险与收益，我们引入了年化收益和年化波动率，以及一种名为夏普比率的风险调整后收益指标。我们还提供了示例，说明在比较投资产品时，同时考虑风险与收益的重要性。\n\
  \n## 练习题\n\n- 计算单期收益需要多少个输入值？\n- 如果资产价格从 5 美元变为 6 美元，收益是多少？\n- 某只热门股票的总收益通常高于还是低于其价格收益？\n\
  - 计算由 10%、–5%和 6%组成的三期收益。\n- 如果我们买入一项资产，第一天上涨 10%，第二天下跌 10%，我们的收益是正数、负数还是零？\n- 计算季度（三个月）收益为\
  \ 2%的资产的年化收益。\n- 下载苹果和特斯拉的年初至今股票数据，使用每日收盘价计算每日累计收益，并将收益绘制成折线图。\n- 年化波动率和方差都随时间线性增长，这个说法正确吗？\n\
  - 假设月度波动率为 5%，计算年化波动率。\n- 年化波动率总是大于月度波动率，这个说法正确还是错误？\n- 无风险利率是低风险投资的回报率，这个说法正确还是错误？\n\
  - 如果无风险利率上升而投资组合的波动率保持不变，夏普比率会上升还是下降？\n- 基于 2022 年上半年苹果股票每月中位日价格获取月度收益数据，并基于这些月度收益计算年化收益和波动率。\n\
  \n"
- "# 5. 趋势跟踪策略\n\n趋势跟踪是一种广泛使用的投资策略，适用于各类市场，包括股票、债券、大宗商品、货币，甚至加密货币。顾名思义，该策略基于以下假设：价格会随时间沿特定方向（即“趋势”）运动，从而为捕捉这些波动提供机会。趋势跟踪的核心在于分析历史价格数据以识别潜在趋势。该策略随后建议建立与这些趋势一致的头寸，并预期这些趋势将持续。例如，如果某项资产的价格持续上涨，趋势跟踪者通常会建立多头头寸，预期上涨趋势将继续。反之，如果价格持续下跌，趋势跟踪者可能会建立空头头寸，押注价格将继续下跌。\n\
  \n然而，与任何交易策略一样，趋势跟踪并非万无一失。由于意外的市场事件或市场情绪变化，趋势可能突然反转，从而导致潜在损失。因此，趋势跟踪策略通常会叠加风险管理技术，例如设置止损单，以在趋势反转时限制潜在损失。\n\
  \n趋势跟踪策略使用多种技术指标来识别和确认趋势，例如移动平均线、趋势线和动量指标。本章介绍了基于移动平均线的趋势跟踪策略的工作原理，并展示了其在 Python\
  \ 中的实现。\n\n由于我们主要使用对数收益，让我们先通过一个计算过程的示例来了解它。\n\n## 处理对数收益\n\n让我们进一步理解对数收益，因为后续评估趋势跟踪策略时，我们将用它来计算股票收益。我们从图\
  \ 5-1 中的 Excel 表格开始，其中提供了一组虚拟股票价格，并要求回答 Q1 到 Q9 的问题。以下详细说明这些问题和答案。\n\n![一张虚拟股票价格的\
  \ Excel 表格。它展示了 5 天虚拟股票价格从 Q1 到 Q9 的一系列答案。](img/605529_1_En_5_Fig1_HTML.jpg)\n\n\
  **图 5-1** 每日虚拟股票价格\n\n让我们逐一审视这九个问题。\n\n**Q1：** 为什么使用百分比收益？\n\n**答案：** 百分比收益提供了统一的比较尺度。例如，当另一只股票（股票\
  \ B）的价格数据在 1–10 范围内时，使用绝对值将其与 Excel 表格中的股票价格数据（股票 A）进行比较会很困难。5 美元的上涨对股票 A 的意义远大于股票\
  \ B。通过将其转换为相对的百分比形式，我们可以将两只股票放在同一尺度上衡量其表现。因此，使用百分比收益，我们可以准确地比较这两只股票的表现，尽管它们的价格水平不同。\n\
  \n百分比收益也可用于将某项投资的表现与基准或标准（如市场指数，如标普 500 或道琼斯工业平均指数）进行比较。这有助于投资者评估一项投资或投资组合相对于更广泛市场或某个市场板块的表现如何。\n\
  \n**Q2：** 以原始方式计算单期百分比收益（基于收益的定义）。\n\n**答案：** 单期百分比收益，也称为简单收益或持有期收益，反映了投资价值从一个时期到下一个时期的百分比变化。其计算公式为\n\
  \n```\nR[t, t+1] = (S[t+1] - S[t]) / S[t]\n```\n\n其中 `R[t, t+1]` 是从时间 `t` 到 `t+1`\
  \ 的单期百分比收益，而 `S[t]` 和 `S[t+1]` 分别是时期 `t` 和 `t+1` 结束时的资产价格。公式的分子 `S[t+1] - S[t]`\
  \ 计算资产价格从时间 `t` 到 `t+1` 的变化。分母 `S[t]` 是期初价格，作为衡量相对变化的基准。将价格变化除以起始价格，得到相对价格变化，以百分比表示，这就是简单收益。\n\
  \n将相同的公式应用于 `return1` 列中除第 1 天之外的所有单元格，得到图 5-2 中的结果。\n\n![一张虚拟股票价格的 Excel 表格。它展示了\
  \ 5 天虚拟股票价格在 Q2 列中的单期百分比收益。列标题为：天、价格和 return1。第 1 天和第 2 天的价格分别为 100 和 108，已被高亮显示。](img/605529_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 根据百分比收益定义计算简单收益\n\n**Q3：** 使用 `1+R` 方式计算相同的收益。\n\n**答案：** 使用 `1+R` 方式计算收益与原始方法略有不同，但本质上能得出相同的结果。这种方法强调资产价格从一个时期到下一个时期的增长因子，使得理解和解释更加容易。`1+R`\
  \ 方式将收益重写为\n\n```\nR[t, t+1] = S[t+1] / S[t] - 1\n```\n\n\n\n这需要两个步骤：首先，计算比率 ![$$\
  \ \\frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq1.png) 以获得所谓的 1+R 收益率。该比率反映了资产价格从期初到期末的增长因子。如果该比率大于\
  \ 1，则表示资产价格在此期间内上涨；如果小于 1，则表示资产价格下跌；如果等于 1，则表示资产价格未发生变化。\n\n接下来，我们需要从 1+R 收益率中减去\
  \ 1，将其转换为简单收益率。这一步将增长因子 ![$$ \\frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq2.png)\
  \ 转换为实际百分比收益率。减去 1 实质上是从计算中移除了初始投资，仅保留相对于初始投资而言的盈利或亏损金额，也就是收益率。请参见图 5-3 的示例，其中每日收益率与之前的方法相同。\n\
  \n![](img/605529_1_En_5_Fig3_HTML.jpg)\n\n*一个用于虚拟股票价格的 Excel 表格。它展示了使用 1+R 方法计算的、针对\
  \ 5 天虚拟股票价格的相同收益率。列标题为：天数、价格、收益率 1 和收益率 2。第 1 天和第 2 天的价格分别为 100 和 108，并已高亮显示。*\n\
  \n**图 5-3** 基于 1+R 方法计算简单收益率\n\n这种 1+R 方法经常被使用，因为它更直观。增长因子 ![$$ \\frac{S_{t+1}}{S_t}\
  \ $$](img/605529_1_En_5_Chapter_TeX_IEq3.png) 能轻松显示初始投资增长（或缩水）了多少，减去 1 则得出净增长的百分比，即简单收益率。当处理多个时间段时，这种方法尤其有用，因为增长因子可以简单地相乘来计算多个时期的累积增长因子。\n\
  \n**Q4：从第 1 天到第 5 天不考虑复利时的最终收益率是多少？**\n\n**答案：** 最终收益率是指一项投资在给定时间段内的总收益率。它是衡量一项投资从投资期开始到结束所经历的总收益或损失的指标，不考虑该时期内的任何复利效应。\n\
  \n要计算不考虑复利过程的最终收益率，我们可以使用公式：![$$ {R}_{1,5}=\\frac{S_5-{S}_1}{S_1}=\\frac{S_5}{S_1}-1\
  \ $$](img/605529_1_En_5_Chapter_TeX_IEq4.png)。其中，第二个公式首先计算第 5 天资产价格与第 1 天资产价格的比率（这反映了整体增长因子），然后减去\
  \ 1 将该增长因子转换为最终收益率。请参见图 5-4 的示例。\n\n![](img/605529_1_En_5_Fig4_HTML.jpg)\n\n*一个用于虚拟股票价格的\
  \ Excel 表格。它展示了不考虑复利的最终收益率，针对 5 天的虚拟股票价格。列标题为：天数、价格和收益率 1。第 1 天和第 5 天的价格分别为 100\
  \ 和 106，并已高亮显示。*\n\n**图 5-4** 计算不考虑复利的最终收益率\n\n**Q5：从第 1 天到第 5 天考虑复利时的最终收益率是多少？它是否等于\
  \ Q4 的结果？**\n\n**答案：** 复利是金融学中的一个重要概念。它反映了这样一个事实：不仅你的初始投资能赚取收益，前期产生的收益也能赚取收益。在正收益率的情况下，这会导致随时间的指数级增长。\n\
  \n我们将填充“return3”列，其中每个单元格是当前时期的 1+R 收益率与前一时期的累积 1+R 收益率的乘积，并偏移一位。对于第一个时期（从第 1 天到第\
  \ 2 天），“return3”的值就是该时期的“1+R”收益率。请参见图 5-5 的示例。\n\n![](img/605529_1_En_5_Fig5_HTML.jpg)\n\
  \n*一个用于虚拟股票价格的 Excel 表格。它展示了针对 5 天虚拟股票价格、考虑复利的最终收益率。列标题为：天数、价格、收益率 1、收益率 2 和收益率\
  \ 3。Q5 中第 4 天的收益率和 Q3 中第 5 天的收益率已高亮显示。*\n\n**图 5-5** 使用复利计算最终收益率\n\n结果表明，最终收益率为\
  \ 6%，这与之前计算的结果相同。\n\n**Q6：将 Q3 中的单期收益率相加。其结果是否等于 Q4 的结果？**\n\n**答案：** 结果显示它与 6%\
  \ 不同。通常来说，将单期收益率相加可能会导致对投资总回报的错误结论。单期收益率之和并不等于最终收益率（来自 Q4），因为这种方法忽略了复利效应。换句话说，通过简单地累加单期收益率，我们实际上是将每个时期的收益率视为独立的，并且是基于初始投资金额赚取的，而忽略了由于前期赚取的收益，投资在每个时期都会增长这一事实。这就是为什么我们看到累加后的单期收益率与通过考虑复利效应的正确方法计算出的最终收益率之间存在差异的原因。\n\
  \n复利原则承认收益会随着时间的推移而累积，这意味着在一个时期赚取的收益会被再投资，并可能在后续时期产生更多收益。因此，虽然单期收益率之和可能提供总收益的粗略估计，但它并不是一个正确的衡量标准，尤其是在时间跨度长或收益率高的情况下。相反，计算多个时期内总收益的正确方法是使用复利的概念，它同时考虑了初始投资和收益的再投资。因此，在计算最终收益率时，遵循顺序复利过程非常重要。请参见图\
  \ 5-6 的示例。\n\n![](img/605529_1_En_5_Fig6_HTML.jpg)\n\n*一个用于虚拟股票价格的 Excel 表格。它展示了\
  \ Q3 中单期收益率的总和。列标题为：天数、价格、收益率 1 和收益率 2。Q3 列中的数据已高亮显示。*\n\n**图 5-6** 将所有单期收益率相加\n\
  \n**Q7：计算每个时期的对数收益率。**\n\n**答案：** 对数收益率，或称连续复利收益率，是另一种计算收益的方法，可以简化金融中的各种计算。此方法使用自然对数（log）来表达收益率，该收益率源自价格的相对变化。\n\
  \n要计算每个时期的对数收益率，我们可以使用公式：\n\n![$$ \\log \\_\\mathrm{return}=\\ln \\frac{S_{t+1}}{S_t}\
  \ $$](img/605529_1_En_5_Chapter_TeX_Equc.png)\n\n这里，*S*[*t* + 1] 和 *S*[*t*] 分别代表未来时间\
  \ *t* + 1 和当前时间 *t* 的资产价格，而 ln 表示自然对数。请参见图 5-7 的示例。\n\n![](img/605529_1_En_5_Fig7_HTML.jpg)\n\
  \n*一个用于虚拟股票价格的 Excel 表格。它展示了每个时期对数收益率的总和。列标题为：天数、价格、收益率 1、收益率 2、收益率 3 和收益率 4。Q3\
  \ 列中第 2 天的数据已高亮显示。*\n\n**图 5-7** 计算每个时期的对数收益率\n\n例如，如果我们有一系列价格数据，我们可以使用此公式计算每个时期的对数收益率。请注意，对数收益率对于小收益是一个很好的近似值，并且它还具有一些理想的数学特性，例如时间可加性，这意味着多个时期的总对数收益率就是每个单独时期对数收益率的总和。\n\
  \n\n\n此外，请注意，我们需要确保分母（此处为`S[t]`）不为零，以避免出现除以零的错误。在程序实现计算时，可以通过在分母上添加一个小的常量来处理。\n\n\
  ### Q8：使用对数收益率计算期末收益率。它与 Q4 的结果相等吗？\n\n**答案：** 使用对数收益率计算期末收益率，可以通过将所有单期对数收益率相加，然后对结果进行指数运算以还原对数操作，最后减去\
  \ 1 转换回简单收益率格式。这是因为对数收益率具有时间可加性，意味着在给定时间段内的总对数收益率，就是该时段内各子时期对数收益率之和。\n\n换句话说，如果你计算了若干个时期（例如按日）的对数收益率，只需将这些日对数收益率全部相加，即可得到这些时期的总（期末）对数收益率。这一特性简化了跨多个时期期末收益率的计算，使其非常便捷，尤其是在处理大型数据集时。\n\
  \n结果显示，该值与 Q4 中得到的值相等。参见图 5-8 的图示。\n\n![](img/605529_1_En_5_Fig8_HTML.jpg)\n\n一个虚拟股票价格的\
  \ Excel 表格。它展示了使用对数收益率计算的期末收益率。列标题分别为日、价格、收益率 1、收益率 2、收益率 3 和收益率 4。Q7 列中所有五天的数据已突出显示。\n\
  \n**图 5-8** 使用对数收益率计算期末收益率\n\n### Q9：讨论使用对数收益率的优点。\n\n**答案：** 如前所述，使用对数收益率（或称“对数回报”）具有若干优点，详述如下：\n\
  \n*   **易于计算和分析：** 对数收益率简化了数学计算和统计分析。在处理多个时期的复利收益率时，这种简化尤为显著。由于对数将乘法和除法运算转化为加法和减法，多个时期的复利收益率（或“总收益率”）可以计算为这些时期对数收益率的简单和。\n\
  \n*   **对称性：** 对数收益率还表现出理想的对称性。如果价格先翻倍后减半，或先减半后翻倍，这两个时期的总对数收益率为零，反映了价格在这两个时期不变的事实。这种简单收益率不具备的对称性，常常能简化分析并提高结果的可解释性。假设股票价格`S[t]`变为`S[t+1]`，然后又变回`S[t]`，则产生的对数收益率将围绕零对称。例如，当股票价格从第\
  \ 1 天的 100 变为第 2 天的 108，再变回第 3 天的 100 时，产生的对数收益率在第 2 天为 7.7%，在第 3 天为–7.7%。一个简单的数学分析就能立刻理解这一点：\n\
  \n```\nlog(S[t+1]/S[t]) = -log((S[t+1]/S[t])^(-1)) = -log(S[t]/S[t+1])\n```\n\n\
  *   **正态性：** 此外，金融模型通常假设收益率呈正态分布。然而，据观察，简单收益率存在偏度和超额峰度，这意味着它们偏离了正态分布。另一方面，对数收益率往往具有更接近正态分布的属性，这使得它们更适合这些金融模型。\n\
  \n*   **连续复利收益率：** 对数收益率也代表连续复利收益率。这一特性使得对数收益率在特定的金融应用（尤其是涉及期权和其他衍生品）中成为首选，因为这些领域通常使用连续复利。\n\
  \n总而言之，使用对数收益率简化了数学计算和统计分析，实现了对称性和正态性，并代表了连续复利收益率。这些特性使得对数收益率在金融分析和建模中极具价值。\n\n\
  让我们看一个具体的例子来理解使用对数收益率的计算。\n\n#### 使用对数收益率分析股票价格\n\n我们首先下载谷歌 2023 年头几天的股票价格数据，如清单\
  \ 5-1 所示。\n\n```\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot\
  \ as plt\nimport yfinance as yf\nsymbol = 'GOOG'\ndf = yf.download(symbol, start=\"\
  2023-01-01\", end=\"2023-01-08\")\n>>> df\n                开盘价      最高价      最低价\
  \      收盘价    调整收盘价       成交量\n日期\n2023-01-03 89.830002 91.550003 89.019997 89.699997\
  \ 89.699997 20738500\n2023-01-04 91.010002 91.239998 87.800003 88.709999 88.709999\
  \ 27046500\n2023-01-05 88.070000 88.209999 86.559998 86.769997 86.769997 23136100\n\
  2023-01-06 87.360001 88.470001 85.570000 88.160004 88.160004 26612600\n清单 5-1\n\
  下载谷歌股票价格\n```\n\n我们可以使用`pct_change()`方法计算单期百分比收益率，如清单 5-2 所示。\n\n```\n## 单期百分比收益率\n\
  returns = df.Close.pct_change()\n>>> returns\n日期\n2023-01-03 00:00:00-05:00    \
  \     NaN\n2023-01-04 00:00:00-05:00   -0.011037\n2023-01-05 00:00:00-05:00   -0.021869\n\
  2023-01-06 00:00:00-05:00    0.016019\n名称: 收盘价, 数据类型: float64\n清单 5-2\n计算单期百分比收益率\n\
  ```\n\n这里，第一期的收益率是`NaN`，因为没有前期的股票价格可用。\n\n让我们使用原始方法，通过将第一个和最后一个收盘价作为输入（基于之前的定义）来计算期末收益率，如清单\
  \ 5-3 所示。\n\n```\n#### 期末收益率\nterminal_return = df.Close[-1]/df.Close[0] - 1\n>>>\
  \ terminal_return\n-0.01716826464354737\n清单 5-3\n使用原始定义方法计算期末收益率\n```\n\n我们也可以基于`.cumprod()`函数，通过复利计算`(1+R)`收益率来得到相同的值，如清单\
  \ 5-4 所示。\n\n```\n#### 累计收益率\ncum_returns = (1+returns).cumprod() - 1\n>>> cum_returns\n\
  日期\n2023-01-03 00:00:00-05:00         NaN\n2023-01-04 00:00:00-05:00   -0.011037\n\
  2023-01-05 00:00:00-05:00   -0.032664\n2023-01-06 00:00:00-05:00   -0.017168\n名称:\
  \ 收盘价, 数据类型: float64\n清单 5-4\n通过对 1+R 格式的收益率进行复利计算，得到相同的累计期末收益率\n```\n\n两个期末收益率的相等运算符计算结果为\
  \ `True`：\n\n```\n#### 检查期末收益率是否相等\n>>> cum_returns.values[-1] == terminal_return\n\
  True\n```\n\n现在我们使用对数收益率进行相同计算，首先获得清单 5-5 中的单期对数收益率。\n\n```\n#### 对数收益率（1+R 格式）\n\
  log_returns = np.log(1+returns)\n>>> log_returns\n日期\n2023-01-03 00:00:00-05:00\
  \         NaN\n2023-01-04 00:00:00-05:00   -0.011098\n2023-01-05 00:00:00-05:00\
  \   -0.022112\n2023-01-06 00:00:00-05:00    0.015892\n名称: 收盘价, 数据类型: float64\n清单\
  \ 5-5\n计算对数收益率\n```\n\n我们可以将之前所有时期的对数收益率相加，得到累计对数收益率，然后通过指数运算转换回原始尺度，最后减去 1，将`1+R`格式转换为简单收益率格式，如清单\
  \ 5-6 所示。\n\n```\n#### 使用对数收益率计算累计收益率\ncum_return2 = np.exp(log_returns.cumsum())\
  \ - 1\n>>> cum_return2\n日期\n2023-01-03 00:00:00-05:00         NaN\n2023-01-04 00:00:00-05:00\
  \   -0.011037\n2023-01-05 00:00:00-05:00   -0.032664\n2023-01-06 00:00:00-05:00\
  \   -0.017168\n名称: 收盘价, 数据类型: float64\n清单 5-6\n使用对数收益率计算累计收益率\n```\n\n再次，我们验证最后一个条目的值，确认它与之前的期末收益率相同：\n\
  \n```\n#### 检查期末收益率是否相等\n>>> cum_return2.values[-1] == terminal_return\nTrue\n```\n\
  \n下一节将介绍趋势跟踪策略。\n\n\n\n## 趋势交易简介\n\n趋势交易，亦称趋势跟踪，是一种试图利用金融市场中现有趋势动力的策略。其运作前提是，证券价格往往会在一定时间内沿着相对持续的方向运动，要么上涨（多头），要么下跌（空头）。这是一种主动型交易策略，寻求利用资产价格持续的方向性动力来获利。\n\
  \n趋势交易的基本原则是，市场的动力（即资产价格的加速率）往往会在某一方向上持续一段时间。这里涉及两个关键概念：趋势和动力。趋势代表资产价格运动的方向，而动力则指示这种运动在一定时期内的强度或速度。它指的是资产价格趋势在未来自我维持的能力。强劲的动力可以持续向上或向下运动，这可以通过一系列技术指标来确认。\n\
  \n趋势交易者利用技术分析工具来识别潜在的买入和卖出机会。他们仔细分析价格图表，并使用各种技术指标，如移动平均线、`MACD`（指数平滑异同移动平均线）和相对强弱指数（`RSI`）等，来识别并确认资产的趋势方向和动力。这些技术指标提供的信号能帮助交易者做出何时开仓和平仓的明智决策。\n\
  \n在上升趋势中，趋势交易者会建立多头头寸，即买入资产，预期其价格将继续上涨。反之，在下降趋势中，趋势交易者会建立空头头寸，即卖出（或做空）资产，预期其价格将继续下跌。趋势跟踪策略旨在利用这些显著的价格变动，并根据预期创出新高的上升趋势或创出新低的下降趋势，在上涨和下跌市场中均能获利。\n\
  \n让我们从用于产生交易信号的技术指标开始。\n\n## 理解技术指标\n\n技术指标是基于历史价格（最高价、最低价、开盘价、收盘价等）或成交量进行的数学计算，可用于确定交易的开仓和平仓点。它们是许多交易策略和系统不可或缺的组成部分，能提供对市场行为的关键洞察。可将其视为从原始资产数据中衍生出的附加特征，这是机器学习中特征工程的一种实践。这使得技术指标高度依赖于具体证券：对某一特定证券有效的指标，对另一证券可能并不适用。选择正确的特征至关重要。\n\
  \n请注意，这些技术指标会作为数据集中每个观测值的附加特征出现。这意味着我们之前处理的价量表会增加更多列，每一列代表特定资产在特定时间下的一个单独技术指标。\n\
  \n在查看原始价格数据时，叠加一组技术指标有助于交易者更清晰地分析市场。例如，技术指标有助于确认市场是处于趋势之中，还是处于价格区间内震荡的盘整状态。\n\n\
  技术指标是许多交易策略和系统不可或缺的组成部分，能提供对市场行为的关键洞察。如您所述，它们是基于历史价格和成交量数据进行数学计算得出的工具，旨在预测未来的价格趋势或形态。\n\
  \n一些最常用的技术指标包括：\n\n*   **移动平均线（MA）：** 移动平均线通过创建一个不断更新的平均价格来平滑价格数据。最常见的两种类型是简单移动平均线（`SMA`）和指数移动平均线（`EMA`）。它们有助于判断证券处于上升趋势还是下降趋势。稍后将详细展开。\n\
  \n*   **相对强弱指数（RSI）：** `RSI`衡量价格变动的速度和幅度，通常在 0 到 100 的范围内取值。高`RSI`值（通常高于 70）可能表示该资产处于超买状态，面临价格回调；而低`RSI`值（通常低于\
  \ 30）则可能表明资产处于超卖状态，有望反弹。\n\n*   **指数平滑异同移动平均线（MACD）：** 该指标是一个趋势跟踪的动力指标，显示了证券价格的两条移动平均线之间的关系。`MACD`的计算方法是用\
  \ 12 日`EMA`减去 26 日`EMA`。\n\n*   **布林带：** 这些带子在简单移动平均线上下两个标准差的位置绘制。它们有助于判断资产是否超买或超卖，并可能预示着趋势的结束。\n\
  \n*   **基于成交量的指标：** 这些指标包括诸如平衡交易量（`OBV`）等，它利用成交量流来预测股票价格的变化。\n\n这些指标中的每一个都提供了对潜在市场动向的独特视角。通常，交易者会结合使用这些指标来构建稳健的交易策略。\n\
  \n另外请注意，这些指标并不能绝对准确地预测未来价格。相反，它们帮助交易者基于统计概率来识别潜在的交易机会。每个指标在特定的市场条件下效果最佳，并且可能并非普遍适用于所有资产类别、市场和交易周期。\n\
  \n下一节将对移动平均线进行更详细的介绍。\n\n\n\n### 移动平均线介绍\n\n移动平均线，也称为滚动平均线，是指定数据字段（例如每日收盘价）在给定的一组*连续*时间段内的平均值或平均数。随着新数据的出现，通过剔除最旧的值并添加最新的值来计算数据的平均值。它随着数据滚动，因此得名“移动平均线”。它提供了一种平滑金融资产价格数据的方法，以更清晰地识别趋势。\n\
  \n在计算股票价格的移动平均线时，其原理类似于在时间轴上移动一个固定大小的窗口，每个窗口报告一个单一数字，作为该窗口内所有价格点的平均值。当窗口在初始阶段没有足够的价格点时，通常会报告一个\
  \ `NA` 值。\n\n当处理诸如每日股票价格之类的时间序列数据时，平均效应也可以被视为对时间序列的平滑处理，减少了数据中的短期波动和临时变化。\n\n移动平均线有不同类型，其中简单移动平均线和指数移动平均线是最受欢迎的。简单移动平均线的计算很直接；我们只需计算当前固定大小窗口中所有价格点的平均值，并假设该窗口中所有价格点的权重相等。\n\
  \n指数移动平均线，或指数加权移动平均线（EWMA），会降低较旧价格点的权重。它的计算比 SMA 更复杂，因为它涉及需要计算的一个平滑因子。但基本思想是相同的：它是在特定时期内收盘价的平均值。\n\
  \n选择使用简单移动平均线还是指数移动平均线取决于交易者的偏好和具体的交易策略。通常，EMA 对近期价格变化的反应比 SMA 更快，这使得它们更受短期交易者或那些交易波动性市场的交易者青睐。\n\
  \n移动平均线可用于识别支撑位和阻力位。支撑位通常是指股票或市场在特定时期内难以跌破的价格水平或区域。阻力位则与支撑位相反，它是股票或市场难以突破上方的价格水平或区域。价格常常在这些水平附近反弹，这使得它们对于识别潜在交易入场和离场点非常有用。\n\
  \n此外，当两条移动平均线（例如，50 日和 200 日）相互交叉时，可能预示着趋势的变化。当较短期的 MA 向上穿越较长期的 MA 时，会给出看涨信号；而当较短期的\
  \ MA 向下穿越较长期的 MA 时，则会给出看跌信号。这些交叉点成为潜在的交易信号。\n\n下一节将更多地关注简单移动平均线。\n\n### 深入探讨简单移动平均线\n\
  \n时间 `t` 的简单移动平均线 `SMA[t]` 定义如下：\n\n![$$ SM{\\mathrm{A}}_t=\\frac{S_{t-\\left(M-1\\\
  right)}+\\dots +{S}_{t-1}+{S}_t}{M} $$](img/605529_1_En_5_Chapter_TeX_Eque.png)\n\
  \n换句话说，要计算 `SMA[t]`，我们会取 `M` 个历史价格点（包括当前时期），然后计算这 `M` 个价格点的平均值。本质上，它是将过去 `M` 个周期（天、小时等）的证券价格相加，然后除以\
  \ `M`。这产生一个单一的输出点，即时间 `t` 的 SMA。随着新价格数据的出现，最旧的数据点被剔除，最新的数据点被纳入计算。这个“滚动”或“移动”计算会随着新价格数据的添加而继续进行。\n\
  \nSMA 常被用于趋势分析，因为它能平滑短期波动，提供更清晰的总体趋势图景。它是前 `M` 个价格点的未加权平均值。在这里，`M`（周期数）的选择至关重要，因为它会影响\
  \ SMA 的敏感性和可靠性。较小的 `M` 对价格变化的响应更快，但也可能产生更多的虚假信号。较大的 `M` 会提供更慢、更可靠的 SMA，但在指示趋势变化时可能反应较慢。\n\
  \n让我们看看如何计算 SMA。我们首先下载苹果公司 2022 年的股票价格数据，如清单 5-7 所示。\n\n```\nimport numpy as np\n\
