    ## Trading Strategy Performance As the Black-Box Function


    The trend-following strategy will govern the output of the black-box function.
    Previously, we have illustrated how to calculate the Sharpe ratio given a specific
    set of entry and exit parameters. Assuming the Sharpe ratio calculated over one
    backtesting period is sufficiently representative, we would like to modularize
    the whole process of mapping a set of input parameters to the output performance
    metric. In other words, we need to code a function (or a class) that spits out
    the Sharpe ratio for a given set of entry and exit thresholds.


    To start with, we define a class called `QTS_OPTIMIZER` that inherits the `nn.Module`
    class. This will serve as the main horsepower for generating observations given
    any query points. In the `__init__()` method, we require three compulsory arguments:
    the ticker pairs in `ticker_pair`, the starting date of the stock price in `start_date`,
    and the end date in `end_date`. We also set an optional argument `riskfree_rate`
    to control the risk-free interest rate used for Sharpe ratio calculation. This
    is shown in Listing [9-1](#605529_1_En_9_Chapter.xhtml#PC3).


    ```

    class QTS_OPTIMIZER(nn.Module):

    def __init__(self, ticker_pair, start_date, end_date, riskfree_rate=0.04):

    super(QTS_OPTIMIZER, self).__init__()

    self.ticker_pair = ticker_pair

    self.start_date = start_date

    self.end_date = end_date

    self.riskfree_rate = riskfree_rate

    self.stock = self.get_stock_data()

