- fmt: '# Figure 9-3


    Three possible functional forms. On the left is a convex function whose optimization
    is easy. In the middle is a nonconvex function with multiple local minima, and
    on the right is also a nonconvex function with a wide flat region full of saddle
    points. Optimization for the latter two cases takes a lot more work than for the
    first case.


    Let us look at one example of hyperparameter tuning when training machine learning
    models. A machine learning model is a function that involves a set of parameters
    to be optimized given the input data. These parameters are automatically tuned
    via a specific optimization procedure, typically governed by a set of corresponding
    meta parameters called hyperparameters, which are fixed before the model training
    starts. For example, when training deep neural networks using the gradient descent
    algorithm, a learning rate that determines the step size of each parameter update
    needs to be manually selected in advance. If the learning rate is too large, the
    model may diverge and eventually fails to learn. If the learning rate is too small,
    the model may converge very slowly as the weights are updated by only a small
    margin in this iteration. See Figure [9-4](#605529_1_En_9_Chapter.xhtml#Fig4)
    for a visual illustration of the two scenarios.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig4_HTML.jpg)


    2 line graphs of `f` versus `x` with a parabola. Left. Small learning rate that
    leads to slow convergence. Indicated by a few dots on the left arm at small intervals
    connected by downward arrows. Right. A large learning rate that leads to the divergence.
    Arrows zig-zag on either side at large intervals.


    # Figure 9-4


    Slow convergence due to a small learning rate on the left and divergence due to
    a large learning rate on the right.


    Choosing a reasonable learning rate as a preset hyperparameter thus plays a critical
    role in training a good machine learning model. Locating the best learning rate
    and other hyperparameters is an optimization problem that fits the purpose of
    Bayesian optimization (introduced later). In the case of hyperparameter tuning,
    evaluating each learning rate is a time-consuming exercise. The objective function
    would generally be the model’s final test set loss (in a minimization setting)
    upon model convergence. A model needs to be fully trained in order to do reasonably
    well on the training set, which typically involves hundreds of epochs of training
    to reach a stable convergence. Here, one epoch is a complete pass of the entire
    training dataset.


    The functional form of the test set loss or accuracy may also be highly nonconvex
    and multimodal for the hyperparameters. Upon convergence, it is not easy to know
    whether we are in a local optimum, a saddle point, or a global optimum. Besides,
    some hyperparameters may be discrete, such as the number of nodes and layers when
    training a deep neural network. We could not calculate its gradient in such a
    case since it requires continuous support in the domain.


    The Bayesian optimization approach is designed to tackle all these challenges.
    It has been shown to deliver good performance in locating the best hyperparameters
    under a limited budget (i.e., the number of evaluations allowed). It is also widely
    and successfully used in other fields, such as chemical engineering.


    ## Bayesian Optimization


    As the name suggests, Bayesian optimization is an area that studies optimization
    problems using the Bayesian approach. Optimization aims at locating the optimal
    objective value (i.e., a global maximum or minimum) of all possible values or
    the corresponding location of the optimum over the search domain, also called
    the environment. The search process starts at a specific initial location and
    follows a particular policy to iteratively guide the following sampling locations,
    collect new observations, and refresh the guiding search policy.


    At its core, Bayesian optimization uses a probabilistic model (such as Gaussian
    processes) to represent the unknown function and a utility function (also called
    the acquisition function) to decide where to sample next. It iteratively updates
    the probabilistic model with new sample points and uses this updated model to
    select the next sampling location.


    As shown in Figure [9-5](#605529_1_En_9_Chapter.xhtml#Fig5), the overall optimization
    process consists of repeated interactions between the policy (the optimizer) and
    the environment (the unknown objective function). The policy is a mapping function
    that takes in a new input parameter (plus historical ones) and outputs the next
    parameter value to try out in a principled way. Here, we are constantly learning
    and improving the policy as the search continues. A good policy guides our search
    toward the global optimum faster than a bad one. In arguing which parameter value
    to try out, a good policy would spend the limited sampling budget on promising
    candidate values.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig5_HTML.jpg)


    A cyclic process presents environment and policy connected through observation
    and sampling location. The environment contains unknown real objective function
    and the policy has the guiding principle that determines the sampling decision
    based on the collected observations.


    # Figure 9-5


    The overall Bayesian optimization process. The policy digests the historical observations
    and proposes a new sampling location. The environment governs how the (possibly
    noise-corrupted) observation at the newly proposed location is revealed to the
    policy. Our goal is to learn an efficient and effective policy that could navigate
    toward the global optimum as quickly as possible.


    On the other hand, the environment contains the unknown objective function to
    be learned by the policy within a specific boundary (maximum and minimum values
    of the parameter value). When probing the functional value as requested by the
    policy, the actual observation revealed by the environment to the policy is often
    corrupted by noise due to the choice of the backtesting period, making the learning
    even more challenging. Thus, Bayesian optimization, a specific approach for global
    optimization, would like to learn a policy that can help us efficiently and effectively
    navigate toward the global optimum of an unknown, noise-corrupted objective function
    as quickly as possible.


    When deciding which parameter value to try next, most search strategies face the
    exploration and exploitation trade-off. Exploration means searching within an
    unknown and faraway area, and exploitation refers to searching within the neighborhood
    visited earlier in the hope of locating a better functional evaluation. Bayesian
    optimization also faces the same dilemma. Ideally, we would like to explore more
    at the initial phase to increase our understanding of the environment (the black-box
    function) and gradually shift toward the exploitation mode that taps into the
    existing knowledge and digs into known promising regions.


    Bayesian optimization achieves such a trade-off via two components: a Gaussian
    process (GP) used to approximate the underlying black-box function and an acquisition
    function that encodes the exploration-exploitation trade-off into a scalar value
    as an indicator of the sampling utility across all candidates in the domain. Let
    us look at each component in detail in the following sections.'
