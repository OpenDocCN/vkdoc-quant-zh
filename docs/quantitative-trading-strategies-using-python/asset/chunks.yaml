    by column names and then perform the cointegration test using the two series to
    obtain the test score and p-value. We will then compare the p-value with a preset
    threshold and print out the result to assess if the test result is statistically
    significant.


    ```

    threshold = 0.1

    # run Engle-Granger test for cointegration on each pair of stocks

    for pair in stock_pairs:

    # subset df based on current pair of stocks

    df2 = df[list(pair)]

    # perform test for the current pair of stocks

    score, pvalue, _ = coint(df2.values[:,0], df2.values[:,1])

    # check if the current pair of stocks is cointegrated

    if pvalue < threshold:

    print(pair, ''are cointegrated'')

    else:

    print(pair, ''are not cointegrated'')

    Listing 8-8

    Performing a cointegration test for each unique pair of stocks

    ```


    Note that the threshold is set as 10% instead of 5% as before, since the test
    would show no cointegrated pair of stocks when setting the threshold as the latter.
    As it turns out, the `coint()` function is slightly different from our manual
    implementation of the test procedure earlier. For example, the order of the time
    series assumed by the `coint()` function may not be the same.


    Running the code generates the following result:


    ```

    (''AAPL'', ''GOOG'') are not cointegrated

    (''AAPL'', ''META'') are not cointegrated

    (''AAPL'', ''MSFT'') are not cointegrated

    (''AAPL'', ''NFLX'') are not cointegrated

    (''AAPL'', ''TSLA'') are not cointegrated

    (''GOOG'', ''META'') are not cointegrated

    (''GOOG'', ''MSFT'') are cointegrated

    (''GOOG'', ''NFLX'') are not cointegrated

    (''GOOG'', ''TSLA'') are not cointegrated

    (''META'', ''MSFT'') are not cointegrated

    (''META'', ''NFLX'') are not cointegrated

    (''META'', ''TSLA'') are not cointegrated

    (''MSFT'', ''NFLX'') are not cointegrated

    (''MSFT'', ''TSLA'') are not cointegrated

    (''NFLX'', ''TSLA'') are not cointegrated

    ```


    It turns out that only Google and Microsoft stock prices are cointegrated using
    the 10% threshold on the significance level. These two stocks will be the focus
    of our pairs trading strategy in the following, starting by identifying the stationary
    spread between the two stocks.


    ### Obtaining the Spread


    As introduced earlier, the spread is a time series derived from the historical
    data of the two stocks in the pairs trading strategy. There are many ways to calculate
    the spread, and we will go with the one employed in the cointegration test procedure.
    Specifically, we define the spread as the residuals from the linear regression
    model between the two stocks. If they pass the cointegration test, we have confidence
    (up to 90% confidence level) that these two stocks, when linearly combined, generate
    a stationary time series in the spread.


    Listing [8-9](#605529_1_En_8_Chapter.xhtml#PC17) generates the spread time series
    and visualizes it in a line plot. As before, we first extract the predictor `X`
    and target `Y`, apply the bias trick by adding a column of constant ones to `X`,
    run the linear regression model, and finally obtain the spread as the residual
    between the target and the prediction.


    ```

    # calculate the spread for GOOG and MSFT

    Y = df["GOOG"]

    X = df["MSFT"]

    # estimate linear regression coefficients

    X_with_constant = sm.add_constant(X)

    model = OLS(Y, X_with_constant).fit()

    # obtain the spread as the residuals

    spread = Y - model.predict()

    spread.plot(figsize=(12,6))

    Listing 8-9

    Calculating the spread

    ```


    Running the code generates Figure [8-6](#605529_1_En_8_Chapter.xhtml#Fig6). The
    spread now appears as white noise, that is, following a normally distributed Gaussian
    distribution. Since different stocks have different scales of spread, it would
    be recommended to standardize them into the same scalar for ease of comparison
    and strategy formulation. The next section covers the conversion process that
    turns the spread into z-scores.


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig6_HTML.jpg)


    A line graph of spread versus date. It has a fluctuating curve with sharp and
    high peaks and dips. The curve ascends with fluctuations, descends, and again
    ascends and descends.


    Figure 8-6


    Visualizing the spread as the residuals of the linear regression model'
  trans: "\n# 实现配对交易策略\n\n作为一种市场中性交易策略，配对交易利用历史数据，通过特定的统计检验程序，识别出两只具有协整关系的股票。策略同时对这两只股票建立多头和空头头寸。因此，无论市场对这两只股票是上涨还是下跌，只要它们的相对价差保持不变，配对交易策略就不会受到影响。实际上，该策略监控的是两只股票之间的价差（该价差应随时间保持相对稳定），并在出现短期价格波动时，根据预设的阈值进行交易操作。\n\
    \n我们首先下载股票价格数据。本次将聚焦于几家主要科技巨头的股票代码：谷歌、微软、苹果、特斯拉、Meta 和奈飞。以下代码片段下载了 2022 全年的历史股价，并将调整后的收盘价提取到\
    \ `df` 变量中：\n\n```\n# 从 yfinance 下载数据\nstocks = ['GOOG','MSFT','AAPL','TSLA','META','NFLX']\n\
    df = yf.download(stocks, start=start_date, end=end_date)['Adj Close']\n```\n\n\
    接下来，我们分析每一个独特的股票对，并进行协整检验，以寻找那些具有长期均衡关系的股票对。\n\n## 识别协整的股票对\n\n我们的搜索空间中共有六只股票，从而产生总共\
    \ ![$$ {C}_6²=15 $$](img/605529_1_En_8_Chapter_TeX_IEq2.png) 个股票对。可以通过 `itertools`\
    \ 包中的 `combinations()` 函数生成所有独特股票对的列表，如代码清单 8-7 所示。\n\n```\nfrom itertools import\
    \ combinations\n# 获取所有股票对\nstock_pairs = list(combinations(df.columns, 2))\n>>>\
    \ stock_pairs\n[('AAPL', 'GOOG'),\n('AAPL', 'META'),\n('AAPL', 'MSFT'),\n('AAPL',\
    \ 'NFLX'),\n('AAPL', 'TSLA'),\n('GOOG', 'META'),\n('GOOG', 'MSFT'),\n('GOOG',\
    \ 'NFLX'),\n('GOOG', 'TSLA'),\n('META', 'MSFT'),\n('META', 'NFLX'),\n('META',\
    \ 'TSLA'),\n('MSFT', 'NFLX'),\n('MSFT', 'TSLA'),\n('NFLX', 'TSLA')]\n代码清单 8-7\n\
    生成所有独特的股票对\n```\n\n这 15 个独特的股票对以元组形式存储在一个列表中。每个元组都将在下一节中进行协整检验。\n\n## 测试成对协整\n\
    \n在代码清单 8-8 中，我们遍历每个股票对，并使用 `coint()` 函数执行恩格尔-格兰杰检验。对于每个独特的股票对，我们首先通过按列名子集化来提取对应的\
    \ DataFrame，然后使用这两个时间序列进行协整检验，以获得检验分数和 p 值。接着将 p 值与预设阈值进行比较，并打印结果，以评估检验结果是否具有统计显著性。\n\
    \n```\nthreshold = 0.1\n# 对每个股票对运行恩格尔-格兰杰协整检验\nfor pair in stock_pairs:\n    #\
    \ 根据当前股票对子集化 df\n    df2 = df[list(pair)]\n    # 对当前股票对执行检验\n    score, pvalue,\
    \ _ = coint(df2.values[:,0], df2.values[:,1])\n    # 检查当前股票对是否具有协整关系\n    if pvalue\
    \ < threshold:\n        print(pair, 'are cointegrated')\n    else:\n        print(pair,\
    \ 'are not cointegrated')\n代码清单 8-8\n对每个独特股票对执行协整检验\n```\n\n请注意，这里阈值设置为 10% 而不是之前的\
    \ 5%，因为如果设置为 5%，检验将显示没有协整的股票对。事实证明，`coint()` 函数与我们之前手动实现的检验程序略有不同。例如，`coint()`\
    \ 函数假定的时间序列顺序可能不一致。\n\n运行代码将产生以下结果：\n\n```\n('AAPL', 'GOOG') are not cointegrated\n\
    ('AAPL', 'META') are not cointegrated\n('AAPL', 'MSFT') are not cointegrated\n\
    ('AAPL', 'NFLX') are not cointegrated\n('AAPL', 'TSLA') are not cointegrated\n\
    ('GOOG', 'META') are not cointegrated\n('GOOG', 'MSFT') are cointegrated\n('GOOG',\
    \ 'NFLX') are not cointegrated\n('GOOG', 'TSLA') are not cointegrated\n('META',\
    \ 'MSFT') are not cointegrated\n('META', 'NFLX') are not cointegrated\n('META',\
    \ 'TSLA') are not cointegrated\n('MSFT', 'NFLX') are not cointegrated\n('MSFT',\
    \ 'TSLA') are not cointegrated\n('NFLX', 'TSLA') are not cointegrated\n```\n\n\
    结果显示，在 10% 的显著性水平阈值下，只有谷歌和微软的股票价格具有协整关系。这两只股票将成为我们接下来配对交易策略的重点，首先需要识别出这两只股票之间的平稳价差。\n\
    \n## 获取价差\n\n如前所述，价差是一个时间序列，源自配对交易策略中两只股票的历史数据。计算价差的方法有很多，我们将采用协整检验程序中使用的那个方法。具体来说，我们将价差定义为两只股票之间线性回归模型的残差。如果它们通过了协整检验，我们就有信心（高达\
    \ 90% 的置信水平）认为，这两只股票通过线性组合，能够产生一个平稳的价差时间序列。\n\n代码清单 8-9 生成了价差时间序列，并用折线图进行了可视化。和之前一样，我们首先提取预测变量\
    \ `X` 和目标变量 `Y`，通过向 `X` 添加一列常数项来应用偏置技巧，运行线性回归模型，最后将目标值与预测值之间的残差作为价差。\n\n```\n\
    # 计算 GOOG 和 MSFT 的价差\nY = df[\"GOOG\"]\nX = df[\"MSFT\"]\n# 估计线性回归系数\nX_with_constant\
    \ = sm.add_constant(X)\nmodel = OLS(Y, X_with_constant).fit()\n# 将残差作为价差\nspread\
    \ = Y - model.predict()\nspread.plot(figsize=(12,6))\n代码清单 8-9\n计算价差\n```\n\n\
    运行代码将生成图 8-6。此时的价差看起来像是白噪声，即遵循正态分布的高斯分布。由于不同股票的价差尺度不同，建议将它们标准化到同一个标量上，以便于比较和制定策略。下一节将介绍将价差转换为\
    \ z 分数的过程。\n\n![](img/605529_1_En_8_Fig6_HTML.jpg)\n\n一张价差相对于日期的折线图。曲线呈现波动，带有尖锐的高峰和低谷。曲线在波动中上升，然后下降，并再次上升和下降。\n\
    \n图 8-6\n将价差可视化为线性回归模型的残差\n"
- fmt: '### Converting to Z-Scores


    A z-score is a measure of how many standard deviations the daily spread is from
    its mean. It is a standardized score that we can use to compare across different
    distributions. Denote `x` as the original observation. The z-score is calculated
    as follows:


    ![$$ z=\frac{x-\mu }{\sigma } $$](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Eque.png)


    where `μ` and `σ` denote the mean and standard deviation of the time series, respectively.


    Therefore, the magnitude of the z-score indicates how far away the current observation
    deviates from the mean in terms of the unit of standard deviations, and the sign
    of the z-score suggests whether the deviation is above (a positive z-score) or
    below (a negative z-score) the mean.


    For example, assume a distribution with a mean of 10 and a standard deviation
    of 2. If an observation is valued at 8, the z-score for this observation would
    be `(10-8)/2 = 1`. In other words, this observation is one standard deviation
    away from the mean of the distribution.


    The z-score is often used to assess the statistical significance of observation
    in hypothesis testing. A z-score greater than or equal to 1.96 (or smaller than
    or equal to –1.96) corresponds to a p-value of 0.05 or less, which is a common
    threshold for assessing the statistical significance.


    In Listing 8-10, we visualize the probability density function (PDF) of a standard
    normal distribution with a mean of 0 and a standard deviation of 1. We first generate
    a list of equally spaced input values as the z-scores using the `np.linspace()`
    function and obtain the corresponding probabilities in the PDF of standard normal
    distribution using the `norm.pdf()` function with a location parameter of 0 (corresponding
    to the mean) and scale of 1 (corresponding to the standard deviation). We also
    shade the areas before –1.96 and after 1.96, where a z-score of 1.96 corresponds
    to a 95% significance level in a statistical test. In other words, z-scores greater
    than or equal to 1.96 account for 5% of the total probability, and z-scores lower
    than or equal to –1.96 account for 5% as well.


    ```

    # illustrate z score by generating a standard normal distribution with mu 0 and
    sd 1

    from scipy.stats import norm

    # input: unbounded scalar, assumed to be in the range of [-5,-5] in this case

    x = np.linspace(-5, 5, 100)

    # output: probability between 0 and 1

    y = norm.pdf(x, loc=0, scale=1)

    # set up the plot

    fig, ax = plt.subplots()

    # plot the pdf of normal distribution

    ax.plot(x, y)

    # shade the area corresponding to a z-score of >=1.96 and <=-1.96

    z_critical = 1.96

    x_shade = np.linspace(z_critical, 5, 100)

    y_shade = norm.pdf(x_shade, loc=0, scale=1)

    ax.fill_between(x_shade, y_shade, color=''red'', alpha=0.3)

    z_critical2 = -1.96

    x_shade2 = np.linspace(-5, z_critical2, 100)

    y_shade2 = norm.pdf(x_shade2, loc=0, scale=1)

    ax.fill_between(x_shade2, y_shade2, color=''red'', alpha=0.3)

    # add labels and a title

    ax.set_xlabel(''Z-score'')

    ax.set_ylabel(''Probability density'')

    # add a vertical line to indicate the z-score of 1.96 and -1.96

    ax.axvline(x=z_critical, linestyle=''--'', color=''red'')

    ax.axvline(x=z_critical2, linestyle=''--'', color=''red'')

    # display the plot

    plt.show()

    ```


    Running the code generates Figure 8-7.


    ![A line graph of the probability density versus Z-score. It has a symmetrical
    bell-shaped curve with a peak at 0 z-score. 2 vertical lines are at negative 2
    and 2 z-scores. The areas between the vertical lines and the tails of the curve
    are shaded.](images/605529_1_En_8_Chapter/605529_1_En_8_Fig7_HTML.jpg)


    In the context of hypothesis testing, the shaded area represents the probability
    of observing a z-score greater than 1.96 under the null hypothesis. Performing
    the statistical test would give us a z-score. If the z-score is above 1.96 or
    below –1.96 in a one-sided test, we would reject the null hypothesis in favor
    of the alternative hypothesis at the 0.05 significance level, since the probability
    of observing the phenomenon under the null hypothesis would simply be too small.


    In summary, we use the z-score as a standardized score to measure how many standard
    deviations an observation is from the mean of a distribution. It is used in hypothesis
    testing to determine the statistical significance of an observation, that is,
    the probability of an event happening under the null hypothesis. The significance
    level is often set at 0.05. We can use the z-score to calculate the probability
    of observing a value as extreme as the observation under the null hypothesis.
    Finally, we make a decision on whether to reject or fail to reject the null hypothesis.


    Now let us revisit the running example. Since stock prices are often volatile,
    we switch to the moving average approach to derive the running mean and standard
    deviation. That is, each daily spread would have a corresponding running mean
    and standard deviation based on the collection of spreads in the rolling window.
    In Listing 8-11, we derive the running mean and standard deviation using a window
    size of ten and apply the transformation to derive the resulting z-scores as the
    standardized spread.


    ```

    # convert to z score

    # z-score is a measure of how many standard deviations the spread is from its
    mean

    # derive mean and sd using a moving window

    window_size = 10

    spread_mean = spread.rolling(window=window_size).mean()

    spread_std = spread.rolling(window=window_size).std()

    zscore = (spread - spread_mean) / spread_std

    zscore.plot(figsize=(12,6))

    ```


    Running the code generates Figure 8-8, where the standardized spreads now look
    more normally distributed as white noise.


    ![A line graph of z-scores versus date. It has a horizontally fluctuating curve
    with sharp and high peaks and dips.](images/605529_1_En_8_Chapter/605529_1_En_8_Fig8_HTML.jpg)


    Since we used a window size of ten, the first nine observations will appear as
    NA in the moving average series. Let us get rid of the initial NA values by first
    identifying the first valid index using the `first_valid_index()` function and
    then subsetting the z-score series, as shown in the following code:


    ```

    # remove initial days with NA

    first_valid_idx = zscore.first_valid_index()

    zscore = zscore[first_valid_idx:]

    >>> zscore

    Date

    2022-01-14    1.123748

    2022-01-18    1.245480

    2022-01-19    0.742031

    2022-01-20    0.211878

    2022-01-21    0.064889

    ...

    2022-12-23    1.618937

    2022-12-27    0.977235

    2022-12-28    0.807607

    2022-12-29   -0.230086

    2022-12-30   -0.137035

    Name: GOOG, Length: 242, dtype: float64

    ```


    The next section formulates the trading strategy using the z-scores.'
