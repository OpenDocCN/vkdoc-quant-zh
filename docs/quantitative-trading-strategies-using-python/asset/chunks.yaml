    \ 1-11。每个柱代表一天的汇总数据（开盘价、最高价、最低价和收盘价），绿色表示价格上涨，红色表示交易日结束时价格下跌。\n\n![](img/605529_1_En_1_Fig11_HTML.jpg)\n\
    \n一张显示每日价格点与月份关系的蜡烛图。它呈现出波动下降的看涨和看跌蜡烛线趋势。下方是一个显示相同蜡烛线趋势的滑动窗口，可用于放大查看特定范围。\n\n\
    **图 1-11**  \n将微软每日价格点可视化为蜡烛图\n\n注意底部的滑动窗口。我们可以用它放大特定范围，如图 1-12 所示。当我们放大时，x 轴上的日期会自动调整。另外，这些柱状图以五个为一组出现。这并非偶然——一周有五个交易日。\n\
    \n![](img/605529_1_En_1_Fig12_HTML.jpg)\n\n一张放大的蜡烛图视图，显示每日价格点与月份的关系。它呈现出波动下降的看涨和看跌蜡烛线趋势。下方是显示相同蜡烛线趋势的滑动窗口以及选定的放大范围。\n\
    \n**图 1-12**  \n放大特定范围\n\n## 本章小结\n\n在本章中，我们介绍了量化交易的基础知识，涵盖了机构算法交易、主要资产类别、期权等衍生品、市场结构、买方投资者、做市商、倒卖以及投资组合再平衡等主题。然后，我们深入探讨了股票数据的探索性数据分析，首先使用蜡烛图汇总周期性数据点。我们还回顾了实际操作层面，涵盖了通过交互式图表进行数据检索、分析和可视化。这些将作为我们在后续章节开发不同交易策略时的构建模块。\n\
    \n## 练习\n\n*   列出几种金融工具，并描述其风险和收益特征。\n\n*   模型在训练期间能否接触到测试集数据？\n\n*   如果一个模型在训练集上的表现优于另一个模型，就认为它更好，这种说法正确吗？\n\
    \n*   对于每日股票价格数据，我们可以将其汇总为周数据吗？时数据呢？\n\n*   欧式看涨期权和看跌期权发行方的收益函数是什么？它与买方的收益函数有何关联？\n\
    \n*   假设你购买了一份期货合约，要求你在一月后以 10,000 美元的价格出售某种特定商品。当商品价格上涨到 12,000 美元时，你的收益是多少？当价格跌至\
    \ 7,000 美元时呢？\n\n*   在这两种情况下，买方的收益又是多少？\n\n*   如果换成具有相同行权价和交割日的期权合约，结果会发生什么变化？\n\
    \n*   绘制一根红色蜡烛线的样本股票价格曲线。\n\n*   下载苹果公司的股票价格数据，分别用折线图和蜡烛图绘制出来，并分析其趋势。\n\n*   计算苹果公司今年迄今（年初至今）的平均股票价格。\n\
    \n# 2. 电子市场\n\n在本章中，我们将深入探讨电子市场的世界，它彻底改变了金融工具的交易方式。随着技术的快速进步和互联网的广泛普及，电子市场已在很大程度上取代了传统的、基于交易大厅的交易场所，为全球市场参与者带来了速度、效率和可及性的新时代。\n\
    \n电子市场通过计算机系统和网络促进股票、债券、货币和商品（参见第 1 章）等金融工具的买卖。它们在实现金融市场准入民主化方面发挥了关键作用，使更广泛的参与者（包括散户投资者、机构投资者和高频交易者）能够轻松、透明地进行交易活动。电子市场的核心是交易机制，它规定了买卖订单如何匹配、执行和结算。\n\
    \n此外，电子市场提供了多种订单类型，以满足交易者的不同需求和目标。这些订单类型可用于实现特定目标，例如最小化市场影响、确保理想的执行水平或管理风险。在本章中，我们将研究最常见的订单类型，包括市价单、限价单、止损单及其各种变体。\n\
    \n随着本章内容的深入，读者将全面了解电子市场的内部运作方式、驱动它们的交易机制，以及市场参与者可获得的各种订单类型。\n\n## 介绍电子市场\n\n电子市场的运行基础是一个离散的价格网格，其中价格根据价格大小线性排列。每个市场都有一个最小报价单位。一个`tick`是市场中某一交易工具价格网格上任意两个相邻价格之间的最小价格差。不同交易工具的价格波动可能差异很大，我们使用它们各自的`tick`大小来表示它们在交易所中最小涨跌幅度。股票通常以\
    \ 1 美分的`tick`大小增量交易，货币以`pip`（百分比点或价格利息点）计价，利率则以基点（`bps`）计价。当价格网格中的价格从小到大排列时，它被称为`price\
    \ ladder`（价格阶梯）。\n\n`price ladder`在电子市场中起着至关重要的作用，它直观地展示了订单簿，订单簿包含了特定交易工具所有待处理买卖订单的列表。订单簿会实时持续更新，反映出市场随新订单的提交、修改或取消而变化的动态特性。`price\
    \ ladder`的每个层级对应一个特定的价格水平，买盘（或出价）列在一侧，卖盘（或要价）列在另一侧。最高出价和最低要价分别被称为最优买价和最优卖价，它们之间的差额被称为买卖价差。\n\
    \n市场参与者可以利用`price ladder`和订单簿提供的信息，深入了解特定交易工具的供需动态。这些数据可以帮助交易者识别潜在的交易机会、评估流动性，并判断市场在各个价格水平上的深度。例如，特定价格点上的大量订单集群可能预示着重要的支撑位或阻力位，而订单簿变薄则可能意味着流动性不足和价格波动加剧。通过仔细分析`price\
    \ ladder`和订单簿，交易者可以做出更明智的决策，并制定利用当前市场条件的策略。此外，理解价格网格中`tick`大小的作用对于交易者下单、管理风险和执行交易至关重要，因为即使是`tick`大小的微小变化，也可能对交易潜在的盈利或亏损产生重大影响。\n"
- fmt: '### Electronic Order


    The rise of electronic trading has brought about significant improvements in the
    efficiency, speed, and accessibility of financial markets. Transactions that once
    took minutes or hours to complete can now be executed in milliseconds or even
    microseconds, thanks to the power of high-speed networks and advanced computer
    algorithms. As a result, market participants can take advantage of fleeting trading
    opportunities, react more swiftly to market news, and benefit from tighter bid-ask
    spreads, which translate into lower transaction costs.


    Moreover, electronic trading has democratized access to global financial markets,
    allowing individual investors to trade alongside institutional players such as
    hedge funds, banks, and proprietary trading firms. Through user-friendly online
    trading platforms, retail investors can access a vast array of financial instruments,
    from stocks and bonds to currencies and derivatives, and participate in various
    markets around the world. These platforms provide a wealth of market data, research
    tools, and risk management features, empowering investors to make more informed
    decisions and execute their trading strategies with precision and ease. At the
    same time, the increased transparency and availability of market data have fostered
    a more competitive landscape, driving innovation in trading strategies, algorithms,
    and financial products.


    Orders are short messages to the exchange through the broker. An order is a set
    of instructions the trader gives to the exchange. It must contain at least the
    following instructions:


    * Contract/security (or contracts/securities) to trade

    * Buy or sell or cancel or modify

    * Size: How many shares or contracts to trade


    From an investor’s perspective, making a trade via a computer system is simple
    and easy. However, the complex process behind the scenes sits on top of an impressive
    array of technology. What was once associated with shouting traders and wild hand
    gestures in open outcry markets has now become more closely associated with computerized
    trading strategies.


    When you place an order to trade a financial instrument, the complex technology
    enables your brokerage to interact with all the securities exchanges looking to
    execute the trade. Those exchanges simultaneously interact with all the brokerages
    to facilitate trading activities.


    For example, the Singapore Exchange (SGX), a Singaporean investment holding company,
    acts through its central depository (CDP) as a central counterparty to all matched
    trades (mainly securities) executed on the SGX ST Trading Engine, as well as privately
    negotiated married trades that are reported to the clearing house for clearing
    on the trade date. Being a central counterparty (CCP), CDP assumes the role of
    the seller to the buying clearing member and buyer to the selling clearing member.
    CDP, therefore, takes the buyer’s credit risks and assumes the seller’s delivery
    risks. This interposing of CDP as the CCP eliminates settlement uncertainty for
    market participants. SGX provides a centralized order-driven market with automated
    order routing, supported by decentralized computer networks. There are no designated
    market makers (liquidity providers), and member firms act as brokers or principals
    for clearing and settlement.


    ### Proprietary and Agency Trading


    In the world of finance, the distinction between proprietary and agency trading
    plays a crucial role in determining the objectives and motivations behind trading
    activities. While both types of trading involve the execution of orders in financial
    markets, they serve different purposes and are subject to different regulations
    and risk profiles.


    Proprietary trading allows financial institutions to generate profits by leveraging
    their own capital and expertise in market analysis, risk management, and trading
    strategies. Prop traders often engage in various strategies such as arbitrage,
    market making, and statistical arbitrage, seeking opportunities to capitalize
    on market inefficiencies and price discrepancies. However, proprietary trading
    carries a higher degree of risk due to the full responsibility for potential losses.
    As a result, proprietary trading desks are often subject to strict risk management
    controls and regulatory oversight, particularly in the wake of the 2008 financial
    crisis.


    On the other hand, agency trading focuses on providing execution services for
    clients, prioritizing the best execution of client orders, and ensuring that clients’
    interests are aligned with the broker’s actions. The primary goal of agency trading
    is to achieve the most favorable terms for the client while minimizing the impact
    of the trade on the market. Brokers engaged in agency trading earn income through
    commissions and fees, rather than by taking positions in the market. Since agency
    traders do not assume market risk on behalf of their clients, they are subject
    to different regulatory and compliance requirements than proprietary traders.


    A broker or trading agency can execute trading orders for their clients or their
    own agency. The main difference between agency and proprietary trading is the
    trading client, that is, for whom the trade is executed, and whose investment
    portfolio is changed as a result of trading. Agency trading is any type of trade
    that a broker executes for their clients/investors who are charged a brokerage
    fee. Proprietary trading, also known as prop trading, refers to when an agency
    or broker executes trades for the benefit of its own institution. The orders submitted
    by traders for their own accounts/institutions are called proprietary orders.
    Since most traders cannot access the markets directly, most orders are agency
    orders, which a broker presents to the market.


    Agency orders can be held or not held. Held orders are those when the broker has
    an obligation to a client to fill the order. Market-not-held orders are institutional
    orders where the trader hires a broker-dealer to execute the order. Working on
    an order means a broker-dealer takes some time to fill the order.


    Understanding the differences between proprietary and agency trading is essential
    for market participants to navigate the complex world of financial markets. While
    proprietary trading focuses on generating profits through active market participation,
    agency trading emphasizes the execution of client orders in the best possible
    manner, ensuring that the interests of clients are at the forefront of the broker’s
    actions.'
