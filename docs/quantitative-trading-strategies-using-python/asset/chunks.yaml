    26    0.2593\n30    0.2591\n34    0.2588\n38    0.2579\nName: 0, dtype: float64\n\
    ```\n\n结果显示，卖价序列是递增的，而买价序列是递减的。由于我们在绘制图表等分析中通常处理递增序列的价格数据，因此需要反转买价的顺序。可以通过重新排列\
