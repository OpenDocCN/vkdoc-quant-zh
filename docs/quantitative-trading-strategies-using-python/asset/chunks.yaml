    # 8. 基于假设检验的统计套利


    统计套利是一种市场中性交易策略，利用统计方法识别和利用金融资产之间的显著关系。通过假设检验，它能够发现相关资产对中由于暂时性市场低效而导致的价格差异。通过买入被低估的资产并卖出被高估的资产，该策略能够在市场纠正这些低效时确保盈利，而不受整体市场波动的影响。'
