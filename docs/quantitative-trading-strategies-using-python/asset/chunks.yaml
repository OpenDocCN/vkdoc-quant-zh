    the model prediction to the target output, where the gap is measured by a particular
    cost measure and used as feedback for the next round of tuning. Each tuning produces
    a new model, and we want to look for one that minimizes the cost


    In the following section, we will introduce the high-level principles of three
    different types of machine learning algorithms: support vector machine, random
    forest, and neural network.'
  trans: "\n### 机器学习工作流\n\n机器学习模型是预测函数，能在给定特定输入集时生成预测结果。在本例中，我们计划在配对交易中使用机器学习模型来预测两种资产之间的价差，进而识别有利可图的交易信号。由于价差是一个连续量，本章将探讨回归模型，包括支持向量机（SVM）、随机森林（RF）和神经网络模型。我们还会对特征空间（即历史价差序列）进行扩充，加入诸如技术指标等额外特征。一旦价差被预测出来，我们就可以通过做多表现较差的资产、做空表现较好的资产来生成交易信号。\n\
    \n机器学习模型是一种数学算法或函数，它在训练数据集上进行训练，并用于对未见过的未来测试数据集进行预测。根据具体的模型类别，该函数能从给定数据中学习潜在的模式和关系，在监督学习的情境下，这通常表现为输入-输出对的形式。这个过程被称为插值，即模型需要在给定数据点之间进行插值拟合，同时要对数据集中的随机噪声具备一定程度的鲁棒性，这通常由相对较低的训练误差来体现。\n\
    \n接下来，训练好的模型将使用一组新的测试数据进行评估，这一过程称为外推。测试数据可能与训练数据有所不同。模型应当在测试集上表现良好，这样将其应用于实际场景时才能让人有信心。测试集的性能也被称为泛化性能，它是衡量模型在测试集数据上泛化能力好坏的一个指标。\n\
    \n一个典型的机器学习模型由两部分组成：参数（或权重）作为模型的构建模块，而模型架构则规定了输入数据如何与参数交互以生成输出。模型训练指的是调整这些参数的过程，目的是使模型在测试集上表现良好，同时在训练集上也往往能有相对较好的表现。在训练过程中，机器学习算法会根据输入数据调整模型参数，以提高其在训练数据上的预测准确性。一旦模型训练完成，它就可以用于对之前可能未见过的新数据进行预测。\n\
    \n如果模型在训练集上表现过于出色，但在测试集上表现不佳，那么该模型就被认为对训练数据过拟合了。由于现代模型通常架构复杂且参数数量庞大，过拟合在许多训练场景中都是常见现象。可以采用适当的正则化技术来降低过拟合的风险。\n\
    \n让我们回顾一下第一章图中展示的整体模型训练流程工作流图示，为方便参考，此处也将其呈现于图 10-2。我们可以应用正则化技术，通过以下四个组件来获得更好的泛化性能：训练数据、模型、代价度量以及优化过程。每个组件都有特定程度的正则化效果，并且可以组合使用，以在特定的训练情境下实现良好的泛化性能。\n\
    \n![](img/605529_1_En_10_Fig2_HTML.jpg)\n\n此图展示了整体模型训练流程的工作流。它包含四个组件：带有输入特征和目标标签的训练数据、带参数和架构的模型、代价度量，以及带有代价反馈的模型优化过程。\n\
    \n**图 10-2**  \n典型模型训练过程示例。工作流从可用的训练数据开始，逐步调整模型。调整过程需要将模型预测与目标输出进行匹配，两者之间的差距由特定的代价度量来衡量，并作为反馈用于下一轮调整。每一轮调整都会产生一个新模型，而我们希望找到一个能最小化代价的模型。\n\
    \n在接下来的部分中，我们将介绍三种不同类型机器学习算法的高级原理：支持向量机、随机森林和神经网络。\n"
- fmt: '### Support Vector Machine


    Support vector machine (SVM) is a popular supervised learning algorithm, especially
    in the Kaggle community, for both classification and regression. In the context
    of classification, SVM works by mapping the input data from its original feature
    space into a high-dimensional feature space using a kernel function, and then
    finding the hyperplane that best separates the different classes of data. The
    hyperplane is chosen in order to maximize the margin between the classes. Seeking
    a boundary based on the principle of maximal margin often leads to a better generalization
    performance, thus reducing the risk of overfitting.


    Since we are interested in predicting the spread as a continuous outcome, making
    it a regression task, SVM instead finds the hyperplane that best separates the
    input data while minimizing the margin violations. In this case, our goal in the
    regression task is to fit a hyperplane as closely as possible to the actual data
    points by minimizing the sum of the squared errors (SSE) as the cost measure between
    the predicted output and the actual target values. Since minimizing SSE toward
    zero would easily lead to an overfitting model, the SVM model used in regression
    often assumes an *ϵ*-insensitive loss function, which allows the model to tolerate
    some error in its predictions, up to a certain threshold *ϵ*.


    There are multiple technical terms here that serve more explanation. Let us start
    with the concept of the *hyperplane*. A hyperplane is a decision line used to
    predict the continuous output in the case of regression. The data points on either
    side of the hyperplane within a certain distance (specifically, within *ϵ*) are
    called *support vectors*. We can also use these support vectors to draw two *decision
    boundaries* around the hyperplane at a distance of *ϵ*.


    Moving on, a *kernel* is a set of mathematical functions that take data as input
    and transform it into the required form, possibly in a different dimension. These
    are generally used for finding a hyperplane in the higher-dimensional space, which
    is considered easier to achieve linear separation than finding the same separating
    hyperplane in the original feature space. Using kernels in SVM provides a powerful
    and flexible tool for classification and regression tasks, allowing SVM to handle
    complex and even nonlinearly separable datasets.


    Figure [10-3](#605529_1_En_10_Chapter.xhtml#Fig3) helps illustrate these concepts.
    Given a set of training observations in the form of input-output pairs, the support
    vector regression model will build a hyperplane as the regression line to predict
    future test data. The hyperplane is surrounded by two decision boundaries, determined
    by a user-specified hyperparameter *ϵ*. Here, *ϵ* specifies the width of the *ϵ*-insensitive
    zone (or tolerance zone) around the regression line, where errors are not penalized.
    Not all the points are within the decision boundaries, and SVM is designed to
    minimize such margin violations by maximizing the number of points within the
    decision boundary upon estimating the hyperplane.


    `![](images/605529_1_En_10_Chapter/605529_1_En_10_Fig3_HTML.jpg)`


    An X-Y plane presents some points between the decision boundaries, with hyperplane
    in its center as the decision line that predicts target values in the region.
    Some points are not within the decision boundaries. Tolerance error term is the
    distance from hyperplane to a boundary.


    Figure 10-3


    Illustrating the training mechanism of the support vector regression model


    Note that *ϵ* controls the tolerance of the margin violation. It determines the
    trade-off between the model complexity and the predictive accuracy. A small value
    of *ϵ* will result in a complex model that closely fits the training data, but
    risks overfitting the training set and therefore generalizing poorly to the new
    data. On the other hand, a large value of *ϵ* will result in a simpler model with
    larger errors but potentially a better generalization performance.


    As a user-specified hyperparameter, the choice of *ϵ* can be highly sensitive
    to the resulting predictive performance. A common approach is cross-validation,
    which involves partitioning the raw data into training and validation sets several
    times, each starting with a different random seed. The best *ϵ* is the one that
    reports the highest predictive performance on average.


    We introduce the random forest model in the following section.


    ### Random Forest


    Random forest is a type of ensemble model, which includes multiple simple models
    combined together to make the final prediction. It is a powerful and flexible
    model that can be used for both regression and classification tasks. As the name
    suggests, the algorithm constructs multiple decision trees and combines all trees
    in the forest to make a final prediction.


    The main differentiating factor about random forest compared with other models
    is how the raw training dataset is divided to support the training of each tree.
    Specifically, each tree is trained on a different subset of the data and a different
    subset of the features, a process known as *bagging* or *bootstrap aggregation*.
    By using random subsets of the data and features, the algorithm creates multiple
    independent submodels that have a low bias and high variance. The final prediction
    is then produced by taking the average of the predictions of all the individual
    trees, similar to collecting the views from multiple independent consultants and
    taking the average recommendation as the final decision.


    Note that at each node of the tree, a random subset of features is considered
    to determine the best split, instead of considering all features. This process
    is called feature bagging. The randomness in feature selection ensures that the
    trees are decorrelated and reduces the chance of overfitting.


    Random forests are widely used for their simplicity, versatility, and robustness.
    They can handle a mix of numerical and categorical features, require very little
    preprocessing of the data, and provide a built-in method for handling missing
    values. Furthermore, they offer measures of feature importance, which can provide
    insights into the underlying structure of the data.


    Figure [10-4](#605529_1_En_10_Chapter.xhtml#Fig4) illustrates the overall training
    process of the random forest model. We start by sampling from the original training
    set to obtain a total of *B* subsets. Each sampling randomly selects both observations
    and features, so that the resulting subsets appear to be independent of each other
    and uncorrelated in the feature space. We will then train a decision tree model
    for each subset, leading to *B* submodels. Upon assessing a new test data point,
    these *B* predictions will be aggregated together and averaged to produce the
    final prediction.


    `![](images/605529_1_En_10_Chapter/605529_1_En_10_Fig4_HTML.jpg)`


    A chart of the random forest model describes that the training process starts
    by sampling from the original training set to obtain a total of B subsets. Train
    a decision tree model for each subset. The predictions are aggregated together
    and averaged as the final prediction.


    Figure 10-4


    Illustrating the training mechanism of the random forest model


    In the next section, we introduce the basic feed-forward neural network.'
