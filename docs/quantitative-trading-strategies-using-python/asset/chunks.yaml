- fmt: '### Delving into Exponential Moving Averages


    The exponential moving average (EMA), also known as an exponentially weighted
    moving average (EWMA), is another type of moving average that places a higher
    weight and significance on the most recent data points. This is a key difference
    compared to the simple moving average, which gives equal weight to all data points
    within the period.


    The exponential moving average (EMA) is a widely used method to reduce the noise
    in the data and identify long-term trends. Each EMA entry is a weighted combination
    of historical prices and the current price. The weight of each price point decreases
    progressively over time, giving greater weight to recent data points. It is calculated
    using the following formula:


    ![$$ EWM{\mathrm{A}}_t=\left\{\begin{array}{c}{S}_0,\kern0.5em t=0\\ {}\upalpha
    {\mathrm{S}}_t+\left(1-\alpha \right) EWM{\mathrm{A}}_{t-1},\kern0.5em t&gt;0\end{array}\right.
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_Equf.png)


    where α is the smoothing factor which ranges between zero and one. The smoothing
    factor α determines the weight given to the most recent price relative to the
    existing EMA. A higher α emphasizes recent prices more strongly.


    As for the first EWMA value at time *t* = 0, a default choice is to set `EWMA[0]
    = S[0]`. Therefore, EMA assumes that recent data is more relevant than old data.
    Such an assumption has its merit since EMA can react faster to changes and is
    thus more sensitive to recent movements as compared to the simple moving average.
    This also means there is no window size to be specified by the function since
    all historical data points are in use.


    It’s important to note that while EMA provides more accurate and timely signals
    than SMA, it might also produce more false signals as it’s more responsive to
    short-term price fluctuations.


    The EMA can be calculated by calling the `ewm()` method from a Pandas `Series`
    object, followed by extracting the average value via `mean()`. We can set the
    `alpha` argument in `ewm()` to directly control the importance of the current
    observation compared with historical ones. See Listing [5-13](#605529_1_En_5_Chapter.xhtml#PC17)
    for an illustration, where we set α = 0.1 to give more weightage to historical
    prices.


    ```

    alpha = 0.1

    df2[''EWM_''+str(alpha)] = df2[''Adj Close''].ewm(alpha=alpha, adjust=False).mean()

    df2.head()

    Adj Close  SMA-3      SMA-20 EWM_0.1

    Date

    2022-01-03 180.434296 NaN        NaN    180.434296

    2022-01-04 178.144302 NaN        NaN    180.205296

    2022-01-05 173.405685 177.328094 NaN    179.525335

    2022-01-06 170.510956 174.020315 NaN    178.623897

    2022-01-07 170.679489 171.532043 NaN    177.829456

    Listing 5-13

    Creating EMA series

    ```


    We observe that there is no missing value in the EMA series. Indeed, the first
    entry will simply be the original price itself due to the design of the EMA weighting
    scheme.


    As usual, let us verify the calculations to ensure our understanding is on the
    right track. The following code snippet manually calculates the second EMA value,
    which is the same as the one obtained using the `ewm()` function:


    ```

    alpha=0.1

    >>> alpha*df2[''Adj Close''][1] + (1-alpha)*df2[''Adj Close''][0]

    180.73006591796877

    ```


    Let us continue to create another EMA series with α = 0.5. In other words, we
    assign an equal weightage to the current observation and historical ones:


    ```

    alpha = 0.5

    df2[''EWM_''+str(alpha)]= df2[''Adj Close''].ewm(alpha=alpha, adjust=False).mean()

    df2.head()

    Adj Close  SMA-3      SMA-20 EWM_0.1    EWM_0.5

    Date

    2022-01-03 180.434296 NaN        NaN    180.434296 180.434296

    2022-01-04 178.144302 NaN        NaN    180.205296 179.289299

    2022-01-05 173.405685 177.328094 NaN    179.525335 176.347492

    2022-01-06 170.510956 174.020315 NaN    178.623897 173.429224

    2022-01-07 170.679489 171.532043 NaN    177.829456 172.054357

    ```


    Let us put all these moving averages in a single chart. Here, the `plot()` function
    treats all four columns as four separate series to be plotted against the index
    column, as shown in Listing [5-14](#605529_1_En_5_Chapter.xhtml#PC20).


    ```

    df2.plot(linewidth=3, figsize=(12,6))

    plt.title(''Daily adjusted closing price with SWA and EWM'', fontsize=20)

    plt.xlabel(''Date'', fontsize=16)

    plt.ylabel(''Price'', fontsize=16)

    Listing 5-14

    Plotting all moving averages together

    ```


    Running these commands generates Figure [5-13](#605529_1_En_5_Chapter.xhtml#Fig13).
    We note that `EWM_0.1` (red line) is close to `SMA-20` (green line), both of which
    give more weightage to historical observations. The same is true for the other
    two moving averages. For EMA, a small weighting factor *α* results in a high degree
    of smoothing, while a larger value leads to a quicker response to recent changes.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig13_HTML.png)


    A multiline graph of price versus date presents the variations in the adjusted
    closing prices, `SMA-3`, `SMA-20`, `EWM_0.1`, and `EWM_0.5` between January 2022
    and January 2023. All three curves have fluctuation trends.


    **Figure 5-13** Visualizing the daily closing prices with both SMA and EMA of
    different configurations


    Having looked at how to compute these moving averages, the next section shows
    how to use them as technical indicators to develop a trend-following strategy.'
