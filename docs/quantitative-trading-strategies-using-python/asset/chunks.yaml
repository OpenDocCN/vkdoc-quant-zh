    这需要两个步骤：首先，计算比率 ![$$ \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq1.png)
    以获得所谓的 1+R 收益率。该比率反映了资产价格从期初到期末的增长因子。如果该比率大于 1，则表示资产价格在此期间内上涨；如果小于 1，则表示资产价格下跌；如果等于
    1，则表示资产价格未发生变化。


    接下来，我们需要从 1+R 收益率中减去 1，将其转换为简单收益率。这一步将增长因子 ![$$ \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq2.png)
    转换为实际百分比收益率。减去 1 实质上是从计算中移除了初始投资，仅保留相对于初始投资而言的盈利或亏损金额，也就是收益率。请参见图 5-3 的示例，其中每日收益率与之前的方法相同。


    ![](img/605529_1_En_5_Fig3_HTML.jpg)


    *一个用于虚拟股票价格的 Excel 表格。它展示了使用 1+R 方法计算的、针对 5 天虚拟股票价格的相同收益率。列标题为：天数、价格、收益率 1 和收益率
    2。第 1 天和第 2 天的价格分别为 100 和 108，并已高亮显示。*


    **图 5-3** 基于 1+R 方法计算简单收益率


    这种 1+R 方法经常被使用，因为它更直观。增长因子 ![$$ \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq3.png)
    能轻松显示初始投资增长（或缩水）了多少，减去 1 则得出净增长的百分比，即简单收益率。当处理多个时间段时，这种方法尤其有用，因为增长因子可以简单地相乘来计算多个时期的累积增长因子。


    **Q4：从第 1 天到第 5 天不考虑复利时的最终收益率是多少？**


    **答案：** 最终收益率是指一项投资在给定时间段内的总收益率。它是衡量一项投资从投资期开始到结束所经历的总收益或损失的指标，不考虑该时期内的任何复利效应。


    要计算不考虑复利过程的最终收益率，我们可以使用公式：![$$ {R}_{1,5}=\frac{S_5-{S}_1}{S_1}=\frac{S_5}{S_1}-1
    $$](img/605529_1_En_5_Chapter_TeX_IEq4.png)。其中，第二个公式首先计算第 5 天资产价格与第 1 天资产价格的比率（这反映了整体增长因子），然后减去
    1 将该增长因子转换为最终收益率。请参见图 5-4 的示例。


    ![](img/605529_1_En_5_Fig4_HTML.jpg)


    *一个用于虚拟股票价格的 Excel 表格。它展示了不考虑复利的最终收益率，针对 5 天的虚拟股票价格。列标题为：天数、价格和收益率 1。第 1 天和第 5
    天的价格分别为 100 和 106，并已高亮显示。*


    **图 5-4** 计算不考虑复利的最终收益率


    **Q5：从第 1 天到第 5 天考虑复利时的最终收益率是多少？它是否等于 Q4 的结果？**


    **答案：** 复利是金融学中的一个重要概念。它反映了这样一个事实：不仅你的初始投资能赚取收益，前期产生的收益也能赚取收益。在正收益率的情况下，这会导致随时间的指数级增长。


    我们将填充“return3”列，其中每个单元格是当前时期的 1+R 收益率与前一时期的累积 1+R 收益率的乘积，并偏移一位。对于第一个时期（从第 1 天到第
    2 天），“return3”的值就是该时期的“1+R”收益率。请参见图 5-5 的示例。


    ![](img/605529_1_En_5_Fig5_HTML.jpg)


    *一个用于虚拟股票价格的 Excel 表格。它展示了针对 5 天虚拟股票价格、考虑复利的最终收益率。列标题为：天数、价格、收益率 1、收益率 2 和收益率
    3。Q5 中第 4 天的收益率和 Q3 中第 5 天的收益率已高亮显示。*


    **图 5-5** 使用复利计算最终收益率


    结果表明，最终收益率为 6%，这与之前计算的结果相同。


    **Q6：将 Q3 中的单期收益率相加。其结果是否等于 Q4 的结果？**


    **答案：** 结果显示它与 6% 不同。通常来说，将单期收益率相加可能会导致对投资总回报的错误结论。单期收益率之和并不等于最终收益率（来自 Q4），因为这种方法忽略了复利效应。换句话说，通过简单地累加单期收益率，我们实际上是将每个时期的收益率视为独立的，并且是基于初始投资金额赚取的，而忽略了由于前期赚取的收益，投资在每个时期都会增长这一事实。这就是为什么我们看到累加后的单期收益率与通过考虑复利效应的正确方法计算出的最终收益率之间存在差异的原因。


    复利原则承认收益会随着时间的推移而累积，这意味着在一个时期赚取的收益会被再投资，并可能在后续时期产生更多收益。因此，虽然单期收益率之和可能提供总收益的粗略估计，但它并不是一个正确的衡量标准，尤其是在时间跨度长或收益率高的情况下。相反，计算多个时期内总收益的正确方法是使用复利的概念，它同时考虑了初始投资和收益的再投资。因此，在计算最终收益率时，遵循顺序复利过程非常重要。请参见图
    5-6 的示例。


    ![](img/605529_1_En_5_Fig6_HTML.jpg)


    *一个用于虚拟股票价格的 Excel 表格。它展示了 Q3 中单期收益率的总和。列标题为：天数、价格、收益率 1 和收益率 2。Q3 列中的数据已高亮显示。*


    **图 5-6** 将所有单期收益率相加


    **Q7：计算每个时期的对数收益率。**


    **答案：** 对数收益率，或称连续复利收益率，是另一种计算收益的方法，可以简化金融中的各种计算。此方法使用自然对数（log）来表达收益率，该收益率源自价格的相对变化。


    要计算每个时期的对数收益率，我们可以使用公式：


    ![$$ \log \_\mathrm{return}=\ln \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_Equc.png)


    这里，*S*[*t* + 1] 和 *S*[*t*] 分别代表未来时间 *t* + 1 和当前时间 *t* 的资产价格，而 ln 表示自然对数。请参见图 5-7
    的示例。


    ![](img/605529_1_En_5_Fig7_HTML.jpg)


    *一个用于虚拟股票价格的 Excel 表格。它展示了每个时期对数收益率的总和。列标题为：天数、价格、收益率 1、收益率 2、收益率 3 和收益率 4。Q3
    列中第 2 天的数据已高亮显示。*


    **图 5-7** 计算每个时期的对数收益率


    例如，如果我们有一系列价格数据，我们可以使用此公式计算每个时期的对数收益率。请注意，对数收益率对于小收益是一个很好的近似值，并且它还具有一些理想的数学特性，例如时间可加性，这意味着多个时期的总对数收益率就是每个单独时期对数收益率的总和。

    '
- fmt: 'Also, note that we need to ensure that the denominator (`S[t]` in this case)
    is not zero to avoid division by zero error. This can be handled by adding a small
    constant to the denominator when implementing the calculation in programs.


    ## Q8: Calculate the terminal return using the log returns. Is it equal to Q4?


    **Answer:** The terminal return using log returns can be calculated by summing
    all the single-period log returns, then exponentiating the result to reverse the
    log operation, and finally subtracting one to convert back to the simple return
    format. This is because log returns are time additive, meaning that the total
    log return over a given period is simply the sum of the log returns over the subperiods.


    In other words, if you have calculated log returns over several periods (say daily),
    you can get the total (terminal) log return over these periods simply by summing
    up all these daily log returns. This property simplifies the calculation of terminal
    returns over multiple periods, making it very convenient, especially for large
    datasets.


    The result shows that it is equal to the one obtained in Q4. See Figure [5-8](#605529_1_En_5_Chapter.xhtml#Fig8)
    for an illustration.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig8_HTML.jpg)


    An Excel table for dummy stock prices. It presents the terminal return, calculated
    by using the log returns. The column headers are day, price, return 1, return
    2, return 3, and return 4. The data in column Q7 for all five days is highlighted.


    **Figure 5-8** Calculating the terminal return using log returns


    ## Q9: Discuss the advantages of using log returns.


    **Answer:** As mentioned, the use of logarithmic returns, or “log returns,” has
    several advantages, as detailed in the following:


    *   **Ease of calculation and analysis:** Log returns simplify mathematical calculations
    and statistical analyses. This simplification is particularly noticeable when
    dealing with compounded returns over multiple periods. Because logarithms convert
    multiplication and division operations into addition and subtraction, the compounded
    return (or “total return”) over multiple periods can be calculated as the simple
    sum of the log returns over those periods.


    *   **Symmetry:** Log returns also exhibit a desirable symmetry property. If a
    price doubles and then halves, or halves and then doubles, the total log return
    over the two periods is zero, reflecting the fact that the price is unchanged
    over the two periods. This symmetry property, which is not possessed by simple
    returns, often simplifies analyses and improves the interpretability of results.
    Suppose a stock price `S[t]` changes to `S[t+1]` and then changes back to `S[t]`,
    the resulting log returns will be symmetric around zero. For example, when the
    stock price changes from 100 on day 1 to 108 on day 2 and then back to 100 on
    day 3, the resulting log returns are 7.7% on day 2 and –7.7% on day 3. A simple
    mathematical analysis would immediately make sense of this:


    ```

    log(S[t+1]/S[t]) = -log((S[t+1]/S[t])^(-1)) = -log(S[t]/S[t+1])

    ```


    *   **Normality:** In addition, financial models often assume that returns are
    normally distributed. However, it’s been observed that simple returns have skewness
    and excess kurtosis, implying that they deviate from normality. On the other hand,
    log returns tend to have properties closer to normality which makes them a better
    fit for these financial models.


    *   **Continuously compounded returns:** Log returns also represent continuously
    compounded returns. This property makes log returns the preferred choice in certain
    financial applications, especially those involving options and other derivatives,
    where continuous compounding is commonly used.


    In summary, using log returns simplifies mathematical computations and statistical
    analyses, enables symmetry and normality, and represents continuously compounded
    returns. These properties make log returns highly valuable in financial analysis
    and modeling.


    Let us look at a concrete example to understand the calculations using log returns.


    ### Analyzing Stock Prices Using Log Returns


    We first download Google’s stock price data for the first few days of 2023, as
    shown in Listing [5-1](#605529_1_En_5_Chapter.xhtml#PC1).


    ```

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    import yfinance as yf

    symbol = ''GOOG''

    df = yf.download(symbol, start="2023-01-01", end="2023-01-08")

    >>> df

    Open      High      Low       Close Adj Close     Volume

    Date

    2023-01-03 89.830002 91.550003 89.019997 89.699997 89.699997 20738500

    2023-01-04 91.010002 91.239998 87.800003 88.709999 88.709999 27046500

    2023-01-05 88.070000 88.209999 86.559998 86.769997 86.769997 23136100

    2023-01-06 87.360001 88.470001 85.570000 88.160004 88.160004 26612600

    Listing 5-1

    Downloading Google’s stock price

    ```


    We can use the `pct_change()` method to calculate the single-period percentage
    returns, as shown in Listing [5-2](#605529_1_En_5_Chapter.xhtml#PC2).


    ```

    # single-period percentage returns

    returns = df.Close.pct_change()

    >>> returns

    Date

    2023-01-03 00:00:00-05:00         NaN

    2023-01-04 00:00:00-05:00   -0.011037

    2023-01-05 00:00:00-05:00   -0.021869

    2023-01-06 00:00:00-05:00    0.016019

    Name: Close, dtype: float64

    Listing 5-2

    Calculating the single-period percentage returns

    ```


    Here, the first-period return is `NaN` as there is no prior stock price available.


    Let us calculate the terminal return using the original approach by taking the
    first and last closing prices as the inputs (based on the definition given earlier),
    as shown in Listing [5-3](#605529_1_En_5_Chapter.xhtml#PC3).


    ```

    # terminal return

    terminal_return = df.Close[-1]/df.Close[0] - 1

    >>> terminal_return

