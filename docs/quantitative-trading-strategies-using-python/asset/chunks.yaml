    \ ['lightslategrey',] * 10\ncolors = colors + ['crimson',] * 10\nfig = go.Figure()\n\
    timestamp = 0\nfig.add_trace(go.Bar(\n    y= ['价格-'+'{:.4f}'.format(x) for x in\
