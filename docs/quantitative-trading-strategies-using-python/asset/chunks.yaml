- fmt: '### Order Flow


    In trading, order flow is an important concept. It is the overall trade direction
    at any given period of time. Ex post, order flow can be inferred from the trade
    direction. For example, a trade is said to be buyer initiated if the trade took
    place at the ask price or higher. In this case, the buyer is willing to absorb
    the bid/ask spread and pay a higher price. The trade sign is `+1`.


    Conversely, a trade is seller initiated if the trade occurred at the bid price
    or lower. In this case, the seller is willing to absorb the bid/ask spread and
    sell for a low price. The trade sign is `–1`.


    In essence, the order flow suggests the net direction of the market. When there
    were more buy (sell) market orders (MO) than sell (buy) MO, the market direction
    would typically be up (down). Many papers in the literature have provided ample
    evidence of this intuitive observation. It is also well known among traders. By
    analyzing the order flow, traders can identify buying and selling pressure and
    anticipate potential price movements. The concept of order flow is based on the
    premise that the net direction of market orders can provide insights into market
    trends and potential price changes.


    A positive net order flow, where there are more buy market orders than sell market
    orders, generally indicates a bullish market with upward price movement. Conversely,
    a negative net order flow, where there are more sell market orders than buy market
    orders, signals a bearish market with a downward price movement. This correlation
    between order flow and market direction is well documented in academic literature
    and widely recognized by traders.


    So how do we measure the direction of market order flows? One way is to use the
    net trade sign: the total number of buyer-initiated trades less the total number
    of seller-initiated trades. We can also use the net trade volume sign: the aggregate
    size of buyer-initiated trades less the aggregate size of seller-initiated trades.


    That being said, if we can forecast the direction of order flow ex ante, the trade
    direction in the future can be anticipated. In other words, a positive order flow
    suggests the market is likely to go up, while a negative order flow suggests the
    market is likely to go down.


    Therefore, we can use some models to forecast the order flow on the fly. A simple
    model is to generate a trading signal if the forecasted order flow for the next
    period exceeds some threshold. This threshold can be determined via backtesting
    (to be covered in a later chapter).


    In the following section, we will look at a sample limit order book data and develop
    familiarity with both concepts and implementation.


    ## Working with LOB Data


    The LOB data mainly consists of limit prices and associated trading volume at
    each price level. Due to the vast disparity in different trading platforms, compiling
    all LOB data for a specific asset is difficult. Fortunately, we begin to see a
    coordinated effort in the research community in compiling and sharing such data
    with open access.


    One example is a recent paper in 2020 titled “Benchmark Dataset for Mid-Price
    Forecasting of Limit Order Book Data with Machine Learning Methods,” where the
    authors share the first publicly available benchmark dataset of high-frequency
    limit order markets for mid-price prediction. The paper extracted normalized data
    representations of time series data for five stocks from the NASDAQ Nordic stock
    market for a time period of ten consecutive days, leading to a dataset of around
    four million time series samples in total and covering a complete market-wide
    history of ten trading days.


    The dataset shared by the paper is available at [`https://etsin.fairdata.fi/dataset/73eb48d7-4dbc-4a10-a52a-da745b47a649`](https://etsin.fairdata.fi/dataset/73eb48d7-4dbc-4a10-a52a-da745b47a649).
    We have downloaded a sample file named “`Train_Dst_NoAuction_DecPre_CF_7.txt`”
    and placed it in the `data` folder. Listing [2-1](#605529_1_En_2_Chapter.xhtml#PC1)
    imports a few packages for data processing and visualization, followed by loading
    the dataset into `df`.


    ```python

    import numpy as np

    import pandas as pd

    import plotly.express as px

    from plotly.subplots import make_subplots

    import plotly.graph_objects as go

    df = np.loadtxt(''data/Train_Dst_NoAuction_DecPre_CF_7.txt'')

    Listing 2-1

    Loading the LOB dataset

    ```


    We can access the dimensions of the sample dataset via the `shape` attribute:


    ```python

    >>> df.shape

    (149, 254750)

    ```


    In this dataset, the rows indicate features such as asset price and volume, and
    the columns indicate timestamps. Typically, we would use the rows to indicate
    observation-level data per timestamp and use the columns to represent features
    or attributes. We would need to transpose the dataset.


    Also, based on the documentation on the dataset, the first 40 rows carry 10 levels
    of bid and ask from the order book, along with the volume of each particular price
    point. We have a total of 40 entries per timestamp since each side (buy and sell)
    contains 10 price levels, and each level includes two points: price and volume.
    In other words, the limit order book in a single time snapshot shows up as an
    array of 40 elements.


    The following code prints out price-volume data of ten price levels for the sell
    and the buy sides at the first timestamp:


    ```python

    >>> df[:40,0]

    array([0.2615 , 0.00353, 0.2606 , 0.00326, 0.2618 , 0.002  , 0.2604 ,

    0.00682, 0.2619 , 0.00164, 0.2602 , 0.00786, 0.262  , 0.00532,

    0.26   , 0.00893, 0.2621 , 0.00151, 0.2599 , 0.00159, 0.2623 ,

    0.00837, 0.2595 , 0.001  , 0.2625 , 0.0015 , 0.2593 , 0.00143,

    0.2626 , 0.00787, 0.2591 , 0.00134, 0.2629 , 0.00146, 0.2588 ,

    0.00123, 0.2633 , 0.00311, 0.2579 , 0.00128])

    ```


    Since each level consists of a price-volume pair for both sides (buy and sell),
    we know that for the first four entries, `0.2615` indicates the ask price, `0.00353`
    as the volume at that ask price level, `0.2606` as the buy price, and `0.00326`
    as the volume at that buy price level. Every two entries constitute a price-volume
    pair, and every price level corresponds to two consecutive pairs. We have a total
    of 10 price levels, corresponding to 20 price-volume pairs, including 10 for the
    buy side and 10 for the sell side. Also, we know that price levels on the sell
    side should always be higher than on the buy side, and a quick check verifies
    this.


    Let us extract the price-volume pairs across all timestamps. Remember to transpose
    the dataset, which is achieved by accessing the `.T` attribute. The final result
    is then converted into a Pandas DataFrame format for better processing later.
    Remember to print a few rows of the transformed dataset in `df2` for a sanity
    check:


    ```python

    df2 = pd.DataFrame(df[:40, :].T)

    ```'
