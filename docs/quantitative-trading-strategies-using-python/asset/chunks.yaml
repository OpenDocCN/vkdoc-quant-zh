    ### 转换为 Z 分数


    Z 分数（z-score）衡量的是每日价差偏离其均值多少个标准差。这是一种标准化分数，可用于比较不同分布。用 `x` 表示原始观测值，则 Z 分数计算公式如下：


    ![$$ z=\frac{x-\mu }{\sigma } $$](img/605529_1_En_8_Chapter_TeX_Eque.png)


    其中 `μ` 和 `σ` 分别表示时间序列的均值和标准差。


    因此，Z 分数的绝对值表示当前观测值以标准差为单位偏离均值的程度，而 Z 分数的正负则表明偏离方向是高于均值（正 Z 分数）还是低于均值（负 Z 分数）。


    例如，假设某个分布的均值为 10，标准差为 2。若某观测值为 8，则该观测值的 Z 分数为 `(10-8)/2 = 1`。换言之，该观测值距分布均值有一个标准差的距离。


    在假设检验中，Z 分数常用于评估观测值的统计显著性。当 Z 分数大于或等于 1.96（或小于或等于 -1.96）时，对应 p 值为 0.05 或更小，这是评估统计显著性的常用阈值。


    在代码清单 8-10 中，我们通过均值为 0、标准差为 1 的标准正态分布，展示了其概率密度函数（PDF）的可视化结果。首先，我们使用 `np.linspace()`
    函数生成一组等间距的输入值作为 Z 分数，然后使用位置参数为 0（对应均值）和尺度参数为 1（对应标准差）的 `norm.pdf()` 函数，获取标准正态分布
    PDF 中对应的概率值。同时，我们对小于 -1.96 和大于 1.96 的区域进行了着色，其中 Z 分数 1.96 对应统计检验中 95% 的显著性水平。换句话说，大于等于
    1.96 的 Z 分数占总概率的 5%，小于等于 -1.96 的 Z 分数也同样占 5%。


    ```

    # 通过生成均值为 0、标准差为 1 的标准正态分布来演示 Z 分数

    from scipy.stats import norm

    # 输入：无界标量，此处假定范围为 [-5, 5]

    x = np.linspace(-5, 5, 100)

    # 输出：介于 0 和 1 之间的概率

    y = norm.pdf(x, loc=0, scale=1)

    # 设置绘图

    fig, ax = plt.subplots()

    # 绘制正态分布的概率密度函数

    ax.plot(x, y)

    # 对 Z 分数 >=1.96 和 <= -1.96 的区域进行着色

    z_critical = 1.96

    x_shade = np.linspace(z_critical, 5, 100)

    y_shade = norm.pdf(x_shade, loc=0, scale=1)

    ax.fill_between(x_shade, y_shade, color=''red'', alpha=0.3)

    z_critical2 = -1.96

    x_shade2 = np.linspace(-5, z_critical2, 100)

    y_shade2 = norm.pdf(x_shade2, loc=0, scale=1)

    ax.fill_between(x_shade2, y_shade2, color=''red'', alpha=0.3)

    # 添加标签和标题

    ax.set_xlabel(''Z 分数'')

    ax.set_ylabel(''概率密度'')

    # 添加垂直线以标示 Z 分数为 1.96 和 -1.96 的位置

    ax.axvline(x=z_critical, linestyle=''--'', color=''red'')

    ax.axvline(x=z_critical2, linestyle=''--'', color=''red'')

    # 显示图形

    plt.show()

    ```


    运行代码将生成图 8-7。


    ![一张概率密度与 Z 分数的折线图，呈对称钟形曲线，在 Z 分数为 0 处达到峰值。两条垂直虚线分别位于 Z 分数为 -2 和 2 处，垂直线与曲线尾部之间的区域已着色。](img/605529_1_En_8_Fig7_HTML.jpg)


    在假设检验的语境中，着色区域代表在原假设成立时观察到 Z 分数大于 1.96 的概率。执行统计检验会给出一个 Z 分数。在单侧检验中，如果 Z 分数高于 1.96
    或低于 -1.96，我们将在 0.05 的显著性水平下拒绝原假设，转而支持备择假设，因为原假设下观察到该现象的概率太小了。


    总而言之，我们将 Z 分数作为一种标准化分数，用于衡量某个观测值距离其分布均值有多少个标准差。它被用于假设检验中，以判断某个观测值的统计显著性，即该事件在原假设下发生的概率。显著性水平通常设定为
    0.05。我们可以利用 Z 分数来计算在原假设下观测到与当前观测值同等极端值的概率。最后，我们决定是拒绝原假设，还是无法拒绝原假设。


    现在，让我们回到之前的运行示例。由于股票价格经常波动，我们转而采用移动平均法来推导运行均值和运行标准差。也就是说，每个每日价差在滚动窗口内，都会对应一个基于价差集合计算出的运行均值和运行标准差。在代码清单
    8-11 中，我们使用窗口大小为 10 来推导运行均值和运行标准差，并应用变换得到标准化的价差，即 Z 分数。


    ```

    # 转换为 Z 分数

    # Z 分数衡量价差偏离其均值多少个标准差

    # 使用移动窗口推导均值和标准差

    window_size = 10

    spread_mean = spread.rolling(window=window_size).mean()

    spread_std = spread.rolling(window=window_size).std()

    zscore = (spread - spread_mean) / spread_std

    zscore.plot(figsize=(12,6))

    ```


    运行代码将生成图 8-8，此时标准化后的价差看起来更接近正态分布，如同白噪声。


    ![一张 Z 分数与日期的折线图，曲线水平波动，伴有尖锐的高峰和低谷。](img/605529_1_En_8_Fig8_HTML.jpg)


    由于我们使用窗口大小为 10，移动平均序列中的前 9 个观测值会显示为 NA。我们先使用 `first_valid_index()` 函数找到第一个有效索引，然后对
    Z 分数序列进行子集选取，以去除这些初始的 NA 值，如下代码所示：


    ```

    # 去除初始的 NA 天数

    first_valid_idx = zscore.first_valid_index()

    zscore = zscore[first_valid_idx:]

