    # 神经网络


    神经网络由多个相互连接的节点（也称为神经元）组成，这些节点分层堆叠在一起。每个神经元作为一个函数，接收来自前一层神经元的输入，对该输入进行非线性变换，并将输出发送给下一层神经元。在这些神经元之间是权重，也称为神经网络的参数。学习一个神经网络模型本质上意味着调整权重，以使最终预测准确，并且模型能够很好地泛化到测试集。


    一个典型的神经网络包含一个表示输入数据的输入层和一个生成输出的输出层。它还可以包含任意数量的中间层（称为隐藏层）。每一层至少包含一个神经元，其被解释为提取到的隐藏特征。当我们谈及神经网络的层数时，指的是隐藏层加上输出层的总数。例如，感知机是一个单层神经网络，这意味着它只有输入层和输出层，中间没有任何隐藏层。


    作为神经网络的基本组成单元，感知机是一个完成两步数学运算的单个神经元：加权求和与非线性变换。对于单个具有`p`维特征的观测值`x ∈ ℝ^p`，感知机首先计算`x`与其对应的权重向量`w
    ∈ ℝ^p`（该向量也应是`p`维）之间的加权和`Σ_{i=1}^p w_i x_i`。加权和通常还伴随一项称为*截距*或*偏置*的项，它作为一个额外参数，对加权和进行全局性的偏移调整，以更好地拟合数据。


    在添加截距/偏置项`b`后，该和会经过一个*激活函数*，该函数对加权和引入非线性变换。请注意，偏置项是通过在输入数据中插入一列全为 1 的值来添加的，这与线性回归中的偏置技巧相同。这种非线性变换，连同层的数量和宽度，共同决定了神经网络的灵活性、表达能力以及逼近能力。图
    10-5 总结了感知机的处理流程。


    ![流程图展示了感知机的处理流程。输入 X 1 到 X p 及其对应的权重，以及常数 1 和 b，共同得出加权和。该和经过一个激活函数生成最终输出。](img/605529_1_En_10_Fig5_HTML.jpg)


    **图 10-5** — 感知机的处理流程图，其包含一个加权和运算，随后是一个激活函数。会自动添加一列全为 1 的值以对应权重向量中的偏置项


    最流行的激活函数选择是*修正线性单元*（ReLU），它像一个开关：如果输入信号的值高于特定阈值，则原样通过；如果低于阈值，则输出零将其屏蔽。换句话说，如果输入为正，ReLU
    运算是一个恒等函数；否则，输出被设置为零。没有这种非线性激活，多层神经网络就只会变成一系列线性函数堆叠在一起，最终形成一个线性模型。


    图 10-6 可视化了 ReLU 函数的形状，并总结了到目前为止讨论的感知机运算的特征。除了神经网络模型在层的数量和宽度上的结构灵活性之外，另一个主要的额外灵活性在于非线性运算。事实上，许多令人兴奋且有意义的隐藏特征，都可以通过使用
    ReLU 作为激活函数来自动提取。例如，在使用一种称为卷积神经网络的特殊架构训练图像分类器时，初始隐藏层中的低级特征往往倾向于类似线条或边缘的基本结构组件，而后期隐藏层中的高级特征则开始学习结构模式，如正方形、圆形，甚至更复杂的形状，比如汽车轮子。如果我们局限于特征的线性变换，这是不可能实现的；而如果我们要手动设计这些信息丰富的特征，那将是一项极其困难的任务。


    ![一个数学方程和折线图的表示。简单感知机的功能由加权和 + 激活函数组成。该图展示了激活函数的非线性，先是一条水平线，然后上升。](img/605529_1_En_10_Fig6_HTML.jpg)


    **图 10-6** — 将单个感知机分解为加权和与激活函数（通常是 ReLU）。ReLU 运算在信号为正时通过，为负时将其屏蔽。除了在设计层的数量和宽度上的灵活性外，这种非线性也为神经网络引入了强大的逼近能力


    ReLU（及其变体）仍然是最流行的激活函数的原因之一是其快速的梯度计算。当输入小于或等于零时，（常数的）梯度变为零，从而节省了反向传播和参数更新的需要。当输入为正时，（原始输入变量的）梯度就是
    1，它会按原样进行反向传播。


    回顾完这三类模型后，让我们转向配对交易的具体实现，并比较在使用机器学习模型预测每日价差后的表现。

