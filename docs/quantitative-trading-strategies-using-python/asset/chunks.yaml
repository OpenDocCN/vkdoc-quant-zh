- fmt: '# Stop Order


    By default, a stop order is a market order conditioned on a preset stop price.
    A stop order becomes a market order as soon as the current market price reaches
    or crosses the preset stop price.


    A stop order is always executed in the direction that the asset price is moving,
    assuming that such movement will continue in its original direction. For instance,
    if the market for a particular asset is moving downward, the stop order will be
    to sell at a preset price below the current market price. This is called a stop-loss
    order, which is placed to limit potential losses when the investor is in an open
    position of the asset. The stop-loss order will take the investor out of the open
    position at a preset level if the market moves against the existing position.


    Stop-loss orders are essential, especially when one cannot actively keep an eye
    on the market. It’s thus recommended to always have a stop-loss order in place
    for any existing position in order to gain protection from a sudden drop in price
    due to adverse market news. We can also call it a sell-stop order, which is always
    placed below the current market price and is typically used to limit a loss or
    protect a profit on a long stock position.


    Alternatively, if the price is moving upward, the stop order will be to buy once
    the security reaches a preset price above the current market price. This is called
    a stop-entry order, or buy-stop order, which can be used to enter the market in
    the direction the market is moving. A buy-stop order is always placed above the
    current market price.


    Therefore, before entering a position, we can use a stop-entry (buy-stop) order
    to long an asset if the market price exceeds the preset stop price, and use a
    sell-stop order to short an asset if the market price drops below the preset stop
    price. If we are already in a long (or short) position, we can use a sell-stop
    (or buy-stop) order to limit the loss of the position in case the market price
    drops (or rises).


    Also, note that stop orders can be subject to slippage, that is, the difference
    between the expected execution price and the actual execution price. Since stop
    orders are triggered and converted into market orders once the preset stop price
    is reached, there is a possibility that the order may be executed at a worse price
    than initially anticipated, especially in fast-moving or illiquid markets. As
    a result, slippage can lead to a larger loss or a smaller profit than originally
    expected.


    Let us look at one example. Say you observe that a particular stock has been moving
    in a sideways range (a fairly stable range without forming any distinct trends
    over some period of time) between $20 and $30, and you believe it will ultimately
    break out the upper limit and move higher. You would like to employ breakout trading,
    which means you will take a position within the early stage of an upward-moving
    trend. In this case, you could place a stop-entry order above the current upper
    limit of $30. The price of the stop-entry order can be set as $30.25 to allow
    for a margin of error. Placing the stop-entry order gets you into the market once
    the sideways range is broken to the upside. Also, now that you’re long in the
    position, if you’re a disciplined trader, you’ll want to immediately establish
    a regular stop-loss sell order to limit your losses in case the upward trend is
    false.


    When placing a stop order, we have (unknowingly) entered into the world of algorithmic
    trading. Here, the logic of algorithmic trading is simple: if the market price
    reaches or crosses the stop price, issue a market order; else, keep checking the
    market price.


    # Stop-Limit Order


    A stop-limit order is similar to a stop order in that a stop price will activate
    the order. However, unlike the stop order, which is submitted as a market order
    when elected, the stop-limit order is submitted as a limit order. A stop-limit
    order combines the features of a stop order and a limit order, providing more
    control over the execution price while still allowing for the possibility of protecting
    against significant losses or locking in profits. Specifically, when the market
    price reaches the preset stop price, the stop-limit order becomes a limit order
    that will be executed at the specified limit price or better. This ensures that
    the order will not be executed at a price worse than the limit price, thus mitigating
    the risk associated with market orders.


    A stop-limit order is a conditional trade that combines the features of a stop
    order with those of a limit order and is used to mitigate risk. So a stop-limit
    order is a limit order contingent on a preset stop price and a limit price. A
    stop-limit order eliminates the price risk associated with a stop order where
    the execution price cannot be guaranteed. However, it exposes the investor to
    the risk that the order may never fill even if the stop price is reached. A stop-limit
    order gives traders precise control over when the order should be filled, but
    the order is not guaranteed to be executed. Traders often use stop-limit orders
    to lock in profits or limit downside losses, although they could “miss the market”
    altogether, resulting in missed opportunities if the asset’s price moves in the
    desired direction but doesn’t satisfy the limit price condition.


    In summary, stop-limit orders offer a balance between limiting the execution price
    and stopping potential loss due to significant adverse market movements. However,
    they come with the risk of not being executed if the limit price is not met, potentially
    causing traders to miss out on potential profits or fail to limit their losses
    effectively.


    Let us look at an example algorithm behind the stop-limit order. Suppose research
    shows that the slippage is usually three ticks. Regarding the algorithmic rule
    for a buy-stop-limit order, if the market price reaches or crosses the stop price,
    the system would issue a limit order of a limit price three ticks above the stop
    price. Otherwise, it will keep checking the market price. Regarding the algorithmic
    rule for a sell-stop-limit order, if the market price reaches or crosses the stop
    price, the system would issue a limit order of a limit price three ticks below
    the stop price. Otherwise, it will keep checking the market price.'
