- fmt: '# Visualizing Price Movement


    The price at each price level may move across different timestamps as a reflection
    of market dynamics. Visualizing the whole times series of the price index may
    be too granular at first glance, since there are too many observations, given
    the nature of the ultra high-frequency data. Instead, we can pick a fixed-size
    window to plot the price at a particular period within the window and then move
    the window forward in time to show the change in price. The rolling window can
    then be used to generate an animation of prices moving up and down.


    `Listing 2-8` achieves the desired plotting effect. Here, we set the window length
    to 100 and choose the second price level for visualization. The animation is essentially
    a collection of frames changing from one to another. Thus, we supply the corresponding
    sequence of data for each frame in the animation.


    ```

    widthOfTime = 100

    priceLevel = 1

    fig = go.Figure(

    data=[go.Scatter(x=dfPrices.index[:widthOfTime].tolist(), y=dfPrices[:widthOfTime][priceLevel].tolist(),

    name="frame",

    mode="lines",

    line=dict(width=2, color="blue")),

    ],

    layout=go.Layout(width=1000, height=400,

    #                      xaxis=dict(range=[0, 100], autorange=False, zeroline=False),

    #                      yaxis=dict(range=[0, 1], autorange=False, zeroline=False),

    title="10 price levels of each side of the orderbook",

    xaxis_title="Time snapshot index",

    yaxis_title="Price levels",

    template=''plotly_dark'',

    hovermode="closest",

    updatemenus=[dict(type="buttons",

    showactive=True,

    x=0.01,

    xanchor="left",

    y=1.15,

    yanchor="top",

    font={"color":''blue''},

    buttons=[dict(label="Play",

    method="animate",

    args=[None])])]),

    frames=[go.Frame(

    data=[go.Scatter(

    x=dfPrices.iloc[k:k+widthOfTime].index.tolist(),

    y=dfPrices.iloc[k:k+widthOfTime][priceLevel].tolist(),

    mode="lines",

    line=dict(color="blue", width=2))

    ]) for k in range(widthOfTime, 1000)]

    )

    fig.show()

    ```


    **Listing 2-8** Animating the price movement


    Running the code generates Figure 2-8. We can click the Play button to start animating
    the line chart, which will change shape as we move forward.


    ![Figure 2-8](images/605529_1_En_2_Chapter/605529_1_En_2_Fig8_HTML.jpg)


    A line graph presents the variation in price levels with 10 different time snapshot
    indexes. It indicates 10 price levels for each side of the order book. The line
    is very fluctuating and at time snapshot index 58, the price level is 0.26.


    **Figure 2-8** Animating the price changes of a selected price level via a rolling
    window of 100 timestamps


    In addition, we can also plot the animation of change in the volume across all
    the price levels, as shown in Listing 2-9. The change in volume also indicates
    the market dynamics in terms of supply and demand, although less so direct than
    the price itself.


    ```

    timeStampStart = 100

    fig = go.Figure(

    data=[go.Bar(y= [''price-''+''{:.4f}''.format(x) for x in dfPrices[:timeStampStart].values[0].tolist()],

    x=dfVolumnes[:timeStampStart].values[0].tolist(),

    orientation=''h'',

    name="priceBar",

    marker_color=colors),

    ],

    layout=go.Layout(width=800, height=450,

    title="Volume of 10 buy, sell price levels of an orderbook",

    xaxis_title="Volume",

    yaxis_title="Price levels",

    template=''plotly_dark'',

    hovermode="closest",

    updatemenus=[dict(type="buttons",

    showactive=True,

    x=0.01,

    xanchor="left",

    y=1.15,

    yanchor="top",

    font={"color":''blue''},

    buttons=[dict(label="Play",

    method="animate",

    args=[None])])]),

    frames=[go.Frame(

    data=[go.Bar(y= [''price-''+''{:.4f}''.format(x) for x in dfPrices.iloc[k].values.tolist()],

    x=dfVolumnes.iloc[k].values.tolist(),

    orientation=''h'',

    marker_color=colors)],

    layout=go.Layout(width=800, height=450,

    title="Volume of 10 buy, sell price levels of an orderbook [Snapshot=" + str(k)
    +"]",

    xaxis_title="Volume",

    yaxis_title="Price levels",

    template=''plotly_dark'',

    hovermode="closest")) for k in range(timeStampStart, 500)]

    )

    fig.show()

    ```


    **Listing 2-9** Animating the volume movement


    Running the code generates Figure 2-9.


    ![Figure 2-9](images/605529_1_En_2_Chapter/605529_1_En_2_Fig9_HTML.jpg)


    A horizontal bar graph of price levels versus volume presents the volume of 10
    buy, and sell price levels of an order look. When the volume is 0.00787, the price
    level is 0.2626.


    **Figure 2-9** Visualizing the change in the volume across all the price levels


    ## Summary


    In this chapter, we covered the basics of the electronic market and the different
    types of electronic orders, including market order, stop order, limit order, and
    other forms of dynamic order (e.g., pegging, trailing stop, market if touched,
    limit, and cancelation). We discussed the mechanism of the order matching system
    and order flow.


    In the second section, we looked at real LOB data and discussed different ways
    to visualize the price and volume data, such as their movement across time. Working
    with the actual data by first plotting them out and performing some initial analysis
    is a common and important first step in the whole pipeline of devising and implementing
    trading strategies.


    ## Exercises


    - Write a function in Python to illustrate the algorithm of a pegged buy order
    and sell order. (Hint: Start by defining your own input and output.)

    - What''s the difference between the market if touched order (MIT) and the stop
    order?

    - How to calculate mid-price in a limit order book? Implement the logic in code.
    (Hint: Start by defining your own input and output.)

    - Describe how a buy trailing stop order works.

    - Should the trailing stop-loss order be placed above or below the current market
    price for an investor in a long position? A short position?


    # Forward and Futures Contracts


    In financial markets, forward and futures contracts serve as popular financial
    instruments for hedging risk (preventing or reducing potential loss) and speculation
    (seeking abnormal and risky profits). These contracts offer market participants
    the opportunity to mitigate or enlarge the impact of price fluctuations on their
    positions. The use of forward and futures contracts has grown exponentially over
    the years, as market participants increasingly recognize their potential benefits
    in risk management and portfolio diversification. As such, understanding the mechanics,
    advantages, and limitations of these contracts is essential in the dynamic financial
    markets.


    Forward and futures contracts find their roots in the age-old practice of producers
    and consumers entering into agreements to exchange goods at a future date for
    a predetermined price. Today, these contracts become popular financial vehicles
    traded on a much larger scale, encompassing a wide variety of underlying assets,
    including commodities, currencies, interest rates, and equity indices. Forwards
    are typically traded over the counter (OTC) and customized to the specific needs
    of the counterparties on both sides. Futures contracts are standardized products
    traded on regulated exchanges, just like stocks. Futures and forward contracts
    differ in liquidity, counterparty risk, and transparency.


    In this chapter, we delve deeper into the world of forward and futures contracts,
    exploring their unique characteristics, similarities, and differences. We will
    discuss the process of entering and settling these contracts, their role in managing
    risk, and the strategies employed by market participants to capitalize on anticipated
    price movements.'
