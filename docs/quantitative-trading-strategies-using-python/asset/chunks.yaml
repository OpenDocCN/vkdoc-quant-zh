    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig7_HTML.jpg)


    A double line graph presents the variation of G O O G and M S F T in terms of
    cumulative maximum on 5 different dates between January 2023 and February 2023\.
    Both increase with time but the line for G O O G is more fluctuating.


    Figure 7-7


    Visualizing the cumulative maximum of the wealth curves


