  raw: 'Compared with the buy-and-hold strategy, the key difference is the additional
    shorting actions generated by the trend-following strategy. That is, when the
    stock price drops, the buy-and-hold strategy will register a loss, while the trend-following
    strategy will make a profit *if* the trading signal is to go short. Creating a
    good trading signal thus makes all the difference.


    Next, we create explicit trading actions. The `signal` column tells us whether
    we should go long or short in the given asset under the trend-following strategy.
    However, this does not mean we need to make a trade at every period. If the `signal`
    remains the same for two consecutive periods, we simply hold on to the position
    and remain seated. In other words, there is no trading action for this specific
    trading day. This applies in the case of two consecutive 1s or –1s in the `signal`
    column.


    On the other hand, we will make an action when there is a sign switch in the trading
    signal, changing from 1 to –1 or from –1 to 1\. The former means changing from
    longing a unit of stock to shorting it, while the latter means the reverse.


    To create the trading actions, we can use the `diff()` method again on the `signal`
    column, as shown in the following:


    ```

    df2[''action''] = df2.signal.diff()

    ```


    We can produce a frequency count of different trading actions using the `value_counts()`
    function:


    ```

    >>> df2[''action''].value_counts()

    0.0    216

    2.0      7

    -2.0      7

    Name: action, dtype: int64

    ```


    The result shows that the majority of the trading days do not require action.
    For the 14 days with a trading action, 7 days change the position from short to
    long, and another 7 change from long to short.


    We can visualize these trading actions as triangles on the graph with stock prices
    and SMAs. In Listing [5-17](#605529_1_En_5_Chapter.xhtml#PC29), we indicate a
    buy action via the green triangle facing upward when the short-term SMA crosses
    above the long-term SMA. On the other hand, we use a red triangle facing downward
    to indicate a sell action when the short-term SMA crosses below the long-term
    SMA.


    ```

    plt.rcParams[''figure.figsize''] = 12, 6

    plt.grid(True, alpha = .3)

    plt.plot(df2[''Adj Close''], label = ''Adj Close'')

    plt.plot(df2[''SMA-3''], label = ''SMA-3'')

    plt.plot(df2[''SMA-20''], label = ''SMA-20'')

    plt.plot(df2.loc[df2.action == 2].index, df2[''SMA-3''][df2.action == 2], ''^'',

    color = ''g'', markersize = 12)

    plt.plot(df2[df2.action == -2].index, df2[''SMA-20''][df2.action == -2], ''v'',

    color = ''r'', markersize = 12)

    plt.legend(loc=1);

    Listing 5-17

    Visualizing trading actions

    ```


    Running these commands generates Figure [5-14](#605529_1_En_5_Chapter.xhtml#Fig14).
    Again, we denote the green triangles as acting from short to long and the red
    triangles as moving from long to short.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig14_HTML.jpg)


    A multiline graph of price versus date presents the variations in the adjusted
    closing prices, S M A 3 and S M A 20, between March 2022 and January 2023\. All
    3 plots has fluctuating decreasing trends.


    Figure 5-14


    Visualizing the trading actions, including going from short to long (green triangles)
    and long to short (red triangles)


    Let us analyze the cumulative returns of each period for both trading strategies.
    Specifically, we would like to obtain the final percentage return at the end of
    2022 if we started with one unit of Apple stock at the beginning of 2022, comparing
    the two trading strategies.


    Recall that we need to multiply the 1+R return at each period to carry out the
    compounding process in order to obtain the terminal return (after subtracting
    one). We also know that the 1+R return is the same as the division between two
    consecutive prices, that is, ![$$ 1+{R}_{t,t+1}=\frac{S_{t+1}}{S_t} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq13.png)
    . Therefore, to calculate the terminal return, we first convert the returns from
    the logarithmic format to the usual percentage format using the `np.exp()` function,
    then carry out the compounding by performing a cumulative product operation using
    the `cumprod()` method. This is achieved via Listing [5-18](#605529_1_En_5_Chapter.xhtml#PC30),
    where we leave out the last step of subtracting by one and report the 1+R return.


    ```

    plt.plot(np.exp(df2[''log_return_buy_n_hold'']).cumprod(), label=''Buy-n-hold'')

    plt.plot(np.exp(df2[''log_return_trend_follow'']).cumprod(), label=''Trend following'')

    plt.legend(loc=2)

    plt.title("Cumulative return of different trading strategies")

    plt.grid(True, alpha=.3)

    Listing 5-18

    Visualizing cumulative returns

    ```


    Running these commands generates Figure [5-15](#605529_1_En_5_Chapter.xhtml#Fig15),
    which shows that the trend-following strategy clearly outperforms the buy-and-hold
    strategy. However, note that this is a simplified setting that does not take into
    account transaction cost and other market factors. More analyses and tests are
    needed to assess the performance of this trading strategy (also many others) in
    the real-world environment.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig15_HTML.jpg)


    A multiline graph of price versus date presents the variations in the trends of
    buy-and-hold and trend-following between February 2022 and January 2023\. Both
    has fluctuation trends.


    Figure 5-15


    Comparing the cumulative return of buy-and-hold and trend-following strategies
    for one share of Apple’s stock


    Lastly, we compare the terminal returns of both strategies:


    ```

    # terminal return of buy-n-hold

    >>> np.exp(df2[''log_return_buy_n_hold'']).cumprod()[-1] -1

    -0.25156586984649587

    # terminal return of trend following

    >>> np.exp(df2[''log_return_trend_follow'']).cumprod()[-1] -1

    0.0711944903093773

    ```


    It turns out that sticking to the buy-and-hold strategy would lose by 25%, while
    using the trend-following strategy generates a terminal return of 7%.


