- fmt: "### Parametric Trading Strategies\n\nThe parameters serve as the input variables\
    \ to a specific trading strategy. A typical trading strategy has one or more parameters,\
    \ each assuming a particular value within the prespecified range. Each parameter\
    \ can vary within its defined ranges, allowing for a wide array of possible strategy\
    \ configurations. Upon accepting these input parameters, the strategy will generate\
    \ the resulting trading signals, from which the terminal return over a specific\
    \ backtesting period could be calculated as an indicator of the “goodness” of\
    \ these parameters. The input parameters do not assume fixed values; instead,\
    \ they are variables that can vary within predefined ranges.\n\nLet us look at\
    \ a concrete example. Recall the trend-following strategy covered earlier. This\
    \ trading strategy relies on two moving averages to generate a trading signal:\
    \ a short-term moving average and a long-term moving average. We would enter into\
    \ a long position if the short-term moving average crosses above the long-term\
    \ moving average, after closing the existing short position, if any. Alternatively,\
    \ we would enter into a short position if the short-term moving average crosses\
    \ below the long-term moving average, after closing the existing long position,\
    \ if any.\n\nThis strategy thus depends on two input parameters: the window lengths\
    \ `l[1]` and `l[2]` for the short-term and long-term moving averages, respectively.\
    \ Each set of parameters would correspond to a number of performance metrics,\
    \ such as the terminal return or the Sharpe ratio. Each set of parameters (`l[1]`\
    \ and `l[2]`) will generate a unique series of trading signals, which in turn\
    \ will result in a specific terminal return or Sharpe ratio. These performance\
    \ metrics serve as indicators of the “goodness” or effectiveness of the chosen\
    \ parameters.\n\nTo proceed with the search for the optimal set of window length\
    \ parameters, we would need a single-number metric to optimize over. Such scalar\
    \ objective serves as the feedback signal on how good or bad the current set of\
    \ input parameters is. This objective serves as a feedback signal, indicating\
    \ the effectiveness of a given set of input parameters. For example, suppose we\
    \ choose the Sharpe ratio as the objective to be maximized. This results in an\
    \ objective function, where the output is the Sharpe ratio `S` over a specific\
    \ backtesting period, the input parameters are window lengths `l[1]` and `l[2]`,\
    \ and we can represent the objective function as `S = f(l[1], l[2])`. Here, `f`\
    \ represents a black-box function, which means we do not have its explicit mathematical\
    \ form or its derivative information. A black-box function is one where we do\
    \ not have explicit knowledge of its mathematical form or its derivative information.\
    \ This means that we can evaluate the function (i.e., we can determine the Sharpe\
    \ ratio for a given set of parameters), but we don’t have a simple formula that\
    \ allows us to directly calculate the optimal parameters. This makes global optimization\
    \ extremely difficult since we know very little about the characteristics of this\
    \ function while our goal is to find its global maximum point.\n\nSuch a lack\
    \ of explicit knowledge about the function makes the optimization problem challenging.\
    \ We are essentially searching for the global maximum of a function that we know\
    \ very little about. However, this is precisely the type of problem that Bayesian\
    \ optimization is designed to tackle.\n\nMore formally, we could frame the question\
    \ as this: for a given stock, locate the values of `l[1]` and `l[2]` in the range\
    \ of `[1,10]` and `[11,20]` (note that we need to ensure `l[1] < l[2]`) that maximizes\
    \ the Sharpe ratio within the backtesting period of a whole year. Figure [9-1](#605529_1_En_9_Chapter.xhtml#Fig1)\
    \ summarizes the characteristics of the optimization problem. Note that different\
    \ trading strategies correspond to a different unknown black-box function `f`.\
    \ Even if the strategy is the same, varying the backtesting period also yields\
    \ a different function realization of the objective function `f`.\n\n![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig1_HTML.jpg)\n\
    \nA representation of the optimization problem. The black box function `f`, takes\
    \ input parameters satisfying window length `l[1]` less than `l[2]`, with unavailable\
    \ explicit functional form or gradient information, and the goal is to figure\
    \ out the set of input parameters to achieve a higher Sharpe ratio.\n\n**Figure\
    \ 9-1**  \nIllustrating the optimization problem. The selected trading strategy\
    \ manifests as an unknown function, and our goal is to search for the optimal\
    \ set of window lengths that deliver the highest performance metric, the Sharpe\
    \ ratio in this case.\n\nThe next section provides more perspectives on the overall\
    \ optimization process.\n\n### More on Optimization\n\nOptimization aims at locating\
    \ the optimal value `f* = f(x*)` or its maximizer `x* = argmax f(x)` for all the\
    \ input values `x in X` in a maximization setting, which could also be a minimization\
    \ problem. The procedure that carries out the optimization process is called the\
    \ optimizer. There are multiple types of optimizers, with stochastic gradient\
    \ descent (SGD) being the most popular optimizer in the space of deep learning.\
    \ In the context of backtesting a trading strategy, we are mostly interested in\
    \ optimizing the risk-adjusted return, represented by the Sharpe ratio or other\
    \ risk measures such as the max drawdown. Plus, we have the additional challenge\
    \ that the inputs are not continuous values; instead, they are discrete such as\
    \ window sizes or trading volumes.\n\nThe optimizer takes a function `f` and figures\
    \ out the desired optimum value `f*` or its corresponding input parameter `x*`.\
    \ Being an optimum value means that `f(x*)` is greater (or less, in the case of\
    \ minimization) than any other values in the neighborhood. Here, `f*` may be either\
    \ a local optimum or a global optimum. A local optimum means `f(x*)` is at the\
    \ top of a mountain, and global optimum means the highest point of all mountains\
    \ in the region. That is, in a maximization setting, we could take all the local\
    \ maxima, compare each other, and report the maximum of them as the global maximum.\
    \ Both are characterized by having a zero gradient at the point `x*`, yet the\
    \ global optimum is often what we aim for. The optimizer needs a strategy to escape\
    \ from these local optima and continue its search for the global optimum. There\
    \ are various techniques to handle this issue, including using different initial\
    \ values via the multistart procedure, applying random jumps in the parameter\
    \ space, and using complex algorithms like simulated annealing or genetic algorithms\
    \ that employ specific mechanisms to escape local optima.\n\nIn the context of\
    \ developing a trading strategy, we are interested in the global maximizer (optimal\
    \ input parameters) that gives the maximal Sharpe ratio. This is a complex task\
    \ as there may be many sets of parameters that yield good results (local maxima),\
    \ but we want to find the absolute best (global maximum).\n\nNote that using the\
    \ gradient information to identify an optimum represents a huge improvement in\
    \ our understanding of optimization problems, as first proposed by Isaac Newton.\
    \ Prior to his time, we would make the manual comparison for each unique pair,\
    \ which is a combinatorial problem that requires the most time-consuming work.\
    \ When the function form is available, such as `y = x²`, we could invoke the tool\
    \ of calculus and solve for the point whose gradient is zero, that is, `y' = 2x\
    \ = 0`, giving `x = 0`. We could then calculate the second derivative or apply\
    \ the sign chart method to ascertain if this is a maximum or minimum point.\n\n\
    The next section introduces more on the global optimization problem."
  raw: '### Parametric Trading Strategies


    The parameters serve as the input variables to a specific trading strategy. A
    typical trading strategy has one or more parameters, each assuming a particular
    value within the prespecified range. Each parameter can vary within its defined
    ranges, allowing for a wide array of possible strategy configurations. Upon accepting
    these input parameters, the strategy will generate the resulting trading signals,
    from which the terminal return over a specific backtesting period could be calculated
    as an indicator of the “goodness” of these parameters. The input parameters do
    not assume fixed values; instead, they are variables that can vary within predefined
    ranges.


    Let us look at a concrete example. Recall the trend-following strategy covered
    earlier. This trading strategy relies on two moving averages to generate a trading
    signal: a short-term moving average and a long-term moving average. We would enter
    into a long position if the short-term moving average crosses above the long-term
    moving average, after closing the existing short position, if any. Alternatively,
    we would enter into a short position if the short-term moving average crosses
    below the long-term moving average, after closing the existing long position,
    if any.


    This strategy thus depends on two input parameters: the window lengths *l*[1]
    and *l*[2] for the short-term and long-term moving averages, respectively. Each
    set of parameters would correspond to a number of performance metrics, such as
    the terminal return or the Sharpe ratio. Each set of parameters (*l*[1] and *l*[2])
    will generate a unique series of trading signals, which in turn will result in
    a specific terminal return or Sharpe ratio. These performance metrics serve as
    indicators of the “goodness” or effectiveness of the chosen parameters.


    To proceed with the search for the optimal set of window length parameters, we
    would need a single-number metric to optimize over. Such scalar objective serves
    as the feedback signal on how good or bad the current set of input parameters
    is. This objective serves as a feedback signal, indicating the effectiveness of
    a given set of input parameters. For example, suppose we choose the Sharpe ratio
    as the objective to be maximized. This results in an objective function, where
    the output is the Sharpe ratio *S* over a specific backtesting period, the input
    parameters are window lengths *l*[1] and *l*[2], and we can represent the objective
    function as *S* = *f* (*l*[1], *l*[2]). Here, *f* represents a black-box function,
    which means we do not have its explicit mathematical form or its derivative information.
    A black-box function is one where we do not have explicit knowledge of its mathematical
    form or its derivative information. This means that we can evaluate the function
    (i.e., we can determine the Sharpe ratio for a given set of parameters), but we
    don’t have a simple formula that allows us to directly calculate the optimal parameters.
    This makes global optimization extremely difficult since we know very little about
    the characteristics of this function while our goal is to find its global maximum
    point.


    Such a lack of explicit knowledge about the function makes the optimization problem
    challenging. We are essentially searching for the global maximum of a function
    that we know very little about. However, this is precisely the type of problem
    that Bayesian optimization is designed to tackle.


    More formally, we could frame the question as this: for a given stock, locate
    the values of *l*[1] and *l*[2] in the range of [1,10] and [11,20] (note that
    we need to ensure *l*[1] < *l*[2]) that maximizes the Sharpe ratio within the
    backtesting period of a whole year. Figure [9-1](#605529_1_En_9_Chapter.xhtml#Fig1)
    summarizes the characteristics of the optimization problem. Note that different
    trading strategies correspond to a different unknown black-box function *f*. Even
    if the strategy is the same, varying the backtesting period also yields a different
    function realization of the objective function *f*.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig1_HTML.jpg)


    A representation of the optimization problem. The black box function f, takes
    input parameters satisfying window length l 1 less than l 2, with unavailable
    explicit functional form or gradient information, and the goal is to figure out
    the set of input parameters to achieve a higher Sharpe ratio.


    Figure 9-1


    Illustrating the optimization problem. The selected trading strategy manifests
    as an unknown function, and our goal is to search for the optimal set of window
    lengths that deliver the highest performance metric, the Sharpe ratio in this
    case


    The next section provides more perspectives on the overall optimization process.


    ### More on Optimization


    Optimization aims at locating the optimal value *f* ^∗ = *f* (*x*^∗) or its maximizer
    ![$$ {x}^{\ast }={\mathrm{argmax}}_{x\in \mathcal{X}}f $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq1.png)
    for all the input values ![$$ x\in \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq2.png)
    in a maximization setting, which could also be a minimization problem. The procedure
    that carries out the optimization process is called the optimizer. There are multiple
    types of optimizers, with stochastic gradient descent (SGD) being the most popular
    optimizer in the space of deep learning. In the context of backtesting a trading
    strategy, we are mostly interested in optimizing the risk-adjusted return, represented
    by the Sharpe ratio or other risk measures such as the max drawdown. Plus, we
    have the additional challenge that the inputs are not continuous values; instead,
    they are discrete such as window sizes or trading volumes.


    The optimizer takes a function *f* and figures out the desired optimum value *f*
    ^∗ or its corresponding input parameter *x* ^∗. Being an optimum value means that
    *f* (*x* ^∗) is greater (or less, in the case of minimization) than any other
    values in the neighborhood. Here, *f* ^∗ may be either a local optimum or a global
    optimum. A local optimum means *f* (*x* ^∗) is at the top of a mountain, and global
    optimum means the highest point of all mountains in the region. That is, in a
    maximization setting, we could take all the local maxima, compare each other,
    and report the maximum of them as the global maximum. Both are characterized by
    having a zero gradient at the point *x* ^∗, yet the global optimum is often what
    we aim for. The optimizer needs a strategy to escape from these local optima and
    continue its search for the global optimum. There are various techniques to handle
    this issue, including using different initial values via the multistart procedure,
    applying random jumps in the parameter space, and using complex algorithms like
    simulated annealing or genetic algorithms that employ specific mechanisms to escape
    local optima.


    In the context of developing a trading strategy, we are interested in the global
    maximizer (optimal input parameters) that gives the maximal Sharpe ratio. This
    is a complex task as there may be many sets of parameters that yield good results
    (local maxima), but we want to find the absolute best (global maximum).


    Note that using the gradient information to identify an optimum represents a huge
    improvement in our understanding of optimization problems, as first proposed by
    Isaac Newton. Prior to his time, we would make the manual comparison for each
    unique pair, which is a combinatorial problem that requires the most time-consuming
    work. When the function form is available, such as *y* = *x*², we could invoke
    the tool of calculus and solve for the point whose gradient is zero, that is,
    *y*^′ = 2*x* = 0, giving *x* = 0\. We could then calculate the second derivative
    or apply the sign chart method to ascertain if this is a maximum or minimum point.


    The next section introduces more on the global optimization problem.'
  trans: "\n### 参数化交易策略\n\n参数作为特定交易策略的输入变量。一个典型的交易策略拥有一个或多个参数，每个参数在预先设定的范围内取特定值。每个参数都可以在其定义范围内变化，从而产生多种可能的策略配置。在接受这些输入参数后，策略将生成相应的交易信号，据此可以计算出特定回测期内的最终收益，作为这些参数“优劣”的指标。输入参数并非固定值，而是可以在预定范围内变化的变量。\n\
    \n我们来看一个具体例子。回顾之前讲过的趋势跟随策略。该交易策略依赖两条移动平均线来生成交易信号：一条短期移动平均线和一条长期移动平均线。如果短期移动平均线上穿长期移动平均线，我们将在平掉现有空头头寸（如有）后建立多头头寸。或者，如果短期移动平均线下穿长期移动平均线，我们将在平掉现有多头头寸（如有）后建立空头头寸。\n\
    \n因此，该策略依赖于两个输入参数：短期和长期移动平均线的窗口长度`l[1]`和`l[2]`。每一组参数都对应着若干绩效指标，例如最终收益或夏普比率。每一组参数（`l[1]`和`l[2]`）都会产生一系列独特的交易信号，进而导致特定的最终收益或夏普比率。这些绩效指标作为所选参数“优劣”或有效性的指示。\n\
    \n为了继续寻找最优窗口长度参数集，我们需要一个单一的数值指标来进行优化。这种标量目标函数作为反馈信号，表明当前输入参数集的好坏程度。该目标函数作为反馈信号，指示给定输入参数集的有效性。例如，假设我们选择夏普比率作为要最大化的目标。这就产生了一个目标函数，其输出是特定回测期内的夏普比率`S`，输入参数是窗口长度`l[1]`和`l[2]`，我们可以将目标函数表示为`S\
    \ = f(l[1], l[2])`。这里，`f`代表一个黑箱函数，这意味着我们不知道其显式数学形式或导数信息。黑箱函数是指我们对其数学形式或导数信息没有显式了解的函数。这意味着我们可以评估该函数（即，我们可以确定给定参数集下的夏普比率），但我们没有一个能够直接计算出最优参数的简单公式。这使得全局优化极其困难，因为我们对这个函数的特性知之甚少，而我们的目标是找到它的全局最大值点。\n\
    \n这种对函数缺乏显式了解的情况使得优化问题充满挑战。我们本质上是在搜索一个我们知之甚少的函数的全局最大值。然而，这恰恰是贝叶斯优化旨在解决的问题类型。\n\
    \n更正式地说，我们可以将问题表述为：对于给定的股票，在`[1,10]`和`[11,20]`的范围内（注意，我们需要确保`l[1] < l[2]`），找到使得整个一年回测期内夏普比率最大化的`l[1]`和`l[2]`值。图\
    \ 9-1 总结了优化问题的特征。请注意，不同的交易策略对应不同的未知黑箱函数`f`。即使策略相同，改变回测期也会产生目标函数`f`的不同函数实现。\n\n\
    ![](img/605529_1_En_9_Fig1_HTML.jpg)\n\n优化问题的示意图。黑箱函数`f`接收满足窗口长度`l[1]`小于`l[2]`的输入参数，其显式函数形式或梯度信息不可用，目标是找出能够实现更高夏普比率的那组输入参数。\n\
    \n**图 9-1**  \n说明优化问题。所选交易策略呈现为一个未知函数，我们的目标是搜索能够提供最高绩效指标（本例中为夏普比率）的最优窗口长度集。\n\n\
    下一节将提供关于整个优化过程的更多视角。\n\n### 关于优化的更多内容\n\n优化的目标是在最大化问题中，为所有输入值`x in X`找到最优值`f*\
    \ = f(x*)`或最大化点`x* = argmax f(x)`，这同样也可以是极小化问题。执行优化过程的过程称为优化器。优化器有多种类型，其中随机梯度下降（SGD）是深度学习领域最流行的优化器。在交易策略回测的背景下，我们最感兴趣的是优化风险调整后的收益，通常用夏普比率或最大回撤等其他风险指标表示。此外，我们还面临一个额外的挑战：输入并非连续值，而是离散的，例如窗口大小或交易量。\n\
    \n优化器接收函数`f`，并计算出所需的最优值`f*`或其对应的输入参数`x*`。成为最优值意味着`f(x*)`大于（在极小化问题中则小于）邻域内的任何其他值。这里，`f*`可能是局部最优或全局最优。局部最优意味着`f(x*)`是一座山的山顶，而全局最优意味着该区域所有山峰中的最高点。也就是说，在最大化问题中，我们可以找出所有局部最大值，相互比较，并将其中的最大值作为全局最大值报告。两者都表现为在点`x*`处梯度为零，然而全局最优通常才是我们的目标。优化器需要一种策略来逃离这些局部最优，并继续搜索全局最优。有多种技术可以处理这个问题，包括通过多重启动程序使用不同的初始值，在参数空间中进行随机跳跃，以及使用模拟退火或遗传算法等复杂算法，这些算法采用特定机制来逃离局部最优。\n\
    \n在开发交易策略的背景下，我们感兴趣的是能够给出最大夏普比率的全局最大化点（最优输入参数）。这是一项复杂的任务，因为可能存在许多能产生良好结果的参数集（局部最大值），但我们想找到绝对最好的那个（全局最大值）。\n\
    \n请注意，利用梯度信息来识别最优解代表着我们对优化问题理解的巨大进步，这一方法最初由艾萨克·牛顿提出。在他那个时代之前，我们需要对每一对独特组合进行手动比较，这是一个组合问题，需要耗费大量时间。当函数形式已知时，例如`y\
    \ = x²`，我们可以借助微积分工具，求解梯度为零的点，即`y' = 2x = 0`，得到`x = 0`。然后，我们可以计算二阶导数或应用符号图法来确定这是最大值点还是最小值点。\n\
    \n下一节将进一步介绍全局优化问题。\n"
- fmt: '# Global Optimization


    Optimization aims to locate the optimal set of parameters of interest across the
    whole search domain, often by carefully allocating limited resources. For example,
    when searching for the car key at home before leaving for work in two minutes,
    we would naturally start with the most promising place where we would usually
    put the key. If it is not there, think for a little while about the possible locations
    and go to the next most promising place. This process iterates until the key is
    found. In this example, the search policy is, in a way, behaving intelligently.
    It digests the available information on previous searches and proposes the following
    promising location, so as to use the limited resource wisely. The resource could
    be the limited number of trials we could run before a project deadline approaches
    tomorrow or the two-minute budget to search for the key in this case. The unknown
    function is the house itself, a binary value that reveals if the key is placed
    at the proposed location upon each sampling at the specific location.


    This intelligent search policy represents a cornerstone concept in optimization,
    especially in the context of derivative-free optimization where the unknown function
    does not reveal any derivative information. Here, the policy needs to balance
    exploration, which probes the unknown function at various locations in the search
    domain, and exploitation, which focuses on promising areas where we have already
    identified a good candidate value. This trade-off is usually characterized by
    a learning curve showing the function value of the best-found solution over the
    number of function evaluations.


    The key search example is considered an easy one since we are familiar with the
    environment in terms of its structural design. However, imagine locating an item
    in a totally new environment. The optimizer would need to account for the uncertainty
    due to unfamiliarity with the environment while determining the next sampling
    location via multiple sequential trials. When the sampling budget is limited,
    as is often the case in real-life searches in terms of time and resources, the
    optimizer needs to argue carefully on the utility of each candidate input parameter
    value.


    This process is characterized by sequential decision-making under uncertainty,
    a problem that lies at the heart of the field of optimization. When faced with
    such a situation, optimizers need to develop an intelligent search policy that
    effectively manages the trade-off between exploration (searching new areas) and
    exploitation (capitalizing on known, promising locations). In the context of searching
    for an item in an unfamiliar environment, exploration involves searching in completely
    new areas where the item could potentially be located, while exploitation involves
    focusing the search around areas where clues or signs of the item have already
    been found. The challenge is to balance these two approaches, as focusing too
    much on exploration could lead to a waste of time and resources, while focusing
    too much on exploitation could result in missed opportunities.


    In the world of trading strategies, this situation amounts to a search in a high-dimensional
    parameter space where each dimension represents a different aspect of the trading
    strategy. Exploration would involve trying out completely new sets of parameters,
    while exploitation would involve fine-tuning the most promising sets of parameters
    already discovered. The optimizer aims to effectively navigate this high-dimensional
    space and find the set of parameters that yields the best possible performance
    in terms of the Sharpe ratio or other preset metrics.


    Let us formalize this sequential global optimization using mathematical terms.
    We are dealing with an unknown scalar-valued objective function `f` based on a
    specific domain ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq3.png).
    In other words, the unknown subject of interest `f` is a function that maps a
    certain candidate parameter in ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq4.png)
    to a real number in ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq5.png)
    that is, ![$$ f:\mathcal{X}\to \mathbb{R} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq6.png).
    We typically place no specific assumption about the nature of the domain ![$$
    \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq7.png)
    other than that it should be a bounded, compact, and convex set.


    A bounded set ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq8.png)
    means that it has upper and lower limits, and all values of the parameters contained
    within ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq9.png)
    fall within these bounds. A compact set is one that is both bounded and closed,
    meaning that it includes its boundary. And a convex set is one in which, for any
    two points within the set, the set contains the whole line segment that joins
    them. These assumptions make our problem mathematically tractable and realistic
    in the real-world scenario.


    Unless otherwise specified, we focus on the maximization setting instead of minimization
    since maximizing the objective function is equivalent to minimizing the negated
    objective, followed by another negation to recover the original maximum value.
    The optimization procedure thus aims at locating the global maximum `f^*` or its
    corresponding location `x^*` in a principled and systematic manner. Mathematically,
    we wish to locate `f^*` where:


    ![$$ {f}^{\ast }=\underset{x\in \mathcal{X}}{\max }f(x)=f\left({x}^{\ast}\right)
    $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equa.png)


    Or equivalently, we are interested in its location `x^*` where:


    ![$$ {x}^{\ast }={\mathrm{argmax}}_{\mathrm{x}\in \mathcal{X}}f(x) $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equb.png)


    The `argmax` operation is used in mathematics to denote the argument of the maximum
    or the set of points in the domain ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq10.png)
    that maximizes the function `f`. When used in this optimization problem, it means
    that we are looking for the specific values of the input parameters that yield
    the maximum value of the function.


    Again, note that `f(x)` is unknown and only indirectly observable through sampling,
    and ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq11.png)
    could be a set in a high-dimensional space. So, we are looking for the best parameters
    in a high-dimensional space that we can only explore one sample at a time. This
    is what makes the global optimization problem challenging in practice.


    Figure 9-2 provides an example one-dimensional objective function with its global
    maximum `f^*` and its location `x^*` highlighted. The goal of global optimization
    is thus to systematically reason about a series of sampling decisions within the
    total search space ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq12.png),
    so as to locate the global maximum as fast as possible, that is, sampling as few
    times as possible, instead of conducting random trials or grid search. Besides,
    when the optimizer makes a sequence of decisions about where in the parameter
    space to sample next, each decision is influenced by the results of previous samples
    (also referred to as the training set) and is aimed at improving the estimated
    optimum.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig2_HTML.jpg)'
  raw: '### Global Optimization


    Optimization aims to locate the optimal set of parameters of interest across the
    whole search domain, often by carefully allocating limited resources. For example,
    when searching for the car key at home before leaving for work in two minutes,
    we would naturally start with the most promising place where we would usually
    put the key. If it is not there, think for a little while about the possible locations
    and go to the next most promising place. This process iterates until the key is
    found. In this example, the search policy is, in a way, behaving intelligently.
    It digests the available information on previous searches and proposes the following
    promising location, so as to use the limited resource wisely. The resource could
    be the limited number of trials we could run before a project deadline approaches
    tomorrow or the two-minute budget to search for the key in this case. The unknown
    function is the house itself, a binary value that reveals if the key is placed
    at the proposed location upon each sampling at the specific location.


    This intelligent search policy represents a cornerstone concept in optimization,
    especially in the context of derivative-free optimization where the unknown function
    does not reveal any derivative information. Here, the policy needs to balance
    exploration, which probes the unknown function at various locations in the search
    domain, and exploitation, which focuses on promising areas where we have already
    identified a good candidate value. This trade-off is usually characterized by
    a learning curve showing the function value of the best-found solution over the
    number of function evaluations.


    The key search example is considered an easy one since we are familiar with the
    environment in terms of its structural design. However, imagine locating an item
    in a totally new environment. The optimizer would need to account for the uncertainty
    due to unfamiliarity with the environment while determining the next sampling
    location via multiple sequential trials. When the sampling budget is limited,
    as is often the case in real-life searches in terms of time and resources, the
    optimizer needs to argue carefully on the utility of each candidate input parameter
    value.


    This process is characterized by sequential decision-making under uncertainty,
    a problem that lies at the heart of the field of optimization. When faced with
    such a situation, optimizers need to develop an intelligent search policy that
    effectively manages the trade-off between exploration (searching new areas) and
    exploitation (capitalizing on known, promising locations). In the context of searching
    for an item in an unfamiliar environment, exploration involves searching in completely
    new areas where the item could potentially be located, while exploitation involves
    focusing the search around areas where clues or signs of the item have already
    been found. The challenge is to balance these two approaches, as focusing too
    much on exploration could lead to a waste of time and resources, while focusing
    too much on exploitation could result in missed opportunities.


    In the world of trading strategies, this situation amounts to a search in a high-dimensional
    parameter space where each dimension represents a different aspect of the trading
    strategy. Exploration would involve trying out completely new sets of parameters,
    while exploitation would involve fine-tuning the most promising sets of parameters
    already discovered. The optimizer aims to effectively navigate this high-dimensional
    space and find the set of parameters that yields the best possible performance
    in terms of the Sharpe ratio or other preset metrics.


    Let us formalize this sequential global optimization using mathematical terms.
    We are dealing with an unknown scalar-valued objective function *f* based on a
    specific domain ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq3.png)
    . In other words, the unknown subject of interest *f* is a function that maps
    a certain candidate parameter in ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq4.png)
    to a real number in ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq5.png)
    that is, ![$$ f:\mathcal{X}\to \mathbb{R} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq6.png)
    . We typically place no specific assumption about the nature of the domain ![$$
    \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq7.png)
    other than that it should be a bounded, compact, and convex set.


    A bounded set ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq8.png)
    means that it has upper and lower limits, and all values of the parameters contained
    within ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq9.png)
    fall within these bounds. A compact set is one that is both bounded and closed,
    meaning that it includes its boundary. And a convex set is one in which, for any
    two points within the set, the set contains the whole line segment that joins
    them. These assumptions make our problem mathematically tractable and realistic
    in the real-world scenario.


    Unless otherwise specified, we focus on the maximization setting instead of minimization
    since maximizing the objective function is equivalent to minimizing the negated
    objective, followed by another negation to recover the original maximum value.
    The optimization procedure thus aims at locating the global maximum *f* ^∗ or
    its corresponding location *x* ^∗ in a principled and systematic manner. Mathematically,
    we wish to locate *f* ^∗ where


    ![$$ {f}^{\ast }=\underset{x\in \mathcal{X}}{\max }f(x)=f\left({x}^{\ast}\right)
    $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equa.png)


    Or equivalently, we are interested in its location *x*^∗ where


    ![$$ {x}^{\ast }={\mathrm{argmax}}_{\mathrm{x}\in \mathcal{X}}f(x) $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equb.png)


    The argmax operation is used in mathematics to denote the argument of the maximum
    or the set of points in the domain ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq10.png)
    that maximizes the function *f*. When used in this optimization problem, it means
    that we are looking for the specific values of the input parameters that yield
    the maximum value of the function.


    Again, note that *f* (*x*) is unknown and only indirectly observable through sampling,
    and ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq11.png)
    could be a set in a high-dimensional space. So, we are looking for the best parameters
    in a high-dimensional space that we can only explore one sample at a time. This
    is what makes the global optimization problem challenging in practice.


    Figure [9-2](#605529_1_En_9_Chapter.xhtml#Fig2) provides an example one-dimensional
    objective function with its global maximum *f* ^∗ and its location *x* ^∗ highlighted.
    The goal of global optimization is thus to systematically reason about a series
    of sampling decisions within the total search space ![$$ \mathcal{X} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq12.png)
    , so as to locate the global maximum as fast as possible, that is, sampling as
    few times as possible, instead of conducting random trials or grid search. Besides,
    when the optimizer makes a sequence of decisions about where in the parameter
    space to sample next, each decision is influenced by the results of previous samples
    (also referred to as the training set) and is aimed at improving the estimated
    optimum.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig2_HTML.jpg)'
  trans: '

    # 全局优化


    优化旨在通过精心分配有限资源，在整个搜索域中定位最优的参数集。例如，当您需要在两分钟后出门上班前在家中寻找车钥匙时，我们自然会从最有可能放钥匙的地方开始找起。如果那里没有，就会稍作思考可能的其他位置，然后前往下一个最有可能的地方。这个过程会不断重复，直到找到钥匙为止。在这个例子中，搜索策略在某种程度上表现得非常智能。它会消化之前搜索中获得的可用信息，并提出下一个有希望的位置，从而明智地利用有限资源。这里的资源可以是项目截止日期（明天）前我们能进行的有限尝试次数，或者在这个例子中寻找钥匙的两分钟预算。未知函数就是房子本身，它是一个二进制值，在每次对特定位置采样时，会揭示钥匙是否被放在了所提议的位置。


    这种智能搜索策略代表了优化中的一个基石概念，尤其是在无导数优化领域，因为未知函数不会透露任何导数信息。在这里，策略需要平衡**探索**（在搜索域中的不同位置探测未知函数）和**利用**（专注于我们已经发现良好候选值的有前景区域）。这种权衡通常通过一条学习曲线来表征，该曲线显示了最佳已发现解的函数值随函数评估次数的变化情况。


    寻找钥匙的例子被认为是一个简单的例子，因为我们熟悉其结构设计所构成的环境。但是，想象一下在一个完全陌生的环境中定位一个物品。优化器在通过多次顺序采样确定下一个采样位置时，需要考虑到因环境不熟悉所带来的不确定性。当采样预算有限（在现实生活中的搜索中，时间与资源常常如此受限）时，优化器需要仔细权衡每个候选输入参数值的效用。


    这个过程的特点是**在不确定性下的序贯决策**，这也是优化领域的核心问题。当面临这种情况时，优化器需要制定一个智能的搜索策略，以有效管理探索（搜索新区域）与利用（利用已知的有前景位置）之间的权衡。在陌生环境中搜索物品的语境下，探索涉及搜索物品可能存在的全新区域，而利用则涉及聚焦于已经找到物品线索或迹象的周围区域。挑战在于平衡这两种方法，因为过于侧重探索可能导致时间和资源浪费，而过于侧重利用则可能导致错失良机。


    在交易策略的世界里，这种情况相当于在一个高维参数空间中进行搜索，每个维度代表交易策略的一个不同方面。探索将涉及尝试一套全新的参数，而利用则涉及对已经发现的最有前景的参数集进行微调。优化器的目标是有效地在这片高维空间中导航，并找到一组参数，使其在夏普比率或其他预设指标方面表现出最佳性能。


    让我们用数学术语来形式化这个序贯全局优化问题。我们面对的是一个定义在特定域 ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq3.png)
    上的未知标量值目标函数 `f`。换句话说，这个未知的感兴趣对象 `f` 是一个函数，它将 ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq4.png)
    中的某个候选参数映射到 ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq5.png) 中的一个实数，即
    ![$$ f:\mathcal{X}\to \mathbb{R} $$](img/605529_1_En_9_Chapter_TeX_IEq6.png)。通常，我们对域
    ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq7.png) 的性质不做特别假设，除了它应该是一个有界、紧致且凸的集合。


    有界集 ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq8.png) 意味着它具有上限和下限，并且包含在
    ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq9.png) 内的所有参数值都落在这些边界内。紧致集是指既有界又封闭的集合，意味着它包含其边界。凸集则是指对于集合内的任意两点，该集合包含连接这两点的整个线段。这些假设使我们的问题在数学上易于处理，并且在现实世界场景中具有实际意义。


    除非另有说明，我们关注的是最大化问题而非最小化问题，因为最大化目标函数等价于最小化其相反数，然后再取反得到原始最大值。因此，优化过程旨在以一种有原则且系统化的方式定位全局最大值
    `f^*` 或其对应位置 `x^*`。从数学上讲，我们希望定位到满足下式的 `f^*`：


    ![$$ {f}^{\ast }=\underset{x\in \mathcal{X}}{\max }f(x)=f\left({x}^{\ast}\right)
    $$](img/605529_1_En_9_Chapter_TeX_Equa.png)


    或者等价地，我们感兴趣的是其位置 `x^*`，满足：


    ![$$ {x}^{\ast }={\mathrm{argmax}}_{\mathrm{x}\in \mathcal{X}}f(x) $$](img/605529_1_En_9_Chapter_TeX_Equb.png)


    `argmax` 操作在数学中用于表示函数 `f` 取得最大值的自变量或域 ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq10.png)
    中的点集。当用于此优化问题时，它意味着我们在寻找能够产生函数最大值的那些特定的输入参数值。


    再次注意，`f(x)` 是未知的，只能通过采样间接观察，并且 ![$$ \mathcal{X} $$](img/605529_1_En_9_Chapter_TeX_IEq11.png)
    可能是一个高维空间中的集合。因此，我们在一个高维空间中寻找最佳参数，而每次只能探索一个样本。这正是使全局优化问题在实践中具有挑战性的原因。


    图 9-2 展示了一个一维目标函数的例子，并突出显示了其全局最大值 `f^*` 及其位置 `x^*`。因此，全局优化的目标是在整个搜索空间 ![$$ \mathcal{X}
    $$](img/605529_1_En_9_Chapter_TeX_IEq12.png) 内系统地推演一系列采样决策，以尽可能快地定位全局最大值——即尽可能少地采样，而不是进行随机试验或网格搜索。此外，当优化器就参数空间中下一个采样位置做出系列决策时，每个决策都会受到先前样本（也称为训练集）结果的影响，并且旨在改进对最优值的估计。


    ![](img/605529_1_En_9_Fig2_HTML.jpg)

    '
- fmt: '`f` 相对于 `x` 的折线图描绘了一条具有 2 个波峰和 3 个波谷的递减曲线。波峰标记了全局最大值。`x` 轴代表整个搜索空间。


    **图 9-2**


    一个带有全局最大值`f^∗`及其位置`x^∗`的示例目标函数。全局优化的目标是系统地推理一系列采样决策，以便尽可能快地定位全局最大值。


    请注意，这是一个非凸函数，这在我们优化的现实函数中很常见。非凸函数意味着函数中存在多个局部最优点。因此，我们无法像处理凸函数`y = x²`那样，依赖基于一阶梯度的可靠方法来搜索全局最优解。使用基于梯度的方法（例如求解使原始函数梯度为零的解）很可能会收敛到局部最优解。这也是贝叶斯优化（后面将作为全局优化技术介绍）与其它用于局部搜索的基于梯度优化程序相比的优势之一。


    下一节将更多讨论目标函数。


    ### 目标函数


    目标函数决定了感兴趣的量是如何生成的。如果我们知道其显式表达式，整个章节就可以完成；如果我们能够访问其底层数学形式，问题就可以被认为解决了。不幸的是，现实生活中的许多目标函数对我们来说是黑盒：例如某公司第二天的股票价格、两天后的天气，或者利率开始下降的确切时间点。即使目标函数是一个黑盒，我们仍然可以利用优化技术，在给定的数据和资源下找到尽可能最好的解决方案。


    目标函数有不同的类型。例如，有些函数形状蜿蜒曲折，而有些则平滑；有些是凸函数，而另一些是非凸函数。许多复杂的函数几乎无法用显式表达式来表示。针对决定交易策略性能的特定类型目标函数，我们总结出以下常见属性：


    - 我们无法访问目标函数的显式表达式，使其成为一个“黑盒”函数。这意味着我们只能通过在特定位置进行采样来执行函数评估，从而与目标函数交互。

    - 通过探查特定输入参数值所返回的值，对回测期的选择高度敏感。换句话说，它经常被噪声污染，并不代表该位置目标函数的真实精确值。由于对其实际值的间接评估，我们需要考虑函数评估实际观测值中所蕴含的这种噪声。

    - 每次函数评估的成本很高，因此排除了进行全面探查的可能性。我们需要一种样本高效的评估方法，以最小化对交易策略的评估次数，同时尝试定位其全局最优解。换句话说，优化器需要充分利用已有的观测结果，并系统地推理下一个采样决策，以便将有限的资源合理用于有希望的候选参数值上。

    - 我们无法访问其梯度。当函数评估相对廉价且函数形式平滑时，通过计算/估计梯度并使用诸如梯度下降等一阶程序进行优化会非常方便。访问梯度对于我们理解特定评估点附近的曲率是必要的。有了梯度评估，后续的移动方向就更容易确定。


    由于上述原因，像根据两个窗口长度参数计算夏普比率这样的黑盒函数，优化起来颇具挑战性。为了进一步阐述目标可能存在的函数形式，我们在最小化场景中列出了三个代表性示例，如图
    [9-3](#605529_1_En_9_Chapter.xhtml#Fig3) 所示。左侧是一个只有一个全局最小值的凸函数；这对于全局优化来说是容易的，因为我们只需将函数的导数设为零，然后求解输入变量的最优值。中间是一个具有多个局部最优点的非凸函数；很难确定当前的局部最优点是否也是全局最优的。对于右侧面板所示的、充满鞍点的平坦区域的函数，也很难辨别这是一个平坦区域还是一个局部最优点。这种非凸性使得高效执行全局优化变得困难。


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig3_HTML.jpg)


    3 条 `f` 相对于 `x` 的折线图。左侧：抛物线。弯曲的波谷代表具有唯一全局最小值的凸函数。中间：波动趋势。3 个波谷代表具有多个局部最小值的非凸函数。右侧：下降、平稳、然后上升。具有平坦区域（包含许多鞍点）的非凸函数。'
  raw: 'A line graph of f versus x represents a decreasing curve with 2 peaks and
    3 troughs. The peak marks the global maximum. The x-axis is the total search space.


    Figure 9-2


    An example objective function with the global maximum *f* ^∗ and its location
    *x*^∗. The goal of global optimization is to systematically reason about a series
    of sampling decisions so as to locate the global maximum as fast as possible


    Note that this is a nonconvex function, as is often the case in real-life functions
    we are optimizing. A nonconvex function means that there are multiple local optima
    in the function. Thus, we could not resort to first-order gradient-based methods
    to reliably search for the global optimum, as we did for the convex function *y* = *x*².
    Using the gradient-based method, such as solving for the solution that makes the
    gradient of the original function equal to zero, will likely converge to a local
    optimum. This is also one of the advantages of Bayesian optimization, introduced
    as a global optimization technique later, compared with other gradient-based optimization
    procedures for local search.


    The next covers more on the objective function.


    ### The Objective Function


    The objective function governs how the quantity of interest is generated. The
    whole chapter would be finished if we knew its explicit expression, and the problem
    would be considered solved if we could access its underlying mathematical form.
    Unfortunately, many objective functions in real life are black boxes to us: the
    stock price of a given company the next day, the weather two days from now, or
    the exact time point when the interest rate starts to go down. Even though the
    objective function is a black box, we can still use optimization techniques to
    find the best possible solution given the available data and resources.


    There are different types of objective functions. For example, some functions
    are wiggly shaped, while others are smooth; some are convex, while others are
    nonconvex. Many complex functions are almost impossible to be expressed using
    an explicit expression. For the specific type of objective functions that govern
    the performance of trading strategies, we summarize the following common attributes:


    *   We do not have access to the explicit expression of the objective function,
    making it a “black-box” function. This means we can only interact with the objective
    function by sampling at a specific location to perform a functional evaluation.


    *   The returned value by probing at a specific input parameter value is highly
    sensitive to the choice of backtesting period. In other words, it is often corrupted
    by noise and does not represent the exact true value of the objective function
    at that location. Due to the indirect evaluation of its actual value, we need
    to account for such noise embedded in the actual observations from the functional
    evaluation.


    *   Each functional evaluation is costly, thus ruling out the option for an exhaustive
    probing exercise. We need a sample-efficient method to minimize the number of
    evaluations of the trading strategy while trying to locate its global optimum.
    In other words, the optimizer needs to fully utilize the existing observations
    and systematically reason about the next sampling decision so that the limited
    resource is well spent on promising candidate parameter values.


    *   We do not have access to its gradient. When the functional evaluation is relatively
    cheap, and the functional form is smooth, it would be very convenient to compute/estimate
    the gradient and optimize using the first-order procedure such as gradient descent.
    Access to the gradient is necessary for us to understand the adjacent curvature
    of a particular evaluation point. With gradient evaluations, the follow-up direction
    of travel is easier to determine.


    The black-box function, such as the one that calculates the Sharpe ratio based
    on two window length parameters, is challenging to optimize for the preceding
    reasons. To further elaborate on the possible functional form of the objective,
    we list three representative examples in a minimization setting, as shown in Figure
    [9-3](#605529_1_En_9_Chapter.xhtml#Fig3). On the left is a convex function with
    only one global minimum; this is considered easy for global optimization, since
    we could just set the derivative of the function to zero and solve for the optimal
    value of the input variable. In the middle is a nonconvex function with multiple
    local optima; it is difficult to ascertain if the current local optimum is also
    globally optimal. It is also difficult to identify whether this is a flat region
    vs. a local optimum for a function with a flat region full of saddle points, as
    shown on the right panel. Such nonconvexity makes it difficult to perform global
    optimization efficiently.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig3_HTML.jpg)


    3 line graphs of f versus x. Left. Parabola. Curved trough marks convex function
    with unique global minimum. Middle. Fluctuating trend. 3 troughs mark nonconvex
    function with multiple local minima. Right. drop, stable, and rise. Non-convex
    function with flat region consisting of many saddle points.'
  trans: '

    `f` 相对于 `x` 的折线图描绘了一条具有 2 个波峰和 3 个波谷的递减曲线。波峰标记了全局最大值。`x` 轴代表整个搜索空间。


    **图 9-2**


    一个带有全局最大值`f^∗`及其位置`x^∗`的示例目标函数。全局优化的目标是系统地推理一系列采样决策，以便尽可能快地定位全局最大值。


    请注意，这是一个非凸函数，这在我们优化的现实函数中很常见。非凸函数意味着函数中存在多个局部最优点。因此，我们无法像处理凸函数`y = x²`那样，依赖基于一阶梯度的可靠方法来搜索全局最优解。使用基于梯度的方法（例如求解使原始函数梯度为零的解）很可能会收敛到局部最优解。这也是贝叶斯优化（后面将作为全局优化技术介绍）与其它用于局部搜索的基于梯度优化程序相比的优势之一。


    下一节将更多讨论目标函数。


    ### 目标函数


    目标函数决定了感兴趣的量是如何生成的。如果我们知道其显式表达式，整个章节就可以完成；如果我们能够访问其底层数学形式，问题就可以被认为解决了。不幸的是，现实生活中的许多目标函数对我们来说是黑盒：例如某公司第二天的股票价格、两天后的天气，或者利率开始下降的确切时间点。即使目标函数是一个黑盒，我们仍然可以利用优化技术，在给定的数据和资源下找到尽可能最好的解决方案。


    目标函数有不同的类型。例如，有些函数形状蜿蜒曲折，而有些则平滑；有些是凸函数，而另一些是非凸函数。许多复杂的函数几乎无法用显式表达式来表示。针对决定交易策略性能的特定类型目标函数，我们总结出以下常见属性：


    -   我们无法访问目标函数的显式表达式，使其成为一个“黑盒”函数。这意味着我们只能通过在特定位置进行采样来执行函数评估，从而与目标函数交互。

    -   通过探查特定输入参数值所返回的值，对回测期的选择高度敏感。换句话说，它经常被噪声污染，并不代表该位置目标函数的真实精确值。由于对其实际值的间接评估，我们需要考虑函数评估实际观测值中所蕴含的这种噪声。

    -   每次函数评估的成本很高，因此排除了进行全面探查的可能性。我们需要一种样本高效的评估方法，以最小化对交易策略的评估次数，同时尝试定位其全局最优解。换句话说，优化器需要充分利用已有的观测结果，并系统地推理下一个采样决策，以便将有限的资源合理用于有希望的候选参数值上。

    -   我们无法访问其梯度。当函数评估相对廉价且函数形式平滑时，通过计算/估计梯度并使用诸如梯度下降等一阶程序进行优化会非常方便。访问梯度对于我们理解特定评估点附近的曲率是必要的。有了梯度评估，后续的移动方向就更容易确定。


    由于上述原因，像根据两个窗口长度参数计算夏普比率这样的黑盒函数，优化起来颇具挑战性。为了进一步阐述目标可能存在的函数形式，我们在最小化场景中列出了三个代表性示例，如图
    9-3 所示。左侧是一个只有一个全局最小值的凸函数；这对于全局优化来说是容易的，因为我们只需将函数的导数设为零，然后求解输入变量的最优值。中间是一个具有多个局部最优点的非凸函数；很难确定当前的局部最优点是否也是全局最优的。对于右侧面板所示的、充满鞍点的平坦区域的函数，也很难辨别这是一个平坦区域还是一个局部最优点。这种非凸性使得高效执行全局优化变得困难。


    ![](img/605529_1_En_9_Fig3_HTML.jpg)


    3 条 `f` 相对于 `x` 的折线图。左侧：抛物线。弯曲的波谷代表具有唯一全局最小值的凸函数。中间：波动趋势。3 个波谷代表具有多个局部最小值的非凸函数。右侧：下降、平稳、然后上升。具有平坦区域（包含许多鞍点）的非凸函数。

