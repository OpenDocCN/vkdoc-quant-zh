  trans: '

    ### 订单匹配系统


    证券交易所需要将一笔或多笔主动买单与一笔或多笔卖单配对，以完成交易。这个过程被称为交易订单匹配。当一位投资者想要购买特定数量的股票，而另一位投资者希望以相同价格卖出相同数量时，双方的订单便得以匹配，交易随即发生。这种配对订单的过程称为订单匹配，交易所通过该过程识别买单（即出价）与相应的卖单（即要价），并将两者配对执行。


    这一订单匹配过程几乎已完全自动化，利用基于规则的系统，在满足特定条件时执行交易配对。大多数交易所、部分券商以及几乎所有电子通信网络都采用基于规则的订单匹配系统。这些交易规则根据交易者提交的特定规模订单来安排交易，无需进行面对面协商。请注意，这些系统遵循特定的订单优先规则。


    订单优先规则是一套准则，用于确定市场中订单匹配和执行的优先顺序。这些规则旨在通过决定队列中哪些订单优先于其他订单，确保订单匹配过程的公平与高效。大多数交易系统遵循三种主要的订单优先规则：价格优先、时间优先和规模优先。


    - **价格优先**：价格更优的订单优先于价格较差的订单。就买单而言，出价更高的优先；对于卖单，要价更低的优先。此规则确保愿意以更高价格买入或更低价格卖出的市场参与者，其订单能优先执行。

    - **时间优先**：如果两个或多个订单价格相同，则先提交的订单优先。此规则也称为“先到先得”原则，奖励较早提交订单的交易者，确保他们不会因其他人在相同价格上稍后提交订单而处于劣势。

    - **规模优先**：在某些市场中，当多个订单价格和时间优先级相同时，规模较大的订单可能获得优先权。此规则鼓励市场参与者提交更大规模的订单，这有助于增强市场流动性。


    电子交易所常见的订单类型有三种：限价单、市价单和撤销单。限价单必须包含限价价格、订单规模和交易方向（买入或卖出）等信息。市价单必须包含订单规模和交易方向。撤销单用于完全取消一个已有的限价单，或减少其订单规模。


    请注意，一些交易所，如伦敦证券交易所和纽约证券交易所集团，支持允许交易者指定其限价单是否在限价订单簿（`LOB`）上显示的功能。这被称为显示（显示）或不显示（不显示）。在这种情况下，限价单必须至少包含以下信息：


    - 限价价格

    - 订单规模

    - 交易方向

    - 显示或不显示

    - 如果显示，需显示的规模


    执行时会考虑几种常见的订单优先规则。就订单类型优先级而言，市价单始终高于限价单。就价格优先级而言，价格更具竞争力的规则优先。显示优先级表现为显示或不显示的偏好，而时间优先级则依据订单到达的时间。


    大多数交易所采用的规则是价格/显示/时间优先规则，以确定执行优先级。具体来说，最高出价和最低要价总是先于较低出价和较高要价执行。在价格相同的订单中，显示订单总是先于不显示订单执行。在同一价格水平的显示订单和不显示订单中，到达时间决定订单的优先级。


    价格/显示/时间优先规则通过根据订单的竞争力、可见性和提交时间来确定优先级，从而确保公平高效的交易环境。遵循此规则，电子交易所能够维护透明有序的市场，鼓励市场参与者提交具有竞争力的订单，并增强流动性。


    除了前面讨论的常见订单类型和优先规则外，许多电子交易所还提供各种高级订单类型和条件订单，旨在满足交易者的多样化需求。这些可能包括：


    - **止损单**：这类订单在达到特定价格水平时被触发。止损单可用于限制亏损、保护利润或在特定价格水平被突破时建立头寸。它们可进一步细分为止损市价单和止损限价单。

    - **冰山订单**：这些是大额订单，被分割成较小的部分，任何时候只有一部分订单在订单簿上可见。一旦可见部分被执行，下一部分才会显示。这有助于减少大额订单对市场的影响，并可防止信息泄露。

    - **追踪止损单**：此类订单允许交易者设置一个止损价格，该价格跟随市场价格并按特定距离移动。随着市场价格向有利方向变动，止损价格也会相应调整，有助于保护收益，同时为头寸留出运行空间。


    通过提供多样化的订单类型并遵循明确的优先规则，电子交易所能够为市场参与者提供灵活高效的交易环境。这使得交易者能够有效管理风险、优化执行，并根据其所交易金融工具的独有特点来量身定制交易策略。

    '
- fmt: '### Market Order


    The market order is the most common transaction type in the stock markets. It
    is an instruction by an investor to a broker to buy or sell stock shares, bonds,
    or other assets at the best available price in the current financial market. This
    means a market order instructs the broker to buy or sell a security immediately
    at the current price. Since there will be plenty of willing buyers and sellers
    for large-cap stocks, futures, or ETFs, market orders are best used for buying
    or selling these financial instruments with high liquidity.


    Since the market order is an instruction to trade a given quantity at the best
    price possible, the priority of the market-order trader is to execute the order
    immediately with no specific price limit. Thus, the main risk is the uncertainty
    of the ultimate execution price. Once submitted, the market order cannot be canceled
    since it has already been executed.


    Note that the electronic market orders don’t wait. Upon receipt of a market order,
    the exchange will match it against the standing limit orders immediately until
    it is completely filled. Such immediacy characterizes market orders compared to
    limit orders (introduced in the following section). This means that when filling
    a market order, the order matching system will buy at the (ideally) lowest ask
    price or sell at the highest bid price, thus ending up paying the bid/ask spread.


    Given the nature of market orders, they are particularly suitable for situations
    where the primary goal is to execute a trade quickly, rather than achieving a
    specific target price. This makes market orders especially useful in fast-moving
    or volatile market conditions, where getting in or out of a position promptly
    is crucial. However, the urgency of market orders also exposes investors to the
    risk of price slippage, which occurs when the actual execution price differs from
    the expected price due to rapid market fluctuations.


    It is important for investors to understand that market orders offer no price
    protection, meaning that the execution price may be significantly different from
    the current market price, especially for illiquid or thinly traded instruments.
    In such cases, limit orders may be a more appropriate choice, as they allow investors
    to specify a maximum purchase price or a minimum sale price for their orders,
    providing some level of price control. However, limit orders come with the trade-off
    of potentially not being executed if the specified price is not met.


    ### Limit Order


    A limit order, which instructs the broker to buy or sell at the best price available
    only if the price is no worse than the price limit specified by the investor,
    is the main alternative to the market order for most individual investors. It
    is preferable when buying or selling a less frequently traded or highly volatile
    asset.


    During regular hours, limit orders are arranged according to the exchange’s limit
    price and time of receipt. When a buy market order arrives, first in the queue
    limit order selling at the lowest ask price gets matched first. When a sell market
    order arrives, first in the queue limit orders bidding at the highest bid price
    gets executed first. If the order is not executable, the order will be a standing
    offer and placed in a file called a limit order book.


    A buy limit order is an order to purchase a financial instrument at or below a
    specified price, allowing traders to control how much they would pay for the instrument.
    In other words, the investor is guaranteed to pay that price or less by using
    a limit order to make a purchase.


    Although the price is guaranteed, the order being filled is not guaranteed to
    be executed in time. After all, a buy limit order will only be executed if the
    asking price is at or below the specified limit price. If the asset does not reach
    the specified price or moves too quickly through the price, the order is not filled
    and will be stacked into the limit order book, causing the investor to miss out
    on the trading opportunity. That is, by using a buy limit order, the investor
    is guaranteed to pay the buy limit order price or better but is not guaranteed
    to have the order filled.


    The same reasoning applies to the sell limit order, where the investor will sell
    the financial instrument at or above a specified selling price. A sell limit order
    allows traders to set a minimum selling price for their financial instruments.
    In this case, the investor is guaranteed to receive the specified price or a better
    price for the sale, but there is no guarantee that the order will be executed.
    A sell limit order will only be filled if the bid price is at or above the specified
    limit price. If the asset does not reach the specified price or moves too quickly
    through the price, the order is not filled and will be stored in the limit order
    book, potentially causing the investor to miss out on the trading opportunity.


    Limit orders offer more control over the execution price than market orders and
    can be particularly useful when trading illiquid or volatile assets, where price
    slippage is more likely. However, they also come with the risk that the order
    may not be executed if the specified price is not reached, potentially resulting
    in missed trading opportunities.


    To maximize the chances of a limit order being executed, traders should carefully
    monitor market conditions and adjust their limit prices accordingly. They may
    also consider using other advanced order types, such as stop-limit orders or trailing
    stop-limit orders, which combine the features of limit orders with additional
    conditions, providing even greater control over the execution price and risk management.'
