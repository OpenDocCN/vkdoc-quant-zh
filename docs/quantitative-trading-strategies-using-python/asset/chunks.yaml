    2023-01-05    0.007965

    2023-01-06    0.014690

    2023-01-09    0.002242

    2023-01-10    0.000352

    2023-01-11    0.009001

    2023-01-12    0.002259

    2023-01-13    0.000308

    2023-01-17    0.011068

    2023-01-18    0.000882

    2023-01-19    0.016097

    dtype: float64

    ```


    结果显示的是两只股票组合的每日标准差。


    现在我们通过前面描述的精确步骤，演示如何手动计算波动率。第一步是去除每日收益的均值，得到与（算术）均值的偏差：


    ```

    deviations_df = returns_df - returns_df.mean()

    >>> deviations_df.head()

    AAPL      GOOG

    2023-01-04  0.003086 -0.015332

    2023-01-05 -0.017833 -0.026164

    2023-01-06  0.029566  0.011724

    2023-01-09 -0.003139  0.002964

    2023-01-10 -0.002772  0.000660

    ```


    下一步是平方这些偏差，这样在求和时它们就不会相互抵消。平方相当于将元素提升到2次幂，使用双星号表示法：


    ```

    squared_deviations_df = deviations_df**2

    >>> squared_deviations_df.head()

    AAPL     GOOG

    2023-01-04 0.000010 2.350688e-04

    2023-01-05 0.000318 6.845668e-04

    2023-01-06 0.000874 1.374582e-04

    2023-01-09 0.000010 8.787273e-06

    2023-01-10 0.000008 4.352158e-07

    ```


    第三步，使用`mean()`函数对这些每日平方偏差求平均值：


    ```

    variance = squared_deviations_df.mean()

    >>> variance

    AAPL    0.000154

    GOOG    0.000235

    dtype: float64

    ```


    最后一步是对方差取平方根，得到波动率：


    ```

    volatility = np.sqrt(variance)

    >>> volatility

    AAPL    0.012390

    GOOG    0.015337

    dtype: float64

    ```


    注意，这个结果与使用`std()`函数得到的结果不同！造成差异的原因是`std()`函数计算的是样本标准差，其分母除以`N`−1，而我们的手动计算中分母除以`N`。


    为了纠正这一点，让我们重新审视第三步，这次将平方偏差之和除以`N`−1。在代码清单4-5中，我们首先使用`shape()`函数的第一个维度（行维度）获取行数`N`，然后根据方差公式代入计算。


    ```

    num_rows = squared_deviations_df.shape[0]

    variance2 = squared_deviations_df.sum() / (num_rows-1)

    >>> variance2

    AAPL    0.000169

    GOOG    0.000259

    dtype: float64

    代码清单4-5 计算样本方差

    ```


    现在取平方根得到的结果与使用`std()`函数相同：


    ```

    volatility2 = np.sqrt(variance2)

    >>> volatility2

    AAPL    0.012995

    GOOG    0.016086

    dtype: float64

    ```


    现在我们得到了衡量每日收益围绕均值离散程度的单期波动率，下一节将计算年化波动率。


    ## 计算年化波动率


    根据将单期波动率年化为年度波动率的公式，我们可以按如下方式计算年化波动率，其中一年的总时段长度`T`=252：


    ```

    annualized_vol = returns_df.std()*np.sqrt(252)

    >>> annualized_vol

    AAPL    0.206289

    GOOG    0.255356

    dtype: float64

    ```


    我们也可以通过将252提升到0.5次幂来计算252的平方根，结果相同：


    ```

    annualized_vol = returns_df.std()*(252**0.5)

    >>> annualized_vol

    AAPL    0.206289

    GOOG    0.255356

    dtype: float64

    ```


    下一节将介绍收益的年化计算。


    ## 计算年化收益


    这里需要注意的一点是，收益遵循序贯复利过程。这意味着一旦我们获得了单期平均收益，就需要按照相应的频率将其复利化以达到一年的长度。为了计算单期平均收益，我们取收益的几何平均数。在这种情况下，几何平均数是比算术平均数更好的选择，因为它考虑了序贯复利的影响。


    具体来说，我们首先按如下方式计算收益的几何平均数。需要注意的是，在分析资产的累计收益时，几何平均数与序贯复利性质相一致：


    ```

    returns_per_day = (returns_df+1).prod()**(1/returns_df.shape[0]) - 1

    >>> returns_per_day

    AAPL    0.007153

    GOOG    0.004178

    dtype: float64

    ```


    让我们分解这里的操作序列。首先，我们为每一天在`(returns_df+1)`中构造1+R收益，然后使用`prod()`函数执行序贯复利，以获得1+R格式的累计终期收益。在减1之前，我们将其提升到1/`N`次幂，其中`N`是DataFrame的行数。这给出了1+R格式的收益几何平均数。这里我们不使用算术平均数。


    现在进入年化部分。如代码清单4-6所示，我们假设一个固定的每日收益作为几何平均数，并将其向前滚动一年，对应252个交易日。再次强调，在1+R收益和普通收益之间进行转换。


    ```

    annualized_return = (returns_per_day+1)**252-1

    >>> annualized_return

    AAPL    5.025830

    GOOG    1.859802

    dtype: float64

    代码清单4-6 年化每日收益

    ```


    看起来苹果在最初几天的表现远好于谷歌。


    还有另一种计算年化收益的方法，速度更快：


    ```

    annualized_return = (returns_df+1).prod()**(252/returns_df.shape[0])-1

    >>> annualized_return

    AAPL    5.025830

    GOOG    1.859802

    dtype: float64

    ```


    这里的关键变化是，我们将终期收益提升到252/`N`次幂。这是一种标准化做法，将每日尺度转换到年度尺度。


    ## 计算夏普比率


    最后，让我们计算两只股票的夏普比率。我们假设无风险利率为3%，通过从年化收益中减去该利率来计算超额收益，然后除以年化波动率得到夏普比率。如代码清单4-7所示：


    ```

    riskfree_rate = 0.03

    excess_return = annualized_return - riskfree_rate

    sharpe_ratio = excess_return/annualized_vol

    >>> sharpe_ratio

    AAPL    24.217681

    GOOG     7.165694

    dtype: float64

    代码清单4-7 计算夏普比率

    ```


    因此，作为风险调整后收益的夏普比率，苹果在最初几天远高于谷歌。'
  raw: '### Calculating the Mean, Variance, and Standard Deviation


    The column-wise arithmetic mean returns can be obtained by calling the `mean()`
    method of the returns DataFrame:


    ```

    >>> returns_df.mean()

    AAPL    0.007228

    GOOG    0.004295

    dtype: float64

    ```


    It seems Apple is having a better start than Google at the beginning of the year.
    To calculate the standard deviation or volatility of the returns, we can use the
    `std()` function. However, to see the column-wise operation in action, we explicitly
    specify `axis=0` in the input argument, which says that the standard deviation
    should be taken along the columns:


    ```

    >>> returns_df.std(axis=0)

    AAPL    0.012995

    GOOG    0.016086

    dtype: float64

    ```


    Google’s stock prices were more volatile than Apple’s in the first few days. Now
    let us try setting `axis=1`:


    ```

    >>> returns_df.std(axis=1)

    2023-01-04    0.015097

    2023-01-05    0.007965

    2023-01-06    0.014690

    2023-01-09    0.002242

    2023-01-10    0.000352

    2023-01-11    0.009001

    2023-01-12    0.002259

    2023-01-13    0.000308

    2023-01-17    0.011068

    2023-01-18    0.000882

    2023-01-19    0.016097

    dtype: float64

    ```


    The result shows the daily standard deviation calculated for the two stocks combined.


    Now we show how to calculate the volatility manually by going through the exact
    steps described earlier. Our first step is to de-mean the daily returns and obtain
    the deviations from the (arithmetic) mean:


    ```

    deviations_df = returns_df - returns_df.mean()

    >>> deviations_df.head()

    AAPL      GOOG

    2023-01-04  0.003086 -0.015332

    2023-01-05 -0.017833 -0.026164

    2023-01-06  0.029566  0.011724

    2023-01-09 -0.003139  0.002964

    2023-01-10 -0.002772  0.000660

    ```


    The next step is to square these deviations so that they would not cancel each
    other when summing together. Squaring is the same as raising the element to the
    power of two, using the double asterisk notation:


    ```

    squared_deviations_df = deviations_df**2

    >>> squared_deviations_df.head()

    AAPL     GOOG

    2023-01-04 0.000010 2.350688e-04

    2023-01-05 0.000318 6.845668e-04

    2023-01-06 0.000874 1.374582e-04

    2023-01-09 0.000010 8.787273e-06

    2023-01-10 0.000008 4.352158e-07

    ```


    In the third step, we average these daily squared deviations using the `mean()`
    function:


    ```

    variance = squared_deviations_df.mean()

    >>> variance

    AAPL    0.000154

    GOOG    0.000235

    dtype: float64

    ```


    The last step is to take the square root of the variance to obtain the volatility:


    ```

    volatility = np.sqrt(variance)

    >>> volatility

    AAPL    0.012390

    GOOG    0.015337

    dtype: float64

    ```


    Notice that the result is different from the one obtained using the `std()` function!
    The cause for the difference is that the `std()` function calculates the sample
    standard deviation, which divides *N* − 1 in the denominator as opposed to *N*
    in our manual calculations.


    To correct this, let us revisit step three and divide the sum of squared deviations
    by *N* − 1 this time. In Listing [4-5](#605529_1_En_4_Chapter.xhtml#PC40), we
    first get the number of rows *N* using the first dimension (row dimension) of
    the `shape()` function, then plug in the calculation based on the formula of variance.


    ```

    num_rows = squared_deviations_df.shape[0]

    variance2 = squared_deviations_df.sum() / (num_rows-1)

    >>> variance2

    AAPL    0.000169

    GOOG    0.000259

    dtype: float64

    Listing 4-5

    Calculating the sample variance

    ```


    Taking the square root now gives the same result as using the `std()` function:


    ```

    volatility2 = np.sqrt(variance2)

    >>> volatility2

    AAPL    0.012995

    GOOG    0.016086

    dtype: float64

    ```


    Now we have the single-period volatility that measures the daily spread of the
    returns around its mean, the next section calculates the annualized volatility.


    ### Calculating the Annualized Volatility


    Following the formula for annualizing the single-period volatility to annual volatility,
    we can calculate the annualized volatility as follows, where the total length
    of time in a year is *T* = 252:


    ```

    annualized_vol = returns_df.std()*np.sqrt(252)

    >>> annualized_vol

    AAPL    0.206289

    GOOG    0.255356

    dtype: float64

    ```


    We can also calculate the square root of 252 by raising it to the power of 0.5,
    which returns the same result:


    ```

    annualized_vol = returns_df.std()*(252**0.5)

    >>> annualized_vol

    AAPL    0.206289

    GOOG    0.255356

    dtype: float64

    ```


    The next section looks at annualizing the returns.


    ### Calculating the Annualized Returns


    A note to pay attention to here is that returns follow a sequential compounding
    process. This means that once we have the single-period average return, we need
    to compound it by the corresponding frequency to reach a year’s length. And, to
    calculate the single-period average return, we take the geometric mean of the
    returns. The geometric mean is a better choice than the arithmetic mean in this
    context because it takes into account the effects of sequential compounding.


    Specifically, we first calculate the geometric mean of the returns as follows.
    Note that the geometric mean aligns with the sequential compounding nature when
    analyzing the cumulative return of an asset:


    ```

    returns_per_day = (returns_df+1).prod()**(1/returns_df.shape[0]) - 1

    >>> returns_per_day

    AAPL    0.007153

    GOOG    0.004178

    dtype: float64

    ```


    Let us decompose the sequence of operations here. First, we construct the 1+R
    returns in `(returns_df+1)` for each day, then perform sequential compounding
    using the `prod()` function to obtain the cumulative terminal return in 1+R format.
    Before subtracting one, we raise it to the power of 1/*N*, where *N* is the number
    of rows in the DataFrame. This gives the geometric mean of the returns in 1+R
    format. We do not use the arithmetic mean here.


    Now comes the annualization part. As shown in Listing [4-6](#605529_1_En_4_Chapter.xhtml#PC45),
    we assume a fixed daily return as the geometric mean and roll it forward by a
    year, corresponding to 252 trading days. Again, convert between 1+R return and
    the normal return.


    ```

    annualized_return = (returns_per_day+1)**252-1

    >>> annualized_return

    AAPL    5.025830

    GOOG    1.859802

    dtype: float64

    Listing 4-6

    Annualizing the daily return

    ```


    It seems Apple is doing quite well compared with Google for the first few days.


    There is another way to calculate the annualized return, a faster way:


    ```

    annualized_return = (returns_df+1).prod()**(252/returns_df.shape[0])-1

    >>> annualized_return

    AAPL    5.025830

    GOOG    1.859802

    dtype: float64

    ```


    The key change here is that we raise the terminal return to the power of 252/*N*.
    This is standardization, bringing the daily scale to the yearly scale.


    ### Calculating the Sharpe Ratio


    Finally, let us compute the Sharpe ratio for both stocks. We assume a risk-free
    interest rate of 3%, calculate the excess return by subtracting it from the annualized
    return, and divide it by the annualized volatility to obtain the Sharpe ratio.
    This is shown in Listing [4-7](#605529_1_En_4_Chapter.xhtml#PC47).


    ```

    riskfree_rate = 0.03

    excess_return = annualized_return - riskfree_rate

    sharpe_ratio = excess_return/annualized_vol

    >>> sharpe_ratio

    AAPL    24.217681

    GOOG     7.165694

    dtype: float64

    Listing 4-7

    Calculating the Sharpe ratio

    ```


    Thus, the Sharpe ratio as a risk-adjusted return is much higher for Apple than
    Google for the first few days.'
