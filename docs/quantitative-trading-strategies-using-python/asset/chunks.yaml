  raw: '### Combining Risk and Return via the Sharpe Ratio


    Now we have two measures for a particular asset: return and risk; both can be
    annualized. One asset may display a low return and a low risk, while another asset
    may deliver a higher return but comes with a higher risk as well. We would like
    to combine these two measures and create a single risk-adjusted return.


    One way is to divide the average return *R*[*P*] by the volatility *σ*[*P*], giving
    ![$$ \frac{R_P}{\sigma_P} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq5.png)
    . However, the average return *R*[*P*] gives no information on the overall market
    conditions. We are unsure if a higher ratio of ![$$ \frac{R_P}{\sigma_P} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq6.png)
    is due to the portfolio itself or the booming market. It would be good to account
    for the overall market benchmark in the numerator. This is where the Sharpe ratio
    comes in.


    The Sharpe ratio is a measure that is calculated by dividing the portfolio’s excess
    return by its volatility to assess risk-adjusted performance. Here, excess return
    means the return that is above an industry benchmark, typically using the risk-free
    rate of return such as the Treasury bill or bond. With this standardized measure,
    we can now compare different assets or portfolios while taking into account the
    overall market conditions. We will then choose the assets or portfolio with a
    higher Sharpe ratio.


    Mathematically, the Sharpe ratio is defined as follows:


    ![$$ Sharpe\ ratio=\frac{R_P-{R}_f}{\sigma_p} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equr.png)


    where *R*[*P*] is the average return of the portfolio, *R*[*f*] is the risk-free
    rate, and *σ*[*p*] is the volatility of the portfolio. A higher Sharpe ratio indicates
    that the investment generates higher returns for the same level of risk compared
    to other investments or the overall market. When comparing different investments,
    an investment with a higher Sharpe ratio is considered to be more attractive because
    it offers a better risk-adjusted return. By incorporating the risk-free rate,
    the Sharpe ratio provides a more accurate assessment of an investment’s performance
    relative to the overall market conditions.


    Let us look at one example. Suppose we have two portfolios whose returns and volatilities
    are (5%, 20%) and (10%, 50%). Clearly, portfolio 2 is more profitable and also
    more volatile than portfolio 1\. Such volatility will discount the attractiveness
    of portfolio 2\. To compare these two portfolios using a single metric, we calculate
    ![$$ \frac{R_P}{\sigma_P} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq7.png)
    as follows:


    ![$$ \frac{0.05}{0.2}=0.25&gt;\frac{0.1}{0.5}=0.2 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equs.png)


    Thus, portfolio 1 is more attractive using the risk-adjusted measure. Now suppose
    the risk-free interest rate in the market is 3%. Now we focus on the excess return
    of both portfolios and compare them using the Sharpe ratio:


    ![$$ \frac{0.05-0.03}{0.2}=0.1&lt;\frac{0.1-0.03}{0.5}=0.14 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equt.png)


    Now portfolio 2 has become more attractive. This is because portfolio 2 did provide
    a better return than portfolio 1 after considering the market benchmark. Listing
    [4-2](#605529_1_En_4_Chapter.xhtml#PC28) demonstrates the comparison in this example.


    ```

    p1_ret = 0.05

    p1_vol = 0.2

    p2_ret = 0.1

    p2_vol = 0.5

    risk_free_rate = 0.03

    >>> p1_ret / p1_vol

    0.25

    >>> p2_ret / p2_vol

    0.2

    >>> (p1_ret - risk_free_rate) / p1_vol

    0.1

    >>> (p2_ret - risk_free_rate) / p2_vol

    0.14

    Listing 4-2

    Calculating the Sharpe ratio

    ```


    Figure [4-9](#605529_1_En_4_Chapter.xhtml#Fig9) summarizes the different measures
    of the risk-adjusted return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig9_HTML.jpg)


    A set of 2 mathematical expressions to calculate the risk-adjust return, define
    the return over risk ratio as R subscript P by sigma subscript P, and sharpe ratio
    as R subscript P minus R subscript f, by sigma subscript P.


    Figure 4-9


    Different risk-adjusted returns. Subtracting the risk-free rate from the (annualized)
    return gives the excess return, which considers the market benchmark performance


    Let us work with some real data to calculate the aforementioned metrics in the
    next section.


