  trans: '

    ### 到期义务


    期货（及期权）合约到期时有两种结算方式：实物交割和现金结算。此类衍生品合约要么进行实物交割，要么进行现金结算。


    第一种类型是标的资产的实物交割。可交割期货合约规定，处于多头头寸的期货合约买方将向卖方支付约定价格，而卖方则需在预定日期（期货合约的结算日）向买方交付标的资产。此过程称为交割，要求在实际交割日交付标的资产，而非通过反向合约平仓。


    例如，买方与对手方卖方以每桶 60 美元的价格签订了一份一年期原油期货合约。我们知道一份期货合约对应 1000 桶原油。这意味着买方有义务从卖方处购买 1000
    桶原油，无论结算日标的资产的现货价格如何。如果一年后约定的结算日原油现货价格低于 58 美元，多头合约持有人总共损失 (60 - 58) × 1000 =
    2000 美元，空头头寸持有人则获利 2000 美元。反之，如果现货价格升至每桶 65 美元，多头头寸持有人获利 (65 - 60) × 1000 = 5000
    美元，空头头寸持有人则损失 5000 美元。


    第二种类型是现金结算。当期货合约采用现金结算时，合约在到期日的净现金头寸会在买卖双方之间转移。它允许买方和卖方在交割日支付头寸的净现金价值。


    以之前的案例为例。当原油现货价格跌至 58 美元时，多头头寸持有人将损失 2000 美元，这通过从买方账户扣除 2000 美元并将该金额记入卖方账户来实现。另一方面，当现货价格升至
    65 美元时，多头头寸持有人的账户将记入 5000 美元，这来源于从空头头寸持有人的账户扣除相应金额。


    重要的是要理解，大多数期货合约并不会持有至到期，期货市场中的大多数参与者实际上并不会接收或交付标的资产。相反，他们在结算日之前就已平仓。交易员和投资者常常选择在合约到期日之前平仓，以避免与实物交割或现金结算相关的义务。这可以通过进行一笔有效抵消原始头寸的反向交易来实现。例如，持有期货合约多头头寸的交易员可以卖出一份相同的合约来对冲头寸，而持有空头头寸的交易员则可以买入一份相同的合约来平仓。


    在到期前平掉期货头寸的过程是市场中的常见做法，因为它允许参与者锁定利润或限制损失，而无需处理标的资产的实际交割或现金结算。这种灵活性是期货交易的关键特征之一，它使市场参与者能够有效管理风险敞口并高效地利用市场机会。


    总之，尽管期货合约在到期时以实物交割或现金结算的形式承担义务，但期货市场中的大多数参与者选择在到期日之前平仓。通过进行反向交易，交易员和投资者可以有效管理其风险敞口，并从标的资产的价格波动中获利，而无需处理接收或交付标的资产的物流问题。


    ### 期货合约中的杠杆


    正如我们所知，进入一份期货合约只需在保证金账户中存入一定数额的保证金。这意味着期货市场可以使用高杠杆。杠杆越高，风险越高，潜在利润也越高。


    我们继续之前的例子。假设我们签订一份苹果公司股票的期货合约，允许我们以每股 125 美元的价格买入 100 股，初始保证金为 1000 美元。合约总价值为
    125 × 100 = 12,500 美元。如果股价上涨至 140 美元，合约价值变为 140 × 100 = 14,000 美元，由于每日结算，额外的 1,500
    美元将记入我们的保证金账户。我们通过占用 1000 美元的初始存款获得了 1000 美元的利润。


    现在假设苹果公司的股价下跌至 110 美元。合约总价值变为 110 × 100 = 11,000 美元，亏损 1500 美元。我们会收到追加保证金通知，要求再存入
    (1000 - 1500 + 1500) = 1000 美元，以将余额恢复至初始保证金所需的金额。


    杠杆在期货市场中是一把双刃剑，因为它既能放大收益也能放大损失。它允许投资者和交易员通过使用保证金，用较少的资金控制较大的合约价值。虽然杠杆能显著增加潜在利润，但如果市场走势与交易员的头寸相反，也可能导致巨大损失。


    在利用杠杆时，市场参与者采用适当的风险管理策略来保护其资本至关重要。这可能涉及使用止损单来限制潜在损失，或密切监控头寸以确保满足保证金要求。显然，这是一个零和博弈。资金每天都在从输家流向赢家。买方获得的利润等同于卖方遭受的损失，反之亦然。

    '
- fmt: '### Clearing House


    Farmers who sell futures contracts do not sell directly to the buyers. Rather,
    they sell to the clearing house of the futures exchange. As a designated intermediary
    between a buyer and seller in the financial market, the clearing house validates
    and finalizes each transaction, ensuring that both the buyer and the seller honor
    their contractual obligations. The clearing house thus guarantees that all of
    the traders in the futures market will honor their obligations, thus avoiding
    potential counterparty risk.


    The clearing house serves this role by adopting the buyer''s position to every
    seller and the seller''s position to every buyer. Every trader in the futures
    market has obligations only to the clearing house. The clearing house takes no
    active position in the market, but interposes itself between all parties to every
    transaction. As the middleman, the clearing house provides the security and efficiency
    integral to financial market stability. So as far as the farmers are concerned,
    they can sell their goods to the clearing house at the price of the futures contract
    when the contract expires.


    The clearing house will then match and confirm the details of the trades executed
    on the exchange, including the contract size, price, and expiration date, ensuring
    that all parties have accurate and consistent information. Order matching and
    confirmation is thus one of the main roles of a clearing house.


    The clearing house of the futures market also has a margin requirement, which
    is a sum of the deposit that serves as the minimum maintenance margin for the
    (clearing) member of the exchange. All members of an exchange are required to
    clear their trades through the clearing house at the end of each trading session
    and satisfy the margin requirement to cover the corresponding minimum balance
    requirement. Otherwise, the member will receive a margin call to top up the remaining
    balance when the margin account runs low due to fluctuation in asset price. Clearing
    houses thus collect and monitor margin requirements from their members, ensuring
    that all participants have sufficient collateral to cover potential losses. This
    helps to maintain the financial stability of the market and reduces the likelihood
    of default.


    Figure [3-1](#605529_1_En_3_Chapter.xhtml#Fig1) illustrates the clearing house
    as a middle party between the buyer and the seller.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig1_HTML.jpg)


    A block diagram. The buyer gives funds to the clearing house. The clearing house
    gives funds to the seller. The seller gives the goods to the clearing house. The
    clearing house gives goods to the buyer.


    Figure 3-1


    Illustrating the role of the clearing house as an intermediary between buyers
    and sellers in a futures market


    ### Mark-to-Market


    Mark-to-market involves updating the price of a futures contract to reflect its
    current market value rather than the book value, so as to ensure that margin requirements
    are being met. If the current market value of the futures contract causes the
    margin account to fall below its required level, the trader will receive a margin
    call from the exchange to top up the remaining balance.


    Mark-to-market is a process of pricing futures contracts at the end of every trading
    day. Made to accounts with open futures positions, the cash adjustment in mark-to-market
    reflects the day''s profit or loss, based on the settlement price of the product,
    and is determined by the exchange. Since mark-to-market adjustments affect the
    cash balance in a futures account, the margin requirement for the account is being
    assessed on a daily basis to continue holding an open position.


    Let us look at a mark-to-market example and understand the daily change in the
    price of the futures contract due to fluctuating prices in the underlying asset.
    First, note the two counterparties on either side of a futures contract, that
    is, a long position trader and a short position trader. The long trader goes bullish
    as the underlying asset is expected to increase in price, while the trader shorting
    the contract is considered bearish due to the expected drop in the price of the
    underlying asset.


    The futures contract may go up or down in value at the end of the trading day.
    When its price goes up, the long margin account increases in value due to mark-to-market,
    with the daily gain credit to the margin account of the long position trader.
    Correspondingly, the short position trader on the opposing side will suffer a
    loss of an equal amount, which is debited from the margin account.


    Similarly, when the price of the futures contract goes down, the long margin account
    decreases in value due to mark-to-market, with the daily loss debited from the
    margin account of the long position trader. This amount will be credited to the
    margin account of the short position trader, who will realize a gain of an equal
    amount.


    By updating the price of a futures contract to reflect its current market value,
    the exchange can monitor the risk exposure of traders in real time. This helps
    to ensure that margin requirements are being met and that traders have enough
    funds to cover their positions, which essentially reduces risk exposure to the
    traders. This also allows traders to accurately assess their profit or loss and
    make informed decisions about their positions.


    Figure [3-2](#605529_1_En_3_Chapter.xhtml#Fig2) illustrates the two types of traders
    with an open position in the same futures contract and their respective profit
    and loss due to mark-to-market.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig2_HTML.jpg)


    A block diagram presents 2 types of traders with mark-to-market losses. When the
    market goes up, the short position holder suffers a loss. Money moves to the long
    position holder. When the market goes down, long position holders suffer a loss.
    Money moves to the short position holder.


    Figure 3-2


    Illustrating the mark-to-market process and the resulting effect on the margin
    account of long and short position traders for the same futures contract'
  raw: '### Clearing House


    Farmers who sell futures contracts do not sell directly to the buyers. Rather,
    they sell to the clearing house of the futures exchange. As a designated intermediary
    between a buyer and seller in the financial market, the clearing house validates
    and finalizes each transaction, ensuring that both the buyer and the seller honor
    their contractual obligations. The clearing house thus guarantees that all of
    the traders in the futures market will honor their obligations, thus avoiding
    potential counterparty risk.


    The clearing house serves this role by adopting the buyer’s position to every
    seller and the seller’s position to every buyer. Every trader in the futures market
    has obligations only to the clearing house. The clearing house takes no active
    position in the market, but interposes itself between all parties to every transaction.
    As the middleman, the clearing house provides the security and efficiency integral
    to financial market stability. So as far as the farmers are concerned, they can
    sell their goods to the clearing house at the price of the futures contract when
    the contract expires.


    The clearing house will then match and confirm the details of the trades executed
    on the exchange, including the contract size, price, and expiration date, ensuring
    that all parties have accurate and consistent information. Order matching and
    confirmation is thus one of the main roles of a clearing house.


    The clearing house of the futures market also has a margin requirement, which
    is a sum of the deposit that serves as the minimum maintenance margin for the
    (clearing) member of the exchange. All members of an exchange are required to
    clear their trades through the clearing house at the end of each trading session
    and satisfy the margin requirement to cover the corresponding minimum balance
    requirement. Otherwise, the member will receive a margin call to top up the remaining
    balance when the margin account runs low due to fluctuation in asset price. Clearing
    houses thus collect and monitor margin requirements from their members, ensuring
    that all participants have sufficient collateral to cover potential losses. This
    helps to maintain the financial stability of the market and reduces the likelihood
    of default.


    Figure [3-1](#605529_1_En_3_Chapter.xhtml#Fig1) illustrates the clearing house
    as a middle party between the buyer and the seller.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig1_HTML.jpg)


    A block diagram. The buyer gives funds to the clearing house. The clearing house
    gives funds to the seller. The seller gives the goods to the clearing house. A
    clearing house gives goods to the buyer.


    Figure 3-1


    Illustrating the role of the clearing house as an intermediary between buyers
    and sellers in a futures market


    ### Mark-to-Market


    Mark-to-market involves updating the price of a futures contract to reflect its
    current market value rather than the book value, so as to ensure that margin requirements
    are being met. If the current market value of the futures contract causes the
    margin account to fall below its required level, the trader will receive a margin
    call from the exchange to top up the remaining balance.


    Mark-to-market is a process of pricing futures contracts at the end of every trading
    day. Made to accounts with open futures positions, the cash adjustment in mark-to-market
    reflects the day’s profit or loss, based on the settlement price of the product,
    and is determined by the exchange. Since mark-to-market adjustments affect the
    cash balance in a futures account, the margin requirement for the account is being
    assessed on a daily basis to continue holding an open position.


    Let us look at a mark-to-market example and understand the daily change in the
    price of the futures contract due to fluctuating prices in the underlying asset.
    First, note the two counterparties on either side of a futures contract, that
    is, a long position trader and a short position trader. The long trader goes bullish
    as the underlying asset is expected to increase in price, while the trader shorting
    the contract is considered bearish due to the expected drop in the price of the
    underlying asset.


    The futures contract may go up or down in value at the end of the trading day.
    When its price goes up, the long margin account increases in value due to mark-to-market,
    with the daily gain credit to the margin account of the long position trader.
    Correspondingly, the short position trader on the opposing side will suffer a
    loss of an equal amount, which is debited from the margin account.


    Similarly, when the price of the futures contract goes down, the long margin account
    decreases in value due to mark-to-market, with the daily loss debited from the
    margin account of the long position trader. This amount will be credited to the
    margin account of the short position trader, who will realize a gain of an equal
    amount.


    By updating the price of a futures contract to reflect its current market value,
    the exchange can monitor the risk exposure of traders in real time. This helps
    to ensure that margin requirements are being met and that traders have enough
    funds to cover their positions, which essentially reduces risk exposure to the
    traders. This also allows traders to accurately assess their profit or loss and
    make informed decisions about their positions.


    Figure [3-2](#605529_1_En_3_Chapter.xhtml#Fig2) illustrates the two types of traders
    with an open position in the same futures contract and their respective profit
    and loss due to mark-to-market.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig2_HTML.jpg)


    A block diagram presents 2 types of traders with mark-to-market losses. When the
    market goes up, the short position holder suffers a loss. Money moves to the long
    position holder. When the market goes down, long position holders suffer a loss.
    Money moves to the short position holder.


    Figure 3-2


    Illustrating the mark-to-market process and the resulting effect on the margin
    account of long and short position traders for the same futures contract'
  trans: '

    ### 清算所


    出售期货合约的农民并非直接出售给买方，而是出售给期货交易所的清算所。作为金融市场上买卖双方之间的指定中介，清算所验证并最终确定每笔交易，确保买卖双方均履行其合同义务。因此，清算所保证了期货市场的所有交易者都将履行其义务，从而避免了潜在的对手方风险。


    清算所通过充当所有卖方的买方和所有买方的卖方来履行这一角色。期货市场的每个交易者只对清算所负有义务。清算所在市场中不持有主动仓位，而是在每笔交易的所有各方之间充当中介。作为中间人，清算所提供对金融市场稳定不可或缺的安全性和效率。因此，就农民而言，他们可以在合约到期时按期货合约的价格将货物出售给清算所。


    清算所随后将匹配并确认交易所执行的交易细节，包括合约规模、价格和到期日，确保所有各方都拥有准确一致的信息。因此，订单匹配和确认是清算所的主要职能之一。


    期货市场的清算所也有保证金要求，即一笔作为交易所（清算）会员最低维持保证金的存款。交易所的所有会员都必须在每个交易时段结束时通过清算所结算其交易，并满足保证金要求以覆盖相应的最低余额要求。否则，当因资产价格波动导致保证金账户余额不足时，会员将收到追加保证金的通知，以补足剩余余额。因此，清算所收集并监控其会员的保证金要求，确保所有参与者拥有足够的抵押品来覆盖潜在损失。这有助于维持市场的金融稳定，并降低违约的可能性。


    图 3-1 展示了清算所作为买方和卖方之间的中间方。


    ![](img/605529_1_En_3_Fig1_HTML.jpg)


    一个框图。买方将资金交给清算所。清算所将资金交给卖方。卖方将货物交给清算所。清算所将货物交给买方。


    **图 3-1**


    **说明清算所在期货市场中作为买卖双方中介的角色**


    ### 逐日盯市


    逐日盯市涉及更新期货合约的价格以反映其当前市场价值而非账面价值，从而确保证金要求得到满足。如果期货合约的当前市场价值导致保证金账户低于其要求的水平，交易者将收到交易所发出的追加保证金通知，以补足剩余余额。


    逐日盯市是每个交易日结束时对期货合约进行定价的过程。对持有未平仓期货头寸的账户而言，逐日盯市中的现金调整反映了根据产品结算价确定的当日损益，该结算价由交易所决定。由于逐日盯市调整会影响期货账户中的现金余额，因此账户的保证金要求需要每日进行评估，以继续持有未平仓头寸。


    让我们看一个逐日盯市的例子，并了解因标的资产价格波动导致的期货合约每日价格变化。首先，注意期货合约双方的对手方，即多头仓位交易者和空头仓位交易者。多头交易者因预期标的资产价格上涨而看涨，而做空合约的交易者则因预期标的资产价格下跌而被视为看跌。


    期货合约的价值在交易日结束时可能上涨或下跌。当其价格上涨时，由于逐日盯市，多头保证金账户价值增加，当日收益记入多头仓位交易者的保证金账户。相应地，对手方的空头仓位交易者将遭受等额损失，该损失从其保证金账户中扣除。


    类似地，当期货合约价格下跌时，由于逐日盯市，多头保证金账户价值减少，当日损失从多头仓位交易者的保证金账户中扣除。这笔金额将记入空头仓位交易者的保证金账户，后者将实现等额收益。


    通过更新期货合约价格以反映其当前市场价值，交易所可以实时监控交易者的风险敞口。这有助于确保保证金要求得到满足，并确保交易者有足够的资金来覆盖其仓位，这从根本上降低了交易者的风险敞口。这同时也使交易者能够准确评估其损益，并对其仓位做出明智决策。


    图 3-2 展示了在同一期货合约中持有未平仓头寸的两类交易者，以及他们因逐日盯市而产生的各自损益。


    ![](img/605529_1_En_3_Fig2_HTML.jpg)


    一个框图展示了因逐日盯市而产生损益的两种交易者。当市场上涨时，空头仓位持有者遭受损失。资金流向多头仓位持有者。当市场下跌时，多头仓位持有者遭受损失。资金流向空头仓位持有者。


    **图 3-2**


    **说明逐日盯市过程及其对同一期货合约的多头和空头仓位交易者保证金账户产生的影响**

