    >>> score_fn(svm_model)\n1.143746922303926\n```\n\nSimilarly, we can obtain the\
    \ same measure using the random forest regressor.\n\n### Pairs Trading Using Random\
    \ Forest\n\nTo build a random forest model for regression, we can use the `RandomForestRegressor`\
    \ class and specify two main parameters: `n_estimators` as the number of trees\
    \ to be built in the random forest and `random_state` as the random seed for reproducibility.\
    \ Listing [10-7](#605529_1_En_10_Chapter.xhtml#PC9) trains the random forest model\
    \ and evaluates its performance in the training and test sets using `RMSE`.\n\n\
    ```python\n# random forest\nfrom sklearn.ensemble import RandomForestRegressor\n\
    # Create random forest regressor\nrf_model = RandomForestRegressor(n_estimators=100,\
    \ random_state=42)\n# Train the model on the training and test set\nrf_model.fit(train_X,\
    \ train_y)\ntrain_pred = rf_model.predict(train_X)\n>>> print(\"training rmse:\
    \ \", np.sqrt(mean_squared_error(train_y, train_pred)))\ntest_pred = rf_model.predict(test_X)\n\
    >>> print(\"test rmse: \", np.sqrt(mean_squared_error(test_y, test_pred)))\ntraining\
