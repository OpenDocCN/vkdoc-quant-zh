  trans: '

    # 图 9-3


    三种可能的函数形式。左侧是易于优化的凸函数。中间是具有多个局部极小值的非凸函数，右侧同样是非凸函数，包含一个充满鞍点的宽阔平坦区域。后两种情况的优化工作量远大于第一种情况。


    我们来看一个训练机器学习模型时超参数调优的示例。机器学习模型是一个函数，包含一组需要根据输入数据进行优化的参数。这些参数通过特定的优化过程自动调整，该过程通常由一组对应的元参数（即超参数）控制，这些超参数在模型训练开始前就已固定。例如，在使用梯度下降算法训练深度神经网络时，需要预先手动选择一个决定每次参数更新步长的学习率。如果学习率过大，模型可能会发散，最终无法学习。如果学习率过小，由于权重每次迭代仅更新微小幅度，模型可能收敛得非常慢。图
    9-4 直观展示了这两种情况。


    ![](img/605529_1_En_9_Fig4_HTML.jpg)


    两个关于 `f` 随 `x` 变化的抛物线折线图。左侧：学习率过小导致收敛缓慢，用左臂上间隔很小的几个点以及向下的箭头表示。右侧：学习率过大导致发散，箭头在两侧以大间隔之字形来回摆动。


    # 图 9-4


    左侧因学习率过小导致收敛缓慢，右侧因学习率过大导致发散。


    因此，选择一个合理的学习率作为预设超参数，对于训练出优秀的机器学习模型至关重要。定位最佳学习率及其他超参数是一个优化问题，正符合贝叶斯优化（后文将介绍）的目的。在超参数调优的场景中，评估每个学习率是一项耗时的工作。目标函数通常是模型收敛后的最终测试集损失（在最小化设定中）。为了在训练集上取得合理表现，模型需要被充分训练，这通常需要数百个训练周期（epoch）才能达到稳定收敛。这里，一个周期是指完整遍历整个训练数据集一次。


    测试集损失或准确率的函数形式对于超参数而言，也可能是高度非凸且多峰的。在收敛时，我们难以判断当前处于局部最优、鞍点还是全局最优。此外，某些超参数可能是离散的，例如训练深度神经网络时的节点数和层数。在这种情况下，我们无法计算其梯度，因为这需要定义域中的连续支持。


    贝叶斯优化方法正是为应对所有这些挑战而设计的。它已被证明能够在有限预算（即允许的评估次数）下，有效地定位最佳超参数。该方法也广泛且成功地应用于其他领域，如化学工程。


    ## 贝叶斯优化


    顾名思义，贝叶斯优化是一个使用贝叶斯方法研究优化问题的领域。优化的目标是在搜索域（也称为环境）内，定位所有可能值中的最优目标值（即全局最大值或最小值），或最优值对应的位置。搜索过程从特定的初始位置开始，遵循特定的策略来迭代地引导后续的采样位置、收集新的观测值，并更新引导搜索的策略。


    贝叶斯优化的核心是使用概率模型（如高斯过程）来表示未知函数，并使用效用函数（也称为采集函数）来决定下一步在哪里采样。它用新的样本点迭代地更新概率模型，并利用这个更新后的模型来选择下一个采样位置。


    如图 9-5 所示，整个优化过程包括策略（优化器）与环境（未知目标函数）之间的重复交互。策略是一个映射函数，它接收新的输入参数（以及历史参数）并以一种有原则的方式输出下一个待尝试的参数值。在此过程中，随着搜索的进行，我们不断地学习和改进策略。一个好的策略能比差的策略更快地引导我们的搜索走向全局最优。在决定尝试哪个参数值时，好的策略会将有限的采样预算投入到有希望的候选值上。


    ![](img/605529_1_En_9_Fig5_HTML.jpg)


    一个循环过程展示了通过观测和采样位置连接的环境和策略。环境包含未知的真实目标函数，策略包含指导原则，该原则基于收集到的观测值决定采样决策。


    # 图 9-5


    整体的贝叶斯优化过程。策略消化历史观测值并提出新的采样位置。环境决定了在新提出的位置上，观测值（可能受噪声污染）如何被呈现给策略。我们的目标是学习一个高效且有效的策略，使其能够尽可能快地导航至全局最优。


    另一方面，环境包含策略需要在特定边界（参数值的最大值和最小值）内学习的未知目标函数。当根据策略的要求探测函数值时，环境向策略揭示的实际观测值通常会因回测周期的选择而受到噪声污染，使得学习更具挑战性。因此，贝叶斯优化作为一种特定的全局优化方法，旨在学习一个策略，帮助我们尽可能高效、有效地导航至一个未知的、受噪声污染的目标函数的全局最优。


    在决定接下来尝试哪个参数值时，大多数搜索策略都面临探索与利用的权衡。探索意味着在未知的遥远区域进行搜索，而利用则指在之前访问过的邻域内搜索，以期找到更优的函数评估值。贝叶斯优化也面临同样的困境。理想情况下，我们希望初始阶段多进行探索，以增加对环境的了解（黑箱函数），然后逐渐转向利用模式，利用现有知识并深入挖掘已知的有前景区域。


    贝叶斯优化通过两个组件实现这种权衡：一个用于近似底层黑箱函数的高斯过程（GP），以及一个将探索-利用权衡编码为标量值的采集函数，该标量值作为域内所有候选点采样效用的指标。接下来，我们将详细探讨每一个组件。

    '
- fmt: '### Gaussian Process


    As a widely used stochastic process (able to model an unknown black-box function
    and the corresponding uncertainties of modeling), the Gaussian process takes the
    finite-dimensional probability distributions one step further into a continuous
    search domain that contains an infinite number of variables, where any finite
    set of points in the domain jointly forms a multivariate Gaussian distribution.
    It is a flexible framework to model a broad family of functions and quantify their
    uncertainties, thus being a powerful surrogate model used to approximate the true
    underlying function. Let us look at a few visual examples to see what it offers.


    Figure [9-6](#605529_1_En_9_Chapter.xhtml#Fig6) illustrates an example of a “flipped”
    prior probability distribution for a single random variable selected from the
    prior belief of the Gaussian process. Every single point represents a parameter
    value, although it is now modeled as a random variable and thus has randomness
    in its realizations. Specifically, each point follows a normal distribution. Plotting
    the mean (solid line) and 95% credible interval (dashed lines) of all these prior
    distributions gives us the prior process for the objective function regarding
    each location in the domain. The Gaussian process thus employs an infinite number
    of normally distributed random variables within a bounded range to model the underlying
    objective function and quantify the associated uncertainty via a probabilistic
    approach.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig6_HTML.jpg)


    A line graph of function `f` versus `x` presents a continuous horizontal line
    in the middle of 2 dotted lines. A dotted curve that connects all 3 is the prior
    predictive distribution of the random variable. The solid line is the mean of
    Gaussian process. Dotted lines indicate 95% credible interval.


    **Figure 9-6:** A sample prior belief of the Gaussian process represented by the
    mean and 95% credible interval for each location in the domain. Every objective
    value is modeled by a random variable that follows a normal prior predictive distribution.
    Collecting the distributions of all random variables and updating these distributions
    as more observations are collected could help us quantify the potential shape
    of the true underlying function and its probability.


    The prior process can thus serve as the surrogate data-generating process of the
    unknown black-box function, which can also be used to generate samples in the
    form of functions, an extension of sampling single points from a probability distribution.
    For example, if we were to repeatedly sample from the prior process, we would
    expect the majority (around 95%) of the samples to fall within the credible interval
    and a minority outside this range. Figure [9-7](#605529_1_En_9_Chapter.xhtml#Fig7)
    illustrates three functions sampled from the prior process.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig7_HTML.jpg)


    A line graph of function `f` versus `x` presents a solid line between two dotted
    horizontal lines. The lines comprise 3 sinusoidal trends of varying amplitude
    and phases which mostly lie within the dotted lines.


    **Figure 9-7:** Three example functions sampled from the prior process, where
    the majority of the functions fall within the 95% credible interval.


    In a Gaussian process, the uncertainty on the objective value of each location
    (i.e., the parameter value of a trading strategy) is quantified using a credible
    interval. As we start to collect observations and assume a noise-free and exact
    observation model, the uncertainties at the collection locations will be resolved,
    leading to zero variance and direct interpolation at these locations. Besides,
    the variance increases as we move further away from the observations, which is
    a result of integrating the prior process (the prior belief about the unknown
    black-box function) with the information provided by the actual observations.
    Figure [9-8](#605529_1_En_9_Chapter.xhtml#Fig8) illustrates the updated posterior
    process after collecting two observations. The posterior process with updated
    knowledge based on the observations will thus make a more accurate surrogate model
    and better estimate the objective function.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig8_HTML.jpg)


    A line graph of function `f` versus `x` has 2 intersecting dotted lines comprising
    a continuous line in the middle. The solid line is the mean of the posterior process
    and the dotted lines mark the 95% credible interval. The intersection points mark
    the exact observations.


    **Figure 9-8:** Updated posterior process after incorporating two exact observations
    in the Gaussian process. The posterior mean interpolates through the observations,
    and the associated variance reduces as we move nearer the observations.


    Mathematically, for a new sampling location `x*` (in `X`), the corresponding functional
    evaluation `f*` following the Gaussian process would assume a conditional normal
    distribution:


    `p(f*; x*, D_n) = N(f* | μ*, σ*²)`


    where `D_n = {(x_i, f_i)}` (for `i = 1` to `n`) contains the historical observed
    in pairs of sampling locations and scalar observations. The closed form of the
    posterior mean and variance functions can be derived by invoking the multivariate
    Gaussian theorem, giving:


    `μ* = k(x_{1:n}, x*) K(x_{1:n}, x_{1:n})⁻¹ f_{1:n}`


    `σ*² = k(x*, x*) - k(x_{1:n}, x*) K(x_{1:n}, x_{1:n})⁻¹ k(x_{1:n}, x*)`


    Therefore, we can obtain the posterior mean and variance at any arbitrary location
    based on the posterior Gaussian process model, serving as the surrogate model
    for the underlying function of the specific trading strategy.


    Now let us look at the other critical component: the acquisition function.'
