- fmt: '# 6. Momentum Trading Strategy


    Momentum trading is a strategy that makes use of the strength of price movements
    as a basis for opening positions, either longing or shorting a set of assets.
    It involves buying and/or selling a selected set of assets according to the recent
    strength of price trends, assuming that these trends will continue in the same
    direction if there is enough force behind a price move. When using momentum trading,
    traders intend to capitalize on the force or speed of price movements to determine
    investment positions. They would either initiate long or short positions in a
    curated selection of assets based on the recent vigor of price trends. Crucially,
    the key presumption underpinning this approach is that existing trends, given
    that their force is strong enough, will persist in the same direction.


    When an asset displays an upward trend, registering higher prices, it invariably
    attracts more attention from a wider spectrum of traders and investors. The heightened
    attention garnered by the asset fuels its market price further. This momentum
    endures until a significant number of sellers enter and penetrate the market,
    supplying an abundance of the asset. Once enough sellers are in the market, the
    momentum changes its direction and forces an asset’s price to go lower. This is
    essentially the price dynamics between supply and demand. At this juncture, market
    participants may reassess the fair price of the asset, which may be perceived
    as overvalued due to the recent price surge.


    In other words, as more sellers infiltrate the market, the momentum alters its
    course, pushing the asset’s price in a downward direction. This is essentially
    a representation of the classic supply and demand dynamics and the shift from
    an environment with more buyers than sellers to one where sellers outweigh buyers.
    Also, note that while price trends can persist for an extended period, they will
    inevitably reverse at some point. Thus, the ability to identify these inflection
    points and adjust the positions accordingly is also of equal importance.


    ## Introducing Momentum Trading


    Momentum traders seek to identify the main driver assets of the trend in a given
    direction, taking advantage of the expected price changes and anticipated price
    fluctuations, rather than focusing on predicting the peak of a trend. Instead
    of attempting to find the top and bottom of a trend, a momentum trader focuses
    on the top and bottom quantiles of the price move, which implies exploitation
    of market herding and the tendency toward following the majority that represents
    the most significant price movements.


    This approach essentially exploits market herding behavior, a phenomenon in which
    traders tend to follow the majority of the market consensus. In periods of strong
    upward or downward trends, many traders and investors may decide to follow the
    crowd to long or short popular assets, thereby initiating or augmenting the existing
    momentum. Thus, momentum trading is a self-reinforcing mechanism to some extent:
    as more traders identify an emerging trend, they contribute to the strength of
    the trend by adding to the buying or selling force. This, in turn, attracts more
    market participants, which further strengthens the identified trend. This process
    continues until the market dynamics shift, either due to a change in underlying
    fundamentals or a change in market sentiment, causing the existing trend to stall
    or reverse. Such a cyclical nature of trends characterizes the momentum trading
    strategy, although timing the beginning and end of the momentum, namely, the entry
    and exit points, is extremely difficult. In fact, one would use different technical
    indicators to attempt this task.


    ### Diving Deeper into Momentum Trading


    Momentum trading rests on the confluence of three integral elements: volume, volatility,
    and time frame.


    - **Volume**: This signifies the quantity of an asset traded within a specified
    time frame. A high trading volume often indicates a strong interest in the asset
    and can be an indicator of the start of a new trend in the asset’s price movement.
    Conversely, a low volume could signal a lack of interest in the asset, potentially
    leading to a reversal in trend. Hence, volume plays a crucial role in confirming
    the strength and sustainability of a trend.


    - **Volatility**: Volatility represents the degree of variation in an asset’s
    price over a short period of time. A higher volatility corresponds to larger price
    swings, which can provide good trading opportunities for momentum traders, if
    such variation is in the profitable direction. However, variability is a double-edged
    sword, as it also increases the risk for significant losses. Therefore, understanding
    and managing volatility is a critical aspect of momentum trading.


    - **Time frame**: The time frame represents the expected duration of the identified
    trend. Depending on the specific time frames, momentum traders may engage in intraday
    trading to open and close a position within a day (called day trading) or hold
    positions for several weeks or months (called position trading). This choice of
    time frame can affect the risk and return profile of a trade, as day trading is
    apparently more volatile than position trading.


    These factors can be quantified and aggregated together via technical analysis
    when developing a momentum trading strategy. The process typically involves analyzing
    historical price data and trading volumes, followed by applying technical indicators
    to identify potential trading signals. Essentially, momentum trading requires
    identifying potential price movements before they occur and capitalizing on these
    trends to generate a return.


    ### Contrasting with the Trend-Following Strategy


    The trend-following and momentum trading strategies, both grounded in the concept
    of momentum, aim to capture the sustained directional movement or the persistent
    performance of an asset. Both strategies are built upon the observation that asset
    prices can have a tendency to move in a particular direction over time, a phenomenon
    known as momentum. Despite their common underpinning, the application and focus
    of the two strategies differ significantly.


    The momentum trading strategy, as we have discussed, is cross-sectional in nature.
    It involves comparing the momentum across various assets at a specific time point
    and investing in those that demonstrate the highest momentum. This comparative
    analysis occurs at a particular point in time and aims to compare the relative
    performance among multiple assets. Hence, momentum trading is often characterized
    as a type of relative momentum strategy.


    In contrast, the trend-following strategy utilizes time series momentum, focusing
    exclusively on an asset’s own historical performance over time. It analyzes the
    price pattern of a single asset over its own history, spanning numerous time points,
    to identify potential trading signals. Therefore, the trend-following strategy
    is an instance of an absolute momentum strategy. It emphasizes the historical
    trend of an individual asset and aims to capitalize on its continuation.'
