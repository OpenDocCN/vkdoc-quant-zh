    fig2 = make_subplots(specs=[[{"secondary_y": True}]])

    fig2.add_trace(go.Scatter(x=data.index,y=data[''Close''],name=''Price''),secondary_y=False)

    fig2.add_trace(go.Bar(x=data.index,y=data[''Volume''],name=''Volume''),secondary_y=True)

