- fmt: '### Evaluating Out-of-Sample Performance


    Let us first grab the monthly return indexed at 2022-08-31 from `mth_return_df`
    for the long and short positions, respectively. As shown in Listing [6-9](#605529_1_En_6_Chapter.xhtml#PC17),
    we use the `relativedelta` function from the `dateutil` package to shift `formation_period`
    by one month into the future, arriving at the evaluation period. This goes to
    the row-level condition in the `.loc[]` property. For the column-level condition,
    we subset the columns to the stock symbols within the long positions using the
    `isin()` method. The result for the evaluation-period performance of the long
    position is stored in `long_return_df`.


    ```python

    from dateutil.relativedelta import relativedelta

    long_return_df = mth_return_df.loc[formation_period +  relativedelta(months=1),
    \ mth_return_df.columns.isin(long_stocks)]

    >>> long_return_df

    AMGN   -0.021474

    CVX    -0.026156

    IBM    -0.005517

    KO     -0.038336

    MRK    -0.044549

    TRV     0.018526

    Name: 2022-08-31 00:00:00-04:00, dtype: float64

    ```


    *Listing 6-9*: Obtaining the performance of stocks in a long position at the evaluation
    period


    The result shows that the majority of the top performers are decreasing in price,
    which is a direct reflection of market sentiment during that period of time. We
    can similarly obtain the evaluation-period performance for the bottom performances
    in the short position, as shown in Listing [6-10](#605529_1_En_6_Chapter.xhtml#PC18).


    ```python

    short_return_df = mth_return_df.loc[formation_period +  relativedelta(months=1),
    \ mth_return_df.columns.isin(short_stocks)]

    >>> short_return_df

    BA      0.005900

    CRM    -0.151614

    CSCO   -0.014327

    DIS     0.056362

    HD     -0.035350

    NKE    -0.073703

    Name: 2022-08-31 00:00:00-04:00, dtype: float64

    ```


    *Listing 6-10*: Obtaining the performance of stocks in a short position at the
    evaluation period


    Now we calculate the return of the evaluation period based on these two positions.
    We assume an equally weighted portfolio in both positions. Thus, the final return
    is the average of all member stocks in the respective position. Also, since we
    hold a short position for the bottom performers, we subtract the average return
    from the short position in these stocks while adding the average return from the
    long position. Listing [6-11](#605529_1_En_6_Chapter.xhtml#PC19) completes the
    calculation.


    ```python

    momentum_profit = long_return_df.mean() - short_return_df.mean()

    >>> momentum_profit

    0.015870799817079288

    ```


    *Listing 6-11*: Calculating the total profit


    Therefore, the momentum trading strategy reports a final monthly return of 1.587%.
    Now let us compare with the buy-and-hold strategy.


    ### Comparing with the Buy-and-Hold Strategy


    We assume a buy-and-hold strategy based on DJI as the benchmark. This means entering
    a long position of the index at the same beginning of the trading period on 2021-01-01
    and holding them all the way until 2022-09-01. We first download the data on this
    index by passing `"^DJI"` as the ticker symbol, as shown in the following code
    snippet:


    ```python

    df_dji = yf.download("^DJI", start=start_date, end=end_date)

    ```


    Next, we follow the same approach to calculate the monthly terminal returns, as
    shown in Listing [6-12](#605529_1_En_6_Chapter.xhtml#PC21).


    ```python

    buy_n_hold_df = df_dji[''Adj Close''].pct_change().resample("M").agg(lambda x:
    (x+1).prod()-1)

    >>> buy_n_hold_df.head()

    Date

    2021-01-31 00:00:00-05:00   -0.007983

    2021-02-28 00:00:00-05:00    0.031677

    2021-03-31 00:00:00-04:00    0.066247

    2021-04-30 00:00:00-04:00    0.027085

    2021-05-31 00:00:00-04:00    0.019324

