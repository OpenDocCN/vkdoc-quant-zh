    \n## 添加技术指标\n\n在本节中，我们将研究流行的标普 500 E-迷你期货合约，并讨论如何添加常见的技术指标以辅助技术分析。标普 500 E-迷你期货是一种金融衍生品，追踪代表美国\
    \ 500 家最大上市公司的标普 500 指数的表现。E-迷你期货合约是标准标普 500 期货合约的缩小版，使其对个人交易者和投资者来说更容易获得且更经济实惠。\n\
    \n让我们使用代码 `ES=F` 获取该特定合约在 2022 全年的每日期货数据，如代码清单 3-5 所示。\n\n```\nfutures_symbol\
    \ = \"ES=F\"\nfutures_data = yf.download(futures_symbol, start=\"2022-01-01\"\
    , end=\"2022-04-01\", interval=\"1d\")\n代码清单 3-5\n下载标普 500 E-迷你期货数据\n```\n\n现在让我们使用\
    \ `ta` 库计算几个技术指标。在本例中，我们将计算相对强弱指数（RSI）、布林带和 MACD（移动平均收敛散度指标）。以下列表简要描述了这些流行的技术指标：\n\
    \n- **相对强弱指数（RSI）**：RSI 是一种动量震荡指标，用于衡量价格变动的速度和变化。RSI 在 0 到 100 之间震荡，当 RSI 高于 70\
    \ 时，交易者通常认为资产超买；低于 30 时，则认为超卖。\n\n- **布林带**：布林带是一种衡量价格变动标准差的波动率指标。该指标由三条线组成：中线（一条简单移动平均线）和两条外线（上轨和下轨），绘制在距移动平均线指定数量的标准差处。当布林带变宽时，表明波动性增加；当布林带收窄时，则表明波动性降低。价格通常在上轨和下轨之间移动。\n\
    \n- **移动平均收敛散度指标（MACD）**：MACD 是一种动量指标，显示资产价格两条移动平均线之间的关系。它由两条线组成：MACD 线（短期与长期移动平均线的差值）和信号线（MACD\
    \ 线的移动平均线）。当 MACD 线上穿信号线时，可能暗示看涨信号（买入）；当它下穿信号线时，可能表明看跌信号（卖出）。此外，当 MACD 线位于零轴上方时，表明上行势头；位于零轴下方时，则表明下行势头。\n\
    \n代码清单 3-6 计算了这些技术指标并将它们合并到 DataFrame 中。\n\n```\n# 计算 RSI\nfutures_data[\"RSI\"\
    ] = ta.momentum.RSIIndicator(futures_data[\"Close\"]).rsi()\n# 计算布林带\nbbands =\
    \ ta.volatility.BollingerBands(futures_data[\"Close\"])\nfutures_data[\"BB_upper\"\
    ] = bbands.bollinger_hband()\nfutures_data[\"BB_lower\"] = bbands.bollinger_lband()\n\
    # 计算 MACD\nmacd = ta.trend.MACD(futures_data[\"Close\"])\nfutures_data[\"MACD\"\
    ] = macd.macd()\nfutures_data[\"MACD_signal\"] = macd.macd_signal()\n代码清单 3-6\n\
    计算常见技术指标\n```\n\n现在我们可以将原始的期货时间序列数据与技术指标一同绘制，以辅助分析，如代码清单 3-7 所示。\n"
