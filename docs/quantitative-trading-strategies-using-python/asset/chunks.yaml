  raw: '### Machine Learning Workflow


    Machine learning models are predictive functions that generate predictions given
    a specific set of inputs. In this case, we intend to use a machine learning model
    in pairs trading to predict the spread between the two assets, which will then
    be used to identify profitable trading signals. Since the spread is a continuous
    quantity, we will explore regression models in this chapter, including support
    vector machine (SVM), random forest (RF), and neural network models. We will also
    augment the feature space, that is, historical spread series, with additional
    features such as technical indicators. Once the spread is predicted, we can generate
    trading signals by taking a long position in the underperforming asset and a short
    position in the overperforming asset.


    A machine learning model is a mathematical algorithm or a function that is trained
    on a training dataset and used to make predictions for the future unseen test
    dataset. Depending on the specific model class, the function can learn the underlying
    patterns and relationships from the given data, usually in the form of input-output
    pairs in the context of supervised learning. This process is called interpolation,
    where the model is expected to interpolate through the given data, subject to
    a certain degree of robustness against random noise in the dataset, as indicated
    by a relatively low training error.


    Next, the trained model will be assessed using a new set of test data, a process
    called extrapolation, where the test data may be somewhat different from the training
    data. A model is expected to do well on the test set so that it gives confidence
    when we apply it to practical applications. The test set performance is also called
    the generalization performance, an indicator of how well the model generalizes
    to the test set data.


    A typical machine learning model consists of two components: the parameters (or
    weights) serve as the building blocks of the model, and the model architecture
    specifies how the input data interact with the parameters to generate the output.
    Model training refers to the process of tuning these parameters such that the
    model produces a good performance on the test set and often a relatively good
    performance on the training set. During the training process, the machine learning
    algorithm adjusts the parameters of the model based on the input data to improve
    the accuracy of its predictions on the training data. Once the model is trained,
    it can be used to make predictions for the new data, which may not have been seen
    before.


    If the model performs too well on the training set but not so well on the test
    set, then the model is considered as overfitting the training data. Since modern
    models are typically complex in architecture and large in the number of model
    parameters, overfitting is a common phenomenon in many training situations. Proper
    regularization techniques can be adopted to reduce the chance of overfitting.


    Let us recall the graph on the overall model training process workflow displayed
    in Chapter [1](#605529_1_En_1_Chapter.xhtml), also shown in Figure [10-2](#605529_1_En_10_Chapter.xhtml#Fig2)
    for ease of reference. We can apply regularization techniques to achieve a better
    generalization performance from these four components: the training data, the
    model, the cost measure, and the optimization procedure. Each component has a
    specific extent of regularization effect and can be combined together to achieve
    a good generalization performance for the specific training situation.


    ![](images/605529_1_En_10_Chapter/605529_1_En_10_Fig2_HTML.jpg)


    A diagram presents the overall model training process workflow. It has 4 components,
    the training data with input features and target label, the model with parameters
    and architecture, the cost measure, and the optimization procedure of the model
    with feedback of cost.


    Figure 10-2


    Example of a typical model training process. The workflow starts with the available
