  trans: '

    ### 高斯过程


    作为一种广泛使用的随机过程（能够对未知黑箱函数及其相应的建模不确定性进行建模），高斯过程将有限维概率分布进一步扩展到包含无限多个变量的连续搜索域中，其中该域内的任意有限点集共同构成一个多元高斯分布。它是一个灵活的框架，可以对广泛的函数族进行建模并量化其不确定性，因此成为用于逼近真实底层函数的强大代理模型。让我们看几个可视化示例来了解其功能。


    图 9-6 展示了一个从高斯过程的先验信念中选出的、关于单个随机变量的"翻转"先验概率分布示例。尽管现在每个点都被建模为一个随机变量，因而其实现具有随机性，但每个点都代表一个参数值。具体来说，每个点都服从正态分布。绘制所有这些先验分布的均值（实线）和
    95%置信区间（虚线），就得到了关于域中每个位置的客观函数的先验过程。因此，高斯过程通过在一个有界范围内使用无限多个正态分布的随机变量，以概率方法对底层目标函数进行建模并量化相关不确定性。


    ![](img/605529_1_En_9_Fig6_HTML.jpg)


    函数 `f` 相对于 `x` 的折线图在两条虚线中间呈现一条连续的水平线。连接所有三条线的虚线曲线是随机变量的先验预测分布。实线是高斯过程的均值。虚线表示
    95%置信区间。


    **图 9-6：** 由域中每个位置的均值和 95%置信区间表示的高斯过程先验信念样本。每个目标值都由一个服从正态先验预测分布的随机变量建模。收集所有随机变量的分布，并随着更多观测数据的收集而更新这些分布，可以帮助我们量化真实底层函数的潜在形状及其概率。


    因此，先验过程可以作为未知黑箱函数的代理数据生成过程，它也可以用于以函数形式生成样本，这是从概率分布中采样单个点的扩展。例如，如果我们反复从先验过程中采样，我们会预期大多数（约
    95%）样本落在置信区间内，而少数样本落在此范围之外。图 9-7 展示了从先验过程中采样的三个函数。


    ![](img/605529_1_En_9_Fig7_HTML.jpg)


    函数 `f` 相对于 `x` 的折线图在两条水平虚线之间呈现一条实线。这些线由三条幅度和相位各异的正弦趋势组成，它们大多位于虚线范围内。


    **图 9-7：** 从先验过程中采样的三个示例函数，其中大多数函数落在 95%置信区间内。


    在高斯过程中，每个位置（即交易策略的参数值）目标值的不确定性通过置信区间来量化。当我们开始收集观测数据并假设一个无噪声且精确的观测模型时，采集位置处的不确定性将被消除，导致这些位置方差为零且直接内插。此外，随着我们远离观测数据，方差会增加，这是将先验过程（关于未知黑箱函数的先验信念）与实际观测数据提供的信息相结合的结果。图
    9-8 展示了收集两个观测数据后更新的后验过程。基于观测数据具有更新知识的后验过程将由此构建出更准确的代理模型，并能更好地估计目标函数。


    ![](img/605529_1_En_9_Fig8_HTML.jpg)


    函数 `f` 相对于 `x` 的折线图有两条相交的虚线，中间包含一条连续线。实线是后验过程的均值，虚线标记了 95%置信区间。交点标记了精确的观测点。


    **图 9-8：** 在高斯过程中纳入两个精确观测数据后的更新后验过程。后验均值通过观测点进行插值，并且随着我们靠近观测点，相关的方差会减小。


    在数学上，对于一个新的采样位置 `x*`（位于 `X` 中），遵循高斯过程的相应函数评估值 `f*` 将假设一个条件正态分布：


    `p(f*; x*, D_n) = N(f* | μ*, σ*²)`


    其中 `D_n = {(x_i, f_i)}`（对于 `i = 1` 到 `n`）包含历史观测到的成对采样位置和标量观测值。通过调用多元高斯定理可以推导出后验均值和方差函数的闭式解，得到：


    `μ* = k(x_{1:n}, x*) K(x_{1:n}, x_{1:n})⁻¹ f_{1:n}`


    `σ*² = k(x*, x*) - k(x_{1:n}, x*) K(x_{1:n}, x_{1:n})⁻¹ k(x_{1:n}, x*)`


    因此，我们可以基于后验高斯过程模型获得任意位置的后验均值和方差，该模型充当特定交易策略底层函数的代理模型。


    现在让我们看看另一个关键组成部分：采集函数。

    '
- fmt: '### Acquisition Function


    The tools from Bayesian inference and the incorporation of the Gaussian process
    provide principled reasoning on the underlying distribution of the objective function.
    However, we would still need to incorporate such probabilistic information in
    our decision-making to search for the global maximum. We need to build a policy
    (by maximizing the acquisition function) that absorbs the most updated information
    on the objective function and recommends the following most promising sampling
    location in the face of uncertainties across the domain. The optimization policy
    guided by maximizing the acquisition function thus plays an essential role in
    connecting the Gaussian process to the eventual goal of Bayesian optimization.
    In particular, the posterior predictive distribution obtained from the updated
    Gaussian process provides an outlook on the objective value and the associated
    uncertainty for locations not explored yet, which could be used by the optimization
    policy to quantify the utility of any alternative location within the domain.


    When converting the posterior knowledge about candidate locations, that is, posterior
    parameters such as the mean and the variance of the Gaussian distribution at each
    location, to a single scalar utility score, the acquisition function comes into
    play. An acquisition function is a manually designed mechanism that evaluates
    the relative potential of each candidate location in the form of a scalar score,
    and the location with the maximum score will be used as the next sampling choice.
    It is a function that assesses how valuable a candidate’s location is when we
    acquire/sample it.


    The acquisition function takes into account both the expected value and the uncertainty
    (variance) of the function at unexplored locations, as provided by the Gaussian
    process posterior distribution. In this context, exploration means sampling in
    regions of high uncertainty, while exploitation involves sampling where the function
    value is expected to be high.


    The acquisition function is also cheap to evaluate as a side computation since
    we need to evaluate it at every candidate location and then locate the maximum
    utility score, posing another (inner) optimization problem. Figure [9-9](#605529_1_En_9_Chapter.xhtml#Fig9)
    provides a sample curve of the acquisition function.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig9_HTML.jpg)


    A line graph of acquisition function versus x has a fluctuating trend. The peak
    point marks the maximization of the acquisition function which is the next sampling
    point. Two troughs at zero values indicate there is no additional information
    gained by sampling location.


    **Figure 9-9** – Illustrating a sample acquisition function curve. The location
    that corresponds to the highest value of the acquisition function is the next
    location (parameter value of a trading strategy) to sample. Since there is no
    value added if we were to sample those locations already sampled earlier, the
    acquisition function thus reports zero at these locations.


    Many choices of acquisition functions have been proposed in the literature. Popular
    choices include the expected improvement (EI) and upper confidence bound (UCB).
    Still, it suffices, for now, to understand that it is a predesigned function that
    needs to balance two opposing forces: exploration and exploitation. Exploration
    encourages resolving the uncertainty across the domain by sampling at unfamiliar
    and distant locations, since these areas may bear a big surprise due to high certainty.
    Exploitation recommends a greedy move at promising regions where we expect the
    observation value to be high. The exploration-exploitation trade-off is a common
    topic in many optimization settings.


    Another distinguishing feature is the short-term (myopic) and long-term (nonmyopic)
    trade-offs. A short-term acquisition function only focuses on one step ahead and
    assumes this is the last chance to sample from the environment; thus, the recommendation
    is to maximize the immediate utility. A long-term acquisition function employs
    a multistep lookahead approach by simulating potential evolutions/paths in the
    future and making a final recommendation by maximizing the long-run utility.


    There are many other emerging variations in the design of the acquisition function,
    such as adding safety constraints to the system under study. In any case, we would
    judge the quality of the policy using a specific acquisition function based on
    how close we are to the location of the global maximum upon exhausting our budget.
    The distance between the current and optimal locations is often called instant
    regret or simple regret. Alternatively, the cumulative regret (cumulative distances
    between historical locations and the optimum location) incurred throughout the
    sampling process can also be used.


    Let us dive more into two popular acquisition functions: expected improvement
    (EI) and upper confidence bound (UCB).'
