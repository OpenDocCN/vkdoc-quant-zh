    # 回测介绍


    回测允许我们使用历史数据模拟交易策略，并在实际建仓前分析其风险与收益。它是指利用历史数据逆向测试特定交易策略的过程，以评估该策略在后续未来数据上的表现。在训练机器学习模型的背景下，这种表现也被称为测试集表现，其常见约束是：在制定策略或训练模型时，测试集必须被完全隔离。这段留作测试的历史数据使我们能够评估所提交易策略的潜在变异性。


    在此基础上，回测提供了一种在排除情绪和主观偏见的情况下衡量交易策略有效性的方法。它提供了一种科学方法来模拟策略的实际表现，进而可用于计算各种汇总指标，这些指标指示了策略的潜在盈利能力、风险以及随时间的稳定性。示例指标包括总回报、平均回报、波动率、最大回撤（稍后将介绍）和夏普比率。


    在执行回测程序时，需要避免数据窥探（即窥视未来）并遵守时间序列。即使使用某段历史数据进行交叉验证，也需要确保交叉验证期处于训练期之外，更具体地说，是在训练期之后。换句话说，交叉验证期不能出现在训练期中间，从而在我们向前推进时保持时间序列的顺序。


    在历史数据上回顾性测试交易策略的假设表现，使我们能够根据上述一系列指标评估其变异性。由于同一交易策略在针对不同投资期限和资产选择进行回测时，可能表现出截然不同的行为，因此在采用特定交易策略之前，覆盖一组全面的回测场景至关重要。进行全面且多样化的回测过程十分关键，因为交易策略的表现会因投资期限的选择、资产的选择以及测试期间的特定市场条件而发生巨大变化。


    例如，我们可以对我们之前讨论过的趋势跟踪策略进行回测，该策略使用两条移动平均线，在发生交叉时生成交易信号。在此过程中，输入由两个窗口大小组成：一个用于短期窗口，一个用于长期窗口。输出是产生的回报、波动率或其他风险调整后回报（如夏普比率）。移动平均线的任意一对窗口大小都有一个对应的表现指标，我们会更改输入参数，以便在历史数据上获得最优表现指标。更具体地说，我们可以为每个参数创建一系列潜在值——例如，我们可以测试
    10 天到 30 天的短期移动平均线，以及 50 天到 200 天的长期移动平均线。对于这些参数的每一种组合，我们都计算相应的表现指标。然后，最优参数会使这个选定的表现指标最大化（或最小化，取决于具体指标）。


    ## 回测的注意事项


    请注意，良好的回测表现并不一定能保证未来的良好回报。这是由于回测的基本假设：任何在过去表现良好的策略，未来时期很可能也表现良好；反之，任何过去表现不佳的策略，未来很可能也表现不佳。由于金融市场是复杂的适应性系统，受到经济指标、地缘政治事件甚至投资者情绪变化等多种因素影响，所有这些因素都在不断演变，可能与过去的模式大相径庭。总之，过去的表现并不预示未来的结果。


    然而，一个执行良好且产生积极结果的回测可以让人确信该策略在基本原理上是稳健的，并且在现实中实施时有可能产生利润。回测至少可以帮助我们淘汰那些未能证明自身价值的策略。然而，这一假设在股票市场上很可能失效，而股票市场的典型特征是信噪比低。由于金融市场不断快速演变，未来可能出现历史数据中不存在的模式，这使得外推比内插更为困难。


    回测的另一个问题是可能过度拟合策略，使其在用于测试的历史数据上表现良好，但无法泛化到新的、未见过的数据上。当策略过于复杂，并且针对测试数据中的特异性和噪声进行定制，而非识别和利用支配数据生成过程的基本模式时，就会发生过拟合。


    此外，历史数据的回测期需要具有代表性，并能反映多种市场状况。过度使用同一数据集进行回测称为数据挖掘，在这种情况下，同一数据集可能纯粹偶然地产生异常好的结果。例如，如果回测只包含经济繁荣时期，该策略可能看起来比在经济低迷或市场波动条件下更为成功。通过在全面且多样化的历史数据周期上评估交易策略，我们可以避免数据挖掘，并更好地判断良好的表现（如果有的话）是源于稳健的交易还是仅仅是侥幸。


    数据挖掘，或称“p 值操纵”，是回测中的一个重要问题。它涉及对同一数据集反复运行参数略有不同的不同回测，直到找到理想的结果。这里的危险在于，积极的结果可能只是偶然产物，而非真正有效策略的指示。这种过度拟合可能导致策略在测试数据上表现异常出色，但在新的未见数据上却惨败。


    另一方面，用于回测的股票选择也需要具有代表性，应包括那些最终破产、被出售或清算的公司。未能做到这一点会产生生存偏差，即人们挑选一组股票，只看那些存活至今的，而忽略那些中途消失的。通过排除那些已失败或经历重大结构性变化的公司，我们可能最终对策略的盈利能力和风险状况产生过于乐观的看法。这是因为，一般来说，存活下来的股票很可能是那些表现优于平均水平的股票。忽略因任何原因破产或退市的公司可能会扭曲结果，制造出策略成功的假象，而实际上该策略在真实环境中可能表现不佳。

    '
- fmt: '此外，通过纳入表现不佳或失败的股票，我们能够更好地评估策略的风险，并为最坏情况做好准备。这有助于进行更准确的风险与回报评估，并在部署策略时为决策过程提供更充分的信息。该策略也将更加稳健，能够承受包括经济低迷期或行业特定冲击在内的多种市场环境。


    最后，回测还应考虑所有交易成本，无论其多么微不足道，因为这些成本会在回测期间累积，并严重影响交易策略盈利能力的表现。这些成本可包括经纪费、买卖价差、滑点（交易预期价格与实际执行价格之间的差额），以及在部分情况下的税费和其他监管费用。在回测中忽略这些成本可能导致对策略表现的评估过于乐观。例如，一个高频交易策略在未考虑交易成本的回测中可能看似盈利，但在现实中，这类策略涉及大量交易，因此产生的高额交易成本会迅速侵蚀任何潜在利润。在回测阶段考虑这些成本，将能更准确地预估策略的净盈利能力。此外，交易成本的影响会因交易策略的具体细节而有很大差异。涉及频繁交易、利润率较窄或大额订单的策略，对回测过程中关于交易成本的假设可能尤为敏感。


    在深入探讨回测的具体细节之前，我们先介绍一种名为最大回撤的流行风险衡量指标。


    ### 理解最大回撤


    此前，我们介绍了夏普比率，它衡量的是每单位波动率的超额收益。还有许多其他的风险衡量指标，由于最大回撤在实践中被广泛使用，本节将对其进行介绍。具体来说，最大回撤衡量的是下行波动率的影响，因为上行波动率带来正回报，是更受欢迎的表现。换句话说，我们更关心的是偏离均值至下行方向，而不是上行方向。因此，当我们使用“风险”这一术语时，通常更强调导致更低甚至负回报的下行运动。


    最大回撤被定义为从前一个财富高点到后续财富低点的最大损失百分比。这里，财富指资产价值，代表因持有资产而拥有的资金数额。由于它追踪可能的最大损失，最大回撤衡量的是假设我们在资产峰值时买入并在谷底卖出时可能遭受的损失。它衡量了在投资期内，如果我们足够不幸，从峰顶到谷底可能经历的最差回报。它指示了最坏情况可能有多糟糕，尽管它不一定反映交易策略的实际回报。


    最大回撤为理解与投资策略相关的潜在风险提供了宝贵的视角，并且在凸显潜在负面表现的程度方面尤为有用。通过考虑一项投资策略在最坏情况下可能承受的最大百分比损失，我们可以了解投资者可能必须承受的潜在“痛苦”或“风险”。


    要计算最大回撤，我们首先需要获得一系列财富指数，以指示在每个时间单位我们拥有的资金数额，假设采用一种买入并持有策略（或其他感兴趣的交易策略）。这是一个时间序列，记录每个时间点的投资组合价值，考虑了所有交易活动，包括股息再投资、市场回报的影响以及组合调整（如买入或卖出资产）。换句话说，财富指数追踪了一笔初始投资金额（例如1000美元）自投资期初用于购买资产以来的演变过程。


    接下来，我们获取任何时间点的先前峰值财富指数。这给出了由于特定交易策略，自建仓以来在任何时间点曾经历过的最高投资组合价值。这实质上识别了投资组合价值的“最高点”。先前峰值与当前财富之间的差距即为回撤（转换为百分比），它指示了我们可能损失的金额。该值通常为负数或零，反映了当前投资组合价值从其最近峰值下跌的程度。


    最后，最大差距即为最大回撤。这是回撤的最低（最负）值，表示从峰顶到谷底的最大百分比损失。它代表了如果在峰顶买入并在其后最低点卖出，投资组合在回测期间将承受的最严重损失。


    图[7-1](#605529_1_En_7_Chapter.xhtml#Fig1)展示了最大回撤的计算过程。我们首先获取交易资产的原始价格点，通常可以是日度或月度数据。这些价格被转换为单期收益率，然后通过复利计算序列收益率来获得财富指数。接着，通过计算每个时间点的累计最大财富与当前时间点财富值之间的百分比差异，得出单期回撤。最后，我们报告这些单期回撤中的最大值，作为最大回撤的最终结果。'
  raw: 'Moreover, by incorporating stocks that have underperformed or failed, we are
    in a better position to assess the risk of the strategy and prepare for worst-case
    scenarios. This can lead to more accurate risk and reward assessments and better
    inform the decision-making process when it comes to deploying the strategy. This
    strategy will also be more robust and can withstand various market conditions,
    including periods of economic downturn or industry-specific shocks.


    Lastly, a backtest should also consider all trading costs, however insignificant,
    as these can add up over the course of the backtesting period and drastically
    affect the performance of a trading strategy’s profitability. These costs can
    include brokerage fees, bid-ask spreads, slippage (the difference between the
    expected price of a trade and the price at which the trade is executed), and in
    some cases, taxes and other regulatory fees. Overlooking these costs in backtesting
    can lead to an overly optimistic assessment of a strategy’s performance. For example,
    a high-frequency trading strategy might seem profitable when backtested without
    trading costs. However, in reality, such strategies involve a large number of
    trades and, therefore, high transaction costs, which can quickly erode any potential
    profits. Considering these costs during the backtesting stage will present a more
    accurate estimate of the net profitability of the strategy. Moreover, the impact
    of trading costs can vary greatly depending on the specifics of the trading strategy.
    Strategies that involve frequent trading, narrow profit margins, or large order
    sizes can be particularly sensitive to the assumptions made about trading costs
    in the backtesting process.


    Before diving into the specifics of backtesting, let us introduce a popular risk
    measure called the maximum drawdown, or max drawdown.


    ### Understanding Maximum Drawdown


    Previously, we introduced the Sharpe ratio, which measures the excess return per
    unit of volatility. There are many other measures of risk, and this section covers
    the max drawdown due to its popular use in practice. In particular, the max drawdown
    measures the impact of the downside volatility, since the upside volatility brings
    positive returns and is a preferred behavior. In other words, we are more concerned
    with deviating from the mean on the downside instead of the upside. Therefore,
    when we use the term risk, we often highlight more on the downside movement that
    leads to a lower or even negative return.


    Max drawdown is defined as the maximum loss in percentage from the previous high
    wealth to a subsequent low wealth. Here, wealth refers to the asset value and
    represents the amount of money we have at hand due to holding the asset. Since
    it tracks the maximum loss possible, the max drawdown measures a hypothetical
    loss if we were to buy the asset at its peak price and sell it at its bottom price.
    It measures the worst return from the peak to the trough that we could have experienced,
    if we are unlucky enough, over the investment period. It gives an indication of
    how bad the worst-case scenario could be, although it does not necessarily reflect
    the actual returns of a trading strategy.


    Max drawdown provides a valuable perspective on the potential risks associated
    with an investment strategy and is particularly useful in highlighting the potential
    extent of negative performance. By considering the maximum percentage loss that
    an investment strategy would have incurred in the worst-case scenario, we gain
    an understanding of the potential “pain” or “risk” the investor might have to
    endure.


    To calculate the max drawdown, we first need to obtain a series of the wealth
    index to indicate the amount of money we have at each unit of time, assuming a
    hypothetical buy-and-hold strategy (or other trading strategies of interest).
    It is a time series that records the value of the portfolio at each point in time,
    taking into account all trading activities, including the reinvestment of dividends,
    the effect of market returns, and adjustments made to the portfolio, such as buying
    or selling of assets. In other words, the wealth index tracks the evolution of
    an initial investment amount (say $1000) that was used to buy the asset at the
    beginning of the investment horizon.


    Next, we obtain the prior peak wealth index at any point in time. This gives the
    highest portfolio value that one has experienced due to the particular trading
    strategy at any point in time since the initiation of the position. This essentially
    identifies the “highest highs” of the portfolio value. The distance between the
    prior peak and current wealth gives the drawdown (converted to percentages), which
    indicates the amount of money we could have lost. This value is usually negative
    or zero and reflects the extent to which the current portfolio value has fallen
    from its most recent peak.


    Lastly, the maximum distance then gives the max drawdown. This is the lowest (most
    negative) value of the drawdown, indicating the largest percentage loss from the
    peak to the trough. It signifies the worst loss the portfolio would have incurred
    over the backtest period if the asset is bought at the peak and sold at the lowest
    point thereafter.


    Figure [7-1](#605529_1_En_7_Chapter.xhtml#Fig1) illustrates the calculation process
    of max drawdown. We first obtain the raw price points of trading assets, which
    could typically be daily or monthly. These prices are converted to single-period
    returns, followed by compounding the sequential returns to obtain the wealth index.
    The single-period drawdown is then derived by calculating the percentage difference
    between the cumulative maximum wealth of each time point and the wealth value
    at the current time point. Finally, we report the maximum of these single-period
    drawdowns as the final return of the max drawdown.'
