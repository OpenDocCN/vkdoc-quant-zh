    # 2. 电子市场\n\n在本章中，我们将深入探讨电子市场的世界，它彻底改变了金融工具的交易方式。随着技术的快速进步和互联网的广泛普及，电子市场已在很大程度上取代了传统的、基于交易大厅的交易场所，为全球市场参与者带来了速度、效率和可及性的新时代。\n\
    \n电子市场通过计算机系统和网络促进股票、债券、货币和商品（参见第[1](#605529_1_En_1_Chapter.xhtml)章）等金融工具的买卖。它们在实现金融市场准入民主化方面发挥了关键作用，使更广泛的参与者（包括散户投资者、机构投资者和高频交易者）能够轻松、透明地进行交易活动。电子市场的核心是交易机制，它规定了买卖订单如何匹配、执行和结算。\n\
    \n此外，电子市场提供了多种订单类型，以满足交易者的不同需求和目标。这些订单类型可用于实现特定目标，例如最小化市场影响、确保理想的执行水平或管理风险。在本章中，我们将研究最常见的订单类型，包括市价单、限价单、止损单及其各种变体。\n\
    \n随着本章内容的深入，读者将全面了解电子市场的内部运作方式、驱动它们的交易机制，以及市场参与者可获得的各种订单类型。\n\n## 介绍电子市场\n\n电子市场的运行基础是一个离散的价格网格，其中价格根据价格大小线性排列。每个市场都有一个最小报价单位。一个`tick`是市场中某一交易工具价格网格上任意两个相邻价格之间的最小价格差。不同交易工具的价格波动可能差异很大，我们使用它们各自的`tick`大小来表示它们在交易所中最小涨跌幅度。股票通常以1美分的`tick`大小增量交易，货币以`pip`（百分比点或价格利息点）计价，利率则以基点（`bps`）计价。当价格网格中的价格从小到大排列时，它被称为`price\
    \ ladder`（价格阶梯）。\n\n`price ladder`在电子市场中起着至关重要的作用，它直观地展示了订单簿，订单簿包含了特定交易工具所有待处理买卖订单的列表。订单簿会实时持续更新，反映出市场随新订单的提交、修改或取消而变化的动态特性。`price\
    \ ladder`的每个层级对应一个特定的价格水平，买盘（或出价）列在一侧，卖盘（或要价）列在另一侧。最高出价和最低要价分别被称为最优买价和最优卖价，它们之间的差额被称为买卖价差。\n\
    \n市场参与者可以利用`price ladder`和订单簿提供的信息，深入了解特定交易工具的供需动态。这些数据可以帮助交易者识别潜在的交易机会、评估流动性，并判断市场在各个价格水平上的深度。例如，特定价格点上的大量订单集群可能预示着重要的支撑位或阻力位，而订单簿变薄则可能意味着流动性不足和价格波动加剧。通过仔细分析`price\
    \ ladder`和订单簿，交易者可以做出更明智的决策，并制定利用当前市场条件的策略。此外，理解价格网格中`tick`大小的作用对于交易者下单、管理风险和执行交易至关重要，因为即使是`tick`大小的微小变化，也可能对交易潜在的盈利或亏损产生重大影响。"
