    uncertainty in the execution price; pay for the bid-ask spread |

    | Limit order | Limit price, trading direction, and volume | Guaranteed to buy/sell
    an asset at the specified limit price or better for a buy/sell limit order; execution
    not guaranteed; order is shelved into the LOB if not executable; different marketability
    |

    | Stop order | Stop price, trading direction, and volume | Market order with a
    stop price; executed in the direction of asset price movement; applicable for
    both entering a position and already in a position |

    | Stop-limit order | Stop price, limit price, trading direction, and volume |
    A limit order is contingent on a preset stop price and a limit price; execution
    is not guaranteed |

    | Pegged order | Reference price, offset, trading direction, and volume | A limit
    order with a dynamic limit price; consists of a cancelation order and a new limit
    order when reference price changes |

    | Trailing stop order | Trailing amount, trading direction, and volume | Dynamic
    stop order; trailing stops only move if the price moves favorably |

    | Market if touched order | Trigger price, trading direction, and volume | A market
    order to buy (sell) below (above) the market; buy when the price falls or sell
    when the price rises |


    ### More Order Types: Limit and Cancelation


    There exist some other order types. For example, fill or kill (FOK) is a conditional
    type of order used in securities trading that instructs a brokerage to execute
    a transaction immediately and completely (the fill part) or not at all (the kill
    part). With FOK, the limit order is either completely filled at a specified or
    better price or completely canceled. It combines an all-or-none (AON) specification
    indicating it must be filled entirely; if not, it will be canceled. FOK orders
    are often used when a trader wants to ensure that a large order is executed quickly
    and fully without partial fills. This type of order is more suitable for large
    orders or illiquid markets, where a trader wants to avoid the risk of moving the
    market price.


    Similarly, fill and kill (FAK) is a limit order that is executed against any existing
    orders at the stated limit price or better, up to the volume of the order. Any
    residual volume from this order is then immediately canceled. FAK orders are useful
    when a trader wants to take advantage of short-term market opportunities without
    leaving an open order on the books. FAK orders provide a balance between getting
    an immediate fill for the desired quantity, but without the all-or-none restriction
    of an FOK order.


    Both FOK and FAK orders can be useful in specific trading scenarios, depending
    on the trader’s objectives and market conditions. These conditional order types
    offer greater control over trade executions and can help traders manage risk and
    capture market opportunities more effectively.


    In addition, in high-frequency trading (HFT), an “immediate or cancel” (IOC) order
    is a type of order that must be executed as soon as it is placed in the market.
    The unfilled portion is immediately canceled when the order cannot be fully executed.


    ### Price Impact


    It is important to note the potential price impact of large market orders, which
    tend to move prices. And the reason is the lack of sufficient liquidity for large
    orders to fill at the best price. Large market orders can have a significant impact
    on prices, especially when there is insufficient liquidity at the best price level.
    This phenomenon is known as price slippage, which occurs when the actual execution
    price of an order differs from the expected price due to insufficient liquidity.


    For example, suppose that a 10K-share market buy order arrives, and the best offer
    is $100 for 5K shares. Half the order will fill at $100, but the next 5K shares
    will have to fill at the next price in the book, say at $100.02 (where we assume
    there are also 5K shares offered). The volume-weighted average price for the order
    will be $100.01, which is larger than $100.00\. Thus, the price might move further
    following the trade.


    To mitigate the impact of large market orders on prices, traders can consider
    using alternative order types or strategies, such as using limit orders to control
    the price at which their orders get executed or iceberg orders that divide large
    orders into smaller parts, thus reducing the visibility of the order’s total size.'
