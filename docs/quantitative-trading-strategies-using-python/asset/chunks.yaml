    此前，我们介绍了夏普比率，它衡量的是每单位波动率的超额收益。还有许多其他的风险衡量指标，由于最大回撤在实践中被广泛使用，本节将对其进行介绍。具体来说，最大回撤衡量的是下行波动率的影响，因为上行波动率带来正回报，是更受欢迎的表现。换句话说，我们更关心的是偏离均值至下行方向，而不是上行方向。因此，当我们使用“风险”这一术语时，通常更强调导致更低甚至负回报的下行运动。


    最大回撤被定义为从前一个财富高点到后续财富低点的最大损失百分比。这里，财富指资产价值，代表因持有资产而拥有的资金数额。由于它追踪可能的最大损失，最大回撤衡量的是假设我们在资产峰值时买入并在谷底卖出时可能遭受的损失。它衡量了在投资期内，如果我们足够不幸，从峰顶到谷底可能经历的最差回报。它指示了最坏情况可能有多糟糕，尽管它不一定反映交易策略的实际回报。


    最大回撤为理解与投资策略相关的潜在风险提供了宝贵的视角，并且在凸显潜在负面表现的程度方面尤为有用。通过考虑一项投资策略在最坏情况下可能承受的最大百分比损失，我们可以了解投资者可能必须承受的潜在“痛苦”或“风险”。


    要计算最大回撤，我们首先需要获得一系列财富指数，以指示在每个时间单位我们拥有的资金数额，假设采用一种买入并持有策略（或其他感兴趣的交易策略）。这是一个时间序列，记录每个时间点的投资组合价值，考虑了所有交易活动，包括股息再投资、市场回报的影响以及组合调整（如买入或卖出资产）。换句话说，财富指数追踪了一笔初始投资金额（例如
    1000 美元）自投资期初用于购买资产以来的演变过程。


    接下来，我们获取任何时间点的先前峰值财富指数。这给出了由于特定交易策略，自建仓以来在任何时间点曾经历过的最高投资组合价值。这实质上识别了投资组合价值的“最高点”。先前峰值与当前财富之间的差距即为回撤（转换为百分比），它指示了我们可能损失的金额。该值通常为负数或零，反映了当前投资组合价值从其最近峰值下跌的程度。


    最后，最大差距即为最大回撤。这是回撤的最低（最负）值，表示从峰顶到谷底的最大百分比损失。它代表了如果在峰顶买入并在其后最低点卖出，投资组合在回测期间将承受的最严重损失。


    图 7-1 展示了最大回撤的计算过程。我们首先获取交易资产的原始价格点，通常可以是日度或月度数据。这些价格被转换为单期收益率，然后通过复利计算序列收益率来获得财富指数。接着，通过计算每个时间点的累计最大财富与当前时间点财富值之间的百分比差异，得出单期回撤。最后，我们报告这些单期回撤中的最大值，作为最大回撤的最终结果。

    '
- fmt: '# 最大回撤计算


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig1_HTML.jpg)


    一个水平流程图示，用于计算最大回撤：从资产价格的原始时间序列（即每日或每月价格点）出发，通过每日或每月收益率、财富指数和回撤，最终返回所有每日或每月回撤中的最大值。


    **图 7-1** 展示了计算最大回撤的过程


    再次强调，最大回撤是一种风险度量，有助于我们理解回测期间交易策略的最坏情况。这种回撤计算过程在直觉上是合理的，因为大多数人将其视为与过去曾拥有的资产峰值价值相比所损失的金额。


    **图 7-2** 提供了一个示例财富指数曲线以及相应的单期回撤。基于左图中蓝色线所示的累积财富指数曲线，我们可以得到绿色线所示的累积峰值。当财富持续创出新高时，该峰值线与财富指数线重合；当财富下降时，该峰值线保持水平。由此，我们可以形成一条由单期回撤组成的新时间序列曲线，该曲线表示这两条曲线之间的百分比差异，并返回最低点作为最大回撤。


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig2_HTML.jpg)


    两条折线图，分别显示财富和回撤随时间的变化。最低点表示最大回撤，财富相对于时间的最高峰值表示累积峰值。曲线的下降部分表示累积财富指数，上升部分表示累积最大重叠。


    **图 7-2** 基于示例财富指数曲线获取最大回撤


    这里，最大回撤并不意味着我们将遭受这样的损失；它仅仅意味着我们在遵循特定交易策略时可能遭受的最大损失。如果我们极其不幸，恰好在资产价格达到峰值时买入并在低谷时卖出，该策略可能会产生这样的损失。具有高最大回撤的策略表明风险水平较高，因为这表明该策略历史上曾导致重大损失。另一方面，具有低最大回撤的策略表明风险较低，因为它过去未导致显著损失。


    精明的读者可能会立即想到，是否存在基于回撤风险的经风险调整的收益指标。事实证明，确实存在，该指标称为卡尔玛比率（`Calmar ratio`），其计算方法是最近
    36 个月的年化收益率与同期最大回撤之间的比率。


    ## 回撤风险的弊端


    尽管回撤风险在从业者中是一种流行的度量方式，但它并不稳健，远非衡量经风险调整收益的完美指标。例如，每个单期回撤依赖于两个输入：当前财富值和累积峰值财富值。计算过程随后取两者之间的百分比差异。然而，当这两个输入中存在异常值时，计算出的回撤将直接受到影响。例如，其对异常值的敏感性可能会扭曲风险度量，并呈现出对潜在损失的失真图像。异常高或异常低的值可能会夸大或缩小回撤，导致对策略风险性的误导性解读。因此，它对数据集中的潜在异常值非常敏感。


    使用回撤风险的另一个缺点是它对观测频率的依赖性。例如，每日或每周回撤表现出比每月回撤更高的波动性，因此更有可能产生深度回撤。然而，当将数据聚合为月度收益率时，这种深度回撤可能会完全消失或转移到其他位置。这种对数据粒度的敏感性进一步损害了回撤度量的稳健性。


    同样值得指出的是，最大回撤仅提供了过去观察到的最坏情况的快照。它没有考虑其他可能发生但尚未发生的潜在不利情况。


    接下来，我们使用 Python 来计算最大回撤。'
  raw: '![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig1_HTML.jpg)


    A horizontal process diagram to calculate maximum drawdown that is the returns
    the maximum drawdown out of all daily or monthly drawdowns from raw time series
    of asset price means daily or monthly price points through daily or monthly returns,
    wealth index, and drawdown.


    Figure 7-1


    Illustrating the process of calculating the max drawdown


    Again, the max drawdown is a risk measure that helps us understand the worst-case
    scenario of the trading strategy during the backtest period. Such a calculation
    process for the drawdown intuitively makes sense, since most people treat it as
    the money they have lost compared to the peak asset value they once owned in the
    past.


    Figure [7-2](#605529_1_En_7_Chapter.xhtml#Fig2) provides a sample wealth index
    curve and the corresponding single-period drawdowns. Based on the cumulative wealth
    index curve in the blue line in the left panel, we can obtain the cumulative peak
    value in the green line, which overlaps with the wealth index if the wealth continues
    to make new heights and stays flat if the wealth drops. We can thus form a new
    time series curve consisting of single-period drawdowns as the percentage difference
    between these two curves and return the lowest point as the max drawdown.


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig2_HTML.jpg)


    Two line graphs of wealth and drawdown versus time. The lowest point indicates
    maximum drawdown and the highest peak of wealth versus time indicates cumulative
    peak. The decreased part of the curve indicates cumulative wealth index and the
    increased part indicates cumulative max overlaps.


    Figure 7-2


    Obtaining the max drawdown based on a sample wealth index curve


    Here, the max drawdown does not mean we are going to suffer such a loss; it simply
    means the maximum loss we could have suffered following the particular trading
    strategy. The strategy may incur such a loss if we are extremely unlucky and happen
    to buy the asset at its peak price and sell it at its trough price. A strategy
    with a high max drawdown would indicate a higher risk level, as it shows that
    the strategy has historically resulted in substantial losses. On the other hand,
    a strategy with a low max drawdown would indicate lower risk, as it has not led
    to significant losses in the past.


    A shrewd reader may immediately wonder if there is a risk-adjusted return metric
    based on drawdown risk. It turns out there is, and the measure is called the Calmar
    ratio, which is calculated as the ratio between the annualized return of the trailing
    36 months and the max drawdown over the same trailing 36 months.


    ### The Downside of Drawdown Risk


    Although the drawdown risk is a popular measure among practitioners, it is not
    robust and thus far from being a perfect measure of risk-adjusted return. For
    example, each single-period drawdown relies on two inputs: the current wealth
    value and the cumulative peak wealth value. The calculation then proceeds by taking
    the percentage difference between the two. However, when there is an outlier value
    in these two inputs, the resulting drawdown will be directly impacted. Its sensitivity
    to outliers, for instance, can skew the risk measurement and present a distorted
    image of the potential loss. An unusually high or low value can inflate or deflate
    the drawdown, leading to misleading interpretations of the strategy’s riskiness.
    It is thus very sensitive to potential outliers in the dataset.


    Another downside of using drawdown risk is its dependency on the frequency of
    the observations. For example, daily or weekly drawdowns exhibit a higher degree
    of volatility than monthly drawdowns and are thus more likely to generate a deep
    drawdown. However, when aggregating the data into monthly returns, such a deep
    drawdown may completely disappear or move to other locations. Such sensitivity
    to the granularity of the data further hurts the robustness of the drawdown measure.


    It is also worth noting that max drawdown only provides a snapshot of the worst-case
    scenario observed in the past. It doesn’t consider other potential unfavorable
    situations that didn’t occur but could happen in the future.


    Next, we look at calculating the max drawdown using Python.'
