    ## Summary


    In this chapter, we covered the process of backtesting a trading strategy. We
    started by introducing the concept of backtesting and its caveats. We then introduced
    the maximum drawdown, a commonly used performance measure on the downside risk
    of a particular trading strategy, followed by its calculation process. Lastly,
    we provided an example of how to backtest a trend-following strategy via multiple
    performance measures.


    In the next chapter, we will introduce statistical arbitrage with hypothesis testing,
    with the pairs trading strategy as the working example.


    ## Exercises


