  trans: '

    ### 采集函数


    贝叶斯推断的工具与高斯过程的结合，为我们提供了关于目标函数潜在分布的原则性推理。然而，我们仍然需要在决策中融入这种概率信息，以搜索全局最大值。我们需要构建一个策略（通过最大化采集函数），该策略吸收目标函数的最新信息，并在面对整个领域的不确定性时，推荐下一个最有前景的采样位置。因此，通过最大化采集函数来引导的优化策略，在连接高斯过程与贝叶斯优化的最终目标中发挥着至关重要的作用。特别是，从更新后的高斯过程中获得的后验预测分布，为尚未探索的位置提供了目标值及其相关不确定性的展望，优化策略可利用这一点来量化领域内任何备选位置的效用。


    当将候选位置的后验知识（即每个位置上的高斯分布的后验参数，如均值和方差）转换为单一标量效用分数时，采集函数便发挥作用。采集函数是一种人工设计的机制，它以标量分数的形式评估每个候选位置的相对潜力，得分最高的位置将被选为下一个采样点。它是一个评估当我们采集/采样某个候选位置时该位置价值的函数。


    采集函数同时考虑了高斯过程后验分布所提供的未探索位置上的期望值与不确定性（方差）。在此语境下，探索意味着在高不确定性区域进行采样，而利用则意味着在函数值预期较高的区域进行采样。


    作为一项辅助计算，采集函数的评估成本也很低，因为我们需要在每个候选位置评估它，然后定位最大效用分数，这构成了另一个（内部）优化问题。图 9-9 提供了采集函数的示例曲线。


    ![](img/605529_1_En_9_Fig9_HTML.jpg)


    一幅采集函数关于 x 的折线图呈现出波动趋势。峰值点标志着采集函数的最大化，即下一个采样点。两个为零的谷值表明，对这些位置进行采样不会获得额外信息。


    **图 9-9** – 展示一条示例采集函数曲线。对应采集函数最高值的位置是下一个要采样的位置（交易策略的参数值）。由于如果采样之前已经采样过的位置不会增加价值，因此采集函数在这些位置上的值为零。


    文献中提出了许多采集函数的选择。常用的选择包括期望改进量（EI）和上置信界（UCB）。不过，目前只需理解它是一个预先设计好的函数，需要平衡两种对立的力量：探索与利用。探索鼓励通过在陌生且遥远的位置进行采样来解决整个领域的不确定性，因为这些区域由于高不确定性可能会带来巨大惊喜。利用则建议在期望观测值较高的有前景区域进行贪婪行动。探索-利用权衡是许多优化设置中的常见主题。


    另一个显著特征是短期（近视性）与长期（非近视性）的权衡。短期采集函数只关注下一步，并假设这是从环境中采样的最后机会；因此，它的建议是最大化即时效用。长期采集函数则采用多步前瞻方法，通过模拟未来的潜在演变/路径，并最大化长期效用来做出最终推荐。


    在采集函数的设计中还有许多其他新兴变体，例如为所研究的系统添加安全约束。无论如何，我们将根据在预算耗尽时，距离全局最大值位置有多近来评判使用特定采集函数的策略质量。当前位置与最优位置之间的距离通常被称为即时遗憾或简单遗憾。或者，也可以使用整个采样过程中产生的累积遗憾（历史位置与最优位置之间的累积距离）。


    让我们深入探讨两种常用的采集函数：期望改进量（EI）和上置信界（UCB）。

    '
- fmt: "### EI and UCB\n\nAcquisition functions differ in multiple aspects, including\
    \ the choice of the utility function, the number of lookahead steps, the level\
    \ of risk aversion or preference, etc. Introducing risk appetite directly benefits\
    \ from the posterior belief about the underlying objective function. In the case\
    \ of GP regression as the surrogate model, the risk is quantified by the covariance\
    \ function, with its credible interval expressing the uncertainty level about\
    \ the objective’s possible values.\n\nRegarding the utility of the collected observations,\
    \ the expected improvement chooses the historical maximum of the observed value\
    \ as the benchmark for comparison upon selecting an additional sampling location.\
    \ It also implicitly assumes that only one more additional sampling is left before\
    \ the optimization process terminates. The expected marginal gain in utility (i.e.,\
    \ the acquisition function) becomes the expected improvement in the maximal observation,\
    \ calculated as the expected difference between the observed maximum and the new\
    \ observation after the additional sampling at an arbitrary sampling location.\n\
    \nSpecifically, denote `y[1:n] = {y[1], ..., y[n]}` as the set of collected observations\
    \ at the corresponding locations `x[1:n] = {x[1], ..., x[n]}`. Assuming the noise-free\
    \ setting, the actual observations would be exact, that is, `y[1:n] = f[1:n]`.\
    \ Given the collected dataset `D_n = {x_{1:n}, y_{1:n}}`, the corresponding utility\
    \ is `u(D_n) = max{f_{1:n}} = f_n^*`, where `f_n^*` is the incumbent maximum observed\
    \ so far. Similarly, assume we obtain another observation `y[n+1] = f[n+1]` at\
    \ a new location `x[n+1]`, the resulting utility is `u(D_{n+1}) = u(D_n ∪ {x_{n+1},\
    \ f_{n+1}}) = max{f_{n+1}, f_n^*}`. Taking the difference between these two gives\
    \ the increase in utility due to the addition of another observation:\n\n```\n\
    u(D_{n+1}) - u(D_n) = max{f_{n+1}, f_n^*} - f_n^* = max{f_{n+1} - f_n^*, 0}\n\
    ```\n\nwhich returns the marginal increment in the incumbent if `f_{n+1} >= f_n^*`\
    \ and zero otherwise, as a result of observing `f[n+1]`. Readers familiar with\
    \ the activation function in neural networks would instantly connect this form\
    \ with the `ReLU` (rectified linear unit) function, which keeps the positive signal\
    \ and silences the negative one.\n\nDue to randomness in `y[n+1]`, we can introduce\
    \ the expectation operator to integrate it out, giving us the expected marginal\
    \ gain in utility, that is, the expected improvement acquisition function:\n\n\
    ```\nα_EI(x_{n+1}; D_n) = E[u(D_{n+1}) - u(D_n) | x_{n+1}, D_n]\n            \
    \        = ∫ max{f_{n+1} - f_n^*, 0} p(f_{n+1} | x_{n+1}, D_n) df_{n+1}\n```\n\
    \nUnder the framework of GP regression, we can obtain a closed-form expression\
    \ of the expected improvement acquisition function as follows:\n\n```\nα_EI(x_{n+1};\
    \ D_n) = (μ_{n+1} - f_n^*) Φ((μ_{n+1} - f_n^*) / σ_{n+1}) + σ_{n+1} φ((μ_{n+1}\
    \ - f_n^*) / σ_{n+1})\n```\n\nwhere `f_n^*` is the best-observed value so far,\
    \ and `φ` and `Φ` denote the probability and cumulative density function of a\
    \ standard normal distribution at the tentative point `x[n+1]`, respectively.\
    \ `μ[n+1]` and `σ[n+1]` denote the posterior mean and standard deviation at `x[n+1]`.\n\
    \nThe closed-form EI consists of two components: exploitation (the first term)\
    \ and exploration (the second term). Exploitation means continuing sampling the\
    \ neighborhood of the observed region with a high posterior mean, and exploration\
    \ encourages sampling an unvisited area where the posterior uncertainty is high.\
    \ The expected improvement acquisition function thus implicitly balances off these\
    \ two opposing forces.\n\nOn the other hand, the UCB acquisition function, as\
    \ defined in the following, encodes such a trade-off explicitly:\n\n```\nα_UCB(x_{n+1};\
    \ D_n) = μ_{n+1} + β_{n+1} σ_{n+1}\n```\n\nwhere `β[n+1]` is a user-defined stagewise\
    \ hyperparameter that controls the trade-off between the posterior mean and standard\
    \ deviation. A low value of `β[n+1]` encourages exploitation, and a high value\
    \ of `β[n+1]` leans more toward exploration.\n\nBoth acquisition functions will\
    \ then be assessed globally in search of the maximizing location, which will serve\
    \ as the next sampling choice. Let us summarize the full BO (Bayesian optimization)\
    \ loop in the following section.\n\n### The Full BO Loop\n\nBayesian optimization\
    \ is an iterative process between the (uncontrolled) environment and the (controlled)\
    \ policy. The policy involves two components supporting the sequential decision-making:\
    \ a Gaussian process as the surrogate model to approximate the true underlying\
    \ function (i.e., the environment), and an acquisition function to recommend the\
    \ best sampling location. The environment receives the probing request at a specific\
    \ location and responds by revealing a new observation that follows a particular\
    \ observation model. The Gaussian process surrogate model then uses the new observation\
    \ to obtain a posterior process in support of follow-up decision-making by the\
    \ preset acquisition function. This process continues until the stopping criterion,\
    \ such as exhausting a given budget, is met. Figure [9-10] illustrates this process.\n\
    \n![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig10_HTML.jpg)\n\nFigure 9-10:\
    \ The full Bayesian optimization loop featuring an iterative interaction between\
    \ the unknown (black-box) environment and the decision-making policy that consists\
    \ of a Gaussian process for probabilistic evaluation and acquisition function\
    \ for utility assessment of candidate locations in the environment\n\nWith the\
    \ basic BO framework in mind, let us test it out by optimizing the window lengths\
    \ of the pairs trading strategy."
  raw: '### EI and UCB


    Acquisition functions differ in multiple aspects, including the choice of the
    utility function, the number of lookahead steps, the level of risk aversion or
    preference, etc. Introducing risk appetite directly benefits from the posterior
    belief about the underlying objective function. In the case of GP regression as
    the surrogate model, the risk is quantified by the covariance function, with its
    credible interval expressing the uncertainty level about the objective’s possible
    values.


    Regarding the utility of the collected observations, the expected improvement
    chooses the historical maximum of the observed value as the benchmark for comparison
    upon selecting an additional sampling location. It also implicitly assumes that
    only one more additional sampling is left before the optimization process terminates.
    The expected marginal gain in utility (i.e., the acquisition function) becomes
    the expected improvement in the maximal observation, calculated as the expected
    difference between the observed maximum and the new observation after the additional
    sampling at an arbitrary sampling location.


    Specifically, denote *y*[1 : *n*] = {*y*[1], …, *y*[*n*]} as the set of collected
    observations at the corresponding locations *x*[1 : *n*] = {*x*[1], …, *x*[*n*]}.
    Assuming the noise-free setting, the actual observations would be exact, that
    is, *y*[1 : *n*] = *f*[1 : *n*]. Given the collected dataset ![$$ {\mathcal{D}}_n=\left\{{x}_{1:n},{y}_{1:n}\right\}
    $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq15.png) , the corresponding
    utility is ![$$ u\left({\mathcal{D}}_n\right)=\max \left\{{f}_{1:n}\right\}={f}_n^{\ast
    } $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq16.png) , where
    ![$$ {f}_n^{\ast } $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq17.png)
    is the incumbent maximum observed so far. Similarly, assume we obtain another
    observation *y*[*n* + 1] = *f*[*n* + 1] at a new location *x*[*n* + 1], the resulting
    utility is ![$$ u\left({\mathcal{D}}_{n+1}\right)=u\left({\mathcal{D}}_n\cup \left\{{x}_{n+1},{f}_{n+1}\right\}\right)=\max
    \left\{{f}_{n+1},{f}_n^{\ast}\right\} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq18.png)
    . Taking the difference between these two gives the increase in utility due to
    the addition of another observation:


    ![$$ u\left({\mathcal{D}}_{n+1}\right)-u\left({\mathcal{D}}_n\right)=\max \left\{{f}_{n+1},{f}_n^{\ast}\right\}-{f}_n^{\ast
    }=\max \left\{{f}_{n+1}-{f}_n^{\ast },0\right\} $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equf.png)


    which returns the marginal increment in the incumbent if ![$$ {f}_{n+1}\ge {f}_n^{\ast
    } $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq19.png) and zero
    otherwise, as a result of observing *f*[*n* + 1]. Readers familiar with the activation
    function in neural networks would instantly connect this form with the ReLU (rectified
    linear unit) function, which keeps the positive signal and silences the negative
    one.


    Due to randomness in *y*[*n* + 1], we can introduce the expectation operator to
    integrate it out, giving us the expected marginal gain in utility, that is, the
    expected improvement acquisition function:


    ![$$ {\alpha}_{EI}\left({x}_{n+1};{\mathcal{D}}_n\right)=\mathbbm{E}\left[u\left({\mathcal{D}}_{n+1}\right)-u\left({\mathcal{D}}_n\right)|{x}_{n+1},{\mathcal{D}}_n\right]\kern7em
    =\int \max \left\{{f}_{n+1}-{f}_n^{\ast },0\right\}p\left({f}_{n+1}|{x}_{n+1},{\mathcal{D}}_n\right)d{f}_{n+1}
    $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equg.png)


    Under the framework of GP regression, we can obtain a closed-form expression of
    the expected improvement acquisition function as follows:


    ![$$ {\alpha}_{EI}\left({x}_{n+1};{\mathcal{D}}_n\right)=\left({\mu}_{n+1}-{f}_n^{\ast}\right)\Phi
    \left(\frac{\mu_{n+1}-{f}_n^{\ast }}{\sigma_{n+1}}\right)+{\sigma}_{n+1}\phi \left(\frac{\mu_{n+1}-{f}_n^{\ast
    }}{\sigma_{n+1}}\right) $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equh.png)


    where ![$$ {f}_n^{\ast } $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_IEq20.png)
    is the best-observed value so far, and *ϕ* and Φ denote the probability and cumulative
    density function of a standard normal distribution at the tentative point *x*[*n* + 1],
    respectively. *μ*[*n* + 1] and *σ*[*n* + 1] denote the posterior mean and standard
    deviation at *x*[*n* + 1].


    The closed-form EI consists of two components: exploitation (the first term) and
    exploration (the second term). Exploitation means continuing sampling the neighborhood
    of the observed region with a high posterior mean, and exploration encourages
    sampling an unvisited area where the posterior uncertainty is high. The expected
    improvement acquisition function thus implicitly balances off these two opposing
    forces.


    On the other hand, the UCB acquisition function, as defined in the following,
    encodes such a trade-off explicitly:


    ![$$ {\alpha}_{UCB}\left({x}_{n+1};{\mathcal{D}}_n\right)={\mu}_{n+1}+{\beta}_{n+1}{\sigma}_{n+1}
    $$](images/605529_1_En_9_Chapter/605529_1_En_9_Chapter_TeX_Equi.png)


    where *β*[*n* + 1] is a user-defined stagewise hyperparameter that controls the
    trade-off between the posterior mean and standard deviation. A low value of *β*[*n* + 1]
    encourages exploitation, and a high value of *β*[*n* + 1] leans more toward exploration.


    Both acquisition functions will then be assessed globally in search of the maximizing
    location, which will serve as the next sampling choice. Let us summarize the full
    BO (Bayesian optimization) loop in the following section.


    ### The Full BO Loop


    Bayesian optimization is an iterative process between the (uncontrolled) environment
    and the (controlled) policy. The policy involves two components supporting the
    sequential decision-making: a Gaussian process as the surrogate model to approximate
    the true underlying function (i.e., the environment), and an acquisition function
    to recommend the best sampling location. The environment receives the probing
    request at a specific location and responds by revealing a new observation that
    follows a particular observation model. The Gaussian process surrogate model then
    uses the new observation to obtain a posterior process in support of follow-up
    decision-making by the preset acquisition function. This process continues until
    the stopping criterion, such as exhausting a given budget, is met. Figure [9-10](#605529_1_En_9_Chapter.xhtml#Fig10)
    illustrates this process.


    ![](images/605529_1_En_9_Chapter/605529_1_En_9_Fig10_HTML.jpg)


    A cyclic diagram includes blocks titled environment and policy connected through
    observation and sampling location. The policy has acquisition of function from
    the Gaussian process. The observations are generated by assuming a specific observation
    model.


    Figure 9-10


    The full Bayesian optimization loop featuring an iterative interaction between
    the unknown (black-box) environment and the decision-making policy that consists
    of a Gaussian process for probabilistic evaluation and acquisition function for
    utility assessment of candidate locations in the environment


    With the basic BO framework in mind, let us test it out by optimizing the window
    lengths of the pairs trading strategy.'
  trans: "\n### EI 与 UCB\n\n采集函数在多个方面有所区别，包括效用函数的选择、前瞻步数、风险规避或偏好程度等。引入风险偏好直接受益于对目标函数的后验信念。当以高斯过程回归作为代理模型时，风险通过协方差函数量化，其置信区间表达了目标可能取值的不确定性水平。\n\
    \n关于已收集观测值的效用，期望提升法将历史观测最大值作为基准，用于比较在额外采样位置的选择。该方法还隐含假设在优化过程终止前仅剩一次额外采样。效用的期望边际收益（即采集函数）成为观测最大值的期望提升，计算方式为：在任意采样位置进行额外采样后，观测最大值与新观测值之间的期望差值。\n\
    \n具体来说，记 `y[1:n] = {y[1], ..., y[n]}` 为在对应位置 `x[1:n] = {x[1], ..., x[n]}` 处收集的观测值集合。在无噪声设定下，实际观测值将是精确的，即\
    \ `y[1:n] = f[1:n]`。给定已收集数据集 `D_n = {x_{1:n}, y_{1:n}}`，相应的效用为 `u(D_n) = max{f_{1:n}}\
    \ = f_n^*`，其中 `f_n^*` 是迄今为止观测到的当前最大值。类似地，假设我们在新位置 `x[n+1]` 处获得另一个观测值 `y[n+1] =\
    \ f[n+1]`，则产生的效用为 `u(D_{n+1}) = u(D_n ∪ {x_{n+1}, f_{n+1}}) = max{f_{n+1}, f_n^*}`。两者相减即可得到因增加一个观测值而产生的效用增量：\n\
    \n```\nu(D_{n+1}) - u(D_n) = max{f_{n+1}, f_n^*} - f_n^* = max{f_{n+1} - f_n^*,\
    \ 0}\n```\n\n由于观测到 `f[n+1]`，当 `f_{n+1} >= f_n^*` 时，该式返回当前最大值的边际增量，否则为零。熟悉神经网络中激活函数的读者会立刻将此形式与\
    \ `ReLU`（修正线性单元）函数联系起来，后者保留正信号并抑制负信号。\n\n由于 `y[n+1]` 具有随机性，我们可以引入期望算子对其进行积分，从而得到效用的期望边际增益，即期望提升采集函数：\n\
    \n```\nα_EI(x_{n+1}; D_n) = E[u(D_{n+1}) - u(D_n) | x_{n+1}, D_n]\n          \
    \          = ∫ max{f_{n+1} - f_n^*, 0} p(f_{n+1} | x_{n+1}, D_n) df_{n+1}\n```\n\
    \n在高斯过程回归框架下，可以得到期望提升采集函数的闭式表达式如下：\n\n```\nα_EI(x_{n+1}; D_n) = (μ_{n+1} - f_n^*)\
    \ Φ((μ_{n+1} - f_n^*) / σ_{n+1}) + σ_{n+1} φ((μ_{n+1} - f_n^*) / σ_{n+1})\n```\n\
    \n其中 `f_n^*` 是迄今为止观测到的最佳值，`φ` 和 `Φ` 分别表示待定点 `x[n+1]` 处标准正态分布的概率密度函数和累积分布函数。`μ[n+1]`\
    \ 和 `σ[n+1]` 分别表示 `x[n+1]` 处的后验均值和后验标准差。\n\nEI 的闭式表达式包含两个部分：利用（第一项）和探索（第二项）。利用意味着继续在具有高后验均值的已观测区域邻域采样，而探索则鼓励在具有高后验不确定性的未访问区域采样。因此，期望提升采集函数隐式地平衡了这两种相反的力量。\n\
    \n另一方面，如下所定义的 UCB 采集函数则显式地编码了这种权衡：\n\n```\nα_UCB(x_{n+1}; D_n) = μ_{n+1} + β_{n+1}\
    \ σ_{n+1}\n```\n\n其中 `β[n+1]` 是用户定义的分阶段超参数，用于控制后验均值与标准差之间的权衡。较低的 `β[n+1]` 值鼓励利用，而较高的\
    \ `β[n+1]` 值则更倾向于探索。\n\n随后，这两个采集函数将在全局范围内进行评估，以寻找最大化位置，该位置将作为下一个采样选择。让我们在下一节中总结完整的\
    \ BO（贝叶斯优化）循环。\n\n### 完整的 BO 循环\n\n贝叶斯优化是在（非受控的）环境与（受控的）策略之间进行的迭代过程。该策略包含两个支持序贯决策的组件：一个高斯过程作为代理模型来近似真实的底层函数（即环境），以及一个采集函数来推荐最佳采样位置。环境接收在特定位置的探测请求，并通过揭示符合特定观测模型的新观测值来做出响应。高斯过程代理模型随后利用新观测值获得后验过程，以支持预设采集函数进行后续决策。此过程持续进行，直到满足停止标准（例如耗尽给定预算）为止。图\
    \ [9-10] 展示了这一过程。\n\n![](img/605529_1_En_9_Fig10_HTML.jpg)\n\n图 9-10：完整的贝叶斯优化循环，其特点在于未知（黑箱）环境与决策策略之间的迭代交互。该决策策略由用于概率评估的高斯过程和用于评估环境中候选位置效用的采集函数组成\n\
    \n了解了基本的 BO 框架后，让我们通过优化配对交易策略的窗口长度来对其进行测试。\n"
- fmt: '# Optimizing the Pairs Trading Strategy


    As introduced earlier, the pairs trading strategy characterizes two input arguments:
    the entry and exit thresholds. More specifically, we would like to apply the BO
    technique to search for the optimal entry and exit thresholds such that the black-box
    function reaches a maximum value. For simplicity, we only perform the Sharpe ratio
    calculation once over one backtesting period. A more robust approach to minimize
    the observation noise is to test it over multiple representative backtesting periods
    and report the average Sharpe ratio as a fair indication of the goodness of the
    given input parameters.


    To begin with, we will first install two packages: the `botorch` package that
    performs BO based on `PyTorch` and the `yfinance` package to facilitate data downloading.


    ```

    !pip install botorch

    !pip install yfinance

    ```


    We also import a few supporting packages in the following, along with setting
    the random seed for reproducibility:


    ```

    import os

    import math

    import torch

    import random

    import numpy as np

    from matplotlib import pyplot as plt

    import torch.nn as nn

    import yfinance as yf

    import pandas as pd

    from statsmodels.tsa.stattools import adfuller

