  trans: '

    # 总结


    在本章中，我们探讨了任何金融资产的两个关键特征：**风险**与**收益**。收益是指资产带来的财务回报，而风险则代表这种收益的波动性或不确定性。作为投资者，我们的目标是在最小化风险的同时最大化收益。


    我们介绍了表示和计算收益的不同方式，包括简单收益、期末收益、多期收益以及`1+R`格式的收益。理解这些收益形式之间的关联，对于在不同形式之间进行转换非常重要。


    随后，我们重点讨论了风险-收益权衡，即低收益资产通常与低风险相关，而高收益资产则与高风险相关。为了更好地比较不同投资工具的风险与收益，我们引入了年化收益和年化波动率，以及一种名为夏普比率的风险调整后收益指标。我们还提供了示例，说明在比较投资产品时，同时考虑风险与收益的重要性。


    # 练习题


    - 计算单期收益需要多少个输入值？

    - 如果资产价格从 5 美元变为 6 美元，收益是多少？

    - 某只热门股票的总收益通常高于还是低于其价格收益？

    - 计算由 10%、–5%和 6%组成的三期收益。

    - 如果我们买入一项资产，第一天上涨 10%，第二天下跌 10%，我们的收益是正数、负数还是零？

    - 计算季度（三个月）收益为 2%的资产的年化收益。

    - 下载苹果和特斯拉的年初至今股票数据，使用每日收盘价计算每日累计收益，并将收益绘制成折线图。

    - 年化波动率和方差都随时间线性增长，这个说法正确吗？

    - 假设月度波动率为 5%，计算年化波动率。

    - 年化波动率总是大于月度波动率，这个说法正确还是错误？

    - 无风险利率是低风险投资的回报率，这个说法正确还是错误？

    - 如果无风险利率上升而投资组合的波动率保持不变，夏普比率会上升还是下降？

    - 基于 2022 年上半年苹果股票每月中位日价格获取月度收益数据，并基于这些月度收益计算年化收益和波动率。


    # 5. 趋势跟踪策略


    趋势跟踪是一种广泛使用的投资策略，适用于各类市场，包括股票、债券、大宗商品、货币，甚至加密货币。顾名思义，该策略基于以下假设：价格会随时间沿特定方向（即“趋势”）运动，从而为捕捉这些波动提供机会。趋势跟踪的核心在于分析历史价格数据以识别潜在趋势。该策略随后建议建立与这些趋势一致的头寸，并预期这些趋势将持续。例如，如果某项资产的价格持续上涨，趋势跟踪者通常会建立多头头寸，预期上涨趋势将继续。反之，如果价格持续下跌，趋势跟踪者可能会建立空头头寸，押注价格将继续下跌。


    然而，与任何交易策略一样，趋势跟踪并非万无一失。由于意外的市场事件或市场情绪变化，趋势可能突然反转，从而导致潜在损失。因此，趋势跟踪策略通常会叠加风险管理技术，例如设置止损单，以在趋势反转时限制潜在损失。


    趋势跟踪策略使用多种技术指标来识别和确认趋势，例如移动平均线、趋势线和动量指标。本章介绍了基于移动平均线的趋势跟踪策略的工作原理，并展示了其在 Python
    中的实现。


    由于我们主要使用对数收益，让我们先通过一个计算过程的示例来了解它。


    ## 处理对数收益


    让我们进一步理解对数收益，因为后续评估趋势跟踪策略时，我们将用它来计算股票收益。我们从图 5-1 中的 Excel 表格开始，其中提供了一组虚拟股票价格，并要求回答
    Q1 到 Q9 的问题。以下详细说明这些问题和答案。


    ![一张虚拟股票价格的 Excel 表格。它展示了 5 天虚拟股票价格从 Q1 到 Q9 的一系列答案。](img/605529_1_En_5_Fig1_HTML.jpg)


    **图 5-1** 每日虚拟股票价格


    让我们逐一审视这九个问题。


    **Q1：** 为什么使用百分比收益？


    **答案：** 百分比收益提供了统一的比较尺度。例如，当另一只股票（股票 B）的价格数据在 1–10 范围内时，使用绝对值将其与 Excel 表格中的股票价格数据（股票
    A）进行比较会很困难。5 美元的上涨对股票 A 的意义远大于股票 B。通过将其转换为相对的百分比形式，我们可以将两只股票放在同一尺度上衡量其表现。因此，使用百分比收益，我们可以准确地比较这两只股票的表现，尽管它们的价格水平不同。


    百分比收益也可用于将某项投资的表现与基准或标准（如市场指数，如标普 500 或道琼斯工业平均指数）进行比较。这有助于投资者评估一项投资或投资组合相对于更广泛市场或某个市场板块的表现如何。


    **Q2：** 以原始方式计算单期百分比收益（基于收益的定义）。


    **答案：** 单期百分比收益，也称为简单收益或持有期收益，反映了投资价值从一个时期到下一个时期的百分比变化。其计算公式为


    ```

    R[t, t+1] = (S[t+1] - S[t]) / S[t]

    ```


    其中 `R[t, t+1]` 是从时间 `t` 到 `t+1` 的单期百分比收益，而 `S[t]` 和 `S[t+1]` 分别是时期 `t` 和 `t+1`
    结束时的资产价格。公式的分子 `S[t+1] - S[t]` 计算资产价格从时间 `t` 到 `t+1` 的变化。分母 `S[t]` 是期初价格，作为衡量相对变化的基准。将价格变化除以起始价格，得到相对价格变化，以百分比表示，这就是简单收益。


    将相同的公式应用于 `return1` 列中除第 1 天之外的所有单元格，得到图 5-2 中的结果。


    ![一张虚拟股票价格的 Excel 表格。它展示了 5 天虚拟股票价格在 Q2 列中的单期百分比收益。列标题为：天、价格和 return1。第 1 天和第
    2 天的价格分别为 100 和 108，已被高亮显示。](img/605529_1_En_5_Fig2_HTML.jpg)


    **图 5-2** 根据百分比收益定义计算简单收益


    **Q3：** 使用 `1+R` 方式计算相同的收益。


    **答案：** 使用 `1+R` 方式计算收益与原始方法略有不同，但本质上能得出相同的结果。这种方法强调资产价格从一个时期到下一个时期的增长因子，使得理解和解释更加容易。`1+R`
    方式将收益重写为


    ```

    R[t, t+1] = S[t+1] / S[t] - 1

    ```

    '
- fmt: 'This requires two steps: first, calculate the ratio ![$$ \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq1.png) to obtain
    the so-called 1+R return. This ratio reflects the growth factor of the asset’s
    price from the beginning of the period to the end. If this ratio is greater than
    one, it indicates that the asset’s price has increased over the period. If it’s
    less than one, it indicates a decrease in the asset’s price. If the ratio equals
    one, it means the asset’s price hasn’t changed.


    Next, we would subtract one from the 1+R return to convert it to the simple return.
    This step transforms the growth factor ![$$ \frac{S_{t+1}}{S_t} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq2.png)
    into the actual percentage return. Subtracting one essentially removes the initial
    investment from the calculation, leaving only the gained or lost amount relative
    to the initial investment, which is the return. See Figure [5-3](#605529_1_En_5_Chapter.xhtml#Fig3)
    for an illustration, where the daily returns are the same as in the previous approach.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig3_HTML.jpg)


    *An Excel table for dunny stock prices. It presents the same returns using the
    1+R way, for the dummy stock prices of 5 days. The column headers are day, price,
    return 1, and return 2. The prices of day 1 and day 2 are 100 and 108, which are
    highlighted.*


    **Figure 5-3** Calculating the simple returns based on the 1+R approach


    This 1+R method is often used because it is more intuitive. The growth factor
    ![$$ \frac{S_{t+1}}{S_t} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq3.png)
    easily shows how much the initial investment has grown (or shrunk), and subtracting
    one gives the net growth in percentage terms, which is the simple return. This
    method is especially useful when dealing with multiple time periods, as growth
    factors can simply be multiplied together to calculate the cumulative growth factor
    over several periods.


    **Q4: What is the terminal return from day 1 to day 5 without compounding?**


    **Answer:** The terminal return is the total return on an investment over a given
    period of time. It’s a measure of the total gain or loss experienced by an investment
    from the start of the investment period to the end, without considering any compounding
    effect over the period.


    To calculate the terminal return without involving the compounding process, we
    would resort to ![$$ {R}_{1,5}=\frac{S_5-{S}_1}{S_1}=\frac{S_5}{S_1}-1 $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq4.png),
    where the second formula first calculates the ratio of the asset’s price on day
    5 to its price on day 1 (which reflects the overall growth factor) and then subtracts
    one to convert the growth factor into a terminal return. See Figure [5-4](#605529_1_En_5_Chapter.xhtml#Fig4)
    for an illustration.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig4_HTML.jpg)


    *An Excel table for dunny stock prices. It presents the terminal return without
    compounding, for the dummy stock prices of 5 days. The column headers are day,
    price, and return 1. The prices of day 1 and day 5 are 100 and 106, which are
    highlighted.*


    **Figure 5-4** Calculating the terminal return without compounding


    **Q5: What is the terminal return from day 1 to day 5 with compounding? Is it
    equal to the result in Q4?**


    **Answer:** Compounding returns is an important concept in finance. It reflects
    the fact that not only your initial investment earns a return but also the returns
    from previous periods. This leads to exponential growth over time, given a positive
    return rate.


    We will fill in the “return3” column, where each cell is a product between the
    1+R return of the current period and the cumulative 1+R return of the previous
    period, offset by one. For the first period (from day 1 to day 2), the “return3”
    value would be just the “1 + R” return for this period. See Figure [5-5](#605529_1_En_5_Chapter.xhtml#Fig5)
    for an illustration.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig5_HTML.jpg)


    *An Excel table for dunny stock prices. It presents the terminal return with compounding
    for the dummy stock prices of 5 days. The column headers are day, price, return
    1, return 2, and return 3. The returns of day 4 for Q 5, and day 5 for Q 3 are
    highlighted.*


    **Figure 5-5** Calculating the terminal return using compounding


    As it turns out, the terminal return is 6%, which is the same as previously calculated.


    **Q6: Sum up the single-period returns in Q3. Is it equal to the result in Q4?**


    **Answer:** The result shows that it is different from 6%. In general, adding
    up single-period returns can lead to incorrect conclusions about the overall return
    on investment. The sum of the single-period returns is not equal to the terminal
    return (from Q4) because this approach overlooks the effect of compounding. In
    other words, by simply summing up single-period returns, we are effectively treating
    each period’s return as if it was independent and earned on the initial investment
    amount, disregarding the fact that the investment grows with each period due to
    the returns earned in the prior periods. This is why we see a difference between
    the summed single-period returns and the terminal return calculated through the
    correct method that takes into account the compounding effect.


    The principle of compounding acknowledges that returns accumulate over time, meaning
    the returns earned in one period are reinvested and can generate further returns
    in subsequent periods. So, while the sum of single-period returns might provide
    a rough estimate of the total return, it is not a correct measure, especially
    when the time span is long, or the return rate is high. Instead, the appropriate
    way to calculate the total return over multiple periods is to use the concept
    of compound returns, which considers both the initial investment and the reinvestment
    of returns. It is thus important to follow the sequential compounding process
    when calculating the terminal return. See Figure [5-6](#605529_1_En_5_Chapter.xhtml#Fig6)
    for an illustration.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig6_HTML.jpg)


    *An Excel table for dunny stock prices. It presents the sum of the single-period
    returns in Q 3. The column headers are day, price, return 1, and return 2. The
    data in the column Q 3 is highlighted.*


    **Figure 5-6** Summing up all single-period returns


    **Q7: Calculate the log return for each period.**


    **Answer:** The logarithmic return, or continuously compounded return, is another
    method of calculating returns that can simplify various calculations in finance.
    This method uses the natural logarithm (log) to express the rate of return, which
    is derived from the relative changes in price.


    To calculate the log return for each period, we can use the formula:


    ![$$ \log \_\mathrm{return}=\ln \frac{S_{t+1}}{S_t} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_Equc.png)


    Here, *S*[*t* + 1] and *S*[*t*] represent the asset price at the future time *t*
    + 1 and the current time *t*, respectively, and ln denotes the natural logarithm.
    See Figure [5-7](#605529_1_En_5_Chapter.xhtml#Fig7) for an illustration.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig7_HTML.jpg)


    *An Excel table for dunny stock prices. It presents the sum of the log return
    for each period. The column headers are day, price, return 1, return 2, return
    3, and return 4. The data in the column Q 3 for day 2 is highlighted.*


    **Figure 5-7** Calculating the log returns of each period


    For instance, if we have the price data in a sequence, we can compute the log
    return for each period using this formula. Note that the log return is a good
    approximation for small returns, and it also has some desirable mathematical properties,
    such as time additivity, which means that the log return over multiple periods
    is simply the sum of the log returns over each individual period.'
