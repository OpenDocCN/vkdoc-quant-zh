    ## Summary


    In this chapter, we delved into the world of options and futures contracts.


    Forward contracts are customized, private agreements between two parties and are
    traded over the counter (OTC). They are only settled at the end of the agreement
    and are priced based on the spot price of the underlying asset, the risk-free
    interest rate, and the time to expiration. However, forward contracts come with
    potential counterparty risk as there is no clearing house to guarantee the fulfillment
    of the contractual obligations.


    Futures contracts, on the other hand, are standardized contracts traded on regulated
    exchanges. They are marked to market daily, meaning that the price of the contract
    is adjusted to reflect its current market value, ensuring that margin requirements
    are met. The clearing house of the futures exchange serves as an intermediary
    between buyers and sellers, mitigating counterparty risk and ensuring the stability
    of the market.


    We also covered the pricing of both types of contracts. For example, the pricing
    of futures contracts is influenced by factors such as the spot price of the underlying
    asset, the risk-free interest rate, storage costs, and convenience yield. In addition,
    futures markets can exhibit contango, where futures prices are higher than the
    spot price, or backwardation, where futures prices are lower than the spot price.


    ## Exercises


    *   A farmer sells agricultural products, and a manufacturer purchases raw materials
    for production. In both cases, what position should they take in a futures contract
    in order to hedge against adverse price changes in the future?


    *   A wheat farmer takes a short position in ten wheat futures contracts on day
    1, each valued at $4.5 and representing 5000 bushels. If the price of the futures
    contracts increases to $4.55 on day 2, what is the change in the farmer’s margin
    account?


    *   Suppose we enter into a short forward position. What is the risk due to the
    fluctuating asset price in the future? How can we hedge the risk?


    *   Assume we could buy a barrel of oil for $80 today, and the current futures
    price is $85 for delivery three months from today. One futures contract can buy
    1000 barrels of oil. How can you arbitrage in this situation? What is the profit?
    Assume a zero risk-free interest rate.


    *   Apply the same no-arbitrage argument to value a forward contract in a short
    position.


    *   Write a function to calculate the fair price of a futures contract given the
    spot price of the asset, risk-free interest rate, rate of storage cost, convenience
    yield, and delivery date. Allow for both annual compounding and continuous compounding.


    *   Explain the source of riskless profit when a forward contract is overpriced
    or underpriced than its theoretical no-arbitrage value.


    # 4. Understanding Risk and Return


    Any financial asset is characterized by its risk and return. Return means the
    financial reward it brings, such as the percentage increase in the asset value.
    We hope to maximize the percentage return of the asset as much as possible. However,
    a higher reward often comes with higher risk, where risk refers to the volatility
    of such return. That is, an asset displays high oscillations in its historical
    returns, making its future outlook more uncertain than, say, a stable product
    with little deviation from the expected gain, such as the bond. As an investor,
    the goal of making profits boils down to maximizing the return and, at the same
    time, minimizing the risk.


    Return is a measure of the financial gain or loss of an investment over a specific
    period. It can be calculated as a percentage of the initial investment, taking
    into account factors such as capital appreciation, dividends, and interest payments.
    Returns can be either realized (already received) or unrealized (expected to be
    received in the future). There are various ways to measure returns, including
    absolute return, annualized return, and risk-adjusted return.


    Risk is the variability or uncertainty in the returns of an investment. It represents
    the potential for losses due to factors such as market fluctuations, economic
    conditions, and company-specific events. There are several types of risk, including
    market risk, credit risk, liquidity risk, and operational risk, among others.
    In general, investments with higher risk tend to offer higher potential returns
    to compensate for the increased uncertainty.'
