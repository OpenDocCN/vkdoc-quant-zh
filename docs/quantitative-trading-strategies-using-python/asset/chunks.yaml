- fmt: '### Calculating Annualized Returns


    We consider three scenarios where the return frequencies are different, including
    a daily return of `0.0001`, a monthly return of `0.01`, and a quarterly return
    of `0.05`. The calculation process is the same as calculating the multiperiod
    terminal return at a yearly mark:


    - Convert the normal return to the `1+R` format for each period.

    - Raise the `1+R` formatted return to the power of the number of periods in a
    year.

    - Subtract one to convert the result back to the normal return.


    For the daily return, we assume a total of 252 trading days in a year, which is
    a typical assumption when working with daily prices. We follow the same recipe
    here: convert normal return to `1+R` return for every single period, compound/multiply
    these single periods until reaching a year, and minus one to convert back to the
    normal terminal return:


    ```

    r = 0.0001

    >>> (1+r)**252-10

    0.025518911987694626

    ```


    For the monthly return, since there are 12 months in a year, we would compound
    it 12 times:


    ```

    r = 0.01

    >>> (1+r)**12-1

    0.12682503013196977

    ```


    And lastly, there are four quarters in a year, so we compound it four times:


    ```

    r = 0.05

    >>> (1+r)**4-1

    0.21550625000000023

    ```


    Now we switch to analyzing risk in the following section.


    ## Analyzing Risk


    The risk of an asset is related to volatility, which is of equal or higher importance
    than the reward. Volatility is a crucial metric in assessing the risk of an investment,
    as it represents the level of uncertainty or fluctuations in the asset’s returns.
    A higher volatility implies a higher risk, as the asset’s price can experience
    more significant ups and downs. To quantify the risk associated with an investment,
    we must understand the concept of volatility and how to calculate it.


    Recall the returns of two assets in Figure [4-3](#605529_1_En_4_Chapter.xhtml#Fig3).
    Despite having the same average reward, asset 2 is more volatile than asset 1.
    Asset 2 deviates from the mean more often and more significantly than asset 1.
    Volatility thus measures the degree of deviation from the mean. We will formalize
    the notion of volatility in this section.


    Before looking at volatility, let us first introduce the concept of variance and
    standard deviation.


    ### Introducing Variance and Standard Deviation


    Variance and standard deviation are two widely used statistical measures that
    describe the spread of the data around its mean value. Suppose we have a total
    of *N* returns ![$$ {\left\{{R}_i\right\}}_{i=1}^N $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq2.png).
    We know the mean return *R*[*P*] is calculated by averaging all returns:


    ![$$ {R}_P=\frac{\sum_{i=1}^N{R}_i}{N} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equl.png)


    Here, the mean return *R*[*P*] describes the central tendency of the returns for
    the asset or portfolio. That is, on average, the return is *R*[*P*]. It is also
    called the arithmetic mean of the returns.


    Now comes the measure of the deviation from the mean. For any return *R*[*i*],
    its distance with *R*[*P*] is *R*[*i*] − *R*[*P*]. However, this distance may
    be positive or negative. Since we have a total of *N* returns and, therefore,
    *N* distances, aggregating these *N* distances by summing them up does not seem
    to be a good idea, as positive and negative distances will cancel out each other.
    Instead of directly summing up these distances, the variance measure says that
    we can square the distances first and then take the average of these squared distances.
    Mathematically, the variance of the returns is expressed as follows:


    ![$$ {\sigma}_P^2=\frac{\sum_{i=1}^N{\left({R}_i-{R}_P\right)}^2}{N} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equm.png)


    Here, *R*[*i*] − *R*[*P*] also means to de-mean the original return *R*[*i*],
    that is, subtract the mean return *R*[*P*] from the original return *R*[*i*].
    This gives deviation from the mean. Also, by squaring these deviations, the problem
    of canceling out positive and negative terms no longer exists; all de-meaned returns
    end up being positive or zero. Finally, we take the average of the squared deviations
    as the variance of the return series. A visual inspection of Figure [4-3](#605529_1_En_4_Chapter.xhtml#Fig3)
    also suggests that asset 2 has a higher variance than asset 1.


    Although variance summarizes the average degree of deviation from the mean return,
    its unit is the squared distance from the average return, making it difficult
    to interpret the unit. In practice, we would often take the square root of the
    variance and bring it back to the same scale as the return. The result is called
    standard deviation, where the deviation is now standardized and comparable.


    ![$$ {\sigma}_P=\sqrt{\frac{\sum_{i=1}^N{\left({R}_i-{R}_P\right)}^2}{N}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equn.png)


    This is also our measure of volatility. It measures how large the prices swing
    around the mean price and serves as a direct measure of the dispersion of returns.
    The higher the volatility, the higher the deviations from the mean return. Figure
    [4-7](#605529_1_En_4_Chapter.xhtml#Fig7) summarizes the definitions of common
    statistical measures such as the mean, variance (both population and sample),
    and standard deviation, also called volatility in the financial context.


    ![A set of 4 mathematical equations that define the 1. mean return, arithmetic
    mean, 2. variance, population, 3. variance, sample, and 4. standard deviation,
    volatility.](images/605529_1_En_4_Chapter/605529_1_En_4_Fig7_HTML.jpg)


    **Figure 4-7** – Summarizing the common statistical measures, including the mean,
    variance (population and sample), and standard deviation (also called volatility)


    In summary, variance and standard deviation are essential statistical measures
    for understanding the risk associated with an investment. They describe the dispersion
    or spread of returns around their mean value, which helps estimate the potential
    volatility of an asset or portfolio. These statistical measures also play an important
    role in assessing the risk tolerance in a portfolio allocation.'
