    regression task is to fit a hyperplane as closely as possible to the actual data
    points by minimizing the sum of the squared errors (SSE) as the cost measure between
    the predicted output and the actual target values. Since minimizing SSE toward
    zero would easily lead to an overfitting model, the SVM model used in regression
    often assumes an *ϵ*-insensitive loss function, which allows the model to tolerate
    some error in its predictions, up to a certain threshold *ϵ*.


    There are multiple technical terms here that serve more explanation. Let us start
    with the concept of the *hyperplane*. A hyperplane is a decision line used to
    predict the continuous output in the case of regression. The data points on either
    side of the hyperplane within a certain distance (specifically, within *ϵ*) are
    called *support vectors*. We can also use these support vectors to draw two *decision
    boundaries* around the hyperplane at a distance of *ϵ*.


    Moving on, a *kernel* is a set of mathematical functions that take data as input
    and transform it into the required form, possibly in a different dimension. These
    are generally used for finding a hyperplane in the higher-dimensional space, which
    is considered easier to achieve linear separation than finding the same separating
    hyperplane in the original feature space. Using kernels in SVM provides a powerful
    and flexible tool for classification and regression tasks, allowing SVM to handle
    complex and even nonlinearly separable datasets.


    Figure [10-3](#605529_1_En_10_Chapter.xhtml#Fig3) helps illustrate these concepts.
    Given a set of training observations in the form of input-output pairs, the support
    vector regression model will build a hyperplane as the regression line to predict
    future test data. The hyperplane is surrounded by two decision boundaries, determined
    by a user-specified hyperparameter *ϵ*. Here, *ϵ* specifies the width of the *ϵ*-insensitive
    zone (or tolerance zone) around the regression line, where errors are not penalized.
    Not all the points are within the decision boundaries, and SVM is designed to
    minimize such margin violations by maximizing the number of points within the
    decision boundary upon estimating the hyperplane.


    ![](images/605529_1_En_10_Chapter/605529_1_En_10_Fig3_HTML.jpg)


    An X-Y plane presents some points between the decision boundaries, with hyperplane
    in its center as the decision line that predicts target values in the region.
    Some points are not within the decision boundaries. Tolerance error term is the
    distance from hyperplane to a boundary.


    Figure 10-3


    Illustrating the training mechanism of the support vector regression model


    Note that *ϵ* controls the tolerance of the margin violation. It determines the
    trade-off between the model complexity and the predictive accuracy. A small value
    of *ϵ* will result in a complex model that closely fits the training data, but
    risks overfitting the training set and therefore generalizing poorly to the new
    data. On the other hand, a large value of *ϵ* will result in a simpler model with
    larger errors but potentially a better generalization performance.


    As a user-specified hyperparameter, the choice of *ϵ* can be highly sensitive
    to the resulting predictive performance. A common approach is cross-validation,
    which involves partitioning the raw data into training and validation sets several
    times, each starting with a different random seed. The best *ϵ* is the one that
    reports the highest predictive performance on average.


    We introduce the random forest model in the following section.


    ### Random Forest


    Random forest is a type of ensemble model, which includes multiple simple models
    combined together to make the final prediction. It is a powerful and flexible
    model that can be used for both regression and classification tasks. As the name
    suggests, the algorithm constructs multiple decision trees and combines all trees
    in the forest to make a final prediction.


    The main differentiating factor about random forest compared with other models
    is how the raw training dataset is divided to support the training of each tree.
    Specifically, each tree is trained on a different subset of the data and a different
    subset of the features, a process known as *bagging* or *bootstrap aggregation*.
    By using random subsets of the data and features, the algorithm creates multiple
    independent submodels that have a low bias and high variance. The final prediction
    is then produced by taking the average of the predictions of all the individual
    trees, similar to collecting the views from multiple independent consultants and
    taking the average recommendation as the final decision.


    Note that at each node of the tree, a random subset of features is considered
    to determine the best split, instead of considering all features. This process
    is called feature bagging. The randomness in feature selection ensures that the
    trees are decorrelated and reduces the chance of overfitting.


    Random forests are widely used for their simplicity, versatility, and robustness.
    They can handle a mix of numerical and categorical features, require very little
    preprocessing of the data, and provide a built-in method for handling missing
    values. Furthermore, they offer measures of feature importance, which can provide
    insights into the underlying structure of the data.


    Figure [10-4](#605529_1_En_10_Chapter.xhtml#Fig4) illustrates the overall training
    process of the random forest model. We start by sampling from the original training
    set to obtain a total of *B* subsets. Each sampling randomly selects both observations
    and features, so that the resulting subsets appear to be independent of each other
    and uncorrelated in the feature space. We will then train a decision tree model
    for each subset, leading to *B* submodels. Upon assessing a new test data point,
    these *B* predictions will be aggregated together and averaged to produce the
    final prediction.


    ![](images/605529_1_En_10_Chapter/605529_1_En_10_Fig4_HTML.jpg)


    A chart of the random forest model describes that the training process starts
    by sampling from the original training set to obtain a total of B subsets. Train
    a decision tree model for each subset. The predictions are aggregated together
    and averaged as the final prediction.


    Figure 10-4


    Illustrating the training mechanism of the random forest model


    In the next section, we introduce the basic feed-forward neural network.'
  trans: '

    ### 支持向量机


    支持向量机（SVM）是一种流行的监督学习算法，特别在 Kaggle 社区中，常用于分类和回归任务。在分类问题中，SVM 通过核函数将输入数据从原始特征空间映射到高维特征空间，然后找到能最佳区分不同类别数据的超平面。该超平面以最大化类别间间隔为原则进行选择。基于最大间隔原则寻找边界通常能带来更好的泛化性能，从而降低过拟合风险。


    由于我们关注的是将传播量作为连续结果进行预测（即回归任务），SVM 在此场景下寻找的是既能最佳分离输入数据，同时又能最小化间隔违规的超平面。在这种情况下，回归任务的目标是通过最小化预测输出与真实目标值之间的成本度量——**误差平方和（SSE）**，使超平面尽可能贴近实际数据点。由于将误差平方和最小化至零容易导致过拟合模型，用于回归的
    SVM 模型通常采用*ϵ*-不敏感损失函数，该函数允许模型在预测中容忍一定程度的误差（不超过阈值*ϵ*）。


    这里有多个技术术语需要进一步解释。让我们从*超平面*的概念开始。在回归问题中，超平面是一条用于预测连续输出的决策线。超平面两侧一定距离（具体为*ϵ*范围内）的数据点称为*支持向量*。我们也可以利用这些支持向量，在超平面周围以*ϵ*为距离绘制两条*决策边界*。


    接下来，*核函数*是一组数学函数，它接收数据作为输入，并将其转换为所需形式（可能是在不同维度下）。核函数通常用于在高维空间中寻找超平面，这通常比在原始特征空间中寻找相同的分离超平面更容易实现线性分离。在
    SVM 中使用核函数为分类和回归任务提供了强大而灵活的工具，使 SVM 能够处理复杂甚至非线性可分离的数据集。


    图 10-3 有助于说明这些概念。给定一组以输入-输出对形式存在的训练观测值，支持向量回归模型将构建一个超平面作为回归线，以预测未来的测试数据。超平面由两个决策边界环绕，这两个边界由用户指定的超参数*ϵ*决定。在此，*ϵ*指定了回归线周围*ϵ*-不敏感区间（或容忍区间）的宽度，在该区间内的误差不受惩罚。并非所有数据点都落在决策边界内，SVM
    的设计目标是通过在估计超平面时最大化决策边界内的数据点数量，来最小化此类间隔违规。


    `![](img/605529_1_En_10_Fig3_HTML.jpg)`


    一个 X-Y 平面展示了一些位于决策边界之间的点，超平面位于其中央，作为预测该区域目标值的决策线。有些点不在决策边界内。容忍误差项表示从超平面到边界的距离。


    图 10-3

    说明支持向量回归模型的训练机制


    注意，*ϵ*控制着对间隔违规的容忍度。它决定了模型复杂度与预测精度之间的权衡。较小的*ϵ*值会导致模型复杂，能紧密拟合训练数据，但存在过拟合训练集的风险，从而对新数据的泛化能力较差。另一方面，较大的*ϵ*值会产生更简单的模型，误差较大，但可能具有更好的泛化性能。


    作为用户指定的超参数，*ϵ*的选择对最终预测性能极为敏感。一种常见的方法是交叉验证，即将原始数据多次划分为训练集和验证集，每次使用不同的随机种子。平均预测性能最高的*ϵ*值即为最佳选择。


    下一节将介绍随机森林模型。


    ### 随机森林


    随机森林是一种集成模型，它结合多个简单模型共同做出最终预测。这是一种功能强大且灵活的模型，可用于回归和分类任务。顾名思义，该算法构建了多棵决策树，并整合森林中的所有树来做出最终预测。


    随机森林与其他模型的主要区别在于原始训练数据集是如何划分以支持每棵树训练的。具体来说，每棵树都在数据的不同子集和特征的不同子集上进行训练，这一过程称为*装袋*或*自助聚合*。通过使用数据和特征的随机子集，该算法创建了多个独立的子模型，这些模型具有低偏差和高方差的特点。最终预测结果是取所有单棵树预测的平均值，类似于收集多位独立顾问的意见，并取平均建议作为最终决策。


    注意，在树的每个节点上，会考虑一个随机特征子集来确定最佳分裂点，而不是考虑所有特征。这个过程称为特征袋装。特征选择中的随机性确保了树之间的去相关性，并降低了过拟合的可能性。


    随机森林因其简单性、多功能性和鲁棒性而被广泛使用。它们可以处理数值型和类别型特征的混合数据，几乎不需要数据预处理，并内置了处理缺失值的方法。此外，它们还能提供特征重要性度量，这有助于洞察数据的底层结构。


    图 10-4 展示了随机森林模型的整体训练过程。我们从原始训练集中进行抽样，得到总共*B*个子集。每次抽样都随机选择观测值和特征，使得生成的子集相互独立，并在特征空间中不相关。然后，我们将为每个子集训练一个决策树模型，得到*B*个子模型。当评估一个新的测试数据点时，这*B*个预测结果将被汇总并取平均值，以生成最终预测。


    `![](img/605529_1_En_10_Fig4_HTML.jpg)`


    随机森林模型的图表描述了训练过程从原始训练集抽样开始，得到总共 B 个子集。为每个子集训练一个决策树模型。将所有预测结果汇总并取平均值作为最终预测。


    图 10-4

    说明随机森林模型的训练机制


    在下一节中，我们将介绍基本的前馈神经网络。

    '
- fmt: '# Neural Network


    A neural network consists of multiple interconnected nodes, also called neurons,
    stacked together in layers. Each neuron serves as a function that receives input
    from the neurons in the preceding layer, performs a nonlinear transformation on
    that input, and sends an output to the neurons in the next layer. In between these
    neurons are the weights, also called parameters of the neural network. Learning
    a neural network model essentially means tuning the weights so that the final
    prediction is accurate, and the model generalizes well to the test set.


    A typical neural network consists of an input layer representing the input data
    and an output layer generating the output. It can also include any number of layers
    in between (called hidden layers). Each layer contains at least one neuron, interpreted
    as an extracted hidden feature. When it comes to the number of layers of a neural
    network, it refers to the hidden layer plus the output layer. For example, a perceptron
    is a single-layer neural network, meaning it has only input and output layers
    and does not have any hidden layer in between.


    Being the fundamental constituent of a neural network, a perceptron is a single
    neuron that completes two steps of mathematical operations: the weighted sum and
    the nonlinear transformation. For a single observation with `p` dimensions `x
    ∈ ℝ^p`, the perceptron first calculates the weighted sum `Σ_{i=1}^p w_i x_i` between
    `x` and its corresponding weight vector `w ∈ ℝ^p`, which is (and should be) also
    `p`-dimensional. The weighted sum is often accompanied by one more term called
    *intercept* or *bias*, which acts as an additional parameter to exercise a global
    level shift to the weighted sum to fit the data better.


    After adding an intercept/bias term `b`, the sum passes through an *activation
    function* which introduces a nonlinear transformation to the weighted sum. Note
    that the bias term is added by inserting a column of ones in the input data, which
    is the same bias trick as linear regression. Such nonlinear transformation, together
    with the number and width of layers, determines neural networks'' flexibility,
    expressivity, and approximating power. Figure 10-5 summarizes the process flow
    of a perceptron.


    ![A flowchart presents the process flow of a perceptron. The inputs X 1 to X p
    with respective weights, and constant 1 with b, give the weighted sum. The sum
    passes through an activation function to generate the final output.](images/605529_1_En_10_Chapter/605529_1_En_10_Fig5_HTML.jpg)


    **Figure 10-5** — The process flowchart of a perceptron, which consists of a weighted
    sum operation followed by an activation function. A column of ones is automatically
    added to correspond to the bias term in the weight vector


    The most popular choice of activation function is the *rectified linear unit*
    (ReLU), which acts as an on/off switch that fires the input signal as it is if
    its value is above a specific threshold and mutes it by outputting zero if it
    is below the threshold. In other words, the ReLU operation is an identity function
    if the input is positive; otherwise, the output is set as zero. Without such nonlinear
    activation, a multilayer neural network would simply become a series of linear
    functions stacked on top of each other, resulting in a linear model.


    Figure 10-6 visualizes the ReLU function''s shape and summarizes the characteristics
    of the perceptron operation discussed so far. Other than the architectural flexibility
    of a neural network model in terms of the number and width of its layers, another
    main added flexibility lies in the nonlinear operation. In fact, many exciting
    and meaningful hidden features could be automatically extracted using ReLU as
    an activation function. For example, when training an image classifier using a
    special architecture called convolutional neural networks, low-level features
    in the initial hidden layers tend to resemble fundamental structural components
    such as lines or edges, while high-level features at later hidden layers start
    to learn structural patterns such as squares, circles, or even complex shapes
    like the wheels of a car. This is not possible if we are limited to the linear
    transformation of features and is considered an extremely difficult task if we
    were to engineer such informative features manually.


    ![A representation of a mathematical equation and a line graph. The function of
    simple perception consists of a weighted sum + activation function. The graph
    presents the nonlinearity of the activation function, with an initial horizontal
    and then a rise.](images/605529_1_En_10_Chapter/605529_1_En_10_Fig6_HTML.jpg)


    **Figure 10-6** — Decomposing a single perceptron into a weighted sum and an activation
    function which is often ReLU. The ReLU operation passes through a signal if it
    is positive and mutes it if it is negative. Such nonlinearity also introduces
    great approximating power to the neural networks in addition to the flexibility
    in designing the number and width of layers


    One of the reasons why ReLU (and its variants) remains the most popular activation
    function is its fast gradient computation. When the input is less than or equal
    to zero, the gradient (of a constant number) becomes zero, thus saving the need
    for backpropagation and parameter update. When the input is positive, the gradient
    (of the original input variable) is simply one, which gets backpropagated as it
    is.


    Having reviewed these three model classes, let us switch to the implementation
    of pairs trading and compare their performances after using machine learning models
    to predict the daily spread.'
