  trans: '

    ### 计算月收益率


    要从原始日度股价数据转换为月度收益率，我们需要经历几个步骤。第一步是使用 `pct_change()` 方法将价格转换为每日百分比收益率。如前一章所介绍，此函数会自动计算所有交易日的简单百分比收益率。由于这是日收益率，我们需要通过复利计算同一月份内所有日收益率，并将期末收益率作为月度收益率，从而将其汇总为月收益率。分解来看，我们需要将所有交易日按月分组，然后计算每个月的期末收益率。清单
    [6-4] 将所有操作一步到位地串联起来，生成的月度收益率存储在 `mth_return_df` 中。


    ```

    mth_return_df = df.pct_change().resample("M").agg(lambda x: (x+1).prod()-1)

    清单 6-4

    从日度价格生成月度收益率

    ```


    虽然将相关操作串联起来看起来更简洁，但如果这是我们第一次接触这些操作，这并非学习它们的最佳方式。让我们分解这些操作。第一个操作是调用 `pct_change()`
    方法，这是一个在许多场景下广泛使用的便捷函数。接下来是 `resample()` 函数，这是一个用于时间序列数据频率转换和重采样的便捷方法。让我们用一些虚拟数据来理解这个函数。


    以下代码片段创建了一个 Pandas Series 对象，其中包含九个从零到八的整数，并由九个一分钟时间戳索引：


    ```

    # 创建一个包含 9 个一分钟时间戳的序列

    index = pd.date_range(''1/1/2000'', periods=9, freq=''T'')

    series = pd.Series(range(9), index=index)

    >>> series

    2000-01-01 00:00:00    0

    2000-01-01 00:01:00    1

    2000-01-01 00:02:00    2

    2000-01-01 00:03:00    3

    2000-01-01 00:04:00    4

    2000-01-01 00:05:00    5

    2000-01-01 00:06:00    6

    2000-01-01 00:07:00    7

    2000-01-01 00:08:00    8

    Freq: T, dtype: int64

    ```


    然后，我们将序列聚合成三分钟区间，并汇总落入同一区间内时间戳的值，如下列代码片段所示：


    ```

    >>> series.resample(''3T'').sum()

    2000-01-01 00:00:00     3

    2000-01-01 00:03:00    12

    2000-01-01 00:06:00    21

    Freq: 3T, dtype: int64

    ```


    从结果可以看出，`resample()` 函数按指定区间完成了聚合操作，其后跟的方法则对区间内的数据进行汇总。


    回到我们的运行示例，我们将原始日收益率降采样为月收益率，因此每个月仅用一个数据点表示，而不是典型的 30 个。聚合操作遵循相同的过程来累积所有日收益率：转换为
    `1+R` 格式，进行复利计算，然后再转换回简单收益率。


    这里的新内容是 lambda 函数。我们使用 `x` 符号来表示一个通用的输入参数。在此例中，它将是给定月份内的所有原始日收益率。由于此 lambda 函数执行的是自定义操作，我们使用
    `agg()` 函数来执行这个自定义函数，而不是像之前那样使用内置函数如 `sum()`。


    至此，我们已经将日收益率转换为月度表示形式，其中每一个月度收益率都代表了该月内日收益率复利计算后的期末收益率。接下来，我们使用历史月度收益率来计算另一个指标，以指示当前月份的股票表现。


    ### 计算六个月期末收益率


    我们知道，仅根据当前月份的收益率做出交易决策存在两方面的缺陷。首先，我们过度依赖当前月份，忽略了历史表现。其次，我们面临数据窥探的风险。也就是说，要计算某个月份中某一天的月度收益率，如果这一天不是该月的最后一天，我们就会窥探同一个月内所有未来的日收益率，以计算该月的期末收益率。


    我们首先关注第一点，稍后再回到第二点。显然，我们需要找到一种方法，在生成当前月份的交易信号时纳入历史月度收益率。然而，与用于股票价格的移动平均线不同，使用相同算术平均值计算的历史平均月度收益率本质上是忽略了序列复利过程的。因此，我们需要将历史月度收益率视为一个序列过程，并对这些收益率进行复利计算（直到一个特定的回望窗口），以获得期末月度收益率。


    这个期末月度收益率随后将作为选股和交易开仓的动量指标。这涉及到选择一个特定大小的回望窗口。假设窗口大小为六。现在，为了滚动计算每个月的六个月期末收益率，我们可以使用
    `rolling()` 函数，该函数与计算移动平均线所用的函数相同。唯一的变化是，在将指针向后滚动六个月后，我们不再使用 `mean()` 取平均值，而是在
    `apply()` 函数中使用 `np.prod` 对这些 `1+R` 月度收益率的乘积进行计算，以完成复利过程，如清单 [6-5] 所示。


    ```

    # 获取过去 6 个月的历史累积收益率，作为当前月份的期末收益率

    past_cum_return_df = (mth_return_df+1).rolling(6).apply(np.prod) - 1

    清单 6-5

    计算六个月累积收益率

    ```


    至此，我们已经计算出了六个月的期末月度收益率，即包括当前月份在内的过去六个月的累积收益率。这也解释了为什么在前面的结果中，前五个月显示为空值，而累积月度收益率是从第六个月才开始出现的。


    接下来，我们看看如何使用这些期末收益率来生成交易信号。

    '
- fmt: '### Generating Trading Signals


    We have fixed the lookback window to be six months into the past. The momentum
    trading strategy involves another lookahead window used to fix the trading horizon
    in the future. Specifically, suppose we form our trading strategy and make the
    trading decision in the current month. These new positions will last for a full
    month in the next month if the lookahead horizon is one. We can then measure the
    performance of these positions at the end of the next month. In this case, the
    size of the lookahead window is set to be one.


    Also, we cannot use the monthly terminal return in the formation month to generate
    trading signals, as it uses future daily returns within the same month. When standing
    in the middle of the formation month, what we can use is the terminal monthly
    return of the last month, which is the end of the measurement period. The measurement
    period represents the collection of all historically observed data and thus avoids
    data snooping when limiting the usable data to this period only. Figure [6-3](#605529_1_En_6_Chapter.xhtml#Fig3)
    illustrates the subtlety here.


    ![](images/605529_1_En_6_Chapter/605529_1_En_6_Fig3_HTML.jpg)


    A timeline with 6 labeled points. Each tick marks the end of the month. The labeled
    points are a historical measurement period with 6 months of lookback window, 6-month
    terminal monthly return, trade formation period, current time point, and performance
    period with one month of a lookahead window.


    **Figure 6-3** Illustrating the measurement period, formation period, and evaluation
    period across the investment horizon


