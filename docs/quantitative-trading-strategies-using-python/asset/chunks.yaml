    sharpe_ratio = excess_return/annualized_vol

    >>> sharpe_ratio

    AAPL    24.217681

    GOOG     7.165694

    dtype: float64

    代码清单 4-7 计算夏普比率

    ```


    因此，作为风险调整后收益的夏普比率，苹果在最初几天远高于谷歌。

    '
- fmt: '# Summary


    In this chapter, we explored the two key characteristics of any financial asset:
    risk and return. Return refers to the financial reward an asset brings, while
    risk represents the volatility or uncertainty of that return. As investors, our
    goal is to maximize return while minimizing risk.


    We introduced different ways to represent and calculate the returns, including
    the simple return, terminal return, multiperiod return, and the `1+R` formatted
    return. It is important to understand the connections among these forms of return
    when translating one form to the other.


    We then highlighted the risk-return trade-off, where low-return assets are typically
    associated with low risk and high-return assets with high risk. To better compare
    the risk and return for different investment vehicles, we introduced the annualized
    return and volatility, as well as a risk-adjusted return metric called the Sharpe
    ratio. We also provided examples illustrating the importance of considering both
    risk and return when comparing investment products.


    # Exercises


    - How many inputs do we need to calculate a single-period return?

    - What is the return if the asset price changes from $5 to $6?

    - Is the total return of a popular stock typically higher or lower than its price
    return?

    - Calculate the three-period return that consists of 10%, –5%, and 6%.

    - If we buy an asset that rises by 10% on day one and drops by 10% on day two,
    is our return positive, negative, or zero?

    - Calculate the annualized return for an asset with a quarterly (three months)
    return of 2%.

    - Download the YTD stock data for Apple and Tesla and calculate the daily cumulative
    returns using the daily closing price. Plot the returns as line charts.

    - Both annualized volatility and variance grow linearly with time, correct?

    - Suppose the monthly volatility is 5%. Calculate the annualized volatility.

    - The annualized volatility is always greater than the monthly volatility. True
    or false?

    - The risk-free rate is the return on an investment that carries a low risk. True
    or false?

    - If the risk-free rate goes up and the volatility of the portfolio remains unchanged,
    will the Sharpe ratio increase or decrease?

    - Obtain monthly return data based on the median daily price per month of Apple
    stock in the first half of 2022. Calculate the annualized return and volatility
    based on the monthly returns.


    # 5. Trend-Following Strategy


    Trend following is a popular investment strategy used in all types of markets,
    including stocks, bonds, commodities, currencies, and even cryptocurrencies. As
    its name suggests, this strategy is based on the assumption that prices tend to
    move in a particular direction (or “trend”) over time, thus offering opportunities
    to capitalize on these movements. At its core, trend following involves analyzing
    historical price data to identify potential trends. The strategy then recommends
    taking positions that align with these trends with the expectation that they will
    continue. For example, if the price of an asset has been steadily rising, a trend
    follower would typically take a long position, expecting the upward trend to continue.
    Conversely, if the price has been consistently falling, the trend follower might
    take a short position, betting that the price will continue to drop.


    However, like any trading strategy, trend following is not foolproof. Trends can
    reverse suddenly due to unexpected market events or changes in market sentiment,
    leading to potential losses. Therefore, trend-following strategies typically include
    overlaying risk management techniques, such as setting up stop-loss orders, to
    limit potential losses when the trend reverses.


    Trend-following strategies use a variety of technical indicators to identify and
    confirm trends, such as moving averages, trend lines, and momentum indicators.
    This chapter introduces the working mechanism of the trend-following strategies
    using moving averages and then shows its implementation in Python.


    Since we will be working with log returns mostly, let us start by going through
    an example of its calculation process.


    ## Working with Log Returns


    Let us build a further understanding of the logarithmic return (or log return)
    as we will use it to calculate the stock returns when assessing the trend-following
    strategy. We start with the Excel table in Figure 5-1, where we are given a set
    of dummy stock prices and are asked to answer questions from Q1 to Q9. We detail
    the questions and answers in the following.


    ![An Excel table for dummy stock prices. It presents a set of answers from Q1
    to Q9 for the dummy stock prices of 5 days.](images/605529_1_En_5_Chapter/605529_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Daily dummy stock prices


    Let us go through each of these nine questions.


    **Q1:** Why do we use percentage return?


    **Answer:** Percentage return provides the same scale of comparison. For example,
    when we have the price data of another stock (stock B) in the range of 1–10, comparing
    it with the stock price data (stock A) given by the Excel table is difficult when
    using absolute terms. A $5 increase means more for stock A than stock B. By converting
    them to the relative percentage terms, we can put both stocks on the scale ruler
    and measure their performance. Thus, using percentage returns, we can accurately
    compare the performance of these two stocks despite their difference in price
    levels.


    Percentage returns are also useful for comparing the performance of an investment
    to a benchmark or standard, such as a market index (like the S&P 500 or the Dow
    Jones Industrial Average). This helps investors to assess how well an investment
    or a portfolio is performing relative to the broader market or a sector of the
    market.


    **Q2:** Calculate single-period percentage return the original way (based on the
    definition of return).


    **Answer:** The single-period percentage return, also known as the simple return
    or the holding period return, reflects the percentage change in the value of an
    investment from one period to the next. It is calculated as


    ```

    R[t, t+1] = (S[t+1] - S[t]) / S[t]

    ```


    where `R[t, t+1]` is the single-period percentage return from time period `t`
    to `t + 1`, and `S[t]` and `S[t+1]` are asset prices at the end of period `t`
    and `t + 1`, respectively. The numerator of the formula, `S[t+1] - S[t]`, calculates
    the change in the price of the asset from time `t` to `t + 1`. The denominator,
    `S[t]`, is the price at the beginning of the period, which serves as the baseline
    for measuring the relative change. Dividing the price change by the starting price
    gives the relative change in price, expressed as a percentage, which is the simple
    return.


    Applying the same formula to all cells in column `return1` except for day 1 generates
    the result in Figure 5-2.


    ![An Excel table for dummy stock prices. It presents a single-period percentage
    return in column Q2 for the dummy stock prices of 5 days. The column headers are
    day, price, and return1. The prices of day 1 and day 2 are 100 and 108, which
    are highlighted.](images/605529_1_En_5_Chapter/605529_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Calculating the simple returns based on the definition of percentage
    return


    **Q3:** Calculate the same returns using the `1+R` way.


    **Answer:** The `1+R` approach to calculating returns is slightly different from
    the original method but essentially delivers the same result. This approach emphasizes
    the growth factor of the asset’s price from one period to the next, making it
    easier to understand and interpret. The `1+R` approach says that we rewrite the
    return as


    ```

    R[t, t+1] = S[t+1] / S[t] - 1

    ```'
