    \ of the y-axis versus the x-axis. It has 2 ascending fluctuating lines for X\
    \ and Y that start at the origin. The line for Y has a higher rise than the line\
    \ for X.\n\nFigure 8-5\n\nIllustrating the evolution of two series that are highly\
    \ correlated but not cointegrated\n\nLet us calculate the exact correlation coefficient\
    \ and cointegration p-value. In the following code snippet, we call the `corr()`\
    \ method to obtain the correlation of X with Y and use the `coint()` function\
    \ from the `statsmodels` package to perform the cointegration test and retrieve\
    \ the resulting p-value. The `coint()` function performs the augmented Engle-Granger\
    \ two-step cointegration test, similar to how to manually carry out the two-step\
    \ process earlier. The result shows that these two series are highly correlated\
    \ but not cointegrated.\n\n```\nfrom statsmodels.tsa.stattools import coint\n\
