    # 7. Backtesting a Trading Strategy


    As the name suggests, backtesting refers to the process of testing a trading strategy
    on relevant historical data before rolling it up to the live market. It gives
    an indication of the likely performance in different trading scenarios. In this
    chapter, we delve into the intricacies of backtesting a trading strategy, starting
    with an understanding of why backtesting is an important component in quantitative
    trading.


    Note that while backtesting can offer insightful results, it is only as good as
    the quality of the data and the assumptions underpinning the trading strategy.
    For example, a trading strategy might work very well in a bull market, but it’s
