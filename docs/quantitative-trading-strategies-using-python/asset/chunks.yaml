  raw: '### Pairs Trading Using SVM


    Since this is a regression task, we will use the `SVR` class from `sklearn`, specifying
    a linear kernel. After instantiating the model class, we use the `fit()` method
    to fit the model parameters to the training data and the `predict()` method to
    generate predictions for the test data. We will also check the root mean squared
    error (RMSE) for both training and test sets. Listing [10-5](#605529_1_En_10_Chapter.xhtml#PC6)
    completes the training and testing operations.


    ```

    from sklearn.svm import SVR

    from sklearn.metrics import mean_squared_error

    svm_model = SVR(kernel=''linear'')

    svm_model.fit(train_X, train_y)

    train_pred = svm_model.predict(train_X)

    >>> print("training rmse: ", np.sqrt(mean_squared_error(train_y, train_pred)))

    test_pred = svm_model.predict(test_X)

    >>> print("test rmse: ", np.sqrt(mean_squared_error(test_y, test_pred)))

    training rmse:  0.039616044798431914

    test rmse:  0.12296547390274865

    Listing 10-5

    Model training and testing using SVM

    ```


    The RMSE measures the model’s predictive performance. However, we still need to
    plug the model into the trading strategy and evaluate the ultimate profitability
    in the pairs trading strategy. As the only change is on the predicted spread based
    on the specific machine learning model, we can define a function to score the
    model as an input parameter and output the terminal profit. The `score_fn()` function
    in Listing [10-6](#605529_1_En_10_Chapter.xhtml#PC7) completes the scoring operation.


    ```

    import torch

    def score_fn(model, type="non_neural_net"):

    # Generate predicted spread using the SVM model

    if type == "non_neural_net":

    test_pred = model.predict(test_X)

    else:

    test_pred = model(torch.Tensor(test_X.values)).detach().numpy()

    # Calculate z-score of the actual and predicted spread

    zscore = (spread - test_pred.mean()) / test_pred.std()

    # set the threshold values for entry and exit signals

    entry_threshold = 2.0

    exit_threshold = 1.0

    # initialize the daily positions to be zeros

    stock1_position = pd.Series(data=0, index=zscore.index)

    stock2_position = pd.Series(data=0, index=zscore.index)

    # generate daily entry and exit signals for each stock

    for i in range(1, len(zscore)):

    # zscore2 and no existing short position for stock 2

    elif zscore[i] > entry_threshold and stock2_position[i-1] == 0:

    stock1_position[i] = -1 # short stock 1

    stock2_position[i] = 1 # long stock 2

    # -1<zscore<1

    elif abs(zscore[i]) < exit_threshold:

    stock1_position[i] = 0 # exit existing position

    stock2_position[i] = 0

    # -2<zscore<-1 or 1<zscore<2

    else:

    stock1_position[i] = stock1_position[i-1] # maintain existing position

    stock2_position[i] = stock2_position[i-1]

    # Calculate the returns of each stock

    stock1_returns = (np.exp(test_X[''Asset1Returns'']) * stock1_position.shift(1)).fillna(0)

    stock2_returns = (np.exp(test_X[''Asset2Returns'']) * stock2_position.shift(1)).fillna(0)

    # calculate the total returns of the strategy

    total_returns = stock1_returns + stock2_returns

    cumulative_returns = (1 + total_returns).cumprod()

    return cumulative_returns[-1]

    Listing 10-6

    Calculating cumulative return using pairs trading under a given predictive model

    ```


    In this function, we add another input parameter to control if the model belongs
    to a neural network. This control is placed here to determine the specific prediction
    method to use. For standard `sklearn` algorithms such as SVM and random forest,
    we can call the `predict()` method of the model object to generate predictions
    for the given input data. However, when the model is a neural network trained
    using PyTorch, we need to first convert the input to a tensor object using `torch.Tensor()`,
    generate predictions by calling the model object itself (underlying, the forward()
    function within the model class is called), extracting the outputs without gradient
    information using the `detach()` method, and converting to a NumPy object using
    `numpy()`.


    Next, we calculate the z-score using the mean and the standard deviation of the
    predicted spread series. We then use an entry threshold of two and an exit threshold
    of one to generate the trading signals based on the standardized z-scores. The
    rest of the calculations follow the same approach as in the previous chapter.


    We can now use this function to obtain the terminal return for the pairs trading
    strategy using the SVM model:


    ```

    >>> score_fn(svm_model)

    1.143746922303926

    ```


    Similarly, we can obtain the same measure using the random forest regressor.


    ### Pairs Trading Using Random Forest


    To build a random forest model for regression, we can use the `RandomForestRegressor`
    class and specify two main parameters: `n_estimators` as the number of trees to
    be built in the random forest and `random_state` as the random seed for reproducibility.
    Listing [10-7](#605529_1_En_10_Chapter.xhtml#PC9) trains the random forest model
    and evaluates its performance in the training and test sets using RMSE.


    ```

    # random forest

    from sklearn.ensemble import RandomForestRegressor

    # Create random forest regressor

    rf_model = RandomForestRegressor(n_estimators=100, random_state=42)

    # Train the model on the training and test set

    rf_model.fit(train_X, train_y)

    train_pred = rf_model.predict(train_X)

    >>> print("training rmse: ", np.sqrt(mean_squared_error(train_y, train_pred)))

    test_pred = rf_model.predict(test_X)

    >>> print("test rmse: ", np.sqrt(mean_squared_error(test_y, test_pred)))

    training rmse:  0.005741011378501151

    test rmse:  0.07322761976891506

    Listing 10-7

    Model training and testing using random forest

    ```


    The result shows that random forest can better fit the data with a lower training
    and test set RMSE compared with SVM.


    We also calculate the terminal return as follows:


    ```

    >>> score_fn(svm_model)

    0.9489411965252148

    ```


    The result reports a lower terminal return, despite a better predictive performance.
    This is also overfitting, in the sense that a more predictive model at the stage-one
    prediction task leads to a lower terminal return at the stage-two trading task.
    Combining these two tasks in a single stage is an interesting and active area
    of research.


    We move to neural networks in the next section.'
