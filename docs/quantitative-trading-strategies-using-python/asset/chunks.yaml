- fmt: '## Calculating the Max Drawdown


    In this section, we will focus on the process of calculating the max drawdown
    for the early period of 2023 for Google and Microsoft. These two stocks are picked
    due to their recent introduction of large-scale language models: ChatGPT, first
    introduced by Microsoft, and Bard, later by Google. Both led to a relatively big
    shock to the stock prices, resulting in a positive uplift for Microsoft and a
    negative impact for Google.


    Let us first download the stock price data from 2023-01-01 to 2023-02-11 via Listing
    [7-1](#605529_1_En_7_Chapter.xhtml#PC1).


    ```python

    import numpy as np

    import pandas as pd

    import yfinance as yf

    import matplotlib.pyplot as plt

    start_date = "2023-01-01"

    end_date = "2023-02-11"

    df = yf.download([''GOOG'', ''MSFT''], start=start_date, end=end_date)

    >>> df.head()

    Listing 7-1

    Downloading the stock price data

    ```


    As shown in Figure [7-3](#605529_1_En_7_Chapter.xhtml#Fig3), the DataFrame has
    a multilayer column structure, where the first level indicates the type of stock
    price and the second layer indicates the stock ticker.


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig3_HTML.jpg)


    A screenshot of a program. It has a table with 13 rows and 5 columns. It presents
    the data of stock prices on five different dates.


    Figure 7-3


    Printing the first five rows of the downloaded stock price data


    We will use the adjusted closing prices in the follow-up analysis:


    ```python

    df2 = df[''Adj Close'']

    ```


    Note that the DataFrame is indexed by a list of dates in the `datetime` format,
    as shown in the following:


    ```python

    >>> df2.index

    DatetimeIndex([''2023-01-03'', ''2023-01-04'', ''2023-01-05'', ''2023-01-06'',
    ''2023-01-09'', ''2023-01-10'', ''2023-01-11'', ''2023-01-12'', ''2023-01-13'',
    ''2023-01-17'', ''2023-01-18'', ''2023-01-19'', ''2023-01-20'', ''2023-01-23'',
    ''2023-01-24'', ''2023-01-25'', ''2023-01-26'', ''2023-01-27'', ''2023-01-30'',
    ''2023-01-31'', ''2023-02-01'', ''2023-02-02'', ''2023-02-03'', ''2023-02-06'',
    ''2023-02-07'', ''2023-02-08'', ''2023-02-09'', ''2023-02-10''], dtype=''datetime64[ns]'',
    name=''Date'', freq=None)

    ```


    We can use these date indices to subset the DataFrame by the different granularity
    of time periods, such as selecting at the monthly level. As an example, the following
    code snippet slices the data in February 2023:


    ```python

    >>> df2.loc["2023-02"]

    GOOG       MSFT

    Date

    2023-02-01 101.430000 252.750000

    2023-02-02 108.800003 264.600006

    2023-02-03 105.220001 258.350006

    2023-02-06 103.470001 256.769989

    2023-02-07 108.040001 267.559998

    2023-02-08 100.000000 266.730011

    2023-02-09 95.459999  263.619995

    2023-02-10 94.860001  263.100006

    ```


    The DataFrame we will work with contains 28 days of daily adjusted closing prices
    for both stocks, ranging from 2023-01-03 to 2023-02-10. We can check these details
    using the `info()` method:


    ```python

    >>> df2.info()


    DatetimeIndex: 28 entries, 2023-01-03 to 2023-02-10

    Data columns (total 2 columns):

    #   Column  Non-Null Count  Dtype

    ---  ------  --------------  -----

    0   GOOG    28 non-null     float64

    1   MSFT    28 non-null     float64

    dtypes: float64(2)

    memory usage: 672.0 bytes

    ```


    Let us visualize the price curves as line plots:


    ```python

    >>> df2.plot.line()

    ```


    As shown in Figure [7-4](#605529_1_En_7_Chapter.xhtml#Fig4), both stocks maintained
    an increasing trend during this period, although Google suffered a big hit in
    stock price near the end of the period.


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig4_HTML.jpg)


    A double line graph presents the variation of G O O G and M S F T on 5 different
    dates between January 2023 and February 2023. The line for M S F T is more fluctuating.


    Figure 7-4


    Visualizing the stock prices as line plots


    To better understand the stock returns, let us convert the raw stock prices to
    single-period percentage returns using the `pct_change()` function:


    ```python

    returns_df = df2.pct_change()

    >>> returns_df.head()

    GOOG      MSFT

    Date

    2023-01-03  NaN       NaN

    2023-01-04 -0.011037 -0.043743

    2023-01-05 -0.021869 -0.029638

    2023-01-06  0.016019  0.011785

    2023-01-09  0.007260  0.009736

    ```


    Again, the first day shows an `NA` value since there is no prior stock price as
    the baseline to calculate the daily return.


    The corresponding line plot for the daily returns follows in Figure [7-5](#605529_1_En_7_Chapter.xhtml#Fig5).


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig5_HTML.jpg)


    A double line graph presents the variation of G O O G and M S F T in terms of
    stock returns on ten different dates between January 2023 and February 2023. The
    line for G O O G is more fluctuating.


    Figure 7-5


    Visualizing the stock returns


    ```python

    >>> returns_df.plot.line()

    ```


    The figure suggests that the daily returns of both stocks are highly correlated,
    except for the last few days when Google showed a sharp dip in price. Such a dip
    will reflect itself in the max drawdown measure, as we will show later. Besides,
    we also observe a higher volatility for Google as compared to Microsoft.


    Now let us construct the wealth index time series. We assume an initial amount
    of $1000 for each stock, based on which we will observe the daily evolution of
    the portfolio value, assuming a buy-and-hold strategy. Such a wealth process relies
    on the sequential compounding process using the `cumprod()` function based on
    1+R returns, as shown in Listing [7-2](#605529_1_En_7_Chapter.xhtml#PC9).


    ```python

    initial_wealth = 1000

    wealth_index_df = initial_wealth*(1+returns_df).cumprod()

    >>> wealth_index_df.head()

    GOOG       MSFT

    Date

    2023-01-03 NaN        NaN

    2023-01-04 988.963234 956.256801

    2023-01-05 967.335558 927.915502

    2023-01-06 982.831735 938.851285

    2023-01-09 989.966623 947.992292

    Listing 7-2

    Constructing the wealth curve

    ```


    We can override the initial entry as 1000 in order to plot the complete wealth
    index curve for both stocks. This essentially tracks the money we have at each
    time point after we invest $1000 in each stock on day 1, that is, 2023-01-03.


    ```python

    wealth_index_df.loc["2023-01-03"] = initial_wealth

    >>> wealth_index_df.head()

    GOOG        MSFT

    Date

    2023-01-03 1000.000000 1000.000000

    2023-01-04 988.963234  956.256801

    2023-01-05 967.335558  927.915502

    2023-01-06 982.831735  938.851285

    2023-01-09 989.966623  947.992292

    ```


    Now we plot the wealth curve for both stocks, as shown in Figure [7-6](#605529_1_En_7_Chapter.xhtml#Fig6).


