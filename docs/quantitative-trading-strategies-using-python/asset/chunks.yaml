    and summarizing the stock data using Python.


    ## Getting Started with Financial Data Analysis


    Financial data analysis is the process of processing and analyzing financial data
    to support decision-making in various financial applications, such as investing,
    trading, risk management, and corporate finance. It involves the use of advanced
    analytical techniques and models to identify the underlying patterns, trends,
    and relationships in the data, which will be used to support more informed financial
    decisions.


    The interval of stock data can be different, such as by minute, hour, or day.
    Since time is continuous, we need a measure to summarize the profile of the stock
    price data within the interval. Let us start by introducing one of the most popular
    ways to summarize stock data.


    ### Summarizing Stock Prices


    The most common type of summary for stock data is the daily *OHLC* prices (open,
    high, low, close). An OHLC chart is a bar chart that shows open, high, low, and
    closing prices for each period, often daily. They present a day’s four major data
    points, with the closing price considered the most important indicator by many
    traders.


    The OHLC chart, similar to the candlestick chart shown in Figure [1-6](#605529_1_En_1_Chapter.xhtml#Fig6),
    is useful because it can show increasing or decreasing momentum. When the open
    and closing prices have a big gap in between, it shows a strong momentum for an
    increase or decrease in the day. When the open and closing prices are close, it
    shows indecision or a weak momentum. The high and low prices show the full price
    range and can be used to assess the volatility.


    Figure [1-6](#605529_1_En_1_Chapter.xhtml#Fig6) shows two candlestick charts,
    both summarizing the price movements over a specified period, for example, daily.
    The color represents emotions for the stock price movement, with an up candle
    shaded green and a down candle shaded red, although these colors can be altered
    in the specific trading platform. A collection of candlestick charts can be used
    to determine the direction of the market movement. Each candlestick chart consists
    of four main points: open, high, low, and close, following the sequence of time
    in the period. The open and close points determine the real body of the candlestick.
    The green color represents a bullish candlestick, that is, the stock price closes
    above where it opens. Similarly, the red color represents a bearish candlestick,
    that is, the stock price closes below where it opens.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig6_HTML.jpg)


    2 diagrams of candlesticks. The labeled parts in both candlesticks from the top
    to the bottom are high, close, real body, open, and low. The broad middle part
    is the real body.


    Figure 1-6


    Illustrating the bullish candlestick in green and bearish candlestick in red


    Let us examine the bullish candle in the green of a trading day. When the market
    starts, the stock assumes an opening price and starts to move. Across the day,
    the stock will experience the highest price point (high) and the lowest price
    point (low), where the gap in between indicates the momentum of the movement.
    We know for a fact that the high will always be higher than the low, as long as
    there is movement. When the market closes, the stock registers a close. Figure
    [1-7](#605529_1_En_1_Chapter.xhtml#Fig7) depicts a sample movement path summarized
    by the green candlestick.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig7_HTML.jpg)


    A line graph of price versus time. It has an unsymmetrical sine wave curve. The
    beginning point is labeled open. The highest peak is labeled high. The maximum
    dip is labeled low. The bend point is labeled close.


    Figure 1-7


    A sample path of stock price movement represented by the green candlestick chart.
    When the market starts, the stock assumes an opening price and starts to move.
    It will experience the highest price point (high) and the lowest price point (low),
    where the gap in between indicates the momentum of the movement. When the market
    closes, the stock registers a close


