- fmt: '# Introducing Forward and Futures Contracts


    Forward and futures contracts are very similar in nature. Both obligate the buyer
    (or seller) to buy (or sell) a predetermined quantity of an underlying asset at
    a predetermined delivery date and price. Since the price is fixed in advance,
    market participants can rely on this investment vehicle to better manage their
    operational activities. For example, a farmer produces wheat and sells the wheat
    to a food manufacturing company. The wheat price changes every year, causing unexpected
    fluctuations on both sides of the trade. By entering a forward contract, both
    sides lock in the trading price and quantity, thus eliminating future uncertainty
    in the wheat price.


    Let us look at the buy side and the sell side when entering a given forward/futures
    contract. On the buy side, the buyer of the forward/futures contract takes on
    the obligation to purchase and receive the underlying asset at the time point
    when the forward/futures contract expires. On the sell side, the seller of the
    forward/futures contract is obliged to provide and deliver the underlying asset
    to the buyer at the expiration date.


    Both are derivative products because they depend on another underlying asset:
    grain, livestock, energy, currencies, or even securities. It obliges the buyer
    to purchase the underlying asset (or the seller to sell that asset) at a predetermined
    future price and date.


    Note that counterparty risk often constitutes the biggest risk in a forward contract.
    A forward contract can only be rolled forward based on the consent of both parties.
    Without such consent, the forward contract cannot be exercised afterward; it can
    only be settled between the two parties at the prespecified date.


    Futures contracts are more standardized products when compared to forward contracts.
    Forwards, which are similar agreements that lock in a future price at the current
    time, are traded OTC and have customizable terms between the counterparties. On
    the other hand, futures contracts come with the same terms for all counterparties,
    thus making futures contracts highly standardized and tradable products. In other
    words, we can choose to use the contract even before its expiry. For example,
    we can further buy or sell the contract at any time point before the expiry date,
    which essentially transfers the contract to another counterparty in the futures
    market.


    Specifically, while forward contracts are tailor-made for the specific needs of
    the counterparties, a futures contract is a standardized and regulated financial
    product (in small increments) that allows the investor to buy or sell a particular
    commodity asset or financial security at a predetermined price and at a specified
    time in the future over an exchange. It is a fixed-price deal in the future. Futures
    contracts have standardized features such as contract size, expiration dates,
    and settlement procedures. This standardization makes futures contracts more accessible
    and liquid, as they can be easily traded on exchanges. Since the future price
    for the commodity or security of interest is fixed, there is no risk due to potential
    fluctuations in the future price. Investors thus often use futures to hedge the
    risk of big changes in price.


    Futures contracts are traded through centralized futures exchanges, which serve
    as the middleman and eliminate the counterparty risk, that is, one party does
    not fulfill the obligation required by the futures contract. The counterparty
    risk exists in the forward contract, which is considered a customized OTC trading
    instrument and is traded directly between two parties.


    In addition, another key difference between forward and futures contracts is the
    manner in which they are settled. Forward contracts are typically settled through
    physical delivery of the underlying asset upon expiry, whereas futures contracts
    can be settled either through physical delivery or cash settlement (more on this
    later).


    Moreover, the role of margin accounts in futures trading is another distinguishing
    factor between forward and futures contracts. Futures exchanges require both parties
    to maintain a margin account to cover potential price fluctuations in the underlying
    asset. This ensures that the parties have sufficient funds to cover their obligations,
    thereby mitigating the risk of default. In contrast, forward contracts do not
    involve margin accounts, leaving the parties more exposed to counterparty risk.


    In summary, forward and futures contracts are financial instruments that enable
    market participants to manage risk and speculate on the future prices of underlying
    assets. Although both instruments share some similarities, they also have key
    differences in terms of standardization, trading venues, settlement procedures,
    and risk management. The futures exchange profits by maintaining a spread between
    the quoted prices from the buyer and the seller of the futures contract. Since
    the futures contracts are standardized, the futures exchange can add a small margin
    to them before exposing them to potential buyers while maintaining a lower price
    for those who short the futures contract. Again, as a measure of protection, the
    futures exchange also requires both sides of the trade to open and maintain a
    margin account in case the price of the underlying asset moves against the exchange,
    such as a drop in price.'
