    components interact with the input data to produce the final prediction output.
    This predicted value is then compared with the ground truth target to make an
    error metric jointly. Here, the error indicates the current cost on how close
    or far away it is between the prediction and the actual value. Following a particular
    optimization procedure, the training process adjusts the model parameters for
    a given architecture to reduce the training cost. After changing the weights,
    the new error is calculated again, forming a feedback loop. The whole model training
    process is depicted in Figure [1-2](#605529_1_En_1_Chapter.xhtml#Fig2).


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig2_HTML.jpg)


    A process diagram with 4 main steps. Training data with input features and target
    labels gives a model that includes parameters and architecture, followed by prediction
    and cost. Cost undergoes optimization and goes into the model. A description of
    each step is given.


    Figure 1-2


    Example of a typical model training process. The workflow starts with the available
    training data and gradually tunes a model. The tuning process requires matching
    the model prediction to the target output, where the gap is measured by a particular
    cost function and used as feedback for the next round of tuning. Each tuning produces
    a new model, and we want to look for one that minimizes the cost


    Now let us look at a specific type of algorithmic trading at large institutions:
    institutional algorithmic trading.


    ### Institutional Algorithmic Trading


    Since the underlying decision model could be a black box, algorithmic trading
    is also called automated trading, black-box trading, or robo-trading. It is used
    to generate and execute orders in markets with electronic access. In the context
    of large institutions, hedge funds, and trading desks, the trading volume is often
    quite large. In this case, institutional algorithmic trading often seeks to break
    up large orders into smaller ones to reduce the *execution risk*, which refers
    to the case when a large order cannot be fulfilled in the market.


    Besides preserving anonymity in transactions, large institutions also use algorithmic
    trading to minimize the price impact of a trade. This is because even if a large
    order is executable, it is difficult to guarantee that the market price will not
    be impacted due to the execution of the large order. Thus, the main objective
    of institutional algorithmic trading is to control the market risk and the execution
    cost rather than gaining profits.


    When executing a large order by an institutional investor, the demand for a large
    amount of liquidity will typically affect the cost of the trade negatively. This
    is called *slippage*, which refers to situations when a market participant receives
    a different execution price than initially intended. This could happen for many
    instruments, including stocks, bonds, currencies, and derivatives.


    To execute these block trades anonymously without generating a noticeable impact
    in the market, large institutions often involve *dark pools* to carry out these
    trades. Dark pools are private exchanges that execute orders from institutional
    investors away from the central stock exchanges, thus exhibiting little transparency
    in the transactional process.


    These large institutional orders, when split into small-sized orders, are also
    called *iceberg orders*. By partially exposing the tip of an iceberg, the majority
    of the orders could remain hidden and transition into visible orders afterward,
    thus minimizing the disruption to the trading market as opposed to a single large
    order. These smaller orders will then be executed electronically over minutes,
    hours, or days. To minimize the impact of these orders, institutional investors
    would trade more at the market opens and closes when the trading volume is relatively
    high and less during a slow period around lunchtime.


    Let us look at a simple example of generating a small subset of iceberg orders
    from the original orders using Python. In Listing [1-1](#605529_1_En_1_Chapter.xhtml#PC1),
    we create a list of ten random integers saved in `total_order` to indicate all
    the orders to be executed by an institutional investor. We can randomly sample
    two indexes and use them to access the corresponding elements in `total_order`
    and save in `iceberg_order`, representing the iceberg orders to be exposed to
    the market.


    ```

    # generate multiple random integers

    total_order = [random.randint(0, 10) for p in range(0, 10)]

    >>> total_order

    [9, 6, 4, 3, 7, 6, 3, 0, 0, 6]

    # randomly sample two indexes to identify iceberg orders

    iceberg_order_idx = random.sample(total_order, 2)

    >>> iceberg_order_idx

    [0, 4]

    # retrieve iceberg orders

    iceberg_order = np.array(total_order)[iceberg_order_idx]

    iceberg_order

    array([9, 7])

    Listing 1-1

    Generating iceberg orders

    ```


    The institutional algorithmic strategies generate optimal trading signals by analyzing
    daily quotes and prices. For example, an institutional algorithmic strategy may
    suggest entering a long position if the current stock price moves from below to
    above the *volume-weighted average price (VWAP)* over a day, a technical indicator
    often used by short-term traders. The institutional algorithmic strategies may
    also exploit *arbitrage* opportunities or price spreads between correlated securities.
    Here, arbitrage means making positive sure profits with zero investments. Arbitrage
    opportunities, if exist, would normally disappear very fast as many hedge funds
    and investors are constantly looking for such arbitrage opportunities.


    The next section briefly introduces the role of a quant trader.


    ### Being a Quant Trader


    A quant trader is a specialized trader that uses mathematical models and quantitative
    analysis to evaluate different financial products and identify trading opportunities
    to buy or sell the best securities out of hundreds of thousands of candidates.
    Quant traders make use of data-driven methods to make model-based trading decisions,
    seeking to exploit temporary inefficiencies and underlying patterns in the market
    that may not be easily discernible through traditional qualitative analysis.


    The first attribute of an aspiring quant trader is familiarity with numbers and
    mathematical models. As the majority of the time is spent on analyzing the data,
    proposing, backtesting, and implementing trading strategies to either buy, sell,
    or hold specific security, a quant trader needs to be comfortable with both mathematical
    models and programming, which often requires an advanced degree in financial modeling
    or related field. When a positive signal pops up, the quant trader needs to act
    swiftly using self-developed programs to capitalize on the current trading opportunities.


    The second attribute lies in soft skills such as handling high pressure with a
    good temperament. This requires good emotional intelligence to neither assume
    too much risk nor be overly risk averse. Knowing when to exit a position and stop
    loss is a critical skill that requires discipline in daily trading activities.


    The following section covers the major asset classes and various tradable instruments.'
  trans: '

    ### 模型开发工作流


    典型的模型开发工作流从训练数据开始。在监督学习任务中，训练数据由输入-输出对组成，其中输入和输出数据均已给定。每个输入条目可能包含多个特征，从不同角度描述同一个观测样本。对应的输出包含真实目标值，作为正确答案来指导训练过程。模型训练的目标是生成一个映射函数（即模型），能够正确地将给定输入映射到相应的输出。


    一个训练好的模型包含两部分：参数和架构。参数是模型的组成部分，而架构则规定了这些组件如何与输入数据交互以生成最终的预测输出。预测值随后会与真实目标值进行比较，共同计算出误差指标。此处，误差表示当前预测值与实际值之间接近或偏离程度的代价。遵循特定的优化流程，训练过程会调整给定架构下的模型参数，以降低训练代价。权重更新后，会重新计算新的误差，形成反馈循环。整个模型训练过程如图
    1-2 所示。


    ![](img/605529_1_En_1_Fig2_HTML.jpg)


    一个包含 4 个主要步骤的流程示意图。带输入特征和目标标签的训练数据生成包含参数和架构的模型，随后进行预测并计算代价。代价经过优化后反馈至模型。图中对各步骤均有文字说明。


    **图 1-2** 典型模型训练过程示例。工作流从可用的训练数据开始，逐步调整模型。调整过程要求模型预测与目标输出相匹配，两者之间的差距由特定代价函数衡量，并作为下一轮调整的反馈。每次调整都会产生一个新模型，我们的目标是寻找使代价最小化的那个模型。


    现在，让我们来看大型机构中一种特定类型的算法交易：机构算法交易。


    ### 机构算法交易


    由于底层决策模型可能是一个黑箱，算法交易也被称为自动化交易、黑箱交易或机器人交易。它用于在可电子化接入的市场中生成并执行订单。在大型机构、对冲基金和交易部门中，交易量通常相当大。在这种情况下，机构算法交易通常寻求将大订单拆分为小订单，以降低**执行风险**——即市场上无法完成大订单的情形。


    除了在交易中保持匿名性外，大型机构还使用算法交易来最小化交易对价格的影响。这是因为即使大订单可以执行，也很难保证市场价格不会因大订单的执行而受到影响。因此，机构算法交易的主要目标是控制市场风险和执行成本，而非获取利润。


    当机构投资者执行大订单时，对大量流动性的需求通常会负面地影响交易成本。这被称为**滑点**，指市场参与者收到的执行价格与最初预期不同的情况。这种情况可能发生在多种工具上，包括股票、债券、外汇和衍生品。


    为了在不引起市场明显波动的情况下匿名执行这些大宗交易，大型机构通常会借助**暗池**来开展交易。暗池是远离中央证券交易所、为机构投资者执行订单的私有交易所，因此在交易过程中透明度很低。


    这些大型机构订单在拆分成小订单后，也被称为**冰山订单**。通过仅暴露冰山的一角，大部分订单可以保持隐藏状态，随后再转为可见订单，从而与单一的大订单相比，最大限度地减少对交易市场的干扰。这些小订单随后会在数分钟、数小时或数天内以电子方式执行。为了最小化这些订单的影响，机构投资者会在开盘和收盘时交易量相对较高的时段更多地进行交易，而在午餐时间等交易清淡的时段交易较少。


    让我们看一个简单的例子：使用 Python 从原始订单中生成冰山订单的一个小子集。在代码清单 1-1 中，我们创建了一个包含十个随机整数的列表，保存为`total_order`，用于表示机构投资者要执行的所有订单。我们可以随机抽取两个索引，并用它们访问`total_order`中对应的元素，保存为`iceberg_order`，表示要向市场暴露的冰山订单。


    ```

    # 生成多个随机整数

    total_order = [random.randint(0, 10) for p in range(0, 10)]

    >>> total_order

    [9, 6, 4, 3, 7, 6, 3, 0, 0, 6]

    # 随机采样两个索引以识别冰山订单

    iceberg_order_idx = random.sample(total_order, 2)

    >>> iceberg_order_idx

    [0, 4]

    # 检索冰山订单

    iceberg_order = np.array(total_order)[iceberg_order_idx]

    iceberg_order

    array([9, 7])

    ```


    **代码清单 1-1** 生成冰山订单


    机构算法策略通过分析每日报价和价格来生成最优交易信号。例如，一种机构算法策略可能建议：如果当前股价从低于**成交量加权平均价格（VWAP）** 变为高于该价格——这是短期交易者常用的技术指标，则开立多头头寸。机构算法策略也可能利用**套利**机会或相关证券之间的价差。这里，套利意味着以零投资获取确定的正利润。套利机会如果存在，通常会很快消失，因为许多对冲基金和投资者都在不断寻找此类套利机会。


    下一节将简要介绍量化交易员的角色。


    ### 成为量化交易员


    量化交易员是一种专业交易员，他们利用数学模型和量化分析来评估不同的金融产品，并从成千上万的候选标的中识别出买卖最佳证券的交易机会。量化交易员使用数据驱动的方法做出基于模型的交易决策，试图利用市场中可能不易通过传统定性分析识别的暂时性低效和潜在模式。


    有志成为量化交易员的首要特质是熟悉数字和数学模型。由于大部分时间都用于分析数据、提出、回测并实施（买入、卖出或持有特定证券的）交易策略，量化交易员需要同时熟练掌握数学模型和编程技能，这通常要求具备金融建模或相关领域的高等学历。当积极信号出现时，量化交易员需要利用自研程序迅速行动，以抓住当前的交易机会。


    第二个特质在于软技能，例如以良好心态应对高压。这需要良好的情商，既不过度承担风险，也不过分规避风险。懂得何时离场止损是一项关键技能，需要在日常交易活动中保持纪律性。


    下一节将涵盖主要资产类别和各种可交易工具。

    '
- fmt: '### Major Asset Classes and Derivatives


    Multiple tradable financial instruments are used to raise capital in public and
    private markets. Institutional and retail investors can enter into long or short
    positions involving different single or combinations of assets, profit-seeking,
    or risk management (i.e., hedging).


    Let us first get a glimpse of the many tradable assets. In the following list,
    we provide a short definition of common assets used in the market:


    - **Stocks**: Also called equity, a form of security representing proportionate
    ownership of the issuing company. A unit of stock is called a share, and the number
    of shares determines the proportionate ownership and, thus, profit sharing of
    the stock owner. The stock owner profits when the stock price increases or by
    receiving dividends.


    - **Bonds**: Fixed-income debt instruments representing a fixed-duration loan
    from the investor/lender to the borrower (company or government). A bond provides
    the owner with fixed-rate coupon or variable interest payments, and the principal
    is paid to the owner at the end date. It is a fixed-income asset due to the regular
    and stable interest paid to the owner.


    - **Annuities**: Insurance contracts from financial institutions that provide
    a fixed-income stream to the contract owner in the future. Investors mainly purchase
    annuities for retirement as they can receive a guaranteed stream of payments in
    the future for a specified period or the remainder of life.


    - **Cash and equivalents**: Highly liquid short-term (less than 90 days) investment
    securities with low risk and low return (usually less than the inflation rate).
    The equivalents include bank accounts, near-term instruments such as US Treasury
    bills, and money market funds. These current assets can be easily accessed anytime
    and reflect the firm’s ability to pay the short-term debt.


    - **Commodities**: Basic goods used in commerce as raw inputs to produce other
    goods or services. Common commodities, such as gold, oil, and natural gas, can
    be traded in the spot (cash) market or via derivatives such as futures and options.


    - **Futures**: Financial derivatives in the form of legal agreements that oblige
    the futures contract buyer to buy or sell the underlying asset at a prespecified
    price, amount, and time in the future. Futures are often used to hedge against
    price movements of the underlying asset and thus avoid losses due to unfavorable
    price changes in the future. The price of a futures contract is settled daily,
    that is, marked to market (MTM).


    - **Forward**: Similar to the futures contract. The difference is that a forward
    contract is a private and customizable agreement traded over the counter (OTC),
    which is a decentralized marketplace where participants trade instruments directly
    without engaging a central exchange or a broker. The price of a forward contract
    is settled at the end of the agreement.


    - **Options**: Financial derivatives that offer the buyer of the options contract
    the opportunity to buy (if it is a call option) or sell (if it is a put option)
    the underlying asset on or before a specific expiration (maturity) date and (strike)
    price. Options give the buyers the right, not the obligation, to long or short
    an underlying asset. They can be used for both hedging and speculation. Note that
    we focus on the European option by default.


    - **Currencies**: International currencies and currency derivatives traded via
    the (largest and most liquid) global electronic marketplace, also called the foreign
    exchange market or forex. Forex allows investors to exchange one currency for
    the equivalent value in another currency at the current market rate. Traders also
    speculate on the direction of currency values to profit from a favorable price
    movement of a particular pair of currencies.


    - **ETFs**: Exchange-traded funds that refer to a type of pooled investment security
    that are baskets of securities (stocks, bonds, commodities, etc.) and are traded
    intraday like regular stocks.


    - **REITs**: Real estate investment trusts that refer to companies that own, operate,
    or finance income-generating real estate. Investors in REITs (liquid and publicly
    traded like stocks) can earn a steady income stream from real estate investments
    without purchasing, managing, or financing the actual properties themselves.


    - **Mutual funds**: A type of financial vehicle that consists of a portfolio of
    stocks, bonds, or other securities. Mutual funds are managed by professional money
    managers and allow individual investors to access diversified and professionally
    managed portfolios at the expense of annual fees. Mutual funds only can be purchased
    at the end of each trading day based on a calculated price known as the net asset
    value.


    - **Hedge funds**: Actively managed investment pools that aim at earning above-average
    returns for investors via a wide range of (often risky) trading strategies at
    the expense of higher fees than conventional investment funds.


    These tradable asset types can be grouped into different classes based on a particular
    perspective. We introduce a few popular perspectives in the following section.'
