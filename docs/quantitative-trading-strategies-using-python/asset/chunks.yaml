    problem at hand. The number of neurons in the middle layers is user defined and
    directly determines the model complexity. All these layers are chained together
    with a ReLU activation function in the middle via the `forward()` function. Also,
    note that it is unnecessary to apply ReLU to the last layer since the output will
    be a scalar value representing the predicted spread.


    ```

    # Define the neural network model

    class Net(nn.Module):

    def __init__(self):

    super(Net, self).__init__()

    self.fc1 = nn.Linear(train_X.shape[1], 64)

    self.fc2 = nn.Linear(64, 32)

    self.fc3 = nn.Linear(32, 1)

    self.relu = nn.ReLU()

    def forward(self, x):

    x = self.fc1(x)

    x = self.relu(x)

    x = self.fc2(x)

    x = self.relu(x)

    x = self.fc3(x)

    return x

    Listing 10-8

    Defining the network architecture

    ```


    Now we instantiate a neural network model in `nn_model` and inspect the architectural
    information of the model using the `summary()` function, as shown in Listing [10-9](#605529_1_En_10_Chapter.xhtml#PC13).


    ```

    from torchsummary import summary

    # Create an instance of the neural network model

    nn_model = Net()

    # print the summary of the customized neural network

    >>> summary(nn_model, input_size=(1, train_X.shape[1]))


    Layer (type)               Output Shape         Param #

    ================================================================

    Linear-1                [-1, 1, 64]             384

    ReLU-2                [-1, 1, 64]               0

    Linear-3                [-1, 1, 32]           2,080

    ReLU-4                [-1, 1, 32]               0

    Linear-5                 [-1, 1, 1]              33

    ================================================================

    Total params: 2,497

    Trainable params: 2,497

    Non-trainable params: 0


    Input size (MB): 0.00

    Forward/backward pass size (MB): 0.00

    Params size (MB): 0.01

    Estimated Total Size (MB): 0.01


    Listing 10-9

    Checking network model summary

    ```


    The result shows that the neural network contains a total of 2497 parameters over
    three linear layers. Note that the ReLU layer does not have any associated parameters
    as it involves deterministic mapping only.


    Next, we define the loss function as the mean square error using `MSELoss()` and
    choose Adam as the optimizer over the network weights, with an initial learning
    rate of 0.001:


    ```

    # Define the loss function and optimizer

    criterion = nn.MSELoss()

    optimizer = torch.optim.Adam(nn_model.parameters(), lr=0.001)

    ```


    We now enter the iterative training loop to update the weights by minimizing the
    specified loss function, as shown in Listing [10-10](#605529_1_En_10_Chapter.xhtml#PC15).


    ```

    # Train the model

    for epoch in range(100):

    optimizer.zero_grad()

    outputs = nn_model(train_X_ts)

    loss = criterion(outputs, train_y_ts)

    loss.backward()

    optimizer.step()

    # Print the loss for every 10 epochs

    if epoch % 10 == 0:

    print("Epoch {}, Loss: {:.4f}".format(epoch, loss.item()))

    Listing 10-10

    The full model training procedure

    ```


    Here, we iterate over the training set for a total of 100 epochs. In each epoch,
    we first clear the existing gradients in memory using the `zero_grad()` function
    of the optimizer. Next, we score the training set to obtain predicted targets
    in `outputs`, calculate the corresponding MSE loss, perform backward propagation
    to calculate the gradients using `autograd` functionality via the `backward()`
    method, and finally perform gradient descent update using the `step()` function.


    Running the code generates the following results, where we see that the training
    loss continues to decrease as iteration proceeds:


    ```

    Epoch 0, Loss: 0.4154

    Epoch 10, Loss: 0.2246

    Epoch 20, Loss: 0.0850

    Epoch 30, Loss: 0.0093

    Epoch 40, Loss: 0.0043

    Epoch 50, Loss: 0.0051

    Epoch 60, Loss: 0.0013

    Epoch 70, Loss: 0.0016

    Epoch 80, Loss: 0.0013

    Epoch 90, Loss: 0.0012

    ```


    We can also check the in-sample and out-of-sample RMSE as follows:


    ```

    # evaluate the model on the training and testing set

    train_pred = nn_model(train_X_ts).detach().numpy()

    >>> print("training rmse: ", np.sqrt(mean_squared_error(train_y_ts, train_pred)))

    test_pred = nn_model(test_X_ts).detach().numpy()

    >>> print("test rmse: ", np.sqrt(mean_squared_error(test_y_ts, test_pred)))

    training rmse:  0.033806544

    test rmse:  0.08466047

    ```


    The result shows that the neural network is less overfitting than the random forest
    model.


    Now we obtain the terminal return of the pairs trading strategy based on the neural
    network model:


    ```

    >>> score_fn(nn_model, type="nn")

    0.8999874304248494

    ```


    Again, this result shows that an accurate machine learning model may not necessarily
    lead to a higher terminal return in the pairs trading strategy. Even if the machine
    learning model is predictive of future spreads, another layer of assumption imposed
    by the pairs trading strategy is that the temporary market fluctuations will ease
    down, and the two assets will revert back to the long-term equilibrium relationship.
    Such an assumption may not necessarily stand, along with the many unpredictable
    factors in the market.


    ## Summary


    In this chapter, we introduced different machine learning algorithms used in predicting
    the spread, a key component when employing the pairs trading strategy. We started
    by introducing the overall framework when training any machine learning algorithm
    and then elaborated on three specific algorithms: support vector machine, random
    forest, and neural network. Lastly, we plugged these models into the strategy
    and found that a higher predictive performance by the machine learning model,
    a sign of overfitting, may lead to a lower performance score in terms of cumulative
    return. It is thus important not to overfit the machine learning models at the
    prediction stage and instead focus more on the final performance of the trading
    strategy at the decision stage, where the actual trading action is made.


    ## Exercises


    *   How does the SVM model determine the optimal hyperplane for predicting the
    spread in a pairs trading strategy? What are the key parameters that need to be
    adjusted in an SVM?


    *   How does a random forest algorithm handle feature selection when predicting
    the spread in a pairs trading strategy? What are the implications of feature importance
    in this context?


    *   Explain how SVM, random forest, and neural networks approach the problem of
    overfitting in the context of predicting the spread in a pairs trading strategy.


    *   How can you handle nonlinear relationships between features in SVM, random
    forest, and neural networks when predicting the spread in a pairs trading strategy?


    *   How can the layers in a neural network be optimized to improve the prediction
    of the spread in a pairs trading strategy?'
