    from botorch.optim import optimize_acqf

    # get search bounds

    bounds = torch.tensor([[x1_bound[0], x2_bound[0]], [x1_bound[1], x2_bound[1]]],
    device=device, dtype=dtype)

    # parallel candidate locations generated in each iteration

    BATCH_SIZE = 1

