    ## 执行顺序搜索


    这三种搜索策略在相同的采样预算内，根据找到的最大夏普比率展现不同的搜索质量。为了衡量每轮搜索策略的有效性，我们使用黑箱函数返回的累积最大值，该设计确保该值是非递减的。在相同的环境设置下，更有效的搜索策略将能比替代策略更快地识别出更高的夏普比率。


