    \n```\ndfBidPrices = dfBidPrices[dfBidPrices.columns[::-1]]\ndfBidVolumes = dfBidVolumes[dfBidVolumes.columns[::-1]]\n\
    ```\n\n检查 `dfBidPrices` 的第一行，现在显示价格呈递增趋势：\n\n```\n>>> dfBidPrices.loc[0,:]\n38\
