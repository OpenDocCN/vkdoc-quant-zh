  trans: '

    ### 期货合约定价


    期货合约的定价方式与远期合约类似，但涉及更多因素。从根本上说，期货合约的价格由市场供求关系决定。当卖方和买方就交易期货合约的均衡价格达成一致时，该价格即为期货合约价格。


    假设我们要为下一个月的期货合约（近月合约）定价。同时，假设我们持有期货合约的空头头寸，有义务在到期日卖出一单位标的资产。这里需要考虑的额外因素是持有资产至到期日的成本和收益。


    对于持有资产至交割日的成本，我们需要将其计入期货合约的价格，因为从建仓到交割日期间，这构成了我们必须考虑的实际成本。例如，如果做空一份在 `T` 时点卖出
    1000 桶原油的期货合约，我们会借钱在 `t` 时点从现货市场购买 1000 桶原油，以便能在 `T` 时点履行义务。这样做需要储存这 1000 桶原油，由此产生的存储成本需计入期货合约价格。


    对于持有资产至交割日的收益，我们需要从期货合约价格中扣除。这被称为便利收益，即持有标的资产的一方在直至交割日的过程中所获得的利益。这种情况通常发生在持有实物资产更有利时。例如，持有股票可能产生股息支付；持有货币可能因利率差异而产生利润；当市场对某种商品供不应求时，持有该商品则更为有利。


    基于现货价格并考虑复利效应，期货合约的合理价格可通过以下公式计算：


    合理价格 = 复利后的现货价格 + 存储成本 – 持有资产带来的便利收益


    当利率、成本及便利收益均按年复利计算时，期货合约的合理价格可通过以下公式计算：


    ```

    F = S_t * (1 + r + s - c)^(T - t)

    ```


    其中，`S[t]` 是标的资产的现货价格，`r` 是无风险债券利率，`s` 是以百分比表示并按年复利的存储成本，`c` 也是以百分比表示并按年复利的便利收益。我们将其提升至期限
    `T - t` 的幂次，以展示该期间的复利效应。


    该公式表明，期货合约价格考虑了以下几个因素：标的资产的现货价格、无风险利率、存储成本以及便利收益。这些组成部分有助于市场参与者确定期货合约的合理价格，该价格反映了标的资产的真实价值，同时考虑了持有资产至交割日的成本与收益。


    期货合约价格对于买方和卖方都至关重要，因为它决定了他们在订立期货合约时潜在的盈利或亏损。通过了解期货合约价格的计算方式，市场参与者可以就是否以某个价格订立期货合约做出明智的决策。


    还需注意，期货合约的合理价格是一个理论值。在现实中，市场的实际期货合约价格会受到供求动态的影响，这可能导致市场价格偏离合理价格。市场参与者需要持续监控期货市场，关注标的资产现货价格、利率、存储成本和便利收益的变化，以便调整策略，并就期货合约持仓做出明智的决策。


    让我们看一个例子。假设当前现货价格为 `S[t] = $80`，利率为 `r = 2%`，存储成本为 `s = 1%`，便利收益为 `c = 0.5%`，期货合约持仓期限为三个月。由于复利是按年计算的，我们需要将期限转换为年化值，即
    `T - t = 3/12 = 0.25`。因此，期货合约的合理价格可计算如下：


    ```

    F = 80 * (1 + 0.02 + 0.01 - 0.005)^(0.25) = $80.5

    ```


    图 3-5 总结了计算期货合约合理价格的过程。


    ![总结合理价格计算的图表](img/605529_1_En_3_Fig5_HTML.jpg)


    *一个带有变量标注的合理价格等式。F 等于 S t 乘以 1 加 r 加 s 减 c 的 T 减 t 次幂。标注的变量分别为：合理价格、标的资产现货价格、按年复利的利率、便利收益、存储成本以及按年计算的期限。*


    **图 3-5** – 在利率、存储成本和便利收益均按年复利的情况下，计算期货合约的合理价格。

    '
- fmt: '# Contango and Backwardation


    There are a few extra terms often used in the futures world. These terms are listed
    as follows, where the contango is sort of the opposite of backwardation:


    - **Contango**: The futures contract price is higher than the current spot price
    of the underlying asset.

    - **Normal contango**: The futures contract price is higher than the expected
    spot price of the underlying asset.

    - **Backwardation**: The futures contract price is lower than the current spot
    price of the underlying asset.

    - **Normal backwardation**: The futures contract price is lower than the expected
    spot price of the underlying asset.


    A close look into these terms helps us better understand the price dynamics of
    the futures contract. Let us start with contango. When we say the market for a
    specific futures contract is in contango, what this means is that we have an upward-sloping
    futures price curve. Here, the futures price curve specifies the (increasing)
    price of a futures contract with different delivery dates, at the current time
    snapshot. A futures contract with a longer duration is more expensive than another
    with a shorter duration. In addition, when we say the market is in normal contango,
    this means that the futures price is higher than the (theoretical) expected spot
    price. Different price points along the futures price curve correspond to different
    paths of price movements across time, with the final settlement price of the futures
    contract converging with the spot price at the same (future) delivery date.


    The existence of contango or backwardation can have various underlying reasons.
    For instance, storage costs, seasonality, market expectations, and macroeconomic
    factors can all contribute to the formation of these pricing patterns in the futures
    market.


    Contango is commonly observed in commodities markets where there are costs associated
    with holding and storing the underlying assets, such as oil or grain. These costs
    are factored into the futures contract price, causing it to be higher than the
    current spot price. Contango can also arise when market participants expect the
    underlying asset’s price to rise in the future, causing them to bid up the price
    of longer-dated futures contracts.


    Backwardation, on the other hand, can occur when market participants believe that
    the underlying asset’s price will decline in the future. This could be due to
    a forecasted decrease in demand or an anticipated increase in supply. In such
    cases, market participants might be more willing to sell futures contracts at
    a lower price than the current spot price, as they expect the spot price to drop
    in the future.


    Figure [3-6](#605529_1_En_3_Chapter.xhtml#Fig6) provides an example to help put
    these statements in perspective. Here, we have two futures contracts with one
    and two months before the delivery date, respectively. A market in contango means
    an upward-trending price curve for the futures contracts as the duration gets
    longer, as shown on the left panel of the figure. As the asset price starts to
    move across time, as shown by the curve starting with the orange dot, the futures
    contract price will gradually approach the spot price. Eventually, the futures
    price will be equal to the spot price when the delivery date is the current date.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig6_HTML.jpg)


    2 line graphs of price versus time. 1\. The graph has an ascending curve. 2\.
    The graph has 2 descending curves and a fluctuating ascending curve. It indicates
    the point of evolution of the spot price of the underlying asset. The futures
    price converges to the spot price upon reaching the delivery rate.


    **Figure 3-6** — Illustrating the price dynamics of the futures contract in contango.
    The left panel shows the price curve at the current time point, where a futures
    contract with a longer delivery date is more expensive. The right panel shows
    the price evolution of the asset and futures contract with different delivery
    dates, each converging to the spot price upon reaching the respective delivery
    date.


    Correspondingly, a market in backwardation displays the opposite behavior, as
    shown in Figure [3-7](#605529_1_En_3_Chapter.xhtml#Fig7).


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig7_HTML.jpg)


    2 line graphs of price versus time. 1\. The graph has a descending curve. 2\.
    The graph has 3 fluctuating ascending curves. It indicates the point of evolution
    of the spot price of the underlying asset. The futures price converges to the
    spot price upon reaching the delivery rate.


    **Figure 3-7** — Illustrating the price dynamics of the futures contract in backwardation.'
