- fmt: "### Observing the Role of Lookback Windows\n\nThe application of lookback\
    \ windows in trend-following and momentum trading strategies varies, depending\
    \ on their unique operational requirements and objectives.\n\nThe trend-following\
    \ strategy, as discussed in the previous chapter, employs two lookback windows.\
    \ These two windows, one short term and one long term, calculate the respective\
    \ moving averages as technical indicators. The intersection or crossover of these\
    \ moving averages then produces a trading signal, indicating a shift in the trend’s\
    \ direction and the right moment for action (for either buying or selling). Thus,\
    \ the dual lookback windows in the trend-following strategy serve as the basis\
    \ for decision-making, assisting traders in identifying potential shifts in market\
    \ trends.\n\nConversely, the momentum trading strategy uses a singular, uniform\
    \ lookback window to evaluate an array of assets. This window helps identify which\
    \ assets have performed best over the defined lookback period. Subsequently, another\
    \ uniform lookahead window is used to determine the holding period of a position\
    \ once a trading decision is made. Essentially, the lookback window aids in selecting\
    \ the assets to invest in based on their past performance, while the lookahead\
    \ window provides a time frame for holding the investment, assuming that the asset’s\
    \ momentum will continue during this period.\n\nTherefore, both lookback and lookahead\
    \ windows are essential in momentum trading, helping traders identify high-momentum\
    \ assets and define the investment’s holding period, respectively. The strategic\
    \ use of these windows provides a structured approach to navigating the ever-fluctuating\
    \ market dynamics.\n\nLet us elaborate on the difference. Figure [6-1](#605529_1_En_6_Chapter.xhtml#Fig1)\
    \ characterizes the selection of three stocks at regular trading intervals as\
    \ indicated by the lookahead window. Each trading decision (indicated by the green\
    \ box in the solid line) considers historical stock prices within the same lookback\
    \ window. The trading decision could be buying the stock with the highest momentum\
    \ (based on metrics such as the historical average return) and selling the stock\
    \ with the lowest momentum at a specific time point. We assess all three stocks\
    \ and make a trading decision at regular intervals (the lookahead window) based\
    \ on a rolling lookback window.\n\n![](images/605529_1_En_6_Chapter/605529_1_En_6_Fig1_HTML.jpg)\n\
    \nA line graph of price versus time. It has 3 fluctuating curves for stock A,\
    \ stock B, and stock C and 2 vertical bars. The bars present the time points for\
    \ making the trading decisions. It also indicates 2 uniform lookback windows to\
    \ assess the momentum for all assets.\n\n**Figure 6-1**  \nCharacterizing the\
    \ momentum trading strategy for three stocks\n\nThe momentum trading strategy\
    \ is particularly effective in equities, offering a systematic approach to compare\
    \ and analyze similar assets. It performs a cross-sectional analysis across the\
    \ equity universe (in this case, three stocks), evaluating and rank-ordering the\
    \ constituents based on their relative performances over a specified lookback\
    \ period. This process enables traders to identify strong performers and potential\
    \ laggards, using their recent momentum as a proxy for future performance.\n\n\
    In making a trading decision, the momentum strategy often embraces a two-pronged\
    \ approach, establishing a portfolio with two legs. The first leg is the “long”\
    \ leg, consisting of top-ranked assets projected to maintain their strong upward\
    \ price momentum. Traders buy these stocks with an expectation of price appreciation,\
    \ aiming to sell at a higher price in the future. The second leg is the “short”\
    \ leg, made up of bottom-ranked assets showing signs of declining price momentum.\
    \ Traders sell these stocks, often through short-selling, where they borrow the\
    \ stock to sell in the market with the intent to buy it back at a lower price\
    \ later. The idea is to profit from the anticipated price decline of these assets.\
    \ By going long on assets with strong positive momentum and short on assets with\
    \ negative momentum, traders can potentially benefit from both rising and falling\
    \ markets, provided the identified momentum persists over the holding period.\n\
    \nNote that momentum strategies, grounded in the principle of relative momentum,\
    \ maintain their long and short positions irrespective of the broader market trends.\
    \ These strategies function on the assumption that the strongest performers and\
    \ underperformers will persist in their respective trajectories, thus maintaining\
    \ their relative positions in the investment universe. In other words, in a bullish\
    \ market environment, the stocks with the strongest upward momentum are expected\
    \ to outperform the market. Meanwhile, during bearish phases, these same high-momentum\
    \ stocks may fall in price, but they are still expected to perform better than\
    \ other stocks that are falling more rapidly. Conversely, the bottom-ranked stocks,\
    \ showing declining momentum, are expected to underperform the market. In a rising\
    \ market, these stocks may increase in value, but at a slower pace than the market.\
    \ Similarly, in a falling market, these stocks are anticipated to decline more\
    \ rapidly than the broader market. Thus, irrespective of whether the market is\
    \ bullish or bearish, momentum strategies rely on the persistence of relative\
    \ performance."
  raw: '### Observing the Role of Lookback Windows


    The application of lookback windows in trend-following and momentum trading strategies
    varies, depending on their unique operational requirements and objectives.


    The trend-following strategy, as discussed in the previous chapter, employs two
    lookback windows. These two windows, one short term and one long term, calculate
    the respective moving averages as technical indicators. The intersection or crossover
    of these moving averages then produces a trading signal, indicating a shift in
    the trend’s direction and the right moment for action (for either buying or selling).
    Thus, the dual lookback windows in the trend-following strategy serve as the basis
    for decision-making, assisting traders in identifying potential shifts in market
    trends.


    Conversely, the momentum trading strategy uses a singular, uniform lookback window
    to evaluate an array of assets. This window helps identify which assets have performed
    best over the defined lookback period. Subsequently, another uniform lookahead
    window is used to determine the holding period of a position once a trading decision
    is made. Essentially, the lookback window aids in selecting the assets to invest
    in based on their past performance, while the lookahead window provides a time
    frame for holding the investment, assuming that the asset’s momentum will continue
    during this period.


    Therefore, both lookback and lookahead windows are essential in momentum trading,
    helping traders identify high-momentum assets and define the investment’s holding
    period, respectively. The strategic use of these windows provides a structured
    approach to navigating the ever-fluctuating market dynamics.


    Let us elaborate on the difference. Figure [6-1](#605529_1_En_6_Chapter.xhtml#Fig1)
    characterizes the selection of three stocks at regular trading intervals as indicated
    by the lookahead window. Each trading decision (indicated by the green box in
    the solid line) considers historical stock prices within the same lookback window.
    The trading decision could be buying the stock with the highest momentum (based
    on metrics such as the historical average return) and selling the stock with the
    lowest momentum at a specific time point. We assess all three stocks and make
    a trading decision at regular intervals (the lookahead window) based on a rolling
    lookback window.


    ![](images/605529_1_En_6_Chapter/605529_1_En_6_Fig1_HTML.jpg)


    A line graph of price versus time. It has 3 fluctuating curves for stock A, stock
    B, and stock C and 2 vertical bars. The bars present the time points for making
    the trading decisions. It also indicates 2 uniform lookback windows to assess
    the momentum for all assets.


    Figure 6-1


    Characterizing the momentum trading strategy for three stocks


    The momentum trading strategy is particularly effective in equities, offering
    a systematic approach to compare and analyze similar assets. It performs a cross-sectional
    analysis across the equity universe (in this case, three stocks), evaluating and
    rank-ordering the constituents based on their relative performances over a specified
    lookback period. This process enables traders to identify strong performers and
    potential laggards, using their recent momentum as a proxy for future performance.


    In making a trading decision, the momentum strategy often embraces a two-pronged
    approach, establishing a portfolio with two legs. The first leg is the “long”
    leg, consisting of top-ranked assets projected to maintain their strong upward
    price momentum. Traders buy these stocks with an expectation of price appreciation,
    aiming to sell at a higher price in the future. The second leg is the “short”
    leg, made up of bottom-ranked assets showing signs of declining price momentum.
    Traders sell these stocks, often through short-selling, where they borrow the
    stock to sell in the market with the intent to buy it back at a lower price later.
    The idea is to profit from the anticipated price decline of these assets. By going
    long on assets with strong positive momentum and short on assets with negative
    momentum, traders can potentially benefit from both rising and falling markets,
    provided the identified momentum persists over the holding period.


    Note that momentum strategies, grounded in the principle of relative momentum,
    maintain their long and short positions irrespective of the broader market trends.
    These strategies function on the assumption that the strongest performers and
    underperformers will persist in their respective trajectories, thus maintaining
    their relative positions in the investment universe. In other words, in a bullish
    market environment, the stocks with the strongest upward momentum are expected
    to outperform the market. Meanwhile, during bearish phases, these same high-momentum
    stocks may fall in price, but they are still expected to perform better than other
    stocks that are falling more rapidly. Conversely, the bottom-ranked stocks, showing
    declining momentum, are expected to underperform the market. In a rising market,
    these stocks may increase in value, but at a slower pace than the market. Similarly,
    in a falling market, these stocks are anticipated to decline more rapidly than
    the broader market. Thus, irrespective of whether the market is bullish or bearish,
    momentum strategies rely on the persistence of relative performance.'
  trans: "\n### 观察回溯窗口的作用\n\n回溯窗口在趋势跟踪和动量交易策略中的应用各不相同，这取决于它们独特的操作需求和目标。\n\n如前章所述，趋势跟踪策略采用两个回溯窗口。这两个窗口（一个短期、一个长期）分别计算各自的移动平均线作为技术指标。这些移动平均线的交叉或金叉/死叉会生成交易信号，指示趋势方向的转变以及采取行动（买入或卖出）的恰当时机。因此，趋势跟踪策略中的双重回溯窗口是决策的基础，帮助交易者识别市场趋势的潜在转变。\n\
    \n相反，动量交易策略使用单一的、统一的回溯窗口来评估一系列资产。该窗口有助于识别在特定回溯期内表现最佳的资产。随后，另一个统一的前瞻窗口用于确定在做出交易决策后持有头寸的周期。本质上，回溯窗口根据资产过去的表现帮助选择投资目标，而前瞻窗口则提供了持有投资的时限，前提是假设资产的动量在此期间将持续。\n\
    \n因此，回溯窗口和前瞻窗口在动量交易中都至关重要，分别帮助交易者识别高动量资产和定义投资持有期。这些窗口的战略性运用为驾驭不断波动的市场动态提供了一种结构化的方法。\n\
    \n让我们详细阐述其区别。图 6-1 展示了按常规交易间隔（如前瞻窗口所示）选择三只股票的特征。每个交易决策（实线绿框所示）都考虑了同一回溯窗口内的历史股价。该交易决策可能是在特定时间点买入动量最高（基于历史平均收益率等指标）的股票，并卖出动量最低的股票。我们评估所有三只股票，并根据滚动回溯窗口，定期（即前瞻窗口）做出交易决策。\n\
    \n![](img/605529_1_En_6_Fig1_HTML.jpg)\n\n股价随时间变化的折线图。图中包含股票 A、股票 B 和股票 C 的三条波动曲线以及两条垂直条柱。条柱表示做出交易决策的时间点。此外，还标示了两个统一的回溯窗口，用于评估所有资产的动量。\n\
    \n**图 6-1**  \n三只股票的动量交易策略特征图示\n\n动量交易策略在股票市场中尤为有效，它提供了一种系统化的方法来比较和分析同类资产。该策略对股票宇宙（在此例中为三只股票）进行横截面分析，根据各成分股在特定回溯期内的相对表现进行评估和排序。这一过程使交易者能够识别强势股和潜在滞涨股，利用它们近期的动量作为未来表现的代理指标。\n\
    \n在做出交易决策时，动量策略通常采用双管齐下的方法，建立一个包含两条“腿”的投资组合。第一条腿是“多头”腿，由预计将维持强劲上涨价格动能的排名靠前的资产组成。交易者买入这些股票，预期其价格上涨，旨在未来以更高价格卖出。第二条腿是“空头”腿，由显示出价格动能下降迹象的排名靠后的资产组成。交易者卖出这些股票，通常通过卖空操作，即借入股票在市场上卖出，意图日后以更低价格买回。其理念是从这些资产预期的价格下跌中获利。通过做多具有强劲正动量的资产并做空具有负动量的资产，只要所识别的动量在持有期内持续，交易者就有可能从上涨和下跌的市场中获利。\n\
    \n请注意，基于相对动量原理的动量策略，会维持其多头和空头头寸，而不受更广泛市场趋势的影响。这些策略的运作前提是：表现最强和最弱的股票将延续各自的轨迹，从而在投资宇宙中保持其相对位置。换言之，在牛市环境中，上涨动能最强的股票预计将跑赢大盘。同时，在熊市阶段，这些同样具有高动量的股票价格可能下跌，但其表现仍预计将优于其他下跌更快的股票。相反，排名靠后的、显示出动能下降的股票预计将跑输大盘。在上涨的市场中，这些股票的价值可能会增加，但增速慢于市场。类似地，在下跌市场中，这些股票预计会比大盘下跌得更快。因此，无论市场是牛市还是熊市，动量策略都依赖于相对表现的持续性。\n"
- fmt: "### More on Trend Following\n\nThe trend-following strategy fundamentally\
    \ differs from the momentum trading strategy in terms of its approach and trading\
    \ frequency. Trend following is a time series–based strategy that employs moving\
    \ averages over different lookback periods, one shorter and one longer, to generate\
    \ the trading signals.\n\nAs depicted in Figure [6-2](#605529_1_En_6_Chapter.xhtml#Fig2),\
    \ the trend-following strategy calculates two moving averages at each point in\
    \ time, leveraging a longer-term lookback window for one and a shorter-term lookback\
    \ window for the other. A trading signal is produced when there’s a crossover,\
    \ which corresponds to a change in the relative position of the two moving averages\
    \ from one time point to the next. For instance, when the short-term moving average\
    \ crosses above the long-term moving average, it is often viewed as a bullish\
    \ signal, and a bearish signal when it crosses below.\n\n![](images/605529_1_En_6_Chapter/605529_1_En_6_Fig2_HTML.jpg)\n\
    \nA line graph of price versus time. It has a fluctuating ascending curve for\
    \ stock A and a vertical bar. The bar presents that the trading interval is not\
    \ fixed and is purely data-driven. It also indicates longer and shorter lookback\
    \ windows above and below the curve.\n\n**Figure 6-2**  \nCharacterizing the trend-following\
    \ strategy for a single stock\n\nContrary to the momentum trading strategy, which\
    \ mandates regular trading based on a predefined lookahead window, the trend-following\
    \ strategy operates without a set trading frequency. Rather, it’s driven entirely\
    \ by the data at hand. Trading actions are informed by the moving averages’ interactions,\
    \ leading to potentially less frequent but more strategically timed trades. Such\
    \ a mechanism makes the trend-following strategy more flexible as it adapts to\
    \ the market’s movements.\n\nNote that in a trend-following strategy, the primary\
    \ concern is whether an asset is on an upward or downward trend. When employing\
    \ this strategy, traders do not focus on the comparative performance of different\
    \ assets against each other, as in a momentum strategy. Rather, their interest\
    \ lies in identifying and capitalizing on established price trends of individual\
    \ assets. The underlying assumption for this strategy is that the identified asset\
    \ prices that have been rising or falling steadily over a period will continue\
    \ to move in the same direction. So, a trader would go long when an asset shows\
    \ an upward trend and go short when it’s on a downward trend. The action is to\
    \ “ride the wave” as long as the trend continues. The “trendiness” of the market\
    \ completely determines the trading decisions of the strategy.\n\nIn summary,\
    \ while both strategies aim to exploit market momentum, the trend-following strategy\
    \ involves time series analysis that relies on the absolute momentum in historical\
    \ prices of the same asset, and the momentum trading strategy involves cross-sectional\
    \ analysis that relies on the relative momentum across multiple assets. Thus,\
    \ these two strategies are fundamentally different from each other.\n\nThe next\
    \ section introduces implementing the momentum trading strategy using Python.\n\
    \n## Implementing the Momentum Trading Strategy\n\nThe Dow Jones Industrial Average\
    \ (DJIA), often referred to simply as “the Dow,” is a popular equity index that\
    \ comprises 30 major publicly owned companies based in the United States and covering\
    \ diverse industries. The variety of sectors represented makes it a useful gauge\
    \ for assessing the general trends and performance of the market. However, it\
    \ is considered a relatively small pool size, as compared to other broader indices\
    \ like the `S&P 500`, which comprises 500 of the largest publicly traded companies\
    \ in the United States, making it a more accurate reflection of the market dynamics.\n\
    \nFor the purpose of this section, we’ll employ a momentum trading strategy with\
    \ the DJIA constituents as our reference universe. This will involve analyzing\
    \ their respective price trends and performance relative to each other over a\
    \ specified period in order to identify potential investment opportunities. Our\
    \ strategy will seek to capitalize on the continuing momentum of outperforming\
    \ stocks while shorting those with poor performance, with the expectation that\
    \ these trends will persist over the near to medium term. In other words, we are\
    \ going to make trading decisions by longing top performers and shorting bottom\
    \ performers of the 30 constituent stocks.\n\nTo start, we need to obtain the\
    \ ticker symbols of these 30 stocks."
  raw: '### More on Trend Following


    The trend-following strategy fundamentally differs from the momentum trading strategy
    in terms of its approach and trading frequency. Trend following is a time series–based
    strategy that employs moving averages over different lookback periods, one shorter
    and one longer, to generate the trading signals.


    As depicted in Figure [6-2](#605529_1_En_6_Chapter.xhtml#Fig2), the trend-following
    strategy calculates two moving averages at each point in time, leveraging a longer-term
    lookback window for one and a shorter-term lookback window for the other. A trading
    signal is produced when there’s a crossover, which corresponds to a change in
    the relative position of the two moving averages from one time point to the next.
    For instance, when the short-term moving average crosses above the long-term moving
    average, it is often viewed as a bullish signal, and a bearish signal when it
    crosses below.


    ![](images/605529_1_En_6_Chapter/605529_1_En_6_Fig2_HTML.jpg)


    A line graph of price versus time. It has a fluctuating ascending curve for stock
    A and a vertical bar. The bar presents that the trading interval is not fixed
    and is purely data-driven. It also indicates longer and shorter lookback windows
    above and below the curve.


    Figure 6-2


    Characterizing the trend-following strategy for a single stock


    Contrary to the momentum trading strategy, which mandates regular trading based
    on a predefined lookahead window, the trend-following strategy operates without
    a set trading frequency. Rather, it’s driven entirely by the data at hand. Trading
    actions are informed by the moving averages’ interactions, leading to potentially
    less frequent but more strategically timed trades. Such a mechanism makes the
    trend-following strategy more flexible as it adapts to the market’s movements.


    Note that in a trend-following strategy, the primary concern is whether an asset
    is on an upward or downward trend. When employing this strategy, traders do not
    focus on the comparative performance of different assets against each other, as
    in a momentum strategy. Rather, their interest lies in identifying and capitalizing
    on established price trends of individual assets. The underlying assumption for
    this strategy is that the identified asset prices that have been rising or falling
    steadily over a period will continue to move in the same direction. So, a trader
    would go long when an asset shows an upward trend and go short when it’s on a
    downward trend. The action is to “ride the wave” as long as the trend continues.
    The “trendiness” of the market completely determines the trading decisions of
    the strategy.


    In summary, while both strategies aim to exploit market momentum, the trend-following
    strategy involves time series analysis that relies on the absolute momentum in
    historical prices of the same asset, and the momentum trading strategy involves
    cross-sectional analysis that relies on the relative momentum across multiple
    assets. Thus, these two strategies are fundamentally different from each other.


    The next section introduces implementing the momentum trading strategy using Python.


    ## Implementing the Momentum Trading Strategy


    The Dow Jones Industrial Average (DJIA), often referred to simply as “the Dow,”
    is a popular equity index that comprises 30 major publicly owned companies based
    in the United States and covering diverse industries. The variety of sectors represented
    makes it a useful gauge for assessing the general trends and performance of the
    market. However, it is considered a relatively small pool size, as compared to
    other broader indices like the S&P 500, which comprises 500 of the largest publicly
    traded companies in the United States, making it a more accurate reflection of
    the market dynamics.


    For the purpose of this section, we’ll employ a momentum trading strategy with
    the DJIA constituents as our reference universe. This will involve analyzing their
    respective price trends and performance relative to each other over a specified
    period in order to identify potential investment opportunities. Our strategy will
    seek to capitalize on the continuing momentum of outperforming stocks while shorting
    those with poor performance, with the expectation that these trends will persist
    over the near to medium term. In other words, we are going to make trading decisions
    by longing top performers and shorting bottom performers of the 30 constituent
    stocks.


    To start, we need to obtain the ticker symbols of these 30 stocks.'
  trans: "\n### 趋势跟踪策略详解\n\n趋势跟踪策略与动量交易策略在操作方式和交易频率上存在根本差异。趋势跟踪是一种基于时间序列的策略，它利用不同回溯周期（一个较短、一个较长）的移动平均线来生成交易信号。\n\
    \n如图 6-2 所示，趋势跟踪策略在每个时间点计算两条移动平均线，其中一条采用较长回溯窗口，另一条采用较短回溯窗口。当两条移动平均线发生交叉，即它们的相对位置从一个时间点变化到下一个时间点时，就会产生交易信号。例如，当短期移动平均线上穿长期移动平均线时，通常被视为**看涨**信号；而当它下穿时，则为**看跌**信号。\n\
    \n![](img/605529_1_En_6_Fig2_HTML.jpg)\n\n一张价格与时间的折线图。图中显示股票 A 呈波动上升曲线，并带有一条垂直柱线。该柱线表示交易间隔并非固定，而是完全由数据驱动。同时，该图在曲线上方和下方分别标注了较长和较短的回溯窗口。\n\
    \n**图 6-2**  \n单一股票趋势跟踪策略的特征描述\n\n与动量交易策略（要求基于预定义的前瞻窗口进行定期交易）不同，趋势跟踪策略没有固定的交易频率设置。相反，它完全由当前数据驱动。交易操作依据移动平均线的相互作用做出，因此交易频率可能更低，但时机更具策略性。这种机制使趋势跟踪策略能够根据市场走势灵活调整，适应性更佳。\n\
    \n需要注意的是，在趋势跟踪策略中，核心关注点是某项资产是否处于上升或下降趋势。采用该策略时，交易者不会像动量策略那样关注不同资产之间的相对表现，而是侧重于识别并利用单个资产已形成的价格趋势。该策略的基本假设是：那些在一段时间内持续上涨或下跌的资产价格，将继续保持相同方向的运动。因此，当资产呈现上升趋势时，交易者会做多；当呈现下降趋势时，则会做空。其操作原则是，只要趋势持续，就“顺势而为”。市场的“趋势性”完全决定了该策略的交易决策。\n\
    \n总之，尽管这两种策略都旨在利用市场动量，但趋势跟踪策略依赖于对同一资产历史价格中绝对动量的时间序列分析，而动量交易策略则依赖于对多种资产间相对动量的横截面分析。因此，这两者从根本上存在差异。\n\
    \n下一节将介绍如何使用 Python 实现动量交易策略。\n\n## 实现动量交易策略\n\n道琼斯工业平均指数（DJIA，常简称为“道指”）是一个广受欢迎的股票指数，由\
    \ 30 家总部位于美国、覆盖多个行业的大型上市公司组成。其代表的多行业特性使其成为评估市场整体趋势和表现的有效指标。然而，与其他更广泛的指数（如包含美国\
    \ 500 家最大上市公司的`S&P 500`，后者能更准确地反映市场动态）相比，道指的样本池被认为相对较小。\n\n在本节中，我们将以道琼斯工业平均指数的成分股作为参考范围，采用动量交易策略。这将涉及分析这些股票在指定时间段内的各自价格趋势以及彼此之间的相对表现，以识别潜在的投资机会。我们的策略将寻求从表现优异股票的持续动量中获利，同时做空表现不佳的股票，并预期这些趋势在短期至中期内将持续。换言之，我们将通过对\
    \ 30 只成分股中表现最佳的股票做多、对表现最差的股票做空来做出交易决策。\n\n首先，我们需要获取这 30 只股票的股票代码。\n"
- fmt: '### 获取道琼斯指数股票代码


    维基百科页面提供了这些股票的列表，网址为 [`https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average`](https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average)。我们不会手动将这些代码复制粘贴到编码控制台中，而是利用一个名为
    `Beautiful Soup` 的网页抓取包。这是一个广泛用于解析 HTML 和 XML 文档的 Python 包。我们将使用该包创建解析树，并从特定的
    HTML 页面中提取数据。


    首先，如清单 [6-1](#605529_1_En_6_Chapter.xhtml#PC1) 所示，我们导入以下包：其中 `bs4` 是 Beautiful
    Soup 包，`requests` 包用于发送 HTTP 请求，而 `yfinance` 用于在获取股票代码后下载财务数据。


    ```

    import pandas as pd

    import requests

    from bs4 import BeautifulSoup

    import os

    import numpy as np

    import pandas as pd

    import yfinance as yf

    Listing 6-1

    Importing relevant packages

    ```


    接下来，我们编写一个名为 `fetch_info()` 的函数来完成抓取任务。如清单 [6-2](#605529_1_En_6_Chapter.xhtml#PC2)
    所示，我们首先将网页链接赋值给 `url` 变量，并将头部信息存储在 `headers` 变量中。头部信息是访问网站时必需的元数据。然后，我们通过 `requests.get()`
    方法发送一个 GET 请求，从指定的网页链接获取信息，并使用 `BeautifulSoup()` 从抓取到的 HTML 文件中提取并解析数据，存储在 `soup`
    变量中。接着，我们可以通过将特定的节点名称（此处为 `table`）传递给 `find_all()` 函数来定位数据，使用 Pandas 的 `read_html()`
    函数将 HTML 数据读取为 DataFrame 格式，并在返回 DataFrame 对象之前删除不必要的列（`Notes` 列）。最后，如果抓取失败，函数将通过
    `try-except` 控制语句打印错误信息。


    ```

    def fetch_info():

    try:

    url = "https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average"

    headers = {

    ''User-Agent'': ''Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:101.0) Gecko/20100101
    Firefox/101.0'',

    ''Accept'': ''application/json'',

    ''Accept-Language'': ''en-US,en;q=0.5'',

    }

    #  Send GET request

    response = requests.get(url, headers=headers)

    soup = BeautifulSoup(response.content, "html.parser")

    #  Get the symbols table

    tables = soup.find_all(''table'')

    #  #  Convert table to dataframe

    df = pd.read_html(str(tables))[1]

    #  Cleanup

    df.drop(columns=[''Notes''], inplace=True)

    return df

    except:

    print(''Error loading data'')

    return None

    Listing 6-2

    Fetching relevant information from the web page

    ```


    现在，让我们调用该函数，将结果存储在 `dji_df` 中，并输出前五行，如下所示：


    ```

    # get DJI components (ticker symbols)

    dji_df = fetch_info()

    >>> dji_df.head()

    Company           Exchange  Symbol  Industry                Date added    Index
    weighting

    0  3M                NYSE      MMM     Conglomerate            1976-08-09    2.41%

    1  American Express  NYSE      AXP     Financial services      1982-08-30    3.02%

    2  Amgen             NASDAQ    AMGN    Biopharmaceutical       2020-08-31    5.48%

    3  Apple             NASDAQ    AAPL    Information technology  2015-03-19    2.84%

    4  Boeing            NYSE      BA      Aerospace and defense   1987-03-12    3.36%

    ```


    然后，我们可以提取 `Symbol` 列的值，并将其转换为列表格式：


    ```

    tickers = dji_df.Symbol.values.tolist()

    ```


    拥有了道琼斯指数股票代码后，我们现在可以使用 `yfinance` 包下载这些股票代码对应的股票价格。


    ### 下载股票价格


    调用 `download()` 函数时需要指定三个输入参数：股票代码、开始日期和结束日期。在此例中，我们将开始日期设置为 `2021-01-01`，结束日期设置为
    `2022-09-01`，如清单 [6-3](#605529_1_En_6_Chapter.xhtml#PC5) 所示。


    ```

    start_date = "2021-01-01"

    end_date = "2022-09-01"

    df = yf.download(tickers, start=start_date, end=end_date)

    Listing 6-3

    Downloading the daily stock prices of DJI tickers

    ```


    我们将重点关注后续分析所需的调整后收盘价：


    ```

    # use the adjusted closing prices for follow-up analysis

    df = df[''Adj Close'']

    ```


    至此，我们已经存储了道指 30 只成分股的股票价格，其中每列代表一只股票代码，每行代表一个相应的交易日。DataFrame 的索引遵循日期时间格式。


    接下来，我们将日度股票价格转换为月度收益率。'
  raw: '### Obtaining DJI Stock Symbols


    The Wikipedia page provides a list of these stocks at [`https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average`](https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average).
    Instead of manually copying and pasting these symbols to our coding console, we
    are going to leverage a web scraping package called Beautiful Soup, a widely used
    Python package for parsing HTML and XML documents. We will use this package to
    create a parse tree and extract data from the specific HTML page.


    First, as shown in Listing [6-1](#605529_1_En_6_Chapter.xhtml#PC1), we import
    the following packages, where the `bs4` is the Beautiful Soup package, the `requests`
    package to send HTTP requests, and `yfinance` is used to download the financial
    data once the ticker symbols are obtained.


    ```

    import pandas as pd

    import requests

    from bs4 import BeautifulSoup

    import os

    import numpy as np

    import pandas as pd

    import yfinance as yf

    Listing 6-1

    Importing relevant packages

    ```


    Next, we write a function called `fetch_info()` to complete the scraping task.
    As shown in Listing [6-2](#605529_1_En_6_Chapter.xhtml#PC2), we first assign the
    web link to the `url` variable and store the header details in the `headers` variable.
    The headers are necessary metadata upon visiting a website. We then send a GET
    request to obtain information from the specified web link via the `requests.get()`
    method and pull and parse the data out of the scraped HTML file using `BeautifulSoup()`,
    stored in the `soup` variable. We can then find the meat in the soup by passing
    the specific node name (`table` in this case) to the `find_all()` function, read
    the HTML data into a DataFrame format using the `read_html()` function from Pandas,
    and drop the unnecessary column (the `Notes` column) before returning the DataFrame
    object. Finally, if the scraping fails, the function will print out an error message
    via a `try-except` control statement.


    ```

    def fetch_info():

    try:

    url = "https://en.wikipedia.org/wiki/Dow_Jones_Industrial_Average"

    headers = {

    ''User-Agent'': ''Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:101.0) Gecko/20100101
    Firefox/101.0'',

    ''Accept'': ''application/json'',

    ''Accept-Language'': ''en-US,en;q=0.5'',

    }

    #  Send GET request

    response = requests.get(url, headers=headers)

    soup = BeautifulSoup(response.content, "html.parser")

    #  Get the symbols table

    tables = soup.find_all(''table'')

    #  #  Convert table to dataframe

    df = pd.read_html(str(tables))[1]

    #  Cleanup

    df.drop(columns=[''Notes''], inplace=True)

    return df

    except:

    print(''Error loading data'')

    return None

    Listing 6-2

    Fetching relevant information from the web page

    ```


    Now let us call the function to store the result in `dji_df` and output the first
    five rows, as shown in the following:


    ```

    # get DJI components (ticker symbols)

    dji_df = fetch_info()

    >>> dji_df.head()

    Company           Exchange  Symbol  Industry                Date added    Index
    weighting

    0  3M                NYSE      MMM     Conglomerate            1976-08-09    2.41%

    1  American Express  NYSE      AXP     Financial services      1982-08-30    3.02%

    2  Amgen             NASDAQ    AMGN    Biopharmaceutical       2020-08-31    5.48%

    3  Apple             NASDAQ    AAPL    Information technology  2015-03-19    2.84%

    4  Boeing            NYSE      BA      Aerospace and defense   1987-03-12    3.36%

    ```


    We can then take the `Symbol` column, extract the values, and convert it to a
    list format:


    ```

    tickers = dji_df.Symbol.values.tolist()

    ```


    With the DJI tickers available, we can now download the stock prices for these
    ticker symbols using the `yfinance` package.


    ### Downloading Stock Prices


    There are three input arguments to be specified to call the `download()` function:
    the ticker symbols, the start date, and the end date. In this case, we set the
    start date as 2021-01-01 and the end date as 2022-09-01, as shown in Listing [6-3](#605529_1_En_6_Chapter.xhtml#PC5).


    ```

    start_date = "2021-01-01"

    end_date = "2022-09-01"

    df = yf.download(tickers, start=start_date, end=end_date)

    Listing 6-3

    Downloading the daily stock prices of DJI tickers

