    由于买卖双方的每个档位均由一个价格-交易量对组成，已知前四个条目中：`0.2615` 为卖一价，`0.00353` 为该卖一价位的交易量；`0.2606`
    为买一价，`0.00326` 为该买一价位的交易量。每两个条目构成一个价格-交易量对，每个价格档位对应两个连续的对。我们共有 10 个价格档位，对应 20
    个价格-交易量对，其中买方 10 个，卖方 10 个。此外，我们知道卖方价格档位始终高于买方价格档位，快速验证即可确认这一点。


