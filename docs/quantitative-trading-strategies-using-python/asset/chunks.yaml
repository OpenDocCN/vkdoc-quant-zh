    \n![](img/605529_1_En_2_Fig4_HTML.jpg)\n\n一张 10 个价位相对于时间快照索引的多线图展示了 2 组曲线。这些曲线以不规则的阶梯趋势递增，并且彼此不相交。第一组曲线起始于\
    \ 0.258 到 0.261 之间，第二组曲线起始于 0.2618 到 0.264 之间。\n\n**图 2-4** 可视化前 50 个时间快照中买卖双方的\
    \ 10 条价格曲线。每条曲线代表特定价位的价格演变，并且彼此不会相交。中间的巨大间隙展示了限价订单簿的买卖价差\n\n请注意，该图表是交互式的，提供了基于\
    \ `plotly` 库的一套常用的灵活控制功能（例如缩放、通过选择进行高亮显示以及悬停时显示附加数据）。\n\n我们也可以将成交量数据绘制成堆叠条形图。以下代码片段检索前\
    \ 5 个快照的成交量数据，并将这 20 个级别的成交量绘制为堆叠条形：\n\n```\npx.bar(dfVolumnes.head(5).transpose(),\
    \ orientation='h')\n```\n\n运行此代码将生成图 2-5。\n\n![](img/605529_1_En_2_Fig5_HTML.jpg)\n\
    \n一张水平堆叠条形图，显示 20 个价位在 5 个变量（0、1、2、3、4）下的指数与数值的关系。对于变量 4，其在索引 18 处的值为 0.00311。索引\
    \ 8 具有最长长度，其次是 7 和 9。\n\n**图 2-5** 以条形图形式绘制所有 20 个价位的成交量前 5 个快照\n\n让我们针对特定时间快照，绘制每个价位的成交量。我们可以使用\
    \ `iloc()` 函数基于位置索引访问特定部分。例如，以下代码打印出 `dfPrices` 的第一行：\n\n```\n>>> dfPrices.iloc[0]\n\
    1     0.2579\n2     0.2588\n3     0.2591\n4     0.2593\n5     0.2595\n6     0.2599\n\
