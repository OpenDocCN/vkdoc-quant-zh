    If the risk-free rate increases, what would happen to the Sharpe ratio, all else
    being equal?


    *   If a strategy has a positive average return but a high max drawdown, what
    might this suggest about the risk of the strategy?


    # 8. Statistical Arbitrage with Hypothesis Testing


    Statistical arbitrage is a market-neutral trading strategy leveraging statistical
    methods to identify and exploit significant relationships between financial assets.
    Through hypothesis testing, it discerns pricing discrepancies within correlated
    asset pairs due to temporary market inefficiencies. By purchasing underpriced
    and selling overpriced assets, the strategy ensures profit as the market corrects
    these inefficiencies, regardless of overall market movements.'
