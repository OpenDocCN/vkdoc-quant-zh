  trans: '

    ### 可交易资产的分组


    资产类别是指具有相似风险和收益基本特征的投资工具集合。主要有四大资产类别：股票、固定收益工具、现金及等价物，以及另类投资（被定义为不属于前几类投资范畴的金融资产）。图
    1-3 展示了这四大类投资证券。


    ![](img/605529_1_En_1_Fig3_HTML.jpg)


    一张图表将常见资产分为 4 类。股票包括个股。固定收益工具包括债券和年金。现金及等价物包括现金、银行存款、美国国库券、货币市场基金以及基金。另类投资包含 8
    个组成部分。


    图 1-3

    将常见的投资资产归类为四大类别


    此外，我们也可以根据期限类型来对可交易资产进行分组。股票、货币和大宗商品属于无期限的资产类别，而固定收益工具和衍生品则具有期限。对于像期货合约这样有到期日的普通证券，可以基于*无套利*原理计算其公允价值——这是我们在第
    3 章将要讨论的话题。


    我们还可以根据某些衍生工具到期时收益函数的线性特征来对资产进行分组。例如，期货合约允许买方/卖方在到期时以约定价格买入/卖出标的资产。假设到期日标的（股票）价格为
    `S[T]`，约定价格为 `K`。当买方做多/买入一份以期价格 `K` 购买股票的期货合约时，如果 `S[T] >= K`（以较低价格买入股票），买方将获利
    `S[T] - K`；如果 `S[T] < K`（以较高价格买入股票），则将亏损 `K - S[T]`。对期货合约的做空/卖出情况也可做类似分析。两者的函数关系在行权时均与标的资产价格呈线性关系。关于线性收益函数的图示，请参见图
    1-4。


    ![](img/605529_1_En_1_Fig4_HTML.jpg)


    两张收益与 S T 关系的线性图。1. 图中有一条线性上升的线表示 S T 减 K。该线与 x 轴相交于点 K。2. 图中有一条线性下降的线表示 K 减 S
    T。该线与 x 轴相交于点 K。


    图 1-4

    对期货合约做多或做空的线性收益函数图示


    其他具有线性收益函数的衍生品包括远期合约和掉期合约。由于其价格是标的资产的线性函数，这些产品很容易定价。我们可以独立于标的资产价格的数学模型来对这些工具进行定价。换言之，我们只需要标的资产的价格，而无需围绕该资产的数学模型。因此，这些资产适用**模型无关定价**。


    让我们来看期权合约的非线性收益函数。看涨期权赋予买方在到期日 `T`（此时标的资产价格为 `S[T]`）以执行价 `K` 购买标的资产的选择权，而看跌期权则将这一选择权变为以执行价
    `K` 卖出标的资产。在这两种情况下，买方可以选择不行使期权，因此不会获得任何利润。鉴于投资者既可以做多也可以做空看涨或看跌期权，参与期权合约共有四种组合，如下所列：


    -   **买入看涨期权**：买入一份看涨期权，以获得在到期日以预先指定的执行价购买标的资产的机会。

    -   **卖出看涨期权**：卖出一份看涨期权，赋予买方在到期日以预先指定的执行价购买标的资产的机会。

    -   **买入看跌期权**：买入一份看跌期权，以获得在到期日以预先指定的执行价卖出标的资产的机会。

    -   **卖出看跌期权**：卖出一份看跌期权，赋予买方在到期日以预先指定的执行价卖出标的资产的机会。


    图 1-5 包含了这四种不同组合的收益函数，它们都是标的资产价格 `S[T]` 的非线性函数。


    ![](img/605529_1_En_1_Fig5_HTML.jpg)


    4 张收益与 S T 关系的线性图。1 和 2. 买入看涨期权和卖出看涨期权的图形在达到 K 之前水平延伸，随后分别线性上升和下降。3 和 4. 买入看跌期权和卖出看跌期权的图形在达到
    K 之前分别线性下降和上升，随后水平延伸。


    图 1-5

    期权合约中的四种非线性收益函数类型


    需要注意的是，同一资产类别内的可交易工具表现出相似的特征，但在某些方面会有所不同。遵循各自价格动态的可交易工具，其市场表现也会不同。


    我们还可以根据一项可交易资产属于**现货市场**还是**衍生品市场**来对其进行分组。现货市场，也称为即期市场，是一个交易工具在销售时点进行交换的市场，买方立即取得交易产品的所有权。例如，股票交易所属于现货市场，因为投资者几乎在支付现金的同时立即获得股票份额，从而完成即时交割。


    另一方面，衍生品市场只在未来预先指定的日期才完成交易。以期货市场为例，为获得接收货物权利而付款的买方，只能预期在预先指定的未来日期收到交割。


    下一节将介绍常见的交易途径和步骤。

    '
- fmt: '### Common Trading Avenues and Steps


    As mentioned earlier, investors engage in trading activities for the purpose of
    profit-making or risk management. When the purpose is to invest and make profits,
    the next sequence of actions is to observe and analyze the market and act upon
    the trading signals. For example, if investors use predictive methods to predict
    when the market will go up or down, they can initiate trades to turn the market
    into profits and make short, instant wins. Such activity is referred to as *market
    timing*, where an investor enters or exits a position or *rebalances a portfolio*
    (moving money between assets) based on predicted market movement in the near future.
    This is opposite to the *buy-and-hold* strategy, where an investor purchases trading
    instruments and holds them for a long period, irrespective of the market’s volatility
    (ups and downs).


    When engaging in trading activity, it is important to understand the short-term
    and long-term seasonality effect for a particular tradable asset. Take stock trading,
    for example. Short-term swings in stock prices tend to occur when the market opens
    and closes, falling under the regular trading hours of major stock exchanges and
    forming the opening and closing prices of the particular day. In the longer term,
    trading activities at the end of the year tend to be quieter than other periods
    of the particular year.


    Trading activities can happen at one of the following four avenues:


    - Regulated exchanges, such as the New York Stock Exchange (NYSE) and NASDAQ

    - Dark pools, private exchanges that are less regulated

    - Brokered market, where transactions between the buyer and the seller are performed
    via middlemen called brokers (or agents, intermediaries)

    - Over-the-counter (OTC) market, a decentralized market that allows direct transactions
    between buyers and sellers


    Let us look at the anatomy of a trade. There are four usual steps involved when
    performing a trade:


    - **Acquisition of information and quotes**: Before engaging in a trade, it is
    important to access quality information about the asset and gain transparency
    in many tangible and intangible factors such as supply and demand, the risk attitude
    of investors, and the overall economic and geopolitical environment. Information
    on the market structure, liquidity, and information flow eventually determine
    the price discovery of the tradable asset.

    - **Routing of order**, such as selecting the broker(s) to handle the trade(s)
    or deciding which market(s) to transmit and execute the trade(s).

    - **Execution of order**, matching and executing the trading orders between buyers
    and sellers according to the rules of the particular market.

    - **Confirmation, clearance, and settlement**: This happens at the end of executing
    a trading order. Clearance is the recording and comparison of trade records, and
    settlement involves the actual delivery of the security and its payment.


    In the next section, we will look at different market structures.


    ### Market Structures


    Before 2010, *open outcry* was a popular way to communicate trade orders in trading
    pits (floor). Traders would tap into temporary information asymmetry and use verbal
    communication and hand signals to perform trading activities at stock, option,
    and futures exchanges. Traders would arrange their trades face to face on the
    exchange’s trading floor, cry out bids and offers to offer liquidity, and listen
    for bids and offers to take liquidity. The open outcry rule is that traders must
    announce their bids and offers so that other traders may react to them, avoiding
    whispering among a small group of traders. They must also publicly announce that
    they accept bids (assets sold) or offers (assets taken) of particular trades.
    The largest pit was the US long-term treasury bond futures market, with over 500
    floor traders under the *Chicago Board of Trade (CBOT)*, a major market maker
    that later merged into the CMT Group.


    As technology advanced, the trading markets moved from physical to electronic,
    shaping a fully automated exchange. First proposed by Fischer Black in 1971, the
    fully automated exchange was also called *program trading*, which encompasses
    a wide range of portfolio trading strategies.


    The trading rules and systems together define a trading market’s market structure.
    One type of market is called the *call market*, where trades are allowed only
    when the market is called. The other type of market is the *continuous market*,
    where trades are allowed anytime during regular trading hours. Big exchanges such
    as NYSE, LSE (London Stock Exchange), and SGX (Singapore Exchange) allow a hybrid
    mode of market structure.


    The market structure can also be categorized based on the nature of pricing among
    the tradable assets. When the prices are determined based on the bid (buy) and
    ask (sell) quotations from market makers or dealers, it is called a *quote-driven*
    or *price-driven market*. The trades are determined by dealers and market makers
    who participate in every trade and match orders from their inventory. Typical
    assets in a quote-driven market include bonds, currencies, and commodities.


    On the other hand, when the trades are based on the buyers’ and sellers’ requirements,
    it is called an *order-driven market* where the bid and ask prices, along with
    the number of shares desired, are put on display. Typical assets in an order-driven
    market include stock markets, futures exchanges, and electronic communications
    networks (ECNs). There are two basic types of orders: *market orders*, based on
    the asset’s market price, and *limit orders*, where the assets are only traded
    based on the preset limit price.


    Let us look at a few major types of buy-side stock investors.


    ### Major Types of Buy-Side Stock Investors


    Buy-side investors include institutional (account for the majority) and retail
    investors. Here, buy-side activities include purchasing stocks, bonds, or other
    financial securities based on the specific requirements and strategies of the
    institution’s or client’s portfolio. The buy side is a segment of financial markets
    made up of investing institutions and retail investors that purchase financial
    products for money-management purposes.


    Typical buy-side institutional investors include


    - Mutual fund

    - Passive exchange-traded fund (ETF)

    - Pension fund

    - Sovereign wealth fund

    - Hedge fund

    - Insurance company

    - Bank

    - Corporate nominee


    Typical buy-side retail investors include


    - Start-up investor

    - Family business

    - Household/individual


    The next section introduces the concept of market making.


    ### Market Making


    Market maker refers to a firm or an individual that actively quotes the two-sided
    markets (buy side and sell side) of a particular security. The market maker provides
    *bids*, meaning the particular price of the security along with the quantity it
    is willing to buy. It also provides *offers* (*asks*), meaning the price of the
    security and the quantity it is willing to sell. Naturally, the asking price is
    supposed to be higher than the bid price, so that the market maker can make a
    profit based on the *spread* of the two quote prices.


    Market makers post quotes and stand ready to trade, thereby providing immediacy
    and *liquidity* to the market. By quoting bid and ask prices, market makers make
    the assets more liquid for potential buyers and short sellers.


    A market maker also takes a significant risk of holding the assets because a security’s
    value may decline between its purchase and sale to another buyer. They need capital
    to finance their inventories. The capital available to them thus limits their
    ability to offer liquidity. Because market making is very risky, investors generally
    dislike investing in market-making operations. Market-making firms with significant
    external financing typically have excellent risk management systems that prevent
    their dealers from generating large losses.


    The next section introduces the concept of scalping.'
  raw: '### Common Trading Avenues and Steps


    As mentioned earlier, investors engage in trading activities for the purpose of
    profit-making or risk management. When the purpose is to invest and make profits,
    the next sequence of actions is to observe and analyze the market and act upon
    the trading signals. For example, if investors use predictive methods to predict
    when the market will go up or down, they can initiate trades to turn the market
    into profits and make short, instant wins. Such activity is referred to as *market
    timing*, where an investor enters or exits a position or *rebalances a portfolio*
    (moving money between assets) based on predicted market movement in the near future.
    This is opposite to the *buy-and-hold* strategy, where an investor purchases trading
    instruments and holds them for a long period, irrespective of the market’s volatility
    (ups and downs).


    When engaging in trading activity, it is important to understand the short-term
    and long-term seasonality effect for a particular tradable asset. Take stock trading,
    for example. Short-term swings in stock prices tend to occur when the market opens
    and closes, falling under the regular trading hours of major stock exchanges and
    forming the opening and closing prices of the particular day. In the longer term,
    trading activities at the end of the year tend to be quieter than other periods
    of the particular year.


    Trading activities can happen at one of the following four avenues:


    *   Regulated exchanges, such as the New York Stock Exchange (NYSE) and NASDAQ


    *   Dark pools, private exchanges that are less regulated


    *   Brokered market, where transactions between the buyer and the seller are performed
    via middlemen called brokers (or agents, intermediaries)


    *   Over-the-counter (OTC) market, a decentralized market that allows direct transactions
    between buyers and sellers


    Let us look at the anatomy of a trade. There are four usual steps involved when
    performing a trade:


    *   Acquisition of information and quotes: Before engaging in a trade, it is important
    to access quality information about the asset and gain transparency in many tangible
    and intangible factors such as supply and demand, the risk attitude of investors,
    and the overall economic and geopolitical environment. Information on the market
    structure, liquidity, and information flow eventually determine the price discovery
    of the tradable asset.


    *   Routing of order, such as selecting the broker(s) to handle the trade(s) or
    deciding which market(s) to transmit and execute the trade(s).


    *   Execution of order, matching and executing the trading orders between buyers
    and sellers according to the rules of the particular market.


    *   Confirmation, clearance, and settlement: This happens at the end of executing
    a trading order. Clearance is the recording and comparison of trade records, and
    settlement involves the actual delivery of the security and its payment.


    In the next section, we will look at different market structures.


    ### Market Structures


    Before 2010, *open outcry* was a popular way to communicate trade orders in trading
    pits (floor). Traders would tap into temporary information asymmetry and use verbal
    communication and hand signals to perform trading activities at stock, option,
    and futures exchanges. Traders would arrange their trades face to face on the
    exchange’s trading floor, cry out bids and offers to offer liquidity, and listen
    for bids and offers to take liquidity. The open outcry rule is that traders must
    announce their bids and offers so that other traders may react to them, avoiding
    whispering among a small group of traders. They must also publicly announce that
    they accept bids (assets sold) or offers (assets taken) of particular trades.
    The largest pit was the US long-term treasury bond futures market, with over 500
    floor traders under the *Chicago Board of Trade (CBOT)*, a major market maker
    that later merged into the CMT Group.


    As technology advanced, the trading markets moved from physical to electronic,
    shaping a fully automated exchange. First proposed by Fischer Black in 1971, the
    fully automated exchange was also called *program trading*, which encompasses
    a wide range of portfolio trading strategies.


    The trading rules and systems together define a trading market’s market structure.
    One type of market is called the *call market*, where trades are allowed only
    when the market is called. The other type of market is the *continuous market*,
    where trades are allowed anytime during regular trading hours. Big exchanges such
    as NYSE, LSE (London Stock Exchange), and SGX (Singapore Exchange) allow a hybrid
    mode of market structure.


    The market structure can also be categorized based on the nature of pricing among
    the tradable assets. When the prices are determined based on the bid (buy) and
    ask (sell) quotations from market makers or dealers, it is called a *quote-driven*
    or *price-driven market*. The trades are determined by dealers and market makers
    who participate in every trade and match orders from their inventory. Typical
    assets in a quote-driven market include bonds, currencies, and commodities.


    On the other hand, when the trades are based on the buyers’ and sellers’ requirements,
    it is called an *order-driven market* where the bid and ask prices, along with
    the number of shares desired, are put on display. Typical assets in an order-driven
    market include stock markets, futures exchanges, and electronic communications
    networks (ECNs). There are two basic types of orders: *market orders*, based on
    the asset’s market price, and *limit orders*, where the assets are only traded
    based on the preset limit price.


    Let us look at a few major types of buy-side stock investors.


    ### Major Types of Buy-Side Stock Investors


    Buy-side investors include institutional (account for the majority) and retail
    investors. Here, buy-side activities include purchasing stocks, bonds, or other
    financial securities based on the specific requirements and strategies of the
    institution’s or client’s portfolio. The buy side is a segment of financial markets
    made up of investing institutions and retail investors that purchase financial
    products for money-management purposes.


    Typical buy-side institutional investors include


    *   Mutual fund


    *   Passive exchange-traded fund (ETF)


    *   Pension fund


    *   Sovereign wealth fund


    *   Hedge fund


    *   Insurance company


    *   Bank


    *   Corporate nominee


    Typical buy-side retail investors include


    *   Start-up investor


    *   Family business


    *   Household/individual


    The next section introduces the concept of market making.


    ### Market Making


    Market maker refers to a firm or an individual that actively quotes the two-sided
    markets (buy side and sell side) of a particular security. The market maker provides
    *bids*, meaning the particular price of the security along with the quantity it
    is willing to buy. It also provides *offers* (*asks*), meaning the price of the
    security and the quantity it is willing to sell. Naturally, the asking price is
    supposed to be higher than the bid price, so that the market maker can make a
    profit based on the *spread* of the two quote prices.


    Market makers post quotes and stand ready to trade, thereby providing immediacy
    and *liquidity* to the market. By quoting bid and ask prices, market makers make
    the assets more liquid for potential buyers and short sellers.


    A market maker also takes a significant risk of holding the assets because a security’s
    value may decline between its purchase and sale to another buyer. They need capital
    to finance their inventories. The capital available to them thus limits their
    ability to offer liquidity. Because market making is very risky, investors generally
    dislike investing in market-making operations. Market-making firms with significant
    external financing typically have excellent risk management systems that prevent
    their dealers from generating large losses.


    The next section introduces the concept of scalping.'
  trans: '

    ### 常见交易途径与步骤


    如前所述，投资者出于盈利或风险管理的目的参与交易活动。若目标是投资获利，接下来的操作便是观察分析市场，并依据交易信号采取行动。例如，投资者运用预测方法判断市场涨跌时机，便可发起交易将市场波动转化为利润，实现短线快速盈利。此类行为被称为*择时交易*，即投资者根据对近期市场走势的预测，开仓或平仓，或者*调整投资组合*（在资产之间转移资金）。这与*买入并持有*策略相反，后者指投资者购入交易工具后长期持有，无视市场的波动（涨跌）。


    进行交易活动时，理解特定可交易资产的短期与长期季节性效应至关重要。以股票交易为例，股价的短期波动往往出现在市场开盘和收盘时段，这属于主要证券交易所常规交易时间的一部分，并决定了当日的开盘价与收盘价。从长期来看，年末的交易活动通常比当年其他时期更为清淡。


    交易活动可在以下四种途径之一进行：


    - 受监管的交易所，例如纽约证券交易所和纳斯达克

    - 暗池，即监管较少的私人交易所

    - 经纪商市场，买卖双方通过被称为经纪商（或代理人、中介）的中间人进行交易

    - 场外交易市场，一个允许买卖双方直接交易的非中心化市场


    让我们来剖析一笔交易的结构。执行一笔交易通常涉及以下四个步骤：


    - **获取信息与报价**：在参与交易前，获取关于该资产的高质量信息至关重要，并需要了解诸多有形和无形因素的透明度，例如供需关系、投资者风险态度以及整体经济与地缘政治环境。市场结构、流动性和信息流等相关信息最终决定可交易资产的价格发现。

    - **订单路由**：例如选择处理交易的经纪商，或决定将交易发送至哪些市场并执行。

    - **订单执行**：根据特定市场的规则，匹配并执行买卖双方的交易订单。

    - **确认、清算与结算**：这发生在交易订单执行完毕之后。清算是对交易记录的核对与比对，结算则涉及证券的实际交付和款项支付。


    在下一节中，我们将探讨不同的市场结构。


    ### 市场结构


    在 2010 年之前，*公开喊价*是交易场内传达交易订单的一种流行方式。交易者利用暂时的信息不对称，通过口头交流和手势信号在股票、期权和期货交易所进行交易活动。交易者在交易所的交易大厅里面对面地安排交易，通过喊出买入价和卖出价来提供流动性，并倾听他人的报价以获取流动性。公开喊价的规则是，交易者必须公开宣布自己的买入和卖出报价，以便其他交易者能够对此作出反应，避免在小范围内窃窃私语。他们还必须公开宣布接受特定交易的买入报价（出售资产）或卖出报价（收购资产）。最大的交易池是美国长期国债期货市场，在*芝加哥期货交易所*旗下拥有超过
    500 名场内交易员，该交易所是后来并入 CME 集团的主要做市商。


    随着技术进步，交易市场从实体转向电子化，形成了全自动化交易所。该概念由费希尔·布莱克于 1971 年首次提出，全自动化交易所也被称为*程序化交易*，涵盖了广泛的投资组合交易策略。


    交易规则和系统共同定义了交易市场的市场结构。一种市场类型称为*集合竞价市场*，仅在市场被“叫价”时允许交易。另一种市场类型是*连续竞价市场*，在常规交易时间内任何时刻都允许交易。诸如纽约证券交易所、伦敦证券交易所和新加坡交易所等大型交易所均采用混合模式的市场结构。


    市场结构也可以根据可交易资产的定价性质进行分类。当价格基于做市商或交易商提供的买入和卖出报价来确定时，称为*报价驱动型*或*价格驱动型市场*。交易由参与每笔交易并从自己库存中匹配订单的交易商和做市商决定。报价驱动型市场的典型资产包括债券、货币和大宗商品。


    另一方面，当交易基于买方和卖方的需求进行时，称为*订单驱动型市场*，其中买入和卖出价格以及期望的股票数量会被公示。订单驱动型市场的典型资产包括股票市场、期货交易所和电子通信网络。订单主要有两种基本类型：基于资产市场价格的*市价单*，以及仅按预设限价交易的*限价单*。


    接下来，我们看看几种主要的买方股票投资者类型。


    ### 主要的买方股票投资者类型


    买方投资者包括机构投资者（占大多数）和散户投资者。这里，买方活动包括根据机构或客户投资组合的具体要求和策略购买股票、债券或其他金融证券。买方是金融市场中的一个组成部分，由为资金管理目的而购买金融产品的投资机构和散户投资者构成。


    典型的买方机构投资者包括：


    - 共同基金

    - 被动式交易所交易基金

    - 养老基金

    - 主权财富基金

    - 对冲基金

    - 保险公司

    - 银行

    - 公司名义持有人


    典型的买方散户投资者包括：


    - 初创企业投资者

    - 家族企业

    - 家庭/个人


    下一节介绍做市的概念。


    ### 做市


    做市商指一家公司或个人，他们积极地为特定证券提供双边市场（买方和卖方）的报价。做市商提供*买入价*，即其愿意买入该证券的特定价格和数量。他们也提供*卖出价*，即其愿意卖出该证券的价格和数量。通常，卖出价应高于买入价，以便做市商能通过两个报价之间的*价差*获利。


    做市商发布报价并随时准备交易，从而为市场提供即时性和*流动性*。通过报出买入和卖出价格，做市商使得资产对潜在买家及卖空者更具流动性。


    做市商还承担着持有资产的重大风险，因为证券的价值在其购买到出售给另一个买家之间可能会下跌。他们需要资金为其库存提供融资。因此，其可用资金限制了其提供流动性的能力。由于做市风险极高，投资者通常不愿投资于做市业务。拥有大量外部融资的做市公司通常拥有出色的风险管理系统，以防止其交易员产生巨额亏损。


    下一节介绍抢帽子交易的概念。

