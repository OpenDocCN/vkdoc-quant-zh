    A double line graph presents the variation of G O O G and M S F T on 5 different
    dates between January 2023 and February 2023\. The line for G O O G is more fluctuating.


    Figure 7-6


    Visualizing the wealth curves


    ```

    >>> wealth_index_df.plot.line()

    ```


    It appears that investing in Microsoft ends up with a higher portfolio value than
    in Google, despite the latter taking the lead in all of the previous trading days.
    As it turns out, one of the biggest drivers for the strong momentum behind Microsoft’s
    growth is its investment in the ChatGPT model and recent integration with its
    search engine Bing and Edge.


    With the wealth index ready, we can build a new series to indicate the cumulative
    peak wealth value for each trading day. This is achieved using the `cummax()`
    function shown in Listing [7-3](#605529_1_En_7_Chapter.xhtml#PC12).


    ```

    prior_peaks_df = wealth_index_df.cummax()

    >>> prior_peaks_df.head()

    GOOG   MSFT

    Date

    2023-01-03 1000.0 1000.0

    2023-01-04 1000.0 1000.0

    2023-01-05 1000.0 1000.0

    2023-01-06 1000.0 1000.0

    2023-01-09 1000.0 1000.0

    Listing 7-3

