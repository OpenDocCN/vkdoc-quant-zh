- fmt: '## Backtesting the Trend-Following Strategy


    In this backtesting exercise, we are going to calculate four metrics as the performance
    indicator: the annualized return and volatility, the Sharpe ratio, and the max
    drawdown. Since the trend-following strategy works on one asset only, we are going
    to backtest Google’s stock price for the year 2022 based on its adjusted closing
    price.


    First, let us download the dataset and store it in `df_goog`:


    ```

    df_goog = yf.download([''GOOG''], start="2022-01-01", end="2023-01-01")[''Adj
    Close'']

    df_goog = pd.DataFrame(df_goog)

    >>> df_goog.head()

    Adj Close

    Date

    2022-01-03 145.074493

    2022-01-04 144.416504

    2022-01-05 137.653503

    2022-01-06 137.550995

    2022-01-07 137.004501

    ```


    Now we create two moving averages, a short curve with a span of 5 using the exponential
    moving average via the `ewm()` method and a long curve with a window size of 30
    using the simple moving average via the `rolling()` method, as shown in Listing
    [7-7](#605529_1_En_7_Chapter.xhtml#PC26).


    ```

    sma_span = 30

    ema_span = 5

    short_ma = ''ema''+str(ema_span)

    long_ma =''sma''+str(sma_span)

    df_goog[long_ma] = df_goog[''Adj Close''].rolling(sma_span).mean()

    df_goog[short_ma] = df_goog[''Adj Close''].ewm(span=ema_span).mean()

    >>> df_goog.head()

    Adj Close  sma30 ema5

    Date

    2022-01-03 145.074493 NaN   145.074493

    2022-01-04 144.416504 NaN   144.679700

    2022-01-05 137.653503 NaN   141.351501

    2022-01-06 137.550995 NaN   139.772829

    2022-01-07 137.004501 NaN   138.710106

    Listing 7-7

    Calculating the short and long moving averages

    ```


    Note that the span is directly related to the *α* parameter we introduced earlier
    via the following relationship:


    ![$$ \alpha =\frac{2}{span+1} $$](images/605529_1_En_7_Chapter/605529_1_En_7_Chapter_TeX_Equa.png)


    where *span* ≥ 1.


    Since generating the trading signal requires that both moving averages are available
    at each time point, we remove the rows with any NA value in the DataFrame using
    the `dropna()` method, where we set `inplace=True` to change within the DataFrame
    directly:


    ```

    df_goog.dropna(inplace=True)

    >>> df_goog.head()

    Adj Close  sma30      ema5

    Date

    2022-02-14 135.300003 137.335750 137.064586

    2022-02-15 136.425507 137.047450 136.851559

    2022-02-16 137.487503 136.816483 137.063541

    2022-02-17 132.308502 136.638317 135.478525

    2022-02-18 130.467499 136.402200 133.808181

