    The next section introduces the trend-following strategy.'
  raw: 'Also, note that we need to ensure that the denominator (*S*[*t*] in this case)
    is not zero to avoid division by zero error. This can be handled by adding a small
    constant to the denominator when implementing the calculation in programs.


    Q8: Calculate the terminal return using the log returns. Is it equal to Q4?


    Answer: The terminal return using log returns can be calculated by summing all
    the single-period log returns, then exponentiating the result to reverse the log
    operation, and finally subtracting one to convert back to the simple return format.
    This is because log returns are time additive, meaning that the total log return
    over a given period is simply the sum of the log returns over the subperiods.


    In other words, if you have calculated log returns over several periods (say daily),
    you can get the total (terminal) log return over these periods simply by summing
    up all these daily log returns. This property simplifies the calculation of terminal
    returns over multiple periods, making it very convenient, especially for large
    datasets.


    The result shows that it is equal to the one obtained in Q4\. See Figure [5-8](#605529_1_En_5_Chapter.xhtml#Fig8)
    for an illustration.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig8_HTML.jpg)


    An Excel table for dunny stock prices. It presents the terminal return, calculated
    by using the log returns. The column headers are day, price, return 1, return
    2, return 3, and return 4\. The data in column Q 7 for all five days is highlighted.


    Figure 5-8


    Calculating the terminal return using log returns


    Q9: Discuss the advantages of using log returns.


    Answer: As mentioned, the use of logarithmic returns, or “log returns,” has several
    advantages, as detailed in the following:


    *   Ease of calculation and analysis: Log returns simplify mathematical calculations
    and statistical analyses. This simplification is particularly noticeable when
    dealing with compounded returns over multiple periods. Because logarithms convert
    multiplication and division operations into addition and subtraction, the compounded
    return (or “total return”) over multiple periods can be calculated as the simple
    sum of the log returns over those periods.


    *   Symmetry: Log returns also exhibit a desirable symmetry property. If a price
    doubles and then halves, or halves and then doubles, the total log return over
    the two periods is zero, reflecting the fact that the price is unchanged over
    the two periods. This symmetry property, which is not possessed by simple returns,
    often simplifies analyses and improves the interpretability of results.


    *   Suppose a stock price *S*[*t*] changes to *S*[*t* + 1] and then changes back
    to *S*[*t*], the resulting log returns will be symmetric around zero. For example,
    when the stock price changes from 100 on day 1 to 108 on day 2 and then back to
    100 on day 3, the resulting log returns are 7.7% on day 2 and –7.7% on day 3\.
    A simple mathematical analysis would immediately make sense of this:


    ![$$ \log \frac{S_{t+1}}{S_t}=-\log {\left(\frac{S_{t+1}}{S_t}\right)}^{-1}=-\log
    \frac{S_t}{S_{t+1}} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_Equd.png)


    *   Normality: In addition, financial models often assume that returns are normally
    distributed. However, it’s been observed that simple returns have skewness and
    excess kurtosis, implying that they deviate from normality. On the other hand,
    log returns tend to have properties closer to normality which makes them a better
    fit for these financial models.


    *   Continuously compounded returns: Log returns also represent continuously compounded
    returns. This property makes log returns the preferred choice in certain financial
    applications, especially those involving options and other derivatives, where
    continuous compounding is commonly used.


    In summary, using log returns simplifies mathematical computations and statistical
    analyses, enables symmetry and normality, and represents continuously compounded
    returns. These properties make log returns highly valuable in financial analysis
    and modeling.


    Let us look at a concrete example to understand the calculations using log returns.


    ### Analyzing Stock Prices Using Log Returns


    We first download Google’s stock price data for the first few days of 2023, as
    shown in Listing [5-1](#605529_1_En_5_Chapter.xhtml#PC1).


