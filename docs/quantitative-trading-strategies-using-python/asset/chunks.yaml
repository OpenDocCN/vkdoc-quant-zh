    \n我们还可以将前面的两个图表合并在一起，如清单 2-7 所示。\n\n```\nfig = make_subplots(rows=1, cols=2)\n\
    for i in dfPrices.columns:\n    fig.add_trace(go.Scatter(y=dfPrices.head(20)[i]),\
    \ row=1, col=1)\ntimestamp = 0\nfig.add_trace(go.Bar(\n    y= ['价格-'+'{:.4f}'.format(x)\
