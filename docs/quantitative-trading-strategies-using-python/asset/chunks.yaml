- fmt: '### Order Matching Systems


    A securities exchange needs to pair one or more unsolicited buy orders to one
    or more sell orders to make trades. This process is called matching the trading
    orders. When an investor wants to purchase a specific amount of stock, and another
    wants to sell the same quantity at the same price, the orders from both sides
    match, and a transaction takes place. The process of pairing these orders is called
    order matching, whereby exchanges identify buy orders, or bids, with corresponding
    sell orders, or asks, to pair and execute both orders.


    This order matching process has become almost entirely automated, using rule-based
    systems to execute the pair of trades if certain conditions are satisfied. Most
    exchanges, some brokerages, and almost all electronic communication networks use
    rule-based order matching systems. These trading rules arrange trades from the
    orders of specific sizes that traders submit to them, not requiring face-to-face
    negotiation. Note that these systems follow particular order precedence rules.


    Order precedence rules are a set of guidelines that dictate the priority in which
    orders are matched and executed in the market. These rules aim to ensure a fair
    and efficient order matching process by determining which orders take precedence
    over others in the queue. There are three primary order precedence rules followed
    by most trading systems: price, time, and size.


    - **Price precedence**: Orders with better prices are given priority over orders
    with worse prices. In the case of buy orders, higher bids have precedence, while
    for sell orders, lower asks are prioritized. This rule ensures that market participants
    who are willing to buy at higher prices or sell at lower prices get their orders
    executed first.

    - **Time precedence**: If two or more orders have the same price, the order that
    was placed earlier takes precedence. This rule, also known as the “first-come,
    first-served” principle, rewards traders who submit their orders earlier, ensuring
    that they are not disadvantaged by others submitting orders at the same price
    later.

    - **Size precedence**: In some markets, when multiple orders have the same price
    and time priority, the order with the larger size may be given precedence. This
    rule encourages market participants to place larger orders, which can contribute
    to enhanced liquidity in the market.


    There are three common types of orders that an electronic exchange sees: limit
    orders, market orders, and cancelation orders. Limit orders must include information
    such as the limit price, order size, and trade direction (buy or sell). Market
    orders must include the order size and trade direction. A cancelation order cancels
    a standing limit order entirely or reduces its order size.


    Note that some exchanges, such as the London Stock Exchange and the NYSE Group,
    support functionality to allow traders to specify whether their limit orders are
    to be displayed or not on the limit order book (`LOB`). This is called lit (displayed)
    or unlit (not displayed). In that case, the limit order must have at least the
    following:


    - Limit price

    - Order size

    - Trade direction

    - Display or non-display

    - If displayed, the size to be displayed


    Several common order precedence rules are considered for execution. For the order
    type precedence, market orders always rank above limit orders. For the price precedence,
    a more competitive price rule is. The display precedence takes the form of lit
    or unlit preference, and the time precedence observes the time of arrival for
    the orders.


    The rule used by most exchanges is the price/display/time precedence rule to determine
    the priority of execution. Specifically, the highest bids and lowest offers always
    execute before lower bids and higher offers. Among equally priced orders, displayed
    orders always get executed before non-displayed orders. Among displayed and non-displayed
    orders at the same price level, the time of arrival determines an order’s priority.


    The price/display/time precedence rule ensures a fair and efficient trading environment
    by prioritizing orders based on their competitiveness, visibility, and time of
    submission. By adhering to this rule, electronic exchanges can maintain a transparent
    and orderly market, encouraging market participants to submit competitive orders
    and enhancing liquidity.


    In addition to the common order types and precedence rules discussed earlier,
    many electronic exchanges also offer a variety of advanced order types and conditional
    orders designed to cater to the diverse needs of traders. These may include:


    - **Stop orders**: These are orders that are triggered once a specific price level
    is reached. Stop orders can be used to limit losses, protect profits, or enter
    a position once a particular price level is breached. They can be further classified
    into stop-market and stop-limit orders.

    - **Iceberg orders**: These are large orders that are divided into smaller parts,
    with only a portion of the order visible on the order book at any given time.
    Once the visible portion is executed, the next portion is revealed. This helps
    to minimize the market impact of large orders and can prevent information leakage.

    - **Trailing stop orders**: These orders allow traders to set a stop price that
    trails the market price by a specific distance. As the market price moves in a
    favorable direction, the stop price adjusts accordingly, helping to protect gains
    while giving the position room to run.


    By offering a diverse range of order types and adhering to well-defined precedence
    rules, electronic exchanges can provide market participants with a flexible and
    efficient trading environment. This enables traders to effectively manage risk,
    optimize execution, and tailor their trading strategies to the unique characteristics
    of the financial instruments they trade.'
