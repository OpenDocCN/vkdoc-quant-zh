- fmt: "# Implementing the Pairs Trading Strategy\n\nAs a market-neutral trading strategy,\
    \ pairs trading identifies two cointegrated stocks based on a specific statistical\
    \ test procedure using historical data. It takes a long and a short position in\
    \ these two stocks simultaneously. Therefore, no matter whether the market moves\
    \ up or down for these two stocks, there is no impact on the pairs trading strategy,\
    \ so long as their relative spread remains the same. Instead, the strategy monitors\
    \ the spread between the two stocks, which should remain relatively constant over\
    \ time, and makes a move in case of short-term price movements based on preset\
    \ thresholds.\n\nLet us first download the stock price data. We will focus on\
    \ a few stock symbols of major tech giants: Google, Microsoft, Apple, Tesla, Meta,\
    \ and Netflix. The following code snippet downloads the historical stock prices\
    \ for the full year of 2022 and extracts the adjusted closing prices to the `df`\
    \ variable:\n\n```\n# download data from yfinance\nstocks = ['GOOG','MSFT','AAPL','TSLA','META','NFLX']\n\
    df = yf.download(stocks, start=start_date, end=end_date)['Adj Close']\n```\n\n\
    Next, we analyze each unique pair of stocks and perform the cointegration test\
    \ to look for those with a long-term equilibrium relationship.\n\n## Identifying\
    \ Cointegrated Pairs of Stocks\n\nThere are a total of six stocks in our search\
    \ space, leading to a total of ![$$ {C}_6^2=15 $$](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_IEq2.png).\
    \ Generating the list of unique pairs of stocks can be performed via the `combinations()`\
    \ function from the `itertools` package, as shown in Listing [8-7](#605529_1_En_8_Chapter.xhtml#PC14).\n\
    \n```\nfrom itertools import combinations\n# get all pairs of stocks\nstock_pairs\
    \ = list(combinations(df.columns, 2))\n>>> stock_pairs\n[('AAPL', 'GOOG'),\n('AAPL',\
    \ 'META'),\n('AAPL', 'MSFT'),\n('AAPL', 'NFLX'),\n('AAPL', 'TSLA'),\n('GOOG',\
    \ 'META'),\n('GOOG', 'MSFT'),\n('GOOG', 'NFLX'),\n('GOOG', 'TSLA'),\n('META',\
    \ 'MSFT'),\n('META', 'NFLX'),\n('META', 'TSLA'),\n('MSFT', 'NFLX'),\n('MSFT',\
    \ 'TSLA'),\n('NFLX', 'TSLA')]\nListing 8-7\nGenerating all unique pairs of stocks\n\
    ```\n\nThese 15 unique pairs of stocks are stored as tuples in a list. Each tuple\
    \ will go through the cointegration test in the following section.\n\n## Testing\
    \ Pairwise Cointegration\n\nIn Listing [8-8](#605529_1_En_8_Chapter.xhtml#PC15),\
    \ we loop through each pair of stocks and perform the Engle-Granger test using\
    \ the `coint()` function. For each unique pair of stocks, we first extract the\
    \ corresponding DataFrame via subsetting by column names and then perform the\
    \ cointegration test using the two series to obtain the test score and p-value.\
    \ We will then compare the p-value with a preset threshold and print out the result\
    \ to assess if the test result is statistically significant.\n\n```\nthreshold\
    \ = 0.1\n# run Engle-Granger test for cointegration on each pair of stocks\nfor\
    \ pair in stock_pairs:\n    # subset df based on current pair of stocks\n    df2\
    \ = df[list(pair)]\n    # perform test for the current pair of stocks\n    score,\
    \ pvalue, _ = coint(df2.values[:,0], df2.values[:,1])\n    # check if the current\
    \ pair of stocks is cointegrated\n    if pvalue < threshold:\n        print(pair,\
    \ 'are cointegrated')\n    else:\n        print(pair, 'are not cointegrated')\n\
    Listing 8-8\nPerforming a cointegration test for each unique pair of stocks\n\
    ```\n\nNote that the threshold is set as 10% instead of 5% as before, since the\
    \ test would show no cointegrated pair of stocks when setting the threshold as\
    \ the latter. As it turns out, the `coint()` function is slightly different from\
    \ our manual implementation of the test procedure earlier. For example, the order\
    \ of the time series assumed by the `coint()` function may not be the same.\n\n\
    Running the code generates the following result:\n\n```\n('AAPL', 'GOOG') are\
    \ not cointegrated\n('AAPL', 'META') are not cointegrated\n('AAPL', 'MSFT') are\
    \ not cointegrated\n('AAPL', 'NFLX') are not cointegrated\n('AAPL', 'TSLA') are\
    \ not cointegrated\n('GOOG', 'META') are not cointegrated\n('GOOG', 'MSFT') are\
    \ cointegrated\n('GOOG', 'NFLX') are not cointegrated\n('GOOG', 'TSLA') are not\
    \ cointegrated\n('META', 'MSFT') are not cointegrated\n('META', 'NFLX') are not\
    \ cointegrated\n('META', 'TSLA') are not cointegrated\n('MSFT', 'NFLX') are not\
    \ cointegrated\n('MSFT', 'TSLA') are not cointegrated\n('NFLX', 'TSLA') are not\
    \ cointegrated\n```\n\nIt turns out that only Google and Microsoft stock prices\
    \ are cointegrated using the 10% threshold on the significance level. These two\
    \ stocks will be the focus of our pairs trading strategy in the following, starting\
    \ by identifying the stationary spread between the two stocks.\n\n## Obtaining\
    \ the Spread\n\nAs introduced earlier, the spread is a time series derived from\
    \ the historical data of the two stocks in the pairs trading strategy. There are\
    \ many ways to calculate the spread, and we will go with the one employed in the\
    \ cointegration test procedure. Specifically, we define the spread as the residuals\
    \ from the linear regression model between the two stocks. If they pass the cointegration\
    \ test, we have confidence (up to 90% confidence level) that these two stocks,\
    \ when linearly combined, generate a stationary time series in the spread.\n\n\
    Listing [8-9](#605529_1_En_8_Chapter.xhtml#PC17) generates the spread time series\
    \ and visualizes it in a line plot. As before, we first extract the predictor\
    \ `X` and target `Y`, apply the bias trick by adding a column of constant ones\
    \ to `X`, run the linear regression model, and finally obtain the spread as the\
    \ residual between the target and the prediction.\n\n```\n# calculate the spread\
    \ for GOOG and MSFT\nY = df[\"GOOG\"]\nX = df[\"MSFT\"]\n# estimate linear regression\
    \ coefficients\nX_with_constant = sm.add_constant(X)\nmodel = OLS(Y, X_with_constant).fit()\n\
    # obtain the spread as the residuals\nspread = Y - model.predict()\nspread.plot(figsize=(12,6))\n\
    Listing 8-9\nCalculating the spread\n```\n\nRunning the code generates Figure\
    \ [8-6](#605529_1_En_8_Chapter.xhtml#Fig6). The spread now appears as white noise,\
    \ that is, following a normally distributed Gaussian distribution. Since different\
    \ stocks have different scales of spread, it would be recommended to standardize\
    \ them into the same scalar for ease of comparison and strategy formulation. The\
    \ next section covers the conversion process that turns the spread into z-scores.\n\
    \n![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig6_HTML.jpg)\n\nA line graph\
    \ of spread versus date. It has a fluctuating curve with sharp and high peaks\
    \ and dips. The curve ascends with fluctuations, descends, and again ascends and\
    \ descends.\n\nFigure 8-6\nVisualizing the spread as the residuals of the linear\
    \ regression model"
