    ### 计算年化收益率


    我们考虑三种不同回报频率的场景，包括日回报`0.0001`、月回报`0.01`和季度回报`0.05`。其计算过程与以年度为标记计算多期期末收益相同：


    -   将每个时期的普通回报转换为`1+R`格式。

    -   将`1+R`格式的回报进行乘方，指数为一年中的期数。

    -   减去 1，将结果转换回普通回报。


    对于日回报，我们假设一年共有 252 个交易日，这是处理每日价格数据时的典型假设。我们遵循同样的步骤：将每个时期的普通回报转换为`1+R`回报，将这些单期回报复利/相乘直到满一年，再减去
    1，转换回普通的期末收益：


    ```

    r = 0.0001

    >>> (1+r)**252-10

    0.025518911987694626

    ```


    对于月回报，由于一年有 12 个月，我们将对其进行 12 次复利计算：


    ```

    r = 0.01

    >>> (1+r)**12-1

    0.12682503013196977

    ```


    最后，一年有四个季度，因此我们对其进行四次复利计算：


    ```

    r = 0.05

    >>> (1+r)**4-1

    0.21550625000000023

    ```


    现在，我们将在下一节转向风险分析。


    ## 分析风险


    资产的风险与波动性相关，其重要性等于甚至高于回报。波动性是评估投资风险的关键指标，因为它代表了资产回报的不确定性或波动程度。更高的波动性意味着更高的风险，因为资产价格可能出现更显著的涨跌。为了量化与投资相关的风险，我们必须理解波动性的概念及其计算方法。


    回顾图 4-3 中两项资产的回报。尽管平均回报相同，但资产 2 比资产 1 的波动性更大。资产 2 偏离均值的频率更高，幅度也更大。因此，波动性衡量的是偏离均值的程度。本节将正式定义波动性的概念。


    在探讨波动性之前，让我们先引入方差和标准差的概念。


    ### 介绍方差与标准差


    方差和标准差是两种广泛使用的统计量，用于描述数据围绕其均值的离散程度。假设总共有*N*个回报 ![$$ {\left\{{R}_i\right\}}_{i=1}^N
    $$](img/605529_1_En_4_Chapter_TeX_IEq2.png)。我们知道平均回报*R*[*P*]是通过对所有回报取平均值计算得出的：


    ![$$ {R}_P=\frac{\sum_{i=1}^N{R}_i}{N} $$](img/605529_1_En_4_Chapter_TeX_Equl.png)


    这里，平均回报*R*[*P*]描述了资产或投资组合回报的中心趋势。也就是说，平均而言，回报为*R*[*P*]。它也常被称为回报的算术平均值。


    接下来是衡量偏离均值的程度。对于任意回报*R*[*i*]，它与*R*[*P*]的距离为*R*[*i*] − *R*[*P*]。然而，这个距离可能是正值或负值。由于总共有*N*个回报，因此有*N*个距离，将这些距离直接相加似乎不是一个好主意，因为正负距离会相互抵消。方差衡量方法提出，我们不直接对这些距离求和，而是先将距离平方，然后再对这些平方距离取平均值。从数学上讲，回报的方差表示如下：


    ![$$ {\sigma}_P²=\frac{\sum_{i=1}^N{\left({R}_i-{R}_P\right)}²}{N} $$](img/605529_1_En_4_Chapter_TeX_Equm.png)


    这里，*R*[*i*] − *R*[*P*] 也意味着对原始回报*R*[*i*]进行去均值处理，即从原始回报*R*[*i*]中减去平均回报*R*[*P*]。这给出了偏离均值的程度。此外，通过平方这些偏差，正负项相互抵消的问题不复存在；所有去均值后的回报最终都变为正值或零。最后，我们将这些平方偏差的平均值作为该回报序列的方差。观察图
    4-3 也能直观地看出，资产 2 的方差大于资产 1。


    尽管方差总结了偏离平均回报的平均程度，但其单位是平均回报的平方距离，导致单位的解释比较困难。在实践中，我们通常对方差取平方根，将其恢复到与回报相同的量纲。得到的结果称为标准差，此时的偏差已被标准化并具有可比性。


    ![$$ {\sigma}_P=\sqrt{\frac{\sum_{i=1}^N{\left({R}_i-{R}_P\right)}²}{N}} $$](img/605529_1_En_4_Chapter_TeX_Equn.png)


    这也是我们衡量波动性的指标。它衡量了价格围绕平均价格的波动幅度，是衡量回报离散程度的直接指标。波动性越高，偏离平均回报的程度就越大。图 4-7 总结了常见统计量的定义，如均值、方差（包括总体方差和样本方差）和标准差（在金融语境下也称为波动性）。


    ![一组 4 个数学方程，定义了 1. 平均回报，算术平均值，2. 方差，总体，3. 方差，样本，4. 标准差，波动性。](img/605529_1_En_4_Fig7_HTML.jpg)


    **图 4-7** - 总结了常见的统计量，包括均值、方差（总体和样本）和标准差（也称为波动性）


    总之，方差和标准差是理解投资风险的基本统计量。它们描述了回报相对于其均值的离散程度，有助于估算资产或投资组合的潜在波动性。这些统计量在评估投资组合配置中的风险承受能力方面也发挥着重要作用。

    '
- fmt: '### Annualizing Volatility


    Similar to return, the volatility also needs to be annualized to warrant a fair
    comparison. Without annualizing the volatility, it is difficult to compare the
    volatility of monthly data with that of daily data.


    The formula for annualizing the volatility relies on the fact that the volatility
    increases with the square root of the time period `T`. The annualized return `σ[P,
    T]` can be calculated as:


    ![$$ {\sigma}_{P,T}=\sqrt{T}{\sigma}_P $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equo.png)


    where `σ[P]` is our single-period volatility, which can be daily, monthly, or
    quarterly. This expression relies on the assumption that the returns are normally
    distributed and independent of each other. We are only going to build intuition
    on this formula instead of delving into the technical details.


    The time period `T` is the full time period. Therefore, daily returns give `T
    = 252`, monthly returns give `T = 12`, and quarterly returns give `T = 4`. We
    would simply multiply the square root of this time period with the original single-period
    volatility to obtain the annualized volatility.


    To recap, we can follow these steps to calculate the annualized volatility:


    - Calculate the single-period volatility (`σ[P]`) for the given data (daily, monthly,
    or quarterly returns).

    - Determine the number of periods per year (`T`). For daily returns, `T = 252`
    (trading days in a year); for monthly returns, `T = 12`; and for quarterly returns,
    `T = 4`.

    - Multiply the single-period volatility (`σ[P]`) by the square root of the number
    of periods per year (`T`) to obtain the annualized volatility; that is, ![$$ {\sigma}_{P,T}=\sqrt{T}{\sigma}_P
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq3.png).


    Keep in mind that the assumption of normally distributed and independent returns
    is critical for this method to hold true. Annualizing volatility using this method
    allows us to compare the volatility of assets with different return frequencies
    on a common scale, making it easier to evaluate and manage the risks associated
    with different investments.


    When the single-period volatility `σ[P]` is fixed, our annualized return `σ[P,
    T]` will grow as `T` increases. Such growth in `σ[P, T]` is a nonlinear function
    of `T` due to the square root operation. As the time period `T` increases, the
    annualized volatility will also increase, but at a decreasing rate because of
    the square root function. This means that when the daily return and monthly return
    have the same single-period volatility, the daily return will have a higher annualized
    volatility. This makes intuitive sense as it captures short-term fluctuations
    that are smoothed out when using longer time frames like monthly data, and we
    expect to see more variations in the daily data compared to the monthly data.


    We can also view the formula from another perspective. Squaring both sides gives
    us the annualized variance on both sides, as shown in the following:


    ![$$ {\sigma}_{P,T}^2=T{\sigma}_P^2 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equp.png)


    Now the annualized variance ![$$ {\sigma}_{P,T}^2 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq4.png)
    grows linearly with the time `T`. Figure 4-8 illustrates the subtlety here.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig8_HTML.jpg)


    Two line graphs between sigma subscript P, T and T present that annualizing volatility
    rises non-linearly with sigma subscript P, T = square root of T times sigma subscript
    P, and annualizing variance rises linearly with sigma squared subscript P, T =
    T sigma squared subscript P.


    **Figure 4-8** Comparing the differences when annualizing volatility and variance.
    When given a fixed single-period volatility or variance, the annualized volatility
    grows nonlinearly with time, while the annualized variance grows linearly with
    time


    Let us look at a simple example. Suppose the standard deviation of a stock’s daily
    return series is `0.1%`. The annualized volatility can be calculated as:


    ```

    0.001 * sqrt(252) ≈ 1.59%

    ```'
