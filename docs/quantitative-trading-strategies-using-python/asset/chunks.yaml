- fmt: "### Pegged Order\n\nA pegged order is a type of order that allows the limit\
    \ price to be dynamic, adjusting automatically based on a reference price. This\
    \ can be particularly useful in spread trading or other trading strategies that\
    \ require staying in sync with the market’s best bid, best offer, or mid-price.\n\
    \nThe price in a limit order is fixed and static; we can only issue a new order\
    \ to have a new limit price. However, there are situations when we would like\
    \ the limit price to be dynamic. For example, suppose a trading strategy must\
    \ trade at an offset of the best bid or best ask. But these two quotes fluctuate,\
    \ and you want your limit order prices to change in sync with them. Pegged orders\
    \ allow you to do just that.\n\nPlacing a pegged order requires specifying the\
    \ reference price to track, along with an optional differential offset. The differential\
    \ offset can be a positive or negative multiple of the tick size that represents\
    \ the minimum price movement for the particular asset. The trading system will\
    \ then manage the pegged order by automatically modifying its price on the order\
    \ book as the reference price moves, maintaining the desired price relationship.\n\
    \nA pegged order is a limit order with a dynamic limit price. It allows traders\
    \ to keep their orders in line with the changing market conditions without having\
    \ to monitor and adjust their orders manually and constantly. This can be particularly\
    \ beneficial in fast-moving markets or when trading strategies require maintaining\
    \ specific price relationships with the best bid, best offer, or mid-price. However,\
    \ it’s essential to understand that pegged orders still carry the risk of not\
    \ being executed if the market moves unfavorably, and the dynamic limit price\
    \ never reaches a level at which the order can be filled.\n\nThe pegged order\
    \ is often used in spread trading, which involves the simultaneous buying and\
    \ selling of related securities as a unit, designed to profit from a change in\
    \ the spread (price difference) between the two securities. Here, spread trading\
    \ is a strategy that takes advantage of the price difference, or spread, between\
    \ two related securities. In this strategy, a trader simultaneously buys one security\
    \ and sells another security to profit from changes in the spread between the\
    \ two. The objective is to capitalize on the temporary mispricing or changing\
    \ price relationship between the securities rather than betting on the direction\
    \ of the individual securities themselves.\n\nSo how does a pegged order work?\
    \ When entering a pegged order, you must specify a reference price they wish to\
    \ track, which could be the best bid, best offer, or mid-price. Best bid and best\
    \ offer pegs may track at a differential offset, which is specified as a multiple\
    \ of the whole tick size. This means that the trading system will manage the pegged\
    \ order by automatically modifying the pegged order’s price on the order book\
    \ as the reference price moves.\n\nLet us look at an example of a pegged order.\
    \ Suppose your strategy requires you to buy a limit order to be filled at three\
    \ ticks lower than the current best bid and a sell limit order to be filled at\
    \ two ticks higher than the current best offer. When the bid price changes, the\
    \ pegged order becomes a composite order comprising:\n\n- A cancelation order\
    \ of total order size (one buy limit order and one sell limit order)\n- A new\
    \ buy limit order with a limit price pegged at the new best bid less an offset\
    \ of three ticks, and a new sell limit order with a limit price pegged at the\
    \ new best ask plus an offset of two ticks\n\nLet’s say the current best bid is\
    \ $100, and the best offer is $101. According to this strategy, we will place\
    \ a buy limit order at $100 – (3 ticks) and a sell limit order at $101 + (2 ticks).\
    \ Assuming each tick is $0.01, the buy limit order will be placed at $99.97, and\
    \ the sell limit order will be placed at $101.02.\n\nNow, if the best bid changes\
    \ to $100.50 and the best offer changes to $101.50, the pegged orders will automatically\
    \ adjust to the new reference prices. Specifically, the buy limit order will now\
    \ be placed at $100.50 – (3 ticks) = $100.47, and the sell limit order will be\
    \ placed at $101.50 + (2 ticks) = $101.52.\n\nThe pseudocode for the algorithm\
    \ behind a pegged buy order with an offset of `x` is as follows:\n\n1.  If the\
    \ bid price increases to `B[+]`\n    1.  Cancel the current limit order\n    2.\
    \  Submit a buy limit order at a price of `B[+] - x`\n2.  Else\n    1.  If the\
    \ bid price decreases to `B[-]`\n        1.  If the current limit order is not\
    \ filled\n            1.  Cancel the current limit order\n            2.  Submit\
    \ a buy limit order at a price of `B[-] - x`\n    2.  Else\n        1.  Keep checking\
    \ whether the bid price has changed\n\nWhen the bid price changes, the algorithm\
    \ checks if the change is an increase or a decrease. If the bid price increases,\
    \ the current limit order is canceled, and a new buy limit order is submitted\
    \ at the new bid price minus the offset `x`. If the bid price decreases, the algorithm\
    \ first checks if the current limit order has been filled or not. If the current\
    \ limit order is not filled, the order is canceled, and a new buy limit order\
    \ is submitted at the new bid price minus the offset `x`. If the order is filled,\
    \ no further action is needed. The algorithm will continue monitoring the bid\
    \ price for changes and adjust the buy limit order accordingly.\n\nPay attention\
    \ to the inner `if` condition in the `else` statement. Here, we check if the current\
    \ limit order is filled. Since there is a price drop, we would execute the limit\
    \ order if it drops to the limit price of the buy limit order.\n\nWe can similarly\
    \ write out the pseudocode for the algorithm behind a pegged sell order with an\
    \ offset of `x` as follows:\n\n1.  If the ask price decreases to `A[-]`\n    1.\
    \  Cancel the current limit order\n    2.  Submit a sell limit order at a price\
    \ of `A[-] + x`\n2.  Else\n    1.  If the ask price increases to `A[+]`\n    \
    \    1.  If the current limit order is not filled\n            1.  Cancel the\
    \ current limit order\n            2.  Submit a sell limit order at a price of\
    \ `A[+] + x`\n    2.  Else\n        1.  Keep checking whether the bid price has\
    \ changed\n\n### Trailing Stop Order\n\nSuppose you have a winning position and\
    \ want to make it run. And you want to protect your gain. This can be achieved\
    \ with a stop order. But a stop order is static. If the run continues, you want\
    \ to raise the stop order automatically in tandem.\n\nSo a trailing stop order\
    \ is invented for this purpose. A trailing (sell) stop order sets the initial\
    \ stop price at a fixed amount below the market price. As the market price rises,\
    \ the stop price rises by the trailing amount. But if the stock price falls, the\
    \ stop price remains unchanged. When the stop price is hit, a market order is\
    \ submitted. Reverse this for a buy trailing stop order. This strategy may allow\
    \ a trader to limit the maximum possible loss without limiting possible gain.\n\
    \nA trailing stop order is a useful tool for managing positions in a dynamic market.\
    \ It allows investors to secure gains and limit losses by automatically adjusting\
    \ the stop price as the market moves in a favorable direction. This flexibility\
    \ is particularly beneficial when a position is experiencing significant price\
    \ fluctuations, as it helps protect profits without limiting potential upside.\n\
    \nTherefore, a trailing stop is a modification of a typical stop order that can\
    \ be set at a defined percentage or dollar amount away from a security’s current\
    \ market price. An investor places a trailing stop loss below the current market\
    \ price for a long position and a trailing stop above the current market price\
    \ for a short position. It is designed to lock in profits or limit losses as a\
    \ trade moves favorably.\n\nNote that the trailing stops only move if the price\
    \ moves favorably. Once it moves to lock in a profit or reduce a loss, it does\
    \ not move back in the other direction. The trailing stop order is thus a dynamically\
    \ changing stop order."
  raw: "### Pegged Order\n\nA pegged order is a type of order that allows the limit\
    \ price to be dynamic, adjusting automatically based on a reference price. This\
    \ can be particularly useful in spread trading or other trading strategies that\
    \ require staying in sync with the market’s best bid, best offer, or mid-price.\n\
    \nThe price in a limit order is fixed and static; we can only issue a new order\
    \ to have a new limit price. However, there are situations when we would like\
    \ the limit price to be dynamic. For example, suppose a trading strategy must\
    \ trade at an offset of the best bid or best ask. But these two quotes fluctuate,\
    \ and you want your limit order prices to change in sync with them. Pegged orders\
    \ allow you to do just that.\n\nPlacing a pegged order requires specifying the\
    \ reference price to track, along with an optional differential offset. The differential\
    \ offset can be a positive or negative multiple of the tick size that represents\
    \ the minimum price movement for the particular asset. The trading system will\
    \ then manage the pegged order by automatically modifying its price on the order\
    \ book as the reference price moves, maintaining the desired price relationship.\n\
    \nA pegged order is a limit order with a dynamic limit price. It allows traders\
    \ to keep their orders in line with the changing market conditions without having\
    \ to monitor and adjust their orders manually and constantly. This can be particularly\
    \ beneficial in fast-moving markets or when trading strategies require maintaining\
    \ specific price relationships with the best bid, best offer, or mid-price. However,\
    \ it’s essential to understand that pegged orders still carry the risk of not\
    \ being executed if the market moves unfavorably, and the dynamic limit price\
    \ never reaches a level at which the order can be filled.\n\nThe pegged order\
    \ is often used in spread trading, which involves the simultaneous buying and\
    \ selling of related securities as a unit, designed to profit from a change in\
    \ the spread (price difference) between the two securities. Here, spread trading\
    \ is a strategy that takes advantage of the price difference, or spread, between\
    \ two related securities. In this strategy, a trader simultaneously buys one security\
    \ and sells another security to profit from changes in the spread between the\
    \ two. The objective is to capitalize on the temporary mispricing or changing\
    \ price relationship between the securities rather than betting on the direction\
    \ of the individual securities themselves.\n\nSo how does a pegged order work?\
    \ When entering a pegged order, you must specify a reference price they wish to\
    \ track, which could be the best bid, best offer, or mid-price. Best bid and best\
    \ offer pegs may track at a differential offset, which is specified as a multiple\
    \ of the whole tick size. This means that the trading system will manage the pegged\
    \ order by automatically modifying the pegged order’s price on the order book\
    \ as the reference price moves.\n\nLet us look at an example of pegged order.\
    \ Suppose your strategy requires you to buy a limit order to be filled at three\
    \ ticks lower than the current best bid and a sell limit order to be filled at\
    \ two ticks higher than the current best offer. When the bid price changes, the\
    \ pegged order becomes a composite order comprising\n\n*   A cancelation order\
    \ of total order size (one buy limit order and one sell limit order)\n\n*   A\
    \ new buy limit order with a limit price pegged at the new best bid less an offset\
    \ of three ticks, and a new sell limit order with a limit price pegged at the\
    \ new best ask plus an offset of two ticks\n\nLet’s say the current best bid is\
    \ $100, and the best offer is $101\\. According to this strategy, we will place\
    \ a buy limit order at $100 – (3 ticks) and a sell limit order at $101 + (2 ticks).\
    \ Assuming each tick is $0.01, the buy limit order will be placed at $99.97, and\
    \ the sell limit order will be placed at $101.02.\n\nNow, if the best bid changes\
    \ to $100.50 and the best offer changes to $101.50, the pegged orders will automatically\
    \ adjust to the new reference prices. Specifically, the buy limit order will now\
    \ be placed at $100.50 – (3 ticks) = $100.47, and the sell limit order will be\
    \ placed at $101.50 + (2 ticks) = $101.52.\n\nThe pseudocode for the algorithm\
    \ behind a pegged buy order with an offset of x is as follows:\n\n1.  If the bid\
    \ price increases to B[+]\n    1.  Cancel the current limit order\n\n2.  Submit\
    \ a buy limit order at a price of B[+] − x\n\n2.  Else\n    1.  If the bid price\
    \ decreases to B[−]\n        1.  If the current limit order is not filled\n  \
    \          1.  Cancel the current limit order\n\n2.  Submit a buy limit order\
    \ at a price of B[−] − x\n\n2.  Else\n            1.  Keep checking whether the\
    \ bid price has changed\n\nWhen the bid price changes, the algorithm checks if\
    \ the change is an increase or a decrease. If the bid price increases, the current\
    \ limit order is canceled, and a new buy limit order is submitted at the new bid\
    \ price minus the offset x. If the bid price decreases, the algorithm first checks\
    \ if the current limit order has been filled or not. If the current limit order\
    \ is not filled, the order is canceled, and a new buy limit order is submitted\
    \ at the new bid price minus the offset x. If the order is filled, no further\
    \ action is needed. The algorithm will continue monitoring the bid price for changes\
    \ and adjust the buy limit order accordingly.\n\nPay attention to the inner if\
    \ condition in the else statement. Here, we check if the current limit order is\
    \ filled. Since there is a price drop, we would execute the limit order if it\
    \ drops to the limit price of the buy limit order.\n\nWe can similarly write out\
    \ the pseudocode for the algorithm behind a pegged sell order with an offset of\
    \ x as follows:\n\n1.  If the ask price decreases to A[−]\n    1.  Cancel the\
    \ current limit order\n\n2.  Submit a sell limit order at a price of A[−] + x\n\
    \n2.  Else\n    1.  If the ask price increases to A[+]\n        1.  If the current\
    \ limit order is not filled\n            1.  Cancel the current limit order\n\n\
    2.  Submit a sell limit order at a price of A[−] + x\n\n2.  Else\n           \
    \ 1.  Keep checking whether the bid price has changed\n\n### Trailing Stop Order\n\
    \nSuppose you have a winning position and want to make it run. And you want to\
    \ protect your gain. This can be achieved with a stop order. But stop order is\
    \ static. If the run continues, you want to raise the stop order automatically\
    \ in tandem.\n\nSo trailing stop order is invented for this purpose. A trailing\
    \ (sell) stop order sets the initial stop price at a fixed amount below the market\
    \ price. As the market price rises, the stop price rises by the trailing amount.\
    \ But if the stock price falls, the stop price remains unchanged. When the stop\
    \ price is hit, a market order is submitted. Reverse this for a buy trailing stop\
    \ order. This strategy may allow a trader to limit the maximum possible loss without\
    \ limiting possible gain.\n\nA trailing stop order is a useful tool for managing\
    \ positions in a dynamic market. It allows investors to secure gains and limit\
    \ losses by automatically adjusting the stop price as the market moves in a favorable\
    \ direction. This flexibility is particularly beneficial when a position is experiencing\
    \ significant price fluctuations, as it helps protect profits without limiting\
    \ potential upside.\n\nTherefore, a trailing stop is a modification of a typical\
    \ stop order that can be set at a defined percentage or dollar amount away from\
    \ a security’s current market price. An investor places a trailing stop loss below\
    \ the current market price for a long position and a trailing stop above the current\
    \ market price for a short position. It is designed to lock in profits or limit\
    \ losses as a trade moves favorably.\n\nNote that the trailing stops only move\
    \ if the price moves favorably. Once it moves to lock in a profit or reduce a\
    \ loss, it does not move back in the other direction. The trailing stop order\
    \ is thus a dynamically changing stop order."
  trans: "\n### 挂单\n\n挂单是一种允许限价随参考价格动态调整的订单类型。这在价差交易或其他需要与市场最优买价、最优卖价或中间价保持同步的交易策略中尤为有用。\n\
    \n限价单的价格是固定不变的；我们只能通过下达新订单来设定新的限价。然而，在某些情况下，我们希望限价是动态的。例如，假设某个交易策略必须以最优买价或最优卖价的某个偏移量进行交易。但这两个报价会波动，而你希望你的限价单价格能随之同步变化。挂单就能让你做到这一点。\n\
    \n下达挂单需要指定要追踪的参考价格，以及一个可选的差额偏移量。该偏移量可以是跳动单位（代表特定资产的最小价格变动）的正数倍或负数倍。交易系统将随后管理该挂单，在参考价格变动时自动修改其在订单簿上的价格，以维持所需的价差关系。\n\
    \n挂单是一种具有动态限价的限价单。它允许交易者使其订单与不断变化的市场条件保持一致，而无需持续手动监控和调整订单。这在快速变化的市场中，或当交易策略需要与最优买价、最优卖价或中间价维持特定价格关系时，尤为有利。然而，必须理解的是，如果市场走势不利，且动态限价从未达到订单可被成交的水平，挂单仍然存在无法成交的风险。\n\
    \n挂单常用于价差交易，该交易涉及同时买入和卖出相关的证券组合，旨在从两种证券之间的价差（价格差）变化中获利。在这里，价差交易是一种利用两种相关证券之间价差来获利的策略。在该策略中，交易者同时买入一种证券并卖出另一种证券，以从两者间的价差变化中获利。其目标是利用证券间暂时的错误定价或变化的价格关系，而非押注于单个证券本身的方向。\n\
    \n那么，挂单是如何运作的呢？下挂单时，你必须指定一个想要追踪的参考价格，这个价格可以是最优买价、最优卖价或中间价。最优买价和最优卖价挂单可以按指定的差额偏移量进行追踪，该偏移量设定为整个跳动单位的倍数。这意味着交易系统将管理该挂单，当参考价格变动时，自动修改挂单在订单簿上的价格。\n\
    \n让我们看一个挂单的例子。假设你的策略要求你下达一个买入限价单，其成交价需比当前最优买价低三个跳动单位；同时下达一个卖出限价单，其成交价需比当前最优卖价高两个跳动单位。当买价变化时，该挂单会成为一个由以下部分组成的复合订单：\n\
    \n-   一个取消原有全部订单规模（一个买入限价单和一个卖出限价单）的撤单指令\n-   一个新的买入限价单，其限价挂靠在新的最优买价减去三个跳动单位的偏移量上；以及一个新的卖出限价单，其限价挂靠在新的最优卖价加上两个跳动单位的偏移量上\n\
    \n假设当前最优买价为 100 美元，最优卖价为 101 美元。根据此策略，我们将下达一个限价为 100 美元 – (3 个跳动单位) 的买入限价单，以及一个限价为\
    \ 101 美元 + (2 个跳动单位) 的卖出限价单。假设每个跳动单位为 0.01 美元，那么买入限价单将挂在 99.97 美元，卖出限价单将挂在 101.02\
    \ 美元。\n\n现在，如果最优买价变为 100.50 美元，最优卖价变为 101.50 美元，挂单将自动调整至新的参考价格。具体来说，买入限价单现在将挂在\
    \ 100.50 美元 – (3 个跳动单位) = 100.47 美元，卖出限价单将挂在 101.50 美元 + (2 个跳动单位) = 101.52 美元。\n\
    \n带有偏移量 `x` 的买入挂单背后的算法伪代码如下：\n\n1.  如果买价上涨至 `B[+]`\n    1.  取消当前的限价单\n    2. \
    \ 以 `B[+] - x` 的价格提交一个新的买入限价单\n2.  否则\n    1.  如果买价下跌至 `B[-]`\n        1.  如果当前限价单尚未成交\n\
    \            1.  取消当前的限价单\n            2.  以 `B[-] - x` 的价格提交一个新的买入限价单\n    2.\
    \  否则\n        1.  持续检查买价是否发生变化\n\n当买价变动时，算法会检查是上涨还是下跌。如果买价上涨，则取消当前限价单，并以新买价减去偏移量\
    \ `x` 的价格提交一个新的买入限价单。如果买价下跌，算法首先检查当前限价单是否已经成交。如果尚未成交，则取消该订单，并以新买价减去偏移量 `x` 的价格提交一个新的买入限价单。如果订单已成交，则无需进一步操作。该算法将持续监控买价的变化，并相应调整买入限价单。\n\
    \n请注意`else`语句中的内部`if`条件。在这里，我们检查当前限价单是否已成交。由于价格下跌，如果价格跌至买入限价单的限价，该订单将会被执行。\n\n\
    我们可以类似地写出带有偏移量 `x` 的卖出挂单背后的算法伪代码如下：\n\n1.  如果卖价下跌至 `A[-]`\n    1.  取消当前的限价单\n\
    \    2.  以 `A[-] + x` 的价格提交一个新的卖出限价单\n2.  否则\n    1.  如果卖价上涨至 `A[+]`\n       \
    \ 1.  如果当前限价单尚未成交\n            1.  取消当前的限价单\n            2.  以 `A[+] + x` 的价格提交一个新的卖出限价单\n\
    \    2.  否则\n        1.  持续检查买价是否发生变化\n\n### 追踪止损单\n\n假设你持有一个盈利的头寸，并希望让它继续获利。同时，你又想保护已有的收益。这可以通过止损单来实现。但止损单是静态的。如果涨势持续，你希望止损单能自动随之提高。\n\
    \n因此，追踪止损单应运而生。一个追踪（卖出）止损单会将初始止损价设定为低于市场价格的固定金额。随着市场价格的上涨，止损价会按追踪金额相应上升。但如果股票价格下跌，止损价则保持不变。当止损价被触发时，会提交一个市价单。对于买入追踪止损单，其逻辑则相反。这种策略或许能让交易者在限制最大可能亏损的同时，不限制潜在的收益。\n\
    \n追踪止损单是在动态市场中管理头寸的有用工具。它允许投资者通过自动调整止损价（当市场向有利方向变动时）来锁定收益并限制损失。当头寸经历显著价格波动时，这种灵活性尤其有利，因为它有助于在保护利润的同时不限制潜在的上行空间。\n\
    \n因此，追踪止损是对标准止损单的一种修改，可以设定为距证券当前市场价格的一个固定百分比或固定金额。对于多头头寸，投资者将追踪止损单设置在当前市场价格之下；对于空头头寸，则设置在当前市场价格之上。其目的是在交易向有利方向发展时锁定利润或限制损失。\n\
    \n请注意，追踪止损只有在价格向有利方向变动时才会移动。一旦它移动以锁定利润或减少损失，就不会再向相反方向移动。因此，追踪止损单是一种动态变化的止损单。\n"
- fmt: '### Market If Touched Order


    A market if touched (`MIT`) is an order to buy (sell) below (above) the market.
    This order is held in the system until the trigger price is touched and is then
    submitted as a market order if and when a specified price level is reached. It
    is a conditional order that becomes a market order when a security reaches a specified
    price. When using a buy `MIT` order, a broker will wait until the security reaches
    the specified level before purchasing the asset. Correspondingly, a sell `MIT`
    order will trigger a market sell order when the security reaches a specified sell
    price.


    Note that `MIT` orders are typically used to buy when the price falls or sell
    when the price rises. This is in contrast to stop orders and limit orders. For
    example, a buy `MIT` order looks for the price of an asset to fall, while a buy-stop
    order activates when the market value of the security increases past a specified
    level. On the other hand, the buy limit order only activates when the market value
    of the security reaches the limit price.


    Take an asset whose current price is $288.7, for example. There is a large buy
    limit order size of $287.9. You want to buy at $288.0 and be among the first to
    buy. With an `MIT`, you can send a market order to buy when touched.


    ### Summarizing Major Types of Orders


    Table [2-1](#605529_1_En_2_Chapter.xhtml#Tab1) summarizes the major types of orders,
    including market order, limit order, stop order, stop-limit order, pegged order,
    trailing stop order, and market if touched order.


    **Table 2-1** Major types of orders


    | Order Type | Attributes | Note |

    | --- | --- | --- |

    | Market order | Trading direction and volume | Buy or sell immediately at the
    current best price by matching against standing limit orders; no price limit;
    uncertainty in the execution price; pay for the bid-ask spread |

    | Limit order | Limit price, trading direction, and volume | Guaranteed to buy/sell
    an asset at the specified limit price or better for a buy/sell limit order; execution
    not guaranteed; order is shelved into the LOB if not executable; different marketability
    |

    | Stop order | Stop price, trading direction, and volume | Market order with a
    stop price; executed in the direction of asset price movement; applicable for
    both entering a position and already in a position |

    | Stop-limit order | Stop price, limit price, trading direction, and volume |
    A limit order is contingent on a preset stop price and a limit price; execution
    is not guaranteed |

    | Pegged order | Reference price, offset, trading direction, and volume | A limit
    order with a dynamic limit price; consists of a cancelation order and a new limit
    order when reference price changes |

    | Trailing stop order | Trailing amount, trading direction, and volume | Dynamic
    stop order; trailing stops only move if the price moves favorably |

    | Market if touched order | Trigger price, trading direction, and volume | A market
    order to buy (sell) below (above) the market; buy when the price falls or sell
    when the price rises |


    ### More Order Types: Limit and Cancelation


    There exist some other order types. For example, fill or kill (`FOK`) is a conditional
    type of order used in securities trading that instructs a brokerage to execute
    a transaction immediately and completely (the fill part) or not at all (the kill
    part). With `FOK`, the limit order is either completely filled at a specified
    or better price or completely canceled. It combines an all-or-none (`AON`) specification
    indicating it must be filled entirely; if not, it will be canceled. `FOK` orders
    are often used when a trader wants to ensure that a large order is executed quickly
    and fully without partial fills. This type of order is more suitable for large
    orders or illiquid markets, where a trader wants to avoid the risk of moving the
    market price.


    Similarly, fill and kill (`FAK`) is a limit order that is executed against any
    existing orders at the stated limit price or better, up to the volume of the order.
    Any residual volume from this order is then immediately canceled. `FAK` orders
    are useful when a trader wants to take advantage of short-term market opportunities
    without leaving an open order on the books. `FAK` orders provide a balance between
    getting an immediate fill for the desired quantity, but without the all-or-none
    restriction of an `FOK` order.


    Both `FOK` and `FAK` orders can be useful in specific trading scenarios, depending
    on the trader’s objectives and market conditions. These conditional order types
    offer greater control over trade executions and can help traders manage risk and
    capture market opportunities more effectively.


    In addition, in high-frequency trading (`HFT`), an “immediate or cancel” (`IOC`)
    order is a type of order that must be executed as soon as it is placed in the
    market. The unfilled portion is immediately canceled when the order cannot be
    fully executed.


    ### Price Impact


    It is important to note the potential price impact of large market orders, which
    tend to move prices. And the reason is the lack of sufficient liquidity for large
    orders to fill at the best price. Large market orders can have a significant impact
    on prices, especially when there is insufficient liquidity at the best price level.
    This phenomenon is known as price slippage, which occurs when the actual execution
    price of an order differs from the expected price due to insufficient liquidity.


    For example, suppose that a 10K-share market buy order arrives, and the best offer
    is $100 for 5K shares. Half the order will fill at $100, but the next 5K shares
    will have to fill at the next price in the book, say at $100.02 (where we assume
    there are also 5K shares offered). The volume-weighted average price for the order
    will be $100.01, which is larger than $100.00. Thus, the price might move further
    following the trade.


    To mitigate the impact of large market orders on prices, traders can consider
    using alternative order types or strategies, such as using limit orders to control
    the price at which their orders get executed or iceberg orders that divide large
    orders into smaller parts, thus reducing the visibility of the order’s total size.'
