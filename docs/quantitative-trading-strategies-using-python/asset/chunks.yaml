    Hedgers are typically involved in the production, processing, or consumption of
    the underlying asset, and they use futures contracts to manage their exposure
    to fluctuations in the asset’s price. By locking in a predetermined price for
    the asset, they can reduce the risk of unexpected price changes impacting their
    operations or profitability. For example, an airline company might hedge against
    rising fuel prices by entering into a futures contract to buy oil at a specific
    price in the future. This ensures that the company’s fuel costs remain predictable,
    regardless of market volatility.


    Speculators, in contrast, are primarily interested in profiting from price fluctuations
    in the underlying asset. Since many commodity prices tend to move in predictable
    ways, many speculators (traders and fund managers) aim to make a profit by trading
    futures, even if they do not have a direct interest in the underlying commodity.
    They do not typically have a direct stake in the production, processing, or consumption
    of the asset. Instead, they trade futures contracts to capitalize on their market
    predictions and generate profits. Speculators use futures to bet on the price
    movement of the underlying asset. This provides liquidity to the futures market,
    as their trading activity helps to create a market for hedgers to enter and exit
    positions. By taking on the risk of price changes, speculators can earn a return
    on their investment if their predictions are accurate.'
  trans: '

    ### 期货合约的参数


    标准化的期货合约包含以下四个参数：


    -   `合约乘数`

    -   `合约价值`

    -   `保证金`

    -   `到期日`


    让我们详细看看这些参数。期货合约的`合约乘数`规定了投资者在建立期货头寸时必须交易的基础资产数量。期货合约中需要交易的数量必须是最小数量的预定倍数。`合约乘数`决定了构成单份期货合约的基础资产的预定数量。该`合约乘数`确保了期货合约的标准化，并使其易于在交易所进行交易。以苹果股票的期货合约为例。假设苹果期货的`合约乘数`为
    100。因此，任何期货合约都将以 100 股的倍数出现。


    `合约价值`以基础资产的形式指定了期货合约的总货币价值，计算方法为`合约乘数`乘以基础资产的当前市场价格。该价值代表了投资者在合约中头寸的名义敞口。假设苹果股票的交易价格为每股
    125 美元。因此，苹果期货合约的总合约价值将等于 12,500 美元（125 美元 × 100），假设该期货合约要求投资者购买一手（100 股）苹果股票。`合约价值`是`合约乘数`与资产价格的乘积。


    `保证金`是投资者为建立期货合约头寸而存入的金额，由`初始保证金`和`维持保证金`组成。`初始保证金`是开立保证金账户所需的初始存款金额，而`维持保证金`是期货交易所为维持期货头寸并使其保持开仓状态所需的最低金额。因此，我们不需要支付全部合约价值即可建立期货头寸。我们所要做的就是向经纪人存入合约价值所需的初始保证金，以签署期货合约。保证金在建立期货合约时被冻结，在退出合约时解冻。因此，这些保证金有助于降低交易对手风险，并确保双方都能履行其在合同下的义务。


    `到期日`是期货合约的交割/结算日期，可通过实物交割或现金结算完成。每份期货合约都有时间限制，并在到期日后终止存在。期货投资者需要在到期日或之前平仓或展期其期货头寸，以避免结算。


    理解这些参数对于希望交易期货合约的投资者至关重要，因为它们决定了合约的结构、风险状况以及潜在的投资回报。通过仔细考虑`合约乘数`、`合约价值`、`保证金`要求和`到期日`，投资者可以调整其期货头寸，以符合其特定的财务目标和风险承受能力。


    ### 套期保值与投机


    参与期货合约有两个目的。第一个目的是投机，因为期货合约允许投资者对基础资产的价格变动方向进行投机。第二个目的是套期保值，以帮助防止因不利的价格变动而造成的损失。这构成了市场上的两类参与者：套期保值者和投机者。


    套期保值是生产商和制造商的常见做法，他们希望通过锁定未来产品或原材料的价格来确保稳定的生产过程。通过签订期货合约来保证商品出售或购买的价格，套期保值者确保他们以满意的价格交易该商品，从而对冲市场变化的风险。


    套期保值者通常参与基础资产的生产、加工或消费，他们利用期货合约来管理其面临资产价格波动的风险。通过锁定资产的预定价格，他们可以降低因价格意外变动而影响其运营或盈利能力的风险。例如，一家航空公司可能会通过签订未来以特定价格购买石油的期货合约来对冲燃油价格上涨的风险。这确保了公司的燃油成本保持可预测性，无论市场波动如何。


    相比之下，投机者主要对从基础资产的价格波动中获利感兴趣。由于许多商品价格往往以可预测的方式变动，许多投机者（交易员和基金经理）旨在通过交易期货来获利，即使他们对基础商品没有直接兴趣。他们通常不直接参与资产的生产、加工或消费。相反，他们交易期货合约是为了利用其市场预测并产生利润。投机者利用期货来押注基础资产的价格走势。这为期货市场提供了流动性，因为他们的交易活动有助于为套期保值者创造进入和退出头寸的市场。通过承担价格变动的风险，投机者如果预测准确，就可以获得投资回报。

    '
- fmt: '### Obligations at Maturity


    There are two types of settlement upon expiration of a futures (and options) contract:
    physical delivery and cash settlement. Such derivative contracts will either be
    physically delivered or cash-settled.


    The first type is the physical delivery of the underlying asset. A deliverable
    futures contract stipulates that the buyer in the long position of the futures
    contract will pay the agreed-upon price to the seller, who in turn will deliver
    the underlying asset to the buyer on the predetermined date (settlement date of
    the futures contract). This process is called delivery, where the actual underlying
    asset needs to be delivered upon the specified delivery date, rather than being
    traded out with offsetting contracts.


    For example, a buyer enters a one-year crude oil futures contract with an opposing
    seller at a price of $60. We know that one futures contract corresponds to 1000
    barrels of crude oil. This means the buyer is obligated to purchase 1000 barrels
    of crude oil from the seller, regardless of the commodity’s spot price on the
    settlement date. If the spot price of the crude oil on the agreed settlement date
    one year later is below $58, the long contract holder loses a total of ($60 –
    $58) × $1000 = $2000, and the short position holder gains $2000. Conversely, if
    the spot price rises to $65 per barrel, the long position holder gains ($65 –
    $60) × $1000 = $5000, and the short position holder loses $5000.


    The second type is cash settlement. When a futures contract is cash-settled, the
    net cash position of the contract on the expiry date is transferred between the
    buyer and the seller. It permits the buyer and seller to pay the net cash value
    of the position on the delivery date.


    Take the previous case, for example. When the spot price of the crude oil drops
    to $58, the long position holder will lose $2000, which happens by debiting $2000
    from the buyer’s account and crediting this amount to the seller’s account. On
    the other hand, when the spot price rises to $65, the account of the long position
    holder will be credited $5000, which comes from debiting the account of the short
    position holder.


    It is important to understand that the majority of futures contracts are not held
    until maturity, and most participants in the futures market do not actually take
    or make delivery of the underlying asset. Instead, they are traded out before
    the settlement date. Traders and investors often choose to close their positions
    before the contract’s expiration date to avoid the obligations associated with
    physical delivery or cash settlement. This can be achieved by entering into an
    offsetting transaction that effectively cancels out the original position. For
    example, a trader with a long position in a futures contract can sell an identical
    contract to offset the position, while a trader with a short position can buy
    an identical contract to close the position.


    The process of closing out a futures position before maturity is a common practice
    in the market, as it allows participants to lock in gains or limit losses without
    having to deal with the actual delivery or cash settlement of the underlying asset.
    This flexibility is one of the key features of futures trading, as it enables
    market participants to manage their risk exposure and capitalize on market opportunities
    efficiently.


    In conclusion, while futures contracts carry obligations at maturity in the form
    of physical delivery or cash settlement, most participants in the futures market
    choose to close their positions before the expiration date. By engaging in offsetting
    transactions, traders and investors can effectively manage their risk exposure
    and profit from price movements in the underlying asset without having to deal
    with the logistics of taking or making the delivery.


    ### Leverage in a Futures Contract


    As we already know, we only need to deposit a certain margin in the margin account
    to enter a futures contract. This means that high leverage can be used in the
    futures market. The higher the leverage, the higher the risk, and the higher the
    potential profit.


    Let us continue with the previous example. Say we enter a futures contract on
    Apple’s stock that allows us to buy 100 shares at $125 per share, with an initial
    margin of $1000. The total contract value is $125 × 100 = $12,500. If the stock
    price goes up to $140, the contract value becomes $140 × 100 = $14,000, with the
    additional $1,500 amount credited to our margin account due to daily settlement.
    We made a profit of $1,000 by blocking an initial deposit of $1,000.


    Suppose now the price of Apple’s stock goes down to $110. The total contract value
    becomes $110 × 100 = $11,000, registering a loss of $1500. We would get a margin
    call to deposit another ($1000 – $1500 + $1500) = $1000 to bring it back to the
    amount required by the initial margin.


    Leverage is a double-edged sword in the futures market, as it can amplify both
    gains and losses. It allows investors and traders to control a larger contract
    value with a smaller amount of capital through the use of margin. While leverage
    can significantly increase potential profits, it can also lead to substantial
    losses if the market moves against the trader’s position.


    When utilizing leverage, it is crucial for market participants to employ proper
    risk management strategies to protect their capital. This may involve using stop-loss
    orders to limit potential losses or closely monitoring the position to ensure
    the margin requirements are met. Clearly, this is a zero-sum game. Money moves
    from the losers to the winners on a daily basis. The profit made by the buyer
    is equivalent to the loss made by the seller and vice versa.'
