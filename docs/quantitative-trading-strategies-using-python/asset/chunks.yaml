- fmt: 'The result shows a long list of information about Microsoft, useful for our
    initial analysis of a particular stock. Note that all this information is structured
    in the form of a dictionary, making it easy for us to access a specific piece
    of information. For example, the following code snippet prints the market cap
    of the stock:


    ```

    # access a specific attribute from the dictionary

    >>> msft.info["marketCap"]

    ```


    Such structured information, also considered metadata in this context, comes in
    handy when we analyze multiple tickers together.


    Now let us focus on the actual stock data of Microsoft. In Listing [1-2](#605529_1_En_1_Chapter.xhtml#PC5),
    we download the stock price data of Microsoft from the beginning of 2022 till
    the current date. Here, the current date is determined automatically by the `today()`
    function from the `datetime` package, which means we will obtain a different (bigger)
    result every time we run the code on a future date. We also specify the format
    of the date to be “YYYY-mm-dd,” an important practice to unify the date format.


    ```

    # download daily stock price data by passing in specified ticker and date range

    from datetime import datetime

    today_date = datetime.today().strftime(''%Y-%m-%d'')

    print(today_date)

    data = yf.download("MSFT", start="2022-01-01", end=today_date)

    Listing 1-2

    Downloading stock price data

    ```


    We can examine the first few rows by calling the `head()` function of the DataFrame.
    The resulting table contains price-related information such as open, high, low,
    close, and adjustment close prices, along with the daily trading volume:


    ```

    # view the first few rows.

    >>> data.head()

    Open       High       Low        Close      Adj Close  Volume

    Date

    2022-01-03 335.350006 338.000000 329.779999 334.750000 331.642456 28865100

    2022-01-04 334.829987 335.200012 326.119995 329.010010 325.955750 32674300

    2022-01-05 325.859985 326.070007 315.980011 316.380005 313.442993 40054300

    2022-01-06 313.149994 318.700012 311.489990 313.880005 310.966217 39646100

    2022-01-07 314.149994 316.500000 310.089996 314.040009 311.124725 32720000

    ```


    We can also view the last few rows using the `tail()` function:


    ```

    >>> data.tail()

    Open       High       Low        Close      Adj Close  Volume

    Date

    2022-12-30 238.210007 239.960007 236.660004 239.820007 239.820007 21930800

    2023-01-03 243.080002 245.750000 237.399994 239.580002 239.580002 25740000

    2023-01-04 232.279999 232.869995 225.960007 229.100006 229.100006 50623400

    2023-01-05 227.199997 227.550003 221.759995 222.309998 222.309998 39585600

    2023-01-06 223.000000 225.759995 219.350006 224.929993 224.929993 43597700

    ```


    It is also a good habit to check the dimension of the DataFrame using the `shape()`
    function:


    ```

    # check data dimension/size

    >>> data.shape

    (254, 6)

    ```


    The following section will look at visualizing the time series data via interactive
    charts.


    ## Visualizing Stock Price Data


    The `plotly` package is an interactive graphing library that supports exploratory
    and expository visualizations. Let us demonstrate its use via a few examples,
    focusing on the stock’s closing price for now.


    First, let us visualize the closing price as a time series plot. As the name suggests,
    a time series is a sequence of data with a timestamp in each data point. Thus,
    when plotted on a graph, the horizontal axis indicates the time that flows from
    left to right, and the vertical axis represents the quantity of interest, that
    is, the daily closing price. Also, since each timestamp corresponds to one stand-alone
    point on the graph, we will connect all neighboring points via straight lines
    to form the final time series plot and show the trending patterns.


    Listing [1-3](#605529_1_En_1_Chapter.xhtml#PC9) completes this task. Here, we
    pass the index of the DataFrame to indicate the dates on the x-axis (passed to
    the `x` argument) and the closing pricing on the y-axis (passed to the `y` argument)
    and specify the presentation mode to be in lines.


    ```

    # plot closing price as a time series chart

    import plotly.graph_objects as go

    fig = go.Figure(data=go.Scatter(x=data.index,y=data[''Close''], mode=''lines''))

    fig.show()

    Listing 1-3

    Plotting the daily closing price

    ```


    Running the code produces Figure [1-8](#605529_1_En_1_Chapter.xhtml#Fig8). Note
    that the graph is interactive; by hovering over each point, the corresponding
    date and closing price come forward.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig8_HTML.jpg)


    A line graph of the daily closing price versus months. It has a fluctuating descending
    curve. The labeled point on a peak is (August 18, 2023, 290.17).


    Figure 1-8


    Interactive time series plot of the daily closing price of Microsoft


    We can also enrich the graph by overlaying the trading volume information, as
    shown in Listing [1-4](#605529_1_En_1_Chapter.xhtml#PC10).


    ```

    # overlay the trading volume

    from plotly.subplots import make_subplots

    fig2 = make_subplots(specs=[[{"secondary_y": True}]])

    fig2.add_trace(go.Scatter(x=data.index,y=data[''Close''],name=''Price''),secondary_y=False)

    fig2.add_trace(go.Bar(x=data.index,y=data[''Volume''],name=''Volume''),secondary_y=True)

    fig2.show()

    Listing 1-4

    Overlaying trading volume in the daily closing price chart

    ```


    Running the code generates Figure [1-9](#605529_1_En_1_Chapter.xhtml#Fig9). Note
    that the trading volume assumes a secondary y-axis on the right, by setting `secondary_y=True`.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig9_HTML.jpg)


    A dual y-axis clustered bar line graph of daily closing price and trading volume
    versus months. It has a fluctuating descending curve for the daily closing price.
    The bars for the trading volume have a fluctuating trend. A labeled point on a
    high bar is (October 26, 2023, 82.5432 millions).


    Figure 1-9


    Visualizing the daily closing price and trading volume of Microsoft


    Based on this graph, a few bars stand out, making it difficult to see the line
    chart. Let us change it by controlling the magnitude of the secondary y-axis.
    Specifically, we can enlarge the total magnitude of the right y-axis to make these
    bars appear shorter, as shown in Listing [1-5](#605529_1_En_1_Chapter.xhtml#PC11).


    ```

    # rescale volume

    fig2.update_yaxes(range=[0,500000000],secondary_y=True)

    fig2.update_yaxes(visible=True, secondary_y=True)

    fig2

    Listing 1-5

    Rescaling the y-axis

    ```


    Running the code generates Figure [1-10](#605529_1_En_1_Chapter.xhtml#Fig10).
    Now the bars appear shorter given a bigger range (0 to 500M) of the y-axis on
    the right.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig10_HTML.jpg)


    A dual y-axis clustered bar line graph of daily closing price and trading volume
    versus months. It has a fluctuating descending curve for the daily closing price.
    The bars for the trading volume have a fluctuating trend. The bars are shorter
    due to a larger range of 0 to 500 millions.


    Figure 1-10


    Controlling the magnitude of the daily trading volume as bars'
