    def optimize_acqf_and_get_observation(acq_func):

    """Optimizes the acquisition function, and returns a new candidate and a noisy
    observation."""

    # optimize

    candidates, value = optimize_acqf(

    acq_function=acq_func,

    bounds=bounds,

    q=BATCH_SIZE,

    num_restarts=NUM_RESTARTS,

    raw_samples=RAW_SAMPLES,  # used for intialization heuristic

    )

    # observe new values

    new_x = candidates.detach()

    # sample output value

    new_y = qts(entry_threshold=new_x.squeeze()[0].item(), exit_threshold=new_x.squeeze()[1].item())

    # add output dimension

    new_y = torch.Tensor([new_y], device=device).to(dtype).unsqueeze(-1)

