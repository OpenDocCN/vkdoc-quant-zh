    Note that we can use the augmented Dickey-Fuller (ADF) test to check if a series
    is a stationary. The function `stationarity_test()` defined in Listing [8-3](#605529_1_En_8_Chapter.xhtml#PC4)
    accepts two inputs: the time series to be tested for stationarity and the significant
    level used to compare with the p-value and determine the statistical significance.
    Note that the p-value is accessed as the second argument from the test result
    object using the `adfuller()` function. This is shown in Listing [8-3](#605529_1_En_8_Chapter.xhtml#PC4).


    ```

    # test for stationarity

    def stationarity_test(x, threshold=0.05):

    """

    input:

    x: a list of scalar values

    threshold: significance level

    output: print out message on stationarity

    """

    pvalue = adfuller(x)[1]

    if pvalue < threshold:

    return ''p-value is '' + str(pvalue) + ''. The series is likely stationary.''

    else:

    return ''p-value is '' + str(pvalue) + ''. The series is likely non-stationary.''

    Listing 8-3

    Testing stationarity of a time series

    ```


    Let us apply this function to the previous time series data. The result shows
    that the ADF is able to differentiate if a time series is stationary (with fixed
    parameters) based on a preset significance level:


    ```

    >>> print(stationarity_test(stationary_list))

    >>> print(stationarity_test(nonstationary_list1))

    >>> print(stationarity_test(nonstationary_list2))

    p-value is 1.2718058919122438e-12\. The series is likely stationary.

    p-value is 0.9925665941220737\. The series is likely non-stationary.

    p-value is 0.9120355459829741\. The series is likely non-stationary.

    ```


    Let us look at a concrete example of how to test for cointegration between two
    stocks.


    ### Test for Cointegration


    This section provides an example of performing the cointegration test using the
    Engle-Granger two-step method. Here’s a general overview of the steps involved:


    *   Estimate the coefficients of the linear regression model between one stock
    (as the dependent variable) and the other stock (as the independent variable)
    using ordinary least squares (OLS).


    *   Calculate the residuals from the linear regression model.


    *   Test the residuals for stationarity using a unit root test, such as the augmented
    Dickey-Fuller (ADF) test.


    *   If the residuals are stationary, the two stocks are cointegrated. If the residuals
    are non-stationary, the two stocks are not cointegrated.


    Let us illustrate the procedure using two stocks: Google and Microsoft. Listing
    [8-4](#605529_1_En_8_Chapter.xhtml#PC6) imports necessary packages and downloads
    the daily stock prices for the whole year of 2022\. We will use the adjusted closing
    price for the cointegration test.


    ```

    import os

    import random

    import numpy as np

    import yfinance as yf

    import pandas as pd

    from statsmodels.tsa.stattools import adfuller

    from statsmodels.regression.linear_model import OLS

    import statsmodels.api as sm

    from matplotlib import pyplot as plt

    %matplotlib inline

    SEED = 8

    random.seed(SEED)

    np.random.seed(SEED)

    # download data from yfinance

    start_date  = "2022-01-01"

    end_date  = "2022-12-31"

    stocks = [''GOOG'',''MSFT'']

    df = yf.download(stocks, start=start_date, end=end_date)[''Adj Close'']

    >>> df.head()

    GOOG       MSFT

    Date

    2022-01-03 145.074493 330.813873

    2022-01-04 144.416504 325.141357

    2022-01-05 137.653503 312.659882

    2022-01-06 137.550995 310.189301

    2022-01-07 137.004501 310.347382

    Listing 8-4

    Importing packages and downloading stock data

    ```


    Now we dig into the linear regression model between these two stocks. We will
    treat Google stock as the (only) independent variable and Microsoft stock as the
    dependent variable to be predicted. The model assumes the following form:


    ![$$ y={\beta}_0+{\beta}_1x+\epsilon $$](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Equc.png)


    where *β*[0] denotes the intercept and *β*[1] is the slope of the linear line
    fitted between these two stocks. *ϵ* represents the random noise that is not modeled
    by the predictor *x*. Note that we are assuming a linear relationship between
    *x* and *y*, which is unlikely to be the case in a real-world environment. Another
    name for *ϵ* is the residual, which is interpreted as the (vertical) distance
    between the predicted value *β*[0] + *β*[1]*x* and the target value *y*. That
    is, *ϵ* = *y* − (*β*[0] + *β*[1]*x*).


    Our focus would then shift to these residuals, with the intention of assessing
    if the residual time series would be stationary. Let us first obtain the residuals
    from the linear regression model.


    In Listing [8-5](#605529_1_En_8_Chapter.xhtml#PC7), we assign the first stock
    as the target variable `Y` and the second stock as the predictor variable `X`.
    We then use the `add_constant()` function to add a column of ones to the `X` variable,
    which can also be considered as the bias trick to incorporate the intercept term
    *β*[0]. Next, we construct a linear regression model object using the `OLS()`
    function, perform learning by invoking the `fit()` function, and calculate the
    residuals as the difference between the target values and the predicted values,
    obtained via the `predict()` method.


    ```

    # build linear regression model

    # Extract prices for two stocks of interest

    # target var: Y; predictor: X

    Y = df[stocks[0]]

    X = df[stocks[1]]

    # estimate linear regression coefficients of stock1 on stock2

    X_with_constant = sm.add_constant(X)

    model = OLS(Y, X_with_constant).fit()

    residuals = Y - model.predict()

    Listing 8-5

    Extracting residuals from OLS

    ```


    The model object is essentially a collection of the model weights (also called
    parameters) and the architecture that governs how the data flow from the input
    to the output. Let us access the model weights:'
