- fmt: '### Annualizing Returns


    Once we know how to calculate the terminal return of any asset, the next question
    is comparing assets with different periods of time. For example, some returns
    are daily, while other returns are monthly, quarterly, or yearly. The answer is
    annualization, where we annualize the returns to the same time scale of a year
    for a fair comparison.


    Annualizing returns is a crucial step in comparing the performance of assets with
    different investment horizons. By converting returns to an annualized basis, we
    can more easily evaluate and compare the performance of various assets on a standardized
    time scale. This process helps to level the playing field and facilitate informed
    decision-making.


    The overall process for annualizing returns is as follows:


    - Calculate the `1+R` formatted return for the given period.

    - Raise the `1+R` formatted return to the power of the number of periods per year.

    - Subtract one to convert the result from the `1+R` format back to the return
    itself.


    Let us look at an example. Suppose we have an asset that generates a monthly return
    of 1%. To calculate the annualized return, we need to enlarge the time horizon
    to a year. However, simply multiplying 12 by 1% is incorrect. To proceed with
    the sequential compounding process, we would construct the `1+R` formatted return
    (`1 + 0.01`) for each month, multiply across all 12 months to reach `(1 + 0.01)^(12)`,
    and finally subtract by one to give `(1 + 0.01)^(12) − 1 ≈ 12.68%`, which is higher
    than 12%. Calculating the annualized return thus involves deriving the `1+R` formatted
    return, multiplying these returns by the number of periods per year, and subtracting
    by one to convert from `1+R` to `R`.


    This calculation shows that the annualized return is 12.68%, which is higher than
    simply multiplying the 1% monthly return by 12. This difference is due to the
    compounding effect, which is an essential factor to consider when annualizing
    returns.


    ### Calculating Single-Period Returns from Price Data


    We often start with the price data of an asset, and there is a process to calculate
    the returns. This section will demonstrate how to achieve this.


    The following command creates a list of three price points, which will be used
    to calculate different returns similar to the previous two-period return example:


    ```

    prices = [0.1, 0.2, -0.05]

    ```


    The first-period return can be calculated based on the first two price points.
    We would first obtain the `1+R` formatted return and then subtract by one to switch
    to the normal return:


    ```

    >>> prices[1]/prices[0] – 1

    1.0

    ```


    Similarly, we can calculate the second-period normal return as follows:


    ```

    >>> prices[2]/prices[1] – 1

    -1.25

    ```


    When the list gets large, it would be inconvenient to calculate these single-period
    returns by hand. A more convenient approach is to borrow the idea of shifting
    the prices. Shifting can be done via proper indexing in a list. For example, the
    following code snippet subsets the last two and first two prices, respectively:


    ```

    >>> print(prices[1:])

    [0.2, -0.05]

    >>> print(prices[:-1])

    [0.1, 0.2]

    ```


    Now we can do division for the corresponding elements in one shot. However, we
    need to convert both lists to NumPy arrays in order for the element-wise multiplication
    to work:


    ```

    >>> print(np.array(prices[1:])/np.array(prices[:-1])-1)

    [ 1\.   -1.25]

    ```


    Another approach is to rely on the Pandas ecosystem, which implements a lot of
    NumPy calculations under the hood. Let us convert the list to a Pandas DataFrame
    by converting a dictionary, the same technique used earlier:


    ```

    prices_df = pd.DataFrame({"price":prices})

    >>> prices_df

    price

    0    0.10

    1    0.20

    2   -0.05

    ```


    A common method to subset a Pandas DataFrame is via the `iloc()` method, which
    returns the elements based on the positional indexes at both row and column levels.
    The following code snippet selects the last two and first two elements, respectively:


    ```

    >>> prices_df.iloc[1:]

    price

    1    0.20

    2   -0.05

    >>> prices_df.iloc[:-1]

    price

    0    0.1

    1    0.2

    ```


    Pay attention to the indexes in the first column here. These are the default row-level
    indexes assigned upon creating the Pandas DataFrame, and these indexes remain
    unchanged even after the subsetting operation. Having misaligned indexes could
    easily lead to problems when trying to combine two DataFrames. In this case, we
    would end up with an unwanted result when we divide these two DataFrames:


    ```

    >>> prices_df.iloc[1:]/prices_df.iloc[:-1]

    price

    0    NaN

    1    1.0

    2    NaN

    ```


    The reason behind this seemingly irregular behavior is that both DataFrames are
    trying to locate the corresponding element with the *same* index. When the counterparty
    cannot be found, a `NaN` value shows up.


    To correct this, we can extract the value attribute only from these DataFrames.
    We only need to do this for one DataFrame as the other will be converted to the
    format of the value automatically. The following code snippet shows the way to
    go, where the result is the same as before:


    ```

    >>> prices_df.iloc[1:].values/prices_df.iloc[:-1] – 1

    price

    0    1.00

    1   -1.25

    >>> prices_df.iloc[1:]/prices_df.iloc[:-1].values – 1

    price

    1    1.00

    2   -1.25

    ```


    Let us stay with the shifting operation a bit longer. It turns out that there
    is a function with the same name. For example, to shift the prices downward by
    one unit, we can pass one to the `shift()` function of the Pandas DataFrame object
    as follows:


    ```

    >>> prices_df.shift(1)

    price

    0    NaN

    1    0.1

    2    0.2

    ```


    Notice that the first element is filled with `NaN` since there is no value before
    the first price. We can then divide the original DataFrame by the shifted DataFrame
    to obtain the sequence of single-period `1+R` formatted returns and subtract by
    one to get the normal return:


    ```

    >>> prices_df/prices_df.shift(1) - 1

    price

    0    NaN

    1    1.00

    2   -1.25

    ```


    Finally, we have one more utility function that helps us perform these calculations
    in one shot. The function is `pct_change()`, which calculates the percentage change
    between two consecutive values in the DataFrame:


    ```

    returns_df = prices_df.pct_change()

    >>> returns_df

    price

    0    NaN

    1    1.00

    2   -1.25

    ```


    Again, the first entry is `NaN` as there is no prior price point.


    Next, we move on to calculating the cumulative two-period terminal return.


    ### Calculating Two-Period Terminal Return


    The terminal return comes from compounding the previous single-period returns.
    In the case of a single-period horizon, the terminal return is the same as the
    single-period return. In the following example, we are calculating the two-period
    terminal return using a simple DataFrame (`returns_df`) containing single-period
    returns. The process involves the following steps:


    - Convert the single-period returns to the `1+R` format by adding one.

    - Calculate the product of the `1+R` formatted returns.

    - Subtract one to convert the result back to the terminal return.


    Specifically, to calculate the two-period terminal return, we first obtain the
    `1+R` formatted single-period returns:


    ```

    >>> returns_df + 1

    price

    0    NaN

    1    2.00

    2   -0.25

    ```


    We then call the `prod()` function from NumPy to multiply all elements in an array,
    ignoring the `NaN` value. This gets us the `1+R` formatted terminal return, from
    which we subtract one to convert to the normal terminal return:


    ```

    >>> np.prod(returns_df + 1) – 1

    price   -1.5

    dtype: float64

    ```


    There is also a corresponding Pandas way, which gives the same result:


    ```

    >>> (returns_df+1).prod() – 1

    price   -1.5

    dtype: float64

    ```'
  raw: '### Annualizing Returns


    Once we know how to calculate the terminal return of any asset, the next question
    is comparing assets with different periods of time. For example, some returns
    are daily, while other returns are monthly, quarterly, or yearly. The answer is
    annualization, where we annualize the returns to the same time scale of a year
    for a fair comparison.


    Annualizing returns is a crucial step in comparing the performance of assets with
    different investment horizons. By converting returns to an annualized basis, we
    can more easily evaluate and compare the performance of various assets on a standardized
    time scale. This process helps to level the playing field and facilitate informed
    decision-making.


    The overall process for annualizing returns is as follows:


    *   Calculate the 1+R formatted return for the given period.


    *   Raise the 1+R formatted return to the power of the number of periods per year.


    *   Subtract one to convert the result from the 1+R format back to the return
    itself.


    Let us look at an example. Suppose we have an asset that generates a monthly return
    of 1%. To calculate the annualized return, we need to enlarge the time horizon
    to a year. However, simply multiplying 12 by 1% is incorrect. To proceed with
    the sequential compounding process, we would construct the 1+R formatted return
    (1 + 0.01) for each month, multiply across all 12 months to reach (1 + 0.01)^(12),
    and finally subtract by one to give (1 + 0.01)^(12) − 1 ≈ 12.68%, which is higher
    than 12%. Calculating the annualized return thus involves deriving the 1+R formatted
    return, multiplying these returns by the number of periods per year, and subtracting
    by one to convert from 1+R to R.


    This calculation shows that the annualized return is 12.68%, which is higher than
    simply multiplying the 1% monthly return by 12\. This difference is due to the
    compounding effect, which is an essential factor to consider when annualizing
    returns.


    ### Calculating Single-Period Returns from Price Data


    We often start with the price data of an asset, and there is a process to calculate
    the returns. This section will demonstrate how to achieve this.


    The following command creates a list of three price points, which will be used
    to calculate different returns similar to the previous two-period return example:


    ```

    prices = [0.1, 0.2, -0.05]

    ```


    The first-period return can be calculated based on the first two price points.
    We would first obtain the 1+R formatted return and then subtract by one to switch
    to the normal return:


    ```

    >>> prices[1]/prices[0] – 1

    1.0

    ```


    Similarly, we can calculate the second-period normal return as follows:


    ```

    >>> prices[2]/prices[1] – 1

    -1.25

    ```


    When the list gets large, it would be inconvenient to calculate these single-period
    returns by hand. A more convenient approach is to borrow the idea of shifting
    the prices. Shifting can be done via proper indexing in a list. For example, the
    following code snippet subsets the last two and first two prices, respectively:


    ```

    >>> print(prices[1:])

    [0.2, -0.05]

    >>> print(prices[:-1])

    [0.1, 0.2]

    ```


    Now we can do division for the corresponding elements in one shot. However, we
    need to convert both lists to NumPy arrays in order for the element-wise multiplication
    to work:


    ```

    >>> print(np.array(prices[1:])/np.array(prices[:-1])-1)

    [ 1\.   -1.25]

    ```


    Another approach is to rely on the Pandas ecosystem, which implements a lot of
    NumPy calculations under the hood. Let us convert the list to a Pandas DataFrame
    by converting a dictionary, the same technique used earlier:


    ```

    prices_df = pd.DataFrame({"price":prices})

    >>> prices_df

    price

    0    0.10

    1    0.20

    2   -0.05

    ```


    A common method to subset a Pandas DataFrame is via the `iloc()` method, which
    returns the elements based on the positional indexes at both row and column levels.
    The following code snippet selects the last two and first two elements, respectively:


    ```

    >>> prices_df.iloc[1:]

    price

    1    0.20

    2   -0.05

    >>> prices_df.iloc[:-1]

    price

    0    0.1

    1    0.2

    ```


    Pay attention to the indexes in the first column here. These are the default row-level
    indexes assigned upon creating the Pandas DataFrame, and these indexes remain
    unchanged even after the subsetting operation. Having misaligned indexes could
    easily lead to problems when trying to combine two DataFrames. In this case, we
    would end up with an unwanted result when we divide these two DataFrames:


    ```

    >>> prices_df.iloc[1:]/prices_df.iloc[:-1]

    price

    0    NaN

    1    1.0

    2    NaN

    ```


    The reason behind this seemingly irregular behavior is that both DataFrames are
    trying to locate the corresponding element with the *same* index. When the counterparty
    cannot be found, a `NaN` value shows up.


    To correct this, we can extract the value attribute only from these DataFrames.
    We only need to do this for one DataFrame as the other will be converted to the
    format of the value automatically. The following code snippet shows the way to
    go, where the result is the same as before:


    ```

    >>> prices_df.iloc[1:].values/prices_df.iloc[:-1] – 1

    price

    0    1.00

    1   -1.25

    >>> prices_df.iloc[1:]/prices_df.iloc[:-1].values – 1

    price

    1    1.00

    2   -1.25

    ```


    Let us stay with the shifting operation a bit longer. It turns out that there
    is a function with the same name. For example, to shift the prices downward by
    one unit, we can pass one to the `shift()` function of the Pandas DataFrame object
    as follows:


    ```

    >>> prices_df.shift(1)

    price

    0    NaN

    1    0.1

    2    0.2

    ```


    Notice that the first element is filled with `NaN` since there is no value before
    the first price. We can then divide the original DataFrame by the shifted DataFrame
    to obtain the sequence of single-period 1+R formatted returns and subtract by
    one to get the normal return:


    ```

    >>> prices_df/prices_df.shift(1) - 1

    price

    0    NaN

    1    1.00

    2   -1.25

    ```


    Finally, we have one more utility function that helps us perform these calculations
    in one shot. The function is `pct_change()`, which calculates the percentage change
    between two consecutive values in the DataFrame:


    ```

    returns_df = prices_df.pct_change()

    >>> returns_df

    price

    0    NaN

    1    1.00

    2   -1.25

    ```


    Again, the first entry is `NaN` as there is no prior price point.


    Next, we move on to calculating the cumulative two-period terminal return.


    ### Calculating Two-Period Terminal Return


    The terminal return comes from compounding the previous single-period returns.
    In the case of a single-period horizon, the terminal return is the same as the
    single-period return. In the following example, we are calculating the two-period
    terminal return using a simple DataFrame (`returns_df`) containing single-period
    returns. The process involves the following steps:


    *   Convert the single-period returns to the 1+R format by adding one.


    *   Calculate the product of the 1+R formatted returns.


    *   Subtract one to convert the result back to the terminal return.


    Specifically, to calculate the two-period terminal return, we first obtain the
    1+R formatted single-period returns:


    ```

    >>> returns_df + 1

    price

    0    NaN

    1    2.00

    2   -0.25

    ```


    We then call the `prod()` function from NumPy to multiply all elements in an array,
    ignoring the `NaN` value. This gets us the 1+R formatted terminal return, from
    which we subtract one to convert to the normal terminal return:


    ```

    >>> np.prod(returns_df + 1) – 1

    price   -1.5

    dtype: float64

    ```


    There is also a corresponding Pandas way, which gives the same result:


    ```

    >>> (returns_df+1).prod() – 1

    price   -1.5

    dtype: float64

    ```'
