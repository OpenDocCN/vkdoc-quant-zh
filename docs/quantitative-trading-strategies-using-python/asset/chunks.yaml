- fmt: '### Model Development Workflow


    A typical model development workflow starts with some training data. The training
    data consists of input-output pairs in supervised learning tasks where both input
    and output data are given. Each input entry could contain multiple features that
    describe the same observation from different perspectives. The corresponding output
    has the true target, acting as the correct answer to guide the training process.
    Model training aims to generate a mapping function, a model, that correctly maps
    a given input to the corresponding output.


    A trained model consists of two parts: parameters and architecture. Parameters
    are the integral components of a model, and the architecture specifies how these
    components interact with the input data to produce the final prediction output.
    This predicted value is then compared with the ground truth target to make an
    error metric jointly. Here, the error indicates the current cost on how close
    or far away it is between the prediction and the actual value. Following a particular
    optimization procedure, the training process adjusts the model parameters for
    a given architecture to reduce the training cost. After changing the weights,
    the new error is calculated again, forming a feedback loop. The whole model training
    process is depicted in Figure [1-2](#605529_1_En_1_Chapter.xhtml#Fig2).


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig2_HTML.jpg)


    A process diagram with 4 main steps. Training data with input features and target
    labels gives a model that includes parameters and architecture, followed by prediction
    and cost. Cost undergoes optimization and goes into the model. A description of
    each step is given.


    **Figure 1-2** Example of a typical model training process. The workflow starts
    with the available training data and gradually tunes a model. The tuning process
    requires matching the model prediction to the target output, where the gap is
    measured by a particular cost function and used as feedback for the next round
    of tuning. Each tuning produces a new model, and we want to look for one that
    minimizes the cost.


    Now let us look at a specific type of algorithmic trading at large institutions:
    institutional algorithmic trading.


    ### Institutional Algorithmic Trading


    Since the underlying decision model could be a black box, algorithmic trading
    is also called automated trading, black-box trading, or robo-trading. It is used
    to generate and execute orders in markets with electronic access. In the context
    of large institutions, hedge funds, and trading desks, the trading volume is often
    quite large. In this case, institutional algorithmic trading often seeks to break
    up large orders into smaller ones to reduce the *execution risk*, which refers
    to the case when a large order cannot be fulfilled in the market.


    Besides preserving anonymity in transactions, large institutions also use algorithmic
    trading to minimize the price impact of a trade. This is because even if a large
    order is executable, it is difficult to guarantee that the market price will not
    be impacted due to the execution of the large order. Thus, the main objective
    of institutional algorithmic trading is to control the market risk and the execution
    cost rather than gaining profits.


    When executing a large order by an institutional investor, the demand for a large
    amount of liquidity will typically affect the cost of the trade negatively. This
    is called *slippage*, which refers to situations when a market participant receives
    a different execution price than initially intended. This could happen for many
    instruments, including stocks, bonds, currencies, and derivatives.


    To execute these block trades anonymously without generating a noticeable impact
    in the market, large institutions often involve *dark pools* to carry out these
    trades. Dark pools are private exchanges that execute orders from institutional
    investors away from the central stock exchanges, thus exhibiting little transparency
    in the transactional process.


    These large institutional orders, when split into small-sized orders, are also
    called *iceberg orders*. By partially exposing the tip of an iceberg, the majority
    of the orders could remain hidden and transition into visible orders afterward,
    thus minimizing the disruption to the trading market as opposed to a single large
    order. These smaller orders will then be executed electronically over minutes,
    hours, or days. To minimize the impact of these orders, institutional investors
    would trade more at the market opens and closes when the trading volume is relatively
    high and less during a slow period around lunchtime.


    Let us look at a simple example of generating a small subset of iceberg orders
    from the original orders using Python. In Listing [1-1](#605529_1_En_1_Chapter.xhtml#PC1),
    we create a list of ten random integers saved in `total_order` to indicate all
    the orders to be executed by an institutional investor. We can randomly sample
    two indexes and use them to access the corresponding elements in `total_order`
    and save in `iceberg_order`, representing the iceberg orders to be exposed to
    the market.


    ```

    # generate multiple random integers

    total_order = [random.randint(0, 10) for p in range(0, 10)]

    >>> total_order

    [9, 6, 4, 3, 7, 6, 3, 0, 0, 6]

    # randomly sample two indexes to identify iceberg orders

    iceberg_order_idx = random.sample(total_order, 2)

    >>> iceberg_order_idx

    [0, 4]

    # retrieve iceberg orders

    iceberg_order = np.array(total_order)[iceberg_order_idx]

    iceberg_order

    array([9, 7])

    ```


    **Listing 1-1** Generating iceberg orders


    The institutional algorithmic strategies generate optimal trading signals by analyzing
    daily quotes and prices. For example, an institutional algorithmic strategy may
    suggest entering a long position if the current stock price moves from below to
    above the *volume-weighted average price (VWAP)* over a day, a technical indicator
    often used by short-term traders. The institutional algorithmic strategies may
    also exploit *arbitrage* opportunities or price spreads between correlated securities.
    Here, arbitrage means making positive sure profits with zero investments. Arbitrage
    opportunities, if exist, would normally disappear very fast as many hedge funds
    and investors are constantly looking for such arbitrage opportunities.


    The next section briefly introduces the role of a quant trader.


    ### Being a Quant Trader


    A quant trader is a specialized trader that uses mathematical models and quantitative
    analysis to evaluate different financial products and identify trading opportunities
    to buy or sell the best securities out of hundreds of thousands of candidates.
    Quant traders make use of data-driven methods to make model-based trading decisions,
    seeking to exploit temporary inefficiencies and underlying patterns in the market
    that may not be easily discernible through traditional qualitative analysis.


    The first attribute of an aspiring quant trader is familiarity with numbers and
    mathematical models. As the majority of the time is spent on analyzing the data,
    proposing, backtesting, and implementing trading strategies to either buy, sell,
    or hold specific security, a quant trader needs to be comfortable with both mathematical
    models and programming, which often requires an advanced degree in financial modeling
    or related field. When a positive signal pops up, the quant trader needs to act
    swiftly using self-developed programs to capitalize on the current trading opportunities.


    The second attribute lies in soft skills such as handling high pressure with a
    good temperament. This requires good emotional intelligence to neither assume
    too much risk nor be overly risk averse. Knowing when to exit a position and stop
    loss is a critical skill that requires discipline in daily trading activities.


    The following section covers the major asset classes and various tradable instruments.'
