- fmt: '### Parameters of a Futures Contract


    A standardized futures contract features the following four parameters:


    - `Lot size`

    - `Contract value`

    - `Margin`

    - `Expiration date`


    Let us look at these parameters in detail. The `lot size` of a futures contract
    specifies the quantity of the underlying asset that an investor will have to trade
    upon entering a futures position. The quantity to be traded in the futures contract
    must be a predetermined multiple of the minimum quantity. The `lot size` determines
    the predefined quantity of the underlying asset to form a single futures contract.
    This `lot size` ensures that futures contracts are standardized and easily tradable
    on exchanges. Take the futures contract of Apple’s shares, for example. Say the
    `lot size` for Apple’s future is 100. Therefore, any futures contract would come
    in a multiple of 100 shares.


    The `contract value` specifies the total monetary value of the futures contract
    in terms of the underlying asset, calculated by multiplying the `lot size` by
    the current market price of the underlying asset. This value represents the notional
    exposure of the investor’s position in the contract. Suppose Apple stock is trading
    at $125 per share. Thus, the total contractual value of Apple’s futures contract
    will be equal to $12,500 ($125 × 100), assuming the futures contract obligates
    the investor to purchase one lot (100 shares) of Apple’s stock. The `contract
    value` is the product of the `lot size` and the asset price.


    `Margin` is the amount of deposit from the investor to enter a futures contract
    position, consisting of an `initial margin` and a `maintenance margin`. The `initial
    margin` is the initial amount of deposit to open the margin account, and the `maintenance
    margin` is the minimum amount required by the futures exchange in order to maintain
    the futures position and keep it open. Therefore, we do not need the entire contract
    value to get into a futures position. All we need to do is to deposit the required
    initial margin of the contract value with the broker to sign the futures contract.
    The margin is blocked upon entering a futures contract and released upon exiting
    it. These margins thus help to mitigate counterparty risk and ensure that both
    parties can fulfill their obligations under the contract.


    The `expiration date` is the date of delivery/settlement for the futures contract,
    via either physical delivery or cash settlement. Each futures contract is time-bound
    and ceases to exist after the expiration date. A futures investor needs to close
    or roll over the futures position on or before the expiration date to avoid settlement.


    Understanding these parameters is crucial for investors who wish to trade futures
    contracts, as they determine the contract’s structure, risk profile, and potential
    return on investment. By carefully considering the `lot size`, `contract value`,
    `margin` requirements, and `expiration date`, investors can tailor their futures
    positions to align with their specific financial goals and risk tolerance.


    ### Hedging and Speculation


    There are two purposes when engaging in a futures contract. The first purpose
    is speculation, as a futures contract allows the investor to speculate on the
    direction of movement for the underlying asset. The second purpose is hedging,
    so as to help prevent losses from unfavorable price changes. This constitutes
    the two types of participants in the market: hedgers and speculators.


    Hedging is a common practice for producers and manufacturers who wish to ensure
    a stable production process by locking the price of products or raw materials
    in the future. By entering a futures contract to guarantee the price at which
    the commodity is sold or purchased, hedgers ensure that they transact the commodity
    at a satisfactory price, thus hedging against any changes in the market.


    Hedgers are typically involved in the production, processing, or consumption of
    the underlying asset, and they use futures contracts to manage their exposure
    to fluctuations in the asset’s price. By locking in a predetermined price for
    the asset, they can reduce the risk of unexpected price changes impacting their
    operations or profitability. For example, an airline company might hedge against
    rising fuel prices by entering into a futures contract to buy oil at a specific
    price in the future. This ensures that the company’s fuel costs remain predictable,
    regardless of market volatility.


    Speculators, in contrast, are primarily interested in profiting from price fluctuations
    in the underlying asset. Since many commodity prices tend to move in predictable
    ways, many speculators (traders and fund managers) aim to make a profit by trading
    futures, even if they do not have a direct interest in the underlying commodity.
    They do not typically have a direct stake in the production, processing, or consumption
    of the asset. Instead, they trade futures contracts to capitalize on their market
    predictions and generate profits. Speculators use futures to bet on the price
    movement of the underlying asset. This provides liquidity to the futures market,
    as their trading activity helps to create a market for hedgers to enter and exit
    positions. By taking on the risk of price changes, speculators can earn a return
    on their investment if their predictions are accurate.'
