- fmt: "### Formulating the Trading Strategy\n\nAs introduced earlier, the pairs trading\
    \ strategy utilizes the z-scores to generate trading signals in the face of short-term\
    \ fluctuations in the spread, taking long and short positions in two cointegrated\
    \ assets and profiting from the long-term mean reversion of the spread.\n\nThe\
    \ trading signals are generated when the z-score obtained from the previous section\
    \ crosses over a specific threshold. For example, we can long the first stock\
    \ and short the second stock when the z-score is below –2, meaning that the spread\
    \ is more negative than usual, and there is a good chance that the spread will\
    \ revert back to its mean in the long run. Similarly, we can short the first stock\
    \ and long the second stock when the z-score is above 2, suggesting that the spread\
    \ is more positive than usual and there is a good chance that the spread will\
    \ go back to its mean. These constitute our entry signals.\n\nOn the other hand,\
    \ when we are in an open position, the stock may move in an adverse direction\
    \ in a very small amount of time. To protect our profit and stop the loss, we\
    \ can place an exit signal that serves as a stop-loss order. For example, assume\
    \ we entered a long position when the z-score was below –2 in the previous step.\
    \ We can set up another threshold to exit the position when the z-score returns\
    \ to a small value, say –1. Crossing this threshold indicates that the spread\
    \ has reverted back to its mean.\n\nThe following list summarizes the formulation\
    \ of trading signals for entering and exiting the long and short positions:\n\n\
    - **Long entry**: Enter a long position in the first stock when the z-score is\
    \ below a preset negative threshold value (say –2).\n- **Long exit**: Exit the\
    \ long position in the first stock when the z-score crosses above another preset\
    \ negative threshold value (say –1).\n- **Short entry**: Enter a short position\
    \ in the second stock when the z-score is above a preset positive threshold value\
    \ (say 2).\n- **Short exit**: Exit the short position in the second stock when\
    \ the z-score crosses below another preset positive threshold value (say 1).\n\
    \nTo manage these four types of signals in implementation, we could maintain a\
    \ `Pandas Series` object for each stock, where each value is either 1 (for long),\
    \ –1 (for short), or 0 (for exit position). To simplify the process, we also assume\
    \ that the long and short positions for each stock are also entered and exited\
    \ together. In other words, upon entering a long position for one stock, we would\
    \ enter a short position in the other stock at the same time.\n\nFigure [8-9](#605529_1_En_8_Chapter.xhtml#Fig9)\
    \ overlays these four trading signals in the previous z-score time series. The\
    \ outer thresholds 2 and –2 represent entry signals for long and short positions,\
    \ and the inner thresholds 1 and –1 represent the exit signals for existing positions.\
    \ In between these two thresholds, we simply maintain the current position.\n\n\
    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig9_HTML.jpg)\n\nA line graph\
    \ of z-scores versus date. It has a horizontally fluctuating curve with sharp\
    \ and high peaks and dips. It has 4 horizontal lines at z-scores, negative 2,\
    \ negative 1, 1, and 2. It also presents the trading signals for the 5 ranges\
    \ created between the horizontal lines.\n\n**Figure 8-9** – Illustrating the process\
    \ of formulating trading signals based on preset entry and exit thresholds for\
    \ the z-scores\n\nIn Listing [8-12](#605529_1_En_8_Chapter.xhtml#PC21), we first\
    \ initialize the entry and exit thresholds, respectively. We create two `Pandas\
    \ Series` objects (`stock1_position` and `stock2_position`) to store the daily\
    \ positions for each stock. Based on the current z-score and present thresholds\
    \ for entering and exiting long or short positions, we check the daily z-score\
    \ in a loop and match it to one of the four cases for signal generation based\
    \ on the following rule:\n\n- Long stock 1 and short stock 2 if the z-score is\
    \ below –2 and stock 1 has no prior position.\n- Short stock 1 and long stock\
    \ 2 if the z-score is above 2 and stock 2 has no prior position.\n- Exit the position\
    \ in both stock 1 and stock 2 if the z-score is between –1 and 1.\n- Maintain\
    \ the position in both stock 1 and stock 2 for the rest of the cases, that is,\
    \ the z-score is between –2 and –1 or between 1 and 2.\n\n```\n# set the threshold\
    \ values for entry and exit signals\nentry_threshold = 2.0\nexit_threshold = 1.0\n\
    # initialize the daily positions to be zeros\nstock1_position = pd.Series(data=0,\
    \ index=zscore.index)\nstock2_position = pd.Series(data=0, index=zscore.index)\n\
    # generate daily entry and exit signals for each stock\nfor i in range(1, len(zscore)):\n\
    \    # zscore2 and no existing short position for stock 2\n    elif zscore[i]\
    \ > entry_threshold and stock2_position[i-1] == 0:\n        stock1_position[i]\
    \ = -1 # short stock 1\n        stock2_position[i] = 1 # long stock 2\n    # -1<zscore<1\n\
    \    elif abs(zscore[i]) < exit_threshold:\n        stock1_position[i] = 0 # exit\
    \ existing position\n        stock2_position[i] = 0\n    # -2<zscore<-1 or 1<zscore<2\n\
    \    else:\n        stock1_position[i] = stock1_position[i-1] # maintain existing\
    \ position\n        stock2_position[i] = stock2_position[i-1]\n```\n\n**Listing\
    \ 8-12** – Implementing pairs trading\n\nWe can now calculate the overall profit\
    \ of the pairs trading strategy. In Listing [8-13](#605529_1_En_8_Chapter.xhtml#PC22),\
    \ we first obtain the daily percentage changes using the `pct_change()` function\
    \ for each stock, starting from the index with a valid value. These daily returns\
    \ will be adjusted according to the position we held from the previous trading\
    \ day. In other words, multiplying the shifted positions with the daily returns\
    \ gives the strategy’s daily returns for each stock, filling possible NA values\
    \ with zero. Finally, we add up the daily returns from the two stocks, convert\
    \ them to `1+R` returns, and perform the sequential compounding procedure using\
    \ the `cumprod()` function to obtain the wealth index.\n\n```\n# Calculate the\
    \ returns of each stock\nstock1_returns = (df[\"GOOG\"][first_valid_idx:].pct_change()\
    \ * stock1_position.shift(1)).fillna(0)\nstock2_returns = (df[\"MSFT\"][first_valid_idx:].pct_change()\
    \ * stock2_position.shift(1)).fillna(0)\n# calculate the total returns of the\
    \ strategy\ntotal_returns = stock1_returns + stock2_returns\ncumulative_returns\
    \ = (1 + total_returns).cumprod()\n# plot the cumulative returns\n>>> cumulative_returns.plot()\n\
    ```\n\n**Listing 8-13** – Calculating the cumulative return\n\nRunning the code\
    \ generates Figure [8-10](#605529_1_En_8_Chapter.xhtml#Fig10).\n\n![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig10_HTML.jpg)\n\
    \nA line graph of cumulative returns versus date. It has a step-up fluctuating\
    \ ascending curve between January 2022 to January 2023.\n\n**Figure 8-10** – Cumulative\
    \ returns of the pairs trading strategy\n\nThe terminal return, extracted via\
    \ the following code, shows that the pairs trading strategy delivers a total of\
    \ 14.1% profit at the end of the trading year.\n\nAgain, this result is subject\
    \ to more rigorous backtesting in terms of the selection of investment assets,\
    \ trading periods, and evaluation metrics.\n\n## Summary\n\nIn this chapter, we\
    \ covered the concept of statistical arbitrage and hypothesis testing, as well\
    \ as the implementation details based on the pairs trading strategy. We first\
    \ walked through the overall process of developing a pairs trading strategy and\
    \ introduced new concepts such as cointegration and stationarity. Next, we compared\
    \ cointegration and correlation, both closely related but drastically different.\
    \ Last, we introduced a case study on calculating the cumulative return using\
    \ the pairs trading strategy.\n\nIn the next chapter, we will introduce Bayesian\
    \ optimization, a principled way to search for optimal parameters of a trading\
    \ strategy."
  raw: '### Formulating the Trading Strategy


    As introduced earlier, the pairs trading strategy utilizes the z-scores to generate
    trading signals in the face of short-term fluctuations in the spread, taking long
    and short positions in two cointegrated assets and profiting from the long-term
    mean reversion of the spread.


    The trading signals are generated when the z-score obtained from the previous
    section crosses over a specific threshold. For example, we can long the first
    stock and short the second stock when the z-score is below –2, meaning that the
    spread is more negative than usual, and there is a good chance that the spread
    will revert back to its mean in the long run. Similarly, we can short the first
    stock and long the second stock when the z-score is above 2, suggesting that the
    spread is more positive than usual and there is a good chance that the spread
    will go back to its mean. These constitute our entry signals.


    On the other hand, when we are in an open position, the stock may move in an adverse
    direction in a very small amount of time. To protect our profit and stop the loss,
    we can place an exit signal that serves as a stop-loss order. For example, assume
    we entered a long position when the z-score was below –2 in the previous step.
    We can set up another threshold to exit the position when the z-score returns
    to a small value, say –1\. Crossing this threshold indicates that the spread has
    reverted back to its mean.


    The following list summarizes the formulation of trading signals for entering
    and exiting the long and short positions:


    *   Long entry: Enter a long position in the first stock when the z-score is below
    a preset negative threshold value (say –2).


    *   Long exit: Exit the long position in the first stock when the z-score crosses
    above another preset negative threshold value (say –1).


    *   Short entry: Enter a short position in the second stock when the z-score is
    above a preset positive threshold value (say 2).


    *   Short exit: Exit the short position in the second stock when the z-score crosses
    below another preset positive threshold value (say 1).


    To manage these four types of signals in implementation, we could maintain a Pandas
    Series object for each stock, where each value is either 1 (for long), –1 (for
    short), or 0 (for exit position). To simplify the process, we also assume that
    the long and short positions for each stock are also entered and exited together.
    In other words, upon entering a long position for one stock, we would enter a
    short position in the other stock at the same time.


    Figure [8-9](#605529_1_En_8_Chapter.xhtml#Fig9) overlays these four trading signals
    in the previous z-score time series. The outer thresholds 2 and –2 represent entry
    signals for long and short positions, and the inner thresholds 1 and –1 represent
    the exit signals for existing positions. In between these two thresholds, we simply
    maintain the current position.


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig9_HTML.jpg)


    A line graph of z-scores versus date. It has a horizontally fluctuating curve
    with sharp and high peaks and dips. It has 4 horizontal lines at z-scores, negative
    2, negative 1, 1, and 2\. It also presents the trading signals for the 5 ranges
    created between the horizontal lines.


    Figure 8-9


    Illustrating the process of formulating trading signals based on preset entry
    and exit thresholds for the z-scores


    In Listing [8-12](#605529_1_En_8_Chapter.xhtml#PC21), we first initialize the
    entry and exit thresholds, respectively. We create two Pandas Series objects (`stock1_position`
    and `stock2_position`) to store the daily positions for each stock. Based on the
    current z-score and present thresholds for entering and exiting long or short
    positions, we check the daily z-score in a loop and match it to one of the four
    cases for signal generation based on the following rule:


    *   Long stock 1 and short stock 2 if the z-score is below –2 and stock 1 has
    no prior position.


    *   Short stock 1 and long stock 2 if the z-score is above 2 and stock 2 has no
    prior position.


    *   Exit the position in both stock 1 and stock 2 if the z-score is between –1
    and 1.


    *   Maintain the position in both stock 1 and stock 2 for the rest of the cases,
    that is, the z-score is between –2 and –1 or between 1 and 2.


    ```

    # set the threshold values for entry and exit signals

    entry_threshold = 2.0

    exit_threshold = 1.0

    # initialize the daily positions to be zeros

    stock1_position = pd.Series(data=0, index=zscore.index)

    stock2_position = pd.Series(data=0, index=zscore.index)

    # generate daily entry and exit signals for each stock

    for i in range(1, len(zscore)):

    # zscore2 and no existing short position for stock 2

    elif zscore[i] > entry_threshold and stock2_position[i-1] == 0:

    stock1_position[i] = -1 # short stock 1

    stock2_position[i] = 1 # long stock 2

    # -1<zscore<1

    elif abs(zscore[i]) < exit_threshold:

    stock1_position[i] = 0 # exit existing position

    stock2_position[i] = 0

    # -2<zscore<-1 or 1<zscore<2

    else:

    stock1_position[i] = stock1_position[i-1] # maintain existing position

    stock2_position[i] = stock2_position[i-1]

    Listing 8-12

    Implementing pairs trading

    ```


    We can now calculate the overall profit of the pairs trading strategy. In Listing
    [8-13](#605529_1_En_8_Chapter.xhtml#PC22), we first obtain the daily percentage
    changes using the `pct_change()` function for each stock, starting from the index
    with a valid value. These daily returns will be adjusted according to the position
    we held from the previous trading day. In other words, multiplying the shifted
    positions with the daily returns gives the strategy’s daily returns for each stock,
    filling possible NA values with zero. Finally, we add up the daily returns from
    the two stocks, convert them to 1+R returns, and perform the sequential compounding
    procedure using the `cumprod()` function to obtain the wealth index.


    ```

    # Calculate the returns of each stock

    stock1_returns = (df["GOOG"][first_valid_idx:].pct_change() * stock1_position.shift(1)).fillna(0)

    stock2_returns = (df["MSFT"][first_valid_idx:].pct_change() * stock2_position.shift(1)).fillna(0)

    # calculate the total returns of the strategy

    total_returns = stock1_returns + stock2_returns

    cumulative_returns = (1 + total_returns).cumprod()

    # plot the cumulative returns

    >>> cumulative_returns.plot()

    Listing 8-13

    Calculating the cumulative return

    ```


    Running the code generates Figure [8-10](#605529_1_En_8_Chapter.xhtml#Fig10).


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig10_HTML.jpg)


    A line graph of cumulative returns versus date. It has a step-up fluctuating ascending
    curve between January 2022 to January 2023.


    Figure 8-10


    Cumulative returns of the pairs trading strategy


    The terminal return, extracted via the following code, shows that the pairs trading
    strategy delivers a total of 14.1% profit at the end of the trading year.


    Again, this result is subject to more rigorous backtesting in terms of the selection
    of investment assets, trading periods, and evaluation metrics.


    ## Summary


    In this chapter, we covered the concept of statistical arbitrage and hypothesis
    testing, as well as the implementation details based on the pairs trading strategy.
    We first walked through the overall process of developing a pairs trading strategy
    and introduced new concepts such as cointegration and stationarity. Next, we compared
    cointegration and correlation, both closely related but drastically different.
    Last, we introduced a case study on calculating the cumulative return using the
    pairs trading strategy.


    In the next chapter, we will introduce Bayesian optimization, a principled way
    to search for optimal parameters of a trading strategy.'
  trans: "\n### 制定交易策略\n\n如前所述，配对交易策略利用 z-score 来应对价差的短期波动，对两只协整资产进行多空操作，并从价差的长期均值回归中获利。\n\
    \n当上一节计算出的 z-score 穿过特定阈值时，就会产生交易信号。例如，当 z-score 低于 –2 时，我们可以做多第一只股票并做空第二只股票，这意味着价差比平时更负，且价差长期内很有可能回归其均值。同样，当\
    \ z-score 高于 2 时，我们可以做空第一只股票并做多第二只股票，这表明价差比平时更正，且价差很有可能回归其均值。这些构成了我们的入场信号。\n\n\
    另一方面，当我们持有一个未平仓头寸时，股票可能会在极短时间内朝不利方向移动。为了保护利润并止损，我们可以设置一个充当止损订单的离场信号。例如，假设我们在前一步\
    \ z-score 低于 –2 时建立了一个多头头寸。我们可以设置另一个阈值，当 z-score 返回一个小值（比如 –1）时平仓。穿过此阈值表明价差已回归其均值。\n\
    \n以下列表总结了建立和退出多头与空头头寸的交易信号制定规则：\n\n- **多头入场**：当 z-score 低于预设的负阈值（例如 –2）时，对第一只股票建立多头头寸。\n\
    - **多头离场**：当 z-score 向上穿过另一个预设的负阈值（例如 –1）时，平掉第一只股票的多头头寸。\n- **空头入场**：当 z-score\
    \ 高于预设的正阈值（例如 2）时，对第二只股票建立空头头寸。\n- **空头离场**：当 z-score 向下穿过另一个预设的正阈值（例如 1）时，平掉第二只股票的空头头寸。\n\
    \n在实现中管理这四种信号时，我们可以为每只股票维护一个`Pandas Series`对象，其中每个值为 1（代表多头）、–1（代表空头）或 0（代表平仓）。为简化流程，我们还假设每只股票的多头和空头头寸也是同时建立和同时平仓。换句话说，当对一只股票建立多头头寸时，我们会同时对另一只股票建立空头头寸。\n\
    \n图 8-9 将这四个交易信号叠加到了之前的 z-score 时间序列上。外部阈值 2 和 –2 代表多头和空头头寸的入场信号，内部阈值 1 和 –1 代表现有头寸的离场信号。在这两个阈值之间，我们仅维持当前头寸不变。\n\
    \n![](img/605529_1_En_8_Fig9_HTML.jpg)\n\n一张显示 z-score 相对于日期的折线图。曲线水平波动，伴有尖锐的高峰和低谷。在\
    \ z-score –2、–1、1 和 2 处有四条水平线。图中还对水平线之间划分出的 5 个区域内的交易信号进行了说明。\n\n**图 8-9** – 说明基于预设入场和离场阈值为\
    \ z-score 制定交易信号的过程\n\n在代码清单 8-12 中，我们首先分别初始化入场和离场阈值。我们创建两个 `Pandas Series` 对象（`stock1_position`\
    \ 和 `stock2_position`）来存储每只股票的每日头寸。基于当前的 z-score 以及建立或退出多头或空头头寸的预设阈值，我们在一个循环中检查每日的\
    \ z-score，并根据以下规则将其匹配到信号生成的四种情况之一：\n\n- 如果 z-score 低于 –2 且股票 1 没有先前头寸，则做多股票 1，做空股票\
    \ 2。\n- 如果 z-score 高于 2 且股票 2 没有先前头寸，则做空股票 1，做多股票 2。\n- 如果 z-score 介于 –1 和 1 之间，则平掉股票\
    \ 1 和股票 2 的头寸。\n- 其余情况，即 z-score 介于 –2 和 –1 之间或介于 1 和 2 之间时，维持股票 1 和股票 2 的现有头寸。\n\
    \n```\n# 设置入场和离场信号的阈值\nentry_threshold = 2.0\nexit_threshold = 1.0\n# 将每日头寸初始化为零\n\
    stock1_position = pd.Series(data=0, index=zscore.index)\nstock2_position = pd.Series(data=0,\
    \ index=zscore.index)\n# 为每只股票生成每日入场和离场信号\nfor i in range(1, len(zscore)):\n \
    \   # zscore2 and no existing short position for stock 2\n    elif zscore[i] >\
    \ entry_threshold and stock2_position[i-1] == 0:\n        stock1_position[i] =\
    \ -1 # 做空股票 1\n        stock2_position[i] = 1 # 做多股票 2\n    # -1<zscore<1\n  \
    \  elif abs(zscore[i]) < exit_threshold:\n        stock1_position[i] = 0 # 平掉现有头寸\n\
    \        stock2_position[i] = 0\n    # -2<zscore<-1 or 1<zscore<2\n    else:\n\
    \        stock1_position[i] = stock1_position[i-1] # 维持现有头寸\n        stock2_position[i]\
    \ = stock2_position[i-1]\n```\n\n**代码清单 8-12** – 实现配对交易\n\n现在我们就可以计算配对交易策略的总利润了。在代码清单\
    \ 8-13 中，我们首先使用每只股票的 `pct_change()` 函数，从有效索引开始，获取每日百分比变化。这些每日收益率将根据前一交易日持有的头寸进行调整。换句话说，将平移后的头寸与每日收益率相乘，得到该策略下每只股票的每日收益率，并将可能的\
    \ NA 值用零填充。最后，我们将两只股票的每日收益率相加，转换为 `1+R` 收益率，并使用 `cumprod()` 函数执行顺序复利计算，以获取财富指数。\n\
    \n```\n# 计算每只股票的收益率\nstock1_returns = (df[\"GOOG\"][first_valid_idx:].pct_change()\
    \ * stock1_position.shift(1)).fillna(0)\nstock2_returns = (df[\"MSFT\"][first_valid_idx:].pct_change()\
    \ * stock2_position.shift(1)).fillna(0)\n# 计算策略的总收益率\ntotal_returns = stock1_returns\
    \ + stock2_returns\ncumulative_returns = (1 + total_returns).cumprod()\n# 绘制累积收益曲线\n\
    >>> cumulative_returns.plot()\n```\n\n**代码清单 8-13** – 计算累积收益率\n\n运行上述代码生成图 8-10。\n\
    \n![](img/605529_1_En_8_Fig10_HTML.jpg)\n\n一张显示累积收益率相对于日期的折线图。曲线在 2022 年 1 月至\
    \ 2023 年 1 月期间呈阶梯式向上波动。\n\n**图 8-10** – 配对交易策略的累积收益率\n\n通过以下代码提取的最终收益率显示，配对交易策略在交易年度末实现了\
    \ 14.1% 的总利润。\n\n同样，这个结果还需要在投资资产选择、交易时段和评估指标方面进行更严格的回测。\n\n## 总结\n\n在本章中，我们介绍了统计套利和假设检验的概念，以及基于配对交易策略的实现细节。我们首先梳理了制定配对交易策略的总体流程，并介绍了协整和平稳性等新概念。接着，我们比较了协整和相关性的区别，两者密切相关但截然不同。最后，我们通过一个案例研究，介绍了如何使用配对交易策略计算累积收益率。\n\
    \n在下一章中，我们将介绍贝叶斯优化，这是一种用于搜索交易策略最优参数的原则性方法。\n"
