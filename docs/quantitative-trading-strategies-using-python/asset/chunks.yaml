- fmt: "为了更好地理解交易所每日盯市制度对不同持仓交易者日常动态的影响，让我们看一个具体例子。如图[3-3](#605529_1_En_3_Chapter.xhtml#Fig3)所示，我们绘制了多头和空头持仓者保证金账户的每日金额。两位交易者的初始保证金账户金额均为`$100`。鉴于第1天资产价值上涨，多头持仓者的保证金账户增加了`$5`（`$100\
    \ + $5 = $105`），而空头持仓者的保证金账户减少了`$5`（`$100 – $5 = $95`）。第2天，多头保证金账户的净变动为–`$20`，使其从`$105`降至`$85`，低于`$90`的最低要求（称为维持保证金）。多头交易者随后收到交易所的追加保证金通知，并补足`$15`，将其保证金账户增至`$100`，以满足初始保证金要求。空头交易者总共获利`$20`，当天结束时其保证金账户余额为`$115`。\n\
    \n![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig3_HTML.jpg)\n\n2条保证金账户金额随时间变化的折线图。1.\
    \ 对于多头持仓者，折线经过点(0, 100)、(1, 105)和(2, 85)。2. 对于空头持仓者，折线经过点(0, 100)、(1, 95)和(2,\
    \ 115)，并呈线性下降趋势。\n\n**图3-3**  \n因盯市操作导致多头和空头持仓者保证金账户每日变化的示例\n\n请注意，由于盯市操作产生的盈亏，保证金账户余额每日都会发生变化。尽管在交割日的最终结算价格可能与建立期货头寸时的预期价格不同，但双方交易者最终仍会以等于初始预期价格的有效价格进行交易，从而对冲价格波动的风险。\n\
    \n现在让我们来看看如何对这份衍生产品进行定价，从它的相似孪生兄弟——远期合约开始。\n\n### 远期合约定价\n\n远期合约是双方之间的一份可定制合约，约定在未来某一日期以指定价格买入或卖出某项资产。与每日结算直至合约结束的期货合约不同，远期合约仅在协议结束时结算，并且是在场外交易。因此，它更容易定价。\n\
    \n远期合约的价格是由买卖双方决定的标的资产的预定交割价格。这是将在未来预定日期支付的价格，由以下公式确定：\n\n![$$ {F}_0={S}_0{e}^{rT}\
    \ $$](images/605529_1_En_3_Chapter/605529_1_En_3_Chapter_TeX_Equa.png)\n\n其中，`F[0]`是当前时间点`t\
    \ = 0`时远期合约的价格，`S[0]`是`t = 0`时标的资产的价格。`r`是无风险债券利率，即零风险投资的理论回报率。`T`是当前时间点`t = 0`到到期日`t\
    \ = T`的持续时间。更一般地，我们可以将远期合约的价格写为：\n\n![$$ {F}_t={S}_t{e}^{r\\left(T-t\\right)}\
    \ $$](images/605529_1_En_3_Chapter/605529_1_En_3_Chapter_TeX_Equb.png)\n\n这里，乘以指数常数仅仅意味着根据基准利率`r`和持续时间`T\
    \ − t`，以连续复利方式增加远期合约的价格。换句话说，假设我们在银行存款`$1000`，银行承诺以连续复利利率`r`计息。那么我们可以预计，在第1年末存款总价值将增长到`1000*e^r`，在第2年末增长到`1000*e^(2r)`，以此类推。这是财务和会计中常见的一种复利计算方式。\n\
    \n现在让我们看看这个公式是如何形成的。其推理遵循无套利论据，该论据指出，无论标的资产价格如何变化，都不存在任何套利机会来赚取无风险利润。假设我们签订了一份远期多头合约，该合约要求我们在时间`T`以价格`F[T]`购买资产`S`。我们生活在当前时间点`t`，此时资产的现货价格为`S[t]`，资产的未来价格将为`S[T]`。协议的性质决定了我们在交割日的行动；因此，我们需要支付`F[T]`的金额来购买价值`S[T]`的资产。换句话说，我们在时间`T`的净利润/亏损（P&L）为`−F[T]\
    \ + S[T]`，其中负号表示现金流出。请注意，这发生在未来的时间`T`，而不是当前的时间`t`。\n\n然而，签订这份合约存在风险。由于未来资产价格会波动，资产价格可能因未来不可预见的情况而大幅下跌，导致交割时的P&L非常负面。尽管也可能出现相反情况，最终P&L可能非常正面，但这仍然构成潜在风险，尤其是对于前文提到的农民和制造商等市场参与者而言。\n\
    \n为了对冲这种风险，我们可以在时间`t`做空一单位该资产，因为我们知道如果资产价格下跌，空头头寸就能获利。标的资产的空头头寸使我们能够从未来因资产价格下跌而遭受的损失中获利。之所以是一单位标的资产，是因为我们可以利用根据远期协议购买的那一单位资产来平掉标的资产的初始空头头寸，即将资产归还给出借方。\n\
    \n现在我们更详细地审视这个过程。在时间`t`建立一单位标的资产的空头头寸时，我们会获得`S[t]`的现金流入，因为做空意味着卖出资产并在日后买回。这意味着在交割日，我们将有`S[T]`的现金流出，用于归还资产并平掉空头头寸。"
  raw: 'To better understand the daily dynamics for traders of different positions
    as a result of the daily mark-to-market exercise by the exchange, let us look
    at a concrete example. As shown in Figure [3-3](#605529_1_En_3_Chapter.xhtml#Fig3),
    we plot the daily amount of the margin account for both the long and short position
    holders. The initial amount in the margin account is $100 for both traders. Given
    the increase in asset value on day 1, a $5 increase in the margin account of the
    long position holder is realized ($100 + $5 = $105), while a $5 decrease for the
    short position holder enters ($100 – $5 = $95). On day 2, the net change is –$20
    for the long position margin account, bringing it from $105 to $85, lower than
    the minimum requirement (called maintenance margin) of $90\. The long position
    trader then gets a margin call from the exchange and tops up $15 to increase their
    margin account to $100, based on the required initial amount. The short position
    trader benefits a total of $20, ending with an end-of-day amount of $115 in their
    margin account.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig3_HTML.jpg)


    2 line graphs of the amount of margin account versus time. 1\. For a long position
    holder, the line passes through points, (0, 100), (1, 105), and (2, 85). 2\. For
    a short position holder, the line passes through points, (0, 100), (1, 95), and
    (2, 115) and descends linearly.


    Figure 3-3


    An example of daily changes in the margin account of long and short position traders
    due to mark-to-market


    Note that the margin account changes the balance daily due to gain/loss from mark-to-market
    exercise. Although the final settlement price at the delivery date could be different
    from the intended price upon entering the futures position, the traders on both
    sides would still end up transacting at an effective price equal to the initially
    intended price, thus hedging the risk of price fluctuations.


    Now let us look at how to price this derivative product, starting with its similar
    twin: forward contract.


    ### Pricing Forward Contract


    A forward contract is a customizable contract between two parties to buy or sell
    an asset at a specified price on a future date. Different from the futures contract,
    whose price is settled on a daily basis until the end of the contract, a forward
    contract is only settled at the end of the agreement and is traded over the counter.
    Therefore, it is easier to price.


    The price of a forward contract is the predetermined delivery price for the underlying
    asset decided by the buyer and the seller. This is the price to be paid at a predetermined
    date in the future and is determined by the following formula:


    ![$$ {F}_0={S}_0{e}^{rT} $$](images/605529_1_En_3_Chapter/605529_1_En_3_Chapter_TeX_Equa.png)


    where *F*[0] is the price of the forward contract at the current time point *t* = 0,
    and *S*[0] is the price of the underlying asset at *t* = 0\. *r* is the risk-free
    bond interest rate, the theoretical rate of return of an investment with zero
    risk. *T* is the duration from the current time point *t* = 0 to the expiration
    date *t* = *T*. More generally, we can write the price of the forward contract
    as follows:


    ![$$ {F}_t={S}_t{e}^{r\left(T-t\right)} $$](images/605529_1_En_3_Chapter/605529_1_En_3_Chapter_TeX_Equb.png)


    Here, multiplying the exponential constant simply means increasing the price of
    the forward contract, depending on the baseline interest rate *r* and the duration
    *T* − *t* in a continuously compounding scheme. In other words, suppose we deposit
    $1000 in a bank, which promises a continuously compounded interest rate of *r*.
    We can thus expect to see the total value of the deposit grow to 1000*e*^(*r*)
    at the end of year 1, 1000*e*^(2*r*) at the end of year 2, etc. This is a common
    way of compounding in finance and accounting.


    Now let us look at how this formula comes into shape. The reasoning follows the
    no-arbitrage argument, which says there is no arbitrage opportunity to make any
    riskless profit, no matter how the price of the underlying asset changes. Suppose
    we enter into a long forward contract that obligates us to buy the asset *S* at
    time *T* for a price of *F*[*T*]. We are living at the current time point *t*,
    where the spot price of the asset is *S*[*t*], and the future price of the asset
    will be *S*[*T*]. The nature of the agreement fixes the action for us at the delivery
    date; thus, we need to pay an amount of *F*[*T*] to purchase the asset valued
    at *S*[*T*]. In other words, our net profit/loss (P&L) at time *T* is −*F*[*T*] + *S*[*T*],
    where the negative sign means cash outflow. Note that this happens in the future
    at time *T* and not yet for now at time *t*.


    However, there is a risk involved upon entering this contract. Since the asset
    price fluctuates in the future, the asset price may drop a lot due to unforeseen
    circumstances in the future, leading to a very negative P&L upon delivery. Although
    the opposite could also be true and the final P&L could be very positive, this
    still poses a potential risk, especially for market participants such as farmers
    and manufacturers mentioned earlier.


    To hedge this risk, we could short one unit of this asset at time *t*, since we
    know that a short position makes a profit if the asset price drops. A short position
    in the underlying asset profits us from losses in the future due to a decrease
    in the future asset price. It is one unit of the underlying asset because we can
    use the exact one unit of the asset bought based on the forward agreement to close
    the initial short position in the underlying asset, that is, return the asset
    back to where we borrowed it from.


    Now we look at the process in more detail. Upon entering the short position of
    one unit of the underlying asset at time *t*, we obtain a cash inflow of *S*[*t*],
    as shorting means selling an asset and buying it back later. This means that we
    will have a cash outflow of *S*[*T*] at the delivery date to pay back the asset
    and close the short position.'
  trans: "\n为了更好地理解交易所每日盯市制度对不同持仓交易者日常动态的影响，让我们看一个具体例子。如图 3-3 所示，我们绘制了多头和空头持仓者保证金账户的每日金额。两位交易者的初始保证金账户金额均为`$100`。鉴于第\
    \ 1 天资产价值上涨，多头持仓者的保证金账户增加了`$5`（`$100 + $5 = $105`），而空头持仓者的保证金账户减少了`$5`（`$100 –\
    \ $5 = $95`）。第 2 天，多头保证金账户的净变动为–`$20`，使其从`$105`降至`$85`，低于`$90`的最低要求（称为维持保证金）。多头交易者随后收到交易所的追加保证金通知，并补足`$15`，将其保证金账户增至`$100`，以满足初始保证金要求。空头交易者总共获利`$20`，当天结束时其保证金账户余额为`$115`。\n\
    \n![](img/605529_1_En_3_Fig3_HTML.jpg)\n\n2 条保证金账户金额随时间变化的折线图。1. 对于多头持仓者，折线经过点(0,\
    \ 100)、(1, 105)和(2, 85)。2. 对于空头持仓者，折线经过点(0, 100)、(1, 95)和(2, 115)，并呈线性下降趋势。\n\n\
    **图 3-3**  \n因盯市操作导致多头和空头持仓者保证金账户每日变化的示例\n\n请注意，由于盯市操作产生的盈亏，保证金账户余额每日都会发生变化。尽管在交割日的最终结算价格可能与建立期货头寸时的预期价格不同，但双方交易者最终仍会以等于初始预期价格的有效价格进行交易，从而对冲价格波动的风险。\n\
    \n现在让我们来看看如何对这份衍生产品进行定价，从它的相似孪生兄弟——远期合约开始。\n\n### 远期合约定价\n\n远期合约是双方之间的一份可定制合约，约定在未来某一日期以指定价格买入或卖出某项资产。与每日结算直至合约结束的期货合约不同，远期合约仅在协议结束时结算，并且是在场外交易。因此，它更容易定价。\n\
    \n远期合约的价格是由买卖双方决定的标的资产的预定交割价格。这是将在未来预定日期支付的价格，由以下公式确定：\n\n![$$ {F}_0={S}_0{e}^{rT}\
    \ $$](img/605529_1_En_3_Chapter_TeX_Equa.png)\n\n其中，`F[0]`是当前时间点`t = 0`时远期合约的价格，`S[0]`是`t\
    \ = 0`时标的资产的价格。`r`是无风险债券利率，即零风险投资的理论回报率。`T`是当前时间点`t = 0`到到期日`t = T`的持续时间。更一般地，我们可以将远期合约的价格写为：\n\
    \n![$$ {F}_t={S}_t{e}^{r\\left(T-t\\right)} $$](img/605529_1_En_3_Chapter_TeX_Equb.png)\n\
    \n这里，乘以指数常数仅仅意味着根据基准利率`r`和持续时间`T − t`，以连续复利方式增加远期合约的价格。换句话说，假设我们在银行存款`$1000`，银行承诺以连续复利利率`r`计息。那么我们可以预计，在第\
    \ 1 年末存款总价值将增长到`1000*e^r`，在第 2 年末增长到`1000*e^(2r)`，以此类推。这是财务和会计中常见的一种复利计算方式。\n\n\
    现在让我们看看这个公式是如何形成的。其推理遵循无套利论据，该论据指出，无论标的资产价格如何变化，都不存在任何套利机会来赚取无风险利润。假设我们签订了一份远期多头合约，该合约要求我们在时间`T`以价格`F[T]`购买资产`S`。我们生活在当前时间点`t`，此时资产的现货价格为`S[t]`，资产的未来价格将为`S[T]`。协议的性质决定了我们在交割日的行动；因此，我们需要支付`F[T]`的金额来购买价值`S[T]`的资产。换句话说，我们在时间`T`的净利润/亏损（P&L）为`−F[T]\
    \ + S[T]`，其中负号表示现金流出。请注意，这发生在未来的时间`T`，而不是当前的时间`t`。\n\n然而，签订这份合约存在风险。由于未来资产价格会波动，资产价格可能因未来不可预见的情况而大幅下跌，导致交割时的\
    \ P&L 非常负面。尽管也可能出现相反情况，最终 P&L 可能非常正面，但这仍然构成潜在风险，尤其是对于前文提到的农民和制造商等市场参与者而言。\n\n\
    为了对冲这种风险，我们可以在时间`t`做空一单位该资产，因为我们知道如果资产价格下跌，空头头寸就能获利。标的资产的空头头寸使我们能够从未来因资产价格下跌而遭受的损失中获利。之所以是一单位标的资产，是因为我们可以利用根据远期协议购买的那一单位资产来平掉标的资产的初始空头头寸，即将资产归还给出借方。\n\
    \n现在我们更详细地审视这个过程。在时间`t`建立一单位标的资产的空头头寸时，我们会获得`S[t]`的现金流入，因为做空意味着卖出资产并在日后买回。这意味着在交割日，我们将有`S[T]`的现金流出，用于归还资产并平掉空头头寸。\n"
- fmt: "Note that the cash `S[t]` at time `t` will not sit idle. Instead, we will\
    \ invest the cash, such as depositing it in the bank to enjoy a risk-free interest\
    \ rate. The money will grow to `S[t] * e^(r * (T - t))` upon reaching the delivery\
    \ date, with an investment period of `T - t`. This investment will be used to\
    \ cover the short position in the underlying asset.\n\nFigure [3-4](#605529_1_En_3_Chapter.xhtml#Fig4)\
    \ summarizes the positions in different products and the total portfolio value\
    \ with the evolution of time. Here, we have three different products in our portfolio:\
    \ a forward contract, an asset (e.g., one share of stock), and cash. These three\
    \ constitute our portfolio, and we start with zero value in the portfolio at time\
    \ `t`. To see this, we observe that the forward position is zero at time `t` since\
    \ we only make the transaction upon reaching the delivery date. The stock position\
    \ gives `-S[t]` since we are shorting the stock, and the cash position gives `S[t]`,\
    \ the income generated by shorting the stock. Adding up the value of these three\
    \ positions gives zero value for the portfolio at time `t`. The net cash flow\
    \ at time `t` is zero.\n\n![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig4_HTML.jpg)\n\
    \n```\nA process diagram. Forward from 0 to negative F + S T. Stock to negative\
    \ S t to negative S T. Cash to S t to S t e to the power r times T minus t. Forward,\
    \ stock, and cash are summed up to form a portfolio that goes to 0 followed by\
    \ no arbitrage to give F equal to S t e to the power r times T minus t.\n```\n\
    \n**Figure 3-4**  \nPricing the forward contract in a long position using the\
    \ no-arbitrage argument. The stock and cash positions also constitute a replicating\
    \ portfolio that offsets the randomness in the payoff function of the forward\
    \ contract at the delivery date.\n\nAs time passes by, the value of each position\
    \ will evolve. Specifically, the forward position becomes `-F + S[T]` since we\
    \ would buy one asset valued at `S[T]` for a price of `F`. Our stock position\
    \ becomes `-S[T]` due to change in the stock price, and cash position becomes\
    \ `S[t] * e^(r * (T - t))`.\n\nNow, using the no-arbitrage argument, we would\
    \ end up with zero value in our portfolio since we started with zero value. Adding\
    \ the value of the three positions at time `T` gives the total portfolio value\
    \ of `-F + S[t] * e^(r * (T - t))`. And by equating it to zero, we have `F = S[t]\
    \ * e^(r * (T - t))`, thus completing the pricing of the forward contract using\
    \ the no-arbitrage argument.\n\nThis is the formula for the price of a forward\
    \ contract. It demonstrates that the forward price is determined by the current\
    \ price of the underlying asset, the risk-free interest rate, and the time until\
    \ the contract expires. By using this formula, both parties in a forward contract\
    \ can agree on a fair price that eliminates arbitrage opportunities and reflects\
    \ the true value of the underlying asset.\n\nIt is interesting to note that the\
    \ stock and cash positions jointly constitute a replicating portfolio that offsets\
    \ the randomness in the payoff function of the forward contract at the delivery\
    \ date. This means that no matter what the price of the forward contract will\
    \ be in the future, we will always be able to use another replicating portfolio\
    \ to deliver the same payoff, *as if* we were in a position of the forward contract.\
    \ This is called pricing by replication.\n\nLet us see what happens if the price\
    \ of the forward is not equal to the stock price with a continuously compounded\
    \ interest rate. We can argue about arbitrage opportunities based on the riskless\
    \ profit from the buy-low-sell-high principle. When `F > S[t] * e^(r * (T - t))`,\
    \ we can borrow an amount of `S[t]` and use the money to short a forward contract\
    \ that allows us to sell one unit of the underlying asset at price `F`. Upon reaching\
    \ the delivery date, we receive a total of `F` by selling the asset, pay back\
    \ the borrowed money with interest `S[t] * e^(r * (T - t))`, and earn a net profit\
    \ of `F - S[t] * e^(r * (T - t))`. This is arbitrage, where we made a riskless\
    \ profit by taking advantage of the price difference at the future time `T`.\n\
    \nSimilarly, when `F < S[t] * e^(r * (T - t))`, the forward contract is cheaper,\
    \ and the asset is more expensive. In that case, we again exercise the buy-low-sell-high\
    \ principle by longing a forward contract at time `t` that allows us to buy one\
    \ unit of the underlying asset at price `F` and time `T`. We will also short one\
    \ unit of the underlying asset at time `t` to gain a total amount of `S[t]`, which\
    \ further grows to `S[t] * e^(r * (T - t))` upon reaching the delivery date. When\
    \ the contract expires, we will close the short position in the underlying asset\
    \ by purchasing one unit of the asset for a price of `F`. We get to keep the remaining\
    \ balance `S[t] * e^(r * (T - t)) - F`, thus also establishing the arbitrage argument\
    \ and ensuring a riskless profit.\n\nNote that the futures price is equal to the\
    \ spot price of the underlying asset at the current time `t`. To see this, simply\
    \ set `T = t` and we have `F = S[t] * e^(r * (t - t)) = S[t]`.\n\nIn a nutshell,\
    \ the future net cash flow predetermined or fixed in advance (today) must equal\
    \ today’s net cash flow to annihilate arbitrage opportunities. The no-arbitrage\
    \ argument gives a fair price for the forward contract."
  raw: 'Note that the cash *S*[*t*] at time *t* will not sit idle. Instead, we will
    invest the cash, such as depositing t in the bank to enjoy a risk-free interest
    rate. The money will grow to *S*[*t*]*e*^(*r*(*T* − *t*)) upon reaching the delivery
    date, with an investment period of *T* − *t*. This investment will be used to
    cover the short position in the underlying asset.


    Figure [3-4](#605529_1_En_3_Chapter.xhtml#Fig4) summarizes the positions in different
    products and the total portfolio value with the evolution of time. Here, we have
    three different products in our portfolio: a forward contract, an asset (e.g.,
    one share of stock), and cash. These three constitute our portfolio, and we start
    with zero value in the portfolio at time *t*. To see this, we observe that the
    forward position is zero at time *t* since we only make the transaction upon reaching
    the delivery date. The stock position gives −*S*[*t*] since we are shorting the
    stock, and the cash position gives *S*[*t*], the income generated by shorting
    the stock. Adding up the value of these three positions gives zero value for the
    portfolio at time *t*. The net cash flow at time *t* is zero.


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig4_HTML.jpg)


    A process diagram. Forward from 0 to negative F + S T. Stock to negative S t to
    negative S T. Cash to S t to S t e to the power r times T minus t. Forward, stock,
    and cash are summed up to form a portfolio that goes to 0 followed by no arbitrage
    to give F equal to S t e to the power r times T minus t.


    Figure 3-4


    Pricing the forward contract in a long position using the no-arbitrage argument.
    The stock and cash positions also constitute a replicating portfolio that offsets
    the randomness in the payoff function of the forward contract at the delivery
    date


    As time passes by, the value of each position will evolve. Specifically, the forward
    position becomes −*F* + *S*[*T*] since we would buy one asset valued at *S*[*T*]
    for a price of *F*. Our stock position becomes −*S*[*T*] due to change in the
    stock price, and cash position becomes *S*[*t*]*e*^(*r*(*T* − *t*)).


    Now, using the no-arbitrage argument, we would end up with zero value in our portfolio
    since we started with zero value. Adding the value of the three positions at time
    *T* gives the total portfolio value of −*F* + *S*[*t*]*e*^(*r*(*T* − *t*)). And
    by equating it to zero, we have *F* = *S*[*t*]*e*^(*r*(*T* − *t*)), thus completing
    the pricing of the forward contract using the no-arbitrage argument.


    This is the formula for the price of a forward contract. It demonstrates that
    the forward price is determined by the current price of the underlying asset,
    the risk-free interest rate, and the time until the contract expires. By using
    this formula, both parties in a forward contract can agree on a fair price that
    eliminates arbitrage opportunities and reflects the true value of the underlying
    asset.


    It is interesting to note that the stock and cash positions jointly constitute
    a replicating portfolio that offsets the randomness in the payoff function of
    the forward contract at the delivery date. This means that no matter what the
    price of the forward contract will be in the future, we will always be able to
    use another replicating portfolio to deliver the same payoff, *as if* we were
    in a position of the forward contract. This is called pricing by replication.


    Let us see what happens if the price of the forward is not equal to the stock
    price with a continuously compounded interest rate. We can argue about arbitrage
    opportunities based on the riskless profit from the buy-low-sell-high principle.
    When *F* > *S*[*t*]*e*^(*r*(*T* − *t*)), we can borrow an amount of *S*[*t*] and
    use the money to short a forward contract that allows us to sell one unit of the
    underlying asset at price *F*. Upon reaching the delivery date, we receive a total
    of *F* by selling the asset, pay back the borrowed money with interest *S*[*t*]*e*^(*r*(*T* − *t*)),
    and earn a net profit of *F* − *S*[*t*]*e*^(*r*(*T* − *t*)). This is arbitrage,
    where we made a riskless profit by taking advantage of the price difference at
    the future time *T*.


    Similarly, when *F* < *S*[*t*]*e*^(*r*(*T* − *t*)), the forward contract is cheaper,
    and the asset is more expensive. In that case, we again exercise the buy-low-sell-high
    principle by longing a forward contract at time *t* that allows us to buy one
    unit of the underlying asset at price *F* and time *T*. We will also short one
    unit of the underlying asset at time *t* to gain a total amount of *S*[*t*], which
    further grows to *S*[*t*]*e*^(*r*(*T* − *t*)) upon reaching the delivery date.
    When the contract expires, we will close the short position in the underlying
    asset by purchasing one unit of the asset for a price of *F*. We get to keep the
    remaining balance *S*[*t*]*e*^(*r*(*T* − *t*)) − *F*, thus also establishing the
    arbitrage argument and ensuring a riskless profit.


    Note that the futures price is equal to the spot price of the underlying asset
    at the current time *t*. To see this, simply set *T* = *t* and we have *F* = *S*[*t*]*e*^(*r*(*t* − *t*)) = *S*[*t*].


    In a nutshell, the future net cash flow predetermined or fixed in advance (today)
    must equal today’s net cash flow to annihilate arbitrage opportunities. The no-arbitrage
    argument gives a fair price for the forward contract.'
  trans: "\n请注意，在时间 `t` 的现金 `S[t]` 不会闲置。相反，我们会将这笔现金进行投资，例如存入银行以享受无风险利率。在到达交割日时，这笔资金将增值为\
    \ `S[t] * e^(r * (T - t))`，投资期为 `T - t`。这项投资将用于平仓标的资产的空头头寸。\n\n图 3-4 总结了随着时间推移，不同产品头寸及投资组合总价值的变化。此处，我们的投资组合中包含三种不同的产品：一份远期合约、一项资产（例如一股股票）和现金。这三者构成了我们的投资组合，并且在时间\
    \ `t` 时投资组合的初始价值为零。要理解这一点，我们观察到：远期头寸在时间 `t` 时价值为零，因为我们仅在到达交割日时才进行交易。股票头寸的价值为 `-S[t]`，因为我们正在做空该股票；而现金头寸的价值为\
    \ `S[t]`，即通过做空股票所产生的收入。将这三个头寸的价值相加，得到时间 `t` 时投资组合的价值为零。因此，时间 `t` 时的净现金流为零。\n\n\
    ![](img/605529_1_En_3_Fig4_HTML.jpg)\n\n```\n一个流程图。远期：从 0 到负 F 加 S T。股票：从负 S t\
    \ 到负 S T。现金：从 S t 到 S t 乘以 e 的 r 乘以 T 减 t 次方。远期、股票和现金相加构成一个投资组合，其价值从 0 开始，通过无套利论证得到\
    \ F 等于 S t 乘以 e 的 r 乘以 T 减 t 次方。\n```\n\n**图 3-4**  \n利用无套利论证为多头头寸的远期合约定价。股票头寸和现金头寸还共同构成了一个复制投资组合，该组合抵消了远期合约在交割日收益函数中的随机性。\n\
    \n随着时间的推移，每个头寸的价值都会发生变化。具体来说，远期头寸变为 `-F + S[T]`，因为我们将以价格 `F` 买入价值为 `S[T]` 的一项资产。我们的股票头寸因股票价格变动而变为\
    \ `-S[T]`，现金头寸则变为 `S[t] * e^(r * (T - t))`。\n\n现在，利用无套利论证，由于我们从零价值开始，最终我们的投资组合价值将归零。将时间\
    \ `T` 时这三个头寸的价值相加，得到投资组合的总价值为 `-F + S[t] * e^(r * (T - t))`。令该值等于零，我们得到 `F = S[t]\
    \ * e^(r * (T - t))`，从而利用无套利论证完成了远期合约的定价。\n\n这就是远期合约价格的公式。它表明，远期价格由标的资产的当前价格、无风险利率以及距合约到期的时间共同决定。通过使用该公式，远期合约的双方可以商定一个公平价格，该价格消除了套利机会，并反映了标的资产的真实价值。\n\
    \n有趣的是，股票头寸和现金头寸共同构成了一个复制投资组合，该组合抵消了远期合约在交割日收益函数中的随机性。这意味着，无论未来远期合约的价格如何，我们总能利用另一个复制投资组合来提供相同的收益，*仿佛*我们身处远期合约的多头头寸中。这被称为通过复制进行定价。\n\
    \n让我们看看，如果远期价格不等于以连续复利计算的股票价格，会发生什么。我们可以基于“低买高卖”原则从无风险利润中论证套利机会。当 `F > S[t] *\
    \ e^(r * (T - t))` 时，我们可以借入金额 `S[t]`，并用这笔钱做空一份允许我们以价格 `F` 出售一单位标的资产的远期合约。到达交割日时，我们通过出售资产获得总额\
    \ `F`，偿还借入的本金及利息 `S[t] * e^(r * (T - t))`，并获得净利润 `F - S[t] * e^(r * (T - t))`。这就是套利：我们通过利用未来时间\
    \ `T` 的价格差异获得了无风险利润。\n\n类似地，当 `F < S[t] * e^(r * (T - t))` 时，远期合约更便宜，而资产更贵。在这种情况下，我们同样运用“低买高卖”原则，在时间\
    \ `t` 做多一份远期合约，该合约允许我们在时间 `T` 以价格 `F` 购买一单位标的资产。同时，我们将在时间 `t` 做空一单位标的资产，获得总额 `S[t]`，该金额在到达交割日时进一步增值为\
    \ `S[t] * e^(r * (T - t))`。当合约到期时，我们将通过以价格 `F` 购买一单位资产来平仓标的资产的空头头寸。我们将保留余额 `S[t]\
    \ * e^(r * (T - t)) - F`，从而同样建立了套利论证，并确保了无风险利润。\n\n请注意，期货价格等于当前时间 `t` 标的资产的现货价格。要理解这一点，只需令\
    \ `T = t`，则我们得到 `F = S[t] * e^(r * (t - t)) = S[t]`。\n\n简而言之，未来预先确定或固定的净现金流（在今日确定）必须等于今日的净现金流，以消除套利机会。无套利论证为远期合约提供了一个公平的价格。\n"
- fmt: '### Pricing Futures Contract


    The futures contract is priced in a similar way as the forward contract but involves
    a few more factors. Ultimately, the futures contract price is set by the supply
    and demand in the market. When a seller and a buyer agree on an equilibrium price
    for transacting a futures contract, that price is the futures contract price.


    Say we would like to price the futures contract at the next month (front month).
    Also, assume that we enter a short position in the futures contract, obliged to
    sell one unit of the underlying asset at the expiration date. The extra factors
    to consider here are the cost and benefit of holding the asset until expiration.


    For the cost of carrying the asset until the delivery date, we need to add it
    to the price of the futures contract since it poses an actual cost we need to
    factor in from entering the position all the way to the delivery date. For example,
    if we short a futures contract to sell 1000 barrels of oil at time `T`, we would
    borrow money to purchase 1000 barrels of oil from the spot market at time `t`
    so that we can fulfill the obligation at time `T`. Doing so requires storing these
    1000 barrels of oil, which incurs a storage cost to be added to the price of the
    futures contract.


    For the benefit of carrying the asset until the delivery date, we need to minus
    it from the futures contract price. This is called the convenience yield, where
    the party holding the underlying asset gains benefits through the course until
    the delivery date. Such a situation usually happens when holding the actual asset
    is preferred. For example, holding stocks may generate dividends payment, holding
    currencies may generate profits due to differences in the interest rate, and holding
    commodities is preferred when the market is in short supply of such commodities.


    Building on top of the spot price with interest compounding, the fair price of
    the futures contract can be calculated via the following formula:


    Fair price = spot price with compounded interest + cost of storage – convenience
    yield due to holding the asset


    When the interest, cost, and convenience yield are all annually compounded, the
    fair price of the forward contract can be calculated via the following formula:


    ```

    F = S_t * (1 + r + s - c)^(T - t)

    ```


    where `S[t]` is the spot price of the underlying asset, `r` is the risk-free bond
    interest rate, `s` is the storage cost in percentage and compounded annually,
    and `c` is the convenience yield also in percentage and compounded annually. We
    raise it to the power of the duration `T - t` to show the compounding effect in
    this period.


    This formula shows that the futures contract price considers several factors:
    the spot price of the underlying asset, the risk-free interest rate, the storage
    cost, and the convenience yield. These components help market participants to
    determine a fair price for the futures contract, reflecting the true value of
    the underlying asset while accounting for the costs and benefits of holding the
    asset until the delivery date.


    The futures contract price is essential for both buyers and sellers, as it determines
    their potential profits or losses when they enter into a futures contract. By
    understanding how the futures contract price is calculated, market participants
    can make informed decisions about whether to enter into a futures contract and
    at what price.


    It’s also important to note that the fair price of the futures contract is a theoretical
    value. In reality, the actual futures contract price in the market is influenced
    by supply and demand dynamics, which can cause the market price to deviate from
    the fair price. Market participants need to continuously monitor the futures market,
    paying attention to the changes in the underlying asset’s spot price, interest
    rates, storage costs, and convenience yields, in order to adapt the strategies
    and make informed decisions about the futures contract positions.


    Let us look at an example. Suppose the current spot price is `S[t] = $80`, the
    interest rate is `r = 2%`, the storage cost is `s = 1%`, the convenience yield
    is `c = 0.5%`, and the position in the futures contract is three months. Since
    the compounding is done on an annual basis, we need to convert the duration to
    a yearly term, making `T - t = 3/12 = 0.25`. Therefore, the fair price of the
    futures contract can be calculated as


    ```

    F = 80 * (1 + 0.02 + 0.01 - 0.005)^(0.25) = $80.5

    ```


    Figure [3-5](#605529_1_En_3_Chapter.xhtml#Fig5) summarizes the process of calculating
    the fair price of a futures contract.


    ![Diagram summarizing the fair price calculation](images/605529_1_En_3_Chapter/605529_1_En_3_Fig5_HTML.jpg)


    *An equation of fair price with labeled variables. F is equal to S t times 1 plus
    r plus s minus c to the power T minus t. The labeled variables are the fair price,
    spot price of the underlying asset, annually compounded interest rate, convenience
    yield, storage cost, and duration on a yearly basis.*


    **Figure 3-5** – Calculating the fair price of a futures contract with an annually
    compounded interest rate, storage cost, and convenience yield.'
