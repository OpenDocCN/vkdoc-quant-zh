- fmt: '# Implementing the Pairs Trading Strategy Using Machine Learning


    In this section, we will follow a similar recipe to develop a pairs trading strategy
    as in the previous chapter, with the only change being the calculation of the
    predicted spread. The previous chapter used a rolling window to derive the mean
    and standard deviation of the daily spread. In other words, the predicted spread
    is the average of a collection of historical spreads in the moving window, whose
    volatility is also used to standardize the difference between the actual spread
    and the predicted spread.


    Let us start by importing the necessary packages. As shown in Listing [10-1](#605529_1_En_10_Chapter.xhtml#PC1),
    we will focus on the same pair of stocks (Google and Microsoft) and trading horizon
    (the full year of 2022).


    ```python

    import os

    import random

    import numpy as np

    import yfinance as yf

    import pandas as pd

    from statsmodels.tsa.stattools import adfuller

    from statsmodels.regression.linear_model import OLS

    import statsmodels.api as sm

    from matplotlib import pyplot as plt

    %matplotlib inline

    SEED = 8

    random.seed(SEED)

    np.random.seed(SEED)

    # download data from yfinance

    stocks = [''GOOG'',''MSFT'']

    start_date  = "2022-01-01"

    end_date  = "2022-12-31"

    df = yf.download(stocks, start=start_date, end=end_date)[''Adj Close'']

    df.head()

    GOOG       MSFT

    Date

    2022-01-03 145.074493 330.813873

    2022-01-04 144.416504 325.141327

    2022-01-05 137.653503 312.659882

    2022-01-06 137.550995 310.189270

    2022-01-07 137.004501 310.347412

    Listing 10-1

    Downloading the stock data

    ```


    For simplicity, we will define spread as the difference in the log price of the
    two stocks, which is calculated and visualized in Listing [10-2](#605529_1_En_10_Chapter.xhtml#PC2).


    ```python

    # Calculate the spread between the two assets

    spread = np.log(df[stocks[0]]) - np.log(df[stocks[1]])

    plt.plot(spread, label=''Spread using difference of log price'')

    plt.legend()

    plt.show()

    Listing 10-2

    Calculating the spread

    ```


    Running this code generates Figure [10-7](#605529_1_En_10_Chapter.xhtml#Fig7).


    ![](images/605529_1_En_10_Chapter/605529_1_En_10_Fig7_HTML.jpg)


    A descending line graph with fluctuations of the spread, which is calculated by
    using the difference of the log price, between January 2022 and January 2023.


    **Figure 10-7** Visualizing the daily spread defined as the difference in the
    log price of both stocks


    Next, we will perform feature engineering to boost the feature space.


    ## Feature Engineering


    Feature engineering is the process of selecting, transforming, and extracting
    relevant features from the raw data in order to boost the performance of a machine
    learning model. The quality and sometimes the quantity of the features are critical
    factors that influence the performance of a machine learning model. These additional
    engineered features may not necessarily make sense from an interpretability perspective,
    yet they will likely improve the predictive performance of the machine learning
    algorithm by offering a new knob for the model to tune with.


    We have already encountered feature engineering in previous discussions, with
    the moving average being the most notable example. In this exercise, we will use
    five features to predict the spread series, including the daily returns for both
    stocks, the five-day moving average of the spread series, and the 20-day moving
    standard deviation of daily returns. These are created in Listing [10-3](#605529_1_En_10_Chapter.xhtml#PC3).


    ```python

    # Define additional features

    asset1_returns = np.log(df[stocks[0]]).diff()

    asset2_returns = np.log(df[stocks[1]]).diff()

    spread_ma5 = spread.rolling(5).mean()

    asset1_volatility = asset1_returns.rolling(20).std()

    asset2_volatility = asset2_returns.rolling(20).std()

    Listing 10-3

    Generating additional features

    ```


    Note that this is just one way to create additional features. In practice, we
    would create many more features to support algorithms such as SVM and random forest
    if the goal is to maximize the predictive accuracy. For neural networks, however,
    such feature engineering is helpful but not essential. Neural networks are powerful
    function approximators in that they can learn the correct feature extraction given
    a sufficiently complex architecture and enough training time.


    We will then aggregate these features into a single DataFrame `X`, followed by
    filling NA values with zero. We also assign the spread series to `y`:


    ```python

    # Combine the features into a single DataFrame

    X = pd.DataFrame({''Asset1Returns'': asset1_returns,

    ''Asset2Returns'': asset2_returns,

    ''SpreadMA5'': spread_ma5,

    ''Asset1Volatility'': asset1_volatility,

    ''Asset2Volatility'': asset2_volatility})

    X = X.fillna(0)

    y = spread

    ```


    Let us also split the data into a training and a test set. We will adopt the common
    80-20 rule; that is, 80% of the data goes to the training set, and 20% goes to
    the test set. We will also observe the sequence of time, so the 80% training set
    does not peak in the future, as shown in Listing [10-4](#605529_1_En_10_Chapter.xhtml#PC5).


    ```python

    # Split the data into training and test sets

    train_size = int(len(spread) * 0.8)

    train_X = X[:train_size]

    test_X = X[train_size:]

    train_y = y[:train_size]

    test_y = y[train_size:]

    Listing 10-4

    Performing train-test split

    ```


    With the training and test data ready, we can now move into the model training
    part, starting with SVM.'
