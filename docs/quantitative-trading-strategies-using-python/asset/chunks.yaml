- fmt: '### Scalping


    `Scalping` is a type of trading that makes small and fast profits by quickly (typically
    no more than a few minutes in large positions) and continuously acquiring and
    unwinding their positions. Traders that engage in `scalping` are referred to as
    `scalpers`.


    When engaged in `scalping`, a trader requires a live feed of quotes in order to
    move fast. The trader, also called the *day trader*, must follow a strict exit
    strategy because one large loss could eliminate the many small gains the trader
    worked to accumulate.


    Active traders such as day traders are strong believers in *market timing*, a
    key component of actively managed investment strategies. For example, if traders
    can predict when the market will go up and down, they can make trades to turn
    that market move into a profit. Obviously, this is a difficult and strenuous task
    as one needs to watch the market continuously, from daily to even hourly, as compared
    to long-term *position traders* that invest for the long run.


    The next section introduces the concept of portfolio rebalancing.


    ### Portfolio Rebalancing


    As time goes on, a portfolio’s current asset allocation will drift away from an
    investor’s original target asset allocation. If left unadjusted, the portfolio
    will either become too risky or too conservative. Such rebalancing is completed
    by changing the position of one or more assets in the portfolio, either buying
    or selling, with the goal of maximizing the portfolio return or hedging another
    financial instrument.


    Asset allocations in a portfolio can change as market performance alters the values
    of the assets due to price changes. Rebalancing involves periodically buying or
    selling the assets in a portfolio to regain and maintain that original, desired
    level of asset allocation defined by an investor’s risk and reward profile.


    There are several reasons why a portfolio may deviate from its target allocation
    over time, such as due to market fluctuations, additional cash injection or withdrawal,
    and changes in risk tolerance. We can perform portfolio rebalancing using either
    a time-based rebalancing approach (e.g., quarterly or annually) or a threshold-based
    rebalancing approach, which occurs when the allocation of an asset class deviates
    from the target by a predefined percentage.


    In the world of quantitative trading, `Python` has emerged as a powerful tool
    for formulating and implementing trading algorithms. Part of the reason is its
    comprehensive open source libraries and strong community support. In the next
    section, we will discuss the practical aspect of financial data analysis and start
    by acquiring and summarizing the stock data using `Python`.


    ## Getting Started with Financial Data Analysis


    Financial data analysis is the process of processing and analyzing financial data
    to support decision-making in various financial applications, such as investing,
    trading, risk management, and corporate finance. It involves the use of advanced
    analytical techniques and models to identify the underlying patterns, trends,
    and relationships in the data, which will be used to support more informed financial
    decisions.


    The interval of stock data can be different, such as by minute, hour, or day.
    Since time is continuous, we need a measure to summarize the profile of the stock
    price data within the interval. Let us start by introducing one of the most popular
    ways to summarize stock data.


    ### Summarizing Stock Prices


    The most common type of summary for stock data is the daily *OHLC* prices (open,
    high, low, close). An `OHLC` chart is a bar chart that shows open, high, low,
    and closing prices for each period, often daily. They present a day’s four major
    data points, with the closing price considered the most important indicator by
    many traders.


    The `OHLC` chart, similar to the candlestick chart shown in Figure [1-6](#605529_1_En_1_Chapter.xhtml#Fig6),
    is useful because it can show increasing or decreasing momentum. When the open
    and closing prices have a big gap in between, it shows a strong momentum for an
    increase or decrease in the day. When the open and closing prices are close, it
    shows indecision or a weak momentum. The high and low prices show the full price
    range and can be used to assess the volatility.


    Figure [1-6](#605529_1_En_1_Chapter.xhtml#Fig6) shows two candlestick charts,
    both summarizing the price movements over a specified period, for example, daily.
    The color represents emotions for the stock price movement, with an up candle
    shaded green and a down candle shaded red, although these colors can be altered
    in the specific trading platform. A collection of candlestick charts can be used
    to determine the direction of the market movement. Each candlestick chart consists
    of four main points: open, high, low, and close, following the sequence of time
    in the period. The open and close points determine the real body of the candlestick.
    The green color represents a bullish candlestick, that is, the stock price closes
    above where it opens. Similarly, the red color represents a bearish candlestick,
    that is, the stock price closes below where it opens.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig6_HTML.jpg)


    2 diagrams of candlesticks. The labeled parts in both candlesticks from the top
    to the bottom are high, close, real body, open, and low. The broad middle part
    is the real body.


    **Figure 1-6** Illustrating the bullish candlestick in green and bearish candlestick
    in red


    Let us examine the bullish candle in the green of a trading day. When the market
    starts, the stock assumes an opening price and starts to move. Across the day,
    the stock will experience the highest price point (high) and the lowest price
    point (low), where the gap in between indicates the momentum of the movement.
    We know for a fact that the high will always be higher than the low, as long as
    there is movement. When the market closes, the stock registers a close. Figure
    [1-7](#605529_1_En_1_Chapter.xhtml#Fig7) depicts a sample movement path summarized
    by the green candlestick.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig7_HTML.jpg)


    A line graph of price versus time. It has an unsymmetrical sine wave curve. The
    beginning point is labeled open. The highest peak is labeled high. The maximum
    dip is labeled low. The bend point is labeled close.


    **Figure 1-7** A sample path of stock price movement represented by the green
    candlestick chart. When the market starts, the stock assumes an opening price
    and starts to move. It will experience the highest price point (high) and the
    lowest price point (low), where the gap in between indicates the momentum of the
    movement. When the market closes, the stock registers a close


    Next, we will switch gears and start working on the actual stock price data using
    `Python`. We will download the data from Yahoo! Finance and introduce different
    ways to graph the data.


    ### Downloading Stock Price Data


    Yahoo! Finance is a common source where we can get market data. To download the
    stock price data, we can use the `yfinance` library, a popular open source (and
    free) library, to access the financial data available on Yahoo! Finance. It is
    relatively quick to set up and offers a high level of granularity in the data
    (covering daily or even per-minute data).


    To start with, we need to install the `yfinance` package via the `pip` command
    in the `Jupyter` notebook environment and import it:


    ```

    !pip install yfinance

    import yfinance as yf

    ```


    Next, we can use the `Ticker()` module from the `yfinance` package to observe
    the profile information of a specific stock. The following code snippet obtains
    the ticker information on Microsoft and prints it out via the `info` attribute:'
