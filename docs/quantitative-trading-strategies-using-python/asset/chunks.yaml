    # 1. Quantitative Trading: An Introduction


    Quantitative trading, also called algorithmic trading, refers to automated trading
    activities that buy or sell particular instruments based on specific algorithms.
    Here, an algorithm can be considered a model that transforms an input into an
    output. In this case, the input includes sufficient data to make a proper trading
    decision, and the output is the action of buying or selling an instrument. The
    quality of a trading decision thus relies on the sufficiency of the input data
    and the suitability and robustness of the model.


    Developing a successful quantitative trading strategy involves the collection
    and processing of vast amounts of input data, such as historical price data, financial
    news, and economic indicators. The data is passed as input to the model development
    process, where the goal is to accurately forecast market trends, identify trading
    opportunities, and manage potential risks, all of which are reflected in the resulting
    buy or sell signals.


    A robust trading algorithm is often identified via the process of backtesting,
    which involves simulating the algorithm’s performance using historical data. Simulating
    the performance of the algorithm under different scenarios allows us to assess
    the strategy’s potential effectiveness better, identify its limitations, and fine-tune
    the parameters to optimize its results. However, one also needs to be aware of
    the potential risks of overfitting and survivorship bias, which can lead to inflated
    metrics and potentially poor test set performance.


    In this chapter, we start by covering a few basic and important concepts related
    to quantitative trading. We then switch to hands-on examples of working with financial
    data using `Python`.


    ## Overview of Quantitative Trading


    Quantitative trading refers to the use of mathematical models and algorithms to
    analyze large datasets (structured or unstructured), identify consistent patterns,
    and generate robust trading signals. The key components of quantitative trading
    include data collection and preprocessing, feature engineering, model development,
    backtesting, optimization, and execution. Quantitative strategies can vary greatly
    in complexity, ranging from simple moving average crossovers to advanced machine
    learning techniques, all of which are covered in later chapters of the book.


    A good trading strategy could be as simple as buying low and selling high (i.e.,
    long a security) or selling high and buying low (i.e., short a security). The
    underlying trading model can consume different types of input data. For example,
    the input data could include structured features such as specific performance
    metrics of a particular stock or unstructured news contents pertinent to the company
    of the stock. When the input is financial news, the challenge is often concerned
    with converting unstructured textual information to structured features in a consistent
    and principled manner. The input data could also be raw financial ratios readily
    available from the balance sheet or derived features such as firm-specific technical
    indicators.


    We can categorize the input data into the following four general groups:


    - **Market states**: Security-specific price movements such as tick data that
    measures the minimum upward or downward movement in the price of a security, or
    market-specific factors such as bid-ask spread in limit-order books (LOB) in high-frequency
    trading. Besides the tick size, other resolution parameters of a LOB include the
    lot size, which specifies the smallest amount of a stock that can be traded.

    - **Financial news**: Macroeconomic news, analyst reports, earnings conference
    call transcripts, etc.

    - **Fundamentals**: Overall economic or sector-specific conditions and firm-specific
    metrics such as revenue, cash flow, earnings per share (EPS), etc.

    - **Technicals**: Derived technical indicators based on the raw price series,
    including moving averages, stochastic indicators, etc.


    More generally, quantitative trading can be defined as the process of order execution
    based on trading signals generated using computer programs and algorithms. The
    purpose is either to seek profits and achieve an abnormal rate of return that
    beats the market (called *alpha*) or manage different types of risk.


    In a nutshell, quantitative trading refers to an algorithm (also called a function
    or a model) that digests any of these structured or unstructured data sources
    and outputs a trading decision. The automatic trading strategies could be in the
    form of experience-based rules based on technical analysis or data-driven machine
    learning models trained based on historical data. Upon receiving the output as
    a trading signal, we would either buy (also called long) an asset to open a position
    or sell (also called short) an asset to close a position, make a profit, or stop
    a loss. Trading signals could occur intraday in a high-frequency setting (also
    called *day trading*) or in a longer term (also called *position trading*). Figure
    [1-1](#605529_1_En_1_Chapter.xhtml#Fig1) illustrates this process.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig1_HTML.jpg)


    2 flow diagrams. Market states, financial news, fundamentals, and technicals give
    the algorithm, function or model, followed by a trading decision to buy or long
    or sell or short. The input is followed by quantitative trading to give the output.


    **Figure 1-1** Illustrating the overall quantitative trading process


    The model used to generate trading signals could be either rule-based or trained
    using data. The rule-based approach mainly relies on domain knowledge and requires
    explicitly writing out the logic flow from input to output, similar to following
    a cooking recipe. On the other hand, the data-driven approach involves training
    a model using machine learning techniques and using the model as a black box for
    prediction and inference. Let us review the overall model training process in
    a typical machine learning workflow.'
