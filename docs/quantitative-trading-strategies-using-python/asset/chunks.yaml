    Before scaling up to multiple iterations, we will also test out the random search
    strategy, which selects a random window length for each moving series at each
    round. This serves as the baseline for comparison, since manual selection often
    amounts to a random search strategy in the initial phase. In the function `update_random_observations()`
    shown in Listing [9-9](#605529_1_En_9_Chapter.xhtml#PC18), we pass a running list
    of best-observed function values, perform a random selection, observe the corresponding
    functional evaluation, compare it with the current running maximum, and then return
    the list of running maxima with the current maximum appended.


    ```

    def update_random_observations(best_random):

    """Simulates a random policy by drawing a new random points,

    observing their values, and updating the current best candidate to the running
    list.

    """

    new_x1 = x1_bound[0] + (x1_bound[1] - x1_bound[0]) * torch.rand(size=(1,1), device=device,
    dtype=dtype)

    new_x2 = torch.rand(size=(1,1), device=device, dtype=dtype)

    new_x = torch.cat((new_x1, new_x2), 1)

    new_y = qts(entry_threshold=new_x[0,0].item(), exit_threshold=new_x[0,1].item())

    best_random.append(max(best_random[-1], new_y))

    return best_random

