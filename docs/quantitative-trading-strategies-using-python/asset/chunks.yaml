    \n```\n>>> df2.shape\n(254750, 40)\n```\n\n现在，我们想剖析这个 DataFrame，并将每个组成部分分配到单独的\
    \ DataFrame 中。在代码清单 2-3 中，我们根据每个组成部分的列顺序对 DataFrame 进行子集划分，得到了四个 DataFrame：`dfAskPrices`、`dfAskVolumes`、`dfBidPrices`\
    \ 和 `dfBidVolumes`。通过调用 `loc()` 函数并提供相应的行和列索引，即可完成对 DataFrame 的子集划分。\n\n```\n\
    dfAskPrices = df2.loc[:, range(0,40,4)]\ndfAskVolumes = df2.loc[:, range(1,40,4)]\n\
    dfBidPrices = df2.loc[:, range(2,40,4)]\ndfBidVolumes = df2.loc[:, range(3,40,4)]\n\
    代码清单 2-3\n提取买卖价格和成交量\n```\n\n需要注意的是，卖价和买价的顺序并不相同。打印出 `dfAskPrices` 和 `dfBidPrices`\
