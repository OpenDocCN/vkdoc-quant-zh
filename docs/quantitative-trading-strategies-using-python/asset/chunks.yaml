    Lastly, we test the stationarity of the residual series, again using the augmented\
    \ Dickey-Fuller (ADF) test. The test can be performed using the `adfuller()` function\
    \ from the `statsmodels` package. There are two metrics that are relevant to every\
    \ statistical test: the test statistic and the p-value. Both metrics convey the\
    \ same information on the statistical significance of the underlying hypothesis,\
    \ with the p-value being a standardized and, thus, more interpretable metric.\
    \ A widely used threshold (also called the significance level) is 5% for the p-value.\
    \ That is, if the resulting p-value from a statistical test is less than 5%, we\
    \ can safely (up to a confidence level of 95%) reject the null hypothesis in favor\
    \ of the alternative hypothesis. If the p-value is greater than 5%, we fail to\
    \ reject the null hypothesis and conclude that the two stocks are not cointegrated.\n\
    \nThe null hypothesis often represents the status quo. In the case of the cointegration\
    \ testing using the Engle-Granger test, the null hypothesis is that the two stocks\
    \ are not cointegrated. That is, the historical prices do not exhibit a linear\
    \ relationship in the long run. The alternative hypothesis is that the two stocks\
    \ are cointegrated, as exhibited by a linear relationship between the two and\
    \ a stationary residual series.\n\nNow let us carry out the ADF test and use the\
    \ result to determine if these two stocks are cointegrated using a significance\
    \ level of 5%. In Listing [8-6](#605529_1_En_8_Chapter.xhtml#PC10), we apply the\
    \ `adfuller()` function to the prediction residuals and print out the test statistic\
    \ and p-value. This is followed by an if-else statement to determine if we have\
    \ enough confidence to reject the null hypothesis and claim that the two stocks\
    \ are cointegrated.\n\n```\n# test stationarity of the residuals\nadf_test = adfuller(residuals)\n\
    print(f\"ADF test statistic: {adf_test[0]}\")\nprint(f\"p-value: {adf_test[1]}\"\
    )\nif adf_test[1] < 0.05:\n    print(\"The two stocks are cointegrated.\")\nelse:\n\
    \    print(\"The two stocks are not cointegrated.\")\nADF test statistic: -3.179800920038961\n\
    p-value: 0.021184058997635733\nThe two stocks are cointegrated.\nListing 8-6\n\
    Testing stationarity of the residuals\n```\n\nThe result suggests that Google\
    \ and Microsoft stocks are cointegrated due to a small p-value of 2%. Indeed,\
    \ based on our previous analysis of calculating the max drawdown, Google and Microsoft\
    \ stock prices generally tend to move together. However, with the introduction\
    \ of ChatGPT in Bing search, the overall picture may start to change. Such cointegration\
    \ (comovement) may gradually weaken as the tool gives everything for Microsoft\
    \ to win (due to a small revenue from web search) and for Google to lose (majority\
    \ revenue comes from web search).\n\nNext, we touch upon another closely related\
    \ but different statistical concept: correlation.\n\n## Correlation and Cointegration\n\
    \nBoth correlation and cointegration are important statistical measures used to\
    \ analyze the relationship between two time series datasets. Correlation quantifies\
    \ the degree of linear association between two time series. In essence, it reveals\
    \ whether the two variables increase or decrease in tandem and the strength of\
    \ this relationship. The correlation coefficient can vary between –1 and 1. A\
    \ coefficient of 1 denotes a perfect positive linear relationship, –1 signifies\
    \ a perfect negative linear relationship, while 0 suggests the absence of any\
    \ linear relationship.\n\nIn contrast, cointegration is concerned with the long-term\
    \ equilibrium relationship between two potentially non-stationary time series.\
    \ If two time series are cointegrated, it signifies that they share a common long-term\
    \ trend, regardless of their short-term variations. Consequently, while the two\
    \ time series may not exhibit short-term linear correlation, they can display\
    \ a long-term stationary pattern when suitably combined. This enables analysts\
    \ to uncover persistent relationships masked by transitory market volatility.\n\
    \nThe following code snippet provides an example of two correlated time series\
    \ that are not cointegrated. We first sample two series of 100 random values following\
    \ normal distributions with a different mean and the same variance. This is followed\
    \ up by a cumulative summation operation stored as a Pandas Series object. Finally,\
    \ we plot both series as lines after combining them horizontally in a DataFrame\
    \ and calling the `plot()` function:\n\n```\nnp.random.seed(123)\nX = np.random.normal(1,\
    \ 1, 100)\nY = np.random.normal(2, 1, 100)\nX = pd.Series(np.cumsum(X), name='X')\n\
    Y = pd.Series(np.cumsum(Y), name='Y')\npd.concat([X, Y], axis=1).plot()\n```\n\
