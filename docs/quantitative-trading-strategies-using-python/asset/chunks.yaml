    # 10. Pairs Trading Using Machine Learning


    Machine learning can be used in pairs trading in several ways to improve the effectiveness
    of trading strategies. Examples include pair selection, feature engineering, spread
    prediction, etc. In this final chapter, we are going to focus on spread prediction
    using different machine learning algorithms in order to generate trading signals.


    ## Machine Learning in Pairs Trading


    As discussed in the previous chapter, pairs trading is a type of quantitative
    trading strategy that involves transacting two highly correlated/cointegrated
    assets at the same time and in the opposite direction. The financial instruments
    could be two stocks or two indices, based on which the relative price difference
    is used to derive the spread series and generate trading signals. The primary
    assumption behind pairs trading is that the price spread between two highly correlated
    or cointegrated assets should exhibit a mean reversion behavior over time. During
    this period, traders can profit by buying the underperforming asset and short-selling
    the overperforming asset in case of market mispricing due to temporary fluctuations.
    In other words, the two assets identified by the strategy should bear a long-term
    equilibrium relationship and move in tandem, while any deviation from this pattern
    is likely to be temporary and will eventually revert back to the mean.


    In pairs trading, we start by identifying two assets that are highly correlated/cointegrated
    and share a similar risk exposure. After taking a long position in one asset and
    a short position in the other when the z-score exceeds a predefined threshold,
    we would then hope to profit from the convergence of their spread. Specifically,
    as the spread between the two assets widens, we sell the overpriced asset and
    buy the underpriced asset. Similarly, as the spread narrows and the z-score drops
    below another predefined threshold, we will exit the positions and lock in the
    profits.


    Being a market-neutral strategy, pairs trading can be profitable in either bull,
    bear, or sideways markets. The success of the strategy depends on two factors:
    whether the pair of correlated/cointegrated assets with a similar risk profile
    can be identified and whether the spread between the two assets can be accurately
    predicted. For example, we used a moving average in the previous chapter to standardize
    the daily spread into a z-score. Such a moving average acts as the predicted spread,
    which is then used to compare with the actual spread of the day and derive the
    unit of deviation in terms of the standard deviation.


    In addition, we also need to have proper risk management in place. When the spread
    continues to widen and moves in an adverse direction due to unexpected market
    events, the larger spread can lead to a significant loss. A stop-loss order is
    thus often placed to limit the potential loss of the strategy.


    Figure [10-1](#605529_1_En_10_Chapter.xhtml#Fig1) summarizes the three critical
    components of a pairs trading strategy. The second component will be the focus
    of the following sections, where we illustrate the use of machine learning techniques
    to predict the spread series.


