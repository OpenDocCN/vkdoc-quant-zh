- fmt: '### Implementing the Trend-Following Strategy


    The trend-following strategy that relies on moving averages works like this. There
    will be two moving averages: a short-term moving average and a long-term moving
    average. When the short-term moving average crosses above the long-term moving
    average, it signals a buy action, and the trend trader enters a long position
    on the asset. When the short-term moving average crosses below the long-term moving
    average, it signals a sell action, and the trend trader enters a short position
    on the asset. Thus, the strategy is based on the intersection of two moving averages:
    one short term (quick) and one long term (slow).


    Note that this framework also applies to the case when there is only one moving
    average series. In this case, the trend trader would buy the asset when the current
    price is above the moving average and sell it if the current price is below the
    moving average. The key justification for such trading action is, when the price
    is above a moving average, an uptrend may be present, and vice versa. The *crossover*
    between two lines generates the trading signal.


    Other momentum-related technical indicators, such as the RSI and MACD, may also
    be used to signal entries or exits.


    In the following section, we will implement a trend-following trading strategy
    using the long-term and short-term moving averages. Using this strategy, we are
    essentially searching for the trading signal at each time point. That is, we want
    to decide if we would buy, sell, or hold an asset at each time step. The signal
    is generated by a crossover between two moving averages. We assume no transaction
    cost will be incurred when performing a trading action, and the market is liquid
    (sufficient Apple stock in the market) and complete (no arbitrage opportunities).


    Let us recall the main DataFrame we will work with. The following command prints
    out the summary information using the `info()` function:


    ```

    >>> df2.info()


    DatetimeIndex: 251 entries, 2022-01-03 00:00:00-05:00 to 2022-12-30 00:00:00-05:00

    Data columns (total 5 columns):

    #   Column     Non-Null Count  Dtype

    ---  ------     --------------  -----

    0   Adj Close  251 non-null    float64

    1   SMA-3      249 non-null    float64

    2   SMA-20     232 non-null    float64

    3   EWM_0.1    251 non-null    float64

    4   EWM_0.5    251 non-null    float64

    dtypes: float64(5)

    memory usage: 19.9 KB

    ```


    Now we will use `SMA-3` and `SMA-20` as the respective short-term and long-term
    moving averages, whose crossover will generate a trading signal. We leave it as
    an exercise to try both SMA with different window sizes and EMA with different
    weighting schemes.


    Note that we can only use the information up to yesterday to make a trading decision
    for tomorrow. We cannot use today’s information since the closing price is not
    yet available in the middle of the day. To enforce this requirement, we can shift
    the moving averages one day into the future, as shown in the following code snippet.
    This essentially says that the moving average for today is derived from historical
    information up to yesterday.


    ```

    # Shift to the future by one day so that everyday uses the information up to

    # yesterday to make a trading decision for tmr

    df2[''SMA-3''] = df2[''SMA-3''].shift(1)

    df2[''SMA-20''] = df2[''SMA-20''].shift(1)

    ```


    Now let us implement the trading rule: buy if `SMA-3 > SMA-20`, and sell if `SMA-3
    < SMA-20`. Such an `if-else` condition can be created using the `np.where()` function,
    as shown in Listing [5-15](#605529_1_En_5_Chapter.xhtml#PC23).


    ```

    # identify buy signal

    df2[''signal''] = np.where(df2[''SMA-3''] > df2[''SMA-20''], 1, 0)

    # identify sell signal

    df2[''signal''] = np.where(df2[''SMA-3''] < df2[''SMA-20''], -1, df2[''signal''])

    df2.dropna(inplace=True)

    Listing 5-15

    Creating and identifying buy and sell signals

    ```


    Here, a normal trading day would assume a value of either 1 or –1 in the signal
    column. When there is a missing value or other special cases, we set it to 0.
    We also use the `dropna()` function to ensure that the DataFrame is of good quality
    by dropping rows with any NA/missing value in it.


    We can check the frequency distribution of the signal column as follows:


    ```

    >>> df2[''signal''].value_counts()

    -1    135

    1     96

    Name: signal, dtype: int64

    ```


    The result shows that there are more declining days than inclining days, which
    confirms the downward trending price series shown earlier.


    Next, we introduce a baseline strategy called *buy-and-hold*, which simply means
    we hold one share of Apple stock until the end of the whole period. Also, we will
    use the log return instead of the raw return to facilitate the calculations. Therefore,
    instead of taking the division between consecutive stock prices to get ![$$ \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq5.png) , we now
    take the difference `log(S[t+1]) - log(S[t])` to get ![$$ \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq6.png) , which can
    then be exponentiated to convert back to ![$$ \frac{S_{t+1}}{S_t} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq7.png)
    .


    The following code snippet calculates the instantaneous logarithmic single-period
    return, where we first take the logarithm of the adjusted closing prices and then
    call the `diff()` function to obtain the differences between consecutive pairs
    of prices:


    ```

    df2[''log_return_buy_n_hold''] = np.log(df2[''Adj Close'']).diff()

    ```


    Now comes the calculation of the single-period return for the trend-following
    strategy. Recall the `signal` column we created earlier. This column represents
    whether we go long (valued 1) or short (value –1) in a position for every single
    period. This also shows that the logarithmic return ![$$ \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq8.png) is positive
    if `S[t+1] > S[t]` and negative if `S[t+1] < S[t]`. This creates the following
    four scenarios when the asset moves from `S[t]` to `S[t+1]`:


    * When we long an asset and its logarithmic return is positive, the trend-following
    strategy reports a positive return, that is, `1 * log(S[t+1]/S[t])`.

    * When we long an asset and its logarithmic return is negative, the trend-following
    strategy reports a negative return, that is, `1 * log(S[t+1]/S[t])`.

    * When we short an asset and its logarithmic return is positive, the trend-following
    strategy reports a negative return, that is, `-1 * log(S[t+1]/S[t])`.

    * When we short an asset and its logarithmic return is negative, the trend-following
    strategy reports a positive return, that is, `-1 * log(S[t+1]/S[t])`.


    Summarizing these four scenarios, we can obtain the single-period logarithmic
    return for the trend-following strategy by multiplying `signal` with the `log_return_buy_n_hold`
    (the single-period logarithmic return based on the buy-and-hold strategy), as
    shown in Listing [5-16](#605529_1_En_5_Chapter.xhtml#PC26).


    ```

    df2[''log_return_trend_follow''] = df2[''signal''] * df2[''log_return_buy_n_hold'']

    Listing 5-16

    Calculating the log return of the trend-following strategy

    ```'
  raw: '### Implementing the Trend-Following Strategy


    The trend-following strategy that relies on moving averages works like this. There
    will be two moving averages: a short-term moving average and a long-term moving
    average. When the short-term moving average crosses above the long-term moving
    average, it signals a buy action, and the trend trader enters a long position
    on the asset. When the short-term moving average crosses below the long-term moving
    average, it signals a sell action, and the trend trader enters a short position
    on the asset. Thus, the strategy is based on the intersection of two moving averages:
    one short term (quick) and one long term (slow).


    Note that this framework also applies to the case when there is only one moving
    average series. In this case, the trend trader would buy the asset when the current
    price is above the moving average and sell it if the current price is below the
    moving average. The key justification for such trading action is, when the price
    is above a moving average, an uptrend may be present, and vice versa. The *crossover*
    between two lines generates the trading signal.


    Other momentum-related technical indicators, such as the RSI and MACD, may also
    be used to signal entries or exits.


    In the following section, we will implement a trend-following trading strategy
    using the long-term and short-term moving averages. Using this strategy, we are
    essentially searching for the trading signal at each time point. That is, we want
    to decide if we would buy, sell, or hold an asset at each time step. The signal
    is generated by a crossover between two moving averages. We assume no transaction
    cost will be incurred when performing a trading action, and the market is liquid
    (sufficient Apple stock in the market) and complete (no arbitrage opportunities).


    Let us recall the main DataFrame we will work with. The following command prints
    out the summary information using the `info()` function:


    ```

    >>> df2.info()


    DatetimeIndex: 251 entries, 2022-01-03 00:00:00-05:00 to 2022-12-30 00:00:00-05:00

    Data columns (total 5 columns):

    #   Column     Non-Null Count  Dtype

    ---  ------     --------------  -----

    0   Adj Close  251 non-null    float64

    1   SMA-3      249 non-null    float64

    2   SMA-20     232 non-null    float64

    3   EWM_0.1    251 non-null    float64

    4   EWM_0.5    251 non-null    float64

    dtypes: float64(5)

    memory usage: 19.9 KB

    ```


    Now we will use `SMA-3` and `SMA-20` as the respective short-term and long-term
    moving averages, whose crossover will generate a trading signal. We leave it as
    an exercise to try both SMA with different window sizes and EMA with different
    weighting schemes.


    Note that we can only use the information up to yesterday to make a trading decision
    for tomorrow. We cannot use today’s information since the closing price is not
    yet available in the middle of the day. To enforce this requirement, we can shift
    the moving averages one day into the future, as shown in the following code snippet.
    This essentially says that the moving average for today is derived from historical
    information up to yesterday.


    ```

    # Shift to the future by one day so that everyday uses the information up to

    # yesterday to make a trading decision for tmr

    df2[''SMA-3''] = df2[''SMA-3''].shift(1)

    df2[''SMA-20''] = df2[''SMA-20''].shift(1)

    ```


    Now let us implement the trading rule: buy if `SMA-3 > SMA-20`, and sell if `SMA-3
    < SMA-20`. Such an `if-else` condition can be created using the `np.where()` function,
    as shown in Listing [5-15](#605529_1_En_5_Chapter.xhtml#PC23).


    ```

    # identify buy signal

    df2[''signal''] = np.where(df2[''SMA-3''] > df2[''SMA-20''], 1, 0)

    # identify sell signal

    df2[''signal''] = np.where(df2[''SMA-3''] < df2[''SMA-20''], -1, df2[''signal''])

    df2.dropna(inplace=True)

    Listing 5-15

    Creating and identifying buy and sell signals

    ```


    Here, a normal trading day would assume a value of either 1 or –1 in the signal
    column. When there is a missing value or other special cases, we set it to 0\.
    We also use the `dropna()` function to ensure that the DataFrame is of good quality
    by dropping rows with any NA/missing value in it.


    We can check the frequency distribution of the signal column as follows:


    ```

    >>> df2[''signal''].value_counts()

    -1    135

    1     96

    Name: signal, dtype: int64

    ```


    The result shows that there are more declining days than inclining days, which
    confirms the downward trending price series shown earlier.


    Next, we introduce a baseline strategy called *buy-and-hold*, which simply means
    we hold one share of Apple stock until the end of the whole period. Also, we will
    use the log return instead of the raw return to facilitate the calculations. Therefore,
    instead of taking the division between consecutive stock prices to get ![$$ \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq5.png) , we now
    take the difference log *S*[*t* + 1] −  log *S*[*t*] to get ![$$ \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq6.png) , which can
    then be exponentiated to convert to back ![$$ \frac{S_{t+1}}{S_t} $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq7.png)
    .


    The following code snippet calculates the instantaneous logarithmic single-period
    return, where we first take the logarithm of the adjusted closing prices and then
    call the `diff()` function to obtain the differences between consecutive pairs
    of prices:


    ```

    df2[''log_return_buy_n_hold''] = np.log(df2[''Adj Close'']).diff()

    ```


    Now comes the calculation of the single-period return for the trend-following
    strategy. Recall the `signal` column we created earlier. This column represents
    whether we go long (valued 1) or short (value –1) in a position for every single
    period. This also shows that the logarithmic return ![$$ \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq8.png) is positive
    if *S*[*t* + 1] > *S*[*t*] and negative if *S*[*t* + 1] < *S*[*t*]. This creates
    the following four scenarios when the asset moves from *S*[*t*] to *S*[*t* + 1]:


    *   When we long an asset and its logarithmic return is positive, the trend-following
    strategy reports a positive return, that is, ![$$ 1\ast \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq9.png) .


    *   When we long an asset and its logarithmic return is negative, the trend-following
    strategy reports a negative return, that is, ![$$ 1\ast \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq10.png) .


    *   When we short an asset and its logarithmic return is positive, the trend-following
    strategy reports a negative return, that is, ![$$ -1\ast \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq11.png) .


    *   When we short an asset and its logarithmic return is negative, the trend-following
    strategy reports a positive return, that is, ![$$ -1\ast \log \frac{S_{t+1}}{S_t}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_IEq12.png) .


    Summarizing these four scenarios, we can obtain the single-period logarithmic
    return for the trend-following strategy by multiplying `signal` with the `log_return_buy_n_hold`
    (the single-period logarithmic return based on the buy-and-hold strategy), as
    shown in Listing [5-16](#605529_1_En_5_Chapter.xhtml#PC26).


    ```

    df2[''log_return_trend_follow''] = df2[''signal''] * df2[''log_return_buy_n_hold'']

    Listing 5-16

    Calculating the log return of the trend-following strategy

    ```'
  trans: '

    ### 实现趋势跟踪策略


    基于移动平均线的趋势跟踪策略运作方式如下：存在两条移动平均线，一条短期移动平均线和一条长期移动平均线。当短期移动平均线上穿长期移动平均线时，发出买入信号，趋势交易者对该资产建立多头仓位。当短期移动平均线下穿长期移动平均线时，发出卖出信号，趋势交易者对该资产建立空头仓位。因此，该策略基于两条移动平均线的交叉点：一条是短期（快速）移动平均线，另一条是长期（慢速）移动平均线。


    请注意，此框架也适用于只有一条移动平均线序列的情况。在这种情况下，当当前价格高于移动平均线时，趋势交易者会买入资产；当当前价格低于移动平均线时，则会卖出资产。此类交易行为的主要理由是，当价格高于移动平均线时，可能存在上升趋势，反之亦然。两条线之间的*交叉点*会产生交易信号。


    其他动量相关技术指标，例如 RSI 和 MACD，也可用于发出入场或离场信号。


    在下一节中，我们将使用长期和短期移动平均线实现一个趋势跟踪交易策略。使用此策略，我们实质上是在每个时间点寻找交易信号。也就是说，我们要决定在每个时间步长是买入、卖出还是持有资产。该信号由两条移动平均线的交叉点生成。我们假设执行交易操作时不产生交易成本，并且市场具有流动性（市场上有足够的苹果股票）且是完备的（不存在套利机会）。


    让我们回顾一下我们将使用的主要 DataFrame。以下命令使用 `info()` 函数打印出摘要信息：


    ```

    >>> df2.info()


    DatetimeIndex: 251 entries, 2022-01-03 00:00:00-05:00 to 2022-12-30 00:00:00-05:00

    Data columns (total 5 columns):

    #   Column     Non-Null Count  Dtype

    ---  ------     --------------  -----

    0   Adj Close  251 non-null    float64

    1   SMA-3      249 non-null    float64

    2   SMA-20     232 non-null    float64

    3   EWM_0.1    251 non-null    float64

    4   EWM_0.5    251 non-null    float64

    dtypes: float64(5)

    memory usage: 19.9 KB

    ```


    现在，我们将使用 `SMA-3` 和 `SMA-20` 分别作为短期和长期移动平均线，它们的交叉点将产生交易信号。我们留作练习，尝试使用不同窗口大小的 SMA
    以及不同加权方案的 EMA。


    请注意，我们只能使用截至昨天的信息来为明天做出交易决策。我们不能使用今天的信息，因为在交易日中间收盘价尚不可用。为了强制执行此要求，我们可以将移动平均线向未来移动一天，如下面的代码片段所示。这本质上说明今天的移动平均线是根据截至昨天的历史信息得出的。


    ```

    # 向未来移动一天，以便每天使用截至昨天的信息来为明天做出交易决策

    df2[''SMA-3''] = df2[''SMA-3''].shift(1)

    df2[''SMA-20''] = df2[''SMA-20''].shift(1)

    ```


    现在让我们实现交易规则：如果 `SMA-3 > SMA-20` 则买入，如果 `SMA-3 < SMA-20` 则卖出。可以使用 `np.where()`
    函数创建这样的 `if-else` 条件，如清单 5-15 所示。


    ```

    # 识别买入信号

    df2[''signal''] = np.where(df2[''SMA-3''] > df2[''SMA-20''], 1, 0)

    # 识别卖出信号

    df2[''signal''] = np.where(df2[''SMA-3''] < df2[''SMA-20''], -1, df2[''signal''])

    df2.dropna(inplace=True)

    清单 5-15

    创建并识别买入和卖出信号

    ```


    此处，一个正常交易日会在信号列中取值为 1 或 –1。当出现缺失值或其他特殊情况时，我们将其设置为 0。我们还使用 `dropna()` 函数通过删除包含任何
    NA/缺失值的行，来确保 DataFrame 具有良好的质量。


    我们可以按如下方式检查信号列的频率分布：


    ```

    >>> df2[''signal''].value_counts()

    -1    135

    1     96

    Name: signal, dtype: int64

    ```


    结果显示下跌天数多于上涨天数，这证实了前文显示的价格序列下行趋势。


    接下来，我们介绍一个称为*买入并持有*的基准策略，它简单意味着我们在整个期间结束时持有一股苹果股票。此外，我们将使用对数收益率而不是原始收益率来简化计算。因此，我们不是对连续股价进行除法运算得到![$$
    \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq5.png)，而是取差值 `log(S[t+1])
    - log(S[t])` 得到![$$ \log \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq6.png)，然后可以对其取指数转换回![$$
    \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq7.png)。


    以下代码片段计算了瞬时对数单期收益率，其中我们首先取调整后收盘价的对数，然后调用 `diff()` 函数获得连续价格对之间的差值：


    ```

    df2[''log_return_buy_n_hold''] = np.log(df2[''Adj Close'']).diff()

    ```


    现在来计算趋势跟踪策略的单期收益率。回顾我们之前创建的 `signal` 列。该列表示我们在每个单期是做多（值为 1）还是做空（值为 –1）。这也表明，如果
    `S[t+1] > S[t]`，对数收益率![$$ \log \frac{S_{t+1}}{S_t} $$](img/605529_1_En_5_Chapter_TeX_IEq8.png)为正，如果
    `S[t+1] < S[t]`，则为负。当资产从 `S[t]` 移动到 `S[t+1]` 时，这创建了以下四种场景：


    * 当我们做多资产且其对数收益率为正时，趋势跟踪策略报告正收益，即 `1 * log(S[t+1]/S[t])`。

    * 当我们做多资产且其对数收益率为负时，趋势跟踪策略报告负收益，即 `1 * log(S[t+1]/S[t])`。

    * 当我们做空资产且其对数收益率为正时，趋势跟踪策略报告负收益，即 `-1 * log(S[t+1]/S[t])`。

    * 当我们做空资产且其对数收益率为负时，趋势跟踪策略报告正收益，即 `-1 * log(S[t+1]/S[t])`。


    总结这四种场景，我们可以通过将 `signal` 与 `log_return_buy_n_hold`（基于买入并持有策略的单期对数收益率）相乘，得到趋势跟踪策略的单期对数收益率，如清单
    5-16 所示。


    ```

    df2[''log_return_trend_follow''] = df2[''signal''] * df2[''log_return_buy_n_hold'']

    清单 5-16

    计算趋势跟踪策略的对数收益率

    ```

    '
- fmt: 'Compared with the buy-and-hold strategy, the key difference is the additional
    shorting actions generated by the trend-following strategy. That is, when the
    stock price drops, the buy-and-hold strategy will register a loss, while the trend-following
    strategy will make a profit *if* the trading signal is to go short. Creating a
    good trading signal thus makes all the difference.


    Next, we create explicit trading actions. The `signal` column tells us whether
    we should go long or short in the given asset under the trend-following strategy.
    However, this does not mean we need to make a trade at every period. If the `signal`
    remains the same for two consecutive periods, we simply hold on to the position
    and remain seated. In other words, there is no trading action for this specific
    trading day. This applies in the case of two consecutive 1s or –1s in the `signal`
    column.


    On the other hand, we will make an action when there is a sign switch in the trading
    signal, changing from 1 to –1 or from –1 to 1. The former means changing from
    longing a unit of stock to shorting it, while the latter means the reverse.


    To create the trading actions, we can use the `diff()` method again on the `signal`
    column, as shown in the following:


    ```

    df2[''action''] = df2.signal.diff()

    ```


    We can produce a frequency count of different trading actions using the `value_counts()`
    function:


    ```

    >>> df2[''action''].value_counts()

    0.0    216

    2.0      7

    -2.0      7

    Name: action, dtype: int64

    ```


    The result shows that the majority of the trading days do not require action.
    For the 14 days with a trading action, 7 days change the position from short to
    long, and another 7 change from long to short.


    We can visualize these trading actions as triangles on the graph with stock prices
    and SMAs. In Listing [5-17](#605529_1_En_5_Chapter.xhtml#PC29), we indicate a
    buy action via the green triangle facing upward when the short-term SMA crosses
    above the long-term SMA. On the other hand, we use a red triangle facing downward
    to indicate a sell action when the short-term SMA crosses below the long-term
    SMA.


    ```

    plt.rcParams[''figure.figsize''] = 12, 6

    plt.grid(True, alpha = .3)

    plt.plot(df2[''Adj Close''], label = ''Adj Close'')

    plt.plot(df2[''SMA-3''], label = ''SMA-3'')

    plt.plot(df2[''SMA-20''], label = ''SMA-20'')

    plt.plot(df2.loc[df2.action == 2].index, df2[''SMA-3''][df2.action == 2], ''^'',

    color = ''g'', markersize = 12)

    plt.plot(df2[df2.action == -2].index, df2[''SMA-20''][df2.action == -2], ''v'',

    color = ''r'', markersize = 12)

    plt.legend(loc=1);

    Listing 5-17

    Visualizing trading actions

    ```


    Running these commands generates Figure [5-14](#605529_1_En_5_Chapter.xhtml#Fig14).
    Again, we denote the green triangles as acting from short to long and the red
    triangles as moving from long to short.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig14_HTML.jpg)


    A multiline graph of price versus date presents the variations in the adjusted
    closing prices, SMA 3 and SMA 20, between March 2022 and January 2023. All 3 plots
    has fluctuating decreasing trends.


    Figure 5-14


    Visualizing the trading actions, including going from short to long (green triangles)
    and long to short (red triangles)


    Let us analyze the cumulative returns of each period for both trading strategies.
    Specifically, we would like to obtain the final percentage return at the end of
    2022 if we started with one unit of Apple stock at the beginning of 2022, comparing
    the two trading strategies.


    Recall that we need to multiply the 1+R return at each period to carry out the
    compounding process in order to obtain the terminal return (after subtracting
    one). We also know that the 1+R return is the same as the division between two
    consecutive prices, that is, `1+Rt,t+1 = St+1/St`. Therefore, to calculate the
    terminal return, we first convert the returns from the logarithmic format to the
    usual percentage format using the `np.exp()` function, then carry out the compounding
    by performing a cumulative product operation using the `cumprod()` method. This
    is achieved via Listing [5-18](#605529_1_En_5_Chapter.xhtml#PC30), where we leave
    out the last step of subtracting by one and report the 1+R return.


    ```

    plt.plot(np.exp(df2[''log_return_buy_n_hold'']).cumprod(), label=''Buy-n-hold'')

    plt.plot(np.exp(df2[''log_return_trend_follow'']).cumprod(), label=''Trend following'')

    plt.legend(loc=2)

    plt.title("Cumulative return of different trading strategies")

    plt.grid(True, alpha=.3)

    Listing 5-18

    Visualizing cumulative returns

    ```


    Running these commands generates Figure [5-15](#605529_1_En_5_Chapter.xhtml#Fig15),
    which shows that the trend-following strategy clearly outperforms the buy-and-hold
    strategy. However, note that this is a simplified setting that does not take into
    account transaction cost and other market factors. More analyses and tests are
    needed to assess the performance of this trading strategy (also many others) in
    the real-world environment.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig15_HTML.jpg)


    A multiline graph of price versus date presents the variations in the trends of
    buy-and-hold and trend-following between February 2022 and January 2023. Both
    has fluctuation trends.


    Figure 5-15


    Comparing the cumulative return of buy-and-hold and trend-following strategies
    for one share of Apple’s stock


    Lastly, we compare the terminal returns of both strategies:


    ```

    # terminal return of buy-n-hold

    >>> np.exp(df2[''log_return_buy_n_hold'']).cumprod()[-1] -1

    -0.25156586984649587

    # terminal return of trend following

    >>> np.exp(df2[''log_return_trend_follow'']).cumprod()[-1] -1

    0.0711944903093773

    ```


