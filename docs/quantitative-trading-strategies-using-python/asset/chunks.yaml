  trans: '

    ### 主要资产类别与衍生品


    公开与私募市场中，多种可交易金融工具被用于筹集资本。机构与散户投资者可通过单一资产或资产组合建立多头或空头头寸，以追求利润或管理风险（即套期保值）。


    让我们先一窥众多可交易资产。下表中，我们简要定义了市场中常用的资产类型：


    - **股票**：亦称权益，是一种代表发行公司按比例所有权的证券形式。股票的单位称为“股”，持股数量决定所有者对公司所有权的比例，进而影响其利润分配。股票持有者可通过股价上涨或收取股息获利。


    - **债券**：固定收益类债务工具，代表投资者/贷款人向借款人（公司或政府）提供的固定期限贷款。债券持有者可获得固定利率票息或浮动利息，并在到期日收回本金。由于向持有者定期稳定支付利息，它属于固定收益资产。


    - **年金**：由金融机构提供的保险合同，承诺在未来向合同持有人提供固定收入流。投资者主要将年金用于退休规划，可在未来特定期限或终身获得有保障的定期付款。


    - **现金及现金等价物**：高流动性、短期（90 天以内）投资证券，风险低、回报低（通常低于通胀率）。等价物包括银行账户、短期工具（如美国国库券）以及货币市场基金。这些流动资产可随时轻松取用，反映企业偿付短期债务的能力。


    - **大宗商品**：用于商业活动的基础商品，作为生产其他商品或服务的原材料输入。常见大宗商品（如黄金、石油、天然气）可在现货（现金）市场交易，或通过期货、期权等衍生品进行交易。


    - **期货**：以法律协议形式存在的金融衍生品，强制期货合约买方在未来按预设价格、数量和日期买入或卖出标的资产。期货常被用于对冲标的资产的价格波动，从而避免未来不利价格变化造成的损失。期货合约价格每日结算，即按市值计价。


    - **远期**：类似于期货合约。区别在于远期合约是私下协商的定制化协议，通过场外交易（即参与者无需中央交易所或经纪人而直接交易工具的去中心化市场）进行。远期合约价格在协议到期时结算。


    - **期权**：金融衍生品，给予期权合约买方在特定到期日前或到期日以特定（执行）价格买入（看涨期权）或卖出（看跌期权）标的资产的机会。期权赋予买方做多或做空标的资产的权利，而非义务。期权可用于套期保值和投机。请注意，我们默认以欧式期权为重点。


    - **货币**：通过全球（最大且流动性最强）电子市场（也称外汇市场）交易的国际货币及货币衍生品。外汇市场允许投资者按当前市场汇率将一种货币兑换为等值的另一种货币。交易者还会对货币价值的走向进行投机，以从特定货币对有利的价格波动中获利。


    - **ETF**：交易型开放式指数基金，是指一篮子证券（股票、债券、大宗商品等）作为投资组合的集合投资证券，可像普通股票一样在盘中交易。


    - **REITs**：房地产投资信托基金，指拥有、运营或融资创收型房地产的公司。REITs 的投资者（类似于股票，具有流动性和公开交易性）可在不实际购买、管理或融资房地产本身的情况下，从房地产投资中获得稳定的收入流。


    - **共同基金**：一种金融工具，由股票、债券或其他证券的投资组合构成。共同基金由专业资金经理管理，允许个人投资者以支付年费为代价，获得多元化且专业管理的投资组合。共同基金只能在每个交易日结束时，根据计算出的价格（即资产净值）进行购买。


    - **对冲基金**：积极管理的投资池，旨在通过广泛（通常高风险）的交易策略为投资者赚取高于平均水平的回报，但其费用高于传统投资基金。


    这些可交易资产类型可根据特定视角归入不同类别。下一章节我们将介绍几种常见视角。

    '
- fmt: '### Grouping Tradable Assets


    An asset class is a collection of investment instruments that exhibit similar
    fundamental characteristics in terms of risk and return. There are four major
    asset classes: equities, fixed-income instruments, cash and equivalents, and alternative
    investments, defined as financial assets that do not fall into prior investment
    categories. Figure [1-3](#605529_1_En_1_Chapter.xhtml#Fig3) illustrates the four
    classes of investment securities.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig3_HTML.jpg)


    A chart classifies common assets into 4 classes. Equities include stocks. Fixed-income
    instruments include bonds and annuities. Cash and equivalents include cash, bank
    accounts, United States Treasury bills, money market funds, and funds. Alternative
    investment has 8 components.


    Figure 1-3


    Grouping common investment assets into four major classes


    Alternatively, we can group tradable assets based on the type of maturity. Stocks,
    currencies, and commodities are asset classes with no maturity, while fixed-income
    instruments and derivatives have maturities. For vanilla security with a maturity
    date, such as a futures contract, it is possible to compute its fair price based
    on the *no-arbitrage* argument, a topic we will discuss in Chapter [3](#605529_1_En_3_Chapter.xhtml).


    We can also group assets based on the linearity of the payoff function at maturity
    for certain derivative instruments. For example, a futures contract allows the
    buyer/seller to buy/sell the underlying asset at an agreed price at maturity.
    Let us assume the underlying (stock) price at the maturity date is `S[T]` and
    the agreed price is `K`. When a buyer enters/longs a futures contract to buy the
    stock at price `K`, the buyer would make a profit of `S[T] - K` if `S[T] >= K`
    (purchase the stock at a lower price) or suffer a loss of `K - S[T]` if `S[T]
    < K` (purchase the stock at a higher price). A similar analysis applies to the
    case of entering a short position in a futures contract. Both functions are linear
    with respect to the underlying asset’s price upon exercise. See Figure [1-4](#605529_1_En_1_Chapter.xhtml#Fig4)
    for an illustration of linear payoff functions.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig4_HTML.jpg)


    2 line graphs of payoff versus S T. 1. The graph has a linearly increasing line
    for S T minus K. The line intersects the x-axis at point K. 2. The graph has a
    linearly decreasing line for K minus S T. The line intersects the x-axis at point
    K.


    Figure 1-4


    Illustration of the linear payoff function of entering a long or short position
    in a futures contract


    Other derivative products with linear payoff functions include forwards and swaps.
    These are easy to price since their prices are linear functions of the underlying
    asset. We can price these instruments irrespective of the mathematical model for
    the underlying price. In other words, we only require the underlying asset’s price,
    not the mathematical model around the asset. These assets are thus subject to
    model-independent pricing.


    Let us look at the nonlinear payoff function from an options contract. A call
    option gives the buyer a choice to buy the underlying asset at the strike price
    `K` at the maturity date `T` when the underlying asset price is `S[T]`, while
    a put option changes such choice to selling the underlying asset at the strike
    price `K`. Under both situations, the buyer can choose not to exercise the option
    and therefore gains no profit. Given that an investor can either long or short
    a call or put option, there are four combinations when participating in an options
    contract, as listed in the following:


    -   Long a call: Buy a call option to obtain the opportunity to buy the underlying
    asset at a prespecified strike price upon maturity.

    -   Short a call: Sell a call option to allow the buyer the opportunity to buy
    the underlying asset at a prespecified strike price upon maturity.

    -   Long a put: Buy a put option to obtain the opportunity to sell the underlying
    asset at a prespecified strike price upon maturity.

    -   Short a put: Sell a put option to allow the buyer the opportunity to sell
    the underlying asset at a prespecified strike price upon maturity.


    Figure [1-5](#605529_1_En_1_Chapter.xhtml#Fig5) contains the payoff functions
    for the four different combinations, all of which are nonlinear functions of the
    underlying asset price `S[T]`.


    ![](images/605529_1_En_1_Chapter/605529_1_En_1_Fig5_HTML.jpg)


    4 line graphs of payoff versus S T. 1 and 2. Long a call and short a call options
    have a line that grows horizontally up to K and then ascends and descends linearly.
    2. Long a put and short a put options have a line that descends and ascends linearly
    up to K and then grows horizontally.


    Figure 1-5


    Four types of nonlinear payoff functions in an options contract


    Note that tradable instruments within the same asset class exhibit similar characteristics
    but will differ from one another in some aspects. The market behavior will differ
    for tradable instruments that follow their respective price dynamics.


    We can also group a tradable asset according to whether it belongs to the *cash
    market* or the *derivative market*. The cash market, also called the spot market,
    is a marketplace where trading instruments are exchanged at the point of sale,
    and purchasers take immediate possession of the trading products. For example,
    the stock exchange falls into the cash market since investors receive shares of
    stock almost immediately in exchange for cash, thus settling the transactions
    on the spot.


    On the other hand, the derivative market completes a transaction only at a prespecified
    date in the future. Take the futures market, for example. A buyer who pays for
    the right to receive a good only gets to expect the delivery at a prespecified
    future date.


    The next section introduces common trading avenues and steps.'
