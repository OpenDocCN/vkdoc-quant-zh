- fmt: "# Working with Futures Data\n\nWe can retrieve futures data using the `yfinance`\
    \ package. In Listing 3-1, we download futures data on platinum for the year 2022.\
    \ Note that the symbol is `PL=F`. After downloading the dataset, we rewrite the\
    \ index to the `datetime` format so that it facilitates plotting, as shown in\
    \ Listing 3-1.\n\n```\n# For data manipulation\nimport pandas as pd\n# To fetch\
    \ financial data\nimport yfinance as yf\n# For visualisation\nimport matplotlib.pyplot\
    \ as plt\nplt.style.use('seaborn-darkgrid')\n%matplotlib inline\n# Download the\
    \ platinum prices\nfutures_data = yf.download(\"PL=F\", start=\"2022-01-01\",\
    \ end=\"2022-12-31\")\n# Set the index to a datetime type\nfutures_data.index\
    \ = pd.to_datetime(futures_data.index)\nListing 3-1\nDownloading futures data\n\
    ```\n\nLet us plot the closing price via Listing 3-2. Note the use of the `fontsize`\
    \ argument in adjusting the font size in the figure.\n\n```\n# Plot the close\
    \ price\nplt.figure(figsize=(15, 7))\nfutures_data['Adj Close'].plot()\n# Set\
    \ labels and sizes of the title and axis\nplt.title('Platinum Futures Data', fontsize=16)\n\
    plt.xlabel('Year', fontsize=15)\nplt.ylabel('Price ($)', fontsize=15)\nplt.xticks(fontsize=15)\n\
    plt.yticks(fontsize=15)\nplt.legend(['Close'], prop={'size': 15})\n# Show the\
    \ plot\nplt.show()\nListing 3-2\nVisualizing the futures data\n```\n\nRunning\
    \ this command generates Figure 3-8.\n\n![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig8_HTML.jpg)\n\
    \nA line graph of closing price versus years. It has a fluctuating curve that\
    \ ascends, descends, and again ascends.\n\nFigure 3-8  \nVisualizing the closing\
    \ price of platinum futures data in 2022\n\nWe can also download multiple futures\
    \ contracts in one shot. In Listing 3-3, we download the futures data for gold\
    \ and copper, using the `GC=F` and `HG=F` symbols, respectively, followed by formatting\
    \ the index and printing the last five rows.\n\n```\n# Fetch gold and copper futures\
    \ prices\nfutures_data = yf.download([\"GC=F\",\"HG=F\"], start=\"2022-01-01\"\
    , end=\"2022-12-31\", group_by= 'tickers')\n# Set the index to a datetime type\n\
    futures_data.index = pd.to_datetime(futures_data.index)\n# Display the last five\
    \ rows\nfutures_data.tail()\nListing 3-3\nDownloading multiple futures\n```\n\n\
    Note that the DataFrame has two levels of columns, with the first level specifying\
    \ the symbol name and the second one showing the different price points.\n\nSimilarly,\
    \ we can plot the closing price of the two sets of futures data, as shown in Listing\
    \ 3-4.\n\n```\n# Set the figure size\nax = plt.figure(figsize=(15, 7))\n# Plot\
    \ both futures close prices\nax = futures_data['GC=F']['Close'].plot(label='Gold\
    \ Futures')\nax2 = futures_data['HG=F']['Close'].plot(secondary_y=True, color='g',\
    \  ax=ax, label='Copper Futures')\n# Set the title and axis labels and sizes\n\
    plt.title('Gold and Copper Futures Data', fontsize=16)\nax.set_xlabel('Year-Month',\
    \ fontsize=15)\nax.set_ylabel('Gold Price ($)', fontsize=15)\nax2.set_ylabel('Copper\
    \ Price ($)', fontsize=15)\nax.tick_params(axis='both', labelsize=15)\nax2.tick_params(axis='y',\
    \ labelsize=15)\nh1, l1 = ax.get_legend_handles_labels()\nh2, l2 = ax2.get_legend_handles_labels()\n\
    ax.legend(h1+h2, l1+l2, loc=2, prop={'size': 15})\n# Show the plot\nplt.show()\n\
    Listing 3-4\nVisualizing multiple futures time series\n```\n\nRunning this command\
    \ generates Figure 3-9.\n\n![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig9_HTML.jpg)\n\
    \nA dual y-axis line graph of gold and copper prices versus year-month. It has\
    \ 2 fluctuating curves that ascend, descend, and again ascend.\n\nFigure 3-9 \
    \ \nVisualizing the closing price of gold and copper futures data in 2022\n\n\
    ## Adding Technical Indicators\n\nIn this section, we will look at the popular\
    \ S&P 500 E-Mini futures contract and discuss how to add common technical indicators\
    \ to aid technical analysis. The S&P 500 E-Mini futures contract is a financial\
    \ derivative product that tracks the performance of the S&P 500 index, which represents\
    \ the 500 largest publicly traded companies in the United States. The E-Mini futures\
    \ contract is a smaller version of the standard S&P 500 futures contract, making\
    \ it more accessible and affordable for individual traders and investors.\n\n\
    Let us fetch the daily futures data for this specific contract using the symbol\
    \ `ES=F` for the full year of 2022, as shown in Listing 3-5.\n\n```\nfutures_symbol\
    \ = \"ES=F\"\nfutures_data = yf.download(futures_symbol, start=\"2022-01-01\"\
    , end=\"2022-04-01\", interval=\"1d\")\nListing 3-5\nDownloading S&P 500 E-Mini\
    \ futures data\n```\n\nNow let us calculate a few technical indicators using the\
    \ `ta` library. In this example, we will calculate the Relative Strength Index\
    \ (RSI), Bollinger Bands, and MACD (Moving Average Convergence Divergence). The\
    \ following list briefly describes these popular technical indicators:\n\n- **Relative\
    \ Strength Index (RSI)**: RSI is a momentum oscillator that measures the speed\
    \ and change of price movements. The RSI oscillates between 0 and 100, and traders\
    \ often consider an asset overbought when the RSI is above 70 and oversold when\
    \ it's below 30.\n\n- **Bollinger Bands**: Bollinger Bands are a volatility indicator\
    \ that measures the standard deviation of price changes. The indicator consists\
    \ of three lines: the middle line (a simple moving average) and two outer lines\
    \ (upper and lower bands) plotted at a specified number of standard deviations\
    \ away from the moving average. When the bands widen, it indicates increased volatility,\
    \ and when they narrow, it signifies decreased volatility. Prices often move between\
    \ the upper and lower bands.\n\n- **Moving Average Convergence Divergence (MACD)**:\
    \ MACD is a momentum indicator that shows the relationship between two moving\
    \ averages of an asset's price. It consists of two lines: the MACD line (difference\
    \ between short-term and long-term moving averages) and the signal line (a moving\
    \ average of the MACD line). When the MACD line crosses above the signal line,\
    \ it may suggest a bullish signal (buy), and when it crosses below the signal\
    \ line, it may indicate a bearish signal (sell). Additionally, when the MACD line\
    \ is above zero, it suggests an upward momentum, while below zero indicates a\
    \ downward momentum.\n\nListing 3-6 calculates these technical indicators and\
    \ concatenates them to the DataFrame.\n\n```\n# Calculate RSI\nfutures_data[\"\
    RSI\"] = ta.momentum.RSIIndicator(futures_data[\"Close\"]).rsi()\n# Calculate\
    \ Bollinger Bands\nbbands = ta.volatility.BollingerBands(futures_data[\"Close\"\
    ])\nfutures_data[\"BB_upper\"] = bbands.bollinger_hband()\nfutures_data[\"BB_lower\"\
    ] = bbands.bollinger_lband()\n# Calculate MACD\nmacd = ta.trend.MACD(futures_data[\"\
    Close\"])\nfutures_data[\"MACD\"] = macd.macd()\nfutures_data[\"MACD_signal\"\
    ] = macd.macd_signal()\nListing 3-6\nCalculating common technical indicators\n\
    ```\n\nNow we can plot the raw futures time series data together with the technical\
    \ indicators to facilitate analysis, as shown in Listing 3-7."
  raw: '## Working with Futures Data


    We can retrieve futures data using the `yfinance` package. In Listing [3-1](#605529_1_En_3_Chapter.xhtml#PC1),
    we download futures data on platinum for the year 2022\. Note that the symbol
    is “PL=F”. After downloading the dataset, we rewrite the index to the `datetime`
    format so that it facilitates plotting, as shown in Listing [3-1](#605529_1_En_3_Chapter.xhtml#PC1).


    ```

    # For data manipulation

    import pandas as pd

    # To fetch financial data

    import yfinance as yf

    # For visualisation

    import matplotlib.pyplot as plt

    plt.style.use(''seaborn-darkgrid'')

    %matplotlib inline

    # Download the platinum prices

    futures_data = yf.download("PL=F", start="2022-01-01", end="2022-12-31")

    # Set the index to a datetime type

    futures_data.index = pd.to_datetime(futures_data.index)

    Listing 3-1

    Downloading futures data

    ```


    Let us plot the closing price via Listing [3-2](#605529_1_En_3_Chapter.xhtml#PC2).
    Note the use of the `fontsize` argument in adjusting the font size in the figure.


    ```

    # Plot the close price

    plt.figure(figsize=(15, 7))

    futures_data[''Adj Close''].plot()

    # Set labels and sizes of the title and axis

    plt.title(''Platinum Futures Data'', fontsize=16)

    plt.xlabel(''Year'', fontsize=15)

    plt.ylabel(''Price ($)'', fontsize=15)

    plt.xticks(fontsize=15)

    plt.yticks(fontsize=15)

    plt.legend([''Close''], prop={''size'': 15})

    # Show the plot

    plt.show()

    Listing 3-2

    Visualizing the futures data

    ```


    Running this command generates Figure [3-8](#605529_1_En_3_Chapter.xhtml#Fig8).


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig8_HTML.jpg)


    A line graph of closing price versus years. It has a fluctuating curve that ascends,
    descends, and again ascends.


    Figure 3-8


    Visualizing the closing price of platinum futures data in 2022


    We can also download multiple futures contracts in one shot. In Listing [3-3](#605529_1_En_3_Chapter.xhtml#PC3),
    we download the futures data for gold and copper, using the “`GC=F`” and “`HG=F`”
    symbols, respectively, followed by formatting the index and printing the last
    five rows.


    ```

    # Fetch gold and copper futures prices

    futures_data = yf.download(["GC=F","HG=F"], start="2022-01-01", end="2022-12-31",
    group_by= ''tickers'')

    # Set the index to a datetime type

    futures_data.index = pd.to_datetime(futures_data.index)

    # Display the last five rows

    futures_data.tail()

    Listing 3-3

    Downloading multiple futures

    ```


    Note that the DataFrame has two levels of columns, with the first level specifying
    the symbol name and the second one showing the different price points.


    Similarly, we can plot the closing price of the two sets of futures data, as shown
    in Listing [3-4](#605529_1_En_3_Chapter.xhtml#PC4).


    ```

    # Set the figure size

    ax = plt.figure(figsize=(15, 7))

    # Plot both futures close prices

    ax = futures_data[''GC=F''][''Close''].plot(label=''Gold Futures'')

    ax2 = futures_data[''HG=F''][''Close''].plot(secondary_y=True, color=''g'',  ax=ax,
    label=''Copper Futures'')

    # Set the title and axis labels and sizes

    plt.title(''Gold and Copper Futures Data'', fontsize=16)

    ax.set_xlabel(''Year-Month'', fontsize=15)

    ax.set_ylabel(''Gold Price ($)'', fontsize=15)

    ax2.set_ylabel(''Copper Price ($)'', fontsize=15)

    ax.tick_params(axis=''both'', labelsize=15)

    ax2.tick_params(axis=''y'', labelsize=15)

    h1, l1 = ax.get_legend_handles_labels()

    h2, l2 = ax2.get_legend_handles_labels()

    ax.legend(h1+h2, l1+l2, loc=2, prop={''size'': 15})

    # Show the plot

    plt.show()

    Listing 3-4

    Visualizing multiple futures time series

    ```


    Running this command generates Figure [3-9](#605529_1_En_3_Chapter.xhtml#Fig9).


    ![](images/605529_1_En_3_Chapter/605529_1_En_3_Fig9_HTML.jpg)


    A dual y-axis line graph of gold and copper prices versus year-month. It has 2
    fluctuating curves that ascend, descend, and again ascend.


    Figure 3-9


    Visualizing the closing price of gold and copper futures data in 2022


    ### Adding Technical Indicators


    In this section, we will look at the popular S&P 500 E-Mini futures contract and
    discuss how to add common technical indicators to aid technical analysis. The
    S&P 500 E-Mini futures contract is a financial derivative product that tracks
    the performance of the S&P 500 index, which represents the 500 largest publicly
    traded companies in the United States. The E-Mini futures contract is a smaller
    version of the standard S&P 500 futures contract, making it more accessible and
    affordable for individual traders and investors.


    Let us fetch the daily futures data for this specific contract using the symbol
    “`ES=F`” for the full year of 2022, as shown in Listing [3-5](#605529_1_En_3_Chapter.xhtml#PC5).


    ```

    futures_symbol = "ES=F"

    futures_data = yf.download(futures_symbol, start="2022-01-01", end="2022-04-01",
    interval="1d")

    Listing 3-5

    Downloading S&P 500 E-Mini futures data

    ```


    Now let us calculate a few technical indicators using the ta library. In this
    example, we will calculate the Relative Strength Index (RSI), Bollinger Bands,
    and MACD (Moving Average Convergence Divergence). The following list briefly describes
    these popular technical indicators:


    *   Relative Strength Index (RSI): RSI is a momentum oscillator that measures
    the speed and change of price movements. The RSI oscillates between 0 and 100,
    and traders often consider an asset overbought when the RSI is above 70 and oversold
    when it’s below 30.


    *   Bollinger Bands: Bollinger Bands are a volatility indicator that measures
    the standard deviation of price changes. The indicator consists of three lines:
    the middle line (a simple moving average) and two outer lines (upper and lower
    bands) plotted at a specified number of standard deviations away from the moving
    average. When the bands widen, it indicates increased volatility, and when they
    narrow, it signifies decreased volatility. Prices often move between the upper
    and lower bands.


    *   Moving Average Convergence Divergence (MACD): MACD is a momentum indicator
    that shows the relationship between two moving averages of an asset’s price. It
    consists of two lines: the MACD line (difference between short-term and long-term
    moving averages) and the signal line (a moving average of the MACD line). When
    the MACD line crosses above the signal line, it may suggest a bullish signal (buy),
    and when it crosses below the signal line, it may indicate a bearish signal (sell).
    Additionally, when the MACD line is above zero, it suggests an upward momentum,
    while below zero indicates a downward momentum.


    Listing [3-6](#605529_1_En_3_Chapter.xhtml#PC6) calculates these technical indicators
    and concatenates them to the DataFrame.


    ```

    # Calculate RSI

    futures_data["RSI"] = ta.momentum.RSIIndicator(futures_data["Close"]).rsi()

    # Calculate Bollinger Bands

    bbands = ta.volatility.BollingerBands(futures_data["Close"])

    futures_data["BB_upper"] = bbands.bollinger_hband()

    futures_data["BB_lower"] = bbands.bollinger_lband()

    # Calculate MACD

    macd = ta.trend.MACD(futures_data["Close"])

    futures_data["MACD"] = macd.macd()

    futures_data["MACD_signal"] = macd.macd_signal()

    Listing 3-6

    Calculating common technical indicators

    ```


    Now we can plot the raw futures time series data together with the technical indicators
    to facilitate analysis, as shown in Listing [3-7](#605529_1_En_3_Chapter.xhtml#PC7).'
  trans: "\n# 处理期货数据\n\n我们可以使用 `yfinance` 包获取期货数据。在代码清单 3-1 中，我们下载了 2022 年铂金的期货数据。请注意，其代码为\
    \ `PL=F`。下载数据集后，我们将索引重写为 `datetime` 格式，以便于绘图，如代码清单 3-1 所示。\n\n```\n# 用于数据处理\n\
    import pandas as pd\n# 用于获取金融数据\nimport yfinance as yf\n# 用于可视化\nimport matplotlib.pyplot\
    \ as plt\nplt.style.use('seaborn-darkgrid')\n%matplotlib inline\n# 下载铂金价格\nfutures_data\
    \ = yf.download(\"PL=F\", start=\"2022-01-01\", end=\"2022-12-31\")\n# 将索引设置为\
    \ datetime 类型\nfutures_data.index = pd.to_datetime(futures_data.index)\n代码清单 3-1\n\
    下载期货数据\n```\n\n让我们通过代码清单 3-2 绘制收盘价。请注意在调整图中字体大小时 `fontsize` 参数的使用。\n\n```\n# 绘制收盘价\n\
    plt.figure(figsize=(15, 7))\nfutures_data['Adj Close'].plot()\n# 设置标题及坐标轴的标签和大小\n\
    plt.title('铂金期货数据', fontsize=16)\nplt.xlabel('年份', fontsize=15)\nplt.ylabel('价格\
    \ ($)', fontsize=15)\nplt.xticks(fontsize=15)\nplt.yticks(fontsize=15)\nplt.legend(['收盘价'],\
    \ prop={'size': 15})\n# 显示图表\nplt.show()\n代码清单 3-2\n可视化期货数据\n```\n\n运行此命令将生成图\
    \ 3-8。\n\n![](img/605529_1_En_3_Fig8_HTML.jpg)\n\n一张显示收盘价与年份关系的折线图。图上有一条上下波动的曲线，呈现先升、后降、再升的态势。\n\
    \n图 3-8  \n2022 年铂金期货数据收盘价可视化\n\n我们还可以一次性下载多个期货合约。在代码清单 3-3 中，我们分别使用代码 `GC=F`\
    \ 和 `HG=F` 下载黄金和铜的期货数据，随后对索引进行格式化并打印最后五行。\n\n```\n# 获取黄金和铜的期货价格\nfutures_data\
    \ = yf.download([\"GC=F\",\"HG=F\"], start=\"2022-01-01\", end=\"2022-12-31\"\
    , group_by= 'tickers')\n# 将索引设置为 datetime 类型\nfutures_data.index = pd.to_datetime(futures_data.index)\n\
    # 显示最后五行\nfutures_data.tail()\n代码清单 3-3\n下载多个期货数据\n```\n\n请注意，该 DataFrame 具有两层级列，第一层级指定代码名称，第二层级显示不同的价格点。\n\
    \n类似地，我们可以绘制这两组期货数据的收盘价，如代码清单 3-4 所示。\n\n```\n# 设置图形大小\nax = plt.figure(figsize=(15,\
    \ 7))\n# 绘制两个期货的收盘价\nax = futures_data['GC=F']['Close'].plot(label='黄金期货')\nax2\
    \ = futures_data['HG=F']['Close'].plot(secondary_y=True, color='g',  ax=ax, label='铜期货')\n\
    # 设置标题及坐标轴标签和大小\nplt.title('黄金与铜期货数据', fontsize=16)\nax.set_xlabel('年-月', fontsize=15)\n\
    ax.set_ylabel('黄金价格 ($)', fontsize=15)\nax2.set_ylabel('铜价格 ($)', fontsize=15)\n\
    ax.tick_params(axis='both', labelsize=15)\nax2.tick_params(axis='y', labelsize=15)\n\
    h1, l1 = ax.get_legend_handles_labels()\nh2, l2 = ax2.get_legend_handles_labels()\n\
    ax.legend(h1+h2, l1+l2, loc=2, prop={'size': 15})\n# 显示图表\nplt.show()\n代码清单 3-4\n\
