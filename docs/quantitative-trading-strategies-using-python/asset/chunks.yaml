  trans: '

    # 趋势交易简介


    趋势交易，亦称趋势跟踪，是一种试图利用金融市场中现有趋势动力的策略。其运作前提是，证券价格往往会在一定时间内沿着相对持续的方向运动，要么上涨（多头），要么下跌（空头）。这是一种主动型交易策略，寻求利用资产价格持续的方向性动力来获利。


    趋势交易的基本原则是，市场的动力（即资产价格的加速率）往往会在某一方向上持续一段时间。这里涉及两个关键概念：趋势和动力。趋势代表资产价格运动的方向，而动力则指示这种运动在一定时期内的强度或速度。它指的是资产价格趋势在未来自我维持的能力。强劲的动力可以持续向上或向下运动，这可以通过一系列技术指标来确认。


    趋势交易者利用技术分析工具来识别潜在的买入和卖出机会。他们仔细分析价格图表，并使用各种技术指标，如移动平均线、`MACD`（指数平滑异同移动平均线）和相对强弱指数（`RSI`）等，来识别并确认资产的趋势方向和动力。这些技术指标提供的信号能帮助交易者做出何时开仓和平仓的明智决策。


    在上升趋势中，趋势交易者会建立多头头寸，即买入资产，预期其价格将继续上涨。反之，在下降趋势中，趋势交易者会建立空头头寸，即卖出（或做空）资产，预期其价格将继续下跌。趋势跟踪策略旨在利用这些显著的价格变动，并根据预期创出新高的上升趋势或创出新低的下降趋势，在上涨和下跌市场中均能获利。


    让我们从用于产生交易信号的技术指标开始。


    ## 理解技术指标


    技术指标是基于历史价格（最高价、最低价、开盘价、收盘价等）或成交量进行的数学计算，可用于确定交易的开仓和平仓点。它们是许多交易策略和系统不可或缺的组成部分，能提供对市场行为的关键洞察。可将其视为从原始资产数据中衍生出的附加特征，这是机器学习中特征工程的一种实践。这使得技术指标高度依赖于具体证券：对某一特定证券有效的指标，对另一证券可能并不适用。选择正确的特征至关重要。


    请注意，这些技术指标会作为数据集中每个观测值的附加特征出现。这意味着我们之前处理的价量表会增加更多列，每一列代表特定资产在特定时间下的一个单独技术指标。


    在查看原始价格数据时，叠加一组技术指标有助于交易者更清晰地分析市场。例如，技术指标有助于确认市场是处于趋势之中，还是处于价格区间内震荡的盘整状态。


    技术指标是许多交易策略和系统不可或缺的组成部分，能提供对市场行为的关键洞察。如您所述，它们是基于历史价格和成交量数据进行数学计算得出的工具，旨在预测未来的价格趋势或形态。


    一些最常用的技术指标包括：


    *   **移动平均线（MA）：** 移动平均线通过创建一个不断更新的平均价格来平滑价格数据。最常见的两种类型是简单移动平均线（`SMA`）和指数移动平均线（`EMA`）。它们有助于判断证券处于上升趋势还是下降趋势。稍后将详细展开。


    *   **相对强弱指数（RSI）：** `RSI`衡量价格变动的速度和幅度，通常在 0 到 100 的范围内取值。高`RSI`值（通常高于 70）可能表示该资产处于超买状态，面临价格回调；而低`RSI`值（通常低于
    30）则可能表明资产处于超卖状态，有望反弹。


    *   **指数平滑异同移动平均线（MACD）：** 该指标是一个趋势跟踪的动力指标，显示了证券价格的两条移动平均线之间的关系。`MACD`的计算方法是用
    12 日`EMA`减去 26 日`EMA`。


    *   **布林带：** 这些带子在简单移动平均线上下两个标准差的位置绘制。它们有助于判断资产是否超买或超卖，并可能预示着趋势的结束。


    *   **基于成交量的指标：** 这些指标包括诸如平衡交易量（`OBV`）等，它利用成交量流来预测股票价格的变化。


    这些指标中的每一个都提供了对潜在市场动向的独特视角。通常，交易者会结合使用这些指标来构建稳健的交易策略。


    另外请注意，这些指标并不能绝对准确地预测未来价格。相反，它们帮助交易者基于统计概率来识别潜在的交易机会。每个指标在特定的市场条件下效果最佳，并且可能并非普遍适用于所有资产类别、市场和交易周期。


    下一节将对移动平均线进行更详细的介绍。

    '
- fmt: '### Introducing Moving Averages


    Moving average, also called rolling average, is the mean or average of the specified
    data field (e.g., daily closing price) for a given set of *consecutive* periods.
    As new data becomes available, the mean of the data is computed by dropping the
    oldest value and adding the latest one. It is rolling along with the data, hence
    the name “moving average.” It provides a way of smoothing out the price data of
    a financial asset to identify trends more clearly.


    When calculating moving averages of stock prices, it works similarly to moving
    a fixed-size window along the time horizon, where each window reports a single
    number as the average of all price points within the window. And when that window
    does not have full price points for the initial periods, an `NA` value is often
    reported.


    When working with time series data such as daily stock price, the averaging effect
    can also be considered as smoothening the time series, reducing short-term fluctuations
    and temporary variations in the data.


    There are different types of moving averages, with the simple moving average and
    the exponential moving average being the most popular ones. The simple moving
    average is straightforward to calculate; we simply take the average of all the
    price points in the current fixed-size window, assuming an equal weightage for
    all the price points in this window.


    The exponential moving average, or exponentially weighted moving average (EWMA),
    decreases the weightage for older price points. It’s more complex to calculate
    than the SMA, as it involves a smoothing factor that needs to be computed. But
    the basic idea is the same: it’s an average of the closing prices over a certain
    period.


    The choice between using a simple or exponential moving average depends on the
    trader’s preference and the specific trading strategy. In general, EMAs react
    more quickly to recent price changes than SMAs, making them more preferred by
    short-term traders or those trading volatile markets.


    Moving averages can be used to identify support and resistance levels. The support
    level is typically a price level or zone that a stock or a market has had difficulty
    falling below over a specific period. The resistance level is the opposite of
    the support level. It’s a price level or zone that a stock or a market has trouble
    moving above. Prices often bounce off these levels, making them useful for identifying
    potential trade entry and exit points.


    In addition, when two moving averages (e.g., 50-day and 200-day) cross each other,
    it may signal a change in trend. A bullish signal is given when the shorter MA
    crosses above the longer MA, and a bearish signal is given when the shorter MA
    crosses below the longer MA. These crossover points become potential trading signals.


    The following section focuses more on the simple moving averages.


    ### Delving into Simple Moving Averages


    The simple moving average `SMA[t]` at time `t` is defined as follows:


    ![$$ SM{\mathrm{A}}_t=\frac{S_{t-\left(M-1\right)}+\dots +{S}_{t-1}+{S}_t}{M}
    $$](images/605529_1_En_5_Chapter/605529_1_En_5_Chapter_TeX_Eque.png)


    In other words, to calculate `SMA[t]`, we would take `M` historical price points,
    including the current period, and then take the average of these `M` price points.
    Essentially, it involves adding up the prices of the security for the last `M`
    periods (days, hours, etc.) and then dividing by `M`. This provides a single output
    point, the SMA at time `t`. As new price data becomes available, the oldest data
    point is dropped, and the newest data point is included in the calculation. This
    “rolling” or “moving” calculation continues as new price data is added.


    The SMA is often used in trend analysis as it smoothens out short-term fluctuations
    and provides a clearer picture of the overall trend. It is the unweighted mean
    of the previous `M` price points. Here, the choice of `M` (the number of periods)
    is crucial because it affects the sensitivity and reliability of the SMA. A smaller
    `M` will be more responsive to price changes but may also yield more false signals.
    A larger `M` will provide a slower, more reliable SMA, but it might be slower
    in signaling changes in trends.


    Let us look at how to calculate SMA. We first download Apple’s stock price data
    for 2022, as shown in Listing [5-7](#605529_1_En_5_Chapter.xhtml#PC9).


    ```

    import numpy as np

    import pandas as pd

    import matplotlib.pyplot as plt

    import yfinance as yf

    symbol = ''AAPL''

    df = yf.download(symbol, start="2022-01-01", end="2023-01-01")

    df.index = pd.to_datetime(df.index)

    >>> df.head()

    Open       High       Low        Close Adj  Close      Volume

    Date

    2022-01-03 177.830002 182.880005 177.710007 182.009995 180.434296 104487900

    2022-01-04 182.630005 182.940002 179.119995 179.699997 178.144302 99310400

    2022-01-05 179.610001 180.169998 174.639999 174.919998 173.405685 94537600

    2022-01-06 172.699997 175.300003 171.639999 172.000000 170.510956 96904000

    2022-01-07 172.889999 174.139999 171.029999 172.169998 170.679489 86709100

    Listing 5-7

    Downloading Apple’s stock price data

    ```


    Note that we have an index named `Date` which now assumes a `datetime` format
    to facilitate plotting.


    Listing [5-8](#605529_1_En_5_Chapter.xhtml#PC10) generates a plot on the daily
    adjusted closing price. We will later overlay its SMA on the same plot.


    ```

    # plot the adj closing price

    plt.figure(figsize=(15, 7))

    df[''Adj Close''].plot()

    # set labels and sizes of the title and axis

    plt.title(''Daily adjusted closing price of Apple'', fontsize=16)

    plt.xlabel(''Time'', fontsize=15)

    plt.ylabel(''Price ($)'', fontsize=15)

    plt.xticks(fontsize=15)

    plt.yticks(fontsize=15)

    plt.legend([''Close''], prop={''size'': 15})

    # show the plot

    >>> plt.show()

    Listing 5-8

    Plotting the daily adjusted closing price

    ```


    Running the commands generates Figure [5-9](#605529_1_En_5_Chapter.xhtml#Fig9),
    suggesting a download trend overall.


    ![](images/605529_1_En_5_Chapter/605529_1_En_5_Fig9_HTML.jpg)


    A line graph of price versus time presents the variations in the closing prices
    of apples between January 2021 and January 2023\. The close curve has fluctuation
    trends.


    Figure 5-9


    Visualizing the daily closing price of Apple in 2022


    Now we create an SMA series with a window size of three. We can create the rolling
    window using the `rolling()` method for a Pandas Series, followed by the `mean()`
    method to extract the average value from the window (a collection of price points).
    Listing [5-9](#605529_1_En_5_Chapter.xhtml#PC11) creates a new SMA column called
    `SMA-3` and subsets to keep only two columns: the adjusted closing price and the
    SMA column.'
