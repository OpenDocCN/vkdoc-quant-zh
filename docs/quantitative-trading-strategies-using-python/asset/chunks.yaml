    ![$$ \hat{y_i}={\beta}_0+{\beta}_1{x}_i,i\in \left\{1,\dots, N\right\} $$](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Equd.png)


    The following code snippet implements this expression and calculates the model
    predictions manually. We also check if the manually calculated residuals are equal
    to the previous values using the `equals()` function:


    ```

    # alternative approach

    residuals2 = Y - (model.params[''const''] + model.params[stocks[1]] * X)

    # check if both residuals are the same

    print(residuals.equals(residuals2))

    ```


    Lastly, we test the stationarity of the residual series, again using the augmented
    Dickey-Fuller (ADF) test. The test can be performed using the `adfuller()` function
    from the `statsmodels` package. There are two metrics that are relevant to every
    statistical test: the test statistic and the p-value. Both metrics convey the
    same information on the statistical significance of the underlying hypothesis,
    with the p-value being a standardized and, thus, more interpretable metric. A
    widely used threshold (also called the significance level) is 5% for the p-value.
    That is, if the resulting p-value from a statistical test is less than 5%, we
    can safely (up to a confidence level of 95%) reject the null hypothesis in favor
    of the alternative hypothesis. If the p-value is greater than 5%, we fail to reject
    the null hypothesis and conclude that the two stocks are not cointegrated.


    The null hypothesis often represents the status quo. In the case of the cointegration
    testing using the Engle-Granger test, the null hypothesis is that the two stocks
    are not cointegrated. That is, the historical prices do not exhibit a linear relationship
    in the long run. The alternative hypothesis is that the two stocks are cointegrated,
    as exhibited by a linear relationship between the two and a stationary residual
    series.


    Now let us carry out the ADF test and use the result to determine if these two
    stocks are cointegrated using a significance level of 5%. In Listing [8-6](#605529_1_En_8_Chapter.xhtml#PC10),
    we apply the `adfuller()` function to the prediction residuals and print out the
    test statistic and p-value. This is followed by an if-else statement to determine
    if we have enough confidence to reject the null hypothesis and claim that the
    two stocks are cointegrated.


    ```

    # test stationarity of the residuals

    adf_test = adfuller(residuals)

    print(f"ADF test statistic: {adf_test[0]}")

    print(f"p-value: {adf_test[1]}")

    if adf_test[1] < 0.05:

    print("The two stocks are cointegrated.")

    else:

    print("The two stocks are not cointegrated.")

    ADF test statistic: -3.179800920038961

    p-value: 0.021184058997635733

    The two stocks are cointegrated.

    Listing 8-6

    Testing stationarity of the residuals

    ```


    The result suggests that Google and Microsoft stocks are cointegrated due to a
    small p-value of 2%. Indeed, based on our previous analysis of calculating the
    max drawdown, Google and Microsoft stock prices generally tend to move together.
    However, with the introduction of ChatGPT in Bing search, the overall picture
    may start to change. Such cointegration (comovement) may gradually weaken as the
    tool gives everything for Microsoft to win (due to a small revenue from web search)
    and for Google to lose (majority revenue comes from web search).


    Next, we touch upon another closely related but different statistical concept:
    correlation.


    ### Correlation and Cointegration


    Both correlation and cointegration are important statistical measures used to
    analyze the relationship between two time series datasets. Correlation quantifies
    the degree of linear association between two time series. In essence, it reveals
    whether the two variables increase or decrease in tandem and the strength of this
    relationship. The correlation coefficient can vary between –1 and 1\. A coefficient
    of 1 denotes a perfect positive linear relationship, –1 signifies a perfect negative
    linear relationship, while 0 suggests the absence of any linear relationship.


    In contrast, cointegration is concerned with the long-term equilibrium relationship
    between two potentially non-stationary time series. If two time series are cointegrated,
    it signifies that they share a common long-term trend, regardless of their short-term
    variations. Consequently, while the two time series may not exhibit short-term
    linear correlation, they can display a long-term stationary pattern when suitably
    combined. This enables analysts to uncover persistent relationships masked by
    transitory market volatility.


    The following code snippet provides an example of two correlated time series that
    are not cointegrated. We first sample two series of 100 random values following
    normal distributions with a different mean and the same variance. This is followed
    up by a cumulative summation operation stored as a Pandas Series object. Finally,
    we plot both series as lines after combining them horizontally in a DataFrame
    and calling the plot() function:


    ```

    np.random.seed(123)

    X = np.random.normal(1, 1, 100)

    Y = np.random.normal(2, 1, 100)

    X = pd.Series(np.cumsum(X), name=''X'')

    Y = pd.Series(np.cumsum(Y), name=''Y'')

    pd.concat([X, Y], axis=1).plot()s

    ```


    Running the code generates Figure [8-5](#605529_1_En_8_Chapter.xhtml#Fig5). Series
    Y has a higher drift than series X as designed and also exhibits a high degree
    of correlation (or comovement) across the whole history of 100 points.


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig5_HTML.jpg)


    A line graph of the y-axis versus the x-axis. It has 2 ascending fluctuating lines
    for X and Y that start at the origin. The line for Y has a higher rise than the
    line for X.


    Figure 8-5


    Illustrating the evolution of two series that are highly correlated but not cointegrated


    Let us calculate the exact correlation coefficient and cointegration p-value.
    In the following code snippet, we call the `corr()` method to obtain the correlation
    of X with Y and use the `coint()` function from the `statsmodels` package to perform
    the cointegration test and retrieve the resulting p-value. The `coint()` function
    performs the augmented Engle-Granger two-step cointegration test, similar to how
    to manually carry out the two-step process earlier. The result shows that these
    two series are highly correlated but not cointegrated.


    ```

    from statsmodels.tsa.stattools import coint

    # calculate the correlation coefficeint

    >>> print(''Correlation: '' + str(X.corr(Y)))

    # perform in cointegration test

    score, pvalue, _ = coint(X,Y)

    >>> print(''Cointegration test p-value: '' + str(pvalue))

    Correlation: 0.994833254077976

    Cointegration test p-value: 0.17830098966789126

    ```


    In the next section, we dive deep into the implementation of the pairs trading
    strategy.'
