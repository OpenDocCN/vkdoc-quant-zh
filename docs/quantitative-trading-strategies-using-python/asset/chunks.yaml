    Now we calculate the same using log returns, starting by obtaining the single-period
    log returns in Listing [5-5](#605529_1_En_5_Chapter.xhtml#PC6).


    ```

    # log returns (1+R format)

    log_returns = np.log(1+returns)

    >>> log_returns

    Date

    2023-01-03 00:00:00-05:00         NaN

    2023-01-04 00:00:00-05:00   -0.011098

    2023-01-05 00:00:00-05:00   -0.022112

    2023-01-06 00:00:00-05:00    0.015892

    Name: Close, dtype: float64

    Listing 5-5

    Calculating the log returns

    ```


    We can add all log returns from previous periods together to get the cumulative
    log returns, convert back to the original scale via exponentiation, and, lastly,
    offset by one to convert from `1+R` to the simple return format, as shown in Listing
    [5-6](#605529_1_En_5_Chapter.xhtml#PC7).


    ```

    # get cumulative returns using log returns

    cum_return2 = np.exp(log_returns.cumsum()) - 1

    >>> cum_return2

    Date

    2023-01-03 00:00:00-05:00         NaN

    2023-01-04 00:00:00-05:00   -0.011037

    2023-01-05 00:00:00-05:00   -0.032664

    2023-01-06 00:00:00-05:00   -0.017168

    Name: Close, dtype: float64

    Listing 5-6

    Calculating the cumulative returns using log returns

    ```


    Again, we verify the value of the last entry and verify that it is the same as
    the previous terminal return:


    ```

