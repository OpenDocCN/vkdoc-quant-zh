- fmt: '### Limit Order Book


    Note that a limit order book likely contains multiple bids and asks for the same
    instrument. These two types of trading directions, that is, bid and ask, represent
    the demand and supply side of the market. These limit orders are shelved on the
    book because they are not executable at the moment, for a reason. That reason
    is the bid/ask spread, defined as the price difference between the best bid and
    the best offer/ask of a LOB for a given instrument.


    The best bid represents the limit order with the highest price the underlying
    investor from the demand side is willing to pay for the specific asset, and the
    best offer/ask is the lowest price some other investor from the supply side is
    willing to sell out the specific asset. When this gap is negative, the bordering
    trades will be automatically filled, creating a new spread based on the new best
    bid and offer. Popular large-cap stocks will have little or no spread, as you
    can almost always find another party who is willing to make the trade. The spread
    becomes wider for those less popular instruments. This means you should be careful
    when entering a position for these less frequently traded assets, as it will be
    challenging to exit the position later on.


    The bid/ask spread plays a critical role in trading as it directly relates to
    the cost of trading and the liquidity of the trading market for the specific asset.
    A small spread indicates a highly liquid market where multiple buyers and sellers
    are involved. This leads to lower transaction costs and faster order execution.
    On the other hand, a big spread suggests a less liquid market. In this case, fewer
    market participants are interested in trading the asset, leading to potentially
    higher transaction costs and slower order execution.


    Market makers provide liquidity by continuously quoting both bid and ask prices
    for a particular asset, thus playing an essential role in maintaining a healthy
    bid/ask spread and providing sufficient liquidity to the market. These market
    participants stand ready to buy or sell the asset at their quoted prices, ensuring
    that there is always a counterparty available for traders looking to execute their
    orders. As a result, the presence of active market makers can, and are incentivized
    to, help reduce the bid/ask spread and improve overall market efficiency.


    Figure [2-1](#605529_1_En_2_Chapter.xhtml#Fig1) illustrates the limit order book
    for a particular asset. There are multiple price points (along with their sizes/volumes)
    for the demand from the buy side and the supply from the sell side. We take the
    lowest ask price of the upper box as the best offer and the highest bid price
    of the lower box as the best bid. The difference between the two gives the bid/ask
    spread. A bigger gap corresponds to lower liquidity. A market maker would be incentivized
    to reduce the gap by providing more liquidity to the market, making the trades
    of this asset more executable.


    ![](images/605529_1_En_2_Chapter/605529_1_En_2_Fig1_HTML.jpg)


    A diagram that describes steps of the limit order book of a specific asset. There
    is a relation between the supply side and the demand side through bid ask spread,
    best offer or ask, and best bid. Supply side includes volume for ask prices and
    demand side, for bid prices.


    **Figure 2-1** Illustrating the limit order book that consolidates all standing
    limit orders (prices and quantities) from the buy side and the sell side. A market
    maker is incentivized to reduce the gap by providing more liquidity to the market,
    serving as the liquidity provider, and making the trades of this asset more executable.


    We can also look at the marketability of buy and sell orders at different ranges.
    As shown in Figure [2-2](#605529_1_En_2_Chapter.xhtml#Fig2), we divide the limit
    order book into five different regions: above the best offer, at the best offer,
    between the best bid and best offer, at the best bid, and below the best bid.
    For a buy order, it will be (easily) marketable if the price is at regions 1 and
    2, since those eager to sell the asset (at the bottom part of the top box) would
    love to see a buyer with an expected or even higher bid. We call the buy order
    in the market if it lives within region 3, a situation in flux. Region 4 is borderline
    and is called at the market, representing the best bid of all the buyers in the
    limit order book. When the price of the buy order drops to region 5, there is
    no marginal competitiveness, and the order will simply be buried among the rest
    of the buy orders, leaving it behind the market. The same reasoning applies to
    the marketability of sell orders as well.


    ![](images/605529_1_En_2_Chapter/605529_1_En_2_Fig2_HTML.jpg)


    A diagram to analyze the marketability of buy orders and sell orders. The different
    regions of the limit order book between ask price and bid price are above the
    best offer, at the best offer, between the best bid and best offer, at the best
    bid, and below the best bid.


    **Figure 2-2** Analyzing the marketability of buy and sell orders within different
    regions of the limit order book.


    It is important for traders and investors to understand the marketability of buy
    and sell orders in these different regions so as to optimize their order execution
    strategies. By strategically placing orders in the appropriate regions, traders
    can increase the likelihood of their orders being executed at the desired price
    levels, thus minimizing transaction costs and better managing trading risks. Furthermore,
    by monitoring the market dynamics and the depth of the limit order book (the number
    of levels of buy and sell limit orders available in the order book at a given
    point in time), traders can gain valuable insights into the market dynamics of
    the asset.


    ### Display vs. Non-display Orders


    A display order is a visible order, and a non-display order is a hidden one that
    is not displayed on the limit order book. The former is much more heavily regulated
    than the latter.


    A visible order is prohibited from crossing the market. For example, if an offer
    is already on one exchange, another exchange cannot post a bid for the same price
    or higher, thus creating a locked market. These regulations ensure a stable bid/ask
    spread for a particular asset. On the other hand, hidden orders have no such regulation.


    Hidden, or non-display, orders offer traders a degree of anonymity by concealing
    their intentions and visibility from other market participants. This is particularly
    useful for large institutional investors who want to avoid revealing their large
    positions and prevent other traders from front-running or anticipating their trades.
    While hidden orders provide anonymity, they usually have lower execution priority
    compared to visible orders at the same price level. This means that when equally
    priced orders are matched, visible orders are executed first, followed by hidden
    orders based on their time of arrival.


    The choice between using display and non-display orders depends on specific trading
    objectives and market conditions. Display orders are suitable for traders who
    prioritize execution speed and are willing to reveal their intentions to the market.
    Non-display orders, on the other hand, are more appropriate for traders who prioritize
    discretion and want to minimize the resulting market impact. However, they may
    have to accept the trade-off of lower execution priority and increased time to
    fill the order.'
