- fmt: "### Pairs Trading\n\nPairs trading is a market-neutral strategy that leverages\
    \ statistical analysis to generate potential profits regardless of the overall\
    \ market direction. The \"pair\" in pairs trading refers to simultaneously taking\
    \ two positions: going long on one asset and short on another, with the key requirement\
    \ being that these assets are highly correlated. The trading signal stems from\
    \ the spread or price difference between these two assets.\n\nAn unusually large\
    \ spread, in comparison to historical data, suggests a temporary divergence, and\
    \ the anticipation is that this divergence will eventually correct itself, reverting\
    \ to its mean or average value over time. Traders can capitalize on this mean-reverting\
    \ behavior, initiating trades when the spread is abnormally wide and closing them\
    \ once the spread narrows and returns to its typical range.\n\nThe determination\
    \ of what constitutes an \"abnormal\" or \"normal\" spread is crucial and forms\
    \ the core parameters of the pairs trading strategy. This typically involves extensive\
    \ backtesting, where historical price data is analyzed to identify consistent\
    \ patterns in price divergence and convergence, which then informs the thresholds\
    \ for trade entry and exit points. Pairs trading, while robust in its market-neutral\
    \ stance, requires a keen understanding of the long-term equilibrium relationship\
    \ between the paired assets and careful management of potential risks if the expected\
    \ price convergence does not materialize.\n\nIn the strategy of pairs trading,\
    \ asset selection is grounded in a statistical procedure called hypothesis testing,\
    \ specifically, the cointegration test. This process uses historical price data\
    \ to identify pairs of financial instruments that exhibit a high level of correlation.\
    \ When two assets are highly correlated, they tend to move in a synchronized manner.\
    \ This means that any price change in one asset is typically mirrored proportionally\
    \ by the other, resulting in relatively stable spreads that do not deviate significantly\
    \ from their historical average. However, there can be moments when this spread\
    \ deviates markedly from its historical norm, suggesting temporary mispricing\
    \ of the assets. This divergence indicates that the assets' prices have drifted\
    \ apart more than their usual correlation would predict.\n\nSuch deviations create\
    \ a unique profit opportunity in pairs trading. Traders can capitalize on these\
    \ large spreads by betting on their future contraction. Specifically, the strategy\
    \ would be to go long on the underpriced asset and short on the overpriced one,\
    \ with the anticipation that the spread will revert back to its historical average\
    \ as the asset prices correct themselves. This reversion provides the opportunity\
    \ to close both positions at a profit.\n\nFigure [8-2](#605529_1_En_8_Chapter.xhtml#Fig2)\
    \ provides the overall workflow of implementing a pairs trading strategy. At first,\
    \ we analyze a group of financial assets (such as stocks) and identify a pair\
    \ that passes the cointegration test. This is a statistical test that determines\
    \ if a group of assets is cointegrated, meaning their combination generates a\
    \ stationary time series, despite each individual time series not exhibiting such\
    \ stationarity. In other words, the historical differences, or spreads, of the\
    \ two cointegrated assets form a stationary time series. We can thus monitor the\
    \ current spread and check if it exceeds a reasonable range of historical spreads.\
    \ Exceeding the normal range indicates a trading signal to enter two positions:\
    \ long the underpriced asset and short the overpriced asset. We would then hold\
    \ these positions until the current spread shrinks back to the normal range, upon\
    \ which point we would exit the positions and lock in a profit before it shrinks\
    \ even further (which results in a loss).\n\n![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig2_HTML.jpg)\n\
    \nA workflow diagram. Select a pair of stocks that passes the cointegration test.\
    \ Obtain a normal range of historical spread. Compare current spreads with historical\
    \ spreads. If short-term fluctuation occurs, enter a position. When the current\
    \ spread reverts to normal, exit a position.\n\n**Figure 8-2**  \nOverall workflow\
    \ of implementing the pairs trading strategy\n\n### Cointegration\n\nCointegration,\
    \ a concept pivotal to hypothesis testing, posits two potential scenarios: the\
    \ null hypothesis, which states that two or more non-stationary time series are\
    \ not cointegrated, and the alternative hypothesis, which claims the opposite,\
    \ that is, these time series are cointegrated if their linear combination generates\
    \ a stationary time series (more on this later).\n\nLet’s demystify some of the\
    \ jargon here. A time series refers to a sequence of data points indexed (or listed\
    \ or graphed) in time order, with each data point assigned a specific timestamp.\
    \ This dataset can be analyzed through several summary statistics or statistical\
    \ properties. These can include metrics like mean and variance computed over a\
    \ certain time frame or window.\n\nMoving this window across different periods,\
    \ a stationary time series exhibits constancy in its mean and variance on average.\
    \ This means that no matter when you observe it, its basic properties do not change.\
    \ On the other hand, a non-stationary time series demonstrates a trend or a drift,\
    \ signifying a changing mean and variance across varying time periods. These time\
    \ series are dynamic, with their basic properties shifting over time, often due\
    \ to factors like trends and seasonality.\n\nHence, the process of cointegration\
    \ examines whether there is a long-term equilibrium relationship between non-stationary\
    \ time series despite short-term fluctuations. Such long-term equilibrium manifests\
    \ as a stationary time series as a linear combination of the two non-stationary\
    \ time series.\n\nMany traditional statistical methods, including ordinary least\
    \ squares (OLS) regression, are based on the assumption that the variables under\
    \ analysis—which are also time series data points—exhibit stationarity. This implies\
    \ that their fundamental statistical characteristics remain consistent over time.\
    \ However, when dealing with non-stationary variables, this stationarity assumption\
    \ gets violated. As a result, different techniques are needed to perform the modeling.\
    \ One common strategy is to difference the non-stationary variable (deriving a\
    \ new time series by taking the difference in the observed values of two consecutive\
    \ time points) to eliminate any observable trend or drift.\n\nA non-stationary\
    \ time series might possess a unit root, which signifies a root of one in its\
    \ autoregressive (AR) polynomial. To put it differently, the value in the next\
    \ time period is strongly impacted by the present period value. This dependency\
    \ reflects a form of serial correlation, where values from previous periods exert\
    \ influence on subsequent ones, thereby potentially leading to non-stationary\
    \ behavior.\n\nThe unit root test, therefore, is a method to examine whether a\
    \ time series is non-stationary and possesses a unit root. Identifying and addressing\
    \ the presence of a unit root is a critical step in the process of time series\
    \ modeling, especially when the aim is to understand long-term trends and forecasts.\n\
    \nIn essence, a cointegration test examines the assumption that, although individual\
    \ time series may each have a unit root and hence be non-stationary, a linear\
    \ combination of these time series might result in a stationary series. This forms\
    \ the alternative hypothesis for the test.\n\nTo be precise, the alternative hypothesis\
    \ states that the aggregate time series, derived from a linear combination of\
    \ individual time series, achieves stationarity. Should this be the case, it would\
    \ imply a persistent long-term relationship among these time series variables.\
    \ Such long-term relationships will get obscured by temporary fluctuations in\
    \ the market from time to time, due to factors such as mispricing. Hence, the\
    \ cointegration test aids in revealing these hidden long-term relationships among\
    \ time series variables."
  raw: '### Pairs Trading


    Pairs trading is a market-neutral strategy that leverages statistical analysis
    to generate potential profits regardless of the overall market direction. The
    “pair” in pairs trading refers to simultaneously taking two positions: going long
    on one asset and short on another, with the key requirement being that these assets
    are highly correlated. The trading signal stems from the spread or price difference
    between these two assets.


    An unusually large spread, in comparison to historical data, suggests a temporary
    divergence, and the anticipation is that this divergence will eventually correct
    itself, reverting to its mean or average value over time. Traders can capitalize
    on this mean-reverting behavior, initiating trades when the spread is abnormally
    wide and closing them once the spread narrows and returns to its typical range.


    The determination of what constitutes an “abnormal” or “normal” spread is crucial
    and forms the core parameters of the pairs trading strategy. This typically involves
    extensive backtesting, where historical price data is analyzed to identify consistent
    patterns in price divergence and convergence, which then informs the thresholds
    for trade entry and exit points. Pairs trading, while robust in its market-neutral
    stance, requires a keen understanding of the long-term equilibrium relationship
    between the paired assets and careful management of potential risks if the expected
    price convergence does not materialize.


    In the strategy of pairs trading, asset selection is grounded in a statistical
    procedure called hypothesis testing, specifically, the cointegration test. This
    process uses historical price data to identify pairs of financial instruments
    that exhibit a high level of correlation. When two assets are highly correlated,
    they tend to move in a synchronized manner. This means that any price change in
    one asset is typically mirrored proportionally by the other, resulting in relatively
    stable spreads that do not deviate significantly from their historical average.
    However, there can be moments when this spread deviates markedly from its historical
    norm, suggesting temporary mispricing of the assets. This divergence indicates
    that the assets’ prices have drifted apart more than their usual correlation would
    predict.


    Such deviations create a unique profit opportunity in pairs trading. Traders can
    capitalize on these large spreads by betting on their future contraction. Specifically,
    the strategy would be to go long on the underpriced asset and short on the overpriced
    one, with the anticipation that the spread will revert back to its historical
    average as the asset prices correct themselves. This reversion provides the opportunity
    to close both positions at a profit.


    Figure [8-2](#605529_1_En_8_Chapter.xhtml#Fig2) provides the overall workflow
    of implementing a pairs trading strategy. At first, we analyze a group of financial
    assets (such as stocks) and identify a pair that passes the cointegration test.
    This is a statistical test that determines if a group of assets is cointegrated,
    meaning their combination generates a stationary time series, despite each individual
    time series not exhibiting such stationarity. In other words, the historical differences,
    or spreads, of the two cointegrated assets form a stationary time series. We can
    thus monitor the current spread and check if it exceeds a reasonable range of
    historical spreads. Exceeding the normal range indicates a trading signal to enter
    two positions: long the underpriced asset and short the overpriced asset. We would
    then hold these positions until the current spread shrinks back to the normal
    range, upon which point we would exit the positions and lock in a profit before
    it shrinks even further (which results in a loss).


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig2_HTML.jpg)


    A workflow diagram. Select a pair of stocks that passes the cointegration test.
    Obtain a normal range of historical spread. Compare current spreads with historical
    spreads. If short-term fluctuation occurs, enter a position. When the current
    spread reverts to normal, exit a position.


    Figure 8-2


    Overall workflow of implementing the pairs trading strategy


    ### Cointegration


    Cointegration, a concept pivotal to hypothesis testing, posits two potential scenarios:
    the null hypothesis, which states that two or more non-stationary time series
    are not cointegrated, and the alternative hypothesis, which claims the opposite,
    that is, these time series are cointegrated if their linear combination generates
    a stationary time series (more on this later).


    Let’s demystify some of the jargon here. A time series refers to a sequence of
    data points indexed (or listed or graphed) in time order, with each data point
    assigned a specific timestamp. This dataset can be analyzed through several summary
    statistics or statistical properties. These can include metrics like mean and
    variance computed over a certain time frame or window.


    Moving this window across different periods, a stationary time series exhibits
    constancy in its mean and variance on average. This means that no matter when
    you observe it, its basic properties do not change. On the other hand, a non-stationary
    time series demonstrates a trend or a drift, signifying a changing mean and variance
    across varying time periods. These time series are dynamic, with their basic properties
    shifting over time, often due to factors like trends and seasonality.


    Hence, the process of cointegration examines whether there is a long-term equilibrium
    relationship between non-stationary time series despite short-term fluctuations.
    Such long-term equilibrium manifests as a stationary time series as a linear combination
    of the two non-stationary time series.


    Many traditional statistical methods, including ordinary least squares (OLS) regression,
    are based on the assumption that the variables under analysis—which are also time
    series data points—exhibit stationarity. This implies that their fundamental statistical
    characteristics remain consistent over time. However, when dealing with non-stationary
    variables, this stationarity assumption gets violated. As a result, different
    techniques are needed to perform the modeling. One common strategy is to difference
    the non-stationary variable (deriving a new time series by taking the difference
    in the observed values of two consecutive time points) to eliminate any observable
    trend or drift.


    A non-stationary time series might possess a unit root, which signifies a root
    of one in its autoregressive (AR) polynomial. To put it differently, the value
    in the next time period is strongly impacted by the present period value. This
    dependency reflects a form of serial correlation, where values from previous periods
    exert influence on subsequent ones, thereby potentially leading to non-stationary
    behavior.


    The unit root test, therefore, is a method to examine whether a time series is
    non-stationary and possesses a unit root. Identifying and addressing the presence
    of a unit root is a critical step in the process of time series modeling, especially
    when the aim is to understand long-term trends and forecasts.


    In essence, a cointegration test examines the assumption that, although individual
    time series may each have a unit root and hence be non-stationary, a linear combination
    of these time series might result in a stationary series. This forms the alternative
    hypothesis for the test.


    To be precise, the alternative hypothesis states that the aggregate time series,
    derived from a linear combination of individual time series, achieves stationarity.
    Should this be the case, it would imply a persistent long-term relationship among
    these time series variables. Such long-term relationships will get obscured by
    temporary fluctuations in the market from time to time, due to factors such as
    mispricing. Hence, the cointegration test aids in revealing these hidden long-term
    relationships among time series variables.'
  trans: "\n### 配对交易\n\n配对交易是一种市场中性策略，它利用统计分析来产生潜在收益，无论市场整体方向如何。配对交易中的“配对”指同时建立两个头寸：做多一项资产并做空另一项资产，关键要求是这些资产具有高度相关性。交易信号源于这两种资产之间的价差或价格差异。\n\
    \n与历史数据相比，异常大的价差表明出现了暂时性的背离，且预期这种背离最终会自我修正，随着时间的推移回归其均值或平均值。交易者可以利用这种均值回归行为，在价差异常扩大时开仓，并在价差缩窄并恢复至正常范围时平仓。\n\
    \n确定何为“异常”或“正常”价差至关重要，并构成了配对交易策略的核心参数。这通常涉及广泛的回测，即分析历史价格数据以识别价格发散与收敛的一致模式，从而确定交易开仓和平仓的阈值。配对交易尽管在市场中性立场上稳健，但仍需深刻理解配对资产之间的长期均衡关系，并谨慎管理预期价格收敛未能实现时的潜在风险。\n\
    \n在配对交易策略中，资产选择基于一种称为假设检验的统计程序，特别是协整检验。此过程利用历史价格数据来识别表现出高度相关性的金融工具对。当两种资产高度相关时，它们倾向于同步移动。这意味着一种资产的价格变动通常会被另一种资产按比例反映，从而产生相对稳定的价差，不会显著偏离其历史均值。然而，有时这种价差会明显偏离其历史常态，表明资产存在暂时性错误定价。这种偏离表明资产价格的偏离程度超出了其通常相关性所能预测的范围。\n\
    \n这种偏离在配对交易中创造了独特的盈利机会。交易者可以通过押注价差的未来收缩来利用这些巨大的价差。具体来说，策略是做多被低估的资产，同时做空被高估的资产，预期随着资产价格的自我修正，价差将回归历史均值。这种回归为以获利平仓两个头寸提供了机会。\n\
    \n图 8-2 展示了实施配对交易策略的整体工作流程。首先，我们分析一组金融资产（如股票），并识别出通过协整检验的配对。协整检验是一种统计检验，用于确定一组资产是否协整，意味着它们的组合生成一个平稳的时间序列，尽管每个单独的时间序列不具备这种平稳性。换句话说，两种协整资产的历史价差形成了一个平稳的时间序列。因此，我们可以监控当前价差，并检查其是否超出了历史价差的合理范围。超出正常范围意味着一个交易信号，可以建立两个头寸：做多被低估的资产，做空被高估的资产。然后，我们将持有这些头寸，直到当前价差收缩回正常范围，此时我们将平仓并锁定利润，防止其进一步收缩（否则会导致亏损）。\n\
    \n![](img/605529_1_En_8_Fig2_HTML.jpg)\n\n一个工作流程图。选择一对通过协整检验的股票。获取历史价差的正常范围。将当前价差与历史价差进行比较。如果出现短期波动，则建仓。当当前价差回归正常时，平仓。\n\
    \n**图 8-2**  \n实施配对交易策略的整体工作流程\n\n### 协整\n\n协整是假设检验中一个关键概念，它提出了两种可能的情形：原假设认为两个或多个非平稳时间序列不是协整的；而备择假设则相反，即如果这些时间序列的线性组合生成一个平稳的时间序列，则它们是协整的（稍后会详细说明）。\n\
    \n让我们来澄清这里的一些术语。时间序列是指按时间顺序索引（或列出或绘制）的一系列数据点，每个数据点都分配有特定的时间戳。该数据集可以通过若干汇总统计量或统计特性进行分析。这些统计量可以包括在特定时间范围或窗口内计算的平均值和方差等指标。\n\
    \n将这个窗口移动到不同时期，平稳时间序列的均值和方差平均而言表现出恒定性。这意味着无论何时观察它，其基本属性都不会改变。另一方面，非平稳时间序列则呈现出趋势或漂移，表明其均值和方差在不同时间段会发生变化。这些时间序列是动态的，其基本属性会随时间推移而变化，这通常是由趋势和季节性等因素造成的。\n\
    \n因此，协整过程检验了非平稳时间序列之间是否存在长期均衡关系，尽管存在短期波动。这种长期均衡表现为两个非平稳时间序列的线性组合构成的一个平稳时间序列。\n\
    \n许多传统统计方法，包括普通最小二乘 (OLS) 回归，都基于所分析的变量（也是时间序列数据点）表现出平稳性的假设。这意味着它们的基本统计特性随时间保持一致。然而，当处理非平稳变量时，这种平稳性假设就被违反了。因此，需要使用不同的技术来建模。一种常见策略是对非平稳变量进行差分处理（通过计算两个连续时间点观测值的差来导出新的时间序列），以消除任何可观察到的趋势或漂移。\n\
    \n非平稳时间序列可能存在单位根，这意味着其自回归 (AR) 多项式中有一个根为 1。换句话说，下一时间段的值受到当前时间段值的强烈影响。这种依赖性反映了一种序列相关性，即前期的值会对后续的值产生影响，从而可能导致非平稳行为。\n\
    \n因此，单位根检验是一种检验时间序列是否为非平稳且是否存在单位根的方法。识别并处理单位根的存在是时间序列建模过程中的关键步骤，尤其是在旨在理解长期趋势和预测时。\n\
    \n本质上，协整检验考察了一个假设：尽管个别时间序列可能各自存在单位根因而是非平稳的，但这些时间序列的线性组合可能产生一个平稳序列。这构成了该检验的备择假设。\n\
    \n准确地说，备择假设认为，由个别时间序列线性组合得出的汇总时间序列达到了平稳性。如果是这种情况，则意味着这些时间序列变量之间存在持续的长期关系。由于错误定价等因素，这种长期关系会时不时地被市场的短期波动所掩盖。因此，协整检验有助于揭示时间序列变量间这些隐藏的长期关系。\n"
- fmt: "When assets are determined to be cointegrated—meaning that the alternative\
    \ hypothesis is upheld—they are fed into the trading signal generation phase of\
    \ the pairs trading strategy. Here, we anticipate the long-term relationship between\
    \ the two time series variables to prevail, regardless of short-term market turbulence.\n\
    \nTherefore, cointegration serves as a valuable tool in statistical analysis,\
    \ exposing the underlying long-term relationship between two non-stationary and\
    \ seemingly unrelated time series. This long-term association, difficult to detect\
    \ when these time series are analyzed independently, can be discovered by combining\
    \ these individual non-stationary assets in a particular way. This combination\
    \ is typically done using the `Johansen` test, yielding a new, combined time series\
    \ that exhibits stationarity, characterized by a consistent mean and variance\
    \ over different periods. Alternatively, the `Engle-Granger` test can be employed\
    \ to generate a spread series from the residuals of a linear regression model\
    \ between the two assets.\n\nFigure [8-3](#605529_1_En_8_Chapter.xhtml#Fig3) illustrates\
    \ the process of cointegration and strategy formulation. The purpose of cointegration\
    \ is to convert individual non-stationary time series data into a combined stationary\
    \ series, which can be achieved via the `Johansen` test with a linear combination,\
    \ the `Engle-Granger` test via a linear regression model, or other test procedures.\
    \ We would then derive another series called the spread to indicate the extent\
    \ of short-term fluctuation from the long-term equilibrium relationship. The spread\
    \ is used to generate trading signals in the form of entry and exit points based\
    \ on the extent of deviation at each time point, with the help of entry and exit\
    \ thresholds defined in advance.\n\n![A block process diagram. Non-stationary\
    \ time series data, stocks A and B, undergo cointegration to give stationary time\
    \ series data, spread. Compare short-term fluctuation with long-term equilibrium\
    \ relationship to get trading signals for enter and exit points.](images/605529_1_En_8_Chapter/605529_1_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3**  \nIllustrating the process of cointegration using different\
    \ tests and strategy formulation to generate trading signals\n\nThe next section\
    \ covers a more in-depth discussion on stationarity.\n\n### Stationarity\n\nStock\
    \ prices are time series data. A stationary time series is a time series where\
    \ the statistical properties of the series, including the mean, variance, and\
    \ covariance at different time points, are constant and do not change over time.\
    \ A stationary time series is thus characterized by a lack of observable trends\
    \ or cycles in the data.\n\nLet us take the normal distribution as an example.\
    \ A normal distribution `y = f(x; μ, σ)` is a probability density function that\
    \ maps an input `x` to a probability output `y`, assuming a fixed set of parameters:\
    \ the mean `μ` as the central tendency and standard deviation `σ` as the average\
    \ deviation from the mean. The specific form of the probability distribution is\
    \ as follows:\n\n![y = f(x; μ, σ) = 1 / sqrt(2πσ²) * e^(-(x-μ)² / (2σ²))](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Equa.png)\n\
    \nA widely used normal distribution is the standard normal, specifying `μ = 0`\
    \ and `σ = 1`. The resulting probability density function is:\n\n![y = f(x; μ,\
    \ σ) = 1 / sqrt(2π) * e^(-x² / 2)](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Equb.png)\n\
    \nWe can generate random samples following this specific form using the `random.normal()`\
    \ function from NumPy. In Listing [8-1](#605529_1_En_8_Chapter.xhtml#PC1), we\
    \ define a function `generate_normal_sample()` that generates a normally distributed\
    \ random sample by passing in the input parameter `μ` and `σ` in a list.\n\n```\n\
    # generate random samples from normal distribution\ndef generate_normal_sample(params):\n\
    \"\"\"\ninput: params, including mean in params[0] and standard deviation in params[1]\n\
    output: a random sample from the normal distribution parameterized by the input\n\
    \"\"\"\nmean = params[0]\nsd = params[1]\nreturn np.random.normal(mean, sd)\n\
    ```\n\n**Listing 8-1**  \nGenerating normal samples\n\nNow we generate a sample\
    \ by specifying a standard normal distribution:\n\n```\n# generate sample from\
    \ standard norml\n>>> print(generate_normal_sample([0,1]))\n0.09120471661981977\n\
    ```\n\nTo see the impact on the samples generated from a non-stationary distribution,\
    \ we will specify three different non-stationary distributions. Specifically,\
    \ we will generate 100 samples that follow a distribution with either an increasing\
    \ mean or standard deviation. Listing [8-2](#605529_1_En_8_Chapter.xhtml#PC3)\
    \ performs the random sampling for 100 rounds and compares them with the samples\
    \ from the standard normal distribution.\n\n```\n# generate 100 random samples\
    \ for both stationary and non-stationary distribution\nT = 100\nstationary_list,\
    \ nonstationary_list1, nonstationary_list2 = [], [], []\nfor i in range(T):\n\
    # generate a stationary sample and append to list\nstationary_list.append(generate_normal_sample([0,1]))\n\
    # generate a non-stationary sample with an increasing mean and append to list\n\
    nonstationary_list1.append(generate_normal_sample([i,1]))\n# # generate a non-stationary\
    \ sample with an increasing mean and sd and append to list\nnonstationary_list2.append(generate_normal_sample([i,np.sqrt(i)]))\n\
    x = range(T)\n# plot the lists as line plots with labels for each line\nplt.plot(x,\
    \ stationary_list, label='Stationary')\nplt.plot(x, nonstationary_list1, label='Non-stationary\
    \ with increasing mean')\nplt.plot(x, nonstationary_list2, label='Non-stationary\
    \ with increasing mean and sd')\n# set the axis labels\nplt.xlabel('Sample index')\n\
    plt.ylabel('Sample value')\n# add a legend\nplt.legend()\n# show the plot\nplt.show()\n\
    ```\n\n**Listing 8-2**  \nGenerating samples from stationary and non-stationary\
    \ normal distributions\n\nRunning the code generates Figure [8-4](#605529_1_En_8_Chapter.xhtml#Fig4),\
    \ where the impact of a changing mean and standard deviation becomes more pronounced\
    \ as we increase the magnitude in later rounds.\n\n![A line plot comparing stationary\
    \ and non-stationary normal distribution samples.](images/605529_1_En_8_Chapter/605529_1_En_8_Fig4_HTML.jpg)"
  raw: 'When assets are determined to be cointegrated—meaning that the alternative
    hypothesis is upheld—they are fed into the trading signal generation phase of
    the pairs trading strategy. Here, we anticipate the long-term relationship between
    the two time series variables to prevail, regardless of short-term market turbulence.


    Therefore, cointegration serves as a valuable tool in statistical analysis, exposing
    the underlying long-term relationship between two non-stationary and seemingly
    unrelated time series. This long-term association, difficult to detect when these
    time series are analyzed independently, can be discovered by combining these individual
    non-stationary assets in a particular way. This combination is typically done
    using the Johansen test, yielding a new, combined time series that exhibits stationarity,
    characterized by a consistent mean and variance over different periods. Alternatively,
    the Engle-Granger test can be employed to generate a spread series from the residuals
    of a linear regression model between the two assets.


    Figure [8-3](#605529_1_En_8_Chapter.xhtml#Fig3) illustrates the process of cointegration
    and strategy formulation. The purpose of cointegration is to convert individual
    non-stationary time series data into a combined stationary series, which can be
    achieved via the Johansen test with a linear combination, the Engle-Granger test
    via a linear regression model, or other test procedures. We would then derive
    another series called the spread to indicate the extent of short-term fluctuation
    from the long-term equilibrium relationship. The spread is used to generate trading
    signals in the form of entry and exit points based on the extent of deviation
    at each time point, with the help of entry and exit thresholds defined in advance.


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig3_HTML.jpg)


    A block process diagram. Non-stationary time series data, stocks A and B, undergo
    cointegration to give stationary time series data, spread. Compare short-term
    fluctuation with long-term equilibrium relationship to get trading signals for
    enter and exit points.


    Figure 8-3


    Illustrating the process of cointegration using different tests and strategy formulation
    to generate trading signals


    The next section covers a more in-depth discussion on stationarity.


    ### Stationarity


    Stock prices are time series data. A stationary time series is a time series where
    the statistical properties of the series, including the mean, variance, and covariance
    at different time points, are constant and do not change over time. A stationary
    time series is thus characterized by a lack of observable trends or cycles in
    the data.


    Let us take the normal distribution as an example. A normal distribution *y* = *f*
    (*x*; *μ*, *σ*) is a probability density function that maps an input *x* to a
    probability output *y*, assuming a fixed set of parameters: the mean *μ* as the
    central tendency and standard deviation *σ* as the average deviation from the
    mean. The specific form of the probability distribution is as follows:


    ![$$ y=f\left(x;\mu, \sigma \right)=\frac{1}{\sqrt{2\pi {\sigma}^2}}{e}^{-\frac{{\left(x-\mu
    \right)}^2}{2{\sigma}^2}} $$](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Equa.png)


    A widely used normal distribution is the standard normal, specifying *μ* = 0 and
    *σ* = 1\. The resulting probability density function is


    ![$$ y=f\left(x;\mu, \sigma \right)=\frac{1}{\sqrt{2\pi }}{e}^{-\frac{x^2}{2}}
    $$](images/605529_1_En_8_Chapter/605529_1_En_8_Chapter_TeX_Equb.png)


    We can generate random samples following this specific form using the `random.normal()`
    function from NumPy. In Listing [8-1](#605529_1_En_8_Chapter.xhtml#PC1), we define
    a function `generate_normal_sample()` that generates a normally distributed random
    sample by passing in the input parameter *μ* and *σ* in a list.


    ```

    # generate random samples from normal distribution

    def generate_normal_sample(params):

    """

    input: params, including mean in params[0] and standard deviation in params[1]

    output: a random sample from the normal distribution parameterized by the input

    """

    mean = params[0]

    sd = params[1]

    return np.random.normal(mean, sd)

    Listing 8-1

    Generating normal samples

    ```


    Now we generate a sample by specifying a standard normal distribution:


    ```

    # generate sample from standard norml

    >>> print(generate_normal_sample([0,1]))

    0.09120471661981977

    ```


    To see the impact on the samples generated from a non-stationary distribution,
    we will specify three different non-stationary distributions. Specifically, we
    will generate 100 samples that follow a distribution with either an increasing
    mean or standard deviation. Listing [8-2](#605529_1_En_8_Chapter.xhtml#PC3) performs
    the random sampling for 100 rounds and compares them with the samples from the
    standard normal distribution.


    ```

    # generate 100 random samples for both stationary and non-stationary distribution

    T = 100

    stationary_list, nonstationary_list1, nonstationary_list2 = [], [], []

    for i in range(T):

    # generate a stationary sample and append to list

    stationary_list.append(generate_normal_sample([0,1]))

    # generate a non-stationary sample with an increasing mean and append to list

    nonstationary_list1.append(generate_normal_sample([i,1]))

    # # generate a non-stationary sample with an increasing mean and sd and append
    to list

    nonstationary_list2.append(generate_normal_sample([i,np.sqrt(i)]))

    x = range(T)

    # plot the lists as line plots with labels for each line

    plt.plot(x, stationary_list, label=''Stationary'')

    plt.plot(x, nonstationary_list1, label=''Non-stationary with increasing mean'')

    plt.plot(x, nonstationary_list2, label=''Non-stationary with increasing mean and
    sd'')

    # set the axis labels

    plt.xlabel(''Sample index'')

    plt.ylabel(''Sample value'')

    # add a legend

    plt.legend()

    # show the plot

    plt.show()

    Listing 8-2

    Generating samples from stationary and non-stationary normal distributions

    ```


    Running the code generates Figure [8-4](#605529_1_En_8_Chapter.xhtml#Fig4), where
    the impact of a changing mean and standard deviation becomes more pronounced as
    we increase the magnitude in later rounds.


    ![](images/605529_1_En_8_Chapter/605529_1_En_8_Fig4_HTML.jpg)'
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n当资产被判定为协整（即备择假设成立）时，它们将被输入到配对交易策略的交易信号生成阶段。在这里，我们预期两个时间序列变量之间的长期关系将占据主导地位，无论短期市场如何动荡。\n\
    \n因此，协整在统计分析中是一个有价值的工具，它揭示了两条看似无关的非平稳时间序列之间潜在的长期关系。这种长期关联在单独分析这些时间序列时很难发现，但可以通过以特定方式组合这些单独的非平稳资产来发现。这种组合通常使用\
    \ `Johansen` 检验完成，生成一个新的、组合后的时间序列，该序列表现出平稳性，其特征是在不同时期具有恒定的均值和方差。或者，也可以使用 `Engle-Granger`\
    \ 检验，从两个资产之间的线性回归模型的残差中生成一个价差序列。\n\n图 8-3 展示了协整和策略制定的过程。协整的目的是将单个非平稳时间序列数据转换为一个组合的平稳序列，这可以通过\
    \ `Johansen` 检验（线性组合）、`Engle-Granger` 检验（通过线性回归模型）或其他检验程序来实现。然后，我们将导出另一个称为价差的序列，以指示与长期均衡关系相比的短期波动程度。借助预先定义的入场和出场阈值，价差用于生成交易信号，形式是基于每个时间点偏离程度的入场点和出场点。\n\
    \n![一个块状流程图。非平稳时间序列数据，股票 A 和 B，经过协整得到平稳时间序列数据，即价差。将短期波动与长期均衡关系进行比较，得到入场和出场点的交易信号。](img/605529_1_En_8_Fig3_HTML.jpg)\n\
    \n**图 8-3**  \n说明使用不同检验和策略制定进行协整以生成交易信号的过程\n\n下一节将更深入地讨论平稳性。\n\n### 平稳性\n\n股票价格是时间序列数据。平稳时间序列是指该序列的统计特性（包括不同时间点的均值、方差和协方差）保持恒定，不随时间变化。因此，平稳时间序列的特征是数据中没有可观察到的趋势或周期。\n\
    \n我们以正态分布为例。正态分布 `y = f(x; μ, σ)` 是一个概率密度函数，它假设一组固定的参数：均值 `μ` 作为中心趋势，标准差 `σ` 作为与平均值的平均偏差，将输入\
    \ `x` 映射到概率输出 `y`。概率分布的具体形式如下：\n\n![y = f(x; μ, σ) = 1 / sqrt(2πσ²) * e^(-(x-μ)²\
    \ / (2σ²))](img/605529_1_En_8_Chapter_TeX_Equa.png)\n\n一个广泛使用的正态分布是标准正态分布，指定 `μ\
    \ = 0` 且 `σ = 1`。得到的概率密度函数为：\n\n![y = f(x; μ, σ) = 1 / sqrt(2π) * e^(-x² / 2)](img/605529_1_En_8_Chapter_TeX_Equb.png)\n\
    \n我们可以使用 NumPy 的 `random.normal()` 函数生成遵循此特定形式的随机样本。在代码清单 8-1 中，我们定义了一个函数 `generate_normal_sample()`，通过以列表形式传入输入参数\
    \ `μ` 和 `σ` 来生成正态分布的随机样本。\n\n```\n# 从正态分布生成随机样本\ndef generate_normal_sample(params):\n\
    \"\"\"\n输入：params，包含 params[0] 中的均值和 params[1] 中的标准差\n输出：一个由输入参数化后的正态分布的随机样本\n\
    \"\"\"\nmean = params[0]\nsd = params[1]\nreturn np.random.normal(mean, sd)\n\
    ```\n\n**代码清单 8-1**  \n生成正态分布样本\n\n现在我们通过指定一个标准正态分布来生成一个样本：\n\n```\n# 从标准正态分布生成样本\n\
    >>> print(generate_normal_sample([0,1]))\n0.09120471661981977\n```\n\n为了观察从非平稳分布生成的样本所受到的影响，我们将指定三个不同的非平稳分布。具体来说，我们将生成\
    \ 100 个样本，这些样本遵循均值或标准差递增的分布。代码清单 8-2 执行了 100 轮随机抽样，并将结果与标准正态分布的样本进行比较。\n\n```\n\
    # 为平稳和非平稳分布各生成 100 个随机样本\nT = 100\nstationary_list, nonstationary_list1, nonstationary_list2\
    \ = [], [], []\nfor i in range(T):\n# 生成一个平稳样本并添加到列表\nstationary_list.append(generate_normal_sample([0,1]))\n\
    # 生成一个均值递增的非平稳样本并添加到列表\nnonstationary_list1.append(generate_normal_sample([i,1]))\n\
    # # 生成一个均值和标准差都递增的非平稳样本并添加到列表\nnonstationary_list2.append(generate_normal_sample([i,np.sqrt(i)]))\n\
    x = range(T)\n# 将列表绘制为折线图，并为每条线添加标签\nplt.plot(x, stationary_list, label='平稳')\n\
    plt.plot(x, nonstationary_list1, label='均值递增的非平稳')\nplt.plot(x, nonstationary_list2,\
    \ label='均值和标准差都递增的非平稳')\n# 设置坐标轴标签\nplt.xlabel('样本索引')\nplt.ylabel('样本值')\n#\
    \ 添加图例\nplt.legend()\n# 显示图表\nplt.show()\n```\n\n**代码清单 8-2**  \n从平稳和非平稳正态分布生成样本\n\
    \n运行代码将生成图 8-4，其中随着我们在后续轮次中增加幅度，变化的均值和标准差带来的影响变得更加明显。\n\n![比较平稳和非平稳正态分布样本的折线图。](img/605529_1_En_8_Fig4_HTML.jpg)\n"
- fmt: "# 平稳性与协整检验\n\n样本值与样本索引的折线图。图中包含一条水平波动的线（表示平稳序列），以及两条线性上升且波动的线（分别表示均值递增的非平稳序列，以及均值递增且标准差轻微振荡的非平稳序列）。\n\
    \n**图 8-4**\n\n从不同参数设定的非平稳分布中生成正态分布随机样本\n\n请注意，我们可以使用增强型迪基-富勒（ADF）检验来检查序列是否平稳。`stationarity_test()`函数定义在[清单\
    \ 8-3](#605529_1_En_8_Chapter.xhtml#PC4)中，它接受两个输入：待检验平稳性的时间序列，以及用于与 p 值比较并判断统计显著性的显著性水平。注意，p\
    \ 值是通过`adfuller()`函数从检验结果对象中作为第二个参数获取的。详见[清单 8-3](#605529_1_En_8_Chapter.xhtml#PC4)。\n\
    \n```python\n# test for stationarity\ndef stationarity_test(x, threshold=0.05):\n\
    \    \"\"\"\n    input:\n    x: a list of scalar values\n    threshold: significance\
    \ level\n    output: print out message on stationarity\n    \"\"\"\n    pvalue\
    \ = adfuller(x)[1]\n    if pvalue < threshold:\n        return 'p-value is ' +\
    \ str(pvalue) + '. The series is likely stationary.'\n    else:\n        return\
    \ 'p-value is ' + str(pvalue) + '. The series is likely non-stationary.'\n```\n\
    \n**清单 8-3** 时间序列平稳性检验\n\n让我们将此函数应用于之前的时间序列数据。结果表明，ADF 检验能够根据预设的显著性水平区分时间序列是否平稳（参数固定）：\n\
    \n```\n>>> print(stationarity_test(stationary_list))\n>>> print(stationarity_test(nonstationary_list1))\n\
    >>> print(stationarity_test(nonstationary_list2))\np-value is 1.2718058919122438e-12\\\
    . The series is likely stationary.\np-value is 0.9925665941220737\\. The series\
    \ is likely non-stationary.\np-value is 0.9120355459829741\\. The series is likely\
    \ non-stationary.\n```\n\n让我们看一个具体示例，了解如何检验两只股票之间的协整关系。\n\n## 协整检验\n\n本节提供了一个使用\
    \ Engle-Granger 两步法执行协整检验的示例。以下是所涉及步骤的总体概述：\n\n-   使用普通最小二乘法（OLS）估计一只股票（作为因变量）与另一只股票（作为自变量）之间的线性回归模型系数。\n\
    -   计算线性回归模型的残差。\n-   使用单位根检验（如增强型迪基-富勒（ADF）检验）检验残差的平稳性。\n-   如果残差是平稳的，则两只股票存在协整关系。如果残差是非平稳的，则两只股票不存在协整关系。\n\
    \n让我们用两只股票（谷歌和微软）来演示这一过程。[清单 8-4](#605529_1_En_8_Chapter.xhtml#PC6) 导入必要的包并下载\
    \ 2022 年全年的每日股票价格。我们将使用调整后的收盘价进行协整检验。\n\n```python\nimport os\nimport random\n\
