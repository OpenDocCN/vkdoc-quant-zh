    # 2. Electronic Market


    In this chapter, we delve into the world of electronic markets, which have revolutionized
    the way financial instruments are traded. With the rapid advancements in technology
    and the widespread adoption of the Internet, electronic markets have largely replaced
    traditional, floor-based trading venues, ushering in an era of speed, efficiency,
    and accessibility for market participants around the globe.


    Electronic markets facilitate the buying and selling of financial instruments,
    such as stocks, bonds, currencies, and commodities (covered in Chapter [1](#605529_1_En_1_Chapter.xhtml)),
    through computerized systems and networks. They have played a critical role in
    democratizing access to financial markets, enabling a broader range of participants,
    including retail investors, institutional investors, and high-frequency traders,
    to engage in trading activities with ease and transparency. At the heart of electronic
    markets lies the trading mechanism, which governs how buy and sell orders are
    matched, executed, and settled.


    Furthermore, electronic markets offer a variety of order types that cater to the
    diverse needs and objectives of traders. These order types can be used to achieve
    specific goals, such as minimizing market impact, ensuring a desired level of
    execution, or managing risk. In this chapter, we will examine the most common
    types of orders, including market orders, limit orders, stop orders, and their
    various iterations.


    As we progress through this chapter, readers will gain a comprehensive understanding
    of the inner workings of electronic markets, the trading mechanisms that drive
    them, and the wide array of order types available to market participants.


    ## Introducing Electronic Market


    The electronic market operates on the basis of a discrete price grid where prices
    are arranged linearly according to the price magnitude. Every market has a minimum
    tick size. One tick is the minimum price difference between any two adjacent prices
    on the price grid of a trading instrument in a market. The price movements of
    different trading instruments could vary a lot, and we use their respective tick
    sizes to represent the minimum amount they can move up or down on an exchange.
    Stocks generally trade in one-cent tick size increments, currencies in pips (percentage
    in point or price interest point), and rates in basis points (bps). When the price
    grid is such that prices are arranged from the smallest price to the largest price,
    it is called the price ladder.


    The price ladder plays a crucial role in electronic markets by providing a visual
    representation of the order book, which contains a list of all pending buy and
    sell orders for a specific trading instrument. The order book is continuously
    updated in real time, reflecting the dynamic nature of the market as new orders
    are placed, modified, or canceled. Each rung of the price ladder corresponds to
    a specific price level, with buy orders (or bids) listed on one side and sell
    orders (or asks) on the other. The highest bid and the lowest ask are referred
    to as the best bid and best ask, respectively, and the gap between them is known
    as the bid-ask spread.


    Market participants can use the information provided by the price ladder and order
    book to gain valuable insights into a particular trading instrument’s supply and
    demand dynamics. This data can help traders identify potential trading opportunities,
    assess liquidity, and gauge the depth of the market at various price levels. For
    instance, large clusters of orders at specific price points may indicate significant
    support or resistance levels, while a thinning order book might suggest a lack
    of liquidity and increased price volatility. By carefully analyzing the price
    ladder and order book, traders can make more informed decisions and develop strategies
    that take advantage of the prevailing market conditions. Additionally, understanding
    the role of tick sizes in the price grid is crucial for traders when placing orders,
    managing risk, and executing trades, as even small changes in tick sizes can have
    a substantial impact on the potential profit or loss of a trade.'
