    \ asset is associated with low risk, and a high-return asset comes with a high\
    \ risk. This is true for most financial instruments in the market. For example,\
    \ the bond, as a fixed-income asset, is often considered a riskless asset that\
    \ delivers a low return and comes with virtually no risk. The stock market offers\
    \ a higher return but often displays higher volatility due to the uncertain and\
    \ unpredictable future. Under such a trade-off, an investor can only gain a higher\
    \ return and make more profits if they are willing to accept more risk, that is,\
    \ a higher probability of losses.\n\nThe appropriate risk-return trade-off depends\
    \ on various factors, including an investor’s risk tolerance profile, years to\
    \ retirement, and the potential to replace lost funds. The trade-off also depends\
    \ on the time horizon for a given position. For example, position traders typically\
    \ hold onto a position for a long period of time, which provides the trader with\
    \ the potential to recover from the risks of bear markets and participate in bull\
    \ markets, hoping for an increase in the asset value over the long term. On the\
    \ other hand, swing traders or even day traders enter a position for a short time,\
    \ seeking profits by speculating on the movement of the asset’s price changes.\
    \ The same equities (e.g., stocks) have a higher risk proposition when an investor\
    \ can only invest in a short time frame.\n\nIt is important to note that each\
    \ individual asset has its own risk and return profile, and a group of assets\
    \ can form a portfolio with new risk and return characteristics. At the portfolio\
    \ level, the risk-return trade-off assesses the concentration or diversity of\
    \ holdings and whether the portfolio mix presents an excessive risk or a lower-than-desired\
    \ potential for returns. Therefore, the risk-return trade-off applies to both\
    \ individual assets and a portfolio of assets.\n\nHowever, a diversified portfolio\
    \ generally reduces the risks presented by individual investment positions. Diversification\
    \ across various asset classes, industries, and geographies can help mitigate\
    \ the impact of poor-performing assets on overall returns, providing a more balanced\
    \ approach to risk management. A better understanding of the risk-return trade-off,\
    \ along with different diversification strategies, allows us to tailor the portfolios\
    \ to achieve the desired financial objectives and, at the same time, effectively\
    \ manage the inherent risks associated with investing.\n\nLet us draw a two-dimensional\
    \ coordinate system to characterize the risk and return. We would often put risk\
    \ on the horizontal axis and return on the vertical axis. As shown in Figure [4-1](#605529_1_En_4_Chapter.xhtml#Fig1),\
    \ the lower-left quadrant has low risk and low return. Representative products\
    \ include fixed-income instruments such as bonds and treasury bills. Moving to\
    \ the upper-right quadrant, we have products associated with high risk and return.\
    \ Examples include stocks and derivative products. The other two quadrants are\
    \ less frequent. For example, it is not so often to see financial instruments\
    \ with a low risk and high return. Companies could experience an urgent need for\
    \ funds and thus issue bonds with a higher return, but getting into such a situation\
    \ itself implies an increased default risk already. On the other hand, it is very\
    \ unlikely to see products with a low return but high risk, since this goes against\
    \ the profit maximization nature of trading.\n\n![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig1_HTML.jpg)\n\
    \nA return versus risk plane is divided into 4 quadrants. Clockwise from top right,\
    \ high risk high return with examples of stocks and derivatives. High risk low\
    \ return, even more likely. Low-risk low return, example, fixed income products.\
    \ Low risk high return, less frequent.\n\n**Figure 4-1**  \nIllustrating the four\
    \ quadrants of risk and return profile\n\nIn the following section, we will start\
    \ by understanding the fundamentals of returns as a performance measure of financial\
    \ assets. Understanding returns is crucial for us to evaluate the success of different\
    \ investments and make informed decisions in managing portfolios.\n\n## Analyzing\
    \ Returns\n\nThe return is the first and foremost metric most investors would\
    \ look at for a specific investment vehicle. It represents the change in value\
    \ of a financial asset over a specified period. It can be expressed in absolute\
    \ terms (e.g., the dollar amount gained or lost) or as a percentage of the initial\
    \ investment value. As a crucial metric on the performance of an asset or portfolio,\
    \ the return allows us to compare across different investments.\n\nWhen measured\
    \ in percentage terms, the range could range from (theoretically) negative infinity\
    \ to positive infinity. Suppose the asset price changes from `S[t - 1]` to `S[t]`.\
    \ The change in price is `S[t] - S[t - 1]`, which could be positive or negative.\
    \ Considering the price of an asset changes across different time points, and\
    \ also the fact that multiple assets have multiple price levels, it is difficult\
    \ to assess whether the price change `S[t] - S[t - 1]` is big or small. To standardize\
    \ the price changes and make it easier for comparison, a more widely used measure\
    \ is percentage return `R[t]`, defined as\n\n```\nR_t = (S_t - S_{t-1}) / S_{t-1}\n\
    ```\n\nThis equation essentially measures the change in asset price in proportion\
    \ to the previous-period asset price, that is, the baseline. It allows us to transition\
    \ from prices to returns. This percentage change in asset price thus allows us\
    \ to assess and compare different assets. By calculating the percentage return\
    \ `R[t]`, we can effectively transition from focusing on the raw price changes\
    \ to the proportional changes in asset prices. This transition allows us to evaluate\
    \ the performance of different investments relative to a baseline, which is the\
    \ previous-period asset price. This standardization is particularly useful when\
    \ evaluating investments with different price levels or those that experience\
    \ different magnitudes of price fluctuations.\n\nNote that we may also write the\
    \ return as `R[t - 1, t]` to emphasize the fact that the return measures the relative\
    \ change in prices between period `t - 1` and `t`:\n\n```\nR_{t-1,t} = (S_t -\
    \ S_{t-1}) / S_{t-1}\n```\n\nLet us analyze some dummy return data to make these\
    \ calculations tangible."
  raw: '## Risk and Return Trade-Off


    With the risk and return trade-off, a low-return asset is associated with low
    risk, and a high-return asset comes with a high risk. This is true for most financial
    instruments in the market. For example, the bond, as a fixed-income asset, is
    often considered a riskless asset that delivers a low return and comes with virtually
    no risk. The stock market offers a higher return but often displays higher volatility
    due to the uncertain and unpredictable future. Under such a trade-off, an investor
    can only gain a higher return and make more profits if they are willing to accept
    more risk, that is, a higher probability of losses.


    The appropriate risk-return trade-off depends on various factors, including an
    investor’s risk tolerance profile, years to retirement, and the potential to replace
    lost funds. The trade-off also depends on the time horizon for a given position.
    For example, position traders typically hold onto a position for a long period
    of time, which provides the trader with the potential to recover from the risks
    of bear markets and participate in bull markets, hoping for an increase in the
    asset value over the long term. On the other hand, swing traders or even day traders
    enter a position for a short time, seeking profits by speculating on the movement
    of the asset’s price changes. The same equities (e.g., stocks) have a higher risk
    proposition when an investor can only invest in a short time frame.


    It is important to note that each individual asset has its own risk and return
    profile, and a group of assets can form a portfolio with new risk and return characteristics.
    At the portfolio level, the risk-return trade-off assesses the concentration or
    diversity of holdings and whether the portfolio mix presents an excessive risk
    or a lower-than-desired potential for returns. Therefore, the risk-return trade-off
    applies to both individual assets and a portfolio of assets.


    However, a diversified portfolio generally reduces the risks presented by individual
    investment positions. Diversification across various asset classes, industries,
    and geographies can help mitigate the impact of poor-performing assets on overall
    returns, providing a more balanced approach to risk management. A better understanding
    of the risk-return trade-off, along with different diversification strategies,
    allows us to tailor the portfolios to achieve the desired financial objectives
    and, at the same time, effectively manage the inherent risks associated with investing.


    Let us draw a two-dimensional coordinate system to characterize the risk and return.
    We would often put risk on the horizontal axis and return on the vertical axis.
    As shown in Figure [4-1](#605529_1_En_4_Chapter.xhtml#Fig1), the lower-left quadrant
    has low risk and low return. Representative products include fixed-income instruments
    such as bonds and treasury bills. Moving to the upper-right quadrant, we have
    products associated with high risk and return. Examples include stocks and derivative
    products. The other two quadrants are less frequent. For example, it is not so
    often to see financial instruments with a low risk and high return. Companies
    could experience an urgent need for funds and thus issue bonds with a higher return,
    but getting into such a situation itself implies an increased default risk already.
    On the other hand, it is very unlikely to see products with a low return but high
    risk, since this goes against the profit maximization nature of trading.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig1_HTML.jpg)


    A return versus risk plane is divided into 4 quadrants. Clockwise from top right,
    high risk high return with examples of stocks and derivatives. High risk low return,
    even more likely. Low-risk low return, example, fixed income products. Low risk
    high return, less frequent.


    Figure 4-1


    Illustrating the four quadrants of risk and return profile


    In the following section, we will start by understanding the fundamentals of returns
    as a performance measure of financial assets. Understanding returns is crucial
    for us to evaluate the success of different investments and make informed decisions
    in managing portfolios.


    ### Analyzing Returns


    The return is the first and foremost metric most investors would look at for a
    specific investment vehicle. It represents the change in value of a financial
    asset over a specified period. It can be expressed in absolute terms (e.g., the
    dollar amount gained or lost) or as a percentage of the initial investment value.
    As a crucial metric on the performance of an asset or portfolio, the return allows
    us to compare across different investments.


    When measured in percentage terms, the range could range from (theoretically)
    negative infinity to positive infinity. Suppose the asset price changes from *S*[*t* − 1]
    to *S*[*t*]. The change in price is *S*[*t*] − *S*[*t* − 1], which could be positive
    or negative. Considering the price of an asset changes across different time points,
    and also the fact that multiple assets have multiple price levels, it is difficult
    to assess whether the price change *S*[*t*] − *S*[*t* − 1] is big or small. To
    standardize the price changes and make it easier for comparison, a more widely
    used measure is percentage return *R*[*t*], defined as


    ![$$ {R}_t=\frac{S_t-{S}_{t-1}}{S_{t-1}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equa.png)


    This equation essentially measures the change in asset price in proportion to
    the previous-period asset price, that is, the baseline. It allows us to transition
    from prices to returns. This percentage change in asset price thus allows us to
    assess and compare different assets. By calculating the percentage return *R*[*t*],
    we can effectively transition from focusing on the raw price changes to the proportional
    changes in asset prices. This transition allows us to evaluate the performance
    of different investments relative to a baseline, which is the previous-period
    asset price. This standardization is particularly useful when evaluating investments
    with different price levels or those that experience different magnitudes of price
    fluctuations.


    Note that we may also write the return as *R*[*t* − 1, *t*] to emphasize the fact
    that the return measures the relative change in prices between period *t* − 1
    and *t*:


    ![$$ {R}_{t-1,t}=\frac{S_t-{S}_{t-1}}{S_{t-1}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equb.png)


    Let us analyze some dummy return data to make these calculations tangible.'
  trans: "\n# 风险与回报的权衡\n\n在风险与回报的权衡中，低回报资产通常伴随着低风险，而高回报资产则伴随着高风险。这对于市场上的大多数金融工具都适用。例如，债券作为一种固定收益资产，通常被视为无风险资产，提供较低的回报且几乎不承担风险。股票市场提供更高的回报，但由于未来的不确定性和不可预测性，往往表现出更高的波动性。在这种权衡下，投资者只有愿意承担更多风险（即更高的亏损概率），才能获得更高的回报并赚取更多利润。\n\
    \n适当的风险-回报权衡取决于多种因素，包括投资者的风险承受能力、距离退休的年数以及弥补损失资金的潜力。这种权衡还取决于特定持仓的时间跨度。例如，头寸交易者通常会长期持有一个头寸，这使交易者有机会从熊市风险中恢复过来，并参与牛市行情，期望资产价值在长期内增长。另一方面，波段交易者甚至日内交易者则会短期持有头寸，通过投机资产价格变动来寻求利润。当投资者只能进行短期投资时，同一类股票（例如普通股）会带来更高的风险。\n\
    \n需要注意的是，每项单独资产都有其自身的风险和回报特征，而一组资产可以形成一个具有全新风险和回报特性的投资组合。在投资组合层面，风险-回报权衡评估的是持仓的集中度或分散度，以及投资组合的构成是否带来过高风险或回报潜力低于预期。因此，风险-回报权衡既适用于单一资产，也适用于资产组合。\n\
    \n然而，一个多元化的投资组合通常能降低单个投资头寸所带来的风险。跨不同资产类别、行业和地域进行多元化配置，有助于减轻表现不佳的资产对整体回报的影响，从而提供一种更均衡的风险管理方法。更好地理解风险-回报权衡以及各种多元化策略，使我们能够量身定制投资组合，以实现预期的财务目标，同时有效管理与投资相关的固有风险。\n\
    \n让我们绘制一个二维坐标系来表征风险与回报。我们通常将风险放在横轴上，回报放在纵轴上。如图 4-1 所示，左下象限代表低风险和低回报。代表性产品包括固定收益工具，如债券和国库券。移至右上象限，则是与高风险和高回报相关的产品，例如股票和衍生品。另外两个象限则较少见。例如，很难看到低风险高回报的金融工具。公司可能急需资金，从而发行回报率较高的债券，但陷入这种状况本身已经意味着违约风险的增加。另一方面，出现低回报但高风险的产品可能性极低，因为这有悖于交易追求利润最大化的本质。\n\
    \n![](img/605529_1_En_4_Fig1_HTML.jpg)\n\n一个回报与风险平面被分为四个象限。从右上角顺时针看：高回报高风险，例如股票和衍生品；高风险低回报，甚至更常见；低风险低回报，例如固定收益产品；低风险高回报，较为少见。\n\
    \n**图 4-1**  \n说明风险和回报特征的四个象限\n\n在下一节中，我们将首先理解作为金融资产绩效衡量标准的回报的基本原理。理解回报对于我们评估不同投资的成功程度，并在管理投资组合时做出明智的决策至关重要。\n\
    \n## 分析回报\n\n回报是大多数投资者在考察特定投资工具时首要关注的指标。它表示金融资产在特定时期内的价值变化。它可以以绝对数值（例如，盈利或亏损的美元金额）或初始投资价值的百分比来表示。作为衡量资产或投资组合绩效的关键指标，回报使我们能够进行跨投资比较。\n\
    \n当以百分比衡量时，其范围理论上可以从负无穷到正无穷。假设资产价格从 `S[t - 1]` 变为 `S[t]`。价格变动为 `S[t] - S[t - 1]`，可能是正值或负值。考虑到资产价格在不同时间点会变化，并且多种资产具有不同的价格水平，很难评估价格变动\
    \ `S[t] - S[t - 1]` 是大还是小。为了标准化这些价格变动并使其更易于比较，一个更广泛使用的衡量标准是百分比回报 `R[t]`，其定义如下：\n\
    \n```\nR_t = (S_t - S_{t-1}) / S_{t-1}\n```\n\n这个公式本质上衡量的是资产价格变动相对于前一时期资产价格（即基准）的比例。它使我们能够从价格过渡到回报。因此，这种资产价格的百分比变化能够让我们评估和比较不同的资产。通过计算百分比回报\
    \ `R[t]`，我们可以有效地将关注点从原始价格变动转移到资产价格的比例变动上。这种转变使我们能够相对于基准（即前一时期的资产价格）来评估不同投资的表现。当评估具有不同价格水平或经历不同幅度价格波动的投资时，这种标准化尤其有用。\n\
    \n请注意，我们也可以将回报写作 `R[t - 1, t]`，以强调回报衡量的是从 `t - 1` 时期到 `t` 时期价格的相对变化：\n\n```\n\
    R_{t-1,t} = (S_t - S_{t-1}) / S_{t-1}\n```\n\n让我们分析一些模拟的回报数据，使这些计算更加具体。\n"
- fmt: '### Working with Dummy Returns


    In Listing [4-1](#605529_1_En_4_Chapter.xhtml#PC1), we first create two five-element
    (or five-period) lists representing the returns of two different assets, stored
    in `asset_return1` and `asset_return2`, respectively. The returns are constructed
    such that their mean returns are the same. We can verify the equality using the
    `==` operator.


    ```

    asset_return1 = [0.05, 0.3, -0.1, 0.35, 0.2]

    asset_return2 = [0.5, -0.2, 0.3, 0.5, -0.3]

    >>> print(np.mean(asset_return1))

    >>> print(np.mean(asset_return2))

    >>> print(np.mean(asset_return1) == np.mean(asset_return2))

    0.16

    0.16

    True

    Listing 4-1

    Simulating two asset returns

    ```


    Next, let us combine these two lists in a Pandas DataFrame for easy manipulation.
    This is achieved by wrapping the two lists in a dictionary and passing it to the
    `pd.DataFrame()` function:


    ```

    return_df = pd.DataFrame({"Asset1":asset_return1, "Asset2":asset_return2})

    >>> return_df

    ```


    Printing out the `return_df` variable generates the following, where the two lists
    now appear as the two columns in the DataFrame:


    ```

    Asset1 Asset2

    0      0.05   0.5

    1      0.30  -0.2

    2     -0.10   0.3

    3      0.35   0.5

    4      0.20  -0.3

    ```


    To facilitate visual analysis, let us plot the two return series in a bar chart
    using the `.plot.bar()` method:


    ```

    >>> return_df.plot.bar()

    ```


    Running this command generates Figure [4-2](#605529_1_En_4_Chapter.xhtml#Fig2).
    The figure suggests that despite having the same mean return, these two assets
    clearly have different risk profiles. Specifically, asset 2 (orange bars) is more
    volatile than asset 1 (blue bars).


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig2_HTML.jpg)


    A grouped positive-negative bar graph with the return profiles for asset 1 and
    asset 2. The profiles of asset 2 are more volatile than asset 1.


    Figure 4-2


    Visualizing the returns as bar charts


    Again, this notion of higher volatility will be more concrete when we introduce
    its precise definition later. For now, we can simply call the `std()` function
    to calculate the standard deviation (another name for volatility) of the two columns:


    ```

    >>> return_df.std()

    Asset1    0.185068

    Asset2    0.384708

    dtype: float64

    ```


    Note that the `std()` is applied column-wise. Similarly, we can call the `mean()`
    function to calculate the mean value of each column:


    ```

    >>> return_df.mean()

    Asset1    0.16

    Asset2    0.16

    dtype: float64

    ```


    The result aligns with our previous calculations using `np.mean()`. This example
    shows that merely looking at the average return of an asset is not enough. In
    fact, it could be misleading if we just report the average return of an asset
    without its volatility.


    To see the difference, assume we have an initial investment of $100 in both assets.
    To calculate the running asset value at each period in a sequential manner, we
    first add one to the percentage return values, forming the 1+R format. Take asset
    1, for example. As shown in the following, after running the following code snippet,
    we can use 1.05 to calculate the asset value after the first period as $100 ×
    1.05, the asset value after the second period as $100 × 1.05 × 1.30, and so on:


    ```

    >>> return_df + 1

    Asset1 Asset2

    0    1.05   1.5

    1    1.30   0.8

    2    0.90   1.3

    3    1.35   1.5

    4    1.20   0.7

    ```


    Instead of multiplying these percentage returns cumulatively, a convenient function
    called `cumprod()` does the work for us. Therefore, we can obtain the period-wise
    asset value by applying this function on the previous 1+R formatted DataFrame
    and multiplying by $100, as shown in the following code snippet:


    ```

    init_investment = 100

    cum_value = (return_df + 1).cumprod()*100

    >>> cum_value

    Asset1     Asset2

    0    105.0000   150.0

    1    136.5000   120.0

    2    122.8500   156.0

    3    165.8475   234.0

    4    199.0170   163.8

    ```


    We can similarly plot the evolution of asset values as a line chart:


    ```

    >>> cum_value.plot.line()

    ```


    Running this command generates Figure [4-3](#605529_1_En_4_Chapter.xhtml#Fig3).
    Although asset 2 looks more profitable in most of the periods, it actually ends
    with a lower return in the last period. Thus, a key takeaway from this chart is
    that two assets with equal average returns may end up with a totally different
    terminal return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig3_HTML.jpg)


    A multiline graph with the increasing return profiles for asset 1 and asset 2.
    The profiles of asset 2 are more profitable than asset 1, in most of the periods.


    Figure 4-3


    Visualizing the evolution of asset values


    ### The 1+R Format


    Recall that to calculate the return *R*[*t*−1, *t*] from the period *t*−1 to *t*,
    we need asset prices *S*[*t*−1] and *S*[*t*] in both periods. With simple manipulation,
    we can express the return as follows:


    ![$$ 1+{R}_{t-1,t}=\frac{S_t}{S_{t-1}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equc.png)


    This is the so-called 1+R format, where we use 1+*R*[*t*−1, *t*] to denote the
    percentage of current-period asset price *S*[*t*] over previous-period asset price
    *S*[*t*−1]. We can then easily calculate the return *R*[*t*−1, *t*] after obtaining
    the 1+R return 1+*R*[*t*−1, *t*]:


    ![$$ {R}_{t-1,t}=\frac{S_t}{S_{t-1}}-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equd.png)


    One reason why we use this format is the convenience in the calculation. Since
    the prices are arranged along a column from start to end, we can simply shift
    the price column upward by one row to obtain the next-period price and then calculate
    the ratio ![$$ \frac{S_t}{S_{t-1}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq1.png)
    (i.e., 1+*R*[*t*−1, *t*]) in a separate column. We could then subtract one to
    obtain *R*[*t*−1, *t*] for each period.


    Figure [4-4](#605529_1_En_4_Chapter.xhtml#Fig4) illustrates the benefits of using
    the 1+R formatted return. The extra step involved is to create a shifted column
    by moving the price column upward by one unit. Calculating the 1+R formatted return
    is straightforward and fast, as this is a direct division between two columns
    that are performed simultaneously across all the rows. This avoids a for loop.
    We will then minus one to recover the same return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig4_HTML.jpg)


    A flow of 3 equations that define the return as the percentage change in the asset
    price. Flow of 3 tables having columns for time, price, shifted price, and 1+R
    return, present that the return is easy to calculate by shifting the price column
    and taking the division.


    Figure 4-4


    Illustrating the calculation process of return using the 1+R format that gives
    a more convenient way to calculate the return


    Also, note that the last row in the shifted column is `NA`, which is due to the
    fact that there is no more future price available at the last time point. This
    also makes the 1+R return column `NA`. We will demonstrate the calculation process
    in code later. For now, it is good to digest and accept the 1+R formatted return
    as an equivalent way of describing asset returns.'
  raw: '### Working with Dummy Returns


    In Listing [4-1](#605529_1_En_4_Chapter.xhtml#PC1), we first create two five-element
    (or five-period) lists representing the returns of two different assets, stored
    in `asset_return1` and `asset_return2`, respectively. The returns are constructed
    such that their mean returns are the same. We can verify the equality using the
    `==` operator.


    ```

    asset_return1 = [0.05, 0.3, -0.1, 0.35, 0.2]

    asset_return2 = [0.5, -0.2, 0.3, 0.5, -0.3]

    >>> print(np.mean(asset_return1))

    >>> print(np.mean(asset_return2))

    >>> print(np.mean(asset_return1) == np.mean(asset_return2))

    0.16

    0.16

    True

    Listing 4-1

    Simulating two asset returns

    ```


    Next, let us combine these two lists in a Pandas DataFrame for easy manipulation.
    This is achieved by wrapping the two lists in a dictionary and passing it to the
    `pd.DataFrame()` function:


    ```

    return_df = pd.DataFrame({"Asset1":asset_return1, "Asset2":asset_return2})

    >>> return_df

    ```


    Printing out the `return_df` variable generates the following, where the two lists
    now appear as the two columns in the DataFrame:


    ```

    Asset1 Asset2

    0      0.05   0.5

    1      0.30  -0.2

    2     -0.10   0.3

    3      0.35   0.5

    4      0.20  -0.3

    ```


    To facilitate visual analysis, let us plot the two return series in a bar chart
    using the `.plot.bar()` method:


    ```

    >>> return_df.plot.bar()

    ```


    Running this command generates Figure [4-2](#605529_1_En_4_Chapter.xhtml#Fig2).
    The figure suggests that despite having the same mean return, these two assets
    clearly have different risk profiles. Specifically, asset 2 (orange bars) is more
    volatile than asset 1 (blue bars).


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig2_HTML.jpg)


    A grouped positive-negative bar graph with the return profiles for asset 1 and
    asset 2\. The profiles of asset 2 are more volatile than asset 1.


    Figure 4-2


    Visualizing the returns as bar charts


    Again, this notion of higher volatility will be more concrete when we introduce
    its precise definition later. For now, we can simply call the `std()` function
    to calculate the standard deviation (another name for volatility) of the two columns:


    ```

    >>> return_df.std()

    Asset1    0.185068

    Asset2    0.384708

    dtype: float64

    ```


    Note that the `std()` is applied column-wise. Similarly, we can call the `mean()`
    function to calculate the mean value of each column:


    ```

    >>> return_df.mean()

    Asset1    0.16

    Asset2    0.16

    dtype: float64

    ```


    The result aligns with our previous calculations using `np.mean()`. This example
    shows that merely looking at the average return of an asset is not enough. In
    fact, it could be misleading if we just report the average return of an asset
    without its volatility.


    To see the difference, assume we have an initial investment of $100 in both assets.
    To calculate the running asset value at each period in a sequential manner, we
    first add one to the percentage return values, forming the 1+R format. Take asset
    1, for example. As shown in the following, after running the following code snippet,
    we can use 1.05 to calculate the asset value after the first period as $100 ×
    1.05, the asset value after the second period as $100 × 1.05 × 1.30, and so on:


    ```

    >>> return_df + 1

    Asset1 Asset2

    0    1.05   1.5

    1    1.30   0.8

    2    0.90   1.3

    3    1.35   1.5

    4    1.20   0.7

    ```


    Instead of multiplying these percentage returns cumulatively, a convenient function
    called `cumprod()` does the work for us. Therefore, we can obtain the period-wise
    asset value by applying this function on the previous 1+R formatted DataFrame
    and multiplying by $100, as shown in the following code snippet:


    ```

    init_investment = 100

    cum_value = (return_df + 1).cumprod()*100

    >>> cum_value

    Asset1     Asset2

    0    105.0000   150.0

    1    136.5000   120.0

    2    122.8500   156.0

    3    165.8475   234.0

    4    199.0170   163.8

    ```


    We can similarly plot the evolution of asset values as a line chart:


    ```

    >>> cum_value.plot.line()

    ```


    Running this command generates Figure [4-3](#605529_1_En_4_Chapter.xhtml#Fig3).
    Although asset 2 looks more profitable in most of the periods, it actually ends
    with a lower return in the last period. Thus, a key takeaway from this chart is
    that two assets with equal average returns may end up with a totally different
    terminal return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig3_HTML.jpg)


    A multiline graph with the increasing return profiles for asset 1 and asset 2\.
    The profiles of asset 2 are more profitable than asset 1, in most of the periods.


    Figure 4-3


    Visualizing the evolution of asset values


    ### The 1+R Format


    Recall that to calculate the return *R*[*t* − 1, *t*] from the period *t* − 1
    to *t*, we need asset prices *S*[*t* − 1] and *S*[*t*] in both periods. With simple
    manipulation, we can express the return as follows:


    ![$$ 1+{R}_{t-1,t}=\frac{S_t}{S_{t-1}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equc.png)


    This is the so-called 1+R format, where we use 1 + *R*[*t* − 1, *t*] to denote
    the percentage of current-period asset price *S*[*t*] over previous-period asset
    price *S*[*t* − 1]. We can then easily calculate the return *R*[*t* − 1, *t*]
    after obtaining the 1+R return 1 + *R*[*t* − 1, *t*]:


    ![$$ {R}_{t-1,t}=\frac{S_t}{S_{t-1}}-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equd.png)


    One reason why we use this format is the convenience in the calculation. Since
    the prices are arranged along a column from start to end, we can simply shift
    the price column upward by one row to obtain the next-period price and then calculate
    the ratio ![$$ \frac{S_t}{S_{t-1}} $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_IEq1.png)
    (i.e., 1 + *R*[*t* − 1, *t*]) in a separate column. We could then subtract one
    to obtain *R*[*t* − 1, *t*] for each period.


    Figure [4-4](#605529_1_En_4_Chapter.xhtml#Fig4) illustrates the benefits of using
    the 1+R formatted return. The extra step involved is to create a shifted column
    by moving the price column upward by one unit. Calculating the 1+R formatted return
    is straightforward and fast, as this is a direct division between two columns
    that are performed simultaneously across all the rows. This avoids a for loop.
    We will then minus one to recover the same return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig4_HTML.jpg)


    A flow of 3 equations that define the return as the percentage change in the asset
    price. Flow of 3 tables having columns for time, price, shifted price, and 1 +
    R return, present that the return is easy to calculate by shifting the price column
    and taking the division.


    Figure 4-4


    Illustrating the calculation process of return using the 1+R format that gives
    a more convenient way to calculate the return


    Also, note that the last row in the shifted column is `NA`, which is due to the
    fact that there is no more future price available at the last time point. This
    also makes the 1+R return column `NA`. We will demonstrate the calculation process
    in code later. For now, it is good to digest and accept the 1+R formatted return
    as an equivalent way of describing asset returns.'
  trans: '

    ### 处理模拟收益率


    在代码清单 4-1 中，我们首先创建了两个包含五个元素（或五个周期）的列表，分别代表两种不同资产的收益率，并分别存储在 `asset_return1` 和
    `asset_return2` 中。我们构造的收益率使得它们的平均收益率相同。我们可以使用 `==` 运算符来验证这一相等性。


    ```

    asset_return1 = [0.05, 0.3, -0.1, 0.35, 0.2]

    asset_return2 = [0.5, -0.2, 0.3, 0.5, -0.3]

    >>> print(np.mean(asset_return1))

    >>> print(np.mean(asset_return2))

    >>> print(np.mean(asset_return1) == np.mean(asset_return2))

    0.16

    0.16

    True

    代码清单 4-1

    模拟两种资产的收益率

    ```


    接下来，我们将这两个列表合并到一个 Pandas DataFrame 中，以便于操作。这可以通过将两个列表包装在一个字典中，并将其传递给 `pd.DataFrame()`
    函数来实现：


    ```

    return_df = pd.DataFrame({"Asset1":asset_return1, "Asset2":asset_return2})

    >>> return_df

    ```


    打印 `return_df` 变量会生成以下内容，两个列表现在显示为 DataFrame 中的两列：


    ```

    Asset1 Asset2

    0      0.05   0.5

    1      0.30  -0.2

    2     -0.10   0.3

    3      0.35   0.5

    4      0.20  -0.3

    ```


    为了便于可视化分析，我们使用 `.plot.bar()` 方法将这两个收益率序列绘制成条形图：


    ```

    >>> return_df.plot.bar()

    ```


    运行此命令会生成图 4-2。该图表明，尽管平均收益率相同，但这两项资产的风险状况明显不同。具体来说，资产 2（橙色条形图）比资产 1（蓝色条形图）更不稳定。


    ![](img/605529_1_En_4_Fig2_HTML.jpg)


    一个分组正负条形图，显示了资产 1 和资产 2 的收益率概况。资产 2 的概况比资产 1 的波动性更大。


    图 4-2

    将收益率可视化为条形图


    同样，当我们稍后介绍更精确的定义时，这种更高波动性的概念会更加具体。现在，我们可以简单地调用 `std()` 函数来计算这两列的标准差（波动性的另一个称呼）：


    ```

    >>> return_df.std()

    Asset1    0.185068

    Asset2    0.384708

    dtype: float64

    ```


    请注意，`std()` 是按列应用的。类似地，我们可以调用 `mean()` 函数来计算每列的平均值：


    ```

    >>> return_df.mean()

    Asset1    0.16

    Asset2    0.16

    dtype: float64

    ```


    结果与我们之前使用 `np.mean()` 的计算结果一致。这个例子表明，仅仅关注资产的平均收益率是不够的。事实上，如果只报告资产的平均收益率而不考虑其波动性，可能会产生误导。


    为了说明差异，假设我们对两项资产的初始投资均为 100 美元。要按顺序计算每个周期的滚动资产价值，我们首先将百分比收益率加 1，形成 1+R 格式。以资产
    1 为例。如下所示，运行以下代码片段后，我们可以使用 1.05 计算第一个周期后的资产价值为 100 美元 × 1.05，第二个周期后的资产价值为 100
    美元 × 1.05 × 1.30，以此类推：


    ```

    >>> return_df + 1

    Asset1 Asset2

    0    1.05   1.5

    1    1.30   0.8

    2    0.90   1.3

    3    1.35   1.5

    4    1.20   0.7

    ```


    无需手动累乘这些百分比收益率，一个名为 `cumprod()` 的便利函数可以为我们完成这项工作。因此，我们可以将此函数应用于之前格式为 1+R 的 DataFrame，然后乘以
    100 美元，从而获得每个周期的资产价值，如下面的代码片段所示：


    ```

    init_investment = 100

    cum_value = (return_df + 1).cumprod()*100

    >>> cum_value

    Asset1     Asset2

    0    105.0000   150.0

    1    136.5000   120.0

    2    122.8500   156.0

    3    165.8475   234.0

    4    199.0170   163.8

    ```


    我们可以类似地将资产价值的演变绘制成折线图：


    ```

    >>> cum_value.plot.line()

    ```


    运行此命令会生成图 4-3。尽管资产 2 在大部分时期看起来收益更高，但实际上它在最后一个时期的最终收益率更低。因此，这张图的一个关键启示是：平均收益率相同的两项资产，其最终收益率可能完全不同。


    ![](img/605529_1_En_4_Fig3_HTML.jpg)


    一张显示资产 1 和资产 2 收益递增概况的多折线图。在大部分时期，资产 2 的概况比资产 1 的收益更高。


    图 4-3

    将资产价值的演变过程可视化


    ### 1+R 格式


    回顾一下，要计算从周期 *t*−1 到 *t* 的收益率 *R*[*t*−1, *t*]，我们需要两个周期的资产价格 *S*[*t*−1] 和 *S*[*t*]。通过简单的变换，我们可以将收益率表示如下：


    ![$$ 1+{R}_{t-1,t}=\frac{S_t}{S_{t-1}} $$](img/605529_1_En_4_Chapter_TeX_Equc.png)


    这就是所谓的 1+R 格式，其中我们使用 1+*R*[*t*−1, *t*] 来表示当前周期资产价格 *S*[*t*] 相对于前一周期资产价格 *S*[*t*−1]
    的百分比。在获得 1+R 收益率 1+*R*[*t*−1, *t*] 后，我们可以轻松地计算出收益率 *R*[*t*−1, *t*]：


    ![$$ {R}_{t-1,t}=\frac{S_t}{S_{t-1}}-1 $$](img/605529_1_En_4_Chapter_TeX_Equd.png)


    我们使用这种格式的一个原因在于计算的便利性。由于价格是从开始到结束按一列排列的，我们可以简单地将价格列向上移动一行以获得下一周期的价格，然后在另一列中计算比率
    ![$$ \frac{S_t}{S_{t-1}} $$](img/605529_1_En_4_Chapter_TeX_IEq1.png)（即 1+*R*[*t*−1,
    *t*]）。然后我们可以减去 1，为每个周期求出 *R*[*t*−1, *t*]。


    图 4-4 说明了使用 1+R 格式收益率的好处。额外的步骤是通过将价格列向上移动一个单位来创建一个偏移列。计算 1+R 格式的收益率既直接又快速，因为这是两列之间在所有行上同时进行的直接除法。这避免了使用循环。然后我们减去
    1 来恢复相同的收益率。


    ![](img/605529_1_En_4_Fig4_HTML.jpg)


    一个包含 3 个等式的流程图，定义了收益率是资产价格的百分比变化。包含时间、价格、偏移价格和 1+R 收益率列的 3 个表格的流程图，展示了通过偏移价格列并进行除法可以轻松计算收益率。


    图 4-4

    使用 1+R 格式说明收益率的计算过程，这种格式提供了一种更便捷的计算收益率的方法


    另外，请注意偏移列中的最后一行是 `NA`，这是因为在最后一个时间点没有更多的未来价格可用。这也导致 1+R 收益率列为 `NA`。我们稍后将在代码中演示计算过程。现在，先消化并接受
    1+R 格式的收益率作为描述资产收益率的一种等效方式，是很好的做法。

    '
- fmt: '### 终端收益（Terminal Return）


    终端收益指的是在最后一个时间段相对于初始收益的回报，即`R[0, T]`。假设我们有从`t = 0`到`t = T`的价格数据。要计算第`T`期的终端收益`R[0,
    T]`，我们可以取初始价格`S[0]`和终端价格`S[T]`，计算它们的比率，然后减去1，得到：


    ![$$ {R}_{0,T}=\frac{S_T}{S_0}-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Eque.png)


    这种方法本质上忽略了中间收益，只考虑了初始和终端的资产价格。通过仅关注初始和终端资产价格，该指标提供了一种简化的投资增长或衰退视图，忽略了中间的波动。这在评估投资的长期表现或比较不同资产在较长时期内的增长时特别有用。然而，请注意，终端收益并不能提供有关投资波动性或风险的见解，因为它只考虑了初始和终端资产价格。


    计算这个值还有另一种方法。我们不是只关注初始和终端价格，而是将整个价格演变过程视为一个序列，从一个价格点变化到另一个价格点。因此，第`T`期（或任意第`t`期）的终端收益是所有先前格式化为`1+R`的收益相乘，然后减去1的结果。数学上，我们有：


    ![$$ {R}_{0,T}=\left(1+{R}_{0,1}\right)\left(1+{R}_{1,2}\right)\dots \left(1+{R}_{T-1,T}\right)-1
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equf.png)


    代入格式化为`1+R`的收益定义，得到以下结果：


    ![$$ {R}_{0,T}=\frac{S_1}{S_0}\frac{S_2}{S_1}\dots \frac{S_T}{S_{T-1}}-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equg.png)


    在约去同类项后，这实际上就是我们最初提出的公式。通过这样做，我们承认了每个时期收益对整体投资表现的复合效应。这种方法更全面，因为它考虑了投资期间的所有价格变化。


    图[4-5](#605529_1_En_4_Chapter.xhtml#Fig5) 阐述了终端收益的计算过程。


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig5_HTML.jpg)


    一个包含3个方程的流程图，展示了计算终端收益的3个步骤：使用初始和终端资产价格、转换为`1+R`方法、以及在代入格式化为`1+R`的收益定义后还原之前的方程。


    **图 4-5** 通过不同方法计算终端收益


    ### 含股息的股票收益


    请注意，在计算资产收益时，还需要考虑股息。这意味着我们以当前价格持有股票，同时也享有它所带来的股息。先前对收益的定义称为价格收益，它仅考虑股票的价格变动。将股息与当前股票价格相加则被称为总收益，这更加符合实际情况。在分析股票表现时，几乎总是使用总收益。总收益与价格收益之差即为股息。


    股票的总收益计算如下：


    ![$$ {R}_{t-1,t}=\frac{S_t+{D}_{t-1,t}}{S_{t-1}}-1=\frac{S_t+{D}_{t-1,t}-{S}_{t-1}}{S_{t-1}}
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equh.png)


    在此方程中，总收益用`R[t - 1, t]`表示，即从时间`t - 1`到时间`t`的收益。`S[t]`和`S[t - 1]`分别代表时间`t`和时间`t
    - 1`的股票价格。`D[t - 1, t]`代表在`t - 1`到`t`期间内支付的股息。


    总收益通过结合资本增值（即股票价格的上涨）和股息收入，提供了对投资表现更全面的评估。这对于注重收益的投资者尤其相关，他们专注于通过资本利得和股息相结合的方式最大化回报。


    要计算股票的总收益，公式考虑了期初的股票价格、期末的股票价格以及期间内支付的任何股息。通过将期末股票价格与股息之和除以期初股票价格，然后减去1，我们便得到以百分比表示的总收益。


    ### 多期收益


    终端收益也可以被视为多期收益，或是在一个合并时间段内的收益。由于演变过程是顺序的，我们需要按顺序对每个时期的收益进行复利计算。当我们拥有格式化为`1+R`的收益时，很容易通过将中间的`1+R`收益相乘/复利计算，然后减去1，来得到多期收益。


    多期收益是衡量投资在一系列连续时期内表现的一个指标。回顾一下，终端收益可以通过`R[0, T] = (1 + R[0, 1])(1 + R[1, 2])…(1
    + R[T - 1, T]) - 1`来计算。当我们计算两期收益`R[t, t + 2]`时，公式变为：


    ![$$ {R}_{t,t+2}=\left(1+{R}_{t,t+1}\right)\left(1+{R}_{t+1,t+2}\right)-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equi.png)


    这种方法允许我们在考虑每个时期收益对下一个时期的复合效应的情况下，计算这两个时期的总收益。因此，使用两个时期的`1+R`格式化收益，复利收益很容易计算。图[4-6](#605529_1_En_4_Chapter.xhtml#Fig6)
    阐述了计算两期收益的复利过程。


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig6_HTML.jpg)


    一个带有数学表达式的流程图，解释了使用两个时期的`1+R`格式化收益计算累积两期收益，并通过减去1调整为百分比收益的过程。


    **图 4-6** 通过将两个单期收益以`1+R`格式复利计算，随后减去1进行调整，从而计算两期收益


    类似地，对于`n`期收益，公式可以泛化为：


    ![$$ {R}_{t,t+n}=\left(1+{R}_{t,t+1}\right)\left(1+{R}_{t+1,t+2}\right)\dots \left(1+{R}_{t+n-1,t+n}\right)-1
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equj.png)


    通过将所有`n`期的`1+R`格式化收益相乘，然后减去1，我们可以确定在整个`n`期投资期限内的复利收益。


    让我们看一个简单的例子。假设我们对一个资产进行两期投资，第一期的收益是10%，第二期的收益是-2%。要计算复利收益，我们的第一步是将两个单期收益都转换成`1+R`格式，分别得到`1.1`和`0.98`。然后我们将这两个数字相乘并减去1：


    ![$$ \left(1+0.1\right)\left(1-0.02\right)-1\approx 0.078=7.8\% $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equk.png)


    请注意，我们不应该将两期终端收益计算为`10% - 2% = 8%`，这忽略了复利效应。通过按顺序计算，将每个时期的`1+R`收益相乘，才能确保我们得到正确的结果。这些乘法运算给出了`1+R`格式下的终端收益，我们再减去1以得到收益本身。'
  raw: '### The Terminal Return


    Terminal return refers to the return at the last time period as compared to the
    initial return, that is, *R*[0, *T*]. Suppose we have price data from period *t* = 0
    to *t* = *T*. To calculate the terminal return *R*[0, *T*] at period *T*, we can
    take the initial price *S*[0] and terminal price *S*[*T*], take the ratio, and
    subtract one, giving


    ![$$ {R}_{0,T}=\frac{S_T}{S_0}-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Eque.png)


    This approach essentially ignores the intermediate returns and only considers
    the initial and terminal asset prices. By focusing solely on the initial and terminal
    asset prices, this metric offers a simplified view of the investment’s growth
    or decline over time, disregarding intermediate fluctuations. This can be particularly
    useful when assessing the long-term performance of an investment or comparing
    the growth of different assets over an extended period. However, note that the
    terminal return does not provide insights into the volatility or risk associated
    with the investment, as it only considers the initial and terminal asset prices.


    There is another way to calculate this value. Instead of focusing only on the
    initial and terminal prices, we view the whole price evolution process as sequential,
    changing from one price point to another. Therefore, the terminal return at period
    *T* (or an arbitrary period *t*) is the result of multiplying all previous 1+R
    formatted returns, followed by a subtraction of one. Mathematically, we have


    ![$$ {R}_{0,T}=\left(1+{R}_{0,1}\right)\left(1+{R}_{1,2}\right)\dots \left(1+{R}_{T-1,T}\right)-1
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equf.png)


    Plugging in the definition of 1+R formatted return gives the following:


    ![$$ {R}_{0,T}=\frac{S_1}{S_0}\frac{S_2}{S_1}\dots \frac{S_T}{S_{T-1}}-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equg.png)


    which is nothing more than the initial equation we presented, after canceling
    like terms. By doing so, we acknowledge the compound effect of each period’s return
    on the overall investment performance. This approach is more comprehensive, as
    it takes into account all price changes during the investment period.


    Figure [4-5](#605529_1_En_4_Chapter.xhtml#Fig5) illustrates the calculation process
    of the terminal return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig5_HTML.jpg)


    A flow of 3 equations present the 3 steps to calculate terminal return using the
    initial and terminal asset price, switching to the 1 + R approach, and recovering
    the previous equation after plugging in the definition of the 1+R formatted return.


    Figure 4-5


    Calculating the terminal return via different approaches


    ### Stock Return with Dividends


    Note that dividends also need to be considered when calculating the asset return.
    This means that we own the stock at its current price and also enjoy the dividends
    it brings. The previous definition of return is called the price return, which
    only considers the price movements of the stock. Adding dividends together with
    the current stock price is referred to as the total return, which is more realistic.
    When analyzing stock performance, the total return is almost always used. The
    difference between the total return and the price return gives the dividends.


    The total return of a stock is calculated as follows:


    ![$$ {R}_{t-1,t}=\frac{S_t+{D}_{t-1,t}}{S_{t-1}}-1=\frac{S_t+{D}_{t-1,t}-{S}_{t-1}}{S_{t-1}}
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equh.png)


    In this equation, the total return is denoted by *R*[*t* − 1, *t*], which is the
    return from time *t* − 1 to time *t*. *S*[*t*] and *S*[*t* − 1] represent the
    stock prices at time *t* and time *t* − 1, respectively. *D*[*t* − 1, *t*] represents
    the dividend paid out during the period from *t* − 1 to *t*.


    The total return provides a more comprehensive assessment of an investment’s performance
    by incorporating both capital appreciation (i.e., the increase in the stock’s
    price) and dividend income. It is particularly relevant for income-oriented investors,
    who are focused on maximizing their returns through a combination of capital gains
    and dividends.


    To calculate the total return of a stock, the formula takes into account the stock
    price at the beginning of the period, the stock price at the end of the period,
    and any dividends paid out during the period. By dividing the sum of the stock
    price at the end of the period and the dividends by the stock price at the beginning
    of the period, and then subtracting one, we obtain the total return as a percentage.


    ### Multiperiod Return


    The terminal return can also be considered as the multiperiod return, or the return
    over a combined period of time. Since the evolution process is sequential, we
    need to compound the returns in each period, sequentially. When we have the 1+R
    formatted returns, it is easy to calculate the multiperiod return by multiplying/compounding
    the intermediate 1+R returns followed by a subtraction of one.


    The multiperiod return is a measure of an investment’s performance over a series
    of consecutive periods. Recall that the terminal return can be calculated via
    *R*[0, *T*] = (1 + *R*[0, 1])(1 + *R*[1, 2])…(1 + *R*[*T* − 1, *T*]) − 1\. When
    we calculate the two-period return *R*[*t*, *t* + 2], the formula becomes


    ![$$ {R}_{t,t+2}=\left(1+{R}_{t,t+1}\right)\left(1+{R}_{t+1,t+2}\right)-1 $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equi.png)


    This method allows us to calculate the overall return over the two periods while
    considering the compounding effect of each period’s return on the next. The compounded
    return is thus easy to calculate using the 1+R formatted returns for both periods.
    Figure [4-6](#605529_1_En_4_Chapter.xhtml#Fig6) illustrates the process of compounding
    the two-period return.


    ![](images/605529_1_En_4_Chapter/605529_1_En_4_Fig6_HTML.jpg)


    A flow diagram with mathematical expressions that explains the process of calculating
    the cumulative two-period return using the 1+R formatted returns for both periods,
    and adjusting it by subtracting 1 to get % return.


    Figure 4-6


    Calculating the two-period return by compounding the two single-period returns
    in 1+R format, followed by an adjustment of subtraction by one


    Similarly, for an n-period return, the formula can be generalized as


    ![$$ {R}_{t,t+n}=\left(1+{R}_{t,t+1}\right)\left(1+{R}_{t+1,t+2}\right)\dots \left(1+{R}_{t+n-1,t+n}\right)-1
    $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equj.png)


    By multiplying the 1+R formatted returns for all n periods and then subtracting
    one, we can determine the compounded return over the entire n-period investment
    horizon.


    Let us look at a simple example. Suppose we invest in an asset for two periods,
    where the first-period return is 10%, and the second-period return is –2%. To
    calculate the compounded return, our first step is to convert both single-period
    returns to the 1+R format, giving 1.1 and 0.98, respectively. We would then multiply
    these two numbers and subtract by one:


    ![$$ \left(1+0.1\right)\left(1-0.02\right)-1\approx 0.078=7.8\% $$](images/605529_1_En_4_Chapter/605529_1_En_4_Chapter_TeX_Equk.png)


    Note that we should not calculate the two-period terminal return as (10% – 2%)
    = 8%, which ignores the compounding effect. Working through the calculations sequentially
    by multiplying the 1+R returns in each period ensures we obtain the correct result.
    These multiplications give the terminal return in the 1+R format, and we subtract
    by one to get the return itself.'
  trans: '

    ### 终端收益（Terminal Return）


    终端收益指的是在最后一个时间段相对于初始收益的回报，即`R[0, T]`。假设我们有从`t = 0`到`t = T`的价格数据。要计算第`T`期的终端收益`R[0,
    T]`，我们可以取初始价格`S[0]`和终端价格`S[T]`，计算它们的比率，然后减去 1，得到：


    ![$$ {R}_{0,T}=\frac{S_T}{S_0}-1 $$](img/605529_1_En_4_Chapter_TeX_Eque.png)


    这种方法本质上忽略了中间收益，只考虑了初始和终端的资产价格。通过仅关注初始和终端资产价格，该指标提供了一种简化的投资增长或衰退视图，忽略了中间的波动。这在评估投资的长期表现或比较不同资产在较长时期内的增长时特别有用。然而，请注意，终端收益并不能提供有关投资波动性或风险的见解，因为它只考虑了初始和终端资产价格。


    计算这个值还有另一种方法。我们不是只关注初始和终端价格，而是将整个价格演变过程视为一个序列，从一个价格点变化到另一个价格点。因此，第`T`期（或任意第`t`期）的终端收益是所有先前格式化为`1+R`的收益相乘，然后减去
    1 的结果。数学上，我们有：


    ![$$ {R}_{0,T}=\left(1+{R}_{0,1}\right)\left(1+{R}_{1,2}\right)\dots \left(1+{R}_{T-1,T}\right)-1
    $$](img/605529_1_En_4_Chapter_TeX_Equf.png)


    代入格式化为`1+R`的收益定义，得到以下结果：


    ![$$ {R}_{0,T}=\frac{S_1}{S_0}\frac{S_2}{S_1}\dots \frac{S_T}{S_{T-1}}-1 $$](img/605529_1_En_4_Chapter_TeX_Equg.png)


    在约去同类项后，这实际上就是我们最初提出的公式。通过这样做，我们承认了每个时期收益对整体投资表现的复合效应。这种方法更全面，因为它考虑了投资期间的所有价格变化。


    图 4-5 阐述了终端收益的计算过程。


    ![](img/605529_1_En_4_Fig5_HTML.jpg)


    一个包含 3 个方程的流程图，展示了计算终端收益的 3 个步骤：使用初始和终端资产价格、转换为`1+R`方法、以及在代入格式化为`1+R`的收益定义后还原之前的方程。


    **图 4-5** 通过不同方法计算终端收益


    ### 含股息的股票收益


    请注意，在计算资产收益时，还需要考虑股息。这意味着我们以当前价格持有股票，同时也享有它所带来的股息。先前对收益的定义称为价格收益，它仅考虑股票的价格变动。将股息与当前股票价格相加则被称为总收益，这更加符合实际情况。在分析股票表现时，几乎总是使用总收益。总收益与价格收益之差即为股息。


    股票的总收益计算如下：


    ![$$ {R}_{t-1,t}=\frac{S_t+{D}_{t-1,t}}{S_{t-1}}-1=\frac{S_t+{D}_{t-1,t}-{S}_{t-1}}{S_{t-1}}
    $$](img/605529_1_En_4_Chapter_TeX_Equh.png)


    在此方程中，总收益用`R[t - 1, t]`表示，即从时间`t - 1`到时间`t`的收益。`S[t]`和`S[t - 1]`分别代表时间`t`和时间`t
    - 1`的股票价格。`D[t - 1, t]`代表在`t - 1`到`t`期间内支付的股息。


    总收益通过结合资本增值（即股票价格的上涨）和股息收入，提供了对投资表现更全面的评估。这对于注重收益的投资者尤其相关，他们专注于通过资本利得和股息相结合的方式最大化回报。


    要计算股票的总收益，公式考虑了期初的股票价格、期末的股票价格以及期间内支付的任何股息。通过将期末股票价格与股息之和除以期初股票价格，然后减去 1，我们便得到以百分比表示的总收益。


    ### 多期收益


    终端收益也可以被视为多期收益，或是在一个合并时间段内的收益。由于演变过程是顺序的，我们需要按顺序对每个时期的收益进行复利计算。当我们拥有格式化为`1+R`的收益时，很容易通过将中间的`1+R`收益相乘/复利计算，然后减去
    1，来得到多期收益。


    多期收益是衡量投资在一系列连续时期内表现的一个指标。回顾一下，终端收益可以通过`R[0, T] = (1 + R[0, 1])(1 + R[1, 2])…(1
    + R[T - 1, T]) - 1`来计算。当我们计算两期收益`R[t, t + 2]`时，公式变为：


    ![$$ {R}_{t,t+2}=\left(1+{R}_{t,t+1}\right)\left(1+{R}_{t+1,t+2}\right)-1 $$](img/605529_1_En_4_Chapter_TeX_Equi.png)


    这种方法允许我们在考虑每个时期收益对下一个时期的复合效应的情况下，计算这两个时期的总收益。因此，使用两个时期的`1+R`格式化收益，复利收益很容易计算。图
    4-6 阐述了计算两期收益的复利过程。


    ![](img/605529_1_En_4_Fig6_HTML.jpg)


    一个带有数学表达式的流程图，解释了使用两个时期的`1+R`格式化收益计算累积两期收益，并通过减去 1 调整为百分比收益的过程。


    **图 4-6** 通过将两个单期收益以`1+R`格式复利计算，随后减去 1 进行调整，从而计算两期收益


    类似地，对于`n`期收益，公式可以泛化为：


    ![$$ {R}_{t,t+n}=\left(1+{R}_{t,t+1}\right)\left(1+{R}_{t+1,t+2}\right)\dots \left(1+{R}_{t+n-1,t+n}\right)-1
    $$](img/605529_1_En_4_Chapter_TeX_Equj.png)


    通过将所有`n`期的`1+R`格式化收益相乘，然后减去 1，我们可以确定在整个`n`期投资期限内的复利收益。


    让我们看一个简单的例子。假设我们对一个资产进行两期投资，第一期的收益是 10%，第二期的收益是-2%。要计算复利收益，我们的第一步是将两个单期收益都转换成`1+R`格式，分别得到`1.1`和`0.98`。然后我们将这两个数字相乘并减去
    1：


    ![$$ \left(1+0.1\right)\left(1-0.02\right)-1\approx 0.078=7.8\% $$](img/605529_1_En_4_Chapter_TeX_Equk.png)


    请注意，我们不应该将两期终端收益计算为`10% - 2% = 8%`，这忽略了复利效应。通过按顺序计算，将每个时期的`1+R`收益相乘，才能确保我们得到正确的结果。这些乘法运算给出了`1+R`格式下的终端收益，我们再减去
    1 以得到收益本身。

