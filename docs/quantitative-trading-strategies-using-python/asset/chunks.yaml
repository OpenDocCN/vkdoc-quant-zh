    Let us visualize the price curves as line plots:


    ```

    >>> df2.plot.line()

    ```


    As shown in Figure [7-4](#605529_1_En_7_Chapter.xhtml#Fig4), both stocks maintained
    an increasing trend during this period, although Google suffered a big hit in
    stock price near the end of the period.


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig4_HTML.jpg)


    A double line graph presents the variation of G O O G and M S F T on 5 different
    dates between January 2023 and February 2023\. The line for M S F T is more fluctuating.


    Figure 7-4


    Visualizing the stock prices as line plots


    To better understand the stock returns, let us convert the raw stock prices to
    single-period percentage returns using the `pct_change()` function:


    ```

    returns_df = df2.pct_change()

    >>> returns_df.head()

    GOOG      MSFT

