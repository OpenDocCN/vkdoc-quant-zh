- fmt: "### Pairs Trading Using `SVM`\n\nSince this is a regression task, we will\
    \ use the `SVR` class from `sklearn`, specifying a linear kernel. After instantiating\
    \ the model class, we use the `fit()` method to fit the model parameters to the\
    \ training data and the `predict()` method to generate predictions for the test\
    \ data. We will also check the root mean squared error (`RMSE`) for both training\
    \ and test sets. Listing [10-5](#605529_1_En_10_Chapter.xhtml#PC6) completes the\
    \ training and testing operations.\n\n```python\nfrom sklearn.svm import SVR\n\
    from sklearn.metrics import mean_squared_error\nsvm_model = SVR(kernel='linear')\n\
    svm_model.fit(train_X, train_y)\ntrain_pred = svm_model.predict(train_X)\n>>>\
    \ print(\"training rmse: \", np.sqrt(mean_squared_error(train_y, train_pred)))\n\
    test_pred = svm_model.predict(test_X)\n>>> print(\"test rmse: \", np.sqrt(mean_squared_error(test_y,\
    \ test_pred)))\ntraining rmse:  0.039616044798431914\ntest rmse:  0.12296547390274865\n\
    Listing 10-5\nModel training and testing using SVM\n```\n\nThe `RMSE` measures\
    \ the model’s predictive performance. However, we still need to plug the model\
    \ into the trading strategy and evaluate the ultimate profitability in the pairs\
    \ trading strategy. As the only change is on the predicted spread based on the\
    \ specific machine learning model, we can define a function to score the model\
    \ as an input parameter and output the terminal profit. The `score_fn()` function\
    \ in Listing [10-6](#605529_1_En_10_Chapter.xhtml#PC7) completes the scoring operation.\n\
    \n```python\nimport torch\ndef score_fn(model, type=\"non_neural_net\"):\n   \
    \ # Generate predicted spread using the SVM model\n    if type == \"non_neural_net\"\
    :\n        test_pred = model.predict(test_X)\n    else:\n        test_pred = model(torch.Tensor(test_X.values)).detach().numpy()\n\
    \    # Calculate z-score of the actual and predicted spread\n    zscore = (spread\
    \ - test_pred.mean()) / test_pred.std()\n    # set the threshold values for entry\
    \ and exit signals\n    entry_threshold = 2.0\n    exit_threshold = 1.0\n    #\
    \ initialize the daily positions to be zeros\n    stock1_position = pd.Series(data=0,\
    \ index=zscore.index)\n    stock2_position = pd.Series(data=0, index=zscore.index)\n\
    \    # generate daily entry and exit signals for each stock\n    for i in range(1,\
    \ len(zscore)):\n        # zscore2 and no existing short position for stock 2\n\
    \        elif zscore[i] > entry_threshold and stock2_position[i-1] == 0:\n   \
    \         stock1_position[i] = -1 # short stock 1\n            stock2_position[i]\
    \ = 1 # long stock 2\n        # -1<zscore<1\n        elif abs(zscore[i]) < exit_threshold:\n\
    \            stock1_position[i] = 0 # exit existing position\n            stock2_position[i]\
    \ = 0\n        # -2<zscore<-1 or 1<zscore<2\n        else:\n            stock1_position[i]\
    \ = stock1_position[i-1] # maintain existing position\n            stock2_position[i]\
    \ = stock2_position[i-1]\n    # Calculate the returns of each stock\n    stock1_returns\
    \ = (np.exp(test_X['Asset1Returns']) * stock1_position.shift(1)).fillna(0)\n \
    \   stock2_returns = (np.exp(test_X['Asset2Returns']) * stock2_position.shift(1)).fillna(0)\n\
    \    # calculate the total returns of the strategy\n    total_returns = stock1_returns\
    \ + stock2_returns\n    cumulative_returns = (1 + total_returns).cumprod()\n \
    \   return cumulative_returns[-1]\nListing 10-6\nCalculating cumulative return\
    \ using pairs trading under a given predictive model\n```\n\nIn this function,\
    \ we add another input parameter to control if the model belongs to a neural network.\
    \ This control is placed here to determine the specific prediction method to use.\
    \ For standard `sklearn` algorithms such as `SVM` and random forest, we can call\
    \ the `predict()` method of the model object to generate predictions for the given\
    \ input data. However, when the model is a neural network trained using PyTorch,\
    \ we need to first convert the input to a tensor object using `torch.Tensor()`,\
    \ generate predictions by calling the model object itself (underlying, the `forward()`\
    \ function within the model class is called), extracting the outputs without gradient\
    \ information using the `detach()` method, and converting to a NumPy object using\
    \ `numpy()`.\n\nNext, we calculate the z-score using the mean and the standard\
    \ deviation of the predicted spread series. We then use an entry threshold of\
    \ two and an exit threshold of one to generate the trading signals based on the\
