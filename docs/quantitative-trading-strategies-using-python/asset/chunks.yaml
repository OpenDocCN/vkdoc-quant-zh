- fmt: '# Introducing Backtesting


    Backtesting allows us to simulate a trading strategy using historical data and
    analyze the risk and return before actually entering into a position. It refers
    to the process of testing a particular trading strategy backward using historical
    data in order to assess its performance on future data going forward. Such performance
    is also called the test set performance in the context of training a machine learning
    model, with the common constraint that the test set needs to be completely kept
    away when formulating a strategy or training a model. This period of historical
    data reserved for testing purposes allows us to assess the potential variability
    of the proposed trading strategy.


    Building on that, backtesting offers a way to measure the effectiveness of a trading
    strategy while keeping emotions and subjective bias at bay. It provides a scientific
    method to simulate the actual performance of a strategy, which then can be used
    to calculate various summary metrics that indicate the strategy’s potential profitability,
    risk, and stability over time. Example metrics include the total return, average
    return, volatility, maximum drawdown (to be covered shortly), and the Sharpe ratio.


    When carrying out a backtesting procedure, one needs to avoid data snooping (i.e.,
    peeking into the future) and observe the sequence of time. Even if a certain period
    of historical data is used to cross-validate a strategy, one needs to ensure that
    the cross-validation periods fall outside or, more specifically, after the training
    period. In other words, the cross-validation period cannot exist in the middle
    of the training period, thus preserving the sequence of time as we move forward.


    Retrospectively testing out the hypothetical performance of a trading strategy
    on historical data allows us to assess its variability over a set of aforementioned
    metrics. Since the same trading strategy may exhibit completely different behavior
    when backtested over various choices of investment horizons and assets, it is
    critical to overlay a comprehensive set of backtesting scenarios for the particular
    trading strategy before its adoption. It’s essential to conduct a thorough and
    varied backtesting process, as the performance of a trading strategy can greatly
    vary depending on the choice of investment horizon, the selection of assets, and
    the specific market conditions during the testing period.


    For example, we can use backtesting on the trend-following strategy we covered
    earlier, where we use two moving averages to generate trading signals if there
    is a crossover. In this process, the input consists of two window sizes: one for
    the short window and one for the long window. The output is the resulting return,
    volatility, or other risk-adjusted return such as the Sharpe ratio. Any pair of
    window sizes for the moving averages has a corresponding performance metric, and
    we would change the input parameters in order to obtain the optional performance
    metric on the historical data. More specifically, we can create a range of potential
    values for each parameter—for example, we could test short moving averages from
    10 to 30 days and long moving averages from 50 to 200 days. For each combination
    of these parameters, we calculate the corresponding performance metric. The optimal
    parameters then maximize (or minimize, depending on the specific metric) this
    selected performance metric.


    ## Caveats of Backtesting


    Note that a good backtesting performance does not necessarily guarantee a good
    future return. This is due to the underlying assumption of backtesting: any strategy
    that did well in the past is likely to do well in the future period, and conversely,
    any strategy that performed poorly in the past is likely to perform poorly in
    the future. Since financial markets are complex adaptive systems that are influenced
    by a myriad of factors, including economic indicators, geopolitical events, and
    even shifts in investor sentiment, all these are constantly evolving and can deviate
    significantly from past patterns. In summary, past performance is not indicative
    of future results.


    However, a well-conducted backtest that yields positive results gives assurance
    that the strategy is fundamentally sound and is likely to yield profits when implemented
    in reality. Backtesting can at least help us to weed out the strategies that do
    not prove themselves worthy. However, this assumption is likely to fail in the
    stock market, which typically highlights a low signal-to-noise ratio. Since financial
    markets keep evolving fast, the future may exhibit patterns not present in the
    historical data, making extrapolation a difficult task compared to interpolation.


    Another issue with backtesting is the potential to overfit a strategy such that
    it performs well on the historical data used for testing but fails to generalize
    to new, unseen data. Overfitting occurs when a strategy is too complex and tailors
    itself to the idiosyncrasies and noise in the test data rather than identifying
    and exploiting the fundamental patterns that govern the data-generating process.


    In addition, the backtesting period of the historical data needs to be representative
    and reflect a variety of market conditions. Excessively using the same dataset
    for backtesting is called data dredging, where the same dataset may produce an
    exceptionally good result purely by chance. If the backtest only includes a period
    of economic boom, for instance, the strategy might appear more successful than
    it would during a downturn or volatile market conditions. By assessing the trading
    strategy over a comprehensive and diverse period of historical data, we can avoid
    data dredging and better tell if the good performance, if any, is due to sound
    trading or merely a fluke.


    Data dredging, or “p-hacking,” is a material concern in backtesting. It involves
    repeatedly running different backtests with slightly modified parameters on the
    same dataset until a desirable result is found. The danger here lies in the fact
    that the positive result might just be a product of chance rather than an indication
    of a genuinely effective strategy. This overfitting could lead to a strategy that
    performs exceptionally well on the test data but fails miserably on new, unseen
    data.


    On the other hand, the selection of the stocks used for backtesting also needs
    to be representative, including companies that eventually went bankrupt, were
    sold, or liquidated. Failing to do so produces the survivorship bias, where one
    cherry-picks a set of stocks and only looks at those that survived till today
    and ignores others that disappeared in the middle. By excluding companies that
    have failed or undergone significant structural changes, we could end up with
    an overly optimistic view of the strategy’s profitability and risk profile. This
    is because the stocks that have survived, in general, are likely to be those that
    performed better than average. Ignoring companies that went bankrupt or were delisted
    for any reason may skew the results, creating an illusion of a successful strategy
    when, in reality, the strategy may not perform as well in the real environment.'
