    Let us test out the scoring function. In the following code snippet, we pass in
    different values of entry and exit thresholds and obtain the corresponding Sharpe
    ratio for the whole year of 2022:


    ```

    >>> qts(entry_threshold=2, exit_threshold=1)

    1.690533096171306

    >>> qts(entry_threshold=1.5, exit_threshold=0.5)

    1.8278364562046485

    ```


    We see that different values of the thresholds correspond to different Sharpe
    ratios. Our task is to find the optimal set of entry and exit thresholds that
    correspond to the highest Sharpe ratio, as fast as possible. This is where Bayesian
    optimization comes in.


    ### Generating Training Set for Bayesian Optimization


    Most machine learning models require a training set to start with. The training
    set provides the correct input-output mapping relationship for the model to fine-tune
    its weights and, therefore, learn such a mapping relationship. This is the same
    for the Bayesian optimization model. Specifically, the training set helps update
    the prior distribution used by the Gaussian process, so that its governing hyperparameters
    get updated, which would then be used to obtain a more representative posterior
    distribution.


    The following code snippet creates a few preparatory variables for later use,
    where `device` denotes the computing device (CPU or GPU) to run the calculations
    later, `dtype` specifies the data type of the PyTorch tensor, and `x1_bound` and
    `x2_bound` contain the lower and upper bounds for the short and long windows,
    respectively. Here, we specify the short window to vary from 1 to 10 and the long
    window from 11 to 20:


    ```

    # generate initial training dataset for optimization

    device = torch.device("cuda" if torch.cuda.is_available() else "cpu")

    dtype = torch.double

    x1_bound = [1,3]

    x2_bound = [0,1]

    ```


    Next, we define a function named `generate_initial_data()` to get a set of training
    data. As shown in Listing [9-4](#605529_1_En_9_Chapter.xhtml#PC10), this function
    takes a single input `n` to specify the number of observations in the training
    set. Inside the function, we first generate a set of random values using the `torch.rand()`
    function from Torch. After combining the set of entry and exit thresholds into
    a single variable `train_x`, we iterate through each row to apply the black-box
    scoring function `qts()` and obtain the corresponding Sharpe ratio, collectively
    stored in `train_y`. Besides returning `train_x` and `train_y`, we also report
    the highest score in `best_observed_value`, as we will maintain a list of cumulative
    maximum values to indicate the search quality. The current best value observed
    so far also represents the utility of the dataset collected till now, that is,
    the utility value of the dataset in helping us locate the optimum window lengths.


    ```

    def generate_initial_data(n=10):

    # generate random initial locations

    train_x1 = x1_bound[0] + (x1_bound[1] - x1_bound[0]) * torch.rand(size=(n,1),
    device=device, dtype=dtype)

    train_x2 = torch.rand(size=(n,1), device=device, dtype=dtype)

    train_x = torch.cat((train_x1, train_x2), 1)

    # obtain the exact value of the objective function and add output dimension

    train_y = []

    for i in range(len(train_x)):

    train_y.append(qts(entry_threshold=train_x1[i], exit_threshold=train_x2[i]))

    train_y = torch.Tensor(train_y, device=device).to(dtype).unsqueeze(-1)

    # get the current best observed value, i.e., utility of the available dataset

    best_observed_value = train_y.max().item()

    return train_x, train_y, best_observed_value

    Listing 9-4

    Generating initial training data

    ```


    Let us generate three samples in the training set as follows:


    ```

    train_x, train_y, best_observed_value = generate_initial_data(n=3)

    >>> print(train_x)

    >>> print(train_y)

    >>> print(best_observed_value)

    tensor([[1.1221, 0.1771],

    [1.4491, 0.5561],

    [1.4685, 0.1094]], dtype=torch.float64)

    tensor([[0.0550],

    [2.2504],

    [1.0004]], dtype=torch.float64)

    2.250356674194336

    ```


    Next, we implement the first component in BO: the Gaussian process model.'
