- fmt: '### Implementing the Gaussian Process Model


    As mentioned earlier, we can use this training set to optimize the hyperparameters
    of the Gaussian process (GP) model so that it’s more fine-tuned toward the data
    at hand. This is because a GP model is also governed by its own hyperparameters
    upon initialization, such as the length scale. Different GP models have different
    hyperparameters, and we will go with the default choice provided by BoTorch.


    In Listing [9-5], we create a function called `initialize_model()` to initialize
    the GP model. We use the `SingleTaskGP()` class from `botorch.models` to instantiate
    a GP model based on the previous training data and then use the `ExactMarginalLogLikelihood()`
    function to obtain the exact marginal log-likelihood of the GP model.


    ```python

    # initialize GP model

    from botorch.models import SingleTaskGP

    from gpytorch.mlls import ExactMarginalLogLikelihood

    def initialize_model(train_x, train_y):

    # create a single-task exact GP model instance

    # use a GP prior with Matern kernel and constant mean function by default

    model = SingleTaskGP(train_X=train_x, train_Y=train_y)

    mll = ExactMarginalLogLikelihood(model.likelihood, model)

    return mll, model

    Listing 9-5

    Initializing the GP model

    ```


    Let us print out the values of the hyperparameters (including kernel parameters
    and noise variance) of the GP model before optimization:


    ```python

    mll, model = initialize_model(train_x, train_y)

    >>> list(model.named_hyperparameters())

    [(''likelihood.noise_covar.raw_noise'', Parameter containing:

    tensor([2.0000], dtype=torch.float64, requires_grad=True)),

    (''mean_module.raw_constant'', Parameter containing:

    tensor(0., dtype=torch.float64, requires_grad=True)),

    (''covar_module.raw_outputscale'', Parameter containing:

    tensor(0., dtype=torch.float64, requires_grad=True)),

    (''covar_module.base_kernel.raw_lengthscale'', Parameter containing:

    tensor([[0., 0.]], dtype=torch.float64, requires_grad=True))]

    ```


    Optimizing the GP hyperparameters can be done by following the maximum log-likelihood
    (MLL) approach, which is implemented in the `fit_gpytorch_mll()` function from
    `botorch.fit`. Listing [9-6] fits the GP hyperparameters and prints out their
    values.


    ```python

    # optimize GP hyperparameters

    from botorch.fit import fit_gpytorch_mll

    # fit hyperparameters (kernel parameters and noise variance) of a GPyTorch model

    fit_gpytorch_mll(mll.cpu());

    mll = mll.to(train_x)

    model = model.to(train_x)

    >>> list(model.named_hyperparameters())

    [(''likelihood.noise_covar.raw_noise'', Parameter containing:

    tensor([0.2238], dtype=torch.float64, requires_grad=True)),

    (''mean_module.raw_constant'', Parameter containing:

    tensor(1.1789, dtype=torch.float64, requires_grad=True)),

    (''covar_module.raw_outputscale'', Parameter containing:

    tensor(1.8917, dtype=torch.float64, requires_grad=True)),

    (''covar_module.base_kernel.raw_lengthscale'', Parameter containing:

    tensor([[-0.8823, -0.9687]], dtype=torch.float64, requires_grad=True))]

    Listing 9-6

    Optimizing GP hyperparameters

    ```


    The result shows a different set of hyperparameters after optimization. Note that
    we need to move the `mll` object to GPU to perform the optimization, after which
    it can be moved back to GPU (if available).


    The optimized GP model can then be incorporated into the acquisition function
    to guide the following search process, as detailed in the next section.


    ### Guiding the Sequential Search by Maximizing the Acquisition Function


    We will use a few popular acquisition functions, including the expected improvement
    (EI), upper confidence bound (UCB), parallel expected improvement (qEI), and the
    parallel knowledge gradient (qKG). Instead of focusing on the derivation and reasoning
    of each choice, we will jump straight into their implementation and usage. Readers
    interested in a more in-depth discussion on different acquisition functions can
    refer to the book *Bayesian Optimization: Theory and Practice Using Python*.


    To start with, we instantiate both acquisition functions via `ExpectedImprovement()`,
    `qExpectedImprovement()`, `UpperConfidenceBound()`, and `qKnowledgeGradient()`
    from `botorch.acquisition`. Note that different acquisition functions expect different
    input arguments. For example, other than the GP model instance from the previous
    section, EI requires the best-observed value so far, while UCB expects a `beta`
    parameter that adjusts the trade-off between exploitation and exploration. Such
    adjustment is implicitly handled in EI. This is shown in Listing [9-7].


    ```python

    # define acquisition function

    from botorch.acquisition import ExpectedImprovement

    from botorch.acquisition import qExpectedImprovement

    from botorch.acquisition import UpperConfidenceBound

    from botorch.acquisition.knowledge_gradient import qKnowledgeGradient

    # call helper functions to generate initial training data and initialize model

    train_x, train_y, best_observed_value = generate_initial_data(n=3)

    train_x_ei = train_x

    train_x_qei = train_x

    train_x_ucb = train_x

    train_x_qkg = train_x

    train_y_ei = train_y

    train_y_qei = train_y

    train_y_ucb = train_y

    train_y_qkg = train_y

    mll_ei, model_ei = initialize_model(train_x_ei, train_y_ei)

    mll_qei, model_qei = initialize_model(train_x_qei, train_y_qei)

    mll_ucb, model_ucb = initialize_model(train_x_ucb, train_y_ucb)

    mll_qkg, model_qkg = initialize_model(train_x_qkg, train_y_qkg)

    EI = ExpectedImprovement(model=model_ei, best_f=best_observed_value)

    qEI = qExpectedImprovement(model=model_qei, best_f=best_observed_value)

    beta = 0.8

    UCB = UpperConfidenceBound(model=model_ucb, beta=beta)

    num_fantasies = 64

    qKG = qKnowledgeGradient(

    model=model_qkg,

    num_fantasies=num_fantasies,

    X_baseline=train_x,

    q=1

    )

    Listing 9-7

    Defining and initializing the acquisition functions

    ```


    The acquisition function is used to generate the next parameter value to be sampled,
    which is located by maximizing the acquisition function at hand. The process of
    searching for the maximum value of the acquisition function within the search
    domain is handled by the `optimize_acqf()` function, which is provided by the
    `botorch.optim` module. The new parameter value, along with the corresponding
    score from the unknown objective function, will be used as an additional training
    data point to support an updated version of the GP model and acquisition function
    in the next round.


    Listing [9-8] provides the detailed implementation of passing an acquisition function
    and obtaining the next sampling decision and functional observation. Note the
    additional parameters required by the optimization procedure `optimize_acqf()`:
    `bounds` to define the search domain of each parameter, `BATCH_SIZE` to specify
    the number of samples to probe at each round (probing multiple points in parallel
    is possible), `NUM_RESTARTS` to control the number of initial conditions when
    optimization starts, and `RAW_SAMPLES` to indicate the number of initial samples
    to support heuristic-based optimization over the acquisition function.'
