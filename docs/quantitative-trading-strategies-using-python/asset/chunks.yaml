    ## Summary


    In this chapter, we introduced the use of Bayesian optimization techniques to
    search for optimal parameters of a trading strategy. We started by illustrating
    the concept of optimizing trading strategies by tuning the corresponding governing
    parameters, a nontrivial task. By treating the performance measure as a black-box
    function of the tuning parameters, we introduced the Bayesian optimization framework,
    which uses Gaussian processes and acquisition functions (such as EI and UCB) to
    support the search of optimal parameters in a sample-efficient manner. With the
    full BO loop in perspective, we went through a case study that optimizes the entry
    and exit thresholds of a pairs trading strategy to obtain an optimal Sharpe ratio.


    In the final chapter, we will look at the use of machine learning models in the
    pairs trading strategy.


