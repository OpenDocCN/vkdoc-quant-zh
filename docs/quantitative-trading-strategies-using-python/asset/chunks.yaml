- fmt: '### Calculating Monthly Returns


    To transition from the raw daily stock prices to monthly returns, we need to go
    through a few steps. The first step is to convert the prices to daily percentage
    returns using the `pct_change()` method. As introduced in the previous chapter,
    this function automatically calculates the simple percentage return for all trading
    days. As this is a daily return, we need to roll it up to the monthly return by
    compounding all daily returns of the same month and using the terminal return
    as the monthly return. Breaking it down, we need to group all trading days by
    month and then calculate the terminal return for each month. Listing [6-4] chains
    together all these operations in one shot, with the resulting monthly returns
    stored in `mth_return_df`.


    ```

    mth_return_df = df.pct_change().resample("M").agg(lambda x: (x+1).prod()-1)

    Listing 6-4

    Generating monthly returns from daily prices

    ```


    Although chaining together relevant operations looks more concise, it is not the
    best way to learn these operations if this is the first time we encounter them.
    Let us decompose these operations. The first operation is to call the `pct_change()`
    method, which is a convenient function widely used in many contexts. Next comes
    the `resample()` function, which is a convenient method for frequency conversion
    and resampling of time series data. Let us use some dummy data to understand this
    function.


    The following code snippet creates a Pandas Series object with nine integers ranging
    from zero to eight, which are indexed by nine one-minute timestamps:


    ```

    # creating a series with 9 one minute timestamps

    index = pd.date_range(''1/1/2000'', periods=9, freq=''T'')

    series = pd.Series(range(9), index=index)

    >>> series

    2000-01-01 00:00:00    0

    2000-01-01 00:01:00    1

    2000-01-01 00:02:00    2

    2000-01-01 00:03:00    3

    2000-01-01 00:04:00    4

    2000-01-01 00:05:00    5

    2000-01-01 00:06:00    6

    2000-01-01 00:07:00    7

    2000-01-01 00:08:00    8

    Freq: T, dtype: int64

    ```


    We then aggregate the series into three-minute bins and sum the values of the
    timestamps falling into a bin, as shown in the following code snippet:


    ```

    >>> series.resample(''3T'').sum()

    2000-01-01 00:00:00     3

    2000-01-01 00:03:00    12

    2000-01-01 00:06:00    21

    Freq: 3T, dtype: int64

    ```


    As we can see from the result, the `resample()` function completes the aggregation
    operation by the specified interval, and the following method summarizes the data
    within the interval.


    Back to our running example, we downsample the raw daily returns into monthly
    returns, so each month is represented with only one data point instead of 30 (in
    a typical month). The aggregation works by cumulating all daily returns following
    the same procedure: converting to `1+R` format, compounding, and then converting
    back to simple return.


    The new thing here is the lambda function. We use the `x` symbol to represent
    a general input argument. In this case, it will be all the raw daily returns in
    a given month. Since this lambda function performs a customized operation, we
    use the `agg()` function to carry through the customized function, instead of
    using the built-in function such as `sum()` as before.


    By now, we have converted the daily returns to monthly representations where every
    single monthly return represents the terminal return of the daily returns compounded
    within the month. Next, we calculate another metric using historical monthly returns
    to indicate the current month’s stock performance.


    ### Calculating the Six-Month Terminal Return


    We know that making a trading decision based on the current month’s return would
    be flawed in two ways. First, we rely too much on the current month and ignore
    historical performances. Second, we run into the risk of data snooping. That is,
    to calculate the monthly return on a given day of the month, if it does not fall
    on the last day of the month, we would snoop all future daily returns within the
    same month in order to calculate the terminal return.


    We focus on the first point and come back to the second point in a moment. Obviously,
    we need to find a way to incorporate historical monthly returns when generating
    trading signals in the current month. However, different from the moving averages
    used for stock prices, the historical average monthly return obtained using the
    same arithmetic mean essentially ignores the sequential compounding process. Therefore,
    we need to treat historical monthly returns as a sequential process and compound
    these returns (up to a specific lookback window) to obtain the terminal monthly
    return.


    This terminal monthly return will then serve as the momentum indicator for stock
    selection and trading initiation. This involves choosing a lookback window with
    a specific size. Let us assume a window size of six. Now, to calculate the six-month
    terminal return for each month on a rolling basis, we can use the `rolling()`
    function, which is the same function used to calculate moving averages. The only
    change is that, instead of taking the average using `mean()` after rolling the
    pointer backward by six months, we take the product of these `1+R` monthly returns
    using `np.prod` in the `apply()` function to complete the compounding process,
    as shown in Listing [6-5].


    ```

    # obtain the historical cumulative returns of past 6 months as the terminal return
    of current month

    past_cum_return_df = (mth_return_df+1).rolling(6).apply(np.prod) - 1

    Listing 6-5

    Calculating six-month cumulative returns

    ```


    By now, we have calculated the six-month terminal monthly return as the cumulative
    return of the past six months, including the current month. This also explains
    why the first five months show empty values in the previous result and the cumulative
    monthly returns only start from the sixth month.


    Next, we look at using these terminal returns to generate trading signals.'
