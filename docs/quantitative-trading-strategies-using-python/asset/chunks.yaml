  trans: "\n此外，请注意，我们需要确保分母（此处为`S[t]`）不为零，以避免出现除以零的错误。在程序实现计算时，可以通过在分母上添加一个小的常量来处理。\n\
    \n## Q8：使用对数收益率计算期末收益率。它与 Q4 的结果相等吗？\n\n**答案：** 使用对数收益率计算期末收益率，可以通过将所有单期对数收益率相加，然后对结果进行指数运算以还原对数操作，最后减去\
    \ 1 转换回简单收益率格式。这是因为对数收益率具有时间可加性，意味着在给定时间段内的总对数收益率，就是该时段内各子时期对数收益率之和。\n\n换句话说，如果你计算了若干个时期（例如按日）的对数收益率，只需将这些日对数收益率全部相加，即可得到这些时期的总（期末）对数收益率。这一特性简化了跨多个时期期末收益率的计算，使其非常便捷，尤其是在处理大型数据集时。\n\
    \n结果显示，该值与 Q4 中得到的值相等。参见图 5-8 的图示。\n\n![](img/605529_1_En_5_Fig8_HTML.jpg)\n\n\
    一个虚拟股票价格的 Excel 表格。它展示了使用对数收益率计算的期末收益率。列标题分别为日、价格、收益率 1、收益率 2、收益率 3 和收益率 4。Q7\
    \ 列中所有五天的数据已突出显示。\n\n**图 5-8** 使用对数收益率计算期末收益率\n\n## Q9：讨论使用对数收益率的优点。\n\n**答案：**\
    \ 如前所述，使用对数收益率（或称“对数回报”）具有若干优点，详述如下：\n\n*   **易于计算和分析：** 对数收益率简化了数学计算和统计分析。在处理多个时期的复利收益率时，这种简化尤为显著。由于对数将乘法和除法运算转化为加法和减法，多个时期的复利收益率（或“总收益率”）可以计算为这些时期对数收益率的简单和。\n\
    \n*   **对称性：** 对数收益率还表现出理想的对称性。如果价格先翻倍后减半，或先减半后翻倍，这两个时期的总对数收益率为零，反映了价格在这两个时期不变的事实。这种简单收益率不具备的对称性，常常能简化分析并提高结果的可解释性。假设股票价格`S[t]`变为`S[t+1]`，然后又变回`S[t]`，则产生的对数收益率将围绕零对称。例如，当股票价格从第\
    \ 1 天的 100 变为第 2 天的 108，再变回第 3 天的 100 时，产生的对数收益率在第 2 天为 7.7%，在第 3 天为–7.7%。一个简单的数学分析就能立刻理解这一点：\n\
    \n```\nlog(S[t+1]/S[t]) = -log((S[t+1]/S[t])^(-1)) = -log(S[t]/S[t+1])\n```\n\n\
    *   **正态性：** 此外，金融模型通常假设收益率呈正态分布。然而，据观察，简单收益率存在偏度和超额峰度，这意味着它们偏离了正态分布。另一方面，对数收益率往往具有更接近正态分布的属性，这使得它们更适合这些金融模型。\n\
    \n*   **连续复利收益率：** 对数收益率也代表连续复利收益率。这一特性使得对数收益率在特定的金融应用（尤其是涉及期权和其他衍生品）中成为首选，因为这些领域通常使用连续复利。\n\
    \n总而言之，使用对数收益率简化了数学计算和统计分析，实现了对称性和正态性，并代表了连续复利收益率。这些特性使得对数收益率在金融分析和建模中极具价值。\n\n\
    让我们看一个具体的例子来理解使用对数收益率的计算。\n\n### 使用对数收益率分析股票价格\n\n我们首先下载谷歌 2023 年头几天的股票价格数据，如清单\
    \ 5-1 所示。\n\n```\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot\
    \ as plt\nimport yfinance as yf\nsymbol = 'GOOG'\ndf = yf.download(symbol, start=\"\
    2023-01-01\", end=\"2023-01-08\")\n>>> df\n                开盘价      最高价      最低价\
    \      收盘价    调整收盘价       成交量\n日期\n2023-01-03 89.830002 91.550003 89.019997 89.699997\
    \ 89.699997 20738500\n2023-01-04 91.010002 91.239998 87.800003 88.709999 88.709999\
    \ 27046500\n2023-01-05 88.070000 88.209999 86.559998 86.769997 86.769997 23136100\n\
    2023-01-06 87.360001 88.470001 85.570000 88.160004 88.160004 26612600\n清单 5-1\n\
    下载谷歌股票价格\n```\n\n我们可以使用`pct_change()`方法计算单期百分比收益率，如清单 5-2 所示。\n\n```\n# 单期百分比收益率\n\
    returns = df.Close.pct_change()\n>>> returns\n日期\n2023-01-03 00:00:00-05:00  \
    \       NaN\n2023-01-04 00:00:00-05:00   -0.011037\n2023-01-05 00:00:00-05:00\
    \   -0.021869\n2023-01-06 00:00:00-05:00    0.016019\n名称: 收盘价, 数据类型: float64\n\
    清单 5-2\n计算单期百分比收益率\n```\n\n这里，第一期的收益率是`NaN`，因为没有前期的股票价格可用。\n\n让我们使用原始方法，通过将第一个和最后一个收盘价作为输入（基于之前的定义）来计算期末收益率，如清单\
    \ 5-3 所示。\n\n```\n# 期末收益率\nterminal_return = df.Close[-1]/df.Close[0] - 1\n>>>\
    \ terminal_return\n-0.01716826464354737\n清单 5-3\n使用原始定义方法计算期末收益率\n```\n\n我们也可以基于`.cumprod()`函数，通过复利计算`(1+R)`收益率来得到相同的值，如清单\
    \ 5-4 所示。\n\n```\n# 累计收益率\ncum_returns = (1+returns).cumprod() - 1\n>>> cum_returns\n\
    日期\n2023-01-03 00:00:00-05:00         NaN\n2023-01-04 00:00:00-05:00   -0.011037\n\
    2023-01-05 00:00:00-05:00   -0.032664\n2023-01-06 00:00:00-05:00   -0.017168\n\
    名称: 收盘价, 数据类型: float64\n清单 5-4\n通过对 1+R 格式的收益率进行复利计算，得到相同的累计期末收益率\n```\n\n两个期末收益率的相等运算符计算结果为\
    \ `True`：\n\n```\n# 检查期末收益率是否相等\n>>> cum_returns.values[-1] == terminal_return\n\
    True\n```\n\n现在我们使用对数收益率进行相同计算，首先获得清单 5-5 中的单期对数收益率。\n\n```\n# 对数收益率（1+R 格式）\n\
    log_returns = np.log(1+returns)\n>>> log_returns\n日期\n2023-01-03 00:00:00-05:00\
    \         NaN\n2023-01-04 00:00:00-05:00   -0.011098\n2023-01-05 00:00:00-05:00\
    \   -0.022112\n2023-01-06 00:00:00-05:00    0.015892\n名称: 收盘价, 数据类型: float64\n\
    清单 5-5\n计算对数收益率\n```\n\n我们可以将之前所有时期的对数收益率相加，得到累计对数收益率，然后通过指数运算转换回原始尺度，最后减去 1，将`1+R`格式转换为简单收益率格式，如清单\
    \ 5-6 所示。\n\n```\n# 使用对数收益率计算累计收益率\ncum_return2 = np.exp(log_returns.cumsum())\
    \ - 1\n>>> cum_return2\n日期\n2023-01-03 00:00:00-05:00         NaN\n2023-01-04\
    \ 00:00:00-05:00   -0.011037\n2023-01-05 00:00:00-05:00   -0.032664\n2023-01-06\
    \ 00:00:00-05:00   -0.017168\n名称: 收盘价, 数据类型: float64\n清单 5-6\n使用对数收益率计算累计收益率\n\
    ```\n\n再次，我们验证最后一个条目的值，确认它与之前的期末收益率相同：\n\n```\n# 检查期末收益率是否相等\n>>> cum_return2.values[-1]\
    \ == terminal_return\nTrue\n```\n\n下一节将介绍趋势跟踪策略。\n"
- fmt: '# Introducing Trend Trading


    Trend trading, also known as trend following, is a strategy that attempts to harness
    the momentum of an existing trend in a financial market. It operates on the premise
    that securities tend to move in a relatively sustained direction over time, either
    upward (bullish) or downward (bearish). It is a proactive trading strategy that
    seeks to capitalize on the sustained directional momentum of an asset’s price.


    The fundamental principle behind trend trading is that a market’s momentum, or
    the rate of acceleration of the asset’s price, often continues in one direction
    for a period of time. This is where the two key concepts, trend and momentum,
    come into play. The trend represents the direction in which an asset’s price is
    moving, while momentum indicates the strength or speed of this movement over a
    certain period. It refers to the capacity for the asset’s price trend to sustain
    itself going forward. A strong momentum can continue in an upward or downward
    trend, which can be confirmed by a set of technical indicators.


    Trend traders leverage technical analysis tools to identify potential buying and
    selling opportunities. They carefully analyze price charts and use various technical
    indicators, such as moving averages, `MACD` (Moving Average Convergence Divergence),
    and the Relative Strength Index (`RSI`), among others, to identify and confirm
    an asset’s trend direction and momentum. These technical indicators provide signals
    that help traders to make educated decisions about when to enter and exit trades.


    In an uptrend, a trend trader will enter a long position, meaning they buy the
    asset with the expectation that its price will continue to rise. Conversely, in
    a downtrend, a trend trader will enter a short position, meaning they sell the
    asset (or sell short) with the expectation that its price will continue to fall.
    The trend-following strategy aims to take advantage of these significant movements
    in price and to profit from both rising and falling markets based on the forward-looking
    uptrends with new highs or anticipated downtrends with new lows.


    Let us start with the technical indicators which are used to generate trading
    signals.


    ## Understanding Technical Indicators


    Technical indicators are mathematical calculations based on historical price (high,
    low, open, close, etc.) or volume and can be used to determine entry and exit
    points for trades. They are integral to many trading strategies and systems, providing
    key insights into market behavior. They can be considered as additional features
    derived from the raw asset data, a practice of feature engineering in machine
    learning. This makes technical indicators highly security dependent: what can
    be a good technical indicator for a particular security might not hold the case
    for the other. Selecting the right features makes all the difference.


    Note that these technical indicators appear as additional features for each observation
    in the dataset. This means that more columns are added to the price-volume table
    we worked with earlier, with each column representing a separate technical indicator
    for the specific asset and time.


    When looking at the raw price data, overlaying a set of technical indicators would
    help clarify the market analysis for traders. For example, technical indicators
    help confirm if the market is following a trend or in a range-bound situation,
    oscillating within a price range.


    Technical indicators are integral to many trading strategies and systems, providing
    key insights into market behavior. As you’ve described, they are tools derived
    from mathematical calculations on historical price and volume data, designed to
    predict future price trends or patterns.


    Some of the most commonly used technical indicators include


    *   **Moving averages (MA):** Moving averages smooth out price data by creating
    a constantly updated average price. The two most common types are the simple moving
    average (`SMA`) and the exponential moving average (`EMA`). They can help identify
    whether a security is in an uptrend or downtrend. More on this later.


    *   **Relative Strength Index (RSI):** The `RSI` measures the speed and change
    of price movements, typically on a scale of 0 to 100. A high `RSI` (generally
    above 70) may indicate that the asset is overbought and due for a price correction,
    while a low `RSI` (generally below 30) could suggest that the asset is oversold
    and might rebound.


    *   **Moving Average Convergence Divergence (MACD):** This indicator is a trend-following
    momentum indicator that shows the relationship between two moving averages of
    a security’s price. The `MACD` is calculated by subtracting the 26-day `EMA` from
    the 12-day `EMA`.


    *   **Bollinger Bands:** These bands are plotted two standard deviations away
    from a simple moving average. They help identify whether an asset is overbought
    or oversold and can signal the end of a trend.


    *   **Volume-based indicators:** These include indicators such as the on-balance
    volume (`OBV`), which uses volume flow to predict changes in stock price.


    Each of these indicators provides a unique perspective on potential market movements.
    A combination of these indicators is often used to create a robust trading strategy.


    Also, note that these indicators don’t predict future prices with absolute certainty.
    Instead, they help traders identify potential trading opportunities based on statistical
    probabilities. Each indicator works best under specific market conditions and
    may not be universally applicable across different asset classes, markets, and
    trading horizons.


    The following section provides more introduction to moving averages.'
  raw: '## Introducing Trend Trading


    Trend trading, also known as trend following, is a strategy that attempts to harness
    the momentum of an existing trend in a financial market. It operates on the premise
    that securities tend to move in a relatively sustained direction over time, either
    upward (bullish) or downward (bearish). It is a proactive trading strategy that
    seeks to capitalize on the sustained directional momentum of an asset’s price.


    The fundamental principle behind trend trading is that a market’s momentum, or
    the rate of acceleration of the asset’s price, often continues in one direction
    for a period of time. This is where the two key concepts, trend and momentum,
    come into play. The trend represents the direction in which an asset’s price is
    moving, while momentum indicates the strength or speed of this movement over a
    certain period. It refers to the capacity for the asset’s price trend to sustain
    itself going forward. A strong momentum can continue in an upward or downward
    trend, which can be confirmed by a set of technical indicators.


