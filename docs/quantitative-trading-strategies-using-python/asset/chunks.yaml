  raw: '## Calculating the Max Drawdown


    In this section, we will focus on the process of calculating the max drawdown
    for the early period of 2023 for Google and Microsoft. These two stocks are picked
    due to their recent introduction of large-scale language models: ChatGPT, first
    introduced by Microsoft, and Bard, later by Google. Both led to a relatively big
    shock to the stock prices, resulting in a positive uplift for Microsoft and a
    negative impact for Google.


    Let us first download the stock price data from 2023-01-01 to 2023-02-11 via Listing
    [7-1](#605529_1_En_7_Chapter.xhtml#PC1).


    ```

    import numpy as np

    import pandas as pd

    import yfinance as yf

    import matplotlib.pyplot as plt

    start_date = "2023-01-01"

    end_date = "2023-02-11"

    df = yf.download([''GOOG'', ''MSFT''], start=start_date, end=end_date)

    >>> df.head()

    Listing 7-1

    Downloading the stock price data

    ```


    As shown in Figure [7-3](#605529_1_En_7_Chapter.xhtml#Fig3), the DataFrame has
    a multilayer column structure, where the first level indicates the type of stock
    price and the second layer indicates the stock ticker.


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig3_HTML.jpg)


    A screenshot of a program. It has a table with 13 rows and 5 columns. It presents
    the data of stock prices on five different dates.


    Figure 7-3


    Printing the first five rows of the downloaded stock price data


    We will use the adjusted closing prices in the follow-up analysis:


    ```

    df2 = df[''Adj Close'']

    ```


    Note that the DataFrame is indexed by a list of dates in the `datetime` format,
    as shown in the following:


    ```

    >>> df2.index

    DatetimeIndex([''2023-01-03'', ''2023-01-04'', ''2023-01-05'', ''2023-01-06'',
    ''2023-01-09'', ''2023-01-10'', ''2023-01-11'', ''2023-01-12'', ''2023-01-13'',
    ''2023-01-17'', ''2023-01-18'', ''2023-01-19'', ''2023-01-20'', ''2023-01-23'',
    ''2023-01-24'', ''2023-01-25'', ''2023-01-26'', ''2023-01-27'', ''2023-01-30'',
    ''2023-01-31'', ''2023-02-01'', ''2023-02-02'', ''2023-02-03'', ''2023-02-06'',
    ''2023-02-07'', ''2023-02-08'', ''2023-02-09'', ''2023-02-10''], dtype=''datetime64[ns]'',
    name=''Date'', freq=None)

    ```


    We can use these date indices to subset the DataFrame by the different granularity
    of time periods, such as selecting at the monthly level. As an example, the following
    code snippet slices the data in February 2023:


    ```

    >>> df2.loc["2023-02"]

    GOOG       MSFT

    Date

    2023-02-01 101.430000 252.750000

