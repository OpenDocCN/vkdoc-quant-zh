    Now let us plot these two moving averages together with the original price curve
    via the following code snippet:


    ```

    fig = plt.figure(figsize=(14,7))

    plt.plot(df_goog.index, df_goog[''Adj Close''], linewidth=1.5, label=''Daily Adj
    Close'')

    plt.plot(df_goog.index, df_goog[long_ma], linewidth=2, label=long_ma)

    plt.plot(df_goog.index, df_goog[short_ma], linewidth=2, label=short_ma)

    plt.title("Trend following strategy")

    plt.ylabel(''Price($)'')

    plt.legend()

    ```


    Running the command generates Figure [7-11](#605529_1_En_7_Chapter.xhtml#Fig11).


    ![](images/605529_1_En_7_Chapter/605529_1_En_7_Fig11_HTML.jpg)


    A triple line graph of price versus date presents the trend following strategy.
    It presents the variation of daily average close, `sma30`, and `ema5` with time.
    The curves for daily average close and `ema5` are more fluctuating.


    **Figure 7-11**


    Visualizing the moving averages together with the raw time series


    As Figure [7-11](#605529_1_En_7_Chapter.xhtml#Fig11) suggests, the short moving
    average (green curve) tracks the raw time series more closely, while the long
    moving average (orange curve) displays a smoother pattern due to a stronger averaging
    effect.


    Now let us calculate the log returns of the buy-and-hold strategy, which assumes
    buying one share of Google stock and holding it till the end of the investment
    period. This is shown in Listing [7-8](#605529_1_En_7_Chapter.xhtml#PC29).


    ```

    df_goog[''log_return_buy_n_hold''] = np.log(df_goog[''Adj Close''] / df_goog[''Adj
    Close''].shift(1))

    Listing 7-8

    Calculating the log returns of the buy-and-hold strategy

    ```


    An equivalent way of calculating the log returns is to convert the prices to logarithmic
    form and then take the difference, as shown in Listing [7-9](#605529_1_En_7_Chapter.xhtml#PC30).


    ```

    df_goog[''log_return_buy_n_hold''] = np.log(df_goog[''Adj Close'']).diff()

    Listing 7-9

    An equivalent way of calculating the log returns

    ```


    Next, we identify the trading signals for the trend-following strategy, starting
    by creating a signal column that indicates the intended position based on the
    magnitude of the two moving averages. This is shown in Listing [7-10](#605529_1_En_7_Chapter.xhtml#PC31).


    ```

    # identify buy signal

    df_goog[''signal''] = np.where(df_goog[short_ma] > df_goog[long_ma], 1, 0)

    # identify sell signal

    df_goog[''signal''] = np.where(df_goog[short_ma] < df_goog[long_ma], -1, df_goog[''signal''])

    >>> df_goog.head()

    Adj Close  sma30      ema5        log_return_buy_n_hold  signal

    Date

    2022-02-15 136.425507 137.047450 136.851559  0.008284              -1

    2022-02-16 137.487503 136.816483 137.063541  0.007754               1

    2022-02-17 132.308502 136.638317 135.478525 -0.038397              -1

    2022-02-18 130.467499 136.402200 133.808181 -0.014012              -1

    2022-02-22 129.402496 136.148800 132.339619 -0.008196              -1

    Listing 7-10

    Creating the signal column

    ```


    The periodic log returns for the trend-following strategy can be obtained by multiplying
    `signal` with `log_return_buy_n_hold` via Listing [7-11](#605529_1_En_7_Chapter.xhtml#PC32).


    ```

    df_goog[''log_return_trend_follow''] = df_goog[''signal''] * df_goog[''log_return_buy_n_hold'']

    Listing 7-11

    Calculating the periodic log returns of the buy-and-hold strategy

    ```


    The terminal return can be calculated using the `cumprod()` function or the `prod()`
    function, as shown in Listing [7-12](#605529_1_En_7_Chapter.xhtml#PC33). The first
    approach calculates the compounded periodic return and accesses the last period
    as the final return before converting to the simple return format. The second
    approach directly multiplies all intermediate percentage returns to get the final
    return as the last period, followed by conversion to a simple return.


    ```

    # terminal return of buy-n-hold

    >>> np.exp(df_goog[''log_return_buy_n_hold'']).cumprod()[-1] -1

    -0.34419806832531474

    # another way to calculate

    >>> np.exp(df_goog[''log_return_buy_n_hold'']).prod() - 1

    -0.34419806832531474

    # terminal return of trend following

    >>> np.exp(df_goog[''log_return_trend_follow'']).cumprod()[-1] -1

    0.3609149965748346

    # another way to calculate

    np.exp(df_goog[''log_return_trend_follow'']).prod() - 1

    0.3609149965748346

    Listing 7-12

    Calculating terminal returns of both strategies

    ```


    Although the buy-and-hold strategy is obviously no match for the trend-following
    strategy, we will still calculate the aforementioned backtesting measures, namely,
    annualized return and volatility, Sharpe ratio, and the max drawdown.


    Let us start with the annualized return. As shown in Listing [7-13](#605529_1_En_7_Chapter.xhtml#PC34),
    the annualized return is calculated by obtaining the terminal return in `1 + R`
    format, rescaling it to an annual basis, and finally converting it back to a simple
    return.


    ```

    # calculate annualized return of buy-n-hold

    annualized_return_buy_n_hold = np.exp(df_goog[''log_return_buy_n_hold'']).prod()**(252/df_goog.shape[0])-1

    >>> annualized_return_buy_n_hold

    -0.3818823804560594

    # calculate annualized return of trend following

    annualized_return_trend_follow = np.exp(df_goog[''log_return_trend_follow'']).prod()**(252/df_goog.shape[0])-1

    >>> annualized_return_trend_follow

    0.4210313983829783

    Listing 7-13

    Calculating the annualized return

    ```


    Note that we can also add up all the log returns and exponentiate the sum to get
    the same result:


    ```

    >>> np.exp(df_goog[''log_return_trend_follow''].sum())**(252/df_goog.shape[0])-1

    0.4210313983829783

    ```


    Let us calculate the annualized volatility, as shown in Listing [7-14](#605529_1_En_7_Chapter.xhtml#PC36).
    Recall that the daily volatility scales up as a function of the square root of
    time.'
