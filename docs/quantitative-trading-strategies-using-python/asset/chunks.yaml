    结果显示出了一长串关于微软的信息，这对我们初步分析特定股票很有帮助。请注意，所有这些信息都以字典形式结构化呈现，方便我们访问特定数据。例如，以下代码片段打印了该股票的市值：


    ```

    # access a specific attribute from the dictionary

    >>> msft.info["marketCap"]

    ```


    这种结构化信息（在此语境下也可视为元数据）在我们同时分析多个股票代码时会派上用场。


