    在扩展到多次迭代之前，我们还将测试随机搜索策略，该策略在每一轮为每个移动序列随机选择一个窗口长度。这作为比较的基准，因为手动选择在初始阶段通常等同于随机搜索策略。在代码清单
    9-9 所示的 `update_random_observations()` 函数中，我们传入一个运行中的最佳观测函数值列表，执行一次随机选择，观测相应的函数评估值，将其与当前运行最大值进行比较，然后返回追加当前最大值后的运行最大值列表。


    ```

    def update_random_observations(best_random):

    """通过抽取新的随机点、观测其数值并更新当前最佳候选点到运行列表，来模拟随机策略。"""

    new_x1 = x1_bound[0] + (x1_bound[1] - x1_bound[0]) * torch.rand(size=(1,1), device=device,
    dtype=dtype)

    new_x2 = torch.rand(size=(1,1), device=device, dtype=dtype)

    new_x = torch.cat((new_x1, new_x2), 1)

    new_y = qts(entry_threshold=new_x[0,0].item(), exit_threshold=new_x[0,1].item())

    best_random.append(max(best_random[-1], new_y))

    return best_random

