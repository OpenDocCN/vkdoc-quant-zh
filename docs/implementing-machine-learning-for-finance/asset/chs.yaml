- "# 4. 发现市场状态\n\n本章介绍一种广泛使用的生成式概率模型，称为*隐马尔可夫模型* (HMM)。它涵盖了使用 HMM 识别时间序列数据中隐藏模式并生成观测序列的有效技术。阅读本章后，您将能够设计并开发一个带有高斯过程的隐马尔可夫模型，以发现市场状态。要在\
  \ Python 环境中安装 `hmmlearn`，请使用 `pip install hmmlearn`；在 conda 环境中，请使用 `conda install\
  \ -c conda-forge hmmlearn`。\n\n\n\n## HMM\n\n在前一章中，我们使用增广迪基-富勒检验（一种单位根检验）来检查并判断序列是否平稳。当一个序列的均值不随时间变化时，该序列就是平稳的。在该章中，我们发现该序列并不平稳。在本章中，我们将使用隐马尔可夫模型。该模型既可应用于平稳序列，也可应用于非平稳序列。它是一种生成式、无监督学习模型；它不需要标签，我们将其用于非结构化数据。我们称其为*生成式*模型，是因为它在发现序列数据中的模式后能够生成数据。随着本章内容的深入，你将对\
  \ HMM 有更深入的了解。\n\n### HMM 在金融领域的应用\n\n我们经常将 HMM 用于语音分析、天气预报等领域。在本章中，我们将应用 HMM 来揭示标准普尔\
  \ 500 指数股价中的隐藏模式。我们将利用该模型来检测市场状态（市场中波动率低或高的时期）以及未来的市场状态。\n\n### 开发 GaussianHMM\n\
  \n我们在本章应用高斯混合模型主要有两个原因。首先，我们关注的是给定一个代表两种条件的类别后序列的可能性：一种是市场上涨且预计会合理上涨的条件（称为*看涨*趋势），另一种是市场下跌且预计会继续下跌的条件（称为*看跌*趋势）。其次，我们假设观测值服从已知均值和方差的高斯分布。这被称为*高斯混合*，因为共享的分布被约束为高斯分布。更一般地，我们将基于观测到的类别来一致地预测趋势的未来类别。在训练过程中，模型学习一个单一的高斯状态输出分布。之后，具有最高方差的分布会被分解，并且该过程会一直迭代，直到收敛。代码清单\
  \ 4-1 显示了标准普尔 500 指数的价格数据^(⁶)，该指数是一个股票市场指数，作为在美国证券交易所上市的 500 家全球公司的基准。表 4-1 显示了从\
  \ 2010 年 11 月 1 日到 2020 年 11 月 2 日的价格数据。\n\n表 4-1 数据集\n\n| **日期** | 最高价 | 最低价 |\
  \ 开盘价 | 收盘价 | 成交量 | 调整收盘价 |\n| --- | --- | --- | --- | --- | --- | --- |\n| **2010-11-01**\
  \ | 1195.810059 | 1177.650024 | 1185.709961 | 1184.380005 | 4129180000 | 1184.380005\
  \ |\n| **2010-11-02** | 1195.880005 | 1187.859985 | 1187.859985 | 1193.569946 |\
  \ 3866200000 | 1193.569946 |\n| **2010-11-03** | 1198.300049 | 1183.560059 | 1193.790039\
