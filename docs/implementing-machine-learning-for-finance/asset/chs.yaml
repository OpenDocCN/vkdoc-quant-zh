  ## 指数平滑技术


  指数平滑方法将窗口外的值权重设为零，其中权重较大的值迅速消失，而权重较小的值则逐渐消失。`清单 [2-10]`(#509469_1_En_2_Chapter.xhtml#PC10)
  使用指数平滑技术对时间序列数据进行平滑处理，并将半衰期设为 3。半衰期是一个参数，指定指数权重衰减一半时的滞后阶数。在`清单 [2-10]`(#509469_1_En_2_Chapter.xhtml#PC10)
