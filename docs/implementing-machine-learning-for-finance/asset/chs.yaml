  ### 混淆矩阵


  我们通常使用混淆矩阵来识别两类错误：误报（错误地预测事件发生）和漏报（错误地预测事件未发生）。同时，它也会突出显示真正例（正确预测事件发生）和真负例（正确预测事件未发生）。清单
