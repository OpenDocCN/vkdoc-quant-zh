  \n图 4-1 时间序列\n\n\n\n## 高斯隐马尔可夫模型\n\n高斯隐马尔可夫模型（`GaussianHMM`）假设概率分布的基础结构是正态分布。当处理来自正态分布的连续变量时，我们使用`高斯隐马尔可夫模型`。在前一章中，我们发现时间序列数据在不同时滞之间存在序列相关性。`高斯隐马尔可夫模型`更适合解决当前问题。隐马尔可夫模型是一种用于解析序列问题的无监督学习模型。在无监督学习中，我们不会对模型隐藏任何数据；而是将所有数据暴露给模型。它不需要我们将数据拆分为训练数据和测试数据。既然我们已经识别出时间序列数据的模式，就可以继续并完成模型构建。列表\
