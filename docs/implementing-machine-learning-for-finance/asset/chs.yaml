  \ 0%至-30%之间。在 2019 年，它们间接经历了最大回撤；然而，在随后的年份中，它们迅速挽回了损失。\n\n\n\n### 收益率\n\n判断一项投资是否具有吸引力的最便捷方式就是研究其收益率。收益率反映了期初价格与期末价格的变化。\n\
  \n#### 年化收益率\n\n年化收益率是指一项资产每年产生收益的比率。我们通过研究一段时期内的收益来做出预测。代码清单 9-5 应用 `plot_annual_returns()`\
  \ 方法绘制了亚马逊股票 10 年间的年化收益率（见图 9-2）。\n\n![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig2_HTML.jpg](img/509469_1_En_9_Fig2_HTML.jpg)\n\
