  \ | 表示无风险利率与投资组合收益率之间差异的估计值 |\n| **阿尔法** | 表示投资收益率相对于市场关键指数的估计值 |\n| **贝塔** | 表示与投资相关的波动率的估计值\
  \ |\n\n在下一节中，我们将研究随时间变化的水下最大回撤。\n\n### 回撤\n\n代码清单 9-4 应用`plot_drawdown_underwater()`方法来展示一项投资策略在\
