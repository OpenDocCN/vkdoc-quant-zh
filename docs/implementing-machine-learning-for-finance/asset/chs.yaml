  年化收益率\n```\n\n图 9-2 显示，从 2010 年 11 月 1 日到 2020 年 11 月 2 日，亚马逊股票的年化收益率并不稳定。年化收益率存在波动。在\
  \ 2014 年，该投资组合表现最差。然而，在接下来的一年里，年化收益率超过了 100%。\n\n### 滚动收益率\n\n代码清单 9-6 返回了 10 年间的回测累计收益率（见图\
  \ 9-3）。与年化收益率不同，我们关注的是累计收益率。Pyfolio 通过评估当前收益率与先前收益率（代表投资获得的总收益）相对于股票成本的显著差异，来估算随时间变化的累计收益率。\n\
