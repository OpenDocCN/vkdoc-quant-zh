  ## 加法模型


  除了趋势和季节性，还有其他因素会影响价格变化。例如，在公共假日期间，交易活动与正常交易日不同。ARIMA 和 SARIMA 模型都没有考虑公共假日的影响。加法模型解决了这一挑战。它考虑了日、周、年季节性以及非线性趋势。该模型假设趋势和周期为一个项，并无缝地加入了官方公共假日的影响和一个误差项。该公式用数学方式表示为方程
  2-1。


  ![$$ y=g(t)+s(t)+h(t)+{\varepsilon}_i $$](img/509469_1_En_2_Chapter_TeX_Equ1.png)


  （方程 2-1）


  这里，`g(t)` 表示用于模拟非周期性变化的线性或逻辑增长曲线，`s(t)` 表示周期性变化（日、周、年季节性），`h(t)` 表示节假日的影响，`+ 𝜀𝑖`
  表示考虑异常变化的误差项。


  清单 2-18 对数据进行了重新利用（见表 2-5）。请注意，在清单 2-2 中，我们删除了低价、高价、开盘价和收盘价这些列。我们关注的是对调整收盘价的预测。


