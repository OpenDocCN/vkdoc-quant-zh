  ## 多层感知机


  第 5 章涵盖了深度学习及其在金融领域的应用。随后，我们阐述了人工神经网络的基本结构，并揭示了如何利用循环神经网络（RNN）应对序列问题。我们开发并评估了长短期记忆（LSTM）模型来预测未来股票价格。在本章中，我们将使用多层感知机（MLP）分类器来估计市场上行或下行的概率。它由三层组成：接收输入值的输入层、转换数值的隐藏层以及触发输出值的输出层。MLP
  模型接收一组输入值，对其进行转换，并在输出层触发输出值。它本质上是多个受限玻尔兹曼机（一种保持可见层和隐藏层的神经网络）的组合。该模型通过反向传播解决了梯度消失问题，反向传播涉及从右到左估计梯度（与从左到右估计梯度的前向传播相反）。


  ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig3_HTML.png](img/509469_1_En_8_Fig3_HTML.png)


  图 8-3


  多层感知机


  图 8-3 展示了一个在可见层有三个节点、隐藏层有四个节点、输出层只有一个可能结果的 MLP。代码清单 8-12 导入了 Keras 库。


  ```

  from keras import Sequential, regularizers

  from keras.layers import Dense, Dropout

  from keras.wrappers.scikit_learn import KerasClassifier

  代码清单 8-12

