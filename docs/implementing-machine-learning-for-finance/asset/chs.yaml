  ## 结论


  在投资一只股票或一组股票时，理解、量化并降低投资组合中的潜在风险非常重要。本章讨论了 VAR；随后展示了计算投资组合 VAR 的方法，接着通过应用蒙特卡洛模拟来模拟股票市场的变化。模拟技术有许多应用；我们也可以将其用于资产价格结构等。下一章将进一步深入探讨投资组合和风险分析。




