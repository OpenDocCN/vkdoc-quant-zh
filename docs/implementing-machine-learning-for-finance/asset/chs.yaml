  ## ARIMA 模型


  在下一节中，我们将使用 ARIMA 对序列进行建模并预测其未来实例。ARIMA 是迄今为止最广泛使用的单变量时间序列分析模型。我们来分解一下：


  *   *自回归 (AR)*：先前误差的线性组合。AR 考虑先前观测值的项，包括随机白噪声和先前的随机白噪声。

  *   *差分 (I)*：通过差分（估计一段时间内行值的变化）使序列平稳的变换。

  *   *移动平均 (MA)*：先前加权均值的线性组合（参考前面介绍的移动平均平滑技术）。


  与最小二乘模型类似，ARIMA 对数据的结构做出了强有力的假设。该模型假设序列数据的结构是线性的且是正态的。我们可以将 ARIMA 模型视为一种复杂的回归方法，因为我们是将回归应用于
  `lag1`、`lag2` 直到 `lag = k`。该模型假设序列是平稳的。如果序列非平稳，则该序列必须随时间呈现趋势。此外，还可以执行数据变换以提高模型的预测能力。


  ### ARIMA 超参数优化


  `清单 [2-11]`(#509469_1_En_2_Chapter.xhtml#PC11) 寻找最佳超参数（其配置会改变模型行为的值）。传统上，我们使用自相关函数（ACF）和偏自相关函数（PACF）来寻找最优超参数，这具有主观性。`清单
  [2-12]`(#509469_1_En_2_Chapter.xhtml#PC12) 使用 `itertools` 包，根据赤池信息量准则（AIC）来寻找最佳超参数，该准则衡量样本外预测误差。`itertools`
  已预装在 Python 环境中。


  ```

