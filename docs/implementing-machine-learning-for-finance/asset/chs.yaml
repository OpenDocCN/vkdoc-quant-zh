- '# 6. 使用线性回归进行未来价格预测


  本章介绍参数化方法，也称为*线性回归法*。我们使用这种方法来确定自变量（连续或分类变量）与因变量（始终为连续变量）之间关系的性质。自变量可以是连续变量或分类变量，而因变量则必然是连续变量。该方法研究自变量的变化如何影响因变量的变化。用于估计截距和斜率的最传统模型是最小二乘模型。公式如公式
  6-1 所示。


  ![$$ \hat{y}={\beta}_0+{\beta}_1{X}_1+{\varepsilon}_i $$](img/509469_1_En_6_Chapter_TeX_Equ1.png)


  （公式 6-1）


  其中，![$$ \hat{y} $$](img/509469_1_En_6_Chapter_TeX_IEq1.png) 代表预期的因变量，*β*[0] 代表截距，*β*[1]
  代表斜率，*X*[1] 代表自变量，*ε*[*i*] 代表误差项（即第 i 个（共 *n* 个）数据点的残差），如公式 6-2 所示。


  ![$$ {e}_i={y}_i-\hat{y_i} $$](img/509469_1_En_6_Chapter_TeX_Equ2.png)


  （公式 6-2）


  最小二乘模型确保残差的平方和较小。我们通过应用公式 6-3 中的性质来求残差的平方和。


  ![$$ {e}_1²+{e}_2²\dots {e}_i² $$](img/509469_1_En_6_Chapter_TeX_Equ3.png)


  （公式 6-3）


  该性质假设残差始终等于零，且估计值是无偏的。


