  import itertools

  p = d = q = range(0, 2)

  pdq = list(itertools.product(p, d, q))

  for param in pdq:

  mod = ARIMA(train, order=param)

  results = mod.fit()

  print(''ARIMA{} AIC:{}''.format(param, results.aic))

