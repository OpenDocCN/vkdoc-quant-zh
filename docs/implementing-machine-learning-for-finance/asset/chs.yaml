  ## 时间序列实战


  时间序列分析适用于估算随时间变化的连续变量。在本章中，我们将使用它来识别序列数据的结构。这是一种用于识别货币对走势模式并预测其未来价格的无缝方法。市场数据通常是序列化的，并包含一些随机元素，这意味着存在一个潜在的随机过程。我们分析全球交易量最大的货币对之一——美元（`$`）和日元（`¥`），即（`USD/JPY`）货币对的历史数据。我们致力于揭示该货币对经过调整后的收盘价随时间的模式，然后对价格变动做出可靠的预测。要创建时间序列模型，首先启动
  Jupyter Notebook 并创建一个新笔记本。


