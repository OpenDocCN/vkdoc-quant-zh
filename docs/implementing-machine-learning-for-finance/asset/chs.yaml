- "# 使用循环神经网络进行单变量时间序列分析\n\n本章涵盖了深度学习的基础知识。首先，介绍了激活函数、损失函数和人工神经网络优化器。其次，讨论了序列数据问题以及循环神经网络（RNN）如何解决该问题。第三，本章介绍了设计、开发和测试最流行的\
  \ RNN——长短期记忆（LSTM）模型的方法。我们使用 Keras 框架进行快速原型设计和构建神经网络。要在 conda 环境中安装`keras`，请使用`conda\
  \ install -c conda-forge keras`。确保您也安装了`tensorflow`。要在 conda 环境中安装`tensorflow`，请使用`conda\
  \ install -c conda-forge tensorflow`。\n\n## 什么是深度学习？\n\n*深度学习*是机器学习的一个子集，它操作神经网络。神经网络是由相互连接的节点组构成的网络，这些节点组逐层接收、转换和传输输入值，直到它们到达输出层。激活函数通过在每个隐藏层中操作一组变量来启用此过程。\n\
  \n## 激活函数\n\n激活函数向人工神经网络添加非线性，并启用反向传播（一次逆向的完整传递）。主要有三种激活函数。\n\n*Sigmoid 激活函数*：将\
  \ S 形曲线拟合到数据，并触发介于 0 和 1 之间的输出值。\n\n*双曲正切（tanh）激活函数*：将 tanh 曲线拟合到数据，并触发介于-1 和 1\
  \ 之间的输出。\n\n*修正线性单元（ReLu）激活函数*：获取不受特定范围约束的值，并解决梯度消失问题（一种情况，当我们在模型中添加更多训练数据时梯度增大，导致训练缓慢）。\n\
  \n## 损失函数\n\n损失函数评估实际值与人工神经网络预测值之间的差异。主要的损失函数包括均方误差（MSE）、平均绝对误差和均方对数误差。在本章中，我们使用\
  \ MSE（在考虑回归关系后，模型关于数据所解释的变异性）。\n\n## 优化人工神经网络\n\n有几种模型优化的方法。最常见的优化器是自适应矩估计（Adam），它在训练期间能更好地最小化代价函数。\n\
  \n\n\n### 序列数据问题\n\n序列数据包含具有某种依赖关系的有序数据点。时间序列是序列数据的一个绝佳示例。在时间序列数据中，每个数据点代表某个特定时间点的观测值。像前馈网络这样的传统神经网络在建模序列数据时会遇到挑战，因为它们无法记住之前的输出值。这意味着前馈网络仅仅产生输出值，而不会考虑数据中的任何依赖关系（循环网络解决了这个问题）。\n\
  \n### RNN 模型\n\n循环神经网络模型适用于序列建模。我们称其为*循环*，是因为该模型对序列中的每个数据点执行重复任务，其中输出值依赖于先前的值。循环网络在时间步`[t-1]`的决策结果会影响上一个时间步`[t]`的决策结果。它维护一个状态来引用给定点的历史分析。该状态管理先前估计中存储的信息，并使用独特的输入值递归回网络。图`[3-1]`展示了一个具有单隐藏层的循环网络。\n\
  \n![../images/509469_1_En_3_Chapter/509469_1_En_3_Fig1_HTML.png](img/509469_1_En_3_Fig1_HTML.png)\n\
  \n图 3-1\n\nRNN 模型\n\n该公式如公式`[3-1]`所示。\n\n![$$ {h}_{new}=\\mathit{\\tanh}\\left({W}_h\\\
  times {h}_{prv}\\times {W}_x\\times x\\right) $$](img/509469_1_En_3_Chapter_TeX_Equ1.png)\n\
  \n(公式 3-1)\n\n此处，`W[x]`表示输入与隐藏单元之间的权重矩阵，`W[y]`表示……，`W[h]`表示乘以先前状态后的权重，`x`表示隐藏层接收的输入数据，`h[prv]`表示隐藏层接收的先前状态，`h[new]`表示隐藏层估计的新状态。我们将\
  \ RNN 模型应用于语音识别、图像描述和情感分析。尽管该模型解决了大多数模型难以处理的问题，但它自身也存在缺陷。\n\n### 循环神经网络问题\n\n完整的\
  \ RNN 模型必须合理地维护一个单元状态。在处理大规模数据时，该网络的计算成本会变得很高；它对参数的变化也很敏感。此外，它容易受到梯度消失问题和梯度爆炸问题的影响。这个问题在传统模型中普遍存在：在训练过程的初始阶段，模型具有较小的梯度，但随着我们增加训练数据，梯度会增大，从而导致训练过程变慢（这种现象被称为梯度消失问题）。LSTM\
  \ 模型解决了梯度消失问题。\n\n### LSTM 模型\n\nLSTM 模型能够对长序列数据进行建模。它在多个时间戳上保持强梯度。LSTM 有两个关键部分，即保持信息不变地流动的单元状态，以及控制伴随流动的信息的门。见图`[3-2]`。\n\
  \n![../images/509469_1_En_3_Chapter/509469_1_En_3_Fig2_HTML.jpg](img/509469_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\nLSTM\n\n## 门\n\nLSTM 模型包含三个门，即输入门、遗忘门和输出门。输入门决定要写入记忆单元的新信息。输入门包含两层。我们将第一层识别为\
  \ sigmoid 层。它决定需要更新的值。第二层被认为是`tanh`层；它生成一个包含新候选值的向量，以添加到状态中。遗忘门决定模型必须遗忘和删除哪些已不再有用的历史信息。最后，输出门控制对记忆单元的读取权限。这是通过使用压缩函数的估计值来实现的，该函数表示为`(0,1)`，其中`0`表示拒绝读取权限，`1`表示授予读取权限。前面的门是\
  \ LSTM 的操作，它们对网络输入的线性组合、先前的隐藏状态以及先前的输出执行一个函数。LSTM 模型使用门来确定应该记住或遗忘哪些数据。\n\n## 展开的\
  \ LSTM 网络\n\n在第一个时间戳，输入门接收并将第一个数据点传递给网络。之后，LSTM 使用随机初始化的隐藏状态产生一个新的隐藏状态，并将其输出值传输到下一个时间戳。这个过程持续到最后一个时间戳。该单元包含跨时间的先前隐藏状态和时间戳输出。\n\
  \n## 堆叠的 LSTM 网络\n\n我们将具有多个隐藏层的 LSTM 网络识别为堆叠的 LSTM 网络。在堆叠的 LSTM 网络中，它将前一个隐藏层的输出作为后一个层的输入。这个过程持续到最后一层。这允许更大的模型复杂度。例如，与前面的层相比，后面的层是输出的更复杂的未来表示。因此，堆叠\
  \ LSTM 网络可能会导致最优的模型性能。在训练中，LSTM 执行以下操作：\n\n*   决定将哪些数据作为输入添加，包括权重\n*   基于当前和先前的内部状态估计新状态\n\
