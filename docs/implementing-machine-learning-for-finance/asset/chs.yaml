  ## 结论


  本章介绍了二分类问题，涵盖了一种设计、开发和测试机器学习模型的方法，即`逻辑回归`，并介绍了一种用于解决二分类问题的神经网络模型——`MLP 模型`。同时展示了用于评估分类模型性能的指标。在仔细审查模型性能后，我们发现自变量是预测市场上涨和下跌概率的良好指标。


