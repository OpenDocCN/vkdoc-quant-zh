- '# 8. 使用机器学习和深度学习进行市场趋势分类


  到目前为止，我们已逐步介绍了参数方法。我们解决的所有问题都涉及一个连续变量。我们还可以利用*非参数方法*来预测市场可能的走向。本章将介绍非参数（或非线性）方法，也称为*分类方法*。这种流行的方法作用于自变量，并生成一个有界的值。它适用于处理分类因变量（受特定范围限制的因变量）。分类方法主要有两种类型：二元分类法，用于因变量有两种结果的情况；以及多类分类法，用于因变量是一个具有超过两种结果的分类变量。在本章中，我们将同时使用
  `SciKit-Learn` 和 `Keras`。`SciKit-Learn` 库已预装在 Python 环境中。要在 Python 环境中安装 `Keras`，我们使用
  `pip install Keras`；在 conda 环境中，则使用 `conda install -c conda-forge keras`。


