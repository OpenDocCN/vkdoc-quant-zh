  \ 模型展现出良好模型的特性。\n\n## 结论\n\n本章介绍了深度学习。它涵盖了我们用于时间序列数据的人工神经网络模型，即 LSTM 模型。本章还展示了如何创建建模变量，并说明了神经网络的结构。随后，介绍了建模和测试网络的技术。\n\
