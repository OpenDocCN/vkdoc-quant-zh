  ## 逻辑回归


  尽管术语*逻辑回归*包含*回归*这个词，但它不是一个回归模型，而是一个分类模型。线性回归模型估计一个连续变量。而逻辑回归模型估计一个分类因变量。回归模型假设数据是线性的且来自正态分布，但逻辑分类器则不受这些假设的约束。在逻辑回归中，我们拟合一条
  S 形曲线（或逻辑曲线、Sigmoid 曲线）到数据上。我们使用逻辑分类器来预测市场走势。股票价格在特定时期内会发生显著变化。如果市场在某个时期内应该飙升，那么就是上涨市场或牛市。相反，如果市场价格在特定时期内持续下跌，那么就是下跌市场或熊市。


  ### 开发逻辑分类器


  清单 8-6 完成了逻辑分类器的最终确定。


  ```

