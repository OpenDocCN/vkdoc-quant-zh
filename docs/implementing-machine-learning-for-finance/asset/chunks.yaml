- fmt: '# Conclusions


    This chapter introduced binary classification. It covered a way of designing,
    developing, and testing a machine learning model known as `logistic regression`,
    and it covered a neural network model known as the `MLP model` to solve a binary
    classification. It also showed metrics for classification model performance evaluation.
    After carefully reviewing the model’s performance, we found that the independent
    variables are good predictors of the probability for an upward market and downward
    market.


    Footnotes [1](#509469_1_En_8_Chapter.xhtml#Fn1_source)


    # 9. Investment Portfolio and Risk Analysis


    This chapter properly concludes the book by covering a comprehensive framework
    for investment portfolio and risk analysis. Thus far, we have developed several
    machine learning models and deep learning models for robust investment management
    decision-making. Throughout the book, we alluded to investing in markets involving
    risk. In this chapter, we present the primitives of investment risk and performance
    analysis using the `Pyfolio` package. To install `Pyfolio` in the Python environment,
    we use `pip install pyfolio`, and in the conda environment, we use `conda install
    -c conda-forge pyfolio`. Before you install `pyfolio`, first install `theano`.
    To install `theano` in the conda environment, we use `conda install -c conda-forge
    theano`.


    An investor typically invests in an asset expecting future financial returns.
    For instance, a company acquires plants and machinery to transform raw materials
    into products that can be sold to attain financial returns. There are ample asset
    classes that an investor can invest in. Common asset classes include stocks, bonds,
    equities, commodities, hedge funds, real estate, and retail investment trusts,
    among others. Each asset class has its own underlying characteristics and considerable
    value expressed in monetary terms. The value of an asset varies over time because
    of many factors. An investor must constantly monitor and improve an investment
    portfolio’s performance.


    ## Investment Risk Analysis


    A clear understanding of the risks associated with an asset enables effective
    planning for unfavorable market conditions that may occur. By default, investors
    get exposed to risk when they take a position in the market, irrespective of the
    side of the position they take. When the market moves against an investor’s position,
    they suffer losses. Managing losses is key to stable and viable investment strategies.
    Table [9-1](#509469_1_En_9_Chapter.xhtml#Tab1) describes basic investment performance
    metrics.


    **Table 9-1** Basic Investment Performance Metrics


    | Metric | Description |

    | --- | --- |

    | Value at risk | Representing the minimum capital required to compensate for
    losses at a specified probability level |

    | Drawback | Representing the rate at which an asset suffers losses |

    | Volatility | Representing the extent at which an asset’s price deviates away
    from the true mean value |


    ## Pyfolio in Action


    This chapter convincingly demonstrates the `Pyfolio` package, a powerful package
    for investment risk and performance analysis. We can use this package with other
    complementary packages like `Zipline` and `Quantopian` to backtest an investment
    strategy. Backtesting represents considering how well an investment system manages
    risk and makes returns. We base it on the notion that past performance impacts
    future performance. In this chapter, we use the `Pyfolio` package as a stand-alone
    package. Before using it, we first extract the data. Listing [9-1](#509469_1_En_9_Chapter.xhtml#PC1)
    scrapes market data from Yahoo Finance by applying the `get_data_yahoo()` method.
    In this chapter, the Amazon^([⁸](#fn8)) performance is benchmarked alongside the
    Standard & Poor (S&P) 500 index.^([⁹](#fn9)) Amazon is a US-based computer company
    giant whose stock is exchanged as an S&P 500 component. The S&P 500 is a stock
    index for gauging the performance of 500 companies listed in the United States.


    ```python

    from pandas_datareader import data

    import pyfolio as pf

    ticker = ''AMZN''

    start_day = ''2010-10-01''

    end_day = ''2020-10-01''

    amzn = data.get_data_yahoo(ticker, start_day, end_day)

    spy = data.get_data_yahoo(''SPY'', start_day, end_day)

    ```

    **Listing 9-1** Scraped Data


    After web scraping, we perform necessary feature engineering tasks (see Listing
    [9-2](#509469_1_En_9_Chapter.xhtml#PC2)).


    ```python

    amzn = amzn["Adj Close"].pct_change()[1:]

    spy = spy["Adj Close"].pct_change()[1:]

    ```

    **Listing 9-2** Estimate the Returns


    After estimating the daily returns, we use varying matrices to test the performance
    of the Amazon stock.


