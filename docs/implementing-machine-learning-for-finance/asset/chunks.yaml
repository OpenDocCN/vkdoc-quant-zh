- fmt: '# The Sequential Data Problem


    Sequential data encompasses order data points with some dependency. The time series
    is an excellent example of sequential data. In time-series data, each data point
    represents an observation at a certain period. Traditional neural networks like
    the feed-forward network encounter challenges when modeling sequential data because
    they cannot remember the preceding output values. This means that feed-forward
    networks merely produce output values without considering any dependencies in
    the data (a recurrent net combats this problem).


    # The RNN Model


    A recurrent neural network model is applicable in sequential modeling. We call
    it *recurrent* because the model performs repetitive tasks for each data point
    in a series, whereby the output value depends on the preceding values. The decision
    outcomes of the recurrent network at time step `[t-1]` influence the decision
    outcomes at the last time step `[t]`. It maintains a state to reference historical
    analysis at a given point. The state manages the information stored in preceding
    estimates and recurs back into a network with unique input values. Figure `[3-1]`
    depicts a recurrent with a single hidden layer.


    ![../images/509469_1_En_3_Chapter/509469_1_En_3_Fig1_HTML.png](images/509469_1_En_3_Chapter/509469_1_En_3_Fig1_HTML.png)


    Figure 3-1


    RNN model


    The formula is expressed as shown in Equation `[3-1]`.


    ![$$ {h}_{new}=\mathit{\tanh}\left({W}_h\times {h}_{prv}\times {W}_x\times x\right)
    $$](images/509469_1_En_3_Chapter/509469_1_En_3_Chapter_TeX_Equ1.png)


    (Equation 3-1)


    Here, `W[x]` represents the weight matrix between the input and the hidden unit,
    `W[y]` represents …, `W[h]` represents weights multiplied by preceding states,
    `x` represents input data that the hidden layer receives, `h[prv]` represents
    the preceding state the hidden layer receives, and `h[new]` represents the new
    state that the hidden layer estimates. We apply the RNN model to speech recognition,
    image captioning, and sentiment analysis. Although the model combats problems
    that most models find difficult, it has its own drawbacks.


    # The Recurrent Neural Network Problem


    The full RNN model must reasonably maintain a cell state. When dealing with big
    data, the network becomes computationally expensive; it is sensitive to alterations
    in parameters. Furthermore, it is prone to the vanishing gradient problem and
    the exploding gradient problem. This problem commonly occurs with traditional
    models, whereby at the initial phase of the training process, the model has a
    small gradient, but as we increase the training data, the gradient increases,
    resulting in a slower training process (this phenomenon is recognized as the vanishing
    gradient problem). The LSTM model combats the vanishing gradient problem.


    # The LSTM Model


    The LSTM model can model long sequential data. It holds a strong gradient across
    several timestamps. There are two keys to the LSTM, namely, the cell state that
    moves information along without changes, and gates that control the information
    that flows alongside. See Figure `[3-2]`.


    ![../images/509469_1_En_3_Chapter/509469_1_En_3_Fig2_HTML.jpg](images/509469_1_En_3_Chapter/509469_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    LSTM


    ## Gates


    The LSTM model encompasses three gates, namely, the input gate, the forget gate,
    and the output gate. The input gate determines additional information to be written
    in a memory cell. An input gate encompasses two layers. We recognize the first
    layer as the sigmoid layer. It determines the values that must be updated. The
    second layer is considered the `tanh` layer; it develops a vector of new values
    to include in a state. The forget gate determines the extent to which the model
    must forget and delete historical information no longer useful. Last, the output
    controls reading access from the memory cells. This is done by using estimates
    of the compressed function that is represented as `(0,1)`, where `0` shows that
    the read access is denied and `1` indicates we grant read access. The previous
    gates are the operations of the LSTM that perform a function on a linear combination
    of inputs of the network, previously hidden state, and preceding output. The LSTM
    model uses gates to determine which data it should remember or forget.


    ## Unfolded LSTM Network


    In the first timestamp, the input gate receives and passes the first data point
    to the network. Thereafter, the LSTM uses random initialized hidden states to
    produce a new hidden state and transmits its output value to the subsequent timestamp.
    This continues until the last timestamp. The unit contains the previously hidden
    state and timestamp outputs across time.


    ## Stacked LSTM Network


    We recognize an LSTM network with more than one hidden layer as a stacked LSTM
    network. In a stacked LSTM network, it uses the output of a preceding hidden layer
    as the input of the subsequent layer. This process continues until the last layer.
    This allows for greater model complexity. For instance, subsequent layers are
    a more complex future representation of output compared to the preceding layers.
    Consequently, stacking an LSTM network may cause optimal model performance. In
    training, an LSTM does the following:


    *   Determines which data to add as inputs, including weights

    *   Estimates the new state based on the present and preceding internal state

    *   Learns corresponding weights and biases

    *   Determines how the state must be transmitted as output'
