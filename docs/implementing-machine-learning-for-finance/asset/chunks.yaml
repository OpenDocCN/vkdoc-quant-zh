    # 两两散点图


    检验正态性通常需要两两散点图。当独立观测值接近均值时，我们认为数据服从正态分布。回归模型假设数据服从正态分布：非正态数据会导致模型性能下降。如果数据不服从正态分布，我们可以进行数据变换，例如，对正偏态数据（数据集中在分布右侧的情况）进行平方根变换，或对负偏态数据（数据集中在分布左侧的情况）进行指数/幂变换。可能影响非正态性的因素有多种，例如缺失值和异常值（极端值的存在）等。详见代码清单
    6-5。


    ```

    sns.jointplot(x="HL_PCT",y="Adj Close",data=df,kind="reg",color="navy")

