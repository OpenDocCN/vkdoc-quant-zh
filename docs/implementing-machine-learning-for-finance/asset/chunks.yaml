    # 结论


    本章介绍了二分类问题，涵盖了一种设计、开发和测试机器学习模型的方法，即`逻辑回归`，并介绍了一种用于解决二分类问题的神经网络模型——`MLP 模型`。同时展示了用于评估分类模型性能的指标。在仔细审查模型性能后，我们发现自变量是预测市场上涨和下跌概率的良好指标。


    脚注 1


    # 9. 投资组合与风险分析


    本章通过涵盖投资组合与风险分析的完整框架来恰当地总结全书。至此，我们已经开发了多个用于稳健投资管理决策的机器学习模型和深度学习模型。贯穿全书，我们一直在提及投资涉及风险的市场。在本章中，我们将使用`Pyfolio`包介绍投资风险与绩效分析的基本概念。要在
    Python 环境中安装`Pyfolio`，我们使用`pip install pyfolio`；在 conda 环境中，我们使用`conda install
    -c conda-forge pyfolio`。在安装`pyfolio`之前，请先安装`theano`。要在 conda 环境中安装`theano`，我们使用`conda
    install -c conda-forge theano`。


    投资者通常投资某项资产，期望获得未来的财务回报。例如，一家公司购置工厂和机器设备，将原材料转化为可销售的产品，从而获得财务回报。投资者可投资的资产类别非常丰富。常见的资产类别包括股票、债券、权益、大宗商品、对冲基金、房地产和零售投资信托等。每种资产类别都有其自身的底层特征和以货币计量的可观价值。由于多种因素，资产的价值会随时间而变化。投资者必须持续监控并优化投资组合的表现。


    ## 投资风险分析


    清晰理解与资产相关的风险，能够有效规划可能发生的不利市场状况。默认情况下，投资者只要在市场中建立头寸，无论其头寸方向如何，都会面临风险。当市场朝着不利于投资者头寸的方向变动时，他们就会遭受损失。管理损失是制定稳定且可行投资策略的关键。表
    9-1 描述了基本的投资绩效指标。


    **表 9-1** 基本投资绩效指标


    | 指标 | 描述 |

    | --- | --- |

    | 风险价值 | 表示在特定概率水平下弥补损失所需的最低资本 |

    | 回撤 | 表示资产遭受损失的速率 |

    | 波动率 | 表示资产价格偏离真实均值的程度 |


    ## Pyfolio 实战


    本章令人信服地展示了`Pyfolio`包，这是一个用于投资风险与绩效分析的强大工具。我们可以将此包与`Zipline`和`Quantopian`等其他互补包一起使用来回测投资策略。回测是指评估一个投资系统管理风险并创造回报的能力。它基于“过去的表现会影响未来的表现”这一理念。在本章中，我们将`Pyfolio`包作为一个独立包来使用。在使用之前，我们首先提取数据。代码清单
    9-1 通过应用`get_data_yahoo()`方法从雅虎财经抓取市场数据。在本章中，亚马逊^(⁸) 的表现与标准普尔 500 指数^(⁹) 进行对标。亚马逊是一家总部位于美国的计算机巨擘，其股票作为标普
    500 成分股进行交易。标普 500 指数是衡量美国 500 家上市公司业绩的股票指数。


    ```python

    from pandas_datareader import data

    import pyfolio as pf

    ticker = ''AMZN''

    start_day = ''2010-10-01''

    end_day = ''2020-10-01''

    amzn = data.get_data_yahoo(ticker, start_day, end_day)

    spy = data.get_data_yahoo(''SPY'', start_day, end_day)

    ```

    **代码清单 9-1** 抓取的数据


    网络抓取后，我们执行必要的特征工程任务（参见代码清单 9-2）。


    ```python

    amzn = amzn["Adj Close"].pct_change()[1:]

    spy = spy["Adj Close"].pct_change()[1:]

    ```

    **代码清单 9-2** 估算收益率


    估算出每日收益率后，我们使用各种矩阵来测试亚马逊股票的表现。


    ### 绩效统计


    `pyfolio`包使我们能够通过少量简单代码全面检验投资策略的基本表现。代码清单 9-3 列出了从 2010 年 11 月 1 日到 2020 年 11
    月 2 日亚马逊股票的表现（参见表 9-2）。


    **表 9-2** 绩效结果


    | **起始日期** | 2010-10-04 |

    | **结束日期** | 2020-10-01 |

    | **总月数** | 119 |

    | **回测** | |

    | **年化收益率** | 35.6% |

    | **累计收益率** | 1995.7% |

    | **年化波动率** | 31.6% |

    | **夏普比率** | 1.12 |

    | **卡玛比率** | 1.04 |

    | **稳定性** | 0.97 |

    | **最大回撤** | -34.1% |

    | **欧米伽比率** | 1.23 |

    | **索提诺比率** | 1.71 |

    | **偏度** | 0.42 |

    | **峰度** | 7.53 |

    | **尾端比率** | 1.07 |

    | **每日风险价值** | -3.8% |

    | **阿尔法** | 0.23 |

    | **贝塔** | 1.02 |


