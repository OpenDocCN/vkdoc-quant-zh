    The exponential smoothing method weighs values outside the window to zero, where
    enormous weighted values rapidly die out and minor weighted values gradually vanish.
    `Listing [2-10]`(#509469_1_En_2_Chapter.xhtml#PC10) smooths the time-series data
    using the exponential smoothing technique and sets the half-life to 3. Half-life
