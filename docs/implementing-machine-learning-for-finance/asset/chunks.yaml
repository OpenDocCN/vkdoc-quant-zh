- fmt: '### Develop the Least Squares Model


    Listing [6-13](#509469_1_En_6_Chapter.xhtml#PC13) splits the data into training
    and test data applying the 80/20 split ratio.


    ```

    from sklearn.model_selection import train_test_split

    x_train, x_test, y_train, y_test = train_test_split(x,y,test_size=0.2, random_state=0)

    Listing 6-13

    Split Data into Training and Test Data

    ```


    Listing [6-14](#509469_1_En_6_Chapter.xhtml#PC14) normalizes the training data
    using the `StandardScaler()` method (transforms data in such a way that the mean
    value is 0 and the standard deviation is 1).


    ```

    from sklearn.model_selection import StandardScaler

    scaler = StandardScaler()

    x_train = scaler.fit_transform(x_train)

    x_test = scaler.transform(x_test)

    Listing 6-14

    Normalize Data

    ```


    Listing [6-15](#509469_1_En_6_Chapter.xhtml#PC15) fits the least squares model
    with default hyperparameters.


    ```

    from sklearn.linear_model import LinearRegression

    lm = LinearRegression()

    lm.fit(x_train,y_train)

    Listing 6-15

    Develop the Least Squares Model

    ```


    Listing [6-16](#509469_1_En_6_Chapter.xhtml#PC16) defines a function to find the
    mean value and standard deviation of the cross-validation score by applying the
    R² as a criterion for finding the cross-validation scores.


    ```

    from sklearn.model_selection import cross_val_score

    def get_val_score(model):

    scores = cross_val_score(model, x_train, y_train, scoring="r2")

    print("CV mean: ", np.mean(scores))

    print("CV std: ", np.std(scores))

    print("\n")

    Listing 6-16

    Develop a Function to Obtain Cross-Validation Mean and Standard Deviation

    ```


    Listing [6-17](#509469_1_En_6_Chapter.xhtml#PC17) prints the mean value and standard
    deviation value of the cross-validation scores.


    ```

    get_val_score(lm)

    CV mean:  0.9473235769188586

    CV std:  0.018455084710127526

    Listing 6-17

    Cross-Validation Mean and Standard Deviation

    ```


    Listing [6-18](#509469_1_En_6_Chapter.xhtml#PC18) finds the names and default
    values of a parameter.


    ```

    lm.get_params()

    Listing 6-18

    Find Default Parameters

    ```


    Listing [6-19](#509469_1_En_6_Chapter.xhtml#PC19) creates a grid model. A hyperparameter
    represents settings or values that we must configure for a model prior to training.
    We perform hyperparameter optimization to identity values that produce optimal
    model performance. The `GridSearchCV` method considers all parameters and discovers
    the most suitable combination. For example, in Listing [6-19](#509469_1_En_6_Chapter.xhtml#PC19)
    we want to find whether we must fit the intercept, normalize X prior to fitting
    the model, and copy X.


