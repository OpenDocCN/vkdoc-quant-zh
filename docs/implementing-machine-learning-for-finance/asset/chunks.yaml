    ## The SARIMA Model


    Although the ARIMA model is a powerful model for analyzing patterns in univariate
    time-series data, it commits errors when handling seasonal data. Adding seasonal
    order to the model enhances its performance. SARIMA extends the ARIMA model. It
    considers the seasonal component when modeling time-series data.


    ### SARIMA Hyperparameter Optimization


    Listing [2-15](#509469_1_En_2_Chapter.xhtml#PC15) uses the `itertools` package
    to find the best hyperparameters using AIC (refer to Listing [2-12](#509469_1_En_2_Chapter.xhtml#PC12)).
    The `SciPy` package comes pre-install in a Python environment.


    ```

    import scipy.stats as stats

    p = d = q = range(0,2)

    pdq = list(itertools.product(p,d,q))

    seasonal_pdq = [(x[0],x[1],x[2],12) for x in list(itertools.product(p,d,q))]

    for param in pdq:

    for param_seasonal in seasonal_pdq:

    try:

    model = sm.tsa.statespace.SARIMAX(train,

    order=param,

    seasonal_order=param_seasonal,

    enforce_stationarity=False,

    enforce_intervibility=False)

    results = model.fit()

    print("SARIMAX {} x {} 12 - AIC: {}".format(param,param_seasonal,results.aic))

    except:

    continue

