  trans: '

    ### 无监督学习


    无监督学习不需要将数据拆分为训练数据、测试数据和验证数据。我们不会向模型提供正确答案，而是让其自行形成智能推断。聚类分析是最普遍的无监督学习方法。见图 1-6。


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig6_HTML.jpg](img/509469_1_En_1_Fig6_HTML.jpg)


    图 1-6 无监督学习


    #### 降维


    降维是一种通过将数据缩减到较小维度来总结数据的技术。我们主要将此技术用于变量选择。常见的降维技术包括主成分分析（PCA），它识别出解释数据大部分变异的分量；以及因子分析，它识别出解释数据大部分变异的潜在因子。本书将在第
    5 章介绍降维技术。


    #### 聚类分析


    聚类分析涉及基于相似性对数据进行分组。当我们对数据结构没有任何假设时，此方法非常有用。在聚类分析中，不存在实际的因变量。最常见的聚类模型是 K-Means；它将数据划分为
    `k` 个（簇），每个簇具有最近的均值（质心）；然后，它计算子组之间的距离以生成聚类。本书将在第 5 章介绍 K-Means。


    ### 回测


    在开发模型后，我们必须确定模型的可靠性。回测 ^(³) 介于策略制定和执行之间。它涉及确定模型的性能表现程度。大多数系统性投资者的回测是模拟市场。理解市场模式最简单的方法是将历史交易执行情况和价格变动可视化。支持回测的关键
    Python 框架包括 `PyAlgoTrade` 和 `Zipline`。


    ### 策略实施


    在找到可靠的投资策略后，我们可以部署模型来买卖资产类别，从而承担投资组合资本的风险。一个系统可以是手动交易，也可以是使用可靠的系统化应用程序进行自动化交易。支持纸面交易和实盘交易的关键
    Python 框架包括 `QuantConnect`、`Quantopia`、`Zipline` 等。本书不涉及回测和实盘交易框架。


    ### 策略评估


    策略评估涉及评估策略的表现如何。它使投资者能够制定绩效改进的行动计划。在分析策略表现时，投资者主要关注风险价值、年化收益率、累计收益率和回撤。投资者利用这些统计指标来修正他们的策略。本书将使用
    `Pyfolio` 介绍投资风险分析和业绩评估。


    ## 算法交易


    投资者无需费力观察执行价格和手动执行订单，而是可以使用运行一组预定义规则（算法）的复杂应用程序来自动化或部分自动化任务。这种交易技术有助于显著减少冗余任务，从而使投资者能够专注于更重要的职责。使用自动化程序消除了主观性。这意味着，投资者并非表面上基于某种意见、感觉或情绪来执行订单，而是部署可扩展的机器学习和深度学习模型。本书揭示了开发和测试可扩展机器学习模型与深度学习模型的艺术与科学。高频交易
    ^(⁴) 与算法交易密切相关；但是，本书不涉及该主题。你可以运用本书中讨论的模型来解决金融领域之外的复杂问题。


    本书不提供任何财务建议。它是一本技术性书籍，通过探讨几种监督学习模型和无监督学习模型，向数据科学家、机器学习工程师、商业和金融专业人士介绍算法交易。


    脚注 1   2   3   4


    # 2. 使用 ARIMA、SARIMA 和加法模型进行预测


    时间序列分析是一种解释序列问题的方法。当一个连续变量依赖于时间时，此方法非常有用。在金融领域，我们经常用它来发现市场数据中的一致模式并预测未来价格。本章全面介绍时间序列分析。首先，它介绍了使用增广迪基-富勒（ADF）检验查找序列数据平稳性，以及检验白噪声和自相关的方法。其次，它揭示了使用平滑技术（例如移动平均技术和指数技术）简洁地总结时间序列数据模式的技术。第三，它详细介绍了投资回报率的估算。最后，它涵盖了超参数优化以及模型开发与评估。本章将使你能够设计、开发和测试时间序列分析模型，例如自回归积分滑动平均（ARIMA）模型、季节性
    ARIMA（SARIMA）模型和加法模型，以识别货币对模式并预测未来价格。在本章中，我们使用 `pandas_datareader` 从雅虎财经抓取财务数据，并使用
    `conda install -c anaconda pandas-datareader`。对于时间序列建模，我们使用 `statsmodels` 库，该库已预装在
    Python 环境中。我们还使用了 `pmdarima`，它是 `statsmodels` 的扩展。要在 Python 环境中安装它，我们使用 `pip install
    pmdarima`；在 conda 环境中，我们使用 `conda install -c saravji pmdarima`。最后，我们使用 FB Prophet
    进行高质量的时间序列分析。要在 Python 环境中安装它，我们使用 `pip install fbprophet`；在 conda 环境中，我们使用 `conda
    install -c conda-forge fbprophet`。在安装 `fbprophet` 之前，请确保先安装 `pystan`。要安装 `pystan`，我们使用
    `conda install -c conda-forge pystan`。


    Anaconda 是最流行的开源 Python 发行版，它允许用户管理、安装、更新和打包（从 [`www.anaconda.com/products/individual`](https://www.anaconda.com/products/individual)
    下载平台）。你可以将平台安装在 Windows、macOS 和 Linux 操作系统上。有关系统要求和硬件要求的更多信息，请访问 [`docs.anaconda.com/anaconda-enterprise/system-requirements/`](https://docs.anaconda.com/anaconda-enterprise/system-requirements/)。

    '
- fmt: '## Time Series in Action


    Time-series analysis is suitable for estimating a continuous variable that is
    time-dependent. In this chapter, we use it to identify the structure of sequential
    data. It is a seamless method for identifying patterns and forecasting future
    prices of currency pairs. Market data is often sequential and has some stochastic
    elements, meaning there is an underlying random process. We analyze the historical
    data of one of the most traded currency pairs in the world, the US dollar (`$`)
    and Japanese yen (`¥`), or the (`USD/JPY`) pair. We are interested in uncovering
    patterns in the adjusted closing price of the currency pair across time and then
    making reliable predictions of price movements. To create a time-series model,
    first launch Jupyter Notebook and create a new notebook.


    Listing [2-1](#509469_1_En_2_Chapter.xhtml#PC1) collects the price data of the
    `USD/JPY` pair from November 1, 2010, to November 2, 2020 (see Table [2-1](#509469_1_En_2_Chapter.xhtml#Tab1)).


    **Table 2-1** Dataset


    | **Date** | High | Low | Open | Close | Volume | Adj Close |

