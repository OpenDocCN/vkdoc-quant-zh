    Footnotes [1](#509469_1_En_4_Chapter.xhtml#Fn1_source)


    # 5. Stock Clustering


    A combination of stocks that an investor selects influences the investment portfolio’s
    performance. Some assets are highly risky to invest in, but others are not. High-risk
    assets are those whose prices change drastically in short periods. To secure capital,
    investors may select groups of stocks, rather than investing in a single stock
    or class of stocks. Given that there are many stocks to choose from, investors
    ordinarily find it arduous to single out a group of stocks with optimal performance.
    To find a group of stocks with similarities, we use an unsupervised learning technique
    called *cluster analysis* . It involves grouping data points based on similar
    characteristics. The most popular cluster analysis model is the k-means model.


    ## Investment Portfolio Diversification


    Investors ought to be careful and not put all their eggs in one basket by directing
    all their investment funds to one area of interest. They may use portfolio diversification
    to secure capital. It involves allocating funds to assets across various industries,
    sectors, geographic locations, etc., and a conservative investor diversifies their
    portfolio by investing in less risky and more profitable stocks. They ensure that
    their strategy matches their risk appetite and invest in the best-performing stocks
    with minimum volatility.


    ## Stock Market Volatility


    We mentioned in the preceding chapters that prices in the foreign exchange market
    and the stock market are not constant. There is an element of randomness because
    they fluctuate across time. In terms of liquidity, the foreign exchange market
    is the most liquid market, followed by the stock market, and so on. Market makers
    drive price movements by the volume of large transactions and sales activities.


    Investing in contracts for difference (CFD) and exchange-traded funds (EFTs) involves
    risk. The price of an asset may go in the opposite direction, resulting in capital
    loss. Investors ought to have robust risk management strategies. Ideally, they
    must select the best stocks based on certain criteria. The most common criterion
    is volatility, which is an estimate of the degree of drastic changes in prices
    in a short period. We basically assume that if liquidity increases in a market,
    then volatility increases, and vice versa. We measure volatility by estimating
    the standard deviation of logarithmic returns and beta coefficients. Besides large
    transactions and sales activities of multinational financial institutions, there
    are other factors that influence volatility such as social events, economic events,
    holidays, pandemics, labor unrest, natural disasters, war, etc.


    ## K-Means Clustering


    The k-means model partitions the data into *k* (clusters) with the nearest mean
    (centroids); it then finds the distance between subgroups to produce a cluster.
    It simultaneously shrinks the intracluster distances and improves the intercluster.
    We express the formula as shown in Equation [5-1](#509469_1_En_5_Chapter.xhtml#Equ1).


    ![$$ Dis\left({x}_1,{x}_2\right)=\sqrt{\sum_{i=0}^n{\left({x}_{1i}-{y}_{2i}\right)}^2}
    $$](images/509469_1_En_5_Chapter/509469_1_En_5_Chapter_TeX_Equ1.png)


    (Equation 5-1)


    *Dis*(*x*[1],*x*[2]) reflects the distance between the data points. Based on the
    formula in Equation 5-1, we are interested in discovering the square root of the
    sum squares of the deviation of independent data points (represented as coordinates
    (*x*[1], *y*[1]) and (*x*[2], *y*[2])) away from the mean value (the center).
    It finds the initial *k* (the number of clusters) and estimates the distance between
    clusters, and then it distributes data points to the adjoining centroid. It splits
    the data points into *k* groups of similarities. The most popular method of estimating
    similarities in space is Euclidean distance (which connects angles and distances).
    This cluster model requires the numbers to specify on the set. Data partitioning
    relies on a number of clusters. This algorithm randomly initializes centroids.'
