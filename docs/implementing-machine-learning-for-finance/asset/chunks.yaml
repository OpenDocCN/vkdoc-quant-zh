- fmt: "# Gaussian Hidden Markov\n\nThe Gaussian hidden Markov model (`GaussianHMM`)\
    \ assumes that the underlying structure of the probabilistic distributions is\
    \ normal. We use `GaussianHMM` when dealing with a continuous variable that comes\
    \ from a normal distribution. In the preceding chapter, we found that the time-series\
    \ data has a serial correlation across different lags. `GaussianHMM` is more suitable\
    \ for the problem at hand. HMM represents an unsupervised learning model for unraveling\
    \ sequential problems. In unsupervised learning, we do not hide any data away\
    \ from the model; we expose the model to all the data. It does not require us\
    \ to split the data into training and test data. Now that we recognize the pattern\
    \ of the time-series data, we can proceed and complete the model. Listing [4-6](#509469_1_En_4_Chapter.xhtml#PC6)\
    \ applies the `fit()` method to complete a Gaussian hidden Markov model (with\
    \ a spectral mixture kernel that produces Gaussian emissions). It specifies the\
    \ number of components as 5, the number of iterations as 10, and the total as\
    \ 0.0001.\n\n```\nmodel = GaussianHMM(n_components=5, covariance_type=\"diag\"\
    , n_iter=1000)\nmodel.fit(X)\nListing 4-6\nFinalize the GaussianHMM\n```\n\nListing\
    \ [4-7](#509469_1_En_4_Chapter.xhtml#PC7) predicts the sequence of internal hidden\
    \ states. Thereafter, it tabulates the sequence and shows the first five predicted\
    \ hidden states (see Table [4-3](#509469_1_En_4_Chapter.xhtml#Tab3)).\n\n**Table\
    \ 4-3** Hidden States\n\n|   | hidden_state |\n| --- | --- |\n| **0** | 1 |\n\
    | **1** | 1 |\n| **2** | 1 |\n| **3** | 1 |\n| **4** | 1 |\n| **...** | ... |\n\
    | **2512** | 1 |\n| **2513** | 1 |\n| **2514** | 3 |\n| **2515** | 1 |\n| **2516**\
    \ | 1 |\n\n```\nhidden_states = model.predict(X)\npd.DataFrame(hidden_states,columns=[\"\
    hidden_state\"])\nListing 4-7\nHidden States\n```\n\nTable [4-3](#509469_1_En_4_Chapter.xhtml#Tab3)\
    \ highlights the parameters of the most appropriate sequence of hidden states.\
    \ It does not provide sufficient information to conclude how `GaussianHMM` models\
    \ the time-series data. Listing [4-8](#509469_1_En_4_Chapter.xhtml#PC8) plots\
    \ the sequence of internal hidden states of S&P 500 time-series data that the\
    \ `GaussianHMM` model produced (see Figure [4-2](#509469_1_En_4_Chapter.xhtml#Fig2)).\n\
    \n![../images/509469_1_En_4_Chapter/509469_1_En_4_Fig2_HTML.jpg](images/509469_1_En_4_Chapter/509469_1_En_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2** HMM results\n\n```\nnum_sample = 3000\nsample, _ = model.sample(num_sample)\n\
    plt.plot(np.arange(num_sample), sample[:,0],color=\"navy\")\nplt.xlabel(\"Samples\"\
    )\nplt.ylabel(\"States\")\nplt.xticks(rotation=45)\nplt.show()\nListing 4-8\n\
    HMM Results\n```\n\nFigure [4-2](#509469_1_En_4_Chapter.xhtml#Fig2) shows the\
    \ sample data. At most, there is stability in the states. After the 500^(th) observation,\
    \ there was a slight spike. The most significant spike after the sample was 1,200.\n\
    \n## Mean and Variance\n\nThe mean value gives us a lot of information about the\
    \ central tendency of data points, and the variance shows the dispersion of data\
    \ points away from the mean value. We use both the mean value and the variance\
    \ to summarize the optimal sequence of the hidden states that the `GaussianHMM`\
    \ model produced. Listing [4-9](#509469_1_En_4_Chapter.xhtml#PC9) estimates the\
    \ mean value and variance of each internal hidden state.\n\n```\nfor i in range(model.n_components):\n\
    \    print(\"{0} order hidden state\".format(i))\n    print(\"mean = \", model.means_[i])\n\
    \    print(\"var = \", np.diag(model.covars_[i]))\n    print()\n0 order hidden\
    \ state\nmean =  [-8.29728342e-01  4.41641901e+09]\nvar =  [8.50560173e+02 4.47992619e+17]\n\
    1 order hidden state\nmean =  [2.22719353e+00 3.22150428e+09]\nvar =  [1.33720438e+02\
    \ 6.16375025e+16]\n2 order hidden state\nmean =  [2.04319405e+00 3.73786775e+09]\n\
    var =  [1.79332780e+02 9.03360887e+16]\n3 order hidden state\nmean =  [9.56404042e-01\
    \ 2.50937758e+09]\nvar =  [8.46343104e+01 3.11987532e+17]\n4 order hidden state\n\
