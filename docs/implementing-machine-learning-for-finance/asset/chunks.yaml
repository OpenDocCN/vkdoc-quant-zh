  trans: '

    # 股票交易


    股票市场交易所促进了股票、债券和股票等证券的交换。股票交易所的关键市场包括以下内容：一级市场，公司可以在上市前在此发行股票，这被称为*首次公开募股*（IPO）；以及二级市场，实际交易在此发生。


    # 股票指数


    股票指数是对股票市场或其部分板块的估值。该指数由一组股票构成，投资者可以将其作为一个整体购买，或者通过交易所交易基金（ETF）或通常追踪该指数的共同基金进行购买。表格
    1-1 展示了关键股票指数。


    **表 1-1** 关键股票指数


    | 名称 | 描述 |

    | --- | --- |

    | 标准普尔 500 指数 | 衡量美国 500 家大型公司的股票表现 |

    | 道琼斯工业平均指数（DJI 30） | 衡量美国 30 家大型公司的股票表现 |

    | 纳斯达克综合指数 | 衡量几乎所有纳斯达克股票市场的股票表现 |


    主要股票指数（如标准普尔 500 指数、道琼斯工业平均指数（DJI 30）和纳斯达克 100 指数等）采用一个除数（通常是非连续的）来除以总市值，从而得到指数值。这些指数涵盖了不同行业的股票。它们的交易方式与其他资产类别并无不同。


    # 市场的投机性质


    在交易市场中，投资者对资产的未来价格进行投机并执行交易，因此当价格朝其投机方向变动时，他们能获得可观的回报。如果价格朝相反方向变动，投资者则会遭受损失。由于杠杆的作用，投资者面临着高风险，因为投资者被允许交易他们无力承担资产类别的头寸，这意味着市场稍有变动，他们就可能损失大量资金（参见
    [`https://www.capitalindex.com/bs/eng/pages/trading-guides/margin-and-leverage-explained`](https://www.capitalindex.com/bs/eng/pages/trading-guides/margin-and-leverage-explained)）。大多数交易差价合约（CFD）的散户投资者都会亏损本金。投资者在投入资金之前，必须了解与交易相关的风险。


    ## 市场走势投机技巧


    投资者采用主观方法、客观方法或两者结合的方式对市场进行投机。使用主观方法时，投资者依据自己的理性信念、经验、他人的观点以及情绪来决定是否在特定价格买入或卖出。使用客观方法时，投资者运用数学模型识别数据中的模式并预测未来价格，然后决定是否在特定价格买入或卖出某一货币对。本书仅涉及机器学习和深度学习模型。


    # 投资策略管理流程


    图 1-4 展示了一个简单的投资策略管理流程。


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig4_HTML.png](img/509469_1_En_1_Fig4_HTML.png)


    **图 1-4** 一个简单的投资策略管理流程


    ## 策略制定


    策略制定是投资管理的第一步。它涉及以下任务：


    *   识别风险与机遇

    *   设定短期和长期目标

    *   识别资源以及组织、管理和指导这些资源（人力、财力和技术资源）的方式

    *   建立结构和政策


    系统化投资者对数据进行建模，以获得影响策略的有意义的见解。


    ## 建模


    在决定管理投资组合的方法后，下一步是建模。这涉及使用定量方法。本书从金融视角出发，专门讨论机器学习和深度学习模型。下一节将讨论适用于金融领域（尤其是投资管理）的学习方法。


    ### 监督学习


    在监督学习中，模型基于我们在训练过程中提供的标签，通过一个对一组自变量进行运算的函数来预测因变量的未来值。监督学习要求我们将数据拆分为训练数据和测试数据（有时还包括验证数据）。我们向模型提供一组正确答案，并让其预测未见过的答案。监督学习方法主要有三种类型，即参数方法、非参数方法和集成方法。参见图
    1-5。


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig5_HTML.jpg](img/509469_1_En_1_Fig5_HTML.jpg)


    **图 1-5** 监督式机器学习


    #### 参数方法


    参数方法也称为线性方法。它对数据结构做出了强有力的假设。我们假设数据的底层结构是线性和正态的。它把因变量视为连续型因变量（即限制在特定范围内的因变量）。这涵盖了第
    2 章的时间序列分析和第 6 章的普通最小二乘法模型。


    #### 非参数方法


    与参数方法不同，非参数方法对线性和正态性没有实质性的假设。它处理的是分类因变量（即限制在特定范围内的因变量）。非参数方法主要有两种：二分类和多分类。


    ##### 二分类


    在二分类中，自变量产生两个类别，例如“否”和“是”或“失败”和“通过”。我们将这些类别编码为 0 和 1，并训练二分类器来预测后续类别。


    ##### 多分类


    当因变量有两个以上类别（例如负面、中性或正面）时，我们使用多分类。我们将这些类别编码为 0、1、2...n。编码值不应超过 10。最流行的多分类模型包括随机森林和线性判别分析等。本书不涉及多分类模型。


    #### 集成方法


    集成方法同时包含参数方法和非参数方法。当因变量是连续变量或分类变量时使用该方法。它处理线性回归和分类问题。最流行的集成方法包括支持向量机和随机森林树等。本书不涉及集成模型。

    '
- fmt: '### Unsupervised Learning


    Unsupervised learning does not call for data to split the data into training data,
    test data, and validation data. We do not hand out correct answers to a model;
    we allow it to form intelligent guesstimates on its own. Cluster analysis is the
    most prevalent unsupervised learning method. See Figure [1-6](#509469_1_En_1_Chapter.xhtml#Fig6).


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig6_HTML.jpg](images/509469_1_En_1_Chapter/509469_1_En_1_Fig6_HTML.jpg)


    Figure 1-6 Unsupervised learning


    #### Dimension Reduction


    Dimension reduction is a technique to summarize data by reducing it to small dimensions.
    We mainly use this technique for variable selection. Popular dimension reduction
    techniques include the principal components analysis (PCA), which identifies components
    that account for most of the variation in the data, and factor analysis, which
    identifies latent factors that account for most of the variation in the data.
    This book covers dimension reduction in Chapter [5](#509469_1_En_5_Chapter.xhtml).


    #### Cluster Analysis


    Cluster analysis involves grouping data based on similar similarities. It is useful
    when we have no assumptions about the structure of the data. In cluster analysis,
    there is no actual dependent variable. The most common cluster model is the K-Means;
    it partitions the data into `k` (clusters) with the nearest mean (centroids);
    it then finds the distance between subgroups to produce a cluster. This book covers
    K-Means in Chapter [5](#509469_1_En_5_Chapter.xhtml).


    ### Backtesting


    After we develop a model, we must determine how reliable the model is. Backtesting
    ^([³](#fn3)) sits between strategy formulation and execution. It involves determining
    the extent to which a model performs. At most, systematic investors’ backtest
    simulated markets. The easiest way to understand market patterns involves visualizing
    historical trade executions and price movements. Key Python frameworks that support
    backtesting include `PyAlgoTrade` and `Zipline`.


    ### Strategy Implementation


    After finding a reliable investment strategy, we may deploy a model to buy and
    sell asset classes, thus risking the capital of the investment portfolio. A system
    may trade manually or be automated, using reliable systematic applications. Key
    Python frameworks that support paper and live trading include `QuantConnect`,
    `Quantopia`, `Zipline`, etc. This book does not cover backtesting and live trading
    frameworks.


    ### Strategy Evaluation


    Strategy evaluation involves assessing how well a strategy performs. It enables
    investors to devise action plans for performance improvements. When analyzing
    the performance of a strategy, investors mainly focus on the value at risk, the
    annual rate of return, the cumulative rate of the return value, and drawdown.
    Investors use these statistics to revise their strategy. This book covers investment
    risk analysis and performance using `Pyfolio`.


    ## Algorithmic Trading


    Instead of vigorously observing action prices and physically executing orders,
    an investor may automate or partially automate tasks using sophisticated applications
    operating a set of predetermined rules (algorithms). This trading technique helps
    meaningfully reduce redundant tasks, consequently allowing investors to focus
    on more important duties. Using automated programs eliminates subjectivity. Meaning,
    investors do not execute orders ostensibly based on some opinion, feeling, or
    emotion. Instead, they deploy scalable machine learning and deep learning models.
    This book conceals the art and science of developing and testing scalable machine
    learning models and deep learning models. High-frequency trading^([⁴](#fn4)) goes
    hand in hand with algorithmic trading; however, we do not cover the topic in this
    book. You can apply the models discussed in this book to solve complex problems
    outside the realm of finance.


    This book does not provide any financial advice. It is a technical book that introduces
    data scientists, machine learning engineers, business, and finance professionals
    to algorithmic trading by exploring several supervised learning models and unsupervised
    learning models.


    Footnotes [1](#509469_1_En_1_Chapter.xhtml#Fn1_source)   [2](#509469_1_En_1_Chapter.xhtml#Fn2_source)
      [3](#509469_1_En_1_Chapter.xhtml#Fn3_source)   [4](#509469_1_En_1_Chapter.xhtml#Fn4_source)


    # 2. Forecasting Using ARIMA, SARIMA, and the Additive Model


    Time-series analysis is a method for explaining sequential problems. It is convenient
    when a continuous variable is time-dependent. In finance, we frequently use it
    to discover consistent patterns in the market data and forecast future prices.
    This chapter offers a comprehensive introduction to time-series analysis. It first
    covers ways of finding stationary in series data using the augmented Dickey-Fuller
    (ADF) test and testing for white noise and autocorrelation. Second, it reveals
    techniques of succinctly summarizing the patterns in time-series data using smoothening,
    such as the moving average technique and exponential technique. Third, it properly
    covers the estimation of rates of return on investment. Last, it covers hyperparameters
    optimization and model development and evaluation. This chapter enables you to
    design, develop, and test time-series analysis models like the autoregressive
    integrated moving average (ARIMA) model, seasonal ARIMA (SARIMA) model, and additive
    model, to identify patterns in currency pairs and forecast future prices. In this
    chapter, we use `pandas_datareader` to scrape financial data from Yahoo Finance,
    and we use `conda install -c anaconda pandas-datareader`. For time-series modeling,
    we use the `statsmodels` library, which is pre-installed in the Python environment.
    We also use `pmdarima`, which is an extension of `statsmodels`. To install it
    in the Python environment, we use `pip install pmdarima`; in the conda environment,
    we use `conda install -c saravji pmdarima`. Lastly, we use FB Prophet for high-quality
    time-series analysis. To install it in the Python environment, we use `pip install
    fbprophet`; in the conda environment, we use `conda install -c conda-forge fbprophet`.
    Before you install `fbprophet`, ensure that you first install `pystan`. To install
    `pystan`, we use `conda install -c conda-forge pystan`.


    Anaconda is the most popular open source Python distribution and enables one to
    manage, install, update, and manage packages (download the platform from [https://www.anaconda.com/products/individual](https://www.anaconda.com/products/individual)).
    You can install the platform on Windows, macOS, and Linux operating systems. Find
    out more about system requirements and hardware requirements at [https://docs.anaconda.com/anaconda-enterprise/system-requirements/](https://docs.anaconda.com/anaconda-enterprise/system-requirements/).'
