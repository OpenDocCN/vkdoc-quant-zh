    Figure [2-1](#509469_1_En_2_Chapter.xhtml#Fig1) shows that there is no white noise
    in the series because there are significant spikes above 95 percent and 99 percent
    confidence intervals. Listing [2-5](#509469_1_En_2_Chapter.xhtml#PC5) plots training
    data autocorrelation to show white noise (see Figure [2-2](#509469_1_En_2_Chapter.xhtml#Fig2)).


    ![../images/509469_1_En_2_Chapter/509469_1_En_2_Fig2_HTML.jpg](images/509469_1_En_2_Chapter/509469_1_En_2_Fig2_HTML.jpg)


