    *   `Matplotlib` 和 `Seaborn` 用于常用图表\n\n本书面向数据科学家、机器学习工程师、商业和金融专业人士，以及希望使用数据科学流程和工具，为投资组合管理、风险分析和绩效分析以及预测分析开发系统性方法的个人投资者。在阅读本书内容之前，请确保您理解统计学、投资策略、Python\
    \ 编程和概率论的基础知识。同时，请在您的环境中安装前面列表中提到的软件包。\n\n## 致谢\n\n撰写一本单作者书籍要求很高，但我得到了家人和挚友们的坚定支持和积极鼓励。衷心感谢\
    \ Apress 出版团队在撰写和编辑过程中给予的所有支持。最后，谦虚地感谢所有阅读本书的读者；我诚挚地希望你们觉得它有所帮助。\n\n## 关于作者\n\
    ## 关于技术评审专家\n\n# 1. 金融市场与算法交易简介\n\n这是本书介绍算法交易的初始章节。本章详细介绍了外汇市场（FX）和股票市场。它探讨了我们如何配对、报价和兑换官方货币。随后，介绍了股票交易所。此外，本章还介绍了主要的市场参与者、主经纪商、流动性提供者、现代技术以及促进货币和股票交易的软件平台。此外，本章还探讨了外汇市场和股票市场的投机性质以及投资风险管理的具体方面。最后，本章介绍了几种可应用于解决金融问题的机器学习方法。\n\
    \n## 外汇市场\n\n外汇市场代表一个投资者用一种货币兑换另一种货币的国际市场。它没有一个交易发生的实体主要地点，每个投资者都保存自己的交易记录，每笔交易都以电子方式发生。主要市场参与者使用其地理边界内监管机构规定的准则进行自我监管。\n\
    \n### 汇率\n\n每个官方国家通常都有其自己的货币。货币是由中央政府管理、发行并在其地理边界内流通的一种支付类别。在对外贸易中，购买外国商品或服务并将其销售给本地市场的个人或公司通常需要兑换货币。我们普遍将汇率视为一种货币与另一种货币的价格比率。主要货币包括美元（$）、欧元（€）、英镑（£）、日元（¥）等。交叉汇率是一种货币相对于另一种货币的价格，其中不涉及美元。例如，欧元/英镑（EUR/GBP）就是欧元与英镑之间的交叉汇率。\n\
    \n#### 汇率报价\n\n汇率代表一种货币相对于另一种货币的价格。我们直接或间接地报价货币。使用直接标价法，汇率显示我们需要用多少本地货币来兑换一单位外币。例如，`EUR/USD\
    \ = 1.19`。间接标价法显示一单位本地货币可以兑换多少外币。例如，`USD/EUR = 0.84`。\n\n"
- fmt: "# Exchange Rate Movement\n\nThe exchange rate is inconstant; it varies over\
    \ time. There are several prime factors that influence changes in the exchange\
    \ rate. For instance, economic and growth factors such as gross domestic product\
    \ growth (`GDP`), inflation rates (`consumer price index` or `GDP deflator`),\
    \ and `stocks traded`, `external debt stocks`, `current account balance`, `total\
    \ reserves`, etc. In other instances, rates may react to geopolitical news, natural\
    \ disasters, labor union activities, social-unrest, corporate scandals, among\
    \ others. When changes befall, we say that one currency is stronger or weaker\
    \ than another currency. For instance, with the `EUR/USD` currency pair, if the\
    \ euro strengthens, the `USD` progressively weakens. Let’s say `EUR/USD` opened\
    \ at `1.2100` and closed at `1.2190`; we say that the `EUR` strengthened since\
    \ `1 EUR` bought more `USD` at the close than at open.\n\n- Assuming an investor\
    \ buys `1 million euros` at `1.2100` at the open, assuming it will strengthen\
    \ on that day, but the euro closes at `1.2190`, the investor has experienced `$7\
    \ 383.10 (€9000)` loss.\n\n  ![$$ Euro\\ Loss=\\frac{+\\$1\\ 000\\ 0000=-\\$1\\\
    \ 000\\ 000=\\kern0.5em }{-0-}\\frac{-\\text{\\EUR} 1\\ 219\\ 000+\\text{\\EUR}\
    \ 1\\ 210\\ 000\\ }{\\text{\\EUR} 9\\ 000} $$](images/509469_1_En_1_Chapter/509469_1_En_1_Chapter_TeX_Equa.png)\n\
    \n# Bids and Offers\n\nA market maker represents an organization that exchanges\
    \ currencies on its own account at prices reflected on their systems. Common market\
    \ makers include banks and brokers. They quote two rates as follows:\n\n- *Bid*:\
    \ The rate at which market makers buy the currency\n- *Offer*: The rate at which\
    \ market makers sell the base currency\n\n## The Left Bid and Right Offer Rule\n\
    \nAs tricky as it may be when market makers trade, they are buying and selling\
    \ at the same time. They buy the base currency on the left side of the quote and\
    \ sell the currency on the right side of the quote. For instance, if a market\
    \ maker quotes the `EUR/USD` at `1.2100/15`, they will buy the dollars at `€1.2100`\
    \ and sell them at `€1.2115`.\n\n| **EUR/USD** |   |\n|-------------|---|\n| **Bid**\
    \     | **Ask** |\n| 1.2100      | 1.2115 |\n\nThe difference between the bid\
    \ and offer is called the *spread*. It informs us about liquidity. The more liquid\
    \ the market, the more narrow the spread. To understand how this works, let’s\
    \ look at the minor currency pairs and major currencies. Currency pairs in emerging\
    \ markets such as South African rand to rupees (`ZAR/INR`), Bangladeshi taka to\
    \ Omani rial (`BDT/OMR`), among others, have low trading activities and are traded\
    \ in small quantities. This results in higher spreads when compared to major currencies\
    \ such as the `GBP` to the `US dollar (USD)`, Australian dollar to the `US dollar`,\
    \ etc. Equation [1-1](#509469_1_En_1_Chapter.xhtml#Equ1) shows how we find the\
    \ spread.\n\n![$$ Spread= Bid- Ask $$](images/509469_1_En_1_Chapter/509469_1_En_1_Chapter_TeX_Equ1.png)\n\
    \n(Equation 1-1)\n\nConsider the scenario where the `EUR/USD` is quoted at `1.2100/15`;\
    \ the spread equals `0.015`.\n\nThe margin represents the difference between the\
    \ bid and ask divided by the ask. It can be written mathematically as in Equation\
    \ [1-2](#509469_1_En_1_Chapter.xhtml#Equ2).\n\n![$$ Margin=\\kern0.5em \\left(\
    \ Bid- Ask\\right)/ Ask\\kern0.5em \\ast 100\\% $$](images/509469_1_En_1_Chapter/509469_1_En_1_Chapter_TeX_Equ2.png)\n\
    \n(Equation 1-2)\n\n*Margin* equals `1.2381` percent.\n\n- Assume you are a US\
    \ tourist who is visiting Europe and wants euros; you must buy the euros using\
    \ the US dollars you arrived with. The market makers will sell them to you at\
    \ `€1.2115`. In contrast, if you are on the seller’s side, the market maker buys\
    \ the currency at `€1.2100`.\n\n# The Interbank Market\n\nThe interbank market\
    \ encompasses a substantial segment of the FX market. It is an international network\
    \ of large financial companies, especially multinational banks that use their\
    \ cash balances to trade currencies. We equally recognize the interbank market\
    \ as the wholesale market. Key participants in this market influence the direction\
    \ of price movements and interest rate risk through their purchasing activities\
    \ and sales operations. They set the bid and ask price for a currency pair based\
    \ on future price predictions. The central bank frequently examines the activities\
    \ of key market participants to determine the effects of their transactions on\
    \ economic stability. In addition, they use complex instruments such as fiscal\
    \ policies and monetary policies to drive price movements.\n\n# The Retail Market\n\
    \nThe retail market is a narrow segment of the FX market. It encompasses investors\
    \ who are not directly part of the interbank market. In the retail market, investors\
    \ carry out transactions over the internet using sophisticated technologies, systems,\
    \ and software that brokerage companies provide.\n\nFigure [1-1](#509469_1_En_1_Chapter.xhtml#Fig1)\
    \ shows that Electronic Broker Services (`EBS`) receives prices from banks, brokerage\
    \ companies, and other financial institutions, and then provides them to retail\
    \ investors. It provides an electronic platform that enables retail investors\
    \ to trade with money markers. Key financial institutions in the market include\
    \ insurance firms, investment firms, hedge funds, etc. `EBS` compromises leading\
    \ banks (an alternative to `EBS` is Thomson Reuters Matching). Established banks\
    \ include Goldman Sachs, JP Morgans, and HSBC among others. Some of the most popular\
    \ brokerage firms include Saxo Bank, IG Group, Pepperstone, among others.\n\n\
    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig1_HTML.png](images/509469_1_En_1_Chapter/509469_1_En_1_Fig1_HTML.png)\n\
    \nFigure 1-1 Simple example of the FX market"
  raw: "### Exchange Rate Movement\n\nThe exchange rate is inconstant; it varies over\
    \ time. There are several prime factors that influence changes in the exchange\
    \ rate. For instance, economic and growth factors such as gross domestic product\
    \ growth (GDP), inflation rates (consumer price index or GDP deflator), and stocks\
    \ traded, external debt stocks, current account balance, total reserves, etc.\
    \ In other instances, rates may react to geopolitical news, natural disasters,\
    \ labor union activities, social-unrest, corporate scandals, among others. When\
    \ changes befall, we say that one currency is stronger or weaker than another\
    \ currency. For instance, with the EUR/USD currency pair, if the euro strengthens,\
    \ the USD progressively weakens. Let’s say EUR/USD opened at 1.2100 and closed\
    \ at 1.2190; we say that the EUR strengthened since 1 EUR bought more USD at the\
    \ close than at open.\n\n*   Assuming an investor buys 1 million euros at 1.2100\
    \ at the open, assuming it will strengthen on that day, but the euro closes at\
    \ 1.2190, the investor has experienced $7 383\\. 10(€9000) loss.\n\n    ![$$ Euro\\\
    \ Loss=\\frac{+\\$1\\ 000\\ 0000=-\\$1\\ 000\\ 000=\\kern0.5em }{-0-}\\frac{-\\\
    text{\\EUR} 1\\ 219\\ 000+\\text{\\EUR} 1\\ 210\\ 000\\ }{\\text{\\EUR} 9\\ 000}\
    \ $$](images/509469_1_En_1_Chapter/509469_1_En_1_Chapter_TeX_Equa.png)\n\n###\
    \ Bids and Offers\n\nA market maker represents an organization that exchanges\
    \ currencies on its own account at prices reflected on their systems. Common market\
    \ makers include banks and brokers. They quote two rates as follows:\n\n*   *Bid*:\
    \ The rate at which market makers buy the currency\n\n*   *Offer*: The rate at\
    \ which market makers sell the base currency\n\n#### The Left Bid and Right Offer\
    \ Rule\n\nAs tricky as it may be when market makers trade, they are buying and\
    \ selling at the same time. They buy the base currency on the left side of the\
    \ quote and sell the currency on the right side of the quote. For instance, if\
    \ a market maker quotes the EUR/USD at 1.2100/15, they will buy the dollars at\
    \ €1.2100 and sell them at €1.2115.\n\n| **EUR/USD** |   |\n| --- | --- |\n| **Bid**\
    \ | **Ask** |\n| 1.2100 | 1.2115 |\n\nThe difference between the bid and offer\
    \ is called the *spread*. It informs us about liquidity. The more liquid the market,\
    \ the more narrow the spread. To understand how this works, let’s look at the\
    \ minor currency pairs and major currencies. Currency pairs in emerging markets\
    \ such as South African rand to rupees (ZAR/INR), Bangladeshi taka to Omani rial\
    \ (BDT/OMR), among others, have low trading activities and are traded in small\
    \ quantities. This results in higher spreads when compared to major currencies\
    \ such as the GBP to the US dollar (USD), Australian dollar to the US dollar,\
    \ etc. Equation [1-1](#509469_1_En_1_Chapter.xhtml#Equ1) shows how we find the\
    \ spread.\n\n![$$ Spread= Bid- Ask $$](images/509469_1_En_1_Chapter/509469_1_En_1_Chapter_TeX_Equ1.png)\n\
    \n(Equation 1-1)\n\nConsider the scenario where the EUR/USD is quoted at 1.2100/15;\
    \ the spread equals 0.015.\n\nThe margin represents the difference between the\
    \ bid and ask divided by the ask. It can be written mathematically as in Equation\
    \ [1-2](#509469_1_En_1_Chapter.xhtml#Equ2).\n\n![$$ Margin=\\kern0.5em \\left(\
    \ Bid- Ask\\right)/ Ask\\kern0.5em \\ast 100\\% $$](images/509469_1_En_1_Chapter/509469_1_En_1_Chapter_TeX_Equ2.png)\n\
    \n(Equation 1-2)\n\n*Margin* equals 1.2381 percent.\n\n*   Assume you are a US\
    \ tourist who is visiting Europe and wants euros; you must buy the euros using\
    \ the US dollars you arrived with. The market makers will sell them to you at\
    \ €1.2115\\. In contrast, if you are on the seller’s side, the market maker buys\
    \ the currency at €1.2100.\n\n### The Interbank Market\n\nThe interbank market\
    \ encompasses a substantial segment of the FX market. It is an international network\
    \ of large financial companies, especially multinational banks that use their\
    \ cash balances to trade currencies. We equally recognize the interbank market\
    \ as the wholesale market. Key participants in this market influence the direction\
    \ of price movements and interest rate risk through their purchasing activities\
    \ and sales operations. They set the bid and ask price for a currency pair based\
    \ on future price predictions. The central bank frequently examines the activities\
    \ of key market participants to determine the effects of their transactions on\
    \ economic stability. In addition, they use complex instruments such as fiscal\
    \ policies and monetary policies to drive price movements.\n\n### The Retail Market\n\
    \nThe retail market is a narrow segment of the FX market. It encompasses investors\
    \ who are not directly part of the interbank market. In the retail market, investors\
    \ carry out transactions over the internet using sophisticated technologies, systems,\
    \ and software that brokerage companies provide.\n\nFigure [1-1](#509469_1_En_1_Chapter.xhtml#Fig1)\
    \ shows that Electronic Broker Services (EBS) receives prices from banks, brokerage\
    \ companies, and other financial institutions, and then provides them to retail\
    \ investors. It provides an electronic platform that enables retail investors\
    \ to trade with money markers. Key financial institutions in the market include\
    \ insurance firms, investment firms, hedge funds, etc. EBS compromises leading\
    \ banks (an alternative to EBS is Thomson Reuters Matching). Established banks\
    \ include Goldman Sachs, JP Morgans, and HSBC among others. Some of the most popular\
    \ brokerage firms include Saxo Bank, IG Group, Pepperstone, among others.\n\n\
    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig1_HTML.png](images/509469_1_En_1_Chapter/509469_1_En_1_Fig1_HTML.png)\n\
    \nFigure 1-1\n\nSimple example of the FX market"
  trans: "\n# 汇率波动\n\n汇率并非一成不变，它会随时间而变化。有几个主要因素会影响汇率的变动。例如，国内生产总值增长（`GDP`）、通货膨胀率（`消费者价格指数`或`GDP\
    \ 平减指数`）、`股票交易额`、`外债存量`、`经常账户余额`、`总储备量`等经济与增长因素。在其他情况下，汇率也可能对地缘政治新闻、自然灾害、工会活动、社会动荡、公司丑闻等做出反应。当变化发生时，我们称一种货币相对于另一种货币走强或走弱。例如，对于`欧元/美元`货币对，如果欧元走强，`美元`就会相应走弱。假设`欧元/美元`开盘价为`1.2100`，收盘价为`1.2190`；我们说`欧元`走强了，因为收盘时`1\
    \ 欧元`能买到的`美元`比开盘时更多。\n\n-   假设一位投资者在开盘时以`1.2100`的价格买入`100 万欧元`，并预期当天欧元会走强，但欧元收盘价为`1.2190`，该投资者将遭受`$7\
    \ 383.10（€9000）`的损失。\n\n  ![$$ 欧元损失=\\frac{+\\$1\\ 000\\ 0000=-\\$1\\ 000\\ 000=\\\
    kern0.5em }{-0-}\\frac{-\\text{\\EUR} 1\\ 219\\ 000+\\text{\\EUR} 1\\ 210\\ 000\\\
    \ }{\\text{\\EUR} 9\\ 000} $$](img/509469_1_En_1_Chapter_TeX_Equa.png)\n\n# 买入价与卖出价\n\
    \n做市商是指以其系统上反映的价格，为自己的账户进行货币兑换的机构。常见的做市商包括银行和经纪商。他们报价时提供两个汇率，如下所示：\n\n-   *买入价*：做市商买入货币时的汇率\n\
    -   *卖出价*：做市商卖出基础货币时的汇率\n\n## 左买右卖规则\n\n做市商交易时可能很棘手，因为他们同时在进行买入和卖出操作。他们在报价的左侧买入基础货币，并在报价的右侧卖出该货币。例如，如果做市商对`欧元/美元`的报价为`1.2100/15`，他们将按`€1.2100`买入美元，并按`€1.2115`卖出美元。\n\
    \n| **欧元/美元** |   |\n|-------------|---|\n| **买入价**     | **卖出价** |\n| 1.2100\
    \      | 1.2115 |\n\n买入价和卖出价之间的差额被称为*点差*。它反映了市场的流动性状况。市场流动性越高，点差就越窄。为了理解其原理，让我们来看看次要货币对和主要货币。新兴市场的货币对，如南非兰特兑印度卢比（`ZAR/INR`）、孟加拉塔卡兑阿曼里亚尔（`BDT/OMR`）等，交易活动低迷且交易量小。与主要货币（如`英镑`兑`美元`、澳元兑`美元`等）相比，这导致了更高的点差。公式\
    \ 1-1 展示了如何计算点差。\n\n![$$ 点差= 买入价- 卖出价 $$](img/509469_1_En_1_Chapter_TeX_Equ1.png)\n\
    \n（公式 1-1）\n\n考虑这样一个场景：`欧元/美元`报价为`1.2100/15`；点差等于`0.015`。\n\n利润率代表买入价与卖出价之差除以卖出价。可以用公式\
    \ 1-2 的数学形式表示。\n\n![$$ 利润率=\\kern0.5em \\left( 买入价- 卖出价\\right)/ 卖出价\\kern0.5em\
    \ \\ast 100\\% $$](img/509469_1_En_1_Chapter_TeX_Equ2.png)\n\n（公式 1-2）\n\n*利润率*等于`1.2381`%。\n\
    \n-   假设你是一位正在欧洲旅行、想要兑换欧元的美国游客；你必须用随身携带的美元来购买欧元。做市商会按`€1.2115`的价格卖给你欧元。相反，如果你是卖家，做市商则会按`€1.2100`的价格买入欧元。\n\
    \n# 银行间市场\n\n银行间市场是外汇市场的一个重要组成部分。它是一个由大型金融公司组成的国际网络，特别是那些利用其现金结余进行货币交易的多国银行。我们也通常将银行间市场称为批发市场。该市场的关键参与者通过其购买活动和销售操作来影响价格变动的方向和利率风险。他们根据对未来价格的预测，为货币对设定买入价和卖出价。中央银行经常审查关键市场参与者的活动，以确定其交易对经济稳定的影响。此外，他们还利用财政政策和货币政策等复杂工具来推动价格变动。\n\
    \n# 零售市场\n\n零售市场是外汇市场的一个细分领域。它涵盖了那些不直接参与银行间市场的投资者。在零售市场中，投资者利用经纪公司提供的先进技术、系统和软件，通过互联网进行交易。\n\
    \n图 1-1 显示，电子经纪服务系统（`EBS`）从银行、经纪公司和其他金融机构获取报价，然后将这些报价提供给零售投资者。它提供了一个电子平台，使零售投资者能够与做市商进行交易。该市场中的关键金融机构包括保险公司、投资公司、对冲基金等。`EBS`\
    \ 汇聚了主要银行（`EBS` 的另一个选择是汤森路透 Matching 系统）。知名银行包括高盛、摩根大通和汇丰银行等。一些最受欢迎的经纪公司包括盛宝银行、IG\
    \ 集团、Pepperstone 等。\n\n![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig1_HTML.png](img/509469_1_En_1_Fig1_HTML.png)\n\
    \n图 1-1 外汇市场的简单示例\n"
- fmt: "#### Brokerage\n\nA brokerage involves providing a stable platform that facilitates\
    \ transactions. Brokerage companies typically issue retail investors’ trading\
    \ accounts and the infrastructure for exchanging financial instruments. Figure\
    \ [1-2](#509469_1_En_1_Chapter.xhtml#Fig2) exhibits the various types of brokers.\n\
    \n![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig2_HTML.jpg](images/509469_1_En_1_Chapter/509469_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2  \nTypes of brokers\n\nBrokerage companies differ subtly in their\
    \ modus operandi. These companies must be registered and follow compliance standards\
    \ set by regulatory organizations within their geographic boundaries. Key regulators\
    \ include the US Commodities and Futures Trading Commission, Australian Securities\
    \ and Investments Commission (ASIC), and UK Financial Conduct Authority (FCA).\
    \ Underneath, we consider primary brokerage companies.\n\n##### Desk Dealing Brokers\n\
    \nDesk dealing (DD) brokers present fixed spreads and liquidity to investors.\
    \ They establish a market for investors and take the opposing side of investors’\
    \ orders, meaning that they trade against their customers. They uniformly determine\
    \ the bid and ask prices based on their own future price predictions. Their rates\
    \ do not come from the interbank market.\n\n##### No Desk Dealing Brokers\n\n\
    No desk dealing (NDD) brokers do not pass on investors’ orders through desk dealing.\
    \ They also do not take the other side of the trade executed by investors. To\
    \ generate revenue, they charge a small commission and/or slightly influence the\
    \ spread. There are two principal NDD brokers, namely: 1) electronic communications\
    \ network brokers and 2) straight-through processing brokers.\n\n###### Electronic\
    \ Communications Network Brokers\n\nElectronic communications network (ECN) brokers\
    \ ensure investors’ orders interact with the orders of other investors in the\
    \ network. Traditionally, investors include commercial banks, institutional investors,\
    \ hedge funds, etc. They trade against each other by offering bid prices and asking\
    \ prices. To generate revenue, they call for a small commission and attract an\
    \ enormous pool of investors through robust marketing initiatives.\n\n###### Straight-Through\
    \ Processing Brokers\n\nStraight-through processing (STP) brokers direct investors’\
    \ orders to liquidity providers with access to the interbank market. At most,\
    \ these brokers favorably get many bid prices and ask prices from many liquidity\
    \ providers such as Citibank, Barclays Bank, Morgan Stanley, among others, who\
    \ carefully sort them and then offer investors a price with a markup. To generate\
    \ revenue, they call for a hefty commission. Unlike the two types of brokerage\
    \ firms mentioned earlier, these brokers are not concerned with influencing trading\
    \ activities.\n\n### Understanding Leverage and Margin\n\nThe FX market offers\
    \ more excessive leverage compared to the stock market. Leverage represents the\
    \ amount that brokers loan investors to transact. It exposes an investor to a\
    \ position that they would not have with their cash balance. Brokers offer trading\
    \ accounts that use leverage through margin trading. The margin represents the\
    \ difference between the total value of the positions held and the total value\
    \ of the loan. Margin quantity increases as a result of a decrease in leverage\
    \ or vice versa. Leverage enables investors to execute numerous trades they would\
    \ ordinarily trade using the current account; you can basically look at it as\
    \ credit without the requirement of collateral. It is often depicted in a ratio.\
    \ Standard trading accounts have leverage types that range from `1:10` to `1:100`.\
    \ However, some brokerages do offer accounts with leverage up to `1:1000`. The\
    \ lower the ratio, the higher the capital needed to execute a trade. Investors\
    \ exert leverage to generate more returns with slight price changes. For instance,\
    \ an account with `1:1000` enables investors to execute numerous trades compared\
    \ to `1:10`. Also, the higher leveraged accounts amplify profits and magnify losses.\
    \ To some extent, an account’s leverage type gives a slight idea of an investors’\
    \ risk profile. For instance, an investor expecting to rapidly generate profits\
    \ in the market will have a high leveraged account, and a more conservative investor\
    \ will have a low leveraged account.\n\n### The Contract for Difference Trading\n\
    \nThe contract for difference (CFD) ^([¹](#fn1)) represents a financial derivative\
    \ with a value that comes from a financial asset. It enables investors to generate\
    \ profits from price differences rather than safeguarding an asset. Consequently,\
    \ investors can speculate on price movements. Besides CFDs, there is a more complex\
    \ financial derivative known as *futures*. Unlike CFDs, which are privately traded\
    \ through brokers, futures are traded through a large exchange. With futures,\
    \ an investor on the buyer’s side is obliged to execute the trade when the contract\
    \ expires, and an investor on the seller’s side ought to deliver the asset at\
    \ a certain period. Futures have an expiry date, and there is a cap on the number\
    \ of trades that an investor can execute at a certain period. Given that, the\
    \ future has stricter regulatory mechanisms than CFDs.\n\n## The Share Market\n\
    \nWe equally recognize the share market as the equity market or the stock market.\
    \ It is also one of the most liquid markets in the world. It is an international\
    \ market mostly made up of large financial companies that trade listed stocks.\
    \ A share represents the ownership of equity. A company sells equity to raise\
    \ capital.\n\n### Raising Capital\n\nAt most, companies seek to expand their business\
    \ operations, but funds are constrained by capital. They may privately or publicly\
    \ seek debt financing or equity financing. Debt financing involves borrowing funds\
    \ using collateral. The most conventional source of debt financing is big commercial\
    \ banks. Most startups cannot source financial capital from these banks because\
    \ they are at high risk (most startups fail). They use alternative debt financing\
    \ sources like micro-lenders, angel investors, and seed investors depending on\
    \ the phase they are at in their entrepreneurship journey. More established companies\
    \ may raise capital by selling their shares to the public.\n\n#### Public Listing\n\
    \nIf an established company wants to gain a large financial capital, then it can\
    \ list on a public stock exchange.^([²](#fn2)) Before they exchange company stocks,\
    \ they must first comply with the accreditation process of a commission in a specific\
    \ jurisdiction and make an initial public offering.\n\n#### Stock Exchange\n\n\
    The stock market exchange facilitates the exchange of shares between companies\
    \ and investors. The most popular stock exchanges include the London Stock Exchange,\
    \ New York Stock Exchange, and NASDAQ among others. Figure [1-3](#509469_1_En_1_Chapter.xhtml#Fig3)\
    \ shows a simple example of the stock exchange market.\n\n![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig3_HTML.png](images/509469_1_En_1_Chapter/509469_1_En_1_Fig3_HTML.png)\n\
    \nFigure 1-3  \nA simple example of the stock exchange market\n\nFigure [1-3](#509469_1_En_1_Chapter.xhtml#Fig3)\
    \ shows that the brokers interact with the stock exchanges and pass prices to\
    \ investors. Also, the stock exchange releases a stock market index. There are\
    \ two markets on the stock exchange. First, there is the *primary market*, where\
    \ a company shows intent of enlisting in the stock exchange by delivering an official\
    \ press release, partaking in roadshows to make their intentions known to the\
    \ public, filing for enlistment, and making an initial public offer (IPO), which\
    \ involves issuing shares prior to enlistment. Post enlistment on the exchange,\
    \ a company enters the *secondary market* by making a follow-on offer and opening\
    \ trading activities to the public. This occurs upon satisfying the compliance\
    \ requirements of the exchange."
