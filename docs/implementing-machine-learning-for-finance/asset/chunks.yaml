- fmt: '### Partial Autocorrelation Function


    The PACF plot expresses the partial correlation coefficients not described at
    low-level lags. `Listing [2-8]`(#509469_1_En_2_Chapter.xhtml#PC8) constructs the
    PACF plot (see `Figure [2-4]`(#509469_1_En_2_Chapter.xhtml#Fig4)).


    ![../images/509469_1_En_2_Chapter/509469_1_En_2_Fig4_HTML.jpg](images/509469_1_En_2_Chapter/509469_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** Partial autocorrelation


    ```

    from statsmodels.graphics.tsaplots import plot_pacf

    plot_pacf(train["Adj Close"])

    plt.xlabel("Lag")

    plt.ylabel("ACF")

    plt.show()

    ```


    **Listing 2-8** Partial Autocorrelation


    We use a correlogram to discover lags that explain the effect outside the 95 percent
    confidence boundary. For instance, `Figure [2-3]`(#509469_1_En_2_Chapter.xhtml#Fig3)
    shows that there is a significant spike in lag 1 and lag 2. This means the lags
    can explain all higher-order autocorrelation (at most the second lag is the highest-order
    lag). It shows spikes that are not statistically significant. (There is a strong
    positive correlation until lag 2; after lag 2, the p-value is less than 0.05.)
    The autocorrelation is close to zero, which is around the statistical control
    (see the blue boundary in `Figure [2-3]`(#509469_1_En_2_Chapter.xhtml#Fig3)).
    There is a strong dependency on the time-series data.


    ## The Moving Average Smoothing Technique


    The most familiar smoothing technique is the moving average (MA) technique; it
    returns the means of weight average of preceding and new data points, where weighting
    depends on the cohesion of the time-series data. In this example, we use `Pandas`
    to perform rolling window calculations. After that, we discovered the rolling
    mean with two fixed-size moving windows. A moving window represents the number
    of data points for calculating the statistics. `Listing [2-9]`(#509469_1_En_2_Chapter.xhtml#PC9)
    smooths the time-series data using a 10-day rolling window and a 50-day rolling
    window (see `Figure [2-5]`(#509469_1_En_2_Chapter.xhtml#Fig5)).


