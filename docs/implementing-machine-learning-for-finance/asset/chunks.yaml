    ## Understanding Monte Carlo


    Monte Carlo simulation uses resampling techniques to combat sequential problems.
    It reconstructs real-life conditions to identify and understand the results of
    the preceding occurrences and predict future occurrences. It also enables us to
    experiment with different investment strategies. Not only that, but it performs
    repetitive measurements on random variables that come from a normal distribution
    to determine the probability of each output, and then it assigns a confidence
    interval output.


    ### Application of Monte Carlo Simulation in Finance


    We use Monte Carlo simulation to evaluate a strategy’s rigorousness. It helps
    us determine whether the strategy is optimistic. An optimistic strategy stops
    yielding optimal returns when parameters of the environment are adjusted. It enables
    us to simulate the market and identify the risk we expose ourselves to. For this
    example, we focus on only one stock, the Northrop Grumman Corporation stock. See
    Listing [7-9](#509469_1_En_7_Chapter.xhtml#PC9) and Table [7-4](#509469_1_En_7_Chapter.xhtml#Tab4).


