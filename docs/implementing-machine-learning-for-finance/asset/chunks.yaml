    ## 模型评估


    表 3-4 重点介绍了我们用于评估分类器的关键指标。


    **表 3-4：关键评估指标**


    | 指标 | 描述 |

    | --- | --- |

    | 平均绝对误差 (MAE) | 不考虑方向的估计值平均误差程度 |

    | 均方误差 (MSE) | 考虑回归关系后，模型解释的数据变异性 |

    | 均方根误差 (RMSE) | 不考虑回归关系时解释的变异性 |

    | R 方 (R-squared) | 模型解释的数据变异性 |


