    x_train, x_test, y_train, y_test =train_test_split(x , y, test_size=0.2,shuffle=
    False)

    Listing 8-5 Split Data into Training and Test Data

    ```


    ## Logistic Regression


    Although the term *logistic regression* contains the word *regression*, it is
    not a regression model but a classification model. A linear regression model estimates
    a continuous variable. Meanwhile, a logistic regression model estimates a categorical
    dependent variable. Regression models assume the data is linear and comes from
    a normal distribution, but logistic classifiers are free from those assumptions.
    In logistic regression, we fit an S-shaped curve (or logistic curve or sigmoid
    curve) to the data. We use a logistic classifier to predict market movements.
    Stock prices change significantly in specific periods. If the market should upsurge
    within a certain period, then there is an upward market or a bullish market. In
    contrast, if the market price consistently decreases within a specific period,
    then there is a downward market or bearish market.


    ### Develop the Logistic Classifier


    Listing [8-6](#509469_1_En_8_Chapter.xhtml#PC6) finalizes the logistic classifier.


    ```

    from sklearn.linear_model import LogisticRegression

    logreg = LogisticRegression()

    logreg.fit(x_train, y_train)

    Listing 8-6 Finalize the Logistic Classifier

    ```


    #### Evaluate a Logistic Classifier


    Listing [8-7](#509469_1_En_8_Chapter.xhtml#PC7) constructs a table that highlights
    the predicted market classes (see Table [8-4](#509469_1_En_8_Chapter.xhtml#Tab4)).


    Table 8-4 Predicted Classes


    |   | Forecast |

    | --- | --- |

    | **0** | 1 |

    | **1** | 1 |

    | **2** | 0 |

    | **3** | 1 |

    | **4** | 1 |

    | **...** | ... |

    | **494** | 1 |

    | **495** | 0 |

    | **496** | 1 |

    | **497** | 0 |

    | **498** | 1 |


    ```

    y_predlogreg = logreg.predict(x_test)

    pd.DataFrame(y_predlogreg,columns=["Forecast"])

    Listing 8-7 Predicted Values

    ```


    Table [8-4](#509469_1_En_8_Chapter.xhtml#Tab4) does not provide us with sufficient
    information about how well the logistic classifier predicts. To find an abstract
    background of the logistic classifier’s performance, we use a confusion matrix.'
