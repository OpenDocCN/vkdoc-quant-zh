- fmt: '# 7. Stock Market Simulation


    The stock exchange market typically responds to socio-economic conditions. The
    active participation of key market players undoubtedly creates liquidity in the
    market. There are other factors that influence variations in the market besides
    the large transactions that key market makers make. For instance, markets react
    to news of social events, economic events, natural disasters, pandemics, etc.
    In certain conditions, the effects of those events drive price movement drastically.
    Systematic investors (investors who base their trade execution on a system that
    depends on quantitative models) need to prepare for future occurrences to preserve
    capital by learning from near-real-life conditions. If you inspect industries
    that involve considerable risk, for example, aerospace and defense, you will notice
    that the subjects learn through simulation. Simulation is a method that involves
    generating conditions that mimic the actual world so that subjects know how to
    act and react in a condition similar to preceding ones. In finance, we deal with
    large funds. They habitually take risk into account when experimenting and testing
    models.


    In this chapter, we implement a Monte Carlo simulation to simulate considerable
    changes in the market without exposing ourselves to risk. Simulating the market
    helps identify patterns in preceding occurrences and forecasts future prices with
    reasonable certainty. If we can reconstruct the actual world, then we can understand
    the preceding market behavior and predict future market behavior. In the preceding
    chapters, we sufficiently covered models for sequential pattern identification
    and forecasting. We use the `panda_montecarlo` framework to perform the simulation.
    To install it in the Python environment, use `pip install pandas-montecarlo`.


    When an investor trades a stock, they expect their speculation to yield returns
    over a certain period. Unexpected events occur, and they can influence the direction
    of prices. To build sustained profitability over the long run, investors can develop
    models to recognize the underlying pattern of preceding occurrences and to forecast
    future occurrences.


    Let’s assume you are a prospective conservative investor with an initial investment
    capital of $5 million US dollars. After conducting a comprehensive study, you
    have singled out a set of stocks to invest in. You can use Monte Carlo simulation
    to further understand the risks of investing in those assets.


    ## Understanding Value at Risk


    The most convenient way to estimate risk is by applying the value at risk (`VAR`).
    It reveals the degree of financial risk we are exposing an investment portfolio
    to. It shows the minimum capital required to compensate for losses at a specified
    probability level. There are two primary ways of estimating `VAR`; we can either
    use the variance-covariance method or simulate it by applying Monte Carlo.


    ### Estimate VAR by Applying the Variance-Covariance Method


    The variance-covariance method makes strong assumptions about the structure of
    the data. The method assumes the underlying structure of the data is linear and
    normal. It is also sensitive to missing data, nonlinearity, and outliers. To estimate
    the standard `VAR`, we first find the returns, and then we create the covariance
    matrix and find the mean value and standard deviation of the investment portfolio.
    Thereafter, we estimate the inverse of the normal cumulative distribution and
    compute the `VAR`. Figure 7-1 shows the `VAR` of a portfolio alongside the simulated
    distributions.


    ![../images/509469_1_En_7_Chapter/509469_1_En_7_Fig1_HTML.png](images/509469_1_En_7_Chapter/509469_1_En_7_Fig1_HTML.png)


    **Figure 7-1** VAR


    Here we show you how to calculate the `VAR` by applying the variance/covariance
    calculation.


    Assume:


    *   Investment capital is $5,000,000.

    *   Standard deviation from an annual trading calendar (252 days) is 9 percent.

    *   Using the z-score (1.65) at 95 percent confidence interval, the value at risk
    is as follows:

    *   $5,000,0000 * 1.645 * .09 = $740,250


