    Listing 4-9\nHidden States\n```\n\nListing [4-10](#509469_1_En_4_Chapter.xhtml#PC10)\
    \ plots the sequence of each internal hidden state (see Figure [4-3](#509469_1_En_4_Chapter.xhtml#Fig3)).\n\
