    ## Data Preprocessing


    Listing [8-4](#509469_1_En_8_Chapter.xhtml#PC4) creates a categorical variable
    with the two outcomes 0 and 1, where 0 represents a downward market and 1 represents
    an upward market. This enables us to use a classifier that can predict the probability
    of two classes. We start by defining the number of lags, and then we estimate
    daily returns and convert the lag returns into binary classes. We also use the
    `GridSearchCV()` method to standardize the data in such a way that the mean value
    is 0 and the standard deviation is 1.


    ```

    from sklearn.preprocessing import StandardScaler

    df["direction"] = pd.get_dummies(df["direction"])

    from sklearn import preprocessing

    x=df.iloc[::,5:8]

    y=df.iloc[::,-1]

    scaler = StandardScaler()

    x=scaler.fit_transform(x)

    Listing 8-4 Data Preprocessing

