    ## The ARIMA Model


    In the next section, we use ARIMA to model the series and forecast its future
    instances. ARIMA is by far the most widespread univariate time-series analysis
    model. Let’s break it down:


    * *Autoregressive (AR)*: Linear combination of previous errors. AR considers observation
    terms of previous observations, including random white noise and preceding random
    white noise.

    * *Integrated (I)*: Transformation to make the series stationary through differencing
    (estimating the change in rows over a certain period).

    * *Moving average (MA)*: Linear combination of previously weighted means (refer
    to the moving average smoothing techniques covered previously).


    Similar to the least-squares model, ARIMA makes strong assumptions about the structure
    of the data. The model assumes the structure of the series data is linear and
    normal. We can view the ARIMA model as a complex regression method since we are
    applying the regressing regress `lag1`, `lag2` to `lag = k`. The model assumes
    that the series is stationary. In a case where the series is not stationary, the
    series must show a trend over time. Also, one can perform data transformation
    to improve the predictive power of the model.


    ### ARIMA Hyperparameter Optimization


    `Listing [2-11]`(#509469_1_En_2_Chapter.xhtml#PC11) finds the best hyperparameters
    (values whose configuration alters the behavior of the model). Traditionally,
    we use autocorrelation function (ACF) and PACF to find the optimal hyperparameters,
    which is subjective. `Listing [2-12]`(#509469_1_En_2_Chapter.xhtml#PC12) uses
    the `itertools` package to find the best hyperparameters using Akaike information
    criterion, which measures out-of-sample predictions errors. `itertools` is pre-installed
    in the Python environment.


    ```

    from statsmodels.tsa.arima_model import ARIMA

