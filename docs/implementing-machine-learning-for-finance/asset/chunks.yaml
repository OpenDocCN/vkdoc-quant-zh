    **Listing 9-3** Performance Results


    Table [9-2](#509469_1_En_9_Chapter.xhtml#Tab2) highlights the risk that an investor
    bears when they exchange Amazon stocks. We use the `SPY` stock index as the benchmark
    in our analysis. It specifies that the annual rate of return is at 35.6 percent,
    and the cumulative return is at 1995.7 percent. Relating to risk, the daily value
    at risk is at 3.8 percent, and the maximum drawdown is at -34.1 percent. When
    observing investment performance findings, at most we are interested in studying
    three key ratios: Calmar ratio, Beta ratio, and Sharpe ratio. We equally devote
    our attention to alpha and beta. Underneath, we take you through how we measure
    these ratios. Table [9-3](#509469_1_En_9_Chapter.xhtml#Tab3) provides a high-level
    overview of the key performance result mentioned.


    **Table 9-3** Key Performance Results


    | Metric | Description |

    | --- | --- |

    | **Calmar ratio** | Representing estimates of the uniform annual rate of return
    divided by the maximum drawdown |

    | **Beta ratio** | Representing estimates of the difference between the anticipated
    return from investment and the anticipated return from the market over an exact
    risk-free return |

    | **Sharpe ratio** | Representing estimates of the difference between a risk-free
    rate and portfolio returns |

    | **Alpha** | Representing estimates of investment returns compared to a market
    key index |

    | **Beta** | Representing estimates of volatility associated with an investment
    |


