    Listing [3-9](#509469_1_En_3_Chapter.xhtml#PC9) trains and summarizes the model.
    To determine the extent to which the model makes correct predictions in the training
    process, we use the mean squared error, representing variability explained in
    the model after we consider a linear relationship. To improve the performance
    of the model, we use the Adam optimizer, which is an optimizer that considers
    the force that keeps the gradient moving and lowers the rate at which the model
    learns the data.


    ```

    model = Model(inputs=input_layer, outputs=output_layer)

    model.compile(loss=''mean_squared_error'', optimizer=''adam'')

    model.summary()

