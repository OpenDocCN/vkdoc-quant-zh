    ## 结论


    本章详细介绍了时间序列分析方法。我们开发并公正地比较了 ARIMA 和 SARIMA 模型的性能。此外，我们还研究了来自 Prophet 包的加法模型。在仔细审查了所有三个模型的性能后，我们注意到加法模型误差较小，并且对美元/日元货币对的未来价格有更强的预测能力。为了提高模型的性能，我们可以使用诸如改变数据划分比例、去除异常值、数据转换以及包含节假日影响等技术。


    # 使用循环神经网络进行单变量时间序列分析


    本章涵盖了深度学习的基础知识。首先，介绍了激活函数、损失函数和人工神经网络优化器。其次，讨论了序列数据问题以及循环神经网络（RNN）如何解决该问题。第三，本章介绍了设计、开发和测试最流行的
    RNN——长短期记忆（LSTM）模型的方法。我们使用 Keras 框架进行快速原型设计和构建神经网络。要在 conda 环境中安装`keras`，请使用`conda
    install -c conda-forge keras`。确保您也安装了`tensorflow`。要在 conda 环境中安装`tensorflow`，请使用`conda
    install -c conda-forge tensorflow`。


    ## 什么是深度学习？


    *深度学习*是机器学习的一个子集，它操作神经网络。神经网络是由相互连接的节点组构成的网络，这些节点组逐层接收、转换和传输输入值，直到它们到达输出层。激活函数通过在每个隐藏层中操作一组变量来启用此过程。


    ## 激活函数


    激活函数向人工神经网络添加非线性，并启用反向传播（一次逆向的完整传递）。主要有三种激活函数。


    *Sigmoid 激活函数*：将 S 形曲线拟合到数据，并触发介于 0 和 1 之间的输出值。


    *双曲正切（tanh）激活函数*：将 tanh 曲线拟合到数据，并触发介于-1 和 1 之间的输出。


    *修正线性单元（ReLu）激活函数*：获取不受特定范围约束的值，并解决梯度消失问题（一种情况，当我们在模型中添加更多训练数据时梯度增大，导致训练缓慢）。


    ## 损失函数


    损失函数评估实际值与人工神经网络预测值之间的差异。主要的损失函数包括均方误差（MSE）、平均绝对误差和均方对数误差。在本章中，我们使用 MSE（在考虑回归关系后，模型关于数据所解释的变异性）。


    ## 优化人工神经网络


    有几种模型优化的方法。最常见的优化器是自适应矩估计（Adam），它在训练期间能更好地最小化代价函数。

