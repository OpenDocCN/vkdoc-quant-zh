  raw: '## Pairwise Scatter Plots


    A pairwise scatter plot is typically needed to test for normality. We consider
    data as normally distributed when independent observations are near the mean value.
    Regression models assume normality: non-normal data results in negative model
    performance. In cases where the data is not normal, we may perform a data transformation,
    i.e., square root transformation for positively skewed data (a condition where
    the data is saturated to the right side of the distribution) or exponential/power
    transformation for negatively skewed data (a condition where the data is saturated
    to the left side of the distribution). There are several factors that may influence
    non-normality, i.e., missing values and outliers (presence of extreme values),
    among others. See Listing [6-5](#509469_1_En_6_Chapter.xhtml#PC5).


