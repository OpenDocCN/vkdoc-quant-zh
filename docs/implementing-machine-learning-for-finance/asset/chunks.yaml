    \ machine learning methods that we can apply to combat problems in finance.\n\n\
    ## FX Market\n\nThe FX market represents an international market in which investors\
    \ exchange currency for another. It does not have a principal visible location\
    \ in which transactions occur, each investor holds their own transaction records,\
    \ and each transaction happens electronically. Key market participants self-regulate\
    \ using guidelines prescribed by a regulatory body within their geographic boundaries.\n\
    \n### Exchange Rate\n\nEach official country generally has its own currency. The\
    \ currency is a class of payments administered and distributed by the central\
    \ government and dispersed around their geographic boundaries. In relation to\
    \ foreign trade, an individual or corporation that purchases foreign goods or\
    \ services and sells them to their local market typically has to exchange currencies.\
    \ We universally recognize an exchange rate as the ratio of the price of a local\
    \ currency to a foreign currency. The major currencies include the US dollar ($),\
    \ euro (€), Great Britain pound (£), Japanese yen (¥), etc. The cross rate is\
    \ the price of a currency against another, where the US dollar is uninvolved.\
    \ For instance, euro/GBP is a cross rate between the euro and the sterling.\n\n\
    #### Exchange Rates Quotation\n\nAn exchange rate represents the price of a currency\
    \ relative to an alternative. We quote currencies directly or indirectly. Using\
    \ the direct method, the exchange shows how much we have to exchange the local\
    \ currency for one unit of a foreign currency. For instance, `EUR/USD = 1.19`.\
    \ The indirect method shows how much foreign currency trades for one unit of the\
    \ local currency. For instance, `USD/EUR = 0.84`.\n\n"
