    ## Test for White Noise


    If time-series data is stationary, then it contains white noise. The most straightforward
    way to investigate white noise involves generating random data and finding out
    whether there is white noise in the arbitrary data. Listing [2-4](#509469_1_En_2_Chapter.xhtml#PC4)
    returns random numbers and plots the autocorrelation across different lags (see
    Figure [2-1](#509469_1_En_2_Chapter.xhtml#Fig1)).


    ![../images/509469_1_En_2_Chapter/509469_1_En_2_Fig1_HTML.jpg](images/509469_1_En_2_Chapter/509469_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Random white noise test


    ```

    from pandas.plotting import autocorrelation_plot

