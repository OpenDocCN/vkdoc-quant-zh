    Introduction


    Kindly welcome to *Implementing Machine Learning for Finance*. This book is your
    guide to mastering machine and deep learning applied to practical, real-world
    investment strategy problems using Python programming. In this book, you will
    learn how to properly build and evaluate supervised and unsupervised machine learning
    and deep learning models adequate for partial algorithmic trading and investment
    portfolio and risk analysis.


    To begin with, it prudently introduces pattern recognition and future price forecasting
    exerting time-series analysis models, like the autoregressive integrated moving
    average (ARIMA) model, seasonal ARIMA (SARIMA) model, and additive model, and
    then it carefully covers the least squares model and the long-short term memory
    (LSTM) model. Also, it covers hidden pattern recognition and market regime prediction
    applying the Gaussian hidden Markov model. Third, it presents the practical application
    of the k-means model in stock clustering. Fourth, it establishes the practical
    application of the prevalent variance-covariance method and empirical simulation
    method (using Monte Carlo simulation) for value-at-risk estimation. Fifth, it
    encloses market direction classification using both the logistic classifier and
    the multilayer perceptron classifier. Lastly, it promptly presents performance
    and risk analysis for investment portfolios.


    I used Anaconda (an open source distribution of Python programming) to prepare
    the examples. The libraries covered in this book include, but are not limited
    to, the following:


    *   Auto ARIMA for time-series analysis


    *   Prophet for time-series analysis


    *   HMM Learn for hidden Markov models


    *   Yahoo Finance for web data scraping


    *   Pyfolio for investment portfolio and risk analysis


    *   Pandas for data structures and tools


    *   Statsmodels for basic statistical computation and modeling


    *   SciKit-Learn for building and validating key machine learning algorithms


    *   Keras for high-level frameworks for deep learning


    *   Pandas MonteCarlo for Monte Carlo simulation


    *   NumPy for arrays and matrices


    *   SciPy for integrals, solving differential equations, and optimization


    *   Matplotlib and Seaborn for popular plots and graphs


    This book targets data scientists, machine learning engineers, and business and
    finance professionals, including retail investors who want to develop systematic
    approaches to investment portfolio management, risk analysis, and performance
    analysis, as well as predictive analytics using data science procedures and tools.
    Prior to exploring the contents of this book, ensure that you understand the basics
    of statistics, investment strategy, Python programming, and probability theories.
    Also, install the packages mentioned in the previous list in your environment.


    Acknowledgments


    Writing a single-authored book is demanding, but I received firm support and active
    encouragement from my family and dear friends. Many heartfelt thanks to the Apress
    publishing team for all their backing throughout the writing and editing process.
    Last, humble thanks to all of you reading this; I earnestly hope you find it helpful.


    About the Author About the Technical Reviewer


    # 1. Introduction to Financial Markets and Algorithmic Trading


    This is the initial chapter of a book that presents algorithmic trading. This
    chapter carefully covers the foreign exchange (FX) market and the stock market.
    It explores how we pair, quote, and exchange official currencies. Subsequently,
    it covers the stock exchange. In addition, it presents key market participants,
    principal brokers, liquidity providers, modern technologies, and software platforms
    that facilitate the exchange of currencies and shares. Furthermore, it looks at
    the speculative nature of the FX market and stock exchange market and specific
    aspects of investment risk management. Last, it covers several machine learning
    methods that we can apply to combat problems in finance.


    ## FX Market


    The FX market represents an international market in which investors exchange currency
    for another. It does not have a principal visible location in which transactions
    occur, each investor holds their own transaction records, and each transaction
    happens electronically. Key market participants self-regulate using guidelines
    prescribed by a regulatory body within their geographic boundaries.


    ### Exchange Rate


    Each official country generally has its own currency. The currency is a class
    of payments administered and distributed by the central government and dispersed
    around their geographic boundaries. In relation to foreign trade, an individual
    or corporation that purchases foreign goods or services and sells them to their
    local market typically has to exchange currencies. We universally recognize an
    exchange rate as the ratio of the price of a local currency to a foreign currency.
    The major currencies include the US dollar ($), euro (€), Great Britain pound
    (£), Japanese yen (¥), etc. The cross rate is the price of a currency against
    another, where the US dollar is uninvolved. For instance, euro/GBP is a cross
    rate between the euro and the sterling.


    #### Exchange Rates Quotation


    An exchange rate represents the price of a currency relative to an alternative.
    We quote currencies directly or indirectly. Using the direct method, the exchange
    shows how much we have to exchange the local currency for one unit of a foreign
    currency. For instance, EUR/USD = 1.19\. The indirect method shows how much foreign
    currency trades for one unit of the local currency. For instance, USD/EUR = 0.84.'
