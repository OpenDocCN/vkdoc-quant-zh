  trans: "\n# 高斯隐马尔可夫模型\n\n高斯隐马尔可夫模型（`GaussianHMM`）假设概率分布的基础结构是正态分布。当处理来自正态分布的连续变量时，我们使用`高斯隐马尔可夫模型`。在前一章中，我们发现时间序列数据在不同时滞之间存在序列相关性。`高斯隐马尔可夫模型`更适合解决当前问题。隐马尔可夫模型是一种用于解析序列问题的无监督学习模型。在无监督学习中，我们不会对模型隐藏任何数据；而是将所有数据暴露给模型。它不需要我们将数据拆分为训练数据和测试数据。既然我们已经识别出时间序列数据的模式，就可以继续并完成模型构建。列表\
    \ 4-6 应用`fit()`方法完成了一个高斯隐马尔可夫模型（使用产生高斯发射的谱混合核）。它指定了 5 个分量、10 次迭代以及总计 0.0001 的收敛阈值。\n\
    \n```\nmodel = GaussianHMM(n_components=5, covariance_type=\"diag\", n_iter=1000)\n\
    model.fit(X)\n列表 4-6\n完成高斯隐马尔可夫模型\n```\n\n列表 4-7 预测了内部隐藏状态的序列。随后，它将序列制成表格并展示了前五个预测的隐藏状态（参见表\
    \ 4-3）。\n\n**表 4-3** 隐藏状态\n\n|   | 隐藏状态 |\n| --- | --- |\n| **0** | 1 |\n| **1**\
    \ | 1 |\n| **2** | 1 |\n| **3** | 1 |\n| **4** | 1 |\n| **...** | ... |\n| **2512**\
    \ | 1 |\n| **2513** | 1 |\n| **2514** | 3 |\n| **2515** | 1 |\n| **2516** | 1\
    \ |\n\n```\nhidden_states = model.predict(X)\npd.DataFrame(hidden_states,columns=[\"\
    hidden_state\"])\n列表 4-7\n隐藏状态\n```\n\n表 4-3 突出了最合适的隐藏状态序列的参数。但它并未提供足够的信息来结论`高斯隐马尔可夫模型`如何对时间序列数据进行建模。列表\
    \ 4-8 绘制了由`高斯隐马尔可夫模型`生成的标准普尔 500 时间序列数据内部隐藏状态的序列（见图 4-2）。\n\n![../images/509469_1_En_4_Chapter/509469_1_En_4_Fig2_HTML.jpg](img/509469_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2** 隐马尔可夫模型结果\n\n```\nnum_sample = 3000\nsample, _ = model.sample(num_sample)\n\
    plt.plot(np.arange(num_sample), sample[:,0],color=\"navy\")\nplt.xlabel(\"Samples\"\
    )\nplt.ylabel(\"States\")\nplt.xticks(rotation=45)\nplt.show()\n列表 4-8\n隐马尔可夫模型结果\n\
    ```\n\n图 4-2 展示了样本数据。大部分时间状态保持稳定。在第 500 次观测之后出现了一个小幅的峰值。样本之后最显著的峰值出现在第 1200 次观测。\n\
    \n## 均值与方差\n\n均值为我们提供了关于数据点集中趋势的大量信息，而方差则展示了数据点偏离均值的离散程度。我们同时使用均值和方差来汇总由`高斯隐马尔可夫模型`生成的最优隐藏状态序列。列表\
    \ 4-9 估计了每个内部隐藏状态的均值和方差。\n\n```\nfor i in range(model.n_components):\n    print(\"\
    {0} order hidden state\".format(i))\n    print(\"mean = \", model.means_[i])\n\
    \    print(\"var = \", np.diag(model.covars_[i]))\n    print()\n0 order hidden\
    \ state\nmean =  [-8.29728342e-01  4.41641901e+09]\nvar =  [8.50560173e+02 4.47992619e+17]\n\
    1 order hidden state\nmean =  [2.22719353e+00 3.22150428e+09]\nvar =  [1.33720438e+02\
    \ 6.16375025e+16]\n2 order hidden state\nmean =  [2.04319405e+00 3.73786775e+09]\n\
    var =  [1.79332780e+02 9.03360887e+16]\n3 order hidden state\nmean =  [9.56404042e-01\
    \ 2.50937758e+09]\nvar =  [8.46343104e+01 3.11987532e+17]\n4 order hidden state\n\
    mean =  [-1.12364778e+01  6.07623360e+09]\nvar =  [8.06282637e+03 1.77082805e+18]\n\
    列表 4-9\n隐藏状态\n```\n\n列表 4-10 绘制了每个内部隐藏状态的序列（见图 4-3）。\n\n![../images/509469_1_En_4_Chapter/509469_1_En_4_Fig3_HTML.jpg](img/509469_1_En_4_Fig3_HTML.jpg)\n\
    \n**图 4-3** 隐藏状态的个体序列\n\n```\nfig, axs = plt.subplots(model.n_components, sharex=True,\
    \ sharey=True, figsize=(15,15))\ncolours = cm.rainbow(np.linspace(0, 1, model.n_components))\n\
