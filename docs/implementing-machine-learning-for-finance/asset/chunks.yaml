- fmt: '# Pairwise Scatter Plots


    A pairwise scatter plot is typically needed to test for normality. We consider
    data as normally distributed when independent observations are near the mean value.
    Regression models assume normality: non-normal data results in negative model
    performance. In cases where the data is not normal, we may perform a data transformation,
    i.e., square root transformation for positively skewed data (a condition where
    the data is saturated to the right side of the distribution) or exponential/power
    transformation for negatively skewed data (a condition where the data is saturated
    to the left side of the distribution). There are several factors that may influence
    non-normality, i.e., missing values and outliers (presence of extreme values),
    among others. See Listing [6-5](#509469_1_En_6_Chapter.xhtml#PC5).


    ```

    sns.jointplot(x="HL_PCT",y="Adj Close",data=df,kind="reg",color="navy")

    plt.ylabel("Adj Close")

    plt.xlabel("HL_PCT")

    plt.show()

    Listing 6-5

    Highest and Lowest Price Changes and Closing Price

    ```


    Figure [6-3](#509469_1_En_6_Chapter.xhtml#Fig3) shows a straight line that cuts
    through the data points. Moreover, the data points are perfectly undistributed
    to a straight line.


    ![../images/509469_1_En_6_Chapter/509469_1_En_6_Fig3_HTML.jpg](images/509469_1_En_6_Chapter/509469_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Highest and lowest price changes and closing price scatter plot


    Listing [6-6](#509469_1_En_6_Chapter.xhtml#PC6) constructs a pairwise scatter
    plot that shows the correlation between the returns and the closing price (see
    Figure [6-4](#509469_1_En_6_Chapter.xhtml#Fig4)). The joint plot also shows that
    `HL_PCT` is negatively skewed and that `Adj Close` is positively skewed.


    ![../images/509469_1_En_6_Chapter/509469_1_En_6_Fig4_HTML.jpg](images/509469_1_En_6_Chapter/509469_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Returns and closing price scatter plot


    ```

    sns.jointplot(x="Corr",y="Adj Close",data=xy,kind="reg",color="red")

    plt.ylabel("Adj Close")

    plt.xlabel("Corr")

    plt.show()

    Listing 6-6

    Returns and Closing Price

    ```


    We can develop a formula for a straight-line relationship. Moreover, the straight
    line is not linear. Figure [6-5](#509469_1_En_6_Chapter.xhtml#Fig5) illustrates
    the association between the volume and the adjusted closing price. The figure
    also shows that the `PCT_change` follows a normal distribution (the distribution
    is bell-shaped). See Listing [6-7](#509469_1_En_6_Chapter.xhtml#PC7).


    ![../images/509469_1_En_6_Chapter/509469_1_En_6_Fig5_HTML.jpg](images/509469_1_En_6_Chapter/509469_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Volume and closing price scatter plot


    ```

    sns.jointplot(x="Corr",y="Adj Close",data=xy,kind="reg",color="red")

    plt.ylabel("Adj Close")

    plt.xlabel("Corr")

    plt.show()

    Listing 6-7

    Volume and Closing Price

    ```


    Figure [6-5](#509469_1_En_6_Chapter.xhtml#Fig5) shows a linear straight line,
    but the data points are not close to the line.


    # Eigen Matrix


    In the previous section we discovered the strength of the linear relationship
    among variables. Next, we must diagnose the severity of correlation among the
    variables using eigenvalues. The eigenvalue represents a flattened variance of
    the correlation matrix. A combination of more than two variables highly correlated
