    **代码清单 9-3** 绩效结果


    表 9-2 突出了投资者在交易亚马逊股票时所承担的风险。我们在分析中使用`SPY`股票指数作为基准。它表明年化收益率为 35.6%，累计收益率为 1995.7%。在风险方面，每日风险价值为
    3.8%，最大回撤为-34.1%。观察投资绩效结果时，我们最感兴趣的是研究三个关键比率：卡玛比率、贝塔比率和夏普比率。我们同样关注阿尔法和贝塔。下面，我们将带您了解如何衡量这些比率。表
    9-3 提供了上述关键绩效结果的高级概览。


    **表 9-3** 关键绩效结果


    | 指标 | 描述 |

    | --- | --- |

    | **卡玛比率** | 表示年化收益率除以最大回撤的估计值 |

    | **贝塔比率** | 表示在精确的无风险收益率下，投资预期收益与市场预期收益之间差异的估计值 |

    | **夏普比率** | 表示无风险利率与投资组合收益率之间差异的估计值 |

    | **阿尔法** | 表示投资收益率相对于市场关键指数的估计值 |

    | **贝塔** | 表示与投资相关的波动率的估计值 |


