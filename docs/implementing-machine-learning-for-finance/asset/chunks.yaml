    ## 数据预处理


    清单 8-4 创建了一个具有两种结果（0 和 1）的分类变量，其中 0 代表市场下跌，1 代表市场上涨。这使我们能够使用可以预测两个类别概率的分类器。我们首先定义滞后阶数，然后估计每日收益率，并将滞后收益率转换为二元类别。我们还使用
    `GridSearchCV()` 方法来标准化数据，使得均值为 0，标准差为 1。


    ```

    from sklearn.preprocessing import StandardScaler

    df["direction"] = pd.get_dummies(df["direction"])

    from sklearn import preprocessing

    x=df.iloc[::,5:8]

    y=df.iloc[::,-1]

    scaler = StandardScaler()

    x=scaler.fit_transform(x)

    清单 8-4 数据预处理

    ```


