    # HMM


    在前一章中，我们使用增广迪基-富勒检验（一种单位根检验）来检查并判断序列是否平稳。当一个序列的均值不随时间变化时，该序列就是平稳的。在该章中，我们发现该序列并不平稳。在本章中，我们将使用隐马尔可夫模型。该模型既可应用于平稳序列，也可应用于非平稳序列。它是一种生成式、无监督学习模型；它不需要标签，我们将其用于非结构化数据。我们称其为*生成式*模型，是因为它在发现序列数据中的模式后能够生成数据。随着本章内容的深入，你将对
    HMM 有更深入的了解。


    ## HMM 在金融领域的应用


    我们经常将 HMM 用于语音分析、天气预报等领域。在本章中，我们将应用 HMM 来揭示标准普尔 500 指数股价中的隐藏模式。我们将利用该模型来检测市场状态（市场中波动率低或高的时期）以及未来的市场状态。


    ## 开发 GaussianHMM


    我们在本章应用高斯混合模型主要有两个原因。首先，我们关注的是给定一个代表两种条件的类别后序列的可能性：一种是市场上涨且预计会合理上涨的条件（称为*看涨*趋势），另一种是市场下跌且预计会继续下跌的条件（称为*看跌*趋势）。其次，我们假设观测值服从已知均值和方差的高斯分布。这被称为*高斯混合*，因为共享的分布被约束为高斯分布。更一般地，我们将基于观测到的类别来一致地预测趋势的未来类别。在训练过程中，模型学习一个单一的高斯状态输出分布。之后，具有最高方差的分布会被分解，并且该过程会一直迭代，直到收敛。代码清单
    4-1 显示了标准普尔 500 指数的价格数据^(⁶)，该指数是一个股票市场指数，作为在美国证券交易所上市的 500 家全球公司的基准。表 4-1 显示了从
