- fmt: '# Multilayer Layer Perceptron


    Chapter [5](#509469_1_En_5_Chapter.xhtml) covered deep learning and its application
    in finance. Thereafter, we explained the fundamental structure of an artificial
    neural network and revealed ways in which you can combat sequential problems using
    the recurrent neural network (RNN). We developed and assessed the long short-term
    memory (LSTM) model to forecast future stock prices. In this chapter, we use a
    multilayer perceptron (MLP) classifier to estimate the probabilities of an upward
    or downward market. It comprises three layers: the input layer, which receives
    input values; the hidden layer, which transforms the values; and the output layer,
    which triggers an output value. The MLP model receives a set of input values,
    transforms them, and triggers output values in the output layer. It is basically
    a combination of multiple restricted Boltzmann machines (a neural network that
    maintains a visible layer and hidden layer). The model addresses the vanishing
    gradient problem through backward propagation, which involves estimating the gradient
    from the right to the left (the opposite of forward propagation that involves
    estimating the gradient from the left to the right).


    ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig3_HTML.png](images/509469_1_En_8_Chapter/509469_1_En_8_Fig3_HTML.png)


    Figure 8-3


    Multilayer perceptron


    Figure [8-3](#509469_1_En_8_Chapter.xhtml#Fig3) shows an MLP with three nodes
    at the visible layer, four nodes at the hidden layer, and an output layer with
    only one possible outcome. Listing [8-12](#509469_1_En_8_Chapter.xhtml#PC12) imports
    the Keras library.


    ```

    from keras import Sequential, regularizers

    from keras.layers import Dense, Dropout

    from keras.wrappers.scikit_learn import KerasClassifier

    Listing 8-12

    Import Libraries

    ```


    After importing the Keras framework, we start establishing the structure of the
    neural network.


    ## Architecture


    Listing [8-13](#509469_1_En_8_Chapter.xhtml#PC13) builds up the logical structure
    of the neural network. There are eight input variables (`High`, `Low`, `Open`,
    `Close`, `Volume`, `Adj Close`, `pct_change`, `log_ret`, `direction`), and we
    intentionally set `input_dim` as 8 and apply the sigmoid function. The sigmoid
    function operates on a set of input values and generates output values that range
    between 0 and 1. We implement the ReLu function on the hidden layer and the output
    layer. Unlike the sigmoid function, the ReLu function limits the data between
    0 and 1, and it processes the data until it invariably produces an optimal value.
    We typically use the adaptive moment estimation (Adam) optimizer over other optimizers
    because at most it generalizes data better than its predecessors, especially when
    dealing with a large dataset. It extends both from Adadelta (an optimizer that
    properly adjusts learning rates based on a moving window of the modified gradients)
    and RMSProp (estimates the notable difference between the gradients’ current weights
    and preceding weights; thereafter, it estimates the square root of the obtained
    standard deviation). Adam is straightforward; it subtly alters the adaptive learning
    rate and implements the stochastic gradient descent method (a prevalent method
    for training neural networks faster by randomly selecting terms to estimate rather
    than estimating all terms). It adequately considers substantial variations in
    the loss function. In addition, it is not computationally demanding. In summary,
    it solves the problem of slow training (which we mostly experience with other
    optimizers when there are many variables or many observations in the data).


    ```

    def create_dnn_model1(optimizer="adam"):

    model1 = Sequential()

    model1.add(Dense(8, input_dim=8, activation="sigmoid"))

    model1.add(Dense(8, activation="relu"))

    model1.add(Dense(1, activation="relu"))

    model1.compile(loss="binary_crossentropy", optimizer=optimizer, metrics=["accuracy"])

    return model1

    Listing 8-13

    Architecture

    ```


    Listing [8-14](#509469_1_En_8_Chapter.xhtml#PC14) wraps the architecture of the
    network using the `KerasClassifier()` method.


    ```

    model1 = KerasClassifier(build_fn=create_dnn_model1)

    Listing 8-14

    Wrap the Model

    ```


    ### Finalize the Model


    Listing [8-15](#509469_1_En_8_Chapter.xhtml#PC15) trains the neural network across
    64 epochs in 15 batches. An epoch represents a complete forward and backward pass,
    and a batch represents the number of samples that progressively increase throughout
    the network.


    ```

    history1 = model1.fit(x_train, y_train, validation_data=(x_val,y_val), batch_size=15,
    epochs=64)

    history1

    Listing 8-15

    Finalize the Model

    ```


    Listing [8-16](#509469_1_En_8_Chapter.xhtml#PC16) returns the key performance
    evaluation metrics (see Table [8-9](#509469_1_En_8_Chapter.xhtml#Tab9)).


    Table 8-9


    Classification Report


    |   | precision | recall | f1-score | support |

    | --- | --- | --- | --- | --- |

    | **0** | 0.468938 | 1.000000 | 0.638472 | 234.000000 |

    | **1** | 0.000000 | 0.000000 | 0.000000 | 265.000000 |

    | **accuracy** | 0.468938 | 0.468938 | 0.468938 | 0.468938 |

    | **macro avg** | 0.234469 | 0.500000 | 0.319236 | 499.000000 |

    | **weighted avg** | 0.219903 | 0.468938 | 0.299404 | 499.000000 |


    ```

    y_predmodel1 = model1.predict(x_test)

    creportmodel1 = pd.DataFrame(metrics.classification_report(y_test,y_predmodel1,
    output_dict=True)).transpose()

    creportmodel1

    Listing 8-16

    Classification Report

    ```


    Table [8-9](#509469_1_En_8_Chapter.xhtml#Tab9) highlights that the neural network
    is less accurate and precise than the logistic classifier. It also shows that
    the data is imbalanced. You can further understand how skillful the classifier
    is by looking at the loss.


    #### Training and Validation Loss Across Epochs


    Loss represents a metric that establishes the difference between actual values
    and those predicted by the model. Listing [8-17](#509469_1_En_8_Chapter.xhtml#PC17)
    plots the training and validation loss across epochs to show how the neural network
    learns to differentiate between a downward and upward market in training and in
    cross-validation (see Figure [8-4](#509469_1_En_8_Chapter.xhtml#Fig4)).


    ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig4_HTML.jpg](images/509469_1_En_8_Chapter/509469_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Training and validation loss across epochs


    ```

    plt.plot(history1.history["loss"],color="red",label="Training Loss")

    plt.plot(history1.history["val_loss"],color="green",label="Cross-Validation Loss")

    plt.xlabel("Epochs")

    plt.ylabel("Loss")

    plt.legend(loc=4)

    plt.show()

    Listing 8-17

    Training and Validation Loss Across Epochs

    ```


    Figure [8-4](#509469_1_En_8_Chapter.xhtml#Fig4) shows that at the first epoch,
    the training loss drops and remains until the 64th epoch (7.59). Meanwhile, the
    cross-validation loss remains constant across epochs (around 7.58).


    #### Training and Validation Accuracy Across Epochs


    Accuracy refers to how often a classifier correctly predicts classes. Listing
    [8-18](#509469_1_En_8_Chapter.xhtml#PC18) plots the training and validation accuracy
    to demonstrate how the neural network learns how to get the answers correct. (See
    Figure [8-5](#509469_1_En_8_Chapter.xhtml#Fig5).)


    ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig5_HTML.jpg](images/509469_1_En_8_Chapter/509469_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Training and validation accuracy across epochs


    ```

    plt.plot(history1.history["accuracy"],color="red",label="Training Accuracy")

    plt.plot(history1.history["val_accuracy"],color="green",label="Cross-Validation
    Accuracy")

    plt.xlabel("Epochs")

    plt.ylabel("Accuracy")

    plt.legend(loc=4)

    plt.show()

    Listing 8-18

    Training and Validation Accuracy Across Epochs

    ```


    Figure [8-5](#509469_1_En_8_Chapter.xhtml#Fig5) shows that both the training accuracy
    and the validation accuracy remain constant across epochs (with the training accuracy
    around 0.5291 and the cross-validation around 0.528).'
