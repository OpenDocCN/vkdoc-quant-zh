    ### 收益率


    判断一项投资是否具有吸引力的最便捷方式就是研究其收益率。收益率反映了期初价格与期末价格的变化。


    #### 年化收益率


    年化收益率是指一项资产每年产生收益的比率。我们通过研究一段时期内的收益来做出预测。代码清单 9-5 应用 `plot_annual_returns()` 方法绘制了亚马逊股票
    10 年间的年化收益率（见图 9-2）。


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig2_HTML.jpg](img/509469_1_En_9_Fig2_HTML.jpg)


    图 9-2


    亚马逊年化收益率


    ```

    pf.plot_annual_returns(amzn)

    plt.show()

    代码清单 9-5

    年化收益率

    ```


    图 9-2 显示，从 2010 年 11 月 1 日到 2020 年 11 月 2 日，亚马逊股票的年化收益率并不稳定。年化收益率存在波动。在 2014 年，该投资组合表现最差。然而，在接下来的一年里，年化收益率超过了
    100%。


    ### 滚动收益率


    代码清单 9-6 返回了 10 年间的回测累计收益率（见图 9-3）。与年化收益率不同，我们关注的是累计收益率。Pyfolio 通过评估当前收益率与先前收益率（代表投资获得的总收益）相对于股票成本的显著差异，来估算随时间变化的累计收益率。


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig3_HTML.jpg](img/509469_1_En_9_Fig3_HTML.jpg)


    图 9-3


    滚动收益率


    ```

    pf.plot_rolling_returns(amzn)

    plt.show()

    代码清单 9-6

    滚动收益率

    ```


    图 9-3 显示，从 2020 年 11 月 1 日起，累计收益率有明确的微小增幅。2016 年，开始出现一个势头渐强的上升趋势。


    #### 月收益率


    月收益率是指一项资产每月产生收益的比率。我们按月审视收益率，以识别历史行为，并谨慎地做出短期至中期的预测。代码清单 9-7 应用 `plot_monthly_returns_heatmap()`
    方法绘制了亚马逊股票 10 年间的月收益率热力图（见图 9-4）。


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig4_HTML.jpg](img/509469_1_En_9_Fig4_HTML.jpg)


    图 9-4


    月收益率热力图


    ```

    pf.plot_monthly_returns_heatmap(amzn)

    plt.show()

    代码清单 9-7

    月收益率热力图

    ```


    图 9-4 显示，从 2010 年 11 月 1 日到 2020 年 11 月 2 日，亚马逊股票的月收益率并不稳定。在 2010 年的前九个月，收益率为零，这与
    2020 年的最后两个月相同。这是因为我们提取了从 2010 年 11 月 1 日到 2020 年 11 月 2 日的数据。图 9-4 指出，收益率在 2020
    年 4 月达到峰值（27%）。2018 年 10 月，该股票表现最差，月收益率为-20%。此外，从 2017 年到 2020 年，该股票显示出正收益，这与每年的第四个月情况相同。为了清晰起见，我们仔细检查了数据分布以总结月收益率。最常见的分布是正态分布。当实际值集中在真实均值附近时，数据服从正态分布。代码清单
    9-8 应用 `plot_monthly_hist()` 方法绘制了亚马逊股票月收益率直方图（见图 9-5）。


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig5_HTML.jpg](img/509469_1_En_9_Fig5_HTML.jpg)


    图 9-5


    月收益率直方图


    ```

    pf.plot_monthly_returns_dist(amzn)

    plt.show()

    代码清单 9-8

    月收益率直方图

    ```


    实际的月收益率分布在均值周围。我们可以使用样本均值来充分概括这些数据。从 2010 年 11 月 1 日到 2020 年 11 月 2 日，亚马逊股票总体上呈现出长期的上升趋势。


    ## 结论


    本章为本书的结尾章节，介绍了如何使用机器学习和深度学习来解决金融问题，特别是投资管理问题。它涵盖了使用名为 Pyfolio 的 Python 包客观分析投资组合表现的多重方法。首先，它讨论了风险的概念以及识别风险暴露的技术。最后，它涵盖了年化收益率和月收益率的估算。我们并不局限于本章所涉及的包。我们可以将这些包与
    Zipline 和 Quantopian 一起使用来回测投资策略。

