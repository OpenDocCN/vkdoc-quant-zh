    ```


    Figure [2-2](#509469_1_En_2_Chapter.xhtml#Fig2) indicates for lag 1 there is a
    sharp decline, and after the 500th lag the line goes lower and approaches zero.
    Since all autocorrelations are not equal to zero, we can confirm that there is
    no white noise.


    ## Test for Stationary


    The presence of the stochastic (or random) process in ordered data may affect
    the conclusions. Listing [2-6](#509469_1_En_2_Chapter.xhtml#PC6) checks whether
    the series is stationary using a unit root test called the augmented Dickey-Fuller
    test (see Table [2-2](#509469_1_En_2_Chapter.xhtml#Tab2)). A series is stationary
    when the mean value of the series data is zero, which means the observations do
    not vary across time. With the augmented Dickey-Fuller (`ADF`) test when the p-value
    is greater than 0.05, we do not reject the hypothesis.


    The hypothesis of an ADF test is written as follows:


    - *Null hypothesis:* There is no unit root.

    - *Alternative hypothesis:* There is a unit root.


    A series is nonstationary when the `ADF F%` statistics is below zero and the p-value
    is less than 0.05.


    ```

    from statsmodels.tsa.stattools import adfuller

    adfullerreport = adfuller(train["Adj Close"])

    adfullerreportdata = pd.DataFrame(adfullerreport[0:4],

    columns = ["Values"],

    index=["ADF F% statistics",

    "P-value",

    "No. of lags used",

    "No. of observations"])

    adfullerreportdata

    Listing 2-6

    Augmented Dickey-Fuller Test

    ```


    **Table 2-2** F Statistics


    |   | Values |

    | --- | --- |

    | **ADF F% statistics** | -1.267857 |

    | **P-value** | 0.643747 |

    | **No. of lags used** | 6.000000 |

    | **No. of observations** | 2078.000000 |


    Table [2-2](#509469_1_En_2_Chapter.xhtml#Tab2) highlights that the F statistics
    result is negative and the p-value is greater than 0.05. We do not reject the
    null hypothesis; the series is nonstationary. This entails that the series requires
    differencing.


    ### Autocorrelation Function


    Listing [2-7](#509469_1_En_2_Chapter.xhtml#PC7) determines the serial correlation
    between y and `y[t]` (`y[t]` entails that the observation *y* is measured in time
    period [t]). We use the autocorrelation function to measure the degree to which
    present values of a series are related to preceding values when we consider the
    trend, seasonality, cyclic, and residual components.


    Figure [2-3](#509469_1_En_2_Chapter.xhtml#Fig3) shows that most spikes are not
    statistically significant. In addition, we use the partial autocorrelation function
    (`PACF`) to further examine the partial serial correlation between lags.


    ![../images/509469_1_En_2_Chapter/509469_1_En_2_Fig3_HTML.jpg](images/509469_1_En_2_Chapter/509469_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Autocorrelation


    ```

    from statsmodels.graphics.tsaplots import plot_acf

    plot_acf(train["Adj Close"])

    plt.xlabel("Lag")

    plt.ylabel("ACF")

    plt.show()

    Listing 2-7

    Autocorrelation

    ```'
