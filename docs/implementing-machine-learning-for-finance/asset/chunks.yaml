    Symbol\")\ncloserv\n代码清单 5-6\n各簇收益率与波动率\n```\n\n为了评估 k-means 的性能，我们采用了轮廓系数法，该方法会计算每个样本的簇内平均距离与最近簇的平均距离。计算得到的值即为轮廓系数，用于衡量聚类的分离程度。轮廓系数的取值范围是\
    \ -1 到 1。具体来说，-1 表示模型性能差，1 表示模型性能最优。代码清单 5-7 计算了该得分。\n\n```\nfrom sklearn import\
    \ metrics\ny_predkmeans = pd.DataFrame(kmeans.predict(X))\ny_predkmeans = y_predkmeans.dropna()\n\
    metrics.silhouette_score(X, y_predkmeans)\n0.4260002825147118\n代码清单 5-7\n计算轮廓系数\n\
    ```\n\n轮廓系数为 0.42。该得分表明模型未能充分解释数据。\n\n## 结论\n\n本章介绍了一种无监督学习模型，该模型有助于投资者更好地管理风险并筛选一组表现最佳的资产。我们使用\
    \ k-means 模型将数据点分配到不同的簇中，并利用轮廓系数评估模型性能。经过仔细分析后发现，该模型展现了良好聚类模型的特征。轮廓系数更接近 1 而非\
    \ -1。然而，模型仍有改进空间。部分簇之间存在重叠，但重叠程度不足以影响结论的有效性。\n"
- fmt: '# 6. Future Price Prediction Using Linear Regression


    This chapter introduces the parametric method, also called the *linear regression
    method*. We use this method to determine the nature of the relationship between
    an independent variable (continuous or categorical) and a dependent variable (always
    continuous). Whereas independent variables are continuous variables or categorical
    variables, a dependent variable is inevitably a continuous variable. It investigates
    how a change in an independent variable influences a change in a dependent variable.
    The most conventional model for finding estimates of an intercept and a slope
    is the least squared model. We express the formula as shown in Equation [6-1](#509469_1_En_6_Chapter.xhtml#Equ1).


    ![$$ \hat{y}={\beta}_0+{\beta}_1{X}_1+{\varepsilon}_i $$](images/509469_1_En_6_Chapter/509469_1_En_6_Chapter_TeX_Equ1.png)


    (Equation 6-1)


    Here, ![$$ \hat{y} $$](images/509469_1_En_6_Chapter/509469_1_En_6_Chapter_TeX_IEq1.png)
    represents an expected dependent variable, *β*[0] represents an intercept, *β*[1]
    represents a slope, *X*[1] represents an independent variable, and *ε*[*i*] represents
    the error terms (the residual for the i^(th) of *n* data points), expressed as
    shown in Equation [6-2](#509469_1_En_6_Chapter.xhtml#Equ2).


    ![$$ {e}_i={y}_i-\hat{y_i} $$](images/509469_1_En_6_Chapter/509469_1_En_6_Chapter_TeX_Equ2.png)


    (Equation 6-2)


    The least squares model ensures that the sum squares of residuals are small. We
    find the sum squares of residuals by applying the property in Equation [6-3](#509469_1_En_6_Chapter.xhtml#Equ3).


    ![$$ {e}_1^2+{e}_2^2\dots {e}_i^2 $$](images/509469_1_En_6_Chapter/509469_1_En_6_Chapter_TeX_Equ3.png)


    (Equation 6-3)


    This property assumes that residuals are always equal to zero and estimates are
    unbiased.


    ## Linear Regression in Practice


    In this chapter, we predict the closing price of [gold](https://finance.yahoo.com/quote/GC%253DF/)
    based on the highest and lowest price changes and returns. Listing [6-1](#509469_1_En_6_Chapter.xhtml#PC1)
    scraps data from Yahoo Finance.


    ```

    from pandas_datareader import data

    start_date = ''2010-11-01''

    end_date = ''2020-11-01''

    ticker = ''GC=F''

    df = data.get_data_yahoo(ticker, start_date, end_date)

    df_orig=df

    Listing 6-1

    Scraped Data

    ```


    Listing [6-2](#509469_1_En_6_Chapter.xhtml#PC2) calculates the highest and lowest
    price changes and the returns of the stock price (see Table [6-1](#509469_1_En_6_Chapter.xhtml#Tab1)).


    Table 6-1 Dataset


    | Date | Adj Close | HL_PCT | PCT_change | Volume |

    | --- | --- | --- | --- | --- |

    | **2010-11-01** | 1350.199951 | 0.711013 | -0.742490 | 40.0 |

    | **2010-11-02** | 1356.400024 | 0.095846 | -0.029483 | 17.0 |

    | **2010-11-03** | 1337.099976 | 2.370799 | -1.058166 | 135.0 |

    | **2010-11-04** | 1382.699951 | 1.728504 | 1.030248 | 109.0 |

    | **2010-11-05** | 1397.300049 | 1.417022 | 0.474588 | 109.0 |


    ```

    df[''HL_PCT'']=(df[''High'']-df[''Low''])/df[''Adj Close''] *100.0

    df[''PCT_change'']= (df[''Adj Close'']-df[''Open''])/df[''Open''] *100.0

    df = df[[''Adj Close'',''HL_PCT'',''PCT_change'',''Volume'']]

    date = df.index

    df.head()

    Listing 6-2

    Calculate the Highest and Lowest Price Change and Returns

    ```


    ## Correlation Methods


    Correlation estimates the apparent strength of a linear relationship between an
    independent variable and a dependent variable. Prior to training a regression
    model, we must identify the severity of the association between variables since
    the degree of severity influences the performance of a model. There are three
    principal correlation methods for determining the correlation among variables:
    the Pearson correlation method, which estimates the correlation among continuous
    variables; the Kendall correlation method, which estimates the association between
    rankings and ordinal variables; and the Spearman correlation method, which also
    estimates the association between rankings of a combination of variables.


    ### The Pearson Correlation Method


    Given that we are dealing with continuous variables, we use the Pearson correlation
    method, which produces values that range from -1 to 1. Here, -1 shows a strong
    negative correlation relationship, 0 shows no correlation relationship, and 1
    shows a strong positive correlation relationship. Listing [6-3](#509469_1_En_6_Chapter.xhtml#PC3)
    produces the Pearson correlation matrix. We use a heatmap to visually represent
    the matrix (see Figure [6-1](#509469_1_En_6_Chapter.xhtml#Fig1)). To install `seaborn`
    in the conda environment, use `conda install -c anaconda seaborn`.


    ![../images/509469_1_En_6_Chapter/509469_1_En_6_Fig1_HTML.jpg](images/509469_1_En_6_Chapter/509469_1_En_6_Fig1_HTML.jpg)


    Figure 6-1 Pearson correlation matrix heatmap


    ```

    import seaborn as sns

    dfcorr = df.corr(method="pearson")

    sns.heatmap(dfcorr, annot=True,annot_kws={"size":12},cmap="coolwarm")

    plt.show()

    Listing 6-3

    Pearson Correlation Matrix

    ```


    There is a line of 1s that goes from the top left to the bottom right. This means
    that each variable perfectly correlates with itself. The correlation is 0.98 (which
    is close to 1).


    ## The Covariance Method


    Listing [6-4](#509469_1_En_6_Chapter.xhtml#PC4) estimates joint variability between
    the two variables. It estimates how variables vary together (see Figure [6-2](#509469_1_En_6_Chapter.xhtml#Fig2)).


    ![../images/509469_1_En_6_Chapter/509469_1_En_6_Fig2_HTML.jpg](images/509469_1_En_6_Chapter/509469_1_En_6_Fig2_HTML.jpg)


    Figure 6-2 Covariance matrix heatmap


    ```

    dfcov =df.cov()

    sns.heatmap(dfcov, annot=True,annot_kws={"size":12},cmap="coolwarm")

    plt.show()

    Listing 6-4

    Estimate and Plot a Covariance Matrix

    ```


    The covariance matrix confirms more positive joint variability. When we use the
    Pearson correlation method, we have to first find the covariance since the coefficients
    of the method are the covariance between two variables divided by their deviation
    away from the mean value.'
