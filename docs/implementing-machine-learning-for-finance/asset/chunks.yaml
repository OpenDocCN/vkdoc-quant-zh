    ```\n\n`GaussianHMM` 在时间序列数据建模方面表现良好；然而，交易量的实际值与模型预测值之间存在微小的差异。\n\n## 结论\n\n本章介绍了隐马尔可夫模型。我们巧妙地涵盖了使用光谱核设计和开发\
    \ HMM 的实用方法，该光谱核可产生高斯发射以应对复杂的序贯问题。我们严格地将该模型应用于标普 500 指数的时间序列数据，以估算内部隐藏状态的最佳序列。在仔细审查模型性能后，我们注意到该模型能够熟练地识别标普\
    \ 500 指数价格和交易量中的隐藏模式。\n\n脚注 1\n\n# 5. 股票聚类\n\n投资者选择的股票组合会影响投资组合的业绩。有些资产投资风险极高，而另一些则不然。高风险资产是指那些价格在短期内剧烈波动的资产。为了保障资本安全，投资者可能会选择一组股票，而不是投资于单只股票或单一类别的股票。由于可供选择的股票众多，投资者通常很难挑选出一组表现最优的股票。为了找到一组具有相似性的股票，我们使用一种称为*聚类分析*的无监督学习技术。它涉及基于相似特征对数据点进行分组。最流行的聚类分析模型是\
    \ k-means 模型。\n\n## 投资组合多元化\n\n投资者应当谨慎行事，不要将所有资本都投入到一个利益领域。他们可以利用投资组合多元化来保障资本安全。这涉及将资金配置到不同行业、板块、地理区域等资产上。保守型投资者通过投资于风险较低、盈利能力更强的股票来实现投资组合多元化。他们确保自己的策略与风险承受能力相匹配，并投资于波动性最小的表现最佳的股票。\n\
    \n## 股市波动性\n\n我们在前几章中提到，外汇市场和股票市场的价格并非恒定不变。由于价格随时间波动，因此存在随机性因素。就流动性而言，外汇市场是流动性最强的市场，其次是股票市场，依此类推。做市商通过大规模交易和销售活动的交易量来驱动价格变动。\n\
    \n投资差价合约 (CFD) 和交易所交易基金 (ETF) 涉及风险。资产价格可能朝相反方向变动，从而导致资本损失。投资者应当拥有稳健的风险管理策略。理想情况下，他们必须根据特定标准选择最佳股票。最常见的标准是波动性，这是对价格在短期内剧烈变化程度的估计。我们基本假设，如果市场流动性增加，则波动性增加，反之亦然。我们通过估算对数收益率和贝塔系数的标准差来衡量波动性。除了跨国金融机构的大规模交易和销售活动外，还有其他影响波动性的因素，例如社会事件、经济事件、节假日、流行病、劳工骚乱、自然灾害、战争等。\n\
    \n## K-Means 聚类\n\nK-means 模型将数据划分为 *k* 个（簇），每个簇具有最近的均值（质心）；然后计算子组之间的距离以生成一个簇。它同时缩小簇内距离并增大簇间距离。其公式如方程\
    \ 5-1 所示。\n\n![$$ Dis\\left({x}_1,{x}_2\\right)=\\sqrt{\\sum_{i=0}^n{\\left({x}_{1i}-{y}_{2i}\\\
    right)}²} $$](img/509469_1_En_5_Chapter_TeX_Equ1.png)\n\n(方程 5-1)\n\n`Dis(x1,\
    \ x2)` 反映了数据点之间的距离。基于方程 5-1 中的公式，我们关注的是找出独立数据点（表示为坐标 (`x1`, `y1`) 和 (`x2`, `y2`)）偏离均值（中心）的离差平方和的平方根。它找到初始的\
    \ `k`（簇的数量），估算簇之间的距离，然后将数据点分配到相邻的质心。它将数据点划分为 `k` 个具有相似性的组。在空间中估算相似性最常用的方法是欧几里得距离（它关联了角度和距离）。该聚类模型需要在集合上指定数值。数据划分依赖于簇的数量。该算法随机初始化质心。\n"
