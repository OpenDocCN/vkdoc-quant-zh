    ## 理解蒙特卡洛模拟


    蒙特卡洛模拟使用重采样技术来解决序列问题。它重构真实世界的情境，以识别和理解先前发生事件的结果，并预测未来发生的事件。它还使我们能够试验不同的投资策略。不仅如此，它对来自正态分布的随机变量进行重复测量，以确定每个输出的概率，然后分配一个置信区间输出。


    ### 蒙特卡洛模拟在金融中的应用


    我们使用蒙特卡洛模拟来评估策略的严谨性。它帮助我们确定该策略是否过于乐观。一个过于乐观的策略在环境参数调整时会停止产生最优回报。它使我们能够模拟市场，识别我们所面临的风险。在这个例子中，我们只关注一只股票——诺斯罗普·格鲁曼公司的股票。参见清单
