    In the preceding chapter, we used the augmented Dickey-Fuller test (a unit root
    test) to inspect and determine whether a series was stationary. A series is stationary
    when the mean value does not vary across time. In that chapter, we found the series
    to be not stationary. In this chapter, we use the hidden Markov model. We can
    use this model for a stationary or nonstationary series. It is a generative, unsupervised
    learning model; it does not require labels, and we resort to it for unstructured
    data. We call it *generative* because it generates data after uncovering patterns
    in sequential data. You will learn more about HMM as you progress through this
    chapter.


    ## HMM Application in Finance


    We frequently use HMM for speech analysis, weather forecasting, etc. In this chapter,
    we will apply HMM to uncover hidden patterns in the stock prices of the S&P 500
    index. We will exploit this model to detect market regimes (periods in which there
    is low or high volatility in the market) and future regimes.


    ## Develop a GaussianHMM


    There are two principal reasons we will apply the Gaussian mixture model in this
    chapter. To begin with, we are interested in the likelihood of a series given
    a class representing two conditions: a condition in which the market is rising
    and expected to reasonably rise (called a *bullish* trend) and a condition in
    which the market is declining and is expected to decline (called a *bear* trend).
    Second, we assume that the observations are Gaussian with known variance and mean.
    This is referred to as a *Gaussian mixture* because of the shared distributions
    that are constrained to Gaussian. More generally, we will unanimously predict
    future classes of the trend based on observed classes. In the training process,
    the model learns a single Gaussian state output distribution. Thereafter, a distribution
    with the highest variance is fragmented, and the process iterates until a junction.
