    Besides trends and seasonality, there are other factors that influence price changes.
    For instance, during public holidays, trading activities differ from normal trading
    days. Both the ARIMA and SARIMA models do not take into consideration the effects
    of public holidays. The additive model addressed this challenge. It considers
    daily, weekly, and yearly seasonality and nonlinear trends. It assumes that trends
    and cycles are one term and seamlessly adds the effects of official public holidays
    and an error. The formula is written mathematically as in Equation [2-1](#509469_1_En_2_Chapter.xhtml#Equ1).


    ![$$ y=g(t)+s(t)+h(t)+{\varepsilon}_i $$](images/509469_1_En_2_Chapter/509469_1_En_2_Chapter_TeX_Equ1.png)


