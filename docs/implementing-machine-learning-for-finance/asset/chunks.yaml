    # 多层感知机


    第 5 章涵盖了深度学习及其在金融领域的应用。随后，我们阐述了人工神经网络的基本结构，并揭示了如何利用循环神经网络（RNN）应对序列问题。我们开发并评估了长短期记忆（LSTM）模型来预测未来股票价格。在本章中，我们将使用多层感知机（MLP）分类器来估计市场上行或下行的概率。它由三层组成：接收输入值的输入层、转换数值的隐藏层以及触发输出值的输出层。MLP
    模型接收一组输入值，对其进行转换，并在输出层触发输出值。它本质上是多个受限玻尔兹曼机（一种保持可见层和隐藏层的神经网络）的组合。该模型通过反向传播解决了梯度消失问题，反向传播涉及从右到左估计梯度（与从左到右估计梯度的前向传播相反）。


    ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig3_HTML.png](img/509469_1_En_8_Fig3_HTML.png)


    图 8-3


    多层感知机


    图 8-3 展示了一个在可见层有三个节点、隐藏层有四个节点、输出层只有一个可能结果的 MLP。代码清单 8-12 导入了 Keras 库。


    ```

    from keras import Sequential, regularizers

    from keras.layers import Dense, Dropout

    from keras.wrappers.scikit_learn import KerasClassifier

    代码清单 8-12

    导入库

    ```


    导入 Keras 框架后，我们开始建立神经网络的结构。


    ## 架构


    代码清单 8-13 构建了神经网络的逻辑结构。有八个输入变量（`High`、`Low`、`Open`、`Close`、`Volume`、`Adj Close`、`pct_change`、`log_ret`、`direction`），我们有意将`input_dim`设置为
    8，并应用 sigmoid 函数。sigmoid 函数对一组输入值进行操作，并生成介于 0 和 1 之间的输出值。我们在隐藏层和输出层上实现了 ReLu 函数。与
    sigmoid 函数不同，ReLu 函数将数据限制在 0 和 1 之间，并处理数据直至其始终产生最优值。我们通常更倾向于使用自适应矩估计（Adam）优化器而非其他优化器，因为它在大多数情况下，尤其是在处理大型数据集时，比其前辈能更好地泛化数据。它同时扩展自
    Adadelta（一种基于修正梯度的移动窗口适当调整学习率的优化器）和 RMSProp（估计梯度的当前权重与前序权重之间的显著差异；然后估计所获标准差的平方根）。Adam
    很直接；它巧妙地改变自适应学习率并实现随机梯度下降法（一种通过随机选择估计项而非估计所有项来更快训练神经网络的流行方法）。它充分考虑了损失函数中的显著变化。此外，它的计算量不大。总之，它解决了训练缓慢的问题（当数据中有许多变量或许多观测值时，我们通常在其他优化器中会遇到这个问题）。


    ```

    def create_dnn_model1(optimizer="adam"):

    model1 = Sequential()

    model1.add(Dense(8, input_dim=8, activation="sigmoid"))

    model1.add(Dense(8, activation="relu"))

    model1.add(Dense(1, activation="relu"))

    model1.compile(loss="binary_crossentropy", optimizer=optimizer, metrics=["accuracy"])

    return model1

    代码清单 8-13

    架构

    ```


    代码清单 8-14 使用`KerasClassifier()`方法封装了网络的架构。


    ```

    model1 = KerasClassifier(build_fn=create_dnn_model1)

    代码清单 8-14

    封装模型

    ```


    ### 最终确定模型


    代码清单 8-15 在 15 个批次中训练神经网络，共 64 个周期。一个周期代表一次完整的前向和反向传播，一个批次代表在网络中逐步增加的样本数量。


    ```

    history1 = model1.fit(x_train, y_train, validation_data=(x_val,y_val), batch_size=15,
    epochs=64)

    history1

    代码清单 8-15

    最终确定模型

    ```


    代码清单 8-16 返回关键性能评估指标（见表 8-9）。


    表 8-9


    分类报告


    |   | precision | recall | f1-score | support |

    | --- | --- | --- | --- | --- |

    | **0** | 0.468938 | 1.000000 | 0.638472 | 234.000000 |

    | **1** | 0.000000 | 0.000000 | 0.000000 | 265.000000 |

    | **accuracy** | 0.468938 | 0.468938 | 0.468938 | 0.468938 |

