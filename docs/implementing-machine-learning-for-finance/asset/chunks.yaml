    ## Eigen Matrix


    In the previous section we discovered the strength of the linear relationship
    among variables. Next, we must diagnose the severity of correlation among the
    variables using eigenvalues. The eigenvalue represents a flattened variance of
    the correlation matrix. A combination of more than two variables highly correlated
    may reduce the predicted power of the model. An eigen matrix is a convenient tool
    in model selection. Table [6-2](#509469_1_En_6_Chapter.xhtml#Tab2) shows an equivalent
    number of eigenvalues as the variables. An eigenvalue less than 0 indicates no
    multicollinearity; between 10 and 100 shows moderate multicollinearity, and over
    100 shows extreme multicollinearity. Listing [6-8](#509469_1_En_6_Chapter.xhtml#PC8)
    returns the eigen matrix. Multicollinearity is a problem in which more than two
    variables are highly correlated.


