- fmt: '### Confusion Matrix


    We typically use a confusion matrix to identify two types of errors: the false
    positive, which incorrectly predicts that an event took place, and the false negative,
    which incorrectly predicts an event that never happened. It also highlights the
    true positive, which correctly predicts an event that took place, and the true
    negative, which correctly predicts an event that never took place. Listing [8-8](#509469_1_En_8_Chapter.xhtml#PC8)
    constructs a confusion matrix (see Table [8-5](#509469_1_En_8_Chapter.xhtml#Tab5)).


    ```

    from sklearn import metrics

    cmatlogreg = pd.DataFrame(metrics.confusion_matrix(y_test,y_predlogreg),

    index=["Actual: Sell","Actual: Buy"],

    columns=("Predicted: Sell","Predicted: Buy"))

    cmatlogreg

    Listing 8-8

    Confusion Matrix

    ```


    Table [8-5](#509469_1_En_8_Chapter.xhtml#Tab5) does not tell us much besides giving
    us a count of actual "sell" and actual "buy," and predicted "sell" and predicted
    "buy." To better understand how the logistic classifier works, we use the classification
    report.


    Table 8-5

    Confusion Matrix Estimates


    |   | Predicted: Sell | Predicted: Buy |

    | --- | --- | --- |

    | **Actual: Sell** | 234 | 0 |

    | **Actual: Buy** | 0 | 265 |


    ### Classification Report


    Table [8-8](#509469_1_En_8_Chapter.xhtml#Tab8) provides sufficient details about
    the classifier''s performance. It tabulates the accuracy (how often a classifier
    gets predictions right), precision (how often a classifier is correct), F-1 score
    (the harmonic mean value of precision and recall), and support (the number of
    samples of the actual response in that class). It also shows whether there is
    an imbalance in the data. To understand how this works, in this section we show
    you how to estimate both accuracy and precision (also refer to Table [8-6](#509469_1_En_8_Chapter.xhtml#Tab6)).


    ![$$ Accuracy= TP+ TN/ TP+ TN+ FP+ FN $$](images/509469_1_En_8_Chapter/509469_1_En_8_Chapter_TeX_Equ1.png)

    (Equation 8-1)


    ![$$ Precision= TP/ TP+ FP $$](images/509469_1_En_8_Chapter/509469_1_En_8_Chapter_TeX_Equ2.png)

    (Equation 8-2)


    Table 8-6

    Understanding Confusion Matrix Estimates


    | Metric | Description |

    | --- | --- |

    | **TP** | Representing true positives (how many times the classifier predicted
    a "sell" signal when it was a "sell" signal) |

    | **TN** | Representing true negatives (how many times the classifier predicted
    a "buy" signal when it was a "buy" signal) |

    | **FP** | Representing false positives (how many times the classifier predicted
    a "sell" signal when it was a "buy" signal) |

    | **FP** | Representing false negatives (how many times the classifier predicted
    a "buy" signal when it was a "sell" signal) |


    To understand how this works, look at Table [8-6](#509469_1_En_8_Chapter.xhtml#Tab6).
    Also refer to Table [8-7](#509469_1_En_8_Chapter.xhtml#Tab7).


    Table 8-7

    How to Obtain Confusion Matrix Estimates


    |   | Predicted: Sell | Predicted: Buy |

    | --- | --- | --- |

    | **Actual: Sell** | TP | FP |

    | **Actual: Buy** | FN | TN |


    Listing [8-9](#509469_1_En_8_Chapter.xhtml#PC9) shows the classification report
    (see Table [8-8](#509469_1_En_8_Chapter.xhtml#Tab8)).


    Table 8-8

    Classification Report


    |   | precision | recall | f1-score | support |

    | --- | --- | --- | --- | --- |

    | **0** | 1.0 | 1.0 | 1.0 | 256.0 |

    | **1** | 1.0 | 1.0 | 1.0 | 243.0 |

    | **accuracy** | 1.0 | 1.0 | 1.0 | 1.0 |

    | **macro avg** | 1.0 | 1.0 | 1.0 | 499.0 |

    | **weighted avg** | 1.0 | 1.0 | 1.0 | 499.0 |


    ```

    creportlogreg =pd.DataFrame(metrics.classification_report(y_test,y_predlogreg,output_dict=True)).transpose()

    creportlogreg

    Listing 8-9

    Classification Report

    ```


    Table [8-8](#509469_1_En_8_Chapter.xhtml#Tab8) highlights that the logistic classifier
    is accurate 100 percent of the time (the accuracy is at 1.0). This also shows
    there is an imbalance in the data. We will not depend on the accuracy score to
    assess its performance.


    ### ROC Curve


    We use the ROC curve to find the area under the curve (AUC). ROC stands for "receiver
    operating characteristic," which shows the extent to which the classifier distinguishes
    between classes. The `roc_curve()` method takes the actual classes and probabilities
    of each class to develop the curve. Listing [8-10](#509469_1_En_8_Chapter.xhtml#PC10)
    constructs an ROC curve to summarize the trade-offs between the false positive
    rate and the true positive rate across different thresholds (see Figure [8-1](#509469_1_En_8_Chapter.xhtml#Fig1)).


    ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig1_HTML.jpg](images/509469_1_En_8_Chapter/509469_1_En_8_Fig1_HTML.jpg)

    Figure 8-1

    ROC curve


    ```

    y_predlogreg_proba = logreg.predict_proba(x_test)[::,1]

    fprlogreg, tprlogreg, _ =metrics.roc_curve(y_test,y_predlogreg_proba)

    auclogreg = metrics.roc_auc_score(y_test, y_predlogreg_proba)

    plt.plot(fprlogreg, tprlogreg, label="AUC: "+str(auclogreg),color="navy")

    plt.plot([0,1],[0,1],color="red")

    plt.xlim([0.00,1.01])

    plt.ylim([0.00,1.01])

    plt.xlabel("Specificity")

    plt.ylabel("Sensitivity")

    plt.legend(loc=4)

    plt.show()

    Listing 8-10

    ROC Curve

    ```


    The AUC score is greater than 0.80. This means the logistic classifier is skillful
    in distinguishing classes. Ideally, we want a classifier that has an AUC score
    that is closer to 1.


    ### Learning Curve


    Figure [8-2](#509469_1_En_8_Chapter.xhtml#Fig2) has two axes: the training set
    size on the x-axis and the accuracy score on the y-axis. It illustrates how the
    classifier learns to make accurate predictions as we progressively increase the
    data. See Listing [8-11](#509469_1_En_8_Chapter.xhtml#PC11).


    ![../images/509469_1_En_8_Chapter/509469_1_En_8_Fig2_HTML.jpg](images/509469_1_En_8_Chapter/509469_1_En_8_Fig2_HTML.jpg)

    Figure 8-2

    Learning curve


    ```

    from sklearn.model_selection import learning_curve

    trainsizelogreg, trainscorelogreg, testscorelogreg =learning_curve(logreg, x,
    y, cv=5, n_jobs=5,train_sizes=np.linspace(0.1,1.0,50))

    trainscorelogreg_mean = np.mean(trainscorelogreg,axis=1)

    testscorelogreg_mean = np.mean(testscorelogreg,axis=1)

    plt.plot(trainsizelogreg,trainscorelogreg_mean,color="red",label="Training score",
    alpha=0.8)

    plt.plot(trainsizelogreg,testscorelogreg_mean,color="navy",label="Cross validation
    score", alpha=0.8)

    plt.xlabel("Training set size")

    plt.ylabel("Accuracy")

    plt.legend(loc=4)

    plt.show()

    Listing 8-11

    Learning Curve

    ```


    Figure [8-2](#509469_1_En_8_Chapter.xhtml#Fig2) conveys that the classifier commits
    many mistakes in the foundation phase of the training. The average accuracy score
    surges as we increase the training set size, and the training score is predominantly
    beneath the cross-validation score.'
