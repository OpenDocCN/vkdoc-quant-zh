    No desk dealing (NDD) brokers do not pass on investors’ orders through desk dealing.
    They also do not take the other side of the trade executed by investors. To generate
    revenue, they charge a small commission and/or slightly influence the spread.
    There are two principal NDD brokers, namely: 1) electronic communications network
    brokers and 2) straight-through processing brokers.


    ###### Electronic Communications Network Brokers


    Electronic communications network (ECN) brokers ensure investors’ orders interact
    with the orders of other investors in the network. Traditionally, investors include
    commercial banks, institutional investors, hedge funds, etc. They trade against
    each other by offering bid prices and asking prices. To generate revenue, they
    call for a small commission and attract an enormous pool of investors through
    robust marketing initiatives.


    ###### Straight-Through Processing Brokers


    Straight-through processing (STP) brokers direct investors’ orders to liquidity
    providers with access to the interbank market. At most, these brokers favorably
    get many bid prices and ask prices from many liquidity providers such as Citibank,
    Barclays Bank, Morgan Stanley, among others, who carefully sort them and then
    offer investors a price with a markup. To generate revenue, they call for a hefty
    commission. Unlike the two types of brokerage firms mentioned earlier, these brokers
    are not concerned with influencing trading activities.


    ### Understanding Leverage and Margin


    The FX market offers more excessive leverage compared to the stock market. Leverage
    represents the amount that brokers loan investors to transact. It exposes an investor
    to a position that they would not have with their cash balance. Brokers offer
    trading accounts that use leverage through margin trading. The margin represents
    the difference between the total value of the positions held and the total value
    of the loan. Margin quantity increases as a result of a decrease in leverage or
    vice versa. Leverage enables investors to execute numerous trades they would ordinarily
    trade using the current account; you can basically look at it as credit without
    the requirement of collateral. It is often depicted in a ratio. Standard trading
    accounts have leverage types that range from 1:10 to 1:100\. However, some brokerages
    do offer accounts with leverage up to 1:1000\. The lower the ratio, the higher
    the capital needed to execute a trade. Investors exert leverage to generate more
    returns with slight price changes. For instance, an account with 1:1000 enables
    investors to execute numerous trades compared to 1:10\. Also, the higher leveraged
    accounts amplify profits and magnify losses. To some extent, an account’s leverage
    type gives a slight idea of an investors’ risk profile. For instance, an investor
    expecting to rapidly generate profits in the market will have a high leveraged
    account, and a more conservative investor will have a low leveraged account.


    ### The Contract for Difference Trading


    The contract for difference (CFD) ^([¹](#fn1)) represents a financial derivative
    with a value that comes from a financial asset. It enables investors to generate
    profits from price differences rather than safeguarding an asset. Consequently,
    investors can speculate on price movements. Besides CFDs, there is a more complex
    financial derivative known as *futures*. Unlike CFDs, which are privately traded
    through brokers, futures are traded through a large exchange. With futures, an
    investor on the buyer’s side is obliged to execute the trade when the contract
    expires, and an investor on the seller’s side ought to deliver the asset at a
    certain period. Futures have an expiry date, and there is a cap on the number
    of trades that an investor can execute at a certain period. Given that, the future
    has stricter regulatory mechanisms than CFDs.


    ## The Share Market


    We equally recognize the share market as the equity market or the stock market.
    It is also one of the most liquid markets in the world. It is an international
    market mostly made up of large financial companies that trade listed stocks. A
    share represents the ownership of equity. A company sells equity to raise capital.


    ### Raising Capital


    At most, companies seek to expand their business operations, but funds are constrained
    by capital. They may privately or publicly seek debt financing or equity financing.
    Debt financing involves borrowing funds using collateral. The most conventional
    source of debt financing is big commercial banks. Most startups cannot source
    financial capital from these banks because they are at high risk (most startups
    fail). They use alternative debt financing sources like micro-lenders, angel investors,
    and seed investors depending on the phase they are at in their entrepreneurship
    journey. More established companies may raise capital by selling their shares
    to the public.


    #### Public Listing


    If an established company wants to gain a large financial capital, then it can
    list on a public stock exchange.^([²](#fn2)) Before they exchange company stocks,
    they must first comply with the accreditation process of a commission in a specific
    jurisdiction and make an initial public offering.


    #### Stock Exchange


    The stock market exchange facilitates the exchange of shares between companies
    and investors. The most popular stock exchanges include the London Stock Exchange,
    New York Stock Exchange, and NASDAQ among others. Figure [1-3](#509469_1_En_1_Chapter.xhtml#Fig3)
    shows a simple example of the stock exchange market.


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig3_HTML.png](images/509469_1_En_1_Chapter/509469_1_En_1_Fig3_HTML.png)


    Figure 1-3


    A simple example of the stock exchange market


    Figure [1-3](#509469_1_En_1_Chapter.xhtml#Fig3) shows that the brokers interact
    with the stock exchanges and pass prices to investors. Also, the stock exchange
    releases a stock market index. There are two markets on the stock exchange. First,
    there is the *primary market*, where a company shows intent of enlisting in the
    stock exchange by delivering an official press release, partaking in roadshows
    to make their intentions known to the public, filing for enlistment, and making
    an initial public offer (IPO), which involves issuing shares prior to enlistment.
    Post enlistment on the exchange, a company enters the *secondary market* by making
    a follow-on offer and opening trading activities to the public. This occurs upon
    satisfying the compliance requirements of the exchange.'
  trans: "\n#### 经纪业务\n\n经纪业务涉及提供一个稳定的平台以促进交易。经纪公司通常为散户投资者开设交易账户，并提供进行金融工具交易的基础设施。图\
    \ 1-2 展示了各类经纪商。\n\n![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig2_HTML.jpg](img/509469_1_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2  \n经纪商类型\n\n不同经纪公司的运营模式略有差异。这些公司必须注册，并遵守其所在地区监管机构制定的合规标准。主要监管机构包括美国商品期货交易委员会、澳大利亚证券和投资委员会（ASIC）以及英国金融行为监管局（FCA）。接下来，我们将讨论主要的经纪公司。\n\
    \n##### 做市商经纪商\n\n做市商（DD）经纪商向投资者提供固定的点差和流动性。他们为投资者建立市场，并站在投资者订单的对立面，这意味着他们与客户进行对手交易。他们根据自身对未来价格的预测，统一确定买入价和卖出价。其报价并非来自银行间市场。\n\
    \n##### 无交易员平台经纪商\n\n无交易员平台（NDD）经纪商不会通过交易员平台传递投资者的订单。他们也不会站在投资者交易的对立面。为了创收，他们会收取少量佣金和/或对点差进行轻微调整。主要有两种无交易员平台经纪商，即：1）电子通信网络经纪商，和\
    \ 2）直通式处理经纪商。\n\n###### 电子通信网络经纪商\n\n电子通信网络（ECN）经纪商确保投资者的订单与网络中其他投资者的订单进行交互。传统上，投资者包括商业银行、机构投资者、对冲基金等。他们通过提供买入价和卖出价相互交易。为了创收，他们会收取少量佣金，并通过强有力的营销活动吸引大量投资者。\n\
    \n###### 直通式处理经纪商\n\n直通式处理（STP）经纪商将投资者的订单直接发送给能够接入银行间市场的流动性提供商。此类经纪商通常会从众多流动性提供商（例如花旗银行、巴克莱银行、摩根士丹利等）处获得大量的买入价和卖出价，经过仔细筛选后，向投资者提供加价后的价格。为了创收，他们会收取高额佣金。与前文提及的两种经纪公司不同，这些经纪商不关心对交易活动的影响。\n\
    \n### 理解杠杆和保证金\n\n外汇市场提供的杠杆远高于股票市场。杠杆代表经纪商借给投资者用于交易的资金。它使投资者能够接触到其现金余额本无法支持的头寸。经纪商提供通过保证金交易使用杠杆的交易账户。保证金是指持有头寸的总价值与贷款总价值之间的差额。杠杆率降低时，保证金金额增加，反之亦然。杠杆使投资者能够执行他们通常需要使用当前账户资金才能进行的多次交易；基本上可以将其视为无需抵押品的信贷。杠杆通常以比率形式表示。标准交易账户的杠杆类型范围从`1:10`到`1:100`。然而，一些经纪公司确实提供高达`1:1000`的杠杆账户。比率越低，执行交易所需的资金就越多。投资者利用杠杆，通过微小的价格变化产生更高的回报。例如，一个`1:1000`的账户使投资者能够执行比`1:10`账户多得多的交易。同时，杠杆越高的账户会放大利润，也会放大亏损。在某种程度上，账户的杠杆类型可以大致反映投资者的风险状况。例如，期望在市场中快速获利的投资者会拥有高杠杆账户，而更保守的投资者则会拥有低杠杆账户。\n\
    \n### 差价合约交易\n\n差价合约（CFD）^（¹）是一种金融衍生品，其价值来源于某种金融资产。它使投资者能够从价格差异中获利，而非持有某项资产。因此，投资者可以对价格变动进行投机。除了差价合约，还有一种更为复杂的金融衍生品，称为*期货*。与通过经纪商私下交易的差价合约不同，期货通过大型交易所进行交易。对于期货，处于买方头寸的投资者在合约到期时有义务执行交易，而处于卖方头寸的投资者则应在特定时间交付标的资产。期货有到期日，并且投资者在特定时期内可以执行的交易数量有上限。因此，期货比差价合约有更严格的监管机制。\n\
    \n## 股票市场\n\n股票市场同样也被称为权益市场或股市。它也是世界上流动性最强的市场之一。这是一个由大型金融公司主导的全球性市场，交易的是上市股票。股票代表对公司的所有权。公司通过出售股权来筹集资金。\n\
    \n### 筹集资金\n\n大多数公司都寻求扩展其业务运营，但资金往往受限于资本。它们可以私下或公开地寻求债务融资或股权融资。债务融资涉及使用抵押品借入资金。最传统的债务融资来源是大型商业银行。大多数初创公司无法从这些银行获得金融资本，因为它们风险较高（大多数初创公司都会失败）。它们根据自身创业所处的阶段，使用替代性债务融资来源，如小额贷款机构、天使投资人和种子投资人。更成熟的公司可以通过向公众出售股票来筹集资金。\n\
    \n#### 公开上市\n\n如果一家成熟的公司希望获得大量金融资本，它可以在公开的证券交易所上市。^（²）在交易公司股票之前，它们必须首先满足特定司法管辖区监管机构的认证流程，并进行首次公开募股。\n\
    \n#### 证券交易所\n\n证券交易所促进公司和投资者之间的股票交易。最知名的证券交易所包括伦敦证券交易所、纽约证券交易所和纳斯达克等。图 1-3 展示了一个简单的证券交易所市场示例。\n\
    \n![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig3_HTML.png](img/509469_1_En_1_Fig3_HTML.png)\n\
    \n图 1-3  \n一个简单的证券交易所市场示例\n\n图 1-3 显示，经纪商与证券交易所互动，并将价格传递给投资者。同时，证券交易所会发布股市指数。证券交易所中存在两个市场。首先是*一级市场*，公司在此通过发布官方新闻稿、进行路演以向公众表明其上市意图、提交上市申请以及进行首次公开发行（IPO）（在上市前发行股票）来展示其上市意向。在交易所成功上市后，公司通过进行后续发行并向公众开放交易活动而进入*二级市场*。这发生在满足交易所的合规要求之后。\n"
- fmt: '# Share Trading


    The stock market exchange facilitates the exchange of securities like shares,
    bonds, and stocks. Key markets in the stock exchange include the following: the
    primary market, where a company may issue shares before they are listed on an
    exchange, which is known as an *initial public offer* (IPO), and the secondary
    market, where the actual trading happens.


    # Stocks Index


    A stock index represents an estimate of the stock market or part of its segment.
    The index constitutes a set of stocks that investors may buy as a coherent whole
    or in an EFT or mutual fund that typically resembles the index. Table [1-1](#509469_1_En_1_Chapter.xhtml#Tab1)
    shows key stock indexes.


    **Table 1-1** Key Stock Indices


    | Name | Description |

    | --- | --- |

    | Standard & Poor (S&P) 500 | Measures the stock performance of 500 large companies
    in the United States |

    | Dow Jones Industrial Average (DJI 30) | Measures the stock performance of 30
    large companies in the United States |

    | NASDAQ Composite Index | Measures the stock performance of almost all the NASDAQ
    stock market |


    The stock major index (S&P 500, DJI 30, and NASDAQ 100, etc.) applies a divisor
    (often discrete) to divide total market capitalization and get the index value.
    They compromise stocks across diverse industries. They do not differ from other
    asset classes by the way we exchange them.


    # Speculative Nature of the Market


    In the exchange market, investors speculate on future prices of an asset and execute
    trades, so they yield reasonable returns as the price moves toward their speculation.
    If the price moves in the opposite direction, then investors incur losses. As
    a result of leverage, investors are exposed to high risk since investors are given
    room to trade asset classes they cannot afford, meaning they may lose an enormous
    amount of their capital with slight changes in the market (see [`https://www.capitalindex.com/bs/eng/pages/trading-guides/margin-and-leverage-explained`](https://www.capitalindex.com/bs/eng/pages/trading-guides/margin-and-leverage-explained)).
    Most retail investors trading CFDs lose their capital. An investor must understand
    the risks associated with trading prior to investing their capital.


    ## Techniques for Speculating Market Movement


    Investors use either the subjective method or the objective method to speculate
    the market or a combination of both. When using subjective means, an investor
    uses their rationalized belief, experience, opinions of others, and emotions to
    decide on whether to buy or sell at a specific price. When using objectivity,
    an investor applies mathematical models to identify patterns in the data and forecast
    future prices and then decides on whether to buy or sell a currency pair at a
    specific price. This book only covers machine learning and deep learning models.


    # Investment Strategy Management Process


    Figure [1-4](#509469_1_En_1_Chapter.xhtml#Fig4) shows a simple investment strategy
    management process.


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig4_HTML.png](images/509469_1_En_1_Chapter/509469_1_En_1_Fig4_HTML.png)


    **Figure 1-4** A simple investment strategy management process


    ## Strategy Formulation


    Strategy formulation is the first step in investment management. It involves the
    following tasks:


    *   Identifying risk and opportunity

    *   Setting short-term and long-term objectives

    *   Identifying resources and ways of organizing, managing, and directing those
    resources (human, financial, and technical)

    *   Establishing a structure and policies


    Systematic investors model data to draw meaningful insights that influence strategy.


    ## Modeling


    After deciding on ways to manage an investment portfolio, the subsequent step
    involves modeling. It involves the use of quantitative methods. This book focuses
    exclusively on machine learning and deep learning models from a finance perspective.
    The subsequent section discusses learning methods applicable to finance, especially
    investment management.


    ### Supervised Learning


    In supervised learning, a model predicts future values of a dependent variable
    using a function that operates on a set of independent variables based on labels
    we provide them in the training process. Supervised learning requires us to split
    data into training and test data (at times validation data too). We present a
    model with a set of correct answers and allow it to predict unseen answers. There
    are three primary types of supervised learning methods, namely, the parametric
    method, the nonparametric method, and the ensemble method. See Figure [1-5](#509469_1_En_1_Chapter.xhtml#Fig5).


    ![../images/509469_1_En_1_Chapter/509469_1_En_1_Fig5_HTML.jpg](images/509469_1_En_1_Chapter/509469_1_En_1_Fig5_HTML.jpg)


    **Figure 1-5** Supervised machine learning


    #### The Parametric Method


    The parametric method is also called the linear method. It makes strong assumptions
    about the structure of the data. We assume the underlying structure of the data
    is linear and normal. It handles dependent variables as a continuous dependent
    variable (a dependent variable that is limited to a specific range). This covers
    time-series analysis in Chapter [2](#509469_1_En_2_Chapter.xhtml) and the ordinary
    least squares model in Chapter [6](#509469_1_En_6_Chapter.xhtml).


    #### The Nonparametric Method


    Unlike the parametric method, the nonparametric method does not have substantial
    assumptions of linearity and normality. It handles a categorical dependent variable
    (a dependent variable that is limited to a specific range). There are two primary
    nonparametric methods: binary classification and multiclass classification.


    ##### Binary Classification


    In binary classification, the independent variable produces two classes such as
    no and yes or fail and pass. We code the classes as 0 and 1 and train binary classifiers
    to predict subsequent classes.


    ##### Multiclass Classification


    We use multiclass classification when the dependent variable is over two classes
    such as negative, neutral, or positive. We code the classes as 0, 1, 2...n. The
    coded values should not exceed 10\. The most popular multiclass classification
    models include random forest and linear discriminant analysis, among others. This
    book does not cover multiclass classification models.


    #### The Ensemble Method


    The ensemble method encompasses both the parametric method and the nonparametric
    method. We use it when the dependent variable is a continuous variable or categorical
    variable. It addresses linear regression and classification problems. The most
    popular ensemble methods include support vector machine and random forest tree,
    among others. This book does not cover ensemble models.'
