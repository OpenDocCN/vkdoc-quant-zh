- fmt: '# 8. Market Trend Classification Using ML and DL


    Thus far, we have progressively introduced the parametric method. All the problems
    we solved involved a continuous variable. We can also make use of the *nonparametric
    method* to predict the possible direction of the market. This chapter presents
    the nonparametric (or nonlinear) method, also called the *classification method*.
    This prevalent method operates on independent variables and triggers a bounded
    value. It is suitable when dealing with a categorical dependent variable (a dependent
    variable that is limited by a specific range). There are two primary types of
    classification methods: the binary classification method, which is used when the
    dependent variable has two outcomes, and the multiclass classification method,
    which is used when the dependent variable is a categorical variable with over
    two outcomes. In this chapter, we use both `SciKit-Learn` and `Keras`. The `SciKit-Learn`
    library is pre-installed in the Python environment. To install `Keras` in the
    Python environment, we use `pip install Keras`, and in the conda environment,
    we use `conda install -c conda-forge keras`.


    ## Classification in Practice


    Recognizing supply-and-demand activities helps investors make well-informed investment
    decisions. In this chapter, we create a categorical variable with the two outcomes
    0 and 1, where 0 represents a downward market and 1 represents an upward market.
    We use a logistic classifier to predict future classes. Listing [8-1](#509469_1_En_8_Chapter.xhtml#PC1)
    applies the `get_data_yahoo()` method to get the price data of crude oil from
    November 1, 2010, to November 1, 2020 (see Table [8-1](#509469_1_En_8_Chapter.xhtml#Tab1)).


