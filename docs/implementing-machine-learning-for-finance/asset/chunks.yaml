    # 3. Univariate Time Series Using Recurrent Neural Nets


    This chapter covers the basics of deep learning. First, it introduces the activation
    function, the loss function, and artificial neural network optimizers. Second,
    it discusses the sequence data problem and how a recurrent neural network (RNN)
    solves it. Third, the chapter presents a way of designing, developing, and testing
    the most popular RNN, which is the long short-term memory (LSTM) model. We use
    the Keras framework for rapid prototyping and building neural networks. To install
    `keras` in the conda environment, use `conda install -c conda-forge keras`. Ensure
    that you also install `tensorflow`. To install `tensorflow` in the conda environment,
    use `conda install -c conda-forge tensorflow`.


    ## What Is Deep Learning?


    *Deep learning* is a subset of machine learning that operates neural networks.
    A neural network is a network of interconnected groups of nodes that receive,
    transform, and transmit input values layer by layer until they reach the output
    layer. The activation function enables this process by operating a set of variables
    in each hidden layer.


    ## Activation Function


    The activation function adds nonlinearity to an artificial neural network and
    enables back propagation (a completed pass in reverse). There are three main activation
    functions.


    *The sigmoid activation function*: Fits an S-shaped curve to the data and triggers
    output values between 0 and 1.


    > *The tangent hyperbolic (tanh) activation function*: Fits a tanh curve to the
    data and triggers outputs between -1 and 1.


    > *The rectified linear unit (ReLu) activation function*: Retrieves values that
    are unconstrained by a specific range and addresses the vanishing gradient problem
    (a condition in which the gradient increases as we add more training data into
    the model, which results in slow training).


    ## Loss Function


    A loss function assesses the difference between the actual values and those predicted
    by an artificial neural network. Key loss functions include the mean squared error
    (MSE), mean absolute error, and mean squared logarithmic error. In this chapter,
    we use the MSE (the variability explained by the model about the data after considering
    a regression relationship).


    ## Optimize an Artificial Neural Network


    There are several methods for model optimization. The most common optimizer is
    the adaptive movement estimation (Adam), and it works better in minimizing the
    cost function during training.'
