- fmt: '### Rate of Returns


    The most convenient way of determining whether an investment is attractive involves
    studying the rate of returns. Rate of return shows the period’s beginning price
    and the period’s end price.


    #### Annual Rate of Return


    The annual rate of return represents the rate at which an asset yield returns
    annually. We study returns over time to make forecasts. Listing [9-5](#509469_1_En_9_Chapter.xhtml#PC5)
    applies the `plot_annual_returns()` method to plot the annual rate of returns
    of Amazon stocks over 10 years (see Figure [9-2](#509469_1_En_9_Chapter.xhtml#Fig2)).


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig2_HTML.jpg](images/509469_1_En_9_Chapter/509469_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Amazon annual rate of return


    ```

    pf.plot_annual_returns(amzn)

    plt.show()

    Listing 9-5

    Annual Rate of Returns

    ```


    Figure [9-2](#509469_1_En_9_Chapter.xhtml#Fig2) shows that Amazon stocks produced
    an instable annual rate of return from November 1, 2010, to November 2, 2020.
    There are changes in annual returns. In 2014, the portfolio had the worst performance.
    However, in the following year, the annual returns exceeded 100 percent.


    ### Rolling Returns


    Listing [9-6](#509469_1_En_9_Chapter.xhtml#PC6) returns backtested cumulative
    returns over 10 years (see Figure [9-3](#509469_1_En_9_Chapter.xhtml#Fig3)). Unlike
    the annual rate of returns, we weigh the cumulative returns. Pyfolio estimates
    the cumulative returns across time by estimating the notable differences between
    current returns and preceding returns (representing the total amount gained from
    an investment) over the cost of the stock.


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig3_HTML.jpg](images/509469_1_En_9_Chapter/509469_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Rolling rate of returns


    ```

    pf.plot_rolling_returns(amzn)

    plt.show()

    Listing 9-6

    Rolling Returns

    ```


    Figure [9-3](#509469_1_En_9_Chapter.xhtml#Fig3) shows clear small increments in
    cumulative returns from November 1, 2020. In 2016, an upward trend started gaining
    momentum.


    #### Monthly Rate of Returns


    The monthly rate of returns represents the rate at which an asset yield returns
    monthly. We review rates of returns monthly to identify historical behavior and
    cautiously make short-term to midterm forecasts. Listing [9-7](#509469_1_En_9_Chapter.xhtml#PC7)
    applies the `plot_monthly_returns_heatmap()` method to plot a heatmap of Amazon
    stocks’ monthly rate of return over 10 years (see Figure [9-4](#509469_1_En_9_Chapter.xhtml#Fig4)).


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig4_HTML.jpg](images/509469_1_En_9_Chapter/509469_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Monthly rate of returns heatmap


    ```

    pf.plot_monthly_returns_heatmap(amzn)

    plt.show()

    Listing 9-7

    Monthly Rate of Return Heatmap

    ```


    Figure [9-4](#509469_1_En_9_Chapter.xhtml#Fig4) shows that Amazon stock had unstable
    monthly rates of return from November 1, 2010, to November 2, 2020. In the first
    nine months of 2010, the rate is represented as zero, which is the same as in
    the last two months of 2020. This is because we extracted data from November 1,
    2010, to November 2, 2020. Figure [9-4](#509469_1_En_9_Chapter.xhtml#Fig4) indicates
    returns were at their peak (at 27 percent) in April 2020. In October 2018, the
    stock experienced its worst performance; the monthly rate of return was -20 percent.
    Also, from 2017 to 2020 the stock shows positive returns, which was the same as
    in the fourth month of the year. For clarity, we carefully examined the distribution
    of the data to summarize the monthly rate of returns. The most widespread distribution
    is the normal distribution. Data follows a normal distribution when actual values
    saturate around the true mean value. Listing [9-8](#509469_1_En_9_Chapter.xhtml#PC8)
    applies the `plot_monthly_hist()` method to plot a histogram of the monthly rate
    of returns of the Amazon stock (see Figure [9-5](#509469_1_En_9_Chapter.xhtml#Fig5)).


    ![../images/509469_1_En_9_Chapter/509469_1_En_9_Fig5_HTML.jpg](images/509469_1_En_9_Chapter/509469_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Monthly rate of returns histogram


    ```

    pf.plot_monthly_returns_dist(amzn)

    plt.show()

    Listing 9-8

    Monthly Rate of Returns Histogram

    ```


    The actual monthly rate of returns is scattered around the mean value. We can
    sufficiently summarize the data using the sample mean value. From November 1,
    2010, to November 2, 2020, on average, the Amazon stock exhibited a long-run upward
    trend.


    ## Conclusions


    This chapter concludes the book in which we introduced ways to remedy financial
    problems, especially investment management problems, using machine learning and
    deep learning. It covered several ways for objectively analyzing the performance
    of an investment portfolio using a Python package known as Pyfolio. To begin with,
    it discussed the concept of risk and techniques for identifying risk exposure.
    Last, it covered an annual and monthly rate of return estimation. We are not limited
    to the package covered in this chapter. We can use the packages alongside Zipline
    and Quantopian to backtest investment strategies.'
