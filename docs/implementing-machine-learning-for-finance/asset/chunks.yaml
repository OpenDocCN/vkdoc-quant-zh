    ## 结论


    本章介绍了深度学习。它涵盖了我们用于时间序列数据的人工神经网络模型，即 LSTM 模型。本章还展示了如何创建建模变量，并说明了神经网络的结构。随后，介绍了建模和测试网络的技术。


    在审查网络后，我们发现该模型能最佳地解释数据的变异性。我们可以使用该模型预测调整后收盘价的未来实例。通过减少层数、引入惩罚项等方法，我们可以进一步提升网络性能。下一章将介绍如何使用隐马尔可夫模型识别序列数据中的隐藏模式。


