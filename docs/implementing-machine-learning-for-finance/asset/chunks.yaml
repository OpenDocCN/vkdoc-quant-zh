    \    ax.grid(True)\nplt.show()\n列表 4-10\n隐藏状态的个体序列\n```\n\n图 4-3 展示了上升趋势中的波动性。2020\
    \ 年的大部分时间发生在第三个隐藏状态中。\n"
- fmt: "### Expected Returns and Volumes\n\nListing [4-11](#509469_1_En_4_Chapter.xhtml#PC11)\
    \ tabulates the expected returns and volumes estimated by the `GaussianHMM` (see\
    \ Table [4-4](#509469_1_En_4_Chapter.xhtml#Tab4)).\n\nTable 4-4  \nExpected Returns\
    \ and Volume\n\n|   | Returns | Volume |\n| --- | --- | --- |\n| **0** | 1.789235\
    \ | 3.752679e+09 |\n| **1** | -0.433996 | 4.258633e+09 |\n| **2** | 2.013629 |\
    \ 3.288045e+09 |\n| **3** | -9.934745 | 5.868430e+09 |\n| **4** | 1.139917 | 2.752306e+09\
    \ |\n\n```\nexpected_returns_and_volumes = np.dot(model.transmat_, model.means_)\n\
    returns_and_volume_columnwise = list(zip(*expected_returns_and_volumes))\nexpected_returns\
    \ = returns_and_volume_columnwise[0]\nexpected_volumes = returns_and_volume_columnwise[1]\n\
    params = pd.concat([pd.Series(expected_returns), pd.Series(expected_volumes)],\
    \ axis=1)\nparams.columns= ['Returns', 'Volume']\npd.DataFrame(params)\nListing\
    \ 4-11\nExpected Returns and Volumes\n```\n\nListing [4-12](#509469_1_En_4_Chapter.xhtml#PC12)\
    \ creates a dataframe for future returns and volumes, and it plots the actual\
    \ values of the adjusted close price and those predicted by the `GaussianHMM`\
    \ (see Figure [4-4](#509469_1_En_4_Chapter.xhtml#Fig4)).\n\n![../images/509469_1_En_4_Chapter/509469_1_En_4_Fig4_HTML.jpg](images/509469_1_En_4_Chapter/509469_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4  \nActual price and predicted price\n\n```\nlastN = 7\nstart_date\
    \ = datetime.date.today() - datetime.timedelta(days=lastN*2)\ndates = np.array([q[0]\
    \ for q in df], dtype=int)\npredicted_prices = []\npredicted_dates = []\npredicted_volumes\
