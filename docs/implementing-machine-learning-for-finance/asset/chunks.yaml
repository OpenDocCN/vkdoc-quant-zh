    of the probabilistic distributions is normal. We use GaussianHMM when dealing
    with a continuous variable that comes from a normal distribution. In the preceding
    chapter, we found that the time-series data has a serial correlation across different
    lags. GaussianHMM is more suitable for the problem at hand. HMM represents an
    unsupervised learning model for unraveling sequential problems. In unsupervised
    learning, we do not hide any data away from the model; we expose the model to
    all the data. It does not require us to split the data into training and test
    data. Now that we recognize the pattern of the time-series data, we can proceed
    and complete the model. Listing [4-6](#509469_1_En_4_Chapter.xhtml#PC6) applies
