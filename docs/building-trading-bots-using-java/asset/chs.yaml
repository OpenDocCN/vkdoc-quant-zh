  17  String baseCurrency = tokens[0];\n18  double price = 1.0;\n\n20  if (!baseCurrency.equals(accountInfo.getCurrency()))\
  \ {\n21   String currencyPair = this.providerHelper.fromIsoFormat(baseCurrency +\
  \ accountInfo.getCurrency());\n```\n\n\n\n```java\nMap<TradeableInstrument<N>, Price<N>>\
  \ priceInfoMap = this.currentPriceInfoProvider\n    .getCurrentPricesForInstruments(Lists.newArrayList(\n\
  \        new TradeableInstrument<N>(currencyPair)));\nif (priceInfoMap.isEmpty())\
  \ { /*这意味着我们获得了反向的货币对*/\n    /*例如，当基础货币是 GBP 而交易品种是 USDJPY 时*/\n    currencyPair\
