  11   if (strResp != StringUtils.EMPTY) {\n12    Object obj = JSONValue.parse(strResp);\n\
  13    JSONObject jsonResp = (JSONObject) obj;\n14    JSONArray instrumentArray =\
  \ (JSONArray) jsonResp.get(instruments);\n15\n16    for (Object o: instrumentArray)\
