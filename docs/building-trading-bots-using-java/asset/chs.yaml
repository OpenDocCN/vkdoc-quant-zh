  \ Long 类型。例如，假设账户余额在某时刻是 3000.00，响应中的值将类似于：\n\n```\n1 \"balance\" : 3000\n```\n\n\
  直接转换为 `Double` 将会失败并抛出 `ClassCastException`，因此我们使用这种变通方法来规避解析中的这一细微问题。\n\n现在，根据接口契约，我们必须提供一个用于获取可用账户集合的实现。\n\
