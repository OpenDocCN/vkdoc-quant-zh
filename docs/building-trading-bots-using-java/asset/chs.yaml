- "# 使用 Java 开发交易机器人\n\n#### 谢卡尔·瓦尔什尼\n\n© 2015 - 2016 谢卡尔·瓦尔什尼\n\n献给我生命中的天使们：我的母亲、我的妻子普雷什塔以及我的两个女儿米希卡和安雅。最后但同样重要的是，我的大学导师拉贾特·穆纳博士，他在我的\
  \ DNA 中播下了计算机编程的种子。\n\n## 目录\n\n## 指南\n\n1. 开始阅读\n\n## 1. 交易机器人简介\n\n欢迎来到自动化交易的世界！你正在阅读这本书，这表明你可能想构建自己的机器人，希望它能在你忙于日常工作或像我一样想尝试使用\
  \ Java 构建此类机器人的技术时，帮你赚点钱。\n\n自动化交易已经存在一段时间了，尽管它在很大程度上一直是银行和对冲基金等大型玩家的专属领域。\n\n然而，这在过去几年里发生了变化。随着许多散户投资者能够直接在各种平台和交易所进行交易，而不是通过电话使用传统经纪商的服务，自动化下单任务的需求日益增长，同时这些投资者可以继续从事他们的日常工作。作为自动化这一过程的第一步，许多平台如\
  \ OANDA、LMAX 等都提供了 Java、Python、C#、PHP 等多种编程语言的 API，以便将观察市场、查看图表、进行分析等繁琐任务自动化。\n\n\
  在这一旅程中，我们不仅会关注自动化交易的概念，还会专注于编写整洁、测试驱动的 Java 程序。\n\n最后，我们不仅会拥有一个可用的交易机器人，它能够使用任何策略进行交易，而且从技术角度来看，我们还将深入了解\
  \ Java 编程中事件驱动、多线程的世界。\n\n***警告：*** *以保证金进行外汇交易具有高风险，可能不适合所有投资者。过往表现并不预示未来结果。高杠杆作用可能对您不利，也可能对您有利。在决定投资外汇之前，您应仔细考虑您的投资目标、经验水平和风险承受能力。存在损失部分或全部初始投资的可能性，因此您不应投资无法承受损失的资金。您应了解所有与外汇交易相关的风险，如有任何疑问，请咨询独立的财务顾问。*\n\
  \n### 1.1 什么是交易机器人？\n\n用非常简单的话来说，交易机器人是一个计算机程序，可以自动向市场或交易所下达订单，无需人工干预。最简单的机器人可能是一个向\
  \ OANDA REST API 发送 `curl`^(1) `POST` 请求的脚本，例如：\n\n```\n$curl -X POST -d \"instrument=EUR_USD&units=2&side=sell&type=market\"\
  \ \"https://api-fxtrade.oanda.com/v1/accounts/12345/orders\"\n```\n\n可以设置在 Unix\
  \ `cron`^(2) 上，在交易时段内每小时运行一次。它没有策略，也没有任何外部接口或依赖。这是一行用于下单的命令，其盈亏概率相等。\n\n在另一个极端，它可能是一个基于分布式架构的复杂程序，消费来自各种来源的大量数据，实时分析并下单。它将具有极高的可用性和极低的延迟。\n\
  \n正如我们所见，机器人的规模和范围是多种多样的。要有效运行，机器人应能够完成以下任务：\n\n- 消费市场数据和/或外部新闻事件、社交媒体信息流，并将其分发给系统内感兴趣的组件。\n\
  - 拥有至少一个提供交易信号的策略。\n- 根据交易信号向经纪平台下达订单。\n- 账户管理，即能够跟踪保证金要求、杠杆、盈亏、剩余金额等，以便在可用金额突破给定阈值时限制交易。\n\
  - 头寸管理，即跟踪各种工具当前所有活跃头寸、这些头寸的单位、平均价格等。\n- 能够处理由经纪平台触发的事件，例如 `ORDER_FILLED`、`STOP_LOSS`\
  \ 等，并在需要时为此类事件做出适当决策。\n- 一些基本的监控和警报功能。\n- 一些基本的风险管理。例如，通过使用止损单限制损失，或确保风险在风险型工具和避险型工具之间分散。这些仅是示例，绝非全面管理风险的完整清单。\n\
  \n### 1.2 为什么需要交易机器人？\n\n我相信交易所/平台提供的大部分服务都围绕以下几点：\n\n- 订阅所选工具的市场数据并进行分发。\n- 下单和交易。\n\
  - 账户和头寸管理。\n- 历史市场数据。\n- 心跳机制。\n- 针对交易、订单和账户事件的回调。\n- 身份验证。\n\n交易机器人试图将这些任务泛化到一个框架中，并提供一种能力，可以在运行时使用像\
  \ Spring 这样的依赖注入^(3)框架，提供特定于经纪商/交易所平台的实现。因此，从理论上讲，只需更改 Spring 配置文件（我们在其中定义了实现这些服务的各种接口的实现），瞧，我们就应该能够支持各种经纪商/交易所平台。\n\
  \n### 1.3 我们交易机器人的能力\n\n我们的机器人将具备以下能力，这些将在后续章节中详细讨论：\n\n- 账户管理\n- 与实时市场数据源的集成\n\
  - 市场数据分发\n- 下单\n- 处理订单/交易和账户事件\n- 历史价格分析\n- 与 Twitter 集成\n- 策略\n\n\n\n### 1.4 设计目标\n\
  \n-   一个核心的设计目标（本章开头已提及）是能够通过 Spring 配置在运行时切换券商/交易平台（broker/exchange）的实现。如果我们能为这些平台的\
  \ API 调用创建规范（类似于 JDBC 规范），那么这是可行的。例如，一个用于定义持仓管理需求的示例规范/接口如下：\n\n```java\n/**\n *\
  \ 一项为金融工具持仓提供服务的供应方。金融工具的持仓定义为其聚合交易，包含一个平均价格，\n * 且所有交易必须同为多头（LONG）或同为空头（SHORT）。这是一项有用的服务，\n\
  \ * 可用于生成指定金融工具的摘要，如有必要，还可通过单个调用平掉指定金融工具的所有交易。\n *\n * 实现方可以选择维护一个内部持仓缓存，以减少延迟。如果如此操作，\n\
  \ * 则必须找到以下方法之一：1) 接入事件流，并基于订单/交易事件刷新缓存；\n * 或 2) 在指定时间段后定期刷新缓存。\n *\n * @param\
  \ <M>\n *      类 TradeableInstrument 中的 instrumentId 类型\n * @param <N>\n *     \
  \ accountId 的类型\n *\n * @see TradeableInstrument\n */\npublic interface PositionManagementProvider<M,\
  \ N> {\n\n    /**\n     * @param accountId\n     * @param instrument\n     * @return\
  \ 给定金融工具和 accountId 的持仓信息 Position<M>\n     *         （如果单个账户下所有交易为空，则可能返回 null）。\n\
  \     */\n    Position<M> getPositionForInstrument(N accountId, TradeableInstrument<M>\
  \ instrument);\n\n    /**\n     * @param accountId\n     * @return 给定 accountId\
  \ 的 Position<M> 对象集合。\n     */\n    Collection<Position<M>> getPositionsForAccount(N\
  \ accountId);\n\n    /**\n     * 平掉给定金融工具和 accountId 的持仓。这是一种一次性平掉账户中\n     * 指定金融工具所有交易的方法。\n\
  \     *\n     * @param accountId\n     * @param instrument\n     * @return 操作是否成功\n\
  \     */\n    boolean closePosition(N accountId, TradeableInstrument<M> instrument);\n\
  }\n```\n\n如果我们为平台交互的每个方面都创建这样的规范/接口，理论上我们可以为这些服务创建提供程序，并通过 Spring 配置在需要时进行切换。从代码组织的角度来看，所有这些接口都将放在一个构成核心\
  \ API 一部分的项目中。因此，这个项目将与券商/交易平台提供程序无关，并将包含此类接口和服务。\n\n-   编写能解决单一业务问题或一组相关问题的服务。这些服务易于进行单元测试和代码复用，最终会带来更优的软件质量。\n\
  -   服务间松耦合。这有助于降低系统依赖，从而使软件更易于维护。我们的软件将不断演进，因为人们可能会决定集成更多社交媒体信息流或添加更复杂的策略。编写松耦合的组件可以确保对已有工作代码的影响降到最低。\n\
  -   高单元测试覆盖率。追求高单元测试覆盖率至关重要。在涉及真实资金的生产环境中使用时，大量的单元测试将确保我们尽早发现回归和错误，并尽可能防止错误在生产环境中暴露。\n\
  \n### 1.5 代码组织与使用的软件栈\n\n基于我们在前面章节中对设计目标的讨论，代码将至少组织在 3 个不同的项目中，即构建将至少生成 3 个 `jar`\
  \ 文件。为什么说是至少 3 个？回想我们之前的讨论，其中一个关键设计目标是在运行时切换提供程序实现。由于我们可以从多个提供程序中进行选择，因此至少会有 3 个\
  \ `jar` 文件。本书只讨论一个实现，即 OANDA REST API 实现。鼓励使用该框架的开发人员开发更多的提供程序实现。\n\n-   `trading-core`\
  \ 是项目的核心。它包含所有必须实现的规范/接口。它还包含所有使用核心接口并提供额外有用 API 方法的通用服务。\n-   `oanda-restapi` 是我们对规范的参考实现，将在本书中讨论。欢迎您将其替换为您自己的实现。\n\
  -   `tradingbot-app` 是主应用程序，它使用 Spring 在运行时注入提供程序 API。它也是我们定义策略和实现特定于应用程序的项目的项目。在本书的后续部分，我们将讨论与社交媒体（尤其是\
  \ Twitter）的集成，这将在该项目中实现。\n\n![Java 项目](img/00001.jpeg \"Java 项目\") Java 项目\n\n为了构建我们的机器人，我们将使用以下软件和工具：\n\
  \n-   Java SDK 1.7+\n-   Spring Framework 4.1, Spring Social 1.1（仅在 `tradingbot-app`\
  \ 项目中的依赖项）\n-   Guava 18.0\n-   HttpClient 4.3\n-   Maven 3.2.5\n-   Eclipse IDE\n\
  \n### 1.6 OANDA REST API 作为参考实现\n\n**声明-** *我与 OANDA 现在或过去没有任何商业关系。我选择 OANDA REST\
  \ API 作为参考实现，完全是基于其技术优势以及它可能被更广泛采用的事实（因为它是免费使用的）。如果存在类似的选择，我也很乐意尝试。*\n\n我偶然发现了 OANDA\
  \ API。当时，我正在寻找一家提供免费交易 API 的券商（以防我想转为真实账户），并且更重要的是支持 Java 编程语言。入门非常容易，因为大多数示例都使用\
  \ `curl` 来演示各种交易操作，如获取工具列表、下订单或获取历史蜡烛图数据。我只需在 Mac 终端上输入 `curl` 命令即可。我可以轻松看到每次发出的\
  \ `curl` 请求所收到的 JSON 响应。通过实时查看响应和数据，我对支持工具、订单、汇率、持仓等的各种 API 有了非常好的认识和理解。\n\n`curl`\
  \ 命令示例是一个很好的起点，我开始尝试在 REST API^(4) 页面上描述的 Java 测试用例中编写等效命令。\n\n\n\n#### 1.6.1 开设\
  \ OANDA 模拟账户\n\n在开始使用 API 之前，你必须先注册一个免费的模拟账户。进入页面后，点击“开设账户”按钮，你会看到如下的注册界面：\n\n![Oanda\
  \ 账户注册界面](img/00002.jpeg \"账户注册界面\") Oanda 账户注册界面\n\n成功注册后，你就可以登录你的模拟账户了。准备登录时，你会看到如下登录界面：\n\
  \n![Oanda 账户登录界面](img/00003.jpeg \"账户登录界面\") Oanda 账户登录界面\n\n登录成功后，你将进入账户主页，界面如下图所示：\n\
  \n![Oanda 账户仪表盘](img/00004.jpeg \"账户仪表盘\") Oanda 账户仪表盘\n\n要开始进行 API 交易，我们首先需要生成一个个人\
  \ API 令牌，该令牌将被 OANDA 平台用于验证请求。你需要点击上图中红色箭头高亮显示的 **管理 API 访问 (Manage API Access)**\
  \ 链接。随后你将进入如下界面：\n\n![Oanda 生成 API 令牌](img/00005.jpeg \"生成 API 令牌\") Oanda 生成 API\
  \ 令牌\n\n当你点击 **生成 (Generate)** 时，平台将为你生成一个令牌，该令牌必须包含在你向承载模拟账户的平台发出的每一个请求中。生成的令牌将会显示出来，请务必记下它：\n\
  \n![Oanda 已生成令牌](img/00006.jpeg \"已生成 API 令牌\") Oanda 已生成令牌\n\n现在你可以开始交易了。OANDA\
  \ 提供了一个非常有用的 Web 界面，可以用来测试你的 REST 请求并即时查看响应。你也可以借此了解 REST 资源 URL 的组织方式，以及为完成特定请求应调用哪个资源\
  \ URL。\n\n下图展示的是我们如何发送请求以获取所有可交易金融工具的列表。GET 请求需要传入一个 `accountId`（这是你可以在账户页面上找到的\
  \ ID，对于模拟账户，它默认带有 100,000 个单位的账户货币）。同时还必须提供请求头，其格式为 `Bearer <你的 API 令牌>`：\n\n![Oanda\
  \ 开发 API 控制台](img/00007.jpeg \"API 控制台\") Oanda 开发 API 控制台 ![Oanda 开发 API 控制台 -\
  \ 请求头标签页](img/00008.jpeg \"API 控制台\") Oanda 开发 API 控制台 - 请求头标签页\n\n#### 1.6.2 OANDA\
  \ JSON 键\n\nOANDA JSON 响应使用一组标准键。例如，在响应中表示货币对时，无论是即时报价还是蜡烛图信息的流式响应，都会使用 `instrument`\
  \ 键。实时数据流中的即时报价如下所示：\n\n```\n1 {\"tick\":{\"instrument\":\"AUD_CAD\",\"time\":\"\
  1401919217201682\",\"bid\":1.01484,\"ask\":1.01502}}\n```\n\n而交易成功修改后的响应则如下所示：\n\
  \n```\n 1 {\n 2   \"id\": 1800805337,\n 3   \"units\": 3000,\n 4   \"side\": \"\
  sell\",\n 5   \"instrument\": \"CHF_JPY\",\n 6   \"time\": \"2015-03-18T06:33:36.000000Z\"\
  ,\n 7   \"price\": 120.521,\n 8   \"takeProfit\": 110,\n 9   \"stopLoss\": 150,\n\
  10   \"trailingStop\": 0,\n11   \"trailingAmount\": 0\n12 }\n```\n\n从以上两个例子中，我们还可以看到用于表示事件日期的键是\
  \ `time`。由于相同的键用于表示特定属性，我们可以为这些键创建 `public static final String` 变量。因此，`OandaJsonKeys`\
  \ 类应运而生。相比于在许多类中使用如下所示的代码行来污染代码：\n\n```\n1 String instrument = (String) instrumentJson.get(\"\
  instrument\");\n```\n\n更好的做法是创建一个常量并使用它。同样的代码片段将变成：\n\n```\n1 String instrument\
  \ = (String) instrumentJson.get(OandaJsonKeys.instrument);\n```\n\n虽然键的数量很多，但我们的交易机器人中使用的大部分键都包含在\
  \ `OandaJsonKeys` 类中：\n\n```\n 1 public class OandaJsonKeys {\n 2 \n 3 \tprivate\
  \ OandaJsonKeys() {\n 4 \t}\n 5 \n 6 \tpublic static final String accounts = \"\
  accounts\";\n 7 \tpublic static final String accountId = \"accountId\";\n 8 \tpublic\
  \ static final String accountCurrency = \"accountCurrency\";\n 9 \tpublic static\
  \ final String marginRate = \"marginRate\";\n10 \tpublic static final String marginUsed\
  \ = \"marginUsed\";\n11 \tpublic static final String marginAvail = \"marginAvail\"\
  ;\n12 \tpublic static final String balance = \"balance\";\n13 \tpublic static final\
  \ String unrealizedPl = \"unrealizedPl\";\n14 \tpublic static final String realizedPl\
  \ = \"realizedPl\";\n15 \tpublic static final String openTrades = \"openTrades\"\
  ;\n16 \tpublic static final String instruments = \"instruments\";\n17 \tpublic static\
  \ final String instrument = \"instrument\";\n18 \tpublic static final String interestRate\
  \ = \"interestRate\";\n19 \tpublic static final String disconnect = \"disconnect\"\
  ;\n20 \tpublic static final String pip = \"pip\";\n21 \tpublic static final String\
  \ bid = \"bid\";\n22 \tpublic static final String ask = \"ask\";\n23 \tpublic static\
  \ final String heartbeat = \"heartbeat\";\n24 \tpublic static final String candles\
  \ = \"candles\";\n25 \tpublic static final String openMid = \"openMid\";\n26 \t\
  public static final String highMid = \"highMid\";\n27 \tpublic static final String\
  \ lowMid = \"lowMid\";\n28 \tpublic static final String closeMid = \"closeMid\"\
  ;\n29 \tpublic static final String time = \"time\";\n30 \tpublic static final String\
  \ tick = \"tick\";\n31 \tpublic static final String prices = \"prices\";\n32 \t\
  public static final String trades = \"trades\";\n33 \tpublic static final String\
  \ tradeId = \"tradeId\";\n34 \tpublic static final String price = \"price\";\n35\
  \ \tpublic static final String avgPrice = \"avgPrice\";\n36 \tpublic static final\
  \ String id = \"id\";\n37 \tpublic static final String stopLoss = \"stopLoss\";\n\
  38 \tpublic static final String takeProfit = \"takeProfit\";\n39 \tpublic static\
  \ final String units = \"units\";\n40 \tpublic static final String side = \"side\"\
  ;\n41 \tpublic static final String type = \"type\";\n42 \tpublic static final String\
  \ orders = \"orders\";\n43 \tpublic static final String orderId = \"orderId\";\n\
  44 \tpublic static final String positions = \"positions\";\n45 \tpublic static final\
  \ String expiry = \"expiry\";\n46 \tpublic static final String tradeOpened = \"\
  tradeOpened\";\n47 \tpublic static final String orderOpened = \"orderOpened\";\n\
  48 \tpublic static final String transaction = \"transaction\";\n49 \tpublic static\
  \ final String pl = \"pl\";\n50 \tpublic static final String interest = \"interest\"\
  ;\n51 \tpublic static final String accountBalance = \"accountBalance\";\n52 }\n\
  ```\n\n在我们将在后续章节讨论的所有 OANDA API 实现中，我们将直接使用此类，并通过静态导入常量，而不是对特定 JSON 键的字符串字面量进行硬编码。\n\
  \n\n\n#### 1.6.3 OANDA 实现的构造函数依赖项\n\n所有核心 API 规范的 OANDA 实现都有接受以下参数的构造函数：\n\n- `API\
  \ url`\n- `username`\n- `access token`\n\n我们知道，OANDA 提供不同的环境来运行我们的机器人，例如沙箱、模拟盘和实盘。这些环境拥有不同的\
  \ URL、访问令牌，并且同一用户在不同环境下的用户名也可能不同。这些外部配置属性会作为构造函数参数传递给各个 OANDA 实现。例如：\n\n```java\n\
  1 public OandaAccountDataProviderService(final String url, final String userName,\
  \ final String accessToken) {\n2 \tthis.url = url;\n3 \tthis.userName = userName;\n\
  4 \tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n5 }\n```\n\n如下所示，这些参数在\
  \ Spring 配置中被传递给该实现：\n\n```xml\n1 <bean id=\"accountDataProvider\" class=\"com.precioustech.fxtrading.oanda.restapi.account.OandaAccountDataProviderService\"\
  >\n2 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n3 \t\t<constructor-arg\
  \ index=\"1\" value=\"${oanda.userName}\"/>\n4 \t\t<constructor-arg index=\"2\"\
  \ value=\"${oanda.accessToken}\"/>\n5 </bean>\n```\n\n由于这些变量在属性文件中定义，我们无需重新构建或修改代码，即可在运行时轻松更改它们。只需修改属性文件即可。在后续章节中详细讨论配置时，我们会更深入地探讨这个主题。\n\
  \n### 1.7 事件驱动架构\n\n任何交易系统的核心都是其事件驱动架构。系统必须对市场事件、社交媒体事件、用户事件以及可能来自外部/内部来源的大量其他事件做出响应。这些事件可能进一步触发一连串事件，导致系统中各种业务/领域对象的状态发生改变。真正的技术挑战在于，确保这些状态转换以线程安全的方式进行，并在需要时有事务作为支撑。\n\
  \n事件驱动系统的核心是一个或多个事件循环。这些事件循环通常在一个无限的 `while` 循环中运行，等待来自队列或实时流的事件。对于 OANDA 市场数据跳动事件，我们有一个如下的事件循环：\n\
  \n```java\n 1 this.streamThread = new Thread(new Runnable() {\n 3 @Override\n 4\
  \ public void run() {\n 5  CloseableHttpClient httpClient = getHttpClient();\n 6\
  \   try {\n 7    BufferedReader br = setUpStreamIfPossible(httpClient);\n 8    \
  \ if (br != null) {\n 9      String line;\n10       while ((line = br.readLine())\
  \ != null && serviceUp) {\n11        Object obj = JSONValue.parse(line);\n12   \
  \      JSONObject instrumentTick = (JSONObject) obj;\n13         ...\n14       \
  \  ...\n```\n\n在上述代码片段中，我们有一个无限的 `while` 循环，用于监听 OANDA 平台推送到实时流中的新 ticks。当接收到一个\
  \ tick 的 JSON 负载时，它会被解析，并通过队列或事件总线进一步分发。\n\n![典型事件链](img/00009.jpeg \"事件链\") 典型事件链\n\
  \n该图描绘了可能由单个事件触发的典型事件链。\n\n1.  从流中接收到 Tick 事件。\n2.  事件被解析并发送到 `EventBus`。\n3.  策略组件订阅了此事件，并从\
  \ `EventBus` 接收到回调。\n4.  策略组件根据最新的 tick 数据事件决定生成一个交易信号，并将该信号放入 `OrderQueue`。\n5.\
  \  `OrderExecutionService` 获取此信号，创建一个 `new order` 负载，并将其发布到平台。\n6.  平台执行该订单，并通过\
  \ `order event loop` 向下发送一个事件。\n7.  该事件可以进一步触发某个操作，例如更新 `trades cache`。\n\n这基本上就是事件驱动架构的本质。由于我们可能同时有多个组件在运行，因此尽可能解耦组件至关重要，这样可以在零修改或最小修改的情况下添加新的发布者和订阅者。这种架构有利于利用\
  \ Java 的多线程编程能力。然而，同样道理，它也要求开发者在执行缓存中业务对象（例如示例中的 `trades cache`）的状态变更时必须格外谨慎。我们必须设置足够的同步和锁定机制，以确保共享对象的状态始终保持一致。\n\
  \n\n#### 1.7.1 Google EventBus\n\n`Google EventBus`（见 7），是`guava`库的一部分，是一个优秀的消息中介，有助于实现服务的松耦合，并允许它们之间进行发布-订阅风格的通信。它最酷的特性是，只需添加一个注解就能添加订阅者，而无需明确知道发布者是谁。\n\
  \n`EventBus`的维基页面上有很多有用的信息，但值得讨论一下它在交易机器人生态系统中的用法。以传播市场数据事件到一个或多个订阅者的用例为例。假设 Spring\
  \ DI 容器已经创建了一个单例的`EventBus`：\n\n* **自动注册订阅者：** 这里我们编写一个`BeanPostProcessor`来自动查找带有`@Subscribe`注解的方法的\
  \ bean，并调用`eventBus.register`方法来注册订阅者。\n\n```java\npublic class FindEventBusSubscribers\
  \ implements BeanPostProcessor {\n\n @Autowired\n private EventBus eventBus;\n private\
  \ static final Logger LOG = Logger.getLogger(FindEventBusSubscribers.class);\n\n\
  \ @Override\n public Object postProcessAfterInitialization(Object bean, String beanName)\
  \ throws BeansException {\n  Method[] beanMethods = bean.getClass().getMethods();\n\
  \  for (Method beanMethod: beanMethods) {\n   if (beanMethod.isAnnotationPresent(Subscribe.class))\
  \ {\n    eventBus.register(bean);\n    LOG.info(\n     String.format(\"Found event\
  \ bus subscriber class %s. Subscriber method name=%s\",\n      bean.getClass().getSimpleName(),\
  \ beanMethod.getName()));\n    break;\n   }\n  }\n  return bean;\n }\n\n @Override\n\
  \ public Object postProcessBeforeInitialization(Object bean, String beanName) throws\
  \ BeansException {\n  return bean;\n }\n\n}\n```\n\n* **创建发布者：** 只需调用`post(Object\
  \ payload)`即可将消息发布到`EventBus`。\n\n```java\npublic MarketEventHandlerImpl(EventBus\
  \ eventBus) {\n this.eventBus = eventBus;\n}\npublic void onMarketEvent(TradeableInstrument\
  \ < T > instrument, double bid, double ask, DateTime eventDate) {\n MarketDataPayLoad\
  \ < T > payload = new MarketDataPayLoad < T > (instrument, bid, ask, eventDate);\n\
  \ eventBus.post(payload);\n}\n```\n\n* **消费负载：** `EventBus`通过匹配方法中传入的输入类型以及`@Subscribe`注解，来找到合适的订阅者。该方法必须有一个且仅有一个输入参数。可以选择尽可能细粒度或粗粒度的订阅方式。在粗粒度订阅的情况下，输入参数是一个对象，它是系统中所有已知负载的父类。最坏的情况是负载为`java.lang.Object`，此时订阅是最粗粒度的。该方法将对系统中执行的每次`eventBus.post`调用。另一方面，使用单个子类型作为方法的输入参数，使得订阅极其细粒度。在下面的例子中，`handleMarketDataEvent`仅在负载类型为`MarketDataPayLoad`或其任何子类型时，才会被`EventBus`调用。\n\
  \n```java\n@Subscribe\n@AllowConcurrentEvents\npublic void handleMarketDataEvent(MarketDataPayLoad<T>\
  \ marketDataPayLoad) {\n\tif (instrumentRecentPricesCache.containsKey(marketDataPayLoad.getInstrument()))\
  \ {\n\t\tinstrumentRecentPricesCache.get(\n\t\tmarketDataPayLoad.getInstrument())\n\
  \t\t.put(marketDataPayLoad.getEventDate(),marketDataPayLoad);\n\t}\n}\n```\n\n###\
  \ 1.8 Provider Helper 接口\n\n通常，不同的平台提供商对货币对的表示方式不同。`Cable`可以通过以下多种方式表示：\n\n* `GBP_USD`\n\
  * `GBPUSD`\n* `GBP/USD`\n* `GBP-USD`\n\n类似地，买入货币对的行为可以通过以下方式表示：\n\n* `buy`\n* `long`\n\
  * `+1`（或其他任何正数）\n* 平台特定的枚举，例如`TRADEACTION.BUY`\n\n为了处理不同提供商在表示法上的这种差异，我们需要创建一个提供方法来处理这些差异的接口。它看起来像这样：\n\
  \n```java\n/**\n *\n * @param <T>\n *            多头/空头表示法的类型\n */\npublic interface\
  \ ProviderHelper < T > {\n\n /**\n  *\n  * @param instrument\n  *            采用\
  \ ISO 货币标准，例如 GBPUSD\n  * @return 以平台特定格式表示的货币对\n  */\n String fromIsoFormat(String\
  \ instrument);\n\n /**\n  *\n  * @param instrument\n  *            采用平台特定格式，例如 GBP_USD\n\
  \  * @return 以 ISO 格式表示的货币对\n  */\n String toIsoFormat(String instrument);\n\n /**\n\
  \  *\n  * @param instrument\n  *            采用 7 字符格式，由任意分隔符（如 -、/、_）分隔\n  * @return\
  \ 以平台特定格式表示的货币对\n  */\n String fromPairSeparatorFormat(String instrument);\n\n /**\n\
  \  *\n  * @param instrument\n  *            表示为话题标签，例如 #GBPUSD\n  * @return 以平台特定格式表示的货币对\n\
  \  */\n String fromHashTagCurrency(String instrument);\n\n /**\n  *\n  * @return\
  \ T，表示在平台上买入货币对的操作\n  */\n T getLongNotation();\n\n /**\n  *\n  * @return T，表示在平台上卖出货币对的操作\n\
  \  */\n T getShortNotation();\n}\n```\n\n之所以需要这个接口，是我在消费来自 Twitter 和发布经济事件的外部网站等外部源的数据时感受到的。不同的\
  \ Twitter 用户和外部网站有自己表示货币对以及多头/空头交易的方式。为了处理这种繁多的约定，强烈感受到了这种接口的必要性。我很确定还会有更多需要以平台特定方式解读的情况，因此应当被添加到此接口中。\n\
  \n\n### 1.9 `TradingConfig` 类\n\n`TradingConfig` 类持有所有在运行时配置的参数。这些参数被各种核心 API 所使用。部分示例如下：\n\
