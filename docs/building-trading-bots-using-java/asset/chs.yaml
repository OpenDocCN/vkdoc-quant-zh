  \ ID，理论上我们会收到一个 HTTP *404* 响应，此时返回 null。如果确实收到有效的 JSON 负载，其格式应如下所示：\n\n```json\n\
  {\n    \"id\": 1800805337,\n    \"units\": 3000,\n    \"side\": \"sell\",\n    \"\
  instrument\": \"CHF_JPY\",\n    \"time\": \"1426660416000000\",\n    \"price\":\
  \ 120.521,\n    \"takeProfit\": 105.521,\n    \"stopLoss\": 121.521,\n    \"trailingStop\"\
  : 0,\n    \"trailingAmount\": 0\n}\n```\n\n其余代码涉及调用 `parseTrade` 方法来解析此 JSON 负载，并返回\
  \ `Trade` POJO。\n\n### 6.10 将读取操作封装到 TradeInfoService 中\n\n可以说，这是一个非常简洁优雅且功能强大的服务示例，它证明了我们为什么要采用服务这一概念。它展示了服务如何（例如）引入内部缓存作为优化手段，从而避免反复向数据提供者（无论是\
  \ REST 服务还是通过 DAO 进行数据库获取）请求相同的数据。如果我们直接向数据提供者请求数据，即使数据变化频率很低，也会在请求操作中引入不必要的延迟和重复计算，尽管返回的结果与上一次完全相同。通过使用服务，我们可以引入内部缓存来管理数据提供者（数据库或\
  \ REST 等外部源）提供的数据，并存储可能消耗 CPU 周期或资源密集型的计算结果。让我们先来看看该服务的定义和构造函数：\n\n```java\n/**\n\
  \ * 一个提供交易信息的服务。它维护了按账户分组的全部交易内部缓存，\n * 以最大限度地减少延迟。\n *\n * <p>\n * 强烈建议将该服务作为单例使用，不要创建多个实例，以最大限度地减少\n\
  \ * 缓存带来的内存占用以及缓存构建期间引起的延迟。该类提供了一个线程安全\n * 的方法来刷新缓存（如需），并且在关闭、创建或修改交易的事件中必须调用\n\
  \ * 该方法，以确保缓存与交易平台上的交易保持同步。如果交易平台不支持此类\n * 事件回调，则可以在外部实现基于定时器的方案，定期刷新缓存。\n * </p>\n\
  \ * <p>\n * accountId 是内部缓存的键。如果 accountId 是用户自定义对象，而非常用的\n * Integer、Long 或 String\
  \ 类型，请确保已实现 hashCode() 和 equals() 方法。\n * </p>\n *\n * @param <M>\n *          \
  \  交易 ID 的类型\n * @param <N>\n *            类 TradeableInstrument 中 instrumentId\
  \ 的类型\n * @param <K>\n *            账户 ID 的类型\n * @see TradeableInstrument\n * @see\
  \ refreshTradesForAccount\n */\npublic class TradeInfoService<M, N, K> {\n\n   \
  \ private final TradeManagementProvider<M, N, K> tradeManagementProvider;\n    private\
  \ final AccountInfoService<K, N> accountInfoService;\n\n    public TradeInfoService(TradeManagementProvider<M,\
  \ N, K> tradeManagementProvider,\n                           AccountInfoService<K,\
  \ N> accountInfoService) {\n        this.tradeManagementProvider = tradeManagementProvider;\n\
  \        this.accountInfoService = accountInfoService;\n    }\n```\n\n我们有两个依赖项提供给构造函数，即\
  \ `TradeManagementProvider` 和另一个服务 `AccountInfoService`。稍后我们会看到，在初始化过程中，该服务首先会为每个工具和每个账户创建一个内部交易缓存。\n\
  \n```java\n//K -> 账户 ID 的类型\nprivate final ConcurrentMap<K, Map<TradeableInstrument<N>,\
  \ Collection<Trade<M, N, K>>>> tradesCache = Maps\n    .newConcurrentMap();\nprivate\
  \ final ReadWriteLock lock = new ReentrantReadWriteLock();\n/**\n * 初始化该服务（主要是每个账户的交易缓存）的方法。如果使用\
  \ Spring 框架，\n * 则此方法会在 ApplicationContext 初始化完成后由框架自动调用。如果不使用\n * Spring，该服务的消费者必须首先调用此方法来构建缓存。\n\
  \ *\n * @see TradeManagementProvider\n */\n@PostConstruct\npublic void init() {\n\
  \    reconstructCache();\n}\n```\n\n```java\nprivate void reconstructCache() {\n\
  \    lock.writeLock().lock();\n    try {\n        tradesCache.clear();\n       \
  \ Collection<Account<K>> accounts = this.accountInfoService.getAllAccounts();\n\
  \        for (Account<K> account : accounts) {\n            Map<TradeableInstrument<N>,\
  \ Collection<Trade<M, N, K>>> tradeMap =\n                getTradesPerInstrumentForAccount(account.getAccountId());\n\
  \            tradesCache.put(account.getAccountId(), tradeMap);\n        }\n   \
  \ } finally {\n        lock.writeLock().unlock();\n    }\n}\n\nprivate Map<TradeableInstrument<N>,\
  \ Collection<Trade<M, N, K>>>\n    getTradesPerInstrumentForAccount(K accountId)\
  \ {\n    Collection<Trade<M, N, K>> trades =\n        this.tradeManagementProvider.getTradesForAccount(accountId);\n\
  \    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> tradeMap =\n      \
  \  Maps.newHashMap();\n    for (Trade<M, N, K> ti : trades) {\n        Collection<Trade<M,\
  \ N, K>> tradeLst = null;\n        if (tradeMap.containsKey(ti.getInstrument()))\
  \ {\n            tradeLst = tradeMap.get(ti.getInstrument());\n        } else {\n\
  \            tradeLst = Lists.newArrayList();\n            tradeMap.put(ti.getInstrument(),\
  \ tradeLst);\n        }\n        tradeLst.add(ti);\n    }\n    return tradeMap;\n\
  }\n```\n\n如上所示，由 Spring 等依赖注入框架自动调用的 `init()` 方法，会进一步调用内部方法 `reconstructCache()`。此方法首先会申请一个排他性的**写锁**，以确保没有其他线程正在读取或写入内部的\
  \ `tradesCache`。提醒一下，`ReadWriteLock` 允许**多个读取者**同时访问，但只能有一个**写入者**。因此，为了保持缓存的一致性以及其他线程所看到的缓存状态，我们在更新缓存之前必须申请\
  \ `writeLock`，使其他线程在尝试读取或写入缓存时进入等待状态。\n\n一旦获取了写锁，我们就获得了开始（重新）填充缓存的权限。由于我们需要首先按交易工具组织所有交易，然后再按账户\
  \ ID 组织工具-交易列表的映射结果，因此我们首先通过 `accountInfoService.getAllAccounts()` 获取所有账户的列表。然后，在我们循环遍历账户集合中的每个账户时，通过调用内部方法\
  \ `getTradesPerInstrumentForAccount` 来计算每个交易工具对应的交易集合的映射。该方法内部又使用 `tradeManagementProvider.getTradesForAccount`\
  \ 来获取给定账户 ID 的所有交易。一旦获取了所有交易，我们就可以遍历它们，然后将它们放入一个以它们所代表未平仓头寸的交易工具为键的映射中。这基本上就是创建此内部缓存所需完成的工作。现在，我们应该能够提供服务来处理大量关于交易的查询，而无需每次都访问底层提供者。我们稍后会讨论这个缓存的刷新方式和时机。首先，让我们看看此服务提供的所有服务以及它们如何利用缓存来服务请求。我们从非常简单的\
  \ `isTradeExistsForInstrument` 方法开始，其他服务方法也会使用它。\n\n```java\n/**\n *\n * @param\
  \ instrument\n * @return boolean 指示是否存在具有给定交易工具的交易\n */\npublic boolean isTradeExistsForInstrument(TradeableInstrument<N>\
  \ instrument) {\n    lock.readLock().lock();\n    try {\n        for (K accountId\
  \ : this.tradesCache.keySet()) {\n            if (isTradeExistsForInstrument(instrument,\
  \ accountId)) {\n                return true;\n            }\n        }\n    } finally\
  \ {\n        lock.readLock().unlock();\n    }\n    return false;\n}\n\nprivate boolean\
  \ isTradeExistsForInstrument(TradeableInstrument<N> instrument, K accountId) {\n\
  \    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> tradesForAccount =\n\
  \        this.tradesCache.get(accountId);\n    synchronized(tradesForAccount) {\n\
  \        if (TradingUtils.isEmpty(tradesForAccount)) {\n            return false;\n\
  \        }\n        return tradesForAccount.containsKey(instrument);\n    }\n}\n\
  ```\n\n此方法首先申请一个 `ReadLock` 以从缓存中读取数据。这包括遍历缓存中所有可用的账户 ID 键，并尝试确定底层映射中是否存在某个交易工具键。这个逻辑被封装在具有相同名称的私有重载方法中。有人可能会问，我们为什么要在以账户\
  \ ID 为键的缓存值（即底层映射）上进行同步？答案在于 `refreshTradesForAccount` 方法。\n\n```java\n/**\n * 一种便捷方法，用于以线程安全的方式刷新账户的内部交易缓存。\n\
  \ * 理想情况下，当交易平台通知交易事件时（例如，订单成交导致交易创建，\n * 或触及止损/止盈水平导致交易结算），应调用此方法。\n *\n * @param\
  \ accountId\n */\npublic void refreshTradesForAccount(K accountId) {\n    Map<TradeableInstrument<N>,\
  \ Collection<Trade<M, N, K>>> tradeMap =\n        getTradesPerInstrumentForAccount(accountId);\n\
  \    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> oldTradeMap = tradesCache.get(accountId);\n\
  \    synchronized(oldTradeMap) {\n        oldTradeMap.clear();\n        oldTradeMap.putAll(tradeMap);\n\
  \    }\n}\n```\n\n总之，此方法允许该服务的外部客户端根据他们认为可能需要为给定账户 ID 刷新缓存的事件来刷新缓存。正如我们将在后续章节中讨论的，我们可以为各种平台事件（如\
  \ `OrderFilled`）注册处理器，例如，当一个挂单成交时，我们会收到一个回调。这些事件会导致平台上创建新的交易，这意味着我们的缓存需要更新并与平台同步。当需要刷新给定账户\
  \ ID 的底层值映射时，我们必须确保刷新代码在底层值映射上是 `synchronized` 的。这就是我们在这些方法中看到 `synchronized` 代码块的原因，它保证了如果映射由于事件而被刷新，另一个读取器会等待，反之亦然，刷新过程会等待直到读取完成。\n\
  \n我们接下来讨论的服务方法是 `getTradesForAccountAndInstrument`，顾名思义，它用于检索给定账户 ID 和交易工具的交易列表。\n\
  \n```java\n/**\n * @param accountId\n * @param instrument\n * @return 返回给定交易工具和账户的所有交易集合。\n\
  \ * 如果没有找到，则返回空集合。\n */\npublic Collection<Trade<M, N, K>> getTradesForAccountAndInstrument(K\
  \ accountId,\n    TradeableInstrument<N> instrument) {\n    Map<TradeableInstrument<N>,\
  \ Collection<Trade<M, N, K>>> tradesForAccount =\n        this.tradesCache.get(accountId);\n\
  \    synchronized(tradesForAccount) {\n        if (!TradingUtils.isEmpty(tradesForAccount)\
  \ &&\n            tradesForAccount.containsKey(instrument)) {\n            return\
  \ Lists.newArrayList(tradesForAccount.get(instrument));\n        }\n    }\n    return\
  \ Collections.emptyList();\n}\n```\n\n\n上面的服务方法代码相当直接。唯一值得一提的是使用`synchronized`块来访问给定账户\
  \ ID 的值映射。其余代码不言自明。下一个方法同样是`getTradesForAccount`，非常简单。此方法返回给定账户 ID 的所有交易。\n\n```java\n\
  /**\n *\n * @param accountId\n * @return a Collection of all Trades for a given\
  \ accountId. An empty\n * Collection is returned if none found.\n */\npublic Collection<Trade<M,\
  \ N, K>> getTradesForAccount(K accountId) {\n    Map<TradeableInstrument<N>, Collection<Trade<M,\
  \ N, K>>> tradesForAccount =\n        this.tradesCache.get(accountId);\n    Collection<Trade<M,\
  \ N, K>> trades = Lists.newArrayList();\n    synchronized(tradesForAccount) {\n\
  \        if (TradingUtils.isEmpty(tradesForAccount)) {\n            return trades;\n\
  \        }\n        for (Collection<Trade<M, N, K>> tradeLst: tradesForAccount.values())\
  \ {\n            trades.addAll(tradeLst);\n        }\n    }\n    return trades;\n\
  }\n```\n\n相同原则适用于上述代码。我们获取给定账户 ID 下按工具键控的交易映射。在`synchronized`块中遍历映射的所有条目，将映射条目的值添加到集合中并返回。\n\
  \n我们接下来讨论的方法`getAllTrades`，返回每个账户的所有交易集合。代码涉及遍历所有账户 ID（即缓存的键），对每个键调用`getTradesForAccount`方法，并将交易集合添加到一个已有集合中，该集合包含之前所有键（账户\
  \ ID）获取的交易。\n\n```java\n/**\n * @return a Collection of all trades that belong to\
  \ all accounts for the user\n */\npublic Collection<Trade<M, N, K>> getAllTrades()\
  \ {\n    lock.readLock().lock();\n    try {\n        Collection<Trade<M, N, K>>\
  \ trades = Lists.newArrayList();\n        for (K accId: this.tradesCache.keySet())\
  \ {\n            trades.addAll(getTradesForAccount(accId));\n        }\n       \
  \ return trades;\n    } finally {\n        lock.readLock().unlock();\n    }\n}\n\
  ```\n\n我们可以利用这个内部缓存衍生出其他有用信息，例如：\n\n1. 给定货币的净持仓数量是多少？\n2. 查找所有对给定工具有交易的账户。\n3. 总未平仓头寸的价值是多少？\n\
  \n我们将尝试编写上述前两个功能，以演示如何利用此缓存快速获取各种问题的答案。第一个是`findNetPositionCountForCurrency`，它返回给定货币的未平仓净持仓数量。\n\
  \n```java\n/**\n *\n * @param currency\n * @return the net position for a given\
  \ currency considering all Trades for\n *         all Accounts. A negative value\
  \ suggests that the system has net\n *         short position for the given currency,\
  \ whilst a positive value\n *         suggests a net long position.\n * @see TradingUtils#getSign(String,\n\
  \ *      com.precioustech.fxtrading.TradingSignal, String)\n */\npublic int findNetPositionCountForCurrency(String\
  \ currency) {\n    int posCt = 0;\n    lock.readLock().lock();\n    try {\n    \
  \    for (K accountId: this.tradesCache.keySet()) {\n            posCt += findNetPositionCountForCurrency(currency,\
  \ accountId);\n        }\n    } finally {\n        lock.readLock().unlock();\n \
  \   }\n    return posCt;\n}\n\nprivate int findNetPositionCountForCurrency(String\
  \ currency, K accountId) {\n    Map<TradeableInstrument<N>, Collection<Trade<M,\
  \ N, K>>> tradeMap = this.tradesCache.get(accountId);\n    synchronized(tradeMap)\
  \ {\n        if (TradingUtils.isEmpty(tradeMap)) {\n            return 0;\n    \
  \    } else {\n            int positionCtr = 0;\n            for (Collection<Trade<M,\
  \ N, K>> trades: tradeMap.values()) {\n                for (Trade<M, N, K> tradeInfo:\
  \ trades) {\n                    positionCtr += TradingUtils.getSign(tradeInfo.getInstrument().getInstrument(),\n\
  \                        tradeInfo.getSide(), currency);\n                }\n  \
  \          }\n            return positionCtr;\n        }\n    }\n}\n```\n\n从上述代码可以看出，大部分工作由同名的内部重载方法完成。公共\
  \ API 方法只是遍历缓存中的账户 ID 键，并委托给私有方法。私有方法（我们很快会看到）返回给定货币和账户的净持仓数量。此结果被累加到持仓计数中，循环结束后作为最终答案从方法返回。现在回到内部私有方法`findNetPositionCountForCurrency`，代码看起来非常直接。对于每个账户\
  \ ID 键，我们获取按工具键控的交易映射。对于给定工具的每个交易列表中的交易，我们直接委托给多功能函数`TradingUtils.getSign`，它完成所有计算。你可能注意到我们直接将交易的货币对和所查询货币传递给该函数，甚至没有检查所查询货币是否属于该货币对。这由函数处理，对于这种情况返回\
  \ 0。现在我们讨论最后一个服务方法`findAllAccountsWithInstrumentTrades`，顾名思义，它返回所有对给定工具有未平仓头寸的账户\
  \ ID 列表。下面的代码非常直接，无需过多解释。该方法委托给`isTradeExistsForInstrument`，由它判断是否应将当前循环中的账户 ID\
  \ 添加到要返回的集合中。\n\n```java\n/**\n * @param instrument\n * @return a Collection of\
  \ accountIds that have at least 1 trade for the\n *         given instrument. An\
  \ empty Collection is returned if none satisfy\n *         this condition.\n */\n\
  public Collection<K> findAllAccountsWithInstrumentTrades(TradeableInstrument<N>\
  \ instrument) {\n    Collection<K> accountIds = Sets.newHashSet();\n    lock.readLock().lock();\n\
  \    try {\n        for (K accountId: this.tradesCache.keySet()) {\n           \
  \ if (isTradeExistsForInstrument(instrument, accountId)) {\n                accountIds.add(accountId);\n\
  \            }\n        }\n    } finally {\n        lock.readLock().unlock();\n\
  \    }\n    return accountIds;\n}\n```\n\n\n\n### 6.11 动手实践\n\n本节我们将为本章讨论的所有交易和订单服务编写演示程序。首先，我们编写一个使用\
