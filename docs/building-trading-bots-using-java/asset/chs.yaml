  \ String.valueOf(stopLoss)));\n15  httpPatch.setEntity(new UrlEncodedFormEntity(params));\n\
  16  return httpPatch;\n17 }\n```\n\n\n\n`modifyTrade()`方法首先调用`getTradeForAccountUrl()`函数计算需要发送`PATCH`请求的\
  \ REST 资源 URL，以修改交易。对于账户 ID **123456** 和交易 ID **234567**，该函数将计算得到：\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/trades/234567\n\
  ```\n\n计算得到 URL 后，我们可以创建`HttpPatch`对象实例来准备补丁命令。这次对于`NameValuePair`对象列表，只需分别创建 2\
