  \ 示例输出\n\n## 11\\. 邮件通知\n\n本章将讨论邮件通知功能，该功能在机器人内部触发特定事件时通知用户，极为实用。这些通知与我们第 7 章讨论的交易/订单/账户事件紧密关联。因此，与同章讨论的其他处理程序类似，邮件通知组件也通过\
  \ `EventBus` 接收相同的输入负载。当用户操作需要紧急处理时，这些通知非常有用。例如，OANDA 平台可能触发 `MARGIN_CALL_ENTER`^(1)\
  \ 事件，表明账户面临紧急追加保证金要求。另一方面，这些通知也是跟踪自动化交易机器人运行状态的有效工具。通过开启交易、订单和账户事件的通知，用户可以清晰掌握机器人内部的运行状态。\n\
  \n### 11.1 通知设计\n\n如上所述，交易/订单和账户事件处理器处理的事件也会同时发送至邮件通知服务。该服务 `EventEmailNotifier`\
  \ 处理此事件，并在为该事件配置了相应的 `EmailContentGenerator` 时生成邮件。`EmailContentGenerator` 实现负责生成邮件主题和正文（即\
  \ `EmailPayLoad`），不同事件可对应不同的实现。\n\n首先来看存储邮件内容生成结果的 POJO 类 `EmailPayLoad`。\n\n####\
  \ 11.1.1 EmailPayLoad POJO 类\n\n```java\n 1 public class EmailPayLoad {\n 2  private\
  \ final String subject;\n 3  private final String body;\n\n 5  public EmailPayLoad(String\
  \ subject, String body) {\n 6   super();\n 7   this.subject = subject;\n 8   this.body\
  \ = body;\n 9  }\n\n11  public String getSubject() {\n12   return subject;\n13 \
  \ }\n\n15  public String getBody() {\n16   return body;\n17  }\n\n19 }\n```\n\n\
  `EmailPayLoad` 包含邮件的主题和正文，通过 `JavaMail` API 发送，并在 Spring 配置中进行配置。\n\n#### 11.1.2\
  \ EmailContentGenerator 接口\n\n```java\n1 public interface EmailContentGenerator<T>\
  \ {\n\n3  EmailPayLoad generate(EventPayLoad<T> payLoad);\n\n5 }\n```\n\n\n\n####\
  \ 11.1.3 示例实现\n\n在本节中，我们将讨论 `EmailContentGenerator` 接口的一些示例实现。首先，我们来看一个实现，它在平台生成以下交易事件时发送邮件：\n\
  \n- 交易已平仓\n- 触发止损\n- 触发止盈\n\n例如，当触及止盈水平时，我们可以预期收到类似如下的 json 响应：\n\n```json\n{\n\
  \  \"id\":10003,\n  \"accountId\":234567,\n  \"time\":\"1443968061000000\",\n  \"\
  type\":\"TAKE_PROFIT_FILLED\",\n  \"tradeId\":1800805337,\n  \"instrument\":\"USD_CHF\"\
  ,\n  \"units\":3000,\n  \"side\":\"sell\",\n  \"price\":1.00877,\n  \"pl\":3.48,\n\
  \  \"interest\":0.0002,\n  \"accountBalance\":5912.5829\n}\n```\n\n处理来自 OANDA 平台交易事件的\
  \ `TradeEventHandler` 同样实现了 `EmailContentGenerator` 接口。因此，生成 `EmailPayLoad` 的方法如下所示：\n\
  \n```java\n@Override\npublic EmailPayLoad generate(EventPayLoad < JSONObject > payLoad)\
  \ {\n  JSONObject jsonPayLoad = payLoad.getPayLoad();\n  TradeableInstrument < String\
  \ > instrument = new TradeableInstrument < String > (jsonPayLoad.get(\n    OandaJsonKeys.instrument).toString());\n\
  \  final String type = jsonPayLoad.get(OandaJsonKeys.type).toString();\n  final\
  \ long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n  final double\
  \ accountBalance = ((Number) jsonPayLoad.get(OandaJsonKeys.accountBalance)).doubleValue();\n\
  \  final long tradeId = (Long) jsonPayLoad.get(OandaJsonKeys.tradeId);\n  final\
  \ double pnl = ((Number) jsonPayLoad.get(OandaJsonKeys.pl)).doubleValue();\n  final\
  \ double interest = ((Number) jsonPayLoad.get(OandaJsonKeys.interest)).doubleValue();\n\
  \  final long tradeUnits = (Long) jsonPayLoad.get(OandaJsonKeys.units);\n  final\
  \ String emailMsg = String\n    .format(\"Trade event %s received for account %d.\
  \ \" + \"Trade id=%d. Pnl=%5.3f, Interest=%5.3f, Trade Units=%d. \" + \"Account\
  \ balance after the event=%5.2f\",\n      type, accountId, tradeId, pnl, interest,\
  \ tradeUnits, accountBalance);\n  final String subject = String.format(\n    \"\
  Order event %s for %s\", type, instrument.getInstrument());\n  return new EmailPayLoad(subject,\
  \ emailMsg);\n}\n```\n\n上述代码从 `JSONObject` 中提取了关键信息，例如：\n\n- `pnl`\n- `interest`\n\
  - `account id`\n- `account balance`\n- 等等…\n\n并为上方的 json 响应生成了如下邮件正文：\n\n```\nTrade\
  \ event TAKE_PROFIT_FILLED received for account 234567.\nTrade id=1800805337. Pnl=3.48,\
  \ Interest=0, Trade Units=3000.\nAccount balance after the event=5912.58\n```\n\n\
  生成的邮件主题为：\n\n```\nOrder event TAKE_PROFIT_FILLED for USD_CHF\n```\n\n下一个示例涉及订单成交事件。当此类事件发生时，我们可以预期从\
  \ OANDA 平台收到如下 json：\n\n```json\n{\n  \"id\": 10002,\n  \"accountId\": 123456,\n\
  \  \"time\": \"1443968041000000\",\n  \"type\": \"ORDER_FILLED\",\n  \"instrument\"\
  : \"EUR_USD\",\n  \"units\": 10,\n  \"side\": \"sell\",\n  \"price\": 1,\n  \"pl\"\
  : 1.234,\n  \"interest\": 0.034,\n  \"accountBalance\": 10000,\n  \"orderId\": 0,\n\
  \  \"tradeReduced\": {\n    \"id\": 54321,\n    \"units\": 10,\n    \"pl\": 1.234,\n\
  \    \"interest\": 0.034\n  }\n}\n```\n\n处理来自 OANDA 平台订单成交事件的 `OrderFilledEventHandler`\
  \ 同样实现了 `EmailContentGenerator` 接口。因此，生成 `EmailPayLoad` 的方法如下所示：\n\n```java\n@Override\n\
  public EmailPayLoad generate(EventPayLoad < JSONObject > payLoad) {\n  JSONObject\
  \ jsonPayLoad = payLoad.getPayLoad();\n  TradeableInstrument < String > instrument\
  \ = new TradeableInstrument < String > (jsonPayLoad\n    .containsKey(OandaJsonKeys.instrument)\
  \ ? jsonPayLoad.get(OandaJsonKeys.instrument).toString() : \"N/A\");\n  final String\
  \ type = jsonPayLoad.get(OandaJsonKeys.type).toString();\n  final long accountId\
  \ = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n  final double accountBalance\
  \ = jsonPayLoad.\n  containsKey(OandaJsonKeys.accountBalance) ? ((Number) jsonPayLoad\n\
  \    .get(OandaJsonKeys.accountBalance)).doubleValue() : 0.0;\n  final long orderId\
  \ = (Long) jsonPayLoad.get(OandaJsonKeys.id);\n  final String emailMsg = String.format(\n\
  \    \"Order event %s received on account %d. Order id=%d. \" + \"Account balance\
  \ after the event=%5.2f\", type,\n    accountId, orderId, accountBalance);\n  final\
  \ String subject = String.format(\n    \"Order event %s for %s\", type, instrument.getInstrument());\n\
  \  return new EmailPayLoad(subject, emailMsg);\n}\n```\n\n上述代码与前一个示例类似，提取了一些关键信息来准备邮件正文，包括：\n\
  \n- `account id`\n- `account balance`\n- `order id`\n\n对于我们的示例，将生成以下正文：\n\n```\n\
  Order event ORDER_FILLED received on account 123456. Order id=10002.\nAccount balance\
  \ after the event=10000.00\n```\n\n而主题将为：\n\n```\nOrder event ORDER_FILLED for EUR_USD\n\
  ```\n\n\n\n#### 11.1.4 `EventEmailNotifier` 服务\n\n`EventEmailNotifier` 是一个简单的服务，它拥有一个由\
  \ Spring 注入并在应用 Spring 配置文件中配置的 `eventEmailContentGeneratorMap`。该映射的键是 `Event` 接口的实例，值则是\
  \ `EmailContentGenerator` 接口的实现。当 `EventBus` 在 `notifyByEmail` 方法内接收到一个 `EventPayLoad`\
  \ 时，系统会在该映射中搜索能够处理该负载的 `EmailContentGenerator` 实例。如果找到，该实例会生成一个 `EmailPayLoad` 实例。随后，该实例被用于构造一个\
  \ `SimpleMailMessage` 并通过 `mailSender` 发送出去。\n\n```java\npublic class EventEmailNotifier\
  \ < T > {\n\n private static final Logger LOG = Logger.getLogger(EventEmailNotifier.class);\n\
  \n @Autowired\n JavaMailSender mailSender;\n @Resource\n Map < Event,\n EmailContentGenerator\
  \ < T >> eventEmailContentGeneratorMap;\n @Autowired\n TradingConfig tradingConfig;\n\
  \n @Subscribe\n @AllowConcurrentEvents\n public void notifyByEmail(EventPayLoad\
  \ < T > payLoad) {\n  Preconditions.checkNotNull(payLoad);\n  EmailContentGenerator\
  \ < T > emailContentGenerator =\n   eventEmailContentGeneratorMap.get(payLoad.getEvent());\n\
  \  if (emailContentGenerator != null) {\n   EmailPayLoad emailPayLoad = emailContentGenerator.generate(payLoad);\n\
  \   SimpleMailMessage msg = new SimpleMailMessage();\n   msg.setSubject(emailPayLoad.getSubject());\n\
  \   msg.setTo(tradingConfig.getMailTo());\n   msg.setText(emailPayLoad.getBody());\n\
  \   this.mailSender.send(msg);\n  } else {\n   LOG.warn(\"No email content generator\
  \ found for event:\" + payLoad.getEvent().name());\n  }\n }\n}\n```\n\n如果我们快速浏览一下\
  \ Spring 配置文件（我们在其中配置了想要发送通知的事件），就能更好地理解这一点。\n\n```xml\n<bean id=\"orderEventHandler\"\
  \n  class=\"com.precioustech.fxtrading.oanda.restapi.events.OrderFilledEventHandler\"\
  >\n\t\t<constructor-arg index=\"0\" ref=\"tradeInfoService\"/>\n\t</bean>\n<bean\
  \ id=\"tradeEventHandler\"\nclass=\"com.precioustech.fxtrading.oanda.restapi.events.TradeEventHandler\"\
  >\n\t<constructor-arg index=\"0\" ref=\"tradeInfoService\"/>\n</bean>\n\n<util:map\
  \ id=\"eventEmailContentGeneratorMap\" key-type=\"com.precioustech.fxtrading.events.Event\"\
  >\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).MARKET_ORDER_CREATE}\"\
  \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).LIMIT_ORDER_CREATE}\"\
  \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).ORDER_CANCEL}\"\
  \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).ORDER_FILLED}\"\
  \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).TRADE_CLOSE}\"\
  \n  value-ref=\"tradeEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).STOP_LOSS_FILLED}\"\
  \n  value-ref=\"tradeEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).TAKE_PROFIT_FILLED}\"\
  \n  value-ref=\"tradeEventHandler\"/>\n</util:map>\n```\n\n在上述配置中，我们首先配置了两个处理器：`OrderFilledEventHandler`\
  \ 和 `TradeEventHandler`，它们分别处理 `OrderEvents` 和 `TradeEvents` 类型的事件，这两个事件都是 `Event`\
  \ 接口的实现。然后，我们挑选出想要发送通知的事件，并在此处进行配置。\n\n至此，我们对电子邮件通知的简短讨论就结束了。\n\n### 11.2 自己动手试一试\n\
  \n在本节中，我们将编写一个 Spring 配置的示例演示程序，模拟使用 EventBus 发布一个交易事件，然后查看实际的通知是否出现在邮箱中。首先，让我们看看代码。\n\
