  \n## 8\\. 集成 Twitter\n\n现在我们已进入构建交易机器人旅程中可能最激动人心的部分。与社交媒体交互，可能是机器人应具备的最重要能力之一。这在几年前或许并不重要，但现在却极为关键，因为大多数新闻、事件和泄密信息似乎都首先出现在社交媒体上，从而影响市场。能够实时订阅这些信息流、理解其内容并做出决策，为任何机器人增加了一层复杂性。我们的机器人也不例外，只是我们不会尝试每秒处理成千上万条推文，而是学习与\
  \ Twitter 集成的基础知识。我们希望在章节结束时实现以下目标：\n\n*   连接到一个 Twitter 账户。\n*   搜索推文。\n*   解析推文并理解其含义。\n\
  \n我们将特别关注用户发布的关于外汇的推文，这些推文具有清晰的结构，并包含订单和交易信息。这样做的目的是，我们可以构建一种策略，复制他人的操作，或许模仿他们的行动，或许反其道而行之。这将在下一章中详细讨论，作为包含此概念的策略的一部分。\n\
  \n### 8.1 创建 Twitter 应用\n\n在我们可以通过用户账户自动发布和读取推文之前，需要将一个 Twitter 应用关联到该用户账户。为此应用生成的令牌，将用于登录\
  \ Twitter 并通过机器人执行所需操作。让我们逐步操作，直到获得通过 Java 应用连接所需的令牌。\n\n**步骤 1**：访问 [`apps.twitter.com/app/new`](https://apps.twitter.com/app/new)，你将看到以下页面。\n\
  \n![为机器人创建应用](img/00064.jpeg \"步骤 1\") 为机器人创建应用\n\n**步骤 2**：接受协议并提交表单后，我们将看到以下确认页面。\n\
  \n![Twitter 应用创建成功](img/00065.jpeg \"步骤 2\") Twitter 应用创建成功\n\n**步骤 3**：在确认页面，现在必须点击\
  \ *密钥和访问令牌* 选项卡，我们将会看到 *消费者密钥* 和 *消费者密钥秘钥* 显示出来。请记下这些信息，稍后会用到。\n\n![消费者令牌](img/00066.jpeg\
  \ \"步骤 3\") 消费者令牌\n\n**步骤 4**：我们现在可以创建其他访问令牌了。请点击 *令牌操作* 下方的按钮来生成令牌。我们将看到如下页面：\n\
  \n![授权令牌](img/00067.jpeg \"步骤 4\") 授权令牌\n\n现在我们应获得以下 4 个令牌，交易机器人应用需要使用它们通过我们的账户登录。\n\
  \n*   消费者密钥\n*   消费者秘钥\n*   访问密钥令牌\n*   访问密钥秘钥\n\n### 8.2 Spring Social\n\nSpring\
  \ Social^(1) 是与 Facebook、Twitter、LinkedIn 等社交媒体应用集成的既定选择。它提供了连接特定社交网络所需的所有基础设施，让我们专注于实现从这些网络挖掘数据或向这些网络发布数据的逻辑。之前使用过\
  \ Spring 的开发者会识别出与 JMS^(2) 和 JDBC^(3) 相同的模式，在这些模式中，所有中间件和数据库基础设施分别由 Spring 处理，从而让我们全神贯注于手头的任务。\n\
  \n就我们的讨论而言，我们将专注于将机器人集成到 Twitter^(4) 中。\n\n#### 8.2.1 使用和配置 Spring Social\n\n我们需要在\
  \ Maven 的 `pm.xml` 文件中添加以下依赖项，以便将 Spring Social 引入机器人生态系统。\n\n```\n1 <dependency>\n\
  2    <groupId>org.springframework.social</groupId>\n3    <artifactId>spring-social-twitter</artifactId>\n\
  4    <version>1.1.0.RELEASE</version>\n5 </dependency>\n```\n\n与 Twitter 的交互是通过\
  \ `TwitterTemplate`^(5) 进行的，需要将其配置到 Spring 配置文件中，使用我们在定义 Twitter 应用时生成的令牌。\n\n```\n\
  1 <bean id=\"twitter\" class=\"org.springframework.social.twitter.api.impl.TwitterTemplate\"\
  >\n2 \t\t<constructor-arg index=\"0\" value=\"${twitter.consumerKey}\"/>\n3 \t\t\
  <constructor-arg index=\"1\" value=\"${twitter.consumerSecret}\"/>\n4 \t\t<constructor-arg\
  \ index=\"2\" value=\"${twitter.accessToken}\"/>\n5 \t\t<constructor-arg index=\"\
  3\" value=\"${twitter.accessTokenSecret}\"/>\n6 </bean>\n```\n\n现在，`TwitterTemplate`\
  \ 已准备好被注入到任何服务中。\n\n\n\n### 8.3 采集外汇推文\n\n现在进入本章的核心内容，我们将讨论如何采集（搜索）结构良好的交易/订单推文。我们的目标是找到结构良好的推文，这些推文可以被解析并创建以下\
  \ POJO：\n\n- `NewFXTradeTweet`\n\n```java\npublic class NewFXTradeTweet < T > extends\
  \ FXTradeTweet < T > {\n    private final double stopLoss,\n    takeProfit;\n  \
  \  private final TradingSignal action;\n    private final String str;\n\n    public\
  \ NewFXTradeTweet(TradeableInstrument < T > instrument, double price,\n        double\
  \ stopLoss, double takeProfit,\n        TradingSignal action) {\n        super(instrument,\
  \ price);\n        this.stopLoss = stopLoss;\n        this.takeProfit = takeProfit;\n\
  \        this.action = action;\n        this.str = String.format(\"%s@%3.5f TP:\
  \ %3.5f: SL: %3.5f %s\",\n            instrument.getInstrument(), price, takeProfit,\n\
  \            stopLoss, action.name());\n    }\n\n    @Override\n    public String\
  \ toString() {\n        return str;\n    }\n\n    public TradingSignal getAction()\
  \ {\n        return this.action;\n    }\n\n    public double getStopLoss() {\n \
  \       return stopLoss;\n    }\n\n    public double getTakeProfit() {\n       \
  \ return takeProfit;\n    }\n}\n```\n\n- `CloseFXTradeTweet`\n\n```java\npublic\
  \ class CloseFXTradeTweet < T > extends FXTradeTweet < T > {\n    private final\
  \ double profit,\n    price;\n\n    public CloseFXTradeTweet(TradeableInstrument\
  \ < T > instrument, double profit,\n        double price) {\n        super(instrument,\
  \ price);\n        this.profit = profit;\n        this.price = price;\n    }\n\n\
  \    public double getProfit() {\n        return profit;\n    }\n\n    @Override\n\
  \    public double getPrice() {\n        return price;\n    }\n}\n```\n\n其中基类 `FXTradeTweet`\
  \ 为：\n\n```java\npublic abstract class FXTradeTweet < T > {\n    private final TradeableInstrument\
  \ < T > instrument;\n    private final double price;\n\n    public FXTradeTweet(TradeableInstrument\
  \ < T > instrument, double price) {\n        super();\n        this.instrument =\
  \ instrument;\n        this.price = price;\n    }\n\n    public TradeableInstrument\
  \ < T > getInstrument() {\n        return instrument;\n    }\n\n    public double\
  \ getPrice() {\n        return price;\n    }\n}\n```\n\n结构良好的交易推文的概念是指，一群 Twitter\
  \ 用户以固定格式持续发布推文，并且我们可以为这些推文编写 `TweetHandler`。我们只关注那些关于新订单或平仓交易的推文。当我们讨论基于推文的策略时，其理由会更加清晰。现在先让我们看看来自用户\
  \ `@SignalFactory`^(6) 和 `@ZuluTrader101`^(7) 的一些推文示例，这样就能更清楚地理解我的意思。\n\n- 来自 `@SignalFactory`\
  \ 的推文\n\n![新交易](img/00068.jpeg \"NewTrade\") 新交易 ![新交易](img/00069.jpeg \"NewTrade1\"\
  ) 新交易 ![平仓](img/00070.jpeg \"CloseTrade\") 平仓 ![平仓](img/00071.jpeg \"CloseTrade\"\
  ) 平仓\n\n- 来自 `@ZuluTrader101` 的推文\n\n![新交易与平仓](img/00072.jpeg \"Zulu\") 新交易与平仓 ![新交易与平仓](img/00073.jpeg\
  \ \"Zulu\") 新交易与平仓\n\n查看来自这两位用户的推文示例，可以发现他们总是以某种固定格式发布推文。如果我们为这些推文分配一个专门的推文处理器（该处理器知道如何解析来自特定用户的推文），那么解析这些推文就变得很简单。我们稍后再讨论处理器。在此之前，我们先看看如何搜索来自特定用户的推文。\n\
  \n#### 8.3.1 TweetHarvester 接口\n\n`TweetHarvester` 接口规定了为给定用户搜索推文的功能，这些推文会生成一个包含新建/平仓外汇交易推文的集合。其定义如下：\n\
  \n```java\npublic interface TweetHarvester < T > {\n\n    Collection < NewFXTradeTweet\
  \ < T >> harvestNewTradeTweets(String userId);\n\n    Collection < CloseFXTradeTweet\
  \ < T >> harvestHistoricTradeTweets(String userId,\n        TradeableInstrument\
  \ < T > instrument);\n}\n```\n\n接口的第一个方法相当直接。该方法的职责是，自上次搜索以来，从给定用户处采集新的交易推文。实现者负责跟踪时间线，并且只应返回新的推文。\n\
  \n第二个方法的职责同样是采集自上次搜索以来，针对给定交易品种的平仓交易新推文。\n\n#### 8.3.2 FXTweetHandler 接口\n\n正如我们本章前面讨论过的，只要给定用户以固定格式持续发布推文，为这些新建/平仓外汇交易推文分配的专用处理器，就能解析该推文并从中创建\
  \ `NewFxTradeTweet` 和 `CloseFXTradeTweet`。该接口定义了这一约定，并提供了一些其他有用的方法：\n\n```java\n\
  public interface FXTweetHandler < T > {\n\n    FXTradeTweet < T > handleTweet(Tweet\
  \ tweet);\n\n    String getUserId();\n\n    Collection < Tweet > findNewTweets();\n\
  \n    Collection < Tweet > findHistoricPnlTweetsForInstrument(\n        TradeableInstrument\
  \ < T > instrument);\n}\n```\n\n前三个接口方法不言自明。方法 `findHistoricPnlTweetsForInstrument`\
  \ 需要稍作解释。该方法的约定是，检索给定用户针对给定交易品种发布的所有推文，这些推文均为平仓交易推文，并产生了盈亏数据（例如，正值或负值的点数结果。请回顾本章讨论的两位用户的平仓交易推文）。这一点目前可能还不太容易理解，但当我们下一章讨论基于\
  \ Twitter 的策略时，就会豁然开朗。\n\n\n\n#### 8.3.3 `AbstractFXTweetHandler` 基类\n\n我们通过定义一个实现\
  \ `FXTweetHandler` 接口的抽象类开始讨论该接口的具体实现，该类只实现了接口中的两个关键方法：`findNewTweets()` 和 `getUserId()`。\n\
  \n其中，`findNewTweets()` 方法的实现为我们提供了讨论 Twitter 搜索 API^(8) 的机会。该 API 提供了一套全面的查询运算符，使我们能够构建搜索查询并按时间倒序检索推文集合。Twitter\
  \ 的响应是一个 JSON 负载，但由于我们使用了 `TwitterTemplate`，Spring 会负责解析该负载，并将其转换为更易于处理的 `org.springframework.social.twitter.api.Tweet`\
  \ 对象集合。\n\n**强烈建议您在继续之前阅读搜索 API 页面，以了解运算符、返回结果的约束以及最佳实践。**\n\n以下是一些直接取自相关文档并稍作修改、且与我们搜索相关的示例：\n\
  \n| 运算符 | 搜索目标 |\n| --- | --- |\n| `from:foo` | 查找来自用户 “foo” 的推文 |\n| `from:foo\
  \ since:2015-012-01` | 查找自 2015-012-01 以来来自用户 “foo” 的推文 |\n| `from:foo since_id:10000000`\
  \ | 查找自推文 ID 10000000 以来来自用户 “foo” 的推文 |\n| `from:foo Profit: OR Loss:` | 查找来自用户\
  \ “foo” 且包含字符（‘Profit:’ 或 ‘Loss:’）的推文 |\n\n```\n 1 public abstract class AbstractFXTweetHandler\
  \ < T > implements FXTweetHandler < T > {\n\n3  @Autowired\n 4  protected Twitter\
  \ twitter;\n 5  @Autowired\n 6  protected InstrumentService < T > instrumentService;\n\
  \ 7  @Autowired\n 8  protected ProviderHelper providerHelper;\n\n10  protected final\
  \ DateTime startTime = DateTime.now();\n11  protected final String startTimeAsStr;\n\
  12  protected volatile Long lastTweetId = null;\n13  protected final String userId;\n\
  14  protected static final String CLOSED = \"Closed\";\n15  protected static final\
  \ String BOUGHT = \"Bought\";\n16  protected static final String SOLD = \"Sold\"\
  ;\n17  protected static final Logger LOG =\n18  Logger.getLogger(AbstractFXTweetHandler.class);\n\
  19  static final String FROM_USER_SINCE_TIME_TWITTER_QRY_TMPL =\n20  \"from:%s since:%s\"\
  ;\n21  static final String FROM_USER_SINCE_ID_TWITTER_QRY_TMPL =\n22  \"from:%s\
  \ since_id:%d\";\n\n24  protected AbstractFXTweetHandler(String userId) {\n25  \
  \ this.userId = userId;\n26   DateTimeFormatter formatter = DateTimeFormat.forPattern(\"\
  yyyy-MM-dd\");\n27   startTimeAsStr = formatter.print(this.startTime);\n28  }\n\n\
  30  protected abstract NewFXTradeTweet < T > parseNewTrade(String tokens[]);\n\n\
  32  protected abstract CloseFXTradeTweet < T > parseCloseTrade(String tokens[]);\n\
  \n34  @Override\n35  public String getUserId() {\n36   return userId;\n37  }\n\n\
  39  private class TweetPredicate implements Predicate < Tweet > {\n\n41   @Override\n\
  42   public boolean apply(Tweet input) {\n43    return startTime.isBefore(input.getCreatedAt().getTime());\n\
  44   }\n\n46  }\n\n48  @Override\n49  public Collection < Tweet > findNewTweets()\
  \ {\n50   SearchResults results = null;\n51   if (lastTweetId == null) { // 查找自应用启动以来的新推文\n\
  52    synchronized(this) {\n53     if (lastTweetId == null) { // 双重检查锁\n54     \
  \ results = twitter.searchOperations().search(\n55       String.format(\n56    \
  \    FROM_USER_SINCE_TIME_TWITTER_QRY_TMPL, getUserId(), this.startTimeAsStr));\n\
  57      TweetPredicate predicate = new TweetPredicate();\n58      List < Tweet >\
  \ filteredTweets = Lists.newArrayList();\n59      for (Tweet tweet: results.getTweets())\
  \ {\n60       if (predicate.apply(tweet)) {\n61        if (lastTweetId == null)\
  \ {\n62         /* 取第一条推文，因为推文是按时间倒序排列的 */\n63         this.lastTweetId = tweet.getId();\n\
  64        }\n65        filteredTweets.add(tweet);\n66       }\n67      }\n68   \
  \   return filteredTweets;\n69     }\n\n71    }\n\n73   }\n74   results = twitter.searchOperations().search(\n\
  75    String.format(\n76     FROM_USER_SINCE_ID_TWITTER_QRY_TMPL, getUserId(), lastTweetId));\n\
  77   List < Tweet > tweets = results.getTweets();\n78   if (!TradingUtils.isEmpty(tweets))\
  \ {\n79    lastTweetId = tweets.get(0).getId();\n80   }\n81   return tweets;\n\n\
  83  }\n84 }\n```\n\n该类的核心在于 `findNewTweets()` 方法的实现。该方法尝试检索自上次 API 调用以来的所有新推文。我们假设存在一个按固定时间间隔运行的定时任务，调用此方法来获取最新的推文。为了获取自上次调用以来的最新推文，该类必须在内部跟踪上次获取的推文。通过使用大于给定用户上次推文\
  \ ID 的 ID，它可以找到该用户的所有最新推文。然而，当该方法首次被调用时，我们需要探索另一种查找最新推文的方式。在这种情况下，我们使用该类初始化时的时间作为起始点来检索最新推文。这就是我们在\
  \ `if (lastTweetId == null)` 条件中看到的逻辑。为了使该类线程安全，我们添加了额外的同步机制，并考虑了双重检查锁^(9)。基于时间的查询使用了\
  \ `from:%s since:%s` 格式，其中我们提供相关的用户 ID 和格式为 `yyyy-MM-dd` 的启动时间。一旦此次搜索返回结果，我们就可以获取集合中的第一条推文，并将其\
  \ ID 设置为最新 ID，作为下次搜索的起点。在这种情况下，我们使用查询字符串 `from:%s since_id:%d`，提供用户 ID 和上次搜索设置的\
  \ ID。再次重申，搜索结果按从最新到最旧的顺序排列。\n\n#### 8.3.4 特定用户的 `TweetHandlers`\n\n**警告：** - *针对各个用户讨论的推文格式可能随时更改，恕不另行通知。因此，在解析过程中，我们务必尽可能编写防御性代码。*\n\
  \n为了总结我们的讨论，我们将查看本章前面讨论过的用户的 `TweetHandlers`。大部分代码都应围绕推文解析展开，因为它非常特定于该用户。常见的功能，例如按用户搜索新推文，已在上一节讨论的基类\
  \ `AbstractFXTweetHandler` 中进行了抽象。\n\n对于新交易，我们感兴趣的是解析出：\n\n*   交易动作\n*   货币对\n*\
  \   限价单价格\n*   止损价格\n*   止盈价格\n\n对于平仓交易，我们想要解析：\n\n*   货币对\n*   平仓价格\n*   盈亏点数\n\
  \n\n\n##### `SignalFactoryFXTweetHandler`\n\n此推文处理器尝试解析用户`@SignalFactory`发布的与开仓/平仓交易相关的推文。让我们通过文本形式回顾该用户开仓与平仓推文的一些示例：\n\
  \n```\n 1 //New Trade\n 2 Forex Signal | Sell USDCHF@0.91902 | SL:0.92302 | TP:0.91102\
  \ | 2015.01.30 17:52 GMT | #fx #forex #fb\n\n4 Forex Signal | Sell GBPAUD@2.03572\
  \ | SL:2.03972 | TP:2.02772 | 2016.01.22 12:40 GMT | #fx #forex #fb\n\n6 Forex Signal\
  \ | Buy GBPCAD@2.03229 | SL:2.02829 | TP:2.04029 | 2016.01.22 13:56 GMT | #fx #forex\
  \ #fb\n\n8 //Close Trade\n 9 Forex Signal | Close(SL) Buy NZDCHF@0.66566 | Loss:\
  \ -40 pips | 2015.01.30 18:16 GMT | #fx #forex #fb\n\n11 Forex Signal | Close(TP)\
  \ Buy GBPCHF@1.44636 | Profit: +80 pips | 2016.01.22 11:55 GMT | #fx #forex #fb\n\
  \n13 Forex Signal | Close(SL) Sell GBPAUD@2.03972 | Loss: -40 pips | 2016.01.22\
  \ 13:03 GMT | #fx #forex #fb\n```\n\n对于开仓交易，我们可以对此用户进行以下观察（假设我们先用分隔符`|`解析整个推文，得到\
  \ 6 个令牌）：\n\n- 交易操作始终是`Buy`或`Sell`，并且是第二个令牌的第一个单词。\n- 货币对始终是从第二个令牌的第二个单词按`@`字符分割后得到的第一个子令牌。\n\
  - 入场价格是从第二个令牌的第二个单词按`@`字符分割后得到的第二个子令牌。\n- 止损价格是从第三个令牌按`:`字符分割后得到的第二个子令牌。\n- 止盈价格是从第四个令牌按`:`字符分割后得到的第二个子令牌。\n\
  \n对于平仓交易，我们可以对此用户进行以下观察（假设我们先用分隔符`|`解析整个推文，得到 5 个令牌）：\n\n- 货币对始终是从第二个令牌的第三个单词按`@`字符分割后得到的第一个子令牌。\n\
  - 平仓价格始终是从第二个令牌的第三个单词按`@`字符分割后得到的第二个子令牌。\n- 盈亏始终是第三个令牌的第二个单词。\n\n一条通用观察：\n\n- 如果第二个令牌的第一个单词是`Buy`或`Sell`，则该推文与“开仓交易”相关。\n\
  - 如果第二个令牌的第一个单词以`Close`开头，则该推文与“平仓交易”相关。\n\n让我们看看实现上述观察的代码。\n\n```java\npublic class\
  \ SignalFactoryFXTweetHandler\nextends AbstractFXTweetHandler < String > {\n  private\
  \ static final String BUY = \"Buy\";\n  private static final String SELL = \"Sell\"\
  ;\n  private static final String CLOSE = \"Close\";\n  private static final String\
  \ COLON = \":\";\n  private static final String AT_THE_RATE = \"@\";\n\n  public\
  \ SignalFactoryFXTweetHandler(String userid) {\n   super(userid);\n  }\n\n  @Override\n\
  \  protected NewFXTradeTweet < String > parseNewTrade(String tokens[]) {\n   String\
  \ token1[] = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n   String action\
  \ = token1[0];\n   String tokens1spl[] = token1[1].split(AT_THE_RATE);\n   String\
  \ tokens2[] = tokens[2].trim().split(COLON);\n   String tokens3[] = tokens[3].trim().split(COLON);\n\
  \n   return new NewFXTradeTweet < String > (new TradeableInstrument < String > (this.providerHelper\n\
  \     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(tokens1spl[1]),\n    Double.parseDouble(tokens2[1]),\
  \ Double.parseDouble(tokens3[1]),\n    BUY.equals(action) ? TradingSignal.LONG :\
  \ TradingSignal.SHORT);\n  }\n\n  @Override\n  protected CloseFXTradeTweet < String\
  \ > parseCloseTrade(String tokens[]) {\n   String token1[] = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n\
  \   String tokens1spl[] = token1[token1.length - 1].split(AT_THE_RATE);\n   String\
  \ token2[] = tokens[2].trim().split(TradingConstants.SPACE_RGX);\n   return new\
  \ CloseFXTradeTweet < String > (new TradeableInstrument < String > (this.providerHelper\n\
  \     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(token2[1]),\n    Double.parseDouble(tokens1spl[1]));\n\
  \  }\n\n  @Override\n  public FXTradeTweet < String > handleTweet(Tweet tweet) {\n\
  \   String tweetTxt = tweet.getText();\n   String tokens[] = StringUtils.split(tweetTxt,\
  \ TradingConstants.PIPE_CHR);\n   if (tokens.length >= 5) {\n    String action =\
  \ tokens[1].trim();\n    if (action.startsWith(BUY) || action.startsWith(SELL))\
  \ {\n     return parseNewTrade(tokens);\n    } else if (action.startsWith(CLOSE))\
  \ {\n     return parseCloseTrade(tokens);\n    }\n   }\n   return null;\n  }\n\n\
  \  @Override\n  public Collection < Tweet > findHistoricPnlTweetsForInstrument(TradeableInstrument\
  \ < String > instrument) {\n   /*\n    * AND queries for the case below have suddenly\
  \ stopped working.\n    * something simple like from:SignalFactory GBPNZD is not\
  \ working.\n    * Check it out yourself on https://twitter.com/search-advanced.\n\
  \    * Apparently the only option is to get all tweets with phrase Profit or Loss\n\
  \    * and then use String contains to perform the step2 filtering\n    */\n\n \
  \  String query = String.format(\"Profit: OR Loss: from:%s\", getUserId(), isoInstr);\n\
  \   SearchResults results = twitter.searchOperations().search(query);\n   List <\
  \ Tweet > pnlTweets = results.getTweets();\n   List < Tweet > filteredPnlTweets\
  \ = Lists.newArrayList();\n   for (Tweet pnlTweet: pnlTweets) {\n    if (pnlTweet.getText().contains(isoInstr))\
  \ {\n     filteredPnlTweets.add(pnlTweet);\n    }\n   }\n   return filteredPnlTweets;\n\
  \  }\n}\n```\n\n操作始于`handleTweet(Tweet tweet)`方法，该方法在解析给定用户的搜索结果时被调用。其中有逻辑判断推文是涉及开仓交易、平仓交易还是无关交易。这几乎就是我们对该用户推文所做的“通用观察”。如果推文确实是开仓或平仓交易，我们会解析并返回`NewFXTradeTweet`或`CloseFXTradeTweet`的实例，这两个类都是`FXTradeTweet`类的子类。解析逻辑与上述“观察”部分所讨论的内容几乎完全一致。\n\
  \n最后一个需要稍作解释的方法是`findHistoricPnlTweetsForInstrument`。这里我们正在查找过去的平仓交易推文。由于我们只查找该用户的此类推文，必须使用该用户用来表示盈利或亏损的短语。这正是查询语句`from:%s\
  \ AND %s AND Profit: OR Loss:`的作用。回顾该用户平仓交易的示例，确实可以看出`Profit:`或`Loss:`作为第三个令牌的第一个单词出现。\n\
  \n\n\n##### `ZuluTrader101FXTweetHandler`\n\n此推文处理器尝试解析用户 `@ZuluTrader101` 发布的关于开仓/平仓交易的推文。为了回顾，让我们先看看该用户以文本形式发布的开仓和平仓推文示例：\n\
  \n```\n 1 //新交易\n 2 买入 0.43 手 #EURUSD 1.1371 | 在 http://goo.gl/moaYzx 免费自动跟单 #外汇\
  \ #金融 #金钱\n\n4 买入 0.69 手 #GBPCHF 1.4614 止损 1.45817 止盈 1.46617 | 在 http://goo.gl/moaYzx\
  \ 免费自动跟单 #外汇 #金融 #金钱\n\n6 卖出 0.34 手 #EURUSD 1.13694 | 在 http://goo.gl/moaYzx 免费自动跟单\
  \ #外汇 #金融 #金钱\n\n8 卖出 0.43 手 #EURUSD 1.13117 止损 1.13281 止盈 1.12963 | 在 http://goo.gl/moaYzx\
  \ 免费自动跟单 #外汇 #金融 #金钱\n\n10 买入 0.66 手 #EURGBP 0.73532 止损 0.70534 | 在 http://goo.gl/moaYzx\
  \ 免费自动跟单 #外汇 #金融 #金钱\n\n12 //平仓交易\n13 平仓买入 0.64 手 #USDJPY 118.773，盈利 +17.7 点，今日总计\
  \ -136.7 点\n\n15 平仓卖出 0.69 手 #NZDUSD 0.75273，盈利 +8.4 点，今日总计 -1072.8 点\n\n17 平仓买入\
  \ 7.0 手 #XAUUSD 1207.94，亏损 -549.0 点，今日总计 -1731.4 点\n```\n\n针对开仓交易，我们可以对该用户做出以下观察（假设我们最初通过分隔符\
  \ `|` 解析整个推文并得到两个令牌）：\n\n*   交易行为始终是单词 `Bought` 或 `Sold`，并且是第一个令牌的第一个单词。\n*   货币对始终是第一个令牌中以\
  \ `#` 开头的第四个单词。\n*   价格始终是第一个令牌中的第五个单词。\n*   止损价格是可选的，仅在第一个令牌中关键字 `SL` 之后的下一个单词出现。\n\
  *   止盈价格是可选的，仅在第一个令牌中关键字 `TP` 之后的下一个单词出现。\n\n针对平仓交易，我们可以对该用户做出以下观察：\n\n*   货币对始终是推文中以\
  \ `#` 开头的第五个单词。\n*   平仓价格始终是推文中的第六个单词。\n*   盈亏数字始终是推文中的第八个单词。\n\n一个通用观察：\n\n*  \
  \ 如果一条推文以单词 `Closed` 开头，则它属于“平仓交易”。\n*   如果一条推文以单词 `Bought` 或 `Sold` 开头，则它属于“开仓交易”。\n\
  \n现在让我们将注意力转向代码实现。\n\n```\n 1 public class ZuluTrader101FXTweetHandler\n  2 extends\
  \ AbstractFXTweetHandler < String > {\n\n4  protected ZuluTrader101FXTweetHandler(String\
  \ userId) {\n  5   super(userId);\n  6  }\n\n8  private int idxOfTP(String[] tokens)\
  \ {\n  9   int idx = 0;\n 10   for (String token: tokens) {\n 11    if (\"TP\".equals(token))\
  \ {\n 12     return idx;\n 13    }\n 14    idx++;\n 15   }\n 16   return -1;\n 17\
  \  }\n\n19  private int idxOfSL(String[] tokens) {\n 20   int idx = 0;\n 21   for\
  \ (String token: tokens) {\n 22    if (\"SL\".equals(token)) {\n 23     return idx;\n\
  \ 24    }\n 25    idx++;\n 26   }\n 27   return -1;\n 28  }\n\n30  @Override\n 31\
  \  protected NewFXTradeTweet < String > parseNewTrade(String[] tokens) {\n\n33 \
  \  String currencyPair = null;\n 34   try {\n 35    String ccyWithHashTag = tokens[3];\n\
  \ 36    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
  \ 37    double price = Double.parseDouble(tokens[4]);\n 38    TradingSignal signal\
  \ = BOUGHT.equals(tokens[0]) ? TradingSignal.LONG :\n 39     TradingSignal.SHORT;\n\
  \ 40    double stopLoss = 0.0;\n 41    double takeProfit = 0.0;\n 42    int idxTp\
  \ = idxOfTP(tokens);\n 43    if (idxTp != -1) {\n 44     takeProfit = Double.parseDouble(tokens[idxTp\
  \ + 1]);\n 45    }\n 46    int idxSl = idxOfSL(tokens);\n 47    if (idxSl != -1)\
  \ {\n 48     stopLoss = Double.parseDouble(tokens[idxSl + 1]);\n 49    }\n 50  \
  \  return new NewFXTradeTweet < String > (new TradeableInstrument < String > (currencyPair),\
  \ price, stopLoss,\n 51     takeProfit, signal);\n 52   } catch (Exception e) {\n\
  \ 53    LOG.info(\n 54     String.format(\" got err %s parsing tweet tokens for\
  \ new trade \",\n 55      e.getMessage()));\n 56    return null;\n 57   }\n\n59\
  \  }\n\n61  @Override\n 62  protected CloseFXTradeTweet < String > parseCloseTrade(String[]\
  \ tokens) {\n\n64   String currencyPair = null;\n 65   try {\n 66    String ccyWithHashTag\
  \ = tokens[4];\n 67    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
  \ 68    String strPnlPips = tokens[7];\n 69    return new CloseFXTradeTweet < String\
