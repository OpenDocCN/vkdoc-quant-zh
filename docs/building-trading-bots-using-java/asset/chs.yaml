  \ ID 而非实际的品种代码（如 `GBP_USD`）来下达订单/进行交易。它还与 `instrument` 属性一起参与了 `hashCode()` 和 `equals()`\
  \ 方法的定义。\n\n据我所知，`pip` 是给定品种跳动的最小精度。例如，`USDJPY` 的 pip 值为 `0.001`，这意味着 `USDJPY` 价格的最小变动单位是\
  \ `0.001`。如果当前 `USDJPY` 的价格是 `123.462`，那么下一次价格变动的最小可能值要么是 `123.461`，要么是 `123.463`。\n\
  \n`instrumentPairInterestRate` 是一个有趣的属性，它可能并非在所有的平台上都可获得。从下面的定义可以看出，它可以捕获一些重要信息，例如持有给定品种的多头或空头头寸时可能产生的费用。简而言之，融资费用是因持有某个货币对的头寸而由经纪平台支付或向经纪平台支付的一笔货币金额。例如，在撰写本文时，持有\
  \ `NZDCHF` 多头头寸的人将获得一定金额，但反过来，持有 `NZDCHF` 空头头寸的人则需要支付一定金额。这个值源于所涉及两种货币的利率差异（纽元基准利率=3%，瑞郎基准利率=0%）。\n\
