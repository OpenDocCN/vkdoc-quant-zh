  \  tradeInfoService.init();\n55   Collection < Trade < Long, String, Long >> allTrades\
  \ = tradeInfoService.getAllTrades();\n56   LOG.info(\"################ 导出所有交易 ################\"\
  );\n57   for (Trade < Long, String, Long > trade: allTrades) {\n58    LOG.info(\n\
