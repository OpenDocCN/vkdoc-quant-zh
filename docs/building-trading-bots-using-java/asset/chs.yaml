  \ `Provider` Bean 配置的讨论。\n\n#### 12.1.4 策略配置\n\n在本书中，我们讨论了几种通过基于调度器的调用来激活的策略。在本节中，我们将配置它们并展示它们是如何被调用的。\n\
  \n```xml\n1 <bean id=\"fadeTheMoveStrategy\"\n2     class=\"com.precioustech.fxtrading.tradingbot.strategies.FadeTheMoveStrategy\"\
  >\n3 \t<constructor-arg index=\"0\" ref=\"tradeableInstrumentList\"/>\n4 </bean>\n\
  5 <bean id=\"copyTwitterStrategy\"\n6     class=\"com.precioustech.fxtrading.tradingbot.strategies.CopyTwitterStrategy\"\
  />\n```\n\n配置相当简单。`FadeTheMove` 策略有一个额外的构造函数依赖项，它会被注入一个交易品种列表，用于观察并在满足给定条件时下单。\n\
  \n现在我们来看一下调度器配置，它会在每个时间间隔 `T` 后调用给定的策略 Bean 方法。\n\n```xml\n1 <task:scheduled-tasks\
  \ scheduler=\"taskScheduler\">\n2 \t\t<task:scheduled ref=\"fadeTheMoveStrategy\"\
  \ method=\"analysePrices\"\n3           fixed-delay=\"60000\"/>\n4 \t\t<task:scheduled\
  \ ref=\"copyTwitterStrategy\" method=\"harvestAndTrade\"\n5           fixed-delay=\"\
  300000\"/>\n6 </task:scheduled-tasks>\n```\n\n调度器每隔 `60000 毫秒` 调用一次 `fadeTheMoveStrategy`\
  \  Bean 的 `analysePrices()` 方法。它还会每隔 `300000 毫秒` 调用一次 `copyTwitterStrategy` Bean\
  \ 的 `harvestAndTrade()` 方法。\n\n\n\n#### 12.1.5 服务配置\n\n在本章关于配置的最后一节中，我们将讨论如何配置机器人的核心服务。如果存在图形用户界面客户端或任何其他与机器人交互的客户端，这些服务可被视为机器人的公共\
  \ API。本书中的大多数示例程序都直接与这些服务进行交互。\n\n`AccountInfoService`\n\n```xml\n<bean id=\"accountInfoService\"\
