  </bean>\n```\n\n### 12.2 构建机器人\n\n使用 Maven 可以轻松构建机器人。由于有三个项目需要按指定顺序构建，我们可以编写脚本来自动执行这些操作，而不必记住构建顺序。如果已从\
  \ GitHub 克隆了代码仓库，在 `<repo-code>/java` 目录下有一个 `buildbot.bsh` 脚本，它将使用 Maven 构建机器人。在克隆仓库后，我的\
  \ Bash 终端上会显示以下内容：\n\n![代码仓库结构](img/00083.jpeg) 代码仓库结构\n\n在运行代码之前，假设已安装并配置了 Maven\
  \ 和 Java 1.7。在命令行中，输入命令 `mvn --version` 时，我们应该会看到类似如下的输出：\n\n![mvn --version 输出](img/00084.jpeg)\
  \ mvn –version 输出\n\n如果情况并非如此，请确保已正确安装 Maven^(3)。\n\n现在我们已经准备好运行脚本 `buildbot.bsh`。在此之前，让我们快速浏览一下脚本代码：\n\
  \n```bash\nfunction buildmodule {\n    cd $SCRIPT_DIR/$1\n    mvn clean install\n\
  \    if [[ \"$?\" -ne 0 ]]; then\n      echo \"错误：$1 项目构建失败。构建失败\"; exit -1;\n \
  \   fi\n}\nSCRIPT_DIR=`pwd`\nbuildmodule tradingbot-core\nbuildmodule oanda-restapi\n\
  buildmodule tradingbot-app\n\necho \"交易机器人构建成功\"\n```\n\n![在命令行开始构建](img/00085.jpeg)\
  \ 在命令行开始构建\n\n我们对要构建的三个模块分别调用了 `buildmodule` 函数。该函数首先执行 `cd` 进入相应的源代码目录，然后发出 `mvn\
  \ clean install` 命令来构建构件（即 `jar` 文件）。如果存在单元测试失败或编译问题，`mvn clean install` 将退出并返回非零代码。我们检查存储在\
  \ `$?` 变量中的这个代码，如果非零，则立即退出脚本。\n\n![构建失败](img/00086.jpeg) 构建失败\n\n如果构建成功，我们应该看到如下所示的输出：\n\
  \n![构建成功](img/00087.jpeg) 构建成功\n\n### 12.3 运行机器人\n\n**警告**：**如果用于运行机器人的某些配置值过高，可能会造成严重损失。作者已在全书中尽一切可能强调这些内容。在任何情况下，作者均不对因用户根据自身风险承受能力设定的配置值而产生的任何间接损失承担责任。**\n\
  \n现在机器人已完全构建完毕，我们准备运行它。但在真正按下“运行按钮”之前，我们需要确保以下配置参数已被调整，并完成构建，以便这些更改包含在针对特定用户的 jar\
  \ 文件中。以下是完整的检查清单：\n\n1.  `tradingbot-oanda.properties` 中所有 OANDA 特定的参数必须属于一个有效的真实或模拟账户用户。\n\
  2.  `tradingbot.properties` 中所有 Twitter 特定的访问令牌已正确填写。这些有效令牌由用户拥有完全访问权限的 Twitter\
  \ 账户下的 Twitter 应用程序生成。\n3.  再次检查 `TradingConfig` bean 的值是否在可接受的范围内，特别是 `maxAllowedQuantity`、`minReserveRatio`\
  \ 和 `maxAllowedNetContracts`。\n4.  在 `tradingbot.properties` 中配置一个有效的邮件账户。此处使用的凭据将用于向\
  \ `mail.to` 电子邮件地址发送邮件通知。\n5.  如有需要，可在 tradingbot-app 资源目录中配置 `log4j.properties`。\n\
  6.  再次执行 `buildbot.sh`，使用上述配置的新参数集重新构建机器人。\n\n要使用本书讨论的策略以及 OANDA 实现来运行机器人，我们只需执行以下操作：\n\
  \n```bash\n$ ./runbot-oanda.bsh\n```\n\n如果一切顺利，我们应该会看到机器人输出以下内容：\n\n![运行机器人](img/00088.jpeg)\
  \ 运行机器人\n\n在机器人运行期间，我们应该会看到它不时地抓取如下图所示的推文：\n\n![新推文已抓取](img/00089.jpeg) 新推文已抓取\n\
  \n就是这样。我们的机器人现已完全启动并运行。我们应该会看到 `FadeTheMove` 策略非常活跃，尤其是在影响市场波动的货币事件（如 FOMC 决议或各国\
  \ GDP 数据）期间。需要记住的一点是，该策略会维护一个过去 15 分钟的内部缓存。我们为订阅行情数据流配置的品种越多，占用的内存就越多。因此，使用更高的内存值运行可能是必要的。由于机器人在\
  \ Maven 内部运行，我们需要更改 `MAVEN_OPTS` 参数。\n\n\n\n## 13\\. 单元测试\n\n本章我们将讨论一个非常重要的主题：代码的单元测试。对机器人进行充分的单元测试覆盖，能确保我们在修改现有代码或新增功能时不会引入大量回归缺陷。对于本书的部分目标读者而言，交易机器人可能会在真实账户中部署并执行涉及巨额资金的实际订单。确保测试覆盖率足够高，可以降低因代码缺陷而发出错误订单的可能性。我们简要总结一下单元测试的巨大优势：\n\
  \n-   完善的单元测试应能消除生产环境中大多数意想不到的意外情况。\n-   它们有助于对代码进行文档化。\n-   它们迫使开发者以更优的方式思考和开发，从而改进系统组件的设计、代码和架构。\n\
  -   采用测试驱动开发方法时，我们能编写出更易于维护的代码。我们被迫编写更小的类，以便更容易地进行单元测试。\n-   我们被迫编写松耦合的组件。需要模拟众多依赖关系迫使我们必须以这种方式思考。\n\
  \n牢记以上要点，我们将在本章讨论一些围绕机器人单元测试的概念和技术。\n\n### 13.1 使用 Mockito 作为模拟框架\n\n为了为机器人编写单元测试，我们将大量使用\
  \ Mockito^(1) 来创建对象的模拟对象。像 `TwitterTemplate` 这样的对象模拟，可以帮助我们模拟其行为，而无需完整实例化它。若使用真实的\
  \ `TwitterTemplate` 来获取推文，我们必须提供有效的令牌才能通过 Twitter 的身份验证。这其实不是真正的问题。真正的问题是，每次执行搜索查询时，如何获得相同的确定性结果。使用真实的\
  \ `TwitterTemplate` 是不可能做到的，因为推文在不断生成，搜索结果也随之变化。我们无法编写确定性的断言来对代码进行单元测试。为了解决这个问题，我们使用模拟对象来获得确定性的结果。同样的道理也适用于从数据提供商处获取确定顺序的价格点数据，这在现实世界中也是不可能的。\n\
  \n#### 13.1.1 模拟 HTTP 交互\n\n为了测试我们的 OANDA 提供商实现，我们需要能够模拟 HTTP 交互。其概念是，我们即将探索的这个模拟方法会返回一个\
  \ `FileInputStream` 实例的 `InputStream`，而不是真实世界的 `org.apache.http.client.entity.LazyDecompressingInputStream`\
  \ 实例。因此，我们与 OANDA 的所有交互都将来自我们创建的 JSON 负载文件，而非与 OANDA 平台直接交互。让我们快速看一下这个方法的代码：\n\n\
  ```\n 1 public static final void mockHttpInteraction(String fname, HttpClient mockHttpClient)\
  \ throws Exception {\n 2  CloseableHttpResponse mockResp = mock(CloseableHttpResponse.class);\n\
  \ 3  when(mockHttpClient.execute(any(HttpUriRequest.class))).thenReturn(mockResp);\n\
  \n 5  HttpEntity mockEntity = mock(HttpEntity.class);\n\n 7  when(mockResp.getEntity()).thenReturn(mockEntity);\n\
  \n 9  StatusLine mockStatusLine = mock(StatusLine.class);\n\n11  when(mockResp.getStatusLine()).thenReturn(mockStatusLine);\n\
  12  when(mockStatusLine.getStatusCode()).thenReturn(HttpStatus.SC_OK);\n13  when(mockEntity.getContent()).thenReturn(new\
  \ FileInputStream(fname));\n14 }\n```\n\n`mockHttpInteraction` 方法接受一个文件名和一个模拟的 `HttpClient`\
  \ 作为参数。在模拟了所有交互步骤以到达此方法最后一行时，魔法便发生了。在真实世界中，`HttpEntity` 对象包含从 OANDA REST API 返回的内容，而此处该对象被模拟为返回文件内容。\n\
  \n这是一个非常实用的概念，我们刚刚讨论过。现在，我们能够通过模仿文件中的响应来模拟几乎任何交互。让我们看一个执行此交互的单元测试示例：\n\n```\n 1\
  \ @Test\n 2 public void accountIdTest() throws Exception {\n 3  final OandaAccountDataProviderService\
  \ service = new\n 4  OandaAccountDataProviderService(url, userName, accessToken);\n\
  \ 5  assertEquals(\"https://api-fxtrade.oanda.com/v1/accounts/123456\",\n 6   service.getSingleAccountUrl(accountId));\n\
  \n 8  OandaAccountDataProviderService spy =\n 9   createSpyAndCommonStuff(\"src/test/resources/account123456.txt\"\
  , service);\n10  Account < Long > accInfo = spy.getLatestAccountInfo(accountId);\n\
  11  assertNotNull(accInfo);\n12  assertEquals(\"CHF\", accInfo.getCurrency());\n\
  13  assertEquals(0.05, accInfo.getMarginRate(), OandaTestConstants.precision);\n\
  14  assertEquals(-897.1, accInfo.getUnrealisedPnl(), OandaTestConstants.precision);\n\
  15 }\n\n17 private OandaAccountDataProviderService createSpyAndCommonStuff(String\
  \ fname,\n18  OandaAccountDataProviderService service) throws Exception {\n19  OandaAccountDataProviderService\
  \ spy = spy(service);\n\n21  CloseableHttpClient mockHttpClient = mock(CloseableHttpClient.class);\n\
  22  when(spy.getHttpClient()).thenReturn(mockHttpClient);\n\n24  OandaTestUtils.mockHttpInteraction(fname,\
  \ mockHttpClient);\n\n26  return spy;\n27 }\n```\n\n在详细查看代码之前，我们先看看此单元测试用例中使用的文件\
  \ `src/test/resources/account123456.txt` 的内容：\n\n```\n 1 {\n 2   \"accountId\" :\
  \ 123456,\n 3   \"accountName\" : \"main\",\n 4   \"balance\" : 20567.9,\n 5   \"\
  unrealizedPl\" : -897.1,\n 6   \"realizedPl\" : 1123.65,\n 7   \"marginUsed\" :\
  \ 89.98,\n 8   \"marginAvail\" : 645.3,\n 9   \"openTrades\" : 5,\n10   \"openOrders\"\
  \ : 0,\n11   \"marginRate\" : 0.05,\n12   \"accountCurrency\" : \"CHF\"\n13 }\n\
  ```\n\n测试首先创建了一个 `AccountDataProvider` 的真实实例，此处为 `OandaAccountDataProviderService`。接着，我们在私有方法\
  \ `createSpyAndCommonStuff` 中为该对象创建了一个间谍^(2)。同样在此方法内部，我们关联了一个模拟的 `HttpClient` 对象，该对象被先前讨论的\
  \ `mockHttpInteraction` 方法用来与作为参数传递的文件进行交互。\n\n那么，当调用 `spy.getLatestAccountInfo(accountId)`\
  \ 时，会发生什么呢？\n\n\n\n#### 13.1.2 模拟数据流\n\n```\n 1 private Account < Long > getLatestAccountInfo(final\
  \ Long accountId,\n 2   CloseableHttpClient httpClient) {\n 3   try {\n 4    HttpUriRequest\
  \ httpGet = new HttpGet(getSingleAccountUrl(accountId));\n 5    httpGet.setHeader(authHeader);\n\
  \n 7    LOG.info(TradingUtils.executingRequestMsg(httpGet));\n 8    HttpResponse\
  \ httpResponse = httpClient.execute(httpGet);\n 9    String strResp = TradingUtils.responseToString(httpResponse);\n\
  10 ...\n11 ...\n```\n\n*   代码 `HttpResponse httpResponse = httpClient.execute(httpGet)`\
  \ 返回一个模拟的 `CloseableHttpResponse` 对象（参见 `mockHttpInteraction` 方法）。\n*   当使用这个模拟的\
  \ `httpResponse` 对象调用 `TradingUtils.responseToString` 时，该方法内部对 `entity.getContent`\
  \ 的调用会返回一个 `InputStream` 对象，该对象实际上是 `FileInputStream` 的一个实例，它持有对单元测试中使用的文件 `src/test/resources/account123456.txt`\
  \ 的句柄。\n*   当读取这个 `InputStream` 方法时，系统会读取底层文件，并将文件内容从该方法返回。\n*   之后，该响应会按照与从真实 OANDA\
  \ 平台收到 Http 200 状态码时相同的方式进行正常解析。\n\n为便于参考，`TradingUtils.responseToString` 方法如下所示：\n\
  \n```\n 1 /**\n 2  * 一个工具方法，尝试将 HttpResponse 对象转换为字符串。仅当服务器返回 HTTP 状态码 200 时，\n\
  \ 3  * 此方法才会尝试处理响应。\n 4  *\n 5  * @param response\n 6  * @return 如果可能，返回响应的字符串表示形式，否则返回空字符串。\n\
  \ 7  * @throws IOException\n 8  */\n 9 public static final String responseToString(HttpResponse\
  \ response) throws IOException {\n10  HttpEntity entity = response.getEntity();\n\
  11  if ((response.getStatusLine().getStatusCode() == HttpStatus.SC_OK ||\n12   \
  \ response.getStatusLine().getStatusCode() == HttpStatus.SC_CREATED) && entity !=\
  \ null) {\n13   InputStream stream = entity.getContent();\n14   String line;\n15\
  \   BufferedReader br = new BufferedReader(new InputStreamReader(stream));\n16 \
  \  StringBuilder strResp = new StringBuilder();\n17   while ((line = br.readLine())\
  \ != null) {\n18    strResp.append(line);\n19   }\n20   IOUtils.closeQuietly(stream);\n\
  21   IOUtils.closeQuietly(br);\n22   return strResp.toString();\n23  } else {\n\
  24   return StringUtils.EMPTY;\n25  }\n26 }\n```\n\n在本节中，我们将讨论如何对书中讨论的数据流进行单元测试，即市场数据流和交易/订单/账户事件流。我们将使用完全相同的技术，即使用上一节中描述的模拟技术对它们进行单元测试。和之前一样，我们会将\
  \ `HttpGet` 中可用的 `InputStream` 切换为 `FileInputStream`，其中的每一行都是一个 JSON 格式的事件。我们的单元测试文件中的一个片段如下所示：\n\
