  \n现在我们将注意力转向对 `findAccountsToTrade()` 方法的讨论。顾名思义，该方法会在满足特定条件时尝试查找可用于交易的账户。通常，在下单/交易之前，首先要做的是找到一个合适的账户。当然，对于只有一个交易账户且所有交易默认归属于该账户的平台，此讨论并不适用。\n\
  \n```\n 1 public Collection < K > findAccountsToTrade() {\n 2  List < Account <\
  \ K >> accounts = Lists.newArrayList(getAllAccounts());\n 3  Collection < K > accountsFound\
  \ = Lists.newArrayList();\n 4  Collections.sort(accounts, accountComparator);\n\
  \ 5  for (Account < K > account: accounts) {\n 6   if (account.getAmountAvailableRatio()\
  \ >= baseTradingConfig.getMinReserveRatio() && account.getNetAssetValue() >= baseT\\\
  \n 7 radingConfig.getMinAmountRequired()) {\n 8    accountsFound.add(account.getAccountId());\n\
  \ 9   }\n10  }\n11  return accountsFound;\n12 }\n```\n\n该方法首先通过调用 `getAllAccounts()`\
  \ 获取所有可用账户，该方法直接委托给 `accountProvider`：\n\n```\n1 public Collection<Account<K>> getAllAccounts()\
  \ {\n2   return this.accountDataProvider.getLatestAccountInfo();\n3 }\n```\n\n接着，它尝试使用\
  \ `MarginAvailableComparator` 按可用保证金递减的顺序对可用账户进行排序。此比较器将可用保证金最多的账户置于列表顶部，依此类推。其思路是选取可用保证金最多的账户。当然，这只是当账户计价货币在汇率上具有可比性时寻找账户的一种策略。例如，如果您有\
  \ 3 个以 CHF、EUR 和 USD 计价的账户，那么这种方法可行，因为 EURCHF ≈ 1.08，USDCHF ≈ 1.0，EURUSD ≈ 1.0（编写本文时的汇率）。这应该能满足选择最大可用保证金账户的策略，但如果至少有一种货币是\
  \ JPY 而非 EUR，那么此方法就会严重失效。由于编写本文时 CHFJPY 和 USDJPY 约为 122.0，这并不理想，因为大多数时候 JPY 账户会被选中。\n\
  \n```\n 1 static class MarginAvailableComparator < K > implements Comparator < Account\
  \ < K >> {\n\n3  @Override\n 4  public int compare(Account < K > ai1, Account <\
  \ K > ai2) {\n 5   if (ai1.getMarginAvailable() > ai2.getMarginAvailable()) {\n\
  \ 6    return -1;\n 7   } else if (ai1.getMarginAvailable() < ai2.getMarginAvailable())\
  \ {\n 8    return 1;\n 9   }\n10   return 0;\n11  }\n\n13 }\n```\n\n接下来，仅当满足以下条件时，该账户才会被选择用于下单/交易：\n\
  \n```\n1 if (account.getAmountAvailableRatio() >= baseTradingConfig.getMinReserveRatio()\n\
  2     && account.getNetAssetValue() >= baseTradingConfig.getMinAmountRequired())\
  \ {\n3  accountsFound.add(account.getAccountId());\n4 }\n```\n\n假设：\n\n```\n1 minReserveRatio=0.2\n\
  2 minAmountRequired=50.0\n```\n\n0.2 的最低保留比率是一个指标，规定如果一个 GBP 账户的总金额是 1000 英镑，那么只有当可用交易金额\
  \ > 0.2 × 1000 英镑（200 英镑）时，我们才选择该账户进行交易。我强烈建议启用此验证，仅仅是因为这为账户留出了合理的缓冲，防止在价格剧烈波动时净资产值变为负数。如果账户杠杆非常高，比如\
  \ 1:50，则此值应设得更高。\n\n最低金额要求是一个指标，规定一个账户必须具有最低净资产值才能被考虑用于交易。在这种情况下，净资产值必须至少为 50 英镑才有资格进行交易。\n\
  \n接下来，我们讨论两个重载方法 `calculateMarginForTrade`。顾名思义，这些方法用于计算给定交易/订单所需的保证金。在以下几种场景中，这些方法会非常有用：我们想要为多种工具批量下单并了解它们的保证金要求，或者作为将订单发送到平台前的预验证检查，确保给定订单的保证金要求低于可用金额。\n\
  \n```\n 1 /*\n 2 \t * ({基础货币} / {本国货币}) * 单位数 / (保证金比率)\n 3 \t例如，假设：\n 4 \t本国货币\
  \ = USD\n 5 \t货币对 = GBP/CHF\n 6 \t基础货币 = GBP；报价货币 = CHF\n 7 \t基础货币 / 本国货币 = GBP/USD\
  \ = 1.5819\n 8 \t单位数 = 1000\n 9 \t保证金比率 = 20:1\n10 \t那么，使用的保证金为：\n11 \t= (1.5819\
  \ * 1000) / 20\n12 \t= 79.095 USD\n13 */\n14 @SuppressWarnings(\"unchecked\")\n\
