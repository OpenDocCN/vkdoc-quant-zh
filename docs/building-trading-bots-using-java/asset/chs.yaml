  48   return orderId;\n49  }\n\n51  public void setOrderId(N orderId) {\n52   this.orderId\
  \ = orderId;\n53  }\n\n55  public double getStopLoss() {\n56   return stopLoss;\n\
  57  }\n\n59  public double getPrice() {\n60   return price;\n61  }\n\n63  public\
  \ TradeableInstrument < M > getInstrument() {\n64   return instrument;\n65  }\n\n\
