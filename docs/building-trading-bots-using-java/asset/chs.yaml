  \    }\n}\n```\n\n### 5.6 用于移动平均计算的蜡烛线\n\n移动平均线广泛应用于技术分析和预测方法中。所有移动平均线都使用蜡烛数据进行计算。最常用的三种移动平均线是：\n\
  \n- **简单移动平均线 (SMA)：** SMA，也称为算术平均，是最常见且最简单的移动平均线。它仅仅是蜡烛线价格的平均值。每个价格的权重相同。\n- **加权移动平均线\
  \ (WMA)：** WMA 根据蜡烛线列表中每个数值的时间顺序分配权重。最近的价格权重最大，反之，最早的价格权重最小。例如，如果有 N 个蜡烛线，那么第 M\
  \ 个蜡烛线的权重为 `M/(N x (N+1)/2)`。权重之和始终等于 1.0。\n- **指数移动平均线 (EMA)：** EMA 同样根据每个数值的时间顺序分配权重。与\
  \ WMA 一样，最近的价格权重最大，列表中最早的价格权重最小。每个蜡烛线的权重计算略微复杂，详细讨论请参见 [`en.wikipedia.org/wiki/Moving_average#Exponential_moving_average`](https://en.wikipedia.org/wiki/Moving_average#Exponential_moving_average)。\n\
  \n\n\n### 5.7 `MovingAverageCalculationService`\n\n在本节中，我们将讨论用于计算这些平均值的 `MovingAverageCalculationService`，该服务有助于技术分析和预测方法。此服务仅实现\
  \ SMA 和 WMA。让我们从构造函数定义开始，它只有一个依赖项，即 `HistoricMarketDataProvider`。\n\n```java\npublic\
  \ class MovingAverageCalculationService < T > {\n\n  private final HistoricMarketDataProvider\
  \ < T > historicMarketDataProvider;\n\n  public MovingAverageCalculationService(HistoricMarketDataProvider\
  \ < T > historicMarketDataProvider) {\n    this.historicMarketDataProvider = historicMarketDataProvider;\n\
  \  }\n```\n\n主要的计算逻辑发生在私有方法 `calculateSMA` 和 `calculateWMA` 中：\n\n```java\n/*\n\
  \ * K 线图收盘价的简单平均值计算\n */\nprivate double calculateSMA(List < CandleStick < T >>\
  \ candles) {\n  double sumsma = 0;\n  for (CandleStick < T > candle: candles) {\n\
  \    sumsma += candle.getClosePrice();\n  }\n  return sumsma / candles.size();\n\
  }\n\n/*\n * 如果有 N 根 K 线，那么第 M 根 K 线的权重为 M/(N * (N+1)/2)。\n * 因此，每根 K 线的除数 D 为 (N\
  \ * (N+1)/2)\n */\nprivate double calculateWMA(List < CandleStick < T >> candles)\
  \ {\n  double divisor = (candles.size() * (candles.size() + 1)) / 2;\n  int count\
  \ = 0;\n  double sumwma = 0;\n  for (CandleStick < T > candle: candles) {\n    count++;\n\
  \    sumwma += (count * candle.getClosePrice()) / divisor;\n  }\n  return sumwma;\n\
  }\n```\n\n在计算中，我们使用 K 线图的 `closePrice`。其余公有方法非常直接：获取 K 线数据后，委托给上述私有方法进行计算并返回结果。该服务还公开了一个优化方法\
  \ `calculateSMAandWMAasPair`，它可以同时计算两个平均值并返回结果。这样做的目的是避免重复获取相同的数据。例如，如果我们想获取 10\
  \ 年粒度为 `Daily` 的数据，无论是从 OANDA 还是数据库查询的角度来看，这种重复获取开销可能都特别大。如果数据已被缓存，则可以直接使用单独的计算方法。\n\
  \n```java\npublic double calculateSMA(TradeableInstrument < T > instrument, int\
  \ count,\n  CandleStickGranularity granularity) {\n  List < CandleStick < T >> candles\
  \ = this.historicMarketDataProvider\n    .getCandleSticks(instrument, granularity,\
  \ count);\n  return calculateSMA(candles);\n}\n\npublic double calculateSMA(TradeableInstrument\
  \ < T > instrument, DateTime from, DateTime to,\n    CandleStickGranularity granularity)\
  \ {\n    List < CandleStick < T >> candles = this.historicMarketDataProvider.\n\
  \    getCandleSticks(instrument, granularity, from, to);\n    return calculateSMA(candles);\n\
  \  }\n\n  /*\n   * 通过一次调用同时获取两个值的优化方法\n   */\npublic ImmutablePair < Double, Double\
  \ > calculateSMAandWMAasPair(TradeableInstrument < T > instrument,\n  int count,\
  \ CandleStickGranularity granularity) {\n  List < CandleStick < T >> candles = this.historicMarketDataProvider.getCandleSticks(instrument,\
  \ granularity, count);\n  return new ImmutablePair < Double, Double > (calculateSMA(candles),\
  \ calculateWMA(candles));\n}\n\npublic ImmutablePair < Double, Double > calculateSMAandWMAasPair(TradeableInstrument\
  \ < T > instrument,\n  DateTime from, DateTime to, CandleStickGranularity granularity)\
  \ {\n  List < CandleStick < T >> candles = this.historicMarketDataProvider.\n  getCandleSticks(instrument,\
  \ granularity, from, to);\n  return new ImmutablePair < Double, Double > (calculateSMA(candles),\
  \ calculateWMA(candles));\n}\n\npublic double calculateWMA(TradeableInstrument <\
  \ T > instrument, int count,\n  CandleStickGranularity granularity) {\n  List <\
  \ CandleStick < T >> candles = this.historicMarketDataProvider.\n  getCandleSticks(instrument,\
  \ granularity, count);\n  return calculateWMA(candles);\n}\n\npublic double calculateWMA(TradeableInstrument\
  \ < T > instrument, DateTime from, DateTime to,\n  CandleStickGranularity granularity)\
  \ {\n  List < CandleStick < T >> candles = this.historicMarketDataProvider.\n  getCandleSticks(instrument,\
  \ granularity, from, to);\n  return calculateWMA(candles);\n}\n```\n\n### 5.8 动手实践\n\
