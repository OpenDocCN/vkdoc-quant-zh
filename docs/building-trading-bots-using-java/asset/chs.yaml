  \ = limitPrice -\n65       tradingConfig.getFadeTheMovePipsDesired() * pip;\n66\
  \     } else {\n67      signal = TradingSignal.LONG;\n68      limitPrice = lastPayLoad.getAskPrice()\
  \ -\n69       tradingConfig.getFadeTheMoveDistanceToTrade() * pip;\n70      takeProfitPrice\
  \ = limitPrice +\n71       tradingConfig.getFadeTheMovePipsDesired() * pip;\n72\
  \     }\n73     this.orderQueue.offer(new TradingDecision < T > (entry.getKey(),\
  \ signal,\n74      takeProfitPrice, 0.0, limitPrice,\n75      TradingDecision.SRCDECISION.FADE_THE_MOVE));\n\
  76     entry.getValue().asMap().clear();\n77     /*清仓价格，避免对旧决策持续操作*/\n78    }\n\
  79   }\n80  }\n81\n82  private double calculatePipJump(Collection < MarketDataPayLoad\
  \ < T >> prices,\n83   TradeableInstrument < T > instrument) {\n84   List < MarketDataPayLoad\
  \ < T >> priceList = Lists.newArrayList(prices);\n85   MarketDataPayLoad < T > startPrice\
  \ = priceList.get(0);\n86   MarketDataPayLoad < T > lastPrice = priceList.get(priceList.size()\
  \ - 1);\n87   Double pip = this.instrumentService.getPipForInstrument(instrument);\n\
  88   Double pipJump = (lastPrice.getBidPrice() - startPrice.getBidPrice()) / pip;\n\
  89   return pipJump;\n90  }\n91 }\n```\n\n我们从分析策略类中自动注入的依赖开始讨论。资源 `orderQueue` 是本章开头讨论过的明显包含项。策略中的\
  \ `instrumentService` 类被用于为每个交易品种提供点值（pip value）。根据我们在 *可交易工具* 一章中的讨论，点（pip）是价格跳动的最低精度值。例如，对于所有日元货币对（含主要货币对），它是\
  \ `0.001`；对于 EURUSD、GBPUSD 等交易品种，它是 `0.00001`。我们需要利用这一信息来计算在给定观察区间内价格跳动了多少个点。这一点也基本包含在\
  \ `calculatePipJump` 方法中：观察区间的最后一个价格减去第一个价格，再除以该交易品种的点值，就得到了该货币对上涨或下跌的点数。最后一个注入的依赖\
  \ `tradingConfig` 为我们提供了在 Spring 配置中为该策略配置的参数，例如：\n\n*   考虑反转交易所需的最小点跳动或回撤，即 `getFadeTheMoveJumpReqdToTrade()`\
  \ 方法。\n*   逆势挂单与当前价格之间的点差距离，即 `getFadeTheMoveDistanceToTrade()` 方法。\n*   观察区间的会话时长（分钟），即\
  \ `getFadeTheMovePriceExpiry()` 方法。\n*   期望的目标盈利点数，用于设定限价单的止盈价格，即 `getFadeTheMovePipsDesired()`\
  \ 方法。\n\n该类的构造函数接受一个交易品种列表，这些品种是策略的应用对象，并由 Spring 通过构造函数注入。\n\n我们还有一个使用 `@PostConstruct`\
  \ 注解的方法 `init()`，在该方法中，我们为每个注入的交易品种初始化一个 Guava^(2) 的 `Cache`。该缓存的键（key）是 tick 数据事件的\
  \ `DateTime`，值（value）是 `MarketDataPayLoad`。我们还设置了 `expireAfterWrite` 值 `T`，该值由 `tradingConfig.getFadeTheMovePriceExpiry()`\
  \ 提供，以便条目在 `T` 分钟后自动从缓存中过期。\n\n方法 `handleMarketDataEvent()` 由 `@Subscribe` 注解标注，意味着它会接收所有已解析为\
  \ `MarketDataPayLoad` 对象并由 EventBus 分发的 tick 数据事件。接收到后，只有当 `MarketDataPayload` 实例与配置了缓存的交易品种相关时，才会被接受并\
  \ `put` 到该交易品种的缓存中。\n\n该策略的主要动作体现在 `analysePrices()` 方法中。该方法由任务调度器每 `T` 分钟调用一次，该值在\
  \ Spring 配置中设定。通常情况下，该值应与 `tradingConfig.getFadeTheMovePriceExpiry()` 保持一致。我们首先遍历缓存中配置的所有交易品种。对于每个品种，我们计算在给定时间段内绝对点跳动量。如果点跳动未超过最低阈值（>\
  \ `getFadeTheMoveJumpReqdToTrade()`），则忽略该品种。如果点跳动超过阈值，我们尝试通过点跳动的正负号判断市场趋势。若为负值，则代表趋势向下，否则向上。对于上升趋势，我们下达\
  \ `SHORT`（做空）交易；对于下降趋势，则下达 `LONG`（做多）交易。接着，我们使用 `tradingConfig.getFadeTheMoveDistanceToTrade()`\
  \ 计算订单的限价（limit price），并使用 `tradingConfig.getFadeTheMovePipsDesired()` 计算止盈价格（take\
  \ profit price）。\n\n至此，我们对此策略的讨论就结束了。这是一个广为人知的策略，且似乎行之有效。我们应避免将止盈点数设得过大。若该值设定在 10-12\
  \ 点附近，策略在大多数情况下效果良好。这也是众多市场参与者的普遍观察结论。\n\n\n\n### 9.3 动手实践\n\n在本节中，我们将编写一个 Spring\
