  \ K accountId);\n\n25  /**\n26   * 修改给定订单的属性。平台可能只允许修改限价、止损、止盈、到期日期、单位等属性。\n27 \
  \  *\n28   * @param order\n29   * @param accountId\n30   * @return 布尔值，指示操作是否成功。\n\
  31   */\n32  boolean modifyOrder(Order < N, M > order, K accountId);\n\n34  /**\n\
  35   * 如果订单正在等待执行，则有效取消订单。可能需要有效的 orderId 和可选的 accountId 来唯一标识要关闭/取消的订单。\n36   *\n\
  37   * @param orderId\n38   * @param accountId\n39   * @return 布尔值，指示操作是否成功。\n40\
  \   */\n41  boolean closeOrder(M orderId, K accountId);\n\n43  /**\n44   *\n45 \
  \  * @return 所有账户中所有待处理订单的集合\n46   */\n47  Collection < Order < N,\n48  M >> allPendingOrders();\n\
  \n50  /**\n51   *\n52   * @param accountId\n53   * @return 给定 accountId 的所有待处理订单的集合。\n\
  54   */\n55  Collection < Order < N,\n56  M >> pendingOrdersForAccount(K accountId);\n\
  \n58  /**\n59   *\n60   * @param orderId\n61   * @param accountId\n62   * @return\
  \ 由 orderId 和可选的 accountId 唯一标识的订单\n63   */\n64  Order < N,\n65  M > pendingOrderForAccount(M\
  \ orderId, K accountId);\n\n67  /**\n68   *\n69   * @param instrument\n70   * @return\
  \ 所有账户中给定金融工具的所有待处理订单的集合\n71   */\n72  Collection < Order < N,\n73  M >> pendingOrdersForInstrument(TradeableInstrument\
  \ < N > instrument);\n74 }\n```\n\n如上所示，我们的提供者接口提供了丰富的功能集来管理订单。由于接口方法都是自解释的，让我们直接进入具体实现将是什么样子。\n\
  \n\n\n\n### 6.3 `OrderManagementProvider` 的具体实现\n\n现在进入最有趣的部分，我们将深入探讨实现细节，并讨论如何实现一个\
  \ OANDA 提供商。由于我们即将实现完整的 CRUD 操作集，因此还需要熟悉与这些操作等效的 REST 动词。我们已经知道 HTTP 的 `GET` 等同于\
  \ `R`（读取）。那么剩下的 `C`、`U` 和 `D` 又对应什么呢？下表总结了用于执行这些操作的 HTTP 动词。\n\n| 操作 | HTTP 动词 |\n\
  | --- | --- |\n| 创建新订单 [C] | POST |\n| 查询订单详情 [R] | GET |\n| 更新现有订单 [U] | PATCH\
  \ |\n| 关闭待处理订单 [D] | DELETE |\n\n有了这些信息，我们先看看类的定义，包括构造函数和所需的 JSON 键。我们需要提供一个 `AccountProvider`\
  \ 依赖，并将在构造函数中传入。在 OANDA 中，订单 ID 是 `Long` 类型。因此，用 `Long` 替代账户 ID，用 `String` 替代金融工具\
  \ ID，我们得到以下定义：\n\n```\n 1 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.expiry;\n\
  \ 2 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.id;\n 3\
  \ import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.instrument;\n\
  \ 4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.orderOpened;\n\
  \ 5 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.price;\n\
  \ 6 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.side;\n\
  \ 7 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.stopLoss;\n\
  \ 8 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.takeProfit;\n\
  \ 9 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.tradeOpened;\n\
  10 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.type;\n\
  11 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.units;\n\
  \n13 public class OandaOrderManagementProvider implements OrderManagementProvider<Long,\
  \ String, Long> {\n\n15 \tprivate final String url;\n16 \tprivate final BasicHeader\
  \ authHeader;\n17 \tprivate final AccountDataProvider<Long> accountDataProvider;\n\
  \n19 \tpublic OandaOrderManagementProvider(String url, String accessToken,\n20 \t\
  AccountDataProvider<Long> accountDataProvider) {\n21 \t\tthis.url = url; // OANDA\
  \ REST 服务的基础 URL\n22 \t\tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
  23 \t\tthis.accountDataProvider = accountDataProvider;\n24 \t}\n```\n\n现在，我们先编写下新订单的方法。要成功下单，我们至少需要提供最基本的订单信息（使用\
  \ `Order` POJO 中最精简的构造函数）和一个有效的账户 ID。我们先看看创建 HTTP POST 命令的函数，该函数稍后将在 `placeOrder`\
  \ 函数中使用。\n\n```\n 1 private static final String ordersResource = \"/orders\";\n\n\
  3 HttpPost createPostCommand(Order < String, Long > order, Long accountId) throws\
  \ Exception {\n 4  HttpPost httpPost = new HttpPost(\n 5   this.url + OandaConstants.ACCOUNTS_RESOURCE\
  \ +\n 6   TradingConstants.FWD_SLASH + accountId + ordersResource);\n 7  httpPost.setHeader(this.authHeader);\n\
  \ 8  List < NameValuePair > params = Lists.newArrayList();\n 9  // 对价格、止损价、获利价进行适当的四舍五入。OANDA\
  \ 会拒绝 0.960000001 这样的值。\n 10  params.add(new BasicNameValuePair(instrument, order.getInstrument().getInstrument()));\n\
  \ 11  params.add(new BasicNameValuePair(side, OandaUtils.toSide(order.getSide())));\n\
  \ 12  params.add(new BasicNameValuePair(type, OandaUtils.toType(order.getType())));\n\
  \ 13  params.add(new BasicNameValuePair(units, String.valueOf(order.getUnits())));\n\
  \ 14  params.add(new BasicNameValuePair(takeProfit, String.valueOf(order.getTakeProfit())));\n\
  \ 15  params.add(new BasicNameValuePair(stopLoss, String.valueOf(order.getStopLoss())));\n\
  \ 16  if (order.getType() == OrderType.LIMIT && order.getPrice() != 0.0) {\n 17\
  \   DateTime now = DateTime.now();\n 18   DateTime nowplus4hrs = now.plusHours(4);\n\
  \ 19   String dateStr = nowplus4hrs.toString();\n 20   params.add(new BasicNameValuePair(price,\
  \ String.valueOf(order.getPrice())));\n 21   params.add(new BasicNameValuePair(expiry,\
  \ dateStr));\n 22  }\n 23  httpPost.setEntity(new UrlEncodedFormEntity(params));\n\
  \ 24  return httpPost;\n 25 }\n```\n\n我们首先创建一个 `HttpPost` 对象的实例，并将 URL 传入其构造函数。例如，对于有效的账户\
  \ ID 123456，其 URL 如下所示：\n\n```\n1 https://api-fxtrade.oanda.com/v1/accounts/123456/orders\n\
  ```\n\n现在我们有了 `HttpPost` 对象的实例，接下来必须创建一个 `NameValuePair` 对象的列表。每个 `NameValuePair`\
  \ 定义了订单的一个属性，例如价格。我们使用 `Order` POJO 来定义所有订单属性。对于 `LIMIT` 订单，我们必须指定一个限价。如果我们不提供此价格，订单将被平台拒绝。因此，我们引入了一个针对限价订单的特殊检查，以确保我们有一个有效的价格。在定义价格的同时，我们还要快速为订单添加一个\
  \ 4 小时的到期时间。这意味着如果未达到限价，该订单将在平台上自动过期。一旦通过 `NameValuePair` 对象列表定义了所有此类订单属性，我们将这些参数/属性封装在一个\
  \ `UrlEncodedFormEntity` 中，并将其设置到我们的 `HttpPost` 对象实例上。建议始终对 URL 参数进行编码。现在，我们已经准备好将这些参数\
  \ `POST` 到平台。为此，我们回到 `placeOrder` 方法的代码。\n\n```\n 1 @Override\n 2 public Long placeOrder(Order\
  \ < String, Long > order, Long accountId) {\n 3  CloseableHttpClient httpClient\
  \ = getHttpClient();\n 4  try {\n 5   HttpPost httpPost = createPostCommand(order,\
  \ accountId);\n 6   LOG.info(TradingUtils.executingRequestMsg(httpPost));\n 7  \
  \ HttpResponse resp = httpClient.execute(httpPost);\n 8   if (resp.getStatusLine().getStatusCode()\
  \ == HttpStatus.SC_OK || resp.getStatusLine().getStatusCode() == HttpStatus.SC_CREATED)\
  \ {\n 9    if (resp.getEntity() != null) {\n10     String strResp = TradingUtils.responseToString(resp);\n\
  11     Object o = JSONValue.parse(strResp);\n12     JSONObject orderResponse;\n\
  13     if (order.getType() == OrderType.MARKET) {\n14      orderResponse = (JSONObject)((JSONObject)\
  \ o).get(tradeOpened);\n15     } else {\n16      orderResponse = (JSONObject)((JSONObject)\
  \ o).get(orderOpened);\n17     }\n18     Long orderId = (Long) orderResponse.get(OandaJsonKeys.id);\n\
  19     LOG.info(\"Order executed->\" + strResp);\n20     return orderId;\n21   \
  \ } else {\n22     return null;\n23    }\n24   } else {\n25    LOG.info(\"Order\
  \ not executed. http code=\" +\n26     resp.getStatusLine().getStatusCode());\n\
  27    return null;\n28   }\n29  } catch (Exception e) {\n30   LOG.warn(e);\n31 \
  \  return null;\n32  } finally {\n33   TradingUtils.closeSilently(httpClient);\n\
  34  }\n35 }\n```\n\n\n\n\n如前所述，一旦我们拥有了一个`HttpPost`对象的实例，并将其中的所有订单属性设置为`NameValuePair`对象，就可以将其发布到平台了。一个成功的市价单发布会返回类似如下的响应：\n\
  \n```\n{\n    \"instrument\" : \"EUR_JPY\",\n    \"time\" : \"2015-05-26T16:08:51.000000Z\"\
  ,\n    \"price\" : 133.819,\n    \"tradeOpened\" : {\n        \"id\" : 1856110003,\n\
  \        \"units\" : 3000,\n        \"side\" : \"sell\",\n        \"takeProfit\"\
  \ : 132.819,\n        \"stopLoss\" : 134.9,\n        \"trailingStop\" : 0\n    },\n\
  \    \"tradesClosed\" : [],\n    \"tradeReduced\" : {}\n}\n```\n\n而一个成功的限价单会返回类似如下的内容：\n\
  \n```\n{\n    \"instrument\" : \"EUR_USD\",\n    \"time\" : \"2015-12-02T06:47:51.000000Z\"\
  ,\n    \"price\" : 1.1,\n    \"orderOpened\" : {\n        \"id\" : 12211080075,\n\
  \        \"units\" : 10,\n        \"side\" : \"sell\",\n        \"takeProfit\" :\
  \ 1.09,\n        \"stopLoss\" : 1.13,\n        \"expiry\" : \"2015-12-02T11:47:39.000000Z\"\
  ,\n        \"upperBound\" : 0,\n        \"lowerBound\" : 0,\n        \"trailingStop\"\
  \ : 0\n    }\n}\n```\n\n市价单的一个特点是，如果被全部或部分成交，它会导致一个持仓或交易的开立。相反，限价单会导致一个订单的创建，该订单在价格达到触发条件时准备被执行。因此，我们需要根据最初提交给平台的订单类型，对响应的\
  \ JSON 进行略有不同的解读。对于市价单，我们解析`tradeOpened`元素以获取订单 ID；而对于限价单，我们解析`orderOpened`元素。除此之外，该方法中没有其他重要内容了。\n\
  \n现在让我们将注意力转向`modifyOrder`。我们只能修改现有的限价单，因为根据上述讨论，只有限价单会创建一个新的待处理订单。另一方面，市价单会直接产生一笔交易。在查看代码之前，我们需要理解，对于待处理订单，只有某些属性可以被修改。它们是：\n\
  \n- `units`（单位）\n- `takeProfit`（止盈）\n- `stopLoss`（止损）\n- `price`（价格）\n\n我们需要一个由`placeOrder`返回的有效订单\
  \ ID，以及一个账户 ID 来实际执行修改。像往常一样，我们首先专注于创建实际的`HttpPatch`命令，该命令将促进平台上的修改操作。\n\n```\n\
  String orderForAccountUrl(Long accountId, Long orderId) {\n    return this.url +\
  \ OandaConstants.ACCOUNTS_RESOURCE + TradingConstants.FWD_SLASH + accountId +\n\
  \        ordersResource + TradingConstants.FWD_SLASH + orderId;\n}\n\nHttpPatch\
  \ createPatchCommand(Order<String, Long> order, Long accountId) throws Exception\
  \ {\n    HttpPatch httpPatch = new HttpPatch(orderForAccountUrl(accountId, order.getOrderId()));\n\
  \    httpPatch.setHeader(this.authHeader);\n    List<NameValuePair> params = Lists.newArrayList();\n\
  \    params.add(new BasicNameValuePair(takeProfit, String.valueOf(order.getTakeProfit())));\n\
  \    params.add(new BasicNameValuePair(stopLoss, String.valueOf(order.getStopLoss())));\n\
  \    params.add(new BasicNameValuePair(units, String.valueOf(order.getUnits())));\n\
  \    params.add(new BasicNameValuePair(price, String.valueOf(order.getPrice())));\n\
  \    httpPatch.setEntity(new UrlEncodedFormEntity(params));\n    return httpPatch;\n\
  }\n```\n\n创建 patch 命令与我们之前看到的创建 post 命令非常相似。我们创建一个`NameValuePair`对象列表，并从 JSON 键/Order\
  \ POJO 中设置名称/值对，但仅限于那些我们被允许为待处理订单更改的属性。我们还引入了一个函数来计算修改订单的 URL 以及其他与订单相关的服务，这些我们很快就会看到并在其他地方使用。对于账户\
  \ ID 123456 和订单 234567，该函数将计算出：\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/orders/234567\n\
  ```\n\n现在，我们将注意力转回`modifyOrder`，它看起来是这样的：\n\n```\n@Override\npublic boolean modifyOrder(Order<String,\
  \ Long> order, Long accountId) {\n    CloseableHttpClient httpClient = getHttpClient();\n\
  \    try {\n        HttpPatch httpPatch = createPatchCommand(order, accountId);\n\
  \        LOG.info(TradingUtils.executingRequestMsg(httpPatch));\n        HttpResponse\
  \ resp = httpClient.execute(httpPatch);\n        if (resp.getStatusLine().getStatusCode()\
  \ == HttpStatus.SC_OK &&\n            resp.getEntity() != null) {\n            LOG.info(\"\
  Order Modified->\" + TradingUtils.responseToString(resp));\n            return true;\n\
  \        }\n        LOG.warn(String.format(\"order %s could not be modified.\",\n\
  \            order.toString()));\n    } catch (Exception e) {\n        LOG.error(e);\n\
  \    } finally {\n        TradingUtils.closeSilently(httpClient);\n    }\n    return\
  \ false;\n}\n```\n\n代码看起来相当直接。一旦我们成功创建了一个设置了所有值的`HttpPatch`实例，就将其发布到平台。如果订单被成功修改，它会在头部返回\
  \ HTTP 代码 200，并在响应中返回已修改订单的状态。收到代码 200 后，我们返回`true`表示修改成功，否则返回`false`。\n\n```\n\
  ##header\nHTTP/1.1 200 OK\nServer: nginx/1.2.9\nContent-Type: application/json\n\
  Content-Length: 284\n```\n\n```\n##response body\n{\n    \"id\": 1001,\n    \"instrument\"\
  : \"USD_JPY\",\n    \"units\": 125,\n    \"side\": \"sell\",\n    \"type\": \"limit\"\
  ,\n    \"time\": \"2015-09-22T00:00:00Z\",\n    \"price\": 122.15,\n    \"takeProfit\"\
  : 119.25,\n    \"stopLoss\": 125.00,\n    \"expiry\": \"2015-09-25T00:00:00Z\",\n\
  \    \"upperBound\": 0,\n    \"lowerBound\": 0,\n    \"trailingStop\": 0\n}\n```\n\
  \n接下来要详细说明的是`closeOrder`。要删除或关闭一个订单，只需向`orderForAccountUrl`函数返回的 URL 发送一个`HttpDelete`命令即可。执行此操作的代码如下：\n\
  \n```\n@Override\npublic boolean closeOrder(Long orderId, Long accountId) {\n  \
  \  CloseableHttpClient httpClient = getHttpClient();\n    try {\n        HttpDelete\
  \ httpDelete = new HttpDelete(orderForAccountUrl(accountId, orderId));\n       \
  \ httpDelete.setHeader(authHeader);\n        LOG.info(TradingUtils.executingRequestMsg(httpDelete));\n\
  \        HttpResponse resp = httpClient.execute(httpDelete);\n        if (resp.getStatusLine().getStatusCode()\
  \ == HttpStatus.SC_OK) {\n            LOG.info(String.format(\"Order %d successfully\
  \ deleted for account %d\", orderId, accountId));\n            return true;\n  \
  \      } else {\n            LOG.warn(String.format(\n                \"Order %d\
  \ could not be deleted. Recd error code %d\", orderId, resp\n                .getStatusLine().getStatusCode()));\n\
  \        }\n    } catch (Exception e) {\n        LOG.warn(\"error deleting order\
  \ id:\" + orderId, e);\n    } finally {\n        TradingUtils.closeSilently(httpClient);\n\
  \    }\n    return false;\n}\n```\n\n如果订单 ID 及其所属的账户 ID 都有效，那么在成功删除订单后，我们应该会在头部看到一个\
  \ HTTP 200 返回。\n\n```\nHTTP/1.1 200 OK\nContent-Type: application/json\nContent-Length:\
  \ 127\n```\n\n现在，我们把注意力转向其余方法的实现，它们都是订单查询方法，并使用传统的`HttpGet`来获取订单相关信息。让我们直接进入第一个方法`pendingOrdersForAccount`。此方法返回一个待处理订单的集合，这些订单随时准备在价格达到时被成交。\n\
  \n```\n@Override\npublic Collection<Order<String, Long>> pendingOrdersForAccount(Long\
  \ accountId) {\n    return this.pendingOrdersForAccount(accountId, null);\n}\n```\n\
  \n\n```java\nprivate Collection<Order<String, Long>> pendingOrdersForAccount(Long\
  \ accountId,\n  TradeableInstrument<String> instrument) {\n  Collection<Order<String,\
  \ Long>> pendingOrders = Lists.newArrayList();\n  CloseableHttpClient httpClient\
  \ = getHttpClient();\n  try {\n   HttpUriRequest httpGet = new HttpGet(this.url\
  \ +\n    OandaConstants.ACCOUNTS_RESOURCE + TradingConstants.FWD_SLASH + accountId\
  \ + ordersResource + (instrument != null ? \"?\\\n instrument=\" + instrument.getInstrument()\
  \ :\n     StringUtils.EMPTY));\n   httpGet.setHeader(this.authHeader);\n   httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
  \   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n   HttpResponse resp =\
  \ httpClient.execute(httpGet);\n   String strResp = TradingUtils.responseToString(resp);\n\
  \   if (strResp != StringUtils.EMPTY) {\n    Object obj = JSONValue.parse(strResp);\n\
  \    JSONObject jsonResp = (JSONObject) obj;\n    JSONArray accountOrders = (JSONArray)\
  \ jsonResp.get(orders);\n\n    for (Object o: accountOrders) {\n     JSONObject\
  \ order = (JSONObject) o;\n     Order<String, Long> pendingOrder = parseOrder(order);\n\
  \     pendingOrders.add(pendingOrder);\n    }\n   } else {\n    TradingUtils.printErrorMsg(resp);\n\
  \   }\n  } catch (Exception e) {\n   LOG.error(e);\n  } finally {\n   TradingUtils.closeSilently(httpClient);\n\
  \  }\n  return pendingOrders;\n }\n```\n\n公共方法委托给一个内部私有方法，该方法用于检索某个账户的挂单，并在提供交易产品参数时进行可选过滤。由于我们需要获取所有交易产品的订单，因此向该方法传递\
  \ `null` 作为交易产品参数。我们来仔细看看生成包含或不包含交易产品值的 URL 的代码。\n\n```\nthis.url + OandaConstants.ACCOUNTS_RESOURCE\
  \ + TradingConstants.FWD_SLASH + accountId\n+ ordersResource + (instrument != null\
  \ ? \"?instrument=\"\n+ instrument.getInstrument() : StringUtils.EMPTY\n```\n\n\
  如果 `instrument` 为 `null`，则账户 ID `123456` 的输出结果为：\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/orders\n\
  ```\n\n但如果传入交易产品 `EUR_USD`，我们会得到结果：\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/orders?instrument=EUR_USD\n\
  ```\n\n当我们请求所有订单时，返回的示例 JSON 如下：\n\n```json\n{\n  \"orders\": [\n    {\n      \"\
  id\": 1001,\n      \"instrument\": \"USD_CAD\",\n      \"units\": 100,\n      \"\
  side\": \"buy\",\n      \"type\": \"marketIfTouched\",\n      \"time\": \"1444116207000000\"\
  ,\n      \"price\": 1.3,\n      \"takeProfit\": 1.31,\n      \"stopLoss\": 1.2,\n\
  \      \"expiry\": \"1444721003000000\",\n      \"upperBound\": 0,\n      \"lowerBound\"\
  : 0,\n      \"trailingStop\": 0\n    },\n    {\n      \"id\": 1002,\n      \"instrument\"\
  : \"EUR_USD\",\n      \"units\": 150,\n      \"side\": \"buy\",\n      \"type\"\
  : \"marketIfTouched\",\n      \"time\": \"1444108460000000\",\n      \"price\":\
  \ 1.115,\n      \"takeProfit\": 0,\n      \"stopLoss\": 0,\n      \"expiry\": \"\
  1444713259000000\",\n      \"upperBound\": 0,\n      \"lowerBound\": 0,\n      \"\
  trailingStop\": 0\n    }\n  ]\n}\n```\n\n剩下的工作就是将这个响应解析为订单集合，这也是该方法约定要返回的内容。`parseOrder`\
  \ 私有方法会为我们处理 JSON 订单数组中的每个订单元素。\n\n```java\nprivate Order<String, Long> parseOrder(JSONObject\
  \ order) {\n  final String orderInstrument = (String) order.get(instrument);\n \
  \ final Long orderUnits = (Long) order.get(units);\n  final TradingSignal orderSide\
  \ = OandaUtils.toTradingSignal((String) order.get(side));\n  final OrderType orderType\
  \ = OandaUtils.toOrderType((String) order.get(type));\n  final double orderTakeProfit\
  \ = ((Number) order.get(takeProfit)).doubleValue();\n  final double orderStopLoss\
  \ = ((Number) order.get(stopLoss)).doubleValue();\n  final double orderPrice = ((Number)\
  \ order.get(price)).doubleValue();\n  final Long orderId = (Long) order.get(id);\n\
  \  Order<String, Long> pendingOrder = new Order<String, Long>(\n   new TradeableInstrument<String>(orderInstrument),\
  \ orderUnits, orderSide, orderType,\n   orderTakeProfit, orderStopLoss, orderPrice);\n\
  \  pendingOrder.setOrderId(orderId);\n  return pendingOrder;\n}\n```\n\n接下来我们要关注的方法是\
  \ `pendingOrdersForInstrument`。该方法的职责是查找所有账户中给定交易产品的所有订单。我们已经看到有一个私有方法，它可以返回给定账户的所有订单，如果提供了交易产品参数，则进行过滤。因此，我们只需要获取交易账户持有的所有账户列表，然后遍历每个账户，调用这个内部方法来检索所有订单。下面的代码基本描述了这一过程：\n\
  \n```java\n@Override\npublic Collection<Order<String, Long>> pendingOrdersForInstrument(TradeableInstrument<String>\
  \ instrument) {\n  Collection<Account<Long>> accounts = this.accountDataProvider.getLatestAccountInfo();\n\
  \  Collection<Order<String, Long>> allOrders = Lists.newArrayList();\n  for (Account<Long>\
  \ account: accounts) {\n   allOrders.addAll(this.pendingOrdersForAccount(account.getAccountId(),\
  \ instrument));\n  }\n  return allOrders;\n}\n```\n\n上述实现为 `allPendingOrders` 方法的非常直接的实现铺平了道路：\n\
  \n```java\n@Override\npublic Collection<Order<String, Long>> allPendingOrders()\
  \ {\n    return pendingOrdersForInstrument(null);\n}\n```\n\n我们还需要描述的最后一个方法是 `pendingOrderForAccount`。该方法用于检索给定账户的单个订单，前提是我们提供了精确的订单\
  \ ID。该方法调用 `orderForAccountUrl` 来获取请求信息的 URL。之前我们在尝试使用 `HttpPatch` 修改现有订单时调用过该方法。这次我们只需要使用不同的\
  \ HTTP 动词 `HttpGet`，从相同的 URL 检索订单信息。一个示例 JSON 响应如下：\n\n```json\n{\n    \"id\": 1001,\n\
  \    \"instrument\": \"USD_JPY\",\n    \"units\": 125,\n    \"side\": \"sell\",\n\
  \    \"type\": \"marketIfTouched\",\n    \"time\": \"1444116207000000\",\n    \"\
  price\": 122.15,\n    \"takeProfit\": 119.25,\n    \"stopLoss\": 125.00,\n    \"\
  expiry\": \"1444721003000000\",\n    \"upperBound\": 0,\n    \"lowerBound\": 0,\n\
  \    \"trailingStop\": 0\n}\n```\n\n启动这种响应的代码如下：\n\n```java\n@Override\npublic Order<String,\
  \ Long> pendingOrderForAccount(Long orderId, Long accountId) {\n  CloseableHttpClient\
  \ httpClient = getHttpClient();\n  try {\n   HttpUriRequest httpGet = new HttpGet(orderForAccountUrl(accountId,\n\
  \    orderId));\n   httpGet.setHeader(this.authHeader);\n   httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
  \   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n   HttpResponse resp =\
  \ httpClient.execute(httpGet);\n   String strResp = TradingUtils.responseToString(resp);\n\
  \   if (strResp != StringUtils.EMPTY) {\n    JSONObject order = (JSONObject) JSONValue.parse(strResp);\n\
  \    return parseOrder(order);\n   } else {\n    TradingUtils.printErrorMsg(resp);\n\
  \   }\n  } catch (Exception e) {\n   LOG.error(e);\n  } finally {\n   TradingUtils.closeSilently(httpClient);\n\
  \  }\n  return null;\n}\n```\n\n至此，我们结束了对提供者 `OandaOrderManagementProvider` 为订单管理服务提供的所有方法的讨论。\n\
  \n\n### 6.4 一个简单的 `OrderInfoService`\n\n遵循将提供者方法封装在服务背后的主题，我们需要编写一个 `OrderInfoService`，它封装了\
  \ `OrderManagementProvider` 的所有只读方法。这个服务相当直观，代码如下：\n\n```\n 1 public class OrderInfoService\
  \ < M, N, K > {\n\n 3  private final OrderManagementProvider < M,\n 4  N,\n 5  K\
  \ > orderManagementProvider;\n\n 7  public OrderInfoService(OrderManagementProvider\
  \ < M, N, K > orderManagementProvider) {\n 8   this.orderManagementProvider = orderManagementProvider;\n\
  \ 9  }\n\n11  public Collection < Order < N,\n12  M >> allPendingOrders() {\n13\
  \   return this.orderManagementProvider.allPendingOrders();\n14  }\n\n16  public\
  \ Collection < Order < N,\n17  M >> pendingOrdersForAccount(K accountId) {\n18 \
  \  return this.orderManagementProvider.pendingOrdersForAccount(accountId);\n19 \
  \ }\n\n21  public Collection < Order < N,\n22  M >>\n23  pendingOrdersForInstrument(TradeableInstrument\
  \ < N > instrument) {\n24   return this.orderManagementProvider.pendingOrdersForInstrument(instrument);\n\
  25  }\n\n27  public Order < N,\n28  M > pendingOrderForAccount(M orderId, K accountId)\
  \ {\n29   return this.orderManagementProvider.pendingOrderForAccount(orderId, accountId);\n\
  30  }\n\n32  public int findNetPositionCountForCurrency(String currency) {\n33 \
  \  Collection < Order < N, M >> allOrders = allPendingOrders();\n34   int positionCount\
  \ = 0;\n35   for (Order < N, M > order: allOrders) {\n36    positionCount +=\n37\
  \     TradingUtils.getSign(order.getInstrument().getInstrument(),\n38      order.getSide(),\
  \ currency);\n39   }\n40   return positionCount;\n41  }\n42 }\n```\n\n除了 `findNetPositionCountForCurrency`\
  \ 方法之外，所有方法都委托给底层的 `OrderManagementProvider` 来获取所需信息。因此，剩下需要讨论的就是 `findNetPositionCountForCurrency`\
  \ 方法。仔细查看该方法代码，它会请求所有账户中的全部挂单，并通过查看 `TradingUtils.getSign` 方法返回的符号（-1 或 +1）来计算某个货币的净头寸。提醒一下，如果我们卖出给定货币，该方法返回\
  \ -1；如果买入则返回 +1。例如，如果我们通过下达限价单卖出 `EUR_CHF` 货币对，传入货币 `EUR` 会返回 -1，而传入 `CHF` 则返回 +1。\n\
  \n`findNetPositionCountForCurrency` 方法的用途可能不是一目了然。然而，从风险管理的角度来看，了解我们在某种货币上是多头还是空头以及仓位大小是相当有用的，我们将在后续章节中讨论这一点。\n\
  \n### 6.5 执行前验证订单：`PreOrderValidationService`\n\n在讨论封装订单执行、修改和删除部分的服务之前，我们先讨论一个重要的服务，它负责执行一些订单执行前的检查，只有这些检查通过，订单才会被执行。同样，这纯粹是从风险管理的角度出发，如果确实需要，也可以绕过。我们将在后续章节讨论为什么拥有风险管理控制措施非常重要，尤其是对于高杠杆账户。不过，为了我们的讨论，我提出了一些必须执行的规则或检查，以便为订单执行开绿灯。这套检查可能并非适用于所有情况，但关键在于，在下单之前，我们必须事先进行一些尽职调查。我提出的规则如下：\n\
  \n1.  某种货币的净多头或净空头仓位不得超过给定水平。也就是说，例如对于 `AUD`，我们既可以持有空头头寸也可以持有多头头寸，但如果存在净多头或净空头头寸，其数量不得超过一个可配置的数字，比如\
  \ 4。因此，如果我们已经持有 4 笔未平仓交易，例如做多 `AUD_USD`、做多 `AUD_CHF`、做空 `GBP_AUD`、做空 `EUR_AUD`，这意味着我们在\
  \ `AUD` 上的仓位已经很重，任何进一步做多 `AUD` 的订单都必须被拒绝。例如，如果一个策略建议下达市价单做多 `AUD_JPY`，该订单必须被拒绝，因为我们的要求是不超过最大多头或空头仓位水平，在我们的例子中为\
  \ 4。\n2.  如果某个货币对的 10 年加权移动平均线 (`WMA`) 在其历史高点或低点的 `x%` 范围内，则不交易该货币对。这需要一点解释。假设 `EUR_USD`\
  \ 的 10 年 `WMA` 是 1.3，而当前即期价格是 1.08。此时我们会非常不情愿下做空 `EUR_USD` 的订单。因为根据我们的规则，我们只能做空至\
  \ 10 年 `WMA` 的 10%（假设 `x=10`）以内。因此，从 1.3 中减去 1.3 的 10% 得到 1.17。所以，如果价格跌破当前水平，我们的检查将不允许下做空\
  \ `EUR_USD` 的订单。类似地，如果当前价格是 1.45（大于 1.3 + 1.3 的 10% = 1.43），我们不会做多 `EUR_USD`。\n\
  3.  如果某个货币对的现有交易已经活跃，我们不想下达订单。这是为了确保我们不会通过下达相反方向的订单意外平仓/减少现有交易头寸，或者为了加倍仓位而增加现有头寸。\n\
  \n当然，这些规则可能不完全合理，甚至可能与你成功的策略建议相悖，但关键在于要有一些预验证规则，以免不必要地增加投资组合的风险。当然，你完全可以完全摒弃这些规则并编写自己的规则，但只要拥有一套有意义的规则/检查集，从长远来看它们总会对你有帮助。\n\
  \n现在，让我们直接进入代码，这些代码尝试在服务中对这些规则进行编程。我们首先定义构造函数，它接受该服务的所有依赖项。\n\n```\n 1 public class\
  \ PreOrderValidationService < M, N, K > {\n 2   private final TradeInfoService <\
  \ M,\n 3   N,\n 4   K > tradeInfoService;\n 5   private final MovingAverageCalculationService\
  \ < N >\n 6   movingAverageCalculationService;\n 7   private final BaseTradingConfig\
  \ baseTradingConfig;\n 8   private final OrderInfoService < M,\n 9   N,\n10   K\
  \ > orderInfoService;\n11   static final int TEN_YRS_IN_MTHS = 120;\n```\n\n\n```java\n\
  13   public PreOrderValidationService(TradeInfoService < M, N, K > tradeInfoService,\n\
  14    MovingAverageCalculationService < N > movingAverageCalculationService,\n15\
  \    BaseTradingConfig baseTradingConfig,\n16    OrderInfoService < M, N, K > orderInfoService)\
  \ {\n17    this.tradeInfoService = tradeInfoService;\n18    this.movingAverageCalculationService\
  \ = movingAverageCalculationService;\n19    this.baseTradingConfig = baseTradingConfig;\n\
  20    this.orderInfoService = orderInfoService;\n21   }\n```\n\n`TradeInfoService`\
  \ 是本章后续会介绍的内容。用于获取各种交易相关信息的方法在当前上下文中不言自明，但将在后续详细阐述。其余内容我相信可以从我们对验证规则的讨论中自然推导出来。`MovingAverageCalculationService`\
  \ 用于计算 WMA，`BaseTradingConfig` 用于各种配置参数（如货币允许的最大净头寸），`OrderInfoService` 用于获取待处理订单等信息。\n\
  \n现在我们来看第一个验证检查的服务方法代码：\n\n```java\n 1 public boolean checkLimitsForCcy(TradeableInstrument\
  \ < N > instrument, TradingSignal signal) {\n 2  String currencies[] = TradingUtils.splitInstrumentPair(instrument.getInstrument());\n\
  \ 3  for (String currency: currencies) {\n 4   int positionCount =\n 5    this.tradeInfoService.findNetPositionCountForCurrency(currency)\
  \ +\n 6    this.orderInfoService.findNetPositionCountForCurrency(currency);\n 7\
  \   int sign = TradingUtils.getSign(instrument.getInstrument(), signal,\n 8    currency);\n\
  \ 9   int newPositionCount = positionCount + sign;\n10   if (Math.abs(newPositionCount)\
  \ >\n11    this.baseTradingConfig.getMaxAllowedNetContracts() && Integer.signum(sign)\
  \ == Integer.signum(positionCount)) {\n12    LOG.warn(String.format(\n13     \"\
  Cannot place trade %s because max limit exceeded. max allowed=%d and \" + \"current\
  \ net positions=%d for currency %s\"\\\n14 , instrument,\n15     this.baseTradingConfig.getMaxAllowedNetContracts(),\n\
  16     newPositionCount, currency));\n17    return false;\n18   }\n19  }\n20  return\
  \ true;\n21 }\n```\n\n该方法在检查失败时返回 `false`，否则返回 `true`。该方法首先将货币对拆分为单个货币，然后针对每个货币获取当前状态（即所有未平仓交易头寸和待处理订单的总和）。我们称之为当前头寸计数。例如，如果我们有\
  \ 4 个 CHF 空头交易头寸和 1 个买入 CHF 的待处理订单，则净头寸计数为 -3（请记住，负数表示空头头寸）。因此，如果我们想下的新市价单是买入 `USD_CHF`，则\
  \ `TradingUtils.getSign` 对 CHF 会返回 -1。如果继续执行该订单，这会使我们做空 CHF 的头寸增加到 4。现在，检查的评估发生在代码的这一部分：\n\
  \n```java\n1 if (Math.abs(newPositionCount) >\n2 \t\t\tthis.baseTradingConfig.getMaxAllowedNetContracts()\
  \ &&\n3 Integer.signum(sign) == Integer.signum(positionCount)) {\n```\n\n如果每个货币允许的最大净合约数配置为\
  \ 4，那么我们仍然可以下达此市价单，因为新的头寸计数将使其达到允许的最大水平。由于我们在 if 语句中实际比较的是绝对值，因此还必须添加符号检查，以确保未来的头寸计数与\
  \ `TradingUtils.getSign` 返回的符号相同。\n\n现在我们来看第二个验证检查的服务方法代码：\n\n```java\n 1 public\
  \ boolean isInSafeZone(TradingSignal signal, double price, TradeableInstrument <\
  \ N > instrument) {\n 2  double wma10yr = this.movingAverageCalculationService.calculateWMA(\n\
  \ 3   instrument, TEN_YRS_IN_MTHS,\n 4   CandleStickGranularity.M);\n 5  final double\
  \ max10yrWmaOffset = baseTradingConfig.getMax10yrWmaOffset();\n 6  double minPrice\
  \ = (1.0 - max10yrWmaOffset) * wma10yr;\n 7  double maxPrice = (1.0 + max10yrWmaOffset)\
  \ * wma10yr;\n 8  if ((signal == TradingSignal.SHORT && price > minPrice) || (signal\
  \ == TradingSignal.LONG && price <\n 9    maxPrice)) {\n10   return true;\n11  }\
  \ else {\n12   LOG.info(String.format(\n13    \"Rejecting %s  %s because price %2.5f\
  \ is 10pct on either side of wma 10yr\n14    price of % 2.5 f \",\n15    signal,\
  \ instrument, price, wma10yr));\n16   return false;\n17  }\n18 }\n```\n\n我们首先通过传入月度粒度作为参数来计算该工具的\
  \ 10 年 WMA。`movingAverageCalculationService.calculateWMA` 返回的值是我们安全区计算的基础。假设 `getMax10yrWmaOffset`\
  \ 的值配置为 0.1（10%），那么我们的安全区就是该值两侧各 10% 的范围。这意味着，只有当价格相对于此值的跌幅小于或等于 10% 时，我们才愿意下空单。同样地，只有当价格涨幅小于或等于\
  \ 10% 时，我们才愿意下多单。由于此值是可配置的，因此我们可以随时扩大安全区。\n\n现在我们来看列表中最后一个验证检查的方法代码：\n\n```java\n\
  \ 1 public boolean checkInstrumentNotAlreadyTraded(TradeableInstrument < N > instrument)\
  \ {\n 2  Collection < K > accIds = this.tradeInfoService.findAllAccountsWithInstrumentTrades(instrument);\n\
  \ 3  if (accIds.size() > 0) {\n 4   LOG.warn(String.format(\"Trade with instrument\
  \ %s as one already exists\", instrument));\n 5   return false;\n 6  } else {\n\
  \ 7   Collection < Order < N, M >> pendingOrders = this.orderInfoService.\n 8  \
  \ pendingOrdersForInstrument(instrument);\n 9   if (!pendingOrders.isEmpty()) {\n\
  10    LOG.warn(String.format(\"Pending order with instrument %s already exists\"\
  , instrument));\n11    return false;\n12   }\n13   return true;\n14  }\n15 }\n```\n\
  \n该方法首先调用 `TradeInfoService` 检查是否存在任何持有该工具未平仓交易头寸的账户。如果存在，则直接退出方法并返回 `false`。但是，如果不存在此类账户，我们将检查是否存在针对该工具的待处理订单。如果发现任何待处理订单，则再次从方法返回\
  \ `false`，否则返回 `true`。至此，我们结束了关于预验证订单服务的讨论。下一步自然是进入在一切检查通过后实际下达这些订单的服务。在结束之前，我想重申的是，尽管其中一些验证检查从全局来看或许并非绝对必要，但至少我们都同意，在完全确定需要下订单之前，必须进行一系列检查。\n\
  \n\n### 6.6 整合至 `OrderExecutionService`\n\n我们将深入探讨 `OrderExecutionService` 来结束关于订单管理服务的讨论。该服务的设计基于一个队列，订单从中被取出，并在所有检查通过后发送至交易平台。其思路是，通过我们的各种策略（可能还包括其他服务），我们能够简单地将订单放入队列，其余工作由此服务负责处理——它持续监听该队列以获取新订单。通过这种方式，我们将做出下单决策（基于我们策略建议的交易信号）这一行为与执行下单的机械过程解耦。让我们先来看一下它的构造函数及其所依赖的各项服务。\n\
  \n```\n 1 public class OrderExecutionService < M, N, K > implements Runnable {\n\
  \n3   private static final Logger LOG = Logger.getLogger(OrderExecutionService.class);\n\
  \n5   private final BlockingQueue < TradingDecision < N >> orderQueue;\n 6   private\
  \ final AccountInfoService < K, N > accountInfoService;\n 7   private final OrderManagementProvider\
  \ < M, N, K > orderManagementProvider;\n 8   private final BaseTradingConfig baseTradingConfig;\n\
  \ 9   private final PreOrderValidationService < M, N, K > preOrderValidationService;\n\
  10   private final CurrentPriceInfoProvider < N > currentPriceInfoProvider;\n11\
  \   private volatile boolean serviceUp = true;\n12   Thread orderExecThread;\n\n\
  14   public OrderExecutionService(BlockingQueue < TradingDecision < N >> orderQueue,\n\
  15    AccountInfoService < K, N > accountInfoService,\n16    OrderManagementProvider\
  \ < M, N, K >\n17    orderManagementProvider, BaseTradingConfig baseTradingConfig,\n\
  18    PreOrderValidationService < M, N, K > preOrderValidationService,\n19    CurrentPriceInfoProvider\
  \ < N > currentPriceInfoProvider) {\n20    this.orderQueue = orderQueue;\n21   \
  \ this.accountInfoService = accountInfoService;\n22    this.orderManagementProvider\
  \ = orderManagementProvider;\n23    this.baseTradingConfig = baseTradingConfig;\n\
  24    this.preOrderValidationService = preOrderValidationService;\n25    this.currentPriceInfoProvider\
  \ = currentPriceInfoProvider;\n26   }\n27   @PostConstruct\n28   public void init()\
  \ {\n29    orderExecThread = new Thread(this, this.getClass().getSimpleName());\n\
  30    orderExecThread.start();\n31   }\n```\n\n我们首先注意到该服务实现了 `Runnable` 接口，这意味着它将生成一个线程来持续监控订单队列。该线程在\
  \ `init` 方法中初始化，`init` 方法在应用上下文初始化后由 Spring 等依赖注入框架自动调用（由于 `@PostConstruct` 注解），如果不使用此类框架，则需要显式调用。在我们的线程中，我们持续监控订单队列以获取新订单。一旦从队列接收到订单，这些依赖项便会开始发挥作用（它们各自的用途很快就会明了）。接下来，让我们看看所有关键操作发生的\
  \ `run` 方法。\n\n```\n 1 @Override\n 2 public void run() {\n 3   while (serviceUp)\
  \ {\n 4    try {\n 5     TradingDecision < N > decision = this.orderQueue.take();\n\
  \ 6     if (!preValidate(decision)) {\n 7      continue;\n 8     }\n 9     Collection\
  \ < K > accountIds = this.accountInfoService.findAccountsToTrade();\n10     if (accountIds.isEmpty())\
  \ {\n11      LOG.info(\"未找到任何符合条件的账户，准备金可能已耗尽。\n12       \");\n13       continue;\n\
  14      }\n15      Order < N, M > order = null;\n16      if (decision.getLimitPrice()\
  \ == 0.0) { // 市价单\n17       order = new Order < N, M > (decision.getInstrument(),\n\
  18        this.baseTradingConfig.getMaxAllowedQuantity(), decision.getSignal(),\n\
  19        OrderType.MARKET, decision.getTakeProfitPrice(),\n20        decision.getStopLossPrice());\n\
  21      } else {\n22       order = new Order < N, M > (decision.getInstrument(),\n\
  23        this.baseTradingConfig.getMaxAllowedQuantity(), decision.getSignal(),\n\
  24        OrderType.LIMIT,\n25        decision.getTakeProfitPrice(), decision.getStopLossPrice(),\n\
  26        decision.getLimitPrice());\n27      }\n28      for (K accountId: accountIds)\
  \ {\n29       M orderId = this.orderManagementProvider.placeOrder(order, accountId);\n\
  30       if (orderId != null) {\n31        order.setOrderId(orderId);\n32      \
  \ }\n33       break;\n34      }\n35     } catch (Exception e) {\n36      LOG.error(e);\n\
  37     }\n38    }\n\n41   }\n\n43   private boolean preValidate(TradingDecision\
  \ < N > decision) {\n44    if (TradingSignal.NONE != decision.getSignal() &&\n45\
  \     this.preOrderValidationService.checkInstrumentNotAlreadyTraded(\n46      decision.getInstrument())\
  \ &&\n47     this.preOrderValidationService.checkLimitsForCcy(\n48      decision.getInstrument(),\
  \ decision.getSignal())) {\n49     Collection < TradeableInstrument < N >> instruments\
  \ = Lists.newArrayList();\n50     instruments.add(decision.getInstrument());\n51\
  \     Map < TradeableInstrument < N > , Price < N >> priceMap =\n52      this.currentPriceInfoProvider.getCurrentPricesForInstruments(instruments);\n\
  53     if (priceMap.containsKey(decision.getInstrument())) {\n54      Price < N\
  \ > currentPrice = priceMap.get(decision.getInstrument());\n55      return this.preOrderValidationService.isInSafeZone(decision.getSignal(),\n\
  56       decision.getSignal() ==\n57       TradingSignal.LONG ? currentPrice.getAskPrice()\
  \ : currentPrice.getBidPrice(),\n58       decision.getInstrument());\n59     }\n\
  60    }\n61    return false;\n62   }\n```\n\n\n\n我们的`run`方法会无限循环，直到易失性变量`serviceUp`的值被设置为`false`。稍后我们将介绍如何将其设置为`false`以终止循环，进而终止该方法，最终导致线程终止。语句`this.orderQueue.take()`会阻塞，直到队列中有待处理的订单。假设有订单可用且已从队列中取出，我们要做的第一件事是确保它通过`preValidate`方法中的一系列验证检查。该方法仅应用了我们在上一节讨论的所有\
  \ 3 项验证检查，但仔细看，它实际上进行了一项优化。由于安全区检查需要获取过去 10 年的蜡烛图数据，因此只有在其他两项检查通过后才执行。假设检查成功，我们现在需要找到可以交易的账户。回顾一下关于选择合格交易账户的讨论，在账户被认定为可交易之前，还需要通过一组检查，例如可用金额必须至少为总金额的`x%`。同样，这可以称为基于账户级别的第二级检查。如果没有可用账户，则跳过剩余处理并回到`while`循环的开头。然而，如果至少找到一个账户，我们现在就可以下单了。为此，我们必须首先根据从队列中取出的`TradingSignal`实例准备一个`Order`\
  \ POJO。首先要决定它是市价单还是限价单。提醒一下，限价单必须设置触发价格，我们检查交易决策是否设置了触发价格。如果已设置，则将`Order` POJO 类型准备为`LIMIT`，否则为`MARKET`。现在，我们有了一个完全准备好的`Order`\
  \ POJO，可以发送出去下单。我们遍历所有符合条件的账户。一旦找到第一个成功下单的账户（下单成功时会返回有效的`orderId`），我们就跳出循环，然后回到循环的开头。\n\
  \n回到如何将变量`serviceUp`设置为`false`以便线程停止的问题？为此，我们在服务中创建一个关闭钩子，当应用程序关闭时，DI 框架会自动调用它。这一切都归功于`@PreDestroy`注解，这些框架将其视为在销毁`bean`之前要调用的方法。如果未使用\
  \ DI 框架，则必须手动调用`shutdown()`方法来终止线程。\n\n```java\n@PreDestroy\npublic void shutDown()\
  \ {\n    this.serviceUp = false;\n}\n```\n\n至此，我们基本结束了对订单中需要了解的大部分内容的讨论。现在，我们将注意力转向订单执行并导致创建交易头寸时会发生什么。交易头寸意味着投资组合中的风险，必须准备好管理此头寸，以最小化损失并最大化利润。我们首先详细讨论`Trade`\
  \ POJO 的定义。\n\n### 6.7 Trade POJO 定义\n\n`Trade` POJO 与`Order` POJO 类似，包含管理交易和描述系统中未平仓交易头寸所需的所有信息。正如我们将看到的，这两个\
  \ POJO 有许多共同的属性，仅仅是因为订单执行后会转化为一个未平仓头寸。与订单一样，它必须有基础工具、止损价、止盈价、买入/卖出方向等。让我们通过查看代码更详细地了解它。\n\
  \n```java\n/**\n *\n * @param <M> The type of tradeId\n * @param <N> The type of\
  \ instrumentId in class TradeableInstrument\n * @param <K> The type of accountId\n\
  \ * @see TradeableInstrument\n */\npublic class Trade < M, N, K > {\n    private\
  \ final M tradeId;\n    private final long units;\n    private final TradingSignal\
  \ side;\n    private final TradeableInstrument < N > instrument;\n    private final\
  \ DateTime tradeDate;\n    private final double takeProfitPrice,\n    executionPrice,\n\
  \    stopLoss;\n    private final K accountId;\n    private final String toStr;\n\
  \n    public Trade(M tradeId, long units, TradingSignal side,\n        TradeableInstrument\
  \ < N > instrument, DateTime tradeDate, double takeProfitPrice,\n        double\
  \ executionPrice, double stopLoss, K accountId) {\n        this.tradeId = tradeId;\n\
  \        this.units = units;\n        this.side = side;\n        this.instrument\
  \ = instrument;\n        this.tradeDate = tradeDate;\n        this.takeProfitPrice\
  \ = takeProfitPrice;\n        this.executionPrice = executionPrice;\n        this.stopLoss\
  \ = stopLoss;\n        this.accountId = accountId;\n        this.toStr = String.format(\n\
  \            \"Trade Id=%d, Units=%d, Side=%s, Instrument=%s, TradeDate=%s, TP=%3.5f,\
  \ Price=%3.5f, SL=%3.5f\",\n            tradeId, units, side, instrument, tradeDate.toString(),\
  \ takeProfitPrice,\n            executionPrice, stopLoss);\n    }\n\n    @Override\n\
  \    public int hashCode() {\n        final int prime = 31;\n        int result\
  \ = 1;\n        result = prime * result + ((accountId == null) ? 0 : accountId.hashCode());\n\
  \        result = prime * result + ((tradeId == null) ? 0 : tradeId.hashCode());\n\
  \        return result;\n    }\n\n    @Override\n    public boolean equals(Object\
  \ obj) {\n        if (this == obj)\n            return true;\n        if (obj ==\
  \ null)\n            return false;\n        if (getClass() != obj.getClass())\n\
  \            return false;\n        @SuppressWarnings(\"unchecked\")\n        Trade\
  \ < M, N, K > other = (Trade < M, N, K > ) obj;\n        if (accountId == null)\
  \ {\n            if (other.accountId != null)\n                return false;\n \
  \       } else if (!accountId.equals(other.accountId))\n            return false;\n\
  \        if (tradeId == null) {\n            if (other.tradeId != null)\n      \
  \          return false;\n        } else if (!tradeId.equals(other.tradeId))\n \
  \           return false;\n        return true;\n    }\n\n    public double getStopLoss()\
  \ {\n        return stopLoss;\n    }\n\n    public K getAccountId() {\n        return\
  \ accountId;\n    }\n\n    @Override\n    public String toString() {\n        return\
  \ toStr;\n    }\n\n    public double getExecutionPrice() {\n        return executionPrice;\n\
  \    }\n\n    public M getTradeId() {\n        return tradeId;\n    }\n\n    public\
  \ long getUnits() {\n        return units;\n    }\n\n    public TradingSignal getSide()\
  \ {\n        return side;\n    }\n\n    public TradeableInstrument < N > getInstrument()\
  \ {\n        return instrument;\n    }\n\n    public DateTime getTradeDate() {\n\
  \        return tradeDate;\n    }\n\n    public double getTakeProfitPrice() {\n\
  \        return takeProfitPrice;\n    }\n}\n```\n\n查看上面的代码，我们观察到它在属性方面与`Order` POJO\
  \ 具有相当多的相似性。除此之外，该 POJO 看起来相当简单。因此，我们可以继续讨论交易管理提供者接口的定义。\n\n\n\n### 6.8 `TradeManagementProvider`\
  \ 接口\n\n与其近亲 `OrderManagementProvider` 类似，`TradeManagementProvider` 具有非常相似的操作，只是缺少了一个显著的功能。在\
  \ CRUD 操作集中，该提供程序提供了除 C（创建）之外的所有操作。这是因为只有已提交并成交的订单才能创建交易，随后我们只能修改、平仓或检索与交易相关的信息。让我们直接来看它的定义：\n\
  \n```\n 1 /**\n 2  * 对单个交易执行 RUD（读取、更新、删除）操作的提供程序。通常交易按账户分组，\n 3  * 因此要执行这些操作，通常需要一个有效的\
  \ accountId。某些提供程序可能只有\n 4  * 单一账户的概念，因此任何对交易的操作都可能默认针对该单一账户，此时\n 5  * accountId\
  \ 可以为 null。\n 6  *\n 7  * 特意省略了批量关闭所有交易的 bulk 操作，以避免潜在的误用。\n 8  *\n 9  * @param\
  \ <M> tradeId 的类型\n10  * @param <N> TradeableInstrument 类中 instrumentId 的类型\n11\
  \  * @param <K> accountId 的类型\n12  * @see TradeableInstrument\n13  */\n14 public\
  \ interface TradeManagementProvider < M, N, K > {\n15  /**\n16   * 通过提供 accountId\
  \ 和 tradeId 来修改现有交易。在某些情况下，\n17   * 仅凭 tradeId 就足以识别交易，因此 accountId 可能为 null。\n\
  18   * 通过此操作只能修改交易的 stopLoss 和 takeProfit 参数。\n19   *\n20   * @param accountId\n\
  21   * @param tradeId\n22   * @param stopLoss\n23   * @param takeProfit\n24   *\
  \ @return 布尔值，指示修改是否成功。\n25   */\n26  boolean modifyTrade(K accountId, M tradeId,\
  \ double stopLoss, double takeProfit);\n27\n28  /**\n29   * 通过提供 accountId 和 tradeId\
  \ 来关闭现有交易。同样，accountId 对于\n30   * 关闭交易可能是可选的。\n31   *\n32   * @param tradeId\n33\
  \   * @param accountId\n34   * @return 布尔值，指示交易是否成功关闭。\n35   */\n36  boolean closeTrade(M\
  \ tradeId, K accountId);\n37\n38  /**\n39   * 根据给定的 tradeId 和/或 accountId 检索交易。\n\
  40   *\n41   * @param tradeId\n42   * @param accountId\n43   * @return 返回一个 Trade\
  \ 对象，如果未找到则返回 null。\n44   */\n45  Trade < M,\n46  N,\n47  K > getTradeForAccount(M\
  \ tradeId, K accountId);\n48\n49  /**\n50   * 返回给定账户的所有交易，如果未找到则返回空集合。不保证交易的顺序\n\
  51   * （例如按金融工具或时间顺序排列）。\n52   *\n53   * @param accountId\n54   * @return 给定账户 ID\
  \ 下的交易集合。\n55   */\n56  Collection < Trade < M,\n57  N,\n58  K >> getTradesForAccount(K\
  \ accountId);\n59 }\n```\n\n看起来非常相似，对吧？当然，除了缺少一个 `placeTrade` 方法，原因我们之前已经讨论过。\n\n\
  ### 6.9 `TradeManagementProvider` 的具体实现\n\n正如预期的那样，OANDA API 实现 `OandaTradeManagementProvider`\
  \ 与其对应的订单实现有许多共同之处。由于关于订单实现的大部分讨论也适用于交易实现，我们将直接进入代码，并指出存在的任何差异。除此之外，适用于订单实现的大多数原则在此也同样适用。我们照例从定义提供程序类、其构造函数以及使用的\
