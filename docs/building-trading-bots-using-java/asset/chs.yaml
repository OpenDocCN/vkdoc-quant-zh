  \ `OandaMarketDataStreamingService` 的实际测试用例。我们想要测试该服务能否正确处理传入的报价数据和心跳消息，并调用相关的回调处理器，通过\
  \ `EventBus` 将事件向下游分发。我们的测试将包含一个断言，即文件中的事件数量应与推送到下游的事件数量相匹配。让我们来看一下代码，并了解如何实现其中一个断言。\n\
