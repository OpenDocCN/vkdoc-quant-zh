  \ = providerHelper;\n24 \t}\n```\n\n*   `AccountDataProvider` 是显而易见的，因为该服务需要能为单个\
  \ accountId 和所有可用账户提供信息。\n*   `CurrentPriceInfoProvider` 是一个提供给定工具集当前价格的供应商，将在后续章节中讨论。\n\
