  \ tweet)` 方法开始。这次我们基于关于哪些推文是开仓、平仓或无法解析的通用观察，采用了略微不同的逻辑。假设它要么是开仓要么是平仓交易，我们继续解析推文。解析过程完全遵循上述观察结果中提到的逻辑。\n\
  \n最后剩下的需要讨论的事项是该用户的 `findHistoricPnlTweetsForInstrument` 方法。如同用户 `@SignalFactory`\
  \ 一样，我们需要找到该用户用来表示已平仓交易的短语。从我们对平仓交易的观察来看，该用户 `@ZuluTrader101` 的推文中包含短语 `Closed Buy`\
  \ 或 `Closed Sell`。因此，我们的查询语句类似于 `from:%s AND %s AND \"Closed Buy\" OR \"Closed Sell\"\
  `。在我们继续之前，提一下关于 Twitter 搜索 API 的一点。如果我们用双引号括起一个短语，意味着我们正在寻找该短语的精确匹配。这正是我们为该用户所需要的。\n\
  \n\n\n### 8.4 动手实践\n\n本节我们将编写一个演示程序，用于从指定用户抓取推文。近期测试表明，即便是对用户 `@ZuluTrader101` 进行非常简单的推文搜索，也无法在\
  \ Twitter 高级搜索页面找到结果。我们将使用 `@Forex_EA4U`^(10) 这个用户，其推文格式与前述用户非常相似。\n\n```\n 1 package\
  \ com.precioustech.fxtrading.tradingbot.social.twitter.tweethandler;\n\n 3 import\
