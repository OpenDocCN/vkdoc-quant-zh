- "# 账户管理\n\n账户管理功能可能是在我们的机器人中需要构建的首要功能。当用户在经纪商/交易所开设交易账户时，系统会创建一个账户，该账户可以通过银行转账、信用卡、PayPal\
  \ 等方式直接注资。每个账户都有一个基础货币，通常就是资金来源的货币。例如，如果您位于英国，并持有一个用于为交易账户注资的英国银行账户，那么该交易账户的基础货币就是英镑。\n\
  \n然而，有些平台允许您创建其他货币账户，即使您没有为它们设置资金来源。例如，当您通过英国银行注资获得一个英镑账户后，即使没有美元资金来源，您也可以创建一个额外的美元账户。不过，美元账户可以通过从主账户转移一定金额的英镑来注资，这实际上相当于卖出\
  \ GBPUSD。此操作可针对其他货币账户（如加元、欧元等）重复进行。\n\n在大多数经纪商平台上，所有账户都具有以下可查询的属性：\n\n-   账户 ID\n\
  -   基础货币\n-   总金额\n-   可用交易余额\n-   杠杆\n\n其他可选信息可能包括：\n\n-   已实现盈亏\n-   未实现盈亏\n-\
  \   已用保证金\n-   未平仓交易\n-   未成交订单\n\n我们首先通过创建`Account` POJO 来获取所有这些信息。这里我们提供了两个构造器，其中一个基于上述讨论，仅包含构建对象所需的最少属性。\n\
