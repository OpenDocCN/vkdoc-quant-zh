  \n## 4. 事件流：市场数据事件\n\n现在我们已经到了交易机器人的真正存在开始变得明显的阶段。从这里开始，我们将进入交易的实际层面，其中之一就是处理实时事件并对其做出反应，前提是我们要对事件进行有意义的分析。事件流可能呈现以下形式和形状：\n\
  \n- 市场数据事件，即某一工具价格的变化。\n- 交易/订单/账户事件，例如订单成交或止损水平被触发。\n- 社交媒体事件，例如有影响力的人物或市场推动者的推文。\n\
  - 任何其他来源\n\n正如我们所见，我们可能有众多事件流，以不同程度的强度向我们的交易机器人发送信息。处理这些事件并基于它们做出决策是交易机器人设计的基石。在本章中，我们将专门讨论如何处理市场数据事件，以及如何使用\
  \ `Google EventBus` 来分发这些事件。\n\n### 4.1 流式市场数据接口\n\n我们首先定义一个接口，该接口规定了市场事件流在我们的机器人中工作所需的最小方法集。表面上看，似乎没什么复杂之处，因为我们只是对接口实现者强制执行了一个\
  \ `start` 和 `stop` 的要求。然而，正如我们稍后讨论实现时将会看到的，实现者的一部分工作是调用一个 `MarketEventCallback`\
  \ 处理器，该处理器负责处理接收到的流式市场事件。假设 `startMarketDataStreaming()` 方法会建立一条到事件源的持续连接（事件循环），即在一个独立的线程中，并且这个线程在该连接上接收市场数据事件。然后，事件会被解析并传递给\
  \ `MarketEventCallback` 以进行进一步处理。\n\n```java\n 1 /**\n 2  * 一个提供流式市场数据的服务。通常，实现会创建一个到交易平台的专用连接，\n\
  \ 3  * 并理想地通过 REST 服务或平台的回调接收价格流。实现必须处理断开的连接，\n 4  * 并以适当的方式尝试重新连接。该服务通常与平台的心跳信号耦合，\n\
  \ 5  * 心跳信号指示连接是否存活。\n 6  *\n 7  * 由于预期的数据量较大，建议服务将市场数据的处理委托给另一个服务，\n 8  * 以避免等待处理的事件队列堆积。\n\
  \ 9  *\n10  */\n11 public interface MarketDataStreamingService {\n\n13  /**\n14\
  \   * 启动流式服务，该服务理想地会创建一个到平台的专用连接或一个回调监听器。\n15   * 最好不要创建多个请求相同市场数据的连接。\n16   */\n\
  17  void startMarketDataStreaming();\n\n19  /**\n20   * 停止流式服务，并以适当的方式释放任何资源/连接，确保不产生资源泄漏。\n\
  21   */\n22  void stopMarketDataStreaming();\n\n24 }\n```\n\n`MarketEventCallback`\
  \ 接口必须配合使用，该接口实际上负责同步或异步地进一步分发市场数据事件。\n\n```java\n 1 /**\n 2  * 市场数据事件的回调处理器。上游独立的流式事件处理器负责处理和解析来自\n\
  \ 3  * 市场数据源的传入事件，并调用此处理器的 onMarketEvent 方法，\n 4  * 该方法随后可以根据需要将事件进一步向下游分发。\n 5\
  \  * 理想情况下，该接口的实现者会将事件放入队列进行异步处理，\n 6  * 或使用事件总线进行同步处理。\n 7  *\n 8  * @param <T>\n\
  \ 9  *            TradeableInstrument 类中 instrumentId 的类型\n10  * @see TradeableInstrument\n\
  11  * @see EventBus\n12  */\n13 public interface MarketEventCallback<T> {\n14  /**\n\
  15   * 由流式市场数据事件的上游处理器调用的方法。此方法的调用是同步的，\n16   * 因此该方法应尽快返回，以确保上游事件不会排队堆积。\n17  \
  \ *\n18   * @param instrument\n19   * @param bid\n20   * @param ask\n21   * @param\
  \ eventDate\n22   */\n23  void onMarketEvent(TradeableInstrument<T> instrument,\
  \ double bid, double ask, DateTime eventDate);\n24 }\n```\n\n让我们直接跳入 OANDA 的实现，因为一旦我们查看代码内部，事情就会变得更加清晰。\n\
  \n\n\n### 4.2 `MarketDataStreamingService` 的一个具体实现\n\n让我们先来看一下 `OandaMarketDataStreamingService`\
  \ 的类定义和构造函数，该类负责从 OANDA 读取市场数据流，并调用通过构造函数传入的 `MarketEventCallback` 实例上的 `onMarketEvent`\
  \ 方法。\n\n```java\npublic class OandaMarketDataStreamingService extends OandaStreamingService\
  \ implements MarketDataStreamingService {\n\n    private final String url;\n   \
  \ private final MarketEventCallback<String> marketEventCallback;\n\n    public OandaMarketDataStreamingService(String\
  \ url, String accessToken,\n                                          long accountId,\
  \ Collection<TradeableInstrument<String>> instruments,\n                       \
  \                   MarketEventCallback<String> marketEventCallback,\n         \
  \                                 HeartBeatCallback<DateTime> heartBeatCallback,\
  \ String heartbeatSourceId) {\n        super(accessToken, heartBeatCallback, heartbeatSourceId);\n\
  \        this.url = url + OandaConstants.PRICES_RESOURCE + \"?accountId=\" + accountId\
  \ + \"&instruments=\" + instrumentsAsCsv(instruments);\n        this.marketEventCallback\
  \ = marketEventCallback;\n    }\n\n    private String instrumentsAsCsv(Collection<TradeableInstrument<String>>\
  \ instruments) {\n        StringBuilder csvLst = new StringBuilder();\n        boolean\
  \ firstTime = true;\n        for (TradeableInstrument<String> instrument : instruments)\
  \ {\n            if (firstTime) {\n                firstTime = false;\n        \
  \    } else {\n                csvLst.append(TradingConstants.ENCODED_COMMA);\n\
  \            }\n            csvLst.append(instrument.getInstrument());\n       \
  \ }\n        return csvLst.toString();\n    }\n}\n```\n\n构造函数除了其他参数外，还接收一个账户 ID\
  \ 和一个需要获取报价的金融工具列表。`instrumentsAsCsv` 方法接收一个金融工具集合，并返回一个扁平的字符串，其中包含以 URL 编码的逗号分隔的金融工具名称。假设账户\
  \ ID 为 `123456`，金融工具列表为 `[\"EUR_USD\",\"GBP_AUD\"]`，那么构造函器中计算出的 URL 将如下所示：\n\n```java\n\
  //假设\npublic static final String PRICES_RESOURCE = \"/v1/prices\";\n//计算出的 this.url\
  \ 将如下所示\n\nhttps://stream-fxtrade.oanda.com/v1/prices?accountId=123456&instruments=EUR_USD%2CGBP_AUD\n\
  ```\n\n如前所述，OANDA 要求我们提供一个有效的账户 ID 来建立市场数据流。该流的 URL 也与之前讨论过的不同，例如用于请求金融工具列表的 URL。我们将在后面关于配置和部署的章节中详细讨论这些细微差别。\n\
  \n我们的具体实现继承了 `OandaStreamingService` 类，该类是为所有来自 OANDA 的流服务提供基础设施方法的基类，这当然包括市场数据，并且正如我们将在未来章节中讨论的，还包括事件流。来自\
  \ OANDA 的所有流都包含一个心跳负载，用于指示流是活跃的，因此需要 `HeartBeatCallback` 实例。我们将在后面的章节中讨论心跳。目前，只需知道心跳提供了一种确保客户端（我们的交易机器人）到经纪平台持久连接仍然存活的途径。如果当前流在给定时间内未收到心跳负载，则说明出现了问题，我们必须断开连接并尝试重新连接。让我们快速看一下它的定义以及它向其子类提供的一些重要基础设施方法。\n\
  \n```java\npublic abstract class OandaStreamingService implements HeartBeatStreamingService\
  \ {\n    protected volatile boolean serviceUp = true;\n    private final HeartBeatCallback<DateTime>\
  \ heartBeatCallback;\n    private final String hearbeatSourceId;\n    protected\
  \ Thread streamThread;\n    private final BasicHeader authHeader;\n\n    protected\
  \ abstract String getStreamingUrl();\n\n    protected abstract void startStreaming();\n\
  \n    protected abstract void stopStreaming();\n\n    protected OandaStreamingService(String\
  \ accessToken, HeartBeatCallback<DateTime> heartBeatCallback,\n                \
  \                   String heartbeatSourceId) {\n        this.hearbeatSourceId =\
  \ heartbeatSourceId;\n        this.heartBeatCallback = heartBeatCallback;\n    \
  \    this.authHeader = OandaUtils.createAuthHeader(accessToken);\n    }\n\n    protected\
  \ void handleHeartBeat(JSONObject streamEvent) {\n        Long t = Long.parseLong(((JSONObject)\
  \ streamEvent.get(OandaJsonKeys.heartbeat)).get(OandaJsonKeys.time).toString());\n\
  \        heartBeatCallback.onHeartBeat(new HeartBeatPayLoad<DateTime>(new DateTime(TradingUtils.toMillisFromNanos(t)),\
  \ hearbeatSourceId));\n    }\n\n    protected BufferedReader setUpStreamIfPossible(CloseableHttpClient\
  \ httpClient) throws Exception {\n        HttpUriRequest httpGet = new HttpGet(getStreamingUrl());\n\
  \        httpGet.setHeader(authHeader);\n        httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
  \        LOG.info(TradingUtils.executingRequestMsg(httpGet));\n        HttpResponse\
  \ resp = httpClient.execute(httpGet);\n        HttpEntity entity = resp.getEntity();\n\
  \        if (resp.getStatusLine().getStatusCode() == HttpStatus.SC_OK && entity\
  \ != null) {\n            InputStream stream = entity.getContent();\n          \
  \  serviceUp = true;\n            BufferedReader br = new BufferedReader(new InputStreamReader(stream));\n\
  \            return br;\n        } else {\n            String responseString = EntityUtils.toString(entity,\
  \ \"UTF-8\");\n            LOG.warn(responseString);\n            return null;\n\
  \        }\n    }\n\n    protected void handleDisconnect(String line) {\n      \
  \  serviceUp = false;\n        LOG.warn(\n                String.format(\"Disconnect\
  \ message received for stream %s. PayLoad->%s\",\n                        getHeartBeatSourceId(),\
  \ line));\n    }\n\n    protected boolean isStreaming() {\n        return serviceUp;\n\
  \    }\n}\n```\n\n总而言之，基类为其流子类提供以下基础设施（或辅助）服务：\n\n*   使用由子类提供的 `getStreamingUrl()`（实现了这个抽象方法）建立到\
  \ OANDA 的持久流连接。\n*   处理来自 OANDA 的断开连接消息（如果由于某种原因，OANDA 断开了当前流）。\n*   处理心跳负载并调用下游的\
  \ `HeartBeatCallback` 处理器。\n\n回到我们的具体实现，让我们来看一下该类最重要的方法 `startMarketDataStreaming`，它在单独的线程中启动流，并在流建立后解析接收到的事件负载。\n\
  \n```java\nimport static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.ask;\n\
  import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.bid;\nimport\
  \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.disconnect;\nimport\
  \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.heartbeat;\nimport\
  \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.tick;\nimport static\
  \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.time;\n\n@Override\npublic\
  \ void startMarketDataStreaming() {\n    stopMarketDataStreaming();\n    this.streamThread\
  \ = new Thread(new Runnable() {\n\n        @Override\n        public void run()\
  \ {\n            CloseableHttpClient httpClient = getHttpClient();\n           \
  \ try {\n                BufferedReader br = setUpStreamIfPossible(httpClient);\n\
  \                if (br != null) {\n                    String line;\n         \
  \           while ((line = br.readLine()) != null && serviceUp) {\n            \
  \            Object obj = JSONValue.parse(line);\n                        JSONObject\
  \ instrumentTick = (JSONObject) obj;\n                        // 如有必要则解包\n     \
  \                   if (instrumentTick.containsKey(tick)) {\n                  \
  \          instrumentTick = (JSONObject) instrumentTick.get(tick);\n           \
  \             }\n```\n\n\n\n```java\n28       if (instrumentTick.containsKey(OandaJsonKeys.instrument))\
  \ {\n29        final String instrument = instrumentTick.get(OandaJsonKeys.instrument).toString();\n\
  30        final String timeAsString = instrumentTick.get(time).toString();\n31 \
  \       final long eventTime = Long.parseLong(timeAsString);\n32        final double\
  \ bidPrice = ((Number) instrumentTick.get(bid)).doubleValue();\n33        final\
  \ double askPrice = ((Number) instrumentTick.get(ask)).doubleValue();\n34      \
  \  marketEventCallback.onMarketEvent(\n35         new TradeableInstrument < String\
  \ > (instrument), bidPrice, askPrice,\n36         new DateTime(TradingUtils.toMillisFromNanos(eventTime)));\n\
  37       } else if (instrumentTick.containsKey(heartbeat)) {\n38        handleHeartBeat(instrumentTick);\n\
  39       } else if (instrumentTick.containsKey(disconnect)) {\n40        handleDisconnect(line);\n\
  41       }\n42      }\n43      br.close();\n44     }\n45    } catch (Exception e)\
  \ {\n46     LOG.error(e);\n47    } finally {\n48     serviceUp = false;\n49    \
  \ TradingUtils.closeSilently(httpClient);\n50    }\n52   }\n53  }, \"OandMarketDataStreamingThread\"\
  );\n54  this.streamThread.start();\n56 }\n58 @Override\n59 public void stopMarketDataStreaming()\
  \ {\n60  this.serviceUp = false;\n61  if (streamThread != null && streamThread.isAlive())\
  \ {\n62   streamThread.interrupt();\n63  }\n64 }\n```\n\n`startMarketDataStreaming()`\
  \ 方法首先调用 `stopMarketDataStreaming()`，目的是确保停止可能正在处理事件的现有线程，并启动一个新线程。这么做的原因在于，我们可能会遇到连接问题，有时需要重启数据流。假设在此之后没有现有线程消费市场数据事件，我们就可以创建一个新线程来开始消费事件。观察到\
  \ `run()` 方法仅在条件 `line = br.readLine()) != null && serviceUp` 为 `false` 时退出。`serviceUp`\
  \ 的值在调用 `stopMarketDataStreaming()` 方法时被设为 `false`。如果为流式传输设置的 `BufferedReader` 停止传输事件并返回\
  \ `null`，这也会导致 `while` 循环终止，从而使流线程终止。假设数据流正在为所需交易品种传输市场数据事件，我们应该会以非常高的频率看到类似下面这样的\
  \ JSON 响应。\n\n```json\n1 {\"tick\":{\"instrument\":\"EUR_USD\",\"time\":\"1401919213548144\"\
  ,\"bid\":1.08479,\"ask\":1.08498}}\n2 {\"tick\":{\"instrument\":\"GBP_AUD\",\"time\"\
  :\"1401919213548822\",\"bid\":2.07979,\"ask\":1.08998}}\n3 {\"heartbeat\":{\"time\"\
  :\"1401919213548226\"}}\n4 {\"tick\":{\"instrument\":\"EUR_USD\",\"time\":\"1401919217201682\"\
  ,\"bid\":1.08484,\"ask\":1.08502}}\n```\n\n基本上，如果配置的交易品种数量很大（例如 > 10），那么每秒钟可能会收到多个报价，尤其是在伦敦时段。\n\
  \n查看解析代码，我们注意到代码处理三种类型的负载，分别具有以下键：\n\n- `tick`\n- `heartbeat`\n- `disconnect`\n\n\
  一个 `disconnect` 负载看起来像这样：\n\n```json\n1 {\"disconnect\":{\"code\":60,\"message\"\
  :\"Access Token connection limit exceeded: This connection will now be disconnected\"\
  ,\"moreInfo\":\"http:\\/\\/developer.oanda.com\\/docs\\/v1\\/troubleshooting\"}}\n\
  ```\n\n对于 `tick` 负载，我们将 JSON 负载解析为 `bidPrice`、`askPrice`、`instrument` 和 `eventTime`，然后委托给\
  \ `marketEventCallback.onMarketEvent()` 方法，该方法可以同步或异步处理报价。无论哪种情况，这个调用都必须非常快速，否则事件将开始排队，我们可能会在系统中引入不必要的延迟，这可能会使消费这些事件的策略偏离轨道，因为它无法反映最新的价格。\n\
  \n`heartbeat` 和 `disconnect` 负载由父类处理，如前所述。\n\n```java\n1 protected void handleHeartBeat(JSONObject\
  \ streamEvent) {\n2  Long t = Long.parseLong(((JSONObject) streamEvent.get(heartbeat)).get(time)\
  \ toString());\n3  heartBeatCallback.onHeartBeat(new HeartBeatPayLoad < DateTime\
  \ > (new DateTime(TradingUtils.toMillisFromNanos(t)), heartBeatSourceId));\n5 }\n\
  \n7 protected void handleDisconnect(String line) {\n8  serviceUp = false;\n9  LOG.warn(\n\
  10   String.format(\"Disconnect message received for stream %s. PayLoad->%s\",\n\
  11    getHeartBeatSourceId(), line));\n12 }\n```\n\n至此，我们结束了对上游事件处理和解析的讨论。正如我们将在后续章节中发现的那样，心跳对于保持数据流活动至关重要。我们必须重视这些心跳，并在它们停止时迅速采取行动（以重新启动这些数据流的形式），以免我们的策略做出错误决策。在下一节中，我们将讨论如何通过\
  \ `marketEventCallback.onMarketEvent()` 在下游消费事件。\n\n### 4.3 下游市场数据事件分发：`MarketEventCallback`\n\
  \n为了理解市场数据事件在下游究竟发生了什么，我们需要研究 `MarketEventCallback` 接口的一个示例实现。\n\n```java\n1 public\
  \ class MarketEventHandlerImpl < T > implements MarketEventCallback < T > {\n3 \
  \ private final EventBus eventBus;\n5  public MarketEventHandlerImpl(EventBus eventBus)\
  \ {\n6   this.eventBus = eventBus;\n7  }\n9  @Override\n10  public void onMarketEvent(TradeableInstrument\
  \ < T > instrument, double bid,\n11   double ask, DateTime eventDate) {\n12   MarketDataPayLoad\
  \ < T > payload = new MarketDataPayLoad < T > (instrument, bid, ask, eventDate);\n\
  13   eventBus.post(payload);\n14  }\n16 }\n```\n\n`MarketEventHandlerImpl` 的实现再简单不过了。基本上，它将事件分发的职责委托给了\
  \ `Google EventBus`，根据其配置方式（同步或异步），它会将此事件分发到任何具有 `@Subscribe` 注解且输入参数为 `MarketDataPayLoad<T>`\
  \ 的 `void` 方法。例如，一个方法签名看起来像这样：\n\n```java\n1 @Subscribe\n2 @AllowConcurrentEvents\n\
  3 public void handleMarketDataEvent(MarketDataPayLoad<T> marketDataPayLoad) {\n\
  4 ....\n5 ....\n6 }\n```\n\n就是这样！！我们可以创建任意数量的此类订阅者，并通过事件总线接收带有 `MarketDataPayLoad`\
  \ 负载的回调。我们将在后面的章节中看到，如何插入订阅者，例如基于交易策略的组件，这些组件是市场数据的主要消费者。\n\n\n\n### 4.4 动手实践\n\n\
