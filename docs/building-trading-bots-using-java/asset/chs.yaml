  \   return type;\n77  }\n\n79  public double getTakeProfit() {\n80   return takeProfit;\n\
  81  }\n\n83  @Override\n84  public String toString() {\n85   return \"Order [instrument=\"\
  \ + instrument + \", units=\" + units + \", side=\" + side +\n86    \", type=\"\
