  \ `AccountInfoService` 之后\n\n如前所述，我们关键的设计目标之一是将供应商封装在具有实际意义的服务之后，这样如果必要，我们就能切换供应商的实现，从\
  \ OANDA 更换为例如 LMAX，而无需更改任何编译后的代码行。只需修改 Spring 配置，就有望帮助我们平稳过渡。`AccountInfoService`\
  \ 除了为所有 `AccountDataProvider` 方法提供一个外观模式接口，还额外提供了 3 个有用的方法：\n\n```\n1 public Collection<K>\
  \ findAccountsToTrade();\n\n3 public double calculateMarginForTrade(K accountId,\
  \ TradeableInstrument<N>\n4         instrument, int units);\n\n6 public double calculateMarginForTrade(Account<K>\
  \ accountInfo,\n7       TradeableInstrument<N> instrument, int units);\n```\n\n\
  在讨论这些方法之前，让我们快速浏览一下定义该服务依赖关系的构造函数。\n\n```\n 1 /**\n 2  *\n 3  * @param <K>\n 4 \
  \ *            账户 ID 的类型\n 5  * @param <N>\n 6  *            TradeableInstrument\
  \ 类中 instrumentId 的类型\n 7  * @see TradeableInstrument\n 8  */\n 9 public class AccountInfoService<K,\
  \ N> {\n\n11 \tprivate final AccountDataProvider<K> accountDataProvider;\n12 \t\
  private final BaseTradingConfig baseTradingConfig;\n13 \tprivate final CurrentPriceInfoProvider<N>\
  \ currentPriceInfoProvider;\n14 \tprivate final ProviderHelper providerHelper;\n\
  15 \tprivate Comparator<Account<K>> accountComparator = new MarginAvailableComparator<K>();\n\
  \n17 \tpublic AccountInfoService(AccountDataProvider<K> accountDataProvider,\n18\
