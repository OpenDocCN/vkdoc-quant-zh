  ## 7. 事件流：交易/订单/账户事件\n\n当平台上的订单/交易/账户或任何其他实体的状态发生变化时，交易平台便会生成事件。以下是一些可能触发事件的示例：\n\
  \n*   LIMIT 订单成交\n*   交易止损退出\n*   账户保证金强平\n\n我们将在本章后续部分讨论许多此类状态变更事件及其处理方式，但将重点关注仅影响交易/订单和账户的事件。\n\
  \n正如本书引言中所述，我们需要创建一个无限事件循环，以便接收平台上发生的状态变更。平台通过事件流（类似于市场数据流）推送这些事件，我们需要采用相同的范式来处理这些事件。然而，有一个显著的区别。市场数据流（不包括心跳）仅包含符合标准负载的\
  \ Tick 事件。但对于事件流，根据哪个实体发生了何种状态变更，我们可能会收到不同的负载。例如，当 OANDA 平台上的限价订单成交时^(1)，通常会像下面这样将响应发送到事件流中。\n\
  \n```json\n 1 {\n 2   \"transaction\": {\n 3     \"id\": 10002,\n 4     \"accountId\"\
  : 123456,\n 5     \"time\": \"1443968041000000\",\n 6     \"type\": \"ORDER_FILLED\"\
  ,\n 7     \"instrument\": \"EUR_USD\",\n 8     \"units\": 10,\n 9     \"side\":\
  \ \"sell\",\n10     \"price\": 1,\n11     \"pl\": 1.234,\n12     \"interest\": 0.034,\n\
  13     \"accountBalance\": 10000,\n14     \"orderId\": 0,\n15     \"tradeReduced\"\
  : {\n16       \"id\": 54321,\n17       \"units\": 10,\n18       \"pl\": 1.234,\n\
  19       \"interest\": 0.034\n20     }\n21   }\n22 }\n```\n\n另一方面，当一笔交易被止损退出时，我们可能会看到以下响应：\n\
  \n```json\n 1 {\n 2   \"transaction\": {\n 3     \"id\": 10004,\n 4     \"accountId\"\
  : 234567,\n 5     \"time\": \"1443968081000000\",\n 6     \"type\": \"STOP_LOSS_FILLED\"\
  ,\n 7     \"tradeId\": 1782812741,\n 8     \"instrument\": \"USD_SGD\",\n 9    \
  \ \"units\": 3000,\n10     \"side\": \"sell\",\n11     \"price\": 1.39101,\n12 \
  \    \"pl\": 3.3039,\n13     \"interest\": -0.0123,\n14     \"accountBalance\":\
  \ 5915.8745\n15   }\n16 }\n```\n\n面对这些多样化的响应，我们需要为感兴趣的每种事件类型创建事件处理器。这正是我们利用 `EventBus`\
  \ 多态特性的时候——它会尝试将消息投递给精确匹配的类型，找不到时再向其超类型进行投递。\n\n让我们总结一下我们可能看到被回调的不同重要事件。这绝非完整列表，但应该是各个平台上常见的事件，我们将在后续章节中详细讨论：\n\
  \n1.  订单\n    *   创建新的市价单\n    *   创建新的限价单\n    *   订单更新\n    *   订单取消\n    *  \
  \ 订单成交\n\n2.  交易\n    *   止盈触发\n    *   止损触发\n    *   交易更新\n    *   交易关闭\n\n3. \
  \ 账户\n    *   保证金强平\n    *   融资（利息支付或收取）\n\n### 7.1 流式事件接口\n\n我们的第一步是定义一个接口，用于建立与平台的事件循环。这在概念上与市场数据流式接口完全相同。建立事件循环后，所有事件将通过我们即将讨论的\
  \ `EventCallback` 委托给适当的事件处理器。首先，让我们快速查看一下这个接口：\n\n```java\n 1 /**\n 2  * 提供交易/订单/账户相关事件流式传输的服务。\n\
  \ 3  * 通常，实现会创建到平台的专用连接或注册回调监听器来接收事件。\n 4  * 建议该服务将事件处理委托给特定的处理器，\n 5  * 这些处理器可以解析并理解收到的各种不同事件。\n\
  \ 6  *\n 7  *\n 8  */\n 9 public interface {\n\n13  /**\n14   * 启动流式服务，该服务理想情况下会创建到平台的专用连接或回调监听器。\n\
  15   * 理想情况下，不应为请求相同事件类型而创建多个连接。\n16   */\n17  void startEventsStreaming();\n\n\
  20  /**\n21   * 停止事件流式服务，并以合适的方式释放任何资源/连接，\n22   * 确保不会产生资源泄露。\n23   */\n24  void\
  \ stopEventsStreaming();\n25 }\n```\n\n必须配合使用以分发事件的 `EventCallback` 定义如下：\n\n```java\n\
  1 public interface EventCallback<T> {\n\n3  void onEvent(EventPayLoad<T> eventPayLoad);\n\
  4 }\n```\n\n上述两个接口与市场数据接口具有相似的设计目标。真正的区别在于下游对这些不同负载的分发方式，我们将在 `EventBus` 登场时发现这一点。但在此之前，让我们快速看一下\
  \ `EventsStreamingService` 的 OANDA 实现。\n\n\n### 7.2 `EventsStreamingService` 的具体实现\n\
  \n让我们先看看该类的定义和构造函数，从而开始讨论这个实现。\n\n```java\npublic class OandaEventsStreamingService\
  \ extends OandaStreamingService implements EventsStreamingService {\n\n    private\
  \ static final Logger LOG = Logger.getLogger(OandaEventsStreamingService.class);\n\
  \    private final String url;\n    private final AccountDataProvider<Long> accountDataProvider;\n\
  \    private final EventCallback<JSONObject> eventCallback;\n\n    public OandaEventsStreamingService(final\
  \ String url, final String accessToken,\n                                      \
  \ AccountDataProvider<Long> accountDataProvider,\n                             \
  \          EventCallback<JSONObject> eventCallback,\n                          \
  \             HeartBeatCallback<DateTime> heartBeatCallback,\n                 \
  \                      String heartBeatSourceId) {\n        super(accessToken, heartBeatCallback,\
  \ heartBeatSourceId);\n        this.url = url;\n        this.accountDataProvider\
  \ = accountDataProvider;\n        this.eventCallback = eventCallback;\n    }\n}\n\
  ```\n\n与 `OandaMarketDataStreamingService` 类似，此类继承自 `OandaStreamingService`，后者为所有\
  \ OANDA 流式传输服务提供了基础设施方法，如前所述。除了常规传入的参数 `url` 和 `accessToken` 之外，`super` 类还需要 `HeartBeatCallBack`\
  \ 和 `heartBeatSourceId` 参数。我们还需要额外的 `AccountDataProvider` 服务，它提供我们希望接收事件回调的账户列表。这些账户必须作为参数传入流式传输\
  \ URL，如下所示。\n\n```java\n@Override\nprotected String getStreamingUrl() {\n    Collection<Account<Long>>\
  \ accounts = accountDataProvider.getLatestAccountInfo();\n    return this.url +\
  \ OandaConstants.EVENTS_RESOURCE + \"?accountIds=\" + accountsAsCsvString(accounts);\n\
  }\n\nprivate String accountsAsCsvString(Collection<Account<Long>> accounts) {\n\
  \    StringBuilder accountsAsCsv = new StringBuilder();\n    boolean firstTime =\
  \ true;\n    for (Account<Long> account : accounts) {\n        if (firstTime) {\n\
  \            firstTime = false;\n        } else {\n            accountsAsCsv.append(TradingConstants.ENCODED_COMMA);\n\
  \        }\n        accountsAsCsv.append(account.getAccountId());\n    }\n    return\
  \ accountsAsCsv.toString();\n}\n```\n\n`accountDataProvider.getLatestAccountInfo()`\
  \ 返回属于用户的全部账户集合。然后将该集合传递给 `accountsAsCsvString` 方法，该方法返回一个以 CSV（URL 编码）格式分隔的账户列表。假设用户拥有账户\
  \ `123456` 和 `2345678`，则 `getStreamingUrl` 函数应计算出：\n\n```java\n// 给定\npublic static\
  \ final String EVENTS_RESOURCE = \"/v1/events\";\n// 计算出的 URL 如下所示\nhttps://stream-fxtrade.oanda.com/v1/events?accountIds=123456%2C2345678\n\
  ```\n\n现在流式传输 URL 已计算出来，我们准备在单独的线程中以无限循环方式开始流式传输，使用与市场数据事件流相同的范式。\n\n```java\n@Override\n\
  public void startEventsStreaming() {\n    stopEventsStreaming();\n    streamThread\
  \ = new Thread(new Runnable() {\n\n        @Override\n        public void run()\
  \ {\n            CloseableHttpClient httpClient = getHttpClient();\n           \
  \ try {\n                BufferedReader br = setUpStreamIfPossible(httpClient);\n\
  \                if (br != null) {\n                    String line;\n         \
  \           while ((line = br.readLine()) != null && serviceUp) {\n            \
  \            Object obj = JSONValue.parse(line);\n                        JSONObject\
  \ jsonPayLoad = (JSONObject) obj;\n                        if (jsonPayLoad.containsKey(heartbeat))\
  \ {\n                            handleHeartBeat(jsonPayLoad);\n               \
  \         } else if (jsonPayLoad.containsKey(transaction)) {\n                 \
  \           JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
  \                            String transactionType = transactionObject.get(type).toString();\n\
  \                            /* 在此处进行转换，以便事件总线可以发布到适当的处理程序，\n                  \
  \           * 尽管这并不属于这里 */\n                            EventPayLoad<JSONObject>\
  \ payLoad = OandaUtils.toOandaEventPayLoad(transactionType, transactionObject);\n\
  \                            if (payLoad != null) {\n                          \
  \      eventCallback.onEvent(payLoad);\n                            }\n        \
  \                } else if (jsonPayLoad.containsKey(OandaJsonKeys.disconnect)) {\n\
  \                            handleDisconnect(line);\n                        }\n\
  \                    }\n                    br.close();\n                }\n   \
  \         } catch (Exception e) {\n                LOG.error(e);\n            }\
  \ finally {\n                serviceUp = false;\n                TradingUtils.closeSilently(httpClient);\n\
  \            }\n        }\n    }, \"OandEventStreamingThread\");\n    streamThread.start();\n\
  }\n```\n\n这段代码看起来与市场数据代码非常相似，只是有些行有所不同。\n\n```java\nif (jsonPayLoad.containsKey(transaction))\
  \ {\n    JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
  \    String transactionType = transactionObject.get(type).toString();\n    /* 在此处进行转换，以便事件总线可以发布到适当的处理程序，\n\
  \     * 尽管这并不属于这里 */\n    EventPayLoad<JSONObject> payLoad = OandaUtils.toOandaEventPayLoad(transactionType,\
  \ transactionObject);\n    if (payLoad != null) {\n        eventCallback.onEvent(payLoad);\n\
  \    }\n}\n```\n\n这段代码似乎是大多数魔法的发生之处。所有事件 JSON 负载都包含 `transaction` 键。因此，如果我们的负载包含此键，我们就知道这是一个需要处理的平台事件。这里我们引入了由\
  \ `EventBus` 实现的细粒度事件处理概念。请记住，根据我们对 `EventBus` 的介绍，开发者可以自行决定需要多细粒度或多粗粒度的订阅者或处理程序。我们希望通过尽可能细粒度地利用此功能来发挥其优势。因此，我们创建了派生自\
  \ `EventPayLoad` 类的负载，然后创建了具有处理 `EventPayLoad` 特定子类的方法的处理程序。让我们首先定义所有事件的这个父类。\n\n\
  ```java\n/**\n * 平台事件需要实现的接口。该接口的实现者\n * 将是已经实现了 method name() 的枚举。\n * 它存在的意义是为所有平台事件提供一个基础实现。\n\
  \ */\npublic interface Event {\n    String name();\n}\n```\n\n```java\npublic class\
  \ EventPayLoad<T> {\n\n    private final Event event;\n    private final T payLoad;\n\
  \n    public EventPayLoad(Event event, T payLoad) {\n        this.event = event;\n\
  \        this.payLoad = payLoad;\n    }\n\n    public Event getEvent() {\n     \
  \   return this.event;\n    }\n\n    public T getPayLoad() {\n        return this.payLoad;\n\
  \    }\n}\n```\n\n所有事件负载的基类规定，我们必须定义一个构造函数，该函数接受一个 `Event` 类型的枚举和一个 `T` 类型的负载。\n\
  \n从我们的讨论中可以明显看出，我们需要为预期的每种负载类型（即 Account、Trade 和 Order）提供子类实现。\n\n**账户**\n\n```java\n\
  public enum AccountEvents implements Event {\n    MARGIN_CALL_ENTER,\n    MARGIN_CALL_EXIT,\n\
  \    MARGIN_CLOSEOUT,\n    SET_MARGIN_RATE,\n    TRANSFER_FUNDS,\n    DAILY_INTEREST,\n\
  \    FEE;\n}\n```\n\n\n```java\npublic class AccountEventPayLoad extends EventPayLoad<JSONObject>\
  \ {\n\n    public AccountEventPayLoad(AccountEvents event, JSONObject payLoad) {\n\
  \        super(event, payLoad);\n    }\n}\n```\n\n- 交易（Trade）\n\n```java\npublic\
  \ enum TradeEvents implements Event {\n    TRADE_UPDATE,\n    TRADE_CLOSE,\n   \
  \ MIGRATE_TRADE_OPEN,\n    MIGRATE_TRADE_CLOSE,\n    STOP_LOSS_FILLED,\n    TAKE_PROFIT_FILLED,\n\
  \    TRAILING_STOP_FILLED;\n}\n```\n\n```java\npublic class TradeEventPayLoad extends\
  \ EventPayLoad<JSONObject> {\n\n    public TradeEventPayLoad(TradeEvents event,\
  \ JSONObject payLoad) {\n        super(event, payLoad);\n    }\n}\n```\n\n- 订单（Order）\n\
  \n```java\npublic enum OrderEvents implements Event {\n    MARKET_ORDER_CREATE,\n\
  \    STOP_ORDER_CREATE,\n    LIMIT_ORDER_CREATE,\n    MARKET_IF_TOUCHED_ORDER_CREATE,\n\
  \    ORDER_UPDATE,\n    ORDER_CANCEL,\n    ORDER_FILLED;\n}\n```\n\n```java\npublic\
  \ class OrderEventPayLoad extends EventPayLoad<JSONObject> {\n\n    private final\
  \ OrderEvents orderEvent;\n\n    public OrderEventPayLoad(OrderEvents event, JSONObject\
  \ payLoad) {\n        super(event, payLoad);\n        this.orderEvent = event;\n\
  \    }\n\n    @Override\n    public OrderEvents getEvent() {\n        return this.orderEvent;\n\
  \    }\n}\n```\n\n接下来，我们需要将 JSON 负载转换为`EventPayLoad`实例，这一任务由`OandaUtils.toOandaEventPayLoad()`完成。该方法需要一个*类型*参数，该参数通过事件\
  \ JSON 负载传递，用于确定该事件关联哪个业务实体，即*交易*、*订单*或*账户*。实际上，*类型*就是我们三个枚举中某个事件的名称。\n\n```java\n\
  public static EventPayLoad<JSONObject> toOandaEventPayLoad(String transactionType,\
  \ JSONObject payLoad) {\n    Preconditions.checkNotNull(transactionType);\n    Event\
  \ evt = findAppropriateType(AccountEvents.values(), transactionType);\n    if (evt\
  \ == null) {\n        evt = findAppropriateType(OrderEvents.values(), transactionType);\n\
  \        if (evt == null) {\n            evt = findAppropriateType(TradeEvents.values(),\
  \ transactionType);\n            if (evt == null) {\n                return null;\n\
  \            } else {\n                return new TradeEventPayLoad((TradeEvents)\
  \ evt, payLoad);\n            }\n        } else {\n            return new OrderEventPayLoad((OrderEvents)\
  \ evt, payLoad);\n        }\n    } else {\n        return new AccountEventPayLoad((AccountEvents)\
  \ evt, payLoad);\n    }\n}\n\nprivate static final Event findAppropriateType(Event[]\
  \ events, String transactionType) {\n    for (Event evt: events) {\n        if (evt.name().equals(transactionType))\
  \ {\n            return evt;\n        }\n    }\n    return null;\n}\n```\n\n这个工具方法会暴力遍历我们现有的全部三种事件类型，一旦找到匹配项就立即返回结果。如果找不到匹配（当平台引入新事件时可能出现这种情况），则返回`null`。如果我们确实获得了一个非空的`EventPayLoad`实例，就可以将其分派给某个`EventCallback`实例，该实例必然通过\
  \ EventBus 将事件分派给感兴趣的订阅者。\n\n```java\npublic class EventCallbackImpl<T> implements\
  \ EventCallback<T> {\n\n    private final EventBus eventBus;\n\n    public EventCallbackImpl(final\
  \ EventBus eventBus) {\n        this.eventBus = eventBus;\n    }\n\n    @Override\n\
  \    public void onEvent(EventPayLoad<T> eventPayLoad) {\n        this.eventBus.post(eventPayLoad);\n\
  \    }\n}\n```\n\n当`onEvent`方法被调用时，它已经持有了`EventPayLoad`的合适子类型实例，随时可以分派。\n\n由于我们希望利用\
  \ EventBus 对`EventPayLoad`子类型进行细粒度分派的能力，我们需要创建能够多态处理这些具体负载的负载处理器。为此，我们首先需要定义一个`EventHandler`接口，其中包含一个专门执行此操作的方法。\n\
  \n```java\npublic interface EventHandler<K, T extends EventPayLoad<K>> {\n\n   \
  \ void handleEvent(T payLoad);\n}\n```\n\n在上述定义中，我们规定`handleEvent`方法将处理类型为`EventPayLoad`子类的事件。\n\
  \n对于与*交易*业务实体相关的事件集，其`TradeEventHandler`的实现如下所示：\n\n```java\npublic class TradeEventHandler\
  \ implements EventHandler<JSONObject, TradeEventPayLoad> {\n\n    private final\
  \ Set<TradeEvents> tradeEventsSupported =\n        Sets.newHashSet(TradeEvents.STOP_LOSS_FILLED,\n\
  \                        TradeEvents.TRADE_CLOSE, TradeEvents.TAKE_PROFIT_FILLED);\n\
  \    private final TradeInfoService<Long, String, Long> tradeInfoService;\n\n  \
  \  public TradeEventHandler(TradeInfoService<Long, String, Long> tradeInfoService)\
  \ {\n        this.tradeInfoService = tradeInfoService;\n    }\n\n    @Override\n\
  \    @Subscribe\n    @AllowConcurrentEvents\n    public void handleEvent(TradeEventPayLoad\
  \ payLoad) {\n        Preconditions.checkNotNull(payLoad);\n        if (!tradeEventsSupported.contains(payLoad.getEvent()))\
  \ {\n            return;\n        }\n        JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
  \        long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n   \
  \     tradeInfoService.refreshTradesForAccount(accountId);\n    }\n}\n```\n\n根据其定义，`TradeEventHandler`负责处理`TradeEventPayLoad`负载。关于这个简单处理器，有几点值得注意。首先，它通过`tradeEventsSupported`集合规定了它希望消费的全部交易事件中的哪些子集。因此，它的首要操作之一就是执行检查：\n\
  \n```java\nif (!tradeEventsSupported.contains(payLoad.getEvent())) {\n    return;\n\
  }\n```\n\n如果事件类型不在`[STOP_LOSS_FILLED, TRADE_CLOSE, TAKE_PROFIT_FILLED]`中，则立即返回。如果在其中，则执行一个非常有趣的操作：刷新*交易缓存*。请记住，根据我们在前一章的讨论，`TradeInfoService`内部维护了一个交易缓存，以避免频繁调用获取交易信息（代价很高）。现在，这里正是该缓存被刷新的位置。我们只刷新指定账户的交易缓存，避免刷新全部缓存，因为这里并不需要。\n\
  \n订单的等效处理器是`OrderFilledEventHandler`，其定义如下：\n\n```java\npublic class OrderFilledEventHandler\
  \ implements EventHandler<JSONObject, OrderEventPayLoad>,\n    EmailContentGenerator<JSONObject>\
  \ {\n    private final Set<OrderEvents> orderEventsSupported =\n        Sets.newHashSet(OrderEvents.ORDER_FILLED);\n\
  \    private final TradeInfoService<Long, String, Long> tradeInfoService;\n\n  \
  \  public OrderFilledEventHandler(\n        TradeInfoService<Long, String, Long>\
  \ tradeInfoService) {\n        this.tradeInfoService = tradeInfoService;\n    }\n\
  \n    @Override\n    @Subscribe\n    @AllowConcurrentEvents\n    public void handleEvent(OrderEventPayLoad\
  \ payLoad) {\n        Preconditions.checkNotNull(payLoad);\n        if (!orderEventsSupported.contains(payLoad.getEvent()))\
  \ {\n            return;\n        }\n        JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
  \n        long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n  \
  \      tradeInfoService.refreshTradesForAccount(accountId);\n    }\n}\n```\n\n正如该处理器的名称所示，我们只对`ORDER_FILLED`事件感兴趣。当订单成交时，会相应地创建一笔交易。因此，我们通过调用`tradeInfoService.refreshTradesForAccount`再次刷新交易缓存。\n\
  \n回到 EventBus 的分发机制，由于我们创建了类型为`TradeEventPayLoad`、`OrderEventPayLoad`和`AccountEventPayLoad`的负载，并且拥有使用`@Subscribe`注解且与这些类型匹配的方法，EventBus\
  \ 会将事件分派到对应的`handleEvent`方法，而**不会**分派给所有三个方法。\n\n至此，我们关于交易、订单和账户相关事件的讨论就结束了。当这些事件发生时，我们还可以选择执行其他操作，例如发送电子邮件或短信通知。作为开发者，`handleEvent`方法中要编写什么内容完全取决于我们。\n\
  \n\n### 7.3 动手试试\n\n在本节中，我们将创建一个演示程序，用于输出平台中的事件。要查看实际效果并看到输出的`LIMIT_ORDER_CREATE`事件，请运行`OrderExecutionServiceDemo`程序，该程序将创建一个新订单，进而生成一个平台事件。演示程序将处理并输出该事件。\n\
