  trans: "\n### 5.4 `HistoricMarketDataProvider` 的具体实现\n\n我们首先快速查看请求 K 线数据时返回的示例 JSON，以此开始对\
    \ OANDA 实现的讨论。下面的示例粒度为**每日**。\n\n代码清单 5.4：K 线的示例 JSON\n\n```\n 1 {\n 2   \"instrument\"\
    : \"GBP_USD\",\n 3   \"granularity\": \"D\",\n 4   \"candles\": [\n 5     {\n\
    \ 6       \"time\": \"1442098800000000\",\n 7       \"openMid\": 1.54301,\n 8\
    \       \"highMid\": 1.544695,\n 9       \"lowMid\": 1.54284,\n10       \"closeMid\"\
    : 1.544295,\n11       \"volume\": 868,\n12       \"complete\": true\n13     },\n\
    14     {\n15       \"time\": \"1442185200000000\",\n16       \"openMid\": 1.544245,\n\
    17       \"highMid\": 1.54594,\n18       \"lowMid\": 1.54376,\n19       \"closeMid\"\
    : 1.54406,\n20       \"volume\": 3765,\n21       \"complete\": false\n22     }\n\
    23   ]\n24 }\n```\n\n我们需要在 provider 类中静态导入的 JSON 键如下：\n\n```\n1 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.candles;\n2 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.closeMid;\n3 import static\
