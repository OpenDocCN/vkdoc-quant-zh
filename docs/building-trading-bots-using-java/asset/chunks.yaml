- fmt: "# 3. Tradeable Instruments\n\nIn this chapter we will focus our attention\
    \ on instruments available to trade on the brokerage platform. The instrument\
    \ entity is pretty much the core of a trading platform, as everything revolves\
    \ around it. From obtaining prices, to placing orders/trades, the instrument is\
