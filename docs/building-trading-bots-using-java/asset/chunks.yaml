  trans: "\n### 1.6.1 开设 OANDA 模拟账户\n\n在开始使用 API 之前，你必须先注册一个免费的模拟账户。进入页面后，点击“开设账户”按钮，你会看到如下的注册界面：\n\
    \n![Oanda 账户注册界面](img/00002.jpeg \"账户注册界面\") Oanda 账户注册界面\n\n成功注册后，你就可以登录你的模拟账户了。准备登录时，你会看到如下登录界面：\n\
    \n![Oanda 账户登录界面](img/00003.jpeg \"账户登录界面\") Oanda 账户登录界面\n\n登录成功后，你将进入账户主页，界面如下图所示：\n\
    \n![Oanda 账户仪表盘](img/00004.jpeg \"账户仪表盘\") Oanda 账户仪表盘\n\n要开始进行 API 交易，我们首先需要生成一个个人\
    \ API 令牌，该令牌将被 OANDA 平台用于验证请求。你需要点击上图中红色箭头高亮显示的 **管理 API 访问 (Manage API Access)**\
    \ 链接。随后你将进入如下界面：\n\n![Oanda 生成 API 令牌](img/00005.jpeg \"生成 API 令牌\") Oanda 生成\
    \ API 令牌\n\n当你点击 **生成 (Generate)** 时，平台将为你生成一个令牌，该令牌必须包含在你向承载模拟账户的平台发出的每一个请求中。生成的令牌将会显示出来，请务必记下它：\n\
    \n![Oanda 已生成令牌](img/00006.jpeg \"已生成 API 令牌\") Oanda 已生成令牌\n\n现在你可以开始交易了。OANDA\
    \ 提供了一个非常有用的 Web 界面，可以用来测试你的 REST 请求并即时查看响应。你也可以借此了解 REST 资源 URL 的组织方式，以及为完成特定请求应调用哪个资源\
    \ URL。\n\n下图展示的是我们如何发送请求以获取所有可交易金融工具的列表。GET 请求需要传入一个 `accountId`（这是你可以在账户页面上找到的\
    \ ID，对于模拟账户，它默认带有 100,000 个单位的账户货币）。同时还必须提供请求头，其格式为 `Bearer <你的 API 令牌>`：\n\n\
    ![Oanda 开发 API 控制台](img/00007.jpeg \"API 控制台\") Oanda 开发 API 控制台 ![Oanda 开发 API\
    \ 控制台 - 请求头标签页](img/00008.jpeg \"API 控制台\") Oanda 开发 API 控制台 - 请求头标签页\n\n### 1.6.2\
    \ OANDA JSON 键\n\nOANDA JSON 响应使用一组标准键。例如，在响应中表示货币对时，无论是即时报价还是蜡烛图信息的流式响应，都会使用\
    \ `instrument` 键。实时数据流中的即时报价如下所示：\n\n```\n1 {\"tick\":{\"instrument\":\"AUD_CAD\"\
    ,\"time\":\"1401919217201682\",\"bid\":1.01484,\"ask\":1.01502}}\n```\n\n而交易成功修改后的响应则如下所示：\n\
    \n```\n 1 {\n 2   \"id\": 1800805337,\n 3   \"units\": 3000,\n 4   \"side\": \"\
    sell\",\n 5   \"instrument\": \"CHF_JPY\",\n 6   \"time\": \"2015-03-18T06:33:36.000000Z\"\
    ,\n 7   \"price\": 120.521,\n 8   \"takeProfit\": 110,\n 9   \"stopLoss\": 150,\n\
    10   \"trailingStop\": 0,\n11   \"trailingAmount\": 0\n12 }\n```\n\n从以上两个例子中，我们还可以看到用于表示事件日期的键是\
    \ `time`。由于相同的键用于表示特定属性，我们可以为这些键创建 `public static final String` 变量。因此，`OandaJsonKeys`\
    \ 类应运而生。相比于在许多类中使用如下所示的代码行来污染代码：\n\n```\n1 String instrument = (String) instrumentJson.get(\"\
    instrument\");\n```\n\n更好的做法是创建一个常量并使用它。同样的代码片段将变成：\n\n```\n1 String instrument\
    \ = (String) instrumentJson.get(OandaJsonKeys.instrument);\n```\n\n虽然键的数量很多，但我们的交易机器人中使用的大部分键都包含在\
    \ `OandaJsonKeys` 类中：\n\n```\n 1 public class OandaJsonKeys {\n 2 \n 3 \tprivate\
    \ OandaJsonKeys() {\n 4 \t}\n 5 \n 6 \tpublic static final String accounts = \"\
    accounts\";\n 7 \tpublic static final String accountId = \"accountId\";\n 8 \t\
    public static final String accountCurrency = \"accountCurrency\";\n 9 \tpublic\
    \ static final String marginRate = \"marginRate\";\n10 \tpublic static final String\
    \ marginUsed = \"marginUsed\";\n11 \tpublic static final String marginAvail =\
    \ \"marginAvail\";\n12 \tpublic static final String balance = \"balance\";\n13\
    \ \tpublic static final String unrealizedPl = \"unrealizedPl\";\n14 \tpublic static\
    \ final String realizedPl = \"realizedPl\";\n15 \tpublic static final String openTrades\
    \ = \"openTrades\";\n16 \tpublic static final String instruments = \"instruments\"\
    ;\n17 \tpublic static final String instrument = \"instrument\";\n18 \tpublic static\
    \ final String interestRate = \"interestRate\";\n19 \tpublic static final String\
    \ disconnect = \"disconnect\";\n20 \tpublic static final String pip = \"pip\"\
    ;\n21 \tpublic static final String bid = \"bid\";\n22 \tpublic static final String\
    \ ask = \"ask\";\n23 \tpublic static final String heartbeat = \"heartbeat\";\n\
    24 \tpublic static final String candles = \"candles\";\n25 \tpublic static final\
    \ String openMid = \"openMid\";\n26 \tpublic static final String highMid = \"\
    highMid\";\n27 \tpublic static final String lowMid = \"lowMid\";\n28 \tpublic\
    \ static final String closeMid = \"closeMid\";\n29 \tpublic static final String\
    \ time = \"time\";\n30 \tpublic static final String tick = \"tick\";\n31 \tpublic\
    \ static final String prices = \"prices\";\n32 \tpublic static final String trades\
    \ = \"trades\";\n33 \tpublic static final String tradeId = \"tradeId\";\n34 \t\
    public static final String price = \"price\";\n35 \tpublic static final String\
    \ avgPrice = \"avgPrice\";\n36 \tpublic static final String id = \"id\";\n37 \t\
    public static final String stopLoss = \"stopLoss\";\n38 \tpublic static final\
    \ String takeProfit = \"takeProfit\";\n39 \tpublic static final String units =\
    \ \"units\";\n40 \tpublic static final String side = \"side\";\n41 \tpublic static\
    \ final String type = \"type\";\n42 \tpublic static final String orders = \"orders\"\
    ;\n43 \tpublic static final String orderId = \"orderId\";\n44 \tpublic static\
    \ final String positions = \"positions\";\n45 \tpublic static final String expiry\
    \ = \"expiry\";\n46 \tpublic static final String tradeOpened = \"tradeOpened\"\
    ;\n47 \tpublic static final String orderOpened = \"orderOpened\";\n48 \tpublic\
    \ static final String transaction = \"transaction\";\n49 \tpublic static final\
    \ String pl = \"pl\";\n50 \tpublic static final String interest = \"interest\"\
    ;\n51 \tpublic static final String accountBalance = \"accountBalance\";\n52 }\n\
    ```\n\n在我们将在后续章节讨论的所有 OANDA API 实现中，我们将直接使用此类，并通过静态导入常量，而不是对特定 JSON 键的字符串字面量进行硬编码。\n"
- fmt: "### 1.6.3 Constructor Dependencies for OANDA implementations\n\nAll OANDA\
    \ implementations of the core API specifications have constructors which accept:\n\
    \n- `API url`\n- `username`\n- `access token`\n\nAs we know, OANDA has different\
    \ environments where we can run our bot, such as sandpit, practice, and live.\
    \ These environments have different URLs, access tokens, and can have different\
    \ usernames for the same individual. These external configuration properties are\
    \ passed in as constructor parameters for various OANDA implementations. For example:\n\
    \n```java\n1 public OandaAccountDataProviderService(final String url, final String\
    \ userName, final String accessToken) {\n2 \tthis.url = url;\n3 \tthis.userName\
    \ = userName;\n4 \tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    5 }\n```\n\nThe parameters are passed to this implementation in the Spring configuration\
    \ as seen below:\n\n```xml\n1 <bean id=\"accountDataProvider\" class=\"com.precioustech.fxtrading.oanda.restapi.account.OandaAccountDataProviderService\"\
    >\n2 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n3 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.userName}\"/>\n4 \t\t<constructor-arg index=\"2\"\
    \ value=\"${oanda.accessToken}\"/>\n5 </bean>\n```\n\nSince these variables are\
    \ provided in a property file, we can easily change them at runtime, without having\
    \ to do a new build or change code. It would be sufficient to just change the\
    \ property file. We will cover this topic in more detail in later chapters when\
    \ we talk about configuration in detail.\n\n### 1.7 Event Driven Architecture\n\
    \nThe soul of any trading system is its event-driven architecture. The system\
    \ must react to market events, social media events, user events, and maybe a plethora\
    \ of other events coming from external/internal sources. These events could further\
    \ trigger a chain reaction of events, resulting in state changes of various business/domain\
    \ objects in the system. The real technical challenge is to make sure that these\
    \ state transitions happen in a thread-safe way, backed by a transaction wherever\
    \ required.\n\nAt the heart of an event-driven system are one or more event loops.\
    \ These event loops typically run in an infinite `while` loop and wait for an\
    \ event to come from a queue or a live stream. For an OANDA market data tick event,\
    \ we have an event loop as follows:\n\n```java\n 1 this.streamThread = new Thread(new\
    \ Runnable() {\n 3 @Override\n 4 public void run() {\n 5  CloseableHttpClient\
    \ httpClient = getHttpClient();\n 6   try {\n 7    BufferedReader br = setUpStreamIfPossible(httpClient);\n\
    \ 8     if (br != null) {\n 9      String line;\n10       while ((line = br.readLine())\
    \ != null && serviceUp) {\n11        Object obj = JSONValue.parse(line);\n12 \
    \        JSONObject instrumentTick = (JSONObject) obj;\n13         ...\n14   \
    \      ...\n```\n\nIn the code snippet above, we have an infinite `while` loop\
    \ that listens on new ticks being pushed onto the live stream by the OANDA platform.\
    \ When a tick JSON payload is received, it is parsed and further disseminated\
    \ via a queue or an event bus.\n\n![Typical Event Chain](images/00009.jpeg \"\
    Event Chain\") Typical Event Chain\n\nThe diagram depicts a typical chain of events\
    \ that might be triggered by a single event.\n\n1.  Tick event is received from\
    \ the stream.\n2.  Event is parsed and sent to the `EventBus`.\n3.  The strategy\
    \ component has a subscription for this event and gets a callback from the `EventBus`.\n\
    4.  The strategy component decides to generate a trading signal based on the latest\
    \ tick data event and places the signal on an `OrderQueue`.\n5.  The `OrderExecutionService`\
    \ picks up this signal, creates a `new order` payload, and posts it to the platform.\n\
    6.  The platform executes the order and sends an event down the `order event loop`.\n\
    7.  This event can further trigger an update of, say, the `trades cache`.\n\n\
    This is basically the essence of an event-driven architecture. Since we could\
    \ have many components at play at the same time, it is extremely important that\
    \ we decouple components as much as possible so that new publishers and subscribers\
    \ can be added with zero or minimal changes. This architecture lends itself to\
    \ taking advantage of Java multithreaded programming capabilities. However, by\
    \ the same token, it dictates that the developer must exercise great caution when\
    \ performing state changes of business objects present in caches, for example,\
    \ the `trades cache` in our example. We must put adequate synchronization and\
    \ locking in place to make sure that the observed state of a shared object is\
    \ always consistent."
