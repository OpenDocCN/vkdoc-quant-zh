    11  boolean firstTime = true;\n12  for (Account < Long > account: accounts) {\n\
    13   if (firstTime) {\n14    firstTime = false;\n15   } else {\n16    accountsAsCsv.append(TradingConstants.ENCODED_COMMA);\n\
    17   }\n18   accountsAsCsv.append(account.getAccountId());\n19  }\n20  return\
    \ accountsAsCsv.toString();\n21 }\n```\n\nThe `accountDataProvider.getLatestAccountInfo()`\
    \ returns a collection of all accounts that belong to the user. This collection\
    \ is then passed onto the *accountsAsCsvString* which returns a csv (url encoded)\
    \ separated list of accounts. Assuming the user has accounts *123456* and *2345678*,\
    \ the function `getStreamingUrl` should compute\n\n```\n1 //given\n2 public static\
    \ final String EVENTS_RESOURCE = \"/v1/events\";\n3 //the url computed will look\
    \ like\n4 https://stream-fxtrade.oanda.com/v1/events?accountIds=123456%2C2345678\n\
    ```\n\nWith the streaming url now computed, we are now ready to start stream in\
    \ an infinite loop in a separate thread, the same paradigm we used for the market\
    \ data event stream.\n\n```\n 1 @Override\n 2 public void startEventsStreaming()\
    \ {\n 3  stopEventsStreaming();\n 4  streamThread = new Thread(new Runnable()\
    \ {\n\n6   @Override\n 7   public void run() {\n 8    CloseableHttpClient httpClient\
    \ = getHttpClient();\n 9    try {\n10     BufferedReader br = setUpStreamIfPossible(httpClient);\n\
    11     if (br != null) {\n12      String line;\n13      while ((line = br.readLine())\
    \ != null && serviceUp) {\n14       Object obj = JSONValue.parse(line);\n15  \
    \     JSONObject jsonPayLoad = (JSONObject) obj;\n16       if (jsonPayLoad.containsKey(heartbeat))\
    \ {\n17        handleHeartBeat(jsonPayLoad);\n18       } else if (jsonPayLoad.containsKey(transaction))\
    \ {\n19        JSONObject transactionObject = (JSONObject)\n20        jsonPayLoad.get(transaction);\n\
    21        String transactionType = transactionObject.get(type).toString();\n22\
    \        /*convert here so that event bus can post to an appropriate handler,\n\
    23         * event though this does not belong here*/\n24        EventPayLoad\
    \ < JSONObject > payLoad = OandaUtils\n25         .toOandaEventPayLoad(transactionType,\
    \ transactionObject);\n26        if (payLoad != null) {\n27         eventCallback.onEvent(payLoad);\n\
    28        }\n29       } else if (jsonPayLoad.containsKey(OandaJsonKeys.disconnect))\
    \ {\n30        handleDisconnect(line);\n31       }\n32      }\n33      br.close();\n\
    34     }\n\n36    } catch (Exception e) {\n37     LOG.error(e);\n38    } finally\
    \ {\n39     serviceUp = false;\n40     TradingUtils.closeSilently(httpClient);\n\
    41    }\n42   }\n43  }, \"OandEventStreamingThread\");\n44  streamThread.start();\n\
    45 }\n```\n\nThe code looks very similar to the market data one, except for the\
    \ lines, where something different is happening\n\n```\n 1 if (jsonPayLoad.containsKey(transaction))\
    \ {\n 2  JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
    \ 3  String transactionType = transactionObject.get(type).toString();\n 4  /*convert\
    \ here so that event bus can post to an appropriate handler,\n 5   * event though\
    \ this does not belong here*/\n 6  EventPayLoad < JSONObject > payLoad = OandaUtils.toOandaEventPayLoad(transactionType,\n\
    \ 7   transactionObject);\n 8  if (payLoad != null) {\n 9   eventCallback.onEvent(payLoad);\n\
    10  }\n```\n\nThis snippet of code is where most of the magic seems to happen.\
    \ All the json payloads for an event have the key *transaction*. Therefore if\
    \ our payload has this key, we know it’s a platform event which we need to handle.\
    \ Here we bring in the concept of fine grained event handling by the EventBus.\
    \ Remember, from our introduction of the EventBus, it is up to the developer to\
    \ decide how fine or coarse grained, subscribers or handlers one wants. We really\
    \ want to exploit this feature to our advantage by going as fine grained as possible.\
    \ Therefore we create payloads that derive from the *EventPayLoad* class and then\
    \ create handlers with methods that handle specific subclass of *EventPayLoad*.\
    \ Let us first define this parent class of all events.\n\n```\n 1 /**\n 2  * Interface\
    \ to be implemented by platform events. The implementers of this\n 3  * interface\
    \ would be enums which already have the method name() implemented.\n 4  * The\
    \ reason for its existence is to have a base implementation of all platform\n\
    \ 5  * events.\n 6  *\n 7  */\n 8 public interface Event {\n 9  String name();\n\
    10 }\n```\n\n```\n 1 public class EventPayLoad < T > {\n\n3  private final Event\
    \ event;\n 4  private final T payLoad;\n\n6  public EventPayLoad(Event event,\
    \ T payLoad) {\n 7   this.event = event;\n 8   this.payLoad = payLoad;\n 9  }\n\
    \n11  public Event getEvent() {\n12   return this.event;\n13  }\n\n15  public\
    \ T getPayLoad() {\n16   return this.payLoad;\n17  }\n18 }\n```\n\nThis base class\
    \ for all event payloads, stipulates that we must define a constructor that accepts\
    \ the enum of type *Event* and payload *T*.\n\nFrom our discussion, it is evident\
    \ we need a subclass implementation for each of the types of expected payloads,\
    \ i.e., Account, Trade and Order.\n\n*   Account\n\n```\n1 public enum AccountEvents\
    \ implements Event {\n2 \tMARGIN_CALL_ENTER,\n3   MARGIN_CALL_EXIT,\n4   MARGIN_CLOSEOUT,\n\
    5   SET_MARGIN_RATE,\n6   TRANSFER_FUNDS,\n7   DAILY_INTEREST, FEE;\n8 }\n```"
  trans: "\n### 7.2 `EventsStreamingService` 的具体实现\n\n让我们先看看该类的定义和构造函数，从而开始讨论这个实现。\n\
    \n```java\npublic class OandaEventsStreamingService extends OandaStreamingService\
    \ implements EventsStreamingService {\n\n    private static final Logger LOG =\
    \ Logger.getLogger(OandaEventsStreamingService.class);\n    private final String\
    \ url;\n    private final AccountDataProvider<Long> accountDataProvider;\n   \
    \ private final EventCallback<JSONObject> eventCallback;\n\n    public OandaEventsStreamingService(final\
    \ String url, final String accessToken,\n                                    \
    \   AccountDataProvider<Long> accountDataProvider,\n                         \
    \              EventCallback<JSONObject> eventCallback,\n                    \
    \                   HeartBeatCallback<DateTime> heartBeatCallback,\n         \
    \                              String heartBeatSourceId) {\n        super(accessToken,\
    \ heartBeatCallback, heartBeatSourceId);\n        this.url = url;\n        this.accountDataProvider\
    \ = accountDataProvider;\n        this.eventCallback = eventCallback;\n    }\n\
    }\n```\n\n与 `OandaMarketDataStreamingService` 类似，此类继承自 `OandaStreamingService`，后者为所有\
    \ OANDA 流式传输服务提供了基础设施方法，如前所述。除了常规传入的参数 `url` 和 `accessToken` 之外，`super` 类还需要 `HeartBeatCallBack`\
    \ 和 `heartBeatSourceId` 参数。我们还需要额外的 `AccountDataProvider` 服务，它提供我们希望接收事件回调的账户列表。这些账户必须作为参数传入流式传输\
    \ URL，如下所示。\n\n```java\n@Override\nprotected String getStreamingUrl() {\n    Collection<Account<Long>>\
    \ accounts = accountDataProvider.getLatestAccountInfo();\n    return this.url\
    \ + OandaConstants.EVENTS_RESOURCE + \"?accountIds=\" + accountsAsCsvString(accounts);\n\
    }\n\nprivate String accountsAsCsvString(Collection<Account<Long>> accounts) {\n\
    \    StringBuilder accountsAsCsv = new StringBuilder();\n    boolean firstTime\
    \ = true;\n    for (Account<Long> account : accounts) {\n        if (firstTime)\
    \ {\n            firstTime = false;\n        } else {\n            accountsAsCsv.append(TradingConstants.ENCODED_COMMA);\n\
    \        }\n        accountsAsCsv.append(account.getAccountId());\n    }\n   \
    \ return accountsAsCsv.toString();\n}\n```\n\n`accountDataProvider.getLatestAccountInfo()`\
    \ 返回属于用户的全部账户集合。然后将该集合传递给 `accountsAsCsvString` 方法，该方法返回一个以 CSV（URL 编码）格式分隔的账户列表。假设用户拥有账户\
    \ `123456` 和 `2345678`，则 `getStreamingUrl` 函数应计算出：\n\n```java\n// 给定\npublic static\
    \ final String EVENTS_RESOURCE = \"/v1/events\";\n// 计算出的 URL 如下所示\nhttps://stream-fxtrade.oanda.com/v1/events?accountIds=123456%2C2345678\n\
    ```\n\n现在流式传输 URL 已计算出来，我们准备在单独的线程中以无限循环方式开始流式传输，使用与市场数据事件流相同的范式。\n\n```java\n\
    @Override\npublic void startEventsStreaming() {\n    stopEventsStreaming();\n\
    \    streamThread = new Thread(new Runnable() {\n\n        @Override\n       \
    \ public void run() {\n            CloseableHttpClient httpClient = getHttpClient();\n\
    \            try {\n                BufferedReader br = setUpStreamIfPossible(httpClient);\n\
    \                if (br != null) {\n                    String line;\n       \
    \             while ((line = br.readLine()) != null && serviceUp) {\n        \
    \                Object obj = JSONValue.parse(line);\n                       \
    \ JSONObject jsonPayLoad = (JSONObject) obj;\n                        if (jsonPayLoad.containsKey(heartbeat))\
    \ {\n                            handleHeartBeat(jsonPayLoad);\n             \
    \           } else if (jsonPayLoad.containsKey(transaction)) {\n             \
    \               JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
    \                            String transactionType = transactionObject.get(type).toString();\n\
    \                            /* 在此处进行转换，以便事件总线可以发布到适当的处理程序，\n                \
    \             * 尽管这并不属于这里 */\n                            EventPayLoad<JSONObject>\
    \ payLoad = OandaUtils.toOandaEventPayLoad(transactionType, transactionObject);\n\
    \                            if (payLoad != null) {\n                        \
    \        eventCallback.onEvent(payLoad);\n                            }\n    \
    \                    } else if (jsonPayLoad.containsKey(OandaJsonKeys.disconnect))\
    \ {\n                            handleDisconnect(line);\n                   \
    \     }\n                    }\n                    br.close();\n            \
    \    }\n            } catch (Exception e) {\n                LOG.error(e);\n \
    \           } finally {\n                serviceUp = false;\n                TradingUtils.closeSilently(httpClient);\n\
    \            }\n        }\n    }, \"OandEventStreamingThread\");\n    streamThread.start();\n\
    }\n```\n\n这段代码看起来与市场数据代码非常相似，只是有些行有所不同。\n\n```java\nif (jsonPayLoad.containsKey(transaction))\
    \ {\n    JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
    \    String transactionType = transactionObject.get(type).toString();\n    /*\
    \ 在此处进行转换，以便事件总线可以发布到适当的处理程序，\n     * 尽管这并不属于这里 */\n    EventPayLoad<JSONObject>\
    \ payLoad = OandaUtils.toOandaEventPayLoad(transactionType, transactionObject);\n\
    \    if (payLoad != null) {\n        eventCallback.onEvent(payLoad);\n    }\n\
    }\n```\n\n这段代码似乎是大多数魔法的发生之处。所有事件 JSON 负载都包含 `transaction` 键。因此，如果我们的负载包含此键，我们就知道这是一个需要处理的平台事件。这里我们引入了由\
    \ `EventBus` 实现的细粒度事件处理概念。请记住，根据我们对 `EventBus` 的介绍，开发者可以自行决定需要多细粒度或多粗粒度的订阅者或处理程序。我们希望通过尽可能细粒度地利用此功能来发挥其优势。因此，我们创建了派生自\
    \ `EventPayLoad` 类的负载，然后创建了具有处理 `EventPayLoad` 特定子类的方法的处理程序。让我们首先定义所有事件的这个父类。\n\
    \n```java\n/**\n * 平台事件需要实现的接口。该接口的实现者\n * 将是已经实现了 method name() 的枚举。\n * 它存在的意义是为所有平台事件提供一个基础实现。\n\
    \ */\npublic interface Event {\n    String name();\n}\n```\n\n```java\npublic\
    \ class EventPayLoad<T> {\n\n    private final Event event;\n    private final\
    \ T payLoad;\n\n    public EventPayLoad(Event event, T payLoad) {\n        this.event\
    \ = event;\n        this.payLoad = payLoad;\n    }\n\n    public Event getEvent()\
    \ {\n        return this.event;\n    }\n\n    public T getPayLoad() {\n      \
    \  return this.payLoad;\n    }\n}\n```\n\n所有事件负载的基类规定，我们必须定义一个构造函数，该函数接受一个 `Event`\
    \ 类型的枚举和一个 `T` 类型的负载。\n\n从我们的讨论中可以明显看出，我们需要为预期的每种负载类型（即 Account、Trade 和 Order）提供子类实现。\n\
    \n**账户**\n\n```java\npublic enum AccountEvents implements Event {\n    MARGIN_CALL_ENTER,\n\
    \    MARGIN_CALL_EXIT,\n    MARGIN_CLOSEOUT,\n    SET_MARGIN_RATE,\n    TRANSFER_FUNDS,\n\
    \    DAILY_INTEREST,\n    FEE;\n}\n```\n"
- fmt: "```java\npublic class AccountEventPayLoad extends EventPayLoad<JSONObject>\
    \ {\n\n    public AccountEventPayLoad(AccountEvents event, JSONObject payLoad)\
    \ {\n        super(event, payLoad);\n    }\n}\n```\n\n- Trade\n\n```java\npublic\
    \ enum TradeEvents implements Event {\n    TRADE_UPDATE,\n    TRADE_CLOSE,\n \
    \   MIGRATE_TRADE_OPEN,\n    MIGRATE_TRADE_CLOSE,\n    STOP_LOSS_FILLED,\n   \
    \ TAKE_PROFIT_FILLED,\n    TRAILING_STOP_FILLED;\n}\n```\n\n```java\npublic class\
    \ TradeEventPayLoad extends EventPayLoad<JSONObject> {\n\n    public TradeEventPayLoad(TradeEvents\
    \ event, JSONObject payLoad) {\n        super(event, payLoad);\n    }\n}\n```\n\
    \n- Order\n\n```java\npublic enum OrderEvents implements Event {\n    MARKET_ORDER_CREATE,\n\
    \    STOP_ORDER_CREATE,\n    LIMIT_ORDER_CREATE,\n    MARKET_IF_TOUCHED_ORDER_CREATE,\n\
    \    ORDER_UPDATE,\n    ORDER_CANCEL,\n    ORDER_FILLED;\n}\n```\n\n```java\n\
    public class OrderEventPayLoad extends EventPayLoad<JSONObject> {\n\n    private\
    \ final OrderEvents orderEvent;\n\n    public OrderEventPayLoad(OrderEvents event,\
    \ JSONObject payLoad) {\n        super(event, payLoad);\n        this.orderEvent\
    \ = event;\n    }\n\n    @Override\n    public OrderEvents getEvent() {\n    \
    \    return this.orderEvent;\n    }\n}\n```\n\nNow what remains is to convert\
    \ the json payload into an instance of `EventPayLoad` which is accomplished by\
    \ the `OandaUtils.toOandaEventPayLoad()`. This method requires a *type*, which\
    \ is passed in the event json payload and helps determine which business entity\
    \ this event relates to, i.e., *Trade*, *Order* or *Account*. The *type* actually\
    \ is the name of an event in one of our 3 enums.\n\n```java\npublic static EventPayLoad<JSONObject>\
    \ toOandaEventPayLoad(String transactionType, JSONObject payLoad) {\n    Preconditions.checkNotNull(transactionType);\n\
    \    Event evt = findAppropriateType(AccountEvents.values(), transactionType);\n\
    \    if (evt == null) {\n        evt = findAppropriateType(OrderEvents.values(),\
    \ transactionType);\n        if (evt == null) {\n            evt = findAppropriateType(TradeEvents.values(),\
    \ transactionType);\n            if (evt == null) {\n                return null;\n\
    \            } else {\n                return new TradeEventPayLoad((TradeEvents)\
    \ evt, payLoad);\n            }\n        } else {\n            return new OrderEventPayLoad((OrderEvents)\
    \ evt, payLoad);\n        }\n    } else {\n        return new AccountEventPayLoad((AccountEvents)\
    \ evt, payLoad);\n    }\n}\n\nprivate static final Event findAppropriateType(Event[]\
    \ events, String transactionType) {\n    for (Event evt: events) {\n        if\
    \ (evt.name().equals(transactionType)) {\n            return evt;\n        }\n\
    \    }\n    return null;\n}\n```\n\nThis utility method does a brute force comparison\
    \ for all the 3 Event types we have and returns as soon as we find the first match.\
    \ If no match is found (it is possible if a new event is introduced by the platform),\
    \ we return `null`. If we do have a non-null instance of the `EventPayLoad`, we\
    \ are now ready to dispatch it to an instance of `EventCallback`, which inevitably\
    \ must use the EventBus to dispatch to the interested subscribers.\n\n```java\n\
    public class EventCallbackImpl<T> implements EventCallback<T> {\n\n    private\
    \ final EventBus eventBus;\n\n    public EventCallbackImpl(final EventBus eventBus)\
    \ {\n        this.eventBus = eventBus;\n    }\n\n    @Override\n    public void\
    \ onEvent(EventPayLoad<T> eventPayLoad) {\n        this.eventBus.post(eventPayLoad);\n\
    \    }\n}\n```\n\nAt the time `onEvent` method is invoked, it already has an appropriate\
    \ subtype of the `EventPayLoad`, ready to be dispatched.\n\nSince we want to exploit\
    \ the fine grained dispatching of the subtypes of `EventPayLoad` by the EventBus,\
    \ we need to create payload handlers that can polymorphically handle these specific\
    \ payloads. To achieve that, we need to first define an `EventHandler` interface\
    \ that has a method to do exactly that.\n\n```java\npublic interface EventHandler<K,\
    \ T extends EventPayLoad<K>> {\n\n    void handleEvent(T payLoad);\n}\n```\n\n\
    In the definition above, we are stipulating that the `handleEvent` will handle\
    \ events of type which are subtypes of `EventPayLoad`.\n\nFor the set of events\
    \ relating to the *Trade* business entity, an implementation of the `TradeEventHandler`\
    \ would look like\n\n```java\npublic class TradeEventHandler implements EventHandler<JSONObject,\
    \ TradeEventPayLoad> {\n\n    private final Set<TradeEvents> tradeEventsSupported\
    \ =\n        Sets.newHashSet(TradeEvents.STOP_LOSS_FILLED,\n                 \
    \       TradeEvents.TRADE_CLOSE, TradeEvents.TAKE_PROFIT_FILLED);\n    private\
    \ final TradeInfoService<Long, String, Long> tradeInfoService;\n\n    public TradeEventHandler(TradeInfoService<Long,\
    \ String, Long> tradeInfoService) {\n        this.tradeInfoService = tradeInfoService;\n\
    \    }\n\n    @Override\n    @Subscribe\n    @AllowConcurrentEvents\n    public\
    \ void handleEvent(TradeEventPayLoad payLoad) {\n        Preconditions.checkNotNull(payLoad);\n\
    \        if (!tradeEventsSupported.contains(payLoad.getEvent())) {\n         \
    \   return;\n        }\n        JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
    \        long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n \
    \       tradeInfoService.refreshTradesForAccount(accountId);\n    }\n}\n```\n\n\
    The `TradeEventHandler` handles the `TradeEventPayLoad` payload as per its definition.\
    \ There are couple of things worth noting about this simple handler. First it\
    \ stipulates through the `tradeEventsSupported` Set, which subset of all Trade\
    \ events, it wants to consume. Hence one of the first thing it does is to perform\
    \ the check\n\n```java\nif (!tradeEventsSupported.contains(payLoad.getEvent()))\
    \ {\n    return;\n}\n```\n\nand promptly return if the type is not in `[STOP_LOSS_FILLED,\
    \ TRADE_CLOSE, TAKE_PROFIT_FILLED]`. If it is, then it does a very interesting\
    \ action of refreshing the *trades cache*. Remember, from our discussion from\
    \ previous chapter, the `TradeInfoService` has an internal cache of trades, in\
    \ order to avoid making frequent calls to fetch trades, which is quite expensive.\
    \ Now, here it is where this cache gets refreshed. We only refresh the trades\
    \ cache for the given account and resist refreshing everything as it is not required\
    \ here.\n\nAn equivalent handler for orders is the `OrderFilledEventHandler` whose\
    \ definition is\n\n```java\npublic class OrderFilledEventHandler implements EventHandler<JSONObject,\
    \ OrderEventPayLoad>,\n    EmailContentGenerator<JSONObject> {\n    private final\
    \ Set<OrderEvents> orderEventsSupported =\n        Sets.newHashSet(OrderEvents.ORDER_FILLED);\n\
    \    private final TradeInfoService<Long, String, Long> tradeInfoService;\n\n\
    \    public OrderFilledEventHandler(\n        TradeInfoService<Long, String, Long>\
    \ tradeInfoService) {\n        this.tradeInfoService = tradeInfoService;\n   \
    \ }\n\n    @Override\n    @Subscribe\n    @AllowConcurrentEvents\n    public void\
    \ handleEvent(OrderEventPayLoad payLoad) {\n        Preconditions.checkNotNull(payLoad);\n\
    \        if (!orderEventsSupported.contains(payLoad.getEvent())) {\n         \
    \   return;\n        }\n        JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
    \n        long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n\
    \        tradeInfoService.refreshTradesForAccount(accountId);\n    }\n}\n```\n\
    \nAs the name of this handler suggests, here we are only interested in the `ORDER_FILLED`\
    \ event. When an order is filled, a trade is created as a result. Therefore we\
    \ refresh the trades cache again by invoking `tradeInfoService.refreshTradesForAccount`.\n\
    \nComing back to the dissemination by the EventBus, since we are creating payloads\
    \ of the type `TradeEventPayLoad`, `OrderEventPayLoad` and `AccountEventPayLoad`\
    \ and have methods with `@Subscribe` that match the types, the EventBus should\
    \ deliver to the relevant `handleEvent` method and **not** to all 3.\n\nThis concludes\
    \ our discussion of the events related to Trade, Order and Accounts. There are\
    \ several other things that one might choose to do when such events happen, for\
    \ e.g. send an email or an sms notification. It is up to us as developers, what\
    \ we want to write in the `handleEvent` method."
