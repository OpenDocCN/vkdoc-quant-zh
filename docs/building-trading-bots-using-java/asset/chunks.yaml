  trans: "\n### 8.3.3 `AbstractFXTweetHandler` 基类\n\n我们通过定义一个实现 `FXTweetHandler` 接口的抽象类开始讨论该接口的具体实现，该类只实现了接口中的两个关键方法：`findNewTweets()`\
    \ 和 `getUserId()`。\n\n其中，`findNewTweets()` 方法的实现为我们提供了讨论 Twitter 搜索 API^(8) 的机会。该\
    \ API 提供了一套全面的查询运算符，使我们能够构建搜索查询并按时间倒序检索推文集合。Twitter 的响应是一个 JSON 负载，但由于我们使用了 `TwitterTemplate`，Spring\
    \ 会负责解析该负载，并将其转换为更易于处理的 `org.springframework.social.twitter.api.Tweet` 对象集合。\n\
    \n**强烈建议您在继续之前阅读搜索 API 页面，以了解运算符、返回结果的约束以及最佳实践。**\n\n以下是一些直接取自相关文档并稍作修改、且与我们搜索相关的示例：\n\
    \n| 运算符 | 搜索目标 |\n| --- | --- |\n| `from:foo` | 查找来自用户 “foo” 的推文 |\n| `from:foo\
    \ since:2015-012-01` | 查找自 2015-012-01 以来来自用户 “foo” 的推文 |\n| `from:foo since_id:10000000`\
    \ | 查找自推文 ID 10000000 以来来自用户 “foo” 的推文 |\n| `from:foo Profit: OR Loss:` | 查找来自用户\
    \ “foo” 且包含字符（‘Profit:’ 或 ‘Loss:’）的推文 |\n\n```\n 1 public abstract class AbstractFXTweetHandler\
    \ < T > implements FXTweetHandler < T > {\n\n3  @Autowired\n 4  protected Twitter\
    \ twitter;\n 5  @Autowired\n 6  protected InstrumentService < T > instrumentService;\n\
    \ 7  @Autowired\n 8  protected ProviderHelper providerHelper;\n\n10  protected\
    \ final DateTime startTime = DateTime.now();\n11  protected final String startTimeAsStr;\n\
    12  protected volatile Long lastTweetId = null;\n13  protected final String userId;\n\
    14  protected static final String CLOSED = \"Closed\";\n15  protected static final\
    \ String BOUGHT = \"Bought\";\n16  protected static final String SOLD = \"Sold\"\
    ;\n17  protected static final Logger LOG =\n18  Logger.getLogger(AbstractFXTweetHandler.class);\n\
    19  static final String FROM_USER_SINCE_TIME_TWITTER_QRY_TMPL =\n20  \"from:%s\
    \ since:%s\";\n21  static final String FROM_USER_SINCE_ID_TWITTER_QRY_TMPL =\n\
    22  \"from:%s since_id:%d\";\n\n24  protected AbstractFXTweetHandler(String userId)\
    \ {\n25   this.userId = userId;\n26   DateTimeFormatter formatter = DateTimeFormat.forPattern(\"\
    yyyy-MM-dd\");\n27   startTimeAsStr = formatter.print(this.startTime);\n28  }\n\
    \n30  protected abstract NewFXTradeTweet < T > parseNewTrade(String tokens[]);\n\
    \n32  protected abstract CloseFXTradeTweet < T > parseCloseTrade(String tokens[]);\n\
    \n34  @Override\n35  public String getUserId() {\n36   return userId;\n37  }\n\
    \n39  private class TweetPredicate implements Predicate < Tweet > {\n\n41   @Override\n\
    42   public boolean apply(Tweet input) {\n43    return startTime.isBefore(input.getCreatedAt().getTime());\n\
    44   }\n\n46  }\n\n48  @Override\n49  public Collection < Tweet > findNewTweets()\
    \ {\n50   SearchResults results = null;\n51   if (lastTweetId == null) { // 查找自应用启动以来的新推文\n\
    52    synchronized(this) {\n53     if (lastTweetId == null) { // 双重检查锁\n54   \
    \   results = twitter.searchOperations().search(\n55       String.format(\n56\
    \        FROM_USER_SINCE_TIME_TWITTER_QRY_TMPL, getUserId(), this.startTimeAsStr));\n\
    57      TweetPredicate predicate = new TweetPredicate();\n58      List < Tweet\
    \ > filteredTweets = Lists.newArrayList();\n59      for (Tweet tweet: results.getTweets())\
    \ {\n60       if (predicate.apply(tweet)) {\n61        if (lastTweetId == null)\
    \ {\n62         /* 取第一条推文，因为推文是按时间倒序排列的 */\n63         this.lastTweetId = tweet.getId();\n\
    64        }\n65        filteredTweets.add(tweet);\n66       }\n67      }\n68 \
    \     return filteredTweets;\n69     }\n\n71    }\n\n73   }\n74   results = twitter.searchOperations().search(\n\
    75    String.format(\n76     FROM_USER_SINCE_ID_TWITTER_QRY_TMPL, getUserId(),\
    \ lastTweetId));\n77   List < Tweet > tweets = results.getTweets();\n78   if (!TradingUtils.isEmpty(tweets))\
    \ {\n79    lastTweetId = tweets.get(0).getId();\n80   }\n81   return tweets;\n\
    \n83  }\n84 }\n```\n\n该类的核心在于 `findNewTweets()` 方法的实现。该方法尝试检索自上次 API 调用以来的所有新推文。我们假设存在一个按固定时间间隔运行的定时任务，调用此方法来获取最新的推文。为了获取自上次调用以来的最新推文，该类必须在内部跟踪上次获取的推文。通过使用大于给定用户上次推文\
    \ ID 的 ID，它可以找到该用户的所有最新推文。然而，当该方法首次被调用时，我们需要探索另一种查找最新推文的方式。在这种情况下，我们使用该类初始化时的时间作为起始点来检索最新推文。这就是我们在\
    \ `if (lastTweetId == null)` 条件中看到的逻辑。为了使该类线程安全，我们添加了额外的同步机制，并考虑了双重检查锁^(9)。基于时间的查询使用了\
    \ `from:%s since:%s` 格式，其中我们提供相关的用户 ID 和格式为 `yyyy-MM-dd` 的启动时间。一旦此次搜索返回结果，我们就可以获取集合中的第一条推文，并将其\
    \ ID 设置为最新 ID，作为下次搜索的起点。在这种情况下，我们使用查询字符串 `from:%s since_id:%d`，提供用户 ID 和上次搜索设置的\
    \ ID。再次重申，搜索结果按从最新到最旧的顺序排列。\n\n### 8.3.4 特定用户的 `TweetHandlers`\n\n**警告：** - *针对各个用户讨论的推文格式可能随时更改，恕不另行通知。因此，在解析过程中，我们务必尽可能编写防御性代码。*\n\
    \n为了总结我们的讨论，我们将查看本章前面讨论过的用户的 `TweetHandlers`。大部分代码都应围绕推文解析展开，因为它非常特定于该用户。常见的功能，例如按用户搜索新推文，已在上一节讨论的基类\
    \ `AbstractFXTweetHandler` 中进行了抽象。\n\n对于新交易，我们感兴趣的是解析出：\n\n*   交易动作\n*   货币对\n\
    *   限价单价格\n*   止损价格\n*   止盈价格\n\n对于平仓交易，我们想要解析：\n\n*   货币对\n*   平仓价格\n*   盈亏点数\n"
- fmt: "### `SignalFactoryFXTweetHandler`\n\n此推文处理器尝试解析用户`@SignalFactory`发布的与开仓/平仓交易相关的推文。让我们通过文本形式回顾该用户开仓与平仓推文的一些示例：\n\
    \n```\n 1 //New Trade\n 2 Forex Signal | Sell USDCHF@0.91902 | SL:0.92302 | TP:0.91102\
    \ | 2015.01.30 17:52 GMT | #fx #forex #fb\n\n4 Forex Signal | Sell GBPAUD@2.03572\
    \ | SL:2.03972 | TP:2.02772 | 2016.01.22 12:40 GMT | #fx #forex #fb\n\n6 Forex\
    \ Signal | Buy GBPCAD@2.03229 | SL:2.02829 | TP:2.04029 | 2016.01.22 13:56 GMT\
    \ | #fx #forex #fb\n\n8 //Close Trade\n 9 Forex Signal | Close(SL) Buy NZDCHF@0.66566\
    \ | Loss: -40 pips | 2015.01.30 18:16 GMT | #fx #forex #fb\n\n11 Forex Signal\
    \ | Close(TP) Buy GBPCHF@1.44636 | Profit: +80 pips | 2016.01.22 11:55 GMT | #fx\
    \ #forex #fb\n\n13 Forex Signal | Close(SL) Sell GBPAUD@2.03972 | Loss: -40 pips\
    \ | 2016.01.22 13:03 GMT | #fx #forex #fb\n```\n\n对于开仓交易，我们可以对此用户进行以下观察（假设我们先用分隔符`|`解析整个推文，得到\
    \ 6 个令牌）：\n\n- 交易操作始终是`Buy`或`Sell`，并且是第二个令牌的第一个单词。\n- 货币对始终是从第二个令牌的第二个单词按`@`字符分割后得到的第一个子令牌。\n\
    - 入场价格是从第二个令牌的第二个单词按`@`字符分割后得到的第二个子令牌。\n- 止损价格是从第三个令牌按`:`字符分割后得到的第二个子令牌。\n- 止盈价格是从第四个令牌按`:`字符分割后得到的第二个子令牌。\n\
    \n对于平仓交易，我们可以对此用户进行以下观察（假设我们先用分隔符`|`解析整个推文，得到 5 个令牌）：\n\n- 货币对始终是从第二个令牌的第三个单词按`@`字符分割后得到的第一个子令牌。\n\
    - 平仓价格始终是从第二个令牌的第三个单词按`@`字符分割后得到的第二个子令牌。\n- 盈亏始终是第三个令牌的第二个单词。\n\n一条通用观察：\n\n-\
    \ 如果第二个令牌的第一个单词是`Buy`或`Sell`，则该推文与“开仓交易”相关。\n- 如果第二个令牌的第一个单词以`Close`开头，则该推文与“平仓交易”相关。\n\
    \n让我们看看实现上述观察的代码。\n\n```java\npublic class SignalFactoryFXTweetHandler\nextends\
    \ AbstractFXTweetHandler < String > {\n  private static final String BUY = \"\
    Buy\";\n  private static final String SELL = \"Sell\";\n  private static final\
    \ String CLOSE = \"Close\";\n  private static final String COLON = \":\";\n  private\
    \ static final String AT_THE_RATE = \"@\";\n\n  public SignalFactoryFXTweetHandler(String\
    \ userid) {\n   super(userid);\n  }\n\n  @Override\n  protected NewFXTradeTweet\
    \ < String > parseNewTrade(String tokens[]) {\n   String token1[] = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n\
    \   String action = token1[0];\n   String tokens1spl[] = token1[1].split(AT_THE_RATE);\n\
    \   String tokens2[] = tokens[2].trim().split(COLON);\n   String tokens3[] = tokens[3].trim().split(COLON);\n\
    \n   return new NewFXTradeTweet < String > (new TradeableInstrument < String >\
    \ (this.providerHelper\n     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(tokens1spl[1]),\n\
    \    Double.parseDouble(tokens2[1]), Double.parseDouble(tokens3[1]),\n    BUY.equals(action)\
    \ ? TradingSignal.LONG : TradingSignal.SHORT);\n  }\n\n  @Override\n  protected\
    \ CloseFXTradeTweet < String > parseCloseTrade(String tokens[]) {\n   String token1[]\
    \ = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n   String tokens1spl[]\
    \ = token1[token1.length - 1].split(AT_THE_RATE);\n   String token2[] = tokens[2].trim().split(TradingConstants.SPACE_RGX);\n\
    \   return new CloseFXTradeTweet < String > (new TradeableInstrument < String\
    \ > (this.providerHelper\n     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(token2[1]),\n\
    \    Double.parseDouble(tokens1spl[1]));\n  }\n\n  @Override\n  public FXTradeTweet\
    \ < String > handleTweet(Tweet tweet) {\n   String tweetTxt = tweet.getText();\n\
    \   String tokens[] = StringUtils.split(tweetTxt, TradingConstants.PIPE_CHR);\n\
    \   if (tokens.length >= 5) {\n    String action = tokens[1].trim();\n    if (action.startsWith(BUY)\
    \ || action.startsWith(SELL)) {\n     return parseNewTrade(tokens);\n    } else\
    \ if (action.startsWith(CLOSE)) {\n     return parseCloseTrade(tokens);\n    }\n\
    \   }\n   return null;\n  }\n\n  @Override\n  public Collection < Tweet > findHistoricPnlTweetsForInstrument(TradeableInstrument\
    \ < String > instrument) {\n   /*\n    * AND queries for the case below have suddenly\
    \ stopped working.\n    * something simple like from:SignalFactory GBPNZD is not\
    \ working.\n    * Check it out yourself on https://twitter.com/search-advanced.\n\
    \    * Apparently the only option is to get all tweets with phrase Profit or Loss\n\
    \    * and then use String contains to perform the step2 filtering\n    */\n\n\
    \   String query = String.format(\"Profit: OR Loss: from:%s\", getUserId(), isoInstr);\n\
    \   SearchResults results = twitter.searchOperations().search(query);\n   List\
    \ < Tweet > pnlTweets = results.getTweets();\n   List < Tweet > filteredPnlTweets\
    \ = Lists.newArrayList();\n   for (Tweet pnlTweet: pnlTweets) {\n    if (pnlTweet.getText().contains(isoInstr))\
    \ {\n     filteredPnlTweets.add(pnlTweet);\n    }\n   }\n   return filteredPnlTweets;\n\
    \  }\n}\n```\n\n操作始于`handleTweet(Tweet tweet)`方法，该方法在解析给定用户的搜索结果时被调用。其中有逻辑判断推文是涉及开仓交易、平仓交易还是无关交易。这几乎就是我们对该用户推文所做的“通用观察”。如果推文确实是开仓或平仓交易，我们会解析并返回`NewFXTradeTweet`或`CloseFXTradeTweet`的实例，这两个类都是`FXTradeTweet`类的子类。解析逻辑与上述观察部分所讨论的内容几乎完全一致。\n\
    \n最后一个需要稍作解释的方法是`findHistoricPnlTweetsForInstrument`。这里我们正在查找过去的平仓交易推文。由于我们只查找该用户的此类推文，必须使用该用户用来表示盈利或亏损的短语。这正是查询语句`from:%s\
    \ AND %s AND Profit: OR Loss:`的作用。回顾该用户平仓交易的示例，确实可以看出`Profit:`或`Loss:`作为第三个令牌的第一个单词出现。"
  raw: "##### 8.3.4.1 SignalFactoryFXTweetHandler\n\nThis tweet handler attempts to\
    \ parse new/close trade related tweets published by the user *@SignalFactory*.\
    \ Just to refresh our minds lets look at some examples of new and close trade\
    \ tweets by the user in text form\n\n```\n 1 //New Trade\n 2 Forex Signal | Sell\
    \ USDCHF@0.91902 | SL:0.92302 | TP:0.91102 | 2015.01.30 17:52 GMT | #fx #forex\
    \ #fb\n\n4 Forex Signal | Sell GBPAUD@2.03572 | SL:2.03972 | TP:2.02772 | 2016.01.22\
    \ 12:40 GMT | #fx #forex #fb\n\n6 Forex Signal | Buy GBPCAD@2.03229 | SL:2.02829\
    \ | TP:2.04029 | 2016.01.22 13:56 GMT | #fx #forex #fb\n\n8 //Close Trade\n 9\
    \ Forex Signal | Close(SL) Buy NZDCHF@0.66566 | Loss: -40 pips | 2015.01.30 18:16\
    \ GMT | #fx #forex #fb\n\n11 Forex Signal | Close(TP) Buy GBPCHF@1.44636 | Profit:\
    \ +80 pips | 2016.01.22 11:55 GMT | #fx #forex #fb\n\n13 Forex Signal | Close(SL)\
    \ Sell GBPAUD@2.03972 | Loss: -40 pips | 2016.01.22 13:03 GMT | #fx #forex #fb\n\
    ```\n\nFor new trade we can make the following observations for this user (assuming\
    \ we initially parse the whole tweet by the separator character ‘|’ and get 6\
    \ tokens):\n\n*   The Trade actions is always the word ‘Buy’ or ‘Sell’ and is\
    \ the first word of the second token.\n*   The instrument pair is always the first\
    \ sub token obtained from the second word of second token split by ‘@’ character.\n\
    *   The limit price is the second sub token obtained from the second word of second\
    \ token split by ‘@’ character.\n*   The stop loss price is the second sub token\
    \ obtained from the third token when split by ‘:’ character.\n*   The take profit\
    \ price is the second sub token obtained from the fourth token when split by ‘:’\
    \ character.\n\nFor close trade we can make the following observations for this\
    \ user (assuming we initially parse the whole tweet by the separator character\
    \ ‘|’ and get 5 tokens):\n\n*   The instrument pair is always the first sub token\
    \ obtained from the third word of second token split by ‘@’ character.\n*   The\
    \ close price is always the second sub token obtained from the third word of second\
    \ token split by ‘@’ character.\n*   The profit/loss is the always the second\
    \ word of third token.\n\nA general observation:\n\n*   A tweet relates to a ‘new\
    \ trade’ if the first word of the second token is either a ‘Buy’ or a ‘Sell’\n\
    *   A tweet relates to a ‘close trade’ if the first word of the second token starts\
    \ with characters ‘Close’\n\nLets look at the code which implements our observations\
    \ above.\n\n```\n 1 public class SignalFactoryFXTweetHandler\n 2 extends AbstractFXTweetHandler\
    \ < String > {\n 3  private static final String BUY = \"Buy\";\n 4  private static\
    \ final String SELL = \"Sell\";\n 5  private static final String CLOSE = \"Close\"\
    ;\n 6  private static final String COLON = \":\";\n 7  private static final String\
    \ AT_THE_RATE = \"@\";\n\n9  public SignalFactoryFXTweetHandler(String userid)\
    \ {\n10   super(userid);\n11  }\n\n13  @Override\n14  protected NewFXTradeTweet\
    \ < String > parseNewTrade(String tokens[]) {\n15   String token1[] = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n\
    16   String action = token1[0];\n17   String tokens1spl[] = token1[1].split(AT_THE_RATE);\n\
    18   String tokens2[] = tokens[2].trim().split(COLON);\n19   String tokens3[]\
    \ = tokens[3].trim().split(COLON);\n\n21   return new NewFXTradeTweet < String\
    \ > (new TradeableInstrument < String > (this.providerHelper\n22     .fromIsoFormat(tokens1spl[0])),\
    \ Double.parseDouble(tokens1spl[1]),\n23    Double.parseDouble(tokens2[1]), Double.parseDouble(tokens3[1]),\n\
    24    BUY.equals(action) ? TradingSignal.LONG : TradingSignal.SHORT);\n25  }\n\
    \n27  @Override\n28  protected CloseFXTradeTweet < String > parseCloseTrade(String\
    \ tokens[]) {\n29   String token1[] = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n\
    30   String tokens1spl[] = token1[token1.length - 1].split(AT_THE_RATE);\n31 \
    \  String token2[] = tokens[2].trim().split(TradingConstants.SPACE_RGX);\n32 \
    \  return new CloseFXTradeTweet < String > (new TradeableInstrument < String >\
    \ (this.providerHelper\n33     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(token2[1]),\n\
    34    Double.parseDouble(tokens1spl[1]));\n35  }\n\n37  @Override\n38  public\
    \ FXTradeTweet < String > handleTweet(Tweet tweet) {\n39   String tweetTxt = tweet.getText();\n\
    40   String tokens[] = StringUtils.split(tweetTxt, TradingConstants.PIPE_CHR);\n\
    41   if (tokens.length >= 5) {\n42    String action = tokens[1].trim();\n43  \
    \  if (action.startsWith(BUY) || action.startsWith(SELL)) {\n44     return parseNewTrade(tokens);\n\
    45    } else if (action.startsWith(CLOSE)) {\n46     return parseCloseTrade(tokens);\n\
    47    }\n48   }\n49   return null;\n50  }\n\n52  @Override\n53  public Collection\
    \ < Tweet > findHistoricPnlTweetsForInstrument(TradeableInstrument < String >\
    \ instrument) {\n54   /*\n55    * AND queries for the case below have suddenly\
    \ stopped working.\n56    * something simple like from:SignalFactory GBPNZD is\
    \ not working.\n57    * Check it out yourself on https://twitter.com/search-advanced.\n\
    58    * Apparently the only option is to get all tweets with phrase Profit or\
    \ Loss\n59    * and then use String contains to perform the step2 filtering\n\
    60    */\n\n62   String query = String.format(\"Profit: OR Loss: from:%s\", getUserId(),\
    \ isoInstr);\n63   SearchResults results = twitter.searchOperations().search(query);\n\
    64   List < Tweet > pnlTweets = results.getTweets();\n65   List < Tweet > filteredPnlTweets\
    \ = Lists.newArrayList();\n66   for (Tweet pnlTweet: pnlTweets) {\n67    if (pnlTweet.getText().contains(isoInstr))\
    \ {\n68     filteredPnlTweets.add(pnlTweet);\n69    }\n70   }\n71   return filteredPnlTweets;\n\
    72  }\n73 }\n```\n\nThe action starts in the `handleTweet(Tweet tweet)` method\
    \ which is invoked from as part of parsing the search results for a given user.\
    \ There is logic to decide whether the tweet relates to a new or a close trade\
    \ or none. This is pretty much the ‘general observation’ we made regarding tweets\
    \ from this user. If the tweet is indeed a new or a close trade, we parse and\
    \ return an instance of the *NewFxTradeTweet* or *CloseFxTradeTweet* which are\
    \ both subclasses of the *FXTradeTweet* class. The parsing logic is pretty much\
    \ exactly what we discussed in the observations section above.\n\nThe last remaining\
    \ method which needs a bit more explanation is *findHistoricPnlTweetsForInstrument*.\
    \ Here we are looking for past close trades tweets. Since we are only looking\
    \ for such tweets by this user, we must use the phrases, this user uses to denote\
    \ a profit or a loss. This is precisely what the query is *from:%s AND %s AND\
    \ Profit: OR Loss:*. Looking back at the examples of close trades from this user\
    \ does suggest that the word *Profit:* or *Loss:* appear as the first word of\
    \ third token."
  trans: "\n### `SignalFactoryFXTweetHandler`\n\n此推文处理器尝试解析用户`@SignalFactory`发布的与开仓/平仓交易相关的推文。让我们通过文本形式回顾该用户开仓与平仓推文的一些示例：\n\
    \n```\n 1 //New Trade\n 2 Forex Signal | Sell USDCHF@0.91902 | SL:0.92302 | TP:0.91102\
    \ | 2015.01.30 17:52 GMT | #fx #forex #fb\n\n4 Forex Signal | Sell GBPAUD@2.03572\
    \ | SL:2.03972 | TP:2.02772 | 2016.01.22 12:40 GMT | #fx #forex #fb\n\n6 Forex\
    \ Signal | Buy GBPCAD@2.03229 | SL:2.02829 | TP:2.04029 | 2016.01.22 13:56 GMT\
    \ | #fx #forex #fb\n\n8 //Close Trade\n 9 Forex Signal | Close(SL) Buy NZDCHF@0.66566\
    \ | Loss: -40 pips | 2015.01.30 18:16 GMT | #fx #forex #fb\n\n11 Forex Signal\
    \ | Close(TP) Buy GBPCHF@1.44636 | Profit: +80 pips | 2016.01.22 11:55 GMT | #fx\
    \ #forex #fb\n\n13 Forex Signal | Close(SL) Sell GBPAUD@2.03972 | Loss: -40 pips\
    \ | 2016.01.22 13:03 GMT | #fx #forex #fb\n```\n\n对于开仓交易，我们可以对此用户进行以下观察（假设我们先用分隔符`|`解析整个推文，得到\
    \ 6 个令牌）：\n\n- 交易操作始终是`Buy`或`Sell`，并且是第二个令牌的第一个单词。\n- 货币对始终是从第二个令牌的第二个单词按`@`字符分割后得到的第一个子令牌。\n\
    - 入场价格是从第二个令牌的第二个单词按`@`字符分割后得到的第二个子令牌。\n- 止损价格是从第三个令牌按`:`字符分割后得到的第二个子令牌。\n- 止盈价格是从第四个令牌按`:`字符分割后得到的第二个子令牌。\n\
    \n对于平仓交易，我们可以对此用户进行以下观察（假设我们先用分隔符`|`解析整个推文，得到 5 个令牌）：\n\n- 货币对始终是从第二个令牌的第三个单词按`@`字符分割后得到的第一个子令牌。\n\
    - 平仓价格始终是从第二个令牌的第三个单词按`@`字符分割后得到的第二个子令牌。\n- 盈亏始终是第三个令牌的第二个单词。\n\n一条通用观察：\n\n-\
    \ 如果第二个令牌的第一个单词是`Buy`或`Sell`，则该推文与“开仓交易”相关。\n- 如果第二个令牌的第一个单词以`Close`开头，则该推文与“平仓交易”相关。\n\
    \n让我们看看实现上述观察的代码。\n\n```java\npublic class SignalFactoryFXTweetHandler\nextends\
    \ AbstractFXTweetHandler < String > {\n  private static final String BUY = \"\
    Buy\";\n  private static final String SELL = \"Sell\";\n  private static final\
    \ String CLOSE = \"Close\";\n  private static final String COLON = \":\";\n  private\
    \ static final String AT_THE_RATE = \"@\";\n\n  public SignalFactoryFXTweetHandler(String\
    \ userid) {\n   super(userid);\n  }\n\n  @Override\n  protected NewFXTradeTweet\
    \ < String > parseNewTrade(String tokens[]) {\n   String token1[] = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n\
    \   String action = token1[0];\n   String tokens1spl[] = token1[1].split(AT_THE_RATE);\n\
    \   String tokens2[] = tokens[2].trim().split(COLON);\n   String tokens3[] = tokens[3].trim().split(COLON);\n\
    \n   return new NewFXTradeTweet < String > (new TradeableInstrument < String >\
    \ (this.providerHelper\n     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(tokens1spl[1]),\n\
    \    Double.parseDouble(tokens2[1]), Double.parseDouble(tokens3[1]),\n    BUY.equals(action)\
    \ ? TradingSignal.LONG : TradingSignal.SHORT);\n  }\n\n  @Override\n  protected\
    \ CloseFXTradeTweet < String > parseCloseTrade(String tokens[]) {\n   String token1[]\
    \ = tokens[1].trim().split(TradingConstants.SPACE_RGX);\n   String tokens1spl[]\
    \ = token1[token1.length - 1].split(AT_THE_RATE);\n   String token2[] = tokens[2].trim().split(TradingConstants.SPACE_RGX);\n\
    \   return new CloseFXTradeTweet < String > (new TradeableInstrument < String\
    \ > (this.providerHelper\n     .fromIsoFormat(tokens1spl[0])), Double.parseDouble(token2[1]),\n\
    \    Double.parseDouble(tokens1spl[1]));\n  }\n\n  @Override\n  public FXTradeTweet\
    \ < String > handleTweet(Tweet tweet) {\n   String tweetTxt = tweet.getText();\n\
    \   String tokens[] = StringUtils.split(tweetTxt, TradingConstants.PIPE_CHR);\n\
    \   if (tokens.length >= 5) {\n    String action = tokens[1].trim();\n    if (action.startsWith(BUY)\
    \ || action.startsWith(SELL)) {\n     return parseNewTrade(tokens);\n    } else\
    \ if (action.startsWith(CLOSE)) {\n     return parseCloseTrade(tokens);\n    }\n\
    \   }\n   return null;\n  }\n\n  @Override\n  public Collection < Tweet > findHistoricPnlTweetsForInstrument(TradeableInstrument\
    \ < String > instrument) {\n   /*\n    * AND queries for the case below have suddenly\
    \ stopped working.\n    * something simple like from:SignalFactory GBPNZD is not\
    \ working.\n    * Check it out yourself on https://twitter.com/search-advanced.\n\
    \    * Apparently the only option is to get all tweets with phrase Profit or Loss\n\
    \    * and then use String contains to perform the step2 filtering\n    */\n\n\
    \   String query = String.format(\"Profit: OR Loss: from:%s\", getUserId(), isoInstr);\n\
    \   SearchResults results = twitter.searchOperations().search(query);\n   List\
    \ < Tweet > pnlTweets = results.getTweets();\n   List < Tweet > filteredPnlTweets\
    \ = Lists.newArrayList();\n   for (Tweet pnlTweet: pnlTweets) {\n    if (pnlTweet.getText().contains(isoInstr))\
    \ {\n     filteredPnlTweets.add(pnlTweet);\n    }\n   }\n   return filteredPnlTweets;\n\
    \  }\n}\n```\n\n操作始于`handleTweet(Tweet tweet)`方法，该方法在解析给定用户的搜索结果时被调用。其中有逻辑判断推文是涉及开仓交易、平仓交易还是无关交易。这几乎就是我们对该用户推文所做的“通用观察”。如果推文确实是开仓或平仓交易，我们会解析并返回`NewFXTradeTweet`或`CloseFXTradeTweet`的实例，这两个类都是`FXTradeTweet`类的子类。解析逻辑与上述“观察”部分所讨论的内容几乎完全一致。\n\
    \n最后一个需要稍作解释的方法是`findHistoricPnlTweetsForInstrument`。这里我们正在查找过去的平仓交易推文。由于我们只查找该用户的此类推文，必须使用该用户用来表示盈利或亏损的短语。这正是查询语句`from:%s\
    \ AND %s AND Profit: OR Loss:`的作用。回顾该用户平仓交易的示例，确实可以看出`Profit:`或`Loss:`作为第三个令牌的第一个单词出现。\n"
- fmt: "### `ZuluTrader101FXTweetHandler`\n\n此推文处理器尝试解析用户 `@ZuluTrader101` 发布的关于开仓/平仓交易的推文。为了回顾，让我们先看看该用户以文本形式发布的开仓和平仓推文示例：\n\
    \n```\n 1 //New Trade\n 2 Bought 0.43 Lots #EURUSD 1.1371 | Auto-copy FREE at\
    \ http://goo.gl/moaYzx #Forex #Finance #Money\n\n4 Bought 0.69 Lots #GBPCHF 1.4614\
    \ SL 1.45817 TP 1.46617 | Auto-copy FREE at http://goo.gl/moaYzx #Forex #Finance\
    \ #Money\n\n6 Sold 0.34 Lots #EURUSD 1.13694 | Auto-copy FREE at http://goo.gl/moaYzx\
    \  #Forex #Finance #Money\n\n8 Sold 0.43 Lots #EURUSD 1.13117 SL 1.13281 TP 1.12963\
    \ | Auto-copy FREE at http://goo.gl/moaYzx  #Forex #Finance #Money\n\n10 Bought\
    \ 0.66 Lots #EURGBP 0.73532 SL 0.70534 | Auto-copy FREE at http://goo.gl/moaYzx\
    \  #Forex #Finance #Money\n\n12 //Close Trade\n13 Closed Buy 0.64 Lots #USDJPY\
    \ 118.773 for +17.7 pips, total for today -136.7 pips\n\n15 Closed Sell 0.69 Lots\
    \ #NZDUSD 0.75273 for +8.4 pips, total for today -1072.8 pips\n\n17 Closed Buy\
    \ 7.0 Lots #XAUUSD 1207.94 for -549.0 pips, total for today -1731.4 pips\n```\n\
    \n针对开仓交易，我们可以对该用户做出以下观察（假设我们最初通过分隔符 `|` 解析整个推文并得到两个令牌）：\n\n*   交易行为始终是单词 `Bought`\
    \ 或 `Sold`，并且是第一个令牌的第一个单词。\n*   货币对始终是第一个令牌中以 `#` 开头的第四个单词。\n*   价格始终是第一个令牌中的第五个单词。\n\
    *   止损价格是可选的，仅在第一个令牌中关键字 `SL` 之后的下一个单词出现。\n*   止盈价格是可选的，仅在第一个令牌中关键字 `TP` 之后的下一个单词出现。\n\
    \n针对平仓交易，我们可以对该用户做出以下观察：\n\n*   货币对始终是推文中以 `#` 开头的第五个单词。\n*   平仓价格始终是推文中的第六个单词。\n\
    *   盈亏数字始终是推文中的第八个单词。\n\n一个通用观察：\n\n*   如果一条推文以单词 `Closed` 开头，则它属于“平仓交易”。\n* \
    \  如果一条推文以单词 `Bought` 或 `Sold` 开头，则它属于“开仓交易”。\n\n现在让我们将注意力转向代码实现。\n\n```\n 1 public\
    \ class ZuluTrader101FXTweetHandler\n  2 extends AbstractFXTweetHandler < String\
    \ > {\n\n4  protected ZuluTrader101FXTweetHandler(String userId) {\n  5   super(userId);\n\
    \  6  }\n\n8  private int idxOfTP(String[] tokens) {\n  9   int idx = 0;\n 10\
    \   for (String token: tokens) {\n 11    if (\"TP\".equals(token)) {\n 12    \
    \ return idx;\n 13    }\n 14    idx++;\n 15   }\n 16   return -1;\n 17  }\n\n\
    19  private int idxOfSL(String[] tokens) {\n 20   int idx = 0;\n 21   for (String\
    \ token: tokens) {\n 22    if (\"SL\".equals(token)) {\n 23     return idx;\n\
    \ 24    }\n 25    idx++;\n 26   }\n 27   return -1;\n 28  }\n\n30  @Override\n\
    \ 31  protected NewFXTradeTweet < String > parseNewTrade(String[] tokens) {\n\n\
    33   String currencyPair = null;\n 34   try {\n 35    String ccyWithHashTag =\
    \ tokens[3];\n 36    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
    \ 37    double price = Double.parseDouble(tokens[4]);\n 38    TradingSignal signal\
    \ = BOUGHT.equals(tokens[0]) ? TradingSignal.LONG :\n 39     TradingSignal.SHORT;\n\
    \ 40    double stopLoss = 0.0;\n 41    double takeProfit = 0.0;\n 42    int idxTp\
    \ = idxOfTP(tokens);\n 43    if (idxTp != -1) {\n 44     takeProfit = Double.parseDouble(tokens[idxTp\
    \ + 1]);\n 45    }\n 46    int idxSl = idxOfSL(tokens);\n 47    if (idxSl != -1)\
    \ {\n 48     stopLoss = Double.parseDouble(tokens[idxSl + 1]);\n 49    }\n 50\
    \    return new NewFXTradeTweet < String > (new TradeableInstrument < String >\
    \ (currencyPair), price, stopLoss,\n 51     takeProfit, signal);\n 52   } catch\
    \ (Exception e) {\n 53    LOG.info(\n 54     String.format(\" got err %s parsing\
    \ tweet tokens for new trade \",\n 55      e.getMessage()));\n 56    return null;\n\
    \ 57   }\n\n59  }\n\n61  @Override\n 62  protected CloseFXTradeTweet < String\
    \ > parseCloseTrade(String[] tokens) {\n\n64   String currencyPair = null;\n 65\
    \   try {\n 66    String ccyWithHashTag = tokens[4];\n 67    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
    \ 68    String strPnlPips = tokens[7];\n 69    return new CloseFXTradeTweet <\
    \ String > (new TradeableInstrument < String > (currencyPair), Double\n 70   \
    \  .parseDouble(strPnlPips), Double.parseDouble(tokens[5]));\n 71   } catch (Exception\
    \ e) {\n 72    LOG.info(\n 73     String.format(\" got err %s parsing tweet tokens\
    \ for close trade:\",\n 74      e.getMessage()));\n 75    return null;\n 76  \
    \ }\n\n78  }\n\n80  @Override\n 81  public FXTradeTweet < String > handleTweet(Tweet\
    \ tweet) {\n 82   String tweetTxt = tweet.getText();\n 83   String tokens[] =\
    \ tweetTxt.trim().split(TradingConstants.SPACE_RGX);\n 84   if (tweetTxt.startsWith(CLOSED))\
    \ {\n 85    return parseCloseTrade(tokens);\n 86   } else if (tweetTxt.startsWith(BOUGHT)\
    \ || tweetTxt.startsWith(SOLD)) {\n 87    return parseNewTrade(tokens);\n 88 \
    \  }\n 89   return null;\n 90  }\n\n92  @Override\n 93  public Collection < Tweet\
    \ >\n 94  findHistoricPnlTweetsForInstrument(TradeableInstrument < String > instrument)\
    \ {\n 95   String isoInstr = TradingConstants.HASHTAG +\n 96    this.providerHelper.toIsoFormat(instrument.getInstrument());\n\
    \ 97   SearchResults results = twitter.searchOperations().search(\n 98    String.format(\"\
    from:%s AND %s AND \\\"Closed Buy\\\" OR \\\"Closed Sell\\\"\",\n 99     getUserId(),\
    \ isoInstr));\n100   return results.getTweets();\n101  }\n\n103 }\n```\n\n与之前一样，操作从\
    \ `handleTweet(Tweet tweet)` 方法开始。这次我们基于关于哪些推文是开仓、平仓或无法解析的通用观察，采用了略微不同的逻辑。假设它要么是开仓要么是平仓交易，我们继续解析推文。解析过程完全遵循上述观察结果中提到的逻辑。\n\
    \n最后剩下的需要讨论的事项是该用户的 `findHistoricPnlTweetsForInstrument` 方法。如同用户 `@SignalFactory`\
    \ 一样，我们需要找到该用户用来表示已平仓交易的短语。从我们对平仓交易的观察来看，该用户 `@ZuluTrader101` 的推文中包含短语 `Closed\
    \ Buy` 或 `Closed Sell`。因此，我们的查询语句类似于 `from:%s AND %s AND \"Closed Buy\" OR \"\
    Closed Sell\"`。在我们继续之前，提一下关于 Twitter 搜索 API 的一点。如果我们用双引号括起一个短语，意味着我们正在寻找该短语的精确匹配。这正是我们为该用户所需要的。"
  raw: "##### 8.3.4.2 ZuluTrader101FXTweetHandler\n\nThis tweet handler attempts to\
    \ parse new/close trade related tweets published by the user *@ZuluTrader101*.\
    \ Just to refresh our minds lets look at some examples of new and close trade\
    \ tweets by the user in text form\n\n```\n 1 //New Trade\n 2 Bought 0.43 Lots\
    \ #EURUSD 1.1371 | Auto-copy FREE at http://goo.gl/moaYzx #Forex #Finance #Money\n\
    \n4 Bought 0.69 Lots #GBPCHF 1.4614 SL 1.45817 TP 1.46617 | Auto-copy FREE at\
    \ http://goo.gl/moaYzx #Forex #Finance #Money\n\n6 Sold 0.34 Lots #EURUSD 1.13694\
    \ | Auto-copy FREE at http://goo.gl/moaYzx  #Forex #Finance #Money\n\n8 Sold 0.43\
    \ Lots #EURUSD 1.13117 SL 1.13281 TP 1.12963 | Auto-copy FREE at http://goo.gl/moaYzx\
    \  #Forex #Finance #Money\n\n10 Bought 0.66 Lots #EURGBP 0.73532 SL 0.70534 |\
    \ Auto-copy FREE at http://goo.gl/moaYzx  #Forex #Finance #Money\n\n12 //Close\
    \ Trade\n13 Closed Buy 0.64 Lots #USDJPY 118.773 for +17.7 pips, total for today\
    \ -136.7 pips\n\n15 Closed Sell 0.69 Lots #NZDUSD 0.75273 for +8.4 pips, total\
    \ for today -1072.8 pips\n\n17 Closed Buy 7.0 Lots #XAUUSD 1207.94 for -549.0\
    \ pips, total for today -1731.4 pips\n```\n\nFor new trade we can make the following\
    \ observations for this user (assuming we initially parse the whole tweet by the\
    \ separator character ‘|’ and get 2 tokens):\n\n*   The Trade actions is always\
    \ the word ‘Bought’ or ‘Sold’ and is the first word of the first token.\n*   The\
    \ currency pair is always the fourth word starting with ‘#’ in the first token.\n\
    *   The price is always the fifth word in the first token.\n*   The stop loss\
    \ price is optional and is only present as the next word after the keyword ‘SL’\
    \ in the first token.\n*   The take profit price is optional and is only present\
    \ as the next word after the keyword ‘TP’ in the first token.\n\nFor close trade\
    \ we can make the following observations for this user:\n\n*   The currency pair\
    \ is always the fifth word starting with ‘#’ in the tweet.\n*   The close price\
    \ is always the sixth word in the tweet.\n*   The profit/loss figure is always\
    \ the eight word in the tweet.\n\nA general observation:\n\n*   A tweet relates\
    \ to a ‘close trade’ if it starts with the word ‘Closed’.\n*   A tweet relates\
    \ to a ‘new trade’ if the tweet starts with the word ‘Bought’ or ‘Sold’\n\nNow\
    \ lets switch our attention to the code implementation\n\n```\n 1 public class\
    \ ZuluTrader101FXTweetHandler\n  2 extends AbstractFXTweetHandler < String > {\n\
    \n4  protected ZuluTrader101FXTweetHandler(String userId) {\n  5   super(userId);\n\
    \  6  }\n\n8  private int idxOfTP(String[] tokens) {\n  9   int idx = 0;\n 10\
    \   for (String token: tokens) {\n 11    if (\"TP\".equals(token)) {\n 12    \
    \ return idx;\n 13    }\n 14    idx++;\n 15   }\n 16   return -1;\n 17  }\n\n\
    19  private int idxOfSL(String[] tokens) {\n 20   int idx = 0;\n 21   for (String\
    \ token: tokens) {\n 22    if (\"SL\".equals(token)) {\n 23     return idx;\n\
    \ 24    }\n 25    idx++;\n 26   }\n 27   return -1;\n 28  }\n\n30  @Override\n\
    \ 31  protected NewFXTradeTweet < String > parseNewTrade(String[] tokens) {\n\n\
    33   String currencyPair = null;\n 34   try {\n 35    String ccyWithHashTag =\
    \ tokens[3];\n 36    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
    \ 37    double price = Double.parseDouble(tokens[4]);\n 38    TradingSignal signal\
    \ = BOUGHT.equals(tokens[0]) ? TradingSignal.LONG :\n 39     TradingSignal.SHORT;\n\
    \ 40    double stopLoss = 0.0;\n 41    double takeProfit = 0.0;\n 42    int idxTp\
    \ = idxOfTP(tokens);\n 43    if (idxTp != -1) {\n 44     takeProfit = Double.parseDouble(tokens[idxTp\
    \ + 1]);\n 45    }\n 46    int idxSl = idxOfSL(tokens);\n 47    if (idxSl != -1)\
    \ {\n 48     stopLoss = Double.parseDouble(tokens[idxSl + 1]);\n 49    }\n 50\
    \    return new NewFXTradeTweet < String > (new TradeableInstrument < String >\
    \ (currencyPair), price, stopLoss,\n 51     takeProfit, signal);\n 52   } catch\
    \ (Exception e) {\n 53    LOG.info(\n 54     String.format(\" got err %s parsing\
    \ tweet tokens for new trade \",\n 55      e.getMessage()));\n 56    return null;\n\
    \ 57   }\n\n59  }\n\n61  @Override\n 62  protected CloseFXTradeTweet < String\
    \ > parseCloseTrade(String[] tokens) {\n\n64   String currencyPair = null;\n 65\
    \   try {\n 66    String ccyWithHashTag = tokens[4];\n 67    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
    \ 68    String strPnlPips = tokens[7];\n 69    return new CloseFXTradeTweet <\
    \ String > (new TradeableInstrument < String > (currencyPair), Double\n 70   \
    \  .parseDouble(strPnlPips), Double.parseDouble(tokens[5]));\n 71   } catch (Exception\
    \ e) {\n 72    LOG.info(\n 73     String.format(\" got err %s parsing tweet tokens\
    \ for close trade:\",\n 74      e.getMessage()));\n 75    return null;\n 76  \
    \ }\n\n78  }\n\n80  @Override\n 81  public FXTradeTweet < String > handleTweet(Tweet\
    \ tweet) {\n 82   String tweetTxt = tweet.getText();\n 83   String tokens[] =\
    \ tweetTxt.trim().split(TradingConstants.SPACE_RGX);\n 84   if (tweetTxt.startsWith(CLOSED))\
    \ {\n 85    return parseCloseTrade(tokens);\n 86   } else if (tweetTxt.startsWith(BOUGHT)\
    \ || tweetTxt.startsWith(SOLD)) {\n 87    return parseNewTrade(tokens);\n 88 \
    \  }\n 89   return null;\n 90  }\n\n92  @Override\n 93  public Collection < Tweet\
    \ >\n 94  findHistoricPnlTweetsForInstrument(TradeableInstrument < String > instrument)\
    \ {\n 95   String isoInstr = TradingConstants.HASHTAG +\n 96    this.providerHelper.toIsoFormat(instrument.getInstrument());\n\
    \ 97   SearchResults results = twitter.searchOperations().search(\n 98    String.format(\"\
    from:%s AND %s AND \\\"Closed Buy\\\" OR \\\"Closed Sell\\\"\",\n 99     getUserId(),\
    \ isoInstr));\n100   return results.getTweets();\n101  }\n\n103 }\n```\n\nAs before,\
    \ the action starts in the `handleTweet(Tweet tweet)` method. This time around\
    \ we have a slightly different logic, based on the general observation regarding\
    \ which tweet is a new or close trade or is unparseable. Assuming that it is either\
    \ a new or a close trade, we proceed to parse the tweet. The parsing follows exactly\
    \ the logic mentioned in the observations section above.\n\nThe very last thing\
    \ remaining to discuss is the method *findHistoricPnlTweetsForInstrument* for\
    \ this user. Like for the user *@SignalFactory*, we need to find the phrases used\
    \ by this user to denote closed trades. It turns out that this user, *@ZuluTrader101*,\
    \ from our observations about closed trades, the tweet has the phrases ‘Closed\
    \ Buy’ or ‘Closed Sell’. Hence our query looks like *from:%s AND %s AND “Closed\
    \ Buy” OR “Closed Sell”*. Just a remark before we go, about the twitter search\
    \ api. If we double quote a phrase, it means we are looking for an exact match\
    \ of that phrase. And this is what we want for this user."
  trans: "\n### `ZuluTrader101FXTweetHandler`\n\n此推文处理器尝试解析用户 `@ZuluTrader101` 发布的关于开仓/平仓交易的推文。为了回顾，让我们先看看该用户以文本形式发布的开仓和平仓推文示例：\n\
