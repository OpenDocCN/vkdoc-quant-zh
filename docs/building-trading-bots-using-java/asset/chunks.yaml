    \ Sample Output\n\n## 5. Historic Instrument Market Data\n\nIn this chapter we\
    \ discuss some of the techniques to build services to query historic market data.\
    \ This could be of real interest for folks who want to build strategies based\
    \ on analysis of historic data for given instruments. Traditionally historical\
    \ instrument data on charts are represented as candle sticks. Candle sticks patterns\
    \ are a form of technical analysis which can be used over any time frame. They\
    \ are similar to bar charts and provide opening and closing values, the high and\
    \ low price for the time frame in question.\n\n### 5.1 How to read a candle stick\n\
    \nThe length of the candle stick shows the relative change in open and close prices\
    \ of the reporting time frame (session). The longer the body, the more the change\
    \ in the open and close price of the session. This may point to higher volatility\
    \ in the price. If the close price is higher than the open, then the body of the\
    \ candle stick is white. On the contrary, if the close price is lower than the\
    \ open, then the body is black. The thin lines above and below the body are called\
    \ shadows. The peak of the upper shadow is the high of the session and the bottom\
    \ of the lower shadow is the low of the session. The length and the color of the\
    \ candle sticks can point to a bull or a bear market.\n\n![Candle Stick](images/00016.gif)\
    \ Candle Stick\n\n### 5.2 Enum defining the candle stick granularity\n\nWe start\
    \ our journey into making sense of the market data by first defining an `Enum`\
    \ which defines various candle sticks granularity or time frames that we would\
    \ support.\n\nCode Listing 5.1: `CandleStickGranularity` Enum definition\n\n```java\n\
    \ 1 public enum CandleStickGranularity {\n 2 \n 3  S5(5), // 5s\n 4   S10(10),\
    \ // 10s\n 5   S15(15), // 15s\n 6   S30(30), // 30s\n 7   M1(60 * 1), // 1min\n\
    \ 8   M2(60 * 2), // 2mins\n 9   M3(60 * 3), // 3mins\n10   M5(60 * 5), // 5mins\n\
    11   M10(60 * 10), // 10mins\n12   M15(60 * 15), // 15mins\n13   M30(60 * 30),\
    \ // 30mins\n14   H1(60 * 60), // 1hr\n15   H2(60 * 60 * 2), // 2hr\n16   H3(60\
    \ * 60 * 3), // 3hr\n17   H4(60 * 60 * 4), // 4hr\n18   H6(60 * 60 * 6), // 6hr\n\
    19   H8(60 * 60 * 8), // 8hr\n20   H12(60 * 60 * 12), // 12hr\n21   D(60 * 60\
    \ * 24), // 1day\n22   W(60 * 60 * 24 * 7), // 1wk\n23   M(60 * 60 * 24 * 30);\
    \ // 1mth\n24 \n25  private final long granularityInSeconds;\n26 \n27  private\
    \ CandleStickGranularity(long granularityInSeconds) {\n28   this.granularityInSeconds\
    \ = granularityInSeconds;\n29  }\n30 \n31  public long getGranularityInSeconds()\
    \ {\n32   return granularityInSeconds;\n33  }\n34 }\n```\n\nThe enum definition\
    \ above is quite straightforward. We define all the granularities or time frames\
    \ that our API would support. The lowest granularity is 5 seconds whilst the largest\
    \ is 1 month. We define a constructor, to accept `granularityInSeconds()`, just\
    \ in case we need to quantify the granularity in a situation where we parse the\
    \ enum by name and need to get it’s granularity or session length."
