    \ Twitter 和发布经济事件的外部网站等外部源的数据时感受到的。不同的 Twitter 用户和外部网站有自己表示货币对以及多头/空头交易的方式。为了处理这种繁多的约定，强烈感受到了这种接口的必要性。我很确定还会有更多需要以平台特定方式解读的情况，因此应当被添加到此接口中。"
- fmt: "### 1.9 `TradingConfig` class\n\nThe class `TradingConfig` holds all the parameters\
    \ that are configured at runtime. These parameters are required by various core\
    \ APIs. Some examples include:\n\n- Maximum value of an order to be placed.\n\
    - Maximum allowed contracts for a currency.\n\nAs different users may have different\
    \ runtime values, these values form part of the external configuration. These\
    \ need to be configured in the Spring configuration (we will discuss it in detail\
    \ when we talk about Configuration and Deployment). It is strongly recommended\
    \ to configure as much as possible instead of hardcoding them inside various services.\n\
    \nLet's check out how the code looks like:\n\n```\n 1 public class TradingConfig\
    \ extends BaseTradingConfig {\n\n 3  private String mailTo;\n 4  private int fadeTheMoveJumpReqdToTrade;\n\
    \ 5  private int fadeTheMoveDistanceToTrade;\n 6  private int fadeTheMovePipsDesired;\n\
    \ 7  private int fadeTheMovePriceExpiry;\n\n 9  public int getFadeTheMovePriceExpiry()\
    \ {\n10   return fadeTheMovePriceExpiry;\n11  }\n\n13  public void setFadeTheMovePriceExpiry(int\
    \ fadeTheMovePriceExpiry) {\n14   this.fadeTheMovePriceExpiry = fadeTheMovePriceExpiry;\n\
    15  }\n\n17  public String getMailTo() {\n18   return mailTo;\n19  }\n\n21  public\
    \ void setMailTo(String mailTo) {\n22   this.mailTo = mailTo;\n23  }\n\n25  public\
    \ int getFadeTheMoveJumpReqdToTrade() {\n26   return fadeTheMoveJumpReqdToTrade;\n\
    27  }\n\n29  public void setFadeTheMoveJumpReqdToTrade(int fadeTheMoveJumpReqdToTrade)\
    \ {\n30   this.fadeTheMoveJumpReqdToTrade = fadeTheMoveJumpReqdToTrade;\n31  }\n\
    \n33  public int getFadeTheMoveDistanceToTrade() {\n34   return fadeTheMoveDistanceToTrade;\n\
    35  }\n\n37  public void setFadeTheMoveDistanceToTrade(int fadeTheMoveDistanceToTrade)\
    \ {\n38   this.fadeTheMoveDistanceToTrade = fadeTheMoveDistanceToTrade;\n39  }\n\
    \n41  public int getFadeTheMovePipsDesired() {\n42   return fadeTheMovePipsDesired;\n\
    43  }\n\n45  public void setFadeTheMovePipsDesired(int fadeTheMovePipsDesired)\
    \ {\n46   this.fadeTheMovePipsDesired = fadeTheMovePipsDesired;\n47  }\n\n49 }\n\
    \n51 public class BaseTradingConfig {\n52  private double minReserveRatio;\n53\
    \  private double minAmountRequired;\n\n55  private int maxAllowedQuantity;\n\
    56  private int maxAllowedNetContracts;\n57  private double max10yrWmaOffset;\n\
    \n59  public double getMinAmountRequired() {\n60   return minAmountRequired;\n\
    61  }\n\n63  public void setMinAmountRequired(double minAmountRequired) {\n64\
    \   this.minAmountRequired = minAmountRequired;\n65  }\n\n67  public double getMax10yrWmaOffset()\
    \ {\n68   return max10yrWmaOffset;\n69  }\n\n71  public void setMax10yrWmaOffset(double\
    \ max10yrWmaOffset) {\n72   this.max10yrWmaOffset = max10yrWmaOffset;\n73  }\n\
    \n75  public int getMaxAllowedNetContracts() {\n76   return maxAllowedNetContracts;\n\
    77  }\n\n79  public void setMaxAllowedNetContracts(int maxAllowedNetContracts)\
    \ {\n80   this.maxAllowedNetContracts = maxAllowedNetContracts;\n81  }\n\n83 \
    \ public double getMinReserveRatio() {\n84   return minReserveRatio;\n85  }\n\n\
    87  public void setMinReserveRatio(double minReserveRatio) {\n88   this.minReserveRatio\
    \ = minReserveRatio;\n89  }\n\n91  public int getMaxAllowedQuantity() {\n92  \
    \ return maxAllowedQuantity;\n93  }\n```\n\nSome of these member variables here\
    \ may not make sense now but all will fall into place in later chapters.\n\n###\
    \ 1.10 Obtaining the source code\n\nAll source code can be obtained at GitHub.\
    \ The following git command will clone the repository locally on your machine:\n\
    \n```\n1 git clone https://github.com/shekharvarshney/book-code.git\n```\n\nWe\
    \ will discuss how this code can be built and run locally in later chapters.\n\
    \n### 1.11 *Try It Yourself* section\n\nAt the end of each chapter, we will include\
    \ a small program/programs (wherever appropriate) that demonstrates the concepts\
    \ discussed in the chapter and for you to experiment and see the concepts in action\
    \ straightaway. These small standalone programs are for demonstration purpose\
    \ only and may not be part of the code that runs the bot eventually. This is to\
    \ get a flavour of things that make up a component of the bot.\n\nWe will run\
    \ these programs inside the Eclipse IDE so that if need be one can debug and see\
    \ what is happening inside the services used in the bot. These programs reside\
    \ in a separate project `tradingbot-demo-programs`, whose `pom.xml` file looks\
    \ like the following:\n\n```\n 1 <project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
