    \ 启动配置 ![示例输出](img/00061.jpeg) 示例输出\n\n## 7. 事件流：交易/订单/账户事件\n\n当平台上的订单/交易/账户或任何其他实体的状态发生变化时，交易平台便会生成事件。以下是一些可能触发事件的示例：\n\
    \n*   LIMIT 订单成交\n*   交易止损退出\n*   账户保证金强平\n\n我们将在本章后续部分讨论许多此类状态变更事件及其处理方式，但将重点关注仅影响交易/订单和账户的事件。\n\
    \n正如本书引言中所述，我们需要创建一个无限事件循环，以便接收平台上发生的状态变更。平台通过事件流（类似于市场数据流）推送这些事件，我们需要采用相同的范式来处理这些事件。然而，有一个显著的区别。市场数据流（不包括心跳）仅包含符合标准负载的\
    \ Tick 事件。但对于事件流，根据哪个实体发生了何种状态变更，我们可能会收到不同的负载。例如，当 OANDA 平台上的限价订单成交时^(1)，通常会像下面这样将响应发送到事件流中。\n\
    \n```json\n 1 {\n 2   \"transaction\": {\n 3     \"id\": 10002,\n 4     \"accountId\"\
    : 123456,\n 5     \"time\": \"1443968041000000\",\n 6     \"type\": \"ORDER_FILLED\"\
    ,\n 7     \"instrument\": \"EUR_USD\",\n 8     \"units\": 10,\n 9     \"side\"\
    : \"sell\",\n10     \"price\": 1,\n11     \"pl\": 1.234,\n12     \"interest\"\
    : 0.034,\n13     \"accountBalance\": 10000,\n14     \"orderId\": 0,\n15     \"\
    tradeReduced\": {\n16       \"id\": 54321,\n17       \"units\": 10,\n18      \
    \ \"pl\": 1.234,\n19       \"interest\": 0.034\n20     }\n21   }\n22 }\n```\n\n\
    另一方面，当一笔交易被止损退出时，我们可能会看到以下响应：\n\n```json\n 1 {\n 2   \"transaction\": {\n 3  \
    \   \"id\": 10004,\n 4     \"accountId\": 234567,\n 5     \"time\": \"1443968081000000\"\
    ,\n 6     \"type\": \"STOP_LOSS_FILLED\",\n 7     \"tradeId\": 1782812741,\n 8\
    \     \"instrument\": \"USD_SGD\",\n 9     \"units\": 3000,\n10     \"side\":\
    \ \"sell\",\n11     \"price\": 1.39101,\n12     \"pl\": 3.3039,\n13     \"interest\"\
    : -0.0123,\n14     \"accountBalance\": 5915.8745\n15   }\n16 }\n```\n\n面对这些多样化的响应，我们需要为感兴趣的每种事件类型创建事件处理器。这正是我们利用\
    \ `EventBus` 多态特性的时候——它会尝试将消息投递给精确匹配的类型，找不到时再向其超类型进行投递。\n\n让我们总结一下我们可能看到被回调的不同重要事件。这绝非完整列表，但应该是各个平台上常见的事件，我们将在后续章节中详细讨论：\n\
    \n1.  订单\n    *   创建新的市价单\n    *   创建新的限价单\n    *   订单更新\n    *   订单取消\n    *\
    \   订单成交\n\n2.  交易\n    *   止盈触发\n    *   止损触发\n    *   交易更新\n    *   交易关闭\n\n\
    3.  账户\n    *   保证金强平\n    *   融资（利息支付或收取）\n\n### 7.1 流式事件接口\n\n我们的第一步是定义一个接口，用于建立与平台的事件循环。这在概念上与市场数据流式接口完全相同。建立事件循环后，所有事件将通过我们即将讨论的\
    \ `EventCallback` 委托给适当的事件处理器。首先，让我们快速查看一下这个接口：\n\n```java\n 1 /**\n 2  * 提供交易/订单/账户相关事件流式传输的服务。\n\
    \ 3  * 通常，实现会创建到平台的专用连接或注册回调监听器来接收事件。\n 4  * 建议该服务将事件处理委托给特定的处理器，\n 5  * 这些处理器可以解析并理解收到的各种不同事件。\n\
    \ 6  *\n 7  *\n 8  */\n 9 public interface {\n\n13  /**\n14   * 启动流式服务，该服务理想情况下会创建到平台的专用连接或回调监听器。\n\
    15   * 理想情况下，不应为请求相同事件类型而创建多个连接。\n16   */\n17  void startEventsStreaming();\n\n\
    20  /**\n21   * 停止事件流式服务，并以合适的方式释放任何资源/连接，\n22   * 确保不会产生资源泄露。\n23   */\n24  void\
    \ stopEventsStreaming();\n25 }\n```\n\n必须配合使用以分发事件的 `EventCallback` 定义如下：\n\n\
    ```java\n1 public interface EventCallback<T> {\n\n3  void onEvent(EventPayLoad<T>\
    \ eventPayLoad);\n4 }\n```\n\n上述两个接口与市场数据接口具有相似的设计目标。真正的区别在于下游对这些不同负载的分发方式，我们将在\
    \ `EventBus` 登场时发现这一点。但在此之前，让我们快速看一下 `EventsStreamingService` 的 OANDA 实现。"
- fmt: "### 7.2 A concrete implementation for `EventsStreamingService`\n\nLet's kickstart\
    \ the discussion of this implementation by looking at the class definition and\
    \ its constructor.\n\n```java\npublic class OandaEventsStreamingService extends\
    \ OandaStreamingService implements EventsStreamingService {\n\n    private static\
    \ final Logger LOG = Logger.getLogger(OandaEventsStreamingService.class);\n  \
    \  private final String url;\n    private final AccountDataProvider<Long> accountDataProvider;\n\
    \    private final EventCallback<JSONObject> eventCallback;\n\n    public OandaEventsStreamingService(final\
    \ String url, final String accessToken,\n                                    \
    \   AccountDataProvider<Long> accountDataProvider,\n                         \
    \              EventCallback<JSONObject> eventCallback,\n                    \
    \                   HeartBeatCallback<DateTime> heartBeatCallback,\n         \
    \                              String heartBeatSourceId) {\n        super(accessToken,\
    \ heartBeatCallback, heartBeatSourceId);\n        this.url = url;\n        this.accountDataProvider\
    \ = accountDataProvider;\n        this.eventCallback = eventCallback;\n    }\n\
    }\n```\n\nSimilar to `OandaMarketDataStreamingService`, this class extends from\
    \ `OandaStreamingService`, which provides the infrastructure methods for all OANDA\
    \ streaming services, as discussed before. Apart from the usual params, `url`\
    \ and `accessToken` passed in, the params `HeartBeatCallBack` and `heartBeatSourceId`\
    \ are required for the `super` class. We also need the additional `AccountDataProvider`\
    \ service that provides the list of accounts we want event callbacks for. These\
    \ accounts must be passed as parameters in the streaming URL, as seen below.\n\
    \n```java\n@Override\nprotected String getStreamingUrl() {\n    Collection<Account<Long>>\
    \ accounts = accountDataProvider.getLatestAccountInfo();\n    return this.url\
    \ + OandaConstants.EVENTS_RESOURCE + \"?accountIds=\" + accountsAsCsvString(accounts);\n\
    }\n\nprivate String accountsAsCsvString(Collection<Account<Long>> accounts) {\n\
    \    StringBuilder accountsAsCsv = new StringBuilder();\n    boolean firstTime\
    \ = true;\n    for (Account<Long> account : accounts) {\n        if (firstTime)\
    \ {\n            firstTime = false;\n        } else {\n            accountsAsCsv.append(TradingConstants.ENCODED_COMMA);\n\
    \        }\n        accountsAsCsv.append(account.getAccountId());\n    }\n   \
    \ return accountsAsCsv.toString();\n}\n```\n\nThe `accountDataProvider.getLatestAccountInfo()`\
    \ returns a collection of all accounts that belong to the user. This collection\
    \ is then passed onto the `accountsAsCsvString` method, which returns a CSV (URL-encoded)\
    \ separated list of accounts. Assuming the user has accounts `123456` and `2345678`,\
    \ the function `getStreamingUrl` should compute:\n\n```java\n// given\npublic\
    \ static final String EVENTS_RESOURCE = \"/v1/events\";\n// the url computed will\
    \ look like\nhttps://stream-fxtrade.oanda.com/v1/events?accountIds=123456%2C2345678\n\
    ```\n\nWith the streaming URL now computed, we are ready to start streaming in\
    \ an infinite loop in a separate thread, using the same paradigm we used for the\
    \ market data event stream.\n\n```java\n@Override\npublic void startEventsStreaming()\
    \ {\n    stopEventsStreaming();\n    streamThread = new Thread(new Runnable()\
    \ {\n\n        @Override\n        public void run() {\n            CloseableHttpClient\
    \ httpClient = getHttpClient();\n            try {\n                BufferedReader\
    \ br = setUpStreamIfPossible(httpClient);\n                if (br != null) {\n\
    \                    String line;\n                    while ((line = br.readLine())\
    \ != null && serviceUp) {\n                        Object obj = JSONValue.parse(line);\n\
    \                        JSONObject jsonPayLoad = (JSONObject) obj;\n        \
    \                if (jsonPayLoad.containsKey(heartbeat)) {\n                 \
    \           handleHeartBeat(jsonPayLoad);\n                        } else if (jsonPayLoad.containsKey(transaction))\
    \ {\n                            JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
    \                            String transactionType = transactionObject.get(type).toString();\n\
    \                            /* convert here so that event bus can post to an\
    \ appropriate handler,\n                             * even though this does not\
    \ belong here */\n                            EventPayLoad<JSONObject> payLoad\
    \ = OandaUtils.toOandaEventPayLoad(transactionType, transactionObject);\n    \
    \                        if (payLoad != null) {\n                            \
    \    eventCallback.onEvent(payLoad);\n                            }\n        \
    \                } else if (jsonPayLoad.containsKey(OandaJsonKeys.disconnect))\
    \ {\n                            handleDisconnect(line);\n                   \
    \     }\n                    }\n                    br.close();\n            \
    \    }\n            } catch (Exception e) {\n                LOG.error(e);\n \
    \           } finally {\n                serviceUp = false;\n                TradingUtils.closeSilently(httpClient);\n\
    \            }\n        }\n    }, \"OandEventStreamingThread\");\n    streamThread.start();\n\
    }\n```\n\nThe code looks very similar to the market data one, except for the lines\
    \ where something different is happening.\n\n```java\nif (jsonPayLoad.containsKey(transaction))\
    \ {\n    JSONObject transactionObject = (JSONObject) jsonPayLoad.get(transaction);\n\
    \    String transactionType = transactionObject.get(type).toString();\n    /*\
    \ convert here so that event bus can post to an appropriate handler,\n     * even\
    \ though this does not belong here */\n    EventPayLoad<JSONObject> payLoad =\
    \ OandaUtils.toOandaEventPayLoad(transactionType, transactionObject);\n    if\
    \ (payLoad != null) {\n        eventCallback.onEvent(payLoad);\n    }\n}\n```\n\
    \nThis snippet of code is where most of the magic seems to happen. All the JSON\
    \ payloads for an event have the key `transaction`. Therefore, if our payload\
    \ has this key, we know it's a platform event that we need to handle. Here we\
    \ bring in the concept of fine-grained event handling by the `EventBus`. Remember,\
    \ from our introduction of the `EventBus`, it is up to the developer to decide\
    \ how fine- or coarse-grained subscribers or handlers one wants. We really want\
    \ to exploit this feature to our advantage by going as fine-grained as possible.\
    \ Therefore, we create payloads that derive from the `EventPayLoad` class and\
    \ then create handlers with methods that handle specific subclasses of `EventPayLoad`.\
    \ Let us first define this parent class of all events.\n\n```java\n/**\n * Interface\
    \ to be implemented by platform events. The implementers of this\n * interface\
    \ would be enums which already have the method name() implemented.\n * The reason\
    \ for its existence is to have a base implementation of all platform\n * events.\n\
    \ */\npublic interface Event {\n    String name();\n}\n```\n\n```java\npublic\
    \ class EventPayLoad<T> {\n\n    private final Event event;\n    private final\
    \ T payLoad;\n\n    public EventPayLoad(Event event, T payLoad) {\n        this.event\
    \ = event;\n        this.payLoad = payLoad;\n    }\n\n    public Event getEvent()\
    \ {\n        return this.event;\n    }\n\n    public T getPayLoad() {\n      \
    \  return this.payLoad;\n    }\n}\n```\n\nThis base class for all event payloads\
    \ stipulates that we must define a constructor that accepts an enum of type `Event`\
    \ and a payload `T`.\n\nFrom our discussion, it is evident we need a subclass\
    \ implementation for each of the types of expected payloads, i.e., Account, Trade,\
    \ and Order.\n\n**Account**\n\n```java\npublic enum AccountEvents implements Event\
    \ {\n    MARGIN_CALL_ENTER,\n    MARGIN_CALL_EXIT,\n    MARGIN_CLOSEOUT,\n   \
    \ SET_MARGIN_RATE,\n    TRANSFER_FUNDS,\n    DAILY_INTEREST,\n    FEE;\n}\n```"
