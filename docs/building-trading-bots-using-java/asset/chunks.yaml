    \ marketDataPayLoad.getEventDate(),\n45     marketDataPayLoad.getBidPrice(), marketDataPayLoad.getAskPrice()));\n\
    46   }\n47 \n48   @Subscribe\n49   @AllowConcurrentEvents\n50   public void handleHeartBeats(HeartBeatPayLoad\
    \ < DateTime > payLoad) {\n51    LOG.info(String.format(\"在 %s 收到来自 %s 的心跳\",\
    \ payLoad.getHeartBeatPayLoad(),\n52     payLoad.getHeartBeatSource()));\n53 \
    \  }\n54 \n55  }\n56 \n57  public static void main(String[] args) throws Exception\
    \ {\n58 \n59   usageAndValidation(args);\n60   final String url = args[0];\n61\
    \   final Long accountId = Long.parseLong(args[1]);\n62   final String accessToken\
    \ = args[2];\n63   final String heartbeatSourceId = \"DEMO_MKTDATASTREAM\";\n\
    64 \n65   TradeableInstrument < String > eurusd = new TradeableInstrument < String\
    \ > (\"EUR_USD\");\n66   TradeableInstrument < String > gbpnzd = new TradeableInstrument\
    \ < String > (\"GBP_NZD\");\n67 \n68   Collection < TradeableInstrument < String\
    \ >> instruments = Lists.newArrayList(eurusd, gbpnzd);\n69 \n70   EventBus eventBus\
    \ = new EventBus();\n71   eventBus.register(new DataSubscriber());\n72 \n73  \
    \ MarketEventCallback < String > mktEventCallback = new MarketEventHandlerImpl\
