    10   HttpResponse resp = httpClient.execute(httpGet);\n11   String strResp = TradingUtils.responseToString(resp);\n\
    12   if (strResp != StringUtils.EMPTY) {\n13    Object jsonObject = JSONValue.parse(strResp);\n\
    14    JSONObject jsonResp = (JSONObject) jsonObject;\n15    JSONArray accounts\
    \ = (JSONArray) jsonResp.get(OandaJsonKeys.accounts);\n16    /*\n17     * 我们对每个账户分别发起\
    \ JSON 请求，因为并非所有信息\n18     都会在结果数组中返回\n19     */\n20    for (Object o: accounts)\
    \ {\n21     JSONObject account = (JSONObject) o;\n22     Long accountIdentifier\
    \ = (Long) account.get(accountId);\n23     Account < Long > accountInfo = getLatestAccountInfo(accountIdentifier,\
    \ httpClient);\n24     accInfos.add(accountInfo);\n25    }\n26   } else {\n27\
    \    TradingUtils.printErrorMsg(resp);\n28   }\n\n30  } catch (Exception e) {\n\
    31   LOG.error(e);\n32  } finally {\n33   TradingUtils.closeSilently(httpClient);\n\
    34  }\n35  return accInfos;\n36 }\n```\n\nOANDA REST API 有一个端点，可以通过单个请求检索所有账户的信息：\n\
    \n```\n1 GET v1/accounts\n```\n\n然而，查看代码清单 2.7，我们仍然迭代地调用提供单个账户全部信息的函数。我们为什么要这样做？原因是，当我们使用端点\
    \ `v1/accounts` 请求所有账户的信息时，OANDA 并不提供构建 `Account` POJO 所需的全部信息，从下面的响应中可以明显看出：\n\
    \n```\n 1 {\n 2   \"accounts\": [\n 3     {\n 4     \"accountId\" : 1234567,\n\
    \ 5     \"accountName\" : \"Primary\",\n 6     \"accountCurrency\" : \"GBP\",\n\
    \ 7     \"marginRate\" : 0.05\n 8     },\n 9     {\n10     \"accountId\" : 2345678,\n\
    11     \"accountName\" : \"EUR Account\",\n12     \"accountCurrency\" : \"EUR\"\
    ,\n13     \"marginRate\" : 0.1\n14     }\n15   ]\n16 }\n```"
- fmt: "### 2.3 Encapulating everything behind a generic `AccountInfoService`\n\n\
    As previously discussed, one of our key design objective is to to be able to encapsulate\
    \ providers behind meaningful services so that if required, we can switch provider\
    \ implementations and change from provider OANDA to say provider LMAX without\
    \ having to change a single line of compiled code. Just changes in the Spring\
    \ configuration will hopefully help us to be able to make this transition smoothly.\
    \ The `AccountInfoService`, in addition for providing a facade for all `AccountDataProvider`\
    \ methods, has 3 additional useful methods:\n\n```\n1 public Collection<K> findAccountsToTrade();\n\
    \n3 public double calculateMarginForTrade(K accountId, TradeableInstrument<N>\n\
    4         instrument, int units);\n\n6 public double calculateMarginForTrade(Account<K>\
    \ accountInfo,\n7       TradeableInstrument<N> instrument, int units);\n```\n\n\
    Before discussing these, lets quickly have a glance over the constructor which\
    \ defines the dependencies of the service.\n\n```\n 1 /**\n 2  *\n 3  * @param\
    \ <K>\n 4  *            type of accountId\n 5  * @param <N>\n 6  *           \
    \ type of The type of instrumentId in class TradeableInstrument\n 7  * @see TradeableInstrument\n\
    \ 8  */\n 9 public class AccountInfoService<K, N> {\n\n11 \tprivate final AccountDataProvider<K>\
    \ accountDataProvider;\n12 \tprivate final BaseTradingConfig baseTradingConfig;\n\
    13 \tprivate final CurrentPriceInfoProvider<N> currentPriceInfoProvider;\n14 \t\
    private final ProviderHelper providerHelper;\n15 \tprivate Comparator<Account<K>>\
    \ accountComparator = new MarginAvailableComparator<K>();\n\n17 \tpublic AccountInfoService(AccountDataProvider<K>\
    \ accountDataProvider,\n18 \t\tCurrentPriceInfoProvider<N> currentPriceInfoProvider,\n\
    19 \t\tBaseTradingConfig baseTradingConfig, ProviderHelper providerHelper) {\n\
    20 \t\tthis.accountDataProvider = accountDataProvider;\n21 \t\tthis.baseTradingConfig\
    \ = baseTradingConfig;\n22 \t\tthis.currentPriceInfoProvider = currentPriceInfoProvider;\n\
    23 \t\tthis.providerHelper = providerHelper;\n24 \t}\n```\n\n*   `AccountDataProvider`\
    \ is the obvious one, as the service needs to be able to provide information for\
    \ an individual accountId and all available accounts.\n*   `CurrentPriceInfoProvider`\
    \ is a provider of current prices for a given set of instruments and will be discussed\
    \ in later chapters.\n*   `BaseTradingConfig`, as discussed earlier is an object\
    \ that holds all the configuration parameters.\n*   `ProviderHelper`, also discussed\
    \ previously, provides helper methods to deal with provider related data transformations.\n\
    \nWe now turn our attention to the discussion of `findAccountsToTrade()` method.\
    \ As the name suggests, this method would try to find available accounts to trade,\
    \ given certain conditions are met. Often, before placing a trade/order, the first\
    \ exercise would be to find a suitable account. Of course, this discussion would\
    \ not apply to platforms where there is only a single account to trade and all\
    \ trades executed, by default belong to this account.\n\n```\n 1 public Collection\
    \ < K > findAccountsToTrade() {\n 2  List < Account < K >> accounts = Lists.newArrayList(getAllAccounts());\n\
    \ 3  Collection < K > accountsFound = Lists.newArrayList();\n 4  Collections.sort(accounts,\
    \ accountComparator);\n 5  for (Account < K > account: accounts) {\n 6   if (account.getAmountAvailableRatio()\
    \ >= baseTradingConfig.getMinReserveRatio() && account.getNetAssetValue() >= baseT\\\
    \n 7 radingConfig.getMinAmountRequired()) {\n 8    accountsFound.add(account.getAccountId());\n\
    \ 9   }\n10  }\n11  return accountsFound;\n12 }\n```\n\nThe method first fetches\
    \ all available accounts by calling `getAllAccounts()`, which just delegates to\
    \ the `accountProvider`\n\n```\n1 public Collection<Account<K>> getAllAccounts()\
    \ {\n2   return this.accountDataProvider.getLatestAccountInfo();\n3 }\n```\n\n\
    Next, it tries to sort the accounts available, in the decreasing order of margin\
    \ availability using the `MarginAvailableComparator`. This comparator places the\
    \ account with the maximum margin at the top of list and so on. The idea is to\
    \ pick the account with maximum margin available. Of course, this is just a strategy\
    \ to find an account when the accounts with denominated currencies are comparable\
    \ in exchange rates. For e.g. if one has 3 accounts denominated in currencies\
    \ CHF, EUR, USD then this works because EURCHF ~= 1.08, USDCHF ~=1.0 and EURUSD\
    \ ~= 1.0 (rates at the time of writing). This should fulfill the strategy of account\
    \ with the maximum available margin, however it will fail miserably, if for example,\
    \ atleast of the currencies is JPY instead of EUR. Since CHFJPY and USDJPY at\
    \ the time of writing ~= 122.0, this is not ideal as most of the time the JPY\
    \ account will be picked.\n\n```\n 1 static class MarginAvailableComparator <\
    \ K > implements Comparator < Account < K >> {\n\n3  @Override\n 4  public int\
    \ compare(Account < K > ai1, Account < K > ai2) {\n 5   if (ai1.getMarginAvailable()\
    \ > ai2.getMarginAvailable()) {\n 6    return -1;\n 7   } else if (ai1.getMarginAvailable()\
    \ < ai2.getMarginAvailable()) {\n 8    return 1;\n 9   }\n10   return 0;\n11 \
    \ }\n\n13 }\n```\n\nNext, the account is selected to place an order/trade only\
    \ if the following condition is met\n\n```\n1 if (account.getAmountAvailableRatio()\
    \ >= baseTradingConfig.getMinReserveRatio()\n2     && account.getNetAssetValue()\
    \ >= baseTradingConfig.getMinAmountRequired()) {\n3  accountsFound.add(account.getAccountId());\n\
    4 }\n```\n\nAssuming that\n\n```\n1 minReserveRatio=0.2\n2 minAmountRequired=50.0\n\
    ```\n\nMinimum Reserve ratio of 0.2 is a metric which stipulates that if a GBP\
    \ account has total amount of £1000, then we must only select this account to\
    \ trade if the amount available to trade > 0.2 x £1000(£200). I would strongly\
    \ recommend to have this validation in place, simply because this leaves the account\
    \ with a decent buffer and prevents the NAV going negative, in case of wild swings\
    \ in prices. This ought to be a higher value if the account leverage is quite\
    \ high, say 1:50.\n\nMinimum Amount required is a metric which stipulates that\
    \ an account must have a minimum net asset value to be considered for trading.\
    \ In this case we must have atleast £50 in NAV to be eligible to trade.\n\nNext\
    \ we discuss, the 2 overloaded methods `calculateMarginForTrade`. As the name\
    \ suggests, these methods calculate the margin requirement for a given trade/order.\
    \ These methods would prove very useful in situations where we want to place bulk\
    \ orders for various instruments and want to get an idea of margin requirements\
    \ for them or as a pre validation check before sending the order to the platform,\
    \ making sure that margin requirement for the given order is less than the amount\
    \ available.\n\n```\n 1 /*\n 2 \t * ({BASE} / {Home Currency}) * units) / (margin\
    \ ratio)\n 3 \tFor example, suppose:\n 4 \tHome Currency = USD\n 5 \tCurrency\
    \ Pair = GBP/CHF\n 6 \tBase = GBP; Quote = CHF\n 7 \tBase / Home Currency = GBP/USD\
    \ = 1.5819\n 8 \tUnits = 1000\n 9 \tMargin Ratio = 20:1\n10 \tThen, margin used:\n\
    11 \t= (1.5819 * 1000) / 20\n12 \t= 79.095 USD\n13 */\n14 @SuppressWarnings(\"\
    unchecked\")\n15 public double calculateMarginForTrade(Account < K > accountInfo,\
    \ TradeableInstrument < N > instrument, int units) {\n16  String tokens[] = TradingUtils.splitInstrumentPair(instrument.getInstrument());\n\
    17  String baseCurrency = tokens[0];\n18  double price = 1.0;\n\n20  if (!baseCurrency.equals(accountInfo.getCurrency()))\
    \ {\n21   String currencyPair = this.providerHelper.fromIsoFormat(baseCurrency\
    \ + accountInfo.getCurrency());\n```"
