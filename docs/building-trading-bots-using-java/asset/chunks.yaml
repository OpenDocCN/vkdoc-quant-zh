- fmt: "The private method does the bulk of the work as seen above. The 2 public overloaded\
    \ methods get the url computed and then delegate the rest to this private method.\
    \ The following line of code is extremely important since we are passing a unix\
    \ timestamp as a query param (in case of date range) rather than a formatted date\
    \ string which is what OANDA expects if the header is omitted.\n\n```\nhttpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
    ```\n\nThe rest of the code is fairly straightforward. Once a successful response\
    \ is received, we just have to parse the json payload which contains information\
    \ for all the candle sticks requested.\n\n## 5.5 Discussion: An alternate database\
    \ implementation\n\nIn this section we briefly touch upon an alternate way for\
    \ retrieving candle stick information. A lot of installations have a tick datawarehouse/database\
    \ and might prefer to tap into these datasources. A tick database table might\
    \ look like the following (assuming an `INSTRUMENT` table already exists which\
    \ defines all tradeable instruments).\n\n```\nCREATE TABLE TICK_DATA (\n    TICK_ID\
    \ INTEGER PRIMARY KEY,\n    INSTRUMENT_ID INTEGER NOT NULL REFERENCES INSTRUMENT(INSTRUMENT_ID),\n\
    \    TICK_EVENT_TIMESTAMP TIMESTAMP NOT NULL,\n    BID_PRICE DECIMAL NOT NULL,\n\
    \    ASK_PRICE DECIMAL NOT NULL\n)\n```\n\nAssuming that a there is a market data\
    \ feed that constantly populates our `TICK_DATA` table for every tick, we have\
    \ all the information to pretty much provide all the information that OANDA REST\
    \ API is providing. However, we have some work to do before we can present the\
    \ data to the client in exactly the way as OANDA does. At a high level the following\
    \ needs to happen.\n\n**Case 1: Retrieve candle sticks, given from, to dates and\
    \ a granularity (G) for a given instrument (I).**\n\n- Divide **from, to** time\
    \ period into N intervals, each of length G. So interval 1 (`I1` = [from, from+G]),\
    \ interval 2 (`I2` = [from+G, from+2G]) .. interval N (`IN` = [from+(N-1)*G, to]).\n\
    - Using a `SELECT` query, retrieve all data for the instrument where `TICK_EVENT_TIMESTAMP`\
    \ is between from and to dates, ordered by `TICK_EVENT_TIMESTAMP`.\n- For each\
    \ row R retrieved, assign row to an interval `IM` such that `R[TICK_EVENT_TIMESTAMP]`\
    \ value >= `IM[0]` and <= `IM[1]`. This will yield a collection of rows for each\
    \ interval.\n- We are now in a position to find the open, close, high, low prices\
    \ for each interval `IM`. Lets say this interval `IM` has T rows `R1`..`RT`.\n\
    - `OpenM`=avg(`R1[BID_PRICE]`, `R1[ASK_PRICE]`)\n- `CloseM`=avg(`RT[BID_PRICE]`,\
    \ `RT[ASK_PRICE]`)\n- `HighM`=max(avg(`R1[BID_PRICE]`, `R1[ASK_PRICE]`), avg(`R2[BID_PRICE]`,\
    \ `R2[ASK_PRICE]`)..avg(`RT[BID_PRICE]`, `RT[ASK_PRICE]`))\n- `LowM`=min(avg(`R1[BID_PRICE]`,\
    \ `R1[ASK_PRICE]`), avg(`R2[BID_PRICE]`, `R2[ASK_PRICE]`)..avg(`RT[BID_PRICE]`,\
    \ `RT[ASK_PRICE]`))\n- `EventDateM`=`IM[0]`\n\n**Case 2: Retrieve candle sticks,\
    \ given count N and a granularity (G) for a given instrument (I).**\n\n- Calculate\
    \ date **from** = `now()` - N*G\n- **to** = `now()`\n- Call function which implements\
    \ **Case 1**\n\nA skeleton of our Database based provider implementation might\
    \ look like.\n\n```\nimport org.apache.commons.lang3.tuple.ImmutablePair;\nimport\
    \ com.google.common.collect.Maps;\n...\n...\npublic class DatabaseHistoricMarketDataProvider\
    \ implements HistoricMarketDataProvider<Long> {\n    /*\n    TickDataDao manages\
    \ the database interaction and retrieves necessary tick data in the form of TickData\
    \ POJOs.\n    */\n    private final TickDataDao tickDataDao;\n\n    public DatabaseHistoricMarketDataProvider(TickDataDao\
    \ tickDataDao) {\n        this.tickDataDao = tickDataDao;\n    }\n\n    private\
    \ List<ImmutablePair<DateTime,DateTime>> getIntervals(DateTime from, DateTime\
    \ to,\n            CandleStickGranularity granularity) {\n        /*\n       \
    \ implement the logic to divide from,to into pairs or tuples of date ranges that\
    \ span granularity\n        */\n    }\n\n    private Map<ImmutablePair<DateTime,DateTime>,\
    \ List<TickData>>\n            distributeInTimeBuckets(List<ImmutablePair<DateTime,DateTime>>\
    \ timeBuckets,\n            List<TickData> tickDataList) {\n        Map<ImmutablePair<DateTime,DateTime>,\
    \ List<TickData>> distributionMap = Maps.newLinkedHashMap();\n        /*\n   \
    \     Implement the logic to assign tick data from the database into various time\
    \ range buckets.\n        */\n        return distributionMap;\n    }\n\n    private\
    \ List<CandleStick<Long>> processTickDataBuckets(Map<ImmutablePair<DateTime,DateTime>,\n\
    \            List<TickData>> distributionMap, TradeableInstrument<Long> instrument,\n\
    \            CandleStickGranularity granularity) {\n        /*\n        Here each\
    \ entry of map should generate a CandleStick POJO. Also do the computations such\
    \ as finding min,\n        max and average of prices as discussed previously.\n\
    \        */\n    }\n\n    @Override\n    public List<CandleStick<Long>> getCandleSticks(TradeableInstrument<Long>\
    \ instrument, CandleStickGranularity granularity,\n            DateTime from,\
    \ DateTime to) {\n        List<ImmutablePair<DateTime,DateTime>> intervals = getIntervals(from,to,granularity);\n\
    \        List<TickData> ticks = this.tickDao.getTicks(intrument.getId(), from,\
    \ to);\n        Map<ImmutablePair<DateTime,DateTime>, List<TickData>> distributionMap\
    \ =\n            distributeInTimeBuckets(intervals, ticks);\n        return processTickDataBuckets(distributionMap,instrument,granularity);\n\
    \    }\n\n    private ImmutablePair<DateTime, DateTime> getFromToDates(CandleStickGranularity\
    \ granularity, int count) {\n        DateTime to = DateTime.now();\n        /*\n\
    \        Use granularity to go back in time \"count\" times, to arrive at \"to\"\
    \ Date\n        */\n    }\n\n    @Override\n    public List<CandleStick<Long>>\
    \ getCandleSticks(TradeableInstrument<Long> instrument,\n            CandleStickGranularity\
    \ granularity, int count) {\n        ImmutablePair<DateTime,DateTime> fromToPair\
    \ = getFromToDates(granularity,count);\n        return getCandleSticks(instrument,granularity,fromToPair.getLeft(),fromToPair.getRight());\n\
    \    }\n}\n```\n\n## 5.6 Candle sticks for moving average calculations\n\nMoving\
    \ Averages are widely used in technical analysis and forecasting methods. All\
    \ moving averages use candle stick data for computation. The 3 most widely used\
    \ moving averages are:\n\n- **Simple Moving Average (SMA):** A SMA, also known\
    \ as arithmetic average, is the most common and simplest of the moving averages.\
    \ It is simply the average of prices of the candle sticks. Each price is equally\
    \ weighted.\n- **Weighted Moving Average (WMA):** A WMA assigns a weighting factor\
    \ to each value in the candle sticks list according to its age. The most recent\
    \ price gets the most weight and on the contrary the first one gets the least\
    \ weight. So for example, if there are N candle sticks then M-th candle stick\
    \ will have weight `M/(N x (N+1)/2)`. The sum of weights always equates to 1.0.\n\
    - **Exponential Moving Average (EMA):** An EMA also assigns a weight to each value,\
    \ according to its age. And like WMA, the most recent price gets the most weight\
    \ and the first one in the list, the least weight. The weight calculation for\
    \ each candle stick is slightly more involved and is discussed thoroughly at [https://en.wikipedia.org/wiki/Moving_average#Exponential_moving_average](https://en.wikipedia.org/wiki/Moving_average#Exponential_moving_average)."
