    \ order.get(side));\n  final OrderType orderType = OandaUtils.toOrderType((String)\
    \ order.get(type));\n  final double orderTakeProfit = ((Number) order.get(takeProfit)).doubleValue();\n\
    \  final double orderStopLoss = ((Number) order.get(stopLoss)).doubleValue();\n\
    \  final double orderPrice = ((Number) order.get(price)).doubleValue();\n  final\
    \ Long orderId = (Long) order.get(id);\n  Order<String, Long> pendingOrder = new\
    \ Order<String, Long>(\n   new TradeableInstrument<String>(orderInstrument), orderUnits,\
    \ orderSide, orderType,\n   orderTakeProfit, orderStopLoss, orderPrice);\n  pendingOrder.setOrderId(orderId);\n\
    \  return pendingOrder;\n}\n```\n\n接下来我们要关注的方法是 `pendingOrdersForInstrument`。该方法的职责是查找所有账户中给定交易产品的所有订单。我们已经看到有一个私有方法，它可以返回给定账户的所有订单，如果提供了交易产品参数，则进行过滤。因此，我们只需要获取交易账户持有的所有账户列表，然后遍历每个账户，调用这个内部方法来检索所有订单。下面的代码基本描述了这一过程：\n\
    \n```java\n@Override\npublic Collection<Order<String, Long>> pendingOrdersForInstrument(TradeableInstrument<String>\
    \ instrument) {\n  Collection<Account<Long>> accounts = this.accountDataProvider.getLatestAccountInfo();\n\
    \  Collection<Order<String, Long>> allOrders = Lists.newArrayList();\n  for (Account<Long>\
    \ account: accounts) {\n   allOrders.addAll(this.pendingOrdersForAccount(account.getAccountId(),\
    \ instrument));\n  }\n  return allOrders;\n}\n```\n\n上述实现为 `allPendingOrders`\
    \ 方法的非常直接的实现铺平了道路：\n\n```java\n@Override\npublic Collection<Order<String, Long>>\
    \ allPendingOrders() {\n    return pendingOrdersForInstrument(null);\n}\n```\n\
    \n我们还需要描述的最后一个方法是 `pendingOrderForAccount`。该方法用于检索给定账户的单个订单，前提是我们提供了精确的订单 ID。该方法调用\
    \ `orderForAccountUrl` 来获取请求信息的 URL。之前我们在尝试使用 `HttpPatch` 修改现有订单时调用过该方法。这次我们只需要使用不同的\
    \ HTTP 动词 `HttpGet`，从相同的 URL 检索订单信息。一个示例 JSON 响应如下：\n\n```json\n{\n    \"id\"\
    : 1001,\n    \"instrument\": \"USD_JPY\",\n    \"units\": 125,\n    \"side\":\
    \ \"sell\",\n    \"type\": \"marketIfTouched\",\n    \"time\": \"1444116207000000\"\
    ,\n    \"price\": 122.15,\n    \"takeProfit\": 119.25,\n    \"stopLoss\": 125.00,\n\
    \    \"expiry\": \"1444721003000000\",\n    \"upperBound\": 0,\n    \"lowerBound\"\
    : 0,\n    \"trailingStop\": 0\n}\n```\n\n启动这种响应的代码如下：\n\n```java\n@Override\n\
    public Order<String, Long> pendingOrderForAccount(Long orderId, Long accountId)\
    \ {\n  CloseableHttpClient httpClient = getHttpClient();\n  try {\n   HttpUriRequest\
    \ httpGet = new HttpGet(orderForAccountUrl(accountId,\n    orderId));\n   httpGet.setHeader(this.authHeader);\n\
    \   httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    \   HttpResponse resp = httpClient.execute(httpGet);\n   String strResp = TradingUtils.responseToString(resp);\n\
    \   if (strResp != StringUtils.EMPTY) {\n    JSONObject order = (JSONObject) JSONValue.parse(strResp);\n\
    \    return parseOrder(order);\n   } else {\n    TradingUtils.printErrorMsg(resp);\n\
    \   }\n  } catch (Exception e) {\n   LOG.error(e);\n  } finally {\n   TradingUtils.closeSilently(httpClient);\n\
    \  }\n  return null;\n}\n```\n\n至此，我们结束了对提供者 `OandaOrderManagementProvider` 为订单管理服务提供的所有方法的讨论。"
- fmt: "### 6.4 A Simple `OrderInfoService`\n\nIn keeping with the theme of encapsulating\
    \ our provider methods behind a service, we need to code a `OrderInfoService`\
    \ that encapsulates all the read only methods of the `OrderManagementProvider`.\
    \ It is fairly straightforward and reads as follows\n\n```\n 1 public class OrderInfoService\
    \ < M, N, K > {\n\n 3  private final OrderManagementProvider < M,\n 4  N,\n 5\
    \  K > orderManagementProvider;\n\n 7  public OrderInfoService(OrderManagementProvider\
    \ < M, N, K > orderManagementProvider) {\n 8   this.orderManagementProvider =\
    \ orderManagementProvider;\n 9  }\n\n11  public Collection < Order < N,\n12  M\
    \ >> allPendingOrders() {\n13   return this.orderManagementProvider.allPendingOrders();\n\
    14  }\n\n16  public Collection < Order < N,\n17  M >> pendingOrdersForAccount(K\
    \ accountId) {\n18   return this.orderManagementProvider.pendingOrdersForAccount(accountId);\n\
    19  }\n\n21  public Collection < Order < N,\n22  M >>\n23  pendingOrdersForInstrument(TradeableInstrument\
    \ < N > instrument) {\n24   return this.orderManagementProvider.pendingOrdersForInstrument(instrument);\n\
    25  }\n\n27  public Order < N,\n28  M > pendingOrderForAccount(M orderId, K accountId)\
    \ {\n29   return this.orderManagementProvider.pendingOrderForAccount(orderId,\
    \ accountId);\n30  }\n\n32  public int findNetPositionCountForCurrency(String\
    \ currency) {\n33   Collection < Order < N, M >> allOrders = allPendingOrders();\n\
    34   int positionCount = 0;\n35   for (Order < N, M > order: allOrders) {\n36\
    \    positionCount +=\n37     TradingUtils.getSign(order.getInstrument().getInstrument(),\n\
    38      order.getSide(), currency);\n39   }\n40   return positionCount;\n41  }\n\
    42 }\n```\n\nAll the methods except `findNetPositionCountForCurrency` delegate\
    \ to the underlying `OrderManagementProvider` to fulfill the requested information.\
    \ Therefore, what remains to be discussed is the `findNetPositionCountForCurrency`\
    \ method. Taking a closer look at the method code, it requests for all the pending\
    \ order across all accounts and calculates the net position for a currency by\
    \ looking at the sign (-1 or +1) returned from the `TradingUtils.getSign` method.\
    \ Just to remind ourselves, this method returns a -1 if we are selling the given\
    \ currency or +1 if we are buying it. For e.g. if we sell the pair `EUR_CHF` by\
    \ placing a limit order, passing the currency `EUR` would yield -1 and `CHF` +1.\n\
    \nThe use of the method `findNetPositionCountForCurrency` is not immediately apparent.\
    \ However, it is quite useful from risk management perspective, which we discuss\
    \ in later chapters, to know how much long or short we are on a given currency.\n\
    \n### 6.5 Validating orders before execution: `PreOrderValidationService`\n\n\
    Before we turn our attention to discussing the service that encapsulates the order\
    \ execution, modification and deletion part, we discuss an important service that\
    \ does some pre order execution checks, and only if those checks succeed, that\
    \ a order is executed. This again, is purely in place, for risk management perspective,\
    \ and can be bypassed if really required. We will discuss in later chapters, why\
    \ it is really important to have risk management controls in place, especially\
    \ for highly leveraged accounts. However for our discussion, i came up with some\
    \ rules or checks which must be done in order to give a green light to the order\
    \ execution. These set of checks may or may not be sufficient for all cases, but\
    \ the point is that we must do some due diligence upfront, before placing an order.\
    \ The rules i have come up with are:\n\n1.  Be overweight or underweight a currency\
    \ only upto a given level. This is to say that, we must have both long and short\
    \ positions for say `AUD`, and if we do have net long or short positions, it must\
    \ not exceed a given configurable number say 4\\. So, if we already have 4 open\
    \ trades like long `AUD_USD`, long `AUD_CHF`, short `GBP_AUD`, short `EUR_AUD`,\
    \ which means we are quite heavyweight `AUD`, any further long `AUD` positions\
    \ must be rejected. For e.g. if a strategy recommends placing a market order for\
    \ long `AUD_JPY`, this order must be rejected, as our mandate is not to exceed\
    \ a long or short position it it is already at max level, 4 in our case.\n2. \
    \ Do not trade a currency pair if its 10 yr weighted moving average (`WMA`) is\
    \ within `x%` of it’s historical high or low. This needs a bit of explanation.\
    \ Let’s say the 10yr `WMA` of `EUR_USD` is 1.3 and the current spot price is 1.08\\\
    . We would be extremely reluctant to place a short `EUR_USD` order at this level.\
    \ This is because according to our rule we can only go short, upto 10%(assuming\
    \ `x=10`) of the 10yr `WMA`. So subtracting 10% of 1.3 from 1.3 gives 1.17\\.\
    \ So if the price dips below that which is it at currently, our check will not\
    \ allow to place a short `EUR_USD` order. Similarly we would not go long `EUR_USD`\
    \ if the current price is 1.45 (it is greater than 1.3+10% of 1.3 = 1.43).\n3.\
    \  We do not want to place an order if an existing trade with the pair is already\
    \ active. This is to ensure that we do not accidentally close/reduce an existing\
    \ trading position by placing an order in the opposite direction or to add to\
    \ an existing position to double up on a trade.\n\nThese rules of course may not\
    \ make complete sense and may go against the advise of your winning strategy,\
    \ but the point is to have some sort of pre validation rules which do not unnecessarily\
    \ increase the risk in your portfolio. Of course one is welcome to completely\
    \ trash them and write their own, but as long as you have some meaningful set\
    \ of rules/checks, they always helps you in the long run.\n\nNow let’s jump straight\
    \ into the code, which attempts to program these rules in the service. We begin\
    \ first by defining the constructor which accepts all the dependencies of this\
    \ service.\n\n```\n 1 public class PreOrderValidationService < M, N, K > {\n 2\
    \   private final TradeInfoService < M,\n 3   N,\n 4   K > tradeInfoService;\n\
    \ 5   private final MovingAverageCalculationService < N >\n 6   movingAverageCalculationService;\n\
    \ 7   private final BaseTradingConfig baseTradingConfig;\n 8   private final OrderInfoService\
    \ < M,\n 9   N,\n10   K > orderInfoService;\n11   static final int TEN_YRS_IN_MTHS\
    \ = 120;\n```"
