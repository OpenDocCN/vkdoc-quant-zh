  trans: "\n上述私有方法完成了大部分工作。两个公共重载方法先获取计算出的 URL，然后将剩余工作委托给这个私有方法。下面这行代码至关重要，因为我们传递了一个\
    \ Unix 时间戳作为查询参数（在日期范围的情况下），而非 OANDA 在省略标头时所期望的格式化日期字符串。\n\n```\nhttpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
    ```\n\n其余代码则相当直观。一旦收到成功的响应，我们只需解析包含所有请求的蜡烛线信息的 JSON 载荷即可。\n\n## 5.5 讨论：另一种数据库实现\n\
    \n在本节中，我们将简要介绍另一种检索蜡烛线信息的方法。许多安装环境都设有报价数据仓库/数据库，并且可能倾向于利用这些数据源。一个报价数据库表可能如下所示（假设已存在一个定义了所有可交易工具的\
    \ `INSTRUMENT` 表）。\n\n```\nCREATE TABLE TICK_DATA (\n    TICK_ID INTEGER PRIMARY\
    \ KEY,\n    INSTRUMENT_ID INTEGER NOT NULL REFERENCES INSTRUMENT(INSTRUMENT_ID),\n\
    \    TICK_EVENT_TIMESTAMP TIMESTAMP NOT NULL,\n    BID_PRICE DECIMAL NOT NULL,\n\
    \    ASK_PRICE DECIMAL NOT NULL\n)\n```\n\n假设有一个市场数据馈送持续为每个报价填充我们的 `TICK_DATA`\
    \ 表，那么我们就拥有几乎可以提供 OANDA REST API 所提供的所有信息。然而，在能够以与 OANDA 完全相同的方式向客户端呈现数据之前，我们还需要做一些工作。从高层来看，需要完成以下步骤。\n\
    \n**情况 1：给定起始日期、结束日期和粒度 (G)，检索特定工具 (I) 的蜡烛线。**\n\n- 将 **起始、结束** 时间段划分为 N 个区间，每个区间长度为\
    \ G。因此，区间 1（`I1` = [起始, 起始+G]）、区间 2（`I2` = [起始+G, 起始+2G]）……区间 N（`IN` = [起始+(N-1)*G,\
    \ 结束]）。\n- 使用 `SELECT` 查询，检索 `TICK_EVENT_TIMESTAMP` 介于起始和结束日期之间的该工具所有数据，并按 `TICK_EVENT_TIMESTAMP`\
    \ 排序。\n- 对于检索到的每一行 R，将其分配到一个区间 `IM`，要求 `R[TICK_EVENT_TIMESTAMP]` 值 >= `IM[0]`\
    \ 且 <= `IM[1]`。这将为每个区间生成一个行的集合。\n- 现在，我们可以找出每个区间 `IM` 的开盘价、收盘价、最高价和最低价。假设区间 `IM`\
    \ 有 T 行 `R1`……`RT`。\n- `OpenM` = avg(`R1[BID_PRICE]`, `R1[ASK_PRICE]`)\n- `CloseM`\
    \ = avg(`RT[BID_PRICE]`, `RT[ASK_PRICE]`)\n- `HighM` = max(avg(`R1[BID_PRICE]`,\
    \ `R1[ASK_PRICE]`), avg(`R2[BID_PRICE]`, `R2[ASK_PRICE]`)..avg(`RT[BID_PRICE]`,\
    \ `RT[ASK_PRICE]`))\n- `LowM` = min(avg(`R1[BID_PRICE]`, `R1[ASK_PRICE]`), avg(`R2[BID_PRICE]`,\
    \ `R2[ASK_PRICE]`)..avg(`RT[BID_PRICE]`, `RT[ASK_PRICE]`))\n- `EventDateM` = `IM[0]`\n\
    \n**情况 2：给定数量 N 和粒度 (G)，检索特定工具 (I) 的蜡烛线。**\n\n- 计算日期 **起始** = `now()` - N*G\n\
    - **结束** = `now()`\n- 调用实现 **情况 1** 的函数\n\n我们基于数据库的提供者实现的框架可能如下所示。\n\n```\nimport\
    \ org.apache.commons.lang3.tuple.ImmutablePair;\nimport com.google.common.collect.Maps;\n\
    ...\n...\npublic class DatabaseHistoricMarketDataProvider implements HistoricMarketDataProvider<Long>\
    \ {\n    /*\n    TickDataDao 管理数据库交互，并以 TickData POJO 的形式检索必要的报价数据。\n    */\n\
    \    private final TickDataDao tickDataDao;\n\n    public DatabaseHistoricMarketDataProvider(TickDataDao\
    \ tickDataDao) {\n        this.tickDataDao = tickDataDao;\n    }\n\n    private\
    \ List<ImmutablePair<DateTime,DateTime>> getIntervals(DateTime from, DateTime\
    \ to,\n            CandleStickGranularity granularity) {\n        /*\n       \
    \ 实现将起始、结束日期划分为跨度为一个粒度的日期范围对或元组的逻辑\n        */\n    }\n\n    private Map<ImmutablePair<DateTime,DateTime>,\
    \ List<TickData>>\n            distributeInTimeBuckets(List<ImmutablePair<DateTime,DateTime>>\
    \ timeBuckets,\n            List<TickData> tickDataList) {\n        Map<ImmutablePair<DateTime,DateTime>,\
    \ List<TickData>> distributionMap = Maps.newLinkedHashMap();\n        /*\n   \
    \     实现将从数据库获取的报价数据分配到各个时间范围桶中的逻辑。\n        */\n        return distributionMap;\n\
    \    }\n\n    private List<CandleStick<Long>> processTickDataBuckets(Map<ImmutablePair<DateTime,DateTime>,\n\
    \            List<TickData>> distributionMap, TradeableInstrument<Long> instrument,\n\
    \            CandleStickGranularity granularity) {\n        /*\n        这里，映射中的每个条目应生成一个\
    \ CandleStick POJO。同时执行之前讨论过的计算，如查找最小值、\n        最大值和价格平均值等。\n        */\n   \
    \ }\n\n    @Override\n    public List<CandleStick<Long>> getCandleSticks(TradeableInstrument<Long>\
    \ instrument, CandleStickGranularity granularity,\n            DateTime from,\
    \ DateTime to) {\n        List<ImmutablePair<DateTime,DateTime>> intervals = getIntervals(from,to,granularity);\n\
    \        List<TickData> ticks = this.tickDao.getTicks(intrument.getId(), from,\
    \ to);\n        Map<ImmutablePair<DateTime,DateTime>, List<TickData>> distributionMap\
    \ =\n            distributeInTimeBuckets(intervals, ticks);\n        return processTickDataBuckets(distributionMap,instrument,granularity);\n\
    \    }\n\n    private ImmutablePair<DateTime, DateTime> getFromToDates(CandleStickGranularity\
    \ granularity, int count) {\n        DateTime to = DateTime.now();\n        /*\n\
    \        使用粒度向前回溯 \"count\" 次，以得到 \"起始\" 日期\n        */\n    }\n\n    @Override\n\
    \    public List<CandleStick<Long>> getCandleSticks(TradeableInstrument<Long>\
    \ instrument,\n            CandleStickGranularity granularity, int count) {\n\
    \        ImmutablePair<DateTime,DateTime> fromToPair = getFromToDates(granularity,count);\n\
    \        return getCandleSticks(instrument,granularity,fromToPair.getLeft(),fromToPair.getRight());\n\
    \    }\n}\n```\n\n## 5.6 用于移动平均计算的蜡烛线\n\n移动平均线广泛应用于技术分析和预测方法中。所有移动平均线都使用蜡烛数据进行计算。最常用的三种移动平均线是：\n\
    \n- **简单移动平均线 (SMA)：** SMA，也称为算术平均，是最常见且最简单的移动平均线。它仅仅是蜡烛线价格的平均值。每个价格的权重相同。\n-\
    \ **加权移动平均线 (WMA)：** WMA 根据蜡烛线列表中每个数值的时间顺序分配权重。最近的价格权重最大，反之，最早的价格权重最小。例如，如果有 N\
    \ 个蜡烛线，那么第 M 个蜡烛线的权重为 `M/(N x (N+1)/2)`。权重之和始终等于 1.0。\n- **指数移动平均线 (EMA)：** EMA\
    \ 同样根据每个数值的时间顺序分配权重。与 WMA 一样，最近的价格权重最大，列表中最早的价格权重最小。每个蜡烛线的权重计算略微复杂，详细讨论请参见 [`en.wikipedia.org/wiki/Moving_average#Exponential_moving_average`](https://en.wikipedia.org/wiki/Moving_average#Exponential_moving_average)。\n"
- fmt: "### 5.7 `MovingAverageCalculationService`\n\nIn this section we discuss the\
    \ `MovingAverageCalculationService` which computes these averages that can help\
    \ in technical analysis and forecasting methods. This service will only implement\
    \ SMA and WMA. Lets start with the constructor definition which only has one dependency,\
    \ the `HistoricMarketDataProvider`.\n\n```java\npublic class MovingAverageCalculationService\
    \ < T > {\n\n  private final HistoricMarketDataProvider < T > historicMarketDataProvider;\n\
    \n  public MovingAverageCalculationService(HistoricMarketDataProvider < T > historicMarketDataProvider)\
    \ {\n    this.historicMarketDataProvider = historicMarketDataProvider;\n  }\n\
    ```\n\nThe main computations happen in the private methods `calculateSMA` and\
    \ `calculateWMA`:\n\n```java\n/*\n * Simple average calculation of close price\
    \ of candle stick\n */\nprivate double calculateSMA(List < CandleStick < T >>\
    \ candles) {\n  double sumsma = 0;\n  for (CandleStick < T > candle: candles)\
    \ {\n    sumsma += candle.getClosePrice();\n  }\n  return sumsma / candles.size();\n\
    }\n\n/*\n * If there are N candle sticks then, Mth candle stick will have weight\
    \ M/(N * (N+1)/2).\n * Therefore the divisor D for each candle is (N * (N+1)/2)\n\
    \ */\nprivate double calculateWMA(List < CandleStick < T >> candles) {\n  double\
    \ divisor = (candles.size() * (candles.size() + 1)) / 2;\n  int count = 0;\n \
    \ double sumwma = 0;\n  for (CandleStick < T > candle: candles) {\n    count++;\n\
    \    sumwma += (count * candle.getClosePrice()) / divisor;\n  }\n  return sumwma;\n\
    }\n```\n\nFor the calculations we use the `closePrice` of the candle stick. The\
    \ rest of the public methods are very straightforward and after fetching the candle\
    \ sticks, delegate to the private methods above for computation and return the\
    \ results. The service exposes an optimised method `calculateSMAandWMAasPair`\
    \ that can compute the 2 together and return the results. This is provided, so\
    \ that we do not fetch the same data twice. This can be especially expensive if\
    \ for example we want to get 10yrs worth of data with `Daily` granularity both\
    \ from OANDA and db query perspective. It might be fine, if the data is cached\
    \ in which case individual computation methods can be used.\n\n```java\npublic\
    \ double calculateSMA(TradeableInstrument < T > instrument, int count,\n  CandleStickGranularity\
    \ granularity) {\n  List < CandleStick < T >> candles = this.historicMarketDataProvider\n\
    \    .getCandleSticks(instrument, granularity, count);\n  return calculateSMA(candles);\n\
    }\n\npublic double calculateSMA(TradeableInstrument < T > instrument, DateTime\
    \ from, DateTime to,\n    CandleStickGranularity granularity) {\n    List < CandleStick\
    \ < T >> candles = this.historicMarketDataProvider.\n    getCandleSticks(instrument,\
    \ granularity, from, to);\n    return calculateSMA(candles);\n  }\n\n  /*\n  \
    \ * Optimization to get the two together in one call\n   */\npublic ImmutablePair\
    \ < Double, Double > calculateSMAandWMAasPair(TradeableInstrument < T > instrument,\n\
    \  int count, CandleStickGranularity granularity) {\n  List < CandleStick < T\
    \ >> candles = this.historicMarketDataProvider.getCandleSticks(instrument, granularity,\
    \ count);\n  return new ImmutablePair < Double, Double > (calculateSMA(candles),\
    \ calculateWMA(candles));\n}\n\npublic ImmutablePair < Double, Double > calculateSMAandWMAasPair(TradeableInstrument\
    \ < T > instrument,\n  DateTime from, DateTime to, CandleStickGranularity granularity)\
    \ {\n  List < CandleStick < T >> candles = this.historicMarketDataProvider.\n\
    \  getCandleSticks(instrument, granularity, from, to);\n  return new ImmutablePair\
    \ < Double, Double > (calculateSMA(candles), calculateWMA(candles));\n}\n\npublic\
    \ double calculateWMA(TradeableInstrument < T > instrument, int count,\n  CandleStickGranularity\
    \ granularity) {\n  List < CandleStick < T >> candles = this.historicMarketDataProvider.\n\
    \  getCandleSticks(instrument, granularity, count);\n  return calculateWMA(candles);\n\
    }\n\npublic double calculateWMA(TradeableInstrument < T > instrument, DateTime\
    \ from, DateTime to,\n  CandleStickGranularity granularity) {\n  List < CandleStick\
    \ < T >> candles = this.historicMarketDataProvider.\n  getCandleSticks(instrument,\
    \ granularity, from, to);\n  return calculateWMA(candles);\n}\n```\n\n### 5.8\
    \ Try it yourself\n\nIn this section we write demo programs to demonstrate the\
    \ API methods for `HistoricMarketDataProvider` and `MovingAverageCalculationService`.\n\
    \n```java\npackage com.precioustech.fxtrading.oanda.restapi.marketdata.historic;\n\
    \nimport java.util.List;\n\nimport org.apache.log4j.Logger;\nimport org.joda.time.DateTime;\n\
    \nimport com.precioustech.fxtrading.instrument.TradeableInstrument;\nimport com.precioustech.fxtrading.marketdata.historic.CandleStick;\n\
    import com.precioustech.fxtrading.marketdata.historic.CandleStickGranularity;\n\
    import com.precioustech.fxtrading.marketdata.historic.HistoricMarketDataProvider;\n\
    \npublic class HistoricMarketDataProviderDemo {\n\n  private static final Logger\
    \ LOG = Logger.getLogger(HistoricMarketDataProviderDemo.class);\n\n  private static\
    \ void usage(String[] args) {\n    if (args.length != 2) {\n      LOG.error(\"\
    Usage: HistoricMarketDataProviderDemo <url> <accesstoken>\");\n      System.exit(1);\n\
    \    }\n  }\n\n  public static void main(String[] args) {\n    usage(args);\n\
    \    final String url = args[0];\n    final String accessToken = args[1];\n  \
    \  HistoricMarketDataProvider < String > historicMarketDataProvider = new\n  \
    \  OandaHistoricMarketDataProvider(url, accessToken);\n    TradeableInstrument\
    \ < String > usdchf = new TradeableInstrument < String > (\"USD_CHF\");\n    List\
    \ < CandleStick < String >> candlesUsdChf = historicMarketDataProvider.getCandleSticks(usdchf,\n\
    \      CandleStickGranularity.D, 15);\n    LOG.info(String.format(\"++++++++++++++++++\
    \ Last %d Candle Sticks with Daily Granularity for %s +++\",\n      candlesUsdChf.size(),\
    \ usdchf.getInstrument()));\n\n    for (CandleStick < String > candle: candlesUsdChf)\
    \ {\n      LOG.info(candle);\n    }\n    TradeableInstrument < String > gbpaud\
    \ = new TradeableInstrument < String > (\"GBP_AUD\");\n    DateTime from = new\
    \ DateTime(1420070400000 L); // 01 Jan 2015\n    DateTime to = new DateTime(1451606400000\
    \ L); // 01 Jan 2016\n    List < CandleStick < String >> candlesGbpAud = historicMarketDataProvider.getCandleSticks(gbpaud,\n\
    \      CandleStickGranularity.M, from, to);\n\n    LOG.info(String.format(\"+++++++++++Candle\
    \ Sticks From %s To %s with Monthly Granularity for %s +++\",\n      from, to,\
    \ gbpaud.getInstrument()));\n    for (CandleStick < String > candle: candlesGbpAud)\
    \ {\n      LOG.info(candle);\n    }\n\n  }\n\n}\n```\n\n![Launch Configuration](images/00049.jpeg)\
    \ Launch Configuration ![Sample Output](images/00050.jpeg) Sample Output\n\n```java\n\
    package com.precioustech.fxtrading.oanda.restapi.streaming.marketdata;\n\nimport\
    \ org.apache.commons.lang3.tuple.ImmutablePair;\nimport org.apache.log4j.Logger;\n\
    import org.joda.time.DateTime;\n\nimport com.precioustech.fxtrading.instrument.TradeableInstrument;\n\
    import com.precioustech.fxtrading.marketdata.historic.CandleStickGranularity;\n\
    import com.precioustech.fxtrading.marketdata.historic.HistoricMarketDataProvider;\n\
    import com.precioustech.fxtrading.marketdata.historic.MovingAverageCalculationService;\n\
    import com.precioustech.fxtrading.oanda.restapi.marketdata.historic.OandaHistoricMarketDataProvider;\n\
    \npublic class MovingAverageCalculationServiceDemo {\n\n  private static final\
    \ Logger LOG = Logger.getLogger(MovingAverageCalculationServiceDemo.class);\n\n\
    \  private static void usage(String[] args) {\n    if (args.length != 2) {\n \
    \     LOG.error(\"Usage: MovingAverageCalculationServiceDemo <url> <accesstoken>\"\
    );\n      System.exit(1);\n    }\n  }\n```"
