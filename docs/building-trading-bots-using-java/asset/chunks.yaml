    \ 启动配置 ![示例输出](img/00052.jpeg) 示例输出\n\n## 6. 下达订单与交易\n\n本章我们将把注意力转向整个交易过程中最有趣的部分——下达订单与交易。订单是一种交易意图。当一个人为某种证券下达订单时，他/她希望订单能被成交，并期待价格朝有利方向变动。当订单被完全或部分成交时，会形成一个交易头寸。一个活跃的交易头寸会使你处于未实现盈亏的状态。当该交易头寸被平仓时，未实现的盈亏变为实际盈亏，交易者的总账面金额随之增加或减少。\n\
    \n大多数订单可分为以下几类：\n\n1.  **市价单**：市价单是一种旨在以平台上最佳可用价格（即期价格）立即成交的订单，前提是市场具有足够的流动性。\n\
    2.  **限价单**：限价单是指交易者自行设定买入或卖出证券的价格。本质上，这是一种*低于市价买入*或*高于市价卖出*的订单。例如，`EUR_USD` 当前交易价为\
    \ 1.06，我们认为中期走势上涨的概率极高，但仍存在下行风险，那么我们可下一个限价单，比如当价格触及 1.04（我们认为是该货币对的底部）时买入 `EUR_USD`。\n\
    3.  **获利了结单**：获利了结单用于平掉一个已达到预设盈利水平的现有交易头寸。例如，假设我们下了一个市价单以 1.545 的价格卖出 `GBP_USD`。我们希望当价格朝有利方向变动至少\
    \ 200 个点（即价格达到 1.525）时平仓。为了自动实现盈利，我们可以下一个获利了结单。\n4.  **止损单**：止损单与获利了结单相反。它用于在价格不利变动、未平仓交易头寸价值缩水时限制损失。假设我们下了一个市价单以\
    \ 1.07 的价格卖出 `EUR_CHF`。然而，我们希望当价格触及 1.085 时自动平仓，将损失限制在 150 个点内。这时止损单就非常有用。\n\n\
    **获利了结单**和**止损单**可归类为**限价单**的衍生类型。本质上，为了实现盈利或限制损失，我们是在下一个等待触发的订单，该订单会自动平掉一个交易头寸。这两种订单只有在存在一个未平仓交易头寸，且该头寸在订单触发时有被平仓风险时才有效。为此，交易头寸必须与订单类型相反。例如，我们必须持有一个证券的未平仓*买入*交易头寸，才能触发针对同一证券的**获利了结**/**止损**\
    \ *卖出*订单。\n\n其他可能遇到的订单类型如下：\n\n- 追踪止损\n- 立即成交否则取消\n- 全部成交否则取消"
- fmt: "### 6.1 `Order` POJO Definition\n\nTo place an order, we must first define\
    \ a POJO that will hold all required order information. Before that, lets have\
    \ a quick look at the enum that defines different order types we are going to\
    \ support and also the enum that defines buy/sell sides of an order.\n\n```\n\
    \ 1 public enum OrderType {\n 2  MARKET,\n 3  LIMIT;\n 4 }\n\n6 public enum TradingSignal\
    \ {\n7  LONG,\n8  SHORT,\n9  NONE;\n\n11  public TradingSignal flip() {\n12  \
    \ switch (this) {\n13    case LONG:\n14     return SHORT;\n15    case SHORT:\n\
    16     return LONG;\n17    default:\n18     return this;\n19   }\n20  }\n21 }\n\
    ```\n\nThe `OrderType` enum looks fairly straightforward. One might question why\
    \ we do not have the STOP-LOSS or TAKE-PROFIT order types. As discussed earlier,\
    \ these order types are derivatives of a `LIMIT` order and do not have to be specified\
    \ differently. This will become clearer when we discuss the mechanics of placing\
    \ an order. We denote the buy/sell sides of an order using the `TradingSignal`\
    \ enum. This enum as the name suggests, can be returned by a strategy function\
    \ to indicate that we must buy/sell a security. We will discuss this further when\
    \ we talk about a few sample trading strategies.\n\nCode Listing 6.1: `Order`\
    \ POJO definition\n\n```\n 1 /**\n 2  * @param <M>\n 3  *            The type\
    \ of instrumentId in class TradeableInstrument\n 4  * @param <N>\n 5  *      \
    \      The type of orderId\n 6  * @see TradeableInstrument\n 7  */\n 8 public\
    \ class Order < M, N > {\n 9  private final TradeableInstrument < M > instrument;\n\
    10  private final long units;\n11  private final TradingSignal side;\n12  private\
    \ final OrderType type;\n13  private final double takeProfit;\n14  private final\
    \ double stopLoss;\n15  private N orderId;\n16  private final double price;\n\n\
    18  /*\n19   * orderId not included in constructor because normally it is assigned\
    \ by the platform only\n20   * after order is placed successfully.\n21   */\n\
    22  public Order(TradeableInstrument < M > instrument, long units, TradingSignal\
    \ side, OrderType type,\n23   double price) {\n24   this(instrument, units, side,\
    \ type, 0.0, 0.0, price);\n25  }\n\n27  public Order(TradeableInstrument < M >\
    \ instrument, long units, TradingSignal side, OrderType type) {\n28   this(instrument,\
    \ units, side, type, 0.0, 0.0);\n29  }\n\n31  public Order(TradeableInstrument\
    \ < M > instrument, long units, TradingSignal side, OrderType type,\n32   double\
    \ takeProfit, double stopLoss) {\n33   this(instrument, units, side, type, takeProfit,\
    \ stopLoss, 0.0);\n34  }\n\n36  public Order(TradeableInstrument < M > instrument,\
    \ long units, TradingSignal side, OrderType type,\n37   double takeProfit, double\
    \ stopLoss, double price) {\n38   this.instrument = instrument;\n39   this.units\
    \ = units;\n40   this.side = side;\n41   this.type = type;\n42   this.takeProfit\
    \ = takeProfit;\n43   this.stopLoss = stopLoss;\n44   this.price = price;\n45\
    \  }\n\n47  public N getOrderId() {\n48   return orderId;\n49  }\n\n51  public\
    \ void setOrderId(N orderId) {\n52   this.orderId = orderId;\n53  }\n\n55  public\
    \ double getStopLoss() {\n56   return stopLoss;\n57  }\n\n59  public double getPrice()\
    \ {\n60   return price;\n61  }\n\n63  public TradeableInstrument < M > getInstrument()\
    \ {\n64   return instrument;\n65  }\n\n67  public long getUnits() {\n68   return\
    \ units;\n69  }\n\n71  public TradingSignal getSide() {\n72   return side;\n73\
    \  }\n\n75  public OrderType getType() {\n76   return type;\n77  }\n\n79  public\
    \ double getTakeProfit() {\n80   return takeProfit;\n81  }\n\n83  @Override\n\
    84  public String toString() {\n85   return \"Order [instrument=\" + instrument\
    \ + \", units=\" + units + \", side=\" + side +\n86    \", type=\" + type + \"\
    , takeProfit=\" + takeProfit + \", stopLoss=\" + stopLoss + \", orderId=\" +\n\
    87    orderId + \", price=\" + price + \"]\";\n88  }\n89 }\n```\n\nThe definition\
    \ of `Order` POJO is quite straightforward. The thing to point out is the several\
    \ ways that one can construct the POJO. The simplest being a constructor with\
    \ minimal information required like `instrument`, `units`, `side`, `type`. This\
    \ is a classic case of placing a vanilla market order (without profit target or\
    \ stop loss) whereby the platform should execute the order straightaway at the\
    \ best available spot price. On the other hand, one can specify the rest of the\
    \ attributes `takeProfit`, `stopLoss`, `price` to place a limit order. Another\
    \ observation one might make is the default value of `0.0` that is assigned to\
    \ say `takeProfit`, `stopLoss` attributes whilst using the simplest constructor\
    \ discussed before. This is an arguable assignment and may pose a problem on some\
    \ platforms as `0.0` may not be an acceptable default value for not setting a\
    \ stop loss limit. The alternative value preferred could be a `null`. If this\
    \ is the case then the POJO definition would have to revised and primitives such\
    \ as `double` replaced with `Double`.\n\n### 6.2 `OrderManagementProvider` Interface\n\
    \nWe now turn our attention to defining the interface that the provider must implement\
    \ to provide some useful order management services like placing and querying orders.\
    \ This is one of the few provider interfaces where we will see all CRUD operations\
    \ in action. Lets jump straight to the definition of the interface.\n\nCode Listing\
    \ 6.2: `OrderManagementProvider` interface\n\n```\n 1 /**\n 2  * A provider of\
    \ CRUD operations for an instrument Order. An order is normally\n 3  * placed\
    \ for a given instrument and/or an accountId. An accountId may not be\n 4  * required\
    \ if only a single account is allowed by the platform provider, in\n 5  * which\
    \ case all orders are created under the default account.\n 6  *\n 7  * @param\
    \ <M>\n 8  *            The type of orderId\n 9  * @param <N>\n10  *         \
    \   The type of instrumentId in class TradeableInstrument\n11  * @param <K>\n\
    12  *            The type of accountId\n13  * @see TradeableInstrument\n14  */\n\
    15 public interface OrderManagementProvider < M, N, K > {\n\n17  /**\n18   * An\
    \ order is normally of types market or limit. A market order is executed\n19 \
    \  * straight away by the platform whilst a limit order is executed only if\n\
    20   * the limit price is hit. Therefore for a limit order this method may not\n\
    21   * return an orderId.\n22   *\n23   * @param order\n24   * @param accountId\n\
    25   * @return a valid orderId if possible.\n26   */\n27  M placeOrder(Order <\
    \ N, M > order, K accountId);\n\n29  /**\n30   * Modify the attributes of a given\
    \ order. The platform may only permit to\n31   * modify attributes like limit\
    \ price, stop loss, take profit, expiration\n32   * date, units.\n33   *\n34 \
    \  * @param order\n35   * @param accountId\n36   * @return boolean indicating\
    \ if the operation was successful.\n37   */\n38  boolean modifyOrder(Order < N,\
    \ M > order, K accountId);\n\n40  /**\n41   * Effectively cancel the order if\
    \ it is waiting to be executed. A valid\n42   * orderId and an optional accountId\
    \ may be required to uniquely identify an\n43   * order to close/cancel.\n44 \
    \  *\n45   * @param orderId\n46   * @param accountId\n47   * @return boolean indicating\
    \ if the operation was successful.\n48   */\n49  boolean closeOrder(M orderId,\
    \ K accountId);\n\n51  /**\n52   *\n53   * @return a collection of all pending\
    \ orders across all accounts\n54   */\n55  Collection < Order < N,\n56  M >> allPendingOrders();\n\
    \n58  /**\n59   *\n60   * @param accountId\n61   * @return a collection of all\
    \ pending orders for a given accountId.\n62   */\n63  Collection < Order < N,\n\
    64  M >> pendingOrdersForAccount(K accountId);\n\n66  /**\n67   *\n68   * @param\
    \ orderId\n69   * @param accountId\n70   * @return Order uniquely identified by\
    \ orderId and optional accountId\n71   */\n72  Order < N,\n73  M > pendingOrderForAccount(M\
    \ orderId, K accountId);\n\n75  /**\n76   *\n77   * @param instrument\n78   *\
    \ @return a collection of all pending orders for a given instrument for all accounts\n\
    79   */\n80  Collection < Order < N,\n81  M >> pendingOrdersForInstrument(TradeableInstrument\
    \ < N > instrument);\n82 }\n```\n\nAs seen above, our provider interface provides\
    \ a rich set of functionality to manage orders. Since interface methods are self\
    \ explanatory, lets jump straight into how a concrete implementation would look\
    \ like."
