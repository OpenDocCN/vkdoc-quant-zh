    \ the base class for *OandaEventsStreamingService* and *OandaMarketDataStreamingService*\
    \ implements the interface and provides the plumbing to handle these hearbeats.\
    \ Lets look specifically now at the implementation of the 3 interface methods\
    \ in this abstract class. Additionally, we will also look at the method which\
    \ parses out the json payload and the constructor\n\n```\n 1 public abstract class\
    \ OandaStreamingService\n 2 implements HeartBeatStreamingService {\n 3  protected\
    \ OandaStreamingService(String accessToken,\n 4   HeartBeatCallback < DateTime\
    \ > heartBeatCallback, String heartbeatSourceId) {\n 5   this.hearbeatSourceId\
    \ = heartbeatSourceId;\n 6   this.heartBeatCallback = heartBeatCallback;\n 7 \
    \  ...\n 8  }\n\n10  protected void handleHeartBeat(JSONObject streamEvent) {\n\
    11   Long t = Long.parseLong(((JSONObject) streamEvent.get(heartbeat)).get(time).toString());\n\
    12   heartBeatCallback.onHeartBeat(new HeartBeatPayLoad < DateTime > (new DateTime(TradingUtils.toMillisFromNanos(t)),\
    \ hear\\\n13 beatSourceId));\n14  }\n\n16  @Override\n17  public void stopHeartBeatStreaming()\
    \ {\n18   stopStreaming();\n19  }\n\n21  @Override\n22  public void startHeartBeatStreaming()\
    \ {\n23   if (!serviceUp) {\n24    startStreaming();\n25   }\n26  }\n\n28  @Override\n\
    29  public String getHeartBeatSourceId() {\n30   return this.hearbeatSourceId;\n\
    31  }\n\n33   ...\n34   ...\n35 }\n```\n\nThe methods `startHeartBeatStreaming()`\
    \ and `stopHeartBeatStreaming()` delegate to `startStreaming()` and `stopStreaming()`\
    \ respectively which further delegate to the underlying methods to start/stop\
    \ the main streams. So in the case of market data streaming, the methods that\
    \ start and stop the main stream are `startMarketDataStreaming()` and `stopMarketDataStreaming()`.\
    \ This makes sense because the heartbeats are coupled with the main stream events\
    \ and the 2 coexist. Stopping the heartbeat stream must stop the main stream and\
    \ vice versa.\n\nThe method `handleHeartBeat` parses the json payload and creates\
    \ an instance of the `HeartBeatPayLoad<DateTime>`. This is then passed on to an\
    \ instance of `HeartBeatCallback`, which we discuss below, to disseminate to downstream\
    \ consumers. The timestamp in the heartbeat payload is the heartbeat timestamp\
    \ and as we will see later, is used later to figure out if the stream is still\
    \ alive or dead.\n\n### 10.4 HeartBeatCallback interface\n\nLike the other *Callback*\
    \ that we have looked at so far, the *HeartBeatCallback* is no different. It is\
    \ directly invoked by the provider implementation that is directly receiving streaming\
    \ events from the platform. After parsing the event and creation of an *HeartBeatPayLoad*\
    \ instance, the `onHeartBeat` method is invoked. Let us jump directly to how the\
    \ source code looks like.\n\n```\n1 public interface HeartBeatCallback<T> {\n\n\
    3  void onHeartBeat(HeartBeatPayLoad<T> payLoad);\n4 }\n```\n\nThe implementation\
    \ for the interface above is similar to other *Callback* interfaces we have discussed\
    \ previously. The *HeartBeatPayLoad* is disseminated to downstream consumers via\
    \ the EventBus\n\n```\n 1 public class HeartBeatCallbackImpl < T > implements\
    \ HeartBeatCallback < T > {\n\n 3  private final EventBus eventBus;\n\n 5  public\
    \ HeartBeatCallbackImpl(EventBus eventBus) {\n 6   this.eventBus = eventBus;\n\
    \ 7  }\n\n 9  @Override\n10  public void onHeartBeat(HeartBeatPayLoad < T > payLoad)\
    \ {\n11   this.eventBus.post(payLoad);\n12  }\n\n14 }\n```"
  trans: "\n### 10.2 流式心跳接口\n\n与其他流式接口类似，我们首先定义接口，规定支持心跳流式传输所需的最小方法集。我们采用与之前完全相同的设计模式：\n\
    \n- 一个启动流式传输的方法。\n- 一个停止流式传输的方法。\n- 一个处理心跳事件的无尽循环。\n- 一个用于向下游消费者分发事件的 `Callback`\
    \ 接口。\n\n让我们来看定义此契约的接口：\n\n```java\n 1 /**\n 2  * 提供来自交易平台的流式心跳的服务。平台最终提供的服务可能根本不是流式的，\n\
    \ 3  * 而是某种形式的定期回调，用以表明连接处于活动状态。心跳丢失可能表明无法接收\n 4  * 来自交易平台的任何交易/订单事件和/或市场数据。因此，对应用程序的任何监控\n\
    \ 5  * 都可能涉及直接与此服务交互，以触发警报/通知。\n 6  *\n 7  *\n 8  */\n 9 public interface HeartBeatStreamingService\
    \ {\n\n14  /**\n15   * 启动服务以接收来自交易平台的心跳。理想情况下，实现应确保不会为同一类型的\n16   * 服务创建多个心跳连接/处理器。根据交易平台的不同，可能所有服务共享一个心跳，\n\
    17   * 也可能为市场数据、交易/订单事件等服务各自配备专属心跳。\n18   */\n19  void startHeartBeatStreaming();\n\
    \n24  /**\n25   * 停止服务以停止接收心跳。实现必须妥善释放所有资源/连接，以免造成任何资源泄漏。\n26   */\n27  void stopHeartBeatStreaming();\n\
    \n31  /**\n32   *\n33   * @return 心跳源标识，用于标识该服务为之提供心跳的源。这对于跟踪所有正在发送心跳\n34   *\
    \         的源非常有用，可以定期单独监控每个源。在某些平台上，可能所有服务共享\n35   *         一个单一心跳服务，此时该标识可能不那么有用。\n\
    36   */\n37  String getHeartBeatSourceId();\n40 }\n```\n\n与其它流式接口不同，上述接口额外包含一个方法，要求实现为心跳流提供唯一的源标识。\n\
    \n### 10.3 `HeartBeatStreamingService` 的具体实现\n\nOANDA 通过同一数据流推送心跳事件，即它利用市场数据以及交易/订单/账户事件流，间歇性地推送心跳负载以通报相应流的健康状态。一个示例心跳负载如下所示：\n\
    \n```json\n1 {\"heartbeat\":{\"time\":\"1443968021000000\"}}\n```\n\n由于 OANDA\
    \ 的两个数据流都推送相同的心跳负载，因此作为 `OandaEventsStreamingService` 和 `OandaMarketDataStreamingService`\
    \ 基类的抽象类 `OandaStreamingService` 实现了该接口，并提供了处理这些心跳的基础框架。现在我们专门来看这个抽象类中三个接口方法的实现。此外，我们还将了解解析\
    \ JSON 负载的方法以及构造函数：\n\n```java\n 1 public abstract class OandaStreamingService\n\
    \ 2 implements HeartBeatStreamingService {\n 3  protected OandaStreamingService(String\
    \ accessToken,\n 4   HeartBeatCallback < DateTime > heartBeatCallback, String\
    \ heartbeatSourceId) {\n 5   this.hearbeatSourceId = heartbeatSourceId;\n 6  \
    \ this.heartBeatCallback = heartBeatCallback;\n 7   ...\n 8  }\n\n10  protected\
    \ void handleHeartBeat(JSONObject streamEvent) {\n11   Long t = Long.parseLong(((JSONObject)\
    \ streamEvent.get(heartbeat)).get(time).toString());\n12   heartBeatCallback.onHeartBeat(new\
    \ HeartBeatPayLoad < DateTime > (new DateTime(TradingUtils.toMillisFromNanos(t)),\
    \ heartbeatSourceId));\n13  }\n\n16  @Override\n17  public void stopHeartBeatStreaming()\
    \ {\n18   stopStreaming();\n19  }\n\n21  @Override\n22  public void startHeartBeatStreaming()\
    \ {\n23   if (!serviceUp) {\n24    startStreaming();\n25   }\n26  }\n\n28  @Override\n\
    29  public String getHeartBeatSourceId() {\n30   return this.hearbeatSourceId;\n\
    31  }\n\n33   ...\n34   ...\n35 }\n```\n\n`startHeartBeatStreaming()` 和 `stopHeartBeatStreaming()`\
    \ 方法分别委托给 `startStreaming()` 和 `stopStreaming()`，后者进一步委托给底层方法来启动/停止主数据流。因此，对于市场数据流，启动和停止主数据流的方法是\
    \ `startMarketDataStreaming()` 和 `stopMarketDataStreaming()`。这样做是合理的，因为心跳与主数据流事件耦合在一起，两者共存。停止心跳流必须停止主数据流，反之亦然。\n\
    \n`handleHeartBeat()` 方法解析 JSON 负载，并创建一个 `HeartBeatPayLoad<DateTime>` 实例。然后将其传递给一个\
    \ `HeartBeatCallback` 实例（我们将在下面讨论）以分发给下游消费者。心跳负载中的时间戳是心跳时间戳，正如我们稍后将看到的，它用于判断数据流是处于活动状态还是已死。\n\
    \n### 10.4 `HeartBeatCallback` 接口\n\n与我们迄今为止看到的其他 `Callback` 类似，`HeartBeatCallback`\
    \ 并无不同。它由直接从平台接收流式事件的提供者实现直接调用。解析事件并创建 `HeartBeatPayLoad` 实例后，将调用 `onHeartBeat()`\
    \ 方法。让我们直接看看源代码：\n\n```java\n1 public interface HeartBeatCallback<T> {\n\n3  void\
    \ onHeartBeat(HeartBeatPayLoad<T> payLoad);\n4 }\n```\n\n上述接口的实现与我们之前讨论过的其他 `Callback`\
    \ 接口类似。`HeartBeatPayLoad` 通过 `EventBus` 分发给下游消费者：\n\n```java\n 1 public class\
    \ HeartBeatCallbackImpl < T > implements HeartBeatCallback < T > {\n\n 3  private\
    \ final EventBus eventBus;\n\n 5  public HeartBeatCallbackImpl(EventBus eventBus)\
    \ {\n 6   this.eventBus = eventBus;\n 7  }\n\n 9  @Override\n10  public void onHeartBeat(HeartBeatPayLoad\
    \ < T > payLoad) {\n11   this.eventBus.post(payLoad);\n12  }\n\n14 }\n```\n"
- fmt: "### 10.5 `DefaultHeartBeatService`\n\n我们现在准备讨论这个服务，它使用心跳负载来跟踪各种流式连接的健康状况，并尝试在它们停止发送心跳时恢复它们。该服务`DefaultHeartBeatService`继承自`AbstractHeartBeatService`，它通过`EventBus`消费由`HeartBeatCallback`发布的心跳负载。每个为给定源接收的心跳，都帮助服务跟踪该特定流的健康状况。\n\
    \n我们首先看一下构造函数，它被注入了所有需要跟踪的`HeartBeatStreamingService`实例的集合。\n\n```\n 1 protected\
    \ abstract boolean isAlive(HeartBeatPayLoad < T > payLoad);\n 2 protected static\
    \ final long MAX_HEARTBEAT_DELAY = 60000 L;\n 3 private final Map < String, HeartBeatStreamingService\
    \ > heartBeatProducerMap =\n 4  Maps.newHashMap();\n 5 private final Map < String,\
    \ HeartBeatPayLoad < T >> payLoadMap =\n 6  Maps.newConcurrentMap();\n 7 volatile\
    \ boolean serviceUp = true;\n 8 protected final Collection < HeartBeatStreamingService\
    \ >\n 9  heartBeatStreamingServices;\n10 protected final long initWait = 2000\
    \ L;\n11 long warmUpTime = MAX_HEARTBEAT_DELAY;\n\n13 public AbstractHeartBeatService(Collection\
    \ < HeartBeatStreamingService >\n14  heartBeatStreamingServices) {\n15  this.heartBeatStreamingServices\
    \ = heartBeatStreamingServices;\n16  for (HeartBeatStreamingService heartBeatStreamingService:\n\
    17   heartBeatStreamingServices) {\n18   this.heartBeatProducerMap.put(\n19  \
    \  heartBeatStreamingService.getHeartBeatSourceId(),\n20    heartBeatStreamingService);\n\
    21  }\n22 }\n```\n\n构造函数还使用每个`HeartBeatStreamingService`实例填充`heartBeatProducerMap`，以其在映射中的源ID作为键。`payLoadMap`是一个映射，它为给定的心跳源存储了最后一个`HeartBeatPayLoad`对象。它通过`EventBus`订阅者方法不断获取来自不同源的心跳。\n\
    \n```\n1 @Subscribe\n2 @AllowConcurrentEvents\n3 public void handleHeartBeats(HeartBeatPayLoad<T>\
    \ payLoad) {\n4 \tthis.payLoadMap.put(payLoad.getHeartBeatSource(), payLoad);\n\
    5 }\n```\n\n我们现在需要的，是一个后台线程，用于定期检查上一次负载的接收时间，如果它超过了允许的心跳延迟阈值，则通过调用`startHeartBeatStreaming()`方法来尝试恢复它。\n\
    \n```\n 1 @PostConstruct\n 2 public void init() {\n 3  this.heartBeatsObserverThread.start();\n\
    \ 4 }\n\n6 final Thread heartBeatsObserverThread = new Thread(new Runnable() {\n\
    \n 8  private void sleep() {\n 9   try {\n10    Thread.sleep(warmUpTime); /*let\
    \ the streams start naturally*/\n11   } catch (InterruptedException e1) {\n12\
    \    LOG.error(e1);\n13   }\n14  }\n\n16  @Override\n17  public void run() {\n\
    18   while (serviceUp) {\n19    sleep();\n20    for (Map.Entry < String, HeartBeatStreamingService\
    \ > entry:\n21     heartBeatProducerMap.entrySet()) {\n22     long startWait =\
    \ initWait; // start with 2secs\n23     while (serviceUp && !isAlive(payLoadMap.get(entry.getKey())))\
    \ {\n24      entry.getValue().startHeartBeatStreaming();\n25      LOG.warn(String\n\
    26       .format(\"heartbeat source %s was not responding.\" +\n27        \" Just\
    \ restarted it and will listen for heartbeat after %d ms\",\n28        entry.getKey(),\
    \ startWait));\n29      try {\n30       Thread.sleep(startWait);\n31      } catch\
    \ (InterruptedException e) {\n32       LOG.error(e);\n33      }\n34      //double\
    \ the sleep time but not more than MAX_HEARTBEAT_DELAY\n35      startWait = Math.min(MAX_HEARTBEAT_DELAY,\
    \ 2 * startWait);\n36     }\n37    }\n38   }\n39  }\n40 }, \"HeartBeatMonitorThread\"\
    );\n```\n\n被`@PostConstruct`注解标记的方法`init()`启动后台线程`heartBeatsObserverThread`。该线程定期唤醒，遍历`heartBeatProducerMap`中的每个条目，检查流式服务是否存活。执行检查的`isAlive`方法由`DefaultHeartBeatService`实现。\n\
    \n```\n 1 public class DefaultHeartBeatService\n 2 extends AbstractHeartBeatService\
    \ < DateTime > {\n\n4  public DefaultHeartBeatService(Collection < HeartBeatStreamingService\
    \ >\n 5   heartBeatStreamingServices) {\n 6   super(heartBeatStreamingServices);\n\
    \ 7  }\n\n 9  @Override\n10  protected boolean isAlive(HeartBeatPayLoad < DateTime\
    \ > payLoad) {\n11   return payLoad != null && (DateTime.now().getMillis() -\n\
    12    payLoad.getHeartBeatPayLoad().getMillis()) < MAX_HEARTBEAT_DELAY;\n13  }\n\
    \n15 }\n```\n\n从上面的代码可以看出，此服务期望一个`HeartBeatPayLoad<DateTime>`。`isAlive`实现使用包含`DateTime`的负载，然后进行一些日期计算，以确定自上次接收负载以来的时间是否超过了`MAX_HEARTBEAT_DELAY`。如果未超过，则认为流式连接是存活的，否则认为不存活。回到上面的后台线程代码，如果`isAlive`返回`false`，则通过调用`startHeartBeatStreaming()`尝试重新启动流式连接。如果流式连接成功重启，那么对`handleHeartBeats`方法的发布应该恢复，并且`isAlive`应该开始返回`true`。\n\
    \n在某些情况下，其他平台可能会向下游发送一个虚拟对象或字符串来表明其正在发送心跳。在这种情况下，`DefaultHeartBeatService`可能是不够的。对于这些情况，我们可能需要创建一个包装负载，其中包含原始负载以及它被`handleHeartBeats`方法接收的时间。然后，可能需要将这个包装负载传递给另一个实现，该实现继承自`AbstractHeartBeatService`并相应实现`isAlive`。\n\
    \n这就结束了对机器人心跳机制的讨论。心跳是机器人极其重要的功能，因为它们告诉我们流（这些流是机器人运行的核心）的健康状况。许多策略可能依赖于行情数据流，因此我们不能让它长时间宕机。同样，我们需要保持交易/订单/账户流正常运转，以便缓存与平台同步。"
  raw: "### 10.5 DefaultHeartBeatService\n\nWe are now ready to discuss the service\
    \ that uses heartbeat payloads to keep track of the health of various streaming\
    \ connections and tries to revive them if they stop sending heartbeats. The service,\
    \ *DefaultHeartBeatService* which extends from *AbstractHeartBeatService*, consumes\
    \ the heartbeat payloads posted by the *HeartBeatCallback* via the EventBus. Every\
    \ heartbeat received for the given source, helps the service keep track of the\
    \ health of the given stream.\n\nWe first look at the constructor that is injected\
    \ with all the instances of *HeartBeatStreamingService* in a collection, that\
    \ it must keep track of.\n\n```\n 1 protected abstract boolean isAlive(HeartBeatPayLoad\
    \ < T > payLoad);\n 2 protected static final long MAX_HEARTBEAT_DELAY = 60000\
    \ L;\n 3 private final Map < String, HeartBeatStreamingService > heartBeatProducerMap\
    \ =\n 4  Maps.newHashMap();\n 5 private final Map < String, HeartBeatPayLoad <\
    \ T >> payLoadMap =\n 6  Maps.newConcurrentMap();\n 7 volatile boolean serviceUp\
    \ = true;\n 8 protected final Collection < HeartBeatStreamingService >\n 9  heartBeatStreamingServices;\n\
    10 protected final long initWait = 2000 L;\n11 long warmUpTime = MAX_HEARTBEAT_DELAY;\n\
    \n13 public AbstractHeartBeatService(Collection < HeartBeatStreamingService >\n\
    14  heartBeatStreamingServices) {\n15  this.heartBeatStreamingServices = heartBeatStreamingServices;\n\
    16  for (HeartBeatStreamingService heartBeatStreamingService:\n17   heartBeatStreamingServices)\
    \ {\n18   this.heartBeatProducerMap.put(\n19    heartBeatStreamingService.getHeartBeatSourceId(),\n\
    20    heartBeatStreamingService);\n21  }\n22 }\n```\n\nThe constructor also populates\
    \ the *heartBeatProducerMap* with each instance of *HeartBeatStreamingService*\
    \ keyed by its source id inside the map. The *payLoadMap* is a map that has the\
    \ last *HeartBeatPayLoad* object for the given heartbeat source. It constantly\
    \ gets heartbeats for various sources via the EvenBus subscriber method\n\n```\n\
    1 @Subscribe\n2 @AllowConcurrentEvents\n3 public void handleHeartBeats(HeartBeatPayLoad<T>\
    \ payLoad) {\n4 \tthis.payLoadMap.put(payLoad.getHeartBeatSource(), payLoad);\n\
    5 }\n```\n\nWhat we need now, is a background thread, to periodically check the\
    \ last time a payload was received and if it breaches the threshold limit for\
    \ delay allowed for heartbeats, try to revive it by calling the `startHeartBeatStreaming()`\
    \ method.\n\n```\n 1 @PostConstruct\n 2 public void init() {\n 3  this.heartBeatsObserverThread.start();\n\
    \ 4 }\n\n6 final Thread heartBeatsObserverThread = new Thread(new Runnable() {\n\
    \n8  private void sleep() {\n 9   try {\n10    Thread.sleep(warmUpTime); /*let\
    \ the streams start naturally*/\n11   } catch (InterruptedException e1) {\n12\
    \    LOG.error(e1);\n13   }\n14  }\n\n16  @Override\n17  public void run() {\n\
    18   while (serviceUp) {\n19    sleep();\n20    for (Map.Entry < String, HeartBeatStreamingService\
    \ > entry:\n21     heartBeatProducerMap.entrySet()) {\n22     long startWait =\
    \ initWait; // start with 2secs\n23     while (serviceUp && !isAlive(payLoadMap.get(entry.getKey())))\
    \ {\n24      entry.getValue().startHeartBeatStreaming();\n25      LOG.warn(String\n\
    26       .format(\"heartbeat source %s was not responding.\" +\n27        \" Just\
    \ restarted it and will listen for heartbeat after %d ms\",\n28        entry.getKey(),\
    \ startWait));\n29      try {\n30       Thread.sleep(startWait);\n31      } catch\
    \ (InterruptedException e) {\n32       LOG.error(e);\n33      }\n34      //double\
    \ the sleep time but not more than MAX_HEARTBEAT_DELAY\n35      startWait = Math.min(MAX_HEARTBEAT_DELAY,\
    \ 2 * startWait);\n36     }\n37    }\n38   }\n39  }\n40 }, \"HeartBeatMonitorThread\"\
    );\n```\n\nThe *@PostConstruct* annotated method `init()` launches the *heartBeatsObserverThread*\
    \ background thread. This thread periodically wakes up and loops through the `heartBeatProducerMap`\
    \ for each of the entry in the map, checks if the streaming service is alive.\
    \ The *isAlive* method that does the check is implemented by the *DefaultHeartBeatService*\n\
    \n```\n 1 public class DefaultHeartBeatService\n 2 extends AbstractHeartBeatService\
    \ < DateTime > {\n\n4  public DefaultHeartBeatService(Collection < HeartBeatStreamingService\
    \ >\n 5   heartBeatStreamingServices) {\n 6   super(heartBeatStreamingServices);\n\
    \ 7  }\n\n9  @Override\n10  protected boolean isAlive(HeartBeatPayLoad < DateTime\
    \ > payLoad) {\n11   return payLoad != null && (DateTime.now().getMillis() -\n\
    12    payLoad.getHeartBeatPayLoad().getMillis()) < MAX_HEARTBEAT_DELAY;\n13  }\n\
    \n15 }\n```\n\nThis service, as we see from the code above, expects a *HeartBeatPayLoad<DateTime>*.\
    \ The `isAlive` implementation uses the payload which has a *DateTime* and then\
    \ does some date maths to figure out if the time since the last payload was received\
    \ has breached the *MAX_HEARTBEAT_DELAY*. If it hasn’t, the streaming connection\
    \ is deemed to be alive else not. Going back to the background thread code above,\
    \ if `isAlive` return false, we then try to restart the streaming connection via\
    \ invocation to `startHeartBeatStreaming()`. If the streaming connection restarts\
    \ successfully, the posts to the `handleHeartBeats` method should resume and `isALive`\
    \ should then start return true.\n\nThere may be cases where other platforms might\
    \ send a dummy object or a string down the pipe to communicate that it is heart\
    \ beating. In such cases the *DefaultHeartBeatService* may be inadequate. For\
    \ these, we may have to create a wrapper payload that includes the original payload\
    \ and the time it was received by the `handleHeartBeats` method. The wrapper payload\
    \ may have to be then passed on to another implementation which extends the *AbstractHeartBeatService*\
    \ and implements the `isAlive` accordingly.\n\nThis concludes are discussion of\
    \ the heartbeat mechanism of the bot. The heartbeats are extremely important functionality\
    \ of the bot because they tell us the health of the streams that are core to the\
    \ functioning of the bot. A lot of the strategies might depend on the tick data\
    \ stream and hence we cannot afford to have it down for a long period of time.\
    \ Similarly we need to have the trade/order/account stream up and running so that\
    \ the caches are in sync with the platform."
  trans: "\n### 10.5 `DefaultHeartBeatService`\n\n我们现在准备讨论这个服务，它使用心跳负载来跟踪各种流式连接的健康状况，并尝试在它们停止发送心跳时恢复它们。该服务`DefaultHeartBeatService`继承自`AbstractHeartBeatService`，它通过`EventBus`消费由`HeartBeatCallback`发布的心跳负载。每个为给定源接收的心跳，都帮助服务跟踪该特定流的健康状况。\n\
    \n我们首先看一下构造函数，它被注入了所有需要跟踪的`HeartBeatStreamingService`实例的集合。\n\n```\n 1 protected\
    \ abstract boolean isAlive(HeartBeatPayLoad < T > payLoad);\n 2 protected static\
    \ final long MAX_HEARTBEAT_DELAY = 60000 L;\n 3 private final Map < String, HeartBeatStreamingService\
    \ > heartBeatProducerMap =\n 4  Maps.newHashMap();\n 5 private final Map < String,\
    \ HeartBeatPayLoad < T >> payLoadMap =\n 6  Maps.newConcurrentMap();\n 7 volatile\
    \ boolean serviceUp = true;\n 8 protected final Collection < HeartBeatStreamingService\
    \ >\n 9  heartBeatStreamingServices;\n10 protected final long initWait = 2000\
    \ L;\n11 long warmUpTime = MAX_HEARTBEAT_DELAY;\n\n13 public AbstractHeartBeatService(Collection\
    \ < HeartBeatStreamingService >\n14  heartBeatStreamingServices) {\n15  this.heartBeatStreamingServices\
    \ = heartBeatStreamingServices;\n16  for (HeartBeatStreamingService heartBeatStreamingService:\n\
    17   heartBeatStreamingServices) {\n18   this.heartBeatProducerMap.put(\n19  \
    \  heartBeatStreamingService.getHeartBeatSourceId(),\n20    heartBeatStreamingService);\n\
    21  }\n22 }\n```\n\n构造函数还使用每个`HeartBeatStreamingService`实例填充`heartBeatProducerMap`，以其在映射中的源\
    \ ID 作为键。`payLoadMap`是一个映射，它为给定的心跳源存储了最后一个`HeartBeatPayLoad`对象。它通过`EventBus`订阅者方法不断获取来自不同源的心跳。\n\
    \n```\n1 @Subscribe\n2 @AllowConcurrentEvents\n3 public void handleHeartBeats(HeartBeatPayLoad<T>\
    \ payLoad) {\n4 \tthis.payLoadMap.put(payLoad.getHeartBeatSource(), payLoad);\n\
    5 }\n```\n\n我们现在需要的，是一个后台线程，用于定期检查上一次负载的接收时间，如果它超过了允许的心跳延迟阈值，则通过调用`startHeartBeatStreaming()`方法来尝试恢复它。\n\
    \n```\n 1 @PostConstruct\n 2 public void init() {\n 3  this.heartBeatsObserverThread.start();\n\
    \ 4 }\n\n 6 final Thread heartBeatsObserverThread = new Thread(new Runnable()\
    \ {\n\n 8  private void sleep() {\n 9   try {\n10    Thread.sleep(warmUpTime);\
    \ /*等待流正常启动*/\n11   } catch (InterruptedException e1) {\n12    LOG.error(e1);\n\
    13   }\n14  }\n\n16  @Override\n17  public void run() {\n18   while (serviceUp)\
    \ {\n19    sleep();\n20    for (Map.Entry < String, HeartBeatStreamingService\
    \ > entry:\n21     heartBeatProducerMap.entrySet()) {\n22     long startWait =\
    \ initWait; // 从 2 秒开始\n23     while (serviceUp && !isAlive(payLoadMap.get(entry.getKey())))\
    \ {\n24      entry.getValue().startHeartBeatStreaming();\n25      LOG.warn(String\n\
    26       .format(\"心跳源 %s 未响应。\" +\n27        \"已重启，将在 %d 毫秒后监听心跳\",\n28     \
    \   entry.getKey(), startWait));\n29      try {\n30       Thread.sleep(startWait);\n\
    31      } catch (InterruptedException e) {\n32       LOG.error(e);\n33      }\n\
    34      // 等待时间加倍，但不超过 MAX_HEARTBEAT_DELAY\n35      startWait = Math.min(MAX_HEARTBEAT_DELAY,\
    \ 2 * startWait);\n36     }\n37    }\n38   }\n39  }\n40 }, \"HeartBeatMonitorThread\"\
    );\n```\n\n被`@PostConstruct`注解标记的方法`init()`启动后台线程`heartBeatsObserverThread`。该线程定期唤醒，遍历`heartBeatProducerMap`中的每个条目，检查流式服务是否存活。执行检查的`isAlive`方法由`DefaultHeartBeatService`实现。\n\
    \n```\n 1 public class DefaultHeartBeatService\n 2 extends AbstractHeartBeatService\
    \ < DateTime > {\n\n 4  public DefaultHeartBeatService(Collection < HeartBeatStreamingService\
    \ >\n 5   heartBeatStreamingServices) {\n 6   super(heartBeatStreamingServices);\n\
    \ 7  }\n\n 9  @Override\n10  protected boolean isAlive(HeartBeatPayLoad < DateTime\
    \ > payLoad) {\n11   return payLoad != null && (DateTime.now().getMillis() -\n\
    12    payLoad.getHeartBeatPayLoad().getMillis()) < MAX_HEARTBEAT_DELAY;\n13  }\n\
    \n15 }\n```\n\n从上面的代码可以看出，此服务期望一个`HeartBeatPayLoad<DateTime>`。`isAlive`实现使用包含`DateTime`的负载，然后进行一些日期计算，以确定自上次接收负载以来的时间是否超过了`MAX_HEARTBEAT_DELAY`。如果未超过，则认为流式连接是存活的，否则认为不存活。回到上面的后台线程代码，如果`isAlive`返回`false`，则通过调用`startHeartBeatStreaming()`尝试重新启动流式连接。如果流式连接成功重启，那么对`handleHeartBeats`方法的发布应该恢复，并且`isAlive`应该开始返回`true`。\n\
    \n在某些情况下，其他平台可能会向下游发送一个虚拟对象或字符串来表明其正在发送心跳。在这种情况下，`DefaultHeartBeatService`可能是不够的。对于这些情况，我们可能需要创建一个包装负载，其中包含原始负载以及它被`handleHeartBeats`方法接收的时间。然后，可能需要将这个包装负载传递给另一个实现，该实现继承自`AbstractHeartBeatService`并相应实现`isAlive`。\n\
    \n这就结束了对机器人心跳机制的讨论。心跳是机器人极其重要的功能，因为它们告诉我们流（这些流是机器人运行的核心）的健康状况。许多策略可能依赖于行情数据流，因此我们不能让它长时间宕机。同样，我们需要保持交易/订单/账户流正常运转，以便缓存与平台同步。\n"
- fmt: "### 10.6 Try it yourself\n\nIn this section we are going to write a demo program\
