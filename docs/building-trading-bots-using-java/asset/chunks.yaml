    \ 6  double minPrice = (1.0 - max10yrWmaOffset) * wma10yr;\n 7  double maxPrice\
    \ = (1.0 + max10yrWmaOffset) * wma10yr;\n 8  if ((signal == TradingSignal.SHORT\
    \ && price > minPrice) || (signal == TradingSignal.LONG && price <\n 9    maxPrice))\
    \ {\n10   return true;\n11  } else {\n12   LOG.info(String.format(\n13    \"Rejecting\
    \ %s  %s because price %2.5f is 10pct on either side of wma 10yr\n14    price\
    \ of % 2.5 f \",\n15    signal, instrument, price, wma10yr));\n16   return false;\n\
    17  }\n18 }\n```\n\n我们首先通过传入月度粒度作为参数来计算该工具的 10 年 WMA。`movingAverageCalculationService.calculateWMA`\
    \ 返回的值是我们安全区计算的基础。假设 `getMax10yrWmaOffset` 的值配置为 0.1（10%），那么我们的安全区就是该值两侧各 10%\
    \ 的范围。这意味着，只有当价格相对于此值的跌幅小于或等于 10% 时，我们才愿意下空单。同样地，只有当价格涨幅小于或等于 10% 时，我们才愿意下多单。由于此值是可配置的，因此我们可以随时扩大安全区。\n\
    \n现在我们来看列表中最后一个验证检查的方法代码：\n\n```java\n 1 public boolean checkInstrumentNotAlreadyTraded(TradeableInstrument\
    \ < N > instrument) {\n 2  Collection < K > accIds = this.tradeInfoService.findAllAccountsWithInstrumentTrades(instrument);\n\
    \ 3  if (accIds.size() > 0) {\n 4   LOG.warn(String.format(\"Trade with instrument\
    \ %s as one already exists\", instrument));\n 5   return false;\n 6  } else {\n\
    \ 7   Collection < Order < N, M >> pendingOrders = this.orderInfoService.\n 8\
    \   pendingOrdersForInstrument(instrument);\n 9   if (!pendingOrders.isEmpty())\
    \ {\n10    LOG.warn(String.format(\"Pending order with instrument %s already exists\"\
    , instrument));\n11    return false;\n12   }\n13   return true;\n14  }\n15 }\n\
    ```\n\n该方法首先调用 `TradeInfoService` 检查是否存在任何持有该工具未平仓交易头寸的账户。如果存在，则直接退出方法并返回 `false`。但是，如果不存在此类账户，我们将检查是否存在针对该工具的待处理订单。如果发现任何待处理订单，则再次从方法返回\
    \ `false`，否则返回 `true`。至此，我们结束了关于预验证订单服务的讨论。下一步自然是进入在一切检查通过后实际下达这些订单的服务。在结束之前，我想重申的是，尽管其中一些验证检查从全局来看或许并非绝对必要，但至少我们都同意，在完全确定需要下订单之前，必须进行一系列检查。"
  raw: "13   public PreOrderValidationService(TradeInfoService < M, N, K > tradeInfoService,\n\
    14    MovingAverageCalculationService < N > movingAverageCalculationService,\n\
    15    BaseTradingConfig baseTradingConfig,\n16    OrderInfoService < M, N, K >\
    \ orderInfoService) {\n17    this.tradeInfoService = tradeInfoService;\n18   \
    \ this.movingAverageCalculationService = movingAverageCalculationService;\n19\
    \    this.baseTradingConfig = baseTradingConfig;\n20    this.orderInfoService\
    \ = orderInfoService;\n21   }\n```\n\nThe ***TradeInfoService*** is something\
    \ which we will cover later in this chapter. The methods invoked to obtain various\
    \ trade related information are pretty self explanatory in the current context\
    \ but will be elaborated upon later. The rest I believe, follow naturally from\
    \ our discussion of the validation rules. The ***MovingAverageCalculationService***\
    \ is required for computation of the WMA, the ***BaseTradingConfig*** for various\
    \ configuration parameters, like maximum allowed net positions for a currency\
    \ and ***OrderInfoService*** for informations regarding pending orders etc.\n\n\
    Lets now look at the service method that codes the first validation check in our\
    \ list.\n\n```\n 1 public boolean checkLimitsForCcy(TradeableInstrument < N >\
    \ instrument, TradingSignal signal) {\n 2  String currencies[] = TradingUtils.splitInstrumentPair(instrument.getInstrument());\n\
    \ 3  for (String currency: currencies) {\n 4   int positionCount =\n 5    this.tradeInfoService.findNetPositionCountForCurrency(currency)\
    \ +\n 6    this.orderInfoService.findNetPositionCountForCurrency(currency);\n\
    \ 7   int sign = TradingUtils.getSign(instrument.getInstrument(), signal,\n 8\
    \    currency);\n 9   int newPositionCount = positionCount + sign;\n10   if (Math.abs(newPositionCount)\
    \ >\n11    this.baseTradingConfig.getMaxAllowedNetContracts() && Integer.signum(sign)\
    \ == Integer.signum(positionCount)) {\n12    LOG.warn(String.format(\n13     \"\
    Cannot place trade %s because max limit exceeded. max allowed=%d and \" + \"current\
    \ net positions=%d for currency %s\"\\\n14 , instrument,\n15     this.baseTradingConfig.getMaxAllowedNetContracts(),\n\
    16     newPositionCount, currency));\n17    return false;\n18   }\n19  }\n20 \
    \ return true;\n21 }\n```\n\nThis method returns a *false* if the check fails\
    \ else *true*. The method begin by first splitting the currency pair into individual\
    \ currencies and for each currency first getting the current state of affairs,\
    \ i.e., the sum of all open trading positions and pending orders. This we call\
    \ our current position count. So if we have 4 sell CHF trading positions and 1\
    \ pending order to buy CHF, our net position count would be -3 (Remember -ve number\
    \ denotes a sell position). Therefore if we want to place a new market order to\
    \ buy USD_CHF, the `TradingUtils.getSign` would return -1 for CHF. This would\
    \ increase our short CHF positions to 4 if we were to go ahead with this order.\
    \ Now the evaluation of the check happens in this part of the code.\n\n```\n1\
    \ if (Math.abs(newPositionCount) >\n2 \t\t\tthis.baseTradingConfig.getMaxAllowedNetContracts()\
    \ &&\n3 Integer.signum(sign) == Integer.signum(positionCount)) {\n```\n\nIf the\
    \ maximum allowed net contracts for each currency is configured as 4, then we\
    \ are still in a position to place this market order as the new position count\
    \ will then take it to the maximum allowed level. Since we are actually comparing\
    \ the absolute value as part of the if statement, we must also add the sign check\
    \ as well to make sure that the future position count has the same sign as the\
    \ sign returned by `TradingUtils.getSign`.\n\nNow lets look at the service method\
    \ code for our second validation check.\n\n```\n 1 public boolean isInSafeZone(TradingSignal\
    \ signal, double price, TradeableInstrument < N > instrument) {\n 2  double wma10yr\
    \ = this.movingAverageCalculationService.calculateWMA(\n 3   instrument, TEN_YRS_IN_MTHS,\n\
    \ 4   CandleStickGranularity.M);\n 5  final double max10yrWmaOffset = baseTradingConfig.getMax10yrWmaOffset();\n\
    \ 6  double minPrice = (1.0 - max10yrWmaOffset) * wma10yr;\n 7  double maxPrice\
    \ = (1.0 + max10yrWmaOffset) * wma10yr;\n 8  if ((signal == TradingSignal.SHORT\
    \ && price > minPrice) || (signal == TradingSignal.LONG && price <\n 9    maxPrice))\
    \ {\n10   return true;\n11  } else {\n12   LOG.info(String.format(\n13    \"Rejecting\
    \ %s  %s because price %2.5f is 10pct on either side of wma 10yr\n14    price\
    \ of % 2.5 f \",\n15    signal, instrument, price, wma10yr));\n16   return false;\n\
    17  }\n18 }\n```\n\nWe begin by calculating the 10 year WMA for this instrument\
    \ by passing monthly granularity as an input parameter. The value returned by\
    \ the `movingAverageCalculationService.calculateWMA` is the basis for our safe\
    \ zone calculation. Assuming value of ***getMax10yrWmaOffset*** is configured\
    \ as *0.1* (10%), our safe zone then becomes 10% on either side of this value.\
    \ What that means is that we are willing to place a short order only if the price\
    \ fall from this value is less than or equal to 10%. Similarly we are willing\
    \ to place a long order only if the price increase is less than or equal to 10%.\
    \ Since this value is configurable, we can always broaden our safe zone.\n\nNow\
    \ for the last validation check from our discussion, the method code is as follows\n\
    \n```\n 1 public boolean checkInstrumentNotAlreadyTraded(TradeableInstrument <\
    \ N > instrument) {\n 2  Collection < K > accIds = this.tradeInfoService.findAllAccountsWithInstrumentTrades(instrument);\n\
    \ 3  if (accIds.size() > 0) {\n 4   LOG.warn(String.format(\"Trade with instrument\
    \ %s as one already exists\", instrument));\n 5   return false;\n 6  } else {\n\
    \ 7   Collection < Order < N, M >> pendingOrders = this.orderInfoService.\n 8\
    \   pendingOrdersForInstrument(instrument);\n 9   if (!pendingOrders.isEmpty())\
    \ {\n10    LOG.warn(String.format(\"Pending order with instrument %s already exists\"\
    , instrument));\n11    return false;\n12   }\n13   return true;\n14  }\n15 }\n\
    ```\n\nOur method begins by calling upon ***TradeInfoService*** to check if there\
    \ are any accounts which have an open trade position for the given instrument.\
    \ If we do have any, then we straightaway exit the method returning *false*. However,\
    \ if no such accounts exist, we check if there are any pending orders for the\
    \ given instrument. If we do find any pending orders, we again return *false*\
    \ from the method else we return *true*. With this we conclude our discussion\
    \ of the service to pre-validate orders. Now the next logical step is to move\
    \ on the actual service which places these orders after all the checks pass. Before\
    \ we leave, I just want to reiterate, that although some of these validation checks\
    \ do not arguably fit in the grand scheme of things, but atleast we all agree\
    \ that we need to have a set of checks before we are absolutely sure that an order\
    \ needs to be placed."
