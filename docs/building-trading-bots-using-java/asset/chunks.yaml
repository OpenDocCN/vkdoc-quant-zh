    }\n```\n\nAs seen above, the `init()` method which automatically gets invoked\
    \ by DI frameworks like Spring, invokes the internal method `reconstructCache()`.\
    \ This method begins by first seeking an exclusive write lock that makes sure\
    \ no other thread is either reading or writing from the internal `tradesCache`.\
    \ Just to remind ourselves, a `ReadWriteLock` allows access to multiple readers\
    \ but only to a single writer. Therefore rightly so, in order to preserve the\
    \ consistency of the cache and what other threads view as the state of the cache,\
    \ we seek the `writeLock` before updating the cache, putting other threads in\
    \ wait state should they try to read or write from the cache.\n\nOnce the write\
    \ lock is granted, we have the permission to start (re)populating the cache. Since\
    \ we have to organise all trades per instrument first and then the resulting map\
    \ of instrument-trade list per account id, we begin first by obtaining a list\
    \ of all accounts using the `accountInfoService.getAllAccounts()`. For each of\
    \ the account in the collection of accounts in a loop, we compute the map of collection\
    \ of trades per instrument by invoking the internal method `getTradesPerInstrumentForAccount`.\
    \ This method in turn uses the `tradeManagementProvider.getTradesForAccount` to\
    \ get all trades for the given account id. Once we have all the trades, we can\
    \ then loop over them to then put them in a map keyed by the instrument that they\
    \ represent the open position for. This pretty much is what needs to happen to\
