    43   }\n\n45  }\n\n47  @SuppressWarnings(\"unchecked\")\n48  public static void\
    \ main(String[] args) throws Exception {\n49   usageAndValidation(args);\n50 \
    \  final String url = args[0];\n51   final Long accountId = Long.parseLong(args[1]);\n\
    52   final String accessToken = args[2];\n53   final String heartbeatSourceId\
    \ = \"DEMO_MKTDATASTREAM\";\n\n55   TradeableInstrument < String > eurusd = new\
    \ TradeableInstrument < String > (\"EUR_USD\");\n\n57   Collection < TradeableInstrument\
    \ < String >> instruments = Lists.newArrayList(eurusd);\n\n59   EventBus eventBus\
    \ = new EventBus();\n\n61   MarketEventCallback < String > mktEventCallback =\n\
    62    new MarketEventHandlerImpl < String > (eventBus);\n63   HeartBeatCallback\
    \ < DateTime > heartBeatCallback =\n64    new HeartBeatCallbackImpl < DateTime\
    \ > (eventBus);\n\n66   OandaMarketDataStreamingService mktDataStreaminService\
    \ =\n67    new OandaMarketDataStreamingService(url, accessToken,\n68     accountId,\
    \ instruments, mktEventCallback, heartBeatCallback, heartbeatSourceId);\n69  \
    \ mktDataStreaminService.startMarketDataStreaming();\n70   Collection < HeartBeatStreamingService\
    \ > heartbeatstreamingLst = Lists.newArrayList();\n71   heartbeatstreamingLst.add(mktDataStreaminService);\n\
    72   DefaultHeartBeatService heartBeatService = new DefaultHeartBeatService(heartbeatstreamingLst);\n\
    73   eventBus.register(heartBeatService);\n74   eventBus.register(new DataSubscriber());\n\
    75   heartBeatService.init();\n\n77   heartBeatService.warmUpTime = 5000 L;\n\
    78   Thread.sleep(30000 L);\n79   mktDataStreaminService.stopMarketDataStreaming();\n\
    80   Thread.sleep(20000 L);\n81  }\n\n83 }\n```\n\n![Launch Configuration](images/00079.jpeg)\
    \ Launch Configuration\n\nAfter a bit of time the market data stream is stopped.\
    \ The `heartBeatService` then tries to revive it and is successful in doing so.\
    \ We see heartbeats being received again after the connection is successfully\
    \ reestablished.\n\n![Sample Output](images/00080.jpeg) Sample Output\n\n## 11\\\
    . Email Notifications\n\nIn this chapter we discuss email notifications which\
    \ are extremely useful to notify users when certain events are triggered inside\
    \ the bot. These notifications are closely coupled to Trade/Order/Account events\
    \ that we discussed in the Chapter 7\\. As a result, the email notification component\
    \ has the same input payload, delivered by the `EventBus`, like other handlers\
    \ we discussed in that chapter. These notifications can be very useful when a\
    \ user action is urgently warranted. For e.g. a `MARGIN_CALL_ENTER`^([1](#part0073.html#fn-margin))\
    \ might be triggered on the OANDA platform, which suggests that the account faces\
    \ an urgent margin call. On the other hand, these notifications serve as a useful\
    \ tool to keep track of what the automated trading bot is upto. By switching on\
    \ notifications for Trade/Order and Account events, a user can have a useful appreciation\
    \ of the state of things happening inside the bot.\n\n### 11.1 Notification Design\n\
    \nAs discussed above, the event that is handled by the Trade/Order and Account\
    \ event handlers, is also posted to the email notification service. This service,\
    \ `EventEmailNotifier`, handles this event and generates an email if an appropriate\
    \ `EmailContentGenerator` is configured for that event. The `EmailContentGenerator`\
    \ implementation is responsible for generating subject and body, aka, the `EmailPayLoad`,\
    \ and can vary from event to event.\n\nLet us first look at the pojo `EmailPayLoad`\
    \ that holds the result of the email content generation.\n\n#### 11.1.1 EmailPayLoad\
    \ POJO\n\n```java\n 1 public class EmailPayLoad {\n 2  private final String subject;\n\
    \ 3  private final String body;\n\n 5  public EmailPayLoad(String subject, String\
    \ body) {\n 6   super();\n 7   this.subject = subject;\n 8   this.body = body;\n\
    \ 9  }\n\n11  public String getSubject() {\n12   return subject;\n13  }\n\n15\
    \  public String getBody() {\n16   return body;\n17  }\n\n19 }\n```\n\nThe `EmailPayLoad`\
    \ has the subject and the body of the email, that is sent out using the `JavaMail`\
    \ API and configured inside the Spring configuration.\n\n#### 11.1.2 EmailContentGenerator\
    \ interface\n\n```java\n1 public interface EmailContentGenerator<T> {\n\n3  EmailPayLoad\
    \ generate(EventPayLoad<T> payLoad);\n\n5 }\n```"
