  trans: "\n### 12.1.5 服务配置\n\n在本章关于配置的最后一节中，我们将讨论如何配置机器人的核心服务。如果存在图形用户界面客户端或任何其他与机器人交互的客户端，这些服务可被视为机器人的公共\
    \ API。本书中的大多数示例程序都直接与这些服务进行交互。\n\n`AccountInfoService`\n\n```xml\n<bean id=\"\
    accountInfoService\"\n    class=\"com.precioustech.fxtrading.account.AccountInfoService\"\
    >\n\t<constructor-arg index=\"0\" ref=\"accountDataProvider\"/>\n\t<constructor-arg\
    \ index=\"1\" ref=\"currentPriceInfoProvider\"/>\n\t<constructor-arg index=\"\
    2\" ref=\"tradingConfig\"/>\n\t<constructor-arg index=\"3\" ref=\"providerHelper\"\
    />\n</bean>\n```\n\n`InstrumentService`\n\n```xml\n<bean id=\"instrumentService\"\
    \n    class=\"com.precioustech.fxtrading.instrument.InstrumentService\">\n\t\t\
    <constructor-arg index=\"0\" ref=\"instrumentDataProvider\"/>\n</bean>\n```\n\n\
    `MovingAverageCalculationService`\n\n```xml\n<bean id=\"movingAverageCalculationService\"\
    \n  class=\"com.precioustech.fxtrading.marketdata.historic.MovingAverageCalculationService\"\
    >\n\t\t<constructor-arg index=\"0\" ref=\"historicMarketDataProvider\"/>\n</bean>\n\
    ```\n\n`OrderInfoService`\n\n```xml\n<bean id=\"orderInfoService\"\n    class=\"\
    com.precioustech.fxtrading.order.OrderInfoService\">\n\t<constructor-arg index=\"\
    0\" ref=\"orderManagementProvider\"/>\n</bean>\n```\n\n`TradeInfoService`\n\n\
    ```xml\n<bean id=\"tradeInfoService\"\n    class=\"com.precioustech.fxtrading.trade.TradeInfoService\"\
    >\n\t<constructor-arg index=\"0\" ref=\"tradeManagementProvider\"/>\n\t<constructor-arg\
    \ index=\"1\" ref=\"accountInfoService\"/>\n</bean>\n```\n\n`PreOrderValidationService`\n\
    \n```xml\n<bean id=\"preOrderValidationService\"\n      class=\"com.precioustech.fxtrading.order.PreOrderValidationService\"\
    >\n\t<constructor-arg index=\"0\" ref=\"tradeInfoService\"/>\n\t<constructor-arg\
    \ index=\"1\" ref=\"movingAverageCalculationService\"/>\n\t<constructor-arg index=\"\
    2\" ref=\"tradingConfig\"/>\n\t<constructor-arg index=\"3\" ref=\"orderInfoService\"\
    />\n</bean>\n```\n\n`OrderExecutionService`\n\n```xml\n<bean id=\"orderExecutionService\"\
    \n    class=\"com.precioustech.fxtrading.order.OrderExecutionService\">\n\t<constructor-arg\
    \ index=\"0\" ref=\"orderQueue\"/>\n\t<constructor-arg index=\"1\" ref=\"accountInfoService\"\
    />\n\t<constructor-arg index=\"2\" ref=\"orderManagementProvider\"/>\n\t<constructor-arg\
    \ index=\"3\" ref=\"tradingConfig\"/>\n\t<constructor-arg index=\"4\" ref=\"preOrderValidationService\"\
    />\n\t<constructor-arg index=\"5\" ref=\"currentPriceInfoProvider\"/>\n</bean>\n\
    ```\n\n`DefaultHearBeatService`\n\n```xml\n<bean id=\"heartBeatService\"\n   \
    \ class=\"com.precioustech.fxtrading.heartbeats.DefaultHeartBeatService\">\n\t\
    <constructor-arg index=\"0\">\n\t\t<list>\n\t\t\t<ref bean=\"eventsStreamingService\"\
    />\n\t\t\t<ref bean=\"marketDataStreamingService\"/>\n\t\t</list>\n\t</constructor-arg>\n\
    </bean>\n```\n\n### 12.2 构建机器人\n\n使用 Maven 可以轻松构建机器人。由于有三个项目需要按指定顺序构建，我们可以编写脚本来自动执行这些操作，而不必记住构建顺序。如果已从\
    \ GitHub 克隆了代码仓库，在 `<repo-code>/java` 目录下有一个 `buildbot.bsh` 脚本，它将使用 Maven 构建机器人。在克隆仓库后，我的\
    \ Bash 终端上会显示以下内容：\n\n![代码仓库结构](img/00083.jpeg) 代码仓库结构\n\n在运行代码之前，假设已安装并配置了 Maven\
    \ 和 Java 1.7。在命令行中，输入命令 `mvn --version` 时，我们应该会看到类似如下的输出：\n\n![mvn --version 输出](img/00084.jpeg)\
    \ mvn –version 输出\n\n如果情况并非如此，请确保已正确安装 Maven^(3)。\n\n现在我们已经准备好运行脚本 `buildbot.bsh`。在此之前，让我们快速浏览一下脚本代码：\n\
    \n```bash\nfunction buildmodule {\n    cd $SCRIPT_DIR/$1\n    mvn clean install\n\
    \    if [[ \"$?\" -ne 0 ]]; then\n      echo \"错误：$1 项目构建失败。构建失败\"; exit -1;\n\
    \    fi\n}\nSCRIPT_DIR=`pwd`\nbuildmodule tradingbot-core\nbuildmodule oanda-restapi\n\
    buildmodule tradingbot-app\n\necho \"交易机器人构建成功\"\n```\n\n![在命令行开始构建](img/00085.jpeg)\
    \ 在命令行开始构建\n\n我们对要构建的三个模块分别调用了 `buildmodule` 函数。该函数首先执行 `cd` 进入相应的源代码目录，然后发出 `mvn\
    \ clean install` 命令来构建构件（即 `jar` 文件）。如果存在单元测试失败或编译问题，`mvn clean install` 将退出并返回非零代码。我们检查存储在\
    \ `$?` 变量中的这个代码，如果非零，则立即退出脚本。\n\n![构建失败](img/00086.jpeg) 构建失败\n\n如果构建成功，我们应该看到如下所示的输出：\n\
    \n![构建成功](img/00087.jpeg) 构建成功\n\n### 12.3 运行机器人\n\n**警告**：**如果用于运行机器人的某些配置值过高，可能会造成严重损失。作者已在全书中尽一切可能强调这些内容。在任何情况下，作者均不对因用户根据自身风险承受能力设定的配置值而产生的任何间接损失承担责任。**\n\
    \n现在机器人已完全构建完毕，我们准备运行它。但在真正按下“运行按钮”之前，我们需要确保以下配置参数已被调整，并完成构建，以便这些更改包含在针对特定用户的\
    \ jar 文件中。以下是完整的检查清单：\n\n1.  `tradingbot-oanda.properties` 中所有 OANDA 特定的参数必须属于一个有效的真实或模拟账户用户。\n\
    2.  `tradingbot.properties` 中所有 Twitter 特定的访问令牌已正确填写。这些有效令牌由用户拥有完全访问权限的 Twitter\
    \ 账户下的 Twitter 应用程序生成。\n3.  再次检查 `TradingConfig` bean 的值是否在可接受的范围内，特别是 `maxAllowedQuantity`、`minReserveRatio`\
    \ 和 `maxAllowedNetContracts`。\n4.  在 `tradingbot.properties` 中配置一个有效的邮件账户。此处使用的凭据将用于向\
    \ `mail.to` 电子邮件地址发送邮件通知。\n5.  如有需要，可在 tradingbot-app 资源目录中配置 `log4j.properties`。\n\
    6.  再次执行 `buildbot.sh`，使用上述配置的新参数集重新构建机器人。\n\n要使用本书讨论的策略以及 OANDA 实现来运行机器人，我们只需执行以下操作：\n\
    \n```bash\n$ ./runbot-oanda.bsh\n```\n\n如果一切顺利，我们应该会看到机器人输出以下内容：\n\n![运行机器人](img/00088.jpeg)\
    \ 运行机器人\n\n在机器人运行期间，我们应该会看到它不时地抓取如下图所示的推文：\n\n![新推文已抓取](img/00089.jpeg) 新推文已抓取\n\
    \n就是这样。我们的机器人现已完全启动并运行。我们应该会看到 `FadeTheMove` 策略非常活跃，尤其是在影响市场波动的货币事件（如 FOMC 决议或各国\
    \ GDP 数据）期间。需要记住的一点是，该策略会维护一个过去 15 分钟的内部缓存。我们为订阅行情数据流配置的品种越多，占用的内存就越多。因此，使用更高的内存值运行可能是必要的。由于机器人在\
    \ Maven 内部运行，我们需要更改 `MAVEN_OPTS` 参数。\n"
- fmt: "## 13\\. Unit Testing\n\nIn this chapter we discuss a very important topic,\
    \ that of unit testing our code. Proper unit testing coverage of our bot will\
    \ ensure that we do not create many regressions when we do changes or add enhancements\
    \ to the existing code. For some of the target audience of this book, the trading\
    \ bot may be deployed to place real orders with a live account where huge sums\
    \ of money could be involved. Making sure that we have enough test coverage will\
    \ ensure that a code bug would be unlikely to place bad orders. We briefly summarise\
    \ the immense benefits of unit testing:\n\n- Proper unit tests should eliminate\
    \ most of the unlikely surprises in the production environment.\n- They help document\
    \ the code.\n- They force a developer to develop and think in a way that leads\
    \ to better design, code and architecture of the system components.\n- We write\
    \ more maintainable code when we adopt the test driven development approach. We\
    \ are forced to write smaller classes so that they can be unit tested easily.\n\
    - We are forced to write loosely coupled components. Having many dependencies\
    \ to mock forces us to think this way.\n\nKeeping the above in mind, we will discuss\
    \ some of the concepts and techniques around unit testing the bot in this chapter.\n\
    \n### 13.1 Using Mockito as a mocking framework\n\nFor writing unit tests for\
    \ the bot, we are going to use Mockito^([1](#part0080.html#fn-mock)) extensively\
    \ to create mocks for our objects. The mock for an object like `TwitterTemplate`\
    \ helps us simulate the behaviour of this object without having to instantiate\
    \ it fully. In order to harvest tweets using a real `TwitterTemplate`, we will\
    \ have to provide valid tokens in order to authenticate with Twitter. This is\
    \ not the real problem actually. The real problem is getting the same deterministic\
    \ results, everytime we do a search query. This is impossible with the real `TwitterTemplate`\
    \ as the tweets are constantly getting created and as a result the search results\
    \ too. We cannot write deterministic asserts to unit test our code. To get around\
    \ this problem we use mocks and get deterministic results. The same applies to\
    \ getting deterministic order of price tick data from the provider which is impossible\
    \ in the real world.\n\n#### 13.1.1 Mocking HTTP Interaction\n\nWe need to be\
    \ able to mock HTTP interaction in order to test our OANDA provider implementations.\
    \ The concept is that this mock method, that we are going to explore shortly,\
    \ returns an `InputStream` that is an instance of `FileInputStream` instead of\
    \ a real world instance of `org.apache.http.client.entity.LazyDecompressingInputStream`.\
    \ Therefore all our interaction with OANDA comes from files of json payloads that\
    \ we create instead of going to OANDA platform. Lets have a quick look at the\
    \ code of this method:\n\n```\n 1 public static final void mockHttpInteraction(String\
    \ fname, HttpClient mockHttpClient) throws Exception {\n 2  CloseableHttpResponse\
    \ mockResp = mock(CloseableHttpResponse.class);\n 3  when(mockHttpClient.execute(any(HttpUriRequest.class))).thenReturn(mockResp);\n\
    \n 5  HttpEntity mockEntity = mock(HttpEntity.class);\n\n 7  when(mockResp.getEntity()).thenReturn(mockEntity);\n\
    \n 9  StatusLine mockStatusLine = mock(StatusLine.class);\n\n11  when(mockResp.getStatusLine()).thenReturn(mockStatusLine);\n\
    12  when(mockStatusLine.getStatusCode()).thenReturn(HttpStatus.SC_OK);\n13  when(mockEntity.getContent()).thenReturn(new\
    \ FileInputStream(fname));\n14 }\n```\n\nThe `mockHttpInteraction` method accepts\
    \ a filename and a mock `HttpClient` as an argument. The last line of the method\
    \ is where the magic happens after we have mocked all the interactions to get\
    \ to this line. The `HttpEntity` object which has the content returned from the\
    \ OANDA REST API in the real world, is mocked to return the content of the file\
    \ instead.\n\nThis is a very useful concept that we just discussed. Now, we are\
    \ in a position to just about mock any interaction by mimicking the response in\
    \ a file. Let us look at an example of such unit test that does this interaction:\n\
    \n```\n 1 @Test\n 2 public void accountIdTest() throws Exception {\n 3  final\
    \ OandaAccountDataProviderService service = new\n 4  OandaAccountDataProviderService(url,\
    \ userName, accessToken);\n 5  assertEquals(\"https://api-fxtrade.oanda.com/v1/accounts/123456\"\
    ,\n 6   service.getSingleAccountUrl(accountId));\n\n 8  OandaAccountDataProviderService\
    \ spy =\n 9   createSpyAndCommonStuff(\"src/test/resources/account123456.txt\"\
    , service);\n10  Account < Long > accInfo = spy.getLatestAccountInfo(accountId);\n\
    11  assertNotNull(accInfo);\n12  assertEquals(\"CHF\", accInfo.getCurrency());\n\
    13  assertEquals(0.05, accInfo.getMarginRate(), OandaTestConstants.precision);\n\
    14  assertEquals(-897.1, accInfo.getUnrealisedPnl(), OandaTestConstants.precision);\n\
    15 }\n\n17 private OandaAccountDataProviderService createSpyAndCommonStuff(String\
    \ fname,\n18  OandaAccountDataProviderService service) throws Exception {\n19\
    \  OandaAccountDataProviderService spy = spy(service);\n\n21  CloseableHttpClient\
    \ mockHttpClient = mock(CloseableHttpClient.class);\n22  when(spy.getHttpClient()).thenReturn(mockHttpClient);\n\
    \n24  OandaTestUtils.mockHttpInteraction(fname, mockHttpClient);\n\n26  return\
    \ spy;\n27 }\n```\n\nBefore looking at the code in detail, let us first look at\
    \ the contents of the file `src/test/resources/account123456.txt` used in this\
    \ unit test case:\n\n```\n 1 {\n 2   \"accountId\" : 123456,\n 3   \"accountName\"\
    \ : \"main\",\n 4   \"balance\" : 20567.9,\n 5   \"unrealizedPl\" : -897.1,\n\
    \ 6   \"realizedPl\" : 1123.65,\n 7   \"marginUsed\" : 89.98,\n 8   \"marginAvail\"\
    \ : 645.3,\n 9   \"openTrades\" : 5,\n10   \"openOrders\" : 0,\n11   \"marginRate\"\
    \ : 0.05,\n12   \"accountCurrency\" : \"CHF\"\n13 }\n```\n\nThe test begins by\
    \ creating a real instance of the `AccountDataProvider`, in this case `OandaAccountDataProviderService`.\
    \ We then create a spy^([2](#part0080.html#fn-spy)) on this object in the private\
    \ method `createSpyAndCommonStuff`. Also inside this method we associate a mock\
    \ `HttpClient` object that is used by the `mockHttpInteraction` method previously\
    \ discussed to interact with the file that is passed as an argument to the method.\n\
    \nSo what happens when `spy.getLatestAccountInfo(accountId)` is invoked?"
