  trans: "\n#### 13.1.2 模拟数据流\n\n```\n 1 private Account < Long > getLatestAccountInfo(final\
    \ Long accountId,\n 2   CloseableHttpClient httpClient) {\n 3   try {\n 4    HttpUriRequest\
    \ httpGet = new HttpGet(getSingleAccountUrl(accountId));\n 5    httpGet.setHeader(authHeader);\n\
    \n 7    LOG.info(TradingUtils.executingRequestMsg(httpGet));\n 8    HttpResponse\
    \ httpResponse = httpClient.execute(httpGet);\n 9    String strResp = TradingUtils.responseToString(httpResponse);\n\
    10 ...\n11 ...\n```\n\n*   代码 `HttpResponse httpResponse = httpClient.execute(httpGet)`\
    \ 返回一个模拟的 `CloseableHttpResponse` 对象（参见 `mockHttpInteraction` 方法）。\n*   当使用这个模拟的\
    \ `httpResponse` 对象调用 `TradingUtils.responseToString` 时，该方法内部对 `entity.getContent`\
    \ 的调用会返回一个 `InputStream` 对象，该对象实际上是 `FileInputStream` 的一个实例，它持有对单元测试中使用的文件 `src/test/resources/account123456.txt`\
    \ 的句柄。\n*   当读取这个 `InputStream` 方法时，系统会读取底层文件，并将文件内容从该方法返回。\n*   之后，该响应会按照与从真实\
    \ OANDA 平台收到 Http 200 状态码时相同的方式进行正常解析。\n\n为便于参考，`TradingUtils.responseToString`\
    \ 方法如下所示：\n\n```\n 1 /**\n 2  * 一个工具方法，尝试将 HttpResponse 对象转换为字符串。仅当服务器返回 HTTP\
    \ 状态码 200 时，\n 3  * 此方法才会尝试处理响应。\n 4  *\n 5  * @param response\n 6  * @return\
    \ 如果可能，返回响应的字符串表示形式，否则返回空字符串。\n 7  * @throws IOException\n 8  */\n 9 public static\
    \ final String responseToString(HttpResponse response) throws IOException {\n\
    10  HttpEntity entity = response.getEntity();\n11  if ((response.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK ||\n12    response.getStatusLine().getStatusCode() == HttpStatus.SC_CREATED)\
    \ && entity != null) {\n13   InputStream stream = entity.getContent();\n14   String\
    \ line;\n15   BufferedReader br = new BufferedReader(new InputStreamReader(stream));\n\
    16   StringBuilder strResp = new StringBuilder();\n17   while ((line = br.readLine())\
    \ != null) {\n18    strResp.append(line);\n19   }\n20   IOUtils.closeQuietly(stream);\n\
    21   IOUtils.closeQuietly(br);\n22   return strResp.toString();\n23  } else {\n\
    24   return StringUtils.EMPTY;\n25  }\n26 }\n```\n\n在本节中，我们将讨论如何对书中讨论的数据流进行单元测试，即市场数据流和交易/订单/账户事件流。我们将使用完全相同的技术，即使用上一节中描述的模拟技术对它们进行单元测试。和之前一样，我们会将\
    \ `HttpGet` 中可用的 `InputStream` 切换为 `FileInputStream`，其中的每一行都是一个 JSON 格式的事件。我们的单元测试文件中的一个片段如下所示：\n\
    \n```\n 1 {\"tick\":{\"instrument\":\"AUD_CAD\",\"time\":\"1401919213548144\"\
    ,\"bid\":1.01479,\"ask\":1.01498}}\n 2 {\"tick\":{\"instrument\":\"NZD_SGD\",\"\
