  trans: "\n### 6.1 `Order` POJO 定义\n\n要下单，首先必须定义一个 POJO 来容纳所有必要的订单信息。在此之前，我们先快速浏览一下用于定义我们将支持的不同订单类型的枚举，以及定义订单买卖方向的枚举。\n\
    \n```\n 1 public enum OrderType {\n 2  MARKET,\n 3  LIMIT;\n 4 }\n\n6 public enum\
    \ TradingSignal {\n7  LONG,\n8  SHORT,\n9  NONE;\n\n11  public TradingSignal flip()\
    \ {\n12   switch (this) {\n13    case LONG:\n14     return SHORT;\n15    case\
    \ SHORT:\n16     return LONG;\n17    default:\n18     return this;\n19   }\n20\
    \  }\n21 }\n```\n\n`OrderType` 枚举看起来相当直观。有人可能会问为什么我们没有**止损**或**止盈**订单类型。如前所述，这些订单类型是\
    \ `LIMIT` 订单的衍生形式，无需另行指定。当我们讨论下单机制时，这一点会更加清晰。我们使用 `TradingSignal` 枚举来表示订单的买卖方向。顾名思义，该枚举可以由策略函数返回，以指示我们必须买入或卖出某个证券。我们将在讨论一些示例交易策略时进一步探讨这一点。\n\
    \n代码清单 6.1：`Order` POJO 定义\n\n```\n 1 /**\n 2  * @param <M>\n 3  *           \
    \ TradeableInstrument 类中 instrumentId 的类型\n 4  * @param <N>\n 5  *           \
    \ orderId 的类型\n 6  * @see TradeableInstrument\n 7  */\n 8 public class Order <\
    \ M, N > {\n 9  private final TradeableInstrument < M > instrument;\n10  private\
    \ final long units;\n11  private final TradingSignal side;\n12  private final\
    \ OrderType type;\n13  private final double takeProfit;\n14  private final double\
    \ stopLoss;\n15  private N orderId;\n16  private final double price;\n\n18  /*\n\
    19   * orderId 未包含在构造函数中，因为通常情况下，它只在订单成功提交后由平台分配。\n20   */\n21  public Order(TradeableInstrument\
    \ < M > instrument, long units, TradingSignal side, OrderType type,\n22   double\
    \ price) {\n23   this(instrument, units, side, type, 0.0, 0.0, price);\n24  }\n\
    \n27  public Order(TradeableInstrument < M > instrument, long units, TradingSignal\
    \ side, OrderType type) {\n28   this(instrument, units, side, type, 0.0, 0.0);\n\
    29  }\n\n31  public Order(TradeableInstrument < M > instrument, long units, TradingSignal\
    \ side, OrderType type,\n32   double takeProfit, double stopLoss) {\n33   this(instrument,\
    \ units, side, type, takeProfit, stopLoss, 0.0);\n34  }\n\n36  public Order(TradeableInstrument\
    \ < M > instrument, long units, TradingSignal side, OrderType type,\n37   double\
    \ takeProfit, double stopLoss, double price) {\n38   this.instrument = instrument;\n\
    39   this.units = units;\n40   this.side = side;\n41   this.type = type;\n42 \
    \  this.takeProfit = takeProfit;\n43   this.stopLoss = stopLoss;\n44   this.price\
    \ = price;\n45  }\n\n47  public N getOrderId() {\n48   return orderId;\n49  }\n\
    \n51  public void setOrderId(N orderId) {\n52   this.orderId = orderId;\n53  }\n\
    \n55  public double getStopLoss() {\n56   return stopLoss;\n57  }\n\n59  public\
    \ double getPrice() {\n60   return price;\n61  }\n\n63  public TradeableInstrument\
    \ < M > getInstrument() {\n64   return instrument;\n65  }\n\n67  public long getUnits()\
    \ {\n68   return units;\n69  }\n\n71  public TradingSignal getSide() {\n72   return\
    \ side;\n73  }\n\n75  public OrderType getType() {\n76   return type;\n77  }\n\
    \n79  public double getTakeProfit() {\n80   return takeProfit;\n81  }\n\n83  @Override\n\
    84  public String toString() {\n85   return \"Order [instrument=\" + instrument\
    \ + \", units=\" + units + \", side=\" + side +\n86    \", type=\" + type + \"\
    , takeProfit=\" + takeProfit + \", stopLoss=\" + stopLoss + \", orderId=\" +\n\
    87    orderId + \", price=\" + price + \"]\";\n88  }\n89 }\n```\n\n`Order` POJO\
    \ 的定义非常简单。需要指出的是构造该 POJO 的几种方式。最简单的是使用仅包含必要信息的构造函数，例如 `instrument`、`units`、`side`、`type`。这是一个典型的提交普通市价单（无盈利目标或止损）的情况，平台应在最佳可用即期价格上立即执行该订单。另一方面，您可以指定其余属性\
    \ `takeProfit`、`stopLoss`、`price` 来提交限价单。另一个可能注意到的点是，在之前讨论的最简单的构造函数中，为 `takeProfit`、`stopLoss`\
    \ 等属性分配了默认值 `0.0`。这是一个有争议的赋值，在某些平台上可能会出现问题，因为 `0.0` 可能不是未设置止损限制的可接受默认值。更倾向于采用的替代值可能是\
    \ `null`。如果是这种情况，则必须修改 POJO 定义，并将诸如 `double` 之类的原始类型替换为 `Double`。\n\n### 6.2 `OrderManagementProvider`\
    \ 接口\n\n现在，我们将注意力转向定义提供者必须实现的接口，以提供一些有用的订单管理服务，例如下单和查询订单。这是我们将看到所有 CRUD 操作实际应用的少数几个提供者接口之一。让我们直接进入接口定义。\n\
    \n代码清单 6.2：`OrderManagementProvider` 接口\n\n```\n 1 /**\n 2  * 为金融工具订单提供 CRUD 操作的提供者。订单通常是针对特定金融工具和/或\
    \ accountId 提交的。\n 3  * 如果平台提供者只允许单个账户，则可能不需要 accountId，在这种情况下，所有订单都在默认账户下创建。\n\
    \ 4  *\n 5  * @param <M>\n 6  *            orderId 的类型\n 7  * @param <N>\n 8 \
    \ *            TradeableInstrument 类中 instrumentId 的类型\n 9  * @param <K>\n10 \
    \ *            accountId 的类型\n11  * @see TradeableInstrument\n12  */\n13 public\
    \ interface OrderManagementProvider < M, N, K > {\n\n15  /**\n16   * 订单通常为市价单或限价单类型。市价单由平台立即执行，而限价单仅在达到限价时执行。\n\
    17   * 因此，对于限价单，此方法可能不会返回 orderId。\n18   *\n19   * @param order\n20   * @param\
    \ accountId\n21   * @return 如果可能，返回一个有效的 orderId。\n22   */\n23  M placeOrder(Order\
    \ < N, M > order, K accountId);\n\n25  /**\n26   * 修改给定订单的属性。平台可能只允许修改限价、止损、止盈、到期日期、单位等属性。\n\
    27   *\n28   * @param order\n29   * @param accountId\n30   * @return 布尔值，指示操作是否成功。\n\
    31   */\n32  boolean modifyOrder(Order < N, M > order, K accountId);\n\n34  /**\n\
    35   * 如果订单正在等待执行，则有效取消订单。可能需要有效的 orderId 和可选的 accountId 来唯一标识要关闭/取消的订单。\n36 \
    \  *\n37   * @param orderId\n38   * @param accountId\n39   * @return 布尔值，指示操作是否成功。\n\
    40   */\n41  boolean closeOrder(M orderId, K accountId);\n\n43  /**\n44   *\n\
    45   * @return 所有账户中所有待处理订单的集合\n46   */\n47  Collection < Order < N,\n48  M >>\
    \ allPendingOrders();\n\n50  /**\n51   *\n52   * @param accountId\n53   * @return\
    \ 给定 accountId 的所有待处理订单的集合。\n54   */\n55  Collection < Order < N,\n56  M >> pendingOrdersForAccount(K\
    \ accountId);\n\n58  /**\n59   *\n60   * @param orderId\n61   * @param accountId\n\
    62   * @return 由 orderId 和可选的 accountId 唯一标识的订单\n63   */\n64  Order < N,\n65 \
    \ M > pendingOrderForAccount(M orderId, K accountId);\n\n67  /**\n68   *\n69 \
    \  * @param instrument\n70   * @return 所有账户中给定金融工具的所有待处理订单的集合\n71   */\n72  Collection\
    \ < Order < N,\n73  M >> pendingOrdersForInstrument(TradeableInstrument < N >\
    \ instrument);\n74 }\n```\n\n如上所示，我们的提供者接口提供了丰富的功能集来管理订单。由于接口方法都是自解释的，让我们直接进入具体实现将是什么样子。\n"
- fmt: "### 6.3 A Concrete implementation for `OrderManagementProvider`\n\nNow we\
    \ come to the fun part where we dive deep into the implementation and discuss\
    \ how we can implement an OANDA provider. Since we are going implement the full\
    \ set of CRUD operations, we need to also get acquainted with the REST verbs that\
    \ are equivalent of these operations. We already know that http `GET` equates\
    \ to `R` (read). What about the rest `C`, `U` and `D`? The table below summarises\
    \ the http verb which is used to accomplish the actions.\n\n| Operation | Http\
    \ Verb |\n| --- | --- |\n| Create new Order [C] | POST |\n| Query Order details\
    \ [R] | GET |\n| Update existing Order [U] | PATCH |\n| Close pending Order [D]\
    \ | DELETE |\n\nWith this information at hand, lets first look at the class definition\
    \ including constructor and the json keys that would be required. We need an `AccountProvider`\
    \ dependency to be provided, which we will pass in the constructor. The order\
    \ id in OANDA is a `Long`. Therefore substituting, `Long` for account id and `String`\
    \ for instrument id we get the following definition:\n\n```\n 1 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.expiry;\n 2 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.id;\n 3 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.instrument;\n 4 import\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.orderOpened;\n\
    \ 5 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.price;\n\
    \ 6 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.side;\n\
    \ 7 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.stopLoss;\n\
    \ 8 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.takeProfit;\n\
    \ 9 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.tradeOpened;\n\
    10 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.type;\n\
    11 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.units;\n\
    \n13 public class OandaOrderManagementProvider implements OrderManagementProvider<Long,\
    \ String, Long> {\n\n15 \tprivate final String url;\n16 \tprivate final BasicHeader\
    \ authHeader;\n17 \tprivate final AccountDataProvider<Long> accountDataProvider;\n\
    \n19 \tpublic OandaOrderManagementProvider(String url, String accessToken,\n20\
    \ \tAccountDataProvider<Long> accountDataProvider) {\n21 \t\tthis.url = url; //\
    \ OANDA REST service base url\n22 \t\tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    23 \t\tthis.accountDataProvider = accountDataProvider;\n24 \t}\n```\n\nNow let\
    \ us first code the method to place a new order. To place a successful order,\
    \ we must at least provide the minimum order information (using the minimal constructor\
    \ in `Order` POJO) and a valid account id. Let us first look at the function that\
    \ creates the http post command which will be later used in the `placeOrder` function.\n\
    \n```\n 1 private static final String ordersResource = \"/orders\";\n\n3 HttpPost\
    \ createPostCommand(Order < String, Long > order, Long accountId) throws Exception\
    \ {\n 4  HttpPost httpPost = new HttpPost(\n 5   this.url + OandaConstants.ACCOUNTS_RESOURCE\
    \ +\n 6   TradingConstants.FWD_SLASH + accountId + ordersResource);\n 7  httpPost.setHeader(this.authHeader);\n\
    \ 8  List < NameValuePair > params = Lists.newArrayList();\n 9  // Apply proper\
    \ rounding to price,stop loss, take profit. Oanda rejects 0.960000001\n 10  params.add(new\
    \ BasicNameValuePair(instrument, order.getInstrument().getInstrument()));\n 11\
    \  params.add(new BasicNameValuePair(side, OandaUtils.toSide(order.getSide())));\n\
    \ 12  params.add(new BasicNameValuePair(type, OandaUtils.toType(order.getType())));\n\
    \ 13  params.add(new BasicNameValuePair(units, String.valueOf(order.getUnits())));\n\
    \ 14  params.add(new BasicNameValuePair(takeProfit, String.valueOf(order.getTakeProfit())));\n\
    \ 15  params.add(new BasicNameValuePair(stopLoss, String.valueOf(order.getStopLoss())));\n\
    \ 16  if (order.getType() == OrderType.LIMIT && order.getPrice() != 0.0) {\n 17\
    \   DateTime now = DateTime.now();\n 18   DateTime nowplus4hrs = now.plusHours(4);\n\
    \ 19   String dateStr = nowplus4hrs.toString();\n 20   params.add(new BasicNameValuePair(price,\
    \ String.valueOf(order.getPrice())));\n 21   params.add(new BasicNameValuePair(expiry,\
    \ dateStr));\n 22  }\n 23  httpPost.setEntity(new UrlEncodedFormEntity(params));\n\
    \ 24  return httpPost;\n 25 }\n```\n\nWe first create an instance of the `HttpPost`\
    \ object and pass in the url to the constructor. An e.g. url for a valid account\
    \ id 123456 would look like:\n\n```\n1 https://api-fxtrade.oanda.com/v1/accounts/123456/orders\n\
    ```\n\nNow that we have an instance of the `HttpPost` object, we must now create\
    \ a list of `NameValuePair` objects. Each `NameValuePair` defines an attribute\
    \ of an order such as price. Using the `Order` POJO, we define all the order attributes.\
    \ For a `LIMIT` order we must specify a limit price. If we do not provide this\
    \ price, our order will be rejected by the platform. Hence we introduce a special\
    \ check for a limit order and make sure we have a valid price. Whilst defining\
    \ the price, we also quickly add an expiry of 4 hours to the order. This means\
    \ the order will expire automatically on the platform, if the limit price is not\
    \ hit. Once all such order attributes are defined via the list of `NameValuePair`\
    \ objects, we wrap these params/attributes inside a `UrlEncodedFormEntity` and\
    \ set it on the instance of our `HttpPost` object. It is always recommended to\
    \ encode url parameters. Now we are all set to `POST` these params to the platform.\
    \ To do this we return to our `placeOrder` method code.\n\n```\n 1 @Override\n\
    \ 2 public Long placeOrder(Order < String, Long > order, Long accountId) {\n 3\
    \  CloseableHttpClient httpClient = getHttpClient();\n 4  try {\n 5   HttpPost\
    \ httpPost = createPostCommand(order, accountId);\n 6   LOG.info(TradingUtils.executingRequestMsg(httpPost));\n\
    \ 7   HttpResponse resp = httpClient.execute(httpPost);\n 8   if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK || resp.getStatusLine().getStatusCode() == HttpStatus.SC_CREATED)\
    \ {\n 9    if (resp.getEntity() != null) {\n10     String strResp = TradingUtils.responseToString(resp);\n\
    11     Object o = JSONValue.parse(strResp);\n12     JSONObject orderResponse;\n\
    13     if (order.getType() == OrderType.MARKET) {\n14      orderResponse = (JSONObject)((JSONObject)\
    \ o).get(tradeOpened);\n15     } else {\n16      orderResponse = (JSONObject)((JSONObject)\
    \ o).get(orderOpened);\n17     }\n18     Long orderId = (Long) orderResponse.get(OandaJsonKeys.id);\n\
    19     LOG.info(\"Order executed->\" + strResp);\n20     return orderId;\n21 \
    \   } else {\n22     return null;\n23    }\n24   } else {\n25    LOG.info(\"Order\
    \ not executed. http code=\" +\n26     resp.getStatusLine().getStatusCode());\n\
    27    return null;\n28   }\n29  } catch (Exception e) {\n30   LOG.warn(e);\n31\
    \   return null;\n32  } finally {\n33   TradingUtils.closeSilently(httpClient);\n\
    34  }\n35 }\n```"
