    ## 6\. Placing Orders and Trades


    In this chapter we turn our attention to arguably the most interesting part of
    the whole trading process, placing orders and trades. An order is an intention
    to trade. When one places an order for a security, he/she intends that their order
    is filled and a hope that the price moves to their advantage.When an order is
    fully or partly filled, it results in the creation of a trading position. An active
    trading position renders oneself to an unrealized profit or loss situation. When
    this trading position is closed, the unrealized profit/loss is realized and the
    trader is left with an *increased/decreased total book amount.


    Most of the orders can be classified as


    1.  Market: A Market order is an order meant to be fulfilled instantly on the
    platform at the best available price (spot price), assuming that there is enough
    liquidity in the market.

    2.  Limit: A Limit order is where a trader defines the price he wants to buy or
    sell a security at. In essence, its an order to either *buy below the market price*
    or *sell above the market price*. For e.g. EUR_USD is currently trading at 1.06
    and we believe that there is very high probability that in the medium term the
    trajectory is up, but it has still some downside risks, we could place a Limit
    order, to say buy EUR_USD when the price hits 1.04 where we believe is the bottom
    for this pair.

    3.  Take Profit: A Take-Profit order, closes an existing Trading position which
    has hit a pre-determined profit level. For e.g. assuming we put in a market order
    to sell GBP_USD @ 1.545\. We want to close the trading position when the price
    has moved by atleast 200 pips in our favour, i.e., the price reaches 1.525\. To
    automatically realise the profit, we can place a Take-Profit order.

    4.  Stop Loss: A Stop-Loss order is the opposite of a Take-Profit order. It is
    an order to limit our losses once the price moves adversely and our open trading
    position deteriorates in value. Lets say we put a market order to sell EUR_CHF
    @ 1.07\. However, we want to automatically close this position if the price hits
    1.085, limiting our losses to 150 pips. This is where a Stop-Loss order comes
    in very handy.


    ***Take-Profit*** and ***Stop-Loss*** orders could be classified as derivatives
    of a ***Limit*** order. Essentially, to realise our profits or to limit our losses,
    we are placing an order to be triggered that will automatically close a trading
    position. These 2 types orders are defined only if there is an open trading position
    that risks being closed when these orders are triggered. For that to happen, the
    trading position must be of the opposite type than that of the order. For e.g.
    we must have an open *buy* trade position of a security in order to trigger a
    ***Take-Profit***/***Stop-Loss*** *sell* order for the same security.


    Other order types that one might come across are as following


    *   Trailing Stop

    *   Immediate or Canceled

    *   Fill or Kill'
