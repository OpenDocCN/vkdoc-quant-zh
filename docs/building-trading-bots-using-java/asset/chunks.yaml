    26   HttpResponse resp = httpClient.execute(httpPatch);\n27   if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK) {\n28    if (resp.getEntity() != null) {\n29     LOG.info(\"\
    Trade Modified->\" + TradingUtils.responseToString(resp));\n30    } else {\n31\
    \     LOG.warn(String.format(\n32      \"trade %d could not be modified with stop\
    \ loss %3.5f and take profit % 3.5 f.httpcode = % d \",\n33      tradeId, stopLoss,\
    \ takeProfit, resp.getStatusLine().getStatusCode()));\n34    }\n35    return true;\n\
    36   } else {\n37    LOG.warn(String.format(\"trade %d could not be modified with\
    \ stop loss %3.5f. http code=%d\",\n38     tradeId, stopLoss, resp.getStatusLine().getStatusCode()));\n\
    39   }\n40  } catch (Exception e) {\n41   LOG.error(e);\n42  } finally {\n43 \
    \  TradingUtils.closeSilently(httpClient);\n44  }\n45  return false;\n46 }\n```\n\
    \nWe begin our discussion by first looking at the function `getTradeForAccountUrl`\
    \ that computes the REST resource url that we need to send our patch request to,\
    \ to modify the trade. For an account id **123456** and trade id **234567** the\
    \ function would compute\n\n```\n1 https://api-fxtrade.oanda.com/v1/accounts/123456/trades/234567\n\
    ```\n\nOnce the url is computed, we can create an instance of *HttpPatch* object\
    \ to prepare our patch command. This time for the list of *NameValuePair* objects\
    \ we just have to create 2 of them for take profit and stop loss respectively.\
    \ The list can then be url encoded and set on the instance of the *HttpPatch*\
    \ object. At this point we are ready to fire off the modification request to the\
    \ platform. A successful modification would return an http header like\n\n```\n\
    1 HTTP/1.1 200 OK\n2 Content-Type: application/json\n3 Content-Length: 179\n```\n\
    \nOnce we receive http status code *200*, we can return true from the method else\
    \ a false in case of another code or error. This is it, that’s all there is to\
    \ the ***modifyTrade*** method.\n\nNext one on our list is the ***closeTrade***\
    \ method. It is pretty much identical to the ***closeOrder*** method and the discussion\
    \ to the order counterpart applies here. Therefore listing the code should suffice.\n\
    \n```\n 1 @Override\n 2 public boolean closeTrade(Long tradeId, Long accountId)\
    \ {\n 3  CloseableHttpClient httpClient = getHttpClient();\n 4  try {\n 5   HttpDelete\
    \ httpDelete = new HttpDelete(getTradeForAccountUrl(tradeId,\n 6    accountId));\n\
    \ 7   httpDelete.setHeader(authHeader);\n 8   LOG.info(TradingUtils.executingRequestMsg(httpDelete));\n\
    \ 9   HttpResponse resp = httpClient.execute(httpDelete);\n10   if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK) {\n11    LOG.info(String.format(\"Trade %d successfully\
    \ closed for account %d\",\n12     tradeId, accountId));\n13    return true;\n\
    14   } else {\n15    LOG.warn(String.format(\"Trade %d could not be closed. Recd\
    \ error code %d\",\n16     tradeId, resp.getStatusLine().getStatusCode()));\n\
    17   }\n18  } catch (Exception e) {\n19   LOG.warn(\"error deleting trade id:\"\
    \ + tradeId, e);\n20  } finally {\n21   TradingUtils.closeSilently(httpClient);\n\
    22  }\n23  return false;\n24 }\n```\n\nTurning our attention to the ‘R’ operation\
    \ for trades, we will observe that there is a remarkable resemblance to the Order\
    \ counterpart. Lets first look at the method to fetch all trades for an account.\n\
    \n```\n 1 String getTradesInfoUrl(Long accountId) {\n 2  return this.url + OandaConstants.ACCOUNTS_RESOURCE\
    \ + TradingConstants.FWD_SLASH + accountId + tradesResource;\n 3 }\n 4 @Override\n\
    \ 5 public Collection < Trade < Long, String, Long >> getTradesForAccount(Long\
    \ accountId) {\n 6  Collection < Trade < Long, String, Long >> allTrades = Lists.newArrayList();\n\
    \ 7  CloseableHttpClient httpClient = getHttpClient();\n 8  try {\n 9   HttpUriRequest\
    \ httpGet = new HttpGet(getTradesInfoUrl(accountId));\n10   httpGet.setHeader(this.authHeader);\n\
    11   httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n12   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    13   HttpResponse resp = httpClient.execute(httpGet);\n14   String strResp = TradingUtils.responseToString(resp);\n\
    15   if (strResp != StringUtils.EMPTY) {\n16    Object obj = JSONValue.parse(strResp);\n\
    17    JSONObject jsonResp = (JSONObject) obj;\n18    JSONArray accountTrades =\
    \ (JSONArray) jsonResp.get(trades);\n19    for (Object accountTrade: accountTrades)\
    \ {\n20     JSONObject trade = (JSONObject) accountTrade;\n21     Trade < Long,\
    \ String, Long > tradeInfo = parseTrade(trade, accountId);\n22     allTrades.add(tradeInfo);\n\
    23    }\n24   } else {\n25    TradingUtils.printErrorMsg(resp);\n26   }\n27  }\
    \ catch (Exception ex) {\n28   LOG.error(ex);\n29  } finally {\n30   TradingUtils.closeSilently(httpClient);\n\
    31  }\n32  return allTrades;\n33 }\n```\n\nWe begin by calling the `getTradesInfoUrl`\
    \ to compute the url that can be fired off to the platform to retrieve all the\
    \ orders for an account. For an account **123456**, the method would return the\
    \ value\n\n```\n1 https://api-fxtrade.oanda.com/v1/accounts/123456/trades\n```\n\
    \nA successful call would result in a json payload like the following being returned\
    \ from the platform\n\n```\n 1 {\n 2   \"trades\": [\n 3     {\n 4       \"id\"\
    : 1800805337,\n 5       \"units\": 3000,\n 6       \"side\": \"sell\",\n 7   \
    \    \"instrument\": \"CHF_JPY\",\n 8       \"time\": \"1426660416000000\",\n\
    \ 9       \"price\": 120.521,\n10       \"takeProfit\": 105.521,\n11       \"\
    stopLoss\": 121.521,\n12       \"trailingStop\": 0,\n13       \"trailingAmount\"\
    : 0\n14     },\n15     {\n16       \"id\": 1800511850,\n17       \"units\": 3000,\n\
    18       \"side\": \"buy\",\n19       \"instrument\": \"USD_CHF\",\n20       \"\
    time\": \"1426260592000000\",\n21       \"price\": 1.0098,\n22       \"takeProfit\"\
    : 1.15979,\n23       \"stopLoss\": 0.9854,\n24       \"trailingStop\": 0,\n25\
    \       \"trailingAmount\": 0\n26     },\n27   ]\n28 }\n```\n\nNow what remains\
    \ is to parse such a payload to create our collection of trades to be returned\
    \ back. Since its a `JSONArray` of *trades*, we need to write a for loop to process\
    \ each element and delegate the attributes parsing to the `parseTrade` method\
    \ as below to create and return the ***Trade*** pojo.\n\n```\n 1 private Trade\
    \ < Long, String, Long > parseTrade(JSONObject trade, Long accountId) {\n 2  final\
    \ Long tradeTime = Long.parseLong(trade.get(time).toString());\n 3  final Long\
    \ tradeId = (Long) trade.get(id);\n 4  final Long tradeUnits = (Long) trade.get(units);\n\
    \ 5  final TradingSignal tradeSignal = OandaUtils.toTradingSignal((String) trade.get(side));\n\
    \ 6  final TradeableInstrument < String > tradeInstrument = new TradeableInstrument\
    \ < String > ((String) trade\n 7   .get(instrument));\n 8  final double tradeTakeProfit\
    \ = ((Number) trade.get(takeProfit)).doubleValue();\n 9  final double tradeExecutionPrice\
    \ = ((Number) trade.get(price)).doubleValue();\n10  final double tradeStopLoss\
    \ = ((Number) trade.get(stopLoss)).doubleValue();\n\n12  return new Trade < Long,\
    \ String, Long > (tradeId, tradeUnits, tradeSignal, tradeInstrument, new DateTime(\n\
    13    TradingUtils.toMillisFromNanos(tradeTime)), tradeTakeProfit, tradeExecutionPrice,\
    \ tradeStopLoss,\n14   accountId);\n\n16 }\n```\n\nThe parsing logic above is\
    \ self explanatory. The last one to discuss is retrieving a trade with a given\
    \ trade id and a given account id."
  trans: "\n`modifyTrade()`方法首先调用`getTradeForAccountUrl()`函数计算需要发送`PATCH`请求的 REST\
    \ 资源 URL，以修改交易。对于账户 ID **123456** 和交易 ID **234567**，该函数将计算得到：\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/trades/234567\n\
    ```\n\n计算得到 URL 后，我们可以创建`HttpPatch`对象实例来准备补丁命令。这次对于`NameValuePair`对象列表，只需分别创建\
    \ 2 个：一个用于止盈（`takeProfit`），一个用于止损（`stopLoss`）。该列表随后需进行 URL 编码，并设置到`HttpPatch`对象实例上。至此，即可向平台发起修改请求。成功修改将返回如下\
    \ HTTP 标头：\n\n```\nHTTP/1.1 200 OK\nContent-Type: application/json\nContent-Length:\
    \ 179\n```\n\n当收到 HTTP 状态码**200**后，方法返回`true`；若收到其他状态码或发生错误则返回`false`。这就是`modifyTrade`方法的全部内容。\n\
    \n接下来讨论`closeTrade`方法。该方法与`closeOrder`方法几乎完全相同，订单对应的讨论同样适用于此。因此直接列出代码即可。\n\n```\n\
    @Override\npublic boolean closeTrade(Long tradeId, Long accountId) {\n    CloseableHttpClient\
    \ httpClient = getHttpClient();\n    try {\n        HttpDelete httpDelete = new\
    \ HttpDelete(getTradeForAccountUrl(tradeId, accountId));\n        httpDelete.setHeader(authHeader);\n\
    \        LOG.info(TradingUtils.executingRequestMsg(httpDelete));\n        HttpResponse\
    \ resp = httpClient.execute(httpDelete);\n        if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK) {\n            LOG.info(String.format(\"Trade %d successfully\
