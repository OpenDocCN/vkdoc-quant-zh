    \ instrument;\n13  }\n\n15  public double getPrice() {\n16   return price;\n17\
    \  }\n\n19 }\n```\n\nThe concept of well structured trade tweet means, a set of\
    \ Twitter users which consistently tweet in a given format and for which we can\
    \ write a TweetHandler for. We are only interested in their tweets which are about\
    \ a new Order or closing a Trade. The reason for this will become clearer when\
    \ we discuss a strategy based on Tweets. For the time being lets look at some\
    \ examples of tweets from user **@SignalFactory**^([6](#part0059.html#fn-sigfact))\
    \ and **@ZuluTrader101**^([7](#part0059.html#fn-zulu)) and it will become clearer\
    \ what I mean.\n\n-Tweets from @SignalFactory\n\n![New Trade](images/00068.jpeg\
    \ \"NewTrade\") New Trade ![New Trade](images/00069.jpeg \"NewTrade1\") New Trade\
    \ ![Close Trade](images/00070.jpeg \"CloseTrade\") Close Trade ![Close Trade](images/00071.jpeg\
    \ \"CloseTrade\") Close Trade\n\n-Tweets from @ZuluTrader101\n\n![New and Close\
    \ Trades](images/00072.jpeg \"Zulu\") New and Close Trades ![New and Close Trades](images/00073.jpeg\
    \ \"Zulu\") New and Close Trades\n\nLooking at the Tweet examples from the 2 users,\
    \ there is certain format in which they Tweet always. The parsing of these then\
    \ becomes trivial if we assign a dedicated Tweet handler these, which knows how\
    \ to parse Tweets from the given user. We will come back to discussing the handlers\
    \ shortly. Before that lets look at how we search for Tweets from given users.\n\
    \n#### 8.3.1 TweetHarvester interface\n\nThe *TweetHarvester* interface mandates\
    \ the search for Tweets for a given user that result in a collection of both new/closed\
    \ trades FX Tweets. Its definition is as follows\n\n```\n1 public interface TweetHarvester\
    \ < T > {\n\n3  Collection < NewFXTradeTweet < T >> harvestNewTradeTweets(String\
    \ userId);\n\n5  Collection < CloseFXTradeTweet < T >> harvestHistoricTradeTweets(String\
    \ userId,\n6   TradeableInstrument < T > instrument);\n7 }\n```\n\nThe first method\
    \ of the interface is fairly straightforward. This method’s contract is to harvest\
    \ new Trade tweets from a given user since the last search was done. The implementer\
    \ is responsible for keeping track of the timeline and should only return the\
    \ new ones.\n\nThe second method’s contract is again to harvest new Tweets, this\
    \ time for closed trades, since the last search and for a given instrument.\n\n\
    #### 8.3.2 FXTweetHandler interface\n\nAs we discussed earlier on, in this chapter,\
    \ as long as a given user consistently tweets in a given format, a dedicated handler\
    \ assigned to that fx new/close trade tweet, can parse it and create the *NewFxTradeTweet*\
    \ and *CloseFXTradeTweet* from it. This interface, formulates that contract and\
    \ provide a few other useful methods\n\n```\n 1 public interface FXTweetHandler\
    \ < T > {\n\n 3  FXTradeTweet < T > handleTweet(Tweet tweet);\n\n 5  String getUserId();\n\
    \n 7  Collection < Tweet > findNewTweets();\n\n 9  Collection < Tweet > findHistoricPnlTweetsForInstrument(\n\
    10   TradeableInstrument < T > instrument);\n11 }\n```\n\nThe first 3 interface\
    \ methods are fairly self-explanatory. The method *findHistoricPnlTweetsForInstrument*\
    \ requires a bit of explanation. The contract for this method is to retrieve all\
    \ Tweets that were posted by a given user for a given instrument and were all\
    \ close trades tweets, which resulted in a PNL figure (for e.g. a positive or\
    \ a negative pip figure result. Refer back to the close trade tweets from the\
    \ 2 users discussed in this chapter). This again probably won’t make much sense\
    \ now, but will do so when we discuss our Twitter based strategy in the next chapter."
  trans: "\n### 8.3 采集外汇推文\n\n现在进入本章的核心内容，我们将讨论如何采集（搜索）结构良好的交易/订单推文。我们的目标是找到结构良好的推文，这些推文可以被解析并创建以下\
    \ POJO：\n\n- `NewFXTradeTweet`\n\n```java\npublic class NewFXTradeTweet < T >\
    \ extends FXTradeTweet < T > {\n    private final double stopLoss,\n    takeProfit;\n\
    \    private final TradingSignal action;\n    private final String str;\n\n  \
    \  public NewFXTradeTweet(TradeableInstrument < T > instrument, double price,\n\
    \        double stopLoss, double takeProfit,\n        TradingSignal action) {\n\
    \        super(instrument, price);\n        this.stopLoss = stopLoss;\n      \
    \  this.takeProfit = takeProfit;\n        this.action = action;\n        this.str\
    \ = String.format(\"%s@%3.5f TP: %3.5f: SL: %3.5f %s\",\n            instrument.getInstrument(),\
    \ price, takeProfit,\n            stopLoss, action.name());\n    }\n\n    @Override\n\
    \    public String toString() {\n        return str;\n    }\n\n    public TradingSignal\
    \ getAction() {\n        return this.action;\n    }\n\n    public double getStopLoss()\
    \ {\n        return stopLoss;\n    }\n\n    public double getTakeProfit() {\n\
    \        return takeProfit;\n    }\n}\n```\n\n- `CloseFXTradeTweet`\n\n```java\n\
    public class CloseFXTradeTweet < T > extends FXTradeTweet < T > {\n    private\
    \ final double profit,\n    price;\n\n    public CloseFXTradeTweet(TradeableInstrument\
    \ < T > instrument, double profit,\n        double price) {\n        super(instrument,\
    \ price);\n        this.profit = profit;\n        this.price = price;\n    }\n\
    \n    public double getProfit() {\n        return profit;\n    }\n\n    @Override\n\
    \    public double getPrice() {\n        return price;\n    }\n}\n```\n\n其中基类\
    \ `FXTradeTweet` 为：\n\n```java\npublic abstract class FXTradeTweet < T > {\n \
    \   private final TradeableInstrument < T > instrument;\n    private final double\
    \ price;\n\n    public FXTradeTweet(TradeableInstrument < T > instrument, double\
    \ price) {\n        super();\n        this.instrument = instrument;\n        this.price\
    \ = price;\n    }\n\n    public TradeableInstrument < T > getInstrument() {\n\
    \        return instrument;\n    }\n\n    public double getPrice() {\n       \
    \ return price;\n    }\n}\n```\n\n结构良好的交易推文的概念是指，一群 Twitter 用户以固定格式持续发布推文，并且我们可以为这些推文编写\
    \ `TweetHandler`。我们只关注那些关于新订单或平仓交易的推文。当我们讨论基于推文的策略时，其理由会更加清晰。现在先让我们看看来自用户 `@SignalFactory`^(6)\
    \ 和 `@ZuluTrader101`^(7) 的一些推文示例，这样就能更清楚地理解我的意思。\n\n- 来自 `@SignalFactory` 的推文\n\
    \n![新交易](img/00068.jpeg \"NewTrade\") 新交易 ![新交易](img/00069.jpeg \"NewTrade1\"\
    ) 新交易 ![平仓](img/00070.jpeg \"CloseTrade\") 平仓 ![平仓](img/00071.jpeg \"CloseTrade\"\
    ) 平仓\n\n- 来自 `@ZuluTrader101` 的推文\n\n![新交易与平仓](img/00072.jpeg \"Zulu\") 新交易与平仓\
    \ ![新交易与平仓](img/00073.jpeg \"Zulu\") 新交易与平仓\n\n查看来自这两位用户的推文示例，可以发现他们总是以某种固定格式发布推文。如果我们为这些推文分配一个专门的推文处理器（该处理器知道如何解析来自特定用户的推文），那么解析这些推文就变得很简单。我们稍后再讨论处理器。在此之前，我们先看看如何搜索来自特定用户的推文。\n\
    \n### 8.3.1 TweetHarvester 接口\n\n`TweetHarvester` 接口规定了为给定用户搜索推文的功能，这些推文会生成一个包含新建/平仓外汇交易推文的集合。其定义如下：\n\
    \n```java\npublic interface TweetHarvester < T > {\n\n    Collection < NewFXTradeTweet\
    \ < T >> harvestNewTradeTweets(String userId);\n\n    Collection < CloseFXTradeTweet\
    \ < T >> harvestHistoricTradeTweets(String userId,\n        TradeableInstrument\
    \ < T > instrument);\n}\n```\n\n接口的第一个方法相当直接。该方法的职责是，自上次搜索以来，从给定用户处采集新的交易推文。实现者负责跟踪时间线，并且只应返回新的推文。\n\
    \n第二个方法的职责同样是采集自上次搜索以来，针对给定交易品种的平仓交易新推文。\n\n### 8.3.2 FXTweetHandler 接口\n\n正如我们本章前面讨论过的，只要给定用户以固定格式持续发布推文，为这些新建/平仓外汇交易推文分配的专用处理器，就能解析该推文并从中创建\
    \ `NewFxTradeTweet` 和 `CloseFXTradeTweet`。该接口定义了这一约定，并提供了一些其他有用的方法：\n\n```java\n\
    public interface FXTweetHandler < T > {\n\n    FXTradeTweet < T > handleTweet(Tweet\
    \ tweet);\n\n    String getUserId();\n\n    Collection < Tweet > findNewTweets();\n\
    \n    Collection < Tweet > findHistoricPnlTweetsForInstrument(\n        TradeableInstrument\
    \ < T > instrument);\n}\n```\n\n前三个接口方法不言自明。方法 `findHistoricPnlTweetsForInstrument`\
    \ 需要稍作解释。该方法的约定是，检索给定用户针对给定交易品种发布的所有推文，这些推文均为平仓交易推文，并产生了盈亏数据（例如，正值或负值的点数结果。请回顾本章讨论的两位用户的平仓交易推文）。这一点目前可能还不太容易理解，但当我们下一章讨论基于\
    \ Twitter 的策略时，就会豁然开朗。\n"
- fmt: "### 8.3.3 `AbstractFXTweetHandler` base class\n\nWe start the discussion about\
    \ the implementation of `FXTweetHandler` interface by defining an abstract class\
    \ that implements this interface but only implements couple of key methods of\
    \ the interface `findNewTweets()` and `getUserId()`.\n\nThe implementation of\
    \ the method `findNewTweets()` in particular, presents us with the opportunity\
    \ to discuss Twitter search API^([8](#part0059.html#fn-srchapi)). The API provides\
    \ us with comprehensive set of query operators which enables us to build a search\
    \ query and retrieve a collection of tweets in reverse chronological order. The\
    \ response from Twitter is a json payload, but because we are using `TwitterTemplate`,\
    \ Spring takes care of parsing the payload and converting it into a collection\
    \ of `org.springframework.social.twitter.api.Tweet` objects which is much easier\
    \ to work with.\n\n**It is strongly recommended that you read the search api page\
    \ in order to understand the operators, constraints around the results returned\
    \ and best practices before proceeding further.**\n\nSome examples directly taken\
    \ and slightly modified from the documentation and relevant to our search are\
    \ as follows\n\n| Operator | Finds tweets |\n| --- | --- |\n| `from:foo` | find\
    \ tweets from user “foo” |\n| `from:foo since:2015-012-01` | find tweets from\
    \ user “foo” since 2015-012-01 |\n| `from:foo since_id:10000000` | find tweets\
    \ from user “foo” since tweet id 10000000 |\n| `from:foo Profit: OR Loss:` | find\
    \ tweets from user “foo” containing characters (‘Profit:’ OR ‘Loss:’) |\n\n```\n\
    \ 1 public abstract class AbstractFXTweetHandler < T > implements FXTweetHandler\
    \ < T > {\n\n3  @Autowired\n 4  protected Twitter twitter;\n 5  @Autowired\n 6\
    \  protected InstrumentService < T > instrumentService;\n 7  @Autowired\n 8  protected\
    \ ProviderHelper providerHelper;\n\n10  protected final DateTime startTime = DateTime.now();\n\
    11  protected final String startTimeAsStr;\n12  protected volatile Long lastTweetId\
    \ = null;\n13  protected final String userId;\n14  protected static final String\
    \ CLOSED = \"Closed\";\n15  protected static final String BOUGHT = \"Bought\"\
    ;\n16  protected static final String SOLD = \"Sold\";\n17  protected static final\
    \ Logger LOG =\n18  Logger.getLogger(AbstractFXTweetHandler.class);\n19  static\
    \ final String FROM_USER_SINCE_TIME_TWITTER_QRY_TMPL =\n20  \"from:%s since:%s\"\
    ;\n21  static final String FROM_USER_SINCE_ID_TWITTER_QRY_TMPL =\n22  \"from:%s\
    \ since_id:%d\";\n\n24  protected AbstractFXTweetHandler(String userId) {\n25\
    \   this.userId = userId;\n26   DateTimeFormatter formatter = DateTimeFormat.forPattern(\"\
    yyyy-MM-dd\");\n27   startTimeAsStr = formatter.print(this.startTime);\n28  }\n\
    \n30  protected abstract NewFXTradeTweet < T > parseNewTrade(String tokens[]);\n\
    \n32  protected abstract CloseFXTradeTweet < T > parseCloseTrade(String tokens[]);\n\
    \n34  @Override\n35  public String getUserId() {\n36   return userId;\n37  }\n\
    \n39  private class TweetPredicate implements Predicate < Tweet > {\n\n41   @Override\n\
    42   public boolean apply(Tweet input) {\n43    return startTime.isBefore(input.getCreatedAt().getTime());\n\
    44   }\n\n46  }\n\n48  @Override\n49  public Collection < Tweet > findNewTweets()\
    \ {\n50   SearchResults results = null;\n51   if (lastTweetId == null) { // find\
    \ new tweets since the start of the app\n52    synchronized(this) {\n53     if\
    \ (lastTweetId == null) { // double check locking\n54      results = twitter.searchOperations().search(\n\
    55       String.format(\n56        FROM_USER_SINCE_TIME_TWITTER_QRY_TMPL, getUserId(),\
    \ this.startTimeAsStr));\n57      TweetPredicate predicate = new TweetPredicate();\n\
    58      List < Tweet > filteredTweets = Lists.newArrayList();\n59      for (Tweet\
    \ tweet: results.getTweets()) {\n60       if (predicate.apply(tweet)) {\n61  \
    \      if (lastTweetId == null) {\n62         /*take the first one as the tweets\
    \ are in reverse chronological order */\n63         this.lastTweetId = tweet.getId();\n\
    64        }\n65        filteredTweets.add(tweet);\n66       }\n67      }\n68 \
    \     return filteredTweets;\n69     }\n\n71    }\n\n73   }\n74   results = twitter.searchOperations().search(\n\
    75    String.format(\n76     FROM_USER_SINCE_ID_TWITTER_QRY_TMPL, getUserId(),\
    \ lastTweetId));\n77   List < Tweet > tweets = results.getTweets();\n78   if (!TradingUtils.isEmpty(tweets))\
    \ {\n79    lastTweetId = tweets.get(0).getId();\n80   }\n81   return tweets;\n\
    \n83  }\n84 }\n```\n\nThe meat of this class lies in the implementation of the\
    \ the method `findNewTweets()`. The method tries to retrieve all new tweets since\
    \ the last API call was made. It is assumed that there is a scheduled job that\
    \ runs at a regular interval and calls this method to fetch the newest Tweets.\
    \ In order to retrieve the newest ones, since the last call, the class has to\
    \ internally keep track of the last Tweet fetched. By using an id greater than\
    \ the last id for the given user, it is able to find all the newest one for that\
    \ user. However, when it is invoked for the first time, we need to explore another\
    \ way to find the newest tweets. In this case we use the time at which the class\
    \ was initialised as the starting point from which to retrieve the newest Tweets.\
    \ This is the logic that we see executed when `if (lastTweetId == null)`. In order\
    \ to make the class threadsafe, additional synchronization is provided, taking\
    \ into account the double check locking^([9](#part0059.html#fn-dblchk)). The time\
    \ based approach uses the query `from:%s since:%s`, where we supply the user id\
    \ in question and the startup time in format `yyyy-MM-dd`. Once this search returns\
    \ results, we can take the first tweet in the collection and set it’s id as the\
    \ latest id to start the next search from. In that case, we use the query string\
    \ `from:%s since_id:%d`, providing the user id and the id set from the last search.\
    \ Just to reiterate again, the search results are sorted from latest to the oldest.\n\
    \n### 8.3.4 User specific `TweetHandlers`\n\n**Warning:** - *The tweet format\
    \ discussed for individual users can change without any notice. Therefore it is\
    \ imperative that we write as defensive code as much as possible for parsing purposes.*\n\
    \nTo conclude our discussion, we will look at `TweetHandlers` for the users we\
    \ discussed earlier in the chapter. Most of the code should centre around parsing\
    \ of tweets as it is very specific to that user. The functionality that is common,\
    \ like searching for new tweets by user, is abstracted in the base class `AbstractFXTweetHandler`,\
    \ which we discussed in the previous section.\n\nFor new trades we are interested\
    \ in parsing out\n\n* Trade Action\n* Instrument Pair\n* Limit Price\n* Stop Loss\
    \ Price\n* Take Profit Price\n\nFor close trades we want to parse\n\n* Instrument\
    \ Pair\n* Close Price\n* Profit/Loss pips"
