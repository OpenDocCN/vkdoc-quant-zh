    \   }\n34       break;\n35      }\n36     } catch (Exception e) {\n37      LOG.error(e);\n\
    38     }\n39    }\n\n41   }\n\n43   private boolean preValidate(TradingDecision\
    \ < N > decision) {\n44    if (TradingSignal.NONE != decision.getSignal() &&\n\
    45     this.preOrderValidationService.checkInstrumentNotAlreadyTraded(\n46   \
    \   decision.getInstrument()) &&\n47     this.preOrderValidationService.checkLimitsForCcy(\n\
    48      decision.getInstrument(), decision.getSignal())) {\n49     Collection\
    \ < TradeableInstrument < N >> instruments = Lists.newArrayList();\n50     instruments.add(decision.getInstrument());\n\
    51     Map < TradeableInstrument < N > , Price < N >> priceMap =\n52      this.currentPriceInfoProvider.getCurrentPricesForInstruments(instruments);\n\
    53     if (priceMap.containsKey(decision.getInstrument())) {\n54      Price <\
    \ N > currentPrice = priceMap.get(decision.getInstrument());\n55      return this.preOrderValidationService.isInSafeZone(decision.getSignal(),\n\
    56       decision.getSignal() ==\n57       TradingSignal.LONG ? currentPrice.getAskPrice()\
    \ : currentPrice.getBidPrice(),\n58       decision.getInstrument());\n59     }\n\
    60    }\n61    return false;\n62   }\n```"
  raw: "### 6.6 Putting it all together in an OrderExecutionService\n\nWe conclude\
    \ our discussion of order management services, by diving deep into the ***OrderExecutionService***.\
    \ The design of this service is based around a queue, from where orders are picked\
    \ up and after all checks pass, an order is sent to the platform. The idea is\
    \ that, from our various strategies and may be from other services, we have the\
    \ ability to simply drop the order in a queue and rest is taken care of by this\
    \ service, which is listening on this queue for new orders. By doing this we have\
    \ decoupled the act of arriving at a decision to place an order(based on a trading\
    \ signal, that our strategy has advised) for a given instrument and the mechanics\
    \ of placing the order. Lets begin by looking at the constructor and the dependencies\
    \ that it expects.\n\n```\n 1 public class OrderExecutionService < M, N, K > implements\
    \ Runnable {\n\n3   private static final Logger LOG = Logger.getLogger(OrderExecutionService.class);\n\
    \n5   private final BlockingQueue < TradingDecision < N >> orderQueue;\n 6   private\
    \ final AccountInfoService < K, N > accountInfoService;\n 7   private final OrderManagementProvider\
    \ < M, N, K > orderManagementProvider;\n 8   private final BaseTradingConfig baseTradingConfig;\n\
    \ 9   private final PreOrderValidationService < M, N, K > preOrderValidationService;\n\
    10   private final CurrentPriceInfoProvider < N > currentPriceInfoProvider;\n\
    11   private volatile boolean serviceUp = true;\n12   Thread orderExecThread;\n\
    \n14   public OrderExecutionService(BlockingQueue < TradingDecision < N >> orderQueue,\n\
    15    AccountInfoService < K, N > accountInfoService,\n16    OrderManagementProvider\
    \ < M, N, K >\n17    orderManagementProvider, BaseTradingConfig baseTradingConfig,\n\
    18    PreOrderValidationService < M, N, K > preOrderValidationService,\n19   \
    \ CurrentPriceInfoProvider < N > currentPriceInfoProvider) {\n20    this.orderQueue\
    \ = orderQueue;\n21    this.accountInfoService = accountInfoService;\n22    this.orderManagementProvider\
    \ = orderManagementProvider;\n23    this.baseTradingConfig = baseTradingConfig;\n\
    24    this.preOrderValidationService = preOrderValidationService;\n25    this.currentPriceInfoProvider\
    \ = currentPriceInfoProvider;\n26   }\n27   @PostConstruct\n28   public void init()\
    \ {\n29    orderExecThread = new Thread(this, this.getClass().getSimpleName());\n\
    30    orderExecThread.start();\n31   }\n```\n\nThe first thing we notice is that\
    \ our service implements the ***Runnable*** interface, which suggests that this\
    \ service is going to spawn a thread to continuously monitor the order queue.\
    \ The thread is initialised in the ***init*** method which is automatically invoked\
    \ by a DI framework like Spring once the application context is initialized (due\
    \ to **@PostConstruct** annotation), or needs to be explicitly called if we are\
    \ not using one. In our thread, we continuously monitor the order queue for a\
    \ new order. Once an order is received from the queue, we bring these dependencies\
    \ into play(the use of each will become evident soon). Lets look at the ***run***\
    \ method where all the action seems to happen.\n\n```\n 1 @Override\n 2 public\
    \ void run() {\n 3   while (serviceUp) {\n 4    try {\n 5     TradingDecision\
    \ < N > decision = this.orderQueue.take();\n 6     if (!preValidate(decision))\
    \ {\n 7      continue;\n 8     }\n 9     Collection < K > accountIds = this.accountInfoService.findAccountsToTrade();\n\
    10     if (accountIds.isEmpty()) {\n11      LOG.info(\"Not a single eligible account\
    \ found as the reserve may have\n12       been exhausted.\n13       \");\n14 \
    \      continue;\n15      }\n16      Order < N, M > order = null;\n17      if\
    \ (decision.getLimitPrice() == 0.0) { // market order\n18       order = new Order\
    \ < N, M > (decision.getInstrument(),\n19        this.baseTradingConfig.getMaxAllowedQuantity(),\
    \ decision.getSignal(),\n20        OrderType.MARKET, decision.getTakeProfitPrice(),\n\
    21        decision.getStopLossPrice());\n22      } else {\n23       order = new\
    \ Order < N, M > (decision.getInstrument(),\n24        this.baseTradingConfig.getMaxAllowedQuantity(),\
    \ decision.getSignal(),\n25        OrderType.LIMIT,\n26        decision.getTakeProfitPrice(),\
    \ decision.getStopLossPrice(),\n27        decision.getLimitPrice());\n28     \
    \ }\n29      for (K accountId: accountIds) {\n30       M orderId = this.orderManagementProvider.placeOrder(order,\
    \ accountId);\n31       if (orderId != null) {\n32        order.setOrderId(orderId);\n\
    33       }\n34       break;\n35      }\n36     } catch (Exception e) {\n37   \
    \   LOG.error(e);\n38     }\n39    }\n\n41   }\n\n43   private boolean preValidate(TradingDecision\
    \ < N > decision) {\n44    if (TradingSignal.NONE != decision.getSignal() &&\n\
    45     this.preOrderValidationService.checkInstrumentNotAlreadyTraded(\n46   \
    \   decision.getInstrument()) &&\n47     this.preOrderValidationService.checkLimitsForCcy(\n\
    48      decision.getInstrument(), decision.getSignal())) {\n49     Collection\
    \ < TradeableInstrument < N >> instruments = Lists.newArrayList();\n50     instruments.add(decision.getInstrument());\n\
    51     Map < TradeableInstrument < N > , Price < N >> priceMap =\n52      this.currentPriceInfoProvider.getCurrentPricesForInstruments(instruments);\n\
    53     if (priceMap.containsKey(decision.getInstrument())) {\n54      Price <\
    \ N > currentPrice = priceMap.get(decision.getInstrument());\n55      return this.preOrderValidationService.isInSafeZone(decision.getSignal(),\n\
    56       decision.getSignal() ==\n57       TradingSignal.LONG ? currentPrice.getAskPrice()\
    \ : currentPrice.getBidPrice(),\n58       decision.getInstrument());\n59     }\n\
    60    }\n61    return false;\n62   }\n```"
  trans: "\n### 6.6 整合至 `OrderExecutionService`\n\n我们将深入探讨 `OrderExecutionService`\
    \ 来结束关于订单管理服务的讨论。该服务的设计基于一个队列，订单从中被取出，并在所有检查通过后发送至交易平台。其思路是，通过我们的各种策略（可能还包括其他服务），我们能够简单地将订单放入队列，其余工作由此服务负责处理——它持续监听该队列以获取新订单。通过这种方式，我们将做出下单决策（基于我们策略建议的交易信号）这一行为与执行下单的机械过程解耦。让我们先来看一下它的构造函数及其所依赖的各项服务。\n\
    \n```\n 1 public class OrderExecutionService < M, N, K > implements Runnable {\n\
    \n3   private static final Logger LOG = Logger.getLogger(OrderExecutionService.class);\n\
    \n5   private final BlockingQueue < TradingDecision < N >> orderQueue;\n 6   private\
    \ final AccountInfoService < K, N > accountInfoService;\n 7   private final OrderManagementProvider\
    \ < M, N, K > orderManagementProvider;\n 8   private final BaseTradingConfig baseTradingConfig;\n\
    \ 9   private final PreOrderValidationService < M, N, K > preOrderValidationService;\n\
    10   private final CurrentPriceInfoProvider < N > currentPriceInfoProvider;\n\
    11   private volatile boolean serviceUp = true;\n12   Thread orderExecThread;\n\
    \n14   public OrderExecutionService(BlockingQueue < TradingDecision < N >> orderQueue,\n\
    15    AccountInfoService < K, N > accountInfoService,\n16    OrderManagementProvider\
    \ < M, N, K >\n17    orderManagementProvider, BaseTradingConfig baseTradingConfig,\n\
    18    PreOrderValidationService < M, N, K > preOrderValidationService,\n19   \
    \ CurrentPriceInfoProvider < N > currentPriceInfoProvider) {\n20    this.orderQueue\
    \ = orderQueue;\n21    this.accountInfoService = accountInfoService;\n22    this.orderManagementProvider\
    \ = orderManagementProvider;\n23    this.baseTradingConfig = baseTradingConfig;\n\
    24    this.preOrderValidationService = preOrderValidationService;\n25    this.currentPriceInfoProvider\
    \ = currentPriceInfoProvider;\n26   }\n27   @PostConstruct\n28   public void init()\
    \ {\n29    orderExecThread = new Thread(this, this.getClass().getSimpleName());\n\
    30    orderExecThread.start();\n31   }\n```\n\n我们首先注意到该服务实现了 `Runnable` 接口，这意味着它将生成一个线程来持续监控订单队列。该线程在\
    \ `init` 方法中初始化，`init` 方法在应用上下文初始化后由 Spring 等依赖注入框架自动调用（由于 `@PostConstruct` 注解），如果不使用此类框架，则需要显式调用。在我们的线程中，我们持续监控订单队列以获取新订单。一旦从队列接收到订单，这些依赖项便会开始发挥作用（它们各自的用途很快就会明了）。接下来，让我们看看所有关键操作发生的\
    \ `run` 方法。\n\n```\n 1 @Override\n 2 public void run() {\n 3   while (serviceUp)\
    \ {\n 4    try {\n 5     TradingDecision < N > decision = this.orderQueue.take();\n\
    \ 6     if (!preValidate(decision)) {\n 7      continue;\n 8     }\n 9     Collection\
    \ < K > accountIds = this.accountInfoService.findAccountsToTrade();\n10     if\
    \ (accountIds.isEmpty()) {\n11      LOG.info(\"未找到任何符合条件的账户，准备金可能已耗尽。\n12    \
    \   \");\n13       continue;\n14      }\n15      Order < N, M > order = null;\n\
    16      if (decision.getLimitPrice() == 0.0) { // 市价单\n17       order = new Order\
    \ < N, M > (decision.getInstrument(),\n18        this.baseTradingConfig.getMaxAllowedQuantity(),\
    \ decision.getSignal(),\n19        OrderType.MARKET, decision.getTakeProfitPrice(),\n\
    20        decision.getStopLossPrice());\n21      } else {\n22       order = new\
    \ Order < N, M > (decision.getInstrument(),\n23        this.baseTradingConfig.getMaxAllowedQuantity(),\
    \ decision.getSignal(),\n24        OrderType.LIMIT,\n25        decision.getTakeProfitPrice(),\
    \ decision.getStopLossPrice(),\n26        decision.getLimitPrice());\n27     \
    \ }\n28      for (K accountId: accountIds) {\n29       M orderId = this.orderManagementProvider.placeOrder(order,\
    \ accountId);\n30       if (orderId != null) {\n31        order.setOrderId(orderId);\n\
    32       }\n33       break;\n34      }\n35     } catch (Exception e) {\n36   \
    \   LOG.error(e);\n37     }\n38    }\n\n41   }\n\n43   private boolean preValidate(TradingDecision\
    \ < N > decision) {\n44    if (TradingSignal.NONE != decision.getSignal() &&\n\
    45     this.preOrderValidationService.checkInstrumentNotAlreadyTraded(\n46   \
    \   decision.getInstrument()) &&\n47     this.preOrderValidationService.checkLimitsForCcy(\n\
    48      decision.getInstrument(), decision.getSignal())) {\n49     Collection\
    \ < TradeableInstrument < N >> instruments = Lists.newArrayList();\n50     instruments.add(decision.getInstrument());\n\
    51     Map < TradeableInstrument < N > , Price < N >> priceMap =\n52      this.currentPriceInfoProvider.getCurrentPricesForInstruments(instruments);\n\
    53     if (priceMap.containsKey(decision.getInstrument())) {\n54      Price <\
    \ N > currentPrice = priceMap.get(decision.getInstrument());\n55      return this.preOrderValidationService.isInSafeZone(decision.getSignal(),\n\
    56       decision.getSignal() ==\n57       TradingSignal.LONG ? currentPrice.getAskPrice()\
    \ : currentPrice.getBidPrice(),\n58       decision.getInstrument());\n59     }\n\
    60    }\n61    return false;\n62   }\n```\n"
- fmt: "我们的`run`方法会无限循环，直到易失性变量`serviceUp`的值被设置为`false`。稍后我们将介绍如何将其设置为`false`以终止循环，进而终止该方法，最终导致线程终止。语句`this.orderQueue.take()`会阻塞，直到队列中有待处理的订单。假设有订单可用且已从队列中取出，我们要做的第一件事是确保它通过`preValidate`方法中的一系列验证检查。该方法仅应用了我们在上一节讨论的所有3项验证检查，但仔细看，它实际上进行了一项优化。由于安全区检查需要获取过去10年的蜡烛图数据，因此只有在其他两项检查通过后才执行。假设检查成功，我们现在需要找到可以交易的账户。回顾一下关于选择合格交易账户的讨论，在账户被认定为可交易之前，还需要通过一组检查，例如可用金额必须至少为总金额的`x%`。同样，这可以称为基于账户级别的第二级检查。如果没有可用账户，则跳过剩余处理并回到`while`循环的开头。然而，如果至少找到一个账户，我们现在就可以下单了。为此，我们必须首先根据从队列中取出的`TradingSignal`实例准备一个`Order`\
    \ POJO。首先要决定它是市价单还是限价单。提醒一下，限价单必须设置触发价格，我们检查交易决策是否设置了触发价格。如果已设置，则将`Order` POJO类型准备为`LIMIT`，否则为`MARKET`。现在，我们有了一个完全准备好的`Order`\
    \ POJO，可以发送出去下单。我们遍历所有符合条件的账户。一旦找到第一个成功下单的账户（下单成功时会返回有效的`orderId`），我们就跳出循环，然后回到循环的开头。\n\
    \n回到如何将变量`serviceUp`设置为`false`以便线程停止的问题？为此，我们在服务中创建一个关闭钩子，当应用程序关闭时，DI框架会自动调用它。这一切都归功于`@PreDestroy`注解，这些框架将其视为在销毁`bean`之前要调用的方法。如果未使用DI框架，则必须手动调用`shutdown()`方法来终止线程。\n\
    \n```java\n@PreDestroy\npublic void shutDown() {\n    this.serviceUp = false;\n\
    }\n```\n\n至此，我们基本结束了对订单中需要了解的大部分内容的讨论。现在，我们将注意力转向订单执行并导致创建交易头寸时会发生什么。交易头寸意味着投资组合中的风险，必须准备好管理此头寸，以最小化损失并最大化利润。我们首先详细讨论`Trade`\
    \ POJO的定义。\n\n### 6.7 Trade POJO定义\n\n`Trade` POJO与`Order` POJO类似，包含管理交易和描述系统中未平仓交易头寸所需的所有信息。正如我们将看到的，这两个POJO有许多共同的属性，仅仅是因为订单执行后会转化为一个未平仓头寸。与订单一样，它必须有基础工具、止损价、止盈价、买入/卖出方向等。让我们通过查看代码更详细地了解它。\n\
    \n```java\n/**\n *\n * @param <M> The type of tradeId\n * @param <N> The type\
    \ of instrumentId in class TradeableInstrument\n * @param <K> The type of accountId\n\
    \ * @see TradeableInstrument\n */\npublic class Trade < M, N, K > {\n    private\
    \ final M tradeId;\n    private final long units;\n    private final TradingSignal\
    \ side;\n    private final TradeableInstrument < N > instrument;\n    private\
    \ final DateTime tradeDate;\n    private final double takeProfitPrice,\n    executionPrice,\n\
    \    stopLoss;\n    private final K accountId;\n    private final String toStr;\n\
    \n    public Trade(M tradeId, long units, TradingSignal side,\n        TradeableInstrument\
    \ < N > instrument, DateTime tradeDate, double takeProfitPrice,\n        double\
    \ executionPrice, double stopLoss, K accountId) {\n        this.tradeId = tradeId;\n\
    \        this.units = units;\n        this.side = side;\n        this.instrument\
    \ = instrument;\n        this.tradeDate = tradeDate;\n        this.takeProfitPrice\
    \ = takeProfitPrice;\n        this.executionPrice = executionPrice;\n        this.stopLoss\
    \ = stopLoss;\n        this.accountId = accountId;\n        this.toStr = String.format(\n\
    \            \"Trade Id=%d, Units=%d, Side=%s, Instrument=%s, TradeDate=%s, TP=%3.5f,\
    \ Price=%3.5f, SL=%3.5f\",\n            tradeId, units, side, instrument, tradeDate.toString(),\
    \ takeProfitPrice,\n            executionPrice, stopLoss);\n    }\n\n    @Override\n\
    \    public int hashCode() {\n        final int prime = 31;\n        int result\
    \ = 1;\n        result = prime * result + ((accountId == null) ? 0 : accountId.hashCode());\n\
    \        result = prime * result + ((tradeId == null) ? 0 : tradeId.hashCode());\n\
    \        return result;\n    }\n\n    @Override\n    public boolean equals(Object\
    \ obj) {\n        if (this == obj)\n            return true;\n        if (obj\
    \ == null)\n            return false;\n        if (getClass() != obj.getClass())\n\
    \            return false;\n        @SuppressWarnings(\"unchecked\")\n       \
    \ Trade < M, N, K > other = (Trade < M, N, K > ) obj;\n        if (accountId ==\
    \ null) {\n            if (other.accountId != null)\n                return false;\n\
    \        } else if (!accountId.equals(other.accountId))\n            return false;\n\
    \        if (tradeId == null) {\n            if (other.tradeId != null)\n    \
    \            return false;\n        } else if (!tradeId.equals(other.tradeId))\n\
    \            return false;\n        return true;\n    }\n\n    public double getStopLoss()\
    \ {\n        return stopLoss;\n    }\n\n    public K getAccountId() {\n      \
    \  return accountId;\n    }\n\n    @Override\n    public String toString() {\n\
    \        return toStr;\n    }\n\n    public double getExecutionPrice() {\n   \
    \     return executionPrice;\n    }\n\n    public M getTradeId() {\n        return\
    \ tradeId;\n    }\n\n    public long getUnits() {\n        return units;\n   \
    \ }\n\n    public TradingSignal getSide() {\n        return side;\n    }\n\n \
    \   public TradeableInstrument < N > getInstrument() {\n        return instrument;\n\
    \    }\n\n    public DateTime getTradeDate() {\n        return tradeDate;\n  \
    \  }\n\n    public double getTakeProfitPrice() {\n        return takeProfitPrice;\n\
    \    }\n}\n```\n\n查看上面的代码，我们观察到它在属性方面与`Order` POJO具有相当多的相似性。除此之外，该POJO看起来相当简单。因此，我们可以继续讨论交易管理提供者接口的定义。"
  raw: "Our ***run*** method will forever loop until the value of the *volatile* variable\
    \ ***serviceUp*** is set to false. We will come back to how to set this to false\
    \ shortly to terminate the loop, and as a consequence the method which results\
    \ in the termination of the thread. The statement `this.orderQueue.take()` blocks\
    \ till an order is available in the queue to be processed. Assuming an order is\
    \ available and taken off the queue, the first thing we do is to make sure that\
    \ it passes our series of validation checks in the *preValidate* method. This\
    \ method just applies all the 3 validation checks we discussed in the previous\
    \ section, however if we look carefully, it actually does an optimisation. Since\
    \ doing the safe zone checks requires a fetch of last 10 years worth of candle\
    \ sticks data, this is only done, if the other 2 checks pass. Assuming our checks\
    \ succeed, we now need to find accounts with which we can trade. Now if we recall\
    \ the discussion about selection of accounts eligible for trade, there were also\
    \ a set of checks which need to pass, before an account is deemed eligible to\
    \ trade, for instance, the amount available must be atleast *x%* of the total\
    \ amount. Again, one can call it a second level of checks, based at the account\
    \ level. If no accounts are available, we leave rest of the processing and go\
    \ back to the start of the while loop. However, if we do find atleast one account,\
    \ we are now ready to place the order. To do so, we must first prepare an *Order*\
    \ pojo from the *TradingSignal* instance that we picked up from the queue. The\
    \ first thing to decide is whether its a market or a limit order. Reminding ourselves\
    \ that a limit order must have a trigger price set, we check if the trading decision\
    \ has a trigger price set. If it is set, then we prepare the Order pojo as type\
    \ *LIMIT* else its a *MARKET* order. Now that we have a fully primed Order pojo\
    \ to be sent across to place the order, we loop over all the eligible accounts\
    \ that we have. As soon as we find the first one with which we are successful\
    \ at placing the order(a valid orderId is returned when order is placed successfully),\
    \ we break out of the loop and then go back again at the beginning of the loop.\n\
    \nComing back to the point, as to how the variable ***serviceUp*** can be set\
    \ to *false* so that the thread can stop? For this we create a shutdown hook in\
    \ the service, which again is invoked automatically by a DI framework when the\
    \ application is being shut down. The magic happens due to the annotation *@PreDestroy*,\
    \ which these frameworks, deem as methods to be called, before destroying the\
    \ bean. Again if we are not using a DI framework, then one has to manually call\
    \ the `shutdown()` method externally to terminate the thread.\n\n```\n1 @PreDestroy\n\
    2 public void shutDown() {\n3  this.serviceUp = false;\n4 }\n```\n\nWith this\
    \ we conclude our discussion about pretty much most of the stuff that one needs\
    \ to know about orders. Now its time to turn our attention to what happens when\
    \ these orders are executed and result in the creation of a trading position.\
    \ A trading position equates to risk in one’s portfolio, and one must be ready\
    \ to manage this position, in order to minimise losses and maximise profits. We\
    \ begin our detailed discussion by the definition of the Trade pojo.\n\n### 6.7\
    \ Trade POJO definition\n\nThe Trade POJO like Order POJO holds all the necessary\
    \ information to manage trades and describe open trading positions in the system.\
    \ As we will see, the 2 pojos have lots of attributes in common, simply because\
    \ an order when executes translates into an open position. Like an order, it must\
    \ have an underlying instrument, stop loss price, take profit price, buy/sell\
    \ side etc. Lets discover it in more detail by looking at the code\n\n```\n 1\
    \ /**\n  2  *\n  3  * @param <M> The type of tradeId\n  4  * @param <N> The type\
    \ of instrumentId in class TradeableInstrument\n  5  * @param <K> The type of\
    \ accountId\n  6  * @see TradeableInstrument\n  7  */\n  8 public class Trade\
    \ < M, N, K > {\n  9  private final M tradeId;\n 10  private final long units;\n\
    \ 11  private final TradingSignal side;\n 12  private final TradeableInstrument\
    \ < N > instrument;\n 13  private final DateTime tradeDate;\n 14  private final\
    \ double takeProfitPrice,\n 15  executionPrice,\n 16  stopLoss;\n 17  private\
    \ final K accountId;\n 18  private final String toStr;\n\n 20  public Trade(M\
    \ tradeId, long units, TradingSignal side,\n 21   TradeableInstrument < N > instrument,\
    \ DateTime tradeDate, double takeProfitPrice,\n 22   double executionPrice, double\
    \ stopLoss, K accountId) {\n 23   this.tradeId = tradeId;\n 24   this.units =\
    \ units;\n 25   this.side = side;\n 26   this.instrument = instrument;\n 27  \
    \ this.tradeDate = tradeDate;\n 28   this.takeProfitPrice = takeProfitPrice;\n\
    \ 29   this.executionPrice = executionPrice;\n 30   this.stopLoss = stopLoss;\n\
    \ 31   this.accountId = accountId;\n 32   this.toStr = String.format(\n 33   \
    \ \"Trade Id=%d, Units=%d, Side=%s, Instrument=%s, TradeDate=%s, TP=%3.5f,\n 34\
    \    Price = % 3.5 f, SL = % 3.5 f \",\n 35    tradeId, units, side, instrument,\
    \ tradeDate.toString(), takeProfitPrice,\n 36    executionPrice, stopLoss);\n\
    \ 37  }\n\n 39  @Override\n 40  public int hashCode() {\n 41   final int prime\
    \ = 31;\n 42   int result = 1;\n 43   result = prime * result + ((accountId ==\
    \ null) ? 0 : accountId.hashCode());\n 44   result = prime * result + ((tradeId\
    \ == null) ? 0 : tradeId.hashCode());\n 45   return result;\n 46  }\n\n 48  @Override\n\
    \ 49  public boolean equals(Object obj) {\n 50   if (this == obj)\n 51    return\
    \ true;\n 52   if (obj == null)\n 53    return false;\n 54   if (getClass() !=\
    \ obj.getClass())\n 55    return false;\n 56   @SuppressWarnings(\"unchecked\"\
    )\n 57   Trade < M, N, K > other = (Trade < M, N, K > ) obj;\n 58   if (accountId\
    \ == null) {\n 59    if (other.accountId != null)\n 60     return false;\n 61\
    \   } else if (!accountId.equals(other.accountId))\n 62    return false;\n 63\
    \   if (tradeId == null) {\n 64    if (other.tradeId != null)\n 65     return\
    \ false;\n 66   } else if (!tradeId.equals(other.tradeId))\n 67    return false;\n\
    \ 68   return true;\n 69  }\n\n 71  public double getStopLoss() {\n 72   return\
    \ stopLoss;\n 73  }\n\n 75  public K getAccountId() {\n 76   return accountId;\n\
    \ 77  }\n\n 79  @Override\n 80  public String toString() {\n 81   return toStr;\n\
    \ 82  }\n\n 84  public double getExecutionPrice() {\n 85   return executionPrice;\n\
    \ 86  }\n\n 88  public M getTradeId() {\n 89   return tradeId;\n 90  }\n\n 92\
    \  public long getUnits() {\n 93   return units;\n 94  }\n\n 96  public TradingSignal\
    \ getSide() {\n 97   return side;\n 98  }\n\n100  public TradeableInstrument <\
    \ N > getInstrument() {\n101   return instrument;\n102  }\n\n104  public DateTime\
    \ getTradeDate() {\n105   return tradeDate;\n106  }\n\n108  public double getTakeProfitPrice()\
    \ {\n109   return takeProfitPrice;\n110  }\n111 }\n```\n\nLooking at the code\
    \ above, we observe that it bears quite a bit of resemblance with the Order pojo\
    \ in terms of the attributes. Apart from that, the pojo looks fairly straight\
