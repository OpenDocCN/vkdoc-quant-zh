    \ mktDataStreaminService = new OandaMarketDataStreamingService(url,\n77    accessToken,\n\
    78    accountId, instruments, mktEventCallback, heartBeatCallback, heartbeatSourceId);\n\
    79   LOG.info(\"++++++++++++ 启动市场数据流 +++++++++++++++++++++\");\n80   mktDataStreaminService.startMarketDataStreaming();\n\
    81   Thread.sleep(20000 L);\n82   mktDataStreaminService.stopMarketDataStreaming();\n\
    83  }\n84 }\n```\n\n![启动配置](img/00014.jpeg) 启动配置 ![示例输出](img/00015.jpeg) 示例输出\n\
    \n## 5. 历史工具市场数据\n\n在本章中，我们将讨论构建服务以查询历史市场数据的一些技术。对于那些希望基于给定工具的历史数据分析来构建策略的人来说，这可能非常有趣。传统上，图表中的历史工具数据以蜡烛图的形式呈现。蜡烛图形态是一种技术分析形式，可用于任何时间框架。它们类似于柱状图，并提供所讨论时间框架的开盘价、收盘价、最高价和最低价。\n\
    \n### 5.1 如何解读蜡烛图\n\n蜡烛图的长度显示了报告时间框架（时段）内开盘价和收盘价的相对变化。实体越长，时段内开盘价和收盘价的变动越大。这可能表明价格波动性较高。如果收盘价高于开盘价，则蜡烛图的实体为白色。相反，如果收盘价低于开盘价，则实体为黑色。实体上下的细线称为影线。上影线的顶端是时段的最高价，下影线的底端是时段的最低价。蜡烛图的长度和颜色可以指示牛市或熊市。\n\
    \n![蜡烛图](img/00016.gif) 蜡烛图\n\n### 5.2 定义蜡烛图粒度的枚举\n\n我们首先定义一个`Enum`，该枚举定义了我们将支持的各种蜡烛图粒度或时间框架，以此开启理解市场数据之旅。\n\
    \n代码清单 5.1：`CandleStickGranularity` 枚举定义\n\n```java\n 1 public enum CandleStickGranularity\
    \ {\n 2 \n 3  S5(5), // 5 秒\n 4   S10(10), // 10 秒\n 5   S15(15), // 15 秒\n 6\
    \   S30(30), // 30 秒\n 7   M1(60 * 1), // 1 分钟\n 8   M2(60 * 2), // 2 分钟\n 9 \
    \  M3(60 * 3), // 3 分钟\n10   M5(60 * 5), // 5 分钟\n11   M10(60 * 10), // 10 分钟\n\
    12   M15(60 * 15), // 15 分钟\n13   M30(60 * 30), // 30 分钟\n14   H1(60 * 60), //\
    \ 1 小时\n15   H2(60 * 60 * 2), // 2 小时\n16   H3(60 * 60 * 3), // 3 小时\n17   H4(60\
    \ * 60 * 4), // 4 小时\n18   H6(60 * 60 * 6), // 6 小时\n19   H8(60 * 60 * 8), //\
    \ 8 小时\n20   H12(60 * 60 * 12), // 12 小时\n21   D(60 * 60 * 24), // 1 天\n22   W(60\
    \ * 60 * 24 * 7), // 1 周\n23   M(60 * 60 * 24 * 30); // 1 个月\n24 \n25  private\
    \ final long granularityInSeconds;\n26 \n27  private CandleStickGranularity(long\
    \ granularityInSeconds) {\n28   this.granularityInSeconds = granularityInSeconds;\n\
    29  }\n30 \n31  public long getGranularityInSeconds() {\n32   return granularityInSeconds;\n\
    33  }\n34 }\n```\n\n上面的枚举定义相当直接。我们定义了 API 将支持的所有粒度或时间框架。最小粒度是 5 秒，最大是 1 个月。我们定义了一个构造函数，用于接受`granularityInSeconds()`，以防万一我们需要在按名称解析枚举并需要获取其粒度或时段长度的情况下量化粒度。\n"
- fmt: "### 5.3 Define POJO to hold candle stick information\n\nWe now turn our attention\
    \ to defining the POJO that will hold all the candle stick information.\n\nCode\
    \ Listing 5.2: CandleStick POJO\n\n```java\n 1 public class CandleStick < T >\
    \ {\n  2  /*All prices are average of bid and ask ,i.e (bid+ask)/2*/\n  3  private\
    \ final double openPrice,\n  4  highPrice,\n  5  lowPrice,\n  6  closePrice;\n\
    \  7  private final DateTime eventDate;\n  8  private final TradeableInstrument\
    \ < T > instrument;\n  9  private final CandleStickGranularity candleGranularity;\n\
    \ 10  private final String toStr;\n 11  private final int hash;\n\n 13  public\
    \ CandleStick(double openPrice, double highPrice, double lowPrice,\n 14   double\
    \ closePrice, DateTime eventDate, TradeableInstrument < T > instrument,\n 15 \
    \  CandleStickGranularity candleGranularity) {\n 16   super();\n 17   this.openPrice\
    \ = openPrice;\n 18   this.highPrice = highPrice;\n 19   this.lowPrice = lowPrice;\n\
    \ 20   this.closePrice = closePrice;\n 21   this.eventDate = eventDate;\n 22 \
    \  this.instrument = instrument;\n 23   this.candleGranularity = candleGranularity;\n\
    \ 24   this.hash = calcHash();\n 25   this.toStr = String.format(\n 26    \"Open=%2.5f,\
    \ high=%2.5f, low=%2.5f,close=%2.5f,date=%s, instrument=%s, granularity=%s\",\n\
    \ 27    openPrice, highPrice, lowPrice, closePrice, eventDate, instrument,\n 28\
    \    candleGranularity.name());\n 29  }\n\n 31  private int calcHash() {\n 32\
    \   final int prime = 31;\n 33   int result = 1;\n 34   result = prime * result\
    \ + ((candleGranularity == null) ? -1 : candleGranularity.ordinal());\n 35   result\
    \ = prime * result + ((eventDate == null) ? 0 : eventDate.hashCode());\n 36  \
    \ result = prime * result + ((instrument == null) ? 0 : instrument.hashCode());\n\
    \ 37   return result;\n 38  }\n\n 40  @Override\n 41  public int hashCode() {\n\
    \ 42   return hash;\n 43  }\n\n 45  @Override\n 46  public boolean equals(Object\
    \ obj) {\n 47   if (this == obj)\n 48    return true;\n 49   if (obj == null)\n\
    \ 50    return false;\n 51   if (getClass() != obj.getClass())\n 52    return\
    \ false;\n 53   CandleStick other = (CandleStick) obj;\n 54   if (candleGranularity\
    \ != other.candleGranularity)\n 55    return false;\n 56   if (eventDate == null)\
    \ {\n 57    if (other.eventDate != null)\n 58     return false;\n 59   } else\
    \ if (!eventDate.equals(other.eventDate))\n 60    return false;\n 61   if (instrument\
    \ == null) {\n 62    if (other.instrument != null)\n 63     return false;\n 64\
    \   } else if (!instrument.equals(other.instrument))\n 65    return false;\n 66\
    \   return true;\n 67  }\n\n 69  @Override\n 70  public String toString() {\n\
    \ 71   return this.toStr;\n 72  }\n\n 74  public CandleStickGranularity getCandleGranularity()\
    \ {\n 75   return candleGranularity;\n 76  }\n\n 78  public TradeableInstrument\
    \ < T > getInstrument() {\n 79   return instrument;\n 80  }\n\n 82  public double\
    \ getOpenPrice() {\n 83   return openPrice;\n 84  }\n\n 86  public double getHighPrice()\
    \ {\n 87   return highPrice;\n 88  }\n\n 90  public double getLowPrice() {\n 91\
    \   return lowPrice;\n 92  }\n\n 94  public double getClosePrice() {\n 95   return\
    \ closePrice;\n 96  }\n\n 98  public DateTime getEventDate() {\n 99   return eventDate;\n\
    100  }\n101 }\n```\n\nExcept for `eventDate`, all other attributes are self explanatory\
    \ following our earlier discussion on “how to read a candle stick”. We should\
    \ have expected a start and end date but we have only a single `eventDate` attribute.\
    \ Why is it so? Actually given the granularity of the candle stick and start time\
    \ of the candle stick, the end date can be worked out. So `eventDate` is actually\
    \ the start of the candle stick period.\n\nRegarding `hashCode()` and `equals()`\
    \ methods, the following 3 attributes participate and are deemed to ascertain\
    \ if a candle stick is unique in a collection or not.\n\n```java\n1 private final\
    \ DateTime eventDate;\n2 private final TradeableInstrument<T> instrument;\n3 private\
    \ final CandleStickGranularity candleGranularity;\n```\n\nAll price attributes\
    \ in the POJO are assumed to be the average of bid and ask prices.\n\n#### Historical\
    \ Data Provider interface\n\nIt is now time to define the historical data provider\
    \ interface which will specify what needs to be implemented in order to retrieve\
    \ meaningful candle stick data for analysis.\n\nCode Listing 5.3: HistoricMarketDataProvider\
    \ interface\n\n```java\n 1 /**\n 2  * A provider of candle stick data for a given\
    \ instrument. The candle sticks\n 3  * must be in chronological order in order\
    \ to easily construct time series\n 4  * information.\n 5  * @param <T>\n 6  *\
    \            The type of instrumentId in class TradeableInstrument\n 7  * @see\
    \ TradeableInstrument\n 8  */\n 9 public interface HistoricMarketDataProvider\
    \ < T > {\n\n11  /**\n12   * Construct candle sticks for a given from and to period.\n\
    13   *\n14   * @param instrument\n15   *            , for which the candle stick\
    \ information is requested\n16   * @param granularity\n17   *            , the\
    \ time interval between 2 candle sticks\n18   * @param from\n19   *          \
    \  , the start of first candle stick\n20   * @param to\n21   *            , the\
    \ end of last candle stick\n22   * @return List<CandleStick<T>> chronologically\
    \ ordered.\n23   */\n24  List < CandleStick < T >> getCandleSticks(TradeableInstrument\
    \ < T > instrument,\n25   CandleStickGranularity granularity, DateTime from, DateTime\
    \ to);\n\n27  /**\n28   * Construct last \"count\" candle sticks. This could be\
    \ translated to an\n29   * invocation of the overloaded method above which requires\
    \ \"from\" and \"to\"\n30   * date, if appropriate. The \"to\" date = now() and\
    \ \"from\" date = now() -\n31   * granularity*count\n32   *\n33   * @param instrument\n\
    34   *            , for which the candle stick information is requested\n35  \
    \ * @param granularity\n36   *            , the time interval between 2 candle\
    \ sticks\n37   * @param count\n38   *            ,\n39   * @return List<CandleStick<T>>\
    \ chronologically ordered.\n40   */\n41  List < CandleStick < T >> getCandleSticks(TradeableInstrument\
    \ < T > instrument,\n42   CandleStickGranularity granularity, int count);\n43\
    \ }\n```\n\nAs usual, this interface definition looks quite straightforward. The\
    \ two overloaded methods, one of which accepts a `from` and `to` time period,\
    \ and the other last `count` of candle sticks required, are all what is needed\
    \ to retrieve the necessary candle sticks. The choice of return type `List` instead\
    \ of `Collection` guarantees that there is a certain order to the candle sticks,\
    \ in this case chronological."
