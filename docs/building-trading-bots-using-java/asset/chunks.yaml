    15   }\n16  } else {\n17   return new AccountEventPayLoad((AccountEvents) evt,\
    \ payLoad);\n18  }\n\n20 }\n\n22 private static final Event findAppropriateType(Event[]\
    \ events, String transactionType) {\n23  for (Event evt: events) {\n24   if (evt.name().equals(transactionType))\
    \ {\n25    return evt;\n26   }\n27  }\n28  return null;\n29 }\n```\n\nThis utility\
    \ method does a brute force comparison for all the 3 Event types we have and returns\
    \ as soon as we find the first match. If no match is found (it is possible if\
    \ a new event is introduced by the platform), we return *null*. If we do have\
    \ a non-null instance of the *EventPayLoad*, we are now ready to dispatch it to\
    \ an instance of *EventCallback*, which inevitably must use the EventBus to dispatch\
    \ to the interested subscribers.\n\n```\n 1 public class EventCallbackImpl < T\
    \ > implements EventCallback < T > {\n\n3  private final EventBus eventBus;\n\n\
    5  public EventCallbackImpl(final EventBus eventBus) {\n 6   this.eventBus = eventBus;\n\
    \ 7  }\n\n9  @Override\n10  public void onEvent(EventPayLoad < T > eventPayLoad)\
    \ {\n11   this.eventBus.post(eventPayLoad);\n12  }\n\n14 }\n```\n\nAt the time\
    \ `onEvent` method is invoked, it already has an appropriate subtype of the *EventPayLoad*,\
    \ ready to be dispatched.\n\nSince we want to exploit the fine grained dispatching\
    \ of the subtypes of *EventPayLoad* by the EventBus, we need to create payload\
    \ handlers that can polymorphically handle these specific payloads. To achieve\
    \ that, we need to first define an *EventHandler* interface that has a method\
    \ to do exactly that.\n\n```\n1 public interface EventHandler<K, T extends EventPayLoad<K>>\
    \ {\n\n3  void handleEvent(T payLoad);\n4 }\n```\n\nIn the definition above, we\
    \ are stipulating that the `handleEvent` will handle events of type which are\
    \ subtypes of *EventPayLoad*.\n\nFor the set of events relating to the *Trade*\
    \ business entity, an implementation of the *TradeEventHandler* would look like\n\
    \n```\n 1 public class TradeEventHandler implements EventHandler < JSONObject,\n\
    \ 2  TradeEventPayLoad > {\n\n4   private final Set < TradeEvents > tradeEventsSupported\
    \ =\n 5   Sets.newHashSet(TradeEvents.STOP_LOSS_FILLED,\n 6    TradeEvents.TRADE_CLOSE,\
    \ TradeEvents.TAKE_PROFIT_FILLED);\n 7   private final TradeInfoService < Long,\n\
    \ 8   String,\n 9   Long > tradeInfoService;\n\n11   public TradeEventHandler(TradeInfoService\
    \ < Long, String, Long >\n12    tradeInfoService) {\n13    this.tradeInfoService\
    \ = tradeInfoService;\n14   }\n\n16   @Override\n17   @Subscribe\n18   @AllowConcurrentEvents\n\
    19   public void handleEvent(TradeEventPayLoad payLoad) {\n20    Preconditions.checkNotNull(payLoad);\n\
    21    if (!tradeEventsSupported.contains(payLoad.getEvent())) {\n22     return;\n\
    23    }\n24    JSONObject jsonPayLoad = payLoad.getPayLoad();\n25    long accountId\
    \ = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n26    tradeInfoService.refreshTradesForAccount(accountId);\n\
    27   }\n28  }\n```\n\nThe *TradeEventHandler* handles the *TradeEventPayLoad*\
    \ payload as per it’s definition. There are couple of things worth noting about\
    \ this simple handler. First it stipulates through the *tradeEventsSupported*\
    \ Set, which subset of all Trade events, it wants to consume. Hence one of the\
    \ first thing it does is to perform the check\n\n```\n1 if (!tradeEventsSupported.contains(payLoad.getEvent()))\
    \ {\n2   return;\n3 }\n```\n\nand promptly return if the type is not in `[STOP_LOSS_FILLED,TRADE_CLOSE,\
    \ TAKE_PROFIT_FILLED]`. If it is, then it does a very interesting action of refreshing\
    \ the *trades cache*. Remember, from our discussion from previous chapter, the\
    \ *TradeInfoService* has an internal cache of trades, in order to avoid making\
    \ frequent calls to fetch trades, which is quite expensive. Now, here it is where\
    \ this cache gets refreshed. We only refresh the trades cache for the given account\
    \ and resist refreshing everything as it is not required here.\n\nAn equivalent\
    \ handler for orders is the *OrderFilledEventHandler* whose definition is\n\n\
    ```\n 1 public class OrderFilledEventHandler implements EventHandler < JSONObject,\n\
    \ 2  OrderEventPayLoad > , EmailContentGenerator < JSONObject > {\n 3   private\
    \ final Set < OrderEvents > orderEventsSupported =\n 4   Sets.newHashSet(OrderEvents.ORDER_FILLED);\n\
    \ 5   private final TradeInfoService < Long,\n 6   String,\n 7   Long > tradeInfoService;\n\
    \n9   public OrderFilledEventHandler(\n10    TradeInfoService < Long, String,\
    \ Long > tradeInfoService) {\n11    this.tradeInfoService = tradeInfoService;\n\
    12   }\n\n14   @Override\n15   @Subscribe\n16   @AllowConcurrentEvents\n17   public\
    \ void handleEvent(OrderEventPayLoad payLoad) {\n18    Preconditions.checkNotNull(payLoad);\n\
    19    if (!orderEventsSupported.contains(payLoad.getEvent())) {\n20     return;\n\
    21    }\n22    JSONObject jsonPayLoad = payLoad.getPayLoad();\n\n24    long accountId\
    \ = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n25    tradeInfoService.refreshTradesForAccount(accountId);\n\
    26   }\n27  }\n```\n\nAs the name of this handler suggests, here we are only interested\
    \ in the *ORDER_FILLED* event. When an order is filled, a trade is created as\
    \ a result. Therefore we refresh the trades cache again by invoking `tradeInfoService.refreshTradesForAccount`.\n\
    \nComing back to the dissemination by the EventBus, since we are creating payloads\
    \ of the type *TradeEventPayLoad*, *OrderEventPayLoad* and *AccountEventPayLoad*\
    \ and have methods with `@Subscribe` that match the types, the EventBus should\
    \ deliver to the relevant `handleEvent` method and **not** to all 3.\n\nThis concludes\
    \ our discussion of the events related to Trade, Order and Accounts. There are\
    \ several other things that one might choose to do when such events happen, for\
    \ e.g. send an email or an sms notification. It is upto us as developers, what\
    \ we want to write in in the `handleEvent` method."
  trans: "```java\npublic class AccountEventPayLoad extends EventPayLoad<JSONObject>\
    \ {\n\n    public AccountEventPayLoad(AccountEvents event, JSONObject payLoad)\
    \ {\n        super(event, payLoad);\n    }\n}\n```\n\n- 交易（Trade）\n\n```java\n\
    public enum TradeEvents implements Event {\n    TRADE_UPDATE,\n    TRADE_CLOSE,\n\
    \    MIGRATE_TRADE_OPEN,\n    MIGRATE_TRADE_CLOSE,\n    STOP_LOSS_FILLED,\n  \
    \  TAKE_PROFIT_FILLED,\n    TRAILING_STOP_FILLED;\n}\n```\n\n```java\npublic class\
    \ TradeEventPayLoad extends EventPayLoad<JSONObject> {\n\n    public TradeEventPayLoad(TradeEvents\
    \ event, JSONObject payLoad) {\n        super(event, payLoad);\n    }\n}\n```\n\
    \n- 订单（Order）\n\n```java\npublic enum OrderEvents implements Event {\n    MARKET_ORDER_CREATE,\n\
    \    STOP_ORDER_CREATE,\n    LIMIT_ORDER_CREATE,\n    MARKET_IF_TOUCHED_ORDER_CREATE,\n\
    \    ORDER_UPDATE,\n    ORDER_CANCEL,\n    ORDER_FILLED;\n}\n```\n\n```java\n\
    public class OrderEventPayLoad extends EventPayLoad<JSONObject> {\n\n    private\
    \ final OrderEvents orderEvent;\n\n    public OrderEventPayLoad(OrderEvents event,\
    \ JSONObject payLoad) {\n        super(event, payLoad);\n        this.orderEvent\
    \ = event;\n    }\n\n    @Override\n    public OrderEvents getEvent() {\n    \
    \    return this.orderEvent;\n    }\n}\n```\n\n接下来，我们需要将 JSON 负载转换为`EventPayLoad`实例，这一任务由`OandaUtils.toOandaEventPayLoad()`完成。该方法需要一个*类型*参数，该参数通过事件\
    \ JSON 负载传递，用于确定该事件关联哪个业务实体，即*交易*、*订单*或*账户*。实际上，*类型*就是我们三个枚举中某个事件的名称。\n\n```java\n\
    public static EventPayLoad<JSONObject> toOandaEventPayLoad(String transactionType,\
    \ JSONObject payLoad) {\n    Preconditions.checkNotNull(transactionType);\n  \
    \  Event evt = findAppropriateType(AccountEvents.values(), transactionType);\n\
    \    if (evt == null) {\n        evt = findAppropriateType(OrderEvents.values(),\
    \ transactionType);\n        if (evt == null) {\n            evt = findAppropriateType(TradeEvents.values(),\
    \ transactionType);\n            if (evt == null) {\n                return null;\n\
    \            } else {\n                return new TradeEventPayLoad((TradeEvents)\
    \ evt, payLoad);\n            }\n        } else {\n            return new OrderEventPayLoad((OrderEvents)\
    \ evt, payLoad);\n        }\n    } else {\n        return new AccountEventPayLoad((AccountEvents)\
    \ evt, payLoad);\n    }\n}\n\nprivate static final Event findAppropriateType(Event[]\
    \ events, String transactionType) {\n    for (Event evt: events) {\n        if\
    \ (evt.name().equals(transactionType)) {\n            return evt;\n        }\n\
    \    }\n    return null;\n}\n```\n\n这个工具方法会暴力遍历我们现有的全部三种事件类型，一旦找到匹配项就立即返回结果。如果找不到匹配（当平台引入新事件时可能出现这种情况），则返回`null`。如果我们确实获得了一个非空的`EventPayLoad`实例，就可以将其分派给某个`EventCallback`实例，该实例必然通过\
    \ EventBus 将事件分派给感兴趣的订阅者。\n\n```java\npublic class EventCallbackImpl<T> implements\
    \ EventCallback<T> {\n\n    private final EventBus eventBus;\n\n    public EventCallbackImpl(final\
    \ EventBus eventBus) {\n        this.eventBus = eventBus;\n    }\n\n    @Override\n\
    \    public void onEvent(EventPayLoad<T> eventPayLoad) {\n        this.eventBus.post(eventPayLoad);\n\
    \    }\n}\n```\n\n当`onEvent`方法被调用时，它已经持有了`EventPayLoad`的合适子类型实例，随时可以分派。\n\n由于我们希望利用\
    \ EventBus 对`EventPayLoad`子类型进行细粒度分派的能力，我们需要创建能够多态处理这些具体负载的负载处理器。为此，我们首先需要定义一个`EventHandler`接口，其中包含一个专门执行此操作的方法。\n\
    \n```java\npublic interface EventHandler<K, T extends EventPayLoad<K>> {\n\n \
    \   void handleEvent(T payLoad);\n}\n```\n\n在上述定义中，我们规定`handleEvent`方法将处理类型为`EventPayLoad`子类的事件。\n\
    \n对于与*交易*业务实体相关的事件集，其`TradeEventHandler`的实现如下所示：\n\n```java\npublic class TradeEventHandler\
    \ implements EventHandler<JSONObject, TradeEventPayLoad> {\n\n    private final\
    \ Set<TradeEvents> tradeEventsSupported =\n        Sets.newHashSet(TradeEvents.STOP_LOSS_FILLED,\n\
    \                        TradeEvents.TRADE_CLOSE, TradeEvents.TAKE_PROFIT_FILLED);\n\
    \    private final TradeInfoService<Long, String, Long> tradeInfoService;\n\n\
    \    public TradeEventHandler(TradeInfoService<Long, String, Long> tradeInfoService)\
    \ {\n        this.tradeInfoService = tradeInfoService;\n    }\n\n    @Override\n\
    \    @Subscribe\n    @AllowConcurrentEvents\n    public void handleEvent(TradeEventPayLoad\
    \ payLoad) {\n        Preconditions.checkNotNull(payLoad);\n        if (!tradeEventsSupported.contains(payLoad.getEvent()))\
    \ {\n            return;\n        }\n        JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
    \        long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n \
    \       tradeInfoService.refreshTradesForAccount(accountId);\n    }\n}\n```\n\n\
    根据其定义，`TradeEventHandler`负责处理`TradeEventPayLoad`负载。关于这个简单处理器，有几点值得注意。首先，它通过`tradeEventsSupported`集合规定了它希望消费的全部交易事件中的哪些子集。因此，它的首要操作之一就是执行检查：\n\
    \n```java\nif (!tradeEventsSupported.contains(payLoad.getEvent())) {\n    return;\n\
    }\n```\n\n如果事件类型不在`[STOP_LOSS_FILLED, TRADE_CLOSE, TAKE_PROFIT_FILLED]`中，则立即返回。如果在其中，则执行一个非常有趣的操作：刷新*交易缓存*。请记住，根据我们在前一章的讨论，`TradeInfoService`内部维护了一个交易缓存，以避免频繁调用获取交易信息（代价很高）。现在，这里正是该缓存被刷新的位置。我们只刷新指定账户的交易缓存，避免刷新全部缓存，因为这里并不需要。\n\
    \n订单的等效处理器是`OrderFilledEventHandler`，其定义如下：\n\n```java\npublic class OrderFilledEventHandler\
    \ implements EventHandler<JSONObject, OrderEventPayLoad>,\n    EmailContentGenerator<JSONObject>\
    \ {\n    private final Set<OrderEvents> orderEventsSupported =\n        Sets.newHashSet(OrderEvents.ORDER_FILLED);\n\
    \    private final TradeInfoService<Long, String, Long> tradeInfoService;\n\n\
    \    public OrderFilledEventHandler(\n        TradeInfoService<Long, String, Long>\
    \ tradeInfoService) {\n        this.tradeInfoService = tradeInfoService;\n   \
    \ }\n\n    @Override\n    @Subscribe\n    @AllowConcurrentEvents\n    public void\
    \ handleEvent(OrderEventPayLoad payLoad) {\n        Preconditions.checkNotNull(payLoad);\n\
    \        if (!orderEventsSupported.contains(payLoad.getEvent())) {\n         \
    \   return;\n        }\n        JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
    \n        long accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n\
    \        tradeInfoService.refreshTradesForAccount(accountId);\n    }\n}\n```\n\
    \n正如该处理器的名称所示，我们只对`ORDER_FILLED`事件感兴趣。当订单成交时，会相应地创建一笔交易。因此，我们通过调用`tradeInfoService.refreshTradesForAccount`再次刷新交易缓存。\n\
    \n回到 EventBus 的分发机制，由于我们创建了类型为`TradeEventPayLoad`、`OrderEventPayLoad`和`AccountEventPayLoad`的负载，并且拥有使用`@Subscribe`注解且与这些类型匹配的方法，EventBus\
    \ 会将事件分派到对应的`handleEvent`方法，而**不会**分派给所有三个方法。\n\n至此，我们关于交易、订单和账户相关事件的讨论就结束了。当这些事件发生时，我们还可以选择执行其他操作，例如发送电子邮件或短信通知。作为开发者，`handleEvent`方法中要编写什么内容完全取决于我们。"
- fmt: "### 7.3 Try it yourself\n\nIn this section we are going to create a demo program\
    \ that will output events from the platform. To see this in action and see the\
    \ `LIMIT_ORDER_CREATE` event outputted, please run the `OrderExecutionServiceDemo`\
    \ program which will create a new order which will generate a platform event.\
    \ The demo program will process and output it.\n\n```\n 1 package com.precioustech.fxtrading.oanda.restapi.streaming.events;\n\
    \n 3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.type;\n\
    \n 5 import org.apache.log4j.Logger;\n 6 import org.joda.time.DateTime;\n 7 import\
    \ org.json.simple.JSONObject;\n\n 9 import com.google.common.eventbus.AllowConcurrentEvents;\n\
    10 import com.google.common.eventbus.EventBus;\n11 import com.google.common.eventbus.Subscribe;\n\
    12 import com.precioustech.fxtrading.account.AccountDataProvider;\n13 import com.precioustech.fxtrading.events.EventCallback;\n\
    14 import com.precioustech.fxtrading.events.EventCallbackImpl;\n15 import com.precioustech.fxtrading.events.EventPayLoad;\n\
    16 import com.precioustech.fxtrading.heartbeats.HeartBeatCallback;\n17 import\
    \ com.precioustech.fxtrading.heartbeats.HeartBeatCallbackImpl;\n18 import com.precioustech.fxtrading.oanda.restapi.account.OandaAccountDataProviderService;\n\
    19 import com.precioustech.fxtrading.streaming.events.EventsStreamingService;\n\
    \n21 public class EventsStreamingServiceDemo {\n\n23  private static final Logger\
    \ LOG = Logger.getLogger(EventsStreamingServiceDemo.class);\n\n25  private static\
    \ void usage(String[] args) {\n26   if (args.length != 4) {\n27    LOG.error(\"\
    Usage: EventsStreamingServiceDemo <url> <url2> <username> <accesstoken>\");\n\
    28    System.exit(1);\n29   }\n30  }\n\n32  private static class EventSubscriber\
    \ {\n\n34   @Subscribe\n35   @AllowConcurrentEvents\n36   public void handleEvent(EventPayLoad\
    \ < JSONObject > payLoad) {\n37    String transactionType = payLoad.getPayLoad().get(type).toString();\n\
    38    LOG.info(String.format(\"Type:%s, payload=%s\", transactionType, payLoad.getPayLoad()));\n\
    39   }\n40  }\n\n42  public static void main(String[] args) throws Exception {\n\
    43   usage(args);\n44   String url = args[0];\n45   String url2 = args[1];\n46\
    \   String userName = args[2];\n47   String accessToken = args[3];\n48   final\
    \ String heartBeatSourceId = \"DEMO_EVTDATASTREAM\";\n\n50   EventBus eventBus\
    \ = new EventBus();\n51   eventBus.register(new EventSubscriber());\n52   HeartBeatCallback\
    \ < DateTime > heartBeatCallback = new HeartBeatCallbackImpl < DateTime > (eventBus);\n\
    53   AccountDataProvider < Long > accountDataProvider =\n54    new OandaAccountDataProviderService(url2,\
    \ userName, accessToken);\n55   EventCallback < JSONObject > eventCallback = new\
    \ EventCallbackImpl < JSONObject > (eventBus);\n\n57   EventsStreamingService\
    \ evtStreamingService =\n58    new OandaEventsStreamingService(url, accessToken,\n\
    59     accountDataProvider, eventCallback, heartBeatCallback, heartBeatSourceId);\n\
    60   evtStreamingService.startEventsStreaming();\n61   //Run OrderExecutionServiceDemo\
    \ in the next 60s\n62   Thread.sleep(60000 L);\n63   evtStreamingService.stopEventsStreaming();\n\
    64  }\n65 }\n```\n\n![Launch Configuration](images/00062.jpeg) Launch Configuration\n\
    ![Sample Output](images/00063.jpeg) Sample Output\n\n1.  http://developer.oanda.com/rest-live/streaming/#eventsStreaming[↩︎](#part0051.html#fnref-evtStream)\n\
    \n## 8\\. Integration With Twitter\n\nWe have now reached probably the most exciting\
    \ part of our journey in building the trading bot. Interacting with social media\
    \ is probably one of the most important things a bot should be able to do. It\
    \ probably wasn't important a few years ago but now it is extremely so because\
    \ most news, events and leaks seem to appear on social media first, which affect\
    \ the markets. The ability to subscribe to these feeds in realtime, make sense\
    \ of it and make a decision, adds a layer of sophistication to any bot. Ours is\
    \ no exception, except that we will not attempt to consume thousands of tweets\
    \ per second but learn the basics of integrating with a Twitter. We aim to achieve\
    \ the following by the end of this chapter\n\n*   Connect to a Twitter account.\n\
    *   Search for Tweets.\n*   Parse Tweets and make sense of them.\n\nIn particular\
    \ we would be focussing on FX Tweets from users, whose Tweets have a well defined\
    \ structure and have information about Orders and Trades. The idea is that by\
    \ doing so, we can build a strategy, to copy what others are doing and maybe either\
    \ do what they are doing or do the complete opposite. This will be discussed in\
    \ detail in the next chapter, as part of a strategy which will involve this concept.\n\
    \n### 8.1 Creating a Twitter Application\n\nBefore we can automate the process\
    \ of Tweeting and reading Tweets automatically via a user account, we need to\
    \ associate a Twitter App to the user account. The tokens generated for this app,\
    \ will be used to log into Twitter and perform the required operations via the\
    \ bot. Lets follow step by step procedure to get to a state where we have the\
    \ necessary tokens to connect via Java application\n\n**Step 1**: Goto [https://apps.twitter.com/app/new](https://apps.twitter.com/app/new)\
    \ where you will see the screen below.\n\n![Create App For Bot](images/00064.jpeg\
    \ \"Step1\") Create App For Bot\n\n**Step 2**: After accepting the agreement and\
    \ submitting the form, we should see the confirmation screen below.\n\n![Twitter\
    \ App Created successfully](images/00065.jpeg \"Step2\") Twitter App Created successfully\n\
    \n**Step 3**: Whilst on the confirmation screen, we must now click on the tab\
    \ *Keys and Access Tokens*, where we should see our *Consumer Key Token* and *Consumer\
    \ Key Secret* display. We must take note of these, as we will require them later.\n\
    \n![Consumer tokens](images/00066.jpeg \"Step3\") Consumer tokens\n\n**Step 4**:\
    \ We are now in a position to create the other access tokens. Please click on\
    \ the button below *Token Actions* to generate the tokens. We should see the screen\
    \ below\n\n![Authorisation tokens](images/00067.jpeg \"Step4\") Authorisation\
    \ tokens\n\nWe should now have the following 4 tokens with us which are required\
    \ for tradingbot app to login using our account.\n\n*   Consumer Key\n*   Consumer\
    \ Secret\n*   Access Key Token\n*   Access key Secret\n\n### 8.2 Spring Social\n\
    \nSpring Social^([1](#part0059.html#fn-sprsoc)) is the defacto choice when it\
    \ comes to integrating with social media applications like Facebook, Twitter,\
    \ LinkedIn etc. It provides all the plumbing required to connect with a given\
    \ social media network, leaving us to focus with implementing the logic to mine\
    \ data from/post data to these networks. Developers who have used Spring before,\
    \ will recognise the same pattern being used for JMS^([2](#part0059.html#fn-jms))\
    \ and JDBC^([3](#part0059.html#fn-jdbc)) where all the middleware and database\
    \ plumbing respectively, is taken care by Spring, leaving to focus solely on the\
    \ task at hand.\n\nFor our discussion, we will solely focus on integrating our\
    \ bot with Twitter^([4](#part0059.html#fn-twit)).\n\n#### 8.2.1 Using and Configuring\
    \ Spring Social\n\nWe need to add the following dependencies in the maven `pm.xml`\
    \ in order to bring in Spring Social in the bot ecosystem.\n\n```\n1 <dependency>\n\
    2    <groupId>org.springframework.social</groupId>\n3    <artifactId>spring-social-twitter</artifactId>\n\
    4    <version>1.1.0.RELEASE</version>\n5 </dependency>\n```\n\nThe interaction\
    \ with Twitter happens via the `TwitterTemplate`^([5](#part0059.html#fn-twitTmpl))\
    \ which needs to be configured in the spring configuration file, using the tokens\
    \ which we generated when we defined our Twitter app.\n\n```\n1 <bean id=\"twitter\"\
    \ class=\"org.springframework.social.twitter.api.impl.TwitterTemplate\">\n2 \t\
    \t<constructor-arg index=\"0\" value=\"${twitter.consumerKey}\"/>\n3 \t\t<constructor-arg\
    \ index=\"1\" value=\"${twitter.consumerSecret}\"/>\n4 \t\t<constructor-arg index=\"\
    2\" value=\"${twitter.accessToken}\"/>\n5 \t\t<constructor-arg index=\"3\" value=\"\
    ${twitter.accessTokenSecret}\"/>\n6 </bean>\n```\n\nWith this `TwitterTemplate`\
    \ is ready to be injected in any services."
  raw: "### 7.3 Try it yourself\n\nIn this section we are going to create a demo program\
    \ that will output events from the platform. To see this in action and see the\
    \ *LIMIT_ORDER_CREATE* event outputted, please run the *OrderExecutionServiceDemo*\
    \ program which will create a new order which will generate a platform event.\
    \ The demo program will process and output it.\n\n```\n 1 package com.precioustech.fxtrading.oanda.restapi.streaming.events;\n\
    \n 3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.type;\n\
    \n 5 import org.apache.log4j.Logger;\n 6 import org.joda.time.DateTime;\n 7 import\
    \ org.json.simple.JSONObject;\n\n 9 import com.google.common.eventbus.AllowConcurrentEvents;\n\
    10 import com.google.common.eventbus.EventBus;\n11 import com.google.common.eventbus.Subscribe;\n\
    12 import com.precioustech.fxtrading.account.AccountDataProvider;\n13 import com.precioustech.fxtrading.events.EventCallback;\n\
    14 import com.precioustech.fxtrading.events.EventCallbackImpl;\n15 import com.precioustech.fxtrading.events.EventPayLoad;\n\
    16 import com.precioustech.fxtrading.heartbeats.HeartBeatCallback;\n17 import\
    \ com.precioustech.fxtrading.heartbeats.HeartBeatCallbackImpl;\n18 import com.precioustech.fxtrading.oanda.restapi.account.OandaAccountDataProviderService;\n\
    19 import com.precioustech.fxtrading.streaming.events.EventsStreamingService;\n\
    \n21 public class EventsStreamingServiceDemo {\n\n23  private static final Logger\
    \ LOG = Logger.getLogger(EventsStreamingServiceDemo.class);\n\n25  private static\
    \ void usage(String[] args) {\n26   if (args.length != 4) {\n27    LOG.error(\"\
    Usage: EventsStreamingServiceDemo <url> <url2> <username> <accesstoken>\");\n\
    28    System.exit(1);\n29   }\n30  }\n\n32  private static class EventSubscriber\
    \ {\n\n34   @Subscribe\n35   @AllowConcurrentEvents\n36   public void handleEvent(EventPayLoad\
    \ < JSONObject > payLoad) {\n37    String transactionType = payLoad.getPayLoad().get(type).toString();\n\
    38    LOG.info(String.format(\"Type:%s, payload=%s\", transactionType, payLoad.getPayLoad()));\n\
    39   }\n40  }\n\n42  public static void main(String[] args) throws Exception {\n\
    43   usage(args);\n44   String url = args[0];\n45   String url2 = args[1];\n46\
    \   String userName = args[2];\n47   String accessToken = args[3];\n48   final\
    \ String heartBeatSourceId = \"DEMO_EVTDATASTREAM\";\n\n50   EventBus eventBus\
    \ = new EventBus();\n51   eventBus.register(new EventSubscriber());\n52   HeartBeatCallback\
    \ < DateTime > heartBeatCallback = new HeartBeatCallbackImpl < DateTime > (eventBus);\n\
    53   AccountDataProvider < Long > accountDataProvider =\n54    new OandaAccountDataProviderService(url2,\
    \ userName, accessToken);\n55   EventCallback < JSONObject > eventCallback = new\
    \ EventCallbackImpl < JSONObject > (eventBus);\n\n57   EventsStreamingService\
    \ evtStreamingService =\n58    new OandaEventsStreamingService(url, accessToken,\n\
    59     accountDataProvider, eventCallback, heartBeatCallback, heartBeatSourceId);\n\
    60   evtStreamingService.startEventsStreaming();\n61   //Run OrderExecutionServiceDemo\
    \ in the next 60s\n62   Thread.sleep(60000 L);\n63   evtStreamingService.stopEventsStreaming();\n\
    64  }\n65 }\n```\n\n![Launch Configuration](images/00062.jpeg) Launch Configuration\
    \ ![Sample Output](images/00063.jpeg) Sample Output\n\n1.  http://developer.oanda.com/rest-live/streaming/#eventsStreaming[↩︎](#part0051.html#fnref-evtStream)\n\
    \n## 8\\. Integration With Twitter\n\nWe have now reached probably the most exciting\
    \ part of our journey in building the trading bot. Interacting with social media\
    \ is probably one of the most important things a bot should be able to do. It\
    \ probably wasn’t important a few years ago but now it is extremely so because\
    \ most news, events and leaks seem to appear on social media first, which affect\
    \ the markets. The ability to subscribe to these feeds in realtime, make sense\
    \ of it and make a decision, adds a layer of sophistication to any bot. Ours is\
    \ no exception, except that we will not attempt to consume thousands of tweets\
    \ per second but learn the basics of integrating with a Twitter. We aim to achieve\
    \ the following by the end of this chapter\n\n*   Connect to a Twitter account.\n\
    *   Search for Tweets.\n*   Parse Tweets and make sense of them.\n\nIn particular\
    \ we would be focussing on FX Tweets from users, whose Tweets have a well defined\
    \ structure and have information about Orders and Trades. The idea is that by\
    \ doing so, we can build a strategy, to copy what others are doing and maybe either\
    \ do what they are doing or do the complete opposite. This will be discussed in\
    \ detail in the next chapter, as part of a strategy which will involve this concept.\n\
    \n### 8.1 Creating a Twitter Application\n\nBefore we can automate the process\
    \ of Tweeting and reading Tweets automatically via a user account, we need to\
    \ associate a Twitter App to the user account. The tokens generated for this app,\
    \ will be used to log into Twitter and perform the required operations via the\
    \ bot. Lets follow step by step procedure to get to a state where we have the\
    \ necessary tokens to connect via Java application\n\n**Step 1**: Goto [https://apps.twitter.com/app/new](https://apps.twitter.com/app/new)\
    \ where you will see the screen below.\n\n![Create App For Bot](images/00064.jpeg\
    \ \"Step1\") Create App For Bot\n\n**Step 2**: After accepting the agreement and\
    \ submitting the form, we should see the confirmation screen below.\n\n![Twitter\
    \ App Created successfully](images/00065.jpeg \"Step2\") Twitter App Created successfully\n\
    \n**Step 3**: Whilst on the confirmation screen, we must now click on the tab\
    \ *Keys and Access Tokens*, where we should see our *Consumer Key Token* and *Consumer\
    \ Key Secret* display. We must take note of these, as we will require them later.\n\
    \n![Consumer tokens](images/00066.jpeg \"Step3\") Consumer tokens\n\n**Step 4**:\
    \ We are now in a position to create the other access tokens. Please click on\
    \ the button below *Token Actions* to generate the tokens. We should see the screen\
    \ below\n\n![Authorisation tokens](images/00067.jpeg \"Step4\") Authorisation\
    \ tokens\n\nWe should now have the following 4 tokens with us which are required\
    \ for tradingbot app to login using our account.\n\n*   Consumer Key\n*   Consumer\
    \ Secret\n*   Access Key Token\n*   Access key Secret\n\n### 8.2 Spring Social\n\
    \nSpring Social^([1](#part0059.html#fn-sprsoc)) is the defacto choice when it\
    \ comes to integrating with social media applications like Facebook, Twitter,\
    \ LinkedIn etc. It provides all the plumbing required to connect with a given\
    \ social media network, leaving us to focus with implementing the logic to mine\
    \ data from/post data to these networks. Developers who have used Spring before,\
    \ will recognise the same pattern being used for JMS^([2](#part0059.html#fn-jms))\
    \ and JDBC^([3](#part0059.html#fn-jdbc)) where all the middleware and database\
    \ plumbing respectively, is taken care by Spring, leaving to focus solely on the\
    \ task at hand.\n\nFor our discussion, we will solely focus on integrating our\
    \ bot with Twitter^([4](#part0059.html#fn-twit)).\n\n#### 8.2.1 Using and Configuring\
    \ Spring Social\n\nWe need to add the following dependencies in the maven pm.xml\
    \ in order to bring in Spring Social in the bot ecosystem.\n\n```\n1 <dependency>\n\
    2    <groupId>org.springframework.social</groupId>\n3    <artifactId>spring-social-twitter</artifactId>\n\
    4    <version>1.1.0.RELEASE</version>\n5 </dependency>\n```\n\nThe interaction\
    \ with Twitter happens via the *TwitterTemplate*^([5](#part0059.html#fn-twitTmpl))\
    \ which needs to be configured in the spring configuration file, using the tokens\
    \ which we generated when we defined our Twitter app.\n\n```\n1 <bean id=\"twitter\"\
    \ class=\"org.springframework.social.twitter.api.impl.TwitterTemplate\">\n2 \t\
    \t<constructor-arg index=\"0\" value=\"${twitter.consumerKey}\"/>\n3 \t\t<constructor-arg\
    \ index=\"1\" value=\"${twitter.consumerSecret}\"/>\n4 \t\t<constructor-arg index=\"\
    2\" value=\"${twitter.accessToken}\"/>\n5 \t\t<constructor-arg index=\"3\" value=\"\
    ${twitter.accessTokenSecret}\"/>\n6 </bean>\n```\n\nWith this *TwitterTemplate*\
    \ is ready to be injected in any services."
  trans: "\n### 7.3 动手试试\n\n在本节中，我们将创建一个演示程序，用于输出平台中的事件。要查看实际效果并看到输出的`LIMIT_ORDER_CREATE`事件，请运行`OrderExecutionServiceDemo`程序，该程序将创建一个新订单，进而生成一个平台事件。演示程序将处理并输出该事件。\n\
    \n```\n 1 package com.precioustech.fxtrading.oanda.restapi.streaming.events;\n\
    \n 3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.type;\n\
    \n 5 import org.apache.log4j.Logger;\n 6 import org.joda.time.DateTime;\n 7 import\
