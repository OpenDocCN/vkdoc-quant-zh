    \ 请求。如果返回 HTTP 200 状态码，并且 `TradingUtils.responseToString` 能够将响应转换为字符串，那么我们现在应该拥有一个有效的\
    \ JSON 字符串负载，类似于**清单 2.3**。接下来，剩下的工作就是解析这个负载并构建 `Account` POJO。有人可能会疑惑，为什么会有像下面这样奇特的代码：\n\
