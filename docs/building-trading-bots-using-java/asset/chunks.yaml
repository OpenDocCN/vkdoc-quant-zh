  trans: "\n### 6.8 `TradeManagementProvider` 接口\n\n与其近亲 `OrderManagementProvider`\
    \ 类似，`TradeManagementProvider` 具有非常相似的操作，只是缺少了一个显著的功能。在 CRUD 操作集中，该提供程序提供了除 C（创建）之外的所有操作。这是因为只有已提交并成交的订单才能创建交易，随后我们只能修改、平仓或检索与交易相关的信息。让我们直接来看它的定义：\n\
    \n```\n 1 /**\n 2  * 对单个交易执行 RUD（读取、更新、删除）操作的提供程序。通常交易按账户分组，\n 3  * 因此要执行这些操作，通常需要一个有效的\
    \ accountId。某些提供程序可能只有\n 4  * 单一账户的概念，因此任何对交易的操作都可能默认针对该单一账户，此时\n 5  * accountId\
    \ 可以为 null。\n 6  *\n 7  * 特意省略了批量关闭所有交易的 bulk 操作，以避免潜在的误用。\n 8  *\n 9  * @param\
    \ <M> tradeId 的类型\n10  * @param <N> TradeableInstrument 类中 instrumentId 的类型\n\
    11  * @param <K> accountId 的类型\n12  * @see TradeableInstrument\n13  */\n14 public\
    \ interface TradeManagementProvider < M, N, K > {\n15  /**\n16   * 通过提供 accountId\
    \ 和 tradeId 来修改现有交易。在某些情况下，\n17   * 仅凭 tradeId 就足以识别交易，因此 accountId 可能为 null。\n\
    18   * 通过此操作只能修改交易的 stopLoss 和 takeProfit 参数。\n19   *\n20   * @param accountId\n\
    21   * @param tradeId\n22   * @param stopLoss\n23   * @param takeProfit\n24  \
    \ * @return 布尔值，指示修改是否成功。\n25   */\n26  boolean modifyTrade(K accountId, M tradeId,\
    \ double stopLoss, double takeProfit);\n27\n28  /**\n29   * 通过提供 accountId 和 tradeId\
    \ 来关闭现有交易。同样，accountId 对于\n30   * 关闭交易可能是可选的。\n31   *\n32   * @param tradeId\n\
    33   * @param accountId\n34   * @return 布尔值，指示交易是否成功关闭。\n35   */\n36  boolean\
    \ closeTrade(M tradeId, K accountId);\n37\n38  /**\n39   * 根据给定的 tradeId 和/或 accountId\
    \ 检索交易。\n40   *\n41   * @param tradeId\n42   * @param accountId\n43   * @return\
    \ 返回一个 Trade 对象，如果未找到则返回 null。\n44   */\n45  Trade < M,\n46  N,\n47  K > getTradeForAccount(M\
    \ tradeId, K accountId);\n48\n49  /**\n50   * 返回给定账户的所有交易，如果未找到则返回空集合。不保证交易的顺序\n\
    51   * （例如按金融工具或时间顺序排列）。\n52   *\n53   * @param accountId\n54   * @return 给定账户\
    \ ID 下的交易集合。\n55   */\n56  Collection < Trade < M,\n57  N,\n58  K >> getTradesForAccount(K\
    \ accountId);\n59 }\n```\n\n看起来非常相似，对吧？当然，除了缺少一个 `placeTrade` 方法，原因我们之前已经讨论过。\n\
    \n### 6.9 `TradeManagementProvider` 的具体实现\n\n正如预期的那样，OANDA API 实现 `OandaTradeManagementProvider`\
    \ 与其对应的订单实现有许多共同之处。由于关于订单实现的大部分讨论也适用于交易实现，我们将直接进入代码，并指出存在的任何差异。除此之外，适用于订单实现的大多数原则在此也同样适用。我们照例从定义提供程序类、其构造函数以及使用的\
    \ JSON 键开始：\n\n```\n 1 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.id;\n\
    \ 2 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.instrument;\n\
    \ 3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.price;\n\
    \ 4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.side;\n\
    \ 5 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.stopLoss;\n\
    \ 6 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.takeProfit;\n\
    \ 7 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.time;\n\
    \ 8 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.trades;\n\
    \ 9 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.units;\n\
    \n11 public class OandaTradeManagementProvider implements TradeManagementProvider\
    \ < Long, String, Long > {\n12   private final String url;\n13   private final\
    \ BasicHeader authHeader;\n\n15   public OandaTradeManagementProvider(String url,\
    \ String accessToken) {\n16    this.url = url;\n17    this.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    18   }\n```\n\n从上面的代码片段可以看出，与订单实现相比，该构造函数少了一个对 `AccountDataProvider` 的依赖。我们可以理解这种差异，因为交易头寸已经与某个账户关联，而对于订单，我们可以选择将订单提交到哪个账户。要获取可用账户列表，我们需要\
    \ `AccountDataProvider` 的服务。其余部分相当简单直接，我们可以继续定义 `modifyTrade`。在此之前，提醒一下，我们只能修改交易的以下属性：\n\
    \n*   `takeProfit`\n*   `stopLoss`\n\n```\n 1 private static final String tradesResource\
    \ = \"/trades\";\n\n 3 String getTradeForAccountUrl(Long tradeId, Long accountId)\
    \ {\n 4  return this.url + OandaConstants.ACCOUNTS_RESOURCE +\n 5   TradingConstants.FWD_SLASH\
    \ + accountId + tradesResource + TradingConstants.FWD_SLASH + tradeId;\n 6 }\n\
    \n 8 HttpPatch createPatchCommand(Long accountId, Long tradeId, double stopLoss,\
    \ double takeProfit)\n 9 throws Exception {\n10  HttpPatch httpPatch = new HttpPatch(getTradeForAccountUrl(tradeId,\
    \ accountId));\n11  httpPatch.setHeader(this.authHeader);\n12  List < NameValuePair\
    \ > params = Lists.newArrayList();\n13  params.add(new BasicNameValuePair(OandaJsonKeys.takeProfit,\
    \ String.valueOf(takeProfit)));\n14  params.add(new BasicNameValuePair(OandaJsonKeys.stopLoss,\
    \ String.valueOf(stopLoss)));\n15  httpPatch.setEntity(new UrlEncodedFormEntity(params));\n\
    16  return httpPatch;\n17 }\n```\n"
- fmt: "`modifyTrade()`方法首先调用`getTradeForAccountUrl()`函数计算需要发送`PATCH`请求的REST资源URL，以修改交易。对于账户ID\
    \ **123456** 和交易ID **234567**，该函数将计算得到：\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/trades/234567\n\
    ```\n\n计算得到URL后，我们可以创建`HttpPatch`对象实例来准备补丁命令。这次对于`NameValuePair`对象列表，只需分别创建2个：一个用于止盈（`takeProfit`），一个用于止损（`stopLoss`）。该列表随后需进行URL编码，并设置到`HttpPatch`对象实例上。至此，即可向平台发起修改请求。成功修改将返回如下HTTP标头：\n\
    \n```\nHTTP/1.1 200 OK\nContent-Type: application/json\nContent-Length: 179\n\
    ```\n\n当收到HTTP状态码**200**后，方法返回`true`；若收到其他状态码或发生错误则返回`false`。这就是`modifyTrade`方法的全部内容。\n\
    \n接下来讨论`closeTrade`方法。该方法与`closeOrder`方法几乎完全相同，订单对应的讨论同样适用于此。因此直接列出代码即可。\n\n```\n\
    @Override\npublic boolean closeTrade(Long tradeId, Long accountId) {\n    CloseableHttpClient\
    \ httpClient = getHttpClient();\n    try {\n        HttpDelete httpDelete = new\
    \ HttpDelete(getTradeForAccountUrl(tradeId, accountId));\n        httpDelete.setHeader(authHeader);\n\
    \        LOG.info(TradingUtils.executingRequestMsg(httpDelete));\n        HttpResponse\
    \ resp = httpClient.execute(httpDelete);\n        if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK) {\n            LOG.info(String.format(\"Trade %d successfully\
    \ closed for account %d\", tradeId, accountId));\n            return true;\n \
    \       } else {\n            LOG.warn(String.format(\"Trade %d could not be closed.\
    \ Recd error code %d\", tradeId, resp.getStatusLine().getStatusCode()));\n   \
    \     }\n    } catch (Exception e) {\n        LOG.warn(\"error deleting trade\
    \ id:\" + tradeId, e);\n    } finally {\n        TradingUtils.closeSilently(httpClient);\n\
    \    }\n    return false;\n}\n```\n\n将注意力转向交易的“R”操作（读取操作），我们会发现它与订单对应部分高度相似。首先来看获取账户所有交易的方法。\n\
    \n```\nString getTradesInfoUrl(Long accountId) {\n    return this.url + OandaConstants.ACCOUNTS_RESOURCE\
    \ + TradingConstants.FWD_SLASH + accountId + tradesResource;\n}\n\n@Override\n\
    public Collection<Trade<Long, String, Long>> getTradesForAccount(Long accountId)\
    \ {\n    Collection<Trade<Long, String, Long>> allTrades = Lists.newArrayList();\n\
    \    CloseableHttpClient httpClient = getHttpClient();\n    try {\n        HttpUriRequest\
    \ httpGet = new HttpGet(getTradesInfoUrl(accountId));\n        httpGet.setHeader(this.authHeader);\n\
    \        httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n        LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    \        HttpResponse resp = httpClient.execute(httpGet);\n        String strResp\
    \ = TradingUtils.responseToString(resp);\n        if (strResp != StringUtils.EMPTY)\
    \ {\n            Object obj = JSONValue.parse(strResp);\n            JSONObject\
    \ jsonResp = (JSONObject) obj;\n            JSONArray accountTrades = (JSONArray)\
    \ jsonResp.get(trades);\n            for (Object accountTrade : accountTrades)\
    \ {\n                JSONObject trade = (JSONObject) accountTrade;\n         \
    \       Trade<Long, String, Long> tradeInfo = parseTrade(trade, accountId);\n\
    \                allTrades.add(tradeInfo);\n            }\n        } else {\n\
    \            TradingUtils.printErrorMsg(resp);\n        }\n    } catch (Exception\
    \ ex) {\n        LOG.error(ex);\n    } finally {\n        TradingUtils.closeSilently(httpClient);\n\
    \    }\n    return allTrades;\n}\n```\n\n首先调用`getTradesInfoUrl`计算可向平台发送以检索所有账户订单的URL。对于账户**123456**，该方法将返回：\n\
    \n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/trades\n```\n\n成功调用后，平台将返回类似如下的JSON负载：\n\
    \n```\n{\n    \"trades\": [\n        {\n            \"id\": 1800805337,\n    \
    \        \"units\": 3000,\n            \"side\": \"sell\",\n            \"instrument\"\
    : \"CHF_JPY\",\n            \"time\": \"1426660416000000\",\n            \"price\"\
    : 120.521,\n            \"takeProfit\": 105.521,\n            \"stopLoss\": 121.521,\n\
    \            \"trailingStop\": 0,\n            \"trailingAmount\": 0\n       \
    \ },\n        {\n            \"id\": 1800511850,\n            \"units\": 3000,\n\
    \            \"side\": \"buy\",\n            \"instrument\": \"USD_CHF\",\n  \
    \          \"time\": \"1426260592000000\",\n            \"price\": 1.0098,\n \
    \           \"takeProfit\": 1.15979,\n            \"stopLoss\": 0.9854,\n    \
    \        \"trailingStop\": 0,\n            \"trailingAmount\": 0\n        }\n\
    \    ]\n}\n```\n\n接下来的工作是解析此类负载以创建待返回的交易集合。由于它是一个`JSONArray`（`trades`），我们需要编写循环处理每个元素，并将属性解析委托给`parseTrade`方法（如下所示），以创建并返回`Trade`\
    \ POJO。\n\n```\nprivate Trade<Long, String, Long> parseTrade(JSONObject trade,\
    \ Long accountId) {\n    final Long tradeTime = Long.parseLong(trade.get(time).toString());\n\
    \    final Long tradeId = (Long) trade.get(id);\n    final Long tradeUnits = (Long)\
    \ trade.get(units);\n    final TradingSignal tradeSignal = OandaUtils.toTradingSignal((String)\
    \ trade.get(side));\n    final TradeableInstrument<String> tradeInstrument = new\
    \ TradeableInstrument<String>((String) trade.get(instrument));\n    final double\
    \ tradeTakeProfit = ((Number) trade.get(takeProfit)).doubleValue();\n    final\
    \ double tradeExecutionPrice = ((Number) trade.get(price)).doubleValue();\n  \
    \  final double tradeStopLoss = ((Number) trade.get(stopLoss)).doubleValue();\n\
    \n    return new Trade<Long, String, Long>(tradeId, tradeUnits, tradeSignal, tradeInstrument,\n\
    \            new DateTime(TradingUtils.toMillisFromNanos(tradeTime)),\n      \
    \      tradeTakeProfit, tradeExecutionPrice, tradeStopLoss, accountId);\n}\n```\n\
    \n上述解析逻辑不言自明。最后要讨论的是如何根据给定的交易ID和账户ID检索单笔交易。"
