    \ = \"SignalFactory\";\n27   final int tweetsToDump = 10;\n28   int ctr = 0;\n\
    \n30   Collection < NewFXTradeTweet < String >> newTradeTweets =\n31    tweetHarvester.harvestNewTradeTweets(userId);\n\
