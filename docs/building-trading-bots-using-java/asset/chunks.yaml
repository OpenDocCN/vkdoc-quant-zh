    \ 35   result = prime * result + ((eventDate == null) ? 0 : eventDate.hashCode());\n\
    \ 36   result = prime * result + ((instrument == null) ? 0 : instrument.hashCode());\n\
    \ 37   return result;\n 38  }\n\n 40  @Override\n 41  public int hashCode() {\n\
    \ 42   return hash;\n 43  }\n\n 45  @Override\n 46  public boolean equals(Object\
    \ obj) {\n 47   if (this == obj)\n 48    return true;\n 49   if (obj == null)\n\
    \ 50    return false;\n 51   if (getClass() != obj.getClass())\n 52    return\
    \ false;\n 53   CandleStick other = (CandleStick) obj;\n 54   if (candleGranularity\
    \ != other.candleGranularity)\n 55    return false;\n 56   if (eventDate == null)\
    \ {\n 57    if (other.eventDate != null)\n 58     return false;\n 59   } else\
    \ if (!eventDate.equals(other.eventDate))\n 60    return false;\n 61   if (instrument\
    \ == null) {\n 62    if (other.instrument != null)\n 63     return false;\n 64\
    \   } else if (!instrument.equals(other.instrument))\n 65    return false;\n 66\
    \   return true;\n 67  }\n\n 69  @Override\n 70  public String toString() {\n\
    \ 71   return this.toStr;\n 72  }\n\n 74  public CandleStickGranularity getCandleGranularity()\
    \ {\n 75   return candleGranularity;\n 76  }\n\n 78  public TradeableInstrument\
    \ < T > getInstrument() {\n 79   return instrument;\n 80  }\n\n 82  public double\
    \ getOpenPrice() {\n 83   return openPrice;\n 84  }\n\n 86  public double getHighPrice()\
    \ {\n 87   return highPrice;\n 88  }\n\n 90  public double getLowPrice() {\n 91\
    \   return lowPrice;\n 92  }\n\n 94  public double getClosePrice() {\n 95   return\
    \ closePrice;\n 96  }\n\n 98  public DateTime getEventDate() {\n 99   return eventDate;\n\
    100  }\n101 }\n```\n\n除了`eventDate`，所有其他属性在我们之前关于“如何解读蜡烛图”的讨论中都是不言自明的。我们本应期望有开始和结束日期，但这里只有一个`eventDate`属性。为什么会这样呢？实际上，根据蜡烛图的粒度及其开始时间，可以推算出结束日期。所以`eventDate`实际上是蜡烛图周期的开始时间。\n\
    \n关于`hashCode()`和`equals()`方法，以下三个属性参与其中，并用于确定蜡烛图在集合中是否是唯一的。\n\n```java\n1 private\
    \ final DateTime eventDate;\n2 private final TradeableInstrument<T> instrument;\n\
    3 private final CandleStickGranularity candleGranularity;\n```\n\nPOJO 中的所有价格属性都假定为买入价和卖出价的平均值。\n\
    \n#### 历史数据提供者接口\n\n现在，是时候定义历史数据提供者接口了，该接口将指定需要实现哪些内容才能检索到有意义的蜡烛图数据并进行分析。\n\n\
    代码清单 5.3：HistoricMarketDataProvider 接口\n\n```java\n 1 /**\n 2  * 针对给定金融工具的蜡烛图数据提供者。蜡烛图必须按时间顺序排列，以便于构建时间序列信息。\n\
    \ 3  * @param <T>\n 4  *            类 TradeableInstrument 中的 instrumentId 类型\n\
    \ 5  * @see TradeableInstrument\n 6  */\n 9 public interface HistoricMarketDataProvider\
    \ < T > {\n\n11  /**\n12   * 为给定的起始和结束时间段构建蜡烛图。\n13   *\n14   * @param instrument\n\
    15   *            ，需要获取其蜡烛图信息的金融工具\n16   * @param granularity\n17   *        \
    \    ，两个蜡烛图之间的时间间隔\n18   * @param from\n19   *            ，第一个蜡烛图的开始时间\n20   *\
    \ @param to\n21   *            ，最后一个蜡烛图的结束时间\n22   * @return List<CandleStick<T>>\
    \ 按时间顺序排列。\n23   */\n24  List < CandleStick < T >> getCandleSticks(TradeableInstrument\
    \ < T > instrument,\n25   CandleStickGranularity granularity, DateTime from, DateTime\
    \ to);\n\n27  /**\n28   * 构建最近的“count”个蜡烛图。如果合适，这可以转化为对上述需要“from”和“to”日期的重载方法的调用。\n\
    29   * “to”日期 = now() 且“from”日期 = now() - granularity*count\n30   *\n31   * @param\
    \ instrument\n32   *            ，需要获取其蜡烛图信息的金融工具\n33   * @param granularity\n\
    34   *            ，两个蜡烛图之间的时间间隔\n35   * @param count\n36   *            ，\n37\
    \   * @return List<CandleStick<T>> 按时间顺序排列。\n38   */\n39  List < CandleStick <\
    \ T >> getCandleSticks(TradeableInstrument < T > instrument,\n40   CandleStickGranularity\
    \ granularity, int count);\n41 }\n```\n\n和往常一样，这个接口定义看起来相当简单。两个重载方法——一个接受`from`和`to`时间段，另一个接受所需的最后`count`个蜡烛图——就是检索所需蜡烛图的全部所需。返回类型选择`List`而非`Collection`，保证了蜡烛图有一定的顺序，此处即为时间顺序。\n"
- fmt: "### 5.4 A concrete implementation for `HistoricMarketDataProvider`\n\nWe begin\
    \ our discussion of the OANDA implementation by first taking a quick look at a\
    \ sample JSON returned when we request candle stick information. The example below\
    \ is for granularity **Daily**.\n\nCode Listing 5.4: Sample JSON for candle sticks\n\
    \n```\n 1 {\n 2   \"instrument\": \"GBP_USD\",\n 3   \"granularity\": \"D\",\n\
    \ 4   \"candles\": [\n 5     {\n 6       \"time\": \"1442098800000000\",\n 7 \
    \      \"openMid\": 1.54301,\n 8       \"highMid\": 1.544695,\n 9       \"lowMid\"\
    : 1.54284,\n10       \"closeMid\": 1.544295,\n11       \"volume\": 868,\n12  \
    \     \"complete\": true\n13     },\n14     {\n15       \"time\": \"1442185200000000\"\
    ,\n16       \"openMid\": 1.544245,\n17       \"highMid\": 1.54594,\n18       \"\
    lowMid\": 1.54376,\n19       \"closeMid\": 1.54406,\n20       \"volume\": 3765,\n\
    21       \"complete\": false\n22     }\n23   ]\n24 }\n```\n\nThe JSON keys that\
    \ we need to statically import in our provider class are:\n\n```\n1 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.candles;\n2 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.closeMid;\n3 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.highMid;\n4 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.lowMid;\n5 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.openMid;\n6 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.time;\n```\n\nAs usual,\
    \ replacing **`T`** param type in the interface definition with **`String`** we\
    \ get the following class definition:\n\n```\n1 public class OandaHistoricMarketDataProvider\
    \ implements HistoricMarketDataProvider<String> {\n```\n\nFor the constructor\
    \ definition, it is sufficient to provide the OANDA service URL and an access\
    \ token:\n\n```\n1 private final String url;\n2 private final BasicHeader authHeader;\n\
    3 public OandaHistoricMarketDataProvider(String url, String accessToken) {\n4\
    \ \tthis.url = url;// OANDA REST service base url\n5 \tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    6 }\n```\n\nThe candle stick resource endpoint is:\n\n```\n1 public static final\
    \ String CANDLES_RESOURCE = \"/v1/candles\";\n```\n\nSo our functions to compute\
    \ the URLs to retrieve candle sticks, first with date range and the other with\
    \ count respectively, are:\n\n```\n 1 private static final String tzLondon = \"\
    Europe%2FLondon\";\n\n 3 String getFromToUrl(TradeableInstrument < String > instrument,\
    \ CandleStickGranularity granularity,\n 4  DateTime from, DateTime to) {\n 5 \
    \ return String.format(\n 6   \"%s%s?instrument=%s&candleFormat=midpoint&granularity=%s&dailyAlignment=0&alignmentTimezone=%s&start=%d&end=%d\"\
    ,\n 7 \tthis.url, OandaConstants.CANDLES_RESOURCE, instrument.getInstrument(),\n\
    \ 8   granularity.name(), tzLondon, TradingUtils.toUnixTime(from), TradingUtils.toUnixTime(to));\n\
    \ 9 }\n\n11 String getCountUrl(TradeableInstrument < String > instrument, CandleStickGranularity\
    \ granularity, int count) {\n\n13  return String.format(\n14   \"%s%s?instrument=%s&candleFormat=midpoint&granularity=%s&dailyAlignment=0&alignment\
    \ Timezone=%s&count=%d\",\n15   this.url, OandaConstants.CANDLES_RESOURCE, instrument.getInstrument(),\
    \ granularity.name(),\n16   tzLondon, count);\n17 }\n\n19 //Test invocation code\n\
    20 TradeableInstrument<String> euraud = new TradeableInstrument<String>(\"EUR_AUD\"\
    );\n\n22 DateTime fromDate=new DateTime(1442098800000L);\n23 DateTime toDate =\
    \ new DateTime(1442185200000L);\n24 String fromToUrl = getFromToUrl(euraud, CandleStickGranularity.S5,\
    \ fromDate );\n25 System.out.println(\"FromToUrl:\"+fromToUrl);\n26 System.out.println(\"\
    *****\");\n27 int count=5;\n28 String countUrl=getCountUrl(euraud,CandleStickGranularity.S5\
    \ ,count);\n29 System.out.println(\"CountUrl:\"+countUrl);\n```\n\nOutput from\
    \ test code invocation above would look like:\n\n```\n1 FromToUrl:https://api-fxtrade.oanda.com/v1/candles?Instrument=EUR_AUD&candleFormat=midpoint&granularity=S5&dailyAlignmen\\\
    \n2 t=0&alignmentTimezone=Europe%2FLondon&start=1442098800000000&end=1442185200000000\n\
    3 *****\n4 CountUrl:https://api-fxtrade.oanda.com/v1/candles?Instrument=EUR_AUD&candleFormat=midpoint&granularity=S5&dailyAlignment\\\
    \n5 =0&alignmentTimezone=Europe%2FLondon&count=5\n```\n\nSome key observations\
    \ from the code snippets above are:\n\n*   We need to provide an alignment timezone.\
    \ This is the timezone that the start timestamp for a candlestick will be reported\
    \ in.\n*   The `from` and `to` timestamps must be provided as UNIX timestamp,\
    \ which has nanosecond precision.\n*   The parameter **`candleFormat=midpoint`**\
    \ is requesting OANDA to provide bid/ask prices as averaged prices instead of\
    \ providing them separately.\n*   The **`dailyAlignment=0`** is the hour of day\
    \ used to align the candle sticks if granularity >= **`D`**. The value ranges\
    \ from **`0`** to **`23`**. In our case we are requesting the candle sticks to\
    \ be aligned at midnight London time.\n*   More information about candle stick\
    \ URL params can be found at [http://developer.oanda.com/rest-live/rates/#aboutCandlestickRepresentation](http://developer.oanda.com/rest-live/rates/#aboutCandlestickRepresentation)\n\
    \nWe now turn our attention to the discussion of the 2 overloaded methods which\
    \ actually delegate the main logic to a private method which retrieves, parses\
    \ and returns the list of candle sticks.\n\n```\n 1 @Override\n 2 public List\
    \ < CandleStick < String >> getCandleSticks(TradeableInstrument < String > instrument,\n\
    \ 3  CandleStickGranularity granularity, DateTime from, DateTime to) {\n 4  return\
    \ getCandleSticks(instrument,\n 5   getFromToUrl(instrument, granularity, from,\
    \ to), granularity);\n 6 }\n\n 8 @Override\n 9 public List < CandleStick < String\
    \ >> getCandleSticks(TradeableInstrument < String > instrument,\n10  CandleStickGranularity\
    \ granularity, int count) {\n11  return getCandleSticks(instrument,\n12   getCountUrl(instrument,\
    \ granularity, count), granularity);\n13 }\n\n15 private List < CandleStick <\
    \ String >> getCandleSticks(TradeableInstrument < String > instrument,\n16  String\
    \ url, CandleStickGranularity granularity) {\n17  List < CandleStick < String\
    \ >> allCandleSticks = Lists.newArrayList();\n18  CloseableHttpClient httpClient\
    \ = getHttpClient();\n19  try {\n20   HttpUriRequest httpGet = new HttpGet(url);\n\
    21   httpGet.setHeader(authHeader);\n22   httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
    23   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n24   HttpResponse resp\
    \ = httpClient.execute(httpGet);\n25   String strResp = TradingUtils.responseToString(resp);\n\
    26   if (strResp != StringUtils.EMPTY) {\n27    Object obj = JSONValue.parse(strResp);\n\
    28    JSONObject jsonResp = (JSONObject) obj;\n29    JSONArray candlsticks = (JSONArray)\
    \ jsonResp.get(candles);\n\n31    for (Object o: candlsticks) {\n32     JSONObject\
    \ candlestick = (JSONObject) o;\n\n34     final double openPrice = ((Number) candlestick.get(openMid)).doubleValue();\n\
    35     final double highPrice = ((Number) candlestick.get(highMid)).doubleValue();\n\
    36     final double lowPrice = ((Number) candlestick.get(lowMid)).doubleValue();\n\
    37     final double closePrice = ((Number) candlestick.get(closeMid)).doubleValue();\n\
    38     final long timestamp = Long.parseLong(candlestick.get(time).toString());\n\
    \n40     CandleStick < String > candle = new CandleStick < String > (openPrice,\
    \ highPrice,\n41      lowPrice, closePrice, new DateTime(TradingUtils.toMillisFromNanos(timestamp)),\n\
    42      instrument, granularity);\n43     allCandleSticks.add(candle);\n44   \
    \ }\n45   } else {\n46    TradingUtils.printErrorMsg(resp);\n47   }\n48  } catch\
    \ (Exception e) {\n49   LOG.error(e);\n50  } finally {\n51   TradingUtils.closeSilently(httpClient);\n\
    52  }\n53  return allCandleSticks;\n54 }\n```"
