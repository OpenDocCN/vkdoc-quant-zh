- fmt: "## 9\\. Implementing Strategies\n\nIt is now time to provide wings to our\
    \ bot and make it fly!! Well, what we mean is that time has come to now add capabilities\
    \ to our bot so that it can now make decision in terms of placing orders, based\
    \ on a certain set of rules, that we all know is a strategy. Basically, we want\
    \ to add the power of analysis to our bot to determine whether to buy or sell\
    \ a currency pair or to stay put and wait for the right moment to come. The analysis\
    \ can be based on several external parameters like:\n\n- Market data\n- News Events\n\
    - Social Media feeds\n- Technical analysis\n- Sentiment\n- etc.\n\nA strategy\
    \ can be based solely on pure technical analysis of prices over a period of time\
    \ and on the other hand be based on real time analysis of all or a mixture of\
    \ params listed above. For e.g. a complex strategy could be built on realtime\
    \ analysis of social media feeds to ascertain what the sentiment index is (a hypothetical\
    \ index based on how much positivity surrounds us) and market data to arrive at\
    \ a trading decision. It can be as simple as single dimensional analysis to multivariate\
    \ analysis. The possibilities are infinite!!\n\nIn this chapter we will try to\
    \ implement a couple of strategies, one of them based on Twitter feed analysis\
    \ and the other a more popular one, used often by traders. We will program these\
    \ strategies and integrate them into our trading bot in order to build capabilities\
    \ to produce a trading signal, and as a result place orders.\n\nBefore we dive\
    \ into these strategies, we would like to take this opportunity to discuss briefly\
    \ the design of how the various strategies generate a `TradingDecision`, which\
    \ are placed in the queue and the `OrderExecutionService` then picks these `TradingDecision`\
    \ messages. How these messages are handled, is discussed in detail in **Chapter\
    \ 6**.\n\n![Trading Signal Generation](images/00076.jpeg) Trading Signal Generation\n\
    \n***Disclaimer***: *The strategies discussed in this chapter are purely for discussion\
    \ and demonstration purposes. Developers must use their own reasoning/judgement\
    \ before applying them in a live trading environment. In no event shall the author\
    \ be liable for any direct, indirect, incidental, special, exemplary, or consequential\
    \ damages arising from the deployment of the strategies discussed.*\n\n### 9.1\
    \ Copy Twitter Strategy\n\nThis strategy is aimed at blindly copying or doing\
    \ the exact opposite to what the twitter user has just tweeted, the tweet relating\
    \ to a new trade. It works as follows:\n\n- Using tools and the knowledge we developed\
    \ in the last chapter, we follow a set of users on Twitter, who often Tweet new\
    \ trade and close trade messages, with a predefined structure, something which\
    \ a handler if written, can parse and create a `NewFxTradeTweet` or `CloseFxTradeTweet`\
    \ object. We studied and analysed the tweets of 2 such users `@SignalFactory`\
    \ and `@ZuluTrader101`.\n- We create a scheduled job, which searches for new tweets\
    \ from these users. When a new trade tweet is found and successfully parsed into\
    \ a `NewFxTradeTweet` object, we search historic tweets by the same user and for\
    \ the instrument for which he just tweeted to go *long* or *short*.\n- We parse\
    \ the collection of historic tweets to create a collection of `CloseFxTradeTweet`\
    \ objects. Each `CloseFxTradeTweet`, as we know has an attribute which holds a\
    \ profit/loss figure. If we could not find one, it is defaulted to 0.0.\n- We\
    \ analyse how many previous trades were profitable and how many were loss making\
    \ of the total.\n- If the analysis tells us that the user recommendation for this\
    \ trade in the past was more than 75% accurate, we do exactly what he has just\
    \ suggested in the recent trade. If on the contrary, it suggests that he/she was\
    \ wrong more than 75% of the time, we do exactly the opposite. For any other condition,\
    \ we take no further decision and ignore the tweet. We also need to make sure\
    \ that we are analysing atleast 4 historic tweets in order to give us better accuracy\
    \ of decision making.\n\nThe figure of 75% and picking 4 tweets is arbitrary and\
    \ can vary from one installation to another.\n\nLets look at the code that tries\
    \ to implement this strategy.\n\n```\n 1 @TradingStrategy\n  2 public class CopyTwitterStrategy\
    \ < T > implements TweetHarvester < T > {\n\n4  @Resource\n  5  Map < String,\n\
    \  6  FXTweetHandler < T >> tweetHandlerMap;\n  7  @Resource(name = \"orderQueue\"\
    )\n  8  BlockingQueue < TradingDecision < T >> orderQueue;\n  9  private static\
    \ final Logger LOG = Logger.getLogger(CopyTwitterStrategy.class);\n 10  private\
    \ ExecutorService executorService = null;\n 11  private static final double ACCURACY_DESIRED\
    \ = 0.75;\n 12  private static final int MIN_HISTORIC_TWEETS = 4;\n\n14  @PostConstruct\n\
    \ 15  public void init() {\n 16   this.executorService = Executors.newFixedThreadPool(tweetHandlerMap.size());\n\
    \ 17  }\n```"
