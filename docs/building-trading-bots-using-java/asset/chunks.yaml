    We start our discussion by looking at the dependencies autowired into the strategy
    class. The resource `orderQueue` is the obvious inclusion that we discussed in
    the beginning of the chapter. The `instrumentService` class in the strategy is
    called upon to provide pip value for each instrument. The pip, from our discussion
    in the chapter *Tradeable Instruments*, is the lower precision value for a price
    tick. For e.g. for all JPY pairs(with majors), it is `0.001` and for instruments
    like EURUSD,GBPUSD it is `0.00001`. We need this information to calculate how
    many pips the price has jumped in the given observation interval. This is pretty
    much also captured in the method `calculatePipJump`. The last price of the observation
    interval minus the first price and the result divided by this pip value for the
    instrument, gives us the pips, the value of the currency pair rose or dipped.
    The last dependency injected, `tradingConfig` gives us the parameters that we
    have configured in the spring config, for our strategy like:


    *   The minimum pip jump or dip required to consider fading the move i.e the method
    `getFadeTheMoveJumpReqdToTrade()`.

    *   The distance in pips from the current price, the limit order should be placed
    in the opposite direction of the trend i.e the method `getFadeTheMoveDistanceToTrade()`.

    *   The session length for observation interval in minutes i.e the method `getFadeTheMovePriceExpiry()`.

    *   The profit desired in pips. This helps setting the take profit price for the
    limit order i.e the method `getFadeTheMovePipsDesired()`.


    The constructor of the class accepts a list of instruments that we must apply
    this strategy to and is constructor injected by Spring.


    We also have a `@PostConstruct` annotated method `init()` where we initialise
    a guava^([2](#part0063.html#fn-gc)) `Cache` for each instrument injected. The
    cache is keyed by `DateTime` of the tick data event and the value is the `MarketDataPayLoad`.
    We also set the `expireAfterWrite` value `T` provided by `tradingConfig.getFadeTheMovePriceExpiry()`
    to automatically expire the entries from the cache after `T` minutes.


    The method `handleMarketDataEvent()` is annotated by the `@Subscribe` annotation
    which means it receives all tick data events which have been parsed into the `MarketDataPayLoad`
    object and disseminated by the EvenBus. Once received, the instance of `MarketDataPayload`
    is only accepted if it relates to the instrument that we configured the cache
    for and then `put` in the cache for that instrument.


    The main action in the strategy happens in the method `analysePrices()`. This
    method is called by the task scheduler after every `T` minutes, the value of which
    is configured in the Spring configuration. This should normally be the same as
    `tradingConfig.getFadeTheMovePriceExpiry()`. We start by looping through all instruments
    configured in the cache. For each of them, we calculate how much has been the
    pip jump in absolute value in the given time period. If the pip jump is not above
    the minimum threshold ( > `getFadeTheMoveJumpReqdToTrade()`), we ignore this.
    If the pip jump is above this threshold, we try to ascertain the market trend
    by looking at the sign of the pip jump. If its negative, we know that the trend
    is downwards else its upwards. For upwards trend we place a `SHORT` trade or `LONG`
    for a downwards trend. We then calculate the limit price of the order using `tradingConfig.getFadeTheMoveDistanceToTrade()`
