    至此，我们结束了对上游事件处理和解析的讨论。正如我们将在后续章节中发现的那样，心跳对于保持流活动至关重要。我们必须重视这些心跳，并在它们停止时迅速采取行动（以重新启动这些流的形式），以免我们的策略做出错误决策。在下一节中，我们将讨论如何通过
