    \ {\n29     LOG.error(\"Argument 2 should be numeric\");\n30     System.exit(1);\n\
    31    }\n32   }\n33  }\n\n35  private static class DataSubscriber {\n\n37   @Subscribe\n\
    38   @AllowConcurrentEvents\n39   public void handleHeartBeats(HeartBeatPayLoad\
    \ < DateTime > payLoad) {\n40    LOG.info(\n41     String.format(\"Heartbeat received\
