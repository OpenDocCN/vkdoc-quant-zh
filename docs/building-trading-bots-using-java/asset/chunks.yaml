    \ `@TradingStrategy` 标注该类。通过这种方式，我们表明了一个声明：该类明确实现了一种交易策略。当某些类专门为实现特定任务而编写，但又无法绑定到某个接口定义时，这样做始终是一个好习惯。在\
    \ Java 1.5 之前，可以通过声明标记接口达到同样的效果。\n\n```java\n@Retention(RetentionPolicy.RUNTIME)\n\
    @Target(ElementType.TYPE)\npublic @interface TradingStrategy {\n}\n```\n\n回到我们的策略类\
    \ `CopyTwitterStrategy`，在讨论具体实现之前，我们先指出由 Spring 自动注入并可用的资源。这些资源包括：\n\n- `orderQueue`：这是一个队列，可以将\
    \ `TradingDecision` 放入其中，然后由 `OrderExecutionService` 拾取（请参考本章开头的图示）。\n- `tweetHandlerMap`：这是一个存储\
    \ Twitter 用户 ID 及其对应处理程序的映射，我们在上一章中已详细讨论过。我们以此作为起点，根据映射中的用户 ID 查找所有推文，然后委托相应的处理程序进行分析。\n\
    \n由 `@PostConstruct` 注解的 `init()` 方法会在 Bean 完全初始化后由 Spring 自动调用。在这里，我们借此机会初始化\
    \ `ExecutorService`，稍后我们会回过来讨论它。\n\n该类中的所有操作都始于 `harvestAndTrade()` 方法。正如下一章将要讨论的，该方法由\
    \ Spring 任务调度器在每个时间间隔 `T` 后自动调用，并且在 Spring 配置文件中进行配置。该方法使用了 `synchronized` 关键字，以确保不会有多于一个线程同时执行该方法。顾名思义，该方法会为我们配置的每个用户收集推文并生成交易决策。在方法内部，我们遍历\
    \ `tweetHandlerMap` 中的所有条目，并向 `ExecutorService` 提交一个 `Callable`。这个 `Callable`\
    \ 在 `call()` 方法中为给定用户执行以下逻辑：\n\n- 查找所有与新交易相关的推文，并将其成功解析，从而创建一组 `NewFXTradeTweet`\
    \ 对象（请参阅前一章，其中我们讨论了用于查找这些推文并解析它们的搜索 API）。\n- 对于每个 `NewFXTradeTweet` 对象，仅收集与指定产品相关的已平仓交易推文。\n\
    - 将这些推文的分析工作委托给 `analyseHistoricClosedTradesForInstrument` 方法，该方法计算用户的准确率并生成一个\
    \ `TradingDecision`。在此提醒一下，准确率是指用户以往交易中正确判断的百分比。这正是我们之前在本节讨论的策略核心。\n"
- fmt: "# 排版结果\n\n`analyseHistoricClosedTradesForInstrument`方法值得一些解释。在该方法开始时，我们计算准确率。为此，我们首先通过遍历旧平仓交易的集合来获取所有亏损或盈利的交易数量。`closedTrade.getProfit()`方法在这方面帮助我们。然后，只有当平仓交易数量大于或等于最小阈值（此处为4）时，我们才继续。\n\
    \n假设：\n\n*   `P` = 盈利交易的数量。\n*   `L` = 亏损交易的数量。\n*   `N` = 找到的平仓交易总数。\n\n满足 `P\
    \ + L = N`\n\n*   准确率 `R = P / N`\n*   失误率 `M = 1 - R`\n\n因此，如果`R`大于或等于期望准确率的阈值（此处为`0.75`），我们便按照用户的推文执行操作。例如，如果用户建议以某个价格卖出某个货币对，我们就照做。另一方面，如果`M`大于或等于阈值，我们则执行相反的操作。例如，如果用户建议卖出某个货币对，我们则以给定价格买入该货币对。止损和止盈水平的计算需要重新调整。由于用户最初建议卖出该货币对，并会在价格下方`P`点设置止盈，我们现在需要反转操作，将其设置在价格上方`P`点的位置。同样的逻辑适用于止损水平。\n\
    \n这结束我们对`Copy Twitter Strategy`的讨论。该策略的核心（即准确率计算）基于一个非常简单的数学计算。许多人可能会认为这过于简单，并且规避了为得出更准确决策可能需要的统计分析。这可能是非常正确的，但我想再次重申，这仅用于演示目的。本节的关键目标是演示：\n\
    \n1.  与Twitter的集成以及对推文的分析。\n2.  使用简单的代码/算法对推文进行一些数学分析，并得出交易信号。\n3.  将此信号放入订单队列中，以便由`OrderExecutionService`进一步处理，后者最终负责下达订单。\n\
    \n### 9.2 Fade The Move Strategy\n\n在本节中，我们将讨论并实现一个非常简单的`Fade the Move`策略版本。我们的策略实现如下：\n\
    \n*   策略初始化后，我们为配置中注入的预定义工具创建报价数据的订阅。\n*   在每段时间`T`（例如15分钟，即当前配置中的值）之后，我们检查该时间段开始和结束时的价格之间的点数差的绝对值是否已超过一个配置值`V`点（例如45点，即当前配置中的值）。\n\
    *   如果该值已超过`V`点，我们则在当前市场趋势的相反方向、距离当前价格`D`点（例如25点，即当前配置中的值）的位置下一个限价单。例如，如果EURUSD在过去15分钟内从1.0815（起始价格）跃升了55个点至1.087（当前价格），我们则在1.0895（1.087\
    \ + 0.0025）的价格下一个卖出EURUSD的限价单。\n*   我们设置一个10点的止盈目标（如果限价单在1.0895成交，则在1.0885止盈）。\n\
    \n现在，让我们直接跳转到源代码，看看策略是如何实现的。\n\n```java\n 1 @TradingStrategy\n 2 public class\
    \ FadeTheMoveStrategy < T > {\n\n4  @Autowired\n 5  TradingConfig tradingConfig;\n\
    \ 6  @Autowired\n 7  InstrumentService < T > instrumentService;\n 8  @Resource(name\
    \ = \"orderQueue\")\n 9  BlockingQueue < TradingDecision < T >> orderQueue;\n\
    10  private final Collection < TradeableInstrument < T >> instruments;\n\n12 \
    \ private final Map < TradeableInstrument < T > ,\n13  Cache < DateTime,\n14 \
    \ MarketDataPayLoad < T >>> instrumentRecentPricesCache = Maps\n15  .newHashMap();\n\
    \n17  public FadeTheMoveStrategy(Collection < TradeableInstrument < T >> instruments)\
    \ {\n18   this.instruments = instruments;\n19  }\n\n21  @PostConstruct\n22  public\
    \ void init() {\n23   for (TradeableInstrument < T > instrument: instruments)\
    \ {\n24    Cache < DateTime, MarketDataPayLoad < T >> recentPricesCache =\n25\
    \     CacheBuilder.newBuilder().expireAfterWrite(\n26      tradingConfig.getFadeTheMovePriceExpiry(),\
    \ TimeUnit.MINUTES)\n27     . < DateTime, MarketDataPayLoad < T >> build();\n\
    28    instrumentRecentPricesCache.put(instrument, recentPricesCache);\n29   }\n\
    30  }\n\n32  @Subscribe\n33  @AllowConcurrentEvents\n34  public void handleMarketDataEvent(MarketDataPayLoad\
    \ < T > marketDataPayLoad) {\n35   if (instrumentRecentPricesCache.containsKey(\n\
    36     marketDataPayLoad.getInstrument())) {\n37    instrumentRecentPricesCache.get(marketDataPayLoad.getInstrument())\n\
    38     .put(marketDataPayLoad.getEventDate(), marketDataPayLoad);\n39   }\n40\
    \  }\n```"
  raw: "The method *analyseHistoricClosedTradesForInstrument* merits a bit of explanation.\
    \ At the beginning of the method we compute the accuracy rate. For this we first\
    \ we get count of all trades which are loss making or in profit by looping through\
    \ the collection of old closed trades. The method `closedTrade.getProfit()` helps\
    \ us in this respect. We then go further only if the number of closed trades is\
    \ greater than or equal to the minimum threshold, in this case being 4. Assuming\n\
    \n*   **P** = Number of profit making trades.\n*   **L** = Number of loss making\
    \ trades.\n*   **N** = Total number of closed trades found.\n\nsuch that **P +\
    \ L = N**\n\n*   Accuracy Rate **R = P/N**\n*   Miss Rate **M = 1 - R**\n\nSo\
    \ if **R** is greater than or equal to the threshold for desired accuracy, in\
    \ this case being **0.75**, we do exactly what the user has tweeted. For e.g.\
    \ if the user recommends to sell a currency pair at a given price, we do exactly\
    \ that. On the other hand if **M** is greater than or equal to the threshold,\
    \ we do exactly the opposite. So for e.g. if the user recommends to sell a currency\
    \ pair, we buy the currency pair at the given price. The calculation of stop loss\
    \ and take profit levels need readjusting. Since the user initially recommended\
    \ selling the currency pair and would have set a take profit at level pips **P**\
    \ below the price, we now need to turn it around and make it at a distance of\
    \ pips **P** above the price. The same logic applies to stop loss levels.\n\n\
    This concludes are discussion of the *Copy Twitter Strategy*. The crux of the\
    \ strategy, which is the accuracy rate calculation is based on a very simplistic\
    \ mathematical calculation. Many would argue that it’s too simplistic and circumvents\
    \ the statistical analysis that might be required to arrive at a more accurate\
    \ decision. This may be be very true but again I would like to reiterate that,\
    \ this is for demonstration purposes only. The key aim of the section was demonstrate\n\
    \n1.  Integration with Twitter and analysis of tweets.\n2.  Use simplistic code/algorithm\
    \ to do some mathematical analysis of the tweets and arrive at a Trading signal.\n\
    3.  Queue this signal in the Order Queue to be processed further by the *OrderExecutionService*\
    \ which ultimately has the responsibility of placing the order.\n\n### 9.2 Fade\
    \ The Move Strategy\n\nIn this section we are going to discuss and implement a\
    \ very simplistic version of *Fade the Move*^([1](#part0063.html#fn-fade)) strategy.\
    \ Our implementation of the strategy works as follows\n\n*   After the strategy\
    \ is initialised, we create a subscription for tick data for pre defined instruments\
    \ injected via the configuration.\n*   After every period of time **T**, lets\
    \ say 15 minutes (the value in the current configuration), we check if the the\
    \ absolute value of difference of pips between the price at the start of interval\
    \ and at the end of the period has exceeded a configured value ***V*** pips, lets\
    \ say 45 (the value in the current configuration).\n*   If the value has exceeded\
    \ ***V*** pips, we then place a limit order, opposite to the direction of current\
    \ market trend, at a distance ***D*** pips, lets say 25 (the value in the current\
    \ configuration), from the current price. For e.g. if EURUSD has jumped by 55\
    \ pips from 1.0815(start price) to 1.087(current price) in the last 15 minutes,\
    \ we place a limit order to sell EURUSD at price 1.0895 (1.087+0.0025).\n*   We\
    \ set a take profit target of 10 pips (Take Profit at 1.0885 if limit order filled\
    \ at 1.0895)\n\nNow lets jump directly to the source code to see how the strategy\
    \ is implemented.\n\n```\n 1 @TradingStrategy\n 2 public class FadeTheMoveStrategy\
    \ < T > {\n\n4  @Autowired\n 5  TradingConfig tradingConfig;\n 6  @Autowired\n\
    \ 7  InstrumentService < T > instrumentService;\n 8  @Resource(name = \"orderQueue\"\
    )\n 9  BlockingQueue < TradingDecision < T >> orderQueue;\n10  private final Collection\
    \ < TradeableInstrument < T >> instruments;\n\n12  private final Map < TradeableInstrument\
    \ < T > ,\n13  Cache < DateTime,\n14  MarketDataPayLoad < T >>> instrumentRecentPricesCache\
    \ = Maps\n15  .newHashMap();\n\n17  public FadeTheMoveStrategy(Collection < TradeableInstrument\
    \ < T >> instruments) {\n18   this.instruments = instruments;\n19  }\n\n21  @PostConstruct\n\
    22  public void init() {\n23   for (TradeableInstrument < T > instrument: instruments)\
    \ {\n24    Cache < DateTime, MarketDataPayLoad < T >> recentPricesCache =\n25\
    \     CacheBuilder.newBuilder().expireAfterWrite(\n26      tradingConfig.getFadeTheMovePriceExpiry(),\
    \ TimeUnit.MINUTES)\n27     . < DateTime, MarketDataPayLoad < T >> build();\n\
    28    instrumentRecentPricesCache.put(instrument, recentPricesCache);\n29   }\n\
    30  }\n\n32  @Subscribe\n33  @AllowConcurrentEvents\n34  public void handleMarketDataEvent(MarketDataPayLoad\
    \ < T > marketDataPayLoad) {\n35   if (instrumentRecentPricesCache.containsKey(\n\
    36     marketDataPayLoad.getInstrument())) {\n37    instrumentRecentPricesCache.get(marketDataPayLoad.getInstrument())\n\
    38     .put(marketDataPayLoad.getEventDate(), marketDataPayLoad);\n39   }\n40\
    \  }"
