  trans: "```java\nprivate void reconstructCache() {\n    lock.writeLock().lock();\n\
    \    try {\n        tradesCache.clear();\n        Collection<Account<K>> accounts\
    \ = this.accountInfoService.getAllAccounts();\n        for (Account<K> account\
    \ : accounts) {\n            Map<TradeableInstrument<N>, Collection<Trade<M, N,\
    \ K>>> tradeMap =\n                getTradesPerInstrumentForAccount(account.getAccountId());\n\
    \            tradesCache.put(account.getAccountId(), tradeMap);\n        }\n \
    \   } finally {\n        lock.writeLock().unlock();\n    }\n}\n\nprivate Map<TradeableInstrument<N>,\
    \ Collection<Trade<M, N, K>>>\n    getTradesPerInstrumentForAccount(K accountId)\
    \ {\n    Collection<Trade<M, N, K>> trades =\n        this.tradeManagementProvider.getTradesForAccount(accountId);\n\
    \    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> tradeMap =\n    \
    \    Maps.newHashMap();\n    for (Trade<M, N, K> ti : trades) {\n        Collection<Trade<M,\
    \ N, K>> tradeLst = null;\n        if (tradeMap.containsKey(ti.getInstrument()))\
    \ {\n            tradeLst = tradeMap.get(ti.getInstrument());\n        } else\
    \ {\n            tradeLst = Lists.newArrayList();\n            tradeMap.put(ti.getInstrument(),\
    \ tradeLst);\n        }\n        tradeLst.add(ti);\n    }\n    return tradeMap;\n\
    }\n```\n\n如上所示，由 Spring 等依赖注入框架自动调用的 `init()` 方法，会进一步调用内部方法 `reconstructCache()`。此方法首先会申请一个排他性的**写锁**，以确保没有其他线程正在读取或写入内部的\
    \ `tradesCache`。提醒一下，`ReadWriteLock` 允许**多个读取者**同时访问，但只能有一个**写入者**。因此，为了保持缓存的一致性以及其他线程所看到的缓存状态，我们在更新缓存之前必须申请\
    \ `writeLock`，使其他线程在尝试读取或写入缓存时进入等待状态。\n\n一旦获取了写锁，我们就获得了开始（重新）填充缓存的权限。由于我们需要首先按交易工具组织所有交易，然后再按账户\
    \ ID 组织工具-交易列表的映射结果，因此我们首先通过 `accountInfoService.getAllAccounts()` 获取所有账户的列表。然后，在我们循环遍历账户集合中的每个账户时，通过调用内部方法\
    \ `getTradesPerInstrumentForAccount` 来计算每个交易工具对应的交易集合的映射。该方法内部又使用 `tradeManagementProvider.getTradesForAccount`\
    \ 来获取给定账户 ID 的所有交易。一旦获取了所有交易，我们就可以遍历它们，然后将它们放入一个以它们所代表未平仓头寸的交易工具为键的映射中。这基本上就是创建此内部缓存所需完成的工作。现在，我们应该能够提供服务来处理大量关于交易的查询，而无需每次都访问底层提供者。我们稍后会讨论这个缓存的刷新方式和时机。首先，让我们看看此服务提供的所有服务以及它们如何利用缓存来服务请求。我们从非常简单的\
    \ `isTradeExistsForInstrument` 方法开始，其他服务方法也会使用它。\n\n```java\n/**\n *\n * @param\
    \ instrument\n * @return boolean 指示是否存在具有给定交易工具的交易\n */\npublic boolean isTradeExistsForInstrument(TradeableInstrument<N>\
    \ instrument) {\n    lock.readLock().lock();\n    try {\n        for (K accountId\
    \ : this.tradesCache.keySet()) {\n            if (isTradeExistsForInstrument(instrument,\
    \ accountId)) {\n                return true;\n            }\n        }\n    }\
    \ finally {\n        lock.readLock().unlock();\n    }\n    return false;\n}\n\n\
    private boolean isTradeExistsForInstrument(TradeableInstrument<N> instrument,\
    \ K accountId) {\n    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>>\
    \ tradesForAccount =\n        this.tradesCache.get(accountId);\n    synchronized(tradesForAccount)\
    \ {\n        if (TradingUtils.isEmpty(tradesForAccount)) {\n            return\
    \ false;\n        }\n        return tradesForAccount.containsKey(instrument);\n\
    \    }\n}\n```\n\n此方法首先申请一个 `ReadLock` 以从缓存中读取数据。这包括遍历缓存中所有可用的账户 ID 键，并尝试确定底层映射中是否存在某个交易工具键。这个逻辑被封装在具有相同名称的私有重载方法中。有人可能会问，我们为什么要在以账户\
    \ ID 为键的缓存值（即底层映射）上进行同步？答案在于 `refreshTradesForAccount` 方法。\n\n```java\n/**\n *\
    \ 一种便捷方法，用于以线程安全的方式刷新账户的内部交易缓存。\n * 理想情况下，当交易平台通知交易事件时（例如，订单成交导致交易创建，\n * 或触及止损/止盈水平导致交易结算），应调用此方法。\n\
    \ *\n * @param accountId\n */\npublic void refreshTradesForAccount(K accountId)\
    \ {\n    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> tradeMap =\n\
    \        getTradesPerInstrumentForAccount(accountId);\n    Map<TradeableInstrument<N>,\
    \ Collection<Trade<M, N, K>>> oldTradeMap = tradesCache.get(accountId);\n    synchronized(oldTradeMap)\
    \ {\n        oldTradeMap.clear();\n        oldTradeMap.putAll(tradeMap);\n   \
    \ }\n}\n```\n\n总之，此方法允许该服务的外部客户端根据他们认为可能需要为给定账户 ID 刷新缓存的事件来刷新缓存。正如我们将在后续章节中讨论的，我们可以为各种平台事件（如\
    \ `OrderFilled`）注册处理器，例如，当一个挂单成交时，我们会收到一个回调。这些事件会导致平台上创建新的交易，这意味着我们的缓存需要更新并与平台同步。当需要刷新给定账户\
    \ ID 的底层值映射时，我们必须确保刷新代码在底层值映射上是 `synchronized` 的。这就是我们在这些方法中看到 `synchronized`\
    \ 代码块的原因，它保证了如果映射由于事件而被刷新，另一个读取器会等待，反之亦然，刷新过程会等待直到读取完成。\n\n我们接下来讨论的服务方法是 `getTradesForAccountAndInstrument`，顾名思义，它用于检索给定账户\
    \ ID 和交易工具的交易列表。\n\n```java\n/**\n * @param accountId\n * @param instrument\n\
    \ * @return 返回给定交易工具和账户的所有交易集合。\n * 如果没有找到，则返回空集合。\n */\npublic Collection<Trade<M,\
    \ N, K>> getTradesForAccountAndInstrument(K accountId,\n    TradeableInstrument<N>\
    \ instrument) {\n    Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> tradesForAccount\
    \ =\n        this.tradesCache.get(accountId);\n    synchronized(tradesForAccount)\
    \ {\n        if (!TradingUtils.isEmpty(tradesForAccount) &&\n            tradesForAccount.containsKey(instrument))\
    \ {\n            return Lists.newArrayList(tradesForAccount.get(instrument));\n\
    \        }\n    }\n    return Collections.emptyList();\n}\n```"
- fmt: "上面的服务方法代码相当直接。唯一值得一提的是使用`synchronized`块来访问给定账户ID的值映射。其余代码不言自明。下一个方法同样是`getTradesForAccount`，非常简单。此方法返回给定账户ID的所有交易。\n\
    \n```java\n/**\n *\n * @param accountId\n * @return a Collection of all Trades\
    \ for a given accountId. An empty\n * Collection is returned if none found.\n\
    \ */\npublic Collection<Trade<M, N, K>> getTradesForAccount(K accountId) {\n \
    \   Map<TradeableInstrument<N>, Collection<Trade<M, N, K>>> tradesForAccount =\n\
    \        this.tradesCache.get(accountId);\n    Collection<Trade<M, N, K>> trades\
    \ = Lists.newArrayList();\n    synchronized(tradesForAccount) {\n        if (TradingUtils.isEmpty(tradesForAccount))\
    \ {\n            return trades;\n        }\n        for (Collection<Trade<M, N,\
    \ K>> tradeLst: tradesForAccount.values()) {\n            trades.addAll(tradeLst);\n\
    \        }\n    }\n    return trades;\n}\n```\n\n相同原则适用于上述代码。我们获取给定账户ID下按工具键控的交易映射。在`synchronized`块中遍历映射的所有条目，将映射条目的值添加到集合中并返回。\n\
    \n我们接下来讨论的方法`getAllTrades`，返回每个账户的所有交易集合。代码涉及遍历所有账户ID（即缓存的键），对每个键调用`getTradesForAccount`方法，并将交易集合添加到一个已有集合中，该集合包含之前所有键（账户ID）获取的交易。\n\
    \n```java\n/**\n * @return a Collection of all trades that belong to all accounts\
    \ for the user\n */\npublic Collection<Trade<M, N, K>> getAllTrades() {\n    lock.readLock().lock();\n\
    \    try {\n        Collection<Trade<M, N, K>> trades = Lists.newArrayList();\n\
    \        for (K accId: this.tradesCache.keySet()) {\n            trades.addAll(getTradesForAccount(accId));\n\
    \        }\n        return trades;\n    } finally {\n        lock.readLock().unlock();\n\
    \    }\n}\n```\n\n我们可以利用这个内部缓存衍生出其他有用信息，例如：\n\n1. 给定货币的净持仓数量是多少？\n2. 查找所有对给定工具有交易的账户。\n\
    3. 总未平仓头寸的价值是多少？\n\n我们将尝试编写上述前两个功能，以演示如何利用此缓存快速获取各种问题的答案。第一个是`findNetPositionCountForCurrency`，它返回给定货币的未平仓净持仓数量。\n\
    \n```java\n/**\n *\n * @param currency\n * @return the net position for a given\
    \ currency considering all Trades for\n *         all Accounts. A negative value\
    \ suggests that the system has net\n *         short position for the given currency,\
    \ whilst a positive value\n *         suggests a net long position.\n * @see TradingUtils#getSign(String,\n\
    \ *      com.precioustech.fxtrading.TradingSignal, String)\n */\npublic int findNetPositionCountForCurrency(String\
    \ currency) {\n    int posCt = 0;\n    lock.readLock().lock();\n    try {\n  \
    \      for (K accountId: this.tradesCache.keySet()) {\n            posCt += findNetPositionCountForCurrency(currency,\
    \ accountId);\n        }\n    } finally {\n        lock.readLock().unlock();\n\
    \    }\n    return posCt;\n}\n\nprivate int findNetPositionCountForCurrency(String\
    \ currency, K accountId) {\n    Map<TradeableInstrument<N>, Collection<Trade<M,\
    \ N, K>>> tradeMap = this.tradesCache.get(accountId);\n    synchronized(tradeMap)\
    \ {\n        if (TradingUtils.isEmpty(tradeMap)) {\n            return 0;\n  \
    \      } else {\n            int positionCtr = 0;\n            for (Collection<Trade<M,\
    \ N, K>> trades: tradeMap.values()) {\n                for (Trade<M, N, K> tradeInfo:\
    \ trades) {\n                    positionCtr += TradingUtils.getSign(tradeInfo.getInstrument().getInstrument(),\n\
    \                        tradeInfo.getSide(), currency);\n                }\n\
    \            }\n            return positionCtr;\n        }\n    }\n}\n```\n\n\
    从上述代码可以看出，大部分工作由同名的内部重载方法完成。公共API方法只是遍历缓存中的账户ID键，并委托给私有方法。私有方法（我们很快会看到）返回给定货币和账户的净持仓数量。此结果被累加到持仓计数中，循环结束后作为最终答案从方法返回。现在回到内部私有方法`findNetPositionCountForCurrency`，代码看起来非常直接。对于每个账户ID键，我们获取按工具键控的交易映射。对于给定工具的每个交易列表中的交易，我们直接委托给多功能函数`TradingUtils.getSign`，它完成所有计算。你可能注意到我们直接将交易的货币对和所查询货币传递给该函数，甚至没有检查所查询货币是否属于该货币对。这由函数处理，对于这种情况返回0。现在我们讨论最后一个服务方法`findAllAccountsWithInstrumentTrades`，顾名思义，它返回所有对给定工具有未平仓头寸的账户ID列表。下面的代码非常直接，无需过多解释。该方法委托给`isTradeExistsForInstrument`，由它判断是否应将当前循环中的账户ID添加到要返回的集合中。\n\
    \n```java\n/**\n * @param instrument\n * @return a Collection of accountIds that\
    \ have at least 1 trade for the\n *         given instrument. An empty Collection\
    \ is returned if none satisfy\n *         this condition.\n */\npublic Collection<K>\
    \ findAllAccountsWithInstrumentTrades(TradeableInstrument<N> instrument) {\n \
    \   Collection<K> accountIds = Sets.newHashSet();\n    lock.readLock().lock();\n\
    \    try {\n        for (K accountId: this.tradesCache.keySet()) {\n         \
    \   if (isTradeExistsForInstrument(instrument, accountId)) {\n               \
    \ accountIds.add(accountId);\n            }\n        }\n    } finally {\n    \
    \    lock.readLock().unlock();\n    }\n    return accountIds;\n}\n```"
  raw: "The above service method code is fairly straightforward. The only thing worth\
    \ mentioning again is the use of *synchronized* block to access the value map\
    \ for the given account id. The rest of the code is self explanatory. The next\
    \ one and again a very simple one is ***getTradesForAccount***. This method returns\
    \ all trades for a given account id.\n\n```\n 1 /**\n 2  *\n 3  * @param accountId\n\
    \ 4  * @return a Collection of all Trades for a given accountId. An empty\n 5\
    \  * Collection is returned if none found.\n 6  */\n 7 public Collection < Trade\
    \ < M, N, K >> getTradesForAccount(K accountId) {\n 8  Map < TradeableInstrument\
    \ < N > , Collection < Trade < M, N, K >>> tradesForAccount =\n 9   this.tradesCache.get(accountId);\n\
    10  Collection < Trade < M, N, K >> trades = Lists.newArrayList();\n11  synchronized(tradesForAccount)\
    \ {\n12   if (TradingUtils.isEmpty(tradesForAccount)) {\n13    return trades;\n\
    14   }\n15   for (Collection < Trade < M, N, K >> tradeLst: tradesForAccount.values())\
    \ {\n16    trades.addAll(tradeLst);\n17   }\n18  }\n19  return trades;\n20 }\n\
    ```\n\nThe same principle applies as usual to the code above. We get the map of\
    \ trades keyed by instrument for a given account id. We loop for all entries in\
    \ the map in a *synchronized* block and add the values of the map entry in a collection\
    \ and return it back.\n\nThe next method we discuss, ***getAllTrades***, returns\
    \ a collection of all trades for each and every account. The code involves looping\
    \ through all account ids, i.e. the keys of our cache, and for each key call the\
    \ method `getTradesForAccount` and add the collection of trades to an existing\
    \ collection which contains all trades fetched for previous keys(account ids).\n\
    \n```\n 1 /**\n 2  * @return a Collection of all trades that belong to all accounts\
    \ for the user\n 3  */\n 4 public Collection < Trade < M, N, K >> getAllTrades()\
    \ {\n 5  lock.readLock().lock();\n 6  try {\n 7   Collection < Trade < M, N, K\
    \ >> trades = Lists.newArrayList();\n 8   for (K accId: this.tradesCache.keySet())\
    \ {\n 9    trades.addAll(getTradesForAccount(accId));\n10   }\n11   return trades;\n\
    12  } finally {\n13   lock.readLock().unlock();\n14  }\n15 }\n```\n\nWe can use\
    \ this internal cache and derive some other useful information such as\n\n1. \
    \ what is the net count of positions for a given currency?\n2.  find all accounts\
    \ which have trades for a given instrument.\n3.  what is the value of total open\
    \ positions?\n\nWe are going to try to code the first 2 above, to demonstrate\
    \ how quickly we can get answers to various questions, using this cache. The first\
    \ one is called ***findNetPositionCountForCurrency***, which returns the net count\
    \ of open positions for the given currency.\n\n```\n 1 /**\n 2  *\n 3  * @param\
    \ currency\n 4  * @return the net position for a given currency considering all\
    \ Trades for\n 5  *         all Accounts. A negative value suggests that the system\
    \ has net\n 6  *         short position for the given currency, whilst a positive\
    \ value\n 7  *         suggests a net long position.\n 8  * @see TradingUtils#getSign(String,\n\
    \ 9  *      com.precioustech.fxtrading.TradingSignal, String)\n10  */\n11 public\
    \ int findNetPositionCountForCurrency(String currency) {\n12  int posCt = 0;\n\
    13  lock.readLock().lock();\n14  try {\n15   for (K accountId: this.tradesCache.keySet())\
    \ {\n16    posCt += findNetPositionCountForCurrency(currency, accountId);\n17\
    \   }\n18  } finally {\n19   lock.readLock().unlock();\n20  }\n21  return posCt;\n\
    22 }\n\n24 private int findNetPositionCountForCurrency(String currency, K accountId)\
    \ {\n25  Map < TradeableInstrument < N > , Collection < Trade < M, N, K >>> tradeMap\
    \ = this.tradesCache.get(accountId);\n26  synchronized(tradeMap) {\n27   if (TradingUtils.isEmpty(tradeMap))\
    \ {\n28    return 0;\n29   } else {\n30    int positionCtr = 0;\n31    for (Collection\
    \ < Trade < M, N, K >> trades: tradeMap.values()) {\n32     for (Trade < M, N,\
    \ K > tradeInfo: trades) {\n33      positionCtr += TradingUtils.getSign(tradeInfo.getInstrument().getInstrument(),\n\
    34       tradeInfo.getSide(), currency);\n35     }\n36    }\n37    return positionCtr;\n\
    38   }\n39  }\n40 }\n```\n\nFrom the code above, we see that most of the work\
    \ is done in the internal overloaded method with the same name. The public api\
    \ method just loops through the account id keys in the cache and delegates to\
    \ the private method. The private method, as we will soon see, returns a net count\
    \ of positions for the given currency and account. This result is added to a running\
    \ count of positions, which after the loop terminates is returned from the method\
    \ as the final answer. Now, returning to the internal private method `findNetPositionCountForCurrency`,\
    \ the code looks extremely straight forward. For each of the account id key, we\
    \ get the map of trades keyed by the instrument. For each of the trade in the\
    \ list of trades for the given instrument, we just delegate to our versatile function\
    \ `TradingUtils.getSign`, which does all the computation. You would notice that\
    \ we just pass the instrument pair for the trade and the currency in question\
    \ directly to the function, without even checking if the currency in question\
    \ is part of the pair. This is taken care by the function, as it returns 0 for\
    \ such cases. Now we come to the last service method left to discuss, called ***findAllAccountsWithInstrumentTrades***,\
    \ which as the name suggests, returns a list of all account ids that has an open\
    \ position for the given instrument. The code below, which is extremely straight\
    \ forward, does not require much explanation. The method delegates to `isTradeExistsForInstrument`,\
    \ which ascertains if we should add the current account id in the loop to the\
    \ collection to be returned.\n\n```\n 1 /**\n 2  * @param instrument\n 3  * @return\
    \ a Collection of accountIds that have at least 1 trade for the\n 4  *       \
    \  given instrument. An empty Collection is returned if none satisfy\n 5  *  \
    \       this condition.\n 6  */\n 7 public Collection < K > findAllAccountsWithInstrumentTrades(TradeableInstrument\
    \ < N > instrument) {\n 8  Collection < K > accountIds = Sets.newHashSet();\n\
    \ 9  lock.readLock().lock();\n10  try {\n11   for (K accountId: this.tradesCache.keySet())\
    \ {\n12    if (isTradeExistsForInstrument(instrument, accountId)) {\n13     accountIds.add(accountId);\n\
    14    }\n15   }\n16  } finally {\n17   lock.readLock().unlock();\n18  }\n19  return\
    \ accountIds;\n20 }\n```"
