    `startMarketDataStreaming()` 方法首先调用 `stopMarketDataStreaming()`，目的是确保停止可能正在处理事件的现有线程，并启动一个新线程。这么做的原因在于，我们可能会遇到连接问题，有时需要重启数据流。假设在此之后没有现有线程消费市场数据事件，我们就可以创建一个新线程来开始消费事件。观察到
    `run()` 方法仅在条件 `line = br.readLine()) != null && serviceUp` 为 `false` 时退出。`serviceUp`
    的值在调用 `stopMarketDataStreaming()` 方法时被设为 `false`。如果为流式传输设置的 `BufferedReader` 停止传输事件并返回
    `null`，这也会导致 `while` 循环终止，从而使流线程终止。假设数据流正在为所需交易品种传输市场数据事件，我们应该会以非常高的频率看到类似下面这样的
    JSON 响应。


    ```json

    1 {"tick":{"instrument":"EUR_USD","time":"1401919213548144","bid":1.08479,"ask":1.08498}}

    2 {"tick":{"instrument":"GBP_AUD","time":"1401919213548822","bid":2.07979,"ask":1.08998}}

    3 {"heartbeat":{"time":"1401919213548226"}}

    4 {"tick":{"instrument":"EUR_USD","time":"1401919217201682","bid":1.08484,"ask":1.08502}}

    ```


    基本上，如果配置的交易品种数量很大（例如 > 10），那么每秒钟可能会收到多个报价，尤其是在伦敦时段。


    查看解析代码，我们注意到代码处理三种类型的负载，分别具有以下键：


    - `tick`

    - `heartbeat`

    - `disconnect`


    一个 `disconnect` 负载看起来像这样：


    ```json

    1 {"disconnect":{"code":60,"message":"Access Token connection limit exceeded:
    This connection will now be disconnected","moreInfo":"http:\/\/developer.oanda.com\/docs\/v1\/troubleshooting"}}

    ```


    对于 `tick` 负载，我们将 JSON 负载解析为 `bidPrice`、`askPrice`、`instrument` 和 `eventTime`，然后委托给
    `marketEventCallback.onMarketEvent()` 方法，该方法可以同步或异步处理报价。无论哪种情况，这个调用都必须非常快速，否则事件将开始排队，我们可能会在系统中引入不必要的延迟，这可能会使消费这些事件的策略偏离轨道，因为它无法反映最新的价格。


    `heartbeat` 和 `disconnect` 负载由父类处理，如前所述。


    ```java

    1 protected void handleHeartBeat(JSONObject streamEvent) {

    2  Long t = Long.parseLong(((JSONObject) streamEvent.get(heartbeat)).get(time)
    toString());

    3  heartBeatCallback.onHeartBeat(new HeartBeatPayLoad < DateTime > (new DateTime(TradingUtils.toMillisFromNanos(t)),
    heartBeatSourceId));

    5 }


    7 protected void handleDisconnect(String line) {

    8  serviceUp = false;

    9  LOG.warn(

    10   String.format("Disconnect message received for stream %s. PayLoad->%s",

    11    getHeartBeatSourceId(), line));

    12 }

    ```


    至此，我们结束了对上游事件处理和解析的讨论。正如我们将在后续章节中发现的那样，心跳对于保持数据流活动至关重要。我们必须重视这些心跳，并在它们停止时迅速采取行动（以重新启动这些数据流的形式），以免我们的策略做出错误决策。在下一节中，我们将讨论如何通过
    `marketEventCallback.onMarketEvent()` 在下游消费事件。


    ### 4.3 下游市场数据事件分发：`MarketEventCallback`


    为了理解市场数据事件在下游究竟发生了什么，我们需要研究 `MarketEventCallback` 接口的一个示例实现。


    ```java

    1 public class MarketEventHandlerImpl < T > implements MarketEventCallback < T
    > {

    3  private final EventBus eventBus;

    5  public MarketEventHandlerImpl(EventBus eventBus) {

    6   this.eventBus = eventBus;

    7  }

    9  @Override

    10  public void onMarketEvent(TradeableInstrument < T > instrument, double bid,

    11   double ask, DateTime eventDate) {

    12   MarketDataPayLoad < T > payload = new MarketDataPayLoad < T > (instrument,
    bid, ask, eventDate);

    13   eventBus.post(payload);

    14  }

    16 }

    ```


    `MarketEventHandlerImpl` 的实现再简单不过了。基本上，它将事件分发的职责委托给了 `Google EventBus`，根据其配置方式（同步或异步），它会将此事件分发到任何具有
    `@Subscribe` 注解且输入参数为 `MarketDataPayLoad<T>` 的 `void` 方法。例如，一个方法签名看起来像这样：


    ```java

    1 @Subscribe

    2 @AllowConcurrentEvents

    3 public void handleMarketDataEvent(MarketDataPayLoad<T> marketDataPayLoad) {

    4 ....

    5 ....

    6 }

    ```


    就是这样！！我们可以创建任意数量的此类订阅者，并通过事件总线接收带有 `MarketDataPayLoad` 负载的回调。我们将在后面的章节中看到，如何插入订阅者，例如基于交易策略的组件，这些组件是市场数据的主要消费者。

