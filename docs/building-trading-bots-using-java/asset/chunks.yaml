    :{\"time\":\"1401919217206269\"}}\n 9 {\"tick\":{\"instrument\":\"AUD_CAD\",\"\
    time\":\"1401919221292441\",\"bid\":1.0149,\"ask\":1.01505}}\n10 {\"tick\":{\"\
