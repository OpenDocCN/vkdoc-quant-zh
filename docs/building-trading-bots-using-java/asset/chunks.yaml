    \ }\n45   } else {\n46    TradingUtils.printErrorMsg(resp);\n47   }\n48  } catch\
    \ (Exception e) {\n49   LOG.error(e);\n50  } finally {\n51   TradingUtils.closeSilently(httpClient);\n\
