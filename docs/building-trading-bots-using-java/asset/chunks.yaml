    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xmlns:context=\"\
    http://www.springframework.org/schema/context\"\n    xmlns:util=\"http://www.springframework.org/schema/util\"\
    \n    xmlns:task=\"http://www.springframework.org/schema/task\"\n    xmlns:tx=\"\
    http://www.springframework.org/schema/tx\"\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
    \    http://www.springframework.org/schema/context/spring-context.xsd\n    http://www.springframework.org/schema/util\n\
    \    http://www.springframework.org/schema/util/spring-util.xsd\">\n    <context:annotation-config/>\n\
    \    <bean id=\"mailSender\" class=\"org.springframework.mail.javamail.JavaMailSenderImpl\"\
    >\n        <property name=\"host\" value=\"#{ systemProperties['mail.host'] }\"\
    />\n        <property name=\"port\" value=\"#{ systemProperties['mail.port'] }\"\
    />\n        <property name=\"username\" value=\"#{ systemProperties['mail.user']\
    \ }\"/>\n        <property name=\"password\" value=\"#{ systemProperties['mail.password']\
    \ }\"/>\n        <property name=\"javaMailProperties\">\n            <props>\n\
    \                <prop key=\"mail.transport.protocol\">smtps</prop>\n        \
    \        <prop key=\"mail.smtp.auth\">true</prop>\n                <prop key=\"\
    mail.smtp.starttls.enable\">true</prop>\n                <prop key=\"mail.smtp.socketFactory.class\"\
    >javax.net.ssl.SSLSocketFactory</prop>\n                <prop key=\"mail.debug\"\
    >false</prop>\n                <prop key=\"mail.smtp.socketFactory.fallback\"\
    >false</prop>\n            </props>\n        </property>\n    </bean>\n    <bean\
    \ id=\"tradingConfig\"\n            class=\"com.precioustech.fxtrading.tradingbot.TradingConfig\"\
    >\n        <property name=\"minReserveRatio\" value=\"0.1\"/>\n        <property\
    \ name=\"maxAllowedQuantity\" value=\"10\"/>\n        <property name=\"maxAllowedNetContracts\"\
    \ value=\"5\"/>\n        <property name=\"minAmountRequired\" value=\"10.0\"/>\n\
    \        <property name=\"mailTo\" value=\"#{ systemProperties['mail.to'] }\"\
    />\n        <property name=\"max10yrWmaOffset\" value=\"0.1\"/>\n        <property\
    \ name=\"fadeTheMoveJumpReqdToTrade\" value=\"45\"/>\n        <property name=\"\
    fadeTheMoveDistanceToTrade\" value=\"25\"/>\n        <property name=\"fadeTheMovePipsDesired\"\
    \ value=\"10\"/>\n        <property name=\"fadeTheMovePriceExpiry\" value=\"15\"\
    />\n    </bean>\n    <bean id=\"eventEmailNotifier\"\n            class=\"com.precioustech.fxtrading.tradingbot.events.notification.email.EventEmailNotifier\"\
    />\n    <bean id=\"tradeEventHandler\"\n            class=\"com.precioustech.fxtrading.oanda.restapi.events.TradeEventHandler\"\
    >\n        <constructor-arg index=\"0\">\n            <null/>\n        </constructor-arg>\n\
    \    </bean>\n    <util:map id=\"eventEmailContentGeneratorMap\" key-type=\"com.precioustech.fxtrading.events.Event\"\
    >\n        <entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).TRADE_CLOSE}\"\
    \n                value-ref=\"tradeEventHandler\"/>\n        <entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).STOP_LOSS_FILLED}\"\
    \n                value-ref=\"tradeEventHandler\"/>\n        <entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).TAKE_PROFIT_FILLED}\"\
    \n                value-ref=\"tradeEventHandler\"/>\n    </util:map>\n</beans>\n\
    ```\n\n由于所有电子邮件账户凭证均通过系统属性传递，接下来让我们看一下启动配置。\n\n![启动配置](img/00081.jpeg) 启动配置\n\n\
    程序成功运行后，我们会看到测试程序中所用的值对应的邮件出现在 `mail.to` 地址中。\n\n![邮件通知到达收件箱](img/00082.jpeg)\
    \ 邮件通知到达收件箱\n\n1.  http://fxtrade.oanda.com/help/policies/margin-rules↩︎\n\n##\
    \ 12. 配置、部署与运行机器人\n\n现在我们已经准备好将机器人投入使用。在按下按钮之前，剩下的工作就是配置和部署。机器人的配置包括以下内容：\n\n\
    *   核心服务与 API 的 Spring 配置，即 `tradingbot-app.xml`。\n*   核心 Spring 配置的属性文件，即 `tradingbot.properties`。\n\
    *   运行时提供程序（本例中为 OANDA）的 Spring 配置，即 `tradingbot-oanda.xml`。\n*   运行时提供程序 Spring\
    \ 配置的属性文件，即 `tradingbot-oanda.properties`。\n\n与 jar 文件类似，我们也有一个单独的运行时提供程序配置文件。正如我们将在本章后面看到的，提供程序配置文件的名称作为程序参数传入，以便在运行时轻松选择提供程序。闲话少说，让我们直接进入机器人的配置环节。\n\
    \n### 12.1 交易机器人的配置\n\n我们首先在项目 `tradingbot-app` 的 `src/main/resources` 文件夹中创建主配置文件，该文件夹会被自动包含在构建中，并最终打包到\
    \ `tradingbot-app.jar` 文件中。该文件名为 `tradingbot-app.xml`。我们还创建了属性文件 `tradingbot.properties`，其中包含了该\
    \ Spring 配置文件中引用的各种占位符的值。\n\n我们还在配置中使用了酷炫的 `SpEL`^(1)，随着本章内容的深入，其使用原因将逐渐明朗。"
- fmt: "### 12.1.1 Core Beans Configuration\n\nIn this section we configure all the\
    \ core beans that are part of the core api except the services which we will configure\
    \ later. These beans include email, queues, trading config etc. which are central\
    \ to the functioning of the bot.\n\nSince all our dependency beans are `@Autowired`,\
    \ we switch on annotation processing by including `<context:annotation-config/>`\
    \ in the configuration file. This will ensure that all the dependencies which\
    \ we have injected via `@Autowired` will be processed correctly. We also switch\
    \ on property files processing by including the following in the configuration\
    \ file and also specify where to find the properties file:\n\n```\n<context:property-placeholder\
    \ location=\"classpath:tradingbot.properties\" ignore-unresolvable=\"true\"/>\n\
    ```\n\nThe `tradingbot.properties` has the following properties. We have put in\
    \ some sample values to demonstrate how they look like.\n\n```\nmail.to=tradingbot@gmail.com\n\
    mail.host=smtp.gmail.com\nmail.port=465\nmail.user=foobar@gmail.com\nmail.password=foobar123\n\
    twitter.consumerKey=veJerryUYUDHUliDXjlC6o4KR\ntwitter.consumerSecret=L5iFptFbLKMyUoH8NB3yAodEe0EQMukriUt3mnNICEKyNp20Ih\n\
    twitter.accessToken=0123456789-LISP3YO0mLgDOSw44vgdV0Rr7313ZyPrAt0X3jU\ntwitter.accessTokenSecret=5IrbOYUlG0Ld7UPeG6GPxFjVNWHREj4MN2TaoTL2kmVTT\n\
    ```\n\nWe have already discussed the Twitter integration properties in Chapter\
    \ 8. The `mail` properties are used to configure the `JavaMailSender` bean in\
    \ the Spring configuration except `mail.to`, which actually is the TO address\
    \ of the user who gets all the notifications generated by the bot.\n\nWe now turn\
    \ our attention to the configuration of the core beans which make up the bot.\
    \ The first being, configuration of `TradingConfig` class. This class must be\
    \ configured correctly for other services to work. We must also be careful to\
    \ configure some of the values as they might affect the orders that are placed.\
    \ For e.g. the `maxAllowedQuantity` is the maximum size of an order placed. In\
    \ our case below it is just `5`, but changing this value to say `50000` will place\
    \ a huge order, which might lead to margin call if the trade goes in the opposite\
    \ direction.\n\nLet us briefly discuss each of the other config params in the\
    \ `TradingConfig` class:\n\n- `minReserveRatio` is the ratio of amount available\
    \ to trade to the total amount in the account. A value of `0.1` stipulates that\
    \ if this amount falls below 10%, the bot stops putting in new orders.\n- `maxAllowedNetContracts`\
    \ is the maximum net the bot will go long or short on a given currency. This setting\
    \ was inspired by the event on Jan 15, 2015, when SNB[^2] unexpectedly ended the\
    \ CHF peg versus EUR of 1.2 and CHF soured by nearly 30%. Anyone who was massively\
    \ short CHF ended up losing huge amounts of money.\n- `minAmountRequired` is the\
    \ minimum balance in the designated currency of the account required to allow\
    \ the bot to place orders. If the balance falls below this threshold, no further\
    \ order placement is possible.\n- `max10yrWmaOffset` defines the safe zone of\
    \ a currency pair. We discussed it in detail while discussing `PreOrderValidationService`.\n\
    - `fadeTheMovePriceExpiry` is the time in minutes, the observation interval, for\
    \ the `FadeTheMove` strategy.\n- `fadeTheMoveJumpReqdToTrade` is the net jump\
    \ in pips required during the `fadeTheMovePriceExpiry` that will create a scenario\
    \ to place limit orders in the opposite direction of the market move.\n- `fadeTheMoveDistanceToTrade`\
    \ is the distance from the current price in pips when the limit order placed by\
    \ the `FadeTheMoveStrategy` will be filled.\n- `fadeTheMovePipsDesired` is the\
    \ profit desired in pips for the `FadeTheMove` strategy.\n\n```\n<bean id=\"tradingConfig\"\
    \n        class=\"com.precioustech.fxtrading.tradingbot.TradingConfig\">\n   \
    \ <property name=\"minReserveRatio\" value=\"0.1\"/>\n    <property name=\"maxAllowedQuantity\"\
    \ value=\"10\"/>\n    <property name=\"maxAllowedNetContracts\" value=\"5\"/>\n\
    \    <property name=\"minAmountRequired\" value=\"10.0\"/>\n    <property name=\"\
    mailTo\" value=\"${mail.to}\"/>\n    <property name=\"max10yrWmaOffset\" value=\"\
    0.1\"/>\n    <property name=\"fadeTheMoveJumpReqdToTrade\" value=\"45\"/>\n  \
    \  <property name=\"fadeTheMoveDistanceToTrade\" value=\"25\"/>\n    <property\
    \ name=\"fadeTheMovePipsDesired\" value=\"10\"/>\n    <property name=\"fadeTheMovePriceExpiry\"\
    \ value=\"15\"/>\n</bean>\n```\n\nNext we configure the Google `EventBus` and\
    \ all the callback handlers that use the `EventBus` to disseminate the event payloads.\
    \ We also configure the bean post processor `FindEventBusSubscribers` which we\
    \ discussed in the first chapter, that finds all classes with methods annotated\
    \ by `@Subscriber` and registers them with the `EventBus` automatically.\n\n```\n\
    <bean id=\"eventBus\" class=\"com.google.common.eventbus.EventBus\"/>\n<bean id=\"\
    findEventBusSubscribers\"\n    class=\"com.precioustech.fxtrading.tradingbot.spring.FindEventBusSubscribers\"\
    />\n<bean id=\"eventCallback\"\n    class=\"com.precioustech.fxtrading.events.EventCallbackImpl\"\
    >\n    <constructor-arg index=\"0\" ref=\"eventBus\"/>\n</bean>\n<bean id=\"heartBeatCallback\"\
    \n    class=\"com.precioustech.fxtrading.heartbeats.HeartBeatCallbackImpl\">\n\
    \    <constructor-arg index=\"0\" ref=\"eventBus\"/>\n</bean>\n<bean id=\"marketEventCallback\"\
    \n    class=\"com.precioustech.fxtrading.marketdata.MarketEventHandlerImpl\">\n\
    \    <constructor-arg index=\"0\" ref=\"eventBus\"/>\n</bean>\n```\n\nFor the\
    \ `JavaMailSender` bean, the configuration looks like:\n\n```\n<bean id=\"mailSender\"\
    \ class=\"org.springframework.mail.javamail.JavaMailSenderImpl\">\n    <property\
    \ name=\"host\" value=\"${mail.host}\"/>\n    <property name=\"port\" value=\"\
    ${mail.port}\"/>\n    <property name=\"username\" value=\"${mail.user}\"/>\n \
    \   <property name=\"password\" value=\"${mail.password}\"/>\n    <property name=\"\
    javaMailProperties\">\n        <props>\n            <prop key=\"mail.transport.protocol\"\
    >smtps</prop>\n            <prop key=\"mail.smtp.auth\">true</prop>\n        \
    \    <prop key=\"mail.smtp.starttls.enable\">true</prop>\n            <prop key=\"\
    mail.smtp.socketFactory.class\">javax.net.ssl.SSLSocketFactory</prop>\n      \
    \      <prop key=\"mail.debug\">false</prop>\n            <prop key=\"mail.smtp.socketFactory.fallback\"\
    >false</prop>\n        </props>\n    </property>\n</bean>\n```\n\nThe placeholders\
    \ for this bean are defined in the `tradingbot.properties` file. A related service\
    \ that uses `JavaMailSender` bean to send out notifications is configured as:\n\
    \n```\n<bean id=\"eventEmailNotifier\"\n    class=\"com.precioustech.fxtrading.tradingbot.events.notification.email.EventEmailNotifier\"\
    />\n```\n\nThe `orderQueue` which is used to place orders has a very simple configuration.\n\
    \n```\n<bean id=\"orderQueue\" class=\"java.util.concurrent.LinkedBlockingQueue\"\
    />\n```\n\nWe use the inbuilt Spring Task Scheduler[^sprsched] to schedule our\
    \ jobs. An example job being the polling of new tweets for our configured Twitter\
    \ accounts.\n\n```\n<task:scheduler id=\"taskScheduler\" pool-size=\"5\"/>\n```"
