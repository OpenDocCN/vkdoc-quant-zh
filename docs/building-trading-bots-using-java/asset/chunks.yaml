    \         \"CHF\": {\n26           \"bid\": -0.013,\n27           \"ask\": 0.003\n\
    28         }\n29       }\n30     }\n31   ]\n32 }\n```\n\nAs usual, we begin our\
    \ code discussion with listing all JSON keys that will be used:\n\n```\n1 import\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.ask;\n2 import\
