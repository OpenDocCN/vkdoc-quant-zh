    4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.interestRate;\n\
    ```\n\nSince OANDA currently does not have an internal identifier for an instrument,\
    \ we use the instrument name as the identifier. So replacing `T` param type with\
