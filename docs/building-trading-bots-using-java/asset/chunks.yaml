  trans: "\n### 6.4 一个简单的 `OrderInfoService`\n\n遵循将提供者方法封装在服务背后的主题，我们需要编写一个 `OrderInfoService`，它封装了\
    \ `OrderManagementProvider` 的所有只读方法。这个服务相当直观，代码如下：\n\n```\n 1 public class OrderInfoService\
    \ < M, N, K > {\n\n 3  private final OrderManagementProvider < M,\n 4  N,\n 5\
    \  K > orderManagementProvider;\n\n 7  public OrderInfoService(OrderManagementProvider\
    \ < M, N, K > orderManagementProvider) {\n 8   this.orderManagementProvider =\
    \ orderManagementProvider;\n 9  }\n\n11  public Collection < Order < N,\n12  M\
    \ >> allPendingOrders() {\n13   return this.orderManagementProvider.allPendingOrders();\n\
    14  }\n\n16  public Collection < Order < N,\n17  M >> pendingOrdersForAccount(K\
    \ accountId) {\n18   return this.orderManagementProvider.pendingOrdersForAccount(accountId);\n\
    19  }\n\n21  public Collection < Order < N,\n22  M >>\n23  pendingOrdersForInstrument(TradeableInstrument\
    \ < N > instrument) {\n24   return this.orderManagementProvider.pendingOrdersForInstrument(instrument);\n\
    25  }\n\n27  public Order < N,\n28  M > pendingOrderForAccount(M orderId, K accountId)\
    \ {\n29   return this.orderManagementProvider.pendingOrderForAccount(orderId,\
    \ accountId);\n30  }\n\n32  public int findNetPositionCountForCurrency(String\
    \ currency) {\n33   Collection < Order < N, M >> allOrders = allPendingOrders();\n\
    34   int positionCount = 0;\n35   for (Order < N, M > order: allOrders) {\n36\
    \    positionCount +=\n37     TradingUtils.getSign(order.getInstrument().getInstrument(),\n\
    38      order.getSide(), currency);\n39   }\n40   return positionCount;\n41  }\n\
    42 }\n```\n\n除了 `findNetPositionCountForCurrency` 方法之外，所有方法都委托给底层的 `OrderManagementProvider`\
    \ 来获取所需信息。因此，剩下需要讨论的就是 `findNetPositionCountForCurrency` 方法。仔细查看该方法代码，它会请求所有账户中的全部挂单，并通过查看\
    \ `TradingUtils.getSign` 方法返回的符号（-1 或 +1）来计算某个货币的净头寸。提醒一下，如果我们卖出给定货币，该方法返回 -1；如果买入则返回\
    \ +1。例如，如果我们通过下达限价单卖出 `EUR_CHF` 货币对，传入货币 `EUR` 会返回 -1，而传入 `CHF` 则返回 +1。\n\n`findNetPositionCountForCurrency`\
    \ 方法的用途可能不是一目了然。然而，从风险管理的角度来看，了解我们在某种货币上是多头还是空头以及仓位大小是相当有用的，我们将在后续章节中讨论这一点。\n\n\
    ### 6.5 执行前验证订单：`PreOrderValidationService`\n\n在讨论封装订单执行、修改和删除部分的服务之前，我们先讨论一个重要的服务，它负责执行一些订单执行前的检查，只有这些检查通过，订单才会被执行。同样，这纯粹是从风险管理的角度出发，如果确实需要，也可以绕过。我们将在后续章节讨论为什么拥有风险管理控制措施非常重要，尤其是对于高杠杆账户。不过，为了我们的讨论，我提出了一些必须执行的规则或检查，以便为订单执行开绿灯。这套检查可能并非适用于所有情况，但关键在于，在下单之前，我们必须事先进行一些尽职调查。我提出的规则如下：\n\
    \n1.  某种货币的净多头或净空头仓位不得超过给定水平。也就是说，例如对于 `AUD`，我们既可以持有空头头寸也可以持有多头头寸，但如果存在净多头或净空头头寸，其数量不得超过一个可配置的数字，比如\
    \ 4。因此，如果我们已经持有 4 笔未平仓交易，例如做多 `AUD_USD`、做多 `AUD_CHF`、做空 `GBP_AUD`、做空 `EUR_AUD`，这意味着我们在\
    \ `AUD` 上的仓位已经很重，任何进一步做多 `AUD` 的订单都必须被拒绝。例如，如果一个策略建议下达市价单做多 `AUD_JPY`，该订单必须被拒绝，因为我们的要求是不超过最大多头或空头仓位水平，在我们的例子中为\
    \ 4。\n2.  如果某个货币对的 10 年加权移动平均线 (`WMA`) 在其历史高点或低点的 `x%` 范围内，则不交易该货币对。这需要一点解释。假设\
    \ `EUR_USD` 的 10 年 `WMA` 是 1.3，而当前即期价格是 1.08。此时我们会非常不情愿下做空 `EUR_USD` 的订单。因为根据我们的规则，我们只能做空至\
    \ 10 年 `WMA` 的 10%（假设 `x=10`）以内。因此，从 1.3 中减去 1.3 的 10% 得到 1.17。所以，如果价格跌破当前水平，我们的检查将不允许下做空\
    \ `EUR_USD` 的订单。类似地，如果当前价格是 1.45（大于 1.3 + 1.3 的 10% = 1.43），我们不会做多 `EUR_USD`。\n\
    3.  如果某个货币对的现有交易已经活跃，我们不想下达订单。这是为了确保我们不会通过下达相反方向的订单意外平仓/减少现有交易头寸，或者为了加倍仓位而增加现有头寸。\n\
    \n当然，这些规则可能不完全合理，甚至可能与你成功的策略建议相悖，但关键在于要有一些预验证规则，以免不必要地增加投资组合的风险。当然，你完全可以完全摒弃这些规则并编写自己的规则，但只要拥有一套有意义的规则/检查集，从长远来看它们总会对你有帮助。\n\
    \n现在，让我们直接进入代码，这些代码尝试在服务中对这些规则进行编程。我们首先定义构造函数，它接受该服务的所有依赖项。\n\n```\n 1 public\
    \ class PreOrderValidationService < M, N, K > {\n 2   private final TradeInfoService\
    \ < M,\n 3   N,\n 4   K > tradeInfoService;\n 5   private final MovingAverageCalculationService\
    \ < N >\n 6   movingAverageCalculationService;\n 7   private final BaseTradingConfig\
    \ baseTradingConfig;\n 8   private final OrderInfoService < M,\n 9   N,\n10  \
    \ K > orderInfoService;\n11   static final int TEN_YRS_IN_MTHS = 120;\n```\n"
- fmt: "```java\n13   public PreOrderValidationService(TradeInfoService < M, N, K\
    \ > tradeInfoService,\n14    MovingAverageCalculationService < N > movingAverageCalculationService,\n\
    15    BaseTradingConfig baseTradingConfig,\n16    OrderInfoService < M, N, K >\
    \ orderInfoService) {\n17    this.tradeInfoService = tradeInfoService;\n18   \
    \ this.movingAverageCalculationService = movingAverageCalculationService;\n19\
    \    this.baseTradingConfig = baseTradingConfig;\n20    this.orderInfoService\
    \ = orderInfoService;\n21   }\n```\n\n`TradeInfoService` 是本章后续会介绍的内容。用于获取各种交易相关信息的方法在当前上下文中不言自明，但将在后续详细阐述。其余内容我相信可以从我们对验证规则的讨论中自然推导出来。`MovingAverageCalculationService`\
    \ 用于计算 WMA，`BaseTradingConfig` 用于各种配置参数（如货币允许的最大净头寸），`OrderInfoService` 用于获取待处理订单等信息。\n\
    \n现在我们来看第一个验证检查的服务方法代码：\n\n```java\n 1 public boolean checkLimitsForCcy(TradeableInstrument\
    \ < N > instrument, TradingSignal signal) {\n 2  String currencies[] = TradingUtils.splitInstrumentPair(instrument.getInstrument());\n\
    \ 3  for (String currency: currencies) {\n 4   int positionCount =\n 5    this.tradeInfoService.findNetPositionCountForCurrency(currency)\
    \ +\n 6    this.orderInfoService.findNetPositionCountForCurrency(currency);\n\
    \ 7   int sign = TradingUtils.getSign(instrument.getInstrument(), signal,\n 8\
    \    currency);\n 9   int newPositionCount = positionCount + sign;\n10   if (Math.abs(newPositionCount)\
    \ >\n11    this.baseTradingConfig.getMaxAllowedNetContracts() && Integer.signum(sign)\
    \ == Integer.signum(positionCount)) {\n12    LOG.warn(String.format(\n13     \"\
    Cannot place trade %s because max limit exceeded. max allowed=%d and \" + \"current\
    \ net positions=%d for currency %s\"\\\n14 , instrument,\n15     this.baseTradingConfig.getMaxAllowedNetContracts(),\n\
    16     newPositionCount, currency));\n17    return false;\n18   }\n19  }\n20 \
    \ return true;\n21 }\n```\n\n该方法在检查失败时返回 `false`，否则返回 `true`。该方法首先将货币对拆分为单个货币，然后针对每个货币获取当前状态（即所有未平仓交易头寸和待处理订单的总和）。我们称之为当前头寸计数。例如，如果我们有\
