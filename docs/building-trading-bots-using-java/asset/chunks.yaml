    \ ![Sample Output](images/00061.jpeg) Sample Output\n\n## 7. Event Streaming :\
    \ Trade/Order/Account Events\n\nEvents are generated on a trading platform when\
    \ a state of an Order/Trade/Account or any other entity changes on the platform.\
    \ Here are some examples which could trigger an event:\n\n*   LIMIT Order filled\n\
    *   Trade stopped out\n*   Margin closeout of account\n\nWe will discuss many\
    \ such state changing events later in the chapter and how we handle them but will\
    \ focus on events which effect only Trades/Orders and Accounts.\n\nAs discussed\
    \ in the introduction of the book, we need to create an infinite event loop, in\
    \ order to receive the state changes that happen on the platform. The platform,\
    \ via the event stream, just like market data stream, pushes these events and\
    \ we need to adopt the same paradigm to process these events. However there is\
    \ one stark difference. The market data stream (excluding heartbeats) only has\
    \ tick events which conform to a standard payload. However, with the event stream,\
    \ we could have differing payloads depending on what state change happened on\
    \ what entity. For e.g. when a limit Order is filled on the OANDA platform^([1](#part0054.html#fn-evtStream)),\
    \ a response like one below is normally sent down the event stream.\n\n```json\n\
    \ 1 {\n 2   \"transaction\": {\n 3     \"id\": 10002,\n 4     \"accountId\": 123456,\n\
    \ 5     \"time\": \"1443968041000000\",\n 6     \"type\": \"ORDER_FILLED\",\n\
    \ 7     \"instrument\": \"EUR_USD\",\n 8     \"units\": 10,\n 9     \"side\":\
    \ \"sell\",\n10     \"price\": 1,\n11     \"pl\": 1.234,\n12     \"interest\"\
    : 0.034,\n13     \"accountBalance\": 10000,\n14     \"orderId\": 0,\n15     \"\
    tradeReduced\": {\n16       \"id\": 54321,\n17       \"units\": 10,\n18      \
    \ \"pl\": 1.234,\n19       \"interest\": 0.034\n20     }\n21   }\n22 }\n```\n\n\
    On the other hand, when a trade is stopped out, we could see the following response:\n\
    \n```json\n 1 {\n 2   \"transaction\": {\n 3     \"id\": 10004,\n 4     \"accountId\"\
    : 234567,\n 5     \"time\": \"1443968081000000\",\n 6     \"type\": \"STOP_LOSS_FILLED\"\
    ,\n 7     \"tradeId\": 1782812741,\n 8     \"instrument\": \"USD_SGD\",\n 9  \
    \   \"units\": 3000,\n10     \"side\": \"sell\",\n11     \"price\": 1.39101,\n\
    12     \"pl\": 3.3039,\n13     \"interest\": -0.0123,\n14     \"accountBalance\"\
    : 5915.8745\n15   }\n16 }\n```\n\nLooking at these varied responses, we need to\
    \ create event handlers for each of the event types that we are interested to\
    \ handle. This is where, we get the chance to exploit the polymorphic behaviour\
    \ of `EventBus`, which would try to deliver the message to an exact type if found\
    \ and then proceed to its supertypes.\n\nLets summarise the different important\
    \ events that we might see being callbacked for. This is by no means a full list\
    \ but should be the ones that we see often on various platforms and would discuss\
    \ in greater details later:\n\n1.  Order\n    *   Create New Market Order\n  \
    \  *   Create New Limit Order\n    *   Order Update\n    *   Order Cancelled\n\
    \    *   Order Filled\n\n2.  Trade\n    *   Take Profit Filled\n    *   Stop Loss\
    \ Filled\n    *   Trade Update\n    *   Trade Closed\n\n3.  Account\n    *   Margin\
    \ closeout\n    *   Financing (Interest paid or received)\n\n### 7.1 Streaming\
    \ Event interface\n\nOur first step is to define an interface that establishes\
    \ the event loop with the platform. This is exactly similar in concept as market\
    \ data streaming interface. After establishing the event loop, all the events\
    \ are then delegated to the appropriate event handlers via the `EventCallback`\
    \ that we shall discuss soon. First lets quickly have a look at this interface:\n\
    \n```java\n 1 /**\n 2  * A service that provides trade/order/account related events\
    \ streaming.\n 3  * Normally the implementation would create a dedicated connection\
    \ to the\n 4  * platform or register callback listener(s) to receive events. It\
    \ is\n 5  * recommended that the service delegate the handling of events to specific\n\
    \ 6  * handlers which can parse and make sense of the different plethora of events\n\
    \ 7  * received.\n 8  *\n 9  *\n10  */\n11 public interface {\n\n13  /**\n14 \
    \  * Start the streaming service which would ideally create a dedicated\n15  \
    \ * connection to the platform or callback listener(s). Ideally multiple\n16 \
    \  * connections requesting the same event types should not be created.\n17  \
    \ */\n18  void startEventsStreaming();\n\n20  /**\n21   * Stop the events streaming\
    \ services and dispose any resources/connections\n22   * in a suitable manner\
    \ such that no resource leaks are created.\n23   */\n24  void stopEventsStreaming();\n\
    25 }\n```\n\nThe definition of `EventCallback` that must be used in tandem to\
    \ disseminate the events is:\n\n```java\n1 public interface EventCallback<T> {\n\
    \n3  void onEvent(EventPayLoad<T> eventPayLoad);\n4 }\n```\n\nThe two interfaces\
    \ above have similar design objectives as that of the market data ones. The real\
    \ differences emerge in the downstream dissemination of these different payloads\
    \ which we will soon discover when the `EventBus` enters the scene. But before\
    \ that, lets quickly look at the OANDA implementation for `EventsStreamingService`."
