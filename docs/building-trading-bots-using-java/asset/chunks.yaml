    \ OandaTestConstants.accountId);\n45  assertNotNull(orderId);\n46  verify(spy,\
    \ times(1))\n47   .createPostCommand(orderLimit, OandaTestConstants.accountId);\n\
    48  verify(orderLimit, times(1)).getInstrument();\n49  verify(orderLimit, times(3)).getType();\n\
    50  verify(orderLimit, times(1)).getTakeProfit();\n51  verify(orderLimit, times(1)).getStopLoss();\n\
    52  verify(orderLimit, times(2)).getPrice();\n53  verify(orderLimit, times(1)).getUnits();\n\
    54  verify(orderLimit, times(1)).getSide();\n55 }\n\n57 private OandaOrderManagementProvider\
    \ doMockStuff(String fname,\n58  OandaOrderManagementProvider service)\n59 throws\
    \ Exception {\n60  OandaOrderManagementProvider spy = spy(service);\n61  CloseableHttpClient\
    \ mockHttpClient = mock(CloseableHttpClient.class);\n62  when(spy.getHttpClient()).thenReturn(mockHttpClient);\n\
    63  OandaTestUtils.mockHttpInteraction(fname, mockHttpClient);\n64  return spy;\n\
    65 }\n```\n\nIn the test case above, we test both a new market and limit order,\
    \ however the mechanics is exactly the same. We create a mock *Order* pojo and\
    \ to create a successful *HttpPost* command, all the getters must be invoked on\
    \ this mock object that defines a new order. The *verify* above does exactly that,\
    \ verify the getter interactions performed inside the *createPostCommand*."
  trans: "\n### 13.1.3 多才多艺的 `verify`\n\n到目前为止，我们主要关注了交互中的 `HttpGet` 方面，即从文件中读取数据相当简单。然而，要模拟反向操作，例如向文件插入（`HttpPost`）一行、修改一行（`HttpPatch`）以及删除一行（`HttpDelete`），即使不是不可能，也可能不那么容易。那么，我们如何对这些交互进行单元测试呢？Mockito\
    \ 的 `verify` 为我们提供了解决方案。该命令有助于验证方法的交互，并且可以选择性地验证该方法被调用了多少次。让我们更详细地探讨我们的用例。\n\n\
    要为 OANDA 平台下新订单，我们在高层次上需要执行以下操作：\n\n- 将完整填充的 `Order` POJO 连同 `accountId` 一起传递给\
    \ `OandaOrderManagementProvider` Bean 的 `placeOrder` 方法。\n- `placeOrder` 方法内部委托给\
    \ `createPostCommand` 方法，该方法创建一个新的 `HttpPost` 命令实例，并利用 `Order` POJO 的 getter 方法，在此\
    \ post 命令上填充 `NameValuePair` 列表。一旦完全填充，该命令即可被提交以创建订单。\n- 当 `HttpPost` 成功后，我们会收到一个响应。如果命令成功，该响应是一个包含新订单详细信息的\
    \ JSON 负载。\n\n由于在单元测试期间，我们不想向 OANDA 平台发布真实订单，而只是想验证是否创建了一个有效的 `HttpPost` 命令，因此\
    \ `verify` 可以为我们验证这一点。由于创建一个有效的 `HttpPost` 命令基本上会调用 `Order` POJO 的所有 getter 方法，因此\
    \ `verify` 报告每个 getter 交互一次（某些会更多次）这一事实验证了我们的代码。类似地，假设已成功提交了一个有效命令，我们必须随后接收包含新订单详细信息的\
    \ JSON 负载，然后必须从文件中读取该负载，这作为 `mockHttpInteraction` 的一部分，我们之前已经讨论过。\n\n让我们看一下测试此用例的代码：\n\
    \n```java\n 1 @Test\n 2 @SuppressWarnings(\"unchecked\")\n 3 public void createOrderTest()\
    \ throws Exception {\n 4  OandaOrderManagementProvider service =\n 5   new OandaOrderManagementProvider(OandaTestConstants.url,\n\
    \ 6    OandaTestConstants.accessToken, null);\n 7  TradeableInstrument < String\
    \ > eurjpy = new TradeableInstrument < String > (\"EUR_JPY\");\n\n 9  OandaOrderManagementProvider\
    \ spy =\n10   doMockStuff(\"src/test/resources/newOrder.txt\", service);\n11 \
    \ Order < String, Long > orderMarket = mock(Order.class);\n12  when(orderMarket.getInstrument()).thenReturn(eurjpy);\n\
    13  when(orderMarket.getSide()).thenReturn(TradingSignal.SHORT);\n14  when(orderMarket.getType()).thenReturn(OrderType.MARKET);\n\
    15  when(orderMarket.getUnits()).thenReturn(150 l);\n16  when(orderMarket.getTakeProfit()).thenReturn(132.65);\n\
    17  when(orderMarket.getStopLoss()).thenReturn(136.00);\n18  // when(order.getPrice()).thenReturn(133.75);\n\
    19  Long orderId =\n20   spy.placeOrder(orderMarket, OandaTestConstants.accountId);\n\
    21  assertNotNull(orderId);\n22  verify(spy, times(1))\n23   .createPostCommand(orderMarket,\
    \ OandaTestConstants.accountId);\n24  verify(orderMarket, times(1)).getInstrument();\n\
    25  verify(orderMarket, times(3)).getType();\n26  verify(orderMarket, times(1)).getTakeProfit();\n\
    27  verify(orderMarket, times(1)).getStopLoss();\n28  // verify(order, times(2)).getPrice();\n\
    29  verify(orderMarket, times(1)).getUnits();\n30  verify(orderMarket, times(1)).getSide();\n\
    \n32  spy = doMockStuff(\"src/test/resources/newOrderLimit.txt\", service);\n\
    33  Order < String, Long > orderLimit = mock(Order.class);\n34  TradeableInstrument\
    \ < String > eurusd =\n35   new TradeableInstrument < String > (\"EUR_USD\");\n\
    36  when(orderLimit.getInstrument()).thenReturn(eurusd);\n37  when(orderLimit.getSide()).thenReturn(TradingSignal.SHORT);\n\
    38  when(orderLimit.getType()).thenReturn(OrderType.LIMIT);\n39  when(orderLimit.getUnits()).thenReturn(10\
    \ l);\n40  when(orderLimit.getTakeProfit()).thenReturn(1.09);\n41  when(orderLimit.getStopLoss()).thenReturn(0.0);\n\
    42  when(orderLimit.getPrice()).thenReturn(1.10);\n\n44  orderId = spy.placeOrder(orderLimit,\
    \ OandaTestConstants.accountId);\n45  assertNotNull(orderId);\n46  verify(spy,\
    \ times(1))\n47   .createPostCommand(orderLimit, OandaTestConstants.accountId);\n\
    48  verify(orderLimit, times(1)).getInstrument();\n49  verify(orderLimit, times(3)).getType();\n\
    50  verify(orderLimit, times(1)).getTakeProfit();\n51  verify(orderLimit, times(1)).getStopLoss();\n\
    52  verify(orderLimit, times(2)).getPrice();\n53  verify(orderLimit, times(1)).getUnits();\n\
    54  verify(orderLimit, times(1)).getSide();\n55 }\n\n57 private OandaOrderManagementProvider\
    \ doMockStuff(String fname,\n58  OandaOrderManagementProvider service)\n59 throws\
    \ Exception {\n60  OandaOrderManagementProvider spy = spy(service);\n61  CloseableHttpClient\
    \ mockHttpClient = mock(CloseableHttpClient.class);\n62  when(spy.getHttpClient()).thenReturn(mockHttpClient);\n\
    63  OandaTestUtils.mockHttpInteraction(fname, mockHttpClient);\n64  return spy;\n\
    65 }\n```\n\n在上面的测试用例中，我们同时测试了新的市价单和限价单；但其机制完全相同。我们创建了一个模拟的 `Order` POJO，为了成功创建一个\
    \ `HttpPost` 命令，必须在此定义新订单的模拟对象上调用所有 getter 方法。上面的 `verify` 正是做了这件事：验证在 `createPostCommand`\
    \ 内部执行的 getter 交互。\n"
- fmt: "### 13.1.4 Mocking Twitter Interaction\n\n`Mockito` makes interacting with\
    \ Twitter extremely easy. The only thing to bear in mind is that the search queries\
    \ might differ for various user accounts when it comes to finding historic PnL\
    \ tweets. Therefore, for every new user account handler we introduce, this test\
    \ should be catered for.\n\nTo get mock Tweets from Twitter which can be parsed\
    \ for new trade or PnL tweets for all users, we must prepare the ground work of\
    \ mock objects. That includes:\n\n- Creating a mock for `Twitter` interface (which\
    \ is implemented by `TwitterTemplate` as part of Spring Social).\n- Creating a\
    \ mock for `SearchOperations` class, that is used to search for Tweets, given\
    \ a search query.\n- Creating a mock for `SearchResults` which return the mocked\
    \ Tweets when `getTweets()` is called on this object.\n- The invocation of method\
    \ `getTweets()` returns a list of Tweet objects which can be a list of mocked\
    \ Tweet objects. The key is to intercept the `getText()` method on the individual\
    \ mocked Tweet object and return the text that we want.\n\nLet us look at an example\
    \ where we try to test the method `findHistoricPnlTweets` for user `@SignalFactory`:\n\
    \n```\n 1 @Test\n 2 public void findHistoricPnlTweetsForInstrumentTest() {\n 3\
    \  AbstractFXTweetHandler < String > tweetHandler = new SignalFactoryFXTweetHandler(userId);\n\
    \ 4  ProviderHelper providerHelper = mock(ProviderHelper.class);\n 5  Twitter\
    \ twitter = mock(Twitter.class);\n 6  tweetHandler.providerHelper = providerHelper;\n\
    \ 7  tweetHandler.twitter = twitter;\n\n 9  SearchOperations searchOperations\
    \ = mock(SearchOperations.class);\n10  when(twitter.searchOperations()).thenReturn(searchOperations);\n\
    \n12  TradeableInstrument < String > nzdusd = new TradeableInstrument < String\
    \ > (\"NZD_USD\");\n13  when(providerHelper.toIsoFormat(eq(\"NZD_USD\"))).thenReturn(\"\
    NZDUSD\");\n14  SearchResults searchResults = returnHistoricPnlSearchResults();\n\
    15  String query = \"Profit: OR Loss: from:SignalFactory\";\n16  when(searchOperations.search(eq(query))).thenReturn(searchResults);\n\
    17  Collection < Tweet > tweets = tweetHandler.findHistoricPnlTweetsForInstrument(nzdusd);\n\
    18  assertEquals(1, tweets.size());\n19 }\n\n21 private SearchResults returnHistoricPnlSearchResults()\
    \ {\n22  SearchResults searchResults = mock(SearchResults.class);\n23  List <\
    \ Tweet > tweets = Lists.newArrayList();\n24  when(searchResults.getTweets()).thenReturn(tweets);\n\
    25  Tweet tweet = mock(Tweet.class);\n26  when(tweet.getText()).thenReturn(\n\
    27   \"Forex Signal | Close(SL) Sell NZDUSD@0.7744 | Loss: -40 pips | 2015.02.06\
    \ 11:26 GMT | #fx #forex #fb\");\n28  tweets.add(tweet);\n29  return searchResults;\n\
    30 }\n```\n\nAfter setting up the mocks to return the list of Tweets, we want\
    \ to make sure that these Tweets are returned only if the query that we expect\
    \ to be fired is sent to the `SearchOperations` mock:\n\n```\n1 String query =\
    \ \"Profit: OR Loss: from:SignalFactory\";\n2 when(searchOperations.search(eq(query))).thenReturn(searchResults);\n\
    ```\n\nThe other important aspect of Tweet handling for a given user is the parsing\
    \ of new and closed trade tweets. The parsing is done on the actual Tweet text\
    \ returned from the `getText()` method. We want to make sure that we write test\
    \ cases to cover all aspects of parsing new and closed trades tweets for a given\
    \ Twitter user.\n\n### 13.2 EclEmma Code Coverage Tool for Eclipse IDE\n\nThe\
    \ EclEmma[^3](#part0080.html#fn-emma) plugin for the Eclipse IDE is an excellent\
    \ tool for reporting code coverage for a Java project. One can run this tool for\
    \ an individual test case or a suite of tests.\n\nOnce installed successfully,\
    \ a test suite can be launched via the plugin using the button shown:\n\n![Launch\
    \ Test using EclEmma tool](images/00090.jpeg) Launch Test using EclEmma tool\n\
    \nThe results appear in the `Coverage` view as shown below:\n\n![Summary of Results\
    \ for tradingbot-core project](images/00091.jpeg) Summary of Results for tradingbot-core\
    \ project\n\nWe can then drill down into individual classes and find out the exact\
    \ lines of code that got executed as part of the unit test and which ones got\
    \ left out.\n\n![Code coverage for HeartBeatPayLoad](images/00092.jpeg) Code coverage\
    \ for HeartBeatPayLoad\n\n1.  http://mockito.org/[↩︎](#part0079.html#fnref-mock)\n\
    2.  http://docs.mockito.googlecode.com/hg/1.9.5/org/mockito/Spy.html[↩︎](#part0079.html#fnref-spy)\n\
    3.  http://eclemma.org/[↩︎](#part0080.html#fnref-emma)"
