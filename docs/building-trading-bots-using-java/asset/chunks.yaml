  trans: "\n## 9\\. 策略实施\n\n是时候为我们的交易机器人插上翅膀，让它飞起来了！其实，我们想说的是，现在该为机器人增加能力，使其能够根据一套我们称之为策略的规则，来决定是否下单。简而言之，我们希望为机器人添加分析能力，来判断是买入、卖出某个货币对，还是按兵不动，等待合适时机。这些分析可以基于多种外部参数，例如：\n\
    \n- 市场数据\n- 新闻事件\n- 社交媒体动态\n- 技术分析\n- 市场情绪\n- 等等\n\n一个策略可以完全基于纯技术分析，分析一段时间内的价格走势；也可以基于上述所有参数或其组合的实时分析。例如，一个复杂策略可以建立在社交媒体动态的实时分析之上，以确定情绪指数（一个基于我们周围正面信息多少的假想指数），并结合市场数据来得出交易决策。它既可以简单到单维度分析，也可以复杂到多变量分析。可能性是无限的！\n\
    \n在本章中，我们将尝试实施几个策略：一个基于推特动态分析，另一个是交易者更常用的策略。我们将对这些策略进行编程，并将其集成到我们的交易机器人中，使其具备生成交易信号的能力，进而下达订单。\n\
    \n在深入探讨这些策略之前，我们想借此机会简要讨论一下多种策略生成 `TradingDecision` 的设计过程。这些决策会被放入队列中，然后由 `OrderExecutionService`\
    \ 取出这些 `TradingDecision` 消息。这些消息是如何处理的，在**第 6 章**中有详细讨论。\n\n![交易信号生成](img/00076.jpeg)\
    \ 交易信号生成\n\n***免责声明***：*本章讨论的策略纯属讨论和演示目的。开发者在实际交易环境中应用前，必须运用自己的推理和判断。在任何情况下，作者均不对因部署本章讨论的策略而产生的任何直接、间接、偶然、特殊、惩罚性或后果性损害承担责任。*\n\
    \n### 9.1 复制推特策略\n\n该策略旨在盲目复制或完全反向操作推特用户刚刚发布的、与新交易相关的推文。其工作流程如下：\n\n- 利用我们在上一章开发的工具和知识，我们在推特上关注一组用户。这些用户经常发布具有预定义结构的新交易和关闭交易消息。通过编写处理器，可以解析这些消息并创建\
    \ `NewFxTradeTweet` 或 `CloseFxTradeTweet` 对象。我们研究并分析了`@SignalFactory`和`@ZuluTrader101`这两个用户的推文。\n\
    - 我们创建一个定时任务，用于搜索这些用户的新推文。当发现一条新交易推文并成功解析为 `NewFxTradeTweet` 对象时，我们会搜索同一用户关于该交易工具的历史推文，看其之前是建议*做多*还是*做空*。\n\
    - 我们解析历史推文集合，创建一批 `CloseFxTradeTweet` 对象。我们知道，每个 `CloseFxTradeTweet` 都有一个包含盈亏数值的属性。如果找不到该数值，则默认为\
    \ 0.0。\n- 我们分析所有历史交易中盈利和亏损的比例。\n- 如果分析结果表明，该用户过去对此类交易的建议准确率超过 75%，我们就完全按照他最近这次交易的建议来操作。反之，如果分析表明他超过\
    \ 75% 的时间都是错误的，我们就进行完全相反的操作。对于其他任何情况，我们不采取进一步决策，忽略该推文。同时，我们还需要确保分析至少 4 条历史推文，以提高决策的准确性。\n\
    \n75% 的准确率和选取 4 条推文的标准是随意设定的，可以根据不同的部署环境而变化。\n\n让我们看看尝试实现此策略的代码。\n\n```\n 1 @TradingStrategy\n\
    \  2 public class CopyTwitterStrategy < T > implements TweetHarvester < T > {\n\
    \n4  @Resource\n  5  Map < String,\n  6  FXTweetHandler < T >> tweetHandlerMap;\n\
    \  7  @Resource(name = \"orderQueue\")\n  8  BlockingQueue < TradingDecision <\
    \ T >> orderQueue;\n  9  private static final Logger LOG = Logger.getLogger(CopyTwitterStrategy.class);\n\
    \ 10  private ExecutorService executorService = null;\n 11  private static final\
    \ double ACCURACY_DESIRED = 0.75;\n 12  private static final int MIN_HISTORIC_TWEETS\
    \ = 4;\n\n14  @PostConstruct\n 15  public void init() {\n 16   this.executorService\
    \ = Executors.newFixedThreadPool(tweetHandlerMap.size());\n 17  }\n```\n"
