    \  (http://fxtrade.oanda.com/learn/intro-to-currency-trading/conventions/pips)↩︎\n\
    2.  (http://fxtrade.oanda.ca/learn/intro-to-currency-trading/conventions/rollovers)↩︎\n\
    \n## 4. 事件流：市场数据事件\n\n现在我们已经到了交易机器人的真正存在开始变得明显的阶段。从这里开始，我们将进入交易的实际层面，其中之一就是处理实时事件并对其做出反应，前提是我们要对事件进行有意义的分析。事件流可能呈现以下形式和形状：\n\
    \n- 市场数据事件，即某一工具价格的变化。\n- 交易/订单/账户事件，例如订单成交或止损水平被触发。\n- 社交媒体事件，例如有影响力的人物或市场推动者的推文。\n\
    - 任何其他来源\n\n正如我们所见，我们可能有众多事件流，以不同程度的强度向我们的交易机器人发送信息。处理这些事件并基于它们做出决策是交易机器人设计的基石。在本章中，我们将专门讨论如何处理市场数据事件，以及如何使用\
    \ `Google EventBus` 来分发这些事件。\n\n### 4.1 流式市场数据接口\n\n我们首先定义一个接口，该接口规定了市场事件流在我们的机器人中工作所需的最小方法集。表面上看，似乎没什么复杂之处，因为我们只是对接口实现者强制执行了一个\
    \ `start` 和 `stop` 的要求。然而，正如我们稍后讨论实现时将会看到的，实现者的一部分工作是调用一个 `MarketEventCallback`\
    \ 处理器，该处理器负责处理接收到的流式市场事件。假设 `startMarketDataStreaming()` 方法会建立一条到事件源的持续连接（事件循环），即在一个独立的线程中，并且这个线程在该连接上接收市场数据事件。然后，事件会被解析并传递给\
    \ `MarketEventCallback` 以进行进一步处理。\n\n```java\n 1 /**\n 2  * 一个提供流式市场数据的服务。通常，实现会创建一个到交易平台的专用连接，\n\
    \ 3  * 并理想地通过 REST 服务或平台的回调接收价格流。实现必须处理断开的连接，\n 4  * 并以适当的方式尝试重新连接。该服务通常与平台的心跳信号耦合，\n\
    \ 5  * 心跳信号指示连接是否存活。\n 6  *\n 7  * 由于预期的数据量较大，建议服务将市场数据的处理委托给另一个服务，\n 8  * 以避免等待处理的事件队列堆积。\n\
    \ 9  *\n10  */\n11 public interface MarketDataStreamingService {\n\n13  /**\n\
    14   * 启动流式服务，该服务理想地会创建一个到平台的专用连接或一个回调监听器。\n15   * 最好不要创建多个请求相同市场数据的连接。\n16  \
    \ */\n17  void startMarketDataStreaming();\n\n19  /**\n20   * 停止流式服务，并以适当的方式释放任何资源/连接，确保不产生资源泄漏。\n\
    21   */\n22  void stopMarketDataStreaming();\n\n24 }\n```\n\n`MarketEventCallback`\
    \ 接口必须配合使用，该接口实际上负责同步或异步地进一步分发市场数据事件。\n\n```java\n 1 /**\n 2  * 市场数据事件的回调处理器。上游独立的流式事件处理器负责处理和解析来自\n\
    \ 3  * 市场数据源的传入事件，并调用此处理器的 onMarketEvent 方法，\n 4  * 该方法随后可以根据需要将事件进一步向下游分发。\n\
    \ 5  * 理想情况下，该接口的实现者会将事件放入队列进行异步处理，\n 6  * 或使用事件总线进行同步处理。\n 7  *\n 8  * @param\
    \ <T>\n 9  *            TradeableInstrument 类中 instrumentId 的类型\n10  * @see TradeableInstrument\n\
    11  * @see EventBus\n12  */\n13 public interface MarketEventCallback<T> {\n14\
    \  /**\n15   * 由流式市场数据事件的上游处理器调用的方法。此方法的调用是同步的，\n16   * 因此该方法应尽快返回，以确保上游事件不会排队堆积。\n\
    17   *\n18   * @param instrument\n19   * @param bid\n20   * @param ask\n21   *\
    \ @param eventDate\n22   */\n23  void onMarketEvent(TradeableInstrument<T> instrument,\
    \ double bid, double ask, DateTime eventDate);\n24 }\n```\n\n让我们直接跳入 OANDA 的实现，因为一旦我们查看代码内部，事情就会变得更加清晰。\n"
- fmt: "### 4.2 A concrete implementation for `MarketDataStreamingService`\n\nLet's\
    \ start by looking at the class definition and the constructor for `OandaMarketDataStreamingService`\
    \ which is responsible for reading the market data stream from OANDA and then\
    \ invoking the `onMarketEvent` on an instance of `MarketEventCallback` passed\
    \ into the constructor.\n\n```java\npublic class OandaMarketDataStreamingService\
    \ extends OandaStreamingService implements MarketDataStreamingService {\n\n  \
    \  private final String url;\n    private final MarketEventCallback<String> marketEventCallback;\n\
    \n    public OandaMarketDataStreamingService(String url, String accessToken,\n\
    \                                          long accountId, Collection<TradeableInstrument<String>>\
    \ instruments,\n                                          MarketEventCallback<String>\
    \ marketEventCallback,\n                                          HeartBeatCallback<DateTime>\
    \ heartBeatCallback, String heartbeatSourceId) {\n        super(accessToken, heartBeatCallback,\
    \ heartbeatSourceId);\n        this.url = url + OandaConstants.PRICES_RESOURCE\
    \ + \"?accountId=\" + accountId + \"&instruments=\" + instrumentsAsCsv(instruments);\n\
    \        this.marketEventCallback = marketEventCallback;\n    }\n\n    private\
    \ String instrumentsAsCsv(Collection<TradeableInstrument<String>> instruments)\
    \ {\n        StringBuilder csvLst = new StringBuilder();\n        boolean firstTime\
    \ = true;\n        for (TradeableInstrument<String> instrument : instruments)\
    \ {\n            if (firstTime) {\n                firstTime = false;\n      \
    \      } else {\n                csvLst.append(TradingConstants.ENCODED_COMMA);\n\
    \            }\n            csvLst.append(instrument.getInstrument());\n     \
    \   }\n        return csvLst.toString();\n    }\n}\n```\n\nThe constructor among\
    \ other params, receives an account id and a list of instruments for which the\
    \ ticks are desired. The method `instrumentsAsCsv` accepts a collection of instruments\
    \ and returns a flattened string of url encoded comma separated instruments. Assuming\
    \ the account id is `123456` and instrument list is `[\"EUR_USD\",\"GBP_AUD\"\
    ]`, the url computed in the constructor would look like:\n\n```java\n//given\n\
    public static final String PRICES_RESOURCE = \"/v1/prices\";\n//this.url computed,\
    \ will look like below\n\nhttps://stream-fxtrade.oanda.com/v1/prices?accountId=123456&instruments=EUR_USD%2CGBP_AUD\n\
    ```\n\nOANDA requires us to provide a valid account id to setup a market data\
    \ stream, as discussed before. The stream url is also different, than the ones\
    \ we have discussed before, for example url to request list of instruments. We\
    \ will discuss these nuances in detail in a later chapter about configuration\
    \ and deployment.\n\nOur concrete implementation extends class `OandaStreamingService`,\
    \ which is the base class for providing infrastructure methods for all streaming\
    \ services from OANDA, which includes, of course market data, and as we will discuss\
    \ in a future chapter, the event streaming. All streams from OANDA comprise a\
    \ heartbeat payload, that indicates the stream is alive, hence the `HeartBeatCallback`\
    \ instance. We will discuss heartbeats in a later chapter. For now, it is sufficient\
    \ to know that heartbeating provides a way to assure the client (our trading bot),\
    \ that the persistent connection to the brokerage platform is alive. If the heartbeat\
    \ payload is not received in a given timeframe in the current stream, then something\
    \ is not quite in order and that we must disconnect and try reconnecting. Let's\
    \ quickly look at its definition and some important infrastructure methods it\
    \ provides to its subclasses.\n\n```java\npublic abstract class OandaStreamingService\
    \ implements HeartBeatStreamingService {\n    protected volatile boolean serviceUp\
    \ = true;\n    private final HeartBeatCallback<DateTime> heartBeatCallback;\n\
    \    private final String hearbeatSourceId;\n    protected Thread streamThread;\n\
    \    private final BasicHeader authHeader;\n\n    protected abstract String getStreamingUrl();\n\
    \n    protected abstract void startStreaming();\n\n    protected abstract void\
    \ stopStreaming();\n\n    protected OandaStreamingService(String accessToken,\
    \ HeartBeatCallback<DateTime> heartBeatCallback,\n                           \
    \        String heartbeatSourceId) {\n        this.hearbeatSourceId = heartbeatSourceId;\n\
    \        this.heartBeatCallback = heartBeatCallback;\n        this.authHeader\
    \ = OandaUtils.createAuthHeader(accessToken);\n    }\n\n    protected void handleHeartBeat(JSONObject\
    \ streamEvent) {\n        Long t = Long.parseLong(((JSONObject) streamEvent.get(OandaJsonKeys.heartbeat)).get(OandaJsonKeys.time).toString());\n\
    \        heartBeatCallback.onHeartBeat(new HeartBeatPayLoad<DateTime>(new DateTime(TradingUtils.toMillisFromNanos(t)),\
    \ hearbeatSourceId));\n    }\n\n    protected BufferedReader setUpStreamIfPossible(CloseableHttpClient\
    \ httpClient) throws Exception {\n        HttpUriRequest httpGet = new HttpGet(getStreamingUrl());\n\
    \        httpGet.setHeader(authHeader);\n        httpGet.setHeader(OandaConstants.UNIX_DATETIME_HEADER);\n\
    \        LOG.info(TradingUtils.executingRequestMsg(httpGet));\n        HttpResponse\
    \ resp = httpClient.execute(httpGet);\n        HttpEntity entity = resp.getEntity();\n\
    \        if (resp.getStatusLine().getStatusCode() == HttpStatus.SC_OK && entity\
    \ != null) {\n            InputStream stream = entity.getContent();\n        \
    \    serviceUp = true;\n            BufferedReader br = new BufferedReader(new\
    \ InputStreamReader(stream));\n            return br;\n        } else {\n    \
    \        String responseString = EntityUtils.toString(entity, \"UTF-8\");\n  \
    \          LOG.warn(responseString);\n            return null;\n        }\n  \
    \  }\n\n    protected void handleDisconnect(String line) {\n        serviceUp\
    \ = false;\n        LOG.warn(\n                String.format(\"Disconnect message\
    \ received for stream %s. PayLoad->%s\",\n                        getHeartBeatSourceId(),\
    \ line));\n    }\n\n    protected boolean isStreaming() {\n        return serviceUp;\n\
    \    }\n}\n```\n\nIn summary the base class provides the following infrastructure\
    \ (or supporting) services to its streams subclasses:\n\n*   Setup a persistent\
    \ stream connection to OANDA using `getStreamingUrl()` provided by a subclass\
    \ which implements this abstract method.\n*   Handle disconnect messages from\
    \ OANDA, if for some reason, OANDA disconnects the current stream.\n*   Handle\
    \ heartbeat payload and invoke the downstream `HeartBeatCallback` handler.\n\n\
    Returning back to our concrete implementation, let's look at the most important\
    \ method of the class, `startMarketDataStreaming` which starts the streaming in\
    \ a separate thread and once the stream is established, parse the event payload\
    \ received.\n\n```java\nimport static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.ask;\n\
    import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.bid;\nimport\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.disconnect;\n\
    import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.heartbeat;\n\
    import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.tick;\nimport\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.time;\n\n@Override\n\
    public void startMarketDataStreaming() {\n    stopMarketDataStreaming();\n   \
    \ this.streamThread = new Thread(new Runnable() {\n\n        @Override\n     \
    \   public void run() {\n            CloseableHttpClient httpClient = getHttpClient();\n\
    \            try {\n                BufferedReader br = setUpStreamIfPossible(httpClient);\n\
    \                if (br != null) {\n                    String line;\n       \
    \             while ((line = br.readLine()) != null && serviceUp) {\n        \
    \                Object obj = JSONValue.parse(line);\n                       \
    \ JSONObject instrumentTick = (JSONObject) obj;\n                        // unwrap\
    \ if necessary\n                        if (instrumentTick.containsKey(tick))\
    \ {\n                            instrumentTick = (JSONObject) instrumentTick.get(tick);\n\
    \                        }\n```"
