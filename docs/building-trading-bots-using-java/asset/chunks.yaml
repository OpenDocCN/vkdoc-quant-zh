  trans: "\n\n### 6.3 `OrderManagementProvider` 的具体实现\n\n现在进入最有趣的部分，我们将深入探讨实现细节，并讨论如何实现一个\
    \ OANDA 提供商。由于我们即将实现完整的 CRUD 操作集，因此还需要熟悉与这些操作等效的 REST 动词。我们已经知道 HTTP 的 `GET` 等同于\
    \ `R`（读取）。那么剩下的 `C`、`U` 和 `D` 又对应什么呢？下表总结了用于执行这些操作的 HTTP 动词。\n\n| 操作 | HTTP 动词\
    \ |\n| --- | --- |\n| 创建新订单 [C] | POST |\n| 查询订单详情 [R] | GET |\n| 更新现有订单 [U] |\
    \ PATCH |\n| 关闭待处理订单 [D] | DELETE |\n\n有了这些信息，我们先看看类的定义，包括构造函数和所需的 JSON 键。我们需要提供一个\
    \ `AccountProvider` 依赖，并将在构造函数中传入。在 OANDA 中，订单 ID 是 `Long` 类型。因此，用 `Long` 替代账户\
    \ ID，用 `String` 替代金融工具 ID，我们得到以下定义：\n\n```\n 1 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.expiry;\n\
    \ 2 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.id;\n\
    \ 3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.instrument;\n\
    \ 4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.orderOpened;\n\
    \ 5 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.price;\n\
    \ 6 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.side;\n\
    \ 7 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.stopLoss;\n\
    \ 8 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.takeProfit;\n\
    \ 9 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.tradeOpened;\n\
    10 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.type;\n\
    11 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.units;\n\
    \n13 public class OandaOrderManagementProvider implements OrderManagementProvider<Long,\
    \ String, Long> {\n\n15 \tprivate final String url;\n16 \tprivate final BasicHeader\
    \ authHeader;\n17 \tprivate final AccountDataProvider<Long> accountDataProvider;\n\
    \n19 \tpublic OandaOrderManagementProvider(String url, String accessToken,\n20\
    \ \tAccountDataProvider<Long> accountDataProvider) {\n21 \t\tthis.url = url; //\
    \ OANDA REST 服务的基础 URL\n22 \t\tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    23 \t\tthis.accountDataProvider = accountDataProvider;\n24 \t}\n```\n\n现在，我们先编写下新订单的方法。要成功下单，我们至少需要提供最基本的订单信息（使用\
    \ `Order` POJO 中最精简的构造函数）和一个有效的账户 ID。我们先看看创建 HTTP POST 命令的函数，该函数稍后将在 `placeOrder`\
    \ 函数中使用。\n\n```\n 1 private static final String ordersResource = \"/orders\";\n\
    \n3 HttpPost createPostCommand(Order < String, Long > order, Long accountId) throws\
    \ Exception {\n 4  HttpPost httpPost = new HttpPost(\n 5   this.url + OandaConstants.ACCOUNTS_RESOURCE\
    \ +\n 6   TradingConstants.FWD_SLASH + accountId + ordersResource);\n 7  httpPost.setHeader(this.authHeader);\n\
    \ 8  List < NameValuePair > params = Lists.newArrayList();\n 9  // 对价格、止损价、获利价进行适当的四舍五入。OANDA\
    \ 会拒绝 0.960000001 这样的值。\n 10  params.add(new BasicNameValuePair(instrument, order.getInstrument().getInstrument()));\n\
    \ 11  params.add(new BasicNameValuePair(side, OandaUtils.toSide(order.getSide())));\n\
    \ 12  params.add(new BasicNameValuePair(type, OandaUtils.toType(order.getType())));\n\
    \ 13  params.add(new BasicNameValuePair(units, String.valueOf(order.getUnits())));\n\
    \ 14  params.add(new BasicNameValuePair(takeProfit, String.valueOf(order.getTakeProfit())));\n\
    \ 15  params.add(new BasicNameValuePair(stopLoss, String.valueOf(order.getStopLoss())));\n\
    \ 16  if (order.getType() == OrderType.LIMIT && order.getPrice() != 0.0) {\n 17\
    \   DateTime now = DateTime.now();\n 18   DateTime nowplus4hrs = now.plusHours(4);\n\
    \ 19   String dateStr = nowplus4hrs.toString();\n 20   params.add(new BasicNameValuePair(price,\
    \ String.valueOf(order.getPrice())));\n 21   params.add(new BasicNameValuePair(expiry,\
    \ dateStr));\n 22  }\n 23  httpPost.setEntity(new UrlEncodedFormEntity(params));\n\
    \ 24  return httpPost;\n 25 }\n```\n\n我们首先创建一个 `HttpPost` 对象的实例，并将 URL 传入其构造函数。例如，对于有效的账户\
    \ ID 123456，其 URL 如下所示：\n\n```\n1 https://api-fxtrade.oanda.com/v1/accounts/123456/orders\n\
    ```\n\n现在我们有了 `HttpPost` 对象的实例，接下来必须创建一个 `NameValuePair` 对象的列表。每个 `NameValuePair`\
    \ 定义了订单的一个属性，例如价格。我们使用 `Order` POJO 来定义所有订单属性。对于 `LIMIT` 订单，我们必须指定一个限价。如果我们不提供此价格，订单将被平台拒绝。因此，我们引入了一个针对限价订单的特殊检查，以确保我们有一个有效的价格。在定义价格的同时，我们还要快速为订单添加一个\
    \ 4 小时的到期时间。这意味着如果未达到限价，该订单将在平台上自动过期。一旦通过 `NameValuePair` 对象列表定义了所有此类订单属性，我们将这些参数/属性封装在一个\
    \ `UrlEncodedFormEntity` 中，并将其设置到我们的 `HttpPost` 对象实例上。建议始终对 URL 参数进行编码。现在，我们已经准备好将这些参数\
    \ `POST` 到平台。为此，我们回到 `placeOrder` 方法的代码。\n\n```\n 1 @Override\n 2 public Long\
    \ placeOrder(Order < String, Long > order, Long accountId) {\n 3  CloseableHttpClient\
    \ httpClient = getHttpClient();\n 4  try {\n 5   HttpPost httpPost = createPostCommand(order,\
    \ accountId);\n 6   LOG.info(TradingUtils.executingRequestMsg(httpPost));\n 7\
    \   HttpResponse resp = httpClient.execute(httpPost);\n 8   if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK || resp.getStatusLine().getStatusCode() == HttpStatus.SC_CREATED)\
    \ {\n 9    if (resp.getEntity() != null) {\n10     String strResp = TradingUtils.responseToString(resp);\n\
    11     Object o = JSONValue.parse(strResp);\n12     JSONObject orderResponse;\n\
    13     if (order.getType() == OrderType.MARKET) {\n14      orderResponse = (JSONObject)((JSONObject)\
    \ o).get(tradeOpened);\n15     } else {\n16      orderResponse = (JSONObject)((JSONObject)\
    \ o).get(orderOpened);\n17     }\n18     Long orderId = (Long) orderResponse.get(OandaJsonKeys.id);\n\
    19     LOG.info(\"Order executed->\" + strResp);\n20     return orderId;\n21 \
    \   } else {\n22     return null;\n23    }\n24   } else {\n25    LOG.info(\"Order\
    \ not executed. http code=\" +\n26     resp.getStatusLine().getStatusCode());\n\
    27    return null;\n28   }\n29  } catch (Exception e) {\n30   LOG.warn(e);\n31\
    \   return null;\n32  } finally {\n33   TradingUtils.closeSilently(httpClient);\n\
    34  }\n35 }\n```\n\n"
- fmt: "As described previously, once we have an instance of `HttpPost` object, with\
    \ all order attributes set as `NameValuePair` objects, we are ready to post it\
    \ to the platform. A successful market order post would return a response like\
    \ the following:\n\n```\n{\n    \"instrument\" : \"EUR_JPY\",\n    \"time\" :\
    \ \"2015-05-26T16:08:51.000000Z\",\n    \"price\" : 133.819,\n    \"tradeOpened\"\
    \ : {\n        \"id\" : 1856110003,\n        \"units\" : 3000,\n        \"side\"\
    \ : \"sell\",\n        \"takeProfit\" : 132.819,\n        \"stopLoss\" : 134.9,\n\
    \        \"trailingStop\" : 0\n    },\n    \"tradesClosed\" : [],\n    \"tradeReduced\"\
    \ : {}\n}\n```\n\nand a successful limit order would return something like:\n\n\
    ```\n{\n    \"instrument\" : \"EUR_USD\",\n    \"time\" : \"2015-12-02T06:47:51.000000Z\"\
    ,\n    \"price\" : 1.1,\n    \"orderOpened\" : {\n        \"id\" : 12211080075,\n\
    \        \"units\" : 10,\n        \"side\" : \"sell\",\n        \"takeProfit\"\
    \ : 1.09,\n        \"stopLoss\" : 1.13,\n        \"expiry\" : \"2015-12-02T11:47:39.000000Z\"\
    ,\n        \"upperBound\" : 0,\n        \"lowerBound\" : 0,\n        \"trailingStop\"\
    \ : 0\n    }\n}\n```\n\nA characteristic of a market order is, if fully or partially\
    \ filled, it results in the creation of an open position or trade. On the contrary,\
    \ a limit order results in a creation of order, ready to be triggered if the price\
    \ level is hit. Therefore we need to interpret the response JSON slightly different\
    \ depending on what kind of an order was initially submitted to the platform.\
    \ For a market order we parse the `tradeOpened` element for the order id, whilst\
    \ for a limit order we parse the `orderOpened` element. Apart from that, there\
    \ is nothing else substantial in the method.\n\nNow let’s turn our attention to\
    \ `modifyOrder`. We can only modify an existing limit order since as per the discussion\
    \ above, only a limit order creates a new pending order. Market order on the other\
    \ hand, results in a trade straightaway. Before looking at the code, we need to\
    \ understand that only certain attributes can be modified for a pending order.\
    \ They are:\n\n- `units`\n- `takeProfit`\n- `stopLoss`\n- `price`\n\nWe need a\
    \ valid order id that the `placeOrder` returned and an account id to actually\
    \ do the modification. As usual we first focus on the creation of the actual `HttpPatch`\
    \ command that would facilitate the modification on the platform.\n\n```\nString\
    \ orderForAccountUrl(Long accountId, Long orderId) {\n    return this.url + OandaConstants.ACCOUNTS_RESOURCE\
    \ + TradingConstants.FWD_SLASH + accountId +\n        ordersResource + TradingConstants.FWD_SLASH\
    \ + orderId;\n}\n\nHttpPatch createPatchCommand(Order<String, Long> order, Long\
    \ accountId) throws Exception {\n    HttpPatch httpPatch = new HttpPatch(orderForAccountUrl(accountId,\
    \ order.getOrderId()));\n    httpPatch.setHeader(this.authHeader);\n    List<NameValuePair>\
    \ params = Lists.newArrayList();\n    params.add(new BasicNameValuePair(takeProfit,\
    \ String.valueOf(order.getTakeProfit())));\n    params.add(new BasicNameValuePair(stopLoss,\
    \ String.valueOf(order.getStopLoss())));\n    params.add(new BasicNameValuePair(units,\
    \ String.valueOf(order.getUnits())));\n    params.add(new BasicNameValuePair(price,\
    \ String.valueOf(order.getPrice())));\n    httpPatch.setEntity(new UrlEncodedFormEntity(params));\n\
    \    return httpPatch;\n}\n```\n\nThe creation of the patch command is very similar\
    \ to the creation of the post command which we saw earlier. We create a list of\
    \ `NameValuePair` objects and set the name/value pairs from the JSON keys/Order\
    \ POJO but only those that we are allowed to change for a pending order. We also\
    \ bring into the mix, a function to compute the URL to modify the order and other\
    \ order related services which we will soon see and use in other places. For account\
    \ id 123456 and order 234567, the function would compute:\n\n```\nhttps://api-fxtrade.oanda.com/v1/accounts/123456/orders/234567\n\
    ```\n\nNow turning our attention back to `modifyOrder`, it looks like:\n\n```\n\
    @Override\npublic boolean modifyOrder(Order<String, Long> order, Long accountId)\
    \ {\n    CloseableHttpClient httpClient = getHttpClient();\n    try {\n      \
    \  HttpPatch httpPatch = createPatchCommand(order, accountId);\n        LOG.info(TradingUtils.executingRequestMsg(httpPatch));\n\
    \        HttpResponse resp = httpClient.execute(httpPatch);\n        if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK &&\n            resp.getEntity() != null) {\n          \
    \  LOG.info(\"Order Modified->\" + TradingUtils.responseToString(resp));\n   \
    \         return true;\n        }\n        LOG.warn(String.format(\"order %s could\
    \ not be modified.\",\n            order.toString()));\n    } catch (Exception\
    \ e) {\n        LOG.error(e);\n    } finally {\n        TradingUtils.closeSilently(httpClient);\n\
    \    }\n    return false;\n}\n```\n\nThe code looks quite straightforward. Once\
    \ we have an instance of `HttpPatch` successfully set with all the values, we\
    \ just post it to the platform. If the order is successfully modified, it returns\
    \ HTTP code 200 in the header and the state of the modified order in the response.\
    \ On receipt of code 200, we return `true` to indicate successful modification\
    \ else `false`.\n\n```\n##header\nHTTP/1.1 200 OK\nServer: nginx/1.2.9\nContent-Type:\
    \ application/json\nContent-Length: 284\n```\n\n```\n##response body\n{\n    \"\
    id\": 1001,\n    \"instrument\": \"USD_JPY\",\n    \"units\": 125,\n    \"side\"\
    : \"sell\",\n    \"type\": \"limit\",\n    \"time\": \"2015-09-22T00:00:00Z\"\
    ,\n    \"price\": 122.15,\n    \"takeProfit\": 119.25,\n    \"stopLoss\": 125.00,\n\
    \    \"expiry\": \"2015-09-25T00:00:00Z\",\n    \"upperBound\": 0,\n    \"lowerBound\"\
    : 0,\n    \"trailingStop\": 0\n}\n```\n\nThe next one to elaborate upon is `closeOrder`.\
    \ For deleting or closing an order, it is sufficient to send an `HttpDelete` command\
    \ to the URL returned by the `orderForAccountUrl` function. The code to do that\
    \ is:\n\n```\n@Override\npublic boolean closeOrder(Long orderId, Long accountId)\
    \ {\n    CloseableHttpClient httpClient = getHttpClient();\n    try {\n      \
    \  HttpDelete httpDelete = new HttpDelete(orderForAccountUrl(accountId, orderId));\n\
    \        httpDelete.setHeader(authHeader);\n        LOG.info(TradingUtils.executingRequestMsg(httpDelete));\n\
    \        HttpResponse resp = httpClient.execute(httpDelete);\n        if (resp.getStatusLine().getStatusCode()\
    \ == HttpStatus.SC_OK) {\n            LOG.info(String.format(\"Order %d successfully\
    \ deleted for account %d\", orderId, accountId));\n            return true;\n\
    \        } else {\n            LOG.warn(String.format(\n                \"Order\
    \ %d could not be deleted. Recd error code %d\", orderId, resp\n             \
    \   .getStatusLine().getStatusCode()));\n        }\n    } catch (Exception e)\
    \ {\n        LOG.warn(\"error deleting order id:\" + orderId, e);\n    } finally\
    \ {\n        TradingUtils.closeSilently(httpClient);\n    }\n    return false;\n\
    }\n```\n\nIf the order id and the account to which it belongs to are both valid,\
    \ we should see an HTTP 200 returned in the header after a successful deletion\
    \ of the order.\n\n```\nHTTP/1.1 200 OK\nContent-Type: application/json\nContent-Length:\
    \ 127\n```\n\nNow we turn our attention to implementation of rest of the methods\
    \ which are all order query methods and use the old fashioned `HttpGet` to fetch\
    \ order related information. Let’s jump straight into the first one, `pendingOrdersForAccount`.\
    \ This method returns a collection of orders which are pending and ready to be\
    \ filled when the price is hit.\n\n```\n@Override\npublic Collection<Order<String,\
    \ Long>> pendingOrdersForAccount(Long accountId) {\n    return this.pendingOrdersForAccount(accountId,\
    \ null);\n}\n```"
