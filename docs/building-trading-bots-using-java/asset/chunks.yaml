    \            FXTradeTweet<T> tradeTweet = tweetHandler.handleTweet(tweet);\n \
    \           if (tradeTweet instanceof CloseFXTradeTweet) {\n                pnlTradeTweets.add((CloseFXTradeTweet<T>)\
    \ tradeTweet);\n            }\n        }\n        return pnlTradeTweets;\n   \
    \ }\n}\n```\n\nWe begin by annotating the class with a custom annotation `@TradingStrategy`.\
    \ By doing so we are making a statement about this class which is that this class\
    \ explicitly implements a Trading Strategy. It is always a good idea to do so\
    \ when certain classes are specifically written to accomplish a task but cannot\
