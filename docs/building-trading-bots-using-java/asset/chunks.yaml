    \ in order to easily pick the provider at runtime. Without further ado, lets jump\
    \ into the configuration of the bot.\n\n### 12.1 Configuration of the trading\
    \ bot\n\nWe start by creating the main configuration file in the project *tradingbot-app*\
    \ in the *src/main/resources* folder, which is automatically included in the build\
    \ and as a result ends up inside the *tradingbot-app.jar* file. The name of the\
    \ file is *tradingbot-app.xml*. We also create the properties file, *tradingbot.properties*,\
    \ that has the values for various placeholders referenced in this Spring configuration\
    \ file.\n\nWe also use the cool *SpEL*^([1](#part0077.html#fn-spel)) in our configuration,\
    \ the reason for which will become clear as we progress through this chapter."
