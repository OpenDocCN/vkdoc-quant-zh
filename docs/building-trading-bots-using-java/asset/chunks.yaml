    \  * where all trades must all be a LONG or a SHORT. It is a useful service to\n\
    \ 5  * project a summary of a given instrument and also if required close all\
    \ trades\n 6  * for a given instrument, ideally using a single call.\n 7  *\n\
    \ 8  * The implementation might choose to maintain an internal cache of positions\
    \ in\n 9  * order to reduce latency. If this is the case then it must find means\
    \ to\n10  * either 1) hook into the event streaming and refresh the cache based\
    \ on an\n11  * order/trade event or 2) regularly refresh the cache after a given\
    \ time\n12  * period.\n13  *\n14  * @param <M>\n15  *      The type of instrumentId\
    \ in class TradeableInstrument\n16  * @param <N>\n17  *      the type of accountId\n\
    18  *\n19  * @see TradeableInstrument\n20  */\n21 public interface PositionManagementProvider<M,\
    \ N> {\n\n23 \t/**\n24 \t *\n25 \t * @param accountId\n26 \t * @param instrument\n\
    27 \t * @return Position<M> for a given instrument and accountId(may be null if\n\
    28 \t *         all trades under a single account).\n29 \t */\n30 \tPosition<M>\
    \ getPositionForInstrument(N accountId, TradeableInstrument<M> instrument);\n\n\
    32 \t/**\n33 \t *\n34 \t * @param accountId\n35 \t * @return Collection of Position<M>\
    \ objects for a given accountId.\n36 \t */\n37 \tCollection<Position<M>> getPositionsForAccount(N\
    \ accountId);\n\n39 \t/**\n40 \t * close the position for a given instrument and\
    \ accountId. This is one shot\n41 \t * way to close all trades for a given instrument\
    \ in an account.\n42 \t *\n43 \t * @param accountId\n44 \t * @param instrument\n\
    45 \t * @return if the operation was successful\n46 \t */\n47 \tboolean closePosition(N\
    \ accountId, TradeableInstrument<M> instrument);\n\n49 }\n```\n\nIf we create\
    \ such specifications/interfaces for each aspect of the platform interaction,\
    \ we can in theory create providers for these services and swap them as when required,\
    \ through the Spring configuration. From code organisation perspective, all these\
    \ interfaces, therefore would go in a project, that form part of the core api.\
    \ This project would therefore be broker/exchange provider agnostic and would\
    \ comprise such interfaces and services.\n\n*   Write services that solve a single\
    \ business problem or a collection of related problems. These services lend themselves\
    \ to easy unit testability and code reuse that eventually leads to better software\
    \ quality.\n*   Loosely couple services. This enables reducing system dependencies\
    \ and as a result results in more maintainable software. Our software would be\
    \ continuously evolving as one might decide to integrate more social media feeds\
    \ or add more complex strategies. Writing loosley coupled components ensures that\
    \ we have little knock on effect on already working code.\n*   High unit test\
    \ coverage. It is extremely important that we aim to have a high unit test coverage.\
    \ When used in a production environment where real money could be involved, a\
    \ large unit tests coverage will ensure that we catch regressions and bugs early\
    \ on and prevent the manifestation of bugs as much as possible in the production\
    \ environment.\n\n### 1.5 Code Organisation and Software Stack Used\n\nFollowing\
    \ on from our discussion of design goals in the previous sections, the code will\
    \ be organised in atleast 3 different projects ,i.e., atleast 3 jar files will\
    \ be produced from the build. Why are we saying atleast 3? Remember from our earlier\
    \ discussion, that one of the key design goals is to be able to switch provider\
    \ implementation at runtime. Since we could have more than 1 provider from which\
    \ we can decide, there will be atleast 3 jar files. We are going to discuss only\
    \ 1 implementation in the book,i.e., the OANDA REST API implementation. Developers\
    \ who would use the framework, are encouraged to develop more provider implementations.\n\
    \n*   ***trading-core*** is the core of the project. It comprises all the specifications/interfaces\
    \ that must be implemented. It also comprises all the generic services which make\
    \ use of the core interfaces and provide additional useful API methods.\n*   ***oanda-restapi***\
    \ is our reference implementation for the specification and will be discussed\
    \ in the book. You are more than welcome to swap this over with your own.\n* \
    \  ***tradingbot-app*** is the main application that uses Spring to inject the\
    \ provider api at runtime. It is also the project where we define our strategies\
    \ and can implement app specific stuff. Later in the book, we are going to talk\
    \ about integration with social media, especially *Twitter*, which we would implement\
    \ in this project.\n\n![Java Projects](images/00001.jpeg \"Java Projects\") Java\
    \ Projects\n\nTo build our bot we are going to use the following set of software\
    \ and tools\n\n*   Java SDK 1.7+\n*   Spring Framework 4.1, Spring Social 1.1\
    \ (Dependency in *tradingbot-app* project only)\n*   Guava 18.0\n*   HttpClient\
    \ 4.3\n*   Maven 3.2.5\n*   Eclipse IDE\n\n### 1.6 OANDA REST API as Reference\
    \ Implementation\n\n**Declaration-** *I have no current or past commercial relationship\
    \ with OANDA and I have chosen OANDA REST API as a reference implementation simply\
    \ on it’s technical merit and the fact that it is likely to have wider adoption\
    \ as it is free to use. If there is something similar around, I would be happy\
    \ to give it a try as well.*\n\nI encountered the OANDA API by chance. At the\
    \ time, I was looking for a broker who was offering free API for trading (just\
    \ in case i wanted to convert to a production account) and more importantly supported\
    \ the Java programming language. It was very easy to get started, as most of the\
    \ examples used *curl* to demonstrate various trading actions like getting a list\
    \ of instruments, place an order or get historical candle sticks data. I could\
    \ just type the *curl* commands on my mac terminal and fire away. I could easily\
    \ see the json response received with each *curl* request fired. By seeing the\
    \ responses and data in realtime, I got a really good idea and appreciation of\
    \ various APIs supporting instruments, orders, rates, positions etc.\n\nThe *curl*\
    \ command examples was a good starting point and I started to experiment writing\
    \ equivalent commands as test cases in Java described on the REST API^([4](#part0014.html#fn-rapi))\
    \ page."
  trans: "\n### 1.4 设计目标\n\n-   一个核心的设计目标（本章开头已提及）是能够通过 Spring 配置在运行时切换券商/交易平台（broker/exchange）的实现。如果我们能为这些平台的\
    \ API 调用创建规范（类似于 JDBC 规范），那么这是可行的。例如，一个用于定义持仓管理需求的示例规范/接口如下：\n\n```java\n/**\n\
    \ * 一项为金融工具持仓提供服务的供应方。金融工具的持仓定义为其聚合交易，包含一个平均价格，\n * 且所有交易必须同为多头（LONG）或同为空头（SHORT）。这是一项有用的服务，\n\
    \ * 可用于生成指定金融工具的摘要，如有必要，还可通过单个调用平掉指定金融工具的所有交易。\n *\n * 实现方可以选择维护一个内部持仓缓存，以减少延迟。如果如此操作，\n\
    \ * 则必须找到以下方法之一：1) 接入事件流，并基于订单/交易事件刷新缓存；\n * 或 2) 在指定时间段后定期刷新缓存。\n *\n * @param\
    \ <M>\n *      类 TradeableInstrument 中的 instrumentId 类型\n * @param <N>\n *   \
    \   accountId 的类型\n *\n * @see TradeableInstrument\n */\npublic interface PositionManagementProvider<M,\
    \ N> {\n\n    /**\n     * @param accountId\n     * @param instrument\n     * @return\
    \ 给定金融工具和 accountId 的持仓信息 Position<M>\n     *         （如果单个账户下所有交易为空，则可能返回 null）。\n\
    \     */\n    Position<M> getPositionForInstrument(N accountId, TradeableInstrument<M>\
    \ instrument);\n\n    /**\n     * @param accountId\n     * @return 给定 accountId\
    \ 的 Position<M> 对象集合。\n     */\n    Collection<Position<M>> getPositionsForAccount(N\
    \ accountId);\n\n    /**\n     * 平掉给定金融工具和 accountId 的持仓。这是一种一次性平掉账户中\n     *\
    \ 指定金融工具所有交易的方法。\n     *\n     * @param accountId\n     * @param instrument\n\
    \     * @return 操作是否成功\n     */\n    boolean closePosition(N accountId, TradeableInstrument<M>\
    \ instrument);\n}\n```\n\n如果我们为平台交互的每个方面都创建这样的规范/接口，理论上我们可以为这些服务创建提供程序，并通过 Spring\
    \ 配置在需要时进行切换。从代码组织的角度来看，所有这些接口都将放在一个构成核心 API 一部分的项目中。因此，这个项目将与券商/交易平台提供程序无关，并将包含此类接口和服务。\n\
    \n-   编写能解决单一业务问题或一组相关问题的服务。这些服务易于进行单元测试和代码复用，最终会带来更优的软件质量。\n-   服务间松耦合。这有助于降低系统依赖，从而使软件更易于维护。我们的软件将不断演进，因为人们可能会决定集成更多社交媒体信息流或添加更复杂的策略。编写松耦合的组件可以确保对已有工作代码的影响降到最低。\n\
    -   高单元测试覆盖率。追求高单元测试覆盖率至关重要。在涉及真实资金的生产环境中使用时，大量的单元测试将确保我们尽早发现回归和错误，并尽可能防止错误在生产环境中暴露。\n\
    \n### 1.5 代码组织与使用的软件栈\n\n基于我们在前面章节中对设计目标的讨论，代码将至少组织在 3 个不同的项目中，即构建将至少生成 3 个 `jar`\
    \ 文件。为什么说是至少 3 个？回想我们之前的讨论，其中一个关键设计目标是在运行时切换提供程序实现。由于我们可以从多个提供程序中进行选择，因此至少会有 3\
    \ 个 `jar` 文件。本书只讨论一个实现，即 OANDA REST API 实现。鼓励使用该框架的开发人员开发更多的提供程序实现。\n\n-   `trading-core`\
    \ 是项目的核心。它包含所有必须实现的规范/接口。它还包含所有使用核心接口并提供额外有用 API 方法的通用服务。\n-   `oanda-restapi`\
    \ 是我们对规范的参考实现，将在本书中讨论。欢迎您将其替换为您自己的实现。\n-   `tradingbot-app` 是主应用程序，它使用 Spring\
    \ 在运行时注入提供程序 API。它也是我们定义策略和实现特定于应用程序的项目的项目。在本书的后续部分，我们将讨论与社交媒体（尤其是 Twitter）的集成，这将在该项目中实现。\n\
    \n![Java 项目](img/00001.jpeg \"Java 项目\") Java 项目\n\n为了构建我们的机器人，我们将使用以下软件和工具：\n\
    \n-   Java SDK 1.7+\n-   Spring Framework 4.1, Spring Social 1.1（仅在 `tradingbot-app`\
    \ 项目中的依赖项）\n-   Guava 18.0\n-   HttpClient 4.3\n-   Maven 3.2.5\n-   Eclipse IDE\n\
    \n### 1.6 OANDA REST API 作为参考实现\n\n**声明-** *我与 OANDA 现在或过去没有任何商业关系。我选择 OANDA REST\
    \ API 作为参考实现，完全是基于其技术优势以及它可能被更广泛采用的事实（因为它是免费使用的）。如果存在类似的选择，我也很乐意尝试。*\n\n我偶然发现了\
    \ OANDA API。当时，我正在寻找一家提供免费交易 API 的券商（以防我想转为真实账户），并且更重要的是支持 Java 编程语言。入门非常容易，因为大多数示例都使用\
    \ `curl` 来演示各种交易操作，如获取工具列表、下订单或获取历史蜡烛图数据。我只需在 Mac 终端上输入 `curl` 命令即可。我可以轻松看到每次发出的\
    \ `curl` 请求所收到的 JSON 响应。通过实时查看响应和数据，我对支持工具、订单、汇率、持仓等的各种 API 有了非常好的认识和理解。\n\n`curl`\
    \ 命令示例是一个很好的起点，我开始尝试在 REST API^(4) 页面上描述的 Java 测试用例中编写等效命令。\n"
- fmt: "### 1.6.1 Opening an OANDA practice account\n\nBefore you can start using\
    \ the API, you must sign up for a free practice account. When you head up there\
    \ and click on the \"Open an Account\" button, you will see a signup screen like\
    \ below:\n\n![Oanda Account Signup](images/00002.jpeg \"Account SignUp Screen\"\
    ) Oanda Account Signup\n\nOnce you have successfully signed up, you are now ready\
    \ to sign in to your practice account. You will see the login screen below when\
    \ you are ready to login:\n\n![Oanda Account Login](images/00003.jpeg \"Account\
    \ Login Screen\") Oanda Account Login\n\nAfter a successful sign-on, you will\
    \ be taken to the account homepage, which looks like the screen below:\n\n![Oanda\
    \ Account Dashboard](images/00004.jpeg \"Account Dashboard\") Oanda Account Dashboard\n\
    \nIn order to commence API trading, we need to first generate a personal API token,\
    \ which will be used by the OANDA platform to authenticate the request. You need\
    \ to click on the link **Manage API Access**, highlighted by a red arrow in the\
    \ screen above. You will next be taken to the screen below:\n\n![Oanda Generate\
    \ API Token](images/00005.jpeg \"Generate API Token\") Oanda Generate API Token\n\
    \nWhen you click **Generate**, the platform will generate a token for you, which\
    \ must be included in every request you make to the platform that hosts your practice\
    \ account. The generated token will be presented, and you must take note of it:\n\
    \n![Oanda Generated Token](images/00006.jpeg \"Generated API Token\") Oanda Generated\
    \ Token\n\nNow you are ready to trade. OANDA provides a very useful web interface\
    \ to test your REST requests and see the responses in situ. You can also get a\
    \ feeling of how the REST resource URLs are organized and which resource URL to\
    \ invoke for fulfilling a given request.\n\nThe screen below demonstrates how\
    \ we make a request to get a list of all instruments that can be traded. The GET\
    \ request requires an `accountId` to be passed in (this is the ID that you can\
    \ find on the account page, and for a practice account, it comes loaded with 100,000\
    \ units of the account currency). It is imperative to provide the header as well,\
    \ which can be specified as `Bearer <Your API Token goes here>`:\n\n![Oanda Dev\
    \ API Console](images/00007.jpeg \"API Console\") Oanda Dev API Console ![Oanda\
    \ Dev API Console-Headers Tab](images/00008.jpeg \"API Console\") Oanda Dev API\
    \ Console-Headers Tab\n\n### 1.6.2 OANDA JSON Keys\n\nThe OANDA JSON responses\
    \ use a set of standard keys. For example, to denote a currency pair in a response,\
    \ the key `instrument` is used, whether it's a streaming response for a tick or\
    \ candlestick information. A tick in the live stream would look like:\n\n```\n\
    1 {\"tick\":{\"instrument\":\"AUD_CAD\",\"time\":\"1401919217201682\",\"bid\"\
    :1.01484,\"ask\":1.01502}}\n```\n\nWhile the response, when a trade is successfully\
    \ modified, would look like:\n\n```\n 1 {\n 2   \"id\": 1800805337,\n 3   \"units\"\
    : 3000,\n 4   \"side\": \"sell\",\n 5   \"instrument\": \"CHF_JPY\",\n 6   \"\
    time\": \"2015-03-18T06:33:36.000000Z\",\n 7   \"price\": 120.521,\n 8   \"takeProfit\"\
    : 110,\n 9   \"stopLoss\": 150,\n10   \"trailingStop\": 0,\n11   \"trailingAmount\"\
    : 0\n12 }\n```\n\nFrom the two examples above, we can also see the key used for\
    \ event date is `time`. Since the same keys are used to denote a given attribute,\
    \ we can create `public static final String` variables for these keys. Therefore,\
    \ the concept of the class `OandaJsonKeys` was born. Instead of polluting the\
    \ code with lines like the one below in many classes:\n\n```\n1 String instrument\
    \ = (String) instrumentJson.get(\"instrument\");\n```\n\nit is much better practice\
    \ to create a constant and use that instead. The same code snippet would look\
    \ like:\n\n```\n1 String instrument = (String) instrumentJson.get(OandaJsonKeys.instrument);\n\
    ```\n\nThere are a lot of keys, but most of the keys that we use in our trading\
    \ bot are captured in the `OandaJsonKeys` class:\n\n```\n 1 public class OandaJsonKeys\
    \ {\n 2 \n 3 \tprivate OandaJsonKeys() {\n 4 \t}\n 5 \n 6 \tpublic static final\
    \ String accounts = \"accounts\";\n 7 \tpublic static final String accountId =\
    \ \"accountId\";\n 8 \tpublic static final String accountCurrency = \"accountCurrency\"\
    ;\n 9 \tpublic static final String marginRate = \"marginRate\";\n10 \tpublic static\
    \ final String marginUsed = \"marginUsed\";\n11 \tpublic static final String marginAvail\
    \ = \"marginAvail\";\n12 \tpublic static final String balance = \"balance\";\n\
    13 \tpublic static final String unrealizedPl = \"unrealizedPl\";\n14 \tpublic\
    \ static final String realizedPl = \"realizedPl\";\n15 \tpublic static final String\
    \ openTrades = \"openTrades\";\n16 \tpublic static final String instruments =\
    \ \"instruments\";\n17 \tpublic static final String instrument = \"instrument\"\
    ;\n18 \tpublic static final String interestRate = \"interestRate\";\n19 \tpublic\
    \ static final String disconnect = \"disconnect\";\n20 \tpublic static final String\
    \ pip = \"pip\";\n21 \tpublic static final String bid = \"bid\";\n22 \tpublic\
    \ static final String ask = \"ask\";\n23 \tpublic static final String heartbeat\
    \ = \"heartbeat\";\n24 \tpublic static final String candles = \"candles\";\n25\
    \ \tpublic static final String openMid = \"openMid\";\n26 \tpublic static final\
    \ String highMid = \"highMid\";\n27 \tpublic static final String lowMid = \"lowMid\"\
    ;\n28 \tpublic static final String closeMid = \"closeMid\";\n29 \tpublic static\
    \ final String time = \"time\";\n30 \tpublic static final String tick = \"tick\"\
    ;\n31 \tpublic static final String prices = \"prices\";\n32 \tpublic static final\
    \ String trades = \"trades\";\n33 \tpublic static final String tradeId = \"tradeId\"\
    ;\n34 \tpublic static final String price = \"price\";\n35 \tpublic static final\
    \ String avgPrice = \"avgPrice\";\n36 \tpublic static final String id = \"id\"\
    ;\n37 \tpublic static final String stopLoss = \"stopLoss\";\n38 \tpublic static\
    \ final String takeProfit = \"takeProfit\";\n39 \tpublic static final String units\
    \ = \"units\";\n40 \tpublic static final String side = \"side\";\n41 \tpublic\
    \ static final String type = \"type\";\n42 \tpublic static final String orders\
    \ = \"orders\";\n43 \tpublic static final String orderId = \"orderId\";\n44 \t\
    public static final String positions = \"positions\";\n45 \tpublic static final\
    \ String expiry = \"expiry\";\n46 \tpublic static final String tradeOpened = \"\
    tradeOpened\";\n47 \tpublic static final String orderOpened = \"orderOpened\"\
    ;\n48 \tpublic static final String transaction = \"transaction\";\n49 \tpublic\
    \ static final String pl = \"pl\";\n50 \tpublic static final String interest =\
    \ \"interest\";\n51 \tpublic static final String accountBalance = \"accountBalance\"\
    ;\n52 }\n```\n\nIn all our OANDA API implementations, which will be discussed\
    \ in the subsequent chapters, we will be directly using this class and statically\
    \ importing constants instead of hardcoding the string literals for a given JSON\
    \ key."
  raw: "#### 1.6.1 Opening an OANDA practice account\n\nBefore you can start using\
    \ the API, you must signup for a free practice^([5](#part0014.html#fn-freeacc))\
    \ account. When you headup there and click on open an account button, you will\
    \ see a signup screen like below\n\n![Oanda Account Signup](images/00002.jpeg\
    \ \"Account SignUp Screen\") Oanda Account Signup\n\nOnce you have successfully\
    \ signed up, you are now ready to sign into you practice account. You will see\
    \ the login screen below when you are ready to login.\n\n![Oanda Account Login](images/00003.jpeg\
    \ \"Account Login Screen\") Oanda Account Login\n\nAfter a successful sign on,\
    \ you would be taken to the account homepage which looks like the screen below\n\
    \n![Oanda Account Dashboard](images/00004.jpeg \"Account Dashboard\") Oanda Account\
    \ Dashboard\n\nIn order to commence api trading, we need to first generate a personal\
    \ API token, which will be used by the OANDA platform to authenticate the request.\
    \ You need to click on the link *Manage API Access*, highlighted by a red arrow\
    \ in the screen above. You will next be taken to the screen below\n\n![Oanda Generate\
    \ API Token](images/00005.jpeg \"Generate API Token\") Oanda Generate API Token\n\
    \nWhen you click generate, the platform will generate a token with you, which\
    \ must be included in every request you make to the platform which hosts your\
    \ practice account. The token generated will be presented and you must take note\
    \ of it.\n\n![Oanda Generated Token](images/00006.jpeg \"Generated API Token\"\
    ) Oanda Generated Token\n\nNow you are ready to trade. OANDA provides a very useful\
    \ web interface^([6](#part0014.html#fn-devportal)) to test your REST requests\
    \ and see the responses in situ. You can also get a feeling of how the REST resource\
    \ urls are organised and which resource url to invoke, for fulfilling a given\
    \ request.\n\nThe screen below demonstrates how we make a request to get a list\
    \ of all instruments which can be traded. The GET request requires an accountId\
    \ to be passed in (this is the id that you can find on the account page and for\
    \ a practice account, comes loaded with 100,000 units of the account currency).\
    \ It is imperative to provide the header as well and can be specified as *Bearer\
    \ <Your API Token goes here>*\n\n![Oanda Dev API Console](images/00007.jpeg \"\
    API Console\") Oanda Dev API Console ![Oanda Dev API Console-Headers Tab](images/00008.jpeg\
    \ \"API Console\") Oanda Dev API Console-Headers Tab\n\n#### 1.6.2 OANDA JSON\
    \ Keys\n\nThe OANDA json responses use a set of standard keys. For e.g. to denote\
    \ a currency pair in a response, the key *instrument* is used, whether it’s a\
    \ streaming response for tick or candle stick information. A tick in the live\
    \ stream would look like\n\n```\n1 {\"tick\":{\"instrument\":\"AUD_CAD\",\"time\"\
    :\"1401919217201682\",\"bid\":1.01484,\"ask\":1.01502}}\n```\n\nwhilst the response,\
    \ when a trade is successfully modified would like\n\n```\n 1 {\n 2   \"id\":\
    \ 1800805337,\n 3   \"units\": 3000,\n 4   \"side\": \"sell\",\n 5   \"instrument\"\
    : \"CHF_JPY\",\n 6   \"time\": \"2015-03-18T06:33:36.000000Z\",\n 7   \"price\"\
    : 120.521,\n 8   \"takeProfit\": 110,\n 9   \"stopLoss\": 150,\n10   \"trailingStop\"\
    : 0,\n11   \"trailingAmount\": 0\n12 }\n```\n\nFrom the 2 examples above, we can\
    \ also see the key used for event date is *time*. Since the same keys are used\
    \ to denote a given attribute, we can create `public static final String` variables\
    \ for these keys. So therefore the concept of the class `OandaJsonKeys` was born.\
    \ Instead of polluting the code with lines below in many classes\n\n```\n1 String\
    \ instrument = (String) instrumentJson.get(\"instrument\");\n```\n\nit is much\
    \ better practice to create a constant and use that instead. The same code snippet\
    \ would look like:\n\n```\n1 String instrument = (String) instrumentJson.get(OandaJsonKeys.instrument);\n\
    ```\n\nThere are a lot of keys, but most of the keys that we use in our trading\
    \ bot are captured in the OandaJsonKeys class.\n\n```\n 1 public class OandaJsonKeys\
    \ {\n\n3 \tprivate OandaJsonKeys() {\n 4 \t}\n\n6 \tpublic static final String\
    \ accounts = \"accounts\";\n 7 \tpublic static final String accountId = \"accountId\"\
    ;\n 8 \tpublic static final String accountCurrency = \"accountCurrency\";\n 9\
