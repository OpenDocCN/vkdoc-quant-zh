  trans: "\n### 12.1.1 核心 Bean 配置\n\n在本节中，我们配置核心 API 中除服务之外的所有核心 Bean，服务将在后续进行配置。这些\
    \ Bean 包括邮件、队列、交易配置等，它们对于机器人的运行至关重要。\n\n由于我们所有的依赖 Bean 都使用了 `@Autowired`，因此我们在配置文件中通过包含\
    \ `<context:annotation-config/>` 来启用注解处理。这将确保所有通过 `@Autowired` 注入的依赖项都能被正确处理。我们还通过在配置文件中包含以下内容来启用属性文件处理，并指定属性文件的查找位置：\n\
    \n```\n<context:property-placeholder location=\"classpath:tradingbot.properties\"\
    \ ignore-unresolvable=\"true\"/>\n```\n\n`tradingbot.properties` 包含以下属性。我们提供了一些示例值以展示其格式。\n\
    \n```\nmail.to=tradingbot@gmail.com\nmail.host=smtp.gmail.com\nmail.port=465\n\
    mail.user=foobar@gmail.com\nmail.password=foobar123\ntwitter.consumerKey=veJerryUYUDHUliDXjlC6o4KR\n\
    twitter.consumerSecret=L5iFptFbLKMyUoH8NB3yAodEe0EQMukriUt3mnNICEKyNp20Ih\ntwitter.accessToken=0123456789-LISP3YO0mLgDOSw44vgdV0Rr7313ZyPrAt0X3jU\n\
    twitter.accessTokenSecret=5IrbOYUlG0Ld7UPeG6GPxFjVNWHREj4MN2TaoTL2kmVTT\n```\n\
    \n我们已经在第 8 章中讨论过 Twitter 集成的属性。`mail` 属性用于在 Spring 配置中配置 `JavaMailSender` Bean，但\
    \ `mail.to` 除外，它实际上是接收机器人所有通知的用户的收件人地址。\n\n现在，我们将注意力转向组成机器人的核心 Bean 的配置。首先是 `TradingConfig`\
    \ 类的配置。必须正确配置此类，其他服务才能正常运行。我们还必须小心配置某些值，因为它们可能会影响所下的订单。例如，`maxAllowedQuantity`\
    \ 是下单的最大数量。在我们的示例中，它只是 `5`，但如果将此值更改为 `50000`，则可能会下巨额订单，如果交易方向相反，可能会导致追加保证金。\n\n\
    让我们简要讨论一下 `TradingConfig` 类中的其他配置参数：\n\n- `minReserveRatio` 是可用于交易的金额占账户总金额的比例。值为\
    \ `0.1` 表示如果此金额低于 10%，机器人将停止下新订单。\n- `maxAllowedNetContracts` 是机器人针对给定货币的最大净多头或净空头持仓量。此设置源于\
    \ 2015 年 1 月 15 日的事件，当时瑞士央行[²] 意外终止了瑞郎兑欧元 1.2 的汇率挂钩，瑞郎因此暴跌近 30%。任何大规模做空瑞郎的人都损失惨重。\n\
    - `minAmountRequired` 是允许机器人下单所需的账户指定货币的最低余额。如果余额低于此阈值，则无法继续下单。\n- `max10yrWmaOffset`\
    \ 定义了货币对的安全区域。我们在讨论 `PreOrderValidationService` 时详细讨论过它。\n- `fadeTheMovePriceExpiry`\
    \ 是观察间隔的时间（以分钟为单位），用于 `FadeTheMove` 策略。\n- `fadeTheMoveJumpReqdToTrade` 是在 `fadeTheMovePriceExpiry`\
    \ 期间所需的净点数跃升，此跃升将创建一个场景，以便在市场变动的相反方向下达限价单。\n- `fadeTheMoveDistanceToTrade` 是当前价格与\
    \ `FadeTheMoveStrategy` 下达的限价单将被成交的位置之间的距离（以点数为单位）。\n- `fadeTheMovePipsDesired`\
    \ 是 `FadeTheMove` 策略期望获得的利润（以点数为单位）。\n\n```\n<bean id=\"tradingConfig\"\n    \
    \    class=\"com.precioustech.fxtrading.tradingbot.TradingConfig\">\n    <property\
    \ name=\"minReserveRatio\" value=\"0.1\"/>\n    <property name=\"maxAllowedQuantity\"\
    \ value=\"10\"/>\n    <property name=\"maxAllowedNetContracts\" value=\"5\"/>\n\
    \    <property name=\"minAmountRequired\" value=\"10.0\"/>\n    <property name=\"\
    mailTo\" value=\"${mail.to}\"/>\n    <property name=\"max10yrWmaOffset\" value=\"\
    0.1\"/>\n    <property name=\"fadeTheMoveJumpReqdToTrade\" value=\"45\"/>\n  \
    \  <property name=\"fadeTheMoveDistanceToTrade\" value=\"25\"/>\n    <property\
    \ name=\"fadeTheMovePipsDesired\" value=\"10\"/>\n    <property name=\"fadeTheMovePriceExpiry\"\
    \ value=\"15\"/>\n</bean>\n```\n\n接下来，我们配置 Google `EventBus` 以及所有使用 `EventBus`\
    \ 来传播事件负载的回调处理器。我们还配置了我们在第一章中讨论过的 Bean 后处理器 `FindEventBusSubscribers`，它会查找所有包含由\
    \ `@Subscriber` 注解的方法的类，并自动将它们注册到 `EventBus` 中。\n\n```\n<bean id=\"eventBus\"\
    \ class=\"com.google.common.eventbus.EventBus\"/>\n<bean id=\"findEventBusSubscribers\"\
    \n    class=\"com.precioustech.fxtrading.tradingbot.spring.FindEventBusSubscribers\"\
    />\n<bean id=\"eventCallback\"\n    class=\"com.precioustech.fxtrading.events.EventCallbackImpl\"\
    >\n    <constructor-arg index=\"0\" ref=\"eventBus\"/>\n</bean>\n<bean id=\"heartBeatCallback\"\
    \n    class=\"com.precioustech.fxtrading.heartbeats.HeartBeatCallbackImpl\">\n\
    \    <constructor-arg index=\"0\" ref=\"eventBus\"/>\n</bean>\n<bean id=\"marketEventCallback\"\
    \n    class=\"com.precioustech.fxtrading.marketdata.MarketEventHandlerImpl\">\n\
    \    <constructor-arg index=\"0\" ref=\"eventBus\"/>\n</bean>\n```\n\n对于 `JavaMailSender`\
    \ Bean，其配置如下所示：\n\n```\n<bean id=\"mailSender\" class=\"org.springframework.mail.javamail.JavaMailSenderImpl\"\
    >\n    <property name=\"host\" value=\"${mail.host}\"/>\n    <property name=\"\
    port\" value=\"${mail.port}\"/>\n    <property name=\"username\" value=\"${mail.user}\"\
    />\n    <property name=\"password\" value=\"${mail.password}\"/>\n    <property\
    \ name=\"javaMailProperties\">\n        <props>\n            <prop key=\"mail.transport.protocol\"\
    >smtps</prop>\n            <prop key=\"mail.smtp.auth\">true</prop>\n        \
    \    <prop key=\"mail.smtp.starttls.enable\">true</prop>\n            <prop key=\"\
    mail.smtp.socketFactory.class\">javax.net.ssl.SSLSocketFactory</prop>\n      \
    \      <prop key=\"mail.debug\">false</prop>\n            <prop key=\"mail.smtp.socketFactory.fallback\"\
    >false</prop>\n        </props>\n    </property>\n</bean>\n```\n\n此 Bean 的占位符在\
    \ `tradingbot.properties` 文件中定义。使用 `JavaMailSender` Bean 发送通知的相关服务配置如下：\n\n```\n\
    <bean id=\"eventEmailNotifier\"\n    class=\"com.precioustech.fxtrading.tradingbot.events.notification.email.EventEmailNotifier\"\
    />\n```\n\n用于下单的 `orderQueue` 配置非常简单。\n\n```\n<bean id=\"orderQueue\" class=\"\
    java.util.concurrent.LinkedBlockingQueue\"/>\n```\n\n我们使用 Spring 内置的任务调度器[^sprsched]\
    \ 来调度我们的任务。一个示例任务是轮询我们已配置的 Twitter 账户的新推文。\n\n```\n<task:scheduler id=\"taskScheduler\"\
    \ pool-size=\"5\"/>\n```\n"
- fmt: "### 12.1.2 Twitter Related Beans Configuration\n\nWe first configure the `TwitterTemplate`\
    \ that enables all interaction with Twitter and is part of Spring Social.\n\n\
    ```\n1 <bean id=\"twitter\" class=\"org.springframework.social.twitter.api.impl.TwitterTemplate\"\
    >\n2 \t\t<constructor-arg index=\"0\" value=\"${twitter.consumerKey}\"/>\n3 \t\
    \t<constructor-arg index=\"1\" value=\"${twitter.consumerSecret}\"/>\n4 \t\t<constructor-arg\
    \ index=\"2\" value=\"${twitter.accessToken}\"/>\n5 \t\t<constructor-arg index=\"\
    3\" value=\"${twitter.accessTokenSecret}\"/>\n6 </bean>\n```\n\nThe placeholders\
    \ for the configuration are all defined in `tradingbot.properties` that we discussed\
    \ in the previous section and is pretty self-explanatory.\n\nNext we configure\
    \ a bean that is a list of all Twitter Accounts that we want to process the tweets\
    \ for. Although not a dependency for other beans, it is used by `SpEL` to inject\
    \ values. For e.g\n\n```\n 1 <bean id=\"fxTweeterList\" class=\"java.util.ArrayList\"\
    >\n 2 \t\t<constructor-arg index=\"0\">\n 3 \t\t\t<list>\n 4 \t\t\t\t<value>SignalFactory</value>\n\
    \ 5 \t\t\t\t<value>Forex_EA4U</value>\n 6 \t\t\t</list>\n 7 \t\t</constructor-arg>\n\
    \ 8 </bean>\n 9 <util:map id=\"tweetHandlerMap\">\n10 \t<entry key=\"#{fxTweeterList[0]}\"\
    >\n11 \t\t<bean class=\n12       \"com.precioustech.fxtrading.tradingbot.social.twitter.tweethandler.SignalFactoryFXTweetHandler\"\
    >\n13 \t\t\t<constructor-arg index=\"0\" value=\"#{fxTweeterList[0]}\"/>\n14 \t\
    \t</bean>\n15 \t</entry>\n16 \t<entry key=\"#{fxTweeterList[1]}\">\n17 \t\t<bean\
    \ class=\n18     \"com.precioustech.fxtrading.tradingbot.social.twitter.tweethandler.ZuluTrader101FXTweetHandler\"\
    >\n19 \t\t\t<constructor-arg index=\"0\" value=\"#{fxTweeterList[1]}\"/>\n20 \t\
    \t</bean>\n21 \t</entry>\n22 </util:map>\n```\n\nThe `SpEL` enables us to define\
    \ all the Twitter accounts in once place and lets us reference the list via expressions\
    \ and inject the value of these expressions into other beans.\n\nIf we need to\
    \ listen to more Twitter account for tweets, we just create or reuse existing\
    \ handlers (if applicable) and configure them here.\n\n### 12.1.3 Provider Beans\
    \ Configuration\n\nIn this section we configure all the beans that implement the\
    \ `Provider` interfaces and are provider specific. Since our discussion throughout\
    \ the book has been based on the OANDA REST API, we define all those inside it’s\
    \ own configuration called `tradingbot-oanda.xml` and which has all it’s properties\
    \ defined in the `tradingbot-oanda.properties` file.\n\nIt is important that the\
    \ `id` given to the beans in this OANDA config file must be reused in other provider\
    \ implementations since the main configuration references these to configure the\
    \ core services bean.\n\nWe first begin by looking at the properties file\n\n\
    ```\n1 oanda.url=https://api-fxtrade.oanda.com\n2 oanda.accessToken=7d741c1234f25d9f5a094e53a356789b-2c9a7b49578904e177210af8e111c2f6\n\
    3 oanda.userName=foo\n4 oanda.accountId=123456\n5 oanda.streaming.url=https://stream-fxtrade.oanda.com\n\
    ```\n\n- `oanda.url` is the url we want to point our trading bot to. Remember\
    \ we have live, practice and sandbox environments provided by OANDA.\n- `oanda.streaming.url`\
    \ is the streaming url for tick data and platform events.\n- `oanda.accessToken`\
    \ is the token which was generated in the environment pointed by `oanda.url`.\n\
    - `oanda.userName` is a valid username in the environment pointed by `oanda.url`\n\
    - `oanda.accountId` is a valid account belonging to the value configured for `oanda.userName`\
    \ in the environment pointed by `oanda.url`. A valid account id is required to\
    \ start a market data stream for example.\n\nWe provide the location of this properties\
    \ file, as usual as a `classpath` location and also turn on the annotation processing,\
    \ like we did for the main configuration file.\n\n```\n1 <context:annotation-config/>\n\
    2 <context:property-placeholder location=\"classpath:tradingbot-oanda.properties\"\
    \n3         ignore-unresolvable=\"true\"/>\n```\n\nWe now list the configurations\
    \ for all the OANDA Provider services\n\n**AccountDataProviderService**\n\n```\n\
    1 <bean id=\"accountDataProvider\" class=\n2   \"com.precioustech.fxtrading.oanda.restapi.account.OandaAccountDataProviderService\"\
    >\n3 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n4 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.userName}\"/>\n5 \t\t<constructor-arg index=\"2\"\
    \ value=\"${oanda.accessToken}\"/>\n6 </bean>\n```\n\n**ProviderHelper**\n\n```\n\
    1 <bean id=\"providerHelper\"\n2     class=\"com.precioustech.fxtrading.oanda.restapi.helper.OandaProviderHelper\"\
    />\n```\n\n**InstrumentDataProvider**\n\n```\n1 <bean id=\"instrumentDataProvider\"\
    \n2   class=\"com.precioustech.fxtrading.oanda.restapi.instrument.OandaInstrumentDataProviderService\"\
    >\n3 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n4 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.accountId}\"/>\n5 \t\t<constructor-arg index=\"\
    2\" value=\"${oanda.accessToken}\"/>\n6 </bean>\n```\n\n**CurrentPriceInfoProvider**\n\
    \n```\n1 <bean id=\"currentPriceInfoProvider\"\n2   class=\"com.precioustech.fxtrading.oanda.restapi.marketdata.OandaCurrentPriceInfoProvider\"\
    >\n3 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n4 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.accessToken}\"/>\n5 </bean>\n```\n\n**HistoricMarketDataProvider**\n\
    \n```\n1 <bean id=\"historicMarketDataProvider\"\n2   class=\"com.precioustech.fxtrading.oanda.restapi.marketdata.historic.OandaHistoricMarketDataProvider\"\
    >\n3 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n4 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.accessToken}\"/>\n5 </bean>\n```\n\n**OrderManagementProvider**\n\
    \n```\n1 <bean id=\"orderManagementProvider\"\n2   class=\"com.precioustech.fxtrading.oanda.restapi.order.OandaOrderManagementProvider\"\
    >\n3 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n4 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.accessToken}\"/>\n5 \t\t<constructor-arg index=\"\
    2\" ref=\"accountDataProvider\"/>\n6 </bean>\n```\n\n**TradeManagementProvider**\n\
    \n```\n1 <bean id=\"tradeManagementProvider\"\n2   class=\"com.precioustech.fxtrading.oanda.restapi.trade.OandaTradeManagementProvider\"\
    >\n3 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n4 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.accessToken}\"/>\n5 </bean>\n```\n\n**PositionManagementProvider**"
