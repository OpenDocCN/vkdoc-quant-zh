    \n### 1.11 *自己试试* 小节\n\n在每章末尾，我们会包含一个或多个小程序（在适当的情况下），这些程序演示了本章讨论的概念，供你实验并立即看到概念的实际效果。这些独立的小程序仅用于演示目的，可能并非最终运行机器人的代码的一部分。这样做是为了让你体验构成机器人组件的相关内容。\n\
