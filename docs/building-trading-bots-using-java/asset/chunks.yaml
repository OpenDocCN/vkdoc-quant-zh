    60   evtStreamingService.startEventsStreaming();\n61   //在接下来的 60 秒内运行 OrderExecutionServiceDemo\n\
    62   Thread.sleep(60000 L);\n63   evtStreamingService.stopEventsStreaming();\n\
    64  }\n65 }\n```\n\n![启动配置](img/00062.jpeg) 启动配置\n![示例输出](img/00063.jpeg) 示例输出\n\
    \n1.  http://developer.oanda.com/rest-live/streaming/#eventsStreaming↩︎\n\n##\
    \ 8\\. 集成 Twitter\n\n现在我们已进入构建交易机器人旅程中可能最激动人心的部分。与社交媒体交互，可能是机器人应具备的最重要能力之一。这在几年前或许并不重要，但现在却极为关键，因为大多数新闻、事件和泄密信息似乎都首先出现在社交媒体上，从而影响市场。能够实时订阅这些信息流、理解其内容并做出决策，为任何机器人增加了一层复杂性。我们的机器人也不例外，只是我们不会尝试每秒处理成千上万条推文，而是学习与\
    \ Twitter 集成的基础知识。我们希望在章节结束时实现以下目标：\n\n*   连接到一个 Twitter 账户。\n*   搜索推文。\n*   解析推文并理解其含义。\n\
    \n我们将特别关注用户发布的关于外汇的推文，这些推文具有清晰的结构，并包含订单和交易信息。这样做的目的是，我们可以构建一种策略，复制他人的操作，或许模仿他们的行动，或许反其道而行之。这将在下一章中详细讨论，作为包含此概念的策略的一部分。\n\
    \n### 8.1 创建 Twitter 应用\n\n在我们可以通过用户账户自动发布和读取推文之前，需要将一个 Twitter 应用关联到该用户账户。为此应用生成的令牌，将用于登录\
    \ Twitter 并通过机器人执行所需操作。让我们逐步操作，直到获得通过 Java 应用连接所需的令牌。\n\n**步骤 1**：访问 [`apps.twitter.com/app/new`](https://apps.twitter.com/app/new)，你将看到以下页面。\n\
    \n![为机器人创建应用](img/00064.jpeg \"步骤 1\") 为机器人创建应用\n\n**步骤 2**：接受协议并提交表单后，我们将看到以下确认页面。\n\
    \n![Twitter 应用创建成功](img/00065.jpeg \"步骤 2\") Twitter 应用创建成功\n\n**步骤 3**：在确认页面，现在必须点击\
    \ *密钥和访问令牌* 选项卡，我们将会看到 *消费者密钥* 和 *消费者密钥秘钥* 显示出来。请记下这些信息，稍后会用到。\n\n![消费者令牌](img/00066.jpeg\
    \ \"步骤 3\") 消费者令牌\n\n**步骤 4**：我们现在可以创建其他访问令牌了。请点击 *令牌操作* 下方的按钮来生成令牌。我们将看到如下页面：\n\
    \n![授权令牌](img/00067.jpeg \"步骤 4\") 授权令牌\n\n现在我们应获得以下 4 个令牌，交易机器人应用需要使用它们通过我们的账户登录。\n\
    \n*   消费者密钥\n*   消费者秘钥\n*   访问密钥令牌\n*   访问密钥秘钥\n\n### 8.2 Spring Social\n\nSpring\
    \ Social^(1) 是与 Facebook、Twitter、LinkedIn 等社交媒体应用集成的既定选择。它提供了连接特定社交网络所需的所有基础设施，让我们专注于实现从这些网络挖掘数据或向这些网络发布数据的逻辑。之前使用过\
    \ Spring 的开发者会识别出与 JMS^(2) 和 JDBC^(3) 相同的模式，在这些模式中，所有中间件和数据库基础设施分别由 Spring 处理，从而让我们全神贯注于手头的任务。\n\
    \n就我们的讨论而言，我们将专注于将机器人集成到 Twitter^(4) 中。\n\n#### 8.2.1 使用和配置 Spring Social\n\n\
    我们需要在 Maven 的 `pm.xml` 文件中添加以下依赖项，以便将 Spring Social 引入机器人生态系统。\n\n```\n1 <dependency>\n\
    2    <groupId>org.springframework.social</groupId>\n3    <artifactId>spring-social-twitter</artifactId>\n\
    4    <version>1.1.0.RELEASE</version>\n5 </dependency>\n```\n\n与 Twitter 的交互是通过\
    \ `TwitterTemplate`^(5) 进行的，需要将其配置到 Spring 配置文件中，使用我们在定义 Twitter 应用时生成的令牌。\n\n\
    ```\n1 <bean id=\"twitter\" class=\"org.springframework.social.twitter.api.impl.TwitterTemplate\"\
    >\n2 \t\t<constructor-arg index=\"0\" value=\"${twitter.consumerKey}\"/>\n3 \t\
    \t<constructor-arg index=\"1\" value=\"${twitter.consumerSecret}\"/>\n4 \t\t<constructor-arg\
    \ index=\"2\" value=\"${twitter.accessToken}\"/>\n5 \t\t<constructor-arg index=\"\
    3\" value=\"${twitter.accessTokenSecret}\"/>\n6 </bean>\n```\n\n现在，`TwitterTemplate`\
    \ 已准备好被注入到任何服务中。\n"
- fmt: "### 8.3 Harvesting FX Tweets\n\nNow we come to the meat of the chapter, where\
    \ we discuss how to harvest (Search) well structured Trade/Order tweets. Our aim\
    \ is to find well structured tweets, which can be parsed to create the following\
    \ POJOs:\n\n- `NewFXTradeTweet`\n\n```java\npublic class NewFXTradeTweet < T >\
    \ extends FXTradeTweet < T > {\n    private final double stopLoss,\n    takeProfit;\n\
    \    private final TradingSignal action;\n    private final String str;\n\n  \
    \  public NewFXTradeTweet(TradeableInstrument < T > instrument, double price,\n\
    \        double stopLoss, double takeProfit,\n        TradingSignal action) {\n\
    \        super(instrument, price);\n        this.stopLoss = stopLoss;\n      \
    \  this.takeProfit = takeProfit;\n        this.action = action;\n        this.str\
    \ = String.format(\"%s@%3.5f TP: %3.5f: SL: %3.5f %s\",\n            instrument.getInstrument(),\
    \ price, takeProfit,\n            stopLoss, action.name());\n    }\n\n    @Override\n\
    \    public String toString() {\n        return str;\n    }\n\n    public TradingSignal\
    \ getAction() {\n        return this.action;\n    }\n\n    public double getStopLoss()\
    \ {\n        return stopLoss;\n    }\n\n    public double getTakeProfit() {\n\
    \        return takeProfit;\n    }\n}\n```\n\n- `CloseFXTradeTweet`\n\n```java\n\
    public class CloseFXTradeTweet < T > extends FXTradeTweet < T > {\n    private\
    \ final double profit,\n    price;\n\n    public CloseFXTradeTweet(TradeableInstrument\
    \ < T > instrument, double profit,\n        double price) {\n        super(instrument,\
    \ price);\n        this.profit = profit;\n        this.price = price;\n    }\n\
    \n    public double getProfit() {\n        return profit;\n    }\n\n    @Override\n\
    \    public double getPrice() {\n        return price;\n    }\n}\n```\n\nwhere\
    \ the base `FXTradeTweet` is\n\n```java\npublic abstract class FXTradeTweet <\
    \ T > {\n    private final TradeableInstrument < T > instrument;\n    private\
    \ final double price;\n\n    public FXTradeTweet(TradeableInstrument < T > instrument,\
    \ double price) {\n        super();\n        this.instrument = instrument;\n \
    \       this.price = price;\n    }\n\n    public TradeableInstrument < T > getInstrument()\
    \ {\n        return instrument;\n    }\n\n    public double getPrice() {\n   \
    \     return price;\n    }\n}\n```\n\nThe concept of well structured trade tweet\
    \ means, a set of Twitter users which consistently tweet in a given format and\
    \ for which we can write a `TweetHandler` for. We are only interested in their\
    \ tweets which are about a new Order or closing a Trade. The reason for this will\
    \ become clearer when we discuss a strategy based on Tweets. For the time being\
    \ lets look at some examples of tweets from user `@SignalFactory`^([6](#part0059.html#fn-sigfact))\
    \ and `@ZuluTrader101`^([7](#part0059.html#fn-zulu)) and it will become clearer\
    \ what I mean.\n\n- Tweets from `@SignalFactory`\n\n![New Trade](images/00068.jpeg\
    \ \"NewTrade\") New Trade ![New Trade](images/00069.jpeg \"NewTrade1\") New Trade\
    \ ![Close Trade](images/00070.jpeg \"CloseTrade\") Close Trade ![Close Trade](images/00071.jpeg\
    \ \"CloseTrade\") Close Trade\n\n- Tweets from `@ZuluTrader101`\n\n![New and Close\
    \ Trades](images/00072.jpeg \"Zulu\") New and Close Trades ![New and Close Trades](images/00073.jpeg\
    \ \"Zulu\") New and Close Trades\n\nLooking at the Tweet examples from the 2 users,\
    \ there is certain format in which they Tweet always. The parsing of these then\
    \ becomes trivial if we assign a dedicated Tweet handler these, which knows how\
    \ to parse Tweets from the given user. We will come back to discussing the handlers\
    \ shortly. Before that lets look at how we search for Tweets from given users.\n\
    \n### 8.3.1 TweetHarvester interface\n\nThe `TweetHarvester` interface mandates\
    \ the search for Tweets for a given user that result in a collection of both new/closed\
    \ trades FX Tweets. Its definition is as follows\n\n```java\npublic interface\
    \ TweetHarvester < T > {\n\n    Collection < NewFXTradeTweet < T >> harvestNewTradeTweets(String\
    \ userId);\n\n    Collection < CloseFXTradeTweet < T >> harvestHistoricTradeTweets(String\
    \ userId,\n        TradeableInstrument < T > instrument);\n}\n```\n\nThe first\
    \ method of the interface is fairly straightforward. This method’s contract is\
    \ to harvest new Trade tweets from a given user since the last search was done.\
    \ The implementer is responsible for keeping track of the timeline and should\
    \ only return the new ones.\n\nThe second method’s contract is again to harvest\
    \ new Tweets, this time for closed trades, since the last search and for a given\
    \ instrument.\n\n### 8.3.2 FXTweetHandler interface\n\nAs we discussed earlier\
    \ on, in this chapter, as long as a given user consistently tweets in a given\
    \ format, a dedicated handler assigned to that fx new/close trade tweet, can parse\
    \ it and create the `NewFxTradeTweet` and `CloseFXTradeTweet` from it. This interface,\
    \ formulates that contract and provide a few other useful methods\n\n```java\n\
    public interface FXTweetHandler < T > {\n\n    FXTradeTweet < T > handleTweet(Tweet\
    \ tweet);\n\n    String getUserId();\n\n    Collection < Tweet > findNewTweets();\n\
    \n    Collection < Tweet > findHistoricPnlTweetsForInstrument(\n        TradeableInstrument\
    \ < T > instrument);\n}\n```\n\nThe first 3 interface methods are fairly self-explanatory.\
    \ The method `findHistoricPnlTweetsForInstrument` requires a bit of explanation.\
    \ The contract for this method is to retrieve all Tweets that were posted by a\
    \ given user for a given instrument and were all close trades tweets, which resulted\
    \ in a PNL figure (for e.g. a positive or a negative pip figure result. Refer\
    \ back to the close trade tweets from the 2 users discussed in this chapter).\
    \ This again probably won’t make much sense now, but will do so when we discuss\
    \ our Twitter based strategy in the next chapter."
