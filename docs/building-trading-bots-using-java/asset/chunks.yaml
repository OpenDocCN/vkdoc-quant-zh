  trans: "\n### 11.1.3 示例实现\n\n在本节中，我们将讨论 `EmailContentGenerator` 接口的一些示例实现。首先，我们来看一个实现，它在平台生成以下交易事件时发送邮件：\n\
    \n- 交易已平仓\n- 触发止损\n- 触发止盈\n\n例如，当触及止盈水平时，我们可以预期收到类似如下的 json 响应：\n\n```json\n{\n\
    \  \"id\":10003,\n  \"accountId\":234567,\n  \"time\":\"1443968061000000\",\n\
    \  \"type\":\"TAKE_PROFIT_FILLED\",\n  \"tradeId\":1800805337,\n  \"instrument\"\
    :\"USD_CHF\",\n  \"units\":3000,\n  \"side\":\"sell\",\n  \"price\":1.00877,\n\
    \  \"pl\":3.48,\n  \"interest\":0.0002,\n  \"accountBalance\":5912.5829\n}\n```\n\
    \n处理来自 OANDA 平台交易事件的 `TradeEventHandler` 同样实现了 `EmailContentGenerator` 接口。因此，生成\
    \ `EmailPayLoad` 的方法如下所示：\n\n```java\n@Override\npublic EmailPayLoad generate(EventPayLoad\
    \ < JSONObject > payLoad) {\n  JSONObject jsonPayLoad = payLoad.getPayLoad();\n\
    \  TradeableInstrument < String > instrument = new TradeableInstrument < String\
    \ > (jsonPayLoad.get(\n    OandaJsonKeys.instrument).toString());\n  final String\
    \ type = jsonPayLoad.get(OandaJsonKeys.type).toString();\n  final long accountId\
    \ = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n  final double accountBalance\
    \ = ((Number) jsonPayLoad.get(OandaJsonKeys.accountBalance)).doubleValue();\n\
    \  final long tradeId = (Long) jsonPayLoad.get(OandaJsonKeys.tradeId);\n  final\
    \ double pnl = ((Number) jsonPayLoad.get(OandaJsonKeys.pl)).doubleValue();\n \
    \ final double interest = ((Number) jsonPayLoad.get(OandaJsonKeys.interest)).doubleValue();\n\
    \  final long tradeUnits = (Long) jsonPayLoad.get(OandaJsonKeys.units);\n  final\
    \ String emailMsg = String\n    .format(\"Trade event %s received for account\
    \ %d. \" + \"Trade id=%d. Pnl=%5.3f, Interest=%5.3f, Trade Units=%d. \" + \"Account\
    \ balance after the event=%5.2f\",\n      type, accountId, tradeId, pnl, interest,\
    \ tradeUnits, accountBalance);\n  final String subject = String.format(\n    \"\
    Order event %s for %s\", type, instrument.getInstrument());\n  return new EmailPayLoad(subject,\
    \ emailMsg);\n}\n```\n\n上述代码从 `JSONObject` 中提取了关键信息，例如：\n\n- `pnl`\n- `interest`\n\
    - `account id`\n- `account balance`\n- 等等…\n\n并为上方的 json 响应生成了如下邮件正文：\n\n```\n\
    Trade event TAKE_PROFIT_FILLED received for account 234567.\nTrade id=1800805337.\
    \ Pnl=3.48, Interest=0, Trade Units=3000.\nAccount balance after the event=5912.58\n\
    ```\n\n生成的邮件主题为：\n\n```\nOrder event TAKE_PROFIT_FILLED for USD_CHF\n```\n\n下一个示例涉及订单成交事件。当此类事件发生时，我们可以预期从\
    \ OANDA 平台收到如下 json：\n\n```json\n{\n  \"id\": 10002,\n  \"accountId\": 123456,\n\
    \  \"time\": \"1443968041000000\",\n  \"type\": \"ORDER_FILLED\",\n  \"instrument\"\
    : \"EUR_USD\",\n  \"units\": 10,\n  \"side\": \"sell\",\n  \"price\": 1,\n  \"\
    pl\": 1.234,\n  \"interest\": 0.034,\n  \"accountBalance\": 10000,\n  \"orderId\"\
    : 0,\n  \"tradeReduced\": {\n    \"id\": 54321,\n    \"units\": 10,\n    \"pl\"\
    : 1.234,\n    \"interest\": 0.034\n  }\n}\n```\n\n处理来自 OANDA 平台订单成交事件的 `OrderFilledEventHandler`\
    \ 同样实现了 `EmailContentGenerator` 接口。因此，生成 `EmailPayLoad` 的方法如下所示：\n\n```java\n\
    @Override\npublic EmailPayLoad generate(EventPayLoad < JSONObject > payLoad) {\n\
    \  JSONObject jsonPayLoad = payLoad.getPayLoad();\n  TradeableInstrument < String\
    \ > instrument = new TradeableInstrument < String > (jsonPayLoad\n    .containsKey(OandaJsonKeys.instrument)\
    \ ? jsonPayLoad.get(OandaJsonKeys.instrument).toString() : \"N/A\");\n  final\
    \ String type = jsonPayLoad.get(OandaJsonKeys.type).toString();\n  final long\
    \ accountId = (Long) jsonPayLoad.get(OandaJsonKeys.accountId);\n  final double\
    \ accountBalance = jsonPayLoad.\n  containsKey(OandaJsonKeys.accountBalance) ?\
    \ ((Number) jsonPayLoad\n    .get(OandaJsonKeys.accountBalance)).doubleValue()\
    \ : 0.0;\n  final long orderId = (Long) jsonPayLoad.get(OandaJsonKeys.id);\n \
    \ final String emailMsg = String.format(\n    \"Order event %s received on account\
    \ %d. Order id=%d. \" + \"Account balance after the event=%5.2f\", type,\n   \
    \ accountId, orderId, accountBalance);\n  final String subject = String.format(\n\
    \    \"Order event %s for %s\", type, instrument.getInstrument());\n  return new\
    \ EmailPayLoad(subject, emailMsg);\n}\n```\n\n上述代码与前一个示例类似，提取了一些关键信息来准备邮件正文，包括：\n\
    \n- `account id`\n- `account balance`\n- `order id`\n\n对于我们的示例，将生成以下正文：\n\n```\n\
    Order event ORDER_FILLED received on account 123456. Order id=10002.\nAccount\
    \ balance after the event=10000.00\n```\n\n而主题将为：\n\n```\nOrder event ORDER_FILLED\
    \ for EUR_USD\n```\n"
- fmt: "### 11.1.4 `EventEmailNotifier` Service\n\nThe `EventEmailNotifier` is a simple\
    \ service which has a `eventEmailContentGeneratorMap` that is injected by Spring\
    \ and configured inside the app Spring configuration file. The map is keyed by\
    \ an instance of `Event` interface and the value is an implementation of the `EmailContentGenerator`\
    \ interface. When an `EventPayLoad` is received by the EventBus inside the `notifyByEmail`\
    \ method, this map is searched for an appropriate instance of `EmailContentGenerator`\
    \ that could handle this payload. If found, this instance then generates an `EmailPayLoad`\
    \ instance. This is then used to construct a `SimpleMailMessage` and sent out\
    \ by the `mailSender`.\n\n```java\npublic class EventEmailNotifier < T > {\n\n\
    \ private static final Logger LOG = Logger.getLogger(EventEmailNotifier.class);\n\
    \n @Autowired\n JavaMailSender mailSender;\n @Resource\n Map < Event,\n EmailContentGenerator\
    \ < T >> eventEmailContentGeneratorMap;\n @Autowired\n TradingConfig tradingConfig;\n\
    \n @Subscribe\n @AllowConcurrentEvents\n public void notifyByEmail(EventPayLoad\
    \ < T > payLoad) {\n  Preconditions.checkNotNull(payLoad);\n  EmailContentGenerator\
    \ < T > emailContentGenerator =\n   eventEmailContentGeneratorMap.get(payLoad.getEvent());\n\
    \  if (emailContentGenerator != null) {\n   EmailPayLoad emailPayLoad = emailContentGenerator.generate(payLoad);\n\
    \   SimpleMailMessage msg = new SimpleMailMessage();\n   msg.setSubject(emailPayLoad.getSubject());\n\
    \   msg.setTo(tradingConfig.getMailTo());\n   msg.setText(emailPayLoad.getBody());\n\
    \   this.mailSender.send(msg);\n  } else {\n   LOG.warn(\"No email content generator\
    \ found for event:\" + payLoad.getEvent().name());\n  }\n }\n}\n```\n\nWe gain\
    \ a better appreciation, if we have a quick look at the Spring config file where\
    \ we configure the events that we want to send notifications out for.\n\n```xml\n\
    <bean id=\"orderEventHandler\"\n  class=\"com.precioustech.fxtrading.oanda.restapi.events.OrderFilledEventHandler\"\
    >\n\t\t<constructor-arg index=\"0\" ref=\"tradeInfoService\"/>\n\t</bean>\n<bean\
    \ id=\"tradeEventHandler\"\nclass=\"com.precioustech.fxtrading.oanda.restapi.events.TradeEventHandler\"\
    >\n\t<constructor-arg index=\"0\" ref=\"tradeInfoService\"/>\n</bean>\n\n<util:map\
    \ id=\"eventEmailContentGeneratorMap\" key-type=\"com.precioustech.fxtrading.events.Event\"\
    >\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).MARKET_ORDER_CREATE}\"\
    \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).LIMIT_ORDER_CREATE}\"\
    \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).ORDER_CANCEL}\"\
    \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.OrderEvents).ORDER_FILLED}\"\
    \n  value-ref=\"orderEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).TRADE_CLOSE}\"\
    \n  value-ref=\"tradeEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).STOP_LOSS_FILLED}\"\
    \n  value-ref=\"tradeEventHandler\"/>\n\t<entry key=\"#{T(com.precioustech.fxtrading.oanda.restapi.events.TradeEvents).TAKE_PROFIT_FILLED}\"\
    \n  value-ref=\"tradeEventHandler\"/>\n</util:map>\n```\n\nIn the config above\
    \ we first configure the 2 handlers, `OrderFilledEventHandler` and `TradeEventHandler`\
    \ that would handle events of type `OrderEvents` and `TradeEvents` respectively,\
    \ both being the implementations of `Event` interface. We then pick our events\
    \ we want the send notifications out for and configure them here.\n\nThis concludes\
    \ our short discussion of the email notifications.\n\n### 11.2 Try it yourself\n\
    \nIn this section we are going to write a sample Spring configured demo program\
    \ in which we simulate the posting of a trade event using the EventBus and see\
    \ the actual notifications turn up in the mailbox. First lets look at the code\n\
    \n```java\npackage com.precioustech.fxtrading.tradingbot.events.notification.email;\n\
    \nimport java.util.Map;\n\nimport org.json.simple.JSONObject;\nimport org.springframework.context.ApplicationContext;\n\
    import org.springframework.context.support.ClassPathXmlApplicationContext;\n\n\
    import com.google.common.collect.Maps;\nimport com.google.common.eventbus.EventBus;\n\
    import com.precioustech.fxtrading.events.EventPayLoad;\nimport com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys;\n\
    import com.precioustech.fxtrading.oanda.restapi.events.TradeEvents;\n\npublic\
    \ class EventEmailNotifierDemo {\n\n @SuppressWarnings(\"unchecked\")\n public\
    \ static void main(String[] args) {\n  ApplicationContext appContext =\n   new\
    \ ClassPathXmlApplicationContext(\"emailnotify-demo.xml\");\n  EventEmailNotifier\
    \ < JSONObject > emailNotifier =\n   appContext.getBean(EventEmailNotifier.class);\n\
    \  EventBus eventBus = new EventBus();\n  eventBus.register(emailNotifier);\n\n\
    \  Map < String, Object > payload = Maps.newHashMap();\n  payload.put(OandaJsonKeys.instrument,\
    \ \"GBP_USD\");\n  payload.put(OandaJsonKeys.type, TradeEvents.TAKE_PROFIT_FILLED.name());\n\
    \  payload.put(OandaJsonKeys.accountId, 123456 l);\n  payload.put(OandaJsonKeys.accountBalance,\
    \ 127.8);\n  payload.put(OandaJsonKeys.tradeId, 234567 l);\n  payload.put(OandaJsonKeys.pl,\
    \ 11.8);\n  payload.put(OandaJsonKeys.interest, 0.27);\n  payload.put(OandaJsonKeys.units,\
    \ 2700 l);\n\n  JSONObject jsonObj = new JSONObject(payload);\n  eventBus.post(new\
    \ EventPayLoad < JSONObject > (TradeEvents.TAKE_PROFIT_FILLED, jsonObj));\n }\n\
    \n}\n```\n\nIn the code above we create an instance of `JSONObject` by hand and\
    \ post it to the EventBus. The configuration that drives this program looks like"
