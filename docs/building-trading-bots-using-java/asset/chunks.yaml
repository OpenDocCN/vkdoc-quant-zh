  trans: "\n# 3. 可交易品种\n\n本章我们将重点介绍经纪平台上可供交易的品种。品种实体是交易平台的核心，因为一切都围绕它展开。从获取报价到下达订单/交易，品种都是其中的主要角色。闲言少叙，让我们直接进入描述可交易品种的\
    \ POJO 类。\n\n代码清单 3.1：TradeableInstrument POJO 定义\n\n```java\n 1 /**\n  2  *\n\
    \  3  * @param <T>\n  4  *            instrumentId 的类型\n  5  */\n  6 public class\
    \ TradeableInstrument < T > {\n 7  private final String instrument;\n 8  private\
    \ final String description;\n 9  private final T instrumentId;\n10  private final\
    \ double pip;\n11  private final int hash;\n12  private InstrumentPairInterestRate\
    \ instrumentPairInterestRate;\n\n14  public TradeableInstrument(String instrument)\
    \ {\n15   this(instrument, null);\n16  }\n\n18  public TradeableInstrument(String\
    \ instrument, String description) {\n19   this(instrument, null, description);\n\
    20  }\n\n22  public TradeableInstrument(String instrument, T instrumentId, String\
    \ description) {\n23   this(instrument, instrumentId, 0, null);\n24  }\n\n26 \
    \ public TradeableInstrument(final String instrument, final double pip,\n27  \
    \ InstrumentPairInterestRate instrumentPairInterestRate, String description) {\n\
    28   this(instrument, null, pip, instrumentPairInterestRate, description);\n\n\
    30  }\n\n32  public TradeableInstrument(final String instrument, T instrumentId,\
    \ final double pip,\n33   InstrumentPairInterestRate instrumentPairInterestRate)\
    \ {\n34   this(instrument, instrumentId, pip, instrumentPairInterestRate, null);\n\
    35  }\n\n37  public TradeableInstrument(final String instrument, T instrumentId,\
    \ final double pip,\n38   InstrumentPairInterestRate instrumentPairInterestRate,\
    \ String description) {\n39   this.instrument = instrument;\n40   this.pip = pip;\n\
    41   this.instrumentPairInterestRate = instrumentPairInterestRate;\n42   this.instrumentId\
    \ = instrumentId;\n43   this.description = description;\n44   this.hash = calcHashCode();\n\
    45  }\n\n47  private int calcHashCode() {\n48   final int prime = 31;\n49   int\
    \ result = 1;\n50   result = prime * result + ((instrument == null) ? 0 : instrument.hashCode());\n\
    51   result = prime * result + ((instrumentId == null) ? 0 : instrumentId.hashCode());\n\
    52   return result;\n53  }\n\n55  public T getInstrumentId() {\n56   return this.instrumentId;\n\
    57  }\n\n59  public String getDescription() {\n60   return description;\n61  }\n\
    \n63  @Override\n64  public int hashCode() {\n65   return hash;\n66  }\n\n68 \
    \ @Override\n69  public boolean equals(Object obj) {\n70   if (this == obj)\n\
    71    return true;\n72   if (obj == null)\n73    return false;\n74   if (getClass()\
    \ != obj.getClass())\n75    return false;\n76   @SuppressWarnings(\"unchecked\"\
    )\n77   TradeableInstrument < T > other = (TradeableInstrument < T > ) obj;\n\
    78   if (instrument == null) {\n79    if (other.instrument != null) {\n80    \
    \ return false;\n81    }\n82   } else if (!instrument.equals(other.instrument))\
    \ {\n83    return false;\n84   }\n85   if (instrumentId == null) {\n86    if (other.instrumentId\
    \ != null) {\n87     return false;\n88    }\n89   } else if (!instrumentId.equals(other.instrumentId))\
    \ {\n90    return false;\n91   }\n92   return true;\n93  }\n\n95  public InstrumentPairInterestRate\
    \ getInstrumentPairInterestRate() {\n96   return instrumentPairInterestRate;\n\
    97  }\n\n99  public void setInstrumentPairInterestRate(InstrumentPairInterestRate\
    \ instrumentPairInterestRate) {\n100   this.instrumentPairInterestRate = instrumentPairInterestRate;\n\
    101  }\n\n103  @Override\n104  public String toString() {\n105   return \"TradeableInstrument\
    \ [instrument=\" + instrument + \", description=\" + description + \", instrumentId=\"\
    \ + instrume\\\n106 ntId + \", pip=\" + pip + \", instrumentPairInterestRate=\"\
    \ + instrumentPairInterestRate + \"]\";\n107  }\n\n109  public String getInstrument()\
    \ {\n110   return instrument;\n111  }\n\n113  public double getPip() {\n114  \
    \ return pip;\n115  }\n116 }\n```\n\n`TradeableInstrument` 定义相当直接，但包含一个泛型参数 `T`，以适应不同经纪平台上不同类型的品种\
    \ ID。我们还提供了几个构造函数来构建我们的 POJO。构建 POJO 所需的最小属性是 `instrument` 属性。\n\n该 POJO 包含以下属性：\n\
    \n```\n1 private final String instrument;\n2 private final String description;\n\
    3 private final T instrumentId;\n4 private final double pip;\n5 private InstrumentPairInterestRate\
    \ instrumentPairInterestRate;\n```\n\n前两个属性不言自明。`InstrumentId` 代表该品种在给定平台上的内部标识符。在某些平台上，可能需要传递此\
    \ ID 而非实际的品种代码（如 `GBP_USD`）来下达订单/进行交易。它还与 `instrument` 属性一起参与了 `hashCode()` 和\
    \ `equals()` 方法的定义。\n\n据我所知，`pip` 是给定品种跳动的最小精度。例如，`USDJPY` 的 pip 值为 `0.001`，这意味着\
    \ `USDJPY` 价格的最小变动单位是 `0.001`。如果当前 `USDJPY` 的价格是 `123.462`，那么下一次价格变动的最小可能值要么是\
    \ `123.461`，要么是 `123.463`。\n\n`instrumentPairInterestRate` 是一个有趣的属性，它可能并非在所有的平台上都可获得。从下面的定义可以看出，它可以捕获一些重要信息，例如持有给定品种的多头或空头头寸时可能产生的费用。简而言之，融资费用是因持有某个货币对的头寸而由经纪平台支付或向经纪平台支付的一笔货币金额。例如，在撰写本文时，持有\
    \ `NZDCHF` 多头头寸的人将获得一定金额，但反过来，持有 `NZDCHF` 空头头寸的人则需要支付一定金额。这个值源于所涉及两种货币的利率差异（纽元基准利率=3%，瑞郎基准利率=0%）。\n\
    \n代码清单 3.2：InstrumentPairInterestRate POJO 定义\n\n```java\n 1 package com.precioustech.fxtrading.instrument;\n\
    \n3 public class InstrumentPairInterestRate {\n\n5  private final Double baseCurrencyBidInterestRate;\n\
    \ 6  private final Double baseCurrencyAskInterestRate;\n 7  private final Double\
    \ quoteCurrencyBidInterestRate;\n 8  private final Double quoteCurrencyAskInterestRate;\n\
    \n10  public InstrumentPairInterestRate() {\n11   this(null, null, null, null);\n\
    12  }\n\n14  public InstrumentPairInterestRate(Double baseCurrencyBidInterestRate,\n\
    15   Double baseCurrencyAskInterestRate, Double quoteCurrencyBidInterestRate,\n\
    16   Double quoteCurrencyAskInterestRate) {\n17   this.baseCurrencyBidInterestRate\
    \ = baseCurrencyBidInterestRate;\n18   this.baseCurrencyAskInterestRate = baseCurrencyAskInterestRate;\n\
    19   this.quoteCurrencyBidInterestRate = quoteCurrencyBidInterestRate;\n20   this.quoteCurrencyAskInterestRate\
    \ = quoteCurrencyAskInterestRate;\n21  }\n\n23  public Double getBaseCurrencyBidInterestRate()\
    \ {\n24   return baseCurrencyBidInterestRate;\n25  }\n\n27  public Double getBaseCurrencyAskInterestRate()\
    \ {\n28   return baseCurrencyAskInterestRate;\n29  }\n\n31  public Double getQuoteCurrencyBidInterestRate()\
    \ {\n32   return quoteCurrencyBidInterestRate;\n33  }\n\n35  public Double getQuoteCurrencyAskInterestRate()\
    \ {\n36   return quoteCurrencyAskInterestRate;\n37  }\n\n39  @Override\n40  public\
    \ String toString() {\n41   return \"InstrumentPairInterestRate [baseCurrencyBidInterestRate=\"\
    \ + baseCurrencyBidInterestRate + \", baseCurrencyAskIn\\\n42 terestRate=\" +\
    \ baseCurrencyAskInterestRate + \", quoteCurrencyBidInterestRate=\" + quoteCurrencyBidInterestRate\
    \ + \", quote\\\n43 CurrencyAskInterestRate=\" + quoteCurrencyAskInterestRate\
    \ + \"]\";\n44  }\n45 }\n```\n"
- fmt: "### 3.1 `InstrumentDataProvider` Interface\n\nWe must now define the interface\
    \ that the provider must implement to get instrument data. Like accounts, we are\
    \ only interested in readonly data as there is nothing that we can create, update\
    \ or delete regarding instruments on the brokerage platform. It is a very simple\
