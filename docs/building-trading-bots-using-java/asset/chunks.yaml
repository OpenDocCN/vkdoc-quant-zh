    \ #外汇 #金融 #金钱\n\n8 卖出 0.43 手 #EURUSD 1.13117 止损 1.13281 止盈 1.12963 | 在 http://goo.gl/moaYzx\
    \ 免费自动跟单 #外汇 #金融 #金钱\n\n10 买入 0.66 手 #EURGBP 0.73532 止损 0.70534 | 在 http://goo.gl/moaYzx\
    \ 免费自动跟单 #外汇 #金融 #金钱\n\n12 //平仓交易\n13 平仓买入 0.64 手 #USDJPY 118.773，盈利 +17.7 点，今日总计\
    \ -136.7 点\n\n15 平仓卖出 0.69 手 #NZDUSD 0.75273，盈利 +8.4 点，今日总计 -1072.8 点\n\n17 平仓买入\
    \ 7.0 手 #XAUUSD 1207.94，亏损 -549.0 点，今日总计 -1731.4 点\n```\n\n针对开仓交易，我们可以对该用户做出以下观察（假设我们最初通过分隔符\
    \ `|` 解析整个推文并得到两个令牌）：\n\n*   交易行为始终是单词 `Bought` 或 `Sold`，并且是第一个令牌的第一个单词。\n*  \
    \ 货币对始终是第一个令牌中以 `#` 开头的第四个单词。\n*   价格始终是第一个令牌中的第五个单词。\n*   止损价格是可选的，仅在第一个令牌中关键字\
    \ `SL` 之后的下一个单词出现。\n*   止盈价格是可选的，仅在第一个令牌中关键字 `TP` 之后的下一个单词出现。\n\n针对平仓交易，我们可以对该用户做出以下观察：\n\
    \n*   货币对始终是推文中以 `#` 开头的第五个单词。\n*   平仓价格始终是推文中的第六个单词。\n*   盈亏数字始终是推文中的第八个单词。\n\
    \n一个通用观察：\n\n*   如果一条推文以单词 `Closed` 开头，则它属于“平仓交易”。\n*   如果一条推文以单词 `Bought` 或 `Sold`\
    \ 开头，则它属于“开仓交易”。\n\n现在让我们将注意力转向代码实现。\n\n```\n 1 public class ZuluTrader101FXTweetHandler\n\
    \  2 extends AbstractFXTweetHandler < String > {\n\n4  protected ZuluTrader101FXTweetHandler(String\
    \ userId) {\n  5   super(userId);\n  6  }\n\n8  private int idxOfTP(String[] tokens)\
    \ {\n  9   int idx = 0;\n 10   for (String token: tokens) {\n 11    if (\"TP\"\
    .equals(token)) {\n 12     return idx;\n 13    }\n 14    idx++;\n 15   }\n 16\
    \   return -1;\n 17  }\n\n19  private int idxOfSL(String[] tokens) {\n 20   int\
    \ idx = 0;\n 21   for (String token: tokens) {\n 22    if (\"SL\".equals(token))\
    \ {\n 23     return idx;\n 24    }\n 25    idx++;\n 26   }\n 27   return -1;\n\
    \ 28  }\n\n30  @Override\n 31  protected NewFXTradeTweet < String > parseNewTrade(String[]\
    \ tokens) {\n\n33   String currencyPair = null;\n 34   try {\n 35    String ccyWithHashTag\
    \ = tokens[3];\n 36    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
    \ 37    double price = Double.parseDouble(tokens[4]);\n 38    TradingSignal signal\
    \ = BOUGHT.equals(tokens[0]) ? TradingSignal.LONG :\n 39     TradingSignal.SHORT;\n\
    \ 40    double stopLoss = 0.0;\n 41    double takeProfit = 0.0;\n 42    int idxTp\
    \ = idxOfTP(tokens);\n 43    if (idxTp != -1) {\n 44     takeProfit = Double.parseDouble(tokens[idxTp\
    \ + 1]);\n 45    }\n 46    int idxSl = idxOfSL(tokens);\n 47    if (idxSl != -1)\
    \ {\n 48     stopLoss = Double.parseDouble(tokens[idxSl + 1]);\n 49    }\n 50\
    \    return new NewFXTradeTweet < String > (new TradeableInstrument < String >\
    \ (currencyPair), price, stopLoss,\n 51     takeProfit, signal);\n 52   } catch\
    \ (Exception e) {\n 53    LOG.info(\n 54     String.format(\" got err %s parsing\
    \ tweet tokens for new trade \",\n 55      e.getMessage()));\n 56    return null;\n\
    \ 57   }\n\n59  }\n\n61  @Override\n 62  protected CloseFXTradeTweet < String\
    \ > parseCloseTrade(String[] tokens) {\n\n64   String currencyPair = null;\n 65\
    \   try {\n 66    String ccyWithHashTag = tokens[4];\n 67    currencyPair = this.providerHelper.fromHashTagCurrency(ccyWithHashTag);\n\
    \ 68    String strPnlPips = tokens[7];\n 69    return new CloseFXTradeTweet <\
    \ String > (new TradeableInstrument < String > (currencyPair), Double\n 70   \
    \  .parseDouble(strPnlPips), Double.parseDouble(tokens[5]));\n 71   } catch (Exception\
    \ e) {\n 72    LOG.info(\n 73     String.format(\" got err %s parsing tweet tokens\
    \ for close trade:\",\n 74      e.getMessage()));\n 75    return null;\n 76  \
    \ }\n\n78  }\n\n80  @Override\n 81  public FXTradeTweet < String > handleTweet(Tweet\
    \ tweet) {\n 82   String tweetTxt = tweet.getText();\n 83   String tokens[] =\
    \ tweetTxt.trim().split(TradingConstants.SPACE_RGX);\n 84   if (tweetTxt.startsWith(CLOSED))\
    \ {\n 85    return parseCloseTrade(tokens);\n 86   } else if (tweetTxt.startsWith(BOUGHT)\
    \ || tweetTxt.startsWith(SOLD)) {\n 87    return parseNewTrade(tokens);\n 88 \
    \  }\n 89   return null;\n 90  }\n\n92  @Override\n 93  public Collection < Tweet\
    \ >\n 94  findHistoricPnlTweetsForInstrument(TradeableInstrument < String > instrument)\
    \ {\n 95   String isoInstr = TradingConstants.HASHTAG +\n 96    this.providerHelper.toIsoFormat(instrument.getInstrument());\n\
    \ 97   SearchResults results = twitter.searchOperations().search(\n 98    String.format(\"\
    from:%s AND %s AND \\\"Closed Buy\\\" OR \\\"Closed Sell\\\"\",\n 99     getUserId(),\
    \ isoInstr));\n100   return results.getTweets();\n101  }\n\n103 }\n```\n\n与之前一样，操作从\
    \ `handleTweet(Tweet tweet)` 方法开始。这次我们基于关于哪些推文是开仓、平仓或无法解析的通用观察，采用了略微不同的逻辑。假设它要么是开仓要么是平仓交易，我们继续解析推文。解析过程完全遵循上述观察结果中提到的逻辑。\n\
    \n最后剩下的需要讨论的事项是该用户的 `findHistoricPnlTweetsForInstrument` 方法。如同用户 `@SignalFactory`\
    \ 一样，我们需要找到该用户用来表示已平仓交易的短语。从我们对平仓交易的观察来看，该用户 `@ZuluTrader101` 的推文中包含短语 `Closed\
    \ Buy` 或 `Closed Sell`。因此，我们的查询语句类似于 `from:%s AND %s AND \"Closed Buy\" OR \"\
    Closed Sell\"`。在我们继续之前，提一下关于 Twitter 搜索 API 的一点。如果我们用双引号括起一个短语，意味着我们正在寻找该短语的精确匹配。这正是我们为该用户所需要的。\n"
