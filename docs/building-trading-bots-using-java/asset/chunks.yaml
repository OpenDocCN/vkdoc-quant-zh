    `startMarketDataStreaming()` 首先调用 `stopMarketDataStreaming()`。这是为了确保停止可能正在消费事件的现有线程，并启动一个新线程。这样做的原因在于，我们可能会遇到连接问题，有时需要重新启动流。假设在此之后，没有现有线程消费市场数据事件，我们就可以创建一个新线程来开始消费事件。我们看到
    `run()` 方法仅在条件 `line = br.readLine()) != null && serviceUp` 为 `false` 时退出。`serviceUp`
    的值在调用 `stopMarketDataStreaming()` 方法时被设为 `false`。如果先前为流式传输设置的 `BufferedReader`
    停止流式传输事件并返回 `null`，这也会导致 `while` 循环终止，从而导致流线程终止。假设流正在为所需工具流式传输市场数据事件，我们应该会看到类似下面这样的
