    \nThe public method actually delegates to a private method where the main action\
    \ happens. The processing starts by invoking the `getSingleAccountUrl()` method\
    \ to prepare the url to be sent to OANDA REST API. We then instantiate an `HttpGet`\
    \ request providing the url to fetch information from. Before we trigger the request,\
    \ we must not forget the set the authentication header without which the request\
    \ will not be successful. After `httpGet.setHeader(authHeader)` we are now set\
    \ to make the request. Using the `httpClient` object we can now fire off our GET\
    \ request. If HTTP 200 is returned and `TradingUtils.responseToString` is able\
    \ to convert the response to String, we should now have a valid JSON string payload\
    \ something similar to **Listing 2.3**. Now all what is left is to parse this\
    \ payload and construct the `Account` POJO. One may be wondering why this peculiar\
    \ code like\n\n```\n1 final double accountBalance = ((Number) accountJson.get(balance)).doubleValue();\n\
    ```\n\nWhy do we have the cast this to a `Number` object and then call `doubleValue()`\
    \ instead of just casting to the `Double` object? The answer is that for some\
    \ keys which are presumed double, if the value is a whole number, the json response\
    \ will not have a decimal value, instead would have a Long. So for e.g. let’s\
    \ say that the account balance is at a given time 3000.00 the value in the response\
    \ will be something like\n\n```\n1 \"balance\" : 3000\n```\n\nThe cast to `Double`\
    \ directly will fail with a `ClassCastException`, hence we use this workaround\
    \ to circumvent this subtlety in parsing.\n\nWe must now provide an implementation\
    \ for getting a Collection of available accounts as per the interface contract.\n\
