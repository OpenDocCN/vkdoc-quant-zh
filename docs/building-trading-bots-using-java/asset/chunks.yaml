  trans: "\n### 1.6.3 OANDA 实现的构造函数依赖项\n\n所有核心 API 规范的 OANDA 实现都有接受以下参数的构造函数：\n\n\
    - `API url`\n- `username`\n- `access token`\n\n我们知道，OANDA 提供不同的环境来运行我们的机器人，例如沙箱、模拟盘和实盘。这些环境拥有不同的\
    \ URL、访问令牌，并且同一用户在不同环境下的用户名也可能不同。这些外部配置属性会作为构造函数参数传递给各个 OANDA 实现。例如：\n\n```java\n\
    1 public OandaAccountDataProviderService(final String url, final String userName,\
    \ final String accessToken) {\n2 \tthis.url = url;\n3 \tthis.userName = userName;\n\
    4 \tthis.authHeader = OandaUtils.createAuthHeader(accessToken);\n5 }\n```\n\n\
    如下所示，这些参数在 Spring 配置中被传递给该实现：\n\n```xml\n1 <bean id=\"accountDataProvider\" class=\"\
    com.precioustech.fxtrading.oanda.restapi.account.OandaAccountDataProviderService\"\
    >\n2 \t\t<constructor-arg index=\"0\" value=\"${oanda.url}\"/>\n3 \t\t<constructor-arg\
    \ index=\"1\" value=\"${oanda.userName}\"/>\n4 \t\t<constructor-arg index=\"2\"\
    \ value=\"${oanda.accessToken}\"/>\n5 </bean>\n```\n\n由于这些变量在属性文件中定义，我们无需重新构建或修改代码，即可在运行时轻松更改它们。只需修改属性文件即可。在后续章节中详细讨论配置时，我们会更深入地探讨这个主题。\n\
    \n### 1.7 事件驱动架构\n\n任何交易系统的核心都是其事件驱动架构。系统必须对市场事件、社交媒体事件、用户事件以及可能来自外部/内部来源的大量其他事件做出响应。这些事件可能进一步触发一连串事件，导致系统中各种业务/领域对象的状态发生改变。真正的技术挑战在于，确保这些状态转换以线程安全的方式进行，并在需要时有事务作为支撑。\n\
    \n事件驱动系统的核心是一个或多个事件循环。这些事件循环通常在一个无限的 `while` 循环中运行，等待来自队列或实时流的事件。对于 OANDA 市场数据跳动事件，我们有一个如下的事件循环：\n\
    \n```java\n 1 this.streamThread = new Thread(new Runnable() {\n 3 @Override\n\
    \ 4 public void run() {\n 5  CloseableHttpClient httpClient = getHttpClient();\n\
    \ 6   try {\n 7    BufferedReader br = setUpStreamIfPossible(httpClient);\n 8\
    \     if (br != null) {\n 9      String line;\n10       while ((line = br.readLine())\
    \ != null && serviceUp) {\n11        Object obj = JSONValue.parse(line);\n12 \
    \        JSONObject instrumentTick = (JSONObject) obj;\n13         ...\n14   \
    \      ...\n```\n\n在上述代码片段中，我们有一个无限的 `while` 循环，用于监听 OANDA 平台推送到实时流中的新 ticks。当接收到一个\
    \ tick 的 JSON 负载时，它会被解析，并通过队列或事件总线进一步分发。\n\n![典型事件链](img/00009.jpeg \"事件链\") 典型事件链\n\
    \n该图描绘了可能由单个事件触发的典型事件链。\n\n1.  从流中接收到 Tick 事件。\n2.  事件被解析并发送到 `EventBus`。\n3.\
    \  策略组件订阅了此事件，并从 `EventBus` 接收到回调。\n4.  策略组件根据最新的 tick 数据事件决定生成一个交易信号，并将该信号放入\
    \ `OrderQueue`。\n5.  `OrderExecutionService` 获取此信号，创建一个 `new order` 负载，并将其发布到平台。\n\
    6.  平台执行该订单，并通过 `order event loop` 向下发送一个事件。\n7.  该事件可以进一步触发某个操作，例如更新 `trades\
    \ cache`。\n\n这基本上就是事件驱动架构的本质。由于我们可能同时有多个组件在运行，因此尽可能解耦组件至关重要，这样可以在零修改或最小修改的情况下添加新的发布者和订阅者。这种架构有利于利用\
    \ Java 的多线程编程能力。然而，同样道理，它也要求开发者在执行缓存中业务对象（例如示例中的 `trades cache`）的状态变更时必须格外谨慎。我们必须设置足够的同步和锁定机制，以确保共享对象的状态始终保持一致。\n"
- fmt: "#### 1.7.1 Google EventBus\n\n`Google EventBus`（见[7](#part0014.html#fn-eventbus)），是`guava`库的一部分，是一个优秀的消息中介，有助于实现服务的松耦合，并允许它们之间进行发布-订阅风格的通信。它最酷的特性是，只需添加一个注解就能添加订阅者，而无需明确知道发布者是谁。\n\
    \n`EventBus`的维基页面上有很多有用的信息，但值得讨论一下它在交易机器人生态系统中的用法。以传播市场数据事件到一个或多个订阅者的用例为例。假设Spring\
    \ DI容器已经创建了一个单例的`EventBus`：\n\n* **自动注册订阅者：** 这里我们编写一个`BeanPostProcessor`来自动查找带有`@Subscribe`注解的方法的bean，并调用`eventBus.register`方法来注册订阅者。\n\
    \n```java\npublic class FindEventBusSubscribers implements BeanPostProcessor {\n\
    \n @Autowired\n private EventBus eventBus;\n private static final Logger LOG =\
    \ Logger.getLogger(FindEventBusSubscribers.class);\n\n @Override\n public Object\
    \ postProcessAfterInitialization(Object bean, String beanName) throws BeansException\
    \ {\n  Method[] beanMethods = bean.getClass().getMethods();\n  for (Method beanMethod:\
    \ beanMethods) {\n   if (beanMethod.isAnnotationPresent(Subscribe.class)) {\n\
    \    eventBus.register(bean);\n    LOG.info(\n     String.format(\"Found event\
    \ bus subscriber class %s. Subscriber method name=%s\",\n      bean.getClass().getSimpleName(),\
    \ beanMethod.getName()));\n    break;\n   }\n  }\n  return bean;\n }\n\n @Override\n\
    \ public Object postProcessBeforeInitialization(Object bean, String beanName)\
    \ throws BeansException {\n  return bean;\n }\n\n}\n```\n\n* **创建发布者：** 只需调用`post(Object\
    \ payload)`即可将消息发布到`EventBus`。\n\n```java\npublic MarketEventHandlerImpl(EventBus\
    \ eventBus) {\n this.eventBus = eventBus;\n}\npublic void onMarketEvent(TradeableInstrument\
    \ < T > instrument, double bid, double ask, DateTime eventDate) {\n MarketDataPayLoad\
    \ < T > payload = new MarketDataPayLoad < T > (instrument, bid, ask, eventDate);\n\
    \ eventBus.post(payload);\n}\n```\n\n* **消费负载：** `EventBus`通过匹配方法中传入的输入类型以及`@Subscribe`注解，来找到合适的订阅者。该方法必须有一个且仅有一个输入参数。可以选择尽可能细粒度或粗粒度的订阅方式。在粗粒度订阅的情况下，输入参数是一个对象，它是系统中所有已知负载的父类。最坏的情况是负载为`java.lang.Object`，此时订阅是最粗粒度的。该方法将对系统中执行的每次`eventBus.post`调用。另一方面，使用单个子类型作为方法的输入参数，使得订阅极其细粒度。在下面的例子中，`handleMarketDataEvent`仅在负载类型为`MarketDataPayLoad`或其任何子类型时，才会被`EventBus`调用。\n\
    \n```java\n@Subscribe\n@AllowConcurrentEvents\npublic void handleMarketDataEvent(MarketDataPayLoad<T>\
    \ marketDataPayLoad) {\n\tif (instrumentRecentPricesCache.containsKey(marketDataPayLoad.getInstrument()))\
    \ {\n\t\tinstrumentRecentPricesCache.get(\n\t\tmarketDataPayLoad.getInstrument())\n\
    \t\t.put(marketDataPayLoad.getEventDate(),marketDataPayLoad);\n\t}\n}\n```\n\n\
    ### 1.8 Provider Helper interface\n\n通常，不同的平台提供商对货币对的表示方式不同。`Cable`可以通过以下多种方式表示：\n\
    \n* `GBP_USD`\n* `GBPUSD`\n* `GBP/USD`\n* `GBP-USD`\n\n类似地，买入货币对的行为可以通过以下方式表示：\n\
    \n* `buy`\n* `long`\n* `+1`（或其他任何正数）\n* 平台特定的枚举，例如`TRADEACTION.BUY`\n\n为了处理不同提供商在表示法上的这种差异，我们需要创建一个提供方法来处理这些差异的接口。它看起来像这样：\n\
    \n```java\n/**\n *\n * @param <T>\n *            The type of Long/Short notation\n\
    \ */\npublic interface ProviderHelper < T > {\n\n /**\n  *\n  * @param instrument\n\
    \  *            in ISO currency standard, such as GBPUSD\n  * @return currency\
    \ pair denoted in the platform specific format\n  */\n String fromIsoFormat(String\
    \ instrument);\n\n /**\n  *\n  * @param instrument\n  *            in platform\
    \ specific format such as GBP_USD\n  * @return currency pair denoted in ISO format\n\
    \  */\n String toIsoFormat(String instrument);\n\n /**\n  *\n  * @param instrument\n\
    \  *            in a 7 character format, separated by an arbitrary separator\n\
    \  *            character like -,/,_\n  * @return currency pair denoted in the\
    \ platform specific format\n  */\n String fromPairSeparatorFormat(String instrument);\n\
    \n /**\n  *\n  * @param instrument\n  *            denoted as a hashtag, for e.g.\
    \ #GBPUSD\n  * @return currency pair denoted in the platform specific format\n\
    \  */\n String fromHashTagCurrency(String instrument);\n\n /**\n  *\n  * @return\
    \ T that denotes the action of Buying the currency pair on the\n  *         platform\n\
    \  */\n T getLongNotation();\n\n /**\n  *\n  * @return T that denotes the action\
    \ of Selling the currency pair on the\n  *         platform\n  */\n T getShortNotation();\n\
    }\n```\n\n之所以需要这个接口，是我在消费来自Twitter和发布经济事件的外部网站等外部源的数据时感受到的。不同的Twitter用户和外部网站有自己表示货币对以及多头/空头交易的方式。为了处理这种繁多的约定，强烈感受到了这种接口的必要性。我很确定还会有更多需要以平台特定方式解读的情况，因此应当被添加到此接口中。"
  raw: "#### 1.7.1 Google EventBus\n\nGoogle EventBus^([7](#part0014.html#fn-eventbus)),\
    \ which is part of the *guava* library, is an excellent broker to facilitate loose\
    \ coupling of our services and to allow publish-subscribe style communication\
    \ between them. The coolest feature about it, is the ability to add subscribers\
    \ just by adding an annotation without having the explicit need of knowing who\
    \ the publisher is.\n\nLots of useful information is found on the wiki page of\
    \ the EventBus but it would be worth discussing how it is used in the trading\
    \ bot ecosystem. Lets take the use case of disseminating market data event, to\
    \ one or multiple subscribers. Assuming a singleton EventBus has been created\
    \ by the Spring DI container,\n\n*   **Register Subscribers automatically:** Here\
    \ we write a BeanBostProcessor to automatically find beans which have methods\
    \ annotated by `@Subscribe` annotation and call the `eventBus.register` method\
    \ to register the subscribers.\n\n```\n 1 public class FindEventBusSubscribers\
    \ implements BeanPostProcessor {\n\n 3  @Autowired\n 4  private EventBus eventBus;\n\
    \ 5  private static final Logger LOG = Logger.getLogger(FindEventBusSubscribers.class);\n\
    \n 7  @Override\n 8  public Object postProcessAfterInitialization(Object bean,\
    \ String beanName) throws BeansException {\n 9   Method[] beanMethods = bean.getClass().getMethods();\n\
    10   for (Method beanMethod: beanMethods) {\n11    if (beanMethod.isAnnotationPresent(Subscribe.class))\
    \ {\n12     eventBus.register(bean);\n13     LOG.info(\n14      String.format(\"\
    Found event bus subscriber class %s. Subscriber method name=%s\",\n15       bean.getClass().getSimpleName(),\
    \ beanMethod.getName()));\n16     break;\n17    }\n18   }\n19   return bean;\n\
    20  }\n\n22  @Override\n23  public Object postProcessBeforeInitialization(Object\
    \ bean, String beanName) throws BeansException {\n24   return bean;\n25  }\n\n\
    27 }\n```\n\n*   **Create Publisher:** It is sufficient to just call the `post(Object\
    \ payload)` to post it to the EventBus.\n\n```\n1 public MarketEventHandlerImpl(EventBus\
    \ eventBus) {\n2  this.eventBus = eventBus;\n3 }\n4 public void onMarketEvent(TradeableInstrument\
    \ < T > instrument, double bid, double ask, DateTime eventDate) {\n5  MarketDataPayLoad\
    \ < T > payload = new MarketDataPayLoad < T > (instrument, bid, ask, eventDate);\n\
    6  eventBus.post(payload);\n7 }\n```\n\n*   **Consume Payload:** The EventBus\
    \ finds the appropriate subscriber by matching the method signature based on the\
    \ input type passed into the method and ofcourse annotated by the `@Subscribe`\
    \ annotation. This method must have one and only one input parameter. There is\
    \ a choice to go as fine grained or coarse grained as possible. In the case of\
    \ coarse grained subscription, we have the input parameter as an object which\
    \ is the super class of all known payloads in the system. The worst case being\
    \ the payload `java.lang.Object`, in which case the subscription is the most coarse\
    \ grained. This method will be called for every `eventBus.post` performed in the\
    \ system. On the other hand, using individual subtypes as input parameters to\
    \ methods, make it extremely fine grained. In the example below `handleMarketDataEvent`\
    \ will only be called by the EventBus if the payload is of the type `MarketDataPayLoad`\
    \ or any of it’s subtypes.\n\n```\n1 @Subscribe\n2 @AllowConcurrentEvents\n3 public\
    \ void handleMarketDataEvent(MarketDataPayLoad<T> marketDataPayLoad) {\n4 \tif\
    \ (instrumentRecentPricesCache.containsKey(marketDataPayLoad.getInstrument()))\
    \ {\n5 \t\tinstrumentRecentPricesCache.get(\n6 \t\tmarketDataPayLoad.getInstrument())\n\
    7 \t\t.put(marketDataPayLoad.getEventDate(),marketDataPayLoad);\n8 \t}\n9 }\n\
    ```\n\n### 1.8 Provider Helper interface\n\nOften different platform providers\
    \ have different notations for denoting a currency pair. *Cable* can be denoted\
    \ in the variety of following ways\n\n*   GBP_USD\n*   GBPUSD\n*   GBP/USD\n*\
    \   GBP-USD\n\nSimilarly the act of buying a currency pair could be denoted by\n\
    \n*   buy\n*   long\n*   +1 (or any other positive number)\n*   Platform specific\
    \ enum, for e.g. TRADEACTION.BUY\n\nIn order to deal with such variances in notation\
    \ provided by different providers, we need to create an interface that provides\
    \ methods to address these differences. It looks like\n\n```\n 1 /**\n 2  *\n\
    \ 3  * @param <T>\n 4  *            The type of Long/Short notation\n 5  */\n\
    \ 6 public interface ProviderHelper < T > {\n\n 8  /**\n 9   *\n10   * @param\
    \ instrument\n11   *            in ISO currency standard, such as GBPUSD\n12 \
    \  * @return currency pair denoted in the platform specific format\n13   */\n\
    14  String fromIsoFormat(String instrument);\n\n16  /**\n17   *\n18   * @param\
    \ instrument\n19   *            in platform specific format such as GBP_USD\n\
    20   * @return currency pair denoted in ISO format\n21   */\n22  String toIsoFormat(String\
    \ instrument);\n\n24  /**\n25   *\n26   * @param instrument\n27   *          \
    \  in a 7 character format, separated by an arbitrary separator\n28   *      \
    \      character like -,/,_\n29   * @return currency pair denoted in the platform\
    \ specific format\n30   */\n31  String fromPairSeparatorFormat(String instrument);\n\
    \n33  /**\n34   *\n35   * @param instrument\n36   *            denoted as a hashtag,\
    \ for e.g. #GBPUSD\n37   * @return currency pair denoted in the platform specific\
    \ format\n38   */\n39  String fromHashTagCurrency(String instrument);\n\n41  /**\n\
    42   *\n43   * @return T that denotes the action of Buying the currency pair on\
    \ the\n44   *         platform\n45   */\n46  T getLongNotation();\n\n48  /**\n\
    49   *\n50   * @return T that denotes the action of Selling the currency pair\
    \ on the\n51   *         platform\n52   */\n53  T getShortNotation();\n54 }\n\
    ```\n\nThe need for this interface was felt, when I was consuming data from external\
    \ sources like Twitter and sites which publish economic events. Various Twitter\
    \ users and external sites had their own way of denoting currency pairs and long/short\
    \ trades. In order to deal with this plethora of conventions, the need for such\
    \ interface was strongly felt. I am pretty sure that there would be many more,\
    \ which need to be interpreted in the platform specific ways and should therefore\
    \ be added to this interface."
