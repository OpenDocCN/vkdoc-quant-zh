  trans: "\n### 2.3 将一切封装在通用 `AccountInfoService` 之后\n\n如前所述，我们关键的设计目标之一是将供应商封装在具有实际意义的服务之后，这样如果必要，我们就能切换供应商的实现，从\
    \ OANDA 更换为例如 LMAX，而无需更改任何编译后的代码行。只需修改 Spring 配置，就有望帮助我们平稳过渡。`AccountInfoService`\
    \ 除了为所有 `AccountDataProvider` 方法提供一个外观模式接口，还额外提供了 3 个有用的方法：\n\n```\n1 public Collection<K>\
    \ findAccountsToTrade();\n\n3 public double calculateMarginForTrade(K accountId,\
    \ TradeableInstrument<N>\n4         instrument, int units);\n\n6 public double\
    \ calculateMarginForTrade(Account<K> accountInfo,\n7       TradeableInstrument<N>\
    \ instrument, int units);\n```\n\n在讨论这些方法之前，让我们快速浏览一下定义该服务依赖关系的构造函数。\n\n```\n\
    \ 1 /**\n 2  *\n 3  * @param <K>\n 4  *            账户 ID 的类型\n 5  * @param <N>\n\
    \ 6  *            TradeableInstrument 类中 instrumentId 的类型\n 7  * @see TradeableInstrument\n\
    \ 8  */\n 9 public class AccountInfoService<K, N> {\n\n11 \tprivate final AccountDataProvider<K>\
    \ accountDataProvider;\n12 \tprivate final BaseTradingConfig baseTradingConfig;\n\
    13 \tprivate final CurrentPriceInfoProvider<N> currentPriceInfoProvider;\n14 \t\
    private final ProviderHelper providerHelper;\n15 \tprivate Comparator<Account<K>>\
    \ accountComparator = new MarginAvailableComparator<K>();\n\n17 \tpublic AccountInfoService(AccountDataProvider<K>\
    \ accountDataProvider,\n18 \t\tCurrentPriceInfoProvider<N> currentPriceInfoProvider,\n\
    19 \t\tBaseTradingConfig baseTradingConfig, ProviderHelper providerHelper) {\n\
    20 \t\tthis.accountDataProvider = accountDataProvider;\n21 \t\tthis.baseTradingConfig\
    \ = baseTradingConfig;\n22 \t\tthis.currentPriceInfoProvider = currentPriceInfoProvider;\n\
    23 \t\tthis.providerHelper = providerHelper;\n24 \t}\n```\n\n*   `AccountDataProvider`\
    \ 是显而易见的，因为该服务需要能为单个 accountId 和所有可用账户提供信息。\n*   `CurrentPriceInfoProvider` 是一个提供给定工具集当前价格的供应商，将在后续章节中讨论。\n\
    *   `BaseTradingConfig`，如前所述，是一个保存所有配置参数的对象。\n*   `ProviderHelper`，同样在前面讨论过，提供了处理供应商相关数据转换的辅助方法。\n\
    \n现在我们将注意力转向对 `findAccountsToTrade()` 方法的讨论。顾名思义，该方法会在满足特定条件时尝试查找可用于交易的账户。通常，在下单/交易之前，首先要做的是找到一个合适的账户。当然，对于只有一个交易账户且所有交易默认归属于该账户的平台，此讨论并不适用。\n\
    \n```\n 1 public Collection < K > findAccountsToTrade() {\n 2  List < Account\
    \ < K >> accounts = Lists.newArrayList(getAllAccounts());\n 3  Collection < K\
    \ > accountsFound = Lists.newArrayList();\n 4  Collections.sort(accounts, accountComparator);\n\
    \ 5  for (Account < K > account: accounts) {\n 6   if (account.getAmountAvailableRatio()\
    \ >= baseTradingConfig.getMinReserveRatio() && account.getNetAssetValue() >= baseT\\\
    \n 7 radingConfig.getMinAmountRequired()) {\n 8    accountsFound.add(account.getAccountId());\n\
    \ 9   }\n10  }\n11  return accountsFound;\n12 }\n```\n\n该方法首先通过调用 `getAllAccounts()`\
    \ 获取所有可用账户，该方法直接委托给 `accountProvider`：\n\n```\n1 public Collection<Account<K>>\
    \ getAllAccounts() {\n2   return this.accountDataProvider.getLatestAccountInfo();\n\
    3 }\n```\n\n接着，它尝试使用 `MarginAvailableComparator` 按可用保证金递减的顺序对可用账户进行排序。此比较器将可用保证金最多的账户置于列表顶部，依此类推。其思路是选取可用保证金最多的账户。当然，这只是当账户计价货币在汇率上具有可比性时寻找账户的一种策略。例如，如果您有\
    \ 3 个以 CHF、EUR 和 USD 计价的账户，那么这种方法可行，因为 EURCHF ≈ 1.08，USDCHF ≈ 1.0，EURUSD ≈ 1.0（编写本文时的汇率）。这应该能满足选择最大可用保证金账户的策略，但如果至少有一种货币是\
    \ JPY 而非 EUR，那么此方法就会严重失效。由于编写本文时 CHFJPY 和 USDJPY 约为 122.0，这并不理想，因为大多数时候 JPY 账户会被选中。\n\
    \n```\n 1 static class MarginAvailableComparator < K > implements Comparator <\
    \ Account < K >> {\n\n3  @Override\n 4  public int compare(Account < K > ai1,\
    \ Account < K > ai2) {\n 5   if (ai1.getMarginAvailable() > ai2.getMarginAvailable())\
    \ {\n 6    return -1;\n 7   } else if (ai1.getMarginAvailable() < ai2.getMarginAvailable())\
    \ {\n 8    return 1;\n 9   }\n10   return 0;\n11  }\n\n13 }\n```\n\n接下来，仅当满足以下条件时，该账户才会被选择用于下单/交易：\n\
    \n```\n1 if (account.getAmountAvailableRatio() >= baseTradingConfig.getMinReserveRatio()\n\
    2     && account.getNetAssetValue() >= baseTradingConfig.getMinAmountRequired())\
    \ {\n3  accountsFound.add(account.getAccountId());\n4 }\n```\n\n假设：\n\n```\n1\
    \ minReserveRatio=0.2\n2 minAmountRequired=50.0\n```\n\n0.2 的最低保留比率是一个指标，规定如果一个\
    \ GBP 账户的总金额是 1000 英镑，那么只有当可用交易金额 > 0.2 × 1000 英镑（200 英镑）时，我们才选择该账户进行交易。我强烈建议启用此验证，仅仅是因为这为账户留出了合理的缓冲，防止在价格剧烈波动时净资产值变为负数。如果账户杠杆非常高，比如\
    \ 1:50，则此值应设得更高。\n\n最低金额要求是一个指标，规定一个账户必须具有最低净资产值才能被考虑用于交易。在这种情况下，净资产值必须至少为 50\
    \ 英镑才有资格进行交易。\n\n接下来，我们讨论两个重载方法 `calculateMarginForTrade`。顾名思义，这些方法用于计算给定交易/订单所需的保证金。在以下几种场景中，这些方法会非常有用：我们想要为多种工具批量下单并了解它们的保证金要求，或者作为将订单发送到平台前的预验证检查，确保给定订单的保证金要求低于可用金额。\n\
