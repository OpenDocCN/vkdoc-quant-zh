    54      closeFxTweet.getPrice()));\n55    ctr++;\n56   }\n\n58  }\n\n60 }\n```\n\
    \n这是一个由 Spring 驱动的演示程序，因为我们需要使用前面讨论过的 `TwitterTemplate`。Spring 配置如下所示：\n\n```\n\
