    \ \t\t<constructor-arg index=\"1\" value=\"${oanda.accessToken}\"/>\n 5 \t\t<constructor-arg\
    \ index=\"2\" value=\"${oanda.accountId}\"/>\n 6 \t\t<constructor-arg index=\"\
    3\" ref=\"tradeableInstrumentList\"/>\n 7 \t\t<constructor-arg index=\"4\" ref=\"\
    marketEventCallback\"/>\n 8 \t\t<constructor-arg index=\"5\" ref=\"heartBeatCallback\"\
    />\n 9 \t\t<constructor-arg index=\"6\" value=\"MKTDATASTREAM\"/>\n10 </bean>\n\
    ```\n\n我们将上述源代码 ID `MKTDATASTREAM` 分配为心跳源 ID，因为同一个类负责处理逐笔数据心跳。\n\n`tradeableInstrumentList`\
    \ 是我们要从 OANDA 平台订阅逐笔数据的交易品种列表。该列表的配置如下。\n\n```xml\n 1 <bean id=\"tradeableInstrumentList\"\
    \ class=\"java.util.ArrayList\">\n 2 \t<constructor-arg index=\"0\">\n 3 \t\t\
    <list>\n 4 \t\t\t<bean class=\"com.precioustech.fxtrading.instrument.TradeableInstrument\"\
    >\n 5         <constructor-arg index=\"0\" value=\"USD_CAD\"/>\n 6       </bean>\n\
    \ 7 \t\t\t<bean class=\"com.precioustech.fxtrading.instrument.TradeableInstrument\"\
    >\n 8         <constructor-arg index=\"0\" value=\"GBP_USD\"/>\n 9       </bean>\n\
    10 \t\t\t<bean class=\"com.precioustech.fxtrading.instrument.TradeableInstrument\"\
    >\n11         <constructor-arg index=\"0\" value=\"AUD_JPY\"/>\n12       </bean>\n\
    13 \t\t\t<bean class=\"com.precioustech.fxtrading.instrument.TradeableInstrument\"\
    >\n14         <constructor-arg index=\"0\" value=\"EUR_NZD\"/>\n15       </bean>\n\
    16 \t\t\t<bean class=\"com.precioustech.fxtrading.instrument.TradeableInstrument\"\
    >\n17         <constructor-arg index=\"0\" value=\"GBP_CHF\"/>\n18       </bean>\n\
    19 \t\t\t<bean class=\"com.precioustech.fxtrading.instrument.TradeableInstrument\"\
    >\n20         <constructor-arg index=\"0\" value=\"EUR_JPY\"/>\n21       </bean>\n\
    22 \t\t</list>\n23 \t</constructor-arg>\n24 </bean>\n```\n\n至此，我们结束了关于 OANDA 实现中所有\
    \ `Provider` Bean 配置的讨论。\n\n### 12.1.4 策略配置\n\n在本书中，我们讨论了几种通过基于调度器的调用来激活的策略。在本节中，我们将配置它们并展示它们是如何被调用的。\n\
    \n```xml\n1 <bean id=\"fadeTheMoveStrategy\"\n2     class=\"com.precioustech.fxtrading.tradingbot.strategies.FadeTheMoveStrategy\"\
    >\n3 \t<constructor-arg index=\"0\" ref=\"tradeableInstrumentList\"/>\n4 </bean>\n\
    5 <bean id=\"copyTwitterStrategy\"\n6     class=\"com.precioustech.fxtrading.tradingbot.strategies.CopyTwitterStrategy\"\
    />\n```\n\n配置相当简单。`FadeTheMove` 策略有一个额外的构造函数依赖项，它会被注入一个交易品种列表，用于观察并在满足给定条件时下单。\n\
    \n现在我们来看一下调度器配置，它会在每个时间间隔 `T` 后调用给定的策略 Bean 方法。\n\n```xml\n1 <task:scheduled-tasks\
    \ scheduler=\"taskScheduler\">\n2 \t\t<task:scheduled ref=\"fadeTheMoveStrategy\"\
    \ method=\"analysePrices\"\n3           fixed-delay=\"60000\"/>\n4 \t\t<task:scheduled\
    \ ref=\"copyTwitterStrategy\" method=\"harvestAndTrade\"\n5           fixed-delay=\"\
    300000\"/>\n6 </task:scheduled-tasks>\n```\n\n调度器每隔 `60000 毫秒` 调用一次 `fadeTheMoveStrategy`\
    \  Bean 的 `analysePrices()` 方法。它还会每隔 `300000 毫秒` 调用一次 `copyTwitterStrategy` Bean\
    \ 的 `harvestAndTrade()` 方法。\n"
- fmt: "### 12.1.5 Services Configuration\n\nIn this concluding section on configuration,\
    \ we discuss how to configure the core services of the bot. These services could\
    \ be considered as the public API of the bot if there were a GUI client or for\
    \ that matter any other client interacting with the bot. Most of the demo programs\
    \ in this book, directly interact with these services.\n\n`AccountInfoService`\n\
    \n```xml\n<bean id=\"accountInfoService\"\n    class=\"com.precioustech.fxtrading.account.AccountInfoService\"\
    >\n\t<constructor-arg index=\"0\" ref=\"accountDataProvider\"/>\n\t<constructor-arg\
    \ index=\"1\" ref=\"currentPriceInfoProvider\"/>\n\t<constructor-arg index=\"\
    2\" ref=\"tradingConfig\"/>\n\t<constructor-arg index=\"3\" ref=\"providerHelper\"\
    />\n</bean>\n```\n\n`InstrumentService`\n\n```xml\n<bean id=\"instrumentService\"\
    \n    class=\"com.precioustech.fxtrading.instrument.InstrumentService\">\n\t\t\
    <constructor-arg index=\"0\" ref=\"instrumentDataProvider\"/>\n</bean>\n```\n\n\
    `MovingAverageCalculationService`\n\n```xml\n<bean id=\"movingAverageCalculationService\"\
    \n  class=\"com.precioustech.fxtrading.marketdata.historic.MovingAverageCalculationService\"\
    >\n\t\t<constructor-arg index=\"0\" ref=\"historicMarketDataProvider\"/>\n</bean>\n\
    ```\n\n`OrderInfoService`\n\n```xml\n<bean id=\"orderInfoService\"\n    class=\"\
    com.precioustech.fxtrading.order.OrderInfoService\">\n\t<constructor-arg index=\"\
    0\" ref=\"orderManagementProvider\"/>\n</bean>\n```\n\n`TradeInfoService`\n\n\
    ```xml\n<bean id=\"tradeInfoService\"\n    class=\"com.precioustech.fxtrading.trade.TradeInfoService\"\
    >\n\t<constructor-arg index=\"0\" ref=\"tradeManagementProvider\"/>\n\t<constructor-arg\
    \ index=\"1\" ref=\"accountInfoService\"/>\n</bean>\n```\n\n`PreOrderValidationService`\n\
    \n```xml\n<bean id=\"preOrderValidationService\"\n      class=\"com.precioustech.fxtrading.order.PreOrderValidationService\"\
    >\n\t<constructor-arg index=\"0\" ref=\"tradeInfoService\"/>\n\t<constructor-arg\
    \ index=\"1\" ref=\"movingAverageCalculationService\"/>\n\t<constructor-arg index=\"\
    2\" ref=\"tradingConfig\"/>\n\t<constructor-arg index=\"3\" ref=\"orderInfoService\"\
    />\n</bean>\n```\n\n`OrderExecutionService`\n\n```xml\n<bean id=\"orderExecutionService\"\
    \n    class=\"com.precioustech.fxtrading.order.OrderExecutionService\">\n\t<constructor-arg\
    \ index=\"0\" ref=\"orderQueue\"/>\n\t<constructor-arg index=\"1\" ref=\"accountInfoService\"\
    />\n\t<constructor-arg index=\"2\" ref=\"orderManagementProvider\"/>\n\t<constructor-arg\
    \ index=\"3\" ref=\"tradingConfig\"/>\n\t<constructor-arg index=\"4\" ref=\"preOrderValidationService\"\
    />\n\t<constructor-arg index=\"5\" ref=\"currentPriceInfoProvider\"/>\n</bean>\n\
    ```\n\n`DefaultHearBeatService`\n\n```xml\n<bean id=\"heartBeatService\"\n   \
    \ class=\"com.precioustech.fxtrading.heartbeats.DefaultHeartBeatService\">\n\t\
    <constructor-arg index=\"0\">\n\t\t<list>\n\t\t\t<ref bean=\"eventsStreamingService\"\
    />\n\t\t\t<ref bean=\"marketDataStreamingService\"/>\n\t\t</list>\n\t</constructor-arg>\n\
    </bean>\n```\n\n### 12.2 Building the Bot\n\nThe bot can easily be built using\
    \ maven. Since there are 3 projects that need to be built in a given order, we\
    \ can script the actions, instead of having to remember the build order. If one\
    \ has cloned the code repository from github, there is a `buildbot.bsh` in the\
    \ `<repo-code>/java` directory that will build the bot using maven. I see the\
    \ following on my bash terminal after having cloned the repository\n\n![Code Repo\
    \ Structure](images/00083.jpeg) Code Repo Structure\n\nBefore running the code,\
    \ it is assumed that maven and java 1.7 are installed and configured. On the command\
    \ line, when the command `mvn --version` is typed, we must an output similar to:\n\
    \n![mvn --version output](images/00084.jpeg) mvn –version output\n\nIf this is\
    \ not the case, then please make sure maven is properly installed^([3](#part0077.html#fn-mvnins)).\n\
    \nWe are now ready to run the script `buildbot.bsh`. Before that, lets have a\
    \ quick look at the script code\n\n```bash\nfunction buildmodule {\n    cd $SCRIPT_DIR/$1\n\
    \    mvn clean install\n    if [[ \"$?\" -ne 0 ]]; then\n      echo \"ERROR: $1\
    \ project build failed. BUILD FAILED\"; exit -1;\n    fi\n}\nSCRIPT_DIR=`pwd`\n\
    buildmodule tradingbot-core\nbuildmodule oanda-restapi\nbuildmodule tradingbot-app\n\
    \necho \"TRADING BOT built successfully\"\n```\n\n![Start Build at command line](images/00085.jpeg)\
    \ Start Build at command line\n\nWe call the function `buildmodule` for each of\
    \ the 3 modules we want to build. The function first does a `cd` to the appropriate\
    \ source code directory and then issues a `mvn clean install` command to build\
    \ the artifacts (i.e. the `jar` file). If there are unit tests failure or compilation\
    \ issues, the `mvn clean install` will exit with a non-zero code. We check this\
    \ code set in `$?` variable, and if non zero, we exit the script straightaway.\n\
    \n![Build Failure](images/00086.jpeg) Build Failure\n\nIf the build succeeds we\
    \ should see the output like this below\n\n![Build Success](images/00087.jpeg)\
    \ Build Success\n\n### 12.3 Running the bot\n\n**Warning**: **Serious losses can\
    \ be incurred if some of the configuration values used to run the bot are extremely\
    \ high. The author has taken every opportunity to highlight those throughout the\
    \ book. In no event shall the author be liable for any consequential damages arising\
    \ from the configuration values the user deems fit for his/her risk appetite.**\n\
    \nNow that the bot is fully built, we are now ready to run the bot. But before\
    \ we really push the button, we need to make sure the following config params\
    \ have been adapted and a build done so that these changes are in the jar file\
    \ for the given user. So here is the full checklist of changes\n\n1.  ALL OANDA\
    \ specific parameters in the `tradingbot-oanda.properties` belong to the user\
    \ of a valid live or practice account.\n2.  ALL Twitter specific access tokens\
    \ in `tradingbot.properties` are correctly populated. These valid tokens are generated\
    \ for a Twitter App for a Twitter account that the user has full access.\n3. \
    \ Double check that the values for the bean `TradingConfig` are within comfortable\
    \ limits, especially `maxAllowedQuantity`, `minReserveRatio` and `maxAllowedNetContracts`.\n\
    4.  Configure a valid mail account in `tradingbot.properties`. The credentials\
    \ used here will be used to send email notifications out to the `mail.to` email\
    \ address.\n5.  Configure `log4j.properties` in tradingbot-app resources directory\
    \ if required.\n6.  Execute `buildbot.sh` again to rebuild the bot with the new\
    \ set of parameters, configured above.\n\nTo run the bot with the strategies discussed\
    \ in the book and OANDA implementation, we simply do the following\n\n```bash\n\
    $ ./runbot-oanda.bsh\n```\n\nIf all goes well, we should see the following output\
    \ coming out from the bot\n\n![Running the bot](images/00088.jpeg) Running the\
    \ bot\n\nWhile the bot is running, we should see it harvesting the tweet like\
    \ one below, from time to time\n\n![New Tweet harvested](images/00089.jpeg) New\
    \ Tweet harvested\n\nThat is it. Our bot is now fully up and running. We should\
    \ see `FadeTheMove` strategy really very busy especially around market moving\
    \ currency events such as FOMC decision or GDP data from various countries. One\
    \ thing to bear in mind is that this strategy maintains an internal cache for\
    \ the last 15 minutes. The more instruments we configure for subscription to tick\
    \ data stream, the more memory footprint we will have. Therefore it may be imperative\
    \ to run with say a higher memory value. Since the bot runs inside maven, we would\
    \ have to change the `MAVEN_OPTS` params."
