    \ even though you may not have a funding source setup for them. For e.g. after\
    \ being assigned a GBP account as a result of funding from UK bank, one can create\
    \ additional USD account, even though the user does not have a USD funding source.\
    \ The USD account can be funded however by transferring an amount of GBP from\
    \ the main account, effectively selling GBPUSD. This exercise can be repeated\
    \ for other currency accounts like CAD, EUR etc.\n\nAll accounts on most brokerage\
    \ platforms, have the following attributes which can be queried:\n\n*   An account\
    \ id.\n*   Base currency\n*   Total amount.\n*   Balance remaining to trade.\n\
    *   Leverage\n\nOther optional information might include:\n\n*   Realised PNL\n\
    *   Unrealised PNL\n*   Margin Used\n*   Open Trades\n*   Open Orders\n\nWe begin\
    \ by capturing all this information by creating ***Account*** POJO. Here we provide\
    \ 2 constructors, one with minimum attributes required to construct the object\
    \ based on the discussion above.\n\nCode Listing 2.1: Definition of Account POJO\n\
    \n```\n 1 /**\n  2  * A POJO that holds account information. No setters are provided\
    \ as it is\n  3  * envisaged that the final member variables will be initialized\
    \ through the\n  4  * constructor(s).\n  5  *\n  6  * @param <T>\n  7  *     \
    \       the type of accountId\n  8  */\n  9 public class Account < T > {\n\n11\
    \  private final double totalBalance;\n 12  private final double unrealisedPnl;\n\
    \ 13  private final double realisedPnl;\n 14  private final double marginUsed;\n\
    \ 15  private final double marginAvailable;\n 16  private final double netAssetValue;\n\
    \ 17  private final long openTrades;\n 18  private final String currency;\n 19\
    \  private final T accountId;\n 20  private final String toStr;\n 21  private\
    \ final double amountAvailableRatio; /*The amount available to trade as a fraction\
    \ of total amount*/\n 22  private final double marginRate; /*The leverage offered\
    \ on this account. for e.g. 0.05, 0.1 etc*/\n 23  private final int hash;\n\n\
    25  public Account(final double totalBalance, double marginAvailable, String currency,\n\
    \ 26   T accountId, double marginRate) {\n 27   this(totalBalance, 0, 0, 0, marginAvailable,\
    \ 0, currency, accountId, marginRate);\n 28  }\n\n30  public Account(final double\
    \ totalBalance, double unrealisedPnl, double realisedPnl,\n 31   double marginUsed,\
    \ double marginAvailable, long openTrades, String currency,\n 32   T accountId,\
    \ double marginRate) {\n 33   this.totalBalance = totalBalance;\n 34   this.unrealisedPnl\
    \ = unrealisedPnl;\n 35   this.realisedPnl = realisedPnl;\n 36   this.marginUsed\
    \ = marginUsed;\n 37   this.marginAvailable = marginAvailable;\n 38   this.openTrades\
    \ = openTrades;\n 39   this.currency = currency;\n 40   this.accountId = accountId;\n\
    \ 41   this.amountAvailableRatio = this.marginAvailable / this.totalBalance;\n\
    \ 42   this.netAssetValue = this.marginUsed + this.marginAvailable;\n 43   this.marginRate\
    \ = marginRate;\n 44   this.hash = calcHashCode();\n 45   //Create toString here\
    \ as all variables are final\n 46   toStr = String.format(\"Currency=%s,NAV=%5.2f,Total\
    \ Balance=%5.2f, UnrealisedPnl=%5.2f, \" + \"RealisedPnl=%5.2f, MarginU\\\n 47\
    \ sed=%5.2f, MarginAvailable=%5.2f,\" + \" OpenTrades=%d, amountAvailableRatio=%1.2f,\
    \ marginRate=%1.2f\", currency,\n 48    netAssetValue, totalBalance, unrealisedPnl,\
    \ realisedPnl, marginUsed, marginAvailable,\n 49    openTrades, this.amountAvailableRatio,\
    \ this.marginRate);\n 50  }\n\n52  public double getAmountAvailableRatio() {\n\
    \ 53   return amountAvailableRatio;\n 54  }\n\n56  public double getMarginRate()\
    \ {\n 57   return marginRate;\n 58  }\n\n60  @Override\n 61  public String toString()\
    \ {\n 62   return this.toStr;\n 63  }\n\n65  public T getAccountId() {\n 66  \
    \ return accountId;\n 67  }\n\n69  public String getCurrency() {\n 70   return\
    \ currency;\n 71  }\n\n73  public double getNetAssetValue() {\n 74   return this.netAssetValue;\n\
    \ 75  }\n\n77  public double getTotalBalance() {\n 78   return totalBalance;\n\
    \ 79  }\n\n81  public double getUnrealisedPnl() {\n 82   return unrealisedPnl;\n\
    \ 83  }\n\n85  public double getRealisedPnl() {\n 86   return realisedPnl;\n 87\
    \  }\n\n89  public double getMarginUsed() {\n 90   return marginUsed;\n 91  }\n\
    \n93  @Override\n 94  public int hashCode() {\n 95   return this.hash;\n 96  }\n\
    \n98  private int calcHashCode() {\n 99   final int prime = 31;\n100   int result\
    \ = 1;\n101   result = prime * result + ((accountId == null) ? 0 : accountId.hashCode());\n\
    102   return result;\n103  }\n\n105  @Override\n106  public boolean equals(Object\
    \ obj) {\n107   if (this == obj)\n108    return true;\n109   if (obj == null)\n\
    110    return false;\n111   if (getClass() != obj.getClass())\n112    return false;\n\
    113   @SuppressWarnings(\"unchecked\")\n114   Account < T > other = (Account <\
    \ T > ) obj;\n115   if (accountId == null) {\n116    if (other.accountId != null)\n\
    117     return false;\n118   } else if (!accountId.equals(other.accountId))\n\
    119    return false;\n120   return true;\n121  }\n\n123  public double getMarginAvailable()\
    \ {\n124   return marginAvailable;\n125  }\n\n127  public long getOpenTrades()\
    \ {\n128   return openTrades;\n129  }\n\n131 }\n```\n\nLooking at the above listing,\
    \ we can do a couple of small optimizations. All member variables are ***final***,\
    \ which means they are immutable. We can therefore calculate the `hashCode()`\
    \ and `toString()` values upfront in the constructors and store them in final\
    \ variables. Any call to `toString()` or `hashCode()` will return the pre-calculated\
    \ values."
  trans: "\n# 账户管理\n\n账户管理功能可能是在我们的机器人中需要构建的首要功能。当用户在经纪商/交易所开设交易账户时，系统会创建一个账户，该账户可以通过银行转账、信用卡、PayPal\
    \ 等方式直接注资。每个账户都有一个基础货币，通常就是资金来源的货币。例如，如果您位于英国，并持有一个用于为交易账户注资的英国银行账户，那么该交易账户的基础货币就是英镑。\n\
    \n然而，有些平台允许您创建其他货币账户，即使您没有为它们设置资金来源。例如，当您通过英国银行注资获得一个英镑账户后，即使没有美元资金来源，您也可以创建一个额外的美元账户。不过，美元账户可以通过从主账户转移一定金额的英镑来注资，这实际上相当于卖出\
    \ GBPUSD。此操作可针对其他货币账户（如加元、欧元等）重复进行。\n\n在大多数经纪商平台上，所有账户都具有以下可查询的属性：\n\n-   账户 ID\n\
    -   基础货币\n-   总金额\n-   可用交易余额\n-   杠杆\n\n其他可选信息可能包括：\n\n-   已实现盈亏\n-   未实现盈亏\n\
    -   已用保证金\n-   未平仓交易\n-   未成交订单\n\n我们首先通过创建`Account` POJO 来获取所有这些信息。这里我们提供了两个构造器，其中一个基于上述讨论，仅包含构建对象所需的最少属性。\n\
    \n**代码清单 2.1：Account POJO 的定义**\n\n```\n 1 /**\n 2  * 一个持有账户信息的 POJO。不提供 setter\
    \ 方法，\n 3  * 因为最终成员变量将通过构造器进行初始化。\n 4  *\n 5  * @param <T>\n 6  *            账户\
    \ ID 的类型\n 7  */\n 8 public class Account < T > {\n\n11  private final double\
    \ totalBalance;\n 12  private final double unrealisedPnl;\n 13  private final\
    \ double realisedPnl;\n 14  private final double marginUsed;\n 15  private final\
    \ double marginAvailable;\n 16  private final double netAssetValue;\n 17  private\
    \ final long openTrades;\n 18  private final String currency;\n 19  private final\
    \ T accountId;\n 20  private final String toStr;\n 21  private final double amountAvailableRatio;\
    \ /*可用于交易的金额占总金额的比例*/\n 22  private final double marginRate; /*此账户提供的杠杆比例，例如 0.05、0.1\
    \ 等*/\n 23  private final int hash;\n\n25  public Account(final double totalBalance,\
    \ double marginAvailable, String currency,\n 26   T accountId, double marginRate)\
    \ {\n 27   this(totalBalance, 0, 0, 0, marginAvailable, 0, currency, accountId,\
    \ marginRate);\n 28  }\n\n30  public Account(final double totalBalance, double\
    \ unrealisedPnl, double realisedPnl,\n 31   double marginUsed, double marginAvailable,\
    \ long openTrades, String currency,\n 32   T accountId, double marginRate) {\n\
    \ 33   this.totalBalance = totalBalance;\n 34   this.unrealisedPnl = unrealisedPnl;\n\
    \ 35   this.realisedPnl = realisedPnl;\n 36   this.marginUsed = marginUsed;\n\
    \ 37   this.marginAvailable = marginAvailable;\n 38   this.openTrades = openTrades;\n\
    \ 39   this.currency = currency;\n 40   this.accountId = accountId;\n 41   this.amountAvailableRatio\
    \ = this.marginAvailable / this.totalBalance;\n 42   this.netAssetValue = this.marginUsed\
    \ + this.marginAvailable;\n 43   this.marginRate = marginRate;\n 44   this.hash\
    \ = calcHashCode();\n 45   //由于所有变量都是 final 类型，在此处创建 toString\n 46   toStr = String.format(\"\
    Currency=%s,NAV=%5.2f,Total Balance=%5.2f, UnrealisedPnl=%5.2f, \" + \"RealisedPnl=%5.2f,\
    \ MarginU\\\n 47 sed=%5.2f, MarginAvailable=%5.2f,\" + \" OpenTrades=%d, amountAvailableRatio=%1.2f,\
    \ marginRate=%1.2f\", currency,\n 48    netAssetValue, totalBalance, unrealisedPnl,\
    \ realisedPnl, marginUsed, marginAvailable,\n 49    openTrades, this.amountAvailableRatio,\
    \ this.marginRate);\n 50  }\n\n52  public double getAmountAvailableRatio() {\n\
    \ 53   return amountAvailableRatio;\n 54  }\n\n56  public double getMarginRate()\
    \ {\n 57   return marginRate;\n 58  }\n\n60  @Override\n 61  public String toString()\
    \ {\n 62   return this.toStr;\n 63  }\n\n65  public T getAccountId() {\n 66  \
    \ return accountId;\n 67  }\n\n69  public String getCurrency() {\n 70   return\
    \ currency;\n 71  }\n\n73  public double getNetAssetValue() {\n 74   return this.netAssetValue;\n\
    \ 75  }\n\n77  public double getTotalBalance() {\n 78   return totalBalance;\n\
    \ 79  }\n\n81  public double getUnrealisedPnl() {\n 82   return unrealisedPnl;\n\
    \ 83  }\n\n85  public double getRealisedPnl() {\n 86   return realisedPnl;\n 87\
    \  }\n\n89  public double getMarginUsed() {\n 90   return marginUsed;\n 91  }\n\
    \n93  @Override\n 94  public int hashCode() {\n 95   return this.hash;\n 96  }\n\
    \n98  private int calcHashCode() {\n 99   final int prime = 31;\n100   int result\
    \ = 1;\n101   result = prime * result + ((accountId == null) ? 0 : accountId.hashCode());\n\
    102   return result;\n103  }\n\n105  @Override\n106  public boolean equals(Object\
    \ obj) {\n107   if (this == obj)\n108    return true;\n109   if (obj == null)\n\
    110    return false;\n111   if (getClass() != obj.getClass())\n112    return false;\n\
    113   @SuppressWarnings(\"unchecked\")\n114   Account < T > other = (Account <\
    \ T > ) obj;\n115   if (accountId == null) {\n116    if (other.accountId != null)\n\
    117     return false;\n118   } else if (!accountId.equals(other.accountId))\n\
    119    return false;\n120   return true;\n121  }\n\n123  public double getMarginAvailable()\
    \ {\n124   return marginAvailable;\n125  }\n\n127  public long getOpenTrades()\
    \ {\n128   return openTrades;\n129  }\n\n131 }\n```\n\n查看上述代码清单，我们可以进行几项小的优化。所有成员变量都是`final`类型，这意味着它们是不可变的。因此，我们可以在构造器中预先计算`hashCode()`和`toString()`的值，并将它们存储在\
    \ final 变量中。任何对`toString()`或`hashCode()`的调用都将返回预先计算好的值。\n"
- fmt: "### 2.1 Account Provider interface\n\nWe now need to specify our account data\
    \ interface which defines what we expect our provider (aka implementation) to\
    \ provide. We would not be interested in doing any account updates such as changing\
    \ the leverage etc. but just interested in read-only information. Therefore we\
    \ require the provider to either give us a `Collection` of all accounts or an\
    \ account if the `accountId` is provided. Therefore our interface would look something\
    \ like:\n\nCode Listing 2.2: AccountDataProvider interface definition\n\n```java\n\
    \ 1 /**\n 2  * A provider of Account information. An account information might\
    \ typically\n 3  * include base currency, leverage, margin available, PNL information\
    \ etc. Some\n 4  * brokerages allow the creation of various sub accounts or currency\
    \ wallets.\n 5  * The idea is to give ability to fund these accounts from various\
    \ currency\n 6  * denominated bank accounts. So for e.g. a user in Switzerland\
    \ might have a CHF\n 7  * current account but also a EUR savings account. One\
    \ can then open 2 currency\n 8  * accounts or wallets on the brokerage, denominated\
    \ in CHF and EUR and these\n 9  * can then be funded by the real bank accounts.\
    \ Alternatively, one can also\n10  * just create these multiple currency wallets\
    \ even if they have just a single\n11  * source funding currency. When the primary\
    \ account is funded, a transfer trade\n12  * can be executed to fund the other\
    \ currency wallet. For e.g. a user in United\n13  * Kingdom who just has a GBP\
    \ account, can open a USD wallet, fund the GBP\n14  * account and then execute\
    \ a transfer of a given units of GBP into USD.\n15  *\n16  * @param <T>\n17  *\
    \            The type of accountId\n18  *\n19  * @see Account\n20  */\n21 public\
    \ interface AccountDataProvider < T > {\n\n23  /**\n24   *\n25   * @param accountId\n\
    26   * @return Account information for the given accountId\n27   */\n28  Account\
    \ < T > getLatestAccountInfo(T accountId);\n\n30  /**\n31   *\n32   * @return\
    \ A collection of ALL accounts available\n33   */\n34  Collection < Account <\
    \ T >> getLatestAccountInfo();\n35 }\n```\n\nThe interface as seen above is pretty\
    \ straightforward. We are just interested in a single account or a collection\
    \ of accounts. We will see later in this chapter how this can be used in a service\
    \ to do some advanced account related operations/calculations.\n\n### 2.2 A Concrete\
    \ implementation for `AccountDataProvider`\n\nOur next task is to provide an OANDA\
    \ implementation that achieves this. We begin by first statically importing all\
    \ the relevant JSON keys that we expect to find in our payload. A sample response\
    \ returned for account `123456` would look something like this:\n\nListing 2.3:\
    \ Sample JSON payload for an Account\n\n```json\n 1 {\n 2   \"accountId\" : 123456,\n\
    \ 3   \"accountName\" : \"main\",\n 4   \"balance\" : 20567.9,\n 5   \"unrealizedPl\"\
    \ : -897.1,\n 6   \"realizedPl\" : 1123.65,\n 7   \"marginUsed\" : 89.98,\n 8\
    \   \"marginAvail\" : 645.3,\n 9   \"openTrades\" : 5,\n10   \"openOrders\" :\
    \ 0,\n11   \"marginRate\" : 0.05,\n12   \"accountCurrency\" : \"CHF\"\n13 }\n\
    ```\n\nCode Listing 2.4: Import Json keys statically\n\n```java\n1 import static\
    \ com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.accountCurrency;\n2 import\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.accountId;\n3\
    \ import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.balance;\n\
    4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.marginAvail;\n\
    5 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.marginRate;\n\
    6 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.marginUsed;\n\
    7 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.openTrades;\n\
    8 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.realizedPl;\n\
    9 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.unrealizedPl;\n\
    ```\n\nSince OANDA account id is a `Long`, substituting `Long` for `T` becomes\n\
    \n```java\n1 public class OandaAccountDataProviderService implements AccountDataProvider<Long>\
    \ {\n```\n\nWe provide the OANDA url, the user name and access token in the constructor,\
    \ which looks like:\n\nCode Listing 2.5: Constructor definition\n\n```java\n 1\
    \ private final String url;\n 2 private final String userName;\n 3 private final\
    \ BasicHeader authHeader;\n\n5 public OandaAccountDataProviderService(final String\
    \ url, final String userName,\n 6  final String accessToken) {\n 7  this.url =\
    \ url; //OANDA REST service base url\n 8  this.userName = userName; //OANDA account\
    \ user name\n 9  this.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    10 }\n```\n\nWe now turn our attention to first of the implementations of the\
    \ interface, which is to get information for a single account id provided. Before\
    \ we get to that, we must prepare the url to send across to OANDA. The REST request\
    \ must go to the `ACCOUNTS_RESOURCE` which is defined as follows\n\n```java\n\
    1 public static final String ACCOUNTS_RESOURCE = \"/v1/accounts\";\n```\n\nTherefore\
    \ our function to construct the full url to get account information would look\
    \ like\n\n```java\n1 String getSingleAccountUrl(Long accountId) {\n2  return url\
    \ + ACCOUNTS_RESOURCE + TradingConstants.FWD_SLASH + accountId;\n3 }\n```\n\n\
    If we pass `accountId` `123456` to this function and assuming the base url is\
    \ `https://api-fxtrade.oanda.com`, this function would return `https://api-fxtrade.oanda.com/v1/accounts/123456`.\
    \ Getting back to the implementation of the method that retrieves information\
    \ for a single account, which would look something like\n\nCode Listing 2.6: Single\
    \ Account fetch Implementation\n\n```java\n 1 @Override\n 2 public Account < Long\
    \ > getLatestAccountInfo(final Long accountId) {\n 3  CloseableHttpClient httpClient\
    \ = getHttpClient();\n 4  try {\n 5   return getLatestAccountInfo(accountId, httpClient);\n\
    \ 6  } finally {\n 7   TradingUtils.closeSilently(httpClient);\n 8  }\n 9 }\n\n\
    12 private Account < Long > getLatestAccountInfo(final Long accountId, CloseableHttpClient\
    \ httpClient) {\n13  try {\n14   HttpUriRequest httpGet = new HttpGet(getSingleAccountUrl(accountId));\n\
    15   httpGet.setHeader(authHeader);\n\n17   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    18   HttpResponse httpResponse = httpClient.execute(httpGet);\n19   String strResp\
    \ = TradingUtils.responseToString(httpResponse);\n20   if (strResp != StringUtils.EMPTY)\
    \ {\n21    Object obj = JSONValue.parse(strResp);\n22    JSONObject accountJson\
    \ = (JSONObject) obj;\n```"
