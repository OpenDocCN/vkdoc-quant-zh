    \   this.nzdsgdCt++;\n14   this.nzdsgdLastRef.set(payLoad);\n15  }\n16 }\n17 @Subscribe\n\
    18 public void dummyHeartBeatSubscriber(HeartBeatPayLoad < DateTime > payLoad)\
    \ {\n19  heartbeatCt++;\n20 }\n```\n\nAll the events from the file are directed\
    \ at these methods which keep a counter of events received belonging to currency\
    \ pair *AUD_CAD* and *NZD_SGD* in addition to the heartbeat events. The *asserts*\
    \ then make sure that the count and order of events received were proper."
