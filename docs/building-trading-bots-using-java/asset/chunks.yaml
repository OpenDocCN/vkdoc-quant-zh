    \ Trade events from the OANDA platform, also implements the `EmailContentGenerator`\
    \ interface. As a result, the method that generates the `EmailPayLoad` looks like\n\
    \n```java\n@Override\npublic EmailPayLoad generate(EventPayLoad < JSONObject >\
