    \n## 12. Configuration, Deployment and Running the Bot\n\nWe are now all set to\
    \ put our bot into action. All that now remains before pressing the button is\
    \ the configuration and deployment. The configuration of the bot comprises the\
    \ following:\n\n*   Spring configuration of the core services and api, i.e., `tradingbot-app.xml`.\n\
    *   Property file for the core Spring configuration, i.e., `tradingbot.properties`.\n\
    *   Spring configuration of the runtime provider (OANDA in our case), i.e., `tradingbot-oanda.xml`.\n\
    *   Property file for the runtime provider Spring configuration, i.e., `tradingbot-oanda.properties`.\n\
    \nJust like the jar files, we also have a separate configuration file for the\
    \ runtime provider. As we will see later in the chapter, the name of the provider\
    \ configuration file is passed in as a program argument, in order to easily pick\
    \ the provider at runtime. Without further ado, lets jump into the configuration\
    \ of the bot.\n\n### 12.1 Configuration of the trading bot\n\nWe start by creating\
    \ the main configuration file in the project `tradingbot-app` in the `src/main/resources`\
    \ folder, which is automatically included in the build and as a result ends up\
    \ inside the `tradingbot-app.jar` file. The name of the file is `tradingbot-app.xml`.\
    \ We also create the properties file, `tradingbot.properties`, that has the values\
    \ for various placeholders referenced in this Spring configuration file.\n\nWe\
    \ also use the cool `SpEL`^([1](#part0077.html#fn-spel)) in our configuration,\
    \ the reason for which will become clear as we progress through this chapter."
