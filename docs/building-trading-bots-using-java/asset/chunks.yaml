  trans: "\n我们的`run`方法会无限循环，直到易失性变量`serviceUp`的值被设置为`false`。稍后我们将介绍如何将其设置为`false`以终止循环，进而终止该方法，最终导致线程终止。语句`this.orderQueue.take()`会阻塞，直到队列中有待处理的订单。假设有订单可用且已从队列中取出，我们要做的第一件事是确保它通过`preValidate`方法中的一系列验证检查。该方法仅应用了我们在上一节讨论的所有\
    \ 3 项验证检查，但仔细看，它实际上进行了一项优化。由于安全区检查需要获取过去 10 年的蜡烛图数据，因此只有在其他两项检查通过后才执行。假设检查成功，我们现在需要找到可以交易的账户。回顾一下关于选择合格交易账户的讨论，在账户被认定为可交易之前，还需要通过一组检查，例如可用金额必须至少为总金额的`x%`。同样，这可以称为基于账户级别的第二级检查。如果没有可用账户，则跳过剩余处理并回到`while`循环的开头。然而，如果至少找到一个账户，我们现在就可以下单了。为此，我们必须首先根据从队列中取出的`TradingSignal`实例准备一个`Order`\
    \ POJO。首先要决定它是市价单还是限价单。提醒一下，限价单必须设置触发价格，我们检查交易决策是否设置了触发价格。如果已设置，则将`Order` POJO\
    \ 类型准备为`LIMIT`，否则为`MARKET`。现在，我们有了一个完全准备好的`Order` POJO，可以发送出去下单。我们遍历所有符合条件的账户。一旦找到第一个成功下单的账户（下单成功时会返回有效的`orderId`），我们就跳出循环，然后回到循环的开头。\n\
    \n回到如何将变量`serviceUp`设置为`false`以便线程停止的问题？为此，我们在服务中创建一个关闭钩子，当应用程序关闭时，DI 框架会自动调用它。这一切都归功于`@PreDestroy`注解，这些框架将其视为在销毁`bean`之前要调用的方法。如果未使用\
    \ DI 框架，则必须手动调用`shutdown()`方法来终止线程。\n\n```java\n@PreDestroy\npublic void shutDown()\
    \ {\n    this.serviceUp = false;\n}\n```\n\n至此，我们基本结束了对订单中需要了解的大部分内容的讨论。现在，我们将注意力转向订单执行并导致创建交易头寸时会发生什么。交易头寸意味着投资组合中的风险，必须准备好管理此头寸，以最小化损失并最大化利润。我们首先详细讨论`Trade`\
    \ POJO 的定义。\n\n### 6.7 Trade POJO 定义\n\n`Trade` POJO 与`Order` POJO 类似，包含管理交易和描述系统中未平仓交易头寸所需的所有信息。正如我们将看到的，这两个\
    \ POJO 有许多共同的属性，仅仅是因为订单执行后会转化为一个未平仓头寸。与订单一样，它必须有基础工具、止损价、止盈价、买入/卖出方向等。让我们通过查看代码更详细地了解它。\n\
    \n```java\n/**\n *\n * @param <M> The type of tradeId\n * @param <N> The type\
    \ of instrumentId in class TradeableInstrument\n * @param <K> The type of accountId\n\
    \ * @see TradeableInstrument\n */\npublic class Trade < M, N, K > {\n    private\
    \ final M tradeId;\n    private final long units;\n    private final TradingSignal\
    \ side;\n    private final TradeableInstrument < N > instrument;\n    private\
    \ final DateTime tradeDate;\n    private final double takeProfitPrice,\n    executionPrice,\n\
    \    stopLoss;\n    private final K accountId;\n    private final String toStr;\n\
    \n    public Trade(M tradeId, long units, TradingSignal side,\n        TradeableInstrument\
    \ < N > instrument, DateTime tradeDate, double takeProfitPrice,\n        double\
    \ executionPrice, double stopLoss, K accountId) {\n        this.tradeId = tradeId;\n\
    \        this.units = units;\n        this.side = side;\n        this.instrument\
    \ = instrument;\n        this.tradeDate = tradeDate;\n        this.takeProfitPrice\
    \ = takeProfitPrice;\n        this.executionPrice = executionPrice;\n        this.stopLoss\
    \ = stopLoss;\n        this.accountId = accountId;\n        this.toStr = String.format(\n\
    \            \"Trade Id=%d, Units=%d, Side=%s, Instrument=%s, TradeDate=%s, TP=%3.5f,\
    \ Price=%3.5f, SL=%3.5f\",\n            tradeId, units, side, instrument, tradeDate.toString(),\
    \ takeProfitPrice,\n            executionPrice, stopLoss);\n    }\n\n    @Override\n\
    \    public int hashCode() {\n        final int prime = 31;\n        int result\
    \ = 1;\n        result = prime * result + ((accountId == null) ? 0 : accountId.hashCode());\n\
    \        result = prime * result + ((tradeId == null) ? 0 : tradeId.hashCode());\n\
    \        return result;\n    }\n\n    @Override\n    public boolean equals(Object\
    \ obj) {\n        if (this == obj)\n            return true;\n        if (obj\
    \ == null)\n            return false;\n        if (getClass() != obj.getClass())\n\
    \            return false;\n        @SuppressWarnings(\"unchecked\")\n       \
    \ Trade < M, N, K > other = (Trade < M, N, K > ) obj;\n        if (accountId ==\
    \ null) {\n            if (other.accountId != null)\n                return false;\n\
    \        } else if (!accountId.equals(other.accountId))\n            return false;\n\
    \        if (tradeId == null) {\n            if (other.tradeId != null)\n    \
    \            return false;\n        } else if (!tradeId.equals(other.tradeId))\n\
    \            return false;\n        return true;\n    }\n\n    public double getStopLoss()\
    \ {\n        return stopLoss;\n    }\n\n    public K getAccountId() {\n      \
    \  return accountId;\n    }\n\n    @Override\n    public String toString() {\n\
    \        return toStr;\n    }\n\n    public double getExecutionPrice() {\n   \
    \     return executionPrice;\n    }\n\n    public M getTradeId() {\n        return\
    \ tradeId;\n    }\n\n    public long getUnits() {\n        return units;\n   \
    \ }\n\n    public TradingSignal getSide() {\n        return side;\n    }\n\n \
    \   public TradeableInstrument < N > getInstrument() {\n        return instrument;\n\
    \    }\n\n    public DateTime getTradeDate() {\n        return tradeDate;\n  \
    \  }\n\n    public double getTakeProfitPrice() {\n        return takeProfitPrice;\n\
    \    }\n}\n```\n\n查看上面的代码，我们观察到它在属性方面与`Order` POJO 具有相当多的相似性。除此之外，该 POJO 看起来相当简单。因此，我们可以继续讨论交易管理提供者接口的定义。\n"
- fmt: "### 6.8 `TradeManagementProvider` interface\n\nJust like its cousin, `OrderManagementProvider`,\
    \ the `TradeManagementProvider` has very similar actions except one notable missing\
    \ one. From the CRUD set of operations, the provider provides all except the C.\
    \ This is because only an order placed and filled can create a trade, and one\
    \ can only then modify, close, or retrieve information regarding the trade. Let's\
    \ move straight to its definition:  \n\n```\n 1 /**\n 2  * A provider of RUD operations\
    \ on a single Trade. Normally Trades are grouped\n 3  * under an account, so in\
    \ order to perform these operations, a valid accountId\n 4  * is normally required.\
    \ Some providers may just have the concept of a single\n 5  * account, so any\
    \ operation on the Trade may always default to that single\n 6  * account, in\
    \ which case the accountId may be null.\n 7  *\n 8  * A bulk operation to closeAll\
    \ trades is deliberately left out to avoid\n 9  * potential misuse.\n10  *\n11\
    \  * @param <M> The type of tradeId\n12  * @param <N> The type of instrumentId\
    \ in class TradeableInstrument\n13  * @param <K> The type of accountId\n14  *\
    \ @see TradeableInstrument\n15  */\n16 public interface TradeManagementProvider\
    \ < M, N, K > {\n17  /**\n18   * Modify an existing trade by providing accountId\
    \ and tradeId to identify\n19   * the trade. In some cases the tradeId may be\
    \ sufficient to identify the\n20   * trade and therefore accountId may be null.\
    \ Only stopLoss and takeProfit\n21   * parameters for the trade can be modified\
    \ through this operation.\n22   *\n23   * @param accountId\n24   * @param tradeId\n\
    25   * @param stopLoss\n26   * @param takeProfit\n27   * @return boolean to indicate\
    \ whether the modification was successful or\n28   *         not.\n29   */\n30\
    \  boolean modifyTrade(K accountId, M tradeId, double stopLoss, double takeProfit);\n\
    31\n32  /**\n33   * Close an existing trade by providing accountId and tradeId\
    \ to identify a\n34   * given trade. Again, the accountId may be optional to close\
    \ the trade\n35   *\n36   * @param tradeId\n37   * @param accountId\n38   * @return\
    \ boolean to indicate when the trade was successfully closed or\n39   *      \
    \   not.\n40   */\n41  boolean closeTrade(M tradeId, K accountId);\n42\n43  /**\n\
    44   * Retrieve trade for the given tradeId and/or accountId\n45   *\n46   * @param\
    \ tradeId\n47   * @param accountId\n48   * @return a Trade or null if not found.\n\
    49   */\n50  Trade < M,\n51  N,\n52  K > getTradeForAccount(M tradeId, K accountId);\n\
    53\n54  /**\n55   * All Trades for a given account or an empty collection if none\
    \ found. The\n56   * ordering of trades such as by instruments or in chronological\
    \ order is\n57   * not guaranteed.\n58   *\n59   * @param accountId\n60   * @return\
    \ a Collection of trades for the given account Id.\n61   */\n62  Collection <\
    \ Trade < M,\n63  N,\n64  K >> getTradesForAccount(K accountId);\n65 }\n```\n\n\
    Looks remarkably similar, right? Except of course a missing `placeTrade` method,\
    \ the reason for which we discussed earlier.\n\n### 6.9 A Concrete implementation\
    \ for `TradeManagementProvider`\n\nThe OANDA API implementation `OandaTradeManagementProvider`\
    \ has lots of things in common with its Order implementation counterpart as one\
    \ would expect. Since a lot of the discussion around the Order implementation\
    \ applies to the Trade implementation, we will just jump straight into the code\
    \ and point out any differences if applicable. Apart from that, most of the principles\
    \ applicable to Order implementation are applicable here. We begin as usual defining\
    \ the provider class, its constructor, and the json keys used:  \n\n```\n 1 import\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.id;\n 2 import\
    \ static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.instrument;\n\
    \ 3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.price;\n\
    \ 4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.side;\n\
    \ 5 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.stopLoss;\n\
    \ 6 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.takeProfit;\n\
    \ 7 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.time;\n\
    \ 8 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.trades;\n\
    \ 9 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.units;\n\
    \n11 public class OandaTradeManagementProvider implements TradeManagementProvider\
    \ < Long, String, Long > {\n12   private final String url;\n13   private final\
    \ BasicHeader authHeader;\n\n15   public OandaTradeManagementProvider(String url,\
    \ String accessToken) {\n16    this.url = url;\n17    this.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    18   }\n```\n\nAs seen from the listing above, the constructor has one less dependency\
    \ of `AccountDataProvider` compared to the Order counterpart. We can appreciate\
    \ this difference as a trading position is already attached to an account, whilst\
    \ for an Order, we can choose which account we want to place an order. To fetch\
    \ the list of available accounts, we need the services of `AccountDataProvider`.\
    \ The rest of the stuff is fairly straightforward, and we can progress to the\
    \ definition of `modifyTrade`. Before that, a reminder that we can only modify\
    \ the following attributes of a trade:\n\n*   `takeProfit`\n*   `stopLoss`\n\n\
    ```\n 1 private static final String tradesResource = \"/trades\";\n\n 3 String\
    \ getTradeForAccountUrl(Long tradeId, Long accountId) {\n 4  return this.url +\
    \ OandaConstants.ACCOUNTS_RESOURCE +\n 5   TradingConstants.FWD_SLASH + accountId\
    \ + tradesResource + TradingConstants.FWD_SLASH + tradeId;\n 6 }\n\n 8 HttpPatch\
    \ createPatchCommand(Long accountId, Long tradeId, double stopLoss, double takeProfit)\n\
    \ 9 throws Exception {\n10  HttpPatch httpPatch = new HttpPatch(getTradeForAccountUrl(tradeId,\
    \ accountId));\n11  httpPatch.setHeader(this.authHeader);\n12  List < NameValuePair\
    \ > params = Lists.newArrayList();\n13  params.add(new BasicNameValuePair(OandaJsonKeys.takeProfit,\
    \ String.valueOf(takeProfit)));\n14  params.add(new BasicNameValuePair(OandaJsonKeys.stopLoss,\
    \ String.valueOf(stopLoss)));\n15  httpPatch.setEntity(new UrlEncodedFormEntity(params));\n\
    16  return httpPatch;\n17 }\n```"
