    \ 交易信号输出\n\n1.  http://www.investopedia.com/articles/forex/08/pure-fade-trade.asp↩︎\n\
    2.  https://github.com/google/guava/wiki/CachesExplained↩︎\n\n## 10. 心跳机制\n\n\
    心跳是任何交易系统的关键要素。任何长时间运行的流式或持久连接都必须通过管道发送心跳，让消费者知道一切正常且连接存活。我们的系统也不例外。简而言之，心跳表明了系统的健康状况。\n\
    \n从理论上讲，机器人应该频繁接收心跳以确保一切正常。如果心跳不规律或超过了预期心跳的等待周期，它会尝试重新连接并恢复被动事件流。\n\n在本章中，我们将讨论心跳、如何处理心跳以及如果停止接收心跳应该怎么做。\n\
    \n### 10.1 HeartBeatPayLoad\n\n每个持久/流式连接都可能具有不同的有效负载来传达连接状态。为了适应这种多样化的负载类型，我们定义了以下\
    \ POJO 来对此特性进行建模：\n\n```java\n 1 public class HeartBeatPayLoad < T > {\n\n 3 \
    \ private final T payLoad;\n 4  private final String source;\n\n 6  public HeartBeatPayLoad(T\
    \ payLoad) {\n 7   this(payLoad, StringUtils.EMPTY);\n 8  }\n\n10  public HeartBeatPayLoad(T\
    \ payLoad, String source) {\n11   this.payLoad = payLoad;\n12   this.source =\
    \ source;\n13  }\n\n15  public T getHeartBeatPayLoad() {\n16   return this.payLoad;\n\
    17  }\n\n19  public String getHeartBeatSource() {\n20   return this.source;\n\
    21  }\n22 }\n```\n\n`source`属性标识心跳的来源。这是为了区分系统中不同的心跳来源。例如，在交易机器人系统中，我们至少有两个心跳流，一个用于\
    \ Tick 数据，另一个用于交易/订单/账户事件。\n"
- fmt: "### 10.2 Streaming HeartBeat Interface\n\nWe begin, as we did for other streaming\
    \ interfaces, with the interface definition that stipulates the minimum set of\
    \ methods required to support heartbeat streaming. We have exactly the same design\
    \ pattern like before:\n\n- a method to start the streaming.\n- a method to stop\
    \ the streaming.\n- an infinite event loop to process the heartbeats.\n- a `Callback`\
    \ interface to disseminate the event to downstream consumers.\n\nLet’s look at\
    \ the interface definition that defines this contract:\n\n```java\n 1 /**\n 2\
    \  * A service that provides streaming heartbeats from the trading platform. The\n\
    \ 3  * service provided in the end by the platform may not be streaming at all\
    \ but\n 4  * some sort of regular callbacks in order to indicate that the connection\
    \ is\n 5  * alive. A loss of heartbeats may indicate a general failure to receive\
    \ any\n 6  * trade/order events and/or market data from the trading platform.\
    \ Therefore\n 7  * any monitoring of the application may involve directly interacting\
    \ with this\n 8  * service to raise alerts/notifications.\n 9  *\n10  *\n11  */\n\
    12 public interface HeartBeatStreamingService {\n\n14  /**\n15   * Start the service\
    \ in order to receive heartbeats from the trading\n16   * platform. Ideally the\
    \ implementation would make sure that multiple\n17   * heartbeat connections/handlers\
    \ are not created for the same kind of\n18   * service. Depending on the trading\
    \ platform, there may be a single\n19   * heartbeat for all services or a dedicated\
    \ one for services such as market\n20   * data, trade/order events etc.\n21  \
    \ */\n22  void startHeartBeatStreaming();\n\n24  /**\n25   * Stop the service\
    \ in order to stop receiving heartbeats. The\n26   * implementation must dispose\
    \ any resources/connections in a suitable\n27   * manner so as not to cause any\
    \ resource leaks.\n28   */\n29  void stopHeartBeatStreaming();\n\n31  /**\n32\
    \   *\n33   * @return heartBeat source id which identifies the source for which\
    \ this\n34   *         service is providing heartbeats. This is useful to keep\
    \ track all\n35   *         sources which are heartbeating and can be individually\
    \ monitored\n36   *         on a regular basis. On some platforms there may be\
    \ a dedicated\n37   *         single heartbeat service for ALL in which case this\
    \ may not be as\n38   *         useful.\n39   */\n40  String getHeartBeatSourceId();\n\
    41 }\n```\n\nThe interface above, unlike the other streaming interfaces, includes\
    \ an additional method that stipulates the implementation to provide a unique\
    \ source id for the heartbeat stream implementation.\n\n### 10.3 A Concrete Implementation\
    \ for `HeartBeatStreamingService`\n\nOANDA pushes the heartbeat events via the\
    \ same stream, i.e., it uses the market data and trade/order/account event streams\
    \ to intermittently push a heartbeat payload to communicate the wellbeing of the\
    \ respective streams. An example heartbeat payload looks like:\n\n```json\n1 {\"\
    heartbeat\":{\"time\":\"1443968021000000\"}}\n```\n\nSince both the OANDA streams\
    \ push the same heartbeat payload, the abstract class `OandaStreamingService`\
    \ which is the base class for `OandaEventsStreamingService` and `OandaMarketDataStreamingService`\
    \ implements the interface and provides the plumbing to handle these heartbeats.\
    \ Let’s look specifically now at the implementation of the 3 interface methods\
    \ in this abstract class. Additionally, we will also look at the method which\
    \ parses out the JSON payload and the constructor:\n\n```java\n 1 public abstract\
    \ class OandaStreamingService\n 2 implements HeartBeatStreamingService {\n 3 \
    \ protected OandaStreamingService(String accessToken,\n 4   HeartBeatCallback\
    \ < DateTime > heartBeatCallback, String heartbeatSourceId) {\n 5   this.hearbeatSourceId\
    \ = heartbeatSourceId;\n 6   this.heartBeatCallback = heartBeatCallback;\n 7 \
    \  ...\n 8  }\n\n10  protected void handleHeartBeat(JSONObject streamEvent) {\n\
    11   Long t = Long.parseLong(((JSONObject) streamEvent.get(heartbeat)).get(time).toString());\n\
    12   heartBeatCallback.onHeartBeat(new HeartBeatPayLoad < DateTime > (new DateTime(TradingUtils.toMillisFromNanos(t)),\
    \ hear\\\n13 beatSourceId));\n14  }\n\n16  @Override\n17  public void stopHeartBeatStreaming()\
    \ {\n18   stopStreaming();\n19  }\n\n21  @Override\n22  public void startHeartBeatStreaming()\
    \ {\n23   if (!serviceUp) {\n24    startStreaming();\n25   }\n26  }\n\n28  @Override\n\
    29  public String getHeartBeatSourceId() {\n30   return this.hearbeatSourceId;\n\
    31  }\n\n33   ...\n34   ...\n35 }\n```\n\nThe methods `startHeartBeatStreaming()`\
    \ and `stopHeartBeatStreaming()` delegate to `startStreaming()` and `stopStreaming()`\
    \ respectively, which further delegate to the underlying methods to start/stop\
    \ the main streams. So in the case of market data streaming, the methods that\
    \ start and stop the main stream are `startMarketDataStreaming()` and `stopMarketDataStreaming()`.\
    \ This makes sense because the heartbeats are coupled with the main stream events\
    \ and the two coexist. Stopping the heartbeat stream must stop the main stream\
    \ and vice versa.\n\nThe method `handleHeartBeat()` parses the JSON payload and\
    \ creates an instance of `HeartBeatPayLoad<DateTime>`. This is then passed on\
    \ to an instance of `HeartBeatCallback`, which we discuss below, to disseminate\
    \ to downstream consumers. The timestamp in the heartbeat payload is the heartbeat\
    \ timestamp and, as we will see later, is used to figure out if the stream is\
    \ still alive or dead.\n\n### 10.4 `HeartBeatCallback` Interface\n\nLike the other\
    \ `Callback` that we have looked at so far, the `HeartBeatCallback` is no different.\
    \ It is directly invoked by the provider implementation that is directly receiving\
    \ streaming events from the platform. After parsing the event and creation of\
    \ a `HeartBeatPayLoad` instance, the `onHeartBeat()` method is invoked. Let us\
    \ jump directly to how the source code looks:\n\n```java\n1 public interface HeartBeatCallback<T>\
    \ {\n\n3  void onHeartBeat(HeartBeatPayLoad<T> payLoad);\n4 }\n```\n\nThe implementation\
    \ for the interface above is similar to other `Callback` interfaces we have discussed\
    \ previously. The `HeartBeatPayLoad` is disseminated to downstream consumers via\
    \ the `EventBus`:\n\n```java\n 1 public class HeartBeatCallbackImpl < T > implements\
    \ HeartBeatCallback < T > {\n\n 3  private final EventBus eventBus;\n\n 5  public\
    \ HeartBeatCallbackImpl(EventBus eventBus) {\n 6   this.eventBus = eventBus;\n\
    \ 7  }\n\n 9  @Override\n10  public void onHeartBeat(HeartBeatPayLoad < T > payLoad)\
    \ {\n11   this.eventBus.post(payLoad);\n12  }\n\n14 }\n```"
