  trans: "\n### 2.1 账户数据提供者接口\n\n现在我们需要定义账户数据接口，该接口规定了我们期望提供者（即实现者）所提供的内容。我们不关心进行任何账户更新操作（如更改杠杆等），只关注只读信息。因此，我们要求提供者要么返回一个包含所有账户的\
    \ `Collection` 集合，要么在提供 `accountId` 时返回单个账户。我们的接口大致如下所示：\n\n代码清单 2.2：AccountDataProvider\
    \ 接口定义\n\n```java\n 1 /**\n 2  * 账户信息提供者。账户信息通常包括基础货币、杠杆率、可用保证金、盈亏信息等。\n 3  *\
    \ 部分券商允许创建多个子账户或货币钱包。这样设计的目的是能够从不同币种的银行账户\n 4  * 向这些账户注入资金。例如，一位瑞士用户可能拥有一个瑞士法郎（CHF）活期账户，\n\
    \ 5  * 同时还有一个欧元（EUR）储蓄账户。该用户可以在券商处开设两个分别以 CHF 和 EUR\n 6  * 计价的货币账户或钱包，并通过真实的银行账户为其注资。或者，即使只有一个主要注资币种，\n\
    \ 7  * 用户也可以直接创建多个货币钱包。当主账户注资后，可以通过转账交易为其他货币钱包注资。\n 8  * 例如，一位只拥有英镑（GBP）账户的英国用户，可以开设一个美元（USD）钱包，\n\
    \ 9  * 先向 GBP 账户注资，然后再执行将一定数量 GBP 转换为 USD 的转账操作。\n10  *\n11  * @param <T>\n12\
    \  *            账户 ID 的类型\n13  *\n14  * @see Account\n15  */\n16 public interface\
    \ AccountDataProvider < T > {\n\n23  /**\n24   *\n25   * @param accountId\n26\
    \   * @return 给定 accountId 的账户信息\n27   */\n28  Account < T > getLatestAccountInfo(T\
    \ accountId);\n\n30  /**\n31   *\n32   * @return 所有可用账户的集合\n33   */\n34  Collection\
    \ < Account < T >> getLatestAccountInfo();\n35 }\n```\n\n如上所示，该接口非常简单。我们只需要获取单个账户或账户集合。本章后续将介绍如何在服务中利用此接口执行一些高级的账户相关操作或计算。\n\
    \n### 2.2 `AccountDataProvider` 的具体实现\n\n我们的下一个任务是提供一个实现该功能的 OANDA 实现。我们首先静态导入预期在响应数据中出现的所有相关\
    \ JSON 键。针对账户 `123456` 返回的示例响应如下所示：\n\n清单 2.3：账户的示例 JSON 数据\n\n```json\n 1 {\n\
    \ 2   \"accountId\" : 123456,\n 3   \"accountName\" : \"main\",\n 4   \"balance\"\
    \ : 20567.9,\n 5   \"unrealizedPl\" : -897.1,\n 6   \"realizedPl\" : 1123.65,\n\
    \ 7   \"marginUsed\" : 89.98,\n 8   \"marginAvail\" : 645.3,\n 9   \"openTrades\"\
    \ : 5,\n10   \"openOrders\" : 0,\n11   \"marginRate\" : 0.05,\n12   \"accountCurrency\"\
    \ : \"CHF\"\n13 }\n```\n\n代码清单 2.4：静态导入 JSON 键\n\n```java\n1 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.accountCurrency;\n\
