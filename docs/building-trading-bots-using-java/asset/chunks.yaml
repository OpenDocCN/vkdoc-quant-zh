- fmt: "### 1.4 Design Goals\n\n- 一个关键的设计目标（本章开头已提及）是能够通过 Spring 配置在运行时更改券商/交易平台（broker/exchange）的实现。如果我们能为这些平台\
    \ API 调用创建规范（类似于 JDBC 规范），那么这是可行的。例如，一个定义持仓管理需求的示例规范/接口如下：\n\n```java\n/**\n *\
    \ A provider of services for instrument positions. A position for an instrument\n\
    \ * is by definition aggregated trades for the instrument with an average price\n\
    \ * where all trades must all be a LONG or a SHORT. It is a useful service to\n\
    \ * project a summary of a given instrument and also if required close all trades\n\
    \ * for a given instrument, ideally using a single call.\n *\n * The implementation\
    \ might choose to maintain an internal cache of positions in\n * order to reduce\
    \ latency. If this is the case then it must find means to\n * either 1) hook into\
    \ the event streaming and refresh the cache based on an\n * order/trade event\
    \ or 2) regularly refresh the cache after a given time\n * period.\n *\n * @param\
    \ <M>\n *      The type of instrumentId in class TradeableInstrument\n * @param\
    \ <N>\n *      the type of accountId\n *\n * @see TradeableInstrument\n */\npublic\
    \ interface PositionManagementProvider<M, N> {\n\n\t/**\n\t * @param accountId\n\
    \t * @param instrument\n\t * @return Position<M> for a given instrument and accountId\
    \ (may be null if\n\t *         all trades under a single account).\n\t */\n\t\
    Position<M> getPositionForInstrument(N accountId, TradeableInstrument<M> instrument);\n\
    \n\t/**\n\t * @param accountId\n\t * @return Collection of Position<M> objects\
    \ for a given accountId.\n\t */\n\tCollection<Position<M>> getPositionsForAccount(N\
    \ accountId);\n\n\t/**\n\t * close the position for a given instrument and accountId.\
    \ This is one shot\n\t * way to close all trades for a given instrument in an\
    \ account.\n\t *\n\t * @param accountId\n\t * @param instrument\n\t * @return\
    \ if the operation was successful\n\t */\n\tboolean closePosition(N accountId,\
    \ TradeableInstrument<M> instrument);\n}\n```\n\n如果我们为平台交互的每个方面创建这样的规范/接口，理论上我们可以为这些服务创建提供程序，并通过\
    \ Spring 配置在需要时进行切换。从代码组织的角度来看，所有这些接口都将放在一个构成核心 API 一部分的项目中。因此，这个项目将与券商/交易平台提供程序无关，并将包含此类接口和服务。\n\
    \n- 编写解决单一业务问题或一组相关问题的服务。这些服务易于进行单元测试和代码复用，最终带来更好的软件质量。\n- 松耦合服务。这有助于减少系统依赖，从而使软件更易于维护。我们的软件将不断演进，因为人们可能会决定集成更多社交媒体信息流或添加更复杂的策略。编写松耦合的组件可以确保对已有工作代码的影响最小。\n\
    - 高单元测试覆盖率。追求高单元测试覆盖率至关重要。在涉及真实资金的生产环境中使用时，大量的单元测试将确保我们尽早发现回归和错误，并尽可能防止错误在生产环境中暴露。\n\
    \n### 1.5 代码组织与使用的软件栈\n\n基于我们在前面章节中对设计目标的讨论，代码将至少组织在 3 个不同的项目中，即构建将至少生成 3 个 `jar`\
    \ 文件。为什么说是至少 3 个？回想我们之前的讨论，其中一个关键设计目标是在运行时切换提供程序实现。由于我们可以从多个提供程序中进行选择，因此至少会有 3\
    \ 个 `jar` 文件。本书只讨论一个实现，即 OANDA REST API 实现。鼓励使用该框架的开发人员开发更多的提供程序实现。\n\n- `trading-core`\
    \ 是项目的核心。它包含所有必须实现的规范/接口。它还包含所有使用核心接口并提供额外有用 API 方法的通用服务。\n- `oanda-restapi` 是我们对规范的参考实现，将在本书中讨论。欢迎您将其替换为您自己的实现。\n\
    - `tradingbot-app` 是主应用程序，它使用 Spring 在运行时注入提供程序 API。它也是我们定义策略和实现特定于应用程序的项目的项目。在本书的后续部分，我们将讨论与社交媒体（尤其是\
    \ Twitter）的集成，这将在该项目中实现。\n\n![Java Projects](images/00001.jpeg \"Java Projects\"\
    ) Java Projects\n\n为了构建我们的机器人，我们将使用以下软件和工具：\n\n- Java SDK 1.7+\n- Spring Framework\
    \ 4.1, Spring Social 1.1（仅在 `tradingbot-app` 项目中的依赖项）\n- Guava 18.0\n- HttpClient\
    \ 4.3\n- Maven 3.2.5\n- Eclipse IDE\n\n### 1.6 OANDA REST API 作为参考实现\n\n**声明-**\
    \ *我与 OANDA 现在或过去没有任何商业关系。我选择 OANDA REST API 作为参考实现，完全是基于其技术优势以及它可能被更广泛采用的事实（因为它是免费使用的）。如果存在类似的选择，我也很乐意尝试。*\n\
    \n我偶然发现了 OANDA API。当时，我正在寻找一家提供免费交易 API 的券商（以防我想转为真实账户），并且更重要的是支持 Java 编程语言。入门非常容易，因为大多数示例都使用\
    \ `curl` 来演示各种交易操作，如获取工具列表、下订单或获取历史蜡烛图数据。我只需在 Mac 终端上输入 `curl` 命令即可。我可以轻松看到每次发出的\
    \ `curl` 请求所收到的 JSON 响应。通过实时查看响应和数据，我对支持工具、订单、汇率、持仓等的各种 API 有了非常好的认识和理解。\n\n`curl`\
    \ 命令示例是一个很好的起点，我开始尝试在 REST API^([4](#part0014.html#fn-rapi)) 页面上描述的 Java 测试用例中编写等效命令。"
