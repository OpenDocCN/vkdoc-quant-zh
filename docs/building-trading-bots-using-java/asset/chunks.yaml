    time\":\"1401919221297233\",\"bid\":1.07984,\"ask\":1.08005}}\n13 {\"heartbeat\"\
    :{\"time\":\"1401919221297319\"}}\n14 {\"tick\":{\"instrument\":\"AUD_CAD\",\"\
