    \ instrument, units);\n}\n```\n\n在讨论该方法中的逻辑之前，我们先强调一下影响计算的变量，分别是：\n\n- 计价货币或基础货币（如货币对\
    \ GBPUSD 中的 GBP）。\n- 报价货币（如货币对 GBPUSD 中的 USD）。\n- 账户货币（例如 CHF）。\n- 保证金率或杠杆倍数（0.05\
    \ 或 1:20）。\n\n最简单的情况是计价货币与账户货币相同。例如，如果我们想买入 3000 单位的交易品种`EURAUD`，且账户货币为`EUR`，那么计算方式为`3000\
    \ * 0.05 = €150`。第二种情况是基础货币、报价货币和账户货币三者均不相同。在这种情况下，我们需要有效地获取`{基础货币}/{账户货币}`的当前价格，然后将价格乘以交易单位和保证金率。例如，如果我们想买入\
