    \n## 10. HeartBeating\n\nHeartbeats are a crucial element of any trading system.\
    \ Any streaming or persistent connection over a long period of time must send\
    \ a heartbeat down the pipe to let the consumer know that all is well and alive.\
    \ Ours is no exception. In short heartbeat indicates the health of a system.\n\
    \nThe bot, in theory, should receive frequent heartbeats to be assured that all\
    \ is well. If the heartbeat is irregular or exceeds the wait period for an expected\
    \ heartbeat, it would try to reconnect and restore the passive event stream.\n\
    \nIn this chapter we discuss heartbeats, how to process them and what to do if\
    \ we stop receiving them.\n\n### 10.1 HeartBeatPayLoad\n\nEvery persistent/streaming\
    \ connection potentially can have different payloads to communicate the state\
    \ of the connection. In order to accommodate for this wide range of payload types,\
    \ we define the following pojo that models this characteristic\n\n```\n 1 public\
    \ class HeartBeatPayLoad < T > {\n\n 3  private final T payLoad;\n 4  private\
    \ final String source;\n\n 6  public HeartBeatPayLoad(T payLoad) {\n 7   this(payLoad,\
    \ StringUtils.EMPTY);\n 8  }\n\n10  public HeartBeatPayLoad(T payLoad, String\
    \ source) {\n11   this.payLoad = payLoad;\n12   this.source = source;\n13  }\n\
    \n15  public T getHeartBeatPayLoad() {\n16   return this.payLoad;\n17  }\n\n19\
    \  public String getHeartBeatSource() {\n20   return this.source;\n21  }\n22 }\n\
    ```\n\nThe *source* attribute identifies the source of the heartbeat. This is\
    \ to distinguish between different heartbeat sources in the system. For e.g. in\
    \ the trading bot system, we have atleast 2 heartbeat streams, one for the tick\
    \ data and the other for the trade/order/account events."
