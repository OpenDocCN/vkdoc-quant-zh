    :1.08008}}\n```\n\n上述文件试图模拟一个真实环境，其中存在针对交易品种 `AUD_CAD` 和 `NZD_SGD` 的持续报价数据流。这些报价数据中穿插着心跳消息，同样模拟了数据流处于活动状态。现在让我们来看一下测试\
    \ `OandaMarketDataStreamingService` 的实际测试用例。我们想要测试该服务能否正确处理传入的报价数据和心跳消息，并调用相关的回调处理器，通过\
    \ `EventBus` 将事件向下游分发。我们的测试将包含一个断言，即文件中的事件数量应与推送到下游的事件数量相匹配。让我们来看一下代码，并了解如何实现其中一个断言。\n"
- fmt: "`private static final int expectedPriceEvents = 668; // 1 for each`\n`private\
    \ static final TradeableInstrument < String > AUDCAD = new TradeableInstrument\
    \ < String > (\"AUD_CAD\");`\n`private static final TradeableInstrument < String\
    \ > NZDSGD = new TradeableInstrument < String > (\"NZD_SGD\");`\n`@Test`\n`public\
    \ void marketDataStreaming() throws Exception {`\n `Collection < TradeableInstrument\
    \ < String >> instruments = Lists.newArrayList();`\n `EventBus eventBus = new\
    \ EventBus();`\n `MarketEventCallback < String > mktEventCallback = new MarketEventHandlerImpl\
    \ < String > (eventBus);`\n `HeartBeatCallback < DateTime > heartBeatCallback\
    \ = new HeartBeatCallbackImpl < DateTime > (eventBus);`\n `eventBus.register(this);`\n\
    \ `instruments.add(AUDCAD);`\n `instruments.add(NZDSGD);`\n `OandaStreamingService\
    \ service = new OandaMarketDataStreamingService(OandaTestConstants.streaming_url,`\n\
    \  `OandaTestConstants.accessToken, OandaTestConstants.accountId,`\n  `instruments,\
    \ mktEventCallback, heartBeatCallback, \"TESTMKTSTREAM\");`\n `assertEquals(\"\
    https://stream-fxtrade.oanda.com/v1/prices\" + \"?accountId=123456&instruments=AUD_CAD%2CNZD_SGD\"\
    ,`\n  `service.getStreamingUrl());`\n `OandaStreamingService spy = setUpSpy(service,\
    \ \"src/test/resources/marketData123456.txt\");`\n `assertEquals(expectedPriceEvents\
    \ / 2, audcadCt);`\n `assertEquals(expectedPriceEvents / 2, nzdsgdCt);`\n `assertEquals(expectedPriceEvents\
    \ / 4, heartbeatCt);`\n `MarketDataPayLoad < String > audcadPayLoad = audcadLastRef.get();`\n\
    \ `assertEquals(1.0149, audcadPayLoad.getBidPrice(), OandaTestConstants.precision);`\n\
    \ `assertEquals(1.0151, audcadPayLoad.getAskPrice(), OandaTestConstants.precision);`\n\
    \ `assertEquals(1401920421958 L, audcadPayLoad.getEventDate().getMillis());`\n\
    \ `MarketDataPayLoad < String > nzdsgdPayLoad = nzdsgdLastRef.get();`\n `assertEquals(1.0799,\
    \ nzdsgdPayLoad.getBidPrice(), OandaTestConstants.precision);`\n `assertEquals(1.0801,\
    \ nzdsgdPayLoad.getAskPrice(), OandaTestConstants.precision);`\n `assertEquals(1401920421958\
    \ L, nzdsgdPayLoad.getEventDate().getMillis());`\n `verify(spy, times(1)).handleDisconnect(disconnectmsg);`\n\
    `}`\n\n`private OandaStreamingService setUpSpy(OandaStreamingService service,`\n\
    \ `String fname) throws Exception {`\n `OandaStreamingService spy = spy(service);`\n\
    \ `CloseableHttpClient mockHttpClient = mock(CloseableHttpClient.class);`\n `when(spy.getHttpClient()).thenReturn(mockHttpClient);`\n\
    \ `when(spy.isStreaming()).thenReturn(service.isStreaming());`\n `OandaTestUtils.mockHttpInteraction(fname,\
    \ mockHttpClient);`\n `spy.startStreaming();`\n `do {`\n  `Thread.sleep(2 L);`\n\
    \ `} while (spy.streamThread.isAlive());`\n `return spy;`\n`}`\n\n`setUpSpy`方法执行流服务的常规设置，首先对底层`OandaStreamingService`实例（本例中为`OandaMarketDataStreamingService`）创建一个`spy`。然后设置`mockHttpInteraction`，其中文件`src/test/resources/marketData123456.txt`将被设置为市场数据流所有事件的源，当底层服务通过调用`spy.startStreaming()`开始流式传输时生效。一旦流开始，我们等待所有报价数据和心跳事件完全传输。我们设置一个`do-while`循环，其中包含2毫秒的休眠作为等待机制，以确保完成。一旦流接收到`disconnect`消息，它会自动停止，这是文件中的最后一个事件。我们的流在收到此类消息后会自动停止。这种情况有时发生在OANDA平台检测到流连接数已超限时。断开消息如下所示：\n\
    \n```\n{\"disconnect\":{\"code\":64,\"message\":\"bye\",\"moreInfo\":\"none\"\
    }}\n```\n\n断开消息导致流的终止，而设置为准无限循环的后台线程`streamThread`也会终止。然后该方法返回到调用者。\n\n现在我们必须测试所有事件是否已通过`EventBus`成功传递给下游订阅者。出于此测试用例的目的，测试类本身是所有这些事件的最终消费者。这在我们的测试用例`marketDataStreaming()`中已展示，我们在设置主服务时进行了设置。由于我们希望订阅`MarketDataPayLoad`和`HeartBeatPayLoad`事件，我们在测试类中设置了以下虚拟方法，仅计算收到的事件数量。\n\
    \n```\nprivate volatile int audcadCt;\nprivate volatile int nzdsgdCt;\nprivate\
    \ AtomicReference < MarketDataPayLoad < String >> audcadLastRef =\n new AtomicReference\
    \ < MarketDataPayLoad < String >> ();\nprivate AtomicReference < MarketDataPayLoad\
    \ < String >> nzdsgdLastRef =\n new AtomicReference < MarketDataPayLoad < String\
    \ >> ();\n@Subscribe\npublic void dummyMarketDataSubscriber(MarketDataPayLoad\
    \ < String > payLoad) {\n if (payLoad.getInstrument().equals(AUDCAD)) {\n  this.audcadCt++;\n\
    \  this.audcadLastRef.set(payLoad);\n } else {\n  this.nzdsgdCt++;\n  this.nzdsgdLastRef.set(payLoad);\n\
    \ }\n}\n@Subscribe\npublic void dummyHeartBeatSubscriber(HeartBeatPayLoad < DateTime\
    \ > payLoad) {\n heartbeatCt++;\n}\n```\n\n文件中的所有事件都指向这些方法，这些方法除了统计心跳事件外，还会跟踪属于货币对`AUD_CAD`和`NZD_SGD`的已接收事件数量。然后，`asserts`确保接收的事件数量和顺序是正确的。"
