- fmt: "### 6.6 Putting it all together in an `OrderExecutionService`\n\nWe conclude\
    \ our discussion of order management services, by diving deep into the `OrderExecutionService`.\
    \ The design of this service is based around a queue, from where orders are picked\
    \ up and after all checks pass, an order is sent to the platform. The idea is\
    \ that, from our various strategies and may be from other services, we have the\
    \ ability to simply drop the order in a queue and rest is taken care of by this\
    \ service, which is listening on this queue for new orders. By doing this we have\
    \ decoupled the act of arriving at a decision to place an order (based on a trading\
    \ signal, that our strategy has advised) for a given instrument and the mechanics\
    \ of placing the order. Lets begin by looking at the constructor and the dependencies\
    \ that it expects.\n\n```\n 1 public class OrderExecutionService < M, N, K > implements\
    \ Runnable {\n\n3   private static final Logger LOG = Logger.getLogger(OrderExecutionService.class);\n\
    \n5   private final BlockingQueue < TradingDecision < N >> orderQueue;\n 6   private\
    \ final AccountInfoService < K, N > accountInfoService;\n 7   private final OrderManagementProvider\
    \ < M, N, K > orderManagementProvider;\n 8   private final BaseTradingConfig baseTradingConfig;\n\
    \ 9   private final PreOrderValidationService < M, N, K > preOrderValidationService;\n\
    10   private final CurrentPriceInfoProvider < N > currentPriceInfoProvider;\n\
    11   private volatile boolean serviceUp = true;\n12   Thread orderExecThread;\n\
    \n14   public OrderExecutionService(BlockingQueue < TradingDecision < N >> orderQueue,\n\
    15    AccountInfoService < K, N > accountInfoService,\n16    OrderManagementProvider\
    \ < M, N, K >\n17    orderManagementProvider, BaseTradingConfig baseTradingConfig,\n\
    18    PreOrderValidationService < M, N, K > preOrderValidationService,\n19   \
    \ CurrentPriceInfoProvider < N > currentPriceInfoProvider) {\n20    this.orderQueue\
    \ = orderQueue;\n21    this.accountInfoService = accountInfoService;\n22    this.orderManagementProvider\
    \ = orderManagementProvider;\n23    this.baseTradingConfig = baseTradingConfig;\n\
    24    this.preOrderValidationService = preOrderValidationService;\n25    this.currentPriceInfoProvider\
    \ = currentPriceInfoProvider;\n26   }\n27   @PostConstruct\n28   public void init()\
    \ {\n29    orderExecThread = new Thread(this, this.getClass().getSimpleName());\n\
    30    orderExecThread.start();\n31   }\n```\n\nThe first thing we notice is that\
    \ our service implements the `Runnable` interface, which suggests that this service\
    \ is going to spawn a thread to continuously monitor the order queue. The thread\
    \ is initialised in the `init` method which is automatically invoked by a DI framework\
    \ like Spring once the application context is initialized (due to `@PostConstruct`\
    \ annotation), or needs to be explicitly called if we are not using one. In our\
    \ thread, we continuously monitor the order queue for a new order. Once an order\
    \ is received from the queue, we bring these dependencies into play (the use of\
    \ each will become evident soon). Lets look at the `run` method where all the\
    \ action seems to happen.\n\n```\n 1 @Override\n 2 public void run() {\n 3   while\
    \ (serviceUp) {\n 4    try {\n 5     TradingDecision < N > decision = this.orderQueue.take();\n\
    \ 6     if (!preValidate(decision)) {\n 7      continue;\n 8     }\n 9     Collection\
    \ < K > accountIds = this.accountInfoService.findAccountsToTrade();\n10     if\
    \ (accountIds.isEmpty()) {\n11      LOG.info(\"Not a single eligible account found\
    \ as the reserve may have\n12       been exhausted.\n13       \");\n14       continue;\n\
    15      }\n16      Order < N, M > order = null;\n17      if (decision.getLimitPrice()\
    \ == 0.0) { // market order\n18       order = new Order < N, M > (decision.getInstrument(),\n\
    19        this.baseTradingConfig.getMaxAllowedQuantity(), decision.getSignal(),\n\
    20        OrderType.MARKET, decision.getTakeProfitPrice(),\n21        decision.getStopLossPrice());\n\
    22      } else {\n23       order = new Order < N, M > (decision.getInstrument(),\n\
