  trans: "\n### 3.1 `InstrumentDataProvider` 接口\n\n现在我们必须定义提供者为了获取交易品种数据而必须实现的接口。与账户类似，我们只关心只读数据，因为在经纪平台上，我们无法对交易品种进行创建、更新或删除操作。这是一个获取不可变数据的简单场景，这些数据几乎从不改变，至少在交易时段内如此。偶尔可能会有某些交易品种不再被支持的罕见情况，但大多数情况下，我们观察到的是新增了可供交易的交易品种。可能变化更频繁（但仅在展期窗口期内）的是不同货币的利率。如下面的代码清单所示，我们的接口非常直观。\n\
    \n**代码清单 3.3：** `InstrumentDataProvider` 接口定义\n\n```\n 1 /**\n 2  * 可交易品种数据信息的提供者。提供者至少必须为每个交易品种\n\
    \ 3  * 提供交易品种名称和点值。由于交易品种数据在交易时段内几乎\n 4  * 从不改变，强烈建议将从此提供者返回的数据缓存在一个不可变\n 5  *\
    \ 集合中。\n 6  *\n 7  * @param <T> TradeableInstrument 类中 instrumentId 的类型\n 8  *\
    \ @see TradeableInstrument\n 9  */\n10 public interface InstrumentDataProvider\
    \ < T > {\n11  /**\n12   *\n13   * @return 经纪平台上所有可供交易的 TradeableInstrument 的集合。\n\
    14   */\n15  Collection < TradeableInstrument < T >> getInstruments();\n16 }\n\
    ```\n\n### 3.2 `InstrumentDataProvider` 的一个具体实现\n\n在我们深入讨论该接口的 OANDA 实现之前，让我们快速查看一下当我们请求所有可交易品种列表时返回的一个示例\
    \ JSON 摘录。实际的 JSON 会包含更多的交易品种。\n\n**代码清单 3.4：** 交易品种的示例 JSON 负载\n\n```\n 1 {\n\
    \ 2   \"instruments\": [\n 3     {\n 4       \"instrument\": \"AUD_CAD\",\n 5\
    \       \"pip\": \"0.0001\",\n 6       \"interestRate\": {\n 7         \"AUD\"\
    : {\n 8           \"bid\": 0.0164,\n 9           \"ask\": 0.0274\n10         },\n\
    11         \"CAD\": {\n12           \"bid\": 0.002,\n13           \"ask\": 0.008\n\
    14         }\n15       }\n16     },\n17     {\n18       \"instrument\": \"AUD_CHF\"\
    ,\n19       \"pip\": \"0.0001\",\n20       \"interestRate\": {\n21         \"\
    AUD\": {\n22           \"bid\": 0.0164,\n23           \"ask\": 0.0274\n24    \
    \     },\n25         \"CHF\": {\n26           \"bid\": -0.013,\n27           \"\
    ask\": 0.003\n28         }\n29       }\n30     }\n31   ]\n32 }\n```\n\n像往常一样，我们开始代码讨论，首先列出将要使用的所有\
    \ JSON 键：\n\n```\n1 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.ask;\n\
    2 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.bid;\n\
    3 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.instruments;\n\
    4 import static com.precioustech.fxtrading.oanda.restapi.OandaJsonKeys.interestRate;\n\
    ```\n\n由于 OANDA 目前没有交易品种的内部标识符，我们使用交易品种名称作为标识符。因此，将 `T` 参数类型替换为 `String`，我们得到：\n\
    \n```\n1 public class OandaInstrumentDataProviderService implements InstrumentDataProvider<String>\
    \ {\n```\n\n对于构造函数定义，我们提供 OANDA URL、一个有效的账户 ID 和访问令牌。请记住，账户 ID 应该是与访问令牌关联的用户的一个有效账户。\n\
    \n```\n1 public OandaInstrumentDataProviderService(String url, long accountId,\
    \ String accessToken) {\n2  this.url = url; // OANDA REST 服务基础 URL\n3  this.accountId\
    \ = accountId; // OANDA 有效账户 ID\n4  this.authHeader = OandaUtils.createAuthHeader(accessToken);\n\
    5 }\n```\n\n交易品种资源的端点是：\n\n```\n1 public static final String INSTRUMENTS_RESOURCE\
    \ = \"/v1/instruments\";\n```\n\n因此，我们用于计算从 OANDA 获取所有可交易品种的 URL 的函数如下所示：\n\n\
    ```\n1 static final String fieldsRequested = \"instrument%2Cpip%2CinterestRate\"\
    \ //URL 编码的逗号分隔字段列表;\n\n3 String getInstrumentsUrl() {\n4  return this.url + OandaConstants.INSTRUMENTS_RESOURCE\
    \ + \"?accountId=\" +\n5  this.accountId + \"&fields=\" + fieldsRequested;\n6\
    \ }\n```\n\n关于变量 `fieldsRequested` 的一个说明。默认情况下，如果此请求参数不是 URL 的一部分，那么 OANDA 默认返回字段\
    \ `instrument`、`displayName`、`pip`、`maxTradeUnits`，如下面的示例 JSON 响应所示：\n\n```\n\
    \ 1 {\n 2   \"instruments\" : [\n 3     {\n 4       \"instrument\" : \"AUD_CAD\"\
    ,\n 5       \"displayName\" : \"AUD\\/CAD\",\n 6       \"pip\" : \"0.0001\",\n\
    \ 7       \"maxTradeUnits\" : 10000000\n 8     },\n 9     {\n10       \"instrument\"\
    \ : \"AUD_CHF\",\n11       \"displayName\" : \"AUD\\/CHF\",\n12       \"pip\"\
    \ : \"0.0001\",\n13       \"maxTradeUnits\" : 10000000\n14     }\n15   ]\n16 }\n\
    ```\n\n由于 `interestRate` 不在默认字段列表中，我们必须使用 `fieldsRequested` 查询参数显式请求它，以及我们希望在响应中包含的每个字段。现在继续讨论接口的主要实现，如下所示：\n\
    \n**代码清单 3.5：** `getInstruments()` 实现\n"
- fmt: "```java\n1 @Override\n2 public Collection < TradeableInstrument < String >>\
    \ getInstruments() {\n3  Collection < TradeableInstrument < String >> instrumentsList\
    \ = Lists.newArrayList();\n4  CloseableHttpClient httpClient = getHttpClient();\n\
    5  try {\n6   HttpUriRequest httpGet = new HttpGet(getInstrumentsUrl());\n7  \
    \ httpGet.setHeader(authHeader);\n8   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    9   HttpResponse resp = httpClient.execute(httpGet);\n10   String strResp = TradingUtils.responseToString(resp);\n\
    11   if (strResp != StringUtils.EMPTY) {\n12    Object obj = JSONValue.parse(strResp);\n\
    13    JSONObject jsonResp = (JSONObject) obj;\n14    JSONArray instrumentArray\
    \ = (JSONArray) jsonResp.get(instruments);\n15\n16    for (Object o: instrumentArray)\
    \ {\n17     JSONObject instrumentJson = (JSONObject) o;\n18     String instrument\
    \ = (String) instrumentJson.get(OandaJsonKeys.instrument);\n19     String[] currencies\
    \ = OandaUtils.splitCcyPair(instrument);\n20     Double pip = Double.parseDouble(instrumentJson.get(OandaJsonKeys.pip).toString());\n\
    21     JSONObject interestRates = (JSONObject) instrumentJson.get(interestRate);\n\
    22     if (interestRates.size() != 2) {\n23      throw new IllegalArgumentException();\n\
    24     }\n25\n26     JSONObject currency1Json = (JSONObject) interestRates.get(currencies[0]);\n\
    27     JSONObject currency2Json = (JSONObject) interestRates.get(currencies[1]);\n\
    28\n29     final double baseCurrencyBidInterestRate = ((Number) currency1Json.get(bid)).doubleValue();\n\
    30     final double baseCurrencyAskInterestRate = ((Number) currency1Json.get(ask)).doubleValue();\n\
    31     final double quoteCurrencyBidInterestRate = ((Number) currency2Json.get(bid)).doubleValue();\n\
    32     final double quoteCurrencyAskInterestRate = ((Number) currency2Json.get(ask)).doubleValue();\n\
    33\n34     InstrumentPairInterestRate instrumentPairInterestRate = new InstrumentPairInterestRate(\n\
    35      baseCurrencyBidInterestRate, baseCurrencyAskInterestRate,\n36      quoteCurrencyBidInterestRate,\
    \ quoteCurrencyAskInterestRate);\n37\n38     TradeableInstrument < String > tradeableInstrument\
    \ = new TradeableInstrument < String > (\n39      instrument, pip, instrumentPairInterestRate,\
    \ null);\n40     instrumentsList.add(tradeableInstrument);\n41    }\n42   } else\
    \ {\n43    TradingUtils.printErrorMsg(resp);\n44   }\n45  } catch (Exception e)\
    \ {\n46   LOG.error(e);\n47  } finally {\n48   TradingUtils.closeSilently(httpClient);\n\
    49  }\n50  return instrumentsList;\n51 }\n```\n\nThe implementation is pretty\
    \ straightforward and can be summarised as:\n\n-   Construct the request url by\
    \ calling the `getInstrumentUrl()` function.\n-   Fire off the request using an\
    \ instance of `HttpGet` class.\n-   A successful request would contain an array\
    \ of `instruments`.\n-   For each element in the array, parse the `instrument`,\
    \ `pip` which is readily available in the element. The `interestRate` must further\
    \ be treated as an array of 2 elements, first one for the base currency and the\
    \ second for the quoted currency.\n-   Parse the bid/ask interest rate for each\
    \ currency and create an instance of `InstrumentPairInterestRate` object.\n- \
    \  We now have all the attributes we need for a given instrument. Store in the\
    \ collection that will be returned from this method.\n\n### 3.3 Encapsulating\
    \ everything behind a generic `InstrumentService`\n\nThis service would provide\
    \ some useful information regarding tradeable instruments which we will soon explore.\
    \ Since the instrument data is fairly immutable, we can safely cache the instrument\
    \ information internally and then use the cache to service requests for any requested\
    \ information. Since the cache is immutable and read only, we do not have to worry\
    \ about concurrency issues also. We begin by discussing the constructor, which\
    \ just needs an implementation of the `InstrumentDataProvider` as a dependency.\n\
    \n```java\n1 private final Map<String, TradeableInstrument<T>> instrumentMap;\n\
    2\n3 public InstrumentService(InstrumentDataProvider<T> instrumentDataProvider)\
    \ {\n4 \tPreconditions.checkNotNull(instrumentDataProvider);\n5 \tCollection<TradeableInstrument<T>>\
    \ instruments = instrumentDataProvider.getInstruments();\n6 \tMap<String, TradeableInstrument<T>>\
    \ tradeableInstrumenMap = Maps.newHashMap();\n7 \tfor (TradeableInstrument<T>\
    \ instrument : instruments) {\n8 \t\ttradeableInstrumenMap.put(instrument.getInstrument(),\
    \ instrument);\n9 \t}\n10 \tthis.instrumentMap = Collections.unmodifiableMap(tradeableInstrumenMap);\n\
    11 }\n```\n\nWithin the constructor, we use the `InstrumentDataProvider` implementation\
    \ to fetch all instruments at once and then construct our immutable cache `instrumentMap`.\
    \ We now turn our attention to discussing the first of our 2 service methods called\
    \ `getPipForInstrument`. This returns the pip for a given instrument. A useful\
    \ invocation for this method could be to say calculate the stop loss or take profit\
    \ price when placing a limit order for an instrument. Let’s say we want to place\
    \ a limit buy order for EURUSD if the current price drops by 30 pips. Our trigger\
    \ price would be something like\n\n```java\n1 TradeableInstrument<String> eurusd\
    \ = new TradeableInstrument<String>(\"EUR_USD\");\n2 double triggerPrice = currentPrice\
    \ - 30 * instrumentService.getPipForInstrument(eurusd);\n```\n\nNow lets look\
    \ at the actual code for this useful service method.\n\n```java\n1 public Double\
    \ getPipForInstrument(TradeableInstrument < T > instrument) {\n2  Preconditions.checkNotNull(instrument);\n\
    3  TradeableInstrument < T > tradeableInstrument = this.instrumentMap.get(instrument.getInstrument());\n\
    4  if (tradeableInstrument != null) {\n5   return tradeableInstrument.getPip();\n\
    6  } else {\n7   return 1.0;\n8  }\n9 }\n```\n\nThe above code is quite straightforward.\
    \ Using the instrument passed in, fetch the instance of `TradeableInstrument`\
    \ which corresponds to the instrument. If not found return 1.0 else return the\
    \ pip value for the instrument.\n\nAnother useful service method is `getAllPairsWithCurrency`.\
    \ This returns a collection of all instruments in which the given currency is\
    \ either a denominated or quoted currency. For e.g. to get a collection of all\
    \ instruments that have `CHF` as base or quoted currency one would invoke it as\n\
    \n```java\n1 //return instruments such as USDCHF,CHFJPY..\n2 Collection<TradeableInstrument<String>>\
    \ chfpairs = instrumentService.getAllPairsWithCurrency(\"CHF\");\n```\n\nNow lets\
    \ look at the actual implementation which is again quite straightforward\n\n```java\n\
    \ 1 public Collection < TradeableInstrument < T >> getAllPairsWithCurrency(String\
    \ currency) {\n 2  Collection < TradeableInstrument < T >> allPairs = Sets.newHashSet();\n\
    \ 3  if (StringUtils.isEmpty(currency)) {\n 4   return allPairs;\n 5  }\n 6  for\
    \ (Map.Entry < String, TradeableInstrument < T >> entry: instrumentMap.entrySet())\
    \ {\n 7   if (entry.getKey().contains(currency)) {\n 8    allPairs.add(entry.getValue());\n\
    \ 9   }\n10  }\n11  return allPairs;\n12 }\n```\n\nIn the code above, we return\
    \ an empty collection if the passed in value is null or a blank string. If a valid\
    \ string, we iterate over our cache and use `contains` to check if the current\
    \ key contains the passed in string. If it does, then we just add it to the collection\
    \ that will be returned from the method. This concludes our discussion of pretty\
    \ much most of the things around tradeable instruments."
  raw: "```\n 1 @Override\n 2 public Collection < TradeableInstrument < String >>\
    \ getInstruments() {\n 3  Collection < TradeableInstrument < String >> instrumentsList\
    \ = Lists.newArrayList();\n 4  CloseableHttpClient httpClient = getHttpClient();\n\
    \ 5  try {\n 6   HttpUriRequest httpGet = new HttpGet(getInstrumentsUrl());\n\
    \ 7   httpGet.setHeader(authHeader);\n 8   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    \ 9   HttpResponse resp = httpClient.execute(httpGet);\n10   String strResp =\
    \ TradingUtils.responseToString(resp);\n11   if (strResp != StringUtils.EMPTY)\
    \ {\n12    Object obj = JSONValue.parse(strResp);\n13    JSONObject jsonResp =\
    \ (JSONObject) obj;\n14    JSONArray instrumentArray = (JSONArray) jsonResp.get(instruments);\n\
    \n16    for (Object o: instrumentArray) {\n17     JSONObject instrumentJson =\
    \ (JSONObject) o;\n18     String instrument = (String) instrumentJson.get(OandaJsonKeys.instrument);\n\
    19     String[] currencies = OandaUtils.splitCcyPair(instrument);\n20     Double\
    \ pip = Double.parseDouble(instrumentJson.get(OandaJsonKeys.pip).toString());\n\
    21     JSONObject interestRates = (JSONObject) instrumentJson.get(interestRate);\n\
    22     if (interestRates.size() != 2) {\n23      throw new IllegalArgumentException();\n\
    24     }\n\n26     JSONObject currency1Json = (JSONObject) interestRates.get(currencies[0]);\n\
    27     JSONObject currency2Json = (JSONObject) interestRates.get(currencies[1]);\n\
    \n29     final double baseCurrencyBidInterestRate = ((Number) currency1Json.get(bid)).doubleValue();\n\
    30     final double baseCurrencyAskInterestRate = ((Number) currency1Json.get(ask)).doubleValue();\n\
    31     final double quoteCurrencyBidInterestRate = ((Number) currency2Json.get(bid)).doubleValue();\n\
    32     final double quoteCurrencyAskInterestRate = ((Number) currency2Json.get(ask)).doubleValue();\n\
    \n34     InstrumentPairInterestRate instrumentPairInterestRate = new InstrumentPairInterestRate(\n\
    35      baseCurrencyBidInterestRate, baseCurrencyAskInterestRate,\n36      quoteCurrencyBidInterestRate,\
    \ quoteCurrencyAskInterestRate);\n\n38     TradeableInstrument < String > tradeableInstrument\
    \ = new TradeableInstrument < String > (\n39      instrument, pip, instrumentPairInterestRate,\
    \ null);\n40     instrumentsList.add(tradeableInstrument);\n41    }\n42   } else\
    \ {\n43    TradingUtils.printErrorMsg(resp);\n44   }\n45  } catch (Exception e)\
    \ {\n46   LOG.error(e);\n47  } finally {\n48   TradingUtils.closeSilently(httpClient);\n\
    49  }\n50  return instrumentsList;\n51 }\n```\n\nThe implementation is pretty\
    \ straightforward and can be summarised as:\n\n*   Construct the request url by\
    \ calling the ***getInstrumentUrl()*** function.\n*   Fire off the request using\
    \ an instance of ***HttpGet*** class.\n*   A successful request would contain\
    \ an array of ***instruments***.\n*   For each element in the array, parse the\
    \ ***instrument,pip*** which is readily available in the element. The ***interestRate***\
    \ must further be treated as an array of 2 elements, first one for the base currency\
    \ and the second for the quoted currency.\n*   Parse the bid/ask interest rate\
    \ for each currency and create an instance of ***InstrumentPairInterestRate***\
    \ object.\n*   We now have all the attributes we need for a given instrument.\
    \ Store in the collection that will be returned from this method.\n\n### 3.3 Encapsulating\
    \ everything behind a generic ***InstrumentService***\n\nThis service would provide\
    \ some useful information regarding tradeable instruments which we will soon explore.\
    \ Since the instrument data is fairly immutable, we can safely cache the instrument\
    \ information internally and then use the cache to service requests for any requested\
    \ information. Since the cache is immutable and read only, we do not have to worry\
    \ about concurrency issues also. We begin by discussing the constructor, which\
    \ just needs an implementation of the ***InstrumentDataProvider*** as a dependency.\n\
    \n```\n 1 private final Map<String, TradeableInstrument<T>> instrumentMap;\n\n\
    3 public InstrumentService(InstrumentDataProvider<T> instrumentDataProvider) {\n\
    \ 4 \tPreconditions.checkNotNull(instrumentDataProvider);\n 5 \tCollection<TradeableInstrument<T>>\
    \ instruments = instrumentDataProvider.getInstruments();\n 6 \tMap<String, TradeableInstrument<T>>\
    \ tradeableInstrumenMap = Maps.newHashMap();\n 7 \tfor (TradeableInstrument<T>\
    \ instrument : instruments) {\n 8 \t\ttradeableInstrumenMap.put(instrument.getInstrument(),\
    \ instrument);\n 9 \t}\n10 \tthis.instrumentMap = Collections.unmodifiableMap(tradeableInstrumenMap);\n\
    11 }\n```\n\nWithin the constructor, we use the ***InstrumentDataProvider*** implementation\
    \ to fetch all instruments at once and then construct our immutable cache ***instrumentMap***.\
    \ We now turn our attention to discussing the first of our 2 service methods called\
    \ ***getPipForInstrument***. This returns the pip for a given instrument. A useful\
    \ invocation for this method could be to say calculate the stop loss or take profit\
    \ price when placing a limit order for an instrument. Let’s say we want to place\
    \ a limit buy order for EURUSD if the current price drops by 30 pips. Our trigger\
    \ price would be something like\n\n```\n1 TradeableInstrument<String> eurusd =\
    \ new TradeableInstrument<String>(\"EUR_USD\");\n2 double triggerPrice = currentPrice\
    \ - 30 * instrumentService.getPipForInstrument(eurusd);\n```\n\nNow lets look\
    \ at the actual code for this useful service method.\n\n```\n1 public Double getPipForInstrument(TradeableInstrument\
    \ < T > instrument) {\n2  Preconditions.checkNotNull(instrument);\n3  TradeableInstrument\
    \ < T > tradeableInstrument = this.instrumentMap.get(instrument.getInstrument());\n\
    4  if (tradeableInstrument != null) {\n5   return tradeableInstrument.getPip();\n\
    6  } else {\n7   return 1.0;\n8  }\n9 }\n```\n\nThe above code is quite straightforward.\
    \ Using the instrument passed in, fetch the instance of ***TradeableInstrument***\
    \ which corresponds to the instrument. If not found return 1.0 else return the\
    \ pip value for the instrument.\n\nAnother useful service method is ***getAllPairsWithCurrency***.\
    \ This returns a collection of all instruments in which the given currency is\
    \ either a denominated or quoted currency. For e.g. to get a collection of all\
    \ instruments that have ***CHF*** as base or quoted currency one would invoke\
    \ it as\n\n```\n1 //return instruments such as USDCHF,CHFJPY..\n2 Collection<TradeableInstrument<String>>\
    \ chfpairs = instrumentService.getAllPairsWithCurrency(\"CHF\");\n```\n\nNow lets\
    \ look at the actual implementation which is again quite straightforward\n\n```\n\
    \ 1 public Collection < TradeableInstrument < T >> getAllPairsWithCurrency(String\
    \ currency) {\n 2  Collection < TradeableInstrument < T >> allPairs = Sets.newHashSet();\n\
    \ 3  if (StringUtils.isEmpty(currency)) {\n 4   return allPairs;\n 5  }\n 6  for\
    \ (Map.Entry < String, TradeableInstrument < T >> entry: instrumentMap.entrySet())\
    \ {\n 7   if (entry.getKey().contains(currency)) {\n 8    allPairs.add(entry.getValue());\n\
    \ 9   }\n10  }\n11  return allPairs;\n12 }\n```\n\nIn the code above, we return\
    \ an empty collection if the passed in value is null or a blank string. If a valid\
    \ string, we iterate over our cache and use ***contains*** to check if the current\
    \ key contains the passed in string. If it does, then we just add it to the collection\
    \ that will be returned from the method. This concludes our discussion of pretty\
    \ much most of the things around tradeable instruments."
  trans: "\n```java\n1 @Override\n2 public Collection < TradeableInstrument < String\
    \ >> getInstruments() {\n3  Collection < TradeableInstrument < String >> instrumentsList\
    \ = Lists.newArrayList();\n4  CloseableHttpClient httpClient = getHttpClient();\n\
    5  try {\n6   HttpUriRequest httpGet = new HttpGet(getInstrumentsUrl());\n7  \
    \ httpGet.setHeader(authHeader);\n8   LOG.info(TradingUtils.executingRequestMsg(httpGet));\n\
    9   HttpResponse resp = httpClient.execute(httpGet);\n10   String strResp = TradingUtils.responseToString(resp);\n\
    11   if (strResp != StringUtils.EMPTY) {\n12    Object obj = JSONValue.parse(strResp);\n\
    13    JSONObject jsonResp = (JSONObject) obj;\n14    JSONArray instrumentArray\
    \ = (JSONArray) jsonResp.get(instruments);\n15\n16    for (Object o: instrumentArray)\
    \ {\n17     JSONObject instrumentJson = (JSONObject) o;\n18     String instrument\
    \ = (String) instrumentJson.get(OandaJsonKeys.instrument);\n19     String[] currencies\
    \ = OandaUtils.splitCcyPair(instrument);\n20     Double pip = Double.parseDouble(instrumentJson.get(OandaJsonKeys.pip).toString());\n\
    21     JSONObject interestRates = (JSONObject) instrumentJson.get(interestRate);\n\
    22     if (interestRates.size() != 2) {\n23      throw new IllegalArgumentException();\n\
    24     }\n25\n26     JSONObject currency1Json = (JSONObject) interestRates.get(currencies[0]);\n\
    27     JSONObject currency2Json = (JSONObject) interestRates.get(currencies[1]);\n\
    28\n29     final double baseCurrencyBidInterestRate = ((Number) currency1Json.get(bid)).doubleValue();\n\
    30     final double baseCurrencyAskInterestRate = ((Number) currency1Json.get(ask)).doubleValue();\n\
    31     final double quoteCurrencyBidInterestRate = ((Number) currency2Json.get(bid)).doubleValue();\n\
    32     final double quoteCurrencyAskInterestRate = ((Number) currency2Json.get(ask)).doubleValue();\n\
    33\n34     InstrumentPairInterestRate instrumentPairInterestRate = new InstrumentPairInterestRate(\n\
    35      baseCurrencyBidInterestRate, baseCurrencyAskInterestRate,\n36      quoteCurrencyBidInterestRate,\
    \ quoteCurrencyAskInterestRate);\n37\n38     TradeableInstrument < String > tradeableInstrument\
    \ = new TradeableInstrument < String > (\n39      instrument, pip, instrumentPairInterestRate,\
    \ null);\n40     instrumentsList.add(tradeableInstrument);\n41    }\n42   } else\
    \ {\n43    TradingUtils.printErrorMsg(resp);\n44   }\n45  } catch (Exception e)\
    \ {\n46   LOG.error(e);\n47  } finally {\n48   TradingUtils.closeSilently(httpClient);\n\
    49  }\n50  return instrumentsList;\n51 }\n```\n\n该实现非常直接，可总结如下：\n\n-   通过调用`getInstrumentUrl()`函数构建请求\
    \ URL。\n-   使用`HttpGet`类的实例发起请求。\n-   成功的请求将包含一个`instruments`数组。\n-   对于数组中的每个元素，解析可直接获取的`instrument`和`pip`。而`interestRate`必须进一步视为包含\
    \ 2 个元素的数组，第一个元素对应基础货币，第二个元素对应报价货币。\n-   解析每种货币的买入/卖出利率，并创建一个`InstrumentPairInterestRate`对象实例。\n\
    -   现在我们拥有某个工具所需的所有属性。将它们存储到将从此方法返回的集合中。\n\n### 3.3 将所有内容封装到通用的`InstrumentService`背后\n\
    \n该服务将提供一些关于可交易工具的实用信息，我们稍后会深入研究。由于工具数据相当不可变，我们可以安全地在内部缓存工具信息，然后使用缓存来服务任何请求的信息。由于缓存是不可变且只读的，我们也不必担心并发问题。我们首先讨论构造函数，它只需要一个`InstrumentDataProvider`的实现作为依赖。\n\
    \n```java\n1 private final Map<String, TradeableInstrument<T>> instrumentMap;\n\
    2\n3 public InstrumentService(InstrumentDataProvider<T> instrumentDataProvider)\
    \ {\n4 \tPreconditions.checkNotNull(instrumentDataProvider);\n5 \tCollection<TradeableInstrument<T>>\
    \ instruments = instrumentDataProvider.getInstruments();\n6 \tMap<String, TradeableInstrument<T>>\
    \ tradeableInstrumenMap = Maps.newHashMap();\n7 \tfor (TradeableInstrument<T>\
    \ instrument : instruments) {\n8 \t\ttradeableInstrumenMap.put(instrument.getInstrument(),\
    \ instrument);\n9 \t}\n10 \tthis.instrumentMap = Collections.unmodifiableMap(tradeableInstrumenMap);\n\
    11 }\n```\n\n在构造函数内部，我们使用`InstrumentDataProvider`实现一次性获取所有工具，然后构建不可变缓存`instrumentMap`。现在我们将注意力转向讨论两个服务方法中的第一个，名为`getPipForInstrument`。该方法返回给定工具的\
    \ pip 值。此方法的一个有用调用场景可能是，当为某个工具设置限价单时，计算止损或止盈价格。假设我们想在 EURUSD 当前价格下跌 30 个点时下达限价买单。我们的触发价格将会如下所示：\n\
    \n```java\n1 TradeableInstrument<String> eurusd = new TradeableInstrument<String>(\"\
    EUR_USD\");\n2 double triggerPrice = currentPrice - 30 * instrumentService.getPipForInstrument(eurusd);\n\
    ```\n\n现在让我们看看这个实用服务方法的实际代码。\n\n```java\n1 public Double getPipForInstrument(TradeableInstrument\
    \ < T > instrument) {\n2  Preconditions.checkNotNull(instrument);\n3  TradeableInstrument\
    \ < T > tradeableInstrument = this.instrumentMap.get(instrument.getInstrument());\n\
    4  if (tradeableInstrument != null) {\n5   return tradeableInstrument.getPip();\n\
    6  } else {\n7   return 1.0;\n8  }\n9 }\n```\n\n上述代码非常简单。根据传入的工具，获取`instrumentMap`中对应的`TradeableInstrument`实例。如果未找到则返回\
    \ 1.0，否则返回该工具的 pip 值。\n\n另一个有用的服务方法是`getAllPairsWithCurrency`。该方法返回一个集合，其中包含指定货币作为基础货币或报价货币的所有工具。例如，要获取所有以`CHF`为基础或报价货币的工具集合，可以像这样调用：\n\
    \n```java\n1 // 返回诸如 USDCHF, CHFJPY 等工具\n2 Collection<TradeableInstrument<String>>\
    \ chfpairs = instrumentService.getAllPairsWithCurrency(\"CHF\");\n```\n\n现在让我们看看同样非常直接的实际实现。\n\
    \n```java\n 1 public Collection < TradeableInstrument < T >> getAllPairsWithCurrency(String\
    \ currency) {\n 2  Collection < TradeableInstrument < T >> allPairs = Sets.newHashSet();\n\
    \ 3  if (StringUtils.isEmpty(currency)) {\n 4   return allPairs;\n 5  }\n 6  for\
    \ (Map.Entry < String, TradeableInstrument < T >> entry: instrumentMap.entrySet())\
    \ {\n 7   if (entry.getKey().contains(currency)) {\n 8    allPairs.add(entry.getValue());\n\
    \ 9   }\n10  }\n11  return allPairs;\n12 }\n```\n\n在上述代码中，如果传入的值为空或空白字符串，则返回一个空集合。如果是一个有效的字符串，我们遍历缓存并使用`contains`来检查当前键是否包含传入的字符串。如果包含，则将其添加到将从方法返回的集合中。至此，我们关于可交易工具的大部分讨论就结束了。\n"
- fmt: "### 3.4 Try it yourself\n\nIn this section we are going to create a demo program\
    \ that will invoke some of the methods of the `InstrumentServiceDemo` and print\
    \ output to the console.\n\n```java\n 1 package com.precioustech.fxtrading.instrument;\n\
    \n 3 import java.util.Collection;\n\n 5 import org.apache.commons.lang3.StringUtils;\n\
    \ 6 import org.apache.log4j.Logger;\n\n 8 import com.precioustech.fxtrading.oanda.restapi.instrument.OandaInstrumentDataProviderService;\n\
    \n10 public class InstrumentServiceDemo {\n\n12  private static final Logger LOG\
    \ = Logger.getLogger(InstrumentServiceDemo.class);\n\n14  private static void\
    \ usageAndValidation(String[] args) {\n15   if (args.length != 3) {\n16    LOG.error(\"\
    Usage: InstrumentServiceDemo <url> <accountid> <accesstoken>\");\n17    System.exit(1);\n\
    18   } else {\n19    if (!StringUtils.isNumeric(args[1])) {\n20     LOG.error(\"\
    Argument 2 should be numeric\");\n21     System.exit(1);\n22    }\n23   }\n24\
    \  }\n\n26  public static void main(String[] args) {\n27   usageAndValidation(args);\n\
    28   String url = args[0];\n29   Long accountId = Long.parseLong(args[1]);\n30\
    \   String accessToken = args[2];\n\n32   InstrumentDataProvider<String> instrumentDataProvider\
    \ = new OandaInstrumentDataProviderService(url,\n33    accountId, accessToken);\n\
    \n35   InstrumentService<String> instrumentService = new InstrumentService<String>(instrumentDataProvider);\n\
    \n37   Collection<TradeableInstrument<String>> gbpInstruments =\n38    instrumentService.getAllPairsWithCurrency(\"\
    GBP\");\n\n40   LOG.info(\"+++++++++++++++++++++++++++++++ Dumping Instrument\
    \ Info +++++++++++++++++++++++++++++\");\n41   for (TradeableInstrument<String>\
    \ instrument: gbpInstruments) {\n42    LOG.info(instrument);\n43   }\n44   LOG.info(\"\
    +++++++++++++++++++++++Finished Dumping Instrument Info +++++++++++++++++++++++++++++\"\
    );\n45   TradeableInstrument<String> euraud = new TradeableInstrument<String>(\"\
    EUR_AUD\");\n46   TradeableInstrument<String> usdjpy = new TradeableInstrument<String>(\"\
    USD_JPY\");\n47   TradeableInstrument<String> usdzar = new TradeableInstrument<String>(\"\
    USD_ZAR\");\n\n49   Double usdjpyPip = instrumentService.getPipForInstrument(usdjpy);\n\
    50   Double euraudPip = instrumentService.getPipForInstrument(euraud);\n51   Double\
    \ usdzarPip = instrumentService.getPipForInstrument(usdzar);\n\n53   LOG.info(String.format(\"\
    Pip for instrument %s is %1.5f\", euraud.getInstrument(), euraudPip));\n54   LOG.info(String.format(\"\
    Pip for instrument %s is %1.5f\", usdjpy.getInstrument(), usdjpyPip));\n55   LOG.info(String.format(\"\
    Pip for instrument %s is %1.5f\", usdzar.getInstrument(), usdzarPip));\n56  }\n\
    \n58 }\n```\n\n![Launch Configuration](images/00012.jpeg) Launch Configuration\
    \ ![Sample Output](images/00013.jpeg) Sample Output\n\n1.  (http://fxtrade.oanda.com/learn/intro-to-currency-trading/conventions/pips)[↩︎](#part0020.html#fnref-pip1)\n\
    2.  (http://fxtrade.oanda.ca/learn/intro-to-currency-trading/conventions/rollovers)[↩︎](#part0020.html#fnref-financing)\n\
    \n## 4. Event Streaming : Market Data Events\n\nNow we have reached the point,\
    \ where the true existence of the trading bot will start to become apparent. From\
    \ here onwards, we are going to step into the real aspects of trading, one of\
    \ which is to handle real time events and act upon them, after meaningfully analysing\
    \ them. One could have event streams in the following shape and form:\n\n- Market\
    \ Data events, i.e., change in the price of an instrument.\n- Trade/Order/Account\
    \ events, i.e., order filled or stop loss level hit.\n- Social media events, i.e.,\
    \ tweets from influential people or market movers.\n- Any other source\n\nAs we\
    \ can see, we could have numerous event streams, bombarding our trading bot with\
    \ varying degrees of intensity. Handling them and making decisions based on them\
    \ is the cornerstone of the trading bot design. In this chapter, we exclusively\
    \ discuss how to handle market data events and how to disseminate them using the\
    \ `Google EventBus`.\n\n### 4.1 Streaming Market Data interface\n\nWe begin by\
    \ defining an interface that stipulates the minimum set of methods required for\
    \ the market event streaming to work in our bot. On the face of it, it looks there\
    \ is not much to it, as we just enforce a `start` and `stop` requirement on the\
    \ interface implementer. However, as we will see later, whilst discussing the\
    \ implementation, that part of the job of the implementer is to invoke a `MarketEventCallback`\
    \ handler that processes the streaming market event received. The assumption is\
    \ that the `startMarketDataStreaming()` establishes a continuous connection (event\
    \ loop) to the event source, i.e., in a separate thread, and this thread receives\
    \ market data events on that connection. The event is then parsed and passed on\
    \ to `MarketEventCallback` to be processed further.\n\n```java\n 1 /**\n 2  *\
    \ A service that provides streaming market data. Normally the implementation\n\
    \ 3  * would create a dedicated connection to the trading platform and would receive\n\
    \ 4  * a stream of prices ideally through a REST service or a callback from the\n\
    \ 5  * platform. The implementation must handle broken connections and attempt\
    \ to\n 6  * reconnect in a suitable manner. The service is normally coupled with\
    \ a\n 7  * heartbeats from the platform which indicates whether the connection\
    \ is alive\n 8  * or not.\n 9  *\n10  * Due to the volume of data expected, it\
    \ is recommended that the service\n11  * delegate the handling of market data\
    \ to another service in order to avoid\n12  * building up of queue of events,\
    \ waiting to be processed.\n13  *\n14  */\n15 public interface MarketDataStreamingService\
    \ {\n\n17  /**\n18   * Start the streaming service which would ideally create\
    \ a dedicated\n19   * connection to the platform or a callback listener. Ideally\
    \ multiple\n20   * connections requesting the same market data should not be created.\n\
    21   */\n22  void startMarketDataStreaming();\n\n24  /**\n25   * Stop the streaming\
    \ services and dispose any resources/connections in a\n26   * suitable manner\
    \ such that no resource leaks are created.\n27   */\n28  void stopMarketDataStreaming();\n\
    \n30 }\n```\n\nThe `MarketEventCallback` interface, which is actually responsible\
    \ for the further dissemination of the market data event synchronously or asynchronously,\
    \ must be used in tandem.\n\n```java\n 1 /**\n 2  * A callback handler for a market\
    \ data event. The separate streaming event\n 3  * handler upstream, is responsible\
    \ for handling and parsing the incoming event\n 4  * from the market data source\
    \ and invoke the onMarketEvent of this handler,\n 5  * which in turn can disseminate\
    \ the event if required, further downstream.\n 6  * Ideally, the implementer of\
    \ this interface, would drop the event on a queue\n 7  * for asynchronous processing\
    \ or use an event bus for synchronous processing.\n 8  *\n 9  * @param <T>\n10\
    \  *            The type of instrumentId in class TradeableInstrument\n11  * @see\
    \ TradeableInstrument\n12  * @see EventBus\n13  */\n14 public interface MarketEventCallback<T>\
    \ {\n15  /**\n16   * A method, invoked by the upstream handler of streaming market\
    \ data\n17   * events. This invocation of this method is synchronous, therefore\
    \ the\n18   * method should return asap, to make sure that the upstream events\
    \ do not\n19   * queue up.\n20   *\n21   * @param instrument\n22   * @param bid\n\
    23   * @param ask\n24   * @param eventDate\n25   */\n26  void onMarketEvent(TradeableInstrument<T>\
    \ instrument, double bid, double ask, DateTime eventDate);\n27 }\n```\n\nLet's\
    \ jump straight into the OANDA implementation, as things will become clearer once\
    \ we look inside the code."
