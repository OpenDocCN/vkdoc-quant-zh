    # Twitter Bot


    Another practical application of Python is building bots for social media and
    chats. Here, we will build a simple Twitter bot. It will post content on a Twitter
    account.


    I’ll be honest with you; lately, it became more difficult to get your bot registered
    with Twitter and get API Keys. I hope by the time the book is published, the Twitter
    authentication process will be the same as I describe it here.


    As a developer, you should start your API registration process with the Twitter
    developer docs here: [`https://developer.twitter.com/en`](https://developer.twitter.com/en).
    There you’ll find a lot of information how to automate your Twitter account. Besides,
    they have a developer Q&A blog where you can find tons of useful information and
    get answers to any Twitter-related questions.


    Before we start coding, we need to register our future app and obtain API Keys
    on [`https://developer.twitter.com/en/portal/dashboard`](https://developer.twitter.com/en/portal/dashboard).
    But even before that, you should be a Twitter user and have an active account.


    The process of obtaining Twitter API Keys is the following. With your Twitter
    account, log in to the Twitter developer portal. There you would need to click
    the central button **“Create Project”** to launch a new app. Be prepared to provide
    your phone number. Twitter will not allow you to create an app without a phone
    number on your profile.


    To obtain API Keys, you would need to provide the name of your project and shortly
    explain the purpose of your bot (Figure [7-16](#506186_1_En_7_Chapter.xhtml#Fig16)).


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig16_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig16_HTML.jpg)


    **Figure 7-16** Registering a new Twitter App


    After you answer all questions, Twitter will provide you the API Key, API Secret
    Key, and Bearer Tokens. These are three keys we will need for our bot to get authenticated
    with Twitter. Besides these keys, you’ll need to generate an Access Token and
    a Secret Token. To generate tokens, in the left-side menu under **Projects & Apps**,
    click your app name. After you clicked the app, you should see the **App Details**
    information. Scroll down and look for the **App permissions** section. In the
    **App permissions** section, click the **Edit** option and switch to **Read and
    Write** mode. This operation is necessary for the bot to be able to post tweets.
    On top of the same page on the **Keys and tokens** section, you need to generate
    the **Access Token and Secret** token. Click the **Regenerate** button and store
    the tokens in a secure place (Figure [7-17](#506186_1_En_7_Chapter.xhtml#Fig17)).


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig17_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig17_HTML.jpg)


    **Figure 7-17** Generating Access Token and Secret


    Right after you have all API Keys and Access tokens on hand, you are ready to
    build a Twitter bot.


    There are several Python Twitter libraries. I personally prefer Tweepy for its
    simplicity. If later you decide to build something more sophisticated than what
    we go over here, you can always refer to the Tweepy documentation ([`https://docs.tweepy.org/en/latest/`](https://docs.tweepy.org/en/latest/)).


    ## Installing Tweepy


    Tweepy is not a part of Anaconda, and you need to install it separately. In a
    Terminal window, run:


    ```

    pip install tweepy

    ```


    In a new **Jupyter** Notebook, import Tweepy, the library we would need to send
    tweets:


    ```python

    import tweepy

    ```


    The next step would be to define the API Keys and tokens Twitter provided us with:


    ```python

    API_KEY = ''Q88u0KvQK4f7fGfqO43SxVbcE''

    API_SECRET = ''ahQk6VKzjuF5eucS6a6DJT3LubBqnBTj5JxT2BvBTaIDMKkZhO''

    ACCESS_TOKEN = ''797271725629173762-3etBbFChCjbQFCYYKf9oq5HtvMqmha9''

    SECRET_TOKEN = ''apXizrBPPE7TqqW7OAhnBx1DzetrUpqNbPS1PoRzTZKjF''

    ```


    ## Authentication with Twitter


    First of all, we need to get authenticated by Twitter. Using Tweepy methods `OAuthHandler`
    and `set_access_token`, we pass the API Keys as arguments. Using these API Keys
    and tokens, you get authenticated and establish a connection with Twitter:


    ```python

    auth = tweepy.OAuthHandler(CONSUMER_KEY, CONSUMER_SECRET)

    auth.set_access_token(OAUTH_TOKEN, OAUTH_TOKEN_SECRET)

    api = tweepy.API(auth)

    ```


    ## Sending Tweets with Media


    Our goal is to generate and send a tweet with an image and some text. Prepare
    an image and store it in the same directory where your **Jupyter** file is, or
    make sure you know the relative path to the image file.


    Define the path to the file you want to upload with the `image_path` variable:


    ```python

    image_path = "/Users/programwithus/Chapter7/fortweeter.png"

    ```


    After the bot has got authenticated, we are ready to post tweets with media files.
    The special Tweepy method `update_with_media()` posts media and adds a message.
    According to the documentation, too long messages or duplicating messages will
    be ignored. The message should be passed with the keyword `status`:


    ```python

    api.update_with_media(image_path, status="Python Rules! Learn Python")

    ```


    If the tweet was sent successfully, you should see the `Status` message with all
    details returned as in Figure [7-18](#506186_1_En_7_Chapter.xhtml#Fig18) and the
    actual tweet (Figure [7-19](#506186_1_En_7_Chapter.xhtml#Fig19)).


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig19_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig19_HTML.jpg)


    **Figure 7-19** Tweet sent by the Tweepy library


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig18_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig18_HTML.jpg)


    **Figure 7-18** The code to automatically send tweets with media files'
