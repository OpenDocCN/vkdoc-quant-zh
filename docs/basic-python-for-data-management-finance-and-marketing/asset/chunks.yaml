- fmt: "BeautifulSoup recreates all data received from a server as an HTML markup.\
    \ Make no mistake, it will not be HTML, rather a string object looking like an\
    \ HTML structure. BeautifulSoup also comes as a part of Anaconda, and all we have\
    \ to do is import it along with `Requests`. Get back to the upper cell and import\
    \ it right after `Requests`. Do not forget to rerun the cell.\n\n```\nfrom bs4\
    \ import BeautifulSoup\n```\n\n`bs4` is the short name of the package, and `BeautifulSoup`\
    \ is the function we will use to generate an object that would look like an HTML\
    \ structure. Pass the content from a server as `page.content` into the function\
    \ and parse it as HTML:\n\n```\ndata = BeautifulSoup(page.content, \"html.parser\"\
    )\n```\n\nPrint `data` and you will see an object that looks like HTML code (Figure\
    \ [4-2](#506186_1_En_4_Chapter.xhtml#Fig2)).\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig2_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2** BeautifulSoup parsed data from a server as an HTML markup\n\n\
    You do not need to be proficient in HTML to scrape the Web. Yet I’ll give you\
    \ a crash course. Every element rendered on a web page has to be wrapped in `<>`\
    \ tags. In Figure [4-2](#506186_1_En_4_Chapter.xhtml#Fig2) closer to the bottom,\
    \ you can find `<h3>PROLOGUE</h3>`. `h` means heading and `3` is a font size.\
    \ Flip back to the web browser, and you see the bold `PROLOGUE` header. Navigate\
    \ to `PROLOGUE` with the mouse and highlight it. Then click the right button.\
    \ I hope you use a Chrome browser as we agreed. In the context menu, you should\
    \ see the `Inspect` option. Click `Inspect` and it will reveal how the web page\
    \ looks under the hood, an HTML markup (Figure [4-3](#506186_1_En_4_Chapter.xhtml#Fig3)).\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig3_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig3_HTML.jpg)\n\
    \n**Figure 4-3** Inspecting the HTML code of a web page in Chrome Developer Tools\n\
    \nYou can see that in Figures [4-2](#506186_1_En_4_Chapter.xhtml#Fig2) and [4-3](#506186_1_En_4_Chapter.xhtml#Fig3),\
    \ `<h3>PROLOGUE</h3>` looks the same. That is because BeautifulSoup totally reconstructed\
    \ the HTML markup structure of the web page. Each `<>` tag is an attribute of\
    \ the BeautifulSoup object we saved with the `data` variable. That means we can\
    \ grab elements from the page object by tags. Try to run `data.h3` in a Jupyter\
    \ cell, and you’ll see a `PROLOGUE` text.\n\nThere are two major functions in\
    \ BeautifulSoup to fetch elements out of the HTML structure – `find()` and `find_all()`.\
    \ The difference is simple; `find()` looks for one element, and `find_all()` will\
    \ fetch all items that fit the criteria. Run help on `find()` and `find_all()`\
    \ to see all available arguments they accept:\n\n```\nhelp(data.find)\nhelp(data.find_all)\n\
    ```\n\nMethods `find()` and `find_all()` take an HTML tag as an argument to find\
    \ an element on a page. Other element attributes such as a class or a color could\
    \ be used to precisely reference the item on a web page. For example, run the\
    \ statement `data.find(\"h3\")`. The method `find()` will look for an element\
    \ wrapped in `<h3>` tags. The result will be a `PROLOGUE` text. The method `find()`\
    \ handles one element at a time; it would get the first one if there were many\
    \ items with the same tags.\n\nNow, highlight all lines of the poem on the web\
    \ page in a browser, click the right button, and inspect selected lines. You can\
    \ see that all of the lines in the Chrome Developer Tools window are surrounded\
    \ with `<a>` tags. The method `find_all()` with `<a>` tags as a first argument\
    \ will get a list of all those lines. Remember `find_all()` always returns a list\
    \ even if it does not find anything.\n\n```\nalist = data.find_all(\"a\")\n```\n\
    \nIn Figure [4-4](#506186_1_En_4_Chapter.xhtml#Fig4), you can see that we have\
    \ fetched all the lines wrapped in `<a>` tags.\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig4_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4** Text elements with HTML `<a>` tags\n\nThe fetched lines in the\
    \ list have `<a>` tags and `href` (Hypertext REFerence). We need to remove tags\
    \ and other attributes off the text. In the BeautifulSoup library, there is a\
    \ method `get_text()` to extract strings out of `<>` tags. We would need to apply\
    \ it to each item in `alist` to get clean text.\n\n```\nfor item in alist:\n \
    \   print(item.get_text())\n```\n\nWhat if we need to grab a particular line from\
    \ the web page? For instance, \"From forth the fatal loins of these two foes\"\
    \ text from the whole poem. The first step would be to highlight the text and\
    \ inspect it in HTML code (Figure [4-5](#506186_1_En_4_Chapter.xhtml#Fig5)).\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig5_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig5_HTML.jpg)\n\
    \n**Figure 4-5** Locating and inspecting a line from the text in Chrome\n\nThe\
    \ second step would be to investigate the element in Chrome Developer Tools, right\
    \ side in Figure [4-5](#506186_1_En_4_Chapter.xhtml#Fig5), and find the hooks\
    \ we can use to fetch the text. The text `\"From forth the fatal loins of these\
    \ two foes\"` is surrounded by `<a>` tags and has an attribute `name=5`. Again,\
    \ we do not need to know what `name=5` means.^(6) This is some attribute used\
    \ for something by a developer who built the website. All we care is a combination\
    \ that would be unique to the text we want to get. If we used just a tag in `find()`,\
    \ then it would get us the first element wrapped in the `<a>` tags. Fortunately,\
    \ `name=5` is unique to the line of the text we need. Using the `find()` method,\
    \ we will pass the `<a>` tag as a first argument, because `\"From forth the fatal\
    \ loins of these two foes\"` begins with it, and as a second argument, we will\
    \ pass `name=5`. Attributes should be passed in the form of a dictionary like\
    \ this:\n\n```\nelement = data.find(\"a\", {\"name\": 5})\n```\n\nWe have fetched\
    \ the text and have cleaned it with the `get_text()` method (Figure [4-6](#506186_1_En_4_Chapter.xhtml#Fig6)).\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig6_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig6_HTML.jpg)\n\
    \n**Figure 4-6** Getting the line of the text by using the `find()` method and\
    \ HTML attributes\n\nAs you have seen, the whole web scraping process in a nutshell\
    \ consists of the following steps:\n\n1.  Get the data from a server with the\
    \ Requests method `get()`.\n2.  Pass the received data into the `BeautifulSoup()`\
    \ function; it parses data as an object looking like an HTML web structure.\n\
    3.  In a browser, inspect the element you need to grab.\n4.  Using `find()` or\
    \ `find_all()`, fetch the text with hooks like tags and attributes.\n\nNow that\
    \ we have learned the essential steps of web scraping, we can take on a popular\
    \ website [investing.com](http://investing.com). Investing.com provides important\
    \ news that every trader needs to know before the trading day starts. The URL\
    \ to the news page is [`www.investing.com/news/`](http://www.investing.com/news/).\
    \ If you open that page in a browser, you can see news titles and short teasers.\
    \ Click a title and it will take you to the full article. We will start collecting\
    \ titles and `href`s (Hypertext REFerence) so we could access the full article\
    \ later. `href` is just a URL that leads somewhere. They are also called web links.\n\
    \nFirst things first, we need to fetch the website. Start with imports:\n\n```\n\
    import requests\nfrom bs4 import BeautifulSoup\n```\n\nBear in mind that most\
    \ of the websites do not want to provide information to the bots. The `requests.get()`\
    \ method sends a message to a server, and the message kind of saying `\"Hi, I\
    \ am Python\"`, and the website does not want to respond to a Python bot. To go\
    \ around it, we’ll make our request for information look like it comes from a\
    \ web browser. That is quite simple; all we have to do is to provide different\
    \ headers in a message to a server:\n\n```\nheaders = {'User-agent': 'Mozilla/5.0'}\n\
    ```"
