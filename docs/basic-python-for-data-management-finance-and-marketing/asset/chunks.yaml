    plt.subplot(211)

    plt.plot(x, roic, color="blue", marker="o", label="ROIC")

    plt.legend()

    plt.subplot(212)

    plt.plot(x, roe, color="green", linestyle=''--'', label="ROE")

    plt.legend();

    ```

