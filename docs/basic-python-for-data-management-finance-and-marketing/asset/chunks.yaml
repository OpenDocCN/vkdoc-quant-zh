    ```

    cla = CLA(mu, sigma)

    plotting.plot_efficient_frontier(cla);

    ```


    `PyPortfolioOpt`库在投资组合管理中是不可替代的。它易于使用且文档齐全。我的建议是关注文档（[`https://pyportfolioopt.readthedocs.io/en/latest/index.html`](https://pyportfolioopt.readthedocs.io/en/latest/index.html)）以了解新特性或变更。本章还有一些未涉及的附加功能，例如实现自己的优化器。我相信在以上示例之后，您对如何操作`PyPortfolioOpt`有了更好的理解。


    ## 基本面分析


    如今，有多种方式可以获取公司财务信息。其中之一是我们在第[4](#506186_1_En_4_Chapter.xhtml)章讨论过的`Alpha Vantage
    API`。在这里，我想演示另一个Python包——`Fundamental Analysis`，用于获取和分析上市公司的资产负债表、利润表、现金流量表以及其他重要信息。


    我们需要使用`pip`命令安装`Fundamental Analysis`库：


    ```

    pip install FundamentalAnalysis

    ```


    在一个新的Jupyter Notebook中，导入`Fundamental Analysis`、`Pandas`、`Requests`和`Matplotlib`以绘制数据：


    ```

    import FundamentalAnalysis as fa

    import matplotlib.pyplot as plt

    import pandas as pd

    import requests

    ```


    `Fundamental Analysis`是围绕`Financial Modeling Prep API`的一个小型Python封装，用于收集上市公司的基本信息。根据文档，它可以获取超过13,000家公司的详细数据。^([^(17)](#fn17))


    要开始使用`Financial Analysis`包，您需要从[`https://financialmodelingprep.com/developer/docs/`](https://financialmodelingprep.com/developer/docs/)获取一个`API
    Key`。注册并选择一个免费计划或付费计划以获取高级API和30年以上的历史数据。选择计划后，转到上方菜单中的仪表板，您可以在其中找到您的`API Key`。收到`API
    Key`后，我们就可以开始探索`Financial Analysis`的功能。本例中使用的`API Key`将被禁用。


    首先，获取所有可用公司及ETF（交易所交易基金）的列表：


    ```

    API_KEY = "1b01185c3c4ae0c8626ad15beb99a957"

    companies = fa.available_companies(API_KEY)

    ```


    从`available_companies()`函数以及其他所有函数接收到的数据均以`DataFrame`形式呈现。使用`iloc[]`方法，我们可以在行之间移动（图[6-24](#506186_1_En_6_Chapter.xhtml#Fig24)）：


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig24_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig24_HTML.jpg)


    **图 6-24** 浏览可用公司列表


    ```

    companies.iloc[5:10]

    ```


    如果您有喜欢的公司，请使用其交易所代码。我将使用埃克森美孚公司。埃克森美孚在纽约证券交易所的代码是`XOM`。函数`profile()`将获取任何上市公司的基本信息（图[6-25](#506186_1_En_6_Chapter.xhtml#Fig25)）：


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig25_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig25_HTML.jpg)


    **图 6-25** 接收`XOM`代码的公司简介


    ```

    ticker = "XOM"

    profile = fa.profile(ticker, API_KEY)

    ```


    估值是一项重要信息，`Financial Analysis`通过函数`enterprise()`提供，免费计划可获得五年期数据，付费计划可获得更长时期的数据（图[6-26](#506186_1_En_6_Chapter.xhtml#Fig26)）：


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig26_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig26_HTML.jpg)


    **图 6-26** 埃克森美孚公司估值


    ```

    entreprise_value = fa.enterprise(ticker, API_KEY)

    entreprise_value

    ```


    它被称为基本面分析是有原因的；使用函数`balance_sheet_statement()`，我们可以获取上市公司多年期的资产负债表（图[6-27](#506186_1_En_6_Chapter.xhtml#Fig27)）。关键字参数`period`可以设置为`"annual"`或`"quarter"`选项。除了资产和负债，`balance_sheet_statement()`还返回指向SEC（美国证券交易委员会）文件的链接，以便您直接追溯至数据源。


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig27_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig27_HTML.jpg)


    **图 6-27** 埃克森美孚公司资产负债表


    除了资产负债表，您还可以获取利润表和现金流量表：


    ```

    income_statement_annually = fa.income_statement(ticker, API_KEY, period="annual")

    cash_flow_statement_annually = fa.cash_flow_statement(ticker, API_KEY, period="annual")

    ```


    我们可以使用`Matplotlib`对数据进行可视化分析。毛利是基本面分析的重要组成部分，我们将通过绘制柱状图来可视化营业收入和营业成本。


    在图的`x`轴上，我们将绘制年份：


    ```

    x = income_statement_annually.columns

    ```


    然后从利润表中获取营业收入和营业成本的数据：


    ```

    revenue = income_statement_annually.loc["revenue"]

    cost = income_statement_annually.loc["costOfRevenue"]

    ```


    与其他`Matplotlib`图形类似，柱状图需要`x`和`y`轴参数的坐标。同时，我们将指定柱子的`color`和`width`参数：


    ```

    plt.bar(x, revenue, color =''maroon'', width = 0.6)

    plt.bar(x, cost, color =''blue'', width = 0.6)

    plt.title("Exxon Mobil Corp Revenue/Cost of Revenue");

    ```


    基于可视化分析，我们发现2020年对埃克森美孚公司来说是艰难的一年（图[6-28](#506186_1_En_6_Chapter.xhtml#Fig28)）。


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig28_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig28_HTML.jpg)


    **图 6-28** 毛利率可视化


    使用`Financial Analysis`，您可以获取来自美国证券交易委员会（SEC）的原始数据或关键财务比率。


    函数`key_metrics()`将提供所有主要指标，例如流动比率、股本回报率等：


    ```

    ratios = fa.key_metrics(ticker, API_KEY)

    ```


    使用`Matplotlib`的`subplot()`函数，我们将在同一张图但不同窗口中绘制来自`ratios`的投资资本回报率和股本回报率。我们将`x`轴设置为`ratios.columns`对应的年份，`y`值将从行中获取`roic`和`roe`。我们通过`DataFrame`的`loc[]`方法按标签获取行：


    ```

    x = ratios.columns

    roic = ratios.loc["roic"]

    roe = ratios.loc["roe"]

    plt.subplot(211)

    plt.plot(x, roic, color="blue", marker="o", label="ROIC")

    plt.legend()

    plt.subplot(212)

    plt.plot(x, roe, color="green", linestyle=''--'', label="ROE")

    plt.legend();

    ```'
