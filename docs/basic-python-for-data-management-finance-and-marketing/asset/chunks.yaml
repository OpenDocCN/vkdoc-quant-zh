- fmt: '# NumPy Financial


    I would like to begin this chapter with elementary financial functions every student
    learns in the first year of business college. The future value of money, internal
    rate of return, present value, and net present value of future cash flows are
    the pillars of financial analysis. Knowing Python basics, you can write the formulas
    and calculate these measures from scratch, yet to save us some time and effort,
    there is a `Numpy-Financial` package. `Numpy-Financial` does all the necessary
    work for you, providing clean results with no bugs.


    To get started with `Numpy-Financial`, you need to install it in the **Terminal**.
    As a reminder, you can find the Terminal in Anaconda Navigator **Environments**
    by clicking the **base (root)** menu. Make sure that you are installing the package
    into a new Terminal shell and not interfering with the working Kernel.


    ```

    pip install numpy-financial

    ```


    After you see the message that `Numpy-Financial` was successfully installed, the
    Terminal can be closed, and you can import the package in a new **Jupyter** Notebook:


    ```

    import numpy_financial as npf

    ```


    I do not want to spend a lot of time explaining the financial metrics in detail
    and their importance in financial analysis, but rather concentrate on their implementation
    in the `Numpy-Financial` functionality.


    `Numpy-Financial` is a small library that has only ten essential functions (Table
    6-1).


    **Table 6-1** `Numpy-Financial` functions


    | Function | Description |

    | --- | --- |

    | `fv(rate, nper, pmt, pv[,when])` | Compute the future value |

    | `ipmt(rate, per, nper, pv[,fv,when])` | Compute the interest portion of a payment
    |

    | `irr(values)` | Return the internal rate of return (IRR) |

    | `mirr(values,finance_rate,reinvest_rate)` | Modified internal rate of return
    |

    | `nper(rate, pmt, pv[,fv,when])` | Compute the number of periodic payments |

    | `npv(rate, values)` | Return the NPV (Net Present Value) of a cash flow series
    |

    | `pmt(rate, nper, pv[,fv,when])` | Compute the payment against loan principal
    plus interest |

    | `ppmt(rate, per, nper, pv[,fv,when])` | Compute the payment against loan principal
    |

    | `pv(rate, nper, pmt[,fv,when])` | Compute the present value |

    | `rate(nper, pmt, pv, fv[,when, guess,tol,...])` | Compute the rate of interest
    per period |


    As you have seen it is not necessary to memorize all functions and their arguments.
    All you have to do is to run `dir(npf)` to see objects’ available methods and
    `help()` to learn a particular function arguments.


    ## Future Value `fv()`


    The value of money is the first thing you learn in Finance 101. Let’s take a look
    at a classic problem. Suppose you have a choice to get $3000.00 today earning
    3% annually or agree to be paid $3300.00 three years from now. We will solve the
    problem with the `pv()` function. The given statements will be saved under variable
    names `deposit`, `annual_interest`, and `years`:


    ```

    deposit = 3000

    annual_interest = 0.03

    years = 3

    future_value = npf.fv(annual_interest, years, 0, -deposit)

    print("Future value of ${:.2f} is ${:.2f}".format(deposit, future_value))

    ```


    I use a minus sign before `deposit` as an argument because we can regard that
    as an investment. If you do not use a minus sign, then the result will come out
    as a negative number.


    As a result of the calculation, we see that $3300.00 would be a better deal than
    earning 3% annually on the deposit of $3000.00 (Figure 6-1).


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig1_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** Future value calculation with the `fv()` function


    ## Present Value `pv()`


    The opposite of the future value of money formula is the present value of money.
    An amount of money today is worth more than the same amount in the future. But
    how much more exactly? `Numpy-Financial` will help us to answer that question
    with the function `pv()`. Continuing with the preceding example, we can assume
    that you have a choice to receive $3300 in three years, or you can claim them
    now. We will leave an interest rate at 3% annually.


    The `pv()` function takes the interest rate, number of periods, and future value
    as arguments. The interest rate could be passed as an annual or monthly value.
    The number of periods would depend on the annual or monthly interest. We will
    define `future_value` as $3300; `annual_rate` and `years` values stay the same:


    ```

    future_value = 3300

    annual_rate = 0.03

    years = 3

    present_value = npf.pv(annual_rate, years,0,-future_value)

    print("Present value of ${:.2f} is ${:.2f}".format(future_value, present_value))

    ```


    The present value of $3300.00 is $3019.97 according to the result we have returned
    by the `pv()` formula (Figure 6-2).


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig2_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** Calculating the present value of money with the `pv()` function


    ## Net Present Value `npv()`


    `Numpy-Financial` can help to determine priority between investment projects based
    on profitability using the Net Present Value of future cash inflows discounted
    at the cost of capital rate. The function `npv()` returns the Net Present Value
    of a cash flow series. It is easy to use; all we need is a cost of capital or
    opportunity cost of capital and future expected cash flows. Expected cash flows
    should be passed as an array. According to the documentation, investments have
    to be negative floats and inflows should be passed as positive numbers.


    Suppose there is a company planning to expand and choosing between two investment
    opportunities. One choice is to expand production and invest $100,000 in new facilities
    and equipment. The production expansion will bring $25,000 of annual income in
    the next five years. Another investment alternative is to buy securities yielding
    5% annually. We assume that the risks are equal for simplicity of the example.


    Based on the assumptions, we will calculate NPV (Net Present Value) of the expansion
    project. We will define `investment` as a negative value and `cash_flows` as a
    Python list holding future cash flows:


    ```

    discount_rate = 0.05

    investment = -100000

    cash_flows = [investment, 25000, 25000, 25000, 25000, 25000]

    net_present_value = npf.npv (discount_rate, cash_flows)

    print("Net Present Value of the project is ${:.2f} ".format(net_present_value))

    ```


    The Net Present Value of the project is $8236.92 (Figure 6-3).


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig3_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** Calculating the Net Present Value of a project


    Using the same `npv()` function, we can compare two projects. Also, we can run
    scenarios for a range of discounted interest rates and see how project profitability
    would be affected by changing interest rates. The second project we want to compare
    to would have the same initial investment of $100,000 and gradually increasing
    inflows of $5000, $10,000, $40,000, $40,000, and $40,000 in the next five years,
    respectively.


    The discounted rates can be presented as a range of floats stored in a Python
    list:


    ```

    cash_flows_project_one = [-100000, 25000,25000,25000,25000,25000]

    cash_flows_project_two = [-100000, 5000,10000,40000,40000,40000]

    discount_rates = [0.0,0.05,0.10,0.20,0.25]

    ```


    The first initial investment number in `cash_flows_project_one` and `cash_flows_project_two`
    is negative because we invested that amount, and it represents a cash outflow.


    We need to initialize two empty lists to store the outcomes of scenario analysis.'
