    ```\n\nThe final step is to subtract the inverse of the normal cumulative\ndistribution\
    \ from the portfolio value:\n\n```\nvar = portfolio_value – normsinv\n```\n\n\
    You can round down the result to two figures after the decimal point:\n\n```\n\
