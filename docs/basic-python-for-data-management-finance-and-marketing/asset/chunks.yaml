- fmt: "However, if all values were stored in a `Series`, we could apply the mathematical\
    \ operation to the whole container (Figure [3-4](#506186_1_En_3_Chapter.xhtml#Fig4)).\n\
    \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig4_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4  \nVectorization applies an operation to the `Series`\n\nThat is\
    \ exactly what I meant comparing a `Series` to a racecar. Any `for` loop operation\
    \ would take longer than a vectorized operation. For that reason, you do not want\
    \ to iterate through a `Series` with a `for` loop. First of all, it would make\
    \ the operation run slower; second, there is no need for it.\n\nAnother proof\
    \ of efficiency would be a vectorized operation example between two `Series` objects\
    \ – a simple calculation of a price-to-earnings ratio. The market price of a stock\
    \ divided by earnings per share would be done faster if we stored all stock prices\
    \ and earnings in the two `Series` rather than lists.\n\nRandom stock prices held\
    \ in the `Series` under the name `portfolio`:\n\n```\nportfolio = pd.Series([30,20,45,76,34])\n\
    ```\n\nwould be divided by the same companies’ earnings per share, also provided\
    \ in the `Series` container:\n\n```\nearnings = pd.Series([1.5,3.3,4.5,2.5,2.75])\n\
    ```\n\nThe final result could be saved as a new `Series` under the variable name\
    \ `pe` (Figure [3-5](#506186_1_En_3_Chapter.xhtml#Fig5)):\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig5_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5  \nDivision operation between the two `Series` objects\n\n```\npe\
    \ = portfolio / earnings\n```\n\nWe can round down the results of the price-to-earnings\
    \ ratio example to exactly two numbers after the decimal point if we pass the\
    \ expression in the `round()` function:\n\n```\npe = round(portfolio / earnings,\
    \ 2)\n```\n\nAs I have just mentioned, a `Series` has two attributes: `index`\
    \ and `values`. That reminds us of keys and values in the dictionary structure.\
    \ In some sense, a `Series` is close to the dictionary. The easiest way to create\
    \ a new `Series` would be to convert a Python dictionary into a Pandas `Series`\
    \ (Figure [3-6](#506186_1_En_3_Chapter.xhtml#Fig6)).\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig6_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6  \nConverting a Python dictionary into a `Series` structure\n\n```\n\
    stocks = {\"IBM\":30, \"ORCL\":20, \"MSFT\":45}\nportfolio = pd.Series(stocks)\n\
    ```\n\nThe keys from the dictionary are used as the index in the `Series` (Figure\
    \ [3-7](#506186_1_En_3_Chapter.xhtml#Fig7)). You can think of a Pandas `Series`\
    \ as a specialization of a Python dictionary.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig7_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7  \nString keys from a dictionary are the indices in the `Series`\n\
    \nUsing the dictionary notation on the `Series`, we can append more values to\
    \ the `portfolio` object. To add an element, we need a new pair, key and value.\
    \ Try the following code to add more stocks to the `portfolio` Series:\n\n```\n\
    portfolio[\"AAPL\"] = 76\nportfolio[\"INTC\"] = 34\n```\n\nAs a result of that\
    \ operation, the `portfolio` object was appended with two more values (Figure\
    \ [3-8](#506186_1_En_3_Chapter.xhtml#Fig8)).\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig8_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8  \nUsing a dictionary notation, we can add values to a `Series`\n\
    \nWe have learned that a `Series` is a one-dimensional data structure in Pandas.\
    \ Now let’s see what we get if we join a few `Series` together.\n\n## DataFrame\n\
    \nA `DataFrame` is a two-dimensional data structure. You can think of it as a\
    \ bunch of `Series` bound together. There are several ways on how you can create\
    \ a `DataFrame`, and I will show you all of them as we move along through the\
    \ book. I want to start with the simplest example of how you can construct a `DataFrame`\
    \ from scratch. We will initialize a `DataFrame` with the Pandas function `pd.DataFrame()`\
    \ and save it under the `portfolio` variable name.\n\n### Constructing a DataFrame\n\
    \nTo keep our code clean and neat, place each example into a separate **Jupyter**\
    \ Notebook. At the beginning of the file in an isolated cell, we need to import\
    \ Pandas:\n\n```\nimport pandas as pd\n```\n\nIn a new cell, define the `portfolio`\
    \ variable as a `DataFrame` with the help of the Pandas `DataFrame()` function:\n\
    \n```\nportfolio  = pd.DataFrame()\n```\n\nIf you print the `portfolio` object,\
    \ you will not see anything because it is empty. We need to populate our container\
    \ with data. The most straightforward way would be to define a few `Series` and\
    \ attach them to the `portfolio` object. Once again, I am using random numbers\
    \ for values in all my examples.\n\n```\nstock_symbols = pd.Series([\"IBM\",\"\
    ORCL\",\"MSFT\", \"AAPL\"])\nstock_prices = pd.Series([116.86, 56.91, 216.51,\
    \ 119.26])\nnumber_shares = pd.Series([50, 100, 50, 100])\n```\n\nWe need to come\
    \ up with names for the columns and using the dictionary notation add them with\
    \ values to the `DataFrame`:\n\n```\nportfolio[\"Symbol\"] = stock_symbols\nportfolio[\"\
    Price\"] = stock_prices\nportfolio[\"Qty\"] = number_shares\n```\n\nIn Figure\
    \ [3-9](#506186_1_En_3_Chapter.xhtml#Fig9), you can see the `DataFrame` we have\
    \ created from scratch.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig9_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9  \nCreating a `DataFrame` from scratch\n\nBreak the `DataFrame` down\
    \ into smaller pieces, and you will see that it is composed of `index`, `columns`,\
    \ and `values` attributes (Figure [3-10](#506186_1_En_3_Chapter.xhtml#Fig10)):\n\
    \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig10_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10  \nThe `DataFrame` has three attributes: `index`, `columns`, and\
    \ `values`\n\n```\nportfolio.index\nportfolio.columns\nportfolio.values\n```\n\
    \nWe have used the dictionary notation to add columns to the `DataFrame`. That\
    \ makes the `DataFrame` a specialization of the Python dictionary.\n\n### Slicing\
    \ a DataFrame\n\nUsing the same approach, we can slice the `DataFrame` to grab\
    \ a column:\n\n```\nportfolio[\"Price\"]\n```\n\nPass a column name as a string\
    \ in the square brackets, as we did with a key to fetch a value from the Python\
    \ dictionary, and it will return just one column (Figure [3-11](#506186_1_En_3_Chapter.xhtml#Fig11)).\
    \ The returned column is a `Series` object.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig11_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11  \nSlicing a column of the `DataFrame`\n\nThe square brackets method\
    \ using a column as the key allows us to part columns or create new columns. Also,\
    \ this method would be essential if a column name has empty spaces. If you create\
    \ a `DataFrame` from scratch, I would advise you to avoid using spaces in a column\
    \ name, when using two or more words as a column name. However, sometimes you\
    \ have to deal with data created by someone else with separated words in a column\
    \ name. In that case, `[\"a column name\"]` would be the only way you could grab\
    \ a column.\n\nAs always, to see all built-in attributes and methods in a `DataFrame`,\
    \ run the `dir()` function on the `portfolio` object. We can see that `Symbol`,\
    \ `Price`, and `Qty` are the attributes of our `DataFrame`. That means we can\
    \ slice the `Price` column like this:\n\n```\nportfolio.Price\n```\n\nKeep in\
    \ mind that slicing the column method as an attribute (Figure [3-12](#506186_1_En_3_Chapter.xhtml#Fig12))\
    \ will not help you to get multiple columns.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig12_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12  \nSlicing a column of the `DataFrame` as an attribute\n\nWe would\
    \ need to pass column names as a list into square brackets to grab a couple of\
    \ columns (Figure [3-13](#506186_1_En_3_Chapter.xhtml#Fig13)):\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig13_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13  \nSlicing many columns of a `DataFrame`\n\n```\nportfolio[ [\"\
    Symbol\",\"Qty\"] ]\n```"
