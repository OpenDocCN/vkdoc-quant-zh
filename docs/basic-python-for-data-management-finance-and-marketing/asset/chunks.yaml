    换句话说，每次 Python 读取一个 `if` 语句时，都会将其视为一个单独的条件语句或一个新的决策集。这就是为什么如果你希望列出多个选项并预期只有一个结果，那么在
    `if` 语句后面紧跟 `elif` 非常重要。


    我想现在你肯定想知道，如果用户输入了一个首字母大写的 `"Rainy"`，我们应该怎么办。按照我们当前代码的结构，`"Rainy"` 会被 `else` 语句捕获。这不是我们想要的结果。作为为他人编写代码的人，我们需要考虑到所有可能的情况。一个解决方案是使用逻辑运算符（表
    1-3）。在本书的后续内容中，我们将尝试使用所有逻辑运算符。我们先从 `or` 开始。


    **表 1-3** Python 中的逻辑运算符


    | 运算符 | 名称 |

    | --- | --- |

    | `and` | 两个条件都应为 `True` |

    | `or` | 任一条件应为 `True` |

    | `not` | 如果条件不满足 `True` |

    | `in` | 如果元素在序列中 |

    | `not in` | 如果元素不在序列中 |


    我们可以扩展 `if` 语句并使用 `or` 运算符，为用户提供更多输入天气状况的选项。例如，首字母大写的 `"Rainy"`：


    ```

    if weather == "rainy" or weather == "Rainy":

    print("Take an umbrella")

    ```


    需要记住的重点是，你需要在 `or` 后面完整地写出整个条件。我们需要再次使用 `weather` 变量。仅使用 `weather == "rainy" or
    "Rainy"` 这个条件，`if` 语句是无法正常工作的。只要两个条件中的任何一个返回 `True`，`if` 语句就会被触发。坦白说，有一种更好的方法可以确保输入的值与我们的条件匹配。我稍后会向你展示。当前这个例子只是为了说明
    `or` 运算符的用法。


    与 `or` 运算符相比，`and` 要求两个条件同时满足。为了了解它的工作原理，我们为程序再添加一个问题。变量 `season` 将保存一个诸如 `"summer"`
    或 `"winter"` 的值：


    ```

    season = input("What season are we in ? ")

    ```


    我们将添加另一个 `elif` 语句，该语句要求两个条件同时为真：


    ```

    elif weather == "cold" and season == "winter":

    print("Dress warmly")

    ```


    只有当两个条件都满足并返回 `True` 时，我们才会看到 `"Dress warmly"` 这条消息（图 1-22）。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig22_HTML.jpg](img/506186_1_En_1_Fig22_HTML.jpg)


    **图 1-22** 当两个条件都满足并返回 `True` 时，触发 `Elif`


    ## 方法


    Python 是一种面向对象的编程语言。面向对象编程（OOP）是一种用于结构化程序的设计方法。其背后的主要概念是将相关的属性和行为捆绑成独立的对象。简而言之，Python
    中的一切都是对象。之前我们用水容器类比简要地探讨了对象的行为。


    当我声明变量 `season = "summer"` 时，`"summer"` 作为对象存储在 Python 内存中。它被封装为一个字符串，因为我们用引号将其包裹起来，而
    `"summer"` 只是字符串的一个实例。之后如果我们想，可以将 `"summer"` 替换为 `"winter"`。`"winter"` 将是字符串的另一个实例。由于
    `"summer"` 和 `"winter"` 都是字符串的实例，它们的行为相似并共享相同的属性。


    有一个命令可以显示一个对象的所有内置方法——`dir()`。方法类似于函数，用于执行某项任务。主要区别在于方法属于某个对象。我们会经常使用 `dir()`；随着情况变得更复杂，你会发现
    `dir()` 函数是不可替代的。每当你不知道如何在 Python 中实现某件事时，我建议你从 `dir()` 函数开始。假设我们需要将 `"summer"`
    转换为大写 `"SUMMER"`。如果你不知道如何操作，始终从 `dir()` 函数开始。对对象运行 `dir()`；在本例中，是对 `"summer"`
    运行。你可以将实例 `"summer"` 作为参数传递给 `dir()` 函数，或者传递保存该实例的变量名。另一种选择是将 `str` 传递给 `dir()`
    函数；毕竟，`"summer"` 是字符串的一个实例。


    ```

    season = "summer"

    dir("summer")

    或

    dir(season)

    或

    dir(str)

    ```


    我知道一开始你在图 1-23 中看到的内容可能会令人不知所措。这是字符串对象中所有内置方法或命令的列表。通常，当你想对某个对象进行操作时，你会使用 `dir()`
    函数检查它的所有方法。在该列表的开头，我们会看到双下划线方法（dunder methods）。“Dunder” 是 “double underscores”（双下划线）的简称。所有这些双下划线方法在方法名称前后都有双下划线。双下划线方法由
    Python 自身使用。举例来说，当对 `"winter"` 调用 `len()` 函数时，它会使用双下划线方法 `__len__()`。类似地，如果你连接两个字符串，加号运算符会调用
    `__add__()` 方法（图 1-24）。大多数时候，你会跳过双下划线方法，开始寻找你需要使用的方法。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig24_HTML.jpg](img/506186_1_En_1_Fig24_HTML.jpg)


    **图 1-24** 函数 `len()` 和 `+` 充当 `__len__()` 和 `__add__()` 方法的包装器


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig23_HTML.jpg](img/506186_1_En_1_Fig23_HTML.jpg)


    **图 1-23** 字符串方法


    扫描所有字符串方法后，我们会看到 `upper()` 方法。它在字符串方法列表中倒数第二个（图 1-23）。这个方法的名称不言自明。但是，还有许多其他我们尚不了解、也不知道如何使用的方法。要查看方法的定义，请使用
    `help()` 函数（图 1-25）。顺便提一下，`help()` 函数是通用的，也可以应用于函数，例如 `help(len)`。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig25_HTML.jpg](img/506186_1_En_1_Fig25_HTML.jpg)


    **图 1-25** 函数 `help()` 返回函数 `len()` 的定义


    ```

    help("winter".upper)

    或

    help(season.upper)

    或

    help(str.upper)

    ```

