    \n# 1. 初识 Python\n\n> *当你停止改变时，你便走向终结。*\n> \n> ——本杰明·富兰克林\n\n我接触编程的时间相对较晚。当时我的工作与软件开发毫无关联。在校期间我并非计算机爱好者，始终认为编程不适合自己。从事金融行业时，我严重依赖\
    \ Excel，不得不进行大量手动复制粘贴操作。\n\n我的常规任务之一是更新预算，并将更新后的版本通过邮件发送给高层管理人员。我决定将这项繁琐工作自动化，于是在谷歌上搜索了一个能执行该任务的脚本。那时我完全没留意它究竟是`Python`脚本还是其他代码。这次改进的后果是灾难性的——不仅我的老板们收到了空文件，我还永久删除了长达三年的预算项目。\n\
    \n我从中吸取的主要教训是：若想做好一件事，必须从零开始系统学习这门知识。我阅读了大量关于`Python`实际应用的文章，并迅速意识到自动化是未来趋势。如今，`Python`已像\
    \ Excel 或电子邮件一样成为必备技能。如果你经常处理工作数据，那么`Python`带来的工作效率和速度提升必将使你的职业生涯受益匪浅。掌握`Python`后，你既能编写简单脚本，也能构建复杂应用程序。\n\
    \n与其他编程语言相比，`Python`具有用户友好、逻辑清晰且易于学习的语法。采用正确的方法并坚持练习，几个月内就能掌握`Python`。正如我的个人经历所示，学习编程永远不会太迟。如果你有动力将职业技能提升到新高度，并需要持续成长，那么学习`Python`就绝不会失败。\n\
    \n在学习`Python`的过程中，我面临的主要挑战是那些过度技术化且有时编写粗糙的文档。仿佛他们刻意要用术语让非技术人员困惑，并阻止我们进入他们的高科技王国。正因如此，多年后当我征服了编程世界，我决定撰写本书，用通俗易懂的语言向从未接触过编程的人讲解`Python`编程。\n\
    \n我深知许多读者并不打算成为全职程序员，而是需要`Python`作为现代工具来收集、处理和分析数据。因此，本书被构造成一本易于上手的实践指南。我们的核心目标是让你入门`Python`编程语言，并展示`Python`在商业场景中的应用方式。\n\
    \n基于我丰富的教学经验，我对本书进行了结构化设计。我们将从基础知识开始，逐步从简单概念过渡到复杂内容。本章中引入的许多假设和示例将不断演变，最终发展成关于如何运用`Python`解决复杂问题的进阶阐述。当你读完本书时，将清晰理解如何将`Python`应用于日常挑战。最重要的是，在即将开始的这段激动人心的旅程结束时，你将能够独立编写`Python`脚本。"
- fmt: '# Installing Python


    First things first, we need to install Python. This initial simple step could
    be confusing for beginners. There are many different versions of Python, and the
    installation process would vary for Mac and Windows. In order for us to be on
    the same page and not to depend on various operating systems, I decided to use
    the highly popular Python distribution platform Anaconda.


    `Anaconda` is a package that comes with the latest version of Python and a bunch
    of Python extensions we would need later. There are other Python distributions
    on the market. Nevertheless, `Anaconda` was specifically designed for people who
    want to have all data analysis tools in one place. It is very popular and labeled
    “the birthplace of Python data science.”^([¹](#fn1))


    The installation process itself is very straightforward and would work for any
    computer. You could google “download Anaconda Individual Edition” or go to the
    source [`www.anaconda.com/products/individual`](http://www.anaconda.com/products/individual)
    and click the `Download` button. At the bottom of that page, you should see Anaconda
    Installers (Figure [1-1](#506186_1_En_1_Chapter.xhtml#Fig1)). Choose a `Graphical
    Installer` for Mac or Windows and download the package. At the time of writing
    this book, `Python 3.9` is the latest version of Python. No worries if later they
    move to `Python 3.10` or even `Python 4`. The syntax will be the same. Usually,
    each version comes with some little improvements that would not affect the concepts
    we will cover in this book.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig1_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Anaconda Installers at the bottom of the page ([`www.anaconda.com/products/individua`l](http://www.anaconda.com/products/individual))


    After you have downloaded Anaconda, by default it should be in the `Downloads`
    folder on your computer; click the downloaded installer, and it will start the
    installation prompt. The installation process is no different than any other application
    installation. It might offer to install `PyCharm IDE` along the way. We will not
    be using `PyCharm` in the book, and it is totally optional. If something goes
    wrong or you would need a step-by-step installation guidance, you could find it
    here: [`https://docs.anaconda.com/anaconda/install/`](https://docs.anaconda.com/anaconda/install/).


    To launch Anaconda on your computer, go to the `Applications` directory; on Mac
    you’ll find it in `Launchpad`, and on Windows go to `Applications` and look for
    the `Anaconda Navigator` green circle logo or start typing `Anaconda` in the search
    prompt. After you clicked the `Anaconda Navigator` logo, you should see the `Navigator`
    menu like in Figure [1-2](#506186_1_En_1_Chapter.xhtml#Fig2).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig2_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Anaconda Navigator menu


    The `Anaconda Navigator` menu hosts many different apps to run Python – JupyterLab,
    `Jupyter` Notebook, Spyder, and some others. They are all apps to run Python.
    In this book, we will be using the `Jupyter Notebook`, simply because it is the
    most popular app. From now on, I’ll refer to it as `Jupyter`. I do not want to
    go over the pros and cons of all the other apps comparing them. I think you should
    try all of them and pick the one that would work for you. In my opinion, the main
    difference among them is the layout. The Python syntax would be the same no matter
    which one you choose.


    To begin with the `Jupyter Notebook`, click the launch button on the bottom of
    the card. `Jupyter` will launch in the browser running on a local server. That
    would be a user interface. If you use Mac, you probably noticed that `Jupyter`
    also launched a Terminal or command prompt window. `Jupyter` has two parts: the
    user interface, where we write the code, and the Kernel running on a local server,
    where the code is being executed. If you use Windows, you have the Kernel running
    quietly under the hood. On Mac, it pops up a Terminal window. We will talk more
    about the Kernel later.


    In your browser, you will see the home directory of your computer. In the top
    upper-right corner of the browser, you can find the `New` button. Click the `New`
    button, and there will be a drop-down menu with `Python 3` and other choices.
    Click `Python 3` and you’ll make a new `Jupyter` file (Figure [1-3](#506186_1_En_1_Chapter.xhtml#Fig3)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig3_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    New Jupyter Notebook file


    `Untitled` is a default name of a file. You could change the default file name
    if you click it and enter a new file name in the popped up prompt. Unless you
    save the file in a specific folder by providing a path in the prompt, it will
    be saved in the home or main directory on your computer with the `.ipynb` extension.
    `Jupyter` comes with many great features. We will cover most of them as we move
    along. One of the features is autosave. Everything is being autosaved every three
    minutes. Of course, you can save your work manually at any time by clicking the
    diskette icon (save button) in the toolbar. All actions in the `Jupyter` Notebook
    can be done with a click of the mouse in the toolbar, or you can find a corresponding
    shortcut by clicking `help` in the upper menu or pressing the `H` letter on the
    keyboard.


    In the center, you can see a cell where we will be writing code. If you need more
    cells, you can always create one by clicking the `plus` icon button in the toolbar.
    If, on the other hand, you need to remove a cell, you can do it with the `scissors`
    button. I assume `copy` and `paste` buttons in the menu are self-explanatory.


    Before we get to the actual Python coding part, I want to explain how to use `Jupyter`.
    In the upper cell, write a `print()` command, like this:


    ```

    print("Hello")

    ```


    Make sure “Hello” is wrapped in quotes. Now, click the `Run play` icon button
    in the upper toolbar. A couple things just happened. First of all, we got the
    `[1]` number in the square brackets on the left of the cell. Second, under the
    cell, the `Hello` word was printed (Figure [1-4](#506186_1_En_1_Chapter.xhtml#Fig4)).
    The number in the square brackets means that our code was executed in the Kernel.
    Every time you write code in a cell, you would need to run that cell in order
    for the code to be executed. It’s a little bit annoying to reach for that `Run`
    button every time you need to run the code. The shortcut for this operation is
    a simultaneous press of `Shift` and `Enter` keys.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig4_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The `print()` command prints “Hello” when you run the Jupyter cell


    If you run that cell over and over again, you will see that for every operation
    we get a new number. The number itself is not important. It represents the sequence
    of operation. What’s important is we need to run the cell every time we update
    the code inside it. For example, let’s update our message to


    ```

    print("Hello World!")

    ```


    The output `Hello` would not be updated unless we run that cell again. I will
    run that cell again. In my case, that would be the second time I run that cell.
    I’ll see the next number in sequence `[2]`, meaning that operation is in the Python
    memory, and the output will be changed to `Hello World!` (Figure [1-5](#506186_1_En_1_Chapter.xhtml#Fig5)).


    Note'
