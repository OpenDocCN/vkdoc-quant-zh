    # 安装 Python


    首先，我们需要安装 Python。这个看似简单的起步步骤可能会让初学者感到困惑。Python 有许多不同的版本，并且安装过程会因 Mac 和 Windows
    系统而异。为了统一步调，不依赖不同的操作系统，我决定使用广受欢迎的 Python 发行平台 Anaconda。


    `Anaconda` 是一个软件包，它附带最新版本的 Python 以及我们稍后需要用到的一系列 Python 扩展。市面上还有其他 Python 发行版。尽管如此，`Anaconda`
    是专门为那些希望在一个地方拥有所有数据分析工具的用户设计的。它非常流行，被誉为“Python 数据科学的发源地”。^(¹)


    安装过程本身非常直接，适用于任何计算机。你可以谷歌搜索“download Anaconda Individual Edition”，或直接访问源网址 [`www.anaconda.com/products/individual`](http://www.anaconda.com/products/individual)
    并点击 `Download` 按钮。在该页面底部，你应该能看到 Anaconda 安装程序（图 1-1）。为 Mac 或 Windows 系统选择 `Graphical
    Installer` 并下载该软件包。在撰写本书时，`Python 3.9` 是最新版本的 Python。即使以后他们升级到 `Python 3.10` 甚至
    `Python 4`，也无需担心，语法是一样的。通常，每个版本都会带来一些小的改进，但不会影响本书中我们将要介绍的概念。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig1_HTML.jpg](img/506186_1_En_1_Fig1_HTML.jpg)


    图 1-1


    页面底部的 Anaconda 安装程序 ([`www.anaconda.com/products/individual`](http://www.anaconda.com/products/individual))


    下载 Anaconda 后，默认情况下它应该在你的电脑的 `Downloads` 文件夹中；点击下载好的安装程序，它会启动安装向导。安装过程与任何其他应用程序的安装没有区别。过程中它可能会提供安装
    `PyCharm IDE` 的选项。本书中我们不会使用 `PyCharm`，因此这是完全可选的。如果安装过程中出现问题，或者你需要一步步的安装指南，可以在这里找到：[`https://docs.anaconda.com/anaconda/install/`](https://docs.anaconda.com/anaconda/install/)。


    要在你的电脑上启动 Anaconda，请进入 `Applications` 目录；在 Mac 上，你可以在 `Launchpad` 中找到它；在 Windows
    上，进入 `Applications` 并寻找 `Anaconda Navigator` 的绿色圆形标志，或者在搜索提示框中开始输入 `Anaconda`。点击
    `Anaconda Navigator` 标志后，你应该能看到像图 1-2 所示的 `Navigator` 菜单。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig2_HTML.jpg](img/506186_1_En_1_Fig2_HTML.jpg)


    图 1-2


    Anaconda Navigator 菜单


    `Anaconda Navigator` 菜单托管了许多不同的运行 Python 的应用——JupyterLab、`Jupyter` Notebook、Spyder
    等。它们都是运行 Python 的应用。在本书中，我们将使用 `Jupyter Notebook`，仅仅因为它是最流行的应用。从现在开始，我将其简称为 `Jupyter`。我不想详细比较其他所有应用的优缺点。我认为你应该都尝试一下，然后选择最适合你的那一个。在我看来，它们之间的主要区别在于布局。无论你选择哪一个，Python
    语法都是相同的。


    要开始使用 `Jupyter Notebook`，请点击卡片底部的启动按钮。`Jupyter` 将在运行于本地服务器的浏览器中启动。这就是用户界面。如果你使用
    Mac，可能已经注意到 `Jupyter` 还启动了一个终端或命令提示符窗口。`Jupyter` 有两个部分：我们编写代码的用户界面，以及运行在本地服务器上负责执行代码的内核。如果你使用
    Windows，内核会在后台静默运行。在 Mac 上，它会弹出一个终端窗口。稍后我们会详细讨论内核。


    在你的浏览器中，你会看到你电脑的主目录。在浏览器右上角，你可以找到 `New` 按钮。点击 `New` 按钮，会有一个下拉菜单，其中包含 `Python 3`
    和其他选项。点击 `Python 3`，你将创建一个新的 `Jupyter` 文件（图 1-3）。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig3_HTML.jpg](img/506186_1_En_1_Fig3_HTML.jpg)


    图 1-3


    新的 Jupyter Notebook 文件


    `Untitled` 是文件的默认名称。如果你点击它，并在弹出的提示框中输入新的文件名，就可以更改默认文件名。除非你在提示框中提供了路径，将文件保存在特定文件夹中，否则它将以
    `.ipynb` 扩展名保存在你电脑的主目录或根目录下。`Jupyter` 有许多优秀的功能。我们将在后续内容中逐步介绍大部分功能。其中一项功能是自动保存。所有内容每三分钟自动保存一次。当然，你也可以随时通过点击工具栏中的软盘图标（保存按钮）手动保存你的工作。在
    `Jupyter` Notebook 中，所有操作都可以通过点击工具栏中的鼠标完成，或者你可以通过点击上方菜单中的 `help` 或按下键盘上的 `H` 键来查找相应的快捷键。


    在中央，你可以看到一个代码单元格，我们将在其中编写代码。如果需要更多单元格，你可以随时通过点击工具栏中的 `plus` 图标按钮来创建一个。另一方面，如果需要删除一个单元格，你可以使用
    `scissors` 按钮。我假设菜单中的 `copy` 和 `paste` 按钮的功能无需解释。


    在我们进入实际的 Python 编码部分之前，我想解释一下如何使用 `Jupyter`。在上方的单元格中，写一个 `print()` 命令，如下所示：


    ```

    print("Hello")

    ```


    确保 “Hello” 被引号括起来。现在，点击上方工具栏中的 `Run play` 图标按钮。刚才发生了两件事。首先，我们看到单元格左侧的方括号中出现了 `[1]`
    这个数字。其次，在单元格下方，打印出了 `Hello` 字样（图 1-4）。方括号中的数字表示我们的代码已在内核中执行。每次你在单元格中编写代码后，都需要运行该单元格才能使代码被执行。每次运行代码都需要去点击那个
    `Run` 按钮，这有点烦人。此操作的快捷键是同时按下 `Shift` 和 `Enter` 键。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig4_HTML.jpg](img/506186_1_En_1_Fig4_HTML.jpg)


    图 1-4


    运行 Jupyter 单元格时，`print()` 命令会打印出 “Hello”


    如果你反复运行该单元格，你会发现每次操作都会得到一个新的数字。这个数字本身并不重要，它代表操作的顺序。重要的是，每次更新单元格内的代码后，我们都需要重新运行该单元格。例如，让我们将输出信息更新为：


    ```

    print("Hello World!")

    ```


    输出结果 `Hello` 不会更新，除非我们再次运行该单元格。我将再次运行该单元格。对我来说，这将是我第二次运行该单元格。我会看到顺序中的下一个数字 `[2]`，这意味着该操作已存在于
    Python 的内存中，并且输出结果将变为 `Hello World!`（图 1-5）。


