- fmt: '# Logic with If, Elif, and Else


    To implement logic in Python, we need to use `if`, `elif`, and `else` statements.
    Before we get to them, I want to introduce the Boolean data type. There are two
    Booleans in Python, `True` and `False`. `True` and `False` as keywords always
    should be capitalized. You will see `True` if you try to evaluate the `2*2 ==
    4` statement. Consequently, the statement `2*2 == 5` would return `False`. Let
    me step back here and explain what a double equal operator means.


    When we assign a value to a variable name like `x = 7`, we use a single equal
    sign because it defines the variable. A double equal sign is a comparison operator.
    If we want to compare values, then we would need to use `==`. There are more comparison
    operators you can find in Table [1-2](#506186_1_En_1_Chapter.xhtml#Tab2).


    **Table 1-2** Comparison operators in Python


    | Operator | Name | Example |

    | --- | --- | --- |

    | `==` | Equal | `2 == 2` |

    | `!=` | Not equal | `5 != 2` |

    | `>` | Greater than | `5 > 2` |

    | `<` | Less than | `2 < 5` |

    | `>=` | Greater than or equal | `5 >= 2` |

    | `<=` | Less than or equal to | `2 <= 5` |


    I''ll start with the `if` statement. The `if` statement evaluates the expression,
    and if the result is `True`, then some conditions would be executed. I think an
    example with weather conditions will illustrate it. Suppose the weather outside
    is rainy, and we want to be reminded not to forget an umbrella. We can compose
    the following Python code:


    ```

    weather = "rainy"

    if weather == "rainy":

    print("Take an umbrella")

    ```


    The `if` condition evaluates `weather == "rainy"`. In order for it to be `True`,
    the value of the variable `weather` has to be identical to the `"rainy"` string.
    For Python, `"rainy"` is a sequence of characters. The computer compares the values
    character by character. If the `weather` variable value and `"rainy"` are perfectly
    matched, meaning all letters are the same and lowercase, then the condition would
    return `True`.


    You have probably noticed a colon after the `if` statement. In short, this is
    a Python syntax, and you''ll have to learn it. The `if`, `elif`, and `else` statements
    should have a colon at the end. I like to think of that colon as an action trigger.
    If a condition is true, then do something.


    As a rule of thumb, all statements that follow a colon should be indented. An
    indentation is very important in Python. It is how we bind statements together.
    We can say that the `print("Take an umbrella")` statement is in the scope of the
    `if` statement. We will talk more about the scope in the next chapter.


    The official Python documentation recommends using four spaces for indentation.
    However, apps like Jupyter give you an option to use a tab key on the keyboard
    to indent. The main rule of programming is always to be consistent. In the same
    file, you cannot mix spaces and tab as an indentation. You can use whichever you
    like, but if you use tabs, stick to tabs, or if you choose to indent with spaces,
    keep doing spaces. One of the common mistakes I have seen is that people would
    copy somebody''s code from the Internet and paste it into their files. This might
    give you an indentation error because the copied code came with tabs, and you
    have spaces for indentation in the file. The bottom line you have to remember
    is never to mix tabs and spaces in one file.


    We can try our weather exercises in Jupyter, and the output should return `Take
    an umbrella` (Figure [1-18](#506186_1_En_1_Chapter.xhtml#Fig18)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig18_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig18_HTML.jpg)


    **Figure 1-18** The `if` statement prints the "Take an umbrella" message, since
    `weather == "rainy"` returns `True`


    To make our code more versatile, we can replace `"rainy"` with a familiar function
    `input()`:


    ```

    weather = input("How is the weather? ")

    ```


    Run your code, and after the `input` function prompts, `"How is the weather?"`,
    you type something different than `"rainy"`. Do not forget to press the enter
    key. The `if` statement will be evaluated, but would return `False` in this case,
    and nothing will be printed.


    An `if` statement can be followed by an `else` statement. Keep in mind that an
    `if` statement is often sufficient by itself. However, most of the time, you would
    need to have more outcomes.


    Let''s add an `else` statement to our weather script:


    ```

    weather = input("How is the weather? ")

    if weather == "rainy":

    print("Take an umbrella")

    else:

    print("Have a nice day")

    ```


    For the reason that the `else` statement captures anything else we might get from
    a user, there is no need for a condition. The `else` statement is immediately
    followed by a colon. A rookie mistake is people try to squeeze in some condition
    after `else`. That makes no sense at all. In Figure [1-19](#506186_1_En_1_Chapter.xhtml#Fig19),
    you can see how our little program would react if a user entered `"windy"`. Since
    there is no condition to check for `"windy"`, the `else` statement catches it
    and prints `"Have a nice day"`. Keep in mind that our code performs no data validation.
    If a user for some reason had inputted some abracadabra, the `else` statement
    would be triggered and execute whatever code we might have under it.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig19_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig19_HTML.jpg)


    **Figure 1-19** The `else` statement prints the "have a nice day" message after
    being executed


    What if we have more conditions than just `"rainy"`? In that case, we would need
    to begin all other conditions with the `elif` keyword. `elif` stands for "else
    if" and should be used after opening an `if` statement. Suppose we need another
    reminder in case it is sunny outside. We can write this additional condition as:


    ```

    weather = input("How is the weather? ")

    if weather == "rainy":

    print("Take an umbrella")

    elif weather == "sunny":

    print("Do not forget your sunglasses")

    else:

    print("Have a nice day")

    ```


    The point you have to remember is that you always start decisions with an `if`
    statement and then use `elif`. You might use a thousand of `elif` statements if
    needed. In our pattern, we can extend the weather options with another `elif`
    condition in case there is a blizzard coming:


    ```

    weather = input("How is the weather? ")

    if weather == "rainy":

    print("Take an umbrella")

    elif weather == "sunny":

    print("Do not forget your sunglasses")

    elif weather == "blizzard":

    print("Stay home")

    else:

    print("Have a nice day")

    ```


    Run your code and test all conditions (Figure [1-20](#506186_1_En_1_Chapter.xhtml#Fig20)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig20_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig20_HTML.jpg)


    **Figure 1-20** `elif` triggered by the "sunny" condition


    There is one mistake beginners do over and over again, using an `if` statement
    instead of `elif`. In some instances, that might work, but I would like to demonstrate
    why it is so important to use `elif` statements.


    Suppose by mistake I had used an `if` statement instead of `elif` for the `"sunny"`
    condition. Assuming that a user inputted `"rainy"` into the prompt, what reminders
    would we see? You might say `"Take an umbrella"`. This is true. However, we would
    also see `"Have a nice day"` (Figure [1-21](#506186_1_En_1_Chapter.xhtml#Fig21)).
    Why? Python regards the `if` statement as a beginning of a new set of options
    and will execute the statement under the `else` after the `if` check for `"sunny"`.
    In case you expect only one outcome, then you must use an `elif` statement.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig21_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig21_HTML.jpg)


    **Figure 1-21** Wrong example of structuring decision structures'
