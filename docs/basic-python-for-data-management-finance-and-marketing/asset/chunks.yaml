    ## Indefinite Loop


    There are definite and indefinite loops in Python. We have covered definite `for`
    loops; now it is time to take a look at a `while` loop, an indefinite loop. As
    you might have guessed from the name, we do not know how many times a `while`
    loop iterates. The keyword `while` requires some condition right after it. If
    the condition returns `True`, then the while loop executes statements within its
    scope. After it is done, the `while` loop checks the condition again. If the condition
    is still valid, it iterates again. However, if the condition returns `False`,
    the `while` loop exits. The easiest example would be the work hours. The pseudocode
    might look like this:


    ```

    while not 6.00pm

    keep working

    ```


    If it is not 6:00 p.m. we would be working. In an hour, we check the time again
    if it is 6.00pm yet. No, it is not. Keep working. At some point, the `while` condition
    is no longer true, because it is passed 6.00pm. We can get out of the loop and
    stop working. The main rule is the condition should switch to `False` at some
    point. Otherwise, you will end up in an infinite loop. In real life, it could
    be a disaster.


    We can construct a simple `while` loop like this:


    ```

    tally = 0

    while tally < 5:

    tally = tally + 1

    print(tally)

    ```


    Before you run this code, make sure you increase `tally` by 1 with each iteration
    of the `while` loop. If accidentally you skip this statement, your while loop
    will print 0 over and over again. This would be an example of an infinite loop.
    To exit an infinite loop, you would need to interrupt the Kernel by clicking the
    stop button in the `Jupyter` upper menu.


    The `tally = tally + 1` statement in the `while` loop will increase the value
    of `tally`. After five repetitions, the value of `tally` will be 5, and the condition
    `tally < 5` will return `False`. The loop will exit (Figure [2-17](#506186_1_En_2_Chapter.xhtml#Fig17)).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig17_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig17_HTML.jpg)


    **Figure 2-17** A while loop exits if the condition is no longer true


    The key element of a `while` loop is the condition. The condition has to change
    at some point to exit the loop.


    We can use a `while` loop in the Pig Latin example. The function `main()` validates
    an entered word. If a string contains anything besides alphabetic characters,
    the code is redirected to `"Invalid input, please try again"`, and the program
    stops. In reality, we do not want to give up on a user who accidentally entered
    an invalid word. Using a `while` loop, we would ask them to try again. Instead
    of `if` and `else` statements, we will use a `while` loop. The program will be
    asking a user to enter a word until the right format would be entered. I will
    add another `print` statement with a hint that only alphabetic characters can
    be used:


    ```

    def main():

    word = input("give me a word ")

    while not word.isalpha() and len(word) > 1:

    print("Invalid input, please try again")

    print("You can use alphabetic-characters only ")

    word = input("give me a word ")

    word = word.lower()

    result = game(word)

    return result

    ```


    The keyword `not` after `while` makes `word.isalpha() and len(word) > 1` filters
    `False`. This statement literally says `while False`. The `while` loop will be
    executing `print` statements and asking for `input` over and over again till a
    user gets it right. However, if a user enters a word that can be used, then the
    `while` statement will not be executed at all, and the code will go to the `word
    = word.lower()` line. `word = word.lower()` and `result = game(word)` statements
    are outside of the `while` loop. They will be executed in two cases. The first
    case would be if the `while` loop never gets triggered. The second situation would
    be if the `while` loop was executed and then terminated.


    As you can see, there is a conceptual difference between a `while` loop and a
    `for` loop. The `while` loop heavily depends on a condition. The `for` loop contrarily
    iterates for every item in a sequence.'
