- fmt: '# Defining Your Own Functions


    So far, we have been using Python built-in functions. You however can define your
    own functions. Before we get to the coding part, we need to understand what a
    function in Python is. A function is a block of reusable code. The keyword here
    is reusable. There is a principle in programming – keep your code DRY. DRY means
    do not repeat yourself. If you want to do something over and over again, wrap
    it as a function.


    Each function is supposed to perform one task and serve a purpose. You do not
    want to compose the whole program as one long function. Rather, split your code
    into multiple functions where every step or job would be a separate function.
    The whole program would consist of multiple functions, blocks of code which you
    could easily replace or change down the road. Besides, some functions might be
    used in other programs. It is a common practice to import a function from one
    module to another.


    Let’s compose a simple function that sums up two numbers. You start a function
    with the keyword `def`. `def` stands for define. Then you need to come up with
    some name for a function. Any name will do, but as a best practice, the name of
    the function is supposed to reflect the purpose of the function. Right after the
    function name you should place the parentheses with the colon “:”.


    ```

    def add():

    ```


    Indentation should follow the colon. All indented statements would be blocked
    in the scope of the function. Just for now, we will define two variables in the
    function, `a` and `b`, and assign to them values `5` and `6`, respectively. Note
    that variables `a` and `b` are defined locally – inside of the function:


    ```

    def add():

    a = 5

    b = 6

    ```


    If you try to use them outside of the function, Python would raise an error message
    that `a` and `b` are not defined (Figure [2-11](#506186_1_En_2_Chapter.xhtml#Fig11)).
    That means `a` and `b` could be used within the function where they are defined.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig11_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    a name is being defined locally within the function


    Our simple function would add `a` to `b`, and we save the result with the variable
    `total`. Until now we have been using the `print()` function to see the results
    of our operations. We, humans, need to see things; computers do not. For that
    reason, the functions return results. Return is the last statement in a function.
    You cannot do anything after a return statement. It stops the code. If you need
    to have a `print()` function to see the result, you would need to squeeze it in
    before the return statement:


    ```

    def add():

    a = 5

    b = 6

    total = a + b

    return total

    ```


    If you ran the cell with the function `add()`, you would see that nothing happened.
    Except that now the function `add()` is stored in Python memory. In order to use
    the function, we would need to call or invoke it:


    ```

    add()

    ```


