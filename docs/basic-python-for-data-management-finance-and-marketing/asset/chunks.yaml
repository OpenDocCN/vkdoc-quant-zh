    **第 2 步：** 点击蓝色的**“创建”**按钮后，你应该能在控制面板中看到新创建的项目。如果 Google Cloud Platform 首页上已有其他项目，请在顶部菜单中选择你想要使用的那个。


    **第 3 步：** 控制面板由多个卡片组成；选择标有**“API”**的卡片。在 API 卡片的底部，你会看到一个**“前往 API 概览”**的箭头。你可能还记得第
