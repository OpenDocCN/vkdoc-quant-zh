- fmt: "# Logic Operations in Pandas\n\nWhen you need to take actions based on a condition,\
    \ that is where logical operations come into play. If a condition is `True`, then\
    \ do something to the values. There are three different approaches you can use\
    \ to perform logical operations in Pandas. My favorite is `lambda`, and I’ll explain\
    \ it first.\n\n`lambda` is an anonymous function in Python – in other words, a\
    \ function with no name that runs like an expression. Beginners find `lambda`\
    \ somewhat confusing, but it is not that difficult, believe me – presuming that\
    \ you grasp the syntax and practice the `lambda` syntax a couple of times.\n\n\
    I will start with single-expression `lambda`. Suppose we want to double the number\
    \ of shares of each stock in our `portfolio` DataFrame. The easiest and efficient\
    \ way would be to use `portfolio.Qty * 2`. However, to explain `lambda` I would\
    \ do it differently. An alternative to a vectorized operation would be to go value\
    \ by value in the column `Qty` and add each value to itself. That sounds like\
    \ an iteration through a column. We do not want to use a `for` loop to iterate\
    \ over a column because it would slow down the process. The most efficient way\
    \ to iterate through a Series would be to use the method `apply()`. The official\
    \ documentation says that the method `apply()` takes another function and applies\
    \ it to all values within a column. To double the number of shares, we would need\
    \ to compile a function and pass it into the `apply()` method.\n\nLet’s define\
    \ a simple function that would take the number of shares from each row in the\
    \ column `Qty` and add them to themselves:\n\n```\ndef double(num_shares):\n \
    \   return num_shares + num_shares\n```\n\nNow that we have a function, we will\
    \ apply it to each value within the Series `portfolio.Qty`:\n\n```\nportfolio.Qty.apply(double)\n\
    ```\n\nKeep in mind that when you use a function as a helper function within some\
    \ other function, like `map()`, `filter()`, or the method `apply()`, you do not\
    \ need parentheses at the end. That is why we call the `double` function inside\
    \ the `apply()` method as `apply(double)`.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig29_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig29_HTML.jpg)\n\
    \n**Figure 3-29** Applying a function double to all values in the Series\n\nUsually,\
    \ we define a function because we would want to use it again and again. I doubt\
    \ that the `double` function would be needed anymore. Is there a better way? The\
    \ answer is yes; we can replace a function with `lambda`.\n\nTo write `lambda`\
    \ expressions, you need to remember the following setup. Always begin with the\
    \ `lambda` keyword. In `lambda`, there are two parts separated by the colon character.\
    \ In the first part, you define a variable or variables. Something that goes into\
    \ a `lambda`. In the second part, you compose an expression. Something that `lambda`\
    \ would return as the result.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig30_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig30_HTML.jpg)\n\
    \n**Figure 3-30** Lambda syntax\n\nThere is no need to use a return operator because\
    \ `lambda` always returns the result. Keep in mind that `lambda` has to be used\
    \ within a function or can be assigned as an expression to a variable name. We\
    \ can rewrite the `double` function as a `lambda` expression:\n\n```\nlambda num_shares:\
    \ num_shares + num_shares\n```\n\nThis expression can replace the `double` function\
    \ in the `apply()` method:\n\n```\nportfolio.Qty.apply(lambda num_shares: num_shares\
    \ + num_shares)\n```\n\nIf we want to save the result of that operation, we can\
    \ assign it to a new column name.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig31_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig31_HTML.jpg)\n\
    \n**Figure 3-31** Doubling the number of shares and saving the result under a\
    \ new column name\n\n`lambda` can be used with `if` and `else` statements. The\
    \ syntax would look like:\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig32_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig32_HTML.jpg)\n\
    \n**Figure 3-32** Lambda syntax with `if` and `else` conditions\n\nWith `lambda`\
    \ returning outcomes based on `if` and `else` statements, we can do logical operations\
    \ on a Series or the whole DataFrame. As an illustration of that, we can provide\
    \ the recommendations to buy or sell a stock based on the price. Let’s say if\
    \ the stock price is less than $118, we would record `Buy` in the new column `Rating`.\
    \ Otherwise, the record in the `Rating` column would be `Sell`. The `lambda` expression\
    \ in the `apply()` method would look like this:\n\n```\nlambda stock_price: \"\
    Buy\" if stock_price < 118 else \"Sell\"\n```\n\nAgain, `stock_price` is a variable\
    \ that accurately describes the value. All we have to do is to pass the `lambda`\
    \ expression into the `apply()` method and save the results under the column name\
    \ `Rating`:\n\n```\nportfolio[\"Rating\"] = portfolio.Price.apply(lambda stock_price:\
    \ \"Buy\" if stock_price < 118 else \"Sell\")\n```\n\nThe `Rating` column holds\
    \ outcomes based on `if` and `else` statements we have applied to all values in\
    \ the `Price` column.\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig33_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig33_HTML.jpg)\n\
    \n**Figure 3-33** Applying lambda with `if` and `else` statements\n\nI know that\
    \ `lambda` requires some practice to master it, and later in the chapter, I’ll\
    \ present more examples of the practical use of `lambda`.\n\nAnother approach\
    \ to logical operations on a DataFrame would be using the method `loc`. The syntax\
    \ would look like this:\n\n```\nDataFrame.loc[if condition, new column to save\
    \ result] = result\n```\n\nA practical example would be to calculate the profit\
    \ or loss per share. If values in the `Price` column are greater than values in\
    \ the `Cost` column, then we want to subtract the cost paid from the current price.\
    \ The results will be stored in a new column. We will name it `PL_per_share`.\
    \ We can write this logical statement as:\n\n```\nportfolio.loc[portfolio.Price\
    \ > portfolio.Cost, \"PL_per_share\"] = portfolio.Price - portfolio.Cost\n```\n\
    \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig34_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig34_HTML.jpg)\n\
    \n**Figure 3-34** Performing a logical operation with the `loc` method\n\nThere\
    \ is one more option for outcomes based on `if` and `else` conditions – the NumPy\
    \ function `where()`. Pandas is built on NumPy, and the NumPy array data structure\
    \ is the core of a Series and a DataFrame. It means we can borrow functions from\
    \ the NumPy package and use them in Pandas. Since we have not imported the NumPy\
    \ library into our file, we would need to scroll up and import NumPy into the\
    \ first cell right under the Pandas import. Do not forget to rerun the cell:\n\
    \n```\nimport numpy as np\n```\n\nThe function `where()` belongs to NumPy, and\
    \ we would need to use it as:\n\n```\nnp.where()\n```\n\nIt would be a good idea\
    \ to read the description and see all arguments that it takes:\n\n```\nhelp(np.where)\n\
    ```\n\nJust as the documentation says, `where()` needs a condition, and then it\
    \ would provide two outcomes. The first one will be executed if the condition\
    \ is `True` and the other one if the condition returns `False`.\n\nTo practice\
    \ `where()`, we can run a scenario; if the value in `PL_per_share` is greater\
    \ than $5, we need to return `True`. Otherwise, `where()` will return `False`.\
    \ The results will be stored in the new column under the `greater_five` name.\
    \ Following the description of `where()`, we can compile that logical expression\
    \ as:\n\n```\nportfolio[\"greater_five\"] = np.where(portfolio.PL_per_share >\
    \ 5, True, False)\n```"
