  trans: "\n### 图 7-3  \n为 Google Analytics 服务生成 API 密钥\n\n大多数 Google API 服务都需要 API\
    \ 密钥，请妥善保存该密钥，以备后续使用。\n\n### 结合 Python 使用 Google Analytics\n\n距离我们首次调用 Google\
    \ Analytics API 仅一步之遥；Google Analytics 要求以 JSON 格式提供 API 密钥。生成包含密钥的 JSON 文件的简单方法是，在\
    \ Google Cloud Platform 中打开**服务账号**页面。你可以在顶部的搜索框中搜索该页面，或者通过左侧菜单导航至**IAM 与管理**。在**IAM\
    \ 与管理**中，选择**服务账号**选项；它将带你进入 [`https://console.cloud.google.com/iam-admin/serviceaccounts`](https://console.cloud.google.com/iam-admin/serviceaccounts)\
    \ 页面。如果你有多个项目，请点击与 Google Analytics 相关的那个项目。在那里，你应该会看到 Google 为该服务创建的项目电子邮件（图\
    \ 7-4）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig4_HTML.jpg](img/506186_1_En_7_Fig4_HTML.jpg)\n\
    \n#### 图 7-4  \n服务账号页面与 Google 服务电子邮件\n\n点击该电子邮件并导航至**密钥**标签页。在该页面中，你会看到**添加密钥**按钮。点击**添加密钥**并选择**创建新密钥**选项。弹出的窗口将提供生成\
    \ JSON 密钥文件的选项（图 7-5）；点击**创建**按钮，并将其保存到你的计算机中。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig5_HTML.jpg](img/506186_1_En_7_Fig5_HTML.jpg)\n\
    \n#### 图 7-5  \n生成密钥并保存为 JSON 文件\n\n最后，在我们生成了 JSON 格式的 API 密钥后，就可以编写一些代码来使用 Google\
    \ Analytics 了。现在是时候编写 Python 代码了；打开一个新的 **Jupyter** Notebook，并将下载的 JSON 密钥文件移动到相同的工作目录中。此外，将\
    \ JSON 文件重命名为 `client_secret_api.js` 会是个好主意。\n\n为了进行身份验证，我们需要安装 `oauth2client`\
    \ 库。你知道在哪里找到终端窗口，只需运行 `pip` 命令并安装该库即可：\n\n```\npip install oauth2client\n```\n\
    \n在新的 **Jupyter** Notebook 顶部，导入以下模块：\n\n```\nfrom oauth2client.service_account\
    \ import ServiceAccountCredentials\nfrom apiclient.discovery import build\n```\n\
    \n在脚本的开头，我们需要定义凭据。所有尝试访问 Google Analytics 的用户，`SCOPES` 都是相同的。`KEY_FILE_LOCATION`\
    \ 应提供包含 API 密钥的已下载 JSON 文件的路径。我已将文件重命名为 `client_secret_api.json`。最后，`VIEW_ID`\
    \ 应填写你 Google Analytics 项目的视图 ID。你可以在 [analytics.google.com](http://analytics.google.com)\
    \ 页面上找到 `VIEW_ID`。如果你在 Google Analytics 中激活了 **创建 Universal Analytics 媒体资源** 选项，`VIEW_ID`\
    \ 将分配给所跟踪的 `.` Web 资源。进入左下角的**管理**设置，查找**视图设置**。在**基本设置**中，你将找到网站的**视图 ID** 编号。此外，在\
    \ Google Analytics 中，将服务账号中的电子邮件（图 7-4）添加到账号用户管理中允许生成报告的用户列表中。\n\n```\nSCOPES\
    \ = ['https://www.googleapis.com/auth/analytics.readonly']\nKEY_FILE_LOCATION\
    \ = 'client_secret_api.json'\nVIEW_ID = '123415356'\n```\n\n为了初始化凭据，我们将使用导入的 `ServiceAccountCredentials`，并传入\
    \ `KEY_FILE_LOCATION` 和 `SCOPES` 作为参数：\n\n```\ncredentials = ServiceAccountCredentials.from_json_keyfile_name(KEY_FILE_LOCATION,\
    \ SCOPES)\n```\n\n接着，我们需要通过 `build()` 函数连接 Google API 客户端库。正如我之前提到的，Google API\
    \ 客户端包是通用的，适用于所有 Google 服务。在 `build()` 函数中，你需要指定要连接的服务以及该包的版本：\n\n```\nanalytics\
    \ = build('analyticsreporting', 'v4', credentials=credentials)\n```\n"
- fmt: "The Google Analytics report requires a period range. We can set `start_date`\
    \ and `end_date`:\n\n```\nstart_date = \"2020-01-01\"\nend_date = \"2021-04-23\"\
    \n```\n\nAlso, we would need to specify dimensions and metrics for the Google\
    \ Analytics report. You can find the list of all available metrics here: [`https://ga-dev-tools.appspot.com/dimensions-metrics-explorer/`](https://ga-dev-tools.appspot.com/dimensions-metrics-explorer/).\n\
    \nFor my first report, I’ll use very popular `users` and `sessions` metrics. To\
    \ send a request for this report, we need to use the `analytics.reports()` function,\
    \ and in the body specify `VIEW_ID`, dates, metrics, and dimensions:\n\n```\n\
    response = analytics.reports().batchGet(body={\n'reportRequests': [{\n'viewId':\
    \ VIEW_ID,\n'dateRanges': [{'startDate': start_date, 'endDate': end_date}],\n\
    'metrics': [\n{\"expression\": \"ga:users\"},\n{\"expression\": \"ga:sessions\"\
    }\n]\n}]}).execute()\n```\n\n`users` and `sessions` metrics arguments should be\
    \ passed into the function as array keys and values where `\"expression\"` followed\
    \ by metrics.\n\nPrint the response in a new cell, and you’ll see a generated\
    \ report from Google Analytics come in JSON format (Figure [7-6](#506186_1_En_7_Chapter.xhtml#Fig6)).\n\
    \n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig6_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6  \nGenerating a Google Analytics report for users and sessions metrics\n\
    \nWe have dealt with JSON before and know that it works like a Python dictionary.\n\
    \nThe response contains an array under the key `\"reports\"`. We can fetch the\
    \ array and grab the first item:\n\n```\nresponse['reports'][0]\n```\n\nThe information\
    \ we are looking for is stored under the `data` key. The `data` holds another\
    \ dictionary, and we can see all the keys by applying a dictionary method `keys()`:\n\
    \n```\nresponse['reports'][0][\"data\"].keys()\n```\n\nThe options we receive\
    \ are:\n\n```\ndict_keys(['rows', 'totals', 'rowCount', 'minimums', 'maximums'])\n\
    ```\n\nThe `totals` key is holding the information we want to use. We will get\
    \ the values for `users` and `sessions`:\n\n```\nreport = response['reports'][0][\"\
    data\"]['totals'][0]\nusers = report['values'][0]\nsessions = report['values'][1]\n\
    ```\n\nIn Figure [7-7](#506186_1_En_7_Chapter.xhtml#Fig7), we can see that unique\
    \ users 308087 visited the site with a total of 363031 sessions.\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig7_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7  \nFetching users and sessions values from a JSON response\n\nTo\
    \ visualize how engaged users are with the site, we can plot new and returning\
    \ users. The `sessions` includes all visitors, new and returning. The `users`\
    \ on the other hand represent new visitors.\n\nWe need to import Matplotlib in\
    \ the first cell where we keep all our imports:\n\n```\nimport matplotlib.pyplot\
    \ as plt\n```\n\nThe percentage of new visitors can be calculated as `users` divided\
    \ by `sessions`. Do not forget that JSON comes as a string, and all values have\
    \ to be converted to numeric data types:\n\n```\nnew_visitors = int(users)/int(sessions)\n\
    returning_visitors = 100 - new_visitors\n```\n\nWe will plot these numbers as\
    \ a donut chart. A donut chart is a combination of a pie chart and a circle (Figure\
    \ [7-8](#506186_1_En_7_Chapter.xhtml#Fig8)):\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig8_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8  \nPlot of new users and returning users based on metrics values\n\
    \n```\nmetrics = [new_visitors, returning_visitors]\nplt.pie(metrics, shadow=True,\
    \ colors=[\"#E74C3C\",\"#27AE60\"], labels=[\"New Visitors\", \"Returning Visitors\"\
    ])\ndonut = plt.Circle( (0,0), 0.5, color='white')\np = plt.gcf()\np.gca().add_artist(donut);\n\
    ```\n\nAnother popular Google Analytics report is pageviews and session duration.\n\
    \n`Dates` and `VIEW_ID` will be the same as we used in the previous example. This\
    \ time, we can structure the received data as a DataFrame. In the first cell,\
    \ add Pandas to the imported libraries:\n\n```\nimport pandas as pd\n```"
