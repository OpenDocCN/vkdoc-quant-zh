- fmt: "We iterate through the list in search of `5`. If we find `5`, we add it to\
    \ `blist` with a list method `append()`. The method `append()` is implemented\
    \ in Python as a module, and it takes some time to call it every time we get `5`.\
    \ To make this code run faster, we can skip the `append()` method and rewrite\
    \ the solution as a list comprehension. The same searching for `5`s example would\
    \ look like this:\n\n```\nblist = [ number for number in alist if number == 5\
    \ ]\n```\n\nThe whole statement is wrapped in square brackets, and the result\
    \ is returned as a list. That is why we no longer need the `append()` method.\
    \ The outcome of a list comprehension statement is always a list type, and in\
    \ our case it is saved as `blist`. A list comprehension would be roughly twice\
    \ faster than using an `append()` method, and you could feel that on a list with\
    \ more than 10,000 elements.\n\nThe syntax of a simple list comprehension consists\
    \ of three parts: the `for` loop, filter, and expression. The filter is optional:\n\
    \n```\n[ expression for loop filter ]\n```\n\nIf you compare the first solution\
    \ with the one done as the list comprehension, you will see that they are pretty\
    \ much the same. The one in square brackets starts with an expression. In our\
    \ case, the expression is a number itself, because we just want to keep a value\
    \ if it is equal to 5. In some other cases, you might want to do something else,\
    \ maybe multiply the `number` by 10 if the value is equal to 5. Then we use the\
    \ same `for` loop, where the `number` variable is defined. The filter is an `if`\
    \ statement. Sometimes you need it, sometimes not. In case an `if` statement is\
    \ needed, you place it right after the `for` loop.\n\nLet’s consider another example;\
    \ suppose we need to take all numbers in the `alist` container and multiply them\
    \ by `10`. In that case, we do not need a filter, and the list comprehension would\
    \ look like this:\n\n```\nblist = [ number * 10 for number in alist ]\n```\n\n\
    You need to remember that a list comprehension always returns a list data structure.\
    \ You save that list by assigning a list comprehension statement to a variable.\n\
    \nLet’s get back to our scraping example armed with a list comprehension syntax.\
    \ Our final goal is to write a title and article snippet into a text file. To\
    \ smooth the process, we will strip off `<p>` tags from all items in the `list_article`\
    \ using a list comprehension `[ p.get_text() for p in list_article]`. The result\
    \ of this list comprehension would be a list of strings. To concatenate all strings\
    \ from the list, we will use a string method `join()`. I have noticed that the\
    \ first `<p>` tags on each full article contain \"No results matched your search\"\
    . Since we grabbed all `<p>` tags, we have that message as a first item in `list_article`.\
    \ We do not need it, and we will slice it off starting with the second element\
    \ in `list_article[1:]`.\n\nWe will do the whole cleaning and concatenation operation\
    \ at the same time as:\n\n```\nclean_article = \" \".join([p.get_text() for p\
    \ in list_article[1:]])\n```\n\n`clean_article` will be a full article. At the\
    \ end of the `for` loop, we will append each article as a string to `mega_list`:\n\
    \n```\nmega_list = [ ]\nfor item in clean_titles:\n    url = item[1]\n    page\
    \ = requests.get(\"https://www.investing.com{}\".format(url), headers={'User-agent':'Mozilla/5.0'})\n\
    \    print(\"now fetching\", \"https://www.investing.com{}\".format(url))\n  \
    \  article = BeautifulSoup(page.content, \"html.parser\")\n    list_article =\
    \ article.find_all(\"p\")\n    clean_article = \" \".join([p.get_text() for p\
