    如前所述，方括号表示法和名称会创建一个新列。如果我们还没有合适的列值该怎么办？这不成问题。我们可以用`0`或空字符串作为占位符来创建一个空列，以便稍后添加值。例如，我们需要为投资组合中每只股票支付的价格创建一个列。我们将它命名为`Cost`，由于还没有实际数据，使用`"
    "`作为占位符：


    ```

