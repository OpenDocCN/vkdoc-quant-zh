- fmt: '在代码中，我们遍历了`asin_list`中收集的所有ASIN编号，并将每个唯一的编号传递给字符串方法`format()`，以将其追加到亚马逊URL中。Selenium的`page.get()`方法会尝试从服务器拉取每个产品页面。如果亚马逊服务器返回有效响应，变量`page`会保存它，我们就可以从Selenium对象中解析元素。但是，如果URL损坏或服务器因某种原因无响应，代码不会显示错误消息并停止，而是跳转到`except`块并打印`"Could
    not get the page for some ASIN"`。如果`try`块中的语句失败，`except`块将防止错误。在`except`块中的所有语句执行完毕后，Python会在`for`循环中继续正常执行。在前面的示例中，它将尝试获取`asin_list`中的下一个网页。`try`和`except`块是避免代码崩溃的一种非常流行的方式。它们通常用于捕获错误消息，以便稍后仔细查看问题所在。有时，专业开发人员会在`except`块中放置一个函数，向自己发送包含异常的消息，以便快速解决问题。


    此外，在`for`循环中，我们将定义一个空列表。我们需要它来存储某个产品的所有抓取信息。如果我们遇到一个页面缺少`title`和`price`数据，我们会将它们定义为`None`：


    ```

    for number in asin_list:

    data = []

    title = None

    price = None

    try:

    page.get("https://www.amazon.com/dp/{}".format(number))

    print("fetching {}".format(number))

    except:

    print("could not get the page for {}".format(number))

    ```


    接下来，我们将尝试获取产品标题；如果页面上没有`id="productTitle"`，`except`块会打印`"productTitle is not there"`。


    ```

    try:

    title = page.find_element_by_id("productTitle").text

    except:

    print("productTitle is not there")

    ```


    正如我之前提到的，价格元素有点棘手。亚马逊对价格元素使用不同的`id`属性。我找到了`id="priceblock_ourprice"`和`id="priceblock_dealprice"`。如果产品已售罄且产品页面显示`"Currently
    unavailable"`，则根本不会有价格元素。在这种情况下，`price`会被设置为`None`。


    ```

    try:

    price = page.find_element_by_id("priceblock_ourprice").text

    except:

    print("priceblock_ourprice is not there")

    try:

    price = page.find_element_by_id("priceblock_dealprice").text

    except:

    print("priceblock_dealprice is not there")

    ```


    产品标题和价格的结果应添加到`data`列表中：


    ```

    data.extend([title,price])

    ```


    来自要点列表的产品描述将通过`id="feature-bullets"`获取，并按换行符保存到`bullets_list`中。`bullets_list`的值将扩展到同一个`data`列表中：


    ```

    try:

    bullets = page.find_element_by_id("feature-bullets").text

    bullets_list = bullets.split("\n")

    data.extend(bullets_list)

    except:

    print("feature-bullets id is not there")

    ```


    最后，我们将把`data`列表写入CSV文件。返回上文，使用函数`open()`定义一个文件对象。CSV模块附带一个`write()`方法，该方法会将`data`列表作为一行插入到`amazon-results`文件中：


    ```

    csv_file = open("amazon-results.csv", ''w'')

    writer = csv.writer(csv_file)

    ```


    由于某些页面在写入`data`之前没有产生结果，因此检查第一个元素是否不为`None`。如果`data`列表包含信息，则将其作为一行添加到`amazon-results.csv`文件中。以下`if`块应放置在`for`循环的作用域内：


    ```

    if data[0] != None:

    writer.writerow(data)

    ```


    最后，在`for`循环之外，我们需要保存文件对象并关闭浏览器窗口：


    ```

    csv_file.close()

    page.close()

    ```


    最终，代码将生成`amazon-results.csv`文件，该文件保存在当前Jupyter Notebook所在的目录中。每个产品将写入单独的行，详细信息由逗号分隔。在图[4-27](#506186_1_En_4_Chapter.xhtml#Fig27)中，您可以看到在Excel中打开的`amazon-results.csv`文件。


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig27_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig27_HTML.jpg)


    图 4-27 将结果保存到Excel文件中


    正如我在此承诺的，您可以看到使用Selenium完成的亚马逊示例的完整解决方案：


    ```

    #importing packages

    from selenium.webdriver import Chrome

    from selenium.webdriver.common.keys import Keys

    import csv

    #initiating a csv file

    csv_file = open("amazon-results.csv", ''w'')

    writer = csv.writer(csv_file)

    #ChromeDriver PATH

    chromedriver = r"/Users/programwithus/Chapter4/chromedriver"

    page = Chrome(executable_path=chromedriver)

    #openning amazon.com and gathering ASIN numbers for Ring doorbells

    page.get("https://www.amazon.com")

    prompt = page.find_element_by_id("twotabsearchtextbox")

    prompt.send_keys("ring video doorbell")

    prompt.send_keys(Keys.ENTER)

    asin_numbers = page.find_elements_by_class_name("s-result-item")

    rings = [item.text for item in asin_numbers]

    asin_list = [item.get_attribute(''data-asin'') for item in asin_numbers]

    #fetching details for each product and writing it into amazon-results.csv

    for number in asin_list:

    data = []

    title = None

    price = None

    try:

    page.get("https://www.amazon.com/dp/{}".format(number))

    print("fetching {}".format(number))

    except:

    print("could not get the page for {}".format(number))

    try:

    title = page.find_element_by_id("productTitle").text

    except:

    print("productTitle is not there")

    try:

    price = page.find_element_by_id("priceblock_ourprice").text

    except:

    print("priceblock_ourprice is not there")

    try:

    price = page.find_element_by_id("priceblock_dealprice").text

    except:

    print("priceblock_dealprice is not there")

    data.extend([title,price])

    try:

    bullets = page.find_element_by_id("feature-bullets").text

    bullets_list = bullets.split("\n")

    data.extend(bullets_list)

    except:

    print("feature-bullets id is not there")

    if data[0] != None:

    writer.writerow(data)

    #saving file and closing browser

    csv_file.close()

    page.close()

    ```'
  raw: "In the code, we loop through all collected ASIN numbers within `asin_list`\
    \ and pass\neach unique number into the string method `format()` to append it\n\
    to the Amazon URL. The Selenium `page.get()`\nmethod  will `try` to pull each\n\
    product page from the server. If an Amazon server returns a valid\nresponse, the\
    \ variable `page` would save it,\nand we could parse elements out of the Selenium\
    \ object. However, if the\nURL was broken or server was not responding for some\
    \ reason, instead of\ngetting an error message and stopping, the code would jump\
    \ to `except` block and\nprint `\"Could not get the page for some ASIN\"`.\nIf\
    \ a statement in the `try` block fails, the\n`except` block\nwill prevent an error.\
    \ After all statements in the `except` block are\nexecuted, Python will continue\
    \ its normal course within the `for` loop. In the\npreceding example, it will\
    \ try to fetch the next web page in `asin_list`.\n`Try` and\n`except`\nblocks\
    \  are a very\npopular way to avoid crashing the code. Very often, they are used\
    \ to\ncapture error messages, so later you can take a close look at what went\n\
    wrong. Sometimes, professional developers would place a function in an\n`except`\
    \ block to\nsend them a message with an exception to quickly address an issue.\n\
    \nAlso, within the for loop, we will define an empty list. We would need\nit to\
    \ store all scraped information for a product. In case we hit a page\nwith missing\
    \ data for `title` and `price`, we would\ndefine them as `None` :\n\n```\nfor\
    \ number in asin_list:\ndata = []\ntitle = None\nprice = None\ntry:\npage.get(\"\
    https://www.amazon.com/dp/{}\".format(number))\nprint(\"fetching {}\".format(number))\n\
    except:\nprint(\"could not get the page for {}\".format(number))\n```\n\nNext,\
    \ we will try to get a product title; if there is no `id=\" productTitle\"` on\n\
    a page, the `except` block would\nprint `\"``productTitle` \n`is not there\"`.\n\
    \n```\ntry:\ntitle = page.find_element_by_id(\"productTitle\").text\nexcept:\n\
    print(\"productTitle is not there\")\n```\n\nAs I have mentioned before, the price\
    \ element is a little bit tricky.\nAmazon uses different `id` attributes for the\n\
    price element. I have located `id=\" priceblock_ourprice\"` and `id=\" priceblock_dealprice\"\
    `. In case the product is sold out and the\nproduct page says `\"Currently unavailable\"\
    `, there will be no price element at all. That is the\ncase where `price` would\
    \ be set to\n`None`.\n\n```\ntry:\nprice = page.find_element_by_id(\"priceblock_ourprice\"\
    ).text\nexcept:\nprint(\"priceblock_ourprice is not there\")\ntry:\nprice = page.find_element_by_id(\"\
    priceblock_dealprice\").text\nexcept:\nprint(\"priceblock_dealprice is not there\"\
    )\n```\n\nThe  results for\nthe product title and price should be added to the\
    \ `data` list:\n\n```\ndata.extend([title,price])\n```\n\nThe product description\
    \ from the bullet points would be grabbed by `id= \"feature-bullets\"`\nand saved\
    \ into `bullets_list` by a new\nline. `bullets_list` values\nwould extend the\
    \ same `data` list:\n\n```\ntry:\nbullets = page.find_element_by_id(\"feature-bullets\"\
    ).text\nbullets_list = bullets.split(\"\\n\")\ndata.extend(bullets_list)\nexcept:\n\
    print(\"feature-bullets id is not there\")\n```\n\nAt the end, we will write a\
    \ `data` list into a CSV\nfile. Go back up, and using the function `open()`, define\
    \ a file\nobject. A CSV module comes with a `write()` method  that would insert\
    \ a\n`data` list as a\nrow into the amazon-results file:\n\n```\ncsv_file = open(\"\
    amazon-results.csv\", 'w')\nwriter = csv.writer(csv_file)\n```\n\nSince some of\
    \ the pages produced no results before we write `data` into the file,\ncheck if\
    \ the first element is not `None`. If the `data` list contains\ninformation, then\
    \ we would add it as a row to the amazon-results.CSV\nfile. The following `if`\
    \ block should be\nplaced into the scope of the `for` loop:\n\n```\nif data[0]\
    \ != None:\nwriter.writerow(data)\n```\n\nFinally, outside of the `for` loop,\
    \ we need to\nsave the file object and close the browser window:\n\n```\ncsv_file.close()\n\
    page.close()\n```\n\nAt the end of the day, the code will generate the amazon-results.CSV\n\
    file saved in the same directory where the current\n**Jupyter** Notebook is. Each\
    \ product would be written in a\nseparate row and details separated by a comma.\
    \ In Figure [4-27](#506186_1_En_4_Chapter.xhtml#Fig27), you can see\nthe amazon-results.CSV\
    \ opened in Excel.\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig27_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig27_HTML.jpg)\n\
    \nFigure 4-27\nSaving the results in an Excel file\n\nAs I promised here, you\
