    # 使用 API


    到目前为止，我们一直在处理 HTML 网页。我在本章开头提到了客户端/浏览器与服务器之间的关系。浏览器接收 HTML 并将其呈现为图像和样式化的文本。作为人类，我们希望能够以美观多彩的方式查看信息。


    还有其他客户端不需要查看图像和颜色。我说的是设备。向服务器发送请求的设备也是一个客户端。例如，现在你可以买到一台冰箱，当牛奶喝完时，它会向杂货店下订单要求送货。另一个例子是交换
    Facebook 消息的智能手机，或者从服务器接收天气更新的汽车。


    这些设备需要一种简单格式的数据，不带样式和颜色。它们使用的数据格式是 JSON（JavaScript 对象表示法），它以字符串形式提供。服务器可以根据请求客户端以
    HTML 或 JSON 格式发送数据。


    通常，JSON 来自 API（应用程序编程接口），这是一个专门为与计算机应用程序或设备通信而设计的接口。


    如果你的工作是分析金融数据，那么你可以订阅彭博 API。另一方面，如果你从事数字营销工作，需要从 Google Analytics 获取信息，你将使用 Google
    Analytics Reporting API。事实上，Google 甚至有一个 Python 库来帮助开发者连接到他们的 API 并访问所有 Google
    应用程序。我们将在本书后面部分使用它们。


    所有 API 的设计都不同，大多数情况下，公司都有开发者文档来解释如何使用它们以及如何通过身份验证。有些 API 是免费的；其他的则需要订阅。


    在这里，我们将研究一个非常流行的金融数据源，Alpha Vantage。在下面的示例中，我将向您解释使用 API 的主要原则。


    ## 获取 API 密钥


    所有 API 提供商都需要某种形式的身份验证，Alpha Vantage 也不例外。与其他 API 服务相比，在 [`www.alphavantage.co/support/#api-key`](http://www.alphavantage.co/support/%2523api-key)
    获取 API 密钥非常容易。你需要回答两个简单的问题并提供你的电子邮件地址。请务必获取你自己的 API 密钥，因为我在本书中使用的密钥将会过期。成功注册后，你应该会看到以下消息：


    ```

    欢迎使用 Alpha Vantage！你的 API 密钥是：ZIIROPRQCMEREHR8。请将此 API 密钥保存在安全的地方，以便将来访问数据。

    ```


    API 密钥同时充当用户 ID 和密码。API 密钥的作用是验证请求信息的个人或设备的身份。此外，如果这是一个付费服务，还需要确保账号没有欠费。


    ## 理解 API 文档


    了解任何 API 都应该从 API 提供商的开发者文档开始。我们是 Alpha Vantage 服务的新手，从 [`www.alphavantage.co/documentation/`](http://www.alphavantage.co/documentation/)
    开始是明智之举。


    Alpha Vantage 提供了多个 API 来获取股票价格、公司基本数据、外汇、加密货币和技术指标。我们将使用 `TIME_SERIES_DAILY_ADJUSTED`
    API 来获取股票的历史每日价格。


    演示 URL 看起来像这样：


    ```

    https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=IBM&apikey=demo

    ```


    在浏览器中打开此参考链接，你将看到包含 IBM 股票 `开盘价`、`最高价`、`最低价`和 `收盘价` 的 JSON 数据。如果你仔细观察，会发现 JSON
    类似于 Python 字典数据类型。


    演示 URL 让我们很好地理解了如何使用它。API 端点中的 IBM 值可以替换为我们想要获取历史价格的任何其他股票代码。在 `apikey=demo` 参数中，`demo`
    应更改为你已获取的 API 密钥。


    ## 使用 Python 获取股票数据


    使用时间序列 API，我们将获取 AAPL 的历史价格并将其存储为 DataFrame。在一个新的 Jupyter 文件中，导入此示例需要的两个库，`Requests`
    和 `Pandas`：


    ```python

    import requests

    import pandas as pd

    ```


    我们需要将 API 密钥定义为字符串、API 的 URL 以及我们想要获取的股票：


    ```python

    API_Key = "ZIIROPRQCMEREHR8"

    url = "https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol={}&apikey={}"

    stock = "AAPL"

    ```


    在 URL 中，我已经将 `IBM` 符号和 `demo` 替换为 `{}`；稍后，我们将使用 `format()` 方法将我们自己的值插入其中。


    首先，我们需要使用 `requests.get()` 方法向服务器发送请求。我们将传入 `stock` 变量（即 `"AAPL"`）和我们定义的 `API_Key`。Python
    字符串方法 `format()` 使代码更简洁，并且将来可以轻松地将 `"AAPL"` 替换为任何其他股票代码：


    ```python

    data = requests.get(url.format(stock, API_Key))

    ```


    运行代码，`data` 将返回响应 `200`，这意味着一切正常，并且我们成功从 API 获取了信息。正如我之前提到的，Python 库 Requests
    支持不同的数据类型，由于此 API 提供 JSON，我们将使用 `json()` 方法来提取值。你可以直接将 `json()` 链式调用到 `requests.get()`：


    ```python

    data = requests.get(url.format(stock, API_Key)).json()

    ```


    最后，我们从 Alpha Vantage API 收到的数据如图 4-28 所示。


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig28_HTML.jpg](img/506186_1_En_4_Fig28_HTML.jpg)


    **图 4-28** 从 API 接收数据


    ## 探索 API 响应


    JSON 语法类似于 Python 字典。每次我处理新的源数据时，我都会使用 `type()` 函数。将 `data` 传入 `type()`，你会看到 Python
    将其视为字典。


    我们从 API 收到了大量信息，很难直观地识别字典中的键。Python 字典方法 `keys()` 将帮助我们获取所有的键：


    ```python

    data.keys()

    ```


    `keys()` 方法返回了 `dict_keys([''Meta Data'', ''Time Series (Daily)''])`。我们对 `''Meta
    Data''` 不感兴趣，将更仔细地查看 `''Time Series (Daily)''`。`data` 是一个字典，我们可以通过键 `''Time Series
    (Daily)''` 获取值。`Time Series` 是另一个字典，因此我们将再次使用 `keys()` 方法：


    ```python

    data[''Time Series (Daily)''].keys()

    ```


    显然，`data[''Time Series (Daily)'']` 也包含所有作为字典的信息。`keys()` 方法返回了用作键的日期。每个内部字典包含更多带有
    `"AAPL"` 每日值的键。要获取它们，你可以对任何日期应用相同的 `keys()` 方法：


    ```python

    data[''Time Series (Daily)''][''2021-01-08''].keys()

    ```


    每一天都有相同的键集来保存值：


    ```

    dict_keys([''1\. open'', ''2\. high'', ''3\. low'', ''4\. close'', ''5\. adjusted
    close'', ''6\. volume'', ''7\. dividend amount'', ''8\. split coefficient''])

    ```


    如果我想获取 AAPL 股票在 `''2021-01-08''` 的收盘价，我会这样获取它（图 4-29）：


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig29_HTML.jpg](img/506186_1_En_4_Fig29_HTML.jpg)


    **图 4-29** 从转换为 Python 字典的接收数据中访问值


    ```python

    data[''Time Series (Daily)''][''2021-01-08''][''4\. close'']

    ```


    如果你需要从 Alpha Vantage 时间序列 API 中获取所有收盘价，那么可以遍历字典。在这个例子中，我将使用 `dict_of_prices` 作为中间变量，以使代码更简洁、更清晰（图
    4-30）：


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig30_HTML.jpg](img/506186_1_En_4_Fig30_HTML.jpg)


    **图 4-30** 遍历 `dict_of_prices` 字典对象

