- fmt: "As we can see from the definition, the method `upper()` “Return[s] a copy\
    \ of the string converted to uppercase”. Later, we will talk why the method `upper()`\
    \ returns a “copy” of an object. Methods are built-in commands into the object\
    \ itself; that is why we need to use them like this:\n\n```\nseason.upper()\n\
    or\n\"winter\".upper()\n```\n\nMethods are unique to an object. If you run the\
    \ `dir()` function on an integer or a float, you won’t see the `upper()` method.\
    \ That makes sense. Only alphabetical characters can be converted to uppercase.\n\
    \nBeginners always ask me “how would I know which is a function to which I should\
    \ pass an object as an argument, like `len(\"winter\")`, or a method that I need\
    \ to use with a period after an object?” The answer is very simple. You run `dir()`\
    \ on an object, and if what you are looking for is in that list, then it is a\
    \ method, and you should use it with the period, like this:\n\n```\n\"winter\"\
    .lower()\n```\n\nOn the other hand, if it is not in the list, then you cannot\
    \ run it as a method. A very common mistake is to apply a wrong method to the\
    \ object. In that case, Python would give you an error message “`[type]` object\
    \ has no attribute `[name of method]`”. People do that over and over again. Believe\
    \ me there is no need to memorize all methods of an object. Sometimes, it is even\
    \ impossible due to the fact that Python and its extensions are regularly updated.\
    \ All you have to do is to use `dir()` to see all available methods of an object.\n\
    \nIn our previous example with `if` and `else`, we had to use the logical operator\
    \ `or`, in case a user would use a capitalized word. With the `lower()` method,\
    \ we can convert any incoming string to lowercase and not worry that a user might\
    \ use different caps and enter something like `\"suNNy\"`. Keep in mind that we\
    \ would need to save the copy of the lowercase string, meaning to assign to a\
    \ variable name. In Figure 1-26, you can see “BLIZZARD” was entered and converted\
    \ to lowercase on line 3.\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig26_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig26_HTML.jpg)\n\
    \n**Figure 1-26**  \nThe function `lower` converts entered words to lowercase\
    \ strings\n\n## Lists and Tuples\n\nSo far, we have learned integer, float, and\
    \ string types. Here, we will discuss lists and tuples. We will start with the\
    \ most popular data structure – a list. A data structure is some kind of collection\
    \ of items or elements. Most of the time, a data structure contains other basic\
    \ types, like integers or floats. The easiest way to think of data structures\
    \ is to compare them to containers.\n\nA list is a container that holds items\
    \ separated by a comma. There is no limit to the number of items in the list.\
    \ The only limit would be a computer memory.\n\nUsually, I explain a list with\
    \ a box example. A box is a container where you could put stuff. Later, if needed,\
    \ you can fetch items from the box. To initialize a list, we have to assign square\
    \ brackets to a variable. Continuing with a box example, let’s define a variable\
    \ `box` and assign empty square brackets:\n\n```\nbox = []\ntype(box)\n```\n\n\
    You could think of this operation as preparing an empty box to put some stuff\
    \ in. Run the function `type(box)` to confirm that the `box` variable holds a\
    \ list object.\n\nSuppose we needed to add a bunch of numbers to a list object,\
    \ how would we do it? One option would be to google it; however, the best way\
    \ would be to see what methods come with the list itself. Remember the function\
    \ `dir()` from the previous exercise? Run `dir()` and pass a variable holding\
    \ the list object into the function:\n\n```\ndir(box)\n```\n\nThe methods for\
    \ a list object (Figure 1-27) are completely different from a string or any other\
    \ data structure.\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig27_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig27_HTML.jpg)\n\
    \n**Figure 1-27**  \nThe list methods\n\nOur goal is to add numbers one by one\
    \ to the list object. If we take a closer look at the list methods, we would see\
    \ two commands that sound like we can use them to add data to the list. They are\
    \ `append()` and `insert()` in Figure 1-27. If you want to know the difference\
    \ between them and how to use them, run the `help()` function:\n\n```\nhelp(box.insert)\n\
    ```\n\nand\n\n```\nhelp(box.append)\n```\n\nThe main difference between these\
    \ two is that the `append()` method literally appends an item to the end of a\
    \ list. The `insert()` method on the other hand requires not only the item to\
    \ be inserted but also a location in the form of an index. We will review indexing\
    \ later in this chapter, and for that reason we will start with the `append()`\
    \ method. In a cell, try to append random numbers to the list:\n\n```\nbox.append(70)\n\
    box.append(30)\nbox.append(50)\nbox.append(10)\nbox.append(20)\n```\n\nKeep in\
    \ mind that every time you run the cell, you will see the same number appended\
    \ to the list again. I am going to run the cell once. After that operation, my\
    \ list, `box`, holds all numbers I have appended separated by a comma (Figure\
    \ 1-28).\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig28_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig28_HTML.jpg)\n\
    \n**Figure 1-28**  \nThe list of numbers\n\nI hope a box analogy helped you to\
    \ understand how a list object works. Now it is time to give you a more formal\
    \ definition of a list data structure. A list is a sequential data structure that\
    \ can be ordered in ascending or descending order. It is a versatile container.\
    \ You can add items to a list or remove items from a list. The main thing I want\
    \ you to understand about a list data structure is that you do not use a list\
    \ just to store the data.\n\nFor that, you would use a file or would write data\
    \ into a database. But you would choose to use a list because you want to do something\
    \ with the items in the container down the road. For example, you initialize a\
    \ list and append numbers to it because you want to sort them. There is a built-in\
    \ method `sort()` (Figure 1-29):\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig29_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig29_HTML.jpg)\n\
    \n**Figure 1-29**"
