- fmt: 'A data type is similar to a container. You should choose an appropriate data
    type based on how you plan to use your data in the future. “It makes sense with
    water, but how can you save 7, it’s a number,” you might ask me. There are three
    distinct built-in numeric data types in Python: `integer`, `float`, and `complex`
    numbers. Here, we will use integers and floats.


    `Integer`s are whole numbers. For instance, `7`, `27`, `1,000,000` would be stored
    as integers, simply because they are whole numbers. Even a negative number as
    long as it is a whole number would be stored in the memory as an integer.


    `Float`s are numbers with a decimal point. An example would be `7.5` or `-2.5`.
    Based on what you are planning to count, you should choose either an `integer`
    or a `float` type. If we talk about money, then we should use `float`s. People
    always want to be precise to a penny with money. The contradictory of that would
    be people. Assuming that your task is to split seven people into two teams, then
    `integer`s would be an obvious choice. You do not want to end up with three and
    a half people.


    Let’s see how this concept works in practice. Under `x = 7`, add one more statement.
    Do not forget to run the cell afterwards:


    ```

    y = 5.5

    ```


    Since `x` and `y` both hold numeric values, we can do the math. Table [1-1](#506186_1_En_1_Chapter.xhtml#Tab1)
    later in this chapter lists all the arithmetic operators.


    Table 1-1


    Arithmetic operators in Python


    | Operator | Name | Example |

    | --- | --- | --- |

    | + | Addition | `2 + 2` -> `4` |

    | – | Subtraction | `5 – 2` -> `3` |

    | * | Multiplication | `2 * 2` -> `4` |

    | / | Division | `2 / 2` -> `1` |

    | // | Floor division | `5 // 3` -> `1` |

    | % | Modulus (remainder) | `5 % 3` -> `2` |


    ```

    x + y

    ```


    Keep in mind that Python is case sensitive, and `x` and `y` should be lowercase.
    When you run that cell, `12.5` will be the output (Figure [1-6](#506186_1_En_1_Chapter.xhtml#Fig6)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig6_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The output of the `x + y` expression


    This time, I did not use the `print()` command because Jupyter by default prints
    the result of the last operation in a cell. Notwithstanding, if I want to print
    the result of this operation several times, I would need to use the `print()`
    command:


    ```

    print(x + y)

    ```


    When you run the cell, make sure your `print()` command is all lowercase.


    We have been using the `print()` command for quite some time. Now it is time to
    learn other commands. Python is sometimes called “batteries included” because
    it comes with a bunch of built-in commands and modules. The commands are called
    built-in functions. A function is a block of reusable code that performs a task.


    You can find the full list of built-in functions here: [`https://docs.python.org/3/library/functions.html`](https://docs.python.org/3/library/functions.html).
    This is the official Python documentation page. Later when you upgrade to the
    next version of Python at the time it is out, make sure that the documentation
    matches the version you are running on your machine. In this book, we will learn
    and use many of built-in functions. If you are serious about Python, bookmark
    the documentation page to use it as a reference.


    One of my favorite functions you can find on that list is `type()`. The built-in
    function `type()` helps to identify the data type of a value. I’ll illustrate
    how you can use a Python statement in a separate cell and nest a couple statements
    in one cell. If you run the `type()` function in a separate cell, then you don’t
    need a `print()` function. However, if you place


    ```

    print(type(x))

    print(type(y))

    ```


    into the same cell, then you need to wrap each one in a `print()` function (Figure
    [1-7](#506186_1_En_1_Chapter.xhtml#Fig7)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig7_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Running the built-in function `type()`


    You can see that the output for `type(x)` is an integer because `x` holds the
    value of the whole number `7`, and `type(y)` prints a float since `5.5` has a
    decimal point.


    How many cells you should use is totally up to you. Usually, I keep separate tasks
    in separate cells. It would make more sense as we move to more complex tasks.


    In my opinion, `type()` is the most underestimated function. Some people might
    argue why we would need the function `type()`? We can clearly see that `x` holds
    an integer. That is true. But in real life when data is coming from the Internet
    in the form of an API (Application Programming Interface), we will discuss APIs
    later in this book, or you are fetching data from a CSV file, you do not know
    for sure what data type you are dealing with.


    Also, based on my experience, beginners always struggle with and mismatch data
    types. My advice is run the `type()` function on a variable if you are not sure
    what data type it holds.


    Now let’s take a closer look at the `x + y` expression. Suppose we want to save
    the result of that operation so we can use it later. To save `12.5` in Python
    memory, we would need to assign the expression `x + y` to a new variable. Another
    randomly picked variable `total` could hold that result. Try this in a new cell
    (Figure [1-8](#506186_1_En_1_Chapter.xhtml#Fig8)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig8_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Variable `total` holding the result of the `x + y` expression


    ```

    x = 7

    y = 5.5

    total = x + y

    total

    ```


    In some way, it is very convenient to use variable names. Assuming we want to
    calculate the area of a room. To do that, we would need the length of the room
    multiplied by the width. We can implement this formula in Python code (Figure
    [1-9](#506186_1_En_1_Chapter.xhtml#Fig9)):


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig9_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Calculating the area of a room


    ```

    length = 30

    width = 25.5

    area = length * width

    area

    ```


    If we want to calculate the area of the next room in a house, we can just reassign
    the values of `length` and `width` and do not have to touch the formula `length
    * width`.


    We have been using `x` and `y` as variable names. However, in real life you would
    want to use variable names that would reflect the value’s purpose. If you used
    `x`, `y`, and `z` as variables all the time, that would be confusing. Later when
    you get back to the code, say in a couple of weeks, you would have a hard time
    remembering what you actually meant by `x` and `y`. Also, very often you collaborate
    with others. It would be much clearer for everyone if variable names represented
    what information the variable holds. You probably noticed that I do not capitalize
    my variables. The best practice is to begin a variable with a lowercase letter.
    Sometimes, you need to use two words to better describe the purpose of a variable.
    Then use an underscore to connect the two words, such as `length_room`. This style
    is called the snake case. Another option would be to start with a lowercase letter
    and attach the second word capitalized like `lengthRoom`. Such technique is called
    the camel case. No matter what style you choose, always stay consistent and never
    use spaces between words in a variable name.'
