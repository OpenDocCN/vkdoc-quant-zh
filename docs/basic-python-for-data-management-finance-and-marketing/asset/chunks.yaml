    \n## Pandas-Datareader\n\nPopular APIs have wrappers like Pandas-Datareader. A\
    \ wrapper is a small program usually designed to make the process of working with\
    \ data seamless. Pandas-Datareader unifies the mechanism of accessing information\
    \ from Yahoo Finance, Google, NASDAQ, Federal Reserve Economic Data, and many\
    \ others. The full list of data providers can be found in the Pandas-Datareader\
    \ documentation. As the name implies, Pandas-Datareader works with Pandas and\
    \ returns received information in the form of a DataFrame.\n\nInitially designed\
    \ as a part of Pandas to receive remote financial and economic data, Pandas-Datareader\
    \ was a spin-off and now is a stand-alone Python package. We need to install it\
    \ separately in Anaconda Navigator ➤ Environments ➤ Terminal using a `pip` command:\n\
    \n```\npip install pandas-datareader\n```\n\nMost of Pandas-Datareader data sources\
    \ can be accessed via the `DataReader()` function. To see `DataReader()` in action,\
    \ open a new **Jupyter** Notebook and import Pandas and Pandas-Datareader:\n\n\
    ```python\nimport pandas as pd\nimport pandas_datareader.data as web\n```\n\n\
    For starters, we will get historic prices for IBM stock from Yahoo Finance. Yahoo\
    \ Finance requires no registration, and all we need is to pass a stock symbol,\
    \ source of data, and time range:\n\n```python\nstock_price = web.DataReader('IBM',\
    \ 'yahoo', '2020-01-01','2021-01-15')\n```\n\nDates for start and end days shall\
    \ be passed into the function either as strings or datetime objects. The first\
    \ argument `'IBM'` can be replaced with any other valid stock symbol. `DataReader()`\
    \ returns prices in a DataFrame format, and you can apply Pandas functions and\
    \ methods to the `stock_price` object:\n\n```python\nstock_price.head()\n```\n\
    \n`DataReader()` connects to the Yahoo service, and it may take time to get a\
    \ response (Figure 4-33).\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig33_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig33_HTML.jpg)\n\
    \n**Figure 4-33** Receiving data from Yahoo Finance with the `DataReader()` function\n\
    \nThe Investors Exchange (IEX) is another popular data source that would work\
    \ with `DataReader()`. The Investors Exchange provides tons of data for individual\
    \ and professional accounts on a paid basis. Here, we will use a free account\
    \ to illustrate how to use an API Key in a `DataReader()` function and get access\
    \ to IEX. You can register and claim your API Key on the IEX cloud platform at\
    \ [https://iexcloud.io](https://iexcloud.io). Upon registering, you’ll get access\
    \ to API tokens. Define an `API_Key` as a string and pass it as the last argument\
    \ in `DataReader()`:\n\n```python\nAPI_Key = 'pk_1386c11694f7887a90694cd588149'\n\
    msft_prices = web.DataReader('MSFT', 'iex', '2020-01-01','2021-01-15', api_key=API_Key)\n\
    ```\n\nThe API Key I use here is just an example and not a valid token.\n\n`'iex'`\
    \ is a data source argument you have to use for connection to the Investors Exchange.\
    \ The prices we have received are stored as DataFrame under the variable `msft_prices`\
    \ (Figure 4-34).\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig34_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig34_HTML.jpg)\n\
    \n**Figure 4-34** Receiving data from the Investors Exchange with the `DataReader()`\
    \ function\n\nBesides the stock market prices, Pandas-Datareader provides access\
    \ to economic indicators from FRED (Federal Reserve Bank of St. Louis). Let’s\
    \ take a look at two most important indicators: Gross Domestic Product (GDP) and\
    \ Total Nonfarm Payrolls.\n\nFRED provides GDP numbers starting from 1947, and\
    \ we can get them with the same `DataReader()` function. All we have to do is\
    \ to pass the symbol `'A191RL1Q225SBEA'` and change the source to `'fred'`. The\
    \ symbols for economic indices can be found on the FRED website at [https://fred.stlouisfed.org](https://fred.stlouisfed.org).\
    \ Usually, the symbol comes right after the indicator title (Figure 4-35).\n\n\
    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig35_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig35_HTML.jpg)\n\
    \n**Figure 4-35** Real Gross Domestic Product information on [https://fred.stlouisfed.org](https://fred.stlouisfed.org)\n\
    \n```python\ngdp = web.DataReader('A191RL1Q225SBEA', 'fred', '1947-04-01', '2021-01-15')\n\
    ```\n\nWe can plot the data with the method `plot.line()` and add a title as an\
    \ argument (Figure 4-36).\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig36_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig36_HTML.jpg)\n\
    \n**Figure 4-36** Plotting Gross Domestic Product received from the FRED source\
    \ with the `DataReader()` function\n\nSimilar to GDP, we can plot Total Nonfarm\
    \ Payrolls. The symbol for Total Nonfarm Payrolls is `PAYEMS`. We will fetch the\
    \ maximum available information with the start date `'1939-01-01'` up to December\
