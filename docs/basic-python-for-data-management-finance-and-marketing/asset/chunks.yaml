    \n图 6-8  \n绘制历史股票收益率\n\n```\nreturn.hist()\n```\n\nPandas `Series` 有一个 `describe()`\
    \ 方法。`describe()` 方法只能应用于 `Series` 或持有数值的 `DataFrame` 列：\n\n```\nreturn.describe()\n\
    ```\n\n图 6-9 显示了 `describe()` 方法计算的股票收益率统计度量。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig9_HTML.jpg](img/506186_1_En_6_Fig9_HTML.jpg)\n\
    \n图 6-9  \n`describe()` 方法返回统计度量\n\n将 `describe` 方法应用于历史收益率后，我们可以看出数据集的 `mean`（均值）在哪里，以及\
    \ `std`（标准差）的离散程度有多大。`Min` 和 `max` 值指示了数据集的边界。此外，我们还可以看到 `25%`、`50%` 和 `75%` 的百分位数。`describe()`\
    \ 方法是一个非常有用的工具，可以快速获取任意数值数据集的统计度量。\n\n对于我们的 VAR 计算，我们需要投资组合的均值和标准差。我们可以从 `describe()`\
    \ 方法中获取均值：\n\n```\nreturn.describe().loc[\"mean\"]\n```\n\n或使用专门的 `mean()` 方法：\n\
    \n```\nmean_return = return.mean()\n```\n\n投资组合的标准差或波动率需要每对股票之间的协方差。在 Pandas 中，我们可以使用\
    \ `cov()` 函数在收益率上创建一个协方差矩阵：\n\n```\ncovar = return.cov()\n```\n\n图 6-10 显示了我们用于获取投资组合波动率的协方差矩阵。\n\
    \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig10_HTML.jpg](img/506186_1_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10  \n协方差矩阵\n\n此外，我们还需要投资组合中每只股票的百分比。为简化此示例，我们假设投资组合总美元价值的 50% 投资于微软，25%\
    \ 投资于苹果，25% 投资于 IBM。这个假设必须保存在 NumPy 数组中：\n\n```\nweights = np.array([0.5,0.25,0.25])\n\
    ```\n\nNumPy 数组可以被视为一个向量。此外，NumPy 数组用作 `Series` 和 `DataFrame` 的核心。这意味着我们可以推导出点积或从向量中得到单个数值。\n\
    \n变量 `mean_return` 持有三只股票历史收益率的均值，我们需要使用 `dot()` 方法再次将它们按投资组合股票百分比归一化：\n\n```\n\
    portfolio_mean = mean_return.dot(weights)\n```\n\n标准差是方差的平方根，我们可以使用 NumPy 的 `sqrt()`\
    \ 方法获取：\n\n```\nvolatility = np.sqrt(weights.T.dot(covar).dot(weights))\n```\n\
    \n大写字母 `T` 是一个转置方法；它改变了向量或矩阵的相对位置。如果您对数组、`Series` 或 `DataFrame` 运行 `dir()`，它总是列表中的第一个。\n\
    \n此外，均值和标准差需要根据投资组合的总价值进行计算。此处，我们假设投资组合的总价值为 1,000,000 美元：\n\n```\nportfolio_value\
    \ = 1000000\ninvestment_mean = (1 + portfolio_mean) * portfolio_value\ninvestment_volatility\
    \ = portfolio_value * volatility\n```\n\n当我们掌握所有必要的数值后，我们可以计算正态累积分布的反函数。为此，我们需要\
    \ SciPy（科学 Python）包中的 `ppf()`（百分点函数）。SciPy 包含在 Anaconda 中，我们只需要在文件开头导入它：\n\n```\n\
    import scipy.stats as scs\n```\n"
- fmt: "`ppf()`方法使用默认均值0和标准差1（标准正态分布的参数）。我们将用`investment_mean`和`investment_volatility`覆盖这些默认值。\n\
    \n风险管理者需要将置信水平传入`ppf()`；通常置信水平为95%：\n\n```\nconfidence = 95\nnormsinv = scs.norm.ppf((1-95/100),\
    \ investment_mean, investment_volatility)\n```\n\n最后一步是从投资组合价值中减去正态累积分布的逆：\n\n\
    ```\nvar = portfolio_value – normsinv\n```\n\n将结果四舍五入到小数点后两位：\n\n```\nnp.round(var,2)\n\
    ```\n\n最终结果为25088.94（图[6-11](#506186_1_En_6_Chapter.xhtml#Fig11)）。经过所有这些计算，我们可以以95%的置信度说，一个持有MSFT、AAPL和IBM股票、当前市值为100万美元的投资组合，一天内可能损失25088.94美元。\n\
    \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig11_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig11_HTML.jpg)\n\
    \n图6-11 风险价值计算\n\n如果需要预测五天的VAR，可以将一天的VAR乘以天数的平方根。\n\n我们将`var * np.sqrt(day)`表达式放入一个遍历天数范围的for循环中。初始化一个空列表来存储结果，然后绘制它们：\n\
    \n```\nvar_results = []\nnumber_of_days = 5\ndays_list = list(range(1, number_of_days+1))\n\
    for day in days_list:\n    result = var * np.sqrt(day)\n    var_results.append(result)\n\
    ```\n\n由于`range()`函数中停止点是排他的，因此需要将`number_of_days`加1。\n\n最后，我们绘制`var_results`：\n\
    \n```\nplt.plot(days_list, var_results)\nplt.title(\"Value at Risk\")\nplt.ylabel(\"\
    Portfolio loss\")\nplt.xticks(days_list, [\"1st day\", \"2nd day\", \"3rd day\"\
    , \"4th day\", \"5th day\"])\nplt.grid()\n```\n\n我们可以看到损失在五天内翻倍（图[6-12](#506186_1_En_6_Chapter.xhtml#Fig12)）。\n\
    \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig12_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig12_HTML.jpg)\n\
    \n图6-12 预测五天的VAR\n\n## 蒙特卡洛模拟\n\n使用相同的历史股价，我们可以预测投资组合的表现，并通过蒙特卡洛模拟技术模拟可能的结果。蒙特卡洛方法是为投资组合的预期收益和预期波动率生成随机结果，就像反复掷骰子一样。\n\
    \n为了保存预期收益和预期波动率的结果，我们需要初始化两个列表：\n\n```\nmc_return = []\nmc_volatility = []\n\
    ```\n\n随机改变投资组合中每个头寸的百分比，我们将计算预期收益和预期波动率。NumPy函数`random()`会生成形状为数组的随机数。数组的大小和维度取决于传递给它的参数。在我们的案例中，需要一个与投资组合中头寸数量匹配的数组。\n\
    \n我们在示例开头使用的`portfolio`列表当前包含三只股票。未来我们可能会添加更多股票，因此将列表长度存储在`num_assets`变量下是很明智的：\n\
    \n```\nnum_assets = len(portfolio)\nfor roll in range(5000):\n    weights = np.random.random(num_assets)\n\
    \    weights /= np.sum(weights)\n    mc_return.append(np.sum(mean_return * weights)\
    \ * 252)\n    mc_volatility.append(np.sqrt(np.dot(weights.T, np.dot(covar * 252,\
    \ weights))))\n```\n\n在for循环的每次迭代中，`random()`方法都会生成投资组合中资产的随机权重。所有资产的总百分比必须始终恰好为100%；这就是为什么我们将`weights`除以`weights`的`sum()`。接下来，我们生成预期收益和波动率，并按一年中的交易日数对结果进行归一化（图[6-13](#506186_1_En_6_Chapter.xhtml#Fig13)）。\n\
    \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig13_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig13_HTML.jpg)\n\
    \n图6-13 对股票投资组合运行蒙特卡洛模拟\n\n我们将以散点图的形式绘制结果，但在此之前，需要将`mc_return`和`mc_volatility`列表转换为NumPy数组：\n\
    \n```\nexpected_return = np.array(mc_return)\nexpected_volatility = np.array(mc_volatility)\n\
    ```\n\n最后，我们绘制`expected_return`和`expected_volatility`：\n\n```\ncolor = expected_return\
    \ / expected_volatility\nplt.figure(figsize=(12, 8))\nplt.scatter(expected_volatility,\
    \ expected_return, c=color, marker='o')\nplt.grid()\nplt.title(\"Monte Carlo simulation\"\
    )\nplt.xlabel('Expected volatility')\nplt.ylabel('Expected return')\nplt.colorbar(label=\"\
    Sharpe ratio\")\nplt.show()\n```\n\nMatplotlib的`show()`方法是可选的。我将其包含在内，以防你想在Matplotlib的`\"\
    notebook\"`模式下运行代码，或使用操作系统生成图表。\n\n此示例是对哈里·马科维茨现代投资组合理论的说明[^(14)](#fn14)。你希望获得的投资回报越高，预期的波动率就应越大（图[6-14](#506186_1_En_6_Chapter.xhtml#Fig14)）。\n\
    \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig14_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig14_HTML.jpg)\n\
    \n图6-14 绘制蒙特卡洛模拟结果\n\n图[6-14](#506186_1_En_6_Chapter.xhtml#Fig14)中的曲线连接了所有最有效的结果——风险与回报的最优组合，它被称为有效前沿。\n\
    \n## 有效前沿\n\n前面的示例已经证明，你可以从零开始构建任何统计或金融模型。然而，如果你过于忙碌并需要一个开箱即用的解决方案，有一个专业的Python包`PyPortfolioOpt`实现了投资组合优化方法，包括有效前沿技术和其他风险管理解决方案[^(15)](#fn15)。`PyPortfolioOpt`带有内置的风险模型和绘图功能。不幸的是，目前`PyPortfolioOpt`不是Anaconda包的一部分，我们需要使用`pip`命令来安装它。我们已经多次经历过安装过程，我相信现在你已经知道在哪里找到终端，请运行：\n\
    \n```\npip install pyportfolioopt\n```\n\n我们将使用`PyPortfolioOpt`为我们的投资组合找到有效前沿。对于下面的示例，你需要打开一个新的**Jupyter**\
    \ Notebook，并从`PyPortfolioOpt`导入以下函数：\n\n```\nimport pandas as pd\nimport pandas_datareader.data\
    \ as web\nfrom pypfopt.efficient_frontier import EfficientFrontier\nfrom pypfopt.cla\
    \ import CLA\nfrom pypfopt import plotting\nfrom pypfopt.plotting import plot_weights\n\
    from pypfopt import risk_models\nfrom pypfopt import expected_return\n```\n\n\
    我会在示例中解释所有导入的函数。我们的目标是生成并绘制投资组合的有效前沿。同时，使用由Marcos Lopez de Prado和David Bailey实现的临界线算法来寻找最优投资组合[^(16)](#fn16)。\n\
    \n我们将沿用前一个示例中的相同投资组合，并且由于我们在不同的notebook中，我们需要再次获取历史价格。同时，请随意使用你喜欢的股票，或向默认列表中添加更多股票：\n\
    \n```\nportfolio = [\"MSFT\", \"AAPL\", \"IBM\"]\nprices = pd.DataFrame()\nfor\
    \ stock in portfolio:\n    prices[stock] = web.DataReader(stock, 'yahoo', '2017-01-01',\
