    在图 [3-2](#506186_1_En_3_Chapter.xhtml#Fig2) 中，我们可以看到 `Pandas Series`，这是一种一维数据结构，或者简单地说是容器。`Series`
    的左侧是索引。索引是默认提供的。索引的概念借鉴自关系数据库。在关系数据库中，每条记录都有一个主键。主键是唯一的标识符。使用键，你可以获取一个值。`Series`
    使用了相同的方法。但是，在 `Series` 中，作为连接数据集的结果，你可能会得到重复值。当我们学到连接操作时，会讨论这一点，并解释如何处理重叠的索引值。在此期间，我们可以通过索引来获取值：


