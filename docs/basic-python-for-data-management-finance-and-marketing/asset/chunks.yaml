    \n```\nmu = expected_return.mean_historical_return(prices)\n```"
  raw: "The `ppf()`\nmethod  uses\ndefault values for the mean, 0, and standard deviation,\
    \ 1, which are\nstandard for a normal bell distribution. We will overwrite them\
