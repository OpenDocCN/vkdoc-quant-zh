- fmt: 'Suppose we need to fetch the row for `MSFT` out of the `portfolio` DataFrame.
    `MSFT` is a label of an index value. The underlying index value is `2`. The index
    count starts at 0. `IBM` is `0`, `ORCL` is `1`, and `MSFT` is `2`. If we want
    to use labels, then the `loc` statement would look like this:


    ```

    portfolio.loc["MSFT"]

    ```


    Consequently, `iloc` would require an integer for the index and would get you
    the same result with this statement:


    ```

    portfolio.iloc[2]

    ```


    Compared to other DataFrame methods, `loc` and `iloc` use square brackets (Figure
    [3-21](#506186_1_En_3_Chapter.xhtml#Fig21)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig21_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig21_HTML.jpg)


    **Figure 3-21** Methods `loc` and `iloc` fetch the `MSFT` row


    The Python slicing principle could be applied to a DataFrame with `loc` and `iloc`
    methods. The only difference is the method `loc` with labels would include a stop
    position. In the `iloc` method, the stop index is excluded. That is why fetching
    two rows for `ORCL` and `MSFT` would have `MSFT` as a stop in the `loc` variant
    and would require an upper limit for a numeric index value in the `iloc` expression
    (Figure [3-22](#506186_1_En_3_Chapter.xhtml#Fig22)):


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig22_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig22_HTML.jpg)


    **Figure 3-22** Slicing rows with `loc` and `iloc` methods


    ```

    portfolio.loc["ORCL":"MSFT"]

    portfolio.iloc[1:3]

    ```


    In real life, a DataFrame might have thousands of columns, and you might need
    to get just a subset of data. Subsetting on a DataFrame would need indices for
    rows and columns separated by a comma. Rows would always come first. The `iloc`
    method is similar to the Python slicing notation syntax:


    ```

    [start : stop : step , start : stop : step]

    ```


    As in Python, the step is optional and by default is set to `1`. As a reminder,
    the `loc` method takes labels for the index and columns.


    We can get the values from `Price` and `Qty` columns for `ORCL` and `MSFT` essentially
    as:


    ```

    portfolio.loc["ORCL":"MSFT", "Price":"Qty"]

    portfolio.iloc[1:3, 0:2]

    ```


    In Figure [3-23](#506186_1_En_3_Chapter.xhtml#Fig23), you can see that both methods
    yield the same result.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig23_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig23_HTML.jpg)


    **Figure 3-23** Subsetting with `loc` and `iloc` methods


    Another option would be to slice the columns first and then apply `loc` or `iloc`.
    For instance, getting values for `MSFT` and `AAPL` out of `Price` and `Profit`
    columns would be equal to these statements:


    ```

    portfolio[["Price", "Profit"]].loc["MSFT":"AAPL"]

    portfolio[["Price", "Profit"]].iloc[2 : ]

    ```


    We are leaving the stop index blank in the `iloc` method since we want to get
    all rows after index 2 (Figure [3-24](#506186_1_En_3_Chapter.xhtml#Fig24)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig24_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig24_HTML.jpg)


    **Figure 3-24** Subsetting on columns with `loc` and `iloc` methods


    ### Filtering a DataFrame


    The filtering process is more efficient in Pandas than what we have done so far
    with a `for` loop and `if` statements. We will start with a simple example. Our
    goal is to filter the `portfolio` DataFrame and identify all stocks priced less
    than $100.00.


    The first step would be to grab the column `Price` either using the dictionary
    notation `portfolio["Price"]` or `portfolio.Price` and define a condition:


    ```

    portfolio.Price < 100

    ```


    If you run this statement, it will return Boolean values (Figure [3-25](#506186_1_En_3_Chapter.xhtml#Fig25)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig25_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig25_HTML.jpg)


    **Figure 3-25** Defining a condition for a filter


    The filter is working, but obviously we need more information and the stock itself.
    One option would be to apply the filter to the whole DataFrame. This option will
    fetch you the whole row:


    ```

    portfolio[portfolio.Price < 100]

    ```


    Another option would be to apply the condition to a particular column or columns.
    Specifically, if we want to see how many shares we hold of stocks that are priced
    less than a hundred, we need to slice the `Qty` column and apply the filter:


    ```

    portfolio.Qty[portfolio.Price < 100]

    ```


    This would be an example of filtering one column based on another one. As you
    can see in Figure [3-26](#506186_1_En_3_Chapter.xhtml#Fig26), the first statement
    has retrieved the whole row, and the second filter gets just one value.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig26_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig26_HTML.jpg)


    **Figure 3-26** Filtering a DataFrame


    There is no need to iterate through values and use `if` and `else` statements.
    Also, we can combine conditions as we did before with conditional operators. In
    Pandas, `&`, ampersand, is the equivalent of the `and` operator in Python. When
    you use `&`, both conditions have to be `True` to return the result. Suppose we
    need to find all stocks that are priced less than $200, and the number of shares
    is exactly 50 in the `portfolio` DataFrame. Then we can couple two conditions
    as:


    ```

    (portfolio.Price < 200) & (portfolio.Qty == 50)

    ```


    And apply the filter to the DataFrame:


    ```

    portfolio[(portfolio.Price < 200) & (portfolio.Qty == 50)]

    ```


    Please note that each condition must be wrapped in the round brackets. Apparently,
    only one position in `portfolio` fully satisfied these two conditions (Figure
    [3-27](#506186_1_En_3_Chapter.xhtml#Fig27)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig27_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig27_HTML.jpg)


    **Figure 3-27** Filtering a DataFrame based on two conditions


    Another conditional operator in Pandas is `|`. It is pronounced a toll bar. The
    equivalent of the `or` operator in Python, `|` would filter if either one of the
    conditions is `True`. We can filter the DataFrame and filter all positions where
    the price is greater than $200 or the cost is exactly $55. We need to outline
    each of the conditions first in parentheses and using `|` apply them to the `portfolio`
    object:


    ```

    portfolio[(portfolio.Price > 200) | (portfolio.Cost == 55)]

    ```


    As we can see in Figure [3-28](#506186_1_En_3_Chapter.xhtml#Fig28), two positions
    fit into our filter – `ORCL` because its `"Cost"` value is precisely 55 and `MSFT`
    with a price greater than 200.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig28_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig28_HTML.jpg)


    **Figure 3-28** Filtering a DataFrame where either one of the conditions is true


    Filtering is very useful, but what if you want to do something to a value based
    on a condition?'
