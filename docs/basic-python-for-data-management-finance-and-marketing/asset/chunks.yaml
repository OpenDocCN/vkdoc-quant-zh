    of `tally`. After five repetitions, the value of `tally` will be 5, and the condition
    `tally < 5` will return `False`. The loop will exit (Figure [2-17](#506186_1_En_2_Chapter.xhtml#Fig17)).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig17_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    A while loop exits if the condition is no longer true


    The key element of a `while loop` is the condition. The condition has to change
    at some point to exit the loop.


    We can use a `while loop` in the Pig Latin example. The function `main()` validates
    an entered word. If a string contains anything besides alphabetic characters,
    the code is redirected to `"Invalid input, please try again"`, and the program
    stops. In reality, we do not want to give up on a user who accidentally entered
    an invalid word. Using a `while loop`, we would ask them to try again. Instead
    of `if` and `else` statements, we will use a `while` loop. The program will be
    asking a user to enter a word until the right format would be entered. I will
    add another `print` statement with a hint that only alphabetic characters can
    be used:


    ```

    def main():

    word = input("give me a word ")

    while not word.isalpha() and len(word) > 1:

    print("Invalid input, please try again")

    print("You can use alphabetic-characters only ")

    word = input("give me a word ")

    word = word.lower()

    result = game(word)

    return result

    ```


    The keyword `not` after `while` makes `word.isalpha() and len(word) > 1` filters
    `False`. This statement literally says `while False`. The `while loop` will be
    executing `print` statements and asking for `input` over and over again till a
    user gets it right. However, if a user enters a word that can be used, then the
    `while` statement will not be executed at all, and the code will go to the `word
    = word.lower()` line. `word = word.lower()` and `result = game(word)` statements
    are outside of the `while loop`. They will be executed in two cases. The first
    case would be if the `while loop` never gets triggered. The second situation would
    be if the `while loop` was executed and then terminated.


    As you can see, there is a conceptual difference between a `while loop` and a
    `for loop`. The `while loop` heavily depends on a condition. The `for loop` contrarily
    iterates for every item in a sequence.'
  trans: '

    我们会在一个单独的函数中请求用户输入。为此，我们将定义一个函数并将其命名为 `main`。在实际场景中，我们需要验证用户的输入。我们必须确保输入不含数字或其他非字母字符，并且输入的长度大于一个字母。英语中没有只有一个字母的单词，除了
    `a` 和 `I`。如果输入验证成功，我们会将其传递给函数 `game`。经过处理后，函数 `game` 会返回一个 Pig Latin 单词，我们再将结果呈现给用户。如果用户的输入未通过我们的过滤器，我们将返回
    `"Invalid input, please try again"`。由于 `is_vowel` 只能处理小写字母，我们需要在调用函数 `game` 之前将接收到的单词转换为小写：


    ```

    def main():

    word = input("give me a word ")

    if word.isalpha() and len(word) > 1:

    word = word.lower()

    result = game(word)

    else:

    result = "Invalid input, please try again"

    return result

    ```


    你可以在图 2-16 中看到 Pig Latin 游戏的最终实现。当我们在底部调用函数 `main` 时，它会提示我们输入一个单词。如果第 32 行的过滤器返回
    `True`，则会在第 34 行调用函数 `game`。用户输入转换为小写后作为参数传递给 `game`，并赋值给参数 `word`。在第 15 行，`is_vowel`
    会被第一个字母调用。对于单词 `"dog"`，`is_vowel` 返回 `False`，程序会转到 `else` 语句。第二次迭代后，函数 `is_vowel`
    再次被调用，这次使用的是字母 `"o"`。从 `is_vowel` 函数接收到 `True`，使得代码执行第 20-22 行。新单词在第 22 行保存为变量
    `result`。最后，函数 `game` 在第 24 行返回 Pig Latin 单词。`game` 函数的输出结果在第 34 行被保存，并在第 37 行由
    `main` 函数返回。


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig16_HTML.png](img/506186_1_En_2_Fig16_HTML.png)


    **图 2-16** Pig Latin 游戏的重构代码


    有些人可能会问，为什么像 Pig Latin 游戏这样简单的任务需要这么多函数。答案是每个函数都有自己的用途，并负责一项工作。`is_vowel` 是一个辅助函数，只回答一个问题：一个字母是否是元音。如果需要，我们可以导出这个函数并在另一个文件中使用。函数
    `main` 负责所有与用户的交互。如果后来你需要修改输入语句中的消息，可以轻松完成，而无需改动 `game` 函数。与用户通信是一个完全独立的任务，和 Pig
    Latin 代码无关。如果我们决定在程序中添加更多单词游戏，`main` 函数将是添加菜单并向用户询问想玩哪个游戏的正确位置。


    ## 不定循环


    Python 中有定循环和不定循环。我们已经学习了定型的 `for` 循环；现在该看看 `while` 循环了，这是一种不定循环。正如你可能从名字中猜到的，我们不知道
    `while` 循环会迭代多少次。关键字 `while` 后面需要紧跟一个条件。如果条件返回 `True`，那么 `while` 循环就会执行其作用域内的语句。执行完毕后，`while`
    循环会再次检查条件。如果条件仍然成立，它会再次迭代。然而，如果条件返回 `False`，`while` 循环就会退出。最简单的例子是工作时间。伪代码可能如下所示：


    ```

    while not 6.00pm

    keep working

    ```


    如果还没到下午 6:00，我们就会继续工作。一小时后再检查时间是否是下午 6:00。如果不是，则继续工作。到了某个时刻，`while` 条件不再为真，因为已经过了下午
    6:00。我们就可以跳出循环，停止工作。主要规则是条件应当在某个时刻变为 `False`。否则，你最终会陷入无限循环。在现实生活中，这可能是一场灾难。


    我们可以像这样构建一个简单的 `while` 循环：


    ```

    tally = 0

    while tally < 5:

    tally = tally + 1

    print(tally)

    ```


    在运行这段代码之前，请确保在 `while` 循环的每次迭代中都将 `tally` 增加 1。如果不小心跳过了这条语句，你的 `while` 循环将会一遍又一遍地打印
    0。这就是一个无限循环的例子。要退出无限循环，你需要通过点击 `Jupyter` 上方菜单中的停止按钮来中断内核。


    `while` 循环中的 `tally = tally + 1` 语句会增加 `tally` 的值。五次重复之后，`tally` 的值将会是 5，条件 `tally
    < 5` 将返回 `False`。循环将退出（图 2-17）。


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig17_HTML.jpg](img/506186_1_En_2_Fig17_HTML.jpg)


    **图 2-17** 当条件不再为真时，while 循环退出


    `while` 循环的关键要素是条件。条件必须在某个时刻发生变化以退出循环。


    我们可以在 Pig Latin 示例中使用 `while` 循环。函数 `main()` 验证输入的单词。如果字符串包含字母字符以外的任何内容，代码会重定向到
    `"Invalid input, please try again"`，程序停止。实际上，我们不想放弃一个不小心输入了无效单词的用户。使用 `while`
    循环，我们会要求他们再试一次。我们将使用 `while` 循环，而不是 `if` 和 `else` 语句。程序会一直要求用户输入单词，直到输入正确的格式。我会添加另一个带有提示的
    `print` 语句，说明只能使用字母字符：


    ```

    def main():

    word = input("give me a word ")

    while not word.isalpha() and len(word) > 1:

    print("Invalid input, please try again")

    print("You can use alphabetic-characters only ")

    word = input("give me a word ")

    word = word.lower()

    result = game(word)

    return result

    ```


    `while` 后面的关键字 `not` 使得 `word.isalpha() and len(word) > 1` 过滤器返回 `False`。这条语句实际上表示
    `while False`。`while` 循环会一遍又一遍地执行 `print` 语句并请求 `input`，直到用户输入正确。但是，如果用户输入了一个可用的单词，那么
    `while` 语句根本不会被执行，代码会转到 `word = word.lower()` 这一行。`word = word.lower()` 和 `result
    = game(word)` 语句位于 `while` 循环之外。它们会在两种情况下被执行。第一种情况是 `while` 循环从未被触发。第二种情况是 `while`
    循环被执行然后终止。


    正如你所见，`while` 循环和 `for` 循环之间存在概念上的区别。`while` 循环严重依赖于一个条件。相反，`for` 循环会针对序列中的每一项进行迭代。

