    \ with the same tags.\n\nNow, highlight all lines of the poem on the web page\
    \ in a browser, click\nthe right button, and inspect selected lines. You can see\
    \ that all of\nthe lines in the Chrome Developer Tools window are surrounded with\n\
    <a> tags. The method find_all() with <a> tags as a first\nargument will get a\
    \ list of all those lines. Remember find_all always\nreturns a list even if it\
    \ does not find anything.\n\n```\nalist = data.find_all(\"a\")\n```\n\nIn Figure\
    \ [4-4](#506186_1_En_4_Chapter.xhtml#Fig4), you can see\nthat we have fetched\
    \ all the lines wrapped in <a> tags.\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig4_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4\nText elements\nwith HTML <a> tags\n\nThe fetched lines in the list\
    \ have <a> tags and href (Hypertext\nREFerence). We need to remove tags and other\
    \ attributes off the text. In\nthe BeautifulSoup library, there is a method get_text()\
    \ to extract\nstrings out of <> tags. We would need to apply it to each item in\n\
    alist to get clean text.\n\n```\nfor item in alist:\nprint(item.get_text())\n\
    ```\n\nWhat if we need to grab a particular line from the web page? For\ninstance,\
    \ “From forth the fatal loins of these two foes” text from the\nwhole poem. The\
    \ first step would be to highlight the text and inspect it\nin HTML code (Figure\
    \ [4-5](#506186_1_En_4_Chapter.xhtml#Fig5)).\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig5_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5\nLocating and inspecting a line from\nthe text in Chrome\n\nThe second\
    \ step would be to investigate the element in Chrome Developer\nTools, right side\
    \ in Figure [4-5](#506186_1_En_4_Chapter.xhtml#Fig5), and find the\nhooks we can\
    \ use to fetch the text. The text `\"From forth the fatal loins of these two foes\"\
    ` is surrounded by `<a>` tags and\nhas an attribute `name=5`. Again, we do\nnot\
    \ need to know what `name=5` means.^([⁶](#fn6)) This is some attribute used\n\
    for something by a developer who built the website. All we care is a\ncombination\
    \ that would be unique to the text we want to get. If we used\njust a tag in `find()`,\
    \ then it would\nget us the first element wrapped in the `<a>` tags. Fortunately,\
    \ `name=5` is unique to\nthe line of the text we need. Using the `find()` method,\
    \ we\nwill pass the `<a>` tag as a\nfirst argument, because `\"From forth the\
    \ fatal loins of these two foes\"` begins with it, and as a second argument, we\n\
    will pass `name=5`. Attributes\nshould be passed in the form of a dictionary like\
    \ this:\n\n```\nelement  = data.find(\"a\", {\"name\":5} )\n```\n\nWe have fetched\
    \ the text and have cleaned it with the `get_text()`\nmethod  (Figure\n[4-6](#506186_1_En_4_Chapter.xhtml#Fig6)).\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig6_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6\nGetting the line of the text by using the find() method and HTML\n\
    attributes\n\nAs you have seen, the whole web scraping process in a nutshell consists\n\
    of the following steps:\n\n1.  Get the data from a server with the Requests method\
    \ `get()`.\n\n2.  Pass the received data into the `BeautifulSoup()`\n    function;\
    \ it parses data as an object looking like an HTML web\n    structure.\n\n3. \
    \ In a browser, inspect the element you need to grab.\n\n4.  Using `find()`\n\
    \    or `find_all()`,\n    fetch the text with hooks like tags and attributes.\n\
    \nNow that we have learned the essential steps of web scraping, we can\ntake on\
    \ a popular website [investing.​com](http://investing.com). Investing.com provides\n\
    important news that every trader needs to know before the trading day\nstarts.\
    \ The URL to the news page is [`www.investing.com/news/`](http://www.investing.com/news/).\n\
    If you open that page in a browser, you can see news titles and short\nteasers.\
    \ Click a title and it will take you to the full article. We will\nstart collecting\
    \ titles and hrefs (Hypertext REFerence) so we could\naccess the full article\
    \ later. Href is just a URL that leads somewhere.\nThey are also called web\n\
    links.\n\nFirst things first, we need to fetch the website. Start with imports:\n\
    \n```\nimport requests\nfrom bs4 import BeautifulSoup\n```\n\nBear in mind that\
    \ most of the websites do not want to provide\ninformation to the bots. The `requests.get()`\n\
    method  sends a\nmessage to a server, and the message kind of saying `\"Hi, I\
    \ am Python\"`,\nand the website does not want to respondse to Python bot. To\
    \ go around\nit, we’ll make our request for information look like it comes from\
    \ a web\nbrowser. That is quite simple; all we have to do is to provide different\n\
    headers in a message to a server:\n\n```\nheaders={'User-agent' : 'Mozilla/5.0'}\n\
    ```"
  trans: "\nBeautifulSoup 会将从服务器接收到的所有数据重新创建为 HTML 标记。请注意，它实际上不会是 HTML，而是一个看起来像 HTML\
    \ 结构的字符串对象。BeautifulSoup 也是 Anaconda 的一部分，我们只需将其与 `Requests` 一起导入即可。回到上一个单元格，在\
    \ `Requests` 之后立即导入它。不要忘记重新运行该单元格。\n\n```\nfrom bs4 import BeautifulSoup\n```\n\
    \n`bs4` 是该包的缩写名称，而 `BeautifulSoup` 是我们将用来生成一个看起来像 HTML 结构的对象的函数。将来自服务器的内容作为 `page.content`\
    \ 传递给该函数，并将其解析为 HTML：\n\n```\ndata = BeautifulSoup(page.content, \"html.parser\"\
    )\n```\n\n打印 `data`，你会看到一个看起来像 HTML 代码的对象（图 4-2）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig2_HTML.jpg](img/506186_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2** BeautifulSoup 将从服务器获取的数据解析为 HTML 标记\n\n你不需要精通 HTML 就能进行网页抓取。不过，我会给你一个速成课程。网页上渲染的每个元素都必须包裹在\
    \ `<>` 标签中。在图 4-2 靠近底部的位置，你可以找到 `<h3>PROLOGUE</h3>`。`h` 表示标题，而 `3` 是字体大小。切换回网页浏览器，你会看到粗体的\
    \ `PROLOGUE` 标题。用鼠标导航到 `PROLOGUE` 并选中它。然后点击右键。我希望你使用的是我们商定的 Chrome 浏览器。在上下文菜单中，你应该会看到\
    \ `检查` 选项。点击 `检查`，它将揭示网页在底层的样子，即 HTML 标记（图 4-3）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig3_HTML.jpg](img/506186_1_En_4_Fig3_HTML.jpg)\n\
    \n**图 4-3** 在 Chrome 开发者工具中检查网页的 HTML 代码\n\n你可以在图 4-2 和 4-3 中看到，`<h3>PROLOGUE</h3>`\
    \ 看起来是一样的。这是因为 BeautifulSoup 完全重建了网页的 HTML 标记结构。每个 `<>` 标签都是我们保存在 `data` 变量中的\
    \ BeautifulSoup 对象的一个属性。这意味着我们可以通过标签从页面对象中抓取元素。尝试在 Jupyter 单元格中运行 `data.h3`，你会看到文本\
    \ `PROLOGUE`。\n\nBeautifulSoup 中有两个主要函数用于从 HTML 结构中提取元素：`find()` 和 `find_all()`。区别很简单：`find()`\
    \ 查找一个元素，而 `find_all()` 将获取所有符合标准的元素。对 `find()` 和 `find_all()` 运行 help 命令，查看它们接受的所有可用参数：\n\
    \n```\nhelp(data.find)\nhelp(data.find_all)\n```\n\n方法 `find()` 和 `find_all()`\
    \ 将 HTML 标签作为参数来查找页面上的元素。其他元素属性，如 class 或 color，可用于精确定位网页上的项目。例如，运行语句 `data.find(\"\
    h3\")`。方法 `find()` 将查找包裹在 `<h3>` 标签中的元素。结果将是文本 `PROLOGUE`。方法 `find()` 一次处理一个元素；如果存在多个具有相同标签的项目，它将获取第一个。\n\
    \n现在，在浏览器中选中网页上诗歌的所有行，点击右键，然后检查选中的行。你可以看到 Chrome 开发者工具窗口中的所有行都被 `<a>` 标签包围。以 `<a>`\
    \ 标签作为第一个参数的方法 `find_all()` 将获取所有这些行的列表。记住，`find_all()` 总是返回一个列表，即使它没有找到任何东西。\n\
    \n```\nalist = data.find_all(\"a\")\n```\n\n在图 4-4 中，你可以看到我们已经获取了所有包裹在 `<a>` 标签中的行。\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig4_HTML.jpg](img/506186_1_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4** 带有 HTML `<a>` 标签的文本元素\n\n列表中获取的行带有 `<a>` 标签和 `href`（超文本引用）。我们需要从文本中移除标签和其他属性。在\
    \ BeautifulSoup 库中，有一个方法 `get_text()` 可以从 `<>` 标签中提取字符串。我们需要将其应用于 `alist` 中的每个项目以获取干净的文本。\n\
    \n```\nfor item in alist:\n    print(item.get_text())\n```\n\n如果我们需要从网页中抓取特定的一行怎么办？例如，从整首诗中获取\
    \ \"From forth the fatal loins of these two foes\" 这段文本。第一步是选中该文本并在 HTML 代码中进行检查（图\
    \ 4-5）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig5_HTML.jpg](img/506186_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5** 在 Chrome 中定位并检查文本中的一行\n\n第二步是调查 Chrome 开发者工具中的元素，如图 4-5 右侧所示，并找到我们可以用来获取文本的钩子。文本\
    \ `\"From forth the fatal loins of these two foes\"` 被 `<a>` 标签包围，并且有一个属性 `name=5`。同样，我们不需要知道\
    \ `name=5` 是什么意思。⁶ 这是构建网站的开发者使用的某个属性。我们关心的只是一个对于我们想要获取的文本来说是唯一的组合。如果我们只在 `find()`\
    \ 中使用一个标签，那么它会获取包裹在 `<a>` 标签中的第一个元素。幸运的是，`name=5` 对于我们需要的文本行是唯一的。使用 `find()` 方法，我们将\
    \ `<a>` 标签作为第一个参数传递，因为 `\"From forth the fatal loins of these two foes\"` 以此开头，并且作为第二个参数，我们将传递\
    \ `name=5`。属性应以字典的形式传递，如下所示：\n\n```\nelement = data.find(\"a\", {\"name\": 5})\n\
    ```\n\n我们已经获取了文本，并使用 `get_text()` 方法对其进行了清理（图 4-6）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig6_HTML.jpg](img/506186_1_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6** 通过使用 `find()` 方法和 HTML 属性获取文本行\n\n如你所见，整个网页抓取过程概括起来包括以下步骤：\n\n1. \
    \ 使用 Requests 库的 `get()` 方法从服务器获取数据。\n2.  将接收到的数据传递给 `BeautifulSoup()` 函数；它将数据解析为一个看起来像\
    \ HTML 网页结构的对象。\n3.  在浏览器中检查你需要抓取的元素。\n4.  使用 `find()` 或 `find_all()`，通过标签和属性等钩子获取文本。\n\
    \n现在我们已经学习了网页抓取的基本步骤，我们可以攻克一个热门网站 [investing.com](http://investing.com)。Investing.com\
    \ 提供每个交易者在交易日开始前需要了解的重要新闻。新闻页面的 URL 是 [`www.investing.com/news/`](http://www.investing.com/news/)。如果你在浏览器中打开该页面，你可以看到新闻标题和简短的预告。点击一个标题，它会带你到完整的文章。我们将开始收集标题和\
    \ `href`s（超文本引用），以便稍后能够访问完整的文章。`href` 只是一个指向某处的 URL。它们也被称为网页链接。\n\n首先要做的是，我们需要获取网站。从导入开始：\n\
    \n```\nimport requests\nfrom bs4 import BeautifulSoup\n```\n\n请记住，大多数网站不希望向机器人提供信息。`requests.get()`\
    \ 方法向服务器发送一条消息，这条消息大致是说“嗨，我是 Python”，而网站不希望响应 Python 机器人。为了绕过这一点，我们将使我们的信息请求看起来像是来自一个网页浏览器。这很简单；我们只需在发送给服务器的消息中提供不同的标头：\n\
    \n```\nheaders = {'User-agent': 'Mozilla/5.0'}\n```\n"
- fmt: 'Headers are passed into the `requests.get()` method as a keyword argument
    right after the URL. `Mozilla/5.0` is a common browser token. When a server receives
    the message with a token in the header, it would accept it as a regular browser
    call for information. You can try to run the following statement with and without
    headers:


    ```

    page = requests.get("https://www.investing.com/news/", headers={''User-agent'':''Mozilla/5.0''})

    ```


    With headers, the `requests.get()` method returns response 200 (Figure [4-7](#506186_1_En_4_Chapter.xhtml#Fig7)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig7_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig7_HTML.jpg)


    **Figure 4-7** Successful response from a server with the `requests` library


    The successful response can be parsed as a `BeautifulSoup` object:


    ```

    data = BeautifulSoup(page.content, "html.parser")

    ```


    Print `data` and see what’s in there. A bit messy at first, there is a lot of
    JavaScript functions, but `<!DOCTYPE HTML>` clearly states that we deal with HTML
    (Figure [4-8](#506186_1_En_4_Chapter.xhtml#Fig8)). Keep in mind [investing.com](http://investing.com)
    is a more sophisticated website than the one we have dealt before.


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig8_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig8_HTML.jpg)


    **Figure 4-8** Data received from a server parsed with the `BeautifulSoup()` function


    Flip back to the [`www.investing.com/news/`](http://www.investing.com/news/) page
    in a browser. Choose any title you like, navigate the mouse on it, and click the
    right button. I have chosen `"Oil Inventories Rose by 4M Barrels Last Week: API"`.
    Click Inspect and it will reveal how the web page looks under the hood (Figure
    [4-9](#506186_1_En_4_Chapter.xhtml#Fig9)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig9_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig9_HTML.jpg)


    **Figure 4-9** Inspecting a title with Chrome Developer Tools


    Take a closer look at the highlighted HTML code, and you can see exactly the same
    title you have clicked. In my case, in Figure [4-9](#506186_1_En_4_Chapter.xhtml#Fig9)
    it is `"Oil Inventories Rose by 4M Barrels Last Week: API"`. This text is wrapped
    into `<a></a>` tags. An `<a>` tag means a web link, and right after it, we see
    the `class="title"` attribute. That looks like a unique combination. Our goal
    is to grab all titles and collect hrefs, which are also included into `<a>` tags.
    `find_all()` would be the right choice for collecting all titles on the web page.
    As a first argument, we will pass the `<a>` tag, and the second argument will
    be `class="title"`. Also, we will need to include `href=True` to collect hrefs:


    ```

    titles = data.find_all("a", class="title", href=True)

    ```


    We have received all titles from the web page with hrefs (Figure [4-10](#506186_1_En_4_Chapter.xhtml#Fig10)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig10_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig10_HTML.jpg)


    **Figure 4-10** The list of titles received with the `find_all()` method


    The variable `titles` holds a list, and we can go through item by item to get
    a clean text and extract href. Each title and corresponding href should be packed
    together as another list. Then we can place all lists with titles and hrefs into
    a one huge list. At the end of the day, we will have a list of lists. We need
    a list of lists so later we can conveniently grab a title and href and fetch the
    full article page. From that article or detail page, we will take a text snippet.


    I will create a new Python list `clean_titles` and append to it a cleaned title
    and href packaged as a separate list under a variable `small_list`, like this:


    ```

    clean_titles = [ ]

    for item in titles:

    small_list = [item.get_text(), item["href"]]

    clean_titles.append(small_list)

    ```


    The `clean_titles` list holds a bunch of small lists with a title and a URL to
    the full article (Figure [4-11](#506186_1_En_4_Chapter.xhtml#Fig11)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig11_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig11_HTML.jpg)


    **Figure 4-11** List of lists with titles and hrefs


    Before we hit the URL for each title, we need to understand the HTML structure
    of a full article web page. Let’s investigate further; in the browser, click any
    title and it should take you to a full article or, as web developers call it,
    a detail view.


    On the full article page (Figure [4-12](#506186_1_En_4_Chapter.xhtml#Fig12)),
    I am clicking the first paragraph with the right mouse button and choosing the
    inspect option.


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig12_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig12_HTML.jpg)


    **Figure 4-12** Inspecting a full article web page in Chrome Developer Tools


    On the right part of my screen (Figure [4-12](#506186_1_En_4_Chapter.xhtml#Fig12)),
    I see that the whole article is enclosed with `<p>` tags, paragraphs. If we want
    to get the full article, we would need to use the `find_all()` method and use
    a `<p>` tag as an argument. To get a paragraph of each article, we will create
    a small web crawler. We already have URLs for all articles, and we will have to
    hit page by page to grab a text snippet from each object. As we fetch a web page,
    we will parse the data with the `BeautifulSoup()` function and apply the `find_all()`
    method.


    Using a `for` loop, we will iterate through the `clean_titles` list and fetch
    each URL with `requests.get()` pretty much like we did before:


    ```

    for item in clean_titles:

    url = item[1]

    page = requests.get("https://www.investing.com{}".format(url), headers={''User-agent'':''Mozilla/5.0''})

    print("now fetching", "https://www.investing.com{}".format(url))

    ```


    Each item in `clean_titles` represents a list, and we need to extract the second
    element, URL, by indexing it `item[1]`. To fetch the article, we need to recreate
    a full URL beginning with [`https://www.investing.com`](https://www.investing.com).
    In the `requests.get()` method, I concatenate [`https://www.investing.com`](https://www.investing.com)
    and the rest of the URL from the `clean_titles` list. Do not forget the headers.
    The last print statement is not necessary, but I like to see how it works and
    make sure that I am getting a full URL (Figure [4-13](#506186_1_En_4_Chapter.xhtml#Fig13)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig13_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig13_HTML.jpg)


    **Figure 4-13** Calling a URL for each article


    In the scope of the `for` loop, we would need to use the `BeautifulSoup()` function
    on every `page` object. We will save the HTML structure of each article page under
    the variable name `article`. The last step is to apply `find_all()` with a `<p>`
    tag to the `article` object. The `find_all()` method returns a list, and we will
    save it under the name `list_article`. Here, I would like to stop for a minute
    and introduce a concept that would save us some time going forward – list comprehension.


    ## List Comprehensions


    A list comprehension is a Python syntax that makes your code run faster. This
    is especially important when you deal with a huge amount of data. I prefer to
    use a list comprehension in gathering information when you have to scrape thousands
    of web pages.


    Before we get to the list comprehension syntax, I would like you to do a simple
    exercise. Suppose we have `alist` full of numbers. We want to filter it and find
    all `5`s. Then we would need to save all `5`s in a new list. Let’s name it `blist`.
    The solution would be:


    ```

    alist = [1,2,3,5,5,5,6,7,5,5]

    blist = []

    for number in alist:

    if number == 5:

    blist.append(number)

    ```'
