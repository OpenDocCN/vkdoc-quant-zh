    \nFigure 6-13\nRunning the Monte Carlo simulation on a portfolio of stocks\n\n\
    We will plot the outcomes as a scatter, but before that we need to\nconvert `mc_return`\
    \ and `mc_volatility` lists\ninto NumPy arrays:\n\n```\nexpected_return = np.array(mc_return)\n\
