    ## Writing Information into a Text File


    As we have discussed before, Python operates in RAM, short-term memory, and files
    are stored on a hard drive or in a cloud, long-term memory. The built-in function
    `open()` reads and writes data from and into a file. `open()` returns a Python
    object. Keep in mind that you are not working directly with a file stored on a
    hard drive but with an object. The function `open()` takes keyword arguments.
    We can take a look at the main ones necessary to open a file. For starters, you
    need to provide a file name and a file path. Next is the mode. A mode specifies
    your intention for a file. The default is `mode=''r''`. String `''r''` stands
    for read. If your intention is to get information from a file, you should leave
    it like it is. For writing data into a file, we would need to change the mode
    to `''w''`. Every time you run the code, the `open()` function will create a new
    file. Another keyword argument is `encoding`. For Mac users, it is optional because
    by default it will encode or decode a file as UTF-8. Remember in the first chapter,
    we have talked about how computers store strings. In a nutshell text file is a
    string. UTF-8 is the most popular encoding system for text right now. If you are
    curious how exactly UTF-8 encoding works and see the table characters and corresponding
    numbers, you can find it on Wikipedia (`https://en.wikipedia.org/wiki/UTF-8`).
    Windows might require the `encoding="utf8"` argument to encode a file:


    ```

    obj = open("myfile.txt", "w", encoding="utf8")

    ```


    `obj` holds an object generated by the function `open()`. Print it and you will
    see:


    ```

    That means that we have successfully created `myfile.txt`. You can

    look up a new file on your computer. Use find or search for it in the

    same directory where you keep the `Jupyter` Notebook.

    Open the `myfile.txt` file in

    any text editor. It is blank. We have not written anything in it yet.

    Writing mode is a bit tricky. If you rerun the `open()` function  again, `"w"`
    mode will delete

    the existing `myfile.txt` file and

    create a new one with the same name. Keep in mind that if you had `myfile.txt`
    on your

    computer before with some existing information, you would have lost

    it.

    Now that we have a file, we can write something into it. Again, we

    will be manipulating the Python object. Run `dir()` on `obj`, and you would

    see all read and write methods. To add a string to `obj`, we use the

    command `write()`. When we are

    done, the command `close()` saves it in

    the file.


    We need a string to write it into the file; make sure you have all your

    code in the same cell:


    ```

    string_one = "This pizza is delicious!"

    obj = open("myfile.txt", "w", encoding="utf8")

    obj.write(string_one)

    obj.close()

    ```


    The method `close()` saves the object as a file. It works in the same way as a
    save button in Microsoft Word. Your text is not saved until you click the save
    as button. If there is a power outage and the data you have on the screen was
    not saved, you might lose it.


    After you run all these commands, refresh the `myfile.txt` file. `"This pizza
    is delicious!"` should be in it (Figure [2-25](#506186_1_En_2_Chapter.xhtml#Fig25)).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig25_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig25_HTML.jpg)


    Figure 2-25

    Writing information in a text file


    In comparison to write mode, append mode will add a string to an existing file.
    If you already have the file and want to write in additional data, replace `"w"`
    in keyword argument mode to `"a"`. We need another string to append it to `myfile.txt`.
    The `"\n"` sign means a new line in Python. It will start a phrase on a new line:


    ```

    string_two = "I love pepperoni pizza!"

    obj = open("myfile.txt", "a", encoding="utf8")

    obj.write("\n"+string_two)

    obj.close()

    ```


    Every time you run this code, it will append `"I love pepperoni pizza!"` to `myfile.txt`
    (Figure [2-26](#506186_1_En_2_Chapter.xhtml#Fig26)).'
