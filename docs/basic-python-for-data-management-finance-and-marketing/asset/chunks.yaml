- fmt: 'In other words, every time Python reads an `if` statement, it takes it as
    a separate conditional statement or a new decision set. That is why it is very
    important to follow an `if` statement with `elif` if you want to outline several
    options and anticipate only one result.


    I guess by now you want to know what we should do if a user enters `"Rainy"` with
    a capital `"R"`. The way our code is structured right now, `"Rainy"` would be
    captured by the `else` statement. This is not what we want. As people who write
    code for others, we would need to think of all possible scenarios. One solution
    to fix it would be logical operators (Table [1-3](#506186_1_En_1_Chapter.xhtml#Tab3)).
    In the course of this book, we will try all of them. We will begin with `or`.


    **Table 1-3** Logical operators in Python


    | Operator | Name |

    | --- | --- |

    | `and` | Two conditions should be `True` |

    | `or` | Either condition should be `True` |

    | `not` | If a condition is not `True` |

    | `in` | If an item is in a sequence |

    | `not in` | If an item is not in a sequence |


    We can extend our `if` statement and use the `or` operator to give a user more
    options how to input a weather condition. `"Rainy"` beginning with a capital letter:


    ```

    if weather == "rainy" or weather == "Rainy":

    print("Take an umbrella")

    ```


    The important part to remember is that you need to outline the whole condition
    after `or`. We would need to use the `weather` variable again. The `if` statement
    would not work with just the `weather == "rainy" or "Rainy"` condition. The `if`
    statement would be triggered if either one of the conditions returned `True`.
    I’ll be honest with you, there is a better way to make sure that the inputted
    value would match our condition. I’ll show it to you later. The current example
    illustrates the use of the `or` operator.


    Compared to the `or` operator, `and` would require a satisfaction of two conditions.
    To see how it works, we add one more question to our program. The variable `season`
    would hold a value like `"summer"` or `"winter"`:


    ```

    season = input("What season are we in ? ")

    ```


    We will add another `elif` statement that would require two conditions to be true:


    ```

    elif weather == "cold" and season == "winter":

    print("Dress warmly")

    ```


    Only if two conditions are satisfied and returned `True`, we would see the `"Dress
    warmly"` message (Figure [1-22](#506186_1_En_1_Chapter.xhtml#Fig22)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig22_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig22_HTML.jpg)


    **Figure 1-22** `Elif` triggered if two conditions are satisfied and returned
    `True`


    ## Methods


    Python is an object-oriented programming language. Object-oriented programming
    (OOP) is a design method to structure a program. The main concept behind it is
    to bundle related properties and behaviors as individual objects. In a nutshell,
    everything in Python is an object. We have briefly touched behaviors of the objects
    with the water container analogy before.


    When I declare variable `season = "summer"`, `"summer"` is stored as an object
    in Python memory. It is encapsulated as a string, because we have wrapped it in
    quotes, and `"summer"` is just an instance of a string. Later if we want, we could
    replace `"summer"` with `"winter"`. `"winter"` would be another instance of a
    string. Since `"summer"` and `"winter"` are both instances of the string, they
    would behave similarly and share the same attributes.


    There is a command that would show you all built-in methods of an object – `dir()`.
    A method is similar to a function, which performs a task. The main difference
    is a method belongs to an object. We will be using `dir()` a lot; as things go
    more complicated, you will see that the `dir()` function is irreplaceable. Every
    time you do not know how to do something in Python, I would recommend you start
    with the `dir()` function. Suppose we need to convert `"summer"` to uppercase
    `"SUMMER"`. If you have no idea how to do it, always start with the `dir()` function.
    Run `dir()` on the object; in this case, run it on `"summer"`. You can pass the
    instance `"summer"` as an argument into the `dir()` function or a variable name
    holding that instance. Another option is to pass `str` into the `dir()` function;
    after all, `"summer"` is an instance of a string.


    ```

    season = "summer"

    dir("summer")

    or

    dir(season)

    or

    dir(str)

    ```


    I know at first what you see in Figure [1-23](#506186_1_En_1_Chapter.xhtml#Fig23)
    looks overwhelming. This is a list of all built-in methods or commands in a string
    object. Usually, when you want to do something to an object, you want to check
    all its methods with the function `dir()`. In the beginning of that list, we see
    dunder methods. Dunder is short for “double underscores.” All these dunder methods
    have double underscores before and after the method name. Dunder methods are used
    by Python itself. As an illustration, the function `len()` would use the dunder
    method `__len__()` when called on `"winter"`. Similarly, a plus operator would
    call the `__add__()` method if you concatenate two strings (Figure [1-24](#506186_1_En_1_Chapter.xhtml#Fig24)).
    Most of the time, you skip dunder methods and start looking for a method you need
    to use.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig24_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig24_HTML.jpg)


    **Figure 1-24** Function `len()` and `+` act as wrappers for `__len__()` and `__add__()`
    methods


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig23_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig23_HTML.jpg)


    **Figure 1-23** String methods


    After scanning all string methods, we see the `upper()` method. It is the second
    to last on the string method list (Figure [1-23](#506186_1_En_1_Chapter.xhtml#Fig23)).
    The name of that method is self-explanatory. However, there are many others that
    we do not know yet and have no idea how to use them. To see a definition of the
    method, use the function `help()` (Figure [1-25](#506186_1_En_1_Chapter.xhtml#Fig25)).
    By the way, the function `help()` is universal and can be applied to functions
    too, such as `help(len)`.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig25_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig25_HTML.jpg)


    **Figure 1-25** Function `help()` returns a definition of the function `len()`


    ```

    help("winter".upper)

    or

    help(season.upper)

    or

    help(str.upper)

    ```'
