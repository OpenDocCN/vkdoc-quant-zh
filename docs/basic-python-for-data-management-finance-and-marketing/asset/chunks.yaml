    \ NumPy 数组：\n\n```\nexpected_return = np.array(mc_return)\nexpected_volatility\
    \ = np.array(mc_volatility)\n```\n\n最后，我们绘制`expected_return`和`expected_volatility`：\n\
    \n```\ncolor = expected_return / expected_volatility\nplt.figure(figsize=(12,\
    \ 8))\nplt.scatter(expected_volatility, expected_return, c=color, marker='o')\n\
    plt.grid()\nplt.title(\"Monte Carlo simulation\")\nplt.xlabel('Expected volatility')\n\
    plt.ylabel('Expected return')\nplt.colorbar(label=\"Sharpe ratio\")\nplt.show()\n\
    ```\n\nMatplotlib 的`show()`方法是可选的。我将其包含在内，以防你想在 Matplotlib 的`\"notebook\"`模式下运行代码，或使用操作系统生成图表。\n\
    \n此示例是对哈里·马科维茨现代投资组合理论的说明¹⁴。你希望获得的投资回报越高，预期的波动率就应越大（图 6-14）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig14_HTML.jpg](img/506186_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14 绘制蒙特卡洛模拟结果\n\n图 6-14 中的曲线连接了所有最有效的结果——风险与回报的最优组合，它被称为有效前沿。\n\n## 有效前沿\n\
    \n前面的示例已经证明，你可以从零开始构建任何统计或金融模型。然而，如果你过于忙碌并需要一个开箱即用的解决方案，有一个专业的 Python 包`PyPortfolioOpt`实现了投资组合优化方法，包括有效前沿技术和其他风险管理解决方案¹⁵。`PyPortfolioOpt`带有内置的风险模型和绘图功能。不幸的是，目前`PyPortfolioOpt`不是\
    \ Anaconda 包的一部分，我们需要使用`pip`命令来安装它。我们已经多次经历过安装过程，我相信现在你已经知道在哪里找到终端，请运行：\n\n```\n\
    pip install pyportfolioopt\n```\n\n我们将使用`PyPortfolioOpt`为我们的投资组合找到有效前沿。对于下面的示例，你需要打开一个新的**Jupyter**\
    \ Notebook，并从`PyPortfolioOpt`导入以下函数：\n\n```\nimport pandas as pd\nimport pandas_datareader.data\
    \ as web\nfrom pypfopt.efficient_frontier import EfficientFrontier\nfrom pypfopt.cla\
    \ import CLA\nfrom pypfopt import plotting\nfrom pypfopt.plotting import plot_weights\n\
    from pypfopt import risk_models\nfrom pypfopt import expected_return\n```\n\n\
    我会在示例中解释所有导入的函数。我们的目标是生成并绘制投资组合的有效前沿。同时，使用由 Marcos Lopez de Prado 和 David Bailey\
    \ 实现的临界线算法来寻找最优投资组合¹⁶。\n\n我们将沿用前一个示例中的相同投资组合，并且由于我们在不同的 notebook 中，我们需要再次获取历史价格。同时，请随意使用你喜欢的股票，或向默认列表中添加更多股票：\n\
    \n```\nportfolio = [\"MSFT\", \"AAPL\", \"IBM\"]\nprices = pd.DataFrame()\nfor\
    \ stock in portfolio:\n    prices[stock] = web.DataReader(stock, 'yahoo', '2017-01-01',\
    \ '2021-03-20')[\"Adj Close\"]\n```\n\n与前一种情况类似，`PyPortfolioOpt`通过推断历史收益来计算预期收益。我们已导入`expected_return`模块，顾名思义，它生成年化平均收益。对使用\
