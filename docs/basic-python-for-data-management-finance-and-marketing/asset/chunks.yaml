    # 基于数据库存储的推特营销活动


    如果你想要开展推特营销活动并每天发送推文，就需要将内容存储在某处。显然，最佳选择是使用预先准备好文本和图片路径的数据库。`Python` 可与任何类型的关系型数据库配合使用。最简单的方案是采用
    `Sqlite3` 数据库。`Sqlite3` 模块随标准 `Python` 发行版一同提供。


    如果你不熟悉关系型数据库，也可以考虑使用简单的文本或 `CSV` 文件作为替代方案。内容和图片链接可以从文件中读取，然后通过 `Tweepy` 发布推文。待发送的信息将存储在列表的列表中，随后通过我们刚刚创建的、在
    `for` 循环中运行的代码进行分发。


    # 使用 Python 进行电子邮件营销


    用 `Python` 发送电子邮件是相当简单的任务。`Python` 拥有 `Email` 和 `Smtplib` 模块，用于撰写和发送消息。该过程的详细文档可在此处查阅：[`https://docs.python.org/3/library/email.examples.html`](https://docs.python.org/3/library/email.examples.html)。你需要在计算机上使用
    `Smtplib` 包模拟一个服务器，它便会发送邮件。


    尽管操作简单，但我认为这个过程并不适合营销目的，尤其是当你需要触达 10,000 甚至 100,000 名收件人时。对于认真的营销人员，我推荐使用 `Mailgun`
    服务。`Mailgun` 让你能够更灵活地使用自己的 `Python` 代码，同时享受分析仪表盘带来的便利。`Mailgun` 提供了一个 `Python`
    API，可以轻松集成到任何 Web 应用程序中，或在 `Python` 脚本中使用。即使对于 `Python` 初学者来说，`Mailgun` API 也很容易使用。此外，`Mailgun`
    服务允许使用 `HTML` 模板，并提供电子邮件营销活动效果的分析数据。


    如果你目前正在使用某种电子邮件营销服务，务必对比一下价格，看看切换到 `Mailgun` 是否划算。在本书中，我们将使用 `Mailgun` 的免费试用版。


    任何营销专业人士都知道，品牌建设是赢得客户信任的关键。如今，人们不会随意打开任何电子邮件。除非电子邮件来自可靠来源或明确显示发件人身份，否则潜在客户不会点击。`Mailgun`
    允许你添加自己的域名，使邮件看起来更专业。虽然出于测试目的无需添加域名，但 `Mailgun` 也提供了一个沙盒域名。我将设置我的域名 [artyudin.com](http://artyudin.com)
    来演示这个过程。如果你想遵循我的代码但没有域名，可以在 [godaddy.com](http://godaddy.com) 或 [namecheap.com](http://namecheap.com)
    上购买，一年只需一美元。


    在浏览器中打开 [`www.mailgun.com/`](http://www.mailgun.com/) 并免费注册，以获取 API 密钥。注册完成后，登录账户。你会看到仪表盘；在左侧菜单中应该能看到
    **发送(Sending)** 选项。点击 **发送(Sending)**。在菜单中选择 **域名(Domains)** 选项，如果你想添加现有域名，请点击左上角的绿色
    **添加新域名(Add New Domain)** 按钮。如果你只想试用 `Mailgun`，可以保留使用 `Mailgun` 默认提供的沙盒域名。使用沙盒域名的主要缺点是
    `Mailgun` 仅允许向授权收件人发送消息。这意味着你需要向他们发送邀请，并请求他们同意接收来自 `Mailgun` 服务器的电子邮件。


    点击绿色的 **添加新域名(Add New Domain)** 按钮后，你会看到一个提示框，要求输入你想使用的域名。在点击 **添加域名(Add Domain)**
    之前，请选择域名注册的地区 **美国(US)** 或 **欧盟(EU)**。下一步是设置你的域名并验证其所有权。


    我知道所有这些 DNS 设置（图 7-20）初看起来会令人困惑和复杂。但在同一页面上，你会找到针对所有主要域名销售商和提供商的视频和分步说明。你只需登录你的域名提供商，并在域名旁边管理
    DNS。在 DNS 记录中，按照 `Mailgun` 指南添加 TXT 和 MX 记录。你只需将 `Mailgun` 页面上的值复制并粘贴到域名的 DNS
    记录中。为确保设置正确，请点击验证 DNS 设置(Verify DNS Settings)，如果看到 DNS 类型旁边出现绿色标记，说明一切正常，你就可以发送电子邮件了（图
    7-21）。如果某些设置不起作用，你仍看到红色和黄色叉号，请再观看一遍视频并重试。


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig21_HTML.jpg](img/506186_1_En_7_Fig21_HTML.jpg)


    图 7-21

    添加的域名已成功验证


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig20_HTML.jpg](img/506186_1_En_7_Fig20_HTML.jpg)


    图 7-20

    将域名添加到 `Mailgun` 服务器


    `Mailgun` 作为一个常规 API 运行，需要 `Requests` 库来向服务器发送消息以及一个 API 密钥。打开 `Mailgun` 仪表盘，从左侧菜单中选择
    *设置(Settings)* 选项，然后找到 *API 密钥(API Keys)* 选项。另外，API 密钥也可以在个人设置中找到（图 7-22）。


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig22_HTML.jpg](img/506186_1_En_7_Fig22_HTML.jpg)


    图 7-22

    `Mailgun` API 密钥


    要发送电子邮件，请打开一个新的 **Jupyter** Notebook，并在文件顶部导入 `Requests` 库：


    ```

    import requests

    ```


    与之前的 API 示例一样，我们将定义 `API_KEY` 变量来保存 API 密钥。同时定义 `DOMAIN` 变量来保存你的域名：


    ```

    API_KEY = "9514cb771d5da80eb6"

    DOMAIN = "artyudin.com"

    ```


    `Requests` 库拥有与主要 HTTP 方法 `get()`、`post()`、`put()` 和 `delete()` 相匹配的函数。`get()`
    方法发送请求以从服务器获取数据，而 `post()` 方法则将数据发送到服务器。由于我们要发送信息，我们将使用 `post()` 方法。我们需要向 `post()`
    方法传递一些参数。我将逐一分解并分别定义每个信息片段，以使其清晰明了。


    首先，`Requests` 的 `post()` 方法需要我们要访问的 HTTP 地址。我们将其定义为 `url`，并使用 `Mailgun` 文档中的模板。


    我们的目标是触达许多潜在客户，因此我将把 `recipients` 设置成一个电子邮件地址列表。在实际情况中，你可能需要从文件或数据库中获取电子邮件和姓名。无论如何，你需要将所有电子邮件作为一个
    `Python` 列表提供：


    ```

    recipients = ["anna@example.com", "sherlock@example.com"]

    ```


    我将把主题设置为 `subject_matter` 变量：


    ```

    subject_matter = "Hello there"

    ```


    我将把消息本身作为一个字符串赋值给 `message` 变量：


    ```

    message = "I am sending this email with Python!"

    ```


    最后，我将定义发件人身份为 `sender`。如果你没有添加域名，那么你必须使用经过验证的电子邮件地址。


    在 `post()` 方法中，我们将传递 `url`、身份验证信息作为 `auth`，以及信息作为 `data`。对于 `auth` 元组中的身份验证，我们需要设置
    `API_KEY`：


    ```

    auth=("api", API_KEY)

    ```


    关键字参数 `data` 将包含我们之前定义的所有信息：


    ```

    data = {"from": sender, "to": recipients, "subject": subject_matter, "text": message}

    ```


    整个 `Requests` 的 `post()` 方法将如下所示：


    ```

    requests.post(

    url,

    auth=("api", API_KEY),

    data={"from": sender,

    "to": recipients,

    "subject": subject_matter,

    "text": message}

    )

    ```

    '
