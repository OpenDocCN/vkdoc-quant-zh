    ## Reading Information from a Text File


    Reading data from a file is similar to writing a file. All we need to do is leave
    the function `open()` in a default reading mode. Some Windows systems would require
    you to add a little `r` before the file path. Also, make sure you have the right
    file path if your file is not in the same directory where the Python script is
    saved. Otherwise, you would get a `FileNotFoundError`.


    ```

    obj = open(r"dummydata.txt", "r", encoding="utf8")

    obj.read()

    ```


    The method `read()` parses `obj` as a string (Figure [2-28](#506186_1_En_2_Chapter.xhtml#Fig28)).
    Do not worry about `\n` signs. Python indicates that these characters are separated
    by a new line.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig28_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig28_HTML.jpg)


    **Figure 2-28** Reading information from a text file


    In fact, we can use `\n` to split the string into a list. Assign `obj.read()`
    to a new variable. There is a string method `split()`. One thing you have to remember
    about `split()` is it is always returning a list data structure. By default, `split()`
    would separate strings by an empty space. Conversely, you can pass a keyword or
    a character to be split by. In our case, we will pass `\n` as an argument:


    ```

    obj = open(r"dummydata.txt", "r", encoding="utf8")

    data = obj.read().split("\n")

    ```


    After `split()`, the variable `data` holds the list of strings separated by a
    comma. A list is a versatile data structure, and we can analyze data going forward
    (Figure [2-29](#506186_1_En_2_Chapter.xhtml#Fig29)).


