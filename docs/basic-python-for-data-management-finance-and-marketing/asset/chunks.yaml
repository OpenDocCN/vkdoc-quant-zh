- fmt: '# Twitter Campaign with Database Storage


    In case you want to run a Twitter campaign and send tweets every day, you would
    need to store the content somewhere. Obviously, the best place would be a database
    with prepared text and paths to the images. `Python` works with any type of relational
    databases. The easiest option would be to use the `Sqlite3` database. The `Sqlite3`
    module comes with a standard `Python` distribution.


    If you are not familiar with relational databases, a simple text or `CSV` file
    might be an alternative. The content and image links could be read from a file
    and then tweeted with `Tweepy`. The information about to be sent would be held
    in a list of lists and later dispended with the code we just created running in
    the `for` loop.


    # Email Marketing with Python


    Sending an email with `Python` is quite an easy task. `Python` has `Email` and
    `Smtplib` modules to compose and send messages. The process is very well documented
    here: [`https://docs.python.org/3/library/email.examples.html`](https://docs.python.org/3/library/email.examples.html).
    You need to simulate a server with the `Smtplib` package on your computer, and
    it will dispatch the email.


    Regardless of its easiness, I do not find the process to be convenient for marketing
    purposes, especially when you want to reach 10,000 or even 100,000 recipients.
    For serious marketeers, I would recommend the `Mailgun` service. `Mailgun` gives
    you more flexibility using your own `Python` code with the comfort of an analytic
    dashboard. `Mailgun` provides a `Python` API and could be easily integrated in
    any web application or used in a `Python` script. The `Mailgun` API is easy to
    use even for `Python` beginners. Also, the `Mailgun` service allows to use `HTML`
    templates and provides analytics on the performance of your email campaigns.


    If you currently use one of the email marketing services, you should definitely
    compare the pricing and see if it would make sense to switch to `Mailgun`. In
    this book, we will use the `Mailgun` free trial.


    Any marketing professional knows that branding is a key to gain customer trust.
    People these days will not open just any email. Potential customers will not click
    unless an email comes from a reliable source or clearly shows whom it’s from.
    `Mailgun` gives you an option to add your domain name and make emails look professional.
    Although it is not necessary to add a domain name for testing purposes, `Mailgun`
    provides a sandbox domain. I will set up my domain [artyudin.com](http://artyudin.com)
    to illustrate the process. In case you want to follow my code but do not have
    a domain name, you can get one at [godaddy.com](http://godaddy.com) or [namecheap.com](http://namecheap.com)
    as cheap as a dollar a year.


    Open [`www.mailgun.com/`](http://www.mailgun.com/) in a browser and sign up for
    free to obtain an API Key. After the registration is completed, log in. You will
    see the dashboard; there you should see the **Sending** option in the left-side
    menu. Click **Sending**. Choose the **Domains** option from the menu, and if you
    want to add an existing domain, click the green **Add New Domain** button in the
    upper-left corner. In case you just want to try `Mailgun`, you can stick to the
    sandbox domain provided by `Mailgun` by default. The major disadvantage of using
    the sandbox domain is `Mailgun` allows to send messages to authorized recipients
    only. That means you would need to send them an invitation and ask to agree to
    receive emails from the `Mailgun` server.


    After you clicked the green **Add New Domain** button, you should see a prompt
    asking for a domain you want to use. Before you click **Add Domain**, choose one
    of the regions **US** or **EU** where the domain was originated. The next step
    is to set up your domain and verify the ownership of it.


    I know all these DNS settings (Figure [7-20](#506186_1_En_7_Chapter.xhtml#Fig20))
    sound confusing and complicated at first. But on the same page, you’ll find a
    video and step-by-step instructions for all major domain sellers and providers.
    All you have to do is to log in to your domain provider and manage DNS right next
    to your domain name. In the DNS records, add TXT and MX records as in the `Mailgun`
    guide. All you have to do is to copy the values from the `Mailgun` page and paste
    them into the domain DNS records. To make sure your settings are correct, click
    Verify DNS Settings, and if you see green marks right next to DNS Types, then
    everything is working, and you are ready to send emails (Figure [7-21](#506186_1_En_7_Chapter.xhtml#Fig21)).
    In case something is not working, and you still see red and yellow crosses, watch
    the video one more time and try again.


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig21_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig21_HTML.jpg)


    Figure 7-21

    Added domain name was successfully verified


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig20_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig20_HTML.jpg)


    Figure 7-20

    Adding a domain to the `Mailgun` server


    `Mailgun` works as a regular API and requires the `Requests` library to send a
    message to a server and an API Key. Open the `Mailgun` Dashboard and select the
    option *Settings* from the left menu and then find the option *API Keys*. Also,
    API Keys can be found in your personal settings (Figure [7-22](#506186_1_En_7_Chapter.xhtml#Fig22)).


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig22_HTML.jpg](images/506186_1_En_7_Chapter/506186_1_En_7_Fig22_HTML.jpg)


    Figure 7-22

    `Mailgun` API Keys


    To send an email, open a new **Jupyter** Notebook and import the `Requests` library
    on top of the file:


    ```

    import requests

    ```


    As in previous API examples, we will define the `API_KEY` variable to hold the
    API Key. Also define the `DOMAIN` variable for your domain name:


    ```

    API_KEY = "9514cb771d5da80eb6"

    DOMAIN = "artyudin.com"

    ```


    The `Requests` library has functions that match major HTTP methods `get()`, `post()`,
    `put()`, and `delete()`. The `get()` method sends a request to obtain data from
    a server, and the `post()` method delivers the data to a server. Since we want
    to deliver information, we will use the `post()` method. We will need to pass
    a few parameters into the `post()` method. I’ll break it down and define each
    information piece separately to make it clear.


    First of all, the `Requests` method `post()` requires the HTTP address we are
    trying to reach. We will define it as `url` and use the template from the `Mailgun`
    documentation.


    Our goal is to reach many potential customers, so I’ll set `recipients` as a list
    of email addresses. In real life, you will probably be fetching emails and names
    from a file or a database. In any case, you would need to provide all emails as
    a `Python` list:


    ```

    recipients = ["anna@example.com", "sherlock@example.com"]

    ```


    I’ll set the subject as the `subject_matter` variable:


    ```

    subject_matter = "Hello there"

    ```


    The message itself I’ll assign as a string to the `message` variable:


    ```

    message = "I am sending this email with Python!"

    ```


    Finally, I’ll define who I am sending the message as `sender`. If you have not
    added a domain name, then you’ll have to use the verified email address.


    In the `post()` method, we will pass `url`, authentication as `auth`, and information
    as `data`. For authentication in the `auth` tuple, we need to set the `API_KEY`:


    ```

    auth=("api", API_KEY)

    ```


    The keyword argument `data` will contain all the information we have defined before:


    ```

    data = {"from": sender, "to": recipients, "subject": subject_matter, "text": message}

    ```


    The whole `Requests` method `post()` would look like this:


    ```

    requests.post(

    url,

    auth=("api", API_KEY),

    data={"from": sender,

    "to": recipients,

    "subject": subject_matter,

    "text": message}

    )

    ```'
