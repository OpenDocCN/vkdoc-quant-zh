    it manually. It would be a much easier task if we can generate an index for any
    word no matter how long it is. With the help of the function `len()` , we can
    get a number of items or characters in any sequence:


    ```

    len(word)

    ```


    The string “apple” has five characters. The function `len()` always returns an
    integer. This integer can be used as a stop point in the `range()` function. Using
    that as an argument, the function range generates the correct sequence from 0
    up to the stop point for any word. We can pass `len(word)` as the stop argument
    in `range()`.


    `i` will represent an index of each letter. This index can be used to access a
    letter, for example, `word[0]`. In Figure [2-9](#506186_1_En_2_Chapter.xhtml#Fig9),
    you can see that the range has generated a sequence of numbers from `0` to `4`.
    That is exactly what we have expected with the stop point of `5`. Then, passing
    every number into square brackets, we fetched letter by letter from the string.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig9_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    The function range generates numbers that can be used as indices


    In many cases, you would want to get a location of a value in a sequence. That
    is why we want to know the index of each value. For instance, if we want to replace
    a value or do something to a value, we would know where the value is stored.'
  trans: "\n初学者最难理解的部分是 `for` 循环及其包含的 `if` 语句的作用域。在 `for` 循环迭代过程中，其作用域内的所有语句都会被执行（图\
    \ 2-4）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig4_HTML.jpg](img/506186_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4\n\n`for` 循环与 `if` 语句的设计模式\n\n另一个说明 `for` 循环的例子是同时遍历数字列表并进行过滤。初始列表可能如下所示：\n\
    \n```\nalist = [1, 5, 2, 5, 3, 5, 4, 5, 6, 5, 7]\n```\n\n我们的任务是找出数字 `5` 并将其添加到另一个\
    \ `blist` 中。那么，我们先初始化一个新列表：\n\n```\nblist = [ ]\n```\n\n如果你不知道从何入手，可以尝试将任务按逻辑拆解成几个步骤。首先，我们需要从列表中取出每个数字。听起来这该由\
    \ `for` 循环来完成。接着，我们需要将每个数字与 `5` 进行比较，否则计算机怎么知道我们正在找数字 `5` 呢。如果某次比较结果为 `True`，我们就需要使用\
    \ `append()` 方法将该数字添加到 `blist` 中。所有这些步骤都可以转换成代码：\n\n```\nfor number in alist:\n\
    \    if number == 5:\n        blist.append(number)\n```\n\n结果，我们会得到一个全是 `5` 的\
    \ `blist`（图 2-5）。在图 2-5 的第 6 行，`append()` 被缩进并放置在 `if` 语句的作用域内，它仅在 `if` 语句返回 `True`\
    \ 后才被执行。缩进是 Python 语法的重要组成部分，你必须遵循 `for` 循环与 `if` 语句的设计模式（图 2-4）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig5_HTML.jpg](img/506186_1_En_2_Fig5_HTML.jpg)\n\
    \n图 2-5\n\n过滤 `alist` 并将 `5` 添加到 `blist`\n\n## Range 函数\n\n`range` 函数是内置函数之一，用于生成数字序列。要使用它，我们需要指定起始整数（序列从哪个数字开始）、停止整数（在哪里停止）以及步长整数（具体的间隔），如图\
    \ 2-6 所示。停止整数是该函数唯一必需的参数。停止数字不会包含在生成的序列中。默认情况下，起始点为 `0`，步长为 `1`。因此，我们至少需要提供一个停止整数。不要将\
    \ `range` 函数与切片混淆。虽然 `range()` 函数需要类似的参数（起始值、停止值和步长），但它与切片表示法毫无共同之处。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig6_HTML.jpg](img/506186_1_En_2_Fig6_HTML.jpg)\n\
    \n图 2-6\n\n`range` 函数参数\n\n大多数情况下，`range()` 函数与 `for` 循环配合使用。假设我们想生成一个从 `1` 到\
    \ `5` 的数字范围，可以这样写：\n\n```\nfor i in range(1,6):\n    print(i)\n```\n\n输出结果为从 `1`\
    \ 到 `5` 的数字，停止点被排除在外（图 2-7）。我们未指定步长，它默认为 `1`。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig7_HTML.jpg](img/506186_1_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7\n\n`range` 函数生成从 `1` 到 `5` 的数字\n\n到目前为止，非常简单。如果我们想生成相同的范围，但这次是按降序排列呢？那么我们需要从\
    \ `5` 开始，不能将 `1` 作为停止点。如果使用 `1`，序列中就不会出现 `1`，我们必须将 `0` 作为停止点。要改变方向，我们需将 `-1` 用作步长（图\
    \ 2-8）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig8_HTML.jpg](img/506186_1_En_2_Fig8_HTML.jpg)\n\
    \n图 2-8\n\n`range` 函数生成从 `5` 到 `1` 的降序数字\n\n你可能会好奇 range 的实际用途。通常，`range()` 函数用于生成索引。还记得我们可以通过索引访问序列中的元素吗？让我们回到上一章使用的例子：\n\
    \n```\nword = \"apple\"\nword[0]\nword[1]\nword[2]\nword[3]\nword[4]\n```\n\n\
    使用索引语法，我们通过索引来获取字母。我们不想手动操作。如果能够为任意单词（无论其长度如何）生成索引，任务就会变得简单得多。借助 `len()` 函数，我们可以获取任何序列中的元素或字符数量：\n\
    \n```\nlen(word)\n```\n\n字符串 `\"apple\"` 有五个字符。`len()` 函数总是返回一个整数。这个整数可以作为 `range()`\
    \ 函数中的停止点。将其作为参数，`range` 函数就能为任何单词生成从 `0` 到停止点的正确序列。我们可以将 `len(word)` 作为停止参数传递给\
    \ `range()`。\n\n`i` 将代表每个字母的索引。这个索引可用于访问字母，例如 `word[0]`。在图 2-9 中，你可以看到 range 生成了一个从\
    \ `0` 到 `4` 的数字序列，这完全符合我们对停止点 `5` 的预期。接着，将每个数字传递给方括号，我们就能逐个从字符串中获取字母。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig9_HTML.jpg](img/506186_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9\n\n`range` 函数生成可用作索引的数字\n\n在许多情况下，你可能想获取序列中某个值的位置。这就是为什么我们需要知道每个值的索引。例如，如果我们想替换某个值，或对某个值执行操作，我们就需要知道该值存储的位置。\n"
- fmt: '# Nested for Loops


    The best illustration of nested `for` loops would be a multiplication table. We
    all know how a multiplication table looks like. The concept is quite simple; there
    are two sets of numbers. You take a number from one set and multiply it by the
    number from another set. The set of numbers from 1 to 10 can be created by `range()`.
    The sequence of numbers from 1 to 10 should be printed horizontally. You probably
    noticed that every time we use the `print()` function in the `for` loop, it prints
    each item on a new line. This behavior of the `print()` function could be changed.
    We can see all keyword arguments of any function if we run `help()` on it:


    ```

    help(print)

    ```


    Apparently, the function `print()` has a default argument `end=''\n''`. `''\n''`
    means a new line. Every time the `print()` function is executed, it ends a new
    line character after the printed text. Just for fun, try to replace `''\n''` with
    `''ZZ''`, and it would print `''ZZ''` at the end of each statement. For a multiplication
    table, we would need numbers from 1 to 10 printed horizontally. We can perform
    it this way:


    ```

    for i in range(1,11):

    print( i, end='' '')

    ```


    Then we would need another set of numbers from 1 to 10. This time, we would use
    `j` for a variable:


    ```

    for j in range(1,11):

    print( j, end='' '')

    ```


    Note that as a result of these two `for` loops, we get 20 numbers. The first `for`
    loop iterates and prints ten numbers. So is the second `for` loop. We can move
    the second `for` loop into the scope of the first `for` loop. This will get us
    ten `j`s for every iteration of the outer `for` loop. Next, get rid of the first
    `print` statement and multiply `i` by `j` in the second `print()` function:


    ```

    for i in range(1,11):

    for j in range(1,11):

    print( i*j, end='' '')

    ```


    After we have nested `for` loops, we get 100 numbers printed. The main message
    here is that it would take longer to produce 100 operations than 20. By nesting
    `for` loops, we have drastically increased the time complexity of our program.
    In other words, we made our code run slower.


    Do not get me wrong. I am not saying that you should never use the nested loops.
    There are instances where you have to use nested loops. Like a multiplication
    table. I want you to understand that if you can find a solution without nesting
    loops, that solution would be faster.


    Just before we formalize the multiplication table, we need to add one more `print`
    statement at the end. Although this `print` statement would follow the second
    `for` loop, it would be placed in the scope of the outer `for` loop. That means
    the last `print` statement will be executed as many times as the outer `for` loop
    iterates. Because the last `print` statement is in the scope of the outer `for`
    loop. We need this `print` to add `''\n''` after each set of numbers. It would
    be easier to understand it if you temporarily place something into that `print()`
    function, like `"ZZ"`:


    ```

    for i in range(1,11):

    for j in range(1,11):

    print( i*j, end='' '')

    print(''ZZ'')

    ```


    These little funny labels help you to see what exactly the last `print` statement
    does and how many times it is executed. With the added `print()` function on the
    bottom, it looks more like a multiplication table. We can add a final touch with
    a string format method. This `format` method will help us to space out the numbers
    with an even interval of four spaces between the numbers. As you may remember,
    a string method `format` inserts values into curly brackets. While passing the
    values, we can format them. In our example, `:4` in the curly brackets generates
    four spaces between numbers:


    ```

    for i in range(1,11):

    for j in range(1,11):

    print("{:4}".format(i*j), end='' '')

    print()

    ```


    In Figure 2-10, you can see the final result. The multiplication table exercise
    explains the concept of nested `for` loops very well. For each iteration of the
    outer `for` loop, you are getting `n` iterations of the inner `for` loop. Next
    time you decide to use nested `for` loops, think of a multiplication table and
    the runtime complexity of your code.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig10_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig10_HTML.jpg)


    Figure 2-10 Multiplication table'
