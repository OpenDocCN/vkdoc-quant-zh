    ## 列表推导式


    列表推导式是一种 Python 语法，可以使你的代码运行得更快。这在处理大量数据时尤其重要。在需要抓取数千个网页时，我倾向于使用列表推导式来收集信息。


    在我们讲解列表推导式语法之前，我想让你做一个简单的练习。假设我们有一个 `alist`，里面装满了数字。我们想过滤它，找出所有 `5`。然后我们需要将所有
    `5` 保存到一个新列表中。让我们将其命名为 `blist`。解决方案是：


    ```

    alist = [1,2,3,5,5,5,6,7,5,5]

    blist = []

    for number in alist:

    if number == 5:

    blist.append(number)

    ```


