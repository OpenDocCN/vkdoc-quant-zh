    # 2. Writing Your Own Python Scripts


    In the previous chapter, we have covered all the basics of Python. Here, we will
    take a look at essential control flow statements and will learn how to structure
    a program. We will learn how to use `for` and `while` loops and compose custom
    functions. Also, we will get familiar with a decisive Python data structure –
    dictionary.


    As we move through the chapter, we will solve a couple of interesting and beneficial
    challenges. The exercises we are about to take on will demonstrate how to manipulate
    data with Python. A very necessary skill no matter what field you are in.


    ## Definite Loops


    A definite loop or `for` loop is an essential part of any programming language.
    Very often, you need to do something many times. For example, you need to send
    a Christmas greeting to all your friends. The greeting should be personalized
    and say something like “Merry Christmas {name of your friend goes here}!”. The
    same message should be printed for each of your friends.


    Let’s see how we can do it. For starters, we need to compose a list with names.
    Creating a list of close friends to greet sounds like a natural task in a holiday
    season. Translating the task to Python would look like this:


    ```

    friends = ["Mary", "Paul", "John"]

    ```


    Now we need to iterate through the list and grab name by name. The iteration would
    be possible with a keyword `for` (Figure [2-1](#506186_1_En_2_Chapter.xhtml#Fig1)):


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig1_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    For loop iterating through the list of friends


    ```

    for name in friends:

    print( "Merry Christmas", name)

    ```


    I want to go step by step and explain this example. Let’s start with the anatomy
    of a `for` loop. `for` is a keyword and will be highlighted in `Jupyter`. You
    have to start with the keyword `for` to repeat the task multiple times. After
    `for`, you need to use some variable. Often, in my class people would ask me how
    Python knows we are dealing with names of friends. In fact, “`name`” is a variable
    and can be replaced with any other placeholder. Try to replace “`name`” with “`banana`”
    on lines 3 and 4 in Figure [2-1](#506186_1_En_2_Chapter.xhtml#Fig1), and you’ll
    see exactly the same output. Most of the time, in Python tutorials people use
    the letter `i`, stands for item, as a variable in the for loop. The choice of
    a variable is totally up to you. `in` is an operator, also green. It is referring
    to the next sequence. In plain words, we want to do the following:


    > for variable in sequence:


    > do something to variable


    We are going through the list of items and defining the variable with each value.
    One at a time. In the greetings example, we literally grab a person’s name value
    by value from the list and assign it to the “`name`” variable (Figure [2-2](#506186_1_En_2_Chapter.xhtml#Fig2)).
    That is what’s going on behind the scenes.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig2_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The variable “name” is being defined with each value from the list


    As the definite term implies, a for loop iterates as many times as many elements
    you have in the sequence. Since the `print` statement is in the scope of the for
    loop, it is executed per iteration.


    While you iterate, you can perform any operations on the values. We can insert
    the string method `format()` to make the output nicer. The `format` method will
    place the value of the variable name into curly braces. This method would escape
    the need to use multiple commas in the `print()` function and make our code clean:


    ```

    for name in friends:

    print("Merry Christmas {}! and Happy New Year!".format(name))

    ```


    Most of the time, you would need to combine a `for` loop and `if`, `elif`, or
    `else`. Extending our example, we can say that if Paul is on the list, print the
    “Please give me a call” message. To check each value in the list whether it is
    “Paul”, the `if` statement has to be in the scope of the `for` loop. It will test
    each value, and assuming that Paul is in the list, the `if` condition returns
    `True`. `Logically`, another `print()` function in the scope of the `if` statement
    will be triggered (Figure [2-3](#506186_1_En_2_Chapter.xhtml#Fig3)).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig3_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig3_HTML.jpg)


