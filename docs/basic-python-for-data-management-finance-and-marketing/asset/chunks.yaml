    \ dictionary is passed into the `DataFrame` function, it might use wrong values\
    \ for columns. In our case, the `pd.DataFrame` function used dates for columns,\
    \ which is not a desired outcome. To pivot a two-dimensional data structure, we\
    \ will apply a `T` attribute to the transpose index and columns of the DataFrame:\n\
    \n```python\ndf = pd.DataFrame(dict_of_prices).T\n```\n\nThe attribute `T` is\
    \ an accessor for the `transpose()` method, and you can use them interchangeably.\
    \ With the `T` attribute at the end, `df` should look like in Figure 4-31.\n\n\
