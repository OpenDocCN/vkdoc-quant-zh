    ## Selenium 简介


    我想从一个 [amazon.com](http://amazon.com) 的抓取示例开始介绍 Selenium。我们将打开 [amazon.com](http://amazon.com)
    上的任意产品页面，并收集该产品的信息。打开一个新的 `Jupyter` Notebook，在导入 Selenium 后，将其连接到 ChromeDriver：


    ```

    from selenium.webdriver import Chrome

    ```


    我将创建一个变量 `driver_path` 并指定 ChromeDriver 的相对路径。`Chapter4` 是存放 `Jupyter` 文件和 ChromeDriver
    的文件夹，`programwithus` 是我的主目录。请注意，引号前的小 `r` 对于某些 Windows 用户可能是必需的，对于 Mac 用户则是可选的。另外，Windows
    用户需要包含带有 `.exe` 扩展名的完整文件名，例如 `chromedriver.exe`。


    对于 Mac 用户


    ```

    driver_path = "/Users/programwithus/Chapter4/chromedriver"

    ```


    对于 Windows 用户


    ```

    driver_path = r"/Users/programwithus/Chapter4/chromedriver.exe"

    ```


    在同一个单元格中，将 `driver_path` 传入我们从 Selenium 导入的 `Chrome()` 函数中：


    ```

    page = Chrome(executable_path=driver_path)

    ```

