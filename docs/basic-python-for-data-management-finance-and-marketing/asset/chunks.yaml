    The function lower converts entered words to lowercase strings


    ## Lists and Tuples


    So far, we have learned integer, float, and string types. Here, we will discuss
    lists and tuples. We will start with the most popular data structure – a list.
    A data structure is some kind of collection of items or elements. Most of the
    time, a data structure contains other basic types, like integers or floats. The
    easiest way to think of data structures is to compare them to containers.


    A list is a container that holds items separated by a comma. There is no limit
    to the number of items in the list. The only limit would be a computer memory.


    Usually, I explain a list with a box example. A box is a container where you could
    put stuff. Later, if needed, you can fetch items from the box. To initialize a
    list, we have to assign square brackets to a variable. Continuing with a box example,
    let’s define a variable `box` and assign empty square brackets:


    ```

    box = []

    type(box)

    ```


    You could think of this operation as preparing an empty box to put some stuff
    in. Run the function `type(box)` to confirm that the `box` variable holds a list
    object.


    Suppose we needed to add a bunch of numbers to a list object, how would we do
    it? One option would be to google it; however, the best way would be to see what
    methods come with the list itself. Remember the function `dir()` from the previous
    exercise? Run dir() and pass a variable holding the list object into the function:


    ```

    dir(box)

    ```


    The methods for a list object (Figure [1-27](#506186_1_En_1_Chapter.xhtml#Fig27))
    are completely different from a string or any other data structure.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig27_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig27_HTML.jpg)


    Figure 1-27


    The list methods


    Our goal is to add numbers one by one to the list object. If we take a closer
    look at the list methods, we would see two commands that sound like we can use
    them to add data to the list. They are `append()` and `insert()` in Figure [1-27](#506186_1_En_1_Chapter.xhtml#Fig27).
    If you want to know the difference between them and how to use them, run the `help()`
    function : and


    ```

    help(box.insert)

    ```


    ```

    help(box.append)

    ```


    and


    The main difference between these two is that the `append()` method literally
    appends an item to the end of a list. The `insert()` method on the other hand
    requires not only the item to be inserted but also a location in the form of an
    index. We will review indexing later in this chapter, and for that reason we will
    start with the `append()` method . In a cell, try to append random numbers to
    the list:


    ```

    box.append(70)

    box.append(30)

    box.append(50)

    box.append(10)

    box.append(20)

    ```


    Keep in mind that every time you run the cell, you will see the same number appended
    to the list again. I am going to run the cell once. After that operation, my list,
    `box`, holds all numbers I have appended separated by a comma (Figure [1-28](#506186_1_En_1_Chapter.xhtml#Fig28)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig28_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig28_HTML.jpg)


    Figure 1-28


    The list of numbers


    I hope a box analogy helped you to understand how a list object works. Now it
    is time to give you a more formal definition of a list data structure. A list
    is a sequential data structure that can be ordered in ascending or descending
    order. It is a versatile container. You can add items to a list or remove items
    from a list. The main thing I want you to understand about a list data structure
    is that you do not use a list just to store the data.


    For that, you would use a file or would write data into a database. But you would
    choose to use a list because you want to do something with the items in the container
    down the road. For example, you initialize a list and append numbers to it because
    you want to sort them. There is a built-in method `sort()` (Figure [1-29](#506186_1_En_1_Chapter.xhtml#Fig29)):


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig29_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig29_HTML.jpg)


    Figure 1-29'
  trans: "\n从定义可以看出，`upper()` 方法的作用是“返回一个转换为大写字母的字符串副本”。稍后我们会讨论为什么 `upper()` 方法返回的是对象的“副本”。方法是内置于对象本身的命令；这就是为什么我们需要像这样使用它们：\n\
    \n```\nseason.upper()\n或\n\"winter\".upper()\n```\n\n方法是对象所独有的。如果你在整数或浮点数上运行 `dir()`\
    \ 函数，就不会看到 `upper()` 方法。这很合理。只有字母字符才能转换为大写。\n\n初学者总是问我“我怎么知道哪个是需要将对象作为参数传递的函数，比如\
    \ `len(\"winter\")`，哪个是需要在对象后面加点的*方法*？”答案非常简单。你对一个对象运行 `dir()`，如果你要查找的内容在那个列表中，那么它就是方法，你应该用加点的方式使用它，就像这样：\n\
    \n```\n\"winter\".lower()\n```\n\n另一方面，如果它不在列表中，你就不能把它当作方法运行。一个非常常见的错误是对对象应用了错误的方法。在这种情况下，Python\
    \ 会给出错误信息：“`[类型]` 对象没有属性 `[方法名]`”。人们会一再犯这个错误。请相信我，没有必要去记住一个对象的所有方法。有时候，由于 Python\
    \ 及其扩展会定期更新，这甚至是不可能做到的。你所要做的就是使用 `dir()` 来查看一个对象的所有可用方法。\n\n在我们之前使用 `if` 和 `else`\
    \ 的例子中，为了防止用户使用大写的单词，我们必须使用逻辑运算符 `or`。借助 `lower()` 方法，我们可以将任何输入的字符串转换为小写，而不用担心用户会使用不同的大小写，比如输入\
    \ `\"suNNy\"` 这样的内容。请记住，我们需要保存小写字符串的副本，也就是要将其赋值给一个变量名。在图 1-26 中，你可以看到\"BLIZZARD\"\
    被输入，并在第 3 行被转换为小写。\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig26_HTML.jpg](img/506186_1_En_1_Fig26_HTML.jpg)\n\
    \n**图 1-26**  \n`lower` 函数将输入的单词转换为小写字符串\n\n## 列表与元组\n\n到目前为止，我们已经学习了整数、浮点数和字符串类型。接下来，我们将讨论列表和元组。我们先从最流行的数据结构——列表开始。数据结构是某种项目或元素的集合。大多数情况下，数据结构包含其他基本类型，比如整数或浮点数。理解数据结构最简单的方法是把它们比作容器。\n\
    \n列表是一个容器，它存放的是由逗号分隔的项目。列表中的项目数量没有限制。唯一的限制就是计算机的内存。\n\n通常，我会用一个盒子的例子来解释列表。盒子是一个容器，你可以在里面放东西。之后，如果需要，你可以从盒子里取出物品。要初始化一个列表，我们必须将方括号赋值给一个变量。继续用盒子的例子，让我们定义一个变量\
    \ `box` 并赋值为空的方括号：\n\n```\nbox = []\ntype(box)\n```\n\n你可以把这个操作想象成准备一个空盒子来放一些东西。运行\
    \ `type(box)` 函数可以确认 `box` 变量保存的是一个列表对象。\n\n假设我们需要向一个列表对象中添加一系列数字，该怎么做呢？一个选择是去谷歌搜索；然而，最好的方法是查看列表本身有哪些方法。还记得之前练习中的\
    \ `dir()` 函数吗？运行 `dir()` 并将包含列表对象的变量传入该函数：\n\n```\ndir(box)\n```\n\n列表对象的方法（图\
    \ 1-27）与字符串或任何其他数据结构的方法完全不同。\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig27_HTML.jpg](img/506186_1_En_1_Fig27_HTML.jpg)\n\
    \n**图 1-27**  \n列表方法\n\n我们的目标是逐个向列表对象中添加数字。如果我们仔细查看列表方法，会看到两个听起来可以用来向列表添加数据的命令。在图\
    \ 1-27 中，它们是 `append()` 和 `insert()`。如果你想知道它们之间的区别以及如何使用它们，可以运行 `help()` 函数：\n\
    \n```\nhelp(box.insert)\n```\n\n和\n\n```\nhelp(box.append)\n```\n\n这两个方法的主要区别在于，`append()`\
    \ 方法字面意思就是将一个项目追加到列表的末尾。而 `insert()` 方法不仅需要插入的项目，还需要一个索引形式的位置。我们将在本章后面讲解索引，因此我们先从\
    \ `append()` 方法开始。在一个单元格中，尝试向列表追加随机数字：\n\n```\nbox.append(70)\nbox.append(30)\n\
    box.append(50)\nbox.append(10)\nbox.append(20)\n```\n\n请记住，每次你运行这个单元格时，都会看到同一个数字被再次追加到列表中。我将只运行一次这个单元格。完成该操作后，我的列表\
    \ `box` 保存了我追加的所有数字，并用逗号分隔（图 1-28）。\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig28_HTML.jpg](img/506186_1_En_1_Fig28_HTML.jpg)\n\
    \n**图 1-28**  \n数字列表\n\n我希望盒子的类比能帮助你理解列表对象是如何工作的。现在，是时候给你一个关于列表数据结构的更正式的定义了。列表是一种顺序数据结构，可以按升序或降序排列。它是一个用途广泛的容器。你可以向列表添加项目，也可以从列表中移除项目。关于列表数据结构，我希望你理解的主要一点是，你使用列表并不仅仅是为了存储数据。\n\
    \n为此，你会使用文件或将数据写入数据库。但你选择使用列表，是因为你想在后续对容器中的项目进行某些操作。例如，你初始化一个列表并向其追加数字，是因为你想对它们进行排序。有一个内置方法\
    \ `sort()`（图 1-29）：\n\n![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig29_HTML.jpg](img/506186_1_En_1_Fig29_HTML.jpg)\n\
    \n**图 1-29**\n"
- fmt: '# Sorted list in ascending order


    ```

    box.sort()

    box

    ```


    A list data structure is being sorted in place; that means within the object itself.
    That is why there is no need to assign a `box.sort()` operation to a variable.
    This behavior of a list is called mutability. Mutability is a very important concept
    in programming. It means if the object can be or cannot be changed. A list is
    mutable, and we can add more items with the `append()` method or using the `remove()`
    method get rid of unwanted items from it:


    ```

    box.append(800)

    box.remove(10)

    box

    ```


    As a result of these operations, we have added 800 and dropped 10 from our list
    (Figure [1-30](#506186_1_En_1_Chapter.xhtml#Fig30)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig30_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig30_HTML.jpg)


    Figure 1-30


    We have appended 800 and removed 10 from the list


    A tuple on the other hand is immutable, meaning it cannot be changed. We can create
    a tuple with round brackets:


    ```

    t = (1,2,3,4,5)

    type(t)

    ```


    Run the function `type()` on `t`, and you can see that now we deal with a tuple.
    A tuple is similar to a list. It is also an ordered data structure that can hold
    elements separated by a comma. However, if you run `dir(t)`, you can see that
    besides dunder methods there are only two other methods that we can use – `count()`
    and `index()`. The main difference between a list and a tuple is mutability. Again,
    a list is mutable, and a tuple is immutable.


    Sometimes, people in my classroom would ask "do we really need to go so deep in
    programming concepts like mutability, we just want to use Python." The answer
    is "Yes." This is important especially if you are planning to work with huge data
    sets. The general principle is immutable objects tend to be faster than mutable.
    You can think of list and tuple data structures as an open box and a sealed box.
    In the case of an open box, you can put more stuff in it or may remove something
    from it. So, if later you want to review what you have in an open box, it might
    take some time. In the case of a sealed box, there is no need to waste any time
    on checking. It is sealed and has a label on it saying what''s in it. There will
    be no new items because it is sealed.


    How would you choose a right data structure? Obviously, if we''re talking about
    a carton box and a plastic box, you would choose the one suitable for a job based
    on the box attributes. In programming, it is pretty much the same. Allow me to
    demonstrate it with a simple example. Assume we need to write a program that reads
    a letter from a user. If a user enters `a`, `e`, `i`, `o`, or `u`, the program
    should print `"This letter is a vowel"`. If a user enters any other letter of
    the alphabet, the program should say `"This letter is a consonant"`. For simplicity''s
    sake, let''s assume that `"y"` is always a consonant.


    One approach that quickly comes to mind is to use the `or` operator and chain
    all possible conditions like this:


    ```

    letter = input("Give me a letter ")

    if letter == "a" or letter == "e" or letter =="i" or letter == "o" or letter ==
    "u":

    print("This letter is a vowel")

    ```


    The solution with a bunch of `or` operators is valid, but it is not the most efficient
    one. We can put all vowels into a list and use the `in` operator from Table [1-3](#506186_1_En_1_Chapter.xhtml#Tab3):


    ```

    letter = input("Give me a letter ")

    if letter in ["a","e","i","o","u"]:

    print("This letter is a vowel")

    ```


    The solution with the list is neat. However, the set of vowels would never change.
    On the ground of that, we could use an immutable tuple to pack a constant set
    of the vowel letters:


    ```

    letter = input("Give me a letter ")

    if letter in ("a","e","i","o","u"):

    print("This letter is a vowel")

    ```


    Of course, you will not feel a high rate on a tuple with just five elements (Figure
    [1-31](#506186_1_En_1_Chapter.xhtml#Fig31)). Nevertheless, any tuple would be
    faster than a list, and you can see that difference on a list with more than 10,000
    of items.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig31_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig31_HTML.jpg)


    Figure 1-31


    The program to check if a letter is a vowel or a consonant


    Before you start writing a code, you should ask yourself a question, "would I
    need to add or remove something?" If the answer is yes, then you go with a list.
    Elseways, you can use a tuple. Also, a list structure can be converted to a tuple
    with a built-in function `tuple()`. Vice versa, a tuple object can be converted
    to a list with a `list()` function. We will try them later in this book.


    We will use lists and tuples extensively in this book, and as we move along, we
    will discuss other characteristics of them.'
