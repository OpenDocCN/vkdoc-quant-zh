    经典均值-方差优化有一个替代方案——`CLA`（关键线算法）。`CLA`是一种在曲线上寻找最优投资组合的优化解决方案。它在投资组合管理中非常流行，因为它是唯一专门为不等式约束投资组合优化设计的算法。它在`PyPortfolioOpt`中作为`CLA()`函数实现。`CLA()`函数需要预期收益和协方差矩阵来获取最优投资组合。将我们之前生成的值传入`CLA()`并绘制它（图[6-23](#506186_1_En_6_Chapter.xhtml#Fig23)）：


