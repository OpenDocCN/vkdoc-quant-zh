    ## Histogram Plot


    A histogram is another popular type of graph. Compared to the `plot()` function,
    the `hist()` method requires one set of data. It is often used to illustrate the
    distribution of the data.


    Using Apple stock historic prices, we can calculate the daily returns for the
    stock and plot them as a histogram:


    ```

    stock_return = data[''Adj Close''].pct_change(1)*100

    ```


    The Pandas method `pct_change()` returns the percentage change between the current
    and the prior date. The first value in the `stock_return` Series is `NaN`, and
    we need to throw it out to plot a histogram:


    ```

    stock_return.dropna(inplace=True)

    ```


    After the method `dropna()` removes all `NaN`s, the Series can be passed into
    the `hist()` function as an `x` argument:


    ```

    plt.hist(stock_return)

    ```


    The data passed into the `hist()` function is split in the number of equal-width
    bins. Using the second argument `bins`, you can change the range and, if the number
    of observations allow, get more precise results by increasing the number of bins:


    ```

    plt.hist(stock_return, bins=100)

    ```


    As in the previous example, we will add a title to the histogram plot:


    ```

    plt.title(''Distribution of APPL Daily Return'')

    ```


    Along with the title text, Matplotlib provides options to label horizontal and
    vertical axes. As the name of the `xlabel()` and `ylabel()` functions suggests,
    they can be used to name axes:


    ```

    plt.xlabel(''Daily Percentage Return'')

    plt.ylabel(''Frequency'')

    ```


    With the added title and axis labels, the histogram graph would look like in Figure
    5-5.


    ![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig5_HTML.jpg](images/506186_1_En_5_Chapter/506186_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** The function `hist()` plots the daily returns of a stock


    The histogram plot can be saved as a separate file in png, jpeg, pdf, or svg formats.


    The Matplotlib function `savefig()` will generate a brand-new file with a plot.
    All you need is to provide a unique file name as a string argument:


    ```

    plt.savefig("AAPL return.png")

    ```


    or you can save it as a PDF file:


    ```

    plt.savefig("AAPL return.pdf")

    ```


    Keep in mind that the `savefig()` function should be the last Matplotlib command
    after you run all the statements for the graph you are plotting.


    ## Scatter Plot


    The Python library Matplotlib can use three different backends. I would call them
    here formats. The one we have used so far is a default one called `"inline"`.
    The `"inline"` format generates static images and stores them in a Jupyter Notebook.
    The main advantage of the `"inline"` format is that you can have as many static
    graphs per Jupyter file as you want.


    In the event that you want to use interactivity in plots, you would need to switch
    to `"notebook"` mode. You can have only one interactive image per Jupyter file.
    That is why I would recommend composing the next example in a separate new file.
    Interactive mode requires a magic Python function before you import Matplotlib:


    ```

    %matplotlib notebook

    import matplotlib.pyplot as plt

    ```


    I did not exaggerate when I called a function magical. A magic function is an
    official Python term for functions prefixed with the `%` sign.^([10])


    A scatter plot is one of the essentials in data analysis, and we will use the
    `scatter()` function to map the US population in 2019. The Matplotlib function
    `scatter()` not only plots data but also allows to adjust the size and color of
    dots based on values. We will grab the Excel file with an estimate of the resident
    population for the United States in 2019^([11]) and plot the data as a scatter
    graph. The file is located here: [`https://bit.ly/bookScatterExample`](https://bit.ly/bookScatterExample).


    In addition to the plotting library, we will need Pandas; import it along Matplotlib
    like this:


    ```

    %matplotlib notebook

    import matplotlib.pyplot as plt

    import pandas as pd

    ```


    The Excel file with data is online, and we can read it with the Pandas `read_excel()`
    function.^([12]) The first row is a header, and we can skip it with the keyword
    argument `skiprows=1`:


    ```

    data = pd.read_excel("https://bit.ly/bookScatterExample", skiprows=1)

    ```


    As always, we would need to clean the data a bit and grab only columns that contain
    information:


    ```

    data = data[["State", "Population"]]

    ```


    We will convert population numbers into millions for readability:


    ```

    data["Population_Mill"] = data["Population"]/1000000

    ```


    The data range is too wide, and to plot a neat scatter, we can filter the data
    and get states with a population from two to eight million:


    ```

    filtered_data = data[(data["Population_Mill"] > 2.0) & (data["Population_Mill"]
    < 8.0)]

    ```


    The `scatter()` function is similar to the `plot()` method. It takes `x` and `y`
    values as coordinates. In order to make the code readable, I’ll slice the `filtered_data`
    DataFrame and assign `filtered_data["State"]` to `x` and `filtered_data["Population_Mill"]`
    to `y` variables:


    ```

    x = filtered_data["State"]

    y = filtered_data["Population_Mill"]

    ```


    Now we can pass `x` and `y` objects into `scatter()` and rotate the state names
    on horizontal axes:


    ```

    plt.scatter(x, y)

    plt.xticks(rotation=90)

    ```


    The `%matplotlib notebook` has generated us an interactive graph (Figure 5-6).
    The menu under the plot allows us to zoom in and move data around. The little
    diskette works as a save button.


    ![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig6_HTML.jpg](images/506186_1_En_5_Chapter/506186_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Scatter plot of the US state population in millions


    I have mentioned before the Matplotlib function `scatter()` lets us control the
    size and color of the dots with keyword arguments `s` and `c`. We can make the
    scatter plot more presentable by assigning `filtered_data["Population_Mill"]`
    data as the size and color. I’ll magnify the data dots by raising the values into
    a power of four:


    ```

    size = filtered_data["Population_Mill"]**4

    color = filtered_data["Population_Mill"]

    plt.scatter(x, y, s=size, c=color)

    ```


    Some dots are overlapping others, and to make them transparent, we will add another
    Matplotlib styling attribute `alpha`. The value under 1 makes the plot more transparent:


    ```

    plt.scatter(x, y, s=size, c=color, alpha=0.5)

    ```


    As all Matplotlib plotting functions, `scatter()` allows to provide colormaps
    either custom or the one you can choose from the documentation. (You can find
    all colormaps listed here: [`https://matplotlib.org/stable/tutorials/colors/colormaps.html`](https://matplotlib.org/stable/tutorials/colors/colormaps.html).)
    From the list, I have picked the `"plasma"` colormap and will pass it into the
    `scatter()` function with the attribute `cmap="plasma"`. The scatter plot will
    be more informative if we add a colorbar scale (Figure 5-7):


    ![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig7_HTML.jpg](images/506186_1_En_5_Chapter/506186_1_En_5_Fig7_HTML.jpg)


    **Figure 5-7** Scatter plot with a colorbar scale


    ```

    plt.scatter(x, y, s=size, c=color, alpha=0.5, cmap="plasma")

    plt.colorbar()

    ```


    We defiantly should add a title and vertical axis label. I think the plotted data
    will look better if we increase the figure size to 10 by 8. We need to define
    `figsize` in the function `figure()` before using `scatter()`, so insert the statement
    `plt.figure(figsize=(10,8))` into the code:


    ```

    plt.figure(figsize=(10,8))

    plt.scatter(x,y, s=size, c=color, alpha=0.5, cmap="plasma")

    plt.xticks(rotation=90)

    plt.colorbar()

    plt.title("The States with population estimates between 2 and 8 million, 2019")

    plt.ylabel("Population in millions")

    ```'
