    ## Footnotes


    ### 4. Gathering Data with Python


    Information is an essential piece of data analysis. It comes from diverse sources
    in different formats. Some information requires a lot of effort to obtain; other
    data comes clean and structured. Python is a great tool to gather and manipulate
    any data in any format. Programming has automated the tedious manual process of
    copying and pasting information from online sources to spreadsheets. In this chapter,
    we will discuss various approaches to gathering data. We will start with web scraping,
    the process of crawling websites and grabbing information. If information is out
    there and intended for public use, why not utilize it? Of course, all gathered
    data should be used solely in legal intentions. Also, we will work with APIs.
    All big respected companies provide APIs to their services. Google and Twitter
    tech giants even have Python libraries to make developers’ life easier. Some companies
    would charge for information; others would give it for free unless you want to
    make a commercial use out of it. Numerous libraries to obtain data from online
    sources are one of the reasons why Python is so popular.


    ### Web Scraping


    Web scraping is a method of extracting data from websites. The process always
    starts with a first step – sending a request to a server and receiving the data
    as a response. Usually, we use a browser to read the information from the Web.
    In the computer world, a browser is called a client. A client sends a request
    for information to a server. You enter a URL (Uniform Resource Locator) address
    on the top of the browser page, and it sends a message to a server requesting
    for information. Based on that request, the server would send back a message with
    data. The data comes as HTML (Hypertext Markup Language). A web browser interprets
    that information, and we see images and text with styles and colors. When we scrape
    websites, Python acts as a client and sends a request to a server. Python does
    not understand HTML, and received data has to be converted into a string, the
    data type Python can naturally work with.


    There are several Python packages to communicate with a server. In this book,
    we will use a very popular Requests library. A Requests method sends a request
    message to a server and handles the response. There is no need to download a Requests
    package because it is included in Anaconda.


    For further examples, you would need a Google Chrome browser. Chrome comes with
    developer tools. All other browsers would require additional downloads to get
    developer tools. If you do not have a Chrome browser installed, download it from
    [`www.google.com/chrome/`](http://www.google.com/chrome/). Assuming that most
    of us already have Chrome installed, make sure you have a current version.


    Before we get to the scraping part, I would like to explain the nuts and bolts
    of web scraping on the outdated site: [`http://shakespeare.mit.edu/romeo_juliet/romeo_juliet.1.0.html`](http://shakespeare.mit.edu/romeo_juliet/romeo_juliet.1.0.html).
    Open the link in a Chrome browser, and you’ll see the web page looking like from
    the 1990s. No images or animation on the site, just plain text. That is exactly
    what we need to understand the main steps in the web scraping process.


    First things first, we need to send a request to the server and fetch the website.
    This is where Python’s Requests library comes in handy. The Requests library has
    the method `get()` to request information from a server. If a request is successful,
    the server sends the information back with a success code 200. Otherwise, the
    server would send a message with different error codes like 403 or 404. You have
    probably seen a 404 error message before when the browser returns “page not found.”
    You do not need to know all the codes to scrape data. Just keep in mind that code
    200 means everything is OK. Any other code number would mean that something went
    wrong.


    Getting along with the “Romeo and Juliet” page in a Jupyter cell, import the Requests
    library:


    ```

    import requests

    ```


    Sending a request to the server requires the method `get()` with the URL you are
    trying to fetch, like this:


    ```

    page = requests.get("http://shakespeare.mit.edu/romeo_juliet/romeo_juliet.1.0.html")

    ```


    The method `get()` returned response 200, meaning that data was received (Figure
    [4-1](#506186_1_En_4_Chapter.xhtml#Fig1)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig1_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig1_HTML.jpg)


    Figure 4-1

    Sending a request and receiving a response with the `requests.get()` method


    The variable `page` holds a Python object. The returned Python object can be parsed
    as a string that would form a structure looking similar to an HTML markup. The
    most popular Python library to work with HTML is BeautifulSoup. The library name
    was inspired by the title of the poem in the *Alice in Wonderland* novel.'
