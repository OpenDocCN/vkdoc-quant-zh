    ```\n```"
- fmt: '为了量化资产风险，`PyPortfolioOpt`包含了风险模型，其中之一是协方差矩阵。之前，我们使用了`pandas`的`cov()`方法；这次，我们将运行从文件开头导入的`risk_models`模块中的`sample_cov()`函数：


    ```

    sigma = risk_models.sample_cov(prices)

    ```


    `sample_cov()`函数接收价格数据并返回年化结果。与之前的例子相比，无需再将结果乘以252个交易日，因为该操作已包含在`sample_cov()`中。


    基于预期收益率和协方差，我们可以计算已导入的有效前沿函数`EfficientFrontier`。


    除了收益率和协方差，你还可以通过元组列表的形式为所有股票提供权重边界。在前一个例子中，我们假设投资组合中持有50%的`MSFT`，以及各25%的`AAPL`和`IBM`。如果目标是设置精确值，则需将`weight_bounds
    =[(0.5,0.5),(0.25,0.25),(0.25,0.25)]`作为关键字参数传入。否则，投资组合中所有头寸将默认为`(0,1)`，意味着每项资产的最小值为0，最大权重为投资组合的100%。如果投资组合包含空头头寸，则应将`weight_bounds`设置为`(-1,1)`。我建议保留默认值`(0,1)`，看看最优结果是什么：


    ```

    efficient_front = EfficientFrontier(mu, sigma, weight_bounds=(0,1))

    ```


    `EfficientFrontier`函数始终返回一个对象（图[6-15](#506186_1_En_6_Chapter.xhtml#Fig15)）。


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig15_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig15_HTML.jpg)


    图 6-15 生成股票投资组合的有效前沿


    `PyPortfolioOpt`的任务是优化股票投资组合。换句话说，`PyPortfolioOpt`为我们提供了如何更好地构建投资组合以实现投资目标的指导。


    例如，如果我们的投资目标是降低波动性至最小，我们可以通过有效前沿对象的`min_volatility()`属性获取建议的资产分配：


    ```

    min_vol_weights = efficient_front.min_volatility()

    ```


    根据`PyPortfolioOpt`，将全部资产的52%分配至`IBM`，17%至`AAPL`，30%至`MSFT`，将为我们提供在最低波动水平下的最大回报（图[6-16](#506186_1_En_6_Chapter.xhtml#Fig16)）。


    ![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig16_HTML.jpg](images/506186_1_En_6_Chapter/506186_1_En_6_Fig16_HTML.jpg)


    图 6-16 计算投资组合中股票权重以最小化波动性


