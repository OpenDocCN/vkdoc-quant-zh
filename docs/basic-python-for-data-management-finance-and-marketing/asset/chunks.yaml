    你可以通过点击 **帮助** 并选择下拉菜单中的 **键盘快捷键**，查看 **Jupyter** 的所有命令快捷键列表。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig5_HTML.jpg](img/506186_1_En_1_Fig5_HTML.jpg)


    图 1-5


    当我们用更新后的代码重新运行单元格后，消息发生了变化。你需要记住的要点是：如果你更新了代码或编写了新语句，务必运行或重新运行该单元格。不必过分关注 `[]`
    中的数字。另外，你文件中的数字不必与这些图中我文件里的数字保持一致。


    让我简单介绍一下内核（Kernel）。**Jupyter** 中的内核负责执行 Python 代码。它默默地在后台完成工作。有时，运行单元格后，你可能会在方括号中看到一个星号。这个星号
    `[*]` 表示内核正在工作。对大型数据集执行复杂操作可能需要一些时间，这是正常现象。然而，如果一个简单操作耗时过长，则可能表明出了问题，**Jupyter**
    已崩溃。要清空文件内存并重新开始，你需要点击顶部工具栏中的 **内核** 项。下拉菜单会提供 **重新启动** 服务器或 **重启并清除输出** 的选项。如果你选择
    **重启并清除输出**，文件中仍会保留你的代码，但方括号会被清空，这意味着内存中的所有操作都已被成功清除。


    我们已经介绍了足够的 **Jupyter** 知识，可以开始编写代码了。其他所需内容，我们会在学习过程中逐步掌握。如果将来你想更深入地了解 **Jupyter**
    Notebook 应用程序，我强烈推荐你访问他们的网站：[`https://jupyter.org`](https://jupyter.org)。


    ## 变量与数值类型


    你可能知道计算机有两种内存类型。一种是长期内存，用于保存文件或作为数据库存储信息；另一种是短期内存，即随机存取存储器（RAM），用于运行应用程序。虽然 Python
    是一种编程语言，但它运行在短期内存中。


    要在 Python 中存储信息，我们需要使用变量。编程中的变量类似于我们在学校数学课上学到的概念。例如，表达式 `X + Y` 中的 `X` 和 `Y` 就是变量。它们之所以被称为变量，是因为它们可以是任何东西，并且可以包含任何值。


    Python 也是如此。如果我们需要保存一个值以便稍后使用，就需要声明一个变量。简单来说，我们需要想出一个变量名并为其赋值。例如，我们可以随意选取一个名称
    `x`，然后用等号赋予它值 `7`。在我们的 **Jupyter** 单元格中，看起来就像这样：


    ```

    x = 7

    ```


    之后别忘了运行那个单元格。你可以在我的 GitHub 仓库中找到本章及所有其他章节的完整代码：[`https://github.com/programwithus/Basic-Python-for-Data-Management-Finance-and-Marketing`](https://github.com/programwithus/Basic-Python-for-Data-Management-Finance-and-Marketing)。让我们仔细看看这个表达式。`x`
    是一个随意选取的变量名。我们本可以使用任何名称作为变量名。顺便说一句，“banana” 也完全可以胜任。这完全由我们自己决定。在本章后面，我们将讨论命名约定的最佳实践。


    然而，也有一些限制。你不能以数字开头来命名变量。此外，还有一些所谓的保留字或关键字是不能使用的。**Jupyter** 在识别哪些词不能用作变量方面做得很好。它会用加粗的绿色标记出来。看看图
    1-5 中的关键字 `print`。`print` 是一个内置命令，不能用作变量。你需要记住的一点是，变量必须始终位于等号的左侧。等号用于定义变量并赋值。而值则是更有趣的部分。


    我们赋给变量 `x` 的值 `7`，必须以某种方式存储在 Python 的内存中。


    这些值会以某种**数据类型**被存储。许多 Python 教程将数据类型解释为数据项的分类。这主要是为了让计算机知道我们未来打算如何使用这些数据。当我第一次听到这个解释时，觉得非常令人困惑。让我来提供我自己对数据类型的解释。


    拿起一瓶在任何商店都能找到的简单纯净水。水是值，而塑料瓶是容器。然后假设你在咖啡店点了一杯水。他们会用玻璃杯给你端上同样的纯净水。显然，塑料瓶和玻璃杯之间有很大区别。首先，瓶子有盖子，能防止水漏出来。塑料瓶和玻璃杯是不同类型的容器，但它们装着相同的水——这个值。我们理解不同的容器有不同的特性，并且表现方式也不同。我想表达的观点是，根据你对这个值（本例中是水）的用途，你应该选择合适的容器。如果你打算进入卖纯净水的行业，你应该为你的值选择塑料瓶或带有花哨标签的铝罐。这和在餐厅喝一杯水形成了对比。如果你计划进行公路旅行，也许你应该把你的水储存在旅行杯或保温杯中。

