- fmt: 'Run the cell, and the `Chrome()` function should launch a browser window with
    a note on top, “Chrome is being controlled by automated test software”. Now the
    `page` variable holds an instance of the browser managed by Python code. In case
    you get a `FileNotFoundError` with a message `"chromedriver executable needs to
    be in PATH"`, check the `driver_path` and make sure it leads to the ChromeDriver
    file correctly.


    If a browser window popped up, you are ready to scrape data. The scraping process
    itself will be similar to what we did earlier with `BeautifulSoup`. First, we
    need to fetch the website. The `page` variable will hold the Python Selenium object.
    Then find the hooks for HTML elements in the Selenium object. Only this time the
    Selenium `Chrome()` function will replace the `requests.get()` method and the
    `BeautifulSoup()` function.


    Navigate to [amazon.com](http://amazon.com) and choose any product you like. I
    have chosen the Ring Video Doorbell. You can see it here: [`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869).
    You can choose any product on [amazon.com](http://amazon.com) for this example.


    Usually, the Amazon URL is much longer than [`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869).
    Amazon and other big companies collect a lot of marketing information about their
    customers – information such as the region, browser, and timezone the request
    is coming from – and add it to a URL after the `?` sign. These additional parameters
    after the `?` sign are not important for us and can be removed. In short, any
    product sold on Amazon would have an ASIN number, a unique identifier. The ASIN
    number is the part of a product URL that comes after `/dp/`.


    As a matter of fact, any URL usually contains some kind of unique identifier either
    as a numeric ID or a slug. A slug is a distinctive part of a URL referring to
    a particular piece of information. For example, the [`www.cnn.com/style/article/new-years-eve-ball-design-history/index.html`](http://www.cnn.com/style/article/new-years-eve-ball-design-history/index.html)
    URL has a `new-years-eve-ball-design-history` slug that is unique and leads to
    the “A brief history of the Times Square New Year’s Eve ball drop” article on
    [cnn.com](http://cnn.com). So, if you are trying to fetch a web page, spend a
    couple of minutes understanding a URL pattern of the website you want to grab
    information from.


    On Amazon, all products are stored in a database under ASIN and can be accessed
    by [`www.amazon.com/bp/`](http://www.amazon.com/bp/) plus ASIN. Anything else
    in the Amazon URL is optional parameters.


    Sending a request to the Amazon server for the [`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869)
    URL would require the Selenium method `get()`:


    ```

    page.get("https://www.amazon.com/dp/B08N5NQ869")

    ```


    The method `get()` will launch a browser window and return an instance of the
    Ring Video Doorbell web page (Figure [4-19](#506186_1_En_4_Chapter.xhtml#Fig19)).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig19_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig19_HTML.jpg)


    Figure 4-19 Selenium has taken a control over a Chrome browser and opened a product
    page


    Suppose we want to gather the product name and the price from the page. The routine
    to find HTML hooks will be the same as we did before. Navigate to the product
    name, click the right button on a mouse, and inspect the element in Chrome Developer
    Tools.


    As you can see in Figure [4-20](#506186_1_En_4_Chapter.xhtml#Fig20), the product
    name in Chrome Developer Tools fully matches the title on a page.


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig20_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig20_HTML.jpg)


    Figure 4-20 Examining a web page element with Chrome Developer Tools


    If for some reason you cannot see the title highlighted in your browser, click
    the text inspect one more time.


    We need to choose an HTML tag to grab the element by. As in the previous example,
    we can get an HTML element by the class. However, I think that the `"a-size-large"`
    class (Figure [4-20](#506186_1_En_4_Chapter.xhtml#Fig20)) might be used somewhere
    else on that page. The `Id` attribute would be a better choice because `id` is
    unique. `"productTitle" id` cannot be used again in HTML code on the same page.
    To fetch the title by `id`, we would need to use the Selenium method `find_element_by_id()`.
    You can find all available the Selenium locating elements methods either by going
    to the documentation^([⁸](#fn8)) or running the `dir()` function on the object
    stored under the `page` variable:


    ```

    dir(page)

    ```


    The `find_element_by_id()` method is easy to use. All you have to do is to pass
    the element’s `id` attribute. Selenium locating elements methods return objects,
    and converting them to strings requires a `text` method.


    In the same cell, create the variable `title` to hold a product name, and using
    the `find_element_by_id()` method, fetch the information:


    ```

    title = page.find_element_by_id("productTitle")

    title = title.text

    print(title)

    ```


    The same process can be used to grab the price of a product. If we point on the
    price and inspect it, we will see that Amazon uses `priceblock_ourprice` `id`
    for a $99.99 value. Take into account that if you are expecting a different product
    page on Amazon, there might be another `id` attribute for a price. Based on my
    research, they also use `"priceblock_dealerprice"`.


    In the same cell, I’ll get the price for the product. This time, I’ll chain a
    text method to `page.find_element_by_id()`:


    ```

    price = page.find_element_by_id("priceblock_ourprice").text

    print(title, price)

    ```


    By now, you probably have two or three Chrome browsers opened. The method `close()`
    after we get the looked-for information will shut down a browser.


    In Figure [4-21](#506186_1_En_4_Chapter.xhtml#Fig21), you can see the name and
    price for a product we fetched.


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig21_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig21_HTML.jpg)


    Figure 4-21 Fetching the name and price of a product from [amazon.com](http://amazon.com)


    Selenium is a truly automation solution. Besides grabbing data from HTML, you
    can fill web forms and imitate mouse clicks. Let’s consider an example of gathering
    information on all Ring Video Doorbells available on Amazon. Our first step would
    be to find all ASIN numbers in the category.


    On the top of the Amazon page, there is a search prompt. We can program Selenium
    to insert a name of a product we are interested in and submit the search. In order
    to do that, we would need to use the Selenium module `Keys`. The `Keys` module
    implements all major keyboard functions.


    Import the `Keys` module right under the Selenium Chrome function in the upper
    cell and rerun the cell:


    ```

    from selenium.webdriver import Chrome

    from selenium.webdriver.common.keys import Keys

    ```


    In the next cell, comment out for now `title` and `price` statements and replace
    the product URL we have been using with the [`www.amazon.com`](http://www.amazon.com)
    Amazon landing page, like in Figure [4-22](#506186_1_En_4_Chapter.xhtml#Fig22).


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig22_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig22_HTML.jpg)


    Figure 4-22 Preparing a Selenium setup to enter values in the input prompt on
    web pages


    Before we will fill in a search prompt with a desired product name, we will need
    to locate the input in HTML code. Open [`www.amazon.com`](http://www.amazon.com)
    in a web browser, navigate the mouse on the text box, and click with a right button
    to inspect the element. Locate the text box attribute we could use to grab the
    element in HTML. I think `id="twotabsearchtextbox"` would be perfect to capture
    a text box (Figure [4-23](#506186_1_En_4_Chapter.xhtml#Fig23)).'
