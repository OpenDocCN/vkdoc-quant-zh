- fmt: "# Structuring a Program\n\nIt is time to put into practice everything we have\
    \ learned so far. Here, we will program one of the oldest word games, Pig Latin.\
    \ The idea behind this exercise is to learn how to manipulate data and structure\
    \ the code.\n\nIf you have never played Pig Latin, the rules are very simple.\
    \ You ask a user for any word. If a word starts with a vowel, then you need to\
    \ add `\"yay\"` at the end. For example, `apple` would become `appleyay`. However,\
    \ if a word starts with a consonant, you would need to cut off all consonants\
    \ before the first vowel in the word and add them to the end of the word. Also,\
    \ you need to append `\"ay\"` to a word beginning with a consonant. The word `scratch`\
    \ would become `atchscray`.\n\nIf at first the problem sounds too complicated\
    \ and you have no idea how to approach it, start with a pseudocode.\n\nA pseudocode\
    \ is an outline in plain words of an algorithm you are about to implement. You\
    \ can think of it as a road map. On a piece of paper, write all the steps you\
    \ need to do to accomplish the task. Pretend that you are trying to explain to\
    \ a kid how to play Pig Latin step by step. The pseudocode code solution for Pig\
    \ Latin might look like this:\n\n1.  Ask a user for a word.\n2.  Check if the\
    \ word starts with a vowel.\n3.  If the word starts with a vowel, add “yay” and\
    \ save with a variable.\n4.  If the word starts with a consonant, we need to check\
    \ all letters and find the first vowel.\n5.  To remove the letters before the\
    \ vowel, we need to know the index of the vowel.\n6.  Store all removed consonant\
    \ letters using the variable `firstpart`.\n7.  Get the rest of the letters and\
    \ store them with the variable `secondpart`.\n8.  Concatenate `secondpart` with\
    \ `firstpart` and add “ay”.\n\nThe problem broken down into baby steps is easier\
    \ to solve. If you do not know how to implement a step in Python, you could always\
    \ google it. OK, now we can start and translate our plan into Python.\n\nFor simplicity,\
    \ I assume that a user has entered the word `apple`:\n\n```\nword = \"apple\"\n\
    ```\n\nNow we need to check if the first letter is a vowel. Grabbing the first\
    \ character from a string sounds like an indexing. The first index is always 0,\
    \ so the first letter would be `word[0]`. In the previous chapter, we coded a\
    \ solution to check if a letter was a vowel. We can use it here:\n\n```\nif word[0]\
    \ in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n    print(\"This letter is a vowel\")\n\
    ```\n\nSince `\"apple\"` begins with a vowel, according to step 3 we will add\
    \ “yay” to it. The new Pig Latin word would be saved under the name `result`:\n\
    \n```\nif word[0] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n    result = word + \"\
    yay\"\n    print(result)\n```\n\nAdd a print statement to check the `result`'s\
    \ value and run your code. Make sure the solution works on words that begin with\
    \ a vowel. The first part was simple to solve. We are halfway there.\n\nFor the\
    \ second half, we would need a word starting with a consonant. Reassign the variable\
    \ `word` to `\"scratch\"`. There are only two options: a word either starts with\
    \ a vowel or not. Logically, it sounds like `if` and `else` statements. So far,\
    \ we have implemented the `if` part; now we compose the `else` part.\n\nStep 4\
    \ in the pseudocode requires testing all letters in a word and finding the first\
    \ vowel.\n\nTo find a vowel, we would need to iterate through the characters of\
    \ a string or, translating this task into Python, run a `for` loop operation.\
    \ Step 5 suggests that when we find a vowel in the word, we would need to get\
    \ hold of the index of the vowel. The function `range()` will be handy to identify\
    \ an index. Translating steps 4 and 5 into code would look like this:\n\n```\n\
    word = \"scratch\"\nif word[0] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n    result\
    \ = word + \"yay\"\nelse:\n    for index in range(len(word)):\n        print(index,\
    \ word[index])\n```\n\nThe `print` statement helps us to make sure we are on the\
    \ right track, and `index` represents the index of each letter in `word`. As you\
    \ may remember, to fetch a character from a string by an index, we would need\
    \ to pass it into square brackets as follows: `word[index]`. It would be easy\
    \ to identify a vowel because we just did it in the first part. We need to replace\
    \ `0` with `index`:\n\n```\nword = \"scratch\"\nif word[0] in [\"a\",\"e\",\"\
    i\",\"o\",\"u\"]:\n    result = word + \"yay\"\nelse:\n    for index in range(len(word)):\n\
    \        if word[index] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n            print(index,\
    \ word[index])\n```\n\nThe `print` statement in the scope of the `if` statement\
    \ reveals the vowel and its index. In the word `\"scratch\"`, the index of the\
    \ vowel is `3`. In keeping with the pseudocode, we need to split the word by the\
    \ vowels’ index. We do not want to hardcode it, meaning using `3` explicitly,\
    \ due to the fact that in another word a vowel might be at a different location.\
    \ Using slicing, we can grab all consonants in the word `\"scratch\"` before the\
    \ vowel `\"a\"`. So, step 6 would look in the following way:\n\n```\nfirstpart\
    \ = word[0:index]\n```\n\nSimilarly, we will slice all other letters after the\
    \ vowel:\n\n```\nsecondpart = word[index : ]\n```\n\nThe stop point is left blank\
    \ because we want to get all characters after the index. The last step in the\
    \ pseudocode is simple. To be consistent, we will use the same variable `result`\
    \ and concatenate `secondpart` with `firstpart` and “ay”:\n\n```\nword = \"scratch\"\
    \nif word[0] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n    result = word + \"yay\"\n\
    else:\n    for index in range(len(word)):\n        if word[index] in [\"a\",\"\
    e\",\"i\",\"o\",\"u\"]:\n            firstpart = word[0:index]\n            secondpart\
    \ = word[index : ]\n            result = secondpart + firstpart + \"ay\"\n```\n\
    \nAssign the function `input()` to `word` and test your code with different words;\
    \ make sure it works. One thing is bothering me; the words with two or more vowels\
    \ are returning the wrong results. If you try the word `\"brackets\"`, the result\
    \ will be `\"etsbeackyay\"`. I believe the rule says we need to identify the first\
    \ vowel. If we need the code to stop after the first instance of a vowel, we need\
    \ to conclude the `if` statement with the keyword `break`. In Figure [2-15](#506186_1_En_2_Chapter.xhtml#Fig15),\
    \ you can see the whole solution of the Pig Latin challenge.\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig15_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig15_HTML.jpg)\n\
    \n**Figure 2-15** Pig Latin game programmed in Python\n\nOur code can be refactored\
    \ to improve the design and structure. I would start with `if` statements. The\
    \ list of vowels is used twice in our code. Wouldn’t it be easier and neater if\
    \ we had a function to tell us whether a letter was a vowel? We can compile a\
    \ little helper function which would take a letter as an argument and return either\
    \ `True` or `False`. I’ll call this function `is_vowel`:\n\n```\ndef is_vowel(letter):\n\
    \    if letter in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n        return True\n    else:\n\
    \        return False\n```\n\nNext, we can wrap the Pig Latin game code as a function.\
    \ I’ll call this function `game`. The purpose of the function would be to accept\
    \ any string, we will define it as `word`, and return the Pig Latin variant:\n\
    \n```\ndef game(word):\n    if is_vowel(word[0]):\n        result = word + \"\
    yay\"\n    else:\n        for index in range(len(word)):\n            if is_vowel(word[index]):\n\
    \                firstpart = word[0:index]\n                secondpart = word[index\
    \ : ]\n                result = secondpart + firstpart + \"ay\"\n            \
    \    break\n    return result\n```\n\nWithin the function `game`, we will be calling\
    \ the function `is_vowel` to check if a letter is a vowel. You can test the function\
    \ `game` and call it with any word:\n\n```\ngame(\"scratch\")\n```"
