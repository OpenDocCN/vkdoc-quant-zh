    for i in phone_book:

    print(i, phone_book[i])

    ```


    Another iteration technique requires the `items()` method:


    ```

    for i in phone_book.items():

    print(i)

    ```


    As you can see, the `i` variable represents a tuple. The method `items()` has
    converted `phone_book` into a list of tuples`.` Technically, after `items()` has
    been applied, we iterate through a list of tuples. Each tuple contains exactly
    two values what used to be a key and a value. To extract a key and a value, we
    need to unpack the tuple. One way would be to index the key and the value:


    ```

    for i in phone_book.items():

    print(i[0], i[1])

    ```


    However, we can assign variables to the first and second elements in a tuple:


    ```

    key, value =  ("John", 2123458967)

    ```


    If we go with logic, then the for loop would require two variables and will look
    like this:


    ```

    for key, value in phone_book.items():

    print(key, value)

    ```


    In Figure [2-24](#506186_1_En_2_Chapter.xhtml#Fig24), you can see that the two
    solutions are producing the same results. It is up to you which technique to use
    at the end of the day.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig24_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig24_HTML.jpg)


    Figure 2-24


    Iterating through a dictionary with a for loop


    One simple exercise will sum up getting values from a dictionary and adding new
    keys and values.


    Suppose we have a menu in a restaurant stored as a dictionary:


    ```

    menu = {"Burger": 3.75, "Soda": 0.99, "Nachos": 2.99, "Shake":1.25}

    ```


    Using an input function, we will ask a user for two items from the menu:


    ```

    item_one = input("What would you like?)

    item_two = input("What else would you like?)

    ```


    After we get the desired items, we can fetch the price from the dictionary using
    them as keys:


    ```

    price_one = menu[item_one]

    price_two = menu[item_two]

    ```'
