    Following the description of `where()`, we can\ncompile that logical expression\
    \ as\n\n```\nportfolio[\"greater_five\"] = np.where(portfolio.PL_per_share >5,\
    \ True, False)\n```"
  trans: "\n# Pandas 中的逻辑运算\n\n当你需要根据某个条件采取行动时，就需要用到逻辑运算。如果一个条件为`True`，则对数值进行相应操作。在\
    \ Pandas 中，有三种不同的方法可以执行逻辑运算。我最喜欢的是 `lambda`，我会先解释这个方法。\n\n`lambda` 是 Python 中的匿名函数——换句话说，它是一个没有名称、像表达式一样运行的函数。初学者会觉得\
    \ `lambda` 有点令人困惑，但它其实没那么难，请相信我——前提是你掌握了语法，并练习了 `lambda` 语法几次。\n\n我将从单一表达式的 `lambda`\
    \ 开始。假设我们想将`portfolio` DataFrame 中每只股票的数量加倍。最简单高效的方法是使用 `portfolio.Qty * 2`。但是，为了解释\
    \ `lambda`，我会用不同的方式来实现。向量化运算的替代方案是逐一处理`Qty`列中的每个值，并将每个值自身相加。这听起来像是在遍历一列。我们不想使用\
    \ `for` 循环来遍历列，因为它会拖慢处理速度。遍历 Series 最有效的方法是使用 `apply()` 方法。官方文档指出，`apply()` 方法接受另一个函数，并将其应用于列中的所有值。为了将股票数量加倍，我们需要编写一个函数并将其传递给\
    \ `apply()` 方法。\n\n让我们定义一个简单的函数，它从`Qty`列的每一行中获取股票数量，并将它们自身相加：\n\n```\ndef double(num_shares):\n\
    \    return num_shares + num_shares\n```\n\n现在我们有了一个函数，我们将把它应用于 Series `portfolio.Qty`\
    \ 中的每个值：\n\n```\nportfolio.Qty.apply(double)\n```\n\n请记住，当你在其他函数（如 `map()`、`filter()`\
    \ 或 `apply()` 方法）中将其用作辅助函数时，不需要在末尾加括号。这就是为什么我们在 `apply()` 方法中将 `double` 函数调用为\
    \ `apply(double)`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig29_HTML.jpg](img/506186_1_En_3_Fig29_HTML.jpg)\n\
    \n**图 3-29** 将 double 函数应用于 Series 中的所有值\n\n通常，我们定义函数是因为我们想反复使用它。我怀疑 `double`\
    \ 函数以后是否还会被用到。有没有更好的方法？答案是肯定的；我们可以用 `lambda` 替换函数。\n\n要编写 `lambda` 表达式，你需要记住以下设置。始终以\
    \ `lambda` 关键字开头。在 `lambda` 中，有两个部分由冒号字符分隔。在第一部分，你定义一个或多个变量，这些变量会传入 `lambda`。在第二部分，你编写一个表达式，这是\
    \ `lambda` 将作为结果返回的内容。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig30_HTML.jpg](img/506186_1_En_3_Fig30_HTML.jpg)\n\
    \n**图 3-30** Lambda 语法\n\n无需使用 return 操作符，因为 `lambda` 总是返回结果。请记住，`lambda` 必须在函数内部使用，或者可以作为一个表达式赋值给一个变量名。我们可以将\
    \ `double` 函数重写为 `lambda` 表达式：\n\n```\nlambda num_shares: num_shares + num_shares\n\
    ```\n\n这个表达式可以替换 `apply()` 方法中的 `double` 函数：\n\n```\nportfolio.Qty.apply(lambda\
    \ num_shares: num_shares + num_shares)\n```\n\n如果我们想保存该操作的结果，可以将其分配给一个新的列名。\n\n\
    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig31_HTML.jpg](img/506186_1_En_3_Fig31_HTML.jpg)\n\
    \n**图 3-31** 将股票数量加倍并将结果保存到新列名下\n\n`lambda` 可以与 `if` 和 `else` 语句一起使用。语法如下所示：\n\
    \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig32_HTML.jpg](img/506186_1_En_3_Fig32_HTML.jpg)\n\
    \n**图 3-32** 带有 `if` 和 `else` 条件的 Lambda 语法\n\n通过 `lambda` 基于 `if` 和 `else` 语句返回结果，我们可以在一个\
    \ Series 或整个 DataFrame 上执行逻辑运算。举例来说，我们可以根据价格提供买入或卖出股票的建议。假设股票价格低于 118 美元，我们就在新列\
    \ `Rating` 中记录 `Buy`。否则，在 `Rating` 列中记录 `Sell`。`apply()` 方法中的 `lambda` 表达式如下所示：\n\
    \n```\nlambda stock_price: \"Buy\" if stock_price < 118 else \"Sell\"\n```\n\n\
    同样，`stock_price` 是一个准确描述该值的变量。我们所要做的就是将 `lambda` 表达式传递给 `apply()` 方法，并将结果保存在名为\
    \ `Rating` 的列下：\n\n```\nportfolio[\"Rating\"] = portfolio.Price.apply(lambda stock_price:\
    \ \"Buy\" if stock_price < 118 else \"Sell\")\n```\n\n`Rating` 列保存了基于我们应用于 `Price`\
    \ 列所有值的 `if` 和 `else` 语句的结果。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig33_HTML.jpg](img/506186_1_En_3_Fig33_HTML.jpg)\n\
    \n**图 3-33** 将带有 `if` 和 `else` 语句的 lambda 应用于列\n\n我知道掌握 `lambda` 需要一些练习，在本章后面，我还会提供更多\
    \ `lambda` 实际应用的例子。\n\n在 DataFrame 上进行逻辑运算的另一种方法是使用 `loc` 方法。语法如下所示：\n\n```\n\
    DataFrame.loc[if condition, new column to save result] = result\n```\n\n一个实际的例子是计算每股盈亏。如果\
    \ `Price` 列中的值大于 `Cost` 列中的值，那么我们想从当前价格中减去支付的成本。结果将存储在一个新列中。我们将其命名为 `PL_per_share`。我们可以将此逻辑语句编写为：\n\
    \n```\nportfolio.loc[portfolio.Price > portfolio.Cost, \"PL_per_share\"] = portfolio.Price\
    \ - portfolio.Cost\n```\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig34_HTML.jpg](img/506186_1_En_3_Fig34_HTML.jpg)\n\
    \n**图 3-34** 使用 `loc` 方法执行逻辑运算\n\n还有一种基于 `if` 和 `else` 条件得到结果的方法——NumPy 函数 `where()`。Pandas\
    \ 构建在 NumPy 之上，NumPy 数组数据结构是 Series 和 DataFrame 的核心。这意味着我们可以借用 NumPy 包中的函数并在 Pandas\
    \ 中使用它们。由于我们尚未将 NumPy 库导入到文件中，我们需要向上滚动并将 NumPy 导入到 Pandas 导入语句下方的第一个单元格中。不要忘记重新运行该单元格：\n\
    \n```\nimport numpy as np\n```\n\n`where()` 函数属于 NumPy，我们需要这样使用它：\n\n```\nnp.where()\n\
    ```\n\n最好阅读一下描述并查看它接受的所有参数：\n\n```\nhelp(np.where)\n```\n\n正如文档所说，`where()` 需要一个条件，然后它会提供两个结果。如果条件为\
    \ `True`，则执行第一个结果；如果条件返回 `False`，则执行另一个结果。\n\n为了练习 `where()`，我们可以运行一个场景：如果 `PL_per_share`\
    \ 中的值大于 5 美元，我们需要返回 `True`。否则，`where()` 将返回 `False`。结果将存储在名为 `greater_five` 的新列下。根据\
    \ `where()` 的描述，我们可以将该逻辑表达式编译为：\n\n```\nportfolio[\"greater_five\"] = np.where(portfolio.PL_per_share\
    \ > 5, True, False)\n```\n"
- fmt: 'Figure [3-35](#506186_1_En_3_Chapter.xhtml#Fig35) shows that `where()` did
    a perfect job, and the newly created column `greater_five` has `True` values if
    the profit per share is greater than $5.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig35_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig35_HTML.jpg)


    Figure 3-35: Performing a logical operation with the `np.where` function


    With the `where()` function, we can perform more complicated operations than Boolean
    outcomes.


    Using the logic from the previous example, we can increase our position in stock
    if `PL_per_share` is less than $5. If the condition is `True`, then we would multiply
    the price per share by the value from `New_Qty`. The result of this operation
    will update the value in the `Amount` column. For stocks with the `PL_per_share`
    value greater than $5, we will not do anything and leave the amount as it is:


    ```

    portfolio["Amount"] = np.where(portfolio.PL_per_share < 5, portfolio.Price * portfolio.New_Qty,
    portfolio.Amount )

    ```


    The `Amount` column was updated only for `IBM` and `ORCL` since the values in
    the column `PL_per_share` were `1.61` and `1.91`, respectively (Figure [3-35](#506186_1_En_3_Chapter.xhtml#Fig35)).


    Out of these three approaches, my favorites are `lambda` and the `where()` function.
    The method `loc` would require a separate statement for each `if` condition. However,
    you might want to use `loc` when you have more conditions to test `if` and `else`
    and more `if` conditions.


    I think we have covered enough theory and need to take on a real-life example.
    We will fetch data from [`www.sectorspdr.com/sectorspdr/`](http://www.sectorspdr.com/sectorspdr/).


    ### Reading Data from a CSV File


    [Sectorspdr.com](http://sectorspdr.com) provides live data on S&P 500 companies
    split by industries. Each sector represents an ETF (exchange-traded fund). No
    worries if you are not into finance. We are not going too much into technicalities
    here. All we need is a relevant data to read as a DataFrame. We would need to
    clean the data and analyze it. The reason I have chosen the [Sectorspdr.com](http://sectorspdr.com)
    site is because it serves data as a CSV (Comma-Separated Values) file that can
    be read from online without downloading it first.


    We will grab a CSV file for XLF – an ETF that tracks the S&P Financial Sector
    Index. You can get data here: [`www.sectorspdr.com/sectorspdr/sector/xlf/index`](http://www.sectorspdr.com/sectorspdr/sector/xlf/index).


    In case [Sectorspdr.com](http://sectorspdr.com) changes something on the site
    or you would want to follow my example precisely, I’ve uploaded the data I’ll
    be using here to my server. I have downloaded the CSV file from [Sectorspdr.com](http://sectorspdr.com),
    and you can find it here: [`https://bit.ly/bookcsvxlf`](https://bit.ly/bookcsvxlf).


    In Figure [3-36](#506186_1_En_3_Chapter.xhtml#Fig36), you can see two green buttons
    to download the data in a CSV or Excel format. On the page we have all financial
    companies included in the XLF fund and their weightings within the index. We will
    read this information from the site and analyze it. One option would be to download
    the data by clicking a green button to your computer and then open it as a DataFrame
    with the Pandas function `read_csv()`. Pandas can read different formats of data.
    We will talk more about gathering data in the next chapter. The most popular formats
    are CSV and xlsx. The main advantage of `read_csv()` and `read_excel()` functions
    is they return a DataFrame. If you check the description of the `read_csv()` function
    with `help(pd.read_csv)`, you’ll see that you can open a CSV file right from the
    cloud without downloading the file first. To open it right from a server, we can
    copy the URL (Uniform Resource Locator) and pass it directly into `pd.read_csv()`.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig36_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig36_HTML.jpg)


    Figure 3-36: Sectorspdr website with options to download data


    For this exercise, we would need to launch a new **Jupyter** file and import pandas
    in the first cell:


    ```

    import pandas as pd

    ```


    There are two options how to get the information from the site: the first is to
    copy the URL from the website by clicking the right button on the mouse and selecting
    "Copy Link Address". Using the first option, you’ll get the most recent data from
    [Sectorspdr.com](http://sectorspdr.com). The second option would be to use my
    link of the previously downloaded file to my server. These are two examples of
    how you can do it:


    ```

    url = "https://www.sectorspdr.com/sectorspdr/IDCO.Client.Spdrs.Index/Export/ExportCsv?symbol=xlf"

    file = pd.read_csv(url, skiprows=1)

    or

    url = "https://bit.ly/bookcsvxlf"

    file = pd.read_csv(url, skiprows=1)

    ```


    In both instances, you should see the DataFrame like in Figure [3-37](#506186_1_En_3_Chapter.xhtml#Fig37).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig37_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig37_HTML.jpg)


    Figure 3-37: Reading a CSV file from an online location


    The `skiprows` keyword argument skips the first row in the original file. Sometimes,
    files have time stamps or titles that we do not need for analysis. In the `xlf.csv`
    file, the first row was a time stamp, and it was interfering with the DataFrame
    format. You can remove `skiprows=1` and rerun the cell to see how the DataFrame
    would look like without `skiprows`.


    On line 3 in Figure [3-37](#506186_1_En_3_Chapter.xhtml#Fig37), I use the method
    `head()`. Most of the time, the data is too big to fit on the screen, and Pandas
    cannot render the whole data set. The methods `head()` and `tail()` would show
    the first five rows or last five rows, respectively. If you want to see more rows,
    you can pass a number of rows as an argument into `head()` or `tail()`. To examine
    20 first rows, we can use:


    ```

    file.head(20)

    ```


    Every time I deal with a new data set, I start with the DataFrame method `info()`:


    ```

    file.info()

    ```


    The method `info()` returns all information about the `file` object (Figure [3-38](#506186_1_En_3_Chapter.xhtml#Fig38)).
    First of all, we see that the DataFrame has 65 rows. It takes 4.7 KB of memory.
    But more importantly, the `info()` method provides us with the data type of values
    in each column. Only three columns – `Last`, `Change`, and `Unnamed: 8` – hold
    numeric values. All other columns have an `object` as a data type. An `object`
    dtype means a nonnumeric data type, mostly strings. It would not be possible to
    use math operations on the `"Index Weight"` column or `"Volume"` column because
    they contain strings. We will need to convert the values to floats if we plan
    to run any calculations on those columns.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig38_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig38_HTML.jpg)


    Figure 3-38: The method `info()` provides information on a DataFrame


    Before we get to data analysis, we need to clean the data set a bit. There is
    a column `"Unnamed: 8"` with `NaN`. `NaN` stands for not a number and means that
    there is no value. The column with no values is completely useless to us. We will
    delete it with a method `drop()`:


    ```

    file.drop( "Unnamed: 8", axis=1, inplace=True)

    ```


    As I warned you earlier, place the `drop()` statement into a separate cell and
    run it once only. The column `"Unnamed: 8"` is gone after we dropped it (Figure
    [3-39](#506186_1_En_3_Chapter.xhtml#Fig39)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig39_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig39_HTML.jpg)


    Figure 3-39: Deleted `Unnamed: 8` column from the DataFrame'
