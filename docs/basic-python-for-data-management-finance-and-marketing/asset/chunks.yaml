  trans: '

    数据类型就好比是容器。你应该根据未来计划如何使用数据，来选择合适的数据类型。“用水来比喻说得通，但数字 7 要怎么装进去呢？”你可能会问我。Python 内置了三种不同的数字数据类型：`integer`（整数）、`float`（浮点数）和
    `complex`（复数）。这里，我们将使用整数和浮点数。


    `Integer` 是整数。例如，`7`、`27`、`1,000,000` 都会作为整数存储，仅仅因为它们是整数。即使是负数，只要它是整数，也会作为整数存储在内存中。


    `Float` 是带小数点的数字。例如 `7.5` 或 `-2.5`。基于你计划统计的内容，你应该选择 `integer` 或 `float` 类型。如果谈论金钱，我们应该使用
    `float`。人们在金钱上总希望精确到分。与之相反的则是人数。假设你的任务是把七个人分成两队，那么 `integer` 显然是不二之选。你总不希望最后出现三个半人吧。


    让我们看看这个概念在实践中如何运作。在 `x = 7` 下方，再添加一条语句。别忘了之后运行该单元格：


    ```

    y = 5.5

    ```


    由于 `x` 和 `y` 都保存了数值，我们可以进行数学运算。本章后面的表格 1-1 列出了所有算术运算符。


    表 1-1


    Python 中的算术运算符


    | 运算符 | 名称 | 示例 |

    | --- | --- | --- |

    | + | 加法 | `2 + 2` -> `4` |

    | – | 减法 | `5 – 2` -> `3` |

    | * | 乘法 | `2 * 2` -> `4` |

    | / | 除法 | `2 / 2` -> `1` |

    | // | 整数除法（向下取整） | `5 // 3` -> `1` |

    | % | 取模（求余数） | `5 % 3` -> `2` |


    ```

    x + y

    ```


    请记住，Python 是区分大小写的，`x` 和 `y` 应该小写。当你运行该单元格时，输出结果将是 `12.5`（图 1-6）。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig6_HTML.jpg](img/506186_1_En_1_Fig6_HTML.jpg)


    图 1-6


    `x + y` 表达式的输出结果


    这次，我没有使用 `print()` 命令，因为 Jupyter 默认会打印单元格中最后一个操作的结果。尽管如此，如果我想要多次打印这个操作的结果，就需要使用
    `print()` 命令：


    ```

    print(x + y)

    ```


    运行该单元格时，请确保你的 `print()` 命令全是小写字母。


    我们已经使用 `print()` 命令有一段时间了。现在是时候学习其他命令了。Python 有时被称为“内置电池（batteries included）”，因为它附带了许多内置命令和模块。这些命令被称为内置函数。函数是一段可重复使用的、用于执行某个任务的代码块。


    你可以在这里找到内置函数的完整列表：[`https://docs.python.org/3/library/functions.html`](https://docs.python.org/3/library/functions.html)。这是官方的
    Python 文档页面。以后当你升级到新版本的 Python 时，请确保文档与你机器上运行的版本匹配。在这本书中，我们将学习并使用许多内置函数。如果你认真对待
    Python，请将文档页面加入书签，以便作为参考资料使用。


    我在那个列表中最喜欢的函数之一是 `type()`。内置函数 `type()` 有助于识别一个值的数据类型。我将演示如何在一个单独的单元格中使用一条 Python
    语句，以及如何将几条语句嵌套在一个单元格中。如果你在一个单独的单元格中运行 `type()` 函数，那么就不需要 `print()` 函数。但是，如果你将


    ```

    print(type(x))

    print(type(y))

    ```


    放在同一个单元格中，那么你需要将每条语句都包裹在 `print()` 函数中（图 1-7）。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig7_HTML.jpg](img/506186_1_En_1_Fig7_HTML.jpg)


    图 1-7


    运行内置函数 `type()`


    你可以看到 `type(x)` 的输出结果是 `integer`，因为 `x` 存有整数 `7` 这个值；而 `type(y)` 打印出 `float`，因为
    `5.5` 带有小数点。


    应该使用多少个单元格完全取决于你。通常，我会将不同的任务放在不同的单元格中。随着我们处理更复杂的任务，这样做会更有意义。


    在我看来，`type()` 是最被低估的函数。有些人可能会争论为什么我们需要 `type()` 函数？我们明明可以清楚地看到 `x` 存的是一个整数。确实如此。但在现实生活中，当数据通过
    API（应用程序接口，我们将在本书后面讨论 API）从互联网传来，或者当你从 CSV 文件中获取数据时，你并不能确定正在处理的数据是什么类型。


    此外，根据我的经验，初学者总是会在数据类型上遇到困难并弄混类型。我的建议是，如果你不确定某个变量存的是什么数据类型，就对它运行 `type()` 函数。


    现在让我们仔细看看 `x + y` 这个表达式。假设我们想保存这个操作的结果以便稍后使用。要将 `12.5` 存入 Python 内存，我们需要将表达式 `x
    + y` 赋值给一个新变量。我们可以任意挑选另一个变量 `total` 来保存这个结果。在一个新单元格中试试（图 1-8）。


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig8_HTML.jpg](img/506186_1_En_1_Fig8_HTML.jpg)


    图 1-8


    变量 `total` 保存了 `x + y` 表达式的运算结果


    ```

    x = 7

    y = 5.5

    total = x + y

    total

    ```


    在某种程度上，使用变量名非常方便。假设我们要计算一个房间的面积。为此，我们需要房间的长度乘以宽度。我们可以用 Python 代码实现这个公式（图 1-9）：


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig9_HTML.jpg](img/506186_1_En_1_Fig9_HTML.jpg)


    图 1-9


    计算房间面积


    ```

    length = 30

    width = 25.5

    area = length * width

    area

    ```


    如果我们想计算房子里另一个房间的面积，只需重新给 `length` 和 `width` 赋值，而无需改动 `length * width` 这个公式。


    我们一直使用 `x` 和 `y` 作为变量名。然而，在实际开发中，你应该使用能够反映变量值用途的变量名。如果一直用 `x`、`y` 和 `z` 作为变量，会让人困惑。几周后你再回来看代码时，恐怕很难记住当初用
    `x` 和 `y` 到底表示什么。此外，你经常需要与他人合作。如果变量名能表示变量所保存的信息，对每个人来说都会清晰得多。你可能已经注意到，我没有对变量进行大写。最佳实践是以小写字母作为变量名的开头。有时，你需要使用两个单词来更好地描述变量的用途。这时，可以用下划线连接两个单词，例如
    `length_room`。这种风格称为蛇形命名法（snake case）。另一种选择是以小写字母开头，并将第二个单词的首字母大写，如 `lengthRoom`。这种技巧称为驼峰命名法（camel
    case）。无论你选择哪种风格，都要始终保持一致，并且永远不要在变量名中使用空格。

    '
- fmt: '# Strings


    Strings are another built-in data type in Python. Any characters or letters wrapped
    in quotes would be stored in the memory as a string. If we get back to our initial
    example `print("Hello")`, `Hello` in quotes would be regarded as a string by Python.


    I think the following example will illustrate the nature of Python strings. In
    a new cell, try the built-in function `ord()` (Figure 1-10):


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig10_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    The `ord` function returns a unique Unicode number for the character


    ```

    ord("a")

    ord("A")

    ```


    `"A"` is the first letter of the alphabet. It makes sense for billions of people
    using the Latin alphabet. But what if somebody would show you a letter from a
    foreign alphabet that you have never seen before? Your reaction would be something
    like “I do not know what that character means.” The same is true for computers.
    Computers do not know the meaning of characters. They store string characters
    as numbers. If you take a look at how text looks under the hood, you would see
    a sequence of numbers. In Figure 1-10, the `ord()` function returns the Unicode
    integer `97` for the `"A"` character and `65` for the `"a"` character. `ord()`
    stands for order and provides a corresponding number for a character. Obviously,
    there is a huge difference between `97` and `65`. That proves Python is case sensitive.


    The Unicode standard provides a number for each letter, symbol, or emoji. If you
    are curious, check out the Unicode character table at [`https://unicode-table.com/en`](https://unicode-table.com/en).


    You won’t be using the `ord()` function too often in your everyday life, and you
    do not have to memorize all the numbers. The point I’m trying to make is that
    a string is a sequence of characters. Computers do not care about the meaning
    of strings. If I wrote `"apple"` for us, humans, it would mean some fruit. A computer
    would just store a bunch of characters in its memory as a sequence of integers.


    The number `"7"` wrapped in quotes would not represent a numeric value, but rather
    another character. You could give it a try and run the `ord()` function on `"7"`.


    ```

    ord("7")

    ```


    The result will be `55`, a number representing the character `7` in the Unicode
    table. It means that `"7"` in quotes cannot be used in arithmetic operations because
    it would be stored as a string.


    Again, think of the analogy of the water stored in different containers. Although
    `"7"` looks like a number, in fact it is not a numeric type for Python.


    Let me run a couple of examples to illustrate integers, floats, and strings. In
    a cell, try adding `"7"` to an integer (Figure 1-11).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig11_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    `7` as an integer cannot be added to `"7"` as a string


    ```

    7 + "7"

    ```


    `7 + "7"` will give us an error message. I would like to stop here and tell you
    a little more about errors.


    I know it could be frustrating to get an error message. Think of it another way.
    Error messages in Python were created not to judge us but to help us. When you
    get an error, first of all see where the green arrow is pointing. That is where
    the problem has occurred. Second, read the message thinkably. Python is telling
    exactly what went wrong. I know that it might be difficult to comprehend them
    at first. With experience, you’ll be able to understand the types of error messages
    and how to fix them.


    In our case, Figure 1-11, Python is telling us that we cannot mix different data
    types. It is impossible to add a string to an integer. Literally, it’s telling
    us not to use a plus sign between integers and strings.


    There are a couple of things we can do to fix this. We can try to convert one
    data type into another. Since `"7"` looks like a number, we can use the built-in
    function `int()` to convert it to a numeric data type. If we had a letter or some
    other character instead of `"7"`, that would not be possible.


    ```

    7 + int("7")

    ```


    In Figure 1-12, we can see that the string `"7"` is being converted to an integer.
    Integer `7` plus integer `7` expectedly gets us `14`. If we had a letter or some
    other character instead of `"7"`, the conversion to a numeric type would not be
    possible.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig12_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Using the `int()` function, we convert a string to an integer


    An alternative option would be to convert `"7"` to a float. Using the function
    `float()`, try


    ```

    7 + float("7")

    ```


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig13_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    The function `float()` converts string into a float


    This time, we got `14.0` as a result of integer `7` being added to a float. At
    the end of the day, the string `"7"` was converted to a float `7.0`. In an arithmetical
    operation like this, `7 + 7.0`, the float always wins, and the result would be
    returned as a float.


    There is one more option we can do here. We can convert an integer to a string
    with the help of the built-in function `str()`.


    ```

    str(7) + "7"

    ```


    In Figure 1-14, you can see that now we have joined or concatenated one string
    to another. Integer `7` was converted to a string, and the whole operation yielded
    a new string `"77"`.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig14_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Using the `str()` function, we convert an integer to a string


    The main idea behind these three examples is that the same plus operator brings
    about different results based on the data type it is applied to. All data types
    behave differently. In other words, each data type has its own features. This
    totally makes sense because we understand that a plastic bottle and a cup are
    two different containers that behave in their own certain ways.


    Keep these examples in mind. The behavior of data types is a very important subject.
    Later, we will move to more advanced objects and learn their features.'
