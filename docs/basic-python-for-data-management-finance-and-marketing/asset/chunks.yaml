- fmt: 'When I write my code, I always test every step of it. To make sure the function
    works, I’ll invoke it with the first value from the `Volume` column:


    ```

    str_to_num("5.55 M")

    ```


    The function returns `5550000.0` (Figure [3-44](#506186_1_En_3_Chapter.xhtml#Fig44)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig44_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig44_HTML.jpg)


    Figure 3-44

    Testing the function `str_to_num()`


    The conversion of all values in the `"Volume"` column would require the method
    `apply` to loop through all rows and put into use the function `str_to_num`. The
    results will be saved in a new column under the `"Vol_function"` name:


    ```

    file["Vol_function"] = file["Volume"].apply(str_to_num)

    ```


    The same conversion operation could be achieved with `lambda`. To compare results
    of the conversion, I’ll save the results received from `lambda` under `"Vol_lambda"`.
    The `lambda` expression will have if and else conditions and follow all the steps
    we made in the `str_to_num` function.


    I specifically broke down all the steps in the `str_to_num` function in Figure
    [3-44](#506186_1_En_3_Chapter.xhtml#Fig44) so we can implement them in `lambda`
    step by step. First, we define `value` as an argument in lambda and then write
    the first part of the expression:


    ```

    lambda value : float(value.strip("K"))*1000 if "K" in value

    ```


    The `lambda` expression is mimicking the function. The order of operations is
    slightly different because we need to nest the functions. Before we multiply a
    number with 1000, we need to strip `K`. Of course, if `K` is the incoming string.


    The second part of `lambda`’s expression is conceptually the same. We do not need
    to check for `M` since the `else` condition means anything else besides `K`. Whatever
    is left after we lose `M` is converted to a float type and multiplied by 1,000,000:


    ```

    else float(value.strip("M"))*1000000

    ```


    The final `lambda` expression would be passed into the `apply()` method instead
    of the `str_to_num` function like this:


    ```

    file["Vol_lambda"] = file["Volume"].apply(lambda value : float(value.strip("K"))*1000
    if "K" in value else float(value.strip("M"))*1000000)

    ```


    These two approaches to clean data and convert values to numeric types yield the
    same results. To prove that, I’ll compare the sums of all values in `Vol_function`
    and `Vol_lambda` columns (Figure [3-45](#506186_1_En_3_Chapter.xhtml#Fig45)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig45_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig45_HTML.jpg)


    Figure 3-45

    Two methods to convert the column Volume values to a numeric type


    Which approach to use is up to you. The function would be my choice if I had to
    do something more sophisticated than if and else conditions. `Lambda` is a great
    choice to solve something on the fly. Another example illustrates that. The `"52
    Week Range"` column provides highest and lowest prices during the year. Suppose
    we need to get the difference between those numbers. Each value in the column
    comes as a string. I would split the string into two values and convert them to
    a numeric type. The results will be saved in two new columns `"High"` and `"Low"`.
    Finally, I would get the difference by subtracting `"Low"` values from `"High"`
    values.


    Beforehand we need to slice the column:


    ```

    file["52 Week Range"]

    ```


    The Series we have got as a result of slicing contains strings, and we can use
    one of `str` methods on it. Each value has a dash between highest and lowest prices.
    In the previous chapter, we used the `split()` method to separate strings by empty
    spaces; now we will use `"-"` as a separator:


    ```

    file["52 Week Range"].str.split("-")

    ```


    As a result of the operation, all values in the Series represent a Python list
    with two strings. We need to grab the first and second strings and to convert
    them into floats. It makes me think of indexing. The index location of the first
    value is `0`, and the second value has an index location of `1`. However, indexing
    would have to be performed on each list in the Series. That could be achieved
    with the method `apply()` and `lambda()`:


    ```

    file["Low"] = file["52 Week Range"].str.split("-").apply( lambda value : float(value[0]))

    file["High"] = file["52 Week Range"].str.split("-").apply( lambda value : float(value[1]))

    ```


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig46_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig46_HTML.jpg)


    Figure 3-46

    Splitting `52 Week Range` column values into `Low` and `High` columns


    Two columns `"Low"` and `"High"` were added to the DataFrame with numeric values
    (Figure [3-46](#506186_1_En_3_Chapter.xhtml#Fig46)). Finally, we can calculate
    the difference and subtract `"Low"` column values from `"High"` column values.
    The result will be saved under the new column name `"Diff"`:


    ```

    file["Diff"] = file["High"] – file["Low"]

    ```


    The preceding examples proved that `lambda()` is an irreplaceable tool in wrangling
    data. My advice would be to repeat the exercises again to fully comprehend and
    learn the syntax. Additionally, it would be a good idea to grab another data set
    and use the `apply()` method and `lambda` on a new data.


    ## Combining Data Sets


    There are two options on how you can combine data sets. The first one is a simple
    concatenation of two or more DataFrames together. The second option is merging
    data sets based on common values.


    ### Concatenating Data Sets


    We will start with concatenation. As always, we will begin a new exercise in a
    new file. Do not forget to import Pandas on the top of the file:


    ```

    import pandas as pd

    ```


    We will create two data sets to join. Each data set will contain information about
    wine. Data set one will have columns `"Country"` and `"Price"`. This time, we
    will create a DataFrame out of two lists:


    ```

    country_list = [ "US", "Italy", "France", "Spain"]

    price_list = [13.99, 9.99, 12.99, 11.99]

    ```


    These Python lists have to be added to each other with a built-in function `zip()`:


    ```

    data_one = zip(country_list, price_list)

    ```


    The function `zip()` returns an object that we can pass into the `pd.DataFrame()`
    function. Also, we need to provide column names for the DataFrame:


    ```

    ds_one = pd.DataFrame(data=data_one, columns=["Country","Price"])

    ```


    Data set two will have different columns – `"Region"` and `"Variety"`:


    ```

    region_list = ["Rioja", "Bordeaux", "Sicilia", "Napa"]

    variety_list = ["Red Blend", "Merlot", "Primitivo", "Chardonnay"]

    ```


    The function `zip()` always returns an object, and we will pass the returned object
    after zipping two Python lists together into the `pd.DataFrame()` function:


    ```

    data_two = zip(region_list, variety_list)

    ds_two = pd.DataFrame(data=data_two, columns=["Region", "Variety"])

    ```


    Now we have two DataFrames to concatenate (Figure [3-47](#506186_1_En_3_Chapter.xhtml#Fig47)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig47_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig47_HTML.jpg)


    Figure 3-47

    Creating two DataFrames from the lists


    Pandas’ function `concat()` joins DataFrames. The function `concat()` could concatenate
    more than two objects. If you want to join three or more objects, you would have
    to pass DataFrames in the form of a Python list. Before we proceed to concatenation,
    we need to decide how we would attach one to the other one vertically or horizontally.
    By default, the keyword argument `axis` in the `concat()` function is set to `0`
    or `index`. That means if we pass our data sets into `concat()`, it will put one
    on top of the other one (Figure [3-48](#506186_1_En_3_Chapter.xhtml#Fig48)):


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig48_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig48_HTML.jpg)'
