    To begin with the **Jupyter Notebook**, click the launch button on the bottom
    of the card. **Jupyter** will launch in the browser running on a local server.
    That would be a user interface. If you use Mac, you probably noticed that **Jupyter**
    also launched a Terminal or command prompt window. **Jupyter** has two parts:
    the user interface, where we write the code, and the Kernel running on a local
    server, where the code is being executed. If you use Windows, you have the Kernel
    running quietly under the hood. On Mac, it pops up a Terminal window. We will
    talk more about the Kernel later.


    In your browser, you will see the home directory of your computer. In the top
    upper-right corner of the browser, you can find the **New** button. Click the
    **New** button, and there will be a drop-down menu with Python 3 and other choices.
    Click **Python 3** and you’ll make a new **Jupyter** file (Figure [1-3](#506186_1_En_1_Chapter.xhtml#Fig3)).


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig3_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    New Jupyter Notebook file


    **Untitled** is a default name of a file. You could change the default file name
    if you click it and enter a new file name in the popped up prompt. Unless you
    save the file in a specific folder by providing a path in the prompt, it will
    be saved in the home or main directory on your computer with the .ipynb extension.
    **Jupyter** comes with many great features. We will cover most of them as we move
    along. One of the features is autosave. Everything is being autosaved every three
    minutes. Of course, you can save your work manually at any time by clicking the
    diskette icon (save button) in the toolbar. All actions in the **Jupyter** Notebook
    can be done with a click of the mouse in the toolbar, or you can find a corresponding
    shortcut by clicking **help** in the upper menu or pressing the `H` letter on
    the keyboard.


    In the center, you can see a cell where we will be writing code. If you need more
    cells, you can always create one by clicking the **plus** icon button in the toolbar.
    If, on the other hand, you need to remove a cell, you can do it with the **scissors**
    button. I assume **copy** and **paste** buttons in the menu are self-explanatory.


    Before we get to the actual Python coding part, I want to explain how to use **Jupyter**.
    In the upper cell, write a print() command, like this:


    ```

    print("Hello")

    ```


    Make sure “Hello” is wrapped in quotes. Now, click the **Run play** icon button
    in the upper toolbar. A couple things just happened. First of all, we got the
    [1] number in the square brackets on the left of the cell. Second, under the cell,
    the Hello word was printed (Figure [1-4](#506186_1_En_1_Chapter.xhtml#Fig4)).
    The number in the square brackets means that our code was executed in the Kernel.
    Every time you write code in a cell, you would need to run that cell in order
    for the code to be executed. It’s a little bit annoying to reach for that **Run**
    button every time you need to run the code. The shortcut for this operation is
    a simultaneous press of **Shift** and **Enter** keys.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig4_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The print() command prints “Hello” when you run the Jupyter cell


    If you run that cell over and over again, you will see that for every operation
    we get a new number. The number itself is not important. It represents the sequence
    of operation. What’s important is we need to run the cell every time we update
    the code inside it. For example, let’s update our message to


    ```

    print("Hello World!")

    ```


    The output Hello would not be updated unless we run that cell again. I will run
    that cell again. In my case, that would be the second time I run that cell. I’ll
    see the next number in sequence [2], meaning that operation is in the Python memory,
    and the output will be changed to Hello World! (Figure [1-5](#506186_1_En_1_Chapter.xhtml#Fig5)).


