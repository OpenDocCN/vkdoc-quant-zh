    metrics = [new_visitors, returning_visitors]

    plt.pie(metrics, shadow=True, colors=["#E74C3C","#27AE60"], labels=["New Visitors",
    "Returning Visitors"])

    donut = plt.Circle( (0,0), 0.5, color=''white'')

