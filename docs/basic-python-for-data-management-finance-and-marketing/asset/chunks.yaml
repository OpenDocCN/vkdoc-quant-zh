  raw: "We iterate through the list in search of `5`. If we find `5`, we add it to\
    \ blist\nwith a list method `append()`. The method\n`append()` is\nimplemented\
    \ in Python as a module, and it takes some time to call it\nevery time we get\
    \ `5`. To make this code\nrun faster, we can skip the `append()` method  and rewrite\
    \ the\nsolution as a list comprehension. The same searching for `5`s example would\
    \ look\nlike this:\n\n```\nblist = [ number for number in alist if number == 5\
    \ ]\n```\n\nThe whole statement is wrapped in square brackets, and the result\
    \ is\nreturned as a list. That is why we no longer need the `append()` method\
    \ . The outcome of a list\ncomprehension statement is always a list type, and\
    \ in our case it is\nsaved as `blist`.\nA list comprehension would be roughly\
    \ twice faster than using an\nappend() method, and you could feel that on a list\
    \ with more than 10,000\nelements.\n\nThe syntax of a simple list comprehension\
    \ consists of three parts: the\nfor loop, filter, and expression. The filter is\
    \ optional:\n\n```\n[ expression for loop filter ]\n```\n\nIf you compare the\
    \ first solution with the one done as the list\ncomprehension, you will see that\
    \ they are pretty much the same. The one\nin square brackets starts with an expression.\
    \ In our case, the\nexpression is a number itself, because we just want to keep\
    \ a value if\nit is equal to 5\\. In some other cases, you might want to do something\n\
    else, maybe multiply the `number` by 10 if the\nvalue is equal to 5\\. Then we\
    \ use the same `for` loop, where the\n`number` variable\nis defined. The filter\
    \ is an `if` statement.\nSometimes you need it, sometimes not. In case an `if`\
    \ statement is\nneeded, you place it right after the `for` loop.\n\nLet’s consider\
    \ another example; suppose we need to take all numbers in\nthe `alist`\ncontainer\
    \ and multiply them by `10`. In that case, we\ndo not need a filter, and the list\
    \ comprehension would look like this:\n\n```\nblist = [ number * 10 for number\
    \ in alist ]\n```\n\nYou need to remember that a list comprehension always returns\
    \ a list\ndata structure. You save that list by assigning a list comprehension\n\
    statement to a variable.\nLet’s get back to our scraping example armed with a\
    \ list\ncomprehension syntax. Our final goal is to write a title and article\n\
    snippet into a text file. To smooth the process, we will strip off\n<p> tags from\
    \ all items in the list_article using a\nlist comprehension [ p.get_text() for\
    \ p in list_article]. The result of\nthis list comprehension would be a list of\
    \ strings. To concatenate all\nstrings, from the list, we will use a string method\
    \ join(). I have\nnoticed that the first <p> tags on each full article contain\
    \ “No\nresults matched your search”. Since we grabbed all <p> tags, we\nhave that\
    \ message as a first item in list_article. We do not need it,\nand we will slice\
    \ it off starting with the second element in\nlist_article[1:].\n\nWe will do\
    \ the whole cleaning and concatenation operation at the same\ntime as\n\n```\n\
    clean_article = \" \".join([p.get_text() for p in list_article[1:]).\n```\n\n\
    `clean_article`\nwill be a full article. At the end of the for loop, we will append\
    \ each\narticle as a string to `mega_list` :\n\n```\nmega_list = [ ]\nfor item\
    \ in clean_titles:\nurl = item[1]\npage = requests.get(\"https://www.investing.com{}\"\
    .format(url), headers={'User-agent':'Mozilla/5.0'})\nprint(\"now fetching\", \"\
    https://www.investing.com{}\".format(url))\narticle = BeautifulSoup(page.content,\
    \ \"html.parser\")\nlist_article = article.find_all(\"p\")\nclean_article = \"\
    \ \".join([p.get_text() for p in list_article])\nmega_list.append(clean_article)\n\
    ```\n\nIn Figure [4-14](#506186_1_En_4_Chapter.xhtml#Fig14), you can see\nthe\
    \ code in action and a small part of `mega_list` in Figure\n[4-15](#506186_1_En_4_Chapter.xhtml#Fig15).\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig15_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15\nParsing and cleaning\ninformation for each article\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig14_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14\nGathering articles from investing.com\n\nThe final part is to create\
    \ a report in a text format. We will use the\nfunction `zip()`  to combine `clean_titles`\
    \ and\n`mega_list`\nlists:\n\n```\nfinal_list = list(zip(clean_titles, mega_list))\n\
    ```\n\nBefore we write the data into a text file, we will format it a bit\nand\
    \ print just to make sure everything looks OK.\n\nWe can create a string\ntemplate\
    \ under a variable name TEMP:\n\n```\nTEMP = \"\"\"\nTitle: {}\nSnippet: {}\n\
    URL: {}\n\"\"\"\n```\n\nThis template will format nicely a title of an article;\
    \ a short\nsnippet, no longer than 300 letters from an article; and a URL in case\n\
    we want to read the full article.\n\nWe will pass all this information into TEMP\
    \ from the `final_list` \ncontainer:\n\n```\nfor item in final_list:\ntitle, url\
    \ = item[0]\nurl=\"https://www.investing.com{}\".format(url)\nsnippet = item[1][:300]\n\
    print(TEMP.format( title, snippet, url))\n```\n\nThe `final_list`\nlist contains\
    \ tuples with two lists. We are assigning two variable names\nto the first list\
    \ from a tuple:\n\n```\ntitle, url = item[0]\n```\n\nTo have a fully clickable\
    \ URL, we will add [`www.investing.com`](http://www.investing.com):\n\n```\nurl\
    \ = https://www.investing.com{}.format(url)\n```\n\nThen slice the first 300 characters\
    \ out of the second list. You can\nchange the number based on how much of a snippet\
    \ you want to see:\n\n```\nsnippet = item[1][:300]\n```\n\nFinally, pass the variable\
    \ into TEMP via the `format()` method\n(Figure [4-16](#506186_1_En_4_Chapter.xhtml#Fig16)).\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig16_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16\nFormatting the text into a readable\nformat with a template\n\n\
    If it looks nice, we can write `TEMP` into a text\nfile. For this task, we will\
    \ initialize a new `report` object with\nthe function `open()` :\n\n```\nreport\
    \ = open(\"report.txt\", \"w\")\n```\n\nFinally, we will pass TEMP.format( title,\
    \ snippet, url) into the write()\nmethod:\n\n```\nfor item in final_list:\ntitle,\
    \ url = item[0]\nsnippet = item[1][:300]\nprint(TEMP.format( title, snippet, url))\n\
    report.write(TEMP.format(title,snippet,url))\n```\n\nThe final report.txt file\
    \ should look like in Figure [4-17](#506186_1_En_4_Chapter.xhtml#Fig17).\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig17_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig17_HTML.jpg)\n\
    \nFigure 4-17\nThe final output of the web scraping operation\nis stored in a\
    \ text file\n\nAs you can see, the process of web scraping itself is not that\n\
    complicated. I would say it is more time-consuming. You need to spend\nsome time\
    \ looking for the right tags and attributes to pull out an\nelement.\nAlso, data\
    \ cleaning takes some time. Keep in mind that websites get\nmaintained, and developers\
    \ rename attributes or change the website\nlayout. If the developers of that site\
    \ change a few things, the code\nwill not be working, and we will have to start\
    \ the whole process from\nscratch."
  trans: "\n我们遍历列表以查找`5`。如果找到`5`，我们会使用列表方法`append()`将其添加到`blist`中。`append()`方法在 Python\
    \ 中是以模块形式实现的，每次我们获取到`5`时调用它都需要耗费一定时间。为了让这段代码运行得更快，我们可以跳过`append()`方法，将解决方案重写为列表推导式。同样的查找`5`的示例如下：\n\
    \n```\nblist = [ number for number in alist if number == 5 ]\n```\n\n整个语句被包裹在方括号中，结果会以列表形式返回。这就是我们不再需要`append()`方法的原因。列表推导式语句的结果始终是列表类型，在我们的例子中，它被保存为`blist`。列表推导式的速度大约是使用`append()`方法的两倍，当列表元素超过\
    \ 10,000 个时，你就能感受到这种差异。\n\n一个简单列表推导式的语法包含三个部分：`for` 循环、过滤器和表达式。过滤器是可选的：\n\n```\n\
    [ expression for loop filter ]\n```\n\n如果你将第一个解决方案与列表推导式的方案进行比较，你会发现它们几乎相同。方括号中的方案以表达式开头。在我们的例子中，表达式就是数字本身，因为我们只想在值等于\
    \ 5 时保留这个值。在其他情况下，你可能想做些别的事情，比如当值等于 5 时将 `number` 乘以 10。然后我们使用相同的 `for` 循环，在其中定义了\
    \ `number` 变量。过滤器是一个 `if` 语句。有时你需要它，有时则不需要。如果需要 `if` 语句，就将其紧跟在 `for` 循环后面。\n\n\
    让我们再看一个例子；假设我们需要获取 `alist` 容器中的所有数字并将它们乘以 `10`。在这种情况下，我们不需要过滤器，列表推导式如下所示：\n\n\
    ```\nblist = [ number * 10 for number in alist ]\n```\n\n你需要记住，列表推导式始终返回一个列表数据结构。通过将列表推导式语句赋值给一个变量，即可保存该列表。\n\
    \n现在，让我们带着列表推导式的语法回到我们的网页抓取示例中。我们的最终目标是将标题和文章摘要写入到一个文本文件中。为了使过程更顺畅，我们将使用列表推导式\
    \ `[ p.get_text() for p in list_article]` 从 `list_article` 中的所有条目中剥离 `<p>` 标签。这个列表推导式的结果将是一个字符串列表。为了连接列表中的所有字符串，我们将使用字符串方法\
    \ `join()`。我注意到每篇完整文章的第一个 `<p>` 标签包含“没有找到匹配您搜索的结果”。由于我们抓取了所有 `<p>` 标签，这条消息会作为\
    \ `list_article` 中的第一个条目。我们不需要它，因此将从 `list_article[1:]` 的第二个元素开始将其切片去除。\n\n我们将在同一时间完成整个清洗和连接操作，如下所示：\n\
    \n```\nclean_article = \" \".join([p.get_text() for p in list_article[1:]])\n\
    ```\n\n`clean_article` 将是完整的文章。在 `for` 循环结束时，我们将每篇文章作为一个字符串追加到 `mega_list` 中：\n\
    \n```\nmega_list = [ ]\nfor item in clean_titles:\n    url = item[1]\n    page\
    \ = requests.get(\"https://www.investing.com{}\".format(url), headers={'User-agent':'Mozilla/5.0'})\n\
    \    print(\"now fetching\", \"https://www.investing.com{}\".format(url))\n  \
    \  article = BeautifulSoup(page.content, \"html.parser\")\n    list_article =\
    \ article.find_all(\"p\")\n    clean_article = \" \".join([p.get_text() for p\
    \ in list_article])\n    mega_list.append(clean_article)\n```\n\n在图 4-14 中，你可以看到运行中的代码，在图\
    \ 4-15 中，可以看到 `mega_list` 的一小部分。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig15_HTML.jpg](img/506186_1_En_4_Fig15_HTML.jpg)\n\
    \n图 4-15\n解析并清洗每篇文章的信息\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig14_HTML.jpg](img/506186_1_En_4_Fig14_HTML.jpg)\n\
    \n图 4-14\n从 investing.com 收集文章\n\n最后一部分是以文本格式创建报告。我们将使用 `zip()` 函数来组合 `clean_titles`\
    \ 和 `mega_list` 列表：\n\n```\nfinal_list = list(zip(clean_titles, mega_list))\n\
    ```\n\n在将数据写入文本文件之前，我们会对它进行一些格式化并打印出来，以确保一切看起来没问题。\n\n我们可以在变量名 `TEMP` 下创建一个字符串模板：\n\
    \n```\nTEMP = \"\"\"\nTitle: {}\nSnippet: {}\nURL: {}\n\"\"\"\n```\n\n这个模板将很好地格式化文章标题、不超过\
    \ 300 个字符的文章摘要，以及用于阅读完整文章的 URL。\n\n我们将从 `final_list` 容器中将所有这些信息传递到 `TEMP` 中：\n\
    \n```\nfor item in final_list:\n    title, url = item[0]\n    url=\"https://www.investing.com{}\"\
    .format(url)\n    snippet = item[1][:300]\n    print(TEMP.format( title, snippet,\
    \ url))\n```\n\n`final_list` 列表包含包含两个列表的元组。我们为元组中的第一个列表分配两个变量名：\n\n```\ntitle,\
    \ url = item[0]\n```\n\n为了获得一个完全可点击的 URL，我们将添加 `www.investing.com`：\n\n```\nurl\
    \ = \"https://www.investing.com{}\".format(url)\n```\n\n然后从第二个列表中截取前 300 个字符。你可以根据需要看到的摘要长度更改此数字：\n\
    \n```\nsnippet = item[1][:300]\n```\n\n最后，通过 `format()` 方法将变量传递到 `TEMP` 中（图 4-16）。\n\
    \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig16_HTML.jpg](img/506186_1_En_4_Fig16_HTML.jpg)\n\
    \n图 4-16\n使用模板将文本格式化为可读格式\n\n如果看起来不错，我们可以将 `TEMP` 写入一个文本文件。为此任务，我们将使用 `open()`\
    \ 函数初始化一个新的 `report` 对象：\n\n```\nreport = open(\"report.txt\", \"w\")\n```\n\n\
    最后，将 `TEMP.format( title, snippet, url)` 传递到 `write()` 方法中：\n\n```\nfor item in\
    \ final_list:\n    title, url = item[0]\n    snippet = item[1][:300]\n    print(TEMP.format(\
    \ title, snippet, url))\n    report.write(TEMP.format(title,snippet,url))\n```\n\
    \n最终的 `report.txt` 文件应该如图 4-17 所示。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig17_HTML.jpg](img/506186_1_En_4_Fig17_HTML.jpg)\n\
    \n图 4-17\n网页抓取操作的最终输出存储在文本文件中\n\n如你所见，网页抓取过程本身并不复杂。我认为它更耗时。你需要花一些时间来寻找正确的标签和属性以提取元素。此外，数据清洗也需要一些时间。请记住，网站会进行维护，开发者可能会重命名属性或更改网站布局。如果该网站的开发者更改了一些内容，代码将无法运行，我们将不得不从头开始整个操作。\n"
- fmt: '# Web Scraping with Selenium


    Modern websites heavily rely on JavaScript libraries that update information without
    reloading a web page. I do not want to get into web development because it is
    outside of the scope of the book. Simply put, some elements on a web page are
    generated on the user side, and the BeautifulSoup cannot pick them up. In those
    cases, we need to simulate a web browser experience with Selenium. Initially,
    Selenium was developed for web application testing purposes but quickly became
    a popular tool for automation and gathering data. Selenium features allow to simulate
    mouse and keyboard actions. You can write a script to flip over several pages
    with mouse clicks and entering information in online forms on web pages.


    Unfortunately, Selenium does not come with Anaconda, and you need to install it
    separately. Selenium is a third-party library, and to install it, we need a package
    manager like PIP or Conda.


    A Python package manager or PIP is a simple and reliable built-in aid to find
    and install Python libraries. Although PIP is a standard feature in the latest
    Python version, sometimes you need to launch it.


    On Mac, you would need to search for a `Terminal` either in the search prompt
    or `Other` apps in `Launchpad`. Please do not use the `Terminal` window running
    Anaconda’s Kernel. Make sure in the `Terminal` you open a brand-new window through
    a menu: `Terminal` ➤ `Shell` ➤ `New Window`.


    In that new empty Terminal window, run the `pip --version` command to check the
    PIP version on your machine:


    ```

    pip -- version

    ```


    If for some reason it would get you an error message `"pip command not found"`,
    launch PIP with the following code:


    ```

    sudo easy_install pip

    ```


    The `Sudo` command will prompt you to enter a password for admin installation
    rights on the computer and will launch PIP. If `sudo easy_install pip` would not
    work, then open [python.org/downloads](http://python.org/downloads) and install
    Python from the official Python downloads page. Then repeat the `sudo easy_install
    pip` command again.


    Windows users click the search prompt located in the left-bottom corner and type
    the name `CMD, command prompt`. The `CMD` abbreviation should get a command prompt
    window. To see whether you have PIP working or would require the PIP installation,
    run the


    ```

    pip -- version

    ```


    command in a command prompt. If you get a response with a version number, then
    you have PIP on your computer; otherwise, you would need to download the PIP module.


    In the case that you get the `"pip command not found"` message, go to the official
    Python page ([www.python.org/downloads](http://www.python.org/downloads)) and
    download the latest version of Python. As you start the installation process,
    on the first screen mark the `"Add Python 3.9 to PATH"` option on the bottom (Figure
    [4-18](#506186_1_En_4_Chapter.xhtml#Fig18)). After the installation process finished,
    close and reopen the `CMD` prompt.


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig18_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig18_HTML.jpg)


    Figure 4-18 Installation of Python and adding it to PATH on Windows


    Try the `pip -- version` command one more time. If the problem persists, download
    the `get-pip.py` file. Usually, I would recommend saving the `get-pip.py` file
    to the `Downloads` folder. To install PIP from the `get-pip.py` file, you would
    need to open a new `CMD` window and navigate to the `Downloads` directory with
    a `CMD` command `cd`, change directory:


    ```

    cd Downloads

    ```


    After you get into the `Downloads` directory, execute the `get-pip.py` file:


    ```

    python get-pip.py

    ```


    Now the `pip -- version` command should work, and you can install Python libraries
    with the `pip install <package>` statement. In some rare cases that the PIP command
    still raises an error message, refer to the official Python documentation at [https://packaging.python.org/tutorials/installing-packages/](https://packaging.python.org/tutorials/installing-packages/).
    Assuming PIP is in place, we are ready to install Python packages. To add third-party
    libraries to Anaconda, I would recommend opening a `Terminal` or `command prompt`
    directly from Anaconda Navigator.


    Step 1. On the left-side menu in Anaconda Navigator, click `Environments` and
    navigate to `Base (root)`.


    Step 2. Right next to `Base (root)` should be a `play` button. Click that `play`
    button, and you will see a menu with `Open Terminal` as the first option.


    Step 3. Launch a Terminal window by clicking `Open Terminal`. Right after that,
    a new Terminal window should pop up.


    Step 4. In the `Terminal` window, run a PIP command to install Selenium or any
    other library:


    ```

    pip install selenium

    ```


    Besides installing Selenium itself, we would need to download a Chrome driver.
    Selenium can be used with any web browser. Due to its popularity and built-in
    developer tools, in this example we will be using a Chrome browser. Before downloading
    a driver, check what browser version you have installed on your machine. You can
    find this information in the `About Google Chrome` section in the Chrome settings.
    We are interested in the first two digits of a long version number. Currently,
    I have the 87 Google Chrome version running on my Mac.


    With this information in mind, find and download a driver for your operational
    system from [https://chromedriver.chromium.org/downloads](https://chromedriver.chromium.org/downloads).
    I would definitely recommend updating a Chrome browser if you can''t find your
    Chrome browser version in the Current Releases section of the [https://chromedriver.chromium.org/downloads](https://chromedriver.chromium.org/downloads)
    page. A driver comes compressed as a zip file. Unzip it and save ChromeDriver
    to the same directory where your `Jupyter` Notebook or Python file is. Make sure
    you know where ChromeDriver is saved because you would need to provide the full
    relative PATH to it.


    ## Introduction to Selenium


    I would like to start the Selenium introduction with an [amazon.com](http://amazon.com)
    scraping example. We will open any product page on [amazon.com](http://amazon.com)
    and gather information about that product. Open a new `Jupyter` Notebook, and
    after importing Selenium, get it connected to ChromeDriver:


    ```

    from selenium.webdriver import Chrome

    ```


    I''ll create a variable `driver_path` and assign the relative PATH to the ChromeDriver.
    `Chapter4` is a folder where I keep the `Jupyter` file alone with ChromeDriver,
    and `programwithus` is my home directory. Please note that the little `r` before
    the quotes might be required for some Windows users. It would be optional for
    Mac users. Also, Windows users would need to include the full file name with the
    extension .exe, like `chromedriver.exe`.


    For Mac users


    ```

    driver_path = "/Users/programwithus/Chapter4/chromedriver"

    ```


    For Windows users


    ```

    driver_path = r"/Users/programwithus/Chapter4/chromedriver.exe"

    ```


    In the same cell, pass `driver_path` into the `Chrome()` function we have imported
    earlier from Selenium:


    ```

    page = Chrome(executable_path=driver_path)

    ```'
