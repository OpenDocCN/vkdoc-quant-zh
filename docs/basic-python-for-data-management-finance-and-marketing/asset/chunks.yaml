    \n**Figure 4-31** Transposing a DataFrame with a built-in method `T`\n\nTake into\
    \ consideration that JSON served by APIs is a string, and all values in `df` are\
    \ stored not as numeric data types. Meaning we cannot use them for math calculations.\
    \ You do not need to remember that; instead, run the method `info()` on a DataFrame\
    \ to check the values’ data types:\n\n```python\ndf.info()\n```\n\nTo work with\
    \ these values, we would need to convert them to numeric data. Going column by\
    \ column would be tedious. We will use an `applymap()` method. The concept of\
    \ `applymap()` is similar to an `apply()` method; it iterates through values.\
    \ The difference is that `applymap()` would be used on all values in a DataFrame.\
    \ `applymap()` has no `inplace` argument, and we would need to save the value\
    \ conversion with the same variable `df`:\n\n```python\ndf = df.applymap(pd.to_numeric)\n\
    ```\n\nRun `df.info()` again, and you will see that all values were converted\
    \ to either float or integer data types. The last thing we could do is to convert\
    \ index values to datetime objects:\n\n```python\ndf.index = pd.to_datetime(df.index)\n\
    ```\n\nThe datetime objects in the index will help us to manipulate data, for\
    \ example, plot the last 120 days of closing prices from the DataFrame (Figure\
