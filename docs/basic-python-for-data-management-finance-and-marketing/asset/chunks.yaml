- fmt: 'You can see the list of all command shortcuts for **Jupyter** if you click
    **Help** and choose **Keyboard Shortcuts** from the drop-down menu.


    ![../images/506186_1_En_1_Chapter/506186_1_En_1_Fig5_HTML.jpg](images/506186_1_En_1_Chapter/506186_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The message has changed after we rerun the cell with the updated code. The main
    thing you have to remember is to run or rerun a cell if you update code or write
    a new statement. Do not pay too much attention on numbers in `[]`. Also, numbers
    in your file do not have to match the numbers in my file on these figures.


    Let me say a couple of words about the Kernel. The Kernel in **Jupyter** executes
    Python code. It quietly does its job in the background. Sometimes, you might see
    an asterisk in square brackets after you ran the cell. The asterisk, `[*]`, means
    that the Kernel is working. Complex operations performed on huge data sets might
    take some time, and it is normal. However, if it takes too long for a simple operation,
    that might indicate that something went wrong, and **Jupyter** is down. To wipe
    out the file memory and start from scratch, you would need to click the **Kernel**
    item in the upper toolbar. The drop-down menu would give options to **Restart**
    the server or **Restart & Clear Output**. If you choose **Restart & Clear Output**,
    you would still see your code in the file, but square brackets would be cleared,
    meaning all operations in memory were successfully wiped out.


    We have covered enough of **Jupyter** to get started with coding. Everything else
    that is needed we would figure out as we go. If at some point you would want to
    know more about the **Jupyter** Notebook application, I would definitely recommend
    you to visit their web page at [`https://jupyter.org`](https://jupyter.org).


    ## Variables and Numeric Types


    You probably know that computers have two types of memory. There is a long-term
    memory where you keep your files or store information as a database and a short-term
    memory, or random access memory (RAM), where your computer runs applications.
    Although Python is a programming language, it runs in short-term memory.


    To store information in Python, we need to use variables. Variables in programming
    are similar to what we did in school in math. For example, the expression `X +
    Y` where `X` and `Y` are variables. They are called variables because they could
    be anything and could hold any values.


    The same is true for Python. If we need to save a value to use it later, we would
    need to declare a variable. Simply put, we would need to come up with a variable
    name and assign a value. For instance, we can grab randomly picked name `x` and
    using an equal sign assign the value `7`. In our **Jupyter** cell, it would look
    like this:


    ```

    x = 7

    ```


    Do not forget to run that cell afterward. You can find all code for this and all
    other chapters on my GitHub [`https://github.com/programwithus/Basic-Python-for-Data-Management-Finance-and-Marketing`](https://github.com/programwithus/Basic-Python-for-Data-Management-Finance-and-Marketing).
    Let’s take a closer look at that expression. `x` is a randomly picked variable
    name. We could have used anything as a variable name. By the way, “banana” would
    perfectly do the job. It is really up to us. Later in the chapter, we will discuss
    the best practices for naming conventions.


    However, there are some restrictions. You cannot start a variable name with a
    number. Also, there are so-called reserved words or keywords that you cannot use.
    **Jupyter** does a great job identifying words you cannot use as variables. It
    marks them in bold green. Take a look at the keyword `print` in Figure [1-5](#506186_1_En_1_Chapter.xhtml#Fig5).
    `print` is one of the built-in commands and cannot be used as a variable. The
    one thing you have to remember is that a variable always has to be on the left
    side followed by an equal sign. An equal sign is defining the variable and assigning
    some value. A value is where it gets interesting.


    The value, `7`, we have assigned to variable `x` has to be stored somehow in the
    Python memory.


    Values would be stored as some **data types**. Many Python tutorials explain data
    types as the classification of data items. Mostly needed for computers to know
    how we would intend to use the data in the future. When I heard that explanation
    for the first time, I found it very confusing. Let me offer my explanation of
    data types.


    Grab a bottle of a simple purified water you can find in any store. The water
    would be the value, and a plastic bottle is a container. Then suppose you order
    water in a coffee shop. They would bring you the same purified water in a glass.
    Obviously, there is a huge difference between a plastic bottle and a glass. For
    starters, the bottle comes with a cap that won’t let the water out of the bottle.
    A plastic bottle and a glass are different types of containers that are holding
    the same value – water. We understand that different containers have different
    features and behave accordingly. The point I am trying to make is that based on
    your intentions for that value, in our case water, you should choose an appropriate
    container. If you plan to get into the business of selling purified water, you
    should choose a plastic bottle or an aluminum can with a flashy label for your
    value. Contrast that with having a glass of water at a restaurant. Maybe you should
    store your water in a travel mug or tumbler if you are planning a road trip.'
