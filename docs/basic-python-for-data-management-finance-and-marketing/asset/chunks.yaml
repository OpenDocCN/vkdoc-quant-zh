    变量 `pd` 用作快捷方式。`pd` 包含了所有 `Pandas` 函数，你可以通过键盘上的 Tab 键查看所有函数。在一个新单元格中，输入 `pd.`
    并按 Tab 键（图 3-1）。不要忘记 `pd` 后面的点。根据我的经验，尤其是在 Windows 系统上，可能需要一些时间才能看到包含所有函数的下拉菜单。在
    **Jupyter** 中，Tab 键可用作自动补全工具。


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig1_HTML.jpg](img/506186_1_En_3_Fig1_HTML.jpg)


    图 3-1 输入 `pd` 并按 Tab 键查看 `Pandas` 函数


    `Series` 是一种一维数据结构。我们之前见过序列结构，但这一次有所不同。如果你运行以下代码，可以看到 `Series` 的正式定义：


    ```

    help(pd.Series)

    ```


    它显示“带有轴标签的一维 ndarray”。^(⁴) 为了理解这个定义并领略 `Series` 的所有特性，我们需要创建一个。


    我们将从一个列表开始，然后将其转换为 `Series`，以观察两种数据结构之间的差异。定义一个简单的 Python 列表 `alist`，其中包含一些数字：


    ```

    alist = [ 100, 200, 300, 400, 500 ]

    ```


    使用 `pd.Series()` 函数，将列表转换为 `Series`：


    ```

    ser = pd.Series(alist)

    ```


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig2_HTML.jpg](img/506186_1_En_3_Fig2_HTML.jpg)


    图 3-2 Pandas Series


    在图 3-2 中，我们可以看到 `Pandas Series`，这是一种一维数据结构，或者简单地说是容器。`Series` 的左侧是索引。索引是默认提供的。索引的概念借鉴自关系数据库。在关系数据库中，每条记录都有一个主键。主键是唯一的标识符。使用键，你可以获取一个值。`Series`
    使用了相同的方法。但是，在 `Series` 中，作为连接数据集的结果，你可能会得到重复值。当我们学到连接操作时，会讨论这一点，并解释如何处理重叠的索引值。在此期间，我们可以通过索引来获取值：


    ```

    ser[1]

    ```


    `ser[1]` 操作将得到 `200`。使用切片表示法，我们可以获取几个值：


    ```

    ser[1:3]

    ```


    结果，我们得到 `200` 和 `300`。与 Python 切片表示法一样，结束索引被排除在外。


    `Series` 底部总是带有 `dtype`，即值的数据类型标识符。与列表相比，`Series` 是同质的，只能保存相同数据类型的值。值的同质性使得 `Series`
    比列表更快。我们可以执行一个简单的测试来说明同质性。将 `ser` Series 中的第一个元素替换为浮点数：


    ```

    ser[0] = 1000.1234

    ```


    浮点数 `1000.1234` 被转换为整数，然后才被 `dtype: int64` 的 `Series` 接受（图 3-3）。这意味着所有值必须具有相同的数据类型。如果由于某种原因无法将值转换为整数，那么
    `Series` 会将所有值转换为浮点数，或者引发错误。


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig3_HTML.jpg](img/506186_1_En_3_Fig3_HTML.jpg)


    图 3-3 Series 始终是同质的


    `Series` 有两个主要属性：`index` 和 `values`。尝试 `ser.index`，它将返回 `RangeIndex(start=0, stop=5,
    step=1)`，意味着有五个元素。索引的格式让人想起 `range()` 函数。我们在前一章中使用过它。`ser.values` 语句将揭示值存储为 NumPy
    数组，即 `array([1000, 200, 300, 400, 500])`。NumPy 是 Python 中另一个用于科学计算的核心库。虽然 NumPy
    包超出了本书的范围，但我们将会提及它。`Pandas` 的数据结构构建在 NumPy 数组之上，并且它们共享相似的行为。因此，我们可以借用 NumPy 中的函数并将其应用于
    `Pandas` 对象。


    `Series` 的一个主要优点是我们可以对整个结构（而不是其元素）执行操作。这种行为被称为向量化。向量化也是从 NumPy 继承而来的。这种行为使得 `Series`
    比 Python 列表更快、更高效。例如，如果我们需要将 `alist` 中的所有项除以 2，那么我们必须使用 `for` 循环：


    ```

    for item in alist:

    newitem = item / 2

    ```

