    \n图 6-11 风险价值计算\n\n如果需要预测五天的 VAR，可以将一天的 VAR 乘以天数的平方根。\n\n我们将`var * np.sqrt(day)`表达式放入一个遍历天数范围的\
    \ for 循环中。初始化一个空列表来存储结果，然后绘制它们：\n\n```\nvar_results = []\nnumber_of_days = 5\n\
    days_list = list(range(1, number_of_days+1))\nfor day in days_list:\n    result\
    \ = var * np.sqrt(day)\n    var_results.append(result)\n```\n\n由于`range()`函数中停止点是排他的，因此需要将`number_of_days`加\
