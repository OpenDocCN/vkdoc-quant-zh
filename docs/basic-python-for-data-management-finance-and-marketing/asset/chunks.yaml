    of the string converted to uppercase”. Later, we will talk why the method `upper()`
    returns a “copy” of an object. Methods are built-in commands into the object itself;
    that is why we need to use them like this:


    ```

    season.upper()

    or

    "winter".upper()

    ```


    Methods are unique to an object. If you run the `dir()` function on an integer
