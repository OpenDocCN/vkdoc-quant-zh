- fmt: '### Figure 3-48


    The function `concat()` by default concatenates DataFrames vertically.


    ```

    new_ds = pd.concat([ds_one, ds_two])

    ```


    The new DataFrame object `new_ds` created as a result of concatenation turned
    up with `NaN`s, not a number, and overlapping values in the index. We do not have
    corresponding values and `NaN`s in the rows reflect that. I will explain how to
    deal with missing values later.


    Duplicates in the index would be a problem going forward for the new data set.
    The `concat()` function comes with the `ignore_index` keyword, which is by default
    set to `False`. If you were sure that the new data set would have overlapping
    values, you could set `ignore_index=True`. This option would replace old indices
    with a brand-new index:


    ```

    pd.concat([ds_one, ds_two],ignore_index=True)

    ```


    I personally prefer another DataFrame method `reset_index()`. In the previous
    case, you lose the old index forever. With `reset_index()`, you have more flexibility
    and can save the original index with duplicates as a column. Run the `help()`
    function on the `new_ds` object, and you see the keyword argument `drop`:


    ```

    help(new_ds.reset_index)

    ```


    As you probably noticed by now, I use the `help()` function every time on every
    method or function. The Pandas library is being updated on a regular basis. Even
    if you know how to use a method or a function, it would be smart to check if anything
    has changed, comparing to the previous version. Besides, some methods take so
    many arguments that it is impossible to remember all of the options. The function
    `help()` will save you a lot of time googling.


    The argument `drop` in the `reset_index()` method is set to the default value
    `False`. If we apply `reset_index()` as it is to a `new_ds` object, we will get
    a brand-new index, and the original one would become a column:


    ```

    new_ds.reset_index(inplace=True)

    ```


    The DataFrame `new_ds` was appended with a column `index`, and the new index contains
    unique values only (Figure [3-49](#506186_1_En_3_Chapter.xhtml#Fig49)). In my
    opinion, the `drop` keyword argument in the `reset_index()` feature gives more
    flexibility especially if you work with a sensitive data that cannot be obtained
    again.


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig49_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig49_HTML.jpg)


    ### Figure 3-49

    Resetting the index on a DataFrame with the drop argument set to `False`


    If we changed the `drop` argument to `True` in the `reset_index()` method as with
    `ignore_index`, we would have lost the original index forever. Now with old index
    values in the column, we could always go back to them by resetting the index if
    needed:


    ```

    new_ds.index = new_ds["index"]

    ```


    Do not confuse a DataFrame attribute index with the column `"index"`.


    Another way to concatenate `ds_one` and `ds_two` DataFrames would be along the
    columns. We need to switch the `axis` argument to `1` or `"columns"`:


    ```

    new_ds = pd.concat([ds_one, ds_two],axis=1)

    ```


    This time, the `new_ds` DataFrame came with four columns and four rows (Figure
    [3-50](#506186_1_En_3_Chapter.xhtml#Fig50)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig50_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig50_HTML.jpg)


    ### Figure 3-50

    Concatenating two DataFrames with the axis argument set to columns


    The wine lovers who are reading this book probably noticed the mismatch between
    countries and wine-growing regions. Keep in mind that the function `concat()`
    just joins the data sets. If we need to match data, the best option would be the
    function `merge()`.


    ### Merging DataFrames


    The Pandas function `merge()` combines DataFrames based on common values in the
    columns. For starters, we need to have columns with the same values. Let’s add
    a new `"Origin"` column to `ds_two` with the following countries:


    ```

    ds_two["Origin"] = ["Spain", "France", "Italy", "US"]

    ```


    Now two DataFrames `ds_one` and `ds_two` have the column with the same values.
    Although in the `ds_one` DataFrame the column is called `"Country"` and in `ds_two`
    "Origin", we can merge them:


    ```

    merged_ds = pd.merge(ds_one, ds_two,left_on="Country", right_on="Origin")

    ```


    We have merged two DataFrames by matching values in the `"Country"` and `"Origin"`
    columns (Figure [3-51](#506186_1_En_3_Chapter.xhtml#Fig51)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig51_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig51_HTML.jpg)


    ### Figure 3-51

    The function `merge()` matches values in `"Country"` and `"Origin"` columns


    By default, the function `merge()` looks for the same column name. If we had the
    `"Country"` column in both data sets, then it would merge them by the values of
    these columns. In that case, we would not need to provide `left_on` and `right_on`
    arguments using the `merge()` function. I prefer to use `left_on` and `right_on`
    keyword arguments in the `merge()` function because you can be more specific.
    We definitely state that in `ds_one` we want to use the `"Country"` column to
    match values. The `left_on` argument is referring to the `ds_one` data set because
    position wise it is on the left in the function `merge()`. Logically, `right_on`
    is referring to a column in `ds_two` because it is on the right side of data sets’
    arguments. Also, if we had a couple of columns named the same in data sets, `merge()`
    would pick the first common column name to match the values. That might not be
    our plan, so I choose to be specific with columns.


    Data sets can be merged by an index. Pandas gives us many options to solve the
    same with different functions and methods. We can still use the `merge()` function
    with keyword arguments `left_index` and `right_index` by an index. But there is
    a method `join()` that is initially merging data sets by matching values in the
    index. To show the `join()` method in action, we will reset the index in `ds_one`
    to the `"Country"` column and in `ds_two` to the `"Origin"` column:


    ```

    ds_one.index = ds_one["Country"]

    ds_two.index = ds_two["Origin"]

    ```


    At the moment, two DataFrames have an index with the same values, and we can merge
    them with the help of the method `join()` which by default will match index values:


    ```

    joined_ds = ds_one.join(ds_two)

    ```


    The `joined_ds` DataFrame inherited the index from `ds_one` and matched it with
    indices of `ds_two` (Figure [3-52](#506186_1_En_3_Chapter.xhtml#Fig52)).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig52_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig52_HTML.jpg)


    ### Figure 3-52

    Merging two DataFrames with the method `join()` by matching values in an index


    ### Groupby


    `groupby` is one more essential tool of Pandas I want to discuss before we dive
    into a sea of practical challenges. The method `groupby()` is similar to sorting
    by functionality. If you have used relational databases, you should be familiar
    with the `groupby` functionality. The `groupby()` method gives an option to regroup
    a DataFrame based on common values in one or more columns. It sorts values and
    uses them as new keys. The `groupby()` method always returns an object. Most of
    the time, it is used with aggregation methods as `count`, `sum`, and `mean`. It
    will make more sense if we use `groupby` in action. We will take a data set with
    S&P 500 companies. I’ll open the CSV file from an online location, [`https://bit.ly/booksp500`](https://bit.ly/booksp500),
    in a new file.


    The S&P 500 index consists of 500 largest companies in the United States from
    11 industries. After we read the data from the CSV file located online, the DataFrame
    we get should look like the one in Figure [3-53](#506186_1_En_3_Chapter.xhtml#Fig53).


    ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig53_HTML.jpg](images/506186_1_En_3_Chapter/506186_1_En_3_Fig53_HTML.jpg)


    ### Figure 3-53

    DataFrame with S&P 500 companies from a CSV file


    The `file` DataFrame has three columns. The `"Sector"` column holds the industry
    name of a company.'
