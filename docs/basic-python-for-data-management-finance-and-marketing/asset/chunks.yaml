    `obj` 添加一个字符串，我们使用 `write()` 命令。完成后，使用 `close()` 命令将其保存到文件中。


    我们需要一个字符串来写入文件；确保你所有的代码都在同一个单元格中：


    ```

    string_one = "This pizza is delicious!"

    obj = open("myfile.txt", "w", encoding="utf8")

    obj.write(string_one)

    obj.close()

    ```


