- fmt: '# Working with APIs


    So far, we have been working with HTML web pages. I have mentioned at the beginning
    of the chapter a relationship between a client/browser and a server. A browser
    receives HTML and presents it as images and styled text. We are humans and want
    to see information presented in a nice colorful way.


    There are other clients that do not need to see images and colors. I am talking
    about devices. A device sending a request to a server also would be a client.
    For example, these days you can get a fridge that would place an order with a
    grocery store for delivery if you run out of milk. Another example would be a
    smartphone exchanging Facebook messages or a car receiving weather updates from
    a server.


    These devices need data in a simple format with no styles and colors. The data
    format they consume is JSON (JavaScript Object Notation) that comes as a string.
    Servers may send data as HTML or JSON based on a requesting client.


    Usually, JSON comes from an API (Application Programming Interface), an interface
    specifically designed to communicate with computer applications or devices.


    If your work is to analyze financial data, then you can subscribe for the Bloomberg
    API. On the other hand, if you are in digital marketing and need to receive information
    from Google Analytics, you would use the Google Analytics Reporting API. As a
    matter of fact, Google even has a Python library to help developers get connected
    to their APIs and access all Google applications. We will work with them later
    in the book.


    All APIs are designed differently, and most of the time companies have developer
    documentation explaining how to use them and how to get authenticated. Some of
    the APIs are free; others require a subscription.


    Here, we will take a look at a very popular source of financial data, Alpha Vantage.
    In the following example, I''ll explain to you the main principles of working
    with APIs.


    ## Getting an API Key


    All API providers require some sort of authentication, and Alpha Vantage is no
    excuse of the rule. Compared to other API services, it is very easy to get an
    API Key at [`www.alphavantage.co/support/#api-key`](http://www.alphavantage.co/support/%2523api-key).
    You need to answer two simple questions and provide your email address. Make sure
    you get your own API Key because the one I use here will expire. After a successful
    registration, you should see the message:


    ```

    Welcome to Alpha Vantage! Your API key is: ZIIROPRQCMEREHR8\. Please record this
    API key at a safe place for future data access.

    ```


    The API Key acts as a user id and a password at the same time. The API Key''s
    job is to authenticate a person or device requesting the information. Also, if
    it is a paid service, make sure that the account is current.


    ## Understanding the API Documentation


    Getting acquainted with any API should begin with the developer documentation
    of the API provider. We are new to Alpha Vantage services, and it would be smart
    to start with [`www.alphavantage.co/documentation/`](http://www.alphavantage.co/documentation/).


    Alpha Vantage provides several APIs to get stock prices, companies'' fundamental
    data, forex, cryptocurrencies, and technical indicators. We''ll use the `TIME_SERIES_DAILY_ADJUSTED`
    API to fetch historic daily prices for stocks.


    The demo URL looks like this:


    ```

    https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=IBM&apikey=demo

    ```


    Open the reference in a browser, and you will see JSON data that contains `open`,
    `high`, `low`, and `close` values for IBM stock. If you take a closer look, you''ll
    see that JSON reminds a Python dictionary data type.


    The demo URL gives us a good understanding of how to use it. An IBM value in the
    API endpoint could be replaced with any other symbol of a stock we want to get
    historic prices. In the `apikey=demo` argument, the `demo` should be changed to
    an API Key you have obtained.


    ## Fetching Stock Data with Python


    Using a time series API, we will get historic prices for AAPL and store them as
    a DataFrame. In a new Jupyter file, import two libraries we would need for this
    example, `Requests` and `Pandas`:


    ```python

    import requests

    import pandas as pd

    ```


    We need to define the API Key as a string, a URL for the API, and a stock we want
    to get:


    ```python

    API_Key = "ZIIROPRQCMEREHR8"

    url = "https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol={}&apikey={}"

    stock = "AAPL"

    ```


    In the URL, I have replaced the `IBM` symbol and `demo` with `{}`; later, we will
    insert our own values into them with the `format()` method.


    For starters, we need to send a request to a server with the `requests.get()`
    method. We will pass `"AAPL"` with the `stock` variable and `API_Key` we have
    defined. The Python string method `format()` makes the code cleaner, and it would
    be easy to replace `"AAPL"` with any other symbol down the road:


    ```python

    data = requests.get(url.format(stock, API_Key))

    ```


    Run the code and `data` will return response `200`, meaning that everything is
    OK, and we got the information from the API. As I have mentioned before, the Python
    library Requests supports different data types, and since the API serves JSON,
    we would use the method `json()` to extract the values. You can just chain `json()`
    to `requests.get()`:


    ```python

    data = requests.get(url.format(stock, API_Key)).json()

    ```


    Finally, the data we have received from the Alpha Vantage API looks like in Figure
    4-28.


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig28_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig28_HTML.jpg)


    **Figure 4-28** Receiving data from an API


    ## Exploring the API Response


    The JSON syntax is similar to a Python dictionary. Every time I am dealing with
    a new source data, I use the `type()` function. Pass `data` into `type()`, and
    you''ll see that Python took it as a dictionary.


    We have received a lot of information from the API, and it is difficult to visually
    identify the keys in the dictionary. The Python dictionary method `keys()` will
    help us to get all the keys:


    ```python

    data.keys()

    ```


    The method `keys()` has returned `dict_keys([''Meta Data'', ''Time Series (Daily)''])`.
    We are not interested in `''Meta Data''` and will take a closer look at `''Time
    Series (Daily)''`. `data` is a dictionary, and we can get the values by a key
    `''Time Series (Daily)''`. `Time Series` is another dictionary, so we will use
    the `keys()` method again:


    ```python

    data[''Time Series (Daily)''].keys()

    ```


    Apparently, `data[''Time Series (Daily)'']` contains all information as dictionaries
    too. The method `keys()` has returned dates that were used as a key. Each inner
    dictionary contains more keys with daily values for `"AAPL"`. To get them, you
    can apply the same method `keys()` to any date:


    ```python

    data[''Time Series (Daily)''][''2021-01-08''].keys()

    ```


    Every day has the same set of keys to hold values:


    ```

    dict_keys([''1\. open'', ''2\. high'', ''3\. low'', ''4\. close'', ''5\. adjusted
    close'', ''6\. volume'', ''7\. dividend amount'', ''8\. split coefficient''])

    ```


    If I needed to get a closing price for AAPL stock for `''2021-01-08''`, I would
    fetch it like this (Figure 4-29):


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig29_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig29_HTML.jpg)


    **Figure 4-29** Accessing values from the received data converted to a Python
    dictionary


    ```python

    data[''Time Series (Daily)''][''2021-01-08''][''4\. close'']

    ```


    If you need to get all close prices from the Alpha Vantage Time Series API, then
    you can iterate through a dictionary. In this example, I''ll use `dict_of_prices`
    as an intermediate variable just to make the code cleaner and clearer (Figure
    4-30):


    ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig30_HTML.jpg](images/506186_1_En_4_Chapter/506186_1_En_4_Fig30_HTML.jpg)


    **Figure 4-30** Iterating through the `dict_of_prices` dictionary object'
