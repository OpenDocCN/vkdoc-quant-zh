    # Twitter 机器人


    Python 的另一个实际应用是为社交媒体和聊天构建机器人。这里，我们将构建一个简单的 Twitter 机器人。它将在 Twitter 账号上发布内容。


    坦白说，最近让你的机器人在 Twitter 上注册并获得 API 密钥变得更加困难了。希望在这本书出版时，Twitter 的身份验证过程仍如同我在这里描述的一样。


    作为开发者，你应该从 Twitter 开发者文档开始你的 API 注册流程：[`https://developer.twitter.com/en`](https://developer.twitter.com/en)。在那里你可以找到大量关于如何自动化你的
    Twitter 账号的信息。此外，他们还有一个开发者问答博客，你可以在那里找到大量有用的信息，并获得与 Twitter 相关问题的答案。


    在我们开始编码之前，我们需要在 [`https://developer.twitter.com/en/portal/dashboard`](https://developer.twitter.com/en/portal/dashboard)
    注册我们未来的应用并获取 API 密钥。但在此之前，你应该已经是 Twitter 用户并拥有一个活跃账号。


    获取 Twitter API 密钥的流程如下：使用你的 Twitter 账号登录 Twitter 开发者门户。在那里，你需要点击中央按钮 **“创建项目”**
    来启动一个新应用。请准备好提供你的电话号码。如果你的个人资料中没有电话号码，Twitter 将不允许你创建应用。


    要获取 API 密钥，你需要提供项目名称，并简要说明你机器人的用途（图 7-16）。


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig16_HTML.jpg](img/506186_1_En_7_Fig16_HTML.jpg)


    **图 7-16** 注册一个新的 Twitter 应用


    回答完所有问题后，Twitter 会为你提供 API Key、API Secret Key 和 Bearer Token。这是我们机器人进行 Twitter
    身份验证所需的三个密钥。除了这些密钥，你还需要生成一个 Access Token 和一个 Secret Token。要生成令牌，在左侧菜单的 **项目与应用**
    下，点击你的应用名称。点击应用后，你应该会看到 **应用详情** 信息。向下滚动，找到 **应用权限** 部分。在 **应用权限** 部分，点击 **编辑**
    选项并切换到 **读取和写入** 模式。这个操作对于机器人能够发布推文是必要的。在同一页面顶部的 **密钥和令牌** 部分，你需要生成 **访问令牌和秘密令牌**。点击
    **重新生成** 按钮，并将令牌存储在安全的地方（图 7-17）。


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig17_HTML.jpg](img/506186_1_En_7_Fig17_HTML.jpg)


    **图 7-17** 生成访问令牌和秘密令牌


    当你手头有所有 API 密钥和访问令牌后，就可以准备构建一个 Twitter 机器人了。


    有几个 Python Twitter 库。我个人更喜欢 Tweepy，因为它简单易用。如果你以后决定构建比我们在这里介绍的内容更复杂的东西，你随时可以查阅
    Tweepy 文档 ([`https://docs.tweepy.org/en/latest/`](https://docs.tweepy.org/en/latest/))。


    ## 安装 Tweepy


    Tweepy 不是 Anaconda 的一部分，你需要单独安装它。在终端窗口中，运行：


    ```

    pip install tweepy

    ```


    在一个新的 **Jupyter** Notebook 中，导入 Tweepy，这是我们发送推文所需的库：


    ```python

    import tweepy

    ```


    下一步是定义 Twitter 提供给我们的 API 密钥和令牌：


    ```python

    API_KEY = ''Q88u0KvQK4f7fGfqO43SxVbcE''

    API_SECRET = ''ahQk6VKzjuF5eucS6a6DJT3LubBqnBTj5JxT2BvBTaIDMKkZhO''

    ACCESS_TOKEN = ''797271725629173762-3etBbFChCjbQFCYYKf9oq5HtvMqmha9''

    SECRET_TOKEN = ''apXizrBPPE7TqqW7OAhnBx1DzetrUpqNbPS1PoRzTZKjF''

    ```


    ## 与 Twitter 进行身份验证


    首先，我们需要获得 Twitter 的身份验证。使用 Tweepy 的 `OAuthHandler` 和 `set_access_token` 方法，我们将
    API 密钥作为参数传入。使用这些 API 密钥和令牌，你获得身份验证并与 Twitter 建立连接：


    ```python

    auth = tweepy.OAuthHandler(CONSUMER_KEY, CONSUMER_SECRET)

    auth.set_access_token(OAUTH_TOKEN, OAUTH_TOKEN_SECRET)

    api = tweepy.API(auth)

    ```


    ## 发送带媒体的推文


    我们的目标是生成并发送一条包含图片和文字的推文。准备一张图片，并将其存储在与你的 **Jupyter** 文件相同的目录中，或者确保你知道图片文件的相对路径。


    使用 `image_path` 变量定义要上传的文件路径：


    ```python

    image_path = "/Users/programwithus/Chapter7/fortweeter.png"

    ```


    机器人获得身份验证后，我们就可以发布带有媒体文件的推文了。特殊的 Tweepy 方法 `update_with_media()` 发布媒体并添加一条消息。根据文档，太长或重复的消息将被忽略。消息应使用
    `status` 关键字传递：


    ```python

    api.update_with_media(image_path, status="Python Rules! Learn Python")

    ```


    如果推文发送成功，你会看到返回的包含所有详细信息的 `Status` 消息，如图 7-18 所示，以及实际的推文（图 7-19）。


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig19_HTML.jpg](img/506186_1_En_7_Fig19_HTML.jpg)


    **图 7-19** 由 Tweepy 库发送的推文


    ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig18_HTML.jpg](img/506186_1_En_7_Fig18_HTML.jpg)


    **图 7-18** 自动发送带媒体文件推文的代码

