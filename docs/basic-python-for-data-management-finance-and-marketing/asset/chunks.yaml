- fmt: '# Dictionary


    A dictionary is a very important and widely used data structure. I will be referring
    to a dictionary many times as we move along. Understanding a dictionary will help
    us to comprehend more sophisticated data structures.


    A dictionary is an unordered collection of key and value pairs. A key holds a
    single value. A phone book would be the best way to explain a dictionary structure.
    To initialize a dictionary, we need to use `{}` curly brackets:


    ```

    phone_book = {}

    ```


    After we have defined `phone_book` as a dictionary, we can add a few phone numbers
    to it. In order to add a new pair to a dictionary, we need a key in square brackets
    and assign a value. Suppose I want to store my friend’s phone number, then `John`
    would be the key, and John’s number is the value:


    ```

    phone_book["John"] = 2123458967

    ```


    The key has to be unique. If I had another friend with the same name, I would
    need to use a different key to store his number. We can add a couple more friends
    to the dictionary:


    ```

    phone_book["Tommy"] = 5169873456

    phone_book["Mark"] = 2015672189

    ```


    Now `phone_book` should look like in Figure [2-18](#506186_1_En_2_Chapter.xhtml#Fig18).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig18_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Python dictionary


    If you want to fetch a value, all you need is a key. To get Tommy’s phone number,
    I need to pass his name as the key (Figure [2-19](#506186_1_En_2_Chapter.xhtml#Fig19)):


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig19_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig19_HTML.jpg)


    Figure 2-19


    Fetching a value by a key


    ```

    phone_book["Tommy"]

    ```


    Compared to a list structure, a dictionary would be faster. It took us one operation
    to get a value from the dictionary. If I stored phone numbers in a list, I would
    need to iterate to find Tommy’s number. Iteration requires many operations. That
    in any case would take longer than one operation.


    Another feature of a dictionary is easy reassignment of the value. Suppose Tommy
    changes the phone number, we can replace an old value with a new one (Figure [2-17](#506186_1_En_2_Chapter.xhtml#Fig17)):


    ```

    phone_book["Tommy"] = 2016546765

    ```


    There is no limit on how many times you want to change the value and how often.
    Easy reassignment of a value makes a dictionary a perfect structure to hold stock
    prices. The stock symbol would be the key, and the price as the value could be
    changed many times. Likewise, a dictionary is used to count stuff. The value is
    updated for every instance of the key. At the end of the chapter, we will count
    how many times each word appears in a text file using a dictionary.


    Since a dictionary is an unordered collection and can hold thousands of elements,
    how would you find all the keys? As always, we start with the `dir()` function.
    If you run `dir()` on `dict` or in our case `phone_book`, you will find the methods
    a dictionary supports. The method we are looking for is `keys()`.


    The `keys()` attribute will get all the keys from a dictionary. If you see a dictionary
    for the first time, start with `keys()`. This command will return an ordered array
    of all keys from a dictionary (Figure [2-20](#506186_1_En_2_Chapter.xhtml#Fig20)):


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig20_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig20_HTML.jpg)


    Figure 2-20


    The method `keys()` returns all the keys from a dictionary


    ```

    phone_book.keys()

    ```


    The opposite of the `keys()` method is `values()`. `values()` would return all
    values from a dictionary as a list (Figure [2-21](#506186_1_En_2_Chapter.xhtml#Fig21)):


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig21_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig21_HTML.jpg)


    Figure 2-21


    The method `values()` returns all the values from a dictionary


    ```

    phone_book.values()

    ```


    Values are less informative for us because we do not know what they are referring
    to. On the other hand, if we assume that a dictionary holds all stocks traded
    on NYSE, by values we could see how many companies are gaining or losing.


    The method `items()` converts a dictionary to a list of tuples. Each key-value
    pair would be presented as a tuple structure (Figure [2-22](#506186_1_En_2_Chapter.xhtml#Fig22)).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig22_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig22_HTML.jpg)


    Figure 2-22


    The method `items()` returns all pairs from a dictionary as tuples


    ```

    phone_book.items()

    ```


    The method `items()` will come in handy in the case that we need to convert a
    dictionary into a list. A dictionary is not an ordered structure; therefore, to
    sort a dictionary by values, you need a list. A list naturally can be sorted.
    You will see this example in action later in the chapter.


    The method `get()`, as you might have guessed, fetches the value by the key. The
    main difference between this method and the dictionary notation, `phone_book["Tommy"]`,
    is that `get()` would return a default value if the key is not found. If a user
    tries to retrieve Mary’s phone number and there is no Mary in the dictionary,
    then `get()` will return `"Not Found"`:


    ```

    phone_book.get("Mary", "Not Found")

    ```


    Returning a default value would be a neater way compared to an error message (Figure
    [2-23](#506186_1_En_2_Chapter.xhtml#Fig23)).


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig23_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig23_HTML.jpg)


    Figure 2-23


    The method `get()` returns a default value if a key is not in the dictionary


    By now, you are probably asking the question, is it possible to iterate over a
    dictionary with a `for` loop? My approach is if you are not sure or do not know
    something, try it. At least you will learn why an operation failed from an error
    message. As a matter of fact, you can loop through a dictionary.


    There are a couple of ways to iterate through a dictionary. The first one is straightforward:


    ```

    for i in phone_book:

    print(i)

    ```


    This method will get you all the keys from a dictionary. By keys, you can get
    the values:


    ```

    for i in phone_book:

    print(i, phone_book[i])

    ```


    Another iteration technique requires the `items()` method:


    ```

    for i in phone_book.items():

    print(i)

    ```


    As you can see, the `i` variable represents a tuple. The method `items()` has
    converted `phone_book` into a list of tuples. Technically, after `items()` has
    been applied, we iterate through a list of tuples. Each tuple contains exactly
    two values what used to be a key and a value. To extract a key and a value, we
    need to unpack the tuple. One way would be to index the key and the value:


    ```

    for i in phone_book.items():

    print(i[0], i[1])

    ```


    However, we can assign variables to the first and second elements in a tuple:


    ```

    key, value = ("John", 2123458967)

    ```


    If we go with logic, then the `for` loop would require two variables and will
    look like this:


    ```

    for key, value in phone_book.items():

    print(key, value)

    ```


    In Figure [2-24](#506186_1_En_2_Chapter.xhtml#Fig24), you can see that the two
    solutions are producing the same results. It is up to you which technique to use
    at the end of the day.


    ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig24_HTML.jpg](images/506186_1_En_2_Chapter/506186_1_En_2_Fig24_HTML.jpg)


    Figure 2-24


    Iterating through a dictionary with a `for` loop


    One simple exercise will sum up getting values from a dictionary and adding new
    keys and values.


    Suppose we have a menu in a restaurant stored as a dictionary:


    ```

    menu = {"Burger": 3.75, "Soda": 0.99, "Nachos": 2.99, "Shake": 1.25}

    ```


    Using an input function, we will ask a user for two items from the menu:


    ```

    item_one = input("What would you like?")

    item_two = input("What else would you like?")

    ```


    After we get the desired items, we can fetch the price from the dictionary using
    them as keys:


    ```

    price_one = menu[item_one]

    price_two = menu[item_two]

    ```'
