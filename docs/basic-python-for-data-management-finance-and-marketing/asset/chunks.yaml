    7. Essential Digital Marketing Tasks Done with Python


    Digital marketing requires digital tools to work with social media, send sales
    emails, and acquire clients in the World Wide Web. There are numerous marketing
    applications helping digital marketeers to run, test, and analyze promo campaigns,
    but some of them are ridiculously expensive, and others are not customizable and
    require additional work to get needed results. Would it be great if with a few
    lines of code, you could’ve run and evaluate any custom scenario for free? You
    can build your own marketing tools with Python. All big tech giants provide free
    and easy-to-use APIs to automate tasks and manage the information.


    In this chapter, we will take a look at the most popular marketing services from
    Google, Twitter, and Mailgun. Using their APIs and Python, we will robotize many
    tedious tasks. Besides, we will learn how to get the marketing data in Python-readable
    format to examine it with Pandas.


    We will start with the most essential digital marketing instrument – Google Analytics.
    Google is a Python-friendly company, and Python’s inventor Guido van Rossum had
    work at Google for a while. Many Google services run on Python, and almost all
    of them can be accessed through APIs. Google even has its own Python library to
    make a connection to its services as simple as possible.


    ## Getting Started with Google API Client


    I want to start with a quick introduction to the Google API Client package. The
    Google API Client libraries provide an entry point to all essential Google products.
    Whether you want to send or read email from a Gmail account or access Google Maps
    with Python, you would need to have Google API Python Client installed on your
    machine.


    The installation process is seamless with a Python package manager `pip`. Open
    Terminal in Anaconda Navigator → Environments → base → Terminal, and using the
    `pip` command, install the Google API Client package:


    ```bash

    pip install google-api-python-client

    ```


    All Google services require authentication and enabling the API.[^(18)](#fn18)
    The process I am about to describe here would be a generic scenario for any Google
    API service.


    Google recommends managing your projects and monitoring API usage in one place,
    Google Cloud Platform ([`https://cloud.google.com/`](https://cloud.google.com/)).
    Some of Google services are free, some require payments, but regardless of that,
    for new developers Google offers a $300 credit which is more than enough to try
    the APIs. If you do not have a Google account yet, create one at [`https://accounts.google.com`](https://accounts.google.com)
    and log in to Google Cloud Platform.


