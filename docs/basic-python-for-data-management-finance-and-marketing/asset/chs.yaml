  }\n], \"dimensions\": [\n{\"name\": \"ga:deviceCategory\"}\n]\n}]}).execute()\n\
  ```\n\n您收到的响应应类似于图 7-9 所示。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig9_HTML.jpg](img/506186_1_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9** 请求关于页面浏览量和会话时长的 Google Analytics 报告\n\n与前面的示例一样，我们需要从响应中提取值。在大多数 API\
  \ 中，所有信息都存储在`\"data\"`键下。使用字典表示法，我们可以解包响应并访问`\"data\"`：\n\n```\nresponse['reports'][0][\"\
  data\"]\n```\n\n由于我们请求了维度值，数据中包含另一个键`\"rows\"`。我们可以将该路径存储在一个新变量`report_two`下：\n\n\
  ```\nreport_two = response['reports'][0][\"data\"][\"rows\"]\n```\n\n如果你对`report_two`对象运行`type()`函数，你会发现它是一个列表数据结构。`report_two`列表包含三个字典，这些字典带有`\"\
  dimensions\"`和`\"metrics\"`键。同时，`\"metrics\"`指向另一个列表，该列表包含一个字典和键`\"values\"`（图 7-10）。\n\
  \n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig10_HTML.jpg](img/506186_1_En_7_Fig10_HTML.jpg)\n\
