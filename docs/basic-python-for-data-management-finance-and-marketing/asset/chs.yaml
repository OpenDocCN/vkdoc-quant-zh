  \ 方法中，我将 [`https://www.investing.com`](https://www.investing.com) 与 `clean_titles`\
  \ 列表中 URL 的其余部分拼接起来。不要忘记添加标头。最后的 `print` 语句不是必需的，但我喜欢查看它的工作方式，并确保我获取到了完整的 URL（图\
  \ 4-13）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig13_HTML.jpg](img/506186_1_En_4_Fig13_HTML.jpg)\n\
  \n**图 4-13** 为每篇文章调用 URL\n\n在 `for` 循环的作用域内，我们需要对每个 `page` 对象使用 `BeautifulSoup()`\
  \ 函数。我们将每篇文章页面的 HTML 结构保存在变量名 `article` 下。最后一步是对 `article` 对象应用带有 `<p>` 标签的 `find_all()`\
  \ 方法。`find_all()` 方法返回一个列表，我们将其保存在 `list_article` 名下。在这里，我想暂停一下，介绍一个概念，它在未来会为我们节省时间——列表推导式。\n\
  \n"
- "# 列表推导式\n\n列表推导式是一种 Python 语法，可以使你的代码运行得更快。这在处理大量数据时尤其重要。在需要抓取数千个网页时，我倾向于使用列表推导式来收集信息。\n\
  \n在我们讲解列表推导式语法之前，我想让你做一个简单的练习。假设我们有一个 `alist`，里面装满了数字。我们想过滤它，找出所有 `5`。然后我们需要将所有\
  \ `5` 保存到一个新列表中。让我们将其命名为 `blist`。解决方案是：\n\n```\nalist = [1,2,3,5,5,5,6,7,5,5]\n\
  blist = []\nfor number in alist:\nif number == 5:\nblist.append(number)\n```\n\n\
  ```\n\n\n我们遍历列表以查找`5`。如果找到`5`，我们会使用列表方法`append()`将其添加到`blist`中。`append()`方法在 Python\
  \ 中是以模块形式实现的，每次我们获取到`5`时调用它都需要耗费一定时间。为了让这段代码运行得更快，我们可以跳过`append()`方法，将解决方案重写为列表推导式。同样的查找`5`的示例如下：\n\
  \n```\nblist = [ number for number in alist if number == 5 ]\n```\n\n整个语句被包裹在方括号中，结果会以列表形式返回。这就是我们不再需要`append()`方法的原因。列表推导式语句的结果始终是列表类型，在我们的例子中，它被保存为`blist`。列表推导式的速度大约是使用`append()`方法的两倍，当列表元素超过\
  \ 10,000 个时，你就能感受到这种差异。\n\n一个简单列表推导式的语法包含三个部分：`for` 循环、过滤器和表达式。过滤器是可选的：\n\n```\n\
  [ expression for loop filter ]\n```\n\n如果你将第一个解决方案与列表推导式的方案进行比较，你会发现它们几乎相同。方括号中的方案以表达式开头。在我们的例子中，表达式就是数字本身，因为我们只想在值等于\
  \ 5 时保留这个值。在其他情况下，你可能想做些别的事情，比如当值等于 5 时将 `number` 乘以 10。然后我们使用相同的 `for` 循环，在其中定义了\
  \ `number` 变量。过滤器是一个 `if` 语句。有时你需要它，有时则不需要。如果需要 `if` 语句，就将其紧跟在 `for` 循环后面。\n\n让我们再看一个例子；假设我们需要获取\
  \ `alist` 容器中的所有数字并将它们乘以 `10`。在这种情况下，我们不需要过滤器，列表推导式如下所示：\n\n```\nblist = [ number\
  \ * 10 for number in alist ]\n```\n\n你需要记住，列表推导式始终返回一个列表数据结构。通过将列表推导式语句赋值给一个变量，即可保存该列表。\n\
  \n现在，让我们带着列表推导式的语法回到我们的网页抓取示例中。我们的最终目标是将标题和文章摘要写入到一个文本文件中。为了使过程更顺畅，我们将使用列表推导式 `[\
  \ p.get_text() for p in list_article]` 从 `list_article` 中的所有条目中剥离 `<p>` 标签。这个列表推导式的结果将是一个字符串列表。为了连接列表中的所有字符串，我们将使用字符串方法\
  \ `join()`。我注意到每篇完整文章的第一个 `<p>` 标签包含“没有找到匹配您搜索的结果”。由于我们抓取了所有 `<p>` 标签，这条消息会作为 `list_article`\
  \ 中的第一个条目。我们不需要它，因此将从 `list_article[1:]` 的第二个元素开始将其切片去除。\n\n我们将在同一时间完成整个清洗和连接操作，如下所示：\n\
  \n```\nclean_article = \" \".join([p.get_text() for p in list_article[1:]])\n```\n\
  \n`clean_article` 将是完整的文章。在 `for` 循环结束时，我们将每篇文章作为一个字符串追加到 `mega_list` 中：\n\n```\n\
  mega_list = [ ]\nfor item in clean_titles:\n    url = item[1]\n    page = requests.get(\"\
  https://www.investing.com{}\".format(url), headers={'User-agent':'Mozilla/5.0'})\n\
  \    print(\"now fetching\", \"https://www.investing.com{}\".format(url))\n    article\
  \ = BeautifulSoup(page.content, \"html.parser\")\n    list_article = article.find_all(\"\
  p\")\n    clean_article = \" \".join([p.get_text() for p in list_article])\n   \
  \ mega_list.append(clean_article)\n```\n\n在图 4-14 中，你可以看到运行中的代码，在图 4-15 中，可以看到 `mega_list`\
  \ 的一小部分。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig15_HTML.jpg](img/506186_1_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15\n解析并清洗每篇文章的信息\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig14_HTML.jpg](img/506186_1_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n从 investing.com 收集文章\n\n最后一部分是以文本格式创建报告。我们将使用 `zip()` 函数来组合 `clean_titles`\
  \ 和 `mega_list` 列表：\n\n```\nfinal_list = list(zip(clean_titles, mega_list))\n```\n\
  \n在将数据写入文本文件之前，我们会对它进行一些格式化并打印出来，以确保一切看起来没问题。\n\n我们可以在变量名 `TEMP` 下创建一个字符串模板：\n\n\
  ```\nTEMP = \"\"\"\nTitle: {}\nSnippet: {}\nURL: {}\n\"\"\"\n```\n\n这个模板将很好地格式化文章标题、不超过\
  \ 300 个字符的文章摘要，以及用于阅读完整文章的 URL。\n\n我们将从 `final_list` 容器中将所有这些信息传递到 `TEMP` 中：\n\n\
  ```\nfor item in final_list:\n    title, url = item[0]\n    url=\"https://www.investing.com{}\"\
  .format(url)\n    snippet = item[1][:300]\n    print(TEMP.format( title, snippet,\
  \ url))\n```\n\n`final_list` 列表包含包含两个列表的元组。我们为元组中的第一个列表分配两个变量名：\n\n```\ntitle, url\
  \ = item[0]\n```\n\n为了获得一个完全可点击的 URL，我们将添加 `www.investing.com`：\n\n```\nurl = \"\
  https://www.investing.com{}\".format(url)\n```\n\n然后从第二个列表中截取前 300 个字符。你可以根据需要看到的摘要长度更改此数字：\n\
  \n```\nsnippet = item[1][:300]\n```\n\n最后，通过 `format()` 方法将变量传递到 `TEMP` 中（图 4-16）。\n\
  \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig16_HTML.jpg](img/506186_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16\n使用模板将文本格式化为可读格式\n\n如果看起来不错，我们可以将 `TEMP` 写入一个文本文件。为此任务，我们将使用 `open()` 函数初始化一个新的\
  \ `report` 对象：\n\n```\nreport = open(\"report.txt\", \"w\")\n```\n\n最后，将 `TEMP.format(\
  \ title, snippet, url)` 传递到 `write()` 方法中：\n\n```\nfor item in final_list:\n   \
  \ title, url = item[0]\n    snippet = item[1][:300]\n    print(TEMP.format( title,\
  \ snippet, url))\n    report.write(TEMP.format(title,snippet,url))\n```\n\n最终的 `report.txt`\
  \ 文件应该如图 4-17 所示。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig17_HTML.jpg](img/506186_1_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17\n网页抓取操作的最终输出存储在文本文件中\n\n如你所见，网页抓取过程本身并不复杂。我认为它更耗时。你需要花一些时间来寻找正确的标签和属性以提取元素。此外，数据清洗也需要一些时间。请记住，网站会进行维护，开发者可能会重命名属性或更改网站布局。如果该网站的开发者更改了一些内容，代码将无法运行，我们将不得不从头开始整个操作。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 使用 Selenium 进行网页抓取\n\
  \n现代网站严重依赖 JavaScript 库，这些库可以在不重新加载网页的情况下更新信息。我不想深入探讨 Web 开发，因为这超出了本书的范围。简而言之，网页上的某些元素是在用户端生成的，而\
  \ BeautifulSoup 无法捕获它们。在这种情况下，我们需要使用 Selenium 来模拟浏览器的体验。最初，Selenium 是为 Web 应用程序测试而开发的，但很快就成为自动化和数据收集的流行工具。Selenium\
  \ 的功能允许模拟鼠标和键盘操作。您可以编写脚本来通过鼠标点击翻页，并在网页上的在线表单中输入信息。\n\n不幸的是，Anaconda 并未自带 Selenium，您需要单独安装它。Selenium\
  \ 是一个第三方库，要安装它，我们需要一个包管理器，例如 PIP 或 Conda。\n\nPython 包管理器或 PIP 是一种简单可靠的、用于查找和安装 Python\
  \ 库的内置辅助工具。尽管 PIP 是最新 Python 版本中的标准功能，但有时您需要启动它。\n\n在 Mac 上，您需要在搜索提示或 `Launchpad`\
  \ 的 `其他` 应用中搜索 `Terminal`。请不要使用运行 Anaconda 内核的 `Terminal` 窗口。请确保在 `Terminal` 中，通过菜单\
  \ `Terminal` ➤ `Shell` ➤ `新建窗口` 打开一个全新的窗口。\n\n在那个新的空 Terminal 窗口中，运行 `pip --version`\
  \ 命令来检查您机器上的 PIP 版本：\n\n```\npip -- version\n```\n\n如果由于某种原因，您收到错误信息 `\"pip command\
  \ not found\"`，请使用以下代码启动 PIP：\n\n```\nsudo easy_install pip\n```\n\n`Sudo` 命令会提示您输入计算机管理员安装权限的密码，然后启动\
  \ PIP。如果 `sudo easy_install pip` 不起作用，请打开 [python.org/downloads](http://python.org/downloads)\
  \ 并从官方 Python 下载页面安装 Python。然后再次重复 `sudo easy_install pip` 命令。\n\nWindows 用户点击位于左下角的搜索提示并输入名称\
  \ `CMD，命令提示符`。`CMD` 缩写应能打开一个命令提示符窗口。要查看您是否已安装 PIP 或是否需要安装 PIP，请在命令提示符中运行以下命令：\n\n\
  ```\npip -- version\n```\n\n如果得到带有版本号的响应，则说明您的计算机上已安装 PIP；否则，您需要下载 PIP 模块。\n\n如果您收到\
  \ `\"pip command not found\"` 消息，请前往官方 Python 页面 ([www.python.org/downloads](http://www.python.org/downloads))\
  \ 并下载最新版本的 Python。当您开始安装过程时，在第一个屏幕上选中底部的 `\"Add Python 3.9 to PATH\"` 选项（图 4-18）。安装过程完成后，关闭并重新打开\
  \ `CMD` 提示符。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig18_HTML.jpg](img/506186_1_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18 在 Windows 上安装 Python 并将其添加到 PATH\n\n再次尝试 `pip -- version` 命令。如果问题仍然存在，请下载\
  \ `get-pip.py` 文件。通常，我建议将 `get-pip.py` 文件保存到 `Downloads` 文件夹。要从 `get-pip.py` 文件安装\
  \ PIP，您需要打开一个新的 `CMD` 窗口，并使用 `CMD` 命令 `cd`（更改目录）导航到 `Downloads` 目录：\n\n```\ncd Downloads\n\
  ```\n\n进入 `Downloads` 目录后，执行 `get-pip.py` 文件：\n\n```\npython get-pip.py\n```\n\n\
  现在，`pip -- version` 命令应该可以工作了，您可以使用 `pip install <package>` 语句来安装 Python 库。在极少数情况下，PIP\
  \ 命令仍然引发错误消息，请参考 [`packaging.python.org/tutorials/installing-packages/`](https://packaging.python.org/tutorials/installing-packages/)\
  \ 上的官方 Python 文档。假设 PIP 已就位，我们准备安装 Python 包。要将第三方库添加到 Anaconda，我建议直接从 Anaconda Navigator\
  \ 打开 `Terminal` 或 `命令提示符`。\n\n第 1 步. 在 Anaconda Navigator 的左侧菜单中，点击 `Environments`\
  \ 并导航到 `Base (root)`。\n\n第 2 步. 在 `Base (root)` 的右侧应该有一个 `播放` 按钮。点击那个 `播放` 按钮，您会看到一个菜单，第一个选项是\
  \ `打开终端`。\n\n第 3 步. 通过点击 `打开终端` 来启动一个 Terminal 窗口。紧接着，应该会弹出一个新的 Terminal 窗口。\n\n\
  第 4 步. 在 `Terminal` 窗口中，运行 PIP 命令来安装 Selenium 或任何其他库：\n\n```\npip install selenium\n\
  ```\n\n除了安装 Selenium 本身，我们还需要下载 Chrome 驱动。Selenium 可以用于任何 Web 浏览器。由于其流行度和内置的开发者工具，在本文示例中我们将使用\
  \ Chrome 浏览器。在下载驱动程序之前，请检查您机器上安装的浏览器版本。您可以在 Chrome 设置中的 `关于 Google Chrome` 部分找到此信息。我们关心的是长版本号的前两位数字。目前，我的\
  \ Mac 上运行的是 Chrome 浏览器 87 版。\n\n牢记此信息，从 [`chromedriver.chromium.org/downloads`](https://chromedriver.chromium.org/downloads)\
  \ 找到并下载适合您操作系统的驱动程序。我绝对建议，如果您在 [`chromedriver.chromium.org/downloads`](https://chromedriver.chromium.org/downloads)\
  \ 页面的“当前版本”部分找不到您的 Chrome 浏览器版本，请更新 Chrome 浏览器。驱动程序以 zip 文件形式压缩。解压并将 ChromeDriver\
  \ 保存到您的 `Jupyter` Notebook 或 Python 文件所在的同一目录。请确保您知道 ChromeDriver 的保存位置，因为您需要提供其完整的相对路径。\n\
  \n## Selenium 简介\n\n我想从一个 [amazon.com](http://amazon.com) 的抓取示例开始介绍 Selenium。我们将打开\
  \ [amazon.com](http://amazon.com) 上的任意产品页面，并收集该产品的信息。打开一个新的 `Jupyter` Notebook，在导入\
  \ Selenium 后，将其连接到 ChromeDriver：\n\n```\nfrom selenium.webdriver import Chrome\n\
  ```\n\n我将创建一个变量 `driver_path` 并指定 ChromeDriver 的相对路径。`Chapter4` 是存放 `Jupyter` 文件和\
  \ ChromeDriver 的文件夹，`programwithus` 是我的主目录。请注意，引号前的小 `r` 对于某些 Windows 用户可能是必需的，对于\
  \ Mac 用户则是可选的。另外，Windows 用户需要包含带有 `.exe` 扩展名的完整文件名，例如 `chromedriver.exe`。\n\n对于\
  \ Mac 用户\n\n```\ndriver_path = \"/Users/programwithus/Chapter4/chromedriver\"\n\
  ```\n\n对于 Windows 用户\n\n```\ndriver_path = r\"/Users/programwithus/Chapter4/chromedriver.exe\"\
  \n```\n\n在同一个单元格中，将 `driver_path` 传入我们从 Selenium 导入的 `Chrome()` 函数中：\n\n```\npage\
  \ = Chrome(executable_path=driver_path)\n```\n\n\n\n运行该单元格后，`Chrome()` 函数应会启动一个浏览器窗口，窗口顶部会显示一条提示：“Chrome\
  \ is being controlled by automated test software”（Chrome 正受自动测试软件控制）。现在，`page` 变量保存了由\
  \ Python 代码管理的浏览器实例。如果你遇到了 `FileNotFoundError` 错误，并附带消息 `\"chromedriver executable\
  \ needs to be in PATH\"`（chromedriver 可执行文件需位于 PATH 中），请检查 `driver_path` 并确保其正确指向\
  \ ChromeDriver 文件。\n\n如果浏览器窗口弹出，你就可以开始抓取数据了。抓取过程本身与我们之前使用 `BeautifulSoup` 所做的工作类似。首先，我们需要获取网站内容。`page`\
  \ 变量将保存 Python Selenium 对象。然后，在 Selenium 对象中找到 HTML 元素的钩子。只是这次，Selenium 的 `Chrome()`\
  \ 函数将替代 `requests.get()` 方法和 `BeautifulSoup()` 函数。\n\n导航至 [amazon.com](http://amazon.com)\
  \ 并选择你喜欢的任意产品。我选择了 Ring Video Doorbell（可视门铃）。你可以在这里看到它：[`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869)。你可以在此示例中选择\
  \ [amazon.com](http://amazon.com) 上的任意产品。\n\n通常，亚马逊的 URL 比 [`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869)\
  \ 要长得多。亚马逊和其他大公司会收集大量关于其客户的营销信息——例如请求来源的地区、浏览器和时区等信息——并将这些信息以 `?` 符号后的参数形式添加到 URL\
  \ 中。这些 `?` 符号后的额外参数对我们来说并不重要，可以移除。简而言之，亚马逊上销售的任何产品都有一个 ASIN（亚马逊标准识别码），这是一个唯一标识符。ASIN\
  \ 编号是产品 URL 中 `/dp/` 之后的部分。\n\n事实上，任何 URL 通常都包含某种唯一标识符，可能是数字 ID 或 slug（短码）。slug\
  \ 是 URL 中指向特定信息的一个独特部分。例如，URL [`www.cnn.com/style/article/new-years-eve-ball-design-history/index.html`](http://www.cnn.com/style/article/new-years-eve-ball-design-history/index.html)\
  \ 中包含一个唯一的 slug `new-years-eve-ball-design-history`，它指向 [cnn.com](http://cnn.com)\
  \ 上题为“A brief history of the Times Square New Year's Eve ball drop”（时代广场新年落球仪式的简史）的文章。因此，如果你试图获取某个网页，花几分钟时间理解你想要抓取信息的网站的\
  \ URL 模式是值得的。\n\n在亚马逊上，所有产品都存储在 ASIN 下的数据库中，可以通过 [`www.amazon.com/bp/`](http://www.amazon.com/bp/)\
  \ 加上 ASIN 来访问。亚马逊 URL 中的其他任何内容都是可选参数。\n\n向亚马逊服务器发送请求以获取 [`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869)\
  \ 这个 URL，需要使用 Selenium 的 `get()` 方法：\n\n```\npage.get(\"https://www.amazon.com/dp/B08N5NQ869\"\
  )\n```\n\n`get()` 方法将启动一个浏览器窗口，并返回 Ring Video Doorbell 网页的一个实例（图 4-19）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig19_HTML.jpg](img/506186_1_En_4_Fig19_HTML.jpg)\n\
  \n图 4-19 Selenium 已接管 Chrome 浏览器并打开了一个产品页面\n\n假设我们要从页面中收集产品名称和价格。查找 HTML 钩子的过程将与我们之前所做的一样。导航至产品名称，单击鼠标右键，然后在\
  \ Chrome 开发者工具中检查该元素。\n\n如图 4-20 所示，Chrome 开发者工具中的产品名称与页面上的标题完全匹配。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig20_HTML.jpg](img/506186_1_En_4_Fig20_HTML.jpg)\n\
  \n图 4-20 使用 Chrome 开发者工具检查网页元素\n\n如果因某些原因你无法在浏览器中看到高亮显示的标题，请再次点击“检查”文本。\n\n我们需要选择一个\
  \ HTML 标签来据此抓取元素。像前面的例子一样，我们可以根据类（class）来获取 HTML 元素。但是，我认为 `\"a-size-large\"` 类（图\
  \ 4-20）可能在该页面的其他地方也被使用了。`Id` 属性会是更好的选择，因为 `id` 是唯一的。`\"productTitle\" id` 在同一页面的\
  \ HTML 代码中不能再次使用。要通过 `id` 获取标题，我们需要使用 Selenium 的 `find_element_by_id()` 方法。你既可以查阅文档^(⁸)，也可以通过对\
  \ `page` 变量下存储的对象运行 `dir()` 函数，来找到所有可用的 Selenium 定位元素方法：\n\n```\ndir(page)\n```\n\
  \n`find_element_by_id()` 方法易于使用。你只需传递元素的 `id` 属性即可。Selenium 的定位元素方法返回对象，将它们转换为字符串需要使用\
  \ `text` 方法。\n\n在同一个单元格中，创建变量 `title` 来保存产品名称，并使用 `find_element_by_id()` 方法获取信息：\n\
  \n```\ntitle = page.find_element_by_id(\"productTitle\")\ntitle = title.text\nprint(title)\n\
  ```\n\n同样的过程可以用来获取产品的价格。如果我们指向价格并检查它，我们会看到亚马逊对 $99.99 这个值使用了 `priceblock_ourprice`\
  \ 这个 `id`。请注意，如果你期望的是亚马逊上的不同产品页面，价格可能对应不同的 `id` 属性。根据我的研究，他们也会使用 `\"priceblock_dealerprice\"\
  `。\n\n在同一个单元格中，我将获取产品的价格。这次，我会将 `text` 方法链式调用到 `page.find_element_by_id()` 后面：\n\
  \n```\nprice = page.find_element_by_id(\"priceblock_ourprice\").text\nprint(title,\
  \ price)\n```\n\n到目前为止，你可能已经打开了两三个 Chrome 浏览器。在我们获取到所需信息后，使用 `close()` 方法将会关闭浏览器。\n\
  \n在图 4-21 中，你可以看到我们获取到的产品名称和价格。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig21_HTML.jpg](img/506186_1_En_4_Fig21_HTML.jpg)\n\
  \n图 4-21 从 [amazon.com](http://amazon.com) 获取产品的名称和价格\n\nSelenium 是一个真正的自动化解决方案。除了从\
  \ HTML 中抓取数据，你还可以填写 Web 表单和模拟鼠标点击。让我们考虑一个收集亚马逊上所有 Ring Video Doorbell 可用信息的示例。我们的第一步是找到该类别中的所有\
  \ ASIN 编号。\n\n在亚马逊页面的顶部，有一个搜索提示框。我们可以对 Selenium 进行编程，让它插入我们感兴趣的产品名称并提交搜索。为此，我们需要使用\
