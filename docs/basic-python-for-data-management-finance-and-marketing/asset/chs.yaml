  \ 上找到。通常，符号紧跟指标标题之后（图 4-35）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig35_HTML.jpg](img/506186_1_En_4_Fig35_HTML.jpg)\n\
