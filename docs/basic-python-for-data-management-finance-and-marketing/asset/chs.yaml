  \ 密钥的过程与我们在本章开始时所做的几乎相同。\n\n# Twitter 机器人\n\nPython 的另一个实际应用是为社交媒体和聊天构建机器人。这里，我们将构建一个简单的\
  \ Twitter 机器人。它将在 Twitter 账号上发布内容。\n\n坦白说，最近让你的机器人在 Twitter 上注册并获得 API 密钥变得更加困难了。希望在这本书出版时，Twitter\
  \ 的身份验证过程仍如同我在这里描述的一样。\n\n作为开发者，你应该从 Twitter 开发者文档开始你的 API 注册流程：[`https://developer.twitter.com/en`](https://developer.twitter.com/en)。在那里你可以找到大量关于如何自动化你的\
  \ Twitter 账号的信息。此外，他们还有一个开发者问答博客，你可以在那里找到大量有用的信息，并获得与 Twitter 相关问题的答案。\n\n在我们开始编码之前，我们需要在\
  \ [`https://developer.twitter.com/en/portal/dashboard`](https://developer.twitter.com/en/portal/dashboard)\
  \ 注册我们未来的应用并获取 API 密钥。但在此之前，你应该已经是 Twitter 用户并拥有一个活跃账号。\n\n获取 Twitter API 密钥的流程如下：使用你的\
  \ Twitter 账号登录 Twitter 开发者门户。在那里，你需要点击中央按钮 **“创建项目”** 来启动一个新应用。请准备好提供你的电话号码。如果你的个人资料中没有电话号码，Twitter\
  \ 将不允许你创建应用。\n\n要获取 API 密钥，你需要提供项目名称，并简要说明你机器人的用途（图 7-16）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig16_HTML.jpg](img/506186_1_En_7_Fig16_HTML.jpg)\n\
  \n**图 7-16** 注册一个新的 Twitter 应用\n\n回答完所有问题后，Twitter 会为你提供 API Key、API Secret Key\
  \ 和 Bearer Token。这是我们机器人进行 Twitter 身份验证所需的三个密钥。除了这些密钥，你还需要生成一个 Access Token 和一个\
  \ Secret Token。要生成令牌，在左侧菜单的 **项目与应用** 下，点击你的应用名称。点击应用后，你应该会看到 **应用详情** 信息。向下滚动，找到\
  \ **应用权限** 部分。在 **应用权限** 部分，点击 **编辑** 选项并切换到 **读取和写入** 模式。这个操作对于机器人能够发布推文是必要的。在同一页面顶部的\
  \ **密钥和令牌** 部分，你需要生成 **访问令牌和秘密令牌**。点击 **重新生成** 按钮，并将令牌存储在安全的地方（图 7-17）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig17_HTML.jpg](img/506186_1_En_7_Fig17_HTML.jpg)\n\
