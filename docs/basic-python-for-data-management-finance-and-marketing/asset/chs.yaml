  \ `href`s（超文本引用），以便稍后能够访问完整的文章。`href` 只是一个指向某处的 URL。它们也被称为网页链接。\n\n首先要做的是，我们需要获取网站。从导入开始：\n\
  \n```\nimport requests\nfrom bs4 import BeautifulSoup\n```\n\n请记住，大多数网站不希望向机器人提供信息。`requests.get()`\
  \ 方法向服务器发送一条消息，这条消息大致是说“嗨，我是 Python”，而网站不希望响应 Python 机器人。为了绕过这一点，我们将使我们的信息请求看起来像是来自一个网页浏览器。这很简单；我们只需在发送给服务器的消息中提供不同的标头：\n\
  \n```\nheaders = {'User-agent': 'Mozilla/5.0'}\n```\n\n\n```markdown\n\n标头作为关键字参数传入\
  \ `requests.get()` 方法，位于 URL 之后。`Mozilla/5.0` 是一个常见的浏览器令牌。当服务器收到包含该令牌的消息时，会将其视为常规的浏览器信息请求。你可以尝试在带和不带标头的情况下运行以下语句：\n\
  \n```\npage = requests.get(\"https://www.investing.com/news/\", headers={'User-agent':'Mozilla/5.0'})\n\
  ```\n\n使用标头时，`requests.get()` 方法会返回响应 200（图 4-7）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig7_HTML.jpg](img/506186_1_En_4_Fig7_HTML.jpg)\n\
  \n**图 4-7** 使用 `requests` 库从服务器收到的成功响应\n\n成功的响应可以解析为一个 `BeautifulSoup` 对象：\n\n```\n\
  data = BeautifulSoup(page.content, \"html.parser\")\n```\n\n打印 `data` 以查看其中的内容。起初可能有些杂乱，其中包含大量\
  \ JavaScript 函数，但 `<!DOCTYPE HTML>` 清楚地表明我们处理的是 HTML（图 4-8）。请记住，[investing.com](http://investing.com)\
  \ 是一个比我们之前处理过的网站更复杂的站点。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig8_HTML.jpg](img/506186_1_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8** 使用 `BeautifulSoup()` 函数解析从服务器接收的数据\n\n切换回浏览器中的 [`www.investing.com/news/`](http://www.investing.com/news/)\
  \ 页面。选择你喜欢的任何标题，将鼠标悬停其上，然后点击右键。我选择了 `\"Oil Inventories Rose by 4M Barrels Last Week:\
  \ API\"`。点击“检查”，它将显示网页在底层的样子（图 4-9）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig9_HTML.jpg](img/506186_1_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9** 使用 Chrome 开发者工具检查一个标题\n\n仔细观察高亮显示的 HTML 代码，你可以看到与你点击的完全相同的标题。在我的案例中，图\
  \ 4-9 中显示的是 `\"Oil Inventories Rose by 4M Barrels Last Week: API\"`。这段文本被包裹在 `<a></a>`\
  \ 标签内。一个 `<a>` 标签表示一个网页链接，紧接着我们看到 `class=\"title\"` 属性。这看起来是一个独特的组合。我们的目标是抓取所有标题并收集也包含在\
  \ `<a>` 标签中的 href。`find_all()` 将是收集网页上所有标题的正确选择。作为第一个参数，我们将传递 `<a>` 标签，第二个参数将是 `class=\"\
  title\"`。此外，我们还需要包含 `href=True` 以收集 href：\n\n```\ntitles = data.find_all(\"a\",\
  \ class=\"title\", href=True)\n```\n\n我们已经从网页上获取了所有包含 href 的标题（图 4-10）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig10_HTML.jpg](img/506186_1_En_4_Fig10_HTML.jpg)\n\
  \n**图 4-10** 使用 `find_all()` 方法获取的标题列表\n\n变量 `titles` 持有一个列表，我们可以逐项遍历以获取纯净文本并提取\
  \ href。每个标题及其对应的 href 应打包成另一个列表。然后，我们可以将所有包含标题和 href 的列表放入一个大列表中。最终，我们将得到一个列表的列表。我们需要列表的列表，以便稍后可以方便地获取标题和\
  \ href，并抓取完整的文章页面。从该文章或详情页面中，我们将提取文本片段。\n\n我将创建一个新的 Python 列表 `clean_titles`，并将清理后的标题和\
  \ href（打包成一个单独的列表，放在变量 `small_list` 下）附加到其中，如下所示：\n\n```\nclean_titles = [ ]\nfor\
  \ item in titles:\nsmall_list = [item.get_text(), item[\"href\"]]\nclean_titles.append(small_list)\n\
  ```\n\n`clean_titles` 列表包含许多小列表，每个小列表包含一个标题和一个指向完整文章的 URL（图 4-11）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig11_HTML.jpg](img/506186_1_En_4_Fig11_HTML.jpg)\n\
  \n**图 4-11** 包含标题和 href 的列表的列表\n\n在我们访问每个标题的 URL 之前，我们需要了解完整文章网页的 HTML 结构。让我们进一步调查；在浏览器中，点击任意标题，它应该会带你进入一篇完整的文章，或者正如网页开发者所说的，一个详情视图。\n\
  \n在完整的文章页面（图 4-12）上，我右键单击第一个段落，然后选择检查选项。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig12_HTML.jpg](img/506186_1_En_4_Fig12_HTML.jpg)\n\
  \n**图 4-12** 在 Chrome 开发者工具中检查完整的文章页面\n\n在我的屏幕右侧（图 4-12），我看到整篇文章都被包裹在 `<p>` 标签（段落）内。如果我们想获取完整文章，我们需要使用\
  \ `find_all()` 方法，并以 `<p>` 标签作为参数。要获取每篇文章的段落，我们将创建一个小小的网络爬虫。我们已有所有文章的 URL，需要逐页访问以从每个对象中抓取文本片段。当我们抓取一个网页时，我们将使用\
