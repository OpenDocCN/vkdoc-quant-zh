  \ Google 分析服务，例如 Google Analytics Reporting API 和 YouTube Analytics。选择**Google Analytics\
  \ Reporting API**（图 7-2）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig2_HTML.jpg](img/506186_1_En_7_Fig2_HTML.jpg)\n\
