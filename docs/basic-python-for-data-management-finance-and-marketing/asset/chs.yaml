  dimensions\"][0]`开始。在图 7-10 中，我们看到`\"dimensions\"`键持有一个包含一个值的列表；要获取该值，我们需要用`[0]`对其索引。在`for`循环中，变量`item`代表`report_two`列表中的每个字典。`item[\"\
  dimensions\"]`给我们另一个列表，然后我们对其索引以获取第一个且唯一的值`item[\"dimensions\"][0]`。使用相同的逻辑，我们可以获取页面浏览量值。`item[\"\
  metrics\"]`给我们一个列表；我们用`[0]`对其索引，并看到另一个像这样的字典：`{'values': ['689331', '47.1034009002383']}`。键`\"\
  values\"`（即`item[\"metrics\"][0][\"values\"]`）指向另一个包含两个值的列表。一个用于页面浏览量，另一个用于会话时长。该列表中的第一个值可以用`[0]`索引，第二个用`[1]`索引。归根结底，`item[\"\
  metrics\"][0][\"values\"][0]`为我们获取页面浏览量的值，而`item[\"metrics\"][0][\"values\"][1]`获取会话时长的值。\n\
  为了将所有值存储为 DataFrame，我们需要将它们放入 Python 列表中。\n\n初始化三个空列表：\n\n```\ndevices = []\npageviews\
  \ = []\nsession_duration = []\n```\n\n当我们遍历`report_two`列表时，我们将值追加到每个列表。请始终牢记，将来你可能想对这些值进行某些处理，比如过滤或比较。响应以字符串形式返回，我们将把值转换为整数和浮点数：\n\
  \n```\ndevices = []\npageviews = []\nsession_durations = []\nfor item in report_two:\n\
  device = item[\"dimensions\"][0]\npage = int(item[\"metrics\"][0][\"values\"][0])\n\
  session = round(float(item[\"metrics\"][0][\"values\"][1]),2)\ndevices.append(device)\n\
  pageviews.append(page)\nsession_durations.append(session)\n```\n\n将所有值分组到列表中后，我们将构建一个\
  \ DataFrame：\n\n```\ndata = pd.DataFrame()\n```\n\n将列表作为列添加：\n\n```\ndata[\"Page_views\"\
  ] = pageviews\ndata[\"Session_duration\"] = session_durations\ndata.index = devices\n\
  ```\n\n最终，收到的报告简化为存储在 DataFrame 中的干净值，可以进行分析（图 7-11）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig11_HTML.jpg](img/506186_1_En_7_Fig11_HTML.jpg)\n\
