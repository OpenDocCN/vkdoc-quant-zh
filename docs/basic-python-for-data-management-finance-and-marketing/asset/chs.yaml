  ```\n\n\n好的，作为一名高级文档工程师和翻译员，我已经理解了您的要求。以下是严格按照注意事项和示例格式翻译的中文文本。\n\n\n在`Figure 4-37`中，你可以看到我们从\
  \ FRED 获取的历史就业数据图，这些数据是使用`DataReader()`函数接收的。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig37_HTML.jpg](img/506186_1_En_4_Fig37_HTML.jpg)\n\
  \n图 4-37 使用`DataReader()`函数从 FRED 源绘制的非农就业总人数图\n\n在本章中，我们介绍了使用 API 工作的主要原则。在下一章中，我们将继续使用\
  \ API 来收集和分析信息。具体来说，我们将使用 Google Data Python 库来访问流行的 Google 应用。\n\n---\n\n**脚注**\n\
  \n**5. 数据可视化**\n\n可视化是数据分析的重要组成部分。仅仅收集、处理和数据分析是不够的，你需要呈现你的发现。数字应该讲述一个故事。没有图像的故事会显得枯燥乏味。我们人类通过眼睛获取信息，正如常言道：“一图胜千言。”一幅更生动的图像能让你更长时间地保持注意力。\n\
  \n作为数据科学和机器学习领域最流行的编程语言，Python 拥有众多的可视化解决方案。在本章中，我们将学习如何使用最著名的 Python 可视化库——`Matplotlib`。所有其他的\
  \ Python 可视化库要么建立在`Matplotlib`之上，要么共享相同的绘图数据原则。\n\n**`Matplotlib`**\n\n在前面的章节中，我们已经通过`Pandas`简单使用过`Matplotlib`；现在是时候深入了解这个流行的可视化包了。\n\
  \n`Matplotlib`库是第一个用于数据绘图的 Python 主要库。可以毫不夸张地说，`Matplotlib`是世界上使用最广泛的 Python 可视化解决方案。`Matplotlib`允许你以不同类型的图表来绘制数据。线条图、柱状图、散点图和直方图是你使用`Matplotlib`可以轻松绘制的主要图表类型。除此之外，还有许多`Matplotlib`扩展可以帮助你可视化天文、地理或科学数据。\n\
  \n**线条图**\n\n`Matplotlib`是`Anaconda`的一部分。你只需将其导入到一个文件中即可开始使用。在一个新的**Jupyter**文件中，导入`Matplotlib`模块`pyplot`：\n\
  \n```python\nimport matplotlib.pyplot as plt\n```\n\n`Matplotlib`是一个大型库，我们没有全部导入，而是选择了主要模块`pyplot`。你可能已经猜到，`plt`是一个约定俗成的简写。\n\
  \n我想从一个简单的线条示例开始介绍`Matplotlib`。创建两个包含一些数字的 Python 列表：\n\n```python\nx = [ 2, 5,\
  \ 7 ]\ny = [ 2, 7, 3 ]\n```\n\n选择`x`和`y`变量并非随意。要绘制一条线，我们需要连接点。每个点都有两个数字或坐标`x`和`y`来映射它。在我们的例子中，会有三个点。我们可以使用`Matplotlib`的函数`plot()`来绘制它们：\n\
  \n```python\nplt.grid(True)\nplt.plot(x,y, marker=\"o\");\n```\n\n我添加了函数`plt.grid(True)`来说明每个点的位置对于源自`x`和`y`列表的\
  \ x 轴和 y 轴上的值是唯一的（参见`Figure 5-1`）。\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig1_HTML.jpg](img/506186_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1 线条图\n\n此外，我还放置了一个可选的关键字参数`marker=\"o\"`来强调函数`plt.plot()`根据我们提供的值连接这些点。移除`marker=\"\
  o\"`，你将看到一条简单的线条：\n\n```python\nplt.plot(x,y)\n```\n\n我在`plt.plot()`函数后面加上的分号是一个小技巧，用于隐藏线条对象的内存地址。如果你重新运行`plt.plot(x,y)`表达式时不带末尾的分号，你将在图表上方看到`[<matplotlib.lines.Line2D\
  \ at 0x7f97da40b9a0>]`被打印出来。\n\n`plt.plot()`函数易于使用。你所要做的就是传递任意两个可迭代对象（例如列表、元组、`Pandas\
  \ Series`或`NumPy`数组）作为 x 和 y 坐标，它就会绘制一条线。\n\n`Matplotlib`的`plt.plot()`函数允许你使用不同的样式和任何可能的颜色。由于有太多的变体，`plot`函数只是声明它接受`*args`和`**kwargs`。`*args`和`**kwargs`意味着一个函数可以接受多个参数和关键字参数。\n\
  \n记住所有可用的标记和样式是不可能的。每当我需要给我的图表添加一些花哨的东西时，我会运行：\n\n```python\nhelp(plt.plot)\n```\n\
  \n`help(plt.plot)`返回一个包含所有可能图表变体的描述。\n\n在尝试不同的绘图样式时，我想从颜色开始。颜色可以以不同的格式传递给`plot()`函数。对于原色，你可以使用颜色的首字母或完整的颜色名称，例如：\n\
  \n```python\nUse \"b\" or \"blue\" for blue\nplt.plot(x,y, color=\"b\")\nplt.plot(x,y,\
  \ color=\"blue\")\nuse \"r\" or \"red\" for red\nplt.plot(x,y, color=\"r\")\nplt.plot(x,y,\
  \ color=\"red\")\nuse \"g\" or \"green\" for green\nplt.plot(x,y, color=\"g\")\n\
  plt.plot(x,y, color=\"green\")\n```\n\n如果你觉得使用预设颜色很无聊，你可以使用`HEX`或`RGB`格式。我建议访问[`https://htmlcolorcodes.com`](https://htmlcolorcodes.com)获取调色板。在该网站上，你可以选择任何带有`HEX`或`RGB`代码的颜色。例如，我最喜欢的浅珊瑚色可以这样使用：\n\
  \n```python\nplt.plot(x, y, color=\"#F08080\");\n```\n\n甚至可以使用颜色的名称：\n\n```python\n\
  plt.plot(x, y, color=\"LightCoral\");\n```\n\n任何图表都需要图例和标题。`Matplotlib`有专门的函数`plt.legend()`和`plt.title()`来向图表添加注释。不用说，所有可用的`Matplotlib`函数都可以通过`dir(plt)`命令查看。\n\
  \n`plt.legend()`函数反映了图表中显示的数据。它非常易于使用。你所要做的就是向你的图表添加一个关键字参数`label`，然后`plt.legend()`函数就会渲染它：\n\
  \n```python\nplt.plot(x, y, color=\"#F08080\", label=\"Line\");\nplt.legend()\n\
  ```\n\n图表注释可以渲染在图表的任何位置。添加参数`loc`（代表位置），并从“位置字符串”列表中分配任何位置。“位置字符串”列表可以在函数描述`help(plt.legend)`中找到。\n\
  \n我将`plt.plot()`中引用的`label=\"Line\"`放置在图表的底部中央（参见`Figure 5-2`）：\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig2_HTML.jpg](img/506186_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2 `legend()`函数为图表添加注释\n\n```python\nplt.plot(x, y, color=\"#F08080\", label=\"\
  Line\")\nplt.legend(loc=\"lower center\");\n```\n\n与图例一起，我们可以使用`plt.title()`函数为图表附加任何名称。图表标签应作为字符串传递给`plt.title()`函数。`plt.title()`函数允许指定标签的位置、颜色和字号。使用参数`loc`，标签可以放置在三个位置之一：`left`、`right`和默认的`center`。要像在`plt.plot()`函数中那样为标签设置自定义颜色，我们可以使用原色或`HEX`和`RGB`代码。标签文本大小应以磅为单位，使用关键字`fontsize`传递。\n\
  \n举例来说，我将绘制一只股票的价格。为此任务，我们需要获取历史股价。滚动回文件中的第一个单元格，导入`Pandas-Datareader`：\n\n```python\n\
  import pandas_datareader as pdr\n```\n\n从`\"yahoo\"`源中获取苹果或任何其他股票在任意日期范围内的历史价格：\n\
  \n\n\n```python\ndata = pdr.DataReader(\"AAPL\",\"yahoo\", \"2020-01-01\",\"2021-02-12\"\
  )\n```\n\n`data[\"Adj Close\"]` 列将作为 `y` 参数在 Matplotlib 函数 `plt.plot()` 中绘制在垂直轴上。索引\
  \ `data.index` 将代表水平轴：\n\n```python\nplt.plot(data.index, data[\"Adj Close\"])\n\
  ```\n\n这段绘图语句看起来杂乱，为了使其可读，我将切片 `data[\"Adj Close\"]` 并赋值给变量 `y`。同样，将 `data.index`\
  \ 赋值给变量 `x`：\n\n```python\nx = data.index\ny = data[\"Adj Close\"]\nplt.plot(x,\
  \ y)\n```\n\n我们添加了两行代码，但这是值得的。现在代码可读且清晰，方便其他可能使用我们代码的人。此外，我们也更容易插入任何其他希望绘制的值。\n\n\
  向 `plt.plot()` 函数添加标签，并通过 `plt.legend()` 方法将其渲染在右下角：\n\n```python\nplt.plot(x, y,\
  \ color=\"#196F3D\" label=\"AAPL\")\nplt.legend(loc=\"lower right\")\n```\n\n添加一个标题，位置居左，颜色与股价线条相同，字号为\
  \ 22：\n\n```python\nplt.title(\"Apple Inc. Stock Price\", loc=\"left\", color=\"\
  #196F3D\", fontsize=22)\n```\n\n运行代码，您将看到一个带有自定义标题和图例标签的漂亮图表。但有一件事让我困扰：水平轴标签重叠。\n\
  \nMatplotlib 提供了 `xticks()` 和 `yticks()` 函数，用于设置水平和垂直轴的自定义标签。在当前示例中，将自定义标签与 `data.index`\
  \ 值匹配会很困难，而且未来我们可能会更改日期范围；因此，为了使日期可读，我们将其稍作旋转。`xticks()` 和 `yticks()` 函数带有一个 `rotation`\
  \ 参数，用于改变文本角度。我们可以将 `x` 标签的角度设置为直角的一半，即数值 45：\n\n```python\nxticks(rotation=45)\n\
  ```\n\n最终，图表应如图 5-3 所示。可以尝试不同的颜色和标签样式。\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig3_HTML.jpg](img/506186_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3**  \n带有标题和图例的股价图\n\n我们可以对图表应用多种其他样式选项。Matplotlib 函数 `grid()` 可以添加任意样式和颜色的网格线：\n\
  \n```python\nplt.grid(color=\"brown\", linestyle=\":\")\n```\n\n与许多 Matplotlib 函数一样，`grid()`\
  \ 高度可定制。您可以指定颜色和线条样式。图表大小可以通过 `figure()` 方法设置。在 Matplotlib 中，术语 \"figure\" 指代绘制的数据。因此，应使用关键字\
  \ `figsize` 设置图表的尺寸。宽度和高度应以列表或元组形式传递，单位是英寸：\n\n```python\nplt.figure(figsize=(12,8))\n\
  ```\n\n我的一名学生问我，是否可以在图表中使用公司颜色，因为这是她公司的要求。答案是肯定的。您已经看到，我们可以为线条或网格设置任意颜色。此外，Matplotlib\
  \ 还提供了 `style` 包。您可以通过调用 `plt.style.use()` 方法定义任意样式变体。我不深入探讨如何编写样式，这超出了本书的范围。如果由于某些原因您需要设置特定样式表，可以在此处找到相关信息：[`https://matplotlib.org/stable/api/style_api.html`](https://matplotlib.org/stable/api/style_api.html)。对于其他只想拥有美观图表的读者，我建议使用预设样式表之一。所有可用选项均列在此处：[`https://matplotlib.org/stable/gallery/style_sheets/style_sheets_reference.html`](https://matplotlib.org/stable/gallery/style_sheets/style_sheets_reference.html)。\n\
  \n例如，一个非常流行的 `\"seaborn\"` 样式可以像这样应用于图表：\n\n```python\nplt.style.use(\"seaborn\"\
  )\n```\n\nPython 代码按顺序执行，函数 `plt.style.use()` 和 `figure()` 应在 `plot()` 之前定义（参见图\
  \ 5-4）。\n\n\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig4_HTML.jpg](img/506186_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** 在绘图中应用 `style.use()` 和 `figure()` 函数\n\n# 直方图\n\n直方图是另一种流行的图形类型。与 `plot()`\
  \ 函数相比，`hist()` 方法只需要一组数据。它常用于展示数据的分布情况。\n\n利用苹果股票的历史价格，我们可以计算股票的日收益率并将其绘制成直方图：\n\
  \n```\nstock_return = data['Adj Close'].pct_change(1)*100\n```\n\nPandas 的 `pct_change()`\
  \ 方法返回当前与前一日期之间的百分比变化。`stock_return` 序列中的第一个值是 `NaN`，我们需要将其丢弃才能绘制直方图：\n\n```\nstock_return.dropna(inplace=True)\n\
  ```\n\n在 `dropna()` 方法移除所有 `NaN` 值后，该序列可以作为 `x` 参数传递给 `hist()` 函数：\n\n```\nplt.hist(stock_return)\n\
  ```\n\n传递给 `hist()` 函数的数据会被分割成若干个等宽的箱子。通过使用第二个参数 `bins`，你可以改变范围，并且在观察值数量允许的情况下，通过增加箱子数量获得更精确的结果：\n\
  \n```\nplt.hist(stock_return, bins=100)\n```\n\n与之前的示例类似，我们将为直方图添加标题：\n\n```\nplt.title('Distribution\
  \ of APPL Daily Return')\n```\n\n除了标题文本，Matplotlib 还提供了标记水平和垂直轴的选项。正如 `xlabel()`\
  \ 和 `ylabel()` 函数名称所暗示的那样，它们可用于为轴命名：\n\n```\nplt.xlabel('Daily Percentage Return')\n\
  plt.ylabel('Frequency')\n```\n\n添加了标题和轴标签后，直方图将如图 5-5 所示。\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig5_HTML.jpg](img/506186_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5** 函数 `hist()` 绘制股票日收益率\n\n直方图可以保存为 png、jpeg、pdf 或 svg 格式的独立文件。\n\nMatplotlib\
  \ 函数 `savefig()` 将生成一个包含绘图的全新文件。你只需提供一个唯一的文件名作为字符串参数：\n\n```\nplt.savefig(\"AAPL\
  \ return.png\")\n```\n\n或者你可以将其保存为 PDF 文件：\n\n```\nplt.savefig(\"AAPL return.pdf\"\
  )\n```\n\n请记住，`savefig()` 函数应该是在你运行完所有用于绘制图形的语句之后，执行的最后一个 Matplotlib 命令。\n\n# 散点图\n\
  \nPython 库 Matplotlib 可以使用三种不同的后端。我在此将它们称为格式。我们到目前为止使用的默认格式是 `\"inline\"`。`\"inline\"\
  ` 格式可生成静态图像并将其存储在 Jupyter Notebook 中。`\"inline\"` 格式的主要优点是，每个 Jupyter 文件中可以包含任意数量的静态图形。\n\
  \n如果希望在绘图中使用交互功能，则需要切换到 `\"notebook\"` 模式。每个 Jupyter 文件只能包含一个交互式图像。正因如此，我建议在一个单独的新文件中编写下一个示例。交互模式需要在导入\
  \ Matplotlib 之前使用一个魔法函数：\n\n```\n%matplotlib notebook\nimport matplotlib.pyplot\
  \ as plt\n```\n\n我称其为魔法函数并不夸张。魔法函数是 Python 中一个官方术语，指的是以 `%` 符号为前缀的函数。^([10])\n\n\
  散点图是数据分析中的基本工具之一，我们将使用 `scatter()` 函数来绘制 2019 年美国的人口分布图。Matplotlib 的 `scatter()`\
  \ 函数不仅绘制数据，还允许根据数值调整点的大小和颜色。我们将获取包含 2019 年美国常住人口估计值的 Excel 文件^([11])，并将数据绘制成散点图。该文件位于：[`https://bit.ly/bookScatterExample`](https://bit.ly/bookScatterExample)。\n\
  \n除了绘图库，我们还需要 Pandas；像这样将其与 Matplotlib 一起导入：\n\n```\n%matplotlib notebook\nimport\
  \ matplotlib.pyplot as plt\nimport pandas as pd\n```\n\n包含数据的 Excel 文件在线可用，我们可以用\
  \ Pandas 的 `read_excel()` 函数读取它。^([12]) 第一行是标题，我们可以通过关键字参数 `skiprows=1` 跳过它：\n\n\
  ```\ndata = pd.read_excel(\"https://bit.ly/bookScatterExample\", skiprows=1)\n```\n\
  \n一如既往，我们需要稍微清理一下数据，只提取包含信息的列：\n\n```\ndata = data[[\"State\", \"Population\"]]\n\
  ```\n\n为了便于阅读，我们将人口数值转换为百万为单位：\n\n```\ndata[\"Population_Mill\"] = data[\"Population\"\
  ]/1000000\n```\n\n数据范围太广，为了绘制一个整洁的散点图，我们可以过滤数据，只获取人口在两百万到八百万之间的州：\n\n```\nfiltered_data\
  \ = data[(data[\"Population_Mill\"] > 2.0) & (data[\"Population_Mill\"] < 8.0)]\n\
  ```\n\n`scatter()` 函数与 `plot()` 方法类似。它接受 `x` 和 `y` 值作为坐标。为了使代码易读，我将对 `filtered_data`\
  \ DataFrame 进行切片，并将 `filtered_data[\"State\"]` 赋值给 `x` 变量，将 `filtered_data[\"Population_Mill\"\
  ]` 赋值给 `y` 变量：\n\n```\nx = filtered_data[\"State\"]\ny = filtered_data[\"Population_Mill\"\
  ]\n```\n\n现在我们可以将 `x` 和 `y` 对象传递给 `scatter()`，并旋转水平轴上的州名：\n\n```\nplt.scatter(x,\
  \ y)\nplt.xticks(rotation=90)\n```\n\n`%matplotlib notebook` 为我们生成了一个交互式图表（图 5-6）。图表下方的菜单允许我们放大和移动数据。那个小软盘图标用作保存按钮。\n\
  \n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig6_HTML.jpg](img/506186_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** 美国各州人口（百万）的散点图\n\n我之前提到过，Matplotlib 的 `scatter()` 函数允许我们通过关键字参数 `s`\
  \ 和 `c` 控制点的大小和颜色。我们可以将 `filtered_data[\"Population_Mill\"]` 数据作为大小和颜色赋值，使散点图更具可读性。我将数据点的值进行四次方放大，来放大数据点：\n\
  \n```\nsize = filtered_data[\"Population_Mill\"]**4\ncolor = filtered_data[\"Population_Mill\"\
  ]\nplt.scatter(x, y, s=size, c=color)\n```\n\n有些点相互重叠，为了使它们透明，我们将添加另一个 Matplotlib\
  \ 样式属性 `alpha`。小于 1 的值会使图形更透明：\n\n```\nplt.scatter(x, y, s=size, c=color, alpha=0.5)\n\
  ```\n\n与所有 Matplotlib 绘图函数一样，`scatter()` 允许提供自定义的颜色映射，或者从文档中选择您喜欢的颜色映射。（您可以在此处找到所有列出的颜色映射：[`https://matplotlib.org/stable/tutorials/colors/colormaps.html`](https://matplotlib.org/stable/tutorials/colors/colormaps.html)。）从列表中，我选择了\
  \ `\"plasma\"` 颜色映射，并将其作为 `cmap=\"plasma\"` 属性传递给 `scatter()` 函数。如果添加一个颜色条刻度，散点图将包含更多信息（图\
  \ 5-7）：\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig7_HTML.jpg](img/506186_1_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7** 带有颜色条刻度的散点图\n\n```\nplt.scatter(x, y, s=size, c=color, alpha=0.5, cmap=\"\
  plasma\")\nplt.colorbar()\n```\n\n我们确实应该添加标题和垂直轴标签。我认为如果在使用 `scatter()` 之前将图形尺寸增加到\
  \ 10x8，绘制的数据看起来会更好。我们需要在 `figure()` 函数中定义 `figsize`，因此将语句 `plt.figure(figsize=(10,8))`\
  \ 插入代码中：\n\n```\nplt.figure(figsize=(10,8))\nplt.scatter(x,y, s=size, c=color, alpha=0.5,\
  \ cmap=\"plasma\")\nplt.xticks(rotation=90)\nplt.colorbar()\nplt.title(\"The States\
  \ with population estimates between 2 and 8 million, 2019\")\nplt.ylabel(\"Population\
  \ in millions\")\n```\n\n\n\n您可能已经注意到，我总是将一个分号字符移动到代码的最后一行。再次强调，这会隐藏 Python 内存中的一个绘图对象引用。这次，我不想为绘图添加网格线，而是想用州名来标注每个数据点。\n\
  \nMatplotlib 的`annotate()`函数可以根据 `x` 和 `y` 坐标在图表上的任意位置放置文本标签。尝试将标签`\"Here\"`放在`\"\
  Indiana\"`点上：\n\n```\nplt.annotate(\"Here\", (\"Indiana\", 6.4))\n```\n\n`x`和`y`坐标应以元组形式传递，例如`(\"\
  Indiana\", 6.4)`。`\"Indiana\"`表示水平轴上的`x`值，`6.4`是`y`轴上的入口数量。\n\n重新运行 **Jupyter**\
  \ 笔记本单元格，你会看到`\"Here\"`文本附着在代表印第安纳州的橙色点上。显然，我们不想手动为所有值添加文本标注。我们可以遍历所有`x`值，并通过索引获取坐标。这项任务需要用到\
  \ Python 内置函数`enumerate()`。`enumerate()`函数将为`filtered_data[\"State\"]`中存储在`x`变量下的所有值提供一个索引。借助`for`循环，我们将遍历枚举对象，并将每个州的索引和名称传递给`annotate()`函数。`x`和`y`变量持有\
  \ Pandas Series 对象，我们需要使用`.iloc[]`方法将索引映射到对应的值：\n\n```\nfor index, label in enumerate(x):\n\
  plt.annotate(label, (x.iloc[index], y.iloc[index]) )\n```\n\n之后，所有点都将被分配来自`x`对象的文本标签（图\
  \ 5-8）。\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig8_HTML.jpg](img/506186_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8 散点图中的数值标注\n\n我们创建的交互式散点图允许用户使用菜单中的缩放选项放大数据（图 5-8），并通过鼠标左键拖动移动它。菜单中的“主页”按钮可将所有内容重置为默认尺寸。由于交互模式的递归特性，我们在上方单元格中设置的`\"\
  Notebook\"`模式将无法在该文件中生成另一个绘图。默认的`\"inline\"`模式和交互式`\"notebook\"`格式是 **Jupyter**\
  \ 的主要模式。\n\n除了 **Jupyter**，Matplotlib 还可能使用你的计算机操作系统作为后端引擎。你可以通过使用魔术函数`%matplotlib`（不带参数）来尝试：\n\
  \n```\n%matplotlib\nimport matplotlib.pyplot as plt\n```\n\n在这种情况下，Matplotlib 会在一个独立的\
  \ Python shell 中生成一个类似于`\"notebook\"`模式的交互式绘图。在不同 Matplotlib 模式之间切换时，需要记住一点：它们不能同时使用，如果你在一个\
  \ **Jupyter** 文件中用一种模式替换另一种模式，需要重启内核。\n\n# 饼图\n\n我们将在交互式 shell 中生成一个饼图。在一个新的 **Jupyter**\
  \ 文件中，使用`%matplotlib`格式导入 Matplotlib：\n\n```\n%matplotlib\nimport matplotlib.pyplot\
  \ as plt\n```\n\n它将返回：\n\n```\nUsing matplotlib backend: MacOSX\n```\n\n或者根据你计算机运行的操作系统返回`Windows`。`Using\
  \ matplotlib backend`意味着 Matplotlib 已连接到你的操作系统，并将使用它来生成图像。\n继续前面的示例，我们将绘制美国地理区域的常住人口饼图。根据美国人口普查局的数据，美国\
  \ 38.26% 的人口居住在南部，23.87% 在西部，20.82% 在中西部，17.06% 在东北部。\n\n我们需要为饼图定义数值和标签：\n\n```\n\
  population = [38.26, 23.87, 20.82, 17.06]\nareas = [\"South\", \"West\", \"Midwest\"\
  , \"Northeast\"]\n```\n\nMatplotlib 的`pie()`函数将生成一个简单的饼图。要查看所有可用于自定义饼图的参数，请运行`help(plt.pie)`。将`population`作为`x`值，`areas`作为`labels`传递给`pie()`：\n\
  \n```\nplt.pie(x=population, labels=areas)\n```\n\nMatplotlib 后端引擎应生成一个包含简单饼图的弹出窗口（图\
  \ 5-9）。\n\n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig9_HTML.jpg](img/506186_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9 人口数据绘制的饼图\n\n`pie()`函数以及其他 Matplotlib 函数都接受自定义颜色。对于这个例子，我决定在[`https://htmlcolorcodes.com`](https://htmlcolorcodes.com)上选择一个明亮的调色板：\n\
  \n```\npalette = [\"#00FFFF\",\" #FF00FF\",\" #00FF00\",\" #800080\"]\nplt.pie(x=population,\
  \ labels=areas, colors=palette)\n```\n\n有时，你可能希望强调饼图中的某个扇形块来突出重点。这可以通过`pie()`函数的`explode`参数实现。`explode`接受一个可迭代对象（如列表或元组），其中包含每个扇形块相对于中心位置的浮点数值。\n\
  \n例如，参数`explode=[0, 0.1, 0, 0]`会将第二个扇形块从中心向外推出 0.1。在我们的案例中，我将把`\"West\"`扇形块从饼图中心向外显示\
  \ 0.2：\n\n```\nstandout =[0, 0.2, 0, 0]\nplt.pie(x=population, explode=standout,\
  \ labels=areas, colors=palette)\n```\n\n`pie()`函数中的另一个样式参数是`shadow`。如果你想为饼图添加 3D\
  \ 效果，请将`shadow`参数设置为`True`：\n\n```\nplt.pie(x=population, explode=standout, labels=areas,\
  \ shadow=True, colors=palette)\n```\n\n除了标签，你可能还想在图中显示每个区域的实际值。`autopct`参数将显示这些值。我们需要将值的格式指定为字符串。字符串的格式化应使用\
  \ Python 格式化风格，你可以在[`https://pyformat.info`](https://pyformat.info)找到相关说明。特别地，表达式`'%.2f'`将显示小数点后两位数字，而`'%.2f%%'`则会在值后面添加一个\
  \ `%` 字符：\n\n```\nplt.pie(x=population, explode=standout, labels=areas, autopct='%.2f%%',\
  \ shadow=True, colors=palette)\n```\n\n通过添加这些样式属性，我们生成了一个非常时髦的饼图（图 5-10）。如果在生成图的过程中出现问题，重启内核应该会有所帮助。\n\
  \n![../images/506186_1_En_5_Chapter/506186_1_En_5_Fig10_HTML.jpg](img/506186_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10 具有样式属性的饼图\n\n当然，你可以像我们之前做的那样为饼图添加标题。\nMatplotlib 是一个非常实用的工具，可以让你了解数据。它易于使用。我们已经介绍了可视化和样式化图表的所有主要函数。我们学习了如何构建基本图形，但借助\
  \ Matplotlib 及其众多的扩展和插件，你可以实现更多功能。对于复杂的样式和图表，我建议访问 Matplotlib 文档画廊页面：[`https://matplotlib.org/stable/gallery/index.html`](https://matplotlib.org/stable/gallery/index.html)。\n\
  \n## 脚注\n\n# 第 6 章：使用 Python 完成基本财务任务\n\n在前面的章节中，我们已经涵盖了 Python 的所有基本要素。我们使用了一些金融示例来说明问题。在本章中，我们将更深入地探讨日常的财务任务。我的目标是向你展示\
  \ Python 的实际应用，并帮助你入门，以便你能编写自己的代码。此外，你应该将这本书视为学习 Python 的第一步，并通过阅读 Pandas 及其他库的文档、关注专业博客以及通过实践掌握\
  \ Python 来继续你的学习。永远不会有神奇的函数或预设的解决方案来解决所有现实生活中的挑战。因此，请使用本章中的示例为你自己的项目打下基础。\n\n\n\n\
  # NumPy Financial\n\n本章将从商学院一年级学生都会学到的基础金融函数开始讲起。货币的未来价值、内部收益率、现值以及未来现金流的净现值，是金融分析的基石。掌握了\
  \ Python 基础知识，你可以从头编写公式并计算这些指标，但为了节省时间和精力，有一个 `Numpy-Financial` 包。`Numpy-Financial`\
  \ 能为你完成所有必要工作，提供干净无错的结果。\n\n要开始使用 `Numpy-Financial`，你需要在**终端**中安装它。提醒一下，你可以通过点击\
  \ Anaconda Navigator 中**环境**下的 **base (root)** 菜单找到终端。请确保你在一个新的终端 shell 中安装该包，并且不要干扰当前运行的内核。\n\
  \n```\npip install numpy-financial\n```\n\n当你看到 `Numpy-Financial` 成功安装的消息后，就可以关闭终端，并在一个新的\
  \ **Jupyter** Notebook 中导入该包：\n\n```\nimport numpy_financial as npf\n```\n\n我不想花费大量时间详细解释这些金融指标及其在金融分析中的重要性，而是重点介绍它们在\
  \ `Numpy-Financial` 功能中的实现。\n\n`Numpy-Financial` 是一个小型库，只包含十个基本函数（表 6-1）。\n\n**表\
  \ 6-1** `Numpy-Financial` 函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `fv(rate, nper, pmt,\
  \ pv[,when])` | 计算未来价值 |\n| `ipmt(rate, per, nper, pv[,fv,when])` | 计算一笔付款的利息部分\
  \ |\n| `irr(values)` | 返回内部收益率 (IRR) |\n| `mirr(values,finance_rate,reinvest_rate)`\
  \ | 修正内部收益率 |\n| `nper(rate, pmt, pv[,fv,when])` | 计算定期付款的次数 |\n| `npv(rate, values)`\
  \ | 返回现金流序列的净现值 (NPV) |\n| `pmt(rate, nper, pv[,fv,when])` | 计算贷款本金加利息的付款额 |\n|\
  \ `ppmt(rate, per, nper, pv[,fv,when])` | 计算贷款本金的付款额 |\n| `pv(rate, nper, pmt[,fv,when])`\
  \ | 计算现值 |\n| `rate(nper, pmt, pv, fv[,when, guess,tol,...])` | 计算每期的利率 |\n\n如你所见，没有必要记住所有函数及其参数。你只需运行\
  \ `dir(npf)` 查看对象的可用方法，并使用 `help()` 了解特定函数的参数即可。\n\n## 未来价值 `fv()`\n\n货币的时间价值是你在《金融学入门》中学到的第一件事。让我们来看一个经典问题。假设你有一个选择：现在获得\
  \ 3000.00 美元，年利率为 3%，或者同意在三年后获得 3300.00 美元。我们将使用 `pv()` 函数解决这个问题。给定的语句将被保存在变量名 `deposit`、`annual_interest`\
  \ 和 `years` 下：\n\n```\ndeposit = 3000\nannual_interest = 0.03\nyears = 3\nfuture_value\
  \ = npf.fv(annual_interest, years, 0, -deposit)\nprint(\"Future value of ${:.2f}\
  \ is ${:.2f}\".format(deposit, future_value))\n```\n\n我在 `deposit` 参数前使用了负号，因为我们可以将其视为一笔投资。如果不使用负号，结果将是一个负数。\n\
  \n计算结果显示，3300.00 美元比将 3000.00 美元存款以年利率 3% 投资更划算（图 6-1）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig1_HTML.jpg](img/506186_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1** 使用 `fv()` 函数计算未来价值\n\n## 现值 `pv()`\n\n与货币未来价值公式相对的是货币现值。今天的一笔钱比未来相同金额的钱更值钱。但具体值多少钱呢？`Numpy-Financial`\
  \ 将通过 `pv()` 函数帮助我们回答这个问题。继续前面的例子，我们可以假设你有一个选择：三年后获得 3300 美元，或者现在获得这笔钱。我们将利率设定为年利率\
  \ 3%。\n\n`pv()` 函数将利率、期数和未来价值作为参数。利率可以按年或月传递。期数将取决于年利率或月利率。我们将 `future_value` 定义为\
  \ 3300 美元；`annual_rate` 和 `years` 的值保持不变：\n\n```\nfuture_value = 3300\nannual_rate\
  \ = 0.03\nyears = 3\npresent_value = npf.pv(annual_rate, years,0,-future_value)\n\
  print(\"Present value of ${:.2f} is ${:.2f}\".format(future_value, present_value))\n\
  ```\n\n根据 `pv()` 公式返回的结果，3300.00 美元的现值为 3019.97 美元（图 6-2）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig2_HTML.jpg](img/506186_1_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** 使用 `pv()` 函数计算货币的现值\n\n## 净现值 `npv()`\n\n`Numpy-Financial` 可以通过使用按资本成本折现的未来现金流入的净现值，基于盈利能力帮助你确定投资项目之间的优先级。`npv()`\
  \ 函数返回现金流序列的净现值。它使用起来很简单；我们只需要资本成本或机会资本成本以及未来的预期现金流。预期现金流应以数组形式传递。根据文档，投资应为负浮点数，流入应为正数。\n\
  \n假设有一家公司计划扩张，正在两个投资机会之间进行选择。一个选择是扩大生产，投资 100,000 美元用于新设施和设备。生产扩张将在未来五年内带来每年 25,000\
  \ 美元的收入。另一个投资选择是购买收益率为 5% 的证券。为简化示例，我们假设风险相等。\n\n基于这些假设，我们将计算扩张项目的净现值。我们将 `investment`\
  \ 定义为负值，`cash_flows` 定义为包含未来现金流的 Python 列表：\n\n```\ndiscount_rate = 0.05\ninvestment\
  \ = -100000\ncash_flows = [investment, 25000, 25000, 25000, 25000, 25000]\nnet_present_value\
  \ = npf.npv (discount_rate, cash_flows)\nprint(\"Net Present Value of the project\
  \ is ${:.2f} \".format(net_present_value))\n```\n\n该项目的净现值为 8236.92 美元（图 6-3）。\n\
  \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig3_HTML.jpg](img/506186_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** 计算项目的净现值\n\n使用相同的 `npv()` 函数，我们可以比较两个项目。此外，我们可以针对一系列折现利率运行情景分析，观察利率变化如何影响项目盈利能力。我们要比较的第二个项目将具有相同的初始投资\
  \ 100,000 美元，并在未来五年内分别有逐渐增加的流入：5000 美元、10,000 美元、40,000 美元、40,000 美元和 40,000 美元。\n\
  \n折现率可以表示为存储在 Python 列表中的浮点数范围：\n\n```\ncash_flows_project_one = [-100000, 25000,25000,25000,25000,25000]\n\
  cash_flows_project_two = [-100000, 5000,10000,40000,40000,40000]\ndiscount_rates\
  \ = [0.0,0.05,0.10,0.20,0.25]\n```\n\n`cash_flows_project_one` 和 `cash_flows_project_two`\
  \ 中的第一个初始投资数字为负，因为我们投入了那笔资金，它代表现金流出。\n\n我们需要初始化两个空列表来存储情景分析的结果。\n\n\n\n```python\n\
  npv_project_one = []\nnpv_project_two = []\n```\n\n最后，要计算预测现金流的 NPV，我们需要动态地向`discount_rates`列表中的每个利率传入参数。一个`for`循环会遍历`discount_rates`列表，并逐一将值传入`npv()`函数。计算结果将临时存储在变量`npv_one`和`npv_two`中，并追加到`npv_project_one`和`npv_project_two`列表中：\n\
  \n```python\nfor rate in discount_rates:\n    npv_one = npf.npv(rate, cash_flows_project_one)\n\
  \    npv_project_one.append(npf.npv(rate, cash_flows_projetct_one))\n    npv_two\
  \ = npf.npv(rate, cash_flows_project_two)\n    npv_project_two.append(npv_two)\n\
  ```\n\n现在我们已经为不同的贴现率运行了多个场景并保存了 NPV 结果，接下来可以绘制图表。除了 Matplotlib 库，我们还需要 Shapely 包来找到表示\
  \ NPV 值的两条绘制线的交点。\n\n打开终端或命令提示符，下载并安装 Shapely：\n\n```bash\npip install shapely\n\
  ```\n\nShapely 是一个用于分析几何对象的 Python 库。((13)) 当然，没有 Shapely 的帮助我们也能找到交点坐标，但这需要编写大量代码。而\
  \ Shapely 的`intersection()`方法能更精确地完成这项工作。\n\n安装好 Shapely 后，在**Jupyter** Notebook\
  \ 的顶部导入它和 Matplotlib：\n\n```python\nimport numpy_financial as npf\nimport matplotlib.pyplot\
  \ as plt\nfrom shapely.geometry import LineString\n```\n\n我希望我的图表坐标轴能完美缩放，我将 x 轴和\
  \ y 轴的极限分别设置为 0.0 和 0.25：\n\n```python\nplt.xlim(0.0, 0.25)\n```\n\nMatplotlib 的`xlim()`方法根据起点和终点设置当前坐标轴的\
  \ x 轴界限。我们可以将其硬编码为 0.0 和 0.25 的贴现率，或者根据`discount_rates`列表中的值进行动态调整。这意味着将起点设为列表中的第一个值`discount_rates[0]`，终点设为同一列表中的最后一个值`discount_rates[-1]`：\n\
  \n```python\nplt.xlim(discount_rates[0], discount_rates[-1])\n```\n\ny 轴将使用 Matplotlib\
  \ 的`ylim()`方法进行缩放，我们将起点和终点设为存储在`npv_project_two`列表中的 NPV 结果的最后一个值和第一个值：\n\n```python\n\
  plt.ylim(npv_project_two[-1], npv_project_two[0])\n```\n\n之后，我们可以使用贴现率作为 x 轴来绘制\
  \ NPV 结果：\n\n```python\nplt.plot(discount_rates, npv_project_one, label=\"项目一\"\
  )\nplt.plot(discount_rates, npv_project_two, label=\"项目二\")\n```\n\n当你运行单元格时，NPV\
  \ 值将被绘制成两条线。两条线的交点，或者在金融中被称为的交叉利率，可以被精确计算并在图表上标记出来。\n\nShapely 的函数`LineString`会将\
  \ x 和 y 坐标转换为一个几何直线对象：\n\n```python\nline1 = LineString(list(zip(discount_rates,\
  \ npv_project_one)))\nline2 = LineString(list(zip(discount_rates, npv_project_two)))\n\
  ```\n\n我们在图中用作 x 和 y 坐标的`discount_rates`、`npv_project_one`和`npv_project_two`中的值，需要借助\
  \ Python 内置函数`zip()`进行组合。`zip()`函数会将它们打包成一个元组列表，并传入`LineString()`函数。\n\n让我退一步，简单介绍一下`zip()`函数。很多时候，我们需要映射来自不同来源的值。例如，城市名称和人口数量。两者都以列表形式出现，其中人口数值以百万计：\n\
  \n```python\ncities = [\"纽约\", \"芝加哥\", \"休斯顿\"]\npopulation = [8.3, 2.7, 2.3]\n\
  ```\n\n`zip()`函数会将`population`值与`cities`列表中的城市进行匹配：\n\n```python\nzip(cities, population)\n\
  ```\n\n和 Python 中的许多其他函数一样，`zip()`函数返回一个对象：\n\n要解包这个`zip`对象，我们需要么用`for`循环遍历它以逐一获取配对，要么将`zip`对象包装为一个列表：\n\
  \n```python\nlist(zip(cities, population))\n```\n\n现在我们可以看到存储在列表中的元组对：\n\n```python\n\
  [('纽约', 8.3), ('芝加哥', 2.7), ('休斯顿', 2.3)]\n```\n\n回到我们的 NPV 示例，`LineString`操作的结果存储在变量`line1`和`line2`中。`intersection`方法将为我们获取那个交叉点的坐标：\n\
  \n```python\npoint = line1.intersection(line2)\n```\n\n`point`对象现在拥有`x`和`y`坐标，可以作为`point.x`和`point.y`属性在图表上绘制。`point.x`和`point.y`给出了两个评估项目\
  \ NPV 值交点处的确切美元金额和利率。\n\n我们可以在图表上将该交点标记为一个红点，并添加虚线投影到 x 轴和 y 轴上：\n\n```python\n\
  plt.plot(point.x, point.y, marker=\"o\", color=\"red\")\n```\n\n如你所见，绘制一个点，我们使用了与前一章练习过的相同的`plot()`函数。区别在于样式。现在我们使用了一个标记。`plot()`函数中有许多预设的标记。你可以通过`help(plt.plot)`找到你喜欢的那个。\n\
  \nMatplotlib 的`hline()`和`vline()`函数会根据 x 和 y 坐标绘制水平和垂直线：\n\n```python\nplt.hlines(y=point.y,\
  \ xmin=0.0, xmax=point.x, color='red', linestyles='dotted', label=str(round(point.x*100,3)))\n\
  plt.vlines(x=point.x, ymin=-40000, ymax=point.y, color='red', linestyles='dotted',label=str(round(point.y,2)))\n\
  ```\n\nMatplotlib 的`hline()`和`vline()`函数与我们之前使用的其他绘图方法类似。这些直线从由`xmax=point.x`和`ymax=point.y`定义的点的原点出发。x\
  \ 和 y 的界限分别标识为 x 轴上的 0.0 和 y 轴上的–40000。\n\n最后的润色是网格和标签：\n\n```python\nplt.grid()\n\
  plt.legend()\nplt.title(\"NPV 曲线图\")\nplt.xlabel(\"贴现率\")\nplt.ylabel(\"NPV (净现值)\"\
  )\n```\n\n完整的方案和图表如图 6-4 和图 6-5 所示。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig5_HTML.jpg](img/506186_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n两个项目 NPV 交叉利率图\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig4_HTML.jpg](img/506186_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n计算并绘制两个项目的 NPV\n\n# 风险价值 (VAR)\n\n近年来金融监管变得更加严格，如今合规经理必须使用现代工具来处理海量数据集，生成大量报告。这正是\
  \ Python 大显身手的地方。风险价值是一种非常流行的统计指标，用于评估投资项目的金融风险水平。在 VAR（风险价值）中，风险被定义为在特定时间内的最大损失。这里，我们将探讨如何基于正态分布和波动性来计算参数化的\
  \ VAR 模型。\n\n假设我们有一个普通股票的投资组合。在我们的投资组合中，我们持有以下股票的头寸：微软、苹果和 IBM。为简化示例，假设我们持有每家公司的\
  \ 100 股股票。为了做出未来预测，我们需要获取组合中股票的历史价格。希望你已经安装了 Pandas-Datareader 库；如果没有，我们在第 4 章已经详细讨论了这个包的安装和用途。\n\
  \n在一个新的**Jupyter** Notebook 顶部导入 NumPy、Pandas、Matplotlib 和 Pandas-Datareader：\n\n\
  ```python\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot as\
  \ plt\nimport pandas_datareader.data as web\n```\n\n为了获取历史价格，我们需要将股票代码放入一个 Python\
  \ 列表中。变量名`portfolio`能完美反映这个列表的用途：\n\n```python\nportfolio =  [ \"MSFT\",\"AAPL\"\
  ,\"IBM\"]\n```\n\n我们需要一个 DataFrame 来存储股票的历史价格，因此我们在变量名`prices`下初始化一个：\n\n```python\n\
  prices = pd.DataFrame()\n```\n\n\n\n使用 `Pandas-Datareader` 从 Yahoo 获取每只股票的历史价格，按其代码查询。您可以以字符串格式指定任何时期范围：\n\
  \n```\nfor stock in portfolio:\n    prices[stock] = web.DataReader(stock, 'yahoo',\
  \ '2017-01-01','2021-03-20')[\"Adj Close\"]\n```\n\n请注意，`Pandas-Datareader` 返回一个包含\
  \ `open`、`high`、`low`、`close`、`volume` 和 `adjusted close` 列的 `DataFrame`。调整后的收盘价反映了股票在拆股和分红后的价格，这正是我们需要的。我们通过列名\
  \ `[\"Adj Close\"]` 从每个 `DataFrame` 中获取该列。使用字典表示法，我们将 `[\"Adj Close\"]` 列添加到之前定义的\
  \ `DataFrame` 中。变量 `stock` 持有来自 `portfolio` 列表的值，当遍历该列表时，会将每家公司代码设置为 `prices` 中的列名。最终，我们会得到一个包含历史价格的\
  \ `prices` `DataFrame`。您可以使用 `msft_prices.head()` 进行检查。\n\n方法 `head()` 将显示包含历史价格的\
  \ `DataFrame` 的前五行（图 6-6）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig6_HTML.jpg](img/506186_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6  \n为股票组合检索历史价格\n\n我们可以通过绘制历史价格来进行可视化。绘制并比较不同价值的股票（如 AAPL 为 27.45，IBM 为 137.77）会很困难。我们需要以数据第一天的价格为基准\
  \ 100 进行归一化处理。`prices.iloc[0]` 将获取 `DataFrame` 中第一天的价格：\n\n```\nfirst_date = prices.iloc[0]\n\
  normalized_prices = prices/first_date * 100\n```\n\n绘图部分很简单；我们在第 5 章中已经做过：\n\n```\n\
  [line1,line2,line3] = plt.plot(prices.index , normalized_prices, label=[\"MSFT\"\
  ,\"AAPL\",\"IBM\"])\nplt.legend(loc=\"lower right\")\nplt.xticks(rotation=45)\n\
  plt.title(\"Portfolio of stocks\");\nplt.grid()\nplt.legend([line1,line2,line3],[\"\
  MSFT\",\"AAPL\",\"IBM\"], loc=\"upper left\");\n```\n\n我使用 `DataFrame` 的 `index`\
  \ 作为 `x` 轴，因为它包含日期。`normalized_prices` 是 `y` 轴。列表 `[line1,line2,line3]` 仅用于图例，以区分不同股票的线条。\n\
  \n三只股票的历史表现如图 6-7 所示。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig7_HTML.jpg](img/506186_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7  \n归一化后的历史价格\n\nVAR 计算从历史股票收益率开始。有两种方法可以实现。第一种是使用 Pandas 的 `shift()` 方法，将一行移动指定数量：\n\
  \n```\nstocks_return = prices/prices.shift(1)-1\n```\n\n或者更精确地，您可以使用 NumPy 的 `log()`\
  \ 函数计算对数收益率：\n\n```\nstocks_return = np.log(prices/prices.shift(1))\n```\n\n第二种方法是使用\
  \ `pct_change()` 方法。`pct_change()` 也接受一个表示期数的参数。在我们的例子中，是一天或一行：\n\n```\nreturn =\
  \ prices.pct_change(1)\n```\n\n无论使用哪种方法，`stocks_return` 和 `return` 都应得到相同的结果。两种情况下第一个值都是\
  \ NaN（非数值），我们将使用 `dropna()` 方法消除它：\n\n```\nreturn.dropna(inplace=True)\n```\n\n\
  以防您忘记，`inplace` 是一个参数，它会在对象内部保存更改。收益率的可视化有助于我们更好地理解这些数字。Matplotlib 的 `hist()` 函数将以直方图形式呈现图像。\n\
  \n我们可以将三只股票绘制在同一张图上。关键字参数 `alpha` 使它们透明：\n\n```\nplt.hist(return[\"MSFT\"], alpha=0.5,\
  \  bins=100)\nplt.hist(return[\"AAPL\"], alpha=0.5,  bins=100)\nplt.hist(return[\"\
  IBM\"], alpha=0.5,  bins=100);\n```\n\n或者，如果图表过于拥挤而难以理解，您可以单独绘制每只股票的收益率（图 6-8）。我之前提到过，Pandas\
  \ `DataFrame` 支持 Matplotlib，您可以直接将 `hist()` 方法应用于 `return`：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig8_HTML.jpg](img/506186_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8  \n绘制历史股票收益率\n\n```\nreturn.hist()\n```\n\nPandas `Series` 有一个 `describe()`\
  \ 方法。`describe()` 方法只能应用于 `Series` 或持有数值的 `DataFrame` 列：\n\n```\nreturn.describe()\n\
  ```\n\n图 6-9 显示了 `describe()` 方法计算的股票收益率统计度量。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig9_HTML.jpg](img/506186_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9  \n`describe()` 方法返回统计度量\n\n将 `describe` 方法应用于历史收益率后，我们可以看出数据集的 `mean`（均值）在哪里，以及\
  \ `std`（标准差）的离散程度有多大。`Min` 和 `max` 值指示了数据集的边界。此外，我们还可以看到 `25%`、`50%` 和 `75%` 的百分位数。`describe()`\
  \ 方法是一个非常有用的工具，可以快速获取任意数值数据集的统计度量。\n\n对于我们的 VAR 计算，我们需要投资组合的均值和标准差。我们可以从 `describe()`\
  \ 方法中获取均值：\n\n```\nreturn.describe().loc[\"mean\"]\n```\n\n或使用专门的 `mean()` 方法：\n\
  \n```\nmean_return = return.mean()\n```\n\n投资组合的标准差或波动率需要每对股票之间的协方差。在 Pandas 中，我们可以使用\
  \ `cov()` 函数在收益率上创建一个协方差矩阵：\n\n```\ncovar = return.cov()\n```\n\n图 6-10 显示了我们用于获取投资组合波动率的协方差矩阵。\n\
  \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig10_HTML.jpg](img/506186_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10  \n协方差矩阵\n\n此外，我们还需要投资组合中每只股票的百分比。为简化此示例，我们假设投资组合总美元价值的 50% 投资于微软，25% 投资于苹果，25%\
  \ 投资于 IBM。这个假设必须保存在 NumPy 数组中：\n\n```\nweights = np.array([0.5,0.25,0.25])\n```\n\
  \nNumPy 数组可以被视为一个向量。此外，NumPy 数组用作 `Series` 和 `DataFrame` 的核心。这意味着我们可以推导出点积或从向量中得到单个数值。\n\
  \n变量 `mean_return` 持有三只股票历史收益率的均值，我们需要使用 `dot()` 方法再次将它们按投资组合股票百分比归一化：\n\n```\n\
  portfolio_mean = mean_return.dot(weights)\n```\n\n标准差是方差的平方根，我们可以使用 NumPy 的 `sqrt()`\
  \ 方法获取：\n\n```\nvolatility = np.sqrt(weights.T.dot(covar).dot(weights))\n```\n\n\
  大写字母 `T` 是一个转置方法；它改变了向量或矩阵的相对位置。如果您对数组、`Series` 或 `DataFrame` 运行 `dir()`，它总是列表中的第一个。\n\
  \n此外，均值和标准差需要根据投资组合的总价值进行计算。此处，我们假设投资组合的总价值为 1,000,000 美元：\n\n```\nportfolio_value\
  \ = 1000000\ninvestment_mean = (1 + portfolio_mean) * portfolio_value\ninvestment_volatility\
  \ = portfolio_value * volatility\n```\n\n当我们掌握所有必要的数值后，我们可以计算正态累积分布的反函数。为此，我们需要\
  \ SciPy（科学 Python）包中的 `ppf()`（百分点函数）。SciPy 包含在 Anaconda 中，我们只需要在文件开头导入它：\n\n```\n\
  import scipy.stats as scs\n```\n\n\n```markdown\n`ppf()`方法使用默认均值 0 和标准差 1（标准正态分布的参数）。我们将用`investment_mean`和`investment_volatility`覆盖这些默认值。\n\
  \n风险管理者需要将置信水平传入`ppf()`；通常置信水平为 95%：\n\n```\nconfidence = 95\nnormsinv = scs.norm.ppf((1-95/100),\
  \ investment_mean, investment_volatility)\n```\n\n最后一步是从投资组合价值中减去正态累积分布的逆：\n\n```\n\
  var = portfolio_value – normsinv\n```\n\n将结果四舍五入到小数点后两位：\n\n```\nnp.round(var,2)\n\
  ```\n\n最终结果为 25088.94（图 6-11）。经过所有这些计算，我们可以以 95%的置信度说，一个持有 MSFT、AAPL 和 IBM 股票、当前市值为\
  \ 100 万美元的投资组合，一天内可能损失 25088.94 美元。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig11_HTML.jpg](img/506186_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11 风险价值计算\n\n如果需要预测五天的 VAR，可以将一天的 VAR 乘以天数的平方根。\n\n我们将`var * np.sqrt(day)`表达式放入一个遍历天数范围的\
  \ for 循环中。初始化一个空列表来存储结果，然后绘制它们：\n\n```\nvar_results = []\nnumber_of_days = 5\ndays_list\
  \ = list(range(1, number_of_days+1))\nfor day in days_list:\n    result = var *\
  \ np.sqrt(day)\n    var_results.append(result)\n```\n\n由于`range()`函数中停止点是排他的，因此需要将`number_of_days`加\
  \ 1。\n\n最后，我们绘制`var_results`：\n\n```\nplt.plot(days_list, var_results)\nplt.title(\"\
  Value at Risk\")\nplt.ylabel(\"Portfolio loss\")\nplt.xticks(days_list, [\"1st day\"\
  , \"2nd day\", \"3rd day\", \"4th day\", \"5th day\"])\nplt.grid()\n```\n\n我们可以看到损失在五天内翻倍（图\
  \ 6-12）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig12_HTML.jpg](img/506186_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12 预测五天的 VAR\n\n"
- "# 蒙特卡洛模拟\n\n使用相同的历史股价，我们可以预测投资组合的表现，并通过蒙特卡洛模拟技术模拟可能的结果。蒙特卡洛方法是为投资组合的预期收益和预期波动率生成随机结果，就像反复掷骰子一样。\n\
  \n为了保存预期收益和预期波动率的结果，我们需要初始化两个列表：\n\n```\nmc_return = []\nmc_volatility = []\n```\n\
  \n随机改变投资组合中每个头寸的百分比，我们将计算预期收益和预期波动率。NumPy 函数`random()`会生成形状为数组的随机数。数组的大小和维度取决于传递给它的参数。在我们的案例中，需要一个与投资组合中头寸数量匹配的数组。\n\
  \n我们在示例开头使用的`portfolio`列表当前包含三只股票。未来我们可能会添加更多股票，因此将列表长度存储在`num_assets`变量下是很明智的：\n\
  \n```\nnum_assets = len(portfolio)\nfor roll in range(5000):\n    weights = np.random.random(num_assets)\n\
  \    weights /= np.sum(weights)\n    mc_return.append(np.sum(mean_return * weights)\
  \ * 252)\n    mc_volatility.append(np.sqrt(np.dot(weights.T, np.dot(covar * 252,\
  \ weights))))\n```\n\n在 for 循环的每次迭代中，`random()`方法都会生成投资组合中资产的随机权重。所有资产的总百分比必须始终恰好为\
  \ 100%；这就是为什么我们将`weights`除以`weights`的`sum()`。接下来，我们生成预期收益和波动率，并按一年中的交易日数对结果进行归一化（图\
  \ 6-13）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig13_HTML.jpg](img/506186_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13 对股票投资组合运行蒙特卡洛模拟\n\n我们将以散点图的形式绘制结果，但在此之前，需要将`mc_return`和`mc_volatility`列表转换为\
  \ NumPy 数组：\n\n```\nexpected_return = np.array(mc_return)\nexpected_volatility =\
  \ np.array(mc_volatility)\n```\n\n最后，我们绘制`expected_return`和`expected_volatility`：\n\
  \n```\ncolor = expected_return / expected_volatility\nplt.figure(figsize=(12, 8))\n\
  plt.scatter(expected_volatility, expected_return, c=color, marker='o')\nplt.grid()\n\
  plt.title(\"Monte Carlo simulation\")\nplt.xlabel('Expected volatility')\nplt.ylabel('Expected\
  \ return')\nplt.colorbar(label=\"Sharpe ratio\")\nplt.show()\n```\n\nMatplotlib\
  \ 的`show()`方法是可选的。我将其包含在内，以防你想在 Matplotlib 的`\"notebook\"`模式下运行代码，或使用操作系统生成图表。\n\
  \n此示例是对哈里·马科维茨现代投资组合理论的说明¹⁴。你希望获得的投资回报越高，预期的波动率就应越大（图 6-14）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig14_HTML.jpg](img/506186_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14 绘制蒙特卡洛模拟结果\n\n图 6-14 中的曲线连接了所有最有效的结果——风险与回报的最优组合，它被称为有效前沿。\n\n## 有效前沿\n\
  \n前面的示例已经证明，你可以从零开始构建任何统计或金融模型。然而，如果你过于忙碌并需要一个开箱即用的解决方案，有一个专业的 Python 包`PyPortfolioOpt`实现了投资组合优化方法，包括有效前沿技术和其他风险管理解决方案¹⁵。`PyPortfolioOpt`带有内置的风险模型和绘图功能。不幸的是，目前`PyPortfolioOpt`不是\
  \ Anaconda 包的一部分，我们需要使用`pip`命令来安装它。我们已经多次经历过安装过程，我相信现在你已经知道在哪里找到终端，请运行：\n\n```\n\
  pip install pyportfolioopt\n```\n\n我们将使用`PyPortfolioOpt`为我们的投资组合找到有效前沿。对于下面的示例，你需要打开一个新的**Jupyter**\
  \ Notebook，并从`PyPortfolioOpt`导入以下函数：\n\n```\nimport pandas as pd\nimport pandas_datareader.data\
  \ as web\nfrom pypfopt.efficient_frontier import EfficientFrontier\nfrom pypfopt.cla\
  \ import CLA\nfrom pypfopt import plotting\nfrom pypfopt.plotting import plot_weights\n\
  from pypfopt import risk_models\nfrom pypfopt import expected_return\n```\n\n我会在示例中解释所有导入的函数。我们的目标是生成并绘制投资组合的有效前沿。同时，使用由\
  \ Marcos Lopez de Prado 和 David Bailey 实现的临界线算法来寻找最优投资组合¹⁶。\n\n我们将沿用前一个示例中的相同投资组合，并且由于我们在不同的\
  \ notebook 中，我们需要再次获取历史价格。同时，请随意使用你喜欢的股票，或向默认列表中添加更多股票：\n\n```\nportfolio = [\"\
  MSFT\", \"AAPL\", \"IBM\"]\nprices = pd.DataFrame()\nfor stock in portfolio:\n \
  \   prices[stock] = web.DataReader(stock, 'yahoo', '2017-01-01', '2021-03-20')[\"\
  Adj Close\"]\n```\n\n与前一种情况类似，`PyPortfolioOpt`通过推断历史收益来计算预期收益。我们已导入`expected_return`模块，顾名思义，它生成年化平均收益。对使用\
  \ Pandas-Datareader 收集的历史价格运行它：\n\n```\nmu = expected_return.mean_historical_return(prices)\n\
  ```\n```\n\n\n为了量化资产风险，`PyPortfolioOpt`包含了风险模型，其中之一是协方差矩阵。之前，我们使用了`pandas`的`cov()`方法；这次，我们将运行从文件开头导入的`risk_models`模块中的`sample_cov()`函数：\n\
  \n```\nsigma = risk_models.sample_cov(prices)\n```\n\n`sample_cov()`函数接收价格数据并返回年化结果。与之前的例子相比，无需再将结果乘以\
  \ 252 个交易日，因为该操作已包含在`sample_cov()`中。\n\n基于预期收益率和协方差，我们可以计算已导入的有效前沿函数`EfficientFrontier`。\n\
  \n除了收益率和协方差，你还可以通过元组列表的形式为所有股票提供权重边界。在前一个例子中，我们假设投资组合中持有 50%的`MSFT`，以及各 25%的`AAPL`和`IBM`。如果目标是设置精确值，则需将`weight_bounds\
  \ =[(0.5,0.5),(0.25,0.25),(0.25,0.25)]`作为关键字参数传入。否则，投资组合中所有头寸将默认为`(0,1)`，意味着每项资产的最小值为\
  \ 0，最大权重为投资组合的 100%。如果投资组合包含空头头寸，则应将`weight_bounds`设置为`(-1,1)`。我建议保留默认值`(0,1)`，看看最优结果是什么：\n\
  \n```\nefficient_front = EfficientFrontier(mu, sigma, weight_bounds=(0,1))\n```\n\
  \n`EfficientFrontier`函数始终返回一个对象（图 6-15）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig15_HTML.jpg](img/506186_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15 生成股票投资组合的有效前沿\n\n`PyPortfolioOpt`的任务是优化股票投资组合。换句话说，`PyPortfolioOpt`为我们提供了如何更好地构建投资组合以实现投资目标的指导。\n\
  \n例如，如果我们的投资目标是降低波动性至最小，我们可以通过有效前沿对象的`min_volatility()`属性获取建议的资产分配：\n\n```\nmin_vol_weights\
  \ = efficient_front.min_volatility()\n```\n\n根据`PyPortfolioOpt`，将全部资产的 52%分配至`IBM`，17%至`AAPL`，30%至`MSFT`，将为我们提供在最低波动水平下的最大回报（图\
  \ 6-16）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig16_HTML.jpg](img/506186_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16 计算投资组合中股票权重以最小化波动性\n\n相反，如果目标是驱动风险调整后回报最大化，我们可以选择使用`max_sharp()`方法最大化夏普比率。默认无风险利率为\
  \ 2%，但你可以将其设置为当前市场利率：\n\n```\nmax_sharp_weights = efficient_front.max_sharpe(risk_free_rate=0.02)\n\
  ```\n\n选择最大化夏普比率将给出完全不同的结果，建议将`MSFT`和`AAPL`的持股比例分别提升至 54%和 45%，并完全消除`IBM`持仓（图 6-17）。\n\
  \n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig17_HTML.jpg](img/506186_1_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17 最大化投资组合的夏普比率\n\n根据我们的假设和投资目标，`portfolio_performance()`方法将计算预期收益率、年化波动率和夏普比率。你需要记住的唯一一点是，`portfolio_performance()`将返回你在投资组合上执行的上一次操作的预期收益率和波动率。为了示例的清晰性，我们需要清空当前工作笔记本的内存。你可以通过在上方`Jupyter\
  \ Notebook`的 `Kernel`菜单中选择`\"Restart & Clear Output\"`选项来实现。然后，你需要重新运行导入所有包、使用`Pandas-Datareader`获取历史价格、以及我们计算预期收益率和协方差矩阵的单元格。最后，选择你想要获取收益率和波动率的场景，例如最大化夏普比率，并运行该单元格。之后，你可以通过在有效前沿实例上运行`portfolio_performance()`来获取投资组合表现：\n\
  \n```\nefficient_front.portfolio_performance(verbose=True, risk_free_rate = 0.02)\n\
  ```\n\n我们可以向`portfolio_performance()`方法传递两个参数：`verbose`和`risk_free_rate`。`verbose`参数意味着返回的值将附带说明打印出来。默认情况下，`verbose`设置为`False`并返回一个包含原始数值的元组；`True`选项将打印所有值并附带说明（图\
  \ 6-18）。`risk_free_rate`参数会影响预期收益率和波动率；因此，它应该反映未来假设的市场利率。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig18_HTML.jpg](img/506186_1_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18 获取具有最大化夏普比率的投资组合的预期表现\n\n此外，我们可以使用已导入的绘图方法`plot_weights()`绘制来自`max_sharpe()`方法的建议权重（图\
  \ 6-19）：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig19_HTML.jpg](img/506186_1_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19 绘制具有最大化夏普比率的投资组合权重\n\n```\nplot_weights(max_sharp_weights);\n```\n\n因此，要获取具有低波动性的投资组合的预期表现，我们需要再次清除所有输出并重启`Kernel`。然后重新运行单元格，并将`min_volatility()`方法应用于有效前沿的实例。在这种情况下，`portfolio_performance()`方法返回一组完全不同的表现指标（图\
  \ 6-20）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig20_HTML.jpg](img/506186_1_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20 获取具有最小化波动性的投资组合的预期表现\n\n最小波动性优化后的权重可视化将有助于理解资产配置。使用`plot_weights()`函数绘制它们（图\
  \ 6-21）：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig21_HTML.jpg](img/506186_1_En_6_Fig21_HTML.jpg)\n\
  \n图 6-21 绘制具有最小化波动性的投资组合权重\n\n```\nplot_weights(min_vol_weights);\n```\n\n正如我之前提到的，`PyPortfolioOpt`附带绘图工具，帮助我们可视化整个有效前沿。如果你已经运行了`min_volatility()`或`max_sharpe()`方法，`plotting()`函数将无法工作。我们需要通过清除内存和重置`Kernel`来恢复原始有效前沿的实例。之后，重新运行除包含`min_volatility()`和`max_sharpe()`方法之外的单元格。\n\
  \n使用一行代码和我们之前导入的`plotting()`函数，绘制曲线：\n\n```\nplotting.plot_efficient_frontier(efficient_front,\
  \ show_assets=True)\n```\n\n\n\n`show_assets`参数将确保股票也映射到图表上（图 6-22）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig22_HTML.jpg](img/506186_1_En_6_Fig22_HTML.jpg)\n\
  \n**图 6-22** 绘制投资组合的有效前沿\n\n经典均值-方差优化有一个替代方案——`CLA`（关键线算法）。`CLA`是一种在曲线上寻找最优投资组合的优化解决方案。它在投资组合管理中非常流行，因为它是唯一专门为不等式约束投资组合优化设计的算法。它在`PyPortfolioOpt`中作为`CLA()`函数实现。`CLA()`函数需要预期收益和协方差矩阵来获取最优投资组合。将我们之前生成的值传入`CLA()`并绘制它（图\
  \ 6-23）：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig23_HTML.jpg](img/506186_1_En_6_Fig23_HTML.jpg)\n\
  \n**图 6-23** 使用`CLA`绘制最优投资组合\n\n```\ncla = CLA(mu, sigma)\nplotting.plot_efficient_frontier(cla);\n\
  ```\n\n`PyPortfolioOpt`库在投资组合管理中是不可替代的。它易于使用且文档齐全。我的建议是关注文档（[`https://pyportfolioopt.readthedocs.io/en/latest/index.html`](https://pyportfolioopt.readthedocs.io/en/latest/index.html)）以了解新特性或变更。本章还有一些未涉及的附加功能，例如实现自己的优化器。我相信在以上示例之后，您对如何操作`PyPortfolioOpt`有了更好的理解。\n\
  \n# 基本面分析\n\n如今，有多种方式可以获取公司财务信息。其中之一是我们在第 4 章讨论过的`Alpha Vantage API`。在这里，我想演示另一个\
  \ Python 包——`Fundamental Analysis`，用于获取和分析上市公司的资产负债表、利润表、现金流量表以及其他重要信息。\n\n我们需要使用`pip`命令安装`Fundamental\
  \ Analysis`库：\n\n```\npip install FundamentalAnalysis\n```\n\n在一个新的 Jupyter Notebook\
  \ 中，导入`Fundamental Analysis`、`Pandas`、`Requests`和`Matplotlib`以绘制数据：\n\n```\nimport\
  \ FundamentalAnalysis as fa\nimport matplotlib.pyplot as plt\nimport pandas as pd\n\
  import requests\n```\n\n`Fundamental Analysis`是围绕`Financial Modeling Prep API`的一个小型\
  \ Python 封装，用于收集上市公司的基本信息。根据文档，它可以获取超过 13,000 家公司的详细数据。^(¹⁷)\n\n要开始使用`Financial\
  \ Analysis`包，您需要从[`https://financialmodelingprep.com/developer/docs/`](https://financialmodelingprep.com/developer/docs/)获取一个`API\
  \ Key`。注册并选择一个免费计划或付费计划以获取高级 API 和 30 年以上的历史数据。选择计划后，转到上方菜单中的仪表板，您可以在其中找到您的`API\
  \ Key`。收到`API Key`后，我们就可以开始探索`Financial Analysis`的功能。本例中使用的`API Key`将被禁用。\n\n首先，获取所有可用公司及\
  \ ETF（交易所交易基金）的列表：\n\n```\nAPI_KEY = \"1b01185c3c4ae0c8626ad15beb99a957\"\ncompanies\
  \ = fa.available_companies(API_KEY)\n```\n\n从`available_companies()`函数以及其他所有函数接收到的数据均以`DataFrame`形式呈现。使用`iloc[]`方法，我们可以在行之间移动（图\
  \ 6-24）：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig24_HTML.jpg](img/506186_1_En_6_Fig24_HTML.jpg)\n\
  \n**图 6-24** 浏览可用公司列表\n\n```\ncompanies.iloc[5:10]\n```\n\n如果您有喜欢的公司，请使用其交易所代码。我将使用埃克森美孚公司。埃克森美孚在纽约证券交易所的代码是`XOM`。函数`profile()`将获取任何上市公司的基本信息（图\
  \ 6-25）：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig25_HTML.jpg](img/506186_1_En_6_Fig25_HTML.jpg)\n\
  \n**图 6-25** 接收`XOM`代码的公司简介\n\n```\nticker = \"XOM\"\nprofile = fa.profile(ticker,\
  \ API_KEY)\n```\n\n估值是一项重要信息，`Financial Analysis`通过函数`enterprise()`提供，免费计划可获得五年期数据，付费计划可获得更长时期的数据（图\
  \ 6-26）：\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig26_HTML.jpg](img/506186_1_En_6_Fig26_HTML.jpg)\n\
  \n**图 6-26** 埃克森美孚公司估值\n\n```\nentreprise_value = fa.enterprise(ticker, API_KEY)\n\
  entreprise_value\n```\n\n它被称为基本面分析是有原因的；使用函数`balance_sheet_statement()`，我们可以获取上市公司多年期的资产负债表（图\
  \ 6-27）。关键字参数`period`可以设置为`\"annual\"`或`\"quarter\"`选项。除了资产和负债，`balance_sheet_statement()`还返回指向\
  \ SEC（美国证券交易委员会）文件的链接，以便您直接追溯至数据源。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig27_HTML.jpg](img/506186_1_En_6_Fig27_HTML.jpg)\n\
  \n**图 6-27** 埃克森美孚公司资产负债表\n\n除了资产负债表，您还可以获取利润表和现金流量表：\n\n```\nincome_statement_annually\
  \ = fa.income_statement(ticker, API_KEY, period=\"annual\")\ncash_flow_statement_annually\
  \ = fa.cash_flow_statement(ticker, API_KEY, period=\"annual\")\n```\n\n我们可以使用`Matplotlib`对数据进行可视化分析。毛利是基本面分析的重要组成部分，我们将通过绘制柱状图来可视化营业收入和营业成本。\n\
  \n在图的`x`轴上，我们将绘制年份：\n\n```\nx = income_statement_annually.columns\n```\n\n然后从利润表中获取营业收入和营业成本的数据：\n\
  \n```\nrevenue = income_statement_annually.loc[\"revenue\"]\ncost = income_statement_annually.loc[\"\
  costOfRevenue\"]\n```\n\n与其他`Matplotlib`图形类似，柱状图需要`x`和`y`轴参数的坐标。同时，我们将指定柱子的`color`和`width`参数：\n\
  \n```\nplt.bar(x, revenue, color ='maroon', width = 0.6)\nplt.bar(x, cost, color\
  \ ='blue', width = 0.6)\nplt.title(\"Exxon Mobil Corp Revenue/Cost of Revenue\"\
  );\n```\n\n基于可视化分析，我们发现 2020 年对埃克森美孚公司来说是艰难的一年（图 6-28）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig28_HTML.jpg](img/506186_1_En_6_Fig28_HTML.jpg)\n\
  \n**图 6-28** 毛利率可视化\n\n使用`Financial Analysis`，您可以获取来自美国证券交易委员会（SEC）的原始数据或关键财务比率。\n\
  \n函数`key_metrics()`将提供所有主要指标，例如流动比率、股本回报率等：\n\n```\nratios = fa.key_metrics(ticker,\
  \ API_KEY)\n```\n\n使用`Matplotlib`的`subplot()`函数，我们将在同一张图但不同窗口中绘制来自`ratios`的投资资本回报率和股本回报率。我们将`x`轴设置为`ratios.columns`对应的年份，`y`值将从行中获取`roic`和`roe`。我们通过`DataFrame`的`loc[]`方法按标签获取行：\n\
  \n```\nx = ratios.columns\nroic = ratios.loc[\"roic\"]\nroe = ratios.loc[\"roe\"\
  ]\nplt.subplot(211)\nplt.plot(x, roic, color=\"blue\", marker=\"o\", label=\"ROIC\"\
  )\nplt.legend()\nplt.subplot(212)\nplt.plot(x, roe, color=\"green\", linestyle='--',\
  \ label=\"ROE\")\nplt.legend();\n```\n\n\n\n# 在`subplot`方法中，数字`211`和`212`表示网格布局：第一个数字`2`代表行数，第二个数字`1`代表列数；每个子图仅占一列。最后一个数字则表示该子图在整个图形中的位置。\n\
  \n该绘图在同一图形中生成两个子图，每个图形显示独立的数据（图 6-29）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig29_HTML.jpg](img/506186_1_En_6_Fig29_HTML.jpg)\n\
  \n**图 6-29** 绘制 ROIC 与 ROE 比率\n\n## 财务比率\n\n另一组比率是财务比率。财务比率能够为投资者提供关于公司健康状况的重要信息，并帮助在同一行业内比较公司的表现。我们可以通过`financial_ratios()`函数获取这些比率：\n\
  \n```python\nfin_ratios = fa.financial_ratios(ticker, API_KEY)\n```\n\n在获取的财务比率中，我打算绘制的是存货周转率。\n\
  \n存货周转率反映了公司销售存货的速度。2016 年较高的存货周转率意味着更高的销售额，这可能反映了当时的高油价（图 6-30）。\n\n![../images/506186_1_En_6_Chapter/506186_1_En_6_Fig30_HTML.jpg](img/506186_1_En_6_Fig30_HTML.jpg)\n\
  \n**图 6-30** 绘制存货周转率\n\n财务分析是一个非常便捷的包，仅需几行代码就能获取财务信息。正如本章所见，你可以从零开始构建解决方案，也可以使用\
  \ Python 的第三方库。选择哪条路完全取决于你。如果你是算法交易员，可能会倾向于定制化、高度优化的解决方案。另一方面，如果你需要快速获取数据，总能找到一个能完成工作的\
  \ Python 包。依我看来，Python 是任何类型财务分析的绝佳工具。\n\n# 脚注\n\n7. 用 Python 完成数字营销的关键任务\n\n数字营销需要数字工具来处理社交媒体、发送销售邮件以及在万维网上获取客户。有众多营销应用可以帮助数字营销人员运行、测试和分析促销活动，但其中一些贵得离谱，另一些则无法定制，需要额外工作才能获得所需结果。如果能用几行代码免费运行和评估任何自定义场景，那该多好？你可以用\
  \ Python 构建自己的营销工具。所有大型科技巨头都提供免费且易用的 API，用于自动化任务和管理信息。\n\n在本章中，我们将介绍 Google、Twitter\
  \ 和 Mailgun 中最流行的营销服务。利用它们的 API 和 Python，我们将实现许多繁琐任务的自动化。此外，我们还将学习如何以 Python 可读的格式获取营销数据，以便用\
  \ Pandas 进行分析。\n\n我们将从最核心的数字营销工具——Google Analytics 开始。Google 是一家对 Python 友好的公司，Python\
  \ 的发明者 Guido van Rossum 曾在 Google 工作过一段时间。许多 Google 服务都运行在 Python 上，而且几乎所有这些服务都可以通过\
  \ API 访问。Google 甚至有自己的 Python 库，以尽可能简化与其服务的连接。\n\n## 开始使用 Google API 客户端\n\n我想先快速介绍一下\
  \ Google API Client 包。Google API Client 库提供了所有核心 Google 产品的入口。无论你是想通过 Gmail 账户发送或读取邮件，还是用\
  \ Python 访问 Google Maps，都需要在机器上安装 Google API Python Client。\n\n使用 Python 包管理器`pip`即可轻松完成安装。在\
  \ Anaconda Navigator 中打开终端 → Environments → base → Terminal，然后使用`pip`命令安装 Google\
  \ API Client 包：\n\n```bash\npip install google-api-python-client\n```\n\n所有 Google\
  \ 服务都需要进行身份验证并启用 API。¹⁸ 我接下来要描述的过程适用于任何 Google API 服务的通用场景。\n\nGoogle 建议在统一平台——Google\
  \ Cloud Platform（[`https://cloud.google.com/`](https://cloud.google.com/)）上管理项目并监控\
  \ API 使用情况。部分 Google 服务免费，部分需要付费，但无论如何，Google 为新手开发者提供了 300 美元的信用额度，足以试用这些 API。如果你还没有\
  \ Google 账号，请在[`https://accounts.google.com`](https://accounts.google.com)创建一个，然后登录到\
  \ Google Cloud Platform。\n\n由于信息过多且存在陌生缩写，Google Cloud Platform 的控制面板可能对新手来说有些令人望而生畏。我们需要为\
  \ API 创建一个新项目。\n\n**第 1 步：** 在顶部 Google Cloud Platform 标志旁边寻找**“创建项目”**，或者直接跳转到“管理资源”页面（[`https://console.cloud.google.com/cloud-resource-manager`](https://console.cloud.google.com/cloud-resource-manager)）。在“管理资源”页面上，你会看到顶部的**“创建项目”**按钮（图\
