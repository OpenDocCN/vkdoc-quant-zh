  \n**图 7-12** 来自 Google Analytics 报告的页面浏览量和会话时长值的可视化\n\n每次我查看 Google Analytics 时，我都想知道访问我网站的访客来自哪里。使用相同的\
  \ Google Analytics 请求模板，我们将通过国家/地区和城市获取会话的位置。\n\n这次，我将缩短日期范围并将其设置为三天。使用更长的时间段，您将获得更多信息。每个\
  \ Google Analytics 响应包含一千行，要获取所有数据，您需要使用`while`循环重复发送 API 请求，直到获取所有行。对于维度，我将使用`ga:country`和`ga:city`。另一种跟踪网站访客的方法是使用`ga:latitude`和`ga:longitude`。除了日期范围和维度之外，我的\
