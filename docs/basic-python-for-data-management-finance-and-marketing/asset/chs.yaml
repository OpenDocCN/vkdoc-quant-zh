- "# 2. 编写你自己的 Python 脚本\n\n在上一章中，我们已经介绍了 Python 的所有基础知识。在这里，我们将介绍基本的控制流语句，并学习如何结构化程序。我们将学习如何使用`for`和`while`循环，并编写自定义函数。此外，我们还将熟悉一个关键的\
  \ Python 数据结构——字典。\n\n在本章的学习过程中，我们将解决一些有趣且有益的挑战。我们将要进行的练习将演示如何使用 Python 操作数据。无论你身处哪个领域，这都是非常必要的技能。\n\
  \n## 确定循环\n\n确定循环或`for`循环是任何编程语言的重要组成部分。很多时候，你需要多次执行某个操作。例如，你需要向所有朋友发送圣诞祝福。祝福语应该是个性化的，内容是“圣诞快乐\
  \ {你朋友的名字}！”。每个朋友都应该打印相同的消息。\n\n让我们看看如何实现。首先，我们需要创建一个包含名字的列表。在假期里，创建一个亲密朋友的列表来问候是很自然的事情。将这个任务转换为\
  \ Python 如下所示：\n\n```\nfriends = [\"Mary\", \"Paul\", \"John\"]\n```\n\n现在我们需要遍历列表并逐个获取名字。这个迭代可以通过关键字`for`实现（图\
  \ 2-1）：\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig1_HTML.jpg](img/506186_1_En_2_Fig1_HTML.jpg)\n\
  \n**图 2-1**  `for`循环遍历朋友列表\n\n```\nfor name in friends:\nprint( \"Merry Christmas\"\
  , name)\n```\n\n我想一步步解释这个例子。让我们从`for`循环的结构开始。`for`是一个关键字，在 Jupyter 中会高亮显示。你必须以关键字`for`开头才能重复执行任务。在`for`之后，你需要使用某个变量。在我的课堂上，经常有人问我\
  \ Python 如何知道我们正在处理朋友的名字。实际上，“`name`”是一个变量，可以替换为任何其他占位符。尝试将图 2-1 中第 3 行和第 4 行的“`name`”替换为“`banana`”，你会看到完全相同的输出。大多数情况下，在\
  \ Python 教程中，人们使用字母`i`（代表`item`）作为`for`循环中的变量。变量的选择完全取决于你。`in`是一个运算符，通常也是绿色高亮。它指的是接下来的序列。用简单的话说，我们想做以下事情：\n\
  \n> for variable in sequence:\n> do something to variable\n\n我们遍历项目列表，并用每个值定义变量。每次一个。在问候示例中，我们实际上是从列表中逐个获取人的名字值，并将其赋值给“`name`”变量（图\
  \ 2-2）。这就是背后发生的事情。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig2_HTML.jpg](img/506186_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2**  变量“name”被定义为列表中的每个值\n\n正如确定循环这个术语所暗示的，`for`循环迭代的次数等于序列中元素的数量。由于`print`语句位于`for`循环的作用域内，因此每次迭代都会执行它。\n\
  \n在迭代过程中，你可以对值执行任何操作。我们可以插入字符串方法`format()`使输出更美观。`format`方法会将变量`name`的值放入花括号中。这个方法可以避免在`print()`函数中使用多个逗号，使我们的代码更简洁：\n\
  \n```\nfor name in friends:\nprint(\"Merry Christmas {}! and Happy New Year!\".format(name))\n\
  ```\n\n大多数情况下，你需要将`for`循环与`if`、`elif`或`else`结合使用。扩展我们的示例，我们可以说如果`Paul`在列表中，则打印“请给我打电话”这条消息。为了检查列表中的每个值是否为“`Paul`”，`if`语句必须位于`for`循环的作用域内。它将测试每个值，假设`Paul`在列表中，则`if`条件返回`True`。逻辑上，位于`if`语句作用域内的另一个`print()`函数将被触发（图\
  \ 2-3）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig3_HTML.jpg](img/506186_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3**  在遍历列表时使用`if`语句\n\n\n\n初学者最难理解的部分是 `for` 循环及其包含的 `if` 语句的作用域。在 `for`\
  \ 循环迭代过程中，其作用域内的所有语句都会被执行（图 2-4）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig4_HTML.jpg](img/506186_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4\n\n`for` 循环与 `if` 语句的设计模式\n\n另一个说明 `for` 循环的例子是同时遍历数字列表并进行过滤。初始列表可能如下所示：\n\
  \n```\nalist = [1, 5, 2, 5, 3, 5, 4, 5, 6, 5, 7]\n```\n\n我们的任务是找出数字 `5` 并将其添加到另一个\
  \ `blist` 中。那么，我们先初始化一个新列表：\n\n```\nblist = [ ]\n```\n\n如果你不知道从何入手，可以尝试将任务按逻辑拆解成几个步骤。首先，我们需要从列表中取出每个数字。听起来这该由\
  \ `for` 循环来完成。接着，我们需要将每个数字与 `5` 进行比较，否则计算机怎么知道我们正在找数字 `5` 呢。如果某次比较结果为 `True`，我们就需要使用\
  \ `append()` 方法将该数字添加到 `blist` 中。所有这些步骤都可以转换成代码：\n\n```\nfor number in alist:\n\
  \    if number == 5:\n        blist.append(number)\n```\n\n结果，我们会得到一个全是 `5` 的 `blist`（图\
  \ 2-5）。在图 2-5 的第 6 行，`append()` 被缩进并放置在 `if` 语句的作用域内，它仅在 `if` 语句返回 `True` 后才被执行。缩进是\
  \ Python 语法的重要组成部分，你必须遵循 `for` 循环与 `if` 语句的设计模式（图 2-4）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig5_HTML.jpg](img/506186_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\n\n过滤 `alist` 并将 `5` 添加到 `blist`\n\n"
- "# Range 函数\n\n`range` 函数是内置函数之一，用于生成数字序列。要使用它，我们需要指定起始整数（序列从哪个数字开始）、停止整数（在哪里停止）以及步长整数（具体的间隔），如图\
  \ 2-6 所示。停止整数是该函数唯一必需的参数。停止数字不会包含在生成的序列中。默认情况下，起始点为 `0`，步长为 `1`。因此，我们至少需要提供一个停止整数。不要将\
  \ `range` 函数与切片混淆。虽然 `range()` 函数需要类似的参数（起始值、停止值和步长），但它与切片表示法毫无共同之处。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig6_HTML.jpg](img/506186_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\n`range` 函数参数\n\n大多数情况下，`range()` 函数与 `for` 循环配合使用。假设我们想生成一个从 `1` 到 `5`\
  \ 的数字范围，可以这样写：\n\n```\nfor i in range(1,6):\n    print(i)\n```\n\n输出结果为从 `1` 到 `5`\
  \ 的数字，停止点被排除在外（图 2-7）。我们未指定步长，它默认为 `1`。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig7_HTML.jpg](img/506186_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\n`range` 函数生成从 `1` 到 `5` 的数字\n\n到目前为止，非常简单。如果我们想生成相同的范围，但这次是按降序排列呢？那么我们需要从\
  \ `5` 开始，不能将 `1` 作为停止点。如果使用 `1`，序列中就不会出现 `1`，我们必须将 `0` 作为停止点。要改变方向，我们需将 `-1` 用作步长（图\
  \ 2-8）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig8_HTML.jpg](img/506186_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\n`range` 函数生成从 `5` 到 `1` 的降序数字\n\n你可能会好奇 range 的实际用途。通常，`range()` 函数用于生成索引。还记得我们可以通过索引访问序列中的元素吗？让我们回到上一章使用的例子：\n\
  \n```\nword = \"apple\"\nword[0]\nword[1]\nword[2]\nword[3]\nword[4]\n```\n\n使用索引语法，我们通过索引来获取字母。我们不想手动操作。如果能够为任意单词（无论其长度如何）生成索引，任务就会变得简单得多。借助\
  \ `len()` 函数，我们可以获取任何序列中的元素或字符数量：\n\n```\nlen(word)\n```\n\n字符串 `\"apple\"` 有五个字符。`len()`\
  \ 函数总是返回一个整数。这个整数可以作为 `range()` 函数中的停止点。将其作为参数，`range` 函数就能为任何单词生成从 `0` 到停止点的正确序列。我们可以将\
  \ `len(word)` 作为停止参数传递给 `range()`。\n\n`i` 将代表每个字母的索引。这个索引可用于访问字母，例如 `word[0]`。在图\
  \ 2-9 中，你可以看到 range 生成了一个从 `0` 到 `4` 的数字序列，这完全符合我们对停止点 `5` 的预期。接着，将每个数字传递给方括号，我们就能逐个从字符串中获取字母。\n\
  \n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig9_HTML.jpg](img/506186_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9\n\n`range` 函数生成可用作索引的数字\n\n在许多情况下，你可能想获取序列中某个值的位置。这就是为什么我们需要知道每个值的索引。例如，如果我们想替换某个值，或对某个值执行操作，我们就需要知道该值存储的位置。\n\
  \n\n\n"
- '# 嵌套 for 循环


  嵌套 `for` 循环的最佳示例莫过于乘法表。我们都知道乘法表长什么样。其概念相当简单：有两组数字，从一组中取出一个数，与另一组中的一个数相乘。1 到 10 的数字序列可以通过
  `range()` 来创建。从 1 到 10 的数字序列应水平打印。你可能注意到了，每次在 `for` 循环中使用 `print()` 函数时，它都会将每个项目打印在新的一行上。`print()`
  函数的这种行为是可以改变的。如果我们在任意函数上运行 `help()`，就能看到该函数的所有关键字参数：


  ```

  help(print)

  ```


  显然，`print()` 函数有一个默认参数 `end=''\n''`。`''\n''` 表示换行。每次执行 `print()` 函数时，它都会在打印文本后添加一个换行符。纯粹为了好玩，尝试将
  `''\n''` 替换成 `''ZZ''`，那么它就会在每条语句末尾打印 `''ZZ''`。对于乘法表，我们需要将 1 到 10 的数字水平打印出来。可以这样做：


  ```

  for i in range(1,11):

  print( i, end='' '')

  ```


  然后，我们还需要另一组 1 到 10 的数字。这次，我们使用 `j` 作为变量：


  ```

  for j in range(1,11):

  print( j, end='' '')

  ```


  注意，执行这两个 `for` 循环的结果是得到 20 个数字。第一个 `for` 循环迭代并打印十个数字，第二个 `for` 循环也是如此。我们可以将第二个 `for`
  循环移入第一个 `for` 循环的作用域内。这样，外部 `for` 循环的每一次迭代都会得到十个 `j`。接下来，去掉第一个 `print` 语句，并在第二个
  `print()` 函数中将 `i` 乘以 `j`：


  ```

  for i in range(1,11):

  for j in range(1,11):

  print( i*j, end='' '')

  ```


  当我们有了嵌套的 `for` 循环后，会打印出 100 个数字。这里要传达的主要信息是：执行 100 次操作所需的时间比执行 20 次要长。通过嵌套 `for`
  循环，我们极大地增加了程序的时间复杂度。换句话说，我们让代码运行得更慢了。


  别误会我的意思。我并不是说永远不要使用嵌套循环。有些情况下你不得不使用嵌套循环，比如乘法表。我只是希望你能明白，如果你能找到不使用嵌套循环的解决方案，那么那个解决方案会更快。


  在我们将乘法表规范化之前，需要在末尾增加一个 `print` 语句。尽管这个 `print` 语句跟在第二个 `for` 循环之后，但它应被放置在外部 `for`
  循环的作用域内。这意味着最后一个 `print` 语句的执行次数与外部 `for` 循环的迭代次数相同。因为最后一个 `print` 语句处于外部 `for`
  循环的作用域中。我们需要这个 `print` 在每组数字之后添加 `''\n''`。如果你临时在该 `print()` 函数中放入一些内容，比如 `"ZZ"`，理解起来会更容易：


  ```

  for i in range(1,11):

  for j in range(1,11):

  print( i*j, end='' '')

  print(''ZZ'')

  ```


  这些有趣的小标签有助于你理解最后一个 `print` 语句究竟做了什么以及它执行了多少次。在底部添加了 `print()` 函数后，它看起来更像一个乘法表了。我们可以使用字符串格式化方法进行最后的润色。这个
  `format` 方法将帮助我们以数字之间间隔四个空格的均匀间距来排列数字。你可能还记得，字符串方法 `format` 会将值插入到花括号中。在传递值的同时，我们可以对它们进行格式化。在我们的示例中，花括号中的
  `:4` 会在数字之间生成四个空格：


  ```

  for i in range(1,11):

  for j in range(1,11):

  print("{:4}".format(i*j), end='' '')

  print()

  ```


  在图 2-10 中，你可以看到最终结果。乘法表练习很好地解释了嵌套 `for` 循环的概念。对于外部 `for` 循环的每一次迭代，你都会得到内部 `for`
  循环的 `n` 次迭代。下次当你决定使用嵌套 `for` 循环时，请回想一下乘法表以及你代码的运行时复杂度。


  ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig10_HTML.jpg](img/506186_1_En_2_Fig10_HTML.jpg)


