  \ 7-3）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig3_HTML.jpg](img/506186_1_En_7_Fig3_HTML.jpg)\n\
  \n\n\n### 图 7-3  \n为 Google Analytics 服务生成 API 密钥\n\n大多数 Google API 服务都需要 API 密钥，请妥善保存该密钥，以备后续使用。\n\
  \n### 结合 Python 使用 Google Analytics\n\n距离我们首次调用 Google Analytics API 仅一步之遥；Google\
  \ Analytics 要求以 JSON 格式提供 API 密钥。生成包含密钥的 JSON 文件的简单方法是，在 Google Cloud Platform 中打开**服务账号**页面。你可以在顶部的搜索框中搜索该页面，或者通过左侧菜单导航至**IAM\
  \ 与管理**。在**IAM 与管理**中，选择**服务账号**选项；它将带你进入 [`https://console.cloud.google.com/iam-admin/serviceaccounts`](https://console.cloud.google.com/iam-admin/serviceaccounts)\
  \ 页面。如果你有多个项目，请点击与 Google Analytics 相关的那个项目。在那里，你应该会看到 Google 为该服务创建的项目电子邮件（图 7-4）。\n\
  \n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig4_HTML.jpg](img/506186_1_En_7_Fig4_HTML.jpg)\n\
  \n#### 图 7-4  \n服务账号页面与 Google 服务电子邮件\n\n点击该电子邮件并导航至**密钥**标签页。在该页面中，你会看到**添加密钥**按钮。点击**添加密钥**并选择**创建新密钥**选项。弹出的窗口将提供生成\
  \ JSON 密钥文件的选项（图 7-5）；点击**创建**按钮，并将其保存到你的计算机中。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig5_HTML.jpg](img/506186_1_En_7_Fig5_HTML.jpg)\n\
  \n#### 图 7-5  \n生成密钥并保存为 JSON 文件\n\n最后，在我们生成了 JSON 格式的 API 密钥后，就可以编写一些代码来使用 Google\
  \ Analytics 了。现在是时候编写 Python 代码了；打开一个新的 **Jupyter** Notebook，并将下载的 JSON 密钥文件移动到相同的工作目录中。此外，将\
  \ JSON 文件重命名为 `client_secret_api.js` 会是个好主意。\n\n为了进行身份验证，我们需要安装 `oauth2client` 库。你知道在哪里找到终端窗口，只需运行\
  \ `pip` 命令并安装该库即可：\n\n```\npip install oauth2client\n```\n\n在新的 **Jupyter** Notebook\
  \ 顶部，导入以下模块：\n\n```\nfrom oauth2client.service_account import ServiceAccountCredentials\n\
  from apiclient.discovery import build\n```\n\n在脚本的开头，我们需要定义凭据。所有尝试访问 Google Analytics\
  \ 的用户，`SCOPES` 都是相同的。`KEY_FILE_LOCATION` 应提供包含 API 密钥的已下载 JSON 文件的路径。我已将文件重命名为 `client_secret_api.json`。最后，`VIEW_ID`\
  \ 应填写你 Google Analytics 项目的视图 ID。你可以在 [analytics.google.com](http://analytics.google.com)\
  \ 页面上找到 `VIEW_ID`。如果你在 Google Analytics 中激活了 **创建 Universal Analytics 媒体资源** 选项，`VIEW_ID`\
  \ 将分配给所跟踪的 `.` Web 资源。进入左下角的**管理**设置，查找**视图设置**。在**基本设置**中，你将找到网站的**视图 ID** 编号。此外，在\
  \ Google Analytics 中，将服务账号中的电子邮件（图 7-4）添加到账号用户管理中允许生成报告的用户列表中。\n\n```\nSCOPES =\
  \ ['https://www.googleapis.com/auth/analytics.readonly']\nKEY_FILE_LOCATION = 'client_secret_api.json'\n\
  VIEW_ID = '123415356'\n```\n\n为了初始化凭据，我们将使用导入的 `ServiceAccountCredentials`，并传入 `KEY_FILE_LOCATION`\
  \ 和 `SCOPES` 作为参数：\n\n```\ncredentials = ServiceAccountCredentials.from_json_keyfile_name(KEY_FILE_LOCATION,\
  \ SCOPES)\n```\n\n接着，我们需要通过 `build()` 函数连接 Google API 客户端库。正如我之前提到的，Google API 客户端包是通用的，适用于所有\
  \ Google 服务。在 `build()` 函数中，你需要指定要连接的服务以及该包的版本：\n\n```\nanalytics = build('analyticsreporting',\
  \ 'v4', credentials=credentials)\n```\n\n\n\nGoogle Analytics 报告需要指定一个时间段。我们可以设置\
  \ `start_date` 和 `end_date`：\n\n```\nstart_date = \"2020-01-01\"\nend_date = \"\
  2021-04-23\"\n```\n\n此外，我们还需要为 Google Analytics 报告指定维度和指标。你可以在以下链接中找到所有可用指标的列表：[`https://ga-dev-tools.appspot.com/dimensions-metrics-explorer/`](https://ga-dev-tools.appspot.com/dimensions-metrics-explorer/)。\n\
  \n对于我的第一份报告，我将使用非常常用的 `users` 和 `sessions` 指标。要发送此报告的请求，我们需要使用 `analytics.reports()`\
  \ 函数，并在请求体中指定 `VIEW_ID`、日期、指标和维度：\n\n```\nresponse = analytics.reports().batchGet(body={\n\
  'reportRequests': [{\n'viewId': VIEW_ID,\n'dateRanges': [{'startDate': start_date,\
  \ 'endDate': end_date}],\n'metrics': [\n{\"expression\": \"ga:users\"},\n{\"expression\"\
  : \"ga:sessions\"}\n]\n}]}).execute()\n```\n\n`users` 和 `sessions` 指标参数应以数组键值对的形式传入函数，其中\
  \ `\"expression\"` 后跟指标名称。\n\n在新的单元格中打印响应，你会看到 Google Analytics 生成的报告以 JSON 格式呈现（图\
  \ 7-6）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig6_HTML.jpg](img/506186_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6  \n生成用户和会话指标的 Google Analytics 报告\n\n我们之前处理过 JSON 数据，知道它的工作方式类似于 Python\
  \ 字典。\n\n响应包含一个存储在 `\"reports\"` 键下的数组。我们可以获取这个数组并提取第一个元素：\n\n```\nresponse['reports'][0]\n\
  ```\n\n我们所需的信息存储在 `data` 键下。`data` 包含另一个字典，我们可以通过调用字典方法 `keys()` 查看所有键：\n\n```\n\
  response['reports'][0][\"data\"].keys()\n```\n\n得到的结果如下：\n\n```\ndict_keys(['rows',\
  \ 'totals', 'rowCount', 'minimums', 'maximums'])\n```\n\n`totals` 键中存储了我们想要使用的信息。我们将获取\
  \ `users` 和 `sessions` 的值：\n\n```\nreport = response['reports'][0][\"data\"]['totals'][0]\n\
  users = report['values'][0]\nsessions = report['values'][1]\n```\n\n在图 7-7 中，我们可以看到有\
  \ 308087 个唯一身份用户访问了该网站，总共产生了 363031 次会话。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig7_HTML.jpg](img/506186_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7  \n从 JSON 响应中提取用户和会话值\n\n为了可视化用户与网站的互动程度，我们可以绘制新用户和回访用户的比例图。`sessions` 包含所有访客，包括新用户和回访用户。而\
  \ `users` 则代表新访客。\n\n我们需要在存放所有导入语句的第一个单元格中导入 Matplotlib：\n\n```\nimport matplotlib.pyplot\
  \ as plt\n```\n\n新访客的百分比可以通过 `users` 除以 `sessions` 计算得出。不要忘记 JSON 数据以字符串形式提供，所有值都需要转换为数值数据类型：\n\
  \n```\nnew_visitors = int(users)/int(sessions)\nreturning_visitors = 100 - new_visitors\n\
  ```\n\n我们将用这些数据绘制一个环形图。环形图是饼图与圆形的结合（图 7-8）：\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig8_HTML.jpg](img/506186_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8  \n基于指标值的新用户和回访用户图表\n\n```\nmetrics = [new_visitors, returning_visitors]\n\
