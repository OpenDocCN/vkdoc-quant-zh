- "# 构建程序结构\n\n现在是将我们所学知识付诸实践的时候了。我们将编写一个最古老的文字游戏之一——\"儿童黑话\"（Pig Latin）。此练习旨在学习如何操作数据并组织代码结构。\n\
  \n如果你从未玩过\"儿童黑话\"，其规则非常简单：向用户询问任意单词。如果单词以元音开头，则需要在末尾加上`\"yay\"`。例如，`apple`将变成`appleyay`。但如果单词以辅音开头，则需要截掉单词中第一个元音之前的所有辅音，并将这些辅音移到单词末尾，同时还要在单词末尾添加`\"\
  ay\"`。单词`scratch`将变成`atchscray`。\n\n如果起初觉得问题过于复杂且不知如何入手，不妨先编写伪代码。\n\n伪代码是用通俗语言描述的算法概要。你可以将其视为一张路线图。在一张纸上写下完成该任务所需的所有步骤，假装自己正在向一个孩子逐步解释如何玩\"\
  儿童黑话\"。针对\"儿童黑话\"的伪代码解决方案可能如下：\n\n1.  向用户询问一个单词。\n2.  检查单词是否以元音开头。\n3.  如果单词以元音开头，则添加\"\
  yay\"并用变量保存。\n4.  如果单词以辅音开头，则需要检查所有字母并找到第一个元音。\n5.  要移除元音之前的字母，需要知道元音的索引。\n6.  使用变量`firstpart`存储所有被移除的辅音字母。\n\
  7.  获取其余字母并用变量`secondpart`存储。\n8.  将`secondpart`与`firstpart`拼接，并添加\"ay\"。\n\n将问题分解成简单步骤后更容易解决。如果不知道如何在\
  \ Python 中实现某个步骤，可以随时上网搜索。好了，现在我们就可以开始将计划转化为 Python 代码。\n\n为简单起见，我假设用户输入了单词`apple`：\n\
  \n```\nword = \"apple\"\n```\n\n现在我们需要检查第一个字母是否为元音。从字符串中获取第一个字符相当于索引操作。第一个索引始终为\
  \ 0，因此第一个字母是`word[0]`。在上一章中，我们编写过检查字母是否为元音的代码，此处可以直接使用：\n\n```\nif word[0] in [\"\
  a\",\"e\",\"i\",\"o\",\"u\"]:\n    print(\"这个字母是元音\")\n```\n\n由于`\"apple\"`以元音开头，根据步骤\
  \ 3，我们将为其添加\"yay\"。将新的\"儿童黑话\"单词保存在变量`result`中：\n\n```\nif word[0] in [\"a\",\"\
  e\",\"i\",\"o\",\"u\"]:\n    result = word + \"yay\"\n    print(result)\n```\n\n\
  添加一条打印语句来检查`result`的值，然后运行代码。确保代码在以元音开头的单词上能正确运行。第一部分很容易解决，我们已经完成了一半。\n\n对于第二部分，我们需要一个以辅音开头的单词。将变量`word`重新赋值为`\"\
  scratch\"`。这里只有两种可能：单词要么以元音开头，要么不以元音开头。逻辑上这对应`if`和`else`语句。到目前为止，我们已经实现了`if`部分，现在来编写`else`部分。\n\
  \n伪代码中的第 4 步要求测试单词中的所有字母并找到第一个元音。\n\n要找到元音，我们需要遍历字符串的字符，或者说，将这一任务转化为 Python，就是运行一个`for`循环。第\
  \ 5 步提示，当在单词中找到元音时，我们需要获取该元音的索引。函数`range()`对于获取索引非常有用。将第 4 步和第 5 步转化为代码后如下所示：\n\n\
  ```\nword = \"scratch\"\nif word[0] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n    result\
  \ = word + \"yay\"\nelse:\n    for index in range(len(word)):\n        print(index,\
  \ word[index])\n```\n\n`print`语句可以帮助我们确认进展正确，而`index`表示`word`中每个字母的索引。你可能还记得，要通过索引从字符串中获取字符，需要将索引放入方括号中，即`word[index]`。识别元音很容易，因为我们在第一部分刚做过。只需将`0`替换为`index`：\n\
  \n```\nword = \"scratch\"\nif word[0] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n    result\
  \ = word + \"yay\"\nelse:\n    for index in range(len(word)):\n        if word[index]\
  \ in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n            print(index, word[index])\n```\n\
  \n在`if`语句作用域内的`print`语句会显示元音及其索引。在单词`\"scratch\"`中，元音的索引是`3`。根据伪代码，我们需要按元音索引拆分单词。我们不希望硬编码（即直接使用`3`），因为另一个单词中的元音可能位于不同位置。利用切片，我们可以获取单词`\"\
  scratch\"`中元音`\"a\"`之前的所有辅音。因此，第 6 步的实现如下：\n\n```\nfirstpart = word[0:index]\n```\n\
  \n类似地，我们将切片获取元音之后的所有字母：\n\n```\nsecondpart = word[index : ]\n```\n\n终止位置留空是因为我们希望获取索引之后的所有字符。伪代码中的最后一步很简单。为了保持一致性，我们将使用相同的变量`result`，并将`secondpart`与`firstpart`和\"\
  ay\"拼接：\n\n```\nword = \"scratch\"\nif word[0] in [\"a\",\"e\",\"i\",\"o\",\"u\"\
  ]:\n    result = word + \"yay\"\nelse:\n    for index in range(len(word)):\n   \
  \     if word[index] in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n            firstpart\
  \ = word[0:index]\n            secondpart = word[index : ]\n            result =\
  \ secondpart + firstpart + \"ay\"\n```\n\n将`input()`函数赋值给`word`，然后用不同的单词测试你的代码，确保它能正常工作。有一点让我担心：包含两个及以上元音的单词可能会返回错误结果。如果你尝试单词`\"\
  brackets\"`，结果将是`\"etsbeackyay\"`。我认为规则要求识别第一个元音。如果需要代码在找到第一个元音后停止，我们需要在`if`语句后加上关键字`break`。在图\
  \ 2-15 中，你可以看到\"儿童黑话\"挑战的完整解决方案。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig15_HTML.jpg](img/506186_1_En_2_Fig15_HTML.jpg)\n\
  \n**图 2-15** 用 Python 编写的\"儿童黑话\"游戏\n\n我们可以重构代码以改进设计和结构。我会从`if`语句开始。代码中两次使用了元音列表。如果有一个函数能告诉我们某个字母是否为元音，是不是更简洁明了？我们可以编写一个小型辅助函数，该函数接受一个字母作为参数，并返回`True`或`False`。我将这个函数命名为`is_vowel`：\n\
  \n```\ndef is_vowel(letter):\n    if letter in [\"a\",\"e\",\"i\",\"o\",\"u\"]:\n\
  \        return True\n    else:\n        return False\n```\n\n接下来，我们可以将\"儿童黑话\"\
  游戏代码封装成一个函数。我将这个函数命名为`game`。该函数的功能是接受任意字符串（我们将其定义为`word`），并返回对应的\"儿童黑话\"变体：\n\n\
  ```\ndef game(word):\n    if is_vowel(word[0]):\n        result = word + \"yay\"\
  \n    else:\n        for index in range(len(word)):\n            if is_vowel(word[index]):\n\
  \                firstpart = word[0:index]\n                secondpart = word[index\
  \ : ]\n                result = secondpart + firstpart + \"ay\"\n              \
  \  break\n    return result\n```\n\n在函数`game`内部，我们将调用函数`is_vowel`来检查字母是否为元音。你可以测试函数`game`并用任意单词调用它：\n\
  \n```\ngame(\"scratch\")\n```\n\n\n\n我们会在一个单独的函数中请求用户输入。为此，我们将定义一个函数并将其命名为 `main`。在实际场景中，我们需要验证用户的输入。我们必须确保输入不含数字或其他非字母字符，并且输入的长度大于一个字母。英语中没有只有一个字母的单词，除了\
  \ `a` 和 `I`。如果输入验证成功，我们会将其传递给函数 `game`。经过处理后，函数 `game` 会返回一个 Pig Latin 单词，我们再将结果呈现给用户。如果用户的输入未通过我们的过滤器，我们将返回\
  \ `\"Invalid input, please try again\"`。由于 `is_vowel` 只能处理小写字母，我们需要在调用函数 `game`\
  \ 之前将接收到的单词转换为小写：\n\n```\ndef main():\nword = input(\"give me a word \")\nif word.isalpha()\
  \ and len(word) > 1:\nword = word.lower()\nresult = game(word)\nelse:\nresult =\
  \ \"Invalid input, please try again\"\nreturn result\n```\n\n你可以在图 2-16 中看到 Pig\
  \ Latin 游戏的最终实现。当我们在底部调用函数 `main` 时，它会提示我们输入一个单词。如果第 32 行的过滤器返回 `True`，则会在第 34 行调用函数\
  \ `game`。用户输入转换为小写后作为参数传递给 `game`，并赋值给参数 `word`。在第 15 行，`is_vowel` 会被第一个字母调用。对于单词\
  \ `\"dog\"`，`is_vowel` 返回 `False`，程序会转到 `else` 语句。第二次迭代后，函数 `is_vowel` 再次被调用，这次使用的是字母\
  \ `\"o\"`。从 `is_vowel` 函数接收到 `True`，使得代码执行第 20-22 行。新单词在第 22 行保存为变量 `result`。最后，函数\
  \ `game` 在第 24 行返回 Pig Latin 单词。`game` 函数的输出结果在第 34 行被保存，并在第 37 行由 `main` 函数返回。\n\
  \n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig16_HTML.png](img/506186_1_En_2_Fig16_HTML.png)\n\
  \n**图 2-16** Pig Latin 游戏的重构代码\n\n有些人可能会问，为什么像 Pig Latin 游戏这样简单的任务需要这么多函数。答案是每个函数都有自己的用途，并负责一项工作。`is_vowel`\
  \ 是一个辅助函数，只回答一个问题：一个字母是否是元音。如果需要，我们可以导出这个函数并在另一个文件中使用。函数 `main` 负责所有与用户的交互。如果后来你需要修改输入语句中的消息，可以轻松完成，而无需改动\
  \ `game` 函数。与用户通信是一个完全独立的任务，和 Pig Latin 代码无关。如果我们决定在程序中添加更多单词游戏，`main` 函数将是添加菜单并向用户询问想玩哪个游戏的正确位置。\n\
  \n## 不定循环\n\nPython 中有定循环和不定循环。我们已经学习了定型的 `for` 循环；现在该看看 `while` 循环了，这是一种不定循环。正如你可能从名字中猜到的，我们不知道\
  \ `while` 循环会迭代多少次。关键字 `while` 后面需要紧跟一个条件。如果条件返回 `True`，那么 `while` 循环就会执行其作用域内的语句。执行完毕后，`while`\
  \ 循环会再次检查条件。如果条件仍然成立，它会再次迭代。然而，如果条件返回 `False`，`while` 循环就会退出。最简单的例子是工作时间。伪代码可能如下所示：\n\
  \n```\nwhile not 6.00pm\nkeep working\n```\n\n如果还没到下午 6:00，我们就会继续工作。一小时后再检查时间是否是下午\
  \ 6:00。如果不是，则继续工作。到了某个时刻，`while` 条件不再为真，因为已经过了下午 6:00。我们就可以跳出循环，停止工作。主要规则是条件应当在某个时刻变为\
  \ `False`。否则，你最终会陷入无限循环。在现实生活中，这可能是一场灾难。\n\n我们可以像这样构建一个简单的 `while` 循环：\n\n```\n\
  tally = 0\nwhile tally < 5:\ntally = tally + 1\nprint(tally)\n```\n\n在运行这段代码之前，请确保在\
  \ `while` 循环的每次迭代中都将 `tally` 增加 1。如果不小心跳过了这条语句，你的 `while` 循环将会一遍又一遍地打印 0。这就是一个无限循环的例子。要退出无限循环，你需要通过点击\
  \ `Jupyter` 上方菜单中的停止按钮来中断内核。\n\n`while` 循环中的 `tally = tally + 1` 语句会增加 `tally` 的值。五次重复之后，`tally`\
  \ 的值将会是 5，条件 `tally < 5` 将返回 `False`。循环将退出（图 2-17）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig17_HTML.jpg](img/506186_1_En_2_Fig17_HTML.jpg)\n\
  \n**图 2-17** 当条件不再为真时，while 循环退出\n\n`while` 循环的关键要素是条件。条件必须在某个时刻发生变化以退出循环。\n\n我们可以在\
  \ Pig Latin 示例中使用 `while` 循环。函数 `main()` 验证输入的单词。如果字符串包含字母字符以外的任何内容，代码会重定向到 `\"\
  Invalid input, please try again\"`，程序停止。实际上，我们不想放弃一个不小心输入了无效单词的用户。使用 `while` 循环，我们会要求他们再试一次。我们将使用\
  \ `while` 循环，而不是 `if` 和 `else` 语句。程序会一直要求用户输入单词，直到输入正确的格式。我会添加另一个带有提示的 `print` 语句，说明只能使用字母字符：\n\
  \n```\ndef main():\nword = input(\"give me a word \")\nwhile not word.isalpha()\
  \ and len(word) > 1:\nprint(\"Invalid input, please try again\")\nprint(\"You can\
  \ use alphabetic-characters only \")\nword = input(\"give me a word \")\nword =\
  \ word.lower()\nresult = game(word)\nreturn result\n```\n\n`while` 后面的关键字 `not`\
  \ 使得 `word.isalpha() and len(word) > 1` 过滤器返回 `False`。这条语句实际上表示 `while False`。`while`\
  \ 循环会一遍又一遍地执行 `print` 语句并请求 `input`，直到用户输入正确。但是，如果用户输入了一个可用的单词，那么 `while` 语句根本不会被执行，代码会转到\
  \ `word = word.lower()` 这一行。`word = word.lower()` 和 `result = game(word)` 语句位于 `while`\
  \ 循环之外。它们会在两种情况下被执行。第一种情况是 `while` 循环从未被触发。第二种情况是 `while` 循环被执行然后终止。\n\n正如你所见，`while`\
  \ 循环和 `for` 循环之间存在概念上的区别。`while` 循环严重依赖于一个条件。相反，`for` 循环会针对序列中的每一项进行迭代。\n\n\n\n"
- "# 字典\n\n字典是一种非常重要且广泛使用的数据结构。在后续的学习中，我会多次提及字典。理解字典将有助于我们掌握更复杂的数据结构。\n\n字典是一个无序的键值对集合。一个键对应一个值。电话簿是解释字典结构的最佳方式。要初始化一个字典，我们需要使用`{}`花括号：\n\
  \n```\nphone_book = {}\n```\n\n当我们把`phone_book`定义为字典后，就可以向其中添加一些电话号码。要向字典添加一个新的键值对，我们需要用方括号指定一个键并赋值。假设我想存储我朋友的电话号码，那么`John`就是键，John\
  \ 的号码就是值：\n\n```\nphone_book[\"John\"] = 2123458967\n```\n\n键必须是唯一的。如果我有另一个同名的朋友，就需要用不同的键来存储他的号码。我们可以再往字典里添加几个朋友：\n\
  \n```\nphone_book[\"Tommy\"] = 5169873456\nphone_book[\"Mark\"] = 2015672189\n```\n\
  \n现在`phone_book`应该如图 2-18 所示。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig18_HTML.jpg](img/506186_1_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18\n\nPython 字典\n\n如果你想获取一个值，只需要提供键即可。要得到 Tommy 的电话号码，我需要把他的名字作为键传入（图 2-19）：\n\
  \n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig19_HTML.jpg](img/506186_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19\n\n通过键获取值\n\n```\nphone_book[\"Tommy\"]\n```\n\n与列表结构相比，字典的速度更快。我们从字典中获取一个值只需要一次操作。如果将电话号码存储在列表中，则需要遍历才能找到\
  \ Tommy 的号码。迭代需要多次操作，无论如何都比一次操作花费的时间更长。\n\n字典的另一个特点是易于重新赋值。假设 Tommy 换了电话号码，我们可以用新值替换旧值（图\
  \ 2-17）：\n\n```\nphone_book[\"Tommy\"] = 2016546765\n```\n\n值的修改次数没有限制。易于重新赋值的特性使字典成为存储股票价格的完美结构。股票代码是键，价格是值，可以多次更改。同样，字典也用于计数。每次出现某个键时，其对应的值都会更新。在本章末尾，我们将使用字典统计一个文本文件中每个单词出现的次数。\n\
  \n由于字典是无序的集合，且可能包含数千个元素，如何找到所有的键呢？一如既往，我们从`dir()`函数开始。如果在`dict`或我们这里的`phone_book`上运行`dir()`，就会找到字典支持的方法。我们要找的方法是`keys()`。\n\
  \n`keys()`属性可以获取字典中的所有键。如果你是第一次接触字典，可以先试试`keys()`。这个命令会返回一个有序数组，包含字典中的所有键（图 2-20）：\n\
  \n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig20_HTML.jpg](img/506186_1_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20\n\n`keys()`方法返回字典中的所有键\n\n```\nphone_book.keys()\n```\n\n与`keys()`方法相对的是`values()`。`values()`会将字典中的所有值以列表的形式返回（图\
  \ 2-21）：\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig21_HTML.jpg](img/506186_1_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21\n\n`values()`方法返回字典中的所有值\n\n```\nphone_book.values()\n```\n\n对我们来说，值的信息量较少，因为我们不知道它们对应的是什么。另一方面，如果我们假设字典存储了纽约证券交易所的所有股票，那么通过值，我们可以了解有多少家公司上涨或下跌。\n\
  \n`items()`方法会将字典转换为一个元组列表。每个键值对都将以元组结构呈现（图 2-22）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig22_HTML.jpg](img/506186_1_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22\n\n`items()`方法以元组形式返回字典中的所有键值对\n\n```\nphone_book.items()\n```\n\n`items()`方法在我们需要将字典转换为列表时会很有用。字典不是有序结构，因此要按值对字典进行排序，就需要一个列表。列表自然是可以排序的。你将在本章后面的示例中看到实际应用。\n\
  \n`get()`方法，你可能已经猜到，用于根据键获取值。这个方法与字典的方括号表示法`phone_book[\"Tommy\"]`的主要区别在于，如果找不到键，`get()`会返回一个默认值。如果用户试图获取\
  \ Mary 的电话号码，而字典中没有 Mary，那么`get()`将返回`\"Not Found\"`：\n\n```\nphone_book.get(\"\
  Mary\", \"Not Found\")\n```\n\n与返回错误消息相比，返回一个默认值是一种更优雅的方式（图 2-23）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig23_HTML.jpg](img/506186_1_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23\n\n如果字典中不存在某个键，`get()`方法会返回一个默认值\n\n到现在，你可能会问，能否用`for`循环遍历字典？我的方法是，如果你不确定或不知道某件事，那就试试看。至少你能从错误信息中了解操作失败的原因。事实上，你完全可以循环遍历字典。\n\
  \n遍历字典有几种方法。第一种很直接：\n\n```\nfor i in phone_book:\n    print(i)\n```\n\n这种方法会从字典中获取所有键。通过键，你可以获取对应的值：\n\
  \n```\nfor i in phone_book:\n    print(i, phone_book[i])\n```\n\n另一种遍历技术需要使用`items()`方法：\n\
  \n```\nfor i in phone_book.items():\n    print(i)\n```\n\n如你所见，变量`i`代表一个元组。`items()`方法已将`phone_book`转换为一个元组列表。从技术上讲，在应用`items()`之后，我们遍历的是一个元组列表。每个元组包含两个值，它们分别是原来的键和值。要提取键和值，我们需要解包这个元组。一种方法是通过索引来获取键和值：\n\
  \n```\nfor i in phone_book.items():\n    print(i[0], i[1])\n```\n\n然而，我们可以为元组中的第一个和第二个元素分配变量：\n\
  \n```\nkey, value = (\"John\", 2123458967)\n```\n\n如果我们采用这种逻辑，那么`for`循环就需要两个变量，看起来像这样：\n\
  \n```\nfor key, value in phone_book.items():\n    print(key, value)\n```\n\n在图 2-24\
  \ 中，你可以看到这两种解决方案产生的结果相同。最终使用哪种技术由你决定。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig24_HTML.jpg](img/506186_1_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24\n\n使用`for`循环遍历字典\n\n一个简单的练习可以总结如何从字典中获取值以及添加新的键和值。\n\n假设我们有一个餐厅的菜单，以字典形式存储如下：\n\
  \n```\nmenu = {\"Burger\": 3.75, \"Soda\": 0.99, \"Nachos\": 2.99, \"Shake\": 1.25}\n\
  ```\n\n使用输入函数，我们将询问用户两个菜单项：\n\n```\nitem_one = input(\"你要点什么？\")\nitem_two = input(\"\
  你还要什么？\")\n```\n\n获取到想要的菜品后，我们可以使用它们作为键从字典中获取价格：\n\n```\nprice_one = menu[item_one]\n\
  price_two = menu[item_two]\n```\n\n\n\n最后，我们将计算并打印总数：\n\n```\ntotal = price_one\
  \ + price_two\nprint(\"Your total is ${}\".format(total))\n```\n\n练习的下一部分演示了如何用键和值填充一个新的字典。继续以餐厅为例，我们决定将所有商品降价\
  \ 10%，并将新价格存入另一个名为 `sale` 的字典中。我们需要初始化一个新字典：\n\n```\nsale = {}\n```\n\n在遍历 `menu`\
  \ 时，我们将每个值减少 10%，同时将食品和新价格添加到 `sale` 字典中。内置函数 `round` 会将小数部分四舍五入到 2 位：\n\n```\n\
  for food, price in menu.items():\nsale[food] = round(price * 0.9, 2)\n```\n\n遍历完菜单并降低所有价格后，我们的新字典\
  \ `sale` 将如下所示：\n\n```\n{'Burger': 3.38, 'Soda': 0.89, 'Nachos': 2.69, 'Shake':\
  \ 1.12}\n```\n\n## 将信息写入文本文件\n\n正如我们之前讨论过的，Python 在 RAM（短期内存）中运行，而文件存储在硬盘或云端（长期内存）中。内置函数\
  \ `open()` 用于从文件读取数据以及将数据写入文件。`open()` 返回一个 Python 对象。请记住，你并非直接操作存储在硬盘上的文件，而是操作一个对象。函数\
  \ `open()` 接受关键字参数。我们可以看一下打开文件所需的主要参数。首先，你需要提供文件名和文件路径。其次是模式（mode）。模式指定了你对文件的意图。默认值是\
  \ `mode='r'`。字符串 `'r'` 代表读取（read）。如果你的意图是从文件中获取信息，应该保持该默认值。若要向文件写入数据，则需要将模式改为 `'w'`。每次运行代码时，`open()`\
  \ 函数都会创建一个新文件。另一个关键字参数是 `encoding`。对于 Mac 用户来说，它是可选的，因为默认情况下它会以 UTF-8 格式对文件进行编码或解码。还记得在第一章中，我们讨论过计算机如何存储字符串。简而言之，文本文件就是一个字符串。UTF-8\
  \ 是目前最流行的文本编码系统。如果你好奇 UTF-8 编码具体是如何工作的，并想查看字符及对应数字的表格，可以在维基百科（`https://en.wikipedia.org/wiki/UTF-8`）上找到。Windows\
  \ 系统可能需要 `encoding=\"utf8\"` 参数来对文件进行编码：\n\n```\nobj = open(\"myfile.txt\", \"w\"\
  , encoding=\"utf8\")\n```\n\n`obj` 持有由 `open()` 函数生成的对象。打印它，你会看到：\n\n```\n这意味着我们已经成功创建了\
  \ `myfile.txt`。你可以在你的计算机上查找这个新文件。在你存放 `Jupyter` Notebook 的同一目录中，使用查找或搜索功能找到它。在任意文本编辑器中打开\
  \ `myfile.txt` 文件。该文件是空的，我们还没有向其中写入任何内容。\n\n写入模式有点棘手。如果你再次运行 `open()` 函数，`\"w\"\
  ` 模式会删除现有的 `myfile.txt` 文件，并创建一个同名的新文件。请记住，如果你的计算机上之前就有 `myfile.txt` 且包含一些现有信息，那么这些信息将会丢失。\n\
  \n现在我们已经有了一个文件，可以向其中写入一些内容了。同样，我们将操作 Python 对象。在 `obj` 上运行 `dir()`，你会看到所有读写方法。要向\
  \ `obj` 添加一个字符串，我们使用 `write()` 命令。完成后，使用 `close()` 命令将其保存到文件中。\n\n我们需要一个字符串来写入文件；确保你所有的代码都在同一个单元格中：\n\
  \n```\nstring_one = \"This pizza is delicious!\"\nobj = open(\"myfile.txt\", \"\
  w\", encoding=\"utf8\")\nobj.write(string_one)\nobj.close()\n```\n\n`close()` 方法将对象保存为一个文件。它的工作方式类似于\
  \ Microsoft Word 中的保存按钮。在你点击“保存”按钮之前，文本是不会被保存的。如果发生断电，屏幕上已有的数据未保存，你可能会丢失这些数据。\n\n\
  运行完所有这些命令后，刷新 `myfile.txt` 文件。文件中应该包含 `\"This pizza is delicious!\"`（图 2-25）。\n\n\
  ![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig25_HTML.jpg](img/506186_1_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25\n在文本文件中写入信息\n\n与写入模式相比，追加模式（append mode）会将字符串添加到现有文件中。如果你已有文件并希望写入附加数据，可以将关键字参数\
  \ mode 中的 `\"w\"` 替换为 `\"a\"`。我们需要另一个字符串来追加到 `myfile.txt` 中。在 Python 中，`\"\\n\"\
  ` 符号表示换行。它会使短语在新的一行开始：\n\n```\nstring_two = \"I love pepperoni pizza!\"\nobj = open(\"\
  myfile.txt\", \"a\", encoding=\"utf8\")\nobj.write(\"\\n\"+string_two)\nobj.close()\n\
  ```\n\n每次运行这段代码，它都会将 `\"I love pepperoni pizza!\"` 追加到 `myfile.txt` 中（图 2-26）。\n\
  \n\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig26_HTML.jpg](img/506186_1_En_2_Fig26_HTML.jpg)\n\
  \n**图 2-26** 追加模式将信息写入文本文件\n\n总而言之，我们来做一个简单的例子。假设我们有一个包含股票价格的字典，需要将它们存储到一个文本文件中：\n\
  \n```\nportfolio={\"IBM\":111.90,\"AAPL\":155.53,\"MSFT\":216.39}\nobj = open(\"\
  dummydata.txt\", \"w\", encoding=\"utf8\")\nfor key, value in portfolio.items():\n\
  obj.write(\"Stock {} Price{}\\n\".format(key,value))\nobj.close()\n```\n\n这里，我使用了\
  \ `\"w\"` 模式，因为我们只是将数据写入 `dummydata.txt` 文件。`for` 循环遍历字典并提取键和值。请注意，`format()` 方法将价格（浮点数值）转换为字符串。文本文件格式只接受字符串数据类型（图\
  \ 2-27）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig27_HTML.jpg](img/506186_1_En_2_Fig27_HTML.jpg)\n\
  \n**图 2-27** 将字典中的信息写入文本文件\n\n## 从文本文件中读取信息\n\n从文件中读取数据类似于写入文件。我们只需以默认的读取模式使用 `open()`\
  \ 函数即可。某些 Windows 系统可能要求你在文件路径前添加一个小写的 `r`。此外，如果文件与 Python 脚本不在同一目录下，请确保你的文件路径是正确的，否则你会遇到\
  \ `FileNotFoundError`。\n\n```\nobj = open(r\"dummydata.txt\", \"r\", encoding=\"\
  utf8\")\nobj.read()\n```\n\n方法 `read()` 将 `obj` 解析为一个字符串（图 2-28）。不必担心 `\\n` 符号。Python\
  \ 表示这些字符是换行分隔的。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig28_HTML.jpg](img/506186_1_En_2_Fig28_HTML.jpg)\n\
  \n**图 2-28** 从文本文件中读取信息\n\n事实上，我们可以使用 `\\n` 将字符串分割成一个列表。将 `obj.read()` 赋值给一个新变量。有一个字符串方法\
  \ `split()`。关于 `split()` 你需要记住的一点是，它总是返回一个列表数据结构。默认情况下，`split()` 会按空格分隔字符串。相反，你可以传入一个关键字或字符作为分隔依据。在我们的例子中，我们将传入\
  \ `\\n` 作为参数：\n\n```\nobj = open(r\"dummydata.txt\", \"r\", encoding=\"utf8\")\n\
  data = obj.read().split(\"\\n\")\n```\n\n在 `split()` 之后，变量 `data` 保存了由逗号分隔的字符串列表。列表是一种多用途的数据结构，我们可以继续进行数据分析（图\
  \ 2-29）。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig29_HTML.jpg](img/506186_1_En_2_Fig29_HTML.jpg)\n\
  \n**图 2-29** 解析文本文件中的信息\n\n为了总结本章所学的全部内容，我们将进行一个实际示例。找任何一个你手头的文本文件，或者你可以按照我的步骤使用我上传到网上的文件。如果你决定使用自己的文件，你可以像之前的例子一样使用\
  \ `open()` 函数。从服务器读取文件需要使用 Python 内置模块 `urllib`。`urllib` 是一个包含多个用于处理 URL（统一资源定位符）的模块的包。`urllib`\
  \ 的原理非常简单。它向服务器发送请求，并使用 `urlopen()` 函数获取信息。我的文本文件位于：[`https://bit.ly/text-file`](https://bit.ly/text-file)。保持代码干净整洁是个好主意。我的建议是每项任务都创建一个新文件。\n\
  \n由于 `urllib` 是一个包，我们需要先导入它。在本书的课程中，我们将使用许多不同的库包。库是函数的集合。简单来说，就是第三方代码。在文件开头导入库非常重要。你不希望将第三方代码塞入脚本中间。这就是为什么即使你一开始忘记了导入某个库，也要回去并在第一个单元格中导入它。\n\
  \n```\nfrom urllib.request import urlopen\n```\n\n从云端读取文本需要使用 `urlopen()` 函数。我们从服务器收到的信息将存储为一个对象。该对象可以使用\
  \ `read()` 方法进行解析。对于来自在线来源的文本，`read()` 将返回带有前缀 `'b'` 的字节字面值。我们可以使用 `str()` 函数确保它是常规字符串（图\
  \ 2-30）：\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig30_HTML.jpg](img/506186_1_En_2_Fig30_HTML.jpg)\n\
  \n**图 2-30** 解析远程文本文件中的信息\n\n```\ndata = urlopen(\"https://bit.ly/text-file\")\n\
  data = str(data)\n```\n\n目前，我们的数据表示为一个简单的字符串。我们的目标是找出文本中出现频率最高的十个单词。\n\n逻辑上讲，我们可以使用字典数据结构。每个单词都是一个键，单词在文本中出现的次数是值。听起来不错。但在那之前，我们需要将所有单词转换为小写。对于\
  \ Python 来说，首字母大写的“The”和首字母小写的“the”是不同的字符串。此外，我们需要将大字符串按空白字符分割成单词：\n\n```\ndata\
  \ = urlopen(\"https://bit.ly/text-file\")\ndata = str(data).lower()\ndata = data.split()\n\
  ```\n\n在 `split()` 之后，`data` 变量包含一个单词列表。我们需要一个字典来累加每个单词的出现次数。我将用变量 `d` 初始化一个字典：\n\
  \n```\nd = {}\n```\n\n我们可以遍历单词列表。如果一个单词已在字典中，我们就将值增加一。否则，我们将该单词添加到字典 `d` 中，并将其值设置为\
  \ `1`：\n\n```\nfor word in data:\nif word in d:\nd[word] = d[word] + 1\nelse:\n\
  d[word] = 1\n```\n\n在图 2-31 中，你可以看到这个字典已经填满了单词。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig31_HTML.jpg](img/506186_1_En_2_Fig31_HTML.jpg)\n\
  \n**图 2-31** 字典 `d` 将单词作为键，每个单词在文本中出现的次数作为值\n\n接下来我们要做的就是按值对这些单词进行排序。我们不能直接对字典进行排序，所以需要将其转换为元组列表（图\
  \ 2-32）：\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig32_HTML.jpg](img/506186_1_En_2_Fig32_HTML.jpg)\n\
  \n**图 2-32** 我们已将字典转换为元组列表\n\n```\nalist = list(d.items())\n```\n\n在我们对元组列表进行排序之前，我想解释一下\
  \ `sort()` 方法的机制。`help()` 函数会显示 `sort()` 的所有关键字参数：\n\n```\nhelp(list.sort)\n```\n\
  \n有两个参数，`key=None` 和 `reverse=False`。`reverse` 简单地表示你希望如何排序列表，升序还是降序。默认情况下，它被设置为\
  \ `False`，因为人们更喜欢按升序排列所有内容。我们需要将 `reverse` 切换为 `True`，因为我们关心的是最大值。\n\n`key` 参数稍微复杂一些。让我解释一下我的意思。假设我们有一个普通的数字列表。方法\
  \ `sort()` 会通过比较数值进行升序排序：\n\n```\nplain_list = [ 9,  5,  7,  4,  8,  3]\nplain_list.sort()\n\
  [3, 4, 5, 7, 8, 9]\n```\n\n为了说明我们的情况，我将取列表的一个样本并应用相同的 `sort()` 方法：\n\n```\nmy_list\
  \ = [('will', 17),('explain', 1),('choice', 3),('a', 32)]\nmy_list.sort()\n[('a',\
  \ 32), ('choice', 3), ('explain', 1), ('will', 17)]\n```\n\n\n\n你可以看到列表已排序，但按字母顺序排列。Python\
  \ 知道字母的顺序。`sort()` 方法假设元组中的第一个元素是重要的。默认情况下，它通过第一个元素对所有元组进行排序。我们希望按每个元组中的第二个元素对列表进行排序。如果我们获取元组的第二个元素并将其用作\
  \ `sort()` 方法中的键，就可以实现这一点。第一步是获取一个元素：\n\n```\nt =('a', 32)\nt[1]\n```\n\n我们需要对列表中的每个元组执行此操作。听起来像是重复。我们需要将此语句封装成一个函数。我将此函数命名为\
  \ `get_value`：\n\n```\ndef get_value(t):\nreturn t[1]\n```\n\n`sort()` 的定义说明，如果给定了键函数，它将被应用于列表中的所有项。第二步是使用\
  \ `get_value` 作为键：\n\n```\nalist.sort(key=get_value, reverse=True)\n```\n\n在图 2-33\
  \ 中，你可以看到列表按值最高的单词排序。我们可以对列表进行切片，以获取文件中前十个最频繁出现的单词。\n\n![../images/506186_1_En_2_Chapter/506186_1_En_2_Fig33_HTML.jpg](img/506186_1_En_2_Fig33_HTML.jpg)\n\
  \n图 2-33 查找文本中出现频率最高的十个单词\n\n有人可能会问，除了定义一个函数来索引元组中的元素之外，有没有更好的方法来获取键？答案是肯定的；`lambda`\
  \ 将是一个优雅的解决方案。我们将在下一章介绍 `lambda`。之后，你可以回到这个问题，并用 `lambda` 替换 `get_value`。我相信前两章已经为理解\
  \ Python 如何工作打下了坚实的基础。你可以将这些章节视为 Python 编程的入门。我们已经涵盖了从内置数据类型和函数到控制流语句的所有基本主题。到目前为止，你应该已经打下了解决高级\
  \ Python 主题和处理复杂问题的基础。\n\n## 3. 使用 Pandas 进行数据分析\n\n现代生活的挑战需要快速的解决方案。如今，我们需要实时评估大量信息。Python\
  \ 很快，但如果你需要更快，还有 Pandas。Pandas 是用于加速数据处理的 Python 核心库。它最初是为华尔街专业人士开发的，但很快在从事数值计算、大数据分析以及希望从电子表格转向功能强大且更高效的\
  \ Python 编程语言的人群中流行开来。名称 `Pandas` 代表面板数据（Panel Data）。面板数据是计量经济学中用于多维数据集的术语。`Pandas`\
  \ 有许多有用的函数，可以使数据分析过程更加高效。\n\n`Pandas` 提供了两种复杂的数据结构：`Series` 和 `DataFrame`。我喜欢用车辆来类比数据结构。假设\
  \ Python 列表是一辆简单可靠、能带你从 A 点到 B 点的汽车，那么 `Series` 就是一辆快速的赛车。普通汽车需要定期更换机油和汽油，而赛车则需要高级润滑油和特殊保养。在本章中，我们将介绍\
  \ `Pandas` 的所有主要功能，例如过滤、逻辑运算、连接和合并数据集，并学习如何使用它们。\n\n# Series\n\n在开始定义 `Series` 并编写代码之前，我们需要导入\
  \ `Pandas`。\n\n由于 `Pandas` 是一个第三方库，每次在文件开头想要使用它时，都需要导入它：\n\n```\nimport pandas as\
  \ pd\n```\n\n变量 `pd` 用作快捷方式。`pd` 包含了所有 `Pandas` 函数，你可以通过键盘上的 Tab 键查看所有函数。在一个新单元格中，输入\
  \ `pd.` 并按 Tab 键（图 3-1）。不要忘记 `pd` 后面的点。根据我的经验，尤其是在 Windows 系统上，可能需要一些时间才能看到包含所有函数的下拉菜单。在\
  \ **Jupyter** 中，Tab 键可用作自动补全工具。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig1_HTML.jpg](img/506186_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1 输入 `pd` 并按 Tab 键查看 `Pandas` 函数\n\n`Series` 是一种一维数据结构。我们之前见过序列结构，但这一次有所不同。如果你运行以下代码，可以看到\
  \ `Series` 的正式定义：\n\n```\nhelp(pd.Series)\n```\n\n它显示“带有轴标签的一维 ndarray”。^(⁴) 为了理解这个定义并领略\
  \ `Series` 的所有特性，我们需要创建一个。\n\n我们将从一个列表开始，然后将其转换为 `Series`，以观察两种数据结构之间的差异。定义一个简单的\
  \ Python 列表 `alist`，其中包含一些数字：\n\n```\nalist = [ 100, 200, 300, 400, 500 ]\n```\n\
  \n使用 `pd.Series()` 函数，将列表转换为 `Series`：\n\n```\nser = pd.Series(alist)\n```\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig2_HTML.jpg](img/506186_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2 Pandas Series\n\n在图 3-2 中，我们可以看到 `Pandas Series`，这是一种一维数据结构，或者简单地说是容器。`Series`\
  \ 的左侧是索引。索引是默认提供的。索引的概念借鉴自关系数据库。在关系数据库中，每条记录都有一个主键。主键是唯一的标识符。使用键，你可以获取一个值。`Series`\
  \ 使用了相同的方法。但是，在 `Series` 中，作为连接数据集的结果，你可能会得到重复值。当我们学到连接操作时，会讨论这一点，并解释如何处理重叠的索引值。在此期间，我们可以通过索引来获取值：\n\
  \n```\nser[1]\n```\n\n`ser[1]` 操作将得到 `200`。使用切片表示法，我们可以获取几个值：\n\n```\nser[1:3]\n\
  ```\n\n结果，我们得到 `200` 和 `300`。与 Python 切片表示法一样，结束索引被排除在外。\n\n`Series` 底部总是带有 `dtype`，即值的数据类型标识符。与列表相比，`Series`\
  \ 是同质的，只能保存相同数据类型的值。值的同质性使得 `Series` 比列表更快。我们可以执行一个简单的测试来说明同质性。将 `ser` Series 中的第一个元素替换为浮点数：\n\
  \n```\nser[0] = 1000.1234\n```\n\n浮点数 `1000.1234` 被转换为整数，然后才被 `dtype: int64` 的 `Series`\
  \ 接受（图 3-3）。这意味着所有值必须具有相同的数据类型。如果由于某种原因无法将值转换为整数，那么 `Series` 会将所有值转换为浮点数，或者引发错误。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig3_HTML.jpg](img/506186_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3 Series 始终是同质的\n\n`Series` 有两个主要属性：`index` 和 `values`。尝试 `ser.index`，它将返回\
  \ `RangeIndex(start=0, stop=5, step=1)`，意味着有五个元素。索引的格式让人想起 `range()` 函数。我们在前一章中使用过它。`ser.values`\
  \ 语句将揭示值存储为 NumPy 数组，即 `array([1000, 200, 300, 400, 500])`。NumPy 是 Python 中另一个用于科学计算的核心库。虽然\
  \ NumPy 包超出了本书的范围，但我们将会提及它。`Pandas` 的数据结构构建在 NumPy 数组之上，并且它们共享相似的行为。因此，我们可以借用 NumPy\
  \ 中的函数并将其应用于 `Pandas` 对象。\n\n`Series` 的一个主要优点是我们可以对整个结构（而不是其元素）执行操作。这种行为被称为向量化。向量化也是从\
  \ NumPy 继承而来的。这种行为使得 `Series` 比 Python 列表更快、更高效。例如，如果我们需要将 `alist` 中的所有项除以 2，那么我们必须使用\
  \ `for` 循环：\n\n```\nfor item in alist:\nnewitem = item / 2\n```\n\n\n\n然而，如果所有值都存储在一个\
  \ `Series` 中，我们就可以将数学运算应用于整个容器（图 3-4）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig4_HTML.jpg](img/506186_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4  \n向量化将运算应用于 `Series`\n\n这正是我将 `Series` 比作赛车的含义。任何 `for` 循环操作都比向量化操作花费更长的时间。因此，你**不**应该使用\
  \ `for` 循环来遍历一个 `Series`。首先，这会使操作运行得更慢；其次，完全没有这个必要。\n\n另一个证明效率的例子是两个 `Series` 对象之间的向量化操作——一个简单的市盈率计算。如果我们将所有股票价格和每股收益分别存储在两个\
  \ `Series` 中，而不是列表中，那么股票市价除以每股收益的计算会更快。\n\n存储在名为 `portfolio` 的 `Series` 中的随机股票价格：\n\
  \n```\nportfolio = pd.Series([30,20,45,76,34])\n```\n\n将除以同样存储在 `Series` 容器中的同一公司的每股收益：\n\
  \n```\nearnings = pd.Series([1.5,3.3,4.5,2.5,2.75])\n```\n\n最终结果可以保存为一个名为 `pe` 的新\
  \ `Series`（图 3-5）：\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig5_HTML.jpg](img/506186_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5  \n两个 `Series` 对象之间的除法运算\n\n```\npe = portfolio / earnings\n```\n\n如果我们把表达式传入\
  \ `round()` 函数中，可以将市盈率示例的结果**四舍五入**到小数点后精确的两位：\n\n```\npe = round(portfolio / earnings,\
  \ 2)\n```\n\n正如我刚才提到的，一个 `Series` 有两个属性：`index` 和 `values`。这让我们想起了字典结构中的键和值。从某种意义上说，`Series`\
  \ 非常接近字典。创建新 `Series` 最简单的方法是将 Python 字典转换为 Pandas `Series`（图 3-6）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig6_HTML.jpg](img/506186_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6  \n将 Python 字典转换为 `Series` 结构\n\n```\nstocks = {\"IBM\":30, \"ORCL\":20,\
  \ \"MSFT\":45}\nportfolio = pd.Series(stocks)\n```\n\n字典中的键被用作 `Series` 中的索引（图 3-7）。你可以将\
  \ Pandas `Series` 视为 Python 字典的一种特化形式。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig7_HTML.jpg](img/506186_1_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7  \n字典中的字符串键是 `Series` 中的索引\n\n通过在 `Series` 上使用字典表示法，我们可以向 `portfolio` 对象追加更多值。要添加一个元素，我们需要一个新的键值对。尝试使用以下代码向\
  \ `portfolio` Series 中添加更多股票：\n\n```\nportfolio[\"AAPL\"] = 76\nportfolio[\"INTC\"\
  ] = 34\n```\n\n作为该操作的结果，`portfolio` 对象被附加了两个值（图 3-8）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig8_HTML.jpg](img/506186_1_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8  \n使用字典表示法，我们可以向 `Series` 添加值\n\n我们已经了解到，`Series` 是 Pandas 中的一种一维数据结构。现在让我们看看，如果将几个\
  \ `Series` 连接在一起会得到什么。\n\n# DataFrame\n\n`DataFrame` 是一种二维数据结构。你可以将其视为一组绑定在一起的 `Series`。创建\
  \ `DataFrame` 有多种方法，我将在本书的后续内容中逐一展示。我想从一个最简单的例子开始，即如何从头构建一个 `DataFrame`。我们将使用 Pandas\
  \ 函数 `pd.DataFrame()` 初始化一个 `DataFrame`，并将其保存在 `portfolio` 变量名下。\n\n### 构建 DataFrame\n\
  \n为了保持代码整洁，请将每个示例放在一个独立的 **Jupyter** Notebook 文件中。在文件开头的一个独立单元格中，我们需要导入 Pandas：\n\
  \n```\nimport pandas as pd\n```\n\n在一个新单元格中，借助 Pandas 的 `DataFrame()` 函数将 `portfolio`\
  \ 变量定义为一个 `DataFrame`：\n\n```\nportfolio  = pd.DataFrame()\n```\n\n如果你打印 `portfolio`\
  \ 对象，你什么也看不到，因为它是空的。我们需要用数据填充我们的容器。最直接的方法是定义几个 `Series` 并将它们附加到 `portfolio` 对象上。同样，我在所有示例中都使用随机数作为值。\n\
  \n```\nstock_symbols = pd.Series([\"IBM\",\"ORCL\",\"MSFT\", \"AAPL\"])\nstock_prices\
  \ = pd.Series([116.86, 56.91, 216.51, 119.26])\nnumber_shares = pd.Series([50, 100,\
  \ 50, 100])\n```\n\n我们需要为列命名，并使用字典表示法将它们与值一起添加到 `DataFrame` 中：\n\n```\nportfolio[\"\
  Symbol\"] = stock_symbols\nportfolio[\"Price\"] = stock_prices\nportfolio[\"Qty\"\
  ] = number_shares\n```\n\n在图 3-9 中，你可以看到我们从头创建的 `DataFrame`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig9_HTML.jpg](img/506186_1_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9  \n从头创建 `DataFrame`\n\n将 `DataFrame` 分解成更小的部分，你会发现它由 `index`、`columns` 和\
  \ `values` 属性组成（图 3-10）：\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig10_HTML.jpg](img/506186_1_En_3_Fig10_HTML.jpg)\n\
  \n图 3-10  \n`DataFrame` 有三个属性：`index`、`columns` 和 `values`\n\n```\nportfolio.index\n\
  portfolio.columns\nportfolio.values\n```\n\n我们使用了字典表示法来向 `DataFrame` 添加列。这使得 `DataFrame`\
  \ 成为了 Python 字典的一种特化形式。\n\n### 切片 DataFrame\n\n使用同样的方法，我们可以对 `DataFrame` 进行切片以获取一列：\n\
  \n```\nportfolio[\"Price\"]\n```\n\n将列名作为字符串传入方括号中，就像我们从 Python 字典中根据键获取值一样，它将只返回一列（图\
  \ 3-11）。返回的列是一个 `Series` 对象。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig11_HTML.jpg](img/506186_1_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11  \n切片 `DataFrame` 的一列\n\n使用列作为键的方括号方法允许我们分割列或创建新列。此外，当列名包含空格时，这个方法至关重要。如果你从头创建\
  \ `DataFrame`，我建议你避免在列名中使用空格，当你使用两个或更多单词作为列名时尤其如此。然而，有时你不得不处理由其他人创建的、列名中包含分隔单词的数据。在这种情况下，`[\"\
  a column name\"]` 将是你能获取该列的唯一方法。\n\n一如既往，要查看 `DataFrame` 中所有内置的属性和方法，可以在 `portfolio`\
  \ 对象上运行 `dir()` 函数。我们可以看到 `Symbol`、`Price` 和 `Qty` 是我们 `DataFrame` 的属性。这意味着我们可以像这样切片\
  \ `Price` 列：\n\n```\nportfolio.Price\n```\n\n请记住，将列作为属性进行切片的方法（图 3-12）无法帮助你获取多个列。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig12_HTML.jpg](img/506186_1_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12  \n将 `DataFrame` 的一列作为属性进行切片\n\n我们需要将列名作为一个列表传入方括号中，才能获取多列（图 3-13）：\n\n\
  ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig13_HTML.jpg](img/506186_1_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13  \n切片 `DataFrame` 的多列\n\n```\nportfolio[ [\"Symbol\",\"Qty\"] ]\n```\n\n\
  \n\n如前所述，方括号表示法和名称会创建一个新列。如果我们还没有合适的列值该怎么办？这不成问题。我们可以用`0`或空字符串作为占位符来创建一个空列，以便稍后添加值。例如，我们需要为投资组合中每只股票支付的价格创建一个列。我们将它命名为`Cost`，由于还没有实际数据，使用`\"\
  \ \"`作为占位符：\n\n```\nportfolio[\"Cost\"] = \" \"\n```\n\n该语句将创建一个空列，我们可以在之后使用（图 3-14）。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig14_HTML.jpg](img/506186_1_En_3_Fig14_HTML.jpg)\n\
  \n**图 3-14** 使用方括号表示法创建空列\n\n请记住，我们始终可以重新分配同一列名下的值。我们只需要以一位结构存储的每股成本数据。之前我们使用过`Series`向`DataFrame`添加值；然而，`list`或`tuple`也能很好地完成同样的工作。大多数情况下，当从不同来源收集数据时，你会使用`list`作为临时结构来保存值。只需确保该结构的长度与`DataFrame`中的行数匹配。通过重新分配将值添加到`portfolio``DataFrame`：\n\
  \n```\nportfolio[\"Cost\"] = [115.25, 55.00, 210.30,105.75]\n```\n\n图 3-15 显示了更新值后的`Cost`列。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig15_HTML.jpg](img/506186_1_En_3_Fig15_HTML.jpg)\n\
  \n**图 3-15** 通过重新分配更新列中的值\n\n在本章前面部分，我们曾在两个`Series`之间执行了向量化操作。由于每个列代表一个`Series`，我们可以在列之间进行向量化计算。每股价格乘以股票数量可以得到整个持仓的美元金额。我们可以将结果保存到一个名为`Amount`的新列中（图\
  \ 3-16）：\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig16_HTML.jpg](img/506186_1_En_3_Fig16_HTML.jpg)\n\
  \n**图 3-16** 向量化操作以计算持仓的美元金额\n\n```\nportfolio[\"Amount\"] = portfolio[\"Price\"\
  ] * portfolio[\"Qty\"]\n```\n\n另一个类似操作的例子是计算每个持仓的利润或亏损。这次，我们将使用稍有不同的语法。我们将列名用作`DataFrame`的属性（图\
  \ 3-17）。Python 遵循数学运算顺序，我们将使用圆括号先计算每股利润或亏损，然后将结果乘以股票数量：\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig17_HTML.jpg](img/506186_1_En_3_Fig17_HTML.jpg)\n\
  \n**图 3-17** 计算利润或亏损，将列作为`DataFrame`的属性获取\n\n```\nportfolio[\"Profit\"] = (portfolio.Price–portfolio.Cost)*portfolio.Qty\n\
  ```\n\n`DataFrame`默认带有索引。但我们始终可以重新分配索引。股票代码是唯一的，我们可以将它们用作索引。要使用列值作为索引，我们需要切片该列并将其分配为索引：\n\
  \n```\nportfolio.index = portfolio.Symbol\n```\n\n重新分配索引后，`portfolio``DataFrame`的索引值与`Symbol`列中的值相同。为了区分索引和列，Pandas\
  \ 会在列名的下一行打印索引名称（图 3-18）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig18_HTML.jpg](img/506186_1_En_3_Fig18_HTML.jpg)\n\
  \n**图 3-18** 将索引重新分配为`Symbol`列的值\n\n到目前为止，我们一直在向`DataFrame`添加新列。使用`drop()`方法，我们可以移除不需要的列。`DataFrame`的方法比我们之前在处理`list`或`tuple`时遇到的更复杂。我建议使用`help()`函数来验证方法可能需要的所有参数：\n\
  \n```\nhelp(portfolio.drop)\n```\n\n你可能已经注意到，Pandas 开发人员很好地提供了关于函数和方法的信息，并附有相关示例。`Drop()`方法接受以下关键字参数：\n\
  \n```\ndrop(labels=None, axis=0, index=None, columns=None, level=None, inplace=False,\
  \ errors='raise')\n```\n\n方法的参数各不相同。然而，有几个参数是所有 Pandas 方法通用的。我指的是`axis`和`inplace`。\n\
  \n一个`DataFrame`有两个轴——行和列（图 3-19）。`drop()`命令或任何其他`DataFrame`方法既可以应用于行，也可以应用于列。默认情况下，`axis`设置为`rows`或`0`。如果我们保持默认设置并尝试从`DataFrame`中删除`Symbol`列，将会收到错误——`\"\
  Symbol not found in axis\"`。因为`drop()`方法默认会在索引值中查找`\"Symbol\"`名称。由于我们要删除一个列，需要将`drop()`方法的`axis`关键字切换为`\"\
  columns\"`。Pandas 提供了两个选项，要么将关键字参数设置为`1`，要么直接设置为`\"columns\"`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig19_HTML.jpg](img/506186_1_En_3_Fig19_HTML.jpg)\n\
  \n**图 3-19** 轴 0 或“index”指代行，轴 1 或“columns”指代列\n\n然而，如果我们的意图是删除一行，比如“`IBM`”，那么我们应该保留`axis`不变，或者将`\"\
  index\"`分配给`axis`。在使用`DataFrame`方法时，请牢记`axis`。\n另一个在`DataFrame`方法中常见的参数是`inplace`。当我们应用`drop()`等方法从`DataFrame`中删除一列时，我们正在修改对象。对对象的更改应被保存。设置`inplace\
  \ = True`将保存这些更改。参数`inplace`意味着对象在其内部被就地修改。因此，如果`inplace`设置为`True`，则无需将表达式赋值给变量来保存更改。\n\
  有两个选项：`True`或`False`。在某种程度上，你可以将其视为保存按钮。`drop()`方法会移除一个不需要的列，并通过`inplace = True`保存调整。有时，人们会意外跳过`inplace\
  \ = True`这一步。`drop()`方法仍然会删除一列吗？答案是肯定的，但之后对象可能会出现问题。最佳实践是在应用方法并需要保留更改时，将`inplace`关键字参数设置为`True`。\n\
  \n好了，现在我们已经准备好从`DataFrame`中删除`Symbol`列：\n\n```\nportfolio.drop(labels=\"Symbol\"\
  , axis=1, inplace=True)\n```\n\n确保你在一个单独的单元格中运行`drop()`语句，并且只运行一次（图 3-20）。一个新手错误是重新运行单元格并收到警告消息`\"\
  not found in axis\"`。如果你再次运行`drop()`命令，它将无法找到该列。该列已消失，不再属于该`DataFrame`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig20_HTML.jpg](img/506186_1_En_3_Fig20_HTML.jpg)\n\
  \n**图 3-20** `drop`方法移除了`Symbol`列\n\n到目前为止，我们一直在操作`DataFrame`的列。行和值也可以像列一样进行切片。有两种方法可以检索一行或多行——`loc`和`iloc`。\n\
  `Loc`代表位置。`loc`方法需要标签，而`iloc`接受行的索引。显然，`i`在`iloc`方法名中表示索引。`loc`和`iloc`都会完成相同的工作。\n\
  \n\n\n假设我们需要从 `portfolio` DataFrame 中提取 `MSFT` 行。`MSFT` 是一个索引值的标签，其对应的底层索引值为 `2`。索引计数从\
  \ 0 开始：`IBM` 是 `0`，`ORCL` 是 `1`，`MSFT` 是 `2`。如果我们要使用标签，那么 `loc` 语句应如下所示：\n\n```\n\
  portfolio.loc[\"MSFT\"]\n```\n\n相应地，`iloc` 需要使用整数作为索引，通过以下语句可以得到相同的结果：\n\n```\n\
  portfolio.iloc[2]\n```\n\n与其他 DataFrame 方法相比，`loc` 和 `iloc` 使用的是方括号（图 3-21）。\n\n\
  ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig21_HTML.jpg](img/506186_1_En_3_Fig21_HTML.jpg)\n\
  \n**图 3-21** `loc` 和 `iloc` 方法提取 `MSFT` 行\n\nPython 的切片原则可以应用于带有 `loc` 和 `iloc`\
  \ 方法的 DataFrame。唯一的区别是，使用标签的 `loc` 方法会包含停止位置，而 `iloc` 方法则排除停止索引。这就是为什么在提取 `ORCL`\
  \ 和 `MSFT` 两行时，`loc` 变体需要将 `MSFT` 作为停止标签，而 `iloc` 表达式则需要为数值索引值指定一个上限（图 3-22）：\n\n\
  ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig22_HTML.jpg](img/506186_1_En_3_Fig22_HTML.jpg)\n\
  \n**图 3-22** 使用 `loc` 和 `iloc` 方法对行进行切片\n\n```\nportfolio.loc[\"ORCL\":\"MSFT\"\
  ]\nportfolio.iloc[1:3]\n```\n\n在实际应用中，DataFrame 可能包含数千列，而你只需要获取部分数据。对 DataFrame\
  \ 进行子集选择需要在行和列的索引之间用逗号分隔，并且行索引始终在前。`iloc` 方法类似于 Python 的切片语法：\n\n```\n[start : stop\
  \ : step , start : stop : step]\n```\n\n与 Python 一样，步长是可选的，默认值为 `1`。需要提醒的是，`loc`\
  \ 方法接受的是索引和列的标签。\n\n我们可以按以下方式获取 `ORCL` 和 `MSFT` 在 `Price` 和 `Qty` 列中的值：\n\n```\n\
  portfolio.loc[\"ORCL\":\"MSFT\", \"Price\":\"Qty\"]\nportfolio.iloc[1:3, 0:2]\n\
  ```\n\n在图 3-23 中，你可以看到这两种方法的结果相同。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig23_HTML.jpg](img/506186_1_En_3_Fig23_HTML.jpg)\n\
  \n**图 3-23** 使用 `loc` 和 `iloc` 方法进行子集选择\n\n另一种方案是先对列进行切片，然后再应用 `loc` 或 `iloc`。例如，要从\
  \ `Price` 和 `Profit` 列中获取 `MSFT` 和 `AAPL` 的值，相当于以下语句：\n\n```\nportfolio[[\"Price\"\
  , \"Profit\"]].loc[\"MSFT\":\"AAPL\"]\nportfolio[[\"Price\", \"Profit\"]].iloc[2\
  \ : ]\n```\n\n在 `iloc` 方法中，我们留空停止索引，因为我们需要获取索引 2 之后的所有行（图 3-24）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig24_HTML.jpg](img/506186_1_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24** 使用 `loc` 和 `iloc` 方法对列进行子集选择\n\n### 过滤 DataFrame\n\n在 Pandas 中，过滤过程比我们之前使用\
  \ `for` 循环和 `if` 语句的方法更高效。我们将从一个简单的例子开始。我们的目标是过滤 `portfolio` DataFrame，找出所有价格低于\
  \ 100.00 美元的股票。\n\n第一步是获取 `Price` 列，可以使用字典符号 `portfolio[\"Price\"]` 或 `portfolio.Price`，然后定义一个条件：\n\
  \n```\nportfolio.Price < 100\n```\n\n如果运行此语句，它将返回布尔值（图 3-25）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig25_HTML.jpg](img/506186_1_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** 定义过滤条件\n\n过滤器起作用了，但显然我们需要更多信息以及股票本身。一种方案是将过滤器应用于整个 DataFrame。这样会获取整行数据：\n\
  \n```\nportfolio[portfolio.Price < 100]\n```\n\n另一种方案是将条件应用于特定的一列或多列。具体来说，如果我们想查看持有价格低于\
  \ 100 美元的股票数量，我们需要对 `Qty` 列进行切片并应用过滤器：\n\n```\nportfolio.Qty[portfolio.Price < 100]\n\
  ```\n\n这是一个基于另一列过滤某一列的示例。如图 3-26 所示，第一个语句获取了整行，而第二个过滤器仅获取了一个值。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig26_HTML.jpg](img/506186_1_En_3_Fig26_HTML.jpg)\n\
  \n**图 3-26** 过滤 DataFrame\n\n无需遍历值并使用 `if` 和 `else` 语句。此外，我们还可以像之前一样使用条件运算符组合条件。在\
  \ Pandas 中，`&`（与符号）相当于 Python 中的 `and` 运算符。当使用 `&` 时，两个条件都必须为 `True` 才能返回结果。假设我们需要找出\
  \ `portfolio` DataFrame 中所有价格低于 200 美元且股票数量恰好为 50 的股票。那么我们可以将两个条件组合为：\n\n```\n(portfolio.Price\
  \ < 200) & (portfolio.Qty == 50)\n```\n\n并将过滤器应用于 DataFrame：\n\n```\nportfolio[(portfolio.Price\
  \ < 200) & (portfolio.Qty == 50)]\n```\n\n请注意，每个条件都必须用圆括号括起来。显然，`portfolio` 中只有一个仓位完全满足这两个条件（图\
  \ 3-27）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig27_HTML.jpg](img/506186_1_En_3_Fig27_HTML.jpg)\n\
  \n**图 3-27** 基于两个条件过滤 DataFrame\n\nPandas 中的另一个条件运算符是 `|`，读音类似“管道符”。它相当于 Python\
  \ 中的 `or` 运算符，只要其中一个条件为 `True`，`|` 就会进行过滤。我们可以过滤 DataFrame，找出所有价格大于 200 美元或成本恰好为\
  \ 55 美元的仓位。我们需要先用括号分别标出每个条件，然后使用 `|` 将它们应用于 `portfolio` 对象：\n\n```\nportfolio[(portfolio.Price\
  \ > 200) | (portfolio.Cost == 55)]\n```\n\n如图 3-28 所示，有两个仓位符合我们的过滤器——`ORCL`，因为其\
  \ `\"Cost\"` 值恰好为 55，以及 `MSFT`，其价格大于 200。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig28_HTML.jpg](img/506186_1_En_3_Fig28_HTML.jpg)\n\
  \n**图 3-28** 过滤 DataFrame 中满足任一条件的行\n\n过滤非常有用，但如果你想根据条件对某个值执行操作，又该如何呢？\n\n\n\n#\
  \ Pandas 中的逻辑运算\n\n当你需要根据某个条件采取行动时，就需要用到逻辑运算。如果一个条件为`True`，则对数值进行相应操作。在 Pandas 中，有三种不同的方法可以执行逻辑运算。我最喜欢的是\
  \ `lambda`，我会先解释这个方法。\n\n`lambda` 是 Python 中的匿名函数——换句话说，它是一个没有名称、像表达式一样运行的函数。初学者会觉得\
  \ `lambda` 有点令人困惑，但它其实没那么难，请相信我——前提是你掌握了语法，并练习了 `lambda` 语法几次。\n\n我将从单一表达式的 `lambda`\
  \ 开始。假设我们想将`portfolio` DataFrame 中每只股票的数量加倍。最简单高效的方法是使用 `portfolio.Qty * 2`。但是，为了解释\
  \ `lambda`，我会用不同的方式来实现。向量化运算的替代方案是逐一处理`Qty`列中的每个值，并将每个值自身相加。这听起来像是在遍历一列。我们不想使用 `for`\
  \ 循环来遍历列，因为它会拖慢处理速度。遍历 Series 最有效的方法是使用 `apply()` 方法。官方文档指出，`apply()` 方法接受另一个函数，并将其应用于列中的所有值。为了将股票数量加倍，我们需要编写一个函数并将其传递给\
  \ `apply()` 方法。\n\n让我们定义一个简单的函数，它从`Qty`列的每一行中获取股票数量，并将它们自身相加：\n\n```\ndef double(num_shares):\n\
  \    return num_shares + num_shares\n```\n\n现在我们有了一个函数，我们将把它应用于 Series `portfolio.Qty`\
  \ 中的每个值：\n\n```\nportfolio.Qty.apply(double)\n```\n\n请记住，当你在其他函数（如 `map()`、`filter()`\
  \ 或 `apply()` 方法）中将其用作辅助函数时，不需要在末尾加括号。这就是为什么我们在 `apply()` 方法中将 `double` 函数调用为 `apply(double)`。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig29_HTML.jpg](img/506186_1_En_3_Fig29_HTML.jpg)\n\
  \n**图 3-29** 将 double 函数应用于 Series 中的所有值\n\n通常，我们定义函数是因为我们想反复使用它。我怀疑 `double` 函数以后是否还会被用到。有没有更好的方法？答案是肯定的；我们可以用\
  \ `lambda` 替换函数。\n\n要编写 `lambda` 表达式，你需要记住以下设置。始终以 `lambda` 关键字开头。在 `lambda` 中，有两个部分由冒号字符分隔。在第一部分，你定义一个或多个变量，这些变量会传入\
  \ `lambda`。在第二部分，你编写一个表达式，这是 `lambda` 将作为结果返回的内容。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig30_HTML.jpg](img/506186_1_En_3_Fig30_HTML.jpg)\n\
  \n**图 3-30** Lambda 语法\n\n无需使用 return 操作符，因为 `lambda` 总是返回结果。请记住，`lambda` 必须在函数内部使用，或者可以作为一个表达式赋值给一个变量名。我们可以将\
  \ `double` 函数重写为 `lambda` 表达式：\n\n```\nlambda num_shares: num_shares + num_shares\n\
  ```\n\n这个表达式可以替换 `apply()` 方法中的 `double` 函数：\n\n```\nportfolio.Qty.apply(lambda\
  \ num_shares: num_shares + num_shares)\n```\n\n如果我们想保存该操作的结果，可以将其分配给一个新的列名。\n\n\
  ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig31_HTML.jpg](img/506186_1_En_3_Fig31_HTML.jpg)\n\
  \n**图 3-31** 将股票数量加倍并将结果保存到新列名下\n\n`lambda` 可以与 `if` 和 `else` 语句一起使用。语法如下所示：\n\n\
  ![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig32_HTML.jpg](img/506186_1_En_3_Fig32_HTML.jpg)\n\
  \n**图 3-32** 带有 `if` 和 `else` 条件的 Lambda 语法\n\n通过 `lambda` 基于 `if` 和 `else` 语句返回结果，我们可以在一个\
  \ Series 或整个 DataFrame 上执行逻辑运算。举例来说，我们可以根据价格提供买入或卖出股票的建议。假设股票价格低于 118 美元，我们就在新列\
  \ `Rating` 中记录 `Buy`。否则，在 `Rating` 列中记录 `Sell`。`apply()` 方法中的 `lambda` 表达式如下所示：\n\
  \n```\nlambda stock_price: \"Buy\" if stock_price < 118 else \"Sell\"\n```\n\n同样，`stock_price`\
  \ 是一个准确描述该值的变量。我们所要做的就是将 `lambda` 表达式传递给 `apply()` 方法，并将结果保存在名为 `Rating` 的列下：\n\n\
  ```\nportfolio[\"Rating\"] = portfolio.Price.apply(lambda stock_price: \"Buy\" if\
  \ stock_price < 118 else \"Sell\")\n```\n\n`Rating` 列保存了基于我们应用于 `Price` 列所有值的 `if`\
  \ 和 `else` 语句的结果。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig33_HTML.jpg](img/506186_1_En_3_Fig33_HTML.jpg)\n\
  \n**图 3-33** 将带有 `if` 和 `else` 语句的 lambda 应用于列\n\n我知道掌握 `lambda` 需要一些练习，在本章后面，我还会提供更多\
  \ `lambda` 实际应用的例子。\n\n在 DataFrame 上进行逻辑运算的另一种方法是使用 `loc` 方法。语法如下所示：\n\n```\nDataFrame.loc[if\
  \ condition, new column to save result] = result\n```\n\n一个实际的例子是计算每股盈亏。如果 `Price`\
  \ 列中的值大于 `Cost` 列中的值，那么我们想从当前价格中减去支付的成本。结果将存储在一个新列中。我们将其命名为 `PL_per_share`。我们可以将此逻辑语句编写为：\n\
  \n```\nportfolio.loc[portfolio.Price > portfolio.Cost, \"PL_per_share\"] = portfolio.Price\
  \ - portfolio.Cost\n```\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig34_HTML.jpg](img/506186_1_En_3_Fig34_HTML.jpg)\n\
  \n**图 3-34** 使用 `loc` 方法执行逻辑运算\n\n还有一种基于 `if` 和 `else` 条件得到结果的方法——NumPy 函数 `where()`。Pandas\
  \ 构建在 NumPy 之上，NumPy 数组数据结构是 Series 和 DataFrame 的核心。这意味着我们可以借用 NumPy 包中的函数并在 Pandas\
  \ 中使用它们。由于我们尚未将 NumPy 库导入到文件中，我们需要向上滚动并将 NumPy 导入到 Pandas 导入语句下方的第一个单元格中。不要忘记重新运行该单元格：\n\
  \n```\nimport numpy as np\n```\n\n`where()` 函数属于 NumPy，我们需要这样使用它：\n\n```\nnp.where()\n\
  ```\n\n最好阅读一下描述并查看它接受的所有参数：\n\n```\nhelp(np.where)\n```\n\n正如文档所说，`where()` 需要一个条件，然后它会提供两个结果。如果条件为\
  \ `True`，则执行第一个结果；如果条件返回 `False`，则执行另一个结果。\n\n为了练习 `where()`，我们可以运行一个场景：如果 `PL_per_share`\
  \ 中的值大于 5 美元，我们需要返回 `True`。否则，`where()` 将返回 `False`。结果将存储在名为 `greater_five` 的新列下。根据\
  \ `where()` 的描述，我们可以将该逻辑表达式编译为：\n\n```\nportfolio[\"greater_five\"] = np.where(portfolio.PL_per_share\
  \ > 5, True, False)\n```\n\n\n\n\n图 3-35 展示了 `where()` 函数完美的表现——新创建的 `greater_five`\
  \ 列在每股利润大于 5 美元时，其值为 `True`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig35_HTML.jpg](img/506186_1_En_3_Fig35_HTML.jpg)\n\
  \n图 3-35：使用 `np.where` 函数执行逻辑运算\n\n借助 `where()` 函数，我们可以执行比仅返回布尔值更复杂的操作。\n\n沿用上一个示例的逻辑，如果\
  \ `PL_per_share` 小于 5 美元，我们可以增加该股票的持仓量。如果条件为 `True`，则将每股价格乘以 `New_Qty` 列的值。此操作的结果将更新\
  \ `Amount` 列中的值。对于 `PL_per_share` 值大于 5 美元的股票，我们将不进行任何操作，保留其原金额：\n\n```\nportfolio[\"\
  Amount\"] = np.where(portfolio.PL_per_share < 5, portfolio.Price * portfolio.New_Qty,\
  \ portfolio.Amount )\n```\n\n`Amount` 列仅对 `IBM` 和 `ORCL` 进行了更新，因为它们对应的 `PL_per_share`\
  \ 列数值分别为 `1.61` 和 `1.91`（见图 3-35）。\n\n在这三种方法中，我比较偏好 `lambda` 和 `where()` 函数。`loc`\
  \ 方法则需要为每个 `if` 条件编写单独的语句。不过，如果你有更多的条件需要测试 `if` 和 `else` 以及更多的 `if` 条件时，使用 `loc`\
  \ 可能会更合适。\n\n我认为理论部分已经讲解得足够多了，现在需要来看一个实际案例。我们将从 [`www.sectorspdr.com/sectorspdr/`](http://www.sectorspdr.com/sectorspdr/)\
  \ 获取数据。\n\n### 从 CSV 文件读取数据\n\n[Sectorspdr.com](http://sectorspdr.com) 提供按行业划分的标普\
  \ 500 公司的实时数据。每个板块代表一只 ETF（交易所交易基金）。如果你不熟悉金融也没关系，我们不会深入探讨技术细节。我们只需要相关的数据来读取为 DataFrame。我们还需要清洗数据并进行数据分析。我选择\
  \ [Sectorspdr.com](http://sectorspdr.com) 这个网站是因为它提供 CSV（逗号分隔值）格式的数据，可以直接在线读取，无需事先下载。\n\
  \n我们将获取 XLF 的 CSV 文件——XLF 是一只追踪标普金融板块指数的 ETF。你可以在此处获取数据：[`www.sectorspdr.com/sectorspdr/sector/xlf/index`](http://www.sectorspdr.com/sectorspdr/sector/xlf/index)。\n\
  \n如果 [Sectorspdr.com](http://sectorspdr.com) 网站有所变动，或者你想严格按照我的示例操作，我已经将我将在本文中使用的数据上传到了我的服务器。我已从\
  \ [Sectorspdr.com](http://sectorspdr.com) 下载了 CSV 文件，你可以在此处找到它：[`https://bit.ly/bookcsvxlf`](https://bit.ly/bookcsvxlf)。\n\
  \n在图 3-36 中，你可以看到两个绿色按钮，分别用于下载 CSV 或 Excel 格式的数据。页面上列出了 XLF 基金中包含的所有金融公司及其在指数中的权重。我们将从网站读取这些信息并进行分析。一种方法是点击绿色按钮将数据下载到你的电脑，然后使用\
  \ Pandas 的 `read_csv()` 函数将其打开为 DataFrame。Pandas 可以读取不同格式的数据。我们将在下一章更详细地讨论数据收集。最流行的格式是\
  \ CSV 和 xlsx。`read_csv()` 和 `read_excel()` 函数的主要优点是它们会返回一个 DataFrame。如果你使用 `help(pd.read_csv)`\
  \ 查看 `read_csv()` 函数的描述，你会发现你可以直接从云端打开 CSV 文件，而无需事先下载。要直接从服务器打开它，我们可以复制 URL（统一资源定位符）并将其直接传递给\
  \ `pd.read_csv()`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig36_HTML.jpg](img/506186_1_En_3_Fig36_HTML.jpg)\n\
  \n图 3-36：提供数据下载选项的 Sectorspdr 网站\n\n对于本练习，我们需要启动一个新的 **Jupyter** 文件，并在第一个单元格中导入\
  \ pandas：\n\n```\nimport pandas as pd\n```\n\n有两种方法可以从网站获取信息：第一种是通过鼠标右键单击网站并选择“复制链接地址”来复制\
  \ URL。使用第一种方法，你将获得来自 [Sectorspdr.com](http://sectorspdr.com) 的最新数据。第二种方法是使用我提供的、指向之前下载到服务器上的文件的链接。以下是两种方式的示例：\n\
  \n```\nurl = \"https://www.sectorspdr.com/sectorspdr/IDCO.Client.Spdrs.Index/Export/ExportCsv?symbol=xlf\"\
  \nfile = pd.read_csv(url, skiprows=1)\n或\nurl = \"https://bit.ly/bookcsvxlf\"\n\
  file = pd.read_csv(url, skiprows=1)\n```\n\n在这两种情况下，你都应该会看到如图 3-37 所示的 DataFrame。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig37_HTML.jpg](img/506186_1_En_3_Fig37_HTML.jpg)\n\
  \n图 3-37：从在线位置读取 CSV 文件\n\n`skiprows` 关键字参数会跳过原始文件中的第一行。有时，文件中会包含我们分析时不需要的时间戳或标题。在\
  \ `xlf.csv` 文件中，第一行是一个时间戳，它会干扰 DataFrame 的格式。你可以移除 `skiprows=1` 并重新运行该单元格，以查看不使用\
  \ `skiprows` 时 DataFrame 的样子。\n\n在图 3-37 的第 3 行，我使用了 `head()` 方法。大多数情况下，数据量太大无法在屏幕上完整显示，Pandas\
  \ 无法渲染整个数据集。`head()` 和 `tail()` 方法会分别显示前五行或后五行。如果你想查看更多行，可以将行数作为参数传递给 `head()` 或\
  \ `tail()`。要查看前 20 行，我们可以使用：\n\n```\nfile.head(20)\n```\n\n每次处理新的数据集时，我都会从 DataFrame\
  \ 的 `info()` 方法开始：\n\n```\nfile.info()\n```\n\n`info()` 方法返回关于 `file` 对象的所有信息（图\
  \ 3-38）。首先，我们看到该 DataFrame 有 65 行，占用 4.7 KB 内存。但更重要的是，`info()` 方法提供了每列值的数据类型。只有三列——`Last`、`Change`\
  \ 和 `Unnamed: 8`——包含数值。所有其他列的数据类型都是 `object`。`object` 数据类型意味着非数值数据类型，通常是字符串。因此，对\
  \ `\"Index Weight\"` 列或 `\"Volume\"` 列进行数学运算是不可能的，因为它们包含字符串。如果我们计划对这些列进行任何计算，就需要将值转换为浮点数。\n\
  \n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig38_HTML.jpg](img/506186_1_En_3_Fig38_HTML.jpg)\n\
  \n图 3-38：`info()` 方法提供 DataFrame 的信息\n\n在进行数据分析之前，我们需要对数据集进行一些清洗。有一个名为 `\"Unnamed:\
  \ 8\"` 的列包含 `NaN`。`NaN` 代表非数字，表示没有值。没有值的列对我们来说完全没用。我们将使用 `drop()` 方法将其删除：\n\n```\n\
  file.drop( \"Unnamed: 8\", axis=1, inplace=True)\n```\n\n正如我之前警告过的，请将 `drop()` 语句放在一个单独的单元格中，并仅运行一次。`\"\
  Unnamed: 8\"` 列在我们删除后就不见了（图 3-39）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig39_HTML.jpg](img/506186_1_En_3_Fig39_HTML.jpg)\n\
  \n图 3-39：从 DataFrame 中删除 `Unnamed: 8` 列\n\n\n\n我将向您展示如何将某一列的数据类型转换为数值。假设我们想对 `\"\
  Index Weight\"` 列中所有值进行求和，并检查结果是否为 100%。方法 `info()` 显示这些值是字符串类型。您可能一时觉得这能有多难？然而，在此之前，我们需要先去掉\
  \ `%` 符号。否则，我们将会收到错误信息，因为特殊字符无法转换为数值。让我们先切分该列，并对其运行 `dir` 函数，看看该序列内置了哪些内容。由于列名中包含空格，我们将不得不使用字典标记法：\n\
  \n```\ndir(file[\"Index Weight\"])\n```\n\n如果您浏览所有属性，会发现 `str` 这个模块，它包含字符串方法。如果在\
  \ `dir()` 函数中加入 `str`，我们就能看到所有方法：\n\n```\ndir(file[\"Index Weight\"].str)\n```\n\
  \n您应该能看到在 Python 字符串对象中见过的熟悉的方法名。尽管这些方法的名称与 Python 字符串方法一致，但它们都是为一维序列设计的。这些方法的实现方式与常规的\
  \ Python 字符串方法不同。它们被设计为应用于整个序列，而不是逐个处理字符串值。\n\n`\"Index Weight\"` 列包含带有 `%` 符号的数字。我们需要移除所有\
  \ `%` 符号。这听起来需要对列进行遍历。如果处理的是列表，我们会使用 `for` 循环，并逐个用字符串方法 `strip()` 移除 `%`。但有了 `str.strip()`\
  \ 方法，就无需遍历了，因为它源自序列对象本身。我想澄清一点：`strip()` 和 `str.strip()` 执行相同的任务，但前者一次只处理一个值，而后者则作用于整个序列。要在将值转换为数值数据类型之前移除所有\
  \ `%` 符号，我们将执行：\n\n```\nfile[\"Index Weight\"].str.strip(\"%\")\n```\n\n`str.strip()`\
  \ 会清除所有值上的 `%`（图 3-40）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig40_HTML.jpg](img/506186_1_En_3_Fig40_HTML.jpg)\n\
  \n图 3-40\n序列方法 `str.strip()` 会移除所有值中的 `%` 符号\n\n我们已经完成了一半；现在需要将字符串值转换为数值数据类型。有几种方法可以将一种数据类型转换为另一种。在这里，我们可以像这样将\
  \ Pandas 函数 `pd.to_numeric()` 应用于序列中的所有值：\n\n```\nfile[\"Index Weight\"].str.strip(\"\
  %\").apply(pd.to_numeric)\n```\n\n或者，我们可以使用序列方法 `astype()` 并传入 `float` 数据类型作为参数：\n\
  \n```\nfile[\"Index Weight\"].str.strip(\"%\").astype(float)\n```\n\n在 Pandas 中如何将字符串转换为浮点数属于个人偏好；结果是一样的。我们需要存储结果，我会将该语句赋值给一个新列名\
  \ `\"IW\"`：\n\n```\nfile[\"IW\"] = file[\"Index Weight\"].str.strip(\"%\").astype(float)\n\
  ```\n\n尽管在 `Index Weight` 和 `IW` 两列中数值视觉上相同，但在后者上，我们可以执行数学计算和筛选（图 3-41）。\n\n**表\
  \ 3-1** Pandas 中的聚合方法\n\n| 方法 | 定义 |\n| --- | --- |\n| `sum()` | 计算值的总和 |\n| `mean()`\
  \ | 计算值的平均值 |\n| `count()` | 计算行数 |\n| `std()` | 计算标准差 |\n| `var()` | 计算值的方差 |\n\
  | `min()` | 计算组内最小值 |\n| `max()` | 计算组内最大值 |\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig41_HTML.jpg](img/506186_1_En_3_Fig41_HTML.jpg)\n\
  \n图 3-41\n将 `Index Weight` 列中的字符串转换为数值，并将结果保存在 `IW` 列中\n\n聚合方法 `max()` 会计算列中所有值的总和：\n\
  \n```\nfile.IW.sum()\n```\n\n方法 `min()` 和 `max()` 会分别获取序列中的最小值和最大值：\n\n```\nfile.IW.min()\n\
  file.IW.max()\n```\n\n我们可以通过筛选从 DataFrame 中获取 S&P 500 金融指数 XLF 中权重最小和最大的公司：\n\n\
  ```\nfile[file.IW == file.IW.min()]\nfile[file.IW == file.IW.max()]\n```\n\n显然，`Unum\
  \ Group` 的权重最小，而 `Berkshire Hathaway` 是 XLF 指数中权重最大的持仓（图 3-42）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig42_HTML.jpg](img/506186_1_En_3_Fig42_HTML.jpg)\n\
  \n图 3-42\n筛选出指数中权重最小和最大的公司\n\n`str` 模块中另一个值得一提的方法是 `contains()`。`contains()` 方法有助于在文本中搜索子字符串。为说明这一点，我们将做一个简单的任务。DataFrame\
  \ 中的大多数公司名称都包含 `Group` 或 `Corp` 字样。假设我们的目标是比较在 XLF 指数中，`Group` 和 `Corp` 哪个更普遍。要解决这个任务，我们需要先筛选\
  \ `\"Company Name\"` 列：\n\n```\nfile[\"Company Name\"].str.contains(\"Group\")\n\
  ```\n\n以及\n\n```\nfile[\"Company Name\"].str.contains(\"Corp\")\n```\n\n这些语句会返回\
  \ `True` 或 `False`。像之前所做的那样，我们可以将它们应用于整个 `file` 对象，然后使用 `count()` 方法：\n\n```\nfile[file[\"\
  Company Name\"].str.contains(\"Group\")].count()\nfile[file[\"Company Name\"].str.contains(\"\
  Corp\")].count()\n```\n\n方法 `count()` 会累加满足筛选条件的每一列的行数。我们可以不将筛选器应用于整个 DataFrame，而是应用于一列\
  \ `Symbol`：\n\n```\nfile[\"Symbol\"][file[\"Company Name\"].str.contains(\"Group\"\
  )].count()\nfile[\"Symbol\"][file[\"Company Name\"].str.contains(\"Corp\")].count()\n\
  ```\n\n正如我们在图 3-43 中的分析所示，金融公司似乎更倾向于在公司名称中使用 `Corp` 缩写而非 `Group`。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig43_HTML.jpg](img/506186_1_En_3_Fig43_HTML.jpg)\n\
  \n图 3-43\n按 `\"Group\"` 和 `\"Corp\"` 字样筛选 `\"Company Name\"` 列\n\n方法 `contains()`\
  \ 节省了大量时间和遍历工作。使用管道符 `|`，我们可以替代逻辑或运算符，同时搜索 `Corp` 和 `Group` 实例：\n\n```\nfile[\"\
  Symbol\"][file[\"Company Name\"].str.contains(\"Group|Corp\")].count()\n```\n\n\
  此语句将得到 27，即 `Company Name` 列中包含 `Corp` 和 `Group` 字样的公司数量。\n\n所有数据集都需要进行某种清洗。将值转换为数值数据类型相对容易。尽管如此，在某些情况下，您需要编写一个函数来获得所需的数据格式。\n\
  \n`\"Value\"` 列包含指数中每只股票的换手股数。如果我们的目标是了解指数中所有股票的总成交额，就需要将该列中的值转换为数值类型，最后使用 `sum`\
  \ 方法。一个阻碍是，我们不能使用之前在 `\"Index Weight\"` 列上采用的方法。有些值以千计，末尾带有 `K`；另一些则以百万计，包含 `M`。仅仅去除这些字母并累加数字是不可行的。这是一个非常适合使用\
  \ `lambda` 的场景。在给出 `lambda` 解决方案之前，我想先用一个函数来解决这个问题。\n\n我们将定义一个名称自明的函数 `str_to_num`，它接受一个字符串作为参数并返回一个数字。在函数内部，我们将设置\
  \ `if` 和 `else` 条件。如果传入的字符串包含 `K`，我们就去掉该字母，将其转换为数值，然后乘以一千。否则，我们将移除 `M` 并乘以一百万。\n\
  \n```\ndef str_to_num(value):\n    if \"K\" in value:\n        value = value.strip(\"\
  K\")\n        number = float(value)\n        number = number * 1000\n    else:\n\
  \        value = value.strip(\"M\")\n        number = float(value)\n        number\
  \ = number * 1000000\n    return number\n```\n\n\n\n在编写代码时，我总是一步一步地测试每个环节。为了确保函数正常工作，我用`Volume`列的第一个值来调用它：\n\
  \n```\nstr_to_num(\"5.55 M\")\n```\n\n函数返回`5550000.0`（图 3-44）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig44_HTML.jpg](img/506186_1_En_3_Fig44_HTML.jpg)\n\
  \n图 3-44\n测试函数 `str_to_num()`\n\n要转换`\"Volume\"`列中的所有值，需要使用`apply`方法遍历所有行，并应用`str_to_num`函数。结果将保存在名为`\"\
  Vol_function\"`的新列中：\n\n```\nfile[\"Vol_function\"] = file[\"Volume\"].apply(str_to_num)\n\
  ```\n\n同样的转换操作也可以借助`lambda`实现。为了比较转换结果，我会将`lambda`得到的结果保存在`\"Vol_lambda\"`名下。`lambda`表达式将包含\
  \ if 和 else 条件，并遵循我们在`str_to_num`函数中执行的所有步骤。\n\n我在图 3-44 中特意分解了`str_to_num`函数中的所有步骤，以便我们可以一步步在`lambda`中实现它们。首先，我们在\
  \ lambda 中定义`value`作为参数，然后编写表达式的第一部分：\n\n```\nlambda value : float(value.strip(\"\
  K\"))*1000 if \"K\" in value\n```\n\n`lambda`表达式模仿了该函数。操作的顺序略有不同，因为我们需要嵌套函数。在将数字乘以\
  \ 1000 之前，我们需要去掉`K`。当然，前提是传入的字符串包含`K`。\n\n`lambda`表达式的第二部分在概念上是相同的。我们不需要检查`M`，因为`else`条件意味着除了`K`以外的任何情况。去掉`M`后剩下的内容会被转换为浮点类型，并乘以\
  \ 1,000,000：\n\n```\nelse float(value.strip(\"M\"))*1000000\n```\n\n最终的`lambda`表达式将像这样传入`apply()`方法，以替代`str_to_num`函数：\n\
  \n```\nfile[\"Vol_lambda\"] = file[\"Volume\"].apply(lambda value : float(value.strip(\"\
  K\"))*1000 if \"K\" in value else float(value.strip(\"M\"))*1000000)\n```\n\n这两种清理数据并将值转换为数值类型的方法产生了相同的结果。为了证明这一点，我将比较`Vol_function`和`Vol_lambda`列中所有值的总和（图\
  \ 3-45）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig45_HTML.jpg](img/506186_1_En_3_Fig45_HTML.jpg)\n\
  \n图 3-45\n将 Volume 列的值转换为数值类型的两种方法\n\n使用哪种方法由你决定。如果我要处理的事情比 if 和 else 条件更复杂，我会选择函数。`Lambda`则是快速解决某些问题的绝佳选择。另一个例子可以说明这一点。`\"\
  52 Week Range\"`列提供了年内最高价和最低价。假设我们需要计算这些数字之间的差值。该列中的每个值都以字符串形式出现。我会将字符串拆分成两个值，并将它们转换为数值类型。结果将保存在两个新列`\"\
  High\"`和`\"Low\"`中。最后，通过从`\"High\"`值中减去`\"Low\"`值来获得差值。\n\n在此之前，我们需要对列进行切片：\n\n\
  ```\nfile[\"52 Week Range\"]\n```\n\n切片操作得到的 Series 包含字符串，我们可以对其使用`str`方法之一。每个值的最高价和最低价之间有一个连字符。在上一章中，我们使用`split()`方法按空格分隔字符串；现在我们将使用`\"\
  -\"`作为分隔符：\n\n```\nfile[\"52 Week Range\"].str.split(\"-\")\n```\n\n操作的结果是，Series\
  \ 中的所有值都表示一个包含两个字符串的 Python 列表。我们需要获取第一个和第二个字符串，并将它们转换为浮点数。这让我想到了索引。第一个值的索引位置是`0`，第二个值的索引位置是`1`。然而，索引操作必须在\
  \ Series 中的每个列表上执行。这可以通过`apply()`方法和`lambda()`来实现：\n\n```\nfile[\"Low\"] = file[\"\
  52 Week Range\"].str.split(\"-\").apply( lambda value : float(value[0]))\nfile[\"\
  High\"] = file[\"52 Week Range\"].str.split(\"-\").apply( lambda value : float(value[1]))\n\
  ```\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig46_HTML.jpg](img/506186_1_En_3_Fig46_HTML.jpg)\n\
  \n图 3-46\n将`52 Week Range`列的值拆分为`Low`和`High`列\n\n名为`\"Low\"`和`\"High\"`的两列被添加到 DataFrame\
  \ 中，并包含数值（图 3-46）。最后，我们可以计算差值，从`\"High\"`列的值中减去`\"Low\"`列的值。结果将保存在名为`\"Diff\"`的新列下：\n\
  \n```\nfile[\"Diff\"] = file[\"High\"] – file[\"Low\"]\n```\n\n前面的例子证明了`lambda()`是处理数据时不可或缺的工具。我的建议是重复练习，以完全理解和掌握语法。此外，找另一个数据集，在新的数据上使用`apply()`方法和`lambda`也是一个好主意。\n\
  \n## 合并数据集\n\n合并数据集有两种选择。第一种是将两个或多个 DataFrame 简单拼接在一起。第二种是基于共同值合并数据集。\n\n### 拼接数据集\n\
  \n我们从拼接开始。一如既往，我们将在新文件中开始新的练习。别忘了在文件顶部导入 Pandas：\n\n```\nimport pandas as pd\n```\n\
  \n我们将创建两个数据集来进行合并。每个数据集将包含葡萄酒的信息。数据集一将包含`\"Country\"`和`\"Price\"`列。这次，我们将从两个列表创建一个\
  \ DataFrame：\n\n```\ncountry_list = [ \"US\", \"Italy\", \"France\", \"Spain\"]\n\
  price_list = [13.99, 9.99, 12.99, 11.99]\n```\n\n这些 Python 列表需要使用内置函数`zip()`将它们组合在一起：\n\
  \n```\ndata_one = zip(country_list, price_list)\n```\n\n函数`zip()`返回一个对象，我们可以将其传入`pd.DataFrame()`函数。此外，我们需要为\
  \ DataFrame 提供列名：\n\n```\nds_one = pd.DataFrame(data=data_one, columns=[\"Country\"\
  ,\"Price\"])\n```\n\n数据集二将有不同的列——`\"Region\"`和`\"Variety\"`：\n\n```\nregion_list\
  \ = [\"Rioja\", \"Bordeaux\", \"Sicilia\", \"Napa\"]\nvariety_list = [\"Red Blend\"\
  , \"Merlot\", \"Primitivo\", \"Chardonnay\"]\n```\n\n函数`zip()`总是返回一个对象，我们将两个 Python\
  \ 列表压缩后返回的对象传入`pd.DataFrame()`函数：\n\n```\ndata_two = zip(region_list, variety_list)\n\
  ds_two = pd.DataFrame(data=data_two, columns=[\"Region\", \"Variety\"])\n```\n\n\
  现在我们有了两个要拼接的 DataFrame（图 3-47）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig47_HTML.jpg](img/506186_1_En_3_Fig47_HTML.jpg)\n\
  \n图 3-47\n从列表创建两个 DataFrame\n\nPandas 的`concat()`函数用于连接 DataFrame。`concat()`函数可以拼接两个以上的对象。如果你想拼接三个或更多对象，你需要以\
  \ Python 列表的形式传递 DataFrame。在进行拼接之前，我们需要决定如何将两者连接在一起——垂直还是水平。默认情况下，`concat()`函数中的关键字参数`axis`设置为`0`或`index`。这意味着如果我们把数据集传入`concat()`，它会将一个放在另一个的上面（图\
  \ 3-48）：\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig48_HTML.jpg](img/506186_1_En_3_Fig48_HTML.jpg)\n\
  \n\n\n### 图 3-48\n\n`concat()` 函数默认会垂直拼接 DataFrame。\n\n```\nnew_ds = pd.concat([ds_one,\
  \ ds_two])\n```\n\n拼接后产生的新 DataFrame 对象 `new_ds` 中出现了 `NaN`（表示不是数字），并且索引中存在重叠值。我们没有对应的值，行中的\
  \ `NaN` 反映了这一点。稍后我将解释如何处理缺失值。\n\n索引中的重复项对新数据集来说将是一个问题。`concat()` 函数带有关键字 `ignore_index`，其默认设置为\
  \ `False`。如果你确定新数据集会有重叠值，你可以设置 `ignore_index=True`。此选项会将旧索引替换为全新的索引：\n\n```\npd.concat([ds_one,\
  \ ds_two],ignore_index=True)\n```\n\n我个人更偏爱另一种 DataFrame 方法 `reset_index()`。在前面的例子中，你会永久丢失旧索引。使用\
  \ `reset_index()`，你拥有更大的灵活性，并且可以将带有重复项的原始索引保存为一列。对 `new_ds` 对象运行 `help()` 函数，你会看到关键字参数\
  \ `drop`：\n\n```\nhelp(new_ds.reset_index)\n```\n\n你可能已经注意到，我每次对每个方法或函数都使用 `help()`\
  \ 函数。Pandas 库会定期更新。即使你知道如何使用某个方法或函数，检查一下与之前版本相比是否有任何变化也是明智之举。此外，有些方法参数非常多，不可能记住所有选项。`help()`\
  \ 函数能为你节省大量搜索的时间。\n\n`reset_index()` 方法中的参数 `drop` 默认设置为 `False`。如果我们将 `reset_index()`\
  \ 直接应用于 `new_ds` 对象，我们将获得一个全新的索引，而原始索引会成为一列：\n\n```\nnew_ds.reset_index(inplace=True)\n\
  ```\n\nDataFrame `new_ds` 被追加了一个名为 `index` 的列，新的索引仅包含唯一值（图 3-49）。在我看来，`reset_index()`\
  \ 功能中的 `drop` 关键字参数提供了更大的灵活性，尤其是当你处理无法再次获取的敏感数据时。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig49_HTML.jpg](img/506186_1_En_3_Fig49_HTML.jpg)\n\
  \n### 图 3-49\n在 DataFrame 上重置索引，`drop` 参数设置为 `False`\n\n如果我们将 `reset_index()` 方法中的\
  \ `drop` 参数改为 `True`（就像 `ignore_index` 那样），我们就会永久丢失原始索引。现在，旧索引值被保存在列中，我们总能在需要时通过重置索引回到这些旧值：\n\
  \n```\nnew_ds.index = new_ds[\"index\"]\n```\n\n不要将 DataFrame 的属性 index 与列名 `\"\
  index\"` 混淆。\n\n拼接 `ds_one` 和 `ds_two` 这两个 DataFrame 的另一种方式是沿着列方向进行。我们需要将 `axis`\
  \ 参数切换为 `1` 或 `\"columns\"`：\n\n```\nnew_ds = pd.concat([ds_one, ds_two],axis=1)\n\
  ```\n\n这一次，`new_ds` DataFrame 有四列四行（图 3-50）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig50_HTML.jpg](img/506186_1_En_3_Fig50_HTML.jpg)\n\
  \n### 图 3-50\n使用 `axis` 参数设置为列方向拼接两个 DataFrame\n\n正在阅读本书的葡萄酒爱好者可能注意到了国家与葡萄酒产地区域之间的不匹配。请记住，`concat()`\
  \ 函数只是单纯地连接数据集。如果我们需要匹配数据，最佳选择是使用 `merge()` 函数。\n\n### 合并 DataFrame\n\nPandas 的\
  \ `merge()` 函数基于列中的公共值来合并 DataFrame。首先，我们需要拥有包含相同值的列。让我们为 `ds_two` 添加一个新的 `\"Origin\"\
  ` 列，包含以下国家：\n\n```\nds_two[\"Origin\"] = [\"Spain\", \"France\", \"Italy\", \"US\"\
  ]\n```\n\n现在，两个 DataFrame `ds_one` 和 `ds_two` 都有了包含相同值的列。尽管在 `ds_one` DataFrame\
  \ 中该列名为 `\"Country\"`，而在 `ds_two` 中名为 `\"Origin\"`，我们仍然可以合并它们：\n\n```\nmerged_ds\
  \ = pd.merge(ds_one, ds_two,left_on=\"Country\", right_on=\"Origin\")\n```\n\n我们通过匹配\
  \ `\"Country\"` 和 `\"Origin\"` 列中的值来合并了两个 DataFrame（图 3-51）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig51_HTML.jpg](img/506186_1_En_3_Fig51_HTML.jpg)\n\
  \n### 图 3-51\n`merge()` 函数匹配 `\"Country\"` 和 `\"Origin\"` 列中的值\n\n默认情况下，`merge()`\
  \ 函数会寻找同名的列。如果两个数据集中都有 `\"Country\"` 列，那么它会根据这些列的值进行合并。在这种情况下，我们使用 `merge()` 函数时就不需要提供\
  \ `left_on` 和 `right_on` 参数。我更倾向于在 `merge()` 函数中使用 `left_on` 和 `right_on` 关键字参数，因为这样更具体。我们明确地指出，在\
  \ `ds_one` 中，我们想使用 `\"Country\"` 列来匹配值。`left_on` 参数指的是 `ds_one` 数据集，因为在 `merge()`\
  \ 函数的位置上它位于左侧。逻辑上，`right_on` 指的是 `ds_two` 中的一列，因为它位于数据集参数的右侧。此外，如果数据集中有几个同名的列，`merge()`\
  \ 会选择第一个常见的列名来匹配值。这可能不是我们的意图，所以我选择指定具体的列。\n\n数据集可以通过索引进行合并。Pandas 提供了多种选项，通过不同的函数和方法来解决同一个问题。我们仍然可以使用带有关键字参数\
  \ `left_index` 和 `right_index` 的 `merge()` 函数按索引合并。但有一个 `join()` 方法，它最初就是通过匹配索引中的值来合并数据集的。为了演示\
  \ `join()` 方法的使用，我们将重置 `ds_one` 的索引为 `\"Country\"` 列，`ds_two` 的索引为 `\"Origin\"`\
  \ 列：\n\n```\nds_one.index = ds_one[\"Country\"]\nds_two.index = ds_two[\"Origin\"\
  ]\n```\n\n此时，两个 DataFrame 拥有包含相同值的索引，我们可以借助默认匹配索引值的 `join()` 方法来合并它们：\n\n```\njoined_ds\
  \ = ds_one.join(ds_two)\n```\n\n`joined_ds` DataFrame 继承了 `ds_one` 的索引，并将其与 `ds_two`\
  \ 的索引进行了匹配（图 3-52）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig52_HTML.jpg](img/506186_1_En_3_Fig52_HTML.jpg)\n\
  \n### 图 3-52\n使用 `join()` 方法通过匹配索引中的值来合并两个 DataFrame\n\n# Groupby\n\n`groupby` 是\
  \ Pandas 中另一个我打算在深入实践问题之海前讨论的基本工具。`groupby()` 方法在功能上与排序类似。如果你用过关系型数据库，应该对 `groupby`\
  \ 功能很熟悉。`groupby()` 方法提供了一种基于一个或多个列中的公共值来对 DataFrame 进行重新分组的选项。它对值进行排序，并将其用作新的键。`groupby()`\
  \ 方法总是返回一个对象。大多数情况下，它与聚合方法（如 `count`、`sum` 和 `mean`）一起使用。如果我们实际使用一下 `groupby`，会更容易理解。我们将获取一个包含标普\
  \ 500 公司的数据集。我会从一个在线地址 [`https://bit.ly/booksp500`](https://bit.ly/booksp500) 打开\
  \ CSV 文件到一个新的 DataFrame 中。\n\n标普 500 指数包含来自 11 个行业的美国最大的 500 家公司。从在线位置的 CSV 文件中读取数据后，得到的\
  \ DataFrame 应该类似于图 3-53。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig53_HTML.jpg](img/506186_1_En_3_Fig53_HTML.jpg)\n\
  \n### 图 3-53\n来自 CSV 文件的包含标普 500 公司的 DataFrame\n\n`file` DataFrame 有三列。`\"Sector\"\
  ` 列保存了公司的行业名称。\n\n\n\n我们的目标是根据行业对指数中的所有公司进行排序。一种方法是按行业板块筛选，然后统计行数。例如，如果我们想知道标普 500\
  \ 指数中包含多少家医疗保健行业的公司，可以这样做：\n\n```\nfile[file.Sector.str.contains(\"Health Care\"\
  )].count()\n```\n\n`groupby()` 方法让我们能实现同样的操作，但可以同时处理 `\"Sector\"` 列中的所有行业板块。列名作为参数传入方括号内的\
  \ `groupby()` 方法。方括号允许我们向该方法传入多个列。`groupby()` 会将 DataFrame 拆分，并使用 `\"Sector\"` 列中的值作为键或索引重新组装：\n\
  \n```\nsector_data = file.groupby([\"Sector\"]).count()\n```\n\n随后，`sector_data`\
  \ 对象将行业作为索引。`count()` 方法返回了每个索引值对应的所有公司数量（图 3-54）。\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig54_HTML.jpg](img/506186_1_En_3_Fig54_HTML.jpg)\n\
  \n图 3-54\n按 Sector 列的值进行分组\n\n如您所见，`sector_data` 被存储为一个新的 DataFrame。这给了我们灵活性。我们可以重置索引，此时\
  \ `Sector` 将成为一个列。另一方面，我们也可以绘制这些数据。\n\n可视化是数据分析的重要组成部分。Python 中一个著名的可视化库是 Matplotlib。Matplotlib\
  \ 的某些功能已经内建在 DataFrame 中。内建的 Matplotlib 方法存储在 `plot` 模块中。您可以通过对 DataFrame 运行 `dir()`\
  \ 函数来查看所有可用的选项：\n\n```\ndir(sector_data.plot)\n```\n\n`pie()` 方法将帮助我们绘制标普 500 各行业板块的公司数量饼图（图\
  \ 3-55）。`\"Name\"` 列将用作饼图的值：\n\n```\nsector_data.plot.pie(y=\"Name\", figsize(10,10))\n\
  ```\n\n![../images/506186_1_En_3_Chapter/506186_1_En_3_Fig55_HTML.jpg](img/506186_1_En_3_Fig55_HTML.jpg)\n\
  \n图 3-55\nsector_data 的绘图\n\n## 总结\n\n我认为我们已经掌握了足够多的 Python 和 Pandas 知识来应对现实中的挑战。我们知道如何初始化一个\
  \ DataFrame 以及如何从 CSV 文件读取数据。筛选和 `lambda` 逻辑语句将帮助我们在 `if` 和 `else` 条件下执行某些操作。在下一章中，我们将使用已学的方法来收集和操作数据。除了\
  \ Pandas，我们还将探索更多专门用于处理不同数据源的库。我们的目标是收集信息并进行分析。\n\n## 脚注\n\n### 4. 使用 Python 收集数据\n\
  \n信息是数据分析的关键要素。它以不同的格式来自各种来源。有些信息需要付出很大努力才能获取；而其他数据则已经是干净且结构化的。Python 是一款非常优秀的工具，可以收集和处理任何格式的任何数据。编程已经将手动从在线来源复制粘贴信息到电子表格的繁琐过程自动化。在本章中，我们将讨论收集数据的多种方法。我们将从网络爬虫开始，即爬取网站并抓取信息的过程。如果信息存在于网络上且旨在供公众使用，为什么不加以利用呢？当然，所有收集到的数据都应仅用于合法目的。此外，我们还将使用\
  \ API。所有大型知名公司都为其服务提供了 API。谷歌和推特等科技巨头甚至提供了 Python 库来简化开发人员的工作。有些公司会对信息收费；而另一些公司则免费提供，除非您想将其用于商业用途。从在线来源获取数据的众多库是\
  \ Python 如此受欢迎的原因之一。\n\n### 网络爬虫\n\n网络爬虫是一种从网站提取数据的方法。该过程始终从第一步开始——向服务器发送请求并接收数据作为响应。通常，我们使用浏览器从网络读取信息。在计算机世界中，浏览器被称为客户端。客户端向服务器发送信息请求。您在浏览器页面顶部输入一个\
  \ URL（统一资源定位符）地址，它就会向服务器发送一条请求信息的消息。基于该请求，服务器会将带有数据的消息发送回来。数据以 HTML（超文本标记语言）的形式到达。网络浏览器会解释这些信息，我们就能看到带有样式和颜色的图像和文本。当我们爬取网站时，Python\
  \ 充当客户端并向服务器发送请求。Python 不理解 HTML，因此接收到的数据必须转换为字符串，这是 Python 可以自然处理的数据类型。\n\n有几个\
  \ Python 包可用于与服务器通信。在本书中，我们将使用一个非常流行的 Requests 库。Requests 方法向服务器发送请求消息并处理响应。无需下载\
  \ Requests 包，因为它已包含在 Anaconda 中。\n\n对于后续的示例，您需要一个 Google Chrome 浏览器。Chrome 自带开发者工具。所有其他浏览器都需要额外下载才能获得开发者工具。如果您尚未安装\
  \ Chrome 浏览器，请从 [`www.google.com/chrome/`](http://www.google.com/chrome/) 下载。假设我们大多数人已经安装了\
  \ Chrome，请确保您使用的是最新版本。\n\n在我们进入爬取部分之前，我想在过时的网站 [`http://shakespeare.mit.edu/romeo_juliet/romeo_juliet.1.0.html`](http://shakespeare.mit.edu/romeo_juliet/romeo_juliet.1.0.html)\
  \ 上解释网络爬虫的基本原理。在 Chrome 浏览器中打开该链接，您会看到这个网页看起来像是来自 1990 年代。网站上没有图像或动画，只有纯文本。这正是我们理解网络爬虫过程主要步骤所需要的东西。\n\
  \n首先，我们需要向服务器发送请求并获取网站。这时 Python 的 Requests 库就派上用场了。Requests 库有 `get()` 方法用于向服务器请求信息。如果请求成功，服务器会发回信息并附带成功代码\
  \ 200。否则，服务器会发送带有不同错误代码（如 403 或 404）的消息。您可能以前见过 404 错误消息，当浏览器返回“页面未找到”时。您不需要了解所有代码就能爬取数据。只需记住代码\
  \ 200 表示一切正常。其他任何代码编号都意味着出了问题。\n\n在 Jupyter 单元格中处理“罗密欧与朱丽叶”页面时，导入 Requests 库：\n\n\
  ```\nimport requests\n```\n\n向服务器发送请求需要使用 `get()` 方法，并附上您试图获取的 URL，如下所示：\n\n```\n\
  page = requests.get(\"http://shakespeare.mit.edu/romeo_juliet/romeo_juliet.1.0.html\"\
  )\n```\n\n`get()` 方法返回了响应 200，意味着数据已接收（图 4-1）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig1_HTML.jpg](img/506186_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n使用 `requests.get()` 方法发送请求并接收响应\n\n变量 `page` 保存了一个 Python 对象。返回的 Python\
  \ 对象可以被解析为字符串，该字符串会形成类似于 HTML 标记的结构。最流行的用于处理 HTML 的 Python 库是 BeautifulSoup。该库的名称灵感来源于《爱丽丝梦游仙境》小说中一首诗的标题。\n\
  \n\n\nBeautifulSoup 会将从服务器接收到的所有数据重新创建为 HTML 标记。请注意，它实际上不会是 HTML，而是一个看起来像 HTML 结构的字符串对象。BeautifulSoup\
  \ 也是 Anaconda 的一部分，我们只需将其与 `Requests` 一起导入即可。回到上一个单元格，在 `Requests` 之后立即导入它。不要忘记重新运行该单元格。\n\
  \n```\nfrom bs4 import BeautifulSoup\n```\n\n`bs4` 是该包的缩写名称，而 `BeautifulSoup` 是我们将用来生成一个看起来像\
  \ HTML 结构的对象的函数。将来自服务器的内容作为 `page.content` 传递给该函数，并将其解析为 HTML：\n\n```\ndata = BeautifulSoup(page.content,\
  \ \"html.parser\")\n```\n\n打印 `data`，你会看到一个看起来像 HTML 代码的对象（图 4-2）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig2_HTML.jpg](img/506186_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** BeautifulSoup 将从服务器获取的数据解析为 HTML 标记\n\n你不需要精通 HTML 就能进行网页抓取。不过，我会给你一个速成课程。网页上渲染的每个元素都必须包裹在\
  \ `<>` 标签中。在图 4-2 靠近底部的位置，你可以找到 `<h3>PROLOGUE</h3>`。`h` 表示标题，而 `3` 是字体大小。切换回网页浏览器，你会看到粗体的\
  \ `PROLOGUE` 标题。用鼠标导航到 `PROLOGUE` 并选中它。然后点击右键。我希望你使用的是我们商定的 Chrome 浏览器。在上下文菜单中，你应该会看到\
  \ `检查` 选项。点击 `检查`，它将揭示网页在底层的样子，即 HTML 标记（图 4-3）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig3_HTML.jpg](img/506186_1_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** 在 Chrome 开发者工具中检查网页的 HTML 代码\n\n你可以在图 4-2 和 4-3 中看到，`<h3>PROLOGUE</h3>`\
  \ 看起来是一样的。这是因为 BeautifulSoup 完全重建了网页的 HTML 标记结构。每个 `<>` 标签都是我们保存在 `data` 变量中的 BeautifulSoup\
  \ 对象的一个属性。这意味着我们可以通过标签从页面对象中抓取元素。尝试在 Jupyter 单元格中运行 `data.h3`，你会看到文本 `PROLOGUE`。\n\
  \nBeautifulSoup 中有两个主要函数用于从 HTML 结构中提取元素：`find()` 和 `find_all()`。区别很简单：`find()`\
  \ 查找一个元素，而 `find_all()` 将获取所有符合标准的元素。对 `find()` 和 `find_all()` 运行 help 命令，查看它们接受的所有可用参数：\n\
  \n```\nhelp(data.find)\nhelp(data.find_all)\n```\n\n方法 `find()` 和 `find_all()` 将\
  \ HTML 标签作为参数来查找页面上的元素。其他元素属性，如 class 或 color，可用于精确定位网页上的项目。例如，运行语句 `data.find(\"\
  h3\")`。方法 `find()` 将查找包裹在 `<h3>` 标签中的元素。结果将是文本 `PROLOGUE`。方法 `find()` 一次处理一个元素；如果存在多个具有相同标签的项目，它将获取第一个。\n\
  \n现在，在浏览器中选中网页上诗歌的所有行，点击右键，然后检查选中的行。你可以看到 Chrome 开发者工具窗口中的所有行都被 `<a>` 标签包围。以 `<a>`\
  \ 标签作为第一个参数的方法 `find_all()` 将获取所有这些行的列表。记住，`find_all()` 总是返回一个列表，即使它没有找到任何东西。\n\n\
  ```\nalist = data.find_all(\"a\")\n```\n\n在图 4-4 中，你可以看到我们已经获取了所有包裹在 `<a>` 标签中的行。\n\
  \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig4_HTML.jpg](img/506186_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4** 带有 HTML `<a>` 标签的文本元素\n\n列表中获取的行带有 `<a>` 标签和 `href`（超文本引用）。我们需要从文本中移除标签和其他属性。在\
  \ BeautifulSoup 库中，有一个方法 `get_text()` 可以从 `<>` 标签中提取字符串。我们需要将其应用于 `alist` 中的每个项目以获取干净的文本。\n\
  \n```\nfor item in alist:\n    print(item.get_text())\n```\n\n如果我们需要从网页中抓取特定的一行怎么办？例如，从整首诗中获取\
  \ \"From forth the fatal loins of these two foes\" 这段文本。第一步是选中该文本并在 HTML 代码中进行检查（图\
  \ 4-5）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig5_HTML.jpg](img/506186_1_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5** 在 Chrome 中定位并检查文本中的一行\n\n第二步是调查 Chrome 开发者工具中的元素，如图 4-5 右侧所示，并找到我们可以用来获取文本的钩子。文本\
  \ `\"From forth the fatal loins of these two foes\"` 被 `<a>` 标签包围，并且有一个属性 `name=5`。同样，我们不需要知道\
  \ `name=5` 是什么意思。⁶ 这是构建网站的开发者使用的某个属性。我们关心的只是一个对于我们想要获取的文本来说是唯一的组合。如果我们只在 `find()`\
  \ 中使用一个标签，那么它会获取包裹在 `<a>` 标签中的第一个元素。幸运的是，`name=5` 对于我们需要的文本行是唯一的。使用 `find()` 方法，我们将\
  \ `<a>` 标签作为第一个参数传递，因为 `\"From forth the fatal loins of these two foes\"` 以此开头，并且作为第二个参数，我们将传递\
  \ `name=5`。属性应以字典的形式传递，如下所示：\n\n```\nelement = data.find(\"a\", {\"name\": 5})\n\
  ```\n\n我们已经获取了文本，并使用 `get_text()` 方法对其进行了清理（图 4-6）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig6_HTML.jpg](img/506186_1_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6** 通过使用 `find()` 方法和 HTML 属性获取文本行\n\n如你所见，整个网页抓取过程概括起来包括以下步骤：\n\n1.  使用\
  \ Requests 库的 `get()` 方法从服务器获取数据。\n2.  将接收到的数据传递给 `BeautifulSoup()` 函数；它将数据解析为一个看起来像\
  \ HTML 网页结构的对象。\n3.  在浏览器中检查你需要抓取的元素。\n4.  使用 `find()` 或 `find_all()`，通过标签和属性等钩子获取文本。\n\
  \n现在我们已经学习了网页抓取的基本步骤，我们可以攻克一个热门网站 [investing.com](http://investing.com)。Investing.com\
