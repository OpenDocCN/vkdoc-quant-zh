  \n```python\nauth = tweepy.OAuthHandler(CONSUMER_KEY, CONSUMER_SECRET)\nauth.set_access_token(OAUTH_TOKEN,\
  \ OAUTH_TOKEN_SECRET)\napi = tweepy.API(auth)\n```\n\n## 发送带媒体的推文\n\n我们的目标是生成并发送一条包含图片和文字的推文。准备一张图片，并将其存储在与你的\
  \ **Jupyter** 文件相同的目录中，或者确保你知道图片文件的相对路径。\n\n使用 `image_path` 变量定义要上传的文件路径：\n\n```python\n\
  image_path = \"/Users/programwithus/Chapter7/fortweeter.png\"\n```\n\n机器人获得身份验证后，我们就可以发布带有媒体文件的推文了。特殊的\
  \ Tweepy 方法 `update_with_media()` 发布媒体并添加一条消息。根据文档，太长或重复的消息将被忽略。消息应使用 `status` 关键字传递：\n\
  \n```python\napi.update_with_media(image_path, status=\"Python Rules! Learn Python\"\
  )\n```\n\n如果推文发送成功，你会看到返回的包含所有详细信息的 `Status` 消息，如图 7-18 所示，以及实际的推文（图 7-19）。\n\n\
  ![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig19_HTML.jpg](img/506186_1_En_7_Fig19_HTML.jpg)\n\
  \n**图 7-19** 由 Tweepy 库发送的推文\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig18_HTML.jpg](img/506186_1_En_7_Fig18_HTML.jpg)\n\
  \n**图 7-18** 自动发送带媒体文件推文的代码\n\n\n\n# 基于数据库存储的推特营销活动\n\n如果你想要开展推特营销活动并每天发送推文，就需要将内容存储在某处。显然，最佳选择是使用预先准备好文本和图片路径的数据库。`Python`\
  \ 可与任何类型的关系型数据库配合使用。最简单的方案是采用 `Sqlite3` 数据库。`Sqlite3` 模块随标准 `Python` 发行版一同提供。\n\n\
  如果你不熟悉关系型数据库，也可以考虑使用简单的文本或 `CSV` 文件作为替代方案。内容和图片链接可以从文件中读取，然后通过 `Tweepy` 发布推文。待发送的信息将存储在列表的列表中，随后通过我们刚刚创建的、在\
  \ `for` 循环中运行的代码进行分发。\n\n# 使用 Python 进行电子邮件营销\n\n用 `Python` 发送电子邮件是相当简单的任务。`Python`\
  \ 拥有 `Email` 和 `Smtplib` 模块，用于撰写和发送消息。该过程的详细文档可在此处查阅：[`https://docs.python.org/3/library/email.examples.html`](https://docs.python.org/3/library/email.examples.html)。你需要在计算机上使用\
  \ `Smtplib` 包模拟一个服务器，它便会发送邮件。\n\n尽管操作简单，但我认为这个过程并不适合营销目的，尤其是当你需要触达 10,000 甚至 100,000\
  \ 名收件人时。对于认真的营销人员，我推荐使用 `Mailgun` 服务。`Mailgun` 让你能够更灵活地使用自己的 `Python` 代码，同时享受分析仪表盘带来的便利。`Mailgun`\
  \ 提供了一个 `Python` API，可以轻松集成到任何 Web 应用程序中，或在 `Python` 脚本中使用。即使对于 `Python` 初学者来说，`Mailgun`\
  \ API 也很容易使用。此外，`Mailgun` 服务允许使用 `HTML` 模板，并提供电子邮件营销活动效果的分析数据。\n\n如果你目前正在使用某种电子邮件营销服务，务必对比一下价格，看看切换到\
  \ `Mailgun` 是否划算。在本书中，我们将使用 `Mailgun` 的免费试用版。\n\n任何营销专业人士都知道，品牌建设是赢得客户信任的关键。如今，人们不会随意打开任何电子邮件。除非电子邮件来自可靠来源或明确显示发件人身份，否则潜在客户不会点击。`Mailgun`\
  \ 允许你添加自己的域名，使邮件看起来更专业。虽然出于测试目的无需添加域名，但 `Mailgun` 也提供了一个沙盒域名。我将设置我的域名 [artyudin.com](http://artyudin.com)\
  \ 来演示这个过程。如果你想遵循我的代码但没有域名，可以在 [godaddy.com](http://godaddy.com) 或 [namecheap.com](http://namecheap.com)\
  \ 上购买，一年只需一美元。\n\n在浏览器中打开 [`www.mailgun.com/`](http://www.mailgun.com/) 并免费注册，以获取\
  \ API 密钥。注册完成后，登录账户。你会看到仪表盘；在左侧菜单中应该能看到 **发送(Sending)** 选项。点击 **发送(Sending)**。在菜单中选择\
  \ **域名(Domains)** 选项，如果你想添加现有域名，请点击左上角的绿色 **添加新域名(Add New Domain)** 按钮。如果你只想试用 `Mailgun`，可以保留使用\
  \ `Mailgun` 默认提供的沙盒域名。使用沙盒域名的主要缺点是 `Mailgun` 仅允许向授权收件人发送消息。这意味着你需要向他们发送邀请，并请求他们同意接收来自\
  \ `Mailgun` 服务器的电子邮件。\n\n点击绿色的 **添加新域名(Add New Domain)** 按钮后，你会看到一个提示框，要求输入你想使用的域名。在点击\
  \ **添加域名(Add Domain)** 之前，请选择域名注册的地区 **美国(US)** 或 **欧盟(EU)**。下一步是设置你的域名并验证其所有权。\n\
  \n我知道所有这些 DNS 设置（图 7-20）初看起来会令人困惑和复杂。但在同一页面上，你会找到针对所有主要域名销售商和提供商的视频和分步说明。你只需登录你的域名提供商，并在域名旁边管理\
  \ DNS。在 DNS 记录中，按照 `Mailgun` 指南添加 TXT 和 MX 记录。你只需将 `Mailgun` 页面上的值复制并粘贴到域名的 DNS\
  \ 记录中。为确保设置正确，请点击验证 DNS 设置(Verify DNS Settings)，如果看到 DNS 类型旁边出现绿色标记，说明一切正常，你就可以发送电子邮件了（图\
  \ 7-21）。如果某些设置不起作用，你仍看到红色和黄色叉号，请再观看一遍视频并重试。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig21_HTML.jpg](img/506186_1_En_7_Fig21_HTML.jpg)\n\
  \n图 7-21\n添加的域名已成功验证\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig20_HTML.jpg](img/506186_1_En_7_Fig20_HTML.jpg)\n\
  \n图 7-20\n将域名添加到 `Mailgun` 服务器\n\n`Mailgun` 作为一个常规 API 运行，需要 `Requests` 库来向服务器发送消息以及一个\
  \ API 密钥。打开 `Mailgun` 仪表盘，从左侧菜单中选择 *设置(Settings)* 选项，然后找到 *API 密钥(API Keys)* 选项。另外，API\
  \ 密钥也可以在个人设置中找到（图 7-22）。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig22_HTML.jpg](img/506186_1_En_7_Fig22_HTML.jpg)\n\
  \n图 7-22\n`Mailgun` API 密钥\n\n要发送电子邮件，请打开一个新的 **Jupyter** Notebook，并在文件顶部导入 `Requests`\
  \ 库：\n\n```\nimport requests\n```\n\n与之前的 API 示例一样，我们将定义 `API_KEY` 变量来保存 API 密钥。同时定义\
  \ `DOMAIN` 变量来保存你的域名：\n\n```\nAPI_KEY = \"9514cb771d5da80eb6\"\nDOMAIN = \"artyudin.com\"\
  \n```\n\n`Requests` 库拥有与主要 HTTP 方法 `get()`、`post()`、`put()` 和 `delete()` 相匹配的函数。`get()`\
  \ 方法发送请求以从服务器获取数据，而 `post()` 方法则将数据发送到服务器。由于我们要发送信息，我们将使用 `post()` 方法。我们需要向 `post()`\
  \ 方法传递一些参数。我将逐一分解并分别定义每个信息片段，以使其清晰明了。\n\n首先，`Requests` 的 `post()` 方法需要我们要访问的 HTTP\
  \ 地址。我们将其定义为 `url`，并使用 `Mailgun` 文档中的模板。\n\n我们的目标是触达许多潜在客户，因此我将把 `recipients` 设置成一个电子邮件地址列表。在实际情况中，你可能需要从文件或数据库中获取电子邮件和姓名。无论如何，你需要将所有电子邮件作为一个\
  \ `Python` 列表提供：\n\n```\nrecipients = [\"anna@example.com\", \"sherlock@example.com\"\
  ]\n```\n\n我将把主题设置为 `subject_matter` 变量：\n\n```\nsubject_matter = \"Hello there\"\
  \n```\n\n我将把消息本身作为一个字符串赋值给 `message` 变量：\n\n```\nmessage = \"I am sending this email\
  \ with Python!\"\n```\n\n最后，我将定义发件人身份为 `sender`。如果你没有添加域名，那么你必须使用经过验证的电子邮件地址。\n\n\
  在 `post()` 方法中，我们将传递 `url`、身份验证信息作为 `auth`，以及信息作为 `data`。对于 `auth` 元组中的身份验证，我们需要设置\
  \ `API_KEY`：\n\n```\nauth=(\"api\", API_KEY)\n```\n\n关键字参数 `data` 将包含我们之前定义的所有信息：\n\
  \n```\ndata = {\"from\": sender, \"to\": recipients, \"subject\": subject_matter,\
  \ \"text\": message}\n```\n\n整个 `Requests` 的 `post()` 方法将如下所示：\n\n```\nrequests.post(\n\
  url,\nauth=(\"api\", API_KEY),\ndata={\"from\": sender,\n\"to\": recipients,\n\"\
  subject\": subject_matter,\n\"text\": message}\n)\n```\n\n\n\n每次我们向服务器发送请求时，`Requests`\
  \ 包都会返回一个状态码。200 到 300 之间的任何值都表示操作已成功完成。如果看到 400，请检查你的代码。你可能遗漏了一个闭合括号，或者提供了错误的 API\
  \ 或域名。\n\n在我们的示例中，我们收到了 200（图 7-23）。既然邮件已成功发送，那么开始在你的邮箱中查找它。\n\n![../images/506186_1_En_7_Chapter/506186_1_En_7_Fig23_HTML.jpg](img/506186_1_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23 使用 Python 成功发送了一封邮件\n\n如你所见，使用 Mailgun API 的过程其实并不困难。将 API 封装到你自己的 Python\
  \ 脚本中，让你可以灵活地在发送邮件的同时添加一堆其他任务。例如，安排电子邮件营销活动，或者从互联网抓取数据，然后将这些信息通过邮件发送。无论如何，使用 Python\
  \ 和 Mailgun 服务都为你提供了更多的自动化空间。我们的目标是用 Python 自动化那些繁琐的营销任务。\n\n你应该将本章视为使用 Python 编程语言进行营销的一块跳板。所有大公司都提供有用的\
  \ API，你可以利用它们来使你的工作流程更快、更高效。我相信到目前为止，你已经对如何使用 `Requests` 库从 API 检索信息以及如何使用 Python\
