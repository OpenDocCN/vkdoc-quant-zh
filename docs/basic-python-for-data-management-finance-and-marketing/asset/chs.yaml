  \ import Keys\n```\n\n在下一个单元格中，暂时注释掉 `title` 和 `price` 语句，并将我们一直使用的产品 URL 替换为 [`www.amazon.com`](http://www.amazon.com)\
  \ 的亚马逊着陆页，如图 4-22 所示。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig22_HTML.jpg](img/506186_1_En_4_Fig22_HTML.jpg)\n\
  \n图 4-22 准备 Selenium 设置，以便在网页的输入提示框中输入值\n\n在我们将期望的产品名称填入搜索提示框之前，我们需要在 HTML 代码中找到输入框。在\
  \ Web 浏览器中打开 [`www.amazon.com`](http://www.amazon.com)，将鼠标移动到文本框上，并右键单击以检查元素。找到我们可以用来在\
  \ HTML 中抓取元素的文本框属性。我认为 `id=\"twotabsearchtextbox\"` 非常适合用来捕获文本框（图 4-23）。\n\n\n\n\
