  \ 容器内保存了产品的 ASIN 编号。你可能会问，是否必须使用 `data-asin` 属性，或者有没有其他方法来捕获元素？也许还有其他方法可以提取出所需元素。我鼓励你去尝试。`data-asin`\
  \ 属性只是这个特定示例中特有的。在其他情况下，在不同的网页上，会有其他属性或 HTML 标签。此外，未来亚马逊的开发人员可能会用其他内容替换 `data-asin`\
  \ 属性。这就是为什么检查是网络爬虫过程中的一个关键部分。网络爬虫的核心就是研究和寻找能帮助你抓取元素的 HTML 钩子。我花了几分钟才意识到，在我们的例子中，`data-asin`\
  \ 可以用于从页面获取 ASIN。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig25_HTML.jpg](img/506186_1_En_4_Fig25_HTML.jpg)\n\
  \n**图 4-25** 在 Chrome 开发者工具中检查包含产品信息的 div 容器\n\n直接捕获 `data-asin` 属性并非易事。解决方案是获取页面上每个产品的整个\
  \ `<div>` 容器，然后提取 `data-asin` 属性的值。任务变得更复杂了；我们需要获取的 `<div>` 容器没有唯一的 `id`（图 4-24），因此需要使用另一种\
  \ Selenium 方法。在 `page` 对象上运行 `dir()` 函数，在列出的所有方法中，你应该能看到 `find_elements_by_class_name()`\
  \ 方法。借助 `find_elements_by_class_name()` 方法，我们可以获取页面上所有包含类 `\"s-result-item\"` 的\
  \ `<div>` 容器（图 4-25）：\n\n```python\nasin_numbers = page.find_elements_by_class_name(\"\
  s-result-item\")\n```\n\n`find_elements_by_class_name()` 方法返回一个存储在 `asin_numbers`\
  \ 变量中的 Selenium 元素列表。你可以通过应用文本方法将它们转换为字符串：\n\n```python\nrings = [item.text for\
  \ item in asin_numbers]\n```\n\n或者像这样提取 `data-asin` 属性：\n\n```python\nasin_list\
  \ = [item.get_attribute('data-asin') for item in asin_numbers]\nprint(asin_list)\n\
  ```\n\n使用 `get_attribute('data-asin')` 之后，我们从该页面获取的所有 ASIN 编号都存储在 `asin_list` 中（图\
  \ 4-26）。没有 `data-asin` 属性的容器返回了空字符串 ‘ ’。这没关系；我们稍后会处理这些空值。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig26_HTML.jpg](img/506186_1_En_4_Fig26_HTML.jpg)\n\
  \n**图 4-26** 获取网页上所有产品的 ASIN 编号\n\n收集完 Ring Video Doorbells 的 ASIN 编号后，我们可以获取每个产品的详细信息，并将信息存储到\
  \ CSV 文件中。\n\nPython 自带用于处理 CSV 文件的 CSV 模块。我们将使用它来将收集到的信息写入 CSV 文件。由于 CSV 是内置模块，无需下载和安装。但我们仍然需要在代码上方的单元格中导入它：\n\
  \n```python\nimport csv\n```\n\n为了获取列表中每个 Ring Video Doorbell 的详细信息，我们需要访问产品页面，并从每个页面抓取标题和价格。同时，我们还将收集每个产品页面的描述信息。之前我们已经成功获取了产品的标题和价格。现在我们需要检查\
  \ [`www.amazon.com/dp/B08N5NQ869`](http://www.amazon.com/dp/B08N5NQ869) 页面上的要点列表，以抓取产品详细信息。看起来所有要点都位于\
  \ `id=\"feature-bullets\"` 的 `<div>` 容器中。使用熟悉的 Selenium 方法 `find_element_by_id()`，我们将抓取它们。\n\
  \n是时候将所有语句整合起来了。我们将组装一个小型爬虫，从在亚马逊上查找产品到保存数据，收集产品信息。我会逐步进行，然后发布完整的解决方案。我们上次停留在包含许多\
  \ ASIN 编号的列表上。我们将遍历这个列表，并将每个 ASIN 编号附加到 [`www.amazon.com/dp/`](http://www.amazon.com/dp/)\
  \ URL 后面，以获取亚马逊产品页面。在现实中进行网络爬虫抓取信息时，很多事情都可能出错。Wi-Fi 可能会断连，或者亚马逊停止支持某个产品。此外，某些元素可能不返回任何值，就像我们在\
  \ `asin_list` 中看到的空字符串一样。其中任何一个问题都可能使我们的代码崩溃。这会中断整个流程，由于一两个坏的 URL 或页面，我们将无法获取其他数据。当你试图访问数千个页面，而一件小事就导致正在运行的代码停止时，这是非常令人沮丧的。为了避免这种情况，并在遇到障碍时继续执行代码，我们将每条语句包裹在\
  \ `try` 和 `except` 块中。\n\n异常处理是避免在 Python 代码返回错误信息后停止执行的一种好方法。让我用我们的亚马逊示例来解释异常处理：\n\
  \n```python\nfor number in asin_list:\n    try:\n        page.get(\"https://www.amazon.com/dp/{}\"\
  .format(number))\n        print(\"fetching {}\".format(number))\n    except:\n \
  \       print(\"could not get the page for {}\".format(number))\n```\n\n\n\n在代码中，我们遍历了`asin_list`中收集的所有\
  \ ASIN 编号，并将每个唯一的编号传递给字符串方法`format()`，以将其追加到亚马逊 URL 中。Selenium 的`page.get()`方法会尝试从服务器拉取每个产品页面。如果亚马逊服务器返回有效响应，变量`page`会保存它，我们就可以从\
  \ Selenium 对象中解析元素。但是，如果 URL 损坏或服务器因某种原因无响应，代码不会显示错误消息并停止，而是跳转到`except`块并打印`\"Could\
  \ not get the page for some ASIN\"`。如果`try`块中的语句失败，`except`块将防止错误。在`except`块中的所有语句执行完毕后，Python\
  \ 会在`for`循环中继续正常执行。在前面的示例中，它将尝试获取`asin_list`中的下一个网页。`try`和`except`块是避免代码崩溃的一种非常流行的方式。它们通常用于捕获错误消息，以便稍后仔细查看问题所在。有时，专业开发人员会在`except`块中放置一个函数，向自己发送包含异常的消息，以便快速解决问题。\n\
  \n此外，在`for`循环中，我们将定义一个空列表。我们需要它来存储某个产品的所有抓取信息。如果我们遇到一个页面缺少`title`和`price`数据，我们会将它们定义为`None`：\n\
  \n```\nfor number in asin_list:\ndata = []\ntitle = None\nprice = None\ntry:\npage.get(\"\
  https://www.amazon.com/dp/{}\".format(number))\nprint(\"fetching {}\".format(number))\n\
  except:\nprint(\"could not get the page for {}\".format(number))\n```\n\n接下来，我们将尝试获取产品标题；如果页面上没有`id=\"\
  productTitle\"`，`except`块会打印`\"productTitle is not there\"`。\n\n```\ntry:\ntitle\
  \ = page.find_element_by_id(\"productTitle\").text\nexcept:\nprint(\"productTitle\
  \ is not there\")\n```\n\n正如我之前提到的，价格元素有点棘手。亚马逊对价格元素使用不同的`id`属性。我找到了`id=\"priceblock_ourprice\"\
  `和`id=\"priceblock_dealprice\"`。如果产品已售罄且产品页面显示`\"Currently unavailable\"`，则根本不会有价格元素。在这种情况下，`price`会被设置为`None`。\n\
  \n```\ntry:\nprice = page.find_element_by_id(\"priceblock_ourprice\").text\nexcept:\n\
  print(\"priceblock_ourprice is not there\")\ntry:\nprice = page.find_element_by_id(\"\
  priceblock_dealprice\").text\nexcept:\nprint(\"priceblock_dealprice is not there\"\
  )\n```\n\n产品标题和价格的结果应添加到`data`列表中：\n\n```\ndata.extend([title,price])\n```\n\n来自要点列表的产品描述将通过`id=\"\
  feature-bullets\"`获取，并按换行符保存到`bullets_list`中。`bullets_list`的值将扩展到同一个`data`列表中：\n\
  \n```\ntry:\nbullets = page.find_element_by_id(\"feature-bullets\").text\nbullets_list\
  \ = bullets.split(\"\\n\")\ndata.extend(bullets_list)\nexcept:\nprint(\"feature-bullets\
  \ id is not there\")\n```\n\n最后，我们将把`data`列表写入 CSV 文件。返回上文，使用函数`open()`定义一个文件对象。CSV\
  \ 模块附带一个`write()`方法，该方法会将`data`列表作为一行插入到`amazon-results`文件中：\n\n```\ncsv_file =\
  \ open(\"amazon-results.csv\", 'w')\nwriter = csv.writer(csv_file)\n```\n\n由于某些页面在写入`data`之前没有产生结果，因此检查第一个元素是否不为`None`。如果`data`列表包含信息，则将其作为一行添加到`amazon-results.csv`文件中。以下`if`块应放置在`for`循环的作用域内：\n\
  \n```\nif data[0] != None:\nwriter.writerow(data)\n```\n\n最后，在`for`循环之外，我们需要保存文件对象并关闭浏览器窗口：\n\
  \n```\ncsv_file.close()\npage.close()\n```\n\n最终，代码将生成`amazon-results.csv`文件，该文件保存在当前\
  \ Jupyter Notebook 所在的目录中。每个产品将写入单独的行，详细信息由逗号分隔。在图 4-27 中，您可以看到在 Excel 中打开的`amazon-results.csv`文件。\n\
  \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig27_HTML.jpg](img/506186_1_En_4_Fig27_HTML.jpg)\n\
  \n图 4-27 将结果保存到 Excel 文件中\n\n正如我在此承诺的，您可以看到使用 Selenium 完成的亚马逊示例的完整解决方案：\n\n```\n\
  #importing packages\nfrom selenium.webdriver import Chrome\nfrom selenium.webdriver.common.keys\
  \ import Keys\nimport csv\n#initiating a csv file\ncsv_file = open(\"amazon-results.csv\"\
  , 'w')\nwriter = csv.writer(csv_file)\n#ChromeDriver PATH\nchromedriver = r\"/Users/programwithus/Chapter4/chromedriver\"\
  \npage = Chrome(executable_path=chromedriver)\n#openning amazon.com and gathering\
  \ ASIN numbers for Ring doorbells\npage.get(\"https://www.amazon.com\")\nprompt\
  \ = page.find_element_by_id(\"twotabsearchtextbox\")\nprompt.send_keys(\"ring video\
  \ doorbell\")\nprompt.send_keys(Keys.ENTER)\nasin_numbers = page.find_elements_by_class_name(\"\
  s-result-item\")\nrings = [item.text for item in asin_numbers]\nasin_list = [item.get_attribute('data-asin')\
  \ for item in asin_numbers]\n#fetching details for each product and writing it into\
  \ amazon-results.csv\nfor number in asin_list:\ndata = []\ntitle = None\nprice =\
  \ None\ntry:\npage.get(\"https://www.amazon.com/dp/{}\".format(number))\nprint(\"\
  fetching {}\".format(number))\nexcept:\nprint(\"could not get the page for {}\"\
  .format(number))\ntry:\ntitle = page.find_element_by_id(\"productTitle\").text\n\
  except:\nprint(\"productTitle is not there\")\ntry:\nprice = page.find_element_by_id(\"\
  priceblock_ourprice\").text\nexcept:\nprint(\"priceblock_ourprice is not there\"\
  )\ntry:\nprice = page.find_element_by_id(\"priceblock_dealprice\").text\nexcept:\n\
  print(\"priceblock_dealprice is not there\")\ndata.extend([title,price])\ntry:\n\
  bullets = page.find_element_by_id(\"feature-bullets\").text\nbullets_list = bullets.split(\"\
  \\n\")\ndata.extend(bullets_list)\nexcept:\nprint(\"feature-bullets id is not there\"\
  )\nif data[0] != None:\nwriter.writerow(data)\n#saving file and closing browser\n\
  csv_file.close()\npage.close()\n```\n\n\n\n# 使用 API\n\n到目前为止，我们一直在处理 HTML 网页。我在本章开头提到了客户端/浏览器与服务器之间的关系。浏览器接收\
  \ HTML 并将其呈现为图像和样式化的文本。作为人类，我们希望能够以美观多彩的方式查看信息。\n\n还有其他客户端不需要查看图像和颜色。我说的是设备。向服务器发送请求的设备也是一个客户端。例如，现在你可以买到一台冰箱，当牛奶喝完时，它会向杂货店下订单要求送货。另一个例子是交换\
  \ Facebook 消息的智能手机，或者从服务器接收天气更新的汽车。\n\n这些设备需要一种简单格式的数据，不带样式和颜色。它们使用的数据格式是 JSON（JavaScript\
  \ 对象表示法），它以字符串形式提供。服务器可以根据请求客户端以 HTML 或 JSON 格式发送数据。\n\n通常，JSON 来自 API（应用程序编程接口），这是一个专门为与计算机应用程序或设备通信而设计的接口。\n\
  \n如果你的工作是分析金融数据，那么你可以订阅彭博 API。另一方面，如果你从事数字营销工作，需要从 Google Analytics 获取信息，你将使用 Google\
  \ Analytics Reporting API。事实上，Google 甚至有一个 Python 库来帮助开发者连接到他们的 API 并访问所有 Google\
  \ 应用程序。我们将在本书后面部分使用它们。\n\n所有 API 的设计都不同，大多数情况下，公司都有开发者文档来解释如何使用它们以及如何通过身份验证。有些 API\
  \ 是免费的；其他的则需要订阅。\n\n在这里，我们将研究一个非常流行的金融数据源，Alpha Vantage。在下面的示例中，我将向您解释使用 API 的主要原则。\n\
  \n## 获取 API 密钥\n\n所有 API 提供商都需要某种形式的身份验证，Alpha Vantage 也不例外。与其他 API 服务相比，在 [`www.alphavantage.co/support/#api-key`](http://www.alphavantage.co/support/%2523api-key)\
  \ 获取 API 密钥非常容易。你需要回答两个简单的问题并提供你的电子邮件地址。请务必获取你自己的 API 密钥，因为我在本书中使用的密钥将会过期。成功注册后，你应该会看到以下消息：\n\
  \n```\n欢迎使用 Alpha Vantage！你的 API 密钥是：ZIIROPRQCMEREHR8。请将此 API 密钥保存在安全的地方，以便将来访问数据。\n\
  ```\n\nAPI 密钥同时充当用户 ID 和密码。API 密钥的作用是验证请求信息的个人或设备的身份。此外，如果这是一个付费服务，还需要确保账号没有欠费。\n\
  \n## 理解 API 文档\n\n了解任何 API 都应该从 API 提供商的开发者文档开始。我们是 Alpha Vantage 服务的新手，从 [`www.alphavantage.co/documentation/`](http://www.alphavantage.co/documentation/)\
  \ 开始是明智之举。\n\nAlpha Vantage 提供了多个 API 来获取股票价格、公司基本数据、外汇、加密货币和技术指标。我们将使用 `TIME_SERIES_DAILY_ADJUSTED`\
  \ API 来获取股票的历史每日价格。\n\n演示 URL 看起来像这样：\n\n```\nhttps://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=IBM&apikey=demo\n\
  ```\n\n在浏览器中打开此参考链接，你将看到包含 IBM 股票 `开盘价`、`最高价`、`最低价`和 `收盘价` 的 JSON 数据。如果你仔细观察，会发现\
  \ JSON 类似于 Python 字典数据类型。\n\n演示 URL 让我们很好地理解了如何使用它。API 端点中的 IBM 值可以替换为我们想要获取历史价格的任何其他股票代码。在\
  \ `apikey=demo` 参数中，`demo` 应更改为你已获取的 API 密钥。\n\n## 使用 Python 获取股票数据\n\n使用时间序列 API，我们将获取\
  \ AAPL 的历史价格并将其存储为 DataFrame。在一个新的 Jupyter 文件中，导入此示例需要的两个库，`Requests` 和 `Pandas`：\n\
  \n```python\nimport requests\nimport pandas as pd\n```\n\n我们需要将 API 密钥定义为字符串、API\
  \ 的 URL 以及我们想要获取的股票：\n\n```python\nAPI_Key = \"ZIIROPRQCMEREHR8\"\nurl = \"https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol={}&apikey={}\"\
  \nstock = \"AAPL\"\n```\n\n在 URL 中，我已经将 `IBM` 符号和 `demo` 替换为 `{}`；稍后，我们将使用 `format()`\
  \ 方法将我们自己的值插入其中。\n\n首先，我们需要使用 `requests.get()` 方法向服务器发送请求。我们将传入 `stock` 变量（即 `\"\
  AAPL\"`）和我们定义的 `API_Key`。Python 字符串方法 `format()` 使代码更简洁，并且将来可以轻松地将 `\"AAPL\"` 替换为任何其他股票代码：\n\
  \n```python\ndata = requests.get(url.format(stock, API_Key))\n```\n\n运行代码，`data`\
  \ 将返回响应 `200`，这意味着一切正常，并且我们成功从 API 获取了信息。正如我之前提到的，Python 库 Requests 支持不同的数据类型，由于此\
  \ API 提供 JSON，我们将使用 `json()` 方法来提取值。你可以直接将 `json()` 链式调用到 `requests.get()`：\n\n\
  ```python\ndata = requests.get(url.format(stock, API_Key)).json()\n```\n\n最后，我们从\
  \ Alpha Vantage API 收到的数据如图 4-28 所示。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig28_HTML.jpg](img/506186_1_En_4_Fig28_HTML.jpg)\n\
  \n**图 4-28** 从 API 接收数据\n\n## 探索 API 响应\n\nJSON 语法类似于 Python 字典。每次我处理新的源数据时，我都会使用\
  \ `type()` 函数。将 `data` 传入 `type()`，你会看到 Python 将其视为字典。\n\n我们从 API 收到了大量信息，很难直观地识别字典中的键。Python\
  \ 字典方法 `keys()` 将帮助我们获取所有的键：\n\n```python\ndata.keys()\n```\n\n`keys()` 方法返回了 `dict_keys(['Meta\
  \ Data', 'Time Series (Daily)'])`。我们对 `'Meta Data'` 不感兴趣，将更仔细地查看 `'Time Series (Daily)'`。`data`\
  \ 是一个字典，我们可以通过键 `'Time Series (Daily)'` 获取值。`Time Series` 是另一个字典，因此我们将再次使用 `keys()`\
  \ 方法：\n\n```python\ndata['Time Series (Daily)'].keys()\n```\n\n显然，`data['Time Series\
  \ (Daily)']` 也包含所有作为字典的信息。`keys()` 方法返回了用作键的日期。每个内部字典包含更多带有 `\"AAPL\"` 每日值的键。要获取它们，你可以对任何日期应用相同的\
  \ `keys()` 方法：\n\n```python\ndata['Time Series (Daily)']['2021-01-08'].keys()\n\
  ```\n\n每一天都有相同的键集来保存值：\n\n```\ndict_keys(['1\\. open', '2\\. high', '3\\. low',\
  \ '4\\. close', '5\\. adjusted close', '6\\. volume', '7\\. dividend amount', '8\\\
  . split coefficient'])\n```\n\n如果我想获取 AAPL 股票在 `'2021-01-08'` 的收盘价，我会这样获取它（图 4-29）：\n\
  \n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig29_HTML.jpg](img/506186_1_En_4_Fig29_HTML.jpg)\n\
  \n**图 4-29** 从转换为 Python 字典的接收数据中访问值\n\n```python\ndata['Time Series (Daily)']['2021-01-08']['4\\\
  . close']\n```\n\n如果你需要从 Alpha Vantage 时间序列 API 中获取所有收盘价，那么可以遍历字典。在这个例子中，我将使用 `dict_of_prices`\
  \ 作为中间变量，以使代码更简洁、更清晰（图 4-30）：\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig30_HTML.jpg](img/506186_1_En_4_Fig30_HTML.jpg)\n\
  \n**图 4-30** 遍历 `dict_of_prices` 字典对象\n\n\n\n```python\ndict_of_prices = data['Time\
  \ Series (Daily)']\nfor key in dict_of_prices:\n    print(key, dict_of_prices[key]['4\\\
  . close'])\n```\n\n我完成了上述所有步骤，以演示如何从 API 中获取任意值。假设我们希望将接收到的数据转换为 DataFrame，那么我们可以提取\
  \ `dict_of_prices` 或 `data['Time Series (Daily)']`，并直接将其传入 Pandas 的 `DataFrame`\
  \ 函数：\n\n```python\ndf = pd.DataFrame(dict_of_prices)\n```\n\n当字典被传入 `DataFrame`\
  \ 函数时，它可能使用错误的列值。在我们的例子中，`pd.DataFrame` 函数将日期用作列，这不是期望的结果。为了旋转这个二维数据结构，我们将应用 `T`\
  \ 属性来转置 DataFrame 的索引和列：\n\n```python\ndf = pd.DataFrame(dict_of_prices).T\n```\n\
  \n属性 `T` 是 `transpose()` 方法的一个访问器，你可以互换使用它们。加上末尾的 `T` 属性后，`df` 应如图 4-31 所示。\n\n\
  ![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig31_HTML.jpg](img/506186_1_En_4_Fig31_HTML.jpg)\n\
  \n**图 4-31** 使用内置方法 `T` 转置 DataFrame\n\n需要注意，API 提供的 JSON 是字符串，`df` 中的所有值并非以数值数据类型存储。这意味着我们不能将它们用于数学计算。你不必记住这一点；相反，可以在\
  \ DataFrame 上运行 `info()` 方法来检查值的数据类型：\n\n```python\ndf.info()\n```\n\n要处理这些值，我们需要将它们转换为数值数据。逐列进行会很繁琐。我们将使用\
  \ `applymap()` 方法。`applymap()` 的概念类似于 `apply()` 方法；它遍历所有的值。区别在于 `applymap()` 会应用于\
  \ DataFrame 中的所有值。`applymap()` 没有 `inplace` 参数，我们需要将转换后的值保存回同一变量 `df`：\n\n```python\n\
  df = df.applymap(pd.to_numeric)\n```\n\n再次运行 `df.info()`，你会看到所有值都已转换为浮点数或整数数据类型。我们最后可以做的事情是将索引值转换为\
  \ datetime 对象：\n\n```python\ndf.index = pd.to_datetime(df.index)\n```\n\n索引中的 datetime\
  \ 对象将帮助我们操作数据，例如，从 DataFrame 中绘制过去 120 天的收盘价（图 4-32）：\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig32_HTML.jpg](img/506186_1_En_4_Fig32_HTML.jpg)\n\
  \n**图 4-32** 从 DataFrame 绘制数据\n\n```python\ndf.loc['2020-09-01':'2021-01-12':-1]['4\\\
  . close'].plot.line()\n```\n\n方法 `loc` 对从 `'2020-09-01'` 到 `'2021-01-12'` 的数据进行切片。我们使用步长\
  \ `-1`，因为原始 DataFrame 从索引 `'2021-01-12'` 开始，我们需要反向进行。为了绘制收盘价，我们获取 `'4\\. close'`\
  \ 列并将其绘制为折线图（图 4-32）。\n\n# Pandas-Datareader\n\n流行的 API 有像 Pandas-Datareader 这样的包装器。包装器是一个小程序，通常旨在使数据处理过程更加无缝。Pandas-Datareader\
  \ 统一了从雅虎财经、谷歌、纳斯达克、联邦储备经济数据（FRED）等多个数据源访问信息的机制。完整的数据提供商列表可以在 Pandas-Datareader 文档中找到。顾名思义，Pandas-Datareader\
  \ 与 Pandas 协同工作，并以 DataFrame 的形式返回接收到的信息。\n\nPandas-Datareader 最初设计为 Pandas 的一部分，用于接收远程金融和经济数据，后来被分离出来，现在是一个独立的\
  \ Python 包。我们需要在 Anaconda Navigator ➤ Environments ➤ Terminal 中使用 `pip` 命令单独安装它：\n\
  \n```\npip install pandas-datareader\n```\n\n大多数 Pandas-Datareader 数据源都可以通过 `DataReader()`\
  \ 函数访问。为了演示 `DataReader()` 的用法，请打开一个新的 **Jupyter** Notebook 并导入 Pandas 和 Pandas-Datareader：\n\
  \n```python\nimport pandas as pd\nimport pandas_datareader.data as web\n```\n\n\
  首先，我们将从雅虎财经获取 IBM 股票的历史价格。雅虎财经无需注册，我们只需要传递股票代码、数据源和时间范围即可：\n\n```python\nstock_price\
  \ = web.DataReader('IBM', 'yahoo', '2020-01-01','2021-01-15')\n```\n\n开始和结束日期的日期应以字符串或\
  \ datetime 对象的形式传递给函数。第一个参数 `'IBM'` 可以替换为任何其他有效的股票代码。`DataReader()` 以 DataFrame\
  \ 格式返回价格，你可以将 Pandas 函数和方法应用于 `stock_price` 对象：\n\n```python\nstock_price.head()\n\
  ```\n\n`DataReader()` 会连接到雅虎服务，可能需要一些时间才能获得响应（图 4-33）。\n\n![../images/506186_1_En_4_Chapter/506186_1_En_4_Fig33_HTML.jpg](img/506186_1_En_4_Fig33_HTML.jpg)\n\
  \n**图 4-33** 使用 `DataReader()` 函数从雅虎财经接收数据\n\n投资者交易所（IEX）是另一个可与 `DataReader()` 配合使用的流行数据源。投资者交易所为个人和专业账户提供大量付费数据。在这里，我们将使用一个免费账户来演示如何在\
