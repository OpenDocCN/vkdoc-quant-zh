    \ perform capital\n    allocation.\n\n*   Creating a portfolio by target return:\
    \ You can use optimization\n    models to design a portfolio of stocks or other\
    \ investments, based on\n    the desired return. The goal of such optimal portfolios\
    \ is to achieve\n    the best return with minimum volatility.\n\n*   Linear and\n\
    \    quadratic models: You will learn the advantages of quadratic and\n    linear\
    \ optimization models for portfolio optimization.\n\nFinancial Resource Allocation\n\
    In this section, we write a linear programming (LP) model in C++ to\ndetermine\
    \ an optimal allocation of resources for a given set of projects\nand their respective\
    \ costs during a 10-year horizon.\n\nSolution\nResource\nallocation is one of\
    \ the most common problems faced by individual\nand institutional investors. Since\
    \ capital is a limited resource, it\nmakes sense to try to improve its utilization,\
    \ so that one can achieve\nthe optimal allocation of funds to valuable activities.\
    \ Even though\ninvestment outcomes, such as stock prices, may not be totally\n\
    predictable, it is still possible to use a general forecast for the\npurpose of\
    \ decision making.\nLinear\nprogramming offers a framework for financial allocation\n\
    decisions, as you will see in this section. In the first place, you need\nto determine\
    \ the form of the linear program that can be best used to\nmodel the resource\
    \ allocation problem.\nTo work with a concrete allocation example, suppose that\
    \ a company\nneeds to decide among a set of five different active investments.\
    \ These\ninvestments may include buying new manufacturing equipment, hiring new\n\
