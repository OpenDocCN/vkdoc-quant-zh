- fmt: "### Complete Code\n\nThe algorithm described previously has been implemented\
    \ using a C++ class called `TimeSeriesTransformations`. It is divided into a header\
    \ file `TimeSeriesTransformations.h` and a source file `TimeSeriesTransformations.cpp`.\
    \ Listing [4-2](#323908_2_En_4_Chapter.xhtml#PC8) contains the complete code.\n\
    \n```\n//\n//  TimeSeriesTransformations.h\n#ifndef __FinancialSamples__TimeSeriesAnalysis__\n\
    #define __FinancialSamples__TimeSeriesAnalysis__\n#include \nclass TimeSeriesTransformations\
    \ {\npublic:\nTimeSeriesTransformations();\nTimeSeriesTransformations(const TimeSeriesTransformations\
    \ &);\n~TimeSeriesTransformations();\nTimeSeriesTransformations &operator=(const\
    \ TimeSeriesTransformations &);\nvoid reducePrices(double val);\nvoid increasePrices(double\
    \ val);\nvoid removePricesLessThan(double val);\nvoid removePricesGreaterThan(double\
    \ val);\ndouble getFirstPriceLessThan(double val);\nvoid addValue(double val);\n\
    void addValues(const std::vector &val);\nprivate:\nstd::vector m_prices;\n};\n\
    #endif /* defined(__FinancialSamples__TimeSeriesAnalysis__) */\n//\n//  TimeSeriesTransformations.cpp\n\
    #include \"TimeSeriesTransformations.h\"\n#include \n#include \nTimeSeriesTransformations::TimeSeriesTransformations()\n\
    : m_prices()\n{\n}\nTimeSeriesTransformations::TimeSeriesTransformations(const\
    \ TimeSeriesTransformations &s)\n: m_prices(s.m_prices)\n{\n}\nTimeSeriesTransformations::~TimeSeriesTransformations()\n\
    {\n}\nTimeSeriesTransformations &TimeSeriesTransformations::operator=(const TimeSeriesTransformations\
    \ &v)\n{\nif (this != &v)\n{\nm_prices = v.m_prices;\n}\nreturn *this;\n}\nvoid\
    \ TimeSeriesTransformations::reducePrices(double val)\n{\nstd::vector neg(m_prices.size());\n\
    std::transform(m_prices.begin(), m_prices.end(), neg.begin(),\nstd::bind2nd(std::minus(),\
    \ val));\nm_prices.swap(neg);\n}\nvoid TimeSeriesTransformations::increasePrices(double\
    \ val)\n{\nstd::for_each(m_prices.begin(), m_prices.end(), std::bind1st(std::plus(),\
    \ val));\n}\nvoid TimeSeriesTransformations::removePricesLessThan(double val)\n\
    {\nstd::remove_if(m_prices.begin(), m_prices.end(), std::bind2nd(std::less(),\
    \ val));\n}\nvoid TimeSeriesTransformations::removePricesGreaterThan(double val)\n\
    {\nstd::remove_if(m_prices.begin(), m_prices.end(), std::bind2nd(std::greater(),\
    \ val));\n}\ndouble TimeSeriesTransformations::getFirstPriceLessThan(double val)\n\
    {\nauto res = std::find_if(m_prices.begin(), m_prices.end(),\nstd::bind2nd(std::less(),\
    \ val));\nif (res != m_prices.end())\nreturn *res;\nreturn 0;\n}\nvoid TimeSeriesTransformations::addValue(double\
    \ val)\n{\nm_prices.push_back(val);\n}\nvoid TimeSeriesTransformations::addValues(const\
    \ std::vector &val)\n{\nm_prices.insert(m_prices.end(), val.begin(), val.end());\n\
    }\nint main()\n{\nTimeSeriesTransformations ts;\nstd::vector vals = {7, 6.4, 2.16,\
    \ 5, 3, 7};\nts.addValues(vals);\nts.addValue(6.5);\nts.reducePrices(0.5);\nstd::cout\
    \ << \" price is \" <<  ts.getFirstPriceLessThan(6.0) << std::endl;\nreturn 0;\n\
    }\nListing 4-2\nClass TimeSeriesTransformations\n```\n\n### Running the Code\n\
    \nI included some sample code that uses the `TimeSeriesTransformations` class\
    \ in the `main()` function. In this way, you can compile the files presented in\
    \ the previous section into a sample application. After building the application\
    \ with the help of a C++ compiler such as `gcc` or `Visual Studio`, you may run\
    \ it using the following command line:\n\n```\n./TimeSeriesTransformations\nprice\
    \ is 5.9\n```\n\n## Copying Transaction Files\n\nCreate a class to copy transaction\
    \ files into a temporary storage.\n\n### Solution\n\nFile operations are a common\
    \ requirement in a lot of areas of programming, and it couldn’t be different in\
    \ financial applications. Data is commonly stored in formats such as CSV and XML,\
    \ as they need to be processed and filtered by other applications. Logging facilities\
    \ are also necessary to guarantee that debugging and error messages are properly\
    \ handled.\n\nThis type of file manipulation problem can be solved using traditional\
    \ C interfaces, which are available for all major operating systems such as UNIX\
    \ and Windows. However, such native interfaces have a few shortcomings and should\
    \ be avoided when possible. I use this opportunity to provide an overview of a\
    \ better approach, using the boost repository of C++ libraries, and the `filesystem`\
    \ library in particular. With a basic knowledge of how boost works, you will be\
    \ in a position to use other, more complex classes in the next few chapters.\n\
    \n### Boost Libraries\n\nThe standard C++ library provides a large number of classes,\
    \ containers, and algorithms. However, due to the substantial effort necessary\
    \ to create a new standard of the C++ language, the included set of libraries\
    \ is frequently minimalist, comprising only the essential functionality needed\
    \ by most programmers. Moreover, the standard library incorporates only classes\
    \ and functions that have been well verified and established by their use in real\
