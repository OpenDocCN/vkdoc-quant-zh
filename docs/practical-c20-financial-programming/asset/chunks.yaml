    class. The main difference is that the output is stored in the `m_result` member\n\
    variable. The work of `RandomWalkThread`\nobjects is orchestrated inside the `ParallelOptionsProbabilities`\n\
    class. The important member function for the\njob is `probFinishAboveStrike`.\n\
    \n```\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n{\nconst\
    \ int numThreads = 20;\nvector threads(numThreads);\nfor (int i=0; isetJoinable(true);\n\
    threads[i]->start();\n}\nfor (int i=0; ijoin();\n}\ndouble nAbove = 0;\nfor (int\
    \ i=0; iresult();\ndelete threads[i];\n}\nreturn nAbove/(double)(numThreads);\n\
    }\n```\n\nAt the beginning of the member function, several threads are created\n\
    and added to the `threads` vector. You\nneed to define these threads as joinable,\
    \ so that it is possible to wait\non the result of each thread. The next step\
    \ is to start the threads so\nthat each of them can perform the desired computations.\
    \ Then, the second\nloop is used to join the already created threads. By doing\
    \ this, the\nmain thread can wait while the computation is being performed in\n\
    parallel. When all threads are finished, the main thread will be resumed\nas a\
    \ result of the call to `join()`. Finally, you\ncan store the data returned by\
    \ each thread using the `result()` member function. The thread\nobjects may be\
    \ deleted at this time to avoid memory leaks. In the last\nline of the `probFinishAboveStrike`\n\
    member function, you can see how the calculated data can be combined. In\nthis\
    \ case, it is enough to return the sum of values above the strike\nprices and\
    \ divide that value by the number of threads used.\n\nComplete Code\n\nListing\
    \ [17-2](#323908_2_En_17_Chapter.xhtml#PC6) displays the\n`ParallelRandomWalk`\n\
    class . There is\na sample `main()`\nfunction that can be used for testing, as\
    \ can be seen at the end of the\nlisting.\n\n```\n//\n//\n//  ParallelRandomWalk.h\n\
    #ifndef __FinancialSamples__ParallelRandomWalk__\n#define __FinancialSamples__ParallelRandomWalk__\n\
    class ParallelOptionsProbabilities  {\npublic:\nParallelOptionsProbabilities(int\
