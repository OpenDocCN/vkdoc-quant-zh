    int main()

    {

    std::unique_ptr<FinancialStatement> fs = getSampleStatement();

    // do some real work here...

    return 0;

    // the unique pointer is released at the end of the scope...

    }

    Listing 3-2

    FinancialStatement.h

    ```


    ### 转移所有权


    在前面的例子中，您看到了如何使用 unique 指针将对象的所有权转移给函数的调用者。这种智能指针的另一个重要用途是告知调用者：被调用函数将接管所传递对象的所有权。


    例如，考虑 `transferFinancialStatement` 函数，其定义如下：


    ```

    void transferFinancialStatement(std::unique_ptr<FinancialStatement> statement);

    ```


    参数 `statement` 是一个指向 `FinancialStatement` 对象的 unique 指针，这意味着一旦它接收到该特定类型的参数，它将成为该对象的所有者。因此，`transferFinancialStatement`
    可以放心地使用 `statement` 对象，因为它知道自己是其内容的唯一所有者。根据需要对对象执行的操作，这可能是一个重要的优势。


    该函数的示例实现如下：


    ```

    void transferFinancialStatement(std::unique_ptr<FinancialStatement> &statement)

    {

    // perform transfer here

    // ...

    // statement is still valid

    std::unique_ptr<FinancialStatement> another = std::move(statement);

    std::cout << another->getReturn() << std::endl;

    // statement is released here

    }

    ```


    这里需要理解的关键点是，被指向的对象会在 `transferFinancialStatement` 结束时被销毁，因为参数已被转移，从而在函数块的末尾超出作用域。


    ### Unique 指针的陷阱


    由于 unique 指针要求对引用数据拥有所有权的语义，程序员在尝试访问这种智能指针中存储的数据时，可能会发生一些错误。例如，一个常见的错误来源是使用接管指向对象所有权的函数。您可以通过我之前展示的
    `transferFinancialStatement` 函数来观察这类错误。当一个 unique 指针对象被传递给一个接管内存所有权的函数后，该 unique
    指针将不再有效，下次访问时可能导致程序崩溃。


    ```

    int main()

    {

    std::unique_ptr<FinancialStatement> fs = getSampleStatement();

    transferFinancialStatement(fs);

    // the unique_ptr object is invalid here, the next access can crash the program

    std::cout << fs->getReturn() << "\n";

    return 0;

    }

    ```


    这个例子展示了在 unique 指针转移了其指向对象的所有权后，程序是多么容易崩溃。这种情况发生在您调用 `transferFinancialStatement`
    函数时。


    下一行试图访问返回值，这会产生无效访问。在许多平台上，这将导致段错误。为了避免这种无效访问，程序员需要谨慎区分调用接受 unique 指针的函数与接受原生指针的函数。


    Unique 指针的另一个陷阱是它们对 STL 容器缺乏支持。例如，不可能将 unique 指针作为 `std::vector` 的成员。这是因为大多数容器通过按值复制元素来工作，这实际上会使现有
    unique 指针中存储的数据失效。此外，许多 STL 容器的算法会对其包含的数据执行内部复制。这意味着此类算法可能会在没有预先通知的情况下销毁原始元素：这是一个非常尴尬的情况。出于这些原因，建议在处理
    STL 容器时避免使用 unique 指针。


    为了避免 `std::unique_ptr` 带来的问题，引入了另一种智能指针类型：`std::shared_ptr` 模板提供了可由不同所有者共享的指针语义。在下一节中，您将看到一个如何使用这种共享指针对象的示例。


    ## 确定信用评级


    创建一个类来确定给定证券的信用评级。


    ### 解决方案


    信用风险评级由认可的评级机构定义，用于确定机构的风险。借助这些信息，投资者可以确定特定债券或持股的风险水平，并控制他们愿意承担的风险程度。例如，养老基金和保险公司等风险规避型投资者通常不愿投资于任何未经认证为顶级（通常为
    AAA）的机构。全球金融机构主要使用三家信用评级机构：穆迪、标准普尔和惠誉。它们不仅为公司，还为地方、州和国家层面的政府定义风险等级。


    为了在 C++ 中建模信用评级，我创建了一个独立的类，封装了信用风险评级背后的基本概念。`CreditRisk` 类有一个名为 `getRating` 的成员函数，它返回特定股票或债券的当前风险评级。第二个类名为
    `RiskCalculator`，用于根据投资组合中每个组成部分的一组风险评级，对特定投资组合的相关风险进行简单分析。

