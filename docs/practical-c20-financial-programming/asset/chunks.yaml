    # Using Lua as an Extension Language


    Use Lua as an extension library for classes written in C++.


    ## Solution


    Lua is a scripting language that was designed to provide extension mechanisms
    for C and C++ code and to work as an embedded language for other applications.
    In this respect, it has been very successful, with a large number of software
    products that currently use Lua to implement extension modules based on existing
    C and C++ class libraries. Examples of such uses can be found in computer games,
    image-processing packages, and software for the financial industry.


    The success of Lua is linked to its simple system, which tries to mix as closely
    as possible with the C and C++ environment. With this goal in mind, Lua offers
    only the basic mechanisms necessary to build a dynamic, garbage-collected runtime
    system. These features of the language have made it an easy choice for the creation
    of programmatic extensions to large-scale application code bases.


    You can download Lua in its source form from the main website [`http://lua.org`](http://lua.org).
    The easiest way to integrate Lua into a C++ project is to add the source files
    directly. You can also decide to create a separate library containing the Lua
    interpreter and link it to your application, using information made available
    in the Lua documentation. To use Lua as an extension language, the first step
    is to import and initialize the Lua runtime engine. This can be done using the
    Lua C API, which is part of the standard installation of the language. The main
    header file, `lua.h`, gives developers access to the main features of the runtime
    engine, as well as to Lua’s standard library.


    The following is the main function for the example application, where you can
    see the sequence of operations necessary to load Lua into your program:


    ```

    int main (void) {

    char buff[256];

    lua_State *L = luaL_newstate();

    int error;

    // load some of the (C) libraries included with Lua

    luaopen_base(L);

    luaopen_table(L);

    luaopen_io(L);

    luaopen_string(L);

    luaopen_math(L);

    // load LuaOption object

    LuaWrapper::Register(L);

    while (fgets(buff, sizeof(buff), stdin) != NULL) {

    error = luaL_loadbuffer(L, buff, strlen(buff), "line") ||

    lua_pcall(L, 0, 0, 0);

    if (error) {

    cerr << lua_tostring(L, -1) << endl;

    lua_pop(L, 1);  // remove error from Lua stack

    }

    lua_close(L);

    return 0;

    }

    ```


    Most of the functions in this API use the `lua_State` structure as a parameter.
    As you can see in the aforementioned example, you can create a new `lua_State`
    object using the `luaL_newstate` function. Once this initialization step has been
    completed, you can load some of the libraries included with the Lua runtime. It
    is possible to choose subsets of the library using functions such as `luaopen_string`
    and `luaopen_math`, which load Lua functions to handle strings and math operations,
    respectively.


    The next step is to load any user-defined libraries that you might need into Lua
    data tables. The Lua language is organized in such a way that its dynamic information
    is stored in a stack, that is, a first-in/first-out data structure. There is a
    global stack, where the equivalent of global variables is stored. You can use
    this stack to store new tables as necessary. To store individual values, you push
    them into the stack using functions such as `lua_pushstring`, `lua_pushnumber`,
    or `lua_pushclosure` (for functions). You can read data from the top of the stack
    using functions such as `lua_tonumber`.


    Another thing that can be done with the Lua runtime is to directly call one of
    the Lua functions. To call a function, you need to push the name of the function
    you want to call into the stack, followed by the required parameters. Next, you
    need to call the function `lua_pcall`, which performs the call. You can see an
    example for `lua_pcall` at the end of the `main` function presented previously.
    Finally, you can access the results of the function, which on return are stored
    at the top of the stack.


    While this initially seems to be a lot of work, it can be done easily because
    of the generic nature of the Lua extension API. I provide an example of how to
    access a C++ class from Lua code using the `Option` class, which contains just
    two data members: a ticker (string) and the strike price (double). The original
    class is accessed from Lua using the class `LuaOption`. The reason this is necessary
    has to do with the fact that Lua can interact only with functions that receive
    a parameter of type `lua_State`. Each method of `LuaOption` retrieves the data
    from the stack, calls the corresponding method in the `Option` class, and returns
    the results in the stack. Finally, the `LuaOption` class is registered with the
    help of the template `LuaWrap`.


    ### Complete Code


    The example in Listing [15-4](#323908_2_En_15_Chapter.xhtml#PC14) shows how to
    use the Lua API to embed an extension language into your application. The only
    class exposed in this example is the `Option` class. The class `LuaOption` is
    a simple wrapper for `Option`, and it is responsible for converting parameters
    from and to Lua types. The main function has the ability of loading a Lua file
    and calling any functions contained in it.'
