  trans: "\n`0=1+3*x*–6=–5+3*x*`  \n这意味着 ![$$ x=\\frac{5}{3} $$](img/323908_2_En_9_Chapter_TeX_IEq9.png)\
    \ 是割线与 x 轴的交点。你很容易看到，如图 9-2 所示，割线与 x 轴的交点是一个点（称之为 *x*[2]），它比先前更靠近方程的根。这一过程可以用由\
    \ *x*[0] 和 *x*[2] 定义的新区间重复进行，直到方程的根被逼近到误差（可由算法预定义）很小的范围内。\n\n对刚才展示的 `h(x)=` 方程进行推广，割线的方程可表示为\
    \  \n\n![$$ h(x)={y}_1+\\frac{y_1-{y}_0}{x_1-{x}_0}\\left(x-{x}_1\\right). $$](img/323908_2_En_9_Chapter_TeX_Equb.png)\n\
    \n当该方程与直线 `y=0` 相交时，我们有  \n\n![$$ {y}_1+\\frac{y_1-{y}_0}{x_1-{x}_0}\\left(x-{x}_1\\\
    right)=0, $$](img/323908_2_En_9_Chapter_TeX_Equc.png)  \n\n由此得出结果  \n\n![$$ x={x}_1-\\\
    frac{y_1\\left({x}_1-{x}_0\\right)}{y_1-{y}_0} $$](img/323908_2_En_9_Chapter_TeX_Equd.png)\n\
    \n利用这个方程，我们可以计算出将在算法下一步使用的新点 *x*。总结上述步骤，求方程根的割线法可以描述如下：\n\n1. 定义一个初始区间 `(a,b)`，你希望在该区间内搜索方程的一个或多个根。\
    \  \n2. 计算 *f*(*a*) 和 *f*(*b*) 的值。  \n3. 利用方程确定割线  \n\n   ![$$ h(x)=f(b)+\\frac{f(b)-f(a)}{b-a}\\\
    left(x-b\\right) $$](img/323908_2_En_9_Chapter_TeX_Eque.png)  \n\n4. 利用该方程，找到交点\
    \  \n\n   ![$$ c=b-\\frac{f(b)\\left(b-a\\right)}{f(b)-f(a)} $$](img/323908_2_En_9_Chapter_TeX_Equf.png)\
    \  \n\n5. 如果差值 |*c* – *b*| 的长度小于误差（阈值）*E*，则停止并将 *c* 报告为解。否则，继续执行步骤 1。\n\n注意到，对于某些函数，该算法收敛到解的速度比二分法更快。这是因为割线法利用了函数中已有的信息，这使得中间点更接近真实解。你可以在\
    \ `SecantSolver` 类中找到一个针对所讨论算法的实现。该类的设计与 `BisectionSolver` 类似，因为所讨论的问题相同。主要变化在于使用了不同的中点选择过程，这使得该算法与\
    \ `BisectionSolver` 中给出的算法略有不同。\n\n## 完整代码\n\n```\n// SecantMethod.h\n//\n#ifndef\
    \ SECANTMETHOD_H_\n#define SECANTMETHOD_H_\ntemplate \nclass MathFunction;\nclass\
    \ SecantMethod {\npublic:\nSecantMethod(MathFunction &f);\nSecantMethod(const\
    \ SecantMethod &p);\nSecantMethod &operator=(const SecantMethod &p);\n~SecantMethod();\n\
    double getRoot(double x1, double x2);\nprivate:\nMathFunction &m_f;\ndouble m_error;\n\
    };\n#endif /* SECANTMETHOD_H_ */\n// SecantMethod.cpp\n//\n#include \"SecantMethod.h\"\
    \n#include \"MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\n\
    namespace {\nconst double DEFAULT_ERROR = 0.001;\n}\nSecantMethod::SecantMethod(MathFunction\
    \ &f)\n: m_f(f),\nm_error(DEFAULT_ERROR)\n{\n}\nSecantMethod::SecantMethod(const\
    \ SecantMethod &p)\n: m_f(p.m_f),\nm_error(p.m_error)\n{\n}\nSecantMethod::~SecantMethod()\n\
    {\n}\nSecantMethod &SecantMethod::operator=(const SecantMethod &p)\n{\nif (this\
    \ != &p)\n{\nm_f = p.m_f;\nm_error = p.m_error;\n}\nreturn *this;\n}\ndouble SecantMethod::getRoot(double\
    \ x1, double x2)\n{\ndouble root = 0;\ndouble fa = m_f(a);\ndouble fb = m_f(b);\n\
    double c = 0, fc = 0;\ndo\n{\nc = b - fb*(b-a)/(fb-fa);\nroot = c;\nfc = m_f(c);\n\
    cout  \"  m_error);\nreturn root;\n}\n// ---- 这是针对一个示例函数的实现\nnamespace {\nclass\
    \ F2 : public MathFunction {\npublic:\nvirtual ~F2();\nvirtual double operator()(double\
    \ value);\n};\nF2::~F2()\n{\n}\ndouble F2::operator ()(double x)\n{\nreturn (x-1)*(x-1)*(x-1);\n\
    }\n}\nint main()\n{\nF2 f;\nSecantMethod sm(f);\ndouble root = sm.getRoot(-10,\
    \ 10);\ncout << \" the root of the function is \" << root << endl;\nreturn 0;\n\
    }\n```\n\n## 运行代码\n\n编译上述代码后，你可以运行它并得到以下结果，这些结果展示了示例方程 *f*(*x*) = (*x*–1)³ 的解：\n\
    \n```\n./secantMethod\n-> 2.92233 7.10369\n-> 2.85268 6.35922\n-> 2.25777 1.98976\n\
    -> 1.98685 0.96108\n-> 1.73375 0.395035\n-> 1.5571 0.172905\n-> 1.41961 0.0738799\n\
    -> 1.31702 0.0318621\n-> 1.23923 0.0136922\n-> 1.18062 0.00589209\n-> 1.13634\
    \ 0.00253417\n-> 1.10292 0.00109016\n-> 1.07769 0.000468932\n-> 1.05865 0.000201717\n\
    -> 1.04427 8.67704e-05\n-> 1.03342 3.73252e-05\n-> 1.02523 1.60558e-05\n-> 1.01904\
    \ 6.90655e-06\n-> 1.01438 2.97092e-06\n-> 1.01085 1.27797e-06\n-> 1.00819 5.49731e-07\n\
    -> 1.00618 2.36472e-07\n-> 1.00467 1.01721e-07\n-> 1.00352 4.37562e-08\n-> 1.00266\
    \ 1.88221e-08\nthe root of the function is 1.00266\n```\n\n## 牛顿法\n\n创建一个 C++\
    \ 类来实现计算方程根的牛顿法。\n\n## 解决方案\n\n正如你在前面几节中看到的，仅使用二分法就可以为大量方程找到解。你还可以尝试利用函数的额外信息来提高收敛速度，比如在所需区间内使用函数的割线。进一步延伸这个想法，你就会得到最常用的方程求解方法之一，该方法归功于艾萨克·牛顿。\
    \  \n\n牛顿法求方程根利用函数的导数作为根位置的一阶近似。与你之前看到的两种方法类似，该过程是迭代的，并且在每一步中，你都可以更接近方程的真实根。最终，你将得到一个误差非常小的解，该误差可以在算法开始之前确定。\
    \  \n\n为了理解该方法的工作原理，再次考虑示例函数 *f*(*x*) = (*x*–1)³。该函数的导数很容易计算，因为它是一个多项式，导数为 *f’*(*x*)\
    \ = 3(*x*–1)²。现在，假设你从一个关于根值可能是什么的初始猜测开始（如果没有猜测，则将随机值作为起点）。将该初始猜测称为 *x*[0]。在该点，我们可以计算两个值：*f*(*x*[0])\
    \ 和 *f'*(*x*[0])。\n"
- fmt: "在[Figure 9-3](#323908_2_En_9_Chapter.xhtml#Fig3)中，你会看到之前给出的示例函数及其在点`x[0] =\
    \ 0`处的切线图。在该点处，`f(x[0]) = f(0) = -1`，且`f'(x[0]) = f'(0) = 3`。由于函数在某一点的导数代表了曲线在该点切线的斜率，我们可以根据以下公式计算出一个由给定方程的切线所确定的点`x[1]`：\n\
    \n![$$ {x}_1={x}_0-\\frac{f\\left({x}_0\\right)}{f^{\\prime}\\left({x}_0\\right)}=0-\\\
    frac{-1}{3}=\\frac{1}{3} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equg.png)\n\
    \n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig3_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3** 示例函数`f(x) = (x–1)³`及其在点`x[0] = 0`处的切线。你可以注意到，该切线与x轴相交于点`x1 =\
    \ 1/3`。这是使用牛顿法求给定函数根的第一步\n\n一旦找到x轴与切线的交点，你就有了求解给定方程根的新起点。请注意，每次找到新点时，算法都会越来越接近目标点，尽管可能需要几次迭代才能达到所需精度。与前两种情况一样，你可以将精度作为算法的参数来确定，一旦两次连续近似值之间的差值小于给定参数，就停止计算。这表明解正在收敛到根所在的位置。\n\
    总之，牛顿法通过依次寻找由函数切线确定的点来工作。当你越接近根时，切线与x轴交点的差异就会越小。停止条件是最后值与当前值之间的差值小于给定参数。\n\n基于以上信息，牛顿法的算法可以给出如下：\n\
    \n1. 定义一个初始值`x`，你希望从该值开始搜索方程的一个或多个根。\n2. 给定输入函数`f(x)`，确定其导数`f'(x)`。\n3. 计算目标值处的`f(x)`和`f'(x)`。\n\
    4. 使用`f'(x)`作为点`x`处切线的斜率，根据以下方程计算新点`x[1]`：\n   ![$$ {x}_1=x-\\frac{f(x)}{f^{\\\
    hbox{'}}(x)}. $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equh.png)\n\
    5. 计算`x`与`x[1]`之间的差值为`e = |x – x[1]|`。\n6. 如果`e`的值小于输入误差（阈值）`E`，则停止并报告`x`为解。否则，将`x[1]`重命名为`x`，并继续执行步骤1。\n\
    \n牛顿法不仅依赖于函数本身，还依赖于其导数，这既可以视为优点也可以视为缺点。有时，计算函数的导数非常容易，例如多项式函数和常见的三角函数，但情况并非总是如此。然而，牛顿法最大的优点是，与二分法和割线法不同，即使函数符号没有变化，它也能正常工作。\n\
    \n例如，考虑函数`f(x) = (x–1)²`。其图形如[Figure 9-4](#323908_2_En_9_Chapter.xhtml#Fig4)所示。请注意，与本章中看到的其他函数不同，该函数没有改变符号的地方。因此，如果不改变二分法，在这种情况下就无法找到根。另一方面，该函数显然具有导数，且处处可微，这使得使用牛顿法找到根成为可能。\n\
    \n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig4_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4** 一个连续的二次函数`(x–1)²`，它从未改变符号，但在`x = 1`处有一个单根\n\n在使用牛顿法时，我们需要考虑一个小问题：导数在某点可能为零。如果出现这种情况，下一个点就是未定义的，因为不允许除以零。然而，可以通过在算法中给当前点添加一个小值来避免这个困难。当然，存在更复杂的技术来解决这个问题，读者可以在众多关于数值算法的书籍中找到这些方法。\n\
    前面的算法是在C++类`NewtonMethod`中实现的，它为所有描述的步骤提供了必要的支持。该类的设计与你在二分法中看到的非常相似。然而，与二分法和割线法不同，`NewtonMethod`不仅依赖于函数，还依赖于其导数。这就是为什么在示例代码中，你会看到对两个函数`F3`和`DF3`的引用。它们是必要的，以便`NewtonMethod`类知道如何计算函数及其导数的值。\n\
    \n完整代码\n\n```cpp\n//\n// NewtonMethod.h\n#ifndef NEWTONMETHOD_H_\n#define NEWTONMETHOD_H_\n\
    template \nclass MathFunction;\nclass NewtonMethod {\npublic:\nNewtonMethod(MathFunction\
    \ &f, MathFunction &derivative);\nNewtonMethod(const NewtonMethod &p);\nvirtual\
    \ ~NewtonMethod();\nNewtonMethod &operator=(const NewtonMethod &p);\ndouble getRoot(double\
    \ initialValue);\nprivate:\nMathFunction &m_f;\nMathFunction &m_derivative;\n\
    double m_error;\n};\n#endif /* NEWTONMETHOD_H_ */\n//\n// NewtonMethod.cpp\n#include\
    \ \"NewtonMethod.h\"\n#include \"MathFunction.h\"\n#include \nusing std::endl;\n\
    using std::cout;\nnamespace {\nconst double DEFAULT_ERROR = 0.001;\n}\nNewtonMethod::NewtonMethod(MathFunction\
    \ &f, MathFunction &derivative)\n: m_f(f),\nm_derivative(derivative),\nm_error(DEFAULT_ERROR)\n\
    {\n}\nNewtonMethod::NewtonMethod(const NewtonMethod &p)\n: m_f(p.m_f),\nm_derivative(p.m_derivative),\n\
    m_error(p.m_error)\n{\n}\nNewtonMethod::~NewtonMethod()\n{\n}\nNewtonMethod &NewtonMethod::operator=(const\
    \ NewtonMethod &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_derivative = p.m_derivative;\n\
    m_error = p.m_error;\n}\nreturn *this;\n}\ndouble NewtonMethod::getRoot(double\
    \ x0)\n{\ndouble x1 = x0;\ndo\n{\nx0 = x1;\ncout  m_error);\nreturn x1;\n}\n//\
    \ ---- this is the implementation for an example function and its derivative\n\
    namespace {\nclass F3 : public MathFunction {\npublic:\nvirtual ~F3();\nvirtual\
    \ double operator()(double value);\n};\nF3::~F3()\n{\n}\ndouble F3::operator ()(double\
    \ x)\n{\nreturn (x-1)*(x-1)*(x-1);\n}\nclass DF3 : public MathFunction {\npublic:\n\
    virtual ~DF3();\nvirtual double operator()(double value);\n};\n// represents the\
    \ derivative of F3\nDF3::~DF3()\n{\n}\ndouble DF3::operator ()(double x)\n{\n\
    return 3*(x-1)*(x-1);\n}\n}\nint main()\n{\nF3 f;\nDF3 df;\nNewtonMethod nm(f,\
    \ df);\ncout << \" the root of the function is \" << nm.getRoot(100) << endl;\n\
    return 0;\n}\n```\n\n运行代码\n\n可以使用诸如UNIX上的`gcc`之类的编译器来编译和链接代码。要运行生成的可执行程序并查看其结果，请使用以下命令行：\n\
    \n```\n./newtonMethod\nx0 is 100\nx0 is 67\nx0 is 45\nx0 is 30.3333\nx0 is 20.5556\n\
    x0 is 14.037\nx0 is 9.69136\nx0 is 6.79424\nx0 is 4.86283\nx0 is 3.57522\nx0 is\
    \ 2.71681\nx0 is 2.14454\nx0 is 1.76303\nx0 is 1.50868\nx0 is 1.33912\nx0 is 1.22608\n\
    x0 is 1.15072\nx0 is 1.10048\nx0 is 1.06699\nx0 is 1.04466\nx0 is 1.02977\nx0\
    \ is 1.01985\nx0 is 1.01323\nx0 is 1.00882\nx0 is 1.00588\nx0 is 1.00392\nx0 is\
    \ 1.00261\nthe root of the function is 1.00174\n```\n\n该算法对函数`f(x) = (x–1)³`执行了牛顿法的步骤。请注意，即使从遥远的初始值100开始，算法在要求的误差范围内也收敛到了解1.0。"
  raw: "In Figure [9-3](#323908_2_En_9_Chapter.xhtml#Fig3), you will find a\nplot\
    \ of the function and its tangent at point *x*[0] = 0\nfor the example function\
    \ given previously. At that point, the value of\n*f*(*x*[*0*]) = *f*(0) = –1,\
    \ and\nthe value of\n*f'*(*x*[*0*]) = *f'*(0) = 3\\. Since\nthe derivative of\
    \ the function at a particular point represents the\nslope of the tangent to the\
    \ curve at that point, we\ncan calculate a point *x*[1], which is determined by\
    \ the\nline that is tangent with the given equation using the following\nformula:\n\
    \n![$$ {x}_1={x}_0-\\frac{f\\left({x}_0\\right)}{f^{\\prime}\\left({x}_0\\right)}=0-\\\
    frac{-1}{3}=\\frac{1}{3} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equg.png)\n\
    \n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig3_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3\nThe example function f(x) = (x–1)³ and its tangent at\npoint x[0] = 0\\\
    . You may notice that the tangent intersects the\nx-axis at point ![$$ {x}_1=\\\
    frac{1}{3} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq10.png).\
    \ This is\nthe first step in finding the root for the given function using Newton's\n\
    method\n\nOnce the intersection of the x-axis and the tangent has been found,\n\
    you have a new starting point for the determination of the root for the\ngiven\
    \ equation. Notice that, each time a new point is found, the\nalgorithm gets a\
    \ little closer to the desired point, although it may\ntake a few iterations to\
    \ achieve the desired precision. As in the\nprevious two cases, you can determine\
    \ the precision as a parameter to\nthe algorithm and stop the computation once\
    \ the difference between two\nsuccessive approximations is less than the given\
    \ parameter. This shows\nthat the solution is converging to a point where the\
    \ root is\nlocated.\nIn summary, Newton’s\nmethod works by successively finding\
    \ points that are determined\nby the tangent to the function. As you get closer\
    \ to the root, the\ndifference between the intersection of the tangent with the\
    \ x-axis will\nget smaller. The stopping condition is that difference between\
    \ the last\nand the current values is less than a given parameter.\n\nBased on\
    \ the previous information, the algorithm for Newton’s method can be\ngiven as\
    \ follows:\n\n1.  Define an initial value *x*, from which you want to search for\n\
    \    one or more roots of the equation.\n\n2.  Given the input function *f*(*x*),\
    \ determine the\n    derivative of function *f'*(*x*).\n\n3.  Calculate the values\
    \ of *f*(*x*) and\n    *f'*(*x*) for the desired value.\n\n4.  Using the value\
    \ *f*'(*x*) as the slope of the tangent\n    at the point *x*, calculate a new\
    \ point *x*[1]\n    using the following equation:\n\n![$$ {x}_1=x-\\frac{f(x)}{f^{\\\
    hbox{'}}(x)}. $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equh.png)\n\
    \n1.  Calculate the difference between *x* and\n    *x*[1] as\n    *e* = |*x*–*x*[1]|.\n\
    \n2.  If the value of *e* is less than the input error (threshold)\n    *E*, stop\
    \ and report *x* as the solution. Otherwise,\n    rename *x*[1] to *x* and continue\
    \ with step\n    1.\n\nThe fact that Newton’s\nmethod depends not only on the\
    \ function but also on its\nderivative can be seen as an advantage as well as\
    \ a disadvantage.\nSometimes, it is very easy to compute the derivative of a function,\
    \ such\nas for polynomial and common trigonometric functions, but that is not\n\
    always the case. However, the greatest advantage of Newton’s method is\nthat,\
    \ unlike the bisection and secant methods, it works even when there\nis no difference\
    \ in function sign.\n\nConsider, for example, the function\n*f*(*x*) = (*x*–1)².\
    \ Its graph is shown\nin Figure [9-4](#323908_2_En_9_Chapter.xhtml#Fig4). Notice\
    \ that,\nunlike other functions that you saw in this chapter, there is no place\n\
    where it changes sign. Therefore, without some changes to the bisection\nmethod,\
    \ it is not possible to find a root in this case. On the other\nhand, the function\
    \ clearly has a derivative, being differentiable\neverywhere, and this makes it\
    \ possible to find the root using Newton’s\nmethod.\n\n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig4_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\nA continuous, quadratic function (x–1)²  that never changes\nsign\
    \ but has a single root at x = 1\n\nA small issue that we need to consider when\
    \ using Newton’s method is\nthe possibility that the derivative is zero at some\
    \ point. If that is\nthe case, then the next point is undefined, since a division\
    \ by zero is\nnot permitted. This difficulty can be avoided, however, if the algorithm\n\
    adds a small value to the current point as a way to avoid the issue.\nMore sophisticated\
    \ techniques to solve this\nproblem exist, however, as the reader will be able\
    \ to find in one of the\nmany existing books on the topic of numerical algorithms.\n\
    The previous algorithm was coded in C++ in the class `NewtonMethod`, which\nprovides\
    \ the necessary support for all the steps described. The design\nof the class\
    \ is very similar to what you saw for the bisection method.\nUnlike the bisection\
    \ method and the secant method, however, `NewtonMethod` depends\nnot only on the\
    \ function but also on its derivative. That’s why in the\nexample code, you will\
    \ see a reference to two functions: F3 and DF3.\nThey are necessary so that the\
    \ `NewtonMethod` class\nknows how to find the value of the function and its derivative.\n\
    \nComplete Code\n\n```\n//\n// NewtonMethod.h\n#ifndef NEWTONMETHOD_H_\n#define\
    \ NEWTONMETHOD_H_\ntemplate \nclass MathFunction;\nclass NewtonMethod {\npublic:\n\
    NewtonMethod(MathFunction &f, MathFunction &derivative);\nNewtonMethod(const NewtonMethod\
    \ &p);\nvirtual ~NewtonMethod();\nNewtonMethod &operator=(const NewtonMethod &p);\n\
    double getRoot(double initialValue);\nprivate:\nMathFunction &m_f;\nMathFunction\
    \ &m_derivative;\ndouble m_error;\n};\n#endif /* NEWTONMETHOD_H_ */\n//\n// NewtonMethod.cpp\n\
    #include \"NewtonMethod.h\"\n#include \"MathFunction.h\"\n#include \nusing std::endl;\n\
    using std::cout;\nnamespace {\nconst double DEFAULT_ERROR = 0.001;\n}\nNewtonMethod::NewtonMethod(MathFunction\
    \ &f, MathFunction &derivative)\n: m_f(f),\nm_derivative(derivative),\nm_error(DEFAULT_ERROR)\n\
    {\n}\nNewtonMethod::NewtonMethod(const NewtonMethod &p)\n: m_f(p.m_f),\nm_derivative(p.m_derivative),\n\
    m_error(p.m_error)\n{\n}\nNewtonMethod::~NewtonMethod()\n{\n}\nNewtonMethod &NewtonMethod::operator=(const\
    \ NewtonMethod &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_derivative = p.m_derivative;\n\
    m_error = p.m_error;\n}\nreturn *this;\n}\ndouble NewtonMethod::getRoot(double\
    \ x0)\n{\ndouble x1 = x0;\ndo\n{\nx0 = x1;\ncout  m_error);\nreturn x1;\n}\n//\
    \ ---- this is the implementation for an example function and its derivative\n\
    namespace {\nclass F3 : public MathFunction {\npublic:\nvirtual ~F3();\nvirtual\
    \ double operator()(double value);\n};\nF3::~F3()\n{\n}\ndouble F3::operator ()(double\
    \ x)\n{\nreturn (x-1)*(x-1)*(x-1);\n}\nclass DF3 : public MathFunction {\npublic:\n\
    virtual ~DF3();\nvirtual double operator()(double value);\n};\n// represents the\
    \ derivative of F3\nDF3::~DF3()\n{\n}\ndouble DF3::operator ()(double x)\n{\n\
    return 3*(x-1)*(x-1);\n}\n}\nint main()\n{\nF3 f;\nDF3 df;\nNewtonMethod nm(f,\
    \ df);\ncout << \" the root of the function is \" << nm.getRoot(100) << endl;\n\
    return 0;\n}\n```\n\nRunning the Code\n\nThe code can be compiled and linked\n\
    using a compiler such as gcc on UNIX. To run the resulting program and\nsee its\
    \ associated results, use the following command line:\n\n```\n./newtonMethod\n\
    x0 is 100\nx0 is 67\nx0 is 45\nx0 is 30.3333\nx0 is 20.5556\nx0 is 14.037\nx0\
    \ is 9.69136\nx0 is 6.79424\nx0 is 4.86283\nx0 is 3.57522\nx0 is 2.71681\nx0 is\
    \ 2.14454\nx0 is 1.76303\nx0 is 1.50868\nx0 is 1.33912\nx0 is 1.22608\nx0 is 1.15072\n\
    x0 is 1.10048\nx0 is 1.06699\nx0 is 1.04466\nx0 is 1.02977\nx0 is 1.01985\nx0\
    \ is 1.01323\nx0 is 1.00882\nx0 is 1.00588\nx0 is 1.00392\nx0 is 1.00261\nthe\
    \ root of the function is 1.00174\n```\n\nThe algorithm  executes the steps for\n\
    Newton’s method for the function\n*f*(*x*) = (*x*–1)³. Notice that even\nwhen\
