    {\n}\nCashFlowCalculator::CashFlowCalculator(const CashFlowCalculator &v)\n: m_rate(v.m_rate)\n\
    {\n}\nCashFlowCalculator::~CashFlowCalculator()\n{\n}\nCashFlowCalculator &CashFlowCalculator::operator\
    \ =(const CashFlowCalculator &v)\n{\nif (this != &v)\n{\nthis->m_cashPayments\
    \ = v.m_cashPayments;\nthis->m_timePeriods = v.m_timePeriods;\nthis->m_rate =\
    \ v.m_rate;\n}\nreturn *this;\n}\nvoid CashFlowCalculator::addCashPayment(double\
    \ value, int timePeriod)\n{\nm_cashPayments.push_back(value);\nm_timePeriods.push_back(timePeriod);\n\
    }\ndouble CashFlowCalculator::presentValue(double futureValue, int timePeriod)\n\
    {\ndouble pValue = futureValue / pow(1+m_rate, timePeriod);\nstd::cout \n// the\
    \ main function receives parameters passed to the program\nint main(int argc,\
    \ const char * argv[])\n{\nif (argc != 2)\n{\nstd::cout \" > period;\nif (period\
    \ == -1) {\nbreak;\n}\ndouble value;\nstd::cin >> value;\ncfc.addCashPayment(value,\
    \ period);\n} while (1);\ndouble result = cfc.presentValue();\nstd::cout << \"\
    \ The present value is \" << result << std::endl;\nreturn 0;\n}\nListing 1-4\n\
    CashFlowCalculator.h\n```\n\n### Running the Code\n\nThe program can be compiled\
    \ using a standards-compliant C++ compiler such as GCC on Linux or Mac OS X. The\
    \ resulting program can be executed in the following way:\n\n```\n./presentValue\
    \ 0.08\n1 200\n2 300\n3 500\n4 -1000\n\nvalue 190.476\nvalue 272.109\nvalue 431.919\n\
    value -822.702\nThe present value is 71.8014\n```\n\nThe first few lines display\
    \ the input for the program. The command line argument (in this case `0.08`) is\
    \ the desired interest rate—it is used as the parameter to the class constructor.\
    \ The following lines are a sequence of the time periods and payment values. The\
    \ last line of the sequence is marked using the number `-1`. When that number\
    \ is read, the program stops reading the input and starts to calculate the PV\
    \ of the given cash transfers, in the order in which they were received.\n\nThe\
    \ last few lines display the output of the program. The code prints the PV for\
    \ each component of the cash flow. Finally, it prints the PV of the whole sequence\
    \ of payments. To use this program to validate a common fixed income instrument,\
    \ such as a loan, you should input each pair of time period–payment value. At\
    \ the end of the calculation, the PV should add to zero (or close to zero, due\
    \ to possible numerical inaccuracies).\n\n## Modeling Bonds\n\nBonds are a very\
    \ common type of fixed income instrument. They are used by large corporations\
    \ and governments all over the world to attract cash investments that will be\
    \ repaid in the long term. In exchange, they offer the guaranteed payment of a\
    \ periodic coupon. Most bonds mature (are paid off) in a time period between 5\
    \ and 30 years.\n\n### Problem\n\nCreate a C++ class to model a bond instrument\
    \ and determine its annual interest rate.\n\n### Solution\n\nBonds are structured\
    \ in such a way that the investor deposits the principal value at the beginning\
    \ of the term of the bond. Frequently, the principal is repaid in its entirety\
    \ at maturity. Between the period between the initial investment and its maturity,\
    \ investors are paid a constant value, also called the coupon value, which determines\
    \ the interest rate paid by the bond.\n\nFor example, consider a 30-year, $100,000\
    \ bond investment in company XYZ, with an annual coupon of $5,000. This translates\
    \ into a fixed income investment that pays a 5% interest on the principal. Company\
    \ XYZ has the right to use the principal during the specified period of time,\
    \ and the total value of the principal is returned to the investor in 30 years\
    \ at maturity.\n\nTo model this kind of investment using C++, you can create a\
    \ class that contains the needed information, such as principal value, coupon\
    \ value, and maturity period. The class has the following declaration:\n\n```\n\
    class BondCalculator {\npublic:\nBondCalculator(const std::string institution,\
    \ int numPeriods, double principal, double couponValue);\nBondCalculator(const\
    \ BondCalculator &v);\nBondCalculator &operator =(const BondCalculator &v);\n\
    ~BondCalculator();\ndouble interestRate();\nprivate:\nstd::string m_institution;\n\
    double m_principal;\ndouble m_coupon;\nint m_numPeriods;\n};\n```\n\nThis class\
    \ has member variables that store the name of the institution that originates\
    \ the bond (known as the issuer), the principal invested, the coupon amount, and\
    \ the number of periods (usually defined in years). The class can be used to record\
    \ information about bond investments as part of an application that tracks such\
    \ fixed income investments. The `interestRate` method can be used to return the\
    \ internal rate of returned implied by the coupon.\n\n### Complete Code\n\nListing\
    \ [1-5](#323908_2_En_1_Chapter.xhtml#PC15) shows a complete listing for class\
    \ `BondCalculator`. The code is split into a header file and an implementation\
    \ file. You can also check a sample usage contained in the `main` function.\n\n\
    ```\n//\n//  BondCalculator.h\n#ifndef __FinancialSamples__BondCalculator__\n\
    #define __FinancialSamples__BondCalculator__\nclass BondCalculator {\npublic:\n\
    BondCalculator(const std::string institution, int numPeriods, double principal,\
    \ double couponValue);\nBondCalculator(const BondCalculator &v);\nBondCalculator\
    \ &operator =(const BondCalculator &v);\n~BondCalculator();\ndouble interestRate();\n\
    private:\nstd::string m_institution;\ndouble m_principal;\ndouble m_coupon;\n\
    int m_numPeriods;\n};\n#endif /* defined(__FinancialSamples__BondCalculator__)\
    \ */\n//\n//  BondCalculator.cpp\n#include \"BondCalculator.h\"\nBondCalculator::BondCalculator(const\
    \ std::string institution, int numPeriods,\ndouble principal, double couponValue)\n\
    : m_institution(institution),\nm_numPeriods(numPeriods),\nm_principal(principal),\n\
    m_coupon(couponValue)\n{\n}\nBondCalculator::BondCalculator(const BondCalculator\
    \ &v)\n: m_institution(institution),\nm_numPeriods(v.m_numPeriods),\nm_principal(v.m_principal),\n\
    m_coupon(v.m_coupon)\n{\n}\nBondCalculator::~BondCalculator()\n{\n}\nBondCalculator\
    \ &BondCalculator::operator =(const BondCalculator &v)\n{\nif (this != &v)\n{\n\
    this->m_institution = v.m_institution;\nthis->m_principal = v.m_principal;\nthis->m_numPeriods\
    \ = v.m_numPeriods;\nthis->m_coupon = v.m_coupon;\n}\nreturn *this;\n}\ndouble\
    \ BondCalculator::interestRate()\n{\nreturn m_coupon / m_principal;\n}\n// the\
    \ main function receives parameters passed to the program\nint main(int argc,\
    \ const char * argv[])\n{\nif (argc != 4)\n{\nstd::cout    \"\n<< std::endl;\n\
    return 1;\n}\nstd::string issuer = argv[1];\ndouble principal = atof(argv[2]);\n\
    double coupon = atof(argv[3]);\nint num_periods = atoi(argv[4]);\nBondCalculator\
    \ bc(issuer, principal, coupon, num_periods);\nstd::cout << \"reading information\
    \ for bond issued by \" << issuer << std::endl;\nstd::cout << \" the internal\
    \ rate of return is \" << bc.interestRate() << std::endl;\nreturn 0;\n}\nListing\
    \ 1-5\nBondCalculator.h\n```"
