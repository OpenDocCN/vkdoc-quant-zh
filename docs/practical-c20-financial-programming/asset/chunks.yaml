  trans: "\n### 运算符重载\n\n大多数编程语言都使用运算符为常见操作提供更简洁的语法。例如，`+` 运算符用于实现数字的加法，无需使用名为 `sum`\
    \ 的函数。因此，我们可以输入以下表达式：\n\n```\nint total = a + b + c + d;\n```\n\n而不是下面这种不够便捷的版本：\n\
    \n```\nint total = sum(a, sum(b, sum(c, d)));\n```\n\n类似地，其他运算符也为其他基本操作执行类似任务，例如减法、乘法、逻辑比较和指针运算。\n\
    \n虽然大多数现代编程语言都提供运算符，但 C++ 是少数允许程序员重新定义现有运算符含义的语言之一，使其适应目标领域中最自然的用法。例如，在向量是常见数据结构的应用中，重新定义\
    \ `+` 运算符以执行向量加法，同时保留其传统标量数值加法功能，是合理的做法。\n\nC++ 允许为每个新声明的类型定义运算符。运算符可以定义为类的一部分（作为成员函数），也可以定义为独立函数。例如，考虑一个重新定义了\
    \ `+` 运算符的 `Complex` 类。该运算符的声明可以写成：\n\n```\nclass complex {\npublic:\n// ... 此处为其他方法\n\
    complex &operator +(const complex &v);\n};\n```\n\n编写相同运算符的另一种方式是使用自由函数：\n\n```\n\
    Complex &operator +(const complex &a, const complex &b);\n```\n\n这两种声明之间的区别在于，后者声明了一个接收两个参数的函数，而成员函数版本只需要一个额外参数（第一个参数是对象本身）。类似地，你可以声明大多数\
    \ C++ 运算符的新版本，包括数学、逻辑和指针运算符。\n\n为了解决提出的问题，我们创建了一个名为 `NumVector` 的新类，它是一个简单的数值向量，可用于存储双精度浮点数。为了以自然的方式提供可应用于向量的操作，我们使用声明为自由函数的运算符：\n\
    \n```\nNumVector operator +(const NumVector &a, const NumVector &b);\nNumVector\
    \ operator -(const NumVector &a, const NumVector &b);\nNumVector operator *(const\
    \ NumVector &a, const NumVector &b);\n```\n\n该类还提供了一些成员函数，用于实现这些操作。具体来说，你需要拥有成员函数\
    \ `add`（用于向向量添加新元素）、`removeLast`（用于移除最后一个元素）、`get`（用于根据位置（索引）返回其中一个元素），以及一个 `size`\
    \ 成员函数（用于返回向量的大小）。\n\n所有运算符都以类似的方式实现：它们都检查两个参数是否具有相同的大小，然后执行一个循环，用于执行所需的操作——加法、减法或乘法。\n\
    \n### 完整代码\n\n列表 3-5 提供了一个数值向量的示例实现。你可以使用此类创建数值向量并执行常见的向量操作。\n\n```\n//\n//  NumVector.h\n\
    #ifndef __FinancialSamples__NumVector__\n#define __FinancialSamples__NumVector__\n\
    #include \nclass NumVector {\npublic:\nNumVector();\n~NumVector();\nNumVector(const\
    \ NumVector &);\nNumVector &operator =(const NumVector &);\nvoid add(double val);\n\
    void removeLast();\ndouble get(int pos) const;\nsize_t size() const;\nprivate:\n\
    std::vector m_values;\n};\nNumVector operator +(const NumVector &a, const NumVector\
    \ &b);\nNumVector operator -(const NumVector &a, const NumVector &b);\nNumVector\
    \ operator *(const NumVector &a, const NumVector &b);\n#endif /* defined(__FinancialSamples__NumVector__)\
    \ */\n//\n//  NumVector.cpp\n#include \"NumVector.h\"\n#include \nNumVector::NumVector()\n\
    {\n}\nNumVector::~NumVector()\n{\n}\nNumVector::NumVector(const NumVector &v)\n\
    : m_values(v.m_values)\n{\n}\nNumVector &NumVector::operator=(const NumVector\
    \ &v)\n{\nif (this != &v)\n{\nm_values = v.m_values;\n}\nreturn *this;\n}\nsize_t\
    \ NumVector::size() const\n{\nreturn m_values.size();\n}\ndouble NumVector::get(int\
    \ pos) const\n{\nreturn m_values[pos];\n}\nvoid NumVector::add(double val)\n{\n\
    m_values.push_back(val);\n}\nvoid NumVector::removeLast()\n{\nm_values.pop_back();\n\
    }\nNumVector operator +(const NumVector &a, const NumVector &b)\n{\nif (a.size()\
    \ != b.size())\n{\nthrow new std::runtime_error(\"vectors must have the same size\"\
    );\n}\nNumVector result;\nfor (int i=0; i<a.size(); ++i)\n{\nresult.add(a.get(i)\
    \ + b.get(i));\n}\nreturn result;\n}\nNumVector operator -(const NumVector &a,\
    \ const NumVector &b)\n{\nif (a.size() != b.size())\n{\nthrow new std::runtime_error(\"\
    vectors must have the same size\");\n}\nNumVector result;\nfor (int i=0; i<a.size();\
    \ ++i)\n{\nresult.add(a.get(i) - b.get(i));\n}\nreturn result;\n}\nNumVector operator\
    \ *(const NumVector &a, const NumVector &b)\n{\nif (a.size() != b.size())\n{\n\
    throw new std::runtime_error(\"vectors must have the same size\");\n}\nNumVector\
    \ result;\nfor (int i=0; i<a.size(); ++i)\n{\nresult.add(a.get(i) * b.get(i));\n\
    }\nreturn result;\n}\n列表 3-5\nNumVector.h\n```\n"
- fmt: '# Conclusion


    C++ is a complex language, which provides mechanisms for the creation of software
    using one or more among several paradigms, such as structured, object-oriented,
    and functional programming. As a result, it is necessary to develop a set of techniques
    that are more appropriate for the development of financial software while avoiding
    unproductive practices that obfuscate programs and hinder our ability to modify
    them. Over the years, financial engineers have successfully used a number of C++
    idioms that make it easier to use the speed and abstraction facilities of the
    language.


    In this chapter, I discussed a few programming examples that introduced and reviewed
    some of these useful C++ programming techniques, which are commonly employed in
    the development of financial applications. First, I reviewed the concept of templates,
    which let programmers write generic code that can be applied to several classes.
    In the first code sample, you learned how to design an interest rate calculation
    engine that is independent of the definition of interest rate classes. This type
    of design is very useful in the creation of large-scale financial applications.


    Next, you learned how to define financial statement objects that can be sent to
    other parts of the application while reducing the occurrence of memory leaks.
    For this purpose, I explained the use of smart pointers as a way of making automatic
    decisions about the lifetime of objects. In particular, you learned about the
    `std::unique_ptr` template, which implements the semantics of auto-released, self-owned
    pointers.


    The next section dealt again with memory management issues, this time in the context
    of determining credit ratings from rating agencies. In this case, you learned
    how to share rating information in such a way that the memory would be automatically
    destroyed even when several users had copies of the object. For this purpose,
    you can learn about the `std::shared_ptr` template, which uses a reference counting
    mechanism to determine the correct moment to delete memory, therefore avoiding
    memory leaks. You have also seen the use of the `auto` keyword to simplify type
    detection with STL containers. Both `shared_ptr` and the `auto` keyword are new
    features introduced with the C++11 standard, which is currently implemented by
    all modern C++ compilers.


    Another important technique in C++ involves the handling of unexpected conditions.
    The exception-based mechanism provided by C++ allows programmers to deal with
    infrequent conditions in a clean way. You have seen an example of such policies
    applied to the problem of processing trading operations stored in a data file.


    Finally, this chapter has considered the problem of implementing mathematical
    operations applied to a sequence of numbers. For this purpose, we created a new
    class called `NumVector`, which stores numbers in a sequence. To implement the
    addition, subtraction, and multiplication of vectors in a natural way, we used
    the operator overloading mechanism provided by C++. In this way, an application
    can perform vector operations using operators already present in the language,
    redefined so that they can be applied to your own types.


    In this chapter, you learned about general C++ techniques that have been successfully
    used in financial applications. In the next chapter, I explain how to use libraries
    that extend the language and offer useful functionality for financial software
    developers. These libraries include facilities such as new data containers and
    algorithms, as well as more advanced techniques for memory management, as well
    as time and event handling.


    # 4. Common Libraries for Financial Applications


    Financial code implemented in C++ uses programming libraries designed to simplify
    the creation of fast, standard-conformant classes. The best example of such libraries
    is the STL (standard template library) itself, a convenient library that is included
    with standard-compliant C++ compilers. The STL offers a set of generic, commonly
    used containers that may be applied to almost any situation. Knowing how to employ
    well the STL is one of the main skills necessary for effective C++ programming,
    especially in the context of high-performance software development—a common requirement
    for financial applications. In this chapter, you will learn programming examples
    that clarify some of the most common uses of the STL for financial programming,
    including containers and algorithms.


    The boost project provides another set of commonly used classes. Although the
    standard language committee does not officially support boost libraries, some
    of them have been used as the basis for additions to the last few versions of
    the C++ standard library. Therefore, a good understanding of the classes and templates
    included in the boost repository is valuable as a way to have early access to
    functionality that will only later be made available in all C++ implementations.


    In the next few sections, we explore C++ examples that illustrate how these classes
    and templates are used in financial applications. Examples of important library
    components explored here include:


    - **Vectors**: These are containers used to manipulate objects of the same type.

    - **Maps**: STL containers that can be used to associate values to a set of keys,
    which can be of any type.

    - **Algorithms**: The STL also provides a rich set of algorithms that can be used
    to manipulate the standard containers. You can also extend the existing algorithms
    so that they can be applied to your own data structures. Similarly, you can use
    the ideas provided by STL to implement your own algorithms.

    - **Boost libraries**: The STL is the foundation for other useful libraries. Boost
    libraries are written by some of the C++ experts working on the language committee.
    Many of the components previously included in the boost library, such as `shared_ptr`,
    have since become part of the language.

    - **Time and date handling**: Financial applications are usually related to the
    processing of prices over specific time periods. To make this possible, it is
    necessary to use libraries to handle date uniformly.


    In the next sections, you will see a few selected programming examples that explore
    some of these C++ libraries in the context of financial applications.


    ## Handling Analyst Recommendations


    One of the common events around a particular stock is the release of analyst recommendations.
    Create a C++ class that handles analyst recommendations and returns the average
    target price for the stock.


    ### Solution


    Analyst recommendations are an important part of the Wall Street ecosystem. Many
    financial institutions such as pension funds and insurance companies, as well
    as retail investors, use analysts’ recommendations as a gauge of the predominant
    view about a particular stock. This in turn can be used to determine future capital
    allocation to a portfolio of stocks.


    Analyst recommendations come from one of the several institutions that provide
    public analysis of equity investments, generally from some of the major investment
    banks. The recommendation for a particular stock includes a defined action such
    as “buy,” “sell,” or “hold.” The recommendation also frequently includes a price
    target, which determines how much the analyst expects to be the “fair price” for
    the instrument.


    Since there are so many analysts covering the equities market, keeping track of
    recommendations is one of the important parts of the work of an institutional
    investor. In this section, you will create a C++ class to store this type of information
    and to answer some basic questions such as “what is the average target price for
    a particular stock?”


    The solution for this problem involves the use of STL containers to hold the data.
    In particular, you will use vectors to provide quick access to the data.'
