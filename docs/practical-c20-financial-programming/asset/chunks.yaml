- fmt: '**Chapter 13 — Asset and Portfolio Optimization**：投资组合经理必须根据其预定义的组合目标，面对为最优表现平衡投资组合的问题。基于优化的技术已被开发出来，用于处理一些最常见的投资组合构建问题。在本章中，我们考虑使用`C++`进行投资组合优化的算法。我们考虑如何设计这样的优化代码，以便获得尽可能快速和准确的结果。主题包括(1)创建投资组合模型，(2)执行资源分配，以及(3)使用线性技术进行投资组合优化。


    **Chapter 14 — Monte Carlo Methods**：在用于权益市场分析的其他编程技术中，蒙特卡罗模拟因其广泛的适用性和易于实现而占有特殊地位。例如，这些方法可用于预测价格或验证买入策略。在本章中，我提供可用作基于模拟算法一部分的编程示例，主题包括(1)随机数生成，(2)通过蒙特卡罗方法进行优化，以及(3)用于价格预测的模拟模型。


    **Chapter 15 — Extending Financial Libraries**：`C++`是一种完整的语言，可用于开发最复杂的软件。然而，有时将`C++`库与脚本语言结合使用是有益的，这可以简化原型和其他非关键应用程序的创建。在本章中，我将向您展示如何将文本中讨论的解决方案和算法用作金融行业常用脚本语言的外部库。特别是，您将学习如何(1)使用`Python`扩展`C++`，以及(2)使用`Lua`脚本扩展`C++`。


    **Chapter 16 — Using C++ Code with R and Maxima**：`C++`中的金融算法不仅可用作可执行代码的一部分，也可用作其他建模和开发环境的一部分。在本章中，我将向您展示如何将金融库集成到两个用于金融分析的知名仿真和建模环境中：`R`和`Maxima`。您将看到如何为这些环境创建可加载模块，以一种可供`R`和`Maxima`编写的脚本直接使用的方式整合复杂的`C++`算法。


    **Chapter 17 — Multithreading**：金融应用有非常严格的性能要求。提高响应时间的一种常见方法是使用并发和并行编程技术，例如多线程。`C++`可用于编写响应非常快的多线程应用程序，在本章中，我将探索用于创建和管理线程的算法，并应用于金融问题。我还涵盖了数据访问同步这一重要主题。主题包括(1)创建线程，(2)保护共享内存，(3)同步技术，以及(4)使用标准库的线程。


    **Appendix A — C++20 Features**：`C++`是一种不断发展的语言，在过去的几年中，我们看到了为带来亟需的更新而重新做出的努力。最新的成果是`C++17`和`C++20`标准，主要的`C++`编译器正在快速整合这些特性。在附录中，我涵盖了展示其中一些特性如何能改进您的代码并简化新程序和库开发的示例。您将学习到诸如(1)`auto`变量，(2)闭包，(3)右值，(4)`const`表达式，以及(5)初始化器列表等新特性。


    ## Introduction to the Second Edition


    在本书的第二版中，示例和文本已被修订以符合最新的`C++`标准，即`C++20`。虽然我们的大部分示例在新的标准下仍能编译并正常运行，但我们感到有必要介绍新的`C++`特性，这将使开发金融应用更加容易。


    例如，附录现在呈现了一些仅在`C++20`中可用新特性。我们还解释了如何在标准库中使用线程，以及其他改进。所有示例都已测试，以确保我们符合最新标准。


    ## Compiling the Code Samples


    本书中给出的示例已全部在`Windows`上使用`MingW gcc`编译器，以及在`Mac OS X`上使用`Xcode 12 IDE`进行了测试。然而，您应该能够使用任何实现`C++20`标准的、符合标准的`C++`编译器来构建代码。例如，`gcc`在`Linux`和其他平台上可用，`Microsoft
    Visual Studio`同样适用于`Windows`。


    如果您使用`Mac OS X`并且计算机上未安装`Xcode`，您可以免费从苹果开发者网站[`http://developer.apple.com`](http://developer.apple.com)下载。代码也可以在命令行编译，正如各章中所解释的那样。


    如果您希望在`Windows`上使用`MingW`，您可以从网站[`www.mingw.org`](http://www.mingw.org)下载。


    一旦`MingW`安装完成，从开始菜单的`MingW`程序组启动命令提示符。然后，您可以输入`gcc`来检查编译器是否正确安装。


    要下载完整的示例集，请访问本书的网页[`http://coliveira.net`](http://coliveira.net)，或导航至`apress.com/9781484268339`并点击
    **Download Source Code** 按钮。


