    \ Models\n\nExtend the `LPSolver` class so that it can deal with mixed-integer\
    \ programming (MIP) problems, that is, LP problems where one or more variables\
    \ are restricted to be integers."
  raw: "To find a solution for a two-dimensional LP model like the one\ndescribed\
    \ previously, you can concentrate on the intersections of all\nhalf-spaces defined\
    \ by the constraints. The intersection is, by\ndefinition of the problem, contained\
    \ in the first quadrant of the plot\nbecause it is known that *x* ≥ 0 and *y*\
    \ ≥ 0\\. It is\npossible then to recognize the area contained in the intersection\
    \ of all\nother half-spaces. The result is a polygonal area, whose border is\n\
    defined by a set of lines derived from the given constraints.\nTo find a solution\
    \ for such an\nLP, you just need to calculate the value of the objective function\
    \ at\neach of the corners of the area defined by the constraints. The corner\n\
    that gives the best value of the objective function is, by definition of\nthe\
    \ linear objective function, the best that can be found for the\nproblem.\nWhile\
    \ the process described previously is easy to perform for\ntwo-dimensional problems,\
    \ it becomes quite difficult to accomplish for\nhigher dimensions. As the number\
    \ of dimensions and constraints\nincreases, the number of corners grows exponentially.\
    \ It takes a more\nsophisticated algorithm (such as the simplex algorithm) to\
    \ find the best\ncorner of the multidimensional space that defines the optimum\
    \ solution\nfor the given LP.\nTo demonstrate how the problem is solved in practice,\
    \ I show you the\nC++ implementation of the proposed two-dimensional LP. The class,\
    \ called\n`TwoDimensionalLPSolver`\n, is a blueprint of how such a problem can\
    \ be implemented using\nthe `LPSolver`\ndescribed in the previous section.\nFirst,\
    \ you need to create the model, which is described using a\nmatrix *A*, a vector\
    \ *b* (the right-hand side of the\nconstraints), and a vector *c* (the cost vector).\
    \ The necessary\ndata is provided in the `main` function. Once\nthe data is available,\
    \ it can be used to create an object of class `LPSolver`. The `solve()` function\
    \  in the `LPSolver` class will\nthen perform any necessary data conversion and\
    \ call the GLPK library to\nfind the optimum solution.\n\nComplete Code\n\nListing\
    \ [12-2](#323908_2_En_12_Chapter.xhtml#PC6) gives the\ncomplete implementation\
    \ for the two-dimensional LP solver. Function\n`main()` presents\na sample use\
    \ of the class `TwoDimensionalLPSolver`.\n\n```\n//\n//  TwoDimensionalLPSolver.h\n\
    #ifndef __FinancialSamples__TwoDimensionalLPSolver__\n#define __FinancialSamples__TwoDimensionalLPSolver__\n\
    #include \nclass TwoDimensionalLPSolver {\npublic:\nusing Vector = std::vector;\n\
    TwoDimensionalLPSolver(const Vector &c, const Vector &A1, const Vector &A2, const\
    \ Vector &b);\nTwoDimensionalLPSolver(const TwoDimensionalLPSolver &p);\n~TwoDimensionalLPSolver();\n\
    TwoDimensionalLPSolver &operator=(const TwoDimensionalLPSolver &p);\nbool solveProblem(Vector\
    \ &results, double &objVal);\nprivate:\nstd::vector m_c;\nstd::vector m_A1;\n\
    std::vector m_A2;\nstd::vector m_b;\n};\n#endif /* defined(__FinancialSamples__TwoDimensionalLPSolver__)\
    \ */\n//\n//  TwoDimensionalLPSolver.cpp\n#include \"TwoDimensionalLPSolver.h\"\
    \n#include \"Matrix.h\"\n#include \"LPSolver.h\"\n#include \nusing std::vector;\n\
    using std::cout;\nusing std::endl;\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
    \ Vector &c, const Vector &A1,\nconst Vector &A2, const Vector &b)\n: m_c(c),\n\
    m_A1(A1),\nm_A2(A2),\nm_b(b)\n{\n}\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
    \ TwoDimensionalLPSolver &p)\n: m_c(p.m_c),\nm_A1(p.m_A1),\nm_A2(p.m_A2),\nm_b(p.m_b)\n\
    {\n}\nTwoDimensionalLPSolver::~TwoDimensionalLPSolver()\n{\n}\nTwoDimensionalLPSolver\
    \ &TwoDimensionalLPSolver::operator=(const TwoDimensionalLPSolver &p)\n{\nif (this\
    \ != &p)\n{\nm_c = p.m_c;\nm_A1 = p.m_A1;\nm_A2 = p.m_A2;\nm_b = p.m_b;\n}\nreturn\
    \ *this;\n}\nbool TwoDimensionalLPSolver::solveProblem(Vector &res, double &objVal)\n\
    {\nint size = m_b.size();\nMatrix A(size, 2);\nfor (int j=0; j A1 = { -2.1, 3.1,\
    \ 7.9};\nvector A2 = { 1, 1, 1 };\nvector c = { 5.3, 7.1 };\nvector b = { 3.4,\
    \ 4.3, 6 };\nTwoDimensionalLPSolver solver(c, A1, A2, b);\nvector results;\ndouble\
    \ objVal;\nsolver.solveProblem(results, objVal);\ncout << \"objVal : \" << objVal\
    \ << endl;\nfor (int i=0; i<results.size(); ++i)\n{\ncout << \" x\" << i << \"\
    : \" << results[i];\n}\ncout << endl;\nreturn 0;\n}\nListing 12-2\nHeader File\
    \ and Implementation for the Class TwoDimensionalLPSolver\n```\n\nRunning the\
    \ Code\n\nYou can compile and run the provided code with your preferred\nstandards-compliant\
    \ compiler. I tested the code using gcc and GLPK\noptimizer version 4.54\\. The\
    \ results are as follows:\n\n```\n./twoDimSolver\nGLPK Simplex Optimizer, v4.54\n\
    3 rows, 2 columns, 6 non-zeros\n*     0: obj = 0.000000000e+00 infeas = 0.000e+00\
    \ (0)\n*     2: obj = 2.763788462e+01 infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION\
    \ FOUND\nobjVal : 27.6379\nx0: 0.173077 x1: 3.76346\nProgram ended with exit code:\
    \ 0\n```\n\nFrom the output listed in the example, you can see that the optimal\n\
    solution was achieved at the vertex (0.173, 3.763), which corresponds to\nthe\
    \ intersection of equations –2.1*x* + *y* = 3.4 and\n3.1*x* + *y* ≤ 4\\. At that\
    \ point, the objective function\nhas a value of 27.63, which can be interpreted\
    \ as the profit achieved by\nthe department in spending the given number of hours\
    \ in the two\nfinancial products that were discussed earlier.\n\nCreating Mixed-Integer\
    \ Programming Models\nExtend the `LPSolver` class so\nthat it can deal with mixed-integer\
    \ programming (MIP) problems, that is,\nLP problems where one or more variables\
    \ are restricted to be\nintegers."
  trans: "\n要解决像之前描述的二维线性规划模型，你需要关注由约束所定义的所有半空间（half-spaces）的交集。根据问题的定义，这个交集位于图表的第一象限，因为已知`x\
    \ ≥ 0`且`y ≥ 0`。然后，可以识别出所有其他半空间交集所包含的区域。结果是一个多边形区域，其边界由一组源自给定约束的直线所定义。\n\n要找到此类线性规划的解，你只需计算目标函数在约束定义区域每个角点处的值。根据线性目标函数的定义，能给出目标函数最优值的角点，就是该问题所能找到的最优解。\n\
    \n虽然前面描述的过程对于二维问题很容易执行，但在更高维度上就会变得相当困难。随着维度和约束数量的增加，角点的数量呈指数级增长。这就需要使用更复杂的算法（例如单纯形算法）来找到多维空间中定义给定线性规划最优解的最佳角点。\n\
    \n为了演示该问题在实际中如何求解，我向你展示了所提出的二维线性规划的 C++ 实现。名为`TwoDimensionalLPSolver`的类，是使用上一节描述的`LPSolver`来实现此类问题的蓝图。\n\
    \n首先，你需要创建模型，该模型使用矩阵`A`、向量`b`（约束的右侧值）和向量`c`（成本向量）进行描述。必要的数据在`main`函数中提供。数据可用后，即可用于创建`LPSolver`类的对象。然后，`LPSolver`类中的`solve()`函数将执行任何必要的数据转换，并调用\
    \ GLPK 库来找到最优解。\n\n## 完整代码\n\n清单 12-2 给出了二维线性规划求解器的完整实现。`main()` 函数展示了`TwoDimensionalLPSolver`类的使用示例。\n\
    \n```\n//\n//  TwoDimensionalLPSolver.h\n#ifndef __FinancialSamples__TwoDimensionalLPSolver__\n\
    #define __FinancialSamples__TwoDimensionalLPSolver__\n#include \nclass TwoDimensionalLPSolver\
    \ {\npublic:\nusing Vector = std::vector;\nTwoDimensionalLPSolver(const Vector\
    \ &c, const Vector &A1, const Vector &A2, const Vector &b);\nTwoDimensionalLPSolver(const\
    \ TwoDimensionalLPSolver &p);\n~TwoDimensionalLPSolver();\nTwoDimensionalLPSolver\
    \ &operator=(const TwoDimensionalLPSolver &p);\nbool solveProblem(Vector &results,\
    \ double &objVal);\nprivate:\nstd::vector m_c;\nstd::vector m_A1;\nstd::vector\
    \ m_A2;\nstd::vector m_b;\n};\n#endif /* defined(__FinancialSamples__TwoDimensionalLPSolver__)\
    \ */\n//\n//  TwoDimensionalLPSolver.cpp\n#include \"TwoDimensionalLPSolver.h\"\
    \n#include \"Matrix.h\"\n#include \"LPSolver.h\"\n#include \nusing std::vector;\n\
    using std::cout;\nusing std::endl;\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
    \ Vector &c, const Vector &A1,\nconst Vector &A2, const Vector &b)\n: m_c(c),\n\
    m_A1(A1),\nm_A2(A2),\nm_b(b)\n{\n}\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
    \ TwoDimensionalLPSolver &p)\n: m_c(p.m_c),\nm_A1(p.m_A1),\nm_A2(p.m_A2),\nm_b(p.m_b)\n\
    {\n}\nTwoDimensionalLPSolver::~TwoDimensionalLPSolver()\n{\n}\nTwoDimensionalLPSolver\
    \ &TwoDimensionalLPSolver::operator=(const TwoDimensionalLPSolver &p)\n{\nif (this\
    \ != &p)\n{\nm_c = p.m_c;\nm_A1 = p.m_A1;\nm_A2 = p.m_A2;\nm_b = p.m_b;\n}\nreturn\
    \ *this;\n}\nbool TwoDimensionalLPSolver::solveProblem(Vector &res, double &objVal)\n\
    {\nint size = m_b.size();\nMatrix A(size, 2);\nfor (int j=0; j A1 = { -2.1, 3.1,\
    \ 7.9};\nvector A2 = { 1, 1, 1 };\nvector c = { 5.3, 7.1 };\nvector b = { 3.4,\
    \ 4.3, 6 };\nTwoDimensionalLPSolver solver(c, A1, A2, b);\nvector results;\ndouble\
    \ objVal;\nsolver.solveProblem(results, objVal);\ncout << \"objVal : \" << objVal\
    \ << endl;\nfor (int i=0; i<results.size(); ++i)\n{\ncout << \" x\" << i << \"\
    : \" << results[i];\n}\ncout << endl;\nreturn 0;\n}\n清单 12-2\n类 TwoDimensionalLPSolver\
    \ 的头文件与实现\n```\n\n## 运行代码\n\n你可以使用任何符合标准的编译器来编译并运行所提供的代码。我在 gcc 和 GLPK 优化器 4.54\
    \ 版本下测试了该代码。结果如下：\n\n```\n./twoDimSolver\nGLPK Simplex Optimizer, v4.54\n3 rows,\
    \ 2 columns, 6 non-zeros\n*     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n\
    *     2: obj = 2.763788462e+01 infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\n\
    objVal : 27.6379\nx0: 0.173077 x1: 3.76346\nProgram ended with exit code: 0\n\
    ```\n\n从示例列出的输出中可以看出，最优解在顶点 (0.173, 3.763) 处取得，该点对应方程 `–2.1*x + y = 3.4` 和 `3.1*x\
    \ + y ≤ 4` 的交点。在该点，目标函数的值为 27.63，这可以解释为部门将给定小时数投入到前面讨论的两种金融产品中所实现的利润。\n\n## 创建混合整数规划模型\n\
    \n扩展`LPSolver`类，使其能够处理混合整数规划（MIP）问题，即一个或多个变量被限制为整数的线性规划问题。\n"
- fmt: "# 解决方案\n\n在连续线性规划（LP）问题之后，混合整数规划（MIP）问题可能是实践者需要处理的最常见的优化问题类型。从建模角度来看，LP与MIP最大的区别在于，MIP问题有一个或多个决策变量必须为整数——这与LP问题不同，LP中所有决策变量都是连续的（通常是实数）。\n\
    \n整数变量非常适合需要在中小型集合内做出互斥决策的情况。此外，这些决策变量可能适用于不可分割的资源。例如，您可以使用此类变量决定商业银行的地方分行数量，或投资组合中包含的不同股票数量。这些都是只能以整数数量使用的资源的常见示例。\n\
    \n一种特殊类型的整数变量是二元决策变量，也称为0–1决策变量。这些变量只能取0或1（全有或全无）的值。它们是最纯粹的整数变量形式，因为它们允许只在两种替代选择之间做出决策。可以预见，许多MIP问题将二元变量作为达成最优决策的主要方式。\n\
    \n从问题求解的技术角度来看，MIP问题比LP问题复杂得多。虽然有非常高效的算法可用于求解LP公式，但并非所有MIP问题都能被当前的计算机算法轻易求解。简而言之，这是因为当决策变量为整数时，它会在目标函数中产生“跳跃”，使得寻找最优解变得更加困难。因此，与LP问题不同（LP中可以快速确定可行解集合的最优顶点），MIP求解器需要花费更多时间生成可能的解并测试它们是否最优。这种选项的指数级爆炸是MIP问题比LP问题难解得多的主要原因。\n\
    \n大多数LP库已扩展为至少能处理某些形式的MIP。GLPK实现了一种称为`branch-and-cut`的通用MIP求解算法。使用此算法，可以求解中小型MIP问题的最优解。然而，更复杂的MIP问题可能无法使用此技术求解，具体取决于所需问题的结构。\n\
    \n在本编码示例中，您将看到如何扩展`LPSolver`类以处理MIP问题，以及经典的LP问题。在下一节中，您将看到一个如何使用`LPSolver`类建模并求解MIP问题的示例。\n\
    \n我决定从`LPSolver`继承而不是创建一个不相关的新类的主要原因是，从建模角度来看，MIP问题与LP问题非常接近。在后一种情况下，您唯一需要额外做的事情是指定哪些变量是整数或二元，并调用正确的函数版本来求解并检索GLPK找到的值。\n\
    \n在`MIPSolver`类中，这是通过以下方式实现的。首先，有两个新的成员函数，名为`setColBinary`和`setColInteger`。这些成员函数可用于告知GLPK给定列中的变量分别是整数还是二元。它们的实现很直接，只是调用GLPK中相关的C函数。例如：\n\
    \n```cpp\nvoid MIPSolver::setColBinary(int colNum)\n{\n    glp_set_col_kind(getLP(),\
    \ colNum+1, GLP_BV);\n}\n```\n\n另一个关键部分是实现`solve`成员函数的新版本。新版本取代了`LPSolver`中的原始版本，并调用MIP专用的函数，例如`glp_mip_obj_val`。其中一个区别是，对于MIP问题，您需要先求解对应的LP问题，以此作为连续问题的初始可行解。之后，您可以调用MIP求解器，它将基于可能的整数值树来创建搜索算法。\n\
    \n## 完整代码\n\n清单[12-3](#323908_2_En_12_Chapter.xhtml#PC9)展示了上一节描述的MIP求解器的完整代码。您可以使用清单[12-3](#323908_2_En_12_Chapter.xhtml#PC9)末尾的`main`函数中的示例代码测试`MIPSolver`类。\n\
    \n```cpp\n//\n//  MIPSolver.h\n#ifndef __FinancialSamples__MIPSolver__\n#define\
    \ __FinancialSamples__MIPSolver__\n\n#include \"LPSolver.h\"\n\nclass MIPSolver\
    \ : public LPSolver {\npublic:\n    MIPSolver(Matrix &A, const std::vector &b,\
    \ const std::vector &c);\n    MIPSolver(const MIPSolver &p);\n    ~MIPSolver();\n\
    \    MIPSolver &operator=(const MIPSolver &p);\n    void setColInteger(int colNum);\n\
    \    void setColBinary(int colNum);\n    virtual ResultType solve(std::vector\
    \ &result, double &objValue);\n};\n\n#endif /* defined(__FinancialSamples__MIPSolver__)\
    \ */\n\n//\n//  MIPSolver.cpp\n#include \"MIPSolver.h\"\n#include \"Matrix.h\"\
    \n#include <iostream>\n#include <algorithm>\n\nusing std::vector;\nusing std::cout;\n\
    using std::endl;\n\nMIPSolver::MIPSolver(Matrix &A, const std::vector &b, const\
    \ std::vector &c)\n: LPSolver(A, b, c)\n{\n}\n\nMIPSolver::MIPSolver(const MIPSolver\
    \ &p)\n: LPSolver(p)\n{\n}\n\nMIPSolver::~MIPSolver()\n{\n}\n\nMIPSolver &MIPSolver::operator=(const\
    \ MIPSolver &p)\n{\n    return *this;\n}\n\nvoid MIPSolver::setColInteger(int\
    \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_IV);\n}\n\nvoid MIPSolver::setColBinary(int\
    \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_BV);\n}\n\nLPSolver::ResultType\
    \ MIPSolver::solve(vector &result, double &objValue)\n{\n    glp_simplex(getLP(),\
    \ NULL);\n    int res = glp_intopt(getLP(), NULL);\n    if (res != 0)\n    {\n\
    \        cout << \"error on glp_intopt\" << endl;\n        return LPSolver::kError;\n\
    \    }\n    int n = getNumVariables();\n    result = vector(n);\n    for (int\
    \ j = 0; j < n; ++j)\n    {\n        result[j] = glp_mip_col_val(getLP(), j+1);\n\
    \    }\n    objValue = glp_mip_obj_val(getLP());\n    return LPSolver::kOptimal;\n\
    }\n\nint main()\n{\n    int m = 2;\n    int n = 2;\n    Matrix A(m, n);\n    vector\
    \ b = { 2, 3 };\n    vector c = { 1, 1 };\n    A[0][0] = 1;\n    A[0][1] = 2;\n\
    \    A[1][0] = 3;\n    A[1][1] = 4;\n    MIPSolver solver(A, b, c);\n    solver.setMaximization();\n\
    \    solver.setColInteger(0);\n    vector result;\n    double objVal;\n    solver.solve(result,\
    \ objVal);\n    cout << \"optimum: \" << objVal << endl;\n    cout << \" x0: \"\
    \ << result[0] << \" x1: \" << result[1] << endl;\n    return 0;\n}\n\nListing\
    \ 12-3\nMIPSolver Class\n```\n\n## 运行代码\n\n用您喜欢的编译器编译清单[12-3](#323908_2_En_12_Chapter.xhtml#PC9)中的代码后，您应该得到一个二进制程序，我将其命名为`mipSolver`。以下是应用程序执行后的输出：\n\
    \n```\n./mipSolver\nGLPK Simplex Optimizer, v4.54\n2 rows, 2 columns, 4 non-zeros\n\
    *     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n*     1: obj = 1.000000000e+00\
    \ infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\nGLPK Integer Optimizer, v4.54\n\
    2 rows, 2 columns, 4 non-zeros\n1 integer variable, none of which are binary\n\
    Integer optimization begins...\n+     1: mip =     not found yet >>>>   1.000000000e+00\
    \ <=   1.000000000e+00   0.0% (1; 0)\n+     1: mip =   1.000000000e+00 <=    \
    \ tree is empty   0.0% (0; 1)\nINTEGER OPTIMAL SOLUTION FOUND\noptimum: 1\nx0:\
    \ 1 x1: 0\n```\n\n请注意，`main`函数中有一个非常简单的MIP模型作为测试代码的一部分。上面的输出仅展示了GLPK默认打印数据的方式。在过程的每一步，它都会显示当前找到的解及其目标成本。"
  raw: "Solution\nAfter continuous LP problems, MIP problems are probably the most\n\
    common type of optimization problem that\npractitioners need to deal with. In\
    \ terms of modeling, the biggest\ndifference between LP and MIP is that such problems\
    \ have one or more\ndecision\nvariables that are required to be integer numbers—unlike\
    \ LP\nproblems, where all decision variables are continuous (normally real\nnumbers).\n\
    Integer\nvariables are ideal for cases where you need to make decisions\nthat\
    \ are exclusive within a small- to medium-size set. Moreover, these\ndecision\
    \ variables may be applicable to resources that are not\ndivisible. For example,\
    \ you can use such variables to decide on the\nnumber of local branches for a\
    \ commercial bank or on the number of\ndifferent stocks included in a portfolio.\
    \ These are common examples of\nresources that can only be used in integer quantities.\n\
    A special type of integer variable is a binary\ndecision variable, also called\
    \ a 0–1 decision variable. These are\nvariables that can assume only a 0 or 1\
    \ (all-or-nothing) value. They are\nthe purest form of integer variable, because\
    \ they allow one to decide\nbetween only two alternative choices. As you can expect,\
    \ many MIP\nproblems make use of binary variables as their primary way to reach\
    \ an\noptimal decision.\nIn terms of techniques for problem solving, MIP problems\
    \ are a lot\nmore complicated than LP problems. While there are very efficient\n\
    algorithms available to solve LP formulations, not all MIP problems are\nreadily\
    \ solvable by current computer algorithms. As a short explanation,\nthis occurs\
    \ because when a decision variable is an\ninteger, it creates “jumps” in the objective\
    \ function that make it much\nharder to search for the optimum solution. So, unlike\
    \ LP problems where\nthe optimal vertex of the set of feasible solutions can be\
    \ quickly\ndetermined, MIP solvers need to spend much more time generating possible\n\
    solutions and testing if they are optimal. This exponential explosion of\noptions\
    \ is the main reason why MIP problems are much more difficult to\nsolve than LP\
    \ problems.\nMost LP libraries have been extended to deal with at least some forms\n\
    of MIP. GLPK implements a generic algorithm for MIP solving, called\nbranch-and-cut.\n\
    With this algorithm, it is possible to solve small- to moderate-size\nMIPs to\
    \ optimality. More complicated MIP problems, however, may not be\nsolvable using\
    \ this technique, depending on the structure of the\nrequired problem.\nIn this\
    \ coding example, you will see how to extend the `LPSolver` class to\ndeal with\
    \ MIP problems, in addition to classical LP problems. In the\nnext section, you\
    \ will see an example of how to use the `LPSolver` class   to model and solve\
    \ a\nMIP problem.\nThe main reason I decided to inherit from `LPSolver`, instead\
    \ of\ncreating a new unrelated class, is that in terms of modeling, MIP\nproblems\
    \ are very close to LP problems. The only additional thing you\nneed to do in\
    \ the latter case is to tell which variables are integer or\nbinary and call the\
    \ right version of the function that solves and\nretrieves values found by GLPK.\n\
    \nIn the `MIPSolver` class, this\nis implemented in the following way. First,\
    \ there are two new member\nfunctions called `setColBinary` and\n`setColInteger`.\n\
    These member functions can be used to tell GLPK that the variable in a\ngiven\
    \ column is either integer or binary, respectively. Their\nimplementations are\
    \ straightforward and simply call the related C\nfunction in GLPK. For example:\n\
    \n```\nvoid MIPSolver::setColBinary(int colNum)\n{\nglp_set_col_kind(getLP(),\
    \ colNum+1, GLP_BV);\n}\n```\n\nThe other part of the puzzle is to implement a\
    \ new version of the\n`solve` member\nfunction. The new\nversion supersedes the\
    \ original version in `LPSolver` and calls\nspecific functions for MIP, such as\
    \ `glp_mip_obj_val`. One\nof the differences is that, for MIP problems, you are\
    \ required to solve\nthe corresponding LP problem first, as a way to create an\
    \ initial\nfeasible solution for the continuous problem. After that, you can call\n\
    the MIP solver, which will create the solution-search algorithm based on\na tree\
    \ of possible integer values.\n\nComplete Code\n\nListing [12-3](#323908_2_En_12_Chapter.xhtml#PC9)\
    \ displays the\ncomplete code for the MIP solver described in the previous section.\
    \ You\ncan test the `MIPSolver` class using\nthe sample code in the `main` function\
    \ at the\nend of Listing [12-3](#323908_2_En_12_Chapter.xhtml#PC9).\n\n```\n//\n\
    //  MIPSolver.h\n#ifndef __FinancialSamples__MIPSolver__\n#define __FinancialSamples__MIPSolver__\n\
    #include \"LPSolver.h\"\nclass MIPSolver : public LPSolver {\npublic:\nMIPSolver(Matrix\
    \ &A, const std::vector &b, const std::vector &c);\nMIPSolver(const MIPSolver\
    \ &p);\n~MIPSolver();\nMIPSolver &operator=(const MIPSolver &p);\nvoid setColInteger(int\
    \ colNum);\nvoid setColBinary(int colNum);\nvirtual ResultType solve(std::vector\
    \ &result, double &objValue);\n};\n#endif /* defined(__FinancialSamples__MIPSolver__)\
    \ */\n//\n//  MIPSolver.cpp\n#include \"MIPSolver.h\"\n#include \"Matrix.h\"\n\
    #include \n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\n\
    MIPSolver::MIPSolver(Matrix &A, const std::vector &b, const std::vector &c)\n\
    : LPSolver(A, b, c)\n{\n}\nMIPSolver::MIPSolver(const MIPSolver &p)\n: LPSolver(p)\n\
    {\n}\nMIPSolver::~MIPSolver()\n{\n}\nMIPSolver &MIPSolver::operator=(const MIPSolver\
    \ &p)\n{\nreturn *this;\n}\nvoid MIPSolver::setColInteger(int colNum)\n{\nglp_set_col_kind(getLP(),\
    \ colNum+1, GLP_IV);\n}\nvoid MIPSolver::setColBinary(int colNum)\n{\nglp_set_col_kind(getLP(),\
    \ colNum+1, GLP_BV);\n}\nLPSolver::ResultType MIPSolver::solve(vector &result,\
    \ double &objValue)\n{\nglp_simplex(getLP(), NULL);\nint res = glp_intopt(getLP(),\
    \ NULL);\nif (res != 0)\n{\ncout  b = { 2, 3 };\nvector c = { 1, 1 };\nA[0][0]\
    \ = 1;\nA[0][1] = 2;\nA[1][0] = 3;\nA[1][1] = 4;\nMIPSolver solver(A, b, c);\n\
    solver.setMaximization();\nsolver.setColInteger(0);\nvector result;\ndouble objVal;\n\
    solver.solve(result, objVal);\ncout << \"optimum: \" << objVal << endl;\ncout\
    \ << \" x0: \" << result[0] << \" x1: \" << result[1] << endl;\nreturn 0;\n}\n\
    Listing 12-3\nMIPSolver Class\n```\n\nRunning the Code\n\nAfter compiling the\
    \ code in Listing [12-3](#323908_2_En_12_Chapter.xhtml#PC9) with your\nfavorite\
    \ compiler, you should have a binary program, which I will call\n`mipSolver`.\
    \ The\nfollowing is the output of the\napplication after it is executed:\n\n```\n\
    ./mipSolver\nGLPK Simplex Optimizer, v4.54\n2 rows, 2 columns, 4 non-zeros\n*\
    \     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n*     1: obj = 1.000000000e+00\
    \ infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\nGLPK Integer Optimizer, v4.54\n\
    2 rows, 2 columns, 4 non-zeros\n1 integer variable, none of which are binary\n\
    Integer optimization begins...\n+     1: mip =     not found yet >>>>   1.000000000e+00\
    \ <=   1.000000000e+00   0.0% (1; 0)\n+     1: mip =   1.000000000e+00 <=    \
    \ tree is empty   0.0% (0; 1)\nINTEGER OPTIMAL SOLUTION FOUND\noptimum: 1\nx0:\
    \ 1 x1: 0\n```\n\nNotice that the `main` function has a\nvery simple MIP model\
    \ as part of the test code. The previous output just\nshows how the data is printed\
    \ by default by GLPK. At each step of the\nprocess, it shows the current solution\
    \ found and its objective cost."
  trans: "\n# 解决方案\n\n在连续线性规划（LP）问题之后，混合整数规划（MIP）问题可能是实践者需要处理的最常见的优化问题类型。从建模角度来看，LP\
    \ 与 MIP 最大的区别在于，MIP 问题有一个或多个决策变量必须为整数——这与 LP 问题不同，LP 中所有决策变量都是连续的（通常是实数）。\n\n\
    整数变量非常适合需要在中小型集合内做出互斥决策的情况。此外，这些决策变量可能适用于不可分割的资源。例如，您可以使用此类变量决定商业银行的地方分行数量，或投资组合中包含的不同股票数量。这些都是只能以整数数量使用的资源的常见示例。\n\
    \n一种特殊类型的整数变量是二元决策变量，也称为 0–1 决策变量。这些变量只能取 0 或 1（全有或全无）的值。它们是最纯粹的整数变量形式，因为它们允许只在两种替代选择之间做出决策。可以预见，许多\
    \ MIP 问题将二元变量作为达成最优决策的主要方式。\n\n从问题求解的技术角度来看，MIP 问题比 LP 问题复杂得多。虽然有非常高效的算法可用于求解\
    \ LP 公式，但并非所有 MIP 问题都能被当前的计算机算法轻易求解。简而言之，这是因为当决策变量为整数时，它会在目标函数中产生“跳跃”，使得寻找最优解变得更加困难。因此，与\
    \ LP 问题不同（LP 中可以快速确定可行解集合的最优顶点），MIP 求解器需要花费更多时间生成可能的解并测试它们是否最优。这种选项的指数级爆炸是 MIP\
    \ 问题比 LP 问题难解得多的主要原因。\n\n大多数 LP 库已扩展为至少能处理某些形式的 MIP。GLPK 实现了一种称为`branch-and-cut`的通用\
    \ MIP 求解算法。使用此算法，可以求解中小型 MIP 问题的最优解。然而，更复杂的 MIP 问题可能无法使用此技术求解，具体取决于所需问题的结构。\n\n\
    在本编码示例中，您将看到如何扩展`LPSolver`类以处理 MIP 问题，以及经典的 LP 问题。在下一节中，您将看到一个如何使用`LPSolver`类建模并求解\
    \ MIP 问题的示例。\n\n我决定从`LPSolver`继承而不是创建一个不相关的新类的主要原因是，从建模角度来看，MIP 问题与 LP 问题非常接近。在后一种情况下，您唯一需要额外做的事情是指定哪些变量是整数或二元，并调用正确的函数版本来求解并检索\
    \ GLPK 找到的值。\n\n在`MIPSolver`类中，这是通过以下方式实现的。首先，有两个新的成员函数，名为`setColBinary`和`setColInteger`。这些成员函数可用于告知\
    \ GLPK 给定列中的变量分别是整数还是二元。它们的实现很直接，只是调用 GLPK 中相关的 C 函数。例如：\n\n```cpp\nvoid MIPSolver::setColBinary(int\
    \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_BV);\n}\n```\n\n另一个关键部分是实现`solve`成员函数的新版本。新版本取代了`LPSolver`中的原始版本，并调用\
    \ MIP 专用的函数，例如`glp_mip_obj_val`。其中一个区别是，对于 MIP 问题，您需要先求解对应的 LP 问题，以此作为连续问题的初始可行解。之后，您可以调用\
    \ MIP 求解器，它将基于可能的整数值树来创建搜索算法。\n\n## 完整代码\n\n清单 12-3 展示了上一节描述的 MIP 求解器的完整代码。您可以使用清单\
    \ 12-3 末尾的`main`函数中的示例代码测试`MIPSolver`类。\n\n```cpp\n//\n//  MIPSolver.h\n#ifndef\
    \ __FinancialSamples__MIPSolver__\n#define __FinancialSamples__MIPSolver__\n\n\
    #include \"LPSolver.h\"\n\nclass MIPSolver : public LPSolver {\npublic:\n    MIPSolver(Matrix\
    \ &A, const std::vector &b, const std::vector &c);\n    MIPSolver(const MIPSolver\
    \ &p);\n    ~MIPSolver();\n    MIPSolver &operator=(const MIPSolver &p);\n   \
    \ void setColInteger(int colNum);\n    void setColBinary(int colNum);\n    virtual\
    \ ResultType solve(std::vector &result, double &objValue);\n};\n\n#endif /* defined(__FinancialSamples__MIPSolver__)\
    \ */\n\n//\n//  MIPSolver.cpp\n#include \"MIPSolver.h\"\n#include \"Matrix.h\"\
    \n#include <iostream>\n#include <algorithm>\n\nusing std::vector;\nusing std::cout;\n\
    using std::endl;\n\nMIPSolver::MIPSolver(Matrix &A, const std::vector &b, const\
    \ std::vector &c)\n: LPSolver(A, b, c)\n{\n}\n\nMIPSolver::MIPSolver(const MIPSolver\
    \ &p)\n: LPSolver(p)\n{\n}\n\nMIPSolver::~MIPSolver()\n{\n}\n\nMIPSolver &MIPSolver::operator=(const\
    \ MIPSolver &p)\n{\n    return *this;\n}\n\nvoid MIPSolver::setColInteger(int\
    \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_IV);\n}\n\nvoid MIPSolver::setColBinary(int\
    \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_BV);\n}\n\nLPSolver::ResultType\
    \ MIPSolver::solve(vector &result, double &objValue)\n{\n    glp_simplex(getLP(),\
    \ NULL);\n    int res = glp_intopt(getLP(), NULL);\n    if (res != 0)\n    {\n\
    \        cout << \"error on glp_intopt\" << endl;\n        return LPSolver::kError;\n\
    \    }\n    int n = getNumVariables();\n    result = vector(n);\n    for (int\
    \ j = 0; j < n; ++j)\n    {\n        result[j] = glp_mip_col_val(getLP(), j+1);\n\
    \    }\n    objValue = glp_mip_obj_val(getLP());\n    return LPSolver::kOptimal;\n\
    }\n\nint main()\n{\n    int m = 2;\n    int n = 2;\n    Matrix A(m, n);\n    vector\
    \ b = { 2, 3 };\n    vector c = { 1, 1 };\n    A[0][0] = 1;\n    A[0][1] = 2;\n\
    \    A[1][0] = 3;\n    A[1][1] = 4;\n    MIPSolver solver(A, b, c);\n    solver.setMaximization();\n\
    \    solver.setColInteger(0);\n    vector result;\n    double objVal;\n    solver.solve(result,\
    \ objVal);\n    cout << \"optimum: \" << objVal << endl;\n    cout << \" x0: \"\
    \ << result[0] << \" x1: \" << result[1] << endl;\n    return 0;\n}\n\n清单 12-3\n\
    MIPSolver 类\n```\n\n## 运行代码\n\n用您喜欢的编译器编译清单 12-3 中的代码后，您应该得到一个二进制程序，我将其命名为`mipSolver`。以下是应用程序执行后的输出：\n\
    \n```\n./mipSolver\nGLPK Simplex Optimizer, v4.54\n2 rows, 2 columns, 4 non-zeros\n\
    *     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n*     1: obj = 1.000000000e+00\
    \ infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\nGLPK Integer Optimizer, v4.54\n\
    2 rows, 2 columns, 4 non-zeros\n1 integer variable, none of which are binary\n\
    Integer optimization begins...\n+     1: mip =     not found yet >>>>   1.000000000e+00\
    \ <=   1.000000000e+00   0.0% (1; 0)\n+     1: mip =   1.000000000e+00 <=    \
    \ tree is empty   0.0% (0; 1)\nINTEGER OPTIMAL SOLUTION FOUND\noptimum: 1\nx0:\
    \ 1 x1: 0\n```\n\n请注意，`main`函数中有一个非常简单的 MIP 模型作为测试代码的一部分。上面的输出仅展示了 GLPK 默认打印数据的方式。在过程的每一步，它都会显示当前找到的解及其目标成本。\n"
- fmt: '# Conclusion


    Optimization is a set of mathematical techniques that can be used to find the
    maximum or minimum of a function under certain conditions. Since many problems
    in finance can be described as maximizing certain outcomes (such as investment
    return), optimization tools play an important role in the analysis of investments.


    You have learned in this chapter how to use C++ to model and solve common optimization
    problems. In the first section, I showed how to use `GLPK`, a popular optimization
    library that is used to solve a large class of LP models. While other libraries
    such as `cplex` and `gurobi` use more sophisticated algorithms, `GLPK` is able
    to solve a surprisingly large number of models for LP and MIP. The example presented
    in the first section shows how to create a C++ interface to interact with the
    C-based API supported by `GLPK`. You have learned the main components of an LP
    problem and how the solver uses these components to determine the optimal solution.
    The example also provided some test code, which shows how the `LPSolver` class
    can be used to solve a simple LP model.


    The next section provided a substantial example of LP model, targeted at finding
    the best resource allocation in a big investment bank. The model tries to find
    the best way to develop two financial products while maximizing the department
    profits. The constraints considered in the model have to do with resource limitations
    at the bank unit. Solving this LP problem using the `LPSolver` class shows how
    to model such problems in C++ and interpret the results of the optimization process
    returned by `GLPK`.


    MIP is another important class of linear models that can be solved using optimization
    techniques. In an MIP, some or all decision variables are restricted to contain
    only integer values. This makes it possible to model situations where it is necessary
    to decide between two or more scenarios in a mutually exclusive way. While MIP
    models may be much harder to solve than LP models, the mechanics of setting up
    the problem and using a solver are very similar. You learned how to interface
    with an MIP solver by inheriting from the `LPSolver` class. The new class `MIPSolver`
    uses most of the modeling mechanisms provided by `LPSolver`, but it adds the ability
    to define integer and binary decision variables, as well as to solve the problem
    and retrieve the optimal integer values. Finally, you have seen a small example
    of how such models work. Chapter [13](#323908_2_En_13_Chapter.xhtml) provides
    more examples.


    You have so far learned some of the basic concepts of optimization and mathematical
    programming models. In the next chapter, you will explore how these LP and MIP
    optimization models can be applied to investment management problems. Since one
    of the main applications of optimization theory is in the area of finance, many
    common problems such as portfolio management have well-known optimization models.
    You will learn how such modeling concepts work, as well as how these models can
    be implemented with the C++ programming language.


    # 13. Asset and Portfolio Optimization


    Portfolio managers have to face several investment issues such as rebalancing
    a portfolio for optimal performance or adjusting a new set of investments depending
    on their client’s predefined long-term goals. Optimization-based techniques have
    been developed over the years to deal with these as well as some other common
    portfolio construction problems.


    In this chapter, you will explore programming algorithms for asset and portfolio
    optimization using C++ as a modeling language. You will be able to create such
    financial models based on well-known mathematical programming formulations. You
    will also see how to improve the performance of such optimization code in order
    to get results that are as fast and accurate as possible.


    The following are some of the topics that will be covered in the C++ examples
    contained in this chapter:


    - **Allocating capital**: One of the great problems faced by companies and banks
    is how to allocate capital to a set of possible investments. You will see how
    to use optimization models to perform capital allocation.

    - **Creating a portfolio by target return**: You can use optimization models to
    design a portfolio of stocks or other investments, based on the desired return.
    The goal of such optimal portfolios is to achieve the best return with minimum
    volatility.

    - **Linear and quadratic models**: You will learn the advantages of quadratic
    and linear optimization models for portfolio optimization.


    ## Financial Resource Allocation


    In this section, we write a linear programming (LP) model in C++ to determine
    an optimal allocation of resources for a given set of projects and their respective
    costs during a 10-year horizon.


    ### Solution


    Resource allocation is one of the most common problems faced by individual and
    institutional investors. Since capital is a limited resource, it makes sense to
    try to improve its utilization, so that one can achieve the optimal allocation
    of funds to valuable activities. Even though investment outcomes, such as stock
    prices, may not be totally predictable, it is still possible to use a general
    forecast for the purpose of decision making.


    Linear programming offers a framework for financial allocation decisions, as you
    will see in this section. In the first place, you need to determine the form of
    the linear program that can be best used to model the resource allocation problem.


    To work with a concrete allocation example, suppose that a company needs to decide
    among a set of five different active investments. These investments may include
    buying new manufacturing equipment, hiring new workers for a business, or making
    improvements on a logistic software package. All of these options have a specific
    cost, which can be calculated for each of the next 5 years. Moreover, the payoff
    of each investment project is known in advance. For example, if the money is invested
    in buying new equipment, it is known that a certain amount of profits will be
    generated as a result.


    As a financial developer for this company, your tasks would be to implement a
    model to solve the required financial allocation problem. This can be done as
    an LP model, which will later be implemented in C++. So, first, let’s consider
    the variables, constraints, and objective function of the LP model.


    **The decision variable** in this case is a choice on the possible investment.
    That is, if there are `n` possible investments, then we have variables `x[j] =
    1`, for `j ∈ {1,..,n}`, whenever capital is allocated to project `j`. If the return
    for each investment is denoted by `r[j]`, then we can write the objective function
    of this LP as


    ```

    max ∑_{j=1}^n r_j * x_j

    ```


    The constraints are related to the amount of money that investors want to use
    each year for the next 5 years. Since the cost of each investment is known for
    any of the `m` periods, let’s name such costs `c[ij]`, for `i ∈ {1...m}` and `j
    ∈ {1...n}`. For each year, the investment is limited by the value `C[i]`, the
    amount of capital available at time period `i`. Then, for each time period (where
    each period corresponds to 1 year), the constraint can be written as


    ```

    ∑_i^n c_ij * x_j ≤ C_i; for i ∈ {1…m}

    ```'
