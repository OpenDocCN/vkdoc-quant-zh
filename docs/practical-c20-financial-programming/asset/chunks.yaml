  trans: "\n这里，隐函数 `C(S, t)` 代表价格或衍生品，它依赖于标的资产价格 `S` 和时间 `t`。\n\n求解像前文那样的微分方程有多种方法。本节将采用的方法称为前向法。求解偏微分方程的基本思路与求解常微分方程并无太大区别：朝着所需计算的目标点逐步前进，并在这些中间点上利用某种近似方法来估算微分方程的值。然而，与常微分方程只有一个维度不同，偏微分方程涉及两个或更多变量的偏导数。在本例中，我们拥有关于变量\
    \ `t` 和 `S` 的偏导数。这种情况下，近似过程变得更加复杂，因为需要确定用于评估偏微分方程的小区间形状。例如，最简单的方案是将二维空间划分为许多小矩形，并针对这些微小元素进行近似。根据偏微分方程的具体类别，我们可以设计出更复杂、更精确的方式来划分定义域，并近似偏方程的真实值。\n\
    \n前向差分法是欧拉方法在偏微分方程中的推广。对于二维情形，它可用于将定义域划分为矩形元素。为了应用此方法，你可以假设股票价格定义域 (`S`) 的取值范围在\
    \ 0 到 `MaxS` 之间，`MaxS` 是一个常量，在实际应用中远高于目标执行价。时间定义域则从 0（当前日期）变化到期权合约到期时的未来时间 (`T`)。基于这些假设，接下来的任务是推导出可以近似下一步偏微分方程的公式，这可以再次利用之前讨论过的泰勒方法来完成。\n\
    \n前向法的初始条件来自于到期时的盈亏方程。在到期时，期权的价值是股票价格与执行价之间的正差值，即 `max(S – K, 0)`。因此，算法的时间步长是反向进行的，从时间\
    \ `T` 开始，并逐步回溯到当前时间。\n\n由此产生的算法在 `BlackScholesForwardMethod` 类的成员函数 `solve` 中呈现。该函数的初始部分计算了那些不随时间变化的方程项。三个主要因子存储于向量\
    \ `a`、`b` 和 `c` 之中。\n\n![$$ {a}_n=\\frac{1}{2}\\left( nrdt-{(nV)}² dt\\right)\
    \ $$](img/323908_2_En_11_Chapter_TeX_Equo.png)\n\n![$$ {b}_n=1- rdt+{(nV)}² dt\
    \ $$](img/323908_2_En_11_Chapter_TeX_Equp.png)\n\n![$$ {c}_n=\\frac{1}{2}\\left(\
    \ nrdt+{(nV)}² dt\\right) $$](img/323908_2_En_11_Chapter_TeX_Equq.png)\n\n下一步是利用给定的初始条件来初始化整个过程。计算出的价格存储在二维向量\
    \ `u` 中，该向量使用到期时的价格进行初始化。然后，算法从到期日开始，依次计算每个时间周期的值。在每一天，从到期日的前一天开始，针对标的资产价格的每次微小上涨，计算对应的期权价格。标的资产价值\
    \ `S` 下的期权价格，取决于下一天在 `S – dS`、`S` 和 `S + dS` 这几个价值下的价格，其中 `dS` 是价格的一个微小增量，由参数\
    \ `nx` 决定。因此，我们有：\n\n![$$ {u}_{t,n}={a}_n{u}_{t,n-1}+{b}_n{u}_{t,n}+{c}_n{u}_{t,n+1}\
    \ $$](img/323908_2_En_11_Chapter_TeX_Equr.png)\n\n## 完整代码\n\n代码清单 11-3 展示了布莱克-斯科尔斯前向方法的完整实现。你可以在类\
    \ `BlackScholesForwardMethod` 中找到这段代码，以及在 `main()` 函数中使用它的示例。\n\n```\n//\n// \
    \ BlackScholesForwardMethod.h\n#ifndef __FinancialSamples__BlackScholesForwardMethod__\n\
    #define __FinancialSamples__BlackScholesForwardMethod__\n#include \nclass BlackScholesForwardMethod\
    \ {\npublic:\nBlackScholesForwardMethod(double expiration, double maxPrice, double\
    \ strike, double intRate);\nBlackScholesForwardMethod(const BlackScholesForwardMethod\
    \ &p);\n~BlackScholesForwardMethod();\nBlackScholesForwardMethod &operator=(const\
    \ BlackScholesForwardMethod &p);\nstd::vector solve(double volatility, int nx,\
    \ int timeSteps);\nprivate:\ndouble m_expiration;\ndouble m_maxPrice;\ndouble\
    \ m_strike;\ndouble m_intRate;\n};\n#endif /* defined(__FinancialSamples__BlackScholesForwardMethod__)\
    \ */\n//\n//  BlackScholesForwardMethod.cpp\n#include \"BlackScholesForwardMethod.h\"\
    \n#include \n#include \n#include \n#include \n#include \nusing std::vector;\n\
    using std::cout;\nusing std::endl;\nusing std::setw;\nBlackScholesForwardMethod::BlackScholesForwardMethod(double\
    \ expiration, double maxPrice,\ndouble strike, double intRate)\n: m_expiration(expiration),\n\
    m_maxPrice(maxPrice),\nm_strike(strike),\nm_intRate(intRate)\n{\n}\nBlackScholesForwardMethod::BlackScholesForwardMethod(const\
    \ BlackScholesForwardMethod &p)\n: m_expiration(p.m_expiration),\nm_maxPrice(p.m_maxPrice),\n\
    m_strike(p.m_strike),\nm_intRate(p.m_intRate)\n{\n}\nBlackScholesForwardMethod::~BlackScholesForwardMethod()\n\
    {\n}\nBlackScholesForwardMethod &BlackScholesForwardMethod::operator=(const BlackScholesForwardMethod\
    \ &p)\n{\nif (this != &p)\n{\nm_expiration = p.m_expiration;\nm_maxPrice = p.m_maxPrice;\n\
    m_strike = p.m_strike;\nm_intRate = p.m_intRate;\n}\nreturn *this;\n}\nvector\
    \ BlackScholesForwardMethod::solve(double volatility, int nx, int timeSteps)\n\
    {\ndouble dt = m_expiration /(double)timeSteps;\ndouble dx = m_maxPrice /(double)nx;\n\
    vector a(nx-1);\nvector b(nx-1);\nvector c(nx-1);\nint i;\nfor (i = 0; i  u((nx-1)*(timeSteps+1));\n\
    double u0 = 0.0;\nfor (i = 0; i  u = bsfm.solve(sigma, numSteps, numDays);\ndouble\
    \ minPrice = .0;\nfor (int  i=0; i < numSteps-1; i++)\n{\ndouble s = ((numSteps-i-2)\
    \ * minPrice+(i+1)*maxPrice)/ (double)(numSteps-1);\ncout << \"  \" << s << \"\
    \  \" << u[i+numDays*(numSteps-1)] << endl;\n}\nreturn 0;\n}\n代码清单 11-3\n布莱克-斯科尔斯前向方法实现\n\
    ```\n\n## 运行代码\n\n要测试代码清单 11-3 中展示的代码，你可以使用任何符合标准的编译器来构建它。我使用 llvm C++ 编译器运行了此代码，得到以下结果：\n\
    \n```\n./blackScholes\n1  0.000452875\n2  0.0148578\n3  0.109172\n4  0.361706\n\
    5  0.784941\n6  1.34918\n7  2.016\n8  2.75175\n9  3.53055\n10  4.33362\n```\n\n\
    这个结果意味着，例如，在距离到期日还有 29 天时，一个执行价为 5 美元、波动率为 0.5 的看涨期权，在标的资产价格为 6 美元时价值为 1.3 美元。请注意，你可以使用这段代码计算从\
    \ 1 美元到 10 美元每个价格水平下的价格。你也可以修改代码，以计算价格更高的股票对应的期权价格。\n"
- fmt: '# Conclusion


    Solving differential equations is a big part of financial analysis techniques.
    Such techniques are used in many areas where the price of assets is determined
    by complex differential equations such as the Black-Scholes model, which is the
    main technique used by banks to price equity derivatives and related investments.


    In this chapter, I introduced you to the topic of numerical solutions of differential
    equations. Although this is a large area that cannot be easily covered in a single
    chapter, it is useful to understand the basic techniques and how they are employed
    in the field of financial programming.


    `Euler()`''s method for ODEs is the first method discussed. Its main idea is to
    perform several steps, where each step approximates the result of the differential
    equation. The second method, the Runge-Kutta algorithm, is an improvement on this
    general strategy, using higher-order Taylor approximations that make the algorithm
    more accurate and avoid some of the weaknesses of `Euler()`''s method. You have
    seen how to implement both algorithms in C++, with test data that demonstrates
    their convergence.


    The Black-Scholes equation is one of the most important mathematical models in
    modern finance. While there are several robust and efficient algorithms for its
    solution, I present a simple method based on forward differences. You have seen
    how the general solution strategy works and how it can be efficiently implemented
    in C++.


    Finding solutions to equations that model market behavior as viewed in this chapter
    is generally the beginning of a process of data analysis. Another step is to find
    the best solution that meets a particular investment goal. For this purpose, a
    number of optimization techniques have been developed. In the next chapter, I
    present some general optimization methods that have been successfully used in
    the analysis of financial investments, along with their implementation in C++.


    # 12. Optimization


    Optimization is a wide area that covers a large set of techniques used to find
    the minimum or maximum of a function over a predefined group of conditions. Optimization
    strategies are frequently employed in several areas of financial engineering such
    as portfolio optimization and as such should be part of the basic skill set of
    financial developers.


    In this chapter, we discuss programming examples that explore a few of the implement
    aspects of optimization algorithms. We start with a concise explanation of some
    techniques and how they are typically implemented in C++. Topics covered in this
    chapter include the following:


    * **Optimization concepts**: Basic concepts on optimization and how it is used
    as a common step of algorithms for financial applications.

    * **Linear programming models**: The basics of linear optimization models, with
    common assumptions and how the results can be interpreted. You will also learn
    how to create linear programming models for common problems.

    * **Solving linear models**: You will learn about techniques and algorithms commonly
    used to solve linear programming models. In particular, you will learn how to
    employ a popular open source library to solve linear programming problems.

    * **Solving mixed-integer programming models**: A common extension of linear programming
    is to require that one or more decision variables assume only integer values.
    This type of problem, called an integer programming problem, is frequently used
    whenever mutually exclusive choices are part of a linear model. You will also
    learn how to extend the linear programming class to solve such mixed-integer programming
    models.


    ## Interfacing with a Linear Programming Solver


    In this section, we create a generic class to solve a linear programming problem,
    given the objective function and constraints in matrix form.


    ### Solution


    Optimization is a mathematical technique used to find the maximum or minimum of
    a given function over a set of constraints. The methods currently used in optimization
    have started as a set of simple results from calculus, where a single function
    is subject to minimization or maximization. Nowadays, these techniques include
    complex models involving multiple linear and nonlinear components.


    In financial engineering and economics, optimization is a tool used for purposes
    such as designing an optimal asset portfolio allocation or more widely to determine
    the best investment decision from a large set of asset classes. Due to its origins
    in the analysis of scarce resources and their optimum use, linear programming
    has been a favorite tool for economists and financial analysts—which shows why
    optimization is such a common technique in financial programming. Effectively,
    every time we need to make a decision on asset allocation given a large number
    of scenarios, optimization becomes a useful tool to help select the best decision.


    In the code example in the section “Using LP Solver Libraries,” we consider how
    to interface with existing libraries that can be used to solve a large class of
    optimization problems. To keep the discussion well contained, I employ an open
    source library called `GLPK` (Gnu Linear Programming Kit), which will be also
    used as a basis for future examples. `GLPK` is simple to use, but it is a C-based
    library only. This means that it provides no direct support for C++ high-level
    concepts such as classes, templates, and containers. Therefore, as part of the
    discussion, I will show you how to create a class that provides a basic C++ interface
    to `GLPK` and other solvers.


    First, however, I give you some preliminary information about the kinds of problems
    that can be solved with an optimization engine, starting with linear programming.
    Then, I present some code that can be used to translate simple linear models into
    calls to the solver application programming interface (API).


    ### Linear Programming Concepts


    The first case of optimization that you will learn about is characterized by an
    *objective* represented as a linear function. This objective is then optimized
    over a set of linear functions, also called *constraints*. Such optimization problems
    are called linear programming (LP) problems, and they constitute an important
    class of mathematical models that have been widely used in disciplines such as
    financial analysis and economics.


    Using a more formal (mathematical) definition, LP is the area of optimization
    that deals with the determination of the minimum or maximum value of a linear
    function over a set of linear constraints. Each constraint is of the form


    ![$$ \sum \limits_{j=1}^n{a}_j{x}_j={a}_1+\dots +{a}_n\le {b}_i. $$](images/323908_2_En_12_Chapter/323908_2_En_12_Chapter_TeX_Equa.png)


    Similarly, the function that you want to optimize over (also known as *objective
    function*) is a linear function. This results in a problem that can be denoted
    in the following way:


    ![$$ \mathit{\operatorname{minimize}}\sum \limits_{j=1}^n{c}_j{x}_j $$](images/323908_2_En_12_Chapter/323908_2_En_12_Chapter_TeX_Equb.png)


    ![$$ subject\ to\sum \limits_{j=1}^n{a}_{ij}{x}_j\le {b}_i\kern2.5em for\ i\in
    \left\{1\dots m\right\} $$](images/323908_2_En_12_Chapter/323908_2_En_12_Chapter_TeX_Equc.png)


    ![$$ {x}_j\ge 0\kern1.25em for\kern0.5em j\in \left\{1\dots n\right\} $$](images/323908_2_En_12_Chapter/323908_2_En_12_Chapter_TeX_Equd.png)'
