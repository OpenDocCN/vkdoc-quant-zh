    \ (0)\nOPTIMAL LP SOLUTION FOUND\nx0: 52.1739 x1: 39.1304 x2: 0 max: 756.522\n\
    ```\n\nHere, you see the first output of GLPK. By default, GLPK displays the best\
    \ solutions and the number of iterations it has taken to achieve the results.\
    \ You can see that after two iterations of the simplex algorithm, GLPK found a\
    \ solution with an objective value equal to 756.\n\n## Solving Two-Dimensional\
    \ Investment Problems\n\nIn this section, we use LP techniques to model and solve\
    \ a financial product allocation decision problem for two investments with known\
    \ returns.\n\n### Solution\n\nOne of the main uses of optimization techniques\
    \ is in the support of investment decisions. In this respect, there are several\
    \ concepts that can be optimized based on the known properties of investment classes.\
    \ For a few types of investments, such as bonds, it is easier to determine the\
    \ returns of the investment, as well as some basic information about the risk\
    \ for that class of investments. This knowledge translates into more accurate\
    \ models, particularly the ones that can be employed to optimize profits for the\
    \ investor.\n\nThis section presents a very simple version of a decision support\
    \ system modeled using linear programming. This problem shows the basic geometric\
    \ process that is used to solve LPs (even the most complicated ones).\n\nConsider\
    \ the process of introducing two new financial products to the market in a large\
    \ bank. The process is usually defined by a number of practical constraints on\
    \ resources necessary for these investments. Suppose that the bank wants to add\
    \ two classes of new products to the market: new bond-based products and new mortgage-backed\
    \ derivatives products. The question is how many hours should be spent on the\
