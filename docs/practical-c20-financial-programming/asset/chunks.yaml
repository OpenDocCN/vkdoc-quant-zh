    \            product = product * ((x - m_x[j]) / (m_x[i] - m_x[j]));\n       \
    \     }\n        }\n        polynomialValue += product;\n    }\n    return polynomialValue;\n\
    }\n\n#include <iostream>\n#include <vector>\n\nint main()\n{\n    std::vector<double>\
    \ xvals;\n    std::vector<double> yvals;\n    double xi, yi;\n    while (std::cin\
    \ >> xi)\n    {\n        if (xi == -1)\n        {\n            break;\n      \
    \  }\n        xvals.push_back(xi);\n        std::cin >> yi;\n        yvals.push_back(yi);\n\
    \    }\n    double x = 0;\n    std::cin >> x;\n    PolynomialInterpolation pi;\n\
