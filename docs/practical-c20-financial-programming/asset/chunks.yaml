    ## Running the Code


    To compile the code, you can follow a procedure similar to the one described in
    the previous section. This means that you can use the Python build system to compile
    the extension (usually into a `.so` or `.dll` format). To do this, you need to
    create a setup file, which in our case is listed as `matrix-setup.py`. Notice
    that the `libraries` key is also listed in the `matrix-setup.py` file. This key
    tells the build system to link against the `boost_python-mt` library. You may
    also need to change the `include_dirs` and the `library_dirs` keys to the location
    where boost is installed in your system. The following is the result of running
    the setup file through Python:


    ```

    $ python matrix-setup.py build_ext -i

