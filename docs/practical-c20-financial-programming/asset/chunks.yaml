    \ to 100. I showed the intermediate steps just for clarity.\n\n## The Secant Method\n\
    \nCreate a class to solve equations using the secant method.\n\n### Solution\n\
    \nIn the previous programming example, you learned about the bisection method\
    \ for the solution of equations. You can find the roots of an equation through\
    \ the decomposition of the domain into a set of ranges, each of which you can\
    \ test for changes in sign. If the sign of the function is different from the\
    \ sign at the end of the interval, then it is possible to find a point where this\
    \ function changes from positive to negative, making it the root of the equation.\n\
    \nWhile the bisection method can find solutions to a large number of equations,\
    \ it is not the fastest method for this purpose. One of the reasons is that it\
    \ doesn’t use any of the properties of the function other than the sign at the\
    \ extremes of its range. On the other hand, using additional information about\
    \ the function values, for example, it would be possible, at least in principle,\
    \ to achieve a faster convergence to the root of the function.\n\nOne of the ways\
    \ to use the value of the function is contained in the algorithm called the secant\
    \ method. The general idea of the secant method is to use the function value at\
    \ the extremes of each interval as a way to approximate how close one is from\
    \ the true root of the equation. In this way, it is possible to get closer to\
    \ the root and reduce the number of iterations necessary to find the desired solution.\n\
    \nThe secant of a function is the name given to the line connecting two points\
    \ defined by that function. For example, given the function *f*(*x*) = *x*² in\
    \ the range 1 to 4, the secant to that function in the given range is the line\
    \ segment connecting the points (1,1) and (4,16), since these are the two points\
    \ defined by function. We can generalize this concept to any function that is\
    \ continuous in a particular range.\n\nThe secant method uses information derived\
    \ from the secant to the function to define the new segment to be explored. To\
    \ do this, the method calculates the point of intersection of the secant with\
    \ the x-axis and uses that point to define the new segment. This is possible whenever\
    \ the sign of the points at the beginning and end of a range is different, because\
    \ in that case, the secant will intercept with the x-axis. As you may remember\
    \ from the previous section, this is similar to the criterion used by the bisection\
    \ method, with the difference that bisection uses the midpoint, instead of a point\
    \ based on the secant of the function.\n\nAs an example of how this works in practice,\
    \ consider the same function used in the section \"Bisection Method\": *f*(*x*)\
    \ = (*x*–1)³, in the range -1 to 2. In this case, we can calculate the values\
    \ of *f*(–1) = –8 and *f*(2) = 1, which have different signs. We can, based on\
    \ that information, use the secant to the function on this interval to find an\
    \ intersection with the x-axis. The line segment we want to use is, therefore,\
    \ connecting the points (–1,–8) and (2,1).\n\nWith a little of algebra, you will\
    \ find that the slope of this line is\n\n![$$ \\frac{y_1-{y}_0}{x_1-{x}_0}=\\\
    frac{1-\\left(-8\\right)}{2-\\left(-1\\right)}=\\frac{9}{3}=3 $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equa.png)\n\
    \nAnd, since it is known that the point (*x*₁, *y*₁) = (2,1) is touched, the secant\
    \ line is given by *h* (*x*) = *y*₁ + 3 (*x* – *x*₁) = 1 + 3 (*x* – 2)\n\nNow,\
    \ the intersection point with the x-axis can be calculated using this equation\
    \ and the fact that *h*(*x*) = 0 at the intersection (see Figure 9-2):\n\n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig2_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2** The original function (x–1)³ and its secant in the interval -1\
    \ to 2"
