    \ 2.77768 5.05356\nlog-normal data:  1573.09 473.919 370.7 1212.54 1530.16 323705\
    \ 2586.73 35919.6 628.913 372.41\n```\n\n## 结论\n\n数值类和函数在金融工程模型的开发中扮演着非常重要的角色。它们为创建复杂的交易策略提供了所需的底层数学支持。在本章中，你探讨了一些最常见的数值库。\n\
    \n首先，我讨论了基于矩阵计算的算法，以及如何使用基于 STL 的容器来表示它们。STL 还提供了丰富的算法，这些算法既可用于数值应用，也可用于其他通用编程任务。接下来，你学习了如何使用\
    \ C++ 模板机制提供的编译时功能。你看到了如何使用这种基于模板的功能来计算数字阶乘的示例。同样的概念也可以扩展到许多其他用途。你还了解了比率模板的使用，以及它们如何表示诸如卡尔玛比率之类的金融概念。\n\
    \n概率分布是数值算法的另一个领域，在金融应用中占有重要地位。投资策略的测试通常涉及随机数据的生成，以此作为模拟可能的经济场景的一种方式。你学习了如何基于一些最常见的概率分布生成随机值。这些分布由一些数值库提供，在本章中，我使用了\
    \ `boost::math` 和 `boost::random` 来实现这一目的。这些库共同提供了一种生成随机数据的方法，以及返回关于特定分布的相关信息，例如均值、标准差、分位数和其他相关属性。\n\
    \n数据可视化是编程的另一个领域，在开发有效的金融算法中非常重要。在下一章中，你将探讨一些编程技术，这些技术举例说明了数据可视化的一些可用选项。你将看到 C++\
    \ 有多种方式将数据输出到图形显示器，既可以使用内部绘图技术，也可以使用外部绘图技术。当你开发新的投资策略时，这些库可以用于可视化你工作的方方面面。\n\n\
    # 6. 绘制金融数据\n\n在金融编程中，一个非常常见的活动是生成与价格相关的数据，这些数据需要被交易员或其他业务利益相关者可视化。大多数情况下，数据需要以图表的形式绘制出来，以便于可视化。金融数据的可视化策略范围广泛，从简单的每日价格折线图到使用蜡烛图、叠加研究以及其他非传统符号的复杂图形输出。\n\
    \n在本章中，你将看到许多基于价格及相关定量数据分析来创建和显示图表的代码示例。你将学习如何使用几种不同的技术来执行这些任务，包括诸如 `Gnuplot`\
    \ 之类的外部软件，以及诸如 `Qt` 等图形化 C++ 库。这两种技术在不同情况下都可能有用，因为它们各有优缺点。\n\n以下是你在本章中将学到的一些内容：\n\
    \n*   如何创建一个提供绘图接口的类\n*   如何使用像 `Gnuplot` 这样的外部绘图应用程序\n*   如何将你的数据转换为外部程序可以理解的格式\n\
    *   如何在 UNIX 和 Windows 上绘制 csv（逗号分隔值）文件\n*   如何生成命令来控制开源 `Gnuplot` 应用程序\n*   如何使用开源且跨平台的图形用户界面（GUI）库创建图表\n\
    *   如何使用 `Qt` 生成一个基本的绘图窗口\n\n## 使用 Gnuplot 绘图\n\n使用 `Gnuplot` 创建一个价格图表。\n"
- fmt: "# Solution\n\nGnuplot is a very popular software package used to create charts\
    \ based on mathematical functions and data points. You can use Gnuplot in a stand-alone\
    \ fashion or as an embedded viewer for graphs created by other applications. In\
    \ this section, you will learn how to generate files that can be easily visualized\
    \ using Gnuplot.\n\nThe first step in using Gnuplot is to make sure that it is\
    \ properly installed in your system. You can easily install this package for data\
    \ visualization by visiting its website ([`www.gnuplot.info`](http://www.gnuplot.info))\
    \ and downloading the required files. There are binary installation files available\
    \ for most operating systems, including Windows, Mac OS X, and Linux. Run the\
    \ installer and execute the main application. You should see something similar\
    \ to the screen displayed in Figure [6-1](#323908_2_En_6_Chapter.xhtml#Fig1).\n\
    \n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig1_HTML.jpg](images/323908_2_En_6_Chapter/323908_2_En_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1** Gnuplot main application running on Windows\n\nThe basic application\
    \ is composed of a simple shell where you can type some of the commands Gnuplot\
    \ recognizes. The most basic of such commands is `plot`, which allows you to display\
    \ plots on the screen. For example, you can easily create a plot for a mathematical\
    \ function, such as sine or cosine. The command necessary for this can be typed\
    \ at the main prompt of the application.\n\n```\n> plot sin(x)\n```\n\nYou can\
    \ see the results for this simple function plot in Figure [6-2](#323908_2_En_6_Chapter.xhtml#Fig2).\n\
    \n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig2_HTML.jpg](images/323908_2_En_6_Chapter/323908_2_En_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2** Plot of the mathematical function `sin(x)` using Gnuplot\n\n\
    In this plot, you supplied the mathematical function defined by `sin(x)`, and\
    \ Gnuplot is responsible for creating a plot of the values, where the default\
    \ range is from -10 to 10. You can easily tweak the parameters used to determine\
    \ the range, as well as other attributes of the plot such as the title, the legend,\
    \ and the units used in both axes.\n\nAnother way to use Gnuplot is to directly\
    \ plot numeric data, instead of a mathematical function. This is possible by referencing\
    \ the name of the files that should be imported by the `plot` command. Most data\
    \ imported in this way is in the csv (comma-separated values) format, although\
    \ Gnuplot doesn’t mandate that the number be in csv—any file with numeric data\
    \ organized as columns will do.\n\nConsider the following data as an example.\
    \ These are prices for IBM downloaded from Yahoo! Finance.\n\n```\nDate,Open,High,Low,Close,Volume,Adj\
    \ Close\n2014-07-01,181.7,187.27,181.7,186.35,6643100,186.35\n2014-06-30,181.33,181.93,180.26,181.27,4223800,181.27\n\
    2014-06-27,179.77,182.46,179.66,181.71,4575500,181.71\n2014-06-26,180.87,181.37,179.27,180.37,3258500,180.37\n\
