- fmt: "### Solution\n\nOne of the main problems that money managers need to solve\
    \ is how to diversify a portfolio. The problem of diversification occurs because,\
    \ when investing in the market, it is not desirable to have all your assets in\
    \ the same type of investment. Correlated investments tend to go down at the same\
    \ time, making it harder to avoid losses in a portfolio.\n\nFor example, consider\
    \ two companies operating in a similar business. The classic example is beverage\
    \ companies such as Coca-Cola and Pepsi. They tend to rise and fall at the same\
    \ time due to the similarity of their business. Therefore, we say that they are\
    \ highly correlated. Correlation is a mathematical concept that was developed\
    \ for the analysis of statistical events. It turns out to be an important concept\
    \ in the equities market, since probability plays such a big role in the evaluation\
    \ and modeling of equity-based investments.\n\nTo make the code for this example\
    \ more extensible, we divide the solution into two classes. The first class, called\
    \ `TimeSeries`, represents the often-used concept of a set of numbers that apply\
    \ to a certain quantity over a given period of time. This concept is commonly\
    \ referred to as a time series. The `TimeSeries` class is responsible for calculating\
    \ values that are specific to a single time series, such as the average, or the\
    \ standard deviation.\n\nThe second class used is `CorrelationCalculator`, which\
    \ is responsible for collecting data for the desired time series and computing\
    \ the correlation using the formula\n\n![$$ \\frac{1}{N-1}\\frac{\\sum \\left({x}_i-\\\
    overline{x}\\right)\\left({y}_i-\\overline{y}\\right)}{\\sigma_x{\\sigma}_y} $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_Equc.png)\n\
    \nIn this equation, N is the number of observations, *x*[*i*] is the i-th observation\
    \ of the first time-series, *y*[*i*] is the i-th observation of the second time-series,\
    \ ![$$ \\overline{x} $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_IEq1.png)\
    \ and ![$$ \\overline{y} $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_IEq2.png)\
    \ are the mean (average) of the two sequences of prices, *s*[*x*] is the standard\
    \ deviation of the x values, and *s*[*y*] is the standard deviation of the y values.\n\
    \nThe mean value and the standard deviation are calculated in the `TimeSeries`\
    \ class. These values are then used in the `CorrelationCalculator` to determine\
    \ the correlation between the values observed for both sequences.\n\n### Complete\
