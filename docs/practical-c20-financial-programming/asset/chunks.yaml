- fmt: '# Solution


    In the previous example, you saw how data points may be used to interpolate values
    in a continuous interval, through the use of piecewise linear equations. However,
    while it is possible to use linear interpolation in a large number of practical
    situations, the problem with this type of approximation is that the resulting
    curve is non-smooth. This means that it contains inflection points that mark transitions
    in the function, exactly at the interception of the different lines. In mathematical
    terms, it is said that such functions are non-differentiable because of this sudden
    transition. Such perceptible changes are undesired in some applications, and you
    may want to interpolate the values in such a way that the transition between observed
    points is seamless.


    To avoid the described problems with the use of linear interpolation, a more sophisticated
    scheme may be employed, which uses higher-degree polynomials to smooth out the
    transitions. What is more important, a single polynomial found using this method
    can be used to interpolate all given data points at the same time. The result
    of this type of interpolation is that you just need a single polynomial equation
    to generate values for any desired input.


    Polynomial interpolation is based on the mathematical fact that, given a polynomial
    with a high enough degree, you can find a corresponding polynomial function that
    passes through the exact points that are provided as input. This is guaranteed
    due to some well-known algebraic properties of polynomials. For example, suppose
    that we’re given the sequence of points that follow (these are the same points
    used in the previous example for linear interpolation):


    ```

    y1 = (10,0.6), y2 = (20,0.11), y3 = (30,1.1), y4 = (40,1.62), y5 = (49,1.4).

    ```


    A polynomial interpolation algorithm would return a value based on a polynomial
    defined by a set of coefficients. Using that information, you can calculate any
    intermediate point or even points that are outside the given range of observations,
    since polynomials are typically defined for any real number. You can also use
    the calculated polynomial to plot the values of the interpolating function, as
    you see in Figure [8-2](#323908_2_En_8_Chapter.xhtml#Fig2).


    ![../images/323908_2_En_8_Chapter/323908_2_En_8_Fig2_HTML.jpg](images/323908_2_En_8_Chapter/323908_2_En_8_Fig2_HTML.jpg)


    **Figure 8-2** A polynomial function to interpolate values using a small number
    of observations: notice how the polynomial function is smooth, unlike the solution
    in Figure [8-1](#323908_2_En_8_Chapter.xhtml#Fig1), which uses line segments


    The technique used here to solve this polynomial interpolation problem is called
    Lagrange’s interpolation algorithm. Using Lagrange’s interpolation method, for
    each sequence of n+1 points (*xi*, *yi*), you can create a polynomial that has
    degree n and passes through these points. Using the points given as input, the
    general formula for the coefficients of the polynomial is given by


    ![$$ {L}_k(x)=\frac{\left(x\kern0.5em -\kern0.5em {x}_0\right)\left(x\kern0.5em
    -\kern0.5em {x}_1\right)\dots \left(x\kern0.5em -\kern0.5em {x}_{k-1}\right)\left(x\kern0.5em
    -\kern0.5em {x}_{k+1}\right)\dots \left(x\kern0.5em -\kern0.5em {x}_n\right)}{\left({x}_k\kern0.5em
    -\kern0.5em {x}_0\right)\left({x}_k\kern0.5em -\kern0.5em {x}_1\right)\dots \left({x}_k\kern0.5em
    -\kern0.5em {x}_{k-1}\right)\left({x}_k\kern0.5em -\kern0.5em {x}_{k+1}\right)\dots
    \left({x}_k\kern0.5em -\kern0.5em {x}_n\right)} $$](images/323908_2_En_8_Chapter/323908_2_En_8_Chapter_TeX_Equb.png)


    Notice that this function skips the value of *xk* to avoid zero terms in the numerator
    and denominator. Now, the complete polynomial representation for interpolating
    the input values *xk* can be written using the coefficients *Lk*(*x*).


    ![$$ P(x)={y}_0{L}_0(x)+\cdots +{y}_n{L}_n(x) $$](images/323908_2_En_8_Chapter/323908_2_En_8_Chapter_TeX_Equc.png)


    This is a function that can be used to provide the interpolation of any value,
    given the n+1 input observations (*xi*, *yi*). The proof for this formula is beyond
    our goals in this section, but notice that when the input value *x* is one of
    the known *xi*, then it will have a component *x* – *xi* that will result in zero
    in all cases, but for *Li*(*x*). In that case, however, the numerator is the same
    as the denominator, which results in the value 1. Therefore, for these values,
    the solution is just *yi* as expected.


    Using this polynomial function, we can create a C++ class that implements the
    interpolation mechanism through the simulation of the desired polynomial. This
    is achieved using the class `PolynomialInterpolation`. The class has a design
    similar to `LinearInterpolation`, storing the x and y values that are passed in
    the `setPoints` member function. Using that information, `PolynomialInterpolation`
    is able to perform the necessary calculations based on the initial points.


    The real work is of calculating the polynomial interpolation performed in the
    `getValue` member function, which is reproduced as follows:


    ```

    double PolynomialInterpolation::getPolynomial(double x)

    {

    double polynomialValue = 0;

    for (size_t i=0; i<m_x.size(); ++i)

    {

    // compute the numerator

    double num = 1;

    for (size_t j=0; j<m_x.size(); ++j)

    {

    if (j!=i)

    {

    num *= x - m_x[j];

    }

    }

    // compute the denominator

    double den = 1;

    for (size_t j=0; j<m_x.size(); ++j)

    {

    if (j!=i)

    {

    den *= m_x[i] - m_x[j];

    }

    }

    // value for i-th term

    polynomialValue += m_y[i] * (num/den);

    }

    return polynomialValue;

    }

    ```


    The calculation is done in an iterative way, where at each step of the `for` loop,
    one of the polynomials *Lk*(*x*) is computed and added to the local variable `polynomialValue`.
    The internal part of the loop can be divided into three parts. In the first part,
    the numerator is calculated as a result of multiplying all of the terms *x – xj*,
    something that is not necessary when *i = j*. The second part is the calculation
    of the denominator, which is very similar to the first step, as you can confirm
    looking at the original formula. The values of the denominator are stored in the
    local variable `den`. The third step consists of multiplying the value of *y*
    by the fraction defined by the numerator and denominator that were computed in
    the previous two steps.


    The complexity of the algorithm previously described is dependent on the given
    input. The more input values you provide, the longer this algorithm will take.
    The variation in time is quadratic with the number of input values, since for
    each value, we need to perform a `for` loop inside a second loop, and each such
    loop runs a number of times equal to the number of points used. In terms of computational
    complexity, this is said to have a time complexity of *O*(*n*²).


