    In this chapter, I provided an overview of the problems and opportunities in the\
    \ equities market. As you have seen, being a major part of the financial system,\
    \ equity trading is an area in which computational problems exist in all phases\
    \ of analysis and trade execution.\n\nThe chapter starts with a short introduction\
    \ to the equities market, describing the main players and the financial instruments\
    \ used in the trading process. In the first section, you learned how to calculate\
    \ moving averages using C++. Moving averages are widely used to uncover trends\
    \ in stock prices. In the same section, I discussed how to calculate the EMA,\
    \ in which the most recent prices receive a larger weight. The EMA is more responsive\
    \ to recent changes in price, which may be a better way to make buy or sell decisions\
    \ in some algorithms.\n\nNext, I presented some code to calculate the volatility\
    \ of an equity instrument. The notion of volatility is important when making decisions\
    \ about which instruments to hold in a portfolio. The methods for calculating\
    \ volatility include using the simple observed range as well as the probabilistic\
    \ measure of volatility, also called standard deviation.\n\nIn this chapter, you\
    \ have also learned how to calculate the correlation between two stocks, indicating\
    \ if there is positive, negative, or no correlation based on their observed prices.\
    \ Finally, this chapter introduces techniques for modeling and calculating fundamental\
    \ data about a stock holding. Such a C++ class is easy to create, but it is also\
    \ very useful when fundamental data is required during the analysis of a particular\
    \ stock. You can modify this example to add new fundamental indicators as needed\
    \ and therefore reuse existing code in other areas of your financial applications.\n\
    \nIn the next chapter, you will learn more about C++ features that are frequently\
    \ used in the creation of financial software. You will see a number of techniques\
    \ that are readily available to developers in the financial industry. Such C++\
    \ features are able to improve the performance, robustness, and flexibility of\
    \ most code that is created for the analysis of investments."
