    \ EMA 的值列表。\n\n# 计算波动率\n\n## 问题\n\n给定最近几天的价格序列，计算特定权益工具的波动率。\n"
- fmt: '### Solution


    One of the important characteristics of stocks and other equity instruments is
    that they change in price very frequently. For highly liquid stocks and ETFs,
    prices will change during the whole trading day, as new buyers and sellers exchange
    shares. The result is a high degree of volatility, as compared to other investment
    instruments.


    Volatility is also an important concept when comparing investment options. For
    example, an Internet stock will vary in price much more widely than a traditional
    food producer. Their volatility profiles will be completely different. Higher
    volatility may be an advantage or a disadvantage, depending on your investment
    objectives.


    The important thing to consider about volatility is that it is not just a one-dimensional
    concept. Different investment strategies require different ways of viewing price
    variations. For example, if you are making investment decisions based on the expected
    volatility for the next few days (due to a news event or earnings release), then
    the previous week''s volatility may not be so important.


    In this section, I present three ways to measure volatility given a sequence of
    prices. The first strategy is computing the range of values observed during that
    period. This is probably the simplest way to view volatility: calculate the highest
    and lowest observed values and return its difference. It is also a common indicator
    used by many investors. Most newspapers print a list of 1-year high and low prices,
    so you can quickly see the simple range for the previous year. The following is
    the implementation using a vector of prices:


    ```

    double VolatilityCalculator::rangeVolatility()

    {

    if (m_prices.size() < 2)

    {

    return 0;

    }

    double min = m_prices[0];

    double max = m_prices[0];

    for (int i=1; i<m_prices.size(); ++i)

    {

    if (m_prices[i] < min)

    {

    min = m_prices[i];

    }

    if (m_prices[i] > max)

    {

    max = m_prices[i];

    }

    }

    return max - min;

    }

    ```


    The second strategy is calculating the average range for a given time period.
    For example, many investment strategies use the idea of looking at the past few
    days and taking an average of the observed ranges. The result is then charted
    as an indicator of the rate of change for a particular stock, for example. Simply
    calculating the average of the previously observed daily ranges can be used to
    return this value. Here is our code.


    ```

    double VolatilityCalculator::avgDailyRange()

    {

    unsigned long n = m_prices.size();

    if (n < 2)

    {

    return 0;

    }

    double previous = m_prices[0];

    double sum = 0;

    for (int i=1; i<m_prices.size(); ++i)

    {

    double range = abs(m_prices[i] - previous);

    sum += range;

    }

    return sum / n - 1;

    }

    ```


    Finally, a more sophisticated way to gauge the variation of values for an equity
    instrument is to use the statistical definition of standard deviation. The standard
    deviation is useful as a way to derive volatility from the expected value (also
    known as mean) of a set of prices. A well-known formula is used to calculate the
    standard deviation, which is given by


    ![$$ \frac{1}{N-1}\sum \limits_{i=1}^N{\left({x}_i-\mu \right)}^2 $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_Equb.png)


    In this equation, N is the number of data points (prices) and `m` is the average
    of these values. The standard deviation can be calculated in C++ with the following
    code:


    ```

    double VolatilityCalculator::stdDev()

    {

    const double m = mean();

    double sum = 0;

    for (int i=0; i<m_prices.size(); ++i)

    {

    double val = m_prices[i] - m;

    sum += val * val;

    }

    return sqrt(sum / (m_prices.size()-1));

    }

    ```


