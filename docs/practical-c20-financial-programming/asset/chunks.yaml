    \ ParallelOptionsProbabilities::probFinishAboveStrike()\n{\nconst int numThreads\
    \ = 20;\nvector threads(numThreads);\nfor (int i=0; isetJoinable(true);\nthreads[i]->start();\n\
    }\nfor (int i=0; ijoin();\n}\ndouble nAbove = 0;\nfor (int i=0; iresult();\ndelete\
    \ threads[i];\n}\nreturn nAbove/(double)(numThreads);\n}\nint main()\n{\nParallelOptionsProbabilities\
    \ rw(100, 50.0, 52.0);\ndouble r = rw.probFinishAboveStrike();\ncout << \" result\
    \ is \" << r << endl;\nreturn 0;\n}\nListing 17-2\nClass ParallelRandomWalk\n\
    ```\n\nRunning the Code\n\nI have compiled and executed the code displayed in\
    \ Listing [17-2](#323908_2_En_17_Chapter.xhtml#PC6) using the gcc\ncompiler on\
