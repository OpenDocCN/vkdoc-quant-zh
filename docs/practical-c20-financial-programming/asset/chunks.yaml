  trans: '

    # 固定收益市场


    固定收益市场是金融行业的重要组成部分，它为从业者带来了独特的挑战与机遇。养老基金及其他机构基金所管理的大量资金都配置于固定收益投资。由于固定收益具有可预测的现金流，与股票及更复杂的衍生品相比，保守型资金管理者将其视为更安全的投资选择。因此，传统机构在固定收益领域投入了大量时间和精力。


    作为软件工程师，我们在固定收益市场工作的主要目标是定义计算策略并解决问题，从而帮助客户取得成功。`C++` 是一种特别适合解决该行业问题的语言，这得益于其灵活性以及在标准计算平台上的高性能表现。此外，`C++`
    是一种高度可移植的语言，可在多种计算机系统中使用。


    基于上述优势，`C++` 编程已广泛应用于这一金融领域，并且是银行、对冲基金、养老基金以及其他将固定收益作为主要投资工具的大型机构所偏爱的语言之一。多年来，使用
    `C++` 的程序员开发出了具备固定收益分析实用功能的软件，例如计算现行利率和确定现金流估值。所有这些功能都需要借助本书后续章节探讨的技术，以惊人的速度执行。得益于其新标准
    `C++20`，该语言如今更能满足金融行业提出的严格需求。


    在本章中，我将简要介绍这一金融领域，并向你展示几个 `C++` 代码示例，这些示例可用于解决固定收益市场中最常见的一些编程问题。这些代码示例涵盖了涉及以下问题的解决方案：


    *  单利计算

    *  复利计算

    *  现金流建模

    *  确定现金流的现值

    *  债券建模与估值


    在本章的剩余部分，我还将说明为什么 `C++20` 可能是处理金融投资行业中编程问题的理想语言，特别是如何解决固定收益投资中的问题。然后，我将概括性地介绍固定收益投资中常见的问题，并概述固定收益市场的运作方式。接着，我将从几个编程示例入手，探索前面章节讨论的概念。


    ## 固定收益概述


    我们以固定收益工具的总体概述开始讨论。虽然这不是一本关于金融或经济学的书，但掌握一些基本概念仍然很重要。我的总体目标是描述如何在解决本章后面部分讨论的实际计算问题时运用这些概念。


    在固定收益投资中，双方之间会发生合同约定的交易。双方同意根据利率和现金交换的时间来交换现金流。固定收益投资种类繁多，但包括以下几种著名的投资工具类型：


    *   **货币市场基金**：这些是短期投资，提供较低的收益率，但同时能让你方便地随时获取资金。货币市场基金的投资期限非常短，其回报率仅接近银行实行的即期利率。由于货币市场基金的回报率很低且长期难以预测，它们主要被用于其流动性。

    *   **债券**：这是固定收益应用中的一大类。债券在明确规定的期限内支付预定的利率。它们由包括公司和各级政府在内的各种机构发行。例如，美国政府发行国债，这是全球使用的主要投资工具之一。

    *   **定期存单**：这些是银行向零售客户发行的固定收益投资产品。它们是简单的投资工具，在预定期限（通常为 1 至 5 年）内支付固定利率。它们主要供那些无法进入更复杂固定收益市场、希望从自己的支票账户或储蓄账户进行投资的小型投资者使用。


    投资者进入固定收益市场的主要原因是为了利用相对安全的投资机会，这类投资的回报是已知且可预测的。与股票市场相比，固定收益投资具有更容易分析的优点。这是事实，因为对于股权投资而言，实际上几乎不可能确定一家公司在几年后能赚多少钱。然而，对于债券这类固定收益投资，你拥有一份合同，该合同保证在指定期限内获得投资回报。


    显然，此类固定收益投资也存在风险。一个众所周知的风险是，例如，发行债券的机构可能违约。在这种情况下，投资者可能会损失部分或全部投资。第二个重大风险（投资者常常忽略）是，投资期间的收益率可能无法应对通货膨胀。例如，如果年收益率为
    6%，但通货膨胀率约为 4%，那么你的实际收益率仅为 2%（这还是税前回报）。


    这一切都表明，分析固定收益投资并不像最初听起来那么简单。这不仅仅是找到支付最高利率的机构并将所有资金投入其债券的问题。这也是资金管理者需要可靠软件的原因之一，这些软件可用于决定在众多固定收益投资中哪个最佳。正如股票市场有成千上万种可能性需要仔细分析一样，固定收益行业也有海量的选择。软件开发者的主要任务之一是创建能够轻松追踪这些投资，并帮助为长期投资者选择正确选项的系统。


    **注释**

    '
- fmt: '# 固定收益投资


    固定收益投资具有难以衡量的风险，因为这些风险取决于未来的经济环境。稳健的固定收益投资需要考虑其中涉及的多种风险。高质量的用于固定收益的`C++`软件可能有助于投资者考虑其中一些外部因素。


    以下是本章中使用的关于固定收益投资的一些最重要概念。


    * **利率**：在给定期间（通常为1年）内，以百分点表示的投资回报。固定收益投资将具有明确规定的、作为合同义务确定的利率。

    * **本金**：原始固定收益贷款或投资的金额。对于债券等固定收益投资，这是计算利率的基础价值。

    * **复利**：随着时间的推移而累积的利息，并在每个期间定期支付利息时计入本金。复利的金额由利息支付之间的间隔时间调节。

    * **连续复利**：随着期数的增加，复利的效果变得更加显著。例如，在每月末支付的复利将比每年支付一次产生更多的利息。理论上，这种复利过程可以在连续的时间表上进行，并且可以使用一个简单的公式计算产生的复利，我将在本章后面解释这个公式。

    * **现值**：当一组预定的现金流和利率被定义后，就可以计算这些现金流的现值。这是通过使用合同利率来确定每个未来现金流的折现值，并将所有这些价值相加来完成的。现值是比较两个现金流序列的一个非常强大的工具。


    使用这些简单的概念，就有可能分析非常复杂的投资。你将在本章后面的编码示例中学习如何使用这些概念。


    ## 为什么要使用 C++


    `C++`是一种已在各种金融应用中获得巨大成功的语言。它是华尔街公司用来创建快速、高性能代码的首选语言，这些代码可用于实现金融工程的高效算法。


    尽管`C++`已经是一门拥有超过30年历史的成熟语言，并且此后出现了其他具有更易于使用的高级特性的编程语言，但`C++`仍然保持着作为高性能计算标准语言的地位。大型金融机构，如银行、对冲基金和养老基金，每天依赖`C++`解决其最复杂的计算问题，原因如下：


    * **性能**：使用`C++`最明显的原因是它的性能。由于`C++`与其他高级语言相比运行时开销很小，因此可以用它来编写非常快速的软件。`C++`不仅默认情况下足够快，而且还允许专家级的`C++`程序员探索许多额外的底层代码优化技术，这些技术在`Java`和`Python`等语言中是不可用的。

    * **标准合规性**：`C++`是一种标准语言，多年来由一个国际专家小组开发，其目标是在不带来通常与高级特性（如面向对象编程（`OOP`））相关的开销的情况下提供这些特性。作为标准化工作的结果，`C++`可用于从微控制器到最大服务器的各种平台。这意味着你可以跨平台运行未经修改的算法。这对金融算法来说是一个明显的优势，因为随着时间的推移，这类软件可以轻松移植到更快的架构上，以利用新硬件和软件设计的改进。

    * **现有库**：`C++`为数值和金融编程提供了几乎无与伦比的库集。我们在本书中讨论的每个主题都有多个可用的库，可以节省时间和精力。

    * **多范式语言**：开发者从一开始就设计`C++`语言以支持多种编程范式，因此程序员不需要改变算法的本质来适应特定的范式。例如，尽管`OOP`受到支持，但该语言并不强制使用`OOP`。这样，程序员可以自由地为所需的应用程序使用最具表现力的技术。

    * **高级特性**：虽然`C++`允许程序员通过针对硬件的底层特性来实现高性能，但优秀的程序员仍然可以使用使`C++`成为真正现代语言的几个高级特性。例如，`C++`是最早接受`OOP`概念的语言之一，而`OOP`无疑是现代软件设计中最常见的范式。`C++`还开创了其他特性，如异常和基于模板的容器。最近，`C++`通过新的`C++11`语言标准融入了更多高级特性。自动类型检测、`lambda`表达式和用户自定义字面量只是新标准获批后应用程序开发者可以使用的少数新特性。


    基于上述原因，程序员一直信任`C++`作为实现高性能金融算法的主要工具。在本书中，我们探讨利用了这些计算优势的代码示例。


    像任何其他工具一样，`C++`也有其自身的问题。学习`C++`编程的一个主题是避免可能导致错误和不安全程序的危险做法。你将在后续章节中看到的大多数技术都采用了现代库，这不仅简化了创建`C++`程序的过程，还允许你创建设计良好且容错的软件。使用标准库（包括`STL`（标准模板库））是安全使用`C++`的最佳方式。


    你还将学习如何使用通过`Boost`项目提供的高质量库。`Boost`库从头开始设计，以使用现代`C++`概念，从而简化新软件的创建。`Boost`库是一些最伟大的`C++`编程专家（包括参与`C++`标准委员会本身的人员）工作的成果。事实上，`Boost`附带的许多库已经成为标准库的一部分。因此，使用`Boost`库，你将提前获得一些将在语言未来版本中包含的特性。


    ## 计算单利


    首先，我将向你展示如何解决固定收益分析中一个非常简单的问题，以此介绍我们在本书中使用的`C++`类设计的一些特性。


    ### 问题


    利率决定了金融机构在持有一段时间的现金存款后将支付多少利息。给定利率和存款的初始价值，计算存款的未来价值，假设是单期存款。


    ### 解决方案


    你只需要使用简单的单利计算公式，该公式由表达式给出：


    ```

    V = P (1 + R)

    ```


    在这个公式中，`V`是单期后的未来价值，`P`是存款的现值。使用这个公式，你可以计算单期的利率。'
  raw: 'Fixed income investments have risks that are hard to measure because they
    depend on the future economic environment. Sound fixed income investments need
    to take into consideration the several risks involved. High-quality C++ software
    for fixed income may help investors to take into consideration some of these external
    factors.


    Here are some of the most important concepts about fixed income investments used
    through this chapter.


    *   Interest rate: The return of investment in percentage points for a given period
    (usually 1 year). Fixed income investments will have a well-defined interest rate
    that is determined as a contractual obligation.


    *   Principal: The amount of the original fixed income loan or investment. This
    is the value over which the interest rate is calculated in the case of a fixed
    income investment such as a bond.


    *   Compound interest: Interest that is accrued over time and added to the principal
    as regular interest payments are made at each period. The amount of compound interest
    is regulated by the interval between interest payments.


    *   Continuous compounding: As the number of periods increase, the effect of compound
    interest becomes more pronounced. For example, compound interest paid at the end
    of every month will produce more than at a yearly payment schedule. In theory,
    this compounding process could happen in a continuous schedule, and the resulting
    compound interest can be calculated using a simple formula, which I explain later
    in this chapter.


    *   Present value: When a set of scheduled cash flows and an interest rate are
    defined, it is possible to calculate the present value of those cash flows. This
    is done using the contractual interest rate to determine the discounted value
    of each future cash flow and adding together all these values. The present value
    is a very powerful tool to compare two cash flow streams.


    Using these simple concepts, it is possible to analyze very complex investments.
    You will learn how to use these concepts in some of the coding examples contained
    later in this chapter.


    ## Why Use C++


    C++ is a language that has been used with great success in all kinds of financial
    applications. It is the number one language used by Wall Street firms to create
    fast, high-performance code that can be employed to implement efficient algorithms
    for financial engineering.


    While C++ is already a mature language with more than 30 years of history, and
    other programming languages have appeared since then with high-level features
    that are easier to use, C++ still holds the place as the standard language for
    high-performance computation. Large financial institutions such as banks, hedge
    funds, and pension funds rely daily on C++ to solve their most complex computational
    problems for the following reasons:


    *   Performance: The most obvious reason why C++ is used is its performance. Due
    to the fact that C++ has little runtime overhead compared to other high-level
    languages, it is possible to use it to write very fast software. Not only is C++
    fast enough by default, but it also allows expert C++ programmers to explore many
    additional low-level techniques for code optimization, which are not available
    to programmers using languages such as Java and Python.


    *   Standards compliance: C++ is a standard language, developed over the years
    by an international group of experts with the goal of providing high-level features
    such as object-oriented programming (OOP) without the overhead that is normally
    associated with them. As a result of the standardization effort, C++ is available
    on all kinds of platforms, ranging from microcontrollers to the largest servers.
    This means that you can run your algorithms unmodified between platforms. This
    is an obvious advantage for financial algorithms, since this kind of software
    can be easily ported to faster architectures over the years to take advantage
    of improvements in new hardware and software design.


    *   Existing libraries: C++ offers an almost unparalleled set of libraries for
    numerical and financial programming. Each topic we discuss in this book has several
    libraries available that can save time and effort.


    *   Multi-paradigm language: Developers designed the C++ language from the beginning
    to support multiple programming paradigms, so programmers don’t need to change
    the essence of an algorithm to fit into a particular paradigm. For example, although
    OOP is supported, the language does not mandate the use of OOP. In this way, programmers
    are free to use the most expressive technique for the desired application.


    *   High-level features: Although C++ allows programmers to achieve high performance
    by targeting low-level features of their hardware, good programmers can still
    use several high-level features that make C++ a truly modern language. For example,
    C++ was one of the first languages to embrace the concept of OOP, which is without
    question the most common paradigm for modern software design. C++ has also pioneered
    other features such as exceptions and template-based containers. More recently,
    C++ incorporated even more high-level features by means of the new C++11 standard
    of the language. Automated type detection, lambda expressions, and user-defined
    literals are just a few of the new features that have become available to application
    developers since the new standard was approved.


    For the reasons stated previously, programmers have trusted C++ as the main vehicle
    for implementing high-performance financial algorithms. In this book, we explore
    code examples that make use of these computational advantages.


    Like any other tool, C++ also has its share of problems. One of the themes in
    learning C++ programming is to avoid dangerous practices that can lead to bugs
    and unsafe programs. Most of the techniques you will see in the next chapters
    embrace the use of modern libraries, which not only simplify the process of creating
    C++ programs but also allow you to create software that is well designed and fault
    tolerant. Using the standard library, which includes the STL (standard templates
    library), is the best way to use C++ safely.


    You will also learn how to use the high-quality libraries that have been made
    available through the boost project. The boost libraries have been designed from
    the ground up to use modern C++ concepts in a way that simplifies the creation
    of new software. The boost libraries are the result of the work of some of the
    greatest experts in C++ programming, including people involved in the C++ standard
    committee itself. In fact, many of the libraries shipped with boost have become
    part of the standard library. Therefore, using boost libraries, you will be getting
    early access to some features that will be included in future versions of the
    language.


    ## Calculating Simple Interest Rates


    To start, I will show you how to solve a very simple problem in fixed income analysis,
    as a way to introduce some of the features of C++ class design that we use throughout
    this book.


    ### Problem


    Interest rates determine how much a financial institution is going to pay in exchange
    for holding a cash deposit over a period of time. Calculate the future value of
    a deposit given the interest rate and the initial value of the deposit, assuming
    a single period of deposit.


    ### Solution


    You just need to use the mathematic equation for simple interest rate calculation,
    which is given by the expression


    V = P (1 + R)


    In this formula, V is the future value after a single period, and P is the present
    value of the deposit. With this formula, you can calculate the interest rate for
    a single period.'
