    stock\", version=\"1.0\",\next_modules=[Extension(\"stock\", [\"Stock.cpp\", \"\
    Stock_Py.cpp\"])])\n```\n\n**Listing 15-2** Class `Stock` Interface and Implementation\n\
    \n## Running the Code\n\nThe process of building a Python extension module is\
    \ a little different from what you did for other C++ applications described in\
    \ this book. The process requires the creation of a loadable module, which has\
    \ a different form in each platform, such as a `dll` (on Windows) or shared object\
    \ file on many UNIX systems. To simplify this process, the Python developers created\
    \ a tool that uses a `setup.py` file to perform the build automatically. Using\
    \ `setup.py`, you don’t need to figure out particular build information such as\
    \ including directories and linking libraries. As you can see in Listing [15-1](#323908_2_En_15_Chapter.xhtml#PC2),\
    \ the file `stock-setup.py` describes the extension, with the source files necessary\
    \ to build the module. The building process (executed on a Mac OS X system) is\
    \ shown as follows. As seen in the listing, the C++ building is generated automatically\
    \ by Python using the `build_ext` option.\n\n```\n$ python stock-setup.py build_ext\
    \ -i\nrunning build_ext\nbuilding 'stock' extension\ncc -fno-strict-aliasing -fno-common\
    \ -dynamic -arch x86_64 -arch i386 -g -Os -pipe\n-fno-common -fno-strict-aliasing\
    \ -fwrapv -DENABLE_DTRACE -DMACOSX -DNDEBUG -Wall\n-Wstrict-prototypes -Wshorten-64-to-32\
    \ -DNDEBUG -g -fwrapv -Os -Wall -Wstrict-prototypes -DENABLE_DTRACE -arch x86_64\
    \ -arch i386 -pipe -I/System/Library/Frameworks/Python.framework/Versions/2.7/include/python2.7\
    \ -c Stock.cpp -o build/temp.macosx-10.9-intel-2.7/Stock.o\ncc -fno-strict-aliasing\
    \ -fno-common -dynamic -arch x86_64 -arch i386 -g -Os -pipe\n-fno-common -fno-strict-aliasing\
    \ -fwrapv -DENABLE_DTRACE -DMACOSX -DNDEBUG -Wall\n-Wstrict-prototypes -Wshorten-64-to-32\
    \ -DNDEBUG -g -fwrapv -Os -Wall -Wstrict-prototypes -DENABLE_DTRACE -arch x86_64\
    \ -arch i386 -pipe -I/System/Library/Frameworks/Python.framework/Versions/2.7/include/python2.7\
    \ -c Stock_Py.cpp -o build/temp.macosx-10.9-intel-2.7/Stock_Py.o\nc++ -bundle\
    \ -undefined dynamic_lookup -arch x86_64 -arch i386 -Wl,-F. build/temp.macosx-10.9-intel-2.7/Stock.o\
    \ build/temp.macosx-10.9-intel-2.7/Stock_Py.o -o /Users/carlosoliveira/code/FinancialSamples/FinancialSamples/stock.so\n\
    ```\n\nOnce the module is compiled, it can be easily loaded into a Python script\
    \ or iterative session. The following is a transcript of a sample use of the `stock`\
    \ module:\n\n```\n$ python\nPython 2.7.5 (default, Mar 9 2014, 22:15:05)\n[GCC\
    \ 4.2.1 Compatible Apple LLVM 5.0 (clang-500.0.68)] on darwin\nType \"help\",\
    \ \"copyright\", \"credits\" or \"license\" for more information.\n>>> import\
    \ stock\n>>> a = stock.new('IBM',1,1)\nticker: IBM, price: 1.000000, dividend:\
    \ 1.000000\n>>> stock.setPrice(a, 105)\n>>> stock.price(a)\n105.0\n>>> stock.setDividend(a,\
    \ 2.2)\n>>> stock.dividend(a)\n2.2\n>>> stock.dividendYield(a)\n0.020952380952380955\n\
    ```\n\n# Exporting C++ Classes Directly to Python\n\nWrite C++ code to export\
    \ existing classes into Python applications.\n\n## Solution\n\nIn the section\
    \ “Exporting C++ Stock Handling Code to Python,” you saw how C++ code can be exported\
    \ to Python using the module mechanism. Through the external Python API, it is\
    \ possible to expose functions and classes that were previously created using\
    \ C++. However, the external API also imposes the creation of glue code that is\
    \ not only a boring task but also an error-prone job, which could be better done\
    \ by a computer.\n\nTo simplify some of the issues raised by the external Python\
    \ API, a new boost library was developed. The `boost::python` library uses a template-based\
    \ mechanism to automatically create the integration code required by Python. In\
    \ this way, developers can more easily expose classes, variables, and function\
    \ using a set of C++ templates while avoiding repetitive tasks such as converting\
    \ data from and to Python objects. The following are a few advantages of using\
    \ boost to export C++ code to Python:\n\n- **Avoid boilerplate**: A lot of the\
    \ code necessary to export C++ classes into Python modules is simple and repetitive.\
    \ Using a template solution makes it easy to reduce or totally remove much of\
    \ the boilerplate code needed by the Python external API.\n- **Provide type safety**:\
    \ In Python, objects have all the same type `PyObject`. While there is runtime\
    \ checking for the correct type in Python, you should be able to use C++ compile-time\
    \ checking whenever possible. With `boost::python`, C++ types are used, and conversion\
    \ into Python is done automatically and only when needed.\n- **Reduce programming\
    \ effort**: Using the boost library, you can leverage a lot of code that has been\
    \ developed to solve the specific problem of exporting C++ classes to Python.\
    \ By using the Python API directly, you may encounter problems that have already\
    \ been solved in `boost::python`. As in other areas of C++ programming, the ideal\
    \ is to reuse good libraries and designs instead of reinventing existing solutions.\n\
    \nDespite the advantages of `boost::python`, there are also some reasons why you\
    \ may want to avoid it and use the Python API directly:\n\n- **Size of the project**:\
    \ Sometimes, you need it to export only a single class or function to Python for\
    \ a special use. In that case, it may be just as easy to stick to the Python API\
    \ and skip `boost::python`.\n- **Boost integration**: If your project doesn’t\
    \ use boost, or if you’re not allowed to incorporate other boost libraries into\
    \ your code, then it would be difficult to use this solution for Python integration.\n\
    - **Special needs of the project**: While the templates in `boost::python` are\
    \ very flexible, you may have some additional requirements for the types you’re\
    \ exporting. In that case, only the underlying Python extension API may provide\
    \ the flexibility needed by your project.\n\nUsing the `boost::python` library\
    \ is straightforward, and you just need to look at some examples and its reference\
    \ to understand how to quickly export classes. In the code presented in Listing\
    \ [15-3](#323908_2_En_15_Chapter.xhtml#PC10), I will show how to do this for a\
    \ single example, the `Matrix` class from Chapter [5](#323908_2_En_5_Chapter.xhtml).\
    \ The `boost::python` library is installed along with other boost libraries, so\
    \ if boost is already installed in your system, you should be ready to use it.\
    \ The main header file for the library is `<boost/python.hpp>`, which gives access\
    \ to all macros and templates necessary to export C++ classes.\n\nThe main macro\
    \ in the library is `BOOST_PYTHON_MODULE`. This macro is needed to generate the\
    \ boilerplate code that the Python runtime expects. In the scope that follows\
    \ the macro, you can declare the classes, functions, and other types that will\
    \ be visible from Python.\n\nTo export C++ classes, the main facility provided\
    \ is the `class_` template. As you would expect, this template is used to perform\
    \ the hard work of defining types and their properties using the underlying Python\
    \ API. The template parameter for `class_` is the class name. The constructor\
    \ requires a name to be used by Python and a default constructor. Constructors\
    \ are defined using the `init` template, with the parameters added as template\
    \ parameters.\n\nAttached to the main `class_` template, you will find calls to\
    \ the `def` member function, which is used to define new members to the class.\
    \ Every time you call `def`, the `class_` template generates additional code to\
    \ handle calls from Python code into a given member function. So, for example,\
    \ you have the following definition:\n\n```\ndef(\"subtract\", &MatrixP::subtract)\n\
    ```\n\nHere, the `subtract` member function is defined with the name listed as\
    \ the first argument and the destination of the call listed as the second argument.\n\
    \n## Complete Code\n\nYou can see the complete code for the `Matrix` module in\
    \ Listing [15-3](#323908_2_En_15_Chapter.xhtml#PC10). The `setup.py` file at the\
    \ end of the listing can be used to build the module.\n\n```\n//\n//  Matrix_Py.h\n\
    #ifndef __FinancialSamples__Matrix_Py__\n#define __FinancialSamples__Matrix_Py__\n\
    #include \n#include \"Matrix.h\"\nclass MatrixP : public Matrix {\npublic:\nMatrixP(int\
    \ a);\nMatrixP(int a, int b);\nMatrixP(const MatrixP &p);\n~MatrixP();\nvoid set(int\
    \ a, int b, double v);\ndouble get(int a, int b);\n};\n#endif /* defined(__FinancialSamples__Matrix_Py__)\
    \ */\n//\n//  Matrix_Py.cpp\n#include \"Matrix_Py.h\"\n// include this header\
    \ file for access to boost::python templates and macros\n#include \n// add the\
    \ using clause to reduce namespace clutter\nusing namespace boost::python;\nMatrixP::MatrixP(int\
    \ a)\n: Matrix(a)\n{\n}\nMatrixP::MatrixP(int a, int b)\n: Matrix(a, b)\n{\n}\n\
    MatrixP::MatrixP(const MatrixP &p)\n: Matrix(p)\n{\n}\nMatrixP::~MatrixP()\n{\n\
    }\nvoid MatrixP::set(int a, int b, double v)\n{\n(*this)[a][b] = v;\n}\ndouble\
    \ MatrixP::get(int a, int b)\n{\nreturn (*this)[a][b];\n}\n// this macro generates\
    \ all the boilerplate required by the Python API\nBOOST_PYTHON_MODULE(matrix)\n\
    {\n// defines a new class to be exported\nclass_(\"Matrix\",\ninit())    // the\
    \ init form defines a constructor\n// another constructor with two int parameters\n\
    .def(init())\n// here are some standard functions (name first, member function\
    \ second)\n.def(\"add\", &MatrixP::add)\n.def(\"subtract\", &MatrixP::subtract)\n\
    .def(\"multiply\", &MatrixP::multiply)\n.def(\"numRows\", &MatrixP::numRows)\n\
    .def(\"trace\", &MatrixP::trace)\n.def(\"transpose\", &MatrixP::transpose)\n.def(\"\
    set\", &MatrixP::set)\n.def(\"get\", &MatrixP::get)\n;\n}\n#\n```"
