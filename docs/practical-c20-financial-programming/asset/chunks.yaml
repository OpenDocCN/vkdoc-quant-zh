    \n![$$ {k}_3= hf\\left({x}_t+\\frac{h}{2},{y}_t+\\frac{k_2}{2}\\right) $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equk.png)\n\
