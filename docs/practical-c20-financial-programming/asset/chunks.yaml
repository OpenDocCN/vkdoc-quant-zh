    # 结论


    诸如 Python 和 Lua 这样的扩展语言在过去几年中变得非常流行。它们提供了快速开发由现有组件构成的应用程序的能力。然而，得益于 C++ 的灵活性，正如你所见，我们可以创建易于与这些语言集成的
    C++ 库。


    首先，你学习了如何使用 Python 作为 C++ 类的扩展语言。通过直接使用 Python 外部 API，可以从 Python 代码中访问示例中展示的类。你学习了如何在
    Python 维护的数据结构中转换数据。在第二个编码示例中，你学习了如何使用 `boost::python` 库，该库提供了一种更简洁的方式将 C++ 数据类型导出到
    Python。我还讨论了每种方法的一些优缺点。


    Lua 是另一种在过去几年中越来越流行的语言。凭借其小巧的体积，Lua 是作为用 C++ 编写的库的扩展语言的理想选择。由于其简单性和模块化，你可以轻松地将
    Lua 解释器嵌入到 C++ 应用程序中。在本章中，你看到了一种展示如何轻松将 Lua 集成到应用程序中的 C++ 编码技术。


    将你的 C++ 代码用作外部库是与其它工具和环境连接的众多方式之一。另一种选择是将你的金融 C++ 代码集成到现有的科学编程工具中。最常用于数据分析的两个科学工具是
    R 和 Maxima。在第 16 章中，你将进一步了解这些工具以及如何将 C++ 集成到这些应用程序提供的工作流程中。


    # 16. 将 C++ 与 R 和 Maxima 结合使用


    用 C++ 实现的代码的一个优势在于，它既可以作为原生库或独立应用程序的一部分，也可以作为其他开发和建模环境的组件进行集成。例如，在金融行业，通常会用 C++
    实现底层模块，而高级分析则在更面向用户的环境（如 Excel、Mathematica、Matlab、Maxima、R 和 Octave）中进行。


    当使用高级数据分析环境时，至关重要的一点是，数值结果必须与原生代码得出的结果一致，并且能够访问那些已经用 C++ 编码的底层库。因此，对于金融行业的程序员来说，一项重要的技能是能够将现有代码与分析师和数学家使用的一个或多个分析应用程序进行集成。


    在本章中，我们将向你展示如何将用 C++ 开发的金融库集成到两个用于金融分析的知名仿真与建模环境中：R 和 Maxima。这些应用程序是开源的，并且可以在多个平台上免费获取。然而，你在本章中看到的示例所演示的原理，也同样适用于统计学、仿真、工程和数学领域的其他商业工具。


    以下是你在本章中将学到的一些主题：


    *   **将 C++ 与 R 集成**：R 语言的用户已经创建了一个丰富的统计库和应用程序生态系统。然而，有时需要将 C++ 代码作为 R 分析的一部分进行集成。在本章中，你将看到如何轻松地将
    C++ 类嵌入到这个系统中，这既可以提高性能，也可以保持与其它用 C++ 部署的应用程序的一致性。


    *   **将 C++ 与 Maxima 集成**：Maxima 计算机代数系统用于使用简单的高级语言开发精确的数学模型。它也被用于其可视化功能。你可以使用该语言支持的共享库机制轻松地将现有的
    C++ 库集成到 Maxima 中。


    ## 将 C++ 与 R 集成


    创建一个 C++ 类，用于计算一组付款的现值，并且可以从 R 解释器中调用。


    ### 解决方案


    R 是一个为对大数据集执行统计分析而创建的编程环境。由于其易用性和先进的统计能力，R 已成为最常用的数据分析环境，并且在数据挖掘等某些领域已成为事实上的标准。越来越多的统计学家和工程师每天使用
    R 来研究大数据集的属性。


    R 可用于最常见的操作系统和计算机架构。你可以从官方网站 [`www.r-project.org`](http://www.r-project.org) 免费下载。在根据你的操作系统运行所需的安装方法后，你将能够启动该语言的迭代解释器。标准的
    R 环境能够运行 R 脚本和单个命令。你可以使用这些工具来执行快速数据分析并基于现有数据创建图表。你可以在图 16-1 中看到 R 控制台主应用程序窗口的外观。


    ![../images/323908_2_En_16_Chapter/323908_2_En_16_Fig1_HTML.jpg](img/323908_2_En_16_Fig1_HTML.jpg)


    **图 16-1** Mac OS X 上的 R 控制台窗口


    R 通常用于执行大量的数学算法和数据分析任务。例如，R 的一个常见用途是运行标准统计程序，如均方误差和其他类型的统计回归。R 也被用来实现针对金融数据集定制的统计测试。因此，能够将
    C++ 代码加载到 R 控制台提供的动态环境中是非常有用的。


    为了能够在 R 中使用 C++ 类，你需要使用 R 扩展应用程序编程接口（API）。扩展 API 由一组与 R 运行时交互的基于 C 的函数组成。例如，你可以使用
    API 从 R 中检索和转换值。同样，你可以使用 API 执行常见任务，如调用数学函数和随机数生成器等。


    要创建访问 R 扩展库的 C++ 函数和类，你需要包含头文件 `R.h`。该头文件是主要的 C 文件，用于协调对 R 运行时导出的许多 API 声明的访问。


    例如，假设你需要一种快速的方法来确定一组未来付款的现值。你可以通过创建自己的 C++ 解决方案并使用 R 扩展机制将该解决方案导出到 R 来实现。要理解现值计算的一般概念，你可以参考第
    1 章，我在那里讨论了固定收益分析的工具。


    主要功能被编码在 `RExtension` 类中。该类中的两个主要方法是 `addCashPayment`，用于添加一个新的现金流，该现金流稍后将被算法考虑；以及
    `presentValue`，用于计算到目前为止所有已添加现金付款的现值。现值的计算使用以下公式：

    '
- fmt: "![$$ \\sum \\limits_{i=1}^N\\frac{V_i}{{\\left(1+R\\right)}^{T_i}} $$](images/323908_2_En_16_Chapter/323908_2_En_16_Chapter_TeX_Equa.png)\n\
    \nIn this equation, `V[i]` is the value of the i-th cash flow, `T[i]` is the time\
    \ of the i-th cash flow, and `R` is the interest rate.\n\nThe real entry point\
    \ for the R interpreter is the `presentValue` function, which is declared in the\
    \ following way:\n\n```c\nextern \"C\" {\nvoid presentValue(int *, double *, int\
    \ *, double *, double *);\n}\n```\n\nThe reason for the `extern \"C\"` statement\
    \ in this declaration is to avoid the normal mangling of function names that is\
    \ performed by the C++ compiler. Only the name of the function is affected, and\
    \ the contents of the function can use most C++ features. By declaring the function\
    \ in such a way, the `presentValue` name will be maintained in the library without\
    \ modifications, so that the R interpreter can view and access it.\n\nThe definition\
    \ of the `presentValue` function is not unusual. The only difference to normal\
    \ C++ code is that all parameters are passed as pointers. This is the way in which\
    \ the R runtime allows data to be shared between the interpreter and the C++ code.\
    \ Using pointers, the called function can both read and modify the passed arguments,\
    \ if necessary. The implementation of the function uses the information passed\
    \ in the parameters, which include the number of elements in the cash flow vector,\
    \ the interest rate, then a vector with time indication, followed by a vector\
    \ of cash flows. The last parameter is a pointer to the result value.\n\n## Complete\
    \ Code\n\nListing [16-1](#323908_2_En_16_Chapter.xhtml#PC2) shows the implementation\
    \ of class `RExtension`. The main parts are the definition of the class, which\
    \ contains the functionality to calculate the present value of a set of cash flows,\
    \ and the `presentValue` function, which can be directly accessed from the R runtime.\n\
    \n```cpp\n//\n// RExtension.h\n#ifndef __FinancialSamples__RExtension__\n#define\
    \ __FinancialSamples__RExtension__\n#include \nclass RExtension {\npublic:\nRExtension(double\
    \ rate);\nRExtension(const RExtension &p);\n~RExtension();\nRExtension &operator=(const\
    \ RExtension &p);\nvoid addCashPayment(double value, int timePeriod);\ndouble\
    \ presentValue();\nprivate:\nstd::vector m_cashPayments;\nstd::vector m_timePeriods;\n\
    double m_rate;\ndouble presentValue(double futureValue, int timePeriod);\n};\n\
    #endif /* defined(__FinancialSamples__RExtension__) */\n//\n// RExtension.cpp\n\
    #include \"RExtension.h\"\n#include \n#include \nusing std::cout;\nusing std::endl;\n\
    extern \"C\" {\nvoid presentValue(int *, double *, int *, double *, double *);\n\
    }\nvoid presentValue(int *numPayments, double *intRate,\nint *timePeriods, double\
    \ *payments, double *result)\n{\nint n = *numPayments;\nRExtension re(*intRate);\n\
    for (int i=0; i<m_cashPayments = v.m_cashPayments;\nthis->m_timePeriods = v.m_timePeriods;\n\
    this->m_rate = v.m_rate;\n}\nreturn *this;\n}\nvoid RExtension::addCashPayment(double\
    \ value, int timePeriod)\n{\nm_cashPayments.push_back(value);\nm_timePeriods.push_back(timePeriod);\n\
    }\ndouble RExtension::presentValue(double futureValue, int timePeriod)\n{\ndouble\
    \ pValue = futureValue / pow(1+m_rate, timePeriod);\ncout << \" value \" << pValue\
    \ << endl;\nreturn pValue;\n}\ndouble RExtension::presentValue()\n{\ndouble total\
    \ = 0;\nfor (unsigned i=0; i<m_cashPayments.size(); ++i)\n{\ntotal += presentValue(m_cashPayments[i],\
    \ m_timePeriods[i]);\n}\nreturn total;\n}\nListing 16-1\nCode for the R Extension\
    \ Library\n```\n\n## Running the Code\n\nThe code presented in the previous section\
    \ can be built using any standards-compliant C++ compiler. However, the R interpreter\
    \ makes it very easy to create an extension library using the `CMD` option of\
    \ the `R` command. This build technique allows you to quickly create a shared\
    \ object file that contains all the necessary C++ code, in a way that can be readily\
    \ imported into the R runtime. Using the `CMD` option of the R interpreter, you\
    \ also don’t need to worry about the correct compiler, the right location of header\
    \ files, and link libraries, as well as other common compilation parameters.\n\
    \nHere is how I generated a binary object from the given source file (this was\
    \ run on a Mac OS X system, but the result should be similar in other platforms).\
    \ The compilation command is automatically generated by R using the `SHLIB` option,\
    \ so you don’t need to worry about the locations of libraries.\n\n```bash\n$ R\
    \ CMD SHLIB code/FinancialSamples/FinancialSamples/RExtension.cpp\ng++ -arch x86_64\
    \ -I/Library/Frameworks/R.framework/Resources/include -DNDEBUG\n-I/usr/local/include\
    \    -fPIC  -mtune=core2 -g -O2  -c\ncode/FinancialSamples/FinancialSamples/RExtension.cpp\
    \ -o\ncode/FinancialSamples/FinancialSamples/RExtension.o\ng++ -arch x86_64 -dynamiclib\
    \ -Wl,-headerpad_max_install_names -undefined dynamic_lookup -single_module -multiply_defined\
    \ suppress -L/usr/local/lib -L/usr/local/lib -o\ncode/FinancialSamples/FinancialSamples/RExtension.so\n\
    code/FinancialSamples/FinancialSamples/RExtension.o -F/Library/Frameworks/R.framework/..\
    \ -framework R -Wl,-framework -Wl,CoreFoundation\n```\n\nOnce the shared object\
    \ has been created (this is a file with a `.so` extension on UNIX or `.dll` extension\
    \ on Windows), you can load it into the R interpreter using the `dyn.load` function\
    \ with the name of the file as the single parameter. After that, you just need\
    \ to use the `.C` function to call the compiled C or C++ function. For this to\
    \ work, you need to provide the function name as the first argument, followed\
    \ by the arguments to the function. You need to ensure, however, that the values\
    \ passed to the function are marked with the right parameter types (using functions\
    \ such as `as.integer` and `as.double`). After the `.C` function is executed,\
    \ the resulting values are printed in the interpreter window. Here is a sample\
    \ session, where I import and use the `RExtension` module.\n\n```r\n$ R\n> dyn.load(\"\
    RExtension.so\")\n> .C(\"presentValue\", n=as.integer(4), r=as.double(0.05), t=as.integer(c(1,2,3,4)),\
    \ p=as.double(c(3,4,5,6)), res=as.double(0))\nvalue 2.85714\nvalue 3.62812\nvalue\
    \ 4.31919\nvalue 4.93621\n$n\n[1] 4\n$r\n[1] 0.05\n$t\n[1] 1 2 3 4\n$p\n[1] 3\
    \ 4 5 6\n$res\n[1] 15.74066\n>\n```\n\nThe desired result is printed as the content\
    \ of the variable `res`, which in this case is `15.74066`.\n\n## Integrating with\
    \ the Maxima CAS\n\nImplement a class to compute option probabilities that can\
    \ be accessed using the Maxima computer algebra system.\n\n### Solution\n\nThe\
    \ R environment is an example of a successful application that has been used in\
    \ the statistical analysis of data sets. Another class of mathematical applications\
    \ that is commonly employed in data analysis is a computer algebra system (CAS).\
    \ Financial analysts use such applications to perform algebraic transformations\
    \ on mathematical functions and expressions. For example, such systems can be\
    \ used to perform tasks such as solving equations, finding derivatives and integrals,\
    \ or factoring polynomials. Well-known applications in this category include Mathematica,\
    \ Maple, and Maxima.\n\nIn this section, you will learn how to interact with Maxima,\
    \ an open source CAS that can be used to assist in the development of mathematical\
    \ models in finance. You will also understand how to incorporate new or existing\
    \ C++ code into Maxima, so that you can run iterative experiments with the code\
    \ while using the Maxima interpreter for visualization purposes."
