    ### 关于 STL 向量和映射的更多内容


    STL 是一个包含标准数据结构和算法的代码库，在大多数编程领域都非常有用。特别是在金融应用中，使用 STL 极为重要，因为其组件针对高速运算进行了优化。例如，在
    C++ 中编写应用程序时，目前首选的方法是使用像向量这样的 STL 组件，而不是使用原始的 C++ 数组或类似的数据容器类。编译器供应商在使 STL 组件在各种应用中既快速又安全方面做得非常出色，因此程序员无需担心诸如内存分配、异常处理和算法复杂度等复杂问题。


    STL 向量用途广泛，因为它们可以动态增长。因此，当你不清楚底层数据结构中将存储多少个元素时（只要你不介意向量调整大小带来的开销），它们就能派上用场。例如，如果你正在读取特定时间段内的交易数据，你通常不知道在该特定时间框架内发生了多少笔交易。在这种情况下，使用一个可以初始化为少量元素然后根据需要增长的向量，会比使用一个预定义（且固定）大小的数组更容易。通过这种方式使用
    STL 向量，你无需担心容器的内存分配和异常安全性。


    向量模板暴露了一个接口，其中包含可应用于一组元素的操作，例如添加、移除、查找和比较。这些常见操作可以在不同的具体实现中通用，无需进行任何手动修改。例如，声明为
    `std::vector<int>` 的向量可以使用 `push_back` 成员函数将 `int` 元素添加到向量的末尾。同样，声明为 `std::vector<std::string>`
    的另一个向量也可以使用相同的基于模板的成员函数添加 `std::string` 元素。


    以下是 `std::vector` 模板中最常用的成员函数的快速列表：


    *   `template <class T> vector(const T &c, int n)`：构造函数，用于创建一个新向量，并用常量元素 `c` 的
    `n` 个副本进行初始化。

    *   `template <class T> vector(const vector<T> &v)`：构造函数，用于创建一个新向量，并用现有向量对象 `v`
    的副本进行初始化。

    *   `template <class T> T &operator [] (int pos)`：该运算符使 `std::vector` 对象的行为类似于原生数组。你可以使用
    `v[i]` 表示法来访问或更新存储在向量 `v` 中位置 `i` 处的元素值。

    *   `template <class T> void push_back(const T &c)`：用于在向量末尾添加一个新元素，必要时会分配额外的内存。这是向向量添加新元素最常用的方法，因为它在必要时会负责分配内存来存储新元素，这与
    `operator []` 不同，后者在访问未定义位置时会导致应用程序崩溃。

    *   `template <class T> void pop_back()`：此成员函数执行与 `push_back` 相反的操作，移除存储在向量最后一个位置的元素。但是，为该元素分配的内存不会立即被回收，可能会被后续操作使用。

    *   `template <class T> size_t size()`：此成员函数返回当前存储在 `std::vector` 中的元素数量。请注意，这可能小于向量当前使用的总内存，因为根据之前添加或预留的元素数量，向量可能分配了比当前需求更多的内存。


    在我们的问题中，我们使用向量来存储针对特定股票的建议。该类涵盖的每只股票都会有一个建议向量。每个建议只是 `Recommendation` 类的一个对象，该类存储按以下方式定义的建议：


    ```

    enum class RecommendationType {

    BUY,

    SELL,

    HOLD,

    NO_RECOMMENDATION

    };

    ```


    `Recommendation` 类定义为：


    ```

    class Recommendation {

    public:

    Recommendation();

    Recommendation(const std::string &ticker, RecommendationType rec, double target);

    ~Recommendation();

    Recommendation(const Recommendation &r);

    Recommendation & =(const Recommendation &r);

    double getTarget() const;

    RecommendationType getRecommendation() const;

    std::string getTicker() const;

    // 私有成员

    };

    ```


    这个简单的 `Recommendation` 类存储了股票的代码，以及其建议类型和目标价格。请注意，存储在 `std::vector` 中的对象必须来自可复制或可移动的类，因为
    `std::vector` 中的元素是按值存储的。这意味着，每当需要将对象移动到某个位置时，就会创建一个副本，除非该类具有移动构造函数。


    使用 `std::vector` 我们可以跟踪针对某只股票的单个建议。但是，我们想要跟踪的股票池中有多只股票。为了找到正确的建议，我们分配了一种基于股票代码检索对象的方法。这是通过使用
    `std::map` 模板来完成的。使用映射还将简化实现其他有用操作所需的代码，例如添加新建议或计算平均建议。


    `std::map` 模板提供了一种将任意键关联到数据对象的方法，以便你可以轻松检索原始数据。映射最棒的地方在于，键可以是任何提供比较操作（例如小于（`<`）运算符）的对象。例如，在我们的例子中，你可以使用一个字符串来指示每只特定股票的唯一切入点。基于该代码，你可以检索包含该特定股票建议的向量。


    以下是 `std::map` 定义的重要操作的一个简短列表：


    *   `template <class K, class T> iterator<T> find(const K&)`：返回一个指向与给定键关联的数据对象的迭代器。如果该键没有关联的对象，该函数返回
    `end()` 迭代器。

    *   `template <class K, class T> T &operator[](const K&)`：将一个键与一个特定的数据对象关联起来。你可以使用此运算符从映射容器中检索元素以及插入新元素。

    *   `template <class K, class T> size_t erase(const K&)`：删除与给定键关联的数据。


    `std::map` 模板在此代码示例中用于存储和检索针对特定股票发布的建议。`RecommendationProcessor` 是负责存储、处理以及回答与股票建议相关的查询的类。`RecommendationProcessor`
    使用的一般算法包括将新建议存储在一个内部数据结构中。然后，在未来的任何时刻，你可以使用 `averageTargetPrice` 成员函数查询存储的数据。


    此类中的第一个成员函数 `addRecommendation` 负责将新建议存储到 `m_recommendations` 成员变量中。


    ```

    void RecommendationsProcessor::addRecommendation(const std::string &ticker,

    RecommendationType rec, double targetPrice)

    {

    Recommendation r(ticker, rec, targetPrice);

    m_recommendations[ticker].push_back(r);

    }

    ```


    在这里，首先需要根据传入的信息（如股票代码、建议类型和目标价格）创建一个新的建议对象。然后，我们使用 `m_recommendations` 映射来访问建议向量。最后，我们使用
    `push_back` 方法将新建议添加到该特定股票的建议列表中。


    另一个有趣的成员函数是计算平均目标价格的函数。它会查看所有建议以计算平均目标。

