  trans: "\n![$$ \\sum \\limits_{i=1}^N\\frac{V_i}{{\\left(1+R\\right)}^{T_i}} $$](img/323908_2_En_16_Chapter_TeX_Equa.png)\n\
    \n在这个等式中，`V[i]` 是第 i 笔现金流的价值，`T[i]` 是第 i 笔现金流的时间，`R` 是利率。\n\nR 解释器的真正入口点是 `presentValue`\
    \ 函数，其声明方式如下：\n\n```c\nextern \"C\" {\nvoid presentValue(int *, double *, int\
    \ *, double *, double *);\n}\n```\n\n在此声明中使用 `extern \"C\"` 语句是为了避免 C++ 编译器通常执行的函数名修饰。只有函数名会受到影响，而函数内容可以使用大多数\
    \ C++ 特性。通过这种方式声明函数，`presentValue` 这个名称在库中将保持不变，从而 R 解释器可以查看并访问它。\n\n`presentValue`\
    \ 函数的定义并不特殊。与普通 C++ 代码的唯一区别在于，所有参数都是以指针形式传递的。这是 R 运行时系统允许解释器和 C++ 代码之间共享数据的方式。必要时，被调用的函数可以通过指针读取和修改传入的参数。该函数的实现使用了参数中传递的信息，包括现金流向量的元素个数、利率、一个包含时间指示的向量，以及一个包含现金流的向量。最后一个参数是指向结果值的指针。\n\
    \n## 完整代码\n\n清单 16-1 展示了 `RExtension` 类的实现。主要部分是该类的定义——包含计算一组现金流现值的功能——以及 `presentValue`\
    \ 函数，该函数可以直接从 R 运行时中访问。\n\n```cpp\n//\n// RExtension.h\n#ifndef __FinancialSamples__RExtension__\n\
    #define __FinancialSamples__RExtension__\n#include \nclass RExtension {\npublic:\n\
    RExtension(double rate);\nRExtension(const RExtension &p);\n~RExtension();\nRExtension\
    \ &operator=(const RExtension &p);\nvoid addCashPayment(double value, int timePeriod);\n\
    double presentValue();\nprivate:\nstd::vector m_cashPayments;\nstd::vector m_timePeriods;\n\
    double m_rate;\ndouble presentValue(double futureValue, int timePeriod);\n};\n\
    #endif /* defined(__FinancialSamples__RExtension__) */\n//\n// RExtension.cpp\n\
    #include \"RExtension.h\"\n#include \n#include \nusing std::cout;\nusing std::endl;\n\
    extern \"C\" {\nvoid presentValue(int *, double *, int *, double *, double *);\n\
    }\nvoid presentValue(int *numPayments, double *intRate,\nint *timePeriods, double\
    \ *payments, double *result)\n{\nint n = *numPayments;\nRExtension re(*intRate);\n\
    for (int i=0; i<m_cashPayments = v.m_cashPayments;\nthis->m_timePeriods = v.m_timePeriods;\n\
    this->m_rate = v.m_rate;\n}\nreturn *this;\n}\nvoid RExtension::addCashPayment(double\
    \ value, int timePeriod)\n{\nm_cashPayments.push_back(value);\nm_timePeriods.push_back(timePeriod);\n\
    }\ndouble RExtension::presentValue(double futureValue, int timePeriod)\n{\ndouble\
    \ pValue = futureValue / pow(1+m_rate, timePeriod);\ncout << \" value \" << pValue\
    \ << endl;\nreturn pValue;\n}\ndouble RExtension::presentValue()\n{\ndouble total\
    \ = 0;\nfor (unsigned i=0; i<m_cashPayments.size(); ++i)\n{\ntotal += presentValue(m_cashPayments[i],\
    \ m_timePeriods[i]);\n}\nreturn total;\n}\n清单 16-1\nR 扩展库的代码\n```\n\n## 运行代码\n\
    \n上一节中给出的代码可以使用任何符合标准的 C++ 编译器来构建。然而，R 解释器通过使用 `R` 命令的 `CMD` 选项，使得创建扩展库变得非常容易。这种构建技术允许你快速创建一个包含所有必要\
    \ C++ 代码的共享对象文件，从而可以方便地导入到 R 运行时环境中。使用 R 解释器的 `CMD` 选项，你也不必担心正确的编译器、头文件的正确位置以及链接库等其他常见的编译参数。\n\
    \n以下是我如何从给定的源文件生成二进制对象（这是在 Mac OS X 系统上运行的，但其他平台的结果应该类似）。编译命令是由 R 使用 `SHLIB` 选项自动生成的，因此你无需担心库文件的位置。\n\
    \n```bash\n$ R CMD SHLIB code/FinancialSamples/FinancialSamples/RExtension.cpp\n\
    g++ -arch x86_64 -I/Library/Frameworks/R.framework/Resources/include -DNDEBUG\n\
    -I/usr/local/include    -fPIC  -mtune=core2 -g -O2  -c\ncode/FinancialSamples/FinancialSamples/RExtension.cpp\
    \ -o\ncode/FinancialSamples/FinancialSamples/RExtension.o\ng++ -arch x86_64 -dynamiclib\
    \ -Wl,-headerpad_max_install_names -undefined dynamic_lookup -single_module -multiply_defined\
    \ suppress -L/usr/local/lib -L/usr/local/lib -o\ncode/FinancialSamples/FinancialSamples/RExtension.so\n\
    code/FinancialSamples/FinancialSamples/RExtension.o -F/Library/Frameworks/R.framework/..\
    \ -framework R -Wl,-framework -Wl,CoreFoundation\n```\n\n一旦共享对象被创建（在 UNIX 上是扩展名为\
    \ `.so` 的文件，在 Windows 上是扩展名为 `.dll` 的文件），你就可以使用 `dyn.load` 函数将其加载到 R 解释器中，该函数的唯一参数就是文件名。之后，你只需使用\
    \ `.C` 函数来调用编译好的 C 或 C++ 函数。为了使其正常工作，你需要将函数名称作为第一个参数提供，后面接着函数的参数。不过，你需要确保传递给函数的值带有正确的参数类型标记（使用诸如\
    \ `as.integer` 和 `as.double` 之类的函数）。执行 `.C` 函数后，结果值会显示在解释器窗口中。以下是一个示例会话，其中我导入并使用了\
    \ `RExtension` 模块。\n\n```r\n$ R\n> dyn.load(\"RExtension.so\")\n> .C(\"presentValue\"\
    , n=as.integer(4), r=as.double(0.05), t=as.integer(c(1,2,3,4)), p=as.double(c(3,4,5,6)),\
    \ res=as.double(0))\nvalue 2.85714\nvalue 3.62812\nvalue 4.31919\nvalue 4.93621\n\
    $n\n[1] 4\n$r\n[1] 0.05\n$t\n[1] 1 2 3 4\n$p\n[1] 3 4 5 6\n$res\n[1] 15.74066\n\
    >\n```\n\n所需的结果会作为变量 `res` 的内容打印出来，本例中为 `15.74066`。\n\n## 与 Maxima CAS 集成\n\n\
    实现一个用于计算期权概率的类，该类可以通过 Maxima 计算机代数系统访问。\n\n### 解决方案\n\nR 环境是一个成功应用的范例，已广泛用于数据集的统计分析。在数据分析中另一种常用的数学应用是计算机代数系统（CAS）。金融分析师使用这类应用对数学函数和表达式进行代数变换。例如，这类系统可以用来求解方程、求导数和积分，或因式分解多项式。此类中知名的应用包括\
    \ Mathematica、Maple 和 Maxima。\n\n在本节中，您将学习如何与 Maxima 交互，这是一个开源的 CAS，可用于协助金融数学模型的开发。您还将了解如何将新的或现有的\
    \ C++ 代码集成到 Maxima 中，以便在使用 Maxima 解释器进行可视化时，对代码进行迭代实验。\n"
- fmt: 'Maxima CAS 是一款开源应用程序，可从其互联网仓库中免费下载和安装。该项目的官方网站位于 [http://maxima.sourceforge.net](http://maxima.sourceforge.net)。安装后，可以使用默认安装的现有前端界面之一来运行
    Maxima。Maxima 最常用的前端是 wxMaxima，这是一款跨平台应用程序，适用于 Windows、Mac OS X 和 Linux 操作系统。您也可以免费下载
    wxMaxima：最新版本可在开发者网站 [http://wxmaxima.sourceforge.net/](http://wxmaxima.sourceforge.net/)
    上获取。图 [16-2](#323908_2_En_16_Chapter.xhtml#Fig2) 展示了 wxMaxima 应用程序的主窗口。


    ![../images/323908_2_En_16_Chapter/323908_2_En_16_Fig2_HTML.jpg](images/323908_2_En_16_Chapter/323908_2_En_16_Fig2_HTML.jpg)

    图 16-2

    wxMaxima 应用程序的主窗口，它是 Maxima CAS 的一个前端。


    wxMaxima 应用程序是加载数据和执行数据分析（包括图形、汇总表和简单图表）的理想环境。此功能可用于根据我们在前几章讨论的算法结果，对财务数据进行快速研究。要将现有的
    C++ 代码与 Maxima 环境集成，您需要创建一个符合 Maxima 文档中所述约定的库。在本节中，您将学习如何使用一个计算期权概率的示例类来做到这一点。


    将 C++ 与 Maxima 集成的第一步是创建一个可由应用程序加载的共享对象库。使用大多数编译器和集成开发环境 (IDE) 都可以轻松创建此类库。我将展示如何在
    Windows 上使用 MingW 的 `gcc` 编译器完成此操作。其他环境具有类似的功能，并且这些说明的大部分内容将是相似的，但您需要查阅 Maxima
    网站上的文档。


    在 Windows 中，可以使用 `gcc` 编译器从 C++ 代码创建 DLL 文件。DLL 的内容将包含`OptionsProbabilities`类，该类已在第
    [14](#323908_2_En_14_Chapter.xhtml) 章中解释过。为方便参考，我将该类的头文件包含在列表 [16-2](#323908_2_En_16_Chapter.xhtml#PC5)
    中。`OptionsProbabilities`类的主要操作用于计算特定概率，例如期权价格高于或低于执行价的概率（通过`probFinishAboveStrike`和`probFinishBelowStrike`计算）。您还可以使用成员函数`probFinalPriceBetweenPrices`计算价格落在某个区间内的概率。然后，需要在`OptionProbabilityExportedFunctions.cpp`文件中创建粘合代码。该文件声明了导入
    DLL 的客户端可以查看的函数。


    例如，考虑函数`optionProbFinishAboveStrike`。声明中的`extern "C"`部分表示函数名不应被 C++ 编译器修改，以便在运行时可以找到它。`__declspec(dllexport)`声明告诉编译器和链接器此函数应在生成的
    DLL 中导出。其余部分都是正常的 C++ 代码，用于实例化`OptionsProbabilities`类的对象并调用所需的函数。


    接下来需要解决的问题是如何告诉 Maxima 找到这些外部函数。这是通过一个可以被 Maxima 加载的简单 Lisp 文件来完成的。Lisp 是 Maxima
    用于实现其所有功能的内部编程语言。要使用底层代码扩展 Maxima，通常需要创建一些 Lisp 函数。然而，在本例中，我们只使用两个 Lisp 函数来创建所有必要的
    C++ 代码，以连接之前创建的 DLL。


    这个 Lisp 文件命名为`optionProbabilities.l`，如列表 [16-2](#323908_2_En_16_Chapter.xhtml#PC5)
    所示。该文件包含两部分：第一部分是一个包含 C 代码的`clines`函数，这些代码将被编译并由 Maxima 使用。第二部分是一组所需函数的 Lisp 声明。`clines`内部的代码必须放在引号之间，因此需要转义任何引号（和反斜杠字符），方法是使用反斜杠。除此之外，您可以输入任何正常的
    C 语句。您会发现其中有四个函数用于从 DLL 加载所需的代码。


    `optionProbabilities.l`中的第一个函数`loadLibrary`负责加载 DLL（如果尚未加载）。这是通过两个 Windows API
    函数`LoadLibraryA`和`GetProcAddress`完成的。`LoadLibraryA`函数将库名称作为参数，如果加载成功，则返回一个指向它的引用。另一方面，`GetProcAddress`函数检索一个指向其第二个参数中命名函数的指针。一旦`loadLibrary`完成其工作，您将获得指向`optprob.dll`文件中导出的三个函数的指针。


    然后，`optionProbabilities.l`中的接下来的三个函数用于调用 DLL 中的每个所需函数。该文件以三个声明结束，这些声明告诉 Maxima
    将这些函数作为顶层操作接受，并指定所需的类型。


    完整代码


    在列表 [16-2](#323908_2_En_16_Chapter.xhtml#PC5) 中，您可以找到用于在 Maxima CAS 中使用`OptionsProbabilities`类的完整代码。在
    C++ 代码之后，您还可以看到将类导入 Maxima 环境所需的 Lisp 代码行。'
  raw: "The Maxima CAS is an open source application\nthat can be freely downloaded\
    \ and installed from its Internet\nrepository. The main website for the project\
    \ is located at [`http://maxima.sourceforge.net`](http://maxima.sourceforge.net).\n\
    Once installed, Maxima can be run using one of the existing front ends\nthat are\
    \ installed by default. The most commonly used front end to\nMaxima is wxMaxima,\
    \ a cross-platform application available for the\nWindows, Mac OS X, and Linux\
    \ operating systems. You can also download\nwxMaxima for free: the latest version\
    \ is available on the developer’s\nwebsite at [`http://wxmaxima.sourceforge.net/`](http://wxmaxima.sourceforge.net/).\n\
    Figure [16-2](#323908_2_En_16_Chapter.xhtml#Fig2) shows the main\nwindow of the\
    \ wxMaxima application.\n\n![../images/323908_2_En_16_Chapter/323908_2_En_16_Fig2_HTML.jpg](images/323908_2_En_16_Chapter/323908_2_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2\nMain window for the wxMaxima application, a\nfront end for the\
    \ Maxima CAS\n\nThe wxMaxima\napplication is an ideal environment for loading\
    \ data and\nperforming data analysis, including graphs, summary tables, and simple\n\
    charts. This functionality can be used to perform quick studies on\nfinancial\
    \ data, based on the results of algorithms such as the ones we\ndiscussed in the\
    \ previous chapters. To integrate existing C++ code with\nthe Maxima environment,\
    \ you need to create a library that is compatible\nwith the conventions stated\
    \ on Maxima documentation. In this section,\nyou will learn how to do so with\
    \ a sample class that calculates options\nprobabilities.\nThe first step in integrating\
    \ C++ with Maxima is to create a shared object\nlibrary \nthat can be loaded by\
    \ the application. Creating such a library can be\neasily done with most compilers\
    \ and integrated development\nenvironments (IDEs). I will show how this can be\
    \ done in Windows\nwith the MingW gcc compiler. Other environments have similar\
    \ features\nand most of these instructions will be similar, but you need to check\n\
    the documentation in Maxima’s website.\nIn Windows, the gcc compiler can be used\
    \ to create dll files from C++\ncode. The contents of the dll will include the\
    \ class `OptionsProbabilities`\n, which was explained in Chapter [14](#323908_2_En_14_Chapter.xhtml).\
    \ For ease of reference, I include\nthe header file for the class in Listing [16-2](#323908_2_En_16_Chapter.xhtml#PC5).\
    \ The main\noperations of the class `OptionsProbabilities`\nare used to calculate\
    \ specific probabilities, such as the probability\nthat an option will be above\
    \ or below the strike price, as calculated\nwith `probFinishAboveStrike`\nand\
    \ `probFinishBelowStrike`.\nYou can also compute the probability of finishing\
    \ between prices using\nthe member function `probFinalPriceBetweenPrices`.\nThen,\
    \ it is necessary to create the glue code in file `OptionProbabilityExportedFunctions.cpp`.\n\
    This file declares functions that can be viewed by clients that import\nthe dll.\n\
    Consider, for example, the function `optionProbFinishAboveStrike`\n. The `extern\
    \ \"C\"` part of the declaration says the function name should not be\nmodified\
    \ by the C++ compiler, so that it can be found at runtime. The\n`__declspec(dllexport)`\n\
    declaration tells the compiler and linker that this function should be\nexported\
    \ in the resulting dll. Everything else is normal C++ code that\ninstantiates\
    \ an object of class `OptionsProbabilities`\n and calls the desired function.\n\
    The next part of the problem that you need to solve is how to tell\nMaxima to\
    \ find these external functions. This is done using a simple\nlisp file that can\
    \ be loaded by Maxima. Lisp is the internal programming\nlanguage used by Maxima\
    \ to implement all its functionality. To extend\nMaxima using lower-level code,\
    \ you frequently have to create some lisp functions. In this\ncase, however, we\
    \ will use only two lisp functions that create all the\nnecessary C++ code connecting\
    \ to the dll created earlier.\nThe lisp file is named `optionProbabilities.l`\n\
    and is shown in Listing [16-2](#323908_2_En_16_Chapter.xhtml#PC5). There are two\n\
    parts in this file: the first part is a `clines` function  that contains C code\n\
    that will be compiled and used by Maxima. The second part is a set of\nlisp declarations\
    \ for the desired functions. The code inside `clines` has to be\nbetween quotes,\
    \ and for this reason, it needs to escape any quotes (and\nbackslash characters)\
    \ using a backslash. Other than\nthat, you can type any normal C statement. You\
    \ will find that there are\nfour functions that load the desired code from the\
    \ dll.\nThe first function in `optionProbabilities.l`,\n`loadLibrary`, is\nresponsible\
    \ for loading the dll if this has not been done already. This\nis done using two\
    \ Windows API functions: `LoadLibraryA` and\n`GetProcAddress`.\nThe function `LoadLibraryA`\
    \ takes\nthe name of the library as parameter and returns a reference to it, if\n\
    the load was successful. The function `GetProcAddress`\n, on the other hand, retrieves\
    \ a pointer to the function named as\nin its second parameter. Once `loadLibrary`\
    \ has\ncompleted its work, you will have pointers to the three functions\nexported\
    \ in the file `optprob.dll`.\nThe next three functions in `optionProbabilities.l`\n\
    are then used to call each of the desired functions in the dll. The file\nends\
    \ with three declarations that tell Maxima to accept these functions\nas top-level\
    \ operations, along with the desired types.\n\nComplete Code\n\nIn Listing [16-2](#323908_2_En_16_Chapter.xhtml#PC5),\
    \ you can find\nthe complete code for using the `OptionsProbabilities`\nclass\
    \ from the Maxima CAS. After the C++ code, you can also see the\nlines of lisp\
    \ code necessary to import the class into the Maxima\nenvironment."
