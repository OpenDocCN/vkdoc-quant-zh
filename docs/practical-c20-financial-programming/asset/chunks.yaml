    \ in certain boost libraries by simply adding a header file to your code.\n\n\
    Table [4-1](#323908_2_En_4_Chapter.xhtml#Tab1) shows some of the libraries available\
    \ in the boost distribution.\n\nTable 4-1\n\nSome of the Most Commonly Used Components\
