    ## 第二版引言


    在本书的第二版中，示例和文本已被修订以符合最新的`C++`标准，即`C++20`。虽然我们的大部分示例在新的标准下仍能编译并正常运行，但我们感到有必要介绍新的`C++`特性，这将使开发金融应用更加容易。


    例如，附录现在呈现了一些仅在`C++20`中可用新特性。我们还解释了如何在标准库中使用线程，以及其他改进。所有示例都已测试，以确保我们符合最新标准。


    ## 编译代码示例


    本书中给出的示例已全部在`Windows`上使用`MingW gcc`编译器，以及在`Mac OS X`上使用`Xcode 12 IDE`进行了测试。然而，您应该能够使用任何实现`C++20`标准的、符合标准的`C++`编译器来构建代码。例如，`gcc`在`Linux`和其他平台上可用，`Microsoft
    Visual Studio`同样适用于`Windows`。


    如果您使用`Mac OS X`并且计算机上未安装`Xcode`，您可以免费从苹果开发者网站[`http://developer.apple.com`](http://developer.apple.com)下载。代码也可以在命令行编译，正如各章中所解释的那样。


    如果您希望在`Windows`上使用`MingW`，您可以从网站[`www.mingw.org`](http://www.mingw.org)下载。


    一旦`MingW`安装完成，从开始菜单的`MingW`程序组启动命令提示符。然后，您可以输入`gcc`来检查编译器是否正确安装。


    要下载完整的示例集，请访问本书的网页[`http://coliveira.net`](http://coliveira.net)，或导航至`apress.com/9781484268339`并点击
    **Download Source Code** 按钮。


    关于作者

