- fmt: '# The Fixed Income Market


    The fixed income market is a large part of the financial industry, and it presents
    unique challenges and opportunities for its practitioners. A large amount of the
    money managed by pension funds and other institutional funds is allocated to fixed
    income investments. Because fixed income has a predictable income stream, conservative
    money managers view it as a safer investment option when compared to stocks and
    more exotic derivatives. As a result, traditional institutions commit a lot of
    time and effort to the fixed income industry.


    As software engineers, our main goal when working in the fixed income market is
    to define computational strategies and solve problems so that our clients can
    be successful. `C++` is a language that is uniquely poised to the solution of
    problems in this industry. This is due to its flexibility and high performance
    on standard computational platforms. Moreover, `C++` is a highly portable language
    that can be used in a variety of computer systems.


    As a result of the advantages just mentioned, `C++` programing has been widely
    used in this area of finance, and it is one of the preferred languages used in
    banks, hedge funds, pension funds, and other large institutions that have to deal
    with fixed income as one of their main investment vehicles. Programmers who work
    with `C++` have over the years developed software that offers useful capabilities
    for fixed income analysis, such as computing prevailing interest rates and determining
    cash flow valuations. All of these features need to execute with incredible speed,
    with the help of some of the techniques explored in later sections of this book.
    Due to its new standard, `C++20`, the language is nowadays even more capable of
    satisfying the strict requirements demanded by the financial industry.


    In this chapter, I provide a quick introduction to this area of finance and show
    you a few `C++` coding examples that can be used in the solution of some of the
    most common programming problems occurring in fixed income markets. These coding
    examples include the solution to problems involving:


    * Simple interest rate calculation

    * Compound interest rate calculation

    * Cash flow modeling

    * Determination of the present value of cash flows

    * Modeling and valuation of bonds


    In the remainder of this chapter, I will also show you why `C++20` may be the
    ideal language to deal with programming problems occurring in the financial investment
    industry and in particular how to solve problems in fixed income investing. Then,
    I will provide a general introduction to the issues occurring in fixed income
    investments and an overview of how the fixed income market works. Then, I will
    start with a few programming examples that explore the concepts discussed in the
    previous sections.


    ## Fixed Income Overview


    We start our discussion with a general overview of fixed income instruments. While
    this is not a book on finance or economics, it is still important to have a few
    concepts in place. My general goal is to describe how to use these concepts in
    the solution of the practical computational problems that we discuss in the latter
    part of this chapter.


    In a fixed income investment, a contractually defined exchange occurs between
    two parties. Both parties agree to exchange cash flows that are assigned based
    on interest rates and the time of cash exchanges. Fixed income investments are
    very diverse, but they include the following well-known types of investments vehicles:


    * **Money market funds**: These are short-term investments that offer a small
    rate of return but at the same time provide easy availability of funds at your
    own convenience. Money market funds have a very short-term horizon, and they only
    pay returns that are close to the spot rate practiced by banks. Since money market
    funds have a small return that is hard to predict over a long period, they are
    used mostly for their liquidity.

    * **Bonds**: This is a major category of fixed income applications. Bonds pay
    a predetermined interest rate for a well-defined period of time. They are issued
    by a variety of institutions, including companies and all levels of government.
    The American government, for example, issues treasury bonds, which are one of
    the main investment vehicles used throughout the world.

    * **Certificates of deposit**: These are fixed income investments issued by banks
    to their retail customers. They are simple investments that pay a fixed interest
    rate for a predefined period, usually between 1 and 5 years. They are used mainly
    for the convenience of small investors who lack access to more sophisticated fixed
    income markets and want to invest from their own checking or savings account.


    The main reason for investors to enter the fixed income market is to take advantage
    of a relatively safe investment opportunity, where the returns are known and predictable.
    Compared to the stock market, fixed income investments have the advantage of being
    easier to analyze. This is true because, for equity investments, for example,
    it is practically impossible to determine how much money a company will make in
    a few years from now. With a fixed income investment such as a bond, however,
    you have a contract that guarantees the return on the investment for a specified
    period of time.


    Clearly, there are also risks in such fixed income investments. A well-known risk
    is that of the default of the institution issuing the bond, for example. In that
    case, investors may lose a part of the, or the whole, investment. The second big
    risk, which is frequently overlooked by investors, is that the rate of return
    will not be able to cope with inflation during the period of the investment. For
    example, if the rate of return is 6% a year but inflation is around 4%, then your
    real rate of return is just 2% (and that is the return before taxes).


    This all shows that analyzing fixed income investments is not as easy as it initially
    sounds. It is not just a matter of finding the institution paying the largest
    interest rate and putting all your money on its bonds. This is one of the reasons
    why money managers need reliable software that can be used to decide which is
    best among myriad fixed income investments. Just as the stock market presents
    thousands of possibilities that need to be carefully analyzed, the fixed income
    industry has a huge number of available choices. One of the big tasks for software
    developers is to create systems that can easily track these investments and help
    in choosing the right options for long-term investors.


    **Note**'
