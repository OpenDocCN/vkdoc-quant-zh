    Listing 13-2\nModified CAP Implementation\n```\n\nRunning the Code\n\nThe `ModifiedCAP`\n\
    class presented in Listing [13-2](#323908_2_En_13_Chapter.xhtml#PC7) can be compiled\n\
    using any standards-compliant C++ compiler. The `main` class depends on\nother\
    \ classes presented before, such as `LPSolver` and `Matrix`. The code also\ndepends\
    \ on the GLPK library, which you can download for free as\ndescribed in the previous\
    \ chapter. After building this class into the\nexecutable `ModifiedCap`, you can\n\
    run the test `main` function and see\nresults similar to what is shown in the\
    \ following code:\n\n```\nGLPK Simplex Optimizer, v4.54\n13 rows, 9 columns, 46\
    \ non-zeros\n0: obj =   0.000000000e+00  infeas =  1.080e+00 (0)\n*     8: obj\
    \ =   3.380952381e-03  infeas =  0.000e+00 (0)\n*    10: obj =   1.881151309e-03\
    \  infeas =  1.110e-16 (0)\nOPTIMAL LP SOLUTION FOUND\nobj value: 0.00037623\n\
    x0: 0.320288 x1: 0.520288 x2: 0.159424 x3: 0 x4: 1.43914e-06 x5: 0 x6: 0.000879712\
    \ x7: 0.000320288 x8: 0.000679712\nProgram ended with exit code: 0\n```\n\nLooking\
    \ at the output, the result shows nine LP variables. From the\nformulation, you\
    \ will see that the first four variables correspond to\nthe original CAP variables,\
    \ while the last five are related to the time\nperiods and therefore not used\
    \ in the portfolio construction. These\nresults tell the portfolio manager that\
    \ only the first three assets\nshould be considered in the portfolio, with percentages\
    \ equal to 32%,\n52%, and 15%, respectively.\nTo improve these results, you can\
    \ modify the model accordingly to\nyour goals. For example, you can try a different\
    \ return and see how the\nportfolio will change based on the additional information.\n\
    \nExtensions to Modified CAP\nIn this section, we create extensions to the modified\
    \ CAP model so\nthat no asset is assigned more than 30% of the portfolio. Also,\
    \ add a\nrule that asset classes gold and treasury bills compose at least 15%\
    \ of\nthe portfolio.\n\nSolution\nIn the section “Portfolio Optimization,” you\
    \ saw how to create an\noptimization model to determine the optimal allocation\
    \ of capital to a\nspecified portfolio so that the required target return is achieved\
    \ while\nminimizing the volatility of the resulting portfolio. The given\nformulation\
    \ is a modification of the original method proposed in CAP,\nwhich is a quadratic\n\
    optimization model. Despite this, you can achieve quite fast\nresults using a\
    \ linear programming version of the model.\nAlthough this model is able to cover\
    \ the basis of a portfolio\nconstruction strategy, you can try other useful variations.\
    \ For example,\na common modification of the LP model presented previously consists\
    \ of\nadding the minimum and maximum requirement for each asset type.\nFor example,\
    \ suppose that you may want to increase the\ndiversification of your portfolio\
    \ by enforcing a limit on the percentage\nheld of each asset. The main idea here\
    \ is to avoid big losses that\nresult from a portfolio concentrated in a small\
    \ number of assets. Such a\nrequirement could be easily added to the model with\
    \ the following\nconstraint:\n*x*[*j*] ≤ *M*, *for each j* ∈\n{1...*n*}\nHere,\
    \ *M* is the desired percentage limit. When run, the LP\nsolver will guarantee\
    \ using this constraint that each percentage is not\ngreater than the given amount\
    \ *M*.\nSimilarly, you can also define a minimum amount held for each asset.\n\
    In this case, it is frequently useful to have separate minimum values\nfor each\
    \ possible investment. For example, you may want to have a\nportfolio where treasury\
    \ bills will be at least 5% at any time. If we\ndenote the minimum required allocation\
    \ by\n*K*[*j*], this would lead to a constraint of the\ntype\nx[j] ≥ Kj, for each\
    \ j ∈ {1...n}\n\nIn general, similar modifications can also be done for combinations\
    \ of\nassets, such as treasury bills and gold. This would also work for larger\n\
    groups of assets, such as adding a minimum threshold for the total\nnumber of\
    \ all growth stocks in a portfolio. If you have a group of\nstocks *L* and an\
    \ associated limit\n*K*[*L*], then this general constraint can be\ndenoted by\n\
    \n![$$ \\sum \\limits_{j\\in L}{x}_j\\ge {K}_L. $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equp.png)\n\
    \nFinally, you can also use the idea of groups of assets to define an\nupper bound\
    \ of the percentage held in these investments. For example, if\nyou want to limit\
    \ the percentage of a portfolio exposed to technology\nstocks, you can denote\
    \ the group by *U* and the limit by\n*K*[*U*], resulting in the following constraint:\n\
    \n![$$ \\sum \\limits_{j\\in U}{x}_j\\le {K}_U. $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equq.png)\n\
    \nFor the benefit of simplicity, I have provided an alternative version of\nthe\
    \ `ModifiedCAP`\nclass , where we\nhave an alternative rule for diversification\
    \ (at 37% level) and a\nminimum of 15% for the combined assets 1 and 2 (gold and\
    \ treasury\nbills). The new code is implemented in the function `solveExtendedModel`,\n\
    defined as\n\n```\nvoid solveExtendedModel(std::vector &results, double &objVal);\n\
    ```\n\nThe remaining parts of the class remain unchanged in this coding\nexample.\n\
    \nComplete Code\n\nYou can find the code to solve the extended version of the\
    \ CAP model in\nListing [13-3](#323908_2_En_13_Chapter.xhtml#PC10). In the header\n\
    file, I show the complete class declaration, which is similar to the\nprevious\
    \ listing except for the added function, `solveExtendedModel`.\nThe implementation\
    \ file shows only the new member function, along with a\ntest `main`\nfunction."
