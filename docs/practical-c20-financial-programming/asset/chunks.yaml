  raw: '**Chapter** [**13**](#323908_2_En_13_Chapter.xhtml) **—Asset and Portfolio
    Optimization**: Portfolio managers have to face the issue of balancing a portfolio
    for optimal performance, depending on their predefined portfolio goals. Optimization-based
    techniques have been developed to deal with some of the most common portfolio
    construction problems. In this chapter, we consider algorithms for portfolio optimization
    using C++. We consider how to design such optimization code in order to get results
    that are as fast and as accurate as possible. Topics include (1) creating a portfolio
    model, (2) performing resource allocation, and (3) using linear techniques for
    portfolio optimization.


    **Chapter** [**14**](#323908_2_En_14_Chapter.xhtml) **—Monte Carlo Methods**:
    Among other programming techniques used in equity markets analysis, Monte Carlo
    simulation has a special place due to its wide applicability and easy implementation.
    These methods can be used to forecast prices or to validate buying strategies,
    for example. In this chapter, I provide programming examples that can be used
    as part of simulation-based algorithms, with topics such as (1) random number
    generation, (2) optimization through Monte Carlo methods, and (3) simulation models
    for price forecasting.


    **Chapter** [**15**](#323908_2_En_15_Chapter.xhtml) **—Extending Financial Libraries**:
    C++ is a complete language that can be used to develop the most complex software.
    However, it is sometimes beneficial to combine C++ libraries with scripting languages
    that can simplify the creation of prototypes and other noncritical applications.
    In this chapter, I show you how to use the solutions and algorithms discussed
    in the text as external libraries for scripting languages that are commonly employed
    in the financial industry. In particular, you will learn how to (1) extend C++
    with Python and (2) extend C++ with Lua scripts.


    **Chapter** [**16**](#323908_2_En_16_Chapter.xhtml) **—Using C++ Code with R and
    Maxima**: Financial algorithms in C++ can be used not only as part of executable
    code but also as part of other modeling and development environments. In this
    chapter, I show you how to integrate financial libraries into two well-known simulation
    and modeling environments for financial analysis: R and Maxima. You will see how
    it is possible to create loadable modules for these environments, incorporating
    complex C++ algorithms in a way that they are ready to use from scripts written
    in R and Maxima.


    **Chapter** [**17**](#323908_2_En_17_Chapter.xhtml) **—Multithreading**: Financial
    applications have very stringent performance requirements. A common way to improve
    response time is to use concurrency and parallel programming techniques, such
    as multithreading. C++ can be used to write very responsive multithreaded applications,
    and in this chapter, I explore algorithms for creating and managing threads, with
    applications to financial problems. I also cover the important topic of data access
    synchronization. Topics include (1) creating threads, (2) protecting shared memory,
    (3) synchronization techniques, and (4) threads using the standard library.


    **Appendix A—C++20 Features**: C++ is an evolving language, and in the last few
    years, we have seen a renewed effort to bring much-needed updates. The latest
    efforts are the C++17 and C++20 standards, and major C++ compilers are incorporating
    these features at a fast pace. In the appendix, I cover examples that show how
    some of these features can improve your code and simplify the development of new
    programs and libraries. You will learn about new features such as (1) auto variables,
    (2) closures, (3) rvalues, (4) const expressions, and (5) initializer lists.


    ## Introduction to the Second Edition


    In this second edition of the book, the examples and the text have been revised
    to conform to the latest C++ standard, C++20\. While much of our examples continue
    to compile and work properly in the new standard, we felt the need to present
    new C++ features that will make it easier to develop financial applications.


    For example, the appendix now presents some new features only available in C++20\.
    We also explain how to use threads in the standard library, among other improvements.
    All examples have been tested to make sure that we conform to the latest standard.


    ## Compiling the Code Samples


    The examples given in this book have all been tested on Windows using the MingW
    gcc compiler and on Mac OS X using the Xcode 12 IDE. You should be able to build
    the code, however, using any standards-compliant C++ compiler that implements
    the C++20 standard. For example, gcc is available on Linux and other platforms,
    and Microsoft Visual Studio will also work on Windows.


    If you use Mac OS X and don’t have Xcode installed in your computer, you can download
    it for free from Apple’s developer website at [`http://developer.apple.com`](http://developer.apple.com)
    . The code can also be compiled from the command line, as it is explained in each
    chapter.


    If you instead want to use MingW on Windows, you can download it from the website
    [`www.mingw.org`](http://www.mingw.org) .


    Once MingW is installed, start the command prompt from the MingW program group
    in the start menu. Then, you can type gcc to check that the compiler is properly
    installed.


    To download the complete set of examples, visit the web page for this book at
    [`http://coliveira.net`](http://coliveira.net) , or navigate to `apress.com/9781484268339`
    and click the **Download Source Code** button.


