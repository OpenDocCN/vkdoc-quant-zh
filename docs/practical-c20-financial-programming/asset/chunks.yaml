- fmt: "For each element after the Nth position, it is possible to calculate the moving\
    \ average. This is achieved using the sum of the previous N elements and dividing\
    \ it by the value N. The resulting value is appended to the vector of moving average\
    \ elements. Finally, it is necessary to update the variable `sum`, so that the\
    \ first item of the N-element sequence is dropped from the summation. This happens\
    \ when the algorithm subtracts the value `m_prices[i-m_numPeriods]`, preparing\
    \ for the next iteration.\n\nThe exponential moving average (EMA) is different\
    \ from the simple moving average because each new value is multiplied by a factor.\
    \ This factor is used to give more weight to new values, as compared to older\
    \ observations. As a result, the EMA is more responsive to changes in the observed\
    \ values, and it can indicate new trends sooner and with better accuracy. This\
    \ may be an advantage if you want to quickly spot changes in trend. The following\
    \ is the code that I used:\n\n```\nstd::vector MACalculator::calculateEMA()\n\
    {\nstd::vector ema;\ndouble multiplier = 2.0 / (m_numPeriods + 1);\n// calculate\
    \ the MA to determine the first element corresponding\n// to the given number\
    \ of periods\nstd::vector ma = calculateMA();\nema.push_back(ma.front());\n//\
    \ for each remaining element, compute the weighted average\nfor (int i=m_numPeriods+1;\
    \ i<m_prices.size(); ++i)\n{\ndouble val = (1-multiplier) * ema.back() + multiplier\
    \ * m_prices[i];\nema.push_back(val);\n}\nreturn ema;\n}\n```\n\nThe initial part\
    \ of the calculation is similar to the simple moving average. Values are added\
    \ using the `sum` variable, until at least N values have been observed. This is\
    \ used as the initial value for the EMA. Different implementations of EMA use\
    \ other ways to initialize the sequence, but the results converge to the same\
    \ values after a few iterations. You can see a graphical example of EMA in Figure\
    \ [2-2](#323908_2_En_2_Chapter.xhtml#Fig2).\n\n![../images/323908_2_En_2_Chapter/323908_2_En_2_Fig2_HTML.jpg](images/323908_2_En_2_Chapter/323908_2_En_2_Fig2_HTML.jpg)\n\
