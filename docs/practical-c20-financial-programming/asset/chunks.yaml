    # 解法


    求解方程的根，就是找出函数值为零的所有点。在计算数学的发展过程中，人们设计出了多种求解方程根的方法。本章将介绍其中几种最常见的方法。


    二分法采用一种简单的策略来寻找方程的根：其思想是观察函数在定义域不同点的符号，并利用这些信息来判断该区间内是否存在根。例如，考虑函数 *f*(*x*) =
    (*x*–1)³。


    图 9-1 展示了该函数在区间 -1 到 3 上的图形。


    ![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig1_HTML.jpg](img/323908_2_En_9_Fig1_HTML.jpg)


    图 9-1：区间 -1 到 3 上的函数 (x–1)³


    该函数在 `x=1` 处有一个根，并且有两个符号截然不同的区域：当 `x<1` 时，符号为负；当 `x>1` 时，函数符号为正。若要精确确定函数为零的点，可以从一个函数符号不同的区间开始（本例中可使用区间
    -1 到 3），然后寻找函数符号改变的确切位置：那里必定是函数的一个根。


    > **注**：此论证仅当所处理的函数是连续函数时才成立。也就是说，函数不存在从一个点突然跳变到另一个点的情况，否则上述论证将失效。连续函数在其定义域内是可微的，因此这是判断函数是否连续的一种方法。经济学、物理学和工程学中的大多数函数都具有这一性质，因此我们假设应用二分法时函数都是连续的。


    基于这一直观认识，二分法尝试采用一种系统的方法来确定所测试的区间以及符号发生变化的位置。本质上，该方法是将原始区间一分为二，并判断子区间是否仍然存在符号差异。


    例如，仍使用同一函数，假设我们取原始区间为 -1 到 2。该区间的中点是 ½，因此算法将检查 ![$$ \mathrm{f}\left(\frac{1}{2}\right)={\left(\frac{1}{2}-1\right)}³={\left(-\frac{1}{2}\right)}³=-\frac{1}{2³}=-\frac{1}{8}
    $$](img/323908_2_En_9_Chapter_TeX_IEq1.png) 的符号。现在，考虑初始区间两个端点的符号：


    - *f*(–1) = (–1–1)³ = –8，因此符号为负。

    - *f*(2) = (2–1)³ = 1³ = 1，因此符号为正。


    这意味着在 *x* = –1 和 ![$$ x=\frac{1}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq2.png)
    之间，符号相同。另一方面，在 ![$$ x=\frac{1}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq3.png)
    和 *x* = 2 之间，符号发生了变化。因此，根必定位于符号变化的位置，即在 ½ 和 2 之间的某处。


    对该过程再迭代一次，计算 ![$$ f\left(\frac{5}{4}\right)={\left(\frac{5}{4}-1\right)}³={\left(\frac{1}{4}\right)}³=1/{4}³
    $$](img/323908_2_En_9_Chapter_TeX_IEq4.png) 的值，结果为正值。由于 *f*(1/2) 为负，*f*(2) 为正，符号变化必定发生在区间
    ![$$ \frac{1}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq5.png) 到 ![$$ \frac{5}{4}
    $$](img/323908_2_En_9_Chapter_TeX_IEq6.png) 之间。通过查看图 9-1 中的图形，很容易验证这一点。请注意，此过程将系统性地缩小我们寻找方程根的区间范围。每一步，区间长度都缩减一半，使我们更接近根的位置。经过多次迭代后，你将得到一个与真实根足够接近的数值。因此，当剩余区间的长度小于所需误差时，该算法即可停止。例如，如果区间长度小于
    0.001，而所需误差为 0.01，则可以停止。


    利用刚刚描述的过程，我们现在可以用以下方式描述二分算法的步骤：


    1.  定义一个初始区间 `(a,b)`，你希望在该区间内寻找方程的一个或多个根。


    2.  计算 *f*(*a*) 和 *f*(*b*) 的值。


    3.  确定区间 (*a*,*b*) 的中点 ![$$ c=\frac{a+b}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq7.png)
    及其对应的函数值 *f*(*c*)。


    4.  如果 *f*(*a*) 和 *f*(*c*) 的符号不同，则 (*a*,*c*) 成为算法的新区间。否则，新区间定义为 (*c*,*b*)。


    5.  如果新区间的长度小于误差（阈值）*E*，则停止并将 *c* 报告为解。否则，继续执行步骤 1。


    上述算法以迭代方式工作，区间 (*a*,*b*) 的长度不断减半。因此，它将执行的步数上限为 ![$$ {\log}_2\frac{\left(b-a\right)}{E}
    $$](img/323908_2_En_9_Chapter_TeX_IEq8.png)。迭代次数与所需近似精度之间存在权衡，这意味着如果你希望误差非常小，则需要更多次的迭代。


    上述过程已被编码为 `BisectionSolver` 类的一部分，可用于求解方程的根。`BisectionSolver` 的一个有趣特性是，它可以作为任何连续函数的通用求解器。你只需将函数作为参数传递给该类的构造函数。


    为此，我创建了一个名为 `MathFunction` 的类，它不仅在此处有用，也对其他将函数作为参数的类有用。`MathFunction` 类定义了一个所谓的函数对象，即一个行为类似于函数的对象。这对我们的算法很重要，因为它允许我们将该对象像函数一样使用。


    要创建一个函数对象，你需要一个实现了 `operator()`（即函数调用运算符）的类。此外，我将 `MathFunction` 类定义为一个模板类，这样你就可以在创建具体实现时传入正确的返回类型。例如，你可能想要定义一个仅针对
    `float` 类型的 `MathFunction` 子类。或者，反过来，你可能有一个定义域为整数集的函数。

