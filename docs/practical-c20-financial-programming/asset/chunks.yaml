    \ &p);\n~ParallelOptionsProbabilities();\nParallelOptionsProbabilities &operator=(const\
    \ ParallelOptionsProbabilities &p);\ndouble probFinishAboveStrike();\nprivate:\n\
    int m_numSteps;       // number of steps\ndouble m_step;        // size of each\
    \ step (in percentage)\ndouble m_strikePrice; // starting price\n};\n#endif /*\
    \ defined(__FinancialSamples__ParallelRandomWalk__) */\n//\n//  ParallelOptionsProbabilities.cpp\n\
    #include \"ParallelOptionsProbabilities.h\"\n#include \"Thread.h\"\n#include \n\
    #include \n#include \n#include \n#include \nusing std::vector;\nusing std::cout;\n\
    using std::endl;\nstatic boost::rand48 random_generator;\nusing std::vector;\n\
    /// ---\nclass RandomWalkThread : public Thread {\npublic:\nRandomWalkThread(int\
    \ num_steps, double sigma, double startPrice);\n~RandomWalkThread();\nvirtual\
    \ void run();\ndouble gaussianValue(double mean, double sigma);\ndouble getLastPriceOfWalk();\n\
    double result();\nprivate:\nint m_numberOfSteps;     // number of steps\ndouble\
    \ m_sigma;          // size of each step (in percentage)\ndouble m_startingPrice;\
    \  // starting price\ndouble m_result;\n};\nRandomWalkThread::RandomWalkThread(int\
    \ numSteps, double sigma, double startingPrice)\n: m_numberOfSteps(numSteps),\n\
    m_sigma(sigma),\nm_startingPrice(startingPrice)\n{\n}\nRandomWalkThread::~RandomWalkThread()\n\
    {\n}\ndouble RandomWalkThread::gaussianValue(double mean, double sigma)\n{\nboost::random::normal_distribution\
    \ distrib(mean, sigma);\nreturn distrib(random_generator);\n}\ndouble RandomWalkThread::result()\n\
