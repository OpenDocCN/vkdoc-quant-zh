    # 解决方案


    多线程是一种将计算工作分发到两个或更多处理器核心的便捷方式，这可以提升整个应用程序的性能。然而，虽然多线程有许多优点，但它也增加了软件设计的复杂性。例如，多线程架构中需要解决的问题之一是线程之间共享资源的访问。如果内存中的一个变量被两个或多个线程使用，那么其访问需要进行同步，以防止不同线程同时尝试修改值。


    一旦创建了一个新线程，就需要使用 `pthread` 库提供的机制来管理它。在最简单的情况下，新线程是独立的，不需要与原始（父）线程同步。然而，更常见的情况是，需要使用相同数据的多个线程之间需要进行同步。同步需求越大，管理共享数据所需的工作量也就越大。


    一段两个或多个线程可以访问共享资源的代码区域被称为 **临界区**（critical section）。临界区是代码中需要保护共享资源以避免冲突的区域。


    为了避免临界区固有的冲突，大多数多线程 API 提供了可用于实现同步操作的原语。这些原语在实现线程间的资源共享方面非常有效。这类原语有很多，例如信号量（semaphores）、互斥锁（mutexes）和消息（messages）等。`pthreads`
    库直接支持其中一些最常见的机制，包括互斥锁，它可以用来保证只有一个线程能够访问特定的临界区。


    **互斥锁**（mutex）是一种可用于协调两个或多个线程工作的同步机制。互斥锁的状态用于确定线程是否有权操作特定资源（例如内存中的变量）。当线程尝试访问互斥锁的值时，可能发生两种情况：如果互斥锁状态指示临界区可用，则线程可以直接进入临界区；然而，如果互斥锁状态指示忙碌状态，发起请求的线程将停止执行，并被发送到操作系统创建的等待区。只有当资源被其他线程释放后，操作才会恢复。所有这些等待和恢复活动都由操作系统协调。


    互斥锁在 `pthreads` API 中实现，其类型为 `thread_mutex_t`。可以使用函数 `pthread_mutex_init` 创建一个新的互斥锁，并使用函数
    `pthread_mutex_destroy` 销毁它。当共享资源即将被使用时，需要获取并锁定互斥锁。这保证了该互斥锁一次只能被一个线程使用。这是通过函数
    `pthread_mutex_lock` 完成的。如果互斥锁不可用，该函数会自动中断线程，并强制线程等待直到互斥锁被释放。你也可以使用 `pthread_mutex_trylock`
    尝试访问互斥锁而无需强制等待。如果互斥锁当前不可用，该函数将返回一个错误代码，你可以稍后重试。最后，一旦获取了互斥锁，你需要在同步操作结束时解锁它。这对于确保其他线程能够进入临界区并使用最近释放的资源是必要的。你可以使用函数
    `pthread_mutex_unlock` 解锁互斥锁。


    虽然互斥锁有效性的理论证明可能很复杂，但其使用非常简单。在清单 17-3 的编码示例中，你将看到一个名为 `Mutex` 的类，它封装了互斥锁同步操作的概念。这个类提供了两个主要函数：`lock`
    和 `unlock`。第一个成员函数在临界区的开头调用。第二个重要的成员函数是 `unlock`，应在临界区的末尾调用。`Mutex` 类还负责在构造函数中使用
    `pthread_mutex_init` 初始化 `pthread` 互斥锁，并在析构函数中使用 `pthread_mutex_destroy` 销毁它。


    用于封装互斥锁概念的第二个类是 `MutexAccess`。该类负责保证对互斥锁的每次访问都由一对对 `Mutex` 的 `lock()` 和 `unlock()`
    成员函数的调用组成。`lock()` 成员函数直接在构造函数中调用，而 `unlock()` 在 `MutexAccess` 的析构函数中自动调用。因此，如果临界区正好在声明
    `MutexAccess` 对象的作用域结束时结束，你无需担心解锁问题，因为 RAII 惯用法保证了当析构函数被调用时，互斥锁会被自动解锁。


    在 `MutexTestThread` 中，我们有一个在线程内使用 `Mutex` 类的示例。所演示的任务非常简单，但它说明了如何使用互斥锁来提供对共享资源的同步访问。这里，共享资源是
    `double` 类型的变量 `result`。该变量用于保存所需的计算结果；然而，它被应用程序中的所有线程访问。为了同步对该变量的访问，你需要使用互斥锁。可以实例化
    `MutexAccess` 类的一个对象，这会导致互斥锁（名为 `m_globalMutex`）被锁定。获取锁之后，你现在可以安全地检查该值并对引用变量进行更改。最后，在
    `run()` 成员函数的末尾，锁将被自动释放。


