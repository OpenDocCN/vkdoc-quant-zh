    standard library, but Table [1-2](#323908_2_En_1_Chapter.xhtml#Tab2) lists the
    most used containers.


    Table 1-2


    Common Containers Provided by the STL


    | Container | Description |

    | --- | --- |

    | vector | Ordered collection of elements with constant random access time |

    | queue | Container where elements are added at the end and removed from the front
    position |

    | map | Associative container that connects keys to their associated element |

    | multimap | Associative container that connects keys to a set of associated elements
    |

    | list | A linked list of elements, which provides constant time inclusion/exclusion
    at any position |

    | stack | A specialized container that allows only addition and removal of the
    last element (the top of the stack) |'
