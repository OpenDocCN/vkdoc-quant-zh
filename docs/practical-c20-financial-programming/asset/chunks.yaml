- fmt: '### Smart Pointers


    The C language popularized the concept of pointers, and it innovated when it provided
    a simple notation for direct memory access on a high-level language. Pointers
    allow the manipulation of memory addresses in a way that complies with the underlying
    data type of the data. For example, it is possible to use pointers to refer to
    successive addresses using increment and decrement operators. For instance, you
    may have


    ```

    int numbers[200];

    // initialize numbers here ...

    //

    int *parray = numbers;

    for (int i=0; i<200; ++i) {

    std::cout << "value is " << *parray << "\n";

    parray++;

    }

    ```


    In the previous example, `parray` is a pointer to an integer. It can be used to
    refer to the location of any integer value in memory. In particular, you can use
    it to hold the address of the first element of the `numbers` array. The code in
    the `for` loop is then used to print the current value pointed by `parray` and
    to update its address using the increment operator, which moves the pointer to
    the next integer location. Notice that this is possible even though the number
    of bytes per integer is greater than one. In fact, the increment operator is aware
    of the pointer type used and will change the address to point to the exact location
    of the next value for the declared type.


    While the notation for pointers is very powerful, and fully supported by C++,
    programmers should avoid the use of pointers in C++ code whenever possible. Pointers
    have over the years been linked to poor programming practices that lead to potential
    resource leaks, memory corruption, and security-related bugs. Because pointers
    allow indiscriminate access to the computer memory, it is relatively easy to misuse
    them, resulting in bugs that are difficult to fix.


    Some C++ classes and templates provide a great alternative to pointers, with little
    overhead and many of the same features. The main technique to avoid traditional
    pointers is to use smart pointer templates. Such smart pointers are simple templates
    that can be used to store addresses in a safer way. For example, a smart pointer
    of the type `std::shared_ptr` is a template-type object that allows the same address
    to be used by two or more parts of the code.


    The main advantage of a smart pointer over a traditional C++ pointer is that the
    smart pointer knows how to clean up itself when it is no longer needed. Thus,
    a large class of problems that occur when a programmer doesn’t dispose of the
    pointer is avoided. The cleanup mechanism is defined according to the rules of
    the RAII (Resource Acquisition Is Initialization) idiom: resources contained in
    a smart pointer are initialized in the constructor of the template object, and
    released during destruction, which typically happens when the object in question
    goes out of scope.


    There are different types of smart pointers, each one designed for a particular
    use case. The most commonly used smart pointers in C++ code are unique pointers
    and shared pointers.


    A unique pointer (of template type `unique_ptr`) provides a wrapper for a traditional
    C++ pointer. The template, however, defines the semantic of object ownership,
    so that other references to the pointer are not valid after the transfer of ownership
    occurs. A unique pointer can be used in situations in which the receiver will
    take full control of the pointed object, as well as any associated resource. Therefore,
    a pointer passed to a `unique_ptr` object should not be referenced again in contexts
    other than the one where the `unique_ptr` is used.


    A shared pointer (of template type `shared_ptr`) is a template that can be used
    to wrap an existing C++ native pointer. Unlike a unique pointer, a shared pointer
    can be used by two or more parts of the code. Internally, shared pointers maintain
    a counter that can be used to determine how many references to the original pointer
    have been created. This type of mechanism is referred to as reference counting.
    Every time a shared pointer object is destroyed, it checks its internal reference
    counter. If the counter is greater than zero, the internal object is not deleted.
    However, if the reference counter reaches zero, then the referred object is deleted
    and its destructor is activated.


    In this section, you will see the details of using a unique pointer. In the next
    section, I will introduce shared pointers.


    ### Using Unique Pointers


    The solution to our memory management problem involves the use of unique pointers.
    A unique pointer is implemented using the standard class `std::unique_ptr` and,
    like other smart pointers, can be used to provide automated cleanup and resource
    ownership.


    The policy used by `std::unique_ptr` ensures that once it has been assigned the
    ownership of the pointer, the memory stored in the pointer is not owned by anyone
    else. Therefore, the semantic of an `std::unique_ptr` involves the automatic destruction
    of the associated data as soon as the object goes out of scope. If the owner of
    the unique pointer doesn’t want to destroy the memory, it has the option of moving
    it to another unique pointer, in a process of transferring the ownership to another
    object. This is how I solved the issue of managing the memory associated to the
    returned `FinancialStatement`.


    First, consider the definition of the `FinancialStatement` class.


    ```

    class FinancialStatement {

    public:

    FinancialStatement();

    ~FinancialStatement();

    FinancialStatement(const FinancialStatement&);

    FinancialStatement &operator=(FinancialStatement &);

    double getReturn();

    void addTransaction(const std::string &security, double val);

    private:

    double m_return;

    std::vector> m_transactions;

    };

    ```


    There is also a function that is used to create a sample financial statement.


    ```

    std::unique_ptr getSampleStatement();

    ```


    This function returns a unique pointer to a sample statement. This means that
    the caller of the code owns the returned memory, since the caller will have a
    unique pointer that has been initialized with a pointer to the resulting object.
    The implementation of `getSampleStatement` is


    ```

    std::unique_ptr getSampleStatement()

    {

    std::unique_ptr fs(new FinancialStatement);

    fs->addTransaction("IBM", 102.2);

    fs->addTransaction("AAPL", 523.0);

    return fs;

    }

    ```


    After the `FinancialStatement` object has been allocated and used to create a
    unique pointer, it is initialized and finally returned to the caller. Since the
    return statement transfers the ownership of the pointer to the returned object,
    the original `FinancialStatement` object is not destructed. Instead, it is now
    owned by the caller of the `getSampleStatement` function.'
