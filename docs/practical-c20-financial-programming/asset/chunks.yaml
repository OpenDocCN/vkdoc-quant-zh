- fmt: '# Conclusion


    This chapter contains programming examples that show how to integrate existing
    C++ classes with two open source mathematical applications: R and Maxima. The
    number of users for environments like these is growing due to the ease of programming
    with such a dynamic language, along with the ability to see immediate results
    from computations. Although these mathematical applications already contain a
    lot of functionality, most financial developers also need to access existing C++
    code when making more complex analyses.


    The examples in this chapter show you how to interface your C++ code with these
    two popular open source mathematical applications. First, you learned how C++
    integration can be achieved with the R programming environment. You have seen
    an example where a set of payments are received as input, and the code calculates
    the present value of these payments.


    The second C++ example shows how to export an existing class to the Maxima CAS.
    With Maxima, you have access to a large number of mathematical tools to analyze
    and display data. The process of exporting C++ libraries to Maxima involves the
    creation of a dll and the use of some glue code written in C. Once you have these
    tools, it is possible to access any C++ code from Maxima.


    One of the secrets of creating useful financial software is to employ computational
    resources as efficiently as possible. In this way, it is possible to learn even
    more from existing investment data while making faster and more accurate decisions.
    In the next chapter, you will learn about multithreading, a programming technique
    that is frequently used to improve the performance of numerical and networking
    code used in financial applications. Because of the growing use of multicore processors
    in servers and even desktop machines, the use of multithreading has become a necessity
    for modern code written in C++. You can access such multiprocessing features from
    C++ using a few standard libraries, as you will see in Chapter [17](#323908_2_En_17_Chapter.xhtml).


    # 17. Multithreading


    C++20 applications are used in contexts where computational performance has great
    importance. The need for performance is even more prominent in financial applications
    such as high-frequency trading, where the difference between profit and loss may
    be just a few microseconds away. In such cases where performance is a requirement,
    it is very important to take advantage of the resources made available in modern
    CPUs (central processing units). In particular, multicore processing is one of
    the main features provided by new CPUs, with the number of available cores constantly
    increasing along with the complexity of chips.


    To benefit from multicore processors, however, C++ programmers need to learn a
    few parallel programming techniques that have rapidly become part of the C++ repertoire
    during the last decades. Using multiple processes is a possible way to explore
    this computational power. Multithreading, a method used to run several concurrent
    tasks inside the same process, is another technique that has the potential to
    take advantage of two or more cores at the same time.


    In this chapter, you will see a few examples that explore multithreading strategies
    for C++ programmers. With the knowledge provided in this chapter, you will be
    able to take full advantage of existing multicore systems on your applications.
    While multithreading is a useful strategy to employ in today’s applications, it
    will become even more important in the future, as desktop and server manufacturers
    are expected to continue to add more cores to their processors.


    In the traditional approach for multithreading, C++ programmers used libraries
    created to facilitate the access to the multithreading facilities provided by
    the operating system. A popular example is the `pthreads` library. However, the
    current standard C++20 provides another approach, whereby the use of threading
    is directly supported by the language, through templates in the `<thread>` header
    file. In this chapter, you will learn both ways. This is important because much
    of the existing multithreading code uses nonstandard libraries. However, new code
    should preferably use the templates provided by the standard library.


    The following are some of the topics discussed in this chapter:


    - **Using the `pthreads` library**: `pthreads` is a standard library that can
    be used to create and maintain multiple threads in the same process. In a multicore
    machine, creating threads is one of the most common ways to explore the parallel
    abilities of current architectures. You will learn how to create applications
    that employ the `pthreads` library to achieve parallel computation.


    - **Running algorithms in parallel threads**: You will see how to decompose problems
    in separate threads and combine their results into a new solution. As an example,
    I present a modified parallel algorithm for the calculation of options probabilities.


    - **Thread synchronization**: The use of multiple threads introduces the problem
    of synchronizing resources. You will learn how to use synchronization primitives
    such as mutexes to guarantee that resources are accessed and modified by only
    one thread at each time.


    - **STL threads**: The new multithreading classes and templates provided by the
    latest releases of the C++ standard.


    ## Creating Threads with the Pthreads Library


    Create a C++ class that distributes its work through several processing threads
    using the standard `pthreads` library.


    ### Solution


    Multithreading is one of the software solutions that have been created to support
    parallel computation. A thread is a unit of processing that can be performed in
    parallel along with other parts of a program, so that two or more segments of
    a program can be executed concurrently. In a multicore machine, this means that
    the same program may efficiently use two or more cores to perform additional work.
    Depending on how the code is organized, the careful use of multithreading techniques
    provides a good opportunity to improve the throughput of the whole algorithm.


    To use multithreading, however, support from the operating system is necessary.
    Since each operating system implements multithreading internally in its own way,
    it used to be the case that a multithreading application would be dependent on
    the operating system and architecture used. To avoid this problem, a standard
    `pthreads` (POSIX threads) library was proposed and adopted as part of POSIX.
    The `pthreads` library is available for multiple operating systems, including
    UNIX, Mac OS X, and even Windows (e.g., you can use the Cygwin libraries to access
    `pthreads` on Windows). Table [17-1](#323908_2_En_17_Chapter.xhtml#Tab1) provides
    a quick summary of functions in the `pthreads` API (application programming interface)
    that are available for application developers.


    **Table 17-1** List of Commonly Used Functions in the `pthreads` Library


    | Function name | Description |

    | --- | --- |

    | `pthread_create` | Creates a new thread |

    | `pthread_exit` | Finishes an existing thread |

    | `pthread_join` | Joins an existing thread, returning only after the thread exits
    |

    | `pthread_detach` | Detaches from a thread |

    | `pthread_attr_init` | Initializes an attribute data structure |

    | `pthread_attr_destroy` | Destroys an attribute data structure |

    | `pthread_attr_setstacksize` | Sets the size of the stack for a new thread |

    | `pthread_cancel` | Cancels the thread execution |

    | `pthread_mutex_init` | Initializes a mutex synchronization primitive |

    | `pthread_mutex_destroy` | Destroys a mutex |

    | `pthread_mutex_lock` | Locks a mutex |

    | `pthread_mutex_unlock` | Unlocks an existing mutex |

    | `sem_init` | Initializes a semaphore synchronization primitive |

    | `sem_destroy` | Destroys a semaphore |

    | `sem_wait` | Waits on a semaphore |'
