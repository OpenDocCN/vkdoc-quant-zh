- fmt: "虽然 `pthreads` 库是为与纯 C 程序兼容而编写的，但它可以轻松地作为 C++ 应用程序的一部分使用。可以简单地围绕使用 `pthreads`\
    \ 创建的线程创建一个包装器，以便从 C++ 代码中更容易地访问它们。在本节中，您将看到一个使用 `pthreads` 创建简单多线程应用程序的 C++ 代码示例。所使用的技术以及线程创建和同步的一般概念可以在您自己的程序中使用。\n\
    \n要在程序中创建一个独立的执行线程，您需要使用 `pthread_create` 函数。它接收的参数包括：一个标识符（整数值）、一个指向属性结构的指针（如果未使用可以为\
    \ `null`）、一个指向将由线程执行的函数的指针，以及一个指向线程函数参数的指针。如果未发生错误，该函数返回零；否则，它返回一个整数错误标识符。\n\n\
    在执行 `pthread_create` 函数后，程序会从指定的函数启动另一个线程。该线程独立于原始程序，并且可以在相同或独立的核心上运行（如果宿主机器有可用核心，具体由操作系统的线程调度器决定）。线程可以通过到达线程函数的末尾或显式调用\
    \ `pthread_exit` 函数来终止。\n\n在本节中，我将展示如何从 C++ 类访问 `pthreads` 库提供的功能。为此，我引入了 `Thread`\
    \ 类，它封装了运行中线程的概念。该类的目标是成为具体线程类的基类。在每个 `Thread` 的新子类中，唯一需要的成员函数是 `run()`，它决定了将由新线程执行的代码。\n\
    \n`Thread` 类中值得注意的方法如下：\n\n- `start`：需要被调用来启动线程的执行。\n- `endThread`：可以被调用来终止当前线程。\n\
    - `setJoinable`：决定该线程是否可以被其他线程连接（join）。\n- `join`：允许调用者连接此线程，这样调用者将仅在线程终止后才继续执行。\n\
    - `run`：此成员函数需要在每个子类中实现，并定义将在其自身线程中运行的代码。\n\n`Thread` 类使用了一个名为 `thread_function`\
    \ 的 C 函数，并在 `Thread.cpp` 文件中定义：\n\n```c\nvoid *thread_function(void *data)\n{\n\
    \    Thread *t = reinterpret_cast(data);\n    t->run();\n    return nullptr;\n\
    }\n```\n\n该函数的签名由 `pthreads` 库决定。一旦创建新线程，就会调用该函数。主要思想是，传递给函数的数据指针实际上是一个指向 `Thread`\
    \ 对象的指针。一旦使用 `reinterpret_cast` 运算符检索到它，该对象就可以用来执行 `run` 成员函数。根据 `Thread` 的具体子类，`run`\
    \ 方法可以执行子类创建者想要的任何任务。这足以保证代码将作为并行线程运行。\n\n**注意**\n\n> 请记住，`reinterpret_cast` 运算符可用于在\
    \ C++ 中的任意两种类型之间进行转换。因此，使用此运算符时务必小心，因为一旦应用，编译器就不会执行类型检查。\n\n除此之外，`start()` 和 `endThread()`\
    \ 函数分别使用相应的 pthread API 函数来创建新线程和退出已有线程。这些函数的实现方式如下：\n\n```c\nvoid Thread::start()\n\
    {\n    pthread_create(&m_data->m_thread, &m_data->m_attr, thread_function, this);\n\
    }\nvoid Thread::endThread()\n{\n    pthread_exit(nullptr);\n}\n```\n\n**完整代码**\n\
    \n您可以在清单 17-1 中找到 `Thread` 类的完整实现。\n\n```cpp\n//\n//  Thread.h\n#ifndef __FinancialSamples__Thread__\n\
    #define __FinancialSamples__Thread__\n\nstruct ThreadData;\n\nclass Thread {\n\
    public:\n    Thread();\n    virtual ~Thread();\n\nprivate:\n    Thread(const Thread\
    \ &p); // no copy allowed\n    Thread &operator=(const Thread &p); // no assignment\
    \ allowed\n\npublic:\n    virtual void run() = 0;\n    void start();\n    void\
    \ endThread();\n    void setJoinable(bool yes);\n    void join();\n\nprivate:\n\
    \    ThreadData *m_data;\n    bool m_joinable;\n};\n\n#endif /* defined(__FinancialSamples__Thread__)\
    \ */\n\n//\n//  Thread.cpp\n#include \"Thread.h\"\n#include <iostream>\n#include\
    \ <pthread.h>\n\nusing std::cout;\nusing std::endl;\n\nstruct ThreadData {\n \
    \   pthread_t m_thread;\n    pthread_attr_t m_attr;\n};\n\nnamespace {\n    void\
    \ *thread_function(void *data)\n    {\n        Thread *t = reinterpret_cast<Thread\
    \ *>(data);\n        t->run();\n        return nullptr;\n    }\n}\n\nThread::Thread()\n\
    : m_data(new ThreadData),\n  m_joinable(false)\n{\n    pthread_attr_init(&m_data->m_attr);\n\
    }\n\nThread::~Thread()\n{\n    if (m_data)\n    {\n        delete m_data;\n  \
    \  }\n}\n\nvoid Thread::start()\n{\n    pthread_create(&m_data->m_thread, &m_data->m_attr,\
    \ thread_function, this);\n}\n\nvoid Thread::endThread()\n{\n    pthread_exit(nullptr);\n\
    }\n\nvoid Thread::setJoinable(bool yes)\n{\n    pthread_attr_setdetachstate(&m_data->m_attr,\n\
    \                                yes ? PTHREAD_CREATE_JOINABLE : PTHREAD_CREATE_DETACHED);\n\
    \    m_joinable = yes;\n}\n\nvoid Thread::run()\n{\n    cout << \"Thread running\"\
    \ << endl;\n}\n\nvoid Thread::join()\n{\n    if (m_joinable)\n    {\n        void\
    \ *result;\n        pthread_join(m_data->m_thread, &result);\n    }\n}\n\n// ---\
    \ sample implementation\nclass TestThread : public Thread {\npublic:\n    virtual\
    \ void run();\n};\n\nvoid TestThread::run()\n{\n    cout << \"this is a test implementation\"\
    \ << endl;\n}\n\n// sample usage\nint main()\n{\n    Thread *myThread = new TestThread;\n\
    \    myThread->setJoinable(true);\n    myThread->start();\n    myThread->join();\n\
    \    return 0;\n}\n```\n\n清单 17-1 线程类及示例实现\n\n**运行代码**\n\n清单 17-1 中显示的代码可以使用任何符合标准的编译器（如\
    \ `gcc`、`llvm` 或 Visual Studio）来构建。请记住添加包含 `pthreads` 库的链接行。以下是用于构建示例应用程序的命令行（在\
    \ Mac OS X 上测试）：\n\n```bash\n$ gcc –o threadTest Thread.cpp -lpthreads\n$ ./threadTest\n\
    this is a test implementation\n```\n\n**并行计算期权概率**\n\n创建计算期权概率类的多处理版本。使用 `pthreads`\
    \ 库在多个线程之间分配工作。"
  raw: "While the pthreads library is written for compatibility with pure C\nprograms,\
    \ it can easily be used as part of C++ applications. It is\nsimple to create a\
    \ wrapper around threads created with pthreads so that\nthey can be more easily\
    \ accessible from C++ code. In this section, you\nwill see a C++ code example\
    \ for creating a simple multithreaded\napplication using pthreads. The techniques\
    \ used as well as the general\nconcept of thread\ncreation and synchronization\
    \ can be used in your own\nprograms.\nTo create a separate thread of execution\
    \ within a program, you need\nto use the `pthread_create`\nfunction . It\nreceives\
    \ as parameters an identifier (integer value), a pointer to an\nattribute structure\
    \ (which can be null if not used), a pointer to a\nfunction that will be executed\
    \ by the thread, and a pointer to the\narguments to the thread function. The function\
    \ returns zero if no error\nhappened; otherwise, it returns an integer error identifier.\n\
    After the `pthread_create`\nfunction  is\nexecuted, the program starts another\
    \ thread from the specified function.\nThat thread is independent of the original\
    \ program and may run in the\nsame or in a separate core, if there is one available\
    \ in the host\nmachine as determined by the operating system’s thread scheduler.\
    \ A\nthread can be terminated either by reaching the end of the thread\nfunction\
    \ or by explicitly calling the `pthread_exit`\nfunction.\nIn this section, I show\
    \ how to access the functionality provided by\nthe pthreads library from a C++\
    \ class. For this purpose, I introduce the\n`Thread` class,\nwhich encapsulates\
    \ the concept of a running thread. The goal of this\nclass is to become a base\
    \ class for concrete thread classes. The only\nmember function that is required\
    \ in each new subclass of `Thread` is `run()`, which\ndetermines the code that\
    \ will be executed by the new thread.\n\nNotable methods in the `Thread` class\
    \   are the following:\n\n*   `start`:\n    Needs to be called to start the execution\
    \ of the thread.\n\n*   `endThread`: Can be\n    called to terminate the current\
    \ thread.\n\n*   `setJoinable`:\n    Determines if the thread can be joined by\
    \ other threads.\n\n*   `join`:\n    Allows a caller to join this thread, in such\
    \ a way that the caller will\n    continue its execution only after the thread\
    \ has terminated.\n\n*   `run`:\n    This member function needs to be implemented\
    \ in each subclass and\n    defines the code that will run in its own thread.\n\
    \nThe `Thread`\nclass uses a C function called `thread_function`\n  and is\ndefined\
    \ in the `Thread.cpp` file:\n\n```\nvoid *thread_function(void *data)\n{\nThread\
    \ *t = reinterpret_cast(data);\nt->run();\nreturn nullptr;\n}\n```\n\nThe signature\
    \ of this function is determined in the pthreads library.\nThe function is called\
    \ as soon as a new thread is created. The main idea\nis that the data pointer\
    \ passed to the function is in fact a pointer to\na `Thread`\nobject . Once it\n\
    is retrieved using the `reinterpret_cast`\noperator , the\nobject can be used\
    \ to perform the `run` member function.\nDepending on the concrete subclass of\
    \ `Thread`, the `run` method may do any\ntask desired by the creator of the subclass.\
    \ This is enough to guarantee\nthat the code will run as a parallel thread.\n\n\
    Note\n\nRemember that the `reinterpret_cast`\noperator can be used to convert\
    \ between any two types in C++. Therefore,\nit is important to be careful when\
    \ using this operator, since there is\nno type checking performed by the compiler\
    \ once it is applied.\n\nOther than that, the `start()` and `endThread()`\nfunctions\
    \  use\nthe corresponding pthread API functions to perform the creation of a new\n\
    thread and to exit from an existing thread, respectively. This is how\nthese functions\
    \ are implemented:\n\n```\nvoid Thread::start()\n{\npthread_create(&m_data->m_thread,\
    \ &m_data->m_attr, thread_function, this);\n}\nvoid Thread::endThread()\n{\npthread_exit(nullptr);\n\
    }\n```\n\nComplete Code\n\nYou can find the complete implementation for the `Thread`\
    \ class in\nListing [17-1](#323908_2_En_17_Chapter.xhtml#PC3).\n\n```\n//\n//\
    \  Thread.h\n#ifndef __FinancialSamples__Thread__\n#define __FinancialSamples__Thread__\n\
    struct ThreadData;\nclass Thread {\npublic:\nThread();\nvirtual ~Thread();\nprivate:\n\
    Thread(const Thread &p); // no copy allowed\nThread &operator=(const Thread &p);\
    \ // no assignment allowed\npublic:\nvirtual void run() = 0;\nvoid start();\n\
    void endThread();\nvoid setJoinable(bool yes);\nvoid join();\nprivate:\nThreadData\
    \ *m_data;\nbool m_joinable;\n};\n#endif /* defined(__FinancialSamples__Thread__)\
    \ */\n//\n//  Thread.cpp\n#include \"Thread.h\"\n#include \n#include \nusing std::cout;\n\
    using std::endl;\nstruct ThreadData {\npthread_t m_thread;\npthread_attr_t m_attr;\n\
    };\nnamespace {\nvoid *thread_function(void *data)\n{\nThread *t = reinterpret_cast(data);\n\
    t->run();\nreturn nullptr;\n}\n}\nThread::Thread()\n: m_data(new ThreadData),\n\
    m_joinable(false)\n{\npthread_attr_init(&m_data->m_attr);\n}\nThread::~Thread()\n\
    {\nif (m_data)\n{\ndelete m_data;\n}\n}\nvoid Thread::start()\n{\npthread_create(&m_data->m_thread,\
    \ &m_data->m_attr, thread_function, this);\n}\nvoid Thread::endThread()\n{\npthread_exit(nullptr);\n\
    }\nvoid Thread::setJoinable(bool yes)\n{\npthread_attr_setdetachstate(&m_data->m_attr,\n\
    yes ? PTHREAD_CREATE_JOINABLE : PTHREAD_CREATE_DETACHED);\nm_joinable = yes;\n\
    }\nvoid Thread::run()\n{\ncout m_thread, &result);\n}\n}\n// --- sample implementation\n\
    class TestThread : public Thread {\npublic:\nvirtual void run();\n};\nvoid TestThread::run()\n\
    {\ncout setJoinable(true);\nmyThread->start();\nmyThread->join();\nreturn 0;\n\
    }\nListing 17-1\nThread Class and a Sample Implementation\n```\n\nRunning the\
    \ Code\n\nThe code displayed in Listing [17-1](#323908_2_En_17_Chapter.xhtml#PC3)\
    \ can be built\nusing any standards-compliant compiler, such as gcc, llvm, or\
    \ Visual\nStudio. Just remember to add a link line including the pthreads library.\n\
    The following is a command line used to build the sample application\n(tested\
    \ on Mac OS X):\n\n```\n$ gcc –o threadTest Thread.cpp -lpthreads\n$ ./threadTest\n\
    this is a test implementation\n```\n\nCalculating Options Probabilities in Parallel\n\
    Create a multiprocessing version of the class that calculates options\nprobabilities.\
    \ Use the pthreads library to distribute work among several\nthreads."
  trans: "\n虽然 `pthreads` 库是为与纯 C 程序兼容而编写的，但它可以轻松地作为 C++ 应用程序的一部分使用。可以简单地围绕使用 `pthreads`\
    \ 创建的线程创建一个包装器，以便从 C++ 代码中更容易地访问它们。在本节中，您将看到一个使用 `pthreads` 创建简单多线程应用程序的 C++ 代码示例。所使用的技术以及线程创建和同步的一般概念可以在您自己的程序中使用。\n\
    \n要在程序中创建一个独立的执行线程，您需要使用 `pthread_create` 函数。它接收的参数包括：一个标识符（整数值）、一个指向属性结构的指针（如果未使用可以为\
    \ `null`）、一个指向将由线程执行的函数的指针，以及一个指向线程函数参数的指针。如果未发生错误，该函数返回零；否则，它返回一个整数错误标识符。\n\n\
    在执行 `pthread_create` 函数后，程序会从指定的函数启动另一个线程。该线程独立于原始程序，并且可以在相同或独立的核心上运行（如果宿主机器有可用核心，具体由操作系统的线程调度器决定）。线程可以通过到达线程函数的末尾或显式调用\
    \ `pthread_exit` 函数来终止。\n\n在本节中，我将展示如何从 C++ 类访问 `pthreads` 库提供的功能。为此，我引入了 `Thread`\
    \ 类，它封装了运行中线程的概念。该类的目标是成为具体线程类的基类。在每个 `Thread` 的新子类中，唯一需要的成员函数是 `run()`，它决定了将由新线程执行的代码。\n\
    \n`Thread` 类中值得注意的方法如下：\n\n- `start`：需要被调用来启动线程的执行。\n- `endThread`：可以被调用来终止当前线程。\n\
    - `setJoinable`：决定该线程是否可以被其他线程连接（join）。\n- `join`：允许调用者连接此线程，这样调用者将仅在线程终止后才继续执行。\n\
    - `run`：此成员函数需要在每个子类中实现，并定义将在其自身线程中运行的代码。\n\n`Thread` 类使用了一个名为 `thread_function`\
    \ 的 C 函数，并在 `Thread.cpp` 文件中定义：\n\n```c\nvoid *thread_function(void *data)\n{\n\
    \    Thread *t = reinterpret_cast(data);\n    t->run();\n    return nullptr;\n\
    }\n```\n\n该函数的签名由 `pthreads` 库决定。一旦创建新线程，就会调用该函数。主要思想是，传递给函数的数据指针实际上是一个指向 `Thread`\
    \ 对象的指针。一旦使用 `reinterpret_cast` 运算符检索到它，该对象就可以用来执行 `run` 成员函数。根据 `Thread` 的具体子类，`run`\
    \ 方法可以执行子类创建者想要的任何任务。这足以保证代码将作为并行线程运行。\n\n**注意**\n\n> 请记住，`reinterpret_cast` 运算符可用于在\
    \ C++ 中的任意两种类型之间进行转换。因此，使用此运算符时务必小心，因为一旦应用，编译器就不会执行类型检查。\n\n除此之外，`start()` 和 `endThread()`\
    \ 函数分别使用相应的 pthread API 函数来创建新线程和退出已有线程。这些函数的实现方式如下：\n\n```c\nvoid Thread::start()\n\
    {\n    pthread_create(&m_data->m_thread, &m_data->m_attr, thread_function, this);\n\
    }\nvoid Thread::endThread()\n{\n    pthread_exit(nullptr);\n}\n```\n\n**完整代码**\n\
    \n您可以在清单 17-1 中找到 `Thread` 类的完整实现。\n\n```cpp\n//\n//  Thread.h\n#ifndef __FinancialSamples__Thread__\n\
    #define __FinancialSamples__Thread__\n\nstruct ThreadData;\n\nclass Thread {\n\
    public:\n    Thread();\n    virtual ~Thread();\n\nprivate:\n    Thread(const Thread\
    \ &p); // no copy allowed\n    Thread &operator=(const Thread &p); // no assignment\
    \ allowed\n\npublic:\n    virtual void run() = 0;\n    void start();\n    void\
    \ endThread();\n    void setJoinable(bool yes);\n    void join();\n\nprivate:\n\
    \    ThreadData *m_data;\n    bool m_joinable;\n};\n\n#endif /* defined(__FinancialSamples__Thread__)\
    \ */\n\n//\n//  Thread.cpp\n#include \"Thread.h\"\n#include <iostream>\n#include\
    \ <pthread.h>\n\nusing std::cout;\nusing std::endl;\n\nstruct ThreadData {\n \
    \   pthread_t m_thread;\n    pthread_attr_t m_attr;\n};\n\nnamespace {\n    void\
    \ *thread_function(void *data)\n    {\n        Thread *t = reinterpret_cast<Thread\
    \ *>(data);\n        t->run();\n        return nullptr;\n    }\n}\n\nThread::Thread()\n\
    : m_data(new ThreadData),\n  m_joinable(false)\n{\n    pthread_attr_init(&m_data->m_attr);\n\
    }\n\nThread::~Thread()\n{\n    if (m_data)\n    {\n        delete m_data;\n  \
    \  }\n}\n\nvoid Thread::start()\n{\n    pthread_create(&m_data->m_thread, &m_data->m_attr,\
    \ thread_function, this);\n}\n\nvoid Thread::endThread()\n{\n    pthread_exit(nullptr);\n\
    }\n\nvoid Thread::setJoinable(bool yes)\n{\n    pthread_attr_setdetachstate(&m_data->m_attr,\n\
    \                                yes ? PTHREAD_CREATE_JOINABLE : PTHREAD_CREATE_DETACHED);\n\
    \    m_joinable = yes;\n}\n\nvoid Thread::run()\n{\n    cout << \"Thread running\"\
    \ << endl;\n}\n\nvoid Thread::join()\n{\n    if (m_joinable)\n    {\n        void\
    \ *result;\n        pthread_join(m_data->m_thread, &result);\n    }\n}\n\n// ---\
    \ sample implementation\nclass TestThread : public Thread {\npublic:\n    virtual\
    \ void run();\n};\n\nvoid TestThread::run()\n{\n    cout << \"this is a test implementation\"\
    \ << endl;\n}\n\n// sample usage\nint main()\n{\n    Thread *myThread = new TestThread;\n\
    \    myThread->setJoinable(true);\n    myThread->start();\n    myThread->join();\n\
    \    return 0;\n}\n```\n\n清单 17-1 线程类及示例实现\n\n**运行代码**\n\n清单 17-1 中显示的代码可以使用任何符合标准的编译器（如\
    \ `gcc`、`llvm` 或 Visual Studio）来构建。请记住添加包含 `pthreads` 库的链接行。以下是用于构建示例应用程序的命令行（在\
    \ Mac OS X 上测试）：\n\n```bash\n$ gcc –o threadTest Thread.cpp -lpthreads\n$ ./threadTest\n\
    this is a test implementation\n```\n\n**并行计算期权概率**\n\n创建计算期权概率类的多处理版本。使用 `pthreads`\
    \ 库在多个线程之间分配工作。\n"
- fmt: "# Solution\n\nThe use of parallel processing techniques is highly indicated\
    \ for problems that require massive amounts of computation. This is especially\
    \ true when the problem can be easily decomposed, in which case it becomes a matter\
    \ of distributing the right amount of work to each thread and waiting for the\
    \ results.\n\nA good example of such a process is a Monte Carlo-based algorithm.\
    \ The simulation process can run in any number of threads, and their results can\
    \ be combined easily into a single number. This is the case, for example, of calculating\
    \ options probabilities. As you saw in Chapter [14](#323908_2_En_14_Chapter.xhtml),\
    \ Monte Carlo techniques are effective for the simulation of options probabilities.\
    \ At each step, you just need to simulate a new random walk and use that information\
    \ to improve the current estimate of the probability.\n\nTo adapt the Monte Carlo\
    \ algorithm to the determination of options probabilities, the first step is to\
    \ correctly define the way in which the problem will be decomposed. This is easy\
    \ to do here, because each loop of the computation is independent of the other.\
    \ In this case, you can do this by telling each thread to run a certain number\
    \ of iterations of the Monte Carlo method. At the end, you can combine the results\
    \ found by each thread and calculate the final result as the average of the values\
    \ returned by all threads.\n\nThe algorithm just described is implemented in the\
    \ `ParallelOptionsProbabilities` class. The class is an outer shell that invokes\
    \ several threads to run the desired algorithm. The real work is done in a class\
    \ derived from `Thread`, and called `RandomWalkThread`. As any other subclass\
    \ of `Thread`, it needs to implement the `run()` member function, which is called\
    \ from the separate thread. Inside `RandomWalkThread`, you will find a member\
    \ variable, `m_result`, which stores the output of the Monte Carlo process. After\
    \ the thread is finished, this member variable can be used to retrieve the final\
    \ value of the computation.\n\nThe `run` member function is very similar to the\
    \ code you already saw in the `OptionsProbabilities` class. The main difference\
    \ is that the output is stored in the `m_result` member variable. The work of\
    \ `RandomWalkThread` objects is orchestrated inside the `ParallelOptionsProbabilities`\
    \ class. The important member function for the job is `probFinishAboveStrike()`.\n\
    \n```\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n{\n    const\
    \ int numThreads = 20;\n    vector<Thread *> threads(numThreads);\n    for (int\
    \ i=0; i<numThreads; i++) {\n        threads[i] = new RandomWalkThread(m_numSteps,\
    \ m_step, m_strikePrice);\n        threads[i]->setJoinable(true);\n        threads[i]->start();\n\
    \    }\n    for (int i=0; i<numThreads; i++) {\n        threads[i]->join();\n\
    \    }\n    double nAbove = 0;\n    for (int i=0; i<numThreads; i++) {\n     \
    \   nAbove += threads[i]->result();\n        delete threads[i];\n    }\n    return\
    \ nAbove/(double)(numThreads);\n}\n```\n\nAt the beginning of the member function,\
    \ several threads are created and added to the `threads` vector. You need to define\
    \ these threads as joinable, so that it is possible to wait on the result of each\
    \ thread. The next step is to start the threads so that each of them can perform\
    \ the desired computations. Then, the second loop is used to join the already\
    \ created threads. By doing this, the main thread can wait while the computation\
    \ is being performed in parallel. When all threads are finished, the main thread\
    \ will be resumed as a result of the call to `join()`. Finally, you can store\
    \ the data returned by each thread using the `result()` member function. The thread\
    \ objects may be deleted at this time to avoid memory leaks. In the last line\
    \ of the `probFinishAboveStrike` member function, you can see how the calculated\
    \ data can be combined. In this case, it is enough to return the sum of values\
    \ above the strike prices and divide that value by the number of threads used.\n\
    \n## Complete Code\n\nListing [17-2](#323908_2_En_17_Chapter.xhtml#PC6) displays\
    \ the `ParallelRandomWalk` class. There is a sample `main()` function that can\
    \ be used for testing, as can be seen at the end of the listing.\n\n```\n//\n\
    //\n//  ParallelRandomWalk.h\n#ifndef __FinancialSamples__ParallelRandomWalk__\n\
    #define __FinancialSamples__ParallelRandomWalk__\n\nclass ParallelOptionsProbabilities\
    \  {\npublic:\n    ParallelOptionsProbabilities(int size, double strike, double\
    \ sigma);\n    ParallelOptionsProbabilities(const ParallelOptionsProbabilities\
    \ &p);\n    ~ParallelOptionsProbabilities();\n    ParallelOptionsProbabilities\
    \ &operator=(const ParallelOptionsProbabilities &p);\n    double probFinishAboveStrike();\n\
    private:\n    int m_numSteps;       // number of steps\n    double m_step;   \
    \     // size of each step (in percentage)\n    double m_strikePrice; // starting\
    \ price\n};\n#endif /* defined(__FinancialSamples__ParallelRandomWalk__) */\n\n\
    //\n//  ParallelOptionsProbabilities.cpp\n#include \"ParallelOptionsProbabilities.h\"\
    \n#include \"Thread.h\"\n#include <vector>\n#include <iostream>\n#include <boost/random.hpp>\n\
    #include <boost/random/normal_distribution.hpp>\n#include <cmath>\n\nusing std::vector;\n\
    using std::cout;\nusing std::endl;\n\nstatic boost::rand48 random_generator;\n\
    using std::vector;\n\n/// ---\nclass RandomWalkThread : public Thread {\npublic:\n\
    \    RandomWalkThread(int num_steps, double sigma, double startPrice);\n    ~RandomWalkThread();\n\
    \    virtual void run();\n    double gaussianValue(double mean, double sigma);\n\
    \    double getLastPriceOfWalk();\n    double result();\nprivate:\n    int m_numberOfSteps;\
    \     // number of steps\n    double m_sigma;          // size of each step (in\
    \ percentage)\n    double m_startingPrice;  // starting price\n    double m_result;\n\
    };\n\nRandomWalkThread::RandomWalkThread(int numSteps, double sigma, double startingPrice)\n\
    \    : m_numberOfSteps(numSteps),\n      m_sigma(sigma),\n      m_startingPrice(startingPrice)\n\
    {\n}\n\nRandomWalkThread::~RandomWalkThread()\n{\n}\n\ndouble RandomWalkThread::gaussianValue(double\
    \ mean, double sigma)\n{\n    boost::random::normal_distribution<> distrib(mean,\
    \ sigma);\n    return distrib(random_generator);\n}\n\ndouble RandomWalkThread::result()\n\
    {\n    return m_result;\n}\n\ndouble RandomWalkThread::getLastPriceOfWalk()\n\
    {\n    double prev = m_startingPrice;\n    for (int i=0; i<m_numberOfSteps; i++)\
    \ {\n        double g = gaussianValue(0, m_sigma);\n        double next = prev\
    \ * (1 + g);\n        prev = next;\n    }\n    return prev;\n}\n\nvoid RandomWalkThread::run()\n\
    {\n    double nAbove = 0;\n    for (int i=0; i<m_numberOfSteps; i++) {\n     \
    \   double val = getLastPriceOfWalk();\n        if (val >= m_startingPrice)\n\
    \        {\n            nAbove++;\n        }\n    }\n    m_result = nAbove/(double)m_numberOfSteps;\n\
    }\n// ---\n\nParallelOptionsProbabilities::ParallelOptionsProbabilities(int size,\
    \ double start, double step)\n    : m_numSteps(size),\n      m_strikePrice(start),\n\
    \      m_step(step)\n{\n}\n\nParallelOptionsProbabilities::ParallelOptionsProbabilities(const\
    \ ParallelOptionsProbabilities &p)\n    : m_numSteps(p.m_numSteps),\n      m_strikePrice(p.m_strikePrice),\n\
    \      m_step(p.m_step)\n{\n}\n\nParallelOptionsProbabilities::~ParallelOptionsProbabilities()\n\
    {\n}\n\nParallelOptionsProbabilities &ParallelOptionsProbabilities::operator=(const\
    \ ParallelOptionsProbabilities &p)\n{\n    if (this != &p)\n    {\n        m_numSteps\
    \ = p.m_numSteps;\n        m_strikePrice = p.m_strikePrice;\n        m_step =\
    \ p.m_step;\n    }\n    return *this;\n}\n\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n\
    {\n    const int numThreads = 20;\n    vector<Thread *> threads(numThreads);\n\
    \    for (int i=0; i<numThreads; i++) {\n        threads[i] = new RandomWalkThread(m_numSteps,\
    \ m_step, m_strikePrice);\n        threads[i]->setJoinable(true);\n        threads[i]->start();\n\
    \    }\n    for (int i=0; i<numThreads; i++) {\n        threads[i]->join();\n\
    \    }\n    double nAbove = 0;\n    for (int i=0; i<numThreads; i++) {\n     \
    \   nAbove += threads[i]->result();\n        delete threads[i];\n    }\n    return\
    \ nAbove/(double)(numThreads);\n}\n\nint main()\n{\n    ParallelOptionsProbabilities\
    \ rw(100, 50.0, 52.0);\n    double r = rw.probFinishAboveStrike();\n    cout <<\
    \ \" result is \" << r << endl;\n    return 0;\n}\n\nListing 17-2\nClass ParallelRandomWalk\n\
    ```\n\n## Running the Code\n\nI have compiled and executed the code displayed\
    \ in Listing [17-2](#323908_2_En_17_Chapter.xhtml#PC6) using the `gcc` compiler\
    \ on a Mac OS X machine. Any standards-compliant compiler can be used for this\
    \ purpose. The following is a sample of the expected output:\n\n```\n./parallelOptProb\n\
    running thread\nrunning thread\n...\nrunning thread\nresult is 0.487\n```\n\n\
    ## Using Mutexes to Prevent Unsynchronized Access\n\nIn this section, we will\
    \ write a C++ class that implements a parallel algorithm where mutexes are used\
    \ to synchronize shared data."
