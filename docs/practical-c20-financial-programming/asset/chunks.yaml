- fmt: "```cpp\n//\n// OptionsProbabilities.h\n#ifndef __FinancialSamples__OptionsProbabilities__\n\
    #define __FinancialSamples__OptionsProbabilities__\n#include \nclass OptionsProbabilities\
    \ {\npublic:\nOptionsProbabilities(double initialPrice, double strike, double\
    \ avgStep, int nDays);\nOptionsProbabilities(const OptionsProbabilities &p);\n\
    ~OptionsProbabilities();\nOptionsProbabilities &operator=(const OptionsProbabilities\
    \ &p);\nvoid setNumIterations(int n);\ndouble probFinishAboveStrike();\ndouble\
    \ probFinishBelowStrike();\ndouble probFinalPriceBetweenPrices(double lowPrice,\
    \ double highPrice);\nstd::vector getWalk();\nprivate:\ndouble m_initialPrice;\n\
    double m_strike;\ndouble m_avgStep;\nint m_numDays;\nint m_numIterations;\ndouble\
    \ gaussianValue(double mean, double sigma);\ndouble getLastPriceOfWalk();\n};\n\
    #endif /* defined(__FinancialSamples__OptionsProbabilities__) */\n//\n// OptionProbabilityExportedFunctions.cpp\n\
    #include \"OptionsProbabilities.h\"\nextern \"C\" double __declspec(dllexport)\
    \ optionProbFinishAboveStrike(double initialPrice,\ndouble strike, double avgStep,\
    \ int nDays) {\nOptionsProbabilities optP(initialPrice, strike, avgStep, nDays);\n\
    return optP.probFinishAboveStrike();\n}\nextern \"C\" double __declspec(dllexport)\
    \ optionProbFinishBelowStrike(double initialPrice,\ndouble strike, double avgStep,\
    \ int nDays) {\nOptionsProbabilities optP(initialPrice, strike, avgStep, nDays);\n\
    return optP.probFinishBelowStrike();\n}\nextern \"C\" double __declspec(dllexport)\
    \ optionProbFinishBetweenPrices(double initialPrice,\ndouble strike, double avgStep,\
    \ int nDays, double lowPrice, double highPrice) {\nOptionsProbabilities optP(initialPrice,\
    \ strike, avgStep, nDays);\nreturn optP.probFinalPriceBetweenPrices(lowPrice,\
    \ highPrice);\n}\n;;\n;; file  optionProbabilities.l\n;;\n(lisp:clines \"\nstatic\
    \ double (*optionProbFinishAboveStrike_)(double,double,double,int) = NULL;\nstatic\
    \ double (*optionProbFinishBelowStrike_)(double,double,double,int) = NULL;\nstatic\
    \ double (*optionProbFinishBetweenPrices_)(double,double,double,int,double,double)\
    \ = NULL;\n__declspec (dllimport) void *__stdcall LoadLibraryA(const char *);\n\
    void *__stdcall GetProcAddress(void *,const char *);\n__declspec (dllimport) unsigned\
    \ int __stdcall GetLastError(void);\nstatic int libraryLoaded = 0;\nstatic const\
    \ char *libName = \\\"optprob.dll\\\";\nstatic int loadLibrary() {\nvoid *lib\
    \ = LoadLibraryA(libName);\nif (!lib) return 0;\noptionProbFinishAboveStrike_\
