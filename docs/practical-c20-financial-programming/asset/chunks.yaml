    auto ldata = dData.logNormalData(10, 8, 2);\nprintData(\"log normal data\", ldata);\n\
    return 0;\n}\n```\n**Listing 5-4** The `DistributionData` Class\n\n## Running\
    \ the Code\n\nYou can compile the code in Listing [5-4](#323908_2_En_5_Chapter.xhtml#PC31)\
    \ using any standard-compliant C++ compiler. You need to have `boost` installed\
    \ in your system, as discussed in the previous sections. The following is an example\
    \ of the expected output (exact numbers will vary depending on your particular\
    \ implementation and random numbers used):\n\n```\n./distributionData\ngaussian\
    \ data:  7.12699 5.56941 5.91951 3.44111 4.89098 4.95243 7.33077 10.6359 5.00597\
    \ 3.08975\nexponential data:  0.108161 0.212945 0.0355506 0.0165794 0.753239 0.041679\
    \ 0.219658 0.0610242 0.410622 0.0378433\nchi squared data:  6.12073 2.14098 1.57523\
    \ 6.49539 3.15154 1.47554 8.39545 9.07183 2.77768 5.05356\nlog-normal data:  1573.09\
    \ 473.919 370.7 1212.54 1530.16 323705 2586.73 35919.6 628.913 372.41\n```\n\n\
    ## Conclusion\n\nNumerical classes and functions play a very important role in\
    \ the development of financial engineering models. They offer the basic level\
    \ of mathematical support needed for the creation of sophisticated trading strategies.\
    \ In this chapter, you explored some of the most common numerical libraries.\n\
    \nFirst, I discussed algorithms based on matrix computation and how they can be\
    \ represented using STL-based containers. The STL also provides a wealth of algorithms,\
    \ which can be used in numerical applications as well as in other generic programming\
    \ tasks. Next, you learned how to use the compile-time facilities provided by\
    \ the C++ template mechanism. You have seen examples of how to employ such template-based\
    \ facilities to calculate the factorial of a number. The same concepts can be\
    \ extended for many other uses as well. You have also learned about the use of\
    \ ratio templates and how they can represent financial concepts such as the Calmar\
    \ ratio.\n\nProbability distributions are another area of numerical algorithms\
    \ that have a strong presence in financial applications. The testing of investment\
    \ strategies usually involves the generation of stochastic data, as a way of simulating\
    \ possible economic scenarios. You learned how to generate random values based\
    \ on some of the most common probability distributions. Such distributions are\
    \ provided by a few numeric libraries, and in this chapter, I have used `boost::math`\
    \ and `boost::random` for this purpose. Together, these libraries provide a way\
    \ to generate random data, as well as returning relevant information about specific\
    \ distributions such as mean, standard deviation, quantiles, and other related\
    \ attributes.\n\nData visualization is another area of programming that is very\
    \ important in the development of effective financial algorithms. In the next\
    \ chapter, you will explore a few programming techniques that exemplify some of\
    \ the options available for data visualization. You will see that C++ has a lot\
    \ of ways of outputting data to graphical displays, using both internal and external\
    \ charting techniques. These libraries can be used to visualize every aspect of\
    \ your work as you develop new investment strategies.\n\n# 6. Plotting Financial\
    \ Data\n\nA very common activity in financial programming is the generation of\
    \ price-related data that needs to be visualized by traders or other business\
    \ stakeholders. Most of the time, the data is expected to be plotted in the form\
    \ of a chart for easy visualization. Visualization strategies for financial data\
    \ range from simple line charts for daily prices to complex graphical output using\
    \ candles, superposed studies, and other less conventional notation.\n\nIn this\
    \ chapter, you will see a number of coding examples for creating and displaying\
    \ charts based on prices and related quantitative data analysis. You will learn\
    \ how to perform such tasks using a few different techniques, including external\
    \ software such as `Gnuplot` as well as graphical C++ libraries such as `Qt`.\
    \ Both techniques may be useful in different situations, as they have their own\
    \ advantages and disadvantages.\n\nThe following are a few things you will learn\
    \ in this chapter:\n\n* How to create a class that provides a plotting interface\n\
    * How to use external plotting applications such as `Gnuplot`\n* How to convert\
    \ your data to a format that can be understood by external programs\n* How to\
    \ plot csv (comma-separated values) files on UNIX and Windows\n* How to generate\
    \ commands to control the open source `Gnuplot` application\n* How to create a\
    \ plot using an open source and multiplatform graphical user interface (GUI) library\n\
    * How to use `Qt` to generate a basic plotting window\n\n## Plotting with Gnuplot\n\
    \nCreate a price chart using `Gnuplot`."
