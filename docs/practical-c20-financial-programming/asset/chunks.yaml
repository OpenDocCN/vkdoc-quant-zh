- fmt: "# Figure 10-2\nThe original function `f(x) = x² + 1` compared to the constant\
    \ function `f(x) = c`\n\nThe value of the approximation can be calculated as `(5\
    \ – 1) * 10 = 40`. You can compare this with the value defined by the closed calculation\
    \ of the integral: the antiderivative of `f(x) = x² + 1` is `F(x) = x³/3 + x`,\
    \ and using this equation as the definite integral on the interval 1 to 5, you\
    \ will find the value 45.33. From this, you see that there is a large error between\
    \ the correct value and the estimation using a single midpoint calculation.\n\n\
    The good news is that we can improve this approximation by considering smaller\
    \ intervals over the required function and adding these values together. This\
    \ is the basic technique you will see in this and in the next sections. Therefore,\
    \ to improve the approximation in the preceding example, we can just divide the\
    \ interval 1–5 into two intervals: 1 to 3 and 3 to 5.\n\nConsidering the average\
    \ value for the constant function, you will find values `((1 + 3)/2)² + 1 = 5`\
    \ for the first half of the interval and `((3 + 5)/2)² + 1 = 17` for the second\
    \ half. This gives us an approximation of `2 × 5 + 2 × 17 = 44`. Since the exact\
    \ value is 45.33, you see that the approximation of 44 is much closer to the real\
    \ value. You can see the new approximation in Figure [10-3](#323908_2_En_10_Chapter.xhtml#Fig3).\n\
    \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig3_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig3_HTML.jpg)\n\
    \n# Figure 10-3\nApproximating the integral of `f(x) = x² + 1` using two constant\
    \ values\n\nAs you have seen, the secret of getting a great result from the midpoint\
    \ method is subdividing the desired interval in smaller units and adding them,\
    \ quite similar to the way the integral function is defined itself. While you\
    \ could start with a single constant number and then divide the interval successively,\
    \ it is much easier to start with a known large number of segments and expand\
    \ the number of divisions if necessary. Using this strategy results in the following\
    \ algorithm:\n\nDefine a range `(A, B)` where you want to calculate the integral\
    \ to the equation.\n\n1.  Subdivide the initial range into `N` subintervals of\
    \ equal sign.\n2.  Initialize the integral value `S` to zero.\n3.  For each subinterval\
    \ `(a, b)`, do the following:\n    1.  Take the values of `a` and `b`.\n    2.\
    \  Determine the middle point value:\n        `m(a, b) = f((a + b) / 2)`.\n  \
    \  3.  Add `m(a, b)` to the integral.\n\nThe implementation of this simple method\
    \ can be found in the `MidpointIntegration` class.\n\n## Complete Code\n\nYou\
    \ can find the complete code that implements the method just described in Listing\
    \ [10-1](#323908_2_En_10_Chapter.xhtml#PC1). The listing includes a header file\
    \ for class `MidpointIntegration` as well as an implementation file.\n\n```\n\
    //\n//  MidpointIntegration.h\n#ifndef __FinancialSamples__MidpointIntegration__\n\
    #define __FinancialSamples__MidpointIntegration__\ntemplate \nclass MathFunction;\n\
    class MidpointIntegration {\npublic:\nMidpointIntegration(MathFunction &f);\n\
    MidpointIntegration(const MidpointIntegration &p);\n~MidpointIntegration();\n\
    MidpointIntegration &operator=(const MidpointIntegration &p);\nvoid setNumIntervals(int\
    \ n);\ndouble getIntegral(double a, double b);\nprivate:\nMathFunction &m_f;\n\
    int m_numIntervals;\n};\n#endif /* defined(__FinancialSamples__MidpointIntegration__)\
    \ */\n//\n//  MidpointIntegration.cpp\n#include \"MidpointIntegration.h\"\n#include\
    \ \"MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\nnamespace\
    \  {\nconst int DEFAULT_NUM_INTERVALS = 100;\n}\nMidpointIntegration::MidpointIntegration(MathFunction\
    \ &f)\n: m_f(f),\nm_numIntervals(DEFAULT_NUM_INTERVALS)\n{\n}\nMidpointIntegration::MidpointIntegration\
    \ (const MidpointIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n\
    {\n}\nMidpointIntegration::~MidpointIntegration()\n{\n}\nMidpointIntegration &MidpointIntegration::operator=(const\
    \ MidpointIntegration &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_numIntervals\
    \ = p.m_numIntervals;\n}\nreturn *this;\n}\nvoid MidpointIntegration::setNumIntervals(int\
    \ n)\n{\nm_numIntervals = n;\n}\ndouble MidpointIntegration::getIntegral(double\
    \ a, double b)\n{\ndouble S = 0;\ndouble intSize = (b - a)/m_numIntervals;\ndouble\
    \ x = a;\nfor (int i=0; i\n{\npublic:\n~F1();\ndouble operator()(double x);\n\
    };\nF1::~F1()\n{\n}\ndouble F1::operator ()(double x)\n{\nreturn x*x+1;\n}\n}\n\
    int main()\n{\nF1 f;\nMidpointIntegration mpi(f);\ndouble integral = mpi.getIntegral(1,\
    \ 5);\ncout << \" the integral of the function is \" << integral << endl;\nmpi.setNumIntervals(200);\n\
    integral = mpi.getIntegral(1, 5);\ncout << \" the integral of the function with\
    \ 200 intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n*Listing 10-1:\
    \ Implementation for Midpoint Integration Method*\n\n## Running the Code\n\nYou\
    \ can generate a binary executable from the source code in Listing [10-1](#323908_2_En_10_Chapter.xhtml#PC1)\
    \ using any standards-compliant compiler such as `gcc`. Then, you can execute\
    \ the code to get sample results such as the following, for the sample equation\
    \ `f(x) = x² + 1`:\n\n```\n./midpointIntegration\nthe integral of the function\
    \ is 45.3344\nthe integral of the function with 200 intervals is 45.3336\n```\n\
    \nNotice that the solution tests the approximation for two cases: when the number\
    \ of intervals is 100 (the default) and when the number of intervals is 200. Since\
    \ the exact value of the function is `45 + 1/3`, this shows an improvement in\
    \ the result with an error going from the third decimal place to the fourth decimal\
    \ place. You can improve the approximation for different functions or required\
    \ errors by increasing the number of intervals if necessary.\n\n# Trapezoid Method\n\
    \nIn this section, we create a C++ class that implements the trapezoid method\
    \ for definite integral calculation.\n\n## Solution\n\nAs you have seen in the\
    \ last section, it is not difficult to come up with an approximation for the integral\
    \ of a function. However, in many applications, it is useful to have a faster\
    \ and more efficient way to determine the definite integral of a function. This\
    \ is especially true when the function that needs to be integrated is difficult\
    \ to compute in the first place. In those situations, it is better to use an approximation\
    \ technique that might be able to provide more accurate solutions to the integration\
    \ problem.\n\nIn this coding example, I examine an alternative way to calculate\
    \ the integral of a continuous function, called the trapezoid method. As the name\
    \ indicates, the trapezoid method uses a geometric, intuitive idea to render the\
    \ value under the curve for a particular function, in such a way that the resulting\
    \ approximation is closer to the desired value."
