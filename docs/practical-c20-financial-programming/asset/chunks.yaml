    \n```\n./polyInterpolation\n10 0.6\n20 0.11\n30 1.1\n40 1.62\n49 1.4\n\ninterpolation\
    \ result for value 27 is 0.795433\n```\n\n该代码使用刚刚显示的数据多次执行。图 8-2 展示了结果数据的图示。请注意，图中显示了一个通过输入点集的平滑函数。这证明了上述代码计算的多项式是对给定点集的一个良好且平滑的插值结果。\n\
    \n## 结论\n\n在本章中，你学习了插值法——一种在已知值数据集基础上为函数寻找合理近似的数学技术。插值法在金融数据分析中发挥着重要作用，因为它提供了一种分析和简化复杂函数计算的方法。它还可以让人们对未来价格变化进行简单预测，并有助于更好地理解历史数据。你已看到几个编程示例，它们说明了如何在\
    \ C++ 编程上下文中使用插值法。\n\n最初，你学习了线性插值法，这是一种在仅知道原函数少数几个点时进行插值的简单方法。该技术仅使用线性函数来执行所需的插值。你看到了一个示例\
    \ C++ 类，它可用于为函数定义域内的任意给定值返回插值结果。\n\n接下来，你了解了如何利用多项式提供的更好近似技术来插值函数值。使用多项式，你可以创建一个平滑（可微）的函数，该函数在\
    \ `n+1` 个点上经过给定的点，其中 `n` 是多项式的次数。你学习了一个简单的公式——拉格朗日法，它可用于从任意给定点集创建此类多项式插值。你还学习了如何编写实现该算法的\
    \ C++ 类。我提供了一个完整示例，演示如何使用此类对给定值集生成平滑插值。\n\n在下一章中，你将学习金融应用中使用的另一项重要数学技能。方程求根是一项基础技术，它可以帮助你找到经济和工程领域许多重要问题的解。你将看到如何在\
    \ C++ 中实现和使用方程求根方法。\n\n# 9. 计算方程的根\n\n解方程是许多工程和科学算法的基石之一。一个典型例子是使用布莱克-舒尔斯模型进行期权和衍生品定价所需的计算。随着金融算法日益复杂，通常需要计算各种方程的结果。这些结果常用于投资分析和新交易策略中。不仅要能解方程，还要能以高效方式计算此类方程的根，这一点非常重要。\n\
    \n在本章中，你将学习一些计算方程根的常用方法。这里提供的代码示例涵盖了计算方程根的不同方法，并解释了它们的工作原理及适用场景。以下是本章涵盖的部分主题：\n\
    \n*   **二分法**：一种探索根附近符号变化的简单方法，易于实现。你将学习二分法的基础知识以及如何在 C++ 中编写其代码。\n*   **割线法**：割线法是对二分法的改进，它尝试利用函数在给定区间内的值来指导根的新近似位置。在许多情况下，割线法可以加速根的搜索过程。\n\
    *   **牛顿法**：该方法有时也称为牛顿/拉夫逊法，它利用函数的导数来指导对方程根的搜索。由于导数决定了函数切线的斜率，其值可用于计算新的近似值。连续迭代值可能收敛到所需的解，并可使用误差参数来决定何时停止搜索。\n\
    \n### 二分法\n\n创建一个实现二分法的类来寻找方程的根。"
- fmt: '# Solution


    Finding the roots of an equation is the process of determining any points for
    which the corresponding function is zero. During the development of computational
    mathematics, several methods have been devised to calculate roots of equations.
    This chapter covers a few of the most common of these methods.


    The bisection method tries to find the roots of equations by using a simple strategy:
    the idea is to look at the sign of the function at different points of the domain
    and use that information to decide if there is a root on that interval. For example,
    consider the function *f*(*x*) = (*x*–1)³


    Figure [9-1](#323908_2_En_9_Chapter.xhtml#Fig1) displays the graph of this function
    in the interval -1 to 3.


    ![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig1_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig1_HTML.jpg)


    Figure 9-1: Function (x–1)³ in the interval -1 to 3


    This is a function that has a root for the value `x=1` and has two areas that
    have distinct signs: for values less than `x=1`, the sign is negative. For values
    greater than `1`, the sign of the function is positive. If you want to determine
    the exact place where the function is equal to zero, you can start from an interval
    where the sign of the function is different (in this case, you could use the interval
    -1 to 3) and look for the exact value where the function changes sign: that must
    be the location of one of the roots of the function.


    > **Note**: This argument works only when the function that you’re dealing with
    is continuous. That is, there is no point where the function suddenly jumps from
    one point to another, which would make the foregoing argument invalid. Continuous
    functions are differentiable in the range where they’re defined, so that is a
    way to know if a function is continuous. Most functions in economics, physics,
    and engineering have this property, so we assume that this is the case when the
    bisection method is applied.


    With this intuitive insight, the bisection method tries to employ a systematic
    approach to determine the range tested and the location where the change of sign
    occurs. Essentially, the method is to bisect the original range and determine
    if the subrange still has different signs.


    For example, using the same function, consider that we take the original range
    between -1 and 2. The middle of this range is ½, and therefore the algorithm will
    check the sign of ![$$ \mathrm{f}\left(\frac{1}{2}\right)={\left(\frac{1}{2}-1\right)}^3={\left(-\frac{1}{2}\right)}^3=-\frac{1}{2^3}=-\frac{1}{8}
    $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq1.png). Now, consider
    the sign of the two ending points of the initial range:


    - *f*(–1) = (–1–1)³ = –8, therefore with a negative sign.

    - *f*(2) = (2–1)³ = 1³ = 1, therefore with a positive sign.


    This means that between the values *x* = –1 and ![$$ x=\frac{1}{2} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq2.png),
    the sign is identical. On the other hand, between ![$$ x=\frac{1}{2} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq3.png)
    and *x* = 2, the sign changes. Therefore, the root must be in the place where
    the sign changes, which is somewhere between ½ and 2.


    Another iteration of this process will calculate the value of ![$$ f\left(\frac{5}{4}\right)={\left(\frac{5}{4}-1\right)}^3={\left(\frac{1}{4}\right)}^3=1/{4}^3
    $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq4.png), which has
    a positive sign. Since *f*(1/2) has a negative sign and *f*(2) has a positive
    sign, the change in sign must happen in the interval from ![$$ \frac{1}{2} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq5.png)
    to ![$$ \frac{5}{4} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq6.png).
    This is easily observed to be true by checking the graph in Figure [9-1](#323908_2_En_9_Chapter.xhtml#Fig1).
    Notice that this process will systematically reduce the size of the range where
    we’re searching for a root of the equation. At each step, we’re decreasing the
    range by a half and getting closer to the location of the root. After a number
    of iterations, you will get a value that is as close as needed from the true root.
    This algorithm therefore can stop whenever the size of the remaining range is
    less than the desired error. For example, if the range is less than 0.001, and
    your desired error is 0.01, then stop.


    Using the process we just described, we can now describe the algorithm for bisection
    in the following way:


    1. Define an initial range `(a,b)` where you want to search for one or more roots
    of the equation.


    2. Calculate the values of *f*(*a*) and *f*(*b*).


    3. Determine the bisection point ![$$ c=\frac{a+b}{2} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq7.png)
    for the interval (*a*,*b*) and its corresponding function value *f*(*c*).


    4. If the signs of *f*(*a*) and *f*(*c*) are different, (*a*,*c*) becomes the
    new range for the algorithm. Otherwise, the new range is defined as (*c*,*b*).


    5. If the new range has length less than the error (threshold) *E*, stop and report
    *c* as the solution. Otherwise, continue with step 1.


    The preceding algorithm works in an iterative way, where the size of the range
    (*a*,*b*) is constantly reduced by half. Therefore, the number of steps it will
    perform is bounded by ![$$ {\log}_2\frac{\left(b-a\right)}{E} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq8.png).
    There is a trade-off between number of iterations and desired approximation, which
    means that if you want a very small error, more iterations will be necessary.


    The procedure described has been coded as the part of the `BisectionSolver` class,
    which can be used to find roots of equations. The interesting characteristic of
    `BisectionSolver` is that it is a generic solver for any continuous function.
    You just need to pass the function as a parameter to the constructor of the class.


    For this purpose, I created a class called `MathFunction` that will be useful
    not only here but also for other classes that use functions as parameters. The
    `MathFunction` class defines what is called a function object, that is, an object
    that behaves like a function. This is important for our algorithms, because it
    allows one to use the object as if it were a function.


    To create a functional object, you need a class that implements `operator()`,
    that is, the operator for function invocation. Moreover, I have defined the class
    `MathFunction` as a template class, so that you can pass the right return type
    when creating the concrete implementation. For example, you may want to define
    a `MathFunction` subclass that is defined for `float` values only. Or, conversely,
    you may have a function whose domain is the set of integers.'
