    cout << \" max: \" << objVal << endl;\nreturn 0;\n}\n```\nListing 12-1: Class\
    \ `LPSolver` Header and Implementation\n\nRunning the Code\n\nThe code presented\
    \ in Listing 12-1 can be compiled with a standards-compliant compiler, such as\
    \ `gcc` or Visual Studio. Remember to add the GLPK library to the link step (in\
    \ `gcc`, this is done with the `-L` and `-l` switches). The result of the program\
