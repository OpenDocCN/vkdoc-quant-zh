    m_epsGrowth(v.m_epsGrowth),\nm_netIncome(v.m_netIncome),\nm_shareholdersEquity(v.m_shareholdersEquity)\n\
    {\n}\nFundamentalsCalculator::~FundamentalsCalculator()\n{\n}\nFundamentalsCalculator\
    \ &FundamentalsCalculator::operator=(const FundamentalsCalculator &v)\n{\nif (this\
    \ != &v)\n{\nm_ticker = v.m_ticker;\nm_price = v.m_price;\nm_dividend = v.m_dividend;\n\
    m_earningsEstimate = v.m_earningsEstimate;\nm_numShares = v.m_numShares;\nm_bookValue\
    \ = v.m_bookValue;\nm_assets = v.m_assets;\nm_liabilitiesAndIntangibles = v.m_liabilitiesAndIntangibles;\n\
    m_epsGrowth = v.m_epsGrowth;\nm_netIncome = v.m_netIncome;\nm_shareholdersEquity\
    \ = v.m_shareholdersEquity;\n}\nreturn *this;\n}\ndouble FundamentalsCalculator::PE()\n\
    {\nreturn (m_price * m_numShares)/ m_earnings;\n}\ndouble FundamentalsCalculator::forwardPE()\n\
    {\nreturn (m_price * m_numShares)/ m_earningsEstimate;\n}\ndouble FundamentalsCalculator::returnOnEquity()\n\
    {\nreturn m_netIncome / m_shareholdersEquity;\n}\ndouble FundamentalsCalculator::getDividend()\n\
    {\nreturn m_dividend;\n}\ndouble FundamentalsCalculator::bookValue()\n{\nreturn\
    \ m_bookValue;\n}\ndouble FundamentalsCalculator::priceToBookRatio()\n{\nreturn\
    \ (m_price * m_numShares) / (m_assets - m_liabilitiesAndIntangibles);\n}\ndouble\
    \ FundamentalsCalculator::priceEarningsToGrowth()\n{\nreturn PE()/ m_epsGrowth;\n\
    }\nvoid FundamentalsCalculator::setNumOfShares(int n)\n{\nm_numShares = n;\n}\n\
    void FundamentalsCalculator::setEarnings(double val)\n{\nm_earnings = val;\n}\n\
    void FundamentalsCalculator::setExpectedEarnings(double val)\n{\nm_earningsEstimate\
    \ = val;\n}\nvoid FundamentalsCalculator::setBookValue(double val)\n{\nm_bookValue\
    \ = val;\n}\nvoid FundamentalsCalculator::setEpsGrowth(double val)\n{\nm_epsGrowth\
    \ = val;\n}\nvoid FundamentalsCalculator::setNetIncome(double val)\n{\nm_netIncome\
    \ = val;\n}\nvoid FundamentalsCalculator::setShareHoldersEquity(double val)\n\
    {\nm_shareholdersEquity = val;\n}\nvoid FundamentalsCalculator::setLiabilitiesAndIntangibles(double\
    \ val)\n{\nm_liabilitiesAndIntangibles = val;\n}\nvoid FundamentalsCalculator::setAssets(double\
    \ val)\n{\nm_assets = val;\n}\n//\n//  main.cpp\n#include \"FundamentalsCalc.h\"\
    \n#include \n// the main function receives parameters passed to the program\n\
    // and uses class FundamentalsCalculator\nint main(int argc, const char * argv[])\n\
    {\nFundamentalsCalculator fc(\"AAPL\", 543.99, 12.20);\n// values are in millions\n\
    fc.setAssets(243139);\nfc.setBookValue(165234);\nfc.setEarnings(35885);\nfc.setEpsGrowth(0.22);\n\
    fc.setExpectedEarnings(39435);\nfc.setLiabilitiesAndIntangibles(124642);\nfc.setNetIncome(37235);\n\
    fc.setNumOfShares(891990);\nfc.setShareHoldersEquity(123549);\nstd::cout << \"\
    P/E: \" <<  fc.PE()/1000  << std::endl;  // prices in thousands\nstd::cout <<\
    \ \"forward P/E: \" <<  fc.forwardPE()/1000  << std::endl;\nstd::cout << \"book\
    \ value: \" <<  fc.bookValue()  << std::endl;\nstd::cout << \"price to book: \"\
    \ <<  fc.priceToBookRatio()  << std::endl;\nstd::cout << \"price earnings to growth:\
    \ \" <<  fc.priceEarningsToGrowth()  << std::endl;\nstd::cout << \"return on equity:\
    \ \" <<  fc.returnOnEquity()  << std::endl;\nstd::cout << \"dividend: \" <<  fc.getDividend()\
    \  << std::endl;\nreturn 0;\n}\n清单 2-4\nFundamentalsCalc.h\n```\n\n### 运行代码\n\n\
    您可以编译清单 2-4 中展示的代码以及 `main` 函数中包含的相应测试。结果将显示如下：\n\n```\n$ ./fundamentalind\nP/E:\
    \ 13.5219\nforward P/E: 12.3046\nbook value: 165234\nprice to book: 4094.9\nprice\
    \ earnings to growth: 61463.2\nreturn on equity: 0.301378\ndividend: 12.2\n```\n\
    \n## 结论\n\n在本章中，我概述了股票市场中的问题与机遇。如您所见，作为金融体系的重要组成部分，股票交易是一个在分析与交易执行各个阶段都存在计算问题的领域。\n\
    \n本章首先对股票市场进行了简短介绍，描述了主要参与者和交易过程中使用的金融工具。在第一节中，您学习了如何使用 C++ 计算移动平均线。移动平均线被广泛用于发现股票价格的趋势。在同一节中，我讨论了如何计算\
    \ EMA（指数移动平均线），其中最近的价格被赋予更大的权重。EMA 对价格的最新变化反应更灵敏，在某些算法中，这可能是一种更好的做出买入或卖出决策的方法。\n\
    \n接下来，我展示了一些用于计算股票工具波动性的代码。在决定投资组合中应持有哪些工具时，波动性的概念至关重要。计算波动性的方法包括使用简单的观察范围以及概率性的波动性度量（也称为标准差）。\n\
    \n在本章中，您还学习了如何计算两只股票之间的相关性，以根据其观察价格判断是否存在正相关、负相关或无相关。最后，本章介绍了对一只股票持仓的基本面数据进行建模和计算的技术。这样的\
    \ C++ 类易于创建，但在分析特定股票需要基本面数据时也非常有用。您可以根据需要修改此示例以添加新的基本面指标，从而在金融应用程序的其他区域复用现有代码。\n\
    \n在下一章中，您将了解更多在金融软件创建中常用的 C++ 特性。您将看到金融行业开发者可以轻松使用的多种技术。这些 C++ 特性能够提升大部分为投资分析所创建的代码的性能、健壮性和灵活性。\n"
- fmt: "# C++ Programming Techniques in Finance\n\nThe `C++` language was designed\
    \ as an extension of `C`, which means that most programs written in `C` are also\
    \ valid `C++` programs. However, experienced programmers typically make use of\
    \ a set of high-level features made available exclusively in `C++` as a way to\
    \ control program complexity, including features that were introduced in the `C++20`\
    \ standard. This is an especially important consideration for financial software\
    \ development, where we want to create fast and expressive applications.\n\nIn\
    \ this chapter, we explore a few fundamental techniques that financial programmers\
    \ have used over the years to write better `C++` code with less effort. These\
    \ techniques have been selected among the many features provided by `C++` as the\
    \ most effective in improving the quality and expressiveness of code. Such features\
    \ include the following:\n\n- `Templates`: A feature that allows the creation\
    \ of generic software, with classes and functions that can be applied over a set\
    \ of possibly unrelated types that satisfy the set of requirements for a desired\
    \ operation.\n- `Shared pointers`: A programming technique that reduces the need\
    \ for direct manipulation of pointers. With shared pointers, you can avoid a big\
    \ source of mistakes inherent to the way `C++` programs manage memory and other\
    \ resources.\n- `Operator overloading`: With overloading, you can apply standard\
    \ operators already available in the language to your own classes and structures.\n\
    - `C++20 features`: The latest iteration of the `C++` standard has introduced\
    \ many new features that help control the complexity of programs. These features,\
    \ which can be easily used for the creation of financial software, include shared\
    \ pointers and automatic type detection.\n\nIn the next sections, you will see\
    \ a few selected programming examples that explore some of these `C++` features\
    \ in the context of financial applications.\n\n## Calculating Interest Rates for\
    \ Investment Instruments\n\nInterest rates are a fundamental concept for fixed\
    \ income investors. Design a `C++` solution to return the annual interest rate,\
    \ given a generic instrument class that provides methods such as `getMonthlyPayment`\
    \ and `getPrincipal`.\n\n### Solution\n\nThe foregoing problem is frequently used\
    \ in the design of interest rate calculation engines. You can create a solution\
    \ using a number of strategies such as class hierarchies, but for performance\
    \ and design considerations, the use of templates is the most indicated method\
    \ of combining interest rate data from unrelated classes that represent investment\
    \ instruments.\n\nA `template` is a mechanism, along with a special syntax, used\
    \ to create code that works with different underlying data types. Using templates,\
    \ one can create functions, member functions, and classes that are able to support\
    \ different types using the same code. The code generated using template-based\
    \ programming techniques is said to be generic, since it can be used with different\
    \ types (either fundamental types such as `int` or `double` or user-defined classes\
    \ and structures). Generic functions and types are instantiated using the name\
    \ of the target type(s) between angle brackets, which indicates a particular version\
    \ of the desired function or type. In the most recent standard revisions, a generic\
    \ function can also be defined using automatic argument deduction.\n\nThe creation\
    \ and use of generic code are possible because when the compiler finds a template,\
    \ it does not generate code immediately. Instead, code is generated only at the\
    \ point where the template object or function is instantiated. When that happens,\
    \ the compiler detects the types involved in the expression, and the template\
    \ is instantiated. Only then the traditional compilation steps such as syntactic\
    \ analysis and code generation are performed on the instantiated code, and any\
    \ resulting errors will be detected and reported to the programmer.\n\nTo solve\
    \ the interest rate calculation problem, you can use templates to implement an\
    \ interest rate engine class, called `IntRateEngine`. This class is defined in\
    \ such a way that you can apply it to any class implementing the methods `getMonthlyPayment`\
    \ and `getPrincipal`. I have included two sample classes that implement these\
    \ methods, the classes `BondInstrument` and `MortgageInstrument`. However, the\
    \ big advantage of using templates is that you don’t need to derive such classes\
    \ from a particular base class, for example. You can use a class supplying these\
    \ same methods, and the compiler will do the hard work of combining these classes.\
    \ This means that there is no coupling between investment instruments and the\
    \ interest rate calculation engine. In fact, if you look at the files for `IntRateEngine`,\
    \ you will not find any reference to the investment instrument classes.\n\nHere\
    \ is a quick look at the relevant parts of the `BondInstrument` class.\n\n```\n\
    class BondInstrument {\npublic:\ndouble getMonthlyPayment();\ndouble getPrincipal();\n\
    // other methods here...\n};\n```\n\nWith this class, one could instantiate the\
    \ template that calculates the annual interest rate. The template class that performs\
    \ the calculation is defined in the following way:\n\n```\ntemplate \nclass IntRateEngine\
    \ {\npublic:\nvoid setInstrument(T &inv);\ndouble getAnnualIntRate();\n// other\
    \ methods here ...\nprivate:\nT m_instrument;\n};\n```\n\nNotice that the type\
    \ of instrument is left unspecified as a type argument `T`. This is the parameterization\
    \ that allows different classes to be used with the same template. Similarly,\
    \ you can see the implementation of the `getAnnualIntRate` method.\n\n```\ntemplate\
    \ \ndouble IntRateEngine::getAnnualIntRate()\n{\ndouble payment = m_instrument.getMonthlyPayment();\n\
    double principal = m_instrument.getPrincipal();\nreturn (12 *payment) / principal;\n\
    }\n```\n\nNotice that the method only requires the parameter `T` to be offered\
    \ the `getMonthlyPayment` and `getPrincipal` methods. Any type that supports these\
    \ two methods can be used by `IntRateEngine` without problems.\n\n### Complete\
    \ Code\n\nThe algorithm described previously has been implemented in the classes\
    \ `BondInstrument`, `MortgageInstrument`, and `IntRateEngine`, as displayed in\
    \ Listing `[3-1]`."
