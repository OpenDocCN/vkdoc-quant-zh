    \ and `continuousCompounding`, calculate the given formulas using the mathematical\
    \ functions `pow` and `exp` from the standard C++ library. These two functions\
    \ implement a fast way to calculate the power function and the exponential function,\
    \ respectively.\n\nTo use any mathematical function from the standard library,\
    \ you should first include the header file `cmath`. Table [1-1](#323908_2_En_1_Chapter.xhtml#Tab1)\
    \ provides a short list of mathematical functions made available from that header\
    \ file.\n\nTable 1-1\n\nSome of the Mathematical Functions in the Standard Library\n\
    \n| **Function** | **Corresponding mathematical operations** |\n| --- | --- |\n\
    | exp | Exponential function (natural base) |\n| pow | Power function |\n| log\
    \ | Natural logarithm function |\n| log10 | Logarithm function on decimal base\
    \ |\n| sqrt | Square root function |\n| Sin | Sine function |\n| cos | Cosine\
    \ function |\n| tan | Tangent function |\n| acos | Arc cosine function (inverse\
    \ of cosine) |\n| asin | Arc sine function (inverse of sine) |\n| atan | Arc tangent\
    \ function (inverse of tangent) |\n| ceil | Ceiling function (smallest integer\
    \ higher than parameter) |\n| floor | Floor function (largest integer lower than\
    \ parameter) |\n| fabs | Absolute value for float numbers |\n\nThe mathematical\
    \ functions provided by the standard library should be used whenever possible,\
    \ instead of custom versions, for the following reasons:\n\n*   Compatibility:\
    \ Using functions from the standard library guarantees that they will be available\
    \ in any compiler that implements it.\n\n*   Performance: Functions in the standard\
    \ library are implemented as part of the package sold by compiler vendors. The\
    \ code of these mathematical functions is generally optimized for the particular\
    \ architecture, which usually results in much better performance.\n\n### Complete\
    \ Code\n\nThe code in Listing [1-3](#323908_2_En_1_Chapter.xhtml#PC7) shows the\
    \ implementation for class `CompoundIntRateCalculator` , divided into a header\
    \ file and an implementation file. I also present a sample main function that\
    \ shows how to use the class.\n\n```\n//\n//  CompoundIntRateCalculator.h\n#ifndef\
    \ __FinancialSamples__CompoundIntRateCalculator__\n#define __FinancialSamples__CompoundIntRateCalculator__\n\
    class CompoundIntRateCalculator {\npublic:\nCompoundIntRateCalculator(double rate);\n\
    CompoundIntRateCalculator(const CompoundIntRateCalculator &v);\nCompoundIntRateCalculator\
    \ &operator =(const CompoundIntRateCalculator &v);\n~CompoundIntRateCalculator();\n\
    double multiplePeriod(double value, int numPeriods);\ndouble continuousCompounding(double\
    \ value, int numPeriods);\nprivate:\ndouble m_rate;\n};\n#endif /* defined(__FinancialSamples__CompoundIntRateCalculator__)\
    \ */\n//\n//  CompoundIntRateCalculator.cpp\n#include \"CompoundIntRateCalculator.h\"\
    \n#include \nCompoundIntRateCalculator::CompoundIntRateCalculator(double rate)\n\
    : m_rate(rate)\n{\n}\nCompoundIntRateCalculator::~CompoundIntRateCalculator()\n\
    {\n}\nCompoundIntRateCalculator::CompoundIntRateCalculator(const CompoundIntRateCalculator\
    \ &v)\n: m_rate(v.m_rate)\n{\n}\nCompoundIntRateCalculator &CompoundIntRateCalculator::operator\
    \ =(const CompoundIntRateCalculator &v)\n{\nif (this != &v)\n{\nthis->m_rate =\
    \ v.m_rate;\n}\nreturn *this;\n}\ndouble CompoundIntRateCalculator::multiplePeriod(double\
    \ value, int numPeriods)\n{\ndouble f = value * pow(1 + m_rate, numPeriods);\n\
    return f;\n}\ndouble CompoundIntRateCalculator::continuousCompounding(double value,\
    \ int numPeriods)\n{\ndouble f = value * exp(m_rate * numPeriods);\nreturn f;\n\
    }\n//\n//  main.cpp\n#include \"CompoundIntRateCalculator.h\"\n#include \n// the\
    \ main function receives parameters passed to the program\nint main(int argc,\
    \ const char * argv[])\n{\nif (argc != 4)\n{\nstd::cout   \" << std::endl;\nreturn\
    \ 1;\n}\ndouble rate = atof(argv[1]);\ndouble value = atof(argv[2]);\nint num_periods\
    \ = atoi(argv[3]);\nCompoundIntRateCalculator cIRCalc(rate);\ndouble res = cIRCalc.multiplePeriod(value,\
    \ num_periods);\ndouble contRes = cIRCalc.continuousCompounding(value, num_periods);\n\
    std::cout << \" future value for multiple period compounding is \" << res << std::endl;\n\
    std::cout << \" future value for continuous compounding is \" << contRes << std::endl;\n\
    return 0;\n}\nListing 1-3\nCompoundIntRateCalculator.h\n```\n\n### Sample Use\n\
    \nThe code in Listing [1-3](#323908_2_En_1_Chapter.xhtml#PC7) can be compiled\
    \ into an executable and run from the command line. The program expects three\
    \ arguments: the interest rate, the present value of the investment, and the number\
    \ of periods of compounding.\n\nThe following is an example of its use:\n\n```\n\
    $ ./compound 0.05 1000 4\nfuture value for multiple period compounding is 1215.51\n\
    future value for continuous compounding is 1221.4\n```\n\nAs expected, the value\
    \ returned by continuous compounding is slightly higher than the value achieved\
    \ by discrete compounding."
  trans: "\n### 使用示例\n\n首先，你需要使用你喜欢的 C++编译器编译代码。例如，在 UNIX 平台上，使用提供的`makefile`，只需运行`make`命令，结果如下：\n\
    \n```\n$ make\ngcc –c IntRateCalculator.cpp\ngcc –c main.cpp\ngcc –o intrate IntRateCalculator.o\
    \ main.o\n```\n\n现在，你可以通过传入给定的利率和初始值来运行该程序。例如，可以输入以下内容：\n\n```\n./intrate 0.08\
    \ 10000\nresult is 10800\n```\n\n这表明，在单一周期后，本金 10,000 美元以 8%利率投资后的未来价值为 10,800\
    \ 美元。\n\n## 复利\n\n你可以使用单利来分析单期现金流。然而，大多数金融操作，如贷款，都涉及多个周期。为此，你需要考虑复利。\n\n### 问题\n\
    \n计算给定本金在 N 个时间周期后累积的复利。\n\n### 解决方案\n\n解决方案使用一个新的 C++类来封装复利的概念。通过这个类，利用两个成员函数可以轻松回答所提出的问题。第一个函数`multiplePeriod()`返回固定收益投资在给定周期数（作为函数参数传入）后的未来价值。\n\
    \n如前所述，利息可以按离散复利或连续复利过程计算。对于离散复利，我们假设利息仅在投资工具定义的固定间隔支付。当利息加入原始本金时，复利便发生了。\n\n\
    离散复利利率的计算公式为\n\n![$$ V=P{\\left(1+R\\right)}^N $$](img/323908_2_En_1_Chapter_TeX_Equa.png)\n\
    \n其中`P`是现值，`V`是未来价值，`R`是利率，`N`是周期数。利率作为参数传递给类构造函数，并作为成员变量存储。周期数`N`作为第二个参数传递给`multiplePeriod()`方法。\n\
    \n对于连续复利计算，你需要使用另一个方法`continuousCompounding()`。在这种情况下，我们假设复利并非以离散步骤发生，而是随时间连续支付。这是确定金融应用未来价值（或至少是期望未来价值的上限）的一种可行方法。\n\
    \n连续复利利率的计算公式为\n\n![$$ V={Pe}^{RN} $$](img/323908_2_En_1_Chapter_TeX_Equb.png)\n\
    \n这里，`V`是期望的未来价值，`P`是现值，`R`是周期内的利率，`N`是周期数。例如，要计算在每年 8%利率下，连续复利 2 年后的未来价值，你应该使用带参数`R\
    \ = 0.08`和`N = 2`的上述公式。\n\n### 工作原理\n\n两个成员函数`multiplePeriod()`和`continuousCompounding()`使用标准\
    \ C++库中的数学函数`pow()`和`exp()`来计算给定的公式。这两个函数分别实现了快速计算幂函数和指数函数的方法。\n\n要使用标准库中的任何数学函数，你应首先包含头文件`cmath`。表\
    \ 1-1 提供了该头文件提供的一些数学函数的简要列表。\n\n**表 1-1** 标准库中的部分数学函数\n\n| 函数 | 对应的数学运算 |\n| ---\
    \ | --- |\n| `exp` | 指数函数（自然底数） |\n| `pow` | 幂函数 |\n| `log` | 自然对数函数 |\n| `log10`\
    \ | 以 10 为底的对数函数 |\n| `sqrt` | 平方根函数 |\n| `sin` | 正弦函数 |\n| `cos` | 余弦函数 |\n|\
    \ `tan` | 正切函数 |\n| `acos` | 反余弦函数（余弦的逆函数） |\n| `asin` | 反正弦函数（正弦的逆函数） |\n| `atan`\
    \ | 反正切函数（正切的逆函数） |\n| `ceil` | 向上取整函数（比参数大的最小整数） |\n| `floor` | 向下取整函数（比参数小的最大整数）\
    \ |\n| `fabs` | 浮点数的绝对值 |\n\n应尽可能使用标准库提供的数学函数，而非自定义版本，原因如下：\n\n- **兼容性**：使用标准库的函数能保证在任何实现该库的编译器中均可使用。\n\
    - **性能**：标准库中的函数由编译器厂商作为其软件包的一部分实现。这些数学函数的代码通常针对特定架构进行了优化，这通常能带来更好的性能。\n\n###\
    \ 完整代码\n\n代码清单 1-3 展示了类`CompoundIntRateCalculator`的实现，分为一个头文件和一个实现文件。我还提供了一个示例`main()`函数，展示了如何使用该类。\n\
    \n```\n//\n//  CompoundIntRateCalculator.h\n#ifndef __FinancialSamples__CompoundIntRateCalculator__\n\
    #define __FinancialSamples__CompoundIntRateCalculator__\nclass CompoundIntRateCalculator\
    \ {\npublic:\nCompoundIntRateCalculator(double rate);\nCompoundIntRateCalculator(const\
    \ CompoundIntRateCalculator &v);\nCompoundIntRateCalculator &operator =(const\
    \ CompoundIntRateCalculator &v);\n~CompoundIntRateCalculator();\ndouble multiplePeriod(double\
    \ value, int numPeriods);\ndouble continuousCompounding(double value, int numPeriods);\n\
    private:\ndouble m_rate;\n};\n#endif /* defined(__FinancialSamples__CompoundIntRateCalculator__)\
    \ */\n//\n//  CompoundIntRateCalculator.cpp\n#include \"CompoundIntRateCalculator.h\"\
    \n#include \nCompoundIntRateCalculator::CompoundIntRateCalculator(double rate)\n\
    : m_rate(rate)\n{\n}\nCompoundIntRateCalculator::~CompoundIntRateCalculator()\n\
    {\n}\nCompoundIntRateCalculator::CompoundIntRateCalculator(const CompoundIntRateCalculator\
    \ &v)\n: m_rate(v.m_rate)\n{\n}\nCompoundIntRateCalculator &CompoundIntRateCalculator::operator\
    \ =(const CompoundIntRateCalculator &v)\n{\nif (this != &v)\n{\nthis->m_rate =\
    \ v.m_rate;\n}\nreturn *this;\n}\ndouble CompoundIntRateCalculator::multiplePeriod(double\
    \ value, int numPeriods)\n{\ndouble f = value * pow(1 + m_rate, numPeriods);\n\
    return f;\n}\ndouble CompoundIntRateCalculator::continuousCompounding(double value,\
    \ int numPeriods)\n{\ndouble f = value * exp(m_rate * numPeriods);\nreturn f;\n\
    }\n//\n//  main.cpp\n#include \"CompoundIntRateCalculator.h\"\n#include \n// the\
    \ main function receives parameters passed to the program\nint main(int argc,\
    \ const char * argv[])\n{\nif (argc != 4)\n{\nstd::cout   \" << std::endl;\nreturn\
    \ 1;\n}\ndouble rate = atof(argv[1]);\ndouble value = atof(argv[2]);\nint num_periods\
    \ = atoi(argv[3]);\nCompoundIntRateCalculator cIRCalc(rate);\ndouble res = cIRCalc.multiplePeriod(value,\
    \ num_periods);\ndouble contRes = cIRCalc.continuousCompounding(value, num_periods);\n\
    std::cout << \" future value for multiple period compounding is \" << res << std::endl;\n\
    std::cout << \" future value for continuous compounding is \" << contRes << std::endl;\n\
    return 0;\n}\n```\n\n**代码清单 1-3** `CompoundIntRateCalculator.h`\n\n### 使用示例\n\n\
    代码清单 1-3 中的代码可以编译成可执行文件，并从命令行运行。该程序期望三个参数：利率、投资的现值以及复利的周期数。\n\n以下是其使用示例：\n\n```\n\
    $ ./compound 0.05 1000 4\nfuture value for multiple period compounding is 1215.51\n\
    future value for continuous compounding is 1221.4\n```\n\n正如预期，连续复利返回的值略高于离散复利计算出的值。\n"
- fmt: '# Modeling Cash Flows


    A more general way of thinking about fixed income investments is to look at the
    flow of cash exchanged between the two involved parties. A cash flow is a sequence
    of payments, scheduled during a specified period of time. It is clear that the
    value of the cash flows between two entities should be equal in some way. In this
    section, you will learn how to determine if a set of cash flows is equivalent.


    ## Problem


    Calculate the present value of two cash flows and determine if they are equivalent.


    ## Solution


    Cash flows are the basic tool for comparing two or more fixed income investments.
    A cash flow establishes the sequence of cash transfers between two interested
    parties. The traditional way to denote these cash exchanges is by using positive
    and negative values.


    For example, consider a common loan, where a customer requests a quantity at a
    given interest rate. The customer will make a sequence of cash payments during
    the lifetime of the loan. At the end of the transaction, the payments made by
    both parties should be equivalent.


    The equivalence is established using the concept of *present value*. The present
    value of a payment in the future needs to be discounted by the interest rate that
    would be applied to that same value. In other words, discounting is the inverse
    concept to compounding.


    ### Calculating Present Value


    A general principle of investing is that money in your pocket today is more valuable
    than the same money received in the future. This general principle can be quantified
    using the knowledge of value compounding based on interest rates. The present
    value of a fixed income investment is the value that corresponds to the sum of
    cash flows taking place in the future, after their corresponding interest has
    been considered and discounted.


    The formula for present value (`PV`) of a future payment is determined by


    ![$$ PV= FV/{\left(1+R\right)}^N $$](images/323908_2_En_1_Chapter/323908_2_En_1_Chapter_TeX_Equc.png)


    In this equation, `PV` is the desired present value, `FV` is the future value
    that we want to discount, `R` is the interest rate, and `N` is the number of periods
    between the present value and the future value.


    As you see, the formula for `PV` is the inverse of the calculation of compound
    interest rate. This clearly shows that we are just using a similar process to
    determine a present value when starting from a known future value.


    ### Calculating Present Value in C++


    Formulas for calculating `PV` can be found in any financial engineering book.
    For a C++ programmer, however, the main interest in this topic is centered on
    how to perform `PV` calculations with high performance. The standard procedure
    is to denote values paid by the two parties using positive and negative signs.
    For example, we can denote an initial loan as a negative number and each payment
    of the loan as a positive number. Using this approach, for a cash flow from two
    parties to be equivalent, the present value of all cash transfers needs to add
    to zero.


    This is the method used by the `CashFlowCalculator` class, which is presented
    next. Here is the class definition.


    ```cpp

    class CashFlowCalculator {

    public:

    // constructors

    void addCashPayment(double value, int timePeriod);

    double presentValue();

    private:

    std::vector m_cashPayments;

    std::vector m_timePeriods;

    double m_rate;

    double presentValue(double futureValue, int timePeriod);

    };

    ```


    The `addCashPayment` method is used to add new payments to the desired cash flow.
    The arguments are the value of the payment, and the second is the time period
    when this payment occurs. The value is positive or negative depending on the originator
    of the payment, as previously discussed. The data is stored on two vectors, `m_cashPayments`
    and `m_timePeriods`, using the STL vector template.


    The `presentValue` method in this class is used to compute the `PV` or the whole
    cash flow stored in the current object. This is done with the determination of
    the `PV` for each cash exchange as stored in the `m_cashPayments` vector and finally
    adding these values to the `total` variable.


    ```cpp

    double CashFlowCalculator::presentValue()

    {

    double total = 0;

    for (int i=0; i<m_cashPayments.size(); ++i)

    {

    total += presentValue(m_cashPayments[i], m_timePeriods[i]);

    }

    return total;

    }

    ```


    The auxiliary member function `presentValue(double, int)` is used to calculate
    the `PV` for a single payment. It is defined using the foregoing formula.


    ```cpp

    double CashFlowCalculator::presentValue(double futureValue, int timePeriod)

    {

    double pValue = futureValue / pow(1+m_rate, timePeriod);

    std::cout << " value " << pValue << std::endl;

    return pValue;

    }

    ```


    ### Using STL Containers


    The code in the `CashFlowCalculator` class is made simpler by the use of vector
    containers. The `std::vector<>` template is used in modern C++ applications to
    store ordered sequences of elements that require random access. Unlike traditional
    C and C++ arrays, which decay to pointers when passed as arguments to a function,
    a vector is an object that maintains its properties, such as `size`, during the
    whole time the vector is used. A vector also knows how to clean up after itself,
    avoiding memory leaks that are so common in old-style C++ applications.


    To use a vector in a C++ application, you need to declare the object by passing
    the element type as a parameter to the vector template. Therefore, `std::vector<int>`
    will create a vector of `int` elements. The vector template class has member functions
    that can be used to manipulate and retrieve information about the elements.


    *   `size`: Returns the number of elements stored in the vector object.

    *   `push_back`: Copies the object passed as a parameter and stores it at the
    end of the vector. If necessary, additional memory is allocated for the new element,
    which can take O(n).

    *   `pop_back`: Removes the last element from the vector and undoes the changes
    made by `push_back` (except for memory that is not released).

    *   `operator[]`: Provides access to the contents of the vector, using syntax
    similar to the access of traditional C++ arrays.


    The vector template is just one among other STL containers that are available
    for C++ developers. The complete list changes as new templates are added to the
    standard library, but Table 1-2 lists the most used containers.


    **Table 1-2** Common Containers Provided by the STL


    | Container | Description |

    | --- | --- |

    | `vector` | Ordered collection of elements with constant random access time |

    | `queue` | Container where elements are added at the end and removed from the
    front position |

    | `map` | Associative container that connects keys to their associated element
    |

    | `multimap` | Associative container that connects keys to a set of associated
    elements |

    | `list` | A linked list of elements, which provides constant time inclusion/exclusion
    at any position |

    | `stack` | A specialized container that allows only addition and removal of the
    last element (the top of the stack) |'
