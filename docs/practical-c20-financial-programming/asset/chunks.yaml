- fmt: "The program displays the value of the integral of `sin(x)` from 1/2 to 5/2.\
    \ The approximation is given for two different settings of the number of subintervals.\
    \ The first result is for 100 subintervals. The second result shows the approximation\
    \ achieved when that number of subintervals is doubled. As in the previous example,\
    \ it is possible to control the quality of the approximation by increasing the\
    \ number of subintervals. Also, you can reduce that number in case you prefer\
    \ to get quicker results.\n\n## Using Simpson’s Method\n\nImplement Simpson’s\
    \ method for definite integral calculation.\n\n## Solution\n\nYou have seen two\
    \ common ways to calculate the value of the definite integral for a given continuous\
    \ function. A third method, known as Simpson’s method, is presented in this programming\
    \ example. As with any technique for numeric integration, the general idea is\
    \ to create a second function that approximates the desired function and apply\
    \ it to several subintervals of the original domain until you get a good approximation.\n\
    \nSimpson’s method, unlike the previous two methods that use linear approximations\
    \ to the given function, employs a second-order polynomial to achieve a better\
    \ convergence. In this way, instead of relying on a linear function to achieve\
    \ the desired result, the approximation proposed with Simpson’s method is better\
    \ adapted to the behavior of the original curve.\n\nThe way Simpson’s method works\
    \ can be easily visualized with an example. Suppose you want to integrate the\
    \ function used in the previous section: `f(x) = sin x`. This function, being\
    \ trigonometric, has no simple finite representation as a polynomial. However,\
    \ it is possible to find very good approximations for a representation if you\
    \ restrict the search to a small part of the function.\n\nFor example, I have\
    \ shown in Figure [10-6](#323908_2_En_10_Chapter.xhtml#Fig6) how it is possible\
    \ to use a second-order polynomial function to approximate the value of `sin x`\
    \ in the interval 1/2 to 5/2. Observe that the similarity between these two curves\
    \ is good enough only in the short range of values inside the given interval,\
    \ and outside that interval, these two functions vary widely.\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig6_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** Using a second-degree polynomial to approximate the value of\
    \ `f(x)=sin x` in the interval 1/2 to 5/2\n\nThe same idea is used in Simpson’s\
    \ method. Since a quadratic approximation may be so close to the desired function,\
    \ the use of quadratic functions may dramatically improve the value of the definite\
    \ integral calculated in this way. In fact, experiments have shown that Simpson’s\
    \ method has better accuracy than other algorithms, such as the midpoint method\
    \ and the trapezoid method.\n\n**Note**\n\nThe additional accuracy of Simpson’s\
    \ method can make it possible to reduce the number of subintervals necessary for\
    \ the calculation of the definite integral. However, since you need to use a quadratic\
    \ approximation instead of a simple linear function, the computational effort\
    \ of each iteration will be higher. In the end, while Simpson’s method produces\
    \ superior results for most functions, users need to be aware of a possible trade-off\
    \ in terms of computational time per iteration.\n\nThe second-order polynomial\
    \ used in Simpson’s method is defined in the following equation, which can be\
    \ used to directly implement the proposed rule:\n\n![$$ \\frac{b-a}{6}\\left[f(a)+4f\\\
    left(\\frac{a+b}{2}\\right)+f(b)\\right] $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_Equa.png)\n\
    \nTherefore, you can summarize the general algorithm as follows:\n\n1.  Define\
    \ a range `(A, B)` where you want to calculate the integral to the equation.\n\
    2.  Subdivide the initial range into `N` subintervals of equal sign.\n3.  Initialize\
    \ the integral value `S` to zero.\n4.  For each subinterval `(a, b)`, do the following:\n\
    \    1.  Take the values of `a` and `b`.\n    2.  Determine the approximation\
    \ to the integral in the interval `(a, b)` given by the equation\n\n        ![$$\
    \ m\\left(a,b\\right)=\\frac{b-a}{6}\\left[f(a)+4f\\left(\\frac{a+b}{2}\\right)+f(b)\\\
    right] $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq15.png)\n\
