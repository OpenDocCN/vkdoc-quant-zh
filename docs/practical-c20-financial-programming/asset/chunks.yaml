    }\n清单 4-2\n类 TimeSeriesTransformations\n```\n\n### 运行代码\n\n我在 `main()` 函数中包含了一些使用\
    \ `TimeSeriesTransformations` 类的示例代码。这样，你就可以将上一节中给出的文件编译成一个示例应用程序。在借助 `gcc` 或\
    \ `Visual Studio` 等 C++ 编译器构建应用程序后，你可以使用以下命令行运行它：\n\n```\n./TimeSeriesTransformations\n\
    price is 5.9\n```\n\n## 复制交易文件\n\n创建一个用于将交易文件复制到临时存储的类。\n\n### 解决方案\n\n文件操作是许多编程领域中的常见需求，在金融应用程序中也不例外。数据通常以\
    \ CSV 和 XML 等格式存储，因为它们需要被其他应用程序处理和过滤。日志记录功能对于确保正确地处理调试和错误信息也是必要的。\n\n这类文件操作问题可以使用传统的\
    \ C 接口来解决，这些接口在所有主要操作系统（如 UNIX 和 Windows）上均可用。然而，此类原生接口存在一些缺点，应尽可能避免使用。我借此机会概述一种更好的方法，即使用\
    \ C++ 库的 boost 仓库，特别是 `filesystem` 库。掌握了 boost 的基本工作原理后，你将能够在接下来的几章中使用其他更复杂的类。\n\
    \n### Boost 库\n\n标准 C++ 库提供了大量的类、容器和算法。然而，由于创建新 C++ 语言标准需要付出巨大努力，因此所包含的库集通常是最简化的，只包含大多数程序员所需的基本功能。此外，标准库只包含那些经过实际应用充分验证和确立、经得起时间考验的类和函数。\n\
    \n由于将新功能纳入语言标准的过程缓慢，因此需要一种更敏捷的软件分发与开发策略，以便更好地融入 C++ 社区认可的新库。Boost 库的诞生就是为了填补标准中纳入新功能的缓慢过程所留下的空白。与传统的单一供应商库不同，Boost\
    \ 开发人员的目标是创建可在广泛领域和架构中复用的高级组件。许多 Boost 贡献者本身就参与了 C++ 标准的制定工作，这意味着目前 Boost 发行版中包含的许多库，日后将成为标准库的一部分。例如，`std::shared_ptr`\
    \ 等模板类就源自 `boost::shared_ptr`。\n\n要在你的应用程序中使用 Boost 库，你需要从 `boost.org` 网站下载并安装它们。由于\
    \ Boost 类的特性，这个过程相对简单。因为 Boost 中的大多数组件都被定义为模板类，所以除了少数例外，完整代码都包含在头文件中。这意味着你只需在代码中添加一个头文件，就可以使用某些\
    \ Boost 库中的所有功能。\n\n表 4-1 列出了 Boost 发行版中可用的一些库。\n\n**表 4-1** Boost 发行版中一些最常用的组件\n\
    \n| 库 | 描述 |\n| --- | --- |\n| `boost:any` | 一种多态数据类型，旨在用作任何其他数据类型的容器 |\n| `Bind`\
    \ | 允许现有函数被其他函数对象使用 |\n| `Circular Buffer` | 定义了一个可用作循环缓冲区的存储模板 |\n| `Chrono`\
    \ | 一组与时间相关的实用工具 |\n| `Filesystem` | 常见文件操作的实现，包括复制、移动和创建文件或目录 |\n| `Foreach`\
    \ | 引入了一种循环结构（已被 C++11 的新特性弃用） |\n| `Function` | 一组定义函数包装器的模板 |\n| `Geometry`\
    \ | 常见几何算法的实现 |\n| `Graph` | 定义了图形数据类型，以及常见的图论技术和算法 |\n| `Hash` | 一种简单的哈希表数据类型，定义为模板\
    \ |\n| `Lambda` | 一组可用于编写函数式编程 lambda 表达式的模板 |\n| `Log` | 用于 C++ 应用程序的通用日志记录功能\
    \ |\n| `Math` | 额外的数学函数 |\n| `MPI` | 消息传递接口库 |\n| `PropertyMap` | 定义了一个通用属性模板，可用于定义动态属性\
    \ |\n| `SmartPtr` | 一组用于存储堆分配对象的智能指针类型 |\n\n在本章及下一章中，我们将有机会探索其中一些库，因为本书介绍的其他金融\
    \ C++ 代码中将会用到它们。在本例中，我们关注的是 `filesystem` 库，它用于提供与文件和目录相关的操作。\n"
- fmt: "C and C++ have traditionally provided interfaces for file handling in each\
    \ of the platforms where it has been implemented. Platform vendors have created\
    \ separate libraries for this purpose, resulting in different interfaces for operating\
    \ systems such as UNIX and other Posix-compliant systems, Windows, OS/2, VMS,\
    \ and others. The differences between these interfaces, however, make it difficult\
    \ to port applications across systems. Application writers have, in practice,\
    \ created abstraction layers that interact with each different system as needed.\n\
    \nThe `filesystem` library in STL is an attempt to provide a set of cross-platform\
    \ classes and templates for file manipulation. The same classes and templates\
    \ can be used to handle files in each of the platforms supported by the STL. This\
    \ reduces the amount of work by application programmers, while the resulting code\
    \ can be reused in other platforms without risks.\n\nThe main components of the\
    \ library are included in the `std::filesystem` namespace. These components allow\
    \ you to perform common operations on files and directories. The classes included\
    \ in the library easily support operations such as copying, moving, changing permissions,\
    \ and removing. Next, I show you some of these important components and how they\
    \ can be used to write code to manipulate file system contents.\n\nThe `std::filesystem::path`\
    \ class represents a path in the file system. Having a path class is interesting\
    \ because it lets programmers represent directory paths in different systems while\
    \ using the same object. For example, paths in a UNIX system use the “/” separator,\
    \ while in Windows, the “\\” separator is used. To avoid problems associated with\
    \ these different conventions, the `filesystem` library uses a common representation.\
    \ The class `path` is then used by many of the functions provided in the library.\n\
    \nThe other important concept of the `filesystem` library is that of directory\
    \ iterators. You can create an iterator for a particular path using the `directory_iterator`\
    \ function. This function returns an iterator object, which has operators such\
    \ as `++` and `--`, allowing programmers to move between elements of the given\
    \ directory.\n\nOther than suitable abstractions for paths and iterators, the\
    \ `filesystem` library provides a set of functions that can be used to perform\
    \ individual changes to files and directories. These functions include the following:\n\
    \n*   `is_regular_file`: Returns true if the path supplied indicates a regular\
    \ file (instead of a directory)\n*   `is_directory`: Returns true if the path\
    \ indicates a directory\n*   `file_size`: Returns the size of the filename passed\
    \ as argument, in bytes\n*   `exists`: Returns true if the path passed as argument\
    \ exists in the file system\n*   `status`: Returns a `file_status` object, which\
    \ encapsulates the properties of given file, such visibility and type\n*   `create_directory`:\
    \ Creates a new directory in the file system, with the given path\n*   `copy`:\
    \ Makes a copy of the given path to a location indicated by the second parameter\n\
    *   `remove`: Removes the given path from the file system\n*   `current_path`:\
    \ Returns a path object that indicates the current path used by the application\n\
    \nThese functions can be easily combined to manipulate the file system. I used\
    \ some of these functions to implement all the functionality needed by the `FileManager`\
    \ class. For example, the following is how the `getContents` member function is\
    \ coded:\n\n```\nstd::vector FileManager::getContents(const std::string &prefix)\n\
    {\nstd::vector results;\npath aPath(prefix);\nif (!is_directory(aPath))\n{\nstd::cout\
    \ << \"not a directory \" << prefix << std::endl;\nreturn results;\n}\nstd::vector<path>\
    \ contents;\ncopy(directory_iterator(aPath), directory_iterator(), back_inserter(contents));\n\
    for (int i=0; i<contents.size(); ++i)\n{\nresults.push_back(contents[i].string());\n\
    }\nreturn results;\n}\n```\n\nThe first step is to create a path object based\
    \ on the string passed as a parameter. Once the path has been created, you can\
    \ test if it points to a directory using the `is_directory` function. If the path\
    \ is correct, then you can use the `directory_iterator` function to create an\
    \ iterator object, which is passed to the `copy` function. The `copy` function’s\
    \ only job is to copy each element pointed by the iterator into the `contents`\
    \ vector. The elements in this container are later converted to strings and added\
    \ to the `results` vector.\n\nFinally, the function that copies files from one\
    \ directory to a given destination can be added to the `FileManager` class using\
    \ the following code:\n\n```\nvoid FileManager::copyToTempDirectory(const std::string\
    \ &prefix)\n{\npath tmpPath(\"/tmp/\");\npath aPath(prefix);\nif (!is_directory(aPath))\n\
    {\nstd::cout << \"not a directory \" << prefix << std::endl;\nreturn;\n}\nlistContents(prefix);\n\
    for (auto it = directory_iterator(aPath); it != directory_iterator(); ++it)\n\
    {\nif (is_regular_file(it->path()))\n{\ncopy_file(it->path(), tmpPath);\n}\n}\n\
    }\n```\n\nHere, you start checking the given path prefix to make sure that it\
    \ is a reference to a directory. Then, I have added some code to list the contents\
    \ as a form of logging. The next step is to iterate through the content of the\
    \ directory using the iterator returned by the `directory_iterator` function.\
    \ For each element of the directory, you can test if it is a regular file and\
    \ then use the `copy_file` function to perform the copy.\n\n## Complete Code\n\
    \nYou can see the complete definition of the `FileManager` class in Listing [4-3](#323908_2_En_4_Chapter.xhtml#PC12).\
    \ At the end of the listing, you can see an example of how to use the class in\
    \ the `main()` function.\n\n```\n//\n//  FileManager.h\n#ifndef __FinancialSamples__FileManager__\n\
    #define __FinancialSamples__FileManager__\n#include \n#include \nclass FileManager\
    \ {\npublic:\nFileManager(const std::string &basePath);\nFileManager(const FileManager\
    \ &);\n~FileManager();\nFileManager &operator=(const FileManager &);\nvoid removeFiles();\n\
    std::vector getDirectoryContents();\nvoid listContents();\nvoid copyToTempDirectory(const\
