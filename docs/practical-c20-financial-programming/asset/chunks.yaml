    \ v.m_rate;\n}\nreturn *this;\n}\nvoid CashFlowCalculator::addCashPayment(double\
    \ value, int timePeriod)\n{\nm_cashPayments.push_back(value);\nm_timePeriods.push_back(timePeriod);\n\
    }\ndouble CashFlowCalculator::presentValue(double futureValue, int timePeriod)\n\
    {\ndouble pValue = futureValue / pow(1+m_rate, timePeriod);\nstd::cout \n// 主函数接收传递给程序的参数\n\
    int main(int argc, const char * argv[])\n{\nif (argc != 2)\n{\nstd::cout \" >\
    \ period;\nif (period == -1) {\nbreak;\n}\ndouble value;\nstd::cin >> value;\n\
    cfc.addCashPayment(value, period);\n} while (1);\ndouble result = cfc.presentValue();\n\
    std::cout << \" 现值为 \" << result << std::endl;\nreturn 0;\n}\n清单 1-4\nCashFlowCalculator.h\n\
    ```\n\n### 运行代码\n\n该程序可以使用符合标准的 C++ 编译器进行编译，例如 Linux 或 Mac OS X 上的 GCC。编译后的程序可以通过以下方式运行：\n\
    \n```\n./presentValue 0.08\n1 200\n2 300\n3 500\n4 -1000\n\nvalue 190.476\nvalue\
    \ 272.109\nvalue 431.919\nvalue -822.702\nThe present value is 71.8014\n```\n\n\
    前几行显示了程序的输入内容。命令行参数（本例中为 `0.08`）是所需的利率——它被用作类构造函数的参数。接下来的几行是时间周期和付款值的序列。序列的最后一行用数字\
    \ `-1` 标记。当读取到此数字时，程序停止读取输入，并开始按照接收顺序计算给定现金流的现值。\n\n最后几行显示程序的输出结果。代码会打印现金流中每个组成部分的现值。最后，它会打印整个付款序列的现值。要使用此程序验证常见的固定收益工具（如贷款），你应该输入每对时间周期-付款值。计算结束时，现值应合计为零（或由于可能的数值不准确性而接近于零）。\n\
    \n## 债券建模\n\n债券是一种非常常见的固定收益工具。全球的大型企业和政府都使用它们来吸引长期偿还的现金投资。作为交换，它们提供定期票息的保证支付。大多数债券的到期时间（即付清时间）在\
    \ 5 到 30 年之间。\n\n### 问题\n\n创建一个 C++ 类来模拟债券工具并确定其年利率。\n\n### 解决方案\n\n债券的结构是这样的：投资者在债券期限开始时存入本金。通常，本金在到期时全额偿还。在初始投资和到期日之间的这段时间内，投资者会获得一个固定值，也称为票息价值，它决定了债券支付的利率。\n\
    \n例如，考虑一笔面值 $100,000、为期 30 年、年票息为 $5,000 的 XYZ 公司债券投资。这相当于一项固定收益投资，对本金支付 5% 的利息。XYZ\
    \ 公司有权在规定期限内使用本金，而本金总额将在 30 年后到期时返还给投资者。\n\n要使用 C++ 对此类投资进行建模，你可以创建一个包含所需信息的类，例如本金、票息价值和到期期限。该类的声明如下：\n\
    \n```\nclass BondCalculator {\npublic:\nBondCalculator(const std::string institution,\
    \ int numPeriods, double principal, double couponValue);\nBondCalculator(const\
    \ BondCalculator &v);\nBondCalculator &operator =(const BondCalculator &v);\n\
    ~BondCalculator();\ndouble interestRate();\nprivate:\nstd::string m_institution;\n\
    double m_principal;\ndouble m_coupon;\nint m_numPeriods;\n};\n```\n\n此类拥有成员变量，用于存储发行该债券的机构名称（称为发行人）、所投资的本金、票息金额以及期数（通常以年为单位）。该类可用于记录债券投资信息，作为跟踪此类固定收益投资的应用程序的一部分。`interestRate`\
    \ 方法可用于返回票息所隐含的内部收益率。\n\n### 完整代码\n\n清单 1-5 展示了类 `BondCalculator` 的完整代码。代码分为一个头文件和一个实现文件。你也可以在\
    \ `main` 函数中查看一个示例用法。\n\n```\n//\n//  BondCalculator.h\n#ifndef __FinancialSamples__BondCalculator__\n\
    #define __FinancialSamples__BondCalculator__\nclass BondCalculator {\npublic:\n\
    BondCalculator(const std::string institution, int numPeriods, double principal,\
    \ double couponValue);\nBondCalculator(const BondCalculator &v);\nBondCalculator\
    \ &operator =(const BondCalculator &v);\n~BondCalculator();\ndouble interestRate();\n\
    private:\nstd::string m_institution;\ndouble m_principal;\ndouble m_coupon;\n\
    int m_numPeriods;\n};\n#endif /* defined(__FinancialSamples__BondCalculator__)\
    \ */\n//\n//  BondCalculator.cpp\n#include \"BondCalculator.h\"\nBondCalculator::BondCalculator(const\
    \ std::string institution, int numPeriods,\ndouble principal, double couponValue)\n\
    : m_institution(institution),\nm_numPeriods(numPeriods),\nm_principal(principal),\n\
    m_coupon(couponValue)\n{\n}\nBondCalculator::BondCalculator(const BondCalculator\
    \ &v)\n: m_institution(institution),\nm_numPeriods(v.m_numPeriods),\nm_principal(v.m_principal),\n\
    m_coupon(v.m_coupon)\n{\n}\nBondCalculator::~BondCalculator()\n{\n}\nBondCalculator\
    \ &BondCalculator::operator =(const BondCalculator &v)\n{\nif (this != &v)\n{\n\
    this->m_institution = v.m_institution;\nthis->m_principal = v.m_principal;\nthis->m_numPeriods\
    \ = v.m_numPeriods;\nthis->m_coupon = v.m_coupon;\n}\nreturn *this;\n}\ndouble\
    \ BondCalculator::interestRate()\n{\nreturn m_coupon / m_principal;\n}\n// 主函数接收传递给程序的参数\n\
    int main(int argc, const char * argv[])\n{\nif (argc != 4)\n{\nstd::cout    \"\
    \n<< std::endl;\nreturn 1;\n}\nstd::string issuer = argv[1];\ndouble principal\
    \ = atof(argv[2]);\ndouble coupon = atof(argv[3]);\nint num_periods = atoi(argv[4]);\n\
    BondCalculator bc(issuer, principal, coupon, num_periods);\nstd::cout << \"正在读取由\
    \ \" << issuer << \" 发行的债券信息\" << std::endl;\nstd::cout << \" 内部收益率为 \" << bc.interestRate()\
    \ << std::endl;\nreturn 0;\n}\n清单 1-5\nBondCalculator.h\n```\n"
- fmt: '### Running the Code


    The code can be compiled using a standards-compliant C++ compiler. It has been
    tested on Linux and Mac OS X. You can run the program using the following command
    at your preferred shell:


    ```

    $ ./bondCalculator XYZ 100000 5000 20

    reading information for bond issued by XYZ

    the internal rate of return is 0.5

    ```


    The first line in bold is the command that you need to execute. The parameters
    are the name of the issuer institution, the total principal invested in the bond,
    the value of the periodic coupon, and the number of time periods for this investment.


    The output of the program displays the rate of return calculated from the coupon
    value. The class `BondCalculator` can now be used in a larger application to store
    information about this type of fixed income investment.


    ## Further Reference


    This chapter provides an introduction to the general topic of fixed income investments.
    While we are mostly concerned about the C++ programming issues involved in this
    area, there are several books that can help you get a greater understanding of
    the financial engineering techniques that were introduced here.


    The following books are just suggestions that you can explore to achieve a better
    understanding of the world of fixed income investments.


    * *Investment Science* by David Luenberger (Oxford University Press, 1998): This
    is an undergraduate-level book that describes the basic theory of investment.
    Most of the book explains the fundamentals of fixed income investments, including
    algorithms for the most common problems.

    * *Investments* by Zvi Bodie, Alex Kane, and Alan Marcus (McGraw-Hill/Irwin, 2004):
    This is a standard textbook on investment theory that explains, among other topics,
    the ideas behind fixed income investments.

    * *Mathematics for Finance* by Marek Carpinski and Tomasz Zastawniak (Springer,
    2011): This book is more for the mathematically inclined. It not only explains
    the basics of fixed income investments but also gives a lot of mathematical methods
    that are useful in their analysis.


    ## Conclusion


    In this chapter, I introduced the topic of fixed income investments and how they
    can be modeled and analyzed using C++ code. The first part of the chapter explains
    the general concepts behind fixed income investments. These investments are used
    as a relatively safe way to maintain and generate wealth, as compared to the equity
    and derivatives market.


    I have also explained why C++, especially in its current standard C++20, is the
    ideal programming language to create computational solutions for the problems
    in this area of finance. Due to its performance characteristics and high-level
    programming support, C++ provides the best balance between expressiveness and
    raw speed. As a result, C++ is the de facto standard for the development of core
    applications in the finance field, especially in applications that deal with fixed
    income data.


    The first example introduced a basic class that can be used to calculate simple
    interest rates. It introduces not only the concept of interest rate calculation
    methods but also the typical way such solutions are designed and coded in modern
    C++.


    The second example introduced the concept of interest rate compounding, both in
    discrete and continuous intervals. You learned there how to create a C++ class
    to calculate this type of interest rate using standard C++ library functions.
    I presented a summary of such mathematical functions and how they are used in
    C++ programs.


    The third example in this chapter explored the important concept of cash flows
    and their corresponding PV. The calculation of PV is central to the comparison
    of two or more fixed income investments. Using the inverse of the formulas for
    interest rate, you can determine the real value of a given set of cash flows in
    the present. You learned how to solve this type of problem using a new C++ class.


    Finally, this chapter explains how bonds are used in financial applications and
    presented a class to model these investments. In future chapters, you will learn
    more about the computational challenges of using these financial vehicles as part
    of an investment portfolio.


    In the next chapter, I will introduce another large part of the financial investment
    landscape: the equities market. You will see a few programming techniques that
    can be useful in these markets, along with an introduction to other important
    concepts that we explore in the later part of this book.


    # 2. The Equities Market


    Owning shares of company profits is one of the most common ways to invest and
    generate wealth. A large number of people who have made a fortune have achieved
    it by creating or buying an equity stake in a successful corporation. This is
    the reason the equity market is so popular among all kinds of investors. Moreover,
    the stock market is so vast that it provides opportunities for everyone willing
    to participate: from small investors to large hedge funds, you will find an investment
    style for each kind of participant.


    The equities market is also an exciting area for software engineers, since it
    provides so many opportunities to apply computational techniques, which can be
    implemented in C++. Software engineers are also great allies to market analysts
    and investors in general, helping in vital activities such as modeling market
    data and devising algorithms needed to make fast and accurate trading decisions.


    Due to their large size, equity markets are multifaceted and offer a huge variety
    of investment vehicles. From small cap stocks to blue chips, ETFs (exchange-traded
    funds), equity and index options, and other derivatives, there are a great number
    of opportunities for employing investment algorithms, in order to get an edge
    in the market. As a result, there is also great incentive (from banks and other
    investment institutions) to apply high-speed C++ programming techniques to solve
    such problems.


    In this chapter, we present C++ code for a few selected problems occurring in
    the equities markets and their derivatives. We will consider financial programming
    topics such as the following:


    * Calculating simple moving averages

    * Computing exponential moving averages

    * Calculating volatility

    * Computing correlation of equity instruments

    * Modeling and calculating fundamental indicators


    ## Equities Market Concepts


    Equity markets exist to expedite the trading of equity-based investments. The
    goal of an equity investment is to allocate money directly or indirectly to company
    stock, which gives buyers a certain share of ownership in a company. The idea
    behind this investment is to profit from the growth of the institution represented
    by that particular investment vehicle. For example, buying shares of IBM stock
    gives ownership of a small part of the company, along with the future profits
    associated with that ownership.


    Direct stock ownership is the simplest example of an equity investment. Anyone
    with a brokerage account can buy shares in public companies, that is, companies
    that have put their shares for sale in the public market. Using their particular
    trading accounts or retirement accounts, individual investors have the ability
    to invest in any one of the thousands of publicly traded companies in the US and
    international markets.


    However, directly controlling a company stock is not the only (or even the easiest)
    way to participate in the stock market. There are nowadays a plethora of products
    that offer alternative ways to invest in equity. This includes mutual funds, ETFs,
    index funds, options, and other more exotic derivatives. How to select the right
    instrument from such a large array of tradable issues is one of the many problems
    faced by money managers and individual investors.'
