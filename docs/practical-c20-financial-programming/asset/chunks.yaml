    # Conclusion


    Extension languages such as Python and Lua have become very popular in the last
    few years. They provide the ability to quickly develop applications that are composed
    of existing components. Thanks to C++ flexibility, however, as you have seen,
    it is possible to create C++ libraries that can be easily integrated with these
    languages.


    Initially, you have seen how to use Python as an extension language for C++ classes.
    The class presented as an example can be accessed directly from Python code by
    simply using the Python external API. You have seen how to convert data from and
    into the data structures maintained by Python. In a second coding example, you
    learned how to use the `boost::python` library, which provides a more concise
    way to export C++ data types to Python. I have discussed some of the advantages
    and disadvantages of each method.


    Lua is another language that has grown in popularity in the last few years. With
    its small footprint, Lua is an ideal candidate for the position of extension language
    for libraries written in C++. Due to its simplicity and modularity, you can easily
    embed the Lua interpreter in a C++ application. In this chapter, you saw a C++
    coding technique that shows how to easily integrate Lua into your applications.


    Using your C++ code as an external library is one of the many ways you can connect
    with other tools and environments. Another option is to integrate your financial
    C++ code into existing scientific programming tools. Two of the most often used
    scientific tools for data analysis are R and Maxima. In Chapter [16](#323908_2_En_16_Chapter.xhtml),
    you will learn more about these tools and how to integrate C++ into the workflow
    provided by these applications.


    # 16. Using C++ with R and Maxima


    One of the advantages of code implemented in C++ is that it can be used as part
    of native libraries or stand-alone applications and also integrated as a component
    of other development and modeling environments. In the financial industry, for
    instance, it is common to have lower-level modules implemented in C++, with high-level
    analysis being performed in more user-oriented environments such as Excel, Mathematica,
    Matlab, Maxima, R, and Octave.


    When using a high-level data analysis environment, it is crucial to have numeric
    results that are identical to the ones achieved in native code and to access the
    same underlying libraries that are already coded in C++. For this reason, an important
    skill for programmers working in the financial industry is to be able to integrate
    existing code with one or more of the analytical applications used by analysts
    and mathematicians.


    In this chapter, we show you how to incorporate financial libraries developed
    in C++ into two well-known simulation and modeling environments for financial
    analysis: R and Maxima. These are open source applications that are freely available
    on multiple platforms. However, the examples you see in this chapter demonstrate
    principles that can be applied to other commercial tools in the areas of statistics,
    simulation, engineering, and mathematics.


    The following are a few topics that you will learn about in this chapter:


    * **Integrating C++ with R**: Users of the R language have created a rich ecosystem
    of statistical libraries and applications. However, it is sometimes necessary
    to integrate C++ code as part of the analysis performed in R. You will see in
    this chapter how to easily embed C++ classes into this system, both for increased
    performance as well as for consistency with other applications deployed in C++.


    * **Integrating C++ with Maxima**: The Maxima Computer Algebra System is used
    to develop precise mathematical models with a simple, high-level language. It
    is also used for its visualization facilities. You can easily integrate existing
    C++ libraries into Maxima using the shared library mechanism supported by the
    language.


    ## Integrating C++ with R


    Create a C++ class to calculate the present value of a set of payments and that
    can be called from the R interpreter.


    ### Solution


    R is a programming environment that was created to perform statistical analysis
    of large data sets. Due to its easy-to-use and advanced statistical abilities,
    R has become the most used environment for data analysis and is the de facto standard
    in some areas such as data mining. A growing number of statisticians and engineers
    use R daily to study the properties of large data sets.


    R is available for the most common operating systems and computer architectures.
    You can download it for free from the official website at [`www.r-project.org`](http://www.r-project.org).
    After running the required installation method for your operating system, you
    will be able to start the iterative interpreter for the language. The standard
    R environment is able to run R scripts and single commands. You can use these
    tools to perform quick data analysis and create plots based on existing data.
    You can see in Figure [16-1](#323908_2_En_16_Chapter.xhtml#Fig1) what the main
    application window for the R console looks like.


    ![../images/323908_2_En_16_Chapter/323908_2_En_16_Fig1_HTML.jpg](images/323908_2_En_16_Chapter/323908_2_En_16_Fig1_HTML.jpg)


    **Figure 16-1** R console window on Mac OS X


    R is typically used to perform a large range of mathematical algorithms and data
    analysis tasks. For example, a common use of R is to run standard statistical
    procedures, such as mean squared error and other types of statistical regression.
    R has also been used to implement statistical tests tailored for financial data
    sets. As a consequence, it can be very useful to be able to load C++ code into
    the dynamic environment provided in the R console.


    To make it possible to use C++ classes in R, you need to employ the R extension
    application programming interface (API). The extension API consists of a set of
    C-based functions that interact with the R runtime. For example, you can use the
    API to retrieve and convert values from R. Similarly, you can use the API for
    common tasks such as calling mathematical functions and random number generators,
    among others.


    To create C++ functions and classes that access the R extension library, you need
    to include the header file `R.h`. This header is the main C file that coordinates
    access to the many API declarations exported by the R runtime.


    For example, suppose that you need a fast way to determine the present value of
    a set of future payments. You can do this by creating your own C++ solution and
    using the R extension mechanism to export this solution to R. To understand the
    general idea of present-value calculations, you can refer to Chapter [1](#323908_2_En_1_Chapter.xhtml),
    where I discussed tools for fixed income analysis.


    The main functionality is encoded in the `RExtension` class. The two main methods
    in this class are `addCashPayment`, which can be used to add a new cash flow that
    will be later considered by the algorithm, and `presentValue`, which calculates
    the present value of all cash payments added up to this point. The calculation
    of present value uses the following formula:'
