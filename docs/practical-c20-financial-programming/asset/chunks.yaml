    \ d.m_day);\nboost::gregorian::date_duration duration = bdate1 - bdate2;\nreturn\
    \ (int) duration.days();\n}\nbool Date::operator<(const Date &d)\n{\nif (m_year\
    \ < d.m_year) return true;\nif (m_year == d.m_year && m_month < d.m_month) return\
    \ true;\nif (m_year == d.m_year && m_month == d.m_month && m_day < d.m_day) return\
    \ true;\nreturn false;\n}\nDate::DayOfWeek Date::getDayOfWeek()\n{\nint day =\
    \ 1;\nDate d(1900, 1, 1);\nfor (;d < *this; ++d)\n{\nif (day == 7) day = 1;\n\
    else day++;\n}\nreturn (DayOfWeek) day;\n}\nbool Date::isTradingDay()\n{\nDayOfWeek\
    \ dayOfWeek = getDayOfWeek();\nif (dayOfWeek == DayOfWeek::Sun || dayOfWeek ==\
    \ DayOfWeek::Sat)\n{\nreturn false;\n}\nreturn true;\n}\nstd::string Date::toStringDate(Date::DayOfWeek\
    \ day)\n{\nswitch(day)\n{\ncase DayOfWeek::Sun: return \"Sunday\";\ncase DayOfWeek::Mon:\
    \ return \"Monday\";\ncase DayOfWeek::Tue: return \"Tuesday\";\ncase DayOfWeek::Wed:\
    \ return \"Wednesday\";\ncase DayOfWeek::Thu: return \"Thursday\";\ncase DayOfWeek::Fri:\
    \ return \"Friday\";\ncase DayOfWeek::Sat: return \"Saturday\";\n}\nthrow std::runtime_error(\"\
    unknown day of week\");\n}\nint main()\n{\nDate myDate(2015, 1, 3);\nauto dayOfWeek\
    \ = myDate.getDayOfWeek();\nstd::cout << \" day of week is \"\n<< myDate.toStringDate(dayOfWeek)\
    \ << std::endl;\nDate secondDate(2014, 12, 5);\n++secondDate;  // test increment\
    \ operator\n++secondDate;\nint interval = myDate.daysInterval(secondDate);\nstd::cout\
    \ << \" interval is \" << interval << \" days\" << std::endl;\nreturn 0;\n}\n\
    清单 4-4\nDate 类的实现\n```\n\n## 运行代码\n\n清单 4-4 中的代码使用了任何标准 C++ 编译器均可使用的标准类。它还使用了\
    \ boost 库，该库是开源的，可以从 `boost.org` 免费下载。你可以在 Linux 和其他 UNIX 系统上使用以下命令行构建应用程序（假设\
    \ boost 安装在 `/usr/local/boost`）：\n\n```\ngcc -o Date -I/usr/local/boost/ Date.cpp\n\
    ```\n\n执行生成的可执行文件将显示 `main()` 函数中包含的测试代码的输出：\n\n```\n./Date\nday of week is Saturday\n\
    interval is 27 days\n```\n\n## 结论\n\n在本章中，我提供了一些编程示例，涵盖了金融编程中使用的基本库。这些库包括 STL，及其容器集（例如\
    \ `vector`、`map`）和算法（例如 `sort`、`transform` 和 `for_each` 等）。你还了解了 boost 库，这是一组为填补\
    \ C++ 标准化进程缓慢造成的空白而创建的库。\n\n算法是 STL 的重要组成部分。这些算法可用于在 STL 模板定义的任何容器中执行常见操作，例如搜索、复制和转换。在本章中，你还学习了如何将这些算法应用于数据容器以执行数据分析。\n\
    \n第一个示例应用程序展示了如何处理分析师推荐。要正确处理此类信息，你必须使用 STL vector 和 map。第二个示例应用程序使用 STL 提供的算法对时间序列执行简单的转换。这种转换可用于清理数据、执行假设分析，以及根据投资分析新技术的需求更新价格。你已经看到了如何使用\
    \ STL 算法和函数模板来实现这一点。\n\n你还学习了如何以独立于平台或操作系统的方式创建处理文件和目录的 C++ 代码。这是使用属于 boost 库的\
    \ `filesystem` 库实现的。使用 boost 的主要优势之一在于，虽然其他库与操作系统紧密绑定，但 boost 库是以平台无关的方式编写的，遵循标准库采用的相同策略。事实上，多年来，boost\
    \ 的许多组件已成为标准库的一部分。\n\n金融代码的另一个重要方面是频繁使用日期。这类数据与交易、分析师推荐、股息以及许多其他与投资相关的事件相关联。你学习了如何在\
    \ boost 的 `date_time` 库中使用 `date` 类型，以及如何计算日期其他有趣的属性。\n\n这组编码示例到此结束，它们回顾了现代 C++\
    \ 编程的一些基本方面。你需要了解这些技术，它们主要基于模板、STL 及其算法的使用。学习诸如 boost 库之类的扩展库也很重要。在下一章中，你将开始更多地了解数值类的设计。C++\
    \ 中的金融应用程序大量使用数值功能，以快速准确地计算不同投资类别的所需属性。我将讨论创建此类数值类的一些基本原则，以及现代 C++ 库如何帮助你简化生成的代码。\n\
    \n**第五章：设计数值类**"
- fmt: "# At the Heart of High-Performance Financial Applications\n\nAt the heart\
    \ of any high-performance financial application, there is a set of well-designed\
    \ numerical classes. These classes are responsible for the implementation of concepts\
    \ that are an integral part of tasks such as financial modeling, forecasting,\
    \ and analysis of investment decisions. Without the support of mathematical models,\
    \ it would be very difficult to propose and evaluate effective investment methodologies.\
    \ That is why, as a programmer in the financial industry, you need to familiarize\
    \ yourself with the best strategies to design and implement mathematically oriented\
    \ code in C++. Although it is not necessary to become a math expert to use these\
    \ programming techniques, it helps to possess a basic understanding of the most\
    \ important numerical issues that need to be dealt with in your financial programming\
    \ assignments.\n\nThis chapter will show you how to create classes that can run\
    \ efficiently when used in numerically oriented, production-ready code. You will\
    \ also see some sample code that show how to integrate existing numerical classes\
    \ and algorithms into your applications.\n\nSome of the concepts discussed in\
    \ the code examples in this chapter include the following:\n\n* How to design\
    \ and implement an efficient matrix class\n* How to supporting common matrix operations\n\
    * How to perform calculations at compilation time\n* How to calculate factorial\
    \ numbers using templates\n* How to represent ratios as data types\n* How to use\
    \ and generate stochastic values using the boost library\n\n## Representing Matrices\
    \ in C++\n\nImplement a class that represents a matrix with some common associated\
    \ operations, such as addition, subtraction, transposition, and multiplication.\n\
    \n### Solution\n\nMatrix manipulation is one of the basic operations in numerical\
    \ computing. C++ doesn’t have a matrix type, however, and it becomes necessary\
    \ to implement matrices in most financial projects. The good news is that it is\
    \ relatively easy to use algorithms already present in the standard templates\
    \ library (STL) for this purpose, as you will see in the following coding example.\n\
    \nA matrix is just a two-dimensional arrangement of numbers, with which one can\
    \ perform a set of standard mathematical transformations. In terms of data organization\
    \ in memory, a matrix is not very different from a vector. Considering this similarity,\
    \ we can take advantage of existing vector operations to facilitate the implementation\
    \ of a `Matrix` class. Here is a possible definition for such a class.\n\n```cpp\n\
    class Matrix {\npublic:\n    typedef std::vector Row;\n    Matrix(int size, int\
    \ size2);\n    Matrix(int size);\n    Matrix(const Matrix &s);\n    ~Matrix();\n\
    \    Matrix &operator=(const Matrix &s);\n    void transpose();\n    double trace();\n\
    \    void add(const Matrix &s);\n    void subtract(const Matrix &s);\n    void\
    \ multiply(const Matrix &s);\n    Row & operator[](int pos);\nprivate:\n    std::vector\
    \ m_rows;\n};\n```\n\nNotice that, at the beginning of the public interface of\
    \ the class, I used a public `typedef` to define a `Row` type. Since a row is\
    \ just a vector of numbers, I want to avoid typing something as involved as `std::vector<std::vector<\
    \ > >` to talk about simple rows. This is also a good measure that can help you\
    \ avoid mistakes when defining new variables and member functions. As a result\
    \ of this `typedef`, all the data stored in the matrix is declared as a `vector`\
    \ of `Row` objects in the private section of the `Matrix` class.\n\nThe simple\
    \ `Matrix` class just presented has two constructors.\n\n```cpp\nMatrix(int size);\n\
    Matrix(int m, int n);\n```\n\nThe first one creates a square matrix, that is,\
    \ a matrix with the same number of rows and columns. The second constructor is\
    \ used to create a more generic rectangular matrix, with `m` rows and `n` columns.\n\
    \nTo make the matrix operate more like its counterpart, the vector, you can introduce\
    \ a subscript operator to act as an access helper. In this way, it is possible\
    \ to set and retrieve the value of specific entries in the matrix using native\
    \ syntax. The implementation of the operator is straightforward, then, since we\
    \ can refer to each individual row in the matrix.\n\n```cpp\nMatrix::Row &Matrix::operator[](int\
    \ pos)\n{\n    return m_rows[pos];\n}\n```\n\nNext, we consider some elementary\
    \ operations on matrices. The first operation is transposition, which is defined\
    \ as the exchange of elements between rows and columns. That is, if A is a matrix,\
    \ we need to interchange values between `A[i][j]` and `A[j][i]`.\n\nThe second\
    \ common operation on matrices is calculating the trace, which is defined as the\
    \ sum of the elements in the main diagonal (i.e., those elements with the same\
    \ row and column position). This can be implemented as follows:\n\n```cpp\ndouble\
    \ Matrix::trace()\n{\n    if (m_rows.size() != m_rows[0].size())\n    {\n    \
    \    return 0;\n    }\n    double total = 0;\n    for (unsigned i=0; i<m_rows.size();\
    \ ++i)\n    {\n        total += m_rows[i][i];\n    }\n    return total;\n}\n```\n\
    \nThe first `if` statement checks if the matrix has a different number of rows\
    \ and columns, in which case the trace operation is not defined. The `for` statement\
    \ then iterates over the diagonal, adding those values to the `total` variable,\
    \ which is returned at the end of the member function.\n\nThe `Matrix` class also\
    \ implements the operations of adding and subtracting matrices. To add one matrix\
    \ to another, you just need to add the individual elements of the first one to\
    \ the corresponding elements in the second matrix. Similarly, the subtraction\
    \ of matrices is defined element-wise. These operations are straightforward to\
    \ implement in C++.\n\nFinally, you can see how to implement matrix multiplication.\
    \ In this case, you need to compute a new matrix, where each element is determined\
    \ as the sum of the products of the `i`-th row and `j`-th column. The resulting\
    \ matrix has dimensions determined by the number of rows in the current matrix\
    \ and number of columns in the parameter matrix. The main part of the algorithm\
    \ is the following:\n\n```cpp\nstd::vector rows;\nfor (unsigned i=0; i row;\n\
    \    for (unsigned j=0; j<s.m_rows.size(); ++j)\n    {\n        double Mij = 0;\n\
    \        for (unsigned k=0; k<m_rows[0].size(); ++k)\n        {\n            Mij\
    \ += m_rows[i][k] * s.m_rows[k][j];\n        }\n        row.push_back(Mij);\n\
    \    }\n    rows.push_back(row);\n}\nm_rows.swap(rows);\n```\n\nIn this code,\
    \ we have three loops that range over the different dimensions of the original\
    \ and the parameter matrix. The value `Mij` represents the element in position\
    \ `[i][j]` for the resulting matrix. Notice that to simplify storage management,\
    \ the algorithm performs the assignments in a new set of rows. Then, the results\
    \ are stored in place of the existing values in the last line, using the `swap`\
    \ function.\n\nAfter the `Matrix` class has been defined, I have also added a\
    \ few free operators that make it easier to work with the previously defined operations.\
    \ These operators make sure that you can add, subtract, and multiply matrices\
    \ using a syntax similar to that of native operations, although assuming a slight\
    \ overhead for the temporary objects that become necessary. Here, for example,\
    \ is the definition of `operator *`.\n\n```cpp\nMatrix operator*(const Matrix\
    \ &s1, const Matrix &s2)\n{\n    Matrix s(s1);\n    s.multiply(s2);\n    return\
    \ s;\n}\n```\n\n## Complete Code\n\nThe ideas just described have been implemented\
    \ in the `Matrix` class, presented here in Listing [5-1](#323908_2_En_5_Chapter.xhtml#PC7).\
    \ This is a class that I will use in other examples in the next chapters of this\
    \ book, so you should be familiar with its definition and main uses."
