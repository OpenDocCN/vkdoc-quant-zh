    \ ∈ {0,1}`，对于`j` ∈ `{1,...,n}`。  \n\n由于前面描述的问题具有线性目标函数和线性约束，它是一个线性优化问题。然而，最后一个约束使得该问题成为一个0-1整数线性规划问题，这比标准线性规划问题要难解决得多。\n\
