- fmt: '### More About STL Vectors and Maps


    The STL is a repository of standard data structures and algorithms that are useful
    in most programming domains. For financial applications in particular, the use
    of the STL is extremely important because STL components are optimized for high
    speed. For example, STL components such as vectors are currently the preferred
    way to write applications in C++, instead of using raw C++ arrays and similar
    data-container classes. Compiler vendors have done a great job of making STL components
    fast and safe to use in a wide range of applications, so that programmers don’t
    need to worry about intricate issues such as memory allocation, exception handling,
    and algorithm complexity.


    STL vectors are versatile because they can grow dynamically. Therefore, they work
    in situations where you don’t have a clear idea of how many elements will be stored
    in the underlying data structure (and as long as you don’t care about the overhead
    of vector resizing). For example, if you’re reading trading data over a given
    time period, you typically don’t know how many trades occurred during that particular
    time frame. In this situation, it is easier to use a vector that can be initialized
    with a small number of elements and then grow as needed, instead of using an array
    with a predefined (and fixed) size. By using the STL vector in this way, you don’t
    need to worry about memory allocation and exception safety of the container.


    The vector template exposes an interface with operations that can be applied to
    a set of elements, such as adding, removing, finding, and comparing. These common
    operations can be used across concrete implementations, without any manual changes
    required. For example, vectors declared as `std::vector<int>` can use the `push_back`
    member function to add `int` elements to the end of the vector. Similarly, a second
    vector declared as `std::vector<std::string>` can also add `std::string` elements
    using the same template-based member function.


    The following is a quick list of the most regularly used member functions in the
    `std::vector` template:


    *   `template <class T> vector(const T &c, int n)`: Constructor used to create
    a new vector initialized with `n` copies of the constant element `c`.


    *   `template <class T> vector(const vector<T> &v)`: Constructor used to create
    a new vector initialized with a copy of an existing vector object `v`.


    *   `template <class T> T &operator [] (int pos)`: This operator makes the `std::vector`
    object behave as a native array. You can use the notation `v[i]` to access or
    update the value of an element stored at position `i` of vector `v`.


    *   `template <class T> void push_back(const T &c)`: Used to add a new element
    to the back of a vector, allocating additional memory if necessary. This is the
    most commonly used way to add new elements to a vector, since it takes care of
    adding memory to store the new element when necessary, unlike the `operator []`,
    which will crash the application when an undefined position is accessed.


    *   `template <class T> void pop_back()`: This member function performs the inverse
    of the `push_back` operation, removing the element stored in the last position
    of the vector. However, the memory allocated for that element is not immediately
    reclaimed, and it may be used by later operations.


    *   `template <class T> size_t size()`: This member function returns the number
    of elements currently stored in the `std::vector`. Notice that this may be less
    than the total memory currently used by the vector, since it is possible for the
    vector to allocate more memory than it currently needs, depending on the number
    of elements previously added or reserved.


    In our problem, we use vectors to store recommendations for a particular stock.
    Each stock covered by this class will have a vector of recommendations. Each recommendation
    is just an object of the `Recommendation` class, which stores recommendations
    defined in the following way:


    ```

    enum class RecommendationType {

    BUY,

    SELL,

    HOLD,

    NO_RECOMMENDATION

    };

    ```


    The `Recommendation` class is defined as


    ```

    class Recommendation {

    public:

    Recommendation();

    Recommendation(const std::string &ticker, RecommendationType rec, double target);

    ~Recommendation();

    Recommendatioperatoron(const Recommendation &r);

    Recommendation & =(const Recommendation &r);

    double getTarget() const;

    RecommendationType getRecommendation() const;

    std::string getTicker() const;

    // private members

    };

    ```


    This simple `Recommendation` class stores the ticker for stock, as well as its
    recommendation type and price target. Notice that objects that are stored in a
    `std::vector` need to be from classes that can be copied or moved, since elements
    in a `std::vector` are stored by value. This means that a copy is created whenever
    there is the need to move the object to a certain position, unless the class has
    a movable constructor.


    Using `std::vector` we can keep track of the individual recommendation for a stock.
    However, there are several stocks in the universe of equities that we would like
    to track. To find the right recommendations, we assign a way to retrieve objects
    based on the stock ticker. This is performed using a `std::map` template. Using
    a map will also simplify the code necessary to implement other useful operations,
    such as adding new recommendations or calculating the average recommendation.


    The `std::map` template provides a way to associate an arbitrary key to a data
    object, so that you can easily retrieve the original data. The best thing about
    maps is that the key can be of any kind of object offering a comparison operation,
    such as the less than (`<`) operator. In our case, for example, you can use a
    string that indicates the unique ticker for each particular stock. Based on the
    ticker, you can retrieve the vector that contains the recommendations for that
    particular stock.


    Here is a short list of important operations defined for `std::map`:


    *   `template <class K, class T> iterator<T> find(const K&)`: Returns an iterator
    to the data object that is associated to the given key. If the key has no association,
    the function returns the `end()` iterator.


    *   `template <class K, class T> T &operator[](const K&)`: Associates a key with
    a particular data object. You can use this operator to retrieve elements from
    the map container as well as insert new elements.


    *   `template <class K, class T> size_t erase(const K&)`: Erases the data associated
    with the given key.


    The `std::map` template is used in this code example to store and retrieve recommendations
    that were issued for a particular stock. The `RecommendationProcessor` is the
    class responsible for storing, processing, and answering queries related to stock
    recommendations. The general algorithm used by `RecommendationProcessor` consists
    of storing new recommendations in an internal data structure. Then, at any future
    moment, you can query the stored data using the `averageTargetPrice` member function.


    The first member function in this class, `addRecommendation`, is responsible for
    storing new recommendations to the `m_recommendations` member variable.


    ```

    void RecommendationsProcessor::addRecommendation(const std::string &ticker,

    RecommendationType rec, double targetPrice)

    {

    Recommendation r(ticker, rec, targetPrice);

    m_recommendations[ticker].push_back(r);

    }

    ```


    Here, you first need to create a new recommendation object based on the information
    passed, such as ticker, type of recommendation, and target price. Then, we use
    the `m_recommendations` map to access the vector of recommendations. Finally,
    we use the `push_back` method to add the new recommendation to the list of recommendations
    for that particular stock.


    Another interesting member function is the one that calculates the average target
    price. It looks at all recommendations to calculate an average target.'
