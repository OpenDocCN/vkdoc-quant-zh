- fmt: '### Market Participants


    The equities market is composed of many participants. They have different goals
    and interests; however, they work continuously to maintain market prices while
    trying to profit from them.


    Large institutions form a sizable portion of the equities market landscape. These
    big, sell-side investment institutions (such as investment banks and exchanges)
    are viewed as the backbone of the market. Therefore, they are also commonly referred
    to as market makers. These large companies are buying and selling great volumes
    of equity investment vehicles (such as stocks) daily, with the goal of having
    small profits in each operation. More recently, high-frequency trading was added
    to this picture, resulting in increased volume and speed in market transactions.


    The following is a quick list of the most common players in the equities market:


    - **Mutual funds**: These funds receive investments from retail investors and
    institutions and make investments in areas of the market that they believe will
    have larger than usual investment returns. Mutual funds are mostly limited to
    buying stocks and ETFs, so their performance is limited when the market is in
    a downtrend.


    - **Hedge funds**: Hedge funds use more advanced techniques, such as shorting
    stocks and buying options and futures on risky investments not available to common
    investors, so they are limited to wealthier investors and some kinds of institutions
    that can cope with the increased risk.


    - **Investment banks**: These institutions are actively working on the market
    composition. For example, they act in bringing to the market new issues (also
    known as IPOs) that will be traded by other investors. They are also allowed to
    trade for themselves and other large clients.


    - **High-frequency trading funds**: These funds use high-performance computational
    techniques to provide instant liquidity to the markets while making small profits
    in a large number of transactions.


    - **Brokerage companies**: These companies work directly with individual investors
    providing the ability to buy or sell stocks, ETFs, mutual funds, and options for
    a small or even no commission per transaction. Their services are made available
    through the Internet on several platforms such as desktops, web browsers, and
    mobile devices.


    - **Pension funds**: These are institutions that hold large pools of investment
    money derived from retirement funds. They are geared toward long-term investments
    that will support the desired growth of the fund for an extended time period.


    - **Retail investors**: These are individuals who control a brokerage account
    and do their own research and make their own decisions on what to buy and sell
    in the market.


    As you can see, there is a great deal of competition for profits in the equities
    market. Most large institutions spend a lot of money on research that can give
    them an edge on the future moves of the market. This type of analytical approach
    depends on accurate information and instant access to trading data, which is possible
    only with the computational power provided by computer software, most of it written
    in languages such as C++.


    In the next few sections, I provide C++ examples for common problems found in
    the analysis of equity investments. You will learn about tools and concepts that
    can be used in a large number of situations in which equity investments are involved.


    ## Moving Average Calculation


    ### Problem


    Given a particular equity investment, determine the simple moving average and
    the exponential moving average for a sequence of closing prices.


    ### Solution


    One of the most common strategies to analyze equity instruments such as stocks
    and ETFs is to use supply/demand methods that consider price and volume as the
    important variables to observe. Traders who use price/volume-based strategies
    call this set of methods technical analysis (TA). With TA, traders look at special
    price points that have been defined by previous price movements, such as support,
    resistance, trend lines, and moving averages, with the objective of identifying
    pricing regions with a higher probability of profit.


    For example, support and resistance values are typically used to determine price
    areas that are considered to be of importance for a given instrument. If a stock
    reaches a certain price when moving up and reverses course, the high price point
    is considered to be a resistance price. In the future, when the price again reaches
    the same area, traders will tend to sell around in the same region, creating an
    even stronger resistance point. Similarly, support prices are formed when traders
    buy the same stock or ETF in a well-known region.


    A similar type of pattern occurs with moving averages. Buyers and sellers tend
    to look at moving averages to determine if a particular stock is on a low-risk
    buy or sell point. These psychological price points are self-reinforcing and play
    an important role in the dynamics of equity trading. Figure [2-1](#323908_2_En_2_Chapter.xhtml#Fig1)
    shows an example of a moving average used in the analysis of common stock for
    Apple.


    ![../images/323908_2_En_2_Chapter/323908_2_En_2_Fig1_HTML.jpg](images/323908_2_En_2_Chapter/323908_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Simple moving average for daily prices of Apple (AAPL), with parameter 50


    The moving average can be calculated using a simple average formula that is repeated
    for each new period. Given prices `p1`, `p2`, ..., `pN`, the general formula for
    a particular time period is given by


    ```

    MA = (1/N) (p1 + p2 + ... + pN)

    ```


    You can easily perform this calculation if you maintain and update the sequence
    of prices as new values are added to the sequence.


    To calculate the moving average in C++, we first create a new class that stores
    a sequence of prices using a STL (standard templates library) vector object. The
    object is responsible for adding new values to the sequence, using the `addPriceQuote`
    member function. The implementation of this member function is simple because
    it relies on the functionality provided by `std::vector` to maintain a sequence
    of numbers, as well as the storage requirements.


    ```

    void MACalculator::addPriceQuote(double close)

    {

    m_prices.push_back(close);

    }

    ```


    The number of periods for moving average calculation is determined by the parameter
    to the constructor of the `MACalculator` class. For example, to compute a moving
    average for 20 time periods (normally the equivalent to 4 trading weeks when the
    period is a single trading day), you can create an object of the `MACalculator`
    class in the following way:


    ```

    MACalculator calculator(20); // will compute the moving average for 20 periods.

    ```


    The calculation of the simple moving average is performed by the `calculateMA`
    member function of the `MACalculator` class. The main idea of this function is
    to iterate through the sequence of prices stored in the `MACalculator` class,
    as shown in the following code:


    ```

    std::vector MACalculator::calculateMA()

    {

    std::vector ma;

    double sum = 0;

    for (int i=0; i= m_numPeriods)

    {

    ma.push_back(sum / m_numPeriods);

    sum -= m_prices[i-m_numPeriods];

    }

    }

    return ma;

    }

    ```


    To calculate a moving average, it is necessary to have at least the number of
    observations determined by the number of periods (let N be the number of periods).
    Therefore, the first N elements of the vector of prices don’t generate a corresponding
    moving average. These initial elements are simply added to the `sum` local variable,
    so their values are used later.'
