    \n```bash\n./bisectionMethod\nroot is 0\nroot is 50\nroot is 25\nroot is 12.5\n\
    root is 6.25\nroot is 3.125\nroot is 1.5625\nroot is 0.78125\nroot is 1.17188\n\
    root is 0.976562\nroot is 1.07422\nroot is 1.02539\nroot is 1.00098\nroot is 0.98877\n\
    root is 0.994873\nroot is 0.997925\nroot is 0.999451\nroot is 1.00021\nthe root\
    \ of the function is 1.00021\n```\n\n这是在函数 *f*(*x*) = (*x*–1)³ 上执行二分法的结果，从区间 -100\
    \ 到 100 开始。为了清晰起见，我展示了中间步骤。\n\n## 割线法\n\n创建一个使用割线法求解方程的类。\n\n### 解决方案\n\n在前一个编程示例中，您学习了用于求解方程的二分法。您可以通过将定义域分解为一组区间来找到方程的根，每个区间都可以测试符号变化。如果函数在区间端点处的符号不同，则有可能找到该函数从正变为负的点，从而得到方程的根。\n\
    \n虽然二分法可以求解大量方程，但它并非此目的的最快方法。原因之一在于它除了区间端点处的符号之外，没有使用函数的任何其他性质。另一方面，如果使用关于函数值的额外信息，例如，至少原则上可以更快地收敛到函数的根。\n\
    \n利用函数值的一种方法包含在称为割线法的算法中。割线法的总思想是利用每个区间端点处的函数值来近似估计距离方程真正根有多近。通过这种方式，可以更接近根，并减少找到所需解所需的迭代次数。\n\
    \n函数的割线是连接由该函数定义的两点的直线。例如，给定函数 *f*(*x*) = *x*² 在区间 1 到 4 上，该函数在给定区间上的割线是连接点 (1,1)\
    \ 和 (4,16) 的线段，因为这两个点是由该函数定义的。我们可以将此概念推广到在任何特定区间上连续的任何函数。\n\n割线法使用从函数的割线推导出的信息来定义要探索的新区间。为此，该方法计算割线与\
    \ x 轴的交点，并使用该点来定义新区间。只要区间起点和终点处的符号不同，这是可能的，因为在这种情况下，割线将与 x 轴相交。正如您可能从上一节中记得的，这与二分法使用的准则类似，区别在于二分法使用中点，而不是基于函数割线的点。\n\
    \n作为在实践中如何工作的示例，考虑与“二分法”一节中相同的函数：*f*(*x*) = (*x*–1)³，在区间 -1 到 2 上。在这种情况下，我们可以计算\
    \ *f*(–1) = –8 和 *f*(2) = 1 的值，它们的符号不同。基于该信息，我们可以使用该区间上函数的割线来找到与 x 轴的交点。因此，我们要使用的线段连接点\
    \ (–1,–8) 和 (2,1)。\n\n通过一点代数，您会发现这条直线的斜率为\n\n![$$ \\frac{y_1-{y}_0}{x_1-{x}_0}=\\\
    frac{1-\\left(-8\\right)}{2-\\left(-1\\right)}=\\frac{9}{3}=3 $$](img/323908_2_En_9_Chapter_TeX_Equa.png)\n\
    \n并且，由于已知点 (*x*₁, *y*₁) = (2,1) 在直线上，因此割线由下式给出：*h* (*x*) = *y*₁ + 3 (*x* – *x*₁)\
    \ = 1 + 3 (*x* – 2)\n\n现在，可以使用此方程以及 *h*(*x*) = 0 在交点处的事实来计算与 x 轴的交点（见图 9-2）：\n\
    \n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig2_HTML.jpg](img/323908_2_En_9_Fig2_HTML.jpg)\n\
    \n**图 9-2** 原始函数 (x–1)³ 及其在区间 -1 到 2 上的割线\n"
- fmt: "`0=1+3*x*–6=–5+3*x*`  \nThis means that ![$$ x=\\frac{5}{3} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_IEq9.png)\
    \ is the intersection point between the secant and the x-axis. You can easily\
    \ see, as shown in Figure [9-2](#323908_2_En_9_Chapter.xhtml#Fig2), that the intersection\
    \ of the secant with the x-axis is a point (let’s call it *x*[2]) that is one\
    \ step closer to the root of the equation. This process can be repeated with the\
    \ new interval defined by *x*[0] and *x*[2], until the root of the equation is\
    \ approximated within a small error (which can be predefined by the algorithm).\n\
    \nGeneralizing the `h(x)=` equation shown just a bit earlier, the equation for\
    \ the secant can be denoted as  \n\n![$$ h(x)={y}_1+\\frac{y_1-{y}_0}{x_1-{x}_0}\\\
    left(x-{x}_1\\right). $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equb.png)\n\
    \nWhen this equation intercepts with the line `y=0`, we have  \n\n![$$ {y}_1+\\\
    frac{y_1-{y}_0}{x_1-{x}_0}\\left(x-{x}_1\\right)=0, $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equc.png)\
    \  \n\nwhich yields the result  \n\n![$$ x={x}_1-\\frac{y_1\\left({x}_1-{x}_0\\\
    right)}{y_1-{y}_0} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equd.png)\n\
    \nWith this equation, we can calculate the new point *x* that will be used at\
    \ the next step of the algorithm. Summarizing the steps described, the secant\
    \ method for finding roots of equations can be described in the following way:\n\
    \n1. Define an initial range `(a,b)` where you want to search for one or more\
    \ roots of the equation.  \n2. Calculate the values of *f*(*a*) and *f*(*b*).\
    \  \n3. Determine the secant line using the equation  \n\n   ![$$ h(x)=f(b)+\\\
    frac{f(b)-f(a)}{b-a}\\left(x-b\\right) $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Eque.png)\
    \  \n\n4. Using this equation, find the intersection point  \n\n   ![$$ c=b-\\\
    frac{f(b)\\left(b-a\\right)}{f(b)-f(a)} $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equf.png)\
    \  \n\n5. If the difference |*c* – *b*| has length less than the error (threshold)\
    \ *E*, stop and report *c* as the solution. Otherwise, continue with step 1.\n\
    \nIt has been observed that for some functions, this algorithm converges to a\
    \ solution more quickly than the bisection algorithm. This happens because the\
    \ secant uses information that is already available with the function, which happens\
    \ to make the intermediate point closer to the real solution. You can find an\
    \ implementation of the algorithm discussed in the `SecantSolver` class. The design\
    \ of this class is similar to `BisectionSolver`, since the problem discussed is\
    \ the same. The main change is the use of a different middle point selection procedure,\
    \ which makes this algorithm a little different from that presented in `BisectionSolver`.\n\
    \n## Complete Code\n\n```\n// SecantMethod.h\n//\n#ifndef SECANTMETHOD_H_\n#define\
    \ SECANTMETHOD_H_\ntemplate \nclass MathFunction;\nclass SecantMethod {\npublic:\n\
    SecantMethod(MathFunction &f);\nSecantMethod(const SecantMethod &p);\nSecantMethod\
    \ &operator=(const SecantMethod &p);\n~SecantMethod();\ndouble getRoot(double\
    \ x1, double x2);\nprivate:\nMathFunction &m_f;\ndouble m_error;\n};\n#endif /*\
    \ SECANTMETHOD_H_ */\n// SecantMethod.cpp\n//\n#include \"SecantMethod.h\"\n#include\
    \ \"MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\nnamespace\
    \ {\nconst double DEFAULT_ERROR = 0.001;\n}\nSecantMethod::SecantMethod(MathFunction\
