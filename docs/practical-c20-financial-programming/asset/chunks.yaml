  trans: "\n该程序展示了 `sin(x)` 在区间 1/2 到 5/2 上的积分值。该近似值给出了两种不同子区间数设置下的结果。第一个结果是 100 个子区间的结果。第二个结果展示了子区间数量加倍后达到的近似值。与之前的示例一样，可以通过增加子区间数量来控制近似质量。此外，如果你希望更快获得结果，也可以减少该数量。\n\
    \n## 使用辛普森方法\n\n实现用于定积分计算的辛普森方法。\n\n## 解决方案\n\n你已经看到了两种计算给定连续函数定积分值的常用方法。第三种方法，即辛普森方法，将在本编程示例中介绍。与任何数值积分技术一样，其总体思路是创建一个近似于目标函数的第二个函数，并将其应用于原始定义域的多个子区间，直到获得良好的近似值。\n\
    \n与前两种使用线性逼近给定函数的方法不同，辛普森方法采用二阶多项式来实现更好的收敛性。通过这种方式，辛普森方法提出的近似值不依赖线性函数来获得期望结果，而是更好地适应原始曲线的行为。\n\
    \n辛普森方法的工作原理可以通过一个示例轻松理解。假设你想要对上一节中使用的函数 `f(x) = sin x` 进行积分。作为一个三角函数，它没有简单的有限多项式表示。然而，如果你将搜索范围限制在函数的一小部分，就可以找到非常好的近似表示。\n\
    \n例如，我在图 10-6 中展示了如何使用二阶多项式函数来近似 `sin x` 在区间 1/2 到 5/2 上的值。请注意，这两条曲线仅在给定区间内的较小范围内具有足够的相似性，而在该区间之外，这两个函数的变化差异很大。\n\
    \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig6_HTML.jpg](img/323908_2_En_10_Fig6_HTML.jpg)\n\
    \n**图 10-6** 使用二阶多项式近似区间 1/2 到 5/2 上的 `f(x)=sin x` 值\n\n同样的思想也用于辛普森方法。由于二次逼近可能与目标函数非常接近，因此使用二次函数可以显著提高以此方式计算出的定积分值。事实上，实验表明，辛普森方法比中点法和梯形法等算法具有更好的精度。\n\
    \n**注意**\n\n辛普森方法更高的精度可以减少计算定积分所需的子区间数量。然而，由于需要使用二次逼近而非简单的线性函数，每次迭代的计算量会更大。最终，虽然辛普森方法对大多数函数都能产生更优的结果，但用户需要意识到每次迭代的计算时间可能存在权衡。\n\
    \n辛普森方法中使用的二阶多项式由以下方程定义，可直接用于实现所提规则：\n\n![$$ \\frac{b-a}{6}\\left[f(a)+4f\\left(\\\
    frac{a+b}{2}\\right)+f(b)\\right] $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_Equa.png)\n\
    \n因此，可以将通用算法总结如下：\n\n1.  定义一个范围 `(A, B)`，用于计算该方程的积分。\n2.  将初始范围细分为 `N` 个等长子区间。\n\
    3.  将积分值 `S` 初始化为零。\n4.  对于每个子区间 `(a, b)`，执行以下操作：\n    1.  获取 `a` 和 `b` 的值。\n\
    \    2.  根据以下方程确定区间 `(a, b)` 上的积分近似值：\n\n        ![$$ m\\left(a,b\\right)=\\frac{b-a}{6}\\\
    left[f(a)+4f\\left(\\frac{a+b}{2}\\right)+f(b)\\right] $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq15.png)\n\
    \n    3.  将 `m(a, b)` 累加到积分值中。\n\n该算法已作为 `SimpsonsIntegration` 类的一部分实现。\n\n##\
    \ 完整代码\n\n你可以在代码清单 10-3 中找到辛普森方法的完整实现。其中提供的实现在后续的 `main` 函数中使用。\n\n```\n//\n//\
    \  SimpsonsIntegration.h\n#ifndef __FinancialSamples__SimpsonsIntegration__\n\
    #define __FinancialSamples__SimpsonsIntegration__\ntemplate \nclass MathFunction;\n\
    class SimpsonsIntegration {\npublic:\nSimpsonsIntegration(MathFunction &f);\n\
    SimpsonsIntegration(const SimpsonsIntegration &p);\n~SimpsonsIntegration();\n\
    SimpsonsIntegration &operator=(const SimpsonsIntegration &p);\ndouble getIntegral(double\
    \ a, double b);\nvoid setNumIntervals(int n);\nprivate:\nMathFunction &m_f;\n\
    int m_numIntervals;\n};\n#endif /* defined(__FinancialSamples__SimpsonsIntegration__)\
    \ */\n//\n//  SimpsonsIntegration.cpp\n#include \"SimpsonsIntegration.h\"\n#include\
    \ \"MathFunction.h\"\n#include \n#include \nusing std::cout;\nusing std::endl;\n\
    namespace  {\nconst int DEFAULT_NUM_INTERVALS = 100;\n}\nSimpsonsIntegration::SimpsonsIntegration(MathFunction\
    \ &f)\n: m_f(f),\nm_numIntervals(DEFAULT_NUM_INTERVALS)\n{\n}\nSimpsonsIntegration::SimpsonsIntegration(const\
    \ SimpsonsIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n{\n\
    }\nSimpsonsIntegration::~SimpsonsIntegration()\n{\n}\nSimpsonsIntegration &SimpsonsIntegration::operator=(const\
    \ SimpsonsIntegration &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_numIntervals\
    \ = p.m_numIntervals;\n}\nreturn *this;\n}\ndouble SimpsonsIntegration::getIntegral(double\
    \ a, double b)\n{\ndouble S = 0;\ndouble intSize = (b - a)/m_numIntervals;\ndouble\
    \ x = a;\nfor (int i=0; i\n{\npublic:\n~F2();\ndouble operator()(double x);\n\
    };\nF2::~F2()\n{\n}\ndouble F2::operator()(double x)\n{\nreturn sin(x);\n}\n}\n\
    int main()\n{\nF2 f;\nSimpsonsIntegration si(f);\ndouble integral = si.getIntegral(0.5,\
    \ 2.5);\ncout << \" the integral of the function is \" << integral << endl;\n\
    si.setNumIntervals(200);\nintegral = si.getIntegral(0.5, 2.5);\ncout << \" the\
    \ integral of the function with 200 intervals is \" << integral << endl;\nreturn\
    \ 0;\n}\n```\n\n**代码清单 10-3** 辛普森积分方法的代码\n\n## 运行代码\n\n代码清单 10-3 中的代码使用函数 `f(x)\
    \ = sin x` 进行了测试。使用的编译器是 Mac OS X 和 Windows 上的 gcc。该程序在两个平台上进行了测试，生成了相同的结果。\n\n\
    编译 `SimpsonsIntegration` 类后，你可以运行应用程序并观察到类似如下的输出：\n\n```\n./simpsonsIntegration\n\
    the integral of the function is 1.67873\nthe integral of the function with 200\
    \ intervals is 1.67873\n```\n\n从这些结果中可以看出，100 个区间解的精度与 200 个区间的精度相似。这表明，对于该技术，100\
    \ 个分区已足以获得非常好的结果。\n"
- fmt: '# Conclusion


    Integrating functions is one of the basic tasks in computational mathematics,
    due to the great importance of integration (also known as antiderivative) as a
    fundamental area of calculus. In the development of financial algorithms, there
    are also many situations where it is necessary to find quick solutions to problems
    that involve the evaluation of definite integrals.


    In this chapter, you have learned a few C++ programming examples that explore
    some of the most common techniques for numerical integration. You have seen how
    integration methods such as the trapezoid and Simpson’s rule can be applied to
    the task of finding the area under the curve for some preestablished functions.


    The trapezoid method is the second important algorithm used to evaluate definite
    integrals. Given a general function, this method uses the function value at the
    extremes of the interval in order to define a trapezoid-based geometric approximation.
    You have seen some examples of how this strategy works, along with working code
    to implement the rule.


    I have also discussed the well-known Simpson’s method for definite integration.
    Here, the approximation to the curve is performed using a quadratic equation.
    You saw an example of how to use polynomial equations to achieve the desired accuracy.
    Using Simpson’s method, you can perform integration with very good approximations,
    despite the fact that fewer subintervals may be necessary to read this accuracy.


    Partial differential equations (PDEs) are another important mathematical tool
    for the financial software developer. It is important to understand how they work,
    as well as having tools to find solutions based on PDEs. In the next chapter,
    I discuss some important PDE-related techniques and their implementation in C++.


    ## 11. Solving ODEs and PDEs


    The solution of ODEs (ordinary differential equations) and PDEs (partial differential
    equations) is at the heart of many techniques used in the analysis of financial
    markets. Important analytical tools for derivative valuation such as the Black-Scholes
    model for stock options and other derivatives can be directly represented as differential
    equations. Such equations need to be regularly solved in order to determine the
    price of financial instruments traded in the global markets. This creates the
    need for high-performance code, capable of finding efficient solutions to these
    mathematical models.


    Due to the large number of applications of ODEs and PDEs in science, engineering,
    and finance, several methods to solve them have been developed. In addition to
    the exact mathematical methods, capable of analyzing and finding the solution
    to differential equations, a software engineer also has to deal with purely computational
    approaches, as well as their implementation in C++.


    Examples of differential equations of interest in finance include:


    * Thiele’s differential equation: Used to determine fair prices for life insurance
    contracts

    * Black-Scholes differential equation: Used to price options and related derivatives

    * Market reserve differential equation

    * Dynamic variations of portfolio optimization

    * Merton’s equations for utility optimization

    * Along with several variations of these differential equations


    Since the application of differential equations to financial problems is such
    a large area, in this chapter I am able to present only an overview of the methods
    most frequently used for their solution.


    The programming examples discussed in this chapter cover a few particular aspects
    of ODE and PDE modeling and applications. Topics that you will explore include
    the following:


    * Euler’s method for ODEs: An algorithm that is simple to implement and can be
    applied directly to any first-order ODE.

    * Runge-Kutta method: An improvement over the general ideas of Euler’s algorithm,
    the Runge-Kutta method provides better stability and accuracy for the solution
    to ODEs.

    * Black-Scholes equation: A general discussion of the Black-Scholes PDE and an
    overview of the forward method to solve this model.


    ### Solving Ordinary Differential Equations


    In this section, we will create a class to solve ODEs using Euler’s method.


    #### Solution


    I start the discussion of differential equations with some methods for the numerical
    solution to ordinary differential equations. Before I can start with a first example,
    however, let’s remember some of the relevant facts about ODEs.


    An ordinary differential equation is an equation that includes the rate of change
    (derivative) with respect to a single variable in one or more of its terms. Given
    a differential equation, its *order* is defined as the maximum order of any of
    the derivatives included in the equation. The following are a few examples of
    ODEs:


    `x^3 * d^2y/dx^2 + x * dy/dx + y = x^5`


    `x * dy/dx + 4x^2 = y`


    Both equations involve the derivative of the variable *y* with respect to *x*.
    In the first equation, the derivative is applied twice, resulting in the term
    `d^2y/dx^2`, which means that it is a second-order ODE. The second equation contains
    only a first-order derivative with respect to *x*, making it a first-order ODE.


    Standard equations (the ones that don’t involve derivatives) usually have solutions
    that can be expressed as a single number. ODEs, however, include derivatives,
    and therefore their solutions are better described as being one or more functions,
    which together satisfy the conditions implied by the derivatives. For example,
    the following well-known differential equation describes Newton’s law of gravity:


    `m * d^2x/dt^2 = -mg`'
