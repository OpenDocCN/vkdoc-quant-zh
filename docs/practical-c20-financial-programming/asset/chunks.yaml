- fmt: '# 结论


    在本章中，你看到了几个处理方程求根的示例。这是一个在金融工程中经常用到的主题。交易算法和投资分析算法经常需要求解方程，这使得寻找高效的方程求根技术成为必要。


    在本章中，我介绍了一些用于求解金融中常见方程的最常用技术。然而，还存在更专门的算法，你可以以数值方法文献为起点，去探索最新的方法。


    本章中的编程示例首先展示了如何使用二分法计算方程的根解。使用二分算法，定义域的目标范围被均匀分割，每一步都会以更高的精度逼近根的可能位置。根据范围两端点处函数的符号，可以检测该范围内是否包含方程的根。在该过程结束时，可以以很小的误差范围确定方程变为零的位置。


    接下来，你看到了一个使用割线法求解方程的编程示例。该方法基于在所考虑的区间内使用函数的割线。当割线与 x 轴相交时，新点通常更接近方程的根。通过多次迭代这个过程，可以在比二分法更短的时间内找到所需的解。


    你还学习了最流行的方程求根方法，即牛顿法。使用该算法，可以通过函数在某一点的切线来找到解。由于函数的导数给出了函数在每个点的斜率，因此可以使用导数来找到合理的近似值。随着算法在连续点上的迭代，近似值会变得越来越好。与其他方法一样，当达到预设的最大误差时，算法通常会停止。


    在下一章中，我将讨论另一个在金融算法中被广泛使用的重要计算工具：数值积分。利用数值积分算法，可以以高精度解决多个困难问题。你还将看到如何使用`C++`实现这些技术。


    # 10. 数值积分


    对函数进行积分是许多金融算法中的一个常见步骤。例如，一些涉及微分方程使用的金融技术依赖于复杂积分的计算。这些领域包括衍生品定价、保险和相关算法。


    然而，在使用这些方法时，你可能会遇到没有已知解析解而需要进行数值积分的积分。即使一个方程可以解析积分，使用数值算法执行此任务也可能更高效。为此，本章探讨了一些执行数值积分的常用方法。读完本章及后续章节后，你将更好地理解这些数值积分算法在实践中是如何工作的，以及如何在自己的项目中使用它们。


    我们将讨论可以立即应用于一些常见积分方法的编程示例。我们还讨论了这些数值方法在使用`C++`语言实现时的性能以及精度。本章中的编程示例涵盖以下主题：


    - **中点法**：一种简单的积分方法，基于每个积分区间的中点使用易于计算的近似值。

    - **梯形法**：一种更精确的数值积分方法，使用梯形近似来逼近积分面积。

    - **辛普森法**：一种流行的数值积分技术，辛普森法提供比前两种方法稍好的近似值。

    - **这些解法的图形示例**：我们通过图形解释这些方法的工作原理，以及实现它们所需的代码。


    ## 中点法


    在本节中，我们将创建一个`C++`类，使用中点法对函数进行积分。


    ### 解法


    简而言之，对函数进行积分意味着，在单维情况下，找到由函数和 x 轴所围成曲线的面积。虽然概念很简单，但有大量文献涉及这个问题的实际重要性。最重要的结果，也称为微积分基本定理，即积分是导数的逆函数。换句话说，对函数的积分求导将得到原函数。你也可以对函数的导数进行积分以得到原函数（相差一个常数）。


    通过代数方法找到函数的积分高度依赖于前述定义。这意味着你需要知道另一个函数，该函数的导数正是你想要积分的函数。在这种情况下，根据微积分基本定理，该另一个函数就是积分。问题在于，并非总能使用这些方法找到反导数。这导致了需要使用计算方法来确定积分。


    有多种方法可用于对函数进行积分，但它们都包含将目标函数的面积划分为许多子区域并对它们进行累加的策略。数值积分的好处在于，如前所述，大多数划分面积的方案都是收敛的。这意味着对于大多数函数，都可以使用我们讨论的任何一种方法得到解。这些方法的不同之处在于计算量，以及可能对于特定函数或应用有更好的收敛性。


    我们从一种通常称为中点法的算法开始讨论。这种方法之所以得名，是因为它使用中点近似来逼近目标面积。考虑函数`f(x) = x² + 1`，并尝试计算该函数在
    1 到 5 区间内的积分。你可以在图 [10-1] 中看到该函数的图像。


    ![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig1_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig1_HTML.jpg)


    **图 10-1** 函数`f(x)=x²+1`在 1 到 5 区间内的图像


    当然，使用符号技术解决这个问题很容易，因为有一种众所周知的方法来确定多项式函数的积分。但是，请考虑如何仅使用计算策略来解决这个问题。


    该算法的目标是开发一种近似方法，以便你能在预设的误差阈值内确定所考虑的积分。第一步是设计一个函数，能够在给定区间内近似给定的函数。事实证明，我们可以尝试的最简单的函数是常数函数`f(x)
    = c`。假设我们使用常数函数来近似 1 到 5 区间内的积分。我们可以取该区间内`f(x)`的平均值作为常数的值，该平均值由端点确定。


    该常数值为`f((1+5)/2) = f(3) = 10`。请在图[10-2]中检查这个常数函数与原始函数的对比情况。


    ![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig2_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig2_HTML.jpg)'
  raw: "Conclusion\nIn this chapter, you have seen a few examples that deal with the\n\
    search for roots of equations. This is a topic that is frequently useful\nin the\
    \ solutions of equations appearing in financial engineering.\nAlgorithms for trading\
    \ and for investment analysis frequently require\nthe solution of equations, which\
    \ makes it necessary to find efficient\ntechniques for the determination of equation\
    \ roots.\nIn this chapter, I presented some of the most common techniques for\n\
    the solution of equations that appear in finance. More specialized\nalgorithms\
    \ exist, however, and you can use the numerical methods\nliterature as a starting\
    \ point to explore the most recent methods.\nThe programming samples in this chapter\
    \ show, initially, how to\ncompute the root solution for equations using the bisection\
    \ method. With\nthe bisection algorithm, the desired range of the domain is divided\n\
    evenly, and at each step, possible location of the root is approximated\nwith\
    \ higher accuracy. Due to the sign of the function in each end point\nof the range,\
    \ it is possible to detect if a root of the equation is\ncontained in that range.\
    \ At the end of the procedure, one can determine\nwithin a small margin of error\
    \ the location where the equation becomes\nzero.\nNext, you have seen a programming\
    \ sample for the secant method to\nsolve equations. The method is based on the\
    \ use of the secant line to\nthe function in the interval that is being considered.\
    \ When the secant\nintersects the x-axis, the new point is usually closer to the\
    \ root of\nthe equation. Performing several iterations of this procedure, it is\n\
    possible to find the desired solution in less time than needed by the\nbisection\
    \ method.\nYou have also learned about the most popular method for the\ndetermination\
    \ of equation root, known as Newton’s method. With this\nalgorithm, a solution\
    \ can be found through the use of the tangent to the\nfunction at a given point.\
    \ Since the derivative of a function gives the\nslope of the function at each\
    \ point, it is possible to use the\nderivative to find a reasonable approximation.\
    \ As the algorithm iterates\nthrough successive points, the approximation gets\
    \ better. As with other\nmethods, the algorithm is generally stopped when a preset\
    \ maximum error\nis achieved.\nIn the next chapter, I will talk about another\
    \ important\ncomputational tool that is heavily used in financial algorithms:\n\
    numerical integration. With algorithms for numerical integration, it is\npossible\
    \ to find solutions for several difficult problems with a high\ndegree of precision.\
    \ You will also see how to implement these techniques\nusing C++.\n\n10. Numerical\
    \ Integration\n\nIntegrating a function is a common step in many financial algorithms.\n\
    For example, some financial techniques that involve the use of\ndifferential equations\
    \ depend on the evaluation of complex integrals.\nSuch areas include derivatives\
    \ pricing, insurance, and related\nalgorithms.\nHowever, when using these methods,\
    \ you can find integrals that have\nno known analytical solution and need to be\
    \ integrated numerically. Even\nif an equation can be integrated analytically,\
    \ it may be more efficient\nto perform this task using numerical algorithms. For\
    \ this purpose, this\nchapter explores some of the common ways of performing numerical\n\
    integration. After reading this and the next chapters, you will have a\nbetter\
    \ understanding of how these numerical integration algorithms work\nin practice\
    \ and how to use them in your own projects.\n\nWe discuss programming examples\
    \ that can readily be applied in the use\nof some common integration methods.\
    \ We also discuss their performance\nand the accuracy of such numerical methods\
    \ when implemented using the\nC++ language. The programming examples in this chapter\
    \ cover the\nfollowing topics:\n\n*   Midpoint method: A simple method of integration\
    \ that uses an\n    easy-to-compute approximation based on the midpoint of each\
    \ integration\n    interval.\n\n*   Trapezoid method: A more accurate method of\
    \ numerical integration\n    that employs a trapezoidal approximation to the integrated\n\
    \    area.\n\n*   Simpson’s method: A popular technique of numerical integration,\n\
    \    Simpson’s method provides a slightly better approximation than the\n    previous\
    \ two methods.\n\n*   Graphical examples of these solution methods: We present\
    \ a\n    graphical explanation of how these methods work, along with the code\n\
    \    necessary to implement them.\n\nThe Midpoint Method\nIn this section, we\
    \ create a C++ class to integrate functions using\nthe midpoint method.\n\nSolution\n\
    Integrating a function means, in a few words, finding the area of the\ncurve formed\
    \ by the function and the x-axis, when considering a single\ndimension. While\
    \ the concept is simple, there is a large amount of\nliterature concerning the\
    \ practical importance of this problem. The most\nimportant result, also known\
    \ as the fundamental theorem of\ncalculus, is that integration is the inverse\
    \ function of the\nderivative. In other words, applying the derivative to the\
    \ integral of a\nfunction will lead to the original function. You can also integrate\
    \ the\nderivative of a function to reach the original (up to a constant).\nFinding\
    \ the integral of a function by algebraic means is highly\ndependent on the previous\
    \ definition. This means that you need to know a\nsecond function whose derivative\
    \ is the function you want to integrate.\nIn that case, the second function is\
    \ the integral using the fundamental\ntheorem of calculus. The problem is that\
    \ it is not always possible to\nfind an antiderivative using such methods. This\
    \ leads to the need to\ndetermine the integral using the computational method.\n\
    There are several methods that can be used to integrate a function,\nbut they\
    \ all include the strategy of dividing the area of the desired\nfunction into\
    \ many subareas and adding them all. The good thing about\nnumerical integration\
    \ is that most schemes of subdividing the area as\ndescribed previously are convergent.\
    \ This means that the solution for\nmost functions can be used by any of the methods\
    \ we discuss. What make\nthese methods different is the computational effort and\
    \ possibly some\nbetter convergence for a particular function or application.\n\
    \nWe start our discussion with an algorithm commonly known as the midpoint\nmethod.\
    \ This method was so named because of the use of a midpoint\napproximation to\
    \ the desired area. Consider the function\n*f*(*x*)=*x*²+1, and try to calculate\n\
    the integral for this function in the interval 1 to 5\\. You can see a\nplot of\
    \ this function in Figure [10-1](#323908_2_En_10_Chapter.xhtml#Fig1).\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig1_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1\nPlot of function f(x)=x²+1 in the interval 1 to 5\n\nOf course,\
    \ it would be easy to solve this problem using symbolic techniques,\nsince there\
    \ is a well-known way to determine the integral of a\npolynomial function. However,\
    \ consider how the problem could be solved\nusing a purely computational strategy.\n\
    The goal of the algorithm is to develop an approximation so that you\ncan determine\
    \ the considered integral within a prespecified error\nthreshold. The first step\
    \ is to devise a function that could approximate\nthe given function in the given\
    \ interval. It turns out that the easiest\nfunction we can try is the constant\
    \ function\n*f*(*x*)=c.\nSuppose that we use the constant function to\napproximate\
    \ the integral in the interval 1 to 5\\. We can take as the\nvalue of the constant\
    \ the average value of *f*(*x*) in\nthat interval, as determined by the extreme\
    \ points.\n\nThat constant value would be ![$$ f\\left(\\frac{1+5}{2}\\right)=\\\
    mathrm{f}(3)=10 $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq1.png).\n\
    Check in Figure [10-2](#323908_2_En_10_Chapter.xhtml#Fig2) how this constant function\
    \  compares with the\noriginal function.\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig2_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig2_HTML.jpg)"
