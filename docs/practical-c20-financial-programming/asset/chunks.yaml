    \ bpsRatio(480, 2.15);\n    std::cout << \"return: \" << bpsRatio.getReturn()\n\
    \              << \" drawdown: \" << bpsRatio.getDrawDown() << std::endl;\n}\n\
    \n清单 5-3\nCalmarRatio 类\n```\n\n## 运行代码\n\n我们在 UNIX 系统中使用 `gcc` 编译器测试了包含 `CalmarRatio`\
    \ 类及其相关代码的示例应用程序。你可以使用 `make` 等构建系统及其相关的 makefile 来编译前面展示的 `.cpp` 文件。或者，你也可以直接使用编译器通过以下命令行构建应用程序：\n\
    \n```\ngcc -o calmarRatio CalmarRatio.cpp\n```\n\n生成的可执行文件可以从终端调用。它将按以下方式显示卡玛比率的结果：\n\
    \n```\nreturn: 3.12 drawdown: 28.3636\nreturn: 2.15 drawdown: 44.7917\n```\n\n\
    如你所见，代码对参数进行了不同的处理，并根据所使用的卡玛比率类型解释结果。第一个示例使用了 `CalmarRatioPerc`，将卡玛比率视为应用于百分比。第二个示例使用了\
    \ `CalmarRatioBPS` 表示形式，它使用基点而非百分比。然而，结果会根据各自的回报和回撤正确显示。\n\n# 生成统计数据\n\n使用高斯分布（正态分布）和卡方分布等统计分布创建数据。\n\
    \n## 解决方案\n\n在处理交易算法时，通常在人工生成的价格上测试这些策略的运行情况会非常有用。如果我们考虑市场的大部分短期波动都具有随机成分，那么我们可以使用随机数生成器来近似典型价格相关时间序列的值。\n\
    \n在本节中，我们将研究如何生成基于统计数据的数据，这些数据随后可用于测试交易策略。为此，你可以使用当前可用于在 C++ 中生成统计值的众多库之一。这些库的操作方式与随机数生成器类似，但存在一些差异。传统的随机数生成器用于生成随机整数值。经过一些处理，这些数字可以转换为给定区间（如\
    \ 0 到 1 之间）内均匀分布的随机数。\n\n然而，对于更高级的用途，从一个特定的概率分布生成随机数是很有趣的。这些概率分布基于标准随机过程，包括高斯分布（也称为正态分布）和卡方分布（一种偏态正态分布形式）。参见图\
    \ 5-2。这些分布可用于生成更能代表股票市场的随机数。\n\n![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig2_HTML.jpg](img/323908_2_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2**\n`boost::math` 命名空间中可用的两个概率分布函数（PDF）的图形。上方图形是参数为 0 和 1 的正态分布。下方图形是参数为\
    \ 5 的卡方分布。\n\n在本例中，我将向你展示如何使用 `boost::math` 命名空间，在其中声明一组表示统计分布的对象。为完成此任务使用一个库，可以让你专注于算法的设计，而无需重新实现这样一个在许多编程库中已可用的通用统计工具函数。我还将使用\
    \ `boost::random` 库基于这些分布生成随机数据点。\n"
- fmt: '# Probability Distributions


    Before I start, let me give you a quick overview of probability distributions
    and their uses. Probability distributions are a mathematical representation of
    parameterized random processes that frequently occur in nature. For example, the
    most basic probability distribution is the **uniform** distribution, in which
    points occur with the same probability over the whole interval in which the function
    is defined. Thus, each time a new event occurs according to this distribution
    (assuming that it has been defined for numbers between 1 and 2), its value may
    be any real number between 1 and 2 with equal probability. The uniform distribution
    has an important role because values generated under uniform random probability
    can be converted into other probability distributions.


    Another important distribution is normal (or Gaussian) distribution. The normal
    distribution has two parameters: the mean (average) value and the standard deviation.
    Normally distributed random events occur with highest probability around the mean,
    and the probability of an event occurring further away decreases quickly. The
    resulting probability distribution is bell-shaped to indicate this characteristic
    of the probability space. It has been observed that many natural phenomena follow
    the normal distribution, especially when large numbers of observations are considered.
    Figure [5-2](#323908_2_En_5_Chapter.xhtml#Fig2)(top) shows a plot of the probability
    distribution function (PDF) for a normal (also known as Gaussian) random variable.


    Other probability distributions are also used in financial applications. You can
    see a quick list of the most important in Table [5-1](#323908_2_En_5_Chapter.xhtml#Tab1).
    Each distribution has a common usage pattern and associated parameters that can
    be used to describe the range of probabilities as well as the shape of the resulting
    function.


    ## Table 5-1: A Few Commonly Used Distributions with Their Parameters and Corresponding
    boost::math Identifier


    | Distribution | Parameter(s) | boost::math identifier |

    | --- | --- | --- |

    | Bernoulli | Probability of success | `boost::math::bernoulli_distribution` |

    | Beta | Alpha and beta (real values) | `boost::math::beta_distribution` |

    | Binomial | Number of trials and success probability | `boost::math::binomial_distribution`
    |

    | Cauchy | Location and scale | `boost::math::cauchy_distribution` |

    | Chi-squared | Degrees of freedom | `boost::math::chi_squared_distribution` |

    | Exponential | Lambda (rate) | `boost::math::exponential_distribution` |

    | Geometric | Success probability | `boost::math::geometric_distribution` |

    | Hypergeometric | N, K, and number of trials | `boost::math::hypergeometric_distribution`
    |

    | Log-normal | Mean and sigma | `boost::math::lognormal_distribution` |

    | Logistic | Mean and scale | `boost::math::logistic_distribution` |

    | Normal (Gaussian) | Mean and sigma | `boost::math::normal_distribution` |

    | Poisson | Lambda (rate) | `boost::math::poisson_distribution` |

    | Student’s t-Distribution | Degrees of freedom (real value) | `boost::math::students_t_distribution`
    |

    | Triangular | Extremes and middle point | `boost::math::triangular_distribution`
    |

    | Uniform | Start and end of interval | `boost::math::uniform_distribution` |


    Some of these functions are also available in the STL under the header file `<random>`.
    However, for completeness, I also show in this chapter how to compute these values
    using the boost library. In order to use some of these probability distributions
    in your code, you can include the header file `<boost/math/distributions.hpp>`.
    First, you need to make sure that boost is properly installed in your system (check
    the installation instructions on the [`www.boost.org`](http://www.boost.org) website).
    The last column of Table [5-1](#323908_2_En_5_Chapter.xhtml#Tab1) lists the distribution
    names.


    Once you import a particular distribution, you can use it to respond to common
    questions such as the following: What is the mean of the distribution? What is
    the respective quantile for a particular value? What is the CDF of a particular
    value? You will see some of these questions being answered in class `DistributionData`,
    which is listed here.


    Another responsibility of class `DistributionData` is to generate random numbers
    for some distributions, given the required parameters. A distribution-specific
    random number is created when the distribution object is called. You need to pass
    a uniform random number generator, which is also provided by boost. You can store
    these values in a vector and return them at the end of the member function. Here
    is an example of how this process works for Gaussian-distributed data.


    ```

    std::vector DistributionData::gaussianData(int nPoints, double mean, double sigma)

    {

    std::vector data;

    boost::random::normal_distribution distrib(mean, sigma);

    for (int i=0; i<nPoints; ++i)

    {

    double val = distrib(random_generator);

    data.push_back(val);

    }

    return data;

    }

    ```


    Two other common probability distributions are the gamma and log-normal distributions.
    The gamma distribution can be interpreted as a generalized version of the normal
    distribution, in which you can control the shape and scale of the probabilities.
    Figure [5-3](#323908_2_En_5_Chapter.xhtml#Fig3) (top) shows an example of the
    gamma distribution. The log-normal distribution is another possible generalization
    of the normal distribution, and it can be interpreted as the product of several
    positive and independent random variables. Its PDF is presented in Figure [5-3](#323908_2_En_5_Chapter.xhtml#Fig3)
    (bottom). The log-normal distribution is included as one of the distributions
    supported by class `DistributionData`.


    ![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig3_HTML.jpg](images/323908_2_En_5_Chapter/323908_2_En_5_Fig3_HTML.jpg)


    **Figure 5-3** Plots for two probability distribution functions (PDF) available
    in the `boost::math` namespace. The top plot is for a gamma distribution with
    parameters 1 and 2. The bottom PDF is for the log-normal distribution with parameters
    0 and 1.


    ## Complete Code


    In Listing [5-4](#323908_2_En_5_Chapter.xhtml#PC31), I show the implementation
    for a class that generates data using a few of the probability distributions available
    in the `boost::random` template library. The main class is called `DistributionData`,
    and you can use it to generate numbers, as well as calculate quantiles for some
    distributions.'
