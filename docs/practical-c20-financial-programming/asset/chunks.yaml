- fmt: "### Complete Code\n\nYou can view the complete code for the `Mutex` and `MutexAccess`\
    \ classes in Listing [17-3](#323908_2_En_17_Chapter.xhtml#PC8). An example of\
    \ their use is also shown in class `MutexTestThread`.\n\n```\n//\n//  Mutex.h\n\
    #ifndef __FinancialSamples__Mutex__\n#define __FinancialSamples__Mutex__\nstruct\
    \ MutexData;\nclass Mutex {\npublic:\nMutex();\n~Mutex();\nvoid lock();\nvoid\
    \ unlock();\nprivate:\nMutex(const Mutex &p);  // copy not allowed\nMutex &operator=(const\
    \ Mutex &p);  // assignment not allowed\nMutexData *m_data;\n};\nclass MutexAccess\
    \ {\npublic:\nMutexAccess(Mutex &m);\n~MutexAccess();\nprivate:\nMutexAccess &operator=(const\
    \ MutexAccess &p);\nMutexAccess(const MutexAccess &p);\nMutex &m_mutex;\n};\n\
    #endif /* defined(__FinancialSamples__Mutex__) */\n//\n//  Mutex.cpp\n#include\
    \ \"Mutex.h\"\n#include \"Thread.h\"\n#include \n#include \n#include \n#include\
    \ \nusing std::vector;\nusing std::cout;\nusing std::endl;\nstruct MutexData {\n\
    pthread_mutex_t m_mutex;\n};\nMutex::Mutex()\n: m_data(new MutexData)\n{\npthread_mutex_init(&m_data->m_mutex,\
    \ NULL);\n}\nMutex::~Mutex()\n{\nif (m_data)\n{\npthread_mutex_destroy(&m_data->m_mutex);\n\
    delete m_data;\n}\n}\nvoid Mutex::lock()\n{\npthread_mutex_lock(&m_data->m_mutex);\n\
    }\nvoid Mutex::unlock()\n{\npthread_mutex_unlock(&m_data->m_mutex);\n}\n/// ----\n\
    MutexAccess::MutexAccess(Mutex &m)\n: m_mutex(m)\n{\nm_mutex.lock();\n}\nMutexAccess::~MutexAccess()\n\
    {\nm_mutex.unlock();\n}\n/// ----\nclass MutexTestThread  : public Thread {\n\
    public:\nMutexTestThread(double &result, double incVal);\n~MutexTestThread();\n\
    void run();\nprivate:\ndouble &m_result;\ndouble m_incValue;\nstatic Mutex m_globalMutex;\n\
    };\nMutex MutexTestThread::m_globalMutex;  // global mutex is static\nMutexTestThread::MutexTestThread(double\
    \ &result, double incVal)\n: m_result(result),\nm_incValue(incVal)\n{\n}\nMutexTestThread::~MutexTestThread()\n\
    {\n}\nvoid MutexTestThread::run()\n{\nMutexAccess maccess(m_globalMutex);  //\
    \ mutex is locked here\ncout  m_incValue)\n{\nm_result -= m_incValue;\n}\nelse\n\
    {\nm_incValue += m_incValue;\n}\n// mutex is automatically unlocked\n}\nint main()\n\
    {\nint nThreads = 10;\nvector threads(nThreads);\ndouble price = rand() % 25;\n\
    for (int i=0; isetJoinable(true);\nthreads[i]->start();\n}\nfor (int i=0; ijoin();\n\
    }\ncout << \" final price is \" << price << endl;\nreturn 0;\n}\nListing 17-3\n\
    The Mutex Class\n```\n\n### Running the Code\n\nYou can compile this code using\
    \ any standard C++ compiler. I performed the test on a machine running the Mac\
    \ OS X operating system. The following is a display of sample results:\n\n```\n\
    accessing data\naccessing data   ...\naccessing data\naccessing data\naccessing\
    \ data\nfinal price is 2\n```\n\n### Creating Threads Using the Standard Library\n\
    \nIn the previous section, you learned how to create multithreaded programs using\
    \ the `pthreads` library. In C++20, it is also possible to create multithreaded\
    \ code using the standard library. The support is provided through the `<thread>`\
    \ header file.\n\nTo make simple multithreaded programs using the STL, it is not\
    \ necessary to create new classes or objects. The class `std::thread` already\
    \ has the ability to perform multithreaded operations using as input a function,\
    \ a lambda, or a functional object.\n\nConsider the following example:\n\n```\n\
    #include \n#include \n#include \nvoid compute_max(const std::vector &values)\n\
    {\nauto total = 0.0;\nfor (auto v : values)\n{\ntotal += v;\n}\nstd::cout  v =\
    \ {0, 5, 3, 2, 5, 3};\nstd::thread first_tread(compute_max, v);\nfirst_tread.join();\n\
    return 0;\n}\n```\n\nHere, we define a simple function called `compute_max`, which\
    \ receives as parameter a vector of `double` numbers. This function could be any\
    \ type of operation that takes a long time and that we would like to move to a\
    \ separate thread. To create a new thread using this function, we just need to\
    \ use the `std::thread` class in the `<thread>` header file.\n\nThe `std::thread`\
    \ class takes as parameters the name of the function (or functional object) you\
    \ want to use, along with zero or more parameters that will be passed to that\
    \ function. In the previous example, we have the vector named `v` as the single\
    \ parameter. This could be expanded to other parameters if required by the function\
    \ `compute_max`.\n\nFinally, the `first_thread` object calls the `join()` method,\
    \ to indicate that the main function will join the execution of that thread, until\
    \ it is complete. If we didn’t want to stop until the thread is completed, we\
    \ could have used instead the `detach()` method, which allows the thread to run\
    \ independently while the current function continues its operation.\n\n### Conclusion\n\
    \nThe constant development of multicore processors and architectures has greatly\
    \ expanded the computational capacity of modern machines. However, to explore\
    \ such multicore architectures, it is necessary to change the way you program.\
    \ Modern high-performance programming has an increased focus on multiprocessing\
    \ techniques, which allow applications to access more than one core and as result\
    \ improve the performance of the system.\n\nMultithreading is a programming technique\
    \ that allows more than one thread of execution per process. If the machine has\
    \ more than one processor, multithreading allows you to access these processing\
    \ cores to perform additional work. In this chapter, you learned how to create,\
    \ terminate, and manage threads using the standard pthreads library.\n\nIn the\
    \ first programming example, you learned about the pthreads library and how it\
    \ can be used to create new threads. You saw how to design a C++ class to encapsulate\
    \ the pthreads function calls. Using pthreads, you can simplify your multithreading\
    \ applications, as it abstracts away system-dependent APIs for multithreading.\n\
    \nNext, you learned how to apply pthreads to a common problem on options. You\
    \ saw that, for some problems, it is easy to distribute the necessary work into\
    \ separate units of computation. Using C++, you can encapsulate such code segments\
    \ into different objects.\n\nIn the next section, you learned about synchronization\
    \ primitives and how they are implemented using the pthreads library. I introduced\
    \ a class that can be used to model the operation of a mutex. You can readily\
    \ apply the `Mutex` class to other financial programming projects.\n\nFinally,\
    \ I also explained how the new C++ standard C++20 provides direct support for\
    \ threads without the use of a separate library like pthreads. Thus, for new code,\
    \ it is possible to simplify the applications and rely on the STL. While much\
    \ of the existing multithreading code still uses libraries like pthread, it is\
    \ important to learn how to do this using the standard and use it in new projects.\n\
    \nWith this chapter, I have completed a general presentation of technical tools\
    \ used to create high-performance financial applications in C++. I hope you have\
    \ enjoyed learning about the features of C++ and how they can be applied to the\
    \ solution of common problems in the financial industry.\n\n### Index\n\n**A**\n\
    \n- `addVector`\n- Algebraic transformations\n- Allocating capital\n- Analyst\
    \ recommendations\n  - definitions and implementation\n  - equity investments\n\
    \  - institutional investor\n  - STL vectors and maps\n  - Wall Street ecosystem\n\
    - Application programming interface (API)\n- Asset prices simulation process\n\
    \  - `getWalk` member function\n  - implementation for `RandomWalk` Class\n  -\
    \ `RandomWalk` class\n  - random walk process\n- Assignment operator\n- At the\
    \ money (ATM)\n- `Auto` keyword\n- Automatic argument deduction\n- Automatic type\
    \ detection\n\n**B**\n\n- Backslash\n- Banded matrix\n- Basic linear algebra subprograms\
    \ (BLAS)\n- `bisectionMethod`\n- Bisection method\n- `BisectionSolver`\n- Black-Scholes\
    \ equation"
