    \n## 运行代码\n\n您可以使用符合标准的编译器（如 gcc、Visual Studio 或 llvm）编译代码清单 10-2 中的代码。编译代码后，您可以运行生成的应用程序来测试结果。以下是程序执行的一个示例：\n\
