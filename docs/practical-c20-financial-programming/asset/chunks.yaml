    **Chapter** [**10**](#323908_2_En_10_Chapter.xhtml) **—Numerical Integration**:
    Function integration is a common part of many financial algorithms. However, it
    is hard to solve certain classes of equations exactly, and numerical methods need
    to be employed in such cases. In this chapter, you will see examples of C++ code
    that can be readily applied to common integration problems. I also discuss the
    performance and the accuracy of such methods. The programming examples in this
    chapter cover topics such as (1) the midpoint method, (2) the trapezoid method,
    and (3) Simpson’s method.


    **Chapter** [**11**](#323908_2_En_11_Chapter.xhtml) **—Solving ODEs and PDEs**:
    Differential equations are at the heart of many techniques used in the analysis
    of equity markets. There are several processes for solving and analyzing ordinary
    differential equations (ODE) and partial differential equations (PDE) that can
    be implemented in C++. In this chapter, I present programming examples that cover
    aspects of ODEs and PDE modeling and application in C++. Topics covered include
    the following: (1) solving ODEs, (2) using the Runge-Kutta method, and (3) solving
    the Black-Scholes equation.


    **Chapter** [**12**](#323908_2_En_12_Chapter.xhtml) **—Optimization**: Optimization
    refers to a set of techniques used to find the minimum or maximum of a function.
    Optimization strategies are used in several areas of financial engineering. In
    this chapter, I discuss programming techniques that can be used to implement common
    aspects of optimization algorithms. I provide a concise explanation of some techniques
    and how they are typically implemented in C++20\. You will learn about (1) modeling
    optimization problems, (2) interfacing with linear programming (LP) solvers, (3)
    solving two-dimensional LP problems, and (4) mixed integer–programming models.'
