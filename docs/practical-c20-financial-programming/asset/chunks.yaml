    # 用 Lua 扩展 C++


    Lua 是一种相对较新的语言，以其动态特性的简洁实现而著称。它也被用作一种可嵌入到您自己的大型 C++ 应用程序中的扩展语言。


    # 将 C++ 股票处理代码导出到 Python


    生成提供将 C++ 股票处理类导出到 Python 能力的代码。


    ## 解决方案


    Python 是一种流行的语言，已被用于多个领域，包括 Web 应用、科学数据探索和金融。Python 最大的优势之一是其能够干净地整合大型编程库集合。这种互操作性的一个非常重要的原因是
    Python 用于与不同语言（尤其是 C 和 C++）交互的简单机制。


    在本节中，您将学习 Python 的扩展机制以及如何从您的 C++ 代码中访问它。我为此过程提供了一个金融示例，您将能够访问一个最初使用 C++ 设计和实现的
    `Stock` 类。


    Python 在大多数操作系统上作为开源软件提供。您可以在 [`http://python.org`](http://python.org) 找到大多数操作系统的源代码和二进制文件。您还会发现
    Python 预装在许多类 UNIX 操作系统上，例如 Linux 和 Mac OS X。Python 中库扩展的主要机制是模块。模块用于将数据和代码导出到
    Python 源文件或其他模块。关键字 `import` 可用于将现有模块加载到内存中。例如：


    ```

    import sys

    ```


    这是一个用于加载 `sys` 模块的命令，该模块提供对系统相关函数的访问。虽然模块本身可以用 Python 创建，但作为 C++ 程序员，我们的主要兴趣在于使用
    C++ 创建模块。这可以通过 Python 模块创建 API（应用程序编程接口）实现，该 API 可用于 C 和 C++，并且包含在大多数 Python 安装中。


    由于扩展机制是用 C 语言编写的（为了与现有的适用于 Python 的 C 库兼容），因此有必要创建一些 C 函数来封装您的原始 C++ 类，以实现与 Python
    环境的互操作性。


    作为这个过程如何工作的示例，请考虑 `Stock` 类，它可以用于对单个股票进行建模。清单 15-1 展示了该类的公共接口。


    ```

    class Stock {

    public:

    Stock(const std::string &ticker, double price, double div);

    Stock(const Stock &p);

    ~Stock();

    Stock &operator=(const Stock &p);

    std::string ticker();

    double price();

    void setPrice(double price);

    double dividend();

    void setDividend(double div);

    double dividendYield();

    }

    Listing 15-1

    Interface for Stock Class

    ```


    Python 的扩展 API 是一组头文件和库，它们将 Python 环境暴露给用 C 或 C++ 编写的其他应用程序。要使用扩展 API 将诸如 `Stock`
    之类的类导出到 Python，我们需要创建一些将接收并返回 Python 解释器发送的请求的函数。这是在 `Stock_Py.cpp` 文件中完成的，该文件包含一个处理
    `Stock` 类每个成员的函数列表。


    第一个值得关注的函数是 `stock_create` 函数，其定义如下：


    ```

    PyObject *stock_create(PyObject *self, PyObject *args)

    ```


    直接从 Python 调用的函数通常具有这样的签名：接收两个 Python 对象并返回一个 Python 对象。每当使用 `object.function()`
    语法进行调用时，此类函数的第一个参数是作为调用目标的 Python 对象（类似于 C++ 中的 `this` 指针）。第二个参数是一个 Python 列表，存储传递给该函数的所有参数。


    这个函数做的第一件事是检索作为参数传递的参数。这可以在 Python API 中通过调用 `PyArg_ParseTuple` 函数来完成，该函数负责检查参数并将其值复制到数据对象中。此函数的第一个参数是表示参数列表的对象。第二个参数是一个字符串，定义了参数列表中每个数据元素的类型。最后，剩余的参数是指向数据应存储位置的指针。


    ```

    if (!PyArg_ParseTuple(args, "sdd", &ticker, &price, &dividend))

    return NULL;

    ```


    如果此函数不成功，它将返回 false，这将导致 `stock_create` 返回 `NULL`。向解释器返回 `NULL` 表示被调用的函数出于某种原因失败。


    一旦输入数据被验证，下一步是创建一个 `Stock` 类的对象并正确初始化它。结果存储在一个使用 `PyCapsule_New` 函数创建的 Python
    胶囊对象中。此函数调用将析构函数的名称作为最后一个参数，在本例中只是 `stock_destructor`，一个调用 `Stock` 对象析构函数的函数。创建
    Python 胶囊后，新的 Python 对象将作为函数的结果返回。


    对于仅返回单个数据对象的函数示例，请考虑 `stock_ticker` 函数，它提供对 `Stock::ticker()` 成员函数的访问：


    ```

    PyObject *stock_ticker(PyObject *self, PyObject *args)

    {

    PyObject *obj;

    if (!PyArg_ParseTuple(args, "O!", &PyCapsule_Type, &obj))

    return NULL;

    Stock *stock = getStock(obj);

    return Py_BuildValue("s", stock->ticker().c_str());

    }

    ```


    在此函数中，第一步是验证输入参数，这使用了 `PyArg_ParseTuple` 函数。`PyArg_ParseTuple` 函数接收数据容器和一个确定每个参数类型的字符串作为参数，后跟指向将存储数据的变量的指针。在这种情况下要检索的对象是
    `PyCapsule` 类型，如剩余参数（它们提供了对象类型和指向对象变量的指针）所定义。一旦参数被检索出来，您就可以使用 `getStock` 函数获取
    `Stock` 指针。最后，调用 `ticker()` 成员函数。要将数据返回给 Python 解释器，您需要将结果转换为 Python 对象。这是通过 `Py_BuildValue`
    函数完成的，该函数使用格式字符串来确定其剩余参数的类型。其他函数类似，它们的主要工作是从参数列表中检索数据并将结果转换为 Python 对象。


    注意


    即使一个暴露给 Python 的函数不返回任何结果，您仍然需要返回一个有效的 Python 对象。在这种情况下，您可以使用 `Py_None`，它表示一个标准的
    Python 对象，意思是“没有数据”。


    最后，我们有 `initstock` 函数。它调用 Python API 中的 `Py_InitModule` 函数来确定此模块中暴露的函数。`Py_InitModule`
    函数接收模块名称和一个数组作为参数，该数组包含所有函数（称为 `stockMethods`）的列表、它们的名称和描述。当这些信息传递给 Python 解释器时，每当导入
    `stock` 模块时，它就对 Python 开发人员可用。


    ## 完整代码


    清单 15-2 展示了 `Stock` 类及其关联的 Python 粘合代码的完整代码。

