  trans: "\n### 完整代码\n\n您可以在清单 17-3 中查看 `Mutex` 和 `MutexAccess` 类的完整代码。`MutexTestThread`\
    \ 类中也展示了它们的使用示例。\n\n```\n//\n//  Mutex.h\n#ifndef __FinancialSamples__Mutex__\n\
    #define __FinancialSamples__Mutex__\nstruct MutexData;\nclass Mutex {\npublic:\n\
    Mutex();\n~Mutex();\nvoid lock();\nvoid unlock();\nprivate:\nMutex(const Mutex\
    \ &p);  // 禁止复制\nMutex &operator=(const Mutex &p);  // 禁止赋值\nMutexData *m_data;\n\
    };\nclass MutexAccess {\npublic:\nMutexAccess(Mutex &m);\n~MutexAccess();\nprivate:\n\
    MutexAccess &operator=(const MutexAccess &p);\nMutexAccess(const MutexAccess &p);\n\
    Mutex &m_mutex;\n};\n#endif /* defined(__FinancialSamples__Mutex__) */\n//\n//\
    \  Mutex.cpp\n#include \"Mutex.h\"\n#include \"Thread.h\"\n#include \n#include\
    \ \n#include \n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\n\
    struct MutexData {\npthread_mutex_t m_mutex;\n};\nMutex::Mutex()\n: m_data(new\
    \ MutexData)\n{\npthread_mutex_init(&m_data->m_mutex, NULL);\n}\nMutex::~Mutex()\n\
    {\nif (m_data)\n{\npthread_mutex_destroy(&m_data->m_mutex);\ndelete m_data;\n\
    }\n}\nvoid Mutex::lock()\n{\npthread_mutex_lock(&m_data->m_mutex);\n}\nvoid Mutex::unlock()\n\
    {\npthread_mutex_unlock(&m_data->m_mutex);\n}\n/// ----\nMutexAccess::MutexAccess(Mutex\
    \ &m)\n: m_mutex(m)\n{\nm_mutex.lock();\n}\nMutexAccess::~MutexAccess()\n{\nm_mutex.unlock();\n\
    }\n/// ----\nclass MutexTestThread  : public Thread {\npublic:\nMutexTestThread(double\
    \ &result, double incVal);\n~MutexTestThread();\nvoid run();\nprivate:\ndouble\
    \ &m_result;\ndouble m_incValue;\nstatic Mutex m_globalMutex;\n};\nMutex MutexTestThread::m_globalMutex;\
    \  // 全局互斥锁是静态的\nMutexTestThread::MutexTestThread(double &result, double incVal)\n\
    : m_result(result),\nm_incValue(incVal)\n{\n}\nMutexTestThread::~MutexTestThread()\n\
    {\n}\nvoid MutexTestThread::run()\n{\nMutexAccess maccess(m_globalMutex);  //\
    \ 在此处锁定互斥锁\ncout << \"accessing data\" << endl;\nif (m_result > m_incValue)\n\
    {\nm_result -= m_incValue;\n}\nelse\n{\nm_incValue += m_incValue;\n}\n// 互斥锁自动解锁\n\
    }\nint main()\n{\nint nThreads = 10;\nvector<Thread *> threads(nThreads);\ndouble\
    \ price = rand() % 25;\nfor (int i=0; i<nThreads; ++i)\n{\nthreads[i] = new MutexTestThread(price,\
    \ i);\nthreads[i]->setJoinable(true);\nthreads[i]->start();\n}\nfor (int i=0;\
    \ i<nThreads; ++i)\n{\nthreads[i]->join();\n}\ncout << \" final price is \" <<\
    \ price << endl;\nreturn 0;\n}\n清单 17-3\nMutex 类\n```\n\n### 运行代码\n\n您可以使用任何标准\
    \ C++ 编译器编译此代码。我在一台运行 Mac OS X 操作系统的机器上进行了测试。以下是示例结果的显示：\n\n```\naccessing data\n\
    accessing data   ...\naccessing data\naccessing data\naccessing data\nfinal price\
    \ is 2\n```\n\n### 使用标准库创建线程\n\n在上一节中，您学习了如何使用 `pthreads` 库创建多线程程序。在 C++20 中，也可以使用标准库创建多线程代码。该支持通过\
    \ `<thread>` 头文件提供。\n\n要使用 STL 创建简单的多线程程序，无需创建新的类或对象。`std::thread` 类已经能够通过接收函数、lambda\
    \ 表达式或函数对象作为输入来执行多线程操作。\n\n请考虑以下示例：\n\n```\n#include <iostream>\n#include <thread>\n\
    #include <vector>\nvoid compute_max(const std::vector<double> &values)\n{\nauto\
    \ total = 0.0;\nfor (auto v : values)\n{\ntotal += v;\n}\nstd::cout << total <<\
    \ std::endl;\n}\nint main()\n{\nstd::vector<double> v = {0, 5, 3, 2, 5, 3};\n\
    std::thread first_tread(compute_max, v);\nfirst_tread.join();\nreturn 0;\n}\n\
    ```\n\n在这里，我们定义了一个名为 `compute_max` 的简单函数，它接收一个 `double` 类型的向量作为参数。这个函数可以是任何需要长时间运行的操作类型，我们希望对它进行独立线程处理。要使用此函数创建新线程，我们只需使用\
    \ `<thread>` 头文件中的 `std::thread` 类。\n\n`std::thread` 类接收您想要使用的函数（或函数对象）的名称，以及零个或多个将传递给该函数的参数。在前面的示例中，我们有一个名为\
    \ `v` 的向量作为唯一参数。如果 `compute_max` 函数需要，这可以扩展到其他参数。\n\n最后，`first_thread` 对象调用 `join()`\
    \ 方法，以指示 `main` 函数将等待该线程执行完毕，直到其完成。如果我们不想等待线程完成，可以使用 `detach()` 方法，该方法允许线程独立运行，同时当前函数继续执行其操作。\n\
    \n### 结论\n\n多核处理器和架构的不断发展极大地扩展了现代机器的计算能力。然而，为了利用这种多核架构，有必要改变编程方式。现代高性能编程越来越关注多处理技术，这些技术允许应用程序访问多个内核，从而提高系统性能。\n\
    \n多线程是一种编程技术，它允许每个进程拥有多个执行线程。如果机器拥有多个处理器，多线程允许您访问这些处理核心来执行额外的工作。在本章中，您学习了如何使用标准的\
    \ pthreads 库创建、终止和管理线程。\n\n在第一个编程示例中，您了解了 pthreads 库以及如何使用它来创建新线程。您学习了如何设计一个 C++\
    \ 类来封装 pthreads 函数调用。使用 pthreads，您可以简化多线程应用程序，因为它抽象了与系统相关的多线程 API。\n\n接下来，您学习了如何将\
    \ pthreads 应用于期权中的一个常见问题。您了解到，对于某些问题，很容易将必要的工作分配到不同的计算单元中。使用 C++，您可以将此类代码段封装到不同的对象中。\n\
    \n在下一节中，您学习了同步原语以及如何使用 pthreads 库实现它们。我介绍了一个可用于模拟互斥锁操作的类。您可以随时将 `Mutex` 类应用于其他金融编程项目。\n\
    \n最后，我还解释了新的 C++ 标准 C++20 如何在不使用像 pthreads 这样的单独库的情况下，直接提供对线程的支持。因此，对于新代码，可以简化应用程序并依赖\
    \ STL。虽然许多现有的多线程代码仍然使用像 pthread 这样的库，但学习如何使用标准库并在新项目中使用它非常重要。\n\n在本章中，我完成了用于使用\
    \ C++ 创建高性能金融应用程序的技术工具的总体介绍。我希望您喜欢了解 C++ 的特性以及如何将它们应用于解决金融行业的常见问题。\n\n### 索引\n\
    \n**A**\n\n- `addVector`\n- 代数变换\n- 资金配置\n- 分析师建议\n  - 定义和实现\n  - 股权投资\n  - 机构投资者\n\
    \  - STL 向量和映射\n  - 华尔街生态系统\n- 应用程序编程接口 (API)\n- 资产价格模拟过程\n  - `getWalk` 成员函数\n\
    \  - `RandomWalk` 类的实现\n  - `RandomWalk` 类\n  - 随机游走过程\n- 赋值运算符\n- 平值 (ATM)\n\
    - `Auto` 关键字\n- 自动参数推导\n- 自动类型检测\n\n**B**\n\n- 反斜杠\n- 带状矩阵\n- 基本线性代数子程序 (BLAS)\n\
    - `bisectionMethod`\n- 二分法\n- `BisectionSolver`\n- 布莱克-斯科尔斯方程\n"
