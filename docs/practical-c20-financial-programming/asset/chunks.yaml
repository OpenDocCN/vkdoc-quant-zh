    \ type of the object and call the right destructor.\n\nThe compiler automatically\
    \ adds the following member functions, unless you specify otherwise in the class\
    \ declaration:\n\n*   The default constructor: The default constructor is automatically\
    \ added, allowing an object to be created using the `new` keyword, even if the\
    \ class writer didn’t include it. A default constructor is one that has no arguments.\
    \ It is not included automatically, however, if the class declaration contains\
    \ another constructor that requires arguments. For example, in our `IntRateCalculator`\
    \ class, the constructor receives one parameter, the interest rate. Therefore,\
    \ the default constructor is not automatically included, which means that to create\
    \ an object of the `IntRateCalculator` class, the programmer needs to specify\
    \ a valid interest rate argument.\n\n*   The copy constructor: The copy constructor\
    \ allows you to create copies of an existing object of the same class. It is included\
    \ by default only if there are no other constructors in the class definition.\
    \ In our case, we need to supply a copy constructor, to guarantee that it is possible\
    \ to create copies of existing objects. Copy constructors become important when\
    \ objects need to be added to containers, particularly the containers provided\
    \ in the STL, such as vectors, maps, and multimaps.\n\n*   The destructor: A destructor\
    \ defines how the resources used by a particular object will be freed once the\
    \ object is destroyed. A proper constructor is required to avoid memory leaks\
    \ and other undesirable resource leaks in an object. In the `IntRateCalculator`\
    \ class, there are no internal or external resources that need to be freed, but\
    \ it is still better to define this explicitly.\n\n*   The moving constructor:\
    \ A moving constructor provides the operations used when the C++ moving semantic\
    \ is required.\n\n*   The assignment operator: This member function is used when\
    \ an assignment operation occurs between two objects of the same class. Defining\
    \ this type, you can specify how the contents of an object are transferred from\
    \ one object to the next: that can be done either by value or by reference. Other\
    \ details of the copy, such as reference counters, for example, can also be established\
    \ in the assignment operator.\n\nThe `singlePeriod` member function encapsulates\
    \ the operation that returns the future value of a deposit after a single period.\
    \ Depending on the structure of the loan or the input parameters, this can refer\
    \ to 1 month or 1 year of interest. The signature of the member function is\n\n\
    ```\ndouble singlePeriod(double value);\n```\n\nThis simple version of the code\
    \ uses the `double` type (instead of `float`) for extra precision. In the next\
    \ chapters, we will discuss how to deal with precision issues that are inherent\
    \ to floating point numbers.\n\nThe `IntRateCalculator` class contains a single\
    \ member variable, `m_rate`, which stores the current interest rate. In this way,\
    \ it is not necessary to input the interest rate every time the `singlePeriod`\
    \ member function is called. Therefore, to create a new instance of `IntRateCalculator`,\
    \ you need to provide the interest rate as a parameter to the constructor.\n\n\
    The header file, `IntRateCalculator.h`, defines the `singlePeriod` member function\
    \ as inline (see Listing [1-2](#323908_2_En_1_Chapter.xhtml#PC4)).\n\n```\ninline\
    \ double IntRateCalculator::singlePeriod(double value)\n{\ndouble f = value *\
    \ ( 1 + this->m_rate );\nreturn f;\n}\n```\n\nThe keyword `inline` is used here\
    \ to suggest that the member function be directly embedded in the code that calls\
    \ it. What this means is that there is no penalty for calling this function, since\
    \ the function call will be removed from the executed code, and the content of\
    \ the method will be directly substituted. Think of this as a way of achieving\
    \ the same performance of a macro, with all the compiler support of calling a\
    \ function. In high-performance C++ code, it is common to see member functions\
    \ defined as inline, in order to achieve even higher performance than equivalent\
    \ member function calls. This kind of flexibility is one of the features that\
    \ separate C++ from other languages, where it would be much more difficult to\
    \ achieve similar performance.\n\n### Complete Code\n\n```\n//\n//  IntRateCalculator.h\n\
    #ifndef __FinancialSamples__IntRateCalculator__\n#define __FinancialSamples__IntRateCalculator__\n\
    #include \nclass IntRateCalculator {\npublic:\nIntRateCalculator(double rate);\n\
    IntRateCalculator(const IntRateCalculator &v);\nIntRateCalculator &operator =(const\
    \ IntRateCalculator &v);\n~IntRateCalculator();\ndouble singlePeriod(double value);\n\
    private:\ndouble m_rate;\n};\ninline double IntRateCalculator::singlePeriod(double\
    \ value)\n{\ndouble f = value * ( 1 + this->m_rate );\nreturn f;\n}\n#endif /*\
    \ defined(__FinancialSamples__IntRateCalculator__) */\n//\n//  IntRateCalculator.cpp\n\
    #include \"IntRateCalculator.h\"\nIntRateCalculator::IntRateCalculator(double\
    \ rate)\n: m_rate(rate)\n{\n}\nIntRateCalculator::~IntRateCalculator()\n{\n}\n\
    IntRateCalculator::IntRateCalculator(const IntRateCalculator &v)\n: m_rate(v.m_rate)\n\
    {\n}\nIntRateCalculator &IntRateCalculator::operator=(const IntRateCalculator\
    \ &v)\n{\nif (&v != this)\n{\nthis->m_rate = v.m_rate;\n}\nreturn *this;\n}\n\
    //\n//  main.cpp\n#include \"IntRateCalculator.h\"\n#include \n// the main function\
    \ receives parameters passed to the program\nint main(int argc, const char * argv[])\n\
    {\nif (argc != 3)\n{\nstd::cout   \" << std::endl;\nreturn 1;\n}\ndouble rate\
    \ = atof(argv[1]);\ndouble value = atof(argv[2]);\nIntRateCalculator irCalculator(rate);\n\
    double res = irCalculator.singlePeriod(value);\nstd::cout << \" result is \" <<\
    \ res << std::endl;\nreturn 0;\n}\nListing 1-2\nIntRateCalculator.h\n```"
  trans: "\n### 工作原理\n\n清单 1-1 中定义的 `IntRateCalculator` 类，负责计算单期利率。\n\n```\nclass\
    \ IntRateCalculator {\npublic:\nIntRateCalculator(double rate);\nIntRateCalculator(const\
    \ IntRateCalculator &v);\nIntRateCalculator &operator =(const IntRateCalculator\
    \ &v);\n~IntRateCalculator();\ndouble singlePeriod(double value);\nprivate:\n\
    double m_rate;\n};\n清单 1-1\nIntRateCalculator 类\n```\n\n首先，我们定义一个负责计算的新类。面向对象设计的一个基本原则是，将职责统一到定义明确的接口下。在创建\
    \ C++ 类时，你应该遵循这一原则，因为这将简化维护工作，避免代价高昂的错误。即使使用这种策略需要编写额外的代码，从长远来看，更高的组织性也会带来回报。\n\
    \n在定义 `IntRateCalculator` 类时，我们定义了构造函数、析构函数、拷贝构造函数和赋值运算符。如果你不自行定义这些方法，编译器会自动将它们添加到类中。然而，自己创建这些成员函数的版本是很有用的，因为这样你可以确保获得期望的行为，而不是编译器编写者认为正确的选择。\n\
    \n**注意**\n\n你应该创建指定了由 C++ 编译器自动定义的四个基本成员函数的类。通过这种方式，可以确保创建的对象具有定义良好的生命周期，从而避免代价高昂的错误。未能提供此类成员函数可能会导致类无法正确响应诸如赋值（由赋值运算符定义）和拷贝构造等基本操作。如果你的类旨在作为其他类的基类，那么你还应该将析构函数设为虚函数，以便派生类能够正确释放它们使用的资源。这样，运行时系统就能正确检测对象的多态类型并调用正确的析构函数。\n\
    \n除非你在类声明中另有说明，否则编译器会自动添加以下成员函数：\n\n*   **默认构造函数**：默认构造函数是自动添加的，即使类的编写者没有包含它，也可以使用\
    \ `new` 关键字创建对象。默认构造函数是没有参数的构造函数。但是，如果类声明中包含另一个需要参数的构造函数，则默认构造函数不会自动包含。例如，在我们的\
    \ `IntRateCalculator` 类中，构造函数接收一个参数，即利率。因此，默认构造函数不会被自动包含，这意味着要创建 `IntRateCalculator`\
    \ 类的对象，程序员需要指定一个有效的利率参数。\n\n*   **拷贝构造函数**：拷贝构造函数允许你创建同类的现有对象的副本。默认情况下，仅当类定义中没有其他构造函数时，它才会被包含。在我们的例子中，我们需要提供一个拷贝构造函数，以确保能够创建现有对象的副本。当需要将对象添加到容器（特别是\
    \ STL 提供的容器，如 `vector`、`map` 和 `multimap`）时，拷贝构造函数变得非常重要。\n\n*   **析构函数**：析构函数定义了特定对象在被销毁后，其使用的资源如何被释放。为了避免对象中出现内存泄漏和其他我们不希望看到的资源泄漏，需要一个合适的析构函数。在\
    \ `IntRateCalculator` 类中，没有需要释放的内部或外部资源，但显式定义析构函数仍然是更好的做法。\n\n*   **移动构造函数**：移动构造函数提供了在需要\
    \ C++ 移动语义时使用的操作。\n\n*   **赋值运算符**：当两个相同类的对象之间发生赋值操作时，会使用此成员函数。定义此类型，你可以指定一个对象的内容如何传输到另一个对象：可以通过值传递，也可以通过引用传递。拷贝的其他细节，例如引用计数，也可以在赋值运算符中建立。\n\
    \n`singlePeriod` 成员函数封装了一个操作，用于返回一笔存款在单个周期后的未来价值。根据贷款结构或输入参数的不同，这可以指 1 个月或 1 年的利息。该成员函数的签名为：\n\
    \n```\ndouble singlePeriod(double value);\n```\n\n这个简单版本的代码使用了 `double` 类型（而不是\
    \ `float`）以获得更高的精度。在接下来的章节中，我们将讨论如何处理浮点数固有的精度问题。\n\n`IntRateCalculator` 类包含一个成员变量\
    \ `m_rate`，用于存储当前利率。这样，每次调用 `singlePeriod` 成员函数时就不需要再输入利率了。因此，要创建一个 `IntRateCalculator`\
    \ 的新实例，你需要将利率作为参数提供给构造函数。\n\n头文件 `IntRateCalculator.h` 将 `singlePeriod` 成员函数定义为内联函数（见清单\
    \ 1-2）。\n\n```\ninline double IntRateCalculator::singlePeriod(double value)\n\
    {\ndouble f = value * ( 1 + this->m_rate );\nreturn f;\n}\n```\n\n这里使用了关键字 `inline`，表示该成员函数应该被直接嵌入到调用它的代码中。这意味着调用此函数没有性能损失，因为函数调用将从执行代码中移除，而方法的内容将被直接替换。可以将其视为一种实现宏性能的方式，同时拥有编译器对函数调用的全部支持。在追求高性能的\
    \ C++ 代码中，经常可以看到成员函数被定义为内联函数，以达到比等效的成员函数调用更高的性能。这种灵活性是 C++ 区别于其他语言的特点之一，在其他语言中很难达到类似的性能。\n\
    \n### 完整代码\n\n```\n//\n//  IntRateCalculator.h\n#ifndef __FinancialSamples__IntRateCalculator__\n\
    #define __FinancialSamples__IntRateCalculator__\n#include \nclass IntRateCalculator\
    \ {\npublic:\nIntRateCalculator(double rate);\nIntRateCalculator(const IntRateCalculator\
    \ &v);\nIntRateCalculator &operator =(const IntRateCalculator &v);\n~IntRateCalculator();\n\
    double singlePeriod(double value);\nprivate:\ndouble m_rate;\n};\ninline double\
    \ IntRateCalculator::singlePeriod(double value)\n{\ndouble f = value * ( 1 + this->m_rate\
    \ );\nreturn f;\n}\n#endif /* defined(__FinancialSamples__IntRateCalculator__)\
    \ */\n//\n//  IntRateCalculator.cpp\n#include \"IntRateCalculator.h\"\nIntRateCalculator::IntRateCalculator(double\
    \ rate)\n: m_rate(rate)\n{\n}\nIntRateCalculator::~IntRateCalculator()\n{\n}\n\
    IntRateCalculator::IntRateCalculator(const IntRateCalculator &v)\n: m_rate(v.m_rate)\n\
    {\n}\nIntRateCalculator &IntRateCalculator::operator=(const IntRateCalculator\
    \ &v)\n{\nif (&v != this)\n{\nthis->m_rate = v.m_rate;\n}\nreturn *this;\n}\n\
    //\n//  main.cpp\n#include \"IntRateCalculator.h\"\n#include \n// the main function\
    \ receives parameters passed to the program\nint main(int argc, const char * argv[])\n\
    {\nif (argc != 3)\n{\nstd::cout   \" << std::endl;\nreturn 1;\n}\ndouble rate\
    \ = atof(argv[1]);\ndouble value = atof(argv[2]);\nIntRateCalculator irCalculator(rate);\n\
    double res = irCalculator.singlePeriod(value);\nstd::cout << \" result is \" <<\
    \ res << std::endl;\nreturn 0;\n}\n清单 1-2\nIntRateCalculator.h\n```\n"
- fmt: "### Sample Use\n\nFirst, you need to compile the code using your favorite\
    \ C++ compiler. For example, using the `makefile` provided in a UNIX platform,\
    \ you could just use the `make` command, with the following results:\n\n```\n\
    $ make\ngcc –c IntRateCalculator.cpp\ngcc –c main.cpp\ngcc –o intrate IntRateCalculator.o\
    \ main.o\n```\n\nYou can now run this program by passing a given interest rate\
    \ and initial value. For example, you could type the following:\n\n```\n./intrate\
    \ 0.08 10000\nresult is 10800\n```\n\nThis shows that the future value of an investment\
    \ of $10,000 at an 8% interest rate is $10,800 after a single period.\n\n## Compound\
    \ Interest\n\nYou can use simple interest rates to analyze single-period cash\
    \ flows. However, most financial operations, such as loans, have multiple periods.\
    \ For this purpose, you need to consider compound interest.\n\n### Problem\n\n\
    Calculate the compound interest accumulated by a given principal value after the\
    \ passage of N time periods.\n\n### Solution\n\nThe solution uses a new C++ class\
    \ that encapsulates the concept of compound interest. With this class, it becomes\
    \ easy to answer the proposed question using two member functions. The first function,\
    \ `multiplePeriod()`, returns the future value of a fixed income investment after\
    \ a given number of periods, as passed in the function parameter.\n\nAs mentioned\
    \ previously, interest can be calculated either as a discrete or a continuous\
    \ compounding process. For discrete compounding, we assume that interest is paid\
    \ only at regular intervals, as defined by the investment vehicle. The compounding\
    \ happens as interest is added to the original principal.\n\nThe formula for discrete\
    \ compounded interest rate is\n\n![$$ V=P{\\left(1+R\\right)}^N $$](images/323908_2_En_1_Chapter/323908_2_En_1_Chapter_TeX_Equa.png)\n\
    \nwhere `P` is the present value, `V` is the future value, `R` is the interest\
    \ rate, and `N` is the number of periods. The interest rate is the value passed\
    \ as a parameter to the class constructor and stored as a member variable. The\
    \ number of periods `N` is passed as the second parameter to the `multiplePeriod()`\
    \ method.\n\nFor continuous compounding calculation, you need to use a separate\
    \ method, `continuousCompounding()`. In this case, we assume that compounding\
    \ doesn’t happen in discrete steps but that the payments are made continuously\
    \ over time. This is a possible way to determine the future value of a financial\
    \ application (or at least an upper bound for the desired future value).\n\nThe\
    \ formula for the calculation of continuous interest rate compounding is\n\n![$$\
    \ V={Pe}^{RN} $$](images/323908_2_En_1_Chapter/323908_2_En_1_Chapter_TeX_Equb.png)\n\
    \nHere, `V` is the desired future value, `P` is the present value, `R` is the\
    \ interest rate during the period, and `N` is the number of periods. For example,\
    \ to find the future value of continuously compounded interest after 2 years at\
    \ 8% interest per year, you should use the value of the previous equation with\
    \ parameters `R = 0.08` and `N = 2`.\n\n### How It Works\n\nThe two member functions,\
    \ `multiplePeriod()` and `continuousCompounding()`, calculate the given formulas\
    \ using the mathematical functions `pow()` and `exp()` from the standard C++ library.\
    \ These two functions implement a fast way to calculate the power function and\
    \ the exponential function, respectively.\n\nTo use any mathematical function\
    \ from the standard library, you should first include the header file `cmath`.\
    \ Table 1-1 provides a short list of mathematical functions made available from\
    \ that header file.\n\n**Table 1-1** Some of the Mathematical Functions in the\
    \ Standard Library\n\n| Function | Corresponding mathematical operations |\n|\
    \ --- | --- |\n| `exp` | Exponential function (natural base) |\n| `pow` | Power\
    \ function |\n| `log` | Natural logarithm function |\n| `log10` | Logarithm function\
    \ on decimal base |\n| `sqrt` | Square root function |\n| `sin` | Sine function\
    \ |\n| `cos` | Cosine function |\n| `tan` | Tangent function |\n| `acos` | Arc\
    \ cosine function (inverse of cosine) |\n| `asin` | Arc sine function (inverse\
    \ of sine) |\n| `atan` | Arc tangent function (inverse of tangent) |\n| `ceil`\
    \ | Ceiling function (smallest integer higher than parameter) |\n| `floor` | Floor\
    \ function (largest integer lower than parameter) |\n| `fabs` | Absolute value\
    \ for float numbers |\n\nThe mathematical functions provided by the standard library\
    \ should be used whenever possible, instead of custom versions, for the following\
    \ reasons:\n\n- **Compatibility**: Using functions from the standard library guarantees\
    \ that they will be available in any compiler that implements it.\n- **Performance**:\
    \ Functions in the standard library are implemented as part of the package sold\
    \ by compiler vendors. The code of these mathematical functions is generally optimized\
    \ for the particular architecture, which usually results in much better performance.\n\
    \n### Complete Code\n\nThe code in Listing 1-3 shows the implementation for class\
    \ `CompoundIntRateCalculator`, divided into a header file and an implementation\
    \ file. I also present a sample `main()` function that shows how to use the class.\n\
    \n```\n//\n//  CompoundIntRateCalculator.h\n#ifndef __FinancialSamples__CompoundIntRateCalculator__\n\
    #define __FinancialSamples__CompoundIntRateCalculator__\nclass CompoundIntRateCalculator\
    \ {\npublic:\nCompoundIntRateCalculator(double rate);\nCompoundIntRateCalculator(const\
    \ CompoundIntRateCalculator &v);\nCompoundIntRateCalculator &operator =(const\
    \ CompoundIntRateCalculator &v);\n~CompoundIntRateCalculator();\ndouble multiplePeriod(double\
    \ value, int numPeriods);\ndouble continuousCompounding(double value, int numPeriods);\n\
    private:\ndouble m_rate;\n};\n#endif /* defined(__FinancialSamples__CompoundIntRateCalculator__)\
    \ */\n//\n//  CompoundIntRateCalculator.cpp\n#include \"CompoundIntRateCalculator.h\"\
    \n#include \nCompoundIntRateCalculator::CompoundIntRateCalculator(double rate)\n\
    : m_rate(rate)\n{\n}\nCompoundIntRateCalculator::~CompoundIntRateCalculator()\n\
    {\n}\nCompoundIntRateCalculator::CompoundIntRateCalculator(const CompoundIntRateCalculator\
    \ &v)\n: m_rate(v.m_rate)\n{\n}\nCompoundIntRateCalculator &CompoundIntRateCalculator::operator\
    \ =(const CompoundIntRateCalculator &v)\n{\nif (this != &v)\n{\nthis->m_rate =\
    \ v.m_rate;\n}\nreturn *this;\n}\ndouble CompoundIntRateCalculator::multiplePeriod(double\
    \ value, int numPeriods)\n{\ndouble f = value * pow(1 + m_rate, numPeriods);\n\
    return f;\n}\ndouble CompoundIntRateCalculator::continuousCompounding(double value,\
    \ int numPeriods)\n{\ndouble f = value * exp(m_rate * numPeriods);\nreturn f;\n\
    }\n//\n//  main.cpp\n#include \"CompoundIntRateCalculator.h\"\n#include \n// the\
    \ main function receives parameters passed to the program\nint main(int argc,\
    \ const char * argv[])\n{\nif (argc != 4)\n{\nstd::cout   \" << std::endl;\nreturn\
    \ 1;\n}\ndouble rate = atof(argv[1]);\ndouble value = atof(argv[2]);\nint num_periods\
    \ = atoi(argv[3]);\nCompoundIntRateCalculator cIRCalc(rate);\ndouble res = cIRCalc.multiplePeriod(value,\
    \ num_periods);\ndouble contRes = cIRCalc.continuousCompounding(value, num_periods);\n\
    std::cout << \" future value for multiple period compounding is \" << res << std::endl;\n\
    std::cout << \" future value for continuous compounding is \" << contRes << std::endl;\n\
    return 0;\n}\n```\n\n**Listing 1-3** `CompoundIntRateCalculator.h`\n\n### Sample\
    \ Use\n\nThe code in Listing 1-3 can be compiled into an executable and run from\
    \ the command line. The program expects three arguments: the interest rate, the\
    \ present value of the investment, and the number of periods of compounding.\n\
    \nThe following is an example of its use:\n\n```\n$ ./compound 0.05 1000 4\nfuture\
    \ value for multiple period compounding is 1215.51\nfuture value for continuous\
    \ compounding is 1221.4\n```\n\nAs expected, the value returned by continuous\
    \ compounding is slightly higher than the value achieved by discrete compounding."
