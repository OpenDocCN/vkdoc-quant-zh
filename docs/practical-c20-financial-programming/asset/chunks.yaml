    performed manually or by computers, and there is a class of software\nthat was\
    \ created specifically to perform such symbolic manipulations.\nMain examples\
    \ include Mathematica, Maple, and Maxima, among others.\nWhile symbolic\nmethods\
    \ \nare very useful in solving certain classes of ODEs and PDEs, many\ndifferential\
    \ equations are too complex to be solved to a closed form\nusing symbolic manipulation.\
    \ Moreover, such symbolic techniques are very\nspecialized and are normally used\
    \ only during the modeling and\nexploration phases, when the engineer or mathematician\
    \ is creating a\nmodel based on differential equations. For these reasons, symbolic\n\
    techniques are mostly confined to specialized software packages, rather\nthan\
    \ being used as libraries for general-purpose languages.\nThe second class of\
    \ techniques for solving differential equations is\nbased on numerical\nalgorithms.\
    \ These algorithms are more general in the sense that\nthey can be applied to\
    \ any differential equation, as long as some basic\nrequirements are met. Moreover,\
    \ many common differential equations have\nno known closed solutions, and in such\
    \ cases, numerical methods are the\nonly ones available. Because numerical methods\
    \ for ODEs and PDEs can be\nimplemented using standard programming techniques,\
    \ they are\ncommonly used as part of mathematical libraries for programming\n\
    languages such as FORTRAN and C++.\n\nEuler’s Method \nThe first numerical algorithm\
    \ for ODEs you will learn about is a\nsimple technique called Euler’s method,\
    \ which is based on the successive\nevaluation of the desired ODE at predetermined\
    \ steps. Starting from a\ngiven initial condition, Euler’s method tries to find\
    \ the next value of\nthe differential equation, using approximation formulas that\
    \ are applied\nat predetermined intervals.\n\nThe idea of Euler’s method is to\
    \ correct possible errors in the\nevaluation of the ODE when starting from the\
    \ given initial condition.\nFor example, suppose that you want to evaluate an\
    \ ODE at desired point\n*c*, when starting from initial condition *x*[0].\nTo\
    \ make the argument simpler, assume that *x*[0] ≤\n*c*, although the same ideas\
    \ are valid in the other direction. To\nsolve the ODE, the idea of this algorithm\
    \ is to perform the evaluation\nin *N* steps, where *N* is a given parameter.\
    \ As a\nconsequence, the step size is given by\n\n![$$ h=\\frac{c-{x}_0}{N}. $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equd.png)\n\
    \nLet’s assume that the differential equation can be represented as a\nfirst-order\
    \ ODE in the following general form:\n*y*’= *f*(*x*,*y*)\nAlso, the initial condition\n\
