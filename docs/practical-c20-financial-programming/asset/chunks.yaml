- fmt: "### Solution\n\nTo solve this problem, we created a class that can handle\
    \ trading transactions and perform the necessary operations. The class is responsible\
    \ for receiving a filename and executing the instructions stored in the file.\
    \ The class is also responsible for handling any error happening during this process,\
    \ including errors from reading the file as well as incorrect trading requests\
    \ sent to the application.\n\nIn this coding example, the operations allowed are\
    \ simple and include only buy, sell, and sell short. Therefore, I concentrate\
    \ on the problem of processing the file and handling unexpected errors in the\
    \ program. We follow the best practices of using the exception handling mechanism\
    \ offered by C++. Therefore, we create a new class, called `TransactionHandler`,\
    \ which is able to read data from a file and perform the necessary actions in\
    \ the member function `handleTransactions`. The resulting code is able to execute\
    \ the trading actions stored in the file, but it handles possible exceptions using\
    \ the `try`/`catch`/`throw` mechanism supplied by the C++ language as described\
    \ in the next section.\n\n### Exception Handling\n\nOne of the basic problems\
    \ faced by programmers is detecting and recovering from errors. While we try to\
    \ avoid self-inflicted errors, there are many extraordinary situations that need\
    \ to be handled even by correct programs. For example, what should your code do\
    \ when the file system is full and there is no more space to save the current\
    \ file? What can be done when a network connection is closed and the server is\
    \ not available to complete a download? Programmers need to decide on how to respond\
    \ to such exceptional situations, and a few strategies have been devised over\
    \ the years in order to respond to such conditions.\n\nC++ uses an exception-based\
    \ model to deal with unexpected conditions occurring during program execution.\
    \ This model uses a standard `try`/`catch` block to contain the code that you\
    \ may want to protect. When an exception happens, the compiler throws an object\
    \ to indicate the unexpected condition. As a result, the enclosing blocks of code\
    \ will also destroy all local objects that have been created in that particular\
    \ context, to avoid resource leaks.\n\nThe other aspect of exception handling\
    \ in C++ is the use of exception objects that inform programmers about the class\
    \ of error that occurred. These objects are created using the `throw` keyword\
    \ and caught using the `catch` block, which receives a reference to the exception\
    \ object and uses it to understand and possibly recover from an unexpected state.\
    \ Applications are free to create new classes of exceptions as a way to provide\
    \ additional information about the error that triggered the exception.\n\nIn this\
    \ example, I created two exception classes. They both derive from `std::runtime_error`,\
    \ which provides the basic behavior for runtime exceptions. The first class, `FileError`,\
    \ is used to flag any error occurred during the process of reading the file. The\
    \ following is its definition:\n\n```\nclass FileError :public std::runtime_error\
    \ {\npublic:\nFileError (const std::string &description);\n};\n```\n\nThe second\
    \ exception class, `TransactionTypeError`, is thrown when an unknown transaction\
    \ type is found in the file, other than `TRANSACTION_SELL`, `TRANSACTION_BUY`,\
    \ or `TRANSACTION_SHORT`. The definition is similar to what you saw with `FileError`.\
    \ These classes are then used on the test code to determine the type of error\
    \ encountered and how to proceed. In the test application, we just print a descriptive\
    \ error message using the string returned by the `what()` member function before\
    \ terminating the program.\n\n```\ntry\n{\nTransactionHandler handler(fileName);\n\
    }\ncatch (FileError &e)\n{\nstd::cerr << \"received a file error: \" << e.what()\
    \ << std::endl;\n}\ncatch (TransactionTypeError &e)\n{\nstd::cerr << \"received\
    \ a transaction error: \" << e.what() << std::endl;\n}\ncatch (...)\n{\nstd::cerr\
    \ << \"received an unknown error\\n\";\n}\n```\n\n### Complete Code\n\nListing\
    \ 3-4 provides a complete example of exception handling. The classes presented\
    \ here demonstrate how to handle exceptions while reading a transaction file.\
    \ A sample `main()` function, provided at the end, shows how these classes work\
    \ together.\n\n```\n//\n//  TransactionHandler.h\n#ifndef __FinancialSamples__TransactionHandler__\n\
    #define __FinancialSamples__TransactionHandler__\n#include \nenum TransactionType\
    \ {\nTRANSACTION_SELL,\nTRANSACTION_BUY,\nTRANSACTION_SHORT,\n};\nclass FileError\
    \ :public std::runtime_error {\npublic:\nFileError(const std::string &s);\n};\n\
    class TransactionTypeError :public std::runtime_error {\npublic:\nTransactionTypeError(const\
    \ std::string &s);\n};\nclass TransactionHandler {\npublic:\nstatic const std::string\
    \ SELL_OP;\nstatic const std::string BUY_OP;\nstatic const std::string SHORT_OP;\n\
    TransactionHandler(const std::string &fileName);\nTransactionHandler(const TransactionHandler\
    \ &);\n~TransactionHandler();\nTransactionHandler &operator=(const TransactionHandler&);\n\
    void handleTransactions();\nprivate:\nstd::string m_fileName;\n};\n#endif /* defined(__FinancialSamples__TransactionHandler__)\
    \ */\n//\n//  TransactionHandler.cpp\n#include \"TransactionHandler.h\"\n#include\
    \ \nFileError::FileError(const std::string &s)\n: std::runtime_error(s)\n{\n}\n\
    TransactionTypeError::TransactionTypeError(const std::string &s)\n: std::runtime_error(s)\n\
    {\n}\nconst std::string TransactionHandler::SELL_OP = \"SELL\";\nconst std::string\
    \ TransactionHandler::BUY_OP = \"BUY\";\nconst std::string TransactionHandler::SHORT_OP\
    \ = \"SHORT\";\nTransactionHandler::TransactionHandler(const std::string &fileName)\n\
    : m_fileName(fileName)\n{\n}\nTransactionHandler::TransactionHandler(const TransactionHandler\
    \ &a)\n: m_fileName(a.m_fileName)\n{\n}\nTransactionHandler::~TransactionHandler()\n\
    {\n}\nTransactionHandler &TransactionHandler::operator=(const TransactionHandler&a)\n\
    {\nif (this != &a)\n{\nm_fileName = a.m_fileName;\n}\nreturn *this;\n}\nvoid TransactionHandler::handleTransactions()\n\
    {\nstd::ifstream file;\nfile.open(m_fileName, std::ifstream::in);\nif (file.fail())\n\
    {\nthrow new FileError(std::string(\"error opening file \") + m_fileName);\n}\n\
    std::string op;\nfile >> op;\nwhile (file.good() && !file.eof())\n{\nif (op !=\
    \ SELL_OP && op != BUY_OP && op !=  SHORT_OP)\n{\nthrow new TransactionTypeError(std::string(\"\
    unknown transaction \") + op);\n}\n// process remaining transaction data...\n\
    }\n}\n//\n//  main.cpp\n#include \"TransactionHandler.h\"\n#include \nint main(int\
    \ argc, const char **argv)\n{\nif (argc  \\n\";\nreturn 1;\n}\nstd::string fileName\
    \ = argv[1];\ntry\n{\nTransactionHandler handler(fileName);\n}\ncatch (FileError\
    \ &e)\n{\nstd::cerr << \"received a file error: \" << e.what() << std::endl;\n\
    }\ncatch (TransactionTypeError &e)\n{\nstd::cerr << \"received a transaction error:\
    \ \"\n<< e.what() << std::endl;\n}\ncatch (...)\n{\nstd::cerr << \"received an\
    \ unknown error\\n\";\n}\nreturn 0;\n}\n```\n\n### Implementing Vector Operations\n\
    \nIn this section, we implement the common addition and multiplication operators\
    \ defined on numerical vectors.\n\n#### Solution\n\nThis problem can be easily\
    \ solved using the C++ facilities for operator overloading. I first give a general\
    \ introduction to this programming technique and subsequently show how to use\
    \ it to implement numerical vector operations."
