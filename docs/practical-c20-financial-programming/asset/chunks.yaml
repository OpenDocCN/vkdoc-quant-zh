    \n## 使用面向矩阵的操作\n\n在本节中，我们将创建一个类来执行与 BLAS 兼容的矩阵操作。\n\n### 解决方案\n\n正如你从清单 7-1 中了解到的，LA\
    \ 函数旨在与使用标量、向量和矩阵的线性算子配合使用。为了支持这些操作，程序员使用一组与原始 BLAS 库兼容的函数。在 C++ 中，我们可以使用一些实现了\
    \ BLAS 的库，包括你一直在使用的来自 boost 的 uBLAS 库。\n\nBLAS 的第二级负责为矩阵-向量运算提供支持。在本例中，你将看到如何实现使用该级\
    \ BLAS 的函数。你将使用 boost uBLAS 来访问这个功能。\n\n在 BLAS 的第二级，目标是允许向量和矩阵的组合。为了实现这一点，uBLAS\
    \ 实现了一些更高级别的类，这些类整合了 BLAS 框架中定义的概念。以下是使用到的一些最重要的类：\n\n- `Vector`：上一节已经讨论过这个类，它充当向量数据的通用容器。其他一些类对\
    \ `Vector` 的通用功能施加了限制。\n- `稀疏向量`：`Vector` 的一个专门版本，允许以稀疏方式表示数据。当向量中非零元素的数量与数组大小相比很小时，可以使用该类。\n\
    - `Matrix`：这是表示二维数值排列的主要类，是矩阵的传统表示形式。\n- `三角矩阵`：此类用于表示数据仅存储在主对角线或主对角线以上的矩阵（对于上三角矩阵）。你还可以使用\
    \ uBLAS 创建下三角矩阵。\n- `对称矩阵`：此类矩阵的元素关于对角线对称。此类用于在利用此特性的算法中表示这种类型的矩阵。\n- `埃尔米特矩阵`：埃尔米特矩阵具有其元素为复数且基于共轭复数概念存在对称性的特性。也就是说，对于位置\
    \ `[i,j]` 的每个元素，对应的元素 `[j,i]` 是其共轭复数。\n- `带状矩阵`：此类表示稀疏矩阵，其中非零元素存储在主对角线附近的一个窄带中。创建矩阵时可以指定带状的大小。\n\
    - `稀疏矩阵`：表示通用稀疏矩阵的类——即大多数元素为零的矩阵。通过使用稀疏矩阵，可以避免在内存中存储大量零值。\n\n使用这些类，你可以轻松地利用最适合当前任务的数据表示方式来存储数据。使用正确的表示方式还可以让你在找到正确的算法方面获得巨大优势，因为\
    \ uBLAS 会根据所使用的数据类型自动提供其运算符的专用版本。例如，如果已知一个矩阵是三角矩阵，那么在求解方程组时就有可能加快某些计算速度。这意味着使用\
    \ `TriangularMatrix` 而不是通用的 `Matrix` 可以让你的代码得到显著的加速。\n\n为了探索矩阵可用的操作，我介绍一个名为 `MatrixOperations`\
    \ 的类。这个类能够将参数转换为 uBLAS 所需的类。它还负责对这些转换后的参数调用 uBLAS 运算符。使用这个类，你可以轻松地测试多个对矩阵参数进行操作的函数。\n\
    \n在 uBLAS 中与矩阵相关的主要函数和运算符中，你将找到以下内容：\n\n- **标量乘法**：将矩阵乘以标量是一个简单的过程，因为它使用了 C++\
    \ 中的标准乘法运算符。你只需将乘法的结果保存到一个新的矩阵变量中即可。\n- **向量乘法**：将矩阵乘以向量是一种常见操作。你可以使用 `prod` 函数来执行此操作。乘积可以通过两种方式执行：前置乘法要求向量作为\
    \ `prod` 函数的第一个参数；你也可以对向量进行后置乘法，此时向量作为 `prod` 函数的第二个参数传入。\n- **矩阵乘法**：你还可以将两个矩阵相乘。这将得到第三个矩阵，其大小由两个原始矩阵的大小决定。你可以使用\
    \ `prod` 函数的重载版本来执行乘法操作。\n- **逐元素乘法**：此操作对矩阵中每个对应的元素执行乘法。也就是说，给定矩阵 `A` 和 `B`，结果矩阵\
    \ `C` 由元素 `C[i,j] = A[i,j] + B[i,j]` 组成。\n- **转置**：矩阵的转置是一个简单的操作，即将元素 `A[i,j]`\
    \ 与 `A[j,i]` 互换。这会产生一个围绕主对角线对原始矩阵进行转置后的矩阵。\n"
- fmt: "在`MatrixOperations`类中，您将找到这些操作的示例。`MatrixOperations`成员函数的参数和返回值以标准向量（`std::vector`）或`Matrix`对象（您在[第5章](#323908_2_En_5_Chapter.xhtml)中了解过）的形式给出。虽然在高性能代码中应避免这种转换，但您可以将其视为创建uBLAS中声明的类型对象所需的一个示例。例如，考虑`transpose`方法。\n\
    \n```\nMatrix MatrixOperations::transpose()\n{\n    using namespace ublas;\n \
    \   int d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n    matrix M(d1,\
    \ d2);\n    for (int i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2; ++j)\
    \ {\n            M(i, j) = m_rows[i][j];\n        }\n    }\n    matrix mp = trans(M);\n\
    \    return fromMatrix(mp);\n}\n```\n\n第一步是确定需要构建的矩阵的大小，由维度`d1`和`d2`给出。利用此信息，您可以创建一个新的`ublas::matrix`对象。然后，您将使用存储在`m_rows`成员变量中的数据初始化该矩阵。最后，您可以调用uBLAS中的`trans`函数，该函数负责对其参数进行转置操作。最后一步是将uBLAS表示转换为`Matrix`对象，由`fromMatrix`函数执行。\n\
    \n### 完整代码\n\n[清单7-2](#323908_2_En_7_Chapter.xhtml#PC6)展示了`MatrixOperations`类的实现。该代码使用了第[5章](#323908_2_En_5_Chapter.xhtml)中实现的`Matrix`类，因此您需要将其添加到编译行中。\n\
    \n```\n//\n//  MatrixOperations.h\n#ifndef __FinancialSamples__MatrixOperations__\n\
    #define __FinancialSamples__MatrixOperations__\n#include <vector>\n#include \"\
    Matrix.h\"\nclass MatrixOperations {\npublic:\n    MatrixOperations();\n    ~MatrixOperations();\n\
    \    MatrixOperations(const MatrixOperations &p);\n    MatrixOperations &operator=(const\
    \ MatrixOperations &p);\n    void addRow(const std::vector<double> &row);\n  \
    \  Matrix multiply(Matrix &m);\n    Matrix transpose();\n    Matrix elementwiseMultiply(Matrix\
    \ &m);\n    Matrix scalarMultiply(double scalar);\n    std::vector<double> preMultiply(const\
    \ std::vector<double> &v);\n    std::vector<double> postMultiply(const std::vector<double>\
    \ &v);\nprivate:\n    std::vector< std::vector<double> > m_rows;\n};\n#endif /*\
    \ defined(__FinancialSamples__MatrixOperations__) */\n//\n//  MatrixOperations.cpp\n\
    #include \"MatrixOperations.h\"\n#include <iostream>\n#include <boost/numeric/ublas/matrix.hpp>\n\
    #include <boost/numeric/ublas/io.hpp>\nnamespace ublas = boost::numeric::ublas;\n\
    using std::cout;\nusing std::endl;\nMatrixOperations::MatrixOperations()\n{\n\
    }\nMatrixOperations::~MatrixOperations()\n{\n}\nvoid MatrixOperations::addRow(const\
    \ std::vector<double> &row)\n{\n    m_rows.push_back(row);\n}\nstatic Matrix fromMatrix(const\
    \ ublas::matrix<double> &mp)\n{\n    using namespace ublas;\n    int d1 = mp.size1();\n\
    \    int d2 = mp.size2();\n    Matrix res(d1, d2);\n    for (int i = 0; i < d1;\
    \ ++i) {\n        for (int j = 0; j < d2; ++j) {\n            res.set(i, j, mp(i,\
    \ j));\n        }\n    }\n    return res;\n}\nMatrix MatrixOperations::elementwiseMultiply(Matrix\
    \ &m)\n{\n    using namespace ublas;\n    int d1 = m_rows.size();\n    int d2\
    \ = m_rows[0].size();\n    matrix<double> M(d1, d2);\n    for (int i = 0; i <\
    \ d1; ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M(i, j) = m_rows[i][j];\n\
    \        }\n    }\n    matrix<double> M2(d1, d2);\n    for (int i = 0; i < d1;\
    \ ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M2(i, j) = m.get(i,\
    \ j);\n        }\n    }\n    matrix<double> mp = element_prod(M, M2);\n    return\
    \ fromMatrix(mp);\n}\nMatrix MatrixOperations::transpose()\n{\n    using namespace\
    \ ublas;\n    int d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n    matrix<double>\
    \ M(d1, d2);\n    for (int i = 0; i < d1; ++i) {\n        for (int j = 0; j <\
    \ d2; ++j) {\n            M(i, j) = m_rows[i][j];\n        }\n    }\n    matrix<double>\
    \ mp = trans(M);\n    return fromMatrix(mp);\n}\nMatrix MatrixOperations::multiply(Matrix\
    \ &m)\n{\n    using namespace ublas;\n    int d1 = m_rows.size();\n    int d2\
    \ = m_rows[0].size();\n    matrix<double> M(d1, d2);\n    for (int i = 0; i <\
    \ d1; ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M(i, j) = m_rows[i][j];\n\
    \        }\n    }\n    matrix<double> M2(d1, d2);\n    for (int i = 0; i < d1;\
    \ ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M2(i, j) = m.get(i,\
    \ j);\n        }\n    }\n    matrix<double> mp = prod(M, M2);\n    return fromMatrix(mp);\n\
    }\nMatrix MatrixOperations::scalarMultiply(double scalar)\n{\n    using namespace\
    \ ublas;\n    int d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n    matrix<double>\
    \ M(d1, d2);\n    for (int i = 0; i < d1; ++i) {\n        for (int j = 0; j <\
    \ d2; ++j) {\n            M(i, j) = m_rows[i][j];\n        }\n    }\n    matrix<double>\
    \ mp = scalar * M;\n    return fromMatrix(mp);\n}\nstd::vector<double> MatrixOperations::preMultiply(const\
    \ std::vector<double> &v)\n{\n    using namespace ublas;\n    ublas::vector<double>\
    \ vec;\n    std::copy(v.begin(), v.end(), vec.end());\n    int d1 = m_rows.size();\n\
    \    int d2 = m_rows[0].size();\n    ublas::matrix<double> M(d1, d2);\n    for\
    \ (int i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2; ++j) {\n       \
    \     M(i, j) = m_rows[i][j];\n        }\n    }\n    ublas::vector<double> pv\
    \ = prod(vec, M);\n    std::vector<double> res;\n    std::copy(pv.begin(), pv.end(),\
    \ res.end());\n    return res;\n}\nstd::vector<double> MatrixOperations::postMultiply(const\
    \ std::vector<double> &v)\n{\n    using namespace ublas;\n    ublas::vector<double>\
    \ vec;\n    std::copy(v.begin(), v.end(), vec.end());\n    int d1 = m_rows.size();\n\
    \    int d2 = m_rows[0].size();\n    ublas::matrix<double> M(d1, d2);\n    for\
    \ (int i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2; ++j) {\n       \
    \     M(i, j) = m_rows[i][j];\n        }\n    }\n    ublas::vector<double> pv\
    \ = prod(M, vec);\n    std::vector<double> res;\n    std::copy(pv.begin(), pv.end(),\
    \ res.end());\n    return res;\n}\nint main()\n{\n    MatrixOperations op;\n \
    \   for (int i=0; i<5; ++i) {\n        std::vector<double> row;\n        for (int\
    \ j=0; j<5; ++j) {\n            row.push_back(sin((double)j+i));\n        }\n\
    \        op.addRow(row);\n    }\n    op.transpose();\n    Matrix res = op.scalarMultiply(12);\n\
    \    return 0;\n}\n```\n\n*清单7-2 `MatrixOperations.h`和`MatrixOperations.cpp`*\n\
    \n### 运行应用程序\n\n[清单7-2](#323908_2_En_7_Chapter.xhtml#PC6)中显示的代码可以使用任何符合标准的C++编译器进行编译。您需要在系统中安装`boost`才能访问uBLAS（我使用了1.55版本，在Windows\
    \ MingW和Mac OS X上测试过）。例如，在UNIX系统上使用`gcc`编译器可以通过以下命令完成：\n\n```\ngcc –o matrixOp\
    \ matrixOperations.cpp\n```\n\n这将生成一个名为`matrixOp`的应用程序。您可以通过以下方式运行生成的应用程序：\n\n\
    ```\n./matrixOp\n```\n\n这将运行测试的`main`函数，该函数应打印出所请求操作的结果。在我的系统上，我得到了以下结果：\n\n```\n\
    0 10.0977 10.9116 1.69344 -9.08163\n10.0977 10.9116 1.69344 -9.08163 -11.5071\n\
    10.9116 1.69344 -9.08163 -11.5071 -3.35299\n1.69344 -9.08163 -11.5071 -3.35299\
    \ 7.88384\n-9.08163 -11.5071 -3.35299 7.88384 11.8723\n```\n\n### 计算矩阵的行列式\n\n\
    编写C++代码，使用uBLAS中的类计算矩阵的行列式。"
  raw: "In the `MatrixOperations`\nclass , you will\nfind examples of each of these\
