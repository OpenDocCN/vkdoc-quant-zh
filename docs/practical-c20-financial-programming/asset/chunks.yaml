    \ and Implementation for Class FileManager\n```"
  trans: "\nC 和 C++ 语言传统上在其所实现的各个平台中，都提供了各自独有的文件处理接口。为此，平台厂商创建了独立的库，从而导致了如 UNIX 及其他符合\
    \ Posix 标准的系统、Windows、OS/2、VMS 等操作系统拥有不同的接口。然而，这些接口之间的差异使得应用难以跨系统移植。实际上，应用程序编写者创建了抽象层，这些抽象层根据需要与每个不同的系统进行交互。\n\
    \nSTL 中的 `filesystem` 库旨在提供一组用于文件操作的跨平台类和模板。可以使用相同的类和模板来处理 STL 所支持的各个平台上的文件。这减少了应用程序程序员的工作量，同时生成的代码可以安全地复用于其他平台。\n\
    \n该库的主要组件包含在 `std::filesystem` 命名空间中。这些组件允许你对文件和目录执行常用操作。该库中包含的类可以轻松支持诸如复制、移动、更改权限和删除等操作。接下来，我将向你展示其中一些重要的组件，以及如何使用它们编写操作文件系统内容的代码。\n\
    \n`std::filesystem::path` 类表示文件系统中的路径。拥有一个路径类很有意义，因为它允许程序员在使用同一个对象的同时，表示不同系统中的目录路径。例如，UNIX\
    \ 系统中的路径使用“/”分隔符，而在 Windows 中，则使用“\\”分隔符。为避免与这些不同约定相关的问题，`filesystem` 库使用了一种通用表示。库中提供的许多函数随后都使用了\
    \ `path` 类。\n\n`filesystem` 库的另一个重要概念是目录迭代器。你可以使用 `directory_iterator` 函数为特定路径创建一个迭代器。该函数返回一个迭代器对象，该对象具有\
    \ `++` 和 `--` 等运算符，允许程序员在给定目录的元素之间移动。\n\n除了为路径和迭代器提供合适的抽象外，`filesystem` 库还提供了一组函数，可用于对文件和目录执行单个更改。这些函数包括以下内容：\n\
    \n*   `is_regular_file`：如果提供的路径指向一个普通文件（而非目录），则返回 true\n*   `is_directory`：如果路径指向一个目录，则返回\
    \ true\n*   `file_size`：返回作为参数传入的文件名的大小，以字节为单位\n*   `exists`：如果作为参数传入的路径在文件系统中存在，则返回\
    \ true\n*   `status`：返回一个 `file_status` 对象，该对象封装了给定文件的属性，例如可见性和类型\n*   `create_directory`：在文件系统中创建一个具有指定路径的新目录\n\
    *   `copy`：将指定路径复制到第二个参数指示的位置\n*   `remove`：从文件系统中移除指定路径\n*   `current_path`：返回一个\
    \ `path` 对象，指示应用程序当前使用的路径\n\n这些函数可以轻松组合以操作文件系统。我使用其中一些函数来实现 `FileManager` 类所需的所有功能。例如，以下是\
    \ `getContents` 成员函数的编码方式：\n\n```\nstd::vector FileManager::getContents(const\
    \ std::string &prefix)\n{\nstd::vector results;\npath aPath(prefix);\nif (!is_directory(aPath))\n\
    {\nstd::cout << \"not a directory \" << prefix << std::endl;\nreturn results;\n\
    }\nstd::vector<path> contents;\ncopy(directory_iterator(aPath), directory_iterator(),\
    \ back_inserter(contents));\nfor (int i=0; i<contents.size(); ++i)\n{\nresults.push_back(contents[i].string());\n\
    }\nreturn results;\n}\n```\n\n第一步是根据作为参数传入的字符串创建一个路径对象。一旦创建了路径，就可以使用 `is_directory`\
    \ 函数测试它是否指向一个目录。如果路径正确，那么可以使用 `directory_iterator` 函数创建一个迭代器对象，该对象被传递给 `copy`\
    \ 函数。`copy` 函数的唯一工作是将迭代器指向的每个元素复制到 `contents` 向量中。然后，该容器中的元素被转换为字符串并添加到 `results`\
    \ 向量中。\n\n最后，可以使用以下代码将文件从一个目录复制到指定目的地的函数添加到 `FileManager` 类中：\n\n```\nvoid FileManager::copyToTempDirectory(const\
    \ std::string &prefix)\n{\npath tmpPath(\"/tmp/\");\npath aPath(prefix);\nif (!is_directory(aPath))\n\
    {\nstd::cout << \"not a directory \" << prefix << std::endl;\nreturn;\n}\nlistContents(prefix);\n\
    for (auto it = directory_iterator(aPath); it != directory_iterator(); ++it)\n\
    {\nif (is_regular_file(it->path()))\n{\ncopy_file(it->path(), tmpPath);\n}\n}\n\
    }\n```\n\n这里，你首先检查给定的路径前缀，以确保它是对一个目录的引用。然后，我添加了一些代码，以日志形式列出内容。下一步是使用 `directory_iterator`\
    \ 函数返回的迭代器遍历目录中的内容。对于目录中的每个元素，你可以测试它是否是一个常规文件，然后使用 `copy_file` 函数执行复制。\n\n## 完整代码\n\
    \n你可以在代码清单 4-3 中看到 `FileManager` 类的完整定义。在代码清单的末尾，你可以看到一个如何在 `main()` 函数中使用该类的示例。\n\
    \n```\n//\n//  FileManager.h\n#ifndef __FinancialSamples__FileManager__\n#define\
    \ __FinancialSamples__FileManager__\n#include \n#include \nclass FileManager {\n\
    public:\nFileManager(const std::string &basePath);\nFileManager(const FileManager\
    \ &);\n~FileManager();\nFileManager &operator=(const FileManager &);\nvoid removeFiles();\n\
    std::vector getDirectoryContents();\nvoid listContents();\nvoid copyToTempDirectory(const\
    \ std::string &prefix);\nprivate:\nstd::string m_basePath;\n};\n#endif /* defined(__FinancialSamples__FileManager__)\
    \ */\n//\n//  FileManager.cpp\n#include \"FileManager.h\"\n#include \n#include\
    \ \nusing namespace std::filesystem;\nFileManager::FileManager(const std::string\
    \ &basePath)\n: m_basePath(basePath)\n{\n}\nFileManager::FileManager(const FileManager\
    \ &v)\n: m_basePath(v.m_basePath)\n{\n}\nFileManager::~FileManager()\n{\n}\nFileManager\
    \ &FileManager::operator=(const FileManager &v)\n{\nif (this != &v)\n{\nm_basePath\
    \ = v.m_basePath;\n}\nreturn *this;\n}\nvoid FileManager::removeFiles()\n{\nstd::vector\
    \ files = getDirectoryContents();\nfor (unsigned i=0; i<files.size(); ++i)\n{\n\
    path aPath(files[i]);\nif (!remove(aPath))\n{\nstd::cout << \"could not remove:\
    \ \" << files[i] << std::endl;\n}\n}\n}\nstd::vector FileManager::getDirectoryContents()\n\
    {\nstd::vector results;\npath aPath(m_basePath);\nif (!is_directory(aPath))\n\
    {\nstd::cout << \"not a directory \" << m_basePath << std::endl;\nreturn results;\n\
    }\nstd::vector<path> contents;\ncopy(directory_iterator(aPath), directory_iterator(),\
    \ back_inserter(contents));\nfor (unsigned i=0; i<contents.size(); ++i)\n{\nresults.push_back(contents[i].string());\n\
    }\nreturn results;\n}\nvoid FileManager::listContents()\n{\nstd::vector<path>\
    \ contents;\npath aPath(m_basePath);\ncopy(directory_iterator(aPath), directory_iterator(),\
    \ back_inserter(contents));\nfor (unsigned i=0; i < contents.size(); ++i)\n{\n\
    std::cout << contents[i].string() << std::endl;\n}\n}\nvoid FileManager::copyToTempDirectory(const\
    \ std::string &prefix)\n{\npath tmpPath(\"/tmp/\");\npath aPath(prefix);\nif (!is_directory(aPath))\n\
    {\nstd::cout << \"not a directory \" << prefix << std::endl;\nreturn;\n}\nlistContents();\n\
    std::vector contents = getDirectoryContents();\nfor (auto it = directory_iterator(aPath);\
    \ it != directory_iterator(); ++it)\n{\nif (is_regular_file(it->path()))\n{\n\
    copy_file(it->path(), tmpPath);\n}\n}\n}\nint main()\n{\n// 为 /tmp 目录创建一个 FileManager\
    \ 对象\n//\nFileManager fm(\"/tmp/\");\nstd::vector contents = fm.getDirectoryContents();\n\
    std::cout << \"entries: \" << std::endl;\nfor (std::string entry : contents)\n\
    {\nstd::cout << entry << std::endl;\n}\nreturn 0;\n}\n```\n\n代码清单 4-3\n类 FileManager\
    \ 的定义和实现\n"
- fmt: '### Running the Code


    The class `FileManager` presented in Listing [4-3](#323908_2_En_4_Chapter.xhtml#PC12)
    can be built using any standard C++ compiler, such as `gcc` or Visual Studio.
    No extra library will be needed to use the `std::filesystem` classes if you use
    a recent compiler (at least C++17). Many modern Linux distributions already include
    recent versions of `gcc`, but if you use other operating systems, check for support.


    For example, the command line necessary to build this class using `gcc` in my
    system is


    ```

    gcc -o FileManager FileManager.cpp

    ```


    Once the application is generated, you can run it on a UNIX system as


    ```

    ./FileManager

    ```


    This will display a list of files stored in the `/tmp` directory (you can change
    that directory as necessary to test on a path in your own system).


    ## Handling Dates


    Let’s see how to create a class that can be used to determine trading days for
    common securities, which are negotiated from Monday to Friday.


    ### Solution


    Dates are such a common part of financial data that you should have a well-defined
    way to deal with them. Dates are an integral part of historical prices, as well
    as important events for equity analysis, such as earnings releases, dividends,
    price splits, and other regulatory actions. The same can be said about fixed income,
    derivatives, and other investment classes. C++ provides a wealth of features that
    can be used to store, calculate, and transform dates from one format to another.


    Although there are many time- and date-related functions and classes in C++, many
    of these mechanisms have been inherited from C standard libraries and are not
    as easy to use as other components of the STL. To smooth this process of integration
    with the STL, the boost repository includes a `date_time` library that specializes
    in handling different representations of dates, as well as providing the basic
    support for calculations based on different date formats.


    To solve the problem posed in this section, you will use a class called `Date`,
    which encapsulates the concept of date as used by the application. The member
    variables are simply three values representing the year, month, and day. There
    is also the concept of days of the week, which are encoded in an enumeration.


    ```

    enum class DayOfWeek {

    Sun,

    Mon,

    Tue,

    Wed,

    Thu,

    Fri,

    Sat

    };

    ```


    The `Date` class exposes a number of member functions that can be used to answer
    common requests, such as `getDayOfWeek`, which returns the day of the week for
    the current date, and `isLeapYear`, which tells if a year has 29 days in February.
    Here is a quick list of member functions for `Date`.


    ```

    Date(int year, int month, int day);

    ~Date();

    bool isLeapYear();

    Date &operator++();

    bool operator<(const Date &d);

    DayOfWeek getDayOfWeek();

    int daysInterval(const Date &);

    bool isTradingDay();

    ```


    The `isLeapYear` method implementation uses the well-known definition of leap
    year, which considers years that are divisible by 4, 100, and 400:


    ```

    bool Date::isLeapYear()

    {

    if (m_year % 4 != 0) return false;

    if (m_year % 100 != 0) return true;

    if (m_year % 400 != 0) return false;

    return true;

    }

    ```


    The `getDayOfWeek` finds the day of the week for any date after January 1, 1900
    (a Monday). It does so by counting the days since that date and updating the years,
    months, and days as necessary. The task of correctly adding to the current date
    is handled in `operator +`.


    Finally, the `Date` class computes the difference between dates using the help
    of the `date_time` library from boost. In `date_time`, dates are classified according
    to a calendar. The calendar used in the Western world is called the Gregorian
    calendar. It can be used after you include the following header file:


    ```

    #include <boost/date_time/gregorian/gregorian.hpp>

    ```


    The `date_time` library defines a few generic data types that can be used for
    date manipulation. In this example, we are interested in the `date` and `date_duration`
    types. The `date` type is just a representation of a date and can be initialized
    with a year, month, and day. The `date_duration` is used to store the difference
    between dates. A duration type can be converted to an integer type using the `days()`
    member function. Here is how you can implement `daysInterval`:


    ```

    int Date::daysInterval(const Date &d)

    {

    date bdate1(m_year, m_month, m_day);

    date bdate2(d.m_year, d.m_month, d.m_day);

    boost::gregorian::date_duration duration = bdate1 - bdate2;

    return (int) duration.days();

    }

    ```


    Complete Code


    You can see the complete code for the class `Date` in Listing [4-4](#323908_2_En_4_Chapter.xhtml#PC20).
    Listing [4-4](#323908_2_En_4_Chapter.xhtml#PC20) includes a header file and an
    implementation file for the class. You will also see a `main()` function that
    creates two objects of type `Date` and performs some simple operations with them.'
