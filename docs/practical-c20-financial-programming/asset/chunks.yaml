  trans: "\n### 解决方案\n\n为解决这个问题，我们创建了一个能处理交易事务并执行必要操作的类。该类负责接收文件名并执行文件中存储的指令，同时负责处理此过程中发生的任何错误，包括文件读取错误以及发送给应用程序的错误交易请求。\n\
    \n在此编码示例中，允许的操作很简单，仅包括买入、卖出和卖空。因此，我将重点放在处理文件和应对程序中意外错误的问题上。我们遵循使用 C++异常处理机制的最佳实践，创建了一个名为`TransactionHandler`的新类，该类能够从文件中读取数据，并在成员函数`handleTransactions`中执行必要的操作。最终的代码能够执行文件中存储的交易操作，并使用\
    \ C++语言提供的`try`/`catch`/`throw`机制处理可能出现的异常，详情见下一节。\n\n### 异常处理\n\n程序员面临的基本问题之一是检测错误并从错误中恢复。虽然我们努力避免自身造成的错误，但即使正确的程序也需要处理许多异常情况。例如，当文件系统已满、没有更多空间保存当前文件时，代码应该怎么办？当网络连接关闭，服务器无法完成下载时，又能做些什么？程序员需要决定如何应对此类异常情况，多年来已设计出多种策略来应对这些状况。\n\
    \nC++采用基于异常的模型来处理程序执行期间出现的意外情况。该模型使用标准的`try`/`catch`块来封装需要保护的代码。当异常发生时，编译器会抛出一个对象来指示意外情况。因此，包围的代码块也会销毁在该特定上下文中创建的所有局部对象，以避免资源泄露。\n\
    \nC++异常处理的另一个方面是使用异常对象来告知程序员所发生错误的类别。这些对象使用`throw`关键字创建，并通过`catch`块捕获，该块接收异常对象的引用，并利用它来理解并可能从意外状态中恢复。应用程序可以自由创建新的异常类，以提供关于触发异常的错误的额外信息。\n\
    \n在此示例中，我创建了两个异常类。它们都派生自`std::runtime_error`，该类提供了运行时异常的基本行为。第一个类`FileError`用于标记读取文件过程中发生的任何错误。其定义如下：\n\
    \n```\nclass FileError :public std::runtime_error {\npublic:\nFileError (const\
    \ std::string &description);\n};\n```\n\n第二个异常类`TransactionTypeError`在文件中发现除`TRANSACTION_SELL`、`TRANSACTION_BUY`或`TRANSACTION_SHORT`之外的未知交易类型时抛出。其定义与`FileError`类似。这些类随后在测试代码中用于确定遇到的错误类型以及后续操作。在测试程序中，我们在终止程序前仅使用`what()`成员函数返回的字符串打印一条描述性的错误信息。\n\
    \n```\ntry\n{\nTransactionHandler handler(fileName);\n}\ncatch (FileError &e)\n\
    {\nstd::cerr << \"received a file error: \" << e.what() << std::endl;\n}\ncatch\
    \ (TransactionTypeError &e)\n{\nstd::cerr << \"received a transaction error: \"\
    \ << e.what() << std::endl;\n}\ncatch (...)\n{\nstd::cerr << \"received an unknown\
    \ error\\n\";\n}\n```\n\n### 完整代码\n\n清单 3-4 提供了一个关于异常处理的完整示例。这里展示的类演示了在读取交易文件时如何处理异常。末尾提供了一个示例`main()`函数，展示了这些类如何协同工作。\n\
    \n```\n//\n//  TransactionHandler.h\n#ifndef __FinancialSamples__TransactionHandler__\n\
    #define __FinancialSamples__TransactionHandler__\n#include \nenum TransactionType\
    \ {\nTRANSACTION_SELL,\nTRANSACTION_BUY,\nTRANSACTION_SHORT,\n};\nclass FileError\
    \ :public std::runtime_error {\npublic:\nFileError(const std::string &s);\n};\n\
    class TransactionTypeError :public std::runtime_error {\npublic:\nTransactionTypeError(const\
    \ std::string &s);\n};\nclass TransactionHandler {\npublic:\nstatic const std::string\
    \ SELL_OP;\nstatic const std::string BUY_OP;\nstatic const std::string SHORT_OP;\n\
    TransactionHandler(const std::string &fileName);\nTransactionHandler(const TransactionHandler\
    \ &);\n~TransactionHandler();\nTransactionHandler &operator=(const TransactionHandler&);\n\
    void handleTransactions();\nprivate:\nstd::string m_fileName;\n};\n#endif /* defined(__FinancialSamples__TransactionHandler__)\
    \ */\n//\n//  TransactionHandler.cpp\n#include \"TransactionHandler.h\"\n#include\
    \ \nFileError::FileError(const std::string &s)\n: std::runtime_error(s)\n{\n}\n\
    TransactionTypeError::TransactionTypeError(const std::string &s)\n: std::runtime_error(s)\n\
    {\n}\nconst std::string TransactionHandler::SELL_OP = \"SELL\";\nconst std::string\
    \ TransactionHandler::BUY_OP = \"BUY\";\nconst std::string TransactionHandler::SHORT_OP\
    \ = \"SHORT\";\nTransactionHandler::TransactionHandler(const std::string &fileName)\n\
    : m_fileName(fileName)\n{\n}\nTransactionHandler::TransactionHandler(const TransactionHandler\
    \ &a)\n: m_fileName(a.m_fileName)\n{\n}\nTransactionHandler::~TransactionHandler()\n\
    {\n}\nTransactionHandler &TransactionHandler::operator=(const TransactionHandler&a)\n\
    {\nif (this != &a)\n{\nm_fileName = a.m_fileName;\n}\nreturn *this;\n}\nvoid TransactionHandler::handleTransactions()\n\
    {\nstd::ifstream file;\nfile.open(m_fileName, std::ifstream::in);\nif (file.fail())\n\
    {\nthrow new FileError(std::string(\"error opening file \") + m_fileName);\n}\n\
    std::string op;\nfile >> op;\nwhile (file.good() && !file.eof())\n{\nif (op !=\
    \ SELL_OP && op != BUY_OP && op !=  SHORT_OP)\n{\nthrow new TransactionTypeError(std::string(\"\
    unknown transaction \") + op);\n}\n// process remaining transaction data...\n\
    }\n}\n//\n//  main.cpp\n#include \"TransactionHandler.h\"\n#include \nint main(int\
    \ argc, const char **argv)\n{\nif (argc  \\n\";\nreturn 1;\n}\nstd::string fileName\
    \ = argv[1];\ntry\n{\nTransactionHandler handler(fileName);\n}\ncatch (FileError\
    \ &e)\n{\nstd::cerr << \"received a file error: \" << e.what() << std::endl;\n\
    }\ncatch (TransactionTypeError &e)\n{\nstd::cerr << \"received a transaction error:\
    \ \"\n<< e.what() << std::endl;\n}\ncatch (...)\n{\nstd::cerr << \"received an\
    \ unknown error\\n\";\n}\nreturn 0;\n}\n```\n\n### 实现向量运算\n\n在本节中，我们实现数值向量上定义的常见加法和乘法运算符。\n\
    \n#### 解决方案\n\n利用 C++的运算符重载功能可以轻松解决此问题。首先我会对这种编程技巧进行通用介绍，然后展示如何用它来实现数值向量运算。\n"
- fmt: "### Operator Overloading\n\nOperators are used in most programming languages\
    \ to provide a simpler syntax for common operations. For example, the `+` operator\
    \ is used to implement the addition of numbers without the need for a function\
    \ called `sum`. So, one can type the following expression:\n\n```\nint total =\
    \ a + b + c + d;\n```\n\ninstead of the less convenient version:\n\n```\nint total\
    \ = sum(a, sum(b, sum(c, d)));\n```\n\nSimilarly, other operators perform comparable\
    \ tasks for other primitive operations, such as subtraction, multiplication, logical\
    \ comparison, and pointer arithmetic.\n\nWhile operators are available in most\
    \ modern programming languages, C++ is one of the few languages that allow programmers\
    \ to redefine the meaning of existing operators to adapt them to the most natural\
    \ usage in the target domain. For example, in an application where vectors of\
    \ numbers are a common data structure, it makes sense to redefine the `+` operator\
    \ to perform the sum of vectors in addition to the traditional usage of adding\
    \ numeric (scalar) values.\n\nC++ allows the definition of operators for each\
    \ new declared type. Operators can be defined as part of a class (as a member\
    \ function) or as a freestanding function. For example, consider the class `Complex`\
    \ that redefines the `+` operator. The declaration for the operator can be written\
    \ as:\n\n```\nclass complex {\npublic:\n// ... other methods here\ncomplex &operator\
    \ +(const complex &v);\n};\n```\n\nAnother way of writing the same operator is\
    \ using a free function:\n\n```\nComplex &operator +(const complex &a, const complex\
    \ &b);\n```\n\nThe difference between these two declarations is that the latter\
    \ declares a function that receives two parameters, while the member function\
    \ version requires only one additional parameter (the first parameter is the object\
    \ itself). Similarly, you can declare new versions of most C++ operators, including\
    \ math, logical, and pointer operators.\n\nTo solve the problem posed, we created\
    \ a new class called `NumVector`, a simple numerical vector that can be used to\
    \ store double numbers. To provide operations that can be applied to a vector\
    \ in a natural way, we use operators that are declared as free functions:\n\n\
    ```\nNumVector operator +(const NumVector &a, const NumVector &b);\nNumVector\
    \ operator -(const NumVector &a, const NumVector &b);\nNumVector operator *(const\
    \ NumVector &a, const NumVector &b);\n```\n\nThe class also provides a few member\
    \ functions that are used in the implementation of these operations. In particular,\
    \ you will want to have the member functions `add`, which adds a new element to\
    \ the vector; `removeLast`, which removes the last element; `get`, which returns\
    \ one of the elements given a position (index); and finally a `size` member function,\
    \ which returns the size of the vector.\n\nAll operators are implemented in a\
    \ similar way: they all check that the two parameters have the same size and then\
    \ perform a loop that is used to perform the required operation—addition, subtraction,\
    \ or multiplication.\n\n### Complete Code\n\nListing [3-5](#323908_2_En_3_Chapter.xhtml#PC28)\
    \ provides a sample implementation of a numeric vector. You can use this class\
    \ to create numerical vectors and perform common vector operations.\n\n```\n//\n\
    //  NumVector.h\n#ifndef __FinancialSamples__NumVector__\n#define __FinancialSamples__NumVector__\n\
    #include \nclass NumVector {\npublic:\nNumVector();\n~NumVector();\nNumVector(const\
    \ NumVector &);\nNumVector &operator =(const NumVector &);\nvoid add(double val);\n\
    void removeLast();\ndouble get(int pos) const;\nsize_t size() const;\nprivate:\n\
    std::vector m_values;\n};\nNumVector operator +(const NumVector &a, const NumVector\
    \ &b);\nNumVector operator -(const NumVector &a, const NumVector &b);\nNumVector\
    \ operator *(const NumVector &a, const NumVector &b);\n#endif /* defined(__FinancialSamples__NumVector__)\
    \ */\n//\n//  NumVector.cpp\n#include \"NumVector.h\"\n#include \nNumVector::NumVector()\n\
    {\n}\nNumVector::~NumVector()\n{\n}\nNumVector::NumVector(const NumVector &v)\n\
    : m_values(v.m_values)\n{\n}\nNumVector &NumVector::operator=(const NumVector\
    \ &v)\n{\nif (this != &v)\n{\nm_values = v.m_values;\n}\nreturn *this;\n}\nsize_t\
    \ NumVector::size() const\n{\nreturn m_values.size();\n}\ndouble NumVector::get(int\
    \ pos) const\n{\nreturn m_values[pos];\n}\nvoid NumVector::add(double val)\n{\n\
    m_values.push_back(val);\n}\nvoid NumVector::removeLast()\n{\nm_values.pop_back();\n\
    }\nNumVector operator +(const NumVector &a, const NumVector &b)\n{\nif (a.size()\
    \ != b.size())\n{\nthrow new std::runtime_error(\"vectors must have the same size\"\
    );\n}\nNumVector result;\nfor (int i=0; i<a.size(); ++i)\n{\nresult.add(a.get(i)\
    \ + b.get(i));\n}\nreturn result;\n}\nNumVector operator -(const NumVector &a,\
    \ const NumVector &b)\n{\nif (a.size() != b.size())\n{\nthrow new std::runtime_error(\"\
    vectors must have the same size\");\n}\nNumVector result;\nfor (int i=0; i<a.size();\
    \ ++i)\n{\nresult.add(a.get(i) - b.get(i));\n}\nreturn result;\n}\nNumVector operator\
    \ *(const NumVector &a, const NumVector &b)\n{\nif (a.size() != b.size())\n{\n\
    throw new std::runtime_error(\"vectors must have the same size\");\n}\nNumVector\
    \ result;\nfor (int i=0; i<a.size(); ++i)\n{\nresult.add(a.get(i) * b.get(i));\n\
    }\nreturn result;\n}\nListing 3-5\nNumVector.h\n```"
