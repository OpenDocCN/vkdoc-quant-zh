    \ such as Windows. To compile and link your application using gcc, for example,\
    \ the following command line would provide the necessary information:\n\n```\n\
    $ gcc -o qtExample QtPlotter.cpp -I/usr/local/qt4/include –L/usr/local/qt4/lib\
    \ –lQtGui -lQtCore\n```\n\n## Conclusion\n\nIn this chapter, you learned a few\
    \ techniques to plot financial data using C++. Visualization is one of the factors\
    \ that shouldn't be overlooked in the creation of efficient investment strategies.\
    \ The better your visualization facilities, the easier it is to spot trends and\
    \ opportunities in the markets. While there are many free and commercial alternatives\
    \ to display stock charts, we frequently need to present data in a more flexible\
    \ way.\n\nI started the chapter with a recipe for creating numerical plots using\
    \ Gnuplot. Gnuplot is a free, widely available package for data visualization,\
    \ which runs in most operating systems, including Windows, Mac OS X, and UNIX.\
    \ You have seen how to create a class that encapsulates the information necessary\
    \ to create graphs in Gnuplot.\n\nThe next section gave you another approach to\
    \ create your own financial plots, using a C++ graphical library called Qt. You\
    \ can employ this type of code in multiple platforms, taking advantage of the\
    \ high portability of the underlying framework. The `QtPlotter` class presented\
    \ here exposes an interface that your program can use to display a single plot\
    \ based on values for the x and y axis.\n\nMany of the algorithms in finance depend\
    \ on the solution of systems of equations, which are based on linear algebra concepts.\
    \ For the developer on the financial industry, it is very useful to have a basic\
    \ knowledge of linear algebra and its software implementations. These concepts\
    \ can be viewed as the building blocks used by financial engineers and can be\
    \ easily accessed in C++. In the next chapter, you will see a few programming\
    \ examples that make use of linear algebra concepts as part of financial applications.\n\
    \n## 7. Linear Algebra\n\nLinear algebra is a fundamental set of mathematical\
    \ tools that has applications in many areas of science and engineering. Consequently,\
    \ linear algebra (LA) techniques also play an important role in the practice of\
    \ financial programming, and they are frequently used throughout the area of financial\
    \ engineering. LA-based techniques are frequently used in the development of trading\
    \ strategies.\n\nAs C++ programmers, it is important to understand how the traditional\
    \ methods of linear algebra can be integrated in financial applications. With\
    \ this goal in mind, I present a few examples that show how to use some of the\
    \ most common LA algorithms along with other C++ libraries. In this chapter, you\
    \ will also learn how to integrate existing LA libraries into your code, with\
    \ special attention to the uBLAS library included with boost.\n\nThe following\
    \ are some topics that we cover in this chapter:\n\n- **Basic operations of linear\
    \ algebra**: You will learn how to use the fundamental functions of linear algebra\
    \ in your code.\n- **BLAS (basic linear algebra subprograms) library overview**:\
    \ BLAS is a well-known set of functions that are nowadays the standard for LA\
    \ implementations. You will learn about the three levels of BLAS support along\
    \ with their functionality.\n- **uBLAS**: BLAS is function-based library, which\
    \ has been used in languages such as Fortran and C. To use the higher-level concepts\
    \ of modern C++, the boost project has created a new implementation. You will\
    \ learn how the uBLAS library implements the same concepts present on BLAS.\n\
    - **Computing determinants**: Calculating the determinant of a matrix is one of\
    \ the most common tasks when analyzing a set of linear equations. You will learn\
    \ how to use uBLAS to perform this type of LA computation.\n- **Converting between\
    \ standard types and uBLAS types**: You will see how to convert standard types\
    \ such as `std::vector` into types that are more appropriate for LA computations.\n\
    \n## Using Basic Linear Algebra Operations\n\nCreate a class that performs basic\
    \ LA operations such as vector and scalar products."
