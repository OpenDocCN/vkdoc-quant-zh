    \ to port applications across systems. Application writers have, in practice,\
    \ created abstraction layers that interact with each different system as needed.\n\
    \nThe `filesystem` library in STL is an attempt to provide a set of cross-platform\
    \ classes and templates for file manipulation. The same classes and templates\
    \ can be used to handle files in each of the platforms supported by the STL. This\
    \ reduces the amount of work by application programmers, while the resulting code\
    \ can be reused in other platforms without risks.\n\nThe main components of the\
    \ library are included in the `std::filesystem` namespace. These components allow\
    \ you to perform common operations on files and directories. The classes included\
    \ in the library easily support operations such as copying, moving, changing permissions,\
    \ and removing. Next, I show you some of these important components and how they\
    \ can be used to write code to manipulate file system contents.\n\nThe `std::filesystem::path`\
    \ class represents a path in the file system. Having a path class is interesting\
    \ because it lets programmers represent directory paths in different systems while\
    \ using the same object. For example, paths in a UNIX system use the “/” separator,\
    \ while in Windows, the “\\” separator is used. To avoid problems associated with\
    \ these different conventions, the `filesystem` library uses a common representation.\
    \ The class `path` is then used by many of the functions provided in the library.\n\
    \nThe other important concept of the `filesystem` library is that of directory\
    \ iterators. You can create an iterator for a particular path using the `directory_iterator`\
    \ function. This function returns an iterator object, which has operators such\
    \ as `++` and `--`, allowing programmers to move between elements of the given\
    \ directory.\n\nOther than suitable abstractions for paths and iterators, the\
    \ `filesystem` library provides a set of functions that can be used to perform\
    \ individual changes to files and directories. These functions include the following:\n\
    \n*   `is_regular_file`: Returns true if the path supplied indicates a regular\
    \ file (instead of a directory)\n\n*   `is_directory`: Returns true if the path\
    \ indicates a directory\n\n*   `file_size`: Returns the size of the filename passed\
    \ as argument, in bytes\n\n*   `exists`: Returns true if the path passed as argument\
    \ exists in the file system\n\n*   `status`: Returns a `file_status` object, which\
    \ encapsulates the properties of given file, such visibility and type\n\n*   `create_directory`:\
    \ Creates a new directory in the file system, with the given path\n\n*   `copy`:\
    \ Makes a copy of the given path to a location indicated by the second parameter\n\
    \n*   `remove`: Removes the given path from the file system\n\n*   `current_path`:\
    \ Returns a path object that indicates the current path used by the application\n\
    \nThese functions can be easily combined to manipulate the file system. I used\
    \ some of these functions to implement all the functionality needed by the `FileManager`\
    \ class. For example, the following is how the `getContents` member function is\
    \ coded:\n\n```\nstd::vector FileManager::getContents(const std::string &prefix)\n\
    {\nstd::vector results;\npath aPath(prefix);\nif (!is_directory(aPath))\n{\nstd::cout\
    \  contents;\ncopy(directory_iterator(aPath), directory_iterator(), back_inserter(contents));\n\
    for (int i=0; i<contents.size(); ++i)\n{\nresults.push_back(contents[i].string());\n\
    }\n}\nreturn results;\n}\n```\n\nThe first step is to create a path object based\
    \ on the string passed as a parameter. Once the path has been created, you can\
    \ test if it points to a directory using the `is_directory` function. If the path\
    \ is correct, then you can use the `directory_iterator` function to create an\
