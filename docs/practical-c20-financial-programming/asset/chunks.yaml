- fmt: "## 多项式插值\n\n若需要函数的不同部分之间平滑过渡，则无法直接使用线性插值。多项式插值允许使用单个函数，通过一个高次多项式来近似所有给定的点。你将了解如何构造这个多项式，并为定义域的每个值返回所需的函数。\n\
    \n## 线性插值\n\n针对使用线性近似对给定数据点集进行插值的问题，编写解决方案及 C++ 代码。\n\n### 解决方案\n\n插值是根据给定点集，寻找可用于近似未知函数的一个函数（或一组函数）的过程。该过程的输入是您想要插值的点，输出是一个通用函数，可用于计算输入集之外点的未知值。\n\
    \n例如，假设您有一个由一组观测值组成的时间序列。通常需要找到一个生成这些点的未知函数。对该未知函数的估计也可用于计算所需时间点的相应值。\n\n插值已被应用于科学与工程多个领域，作为近似函数的一种方法。这可能是必要的，因为原始函数确实未知（例如经验过程的情况），或者因为该函数很难精确计算。在金融领域，插值也扮演着重要角色，通常是更复杂算法的一部分。例如，在金融时间序列中，插值允许从业者计算难以直接计算的时间序列值，同时只使用未知函数的近似值。此外，在某些应用中，插值还可用于预测值，至少对于短期预测是这样。在此角色中，它也可以作为交易算法中的一个简单预测组件。\n\
    \n本节将介绍如何使用线性函数进行插值。这是对点集进行插值的最简单方法，因为它每次只需要两个点来直接连接输入值。例如，假设您有一组点，如图[8-1](#323908_2_En_8_Chapter.xhtml#Fig1)所示。\n\
    \n![../images/323908_2_En_8_Chapter/323908_2_En_8_Fig1_HTML.jpg](images/323908_2_En_8_Chapter/323908_2_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1 第一个示例中点的插值图\n\n```\ny1 = (10,0.6), y2 = (20,0.11), y3 = (30,1.1), y4 =\
    \ (40,1.62), y5 = (49,1.4).\n```\n\n这些点不需要均匀间隔，尽管当需要线性插值时，均匀间隔可能效果更好。利用这些点，可以想象一种简单的插值方法。创建插值的策略是：基于点的第一维度（图[8-1](#323908_2_En_8_Chapter.xhtml#Fig1)中的\
    \ x 轴）对输入点进行排序，然后用一条线连接恰好位于所需 x 值之前和之后的两个点。然后，插值由下图[8-1](#323908_2_En_8_Chapter.xhtml#Fig1)之后列表的步骤4中的公式给出。\n\
    \n因此，线性插值算法可总结为以下步骤：\n\n1.  读取输入值`(x[i], y[i])`和所需的坐标值`x`。\n2.  按第一个坐标`(x[i])`的递增顺序对输入进行排序。\n\
    3.  计算第一对点`(x[i], y[i])`，`(x[j], y[j])`，使得`j = i + 1`且`x`位于`x[i]`和`x[j]`之间。\n\
    4.  使用以下方程确定对应于`x`的`y`值：\n\n![$$ y=\\frac{x-{x}_1}{x_0-{x}_1} $$](images/323908_2_En_8_Chapter/323908_2_En_8_Chapter_TeX_Equa.png)\n\
    \n您可以轻松地在 C++ 中实现此算法，以便为每个`x`值计算函数。我将介绍`LinearInterpolation`作为负责存储必要数据以及使用此插值技术计算点的主类。该类的构造函数旨在减少创建新对象的开销。该类提供了`setPoints`成员函数作为定义已知插值点的方法。该成员函数保留作为参数传递的值。它还确保点按\
    \ x 值递增的顺序存储。这是通过一个简单的算法对 x 值进行排序来实现的（使用标准函数`std::sort`）。\n\n### 完整代码\n\n```cpp\n\
    //\n//  LinearInterpolation.h\n#ifndef __FinancialSamples__LinearInterpolation__\n\
    #define __FinancialSamples__LinearInterpolation__\n#include \nclass LinearInterpolation\
    \ {\npublic:\nLinearInterpolation();\nLinearInterpolation(const LinearInterpolation\
    \ &p);\n~LinearInterpolation();\nLinearInterpolation &operator=(const LinearInterpolation\
    \ &p);\nvoid setPoints(const std::vector &xpoints, const std::vector &ypoints);\n\
    double getValue(double x);\nprivate:\nstd::vector m_x;\nstd::vector m_y;\n};\n\
    #endif /* defined(__FinancialSamples__LinearInterpolation__) */\n//\n//  LinearInterpolation.cpp\n\
    #include \"LinearInterpolation.h\"\nLinearInterpolation::LinearInterpolation()\n\
    : m_x(),\nm_y()\n{\n}\nLinearInterpolation::LinearInterpolation(const LinearInterpolation\
    \ &p)\n: m_x(p.m_x),\nm_y(p.m_y)\n{\n}\nLinearInterpolation::~LinearInterpolation()\n\
    {\n}\nLinearInterpolation &LinearInterpolation::operator=(const LinearInterpolation\
    \ &p)\n{\nif (this != &p)\n{\nm_x = p.m_x;\nm_y = p.m_y;\n}\nreturn *this;\n}\n\
    void LinearInterpolation::setPoints(const std::vector &xpoints,\nconst std::vector\
    \ &ypoints)\n{\nm_x = xpoints;\nm_y = ypoints;\n// update points to become sorted\
    \ on x axis.\nstd::sort(m_x.begin(), m_x.end());\nfor (int i=0; i m_x[m_x.size()-1])\n\
    {\nreturn 0; // outside of domain\n}\nfor (int i=0; i= x)\n{\nx1 = m_x[i];\ny1\
    \ = m_y[i];\nbreak;\n}\n}\nreturn y0 * (x-x1)/(x0-x1) +  y1 * (x-x0)/(x1-x0);\n\
    }\nint main()\n{\ndouble xi = 0;\ndouble yi = 0;\nvector xvals;\nvector yvals;\n\
    while (cin >> xi)\n{\nif (xi == -1)\n{\nbreak;\n}\nxvals.push_back(xi);\ncin >>\
    \ yi;\nyvals.push_back(yi);\n}\ndouble x = 0;\ncin >> x;\nLinearInterpolation\
    \ li;\nli.setPoints(xvals, yvals);\ndouble y = li.getValue(x);\ncout << \"interpolation\
    \ result for value \" << x << \" is \" << y << endl;\nreturn 0;\n}\n```\n\n###\
    \ 运行代码\n\n例如，再次考虑图[8-1](#323908_2_En_8_Chapter.xhtml#Fig1)所示示例中的点。要计算值 27 的线性插值，您需要执行应用程序并输入以下数据：\n\
    \n```\n./linearInterpolation\n10 0.6\n20 0.11\n30 1.1\n40 1.62\n49 1.4\n\ninterpolation\
    \ result for value 27 is 0.803\n```\n\n## 多项式插值\n\n用 C++ 为给定点集构造一个多项式插值。"
  raw: "*   Polynomial interpolation: If smooth transitions between different\n  \
    \  parts of the function are required, then it is not possible to use a\n    linear\
    \ interpolation directly. Polynomial interpolation allows the use\n    of a single\
    \ function that approximates all of the given points through a\n    high-degree\
    \ polynomial. You will see how to construct this polynomial\n    and return the\
    \ desired function for each value of the domain.\n\nLinear Interpolation\nWrite\
    \ a solution, along with C++ code, for the problem of\ninterpolating a given set\
    \ of data points using linear\napproximations.\n\nSolution\nInterpolation is\n\
    the process of finding a function (or set of functions) that can be used\nto approximate\
    \ an unknown function, as determined by a given set of\npoints. The input for\
    \ this process is therefore the points you would\nlike to interpolate. The result\
    \ is a general function that can be used\nto compute the unknown values for points\
    \ outside the input set.\nFor example, suppose that you are given a time series\
    \ composed of a\nset of observations. It is frequently desirable to find a function\
    \ that\ngenerated those points. This estimation of the unknown function may also\n\
    be used to calculate the corresponding value for a required time\ninstant.\nInterpolation\
    \ has been used in several areas of science and\nengineering as a way to approximate\
    \ functions. This may be necessary\neither because the original function is truly\
    \ unknown (e.g., in the case\nof empirical processes) or because such a function\
    \ is very difficult to\ncalculate exactly. In finance, interpolation also plays\
    \ an important\nrole, frequently as part of more complex algorithms. In the case\
    \ of a\nfinancial time series, for example, interpolation allows practitioners\n\
    to calculate values for a time series that are difficult to compute\nwhile using\
    \ only an approximation for the unknown function. Moreover, in\nsome of these\
    \ applications, interpolation can also be used as a way to\nforecast values, at\
    \ least for short periods of time. In this role, it\ncan also be used as a simple\
    \ forecasting component of trading algorithms.\n\nIn this section, you will see\
    \ how to perform interpolation using linear\nfunctions. This is the simplest way\
    \ to provide the interpolation of a\nset of points, since it requires only two\
    \ points at a time in order to\ndirectly connect input values. For example, suppose\
    \ that you’re given a\nset of points, as displayed in Figure [8-1](#323908_2_En_8_Chapter.xhtml#Fig1).\n\
    \n![../images/323908_2_En_8_Chapter/323908_2_En_8_Fig1_HTML.jpg](images/323908_2_En_8_Chapter/323908_2_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1\nInterpolation graph for points in the\nfirst example\n\n```\ny1\
    \ = (10,0.6), y2 = (20,0.11), y3 = (30,1.1), y4 = (40,1.62), y5 = (49,1.4).\n\
    ```\n\nThe points don’t need to be evenly spaced, although that might work\nbetter\
    \ when a linear interpolation is desired. Using these points, one\ncan visualize\
    \ a simple way to interpolate values. The strategy for\ncreating an interpolation\
    \ is to sort the input points based on their\nfirst dimension (the x axis on Figure\
    \ [8-1](#323908_2_En_8_Chapter.xhtml#Fig1)) and join with a\nline the two points\
    \ that are right before and after the desired value of\nx. The interpolation is\
    \ then given by the formula in Step 4 of the list\nfollowing Figure [8-1](#323908_2_En_8_Chapter.xhtml#Fig1).\n\
    \nThe algorithm for\nthe linear interpolation of a set of points can, therefore,\
    \ be\nsummarized in the following steps:\n\n1.  Read the input values `(x[i],y[i])`\
    \ and the\n    desired coordinate value `x`.\n\n2.  Sort the input in increasing\
    \ order of the first coordinate `(x[i])`.\n\n3.  Calculate the first pair of points\
    \ `(x[i],y[i])`, `(x[j],y[j])` such that\n    `j=i+1` and `x` is within `x[i]`\
    \ and `x[j]`.\n\n4.  Use the following equation to determine the value of `y`\
    \ corresponding to\n    `x`:\n\n![$$ y=\\frac{x-{x}_1}{x_0-{x}_1} $$](images/323908_2_En_8_Chapter/323908_2_En_8_Chapter_TeX_Equa.png)\n\
    \nYou can easily implement this algorithm in C++ so that the function\nis computed\
    \ for each value of `x`. I present the\n`LinearInterpolation`\n as the main class\
    \ responsible for storing the necessary data as\nwell as calculating points using\
    \ this interpolation technique.\nThe constructors  for this class are\ndesigned\
    \ to reduce any overhead for the creation of new objects. The\nclass provides\
    \ the `setPoints` member\nfunction  as a way to define the\nknown points of the\
    \ interpolation. This member function retains the\nvalues passed as a parameter.\
    \ It also makes sure that the points are\nstored in the order of increasing x\
    \ values. This is done using a simple\nalgorithm that sorts the x values (the\
    \ standard function `std::sort` is used for\nthis purpose).\n\nComplete Code\n\
    \n```\n//\n//  LinearInterpolation.h\n#ifndef __FinancialSamples__LinearInterpolation__\n\
    #define __FinancialSamples__LinearInterpolation__\n#include \nclass LinearInterpolation\
    \ {\npublic:\nLinearInterpolation();\nLinearInterpolation(const LinearInterpolation\
    \ &p);\n~LinearInterpolation();\nLinearInterpolation &operator=(const LinearInterpolation\
    \ &p);\nvoid setPoints(const std::vector &xpoints, const std::vector &ypoints);\n\
    double getValue(double x);\nprivate:\nstd::vector m_x;\nstd::vector m_y;\n};\n\
    #endif /* defined(__FinancialSamples__LinearInterpolation__) */\n//\n//  LinearInterpolation.cpp\n\
    #include \"LinearInterpolation.h\"\nLinearInterpolation::LinearInterpolation()\n\
    : m_x(),\nm_y()\n{\n}\nLinearInterpolation::LinearInterpolation(const LinearInterpolation\
    \ &p)\n: m_x(p.m_x),\nm_y(p.m_y)\n{\n}\nLinearInterpolation::~LinearInterpolation()\n\
    {\n}\nLinearInterpolation &LinearInterpolation::operator=(const LinearInterpolation\
    \ &p)\n{\nif (this != &p)\n{\nm_x = p.m_x;\nm_y = p.m_y;\n}\nreturn *this;\n}\n\
    void LinearInterpolation::setPoints(const std::vector &xpoints,\nconst std::vector\
    \ &ypoints)\n{\nm_x = xpoints;\nm_y = ypoints;\n// update points to become sorted\
    \ on x axis.\nstd::sort(m_x.begin(), m_x.end());\nfor (int i=0; i m_x[m_x.size()-1])\n\
    {\nreturn 0; // outside of domain\n}\nfor (int i=0; i= x)\n{\nx1 = m_x[i];\ny1\
    \ = m_y[i];\nbreak;\n}\n}\nreturn y0 * (x-x1)/(x0-x1) +  y1 * (x-x0)/(x1-x0);\n\
    }\nint main()\n{\ndouble xi = 0;\ndouble yi = 0;\nvector xvals;\nvector yvals;\n\
    while (cin >> xi)\n{\nif (xi == -1)\n{\nbreak;\n}\nxvals.push_back(xi);\ncin >>\
    \ yi;\nyvals.push_back(yi);\n}\ndouble x = 0;\ncin >> x;\nLinearInterpolation\
    \ li;\nli.setPoints(xvals, yvals);\ndouble y = li.getValue(x);\ncout << \"interpolation\
    \ result for value \" << x << \" is \" << y << endl;\nreturn 0;\n}\n```\n\nRunning\
    \ the Code\n\nFor example, consider again the points in the example shown in Figure\n\
    [8-1](#323908_2_En_8_Chapter.xhtml#Fig1). To calculate a\nlinear interpolation\
    \ for value 27, you need to execute the application\nand enter the following data:\n\
    \n```\n./linearInterpolation\n10 0.6\n20 0.11\n30 1.1\n40 1.62\n49 1.4\n\ninterpolation\
    \ result for value 27 is 0.803\n```\n\nPolynomial Interpolation\nConstruct a polynomial\
    \ interpolation for a\ngiven set of points in C++."
  trans: "\n## 多项式插值\n\n若需要函数的不同部分之间平滑过渡，则无法直接使用线性插值。多项式插值允许使用单个函数，通过一个高次多项式来近似所有给定的点。你将了解如何构造这个多项式，并为定义域的每个值返回所需的函数。\n\
