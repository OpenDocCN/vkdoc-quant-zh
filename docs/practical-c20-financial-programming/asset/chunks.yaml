    \ a concrete implementation of\nthis operator. The example code shows how this\
    \ can be done.\n\n```\nclass F1 : public MathFunction {\npublic:\nvirtual ~F1()\
    \ {}\nvirtual double operator()(double value);\n};\ndouble F1::operator ()(double\
    \ x)\n{\nreturn (x-1)*(x-1)*(x-1);\n}\n```\n\nThis is a definition for the example\
    \ function\n*f*(*x*) = (*x*–1)^3.\nThe implementation of the\nfunction `getRoot`\
    \ is\nstraightforward. The function starts with the interval given as a\nparameter\
    \ and halves it using the criteria defined by the bisection\nmethod.\n\nComplete\
    \ Code\n\n```\n//\n// MathFunction.h\n#ifndef MATHFUNCTION_H_\n#define MATHFUNCTION_H_\n\
    template \nclass MathFunction {\npublic:\nMathFunction();\nvirtual ~MathFunction();\n\
    virtual Res operator()(Res value) = 0;\n};\n#endif /* MATHFUNCTION_H_ */\n//\n\
    // BisectionMethod.h\n#ifndef BISECTIONMETHOD_H_\n#define BISECTIONMETHOD_H_\n\
    template \nclass MathFunction;\nclass BisectionMethod {\npublic:\nBisectionMethod(MathFunction\
    \ &f);\nBisectionMethod(const BisectionMethod &p);\n~BisectionMethod();\nBisectionMethod\
    \ &operator=(const BisectionMethod &p);\ndouble getRoot(double x1, double x2);\n\
    private:\nMathFunction &m_f;\ndouble m_error;\n};\n#endif /* BISECTIONMETHOD_H_\
    \ */\n//\n// BisectionMethod.cpp\n#include \"BisectionMethod.h\"\n#include \"\
    MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\nnamespace {\n\
    const double DEFAULT_ERROR = 0.001;\n}\nBisectionMethod::BisectionMethod(MathFunction\
    \ &f)\n: m_f(f),\nm_error(DEFAULT_ERROR)\n{\n}\nBisectionMethod::BisectionMethod(const\
    \ BisectionMethod &p)\n: m_f(p.m_f),\nm_error(p.m_error)\n{\n}\nBisectionMethod::~BisectionMethod()\n\
    {\n}\nBisectionMethod &BisectionMethod::operator =(const BisectionMethod &p)\n\
    {\nif (this != &p)\n{\nm_f = p.m_f;\nm_error = p.m_error;\n}\nreturn *this;\n\
    }\ndouble BisectionMethod::getRoot(double x1, double x2)\n{\ndouble root = 0;\n\
    while (std::abs(x1 - x2) > m_error)\n{\ndouble x3 = (x1 + x2) / 2;\nroot = x3;\n\
    if (m_f(x1) * m_f(x3)  0)\n{\ncout  {\npublic:\nvirtual ~F1();\nvirtual double\
    \ operator()(double value);\n};\nF1::~F1()\n{\n}\ndouble F1::operator ()(double\
    \ x)\n{\nreturn (x-1)*(x-1)*(x-1);\n}\n}\nint main()\n{\nF1 f;\nBisectionMethod\
    \ bm(f);\ncout << \" the root of the function is \" << bm.getRoot(-100, 100) <<\
    \ endl;\nreturn 0;\n}\n```\n\nRunning the Code\n\nTo run the code, along with\
    \ the example provided, use a compiler such as\ngcc to generate the executable\
    \ `bisectionMethod`\n. Then, you can run it to get results as follows:\n\n```\n\
    ./bisectionMethod\nroot is 0\nroot is 50\nroot is 25\nroot is 12.5\nroot is 6.25\n\
    root is 3.125\nroot is 1.5625\nroot is 0.78125\nroot is 1.17188\nroot is 0.976562\n\
    root is 1.07422\nroot is 1.02539\nroot is 1.00098\nroot is 0.98877\nroot is 0.994873\n\
    root is 0.997925\nroot is 0.999451\nroot is 1.00021\nthe root of the function\
    \ is 1.00021\n```\n\nThis shows the result of executing the bisection method on\
    \ the\nfunction *f*(*x*) = (*x*–1)^3, starting with the\ninterval -100 to 100\\\
    . I showed the intermediate steps just for clarity.\n\nThe Secant Method\nCreate\
    \ a class to solve equations using the secant method .\n\nSolution\nIn the previous\
    \ programming example, you learned about the bisection\nmethod for the solution\
    \ of equations. You can find the roots of an\nequation through the decomposition\
    \ of the domain into a set of ranges,\neach of which you can test for changes\
    \ in sign. If the sign of the\nfunction is different from the sign at the end\
    \ of the interval, then it\nis possible to find a point where this function changes\
    \ from positive to\nnegative, making it the root of the equation.\nWhile the bisection\
    \ method can find solutions to a large number of\nequations, it is not the fastest\
    \ method for this purpose. One of the\nreasons is that it doesn’t use any of the\
    \ properties of the function\nother than the sign at the extremes of its range.\
    \ On the other hand,\nusing additional information about the function values,\
    \ for example, it\nwould be possible, at least in principle, to achieve a faster\n\
    convergence to the root of the function.\nOne of the ways to use the value of\
    \ the function is contained in the\nalgorithm called the secant method. The general\
    \ idea of the secant\nmethod is to use the function value at the extremes of each\
    \ interval as\na way to approximate how close one is from the true root of the\n\
    equation. In this way, it is possible to get closer to the root and\nreduce the\
    \ number of iterations necessary to find the desired\nsolution.\nThe secant of\
    \ a function is the name given to the line connecting to\npoints defined by that\
    \ function. For example, given the function\n*f*(*x*) = *x*² in the range 1 to\
    \ 4, the\nsecant to that function in the given range is the line segment\nconnecting\
    \ the points (1,1) and (4,16), since these are the two points\ndefined by function.\
    \ We can generalize this concept to any function that\nis continuous in a particular\
    \ range.\nThe secant method uses information derived from\nthe secant to the function\
    \ to define the new segment to be explored. To\ndo this, the method calculates\
    \ the point of intersection of the secant\nwith the x-axis and uses that point\
    \ to define the new segment. This is\npossible whenever the sign of the points\
    \ at the beginning and end of a\nrange is different, because in that case, the\
    \ secant will intercept with\nthe x-axis. As you may remember from the previous\
    \ section, this is\nsimilar to the criterion used by the bisection method, with\
    \ the\ndifference that bisection uses the midpoint, instead of a point based on\n\
    the secant of the\nfunction.\nAs an example of how this works in practice, consider\
    \ the same\nfunction used in the section “Bisection Method”:\n*f*(*x*) = (*x*–1)³,\
    \ in the range -1 to\n2\\. In this case, we can calculate the values of *f*(–1) = –8\
    \ and\n*f*(2) = 1, which have different signs. We can, based on that\ninformation,\
    \ use the secant to the function on this interval to find an\nintersection with\
    \ the x-axis. The line segment we want to use is,\ntherefore, connecting the points\
    \ (–1,–8) and (2,1).\n\nWith a little of algebra, you will find that the slope\
    \ of this line is\n\n![$$ \\frac{y_1-{y}_0}{x_1-{x}_0}=\\frac{1-\\left(-8\\right)}{2-\\\
    left(-1\\right)}=\\frac{9}{3}=3 $$](images/323908_2_En_9_Chapter/323908_2_En_9_Chapter_TeX_Equa.png)\n\
    \nAnd, since it is known that the point\n(*x*[1],*y*[1]) = (2,1) is touched, the\n\
    secant line is given by\n*h* (*x*) = *y*[1]+ 3 (*x*–*x*[1]) = 1 + 3 (*x*–2)\n\n\
    Now, the intersection point with the x-axis can be calculated using this\nequation\
    \ and the fact that *h*(*x*) = 0 at the\nintersection (see Figure [9-2](#323908_2_En_9_Chapter.xhtml#Fig2)):\n\
    \n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig2_HTML.jpg](images/323908_2_En_9_Chapter/323908_2_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\nThe original function (x–1)³ and its secant in the\ninterval -1\
    \ to 2"
