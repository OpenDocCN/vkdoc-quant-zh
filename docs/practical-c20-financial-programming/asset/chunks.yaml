    \ h=\\frac{c-{x}_0}{N}. $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equf.png)\n\
    \nThe well-known Taylor method from calculus can be used to compute the approximation\
    \ to a function given its derivatives. The approximation found using the second-order\
    \ Taylor approximation will give a more accurate result than the linear approximation\
    \ used in Euler’s algorithm. The formulas used in the original Runge-Kutta algorithm\
    \ are the following:\n\n![$$ {x}_{t+1}={x}_t+h $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equg.png)\n\
    \n![$$ {y}_{t+1}={y}_t+ hf\\left({x}_t+\\frac{h}{2},{y}_t+\\frac{h}{2}f\\left({x}_t,{y}_t\\\
    right)\\right) $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equh.png)\n\
    \nIf you employ higher-order approximations derived using the Taylor method, you\
