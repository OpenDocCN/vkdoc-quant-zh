  trans: "\n# 解决方案\n\n线性代数已被广泛用于解决大量工程和科学问题。因此，这些概念也经常被应用于金融应用中。计算线性代数的基础层面涉及标量和向量，以及对这些数学实体允许的操作。\n\
    \n标量是由单一测量值构成的量。通常，它不需要创建单独的类，因为可以轻松地用整数、浮点数或双精度数来表示。此类量通常也作为单一元素存储。标量数字拥有相关的传统运算性质，如加法、减法、乘法和除法。\n\
    \n在 C++ 实现中，标量的使用无需特殊处理，尽管某些类可能将标量参数作为模板参数，以便日后处理不同类型。例如，这在数值库中很常见：\n\n```cpp\n\
    template <class Scalar>\nclass MyNumericClass {\n    void aFunction(Scalar parameter);\n\
    public:\n    Scalar m_internalVar;\n};\n```\n\n在这种情况下，`Scalar` 类型充当了 C++ 支持的类型（如\
    \ `int`、`float` 或 `long double`）之一的占位符。这样，你就可以根据计算所需的实际类型轻松参数化数值类，并避免不必要的数值类型转换，转换可能会给计算引入意外错误。\n\
    \nLA 操作的下一个层级包括向量的组合，使用向量加法、向量积和标量乘法。起初，你可能会考虑使用 `std::vector` 来执行这些操作；然而，`std::vector`\
    \ 是一个通用容器，并非为数学处理而优化。\n\nLA 实现的传统解决方案是使用 BLAS（基本线性代数子程序）库。BLAS 是一个流行的软件包，最初用 Fortran\
    \ 实现，但后来已成为其他语言的 LA 计算标准。其 C 语言版本是通过 Fortran 的 `f2c` 转换器创建的。由于许多 LA 包都依赖 BLAS\
    \ 提供的功能，因此在必要时已创建了其他库来模拟它。\n\n在本节中，我将介绍一个实现了 BLAS 大部分功能的 C++ 库。uBLAS 库是 Boost\
    \ 的一部分，通过包含 `<boost/numeric/ublas/vector.hpp>` 等头文件即可访问。\n\nBLAS 及类似库根据支持级别进行组织，范围从\
    \ 1 到 3。BLAS 支持级别包括以下内容：\n\n*   **级别 1**：支持使用标量数字和向量的操作。在此级别，库为一维数值向量提供支持，包含常见操作，如标量乘法和向量积。\n\
    *   **级别 2**：在第二级别，兼容 BLAS 的库提供执行涉及向量和矩阵的计算的函数——例如，向量 `v` 与矩阵 `A` 的常见乘法，可以（产生不同结果）以\
    \ `vA` 或 `Av` 的形式执行。\n*   **级别 3**：BLAS 的第三级定义为矩阵-矩阵操作。例如，它允许矩阵相乘。\n\n这三个 BLAS\
    \ 支持级别已在多个受原始 BLAS 启发而开发的库中实现。此类实现主要旨在有效支持新的编程语言、架构和处理器，同时保持与许多依赖 BLAS 的数值算法的兼容性。Boost\
    \ uBLAS 库的目的是提供与 BLAS 相同的支持级别，同时利用 C++ 类和模板提供的表达能力。\n\n在此示例中，你将探索一个名为 `VectorOperations`\
    \ 的类，它负责实现级别 1 的 BLAS 操作。这意味着它必须处理向量和标量数字，以及它们之间允许的变换。根据 BLAS 文档，我们有以下操作类别：\n\n\
    *   **交换**：将第一个向量中的元素切换至第二个向量。\n*   **缩放**：将向量的所有元素乘以单个标量数字。\n*   **复制**：将第一个向量的元素复制到第二个目标向量中。\n\
    *   **向量加法**：返回一个向量，其分量是两个输入向量的逐元素相加结果。\n*   **点积**：执行内积的数学运算，对于两个向量 `v` 和 `w`，使用以下公式定义：\n\
    \n![$$ p(v, w) = \\sum_i (v_i + w_i) $$](img/323908_2_En_7_Chapter_TeX_Equa.png)\n\
    \n*   **范数**：向量的范数是量化向量在特定方向长度的一种方式。一种常见的范数是两点之间的二维距离。\n\n在 `VectorOperations`\
    \ 的实现中，你将看到如何使用 uBLAS 访问其中一些操作。第一个这样的操作是向量与标量的乘法。方法签名如下：\n\n```cpp\nstd::vector<double>\
    \ scalarMult(double scalar);\n```\n\n此方法的目的是返回一个 `std::vector` 对象，其中每个成员都是原始向量中元素的缩放版本。该实现展示了如何在这些不同的向量类型之间进行转换。\n\
    \n```cpp\nstd::vector<double> VectorOperations::scalarMult(double scalar)\n{\n\
    \    using namespace boost::numeric::ublas;\n    vector<double> vx;\n    std::copy(m_data.begin(),\
    \ m_data.end(), vx.end());\n    vector<double> res = vx * scalar;\n    std::vector<double>\
    \ v;\n    std::copy(res.begin(), res.end(), v.end());\n    return v;\n}\n```\n\
    \n第一步是从 `boost::numeric::ublas` 命名空间创建一个向量。请注意，此函数使用了 `using` 声明以避免繁琐的命名空间序列。下一步是将原始\
    \ `std::vector` 复制到 `ublas` 向量中。最后，使用乘法运算符执行标量操作。为了存储结果，构建了一个名为 `res` 的新 `ublas`\
    \ 向量。最后一步是将结果复制到新向量中并返回结果。\n\n上述算法创建了许多临时变量，因此对于实际实现来说效率不高。然而，我们从标准向量转换为 `ublas`\
    \ 向量这一事实，其优点在于可以突出每种向量类型能够做什么。然而，在实现更复杂的 LA 算法时，我们应该避免创建任何不必要的临时变量，因为对于大型向量和矩阵，它们可能会占用大量空间。\n\
    \n`VectorOperations` 类为你在 BLAS 级别 1 中会发现的其他常见操作提供了类似的示例，例如使用 `ublas` 运算符快速执行这些计算的\
    \ `addVector` 和 `subtractVector`。`dotProduct` 成员函数使用 `ublas` 中的 `inner_prod` 函数来实现点积（也称为向量间的内积操作）。最后，我们还有\
    \ `norm` 成员函数的示例，它使用 `norm_2` 函数返回向量的长度。\n\n## 完整代码\n\n上一节中描述的向量操作已在 `VectorOperations`\
    \ 类中实现，如列表 7-1 所示。在你的系统中安装 Boost 库后，你应该能够使用任何符合标准的 C++ 编译器来编译该类。\n"
- fmt: "```cpp\n//\n//  VectorOperations.h\n#ifndef __FinancialSamples__VectorOperations__\n\
    #define __FinancialSamples__VectorOperations__\n#include \n// performs operations\
    \ on std::vector using boost ublas\nclass VectorOperations {\npublic:\nVectorOperations(const\
    \ std::vector &v);\nVectorOperations(const VectorOperations &p);\n~VectorOperations();\n\
    VectorOperations &operator=(const VectorOperations &p);\nstd::vector scalarMult(double\
    \ scalar);\nstd::vector addVector(const std::vector &v);\nstd::vector subtractVector(const\
    \ std::vector &v);\ndouble dotProd(const std::vector &v);\ndouble norm();\nprivate:\n\
    std::vector m_data;\n};\n#endif /* defined(__FinancialSamples__VectorOperations__)\
    \ */\n//\n//  VectorOperations.cpp\n#include \"VectorOperations.h\"\n#include\
    \ \nVectorOperations::VectorOperations(const std::vector &p)\n: m_data(p)\n{\n\
    }\nVectorOperations::VectorOperations(const VectorOperations &p)\n: m_data(p.m_data)\n\
    {\n}\nVectorOperations::~VectorOperations()\n{\n}\nVectorOperations &VectorOperations::operator=(const\
    \ VectorOperations &p)\n{\nif (this != &p)\n{\nm_data = p.m_data;\n}\nreturn *this;\n\
    }\nstd::vector VectorOperations::scalarMult(double scalar)\n{\nusing namespace\
    \ boost::numeric::ublas;\nvector vx;\nstd::copy(m_data.begin(), m_data.end(),\
    \ vx.end());\nvector res = vx * scalar;\nstd::vector v;\nstd::copy(res.begin(),\
    \ res.end(), v.end());\nreturn v;\n}\nstd::vector VectorOperations::addVector(const\
    \ std::vector &vec)\n{\nusing namespace boost::numeric::ublas;\nvector v1;\nstd::copy(m_data.begin(),\
    \ m_data.end(), v1.end());\nvector v2;\nstd::copy(vec.begin(), vec.end(), v2.end());\n\
    vector v3 = v1 + v2;\nstd::vector v;\nstd::copy(v3.begin(), v3.end(), v.end());\n\
    return v;\n}\ndouble VectorOperations::norm()\n{\nusing namespace boost::numeric::ublas;\n\
    vector v1;\nstd::copy(m_data.begin(), m_data.end(), v1.end());\ndouble res = norm_2(v1);\n\
    return res;\n}\nstd::vector VectorOperations::subtractVector(const std::vector\
    \ &vec)\n{\nusing namespace boost::numeric::ublas;\nvector v1;\nstd::copy(m_data.begin(),\
    \ m_data.end(), v1.end());\nvector v2;\nstd::copy(vec.begin(), vec.end(), v2.end());\n\
    vector v3 = v1 - v2;\nstd::vector v;\nstd::copy(v3.begin(), v3.end(), v.end());\n\
    return v;\n}\ndouble VectorOperations::dotProd(const std::vector &v)\n{\nusing\
    \ namespace boost::numeric::ublas;\nvector v1;\nstd::copy(m_data.begin(), m_data.end(),\
    \ v1.end());\nvector v2;\nstd::copy(v.begin(), v.end(), v2.end());\ndouble res\
    \ = inner_prod(v1, v2);\nreturn res;\n}\n```\nListing 7-1 `VectorOperations.h`\
    \ and `VectorOperations.cpp`\n\n## Using Matrix-Oriented Operations\n\nIn this\
    \ section, we create a class to perform matrix operations compatible with BLAS.\n\
    \n### Solution\n\nAs you learned from Listing [7-1](#323908_2_En_7_Chapter.xhtml#PC4),\
    \ LA functions are designed to work with linear operators that use scalar numbers,\
    \ vectors, and matrices. To support these operations, programmers use a set of\
    \ functions that are compatible with the original BLAS library. In C++, we can\
    \ have access to a few libraries that implement BLAS, including the uBLAS library\
    \ from boost, which you have been using so far.\n\nThe second level of BLAS is\
    \ responsible for providing support for matrix-vector operations. In this example,\
    \ you will see how to implement functions that use this level of BLAS. You will\
    \ use boost uBLAS to access this functionality.\n\nAt level 2 of BLAS, the goal\
    \ is to allow for the combination of vectors and matrices. To make this possible,\
    \ uBLAS implements a few higher-level classes that incorporate concepts defined\
    \ in the BLAS framework. The following are some of the most important classes\
    \ used:\n\n- `Vector`: This class was already discussed in the last section, and\
    \ it acts as a general container for vector data. Some other classes implement\
    \ restrictions on the generic functionality of `Vector`.\n- `Sparse vector`: A\
    \ specialized version of a `Vector` that allows for data represented in a sparse\
    \ way. It can be used whenever the number of nonzero elements in a vector is small\
    \ compared to the size of the array.\n- `Matrix`: This is the main class that\
    \ represents a two-dimensional arrangement of values, which is the traditional\
    \ representation of a matrix.\n- `Triangular matrix`: This class is used to represent\
    \ matrices in which data is stored only on or above the main diagonal (for upper\
    \ triangular matrices). You can also create lower triangular matrices with uBLAS.\n\
    - `Symmetric matrix`: This type of matrix has elements that are symmetric with\
    \ respect to the diagonal. This class is used to represent this type of matrix\
    \ on algorithms that take advantage of this property.\n- `Hermitian matrix`: A\
    \ Hermitian matrix has the property that its elements are complex numbers, and\
    \ there is a symmetry based on the notion of complex conjugate. That is, for each\
    \ entry at position `[i,j]`, the corresponding elements `[j,i]` are its complex\
    \ conjugate.\n- `Banded matrix`: This class represents sparse matrices where the\
    \ nonzero elements are stored in a narrow band of elements around the main diagonal.\
    \ The size of the band can be specified when creating the matrix.\n- `Sparse matrix`:\
    \ A class that represents a generic sparse matrix—that is, a matrix where most\
    \ elements are zero. By using a sparse matrix, you can avoid the need to store\
    \ in memory a large number of zero values.\n\nUsing these classes, you can easily\
    \ store the data using the best representation available for the required task.\
    \ Using the right representation can also give you a great advantage in finding\
    \ the right algorithm, since uBLAS automatically provides special versions of\
    \ its operators based on the data types used. For example, if a matrix is known\
    \ to be triangular, it is possible to speed up some computations when solving\
    \ a system of equations. This means that using a `TriangularMatrix` instead of\
    \ a generic `Matrix` can result in a substantial speedup for your code.\n\nTo\
    \ explore the operations available for matrices, I introduce a class called `MatrixOperations`.\
    \ This class is able to convert parameters into the classes required by uBLAS.\
    \ It is also responsible for calling uBLAS operators on these converted parameters.\
    \ Using this class, you have an easy way to test several of the functions that\
    \ operate on matrix parameters.\n\nAmong the main matrix-related functions and\
    \ operators in uBLAS, you will find the following:\n\n- **Scalar multiplication**:\
    \ Multiplying a matrix by a scalar is a simple process, since it uses the standard\
    \ multiplication operator in C++. You just need to save the result of the multiplication\
    \ in a new matrix variable.\n- **Vector multiplication**: Multiplying a matrix\
    \ by a vector is a common operation. You can do this using the `prod` function.\
    \ The product can be performed in two ways: a pre-multiplication requires that\
    \ the vector be the first argument for the `prod` function. You can also post-multiply\
    \ by a vector, in which case the vector enters as the second parameter to the\
    \ `prod` function.\n- **Matrix multiplication**: You can also multiply two matrices.\
    \ This results in a third matrix, which has a size defined by the sizes of the\
    \ two original matrices. You can perform the multiplication operation using an\
    \ overridden version of the `prod` function.\n- **Element-wise multiplication**:\
    \ This operation performs the multiplication of each corresponding element in\
    \ the matrix. That is, given matrices `A` and `B`, the resulting matrix `C` is\
    \ composed of elements `C[i,j] = A[i,j] + B[i,j]`.\n- **Transposition**: The transpose\
    \ of a matrix is a simple operation where elements `A[i,j]` and `A[j,i]` are exchanged.\
    \ This results in a matrix that is the transposition of the original around the\
    \ main diagonal."
