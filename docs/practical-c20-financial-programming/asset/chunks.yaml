    # 内容概览


    以下是各章节内容的简要概述。


    **第 1 章——固定收益市场**：固定收益市场在金融工程领域中占据很大比重，并为其从业者带来了独特的计算挑战。`C++` 编程在该领域应用广泛，能够以惊人的速度计算利率和现金流变化，读者将在本章中了解到这一点。我将提供可用于解决固定收益市场中最常见问题的
    `C++` 代码示例。这些示例包含针对以下主题的 `C++` 算法：(1) 利率计算，(2) 现值计算，(3) 现金流，以及 (4) 债券估值。


    **第 2 章——股票市场**：股票市场具有多样性，提供了种类繁多的投资工具。因此，用于股票市场金融分析的计算技术数量及复杂度持续增长。在本章中，我将针对股票市场及其衍生品中的若干精选问题，展示
    `C++` 编程示例。涵盖的编程主题如下：(1) 移动平均计算，(2) 波动率计算，(3) 工具相关性计算，以及 (4) 基本面指标计算。


    **第 3 章——金融领域的 C++编程技术**：`C++` 语言是作为 `C` 语言的扩展而创建的，这意味着大多数用 `C` 编写的程序也是有效的 `C++`
    程序。然而，优秀的 `C++` 程序需要利用该语言提供的高级特性来控制程序复杂度。这对于金融应用尤为重要，因为我们希望创建快速且富有表现力的应用程序。在本章中，我将探讨金融
    `C++` 程序员用于以更少精力编写更优代码的基本技术，包括：(1) 类模板，(2) 自动指针，(3) 共享指针，(4) 资源获取即初始化 (`RAII`)，(5)
    自动类型推导，(6) 异常处理，以及 (7) 运算符重载。


    **第 4 章——金融应用的常用库**：现代 `C++` 编程使用各种库来简化快速、标准合规类的创建。`STL` 提供了一组通用的标准容器，几乎可用于任何情况。熟练掌握
    `STL` 是高效 `C++` 编程所需的核心技能之一。另一组常见的类包含在 `Boost` 库中，它通常是下一版 `C++` 标准的基础。读者将学习以下主题：(1)
    `STL` 容器，(2) `STL` 算法，(3) `boost` 库，以及 (4) 日期和时间处理。


    **第 5 章——设计数值类**：金融应用的核心是一组精心设计的数值类。本章将介绍如何创建能在生产代码中高效运行的数值类。您还将看到 `C++` 示例，展示如何与现有的数值类和算法进行集成。您将学习如何：(1)
    实现矩阵类，(2) 使用模板在编译时进行计算，(3) 用 `C++` 模板表示比率，以及 (4) 生成统计数据。


    **第 6 章——绘制金融数据**：金融编程中的一项常见活动是生成数据，这些数据需要被交易员或其他金融利益相关者可视化查看。大多数情况下，数据需要以图表形式绘制出来以便于观察。我将给出一些示例，展示如何使用常用库在
    `C++` 程序中绘制数据。您将学习以下主题：(1) 使用 `Gnuplot` 绘制数据，(2) 设计用于创建 `Gnuplot` 图表的类，以及 (3)
    使用 `Qt` 从 `GUI`（图形用户界面）应用程序进行绘图。


    **第 7 章——线性代数**：线性代数 (`LA`) 技术贯穿于金融工程领域。因此，理解如何将传统的 `LA` 方法应用于 `C++` 至关重要。基于此目标，我将展示几个示例，说明如何使用一些最常见的
    `LA` 算法。在本章中，您还将学习：(1) 将现有的 `LA` 库集成到您的代码中，(2) 基本的 `LA` 运算，(3) `BLAS`（基本线性代数子程序）库，以及
    (4) 使用 `BLAS` 计算矩阵的行列式。


    **第 8 章——插值**：插值是一种常用技术，用于寻找逼近一组数据点的数学函数。快速插值是金融工程多个领域中高性能算法的秘诀。本章将向您展示一些编程示例，涵盖了几种最常见的插值方法，并提供了高效的
    `C++` 实现。本章讨论的主要技术有：(1) 线性插值和 (2) 多项式插值。


    **第 9 章——计算方程的根**：方程是金融工程算法的基本组成部分之一，因此能够高效地计算方程的根至关重要。在本章中，您将找到用于不同方程求根方法的算法，以及它们的工作原理和适用场景的说明。主题包括：(1)
    二分法，(2) 割线法，以及 (3) 牛顿法。


    **第 10 章——数值积分**：函数积分是许多金融算法中的常见部分。然而，精确求解某些类型的方程非常困难，此时需要采用数值方法。在本章中，您将看到可直接应用于常见积分问题的
    `C++` 代码示例。我还会讨论这些方法的性能和精度。本章的编程示例涵盖以下主题：(1) 中点法，(2) 梯形法，以及 (3) 辛普森法。


    **第 11 章——求解 ODE 和 PDE**：微分方程是许多用于分析股票市场的技术的核心。存在多种可用于 `C++` 实现的求解和分析常微分方程 (`ODE`)
    以及偏微分方程 (`PDE`) 的方法。在本章中，我将提供编程示例，涵盖 `ODE` 和 `PDE` 建模及应用的关键方面。涵盖的主题包括：(1) 求解 `ODE`，(2)
    使用龙格-库塔法，以及 (3) 求解布莱克-舒尔斯方程。


    **第 12 章——优化**：优化指的是一组用于寻找函数最小值或最大值的技巧。优化策略被应用于金融工程的多个领域。在本章中，我将讨论可用于实现优化算法常见功能的编程技术。我会简要解释一些技术及其在
    `C++20` 中的典型实现方式。您将学习：(1) 建模优化问题，(2) 与线性规划 (`LP`) 求解器交互，(3) 求解二维 `LP` 问题，以及 (4)
    混合整数规划模型。

