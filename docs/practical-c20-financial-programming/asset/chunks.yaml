    2014-06-23,181.92,182.25,181,182.14,3231700,182.14\n2014-06-20,182.59,182.67,181.4,181.55,10686800,181.55\n\
    2014-06-19,184.12,184.47,182.36,182.82,3551100,182.82\n2014-06-18,182.04,183.61,181.79,183.6,3931800,183.6\n\
    2014-06-17,181.9,182.81,181.56,182.26,2445400,182.26\n2014-06-16,182.4,182.71,181.24,182.35,3538700,182.35\n\
    2014-06-13,182,183,181.52,182.56,2773600,182.56\n2014-06-12,182.48,182.55,180.91,181.22,4425300,181.22\n\
    2014-06-11,183.61,184.2,182.01,182.25,4061700,182.25\n2014-06-10,186.2,186.22,183.82,184.29,4154900,184.29\n\
    2014-06-09,186.22,187.64,185.96,186.22,2728400,186.22\n```\n\nI am displaying\
    \ here only the few first lines of the file that contains daily stock prices.\
    \ You can save this data in the file `IBM.csv` and use it as the source for a\
    \ price plot employing Gnuplot with the following commands:\n\n```\ngnuplot> set\
    \ xdata time\ngnuplot> set datafile separator \",\"\ngnuplot> set timefmt \"%Y-%m-%d\"\
    \ngnuplot> plot 'IBM.csv' using 1:7 title columnhead with lines\n```\n\n> **Note**:\
    \ When running the previous commands, make sure that you’re in the same directory\
    \ in which you have saved the data file (`IBM.csv`). Another way to do this is\
    \ to use the full path for the file, for example, `\"c:\\\\testdata\\\\IBM.csv\"\
    ` (escaped path separators are needed in the Windows platform).\n\nThe first command\
    \ is used to tell Gnuplot that the data in the x axis is time-oriented. The second\
    \ command defines the separator used in the file. The third command describes\
    \ the date format stored in the csv file. Finally, the last line tells Gnuplot\
    \ to plot the contents of file `IBM.csv`, using columns 1 and 7 (column 1 contains\
    \ dates, while column 7 has adjusted closing prices), and with the title of the\
    \ time series defined by the headers for each column of the csv file.\n\nThese\
    \ commands will generate the plot displayed in Figure [6-3](#323908_2_En_6_Chapter.xhtml#Fig3).\n\
    \n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig3_HTML.jpg](images/323908_2_En_6_Chapter/323908_2_En_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3** Plot of the adjusted prices for IBM stock, stored in a csv file\
    \ using Gnuplot\n\nThe plot in Figure [6-3](#323908_2_En_6_Chapter.xhtml#Fig3)\
    \ is just a sample of what Gnuplot can do. There are literally hundreds of parameters\
    \ that can be tweaked using the `set` command. Among these options, you can find\
    \ three-dimensional plots, different colors, and line styles, among others.\n\n\
    To solve the problem presented in this section, you need to create a class that\
    \ receives some data in the form of vectors of doubles or strings and produces\
    \ output data suitable for consumption by Gnuplot. I have created such a class,\
    \ which is called `GnuplotPlotter` and is responsible for the generation of the\
    \ files needed by Gnuplot.\n\nThe operation of the class depends on the determination\
    \ of data for the x axis as well as for the y axis. The class is created using\
    \ a constructor that takes the output filename as a parameter. To define the data\
    \ that will be used in the plot, use the `setData` member function. The parameters\
    \ must be vectors for data in the x dimension and y dimension, respectively. The\
    \ following is a summary of the class:\n\n```\nclass GnuplotPlotter {\npublic:\n\
    \    GnuplotPlotter(const std::string &fileName);\n    GnuplotPlotter(const GnuplotPlotter\
    \ &p);\n    ~GnuplotPlotter();\n    GnuplotPlotter &operator=(const GnuplotPlotter\
    \ &p);\n    void generateCmds(const std::string &cmdFileName);\n    void setHeaders(const\
    \ std::string &xheader, const std::string &yheader);\n    void setData(const std::vector\
    \ &xdata, const std::vector &ydata);\n    void setData(const std::vector &xdata,\
    \ const std::vector &ydata);\n    void csvWrite();\n    // private variables here.\n\
    };\n```\n\nTo access the results of the class, two member functions are available.\
    \ The `csvWrite` member function will write the data stored in `GnuplotPlotter`\
    \ to the file specified in the constructor, using the csv format. The second member\
    \ function is `generateCmds`, which allows one to create a command file with the\
    \ necessary instructions to Gnuplot. This way, you don’t need to worry about the\
    \ exact syntax for plotting the file. The commands are stored in a filename specified\
    \ by the parameter `cmdFileName`.\n\nAn example for the `GnuplotPlotter` class\
    \ is given in the `main` function. First, you need to define two vectors with\
    \ the desired data. In this case, you will use data generated by the function\
    \ `sin`, which returns the trigonometric sine of a number. Notice that we do this\
    \ only to simplify data testing. The data file, however, can have numbers generated\
    \ from any source. After the content has been defined, you can call the member\
    \ functions `csvWrite` and `generateCmds` to create the files needed by Gnuplot.\
    \ You can see the result of this process in Figure [6-4](#323908_2_En_6_Chapter.xhtml#Fig4).\n\
    \n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig4_HTML.jpg](images/323908_2_En_6_Chapter/323908_2_En_6_Fig4_HTML.jpg)\n\
    \n**Figure 6-4** Plot generated using the test data created in `GnuplotPlotter.cpp`\n\
    \n## Complete Code"
