    ![$$ \sum \limits_i^n{r}_i{x}_i\ge R. $$](img/323908_2_En_13_Chapter_TeX_Equd.png)


    现在，在 CAP 模型中，我们假设已知每个资产的方差以及同一投资组合中资产对之间的协方差。方差是衡量投资波动性的经典指标（即方差越大，波动性越高）。因此，我们可以利用现有的个体波动性信息来尽量降低整个投资组合的波动性。由于方差是一个二次函数，目标函数也将是二次的，其各项分别取决于个股的个体方差（`c[ii]`）和股票对的协方差（`c[ij]`）。由此产生的问题可以描述如下：


    ![$$ \min \sum \limits_{i=1}^n\sum \limits_{j=1}^n{c}_{ij}\kern0.22em {x}_i\kern0.22em
    {x}_j $$](img/323908_2_En_13_Chapter_TeX_Eque.png)


    ![$$ \sum \limits_{i=1}^n{x}_i=1 $$](img/323908_2_En_13_Chapter_TeX_Equf.png)


    ![$$ \sum \limits_i^n{r}_i{x}_i\ge R. $$](img/323908_2_En_13_Chapter_TeX_Equg.png)


    ![$$ {x}_i\ge 0\ for\ all\ i\in \left\{1\dots n\right\}. $$](img/323908_2_En_13_Chapter_TeX_Equh.png)


    在过去的几十年里，许多人研究了这一优化问题及其变体。该公式采用了一个二次（非线性）的目标函数——也就是说，目标函数中存在涉及两个变量相乘的项。考虑这种非线性结构，该问题的一般解法形成了所谓的有效前沿：一系列针对不同投资组合组合的结果集，其中目标投资组合的波动性被降至最低。你可以在图
    13-1 中看到一个有效前沿的示例，该图展示了波动性与目标回报率之间的关系图。该图是通过每次固定一个期望回报率，然后使用二次优化模型来找到相应最小波动性而生成的。如图
    13-1 所示，该图表明这种关系呈现抛物线曲线的形状。


    ![../images/323908_2_En_13_Chapter/323908_2_En_13_Fig1_HTML.jpg](img/323908_2_En_13_Fig1_HTML.jpg)


    **图 13-1** 投资组合优化问题有效前沿的一小部分


    尽管 CAP 的二次模型被广泛使用，但它的一个困难在于，你需要一个二次优化求解器才能得到特定投资组合的结果。虽然有多个软件包可以直接求解二次问题（例如，使用内点算法），但
    GLPK 无法直接求解二次优化模型。因此，在本节中，你将处理原始问题的线性化形式，这可以使用线性规划求解器轻松计算。这种线性化方法是在 Konno 和 Yamazaki
    的文章《均值绝对偏差投资组合优化模型及其在东京股票市场的应用》（*Management Science*，第 37 卷，第 519–529 页，1991 年）中提出的。该线性化方法是原始问题的一种修改形式，其目标函数中只包含线性项。虽然这仅仅是原始问题的一个近似，但在许多情况下它能很好地发挥作用（然而，当线性化约束所需计算成本过高时，它可能就不起作用了）。更重要的是，问题的线性化版本可能比二次版本求解得更快，这在某些情况下可能是一个重要的考量因素。


    考虑额外的变量 `y[i]` ∈ {1...`T`}，其中 `T` 是拟投资期数。那么，一个线性模型可以描述如下：


    ![$$ \min \frac{1}{T}\sum \limits_{t=1}^T{y}_t $$](img/323908_2_En_13_Chapter_TeX_Equi.png)


    ![$$ \sum \limits_{j=1}^n\left({r}_{jt}-{r}_j\right){x}_j\le {y}_t, for\kern0.22em
    t\in \left\{1\dots T\right\} $$](img/323908_2_En_13_Chapter_TeX_Equj.png)


    ![$$ -\sum \limits_{j=1}^n\left({r}_{jt}-{r}_j\right){x}_j\le {y}_t, for\kern0.22em
    t\in \left\{1\dots T\right\} $$](img/323908_2_En_13_Chapter_TeX_Equk.png)


    ![$$ \sum \limits_{i=1}^n{x}_i=1 $$](img/323908_2_En_13_Chapter_TeX_Equl.png)


    ![$$ \sum \limits_i^n{r}_i{x}_i\ge R. $$](img/323908_2_En_13_Chapter_TeX_Equm.png)


    ![$$ {x}_i\ge 0\ for\ all\ i\in \left\{1\dots n\right\} $$](img/323908_2_En_13_Chapter_TeX_Equn.png)


    在这些方程中，你不需要直接使用协方差 `c[ij]`；而是使用投资 `i` 在时期 `t` 的期望回报率 `r[it]`。换句话说，该模型的思想是将总时期划分为小段，并在该小段内将模型线性化，然后取整个时间范围内的最小值。有了这个线性模型，你现在可以使用前一章中描述的
    `LPSolver` 类来创建 C++代码。这个新类被称为 `ModifiedCAP`，并在下一节“代码”中展示。创建该模型的主要难点在于，需要以矩阵 `A`
    以及向量 `b` 和 `c` 的形式为 `LPSolver` 定义所需的输入数据。你可以在成员函数 `solveModel` 的代码中看到这是如何实现的。


    算法的第一部分包括设置所需的数据。定义目标函数的向量 `c` 可以很容易地创建，因为所有系数都等于 1。


    ```

    // 目标函数

    for (int i=m_N; i<m_N+m_T; ++i)

    {

    c[i] = 1;

    }

    ```


    接下来，右侧系数也很容易设置。这是因为你可以将所有变量 `y[t]` 移到不等式的左侧。因此，除最后三个系数外，大多数系数都为零。


    ```

    // 右侧向量

    vector b(2*m_T + 2 + 1, 0);

    b[2*m_T]   =  1;

    b[2*m_T+1] = -1;

    b[2*m_T+2] = -m_R;

    ```


    矩阵 `A` 稍微复杂一些，但设置起来也不难。你需要进行的主要变换是在等式约束上。由于 `LPSolver` 处理的问题只有不等式约束，因此等式 ![$$
    \sum \limits_{i=1}^n{x}_i=1 $$](img/323908_2_En_13_Chapter_TeX_IEq1.png) 被转换为两个不等式来处理。


    ![$$ \sum \limits_{i=1}^n{x}_i\le 1\ and-\sum \limits_{i=1}^n{x}_i\le -1 $$](img/323908_2_En_13_Chapter_TeX_Equo.png)


    这使得可以继续使用 `LPSolver` 所使用的相同简单输入形式（GLPK 也可以直接处理等式，你可以修改 `LPSolver` 类来自动实现这一点）。因此，可以使用以下代码来定义输入矩阵
    `A`：


    ```

    // 矩阵 A

    Matrix A(2*m_T + 2 + 1, m_T + m_N);

    for (int i=0; i<m_T; ++i)

    {

    for (int j=0; j<m_N; ++j)

    {

    A[i][j] = m_retMatrix[j][i] - m_assetRet[j];

    }

    A[i][m_N+i] = -1;

    }

    for (int i=m_T; i<2*m_T; ++i)

    {

    for (int j=m_N; j<2*m_N; ++j)

    {

    A[i][j] = - m_retMatrix[j-m_N][i-m_T] + m_assetRet[j-m_N];

    }

    A[i][m_N+i-m_T] = -1;

    }

    for (int j=0; j<m_N; ++j)

    {

    A[2*m_T][j]   = 1;

    A[2*m_T+1][j] = -1;

    A[2*m_T+2][j] = - m_assetRet[j];

    }

    ```


    代码的其余部分只是处理构造 `LPSolver` 类并调用所需的成员函数来求解模型。


    最后，我提供一个简单的示例，展示如何在实际中调用这个类。样本数据包含四个资产和五个时间段。相关的期望回报率由以下矩阵给出，你可以在测试用的 `main` 函数中找到：


    ```

    // 示例问题：4 个资产和 5 个时间段

    // 构建期望回报率矩阵

    double val[][5] = {

    {0.051, 0.050, 0.049, 0.051, 0.05},

    {0.10, 0.099, 0.102, 0.100, 0.101},

    {0.073, 0.077, 0.076, 0.075, 0.076},

    {0.061, 0.06, 0.059, 0.061, 0.062},

    };

    ```


