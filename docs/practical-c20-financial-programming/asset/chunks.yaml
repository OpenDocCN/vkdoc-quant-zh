  trans: "\n# 解决方案\n\n对于需要大量计算的问题，强烈建议采用并行处理技术。特别是当问题易于分解时，就变成了如何为每个线程分配适量工作并等待结果的问题。\n\
    \n蒙特卡洛算法就是这类过程的典型示例。模拟过程可以在任意数量的线程中运行，其结果可以轻松合并为单个数值。例如，计算期权概率时就是这种情况。正如你在第 14\
    \ 章所见，蒙特卡洛技术在期权概率模拟中非常有效。每一步只需模拟新的随机游走，并利用该信息改进当前的概率估计。\n\n要将蒙特卡洛算法应用于期权概率计算，第一步是正确定义问题的分解方式。这里很容易实现，因为每次循环计算都相互独立。在这种情况下，你可以通过指示每个线程运行蒙特卡洛方法的特定迭代次数来实现。最后，合并每个线程的结果，并将所有线程返回值的平均值作为最终结果。\n\
    \n上述算法在`ParallelOptionsProbabilities`类中实现。该类是一个外层框架，负责调用多个线程来运行所需算法。实际工作由派生自`Thread`类的`RandomWalkThread`类完成。作为`Thread`的任何其他子类，它需要实现从独立线程调用的`run()`成员函数。在`RandomWalkThread`内部，有一个成员变量`m_result`，用于存储蒙特卡洛过程的输出。线程完成后，可通过此成员变量获取计算的最终值。\n\
    \n`run`成员函数与你之前在`OptionsProbabilities`类中看到的代码非常相似。主要区别在于输出存储在`m_result`成员变量中。`RandomWalkThread`对象的工作在`ParallelOptionsProbabilities`类内部进行编排。关键成员函数是`probFinishAboveStrike()`。\n\
    \n```\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n{\n    const\
    \ int numThreads = 20;\n    vector<Thread *> threads(numThreads);\n    for (int\
    \ i=0; i<numThreads; i++) {\n        threads[i] = new RandomWalkThread(m_numSteps,\
    \ m_step, m_strikePrice);\n        threads[i]->setJoinable(true);\n        threads[i]->start();\n\
    \    }\n    for (int i=0; i<numThreads; i++) {\n        threads[i]->join();\n\
    \    }\n    double nAbove = 0;\n    for (int i=0; i<numThreads; i++) {\n     \
    \   nAbove += threads[i]->result();\n        delete threads[i];\n    }\n    return\
    \ nAbove/(double)(numThreads);\n}\n```\n\n在该成员函数开始时，创建了多个线程并添加到`threads`向量中。需要将这些线程定义为可加入的，以便能够等待每个线程的结果。下一步是启动线程，使每个线程都能执行所需计算。然后，通过第二个循环来加入已创建的线程。这样，主线程可以在并行计算进行时等待。当所有线程完成后，调用`join()`的结果是主线程恢复执行。最后，可以使用`result()`成员函数存储每个线程返回的数据。此时可以删除线程对象以避免内存泄漏。在`probFinishAboveStrike`成员函数的最后一行，可以看到如何合并计算数据。本例中，只需返回高于执行价格的值的总和，并除以使用的线程数。\n\
    \n## 完整代码\n\n清单 17-2 展示了`ParallelRandomWalk`类。列表末尾提供了一个可用于测试的示例`main()`函数。\n\n\
    ```\n//\n//\n//  ParallelRandomWalk.h\n#ifndef __FinancialSamples__ParallelRandomWalk__\n\
    #define __FinancialSamples__ParallelRandomWalk__\n\nclass ParallelOptionsProbabilities\
    \  {\npublic:\n    ParallelOptionsProbabilities(int size, double strike, double\
    \ sigma);\n    ParallelOptionsProbabilities(const ParallelOptionsProbabilities\
    \ &p);\n    ~ParallelOptionsProbabilities();\n    ParallelOptionsProbabilities\
    \ &operator=(const ParallelOptionsProbabilities &p);\n    double probFinishAboveStrike();\n\
    private:\n    int m_numSteps;       // number of steps\n    double m_step;   \
    \     // size of each step (in percentage)\n    double m_strikePrice; // starting\
    \ price\n};\n#endif /* defined(__FinancialSamples__ParallelRandomWalk__) */\n\n\
    //\n//  ParallelOptionsProbabilities.cpp\n#include \"ParallelOptionsProbabilities.h\"\
    \n#include \"Thread.h\"\n#include <vector>\n#include <iostream>\n#include <boost/random.hpp>\n\
    #include <boost/random/normal_distribution.hpp>\n#include <cmath>\n\nusing std::vector;\n\
    using std::cout;\nusing std::endl;\n\nstatic boost::rand48 random_generator;\n\
    using std::vector;\n\n/// ---\nclass RandomWalkThread : public Thread {\npublic:\n\
    \    RandomWalkThread(int num_steps, double sigma, double startPrice);\n    ~RandomWalkThread();\n\
    \    virtual void run();\n    double gaussianValue(double mean, double sigma);\n\
    \    double getLastPriceOfWalk();\n    double result();\nprivate:\n    int m_numberOfSteps;\
    \     // number of steps\n    double m_sigma;          // size of each step (in\
    \ percentage)\n    double m_startingPrice;  // starting price\n    double m_result;\n\
    };\n\nRandomWalkThread::RandomWalkThread(int numSteps, double sigma, double startingPrice)\n\
    \    : m_numberOfSteps(numSteps),\n      m_sigma(sigma),\n      m_startingPrice(startingPrice)\n\
    {\n}\n\nRandomWalkThread::~RandomWalkThread()\n{\n}\n\ndouble RandomWalkThread::gaussianValue(double\
    \ mean, double sigma)\n{\n    boost::random::normal_distribution<> distrib(mean,\
    \ sigma);\n    return distrib(random_generator);\n}\n\ndouble RandomWalkThread::result()\n\
    {\n    return m_result;\n}\n\ndouble RandomWalkThread::getLastPriceOfWalk()\n\
    {\n    double prev = m_startingPrice;\n    for (int i=0; i<m_numberOfSteps; i++)\
    \ {\n        double g = gaussianValue(0, m_sigma);\n        double next = prev\
    \ * (1 + g);\n        prev = next;\n    }\n    return prev;\n}\n\nvoid RandomWalkThread::run()\n\
    {\n    double nAbove = 0;\n    for (int i=0; i<m_numberOfSteps; i++) {\n     \
    \   double val = getLastPriceOfWalk();\n        if (val >= m_startingPrice)\n\
    \        {\n            nAbove++;\n        }\n    }\n    m_result = nAbove/(double)m_numberOfSteps;\n\
    }\n// ---\n\nParallelOptionsProbabilities::ParallelOptionsProbabilities(int size,\
    \ double start, double step)\n    : m_numSteps(size),\n      m_strikePrice(start),\n\
    \      m_step(step)\n{\n}\n\nParallelOptionsProbabilities::ParallelOptionsProbabilities(const\
    \ ParallelOptionsProbabilities &p)\n    : m_numSteps(p.m_numSteps),\n      m_strikePrice(p.m_strikePrice),\n\
    \      m_step(p.m_step)\n{\n}\n\nParallelOptionsProbabilities::~ParallelOptionsProbabilities()\n\
    {\n}\n\nParallelOptionsProbabilities &ParallelOptionsProbabilities::operator=(const\
    \ ParallelOptionsProbabilities &p)\n{\n    if (this != &p)\n    {\n        m_numSteps\
    \ = p.m_numSteps;\n        m_strikePrice = p.m_strikePrice;\n        m_step =\
    \ p.m_step;\n    }\n    return *this;\n}\n\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n\
    {\n    const int numThreads = 20;\n    vector<Thread *> threads(numThreads);\n\
    \    for (int i=0; i<numThreads; i++) {\n        threads[i] = new RandomWalkThread(m_numSteps,\
    \ m_step, m_strikePrice);\n        threads[i]->setJoinable(true);\n        threads[i]->start();\n\
    \    }\n    for (int i=0; i<numThreads; i++) {\n        threads[i]->join();\n\
    \    }\n    double nAbove = 0;\n    for (int i=0; i<numThreads; i++) {\n     \
    \   nAbove += threads[i]->result();\n        delete threads[i];\n    }\n    return\
    \ nAbove/(double)(numThreads);\n}\n\nint main()\n{\n    ParallelOptionsProbabilities\
    \ rw(100, 50.0, 52.0);\n    double r = rw.probFinishAboveStrike();\n    cout <<\
    \ \" result is \" << r << endl;\n    return 0;\n}\n\n清单 17-2\n类 ParallelRandomWalk\n\
    ```\n\n## 运行代码\n\n我在 Mac OS X 机器上使用`gcc`编译器编译并执行了清单 17-2 中的代码。任何符合标准的编译器均可用于此目的。以下是预期输出的示例：\n\
    \n```\n./parallelOptProb\nrunning thread\nrunning thread\n...\nrunning thread\n\
    result is 0.487\n```\n\n## 使用互斥锁防止非同步访问\n\n在本节中，我们将编写一个 C++ 类，实现使用互斥锁同步共享数据的并行算法。\n"
- fmt: '# Solution


    多线程是一种将计算工作分发到两个或更多处理器核心的便捷方式，这可以提升整个应用程序的性能。然而，虽然多线程有许多优点，但它也增加了软件设计的复杂性。例如，多线程架构中需要解决的问题之一是线程之间共享资源的访问。如果内存中的一个变量被两个或多个线程使用，那么其访问需要进行同步，以防止不同线程同时尝试修改值。


    一旦创建了一个新线程，就需要使用`pthread`库提供的机制来管理它。在最简单的情况下，新线程是独立的，不需要与原始（父）线程同步。然而，更常见的情况是，需要使用相同数据的多个线程之间需要进行同步。同步需求越大，管理共享数据所需的工作量也就越大。


    一段两个或多个线程可以访问共享资源的代码区域被称为**临界区**（critical section）。临界区是代码中需要保护共享资源以避免冲突的区域。


    为了避免临界区固有的冲突，大多数多线程API提供了可用于实现同步操作的原语。这些原语在实现线程间的资源共享方面非常有效。这类原语有很多，例如信号量（semaphores）、互斥锁（mutexes）和消息（messages）等。`pthreads`库直接支持其中一些最常见的机制，包括互斥锁，它可以用来保证只有一个线程能够访问特定的临界区。


    **互斥锁**（mutex）是一种可用于协调两个或多个线程工作的同步机制。互斥锁的状态用于确定线程是否有权操作特定资源（例如内存中的变量）。当线程尝试访问互斥锁的值时，可能发生两种情况：如果互斥锁状态指示临界区可用，则线程可以直接进入临界区；然而，如果互斥锁状态指示忙碌状态，发起请求的线程将停止执行，并被发送到操作系统创建的等待区。只有当资源被其他线程释放后，操作才会恢复。所有这些等待和恢复活动都由操作系统协调。


    互斥锁在`pthreads` API中实现，其类型为`thread_mutex_t`。可以使用函数`pthread_mutex_init`创建一个新的互斥锁，并使用函数`pthread_mutex_destroy`销毁它。当共享资源即将被使用时，需要获取并锁定互斥锁。这保证了该互斥锁一次只能被一个线程使用。这是通过函数`pthread_mutex_lock`完成的。如果互斥锁不可用，该函数会自动中断线程，并强制线程等待直到互斥锁被释放。你也可以使用`pthread_mutex_trylock`尝试访问互斥锁而无需强制等待。如果互斥锁当前不可用，该函数将返回一个错误代码，你可以稍后重试。最后，一旦获取了互斥锁，你需要在同步操作结束时解锁它。这对于确保其他线程能够进入临界区并使用最近释放的资源是必要的。你可以使用函数`pthread_mutex_unlock`解锁互斥锁。


    虽然互斥锁有效性的理论证明可能很复杂，但其使用非常简单。在清单[17-3](#323908_2_En_17_Chapter.xhtml#PC8)的编码示例中，你将看到一个名为`Mutex`的类，它封装了互斥锁同步操作的概念。这个类提供了两个主要函数：`lock`和`unlock`。第一个成员函数在临界区的开头调用。第二个重要的成员函数是`unlock`，应在临界区的末尾调用。`Mutex`类还负责在构造函数中使用`pthread_mutex_init`初始化`pthread`互斥锁，并在析构函数中使用`pthread_mutex_destroy`销毁它。


    用于封装互斥锁概念的第二个类是`MutexAccess`。该类负责保证对互斥锁的每次访问都由一对对`Mutex`的`lock()`和`unlock()`成员函数的调用组成。`lock()`成员函数直接在构造函数中调用，而`unlock()`在`MutexAccess`的析构函数中自动调用。因此，如果临界区正好在声明`MutexAccess`对象的作用域结束时结束，你无需担心解锁问题，因为RAII惯用法保证了当析构函数被调用时，互斥锁会被自动解锁。


    在`MutexTestThread`中，我们有一个在线程内使用`Mutex`类的示例。所演示的任务非常简单，但它说明了如何使用互斥锁来提供对共享资源的同步访问。这里，共享资源是`double`类型的变量`result`。该变量用于保存所需的计算结果；然而，它被应用程序中的所有线程访问。为了同步对该变量的访问，你需要使用互斥锁。可以实例化`MutexAccess`类的一个对象，这会导致互斥锁（名为`m_globalMutex`）被锁定。获取锁之后，你现在可以安全地检查该值并对引用变量进行更改。最后，在`run()`成员函数的末尾，锁将被自动释放。'
  raw: "Solution\nMultithreading is a convenient way to distribute computational work\
    \ into\ntwo or more processor cores, which can lead to an increase in\nperformance\
    \ for the whole application. However, while multithreading has\nnumerous advantages,\
    \ it also\nadds to the complexity of the software design. For example, one of\
    \ the\nproblems that need to be solved in multithreading architectures is the\n\
    access to resources shared between threads. If a variable in memory is\nused in\
    \ two or more threads, its access needs to be synchronized so that\nseparate threads\
    \ will not try to change values concurrently, for\nexample.\nOnce a new thread\
    \ has been created, it is necessary to manage it,\nusing mechanisms provided by\
    \ the pthread library. In the simplest case,\nthe new thread is independent and\
    \ does not need to be synchronized with\nthe original (parent) thread. More commonly,\
    \ however, it is necessary to\nperform synchronization between\nseparate threads\
    \ that use the same data. The greater the need for\nsynchronization, the greater\
    \ the amount of work spent on managing the\nshared data.\nA section of code where\
    \ two or more threads can access a shared\nresource is called a *critical section*.\
    \ The critical sections  are the areas of the\ncode where shared resources need\
    \ to be protected, in order to avoid\nconflicts.\nTo avoid the conflicts inherent\
    \ to the existence of critical\nsections, most multithreading APIs provide primitives\
    \ that can be used\nto implement synchronized operations. Such operations have\
    \ proved\neffective in enabling resource sharing between threads. There are a\n\
    number of such primitives, such as semaphores, mutexes, and messages,\namong others.\
    \ The pthreads library provides direct support for some of\nthe most common of\
    \ such mechanisms, including mutexes, which can be used\nto guarantee that only\
    \ one thread is able to access a particular\ncritical section.\nA *mutex*\n is\
    \ a synchronization\nmechanism that can be used to coordinate the work of two\
    \ or more\nthreads. The mutex state is used to determine if a thread has permission\n\
    to operate on a particular resource, such as a variable in memory. When\na thread\
    \ tries to access the value of the mutex, two things can happen:\nif the mutex\
    \ state indicates that the critical section is available,\nthen the thread can\
    \ directly proceed to the critical section. However,\nif the mutex state indicates\
    \ a busy state, the thread making the request\nstops its execution and is sent\
    \ to a waiting area created by the\noperating system. Operation will resume only\
    \ when the resource has been\nmade available by other threads. All this waiting\
    \ and resuming activity\nis coordinated by the operating system.\nMutexes are\
    \ implemented in the pthreads API and have\nthe type `thread_mutex_t`. A new\n\
    mutex can be created using the function `pthread_mutex_init`\nand destroyed using\
    \ the function `pthread_mutex_destroy`.\nA mutex needs to be acquired and locked\
    \ when a shared resource is\nabout to be used. This guarantees that the mutex\
    \ will be available for\nonly one thread at a time. This is done using the function\
    \ `pthread_mutex_lock`\n . This\nfunction will automatically interrupt the thread\
    \ if the mutex is not\navailable and force the thread to wait until the mutex\
    \ has been\nreleased. You can also try to access the mutex without a forced wait\n\
    using `pthread_mutex_trylock`.\nThis will return an error code in case the mutex\
    \ is currently not\navailable, and you will be free to try it later. Finally,\
    \ once a mutex\nhas been acquired, you need to unlock the mutex at the end of\
    \ the\nsynchronized operation. This is necessary to make sure that other\nthreads\
    \ can enter the critical section and use the recently released\nresource. You\
    \ can unlock a mutex using the function `pthread_mutex_unlock`\n .\nWhile theoretical\
    \ proof of the effectiveness of the mutex can be\ncomplex, its use is very simple.\
    \ In the coding example in Listing [17-3](#323908_2_En_17_Chapter.xhtml#PC8),\
    \ you will have\na class called `Mutex` that\nencapsulates the concept of a mutex\
    \ synchronization\noperation. There are two main functions provided by this class:\n\
    `lock` and `unlock`. The first\nmember function is called at the beginning of\
    \ a critical section. The\nsecond important member function in the class is `unlock`,\
    \ which should\nbe called at the end of a critical section. The `Mutex` class\
    \ is also\nresponsible for initializing the pthread mutex at the constructor with\n\
    `pthread_mutex_init`\nand destroying it at the destructor with `pthread_mutex_destroy`.\n\
    The second class used to encapsulate the mutex concept is `MutexAccess`\n . This\n\
    class is responsible for guaranteeing that each access to the mutex is\ncomposed\
    \ of a pair of calls to the `lock()` and `unlock()` member functions  of `Mutex`.\
    \ The `lock()` member function is directly\ncalled in the constructor, and `unlock()`\
    \ is\nautomatically called in the destructor of `MutexAccess` .\nTherefore, if\
    \ the critical section ends right at the end of the scope\nwhere the `MutexAccess`\
    \ object is\ndeclared, you don’t need to worry about unlocking it, since the RAII\n\
    idiom guarantees that the mutex will be automatically unlocked when the\ndestructor\
    \ is called.\nIn the `MutexTestThread`\n, we have an example of using the `Mutex`\
    \ class inside a\nthread. The task demonstrated is really simple, but it illustrates\
    \ how\nthe mutex can be used to provide synchronization of access to shared\n\
    resources. Here, the shared resource is the variable `result`, of `double` type.\
    \ This\nvariable is used to hold the desired calculation; however, it is being\n\
    accessed in all threads in the application. In order to synchronize\naccess to\
    \ this variable, you need to use a mutex. An object of the class\n`MutexAccess`\
    \ can\nbe instantiated, resulting in the mutex (named `m_globalMutex`) being\n\
    locked. After the lock has been acquired, you can now safely check the\nvalue\
    \ and make changes to the reference variable. Finally, at the end of\nthe `run()`\n\
    member function,\nthe lock will be released automatically."
