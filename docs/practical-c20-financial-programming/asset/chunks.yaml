    ### Transferring Ownership


    In the previous example, you saw how to use unique pointers to transfer the ownership
    of objects to the caller of a function. Another important use of these smart pointers
    is to tell to a caller that the called function is taking ownership of the passed
    object.


    For example, consider the function `transferFinancialStatement`, which is defined
    in the following way:


    ```

    void transferFinancialStatement(std::unique_ptr<FinancialStatement> statement);

    ```


    The parameter `statement` is a unique pointer to a `FinancialStatement` object,
    which means that once it receives a parameter of that particular type, it will
    become the owner of the object. Thus, the `transferFinancialStatement` can use
    the `statement` object knowing that it is the sole owner of its contents. Depending
    on the operations necessary to perform on the object, this may be an important
    advantage.


    The sample implementation of the function reads as follows:


    ```

    void transferFinancialStatement(std::unique_ptr<FinancialStatement> &statement)

    {

    // perform transfer here

    // ...

    // statement is still valid

    std::unique_ptr<FinancialStatement> another = std::move(statement);

    std::cout << another->getReturn() << std::endl;

    // statement is released here

    }

    ```


    The important thing to understand here is that the pointed object is destroyed
    at the end of the `transferFinancialStatement`, since the parameter was transferred
    and therefore goes out of scope at the end of the function block.


    ### Pitfalls of Unique Pointers


    Due to the semantics of unique pointers, which require the ownership of the referenced
    data, a few errors can occur when programmers try to access data stored in this
    kind of smart pointer. For example, a common source of errors is the use of functions
    that take ownership of the pointed object. You can see this class of errors by
    using the function `transferFinancialStatement`, which I showed previously. When
    a unique pointer object is passed to a function that takes ownership of the memory,
    the unique pointer is not valid anymore, and may cause a crash the next time it
    is accessed.


    ```

    int main()

    {

    std::unique_ptr<FinancialStatement> fs = getSampleStatement();

    transferFinancialStatement(fs);

    // the unique_ptr object is invalid here, the next access can crash the program

    std::cout << fs->getReturn() << "\n";

    return 0;

    }

    ```


    This example shows how easy it is to crash a program after a unique pointer has
    transferred the ownership of the object it points to. This is done as you call
    the `transferFinancialStatement` function.


    The next line tries to access the return value, which generates an invalid access.
    This results in a segmentation fault in many platforms. To avoid such invalid
    accesses, a programmer needs to be careful about calling functions that accept
    a unique pointer, vs. a native pointer.


    Another pitfall of unique pointers is their lack of support for STL containers.
    For example, it is not possible to have unique pointers as members of an `std::vector`.
    This happens because most containers work by copying their elements by value,
    which in practice invalidates the data stored in the existing unique pointer.
    Moreover, many algorithms for STL containers perform internal copies of the data
    they contain. This means that such algorithms can destroy the original elements
    without previous notice: a very awkward situation. For these reasons, it is recommended
    that you avoid using unique pointers when dealing with STL containers.


    To avoid the problems with `std::unique_ptr`, another smart pointer type has been
    introduced: the `std::shared_ptr` template provides the semantics of pointers
    that can be shared by different owners. In the next section, you will see an example
    of how to use such shared pointer objects.


    ## Determining Credit Ratings


    Create a class to determine the credit ratings of a given security.


    ### Solution


    Credit risk ratings are defined by accredited rating agencies and used to determine
    the risk of institutions. With this information, investors can determine the risk
    level of a particular bond or stock holding and control the level of risk they
    are willing to assume. For example, risk-averse investors such as pension funds
    and insurance companies typically shy away from investing in any institution that
    is not certified as top grade (typically AAA). There are three main credit rating
    agencies used by financial institutions all over the world: Moody’s, S&P, and
    Fitch. They define the risk grade not only for companies but also for local-,
    state-, and national-level governments.


    To model credit ratings in C++, I created a separate class that encapsulates the
    fundamental concepts behind credit risk rating. The class `CreditRisk` has a member
    function called `getRating`, which returns the prevailing risk rating for a particular
    stock or bond. A second class, named `RiskCalculator`, is used to perform a simple
    analysis of the risk associated with a particular portfolio, given a set of risk
    ratings for each component of the portfolio.'
