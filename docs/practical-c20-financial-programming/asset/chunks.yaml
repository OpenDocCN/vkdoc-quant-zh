    \ involved in the development of the C++ standard, which means that many of the\
    \ libraries currently included in the boost distribution will later on become\
    \ part of the standard library. For example, template classes such as `std::shared_ptr`\
    \ originated from `boost::shared_ptr`.\n\nTo use boost libraries in your application,\
    \ you need to download and install them from the `boost.org` website. The process\
