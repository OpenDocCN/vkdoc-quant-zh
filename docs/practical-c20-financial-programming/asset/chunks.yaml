    The Matrix Class\n```\n\n## Using Templates to Calculate Factorials\n\nIn this\
    \ section, I will show how to create a template-based class that can be used to\
    \ calculate factorials at compile time.\n\n### Solution\n\nTemplates provide an\
    \ easy way to apply the same code across data types, allowing programmers to create\
    \ generic, reusable code. The best example of this is the STL, with its many containers\
    \ and associated algorithms. However, templates can also be used to perform numerical\
    \ tasks due to their ability to receive integer numbers, in addition to data types,\
    \ as formal arguments. In this coding example, you will see how templates can\
    \ be employed to perform some simple calculations at compilation type.\n\nTemplate-based\
    \ computation can be seen as a useful strategy to reduce the runtime overhead\
    \ of numeric algorithms. After all, if you’re able to perform some of the calculations\
    \ at compilation time, less time will be necessary to perform the complete computation\
    \ each time you execute the compiled code.\n\nOne of the biggest surprises for\
    \ people who start working with template-based computing is that calculated values\
    \ cannot simply be returned as the output of functions. Since functions can return\
    \ any value at runtime, a traditional function cannot serve as the basis for compile-time\
    \ calculations. Instead, you need a way to store values inside the class as a\
    \ constant, which can then become readily available to the compiler. One of the\
    \ ways to achieve this in C++ is with an enumeration. For example, consider:\n\
    \n```cpp\nenum {\nresult = 1\n};\n```\n\nThis fragment defines a constant, integral\
    \ value that can be later referenced in the program. If a constant expression\
    \ is used (instead of a number) in the right-hand side of the declaration, the\
    \ `result` value can be later employed in the program to access the desired value.\n\
    \nThe next thing you need is a way to pass numbers as parameters to the class\
    \ template. In C++, you can declare templates that take as parameters an `int`\
    \ value (or one of its several variations such as `long` and `char`). The general\
    \ syntax that can be used to perform calculations as part of a template is the\
    \ following:\n\n```cpp\ntemplate \nclass CompileTime {\npublic:\nenum {  result\
    \ = ConstantExpressionDependingOnN };\n};\n```\n\nwhere `ConstantExpressionDependingOnN`\
    \ is an expression that in some way depends on the parameter `N` and can be used\
    \ to calculate the desired value. You can see that the code in this example will\
    \ use this general format to perform compile-time calculations.\n\nOnce you find\
    \ a way to execute calculations at compilation time, the next step is to introduce\
    \ concepts such as iteration to your code. In C++ templates, it is not possible\
    \ to write loops, such as `for` or `while`, as part of a constant expression.\
    \ All C++ loops are executed at runtime, which makes them unusable for compile-time\
    \ operations. Thankfully, templates provide a specialization mechanism that can\
    \ be used to implement recursion, a technique that can be used to achieve the\
    \ same effects as looping.\n\nFor example, if a template uses a single integer\
    \ parameter, you can specialize that parameter with a base case alongside a generic\
    \ version that handles the common case. Together, these cases are enough to simulate\
    \ a loop that starts with the generic case and terminates the computation once\
    \ the special case is reached. Figure 5-1 presents an illustration of this mechanism,\
    \ where the following example is considered:\n\n![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig1_HTML.jpg](images/323908_2_En_5_Chapter/323908_2_En_5_Fig1_HTML.jpg)\n\
    \n*Figure 5-1*  \nAn example of computation using template specialization. The\
    \ general case is instantiated with the integer 4, and new instantiations are\
    \ used until the specialization for `Double<1>` is reached.\n\n```cpp\n// general\
    \ case\ntemplate \nclass Double {\npublic:\nenum {  result = 2 + Double  };\n\
    };\n// specialization for the base case\ntemplate \nclass Double {\npublic:\n\
    enum {  result = 2 };\n};\n```\n\nThis shows how you can compute the double of\
    \ an integer number using template-based recursion. The general case is stated\
    \ at the top, where the result value is defined as the expression `2 + Double<N-1>`.\
    \ To find the value of that expression, the compiler will need to expand it inline,\
    \ decreasing the value of `N` each time and calling `Double` with the new value.\
    \ The second part of the declaration allows this process to end, introducing a\
    \ base value. The declaration reads:\n\n```cpp\ntemplate \nclass Double\n```\n\
    \nThis tells the compiler that `Double<1>` is a specialization of a generic template,\
    \ for the particular value of `1`. Therefore, when the template `Double` is applied\
    \ to `1`, the result calculated will be the value `2`, as desired.\n\nA similar\
    \ strategy can be used to solve multiple problems, including the required task\
    \ of computing factorials. The first part is to define the general case, which\
    \ contains a recurring expression.\n\n```cpp\ntemplate \nclass Factorial {\npublic:\n\
    enum {\nresult = Factorial::result * N\n};\n};\n```\n\nThe second part of the\
    \ solution is the base case, which will determine the value of `Factorial<0>`.\
    \ This can be written as:\n\n```cpp\ntemplate \nclass Factorial {\npublic:\nenum\
    \ {\nresult = 1\n};\n};\n```\n\nWe can test the preceding code with a few calls\
    \ to the `Factorial` template. The example is included as part of the `showFactorial`\
    \ function.\n\n```cpp\nvoid showFactorial()\n{\nstd::cout ::result;\nstd::cout\
    \ ::result;\nstd::cout ::result;\n}\n```\n\nFinally, you can also use the `Factorial`\
    \ class as the basis of other compile-time computations. For example, here is\
    \ how you can use `Factorial` to calculate the choice number (the number of combinations\
    \ of N objects, taken in groups of P).\n\n```cpp\ntemplate \nclass ChoiceNumber\
    \ {\npublic:\nenum {\nresult = Factorial::result / (Factorial::result * Factorial::result)\n\
    };\n};\n```"
