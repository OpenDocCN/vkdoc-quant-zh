    # 引言


    这是一本面向程序员的实操书籍，旨在帮助读者了解 C++20 在金融行业中的应用。本书重点介绍了常用于编写金融软件的语言部分，包括 STL（标准模板库）、模板以及对数值库的支持。我还描述了金融工程中的许多重要问题，这些问题正是投资银行和对冲基金中金融程序员与量化分析师的日常工作。


    本书提供了覆盖所有主要工具和概念的实操示例，用于构建金融应用的可行解决方案。每一章都教会读者如何使用高级 C++ 概念，以及现代 C++ 开发者使用的基本构建库，例如
    STL 和 Boost。我讨论了如何借助面向对象和基于模板的编程知识，创建正确且高效的应用程序。我只假设读者具备 C 和 C++ 的基础知识，并以此为基础，解释熟悉现代
    C++ 的开发人员已经掌握的那些技术。


    在撰写本书的过程中，我致力于为那些试图利用编程知识，在银行、对冲基金及金融行业其他公司等金融机构中熟练掌握编程风格的读者提供巨大价值。然而，我以逻辑清晰且结构化的方式介绍了本书涵盖的主题，即便是新手程序员也能吸收开发
    C++ 金融应用所需的最重要主题和能力。


    本书的一个重要特点是专注于特定主题和金融问题的实用解决方案。虽然重点不在于金融的理论方面，但我确实讨论了诸如数值算法、积分技术和用于衍生品估值的微分方程等主题。此外，读者将能够很好地理解如何使用现代
    C++ 概念来建模这类问题。


    面向程序员的金融文献通常有大量从学术角度撰写的书籍，大部分篇幅花在讨论算法背后的数学概念上，而非开发者需要克服的软件工程挑战。因此，在本书中，我决定通过代码示例的形式，专注于常见编程问题的可行解决方案，为读者的阅读努力提供更多价值。


    ## 目标读者


    本书面向已经具备 C、C++ 或其他主流语言编程实践知识的读者。他们通常是计算机科学、工程学、物理学和数学领域的专业人士或高级学生，出于个人提升或职业原因，对学习
    C++20 金融编程感兴趣。本书也适用于金融机构中从事 C++ 编程的从业者，他们可以将本书用作常见开发问题的即用参考。


    通过阅读本书，你将学习如何使用现代 C++20 技术来实现实际应用。作为一种多范式语言，C++ 在每个应用领域的使用方式略有不同。因此，用于开发桌面应用的技能，与编写高性能软件所用的技能不尽相同。大多数重要的高性能金融应用都是用
    C++ 编写的，这意味着想要进入这个高收益市场的程序员需要掌握语言中几个特定且相关的部分。因此，对于那些希望在有效提升知识的同时，学习现代应用和高性能软件开发中最受追捧、最具市场价值的技能组合之一的开发者来说，本书将是一个绝佳的选择。'
- fmt: '# Content Overview


    Here is a brief overview of the contents of each chapter.


    **Chapter 1—The Fixed Income Market**: The fixed income market is a large part
    of the financial engineering industry, and it presents unique computational challenges
    for its practitioners. `C++` programming is widely used in this area, offering
    the ability to compute rates and cash flow variations with incredible speed, as
    readers will learn in this chapter. I present `C++` coding examples that can be
    used in the solution of some of the most common problems occurring in fixed income
    markets. I include `C++` algorithms for topics such as (1) interest rate calculation,
    (2) present value computation, (3) cash flows, and (4) valuation of bonds.


    **Chapter 2—The Equities Market**: Equity markets are multifaceted and offer a
    great variety of investment vehicles. As a result, the number and complexity of
    computational techniques used for financial analysis of equity markets continue
    to grow. In this chapter, I present `C++` examples for a few selected problems
    occurring in the equities markets and their derivatives. I cover programming topics
    such as the following: (1) moving average computation, (2) calculating volatility,
    (3) computing instrument correlation, and (3) calculating fundamental indicators.


    **Chapter 3—C++ Programming Techniques in Finance**: The `C++` language was created
    as an extension of `C`, which means that most programs written in `C` are also
    valid `C++` programs. However, good `C++` programs need to make use of high-level
    features made available by the language to control program complexity. This is
    especially important for financial applications, where we want to create fast
    and expressive applications. In this chapter, I explore fundamental techniques
    that financial `C++` programmers use to write better code with less effort, including
    (1) class templates, (2) auto pointers, (3) shared pointers, (4) resource acquisition
    is initialization (`RAII`), (5) automatic type detection, (6) exception handling,
    and (7) operator overloading.


    **Chapter 4—Common Libraries for Financial Applications**: Modern coding in `C++`
    uses libraries that simplify the creation of fast, standard-conforming classes.
    The `STL` offers a set of generic, standard containers that can be used in almost
    any situation. Knowing how to use the `STL` well is one of the main skills necessary
    for effective `C++` programming. Another common set of classes is contained in
    the `Boost` libraries, which are usually the basis for the next version of the
    `C++` standard. Readers will learn about topics such as (1) `STL` containers,
    (2) `STL` algorithms, (3) `boost` libraries, and (4) date and time handling.


    **Chapter 5—Designing Numerical Classes**: At the heart of financial applications
    is a set of well-designed numerical classes. This chapter tells you how to create
    numerical classes that will perform efficiently when used in production code.
    You will also see examples in `C++` that show how to integrate with existing numerical
    classes and algorithms. You will learn how to (1) implement a matrix class, (2)
    perform calculations at compilation time with templates, (3) represent ratios
    with `C++` templates, and (4) generate statistical data.


    **Chapter 6—Plotting Financial Data**: A common activity in financial programming
    is the generation of data that needs to be visualized by traders or other financial
    stakeholders. Most of the time, the data needs to be plotted in the form of a
    chart for easy visualization. I give a few examples that show how to plot data
    in `C++` programs using common libraries. You will learn about topics such as
    (1) using `Gnuplot` to plot data, (2) designing a class to create `Gnuplot` charts,
    and (3) plotting from a `GUI` (graphical user interface) application using `Qt`.


    **Chapter 7—Linear Algebra**: Linear algebra (`LA`) techniques are used throughout
    the area of financial engineering. Therefore, it is important to understand how
    the traditional methods of `LA` can be applied in `C++`. With this goal in mind,
    I present a few examples that show how to use some of the most common `LA` algorithms.
    In this chapter, you will also learn about (1) integrating existing `LA` libraries
    into your code, (2) basic `LA` operations, (3) the `BLAS` (basic linear algebra
    subprograms) library, and (4) calculating the determinant of a matrix with `BLAS`.


    **Chapter 8—Interpolation**: Interpolation is a commonly used technique that finds
    a mathematical function approximating a set of points. Fast interpolation is the
    secret for high-performance algorithms in several areas of financial engineering.
    This chapter will show you programming samples that cover a few of the most common
    interpolation methods, with efficient implementation in `C++`. The main techniques
    discussed in this chapter are (1) linear interpolation and (2) polynomial interpolation.


    **Chapter 9—Calculating Roots of Equations**: Equations are one of the building
    blocks of algorithms in financial engineering, and it is important to be able
    to calculate equation roots efficiently. In this chapter, you will find algorithms
    for different methods of calculating equation roots, along with explanations of
    how they work and when they should be used. Topics include (1) the bisection method,
    (2) the secant method, and (3) Newton’s method.


    **Chapter 10—Numerical Integration**: Function integration is a common part of
    many financial algorithms. However, it is hard to solve certain classes of equations
    exactly, and numerical methods need to be employed in such cases. In this chapter,
    you will see examples of `C++` code that can be readily applied to common integration
    problems. I also discuss the performance and the accuracy of such methods. The
    programming examples in this chapter cover topics such as (1) the midpoint method,
    (2) the trapezoid method, and (3) Simpson’s method.


    **Chapter 11—Solving ODEs and PDEs**: Differential equations are at the heart
    of many techniques used in the analysis of equity markets. There are several processes
    for solving and analyzing ordinary differential equations (`ODE`) and partial
    differential equations (`PDE`) that can be implemented in `C++`. In this chapter,
    I present programming examples that cover aspects of `ODEs` and `PDEs` modeling
    and application in `C++`. Topics covered include the following: (1) solving `ODEs`,
    (2) using the Runge-Kutta method, and (3) solving the Black-Scholes equation.


    **Chapter 12—Optimization**: Optimization refers to a set of techniques used to
    find the minimum or maximum of a function. Optimization strategies are used in
    several areas of financial engineering. In this chapter, I discuss programming
    techniques that can be used to implement common aspects of optimization algorithms.
    I provide a concise explanation of some techniques and how they are typically
    implemented in `C++20`. You will learn about (1) modeling optimization problems,
    (2) interfacing with linear programming (`LP`) solvers, (3) solving two-dimensional
    `LP` problems, and (4) mixed integer–programming models.'
