    \n图 11-1\n前述示例中龙格-库塔算法的连续步骤，N=100\n\n## 求解布莱克-斯科尔斯方程\n\n创建一个 C++ 类，使用前向方法求解布莱克-斯科尔斯方程。\n\
    \n解决方案\n\n布莱克-斯科尔斯方程是定价衍生品最著名的方程之一。它于 20 世纪 70 年代开发，旨在为欧式期权提供更好的模型，但此后，该基本模型已得到扩展并在多种衍生品市场上进行了测试。虽然布莱克-斯科尔斯方程的原始假设在真实市场中并未完全得到尊重，但该模型仍是一个出色的分析工具，用于对呈现股票市场中观察到的波动行为的工具进行定价。\n\
    \n请记住，期权是一份合约，允许持有者在未来特定时间以特定价格购买（或出售）一定数量的股票。例如，一份针对微软（MSFT）的看涨期权，执行价为 30 美元，到期日为明年七月，赋予其所有者权利（而非义务）在七月以\
    \ 30 美元的价格购买微软股票，无论届时实际价格如何。因此，如果微软股票价格显著高于 30 美元，此操作将产生利润。然而，若价格为 30 美元或更低，该期权将导致亏损。类似地，您也可以对看跌期权进行相同分析，看跌期权是以给定价格在未来出售股票的权利。当标的资产价格上涨时，看涨期权产生更高利润，并伴有固定的最大损失。另一方面，当标的资产价格下跌时，看跌期权产生更高利润，同样伴有固定的最大损失。\n\
    \n布莱克-斯科尔斯模型定义了看涨期权的现值应为多少（类似的分析也适用于看跌期权）。它考虑以下输入值：\n\n*   S：标的工具的价格\n*   K：期权的行权价\n\
    *   T：期权合约的剩余时间\n*   V：标的资产的当前波动率\n*   r：当前的存款利率\n\n利用这些信息，布莱克-斯科尔斯模型得出结论，期权当前价格与输入变量之间的关系由一个偏微分方程给出，如下所示：\n\
    \n![$$ \\frac{\\partial C\\left(S,t\\right)}{\\partial t}= rS\\frac{\\partial\
    \ C\\left(S,t\\right)}{\\partial S}+\\frac{V²{S}²}{2}\\frac{\\partial²C\\left(S,t\\\
    right)}{\\partial {S}²}- rC\\left(S,t\\right) $$](img/323908_2_En_11_Chapter_TeX_Equn.png)\n"
- fmt: "Here, the implicit function `C(S, t)` is the price or the derivative, which\
    \ depends on the underlying price `S` and the time `t`.\n\nThere are several ways\
    \ to solve differential equations like the previous one. The one you will use\
    \ in this section is called the forward method. The general idea of solving PDEs\
    \ is not very different from what you have seen for ODEs: take small steps toward\
    \ the desired point that needs to be calculated, and evaluate the differential\
    \ equation at these intermediate points using some kind of approximation. Unlike\
    \ ODEs, which have only one dimension, however, PDEs have partial derivatives\
    \ over two or more variables. In this case, we have partial derivatives in relation\
    \ to the variables `t` and `S`. When this happens, the approximations become more\
    \ complicated, because one needs to determine the shape of the small intervals\
    \ at which the PDE will be evaluated. For example, the simplest scheme would be\
    \ to divide the two-dimensional space into small rectangles and approximate over\
    \ these small elements. Depending on the class of PDE, one can come up with more\
    \ complicated and more precise ways to divide the domain and approximate the true\
    \ value of the partial equation.\n\nThe forward difference method is an extension\
    \ of Euler’s method for PDEs. For the two-dimensional case, it can be used to\
    \ divide the domain into rectangular elements. For this method to work, you can\
    \ assume that the stock price domain (`S`) varies between 0 and `MaxS`, a constant\
    \ number that is in practice much higher than the desired strike price. The time\
    \ domain varies from 0 (current date) to the future time (`T`) in which the option\
    \ contract expires. Using these assumptions, the next task is to derive the equations\
    \ that approximate the PDE at the next step, which can be done again using the\
    \ Taylor method discussed earlier.\n\nThe initial conditions for the forward method\
    \ are derived from the gain-loss equation at expiration. At that time, the value\
    \ of an option is the positive difference between the stock price and the strike\
    \ price, that is, `max(S – K, 0)`. Therefore, the steps of the algorithm are inverted\
    \ in the time dimension, starting from time `T` and moving backward to the present.\n\
    \nThe resulting algorithm is presented in member function `solve` of class `BlackScholesForwardMethod`.\
    \ The initial part of the function calculates terms of the equation that are unchanged\
    \ over time. The three main factors are stored in the vectors `a`, `b`, and `c`.\n\
    \n![$$ {a}_n=\\frac{1}{2}\\left( nrdt-{(nV)}^2 dt\\right) $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equo.png)\n\
    \n![$$ {b}_n=1- rdt+{(nV)}^2 dt $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equp.png)\n\
    \n![$$ {c}_n=\\frac{1}{2}\\left( nrdt+{(nV)}^2 dt\\right) $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equq.png)\n\
    \nThe next step is to initialize the process using the given initial conditions.\
    \ The calculated prices are stored in the two-dimensional vector `u`, which is\
    \ initialized using the prices at expiration time. Then, the algorithm proceeds\
    \ to compute the values for each of the time periods starting from expiration.\
    \ At each day, starting from the day before expiration, the price of the option\
    \ is calculated for each small increase in the underlying price. The option price\
    \ for underlying value `S` depends on the price of the next day for values `S\
    \ – dS`, `S`, and `S + dS`, where `dS` is a small increase in price, as determined\
    \ by the parameter `nx`. Therefore, we have\n\n![$$ {u}_{t,n}={a}_n{u}_{t,n-1}+{b}_n{u}_{t,n}+{c}_n{u}_{t,n+1}\
    \ $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equr.png)\n\n##\
    \ Complete Code\n\nListing [11-3](#323908_2_En_11_Chapter.xhtml#PC6) displays\
    \ the complete implementation for the Black-Scholes forward method. You will find\
    \ the code in class `BlackScholesForwardMethod`, along with a sample of its use\
    \ in function `main()`.\n\n```\n//\n//  BlackScholesForwardMethod.h\n#ifndef __FinancialSamples__BlackScholesForwardMethod__\n\
    #define __FinancialSamples__BlackScholesForwardMethod__\n#include \nclass BlackScholesForwardMethod\
    \ {\npublic:\nBlackScholesForwardMethod(double expiration, double maxPrice, double\
    \ strike, double intRate);\nBlackScholesForwardMethod(const BlackScholesForwardMethod\
    \ &p);\n~BlackScholesForwardMethod();\nBlackScholesForwardMethod &operator=(const\
    \ BlackScholesForwardMethod &p);\nstd::vector solve(double volatility, int nx,\
    \ int timeSteps);\nprivate:\ndouble m_expiration;\ndouble m_maxPrice;\ndouble\
    \ m_strike;\ndouble m_intRate;\n};\n#endif /* defined(__FinancialSamples__BlackScholesForwardMethod__)\
    \ */\n//\n//  BlackScholesForwardMethod.cpp\n#include \"BlackScholesForwardMethod.h\"\
    \n#include \n#include \n#include \n#include \n#include \nusing std::vector;\n\
    using std::cout;\nusing std::endl;\nusing std::setw;\nBlackScholesForwardMethod::BlackScholesForwardMethod(double\
    \ expiration, double maxPrice,\ndouble strike, double intRate)\n: m_expiration(expiration),\n\
    m_maxPrice(maxPrice),\nm_strike(strike),\nm_intRate(intRate)\n{\n}\nBlackScholesForwardMethod::BlackScholesForwardMethod(const\
    \ BlackScholesForwardMethod &p)\n: m_expiration(p.m_expiration),\nm_maxPrice(p.m_maxPrice),\n\
    m_strike(p.m_strike),\nm_intRate(p.m_intRate)\n{\n}\nBlackScholesForwardMethod::~BlackScholesForwardMethod()\n\
    {\n}\nBlackScholesForwardMethod &BlackScholesForwardMethod::operator=(const BlackScholesForwardMethod\
    \ &p)\n{\nif (this != &p)\n{\nm_expiration = p.m_expiration;\nm_maxPrice = p.m_maxPrice;\n\
    m_strike = p.m_strike;\nm_intRate = p.m_intRate;\n}\nreturn *this;\n}\nvector\
    \ BlackScholesForwardMethod::solve(double volatility, int nx, int timeSteps)\n\
    {\ndouble dt = m_expiration /(double)timeSteps;\ndouble dx = m_maxPrice /(double)nx;\n\
    vector a(nx-1);\nvector b(nx-1);\nvector c(nx-1);\nint i;\nfor (i = 0; i  u((nx-1)*(timeSteps+1));\n\
    double u0 = 0.0;\nfor (i = 0; i  u = bsfm.solve(sigma, numSteps, numDays);\ndouble\
    \ minPrice = .0;\nfor (int  i=0; i < numSteps-1; i++)\n{\ndouble s = ((numSteps-i-2)\
    \ * minPrice+(i+1)*maxPrice)/ (double)(numSteps-1);\ncout << \"  \" << s << \"\
    \  \" << u[i+numDays*(numSteps-1)] << endl;\n}\nreturn 0;\n}\nListing 11-3\nBlack-Scholes\
    \ Forward Method Implementation\n```\n\n## Running the Code\n\nTo test the code\
    \ displayed in Listing [11-3](#323908_2_En_11_Chapter.xhtml#PC6), you can build\
    \ it using any standards-compliant compiler. I run this code using the llvm C++\
    \ compiler, with the following results:\n\n```\n./blackScholes\n1  0.000452875\n\
    2  0.0148578\n3  0.109172\n4  0.361706\n5  0.784941\n6  1.34918\n7  2.016\n8 \
    \ 2.75175\n9  3.53055\n10  4.33362\n```\n\nThis result means, for example, that\
    \ 29 days from expiration, a call option with strike price $5 and volatility 0.5\
    \ would be valued at $1.3 when the price of the underlying is $6. Notice that\
    \ you can use this code to calculate prices for each price level ranging from\
    \ $1 up to $10. You can also modify the code to compute option prices for more\
    \ expensive stocks."
