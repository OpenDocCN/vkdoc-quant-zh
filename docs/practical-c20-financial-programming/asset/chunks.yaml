    Now, in the CAP model, we assume that we know the variance of each asset as well
    as the covariance of pairs of assets in the same portfolio. Variance is a classical
    measure of volatility of investments (i.e., the higher the variance, the higher
    the volatility). Thus, we can use the available individual volatility information
    to try to minimize the volatility of the whole portfolio. Since variance is a
    quadratic function, the objective function will also be quadratic, with individual
    terms depending on the individual variance of individual stocks (`c[ii]`) and
    on the covariance of pairs of stocks (`c[ij]`). The resulting problem can be described
    as follows:


    ![$$ \min \sum \limits_{i=1}^n\sum \limits_{j=1}^n{c}_{ij}\kern0.22em {x}_i\kern0.22em
    {x}_j $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Eque.png)


    ![$$ \sum \limits_{i=1}^n{x}_i=1 $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equf.png)


    ![$$ \sum \limits_i^n{r}_i{x}_i\ge R. $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equg.png)


    ![$$ {x}_i\ge 0\ for\ all\ i\in \left\{1\dots n\right\}. $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equh.png)


    During the last few decades, many people have studied this optimization problem
    and its variations. The formulation employs an objective function that is quadratic
    (nonlinear)—that is, there are terms in the objective function that involve a
    multiplication of two variables. The general solution of this problem, considering
    this nonlinear structure, forms what is called an efficient frontier: a set of
    results for different combinations of portfolios, where the volatility of the
    target portfolio is minimized. You can see an example of efficient frontier in
    Figure [13-1](#323908_2_En_13_Chapter.xhtml#Fig1), which shows a plot of volatility
    against target return. The plot is created by, at each time, fixing a desired
    return and then using the quadratic optimization model to find the minimum associated
    volatility. As you see in Figure [13-1](#323908_2_En_13_Chapter.xhtml#Fig1), the
    plot shows that the relationship assumes the shape of a parabolic curve.


    ![../images/323908_2_En_13_Chapter/323908_2_En_13_Fig1_HTML.jpg](images/323908_2_En_13_Chapter/323908_2_En_13_Fig1_HTML.jpg)


    **Figure 13-1** A small portion of the efficient frontier for a portfolio optimization
    problem


    Although the quadratic model for CAP is widely used, a difficulty with it is the
    fact that you need a quadratic optimization solver to get results for a particular
    portfolio. Although several packages provide direct solutions to quadratic problems
    (using, for example, an interior point algorithm), GLPK is not able to solve quadratic
    optimization models directly. Therefore, in this section, you will deal with a
    linearization of the original problem, which can be readily calculated using LP
    solvers. This linearization was proposed in Konno and Yamazaki’s article titled
    “Mean-Absolute Deviation Portfolio Optimization Model and Its Applications to
    Tokyo Stock Market” (*Management Science*, vol. 37, pp. 519–529, 1991). The linearization
    is a modified form of the original problem that contains only linear terms in
    the objective function. While this is just an approximation of the original problem,
    in many cases it can work well enough (it might not work, however, when the computational
    effort needed to linearize the constraints becomes too costly). More important,
    a linearized version of the problem may be solved more quickly than the quadratic
    version, which may be an important consideration in some cases.


    Consider the additional variables `y[i]` ∈ {1...`T`}, where `T` is the number
    of periods for the proposed investment. Then, a linear model can be described
    as the following:


    ![$$ \min \frac{1}{T}\sum \limits_{t=1}^T{y}_t $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equi.png)


    ![$$ \sum \limits_{j=1}^n\left({r}_{jt}-{r}_j\right){x}_j\le {y}_t, for\kern0.22em
    t\in \left\{1\dots T\right\} $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equj.png)


    ![$$ -\sum \limits_{j=1}^n\left({r}_{jt}-{r}_j\right){x}_j\le {y}_t, for\kern0.22em
    t\in \left\{1\dots T\right\} $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equk.png)


    ![$$ \sum \limits_{i=1}^n{x}_i=1 $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equl.png)


    ![$$ \sum \limits_i^n{r}_i{x}_i\ge R. $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equm.png)


    ![$$ {x}_i\ge 0\ for\ all\ i\in \left\{1\dots n\right\} $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equn.png)


    In these equations, you don’t need directly the covariance `c[ij]`; instead, you
    use the expected returns `r[it]` or investment `i` for period `t`. In other words,
    the idea of the model is to divide the total periods into small segments and linearize
    the model during that small period, taking the minimum over the complete time
    horizon. With the model, which is linear, you can now create code in C++ using
    the `LPSolver` class described in the previous chapter. The new class is called
    `ModifiedCAP` and is displayed in the next section, “The Code.” The main difficulty
    in creating the model is defining the required input data for `LPSolver`, in the
    form of matrix `A` and vectors `b` and `c`. You can see how this is done in the
    code for member function `solveModel`.


    The first part of the algorithm consists of setting up the required data. The
    vector `c` that defines the objective function can be easily created, since all
    coefficients are equal to 1.


    ```

    // objective function

    for (int i=m_N; i<m_N+m_T; ++i)

    {

    c[i] = 1;

    }

    ```


    Next, the right-hand side coefficients are also simple to set up. This is true
    because you can move all variables `y[t]` to the left side of the inequality.
    Thus, most of the coefficients are zero, except for the last three.


    ```

    // right-hand side vector

    vector b(2*m_T + 2 + 1, 0);

    b[2*m_T]   =  1;

    b[2*m_T+1] = -1;

    b[2*m_T+2] = -m_R;

    ```


    Matrix `A` is a little more involved but is not difficult to set up either. The
    main transformation you need to make is in the equality constraints. Since the
    problems that `LPSolver` considers have inequalities only, the equality ![$$ \sum
    \limits_{i=1}^n{x}_i=1 $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_IEq1.png)
    is handled by converting it into two inequalities.


    ![$$ \sum \limits_{i=1}^n{x}_i\le 1\ and-\sum \limits_{i=1}^n{x}_i\le -1 $$](images/323908_2_En_13_Chapter/323908_2_En_13_Chapter_TeX_Equo.png)


    This makes it possible to continue to use the same simple input form used by the
    `LPSolver` (GLPK can also handle equalities directly, and you could modify the
    `LPSolver` class to do this automatically). Therefore, the following code can
    be used to define the input matrix `A`:


    ```

    // matrix A

    Matrix A(2*m_T + 2 + 1, m_T + m_N);

    for (int i=0; i<m_T; ++i)

    {

    for (int j=0; j<m_N; ++j)

    {

    A[i][j] = m_retMatrix[j][i] - m_assetRet[j];

    }

    A[i][m_N+i] = -1;

    }

    for (int i=m_T; i<2*m_T; ++i)

    {

    for (int j=m_N; j<2*m_N; ++j)

    {

    A[i][j] = - m_retMatrix[j-m_N][i-m_T] + m_assetRet[j-m_N];

    }

    A[i][m_N+i-m_T] = -1;

    }

    for (int j=0; j<m_N; ++j)

    {

    A[2*m_T][j]   = 1;

    A[2*m_T+1][j] = -1;

    A[2*m_T+2][j] = - m_assetRet[j];

    }

    ```


    The remainder of the code is just to handle constructing the `LPSolver` class
    and calling the required member functions to solve the model.


    Finally, I provide a simple example of how this class could be called in practice.
