    \n### Problem\n\nCompute a set of fundamental indicators for a particular stock\
    \ holding."
  trans: "\n### 解决方案\n\n资金管理者需要解决的主要问题之一是如何分散投资组合。分散投资问题的产生，是因为在市场投资时，并不希望将所有资产都集中于同一类投资中。相关性强的投资往往会在同一时间下跌，这使得投资组合更难避免损失。\n\
    \n例如，考虑两家业务相似的公司。经典案例是可口可乐和百事可乐这样的饮料公司。由于业务相似，它们的股价往往同时涨跌。因此，我们说它们具有高度相关性。相关性是一个为分析统计事件而开发的数学概念。由于概率在股票型投资的评估和建模中扮演着重要角色，它成为了股票市场中的一个重要概念。\n\
    \n为了使此示例的代码更具可扩展性，我们将解决方案划分为两个类。第一个类名为 `TimeSeries`，它代表一个常用概念：一组在特定时间段内适用于某个数量的数值。这个概念通常被称为时间序列。`TimeSeries`\
    \ 类负责计算单条时间序列特有的数值，例如平均值或标准差。\n\n第二个类名为 `CorrelationCalculator`，负责收集目标时间序列的数据，并使用以下公式计算相关性：\n\
    \n![$$ \\frac{1}{N-1}\\frac{\\sum \\left({x}_i-\\overline{x}\\right)\\left({y}_i-\\\
    overline{y}\\right)}{\\sigma_x{\\sigma}_y} $$](img/323908_2_En_2_Chapter_TeX_Equc.png)\n\
    \n在这个公式中，N 是观测值的数量，*x*[*i*] 是第一个时间序列的第 i 个观测值，*y*[*i*] 是第二个时间序列的第 i 个观测值，![$$\
    \ \\overline{x} $$](img/323908_2_En_2_Chapter_TeX_IEq1.png) 和 ![$$ \\overline{y}\
    \ $$](img/323908_2_En_2_Chapter_TeX_IEq2.png) 是两个价格序列的均值（平均值），*s*[*x*] 是 x 值的标准差，*s*[*y*]\
    \ 是 y 值的标准差。\n\n平均值和标准差在 `TimeSeries` 类中计算。这些值随后会被 `CorrelationCalculator` 用来确定两个序列观测值之间的相关性。\n\
    \n### 完整代码\n\n上一节讨论的计算在 `TimeSeries` 类中实现。清单 2-3 包含了该类的完整代码。您还可以看到如 `CorrelationCalculator`\
    \ 类中所示，如何使用相关技术来计算相关性。\n\n```\n//\n//  TimeSeries.h\n#ifndef __FinancialSamples__TimeSeries__\n\
    #define __FinancialSamples__TimeSeries__\n#include \nclass TimeSeries\n{\npublic:\n\
    TimeSeries();\nTimeSeries(const TimeSeries &);\nTimeSeries &operator=(const TimeSeries\
    \ &);\n~TimeSeries();\nvoid addValue(double val);\ndouble stdDev();\ndouble mean();\n\
    size_t size();\ndouble elem(int i);\nprivate:\nstd::vector m_values;\n};\n#endif\
    \ /* defined(__FinancialSamples__TimeSeries__) */\n//\n//  TimeSeries.cpp\n#include\
    \ \"TimeSeries.h\"\n#include \n#include \nTimeSeries::TimeSeries()\n: m_values()\n\
    {\n}\nTimeSeries::~TimeSeries()\n{\n}\nTimeSeries::TimeSeries(const TimeSeries\
    \ &ts)\n: m_values(ts.m_values)\n{\n}\nTimeSeries &TimeSeries::operator =(const\
    \ TimeSeries &ts)\n{\nif (this != &ts)\n{\nm_values = ts.m_values;\n}\nreturn\
    \ *this;\n}\nvoid TimeSeries::addValue(double val)\n{\nm_values.push_back(val);\n\
    }\ndouble TimeSeries::mean()\n{\ndouble sum = 0;\nfor (int i=0; i\nCorrelationCalculator::CorrelationCalculator(TimeSeries\
    \ &a, TimeSeries &b)\n: m_tsA(a),\nm_tsB(b)\n{\n}\nCorrelationCalculator::~CorrelationCalculator()\n\
    {\n}\nCorrelationCalculator::CorrelationCalculator(const CorrelationCalculator\
    \ &c)\n: m_tsA(c.m_tsA),\nm_tsB(c.m_tsB)\n{\n}\nCorrelationCalculator &CorrelationCalculator::operator=(const\
    \ CorrelationCalculator &c)\n{\nif (this != &c)\n{\nm_tsA = c.m_tsA;\nm_tsB =\
    \ c.m_tsB;\n}\nreturn *this;\n}\ndouble CorrelationCalculator::correlation()\n\
    {\ndouble sum = 0;\ndouble meanA = m_tsA.mean();\ndouble meanB = m_tsB.mean();\n\
    if (m_tsA.size() != m_tsB.size()) {\nstd::cout \n// the main function receives\
    \ parameters passed to the program\nint main(int argc, const char * argv[])\n\
    {\ndouble price;\nTimeSeries tsa;\nTimeSeries tsb;\nfor (;;) {\nstd::cin >> price;\n\
    if (price == -1)\n{\nbreak;\n}\ntsa.addValue(price);\nstd::cin >> price;\ntsb.addValue(price);\n\
    }\nCorrelationCalculator cCalc(tsa, tsb);\nauto correlation = cCalc.correlation();\n\
    std::cout << \"correlation is \" <<  correlation  << std::endl;\nreturn 0;\n}\n\
    清单 2-3\nTimeSeries.h\n```\n\n### 运行代码\n\n编译提供的代码后，您可以通过不带任何参数调用可执行文件来运行生成的程序。该程序通过从标准输入读取数据来工作，您可以手动输入数据，或使用\
    \ Shell 将文件重定向到程序。输入的每一行包含我们想要比较的两种股票工具的价格。最后一行使用特殊值 `-1` 标记，表示输入流的结束。\n\n以下是示例执行过程：\n\
    \n```\n$ ./correlation\n1.2 3.4\n2 3.3\n2.5 3\n4 5.5\n3 1.2\n6 2.4\n5.5 3.2\n\
    6.3 3.1\n7.1 2.9\n5.4 3.2\n\ncorrelation is -0.050601\n```\n\n第二个示例展示了呈现反向相关性的股票结果：当第一种工具价格上涨时，第二种工具的价格下跌。\n\
    \n```\n$ ./correlation\n1 10\n2 9\n3 8\n4 7\n5 6\n6 5\n7 4\n\navg is 4\navg is\
    \ 7\navg is 4\navg is 7\ncorrelation is -1\n```\n\n## 计算基本指标\n\n### 问题\n\n为特定持股计算一组基本指标。\n"
- fmt: '### Solution


    In the last few sections, we have seen methods for analyzing price changes in
    equity instruments. These techniques are generally labeled as technical indicators,
    since they allow for the TA of past price and volume data. Another way to analyze
    stocks is to consider more fundamental information that is not contained in the
    sequence of observed prices. Such fundamental information includes company earnings,
    intellectual property, physical assets, and debt.


    Fundamental indicators are one of the most common ways of analyzing the quality
    of a stock. The disclosure of fundamental information is required from public
    companies and released every quarter for most publicly traded stocks. It includes
    financial data that is considered by the Securities and Exchange Commission to
    be of value for investors and is used to tell how well a company is performing
    compared to its peers in the marketplace. For example, *earnings per share* are
    a fundamental indicator that tells how much profit is being generated per period
    (usually a quarter or a year) for each share of the stock. This information is
    then used to make decisions about buying, selling, or holding a particular investment
    vehicle.


    In this example, I present a class that can be used to model stocks and allows
    one to calculate and display a set of fundamental indicators associated with the
    stock. The code is encapsulated in the class `FundamentalsCalculator`. The idea
    is to have a central location where you can calculate and store all the fundamental
    indicators associated with a stock.


    Here is a list of the items that you can retrieve using the `FundamentalsCalculator`
    class and how they are defined:


    *   Price-earnings ratio (P/E): This is calculated as the price of the total stock
    of the company divided by the earnings as published in the last-quarter earnings
    release. This ratio can be interpreted as a measure of the cost of the company
    stock as compared to other companies with similar earnings.


    *   Book value: The book value corresponds to the amount of assets currently on
    the company balance sheet. This is in essence an accounting measure of the value
    of the company, without considering market factors such as future earnings, for
    example.


    *   Price-to-book ratio (P/B): This ratio is determined by dividing the stock
    price by the assets minus liabilities. The following accounting formula can be
    used:


    ![$$ \frac{StockPrice}{Assets- Liablities\kern0.5em and\kern0.5em IntangibleAssets}
    $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_IEq3.png)


    *   Notice that only tangible assets, the ones that can be eventually sold, are
    considered in this equation.


    *   Price-earnings to growth (PEG): This indicator can be used to compare companies
    with similar P/E but different growth rates. The formula to calculate this value
    is simply


    ![$$ \frac{\frac{P}{E}}{EPS\kern0.5em annual\kern0.5em growth} $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_IEq4.png)


    *   Earnings before interest, taxes, depreciation, and amortization (EBITDA):
    This is a measure that can be used to determine how a company is making a profit,
    and it is based on accounting information provided by the company in every earnings
    release. The value simply represents how much profit the company made before items
    such as taxes and related expenses were paid.


    *   Return on equity (ROE): This ratio is used to determine the percentage of
    net income generated based on shareholders’ equity. Investors are usually interested
    in companies able to generate higher income on the same amount of equity. The
    value is simply calculated as


    ![$$ \frac{NetIncome}{ShareholdersEquity} $$](images/323908_2_En_2_Chapter/323908_2_En_2_Chapter_TeX_IEq5.png)


    *   Forward P/E: This number is similar to the P/E ratio, but instead of being
    calculated based on existing revenue data, it is a prediction for the next quarter
    made by analysts. When compared to P/E, this number can be used to determine if
    analysts expect the revenue to increase, decrease, or stay at the same levels.


    ### Complete Code


    Most of the indicators explained in the previous list are easy to calculate, but
    they are very important when making decisions on which stocks to buy or sell.
    The class presented in Listing [2-2](#323908_2_En_2_Chapter.xhtml#PC12) offers
    a good place to store the associated data needed for these indicators, along with
    the simple calculations needed to produce the desired values with the minimum
    amount of input.


    Listing [2-4](#323908_2_En_2_Chapter.xhtml#PC17) is the complete listing of the
    `FundamentalsCalc` class and its associated test code.'
