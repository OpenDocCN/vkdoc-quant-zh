    \ down), so that up moves may be bigger\n    than down moves. This would be another\
    \ way to simulate a directional\n    market, where prices are going up faster\
    \ than usual.\n\nComplete Code\n\nListing [14-2](#323908_2_En_14_Chapter.xhtml#PC4)\
    \ contains the\ncomplete code for the `RandomWalk` class. You\nwill find the implementation\
    \ in a header file and a cpp file, followed\nby a sample `main` function.\n\n\
    ```\n//\n// RandonWalk.h\n#ifndef __FinancialSamples__RandonWalk__\n#define __FinancialSamples__RandonWalk__\n\
    #include \n// Simple random walk for price simulation\nclass RandomWalk {\npublic:\n\
    RandomWalk(int size, double start, double step);\nRandomWalk(const RandomWalk\
    \ &p);\n~RandomWalk();\nRandomWalk &operator=(const RandomWalk &p);\nstd::vector\
    \ getWalk();\nprivate:\nint m_size;     // number of steps\ndouble m_step;  //\
    \ size of each step (in percentage)\ndouble m_start; // starting price\n};\n#endif\
    \ /* defined(__FinancialSamples__RandonWalk__) */\n//\n//  RandonWalk.cpp\n#include\
    \ \"RandonWalk.h\"\n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\n\
    RandomWalk::RandomWalk(int size, double start, double step)\n: m_size(size),\n\
    m_step(step),\nm_start(start)\n{\n}\nRandomWalk::RandomWalk(const RandomWalk &p)\n\
    : m_size(p.m_size),\nm_step(p.m_step),\nm_start(p.m_start)\n{\n}\nRandomWalk::~RandomWalk()\n\
    {\n}\nRandomWalk &RandomWalk::operator=(const RandomWalk &p)\n{\nif (this != &p)\n\
    {\nm_size = p.m_size;\nm_step = p.m_step;\nm_start = p.m_start;\n}\nreturn *this;\n\
    }\nstd::vector RandomWalk::getWalk()\n{\nvector walk;\ndouble prev = m_start;\n\
    for (int i=0; i walk = rw.getWalk();\nfor (int i=0; i<walk.size(); ++i)\n{\ncout\
    \ << \", \" << i << \", \" << walk[i];\n}\ncout << endl;\nreturn 0;\n}\nListing\
    \ 14-2\nImplementation for RandomWalk Class\n```\n\nRunning the Code\n\nTo run\
    \ the code presented in Listing [14-2](#323908_2_En_14_Chapter.xhtml#PC4), first\
    \ you need\nto compile it using a standards-compliant compiler such as gcc or\
    \ Visual\nStudio. Here are the first few lines of the random walk using the given\n\
    parameters: initial price of $30, step of 1%, and 100 steps.\n\n```\n./randomWalk\n\
    , 0, 29.7, 1, 29.403, 2, 29.403, 3, 29.403, 4, 29.109, 5, 29.109, 6, 29.4001,\
    \ 7, 29.4001, 8, 29.4001, 9, 29.1061, 10, 29.3971, 11, 29.3971, 12, 29.6911, 13,\
    \ 29.6911, 14, 29.988, 15, 29.988, 16, 29.6881, 17, 29.3912, 18, 29.0973, 19,\
    \ 28.8064, 20, 29.0944, 21, 28.8035, 22, 29.0915, 23, 29.0915, 24, 28.8006, 25,\
    \ 29.0886, 26, 29.3795, 27, 29.6733, 28, 29.6733, 29, 29.3765, 30, 29.0828, 31,\
    \ 29.0828, 32, 29.0828, 33, 28.792, 34, 28.792, 35, 29.0799, 36, 28.7891, 37,\
    \ 28.5012, 38, 28.7862, 39, 29.0741, 40, 28.7833, 41, 28.7833, 42, 28.4955, 43,\
    \ 28.7804, 44, 28.7804, 45, 28.7804, 46, 28.7804, 47, 28.4926, 48, 28.7776, 49,\
    \ 28.4898, 50, 28.4898, 51, 28.4898, 52, 28.2049, 53, 27.9228, 54, 27.6436, 55,\
    \ 27.6436, 56, 27.92, 57, 27.92, 58, 28.1992, 59, 27.9173,\n```\n\nFigure [14-1](#323908_2_En_14_Chapter.xhtml#Fig1)\
    \ displays a\nplot of the random walk generated by one execution of the sample\
    \ code.\nNotice how prices start near the $30 mark and display a behavior similar\n\
    to real variations observed on the stock market.\n\nCalculating Option Probabilities\n\
    In this section, we will implement a C++ solution to computing\nEuropean options\
    \ probabilities for events such as finishing above the\nstrike price, finishing\
    \ below the strike price, or finishing between two\ngiven prices.\n\nSolution\n\
    Options are a very popular type of equity derivatives, which can be\nbought in\
    \ most retail investment accounts. With options, you pay a price\nfor the privilege\
    \ of buying or selling a stock for a particular price\nduring a limited period\
    \ of time, hence the designation “option,” since\nyou have the option, not the\
    \ obligation, of performing the\ntransaction.\n\nA call option gives the right\
    \ to buy at a particular price, while a put\noption gives the right to sell at\
    \ a particular price. The exercise price\nis called the strike. Depending on the\
    \ relationship between the current\nprice of the stock and the strike price, an\
    \ option can be classified\ninto one of the three categories:\n\n*   In the money\n\
    \    (ITM): The strike price is lower than the current price of the\n    stock,\
    \ for call options. For put options, the strike price should be\n    above the\
    \ current stock price."
  trans: "\n# 解决方案\n\n如果在投资领域有一个难以找到封闭解的领域，那就是金融预测。尽管存在一些知名的经济模型，但诸如股票市场之类的任何复杂系统都容易受到剧烈波动的影响，这些波动由众多因素引起，包括战争、自然灾害以及重要参与者的个人选择等。由于估算这些迥异事件的难度很大，大部分市场预测模型都假设某种形式的随机过程是价格波动的根源。在这种情况下，蒙特卡洛方法在模拟未来市场状况时被证明非常有用。\n\
    \n在本节中，我将展示一个非常简单的蒙特卡洛模型，可用于预测目的。开始介绍时，我首先使用一组非常简单的模拟规则来演示此方法的第一个版本。然后，在下一个 C++\
    \ 编码示例中，你将看到同一原理的、使用高斯分布的更复杂版本。\n\n价格预测中使用的基本策略是通过“随机游走”模拟价格变动。随机游走过程是一种随机技术，其中系统的下一个状态仅由它的前一个状态（已知价格）和下一个可能移动的概率分布来定义。在本节介绍的\
    \ C++ 类示例中，存在三个下一个状态，每个状态具有相同的概率。因此，在每个时刻，价格可以上涨、下跌或保持不变。\n\n为了简化本节中给出的随机游走示例，我们假设标的资产的价格根据均匀分布移动。换句话说，价格变动以这样一种方式生成，即平均跳跃幅度作为一个参数接收。此外，价格的上涨或下跌是使用均匀分布的随机变量来定义的，其取值由已知的平均值决定。\n\
    \n创建此模拟所需的代码封装在 `RandomWalk` 类中。该类需要存储有关该过程参数的信息：这些参数包括蒙特卡洛模拟中的步数（样本数）、初始资产价格以及过程中使用的平均步长。\n\
    \n使用这些参数，`getWalk` 成员函数运行模拟并返回使用此策略生成的价格向量。图 14-1 显示了此随机过程的一个示例结果。一旦你存储了由 `getWalk`\
    \ 生成的价格，你的代码就可以根据需要执行额外的处理。这在测试新交易策略以及确定其盈利能力时可能派上用场，这是很常见的例子。\n\n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig1_HTML.jpg](img/323908_2_En_14_Fig1_HTML.jpg)\n\
    \n**图 14-1** `RandomWalk` 类生成的随机游走结果\n\n`RandomWalk` 类中使用的随机游走算法可以根据模拟的需求以多种方式进行微调。\n\
    \n- 例如，你可能希望标的工具的价格更频繁地变动。这可以通过移除第三个分支规则（该规则允许价格保持在相同水平）来实现，从而强制价格只向上或向下移动。\n\
    - 随机游走的另一种变体是赋予上涨和高价不同的概率——通过这种方式，可以模拟“牛市”或“熊市”。\n- 为了与之前类似的目的，可以改变价格跳变（向上或向下）的幅度，使得向上移动的幅度可能大于向下移动的幅度。这是模拟具有方向性的市场的另一种方式，在该市场中，价格上涨快于往常。\n\
    \n## 完整代码\n\n清单 14-2 包含了 `RandomWalk` 类的完整代码。你可以在一个头文件和一个 cpp 文件中找到其实现，随后是一个示例\
    \ `main` 函数。\n\n```\n//\n// RandonWalk.h\n#ifndef __FinancialSamples__RandonWalk__\n\
    #define __FinancialSamples__RandonWalk__\n#include \n// 用于价格模拟的简单随机游走\nclass RandomWalk\
    \ {\npublic:\nRandomWalk(int size, double start, double step);\nRandomWalk(const\
    \ RandomWalk &p);\n~RandomWalk();\nRandomWalk &operator=(const RandomWalk &p);\n\
    std::vector getWalk();\nprivate:\nint m_size;     // 步数\ndouble m_step;  // 每一步的幅度（百分比）\n\
    double m_start; // 起始价格\n};\n#endif /* defined(__FinancialSamples__RandonWalk__)\
    \ */\n//\n//  RandonWalk.cpp\n#include \"RandonWalk.h\"\n#include \nusing std::vector;\n\
    using std::cout;\nusing std::endl;\nRandomWalk::RandomWalk(int size, double start,\
    \ double step)\n: m_size(size),\nm_step(step),\nm_start(start)\n{\n}\nRandomWalk::RandomWalk(const\
    \ RandomWalk &p)\n: m_size(p.m_size),\nm_step(p.m_step),\nm_start(p.m_start)\n\
    {\n}\nRandomWalk::~RandomWalk()\n{\n}\nRandomWalk &RandomWalk::operator=(const\
    \ RandomWalk &p)\n{\nif (this != &p)\n{\nm_size = p.m_size;\nm_step = p.m_step;\n\
    m_start = p.m_start;\n}\nreturn *this;\n}\nstd::vector RandomWalk::getWalk()\n\
    {\nvector walk;\ndouble prev = m_start;\nfor (int i=0; i walk = rw.getWalk();\n\
    for (int i=0; i<walk.size(); ++i)\n{\ncout << \", \" << i << \", \" << walk[i];\n\
    }\ncout << endl;\nreturn 0;\n}\n```\n\n**清单 14-2** `RandomWalk` 类的实现\n\n## 运行代码\n\
    \n要运行清单 14-2 中提供的代码，首先需要使用符合标准的编译器（如 `gcc` 或 Visual Studio）进行编译。以下是使用给定参数：初始价格\
    \ 30 美元，步长 1%，以及 100 步，生成的随机游走的前几行输出。\n\n```\n./randomWalk\n, 0, 29.7, 1, 29.403,\
    \ 2, 29.403, 3, 29.403, 4, 29.109, 5, 29.109, 6, 29.4001, 7, 29.4001, 8, 29.4001,\
    \ 9, 29.1061, 10, 29.3971, 11, 29.3971, 12, 29.6911, 13, 29.6911, 14, 29.988,\
    \ 15, 29.988, 16, 29.6881, 17, 29.3912, 18, 29.0973, 19, 28.8064, 20, 29.0944,\
    \ 21, 28.8035, 22, 29.0915, 23, 29.0915, 24, 28.8006, 25, 29.0886, 26, 29.3795,\
    \ 27, 29.6733, 28, 29.6733, 29, 29.3765, 30, 29.0828, 31, 29.0828, 32, 29.0828,\
    \ 33, 28.792, 34, 28.792, 35, 29.0799, 36, 28.7891, 37, 28.5012, 38, 28.7862,\
    \ 39, 29.0741, 40, 28.7833, 41, 28.7833, 42, 28.4955, 43, 28.7804, 44, 28.7804,\
    \ 45, 28.7804, 46, 28.7804, 47, 28.4926, 48, 28.7776, 49, 28.4898, 50, 28.4898,\
    \ 51, 28.4898, 52, 28.2049, 53, 27.9228, 54, 27.6436, 55, 27.6436, 56, 27.92,\
    \ 57, 27.92, 58, 28.1992, 59, 27.9173,\n```\n\n图 14-1 显示了示例代码某次执行生成的随机游走的图表。请注意价格如何从\
    \ 30 美元附近开始，并表现出类似于股票市场中观察到的实际变动的行为。\n\n# 计算期权概率\n\n在本节中，我们将实现一个 C++ 解决方案，用于计算欧式期权事件的概率，例如到期时价格高于行权价、低于行权价，或介于两个给定价格之间。\n\
    \n## 解决方案\n\n期权是一种非常流行的股权衍生品，可以在大多数散户投资账户中购买。通过期权，你支付一笔费用，以换取在有限时间内以特定价格买入或卖出股票的权利，因此得名“期权”，因为你拥有执行交易的选择权，而非义务。\n\
    \n看涨期权赋予以特定价格买入的权利，而看跌期权赋予以特定价格卖出的权利。行权价格称为执行价。根据当前股票价格与执行价之间的关系，期权可以分为以下三类之一：\n\
    \n- **价内期权：** 对于看涨期权，执行价低于当前股价。对于看跌期权，执行价应高于当前股价。\n"
- fmt: "# 期权定价与概率分析\n\n## 价内、价平与价外期权\n\n- **价外期权（Out of the Money，OTM）**：对于看涨期权，行权价高于当前股票价格。对于看跌期权，行权价低于当前股票价格。\n\
    - **价平期权（At the Money，ATM）**：行权价接近标的股票的当前价格。\n\n行权价与股票价格之间的这些不同关系，决定了期权获利的不同概率，我们将在本节剩余部分看到这一点。为了获利，看涨期权需要股票价格上涨超过行权价。当这种情况发生时，头寸的价格由行权价与股票价格之间的差额加上期权可能仍具有的任何时间价值决定。对于看跌期权，这种情况是相反的，当股票价格相对于行权价下跌时，期权变得有利可图。\n\
    \n期权的另一个概念是行权方式（即买入或卖出标的股票）。欧式期权只允许在其目标期结束时行权。而美式期权则允许在任何时刻行权。在本节中，我只考虑欧式期权，因为分析只考虑期权到期时的股票价格。不过，将所解释的技术扩展到处理美式期权并不困难。\n\
    \n图[14-2](#323908_2_En_14_Chapter.xhtml#Fig2)展示了一份期权合约的利润曲线。数据假定合约成本为`$5`，行权价为`$90`。在这种情况下，对于任何低于`$90`的标的股票最终价格，期权价格的完全损失得以实现。另一方面，损失是有上限的，投资者不会遭受除合约价格之外的任何损失。当标的资产价格达到`$90`的行权价时，头寸的损失开始减少，在`$95`时达到盈亏平衡点。从该点起，任何额外的价格上涨都代表期权头寸的额外利润，并且收益在上行方向是无限的。\n\
    \n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig2_HTML.jpg](images/323908_2_En_14_Chapter/323908_2_En_14_Fig2_HTML.jpg)\n\
    \n*图14-2 看涨期权合约的获利潜力*\n\n## 确定获利概率\n\n在本节中，您将学习如何使用蒙特卡洛技术来确定股票期权的获利概率。如前所述，要找到看涨期权的利润，只需计算标的资产在到期时的价格，并检查最终价格是否高于行权价。对于看跌期权，过程相同，但需要检查最终价格是否低于行权价。\n\
    \n为此问题创建蒙特卡洛模拟的第一步是定义随机过程的参数。期权的定价由所谓的布莱克-舒尔斯模型（Black-Scholes model）定义，其中价格被假定为正态分布。出于这个原因，您将使用具有高斯分布的价格变化随机游走。在此随机过程的每一步，只有两种可能性：价格上涨或下跌，概率各为50%。价格变化随后由正态分布决定，其方差作为输入参数给出。图[14-3](#323908_2_En_14_Chapter.xhtml#Fig3)展示了一个高斯随机游走的示例。请注意，与股票的实际数据相比，这看起来与实际价格波动有多么相似。\n\
    \n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig3_HTML.jpg](images/323908_2_En_14_Chapter/323908_2_En_14_Fig3_HTML.jpg)\n\
    \n*图14-3 使用高斯随机游走生成的价格变动示例*\n\n一旦生成了随机游走，就可以开始使用数据进行预测和相关的价格分析。在这种情况下，您希望估计某些事件的概率，例如最终价格高于某一价格水平。要回答这些问题，只需使用标准的蒙特卡洛程序：重复随机游走并存储结果。在多次执行此过程后，可以分析最终价格高于某个目标的结分布。\n\
    \n例如，假设您想回答以下问题：价格最终高于行权价的概率是多少？为此，对大量测试执行随机游走，并计算在这些测试中价格最终高于行权价的百分比。同样的方法可用于收集相关信息，例如价格最终低于行权价的概率，或者价格最终介于两个给定价格之间的概率。\n\
    \n该实现由`OptionsProbabilities`类提供。重要的成员函数如下：\n\n```cpp\ndouble probFinishAboveStrike();\n\
    double probFinishBelowStrike();\ndouble probFinalPriceBetweenPrices(double lowPrice,\
    \ double highPrice);\nstd::vector getWalk();\n```\n\n前三个成员函数计算所需的概率。最后一个成员函数`getWalk`返回一个向量，该向量存储一个样本随机游走以供进一步分析。`OptionsProbabilities`类内部使用`getLastPriceOfWalk`成员函数，该函数返回在高斯游走中观察到的最后一个价格。该价格作为输入存储，用于概率计算。\n\
    \n最后，使用高斯分布计算价格变化。根据此分布生成的随机值使用`gaussianValue`成员函数：\n\n```cpp\ndouble OptionsProbabilities::gaussianValue(double\
    \ mean, double sigma)\n{\nstd::normal_distribution distrib(mean, sigma);\nreturn\
    \ distrib(random_generator);\n}\n```\n\n要了解这些函数如何协同工作，请考虑`probFinishAboveStrike`的实现：\n\
    \n```cpp\ndouble OptionsProbabilities::probFinishAboveStrike()\n{\nint nAbove\
    \ = 0;\nfor (int i=0; i < m_numIterations; i++)\n{\n  double walk = getWalk();\n\
    \  double lastPrice = getLastPriceOfWalk(walk);\n  if (lastPrice >= m_strike)\n\
    \  {\n    nAbove++;\n  }\n}\nreturn nAbove/(double)m_numIterations;\n}\n```\n\n\
    该算法重复由成员变量`m_numIterations`定义的次数。在每次迭代中，您请求一个新的高斯随机游走并存储最后一个观察值。如果该值满足所需属性（在这种情况下高于行权价），则将其计为事件的一次发生。最后，成员函数返回由有利案例百分比定义的经验概率。\n\
    \n## 完整代码\n\n清单[14-3](#323908_2_En_14_Chapter.xhtml#PC9)展示了评估期权概率的随机游走方法。清单末尾给出了一个示例`main`函数，展示了如何调用`OptionsProbabilities`类。"
  raw: "*   Out of the money\n    (OTM): The strike price is higher than the current\
    \ price of the\n    stock, for call options. For put options, the strike price\
    \ should be\n    below the current stock price.\n\n*   At the money\n    (ATM):\
    \ The strike price is close to the current price of the\n    underlying stock.\n\
    \nThese different relationships between strike price and stock\nprice determine\
    \ different probabilities of an option to become\nprofitable, as we will see in\
    \ the remainder of this section.\nTo achieve profitability, a call option needs\
    \ the stock price to rise\nabove the strike price. When this happens, the price\
    \ for the position is\ngiven by the difference between the strike price and the\
    \ stock price,\nplus whatever time value the option might still have. For put\
    \ options\nthis is reversed, and the option becomes profitable when the stock\n\
    prices decrease in comparison to the strike price.\nAnother concept in options\
    \ is the style of exercise\n(i.e., buying or selling the underlying stock). European-style\
    \ options\nallow the exercising of the option only at the end of its target period.\n\
    American-style options, on the other hand, allow exercising to happen at\nany\
    \ moment in time. In this section I consider European options only,\nsince the\
    \ analysis considers only the price of the stock at the option\nexpiration. It\
    \ is not hard, however, to extend the techniques explained\nto handle American-style\
    \ options.\n\nFigure [14-2](#323908_2_En_14_Chapter.xhtml#Fig2) shows the\nprofit\
    \ profile for an option contract. The\ndata assumes that the contract costs $5,\
    \ with a strike price of $90\\. In\nthis case, for any final price of the underlying\
    \ stock that is below\n$90, the full loss of the option price is realized. On\
    \ the other hand,\nthe loss is capped, and the investor will not suffer any losses\
    \ other\nthan the price of the contract. When the underlying asset price achieves\n\
    the strike price of $90, the loss of the position starts to decrease,\ngetting\
    \ to an even point at $95\\. From that point on, any additional\nprice increase\
    \ represents additional profit for the option position, and\ngains are unlimited\
    \ to the upside.\n\n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig2_HTML.jpg](images/323908_2_En_14_Chapter/323908_2_En_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2\nProfit\npotential for an option call contract\n\nDetermining Profit\
    \ Probabilities\nIn this section, you will learn how to use Monte Carlo techniques\
    \ to\ndetermine profit\nprobabilities\n for equity options. As you have seen previously,\
    \ all that is\nnecessary to find the profit for a call option is to calculate\
    \ the price\nof the underlying asset at expiration and check if the final price\
    \ is\nabove the strike price. For put options, the process is the same, but\n\
    instead you need to check if the final price is below the strike\nprice.\n\nThe\
    \ first step in creating a Monte Carlo simulation for this problem is\nto define\
    \ the parameters of the random process. The pricing of options\nis defined by\
    \ what is called the Black-Scholes model, where prices are\nassumed to be normally\
    \ distributed. For this reason, you will use a\nrandom walk with Gaussian distribution\
    \ for price changes. At each step,\nonly two possibilities are available in this\
    \ random process: prices\neither go up or go down with 50% of chance. The price\
    \ change is then\ndetermined by the normal distribution with variance that is\
    \ given as an\ninput parameter. Figure [14-3](#323908_2_En_14_Chapter.xhtml#Fig3)\
    \ presents an\nexample of Gaussian random walk. Notice how similar this looks\
    \ to actual\nprice fluctuations, when compared to real data for stocks.\n\n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig3_HTML.jpg](images/323908_2_En_14_Chapter/323908_2_En_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3\nExample of price movement created using a Gaussian random\nwalk\n\
    \nOnce the random walk is generated, one can start to use the data for\nforecasting\
    \ and related price analysis. In this case, you would like to\nestimate the probabilities\
    \ of some events, such as finishing above a\ncertain price level. To answer these\
    \ questions , you just need to use\nthe standard Monte Carlo procedure: repeat\
    \ the random walk and store the\nresults. After this process is performed several\
    \ times, it is possible\nto analyze the distribution of results in which the final\
    \ price was\nabove a certain target.\nFor example, suppose you want to answer\
    \ the question: what is the\nprobability of the price finishing above the strike\
    \ price? To do this,\nperform the random walk for a large number of tests, and\
    \ calculate the\npercentage of these tests in which the price finished above the\
    \ strike.\nThe same approach can be used to collect related information, such\
    \ as\nthe probability of finishing below the strike price, or the probability\n\
    of finishing between two given prices.\n\nThe implementation is given in the `OptionsProbabilities`\n\
    class . The\nimportant member functions are the following:\n\n```\ndouble probFinishAboveStrike();\n\
    double probFinishBelowStrike();\ndouble probFinalPriceBetweenPrices(double lowPrice,\
    \ double highPrice);\nstd::vector getWalk();\n```\n\nThe three first member functions\
    \ calculate the desired probabilities.\nThe last member function, `getWalk`, returns\
    \ a\nvector that stores a sample random walk for further analysis. The `OptionsProbabilities`\n\
    class internally uses the `getLastPriceOfWalk`\nmember function, which returns\
    \ the last observed price observed in a\nGaussian walk. This price is the one\
    \ stored as input to the probability\ncalculations.\n\nFinally, price changes\
    \ are computed using the Gaussian distribution.\nRandom values\naccording to this\
    \ distribution are generated using the `gaussianValue` member\nfunction:\n\n```\n\
    double OptionsProbabilities::gaussianValue(double mean, double sigma)\n{\nstd::normal_distribution\
    \ distrib(mean, sigma);\nreturn distrib(random_generator);\n}\n```\n\nTo see how\
    \ these functions are used together, consider the\nimplementation of `probFinishAboveStrike`\
    \  :\n\n```\ndouble OptionsProbabilities::probFinishAboveStrike()\n{\nint nAbove\
    \ = 0;\nfor (int i=0; i= m_strike)\n{\nnAbove++;\n}\n}\nreturn nAbove/(double)m_numIterations;\n\
    }\n```\n\nThe algorithm repeats as many iterations as are defined by the member\n\
    variable `m_numIterations`. At\neach iteration, you request a new Gaussian random\
    \ walk and store the\nlast observed value. If the value satisfies the required\
    \ property (in\nthis case finishing above the strike price), then it is counted\
    \ as an\noccurrence of the event. Finally, the member function returns the\nempirical\
    \ probability defined by the percentage of favorable cases .\n\nComplete Code\n\
    \nListing [14-3](#323908_2_En_14_Chapter.xhtml#PC9) presents the\nrandom walk\
    \ method to evaluate option probabilities. A sample `main` function is\ngiven\
    \ at the end of the listing, showing how the `OptionsProbabilities`\nclass  can\
    \ be\ninvoked."
  trans: "\n# 期权定价与概率分析\n\n## 价内、价平与价外期权\n\n- **价外期权（Out of the Money，OTM）**：对于看涨期权，行权价高于当前股票价格。对于看跌期权，行权价低于当前股票价格。\n\
    - **价平期权（At the Money，ATM）**：行权价接近标的股票的当前价格。\n\n行权价与股票价格之间的这些不同关系，决定了期权获利的不同概率，我们将在本节剩余部分看到这一点。为了获利，看涨期权需要股票价格上涨超过行权价。当这种情况发生时，头寸的价格由行权价与股票价格之间的差额加上期权可能仍具有的任何时间价值决定。对于看跌期权，这种情况是相反的，当股票价格相对于行权价下跌时，期权变得有利可图。\n\
    \n期权的另一个概念是行权方式（即买入或卖出标的股票）。欧式期权只允许在其目标期结束时行权。而美式期权则允许在任何时刻行权。在本节中，我只考虑欧式期权，因为分析只考虑期权到期时的股票价格。不过，将所解释的技术扩展到处理美式期权并不困难。\n\
    \n图 14-2 展示了一份期权合约的利润曲线。数据假定合约成本为`$5`，行权价为`$90`。在这种情况下，对于任何低于`$90`的标的股票最终价格，期权价格的完全损失得以实现。另一方面，损失是有上限的，投资者不会遭受除合约价格之外的任何损失。当标的资产价格达到`$90`的行权价时，头寸的损失开始减少，在`$95`时达到盈亏平衡点。从该点起，任何额外的价格上涨都代表期权头寸的额外利润，并且收益在上行方向是无限的。\n\
    \n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig2_HTML.jpg](img/323908_2_En_14_Fig2_HTML.jpg)\n\
    \n*图 14-2 看涨期权合约的获利潜力*\n\n## 确定获利概率\n\n在本节中，您将学习如何使用蒙特卡洛技术来确定股票期权的获利概率。如前所述，要找到看涨期权的利润，只需计算标的资产在到期时的价格，并检查最终价格是否高于行权价。对于看跌期权，过程相同，但需要检查最终价格是否低于行权价。\n\
    \n为此问题创建蒙特卡洛模拟的第一步是定义随机过程的参数。期权的定价由所谓的布莱克-舒尔斯模型（Black-Scholes model）定义，其中价格被假定为正态分布。出于这个原因，您将使用具有高斯分布的价格变化随机游走。在此随机过程的每一步，只有两种可能性：价格上涨或下跌，概率各为\
    \ 50%。价格变化随后由正态分布决定，其方差作为输入参数给出。图 14-3 展示了一个高斯随机游走的示例。请注意，与股票的实际数据相比，这看起来与实际价格波动有多么相似。\n\
    \n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig3_HTML.jpg](img/323908_2_En_14_Fig3_HTML.jpg)\n\
    \n*图 14-3 使用高斯随机游走生成的价格变动示例*\n\n一旦生成了随机游走，就可以开始使用数据进行预测和相关的价格分析。在这种情况下，您希望估计某些事件的概率，例如最终价格高于某一价格水平。要回答这些问题，只需使用标准的蒙特卡洛程序：重复随机游走并存储结果。在多次执行此过程后，可以分析最终价格高于某个目标的结分布。\n\
    \n例如，假设您想回答以下问题：价格最终高于行权价的概率是多少？为此，对大量测试执行随机游走，并计算在这些测试中价格最终高于行权价的百分比。同样的方法可用于收集相关信息，例如价格最终低于行权价的概率，或者价格最终介于两个给定价格之间的概率。\n\
    \n该实现由`OptionsProbabilities`类提供。重要的成员函数如下：\n\n```cpp\ndouble probFinishAboveStrike();\n\
    double probFinishBelowStrike();\ndouble probFinalPriceBetweenPrices(double lowPrice,\
    \ double highPrice);\nstd::vector getWalk();\n```\n\n前三个成员函数计算所需的概率。最后一个成员函数`getWalk`返回一个向量，该向量存储一个样本随机游走以供进一步分析。`OptionsProbabilities`类内部使用`getLastPriceOfWalk`成员函数，该函数返回在高斯游走中观察到的最后一个价格。该价格作为输入存储，用于概率计算。\n\
    \n最后，使用高斯分布计算价格变化。根据此分布生成的随机值使用`gaussianValue`成员函数：\n\n```cpp\ndouble OptionsProbabilities::gaussianValue(double\
    \ mean, double sigma)\n{\nstd::normal_distribution distrib(mean, sigma);\nreturn\
    \ distrib(random_generator);\n}\n```\n\n要了解这些函数如何协同工作，请考虑`probFinishAboveStrike`的实现：\n\
    \n```cpp\ndouble OptionsProbabilities::probFinishAboveStrike()\n{\nint nAbove\
    \ = 0;\nfor (int i=0; i < m_numIterations; i++)\n{\n  double walk = getWalk();\n\
    \  double lastPrice = getLastPriceOfWalk(walk);\n  if (lastPrice >= m_strike)\n\
    \  {\n    nAbove++;\n  }\n}\nreturn nAbove/(double)m_numIterations;\n}\n```\n\n\
    该算法重复由成员变量`m_numIterations`定义的次数。在每次迭代中，您请求一个新的高斯随机游走并存储最后一个观察值。如果该值满足所需属性（在这种情况下高于行权价），则将其计为事件的一次发生。最后，成员函数返回由有利案例百分比定义的经验概率。\n\
    \n## 完整代码\n\n清单 14-3 展示了评估期权概率的随机游走方法。清单末尾给出了一个示例`main`函数，展示了如何调用`OptionsProbabilities`类。\n"
- fmt: "# 头文件与实现文件\n\n```cpp\n//\n// OptionsProbabilities.h\n#ifndef __FinancialSamples__OptionsProbabilities__\n\
    #define __FinancialSamples__OptionsProbabilities__\n#include \nclass OptionsProbabilities\
    \ {\npublic:\n    OptionsProbabilities(double initialPrice, double strike, double\
    \ avgStep, int nDays);\n    OptionsProbabilities(const OptionsProbabilities &p);\n\
    \    ~OptionsProbabilities();\n    OptionsProbabilities &operator=(const OptionsProbabilities\
    \ &p);\n    void setNumIterations(int n);\n    double probFinishAboveStrike();\n\
    \    double probFinishBelowStrike();\n    double probFinalPriceBetweenPrices(double\
    \ lowPrice, double highPrice);\n    std::vector getWalk();\nprivate:\n    double\
    \ m_initialPrice;\n    double m_strike;\n    double m_avgStep;\n    int m_numDays;\n\
    \    int m_numIterations;\n    double gaussianValue(double mean, double sigma);\n\
    \    double getLastPriceOfWalk();\n};\n#endif /* defined(__FinancialSamples__OptionsProbabilities__)\
    \ */\n```\n\n```cpp\n//\n// OptionsProbabilities.cpp\n#include \"OptionsProbabilities.h\"\
    \n#include \n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\n\
    \nstatic std::default_random_engine random_generator;\n\nnamespace {\n    const\
    \ int NUM_ITERATIONS = 1000;\n}\n\nOptionsProbabilities::OptionsProbabilities(double\
    \ initialPrice,\n    double strike, double avgStep, int nDays)\n    : m_initialPrice(initialPrice),\n\
    \      m_strike(strike),\n      m_avgStep(avgStep),\n      m_numDays(nDays),\n\
    \      m_numIterations(NUM_ITERATIONS) {\n}\n\nOptionsProbabilities::OptionsProbabilities(const\
    \ OptionsProbabilities &p)\n    : m_initialPrice(p.m_initialPrice),\n      m_strike(p.m_strike),\n\
    \      m_avgStep(p.m_avgStep),\n      m_numDays(p.m_numDays),\n      m_numIterations(p.m_numIterations)\
    \ {\n}\n\nOptionsProbabilities::~OptionsProbabilities() {\n}\n\nOptionsProbabilities\
    \ &OptionsProbabilities::operator=(const OptionsProbabilities &p) {\n    if (this\
    \ != &p) {\n        m_initialPrice = p.m_initialPrice;\n        m_strike = p.m_strike;\n\
    \        m_avgStep = p.m_avgStep;\n        m_numDays = p.m_numDays;\n        m_numIterations\
    \ = p.m_numIterations;\n    }\n    return *this;\n}\n\nvoid OptionsProbabilities::setNumIterations(int\
    \ n) {\n    m_numIterations = n;\n}\n\ndouble OptionsProbabilities::probFinishAboveStrike()\
    \ {\n    int nAbove = 0;\n    for (int i=0; i < m_numIterations; ++i) {\n    \
    \    double lastPrice = getLastPriceOfWalk();\n        if (lastPrice >= m_strike)\
    \ {\n            nAbove++;\n        }\n    }\n    return nAbove / (double)m_numIterations;\n\
    }\n\ndouble OptionsProbabilities::probFinishBelowStrike() {\n    int nBelow =\
    \ 0;\n    for (int i=0; i < m_numIterations; ++i) {\n        double lastPrice\
    \ = getLastPriceOfWalk();\n        if (lastPrice < m_strike) {\n            nBelow++;\n\
    \        }\n    }\n    return nBelow / (double)m_numIterations;\n}\n\ndouble OptionsProbabilities::probFinalPriceBetweenPrices(double\
    \ lowPrice, double highPrice) {\n    int nBetween = 0;\n    for (int i=0; i <\
    \ m_numIterations; ++i) {\n        double lastPrice = getLastPriceOfWalk();\n\
    \        if (lastPrice >= lowPrice && lastPrice <= highPrice) {\n            nBetween++;\n\
    \        }\n    }\n    return nBetween / (double)m_numIterations;\n}\n\ndouble\
    \ OptionsProbabilities::gaussianValue(double mean, double sigma) {\n    std::normal_distribution<double>\
    \ distrib(mean, sigma);\n    return distrib(random_generator);\n}\n\ndouble OptionsProbabilities::getLastPriceOfWalk()\
    \ {\n    double prev = m_initialPrice;\n    for (int i=0; i < m_numDays; ++i)\
    \ {\n        double stepSize = gaussianValue(0, m_avgStep);\n        int r = rand()\
    \ % 2;\n        double val = prev;\n        if (r == 0) val += (stepSize * val);\n\
    \        else val -= (stepSize * val);\n        prev = val;\n    }\n    return\
    \ prev;\n}\n\nstd::vector<double> OptionsProbabilities::getWalk() {\n    vector<double>\
    \ walk;\n    double prev = m_initialPrice;\n    for (int i=0; i < m_numDays; ++i)\
    \ {\n        double stepSize = gaussianValue(0, m_avgStep);\n        int r = rand()\
    \ % 2;\n        double val = prev;\n        if (r == 0) val += (stepSize * val);\n\
    \        else val -= (stepSize * val);\n        walk.push_back(val);\n       \
    \ prev = val;\n    }\n    return walk;\n}\n\nint main() {\n    OptionsProbabilities\
    \ optP(30, 35, 0.01, 100);\n    cout << \" above strike prob: \" << optP.probFinishAboveStrike()\
    \ << endl;\n    cout << \" below strike prob: \" << optP.probFinishBelowStrike()\
    \ << endl;\n    cout << \" between 28 and 32 prob: \" << optP.probFinalPriceBetweenPrices(28,\
    \ 32) << endl;\n    return 0;\n}\n```\n\n**Listing 14-3. Class `OptionsProbabilities`**\n\
    \n## 运行代码\n\n要运行清单 [14-3](#323908_2_En_14_Chapter.xhtml#PC9) 中的代码，你可以使用任何符合标准的\
    \ C++ 编译器，如 `gcc`、`llvm` 或 `Visual C++`。编译代码并生成可执行文件后，可以按如下方式运行应用程序（具体数字可能根据使用的随机数而有所不同）：\n\
    \n```\nabove strike prob: 0.055\nbelow strike prob: 0.946\nbetween 28 and 32 prob:\
    \ 0.512\n```\n\n如你所见，该应用程序能够以良好的精度确定价格高于或低于行权价的概率。前两个数值之和接近 100% 的事实证实了这一点。通过增加模拟随机游走的次数，仍然可以进一步改进近似结果。\n\
    \n## 结论\n\n蒙特卡洛方法是一种通用的解决问题方法，它利用随机化来计算那些原本很难精确求解的结果。由于金融市场固有的随机性，蒙特卡洛方法成为金融工程师和软件开发人员手中的重要工具。\n\
    \n在本章中，你已经看到，这种模拟技术可以用于快速求解金融领域中的各种问题。例如，使用蒙特卡洛模拟的一种常见方式是预测由价格变化决定的可能经济情景。虽然这对传统的数学方法来说是一项艰巨的任务，但人们可以轻松设计出诸如随机游走之类的高效算法。这类算法仅利用基于历史行为的少数输入参数，就能提供预测价格的能力。\n\
    \n在第一个编码示例（清单 [14-1](#323908_2_En_14_Chapter.xhtml#PC2)）中，我们使用蒙特卡洛技术计算了一个一般函数的定积分。尽管存在确定性数值算法可以高效地解决此问题，但该示例展示了蒙特卡洛方法的基本特征，以及如何解释和改进其结果。\n\
    \n在清单 [14-2](#323908_2_En_14_Chapter.xhtml#PC4) 中，你了解了如何创建一个非常简单的随机游走，这是使用蒙特卡洛方法进行价格模拟的基本工具之一。你看到了如何实现一种价格变化均匀分布的随机游走版本。你还了解了一些标准方法的常见变体，这些变体在应用中经常被使用。\n\
    \n接下来，你学习了如何使用蒙特卡洛方法计算期权的盈利概率。清单 [14-3](#323908_2_En_14_Chapter.xhtml#PC9) 中的\
    \ C++ 类展示了一种易于实现的方案，可用于分析期权及其可能的盈利情景。你已经看到，利用模拟和对价格变化的一些假设，可以轻松确定某只股票在若干天内处于特定价格区间的概率。\n\
    \n本章完成了对金融软件中使用的主要数学工具的讨论。在下一章中，你将开始探索可用于支持创建和维护此类金融应用程序的额外编程技术。你将看到许多示例，展示如何将现有的\
    \ C++ 代码与其他流行的脚本语言（例如 Python 和 Lua）集成。\n\n# 15. 扩展金融库\n\nC++ 是一种富有表现力的语言，可用于开发一些最复杂的软件，包括银行和其他金融机构中常使用的高性能应用程序。然而，有时使用解释型语言来组合和扩展\
    \ C++ 库是有益的，这可以简化原型和其他非关键应用程序的创建。许多此类解释型语言被用于连接预编译库。其中，Python 和 Lua 是金融行业中最常用的解释型语言之一。\n\
    \n在本章中，我将展示如何使用流行的脚本和扩展语言（如 Lua 和 Python）与 C++ 库交互。接下来几节中讨论的解决方案和算法，允许你在用其他语言开发的应用程序中重用前面章节中介绍的许多\
    \ C++ 组件。在某些情况下，你还可以在自己的 C++ 应用程序中使用从外部语言创建的代码。\n\n以下是本章讨论的一些主题：\n\n*   **用 Python\
    \ 扩展 C++**：Python 语言为开发服务器端应用程序提供了出色的特性。如果你想将 C++ 库用作其他服务的一部分，Python 可能是集成不同库的最佳方式。"
