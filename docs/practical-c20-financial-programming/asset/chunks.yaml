    class, part of `boost::random`. This\nsimplifies the generation of samples, avoiding\
    \ numerical accuracy issues\nthat are common when using other sources of random\
    \ numbers.\n\nThe main part of the implementation can be viewed in the `getIntegral`\
    \ member\nfunction.\n\n```\ndouble MonteCarloIntegration::getIntegral(double a,\
    \ double b)\n```\n\nThe code initially determines the maximum and minimum values\n\
    observed. It uses these numbers to define the total area of sampling.\nThen, the\
    \ function generates random numbers and checks if they are\ninside the curve defined\
    \ by the function or outside it. At the end, the\npercentage calculated with this\
    \ procedure is used to compute the total\narea of the integral. This process is\
    \ repeated for the positive and\nnegative parts of the given mathematical function,\
    \ using the member\nfunction `integrateRegion`. The\ntotal value of the integral\
    \ is then calculated as the positive minus the\nnegative area.\n\nComplete Code\n\
    \nYou will find the complete code to integrate a function using the Monte\nCarlo\
    \ methods in Listing [14-1](#323908_2_En_14_Chapter.xhtml#PC2). The code is\n\
    divided into a header and an implementation file. A sample `main` function is\n\
    included to show how the class `MonteCarloIntegration`\ncan be used.\n\n```\n\
    //\n// MonteCarloIntegration.h\n#ifndef __FinancialSamples__MONTECARLOINTEGRATION_H_\n\
    #define __FinancialSamples__MONTECARLOINTEGRATION_H_\ntemplate \nclass MathFunction;\n\
    class MonteCarloIntegration {\npublic:\nMonteCarloIntegration(MathFunction &f);\n\
    MonteCarloIntegration(MathFunction &f, int num_samples);\nMonteCarloIntegration(const\
    \ MonteCarloIntegration &p);\n~MonteCarloIntegration();\nMonteCarloIntegration\
    \ &operator=(const MonteCarloIntegration &p);\nvoid setNumSamples(int n);\ndouble\
    \ getIntegral(double a, double b);\ndouble integrateRegion(double a, double b,\
    \ double min, double max);\nprivate:\nMathFunction &m_f;\nint m_numSamples;\n\
    };\n#endif /* MONTECARLOINTEGRATION_H_ */\n//\n// MonteCarloIntegration.cpp\n\
    #include \"MonteCarloIntegration.h\"\n#include \n#include \n#include \n#include\
    \ \"MathFunction.h\"\n#include \nstatic std::default_random_engine random_generator;\n\
    using std::cout;\nusing std::endl;\nnamespace {\nconst int DEFAULT_NUM_SAMPLES\
    \ = 1000;\n}\nMonteCarloIntegration::MonteCarloIntegration(MathFunction& f)\n\
    : m_f(f),\nm_numSamples(DEFAULT_NUM_SAMPLES)\n{\n}\nMonteCarloIntegration::MonteCarloIntegration(MathFunction&\
    \ f, int num_samples)\n: m_f(f),\nm_numSamples(num_samples)\n{\n}\nMonteCarloIntegration::MonteCarloIntegration(const\
    \ MonteCarloIntegration& p)\n: m_f(p.m_f),\nm_numSamples(p.m_numSamples)\n{\n\
    }\nMonteCarloIntegration::~MonteCarloIntegration()\n{\n}\nMonteCarloIntegration&\
    \ MonteCarloIntegration::operator =(const MonteCarloIntegration& p)\n{\nif (this\
    \ != &p)\n{\nm_f = p.m_f;\nm_numSamples = p.m_numSamples;\n}\nreturn *this;\n\
    }\nvoid MonteCarloIntegration::setNumSamples(int n)\n{\nm_numSamples = n;\n}\n\
    double MonteCarloIntegration::integrateRegion(double a, double b, double min,\
    \ double max)\n{\nstd::uniform_real_distribution xDistrib(a, b);\nstd::uniform_real_distribution\
    \ yDistrib(min, max);\nint pointsIn = 0;\nint pointsOut = 0;\nbool positive =\
    \ max > 0;\nfor (int i = 0; i  0)\n{\npercentageArea = pointsIn / double(pointsIn\
    \ + pointsOut);\n}\nif (percentageArea > 0)\n{\nreturn (b-a) * (max-min) * percentageArea;\n\
    }\nreturn 0;\n}\ndouble MonteCarloIntegration::getIntegral(double a, double b)\n\
    {\nstd::uniform_real_distribution distrib(a, b);\ndouble max = 0;\ndouble min\
    \ = 0;\nfor (int i = 0; i  max)\n{\nmax = y;\n}\nif (y  0 ? integrateRegion(a,\
    \ b, 0, max) : 0;\ndouble negativeIntg = min \n{\npublic:\n~FSin();\ndouble operator()(double\
    \ x);\n};\nFSin::~FSin()\n{\n}\ndouble FSin::operator()(double x)\n{\nreturn sin(x);\n\
    }\n}\nint main()\n{\ncout << \"starting\" << endl;\nFSin f;\nMonteCarloIntegration\
    \ mci(f);\ndouble integral = mci.getIntegral(0.5, 4.9);\ncout << \" the integral\
    \ of the function is \" << integral << endl;\nmci.setNumSamples(200000);\nintegral\
    \ = mci.getIntegral(0.5, 4.9);\ncout << \" the integral of the function with 20000\
    \ intervals is \" << integral << endl;\nreturn 0;\n}\nListing 14-1\nMonte Carlo\
    \ Integration Method\n```\n\nRunning the Code\n\nYou can compile the files presented\
    \ in Listing [14-1](#323908_2_En_14_Chapter.xhtml#PC2) using gcc or\nany other\
    \ standards-compliant C++ compiler. The result for the sample\ncode in the `main`\
    \ function is the\nfollowing, assuming that you named the executable as `monteCarloIntegration`:\n\
    \n```\n$ ./monteCarloIntegration\nthe integral of the function is 1.74\nthe integral\
    \ of the function with 20000 intervals is 1.6702\n```\n\nNotice that this can\
    \ change depending on the random source used by\nthe implementation. However,\
    \ the values should approach the correct\nvalue as the number of samples used\
    \ by the Monte Carlo method\nincrease.\n\nSimulating Asset Prices\nCreate a C++\
    \ class to mimic the price fluctuations of equities in the\nstock market using\
    \ a random walk simulation\nprocess."
  trans: "\n# 解决方案\n\n蒙特卡洛方法的核心思想是利用随机过程来求解复杂问题。虽然单个随机结果对当前问题可能没有用处，但它具备一个重要特性：可以重复执行并得到不同结果。通过观察大量蒙特卡洛结果的模式，就能揭示这类技术的奥秘。\n\
    \n**一个经典案例**：用随机采样确定曲线包围的面积。例如，要计算圆的面积，可以随机生成多个点并判断它们是否位于圆内，最终通过圆内点所占比例确定面积。随着采样点数量的增加，所求面积的近似值会越来越精确。\n\
    \n上述方法的延伸构成了蒙特卡洛积分策略的基础。使用这种蒙特卡洛方法进行函数积分的优势在于，只需在给定范围内生成随机点即可。这种策略的简洁性使得仅用少量代码就能估算非常复杂函数的积分值。\n\
    \n你可以在 `MonteCarloIntegration` 类中看到该方法的实现。类的结构与第 10 章（积分相关章节）的示例类似，但算法通过生成随机样本来确定给定函数下方的面积百分比。\n\
    \n为了生成均匀分布的随机数，我们使用 `boost::random` 库中的 `uniform_real_distribution` 类。这简化了样本生成过程，避免了使用其他随机数源时常见的数值精度问题。\n\
    \n实现的核心部分可参见 `getIntegral` 成员函数：\n\n```\ndouble MonteCarloIntegration::getIntegral(double\
    \ a, double b)\n```\n\n代码首先确定观测到的最大值和最小值，并以此定义总的采样区域面积。接着，函数生成随机点并判断它们位于函数曲线内部还是外部。最后，用此过程计算出的百分比来估算积分总面积。该过程通过\
    \ `integrateRegion` 成员函数对给定数学函数的正负部分分别执行，最终积分值等于正面积减去负面积。\n\n## 完整代码\n\n清单 14-1\
    \ 展示了用蒙特卡洛方法进行函数积分的完整代码。代码分为头文件和实现文件，并包含一个示例 `main` 函数演示 `MonteCarloIntegration`\
    \ 类的使用方法。\n\n```\n//\n// MonteCarloIntegration.h\n#ifndef __FinancialSamples__MONTECARLOINTEGRATION_H_\n\
    #define __FinancialSamples__MONTECARLOINTEGRATION_H_\ntemplate \nclass MathFunction;\n\
    class MonteCarloIntegration {\npublic:\nMonteCarloIntegration(MathFunction &f);\n\
    MonteCarloIntegration(MathFunction &f, int num_samples);\nMonteCarloIntegration(const\
    \ MonteCarloIntegration &p);\n~MonteCarloIntegration();\nMonteCarloIntegration\
    \ &operator=(const MonteCarloIntegration &p);\nvoid setNumSamples(int n);\ndouble\
    \ getIntegral(double a, double b);\ndouble integrateRegion(double a, double b,\
    \ double min, double max);\nprivate:\nMathFunction &m_f;\nint m_numSamples;\n\
    };\n#endif /* MONTECARLOINTEGRATION_H_ */\n//\n// MonteCarloIntegration.cpp\n\
    #include \"MonteCarloIntegration.h\"\n#include \n#include \n#include \n#include\
    \ \"MathFunction.h\"\n#include \nstatic std::default_random_engine random_generator;\n\
    using std::cout;\nusing std::endl;\nnamespace {\nconst int DEFAULT_NUM_SAMPLES\
    \ = 1000;\n}\nMonteCarloIntegration::MonteCarloIntegration(MathFunction& f)\n\
    : m_f(f),\nm_numSamples(DEFAULT_NUM_SAMPLES)\n{\n}\nMonteCarloIntegration::MonteCarloIntegration(MathFunction&\
    \ f, int num_samples)\n: m_f(f),\nm_numSamples(num_samples)\n{\n}\nMonteCarloIntegration::MonteCarloIntegration(const\
    \ MonteCarloIntegration& p)\n: m_f(p.m_f),\nm_numSamples(p.m_numSamples)\n{\n\
    }\nMonteCarloIntegration::~MonteCarloIntegration()\n{\n}\nMonteCarloIntegration&\
    \ MonteCarloIntegration::operator =(const MonteCarloIntegration& p)\n{\nif (this\
    \ != &p)\n{\nm_f = p.m_f;\nm_numSamples = p.m_numSamples;\n}\nreturn *this;\n\
    }\nvoid MonteCarloIntegration::setNumSamples(int n)\n{\nm_numSamples = n;\n}\n\
    double MonteCarloIntegration::integrateRegion(double a, double b, double min,\
    \ double max)\n{\nstd::uniform_real_distribution xDistrib(a, b);\nstd::uniform_real_distribution\
    \ yDistrib(min, max);\nint pointsIn = 0;\nint pointsOut = 0;\nbool positive =\
    \ max > 0;\nfor (int i = 0; i  0)\n{\npercentageArea = pointsIn / double(pointsIn\
    \ + pointsOut);\n}\nif (percentageArea > 0)\n{\nreturn (b-a) * (max-min) * percentageArea;\n\
    }\nreturn 0;\n}\ndouble MonteCarloIntegration::getIntegral(double a, double b)\n\
    {\nstd::uniform_real_distribution distrib(a, b);\ndouble max = 0;\ndouble min\
    \ = 0;\nfor (int i = 0; i  max)\n{\nmax = y;\n}\nif (y  0 ? integrateRegion(a,\
    \ b, 0, max) : 0;\ndouble negativeIntg = min \n{\npublic:\n~FSin();\ndouble operator()(double\
    \ x);\n};\nFSin::~FSin()\n{\n}\ndouble FSin::operator()(double x)\n{\nreturn sin(x);\n\
    }\n}\nint main()\n{\ncout << \"starting\" << endl;\nFSin f;\nMonteCarloIntegration\
    \ mci(f);\ndouble integral = mci.getIntegral(0.5, 4.9);\ncout << \" the integral\
    \ of the function is \" << integral << endl;\nmci.setNumSamples(200000);\nintegral\
    \ = mci.getIntegral(0.5, 4.9);\ncout << \" the integral of the function with 20000\
    \ intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n**清单 14-1** 蒙特卡洛积分方法\n\
    \n## 运行代码\n\n你可以使用 `gcc` 或其他符合标准的 C++ 编译器编译清单 14-1 中的文件。假设可执行文件名为 `monteCarloIntegration`，`main`\
    \ 函数示例代码的运行结果如下：\n\n```\n$ ./monteCarloIntegration\nthe integral of the function\
    \ is 1.74\nthe integral of the function with 20000 intervals is 1.6702\n```\n\n\
    请注意，结果可能因实现所使用的随机源不同而变化。然而，随着蒙特卡洛方法采样数量的增加，这些值应趋近于正确值。\n\n## 模拟资产价格\n\n创建一个 C++\
    \ 类，通过随机游走模拟过程来模拟股票市场中股票价格的波动。\n"
- fmt: "# Solution\n\nIf there is an area in investment where it is difficult to find\
    \ closed solutions, that area is financial forecasting. Although there are well-known\
    \ economic models, any complex system such as the stock market is subject to wild\
    \ fluctuations that result from so many factors, including wars, natural disasters,\
    \ and personal choices of important players, among others. Due to the big difficulty\
    \ of estimating such disparate events, a large part of market forecasting models\
    \ assume that some form of random process is the source of price fluctuations.\
    \ In this scenario, Monte Carlo techniques prove to be very useful in the simulation\
    \ of future market conditions.\n\nIn this section, I present a very simple Monte\
    \ Carlo model that can be used for forecasting purposes. To start the presentation,\
    \ I introduce a first version of this method using a set of very simple simulation\
    \ rules. Then, you will see a more complex version of this same principle, using\
    \ a Gaussian distribution, in the next C++ coding example.\n\nThe basic strategy\
    \ used in price forecasting is to simulate price movements using a “random walk.”\
    \ A random walk process is a stochastic technique in which the next state of the\
    \ system is defined only by its previous state (a known price) and the probability\
    \ distribution for the next possible moves. In the example presented in this C++\
    \ class, there are three next states, each of them having the same probability.\
    \ As a result, at each moment in time, the price can go up, go down, or stay flat.\n\
    \nTo simplify the example of random walk given in this section, we will assume\
    \ that the prices of the underlying asset are moving according to a uniform distribution.\
    \ In other words, price changes are generated in such a way that the average jump\
    \ is received as a parameter. Also, the increase or decrease in price is defined\
    \ using a uniformly distributed random variable, with values determined by the\
    \ known average.\n\nThe code necessary to create this simulation is encapsulated\
    \ in the `RandomWalk` class. The class is needed to store the information about\
    \ parameters for the process: among these parameters are the number of steps (samples)\
    \ in the Monte Carlo simulation, the initial asset price, and the average step\
    \ used in the process.\n\nUsing these parameters, the `getWalk` member function\
    \ runs the simulation and returns a vector of prices generated using this strategy.\
    \ Figure [14-1](#323908_2_En_14_Chapter.xhtml#Fig1) displays a sample result of\
    \ this random process. Once you store the prices generated by `getWalk`, your\
    \ code can perform additional processing, as needed. A common example where this\
    \ may be useful is during the test of new trading strategies and for determination\
    \ of their profitability.\n\n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig1_HTML.jpg](images/323908_2_En_14_Chapter/323908_2_En_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1** Results of the random walk generated by `RandomWalk` class\n\
    \nThe algorithm for random walk used in the `RandomWalk` class can be tweaked\
    \ in a number of ways, depending on the demands of your simulation.\n\n- For example,\
    \ you may want to have the price of the underlying instrument changing more frequently.\
    \ This can be achieved with the removal of the third branching rule (which allows\
    \ the price to stay in the same level) and therefore forcing moves either up or\
    \ down.\n- Another variation of the random walk is to have different probabilities\
    \ for up and high prices—in this way, it is possible to simulate a “bull” or “bear”\
    \ market.\n- For a similar purpose as previously, it is possible to change the\
    \ amount of the price jump (up or down), so that up moves may be bigger than down\
    \ moves. This would be another way to simulate a directional market, where prices\
    \ are going up faster than usual.\n\n## Complete Code\n\nListing [14-2](#323908_2_En_14_Chapter.xhtml#PC4)\
    \ contains the complete code for the `RandomWalk` class. You will find the implementation\
    \ in a header file and a cpp file, followed by a sample `main` function.\n\n```\n\
    //\n// RandonWalk.h\n#ifndef __FinancialSamples__RandonWalk__\n#define __FinancialSamples__RandonWalk__\n\
    #include \n// Simple random walk for price simulation\nclass RandomWalk {\npublic:\n\
    RandomWalk(int size, double start, double step);\nRandomWalk(const RandomWalk\
    \ &p);\n~RandomWalk();\nRandomWalk &operator=(const RandomWalk &p);\nstd::vector\
    \ getWalk();\nprivate:\nint m_size;     // number of steps\ndouble m_step;  //\
    \ size of each step (in percentage)\ndouble m_start; // starting price\n};\n#endif\
    \ /* defined(__FinancialSamples__RandonWalk__) */\n//\n//  RandonWalk.cpp\n#include\
    \ \"RandonWalk.h\"\n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\n\
    RandomWalk::RandomWalk(int size, double start, double step)\n: m_size(size),\n\
    m_step(step),\nm_start(start)\n{\n}\nRandomWalk::RandomWalk(const RandomWalk &p)\n\
    : m_size(p.m_size),\nm_step(p.m_step),\nm_start(p.m_start)\n{\n}\nRandomWalk::~RandomWalk()\n\
    {\n}\nRandomWalk &RandomWalk::operator=(const RandomWalk &p)\n{\nif (this != &p)\n\
    {\nm_size = p.m_size;\nm_step = p.m_step;\nm_start = p.m_start;\n}\nreturn *this;\n\
    }\nstd::vector RandomWalk::getWalk()\n{\nvector walk;\ndouble prev = m_start;\n\
    for (int i=0; i walk = rw.getWalk();\nfor (int i=0; i<walk.size(); ++i)\n{\ncout\
    \ << \", \" << i << \", \" << walk[i];\n}\ncout << endl;\nreturn 0;\n}\n```\n\n\
    **Listing 14-2** Implementation for `RandomWalk` Class\n\n## Running the Code\n\
    \nTo run the code presented in Listing [14-2](#323908_2_En_14_Chapter.xhtml#PC4),\
    \ first you need to compile it using a standards-compliant compiler such as `gcc`\
    \ or Visual Studio. Here are the first few lines of the random walk using the\
    \ given parameters: initial price of $30, step of 1%, and 100 steps.\n\n```\n\
    ./randomWalk\n, 0, 29.7, 1, 29.403, 2, 29.403, 3, 29.403, 4, 29.109, 5, 29.109,\
    \ 6, 29.4001, 7, 29.4001, 8, 29.4001, 9, 29.1061, 10, 29.3971, 11, 29.3971, 12,\
    \ 29.6911, 13, 29.6911, 14, 29.988, 15, 29.988, 16, 29.6881, 17, 29.3912, 18,\
    \ 29.0973, 19, 28.8064, 20, 29.0944, 21, 28.8035, 22, 29.0915, 23, 29.0915, 24,\
    \ 28.8006, 25, 29.0886, 26, 29.3795, 27, 29.6733, 28, 29.6733, 29, 29.3765, 30,\
    \ 29.0828, 31, 29.0828, 32, 29.0828, 33, 28.792, 34, 28.792, 35, 29.0799, 36,\
    \ 28.7891, 37, 28.5012, 38, 28.7862, 39, 29.0741, 40, 28.7833, 41, 28.7833, 42,\
    \ 28.4955, 43, 28.7804, 44, 28.7804, 45, 28.7804, 46, 28.7804, 47, 28.4926, 48,\
    \ 28.7776, 49, 28.4898, 50, 28.4898, 51, 28.4898, 52, 28.2049, 53, 27.9228, 54,\
    \ 27.6436, 55, 27.6436, 56, 27.92, 57, 27.92, 58, 28.1992, 59, 27.9173,\n```\n\
    \nFigure [14-1](#323908_2_En_14_Chapter.xhtml#Fig1) displays a plot of the random\
    \ walk generated by one execution of the sample code. Notice how prices start\
    \ near the $30 mark and display a behavior similar to real variations observed\
    \ on the stock market.\n\n# Calculating Option Probabilities\n\nIn this section,\
    \ we will implement a C++ solution to computing European options probabilities\
    \ for events such as finishing above the strike price, finishing below the strike\
    \ price, or finishing between two given prices.\n\n## Solution\n\nOptions are\
    \ a very popular type of equity derivatives, which can be bought in most retail\
    \ investment accounts. With options, you pay a price for the privilege of buying\
    \ or selling a stock for a particular price during a limited period of time, hence\
    \ the designation “option,” since you have the option, not the obligation, of\
    \ performing the transaction.\n\nA call option gives the right to buy at a particular\
    \ price, while a put option gives the right to sell at a particular price. The\
    \ exercise price is called the strike. Depending on the relationship between the\
    \ current price of the stock and the strike price, an option can be classified\
    \ into one of the three categories:\n\n- **In the money (ITM):** The strike price\
    \ is lower than the current price of the stock, for call options. For put options,\
    \ the strike price should be above the current stock price."
