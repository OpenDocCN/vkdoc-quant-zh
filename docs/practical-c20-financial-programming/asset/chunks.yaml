    \ common techniques for numerical integration.\nYou have seen how integration\
    \ methods such as the trapezoid and\nSimpson’s rule can be applied to the task\
    \ of finding the area under the\ncurve for some preestablished functions.\nThe\
    \ trapezoid method is the second important algorithm used to\nevaluate definite\
    \ integrals. Given a general function, this method uses\nthe function value at\
    \ the extremes of the interval in order to define a\ntrapezoid-based geometric\
    \ approximation. You have seen some examples of\nhow this strategy works, along\
    \ with working code to implement the\nrule.\nI have also discussed the well-known\
    \ Simpson’s method for definite\nintegration. Here, the approximation to the curve\
    \ is performed using a\nquadratic equation. You saw an example of how to use polynomial\n\
    equations to achieve the desired accuracy. Using Simpson’s method, you\ncan perform\
    \ integration with very good approximations, despite the fact\nthat fewer subintervals\
    \ may be necessary to read this accuracy.\nPartial differential equations (PDEs)\
    \ are another important\nmathematical tool for the financial software developer.\
    \ It is important\nto understand how they work, as well as having tools to find\
    \ solutions\nbased on PDEs. In the next chapter, I discuss some important PDE-related\n\
    techniques and their implementation in C++.\n\n11. Solving ODEs and PDEs\n\nThe\
    \ solution of ODEs (ordinary differential equations) and PDEs\n(partial differential\
    \ equations) is at the heart of many techniques used\nin the analysis of financial\
    \ markets. Important analytical tools for\nderivative valuation such as the Black-Scholes\
    \ model for stock options\nand other derivatives can be directly represented as\
    \ differential\nequations. Such equations need to be regularly solved in order\
    \ to\ndetermine the price of financial instruments traded in the global\nmarkets.\
    \ This creates the need for high-performance code, capable of\nfinding efficient\
    \ solutions to these mathematical models.\nDue to the large number of applications\
    \ of ODEs and PDEs in science,\nengineering, and finance, several methods to solve\
    \ them have been\ndeveloped. In addition to the exact mathematical methods, capable\
    \ of\nanalyzing and finding the solution to differential equations, a software\n\
    engineer also has to deal with purely computational approaches, as well\nas their\
    \ implementation in C++.\n\nExamples of differential equations of interest in\
    \ finance include\n\n*   Thiele’s differential equation: Used to determine fair\
    \ prices for\n    life insurance contracts\n\n*   Black-Scholes differential equation:\
    \ Used to price options and\n    related derivatives\n\n*   Market reserve differential\
    \ equation\n\n*   Dynamic variations of portfolio optimization\n\n*   Merton’s\
    \ equations for utility optimization\n\n*   Along with several variations of these\
    \ differential\n    equations\n\nSince the application of differential equations\n\
    to financial problems is such a large area, in this chapter I am able to\npresent\
    \ only an overview of the methods most frequently used for their\nsolution.\n\n\
    The programming examples discussed in this chapter cover a few\nparticular aspects\
    \ of ODE and PDE modeling and applications. Topics that\nyou will explore include\
    \ the following:\n\n*   Euler’s method for ODEs: An algorithm that is simple to\
    \ implement\n    and can be applied directly to any first-order ODE.\n\n*   Runge-Kutta\
    \ method: An improvement over the general ideas of\n    Euler’s algorithm, the\
    \ Runge-Kutta method provides better stability and\n    accuracy for the solution\
    \ to ODEs.\n\n*   Black-Scholes equation: A general discussion of the Black-Scholes\n\
    \    PDE and an overview of the forward method to solve this model.\n\nSolving\
    \ Ordinary Differential Equations\nIn this section, we will create a class to\
    \ solve ODEs using Euler’s\nmethod.\n\nSolution\nI start the discussion of differential\
    \ equations with some methods\nfor the numerical\nsolution to ordinary differential\
    \ equations. Before I can start\nwith a first example, however, let’s remember\
    \ some of the relevant facts\nabout ODEs.\n\nAn ordinary differential equation\
    \ is an equation that includes the rate\nof change (derivative) with respect to\
    \ a single variable in one or more\nof its terms. Given a differential equation,\
    \ its *order* is\ndefined as the maximum order of any of the derivatives included\
    \ in the\nequation. The following are a few examples of ODEs:\n\n![$$ {x}^3\\\
    frac{d^2y}{dx^2}+x\\frac{dy}{dx}+y={x}^5 $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equa.png)\n\
    \n![$$ x\\frac{dy}{dx}+4{x}^2=y $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equb.png)\n\
    \nBoth equations involve the derivative of the variable *y* with\nrespect to *x*.\
