    # 解决方案


    在前一个示例中，你了解了如何通过分段线性方程，利用数据点在连续区间内进行插值。然而，尽管线性插值在大量实际场景中可行，但这种近似方法的问题在于生成的曲线不光滑。这意味着曲线在**不同线段**的交界处会包含表示函数过渡的拐点。从数学上讲，由于这种突然的过渡，这样的函数被认为是**不可微**的。在某些应用中，这种可察觉的变化是不期望的，你可能希望以一种使观测点之间过渡平滑的方式来进行插值。


    为了避免使用线性插值所描述的问题，可以采用更复杂的方案，即使用更高次的多项式来平滑过渡。更重要的是，使用这种方法求得的单个多项式可以同时对所有给定数据点进行插值。这种插值的结果是，你只需要一个多项式方程即可为任何所需输入生成值。


    多项式插值基于这样一个数学事实：给定一个次数足够高的多项式，可以找到一个对应的多项式函数，该函数恰好通过作为输入提供的那些点。由于多项式的某些已知代数性质，这一点是得到保证的。例如，假设我们有以下点序列（与线性插值示例中使用的点相同）：


    ```

    y1 = (10,0.6), y2 = (20,0.11), y3 = (30,1.1), y4 = (40,1.62), y5 = (49,1.4).

    ```


    多项式插值算法会返回一个基于由一组系数定义的多项式的值。利用这些信息，你可以计算任何中间点，甚至超出给定观测范围的点，因为多项式通常对所有实数都有定义。你还可以使用计算出的多项式来绘制插值函数的值，如图
    8-2 所示。


    ![../images/323908_2_En_8_Chapter/323908_2_En_8_Fig2_HTML.jpg](img/323908_2_En_8_Fig2_HTML.jpg)


    **图 8-2** 使用少量观测值进行插值的多项式函数：请注意，与使用线段的图 8-1 中的解决方案不同，该多项式函数是光滑的


    此处用于解决这个多项式插值问题的技术称为**拉格朗日插值算法**。使用拉格朗日插值方法，对于每组 *n*+1 个点 (*x*<sub>i</sub>, *y*<sub>i</sub>)，你可以创建一个次数为
    *n* 且通过这些点的多项式。使用给定的输入点，多项式系数的通用公式如下：


    ![$$ {L}_k(x)=\frac{\left(x\kern0.5em -\kern0.5em {x}_0\right)\left(x\kern0.5em
    -\kern0.5em {x}_1\right)\dots \left(x\kern0.5em -\kern0.5em {x}_{k-1}\right)\left(x\kern0.5em
    -\kern0.5em {x}_{k+1}\right)\dots \left(x\kern0.5em -\kern0.5em {x}_n\right)}{\left({x}_k\kern0.5em
    -\kern0.5em {x}_0\right)\left({x}_k\kern0.5em -\kern0.5em {x}_1\right)\dots \left({x}_k\kern0.5em
    -\kern0.5em {x}_{k-1}\right)\left({x}_k\kern0.5em -\kern0.5em {x}_{k+1}\right)\dots
    \left({x}_k\kern0.5em -\kern0.5em {x}_n\right)} $$](img/323908_2_En_8_Chapter_TeX_Equb.png)


    注意，该函数跳过了 *x*<sub>k</sub> 的值，以避免分子和分母中出现零项。现在，用于插值输入值 *x*<sub>k</sub> 的完整多项式表示可以使用系数
    *L*<sub>k</sub>(*x*) 写成如下形式：


    ![$$ P(x)={y}_0{L}_0(x)+\cdots +{y}_n{L}_n(x) $$](img/323908_2_En_8_Chapter_TeX_Equc.png)


    这是一个可用于提供任何值的插值的函数，给定 *n*+1 个输入观测值 (*x*<sub>i</sub>, *y*<sub>i</sub>)。该公式的证明超出了本节的目标，但请注意，当输入值
    *x* 是已知的某个 *x*<sub>i</sub> 时，除了 *L*<sub>i</sub>(*x*) 项外，所有项都会因为包含分量 *x* – *x*<sub>i</sub>
    而结果为零。然而，在那种情况下，分子与分母相同，结果值为 1。因此，对于这些值，解正如预期的那样就是 *y*<sub>i</sub>。


    使用这个多项式函数，我们可以创建一个 C++ 类，通过模拟期望的多项式来实现插值机制。这通过 `PolynomialInterpolation` 类来实现。该类的设计与
    `LinearInterpolation` 类似，存储通过 `setPoints` 成员函数传入的 x 和 y 值。利用这些信息，`PolynomialInterpolation`
    能够基于初始点执行必要的计算。


    实际工作是在 `getValue` 成员函数中计算多项式插值，该函数重写如下：


    ```

    double PolynomialInterpolation::getPolynomial(double x)

    {

    double polynomialValue = 0;

    for (size_t i=0; i<m_x.size(); ++i)

    {

    // 计算分子

    double num = 1;

    for (size_t j=0; j<m_x.size(); ++j)

    {

    if (j!=i)

    {

    num *= x - m_x[j];

    }

    }

    // 计算分母

    double den = 1;

    for (size_t j=0; j<m_x.size(); ++j)

    {

    if (j!=i)

    {

    den *= m_x[i] - m_x[j];

    }

    }

    // 第 i 项的值

    polynomialValue += m_y[i] * (num/den);

    }

    return polynomialValue;

    }

    ```


    计算以迭代方式进行，在 `for` 循环的每一步中，计算其中一个多项式 *L*<sub>k</sub>(*x*) 并将其累加到局部变量 `polynomialValue`
    中。循环内部可以分为三部分。第一部分，计算分子，即所有项 *x – x*<sub>j</sub> 的乘积，当 *i = j* 时该项不参与计算。第二部分是分母的计算，与第一步非常相似，你查看原始公式就能确认。分母的值存储在局部变量
    `den` 中。第三步，将 *y* 的值乘以前两步计算出的分子与分母构成的分数。


    前面所述算法的复杂度取决于给定的输入。你提供的输入值越多，该算法执行时间就越长。时间变化与输入值的数量成二次关系，因为对于每个值，我们需要在第二层循环内执行一个
    `for` 循环，并且每个这样的循环运行的次数等于所使用的点数。就计算复杂度而言，这被称为具有 *O*(*n*²) 的时间复杂度。


    ## 完整代码

