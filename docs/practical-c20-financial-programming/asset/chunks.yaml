- fmt: "### Using Shared Pointers\n\nSince the `RiskCalculator` class needs to maintain\
    \ a set of credit ratings, it makes sense to have a container to hold this information.\
    \ However, we would like to avoid making copies of the data. Since the `CreditRisk`\
    \ class is so simple, it doesn’t make much difference if you make copies or not.\
    \ However, classes can become more complex, and in a large application, these\
    \ memory requirements start to add up. Therefore, a better design is to avoid\
    \ making copies of `CreditRisk` objects as we add them to collections. We have\
    \ seen, however, that `std::unique_ptr` is not suitable for inclusion in collections,\
    \ which leaves us with the requirement of storing traditional pointers for objects.\n\
    \nA better solution is to use the `std::shared_ptr` class to handle the memory\
    \ associated with `CreditRisk` objects. A shared pointer not only knows how to\
    \ clean up the data referenced by a pointer but is also able to share the reference\
    \ with other objects. This way, the object will not be destroyed until the last\
    \ reference is also destroyed.\n\nShared pointers achieve this behavior through\
    \ the use of a reference counting mechanism. A counter is maintained by the shared\
    \ pointer object, which determines how many copies exist for the referenced object.\
    \ When the shared pointer is destroyed, it checks this counter to determine if\
    \ other references exist. If the counter is positive, the pointed object is not\
    \ destroyed. The counter is also updated when a new copy of the shared pointer\
    \ is created. The counter is incremented to indicate that another copy of the\
    \ object reference exists. In this way, several copies of the same shared pointer\
    \ can live in memory, and they will all manage the underlying data correctly,\
    \ until the last one is destroyed and the original object is removed from memory.\n\
    \nI used shared pointers to handle the memory requirements of the `RiskCalculator`\
    \ class. The set of `CreditRisk` objects is maintained as a vector of shared pointers,\
    \ declared as follows:\n\n```\nstd::vector > m_creditRisks;\n```\n\nIn this declaration,\
    \ each element of the vector is a shared pointer. Since shared pointers know how\
    \ to copy themselves, they can be used effectively as members of a vector or any\
    \ other container, unlike unique pointers.\n\nWorking with shared pointers is\
    \ easy because they automatically perform the required cleanup actions. For example,\
    \ copying unique pointers is done simply with the use of the assignment operator.\
    \ New elements to the `m_creditRisks` vector are added by the `addCreditRisk`\
    \ member function.\n\n```\nvoid RiskCalculator::addCreditRisk(std::shared_ptr\
    \ risk)\n{\nm_creditRisks.push_back(risk);\n}\n```\n\n### Complete Code\n\nIn\
    \ Listing [3-3](#323908_2_En_3_Chapter.xhtml#PC17), you have the complete code\
    \ for the example described in the previous section. The class is called `CreditRisk`,\
    \ which is contained in a header and an implementation file.\n\n```\n//\n//  CreditRisk.h\n\
    #ifndef __FinancialSamples__CreditRisk__\n#define __FinancialSamples__CreditRisk__\n\
    // A simple class representing a credit risk assessment\nclass CreditRisk {\n\
    public:\n// these are risk grades, as determined by rating agencies\nenum RiskType\
    \ {\nAAA,\nAAPlus,\nAA,\nAPlus,\nA,\nBPlus,\nB,\nCPlus,\nC\n};\n// other methods\
    \ here ...\n};\n#endif /* defined(__FinancialSamples__CreditRisk__) */\n//\n//\
    \  RiskCalculator.h\n#ifndef __FinancialSamples__RiskCalculator__\n#define __FinancialSamples__RiskCalculator__\n\
    #include \"CreditRisk.h\"\n#include \n#include \n// calculates the risk associated\
    \ to a portfolio\nclass RiskCalculator {\npublic:\nRiskCalculator();\n~RiskCalculator();\n\
    RiskCalculator(const RiskCalculator &);\nRiskCalculator &operator =(const RiskCalculator\
    \ &);\nvoid addCreditRisk(std::shared_ptr risk);\nCreditRisk::RiskType portfolioMaxRisk();\n\
    CreditRisk::RiskType portfolioMinRisk();\nprivate:\nstd::vector > m_creditRisks;\n\
    };\n#endif /* defined(__FinancialSamples__RiskCalculator__) */\n//\n//  RiskCalculator.cpp\n\
    #include \"RiskCalculator.h\"\nRiskCalculator::RiskCalculator()\n{\n}\nRiskCalculator::~RiskCalculator()\n\
    {\n}\nRiskCalculator::RiskCalculator(const RiskCalculator &v)\n: m_creditRisks(v.m_creditRisks)\n\
    {\n}\nRiskCalculator &RiskCalculator::operator =(const RiskCalculator &v)\n{\n\
    if (this != &v)\n{\nm_creditRisks = v.m_creditRisks;\n}\nreturn *this;\n}\nvoid\
    \ RiskCalculator::addCreditRisk(std::shared_ptr risk)\n{\nm_creditRisks.push_back(risk);\n\
    }\nCreditRisk::RiskType RiskCalculator::portfolioMaxRisk()\n{\nCreditRisk::RiskType\
    \ risk = CreditRisk::RiskType::AAA;\nfor (int i=0; igetRating() getRating();\n\
    }\n}\nreturn risk;\n}\nCreditRisk::RiskType RiskCalculator::portfolioMinRisk()\n\
    {\nCreditRisk::RiskType risk = CreditRisk::RiskType::C;\nfor (int i=0; igetRating()\
    \ > risk)\n{\nrisk = m_creditRisks[i]->getRating();\n}\n}\nreturn risk;\n}\nListing\
    \ 3-3\nCreditRisk.h\n```\n\n### Using the `auto` Keyword\n\nAmong the many additions\
    \ to C++ introduced by the C++11 standard, the `auto` keyword is one of the most\
    \ practical and easy to understand. The basic idea behind this extension is that\
    \ the compiler can perform the job of type detection for many categories of variables\
    \ and expressions. Whenever this is possible, the programmer can use the `auto`\
    \ keyword in the variable declaration, instead of entering the full type of the\
    \ desired object. This way, the programmer can decide to let the compiler do the\
    \ type detection automatically while using the type name only when a visual labeling\
    \ is desired and convenient.\n\nThe `auto` keyword has a few advantages over other\
    \ forms of type declaration. It:\n- Reduces the amount of manual work done by\
    \ programmers, since it uses the compiler itself to analyze an expression and\
    \ determine the exact type for a particular variable or expression\n- Adds uniformity\
    \ to the code, as most variables are declared using the same style\n- Leaves intact\
    \ the ability of programmers to enter the exact type as desired, so that any conflicts\
    \ can be avoided\n- Simplifies the use of templates, because data types can be\
    \ automatically detected during compilation at each instantiation of the template\n\
    \nAs an example of the use of the `auto` keyword, we can modify some of the member\
    \ functions in the `RiskCalculator` class to perform automatic detection of variable\
    \ types. This is useful to simplify some of the expressions that are so common\
    \ when using template collections. The following, for instance, is the `portfolioMaxRisk`\
    \ member function:\n\n```\nCreditRisk::RiskType RiskCalculator::portfolioMaxRisk()\n\
    {\nauto risk = CreditRisk::RiskType::AAA;\nfor (auto &p : m_creditRisks)\n{\n\
    if ((*p)->getRating() getRating();\n}\n}\nreturn risk;\n}\n```\n\nThis code snippet\
    \ shows how the type of the local variable `risk` can be automatically detected,\
    \ so you don’t need to enter the redundant name of the type `CreditRisk::RiskType`.\
    \ Similarly, the next line shows how to iterate through a collection of objects\
    \ using the `auto` keyword to determine the right type of the iterator. Seasoned\
    \ STL programmers know that using iterators may introduce a lot of extra types\
    \ to a piece of code, which frequently obfuscates the original intent of the program.\
    \ For comparison, notice that if it weren’t for the `auto` keyword, the foregoing\
    \ `for` loop would need to be rendered as:\n\n```\nfor (std::vector >::iterator\
    \ p = m_creditRisks.begin();\np != m_creditRisks.end(); ++p)\n{\n// ...\n}\n```\n\
    \nNot only is this harder to enter manually, but it also makes the code harder\
    \ to understand and modify.\n\n## Collecting Transaction Data\n\nCreate a solution\
    \ to the problem of handling transaction orders, including `BUY`, `SELL`, or `SELL\
    \ SHORT`, stored in a single file. The solution must correctly handle programming\
    \ exceptions."
