  trans: "\n# 图 10-2\n原始函数 `f(x) = x² + 1` 与常数函数 `f(x) = c` 的对比\n\n近似值可以通过公式 `(5 –\
    \ 1) * 10 = 40` 计算得出。你可以将其与积分闭合计算所定义的值进行比较：`f(x) = x² + 1` 的反导数是 `F(x) = x³/3\
    \ + x`，在区间 1 到 5 上使用该方程作为定积分，你会得到值 45.33。由此可见，正确值与使用单个中点计算得到的估值之间存在较大误差。\n\n好消息是，我们可以通过在所需函数上考虑更小的区间，并将这些区间的结果相加来改进这个近似。这是你在本节及后续章节中将看到的基本技术。因此，为了改进前一个例子中的近似，我们只需将区间\
    \ 1–5 分成两个区间：1 到 3 和 3 到 5。\n\n考虑常数函数的平均值，你会发现区间前半部分的值是 `((1 + 3)/2)² + 1 = 5`，后半部分是\
    \ `((3 + 5)/2)² + 1 = 17`。这给出了一个近似值 `2 × 5 + 2 × 17 = 44`。由于精确值是 45.33，你可以看出近似值\
    \ 44 更接近真实值。你可以在图 10-3 中看到这个新的近似。\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig3_HTML.jpg](img/323908_2_En_10_Fig3_HTML.jpg)\n\
    \n# 图 10-3\n使用两个常数值近似 `f(x) = x² + 1` 的积分\n\n正如你所见，从中点法取得良好结果的秘诀是将所需区间细分为更小的单元并将它们相加，这与积分函数本身的定义方式非常相似。虽然你可以从一个常数开始，然后连续分割区间，但更简单的方法是先从一个已知的大分段数开始，必要时再增加分段的数目。使用这种策略会得到以下算法：\n\
    \n定义一个范围 `(A, B)`，你需要在这个范围内计算方程的积分。\n\n1.  将初始范围细分为 `N` 个等宽的子区间。\n2.  将积分值 `S`\
    \ 初始化为零。\n3.  对于每个子区间 `(a, b)`，执行以下操作：\n    1.  获取 `a` 和 `b` 的值。\n    2.  确定中点值：\n\
    \        `m(a, b) = f((a + b) / 2)`。\n    3.  将 `m(a, b)` 加到积分值中。\n\n这个简单方法的实现可以在\
    \ `MidpointIntegration` 类中找到。\n\n## 完整代码\n\n你可以在代码清单 10-1 中找到实现上述方法的完整代码。该清单包含了\
    \ `MidpointIntegration` 类的头文件及实现文件。\n\n```\n//\n//  MidpointIntegration.h\n#ifndef\
    \ __FinancialSamples__MidpointIntegration__\n#define __FinancialSamples__MidpointIntegration__\n\
    template \nclass MathFunction;\nclass MidpointIntegration {\npublic:\nMidpointIntegration(MathFunction\
    \ &f);\nMidpointIntegration(const MidpointIntegration &p);\n~MidpointIntegration();\n\
    MidpointIntegration &operator=(const MidpointIntegration &p);\nvoid setNumIntervals(int\
    \ n);\ndouble getIntegral(double a, double b);\nprivate:\nMathFunction &m_f;\n\
    int m_numIntervals;\n};\n#endif /* defined(__FinancialSamples__MidpointIntegration__)\
    \ */\n//\n//  MidpointIntegration.cpp\n#include \"MidpointIntegration.h\"\n#include\
    \ \"MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\nnamespace\
    \  {\nconst int DEFAULT_NUM_INTERVALS = 100;\n}\nMidpointIntegration::MidpointIntegration(MathFunction\
    \ &f)\n: m_f(f),\nm_numIntervals(DEFAULT_NUM_INTERVALS)\n{\n}\nMidpointIntegration::MidpointIntegration\
    \ (const MidpointIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n\
    {\n}\nMidpointIntegration::~MidpointIntegration()\n{\n}\nMidpointIntegration &MidpointIntegration::operator=(const\
    \ MidpointIntegration &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_numIntervals\
    \ = p.m_numIntervals;\n}\nreturn *this;\n}\nvoid MidpointIntegration::setNumIntervals(int\
    \ n)\n{\nm_numIntervals = n;\n}\ndouble MidpointIntegration::getIntegral(double\
    \ a, double b)\n{\ndouble S = 0;\ndouble intSize = (b - a)/m_numIntervals;\ndouble\
    \ x = a;\nfor (int i=0; i\n{\npublic:\n~F1();\ndouble operator()(double x);\n\
    };\nF1::~F1()\n{\n}\ndouble F1::operator ()(double x)\n{\nreturn x*x+1;\n}\n}\n\
    int main()\n{\nF1 f;\nMidpointIntegration mpi(f);\ndouble integral = mpi.getIntegral(1,\
    \ 5);\ncout << \" the integral of the function is \" << integral << endl;\nmpi.setNumIntervals(200);\n\
    integral = mpi.getIntegral(1, 5);\ncout << \" the integral of the function with\
    \ 200 intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n*代码清单 10-1：中点积分法的实现*\n\
    \n## 运行代码\n\n你可以使用任何符合标准的编译器（如 `gcc`）从代码清单 10-1 中的源代码生成可执行的二进制文件。然后，你可以执行代码来获得如下示例结果，针对示例方程\
    \ `f(x) = x² + 1`：\n\n```\n./midpointIntegration\nthe integral of the function\
    \ is 45.3344\nthe integral of the function with 200 intervals is 45.3336\n```\n\
    \n注意，该解决方案测试了两种分区数情况下的近似：当分区数为 100（默认值）和分区数为 200 时。由于函数的精确值是 `45 + 1/3`，这表明结果有所改进，误差从小数点后第三位降到了小数点后第四位。你可以通过增加分区数来改进不同函数或所需误差下的近似值。\n\
    \n# 梯形法\n\n在本节中，我们将创建一个 C++ 类，实现用于定积分计算的梯形法。\n\n## 解决方案\n\n正如你在上一节中所看到的，为一个函数的积分提出近似值并不困难。然而，在许多应用中，能够更快、更有效地确定函数的定积分是很有用的。当需要积分的函数本身计算起来就很困难时，这一点尤其重要。在这些情况下，最好使用一种能够为积分问题提供更精确解的近似技术。\n\
    \n在这个编码示例中，我将探讨另一种计算连续函数积分的方法，称为梯形法。顾名思义，梯形法利用一种几何上的直观概念来呈现特定函数曲线下的面积值，从而使得到的近似值更接近目标值。\n"
- fmt: "为了使用梯形法，我们通过几何直觉来审视积分问题，即寻找逼近目标曲线的最佳方式。考虑函数`f(x) = sin(x)`在区间`[1/2, 5/2]`上的积分。所需积分被定义为曲线下的面积。逼近该值的一个简单方法是使用线性函数的面积，该线性函数在给定区间的端点之间逼近`sin(x)`。通过图形方法，可以在图10-4中看到结果。\n\
    \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig4_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig4_HTML.jpg)\n\
    \n**图10-4** 使用一次梯形法迭代逼近`f(x)=sin(x)`在区间`[1/2, 5/2]`上的积分\n\n梯形法应用于该区间得到的逼近效果相对较差。使用符号技术计算的该积分真实值为`cos(1/2)\
    \ - cos(5/2)`，约为1.6787。而梯形法得到的值为`2 * sin(1/2) + sin(5/2) - sin(1/2) = sin(1/2)\
    \ + sin(5/2) ≈ 1.0778`。尽管这是一个较差的逼近，但如果你将目标函数的区间分成两个或多个子区域，结果会更好。这样做，误差会变小，得到的值会更接近积分的真实值。例如，我将展示如何使用`[1/2,\
    \ 3/2]`和`[3/2, 5/2]`这两个子区间来改进对前述函数的逼近。\n\n`f(1/2) = sin(1/2) ≈ 0.4794`和`f(3/2)\
    \ = sin(3/2) ≈ 0.9974`的值产生了一个面积为0.7384的梯形。另一方面，第二个区间的值由`f(3/2) = sin(3/2)`和`f(5/2)\
    \ = sin(5/2) ≈ 0.5984`决定。由此产生的梯形面积为1.5364，更接近精确值1.6787。您可以在图10-5中直观地看到这种逼近效果。\n\
    \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig5_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig5_HTML.jpg)\n\
    \n**图10-5** 使用梯形法，用两个区间（`[1/2, 3/2]`和`[3/2, 5/2]`）逼近`f(x)=sin(x)`曲线下的面积\n\n正如前两个例子所示，可以证明，随着子区间数量的增加，逼近的质量会越来越好。因此，通过增加梯形法中的子区间数量，您可以任意接近定积分的真实值。\n\
    \n我提供了一个名为`TrapezoidIntegration`的类，它展示了如何为作为参数传递的任何函数实现梯形法。通过使用`MathFunction`类，该实现是通用的。传递一个所需`MathFunction`类的新对象，您就可以使用`getIntegral`成员函数计算不同函数的定积分。使用`TrapezoidIntegration`类，您还可以通过成员函数`setNumIntervals`确定使用的中间区间数量。如果需要，这可以允许您减少定积分估计中的误差。使用`setNumIntervals`的另一件事是，通过减少算法的迭代次数，可以减少必要的计算量。这样，您就可以完全控制逼近程度和计算效率之间的权衡。\n\
    \n## 完整代码\n\n代码清单10-2是上一节讨论的梯形积分法的完整实现。您将看到此代码分为一个头文件和一个实现文件。还有一个`main`函数，它为`TrapezoidIntegration`类提供了一个示例。\n\
    \n```cpp\n//\n//  TrapezoidIntegration.h\n#ifndef __FinancialSamples__TrapezoidIntegration__\n\
    #define __FinancialSamples__TrapezoidIntegration__\ntemplate \nclass MathFunction;\n\
    class TrapezoidIntegration {\npublic:\nTrapezoidIntegration(MathFunction &f);\n\
    TrapezoidIntegration(const TrapezoidIntegration &p);\n~TrapezoidIntegration();\n\
    TrapezoidIntegration &operator=(const TrapezoidIntegration &p);\nvoid setNumIntervals(int\
    \ n);\ndouble getIntegral(double a, double b);\nprivate:\nMathFunction &m_f;\n\
    int m_numIntervals;\n};\n#endif /* defined(__FinancialSamples__TrapezoidIntegration__)\
    \ */\n//\n//  TrapezoidIntegration.cpp\n#include \"TrapezoidIntegration.h\"\n\
    #include \"MathFunction.h\"\n#include \n#include \nusing std::cout;\nusing std::endl;\n\
    namespace  {\nconst int DEFAULT_NUM_INTERVALS = 100;\n}\nTrapezoidIntegration::TrapezoidIntegration(MathFunction\
    \ &f)\n: m_f(f),\nm_numIntervals(DEFAULT_NUM_INTERVALS)\n{\n}\nTrapezoidIntegration::TrapezoidIntegration\
    \ (const TrapezoidIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n\
    {\n}\nTrapezoidIntegration::~TrapezoidIntegration()\n{\n}\nTrapezoidIntegration\
    \ &TrapezoidIntegration::operator=(const TrapezoidIntegration &p)\n{\nif (this\
    \ != &p)\n{\nm_f = p.m_f;\nm_numIntervals = p.m_numIntervals;\n}\nreturn *this;\n\
    }\nvoid TrapezoidIntegration::setNumIntervals(int n)\n{\nm_numIntervals = n;\n\
    }\ndouble TrapezoidIntegration::getIntegral(double a, double b)\n{\ndouble S =\
    \ 0;\ndouble intSize = (b - a)/m_numIntervals;\ndouble x = a;\nfor (int i=0; i\n\
    {\npublic:\n~F2();\ndouble operator()(double x);\n};\nF2::~F2()\n{\n}\ndouble\
    \ F2::operator()(double x)\n{\nreturn sin(x);\n}\n}\nint main()\n{\nF2 f;\nTrapezoidIntegration\
    \ ti(f);\ndouble integral = ti.getIntegral(0.5, 2.5);\ncout << \" the integral\
    \ of the function is \" << integral << endl;\nti.setNumIntervals(200);\nintegral\
    \ = ti.getIntegral(0.5, 2.5);\ncout << \" the integral of the function with 200\
    \ intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n**代码清单10-2** 梯形积分法\n\
    \n## 运行代码\n\n您可以使用符合标准的编译器（如gcc、Visual Studio或llvm）编译代码清单10-2中的代码。编译代码后，您可以运行生成的应用程序来测试结果。以下是程序执行的一个示例：\n\
    \n```\n./trapezoidMethod\nthe integral of the function is 1.67867\nthe integral\
    \ of the function with 200 intervals is 1.67871\n```"
  raw: "To use the trapezoid method, we look at the integration problem using a\n\
    geometric intuition about the best way to approximate the desired curve.\nConsider\
    \ the function *f*(*x*) = sin(*x*) in the\nrange ![$$ \\frac{1}{2} $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq7.png)\
    \ to ![$$ \\frac{5}{2} $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq8.png).\
    \ The desired\nintegral is defined as the area under the curve. A simple approach\
    \ to\napproximate this value is to use the area of linear function that\napproximates\
    \ sin*x* between the extremes of the given interval.\nUsing a graphical\napproach\
    \ ,\nyou can see the results in Figure [10-4](#323908_2_En_10_Chapter.xhtml#Fig4).\n\
    \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig4_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4\nApproximating the integral of f(x)=sin(x) over the interval from\
    \ 1/2\nto 5/2 with the help of one iteration of the trapezoid method\n\nThe trapezoid\
    \ method applied to that interval gives a relatively poor\napproximation. The\
    \ real value of the indicated integral, when computed\nusing symbolic\ntechniques\n\
    , is ![$$ \\cos \\frac{1}{2}-\\cos \\frac{5}{2} $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq9.png),\
    \ which is\napproximately 1.6787\\. The trapezoid method, on the other hand, yields\n\
    the value ![$$ 2\\cdot \\sin \\frac{1}{2}+\\sin \\frac{5}{2}-\\sin \\frac{1}{2}=\\\
    sin \\frac{1}{2}+\\sin \\frac{5}{2}\\approx 1.0778 $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq10.png).\n\
    Although this is a poor approximation, you can do better if you\ndivide the interval\
    \ of the desired function in two or more subareas. As\nyou do this, the errors\
    \ will become smaller, and the resulting value\nwill be closer to the real value\
    \ of the integral. For example, I will\nshow how to improve the approximation\
    \ of the previous function using the\ntwo subintervals from 1/2 to 3/2 and from\
    \ 3/2 to 5/2.\n\nThe values of ![$$ f\\left(\\frac{1}{2}\\right)=\\sin \\frac{1}{2}\\\
    approx 0.4794 $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq11.png)\n\
    and ![$$ f\\left(\\frac{3}{2}\\right)=\\sin \\frac{3}{2}\\approx 0.9974 $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq12.png)\n\
    result in a trapezoid with an area of 0.7384\\. The second interval, on\nthe other\
    \ hand, has value determined by ![$$ f\\left(\\frac{3}{2}\\right)=\\sin \\frac{3}{2}\
    \ $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq13.png) and\n\
    ![$$ f\\left(\\frac{5}{2}\\right)=\\sin \\frac{5}{2}\\approx 0.5984 $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq14.png).\n\
    The resulting trapezoid has area equal to 1.5364, which is closer to the\nexact\
    \ value of 1.6787\\. You can see how this approximation works\ngraphically in\
    \ Figure [10-5](#323908_2_En_10_Chapter.xhtml#Fig5).\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig5_HTML.jpg](images/323908_2_En_10_Chapter/323908_2_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\nUsing the trapezoid method to approximate the area under the function\n\
    f(x)=sin x, with two intervals (1/2 to 3/2 and 3/2 to 5/2)\n\nIt can be proved,\
    \ as shown in the previous two examples, that as the\nnumber of subintervals is\
    \ increased, the quality of the approximation\ngets better. As a result, you can\
    \ get as close as desired from the true\nvalue of the definite integral by increasing\
    \ the number of subintervals\nin the trapezoid method.\nI present a class, called\
    \ `TrapezoidIntegration`\n, which shows how to implement the trapezoid method\
    \ for any\nfunction passed as an argument. The implementation is made generic\
    \ with\nthe use of the `MathFunction` class.\nPassing a new object of the desired\
    \ `MathFunction`\nclass , you can\ncalculate definite integrals for different\
    \ functions using the `getIntegral` member\nfunction.\nWith the `TrapezoidIntegration`\n\
    class, you can also determine the desired number of intermediate\nintervals used,\
    \ if you use the member function `setNumIntervals`\n. This, as a result, allows\
    \ you to reduce the error in the\nestimates of the definite integral, if necessary.\
    \ Another thing you can\ndo using the `setNumIntervals` is to\nreduce the computational\
    \ effort necessary, by reducing the number of\niterations of the algorithm. In\
    \ this way, you have complete control over\nthe trade-off between degree of approximation\
    \ and computational\nefficiency.\n\nComplete Code\n\nListing [10-2](#323908_2_En_10_Chapter.xhtml#PC3)\
    \ is a complete\nimplementation  for the trapezoid\nmethod for integration as\
