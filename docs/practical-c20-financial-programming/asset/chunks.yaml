  trans: "\n# 解决方案\n\nGnuplot 是一个非常流行的软件包，用于根据数学函数和数据点创建图表。你可以独立使用 Gnuplot，也可以将其作为其他应用程序所创建图形的嵌入式查看器。在本节中，你将学习如何生成能轻松通过\
    \ Gnuplot 进行可视化的文件。\n\n使用 Gnuplot 的第一步是确保它已正确安装在你的系统中。你可以通过访问其网站 ([`www.gnuplot.info`](http://www.gnuplot.info))\
    \ 并下载所需文件来轻松安装这个用于数据可视化的包。大多数操作系统（包括 Windows、Mac OS X 和 Linux）都有可用的二进制安装文件。运行安装程序并执行主应用程序，你应该会看到类似图\
    \ 6-1 中显示的屏幕。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig1_HTML.jpg](img/323908_2_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1** 在 Windows 上运行的 Gnuplot 主应用程序\n\n这个基础应用程序由一个简单的 shell 组成，你可以在其中输入一些\
    \ Gnuplot 能识别的命令。其中最基础的命令是 `plot`，它允许你在屏幕上显示绘图。例如，你可以轻松为数学函数（如正弦或余弦）创建绘图。所需的命令可以在应用程序的主提示符下输入。\n\
    \n```\n> plot sin(x)\n```\n\n你可以在图 6-2 中看到这个简单函数绘图的结果。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig2_HTML.jpg](img/323908_2_En_6_Fig2_HTML.jpg)\n\
    \n**图 6-2** 使用 Gnuplot 绘制的数学函数 `sin(x)` 的图形\n\n在这个绘图中，你提供了由 `sin(x)` 定义的数学函数，Gnuplot\
    \ 负责创建这些值的图形，默认范围是从 -10 到 10。你可以轻松调整用于确定范围的参数，以及绘图的其他属性，例如标题、图例和两个轴使用的单位。\n\n\
    使用 Gnuplot 的另一种方式是直接绘制数值数据，而不是数学函数。这可以通过引用 `plot` 命令应导入的文件名来实现。大多数以这种方式导入的数据是\
    \ csv（逗号分隔值）格式，尽管 Gnuplot 不强制要求数据必须是 csv 格式——任何包含按列组织的数值数据的文件都可以。\n\n考虑以下数据作为示例。这些是从\
    \ Yahoo! Finance 下载的 IBM 股价。\n\n```\nDate,Open,High,Low,Close,Volume,Adj Close\n\
    2014-07-01,181.7,187.27,181.7,186.35,6643100,186.35\n2014-06-30,181.33,181.93,180.26,181.27,4223800,181.27\n\
    2014-06-27,179.77,182.46,179.66,181.71,4575500,181.71\n2014-06-26,180.87,181.37,179.27,180.37,3258500,180.37\n\
    2014-06-25,180.25,180.97,180.06,180.72,2762800,180.72\n2014-06-24,181.5,183,180.65,180.88,3875400,180.88\n\
    2014-06-23,181.92,182.25,181,182.14,3231700,182.14\n2014-06-20,182.59,182.67,181.4,181.55,10686800,181.55\n\
    2014-06-19,184.12,184.47,182.36,182.82,3551100,182.82\n2014-06-18,182.04,183.61,181.79,183.6,3931800,183.6\n\
    2014-06-17,181.9,182.81,181.56,182.26,2445400,182.26\n2014-06-16,182.4,182.71,181.24,182.35,3538700,182.35\n\
    2014-06-13,182,183,181.52,182.56,2773600,182.56\n2014-06-12,182.48,182.55,180.91,181.22,4425300,181.22\n\
    2014-06-11,183.61,184.2,182.01,182.25,4061700,182.25\n2014-06-10,186.2,186.22,183.82,184.29,4154900,184.29\n\
    2014-06-09,186.22,187.64,185.96,186.22,2728400,186.22\n```\n\n我在此只显示了包含每日股价文件的前几行。你可以将这些数据保存在文件\
    \ `IBM.csv` 中，并使用以下命令通过 Gnuplot 将其作为股价绘图的数据源：\n\n```\ngnuplot> set xdata time\n\
    gnuplot> set datafile separator \",\"\ngnuplot> set timefmt \"%Y-%m-%d\"\ngnuplot>\
    \ plot 'IBM.csv' using 1:7 title columnhead with lines\n```\n\n> **注意**：运行上述命令时，请确保你位于保存数据文件\
    \ (`IBM.csv`) 的同一目录中。另一种方法是使用文件的完整路径，例如 `\"c:\\\\testdata\\\\IBM.csv\"`（在 Windows\
    \ 平台上需要使用转义路径分隔符）。\n\n第一个命令用于告诉 Gnuplot x 轴的数据是基于时间的。第二个命令定义了文件中使用的分隔符。第三个命令描述了\
    \ csv 文件中存储的日期格式。最后，最后一行告诉 Gnuplot 绘制文件 `IBM.csv` 的内容，使用第 1 列和第 7 列（第 1 列包含日期，而第\
    \ 7 列包含调整后的收盘价），时间序列的标题由 csv 文件每列的列标题定义。\n\n这些命令将生成图 6-3 中显示的图形。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig3_HTML.jpg](img/323908_2_En_6_Fig3_HTML.jpg)\n\
    \n**图 6-3** 使用 Gnuplot 绘制的存储在 csv 文件中的 IBM 股票调整后价格图形\n\n图 6-3 中的图形只是 Gnuplot 所能做的一个示例。实际上，可以使用\
    \ `set` 命令调整数百个参数。在这些选项中，你可以找到三维图形、不同颜色和线型等。\n\n为了解决本节中提出的问题，你需要创建一个类，该类接收一些以双精度数或字符串向量形式存在的数据，并生成适合\
    \ Gnuplot 使用的输出数据。我创建了这样一个类，名为 `GnuplotPlotter`，它负责生成 Gnuplot 所需的文件。\n\n该类的操作取决于对\
    \ x 轴和 y 轴数据的确定。该类使用一个构造函数创建，该构造函数将输出文件名作为参数。要定义将在绘图中使用的数据，请使用 `setData` 成员函数。参数必须分别是\
    \ x 维度和 y 维度的数据向量。以下是该类的摘要：\n\n```\nclass GnuplotPlotter {\npublic:\n    GnuplotPlotter(const\
    \ std::string &fileName);\n    GnuplotPlotter(const GnuplotPlotter &p);\n    ~GnuplotPlotter();\n\
    \    GnuplotPlotter &operator=(const GnuplotPlotter &p);\n    void generateCmds(const\
    \ std::string &cmdFileName);\n    void setHeaders(const std::string &xheader,\
    \ const std::string &yheader);\n    void setData(const std::vector &xdata, const\
    \ std::vector &ydata);\n    void setData(const std::vector &xdata, const std::vector\
    \ &ydata);\n    void csvWrite();\n    // 私有变量在此处。\n};\n```\n\n要访问类的结果，可以使用两个成员函数。`csvWrite`\
    \ 成员函数将把存储在 `GnuplotPlotter` 中的数据以 csv 格式写入构造函数中指定的文件。第二个成员函数是 `generateCmds`，它允许创建一个包含\
    \ Gnuplot 所需指令的命令文件。这样，你就不必担心绘图的确切语法。这些命令存储在由参数 `cmdFileName` 指定的文件名中。\n\n`main`\
    \ 函数中给出了 `GnuplotPlotter` 类的一个示例。首先，你需要定义两个包含所需数据的向量。在本例中，你将使用由 `sin` 函数生成的数据，该函数返回一个数的三角正弦值。请注意，我们这样做只是为了简化数据测试。然而，数据文件可以包含来自任何来源生成的数字。定义内容后，你可以调用成员函数\
    \ `csvWrite` 和 `generateCmds` 来创建 Gnuplot 所需的文件。你可以在图 6-4 中看到此过程的结果。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig4_HTML.jpg](img/323908_2_En_6_Fig4_HTML.jpg)\n\
    \n**图 6-4** 使用 `GnuplotPlotter.cpp` 中创建的测试数据生成的图形\n\n## 完整代码\n"
- fmt: "The code to generate plots and Gnuplot commands has been implemented in the\
    \ class `GnuplotPlotter`. You can add this class to your project and access the\
    \ same member functions to generate data plots (see Listing [6-1](#323908_2_En_6_Chapter.xhtml#PC5)).\n\
    \n```\n//\n//  GnuplotPlotter.h\n#ifndef __FinancialSamples__GnuplotPlotter__\n\
    #define __FinancialSamples__GnuplotPlotter__\n#include \n#include \nclass GnuplotPlotter\
    \ {\npublic:\nGnuplotPlotter(const std::string &fileName);\nGnuplotPlotter(const\
    \ GnuplotPlotter &p);\n~GnuplotPlotter();\nGnuplotPlotter &operator=(const GnuplotPlotter\
    \ &p);\nvoid generateCmds(const std::string &cmdFileName);\nvoid setHeaders(const\
    \ std::string &xheader, const std::string &yheader);\nvoid setData(const std::vector\
    \ &xdata, const std::vector &ydata);\nvoid setData(const std::vector &xdata, const\
    \ std::vector &ydata);\nvoid csvWrite();\nprivate:\nstd::string m_fileName;\n\
    std::string m_xheader;\nstd::string m_yheader;\nstd::vector m_xdata;\nstd::vector\
    \ m_ydata;\nbool m_isDate;\n};\n#endif /* defined(__FinancialSamples__GnuplotPlotter__)\
    \ */\n//\n//  GnuplotPlotter.cpp\n#include \"GnuplotPlotter.h\"\n#include \n#include\
    \ \n#include \n#include \nusing std::ofstream;\nusing std::vector;\nusing std::cout;\n\
    GnuplotPlotter::GnuplotPlotter(const std::string &fileName)\n: m_fileName(fileName),\n\
    m_isDate(false)\n{\n}\nGnuplotPlotter::GnuplotPlotter(const GnuplotPlotter &p)\n\
    : m_fileName(p.m_fileName),\nm_xheader(p.m_xheader),\nm_yheader(p.m_yheader),\n\
    m_xdata(p.m_xdata),\nm_ydata(p.m_ydata),\nm_isDate(p.m_isDate)\n{\n}\nGnuplotPlotter::~GnuplotPlotter()\n\
    {\n}\nGnuplotPlotter &GnuplotPlotter::operator=(const GnuplotPlotter &p)\n{\n\
    if (&p != this)\n{\nm_fileName = p.m_fileName;\nm_xheader = p.m_xheader;\nm_yheader\
    \ = p.m_yheader;\nm_xdata = p.m_xdata;\nm_ydata = p.m_ydata;\nm_isDate = p.m_isDate;\n\
    }\nreturn *this;\n}\nvoid GnuplotPlotter::setData(const std::vector &xdata,\n\
    const std::vector &ydata)\n{\nm_xdata = xdata;\nm_ydata = ydata;\nm_isDate = true;\
    \ // assume that x-axis is a date\n}\nvoid GnuplotPlotter::setData(const std::vector\
    \ &xdata, const std::vector &ydata)\n{\nfor (unsigned i = 0; i  xdata;\nvector\
    \ ydata;\nfor (int i=0; i<100; ++i)\n{\ndouble x = i*10/100.0;\nxdata.push_back(x);\n\
    ydata.push_back(sin(x));\n}\nplotter.setData(xdata, ydata);\nplotter.csvWrite();\n\
    plotter.generateCmds(\"testcmds.gp\");\nreturn 0;\n}\n```\n**Listing 6-1** `GnuplotPlotter.h`\
    \ and `GnuplotPlotter.cpp`\n\n## Running the Code\n\nThe code in Listing [6-1](#323908_2_En_6_Chapter.xhtml#PC5)\
    \ can be compiled using the free `gcc` compiler. The solution was tested on the\
    \ Mac OS X and Windows platforms. You can, for example, create an application\
    \ using the following command:\n\n```\ngcc –o gnuplotter gnuplotplotter.cpp\n\
    ```\n\nThen, you can run the program using the command line:\n\n```\n./gnuplotter\n\
    ```\n\nThis will generate two files, `test.csv` and `testcmds.gp`, which Gnuplot\
    \ will use to generate the desired plot. You can run Gnuplot on UNIX as follows:\n\
    \n```\ncat testcmds.gp | gnuplot\n```\n\nIn the Windows platform, you can load\
    \ the commands file into the Gnuplot application in the following way:\n\n```\n\
    c:>  gnuplot\n>  load \"testcmds.gp\"\n```\n\nThe plot will be displayed in a\
    \ separate window, as shown in Figure [6-4](#323908_2_En_6_Chapter.xhtml#Fig4).\n\
    \n## Plotting Data from a GUI\n\nCreate an application that can plot data using\
    \ the GUI.\n\n### Solution\n\nAlthough it is great to have the ability to create\
    \ charts with external packages such as Gnuplot, sometimes it is necessary to\
    \ have a larger degree of control over the output generated by plots. If you cannot\
    \ find a way to use one of the parameters in Gnuplot to get the desired results,\
    \ it becomes necessary to implement a plotting solution that runs in C++. This\
    \ section shows how to achieve this.\n\nThere are many graphical libraries available\
    \ for C++ developers, and the final decision depends mostly on your target environment.\
    \ However, in this section, I use the Qt library to implement the desired solution.\
    \ Qt is probably the easiest to use graphical programming package around. You\
    \ will see that with just a dozen lines, we are able to create a complete application.\
    \ Moreover, Qt is available for all major operating systems, so that your application\
    \ can be easily ported to other targets as necessary.\n\nThe class used is called\
    \ `QtPlotter`, and it receives data using the `setData` member function, just\
    \ as we did with the `GnuplotPlotter`. The main part of the implementation, however,\
    \ is performed in the `PlotWindow` class, which is derived from `QMainWindow`,\
    \ one of the key classes in the Qt framework. The `PlotWindow` class is responsible\
    \ for managing the window and, most important, painting the plot when necessary.\n\
    \nThe plotting functionality is implemented in the `paintEvent` member function.\
    \ This member function is invoked whenever the window needs to paint itself. First,\
    \ it paints the x and y axis and calculates the size of a unit on each axis, storing\
    \ that information in variables called `unitX` and `unitY`. To draw the axis,\
    \ the `paintEvent` member function uses the painter object, which is provided\
    \ by Qt. The `drawLine` member function is the simplest way to draw line between\
    \ the given coordinates, as shown in the following code:\n\n```\n// define margins\n\
    double marginX = 10;\ndouble marginY = 10;\ndouble lengthX = 500;\ndouble lengthY\
    \ = 400;\n// define axis\nint maxX = lengthX, maxY = lengthY;\npainter.drawLine(marginX,marginY,\
    \ marginX, lengthY+marginY);\npainter.drawLine(marginX,lengthY + marginY, lengthX,\
    \ lengthY + marginY);\n```\n\nIn the next step, the function `paintEvent` draws\
    \ the tick markers along the axis. Finally, the code paints lines between the\
    \ points given as input to the plot.\n\nThe last part of the implementation is\
    \ encapsulated in the `plotWindowRun` member function, which is part of the `QtPlotter`\
    \ class, as follows:\n\n```\nint QtPlotter::plotWindowRun()\n{\nchar *arg = (char\
    \ *)\"plotter\";\nint argc = 1;\nQApplication app(argc, &arg);\napp.setApplicationName(\"\
    Qt Plotter\");\nPlotWindow window;\nwindow.resize(600, 600);\nwindow.show();\n\
    return app.exec();\n}\n```\n\nThis code does most of what is necessary to create\
    \ a Qt application and display a window on the screen. The window created is the\
    \ `PlotWindow` class that we discussed previously, so that the plot is displayed\
    \ as desired. The `QApplication` object is part of the Qt framework. It manages\
    \ the workflow of a graphical application, including menus and windows. When creating\
    \ a `QApplication`, we are able to determine the application name with the `setApplicationName`\
    \ member function. Finally, we resize and show the plot window and call the `exec`\
    \ member function to start the window display loop.\n\nFigure [6-5](#323908_2_En_6_Chapter.xhtml#Fig5)\
    \ shows the results of this code.\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig5_HTML.jpg](images/323908_2_En_6_Chapter/323908_2_En_6_Fig5_HTML.jpg)\n\
    **Figure 6-5** Plot produced by class `QtPlotter`\n\n## Complete Code\n\nThe class\
    \ `QtPlotter`, displayed in Listing [6-2](#323908_2_En_6_Chapter.xhtml#PC12),\
    \ implements the necessary functionality to show a plot in a Qt window, as explained\
    \ in the previous section. To compile this code, you need to install the Qt libraries\
    \ in your system."
