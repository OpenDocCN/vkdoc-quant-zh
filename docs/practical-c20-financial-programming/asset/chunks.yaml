    Listing 13-2\nModified CAP Implementation\n```\n\n## 运行代码\n\n代码清单[13-2](#323908_2_En_13_Chapter.xhtml#PC7)中展示的`ModifiedCAP`类，可以使用任何符合标准的C++编译器进行编译。`main`类依赖于前面介绍的其他类，例如`LPSolver`和`Matrix`。该代码还依赖于GLPK库，你可以按照前一章所述免费下载。将该类构建成可执行文件`ModifiedCap`后，可以运行测试`main`函数，并看到类似于以下代码所示的结果：\n\
