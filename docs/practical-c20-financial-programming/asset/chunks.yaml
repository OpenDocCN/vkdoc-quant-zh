- fmt: "# Using the Ratio Library for Financial Types\n\nWith the help of the `ratio`\
    \ library, it is possible to create a few useful financial types such as a Calmar\
    \ ratio. The Calmar ratio is defined as the annual rate of return of an investment\
    \ divided by its maximum drawdown during the known period. Thus, a `CalmarRatio`\
    \ type can be defined as follows:\n\n```\ntypedef boost::ratio<100, 1> CalmarRatioType;\n\
    ```\n\nFrom now on, `CalmarRatioType` can be used to represent quantities with\
    \ a numerator and denominator at compile time. More interestingly, suppose that\
    \ we want to be able to represent Calmar ratios using percentages as well as percentage\
    \ points (1/100%). The definitions would then become:\n\n```\ntypedef boost::ratio<1,\
    \ 100> CalmarRatioBPS;\ntypedef boost::ratio<1, 1> CalmarRatioPerc;\n```\n\nWith\
    \ these two types, we could create a template-based class to return information\
    \ about the particular ratio, such as the maximum drawdown and the performance\
    \ of the given object. The implementation is as follows:\n\n```\ntemplate <class\
    \ Ratio>\nclass CalmarRatio {\npublic:\n    CalmarRatio(double calmar, double\
    \ ret) : m_calmar(calmar), m_return(ret) {}\n    virtual ~CalmarRatio() {}\n \
    \   double getReturn();\n    double getDrawDown()\n    {\n        return m_return\
    \ / m_calmar * m_ratio.den;\n    }\nprivate:\n    Ratio m_ratio;\n    double m_calmar;\n\
    \    double m_return;\n};\n```\n\nThe class is a template that receives the desired\
    \ ratio type, either `CalmarRatioPerc` or `CalmarRatioBPS`. Of course, other ratio\
    \ types could be supported if needed.\n\nLet’s check the `getDrawDown` member\
    \ function. The standard definition uses the `den` variable to calculate the drawdown\
    \ of the investment. However, different versions of this member function can be\
    \ created using template specializations. The following implementation provides\
    \ an example:\n\n```\ntemplate <>\ndouble CalmarRatio<CalmarRatioBPS>::getDrawDown()\n\
    {\n    return m_return / m_calmar * m_ratio.den * 100;\n}\n```\n\nIn this case,\
    \ since the template is specialized for `CalmarRatioBPS`, the standard drawdown\
    \ is multiplied by 100. This is necessary because the denominator is expressed\
    \ in basis points, instead of percentages.\n\n## Complete Code\n\nListing [5-3](#323908_2_En_5_Chapter.xhtml#PC27)\
    \ presents an implementation for the `CalmarRatio` class. Notice the use of the\
    \ `boost::ratio` template to model different ratio types and how they are used\
    \ by the main class.\n\n```\n// CalmarRatio.h\n//\n#ifndef CALMARRATIO_H_\n#define\
    \ CALMARRATIO_H_\n\n#include <boost/ratio.hpp>\n\ntypedef boost::ratio<100, 1>\
    \ CalmarRatioType;\ntypedef boost::ratio<1, 100> CalmarRatioBPS;\ntypedef boost::ratio<1,\
    \ 1> CalmarRatioPerc;\n\ntemplate <class Ratio>\nclass CalmarRatio {\npublic:\n\
    \    CalmarRatio(double calmar, double ret) : m_calmar(calmar), m_return(ret)\
    \ {}\n    ~CalmarRatio() {}\n    double getReturn()\n    {\n        return m_return;\n\
    \    }\n    double getDrawDown()\n    {\n        return m_return / m_calmar *\
    \ m_ratio.den;\n    }\nprivate:\n    Ratio m_ratio;\n    double m_calmar;\n  \
    \  double m_return;\n};\n\ntemplate <>\ndouble CalmarRatio<CalmarRatioBPS>::getDrawDown()\n\
    {\n    return m_return / m_calmar * m_ratio.den * 100;\n}\n\n#endif /* CALMARRATIO_H_\
    \ */\n\n// CalmarRatio.cpp\n//\n#include \"CalmarRatio.h\"\n#include <iostream>\n\
    \nboost::ratio<1, 2> one_half;\nboost::ratio<1, 3> one_third;\n\nvoid createCalmarRatio()\n\
    {\n    CalmarRatio<CalmarRatioType> ratio(0.15, 11);\n}\n\nvoid printRatios()\n\
    {\n    CalmarRatio<CalmarRatioPerc> ratio(0.110, 3.12);\n    CalmarRatio<CalmarRatioBPS>\
    \ bpsRatio(480, 2.15);\n    std::cout << \"return: \" << bpsRatio.getReturn()\n\
    \              << \" drawdown: \" << bpsRatio.getDrawDown() << std::endl;\n}\n\
    \nListing 5-3\nThe CalmarRatio Class\n```\n\n## Running the Code\n\nWe tested\
    \ the sample application containing the `CalmarRatio` class and its associated\
    \ code in a UNIX system using the `gcc` compiler. You can compile the `.cpp` file\
    \ presented earlier using a build system such as `make`, with its related makefile.\
    \ Or you can just build the application directly with the compiler, using the\
    \ following command line:\n\n```\ngcc -o calmarRatio CalmarRatio.cpp\n```\n\n\
    The resulting executable file can be called from the terminal. It will display\
    \ the result of the Calmar ratios in the following way:\n\n```\nreturn: 3.12 drawdown:\
    \ 28.3636\nreturn: 2.15 drawdown: 44.7917\n```\n\nAs you see, the code treats\
    \ the parameters differently, with results interpreted according to the type of\
    \ Calmar ratio used. The first example uses a `CalmarRatioPerc`, which regards\
    \ the Calmar ratio as applied to a percentage. The second example uses a `CalmarRatioBPS`\
    \ representation, which works with basis points instead of percentages. The results,\
    \ however, are displayed correctly according to their respective return and drawdown.\n\
    \n# Generating Statistical Data\n\nCreate data using statistical distributions\
    \ such as Gaussian (normal distribution) and chi-squared.\n\n## Solution\n\nWhen\
    \ working with trading algorithms, it is frequently useful to test the operation\
    \ of such strategies on artificially generated prices. If we consider that most\
    \ of the short-term movements of the market have a stochastic component, we can\
    \ use random number generators to approximate the values of typical price-related\
    \ time series.\n\nIn this section, we investigate how to generate statistically\
    \ based data that can later be used to test trading strategies. To do this, you\
    \ can use one of the many libraries currently available for the generation of\
    \ statistical values in C++. These libraries operate similarly to random number\
    \ generators, with a few differences. Traditional random number generators are\
    \ used to produce random integer values. Such numbers can be, with some work,\
    \ converted into uniformly distributed random numbers in a given interval, such\
    \ as between 0 and 1.\n\nFor more advanced uses, however, it is interesting to\
    \ generate random numbers from a particular probability distribution. Such probability\
    \ distributions are based on standard random processes and include the Gaussian\
    \ distribution (also known as normal distribution) and the chi-squared distribution\
    \ (a form of skewed normal distribution). See Figure [5-2](#323908_2_En_5_Chapter.xhtml#Fig2).\
    \ These distributions can be used to generate stochastic numbers that are more\
    \ representative of the stock market.\n\n![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig2_HTML.jpg](images/323908_2_En_5_Chapter/323908_2_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2**\nPlots for two probability distribution functions (PDF) available\
    \ in the `boost::math` namespace. The top plot is for a normal distribution with\
    \ parameters 0 and 1. The bottom plot is for the chi-squared distribution with\
    \ parameter 5.\n\nIn this example, I will show you how to use the `boost::math`\
    \ namespace, where you declare a set of objects representing statistical distributions.\
    \ The use of a library for this task makes it possible to concentrate on the design\
    \ of your algorithm, instead of having to re-implement such a common statistic\
    \ utility function, which has already been made available in many programming\
    \ libraries. I also use the `boost::random` library to generate random data points\
    \ based on these distributions."
