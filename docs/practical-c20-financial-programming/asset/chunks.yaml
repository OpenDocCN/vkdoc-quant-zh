    \nFigure 11-1\nSuccessive steps of the Runge-Kutta algorithm for the previous\
    \ example, with N=100\n\n## Solving the Black-Scholes Equation\n\nCreate a C++\
    \ class to solve the Black-Scholes equation using the forward method.\n\nSolution\n\
    \nThe Black-Scholes equation is one of the best-known methods to price derivatives.\
    \ It was developed in the 1970s to provide a better model of European-style options,\
    \ but since then, the basic model has been extended and tested on multiple derivatives\
    \ markets. While the original assumptions of the Black-Scholes equation are not\
    \ exactly respected in the real markets, the model works as an excellent analytical\
    \ tool to price instruments that present volatile behavior as observed in the\
    \ stock market.\n\nRemember that an option is a contract that allows the holder\
    \ to buy (or sell) units of a stock at a particular price in a given time in the\
    \ future. For example, a call option on MSFT at $30 for July of the next year\
    \ gives its owner the right (but not the duty) to buy MSFT for the price of $30\
    \ in July, irrespective of the real price at that date. Therefore, if MSFT stock\
    \ price is significantly higher than $30, this operation will result in a profit.\
    \ At $30 or lower prices, however, this option will result in a loss. Similarly,\
    \ you can do the same analysis for a put, which is the right to sell a stock at\
    \ the given price in the future. A call produces higher profits when the price\
    \ for the underlying asset rises, with a fixed maximum loss. On the other hand,\
    \ a put produces higher profits when prices for the underlying asset decrease,\
    \ also with a fixed maximum loss.\n\nThe Black-Scholes model defines what should\
    \ be the present value of a call option (a similar analysis works for put options).\
    \ It considers the following input values:\n\n*   S: The price of the underlying\
    \ instrument\n*   K: The strike price for the option\n*   T: The remaining time\
    \ for the option contract\n*   V: The current volatility of the underlying asset\n\
    *   r: The current interest rate on deposits\n\nUsing this information, the Black-Scholes\
    \ model concludes that the relationship between the current price of the option\
    \ and the input variables is given by a PDE, as follows:\n\n![$$ \\frac{\\partial\
    \ C\\left(S,t\\right)}{\\partial t}= rS\\frac{\\partial C\\left(S,t\\right)}{\\\
    partial S}+\\frac{V^2{S}^2}{2}\\frac{\\partial^2C\\left(S,t\\right)}{\\partial\
    \ {S}^2}- rC\\left(S,t\\right) $$](images/323908_2_En_11_Chapter/323908_2_En_11_Chapter_TeX_Equn.png)"
