  trans: "\n对于第 N 个位置之后的每个元素，都可以计算其移动平均值。这通过求前 N 个元素的总和并除以 N 来实现。计算得到的值会被追加到移动平均值的向量中。最后，需要更新变量`sum`，以便从总和中移除\
    \ N 元素序列中的第一个元素。当算法减去`m_prices[i-m_numPeriods]`的值时，就会执行此操作，为下一次迭代做准备。\n\n指数移动平均线（EMA）与简单移动平均线不同，因为每个新值都要乘以一个因子。与旧观察值相比，该因子用于赋予新值更大的权重。因此，EMA\
    \ 对观察值的变化更敏感，并且能够更早、更准确地指示新趋势。如果你希望快速发现趋势变化，这便是一个优势。以下是我使用的代码：\n\n```\nstd::vector\
    \ MACalculator::calculateEMA()\n{\nstd::vector ema;\ndouble multiplier = 2.0 /\
    \ (m_numPeriods + 1);\n// 计算移动平均线，以确定对应于给定周期数的第一个元素\nstd::vector ma = calculateMA();\n\
    ema.push_back(ma.front());\n// 对于每个剩余的元素，计算加权平均值\nfor (int i=m_numPeriods+1; i<m_prices.size();\
    \ ++i)\n{\ndouble val = (1-multiplier) * ema.back() + multiplier * m_prices[i];\n\
    ema.push_back(val);\n}\nreturn ema;\n}\n```\n\n计算初始部分与简单移动平均线类似。使用`sum`变量累加值，直到至少观察到\
    \ N 个值。这被用作 EMA 的初始值。不同的 EMA 实现会使用其他方式来初始化序列，但经过几次迭代后，结果会收敛到相同的值。你可以在图 2-2 中看到一个\
    \ EMA 的图形示例。\n\n![../images/323908_2_En_2_Chapter/323908_2_En_2_Fig2_HTML.jpg](img/323908_2_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2\n\n参数为 20 天的指数移动平均线\n\nEMA 计算的主要步骤是添加由乘数加权的新值。EMA 计算的默认乘数 *r* 由下式给出\n\n\
    ![$$ \\rho =\\frac{2}{N+1} $$](img/323908_2_En_2_Chapter_TeX_Equa.png)\n\n该乘数赋予新值更大的权重，从而使\
    \ EMA 对价格变化的反应比简单移动平均线更灵敏。\n\n## 完整代码\n\n在代码清单 2-1 中，你可以看到简单移动平均线和 EMA 的完整实现。我还展示了一个示例`main`函数，它负责从标准输入读取一些数据点并计算相应的移动平均线。\n\
