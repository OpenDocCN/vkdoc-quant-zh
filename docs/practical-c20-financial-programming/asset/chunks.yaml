    \ 找到了一个目标值为 756 的解。\n\n## 求解二维投资问题\n\n在本节中，我们使用线性规划技术来建模并求解一个涉及两种已知回报投资的金融产品分配决策问题。\n\
    \n### 解决方案\n\n优化技术的主要用途之一是支持投资决策。在这方面，可以根据投资类别的已知属性来优化多个概念。对于少数几种投资类型，例如债券，更容易确定投资的回报率，以及该投资类别风险的一些基本信息。这些知识可以转化为更精确的模型，特别是那些可用于优化投资者利润的模型。\n\
    \n本节介绍一个非常简单的、使用线性规划建模的决策支持系统版本。该问题展示了用于求解线性规划问题（即使是最复杂的问题）的基本几何过程。\n\n考虑一家大型银行将两种新的金融产品推向市场的过程。这一过程通常由这些投资所需资源的一系列实际约束条件来定义。假设该银行希望向市场增加两类新产品：新的基于债券的产品和新的抵押贷款支持衍生品产品。问题是在这些新产品的开发上应投入多少小时。我们将这两个变量称为\
    \ `x` 和 `y`。由于银行部门根据在这些任务上花费的小时数从客户那里获得报酬，因此目标是最大化每小时获得的报酬。对于债券，该项活动每小时的收费为 5.3K\
    \ 美元，而衍生品的收费为 7.1K 美元。\n\n在约束条件方面，银行部门必须考虑研发支出成本。从事债券工作的成本是负的，因为其成本可以被该领域的其他活动所抵消。对于衍生品，则需考虑全部研发成本。这些金融产品的最大营销支出也按工作小时数进行分摊。因此，它取决于\
    \ `x` 和 `y` 的值。已知债券相关产品的工作小时数有一个 3K 美元的常数项，而衍生品工作的乘数为 1K 美元。\n\n最后，这两项任务可用的总人力资源是有限的。虽然只有六个单位的人力资源分配给这些任务，但每小时的债券相关工作对人力资源的需求是衍生品的八倍。还要注意，本例中的两个变量显然是非负的。\n\
    \n这些假设的结果可以很容易地转化为以下线性规划模型，该模型试图最大化该投资银行所考虑部门的预期回报（利润）。\n\n*   `max 5.3*x* + 7.1*y*`\
    \ (最大化部门收益)\n*   `–2.1*x* + *y* ≤ 3.4` (最大研发支出)\n*   `3.1*x* + *y* ≤ 4.3` (最大营销支出)\n\
    *   `7.9*x* + *y* ≤ 6` (所需的最大员工人数)\n*   `*x*, *y* ≥ 0` (工作时间始终为正)\n\n前面描述的模型只有两个未知数，`x`\
    \ 和 `y`，因此可以很容易地绘制出来，如图 12-1 所示。作为一个不等式，每个约束条件都产生一个由等式线定义的半空间。例如，`3*x* + *y* ≤\
    \ 4` 是由直线 `3*x* + *y* = 4` 下方所有点定义的半空间。\n\n![../images/323908_2_En_12_Chapter/323908_2_En_12_Fig1_HTML.jpg](img/323908_2_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1：由前面所示不等式定义的线性规划问题可行域\n"
- fmt: "To find a solution for a two-dimensional LP model like the one described previously,\
    \ you can concentrate on the intersections of all half-spaces defined by the constraints.\
    \ The intersection is, by definition of the problem, contained in the first quadrant\
    \ of the plot because it is known that `x ≥ 0` and `y ≥ 0`. It is possible then\
    \ to recognize the area contained in the intersection of all other half-spaces.\
    \ The result is a polygonal area, whose border is defined by a set of lines derived\
    \ from the given constraints.\n\nTo find a solution for such an LP, you just need\
    \ to calculate the value of the objective function at each of the corners of the\
    \ area defined by the constraints. The corner that gives the best value of the\
    \ objective function is, by definition of the linear objective function, the best\
    \ that can be found for the problem.\n\nWhile the process described previously\
    \ is easy to perform for two-dimensional problems, it becomes quite difficult\
    \ to accomplish for higher dimensions. As the number of dimensions and constraints\
    \ increases, the number of corners grows exponentially. It takes a more sophisticated\
    \ algorithm (such as the simplex algorithm) to find the best corner of the multidimensional\
    \ space that defines the optimum solution for the given LP.\n\nTo demonstrate\
    \ how the problem is solved in practice, I show you the C++ implementation of\
    \ the proposed two-dimensional LP. The class, called `TwoDimensionalLPSolver`,\
    \ is a blueprint of how such a problem can be implemented using the `LPSolver`\
    \ described in the previous section.\n\nFirst, you need to create the model, which\
    \ is described using a matrix `A`, a vector `b` (the right-hand side of the constraints),\
    \ and a vector `c` (the cost vector). The necessary data is provided in the `main`\
    \ function. Once the data is available, it can be used to create an object of\
    \ class `LPSolver`. The `solve()` function in the `LPSolver` class will then perform\
    \ any necessary data conversion and call the GLPK library to find the optimum\
    \ solution.\n\n## Complete Code\n\nListing [12-2](#323908_2_En_12_Chapter.xhtml#PC6)\
    \ gives the complete implementation for the two-dimensional LP solver. Function\
    \ `main()` presents a sample use of the class `TwoDimensionalLPSolver`.\n\n```\n\
    //\n//  TwoDimensionalLPSolver.h\n#ifndef __FinancialSamples__TwoDimensionalLPSolver__\n\
    #define __FinancialSamples__TwoDimensionalLPSolver__\n#include \nclass TwoDimensionalLPSolver\
    \ {\npublic:\nusing Vector = std::vector;\nTwoDimensionalLPSolver(const Vector\
    \ &c, const Vector &A1, const Vector &A2, const Vector &b);\nTwoDimensionalLPSolver(const\
    \ TwoDimensionalLPSolver &p);\n~TwoDimensionalLPSolver();\nTwoDimensionalLPSolver\
    \ &operator=(const TwoDimensionalLPSolver &p);\nbool solveProblem(Vector &results,\
    \ double &objVal);\nprivate:\nstd::vector m_c;\nstd::vector m_A1;\nstd::vector\
    \ m_A2;\nstd::vector m_b;\n};\n#endif /* defined(__FinancialSamples__TwoDimensionalLPSolver__)\
    \ */\n//\n//  TwoDimensionalLPSolver.cpp\n#include \"TwoDimensionalLPSolver.h\"\
    \n#include \"Matrix.h\"\n#include \"LPSolver.h\"\n#include \nusing std::vector;\n\
    using std::cout;\nusing std::endl;\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
    \ Vector &c, const Vector &A1,\nconst Vector &A2, const Vector &b)\n: m_c(c),\n\
    m_A1(A1),\nm_A2(A2),\nm_b(b)\n{\n}\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
    \ TwoDimensionalLPSolver &p)\n: m_c(p.m_c),\nm_A1(p.m_A1),\nm_A2(p.m_A2),\nm_b(p.m_b)\n\
    {\n}\nTwoDimensionalLPSolver::~TwoDimensionalLPSolver()\n{\n}\nTwoDimensionalLPSolver\
    \ &TwoDimensionalLPSolver::operator=(const TwoDimensionalLPSolver &p)\n{\nif (this\
    \ != &p)\n{\nm_c = p.m_c;\nm_A1 = p.m_A1;\nm_A2 = p.m_A2;\nm_b = p.m_b;\n}\nreturn\
    \ *this;\n}\nbool TwoDimensionalLPSolver::solveProblem(Vector &res, double &objVal)\n\
    {\nint size = m_b.size();\nMatrix A(size, 2);\nfor (int j=0; j A1 = { -2.1, 3.1,\
    \ 7.9};\nvector A2 = { 1, 1, 1 };\nvector c = { 5.3, 7.1 };\nvector b = { 3.4,\
    \ 4.3, 6 };\nTwoDimensionalLPSolver solver(c, A1, A2, b);\nvector results;\ndouble\
    \ objVal;\nsolver.solveProblem(results, objVal);\ncout << \"objVal : \" << objVal\
    \ << endl;\nfor (int i=0; i<results.size(); ++i)\n{\ncout << \" x\" << i << \"\
    : \" << results[i];\n}\ncout << endl;\nreturn 0;\n}\nListing 12-2\nHeader File\
    \ and Implementation for the Class TwoDimensionalLPSolver\n```\n\n## Running the\
    \ Code\n\nYou can compile and run the provided code with your preferred standards-compliant\
    \ compiler. I tested the code using gcc and GLPK optimizer version 4.54. The results\
    \ are as follows:\n\n```\n./twoDimSolver\nGLPK Simplex Optimizer, v4.54\n3 rows,\
    \ 2 columns, 6 non-zeros\n*     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n\
    *     2: obj = 2.763788462e+01 infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\n\
    objVal : 27.6379\nx0: 0.173077 x1: 3.76346\nProgram ended with exit code: 0\n\
    ```\n\nFrom the output listed in the example, you can see that the optimal solution\
