    \ 和 22%。\n\n## 结论\n\n投资组合优化是投资组合经理常用的一种工具，旨在根据客户的目标帮助确定合适的资本配置。因此，对于金融领域的 C++\
    \ 程序员来说，能够为这类投资组合优化问题设计高效的解决方案至关重要。在本章中，您学习了几种数学规划模型，这些模型已被金融机构成功用于创建和管理投资组合，以及其他金融配置问题。在第一部分，您了解了混合整数规划（MIP）如何用于建模某些金融配置问题。您也了解了\
    \ MIP 与 LP 模型之间的一些差异，以及如何借助 `MIPSolver` 类来求解它们。在接下来的部分，重点转向了 CAP 模型，其主要目标是确定投资组合中每项投资所需持有的百分比，以便在实现期望结果的同时，最小化投资相关的波动性。您已经看到，尽管这是一个二次规划问题，但通过对数学公式进行线性化处理，仍有可能获得良好的结果。我们使用\
    \ `AlternativeCAP` 类在 C++ 中提出并实现了一种替代公式。最后，我讨论了基本模型的一些扩展，以及如何结合所需投资组合的含义来理解优化结果。这些对基本\
    \ CAP 模型的扩展很常见，有助于开发受实际资产配置约束的投资组合。\n\n在下一章中，您将了解金融工程中的另一项关键技术：蒙特卡洛模拟方法。您将看到一些\
    \ C++ 示例，展示如何快速实现这些技术，以及如何解释这些方法得出的结果。\n\n# 14. 蒙特卡洛方法\n\n在众多针对股票市场的编程技术中，蒙特卡洛模拟因其广泛的适用性和相较于精确的非随机方法更容易实现而占据特殊地位。这些算法可用于许多应用，例如价格预测和某些购买策略的验证。\n\
    \n在本章中，我们提供的 C++ 代码既可直接使用，也可作为基于模拟的算法的一部分。这些示例将介绍随机方法开发中用到的一些最重要概念。以下是本章讨论主题的快速总结：\n\
    \n- **计算定积分：** 随机采样是一种强大的方式，可以用最少的计算量来计算复杂函数。您将看到如何使用随机技术来确定定积分。\n- **价格预测：**\
    \ 作为一种模拟随机价格波动的常用技术，蒙特卡洛方法经常被用作价格预测的方法。重复模拟过程的能力是该方法的一个关键特征。\n- **计算期权价格：** 在其他期权定价预测方法中，蒙特卡洛技术因其简便性而被广泛使用。与其他数学方法不同，模拟可以快速编写代码，并且在期权价格预测方面，其性能通常与精确技术相当。\n\
    \n## 基于蒙特卡洛的积分计算\n\n创建一个类，使用蒙特卡洛策略来估算一个通用函数的积分。\n"
- fmt: "# Solution\n\nThe main concept of Monte Carlo methods is to use a random process\
    \ to find solutions for a complex problem. While a random solution may not be\
    \ useful for the problem at hand, it has the important property that it can be\
    \ repeated with different results. The information that you can gather by looking\
    \ at a large number of such Monte Carlo results is the secret of such techniques.\n\
    \nA classic example of using Monte Carlo methods is determining the area defined\
    \ by a curve with random sampling. For example, to find the area of a circle,\
    \ you can draw several random points and check if they are part of the circle.\
    \ The area is then determined by the percentage of points inside the circle. As\
    \ the number of points increase, you will get better approximations for the required\
    \ area.\n\nAn extension of the general idea described previously is the basis\
    \ for a Monte Carlo strategy for integration. The advantage of using such Monte\
    \ Carlo methods to integrate functions is that you just need to generate random\
    \ points in the given range. The simplicity of the strategy makes it possible\
    \ to estimate the integral of very complicated functions with a minimum of code.\n\
    \nYou can see an implementation of this method in the `MonteCarloIntegration`\
    \ class. The structure of the class is similar to the examples you saw in Chapter\
    \ [10](#323908_2_En_10_Chapter.xhtml), which covers integration. However, the\
    \ algorithm used involves the generation of random samples, in order to determine\
    \ the percentage of area under the given function.\n\nTo generate uniformly distributed\
    \ random numbers, we use the `uniform_real_distribution` class, part of `boost::random`.\
    \ This simplifies the generation of samples, avoiding numerical accuracy issues\
    \ that are common when using other sources of random numbers.\n\nThe main part\
    \ of the implementation can be viewed in the `getIntegral` member function.\n\n\
    ```\ndouble MonteCarloIntegration::getIntegral(double a, double b)\n```\n\nThe\
    \ code initially determines the maximum and minimum values observed. It uses these\
    \ numbers to define the total area of sampling. Then, the function generates random\
    \ numbers and checks if they are inside the curve defined by the function or outside\
    \ it. At the end, the percentage calculated with this procedure is used to compute\
    \ the total area of the integral. This process is repeated for the positive and\
    \ negative parts of the given mathematical function, using the member function\
    \ `integrateRegion`. The total value of the integral is then calculated as the\
    \ positive minus the negative area.\n\n## Complete Code\n\nYou will find the complete\
    \ code to integrate a function using the Monte Carlo methods in Listing [14-1](#323908_2_En_14_Chapter.xhtml#PC2).\
    \ The code is divided into a header and an implementation file. A sample `main`\
    \ function is included to show how the class `MonteCarloIntegration` can be used.\n\
    \n```\n//\n// MonteCarloIntegration.h\n#ifndef __FinancialSamples__MONTECARLOINTEGRATION_H_\n\
    #define __FinancialSamples__MONTECARLOINTEGRATION_H_\ntemplate \nclass MathFunction;\n\
    class MonteCarloIntegration {\npublic:\nMonteCarloIntegration(MathFunction &f);\n\
    MonteCarloIntegration(MathFunction &f, int num_samples);\nMonteCarloIntegration(const\
    \ MonteCarloIntegration &p);\n~MonteCarloIntegration();\nMonteCarloIntegration\
    \ &operator=(const MonteCarloIntegration &p);\nvoid setNumSamples(int n);\ndouble\
    \ getIntegral(double a, double b);\ndouble integrateRegion(double a, double b,\
    \ double min, double max);\nprivate:\nMathFunction &m_f;\nint m_numSamples;\n\
    };\n#endif /* MONTECARLOINTEGRATION_H_ */\n//\n// MonteCarloIntegration.cpp\n\
    #include \"MonteCarloIntegration.h\"\n#include \n#include \n#include \n#include\
    \ \"MathFunction.h\"\n#include \nstatic std::default_random_engine random_generator;\n\
    using std::cout;\nusing std::endl;\nnamespace {\nconst int DEFAULT_NUM_SAMPLES\
    \ = 1000;\n}\nMonteCarloIntegration::MonteCarloIntegration(MathFunction& f)\n\
    : m_f(f),\nm_numSamples(DEFAULT_NUM_SAMPLES)\n{\n}\nMonteCarloIntegration::MonteCarloIntegration(MathFunction&\
    \ f, int num_samples)\n: m_f(f),\nm_numSamples(num_samples)\n{\n}\nMonteCarloIntegration::MonteCarloIntegration(const\
    \ MonteCarloIntegration& p)\n: m_f(p.m_f),\nm_numSamples(p.m_numSamples)\n{\n\
    }\nMonteCarloIntegration::~MonteCarloIntegration()\n{\n}\nMonteCarloIntegration&\
    \ MonteCarloIntegration::operator =(const MonteCarloIntegration& p)\n{\nif (this\
    \ != &p)\n{\nm_f = p.m_f;\nm_numSamples = p.m_numSamples;\n}\nreturn *this;\n\
    }\nvoid MonteCarloIntegration::setNumSamples(int n)\n{\nm_numSamples = n;\n}\n\
    double MonteCarloIntegration::integrateRegion(double a, double b, double min,\
    \ double max)\n{\nstd::uniform_real_distribution xDistrib(a, b);\nstd::uniform_real_distribution\
    \ yDistrib(min, max);\nint pointsIn = 0;\nint pointsOut = 0;\nbool positive =\
    \ max > 0;\nfor (int i = 0; i  0)\n{\npercentageArea = pointsIn / double(pointsIn\
    \ + pointsOut);\n}\nif (percentageArea > 0)\n{\nreturn (b-a) * (max-min) * percentageArea;\n\
    }\nreturn 0;\n}\ndouble MonteCarloIntegration::getIntegral(double a, double b)\n\
    {\nstd::uniform_real_distribution distrib(a, b);\ndouble max = 0;\ndouble min\
    \ = 0;\nfor (int i = 0; i  max)\n{\nmax = y;\n}\nif (y  0 ? integrateRegion(a,\
    \ b, 0, max) : 0;\ndouble negativeIntg = min \n{\npublic:\n~FSin();\ndouble operator()(double\
    \ x);\n};\nFSin::~FSin()\n{\n}\ndouble FSin::operator()(double x)\n{\nreturn sin(x);\n\
    }\n}\nint main()\n{\ncout << \"starting\" << endl;\nFSin f;\nMonteCarloIntegration\
    \ mci(f);\ndouble integral = mci.getIntegral(0.5, 4.9);\ncout << \" the integral\
    \ of the function is \" << integral << endl;\nmci.setNumSamples(200000);\nintegral\
    \ = mci.getIntegral(0.5, 4.9);\ncout << \" the integral of the function with 20000\
    \ intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n**Listing 14-1**\
    \ Monte Carlo Integration Method\n\n## Running the Code\n\nYou can compile the\
    \ files presented in Listing [14-1](#323908_2_En_14_Chapter.xhtml#PC2) using `gcc`\
    \ or any other standards-compliant C++ compiler. The result for the sample code\
    \ in the `main` function is the following, assuming that you named the executable\
    \ as `monteCarloIntegration`:\n\n```\n$ ./monteCarloIntegration\nthe integral\
    \ of the function is 1.74\nthe integral of the function with 20000 intervals is\
    \ 1.6702\n```\n\nNotice that this can change depending on the random source used\
    \ by the implementation. However, the values should approach the correct value\
    \ as the number of samples used by the Monte Carlo method increase.\n\n## Simulating\
    \ Asset Prices\n\nCreate a C++ class to mimic the price fluctuations of equities\
    \ in the stock market using a random walk simulation process."
