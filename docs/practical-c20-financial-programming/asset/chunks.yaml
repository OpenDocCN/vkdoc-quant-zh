    \ the result for stocks that display inverse correlation: when the price of the\
    \ first instrument increases, the price of the second one decreases.\n\n```\n\
    $ ./correlation\n1 10\n2 9\n3 8\n4 7\n5 6\n6 5\n7 4\n\navg is 4\navg is 7\navg\
