    \n## 结论\n\n蒙特卡洛方法是一种通用的解决问题方法，它利用随机化来计算那些原本很难精确求解的结果。由于金融市场固有的随机性，蒙特卡洛方法成为金融工程师和软件开发人员手中的重要工具。\n\
    \n在本章中，你已经看到，这种模拟技术可以用于快速求解金融领域中的各种问题。例如，使用蒙特卡洛模拟的一种常见方式是预测由价格变化决定的可能经济情景。虽然这对传统的数学方法来说是一项艰巨的任务，但人们可以轻松设计出诸如随机游走之类的高效算法。这类算法仅利用基于历史行为的少数输入参数，就能提供预测价格的能力。\n\
    \n在第一个编码示例（清单 14-1）中，我们使用蒙特卡洛技术计算了一个一般函数的定积分。尽管存在确定性数值算法可以高效地解决此问题，但该示例展示了蒙特卡洛方法的基本特征，以及如何解释和改进其结果。\n\
    \n在清单 14-2 中，你了解了如何创建一个非常简单的随机游走，这是使用蒙特卡洛方法进行价格模拟的基本工具之一。你看到了如何实现一种价格变化均匀分布的随机游走版本。你还了解了一些标准方法的常见变体，这些变体在应用中经常被使用。\n\
    \n接下来，你学习了如何使用蒙特卡洛方法计算期权的盈利概率。清单 14-3 中的 C++ 类展示了一种易于实现的方案，可用于分析期权及其可能的盈利情景。你已经看到，利用模拟和对价格变化的一些假设，可以轻松确定某只股票在若干天内处于特定价格区间的概率。\n\
    \n本章完成了对金融软件中使用的主要数学工具的讨论。在下一章中，你将开始探索可用于支持创建和维护此类金融应用程序的额外编程技术。你将看到许多示例，展示如何将现有的\
    \ C++ 代码与其他流行的脚本语言（例如 Python 和 Lua）集成。\n\n# 15. 扩展金融库\n\nC++ 是一种富有表现力的语言，可用于开发一些最复杂的软件，包括银行和其他金融机构中常使用的高性能应用程序。然而，有时使用解释型语言来组合和扩展\
    \ C++ 库是有益的，这可以简化原型和其他非关键应用程序的创建。许多此类解释型语言被用于连接预编译库。其中，Python 和 Lua 是金融行业中最常用的解释型语言之一。\n\
    \n在本章中，我将展示如何使用流行的脚本和扩展语言（如 Lua 和 Python）与 C++ 库交互。接下来几节中讨论的解决方案和算法，允许你在用其他语言开发的应用程序中重用前面章节中介绍的许多\
    \ C++ 组件。在某些情况下，你还可以在自己的 C++ 应用程序中使用从外部语言创建的代码。\n\n以下是本章讨论的一些主题：\n\n*   **用 Python\
    \ 扩展 C++**：Python 语言为开发服务器端应用程序提供了出色的特性。如果你想将 C++ 库用作其他服务的一部分，Python 可能是集成不同库的最佳方式。\n"
- fmt: '# Extending C++ with Lua


    Lua is a relatively new language that is outstanding in its simple implementation
    of dynamic features. It is also used as an extension language that can be embedded
    into your own larger C++ applications.


    # Exporting C++ Stock Handling Code to Python


    Generate code that provides the ability to export to Python a C++ stock handling
    class.


    ## Solution


    Python is a popular language that has been used in several domains, including
    web applications, scientific data exploration, and finance. One of the greatest
    strengths of Python is its ability to cleanly bring together large collections
    of programming libraries. A very important reason for that interoperability is
    the simple mechanism used by Python to interface with different languages, especially
    C and C++.


    In this section, you will learn about the extension mechanism of Python and how
    it can be accessed from your C++ code. I have provided a financial example for
    this process, where you will give access to a `Stock` class originally designed
    and implemented in C++.


    Python is available as open source on most operating systems. The main website
    where you can find the source code and binaries for most operating systems is
    [`http://python.org`](http://python.org). You will also find Python pre-installed
    on many UNIX-like operating systems, such as Linux and Mac OS X. The main mechanism
    for library extension in Python is the module. A module is used to export data
    and code to Python source files or other modules. The keyword `import` can be
    used to load an existing module into memory. For example:


    ```

    import sys

    ```


    This is a command used to load the `sys` module, which gives access to system-dependent
    functions. While modules can be created in Python itself, as C++ programmers our
    main interest is in creating modules using C++. This is possible with the Python
    module creating API (application programming interface), which is available for
    C and C++ and included with most Python installations.


    Since the extension mechanism is written in C (for compatibility with existing
    C libraries for Python), it is necessary to create a number of C functions that
    encapsulate your original C++ classes in order to achieve interoperability with
    the Python environment.


    As an example of how this process works, consider the `Stock` class, which can
    be used to model a single stock. Listing [15-1](#323908_2_En_15_Chapter.xhtml#PC2)
    shows the public interface for this class.


    ```

    class Stock {

    public:

    Stock(const std::string &ticker, double price, double div);

    Stock(const Stock &p);

    ~Stock();

    Stock &operator=(const Stock &p);

    std::string ticker();

    double price();

    void setPrice(double price);

    double dividend();

    void setDividend(double div);

    double dividendYield();

    }

    Listing 15-1

    Interface for Stock Class

    ```


    The extension API for Python is a set of header files and libraries that expose
    the Python environment to other applications written in C or C++. To export a
    class such as `Stock` to Python using the extension API, we need to create a few
    functions that will receive and return the requests sent by the Python interpreter.
    This is done in the `Stock_Py.cpp` file, which contains a list of functions that
    deal with each member of the `Stock` class.


    The first function of interest is the `stock_create` function, which is defined
    in the following way:


    ```

    PyObject *stock_create(PyObject *self, PyObject *args)

    ```


    It is common for functions called directly from Python to have a signature where
    two Python objects are received and a Python object is returned. The first argument
    to such a function is the Python object that is the target of the call (similar
    to the `this` pointer in C++) whenever the call is made using the syntax `object.function()`.
    The second parameter is a Python list that stores all the arguments passed to
    the function.


    The first thing this function does is to retrieve the parameters passed as arguments.
    This can be done in the Python API by calling the function `PyArg_ParseTuple`,
    which is responsible for checking the arguments and copying their values into
    data objects. The first parameter of this function is the object representing
    the list of arguments. The second parameter is a string that defines the types
    of each data element in the argument list. Finally, the remaining arguments are
    pointers to the locations where the data should be stored.


    ```

    if (!PyArg_ParseTuple(args, "sdd", &ticker, &price, &dividend))

    return NULL;

    ```


    If this function is not successful, it will return false, which causes the `stock_create`
    to return `NULL`. Returning `NULL` indicates to the interpreter that the called
    function failed for some reason.


    Once the input data has been validated, the next step is to create an object of
    class `Stock` and initialize it properly. The result is stored in a Python capsule
    object that is created with the function `PyCapsule_New`. This function call takes
    as the last parameter the name of a destructor function, which in this case is
    just `stock_destructor`, a function that calls the destructor for the `Stock`
    object. After the Python capsule has been created, the new Python object is then
    returned as the result of the function.


    For an example of a function that just returns a single data object, consider
    `stock_ticker`, the function that gives access to the `Stock::ticker()` member
    function:


    ```

    PyObject *stock_ticker(PyObject *self, PyObject *args)

    {

    PyObject *obj;

    if (!PyArg_ParseTuple(args, "O!", &PyCapsule_Type, &obj))

    return NULL;

    Stock *stock = getStock(obj);

    return Py_BuildValue("s", stock->ticker().c_str());

    }

    ```


    In this function, the first step is to validate the input arguments, which uses
    the `PyArg_ParseTuple` function. The `PyArg_ParseTuple` function receives as arguments
    the container of the data and a string that determines the type of each argument,
    followed by pointers to variables where the data will be stored. The object to
    be retrieved in this case is of type `PyCapsule`, as defined in the remaining
    arguments (which give the object type and a pointer to an object variable). Once
    the argument is retrieved, you can use the `getStock` function to fetch the `Stock`
    pointer. Finally, the `ticker()` member function is called. To return the data
    to the Python interpreter, you need to convert the result into a Python object.
    This is done with the `Py_BuildValue` function, which uses a format string to
    determine the type of its remaining argument. Other functions are similar, and
    their main work is to retrieve data from the argument list and to convert the
    results into Python objects.


    Note


    Even if a function that is exposed to Python returns no result, you’re still required
    to return a valid Python object. In that case, you can use `Py_None`, which represents
    a standard Python object that means “no data.”


    Finally, we have the `initstock` function. It calls the `Py_InitModule` function
    from the Python API to determine the functions exposed in this module. The `Py_InitModule`
    function receives as parameters the name of the module and an array that contains
    a list of all functions (called `stockMethods`), their names, and descriptions.
    When this information is passed to the Python interpreter, it becomes available
    to Python developers whenever the `stock` module is imported.


    ## Complete Code


    Listing [15-2](#323908_2_En_15_Chapter.xhtml#PC6) shows the complete code for
    the `Stock` class and its associated Python glue code.'
