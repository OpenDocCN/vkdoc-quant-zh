    \ –lQtGui -lQtCore\n```\n\n## 结论\n\n在本章中，你学习了几种使用 C++ 绘制金融数据的技术。可视化是在制定高效投资策略时不容忽视的因素之一。你的可视化工具越强大，就越容易发现市场中的趋势和机会。尽管有许多免费和商业化的替代方案来显示股票图表，但我们经常需要以更灵活的方式呈现数据。\n\
    \n本章开头，我介绍了一种使用 Gnuplot 创建数值图的方法。Gnuplot 是一个免费且广泛使用的数据可视化软件包，可在大多数操作系统上运行，包括 Windows、Mac\
    \ OS X 和 UNIX。你已经了解了如何创建一个封装了在 Gnuplot 中创建图形所需信息的类。\n\n下一节为你提供了另一种创建金融图表的方法，即使用一个名为\
    \ Qt 的 C++ 图形库。你可以利用底层框架的高度可移植性，在多个平台上使用此类代码。这里介绍的 `QtPlotter` 类提供一个接口，你的程序可以使用该接口，基于\
    \ x 轴和 y 轴的值来显示单个图表。\n\n金融领域的许多算法都依赖于方程组的求解，而这些方程组又基于线性代数的概念。对于金融行业的开发者来说，掌握线性代数的基础知识及其软件实现是非常有用的。这些概念可以被视为金融工程师所使用的构建模块，并且可以在\
    \ C++ 中轻松访问。在下一章中，你将看到一些作为金融应用一部分、运用线性代数概念的编程示例。\n\n## 7. 线性代数\n\n线性代数是一套基础的数学工具，广泛应用于科学和工程的许多领域。因此，线性代数（LA）技术也在金融编程实践中扮演着重要角色，并经常用于金融工程领域。基于\
    \ LA 的技术常用于开发交易策略。\n\n作为 C++ 程序员，理解如何将传统的线性代数方法集成到金融应用中至关重要。为了实现这一目标，我提供了一些示例，展示如何将一些最常用的\
    \ LA 算法与其他 C++ 库结合使用。在本章中，你还会学习如何将现有的 LA 库集成到你的代码中，特别关注 boost 库中包含的 uBLAS 库。\n\
    \n以下是本章涉及的一些主题：\n\n- **线性代数的基本运算**：你将在代码中学习如何使用线性代数的基础函数。\n- **BLAS（基础线性代数子程序）库概述**：BLAS\
    \ 是一套著名的函数集，如今已成为 LA 实现的标准。你将了解 BLAS 支持的三个级别及其功能。\n- **uBLAS**：BLAS 是一个基于函数的库，已被用于\
    \ Fortran 和 C 等语言中。为了运用现代 C++ 的高级概念，boost 项目创建了一个新的实现。你将了解 uBLAS 库如何实现与 BLAS 相同的概念。\n\
    - **计算行列式**：在分析一组线性方程时，计算矩阵的行列式是最常见的任务之一。你将学习如何使用 uBLAS 执行此类 LA 计算。\n- **标准类型与\
    \ uBLAS 类型之间的转换**：你将看到如何将 `std::vector` 等标准类型转换为更适合 LA 计算的类型。\n\n## 使用基本线性代数运算\n\
    \n创建一个执行基本 LA 运算（如向量积和标量积）的类。"
- fmt: "# Solution\n\nLinear algebra has been used to solve a large number of engineering\
    \ and scientific problems. As such, these concepts are frequently employed as\
    \ part of financial applications. The basic level of computational linear algebra\
    \ deals with scalars and vectors and with the operations allowed on these mathematical\
    \ entities.\n\nA scalar is a quantity that is composed of a single measurement.\
    \ Normally, it doesn’t require the creation of a separate class, since it can\
    \ be easily represented as an integer, a floating point, or a double number. Such\
    \ quantities are also usually stored as a single element. Scalar numbers enjoy\
    \ the associated traditional properties such as addition, subtraction, multiplication,\
    \ and division.\n\nThe use of scalars needs no special treatment in C++ implementations,\
    \ although certain classes may treat scalar parameters as a template argument,\
    \ so that you can later work with different types. For example, the following\
    \ is common in numeric libraries:\n\n```cpp\ntemplate <class Scalar>\nclass MyNumericClass\
    \ {\n    void aFunction(Scalar parameter);\npublic:\n    Scalar m_internalVar;\n\
    };\n```\n\nIn this case, the `Scalar` type acts as a placeholder for one of the\
    \ types supported by C++, such as `int`, `float`, or `long double`. In this way,\
    \ you can easily parameterize the numeric class according to the actual type needed\
    \ for the computation and avoid the unnecessary cast between numeric types, which\
    \ can introduce unexpected errors to the computation.\n\nThe next level of LA\
    \ operations includes the combination of vectors, using vector addition, vector\
    \ product, and scalar multiplication. Initially, you may think about employing\
    \ `std::vector` to perform such operations; however, `std::vector` is a general-purpose\
    \ container that is not tuned for mathematical processing.\n\nThe traditional\
    \ solution for LA implementation is using the BLAS (basic linear algebra subprograms)\
    \ library. BLAS is a popular package that was originally implemented in Fortran\
    \ but has since become the standard for LA computation even for other languages.\
    \ The C-language version was created with the use of the `f2c` converter from\
    \ Fortran. Since many LA packages came to rely on the functionality provided by\
    \ BLAS, other libraries have been created to emulate it whenever necessary.\n\n\
    In this section, I introduce a C++ library that implements much of the functionality\
    \ of BLAS. The uBLAS library is part of Boost and can be accessed by including\
    \ one of the header files such as `<boost/numeric/ublas/vector.hpp>`.\n\nBLAS\
    \ and similar libraries are organized according to support levels, ranging from\
    \ 1 to 3. The BLAS support levels include the following:\n\n* **Level 1**: Support\
    \ for operations using scalar numbers and vectors. At this level, the library\
    \ offers support for numeric vectors in one dimension, with common operations\
    \ such as scalar multiplication and vector product.\n* **Level 2**: At the second\
    \ level, BLAS-compatible libraries provide functions to perform computations involving\
    \ vectors and matrices—for example, the common multiplication of a vector `v`\
    \ by a matrix `A`, which can be performed (with different results) as `vA` or\
    \ `Av`.\n* **Level 3**: The third level of BLAS is defined for matrix-matrix operations.\
    \ It allows, for example, the multiplication of matrices.\n\nThese three levels\
    \ of BLAS support have been implemented in several libraries inspired by the original\
    \ BLAS. Such implementations are mostly created to effectively support new programming\
    \ languages, architectures, and processors while still maintaining compatibility\
    \ with the many numeric algorithms that depend on BLAS. The purpose of the Boost\
    \ uBLAS library is to provide the same support levels of BLAS while taking advantage\
    \ of the expressive power provided by C++ classes and templates.\n\nIn this example,\
    \ you will explore a class called `VectorOperations`, which is responsible for\
    \ implementing level 1 BLAS operations. This means that it has to deal with vectors\
    \ and scalar numbers, as well as the possible transformations allowed between\
    \ them. From the documentation of BLAS, we have the following categories of operations:\n\
    \n* **Swap**: Switches elements from the first vector to the second vector.\n\
    * **Scale**: Multiplies all elements of a vector by a single scalar number.\n\
    * **Copy**: Performs a copy of elements of a first vector into a second, destination\
    \ vector.\n* **Vector addition**: Returns a vector whose components are the element-wise\
    \ additions of two input vectors.\n* **Dot product**: Performs the mathematical\
    \ operation of inner vector product, which is defined for two vectors `v` and\
    \ `w` using the following formula:\n\n![$$ p(v,w) = \\sum_i (v_i + w_i) $$](images/323908_2_En_7_Chapter/323908_2_En_7_Chapter_TeX_Equa.png)\n\
    \n* **Norm**: The norm of a vector is a way to quantify the length of a vector\
    \ in a particular direction. A common norm is the two-dimensional distance between\
    \ two points.\n\nIn the implementation of `VectorOperations`, you will see how\
    \ some of these operations can be accessed using uBLAS. The first such operation\
    \ is vector multiplication by a scalar. The method signature is as follows:\n\n\
    ```cpp\nstd::vector<double> scalarMult(double scalar);\n```\n\nThe goal of this\
    \ method is to return a `std::vector` object where each member is a scaled version\
    \ of the elements in the original vector. The implementation shows how to convert\
    \ between these different vector types.\n\n```cpp\nstd::vector<double> VectorOperations::scalarMult(double\
    \ scalar)\n{\n    using namespace boost::numeric::ublas;\n    vector<double> vx;\n\
    \    std::copy(m_data.begin(), m_data.end(), vx.end());\n    vector<double> res\
    \ = vx * scalar;\n    std::vector<double> v;\n    std::copy(res.begin(), res.end(),\
    \ v.end());\n    return v;\n}\n```\n\nThe first step is to create a vector from\
    \ the `boost::numeric::ublas` namespace. Notice that this function employs the\
    \ `using` declaration to avoid the boring sequence of namespaces. The next step\
    \ is to make a copy from the original `std::vector` into the `ublas` vector. Finally,\
    \ the scalar operation is performed using the multiplication operator. To store\
    \ the result, a new `ublas` vector, called `res`, is constructed. The last step\
    \ is to copy the result into a new vector and return the result.\n\nThe previous\
    \ algorithm creates a lot of temporaries, and therefore it is not efficient for\
    \ real implementations. However, the fact that we convert from standard vectors\
    \ to `ublas` vectors has the advantage of bringing attention to what each vector\
    \ type is capable of doing. When implementing more complicated LA algorithms,\
    \ however, we should avoid the creation of any unnecessary temporary variables,\
    \ since they can occupy a lot of space for large vectors and matrices.\n\nThe\
    \ `VectorOperations` class presents similar examples for other common operations\
    \ you will find in BLAS level 1, such as `addVector` and `subtractVector`, which\
    \ use the `ublas` operators to quickly perform these computations. The `dotProduct`\
    \ member function uses the `inner_prod` function from `ublas` to implement the\
    \ dot product, also known as the inner product operation between vectors. Finally,\
    \ we have the example of the `norm` member function, which returns the length\
    \ of the vector as defined with the `norm_2` function.\n\n## Complete Code\n\n\
    The vector operations described in the previous section have been implemented\
    \ in the `VectorOperations` class, displayed in Listing [7-1](#323908_2_En_7_Chapter.xhtml#PC4).\
    \ You should be able to compile the class using any standards-compliant C++ compiler,\
    \ after you install the Boost libraries in your system."
