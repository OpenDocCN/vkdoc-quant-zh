  \ = ts.m_values;\n}\nreturn *this;\n}\nvoid TimeSeries::addValue(double val)\n{\n\
  m_values.push_back(val);\n}\ndouble TimeSeries::mean()\n{\ndouble sum = 0;\nfor\
  \ (int i=0; i\nCorrelationCalculator::CorrelationCalculator(TimeSeries &a, TimeSeries\
  \ &b)\n: m_tsA(a),\nm_tsB(b)\n{\n}\nCorrelationCalculator::~CorrelationCalculator()\n\
