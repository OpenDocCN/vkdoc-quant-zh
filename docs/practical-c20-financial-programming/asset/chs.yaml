  \ | 允许现有函数被其他函数对象使用 |\n| `Circular Buffer` | 定义了一个可用作循环缓冲区的存储模板 |\n| `Chrono` |\
  \ 一组与时间相关的实用工具 |\n| `Filesystem` | 常见文件操作的实现，包括复制、移动和创建文件或目录 |\n| `Foreach` | 引入了一种循环结构（已被\
  \ C++11 的新特性弃用） |\n| `Function` | 一组定义函数包装器的模板 |\n| `Geometry` | 常见几何算法的实现 |\n|\
  \ `Graph` | 定义了图形数据类型，以及常见的图论技术和算法 |\n| `Hash` | 一种简单的哈希表数据类型，定义为模板 |\n| `Lambda`\
  \ | 一组可用于编写函数式编程 lambda 表达式的模板 |\n| `Log` | 用于 C++ 应用程序的通用日志记录功能 |\n| `Math` | 额外的数学函数\
  \ |\n| `MPI` | 消息传递接口库 |\n| `PropertyMap` | 定义了一个通用属性模板，可用于定义动态属性 |\n| `SmartPtr`\
  \ | 一组用于存储堆分配对象的智能指针类型 |\n\n在本章及下一章中，我们将有机会探索其中一些库，因为本书介绍的其他金融 C++ 代码中将会用到它们。在本例中，我们关注的是\
  \ `filesystem` 库，它用于提供与文件和目录相关的操作。\n\n\n\nC 和 C++ 语言传统上在其所实现的各个平台中，都提供了各自独有的文件处理接口。为此，平台厂商创建了独立的库，从而导致了如\
  \ UNIX 及其他符合 Posix 标准的系统、Windows、OS/2、VMS 等操作系统拥有不同的接口。然而，这些接口之间的差异使得应用难以跨系统移植。实际上，应用程序编写者创建了抽象层，这些抽象层根据需要与每个不同的系统进行交互。\n\
  \nSTL 中的 `filesystem` 库旨在提供一组用于文件操作的跨平台类和模板。可以使用相同的类和模板来处理 STL 所支持的各个平台上的文件。这减少了应用程序程序员的工作量，同时生成的代码可以安全地复用于其他平台。\n\
  \n该库的主要组件包含在 `std::filesystem` 命名空间中。这些组件允许你对文件和目录执行常用操作。该库中包含的类可以轻松支持诸如复制、移动、更改权限和删除等操作。接下来，我将向你展示其中一些重要的组件，以及如何使用它们编写操作文件系统内容的代码。\n\
  \n`std::filesystem::path` 类表示文件系统中的路径。拥有一个路径类很有意义，因为它允许程序员在使用同一个对象的同时，表示不同系统中的目录路径。例如，UNIX\
  \ 系统中的路径使用“/”分隔符，而在 Windows 中，则使用“\\”分隔符。为避免与这些不同约定相关的问题，`filesystem` 库使用了一种通用表示。库中提供的许多函数随后都使用了\
  \ `path` 类。\n\n`filesystem` 库的另一个重要概念是目录迭代器。你可以使用 `directory_iterator` 函数为特定路径创建一个迭代器。该函数返回一个迭代器对象，该对象具有\
  \ `++` 和 `--` 等运算符，允许程序员在给定目录的元素之间移动。\n\n除了为路径和迭代器提供合适的抽象外，`filesystem` 库还提供了一组函数，可用于对文件和目录执行单个更改。这些函数包括以下内容：\n\
  \n*   `is_regular_file`：如果提供的路径指向一个普通文件（而非目录），则返回 true\n*   `is_directory`：如果路径指向一个目录，则返回\
  \ true\n*   `file_size`：返回作为参数传入的文件名的大小，以字节为单位\n*   `exists`：如果作为参数传入的路径在文件系统中存在，则返回\
  \ true\n*   `status`：返回一个 `file_status` 对象，该对象封装了给定文件的属性，例如可见性和类型\n*   `create_directory`：在文件系统中创建一个具有指定路径的新目录\n\
  *   `copy`：将指定路径复制到第二个参数指示的位置\n*   `remove`：从文件系统中移除指定路径\n*   `current_path`：返回一个\
  \ `path` 对象，指示应用程序当前使用的路径\n\n这些函数可以轻松组合以操作文件系统。我使用其中一些函数来实现 `FileManager` 类所需的所有功能。例如，以下是\
  \ `getContents` 成员函数的编码方式：\n\n```\nstd::vector FileManager::getContents(const std::string\
  \ &prefix)\n{\nstd::vector results;\npath aPath(prefix);\nif (!is_directory(aPath))\n\
  {\nstd::cout << \"not a directory \" << prefix << std::endl;\nreturn results;\n\
  }\nstd::vector<path> contents;\ncopy(directory_iterator(aPath), directory_iterator(),\
  \ back_inserter(contents));\nfor (int i=0; i<contents.size(); ++i)\n{\nresults.push_back(contents[i].string());\n\
  }\nreturn results;\n}\n```\n\n第一步是根据作为参数传入的字符串创建一个路径对象。一旦创建了路径，就可以使用 `is_directory`\
  \ 函数测试它是否指向一个目录。如果路径正确，那么可以使用 `directory_iterator` 函数创建一个迭代器对象，该对象被传递给 `copy` 函数。`copy`\
  \ 函数的唯一工作是将迭代器指向的每个元素复制到 `contents` 向量中。然后，该容器中的元素被转换为字符串并添加到 `results` 向量中。\n\n\
  最后，可以使用以下代码将文件从一个目录复制到指定目的地的函数添加到 `FileManager` 类中：\n\n```\nvoid FileManager::copyToTempDirectory(const\
  \ std::string &prefix)\n{\npath tmpPath(\"/tmp/\");\npath aPath(prefix);\nif (!is_directory(aPath))\n\
  {\nstd::cout << \"not a directory \" << prefix << std::endl;\nreturn;\n}\nlistContents(prefix);\n\
  for (auto it = directory_iterator(aPath); it != directory_iterator(); ++it)\n{\n\
  if (is_regular_file(it->path()))\n{\ncopy_file(it->path(), tmpPath);\n}\n}\n}\n\
  ```\n\n这里，你首先检查给定的路径前缀，以确保它是对一个目录的引用。然后，我添加了一些代码，以日志形式列出内容。下一步是使用 `directory_iterator`\
  \ 函数返回的迭代器遍历目录中的内容。对于目录中的每个元素，你可以测试它是否是一个常规文件，然后使用 `copy_file` 函数执行复制。\n\n### 完整代码\n\
  \n你可以在代码清单 4-3 中看到 `FileManager` 类的完整定义。在代码清单的末尾，你可以看到一个如何在 `main()` 函数中使用该类的示例。\n\
  \n```\n//\n//  FileManager.h\n#ifndef __FinancialSamples__FileManager__\n#define\
  \ __FinancialSamples__FileManager__\n#include \n#include \nclass FileManager {\n\
  public:\nFileManager(const std::string &basePath);\nFileManager(const FileManager\
  \ &);\n~FileManager();\nFileManager &operator=(const FileManager &);\nvoid removeFiles();\n\
  std::vector getDirectoryContents();\nvoid listContents();\nvoid copyToTempDirectory(const\
  \ std::string &prefix);\nprivate:\nstd::string m_basePath;\n};\n#endif /* defined(__FinancialSamples__FileManager__)\
  \ */\n//\n//  FileManager.cpp\n#include \"FileManager.h\"\n#include \n#include \n\
  using namespace std::filesystem;\nFileManager::FileManager(const std::string &basePath)\n\
  : m_basePath(basePath)\n{\n}\nFileManager::FileManager(const FileManager &v)\n:\
  \ m_basePath(v.m_basePath)\n{\n}\nFileManager::~FileManager()\n{\n}\nFileManager\
  \ &FileManager::operator=(const FileManager &v)\n{\nif (this != &v)\n{\nm_basePath\
  \ = v.m_basePath;\n}\nreturn *this;\n}\nvoid FileManager::removeFiles()\n{\nstd::vector\
  \ files = getDirectoryContents();\nfor (unsigned i=0; i<files.size(); ++i)\n{\n\
  path aPath(files[i]);\nif (!remove(aPath))\n{\nstd::cout << \"could not remove:\
  \ \" << files[i] << std::endl;\n}\n}\n}\nstd::vector FileManager::getDirectoryContents()\n\
  {\nstd::vector results;\npath aPath(m_basePath);\nif (!is_directory(aPath))\n{\n\
  std::cout << \"not a directory \" << m_basePath << std::endl;\nreturn results;\n\
  }\nstd::vector<path> contents;\ncopy(directory_iterator(aPath), directory_iterator(),\
  \ back_inserter(contents));\nfor (unsigned i=0; i<contents.size(); ++i)\n{\nresults.push_back(contents[i].string());\n\
  }\nreturn results;\n}\nvoid FileManager::listContents()\n{\nstd::vector<path> contents;\n\
  path aPath(m_basePath);\ncopy(directory_iterator(aPath), directory_iterator(), back_inserter(contents));\n\
  for (unsigned i=0; i < contents.size(); ++i)\n{\nstd::cout << contents[i].string()\
  \ << std::endl;\n}\n}\nvoid FileManager::copyToTempDirectory(const std::string &prefix)\n\
  {\npath tmpPath(\"/tmp/\");\npath aPath(prefix);\nif (!is_directory(aPath))\n{\n\
  std::cout << \"not a directory \" << prefix << std::endl;\nreturn;\n}\nlistContents();\n\
  std::vector contents = getDirectoryContents();\nfor (auto it = directory_iterator(aPath);\
  \ it != directory_iterator(); ++it)\n{\nif (is_regular_file(it->path()))\n{\ncopy_file(it->path(),\
  \ tmpPath);\n}\n}\n}\nint main()\n{\n// 为 /tmp 目录创建一个 FileManager 对象\n//\nFileManager\
  \ fm(\"/tmp/\");\nstd::vector contents = fm.getDirectoryContents();\nstd::cout <<\
  \ \"entries: \" << std::endl;\nfor (std::string entry : contents)\n{\nstd::cout\
  \ << entry << std::endl;\n}\nreturn 0;\n}\n```\n\n代码清单 4-3\n类 FileManager 的定义和实现\n\
  \n\n\n### 运行代码\n\n清单 4-3 中展示的 `FileManager` 类可以使用任何标准 C++ 编译器（例如 `gcc` 或 Visual\
  \ Studio）进行构建。如果你使用的是较新的编译器（至少是 C++17），则无需额外库即可使用 `std::filesystem` 类。许多现代 Linux\
  \ 发行版已经包含了最新版本的 `gcc`，但如果你使用其他操作系统，请检查其支持情况。\n\n例如，我系统中使用 `gcc` 构建该类所需的命令行如下：\n\n\
  ```\ngcc -o FileManager FileManager.cpp\n```\n\n生成应用程序后，你可以在 UNIX 系统上按如下方式运行它：\n\
  \n```\n./FileManager\n```\n\n这将显示 `/tmp` 目录中存储的文件列表（你可以根据需要更改该目录，以便在自己的系统路径上进行测试）。\n\
  \n## 处理日期\n\n让我们看看如何创建一个类，用于确定普通证券（即周一至周五进行交易）的交易日期。\n\n### 解决方案\n\n日期是金融数据中非常常见的部分，因此你应该有明确的方法来处理它们。日期是历史价格的重要组成部分，也是股票分析中重要事件（如盈利发布、股息、拆股和其他监管行动）的关键要素。固定收益、衍生品及其他投资类别也是如此。C++\
  \ 提供了丰富的功能，可用于存储、计算日期并将其从一种格式转换为另一种格式。\n\n尽管 C++ 中有许多与时间和日期相关的函数和类，但其中许多机制继承自 C\
  \ 标准库，使用起来不如 STL 的其他组件方便。为了平滑其与 STL 的集成过程，boost 库中包含了一个 `date_time` 库，专门处理不同日期表示形式，并为基于不同日期格式的计算提供了基本支持。\n\
  \n为了解决本节提出的问题，你将使用一个名为 `Date` 的类，它封装了应用程序中使用的日期概念。其成员变量仅是三个表示年、月和日的值。此外，还有星期的概念，通过枚举进行编码。\n\
  \n```\nenum class DayOfWeek {\nSun,\nMon,\nTue,\nWed,\nThu,\nFri,\nSat\n};\n```\n\
  \n`Date` 类提供了多个成员函数，可用于回答常见请求，例如 `getDayOfWeek`（返回当前日期的星期几）和 `isLeapYear`（判断某年的二月是否有\
  \ 29 天）。以下是 `Date` 的成员函数快速列表。\n\n```\nDate(int year, int month, int day);\n~Date();\n\
  bool isLeapYear();\nDate &operator++();\nbool operator<(const Date &d);\nDayOfWeek\
  \ getDayOfWeek();\nint daysInterval(const Date &);\nbool isTradingDay();\n```\n\n\
  `isLeapYear` 方法的实现使用了常见的闰年定义，即考虑能被 4、100 和 400 整除的年份：\n\n```\nbool Date::isLeapYear()\n\
  {\nif (m_year % 4 != 0) return false;\nif (m_year % 100 != 0) return true;\nif (m_year\
  \ % 400 != 0) return false;\nreturn true;\n}\n```\n\n`getDayOfWeek` 查找 1900 年 1\
  \ 月 1 日（星期一）之后任何日期的星期几。它通过计算自该日期以来的天数，并相应更新年、月、日来实现此功能。正确添加到当前日期的任务由 `operator +`\
  \ 处理。\n\n最后，`Date` 类借助 boost 库中的 `date_time` 计算日期差异。在 `date_time` 中，日期根据日历进行分类。西方世界使用的日历称为公历。在包含以下头文件后即可使用它：\n\
  \n```\n#include <boost/date_time/gregorian/gregorian.hpp>\n```\n\n`date_time` 库定义了一些可用于日期操作的通用数据类型。在本例中，我们关注\
  \ `date` 和 `date_duration` 类型。`date` 类型仅是日期的表示形式，可以用年、月、日进行初始化。`date_duration` 用于存储日期之间的差异。可以使用\
  \ `days()` 成员函数将持续时间类型转换为整数类型。以下是实现 `daysInterval` 的方法：\n\n```\nint Date::daysInterval(const\
  \ Date &d)\n{\ndate bdate1(m_year, m_month, m_day);\ndate bdate2(d.m_year, d.m_month,\
  \ d.m_day);\nboost::gregorian::date_duration duration = bdate1 - bdate2;\nreturn\
  \ (int) duration.days();\n}\n```\n\n完整代码\n\n你可以在清单 4-4 中看到 `Date` 类的完整代码。清单 4-4\
  \ 包含该类的头文件和一个实现文件。你还会看到一个 `main()` 函数，它创建了两个 `Date` 类型的对象，并对它们执行了一些简单操作。\n\n\n```cpp\n\
  //\n//  Date.h\n#ifndef __FinancialSamples__Date__\n#define __FinancialSamples__Date__\n\
  #include \nclass Date {\npublic:\nenum class DayOfWeek {\nSun,\nMon,\nTue,\nWed,\n\
  Thu,\nFri,\nSat\n};\nDate(int year, int month, int day);\n~Date();\nbool isLeapYear();\n\
  Date &operator++();\nbool operator\n#include \n#include \nusing namespace boost::gregorian;\n\
  Date::Date(int year, int month, int day)\n: m_year(year),\nm_month(month),\nm_day(day)\n\
  {\n}\nDate::~Date()\n{\n}\nbool Date::isLeapYear()\n{\nif (m_year % 4 != 0) return\
  \ false;\nif (m_year % 100 != 0) return true;\nif (m_year % 400 != 0) return false;\n\
  return true;\n}\nDate &Date::operator++()\n{\nstd::vector monthsWith31 = { 1, 3,\
  \ 5, 7, 8, 10, 12 };\nif (m_day == 31)\n{\nm_day = 1;\nm_month++;\n}\nelse if (m_day\
  \ == 30 &&\nstd::find(monthsWith31.begin(),\nmonthsWith31.end(), m_month) == monthsWith31.end())\n\
  {\nm_day = 1;\nm_month++;\n}\nelse if (m_day == 29 && m_month == 2)\n{\nm_day =\
  \ 1;\nm_month++;\n}\nelse if (m_day == 28 && m_month == 2  && !isLeapYear())\n{\n\
  m_day = 1;\nm_month++;\n}\nelse\n{\nm_day++;\n}\nif (m_month > 12)\n{\nm_month =\
  \ 1;\nm_year++;\n}\nreturn *this;\n}\nint Date::daysInterval(const Date &d)\n{\n\
  Date bdate1(m_year, m_month, m_day);\nDate bdate2(d.m_year, d.m_month, d.m_day);\n\
  boost::gregorian::date_duration duration = bdate1 - bdate2;\nreturn (int) duration.days();\n\
  }\nbool Date::operator<(const Date &d)\n{\nif (m_year < d.m_year) return true;\n\
  if (m_year == d.m_year && m_month < d.m_month) return true;\nif (m_year == d.m_year\
  \ && m_month == d.m_month && m_day < d.m_day) return true;\nreturn false;\n}\nDate::DayOfWeek\
  \ Date::getDayOfWeek()\n{\nint day = 1;\nDate d(1900, 1, 1);\nfor (;d < *this; ++d)\n\
  {\nif (day == 7) day = 1;\nelse day++;\n}\nreturn (DayOfWeek) day;\n}\nbool Date::isTradingDay()\n\
  {\nDayOfWeek dayOfWeek = getDayOfWeek();\nif (dayOfWeek == DayOfWeek::Sun || dayOfWeek\
  \ == DayOfWeek::Sat)\n{\nreturn false;\n}\nreturn true;\n}\nstd::string Date::toStringDate(Date::DayOfWeek\
  \ day)\n{\nswitch(day)\n{\ncase DayOfWeek::Sun: return \"Sunday\";\ncase DayOfWeek::Mon:\
  \ return \"Monday\";\ncase DayOfWeek::Tue: return \"Tuesday\";\ncase DayOfWeek::Wed:\
  \ return \"Wednesday\";\ncase DayOfWeek::Thu: return \"Thursday\";\ncase DayOfWeek::Fri:\
  \ return \"Friday\";\ncase DayOfWeek::Sat: return \"Saturday\";\n}\nthrow std::runtime_error(\"\
  unknown day of week\");\n}\nint main()\n{\nDate myDate(2015, 1, 3);\nauto dayOfWeek\
  \ = myDate.getDayOfWeek();\nstd::cout << \" day of week is \"\n<< myDate.toStringDate(dayOfWeek)\
  \ << std::endl;\nDate secondDate(2014, 12, 5);\n++secondDate;  // test increment\
  \ operator\n++secondDate;\nint interval = myDate.daysInterval(secondDate);\nstd::cout\
  \ << \" interval is \" << interval << \" days\" << std::endl;\nreturn 0;\n}\n清单\
  \ 4-4\nDate 类的实现\n```\n\n### 运行代码\n\n清单 4-4 中的代码使用了任何标准 C++ 编译器均可使用的标准类。它还使用了 boost\
  \ 库，该库是开源的，可以从 `boost.org` 免费下载。你可以在 Linux 和其他 UNIX 系统上使用以下命令行构建应用程序（假设 boost 安装在\
  \ `/usr/local/boost`）：\n\n```\ngcc -o Date -I/usr/local/boost/ Date.cpp\n```\n\n\
  执行生成的可执行文件将显示 `main()` 函数中包含的测试代码的输出：\n\n```\n./Date\nday of week is Saturday\n\
  interval is 27 days\n```\n\n### 结论\n\n在本章中，我提供了一些编程示例，涵盖了金融编程中使用的基本库。这些库包括 STL，及其容器集（例如\
  \ `vector`、`map`）和算法（例如 `sort`、`transform` 和 `for_each` 等）。你还了解了 boost 库，这是一组为填补\
  \ C++ 标准化进程缓慢造成的空白而创建的库。\n\n算法是 STL 的重要组成部分。这些算法可用于在 STL 模板定义的任何容器中执行常见操作，例如搜索、复制和转换。在本章中，你还学习了如何将这些算法应用于数据容器以执行数据分析。\n\
  \n第一个示例应用程序展示了如何处理分析师推荐。要正确处理此类信息，你必须使用 STL vector 和 map。第二个示例应用程序使用 STL 提供的算法对时间序列执行简单的转换。这种转换可用于清理数据、执行假设分析，以及根据投资分析新技术的需求更新价格。你已经看到了如何使用\
  \ STL 算法和函数模板来实现这一点。\n\n你还学习了如何以独立于平台或操作系统的方式创建处理文件和目录的 C++ 代码。这是使用属于 boost 库的 `filesystem`\
  \ 库实现的。使用 boost 的主要优势之一在于，虽然其他库与操作系统紧密绑定，但 boost 库是以平台无关的方式编写的，遵循标准库采用的相同策略。事实上，多年来，boost\
  \ 的许多组件已成为标准库的一部分。\n\n金融代码的另一个重要方面是频繁使用日期。这类数据与交易、分析师推荐、股息以及许多其他与投资相关的事件相关联。你学习了如何在\
  \ boost 的 `date_time` 库中使用 `date` 类型，以及如何计算日期其他有趣的属性。\n\n这组编码示例到此结束，它们回顾了现代 C++\
  \ 编程的一些基本方面。你需要了解这些技术，它们主要基于模板、STL 及其算法的使用。学习诸如 boost 库之类的扩展库也很重要。在下一章中，你将开始更多地了解数值类的设计。C++\
  \ 中的金融应用程序大量使用数值功能，以快速准确地计算不同投资类别的所需属性。我将讨论创建此类数值类的一些基本原则，以及现代 C++ 库如何帮助你简化生成的代码。\n\
  \n**第五章：设计数值类**\n\n\n"
- "# 高性能金融应用的核心\n\n任何高性能金融应用的核心都包含一组精心设计的数值类。这些类负责实现金融建模、预测和投资决策分析等任务中不可或缺的概念。没有数学模型的支持，提出和评估有效的投资方法将非常困难。因此，作为金融行业的程序员，你需要熟悉在\
  \ C++ 中设计和实现面向数学的代码的最佳策略。虽然使用这些编程技术不必成为数学专家，但了解金融编程任务中需要处理的最重要的数值问题会有所帮助。\n\n本章将向你展示如何创建在面向数值的生产级代码中高效运行的类。你还将看到一些示例代码，演示如何将现有的数值类和算法集成到你的应用程序中。\n\
  \n本章代码示例中讨论的一些概念包括：\n\n*   如何设计和实现高效的矩阵类\n*   如何支持常见的矩阵运算\n*   如何在编译时执行计算\n*   如何使用模板计算阶乘\n\
  *   如何将比率表示为数据类型\n*   如何使用 boost 库生成和使用随机值\n\n## 在 C++ 中表示矩阵\n\n实现一个表示矩阵的类，并包含一些常见的相关运算，例如加法、减法、转置和乘法。\n\
  \n### 解决方案\n\n矩阵操作是数值计算中的基本操作之一。然而，C++ 没有内置的矩阵类型，因此在大多数金融项目中实现矩阵是必要的。好消息是，利用标准模板库中已有的算法相对容易实现这一目的，如下面的代码示例所示。\n\
  \n矩阵只是一个二维数字排列，可以对其执行一组标准的数学变换。就内存中的数据组织而言，矩阵与向量没有太大区别。考虑到这种相似性，我们可以利用现有的向量操作来简化`Matrix`类的实现。以下是此类的一个可能定义。\n\
  \n```cpp\nclass Matrix {\npublic:\n    typedef std::vector Row;\n    Matrix(int\
  \ size, int size2);\n    Matrix(int size);\n    Matrix(const Matrix &s);\n    ~Matrix();\n\
  \    Matrix &operator=(const Matrix &s);\n    void transpose();\n    double trace();\n\
  \    void add(const Matrix &s);\n    void subtract(const Matrix &s);\n    void multiply(const\
  \ Matrix &s);\n    Row & operator[](int pos);\nprivate:\n    std::vector m_rows;\n\
  };\n```\n\n请注意，在该类的公共接口开头，我使用了一个公共的 `typedef` 来定义 `Row` 类型。由于行只是一个数字向量，我想避免在谈论简单的行时输入像\
  \ `std::vector<std::vector< > >` 这样复杂的内容。这也是一种很好的措施，有助于在定义新变量和成员函数时避免错误。这个 `typedef`\
  \ 的结果是，矩阵中存储的所有数据在 `Matrix` 类的私有部分被声明为 `Row` 对象的 `vector`。\n\n刚刚介绍的简单 `Matrix` 类有两个构造函数。\n\
  \n```cpp\nMatrix(int size);\nMatrix(int m, int n);\n```\n\n第一个构造函数创建一个方阵，即行数和列数相同的矩阵。第二个构造函数用于创建更通用的矩形矩阵，具有\
  \ `m` 行和 `n` 列。\n\n为了使矩阵的操作更类似于向量，可以引入一个下标运算符作为访问辅助。这样，就可以使用原生语法设置和检索矩阵中特定条目的值。由于我们可以引用矩阵中的每一行，因此该运算符的实现很简单。\n\
  \n```cpp\nMatrix::Row &Matrix::operator[](int pos)\n{\n    return m_rows[pos];\n\
  }\n```\n\n接下来，我们考虑一些矩阵的基本运算。第一个运算是转置，定义为行与列之间元素的交换。也就是说，如果 A 是一个矩阵，我们需要交换 `A[i][j]`\
  \ 和 `A[j][i]` 的值。\n\n矩阵的第二个常见运算是计算迹，定义为主对角线元素（即行和列位置相同的元素）之和。其实现如下：\n\n```cpp\n\
  double Matrix::trace()\n{\n    if (m_rows.size() != m_rows[0].size())\n    {\n \
  \       return 0;\n    }\n    double total = 0;\n    for (unsigned i=0; i<m_rows.size();\
  \ ++i)\n    {\n        total += m_rows[i][i];\n    }\n    return total;\n}\n```\n\
  \n第一个 `if` 语句检查矩阵的行数和列数是否不同，如果不同，则迹运算未定义。然后 `for` 语句遍历对角线，将这些值加到 `total` 变量中，并在成员函数末尾返回该变量。\n\
  \n`Matrix` 类还实现了矩阵的加法和减法运算。要将一个矩阵加到另一个矩阵上，只需将第一个矩阵的各个元素与第二个矩阵中对应的元素相加。类似地，矩阵的减法也是按元素定义的。这些操作在\
  \ C++ 中实现起来很简单。\n\n最后，你可以看到如何实现矩阵乘法。在这种情况下，你需要计算一个新矩阵，其中每个元素由第 `i` 行和第 `j` 列的乘积之和决定。结果矩阵的维度由当前矩阵的行数和参数矩阵的列数决定。该算法的主要部分如下：\n\
  \n```cpp\nstd::vector rows;\nfor (unsigned i=0; i row;\n    for (unsigned j=0; j<s.m_rows.size();\
  \ ++j)\n    {\n        double Mij = 0;\n        for (unsigned k=0; k<m_rows[0].size();\
  \ ++k)\n        {\n            Mij += m_rows[i][k] * s.m_rows[k][j];\n        }\n\
  \        row.push_back(Mij);\n    }\n    rows.push_back(row);\n}\nm_rows.swap(rows);\n\
  ```\n\n在这段代码中，我们有三个循环，分别遍历原始矩阵和参数矩阵的不同维度。值 `Mij` 表示结果矩阵中位置 `[i][j]` 的元素。请注意，为了简化存储管理，该算法在一组新的行中执行赋值操作。然后，在最后一行使用\
  \ `swap` 函数将结果存储到现有值的位置。\n\n定义了 `Matrix` 类之后，我还添加了一些自由运算符，以便更轻松地使用前面定义的操作。这些运算符确保你可以使用类似于原生操作的语法来加减和乘除矩阵，尽管会因临时对象而带来轻微的开销。例如，下面是\
  \ `operator *` 的定义。\n\n```cpp\nMatrix operator*(const Matrix &s1, const Matrix &s2)\n\
  {\n    Matrix s(s1);\n    s.multiply(s2);\n    return s;\n}\n```\n\n### 完整代码\n\n\
  上述思想已在 `Matrix` 类中实现，如清单 5-1 所示。这个类将在本书后续章节的其他示例中使用，因此你应该熟悉它的定义和主要用途。\n\n\n\n```cpp\n\
  //\n//  Matrix.h\n#ifndef __FinancialSamples__Matrix__\n#define __FinancialSamples__Matrix__\n\
  #include \nclass Matrix {\npublic:\ntypedef std::vector Row;\nMatrix(int size, int\
  \ size2);\nMatrix(int size);\nMatrix(const Matrix &s);\n~Matrix();\nMatrix &operator=(const\
  \ Matrix &s);\nvoid transpose();           // 转置\ndouble trace();             //\
  \ 迹\nvoid add(const Matrix &s);  // 加法\nvoid subtract(const Matrix &s); // 减法\n\
  void multiply(const Matrix &s); // 乘法\nRow & operator[](int pos);\nprivate:\nstd::vector\
  \ m_rows;\n};\n// 自由运算符\n//\nMatrix operator+(const Matrix &s1, const Matrix &s2);\n\
  Matrix operator-(const Matrix &s1, const Matrix &s2);\nMatrix operator*(const Matrix\
  \ &s1, const Matrix &s2);\n#endif /* defined(__FinancialSamples__Matrix__) */\n\
  //\n//  Matrix.cpp\n#include \"Matrix.h\"\nMatrix::Matrix(int size)\n{\nfor (unsigned\
  \ i=0; i row(size, 0);\nm_rows.push_back(row);\n}\n}\nMatrix::Matrix(int size, int\
  \ size2)\n{\nfor (unsigned i=0; i row(size2, 0);\nm_rows.push_back(row);\n}\n}\n\
  Matrix::Matrix(const Matrix &s)\n: m_rows(s.m_rows)\n{\n}\nMatrix::~Matrix()\n{\n\
  }\nMatrix &Matrix::operator=(const Matrix &s)\n{\nif (this != &s)\n{\nm_rows = s.m_rows;\n\
  }\nreturn *this;\n}\nMatrix::Row &Matrix::operator[](int pos)\n{\nreturn m_rows[pos];\n\
  }\nvoid Matrix::transpose()\n{\nstd::vector rows;\nfor (unsigned i=0;i  row;\nfor\
  \ (unsigned j=0; j rows;\nfor (unsigned i=0; i row;\nfor (unsigned j=0; j<s.m_rows.size();\
  \ ++j)\n{\ndouble Mij = 0;\nfor (unsigned k=0; k<m_rows[0].size(); ++k)\n{\nMij\
  \ += m_rows[i][k] * s.m_rows[k][j];\n}\nrow.push_back(Mij);\n}\nrows.push_back(row);\n\
  }\nm_rows.swap(rows);\n}\nMatrix operator+(const Matrix &s1, const Matrix &s2)\n\
  {\nMatrix s(s1);\ns.subtract(s2);  // 注意：此处实际上应为 s.add(s2)，但原文如此保留\nreturn s;\n\
  }\nMatrix operator-(const Matrix &s1, const Matrix &s2)\n{\nMatrix s(s1);\ns.subtract(s2);\n\
  return s;\n}\nMatrix operator*(const Matrix &s1, const Matrix &s2)\n{\nMatrix s(s1);\n\
  s.multiply(s2);\nreturn s;\n}\n清单 5-1\n矩阵类\n```\n\n## 使用模板计算阶乘\n\n在本节中，我将展示如何创建一个基于模板的类，用于在编译时计算阶乘。\n\
  \n### 解决方案\n\n模板提供了一种简便的方式，将相同代码应用于不同数据类型，使程序员能够创建通用、可重用的代码。最佳示例就是 STL，它包含众多容器和相关算法。然而，由于模板除了数据类型之外还能接收整数值作为形式参数，因此也可用于执行数值任务。在此编码示例中，你将看到如何利用模板在编译时执行一些简单计算。\n\
  \n基于模板的计算可被视为减少数值算法运行时开销的一种有效策略。毕竟，如果能在编译时执行部分计算，那么每次执行编译后的代码时，完成完整计算所需的时间就会减少。\n\
  \n对于刚开始接触基于模板计算的人来说，最大的意外之一是计算值不能简单地作为函数返回值输出。由于函数可以在运行时返回任意值，传统函数无法作为编译时计算的基础。相反，你需要一种方法将值作为常量存储在类中，使其能被编译器直接使用。在\
  \ C++中实现此目的的一种方法是使用枚举。例如：\n\n```cpp\nenum {\nresult = 1\n};\n```\n\n该片段定义了一个常量整数值，可在程序中后续引用。如果在声明的右侧使用常量表达式（而非数字），则`result`值可在程序中后续用于访问所需值。\n\
  \n接下来你需要一种方法将数字作为参数传递给类模板。在 C++中，你可以声明将`int`值（或其变体如`long`和`char`）作为参数的模板。用于在模板内执行计算的通用语法如下：\n\
  \n```cpp\ntemplate \nclass CompileTime {\npublic:\nenum {  result = ConstantExpressionDependingOnN\
  \ };\n};\n```\n\n其中`ConstantExpressionDependingOnN`是一个以某种方式依赖于参数`N`的表达式，可用于计算所需值。你可以看到本例中的代码将使用这种通用格式执行编译时计算。\n\
  \n一旦找到在编译时执行计算的方法，下一步就是将迭代等概念引入代码。在 C++模板中，无法在常量表达式中编写`for`或`while`等循环。所有 C++循环都在运行时执行，因此无法用于编译时操作。幸运的是，模板提供了一种特化机制，可用于实现递归——一种能达到与循环相同效果的技术。\n\
  \n例如，如果模板使用单个整数参数，你可以通过基例特化该参数，同时使用处理常规情况的通用版本。这两种情况共同模拟一个循环：从通用情况开始，一旦达到特例则终止计算。图\
  \ 5-1 展示了这种机制的示意图，其中考虑了以下示例：\n\n![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig1_HTML.jpg](img/323908_2_En_5_Fig1_HTML.jpg)\n\
  \n*图 5-1*  \n使用模板特化进行计算的示例。通用情况以整数 4 实例化，并持续使用新实例化，直到达到`Double<1>`的特化。\n\n```cpp\n\
  // 通用情况\ntemplate \nclass Double {\npublic:\nenum {  result = 2 + Double  };\n};\n\
  // 基例特化\ntemplate \nclass Double {\npublic:\nenum {  result = 2 };\n};\n```\n\n\
  这展示了如何使用基于模板的递归计算整数的两倍值。通用情况在顶部声明，其中结果值定义为表达式`2 + Double<N-1>`。为求出该表达式的值，编译器需要内联展开它，每次递减`N`的值并用新值调用`Double`。声明的第二部分允许此过程终止，引入了一个基础值。该声明内容为：\n\
  \n```cpp\ntemplate \nclass Double\n```\n\n这告诉编译器，`Double<1>`是通用模板针对特定值`1`的一个特化。因此，当模板`Double`应用于`1`时，计算结果将为值`2`，正如预期。\n\
  \n类似的策略可用于解决多个问题，包括计算阶乘这一需求。第一部分是定义通用情况，其中包含递归表达式。\n\n```cpp\ntemplate \nclass Factorial\
  \ {\npublic:\nenum {\nresult = Factorial::result * N\n};\n};\n```\n\n解决方案的第二部分是基例，它将确定`Factorial<0>`的值。可写为：\n\
  \n```cpp\ntemplate \nclass Factorial {\npublic:\nenum {\nresult = 1\n};\n};\n```\n\
  \n我们可以通过对`Factorial`模板进行几次调用来测试上述代码。该示例包含在`showFactorial`函数中。\n\n```cpp\nvoid showFactorial()\n\
  {\nstd::cout ::result;\nstd::cout ::result;\nstd::cout ::result;\n}\n```\n\n最后，你也可以将`Factorial`类作为其他编译时计算的基础。例如，以下展示如何使用`Factorial`计算组合数（从\
  \ N 个对象中每次取 P 个的组合数）。\n\n```cpp\ntemplate \nclass ChoiceNumber {\npublic:\nenum\
  \ {\nresult = Factorial::result / (Factorial::result * Factorial::result)\n};\n\
  };\n```\n\n\n\n请注意，这里您不需要基础情况，因为实际上并未涉及递归。`ChoiceNumber`类模板直接使用`Factorial`来执行编译时计算，并将其作为`result`。使用模板进行编译时计算的好处在于，您可以使用这里讨论的相同策略来计算各种不同的函数。只要能够将计算表示为递归，之前描述的方案稍加修改即可适用。通过这种方式，您可以利用编译器的能力提前执行计算，并可能在程序实际运行时节省大量时间。\n\
  \n**注意**\n\n虽然使用模板计算值的能力非常有用，但您可能需要避免频繁使用它们，因为它们可能会减慢编译速度。过长的编译时间可能是过度依赖模板的最大负面影响。理想情况下，在决定是否应该在编译时而非运行时使用模板进行计算之前，您应该考虑编译时间和运行时节省之间的权衡。\n\
  \n### 完整代码\n\n以下是一个使用模板在编译时计算阶乘的示例。实现的关键部分位于头文件（`FactorialTemplate.h`）中，如代码清单 5-2\
  \ 所示。这是必要的，因为模板在客户端使用时必须可见。`cpp`文件展示了该模板的一些示例用法。\n\n```cpp\n//\n//  FactorialTemplate.h\n\
  #ifndef __FinancialSamples__FactorialTemplate__\n#define __FinancialSamples__FactorialTemplate__\n\
  template <int N>\nclass Factorial {\npublic:\nenum {\nresult = Factorial<N-1>::result\
  \ * N\n};\nprivate:\n};\ntemplate <>\nclass Factorial<0> {\npublic:\nenum {\nresult\
  \ = 1\n};\n};\ntemplate <int N, int K>\nclass ChoiceNumber {\npublic:\nenum {\n\
  result = Factorial<N>::result / (Factorial<K>::result * Factorial<N-K>::result)\n\
  };\n};\nvoid showFactorial();\n#endif /* defined(__FinancialSamples__FactorialTemplate__)\
  \ */\n\n//\n//  FactorialTemplate.cpp\n#include \"FactorialTemplate.h\"\n#include\
  \ <iostream>\n\nvoid showFactorial()\n{\nstd::cout << Factorial<6>::result;\nstd::cout\
  \ << Factorial<5>::result;\nstd::cout << Factorial<7>::result;\n}\n\nint main(int\
  \ argc, const char **argv)\n{\nstd::cout << ChoiceNumber<5,6>::result;\nstd::cout\
  \ << Factorial<9>::result;\nshowFactorial();\nreturn 0;\n}\n代码清单 5-2 FactorialTemplate.h\
  \ 头文件\n```\n\n### 运行代码\n\n您可以编译并运行`FactorialTemplate`类来测试您刚刚学到的概念。为此，您可以使用`gcc`编译器，通过以下命令生成应用程序：\n\
  \n```bash\ngcc -o factorial FactorialTemplate.cpp\n```\n\n几秒钟后，将创建具有所需功能的二进制文件`factorial`。您只需在命令行中调用它即可运行程序：\n\
  \n```bash\n./factorial\n```\n\n如果在 Windows 机器上运行，也可以直接点击可执行文件。这将产生以下输出：\n\n```\n\
  factorial(6)= 720\nchoiceNumber(5,6) = 15\nfactorial(5)= 120\nfactorial(7)= 5040\n\
  factorial(9)= 362880\n```\n\n## 使用 C++20 特性计算阶乘\n\nC++ 最近引入了一些特性，使得处理模板代码更加容易。虽然前面的示例对于解释模板的工作原理仍然有用，但语法已经简化，现在可以用更少的样板代码实现相同的结果。首先，C++\
  \ 现在能够使用`constexpr`关键字在编译时计算表达式。使用`constexpr`关键字时，您是在指示编译器直接在编译时执行计算。这比创建递归模板类要简单得多，正如您在上一节中所见。\n\
  \n因此，例如，如果您需要创建一个阶乘函数，以下定义就足够了：\n\n```cpp\nconstexpr int factorial(const int n)\n\
  {\nreturn n <= 1 ? 1 : (n * factorial(n - 1));\n}\n```\n\n该函数的定义使用了`constexpr`，这意味着如果可能（即，如果参数是编译器已知的常量值），其值应在编译时计算。语法的其余部分与您为标准函数编写的类似，使用递归调用来基于较小整数的结果计算阶乘值。您也可以像调用普通函数一样调用此函数。\n\
  \n## 在编译时表示卡尔玛比率\n\n卡尔玛比率是一种衡量投资回报与可能年化损失之间关系的指标。它用于比较具有不同风险状况的投资。卡尔玛比率定义为给定时期的平均年化回报率除以同一时期的最大回撤（即最大损失）。如果考虑相同的回报率，则在该时期具有较高卡尔玛比率的投资风险较低。在本节中，我将展示如何使用编译时技术创建\
  \ C++ 代码来表示卡尔玛比率。\n\n### 解决方案\n\n在编写数值算法时，将某些量表示为常量通常很有用。然而，其中一些数学常量更适合表示为比率。例如，物理量经常使用测量单位，而这些单位通常表示为其他更基本单位的比率。因此，比率是一种特定类型的数学常量，可以从更具体、更高级的表示中受益。\n\
  在此编码示例中，您将使用 boost 仓库中的一个简单库来解决这个问题。该库称为`ratio`，并使用模板来表示数学量，例如投资的标准卡尔玛比率。所使用的表示也可以在编译时进行检查。\n\
  `ratio`库中提供的基本模板简称为`ratio`。它的操作需要两个模板参数，分别对应分子和分母。这些参数可以是简单的数值类型，例如`int`，也可以是先前使用`ratio`模板声明的其他类型。使用`ratio`模板为不同输入定义的类型本质上是不同的，编译器将强制执行涉及这些值的任何算术运算的正确性。\n\
  \n使用`ratio`模板的主要优点之一是它还提供了一些常见的编译时操作。这些操作可用于对使用该模板定义的数量执行标准的数学变换。此类操作包括：\n\n- `boost::ratio_add`\n\
  - `boost::ratio_subtract`\n- `boost::ratio_multiply`\n- `boost::ratio_add`\n- `boost::ratio_negate`\n\
  \n使用这些操作，您可以定义派生类型和常量，它们是原始比率类型的衍生。您还可以使用一些基于模板的操作来对这些比率进行逻辑比较，例如：\n\n- `boost::ratio_equal`\n\
  - `boost::ratio_not_equal`\n- `boost::ratio_less`\n- `boost::ratio_less_equal`\n\
  - `boost::ratio_greater`\n- `boost::ratio_greater_equal`\n\n您可以通过导入主头文件`<boost/ratio.hpp>`开始使用`ratio`库。然后，您可以使用`boost::ratio`为每个所需的比率定义对象。\n\
  \n```cpp\n#include <boost/ratio.hpp>\nboost::ratio<1,2> one_half;\nboost::ratio<1,3>\
  \ one_third;\nboost::ratio<2,5> two_fifths;\n```\n\n一旦定义了`boost::ratio`对象，您就可以使用`num`和`den`成员变量在运行时检索其信息，这两个变量分别对应分子和分母。例如：\n\
  \n```cpp\nstd::cout << \"one_third numerator: \" << one_third.num\n<< \" denominator:\
  \ \" << one_third.den;\n```\n\n## 表示卡尔玛比率\n\n\n\n### 使用 Ratio 库处理金融类型\n\n借助 `ratio`\
  \ 库，可以创建一些实用的金融类型，例如卡玛比率。卡玛比率定义为投资年化收益率除以已知期间内的最大回撤。因此，可以按如下方式定义 `CalmarRatio` 类型：\n\
  \n```\ntypedef boost::ratio<100, 1> CalmarRatioType;\n```\n\n从现在开始，`CalmarRatioType`\
  \ 可用于在编译时表示具有分子和分母的量。更有趣的是，假设我们希望能够用百分比和百分点（1/100%）来表示卡玛比率。那么定义将变为：\n\n```\ntypedef\
  \ boost::ratio<1, 100> CalmarRatioBPS;\ntypedef boost::ratio<1, 1> CalmarRatioPerc;\n\
  ```\n\n有了这两种类型，我们可以创建一个基于模板的类，返回关于特定比率的信息，例如给定对象的最大回撤和表现。实现如下：\n\n```\ntemplate\
  \ <class Ratio>\nclass CalmarRatio {\npublic:\n    CalmarRatio(double calmar, double\
  \ ret) : m_calmar(calmar), m_return(ret) {}\n    virtual ~CalmarRatio() {}\n   \
  \ double getReturn();\n    double getDrawDown()\n    {\n        return m_return\
  \ / m_calmar * m_ratio.den;\n    }\nprivate:\n    Ratio m_ratio;\n    double m_calmar;\n\
  \    double m_return;\n};\n```\n\n该类是一个模板，接收所需的比率类型，如 `CalmarRatioPerc` 或 `CalmarRatioBPS`。当然，如果需要，也可以支持其他比率类型。\n\
  \n让我们看一下 `getDrawDown` 成员函数。标准定义使用 `den` 变量来计算投资回撤。然而，可以使用模板特化创建该成员函数的不同版本。以下实现提供了一个示例：\n\
  \n```\ntemplate <>\ndouble CalmarRatio<CalmarRatioBPS>::getDrawDown()\n{\n    return\
  \ m_return / m_calmar * m_ratio.den * 100;\n}\n```\n\n在这种情况下，由于模板特化为 `CalmarRatioBPS`，标准回撤需要乘以\
  \ 100。这是因为分母是以基点（而非百分比）表示的。\n\n### 完整代码\n\n清单 5-3 展示了 `CalmarRatio` 类的实现。请注意 `boost::ratio`\
  \ 模板用于建模不同比率类型的方式，以及主类如何使用它们。\n\n```\n// CalmarRatio.h\n//\n#ifndef CALMARRATIO_H_\n\
  #define CALMARRATIO_H_\n\n#include <boost/ratio.hpp>\n\ntypedef boost::ratio<100,\
  \ 1> CalmarRatioType;\ntypedef boost::ratio<1, 100> CalmarRatioBPS;\ntypedef boost::ratio<1,\
  \ 1> CalmarRatioPerc;\n\ntemplate <class Ratio>\nclass CalmarRatio {\npublic:\n\
  \    CalmarRatio(double calmar, double ret) : m_calmar(calmar), m_return(ret) {}\n\
  \    ~CalmarRatio() {}\n    double getReturn()\n    {\n        return m_return;\n\
  \    }\n    double getDrawDown()\n    {\n        return m_return / m_calmar * m_ratio.den;\n\
  \    }\nprivate:\n    Ratio m_ratio;\n    double m_calmar;\n    double m_return;\n\
  };\n\ntemplate <>\ndouble CalmarRatio<CalmarRatioBPS>::getDrawDown()\n{\n    return\
  \ m_return / m_calmar * m_ratio.den * 100;\n}\n\n#endif /* CALMARRATIO_H_ */\n\n\
  // CalmarRatio.cpp\n//\n#include \"CalmarRatio.h\"\n#include <iostream>\n\nboost::ratio<1,\
  \ 2> one_half;\nboost::ratio<1, 3> one_third;\n\nvoid createCalmarRatio()\n{\n \
  \   CalmarRatio<CalmarRatioType> ratio(0.15, 11);\n}\n\nvoid printRatios()\n{\n\
  \    CalmarRatio<CalmarRatioPerc> ratio(0.110, 3.12);\n    CalmarRatio<CalmarRatioBPS>\
  \ bpsRatio(480, 2.15);\n    std::cout << \"return: \" << bpsRatio.getReturn()\n\
  \              << \" drawdown: \" << bpsRatio.getDrawDown() << std::endl;\n}\n\n\
  清单 5-3\nCalmarRatio 类\n```\n\n### 运行代码\n\n我们在 UNIX 系统中使用 `gcc` 编译器测试了包含 `CalmarRatio`\
  \ 类及其相关代码的示例应用程序。你可以使用 `make` 等构建系统及其相关的 makefile 来编译前面展示的 `.cpp` 文件。或者，你也可以直接使用编译器通过以下命令行构建应用程序：\n\
  \n```\ngcc -o calmarRatio CalmarRatio.cpp\n```\n\n生成的可执行文件可以从终端调用。它将按以下方式显示卡玛比率的结果：\n\
  \n```\nreturn: 3.12 drawdown: 28.3636\nreturn: 2.15 drawdown: 44.7917\n```\n\n如你所见，代码对参数进行了不同的处理，并根据所使用的卡玛比率类型解释结果。第一个示例使用了\
  \ `CalmarRatioPerc`，将卡玛比率视为应用于百分比。第二个示例使用了 `CalmarRatioBPS` 表示形式，它使用基点而非百分比。然而，结果会根据各自的回报和回撤正确显示。\n\
  \n"
- "# 生成统计数据\n\n使用高斯分布（正态分布）和卡方分布等统计分布创建数据。\n\n### 解决方案\n\n在处理交易算法时，通常在人工生成的价格上测试这些策略的运行情况会非常有用。如果我们考虑市场的大部分短期波动都具有随机成分，那么我们可以使用随机数生成器来近似典型价格相关时间序列的值。\n\
  \n在本节中，我们将研究如何生成基于统计数据的数据，这些数据随后可用于测试交易策略。为此，你可以使用当前可用于在 C++ 中生成统计值的众多库之一。这些库的操作方式与随机数生成器类似，但存在一些差异。传统的随机数生成器用于生成随机整数值。经过一些处理，这些数字可以转换为给定区间（如\
  \ 0 到 1 之间）内均匀分布的随机数。\n\n然而，对于更高级的用途，从一个特定的概率分布生成随机数是很有趣的。这些概率分布基于标准随机过程，包括高斯分布（也称为正态分布）和卡方分布（一种偏态正态分布形式）。参见图\
  \ 5-2。这些分布可用于生成更能代表股票市场的随机数。\n\n![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig2_HTML.jpg](img/323908_2_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2**\n`boost::math` 命名空间中可用的两个概率分布函数（PDF）的图形。上方图形是参数为 0 和 1 的正态分布。下方图形是参数为\
  \ 5 的卡方分布。\n\n在本例中，我将向你展示如何使用 `boost::math` 命名空间，在其中声明一组表示统计分布的对象。为完成此任务使用一个库，可以让你专注于算法的设计，而无需重新实现这样一个在许多编程库中已可用的通用统计工具函数。我还将使用\
  \ `boost::random` 库基于这些分布生成随机数据点。\n\n\n\n## 概率分布\n\n在正式开始之前，我先快速概述一下概率分布及其用途。概率分布是对自然界中频繁出现的参数化随机过程的数学表示。例如，最基本的概率分布是**均匀**分布，在该分布中，函数定义的整体区间内各点出现的概率相同。因此，每次根据此分布（假设其定义域为\
  \ 1 到 2 之间的数字）产生一个新事件时，其值可能是 1 到 2 之间的任意实数，且概率相等。均匀分布扮演着重要角色，因为根据均匀随机概率生成的值可以转换为其他概率分布。\n\
  \n另一个重要的分布是正态（或高斯）分布。正态分布有两个参数：均值（平均值）和标准差。符合正态分布的随机事件在均值附近出现的概率最高，而事件发生在更远位置的概率则迅速降低。由此得到的概率分布呈钟形，以表明概率空间的这一特性。据观察，许多自然现象都遵循正态分布，尤其是在考虑大量观测数据时。图\
  \ 5-2（上图）展示了一个正态（也称为高斯）随机变量的概率密度函数图。\n\n其他概率分布也用于金融应用。你可以在表 5-1 中快速查看最重要的几个分布。每个分布都有常见的用途模式和关联参数，这些参数可用于描述概率范围以及所生成函数的形状。\n\
  \n### 表 5-1：几种常用分布及其参数和对应的 boost::math 标识符\n\n| 分布 | 参数 | boost::math 标识符 |\n| ---\
  \ | --- | --- |\n| 伯努利分布 | 成功概率 | `boost::math::bernoulli_distribution` |\n| 贝塔分布\
  \ | Alpha 和 Beta（实数值） | `boost::math::beta_distribution` |\n| 二项分布 | 试验次数和成功概率 |\
  \ `boost::math::binomial_distribution` |\n| 柯西分布 | 位置和尺度 | `boost::math::cauchy_distribution`\
  \ |\n| 卡方分布 | 自由度 | `boost::math::chi_squared_distribution` |\n| 指数分布 | Lambda（比率）\
  \ | `boost::math::exponential_distribution` |\n| 几何分布 | 成功概率 | `boost::math::geometric_distribution`\
  \ |\n| 超几何分布 | N、K 和试验次数 | `boost::math::hypergeometric_distribution` |\n| 对数正态分布\
  \ | 均值和标准差 | `boost::math::lognormal_distribution` |\n| 逻辑分布 | 均值和尺度 | `boost::math::logistic_distribution`\
  \ |\n| 正态（高斯）分布 | 均值和标准差 | `boost::math::normal_distribution` |\n| 泊松分布 | Lambda（比率）\
  \ | `boost::math::poisson_distribution` |\n| 学生 t 分布 | 自由度（实数值） | `boost::math::students_t_distribution`\
  \ |\n| 三角分布 | 极小值、极大值和中间值 | `boost::math::triangular_distribution` |\n| 均匀分布 | 区间的起点和终点\
  \ | `boost::math::uniform_distribution` |\n\n其中一些函数也可在 STL 的 `<random>` 头文件中使用。然而，为了完整性，我将在本章中也展示如何使用\
  \ Boost 库来计算这些值。要在代码中使用这些概率分布中的某一些，你可以包含头文件 `<boost/math/distributions.hpp>`。首先，你需要确保\
  \ Boost 已正确安装在你的系统上（请查看 [`www.boost.org`](http://www.boost.org) 网站上的安装说明）。表 5-1\
  \ 的最后一列列出了分布的名称。\n\n一旦你导入特定的分布，就可以用它来回答常见的问题，例如：该分布的均值是多少？特定值对应的分位数是多少？特定值的累积分布函数是多少？你将在类\
  \ `DistributionData` 中看到这些问题的一些答案，该类列在这里。\n\n类 `DistributionData` 的另一个职责是根据给定参数，为某些分布生成随机数。当调用分布对象时，会创建特定于分布的随机数。你需要传递一个均匀随机数生成器，该生成器也由\
  \ Boost 提供。你可以将这些值存储在向量中，并在成员函数结束时返回它们。以下是高斯分布数据的工作过程示例。\n\n```\nstd::vector DistributionData::gaussianData(int\
  \ nPoints, double mean, double sigma)\n{\nstd::vector data;\nboost::random::normal_distribution\
  \ distrib(mean, sigma);\nfor (int i=0; i<nPoints; ++i)\n{\ndouble val = distrib(random_generator);\n\
  data.push_back(val);\n}\nreturn data;\n}\n```\n\n另外两种常见的概率分布是伽马分布和对数正态分布。伽马分布可以解释为正态分布的泛化版本，你可以控制概率的形状和尺度。图\
  \ 5-3（上图）展示了一个伽马分布的示例。对数正态分布是正态分布的另一种可能的泛化，可以被解释为若干个正的独立随机变量的乘积。其概率密度函数如图 5-3（下图）所示。对数正态分布被包含在类\
  \ `DistributionData` 支持的分布列表中。\n\n![../images/323908_2_En_5_Chapter/323908_2_En_5_Fig3_HTML.jpg](img/323908_2_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** `boost::math` 命名空间中可用的两个概率密度函数图。上图为参数为 1 和 2 的伽马分布。下图为参数为 0 和 1 的对数正态分布。\n\
  \n### 完整代码\n\n在代码清单 5-4 中，我展示了一个类的实现，该类使用 `boost::random` 模板库中可用的几个概率分布生成数据。主类名为\
  \ `DistributionData`，你可以用它来生成数字，以及计算某些分布的分位数。\n\n\n\n```cpp\n// DistributionData.h\n\
  //\n#ifndef DISTRIBUTIONDATA_H_\n#define DISTRIBUTIONDATA_H_\n#include \n// 负责基于常见概率分布生成数据的类\n\
  //\nclass DistributionData {\npublic:\n// 标准构造函数和析构函数\nDistributionData();\n~DistributionData();\n\
  // 基于给定参数生成随机数据。\n// 每个函数返回一个包含 nPoints 个随机值的向量。\nstd::vector gaussianData(int nPoints,\
  \ double mean, double sigma);\nstd::vector exponentialData(int nPoints, double rate);\n\
  std::vector chiSquaredData(int nPoints, int degreesOfFreedom);\nstd::vector logNormalData(int\
  \ nPoints, double mean, double sigma);\n// 返回给定值 x 对应参数的分位数。\n//\ndouble gaussianQuantile(double\
  \ x, double mean, double sigma);\ndouble chiSquaredQuantile(double x, int degreesOfFreedom);\n\
  double exponentialQuantile(double x, double rate);\ndouble logNormalQuantile(double\
  \ x, double mean, double sigma);\n};\n#endif /* DISTRIBUTIONDATA_H_ */\n// DistributionData.cpp\n\
  //\n#include \"DistributionData.h\"\n#include \nusing boost::math::quantile;\n#include\
  \ \n#include \nstatic boost::rand48 random_generator;\nDistributionData::DistributionData()\n\
  {\n}\nDistributionData::~DistributionData()\n{\n}\nstd::vector DistributionData::gaussianData(int\
  \ nPoints, double mean, double sigma)\n{\nstd::vector data;\nboost::random::normal_distribution\
  \ distrib(mean, sigma);\nfor (int i=0; i DistributionData::exponentialData(int nPoints,\
  \ double rate)\n{\nstd::vector data;\nboost::random::exponential_distribution distrib(rate);\n\
  for (int i=0; i DistributionData::logNormalData(int nPoints, double mean, double\
  \ sigma)\n{\nstd::vector data;\nboost::random::lognormal_distribution distrib(mean,\
  \ sigma);\nfor (int i=0; i DistributionData::chiSquaredData(int nPoints, int degreesOfFreedom)\n\
  {\nstd::vector data;\nboost::random::chi_squared_distribution distrib(degreesOfFreedom);\n\
  for (int i=0; i dist(mean, sigma);\nreturn quantile(dist, x);\n}\ndouble DistributionData::chiSquaredQuantile(double\
  \ x, int degreesOfFreedom)\n{\nboost::math::chi_squared_distribution dist(degreesOfFreedom);\n\
  return quantile(dist, x);\n}\ndouble DistributionData::exponentialQuantile(double\
  \ x, double rate)\n{\nboost::math::exponential_distribution dist(rate);\nreturn\
  \ quantile(dist, x);\n}\ndouble DistributionData::logNormalQuantile(double x, double\
  \ mean, double sigma)\n{\nboost::math::lognormal_distribution dist(mean, sigma);\n\
  return quantile(dist, x);\n}\nnamespace  {\ntemplate \nvoid printData(const string\
  \ &label, const T &data)\n{\ncout << \" \" << label << \":  \";\nfor (auto i : data)\n\
  {\ncout << i << \" \";\n}\ncout << endl;\n}\n}\nint main()\n{\nDistributionData\
  \ dData;\nauto gdata = dData.gaussianData(10, 5, 2);\nprintData(\"gaussian data\"\
  , gdata);\nauto edata = dData.exponentialData(10, 4);\nprintData(\"exponential data\"\
  , edata);\nauto kdata = dData.chiSquaredData(10, 5);\nprintData(\"chi squared data\"\
  , kdata);\nauto ldata = dData.logNormalData(10, 8, 2);\nprintData(\"log normal data\"\
  , ldata);\nreturn 0;\n}\n```\n**清单 5-4** `DistributionData` 类\n\n### 运行代码\n\n你可以使用任何符合标准的\
  \ C++ 编译器编译清单 5-4 中的代码。如前面章节所述，你需要在系统中安装好 `boost`。以下是预期输出示例（具体数值将根据你的具体实现和所使用的随机数而有所不同）：\n\
  \n```\n./distributionData\ngaussian data:  7.12699 5.56941 5.91951 3.44111 4.89098\
  \ 4.95243 7.33077 10.6359 5.00597 3.08975\nexponential data:  0.108161 0.212945\
  \ 0.0355506 0.0165794 0.753239 0.041679 0.219658 0.0610242 0.410622 0.0378433\n\
  chi squared data:  6.12073 2.14098 1.57523 6.49539 3.15154 1.47554 8.39545 9.07183\
  \ 2.77768 5.05356\nlog-normal data:  1573.09 473.919 370.7 1212.54 1530.16 323705\
  \ 2586.73 35919.6 628.913 372.41\n```\n\n### 结论\n\n数值类和函数在金融工程模型的开发中扮演着非常重要的角色。它们为创建复杂的交易策略提供了所需的底层数学支持。在本章中，你探讨了一些最常见的数值库。\n\
  \n首先，我讨论了基于矩阵计算的算法，以及如何使用基于 STL 的容器来表示它们。STL 还提供了丰富的算法，这些算法既可用于数值应用，也可用于其他通用编程任务。接下来，你学习了如何使用\
  \ C++ 模板机制提供的编译时功能。你看到了如何使用这种基于模板的功能来计算数字阶乘的示例。同样的概念也可以扩展到许多其他用途。你还了解了比率模板的使用，以及它们如何表示诸如卡尔玛比率之类的金融概念。\n\
  \n概率分布是数值算法的另一个领域，在金融应用中占有重要地位。投资策略的测试通常涉及随机数据的生成，以此作为模拟可能的经济场景的一种方式。你学习了如何基于一些最常见的概率分布生成随机值。这些分布由一些数值库提供，在本章中，我使用了\
  \ `boost::math` 和 `boost::random` 来实现这一目的。这些库共同提供了一种生成随机数据的方法，以及返回关于特定分布的相关信息，例如均值、标准差、分位数和其他相关属性。\n\
  \n数据可视化是编程的另一个领域，在开发有效的金融算法中非常重要。在下一章中，你将探讨一些编程技术，这些技术举例说明了数据可视化的一些可用选项。你将看到 C++\
  \ 有多种方式将数据输出到图形显示器，既可以使用内部绘图技术，也可以使用外部绘图技术。当你开发新的投资策略时，这些库可以用于可视化你工作的方方面面。\n\n"
- "# 6. 绘制金融数据\n\n在金融编程中，一个非常常见的活动是生成与价格相关的数据，这些数据需要被交易员或其他业务利益相关者可视化。大多数情况下，数据需要以图表的形式绘制出来，以便于可视化。金融数据的可视化策略范围广泛，从简单的每日价格折线图到使用蜡烛图、叠加研究以及其他非传统符号的复杂图形输出。\n\
  \n在本章中，你将看到许多基于价格及相关定量数据分析来创建和显示图表的代码示例。你将学习如何使用几种不同的技术来执行这些任务，包括诸如 `Gnuplot` 之类的外部软件，以及诸如\
  \ `Qt` 等图形化 C++ 库。这两种技术在不同情况下都可能有用，因为它们各有优缺点。\n\n以下是你在本章中将学到的一些内容：\n\n*   如何创建一个提供绘图接口的类\n\
  *   如何使用像 `Gnuplot` 这样的外部绘图应用程序\n*   如何将你的数据转换为外部程序可以理解的格式\n*   如何在 UNIX 和 Windows\
  \ 上绘制 csv（逗号分隔值）文件\n*   如何生成命令来控制开源 `Gnuplot` 应用程序\n*   如何使用开源且跨平台的图形用户界面（GUI）库创建图表\n\
  *   如何使用 `Qt` 生成一个基本的绘图窗口\n\n## 使用 Gnuplot 绘图\n\n使用 `Gnuplot` 创建一个价格图表。\n\n\n\n\
  ### 解决方案\n\nGnuplot 是一个非常流行的软件包，用于根据数学函数和数据点创建图表。你可以独立使用 Gnuplot，也可以将其作为其他应用程序所创建图形的嵌入式查看器。在本节中，你将学习如何生成能轻松通过\
  \ Gnuplot 进行可视化的文件。\n\n使用 Gnuplot 的第一步是确保它已正确安装在你的系统中。你可以通过访问其网站 ([`www.gnuplot.info`](http://www.gnuplot.info))\
  \ 并下载所需文件来轻松安装这个用于数据可视化的包。大多数操作系统（包括 Windows、Mac OS X 和 Linux）都有可用的二进制安装文件。运行安装程序并执行主应用程序，你应该会看到类似图\
  \ 6-1 中显示的屏幕。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig1_HTML.jpg](img/323908_2_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1** 在 Windows 上运行的 Gnuplot 主应用程序\n\n这个基础应用程序由一个简单的 shell 组成，你可以在其中输入一些 Gnuplot\
  \ 能识别的命令。其中最基础的命令是 `plot`，它允许你在屏幕上显示绘图。例如，你可以轻松为数学函数（如正弦或余弦）创建绘图。所需的命令可以在应用程序的主提示符下输入。\n\
  \n```\n> plot sin(x)\n```\n\n你可以在图 6-2 中看到这个简单函数绘图的结果。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig2_HTML.jpg](img/323908_2_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** 使用 Gnuplot 绘制的数学函数 `sin(x)` 的图形\n\n在这个绘图中，你提供了由 `sin(x)` 定义的数学函数，Gnuplot\
  \ 负责创建这些值的图形，默认范围是从 -10 到 10。你可以轻松调整用于确定范围的参数，以及绘图的其他属性，例如标题、图例和两个轴使用的单位。\n\n使用\
  \ Gnuplot 的另一种方式是直接绘制数值数据，而不是数学函数。这可以通过引用 `plot` 命令应导入的文件名来实现。大多数以这种方式导入的数据是 csv（逗号分隔值）格式，尽管\
  \ Gnuplot 不强制要求数据必须是 csv 格式——任何包含按列组织的数值数据的文件都可以。\n\n考虑以下数据作为示例。这些是从 Yahoo! Finance\
  \ 下载的 IBM 股价。\n\n```\nDate,Open,High,Low,Close,Volume,Adj Close\n2014-07-01,181.7,187.27,181.7,186.35,6643100,186.35\n\
  2014-06-30,181.33,181.93,180.26,181.27,4223800,181.27\n2014-06-27,179.77,182.46,179.66,181.71,4575500,181.71\n\
  2014-06-26,180.87,181.37,179.27,180.37,3258500,180.37\n2014-06-25,180.25,180.97,180.06,180.72,2762800,180.72\n\
  2014-06-24,181.5,183,180.65,180.88,3875400,180.88\n2014-06-23,181.92,182.25,181,182.14,3231700,182.14\n\
  2014-06-20,182.59,182.67,181.4,181.55,10686800,181.55\n2014-06-19,184.12,184.47,182.36,182.82,3551100,182.82\n\
  2014-06-18,182.04,183.61,181.79,183.6,3931800,183.6\n2014-06-17,181.9,182.81,181.56,182.26,2445400,182.26\n\
  2014-06-16,182.4,182.71,181.24,182.35,3538700,182.35\n2014-06-13,182,183,181.52,182.56,2773600,182.56\n\
  2014-06-12,182.48,182.55,180.91,181.22,4425300,181.22\n2014-06-11,183.61,184.2,182.01,182.25,4061700,182.25\n\
  2014-06-10,186.2,186.22,183.82,184.29,4154900,184.29\n2014-06-09,186.22,187.64,185.96,186.22,2728400,186.22\n\
  ```\n\n我在此只显示了包含每日股价文件的前几行。你可以将这些数据保存在文件 `IBM.csv` 中，并使用以下命令通过 Gnuplot 将其作为股价绘图的数据源：\n\
  \n```\ngnuplot> set xdata time\ngnuplot> set datafile separator \",\"\ngnuplot>\
  \ set timefmt \"%Y-%m-%d\"\ngnuplot> plot 'IBM.csv' using 1:7 title columnhead with\
  \ lines\n```\n\n> **注意**：运行上述命令时，请确保你位于保存数据文件 (`IBM.csv`) 的同一目录中。另一种方法是使用文件的完整路径，例如\
  \ `\"c:\\\\testdata\\\\IBM.csv\"`（在 Windows 平台上需要使用转义路径分隔符）。\n\n第一个命令用于告诉 Gnuplot\
  \ x 轴的数据是基于时间的。第二个命令定义了文件中使用的分隔符。第三个命令描述了 csv 文件中存储的日期格式。最后，最后一行告诉 Gnuplot 绘制文件\
  \ `IBM.csv` 的内容，使用第 1 列和第 7 列（第 1 列包含日期，而第 7 列包含调整后的收盘价），时间序列的标题由 csv 文件每列的列标题定义。\n\
  \n这些命令将生成图 6-3 中显示的图形。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig3_HTML.jpg](img/323908_2_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** 使用 Gnuplot 绘制的存储在 csv 文件中的 IBM 股票调整后价格图形\n\n图 6-3 中的图形只是 Gnuplot 所能做的一个示例。实际上，可以使用\
  \ `set` 命令调整数百个参数。在这些选项中，你可以找到三维图形、不同颜色和线型等。\n\n为了解决本节中提出的问题，你需要创建一个类，该类接收一些以双精度数或字符串向量形式存在的数据，并生成适合\
  \ Gnuplot 使用的输出数据。我创建了这样一个类，名为 `GnuplotPlotter`，它负责生成 Gnuplot 所需的文件。\n\n该类的操作取决于对\
  \ x 轴和 y 轴数据的确定。该类使用一个构造函数创建，该构造函数将输出文件名作为参数。要定义将在绘图中使用的数据，请使用 `setData` 成员函数。参数必须分别是\
  \ x 维度和 y 维度的数据向量。以下是该类的摘要：\n\n```\nclass GnuplotPlotter {\npublic:\n    GnuplotPlotter(const\
  \ std::string &fileName);\n    GnuplotPlotter(const GnuplotPlotter &p);\n    ~GnuplotPlotter();\n\
  \    GnuplotPlotter &operator=(const GnuplotPlotter &p);\n    void generateCmds(const\
  \ std::string &cmdFileName);\n    void setHeaders(const std::string &xheader, const\
  \ std::string &yheader);\n    void setData(const std::vector &xdata, const std::vector\
  \ &ydata);\n    void setData(const std::vector &xdata, const std::vector &ydata);\n\
  \    void csvWrite();\n    // 私有变量在此处。\n};\n```\n\n要访问类的结果，可以使用两个成员函数。`csvWrite`\
  \ 成员函数将把存储在 `GnuplotPlotter` 中的数据以 csv 格式写入构造函数中指定的文件。第二个成员函数是 `generateCmds`，它允许创建一个包含\
  \ Gnuplot 所需指令的命令文件。这样，你就不必担心绘图的确切语法。这些命令存储在由参数 `cmdFileName` 指定的文件名中。\n\n`main`\
  \ 函数中给出了 `GnuplotPlotter` 类的一个示例。首先，你需要定义两个包含所需数据的向量。在本例中，你将使用由 `sin` 函数生成的数据，该函数返回一个数的三角正弦值。请注意，我们这样做只是为了简化数据测试。然而，数据文件可以包含来自任何来源生成的数字。定义内容后，你可以调用成员函数\
  \ `csvWrite` 和 `generateCmds` 来创建 Gnuplot 所需的文件。你可以在图 6-4 中看到此过程的结果。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig4_HTML.jpg](img/323908_2_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4** 使用 `GnuplotPlotter.cpp` 中创建的测试数据生成的图形\n\n### 完整代码\n\n\n\n\n生成图表和 Gnuplot\
  \ 命令的代码已在 `GnuplotPlotter` 类中实现。你可以将这个类添加到你的项目中，并调用相同的成员函数来生成数据图表（参见清单 6-1）。\n\n\
  ```\n//\n//  GnuplotPlotter.h\n#ifndef __FinancialSamples__GnuplotPlotter__\n#define\
  \ __FinancialSamples__GnuplotPlotter__\n#include \n#include \nclass GnuplotPlotter\
  \ {\npublic:\nGnuplotPlotter(const std::string &fileName);\nGnuplotPlotter(const\
  \ GnuplotPlotter &p);\n~GnuplotPlotter();\nGnuplotPlotter &operator=(const GnuplotPlotter\
  \ &p);\nvoid generateCmds(const std::string &cmdFileName);\nvoid setHeaders(const\
  \ std::string &xheader, const std::string &yheader);\nvoid setData(const std::vector\
  \ &xdata, const std::vector &ydata);\nvoid setData(const std::vector &xdata, const\
  \ std::vector &ydata);\nvoid csvWrite();\nprivate:\nstd::string m_fileName;\nstd::string\
  \ m_xheader;\nstd::string m_yheader;\nstd::vector m_xdata;\nstd::vector m_ydata;\n\
  bool m_isDate;\n};\n#endif /* defined(__FinancialSamples__GnuplotPlotter__) */\n\
  //\n//  GnuplotPlotter.cpp\n#include \"GnuplotPlotter.h\"\n#include \n#include \n\
  #include \n#include \nusing std::ofstream;\nusing std::vector;\nusing std::cout;\n\
  GnuplotPlotter::GnuplotPlotter(const std::string &fileName)\n: m_fileName(fileName),\n\
  m_isDate(false)\n{\n}\nGnuplotPlotter::GnuplotPlotter(const GnuplotPlotter &p)\n\
  : m_fileName(p.m_fileName),\nm_xheader(p.m_xheader),\nm_yheader(p.m_yheader),\n\
  m_xdata(p.m_xdata),\nm_ydata(p.m_ydata),\nm_isDate(p.m_isDate)\n{\n}\nGnuplotPlotter::~GnuplotPlotter()\n\
  {\n}\nGnuplotPlotter &GnuplotPlotter::operator=(const GnuplotPlotter &p)\n{\nif\
  \ (&p != this)\n{\nm_fileName = p.m_fileName;\nm_xheader = p.m_xheader;\nm_yheader\
  \ = p.m_yheader;\nm_xdata = p.m_xdata;\nm_ydata = p.m_ydata;\nm_isDate = p.m_isDate;\n\
  }\nreturn *this;\n}\nvoid GnuplotPlotter::setData(const std::vector &xdata,\nconst\
  \ std::vector &ydata)\n{\nm_xdata = xdata;\nm_ydata = ydata;\nm_isDate = true; //\
  \ 假设 X 轴为日期\n}\nvoid GnuplotPlotter::setData(const std::vector &xdata, const std::vector\
  \ &ydata)\n{\nfor (unsigned i = 0; i < xdata.size(); ++i)\n{\ncout << xdata[i] <<\
  \ “, ” << ydata[i] << endl;\n}\n// 此处嵌入 Gnuplot 命令生成逻辑\n}\nvoid GnuplotPlotter::generateCmds(const\
  \ std::string &cmdFileName)\n{\nofstream cmdFile(cmdFileName.c_str());\nif (!cmdFile)\n\
  {\ncout << “无法生成命令文件” << endl;\nreturn;\n}\ncmdFile << “set xlabel ‘” << m_xheader\
  \ << “’” << endl;\ncmdFile << “set ylabel ‘” << m_yheader << “’” << endl;\ncmdFile\
  \ << “set style data lines” << endl;\ncmdFile << “plot ‘” << m_fileName << “’ using\
  \ 1:2” << endl;\ncmdFile.close();\n}\nvoid GnuplotPlotter::csvWrite()\n{\nofstream\
  \ dataFile(m_fileName.c_str());\nif (!dataFile)\n{\ncout << “无法写入 CSV 文件” << endl;\n\
  return;\n}\nfor (unsigned i = 0; i < m_xdata.size(); ++i)\n{\ndataFile << m_xdata[i]\
  \ << “, ” << m_ydata[i] << endl;\n}\ndataFile.close();\n}\n```\n**清单 6-1** `GnuplotPlotter.h`\
  \ 和 `GnuplotPlotter.cpp`\n\n### 运行代码\n\n清单 6-1 中的代码可以使用免费的 `gcc` 编译器进行编译。该解决方案已在\
  \ Mac OS X 和 Windows 平台上测试通过。例如，你可以使用以下命令创建一个应用程序：\n\n```\ngcc –o gnuplotter gnuplotplotter.cpp\n\
  ```\n\n然后，你可以使用命令行运行该程序：\n\n```\n./gnuplotter\n```\n\n这将生成两个文件：`test.csv` 和 `testcmds.gp`，Gnuplot\
  \ 将使用它们来生成所需的图表。你可以按以下方式在 UNIX 上运行 Gnuplot：\n\n```\ncat testcmds.gp | gnuplot\n\
  ```\n\n在 Windows 平台上，你可以通过以下方式将命令文件加载到 Gnuplot 应用程序中：\n\n```\nc:>  gnuplot\n>  load\
  \ \"testcmds.gp\"\n```\n\n图表将显示在一个单独的窗口中，如图 6-4 所示。\n\n## 从 GUI 绘制数据\n\n创建一个能够通过\
  \ GUI 绘制数据的应用程序。\n\n### 解决方案\n\n虽然能够使用诸如 Gnuplot 之类的外部包创建图表非常棒，但有时需要对图表生成的输出拥有更大程度的控制。如果你无法在\
  \ Gnuplot 中找到使用某个参数来获得所需结果的方法，那么就有必要实现一个基于 C++ 的绘图解决方案。本节将展示如何实现这一目标。\n\nC++ 开发人员可以使用许多图形库，最终的决定主要取决于你的目标环境。不过，在本节中，我将使用\
  \ Qt 库来实现所需的解决方案。Qt 可能是目前最易于使用的图形化编程工具包。你会发现，只需十几行代码，我们就能创建一个完整的应用程序。此外，Qt 在所有主流操作系统上均可使用，因此你的应用程序可以根据需要轻松移植到其他目标平台。\n\
  \n所用的类名为 `QtPlotter`，它通过 `setData` 成员函数接收数据，这与我们在 `GnuplotPlotter` 中的做法相同。然而，实现的主要部分是在\
  \ `PlotWindow` 类中完成的，该类派生自 Qt 框架中的关键类之一 `QMainWindow`。`PlotWindow` 类负责管理窗口，最重要的是，在必要时绘制图表。\n\
  \n绘图功能在 `paintEvent` 成员函数中实现。每当窗口需要重绘自身时，就会调用此成员函数。首先，它绘制 X 轴和 Y 轴，并计算每个轴上一个单位的大小，将此信息存储在名为\
  \ `unitX` 和 `unitY` 的变量中。为了绘制轴线，`paintEvent` 成员函数使用了由 Qt 提供的画家对象（painter object）。`drawLine`\
  \ 成员函数是在给定坐标之间绘制线条的最简单方法，如下列代码所示：\n\n```\n// 定义页边距\ndouble marginX = 10;\ndouble\
  \ marginY = 10;\ndouble lengthX = 500;\ndouble lengthY = 400;\n// 定义坐标轴\nint maxX\
  \ = lengthX, maxY = lengthY;\npainter.drawLine(marginX,marginY, marginX, lengthY+marginY);\n\
  painter.drawLine(marginX,lengthY + marginY, lengthX, lengthY + marginY);\n```\n\n\
  在下一步中，函数 `paintEvent` 沿着坐标轴绘制刻度标记。最后，代码在作为输入提供给图表的点之间绘制线条。\n\n实现的最后一部分封装在 `plotWindowRun`\
  \ 成员函数中，该函数是 `QtPlotter` 类的一部分，如下所示：\n\n```\nint QtPlotter::plotWindowRun()\n{\n\
  char *arg = (char *)\"plotter\";\nint argc = 1;\nQApplication app(argc, &arg);\n\
  app.setApplicationName(\"Qt Plotter\");\nPlotWindow window;\nwindow.resize(600,\
  \ 600);\nwindow.show();\nreturn app.exec();\n}\n```\n\n这段代码完成了创建 Qt 应用程序并在屏幕上显示窗口所需的大部分工作。创建的窗口是我们之前讨论过的\
  \ `PlotWindow` 类，因此图表会按预期显示。`QApplication` 对象是 Qt 框架的一部分。它管理图形应用程序的工作流程，包括菜单和窗口。创建\
  \ `QApplication` 时，我们可以通过 `setApplicationName` 成员函数确定应用程序的名称。最后，我们调整绘图窗口的大小并显示它，然后调用\
  \ `exec` 成员函数来启动窗口显示循环。\n\n图 6-5 显示了此代码的结果。\n\n![../images/323908_2_En_6_Chapter/323908_2_En_6_Fig5_HTML.jpg](img/323908_2_En_6_Fig5_HTML.jpg)\n\
  **图 6-5** 由 `QtPlotter` 类生成的图表\n\n### 完整代码\n\n`QtPlotter` 类，如清单 6-2 所示，实现了在 Qt 窗口中显示图表所需的功能，如上节所述。要编译此代码，你需要在系统中安装\
  \ Qt 库。\n\n\n```cpp\n//\n//  QtPlotter.h\n#ifndef __FinancialSamples__QtPlotter__\n\
  #define __FinancialSamples__QtPlotter__\n\n#include \n#include \n\nclass QtPlotter\
  \ {\npublic:\n    QtPlotter();\n    QtPlotter(const QtPlotter &p);\n    ~QtPlotter();\n\
  \    QtPlotter &operator=(const QtPlotter &p);\n    void setData(const std::vector\
  \ &xdata, const std::vector &ydata);\n    int plotWindowRun();\n\nprivate:\n   \
  \ std::vector m_xdata;\n    std::vector m_ydata;\n};\n\n#endif /* defined(__FinancialSamples__QtPlotter__)\
  \ */\n\n//\n//  QtPlotter.cpp\n#include \"QtPlotter.h\"\n#include \n#include \n\
  #include \n#include \n#include \n#include \n\nusing std::vector;\n\nclass PlotWindow\
  \ : public QMainWindow {\npublic:\n    PlotWindow();\n    ~PlotWindow();\n    void\
  \ paintEvent(QPaintEvent *event);\n    void setData(const vector &xdata, const vector\
  \ &ydata);\n\nprivate:\n    vector m_xdata;\n    vector m_ydata;\n};\n\nPlotWindow::PlotWindow()\n\
  {\n}\n\nPlotWindow::~PlotWindow()\n{\n}\n\nvoid PlotWindow::setData(const vector\
  \ &xdata, const vector &ydata)\n{\n    m_xdata = xdata;\n    m_ydata = ydata;\n\
  }\n\nvoid PlotWindow::paintEvent(QPaintEvent *event)\n{\n    QMainWindow::paintEvent(event);\n\
  \    QPainter painter(this);\n\n    // 设置边距\n    double marginX = 10;\n    double\
  \ marginY = 10;\n    double lengthX = 500;\n    double lengthY = 400;\n\n    //\
  \ 定义坐标轴\n    int maxX = lengthX, maxY = lengthY;\n    painter.drawLine(marginX,marginY,\
  \ marginX, lengthY+marginY);\n    painter.drawLine(marginX,lengthY + marginY, lengthX,\
  \ lengthY + marginY);\n\n    // 确定单位\n    int largeX = 0, largeY = 0;\n    double\
  \ largeXd = 0, largeYd = 0;\n    for (unsigned i=1; i &xdata, const std::vector\
  \ &ydata)\n{\n    m_xdata = xdata;\n    m_ydata = ydata;\n}\n\nint QtPlotter::plotWindowRun()\n\
  {\n    char *arg = (char *)\"plotter\";\n    int argc = 1;\n    QApplication app(argc,\
  \ &arg);\n    app.setApplicationName(\"Qt Plotter\");\n    PlotWindow window;\n\
  \    window.resize(600, 600);\n    window.show();\n    return app.exec();\n}\n\n\
  int main()\n{\n    QtPlotter plotter;\n    vector xdata;\n    vector ydata;\n  \
  \  for (int i=0; i<100; ++i)\n    {\n        double x = i*10/100.0;\n        xdata.push_back(x);\n\
  \        ydata.push_back(sin(x)+1);\n    }\n    plotter.setData(xdata, ydata);\n\
  \    return plotter.plotWindowRun();\n}\n```\n\n**清单 6-2**\n`QtPlotter.h` 与 `QtPlotter.cpp`\n\
  \n### 运行代码\n\n要使用 `QtPlotter` 类，你需要在系统中安装 Qt4 库。安装过程要求你访问开发者网站（[`www.qt.io/developers/`](http://www.qt.io/developers/)），下载并运行安装程序。安装完成后，这些库将被复制到用户定义的文件夹中。\n\
  \n下一步是告知你的编译器或集成开发环境（IDE）这些库所在的位置。两个主要的参数是包含路径（供编译器使用）和链接路径（供链接器使用）。例如，如果 Qt4 安装在目录\
  \ `/usr/local/qt4` 下，则包含路径应为 `/usr/local/qt4/include`，链接路径应为 `/usr/local/qt4/lib`。从库目录来看，至少需要两个库：`libQtCore`\
  \ 和 `libQtGui`。关于如何为特定系统（如 Windows）链接 Qt 库的详细信息，你可以参考 Qt 文档。例如，使用 gcc 编译和链接应用程序时，以下命令行将提供必要的信息：\n\
  \n```\n$ gcc -o qtExample QtPlotter.cpp -I/usr/local/qt4/include –L/usr/local/qt4/lib\
  \ –lQtGui -lQtCore\n```\n\n### 结论\n\n在本章中，你学习了几种使用 C++ 绘制金融数据的技术。可视化是在制定高效投资策略时不容忽视的因素之一。你的可视化工具越强大，就越容易发现市场中的趋势和机会。尽管有许多免费和商业化的替代方案来显示股票图表，但我们经常需要以更灵活的方式呈现数据。\n\
  \n本章开头，我介绍了一种使用 Gnuplot 创建数值图的方法。Gnuplot 是一个免费且广泛使用的数据可视化软件包，可在大多数操作系统上运行，包括 Windows、Mac\
  \ OS X 和 UNIX。你已经了解了如何创建一个封装了在 Gnuplot 中创建图形所需信息的类。\n\n下一节为你提供了另一种创建金融图表的方法，即使用一个名为\
  \ Qt 的 C++ 图形库。你可以利用底层框架的高度可移植性，在多个平台上使用此类代码。这里介绍的 `QtPlotter` 类提供一个接口，你的程序可以使用该接口，基于\
  \ x 轴和 y 轴的值来显示单个图表。\n\n金融领域的许多算法都依赖于方程组的求解，而这些方程组又基于线性代数的概念。对于金融行业的开发者来说，掌握线性代数的基础知识及其软件实现是非常有用的。这些概念可以被视为金融工程师所使用的构建模块，并且可以在\
  \ C++ 中轻松访问。在下一章中，你将看到一些作为金融应用一部分、运用线性代数概念的编程示例。\n\n"
- "# 7. 线性代数\n\n线性代数是一套基础的数学工具，广泛应用于科学和工程的许多领域。因此，线性代数（LA）技术也在金融编程实践中扮演着重要角色，并经常用于金融工程领域。基于\
  \ LA 的技术常用于开发交易策略。\n\n作为 C++ 程序员，理解如何将传统的线性代数方法集成到金融应用中至关重要。为了实现这一目标，我提供了一些示例，展示如何将一些最常用的\
  \ LA 算法与其他 C++ 库结合使用。在本章中，你还会学习如何将现有的 LA 库集成到你的代码中，特别关注 boost 库中包含的 uBLAS 库。\n\n\
  以下是本章涉及的一些主题：\n\n- **线性代数的基本运算**：你将在代码中学习如何使用线性代数的基础函数。\n- **BLAS（基础线性代数子程序）库概述**：BLAS\
  \ 是一套著名的函数集，如今已成为 LA 实现的标准。你将了解 BLAS 支持的三个级别及其功能。\n- **uBLAS**：BLAS 是一个基于函数的库，已被用于\
  \ Fortran 和 C 等语言中。为了运用现代 C++ 的高级概念，boost 项目创建了一个新的实现。你将了解 uBLAS 库如何实现与 BLAS 相同的概念。\n\
  - **计算行列式**：在分析一组线性方程时，计算矩阵的行列式是最常见的任务之一。你将学习如何使用 uBLAS 执行此类 LA 计算。\n- **标准类型与 uBLAS\
  \ 类型之间的转换**：你将看到如何将 `std::vector` 等标准类型转换为更适合 LA 计算的类型。\n\n## 使用基本线性代数运算\n\n创建一个执行基本\
  \ LA 运算（如向量积和标量积）的类。\n\n\n### 解决方案\n\n线性代数已被广泛用于解决大量工程和科学问题。因此，这些概念也经常被应用于金融应用中。计算线性代数的基础层面涉及标量和向量，以及对这些数学实体允许的操作。\n\
  \n标量是由单一测量值构成的量。通常，它不需要创建单独的类，因为可以轻松地用整数、浮点数或双精度数来表示。此类量通常也作为单一元素存储。标量数字拥有相关的传统运算性质，如加法、减法、乘法和除法。\n\
  \n在 C++ 实现中，标量的使用无需特殊处理，尽管某些类可能将标量参数作为模板参数，以便日后处理不同类型。例如，这在数值库中很常见：\n\n```cpp\n\
  template <class Scalar>\nclass MyNumericClass {\n    void aFunction(Scalar parameter);\n\
  public:\n    Scalar m_internalVar;\n};\n```\n\n在这种情况下，`Scalar` 类型充当了 C++ 支持的类型（如\
  \ `int`、`float` 或 `long double`）之一的占位符。这样，你就可以根据计算所需的实际类型轻松参数化数值类，并避免不必要的数值类型转换，转换可能会给计算引入意外错误。\n\
  \nLA 操作的下一个层级包括向量的组合，使用向量加法、向量积和标量乘法。起初，你可能会考虑使用 `std::vector` 来执行这些操作；然而，`std::vector`\
  \ 是一个通用容器，并非为数学处理而优化。\n\nLA 实现的传统解决方案是使用 BLAS（基本线性代数子程序）库。BLAS 是一个流行的软件包，最初用 Fortran\
  \ 实现，但后来已成为其他语言的 LA 计算标准。其 C 语言版本是通过 Fortran 的 `f2c` 转换器创建的。由于许多 LA 包都依赖 BLAS 提供的功能，因此在必要时已创建了其他库来模拟它。\n\
  \n在本节中，我将介绍一个实现了 BLAS 大部分功能的 C++ 库。uBLAS 库是 Boost 的一部分，通过包含 `<boost/numeric/ublas/vector.hpp>`\
  \ 等头文件即可访问。\n\nBLAS 及类似库根据支持级别进行组织，范围从 1 到 3。BLAS 支持级别包括以下内容：\n\n*   **级别 1**：支持使用标量数字和向量的操作。在此级别，库为一维数值向量提供支持，包含常见操作，如标量乘法和向量积。\n\
  *   **级别 2**：在第二级别，兼容 BLAS 的库提供执行涉及向量和矩阵的计算的函数——例如，向量 `v` 与矩阵 `A` 的常见乘法，可以（产生不同结果）以\
  \ `vA` 或 `Av` 的形式执行。\n*   **级别 3**：BLAS 的第三级定义为矩阵-矩阵操作。例如，它允许矩阵相乘。\n\n这三个 BLAS 支持级别已在多个受原始\
  \ BLAS 启发而开发的库中实现。此类实现主要旨在有效支持新的编程语言、架构和处理器，同时保持与许多依赖 BLAS 的数值算法的兼容性。Boost uBLAS\
  \ 库的目的是提供与 BLAS 相同的支持级别，同时利用 C++ 类和模板提供的表达能力。\n\n在此示例中，你将探索一个名为 `VectorOperations`\
  \ 的类，它负责实现级别 1 的 BLAS 操作。这意味着它必须处理向量和标量数字，以及它们之间允许的变换。根据 BLAS 文档，我们有以下操作类别：\n\n\
  *   **交换**：将第一个向量中的元素切换至第二个向量。\n*   **缩放**：将向量的所有元素乘以单个标量数字。\n*   **复制**：将第一个向量的元素复制到第二个目标向量中。\n\
  *   **向量加法**：返回一个向量，其分量是两个输入向量的逐元素相加结果。\n*   **点积**：执行内积的数学运算，对于两个向量 `v` 和 `w`，使用以下公式定义：\n\
  \n![$$ p(v, w) = \\sum_i (v_i + w_i) $$](img/323908_2_En_7_Chapter_TeX_Equa.png)\n\
  \n*   **范数**：向量的范数是量化向量在特定方向长度的一种方式。一种常见的范数是两点之间的二维距离。\n\n在 `VectorOperations` 的实现中，你将看到如何使用\
  \ uBLAS 访问其中一些操作。第一个这样的操作是向量与标量的乘法。方法签名如下：\n\n```cpp\nstd::vector<double> scalarMult(double\
  \ scalar);\n```\n\n此方法的目的是返回一个 `std::vector` 对象，其中每个成员都是原始向量中元素的缩放版本。该实现展示了如何在这些不同的向量类型之间进行转换。\n\
  \n```cpp\nstd::vector<double> VectorOperations::scalarMult(double scalar)\n{\n \
  \   using namespace boost::numeric::ublas;\n    vector<double> vx;\n    std::copy(m_data.begin(),\
  \ m_data.end(), vx.end());\n    vector<double> res = vx * scalar;\n    std::vector<double>\
  \ v;\n    std::copy(res.begin(), res.end(), v.end());\n    return v;\n}\n```\n\n\
  第一步是从 `boost::numeric::ublas` 命名空间创建一个向量。请注意，此函数使用了 `using` 声明以避免繁琐的命名空间序列。下一步是将原始\
  \ `std::vector` 复制到 `ublas` 向量中。最后，使用乘法运算符执行标量操作。为了存储结果，构建了一个名为 `res` 的新 `ublas`\
  \ 向量。最后一步是将结果复制到新向量中并返回结果。\n\n上述算法创建了许多临时变量，因此对于实际实现来说效率不高。然而，我们从标准向量转换为 `ublas`\
  \ 向量这一事实，其优点在于可以突出每种向量类型能够做什么。然而，在实现更复杂的 LA 算法时，我们应该避免创建任何不必要的临时变量，因为对于大型向量和矩阵，它们可能会占用大量空间。\n\
  \n`VectorOperations` 类为你在 BLAS 级别 1 中会发现的其他常见操作提供了类似的示例，例如使用 `ublas` 运算符快速执行这些计算的\
  \ `addVector` 和 `subtractVector`。`dotProduct` 成员函数使用 `ublas` 中的 `inner_prod` 函数来实现点积（也称为向量间的内积操作）。最后，我们还有\
  \ `norm` 成员函数的示例，它使用 `norm_2` 函数返回向量的长度。\n\n### 完整代码\n\n上一节中描述的向量操作已在 `VectorOperations`\
  \ 类中实现，如列表 7-1 所示。在你的系统中安装 Boost 库后，你应该能够使用任何符合标准的 C++ 编译器来编译该类。\n\n\n\n```cpp\n\
  //\n//  VectorOperations.h\n#ifndef __FinancialSamples__VectorOperations__\n#define\
  \ __FinancialSamples__VectorOperations__\n#include \n// 使用 boost ublas 对 std::vector\
  \ 执行操作\nclass VectorOperations {\npublic:\nVectorOperations(const std::vector &v);\n\
  VectorOperations(const VectorOperations &p);\n~VectorOperations();\nVectorOperations\
  \ &operator=(const VectorOperations &p);\nstd::vector scalarMult(double scalar);\n\
  std::vector addVector(const std::vector &v);\nstd::vector subtractVector(const std::vector\
  \ &v);\ndouble dotProd(const std::vector &v);\ndouble norm();\nprivate:\nstd::vector\
  \ m_data;\n};\n#endif /* defined(__FinancialSamples__VectorOperations__) */\n//\n\
  //  VectorOperations.cpp\n#include \"VectorOperations.h\"\n#include \nVectorOperations::VectorOperations(const\
  \ std::vector &p)\n: m_data(p)\n{\n}\nVectorOperations::VectorOperations(const VectorOperations\
  \ &p)\n: m_data(p.m_data)\n{\n}\nVectorOperations::~VectorOperations()\n{\n}\nVectorOperations\
  \ &VectorOperations::operator=(const VectorOperations &p)\n{\nif (this != &p)\n\
  {\nm_data = p.m_data;\n}\nreturn *this;\n}\nstd::vector VectorOperations::scalarMult(double\
  \ scalar)\n{\nusing namespace boost::numeric::ublas;\nvector vx;\nstd::copy(m_data.begin(),\
  \ m_data.end(), vx.end());\nvector res = vx * scalar;\nstd::vector v;\nstd::copy(res.begin(),\
  \ res.end(), v.end());\nreturn v;\n}\nstd::vector VectorOperations::addVector(const\
  \ std::vector &vec)\n{\nusing namespace boost::numeric::ublas;\nvector v1;\nstd::copy(m_data.begin(),\
  \ m_data.end(), v1.end());\nvector v2;\nstd::copy(vec.begin(), vec.end(), v2.end());\n\
  vector v3 = v1 + v2;\nstd::vector v;\nstd::copy(v3.begin(), v3.end(), v.end());\n\
  return v;\n}\ndouble VectorOperations::norm()\n{\nusing namespace boost::numeric::ublas;\n\
  vector v1;\nstd::copy(m_data.begin(), m_data.end(), v1.end());\ndouble res = norm_2(v1);\n\
  return res;\n}\nstd::vector VectorOperations::subtractVector(const std::vector &vec)\n\
  {\nusing namespace boost::numeric::ublas;\nvector v1;\nstd::copy(m_data.begin(),\
  \ m_data.end(), v1.end());\nvector v2;\nstd::copy(vec.begin(), vec.end(), v2.end());\n\
  vector v3 = v1 - v2;\nstd::vector v;\nstd::copy(v3.begin(), v3.end(), v.end());\n\
  return v;\n}\ndouble VectorOperations::dotProd(const std::vector &v)\n{\nusing namespace\
  \ boost::numeric::ublas;\nvector v1;\nstd::copy(m_data.begin(), m_data.end(), v1.end());\n\
  vector v2;\nstd::copy(v.begin(), v.end(), v2.end());\ndouble res = inner_prod(v1,\
  \ v2);\nreturn res;\n}\n```\n清单 7-1 `VectorOperations.h` 和 `VectorOperations.cpp`\n\
  \n## 使用面向矩阵的操作\n\n在本节中，我们将创建一个类来执行与 BLAS 兼容的矩阵操作。\n\n### 解决方案\n\n正如你从清单 7-1 中了解到的，LA\
  \ 函数旨在与使用标量、向量和矩阵的线性算子配合使用。为了支持这些操作，程序员使用一组与原始 BLAS 库兼容的函数。在 C++ 中，我们可以使用一些实现了 BLAS\
  \ 的库，包括你一直在使用的来自 boost 的 uBLAS 库。\n\nBLAS 的第二级负责为矩阵-向量运算提供支持。在本例中，你将看到如何实现使用该级 BLAS\
  \ 的函数。你将使用 boost uBLAS 来访问这个功能。\n\n在 BLAS 的第二级，目标是允许向量和矩阵的组合。为了实现这一点，uBLAS 实现了一些更高级别的类，这些类整合了\
  \ BLAS 框架中定义的概念。以下是使用到的一些最重要的类：\n\n- `Vector`：上一节已经讨论过这个类，它充当向量数据的通用容器。其他一些类对 `Vector`\
  \ 的通用功能施加了限制。\n- `稀疏向量`：`Vector` 的一个专门版本，允许以稀疏方式表示数据。当向量中非零元素的数量与数组大小相比很小时，可以使用该类。\n\
  - `Matrix`：这是表示二维数值排列的主要类，是矩阵的传统表示形式。\n- `三角矩阵`：此类用于表示数据仅存储在主对角线或主对角线以上的矩阵（对于上三角矩阵）。你还可以使用\
  \ uBLAS 创建下三角矩阵。\n- `对称矩阵`：此类矩阵的元素关于对角线对称。此类用于在利用此特性的算法中表示这种类型的矩阵。\n- `埃尔米特矩阵`：埃尔米特矩阵具有其元素为复数且基于共轭复数概念存在对称性的特性。也就是说，对于位置\
  \ `[i,j]` 的每个元素，对应的元素 `[j,i]` 是其共轭复数。\n- `带状矩阵`：此类表示稀疏矩阵，其中非零元素存储在主对角线附近的一个窄带中。创建矩阵时可以指定带状的大小。\n\
  - `稀疏矩阵`：表示通用稀疏矩阵的类——即大多数元素为零的矩阵。通过使用稀疏矩阵，可以避免在内存中存储大量零值。\n\n使用这些类，你可以轻松地利用最适合当前任务的数据表示方式来存储数据。使用正确的表示方式还可以让你在找到正确的算法方面获得巨大优势，因为\
  \ uBLAS 会根据所使用的数据类型自动提供其运算符的专用版本。例如，如果已知一个矩阵是三角矩阵，那么在求解方程组时就有可能加快某些计算速度。这意味着使用 `TriangularMatrix`\
  \ 而不是通用的 `Matrix` 可以让你的代码得到显著的加速。\n\n为了探索矩阵可用的操作，我介绍一个名为 `MatrixOperations` 的类。这个类能够将参数转换为\
  \ uBLAS 所需的类。它还负责对这些转换后的参数调用 uBLAS 运算符。使用这个类，你可以轻松地测试多个对矩阵参数进行操作的函数。\n\n在 uBLAS\
  \ 中与矩阵相关的主要函数和运算符中，你将找到以下内容：\n\n- **标量乘法**：将矩阵乘以标量是一个简单的过程，因为它使用了 C++ 中的标准乘法运算符。你只需将乘法的结果保存到一个新的矩阵变量中即可。\n\
  - **向量乘法**：将矩阵乘以向量是一种常见操作。你可以使用 `prod` 函数来执行此操作。乘积可以通过两种方式执行：前置乘法要求向量作为 `prod` 函数的第一个参数；你也可以对向量进行后置乘法，此时向量作为\
  \ `prod` 函数的第二个参数传入。\n- **矩阵乘法**：你还可以将两个矩阵相乘。这将得到第三个矩阵，其大小由两个原始矩阵的大小决定。你可以使用 `prod`\
  \ 函数的重载版本来执行乘法操作。\n- **逐元素乘法**：此操作对矩阵中每个对应的元素执行乘法。也就是说，给定矩阵 `A` 和 `B`，结果矩阵 `C` 由元素\
  \ `C[i,j] = A[i,j] + B[i,j]` 组成。\n- **转置**：矩阵的转置是一个简单的操作，即将元素 `A[i,j]` 与 `A[j,i]`\
  \ 互换。这会产生一个围绕主对角线对原始矩阵进行转置后的矩阵。\n\n\n\n在`MatrixOperations`类中，您将找到这些操作的示例。`MatrixOperations`成员函数的参数和返回值以标准向量（`std::vector`）或`Matrix`对象（您在第\
  \ 5 章中了解过）的形式给出。虽然在高性能代码中应避免这种转换，但您可以将其视为创建 uBLAS 中声明的类型对象所需的一个示例。例如，考虑`transpose`方法。\n\
  \n```\nMatrix MatrixOperations::transpose()\n{\n    using namespace ublas;\n   \
  \ int d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n    matrix M(d1, d2);\n\
  \    for (int i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2; ++j) {\n  \
  \          M(i, j) = m_rows[i][j];\n        }\n    }\n    matrix mp = trans(M);\n\
  \    return fromMatrix(mp);\n}\n```\n\n第一步是确定需要构建的矩阵的大小，由维度`d1`和`d2`给出。利用此信息，您可以创建一个新的`ublas::matrix`对象。然后，您将使用存储在`m_rows`成员变量中的数据初始化该矩阵。最后，您可以调用\
  \ uBLAS 中的`trans`函数，该函数负责对其参数进行转置操作。最后一步是将 uBLAS 表示转换为`Matrix`对象，由`fromMatrix`函数执行。\n\
  \n### 完整代码\n\n清单 7-2 展示了`MatrixOperations`类的实现。该代码使用了第 5 章中实现的`Matrix`类，因此您需要将其添加到编译行中。\n\
  \n```\n//\n//  MatrixOperations.h\n#ifndef __FinancialSamples__MatrixOperations__\n\
  #define __FinancialSamples__MatrixOperations__\n#include <vector>\n#include \"Matrix.h\"\
  \nclass MatrixOperations {\npublic:\n    MatrixOperations();\n    ~MatrixOperations();\n\
  \    MatrixOperations(const MatrixOperations &p);\n    MatrixOperations &operator=(const\
  \ MatrixOperations &p);\n    void addRow(const std::vector<double> &row);\n    Matrix\
  \ multiply(Matrix &m);\n    Matrix transpose();\n    Matrix elementwiseMultiply(Matrix\
  \ &m);\n    Matrix scalarMultiply(double scalar);\n    std::vector<double> preMultiply(const\
  \ std::vector<double> &v);\n    std::vector<double> postMultiply(const std::vector<double>\
  \ &v);\nprivate:\n    std::vector< std::vector<double> > m_rows;\n};\n#endif /*\
  \ defined(__FinancialSamples__MatrixOperations__) */\n//\n//  MatrixOperations.cpp\n\
  #include \"MatrixOperations.h\"\n#include <iostream>\n#include <boost/numeric/ublas/matrix.hpp>\n\
  #include <boost/numeric/ublas/io.hpp>\nnamespace ublas = boost::numeric::ublas;\n\
  using std::cout;\nusing std::endl;\nMatrixOperations::MatrixOperations()\n{\n}\n\
  MatrixOperations::~MatrixOperations()\n{\n}\nvoid MatrixOperations::addRow(const\
  \ std::vector<double> &row)\n{\n    m_rows.push_back(row);\n}\nstatic Matrix fromMatrix(const\
  \ ublas::matrix<double> &mp)\n{\n    using namespace ublas;\n    int d1 = mp.size1();\n\
  \    int d2 = mp.size2();\n    Matrix res(d1, d2);\n    for (int i = 0; i < d1;\
  \ ++i) {\n        for (int j = 0; j < d2; ++j) {\n            res.set(i, j, mp(i,\
  \ j));\n        }\n    }\n    return res;\n}\nMatrix MatrixOperations::elementwiseMultiply(Matrix\
  \ &m)\n{\n    using namespace ublas;\n    int d1 = m_rows.size();\n    int d2 =\
  \ m_rows[0].size();\n    matrix<double> M(d1, d2);\n    for (int i = 0; i < d1;\
  \ ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M(i, j) = m_rows[i][j];\n\
  \        }\n    }\n    matrix<double> M2(d1, d2);\n    for (int i = 0; i < d1; ++i)\
  \ {\n        for (int j = 0; j < d2; ++j) {\n            M2(i, j) = m.get(i, j);\n\
  \        }\n    }\n    matrix<double> mp = element_prod(M, M2);\n    return fromMatrix(mp);\n\
  }\nMatrix MatrixOperations::transpose()\n{\n    using namespace ublas;\n    int\
  \ d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n    matrix<double> M(d1,\
  \ d2);\n    for (int i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2; ++j)\
  \ {\n            M(i, j) = m_rows[i][j];\n        }\n    }\n    matrix<double> mp\
  \ = trans(M);\n    return fromMatrix(mp);\n}\nMatrix MatrixOperations::multiply(Matrix\
  \ &m)\n{\n    using namespace ublas;\n    int d1 = m_rows.size();\n    int d2 =\
  \ m_rows[0].size();\n    matrix<double> M(d1, d2);\n    for (int i = 0; i < d1;\
  \ ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M(i, j) = m_rows[i][j];\n\
  \        }\n    }\n    matrix<double> M2(d1, d2);\n    for (int i = 0; i < d1; ++i)\
  \ {\n        for (int j = 0; j < d2; ++j) {\n            M2(i, j) = m.get(i, j);\n\
  \        }\n    }\n    matrix<double> mp = prod(M, M2);\n    return fromMatrix(mp);\n\
  }\nMatrix MatrixOperations::scalarMultiply(double scalar)\n{\n    using namespace\
  \ ublas;\n    int d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n    matrix<double>\
  \ M(d1, d2);\n    for (int i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2;\
  \ ++j) {\n            M(i, j) = m_rows[i][j];\n        }\n    }\n    matrix<double>\
  \ mp = scalar * M;\n    return fromMatrix(mp);\n}\nstd::vector<double> MatrixOperations::preMultiply(const\
  \ std::vector<double> &v)\n{\n    using namespace ublas;\n    ublas::vector<double>\
  \ vec;\n    std::copy(v.begin(), v.end(), vec.end());\n    int d1 = m_rows.size();\n\
  \    int d2 = m_rows[0].size();\n    ublas::matrix<double> M(d1, d2);\n    for (int\
  \ i = 0; i < d1; ++i) {\n        for (int j = 0; j < d2; ++j) {\n            M(i,\
  \ j) = m_rows[i][j];\n        }\n    }\n    ublas::vector<double> pv = prod(vec,\
  \ M);\n    std::vector<double> res;\n    std::copy(pv.begin(), pv.end(), res.end());\n\
  \    return res;\n}\nstd::vector<double> MatrixOperations::postMultiply(const std::vector<double>\
  \ &v)\n{\n    using namespace ublas;\n    ublas::vector<double> vec;\n    std::copy(v.begin(),\
  \ v.end(), vec.end());\n    int d1 = m_rows.size();\n    int d2 = m_rows[0].size();\n\
  \    ublas::matrix<double> M(d1, d2);\n    for (int i = 0; i < d1; ++i) {\n    \
  \    for (int j = 0; j < d2; ++j) {\n            M(i, j) = m_rows[i][j];\n     \
  \   }\n    }\n    ublas::vector<double> pv = prod(M, vec);\n    std::vector<double>\
  \ res;\n    std::copy(pv.begin(), pv.end(), res.end());\n    return res;\n}\nint\
  \ main()\n{\n    MatrixOperations op;\n    for (int i=0; i<5; ++i) {\n        std::vector<double>\
  \ row;\n        for (int j=0; j<5; ++j) {\n            row.push_back(sin((double)j+i));\n\
  \        }\n        op.addRow(row);\n    }\n    op.transpose();\n    Matrix res\
  \ = op.scalarMultiply(12);\n    return 0;\n}\n```\n\n*清单 7-2 `MatrixOperations.h`和`MatrixOperations.cpp`*\n\
  \n### 运行应用程序\n\n清单 7-2 中显示的代码可以使用任何符合标准的 C++编译器进行编译。您需要在系统中安装`boost`才能访问 uBLAS（我使用了\
  \ 1.55 版本，在 Windows MingW 和 Mac OS X 上测试过）。例如，在 UNIX 系统上使用`gcc`编译器可以通过以下命令完成：\n\n\
