  \ pValue = futureValue / pow(1+m_rate, timePeriod);\nstd::cout \n// 主函数接收传递给程序的参数\n\
  int main(int argc, const char * argv[])\n{\nif (argc != 2)\n{\nstd::cout \" > period;\n\
  if (period == -1) {\nbreak;\n}\ndouble value;\nstd::cin >> value;\ncfc.addCashPayment(value,\
  \ period);\n} while (1);\ndouble result = cfc.presentValue();\nstd::cout << \" 现值为\
  \ \" << result << std::endl;\nreturn 0;\n}\n清单 1-4\nCashFlowCalculator.h\n```\n\n\
  ### 运行代码\n\n该程序可以使用符合标准的 C++ 编译器进行编译，例如 Linux 或 Mac OS X 上的 GCC。编译后的程序可以通过以下方式运行：\n\
  \n```\n./presentValue 0.08\n1 200\n2 300\n3 500\n4 -1000\n\nvalue 190.476\nvalue\
  \ 272.109\nvalue 431.919\nvalue -822.702\nThe present value is 71.8014\n```\n\n\
  前几行显示了程序的输入内容。命令行参数（本例中为 `0.08`）是所需的利率——它被用作类构造函数的参数。接下来的几行是时间周期和付款值的序列。序列的最后一行用数字\
  \ `-1` 标记。当读取到此数字时，程序停止读取输入，并开始按照接收顺序计算给定现金流的现值。\n\n最后几行显示程序的输出结果。代码会打印现金流中每个组成部分的现值。最后，它会打印整个付款序列的现值。要使用此程序验证常见的固定收益工具（如贷款），你应该输入每对时间周期-付款值。计算结束时，现值应合计为零（或由于可能的数值不准确性而接近于零）。\n\
  \n## 债券建模\n\n债券是一种非常常见的固定收益工具。全球的大型企业和政府都使用它们来吸引长期偿还的现金投资。作为交换，它们提供定期票息的保证支付。大多数债券的到期时间（即付清时间）在\
  \ 5 到 30 年之间。\n\n### 问题\n\n创建一个 C++ 类来模拟债券工具并确定其年利率。\n\n### 解决方案\n\n债券的结构是这样的：投资者在债券期限开始时存入本金。通常，本金在到期时全额偿还。在初始投资和到期日之间的这段时间内，投资者会获得一个固定值，也称为票息价值，它决定了债券支付的利率。\n\
  \n例如，考虑一笔面值 $100,000、为期 30 年、年票息为 $5,000 的 XYZ 公司债券投资。这相当于一项固定收益投资，对本金支付 5% 的利息。XYZ\
  \ 公司有权在规定期限内使用本金，而本金总额将在 30 年后到期时返还给投资者。\n\n要使用 C++ 对此类投资进行建模，你可以创建一个包含所需信息的类，例如本金、票息价值和到期期限。该类的声明如下：\n\
  \n```\nclass BondCalculator {\npublic:\nBondCalculator(const std::string institution,\
  \ int numPeriods, double principal, double couponValue);\nBondCalculator(const BondCalculator\
  \ &v);\nBondCalculator &operator =(const BondCalculator &v);\n~BondCalculator();\n\
  double interestRate();\nprivate:\nstd::string m_institution;\ndouble m_principal;\n\
  double m_coupon;\nint m_numPeriods;\n};\n```\n\n此类拥有成员变量，用于存储发行该债券的机构名称（称为发行人）、所投资的本金、票息金额以及期数（通常以年为单位）。该类可用于记录债券投资信息，作为跟踪此类固定收益投资的应用程序的一部分。`interestRate`\
  \ 方法可用于返回票息所隐含的内部收益率。\n\n### 完整代码\n\n清单 1-5 展示了类 `BondCalculator` 的完整代码。代码分为一个头文件和一个实现文件。你也可以在\
  \ `main` 函数中查看一个示例用法。\n\n```\n//\n//  BondCalculator.h\n#ifndef __FinancialSamples__BondCalculator__\n\
  #define __FinancialSamples__BondCalculator__\nclass BondCalculator {\npublic:\n\
  BondCalculator(const std::string institution, int numPeriods, double principal,\
  \ double couponValue);\nBondCalculator(const BondCalculator &v);\nBondCalculator\
  \ &operator =(const BondCalculator &v);\n~BondCalculator();\ndouble interestRate();\n\
  private:\nstd::string m_institution;\ndouble m_principal;\ndouble m_coupon;\nint\
  \ m_numPeriods;\n};\n#endif /* defined(__FinancialSamples__BondCalculator__) */\n\
  //\n//  BondCalculator.cpp\n#include \"BondCalculator.h\"\nBondCalculator::BondCalculator(const\
  \ std::string institution, int numPeriods,\ndouble principal, double couponValue)\n\
  : m_institution(institution),\nm_numPeriods(numPeriods),\nm_principal(principal),\n\
  m_coupon(couponValue)\n{\n}\nBondCalculator::BondCalculator(const BondCalculator\
  \ &v)\n: m_institution(institution),\nm_numPeriods(v.m_numPeriods),\nm_principal(v.m_principal),\n\
  m_coupon(v.m_coupon)\n{\n}\nBondCalculator::~BondCalculator()\n{\n}\nBondCalculator\
  \ &BondCalculator::operator =(const BondCalculator &v)\n{\nif (this != &v)\n{\n\
  this->m_institution = v.m_institution;\nthis->m_principal = v.m_principal;\nthis->m_numPeriods\
  \ = v.m_numPeriods;\nthis->m_coupon = v.m_coupon;\n}\nreturn *this;\n}\ndouble BondCalculator::interestRate()\n\
  {\nreturn m_coupon / m_principal;\n}\n// 主函数接收传递给程序的参数\nint main(int argc, const\
  \ char * argv[])\n{\nif (argc != 4)\n{\nstd::cout    \"\n<< std::endl;\nreturn 1;\n\
  }\nstd::string issuer = argv[1];\ndouble principal = atof(argv[2]);\ndouble coupon\
  \ = atof(argv[3]);\nint num_periods = atoi(argv[4]);\nBondCalculator bc(issuer,\
  \ principal, coupon, num_periods);\nstd::cout << \"正在读取由 \" << issuer << \" 发行的债券信息\"\
  \ << std::endl;\nstd::cout << \" 内部收益率为 \" << bc.interestRate() << std::endl;\n\
  return 0;\n}\n清单 1-5\nBondCalculator.h\n```\n\n\n\n### 运行代码\n\n该代码可使用符合标准的 C++ 编译器进行编译。它已在\
  \ Linux 和 Mac OS X 上测试通过。您可以在首选终端中使用以下命令运行程序：\n\n```\n$ ./bondCalculator XYZ 100000\
  \ 5000 20\nreading information for bond issued by XYZ\nthe internal rate of return\
  \ is 0.5\n```\n\n粗体显示的第一行是您需要执行的命令。参数依次为：发行机构名称、债券总本金、定期票息价值以及该投资的时间周期数。\n\n程序输出显示根据票息价值计算得出的收益率。`BondCalculator`\
  \ 类现在可用于更大的应用程序中，以存储此类固定收益投资的信息。\n\n## 进一步参考\n\n本章介绍了固定收益投资这一通用主题的入门知识。虽然我们主要关注该领域中涉及的\
  \ C++ 编程问题，但有几本书籍可以帮助您更深入地理解此处介绍的金融工程技术。\n\n以下书籍仅供参考，您可以自行探索，以更好地理解固定收益投资的世界。\n\n\
  *   *《投资科学》*，作者：David Luenberger（牛津大学出版社，1998 年）：这是一本本科级别的书籍，描述了投资的基本理论。书中大部分内容解释了固定收益投资的基础知识，包括最常见问题的算法。\n\
  *   *《投资学》*，作者：Zvi Bodie、Alex Kane 和 Alan Marcus（McGraw-Hill/Irwin，2004 年）：这是一本关于投资理论的标准教科书，除其他主题外，还解释了固定收益投资背后的理念。\n\
  *   *《金融数学》*，作者：Marek Carpinski 和 Tomasz Zastawniak（Springer，2011 年）：这本书更适合数学爱好者。它不仅解释了固定收益投资的基础知识，还提供了许多在其分析中有用的数学方法。\n\
  \n### 结论\n\n在本章中，我介绍了固定收益投资这一主题，以及如何使用 C++ 代码对其进行建模和分析。本章的第一部分解释了固定收益投资背后的一般概念。与股票和衍生品市场相比，这些投资被用作一种相对安全的保值和创富方式。\n\
  \n我还解释了为什么 C++，特别是其当前标准 C++20，是为此金融领域的问题创建计算解决方案的理想编程语言。由于其性能特性和高级编程支持，C++ 在表现力和原始速度之间提供了最佳平衡。因此，C++\
  \ 已成为金融领域核心应用开发的事实标准，尤其是在处理固定收益数据的应用中。\n\n第一个示例介绍了一个可用于计算简单利率的基本类。它不仅介绍了利率计算方法的概念，还介绍了在现代\
  \ C++ 中设计和编码此类解决方案的典型方式。\n\n第二个示例介绍了复利利率的概念，包括离散和连续区间。您在其中学习了如何使用标准 C++ 库函数创建一个\
  \ C++ 类来计算这种利率。我总结了此类数学函数及其在 C++ 程序中的使用方法。\n\n本章中的第三个示例探讨了现金流及其相应现值（PV）的重要概念。PV\
  \ 的计算是比较两个或多个固定收益投资的核心。通过使用利率公式的逆运算，您可以确定给定的一组现金流在当前的真实价值。您学习了如何使用一个新的 C++ 类来解决这类问题。\n\
  \n最后，本章解释了债券如何在金融应用中使用，并展示了一个用于对这些投资进行建模的类。在未来的章节中，您将了解更多关于将这些金融工具作为投资组合一部分进行计算时所面临的挑战。\n\
  \n在下一章中，我将介绍金融投资领域的另一个重要部分：股票市场。您将看到一些在这些市场中可能有用的编程技巧，同时也会介绍我们将在本书后半部分探讨的其他重要概念。\n\
  \n"
- "# 2. 股票市场\n\n持有公司利润的股份是投资和创造财富最常见的方式之一。许多发家致富的人都是通过创建或收购一家成功公司的股权来实现的。这就是股票市场在所有类型的投资者中如此受欢迎的原因。此外，股票市场非常庞大，为每个愿意参与的人提供了机会：从小投资者到大型对冲基金，您都能找到适合每种参与者的投资风格。\n\
  \n对于软件工程师来说，股票市场也是一个激动人心的领域，因为它提供了大量应用计算技术（可用 C++ 实现）的机会。软件工程师也是市场分析师和广大投资者的重要盟友，在建模市场数据和设计快速准确交易决策所需的算法等关键活动中提供帮助。\n\
  \n由于其规模庞大，股票市场是多方面的，并提供了种类繁多的投资工具。从小型股股票到蓝筹股、交易所交易基金（ETF）、股票和指数期权以及其他衍生品，存在着大量的机会来运用投资算法，以便在市场上获得优势。因此，（来自银行和其他投资机构的）巨大动力也促使人们应用高速\
  \ C++ 编程技术来解决这些问题。\n\n在本章中，我们针对股票市场及其衍生品中出现的一些精选问题提供 C++ 代码。我们将考虑以下金融编程主题：\n\n*\
  \   计算简单移动平均线\n*   计算指数移动平均线\n*   计算波动率\n*   计算股票工具的相关系数\n*   建模和计算基本面指标\n\n## 股票市场概念\n\
  \n股票市场的存在是为了促进股权类投资的交易。股权投资的目的是将资金直接或间接配置到公司股票上，这赋予买方公司一定份额的所有权。这种投资背后的理念是从该特定投资工具所代表的机构的增长中获利。例如，购买\
  \ IBM 的股票就拥有了该公司的一小部分所有权，以及与该所有权相关的未来利润。\n\n直接持有股票是股权投资最简单的例子。任何拥有经纪账户的人都可以购买上市公司的股票，即那些在公开市场上出售其股票的公司。个人投资者可以利用他们的交易账户或退休账户，投资于美国和国际市场上成千上万家上市公司中的任何一家。\n\
  \n然而，直接控制一家公司的股票并不是参与股票市场的唯一（甚至不是最简单的）方式。如今有大量产品提供替代性的股权投资方式。这包括共同基金、ETF、指数基金、期权以及其他更奇特的衍生品。如何从如此众多的可交易品种中选择合适的工具，是资金管理者和个人投资者面临的众多问题之一。\n\
  \n\n\n### 市场参与者\n\n股票市场由众多参与者构成。他们目标各异、利益不同；然而，他们持续运作以维持市场价格，同时试图从中获利。\n\n大型机构在股票市场中占据了相当大的一部分。这些大型卖方投资机构（例如投资银行和交易所）被视为市场的支柱。因此，它们通常也被称为做市商。这些大型公司每天买卖大量股票投资工具（例如股票），目标是在每笔操作中获取微薄利润。近年来，高频交易也加入了这一图景，导致市场交易量和交易速度双双提升。\n\
  \n以下是股票市场中最常见参与者的简要列表：\n\n-   **共同基金**：这些基金接收来自散户投资者和机构的投资，并在它们认为可能产生高于平均回报的市场领域进行投资。共同基金大多仅限于购买股票和\
  \ ETF，因此当市场处于下跌趋势时，它们的表现会受到限制。\n\n-   **对冲基金**：对冲基金使用更高级的技术，例如做空股票、购买普通投资者无法获得的期权和期货等风险较高的投资工具，因此它们仅限于能够承受更高风险的较富裕投资者和某些类型的机构。\n\
  \n-   **投资银行**：这些机构积极参与市场构成。例如，它们负责将新股（也称为 IPO）引入市场，供其他投资者交易。它们也可以为自己和其他大客户进行交易。\n\
  \n-   **高频交易基金**：这些基金使用高性能计算技术为市场提供即时流动性，同时在大量交易中获取微薄利润。\n\n-   **经纪公司**：这些公司直接与个人投资者打交道，提供买卖股票、ETF、共同基金和期权的能力，每笔交易收取少量佣金甚至免佣金。其服务通过互联网在桌面、网页浏览器和移动设备等多个平台上提供。\n\
  \n-   **养老基金**：这些机构持有来自退休基金的大规模资金池。它们专注于长期投资，以支持基金在较长时期内实现预期增长。\n\n-   **散户投资者**：这些是拥有经纪账户的个人，他们自行研究并自行决定在市场上买卖什么。\n\
  \n如您所见，股票市场中存在激烈的利润竞争。大多数大型机构在研究上投入巨资，以期在市场的未来走势上获得优势。这种分析方法依赖于准确的信息和即时获取交易数据的能力，而这只有通过计算机软件提供的计算能力才能实现，其中大部分软件是用\
  \ C++等语言编写的。\n\n在接下来的几节中，我将提供针对股票投资分析中常见问题的 C++示例。您将学习到可用于涉及股票投资的多种情况的工具和概念。\n\n\
  ## 移动平均线计算\n\n### 问题\n\n给定特定的股票投资，确定一系列收盘价的简单移动平均线和指数移动平均线。\n\n### 解决方案\n\n分析股票和\
  \ ETF 等权益工具最常用的策略之一是使用供需方法，将价格和成交量视为需要观察的重要变量。使用基于价格/成交量策略的交易者将这套方法称为技术分析（TA）。通过技术分析，交易者关注由先前价格变动定义的特殊价格点，例如支撑位、阻力位、趋势线和移动平均线，其目的是识别更有可能盈利的价格区域。\n\
  \n例如，支撑位和阻力位通常用于确定对特定工具而言重要的价格区域。如果一只股票在上涨过程中达到某个价格并反转方向，那么该高点价格就被视为阻力价格。未来，当价格再次达到相同区域时，交易者倾向于在该区域附近卖出，从而形成更强的阻力点。类似地，当交易者在公认区域买入相同的股票或\
  \ ETF 时，就会形成支撑价格。\n\n移动平均线也会出现类似类型的模式。买方和卖方倾向于查看移动平均线，以确定特定股票处于低风险的买入点还是卖出点。这些心理价格点具有自我强化的作用，并在股票交易的动态中扮演着重要角色。图\
  \ 2-1 展示了一个用于分析苹果公司普通股的移动平均线示例。\n\n![../images/323908_2_En_2_Chapter/323908_2_En_2_Fig1_HTML.jpg](img/323908_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\n苹果公司（AAPL）每日价格的简单移动平均线，参数为 50\n\n移动平均线可以使用简单的平均公式计算，该公式对每个新周期重复应用。给定价格`p1`、`p2`、...、`pN`，特定时间段的通用公式如下：\n\
  \n```\nMA = (1/N) (p1 + p2 + ... + pN)\n```\n\n如果您在序列中添加新值时维护并更新价格序列，则可以轻松执行此计算。\n\
  \n要在 C++中计算移动平均线，我们首先创建一个新类，该类使用 STL（标准模板库）向量对象存储一个价格序列。该对象负责使用`addPriceQuote`成员函数向序列中添加新值。该成员函数的实现很简单，因为它依赖于`std::vector`提供的功能来维护数字序列以及存储要求。\n\
  \n```\nvoid MACalculator::addPriceQuote(double close)\n{\nm_prices.push_back(close);\n\
  }\n```\n\n移动平均线计算的周期数由`MACalculator`类的构造函数参数确定。例如，要计算 20 个时间段（当周期为单个交易日时，通常相当于 4\
  \ 个交易周）的移动平均线，可以按如下方式创建`MACalculator`类的对象：\n\n```\nMACalculator calculator(20);\
  \ // 将计算 20 个周期的移动平均线。\n```\n\n简单移动平均线的计算由`MACalculator`类的`calculateMA`成员函数执行。该函数的主要思想是遍历存储在`MACalculator`类中的价格序列，如以下代码所示：\n\
  \n```\nstd::vector MACalculator::calculateMA()\n{\nstd::vector ma;\ndouble sum =\
  \ 0;\nfor (int i=0; i= m_numPeriods)\n{\nma.push_back(sum / m_numPeriods);\nsum\
  \ -= m_prices[i-m_numPeriods];\n}\n}\nreturn ma;\n}\n```\n\n要计算移动平均线，观察值的数量至少需要达到周期数（设\
  \ N 为周期数）。因此，价格向量的前 N 个元素不生成对应的移动平均值。这些初始元素只是被添加到局部变量`sum`中，它们的值将在之后被使用。\n\n\n\n\
  对于第 N 个位置之后的每个元素，都可以计算其移动平均值。这通过求前 N 个元素的总和并除以 N 来实现。计算得到的值会被追加到移动平均值的向量中。最后，需要更新变量`sum`，以便从总和中移除\
  \ N 元素序列中的第一个元素。当算法减去`m_prices[i-m_numPeriods]`的值时，就会执行此操作，为下一次迭代做准备。\n\n指数移动平均线（EMA）与简单移动平均线不同，因为每个新值都要乘以一个因子。与旧观察值相比，该因子用于赋予新值更大的权重。因此，EMA\
  \ 对观察值的变化更敏感，并且能够更早、更准确地指示新趋势。如果你希望快速发现趋势变化，这便是一个优势。以下是我使用的代码：\n\n```\nstd::vector\
  \ MACalculator::calculateEMA()\n{\nstd::vector ema;\ndouble multiplier = 2.0 / (m_numPeriods\
  \ + 1);\n// 计算移动平均线，以确定对应于给定周期数的第一个元素\nstd::vector ma = calculateMA();\nema.push_back(ma.front());\n\
  // 对于每个剩余的元素，计算加权平均值\nfor (int i=m_numPeriods+1; i<m_prices.size(); ++i)\n{\ndouble\
  \ val = (1-multiplier) * ema.back() + multiplier * m_prices[i];\nema.push_back(val);\n\
  }\nreturn ema;\n}\n```\n\n计算初始部分与简单移动平均线类似。使用`sum`变量累加值，直到至少观察到 N 个值。这被用作 EMA 的初始值。不同的\
  \ EMA 实现会使用其他方式来初始化序列，但经过几次迭代后，结果会收敛到相同的值。你可以在图 2-2 中看到一个 EMA 的图形示例。\n\n![../images/323908_2_En_2_Chapter/323908_2_En_2_Fig2_HTML.jpg](img/323908_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\n\n参数为 20 天的指数移动平均线\n\nEMA 计算的主要步骤是添加由乘数加权的新值。EMA 计算的默认乘数 *r* 由下式给出\n\n\
  ![$$ \\rho =\\frac{2}{N+1} $$](img/323908_2_En_2_Chapter_TeX_Equa.png)\n\n该乘数赋予新值更大的权重，从而使\
  \ EMA 对价格变化的反应比简单移动平均线更灵敏。\n\n### 完整代码\n\n在代码清单 2-1 中，你可以看到简单移动平均线和 EMA 的完整实现。我还展示了一个示例`main`函数，它负责从标准输入读取一些数据点并计算相应的移动平均线。\n\
  \n```\n//\n//  MACalculator.h\n#ifndef __FinancialSamples__MACalculator__\n#define\
  \ __FinancialSamples__MACalculator__\n#include \nclass MACalculator {\npublic:\n\
  MACalculator(int period);\nMACalculator(const MACalculator &);\nMACalculator &operator\
  \ = (const MACalculator &);\n~MACalculator();\nvoid addPriceQuote(double close);\n\
  std::vector calculateMA();\nstd::vector calculateEMA();\nprivate:\n// 计算中使用的周期数\n\
  int m_numPeriods;\nstd::vector m_prices;\n};\n#endif /* defined(__FinancialSamples__MACalculator__)\
  \ */\n//\n//  MACalculator.cpp\n#include \"MACalculator.h\"\n#include \nMACalculator::MACalculator(int\
  \ numPeriods)\n: m_numPeriods(numPeriods)\n{\n}\nMACalculator::~MACalculator()\n\
  {\n}\nMACalculator::MACalculator(const MACalculator &ma)\n: m_numPeriods(ma.m_numPeriods)\n\
  {\n}\nMACalculator &MACalculator::operator = (const MACalculator &ma)\n{\nif (this\
  \ != &ma)\n{\nm_numPeriods = ma.m_numPeriods;\nm_prices = ma.m_prices;\n}\nreturn\
  \ *this;\n}\nstd::vector MACalculator::calculateMA()\n{\nstd::vector ma;\ndouble\
  \ sum = 0;\nfor (int i=0; i= m_numPeriods)\n{\nma.push_back(sum / m_numPeriods);\n\
  sum -= m_prices[i-m_numPeriods];\n}\n}\nreturn ma;\n}\nstd::vector MACalculator::calculateEMA()\n\
  {\nstd::vector ema;\ndouble sum = 0;\ndouble multiplier = 2.0 / (m_numPeriods +\
  \ 1);\nfor (int i=0; i m_numPeriods)\n{\ndouble val = (1-multiplier) * ema.back()\
  \ + multiplier * m_prices[i];\nema.push_back(val);\n}\n}\nreturn ema;\n}\nvoid MACalculator::addPriceQuote(double\
  \ close)\n{\nm_prices.push_back(close);\n}\n//\n//  main.cpp\n#include \"MACalculator.h\"\
  \n#include \n// main 函数接收传递给程序的参数\n// 并调用 MACalculator 类\nint main(int argc, const\
  \ char * argv[])\n{\nif (argc != 2)\n{\nstd::cout \" > price;\nif (price == -1)\n\
  break;\ncalculator.addPriceQuote(price);\n}\nstd::vector ma = calculator.calculateMA();\n\
  for (int i=0; i ema = calculator.calculateEMA();\nfor (int i=0; i<ema.size(); ++i)\n\
  {\nstd::cout << \"指数平均值 \"\n<< i << \" = \" << ema[i] << std::endl;\n}\nreturn 0;\n\
  }\n代码清单 2-1\nMACalculator\n```\n\n### 运行代码\n\n你可以使用 gcc 编译器（以及任何其他符合标准的编译器，如 Visual\
  \ Studio 或 C++ builder）编译此代码。例如，可以在 UNIX shell 中使用以下命令行：\n\n```\ngcc -o macalc main.cpp\
  \ macalculator.cpp\n```\n\n以下是程序一次示例运行的输出：\n\n```\n$ ./macalc 5\n\n平均值 0 = 18.2\n\
  平均值 1 = 18.6\n平均值 2 = 22.8\n平均值 3 = 20.8\n平均值 4 = 19\n平均值 5 = 16.8\n平均值 6 = 16.6\n\
  平均值 7 = 20.6\n指数平均值 0 = 18.2\n指数平均值 1 = 16.1333\n指数平均值 2 = 21.4222\n指数平均值 3 = 18.2815\n\
  指数平均值 4 = 13.1877\n指数平均值 5 = 9.45844\n指数平均值 6 = 13.639\n指数平均值 7 = 19.7593\n程序以退出码：0\
  \ 结束\n```\n\n在第一行，我输入了调用移动平均程序（这里简称为`macalc`）的命令。命令行中的单个参数意味着我要计算五个数据点的移动平均线。然后，我输入了一系列数字，这些数字代表某个投资工具的观察价格。最后，我输入了值-1，表示输入结束。接下来的几行给出了定义简单移动平均线和\
  \ EMA 的值列表。\n\n## 计算波动率\n\n### 问题\n\n给定最近几天的价格序列，计算特定权益工具的波动率。\n\n\n\n### 解决方案\n\
  \n股票及其他权益类工具的一个重要特征是价格变动非常频繁。对于高流动性的股票和交易型开放式指数基金（ETF）而言，随着新的买方和卖方不断换手，价格在整个交易日中会持续变化。与其他投资工具相比，这导致了高度的波动性。\n\
  \n在比较不同投资选择时，波动性也是一个重要概念。例如，一只互联网股票的价格波动范围通常远大于一家传统食品生产商。它们的波动性特征是完全不同的。更高的波动性可能成为优势，也可能成为劣势，这取决于你的投资目标。\n\
  \n关于波动性，需要重点考虑的是它并非一个单一维度的概念。不同的投资策略需要从不同的角度来审视价格变动。例如，如果你是基于未来几天（由于新闻事件或财报发布）的预期波动性来做出投资决策，那么前一周的波动性可能就没那么重要了。\n\
  \n在本节中，我将介绍基于价格序列来衡量波动性的三种方法。第一种策略是计算分析期间内观察到的价格值域。这或许是理解波动性最简单的方法：找出观察期内的最高价和最低价，并返回其差值。这也是许多投资者常用的一个指标。大多数报纸都会列出过去一年的最高价和最低价列表，因此你可以快速了解过去一年的简单价格范围。以下是使用价格向量实现的代码：\n\
  \n```\ndouble VolatilityCalculator::rangeVolatility()\n{\nif (m_prices.size() <\
  \ 2)\n{\nreturn 0;\n}\ndouble min = m_prices[0];\ndouble max = m_prices[0];\nfor\
  \ (int i=1; i<m_prices.size(); ++i)\n{\nif (m_prices[i] < min)\n{\nmin = m_prices[i];\n\
  }\nif (m_prices[i] > max)\n{\nmax = m_prices[i];\n}\n}\nreturn max - min;\n}\n```\n\
  \n第二种策略是计算给定时间段内的平均价格范围。例如，许多投资策略会考察过去几天的数据，并对观察到的价格范围取平均值。然后，可以将结果绘制成图表，作为衡量特定股票变动率的指标。简单地计算之前观察到的每日价格范围的平均值即可返回这个数值。以下是我们的代码。\n\
  \n```\ndouble VolatilityCalculator::avgDailyRange()\n{\nunsigned long n = m_prices.size();\n\
  if (n < 2)\n{\nreturn 0;\n}\ndouble previous = m_prices[0];\ndouble sum = 0;\nfor\
  \ (int i=1; i<m_prices.size(); ++i)\n{\ndouble range = abs(m_prices[i] - previous);\n\
  sum += range;\n}\nreturn sum / n - 1;\n}\n```\n\n最后，一种更复杂的衡量权益工具价值变动的方法是使用**标准差**的统计定义。标准差作为一种从一组价格的期望值（即平均值）推导出波动性的方法，非常有用。计算标准差有一个众所周知的公式，如下所示：\n\
  \n![$$ \\frac{1}{N-1}\\sum \\limits_{i=1}^N{\\left({x}_i-\\mu \\right)}² $$](img/323908_2_En_2_Chapter_TeX_Equb.png)\n\
  \n在这个公式中，N 是数据点（价格）的数量，`m` 是这些值的平均数。可以使用以下 C++ 代码计算标准差：\n\n```\ndouble VolatilityCalculator::stdDev()\n\
  {\nconst double m = mean();\ndouble sum = 0;\nfor (int i=0; i<m_prices.size(); ++i)\n\
  {\ndouble val = m_prices[i] - m;\nsum += val * val;\n}\nreturn sqrt(sum / (m_prices.size()-1));\n\
  }\n```\n\n### 完整代码\n\n清单 2-2 提供了上述几种策略的完整代码。我引入了一个名为 `VolatilityCalculator` 的新 C++\
  \ 类，它封装了计算价格波动性的概念。我们在 `rangeVolatility`、`avgDailyRange` 和 `stdDev` 成员函数中实现了这三种策略。你可以将这个类作为起点，后续将其他波动性计算方法作为额外的成员函数添加进来。\n\
  \n```\n//\n//  VolatilityCalculator.h\n#ifndef __FinancialSamples__VolatilityCalculator__\n\
  #define __FinancialSamples__VolatilityCalculator__\n#include <vector>\nclass VolatilityCalculator\n\
  {\npublic:\nVolatilityCalculator();\n~VolatilityCalculator();\nVolatilityCalculator(const\
