  \ */\n//\n//  FundamentalsCalc.cpp\n#include \"FundamentalsCalc.h\"\n#include \n\
  FundamentalsCalculator::FundamentalsCalculator(const std::string &ticker,\ndouble\
  \ price, double dividend) :\nm_ticker(ticker),\nm_price(price),\nm_dividend(dividend),\n\
