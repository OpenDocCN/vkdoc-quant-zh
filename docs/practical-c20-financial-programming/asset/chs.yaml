  \n### Boost 库\n\n标准 C++ 库提供了大量的类、容器和算法。然而，由于创建新 C++ 语言标准需要付出巨大努力，因此所包含的库集通常是最简化的，只包含大多数程序员所需的基本功能。此外，标准库只包含那些经过实际应用充分验证和确立、经得起时间考验的类和函数。\n\
  \n由于将新功能纳入语言标准的过程缓慢，因此需要一种更敏捷的软件分发与开发策略，以便更好地融入 C++ 社区认可的新库。Boost 库的诞生就是为了填补标准中纳入新功能的缓慢过程所留下的空白。与传统的单一供应商库不同，Boost\
  \ 开发人员的目标是创建可在广泛领域和架构中复用的高级组件。许多 Boost 贡献者本身就参与了 C++ 标准的制定工作，这意味着目前 Boost 发行版中包含的许多库，日后将成为标准库的一部分。例如，`std::shared_ptr`\
  \ 等模板类就源自 `boost::shared_ptr`。\n\n要在你的应用程序中使用 Boost 库，你需要从 `boost.org` 网站下载并安装它们。由于\
  \ Boost 类的特性，这个过程相对简单。因为 Boost 中的大多数组件都被定义为模板类，所以除了少数例外，完整代码都包含在头文件中。这意味着你只需在代码中添加一个头文件，就可以使用某些\
  \ Boost 库中的所有功能。\n\n表 4-1 列出了 Boost 发行版中可用的一些库。\n\n**表 4-1** Boost 发行版中一些最常用的组件\n\
