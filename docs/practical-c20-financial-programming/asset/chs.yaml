  }\nreturn *this;\n}\nvoid VolatilityCalculator::addPrice(double price)\n{\nm_prices.push_back(price);\n\
  }\ndouble VolatilityCalculator::rangeVolatility()\n{\nif (m_prices.size() < 2)\n\
  {\nreturn 0;\n}\ndouble min = m_prices[0];\ndouble max = m_prices[0];\nfor (int\
  \ i=1; i<m_prices.size(); ++i)\n{\nif (m_prices[i] < min)\n{\nmin = m_prices[i];\n\
  }\nif (m_prices[i] > max)\n{\nmax = m_prices[i];\n}\n}\nreturn max - min;\n}\ndouble\
  \ VolatilityCalculator::avgDailyRange()\n{\nunsigned long n = m_prices.size();\n\
  if (n < 2)\n{\nreturn 0;\n}\ndouble previous = m_prices[0];\ndouble sum = 0;\nfor\
  \ (int i=1; i<m_prices.size(); ++i)\n{\ndouble range = abs(m_prices[i] - previous);\n\
