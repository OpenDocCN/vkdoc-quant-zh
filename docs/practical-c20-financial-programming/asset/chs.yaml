  \ C++ 代码的必需品。您可以使用一些标准库从 C++ 访问此类多处理功能，如第 17 章所述。\n\n"
- "# 17. 多线程\n\nC++20 应用程序用于对计算性能要求极高的场景。在金融应用（如高频交易）中，对性能的需求更为突出，因为盈利与亏损的差距可能仅有几微秒。在需要高性能的情况下，充分利用现代\
  \ CPU 提供的资源至关重要。特别是，多核处理是新 CPU 提供的主要功能之一，可用内核数量随着芯片复杂度的提升而不断增长。\n\n然而，要受益于多核处理器，C++\
  \ 程序员需要学习一些并行编程技术，这些技术在过去的几十年中已迅速成为 C++ 标准库的一部分。使用多个进程是利用这种计算能力的一种可能方式。多线程是在同一进程内运行多个并发任务的方法，是另一种能够同时利用两个或更多内核的技术。\n\
  \n在本章中，您将看到一些探索 C++ 程序员多线程策略的示例。借助本章提供的知识，您将能够在应用程序中充分利用现有的多核系统。虽然多线程是当今应用程序中一种有用的策略，但未来它将变得更加重要，因为桌面和服务器制造商预计将继续为其处理器添加更多内核。\n\
  \n在传统的多线程方法中，C++ 程序员使用为方便访问操作系统提供的多线程功能而创建的库。一个流行的例子是 `pthreads` 库。然而，当前的 C++20\
  \ 标准提供了另一种方法，即通过 `<thread>` 头文件中的模板，语言直接支持线程的使用。在本章中，您将学习这两种方法。这很重要，因为许多现有的多线程代码都使用非标准库。但是，新代码应优先使用标准库提供的模板。\n\
  \n以下是本章讨论的部分主题：\n\n- **使用 `pthreads` 库**：`pthreads` 是一个标准库，可用于在同一进程中创建和维护多个线程。在多核机器上，创建线程是利用当前架构并行能力的最常见方法之一。您将学习如何创建使用\
  \ `pthreads` 库实现并行计算的应用程序。\n\n- **在并行线程中运行算法**：您将了解如何将问题分解到不同的线程中，并将它们的结果组合成新的解决方案。作为示例，我提出了一种改进的并行算法来计算期权概率。\n\
  \n- **线程同步**：使用多个线程会引入资源同步的问题。您将学习如何使用互斥锁等同步原语，确保每次只有一个线程可以访问和修改资源。\n\n- **STL 线程**：C++\
  \ 标准最新版本提供的新多线程类和模板。\n\n## 使用 Pthreads 库创建线程\n\n创建一个 C++ 类，该类使用标准的 `pthreads` 库将其工作分配到多个处理线程中。\n\
  \n### 解决方案\n\n多线程是为支持并行计算而创建的软件解决方案之一。线程是一个处理单元，可以与程序的其他部分并行执行，从而使得程序的两个或多个分段可以并发运行。在多核机器上，这意味着同一程序可以有效地利用两个或多个内核来执行额外的工作。根据代码的组织方式，谨慎使用多线程技术为提高整个算法的吞吐量提供了良好的机会。\n\
  \n然而，要使用多线程，操作系统必须提供支持。由于每个操作系统内部都以自己的方式实现多线程，因此多线程应用程序过去常常依赖于所使用的操作系统和架构。为避免此问题，提出了一个标准的\
  \ `pthreads`（POSIX 线程）库，并将其采纳为 POSIX 的一部分。`pthreads` 库可用于多种操作系统，包括 UNIX、Mac OS X，甚至\
  \ Windows（例如，您可以使用 Cygwin 库在 Windows 上访问 `pthreads`）。表 17-1 提供了 `pthreads` API（应用程序编程接口）中可供应用程序开发人员使用的函数快速汇总。\n\
  \n**表 17-1** `pthreads` 库中常用函数列表\n\n| 函数名 | 描述 |\n| --- | --- |\n| `pthread_create`\
  \ | 创建一个新线程 |\n| `pthread_exit` | 结束一个现有线程 |\n| `pthread_join` | 等待一个现有线程，直到该线程退出后才返回\
  \ |\n| `pthread_detach` | 分离一个线程 |\n| `pthread_attr_init` | 初始化属性数据结构 |\n| `pthread_attr_destroy`\
  \ | 销毁属性数据结构 |\n| `pthread_attr_setstacksize` | 设置新线程的栈大小 |\n| `pthread_cancel`\
  \ | 取消线程执行 |\n| `pthread_mutex_init` | 初始化互斥锁同步原语 |\n| `pthread_mutex_destroy` |\
  \ 销毁互斥锁 |\n| `pthread_mutex_lock` | 锁定互斥锁 |\n| `pthread_mutex_unlock` | 解锁现有互斥锁\
  \ |\n| `sem_init` | 初始化信号量同步原语 |\n| `sem_destroy` | 销毁信号量 |\n| `sem_wait` | 等待信号量\
  \ |\n\n\n\n虽然 `pthreads` 库是为与纯 C 程序兼容而编写的，但它可以轻松地作为 C++ 应用程序的一部分使用。可以简单地围绕使用 `pthreads`\
  \ 创建的线程创建一个包装器，以便从 C++ 代码中更容易地访问它们。在本节中，您将看到一个使用 `pthreads` 创建简单多线程应用程序的 C++ 代码示例。所使用的技术以及线程创建和同步的一般概念可以在您自己的程序中使用。\n\
  \n要在程序中创建一个独立的执行线程，您需要使用 `pthread_create` 函数。它接收的参数包括：一个标识符（整数值）、一个指向属性结构的指针（如果未使用可以为\
  \ `null`）、一个指向将由线程执行的函数的指针，以及一个指向线程函数参数的指针。如果未发生错误，该函数返回零；否则，它返回一个整数错误标识符。\n\n在执行\
  \ `pthread_create` 函数后，程序会从指定的函数启动另一个线程。该线程独立于原始程序，并且可以在相同或独立的核心上运行（如果宿主机器有可用核心，具体由操作系统的线程调度器决定）。线程可以通过到达线程函数的末尾或显式调用\
  \ `pthread_exit` 函数来终止。\n\n在本节中，我将展示如何从 C++ 类访问 `pthreads` 库提供的功能。为此，我引入了 `Thread`\
  \ 类，它封装了运行中线程的概念。该类的目标是成为具体线程类的基类。在每个 `Thread` 的新子类中，唯一需要的成员函数是 `run()`，它决定了将由新线程执行的代码。\n\
  \n`Thread` 类中值得注意的方法如下：\n\n- `start`：需要被调用来启动线程的执行。\n- `endThread`：可以被调用来终止当前线程。\n\
  - `setJoinable`：决定该线程是否可以被其他线程连接（join）。\n- `join`：允许调用者连接此线程，这样调用者将仅在线程终止后才继续执行。\n\
  - `run`：此成员函数需要在每个子类中实现，并定义将在其自身线程中运行的代码。\n\n`Thread` 类使用了一个名为 `thread_function`\
  \ 的 C 函数，并在 `Thread.cpp` 文件中定义：\n\n```c\nvoid *thread_function(void *data)\n{\n\
  \    Thread *t = reinterpret_cast(data);\n    t->run();\n    return nullptr;\n}\n\
  ```\n\n该函数的签名由 `pthreads` 库决定。一旦创建新线程，就会调用该函数。主要思想是，传递给函数的数据指针实际上是一个指向 `Thread`\
  \ 对象的指针。一旦使用 `reinterpret_cast` 运算符检索到它，该对象就可以用来执行 `run` 成员函数。根据 `Thread` 的具体子类，`run`\
  \ 方法可以执行子类创建者想要的任何任务。这足以保证代码将作为并行线程运行。\n\n**注意**\n\n> 请记住，`reinterpret_cast` 运算符可用于在\
  \ C++ 中的任意两种类型之间进行转换。因此，使用此运算符时务必小心，因为一旦应用，编译器就不会执行类型检查。\n\n除此之外，`start()` 和 `endThread()`\
  \ 函数分别使用相应的 pthread API 函数来创建新线程和退出已有线程。这些函数的实现方式如下：\n\n```c\nvoid Thread::start()\n\
  {\n    pthread_create(&m_data->m_thread, &m_data->m_attr, thread_function, this);\n\
  }\nvoid Thread::endThread()\n{\n    pthread_exit(nullptr);\n}\n```\n\n**完整代码**\n\
  \n您可以在清单 17-1 中找到 `Thread` 类的完整实现。\n\n```cpp\n//\n//  Thread.h\n#ifndef __FinancialSamples__Thread__\n\
  #define __FinancialSamples__Thread__\n\nstruct ThreadData;\n\nclass Thread {\npublic:\n\
  \    Thread();\n    virtual ~Thread();\n\nprivate:\n    Thread(const Thread &p);\
  \ // no copy allowed\n    Thread &operator=(const Thread &p); // no assignment allowed\n\
  \npublic:\n    virtual void run() = 0;\n    void start();\n    void endThread();\n\
  \    void setJoinable(bool yes);\n    void join();\n\nprivate:\n    ThreadData *m_data;\n\
  \    bool m_joinable;\n};\n\n#endif /* defined(__FinancialSamples__Thread__) */\n\
  \n//\n//  Thread.cpp\n#include \"Thread.h\"\n#include <iostream>\n#include <pthread.h>\n\
  \nusing std::cout;\nusing std::endl;\n\nstruct ThreadData {\n    pthread_t m_thread;\n\
  \    pthread_attr_t m_attr;\n};\n\nnamespace {\n    void *thread_function(void *data)\n\
  \    {\n        Thread *t = reinterpret_cast<Thread *>(data);\n        t->run();\n\
  \        return nullptr;\n    }\n}\n\nThread::Thread()\n: m_data(new ThreadData),\n\
  \  m_joinable(false)\n{\n    pthread_attr_init(&m_data->m_attr);\n}\n\nThread::~Thread()\n\
  {\n    if (m_data)\n    {\n        delete m_data;\n    }\n}\n\nvoid Thread::start()\n\
  {\n    pthread_create(&m_data->m_thread, &m_data->m_attr, thread_function, this);\n\
  }\n\nvoid Thread::endThread()\n{\n    pthread_exit(nullptr);\n}\n\nvoid Thread::setJoinable(bool\
  \ yes)\n{\n    pthread_attr_setdetachstate(&m_data->m_attr,\n                  \
  \              yes ? PTHREAD_CREATE_JOINABLE : PTHREAD_CREATE_DETACHED);\n    m_joinable\
  \ = yes;\n}\n\nvoid Thread::run()\n{\n    cout << \"Thread running\" << endl;\n\
  }\n\nvoid Thread::join()\n{\n    if (m_joinable)\n    {\n        void *result;\n\
  \        pthread_join(m_data->m_thread, &result);\n    }\n}\n\n// --- sample implementation\n\
  class TestThread : public Thread {\npublic:\n    virtual void run();\n};\n\nvoid\
  \ TestThread::run()\n{\n    cout << \"this is a test implementation\" << endl;\n\
  }\n\n// sample usage\nint main()\n{\n    Thread *myThread = new TestThread;\n  \
  \  myThread->setJoinable(true);\n    myThread->start();\n    myThread->join();\n\
  \    return 0;\n}\n```\n\n清单 17-1 线程类及示例实现\n\n**运行代码**\n\n清单 17-1 中显示的代码可以使用任何符合标准的编译器（如\
  \ `gcc`、`llvm` 或 Visual Studio）来构建。请记住添加包含 `pthreads` 库的链接行。以下是用于构建示例应用程序的命令行（在\
  \ Mac OS X 上测试）：\n\n```bash\n$ gcc –o threadTest Thread.cpp -lpthreads\n$ ./threadTest\n\
  this is a test implementation\n```\n\n**并行计算期权概率**\n\n创建计算期权概率类的多处理版本。使用 `pthreads`\
  \ 库在多个线程之间分配工作。\n\n\n\n### 解决方案\n\n对于需要大量计算的问题，强烈建议采用并行处理技术。特别是当问题易于分解时，就变成了如何为每个线程分配适量工作并等待结果的问题。\n\
  \n蒙特卡洛算法就是这类过程的典型示例。模拟过程可以在任意数量的线程中运行，其结果可以轻松合并为单个数值。例如，计算期权概率时就是这种情况。正如你在第 14 章所见，蒙特卡洛技术在期权概率模拟中非常有效。每一步只需模拟新的随机游走，并利用该信息改进当前的概率估计。\n\
  \n要将蒙特卡洛算法应用于期权概率计算，第一步是正确定义问题的分解方式。这里很容易实现，因为每次循环计算都相互独立。在这种情况下，你可以通过指示每个线程运行蒙特卡洛方法的特定迭代次数来实现。最后，合并每个线程的结果，并将所有线程返回值的平均值作为最终结果。\n\
  \n上述算法在`ParallelOptionsProbabilities`类中实现。该类是一个外层框架，负责调用多个线程来运行所需算法。实际工作由派生自`Thread`类的`RandomWalkThread`类完成。作为`Thread`的任何其他子类，它需要实现从独立线程调用的`run()`成员函数。在`RandomWalkThread`内部，有一个成员变量`m_result`，用于存储蒙特卡洛过程的输出。线程完成后，可通过此成员变量获取计算的最终值。\n\
  \n`run`成员函数与你之前在`OptionsProbabilities`类中看到的代码非常相似。主要区别在于输出存储在`m_result`成员变量中。`RandomWalkThread`对象的工作在`ParallelOptionsProbabilities`类内部进行编排。关键成员函数是`probFinishAboveStrike()`。\n\
  \n```\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n{\n    const\
  \ int numThreads = 20;\n    vector<Thread *> threads(numThreads);\n    for (int\
  \ i=0; i<numThreads; i++) {\n        threads[i] = new RandomWalkThread(m_numSteps,\
  \ m_step, m_strikePrice);\n        threads[i]->setJoinable(true);\n        threads[i]->start();\n\
  \    }\n    for (int i=0; i<numThreads; i++) {\n        threads[i]->join();\n  \
  \  }\n    double nAbove = 0;\n    for (int i=0; i<numThreads; i++) {\n        nAbove\
  \ += threads[i]->result();\n        delete threads[i];\n    }\n    return nAbove/(double)(numThreads);\n\
  }\n```\n\n在该成员函数开始时，创建了多个线程并添加到`threads`向量中。需要将这些线程定义为可加入的，以便能够等待每个线程的结果。下一步是启动线程，使每个线程都能执行所需计算。然后，通过第二个循环来加入已创建的线程。这样，主线程可以在并行计算进行时等待。当所有线程完成后，调用`join()`的结果是主线程恢复执行。最后，可以使用`result()`成员函数存储每个线程返回的数据。此时可以删除线程对象以避免内存泄漏。在`probFinishAboveStrike`成员函数的最后一行，可以看到如何合并计算数据。本例中，只需返回高于执行价格的值的总和，并除以使用的线程数。\n\
  \n### 完整代码\n\n清单 17-2 展示了`ParallelRandomWalk`类。列表末尾提供了一个可用于测试的示例`main()`函数。\n\n\
  ```\n//\n//\n//  ParallelRandomWalk.h\n#ifndef __FinancialSamples__ParallelRandomWalk__\n\
  #define __FinancialSamples__ParallelRandomWalk__\n\nclass ParallelOptionsProbabilities\
  \  {\npublic:\n    ParallelOptionsProbabilities(int size, double strike, double\
  \ sigma);\n    ParallelOptionsProbabilities(const ParallelOptionsProbabilities &p);\n\
  \    ~ParallelOptionsProbabilities();\n    ParallelOptionsProbabilities &operator=(const\
  \ ParallelOptionsProbabilities &p);\n    double probFinishAboveStrike();\nprivate:\n\
  \    int m_numSteps;       // number of steps\n    double m_step;        // size\
  \ of each step (in percentage)\n    double m_strikePrice; // starting price\n};\n\
  #endif /* defined(__FinancialSamples__ParallelRandomWalk__) */\n\n//\n//  ParallelOptionsProbabilities.cpp\n\
  #include \"ParallelOptionsProbabilities.h\"\n#include \"Thread.h\"\n#include <vector>\n\
  #include <iostream>\n#include <boost/random.hpp>\n#include <boost/random/normal_distribution.hpp>\n\
  #include <cmath>\n\nusing std::vector;\nusing std::cout;\nusing std::endl;\n\nstatic\
  \ boost::rand48 random_generator;\nusing std::vector;\n\n/// ---\nclass RandomWalkThread\
  \ : public Thread {\npublic:\n    RandomWalkThread(int num_steps, double sigma,\
  \ double startPrice);\n    ~RandomWalkThread();\n    virtual void run();\n    double\
  \ gaussianValue(double mean, double sigma);\n    double getLastPriceOfWalk();\n\
  \    double result();\nprivate:\n    int m_numberOfSteps;     // number of steps\n\
  \    double m_sigma;          // size of each step (in percentage)\n    double m_startingPrice;\
  \  // starting price\n    double m_result;\n};\n\nRandomWalkThread::RandomWalkThread(int\
  \ numSteps, double sigma, double startingPrice)\n    : m_numberOfSteps(numSteps),\n\
  \      m_sigma(sigma),\n      m_startingPrice(startingPrice)\n{\n}\n\nRandomWalkThread::~RandomWalkThread()\n\
  {\n}\n\ndouble RandomWalkThread::gaussianValue(double mean, double sigma)\n{\n \
  \   boost::random::normal_distribution<> distrib(mean, sigma);\n    return distrib(random_generator);\n\
  }\n\ndouble RandomWalkThread::result()\n{\n    return m_result;\n}\n\ndouble RandomWalkThread::getLastPriceOfWalk()\n\
  {\n    double prev = m_startingPrice;\n    for (int i=0; i<m_numberOfSteps; i++)\
  \ {\n        double g = gaussianValue(0, m_sigma);\n        double next = prev *\
  \ (1 + g);\n        prev = next;\n    }\n    return prev;\n}\n\nvoid RandomWalkThread::run()\n\
  {\n    double nAbove = 0;\n    for (int i=0; i<m_numberOfSteps; i++) {\n       \
  \ double val = getLastPriceOfWalk();\n        if (val >= m_startingPrice)\n    \
  \    {\n            nAbove++;\n        }\n    }\n    m_result = nAbove/(double)m_numberOfSteps;\n\
  }\n// ---\n\nParallelOptionsProbabilities::ParallelOptionsProbabilities(int size,\
  \ double start, double step)\n    : m_numSteps(size),\n      m_strikePrice(start),\n\
  \      m_step(step)\n{\n}\n\nParallelOptionsProbabilities::ParallelOptionsProbabilities(const\
  \ ParallelOptionsProbabilities &p)\n    : m_numSteps(p.m_numSteps),\n      m_strikePrice(p.m_strikePrice),\n\
  \      m_step(p.m_step)\n{\n}\n\nParallelOptionsProbabilities::~ParallelOptionsProbabilities()\n\
  {\n}\n\nParallelOptionsProbabilities &ParallelOptionsProbabilities::operator=(const\
  \ ParallelOptionsProbabilities &p)\n{\n    if (this != &p)\n    {\n        m_numSteps\
  \ = p.m_numSteps;\n        m_strikePrice = p.m_strikePrice;\n        m_step = p.m_step;\n\
  \    }\n    return *this;\n}\n\ndouble ParallelOptionsProbabilities::probFinishAboveStrike()\n\
  {\n    const int numThreads = 20;\n    vector<Thread *> threads(numThreads);\n \
