  private:\nMathFunction &m_f;\n};\n#endif /* defined(__FinancialSamples__RungeKuttaODEMethod__)\
  \ */\n//\n//  RungeKuttaODEMethod.cpp\n#include \"RungeKuttaODEMethod.h\"\n#include\
  \ \"MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\nRungeKuttaODEMethod::RungeKuttaODEMethod(MathFunction\
  \ &f)\n: m_f(f)\n{\n}\nRungeKuttaODEMethod::RungeKuttaODEMethod(const RungeKuttaODEMethod\
  \ &p)\n: m_f(p.m_f)\n{\n}\nRungeKuttaODEMethod::~RungeKuttaODEMethod()\n{\n}\nRungeKuttaODEMethod\
  \ &RungeKuttaODEMethod::operator=(const RungeKuttaODEMethod &p)\n{\nif (this !=\
  \ &p)\n{\nm_f = p.m_f;\n}\nreturn *this;\n}\ndouble RungeKuttaODEMethod::solve(int\
  \ n, double x0, double y0, double c)\n{\nauto x = x0;\nauto y = y0;\nauto h = (c\
  \ - x0)/n;\nfor (int i=0; i {\npublic:\ndouble operator()(double x) { return x;\
  \ } // 未使用\ndouble operator()(double x, double y);\n};\ndouble RKMethSampleFunc::operator()(double\
  \ x, double y)\n{\nreturn  3 * x + 2 * y + 1;\n}\nint main()\n{\nRKMethSampleFunc\
  \ f;\nRungeKuttaODEMethod m(f);\ndouble res = m.solve (100, 0, 0.25, 2);\ncout <<\
  \ \" 结果为 \" << res << endl;\nreturn 0;\n}\n清单 11-2\n龙格-库塔法求解常微分方程的实现\n```\n\n```bash\n\
  ./rungeKutta\nx: 0.02 y: 0.281216\nx: 0.04 y: 0.314931\nx: 0.06 y: 0.351245\nx:\
  \ 0.08 y: 0.390266\n// ...\nx: 1.9  y: 62.9518\nx: 1.92 y: 65.6582\nx: 1.94 y: 68.4763\n\
  x: 1.96 y: 71.4107\nx: 1.98 y: 74.466\nx: 2    y: 77.6472\n结果为 77.6472\n```\n\n\
  运行代码\n\n清单 11-2 中的代码使用 `gcc` 编译并测试。不过，该代码应能使用任何符合标准的编译器工作。测试代码位于 `main` 函数中，该函数使用微分方程\
  \ *y*' = 3*x* + 2*y* + 1 来运行算法。结果可以与前面讨论的欧拉法所得结果进行比较。\n\n示例输出显示了算法在 100 次迭代下的收敛情况。您可以在图\
  \ 11-1 中看到完整的结果。\n\n![../images/323908_2_En_11_Chapter/323908_2_En_11_Fig1_HTML.jpg](img/323908_2_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n前述示例中龙格-库塔算法的连续步骤，N=100\n\n## 求解布莱克-斯科尔斯方程\n\n创建一个 C++ 类，使用前向方法求解布莱克-斯科尔斯方程。\n\
  \n解决方案\n\n布莱克-斯科尔斯方程是定价衍生品最著名的方程之一。它于 20 世纪 70 年代开发，旨在为欧式期权提供更好的模型，但此后，该基本模型已得到扩展并在多种衍生品市场上进行了测试。虽然布莱克-斯科尔斯方程的原始假设在真实市场中并未完全得到尊重，但该模型仍是一个出色的分析工具，用于对呈现股票市场中观察到的波动行为的工具进行定价。\n\
  \n请记住，期权是一份合约，允许持有者在未来特定时间以特定价格购买（或出售）一定数量的股票。例如，一份针对微软（MSFT）的看涨期权，执行价为 30 美元，到期日为明年七月，赋予其所有者权利（而非义务）在七月以\
  \ 30 美元的价格购买微软股票，无论届时实际价格如何。因此，如果微软股票价格显著高于 30 美元，此操作将产生利润。然而，若价格为 30 美元或更低，该期权将导致亏损。类似地，您也可以对看跌期权进行相同分析，看跌期权是以给定价格在未来出售股票的权利。当标的资产价格上涨时，看涨期权产生更高利润，并伴有固定的最大损失。另一方面，当标的资产价格下跌时，看跌期权产生更高利润，同样伴有固定的最大损失。\n\
  \n布莱克-斯科尔斯模型定义了看涨期权的现值应为多少（类似的分析也适用于看跌期权）。它考虑以下输入值：\n\n*   S：标的工具的价格\n*   K：期权的行权价\n\
  *   T：期权合约的剩余时间\n*   V：标的资产的当前波动率\n*   r：当前的存款利率\n\n利用这些信息，布莱克-斯科尔斯模型得出结论，期权当前价格与输入变量之间的关系由一个偏微分方程给出，如下所示：\n\
  \n![$$ \\frac{\\partial C\\left(S,t\\right)}{\\partial t}= rS\\frac{\\partial C\\\
  left(S,t\\right)}{\\partial S}+\\frac{V²{S}²}{2}\\frac{\\partial²C\\left(S,t\\right)}{\\\
  partial {S}²}- rC\\left(S,t\\right) $$](img/323908_2_En_11_Chapter_TeX_Equn.png)\n\
  \n\n\n这里，隐函数 `C(S, t)` 代表价格或衍生品，它依赖于标的资产价格 `S` 和时间 `t`。\n\n求解像前文那样的微分方程有多种方法。本节将采用的方法称为前向法。求解偏微分方程的基本思路与求解常微分方程并无太大区别：朝着所需计算的目标点逐步前进，并在这些中间点上利用某种近似方法来估算微分方程的值。然而，与常微分方程只有一个维度不同，偏微分方程涉及两个或更多变量的偏导数。在本例中，我们拥有关于变量\
  \ `t` 和 `S` 的偏导数。这种情况下，近似过程变得更加复杂，因为需要确定用于评估偏微分方程的小区间形状。例如，最简单的方案是将二维空间划分为许多小矩形，并针对这些微小元素进行近似。根据偏微分方程的具体类别，我们可以设计出更复杂、更精确的方式来划分定义域，并近似偏方程的真实值。\n\
  \n前向差分法是欧拉方法在偏微分方程中的推广。对于二维情形，它可用于将定义域划分为矩形元素。为了应用此方法，你可以假设股票价格定义域 (`S`) 的取值范围在\
  \ 0 到 `MaxS` 之间，`MaxS` 是一个常量，在实际应用中远高于目标执行价。时间定义域则从 0（当前日期）变化到期权合约到期时的未来时间 (`T`)。基于这些假设，接下来的任务是推导出可以近似下一步偏微分方程的公式，这可以再次利用之前讨论过的泰勒方法来完成。\n\
  \n前向法的初始条件来自于到期时的盈亏方程。在到期时，期权的价值是股票价格与执行价之间的正差值，即 `max(S – K, 0)`。因此，算法的时间步长是反向进行的，从时间\
  \ `T` 开始，并逐步回溯到当前时间。\n\n由此产生的算法在 `BlackScholesForwardMethod` 类的成员函数 `solve` 中呈现。该函数的初始部分计算了那些不随时间变化的方程项。三个主要因子存储于向量\
  \ `a`、`b` 和 `c` 之中。\n\n![$$ {a}_n=\\frac{1}{2}\\left( nrdt-{(nV)}² dt\\right) $$](img/323908_2_En_11_Chapter_TeX_Equo.png)\n\
  \n![$$ {b}_n=1- rdt+{(nV)}² dt $$](img/323908_2_En_11_Chapter_TeX_Equp.png)\n\n\
  ![$$ {c}_n=\\frac{1}{2}\\left( nrdt+{(nV)}² dt\\right) $$](img/323908_2_En_11_Chapter_TeX_Equq.png)\n\
  \n下一步是利用给定的初始条件来初始化整个过程。计算出的价格存储在二维向量 `u` 中，该向量使用到期时的价格进行初始化。然后，算法从到期日开始，依次计算每个时间周期的值。在每一天，从到期日的前一天开始，针对标的资产价格的每次微小上涨，计算对应的期权价格。标的资产价值\
  \ `S` 下的期权价格，取决于下一天在 `S – dS`、`S` 和 `S + dS` 这几个价值下的价格，其中 `dS` 是价格的一个微小增量，由参数 `nx`\
  \ 决定。因此，我们有：\n\n![$$ {u}_{t,n}={a}_n{u}_{t,n-1}+{b}_n{u}_{t,n}+{c}_n{u}_{t,n+1}\
  \ $$](img/323908_2_En_11_Chapter_TeX_Equr.png)\n\n### 完整代码\n\n代码清单 11-3 展示了布莱克-斯科尔斯前向方法的完整实现。你可以在类\
  \ `BlackScholesForwardMethod` 中找到这段代码，以及在 `main()` 函数中使用它的示例。\n\n```\n//\n//  BlackScholesForwardMethod.h\n\
  #ifndef __FinancialSamples__BlackScholesForwardMethod__\n#define __FinancialSamples__BlackScholesForwardMethod__\n\
  #include \nclass BlackScholesForwardMethod {\npublic:\nBlackScholesForwardMethod(double\
  \ expiration, double maxPrice, double strike, double intRate);\nBlackScholesForwardMethod(const\
  \ BlackScholesForwardMethod &p);\n~BlackScholesForwardMethod();\nBlackScholesForwardMethod\
  \ &operator=(const BlackScholesForwardMethod &p);\nstd::vector solve(double volatility,\
  \ int nx, int timeSteps);\nprivate:\ndouble m_expiration;\ndouble m_maxPrice;\n\
  double m_strike;\ndouble m_intRate;\n};\n#endif /* defined(__FinancialSamples__BlackScholesForwardMethod__)\
  \ */\n//\n//  BlackScholesForwardMethod.cpp\n#include \"BlackScholesForwardMethod.h\"\
  \n#include \n#include \n#include \n#include \n#include \nusing std::vector;\nusing\
  \ std::cout;\nusing std::endl;\nusing std::setw;\nBlackScholesForwardMethod::BlackScholesForwardMethod(double\
  \ expiration, double maxPrice,\ndouble strike, double intRate)\n: m_expiration(expiration),\n\
  m_maxPrice(maxPrice),\nm_strike(strike),\nm_intRate(intRate)\n{\n}\nBlackScholesForwardMethod::BlackScholesForwardMethod(const\
  \ BlackScholesForwardMethod &p)\n: m_expiration(p.m_expiration),\nm_maxPrice(p.m_maxPrice),\n\
  m_strike(p.m_strike),\nm_intRate(p.m_intRate)\n{\n}\nBlackScholesForwardMethod::~BlackScholesForwardMethod()\n\
  {\n}\nBlackScholesForwardMethod &BlackScholesForwardMethod::operator=(const BlackScholesForwardMethod\
  \ &p)\n{\nif (this != &p)\n{\nm_expiration = p.m_expiration;\nm_maxPrice = p.m_maxPrice;\n\
  m_strike = p.m_strike;\nm_intRate = p.m_intRate;\n}\nreturn *this;\n}\nvector BlackScholesForwardMethod::solve(double\
  \ volatility, int nx, int timeSteps)\n{\ndouble dt = m_expiration /(double)timeSteps;\n\
  double dx = m_maxPrice /(double)nx;\nvector a(nx-1);\nvector b(nx-1);\nvector c(nx-1);\n\
  int i;\nfor (i = 0; i  u((nx-1)*(timeSteps+1));\ndouble u0 = 0.0;\nfor (i = 0; i\
  \  u = bsfm.solve(sigma, numSteps, numDays);\ndouble minPrice = .0;\nfor (int  i=0;\
  \ i < numSteps-1; i++)\n{\ndouble s = ((numSteps-i-2) * minPrice+(i+1)*maxPrice)/\
  \ (double)(numSteps-1);\ncout << \"  \" << s << \"  \" << u[i+numDays*(numSteps-1)]\
  \ << endl;\n}\nreturn 0;\n}\n代码清单 11-3\n布莱克-斯科尔斯前向方法实现\n```\n\n### 运行代码\n\n要测试代码清单\
  \ 11-3 中展示的代码，你可以使用任何符合标准的编译器来构建它。我使用 llvm C++ 编译器运行了此代码，得到以下结果：\n\n```\n./blackScholes\n\
  1  0.000452875\n2  0.0148578\n3  0.109172\n4  0.361706\n5  0.784941\n6  1.34918\n\
  7  2.016\n8  2.75175\n9  3.53055\n10  4.33362\n```\n\n这个结果意味着，例如，在距离到期日还有 29 天时，一个执行价为\
  \ 5 美元、波动率为 0.5 的看涨期权，在标的资产价格为 6 美元时价值为 1.3 美元。请注意，你可以使用这段代码计算从 1 美元到 10 美元每个价格水平下的价格。你也可以修改代码，以计算价格更高的股票对应的期权价格。\n\
  \n\n\n### 结论\n\n求解微分方程是金融分析技术的重要组成部分。此类技术广泛应用于诸多领域，在这些领域中，资产价格由复杂的微分方程决定，例如布莱克-舒尔斯模型，该模型是银行用于为股权衍生品及相关投资定价的主要技术。\n\
  \n在本章中，我向您介绍了微分方程数值解这一主题。尽管这是一个庞大的领域，无法在一章内容中轻易涵盖，但理解基本技术及其在金融编程领域中的应用方式仍然很有价值。\n\
  \n针对常微分方程的 `Euler()` 方法是首先讨论的方法。其主要思想是执行若干步骤，每个步骤都对微分方程的结果进行近似。第二种方法，即龙格-库塔算法，是对这一通用策略的改进，它使用更高阶的泰勒逼近，使算法更加精确，并避免了\
  \ `Euler()` 方法的一些弱点。您已经了解了如何在 C++ 中实现这两种算法，并使用了演示其收敛性的测试数据。\n\n布莱克-舒尔斯方程是现代金融学中最重要的数学模型之一。虽然有多种稳健且高效的算法可以求解该方程，但本文提出了一种基于前向差分的简单方法。您已经了解了通用的求解策略是如何工作的，以及如何在\
  \ C++ 中高效地实现它。\n\n正如本章所述，为描述市场行为的方程寻找解通常是数据分析过程的起点。另一个步骤是找到满足特定投资目标的最佳解决方案。为此，人们开发了许多优化技术。在下一章中，我将介绍一些已被成功应用于金融投资分析的通用优化方法，以及它们在\
  \ C++ 中的实现。\n\n"
- "# 12. 优化\n\n优化是一个广阔的领域，涵盖了用于在一组预定义条件下寻找函数最小值或最大值的大量技术。优化策略经常被用于金融工程的多个领域，例如投资组合优化，因此它应成为金融开发人员基本技能的一部分。\n\
  \n在本章中，我们将讨论一些编程示例，以探究优化算法的几个实现方面。我们将从简要解释一些技术及其在 C++ 中的典型实现方式开始。本章涵盖的主题包括：\n\n\
  *   **优化概念**：优化的基本概念，以及它如何作为金融应用算法中的常见步骤被使用。\n*   **线性规划模型**：线性优化模型的基础知识，包括常见假设以及如何解释结果。您还将学习如何为常见问题创建线性规划模型。\n\
  *   **求解线性模型**：您将学习常用于求解线性规划模型的技术和算法。特别是，您将学习如何使用一个流行的开源库来解决线性规划问题。\n*   **求解混合整数规划模型**：线性规划的一个常见扩展是要求一个或多个决策变量只能取整数值。这种类型的问题，称为整数规划问题，只要线性模型中存在互斥的选择就会被频繁使用。您还将学习如何扩展线性规划类以求解此类混合整数规划模型。\n\
  \n## 与线性规划求解器接口\n\n在本节中，我们将创建一个通用类，用于在给定矩阵形式的**目标函数**和**约束条件**的情况下求解线性规划问题。\n\n\
  ### 解决方案\n\n优化是一种数学技术，用于在给定约束条件集合下寻找函数的最大值或最小值。当前使用的优化方法最初源于微积分中的一组简单结果，即对单个函数进行最小化或最大化。如今，这些技术包含了涉及多个线性和非线性组件的复杂模型。\n\
  \n在金融工程和经济学中，优化是一种用于多种目的的工具，例如设计最优的资产组合配置，或者更广泛地，从大量资产类别中确定最佳投资决策。由于其源于对稀缺资源及其最优利用的分析，线性规划一直是经济学家和金融分析师青睐的工具——这也说明了为什么优化在金融编程中是一种如此常用的技术。实际上，每当我们面对大量情景需要就资产配置做出决策时，优化就成为了帮助选择最佳决策的有用工具。\n\
  \n在“使用 LP 求解器库”一节的代码示例中，我们将考虑如何与现有库进行接口，这些库可用于求解一大类优化问题。为了使讨论内容更紧凑，我将使用一个名为 `GLPK`（Gnu\
  \ 线性规划工具集）的开源库，它也将作为后续示例的基础。`GLPK` 使用简单，但它只是一个基于 C 语言的库。这意味着它不直接支持 C++ 的高级概念，如类、模板和容器。因此，作为讨论的一部分，我将向您展示如何创建一个为\
  \ `GLPK` 和其他求解器提供基本 C++ 接口的类。\n\n然而，首先，我将向您提供一些关于可用优化引擎求解的问题类型的初步信息，从线性规划开始。然后，我将提供一些可用于将简单线性模型转换为求解器**应用程序编程接口**调用的代码。\n\
  \n### 线性规划概念\n\n您将了解的第一种优化情况，其特点是**目标**被表示为一个线性函数。然后，在一组也被称为**约束**的线性函数上对该目标进行优化。此类优化问题被称为线性规划问题，它们构成了一类重要的数学模型，已被广泛应用于金融分析和经济学等学科。\n\
  \n使用更正式（数学）的定义，线性规划是优化的一个领域，它处理在一组线性约束下确定线性函数最小值或最大值的问题。每个约束的形式如下：\n\n![$$ \\sum\
  \ \\limits_{j=1}^n{a}_j{x}_j={a}_1+\\dots +{a}_n\\le {b}_i. $$](img/323908_2_En_12_Chapter_TeX_Equa.png)\n\
  \n类似地，您想要在其上进行优化的函数（也称为**目标函数**）是一个线性函数。这导致了一个可以用以下方式表示的问题：\n\n![$$ \\mathit{\\\
  operatorname{minimize}}\\sum \\limits_{j=1}^n{c}_j{x}_j $$](img/323908_2_En_12_Chapter_TeX_Equb.png)\n\
  \n![$$ subject\\ to\\sum \\limits_{j=1}^n{a}_{ij}{x}_j\\le {b}_i\\kern2.5em for\\\
  \ i\\in \\left\\{1\\dots m\\right\\} $$](img/323908_2_En_12_Chapter_TeX_Equc.png)\n\
  \n![$$ {x}_j\\ge 0\\kern1.25em for\\kern0.5em j\\in \\left\\{1\\dots n\\right\\\
  } $$](img/323908_2_En_12_Chapter_TeX_Equd.png)\n\n\n\n在这些方程中，`x[j]`是一个变量，而`a[ij]`、`b[i]`和`c[j]`是常量值。这些参数通常以矩阵`A`和两个向量`b`和`c`的形式提供。由于它的通用特性，这类问题可以呈现多种形式，这取决于给定系数的确切值，以及它们是否为零或非零。此外，问题的变体涉及改变一个或多个方程中的`≤`关系到`≥`或`=`。最后，问题可能要求最大化而非最小化目标函数。所有这些变体都可以很容易地证明彼此等价，因为可以将它们转换为特定的形式，并使用相同的算法求解。\n\
  \n求解线性规划问题可以借助一种称为单纯形算法的方法来完成。单纯形算法的基本方法是考虑由约束在多维空间中定义的几何区域，并以一种明确的方式开始访问该对象的顶点——直到找到最优解。\n\
  \n本质上，求解线性规划问题的机制与求解一系列线性系统并无太大区别，并且已经设计出几种利用这一通用策略的方案。单纯形算法仍然是求解线性规划问题最常用的技术，它通过定义一系列修改后的线性系统来进行，这些系统被证明与原系统等价，同时不断改进目标函数的值。单纯形算法的优势之一是其性质众所周知——多年来对单纯形算法的数学分析已经考虑了诸如收敛性和性能等几个重要问题。\n\
  \n虽然描述单纯形算法的操作并不困难，但实现该算法包含许多复杂的边界情况。为了避免这些问题，大多数情况下你会使用一个专门设计来隐藏实现复杂性的线性规划求解器库。本质上，求解器只提供一个简单的\
  \ API，使用户能够调用算法、提供必要的数据并检索结果。\n\n## 使用线性规划求解器库\n\n有几种商业和免费库实现了单纯形算法（甚至还有几种针对此问题更高效的算法）。在本节中，为了说明建模和线性规划过程的原理，我们使用一个简单但维护良好的开源库，名为\
  \ GLPK。使用 GLPK，可以解决从中等到相对较大规模的线性规划问题（以及一些其他模型变体，如混合整数规划）。\n\n要从 C++开始使用 GLPK，第一步是下载并编译源代码。你将在\
  \ GNU 网站上找到该软件的一个版本（在我检查时，URL 为[www.gnu.org/software/glpk](http://www.gnu.org/software/glpk)）。与许多数学开源库不同，GLPK\
  \ 非常易于编译和安装。你需要解压文件并使用`configure`和`make`命令构建库（这些说明适用于 UNIX 系统，但你可以下载诸如 Cygwin 之类的软件，以便在\
  \ Windows 中执行相同的命令）。\n\n安装 GLPK 后，你可以链接到其库`libglpk.a`，并使用其 API 导出的函数。在 Windows 系统上，你可以使用\
  \ GLPK 网站上提供的预编译二进制 dll 和 lib 文件。你也可以在 Windows 上使用 MingWin 编译器来编译 gcc。\n\n我提供了一个名为`LPSolver`的类，它能够与\
  \ GLPK API 进行交互。以下是该类声明的公共部分：\n\n```\nclass LPSolver {\npublic:\nLPSolver(Matrix\
  \ &m, const std::vector &b, const std::vector &c);\nLPSolver(const LPSolver &p);\n\
  ~LPSolver();\nLPSolver &operator=(const LPSolver &p);\nenum ResultType {\nINFEASIBLE,\n\
  FEASIBLE,\nERROR\n};\nvoid setName(const std::string &s);\nbool isValid();\nvoid\
  \ setMaximization();\nvoid setMinimization();\nResultType solve(std::vector &result,\
  \ double &objValue);\n// ...\n};\n```\n\n首先，如果你将矩阵`A`、向量`b`和向量`c`传递给构造函数，则可以创建`LPSolver`类型的对象。这些参数被解释为目标函数的系数以及线性规划的约束条件。\n\
  \n你还可以使用`setName`成员函数为问题指定一个描述性名称。其实现展示了 GLPK 中一个简单函数的样子。\n\n```\nvoid LPSolver::setName(const\
  \ std::string &s)\n{\nglp_set_prob_name(m_lp, s.c_str());\n}\n```\n\n该 API 函数名为`glp_set_prob_name`。与\
  \ GLPK 中大多数其他函数一样，第一个参数是指向线性规划数据结构的指针。第二个参数是一个字符串，对于此 API 调用是唯一的。\n\n`isValid`成员函数检查对象是否已正确初始化。`setMaximization`和`setMinimization`成员函数可用于定义优化方向。\n\
  \n最后，`solve`成员函数执行优化算法。这是通过调用 GLPK 完成的，其中使用`glp_simplex`函数来完成实际工作。优化完成后，算法收集目标函数的结果以及每个变量在此最优解中的值。\n\
  \n```\nLPSolver::ResultType LPSolver::solve(std::vector &result, double &objValue)\n\
  {\nglp_simplex(m_lp, NULL);\nresult.resize(m_M, 0);\nobjValue = glp_get_obj_val(m_lp);\n\
  for (int i=0; i<m_M; ++i)\n{\nresult[i] = glp_get_col_prim(m_lp, i+1);\n}\nreturn\
  \ LPSolver::FEASIBLE;\n}\n```\n\n最后，使用一个线性规划示例来测试`LPSolver`类。在此示例中，我提供了等于 10、6 和\
  \ 4 的目标函数系数。约束条件的右侧也作为一个向量提供。最后，问题的约束条件以`Matrix`对象`A`的形式给出。\n\n### 完整代码\n\n清单 12-1\
  \ 显示了上一节描述的线性规划求解器的完整代码清单。在清单末尾的`main`函数中给出了`LPSolver`类的一个示例。\n\n\n\n```cpp\n//\n\
  // LPSolver.h\n#ifndef __FinancialSamples__Glpk__\n#define __FinancialSamples__Glpk__\n\
  #include \n#include \n#include \"Matrix.h\"\nstruct glp_prob;\nclass LPSolver {\n\
  public:\nLPSolver(Matrix &A, const std::vector &b,\nconst std::vector &c);\nLPSolver(Matrix\
  \ &A, const std::vector &b,\nconst std::vector &c,\nconst std::string &probname);\n\
  LPSolver(const LPSolver &p);\n~LPSolver();\nLPSolver &operator=(const LPSolver &p);\n\
  enum ResultType {\nINFEASIBLE,  // 不可行\nFEASIBLE,    // 可行\nERROR        // 错误\n\
  };\nvirtual ResultType solve(std::vector &result, double &objValue);\nvoid setName(const\
  \ std::string &s);\nbool isValid();\nvoid setMaximization();\nvoid setMinimization();\n\
  private:\nsize_t m_M;\nsize_t m_N;\nstd::vector m_c;\nstd::vector m_b;\nMatrix m_A;\n\
  glp_prob *m_lp;\nvoid initProblem(size_t M, size_t N);\nvoid setRowBounds();\nvoid\
  \ setColumnCoefs();\nprotected:\nglp_prob *getLP();\nint getNumCols();\nint getNumRows();\n\
  };\n#endif /* defined(__FinancialSamples__Glpk__) */\n//\n//  LPSolver.cpp\n#include\
  \ \"LPSolver.h\"\n#include \n#include \nusing std::vector;\nusing std::string;\n\
  using std::cout;\nusing std::endl;\nLPSolver::LPSolver(Matrix &m, const vector &b,\
  \ const vector &c)\n: m_M(m.numRows()),\nm_N(m[0].size()),\nm_c(c),\nm_b(b),\nm_A(m),\n\
  m_lp(glp_create_prob())\n{\ninitProblem(m_M, m_N);\n}\nLPSolver::LPSolver(Matrix\
  \ &m, const std::vector &b,\nconst std::vector &c,\nconst std::string &probname)\n\
  : m_M(m.numRows()),\nm_N(m[0].size()),\nm_c(c),\nm_b(b),\nm_A(m),\nm_lp(glp_create_prob())\n\
  {\ninitProblem(m_M, m_N);\nglp_set_prob_name(m_lp, probname.c_str());\n}\nLPSolver::LPSolver(const\
  \ LPSolver &p)\n: m_M(p.m_M),\nm_N(p.m_N),\nm_c(p.m_c),\nm_b(p.m_b),\nm_A(p.m_A),\n\
  m_lp(glp_create_prob())\n{\ninitProblem(m_M, m_N);\n}\n// performs necessary initialization\
  \ of the given values\nvoid LPSolver::initProblem(size_t M, size_t N)\n{\nif (!m_lp)\
  \ return;\nsetRowBounds();\nsetColumnCoefs();\nvector I, J;\nvector V;\n// indices\
  \ in GLPK start on 1\nI.push_back(0);\nJ.push_back(0);\nV.push_back(0);\nfor (int\
  \ i=0; i &result, double &objValue)\n{\nglp_simplex(m_lp, NULL);\nresult.resize(m_N,\
  \ 0);\nobjValue = glp_get_obj_val(m_lp);\nfor (int j=0; j c = { 10, 6, 4 };\nvector\
  \ b = { 100, 600, 300 };\nLPSolver solver(A, b, c);\nsolver.setMaximization();\n\
  vector results;\ndouble objVal;\nsolver.solve(results, objVal);\nfor (int i=0; i<results.size();\
  \ ++i)\n{\ncout << \" x\" << i << \": \" << results[i];\n}\ncout << \" max: \" <<\
  \ objVal << endl;\nreturn 0;\n}\n```\n**清单 12-1：**`LPSolver` 类头文件与实现\n\n**运行代码**\n\
  \n清单 12-1 中展示的代码可使用符合标准的编译器（如 `gcc` 或 Visual Studio）进行编译。请记得在链接步骤中添加 GLPK 库（在 `gcc`\
  \ 中，通过 `-L` 和 `-l` 开关实现）。程序执行结果应类似于以下内容：\n\n```\n./lpSolver\nGLPK Simplex Optimizer,\
  \ v4.54\n3 rows, 3 columns, 9 non-zeros\n*     0: obj =   0.000000000e+00  infeas\
  \ =  0.000e+00 (0)\n*     2: obj =   7.565217391e+02  infeas =  0.000e+00 (0)\n\
  OPTIMAL LP SOLUTION FOUND\nx0: 52.1739 x1: 39.1304 x2: 0 max: 756.522\n```\n\n这里，你看到了\
  \ GLPK 的首次输出。默认情况下，GLPK 会显示最优解以及达到该结果所经历的迭代次数。你可以看到，经过两次单纯形算法迭代后，GLPK 找到了一个目标值为\
  \ 756 的解。\n\n## 求解二维投资问题\n\n在本节中，我们使用线性规划技术来建模并求解一个涉及两种已知回报投资的金融产品分配决策问题。\n\n###\
  \ 解决方案\n\n优化技术的主要用途之一是支持投资决策。在这方面，可以根据投资类别的已知属性来优化多个概念。对于少数几种投资类型，例如债券，更容易确定投资的回报率，以及该投资类别风险的一些基本信息。这些知识可以转化为更精确的模型，特别是那些可用于优化投资者利润的模型。\n\
  \n本节介绍一个非常简单的、使用线性规划建模的决策支持系统版本。该问题展示了用于求解线性规划问题（即使是最复杂的问题）的基本几何过程。\n\n考虑一家大型银行将两种新的金融产品推向市场的过程。这一过程通常由这些投资所需资源的一系列实际约束条件来定义。假设该银行希望向市场增加两类新产品：新的基于债券的产品和新的抵押贷款支持衍生品产品。问题是在这些新产品的开发上应投入多少小时。我们将这两个变量称为\
  \ `x` 和 `y`。由于银行部门根据在这些任务上花费的小时数从客户那里获得报酬，因此目标是最大化每小时获得的报酬。对于债券，该项活动每小时的收费为 5.3K\
  \ 美元，而衍生品的收费为 7.1K 美元。\n\n在约束条件方面，银行部门必须考虑研发支出成本。从事债券工作的成本是负的，因为其成本可以被该领域的其他活动所抵消。对于衍生品，则需考虑全部研发成本。这些金融产品的最大营销支出也按工作小时数进行分摊。因此，它取决于\
  \ `x` 和 `y` 的值。已知债券相关产品的工作小时数有一个 3K 美元的常数项，而衍生品工作的乘数为 1K 美元。\n\n最后，这两项任务可用的总人力资源是有限的。虽然只有六个单位的人力资源分配给这些任务，但每小时的债券相关工作对人力资源的需求是衍生品的八倍。还要注意，本例中的两个变量显然是非负的。\n\
  \n这些假设的结果可以很容易地转化为以下线性规划模型，该模型试图最大化该投资银行所考虑部门的预期回报（利润）。\n\n*   `max 5.3*x* + 7.1*y*`\
  \ (最大化部门收益)\n*   `–2.1*x* + *y* ≤ 3.4` (最大研发支出)\n*   `3.1*x* + *y* ≤ 4.3` (最大营销支出)\n\
  *   `7.9*x* + *y* ≤ 6` (所需的最大员工人数)\n*   `*x*, *y* ≥ 0` (工作时间始终为正)\n\n前面描述的模型只有两个未知数，`x`\
  \ 和 `y`，因此可以很容易地绘制出来，如图 12-1 所示。作为一个不等式，每个约束条件都产生一个由等式线定义的半空间。例如，`3*x* + *y* ≤ 4`\
  \ 是由直线 `3*x* + *y* = 4` 下方所有点定义的半空间。\n\n![../images/323908_2_En_12_Chapter/323908_2_En_12_Fig1_HTML.jpg](img/323908_2_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1：由前面所示不等式定义的线性规划问题可行域\n\n\n\n要解决像之前描述的二维线性规划模型，你需要关注由约束所定义的所有半空间（half-spaces）的交集。根据问题的定义，这个交集位于图表的第一象限，因为已知`x\
  \ ≥ 0`且`y ≥ 0`。然后，可以识别出所有其他半空间交集所包含的区域。结果是一个多边形区域，其边界由一组源自给定约束的直线所定义。\n\n要找到此类线性规划的解，你只需计算目标函数在约束定义区域每个角点处的值。根据线性目标函数的定义，能给出目标函数最优值的角点，就是该问题所能找到的最优解。\n\
  \n虽然前面描述的过程对于二维问题很容易执行，但在更高维度上就会变得相当困难。随着维度和约束数量的增加，角点的数量呈指数级增长。这就需要使用更复杂的算法（例如单纯形算法）来找到多维空间中定义给定线性规划最优解的最佳角点。\n\
  \n为了演示该问题在实际中如何求解，我向你展示了所提出的二维线性规划的 C++ 实现。名为`TwoDimensionalLPSolver`的类，是使用上一节描述的`LPSolver`来实现此类问题的蓝图。\n\
  \n首先，你需要创建模型，该模型使用矩阵`A`、向量`b`（约束的右侧值）和向量`c`（成本向量）进行描述。必要的数据在`main`函数中提供。数据可用后，即可用于创建`LPSolver`类的对象。然后，`LPSolver`类中的`solve()`函数将执行任何必要的数据转换，并调用\
  \ GLPK 库来找到最优解。\n\n### 完整代码\n\n清单 12-2 给出了二维线性规划求解器的完整实现。`main()` 函数展示了`TwoDimensionalLPSolver`类的使用示例。\n\
  \n```\n//\n//  TwoDimensionalLPSolver.h\n#ifndef __FinancialSamples__TwoDimensionalLPSolver__\n\
  #define __FinancialSamples__TwoDimensionalLPSolver__\n#include \nclass TwoDimensionalLPSolver\
  \ {\npublic:\nusing Vector = std::vector;\nTwoDimensionalLPSolver(const Vector &c,\
  \ const Vector &A1, const Vector &A2, const Vector &b);\nTwoDimensionalLPSolver(const\
  \ TwoDimensionalLPSolver &p);\n~TwoDimensionalLPSolver();\nTwoDimensionalLPSolver\
  \ &operator=(const TwoDimensionalLPSolver &p);\nbool solveProblem(Vector &results,\
  \ double &objVal);\nprivate:\nstd::vector m_c;\nstd::vector m_A1;\nstd::vector m_A2;\n\
  std::vector m_b;\n};\n#endif /* defined(__FinancialSamples__TwoDimensionalLPSolver__)\
  \ */\n//\n//  TwoDimensionalLPSolver.cpp\n#include \"TwoDimensionalLPSolver.h\"\n\
  #include \"Matrix.h\"\n#include \"LPSolver.h\"\n#include \nusing std::vector;\n\
  using std::cout;\nusing std::endl;\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
  \ Vector &c, const Vector &A1,\nconst Vector &A2, const Vector &b)\n: m_c(c),\n\
  m_A1(A1),\nm_A2(A2),\nm_b(b)\n{\n}\nTwoDimensionalLPSolver::TwoDimensionalLPSolver(const\
  \ TwoDimensionalLPSolver &p)\n: m_c(p.m_c),\nm_A1(p.m_A1),\nm_A2(p.m_A2),\nm_b(p.m_b)\n\
  {\n}\nTwoDimensionalLPSolver::~TwoDimensionalLPSolver()\n{\n}\nTwoDimensionalLPSolver\
  \ &TwoDimensionalLPSolver::operator=(const TwoDimensionalLPSolver &p)\n{\nif (this\
  \ != &p)\n{\nm_c = p.m_c;\nm_A1 = p.m_A1;\nm_A2 = p.m_A2;\nm_b = p.m_b;\n}\nreturn\
  \ *this;\n}\nbool TwoDimensionalLPSolver::solveProblem(Vector &res, double &objVal)\n\
  {\nint size = m_b.size();\nMatrix A(size, 2);\nfor (int j=0; j A1 = { -2.1, 3.1,\
  \ 7.9};\nvector A2 = { 1, 1, 1 };\nvector c = { 5.3, 7.1 };\nvector b = { 3.4, 4.3,\
  \ 6 };\nTwoDimensionalLPSolver solver(c, A1, A2, b);\nvector results;\ndouble objVal;\n\
  solver.solveProblem(results, objVal);\ncout << \"objVal : \" << objVal << endl;\n\
  for (int i=0; i<results.size(); ++i)\n{\ncout << \" x\" << i << \": \" << results[i];\n\
  }\ncout << endl;\nreturn 0;\n}\n清单 12-2\n类 TwoDimensionalLPSolver 的头文件与实现\n```\n\
  \n### 运行代码\n\n你可以使用任何符合标准的编译器来编译并运行所提供的代码。我在 gcc 和 GLPK 优化器 4.54 版本下测试了该代码。结果如下：\n\
  \n```\n./twoDimSolver\nGLPK Simplex Optimizer, v4.54\n3 rows, 2 columns, 6 non-zeros\n\
  *     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n*     2: obj = 2.763788462e+01\
  \ infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\nobjVal : 27.6379\nx0: 0.173077\
  \ x1: 3.76346\nProgram ended with exit code: 0\n```\n\n从示例列出的输出中可以看出，最优解在顶点 (0.173,\
  \ 3.763) 处取得，该点对应方程 `–2.1*x + y = 3.4` 和 `3.1*x + y ≤ 4` 的交点。在该点，目标函数的值为 27.63，这可以解释为部门将给定小时数投入到前面讨论的两种金融产品中所实现的利润。\n\
  \n## 创建混合整数规划模型\n\n扩展`LPSolver`类，使其能够处理混合整数规划（MIP）问题，即一个或多个变量被限制为整数的线性规划问题。\n\n\n\
  \n### 解决方案\n\n在连续线性规划（LP）问题之后，混合整数规划（MIP）问题可能是实践者需要处理的最常见的优化问题类型。从建模角度来看，LP 与 MIP\
  \ 最大的区别在于，MIP 问题有一个或多个决策变量必须为整数——这与 LP 问题不同，LP 中所有决策变量都是连续的（通常是实数）。\n\n整数变量非常适合需要在中小型集合内做出互斥决策的情况。此外，这些决策变量可能适用于不可分割的资源。例如，您可以使用此类变量决定商业银行的地方分行数量，或投资组合中包含的不同股票数量。这些都是只能以整数数量使用的资源的常见示例。\n\
  \n一种特殊类型的整数变量是二元决策变量，也称为 0–1 决策变量。这些变量只能取 0 或 1（全有或全无）的值。它们是最纯粹的整数变量形式，因为它们允许只在两种替代选择之间做出决策。可以预见，许多\
  \ MIP 问题将二元变量作为达成最优决策的主要方式。\n\n从问题求解的技术角度来看，MIP 问题比 LP 问题复杂得多。虽然有非常高效的算法可用于求解 LP\
  \ 公式，但并非所有 MIP 问题都能被当前的计算机算法轻易求解。简而言之，这是因为当决策变量为整数时，它会在目标函数中产生“跳跃”，使得寻找最优解变得更加困难。因此，与\
  \ LP 问题不同（LP 中可以快速确定可行解集合的最优顶点），MIP 求解器需要花费更多时间生成可能的解并测试它们是否最优。这种选项的指数级爆炸是 MIP 问题比\
  \ LP 问题难解得多的主要原因。\n\n大多数 LP 库已扩展为至少能处理某些形式的 MIP。GLPK 实现了一种称为`branch-and-cut`的通用\
  \ MIP 求解算法。使用此算法，可以求解中小型 MIP 问题的最优解。然而，更复杂的 MIP 问题可能无法使用此技术求解，具体取决于所需问题的结构。\n\n\
  在本编码示例中，您将看到如何扩展`LPSolver`类以处理 MIP 问题，以及经典的 LP 问题。在下一节中，您将看到一个如何使用`LPSolver`类建模并求解\
  \ MIP 问题的示例。\n\n我决定从`LPSolver`继承而不是创建一个不相关的新类的主要原因是，从建模角度来看，MIP 问题与 LP 问题非常接近。在后一种情况下，您唯一需要额外做的事情是指定哪些变量是整数或二元，并调用正确的函数版本来求解并检索\
  \ GLPK 找到的值。\n\n在`MIPSolver`类中，这是通过以下方式实现的。首先，有两个新的成员函数，名为`setColBinary`和`setColInteger`。这些成员函数可用于告知\
  \ GLPK 给定列中的变量分别是整数还是二元。它们的实现很直接，只是调用 GLPK 中相关的 C 函数。例如：\n\n```cpp\nvoid MIPSolver::setColBinary(int\
  \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_BV);\n}\n```\n\n另一个关键部分是实现`solve`成员函数的新版本。新版本取代了`LPSolver`中的原始版本，并调用\
  \ MIP 专用的函数，例如`glp_mip_obj_val`。其中一个区别是，对于 MIP 问题，您需要先求解对应的 LP 问题，以此作为连续问题的初始可行解。之后，您可以调用\
  \ MIP 求解器，它将基于可能的整数值树来创建搜索算法。\n\n### 完整代码\n\n清单 12-3 展示了上一节描述的 MIP 求解器的完整代码。您可以使用清单\
  \ 12-3 末尾的`main`函数中的示例代码测试`MIPSolver`类。\n\n```cpp\n//\n//  MIPSolver.h\n#ifndef\
  \ __FinancialSamples__MIPSolver__\n#define __FinancialSamples__MIPSolver__\n\n#include\
  \ \"LPSolver.h\"\n\nclass MIPSolver : public LPSolver {\npublic:\n    MIPSolver(Matrix\
  \ &A, const std::vector &b, const std::vector &c);\n    MIPSolver(const MIPSolver\
  \ &p);\n    ~MIPSolver();\n    MIPSolver &operator=(const MIPSolver &p);\n    void\
  \ setColInteger(int colNum);\n    void setColBinary(int colNum);\n    virtual ResultType\
  \ solve(std::vector &result, double &objValue);\n};\n\n#endif /* defined(__FinancialSamples__MIPSolver__)\
  \ */\n\n//\n//  MIPSolver.cpp\n#include \"MIPSolver.h\"\n#include \"Matrix.h\"\n\
  #include <iostream>\n#include <algorithm>\n\nusing std::vector;\nusing std::cout;\n\
  using std::endl;\n\nMIPSolver::MIPSolver(Matrix &A, const std::vector &b, const\
  \ std::vector &c)\n: LPSolver(A, b, c)\n{\n}\n\nMIPSolver::MIPSolver(const MIPSolver\
  \ &p)\n: LPSolver(p)\n{\n}\n\nMIPSolver::~MIPSolver()\n{\n}\n\nMIPSolver &MIPSolver::operator=(const\
  \ MIPSolver &p)\n{\n    return *this;\n}\n\nvoid MIPSolver::setColInteger(int colNum)\n\
  {\n    glp_set_col_kind(getLP(), colNum+1, GLP_IV);\n}\n\nvoid MIPSolver::setColBinary(int\
  \ colNum)\n{\n    glp_set_col_kind(getLP(), colNum+1, GLP_BV);\n}\n\nLPSolver::ResultType\
  \ MIPSolver::solve(vector &result, double &objValue)\n{\n    glp_simplex(getLP(),\
  \ NULL);\n    int res = glp_intopt(getLP(), NULL);\n    if (res != 0)\n    {\n \
  \       cout << \"error on glp_intopt\" << endl;\n        return LPSolver::kError;\n\
  \    }\n    int n = getNumVariables();\n    result = vector(n);\n    for (int j\
  \ = 0; j < n; ++j)\n    {\n        result[j] = glp_mip_col_val(getLP(), j+1);\n\
  \    }\n    objValue = glp_mip_obj_val(getLP());\n    return LPSolver::kOptimal;\n\
  }\n\nint main()\n{\n    int m = 2;\n    int n = 2;\n    Matrix A(m, n);\n    vector\
  \ b = { 2, 3 };\n    vector c = { 1, 1 };\n    A[0][0] = 1;\n    A[0][1] = 2;\n\
  \    A[1][0] = 3;\n    A[1][1] = 4;\n    MIPSolver solver(A, b, c);\n    solver.setMaximization();\n\
  \    solver.setColInteger(0);\n    vector result;\n    double objVal;\n    solver.solve(result,\
  \ objVal);\n    cout << \"optimum: \" << objVal << endl;\n    cout << \" x0: \"\
  \ << result[0] << \" x1: \" << result[1] << endl;\n    return 0;\n}\n\n清单 12-3\n\
  MIPSolver 类\n```\n\n### 运行代码\n\n用您喜欢的编译器编译清单 12-3 中的代码后，您应该得到一个二进制程序，我将其命名为`mipSolver`。以下是应用程序执行后的输出：\n\
  \n```\n./mipSolver\nGLPK Simplex Optimizer, v4.54\n2 rows, 2 columns, 4 non-zeros\n\
  *     0: obj = 0.000000000e+00 infeas = 0.000e+00 (0)\n*     1: obj = 1.000000000e+00\
  \ infeas = 0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\nGLPK Integer Optimizer, v4.54\n\
  2 rows, 2 columns, 4 non-zeros\n1 integer variable, none of which are binary\nInteger\
  \ optimization begins...\n+     1: mip =     not found yet >>>>   1.000000000e+00\
  \ <=   1.000000000e+00   0.0% (1; 0)\n+     1: mip =   1.000000000e+00 <=     tree\
  \ is empty   0.0% (0; 1)\nINTEGER OPTIMAL SOLUTION FOUND\noptimum: 1\nx0: 1 x1:\
  \ 0\n```\n\n请注意，`main`函数中有一个非常简单的 MIP 模型作为测试代码的一部分。上面的输出仅展示了 GLPK 默认打印数据的方式。在过程的每一步，它都会显示当前找到的解及其目标成本。\n\
  \n\n\n### 结论\n\n优化是一组数学方法，可用于在特定条件下寻找函数的最大值或最小值。由于金融领域的许多问题可被描述为最大化特定结果（例如投资回报），因此优化工具在投资分析中扮演着重要角色。\n\
  \n在本章中，您已学习如何使用 C++ 建模并求解常见的优化问题。在第一部分，我演示了如何使用 `GLPK`（一种用于求解大量线性规划模型的流行优化库）。尽管其他库（如\
  \ `cplex` 和 `gurobi`）使用了更复杂的算法，但 `GLPK` 能够解决数量惊人的线性规划和混合整数规划模型。第一部分的示例展示了如何创建 C++\
  \ 接口以与 `GLPK` 支持的基于 C 的 API 进行交互。您已了解线性规划问题的主要组成部分，以及求解器如何利用这些组件确定最优解。该示例还提供了一些测试代码，展示了如何使用\
  \ `LPSolver` 类求解简单的线性规划模型。\n\n下一部分提供了一个大型线性规划模型示例，旨在为一家大型投资银行寻找最佳资源配置方案。该模型试图在最大化部门利润的同时，找到开发两种金融产品的最佳方式。模型中考虑的约束条件与银行部门的资源限制有关。使用\
  \ `LPSolver` 类求解该线性规划问题展示了如何在 C++ 中对此类问题进行建模，并解读 `GLPK` 返回的优化过程结果。\n\n混合整数规划是另一类可使用优化技术求解的重要线性模型。在混合整数规划中，部分或全部决策变量被限制为仅取整数值。这使得我们能够对需要在两个或多个场景之间进行互斥决策的情况进行建模。尽管混合整数规划模型可能比线性规划模型更难求解，但设置问题和调用求解器的机制却非常相似。您已学习如何通过继承\
  \ `LPSolver` 类来与混合整数规划求解器交互。新类 `MIPSolver` 使用了 `LPSolver` 提供的大部分建模机制，但增加了定义整数和二元决策变量、求解问题以及检索最优整数值的能力。最后，您看到了一个展示此类模型如何工作的小示例。第\
  \ 13 章提供了更多示例。\n\n到目前为止，您已学习了一些关于优化和数学规划模型的基本概念。在下一章中，您将探索如何将这些线性规划和混合整数规划优化模型应用于投资管理问题。由于优化理论的主要应用领域之一是金融，许多常见问题（如投资组合管理）都有成熟的优化模型。您将学习此类建模概念的工作原理，以及如何使用\
  \ C++ 编程语言实现这些模型。\n\n"
- "# 13. 资产与投资组合优化\n\n投资组合经理必须面对若干投资问题，例如为了达到最优表现而重新平衡投资组合，或根据客户预定义的长期目标调整新的投资组合。多年来，人们开发了基于优化的技术来处理这些问题以及其他一些常见的投资组合构建问题。\n\
  \n在本章中，您将探索使用 C++ 作为建模语言进行资产和投资组合优化的编程算法。您将能够基于著名的数学规划公式创建此类金融模型。您还将了解如何提升此类优化代码的性能，从而以尽可能快且准确的方式获得结果。\n\
  \n以下是本章 C++ 示例中涵盖的部分主题：\n\n- **资本配置**：公司和银行面临的重大问题之一是如何将资本配置给一组可能的投资项目。您将看到如何使用优化模型进行资本配置。\n\
  - **按目标收益创建投资组合**：您可以根据期望收益，使用优化模型来设计股票或其他投资品的投资组合。此类最优投资组合的目标是以最小的波动性实现最佳收益。\n\
  - **线性与二次模型**：您将了解二次和线性优化模型在投资组合优化中的优势。\n\n## 金融资源配置\n\n在本节中，我们将使用 C++ 编写一个线性规划模型，以确定在\
  \ 10 年期限内，针对一组给定的项目及其各自成本的最优资源配置方案。\n\n### 解决方案\n\n资源配置是个人和机构投资者面临的最常见问题之一。由于资本是有限资源，优化其使用以将资金最优地分配给有价值的活动是合理的。尽管投资结果（如股票价格）可能无法完全预测，但仍有可能会使用一般性预测来进行决策。\n\
  \n如本节所述，线性规划为金融分配决策提供了一个框架。首先，您需要确定最适合对资源配置问题建模的线性规划形式。\n\n为使用具体的配置示例，假设一家公司需要从一组五个不同的活跃投资项目中做出决策。这些投资可能包括购买新的制造设备、为企业招聘新员工，或对物流软件包进行改进。所有这些选项都有特定的成本，并且可以计算出未来五年中每一年的成本。此外，每个投资项目的回报是预先已知的。例如，如果资金用于购买新设备，则已知这会产生一定数额的利润。\n\
  \n作为这家公司的金融开发者，您的任务是实现一个模型来解决所需的金融分配问题。这可以作为一个线性规划模型来完成，之后将在 C++ 中实现。因此，首先，让我们考虑线性规划模型的变量、约束条件和目标函数。\n\
  \n**决策变量**在此情况下是对可能投资的选择。也就是说，如果有 `n` 个可能的投资项目，那么当资本分配给项目 `j` 时，我们有变量 `x[j] = 1`，其中\
  \ `j ∈ {1,..,n}`。如果将每个投资的回报记为 `r[j]`，那么我们可以将此线性规划的目标函数写为\n\n```\nmax ∑_{j=1}^n r_j\
  \ * x_j\n```\n\n约束条件与投资者在未来 5 年每年希望使用的资金金额有关。由于每项投资在任意 `m` 个时期中的成本是已知的，我们称这些成本为\
  \ `c[ij]`，其中 `i ∈ {1...m}` 且 `j ∈ {1...n}`。每年，投资额受限于值 `C[i]`，即时间周期 `i` 可用的资本金额。那么，对于每个时间周期（每个周期对应\
  \ 1 年），约束条件可写为\n\n```\n∑_i^n c_ij * x_j ≤ C_i; for i ∈ {1…m}\n```\n\n\n\n最后，我们将每个变量`x[j]`定义为一个“要么做要么不做”的决策。也就是说，该变量只能取值为\
  \ 1 或 0，表示该项目将被执行或不执行。  \n`x[j] ∈ {0,1}`，对于`j` ∈ `{1,...,n}`。  \n\n由于前面描述的问题具有线性目标函数和线性约束，它是一个线性优化问题。然而，最后一个约束使得该问题成为一个\
  \ 0-1 整数线性规划问题，这比标准线性规划问题要难解决得多。\n\n### 实现\n\n为了实现前面描述的问题，我将利用上一章中定义的`MIPSolver`类。请记住，任何混合整数规划问题的输入都可以用约束矩阵、右端项向量和成本向量来表示。因此，在定义所需的资本分配问题时，我们需要定义这三个要素。\n\
  \n为了清晰展示这一过程是如何工作的，我创建了一个简单的示例，该示例可以在`ResourceAlloc`类的成员函数`solveProblem`中查看。首先，该方法定义了一个\
  \ 5 年期的项目成本矩阵。我们也有五个项目，因此得到一个方阵——不过请注意，要使此公式有效，并不一定需要方阵。\n\n方法`solveProblem`的接下来几行定义了投资回报和年度预算。这个过程的一个重要部分是使用`setBinary`成员函数，该函数规定每个变量必须具有二进制值。\n\
  \n最后，你需要调用`MIPSolver`类中的`solve`函数，该函数将调用 GNU 线性规划工具包（GLPK）求解器并确定最优值。\n\n### 完整代码\n\
  \n上一节中描述的资源分配问题的完整代码可以在清单 13-1 中查看。清单末尾的`main`函数将实例化`ResourceAlloc`类并求解示例问题。\n\n\
  ```\n//\n//  ResourceAlloc.h\n#ifndef __FinancialSamples__ResourceAlloc__\n#define\
  \ __FinancialSamples__ResourceAlloc__\n#include \nclass ResourceAlloc {\npublic:\n\
  ResourceAlloc(std::vector &result, double &objVal);\nResourceAlloc(const ResourceAlloc\
  \ &p);\n~ResourceAlloc();\nResourceAlloc &operator=(const ResourceAlloc &p);\nvoid\
  \ solveProblem();\nprivate:\nstd::vector &m_results;\ndouble &m_objVal;\n};\n#endif\
  \ /* defined(__FinancialSamples__ResourceAlloc__) */\n//\n//  ResourceAlloc.cpp\n\
  #include \"ResourceAlloc.h\"\n#include \"LPSolver.h\"\n#include \"Matrix.h\"\n#include\
  \ \nusing std::vector;\nusing std::cout;\nusing std::endl;\nResourceAlloc::ResourceAlloc(vector\
  \ &result, double &objVal)\n: m_results(result),\nm_objVal(objVal)\n{\n}\nResourceAlloc::ResourceAlloc(const\
  \ ResourceAlloc &p)\n: m_results(p.m_results),\nm_objVal(p.m_objVal)\n{\n}\nResourceAlloc::~ResourceAlloc()\n\
  {\n}\nResourceAlloc &ResourceAlloc::operator=(const ResourceAlloc &p)\n{\nif (this\
  \ != &p)\n{\nm_results = p.m_results;\nm_objVal = p.m_objVal;\n}\nreturn  *this;\n\
  }\nvoid ResourceAlloc::solveProblem()\n{\nstatic const double cost_array[][5] =\
  \ {\n// Years:\n// 1    2   3     4    5\n{1.81, 2.4,  2.5, 0.97, 1.5},  // proj\
  \ 1\n{1.29, 1.8,  2.3, 0.56, 0.5},  // proj 2\n{1.22, 1.2,  0.1, 0.48, 0 },   //\
  \ proj 3\n{1.43, 1.4,  1.2, 1.2, 1.2},   // proj 4\n{1.62, 1.9,  2.5, 2.0, 1.8},\
  \   // proj 5\n};\nMatrix costs(5,5);  // cost matrix\nfor (int i=0; i returns =\
  \ {12.13, 3.95, 7.2, 4.21, 11.39};  // investment returns\nvector budgets = {5.1,\
  \ 6.4, 6.84, 4.5, 3.8};       // annual budgets\nMIPSolver solver(costs, budgets,\
  \ returns);\nsolver.setMaximization();\nfor (int i=0; i result;\ndouble objVal;\n\
  ResourceAlloc ra(result, objVal);\nra.solveProblem();\ncout << \" optimum: \" <<\
  \ objVal ;\nfor (int i=0; i<result.size(); ++i)\n{\ncout << \" x\" << i << \": \"\
  \ << result[i];\n}\ncout << endl;\nreturn 0;\n}\n```\n\n**清单 13-1**  \n`ResourceAlloc`\
  \ 类\n\n### 运行代码\n\n要运行清单 13-1 中展示的代码，首先需要使用符合标准的编译器（如`gcc`或 Visual Studio）进行编译。然后，运行生成的可执行文件以查看优化过程的结果。\n\
  \n```\n./investAllocSolver\nGLPK Simplex Optimizer, v4.54\n5 rows, 5 columns, 24\
  \ non-zeros\n*     0: obj =   0.000000000e+00  infeas =  0.000e+00 (0)\n*     5:\
  \ obj =   3.209790698e+01  infeas =  0.000e+00 (0)\nOPTIMAL LP SOLUTION FOUND\n\
  GLPK Integer Optimizer, v4.54\n5 rows, 5 columns, 24 non-zeros\n5 integer variables,\
  \ all of which are binary\nInteger optimization begins...\n+     5: mip =     not\
  \ found yet <=              +inf        (1; 0)\nSolution found by heuristic: 30.72\n\
  +     6: mip =   3.072000000e+01 <=     tree is empty   0.0% (0; 1)\nINTEGER OPTIMAL\
  \ SOLUTION FOUND\noptimum: 30.72 x0: 1 x1: 0 x2: 1 x3: 0 x4: 1\nProgram ended with\
  \ exit code: 0\n```\n\n## 投资组合优化\n\n创建一个 C++类，用于根据资本资产定价模型的线性规划变体来定义最优投资组合。\n\n\
  ### 解决方案\n\n金融中优化模型的主要用途之一是确定投资组合。虽然有多种技术可以创建平衡的投资组合，但诺贝尔奖获得者哈里·马科维茨发展的数学理论是定义最优投资组合的标准方法，大多数金融机构在分析一组投资时都使用该方法。在本节中，你将学习如何使用这种通常被称为现代投资组合理论的分析方法来定义投资组合优化模型。\n\
  \n投资组合优化的主要目标是创建能够以最低风险提供所需投资回报的金融资产组合。例如，如果目标是获得小额回报但风险非常低，可以购买美国国债等高等级投资。为了获得更高回报，可以投资于外国或公司债券。为了获得更高回报，可以使用股票和奇异衍生品。\n\
  \n面对这些选择，并根据投资者的个人资料，投资组合经理可以创建一个或多个满足感知到的客户需求的投资组合。例如，一个更激进的投资者可能会要求一个包含大量高波动性股票的投资组合，从而期望获得更高的回报。另一个更保守的投资者可能更倾向于持有波动性较低但预期回报也较低的债券和股票。也可以组合不同的投资组合，以实现高低回报资产的混合。\n\
  \n这种投资组合构建策略在 20 世纪 50 年代末被研究并形式化，后来被称为资本资产定价（CAP）模型。由马科维茨发展的这些思想，使用经典优化理论来刻画此类投资组合构建问题的最优解。虽然在找到最优配置和在金融市场上真正实现预期回报之间存在差异，但\
  \ CAP 对于投资组合经理来说是一个非常重要的工具。例如，它可以用来定义一个与特定个人情况相匹配的初始投资组合，或者创建针对特定长期回报的金融产品（例如，养老基金的退休投资组合）。\n\
  \nCAP 的数学公式可以概括如下。假设一个投资组合中有`n`只股票和其他资产，令`x[i]`，其中`i` ∈ `{1..n}`，为投资`i`持有的投资组合百分比。那么显然所有这些值之和必须等于\
  \ 1。\n\n![$$ \\sum \\limits_{i=1}^n{x}_i=1 $$](img/323908_2_En_13_Chapter_TeX_Equc.png)\n\
  \n此外，假设对于每个投资`i`，我们都有一个目标回报`r[i]`（例如，你可以使用过去的信息作为基线预测）。如果整个投资组合的目标回报是`R`，那么我们有以下约束：\n\
  \n\n\n![$$ \\sum \\limits_i^n{r}_i{x}_i\\ge R. $$](img/323908_2_En_13_Chapter_TeX_Equd.png)\n\
  \n现在，在 CAP 模型中，我们假设已知每个资产的方差以及同一投资组合中资产对之间的协方差。方差是衡量投资波动性的经典指标（即方差越大，波动性越高）。因此，我们可以利用现有的个体波动性信息来尽量降低整个投资组合的波动性。由于方差是一个二次函数，目标函数也将是二次的，其各项分别取决于个股的个体方差（`c[ii]`）和股票对的协方差（`c[ij]`）。由此产生的问题可以描述如下：\n\
  \n![$$ \\min \\sum \\limits_{i=1}^n\\sum \\limits_{j=1}^n{c}_{ij}\\kern0.22em {x}_i\\\
  kern0.22em {x}_j $$](img/323908_2_En_13_Chapter_TeX_Eque.png)\n\n![$$ \\sum \\limits_{i=1}^n{x}_i=1\
  \ $$](img/323908_2_En_13_Chapter_TeX_Equf.png)\n\n![$$ \\sum \\limits_i^n{r}_i{x}_i\\\
  ge R. $$](img/323908_2_En_13_Chapter_TeX_Equg.png)\n\n![$$ {x}_i\\ge 0\\ for\\ all\\\
  \ i\\in \\left\\{1\\dots n\\right\\}. $$](img/323908_2_En_13_Chapter_TeX_Equh.png)\n\
  \n在过去的几十年里，许多人研究了这一优化问题及其变体。该公式采用了一个二次（非线性）的目标函数——也就是说，目标函数中存在涉及两个变量相乘的项。考虑这种非线性结构，该问题的一般解法形成了所谓的有效前沿：一系列针对不同投资组合组合的结果集，其中目标投资组合的波动性被降至最低。你可以在图\
  \ 13-1 中看到一个有效前沿的示例，该图展示了波动性与目标回报率之间的关系图。该图是通过每次固定一个期望回报率，然后使用二次优化模型来找到相应最小波动性而生成的。如图\
  \ 13-1 所示，该图表明这种关系呈现抛物线曲线的形状。\n\n![../images/323908_2_En_13_Chapter/323908_2_En_13_Fig1_HTML.jpg](img/323908_2_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** 投资组合优化问题有效前沿的一小部分\n\n尽管 CAP 的二次模型被广泛使用，但它的一个困难在于，你需要一个二次优化求解器才能得到特定投资组合的结果。虽然有多个软件包可以直接求解二次问题（例如，使用内点算法），但\
  \ GLPK 无法直接求解二次优化模型。因此，在本节中，你将处理原始问题的线性化形式，这可以使用线性规划求解器轻松计算。这种线性化方法是在 Konno 和 Yamazaki\
  \ 的文章《均值绝对偏差投资组合优化模型及其在东京股票市场的应用》（*Management Science*，第 37 卷，第 519–529 页，1991 年）中提出的。该线性化方法是原始问题的一种修改形式，其目标函数中只包含线性项。虽然这仅仅是原始问题的一个近似，但在许多情况下它能很好地发挥作用（然而，当线性化约束所需计算成本过高时，它可能就不起作用了）。更重要的是，问题的线性化版本可能比二次版本求解得更快，这在某些情况下可能是一个重要的考量因素。\n\
  \n考虑额外的变量 `y[i]` ∈ {1...`T`}，其中 `T` 是拟投资期数。那么，一个线性模型可以描述如下：\n\n![$$ \\min \\frac{1}{T}\\\
  sum \\limits_{t=1}^T{y}_t $$](img/323908_2_En_13_Chapter_TeX_Equi.png)\n\n![$$ \\\
  sum \\limits_{j=1}^n\\left({r}_{jt}-{r}_j\\right){x}_j\\le {y}_t, for\\kern0.22em\
  \ t\\in \\left\\{1\\dots T\\right\\} $$](img/323908_2_En_13_Chapter_TeX_Equj.png)\n\
  \n![$$ -\\sum \\limits_{j=1}^n\\left({r}_{jt}-{r}_j\\right){x}_j\\le {y}_t, for\\\
  kern0.22em t\\in \\left\\{1\\dots T\\right\\} $$](img/323908_2_En_13_Chapter_TeX_Equk.png)\n\
  \n![$$ \\sum \\limits_{i=1}^n{x}_i=1 $$](img/323908_2_En_13_Chapter_TeX_Equl.png)\n\
  \n![$$ \\sum \\limits_i^n{r}_i{x}_i\\ge R. $$](img/323908_2_En_13_Chapter_TeX_Equm.png)\n\
  \n![$$ {x}_i\\ge 0\\ for\\ all\\ i\\in \\left\\{1\\dots n\\right\\} $$](img/323908_2_En_13_Chapter_TeX_Equn.png)\n\
  \n在这些方程中，你不需要直接使用协方差 `c[ij]`；而是使用投资 `i` 在时期 `t` 的期望回报率 `r[it]`。换句话说，该模型的思想是将总时期划分为小段，并在该小段内将模型线性化，然后取整个时间范围内的最小值。有了这个线性模型，你现在可以使用前一章中描述的\
  \ `LPSolver` 类来创建 C++代码。这个新类被称为 `ModifiedCAP`，并在下一节“代码”中展示。创建该模型的主要难点在于，需要以矩阵 `A`\
  \ 以及向量 `b` 和 `c` 的形式为 `LPSolver` 定义所需的输入数据。你可以在成员函数 `solveModel` 的代码中看到这是如何实现的。\n\
  \n算法的第一部分包括设置所需的数据。定义目标函数的向量 `c` 可以很容易地创建，因为所有系数都等于 1。\n\n```\n// 目标函数\nfor (int\
  \ i=m_N; i<m_N+m_T; ++i)\n{\nc[i] = 1;\n}\n```\n\n接下来，右侧系数也很容易设置。这是因为你可以将所有变量 `y[t]`\
  \ 移到不等式的左侧。因此，除最后三个系数外，大多数系数都为零。\n\n```\n// 右侧向量\nvector b(2*m_T + 2 + 1, 0);\n\
  b[2*m_T]   =  1;\nb[2*m_T+1] = -1;\nb[2*m_T+2] = -m_R;\n```\n\n矩阵 `A` 稍微复杂一些，但设置起来也不难。你需要进行的主要变换是在等式约束上。由于\
  \ `LPSolver` 处理的问题只有不等式约束，因此等式 ![$$ \\sum \\limits_{i=1}^n{x}_i=1 $$](img/323908_2_En_13_Chapter_TeX_IEq1.png)\
  \ 被转换为两个不等式来处理。\n\n![$$ \\sum \\limits_{i=1}^n{x}_i\\le 1\\ and-\\sum \\limits_{i=1}^n{x}_i\\\
  le -1 $$](img/323908_2_En_13_Chapter_TeX_Equo.png)\n\n这使得可以继续使用 `LPSolver` 所使用的相同简单输入形式（GLPK\
  \ 也可以直接处理等式，你可以修改 `LPSolver` 类来自动实现这一点）。因此，可以使用以下代码来定义输入矩阵 `A`：\n\n```\n// 矩阵 A\n\
  Matrix A(2*m_T + 2 + 1, m_T + m_N);\nfor (int i=0; i<m_T; ++i)\n{\nfor (int j=0;\
  \ j<m_N; ++j)\n{\nA[i][j] = m_retMatrix[j][i] - m_assetRet[j];\n}\nA[i][m_N+i] =\
  \ -1;\n}\nfor (int i=m_T; i<2*m_T; ++i)\n{\nfor (int j=m_N; j<2*m_N; ++j)\n{\nA[i][j]\
  \ = - m_retMatrix[j-m_N][i-m_T] + m_assetRet[j-m_N];\n}\nA[i][m_N+i-m_T] = -1;\n\
  }\nfor (int j=0; j<m_N; ++j)\n{\nA[2*m_T][j]   = 1;\nA[2*m_T+1][j] = -1;\nA[2*m_T+2][j]\
  \ = - m_assetRet[j];\n}\n```\n\n代码的其余部分只是处理构造 `LPSolver` 类并调用所需的成员函数来求解模型。\n\n最后，我提供一个简单的示例，展示如何在实际中调用这个类。样本数据包含四个资产和五个时间段。相关的期望回报率由以下矩阵给出，你可以在测试用的\
  \ `main` 函数中找到：\n\n```\n// 示例问题：4 个资产和 5 个时间段\n// 构建期望回报率矩阵\ndouble val[][5] = {\n\
  {0.051, 0.050, 0.049, 0.051, 0.05},\n{0.10, 0.099, 0.102, 0.100, 0.101},\n{0.073,\
  \ 0.077, 0.076, 0.075, 0.076},\n{0.061, 0.06, 0.059, 0.061, 0.062},\n};\n```\n\n\
  完整代码\n\n\n\n你可以查看修改后 CAP 的完整代码，见代码清单 13-2。该清单包含一个头文件和一个实现文件。\n\n```\n//\n//  ModifiedCAP.h\n\
  #ifndef __FinancialSamples__ModifiedCAP__\n#define __FinancialSamples__ModifiedCAP__\n\
  #include \"Matrix.h\"\n// a modified (linearized) model for Capital Asset Pricing\n\
  class ModifiedCAP {\npublic:\nModifiedCAP(int N, int T, double R, Matrix &retMatrix,\
  \ const std::vector &ret);\nModifiedCAP(const ModifiedCAP &p);\n~ModifiedCAP();\n\
  ModifiedCAP &operator=(const ModifiedCAP &p);\nvoid solveModel(std::vector &results,\
  \ double &objVal);\nprivate:\nint m_N;  // number of investment\nint m_T;  // number\
  \ of periods\ndouble m_R;  // desired return\nMatrix m_retMatrix;\nstd::vector m_assetRet;\
  \ // single returns\n};\n#endif /* defined(__FinancialSamples__ModifiedCAP__) */\n\
  //\n//  ModifiedCAP.cpp\n#include \"ModifiedCAP.h\"\n#include \"LPSolver.h\"\n#include\
  \ \n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\nModifiedCAP::ModifiedCAP(int\
  \ N, int T, double R, Matrix &expectedRet, const vector &ret)\n: m_N(N),\nm_T(T),\n\
  m_R(R),\nm_retMatrix(expectedRet),\nm_assetRet(ret)\n{\n}\nModifiedCAP::ModifiedCAP(const\
  \ ModifiedCAP &p)\n: m_N(p.m_N),\nm_T(p.m_T),\nm_R(p.m_R),\nm_retMatrix(p.m_retMatrix),\n\
  m_assetRet(p.m_assetRet)\n{\n}\nModifiedCAP::~ModifiedCAP()\n{\n}\nModifiedCAP &ModifiedCAP::operator=(const\
  \ ModifiedCAP &p)\n{\nif (this != &p)\n{\nm_N = p.m_N;\nm_T = p.m_T;\nm_R = p.m_R;\n\
  m_retMatrix = p.m_retMatrix;\nm_assetRet = p.m_assetRet;\n}\nreturn *this;\n}\n\
  void ModifiedCAP::solveModel(std::vector &results, double &objVal)\n{\nMatrix A(2*m_T\
  \ + 2 + 1, m_T + m_N);\nvector c(m_T + m_N, 0);\n// objective function\nfor (int\
  \ i=m_N; i b(2*m_T + 2 + 1, 0);\nb[2*m_T]   =  1;\nb[2*m_T+1] = -1;\nb[2*m_T+2]\
  \ = -m_R;\n// matrix A\nfor (int i=0; i assetReturns = {0.05, 0.10, 0.075, 0.06};\n\
  ModifiedCAP mc(4, 5, 0.08, retMatrix, assetReturns);\nvector results;\ndouble objVal;\n\
  mc.solveModel(results, objVal);\ncout << \"obj value: \" << objVal/5 << endl;\n\
  for (int i=0; i<results.size(); ++i)\n{\ncout << \" x\" << i << \": \" << results[i];\n\
  }\ncout << endl;\n}\nListing 13-2\nModified CAP Implementation\n```\n\n### 运行代码\n\
