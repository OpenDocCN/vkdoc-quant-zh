  int m_numShares;\ndouble m_earnings;\ndouble m_bookValue;\ndouble m_assets;\ndouble\
  \ m_liabilitiesAndIntangibles;\ndouble m_epsGrowth;\ndouble m_netIncome;\ndouble\
