  \ m_step, m_strikePrice);\n        threads[i]->setJoinable(true);\n        threads[i]->start();\n\
  \    }\n    for (int i=0; i<numThreads; i++) {\n        threads[i]->join();\n  \
  \  }\n    double nAbove = 0;\n    for (int i=0; i<numThreads; i++) {\n        nAbove\
  \ += threads[i]->result();\n        delete threads[i];\n    }\n    return nAbove/(double)(numThreads);\n\
  }\n\nint main()\n{\n    ParallelOptionsProbabilities rw(100, 50.0, 52.0);\n    double\
  \ r = rw.probFinishAboveStrike();\n    cout << \" result is \" << r << endl;\n \
  \   return 0;\n}\n\n清单 17-2\n类 ParallelRandomWalk\n```\n\n### 运行代码\n\n我在 Mac OS\
