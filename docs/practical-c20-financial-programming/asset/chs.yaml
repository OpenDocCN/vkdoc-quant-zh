  ### 运行代码\n\n要运行代码以及提供的示例，请使用诸如`gcc`之类的编译器生成可执行文件`bisectionMethod`。然后，您可以运行它来获得如下结果：\n\
  \n```bash\n./bisectionMethod\nroot is 0\nroot is 50\nroot is 25\nroot is 12.5\n\
  root is 6.25\nroot is 3.125\nroot is 1.5625\nroot is 0.78125\nroot is 1.17188\n\
  root is 0.976562\nroot is 1.07422\nroot is 1.02539\nroot is 1.00098\nroot is 0.98877\n\
  root is 0.994873\nroot is 0.997925\nroot is 0.999451\nroot is 1.00021\nthe root\
  \ of the function is 1.00021\n```\n\n这是在函数 *f*(*x*) = (*x*–1)³ 上执行二分法的结果，从区间 -100\
  \ 到 100 开始。为了清晰起见，我展示了中间步骤。\n\n## 割线法\n\n创建一个使用割线法求解方程的类。\n\n### 解决方案\n\n在前一个编程示例中，您学习了用于求解方程的二分法。您可以通过将定义域分解为一组区间来找到方程的根，每个区间都可以测试符号变化。如果函数在区间端点处的符号不同，则有可能找到该函数从正变为负的点，从而得到方程的根。\n\
  \n虽然二分法可以求解大量方程，但它并非此目的的最快方法。原因之一在于它除了区间端点处的符号之外，没有使用函数的任何其他性质。另一方面，如果使用关于函数值的额外信息，例如，至少原则上可以更快地收敛到函数的根。\n\
  \n利用函数值的一种方法包含在称为割线法的算法中。割线法的总思想是利用每个区间端点处的函数值来近似估计距离方程真正根有多近。通过这种方式，可以更接近根，并减少找到所需解所需的迭代次数。\n\
  \n函数的割线是连接由该函数定义的两点的直线。例如，给定函数 *f*(*x*) = *x*² 在区间 1 到 4 上，该函数在给定区间上的割线是连接点 (1,1)\
  \ 和 (4,16) 的线段，因为这两个点是由该函数定义的。我们可以将此概念推广到在任何特定区间上连续的任何函数。\n\n割线法使用从函数的割线推导出的信息来定义要探索的新区间。为此，该方法计算割线与\
  \ x 轴的交点，并使用该点来定义新区间。只要区间起点和终点处的符号不同，这是可能的，因为在这种情况下，割线将与 x 轴相交。正如您可能从上一节中记得的，这与二分法使用的准则类似，区别在于二分法使用中点，而不是基于函数割线的点。\n\
  \n作为在实践中如何工作的示例，考虑与“二分法”一节中相同的函数：*f*(*x*) = (*x*–1)³，在区间 -1 到 2 上。在这种情况下，我们可以计算\
  \ *f*(–1) = –8 和 *f*(2) = 1 的值，它们的符号不同。基于该信息，我们可以使用该区间上函数的割线来找到与 x 轴的交点。因此，我们要使用的线段连接点\
  \ (–1,–8) 和 (2,1)。\n\n通过一点代数，您会发现这条直线的斜率为\n\n![$$ \\frac{y_1-{y}_0}{x_1-{x}_0}=\\\
  frac{1-\\left(-8\\right)}{2-\\left(-1\\right)}=\\frac{9}{3}=3 $$](img/323908_2_En_9_Chapter_TeX_Equa.png)\n\
  \n并且，由于已知点 (*x*₁, *y*₁) = (2,1) 在直线上，因此割线由下式给出：*h* (*x*) = *y*₁ + 3 (*x* – *x*₁)\
  \ = 1 + 3 (*x* – 2)\n\n现在，可以使用此方程以及 *h*(*x*) = 0 在交点处的事实来计算与 x 轴的交点（见图 9-2）：\n\n\
  ![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig2_HTML.jpg](img/323908_2_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2** 原始函数 (x–1)³ 及其在区间 -1 到 2 上的割线\n\n\n\n`0=1+3*x*–6=–5+3*x*`  \n这意味着 ![$$\
  \ x=\\frac{5}{3} $$](img/323908_2_En_9_Chapter_TeX_IEq9.png) 是割线与 x 轴的交点。你很容易看到，如图\
  \ 9-2 所示，割线与 x 轴的交点是一个点（称之为 *x*[2]），它比先前更靠近方程的根。这一过程可以用由 *x*[0] 和 *x*[2] 定义的新区间重复进行，直到方程的根被逼近到误差（可由算法预定义）很小的范围内。\n\
  \n对刚才展示的 `h(x)=` 方程进行推广，割线的方程可表示为  \n\n![$$ h(x)={y}_1+\\frac{y_1-{y}_0}{x_1-{x}_0}\\\
  left(x-{x}_1\\right). $$](img/323908_2_En_9_Chapter_TeX_Equb.png)\n\n当该方程与直线 `y=0`\
  \ 相交时，我们有  \n\n![$$ {y}_1+\\frac{y_1-{y}_0}{x_1-{x}_0}\\left(x-{x}_1\\right)=0,\
  \ $$](img/323908_2_En_9_Chapter_TeX_Equc.png)  \n\n由此得出结果  \n\n![$$ x={x}_1-\\frac{y_1\\\
  left({x}_1-{x}_0\\right)}{y_1-{y}_0} $$](img/323908_2_En_9_Chapter_TeX_Equd.png)\n\
  \n利用这个方程，我们可以计算出将在算法下一步使用的新点 *x*。总结上述步骤，求方程根的割线法可以描述如下：\n\n1. 定义一个初始区间 `(a,b)`，你希望在该区间内搜索方程的一个或多个根。\
  \  \n2. 计算 *f*(*a*) 和 *f*(*b*) 的值。  \n3. 利用方程确定割线  \n\n   ![$$ h(x)=f(b)+\\frac{f(b)-f(a)}{b-a}\\\
  left(x-b\\right) $$](img/323908_2_En_9_Chapter_TeX_Eque.png)  \n\n4. 利用该方程，找到交点\
  \  \n\n   ![$$ c=b-\\frac{f(b)\\left(b-a\\right)}{f(b)-f(a)} $$](img/323908_2_En_9_Chapter_TeX_Equf.png)\
  \  \n\n5. 如果差值 |*c* – *b*| 的长度小于误差（阈值）*E*，则停止并将 *c* 报告为解。否则，继续执行步骤 1。\n\n注意到，对于某些函数，该算法收敛到解的速度比二分法更快。这是因为割线法利用了函数中已有的信息，这使得中间点更接近真实解。你可以在\
  \ `SecantSolver` 类中找到一个针对所讨论算法的实现。该类的设计与 `BisectionSolver` 类似，因为所讨论的问题相同。主要变化在于使用了不同的中点选择过程，这使得该算法与\
  \ `BisectionSolver` 中给出的算法略有不同。\n\n### 完整代码\n\n```\n// SecantMethod.h\n//\n#ifndef\
  \ SECANTMETHOD_H_\n#define SECANTMETHOD_H_\ntemplate \nclass MathFunction;\nclass\
  \ SecantMethod {\npublic:\nSecantMethod(MathFunction &f);\nSecantMethod(const SecantMethod\
  \ &p);\nSecantMethod &operator=(const SecantMethod &p);\n~SecantMethod();\ndouble\
  \ getRoot(double x1, double x2);\nprivate:\nMathFunction &m_f;\ndouble m_error;\n\
  };\n#endif /* SECANTMETHOD_H_ */\n// SecantMethod.cpp\n//\n#include \"SecantMethod.h\"\
  \n#include \"MathFunction.h\"\n#include \nusing std::cout;\nusing std::endl;\nnamespace\
  \ {\nconst double DEFAULT_ERROR = 0.001;\n}\nSecantMethod::SecantMethod(MathFunction\
  \ &f)\n: m_f(f),\nm_error(DEFAULT_ERROR)\n{\n}\nSecantMethod::SecantMethod(const\
  \ SecantMethod &p)\n: m_f(p.m_f),\nm_error(p.m_error)\n{\n}\nSecantMethod::~SecantMethod()\n\
  {\n}\nSecantMethod &SecantMethod::operator=(const SecantMethod &p)\n{\nif (this\
  \ != &p)\n{\nm_f = p.m_f;\nm_error = p.m_error;\n}\nreturn *this;\n}\ndouble SecantMethod::getRoot(double\
  \ x1, double x2)\n{\ndouble root = 0;\ndouble fa = m_f(a);\ndouble fb = m_f(b);\n\
  double c = 0, fc = 0;\ndo\n{\nc = b - fb*(b-a)/(fb-fa);\nroot = c;\nfc = m_f(c);\n\
  cout  \"  m_error);\nreturn root;\n}\n// ---- 这是针对一个示例函数的实现\nnamespace {\nclass\
  \ F2 : public MathFunction {\npublic:\nvirtual ~F2();\nvirtual double operator()(double\
  \ value);\n};\nF2::~F2()\n{\n}\ndouble F2::operator ()(double x)\n{\nreturn (x-1)*(x-1)*(x-1);\n\
  }\n}\nint main()\n{\nF2 f;\nSecantMethod sm(f);\ndouble root = sm.getRoot(-10, 10);\n\
  cout << \" the root of the function is \" << root << endl;\nreturn 0;\n}\n```\n\n\
  ### 运行代码\n\n编译上述代码后，你可以运行它并得到以下结果，这些结果展示了示例方程 *f*(*x*) = (*x*–1)³ 的解：\n\n```\n./secantMethod\n\
  -> 2.92233 7.10369\n-> 2.85268 6.35922\n-> 2.25777 1.98976\n-> 1.98685 0.96108\n\
  -> 1.73375 0.395035\n-> 1.5571 0.172905\n-> 1.41961 0.0738799\n-> 1.31702 0.0318621\n\
  -> 1.23923 0.0136922\n-> 1.18062 0.00589209\n-> 1.13634 0.00253417\n-> 1.10292 0.00109016\n\
  -> 1.07769 0.000468932\n-> 1.05865 0.000201717\n-> 1.04427 8.67704e-05\n-> 1.03342\
  \ 3.73252e-05\n-> 1.02523 1.60558e-05\n-> 1.01904 6.90655e-06\n-> 1.01438 2.97092e-06\n\
  -> 1.01085 1.27797e-06\n-> 1.00819 5.49731e-07\n-> 1.00618 2.36472e-07\n-> 1.00467\
  \ 1.01721e-07\n-> 1.00352 4.37562e-08\n-> 1.00266 1.88221e-08\nthe root of the function\
  \ is 1.00266\n```\n\n## 牛顿法\n\n创建一个 C++ 类来实现计算方程根的牛顿法。\n\n### 解决方案\n\n正如你在前面几节中看到的，仅使用二分法就可以为大量方程找到解。你还可以尝试利用函数的额外信息来提高收敛速度，比如在所需区间内使用函数的割线。进一步延伸这个想法，你就会得到最常用的方程求解方法之一，该方法归功于艾萨克·牛顿。\
  \  \n\n牛顿法求方程根利用函数的导数作为根位置的一阶近似。与你之前看到的两种方法类似，该过程是迭代的，并且在每一步中，你都可以更接近方程的真实根。最终，你将得到一个误差非常小的解，该误差可以在算法开始之前确定。\
  \  \n\n为了理解该方法的工作原理，再次考虑示例函数 *f*(*x*) = (*x*–1)³。该函数的导数很容易计算，因为它是一个多项式，导数为 *f’*(*x*)\
  \ = 3(*x*–1)²。现在，假设你从一个关于根值可能是什么的初始猜测开始（如果没有猜测，则将随机值作为起点）。将该初始猜测称为 *x*[0]。在该点，我们可以计算两个值：*f*(*x*[0])\
  \ 和 *f'*(*x*[0])。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的指示，对给定的英文文本进行翻译。\n\n\n在 Figure 9-3\
  \ 中，你会看到之前给出的示例函数及其在点`x[0] = 0`处的切线图。在该点处，`f(x[0]) = f(0) = -1`，且`f'(x[0]) = f'(0)\
  \ = 3`。由于函数在某一点的导数代表了曲线在该点切线的斜率，我们可以根据以下公式计算出一个由给定方程的切线所确定的点`x[1]`：\n\n![$$ {x}_1={x}_0-\\\
  frac{f\\left({x}_0\\right)}{f^{\\prime}\\left({x}_0\\right)}=0-\\frac{-1}{3}=\\\
  frac{1}{3} $$](img/323908_2_En_9_Chapter_TeX_Equg.png)\n\n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig3_HTML.jpg](img/323908_2_En_9_Fig3_HTML.jpg)\n\
  \n**Figure 9-3** 示例函数`f(x) = (x–1)³`及其在点`x[0] = 0`处的切线。你可以注意到，该切线与 x 轴相交于点`x1 =\
  \ 1/3`。这是使用牛顿法求给定函数根的第一步\n\n一旦找到 x 轴与切线的交点，你就有了求解给定方程根的新起点。请注意，每次找到新点时，算法都会越来越接近目标点，尽管可能需要几次迭代才能达到所需精度。与前两种情况一样，你可以将精度作为算法的参数来确定，一旦两次连续近似值之间的差值小于给定参数，就停止计算。这表明解正在收敛到根所在的位置。\n\
  总之，牛顿法通过依次寻找由函数切线确定的点来工作。当你越接近根时，切线与 x 轴交点的差异就会越小。停止条件是最后值与当前值之间的差值小于给定参数。\n\n基于以上信息，牛顿法的算法可以给出如下：\n\
  \n1. 定义一个初始值`x`，你希望从该值开始搜索方程的一个或多个根。\n2. 给定输入函数`f(x)`，确定其导数`f'(x)`。\n3. 计算目标值处的`f(x)`和`f'(x)`。\n\
  4. 使用`f'(x)`作为点`x`处切线的斜率，根据以下方程计算新点`x[1]`：\n   ![$$ {x}_1=x-\\frac{f(x)}{f^{\\hbox{'}}(x)}.\
  \ $$](img/323908_2_En_9_Chapter_TeX_Equh.png)\n5. 计算`x`与`x[1]`之间的差值为`e = |x – x[1]|`。\n\
  6. 如果`e`的值小于输入误差（阈值）`E`，则停止并报告`x`为解。否则，将`x[1]`重命名为`x`，并继续执行步骤 1。\n\n牛顿法不仅依赖于函数本身，还依赖于其导数，这既可以视为优点也可以视为缺点。有时，计算函数的导数非常容易，例如多项式函数和常见的三角函数，但情况并非总是如此。然而，牛顿法最大的优点是，与二分法和割线法不同，即使函数符号没有变化，它也能正常工作。\n\
  \n例如，考虑函数`f(x) = (x–1)²`。其图形如 Figure 9-4 所示。请注意，与本章中看到的其他函数不同，该函数没有改变符号的地方。因此，如果不改变二分法，在这种情况下就无法找到根。另一方面，该函数显然具有导数，且处处可微，这使得使用牛顿法找到根成为可能。\n\
  \n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig4_HTML.jpg](img/323908_2_En_9_Fig4_HTML.jpg)\n\
  \n**Figure 9-4** 一个连续的二次函数`(x–1)²`，它从未改变符号，但在`x = 1`处有一个单根\n\n在使用牛顿法时，我们需要考虑一个小问题：导数在某点可能为零。如果出现这种情况，下一个点就是未定义的，因为不允许除以零。然而，可以通过在算法中给当前点添加一个小值来避免这个困难。当然，存在更复杂的技术来解决这个问题，读者可以在众多关于数值算法的书籍中找到这些方法。\n\
  前面的算法是在 C++类`NewtonMethod`中实现的，它为所有描述的步骤提供了必要的支持。该类的设计与你在二分法中看到的非常相似。然而，与二分法和割线法不同，`NewtonMethod`不仅依赖于函数，还依赖于其导数。这就是为什么在示例代码中，你会看到对两个函数`F3`和`DF3`的引用。它们是必要的，以便`NewtonMethod`类知道如何计算函数及其导数的值。\n\
  \n完整代码\n\n```cpp\n//\n// NewtonMethod.h\n#ifndef NEWTONMETHOD_H_\n#define NEWTONMETHOD_H_\n\
  template \nclass MathFunction;\nclass NewtonMethod {\npublic:\nNewtonMethod(MathFunction\
  \ &f, MathFunction &derivative);\nNewtonMethod(const NewtonMethod &p);\nvirtual\
  \ ~NewtonMethod();\nNewtonMethod &operator=(const NewtonMethod &p);\ndouble getRoot(double\
  \ initialValue);\nprivate:\nMathFunction &m_f;\nMathFunction &m_derivative;\ndouble\
  \ m_error;\n};\n#endif /* NEWTONMETHOD_H_ */\n//\n// NewtonMethod.cpp\n#include\
  \ \"NewtonMethod.h\"\n#include \"MathFunction.h\"\n#include \nusing std::endl;\n\
  using std::cout;\nnamespace {\nconst double DEFAULT_ERROR = 0.001;\n}\nNewtonMethod::NewtonMethod(MathFunction\
  \ &f, MathFunction &derivative)\n: m_f(f),\nm_derivative(derivative),\nm_error(DEFAULT_ERROR)\n\
  {\n}\nNewtonMethod::NewtonMethod(const NewtonMethod &p)\n: m_f(p.m_f),\nm_derivative(p.m_derivative),\n\
  m_error(p.m_error)\n{\n}\nNewtonMethod::~NewtonMethod()\n{\n}\nNewtonMethod &NewtonMethod::operator=(const\
  \ NewtonMethod &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_derivative = p.m_derivative;\n\
  m_error = p.m_error;\n}\nreturn *this;\n}\ndouble NewtonMethod::getRoot(double x0)\n\
  {\ndouble x1 = x0;\ndo\n{\nx0 = x1;\ncout  m_error);\nreturn x1;\n}\n// ---- this\
  \ is the implementation for an example function and its derivative\nnamespace {\n\
  class F3 : public MathFunction {\npublic:\nvirtual ~F3();\nvirtual double operator()(double\
  \ value);\n};\nF3::~F3()\n{\n}\ndouble F3::operator ()(double x)\n{\nreturn (x-1)*(x-1)*(x-1);\n\
  }\nclass DF3 : public MathFunction {\npublic:\nvirtual ~DF3();\nvirtual double operator()(double\
  \ value);\n};\n// represents the derivative of F3\nDF3::~DF3()\n{\n}\ndouble DF3::operator\
  \ ()(double x)\n{\nreturn 3*(x-1)*(x-1);\n}\n}\nint main()\n{\nF3 f;\nDF3 df;\n\
  NewtonMethod nm(f, df);\ncout << \" the root of the function is \" << nm.getRoot(100)\
  \ << endl;\nreturn 0;\n}\n```\n\n运行代码\n\n可以使用诸如 UNIX 上的`gcc`之类的编译器来编译和链接代码。要运行生成的可执行程序并查看其结果，请使用以下命令行：\n\
  \n```\n./newtonMethod\nx0 is 100\nx0 is 67\nx0 is 45\nx0 is 30.3333\nx0 is 20.5556\n\
  x0 is 14.037\nx0 is 9.69136\nx0 is 6.79424\nx0 is 4.86283\nx0 is 3.57522\nx0 is\
  \ 2.71681\nx0 is 2.14454\nx0 is 1.76303\nx0 is 1.50868\nx0 is 1.33912\nx0 is 1.22608\n\
  x0 is 1.15072\nx0 is 1.10048\nx0 is 1.06699\nx0 is 1.04466\nx0 is 1.02977\nx0 is\
  \ 1.01985\nx0 is 1.01323\nx0 is 1.00882\nx0 is 1.00588\nx0 is 1.00392\nx0 is 1.00261\n\
  the root of the function is 1.00174\n```\n\n该算法对函数`f(x) = (x–1)³`执行了牛顿法的步骤。请注意，即使从遥远的初始值\
  \ 100 开始，算法在要求的误差范围内也收敛到了解 1.0。\n\n\n\n### 结论\n\n在本章中，你看到了几个处理方程求根的示例。这是一个在金融工程中经常用到的主题。交易算法和投资分析算法经常需要求解方程，这使得寻找高效的方程求根技术成为必要。\n\
  \n在本章中，我介绍了一些用于求解金融中常见方程的最常用技术。然而，还存在更专门的算法，你可以以数值方法文献为起点，去探索最新的方法。\n\n本章中的编程示例首先展示了如何使用二分法计算方程的根解。使用二分算法，定义域的目标范围被均匀分割，每一步都会以更高的精度逼近根的可能位置。根据范围两端点处函数的符号，可以检测该范围内是否包含方程的根。在该过程结束时，可以以很小的误差范围确定方程变为零的位置。\n\
  \n接下来，你看到了一个使用割线法求解方程的编程示例。该方法基于在所考虑的区间内使用函数的割线。当割线与 x 轴相交时，新点通常更接近方程的根。通过多次迭代这个过程，可以在比二分法更短的时间内找到所需的解。\n\
  \n你还学习了最流行的方程求根方法，即牛顿法。使用该算法，可以通过函数在某一点的切线来找到解。由于函数的导数给出了函数在每个点的斜率，因此可以使用导数来找到合理的近似值。随着算法在连续点上的迭代，近似值会变得越来越好。与其他方法一样，当达到预设的最大误差时，算法通常会停止。\n\
  \n在下一章中，我将讨论另一个在金融算法中被广泛使用的重要计算工具：数值积分。利用数值积分算法，可以以高精度解决多个困难问题。你还将看到如何使用`C++`实现这些技术。\n\
  \n"
- "# 10. 数值积分\n\n对函数进行积分是许多金融算法中的一个常见步骤。例如，一些涉及微分方程使用的金融技术依赖于复杂积分的计算。这些领域包括衍生品定价、保险和相关算法。\n\
  \n然而，在使用这些方法时，你可能会遇到没有已知解析解而需要进行数值积分的积分。即使一个方程可以解析积分，使用数值算法执行此任务也可能更高效。为此，本章探讨了一些执行数值积分的常用方法。读完本章及后续章节后，你将更好地理解这些数值积分算法在实践中是如何工作的，以及如何在自己的项目中使用它们。\n\
  \n我们将讨论可以立即应用于一些常见积分方法的编程示例。我们还讨论了这些数值方法在使用`C++`语言实现时的性能以及精度。本章中的编程示例涵盖以下主题：\n\n\
  - **中点法**：一种简单的积分方法，基于每个积分区间的中点使用易于计算的近似值。\n- **梯形法**：一种更精确的数值积分方法，使用梯形近似来逼近积分面积。\n\
  - **辛普森法**：一种流行的数值积分技术，辛普森法提供比前两种方法稍好的近似值。\n- **这些解法的图形示例**：我们通过图形解释这些方法的工作原理，以及实现它们所需的代码。\n\
  \n## 中点法\n\n在本节中，我们将创建一个`C++`类，使用中点法对函数进行积分。\n\n### 解法\n\n简而言之，对函数进行积分意味着，在单维情况下，找到由函数和\
  \ x 轴所围成曲线的面积。虽然概念很简单，但有大量文献涉及这个问题的实际重要性。最重要的结果，也称为微积分基本定理，即积分是导数的逆函数。换句话说，对函数的积分求导将得到原函数。你也可以对函数的导数进行积分以得到原函数（相差一个常数）。\n\
  \n通过代数方法找到函数的积分高度依赖于前述定义。这意味着你需要知道另一个函数，其导数正是你想要积分的函数。在这种情况下，根据微积分基本定理，该另一个函数就是积分。问题在于，并非总能使用这些方法找到反导数。这导致了需要使用计算方法来确定积分。\n\
  \n有多种方法可用于对函数进行积分，但它们都包含将目标函数的面积划分为许多子区域并对它们进行累加的策略。数值积分的好处在于，如前所述，大多数划分面积的方案都是收敛的。这意味着对于大多数函数，都可以使用我们讨论的任何一种方法得到解。这些方法的不同之处在于计算量，以及可能对于特定函数或应用有更好的收敛性。\n\
  \n我们从一种通常称为中点法的算法开始讨论。这种方法之所以得名，是因为它使用中点近似来逼近目标面积。考虑函数`f(x) = x² + 1`，并尝试计算该函数在\
  \ 1 到 5 区间内的积分。你可以在图 [10-1] 中看到该函数的图像。\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig1_HTML.jpg](img/323908_2_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 函数`f(x)=x²+1`在 1 到 5 区间内的图像\n\n当然，使用符号技术解决这个问题很容易，因为有一种众所周知的方法来确定多项式函数的积分。但是，请考虑如何仅使用计算策略来解决这个问题。\n\
  \n该算法的目标是开发一种近似方法，以便你能在预设的误差阈值内确定所考虑的积分。第一步是设计一个函数，能够在给定区间内近似给定的函数。事实证明，我们可以尝试的最简单的函数是常数函数`f(x)\
  \ = c`。假设我们使用常数函数来近似 1 到 5 区间内的积分。我们可以取该区间内`f(x)`的平均值作为常数的值，该平均值由端点确定。\n\n该常数值为`f((1+5)/2)\
  \ = f(3) = 10`。请在图[10-2]中检查这个常数函数与原始函数的对比情况。\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig2_HTML.jpg](img/323908_2_En_10_Fig2_HTML.jpg)\n\
  \n\n\n### 图 10-2\n原始函数 `f(x) = x² + 1` 与常数函数 `f(x) = c` 的对比\n\n近似值可以通过公式 `(5 – 1)\
  \ * 10 = 40` 计算得出。你可以将其与积分闭合计算所定义的值进行比较：`f(x) = x² + 1` 的反导数是 `F(x) = x³/3 + x`，在区间\
  \ 1 到 5 上使用该方程作为定积分，你会得到值 45.33。由此可见，正确值与使用单个中点计算得到的估值之间存在较大误差。\n\n好消息是，我们可以通过在所需函数上考虑更小的区间，并将这些区间的结果相加来改进这个近似。这是你在本节及后续章节中将看到的基本技术。因此，为了改进前一个例子中的近似，我们只需将区间\
  \ 1–5 分成两个区间：1 到 3 和 3 到 5。\n\n考虑常数函数的平均值，你会发现区间前半部分的值是 `((1 + 3)/2)² + 1 = 5`，后半部分是\
  \ `((3 + 5)/2)² + 1 = 17`。这给出了一个近似值 `2 × 5 + 2 × 17 = 44`。由于精确值是 45.33，你可以看出近似值\
  \ 44 更接近真实值。你可以在图 10-3 中看到这个新的近似。\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig3_HTML.jpg](img/323908_2_En_10_Fig3_HTML.jpg)\n\
  \n### 图 10-3\n使用两个常数值近似 `f(x) = x² + 1` 的积分\n\n正如你所见，从中点法取得良好结果的秘诀是将所需区间细分为更小的单元并将它们相加，这与积分函数本身的定义方式非常相似。虽然你可以从一个常数开始，然后连续分割区间，但更简单的方法是先从一个已知的大分段数开始，必要时再增加分段的数目。使用这种策略会得到以下算法：\n\
  \n定义一个范围 `(A, B)`，你需要在这个范围内计算方程的积分。\n\n1.  将初始范围细分为 `N` 个等宽的子区间。\n2.  将积分值 `S` 初始化为零。\n\
  3.  对于每个子区间 `(a, b)`，执行以下操作：\n    1.  获取 `a` 和 `b` 的值。\n    2.  确定中点值：\n       \
  \ `m(a, b) = f((a + b) / 2)`。\n    3.  将 `m(a, b)` 加到积分值中。\n\n这个简单方法的实现可以在 `MidpointIntegration`\
  \ 类中找到。\n\n### 完整代码\n\n你可以在代码清单 10-1 中找到实现上述方法的完整代码。该清单包含了 `MidpointIntegration`\
  \ 类的头文件及实现文件。\n\n```\n//\n//  MidpointIntegration.h\n#ifndef __FinancialSamples__MidpointIntegration__\n\
  #define __FinancialSamples__MidpointIntegration__\ntemplate \nclass MathFunction;\n\
  class MidpointIntegration {\npublic:\nMidpointIntegration(MathFunction &f);\nMidpointIntegration(const\
  \ MidpointIntegration &p);\n~MidpointIntegration();\nMidpointIntegration &operator=(const\
  \ MidpointIntegration &p);\nvoid setNumIntervals(int n);\ndouble getIntegral(double\
  \ a, double b);\nprivate:\nMathFunction &m_f;\nint m_numIntervals;\n};\n#endif /*\
  \ defined(__FinancialSamples__MidpointIntegration__) */\n//\n//  MidpointIntegration.cpp\n\
  #include \"MidpointIntegration.h\"\n#include \"MathFunction.h\"\n#include \nusing\
  \ std::cout;\nusing std::endl;\nnamespace  {\nconst int DEFAULT_NUM_INTERVALS =\
  \ 100;\n}\nMidpointIntegration::MidpointIntegration(MathFunction &f)\n: m_f(f),\n\
  m_numIntervals(DEFAULT_NUM_INTERVALS)\n{\n}\nMidpointIntegration::MidpointIntegration\
  \ (const MidpointIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n\
  {\n}\nMidpointIntegration::~MidpointIntegration()\n{\n}\nMidpointIntegration &MidpointIntegration::operator=(const\
  \ MidpointIntegration &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_numIntervals =\
  \ p.m_numIntervals;\n}\nreturn *this;\n}\nvoid MidpointIntegration::setNumIntervals(int\
  \ n)\n{\nm_numIntervals = n;\n}\ndouble MidpointIntegration::getIntegral(double\
  \ a, double b)\n{\ndouble S = 0;\ndouble intSize = (b - a)/m_numIntervals;\ndouble\
  \ x = a;\nfor (int i=0; i\n{\npublic:\n~F1();\ndouble operator()(double x);\n};\n\
  F1::~F1()\n{\n}\ndouble F1::operator ()(double x)\n{\nreturn x*x+1;\n}\n}\nint main()\n\
  {\nF1 f;\nMidpointIntegration mpi(f);\ndouble integral = mpi.getIntegral(1, 5);\n\
  cout << \" the integral of the function is \" << integral << endl;\nmpi.setNumIntervals(200);\n\
  integral = mpi.getIntegral(1, 5);\ncout << \" the integral of the function with\
  \ 200 intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n*代码清单 10-1：中点积分法的实现*\n\
  \n### 运行代码\n\n你可以使用任何符合标准的编译器（如 `gcc`）从代码清单 10-1 中的源代码生成可执行的二进制文件。然后，你可以执行代码来获得如下示例结果，针对示例方程\
  \ `f(x) = x² + 1`：\n\n```\n./midpointIntegration\nthe integral of the function is\
  \ 45.3344\nthe integral of the function with 200 intervals is 45.3336\n```\n\n注意，该解决方案测试了两种分区数情况下的近似：当分区数为\
  \ 100（默认值）和分区数为 200 时。由于函数的精确值是 `45 + 1/3`，这表明结果有所改进，误差从小数点后第三位降到了小数点后第四位。你可以通过增加分区数来改进不同函数或所需误差下的近似值。\n\
  \n## 梯形法\n\n在本节中，我们将创建一个 C++ 类，实现用于定积分计算的梯形法。\n\n### 解决方案\n\n正如你在上一节中所看到的，为一个函数的积分提出近似值并不困难。然而，在许多应用中，能够更快、更有效地确定函数的定积分是很有用的。当需要积分的函数本身计算起来就很困难时，这一点尤其重要。在这些情况下，最好使用一种能够为积分问题提供更精确解的近似技术。\n\
  \n在这个编码示例中，我将探讨另一种计算连续函数积分的方法，称为梯形法。顾名思义，梯形法利用一种几何上的直观概念来呈现特定函数曲线下的面积值，从而使得到的近似值更接近目标值。\n\
  \n\n\n为了使用梯形法，我们通过几何直觉来审视积分问题，即寻找逼近目标曲线的最佳方式。考虑函数`f(x) = sin(x)`在区间`[1/2, 5/2]`上的积分。所需积分被定义为曲线下的面积。逼近该值的一个简单方法是使用线性函数的面积，该线性函数在给定区间的端点之间逼近`sin(x)`。通过图形方法，可以在图\
  \ 10-4 中看到结果。\n\n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig4_HTML.jpg](img/323908_2_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4** 使用一次梯形法迭代逼近`f(x)=sin(x)`在区间`[1/2, 5/2]`上的积分\n\n梯形法应用于该区间得到的逼近效果相对较差。使用符号技术计算的该积分真实值为`cos(1/2)\
  \ - cos(5/2)`，约为 1.6787。而梯形法得到的值为`2 * sin(1/2) + sin(5/2) - sin(1/2) = sin(1/2)\
  \ + sin(5/2) ≈ 1.0778`。尽管这是一个较差的逼近，但如果你将目标函数的区间分成两个或多个子区域，结果会更好。这样做，误差会变小，得到的值会更接近积分的真实值。例如，我将展示如何使用`[1/2,\
  \ 3/2]`和`[3/2, 5/2]`这两个子区间来改进对前述函数的逼近。\n\n`f(1/2) = sin(1/2) ≈ 0.4794`和`f(3/2) =\
  \ sin(3/2) ≈ 0.9974`的值产生了一个面积为 0.7384 的梯形。另一方面，第二个区间的值由`f(3/2) = sin(3/2)`和`f(5/2)\
  \ = sin(5/2) ≈ 0.5984`决定。由此产生的梯形面积为 1.5364，更接近精确值 1.6787。您可以在图 10-5 中直观地看到这种逼近效果。\n\
  \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig5_HTML.jpg](img/323908_2_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** 使用梯形法，用两个区间（`[1/2, 3/2]`和`[3/2, 5/2]`）逼近`f(x)=sin(x)`曲线下的面积\n\n正如前两个例子所示，可以证明，随着子区间数量的增加，逼近的质量会越来越好。因此，通过增加梯形法中的子区间数量，您可以任意接近定积分的真实值。\n\
  \n我提供了一个名为`TrapezoidIntegration`的类，它展示了如何为作为参数传递的任何函数实现梯形法。通过使用`MathFunction`类，该实现是通用的。传递一个所需`MathFunction`类的新对象，您就可以使用`getIntegral`成员函数计算不同函数的定积分。使用`TrapezoidIntegration`类，您还可以通过成员函数`setNumIntervals`确定使用的中间区间数量。如果需要，这可以允许您减少定积分估计中的误差。使用`setNumIntervals`的另一件事是，通过减少算法的迭代次数，可以减少必要的计算量。这样，您就可以完全控制逼近程度和计算效率之间的权衡。\n\
  \n### 完整代码\n\n代码清单 10-2 是上一节讨论的梯形积分法的完整实现。您将看到此代码分为一个头文件和一个实现文件。还有一个`main`函数，它为`TrapezoidIntegration`类提供了一个示例。\n\
  \n```cpp\n//\n//  TrapezoidIntegration.h\n#ifndef __FinancialSamples__TrapezoidIntegration__\n\
  #define __FinancialSamples__TrapezoidIntegration__\ntemplate \nclass MathFunction;\n\
