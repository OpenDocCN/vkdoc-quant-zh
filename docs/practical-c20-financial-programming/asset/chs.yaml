  running thread\nrunning thread\n...\nrunning thread\nresult is 0.487\n```\n\n##\
  \ 使用互斥锁防止非同步访问\n\n在本节中，我们将编写一个 C++ 类，实现使用互斥锁同步共享数据的并行算法。\n\n\n```markdown\n\n###\
  \ 解决方案\n\n多线程是一种将计算工作分发到两个或更多处理器核心的便捷方式，这可以提升整个应用程序的性能。然而，虽然多线程有许多优点，但它也增加了软件设计的复杂性。例如，多线程架构中需要解决的问题之一是线程之间共享资源的访问。如果内存中的一个变量被两个或多个线程使用，那么其访问需要进行同步，以防止不同线程同时尝试修改值。\n\
  \n一旦创建了一个新线程，就需要使用 `pthread` 库提供的机制来管理它。在最简单的情况下，新线程是独立的，不需要与原始（父）线程同步。然而，更常见的情况是，需要使用相同数据的多个线程之间需要进行同步。同步需求越大，管理共享数据所需的工作量也就越大。\n\
  \n一段两个或多个线程可以访问共享资源的代码区域被称为 **临界区**（critical section）。临界区是代码中需要保护共享资源以避免冲突的区域。\n\
  \n为了避免临界区固有的冲突，大多数多线程 API 提供了可用于实现同步操作的原语。这些原语在实现线程间的资源共享方面非常有效。这类原语有很多，例如信号量（semaphores）、互斥锁（mutexes）和消息（messages）等。`pthreads`\
  \ 库直接支持其中一些最常见的机制，包括互斥锁，它可以用来保证只有一个线程能够访问特定的临界区。\n\n**互斥锁**（mutex）是一种可用于协调两个或多个线程工作的同步机制。互斥锁的状态用于确定线程是否有权操作特定资源（例如内存中的变量）。当线程尝试访问互斥锁的值时，可能发生两种情况：如果互斥锁状态指示临界区可用，则线程可以直接进入临界区；然而，如果互斥锁状态指示忙碌状态，发起请求的线程将停止执行，并被发送到操作系统创建的等待区。只有当资源被其他线程释放后，操作才会恢复。所有这些等待和恢复活动都由操作系统协调。\n\
  \n互斥锁在 `pthreads` API 中实现，其类型为 `thread_mutex_t`。可以使用函数 `pthread_mutex_init` 创建一个新的互斥锁，并使用函数\
  \ `pthread_mutex_destroy` 销毁它。当共享资源即将被使用时，需要获取并锁定互斥锁。这保证了该互斥锁一次只能被一个线程使用。这是通过函数\
  \ `pthread_mutex_lock` 完成的。如果互斥锁不可用，该函数会自动中断线程，并强制线程等待直到互斥锁被释放。你也可以使用 `pthread_mutex_trylock`\
  \ 尝试访问互斥锁而无需强制等待。如果互斥锁当前不可用，该函数将返回一个错误代码，你可以稍后重试。最后，一旦获取了互斥锁，你需要在同步操作结束时解锁它。这对于确保其他线程能够进入临界区并使用最近释放的资源是必要的。你可以使用函数\
  \ `pthread_mutex_unlock` 解锁互斥锁。\n\n虽然互斥锁有效性的理论证明可能很复杂，但其使用非常简单。在清单 17-3 的编码示例中，你将看到一个名为\
  \ `Mutex` 的类，它封装了互斥锁同步操作的概念。这个类提供了两个主要函数：`lock` 和 `unlock`。第一个成员函数在临界区的开头调用。第二个重要的成员函数是\
  \ `unlock`，应在临界区的末尾调用。`Mutex` 类还负责在构造函数中使用 `pthread_mutex_init` 初始化 `pthread` 互斥锁，并在析构函数中使用\
  \ `pthread_mutex_destroy` 销毁它。\n\n用于封装互斥锁概念的第二个类是 `MutexAccess`。该类负责保证对互斥锁的每次访问都由一对对\
  \ `Mutex` 的 `lock()` 和 `unlock()` 成员函数的调用组成。`lock()` 成员函数直接在构造函数中调用，而 `unlock()`\
  \ 在 `MutexAccess` 的析构函数中自动调用。因此，如果临界区正好在声明 `MutexAccess` 对象的作用域结束时结束，你无需担心解锁问题，因为\
  \ RAII 惯用法保证了当析构函数被调用时，互斥锁会被自动解锁。\n\n在 `MutexTestThread` 中，我们有一个在线程内使用 `Mutex` 类的示例。所演示的任务非常简单，但它说明了如何使用互斥锁来提供对共享资源的同步访问。这里，共享资源是\
  \ `double` 类型的变量 `result`。该变量用于保存所需的计算结果；然而，它被应用程序中的所有线程访问。为了同步对该变量的访问，你需要使用互斥锁。可以实例化\
  \ `MutexAccess` 类的一个对象，这会导致互斥锁（名为 `m_globalMutex`）被锁定。获取锁之后，你现在可以安全地检查该值并对引用变量进行更改。最后，在\
  \ `run()` 成员函数的末尾，锁将被自动释放。\n\n```\n\n\n### 完整代码\n\n您可以在清单 17-3 中查看 `Mutex` 和 `MutexAccess`\
  \ 类的完整代码。`MutexTestThread` 类中也展示了它们的使用示例。\n\n```\n//\n//  Mutex.h\n#ifndef __FinancialSamples__Mutex__\n\
  #define __FinancialSamples__Mutex__\nstruct MutexData;\nclass Mutex {\npublic:\n\
  Mutex();\n~Mutex();\nvoid lock();\nvoid unlock();\nprivate:\nMutex(const Mutex &p);\
  \  // 禁止复制\nMutex &operator=(const Mutex &p);  // 禁止赋值\nMutexData *m_data;\n};\n\
  class MutexAccess {\npublic:\nMutexAccess(Mutex &m);\n~MutexAccess();\nprivate:\n\
  MutexAccess &operator=(const MutexAccess &p);\nMutexAccess(const MutexAccess &p);\n\
  Mutex &m_mutex;\n};\n#endif /* defined(__FinancialSamples__Mutex__) */\n//\n// \
  \ Mutex.cpp\n#include \"Mutex.h\"\n#include \"Thread.h\"\n#include \n#include \n\
  #include \n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\nstruct\
  \ MutexData {\npthread_mutex_t m_mutex;\n};\nMutex::Mutex()\n: m_data(new MutexData)\n\
  {\npthread_mutex_init(&m_data->m_mutex, NULL);\n}\nMutex::~Mutex()\n{\nif (m_data)\n\
  {\npthread_mutex_destroy(&m_data->m_mutex);\ndelete m_data;\n}\n}\nvoid Mutex::lock()\n\
  {\npthread_mutex_lock(&m_data->m_mutex);\n}\nvoid Mutex::unlock()\n{\npthread_mutex_unlock(&m_data->m_mutex);\n\
  }\n/// ----\nMutexAccess::MutexAccess(Mutex &m)\n: m_mutex(m)\n{\nm_mutex.lock();\n\
  }\nMutexAccess::~MutexAccess()\n{\nm_mutex.unlock();\n}\n/// ----\nclass MutexTestThread\
  \  : public Thread {\npublic:\nMutexTestThread(double &result, double incVal);\n\
  ~MutexTestThread();\nvoid run();\nprivate:\ndouble &m_result;\ndouble m_incValue;\n\
  static Mutex m_globalMutex;\n};\nMutex MutexTestThread::m_globalMutex;  // 全局互斥锁是静态的\n\
  MutexTestThread::MutexTestThread(double &result, double incVal)\n: m_result(result),\n\
  m_incValue(incVal)\n{\n}\nMutexTestThread::~MutexTestThread()\n{\n}\nvoid MutexTestThread::run()\n\
  {\nMutexAccess maccess(m_globalMutex);  // 在此处锁定互斥锁\ncout << \"accessing data\"\
  \ << endl;\nif (m_result > m_incValue)\n{\nm_result -= m_incValue;\n}\nelse\n{\n\
  m_incValue += m_incValue;\n}\n// 互斥锁自动解锁\n}\nint main()\n{\nint nThreads = 10;\n\
  vector<Thread *> threads(nThreads);\ndouble price = rand() % 25;\nfor (int i=0;\
  \ i<nThreads; ++i)\n{\nthreads[i] = new MutexTestThread(price, i);\nthreads[i]->setJoinable(true);\n\
  threads[i]->start();\n}\nfor (int i=0; i<nThreads; ++i)\n{\nthreads[i]->join();\n\
  }\ncout << \" final price is \" << price << endl;\nreturn 0;\n}\n清单 17-3\nMutex\
  \ 类\n```\n\n### 运行代码\n\n您可以使用任何标准 C++ 编译器编译此代码。我在一台运行 Mac OS X 操作系统的机器上进行了测试。以下是示例结果的显示：\n\
  \n```\naccessing data\naccessing data   ...\naccessing data\naccessing data\naccessing\
  \ data\nfinal price is 2\n```\n\n### 使用标准库创建线程\n\n在上一节中，您学习了如何使用 `pthreads` 库创建多线程程序。在\
  \ C++20 中，也可以使用标准库创建多线程代码。该支持通过 `<thread>` 头文件提供。\n\n要使用 STL 创建简单的多线程程序，无需创建新的类或对象。`std::thread`\
  \ 类已经能够通过接收函数、lambda 表达式或函数对象作为输入来执行多线程操作。\n\n请考虑以下示例：\n\n```\n#include <iostream>\n\
  #include <thread>\n#include <vector>\nvoid compute_max(const std::vector<double>\
  \ &values)\n{\nauto total = 0.0;\nfor (auto v : values)\n{\ntotal += v;\n}\nstd::cout\
  \ << total << std::endl;\n}\nint main()\n{\nstd::vector<double> v = {0, 5, 3, 2,\
  \ 5, 3};\nstd::thread first_tread(compute_max, v);\nfirst_tread.join();\nreturn\
  \ 0;\n}\n```\n\n在这里，我们定义了一个名为 `compute_max` 的简单函数，它接收一个 `double` 类型的向量作为参数。这个函数可以是任何需要长时间运行的操作类型，我们希望对它进行独立线程处理。要使用此函数创建新线程，我们只需使用\
  \ `<thread>` 头文件中的 `std::thread` 类。\n\n`std::thread` 类接收您想要使用的函数（或函数对象）的名称，以及零个或多个将传递给该函数的参数。在前面的示例中，我们有一个名为\
  \ `v` 的向量作为唯一参数。如果 `compute_max` 函数需要，这可以扩展到其他参数。\n\n最后，`first_thread` 对象调用 `join()`\
  \ 方法，以指示 `main` 函数将等待该线程执行完毕，直到其完成。如果我们不想等待线程完成，可以使用 `detach()` 方法，该方法允许线程独立运行，同时当前函数继续执行其操作。\n\
  \n### 结论\n\n多核处理器和架构的不断发展极大地扩展了现代机器的计算能力。然而，为了利用这种多核架构，有必要改变编程方式。现代高性能编程越来越关注多处理技术，这些技术允许应用程序访问多个内核，从而提高系统性能。\n\
  \n多线程是一种编程技术，它允许每个进程拥有多个执行线程。如果机器拥有多个处理器，多线程允许您访问这些处理核心来执行额外的工作。在本章中，您学习了如何使用标准的\
  \ pthreads 库创建、终止和管理线程。\n\n在第一个编程示例中，您了解了 pthreads 库以及如何使用它来创建新线程。您学习了如何设计一个 C++\
  \ 类来封装 pthreads 函数调用。使用 pthreads，您可以简化多线程应用程序，因为它抽象了与系统相关的多线程 API。\n\n接下来，您学习了如何将\
  \ pthreads 应用于期权中的一个常见问题。您了解到，对于某些问题，很容易将必要的工作分配到不同的计算单元中。使用 C++，您可以将此类代码段封装到不同的对象中。\n\
  \n在下一节中，您学习了同步原语以及如何使用 pthreads 库实现它们。我介绍了一个可用于模拟互斥锁操作的类。您可以随时将 `Mutex` 类应用于其他金融编程项目。\n\
  \n最后，我还解释了新的 C++ 标准 C++20 如何在不使用像 pthreads 这样的单独库的情况下，直接提供对线程的支持。因此，对于新代码，可以简化应用程序并依赖\
  \ STL。虽然许多现有的多线程代码仍然使用像 pthread 这样的库，但学习如何使用标准库并在新项目中使用它非常重要。\n\n在本章中，我完成了用于使用 C++\
  \ 创建高性能金融应用程序的技术工具的总体介绍。我希望您喜欢了解 C++ 的特性以及如何将它们应用于解决金融行业的常见问题。\n\n"
