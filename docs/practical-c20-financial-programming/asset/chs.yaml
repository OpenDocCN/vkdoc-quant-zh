  \ -fno-common -dynamic -arch x86_64 -arch i386 -g -Os -pipe\n-fno-common -fno-strict-aliasing\
  \ -fwrapv -DENABLE_DTRACE -DMACOSX -DNDEBUG -Wall\n-Wstrict-prototypes -Wshorten-64-to-32\
  \ -DNDEBUG -g -fwrapv -Os -Wall -Wstrict-prototypes -DENABLE_DTRACE -arch x86_64\
  \ -arch i386 -pipe -I/System/Library/Frameworks/Python.framework/Versions/2.7/include/python2.7\
  \ -c Stock_Py.cpp -o build/temp.macosx-10.9-intel-2.7/Stock_Py.o\nc++ -bundle -undefined\
  \ dynamic_lookup -arch x86_64 -arch i386 -Wl,-F. build/temp.macosx-10.9-intel-2.7/Stock.o\
  \ build/temp.macosx-10.9-intel-2.7/Stock_Py.o -o /Users/carlosoliveira/code/FinancialSamples/FinancialSamples/stock.so\n\
  ```\n\n模块编译完成后，可以轻松加载到 Python 脚本或交互式会话中。以下是 `stock` 模块使用示例的记录：\n\n```\n$ python\n\
  Python 2.7.5 (default, Mar 9 2014, 22:15:05)\n[GCC 4.2.1 Compatible Apple LLVM 5.0\
  \ (clang-500.0.68)] on darwin\nType \"help\", \"copyright\", \"credits\" or \"license\"\
  \ for more information.\n>>> import stock\n>>> a = stock.new('IBM',1,1)\nticker:\
  \ IBM, price: 1.000000, dividend: 1.000000\n>>> stock.setPrice(a, 105)\n>>> stock.price(a)\n\
  105.0\n>>> stock.setDividend(a, 2.2)\n>>> stock.dividend(a)\n2.2\n>>> stock.dividendYield(a)\n\
  0.020952380952380955\n```\n\n## 将 C++ 类直接导出到 Python\n\n编写 C++ 代码将现有类导出到 Python 应用程序中。\n\
  \n### 解决方案\n\n在“将 C++ 股票处理代码导出到 Python”一节中，你已经了解了如何使用模块机制将 C++ 代码导出到 Python。通过外部\
  \ Python API，可以暴露先前使用 C++ 创建的函数和类。然而，外部 API 也强制要求创建胶水代码，这不仅是一项枯燥的任务，而且容易出错，这项工作交给计算机来处理会更好。\n\
  \n为了简化外部 Python API 引发的一些问题，开发了一个新的 boost 库。`boost::python` 库使用基于模板的机制来自动创建 Python\
  \ 所需的集成代码。通过这种方式，开发者可以更轻松地使用一组 C++ 模板来暴露类、变量和函数，同时避免了诸如在 Python 对象之间转换数据等重复性任务。以下是使用\
  \ boost 将 C++ 代码导出到 Python 的几个优点：\n\n- **避免样板代码**：将 C++ 类导出到 Python 模块所需的大量代码既简单又重复。使用模板解决方案可以轻松减少或完全消除\
  \ Python 外部 API 所需的大量样板代码。\n- **提供类型安全性**：在 Python 中，所有对象都具有相同的类型 `PyObject`。虽然\
  \ Python 在运行时会对正确类型进行检查，但你应该尽可能利用 C++ 的编译时检查。使用 `boost::python`，将使用 C++ 类型，并且仅在需要时自动转换为\
  \ Python 类型。\n- **减少编程工作量**：使用 boost 库，你可以利用大量已开发的、用于解决将 C++ 类导出到 Python 这一特定问题的代码。如果直接使用\
  \ Python API，你可能会遇到 `boost::python` 中已经解决过的问题。如同 C++ 编程的其他领域一样，理想的做法是重用优秀的库和设计，而不是重新发明现有的解决方案。\n\
  \n尽管 `boost::python` 有这些优点，但也有一些原因可能会让你希望避免使用它，而直接使用 Python API：\n\n- **项目规模**：有时，你只需要为特定用途将单个类或函数导出到\
  \ Python。在这种情况下，坚持使用 Python API 并跳过 `boost::python` 可能同样简单。\n- **Boost 集成**：如果你的项目不使用\
  \ boost，或者不允许将其他 boost 库集成到代码中，那么很难使用此解决方案进行 Python 集成。\n- **项目的特殊需求**：虽然 `boost::python`\
  \ 中的模板非常灵活，但你可能对你正在导出的类型有额外的要求。在这种情况下，只有底层的 Python 扩展 API 才能提供项目所需的灵活性。\n\n使用 `boost::python`\
  \ 库非常简单，你只需要看一些示例及其参考文档，就能了解如何快速导出类。在代码清单 15-3 所示的代码中，我将展示如何对一个示例（来自第 5 章的 `Matrix`\
  \ 类）执行此操作。`boost::python` 库与其他 boost 库一起安装，因此如果 boost 已经安装在你的系统中，你就可以直接使用它。该库的主要头文件是\
  \ `<boost/python.hpp>`，它提供了导出 C++ 类所需的所有宏和模板。\n\n该库中的主要宏是 `BOOST_PYTHON_MODULE`。这个宏用于生成\
  \ Python 运行时期望的样板代码。在该宏之后的范围内，你可以声明将从 Python 可见的类、函数和其他类型。\n\n要导出 C++ 类，主要提供的工具是\
  \ `class_` 模板。正如你所料，这个模板用于执行定义类型及其属性的繁重工作，底层使用 Python API。`class_` 的模板参数是类名。构造函数需要一个供\
  \ Python 使用的名称和一个默认构造函数。构造函数使用 `init` 模板定义，参数作为模板参数添加。\n\n在主要的 `class_` 模板中，你会看到对\
  \ `def` 成员函数的调用，该函数用于向类定义新成员。每次调用 `def` 时，`class_` 模板都会生成额外的代码来处理从 Python 代码对给定成员函数的调用。例如，你有以下定义：\n\
  \n```\ndef(\"subtract\", &MatrixP::subtract)\n```\n\n这里，`subtract` 成员函数被定义，第一个参数是名称，第二个参数是调用的目标。\n\
  \n### 完整代码\n\n你可以在代码清单 15-3 中看到 `Matrix` 模块的完整代码。清单末尾的 `setup.py` 文件可用于构建模块。\n\n\
  ```\n//\n//  Matrix_Py.h\n#ifndef __FinancialSamples__Matrix_Py__\n#define __FinancialSamples__Matrix_Py__\n\
  #include \n#include \"Matrix.h\"\nclass MatrixP : public Matrix {\npublic:\nMatrixP(int\
  \ a);\nMatrixP(int a, int b);\nMatrixP(const MatrixP &p);\n~MatrixP();\nvoid set(int\
  \ a, int b, double v);\ndouble get(int a, int b);\n};\n#endif /* defined(__FinancialSamples__Matrix_Py__)\
  \ */\n//\n//  Matrix_Py.cpp\n#include \"Matrix_Py.h\"\n// include this header file\
  \ for access to boost::python templates and macros\n#include \n// add the using\
  \ clause to reduce namespace clutter\nusing namespace boost::python;\nMatrixP::MatrixP(int\
  \ a)\n: Matrix(a)\n{\n}\nMatrixP::MatrixP(int a, int b)\n: Matrix(a, b)\n{\n}\n\
  MatrixP::MatrixP(const MatrixP &p)\n: Matrix(p)\n{\n}\nMatrixP::~MatrixP()\n{\n\
  }\nvoid MatrixP::set(int a, int b, double v)\n{\n(*this)[a][b] = v;\n}\ndouble MatrixP::get(int\
  \ a, int b)\n{\nreturn (*this)[a][b];\n}\n// this macro generates all the boilerplate\
  \ required by the Python API\nBOOST_PYTHON_MODULE(matrix)\n{\n// defines a new class\
  \ to be exported\nclass_(\"Matrix\",\ninit())    // the init form defines a constructor\n\
  // another constructor with two int parameters\n.def(init())\n// here are some standard\
  \ functions (name first, member function second)\n.def(\"add\", &MatrixP::add)\n\
  .def(\"subtract\", &MatrixP::subtract)\n.def(\"multiply\", &MatrixP::multiply)\n\
  .def(\"numRows\", &MatrixP::numRows)\n.def(\"trace\", &MatrixP::trace)\n.def(\"\
  transpose\", &MatrixP::transpose)\n.def(\"set\", &MatrixP::set)\n.def(\"get\", &MatrixP::get)\n\
  ;\n}\n#\n```\n\n\n\n### `matrix-setup.py`\n\n构建矩阵模块的 Python 代码：\n\n```python\nfrom\
  \ distutils.core import setup, Extension\n\n### 需要包含 boost::python 库的包含路径和库路径\n\
  setup(name=\"matrix\", version=\"1.0\",\next_modules=[Extension(\"matrix\", [\"\
  Matrix.cpp\", \"matrix_Py.cpp\"],\ninclude_dirs=[\"/opt/local/include/\"],\nlibrary_dirs=[\"\
  /opt/local/lib/\"],\nlibraries=[\"boost_python-mt\"])])\n```\n\n**代码清单 15-3** 矩阵模块及关联的\
  \ `setup.py` 文件\n\n---\n\n### 运行代码\n\n要编译代码，可以遵循与上一节所述类似的步骤。这意味着可以使用 Python 构建系统来编译扩展（通常编译为\
  \ `.so` 或 `.dll` 格式）。为此，需要创建一个设置文件，这里我们将其命名为 `matrix-setup.py`。请注意，`matrix-setup.py`\
  \ 文件中也列出了 `libraries` 键。该键告诉构建系统链接到 `boost_python-mt` 库。您可能还需要将 `include_dirs` 和\
  \ `library_dirs` 键更改为系统中 boost 的安装位置。以下是通过 Python 运行设置文件的结果：\n\n```\n$ python matrix-setup.py\
  \ build_ext -i\nrunning build_ext\nbuilding 'matrix' extension\ncc -fno-strict-aliasing\
  \ -fno-common -dynamic -arch x86_64 -arch i386 -g -Os -pipe\n-fno-common -fno-strict-aliasing\
  \ -fwrapv -DENABLE_DTRACE -DMACOSX -DNDEBUG -Wall\n-Wstrict-prototypes -Wshorten-64-to-32\
  \ -DNDEBUG -g -fwrapv -Os -Wall -Wstrict-prototypes -DENABLE_DTRACE -arch x86_64\
  \ -arch i386 -pipe -I/opt/local/include/ -I/System/Library/Frameworks/Python.framework/Versions/2.7/include/python2.7\
  \ -c Matrix.cpp -o build/temp.macosx-10.9-intel-2.7/Matrix.o\nc++ -bundle -undefined\
  \ dynamic_lookup -arch x86_64 -arch i386 -Wl,-F. build/temp.macosx-10.9-intel-2.7/Matrix.o\
  \ build/temp.macosx-10.9-intel-2.7/matrix_Py.o -L/opt/local/lib/ -lboost_python-mt\
  \ -o /Users/carlosoliveira/code/FinancialSamples/FinancialSamples/matrix.so\n```\n\
  \n这个过程完成后，您应该会得到一个名为 `matrix.so`（如果是在 Windows 系统上构建，则为 `matrix.dll`）的文件。您可以通过如下导入语句加载它：\n\
  \n```\n$ python\nPython 2.7.5 (default, Mar 9 2014, 22:15:05)\n[GCC 4.2.1 Compatible\
  \ Apple LLVM 5.0 (clang-500.0.68)] on darwin\nType \"help\", \"copyright\", \"credits\"\
  \ or \"license\" for more information.\n>>> import matrix\n>>> m = matrix.Matrix(5,5)\n\
  >>> m.set(2,2,4)\n>>> m.get(2,2)\n4.0\n```\n\n---\n\n## 使用 Lua 作为扩展语言\n\n将 Lua 用作针对\
  \ C++ 编写类的扩展库。\n\n### 解决方案\n\nLua 是一种脚本语言，旨在为 C 和 C++ 代码提供扩展机制，并作为其他应用程序的嵌入式语言。在这方面，它非常成功，目前有大量软件产品使用\
  \ Lua 来基于现有的 C 和 C++ 类库实现扩展模块。这类应用的例子可以在计算机游戏、图像处理软件包和金融行业软件中找到。\n\nLua 的成功与其简洁的系统有关，该系统力求尽可能紧密地与\
  \ C 和 C++ 环境融合。基于此目标，Lua 仅提供了构建动态垃圾回收运行时系统所需的基本机制。这些语言特性使其易于被选用于为大规模应用程序代码库创建可编程扩展。\n\
  \n您可以从主网站 [`http://lua.org`](http://lua.org) 下载 Lua 的源代码形式。将 Lua 集成到 C++ 项目中最简单的方法是直接添加源文件。您也可以决定创建一个包含\
  \ Lua 解释器的独立库，并使用 Lua 文档中提供的信息将其链接到您的应用程序。要将 Lua 用作扩展语言，第一步是导入并初始化 Lua 运行时引擎。这可以使用\
  \ Lua C API 来完成，该 API 是 Lua 语言标准安装的一部分。主头文件 `lua.h` 使开发者能够访问运行时引擎的主要功能以及 Lua 的标准库。\n\
  \n以下是示例应用程序的主函数，您可以看到将 Lua 加载到程序中所需操作的顺序：\n\n```\nint main (void) {\nchar buff[256];\n\
  lua_State *L = luaL_newstate();\nint error;\n// 加载 Lua 附带的某些 (C) 库\nluaopen_base(L);\n\
  luaopen_table(L);\nluaopen_io(L);\nluaopen_string(L);\nluaopen_math(L);\n// 加载 LuaOption\
  \ 对象\nLuaWrapper::Register(L);\nwhile (fgets(buff, sizeof(buff), stdin) != NULL)\
  \ {\nerror = luaL_loadbuffer(L, buff, strlen(buff), \"line\") ||\nlua_pcall(L, 0,\
  \ 0, 0);\nif (error) {\ncerr << lua_tostring(L, -1) << endl;\nlua_pop(L, 1);  //\
  \ 从 Lua 栈中移除错误\n}\nlua_close(L);\nreturn 0;\n}\n```\n\n此 API 中的大多数函数都使用 `lua_State`\
  \ 结构作为参数。如上述示例所示，您可以使用 `luaL_newstate` 函数创建一个新的 `lua_State` 对象。完成此初始化步骤后，您可以加载 Lua\
  \ 运行时附带的某些库。可以使用 `luaopen_string` 和 `luaopen_math` 等函数选择库的子集，它们分别用于加载处理字符串和数学运算的\
  \ Lua 函数。\n\n下一步是将您可能需要的任何用户定义库加载到 Lua 数据表中。Lua 语言的架构是将其动态信息存储在一个栈中，这是一种先进先出的数据结构。存在一个全局栈，用于存储相当于全局变量的信息。您可以根据需要使用这个栈来存储新的表。要存储单个值，您可以使用\
  \ `lua_pushstring`、`lua_pushnumber` 或 `lua_pushclosure`（用于函数）等函数将它们压入栈中。您可以使用 `lua_tonumber`\
  \ 等函数从栈顶读取数据。\n\n使用 Lua 运行时还可以做另一件事：直接调用某个 Lua 函数。要调用一个函数，您需要将想要调用的函数名称压入栈中，紧接着是所需的参数。然后，您需要调用\
  \ `lua_pcall` 函数来执行调用。您可以在前面展示的 `main` 函数末尾看到一个关于 `lua_pcall` 的例子。最后，您可以访问函数的结果，这些结果在返回时存储在栈顶。\n\
  \n虽然这起初看起来工作量很大，但由于 Lua 扩展 API 的通用性，实现起来轻而易举。我提供了一个示例，演示如何从 Lua 代码中使用 `Option` 类访问\
  \ C++ 类，该类仅包含两个数据成员：一个代码（字符串）和行权价格（双精度浮点数）。原始类通过 `LuaOption` 类从 Lua 访问。之所以需要这样做，是由于\
  \ Lua 只能与接收 `lua_State` 类型参数的函数交互。`LuaOption` 的每个方法都从栈中检索数据，调用 `Option` 类中的相应方法，并将结果返回到栈中。最后，`LuaOption`\
  \ 类借助模板 `LuaWrap` 进行注册。\n\n### 完整代码\n\n代码清单 15-4 中的示例展示了如何使用 Lua API 将扩展语言嵌入到您的应用程序中。此示例中唯一暴露的类是\
  \ `Option` 类。`LuaOption` 类是 `Option` 的一个简单封装，负责在 Lua 类型与 C++ 类型之间进行参数转换。主函数具有加载\
  \ Lua 文件并调用其中任何函数的能力。\n\n\n```cpp\n//\n//  Option.h\n#ifndef __FinancialSamples__Option__\n\
  #define __FinancialSamples__Option__\n#include \nclass Option {\npublic:\nOption(const\
  \ std::string &ticker, double strike);\nOption(const Option &p);\n~Option();\nOption\
  \ &operator=(const Option &p);\nstd::string ticker();\ndouble strike();\nvoid setTicker(const\
  \ std::string &);\nvoid setStrike(double);\nprivate:\nstd::string m_ticker;\ndouble\
  \ m_strike;\n};\n#endif /* defined(__FinancialSamples__Option__) */\n\n//\n//  Option.cpp\n\
  #include \"Option.h\"\nOption::Option(const std::string &ticker, double strike)\n\
  : m_ticker(ticker),\nm_strike(strike)\n{\n}\nOption::Option(const Option &p)\n:\
  \ m_ticker(p.m_ticker),\nm_strike(p.m_strike)\n{\n}\nOption::~Option()\n{\n}\n\n\
  Option &Option::operator=(const Option &p)\n{\nif (this != &p)\n{\nm_ticker = p.m_ticker;\n\
  m_strike = p.m_strike;\n}\nreturn *this;\n}\n\nstd::string Option::ticker()\n{\n\
  return m_ticker;\n}\n\ndouble Option::strike()\n{\nreturn m_strike;\n}\n\nvoid Option::setTicker(const\
  \ std::string &s)\n{\nm_ticker = s;\n}\n\nvoid Option::setStrike(double val)\n{\n\
  m_strike = val;\n}\n\n//\n//  LuaOption.h\n#ifndef __FinancialSamples__LuaOption__\n\
  #define __FinancialSamples__LuaOption__\n#include \"LuaWrap.h\"\nclass Option;\n\
  #include \nclass LuaOption {\npublic:\nLuaOption(lua_State *l);\nvoid setObject(lua_State\
  \ *l);\n\nstatic const char className[];\nstatic LuaWrapper::RegType methods[];\n\
  // Lua functions should receive lua_State and return int\nint ticker(lua_State *l);\n\
  int strike(lua_State *l);\nint setTicker(lua_State *l);\nint setStrike(lua_State\
  \ *l);\nprivate:\nOption *m_option;\n};\n#endif /* defined(__FinancialSamples__LuaOption__)\
  \ */\n\n//\n//  LuaOption.cpp\n#include \"LuaOption.h\"\n#include \"Option.h\"\n\
  #include \nconst char LuaOption::className[] = \"Option\";\n\nLuaOption::LuaOption(lua_State\
  \ *L)\n{\nm_option = (Option*)lua_touserdata(L, 1);\n}\n\nvoid LuaOption::setObject(lua_State\
  \ *L)\n{\nm_option = (Option*)lua_touserdata(L, 1);\n}\n\nint LuaOption::ticker(lua_State\
  \ *L)\n{\nlua_pushstring(L, m_option->ticker().c_str());\nreturn 1;\n}\n\nint LuaOption::strike(lua_State\
  \ *L)\n{\nlua_pushnumber(L, m_option->strike());\nreturn 1;\n}\n\nint LuaOption::setTicker(lua_State\
  \ *L)\n{\nm_option->setTicker((const char*)luaL_checkstring(L, 1));\nreturn 0;\n\
  }\n\nint LuaOption::setStrike(lua_State *L)\n{\nm_option->setStrike((double)luaL_checknumber(L,\
  \ 1));\nreturn 0;\n}\n\n#define method(class, name) {#name, &class::name}\nLuaWrapper::RegType\
  \ LuaOption::methods[] = {\nmethod(LuaOption, ticker),\nmethod(LuaOption, strike),\n\
  method(LuaOption, setTicker),\nmethod(LuaOption, setStrike),\n{0,0}\n};\n\n//\n\
  //  LuaWrapper.h\n// original code from luna wrapper example (from http://lua-users.org/wiki/LunaWrapper)\n\
  #ifndef __FinancialSamples__Luna__\n#define __FinancialSamples__Luna__\n#include\
  \ \ntemplate class LuaWrapper {\npublic:\nstatic void Register(lua_State *L) {\n\
  lua_pushcfunction(L, &LuaWrapper::constructor);\nlua_setglobal(L, T::className);\n\
  luaL_newmetatable(L, T::className);\nlua_pushstring(L, \"__gc\");\nlua_pushcfunction(L,\
  \ &LuaWrapper::gc_obj);\nlua_settable(L, -3);\n}\nstatic int constructor(lua_State\
  \ *L) {\nT* obj = new T(L);\nlua_newtable(L);\nlua_pushnumber(L, 0);\nT** a = (T**)lua_newuserdata(L,\
  \ sizeof(T*));\n*a = obj;\nluaL_getmetatable(L, T::className);\nlua_setmetatable(L,\
  \ -2);\nlua_settable(L, -3); // table[0] = obj;\nfor (int i = 0; T::methods[i].name;\
  \ i++) {\nlua_pushstring(L, T::methods[i].name);\nlua_pushnumber(L, i);\nlua_pushcclosure(L,\
  \ &LuaWrapper::thunk, 1);\nlua_settable(L, -3);\n}\nreturn 1;\n}\n\nstatic int thunk(lua_State\
  \ *L) {\nint i = (int)lua_tonumber(L, lua_upvalueindex(1));\nlua_pushnumber(L, 0);\n\
  lua_gettable(L, 1);\nT** obj = static_cast(luaL_checkudata(L, -1, T::className));\n\
  lua_remove(L, -1);\nreturn ((*obj)->*(T::methods[i].mfunc))(L);\n}\nstatic int gc_obj(lua_State\
  \ *L) {\nT** obj = static_cast(luaL_checkudata(L, -1, T::className));\ndelete (*obj);\n\
  return 0;\n}\nstruct RegType {\nconst char *name;\nint(T::*mfunc)(lua_State*);\n\
  };\n};\n#endif /* defined(__FinancialSamples__LuaWrapper__) */\n\n//\n//  LuaMain.cpp\n\
  #include \"LuaMain.h\"\n#include \n#include \n#include \n#include \n#include \n\
  using std::cout;\nusing std::cerr;\nusing std::endl;\n\nint main (void) {\nchar\
  \ buff[256];\nlua_State *L = luaL_newstate();\nint error;\n// load some of the (C)\
  \ libraries included with Lua\nluaopen_base(L);\nluaopen_table(L);\nluaopen_io(L);\n\
  luaopen_string(L);\nluaopen_math(L);\n// load LuaOption object\nLuaWrapper::Register(L);\n\
  while (fgets(buff, sizeof(buff), stdin) != NULL) {\nerror = luaL_loadbuffer(L, buff,\
  \ strlen(buff), \"line\") ||\nlua_pcall(L, 0, 0, 0);\nif (error) {\ncerr << lua_tostring(L,\
  \ -1) << endl;\nlua_pop(L, 1);  // remove error from Lua stack\n}\n}\nlua_close(L);\n\
  return 0;\n}\n\n清单 15-4\nOption 类及其 Lua 封装 LuaOption\n```\n\n\n### 运行代码\n\n你可以使用任何符合标准的\
  \ C++ 编译器来构建清单 15-4 中的代码。唯一的额外步骤是，你必须在编译器配置中添加 Lua 包含文件和库的路径。例如，在我的系统中，我将 Lua 文件编译到了目录\
  \ `/code/lua-5.2.3/src/` 下，因此该代码可以按如下方式构建：\n\n```\n$ c++ -o luatest Option.cpp LuaOption.cpp\
  \  LuaMain.cpp -I/Users/code/lua-5.2.3/src \\\n-L/Users /code/lua-5.2.3/src/ -llua\n\
  ```\n\n### 结论\n\n诸如 Python 和 Lua 这样的扩展语言在过去几年中变得非常流行。它们提供了快速开发由现有组件构成的应用程序的能力。然而，得益于\
  \ C++ 的灵活性，正如你所见，我们可以创建易于与这些语言集成的 C++ 库。\n\n首先，你学习了如何使用 Python 作为 C++ 类的扩展语言。通过直接使用\
  \ Python 外部 API，可以从 Python 代码中访问示例中展示的类。你学习了如何在 Python 维护的数据结构中转换数据。在第二个编码示例中，你学习了如何使用\
  \ `boost::python` 库，该库提供了一种更简洁的方式将 C++ 数据类型导出到 Python。我还讨论了每种方法的一些优缺点。\n\nLua 是另一种在过去几年中越来越流行的语言。凭借其小巧的体积，Lua\
  \ 是作为用 C++ 编写的库的扩展语言的理想选择。由于其简单性和模块化，你可以轻松地将 Lua 解释器嵌入到 C++ 应用程序中。在本章中，你看到了一种展示如何轻松将\
  \ Lua 集成到应用程序中的 C++ 编码技术。\n\n将你的 C++ 代码用作外部库是与其它工具和环境连接的众多方式之一。另一种选择是将你的金融 C++ 代码集成到现有的科学编程工具中。最常用于数据分析的两个科学工具是\
  \ R 和 Maxima。在第 16 章中，你将进一步了解这些工具以及如何将 C++ 集成到这些应用程序提供的工作流程中。\n\n"
- "# 16. 将 C++ 与 R 和 Maxima 结合使用\n\n用 C++ 实现的代码的一个优势在于，它既可以作为原生库或独立应用程序的一部分，也可以作为其他开发和建模环境的组件进行集成。例如，在金融行业，通常会用\
  \ C++ 实现底层模块，而高级分析则在更面向用户的环境（如 Excel、Mathematica、Matlab、Maxima、R 和 Octave）中进行。\n\
  \n当使用高级数据分析环境时，至关重要的一点是，数值结果必须与原生代码得出的结果一致，并且能够访问那些已经用 C++ 编码的底层库。因此，对于金融行业的程序员来说，一项重要的技能是能够将现有代码与分析师和数学家使用的一个或多个分析应用程序进行集成。\n\
  \n在本章中，我们将向你展示如何将用 C++ 开发的金融库集成到两个用于金融分析的知名仿真与建模环境中：R 和 Maxima。这些应用程序是开源的，并且可以在多个平台上免费获取。然而，你在本章中看到的示例所演示的原理，也同样适用于统计学、仿真、工程和数学领域的其他商业工具。\n\
  \n以下是你在本章中将学到的一些主题：\n\n*   **将 C++ 与 R 集成**：R 语言的用户已经创建了一个丰富的统计库和应用程序生态系统。然而，有时需要将\
  \ C++ 代码作为 R 分析的一部分进行集成。在本章中，你将看到如何轻松地将 C++ 类嵌入到这个系统中，这既可以提高性能，也可以保持与其它用 C++ 部署的应用程序的一致性。\n\
  \n*   **将 C++ 与 Maxima 集成**：Maxima 计算机代数系统用于使用简单的高级语言开发精确的数学模型。它也被用于其可视化功能。你可以使用该语言支持的共享库机制轻松地将现有的\
  \ C++ 库集成到 Maxima 中。\n\n## 将 C++ 与 R 集成\n\n创建一个 C++ 类，用于计算一组付款的现值，并且可以从 R 解释器中调用。\n\
  \n### 解决方案\n\nR 是一个为对大数据集执行统计分析而创建的编程环境。由于其易用性和先进的统计能力，R 已成为最常用的数据分析环境，并且在数据挖掘等某些领域已成为事实上的标准。越来越多的统计学家和工程师每天使用\
  \ R 来研究大数据集的属性。\n\nR 可用于最常见的操作系统和计算机架构。你可以从官方网站 [`www.r-project.org`](http://www.r-project.org)\
  \ 免费下载。在根据你的操作系统运行所需的安装方法后，你将能够启动该语言的迭代解释器。标准的 R 环境能够运行 R 脚本和单个命令。你可以使用这些工具来执行快速数据分析并基于现有数据创建图表。你可以在图\
  \ 16-1 中看到 R 控制台主应用程序窗口的外观。\n\n![../images/323908_2_En_16_Chapter/323908_2_En_16_Fig1_HTML.jpg](img/323908_2_En_16_Fig1_HTML.jpg)\n\
  \n**图 16-1** Mac OS X 上的 R 控制台窗口\n\nR 通常用于执行大量的数学算法和数据分析任务。例如，R 的一个常见用途是运行标准统计程序，如均方误差和其他类型的统计回归。R\
  \ 也被用来实现针对金融数据集定制的统计测试。因此，能够将 C++ 代码加载到 R 控制台提供的动态环境中是非常有用的。\n\n为了能够在 R 中使用 C++\
  \ 类，你需要使用 R 扩展应用程序编程接口（API）。扩展 API 由一组与 R 运行时交互的基于 C 的函数组成。例如，你可以使用 API 从 R 中检索和转换值。同样，你可以使用\
  \ API 执行常见任务，如调用数学函数和随机数生成器等。\n\n要创建访问 R 扩展库的 C++ 函数和类，你需要包含头文件 `R.h`。该头文件是主要的 C\
  \ 文件，用于协调对 R 运行时导出的许多 API 声明的访问。\n\n例如，假设你需要一种快速的方法来确定一组未来付款的现值。你可以通过创建自己的 C++ 解决方案并使用\
  \ R 扩展机制将该解决方案导出到 R 来实现。要理解现值计算的一般概念，你可以参考第 1 章，我在那里讨论了固定收益分析的工具。\n\n主要功能被编码在 `RExtension`\
  \ 类中。该类中的两个主要方法是 `addCashPayment`，用于添加一个新的现金流，该现金流稍后将被算法考虑；以及 `presentValue`，用于计算到目前为止所有已添加现金付款的现值。现值的计算使用以下公式：\n\
  \n\n\n![$$ \\sum \\limits_{i=1}^N\\frac{V_i}{{\\left(1+R\\right)}^{T_i}} $$](img/323908_2_En_16_Chapter_TeX_Equa.png)\n\
  \n在这个等式中，`V[i]` 是第 i 笔现金流的价值，`T[i]` 是第 i 笔现金流的时间，`R` 是利率。\n\nR 解释器的真正入口点是 `presentValue`\
  \ 函数，其声明方式如下：\n\n```c\nextern \"C\" {\nvoid presentValue(int *, double *, int *,\
  \ double *, double *);\n}\n```\n\n在此声明中使用 `extern \"C\"` 语句是为了避免 C++ 编译器通常执行的函数名修饰。只有函数名会受到影响，而函数内容可以使用大多数\
  \ C++ 特性。通过这种方式声明函数，`presentValue` 这个名称在库中将保持不变，从而 R 解释器可以查看并访问它。\n\n`presentValue`\
  \ 函数的定义并不特殊。与普通 C++ 代码的唯一区别在于，所有参数都是以指针形式传递的。这是 R 运行时系统允许解释器和 C++ 代码之间共享数据的方式。必要时，被调用的函数可以通过指针读取和修改传入的参数。该函数的实现使用了参数中传递的信息，包括现金流向量的元素个数、利率、一个包含时间指示的向量，以及一个包含现金流的向量。最后一个参数是指向结果值的指针。\n\
  \n### 完整代码\n\n清单 16-1 展示了 `RExtension` 类的实现。主要部分是该类的定义——包含计算一组现金流现值的功能——以及 `presentValue`\
  \ 函数，该函数可以直接从 R 运行时中访问。\n\n```cpp\n//\n// RExtension.h\n#ifndef __FinancialSamples__RExtension__\n\
  #define __FinancialSamples__RExtension__\n#include \nclass RExtension {\npublic:\n\
  RExtension(double rate);\nRExtension(const RExtension &p);\n~RExtension();\nRExtension\
  \ &operator=(const RExtension &p);\nvoid addCashPayment(double value, int timePeriod);\n\
  double presentValue();\nprivate:\nstd::vector m_cashPayments;\nstd::vector m_timePeriods;\n\
  double m_rate;\ndouble presentValue(double futureValue, int timePeriod);\n};\n#endif\
  \ /* defined(__FinancialSamples__RExtension__) */\n//\n// RExtension.cpp\n#include\
  \ \"RExtension.h\"\n#include \n#include \nusing std::cout;\nusing std::endl;\nextern\
  \ \"C\" {\nvoid presentValue(int *, double *, int *, double *, double *);\n}\nvoid\
  \ presentValue(int *numPayments, double *intRate,\nint *timePeriods, double *payments,\
  \ double *result)\n{\nint n = *numPayments;\nRExtension re(*intRate);\nfor (int\
  \ i=0; i<m_cashPayments = v.m_cashPayments;\nthis->m_timePeriods = v.m_timePeriods;\n\
  this->m_rate = v.m_rate;\n}\nreturn *this;\n}\nvoid RExtension::addCashPayment(double\
  \ value, int timePeriod)\n{\nm_cashPayments.push_back(value);\nm_timePeriods.push_back(timePeriod);\n\
  }\ndouble RExtension::presentValue(double futureValue, int timePeriod)\n{\ndouble\
  \ pValue = futureValue / pow(1+m_rate, timePeriod);\ncout << \" value \" << pValue\
  \ << endl;\nreturn pValue;\n}\ndouble RExtension::presentValue()\n{\ndouble total\
  \ = 0;\nfor (unsigned i=0; i<m_cashPayments.size(); ++i)\n{\ntotal += presentValue(m_cashPayments[i],\
  \ m_timePeriods[i]);\n}\nreturn total;\n}\n清单 16-1\nR 扩展库的代码\n```\n\n### 运行代码\n\n\
  上一节中给出的代码可以使用任何符合标准的 C++ 编译器来构建。然而，R 解释器通过使用 `R` 命令的 `CMD` 选项，使得创建扩展库变得非常容易。这种构建技术允许你快速创建一个包含所有必要\
  \ C++ 代码的共享对象文件，从而可以方便地导入到 R 运行时环境中。使用 R 解释器的 `CMD` 选项，你也不必担心正确的编译器、头文件的正确位置以及链接库等其他常见的编译参数。\n\
  \n以下是我如何从给定的源文件生成二进制对象（这是在 Mac OS X 系统上运行的，但其他平台的结果应该类似）。编译命令是由 R 使用 `SHLIB` 选项自动生成的，因此你无需担心库文件的位置。\n\
  \n```bash\n$ R CMD SHLIB code/FinancialSamples/FinancialSamples/RExtension.cpp\n\
  g++ -arch x86_64 -I/Library/Frameworks/R.framework/Resources/include -DNDEBUG\n\
  -I/usr/local/include    -fPIC  -mtune=core2 -g -O2  -c\ncode/FinancialSamples/FinancialSamples/RExtension.cpp\
  \ -o\ncode/FinancialSamples/FinancialSamples/RExtension.o\ng++ -arch x86_64 -dynamiclib\
  \ -Wl,-headerpad_max_install_names -undefined dynamic_lookup -single_module -multiply_defined\
  \ suppress -L/usr/local/lib -L/usr/local/lib -o\ncode/FinancialSamples/FinancialSamples/RExtension.so\n\
  code/FinancialSamples/FinancialSamples/RExtension.o -F/Library/Frameworks/R.framework/..\
  \ -framework R -Wl,-framework -Wl,CoreFoundation\n```\n\n一旦共享对象被创建（在 UNIX 上是扩展名为\
  \ `.so` 的文件，在 Windows 上是扩展名为 `.dll` 的文件），你就可以使用 `dyn.load` 函数将其加载到 R 解释器中，该函数的唯一参数就是文件名。之后，你只需使用\
  \ `.C` 函数来调用编译好的 C 或 C++ 函数。为了使其正常工作，你需要将函数名称作为第一个参数提供，后面接着函数的参数。不过，你需要确保传递给函数的值带有正确的参数类型标记（使用诸如\
  \ `as.integer` 和 `as.double` 之类的函数）。执行 `.C` 函数后，结果值会显示在解释器窗口中。以下是一个示例会话，其中我导入并使用了\
  \ `RExtension` 模块。\n\n```r\n$ R\n> dyn.load(\"RExtension.so\")\n> .C(\"presentValue\"\
  , n=as.integer(4), r=as.double(0.05), t=as.integer(c(1,2,3,4)), p=as.double(c(3,4,5,6)),\
  \ res=as.double(0))\nvalue 2.85714\nvalue 3.62812\nvalue 4.31919\nvalue 4.93621\n\
  $n\n[1] 4\n$r\n[1] 0.05\n$t\n[1] 1 2 3 4\n$p\n[1] 3 4 5 6\n$res\n[1] 15.74066\n\
  >\n```\n\n所需的结果会作为变量 `res` 的内容打印出来，本例中为 `15.74066`。\n\n## 与 Maxima CAS 集成\n\n实现一个用于计算期权概率的类，该类可以通过\
  \ Maxima 计算机代数系统访问。\n\n### 解决方案\n\nR 环境是一个成功应用的范例，已广泛用于数据集的统计分析。在数据分析中另一种常用的数学应用是计算机代数系统（CAS）。金融分析师使用这类应用对数学函数和表达式进行代数变换。例如，这类系统可以用来求解方程、求导数和积分，或因式分解多项式。此类中知名的应用包括\
  \ Mathematica、Maple 和 Maxima。\n\n在本节中，您将学习如何与 Maxima 交互，这是一个开源的 CAS，可用于协助金融数学模型的开发。您还将了解如何将新的或现有的\
  \ C++ 代码集成到 Maxima 中，以便在使用 Maxima 解释器进行可视化时，对代码进行迭代实验。\n\n\n\nMaxima CAS 是一款开源应用程序，可从其互联网仓库中免费下载和安装。该项目的官方网站位于\
  \ [`maxima.sourceforge.net`](http://maxima.sourceforge.net)。安装后，可以使用默认安装的现有前端界面之一来运行\
  \ Maxima。Maxima 最常用的前端是 wxMaxima，这是一款跨平台应用程序，适用于 Windows、Mac OS X 和 Linux 操作系统。您也可以免费下载\
  \ wxMaxima：最新版本可在开发者网站 [`wxmaxima.sourceforge.net/`](http://wxmaxima.sourceforge.net/)\
  \ 上获取。图 16-2 展示了 wxMaxima 应用程序的主窗口。\n\n![../images/323908_2_En_16_Chapter/323908_2_En_16_Fig2_HTML.jpg](img/323908_2_En_16_Fig2_HTML.jpg)\n\
  图 16-2\nwxMaxima 应用程序的主窗口，它是 Maxima CAS 的一个前端。\n\nwxMaxima 应用程序是加载数据和执行数据分析（包括图形、汇总表和简单图表）的理想环境。此功能可用于根据我们在前几章讨论的算法结果，对财务数据进行快速研究。要将现有的\
  \ C++ 代码与 Maxima 环境集成，您需要创建一个符合 Maxima 文档中所述约定的库。在本节中，您将学习如何使用一个计算期权概率的示例类来做到这一点。\n\
  \n将 C++ 与 Maxima 集成的第一步是创建一个可由应用程序加载的共享对象库。使用大多数编译器和集成开发环境 (IDE) 都可以轻松创建此类库。我将展示如何在\
  \ Windows 上使用 MingW 的 `gcc` 编译器完成此操作。其他环境具有类似的功能，并且这些说明的大部分内容将是相似的，但您需要查阅 Maxima\
  \ 网站上的文档。\n\n在 Windows 中，可以使用 `gcc` 编译器从 C++ 代码创建 DLL 文件。DLL 的内容将包含 `OptionsProbabilities`\
  \ 类，该类已在第 14 章中解释过。为方便参考，我将该类的头文件包含在列表 16-2 中。`OptionsProbabilities` 类的主要操作用于计算特定概率，例如期权价格高于或低于执行价的概率（通过\
  \ `probFinishAboveStrike` 和 `probFinishBelowStrike` 计算）。您还可以使用成员函数 `probFinalPriceBetweenPrices`\
  \ 计算价格落在某个区间内的概率。然后，需要在 `OptionProbabilityExportedFunctions.cpp` 文件中创建粘合代码。该文件声明了导入\
  \ DLL 的客户端可以查看的函数。\n\n例如，考虑函数 `optionProbFinishAboveStrike`。声明中的 `extern \"C\"`\
  \ 部分表示函数名不应被 C++ 编译器修改，以便在运行时可以找到它。`__declspec(dllexport)` 声明告诉编译器和链接器此函数应在生成的 DLL\
  \ 中导出。其余部分都是正常的 C++ 代码，用于实例化 `OptionsProbabilities` 类的对象并调用所需的函数。\n\n接下来需要解决的问题是如何告诉\
  \ Maxima 找到这些外部函数。这是通过一个可以被 Maxima 加载的简单 Lisp 文件来完成的。Lisp 是 Maxima 用于实现其所有功能的内部编程语言。要使用底层代码扩展\
  \ Maxima，通常需要创建一些 Lisp 函数。然而，在本例中，我们只使用两个 Lisp 函数来创建所有必要的 C++ 代码，以连接之前创建的 DLL。\n\
  \n这个 Lisp 文件命名为 `optionProbabilities.l`，如列表 16-2 所示。该文件包含两部分：第一部分是一个包含 C 代码的 `clines`\
  \ 函数，这些代码将被编译并由 Maxima 使用。第二部分是一组所需函数的 Lisp 声明。`clines` 内部的代码必须放在引号之间，因此需要转义任何引号（和反斜杠字符），方法是使用反斜杠。除此之外，您可以输入任何正常的\
  \ C 语句。您会发现其中有四个函数用于从 DLL 加载所需的代码。\n\n`optionProbabilities.l` 中的第一个函数 `loadLibrary`\
  \ 负责加载 DLL（如果尚未加载）。这是通过两个 Windows API 函数 `LoadLibraryA` 和 `GetProcAddress` 完成的。`LoadLibraryA`\
  \ 函数将库名称作为参数，如果加载成功，则返回一个指向它的引用。另一方面，`GetProcAddress` 函数检索一个指向其第二个参数中命名函数的指针。一旦\
  \ `loadLibrary` 完成其工作，您将获得指向 `optprob.dll` 文件中导出的三个函数的指针。\n\n然后，`optionProbabilities.l`\
  \ 中的接下来的三个函数用于调用 DLL 中的每个所需函数。该文件以三个声明结束，这些声明告诉 Maxima 将这些函数作为顶层操作接受，并指定所需的类型。\n\
  \n完整代码\n\n在列表 16-2 中，您可以找到用于在 Maxima CAS 中使用 `OptionsProbabilities` 类的完整代码。在 C++\
  \ 代码之后，您还可以看到将类导入 Maxima 环境所需的 Lisp 代码行。\n\n\n\n```cpp\n//\n// OptionsProbabilities.h\n\
  #ifndef __FinancialSamples__OptionsProbabilities__\n#define __FinancialSamples__OptionsProbabilities__\n\
  #include \nclass OptionsProbabilities {\npublic:\nOptionsProbabilities(double initialPrice,\
  \ double strike, double avgStep, int nDays);\nOptionsProbabilities(const OptionsProbabilities\
  \ &p);\n~OptionsProbabilities();\nOptionsProbabilities &operator=(const OptionsProbabilities\
  \ &p);\nvoid setNumIterations(int n);\ndouble probFinishAboveStrike();\ndouble probFinishBelowStrike();\n\
  double probFinalPriceBetweenPrices(double lowPrice, double highPrice);\nstd::vector\
  \ getWalk();\nprivate:\ndouble m_initialPrice;\ndouble m_strike;\ndouble m_avgStep;\n\
  int m_numDays;\nint m_numIterations;\ndouble gaussianValue(double mean, double sigma);\n\
  double getLastPriceOfWalk();\n};\n#endif /* defined(__FinancialSamples__OptionsProbabilities__)\
  \ */\n//\n// OptionProbabilityExportedFunctions.cpp\n#include \"OptionsProbabilities.h\"\
  \nextern \"C\" double __declspec(dllexport) optionProbFinishAboveStrike(double initialPrice,\n\
  double strike, double avgStep, int nDays) {\nOptionsProbabilities optP(initialPrice,\
  \ strike, avgStep, nDays);\nreturn optP.probFinishAboveStrike();\n}\nextern \"C\"\
  \ double __declspec(dllexport) optionProbFinishBelowStrike(double initialPrice,\n\
  double strike, double avgStep, int nDays) {\nOptionsProbabilities optP(initialPrice,\
  \ strike, avgStep, nDays);\nreturn optP.probFinishBelowStrike();\n}\nextern \"C\"\
  \ double __declspec(dllexport) optionProbFinishBetweenPrices(double initialPrice,\n\
  double strike, double avgStep, int nDays, double lowPrice, double highPrice) {\n\
  OptionsProbabilities optP(initialPrice, strike, avgStep, nDays);\nreturn optP.probFinalPriceBetweenPrices(lowPrice,\
  \ highPrice);\n}\n;;\n;; file  optionProbabilities.l\n;;\n(lisp:clines \"\nstatic\
  \ double (*optionProbFinishAboveStrike_)(double,double,double,int) = NULL;\nstatic\
  \ double (*optionProbFinishBelowStrike_)(double,double,double,int) = NULL;\nstatic\
  \ double (*optionProbFinishBetweenPrices_)(double,double,double,int,double,double)\
  \ = NULL;\n__declspec (dllimport) void *__stdcall LoadLibraryA(const char *);\n\
  void *__stdcall GetProcAddress(void *,const char *);\n__declspec (dllimport) unsigned\
  \ int __stdcall GetLastError(void);\nstatic int libraryLoaded = 0;\nstatic const\
  \ char *libName = \\\"optprob.dll\\\";\nstatic int loadLibrary() {\nvoid *lib =\
  \ LoadLibraryA(libName);\nif (!lib) return 0;\noptionProbFinishAboveStrike_ = GetProcAddress(lib,\
  \ \\\"optionProbFinishAboveStrike\\\");\noptionProbFinishBelowStrike_ = GetProcAddress(lib,\
  \ \\\"optionProbFinishBellowStrike\\\");\noptionProbFinishBetweenPrices_ = GetProcAddress(lib,\
  \ \\\"optionProbFinishBetweenPrices\\\");\nlibraryLoaded = 1;\nreturn 1;\n}\ndouble\
  \ l_optionProbFinishAboveStrike(double a,double b,double c,int d) {\nif (!libraryLoaded\
  \ && !loadLibrary()) return -1; /* error code */\nif (!optionProbFinishAboveStrike_)\
  \ return -2;\nreturn optionProbFinishAboveStrike_(a, b, c, d);\n}\ndouble l_optionProbFinishBelowStrike(double\
  \ a,double b,double c,int d) {\nif (!libraryLoaded && !loadLibrary()) return -1;\
  \ /* error code */\nreturn optionProbFinishAboveStrike_(a, b, c, d);\n}\ndouble\
  \ l_optionProbFinishBetweenPrices(double a,double b,double c,int d,double e,double\
  \ f) {\nif (!libraryLoaded && !loadLibrary()) return -1; /* error code */\nreturn\
  \ optionProbFinishBetweenPrices_(a, b, c, d, e, f);\n}\n\")\n(lisp:defentry $optionProbFinishAboveStrike\
  \  (lisp:double lisp:double lisp:double lisp:int)\n(lisp:double \"l_optionProbFinishAboveStrike\"\
  ))\n(lisp:defentry $optionProbFinishBelowStrike (lisp:double lisp:double lisp:double\
  \ lisp:int)\n(lisp:double \"l_optionProbFinishBelowStrike\"))\n(lisp:defentry $optionProbFinishBetweenPrices(lisp:double\
  \ lisp:double lisp:double lisp:int lisp:double lisp:double)\n(lisp:double \"l_optionProbFinishBetweenPrices\"\
  ))\n```\n**列表 16-2** 类 `OptionsProbabilities` 及关联的 Maxima 代码\n\n### 运行代码\n\n创建好列表\
  \ 16-2 中描述的代码后，下一步是使用 Maxima CAS 构建并运行它。首先，需要使用 MingW gcc 编译器创建 dll。以下是我使用的命令行（你可能需要根据系统库路径进行调整）。\n\
