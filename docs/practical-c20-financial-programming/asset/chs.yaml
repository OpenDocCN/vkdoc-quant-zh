  \ (const TrapezoidIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n\
  {\n}\nTrapezoidIntegration::~TrapezoidIntegration()\n{\n}\nTrapezoidIntegration\
  \ &TrapezoidIntegration::operator=(const TrapezoidIntegration &p)\n{\nif (this !=\
  \ &p)\n{\nm_f = p.m_f;\nm_numIntervals = p.m_numIntervals;\n}\nreturn *this;\n}\n\
  void TrapezoidIntegration::setNumIntervals(int n)\n{\nm_numIntervals = n;\n}\ndouble\
  \ TrapezoidIntegration::getIntegral(double a, double b)\n{\ndouble S = 0;\ndouble\
  \ intSize = (b - a)/m_numIntervals;\ndouble x = a;\nfor (int i=0; i\n{\npublic:\n\
  ~F2();\ndouble operator()(double x);\n};\nF2::~F2()\n{\n}\ndouble F2::operator()(double\
  \ x)\n{\nreturn sin(x);\n}\n}\nint main()\n{\nF2 f;\nTrapezoidIntegration ti(f);\n\
  double integral = ti.getIntegral(0.5, 2.5);\ncout << \" the integral of the function\
  \ is \" << integral << endl;\nti.setNumIntervals(200);\nintegral = ti.getIntegral(0.5,\
  \ 2.5);\ncout << \" the integral of the function with 200 intervals is \" << integral\
  \ << endl;\nreturn 0;\n}\n```\n\n**代码清单 10-2** 梯形积分法\n\n### 运行代码\n\n您可以使用符合标准的编译器（如\
  \ gcc、Visual Studio 或 llvm）编译代码清单 10-2 中的代码。编译代码后，您可以运行生成的应用程序来测试结果。以下是程序执行的一个示例：\n\
  \n```\n./trapezoidMethod\nthe integral of the function is 1.67867\nthe integral\
  \ of the function with 200 intervals is 1.67871\n```\n\n\n\n该程序展示了 `sin(x)` 在区间\
  \ 1/2 到 5/2 上的积分值。该近似值给出了两种不同子区间数设置下的结果。第一个结果是 100 个子区间的结果。第二个结果展示了子区间数量加倍后达到的近似值。与之前的示例一样，可以通过增加子区间数量来控制近似质量。此外，如果你希望更快获得结果，也可以减少该数量。\n\
  \n## 使用辛普森方法\n\n实现用于定积分计算的辛普森方法。\n\n### 解决方案\n\n你已经看到了两种计算给定连续函数定积分值的常用方法。第三种方法，即辛普森方法，将在本编程示例中介绍。与任何数值积分技术一样，其总体思路是创建一个近似于目标函数的第二个函数，并将其应用于原始定义域的多个子区间，直到获得良好的近似值。\n\
  \n与前两种使用线性逼近给定函数的方法不同，辛普森方法采用二阶多项式来实现更好的收敛性。通过这种方式，辛普森方法提出的近似值不依赖线性函数来获得期望结果，而是更好地适应原始曲线的行为。\n\
  \n辛普森方法的工作原理可以通过一个示例轻松理解。假设你想要对上一节中使用的函数 `f(x) = sin x` 进行积分。作为一个三角函数，它没有简单的有限多项式表示。然而，如果你将搜索范围限制在函数的一小部分，就可以找到非常好的近似表示。\n\
  \n例如，我在图 10-6 中展示了如何使用二阶多项式函数来近似 `sin x` 在区间 1/2 到 5/2 上的值。请注意，这两条曲线仅在给定区间内的较小范围内具有足够的相似性，而在该区间之外，这两个函数的变化差异很大。\n\
  \n![../images/323908_2_En_10_Chapter/323908_2_En_10_Fig6_HTML.jpg](img/323908_2_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** 使用二阶多项式近似区间 1/2 到 5/2 上的 `f(x)=sin x` 值\n\n同样的思想也用于辛普森方法。由于二次逼近可能与目标函数非常接近，因此使用二次函数可以显著提高以此方式计算出的定积分值。事实上，实验表明，辛普森方法比中点法和梯形法等算法具有更好的精度。\n\
  \n**注意**\n\n辛普森方法更高的精度可以减少计算定积分所需的子区间数量。然而，由于需要使用二次逼近而非简单的线性函数，每次迭代的计算量会更大。最终，虽然辛普森方法对大多数函数都能产生更优的结果，但用户需要意识到每次迭代的计算时间可能存在权衡。\n\
  \n辛普森方法中使用的二阶多项式由以下方程定义，可直接用于实现所提规则：\n\n![$$ \\frac{b-a}{6}\\left[f(a)+4f\\left(\\\
  frac{a+b}{2}\\right)+f(b)\\right] $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_Equa.png)\n\
  \n因此，可以将通用算法总结如下：\n\n1.  定义一个范围 `(A, B)`，用于计算该方程的积分。\n2.  将初始范围细分为 `N` 个等长子区间。\n\
  3.  将积分值 `S` 初始化为零。\n4.  对于每个子区间 `(a, b)`，执行以下操作：\n    1.  获取 `a` 和 `b` 的值。\n  \
  \  2.  根据以下方程确定区间 `(a, b)` 上的积分近似值：\n\n        ![$$ m\\left(a,b\\right)=\\frac{b-a}{6}\\\
  left[f(a)+4f\\left(\\frac{a+b}{2}\\right)+f(b)\\right] $$](images/323908_2_En_10_Chapter/323908_2_En_10_Chapter_TeX_IEq15.png)\n\
  \n    3.  将 `m(a, b)` 累加到积分值中。\n\n该算法已作为 `SimpsonsIntegration` 类的一部分实现。\n\n### 完整代码\n\
  \n你可以在代码清单 10-3 中找到辛普森方法的完整实现。其中提供的实现在后续的 `main` 函数中使用。\n\n```\n//\n//  SimpsonsIntegration.h\n\
  #ifndef __FinancialSamples__SimpsonsIntegration__\n#define __FinancialSamples__SimpsonsIntegration__\n\
  template \nclass MathFunction;\nclass SimpsonsIntegration {\npublic:\nSimpsonsIntegration(MathFunction\
  \ &f);\nSimpsonsIntegration(const SimpsonsIntegration &p);\n~SimpsonsIntegration();\n\
  SimpsonsIntegration &operator=(const SimpsonsIntegration &p);\ndouble getIntegral(double\
  \ a, double b);\nvoid setNumIntervals(int n);\nprivate:\nMathFunction &m_f;\nint\
  \ m_numIntervals;\n};\n#endif /* defined(__FinancialSamples__SimpsonsIntegration__)\
  \ */\n//\n//  SimpsonsIntegration.cpp\n#include \"SimpsonsIntegration.h\"\n#include\
  \ \"MathFunction.h\"\n#include \n#include \nusing std::cout;\nusing std::endl;\n\
  namespace  {\nconst int DEFAULT_NUM_INTERVALS = 100;\n}\nSimpsonsIntegration::SimpsonsIntegration(MathFunction\
  \ &f)\n: m_f(f),\nm_numIntervals(DEFAULT_NUM_INTERVALS)\n{\n}\nSimpsonsIntegration::SimpsonsIntegration(const\
  \ SimpsonsIntegration &p)\n: m_f(p.m_f),\nm_numIntervals(p.m_numIntervals)\n{\n\
  }\nSimpsonsIntegration::~SimpsonsIntegration()\n{\n}\nSimpsonsIntegration &SimpsonsIntegration::operator=(const\
  \ SimpsonsIntegration &p)\n{\nif (this != &p)\n{\nm_f = p.m_f;\nm_numIntervals =\
  \ p.m_numIntervals;\n}\nreturn *this;\n}\ndouble SimpsonsIntegration::getIntegral(double\
  \ a, double b)\n{\ndouble S = 0;\ndouble intSize = (b - a)/m_numIntervals;\ndouble\
  \ x = a;\nfor (int i=0; i\n{\npublic:\n~F2();\ndouble operator()(double x);\n};\n\
  F2::~F2()\n{\n}\ndouble F2::operator()(double x)\n{\nreturn sin(x);\n}\n}\nint main()\n\
  {\nF2 f;\nSimpsonsIntegration si(f);\ndouble integral = si.getIntegral(0.5, 2.5);\n\
  cout << \" the integral of the function is \" << integral << endl;\nsi.setNumIntervals(200);\n\
  integral = si.getIntegral(0.5, 2.5);\ncout << \" the integral of the function with\
  \ 200 intervals is \" << integral << endl;\nreturn 0;\n}\n```\n\n**代码清单 10-3** 辛普森积分方法的代码\n\
  \n### 运行代码\n\n代码清单 10-3 中的代码使用函数 `f(x) = sin x` 进行了测试。使用的编译器是 Mac OS X 和 Windows\
  \ 上的 gcc。该程序在两个平台上进行了测试，生成了相同的结果。\n\n编译 `SimpsonsIntegration` 类后，你可以运行应用程序并观察到类似如下的输出：\n\
  \n```\n./simpsonsIntegration\nthe integral of the function is 1.67873\nthe integral\
  \ of the function with 200 intervals is 1.67873\n```\n\n从这些结果中可以看出，100 个区间解的精度与\
  \ 200 个区间的精度相似。这表明，对于该技术，100 个分区已足以获得非常好的结果。\n\n\n\n### 结论\n\n积分是计算数学中的基本任务之一，因为积分（也称为反导数）作为微积分的基础领域具有重要意义。在金融算法的开发中，也有许多场景需要快速求解涉及定积分计算的问题。\n\
  \n在本章中，你学习了一些探索数值积分最常用技术的 C++ 编程示例。你了解了梯形法、辛普森法则等积分方法如何应用于求取某些预设函数曲线下面积的任务。\n\n\
  梯形法是用于计算定积分的第二种重要算法。对于某个一般函数，该方法使用区间端点处的函数值来定义基于梯形的几何近似。你通过一些示例了解了这一策略的工作原理，以及实现该法则的可运行代码。\n\
  \n我还讨论了著名的定积分辛普森法则。该方法使用二次方程对曲线进行近似。你看到了如何利用多项式方程实现所需精度的示例。使用辛普森法则，即使可能需要更少的子区间就能达到该精度，你也能获得近似度很高的积分结果。\n\
  \n偏微分方程是金融软件开发者另一个重要的数学工具。理解其工作原理，并拥有基于偏微分方程求解的工具至关重要。在下一章中，我将讨论一些与偏微分方程相关的重要技术及其在\
  \ C++ 中的实现。\n\n"
- "# 11. 求解常微分方程和偏微分方程\n\n常微分方程和偏微分方程的求解是许多金融市场分析技术的核心。重要的衍生品估值分析工具，例如用于股票期权及其他衍生品的布莱克-舒尔斯模型，可以直接表示为微分方程。这些方程需要定期求解，以确定在全球市场上交易的金融工具的价格。这就催生了对能够高效求解这些数学模型的高性能代码的需求。\n\
  \n由于常微分方程和偏微分方程在科学、工程和金融领域的大量应用，人们已经发展出多种求解方法。除了能够分析和求解微分方程的精确数学方法外，软件工程师还必须处理纯计算的方法，以及它们在\
  \ C++ 中的实现。\n\n金融领域感兴趣的微分方程示例包括：\n\n*   蒂勒微分方程：用于确定人寿保险合同的公平价格\n*   布莱克-舒尔斯微分方程：用于对期权及相关衍生品进行定价\n\
  *   市场准备金微分方程\n*   投资组合优化的动态变体\n*   默顿效用优化方程\n*   以及这些微分方程的多种变体\n\n由于微分方程在金融问题中的应用领域如此广泛，在本章中我只能简要介绍最常用于求解这些方程的方法。\n\
  \n本章讨论的编程示例涵盖了常微分方程和偏微分方程建模与应用的几个特定方面。你将探索的主题包括：\n\n*   欧拉法求解常微分方程：一种易于实现的算法，可直接应用于任何一阶常微分方程。\n\
  *   龙格-库塔法：作为欧拉算法总体思路的改进，龙格-库塔法为常微分方程的求解提供了更好的稳定性和精度。\n*   布莱克-舒尔斯方程：对布莱克-舒尔斯偏微分方程的一般性讨论，以及求解该模型的前向方法概述。\n\
  \n### 求解常微分方程\n\n在本节中，我们将创建一个使用欧拉法求解常微分方程的类。\n\n### 解决方案\n\n我通过介绍一些求解常微分方程的数值方法来开始对微分方程的讨论。然而，在开始第一个示例之前，让我们回顾一下关于常微分方程的一些相关事实。\n\
  \n常微分方程是指在其一个或多个项中包含单个变量的变化率（导数）的方程。给定一个微分方程，其*阶数*定义为该方程中任何导数的最高阶数。以下是常微分方程的几个示例：\n\
  \n`x³ * d²y/dx² + x * dy/dx + y = x⁵`\n\n`x * dy/dx + 4x² = y`\n\n这两个方程都涉及变量 *y*\
  \ 关于 *x* 的导数。在第一个方程中，导数应用了两次，得到项 `d²y/dx²`，这意味着它是一个二阶常微分方程。第二个方程仅包含关于 *x* 的一阶导数，使其成为一个一阶常微分方程。\n\
  \n标准方程（不涉及导数的方程）通常有可以表示为单个数值的解。然而，常微分方程包含导数，因此它们的解更适合描述为一个或多个函数，这些函数共同满足由导数所隐含的条件。例如，下面这个著名的微分方程描述了牛顿的万有引力定律：\n\
  \n`m * d²x/dt² = -mg`\n\n\n好的，作为一名高级文档工程师和翻译员，我已按照您的格式要求将给定文本翻译成中文。\n\n\n\n此类方程的解是一个通用函数，用于描述物体的速度和加速度。要找到特定问题的数值解，你需要提供一个或多个初始条件，将这些条件代入通解后，就能得出给定方程中`x`的显式值。\n\
  \n从前面的例子可以看出，数值求解常微分方程 (ODE) 需要处理可代入通解的初始条件。因此，求解 ODE（以及偏微分方程 PDE）的数值方法要求预先确定初始条件，这是找到其数值解的前提。\n\
  \n求解微分方程主要有两种方法。第一种是基于**符号方法**的解法。这类方法使用代数技巧，包括已知的微分和积分规则，来简化并推导出微分方程的闭式解。符号方法可以手动进行，也可以通过计算机完成，并且存在一类专门为此类符号运算而创建的软件。主要例子包括`Mathematica`、`Maple`和`Maxima`等。\n\
  \n虽然符号方法在求解某些类型的 ODE 和 PDE 时非常有用，但许多微分方程过于复杂，无法通过符号运算得到闭式解。此外，此类符号技术非常专业，通常仅在建模和探索阶段使用，即工程师或数学家正在基于微分方程创建模型时。出于这些原因，符号技术大多局限于专业软件包，而不是作为通用编程语言的库来使用。\n\
  \n求解微分方程的第二类技术基于**数值算法**。这些算法更具通用性，只要能满足一些基本要求，就可以应用于任何微分方程。此外，许多常见的微分方程没有已知的闭式解，在这种情况下，数值方法是唯一可用的方法。由于\
  \ ODE 和 PDE 的数值方法可以使用标准编程技术实现，它们通常作为数学库的一部分，用于`FORTRAN`和`C++`等编程语言。\n\n## 欧拉方法\n\
  \n你将学习的第一个 ODE 数值算法是一种简单的技术，称为欧拉方法。它基于在预定步长处对目标 ODE 进行连续求值。从给定的初始条件开始，欧拉方法尝试通过应用在预定区间上的近似公式，来找到微分方程的下一个值。\n\
  \n欧拉方法的思想是在从给定初始条件开始评估 ODE 时，纠正可能出现的错误。例如，假设你想在目标点`c`处评估一个 ODE，从初始条件`x[0]`开始。为简化论证，假设`x[0]\
  \ ≤ c`，尽管同样的想法在相反方向上也成立。为了求解 ODE，该算法的思想是分`N`步进行评估，其中`N`是一个给定的参数。因此，步长由下式给出：\n\n\
  ![$$ h=\\frac{c-{x}_0}{N}. $$](img/323908_2_En_11_Chapter_TeX_Equd.png)\n\n假设微分方程可以表示为以下一般形式的**一阶\
  \ ODE**：`y’ = f(x, y)`。同时，初始条件`(x[0], y[0])`是已知的。\n\n一般而言，在每一步（由值`h`给出），欧拉算法将尝试确定该小步长处\
  \ ODE 解的精确值。然而，最大的问题在于微分方程的解并不是以显式方式已知的，因此算法必须猜测每一步的特定值。由于步长是一个小区间，一种可能的猜测函数值的方法是使用一条直线来近似它。如果我们将`y[t]`称为在步骤`t`上的函数值，那么这导致了对`y[t]`的如下近似：\n\
  \n![$$ {y}_t={y}_{t-1}+h\\frac{f\\left({x}_{t-1},{y}_{t-1}\\right)+f\\left({x}_{t-1}+h,y+\
  \ hf\\left({x}_{t-1},{y}_{t-1}\\right)\\right)}{2} $$](img/323908_2_En_11_Chapter_TeX_Eque.png)\n\
  \n换句话说，算法取前一点和后一点之间线性近似的平均值，作为`y[t–1]`和`y[t]`之间小增量的下一个近似值。欧拉算法是所谓的**预测-校正算法**的一个简单示例。此类方法首先预测函数在下一次迭代中可能的位置（本例中使用线性近似），然后通过取平均值来校正此预测。相同的策略在许多其他算法中重复使用，尽管通常采用更复杂的近似方案。\n\
  \n使用欧拉方法时最大的问题之一是控制结果中的误差。如你所见，欧拉方法的步长是其实现中的输入参数之一，它指示了我们想要更新微分方程结果的频率。在此评估过程中，我们采取的步骤粒度越细，得到的结果就越接近真实函数。另一方面，当我们增加\
  \ ODE 评估的步数时，会出现两个问题。首先，由于所需的额外计算，运行时间会增加。其次，也是更令人担忧的一点是，增加步数可能会增加在计算机上进行计算时不可避免的数值误差。解决这些精度问题导致了其他方法的发展，你将在下一节中看到。\n\
  \n### 完整代码\n\n上一节中描述的欧拉方法实现在`EulersMethod`类中，如清单 11-1 所示。此类中的重要方法是`solve()`，它接收步数、初始值`x[0]`和`y[0]`以及目标点`c`作为参数。\n\
  \n\n\n\n```\n//\n//  EulersMethod.h\n#ifndef __FinancialSamples__EulersMethod__\n\
