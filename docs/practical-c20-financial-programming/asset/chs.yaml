  std::cout << \"standard deviation is \" <<  vc.stdDev()  << std::endl;\nreturn 0;\n\
  }\n```\n\n清单 2-2 `VolatilityCalculator.h`\n\n### 运行代码\n\n以下是使用该波动性类的一个示例。你可以编译清单\
  \ 2-2 中提供的代码，假设生成的可执行文件名为 `volatility`。然后，通过输入价格值来使用该程序，这些价格值将用于后续通过所描述的三种方法计算波动性。输入序列的结束由输入的最后一个值\
  \ -1 来确定。\n\n```\n$ ./volatility\n\n3.5\n\n4.48\n5.2\n\n6.1\n5.5\n5.2\n5.7\n\nrange\
  \ volatility is 3.1\naverage daily range is 0.7\nstandard deviation is 1.02957\n\
  ```\n\n## 计算工具相关性\n\n### 问题\n\n给定过去 N 个周期内一系列收盘价，计算两种权益工具之间的相关性。\n\n\n\n### 解决方案\n\
  \n资金管理者需要解决的主要问题之一是如何分散投资组合。分散投资问题的产生，是因为在市场投资时，并不希望将所有资产都集中于同一类投资中。相关性强的投资往往会在同一时间下跌，这使得投资组合更难避免损失。\n\
  \n例如，考虑两家业务相似的公司。经典案例是可口可乐和百事可乐这样的饮料公司。由于业务相似，它们的股价往往同时涨跌。因此，我们说它们具有高度相关性。相关性是一个为分析统计事件而开发的数学概念。由于概率在股票型投资的评估和建模中扮演着重要角色，它成为了股票市场中的一个重要概念。\n\
  \n为了使此示例的代码更具可扩展性，我们将解决方案划分为两个类。第一个类名为 `TimeSeries`，它代表一个常用概念：一组在特定时间段内适用于某个数量的数值。这个概念通常被称为时间序列。`TimeSeries`\
  \ 类负责计算单条时间序列特有的数值，例如平均值或标准差。\n\n第二个类名为 `CorrelationCalculator`，负责收集目标时间序列的数据，并使用以下公式计算相关性：\n\
  \n![$$ \\frac{1}{N-1}\\frac{\\sum \\left({x}_i-\\overline{x}\\right)\\left({y}_i-\\\
  overline{y}\\right)}{\\sigma_x{\\sigma}_y} $$](img/323908_2_En_2_Chapter_TeX_Equc.png)\n\
  \n在这个公式中，N 是观测值的数量，*x*[*i*] 是第一个时间序列的第 i 个观测值，*y*[*i*] 是第二个时间序列的第 i 个观测值，![$$ \\\
  overline{x} $$](img/323908_2_En_2_Chapter_TeX_IEq1.png) 和 ![$$ \\overline{y} $$](img/323908_2_En_2_Chapter_TeX_IEq2.png)\
  \ 是两个价格序列的均值（平均值），*s*[*x*] 是 x 值的标准差，*s*[*y*] 是 y 值的标准差。\n\n平均值和标准差在 `TimeSeries`\
  \ 类中计算。这些值随后会被 `CorrelationCalculator` 用来确定两个序列观测值之间的相关性。\n\n### 完整代码\n\n上一节讨论的计算在\
  \ `TimeSeries` 类中实现。清单 2-3 包含了该类的完整代码。您还可以看到如 `CorrelationCalculator` 类中所示，如何使用相关技术来计算相关性。\n\
  \n```\n//\n//  TimeSeries.h\n#ifndef __FinancialSamples__TimeSeries__\n#define __FinancialSamples__TimeSeries__\n\
