  m_epsGrowth(0),\nm_netIncome(0),\nm_shareholdersEquity(0)\n{\n}\nFundamentalsCalculator::FundamentalsCalculator(const\
  \ FundamentalsCalculator &v) :\nm_ticker(v.m_ticker),\nm_price(v.m_price),\nm_dividend(v.m_dividend),\n\
  m_earningsEstimate(v.m_earningsEstimate),\nm_numShares(v.m_numShares),\nm_bookValue(v.m_bookValue),\n\
  m_assets(v.m_assets),\nm_liabilitiesAndIntangibles(v.m_liabilitiesAndIntangibles),\n\
  m_epsGrowth(v.m_epsGrowth),\nm_netIncome(v.m_netIncome),\nm_shareholdersEquity(v.m_shareholdersEquity)\n\
  {\n}\nFundamentalsCalculator::~FundamentalsCalculator()\n{\n}\nFundamentalsCalculator\
  \ &FundamentalsCalculator::operator=(const FundamentalsCalculator &v)\n{\nif (this\
  \ != &v)\n{\nm_ticker = v.m_ticker;\nm_price = v.m_price;\nm_dividend = v.m_dividend;\n\
  m_earningsEstimate = v.m_earningsEstimate;\nm_numShares = v.m_numShares;\nm_bookValue\
  \ = v.m_bookValue;\nm_assets = v.m_assets;\nm_liabilitiesAndIntangibles = v.m_liabilitiesAndIntangibles;\n\
  m_epsGrowth = v.m_epsGrowth;\nm_netIncome = v.m_netIncome;\nm_shareholdersEquity\
  \ = v.m_shareholdersEquity;\n}\nreturn *this;\n}\ndouble FundamentalsCalculator::PE()\n\
  {\nreturn (m_price * m_numShares)/ m_earnings;\n}\ndouble FundamentalsCalculator::forwardPE()\n\
  {\nreturn (m_price * m_numShares)/ m_earningsEstimate;\n}\ndouble FundamentalsCalculator::returnOnEquity()\n\
  {\nreturn m_netIncome / m_shareholdersEquity;\n}\ndouble FundamentalsCalculator::getDividend()\n\
  {\nreturn m_dividend;\n}\ndouble FundamentalsCalculator::bookValue()\n{\nreturn\
  \ m_bookValue;\n}\ndouble FundamentalsCalculator::priceToBookRatio()\n{\nreturn\
  \ (m_price * m_numShares) / (m_assets - m_liabilitiesAndIntangibles);\n}\ndouble\
  \ FundamentalsCalculator::priceEarningsToGrowth()\n{\nreturn PE()/ m_epsGrowth;\n\
  }\nvoid FundamentalsCalculator::setNumOfShares(int n)\n{\nm_numShares = n;\n}\n\
  void FundamentalsCalculator::setEarnings(double val)\n{\nm_earnings = val;\n}\n\
  void FundamentalsCalculator::setExpectedEarnings(double val)\n{\nm_earningsEstimate\
  \ = val;\n}\nvoid FundamentalsCalculator::setBookValue(double val)\n{\nm_bookValue\
  \ = val;\n}\nvoid FundamentalsCalculator::setEpsGrowth(double val)\n{\nm_epsGrowth\
  \ = val;\n}\nvoid FundamentalsCalculator::setNetIncome(double val)\n{\nm_netIncome\
  \ = val;\n}\nvoid FundamentalsCalculator::setShareHoldersEquity(double val)\n{\n\
  m_shareholdersEquity = val;\n}\nvoid FundamentalsCalculator::setLiabilitiesAndIntangibles(double\
  \ val)\n{\nm_liabilitiesAndIntangibles = val;\n}\nvoid FundamentalsCalculator::setAssets(double\
  \ val)\n{\nm_assets = val;\n}\n//\n//  main.cpp\n#include \"FundamentalsCalc.h\"\
  \n#include \n// the main function receives parameters passed to the program\n//\
  \ and uses class FundamentalsCalculator\nint main(int argc, const char * argv[])\n\
  {\nFundamentalsCalculator fc(\"AAPL\", 543.99, 12.20);\n// values are in millions\n\
  fc.setAssets(243139);\nfc.setBookValue(165234);\nfc.setEarnings(35885);\nfc.setEpsGrowth(0.22);\n\
  fc.setExpectedEarnings(39435);\nfc.setLiabilitiesAndIntangibles(124642);\nfc.setNetIncome(37235);\n\
  fc.setNumOfShares(891990);\nfc.setShareHoldersEquity(123549);\nstd::cout << \"P/E:\
  \ \" <<  fc.PE()/1000  << std::endl;  // prices in thousands\nstd::cout << \"forward\
  \ P/E: \" <<  fc.forwardPE()/1000  << std::endl;\nstd::cout << \"book value: \"\
  \ <<  fc.bookValue()  << std::endl;\nstd::cout << \"price to book: \" <<  fc.priceToBookRatio()\
  \  << std::endl;\nstd::cout << \"price earnings to growth: \" <<  fc.priceEarningsToGrowth()\
  \  << std::endl;\nstd::cout << \"return on equity: \" <<  fc.returnOnEquity()  <<\
  \ std::endl;\nstd::cout << \"dividend: \" <<  fc.getDividend()  << std::endl;\n\
  return 0;\n}\n清单 2-4\nFundamentalsCalc.h\n```\n\n### 运行代码\n\n您可以编译清单 2-4 中展示的代码以及\
  \ `main` 函数中包含的相应测试。结果将显示如下：\n\n```\n$ ./fundamentalind\nP/E: 13.5219\nforward P/E:\
  \ 12.3046\nbook value: 165234\nprice to book: 4094.9\nprice earnings to growth:\
  \ 61463.2\nreturn on equity: 0.301378\ndividend: 12.2\n```\n\n### 结论\n\n在本章中，我概述了股票市场中的问题与机遇。如您所见，作为金融体系的重要组成部分，股票交易是一个在分析与交易执行各个阶段都存在计算问题的领域。\n\
  \n本章首先对股票市场进行了简短介绍，描述了主要参与者和交易过程中使用的金融工具。在第一节中，您学习了如何使用 C++ 计算移动平均线。移动平均线被广泛用于发现股票价格的趋势。在同一节中，我讨论了如何计算\
  \ EMA（指数移动平均线），其中最近的价格被赋予更大的权重。EMA 对价格的最新变化反应更灵敏，在某些算法中，这可能是一种更好的做出买入或卖出决策的方法。\n\
  \n接下来，我展示了一些用于计算股票工具波动性的代码。在决定投资组合中应持有哪些工具时，波动性的概念至关重要。计算波动性的方法包括使用简单的观察范围以及概率性的波动性度量（也称为标准差）。\n\
  \n在本章中，您还学习了如何计算两只股票之间的相关性，以根据其观察价格判断是否存在正相关、负相关或无相关。最后，本章介绍了对一只股票持仓的基本面数据进行建模和计算的技术。这样的\
  \ C++ 类易于创建，但在分析特定股票需要基本面数据时也非常有用。您可以根据需要修改此示例以添加新的基本面指标，从而在金融应用程序的其他区域复用现有代码。\n\
  \n在下一章中，您将了解更多在金融软件创建中常用的 C++ 特性。您将看到金融行业开发者可以轻松使用的多种技术。这些 C++ 特性能够提升大部分为投资分析所创建的代码的性能、健壮性和灵活性。\n\
  \n\n\n"
- "# 金融领域的 C++ 编程技术\n\n`C++` 语言是作为 `C` 语言的扩展而设计的，这意味着大多数用 `C` 语言编写的程序同样也是有效的 `C++`\
  \ 程序。然而，经验丰富的程序员通常会利用 `C++` 独有的一组高级特性来控制程序的复杂度，其中包含了 `C++20` 标准中引入的特性。这对于金融软件开发尤为重要，因为我们希望创建快速且表达力强的应用程序。\n\
  \n在本章中，我们将探讨一些金融程序员多年来用于编写更优 `C++` 代码的基本技术，这些技术能让他们事半功倍。这些技术是从 `C++` 提供的众多特性中精选出来的，它们在提升代码质量和表达力方面效果显著。这些特性包括：\n\
  \n-   `模板`：一种允许创建通用软件的特性，其类和函数可以应用于一组可能不相关的类型，只要这些类型满足特定操作所需的要求集。\n-   `共享指针`：一种减少直接操作指针需求的编程技术。使用共享指针，你可以避免\
  \ `C++` 程序在管理内存和其他资源时固有的大量错误来源。\n-   `运算符重载`：通过重载，你可以将语言中已有的标准运算符应用于你自己的类和结构体。\n\
  -   `C++20 特性`：`C++` 标准的最新迭代引入了许多新特性，有助于控制程序的复杂度。这些特性，包括共享指针和自动类型检测，可以轻松用于金融软件的创建。\n\
  \n在接下来的章节中，你将看到一些精选的编程示例，这些示例在金融应用的背景下探索了部分 `C++` 特性。\n\n## 计算投资工具的利率\n\n利率是固定收益投资者的一个基本概念。设计一个\
  \ `C++` 解决方案，给定一个提供诸如 `getMonthlyPayment` 和 `getPrincipal` 等方法的通用工具类，使其能够返回年利率。\n\
  \n### 解决方案\n\n上述问题在设计利率计算引擎时很常见。你可以使用多种策略（如类层次结构）来创建解决方案，但出于性能和设计考虑，使用模板是组合来自代表投资工具的不相关类的利率数据最合适的方法。\n\
  \n`模板`是一种机制，配合特殊的语法，用于创建能处理不同底层数据类型的代码。使用模板，可以创建能够用相同代码支持不同类型的函数、成员函数和类。基于模板的编程技术生成的代码被称为通用代码，因为它可以用于不同类型（既可以是诸如\
  \ `int` 或 `double` 这样的基础类型，也可以是用户定义的类和结构体）。通用函数和类型通过尖括号中的目标类型名称来实例化，这指示了所需函数或类型的特定版本。在最新的标准修订版中，通用函数也可以使用自动参数推导来定义。\n\
  \n创建和使用通用代码之所以成为可能，是因为当编译器遇到模板时，它不会立即生成代码。相反，代码只会在模板对象或函数被实例化的地方生成。当这种情况发生时，编译器会检测表达式中涉及的类型，然后模板被实例化。只有在此时，传统的编译步骤（如语法分析和代码生成）才会在实例化后的代码上执行，任何由此产生的错误都会被检测到并报告给程序员。\n\
  \n为了解决利率计算问题，你可以使用模板来实现一个名为 `IntRateEngine` 的利率引擎类。这个类的定义方式使其可以应用于任何实现了 `getMonthlyPayment`\
  \ 和 `getPrincipal` 方法的类。我包含了两个实现了这些方法的示例类：`BondInstrument` 类和 `MortgageInstrument`\
  \ 类。然而，使用模板的一大优势在于，你不需要让这些类派生自某个特定的基类。你可以使用任何提供了相同方法的类，编译器会完成组合这些类的艰巨工作。这意味着投资工具和利率计算引擎之间没有耦合。事实上，如果你查看\
  \ `IntRateEngine` 的文件，不会找到任何对投资工具类的引用。\n\n以下是 `BondInstrument` 类相关部分的快速浏览。\n\n```\n\
  class BondInstrument {\npublic:\ndouble getMonthlyPayment();\ndouble getPrincipal();\n\
  // 此处为其他方法...\n};\n```\n\n使用这个类，我们可以实例化计算年利率的模板。执行计算的模板类定义如下：\n\n```\ntemplate\n\
  class IntRateEngine {\npublic:\nvoid setInstrument(T &inv);\ndouble getAnnualIntRate();\n\
  // 此处为其他方法...\nprivate:\nT m_instrument;\n};\n```\n\n请注意，工具的类型被留空，作为类型参数 `T`。这种参数化允许不同的类与同一个模板一起使用。同样地，你可以看到\
  \ `getAnnualIntRate` 方法的实现。\n\n```\ntemplate\ndouble IntRateEngine::getAnnualIntRate()\n\
  {\ndouble payment = m_instrument.getMonthlyPayment();\ndouble principal = m_instrument.getPrincipal();\n\
  return (12 * payment) / principal;\n}\n```\n\n请注意，该方法仅要求参数 `T` 提供 `getMonthlyPayment`\
  \ 和 `getPrincipal` 方法。任何支持这两个方法的类型都可以被 `IntRateEngine` 无障碍地使用。\n\n### 完整代码\n\n前面描述的算法已在\
  \ `BondInstrument`、`MortgageInstrument` 和 `IntRateEngine` 类中实现，如代码清单 `[3-1]` 所示。\n\
  \n\n\n```cpp\n//\n//  InvestmentInstrument.h\n#ifndef __FinancialSamples__InvestmentInstrument__\n\
  #define __FinancialSamples__InvestmentInstrument__\n#include \nclass BondInstrument\
  \ {\npublic:\nBondInstrument(double principal, double monthlyPayment);\n~BondInstrument();\n\
  BondInstrument(const BondInstrument &a);\nBondInstrument &operator =(const BondInstrument\
  \ &a);\ndouble getMonthlyPayment();\ndouble getPrincipal();\n// 其他方法……\nprivate:\n\
  double\nm_monthlyPay,\nm_principal;\n};\nclass MortgageInstrument {\npublic:\nMortgageInstrument(double\
  \ monthlyPay, double propertyValue, double downpayment);\n~MortgageInstrument();\n\
  MortgageInstrument(const MortgageInstrument &a);\nMortgageInstrument &operator =(const\
  \ MortgageInstrument &a);\ndouble getMonthlyPayment();\ndouble getPrincipal();\n\
  // 其他方法……\nprivate:\ndouble\nm_monthlyPay,\nm_propertyValue,\nm_downPayment;\n};\n\
  #endif /* defined(__FinancialSamples__InvestmentInstrument__) */\n//\n//  InvestmentInstrument.cpp\n\
  #include \"InvestmentInstrument.h\"\nBondInstrument::BondInstrument(double principal,\
  \ double monthlyPayment)\n: m_principal(principal),\nm_monthlyPay(monthlyPayment)\n\
  {\n}\nBondInstrument::~BondInstrument()\n{\n}\nBondInstrument::BondInstrument(const\
  \ BondInstrument &a)\n: m_monthlyPay(a.m_monthlyPay),\nm_principal(a.m_principal)\n\
  {\n}\nBondInstrument &BondInstrument::operator =(const BondInstrument &a)\n{\nif\
  \ (this != &a)\n{\nm_principal = a.m_principal;\nm_monthlyPay = a.m_monthlyPay;\n\
  }\nreturn *this;\n}\ndouble BondInstrument::getMonthlyPayment()\n{\nreturn m_monthlyPay;\n\
  }\ndouble BondInstrument::getPrincipal()\n{\nreturn m_principal;\n}\n/////////////\n\
  MortgageInstrument::MortgageInstrument(double monthlyPay, double propertyValue,\
  \ double downpayment)\n: m_monthlyPay(monthlyPay),\nm_propertyValue(propertyValue),\n\
  m_downPayment(downpayment)\n{\n}\nMortgageInstrument::~MortgageInstrument()\n{\n\
  }\nMortgageInstrument::MortgageInstrument(const MortgageInstrument &a)\n: m_downPayment(a.m_downPayment),\n\
  m_propertyValue(a.m_propertyValue),\nm_monthlyPay(a.m_monthlyPay)\n{\n}\nMortgageInstrument\
  \ &MortgageInstrument::operator =(const MortgageInstrument &a)\n{\nif (this != &a)\n\
  {\nm_downPayment = a.m_downPayment;\nm_propertyValue = a.m_propertyValue;\nm_monthlyPay\
  \ = a.m_monthlyPay;\n}\nreturn *this;\n}\ndouble MortgageInstrument::getMonthlyPayment()\n\
  {\nreturn m_monthlyPay;\n}\ndouble MortgageInstrument::getPrincipal()\n{\nreturn\
  \ m_propertyValue - m_downPayment;\n}\n//\n//  IntRateEngine.h\n#ifndef __FinancialSamples__IntRateEngine__\n\
  #define __FinancialSamples__IntRateEngine__\n#include \ntemplate \nclass IntRateEngine\
  \ {\npublic:\n~IntRateEngine();\nIntRateEngine(const IntRateEngine &a);\nIntRateEngine\
  \ &operator =(const IntRateEngine &a);\nvoid setInstrument(T &inv);\ndouble getAnnualIntRate();\n\
  private:\nT m_instrument;\n};\ntemplate \nIntRateEngine::~IntRateEngine()\n{\n}\n\
  template \nIntRateEngine::IntRateEngine(const IntRateEngine &a)\n: m_instrument(a.m_instrument)\n\
  {\n}\ntemplate \nIntRateEngine &IntRateEngine::operator =(const IntRateEngine &a)\n\
  {\nif (this != &a)\n{\nm_instrument = a.m_instrument;\n}\nreturn *this;\n}\ntemplate\
  \ \nvoid IntRateEngine::setInstrument(T &inv)\n{\nm_instrument = inv;\n}\ntemplate\
  \ \ndouble IntRateEngine::getAnnualIntRate()\n{\ndouble payment = m_instrument.getMonthlyPayment();\n\
  double principal = m_instrument.getPrincipal();\nreturn (12 *payment) / principal;\n\
  }\n#endif /* defined(__FinancialSamples__IntRateEngine__) */\n//\n//  main.cpp\n\
  #include \"InvestmentInstrument.h\"\n#include \"IntRateEngine.h\"\n#include \nint\
  \ main()\n{\nIntRateEngine engineA;\nIntRateEngine engineB;\nBondInstrument bond(40000,\
  \ 250);\nMortgageInstrument mortgage(250, 50000, 5000);\nengineA.setInstrument(bond);\n\
  engineB.setInstrument(mortgage);\nstd::cout << \"债券年利率：\" << engineA.getAnnualIntRate()*100\
  \ << \"%\"\n<< std::endl;\nstd::cout << \"按揭贷款年利率：\" << engineB.getAnnualIntRate()*100\
  \ << \"%\"\n<< std::endl;\nreturn 0;\n}\n```\n清单 3-1 `InvestmentInstrument.h`\n\n\
  ### 运行代码\n\n您可以使用任何符合标准的编译器编译清单 3-1 中的代码。例如，使用 gcc 时，可以使用以下命令行：\n\n```\n> gcc -o\
  \ intRate main.cpp InvestmentInstrument.cpp IntRateEngine.cpp\n```\n\n您无需任何参数即可使用生成的测试程序。\n\
  \n```\n> ./intRate\n债券年利率：7.5%\n按揭贷款年利率：6.66667%\n```\n\n## 创建财务报表对象\n\n创建一个能计算财务报表并将其返回给调用客户端的类。同时要避免返回数据时可能出现的内存泄漏。\n\
  \n### 解决方案\n\n为了解决这个问题，您将创建一个简单的财务报表类，以及一个返回指向该财务报表指针的函数。解决方案中应避免的主要问题是返回财务报表时可能发生的内存泄漏。为此，您将学习如何使用智能指针来管理内存。不过，在解释这一点之前，您需要先理解智能指针的概念。\n\
  \n\n\n### 智能指针\n\nC 语言普及了指针的概念，并通过在高级语言中提供直接内存访问的简洁语法而实现了创新。指针允许以符合数据底层数据类型的方式操作内存地址。例如，可以使用递增和递减运算符让指针指向连续的内存地址。下面是一个示例：\n\
  \n```\nint numbers[200];\n// 在此处初始化 numbers...\n//\nint *parray = numbers;\nfor\
  \ (int i=0; i<200; ++i) {\nstd::cout << \"value is \" << *parray << \"\\n\";\nparray++;\n\
  }\n```\n\n在上面的示例中，`parray` 是一个指向整数的指针，它可用于指向内存中任意整数值的位置。特别地，你可以用它来存储 `numbers` 数组第一个元素的地址。`for`\
  \ 循环中的代码随后用于打印 `parray` 当前指向的值，并通过递增运算符更新其地址，从而将指针移动到下一个整数位置。请注意，即使每个整数所占的字节数大于\
  \ 1，这种操作也是可行的。实际上，递增运算符会识别所使用的指针类型，并将地址更改为指向声明类型下一个值的精确位置。\n\n虽然指针的表示法非常强大，并且 C++\
  \ 完全支持，但程序员应尽可能避免在 C++ 代码中使用指针。多年来，指针一直与不良的编程实践相关联，这些实践可能导致资源泄漏、内存损坏以及与安全相关的错误。由于指针允许对计算机内存进行无差别访问，因此相对容易误用，从而导致难以修复的错误。\n\
  \n一些 C++ 类和模板为指针提供了极佳的替代方案，开销很小，且具备许多相同特性。避免使用传统指针的主要技术是使用智能指针模板。这类智能指针是简单的模板，能够以更安全的方式存储地址。例如，`std::shared_ptr`\
  \ 类型的智能指针是一种模板类型对象，它允许代码中的两个或多个部分使用同一个地址。\n\n与传统 C++ 指针相比，智能指针的主要优势在于，智能指针知道在不再需要时如何自行清理。这样一来，就能避免因程序员未释放指针而产生的一大类问题。清理机制遵循\
  \ RAII（资源获取即初始化）惯用法的规则：智能指针中包含的资源在模板对象的构造函数中初始化，并在析构时释放——这通常发生在相关对象超出作用域时。\n\n智能指针有多种类型，每种类型都针对特定的使用场景而设计。C++\
  \ 代码中最常用的智能指针是唯一指针和共享指针。\n\n唯一指针（模板类型 `unique_ptr`）为传统 C++ 指针提供了一个包装。然而，该模板定义了对象所有权的语义，因此在所有权转移之后，指向该指针的其他引用将不再有效。唯一指针适用于接收方将完全控制所指向对象及其关联资源的场景。因此，传递给\
  \ `unique_ptr` 对象的指针不应在 `unique_ptr` 使用环境之外的其他环境中再次被引用。\n\n共享指针（模板类型 `shared_ptr`）是一种模板，可用于包装现有的\
  \ C++ 原生指针。与唯一指针不同，共享指针可以被代码中的两个或多个部分使用。在内部，共享指针维护着一个计数器，用于确定指向原始指针的引用已创建了多少个。这种机制称为引用计数。每当一个共享指针对象被销毁时，它会检查其内部引用计数器。如果计数器大于零，则不会删除内部对象。然而，如果引用计数器变为零，则被引用的对象会被删除，其析构函数会被激活。\n\
  \n在本节中，你将看到使用唯一指针的详细信息。在下一节中，我将介绍共享指针。\n\n### 使用唯一指针\n\n我们的内存管理问题的解决方案涉及使用唯一指针。唯一指针通过标准类\
  \ `std::unique_ptr` 实现，并且与其他智能指针一样，可用于提供自动清理和资源所有权。\n\n`std::unique_ptr` 采用的策略确保一旦它被分配了指针的所有权，该指针中存储的内存就不再被其他任何人拥有。因此，`std::unique_ptr`\
  \ 的语义包括：一旦对象超出作用域，关联数据会自动销毁。如果唯一指针的所有者不想销毁这块内存，它可以选择将其转移到另一个唯一指针，这是一个将所有权转移给另一个对象的过程。这就是我解决与返回的\
  \ `FinancialStatement` 关联内存管理问题的方法。\n\n首先，考虑 `FinancialStatement` 类的定义。\n\n```\n\
  class FinancialStatement {\npublic:\nFinancialStatement();\n~FinancialStatement();\n\
  FinancialStatement(const FinancialStatement&);\nFinancialStatement &operator=(FinancialStatement\
  \ &);\ndouble getReturn();\nvoid addTransaction(const std::string &security, double\
  \ val);\nprivate:\ndouble m_return;\nstd::vector> m_transactions;\n};\n```\n\n还有一个用于创建示例财务报表的函数。\n\
  \n```\nstd::unique_ptr getSampleStatement();\n```\n\n该函数返回一个指向示例报表的唯一指针。这意味着代码的调用者拥有返回的内存，因为调用者将持有一个已用指向结果对象的指针初始化过的唯一指针。`getSampleStatement`\
  \ 的实现如下：\n\n```\nstd::unique_ptr getSampleStatement()\n{\nstd::unique_ptr fs(new\
  \ FinancialStatement);\nfs->addTransaction(\"IBM\", 102.2);\nfs->addTransaction(\"\
  AAPL\", 523.0);\nreturn fs;\n}\n```\n\n在分配 `FinancialStatement` 对象并用它创建唯一指针之后，该对象被初始化并最终返回给调用者。由于返回语句将指针的所有权转移给了返回的对象，因此原始的\
  \ `FinancialStatement` 对象不会被销毁。相反，它现在由 `getSampleStatement` 函数的调用者拥有。\n\n\n\n###\
  \ 完整代码\n\n清单 3-2 展示了 `FinancialStatement` 类的代码，该代码分为头文件和实现文件。\n\n```\n//\n//  FinancialStatement.h\n\
  #ifndef __FinancialSamples__FinancialStatement__\n#define __FinancialSamples__FinancialStatement__\n\
  #include <string>\n#include <vector>\n#include <memory>\nclass FinancialStatement\
  \ {\npublic:\nFinancialStatement();\n~FinancialStatement();\nFinancialStatement(const\
  \ FinancialStatement&);\nFinancialStatement &operator=(FinancialStatement &);\n\
  double getReturn();\nvoid addTransaction(const std::string &security, double val);\n\
  private:\ndouble m_return;\nstd::vector<std::pair<std::string, double>> m_transactions;\n\
  };\nstd::unique_ptr<FinancialStatement> getSampleStatement();\nvoid transferFinancialStatement(std::unique_ptr<FinancialStatement>\
  \ &statement);\n#endif /* defined(__FinancialSamples__FinancialStatement__) */\n\
  //\n//  FinancialStatement.cpp\n#include \"FinancialStatement.h\"\nFinancialStatement::FinancialStatement()\n\
  : m_return(0)\n{\n}\nFinancialStatement::~FinancialStatement()\n{\n}\nFinancialStatement::FinancialStatement(const\
  \ FinancialStatement &v)\n: m_return(v.m_return),\nm_transactions(v.m_transactions)\n\
  {\n}\nFinancialStatement &FinancialStatement::operator=(FinancialStatement &v)\n\
  {\nif (this != &v)\n{\nm_return = v.m_return;\nm_transactions = v.m_transactions;\n\
  }\nreturn *this;\n}\ndouble FinancialStatement::getReturn()\n{\nreturn m_return;\n\
  }\nvoid FinancialStatement::addTransaction(const std::string &security, double val)\n\
  {\nm_transactions.push_back(std::make_pair(security, val));\n}\n// returns a sample\
  \ statement that includes a few common stocks\nstd::unique_ptr<FinancialStatement>\
  \ getSampleStatement()\n{\nstd::unique_ptr<FinancialStatement> fs(new FinancialStatement);\n\
  fs->addTransaction(\"IBM\", 102.2);\nfs->addTransaction(\"AAPL\", 523.0);\nreturn\
  \ fs;\n}\nvoid transferFinancialStatement(std::unique_ptr<FinancialStatement> statement)\n\
  {\n// perform transfer here\n// ...\n// statement is still valid\nstd::cout << statement->getReturn()\
  \ << std::endl;\n}\nint main()\n{\nstd::unique_ptr<FinancialStatement> fs = getSampleStatement();\n\
  // do some real work here...\nreturn 0;\n// the unique pointer is released at the\
  \ end of the scope...\n}\nListing 3-2\nFinancialStatement.h\n```\n\n### 转移所有权\n\n\
  在前面的例子中，您看到了如何使用 unique 指针将对象的所有权转移给函数的调用者。这种智能指针的另一个重要用途是告知调用者：被调用函数将接管所传递对象的所有权。\n\
  \n例如，考虑 `transferFinancialStatement` 函数，其定义如下：\n\n```\nvoid transferFinancialStatement(std::unique_ptr<FinancialStatement>\
  \ statement);\n```\n\n参数 `statement` 是一个指向 `FinancialStatement` 对象的 unique 指针，这意味着一旦它接收到该特定类型的参数，它将成为该对象的所有者。因此，`transferFinancialStatement`\
  \ 可以放心地使用 `statement` 对象，因为它知道自己是其内容的唯一所有者。根据需要对对象执行的操作，这可能是一个重要的优势。\n\n该函数的示例实现如下：\n\
  \n```\nvoid transferFinancialStatement(std::unique_ptr<FinancialStatement> &statement)\n\
  {\n// perform transfer here\n// ...\n// statement is still valid\nstd::unique_ptr<FinancialStatement>\
  \ another = std::move(statement);\nstd::cout << another->getReturn() << std::endl;\n\
  // statement is released here\n}\n```\n\n这里需要理解的关键点是，被指向的对象会在 `transferFinancialStatement`\
  \ 结束时被销毁，因为参数已被转移，从而在函数块的末尾超出作用域。\n\n### Unique 指针的陷阱\n\n由于 unique 指针要求对引用数据拥有所有权的语义，程序员在尝试访问这种智能指针中存储的数据时，可能会发生一些错误。例如，一个常见的错误来源是使用接管指向对象所有权的函数。您可以通过我之前展示的\
  \ `transferFinancialStatement` 函数来观察这类错误。当一个 unique 指针对象被传递给一个接管内存所有权的函数后，该 unique\
  \ 指针将不再有效，下次访问时可能导致程序崩溃。\n\n```\nint main()\n{\nstd::unique_ptr<FinancialStatement>\
  \ fs = getSampleStatement();\ntransferFinancialStatement(fs);\n// the unique_ptr\
  \ object is invalid here, the next access can crash the program\nstd::cout << fs->getReturn()\
  \ << \"\\n\";\nreturn 0;\n}\n```\n\n这个例子展示了在 unique 指针转移了其指向对象的所有权后，程序是多么容易崩溃。这种情况发生在您调用\
  \ `transferFinancialStatement` 函数时。\n\n下一行试图访问返回值，这会产生无效访问。在许多平台上，这将导致段错误。为了避免这种无效访问，程序员需要谨慎区分调用接受\
  \ unique 指针的函数与接受原生指针的函数。\n\nUnique 指针的另一个陷阱是它们对 STL 容器缺乏支持。例如，不可能将 unique 指针作为\
  \ `std::vector` 的成员。这是因为大多数容器通过按值复制元素来工作，这实际上会使现有 unique 指针中存储的数据失效。此外，许多 STL 容器的算法会对其包含的数据执行内部复制。这意味着此类算法可能会在没有预先通知的情况下销毁原始元素：这是一个非常尴尬的情况。出于这些原因，建议在处理\
  \ STL 容器时避免使用 unique 指针。\n\n为了避免 `std::unique_ptr` 带来的问题，引入了另一种智能指针类型：`std::shared_ptr`\
  \ 模板提供了可由不同所有者共享的指针语义。在下一节中，您将看到一个如何使用这种共享指针对象的示例。\n\n## 确定信用评级\n\n创建一个类来确定给定证券的信用评级。\n\
  \n### 解决方案\n\n信用风险评级由认可的评级机构定义，用于确定机构的风险。借助这些信息，投资者可以确定特定债券或持股的风险水平，并控制他们愿意承担的风险程度。例如，养老基金和保险公司等风险规避型投资者通常不愿投资于任何未经认证为顶级（通常为\
  \ AAA）的机构。全球金融机构主要使用三家信用评级机构：穆迪、标准普尔和惠誉。它们不仅为公司，还为地方、州和国家层面的政府定义风险等级。\n\n为了在 C++\
  \ 中建模信用评级，我创建了一个独立的类，封装了信用风险评级背后的基本概念。`CreditRisk` 类有一个名为 `getRating` 的成员函数，它返回特定股票或债券的当前风险评级。第二个类名为\
  \ `RiskCalculator`，用于根据投资组合中每个组成部分的一组风险评级，对特定投资组合的相关风险进行简单分析。\n\n\n\n### 使用共享指针\n\
  \n由于 `RiskCalculator` 类需要维护一组信用评级，因此拥有一个容器来保存这些信息是合理的。然而，我们希望避免复制数据。由于 `CreditRisk`\
  \ 类非常简单，因此复制与否差别不大。但是，类可能会变得更加复杂，在大型应用程序中，这些内存需求会逐渐累积。因此，更好的设计是避免在将 `CreditRisk`\
  \ 对象添加到集合时进行复制。然而，我们已经看到，`std::unique_ptr` 不适合纳入集合，这让我们需要存储对象的传统指针。\n\n更好的解决方案是使用\
  \ `std::shared_ptr` 类来处理与 `CreditRisk` 对象关联的内存。共享指针不仅知道如何清理指针引用的数据，还能够与其他对象共享引用。这样，直到最后一个引用也被销毁时，该对象才会被销毁。\n\
  \n共享指针通过使用引用计数机制来实现此行为。共享指针对象维护一个计数器，该计数器确定引用对象存在多少个副本。当共享指针被销毁时，它会检查此计数器以确定是否存在其他引用。如果计数器为正，则指向的对象不会被销毁。当创建共享指针的新副本时，计数器也会更新。计数器会递增，以指示存在对象引用的另一个副本。通过这种方式，同一个共享指针的多个副本可以存在于内存中，并且它们都将正确管理底层数据，直到最后一个副本被销毁并且原始对象从内存中移除。\n\
  \n我使用共享指针来处理 `RiskCalculator` 类的内存需求。`CreditRisk` 对象的集合被维护为一个共享指针向量，声明如下：\n\n```\n\
  std::vector<std::shared_ptr<CreditRisk>> m_creditRisks;\n```\n\n在此声明中，向量的每个元素都是一个共享指针。由于共享指针知道如何复制自身，因此它们可以有效地用作向量或任何其他容器的成员，这与独占指针不同。\n\
  \n使用共享指针很容易，因为它们会自动执行所需的清理操作。例如，复制共享指针只需使用赋值运算符即可。通过 `addCreditRisk` 成员函数向 `m_creditRisks`\
  \ 向量添加新元素。\n\n```\nvoid RiskCalculator::addCreditRisk(std::shared_ptr<CreditRisk>\
  \ risk)\n{\nm_creditRisks.push_back(risk);\n}\n```\n\n### 完整代码\n\n在代码清单 3-3 中，您拥有上一节描述的示例的完整代码。该类名为\
  \ `CreditRisk`，包含在一个头文件和一个实现文件中。\n\n```\n//\n//  CreditRisk.h\n#ifndef __FinancialSamples__CreditRisk__\n\
  #define __FinancialSamples__CreditRisk__\n// 一个表示信用风险评估的简单类\nclass CreditRisk {\n\
  public:\n// 这些是评级机构确定的风险等级\nenum RiskType {\nAAA,\nAAPlus,\nAA,\nAPlus,\nA,\nBPlus,\n\
  B,\nCPlus,\nC\n};\n// 其他方法在此处...\n};\n#endif /* defined(__FinancialSamples__CreditRisk__)\
  \ */\n//\n//  RiskCalculator.h\n#ifndef __FinancialSamples__RiskCalculator__\n#define\
  \ __FinancialSamples__RiskCalculator__\n#include \"CreditRisk.h\"\n#include <vector>\n\
  #include <memory>\n// 计算与投资组合相关的风险\nclass RiskCalculator {\npublic:\nRiskCalculator();\n\
  ~RiskCalculator();\nRiskCalculator(const RiskCalculator &);\nRiskCalculator &operator\
  \ =(const RiskCalculator &);\nvoid addCreditRisk(std::shared_ptr<CreditRisk> risk);\n\
  CreditRisk::RiskType portfolioMaxRisk();\nCreditRisk::RiskType portfolioMinRisk();\n\
  private:\nstd::vector<std::shared_ptr<CreditRisk>> m_creditRisks;\n};\n#endif /*\
  \ defined(__FinancialSamples__RiskCalculator__) */\n//\n//  RiskCalculator.cpp\n\
  #include \"RiskCalculator.h\"\nRiskCalculator::RiskCalculator()\n{\n}\nRiskCalculator::~RiskCalculator()\n\
  {\n}\nRiskCalculator::RiskCalculator(const RiskCalculator &v)\n: m_creditRisks(v.m_creditRisks)\n\
  {\n}\nRiskCalculator &RiskCalculator::operator =(const RiskCalculator &v)\n{\nif\
  \ (this != &v)\n{\nm_creditRisks = v.m_creditRisks;\n}\nreturn *this;\n}\nvoid RiskCalculator::addCreditRisk(std::shared_ptr<CreditRisk>\
  \ risk)\n{\nm_creditRisks.push_back(risk);\n}\nCreditRisk::RiskType RiskCalculator::portfolioMaxRisk()\n\
  {\nCreditRisk::RiskType risk = CreditRisk::RiskType::AAA;\nfor (int i=0; i<m_creditRisks.size();\
  \ ++i)\n{\nif (m_creditRisks[i]->getRating() < risk)\n{\nrisk = m_creditRisks[i]->getRating();\n\
  }\n}\nreturn risk;\n}\nCreditRisk::RiskType RiskCalculator::portfolioMinRisk()\n\
  {\nCreditRisk::RiskType risk = CreditRisk::RiskType::C;\nfor (int i=0; i<m_creditRisks.size();\
  \ ++i)\n{\nif (m_creditRisks[i]->getRating() > risk)\n{\nrisk = m_creditRisks[i]->getRating();\n\
  }\n}\nreturn risk;\n}\n代码清单 3-3\nCreditRisk.h\n```\n\n### 使用 `auto` 关键字\n\n在 C++11\
  \ 标准引入的众多 C++ 新增特性中，`auto` 关键字是最实用、最容易理解的特性之一。该扩展的基本思想是，编译器可以对许多类别的变量和表达式执行类型检测工作。只要可能，程序员就可以在变量声明中使用\
  \ `auto` 关键字，而不是输入所需对象的完整类型。这样，程序员可以决定让编译器自动进行类型检测，而仅在需要且方便进行视觉标记时才使用类型名称。\n\n与其他形式的类型声明相比，`auto`\
  \ 关键字具有几个优点。它：\n-   减少了程序员的手动工作量，因为它使用编译器本身来分析表达式并确定特定变量或表达式的确切类型\n-   增加了代码的统一性，因为大多数变量使用相同的风格声明\n\
  -   保留了程序员根据需要输入确切类型的能力，从而可以避免任何冲突\n-   简化了模板的使用，因为数据类型可以在模板的每次实例化期间在编译时自动检测\n\n\
  作为使用 `auto` 关键字的示例，我们可以修改 `RiskCalculator` 类中的某些成员函数，以执行变量类型的自动检测。这对于简化在使用模板集合时非常常见的某些表达式很有用。例如，以下是\
  \ `portfolioMaxRisk` 成员函数：\n\n```\nCreditRisk::RiskType RiskCalculator::portfolioMaxRisk()\n\
  {\nauto risk = CreditRisk::RiskType::AAA;\nfor (auto &p : m_creditRisks)\n{\nif\
  \ ((*p)->getRating() < risk)\n{\nrisk = (*p)->getRating();\n}\n}\nreturn risk;\n\
  }\n```\n\n这段代码片段展示了如何自动检测局部变量 `risk` 的类型，因此您无需输入重复的类型名称 `CreditRisk::RiskType`。类似地，下一行展示了如何使用\
  \ `auto` 关键字遍历对象集合以确定迭代器的正确类型。经验丰富的 STL 程序员知道，使用迭代器可能会为一段代码引入许多额外的类型，这常常会使程序的原始意图变得模糊不清。作为对比，请注意，如果没有\
  \ `auto` 关键字，上述 `for` 循环需要写成：\n\n```\nfor (std::vector<std::shared_ptr<CreditRisk>>::iterator\
  \ p = m_creditRisks.begin();\np != m_creditRisks.end(); ++p)\n{\n// ...\n}\n```\n\
  \n这不仅更难手动输入，而且使代码更难理解和修改。\n\n## 收集交易数据\n\n创建一个解决方案来处理交易订单的问题，包括 `BUY`、`SELL` 或 `SELL\
  \ SHORT`，这些订单存储在一个文件中。该解决方案必须正确处理编程异常。\n\n\n\n### 解决方案\n\n为解决这个问题，我们创建了一个能处理交易事务并执行必要操作的类。该类负责接收文件名并执行文件中存储的指令，同时负责处理此过程中发生的任何错误，包括文件读取错误以及发送给应用程序的错误交易请求。\n\
  \n在此编码示例中，允许的操作很简单，仅包括买入、卖出和卖空。因此，我将重点放在处理文件和应对程序中意外错误的问题上。我们遵循使用 C++异常处理机制的最佳实践，创建了一个名为`TransactionHandler`的新类，该类能够从文件中读取数据，并在成员函数`handleTransactions`中执行必要的操作。最终的代码能够执行文件中存储的交易操作，并使用\
  \ C++语言提供的`try`/`catch`/`throw`机制处理可能出现的异常，详情见下一节。\n\n### 异常处理\n\n程序员面临的基本问题之一是检测错误并从错误中恢复。虽然我们努力避免自身造成的错误，但即使正确的程序也需要处理许多异常情况。例如，当文件系统已满、没有更多空间保存当前文件时，代码应该怎么办？当网络连接关闭，服务器无法完成下载时，又能做些什么？程序员需要决定如何应对此类异常情况，多年来已设计出多种策略来应对这些状况。\n\
  \nC++采用基于异常的模型来处理程序执行期间出现的意外情况。该模型使用标准的`try`/`catch`块来封装需要保护的代码。当异常发生时，编译器会抛出一个对象来指示意外情况。因此，包围的代码块也会销毁在该特定上下文中创建的所有局部对象，以避免资源泄露。\n\
  \nC++异常处理的另一个方面是使用异常对象来告知程序员所发生错误的类别。这些对象使用`throw`关键字创建，并通过`catch`块捕获，该块接收异常对象的引用，并利用它来理解并可能从意外状态中恢复。应用程序可以自由创建新的异常类，以提供关于触发异常的错误的额外信息。\n\
  \n在此示例中，我创建了两个异常类。它们都派生自`std::runtime_error`，该类提供了运行时异常的基本行为。第一个类`FileError`用于标记读取文件过程中发生的任何错误。其定义如下：\n\
  \n```\nclass FileError :public std::runtime_error {\npublic:\nFileError (const std::string\
  \ &description);\n};\n```\n\n第二个异常类`TransactionTypeError`在文件中发现除`TRANSACTION_SELL`、`TRANSACTION_BUY`或`TRANSACTION_SHORT`之外的未知交易类型时抛出。其定义与`FileError`类似。这些类随后在测试代码中用于确定遇到的错误类型以及后续操作。在测试程序中，我们在终止程序前仅使用`what()`成员函数返回的字符串打印一条描述性的错误信息。\n\
  \n```\ntry\n{\nTransactionHandler handler(fileName);\n}\ncatch (FileError &e)\n\
  {\nstd::cerr << \"received a file error: \" << e.what() << std::endl;\n}\ncatch\
  \ (TransactionTypeError &e)\n{\nstd::cerr << \"received a transaction error: \"\
  \ << e.what() << std::endl;\n}\ncatch (...)\n{\nstd::cerr << \"received an unknown\
  \ error\\n\";\n}\n```\n\n### 完整代码\n\n清单 3-4 提供了一个关于异常处理的完整示例。这里展示的类演示了在读取交易文件时如何处理异常。末尾提供了一个示例`main()`函数，展示了这些类如何协同工作。\n\
  \n```\n//\n//  TransactionHandler.h\n#ifndef __FinancialSamples__TransactionHandler__\n\
  #define __FinancialSamples__TransactionHandler__\n#include \nenum TransactionType\
  \ {\nTRANSACTION_SELL,\nTRANSACTION_BUY,\nTRANSACTION_SHORT,\n};\nclass FileError\
  \ :public std::runtime_error {\npublic:\nFileError(const std::string &s);\n};\n\
  class TransactionTypeError :public std::runtime_error {\npublic:\nTransactionTypeError(const\
  \ std::string &s);\n};\nclass TransactionHandler {\npublic:\nstatic const std::string\
  \ SELL_OP;\nstatic const std::string BUY_OP;\nstatic const std::string SHORT_OP;\n\
  TransactionHandler(const std::string &fileName);\nTransactionHandler(const TransactionHandler\
  \ &);\n~TransactionHandler();\nTransactionHandler &operator=(const TransactionHandler&);\n\
  void handleTransactions();\nprivate:\nstd::string m_fileName;\n};\n#endif /* defined(__FinancialSamples__TransactionHandler__)\
  \ */\n//\n//  TransactionHandler.cpp\n#include \"TransactionHandler.h\"\n#include\
  \ \nFileError::FileError(const std::string &s)\n: std::runtime_error(s)\n{\n}\n\
  TransactionTypeError::TransactionTypeError(const std::string &s)\n: std::runtime_error(s)\n\
  {\n}\nconst std::string TransactionHandler::SELL_OP = \"SELL\";\nconst std::string\
  \ TransactionHandler::BUY_OP = \"BUY\";\nconst std::string TransactionHandler::SHORT_OP\
  \ = \"SHORT\";\nTransactionHandler::TransactionHandler(const std::string &fileName)\n\
  : m_fileName(fileName)\n{\n}\nTransactionHandler::TransactionHandler(const TransactionHandler\
  \ &a)\n: m_fileName(a.m_fileName)\n{\n}\nTransactionHandler::~TransactionHandler()\n\
  {\n}\nTransactionHandler &TransactionHandler::operator=(const TransactionHandler&a)\n\
  {\nif (this != &a)\n{\nm_fileName = a.m_fileName;\n}\nreturn *this;\n}\nvoid TransactionHandler::handleTransactions()\n\
  {\nstd::ifstream file;\nfile.open(m_fileName, std::ifstream::in);\nif (file.fail())\n\
  {\nthrow new FileError(std::string(\"error opening file \") + m_fileName);\n}\n\
  std::string op;\nfile >> op;\nwhile (file.good() && !file.eof())\n{\nif (op != SELL_OP\
  \ && op != BUY_OP && op !=  SHORT_OP)\n{\nthrow new TransactionTypeError(std::string(\"\
  unknown transaction \") + op);\n}\n// process remaining transaction data...\n}\n\
  }\n//\n//  main.cpp\n#include \"TransactionHandler.h\"\n#include \nint main(int\
  \ argc, const char **argv)\n{\nif (argc  \\n\";\nreturn 1;\n}\nstd::string fileName\
  \ = argv[1];\ntry\n{\nTransactionHandler handler(fileName);\n}\ncatch (FileError\
  \ &e)\n{\nstd::cerr << \"received a file error: \" << e.what() << std::endl;\n}\n\
  catch (TransactionTypeError &e)\n{\nstd::cerr << \"received a transaction error:\
  \ \"\n<< e.what() << std::endl;\n}\ncatch (...)\n{\nstd::cerr << \"received an unknown\
  \ error\\n\";\n}\nreturn 0;\n}\n```\n\n### 实现向量运算\n\n在本节中，我们实现数值向量上定义的常见加法和乘法运算符。\n\
  \n### 解决方案\n\n利用 C++的运算符重载功能可以轻松解决此问题。首先我会对这种编程技巧进行通用介绍，然后展示如何用它来实现数值向量运算。\n\n\n\
  \n### 运算符重载\n\n大多数编程语言都使用运算符为常见操作提供更简洁的语法。例如，`+` 运算符用于实现数字的加法，无需使用名为 `sum` 的函数。因此，我们可以输入以下表达式：\n\
  \n```\nint total = a + b + c + d;\n```\n\n而不是下面这种不够便捷的版本：\n\n```\nint total = sum(a,\
  \ sum(b, sum(c, d)));\n```\n\n类似地，其他运算符也为其他基本操作执行类似任务，例如减法、乘法、逻辑比较和指针运算。\n\n虽然大多数现代编程语言都提供运算符，但\
  \ C++ 是少数允许程序员重新定义现有运算符含义的语言之一，使其适应目标领域中最自然的用法。例如，在向量是常见数据结构的应用中，重新定义 `+` 运算符以执行向量加法，同时保留其传统标量数值加法功能，是合理的做法。\n\
  \nC++ 允许为每个新声明的类型定义运算符。运算符可以定义为类的一部分（作为成员函数），也可以定义为独立函数。例如，考虑一个重新定义了 `+` 运算符的 `Complex`\
  \ 类。该运算符的声明可以写成：\n\n```\nclass complex {\npublic:\n// ... 此处为其他方法\ncomplex &operator\
  \ +(const complex &v);\n};\n```\n\n编写相同运算符的另一种方式是使用自由函数：\n\n```\nComplex &operator\
  \ +(const complex &a, const complex &b);\n```\n\n这两种声明之间的区别在于，后者声明了一个接收两个参数的函数，而成员函数版本只需要一个额外参数（第一个参数是对象本身）。类似地，你可以声明大多数\
  \ C++ 运算符的新版本，包括数学、逻辑和指针运算符。\n\n为了解决提出的问题，我们创建了一个名为 `NumVector` 的新类，它是一个简单的数值向量，可用于存储双精度浮点数。为了以自然的方式提供可应用于向量的操作，我们使用声明为自由函数的运算符：\n\
  \n```\nNumVector operator +(const NumVector &a, const NumVector &b);\nNumVector\
  \ operator -(const NumVector &a, const NumVector &b);\nNumVector operator *(const\
  \ NumVector &a, const NumVector &b);\n```\n\n该类还提供了一些成员函数，用于实现这些操作。具体来说，你需要拥有成员函数\
  \ `add`（用于向向量添加新元素）、`removeLast`（用于移除最后一个元素）、`get`（用于根据位置（索引）返回其中一个元素），以及一个 `size`\
  \ 成员函数（用于返回向量的大小）。\n\n所有运算符都以类似的方式实现：它们都检查两个参数是否具有相同的大小，然后执行一个循环，用于执行所需的操作——加法、减法或乘法。\n\
  \n### 完整代码\n\n列表 3-5 提供了一个数值向量的示例实现。你可以使用此类创建数值向量并执行常见的向量操作。\n\n```\n//\n//  NumVector.h\n\
  #ifndef __FinancialSamples__NumVector__\n#define __FinancialSamples__NumVector__\n\
  #include \nclass NumVector {\npublic:\nNumVector();\n~NumVector();\nNumVector(const\
  \ NumVector &);\nNumVector &operator =(const NumVector &);\nvoid add(double val);\n\
  void removeLast();\ndouble get(int pos) const;\nsize_t size() const;\nprivate:\n\
  std::vector m_values;\n};\nNumVector operator +(const NumVector &a, const NumVector\
  \ &b);\nNumVector operator -(const NumVector &a, const NumVector &b);\nNumVector\
  \ operator *(const NumVector &a, const NumVector &b);\n#endif /* defined(__FinancialSamples__NumVector__)\
  \ */\n//\n//  NumVector.cpp\n#include \"NumVector.h\"\n#include \nNumVector::NumVector()\n\
  {\n}\nNumVector::~NumVector()\n{\n}\nNumVector::NumVector(const NumVector &v)\n\
  : m_values(v.m_values)\n{\n}\nNumVector &NumVector::operator=(const NumVector &v)\n\
  {\nif (this != &v)\n{\nm_values = v.m_values;\n}\nreturn *this;\n}\nsize_t NumVector::size()\
  \ const\n{\nreturn m_values.size();\n}\ndouble NumVector::get(int pos) const\n{\n\
  return m_values[pos];\n}\nvoid NumVector::add(double val)\n{\nm_values.push_back(val);\n\
  }\nvoid NumVector::removeLast()\n{\nm_values.pop_back();\n}\nNumVector operator\
  \ +(const NumVector &a, const NumVector &b)\n{\nif (a.size() != b.size())\n{\nthrow\
  \ new std::runtime_error(\"vectors must have the same size\");\n}\nNumVector result;\n\
  for (int i=0; i<a.size(); ++i)\n{\nresult.add(a.get(i) + b.get(i));\n}\nreturn result;\n\
  }\nNumVector operator -(const NumVector &a, const NumVector &b)\n{\nif (a.size()\
  \ != b.size())\n{\nthrow new std::runtime_error(\"vectors must have the same size\"\
  );\n}\nNumVector result;\nfor (int i=0; i<a.size(); ++i)\n{\nresult.add(a.get(i)\
  \ - b.get(i));\n}\nreturn result;\n}\nNumVector operator *(const NumVector &a, const\
  \ NumVector &b)\n{\nif (a.size() != b.size())\n{\nthrow new std::runtime_error(\"\
  vectors must have the same size\");\n}\nNumVector result;\nfor (int i=0; i<a.size();\
  \ ++i)\n{\nresult.add(a.get(i) * b.get(i));\n}\nreturn result;\n}\n列表 3-5\nNumVector.h\n\
  ```\n\n\n\n### 结论\n\nC++是一种复杂的语言，它提供了使用多种范式（如结构化、面向对象和函数式编程）中的一种或多种来创建软件的机制。因此，有必要开发一套更适用于金融软件开发的技术，同时避免那些混淆程序、妨碍我们修改程序效率低下的做法。多年来，金融工程师成功运用了许多\
  \ C++惯用法，使得更易于利用该语言的速度和抽象特性。\n\n在本章中，我讨论了一些编程示例，介绍并回顾了金融应用开发中常用的一些有用的 C++编程技术。首先，我回顾了模板的概念，它允许程序员编写可应用于多个类的通用代码。在第一个代码示例中，你学习了如何设计一个独立于利率类定义之上的利率计算引擎。这种设计在创建大规模金融应用时非常有用。\n\
  \n接下来，你学习了如何定义可以发送到应用程序其他部分的财务报表对象，同时减少内存泄漏的发生。为此，我解释了如何使用智能指针作为自动决定对象生命周期的一种方式。具体来说，你学习了`std::unique_ptr`模板，它实现了自动释放、自有指针的语义。\n\
  \n下一节再次讨论了内存管理问题，这次是在根据评级机构确定信用评级的背景下。在这种情况中，你学习了如何共享评级信息，使得即使多个用户拥有该对象的副本，内存也能自动销毁。为此，你可以了解`std::shared_ptr`模板，它使用引用计数机制来确定删除内存的正确时机，从而避免内存泄漏。你还看到了使用`auto`关键字来简化\
  \ STL 容器的类型检测。`shared_ptr`和`auto`关键字都是 C++11 标准引入的新特性，目前所有现代 C++编译器都已实现该标准。\n\n\
  C++中另一项重要技术涉及意外情况的处理。C++提供的基于异常的机制允许程序员以简洁的方式处理不常见的情况。你已经看到了一个将此策略应用于处理存储在数据文件中的交易操作问题的示例。\n\
  \n最后，本章考虑了应用于数字序列的数学运算的实现问题。为此，我们创建了一个名为`NumVector`的新类，它以序列形式存储数字。为了以自然的方式实现向量的加法、减法和乘法，我们使用了\
  \ C++提供的运算符重载机制。通过这种方式，应用程序可以使用语言中已有的运算符来执行向量运算，这些运算符经过重新定义后，可以应用于你自己的类型。\n\n在本章中，你了解了已在金融应用中成功使用的一般\
  \ C++技术。在下一章中，我将解释如何使用扩展语言并为金融软件开发人员提供有用功能的库。这些库包括新数据容器和算法等功能，以及更高级的内存管理、时间和事件处理技术。\n\
  \n"
- "# 4. 金融应用的常用库\n\n用 C++实现的金融代码使用编程库来简化快速、符合标准类的创建。此类库的最佳例子就是 STL（标准模板库）本身，这是一个附带在符合标准的\
  \ C++编译器中的便捷库。STL 提供了一套通用的、常用的容器，几乎可以应用于任何情况。了解如何很好地运用 STL 是进行高效 C++编程所需的主要技能之一，尤其是在高性能软件开发（这是金融应用的常见要求）的背景下。在本章中，你将学习一些编程示例，阐明\
  \ STL 在金融编程中的一些最常见用途，包括容器和算法。\n\nBoost 项目提供了另一套常用的类。尽管标准语言委员会并未官方支持 Boost 库，但其中一些已被用作最近几个版本\
  \ C++标准库新增功能的基础。因此，充分理解 Boost 库中包含的类和模板很有价值，这可以让你提前访问那些后来才会在所有 C++实现中可用的功能。\n\n\
  在接下来的几个小节中，我们将探讨一些 C++示例，演示这些类和模板如何在金融应用中使用。这里探讨的重要库组件示例包括：\n\n- **向量（Vectors）**：这些是用于操作同类型对象的容器。\n\
  - **映射（Maps）**：STL 容器，可用于将值关联到一组键，键可以是任何类型。\n- **算法（Algorithms）**：STL 还提供了一套丰富的算法，可用于操作标准容器。你也可以扩展现有算法，使其应用于你自己的数据结构。同样，你可以利用\
  \ STL 提供的思路来实现你自己的算法。\n- **Boost 库**：STL 是其他有用库的基础。Boost 库由一些在语言委员会工作的 C++专家编写。许多以前包含在\
  \ Boost 库中的组件，如`shared_ptr`，后来已成为语言的一部分。\n- **时间和日期处理**：金融应用通常与处理特定时间段内的价格有关。为此，有必要使用库来统一处理日期。\n\
  \n在接下来的几节中，你将看到几个精选的编程示例，它们探讨了这些 C++库在金融应用背景下的使用。\n\n## 处理分析师推荐\n\n围绕某只股票的常见事件之一就是分析师推荐的发布。创建一个处理分析师推荐并返回该股票平均目标价的\
  \ C++类。\n\n### 解决方案\n\n分析师推荐是华尔街生态系统的重要组成部分。许多金融机构，如养老基金和保险公司，以及散户投资者，都将分析师的推荐作为衡量关于某只股票主流观点的标尺。这反过来又可用于决定未来对股票组合的资本配置。\n\
  \n分析师推荐来自提供股票投资公开分析的几家机构之一，通常来自一些主要的投资银行。对某只特定股票的推荐包括一个明确的动作，如“买入”、“卖出”或“持有”。推荐通常还包括一个目标价，它决定了分析师认为该工具的“公平价格”是多少。\n\
  \n由于有这么多分析师覆盖股票市场，跟踪推荐是机构投资者工作的重要组成部分。在本节中，您将创建一个 C++类来存储此类信息，并回答一些基本问题，例如“某只特定股票的平均目标价是多少？”\n\
  \n这个问题的解决方案涉及使用 STL 容器来保存数据。具体来说，你将使用向量来提供对数据的快速访问。\n\n\n\n### 关于 STL 向量和映射的更多内容\n\
  \nSTL 是一个包含标准数据结构和算法的代码库，在大多数编程领域都非常有用。特别是在金融应用中，使用 STL 极为重要，因为其组件针对高速运算进行了优化。例如，在\
  \ C++ 中编写应用程序时，目前首选的方法是使用像向量这样的 STL 组件，而不是使用原始的 C++ 数组或类似的数据容器类。编译器供应商在使 STL 组件在各种应用中既快速又安全方面做得非常出色，因此程序员无需担心诸如内存分配、异常处理和算法复杂度等复杂问题。\n\
  \nSTL 向量用途广泛，因为它们可以动态增长。因此，当你不清楚底层数据结构中将存储多少个元素时（只要你不介意向量调整大小带来的开销），它们就能派上用场。例如，如果你正在读取特定时间段内的交易数据，你通常不知道在该特定时间框架内发生了多少笔交易。在这种情况下，使用一个可以初始化为少量元素然后根据需要增长的向量，会比使用一个预定义（且固定）大小的数组更容易。通过这种方式使用\
  \ STL 向量，你无需担心容器的内存分配和异常安全性。\n\n向量模板暴露了一个接口，其中包含可应用于一组元素的操作，例如添加、移除、查找和比较。这些常见操作可以在不同的具体实现中通用，无需进行任何手动修改。例如，声明为\
  \ `std::vector<int>` 的向量可以使用 `push_back` 成员函数将 `int` 元素添加到向量的末尾。同样，声明为 `std::vector<std::string>`\
  \ 的另一个向量也可以使用相同的基于模板的成员函数添加 `std::string` 元素。\n\n以下是 `std::vector` 模板中最常用的成员函数的快速列表：\n\
  \n*   `template <class T> vector(const T &c, int n)`：构造函数，用于创建一个新向量，并用常量元素 `c` 的\
  \ `n` 个副本进行初始化。\n*   `template <class T> vector(const vector<T> &v)`：构造函数，用于创建一个新向量，并用现有向量对象\
  \ `v` 的副本进行初始化。\n*   `template <class T> T &operator [] (int pos)`：该运算符使 `std::vector`\
  \ 对象的行为类似于原生数组。你可以使用 `v[i]` 表示法来访问或更新存储在向量 `v` 中位置 `i` 处的元素值。\n*   `template <class\
  \ T> void push_back(const T &c)`：用于在向量末尾添加一个新元素，必要时会分配额外的内存。这是向向量添加新元素最常用的方法，因为它在必要时会负责分配内存来存储新元素，这与\
  \ `operator []` 不同，后者在访问未定义位置时会导致应用程序崩溃。\n*   `template <class T> void pop_back()`：此成员函数执行与\
  \ `push_back` 相反的操作，移除存储在向量最后一个位置的元素。但是，为该元素分配的内存不会立即被回收，可能会被后续操作使用。\n*   `template\
  \ <class T> size_t size()`：此成员函数返回当前存储在 `std::vector` 中的元素数量。请注意，这可能小于向量当前使用的总内存，因为根据之前添加或预留的元素数量，向量可能分配了比当前需求更多的内存。\n\
  \n在我们的问题中，我们使用向量来存储针对特定股票的建议。该类涵盖的每只股票都会有一个建议向量。每个建议只是 `Recommendation` 类的一个对象，该类存储按以下方式定义的建议：\n\
  \n```\nenum class RecommendationType {\nBUY,\nSELL,\nHOLD,\nNO_RECOMMENDATION\n\
  };\n```\n\n`Recommendation` 类定义为：\n\n```\nclass Recommendation {\npublic:\nRecommendation();\n\
  Recommendation(const std::string &ticker, RecommendationType rec, double target);\n\
  ~Recommendation();\nRecommendation(const Recommendation &r);\nRecommendation & =(const\
  \ Recommendation &r);\ndouble getTarget() const;\nRecommendationType getRecommendation()\
  \ const;\nstd::string getTicker() const;\n// 私有成员\n};\n```\n\n这个简单的 `Recommendation`\
  \ 类存储了股票的代码，以及其建议类型和目标价格。请注意，存储在 `std::vector` 中的对象必须来自可复制或可移动的类，因为 `std::vector`\
  \ 中的元素是按值存储的。这意味着，每当需要将对象移动到某个位置时，就会创建一个副本，除非该类具有移动构造函数。\n\n使用 `std::vector` 我们可以跟踪针对某只股票的单个建议。但是，我们想要跟踪的股票池中有多只股票。为了找到正确的建议，我们分配了一种基于股票代码检索对象的方法。这是通过使用\
  \ `std::map` 模板来完成的。使用映射还将简化实现其他有用操作所需的代码，例如添加新建议或计算平均建议。\n\n`std::map` 模板提供了一种将任意键关联到数据对象的方法，以便你可以轻松检索原始数据。映射最棒的地方在于，键可以是任何提供比较操作（例如小于（`<`）运算符）的对象。例如，在我们的例子中，你可以使用一个字符串来指示每只特定股票的唯一切入点。基于该代码，你可以检索包含该特定股票建议的向量。\n\
  \n以下是 `std::map` 定义的重要操作的一个简短列表：\n\n*   `template <class K, class T> iterator<T>\
  \ find(const K&)`：返回一个指向与给定键关联的数据对象的迭代器。如果该键没有关联的对象，该函数返回 `end()` 迭代器。\n*   `template\
  \ <class K, class T> T &operator[](const K&)`：将一个键与一个特定的数据对象关联起来。你可以使用此运算符从映射容器中检索元素以及插入新元素。\n\
  *   `template <class K, class T> size_t erase(const K&)`：删除与给定键关联的数据。\n\n`std::map`\
  \ 模板在此代码示例中用于存储和检索针对特定股票发布的建议。`RecommendationProcessor` 是负责存储、处理以及回答与股票建议相关的查询的类。`RecommendationProcessor`\
  \ 使用的一般算法包括将新建议存储在一个内部数据结构中。然后，在未来的任何时刻，你可以使用 `averageTargetPrice` 成员函数查询存储的数据。\n\
  \n此类中的第一个成员函数 `addRecommendation` 负责将新建议存储到 `m_recommendations` 成员变量中。\n\n```\n\
  void RecommendationsProcessor::addRecommendation(const std::string &ticker,\nRecommendationType\
  \ rec, double targetPrice)\n{\nRecommendation r(ticker, rec, targetPrice);\nm_recommendations[ticker].push_back(r);\n\
  }\n```\n\n在这里，首先需要根据传入的信息（如股票代码、建议类型和目标价格）创建一个新的建议对象。然后，我们使用 `m_recommendations`\
  \ 映射来访问建议向量。最后，我们使用 `push_back` 方法将新建议添加到该特定股票的建议列表中。\n\n另一个有趣的成员函数是计算平均目标价格的函数。它会查看所有建议以计算平均目标。\n\
  \n\n\n```cpp\ndouble RecommendationsProcessor::averageTargetPrice(const std::string\
  \ &ticker)\n{\nif (m_recommendations.find(ticker) == m_recommendations.end())\n\
  return 0;\nauto vrec = m_recommendations[ticker];\nstd::vector prices;\nfor (auto\
  \ i=0; i<vrec.size(); ++i)\n{\nprices.push_back(vrec[i].getTarget());\n}\nreturn\
  \ std::accumulate(prices.begin(), prices.end(), 0) / prices.size();\n}\n```\n\n\
  在这段代码中，你需要做的第一件事是检查该股票是否有任何推荐。如果没有，函数返回零值。否则，你可以使用`[]`运算符获取推荐。我将所有目标价格添加到一个临时价格向量中，并使用`std::accumulate`算法计算所有价格的总和。最后，该成员函数返回总和除以这些价格推荐的数量，也就是所需的平均目标价格。\n\
