- '# 引言


  这是一本面向程序员的实操书籍，旨在帮助读者了解 C++20 在金融行业中的应用。本书重点介绍了常用于编写金融软件的语言部分，包括 STL（标准模板库）、模板以及对数值库的支持。我还描述了金融工程中的许多重要问题，这些问题正是投资银行和对冲基金中金融程序员与量化分析师的日常工作。


  本书提供了覆盖所有主要工具和概念的实操示例，用于构建金融应用的可行解决方案。每一章都教会读者如何使用高级 C++ 概念，以及现代 C++ 开发者使用的基本构建库，例如
  STL 和 Boost。我讨论了如何借助面向对象和基于模板的编程知识，创建正确且高效的应用程序。我只假设读者具备 C 和 C++ 的基础知识，并以此为基础，解释熟悉现代
  C++ 的开发人员已经掌握的那些技术。


  在撰写本书的过程中，我致力于为那些试图利用编程知识，在银行、对冲基金及金融行业其他公司等金融机构中熟练掌握编程风格的读者提供巨大价值。然而，我以逻辑清晰且结构化的方式介绍了本书涵盖的主题，即便是新手程序员也能吸收开发
  C++ 金融应用所需的最重要主题和能力。


  本书的一个重要特点是专注于特定主题和金融问题的实用解决方案。虽然重点不在于金融的理论方面，但我确实讨论了诸如数值算法、积分技术和用于衍生品估值的微分方程等主题。此外，读者将能够很好地理解如何使用现代
  C++ 概念来建模这类问题。


  面向程序员的金融文献通常有大量从学术角度撰写的书籍，大部分篇幅花在讨论算法背后的数学概念上，而非开发者需要克服的软件工程挑战。因此，在本书中，我决定通过代码示例的形式，专注于常见编程问题的可行解决方案，为读者的阅读努力提供更多价值。


  ## 目标读者


  本书面向已经具备 C、C++ 或其他主流语言编程实践知识的读者。他们通常是计算机科学、工程学、物理学和数学领域的专业人士或高级学生，出于个人提升或职业原因，对学习
  C++20 金融编程感兴趣。本书也适用于金融机构中从事 C++ 编程的从业者，他们可以将本书用作常见开发问题的即用参考。


  通过阅读本书，你将学习如何使用现代 C++20 技术来实现实际应用。作为一种多范式语言，C++ 在每个应用领域的使用方式略有不同。因此，用于开发桌面应用的技能，与编写高性能软件所用的技能不尽相同。大多数重要的高性能金融应用都是用
  C++ 编写的，这意味着想要进入这个高收益市场的程序员需要掌握语言中几个特定且相关的部分。因此，对于那些希望在有效提升知识的同时，学习现代应用和高性能软件开发中最受追捧、最具市场价值的技能组合之一的开发者来说，本书将是一个绝佳的选择。



  ## 内容概览


  以下是各章节内容的简要概述。


  **第 1 章——固定收益市场**：固定收益市场在金融工程领域中占据很大比重，并为其从业者带来了独特的计算挑战。`C++` 编程在该领域应用广泛，能够以惊人的速度计算利率和现金流变化，读者将在本章中了解到这一点。我将提供可用于解决固定收益市场中最常见问题的
  `C++` 代码示例。这些示例包含针对以下主题的 `C++` 算法：(1) 利率计算，(2) 现值计算，(3) 现金流，以及 (4) 债券估值。


  **第 2 章——股票市场**：股票市场具有多样性，提供了种类繁多的投资工具。因此，用于股票市场金融分析的计算技术数量及复杂度持续增长。在本章中，我将针对股票市场及其衍生品中的若干精选问题，展示
  `C++` 编程示例。涵盖的编程主题如下：(1) 移动平均计算，(2) 波动率计算，(3) 工具相关性计算，以及 (4) 基本面指标计算。


  **第 3 章——金融领域的 C++编程技术**：`C++` 语言是作为 `C` 语言的扩展而创建的，这意味着大多数用 `C` 编写的程序也是有效的 `C++`
  程序。然而，优秀的 `C++` 程序需要利用该语言提供的高级特性来控制程序复杂度。这对于金融应用尤为重要，因为我们希望创建快速且富有表现力的应用程序。在本章中，我将探讨金融
  `C++` 程序员用于以更少精力编写更优代码的基本技术，包括：(1) 类模板，(2) 自动指针，(3) 共享指针，(4) 资源获取即初始化 (`RAII`)，(5)
  自动类型推导，(6) 异常处理，以及 (7) 运算符重载。


  **第 4 章——金融应用的常用库**：现代 `C++` 编程使用各种库来简化快速、标准合规类的创建。`STL` 提供了一组通用的标准容器，几乎可用于任何情况。熟练掌握
  `STL` 是高效 `C++` 编程所需的核心技能之一。另一组常见的类包含在 `Boost` 库中，它通常是下一版 `C++` 标准的基础。读者将学习以下主题：(1)
  `STL` 容器，(2) `STL` 算法，(3) `boost` 库，以及 (4) 日期和时间处理。


  **第 5 章——设计数值类**：金融应用的核心是一组精心设计的数值类。本章将介绍如何创建能在生产代码中高效运行的数值类。您还将看到 `C++` 示例，展示如何与现有的数值类和算法进行集成。您将学习如何：(1)
  实现矩阵类，(2) 使用模板在编译时进行计算，(3) 用 `C++` 模板表示比率，以及 (4) 生成统计数据。


  **第 6 章——绘制金融数据**：金融编程中的一项常见活动是生成数据，这些数据需要被交易员或其他金融利益相关者可视化查看。大多数情况下，数据需要以图表形式绘制出来以便于观察。我将给出一些示例，展示如何使用常用库在
  `C++` 程序中绘制数据。您将学习以下主题：(1) 使用 `Gnuplot` 绘制数据，(2) 设计用于创建 `Gnuplot` 图表的类，以及 (3) 使用
  `Qt` 从 `GUI`（图形用户界面）应用程序进行绘图。


  **第 7 章——线性代数**：线性代数 (`LA`) 技术贯穿于金融工程领域。因此，理解如何将传统的 `LA` 方法应用于 `C++` 至关重要。基于此目标，我将展示几个示例，说明如何使用一些最常见的
  `LA` 算法。在本章中，您还将学习：(1) 将现有的 `LA` 库集成到您的代码中，(2) 基本的 `LA` 运算，(3) `BLAS`（基本线性代数子程序）库，以及
  (4) 使用 `BLAS` 计算矩阵的行列式。


  **第 8 章——插值**：插值是一种常用技术，用于寻找逼近一组数据点的数学函数。快速插值是金融工程多个领域中高性能算法的秘诀。本章将向您展示一些编程示例，涵盖了几种最常见的插值方法，并提供了高效的
  `C++` 实现。本章讨论的主要技术有：(1) 线性插值和 (2) 多项式插值。


  **第 9 章——计算方程的根**：方程是金融工程算法的基本组成部分之一，因此能够高效地计算方程的根至关重要。在本章中，您将找到用于不同方程求根方法的算法，以及它们的工作原理和适用场景的说明。主题包括：(1)
  二分法，(2) 割线法，以及 (3) 牛顿法。


  **第 10 章——数值积分**：函数积分是许多金融算法中的常见部分。然而，精确求解某些类型的方程非常困难，此时需要采用数值方法。在本章中，您将看到可直接应用于常见积分问题的
  `C++` 代码示例。我还会讨论这些方法的性能和精度。本章的编程示例涵盖以下主题：(1) 中点法，(2) 梯形法，以及 (3) 辛普森法。


  **第 11 章——求解 ODE 和 PDE**：微分方程是许多用于分析股票市场的技术的核心。存在多种可用于 `C++` 实现的求解和分析常微分方程 (`ODE`)
  以及偏微分方程 (`PDE`) 的方法。在本章中，我将提供编程示例，涵盖 `ODE` 和 `PDE` 建模及应用的关键方面。涵盖的主题包括：(1) 求解 `ODE`，(2)
  使用龙格-库塔法，以及 (3) 求解布莱克-舒尔斯方程。


  **第 12 章——优化**：优化指的是一组用于寻找函数最小值或最大值的技巧。优化策略被应用于金融工程的多个领域。在本章中，我将讨论可用于实现优化算法常见功能的编程技术。我会简要解释一些技术及其在
  `C++20` 中的典型实现方式。您将学习：(1) 建模优化问题，(2) 与线性规划 (`LP`) 求解器交互，(3) 求解二维 `LP` 问题，以及 (4)
  混合整数规划模型。




  **第 13 章 — 资产与投资组合优化**：投资组合经理必须根据其预定义的组合目标，面对为最优表现平衡投资组合的问题。基于优化的技术已被开发出来，用于处理一些最常见的投资组合构建问题。在本章中，我们考虑使用`C++`进行投资组合优化的算法。我们考虑如何设计这样的优化代码，以便获得尽可能快速和准确的结果。主题包括(1)创建投资组合模型，(2)执行资源分配，以及(3)使用线性技术进行投资组合优化。


  **第 14 章 — 蒙特卡罗方法**：在用于权益市场分析的其他编程技术中，蒙特卡罗模拟因其广泛的适用性和易于实现而占有特殊地位。例如，这些方法可用于预测价格或验证买入策略。在本章中，我提供可用作基于模拟算法一部分的编程示例，主题包括(1)随机数生成，(2)通过蒙特卡罗方法进行优化，以及(3)用于价格预测的模拟模型。


  **第 15 章 — 扩展金融库**：`C++`是一种完整的语言，可用于开发最复杂的软件。然而，有时将`C++`库与脚本语言结合使用是有益的，这可以简化原型和其他非关键应用程序的创建。在本章中，我将向您展示如何将文本中讨论的解决方案和算法用作金融行业常用脚本语言的外部库。特别是，您将学习如何(1)使用`Python`扩展`C++`，以及(2)使用`Lua`脚本扩展`C++`。


  **第 16 章 — 将 C++代码与 R 和 Maxima 结合使用**：`C++`中的金融算法不仅可用作可执行代码的一部分，也可用作其他建模和开发环境的一部分。在本章中，我将向您展示如何将金融库集成到两个用于金融分析的知名仿真和建模环境中：`R`和`Maxima`。您将看到如何为这些环境创建可加载模块，以一种可供`R`和`Maxima`编写的脚本直接使用的方式整合复杂的`C++`算法。


  **第 17 章 — 多线程**：金融应用有非常严格的性能要求。提高响应时间的一种常见方法是使用并发和并行编程技术，例如多线程。`C++`可用于编写响应非常快的多线程应用程序，在本章中，我将探索用于创建和管理线程的算法，并应用于金融问题。我还涵盖了数据访问同步这一重要主题。主题包括(1)创建线程，(2)保护共享内存，(3)同步技术，以及(4)使用标准库的线程。


  **附录 A — C++20 新特性**：`C++`是一种不断发展的语言，在过去的几年中，我们看到了为带来亟需的更新而重新做出的努力。最新的成果是`C++17`和`C++20`标准，主要的`C++`编译器正在快速整合这些特性。在附录中，我涵盖了展示其中一些特性如何能改进您的代码并简化新程序和库开发的示例。您将学习到诸如(1)`auto`变量，(2)闭包，(3)右值，(4)`const`表达式，以及(5)初始化器列表等新特性。


  ## 第二版引言


  在本书的第二版中，示例和文本已被修订以符合最新的`C++`标准，即`C++20`。虽然我们的大部分示例在新的标准下仍能编译并正常运行，但我们感到有必要介绍新的`C++`特性，这将使开发金融应用更加容易。


  例如，附录现在呈现了一些仅在`C++20`中可用新特性。我们还解释了如何在标准库中使用线程，以及其他改进。所有示例都已测试，以确保我们符合最新标准。


  ## 编译代码示例


  本书中给出的示例已全部在`Windows`上使用`MingW gcc`编译器，以及在`Mac OS X`上使用`Xcode 12 IDE`进行了测试。然而，您应该能够使用任何实现`C++20`标准的、符合标准的`C++`编译器来构建代码。例如，`gcc`在`Linux`和其他平台上可用，`Microsoft
  Visual Studio`同样适用于`Windows`。


  如果您使用`Mac OS X`并且计算机上未安装`Xcode`，您可以免费从苹果开发者网站[`http://developer.apple.com`](http://developer.apple.com)下载。代码也可以在命令行编译，正如各章中所解释的那样。


  如果您希望在`Windows`上使用`MingW`，您可以从网站[`www.mingw.org`](http://www.mingw.org)下载。


  一旦`MingW`安装完成，从开始菜单的`MingW`程序组启动命令提示符。然后，您可以输入`gcc`来检查编译器是否正确安装。


