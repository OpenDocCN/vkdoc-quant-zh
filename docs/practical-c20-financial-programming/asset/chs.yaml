  \ != &p)\n{\nm_f = p.m_f;\n}\nreturn *this;\n}\ndouble EulersMethod::solve(int n,\
  \ double x0, double y0, double c)\n{\n// 问题： y' = f(x,y) ;  y(x0) = y0\nauto x =\
  \ x0;\nauto y = y0;\nauto h = (c - x0)/n;\ncout  {\npublic:\ndouble operator()(double\
  \ x) { return x; } // 未使用\ndouble operator()(double x, double y);\n};\ndouble EulerMethSampleFunc::operator()(double\
  \ x, double y)\n{\nreturn  3 * x + 2 * y + 1;\n}\nint main()\n{\nEulerMethSampleFunc\
  \ f;\nEulersMethod m(f);\ndouble res = m.solve (100, 0, 0.25, 2);\ncout << \" 结果是\
  \ \" << res << endl;\nreturn 0;\n}\n清单 11-1\n欧拉法求解常微分方程的实现\n```\n\n运行代码\n\n你可以使用任何符合标准的编译器（例如\
  \ `gcc`），从清单 11-1 中的源代码生成二进制可执行文件。然后，执行代码即可获得示例结果，例如以下针对示例方程 `f(x) = 3*x + 2*y +\
  \ 1` 的结果：\n\n```\n./eulersMethod\nh 为 0.02\nF: 1.5     G: 1.62    x: 0.02 y: 0.2812\n\
  F: 1.6224  G: 1.7473  x: 0.04 y: 0.314897\nF: 1.74979 G: 1.87979 x: 0.06 y: 0.351193\n\
  F: 1.88239 G: 2.01768 x: 0.08 y: 0.390193\n// ...\nF: 137.938 G: 143.515 x: 1.94\
  \ y: 68.4034\nF: 143.627 G: 149.432 x: 1.96 y: 71.334\nF: 149.548 G: 155.59  x:\
