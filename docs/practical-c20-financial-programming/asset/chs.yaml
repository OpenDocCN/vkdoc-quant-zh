  0 10.0977 10.9116 1.69344 -9.08163\n10.0977 10.9116 1.69344 -9.08163 -11.5071\n\
  10.9116 1.69344 -9.08163 -11.5071 -3.35299\n1.69344 -9.08163 -11.5071 -3.35299 7.88384\n\
  -9.08163 -11.5071 -3.35299 7.88384 11.8723\n```\n\n### 计算矩阵的行列式\n\n编写 C++代码，使用 uBLAS\
  \ 中的类计算矩阵的行列式。\n\n\n\n### 解决方案\n\n计算矩阵的行列式是线性代数理论中的经典问题之一。该值可用于判断方程组（由系数矩阵表示）是否存在唯一解。\n\
  \n为了在 C++ 中轻松计算矩阵的行列式，你可以使用 boost uBLAS 库中的一些类和函数。这些函数利用了 `matrix` 类，该类是 uBLAS 中矩阵的内部表示形式之一。\n\
  \n解决此类问题的常见方案采用一种简单而优雅的算法，该算法在任何线性代数课程中都会教授。基本思路是使用递归策略计算子矩阵的行列式，直至找到完整矩阵的行列式。然而，`computeDeterminant`\
  \ 函数所使用的算法在计算上更为高效，因为它利用了 LU 分解的结果。LU 分解是一种将矩阵分解为下三角和上三角分量的方法。\n\n如果矩阵是非奇异的，`lu_factorize`\
  \ 函数将返回零，这意味着该矩阵可逆，并且其对应的线性系统可使用高斯消元法求解。随后，矩阵会通过高斯消元过程进行重排。此外，还会使用一个置换矩阵来记录消元过程的步骤。\n\
  \n基于这些信息，行列式计算的算法被编码在 `computeDeterminant` 函数中。它利用主对角线存储的值和置换矩阵中的信息来计算给定矩阵对应的行列式。你可以在下一节中看到该方法的完整算法。\n\
  \n### 完整代码\n\n清单 7-3 展示了 uBLAS 库的一个示例。如上一节所述，`determinantSample` 函数使用 uBLAS 中的一些模板来计算矩阵的行列式。\n\
  \n```cpp\n//\n// Determinant.cpp\n#include <boost/numeric/ublas/matrix.hpp>\n#include\
  \ <boost/numeric/ublas/vector.hpp>\n#include <boost/numeric/ublas/lu.hpp>\n#include\
  \ <iostream>\n#include <cmath>\nnamespace ublas = boost::numeric::ublas;\nusing\
  \ std::cout;\nusing std::endl;\n// 根据给定的置换计算符号。\n// 每次置换变化时翻转符号。\nint getDeterminantSign(const\
  \ ublas::permutation_matrix& pm)\n{\nint sign = 1;\nfor (int i = 0; i < pm.size()\
  \ ; ++i)\n{\nif (pm(i) != i)\nsign *= -1;\n}\nreturn sign;\n}\n// 使用置换矩阵计算行列式。\n\
  double computeDeterminant(ublas::matrix<double>& m)\n{\nublas::permutation_matrix\
  \ pm(m.size1());\ndouble det = 1.0;\nif (ublas::lu_factorize(m,pm))\n{\ndet = 0.0;\n\
  }\nelse\n{\nfor(int i = 0; i < m.size1(); i++)\ndet *= m(i,i);\ndet = getDeterminantSign(pm)\
  \ * det;\n}\nreturn det;\n}\nint main (int argc, const char * argv[])\n{\nublas::matrix<double>\
  \ M(3, 3);\nfor (unsigned i = 0; i < M.size1() ; ++i)\n{\nfor (unsigned j = 0; j\
  \ < M.size2() ; ++j)\n{\nM(i,j) = sin(3 * j);\n}\n}\ndouble determinant = computeDeterminant(M);\n\
  cout << \" determinant value is \" << determinant\n<< \" for matrix \" << M << endl;\n\
  }\n```\n\n*清单 7-3 Determinant.cpp*\n\n### 结论\n\n本章包含了几个用于 C++ 线性代数计算的编程示例。本次讲解的目标之一，是展示数学导向的代码如何被金融应用开发人员使用。线性代数是后续章节将要探讨的许多计算技术（如数学规划和投资组合优化）的基础。\n\
  \n在本章中，我首先介绍了一些重要的线性代数库。由于线性代数是一个高度专业化的领域，对程序员来说，最好的方法就是使用包含该领域专家编写的、经过充分测试的组件代码。基础线性代数领域，计算数学的标准是\
  \ BLAS 库。尽管 BLAS 是一个 Fortran 和 C 语言库，但其概念已被移植到许多其他语言中。在本章中，你了解了 uBLAS，它是 boost 库的一个组件，实现了与\
  \ BLAS 相同级别的功能。然而，它是通过使用现代 C++ 技术（如类和模板）来实现的。这可以被视为一种更简便地实现 BLAS 功能的方式，同时支持高级的 C++\
  \ 接口。\n\n清单 7-1 中的第一个示例展示了如何使用 uBLAS 对向量和标量执行基本的（第一级）运算。`VectorOperations` 类展示了如何使用\
  \ uBLAS 框架调用这些基本概念。\n\n更高级的运算可用于矩阵。第二个示例（清单 7-2）包含了与 uBLAS 中矩阵和向量交互的信息和代码示例。uBLAS\
  \ 可以轻松执行的简单运算包括矩阵的标量乘法、向量乘法、转置以及矩阵-矩阵乘法。\n\n清单 7-3 的示例展示了如何将这些概念结合使用来计算矩阵的行列式。为了便于解决这个问题，你可以使用\
  \ uBLAS 提供的 LU 分解函数。这表明，这些线性代数库中的一些复杂算法可以轻松用于解决实际问题。\n\n在下一章中，我们将继续探索金融应用中使用的数学工具。我将向你展示几个关于插值的示例，这是一种常用于在数据集（包括金融数据）中寻找趋势的技术。与其他计算技术一起，插值被广泛应用于交易策略的开发和分析中。\n\
  \n"
- "# 8. 插值\n\n插值是一种常用技术，它基于输入的一组点来逼近一个数学函数。快速插值是金融工程多个领域高性能算法的秘诀，这将在后续章节中探讨。本章展示了几个编程示例，涵盖了插值技术的一些最常见方面，以及它们在\
  \ C++ 中的高效实现。你将探索应用中使用的核心流程，并了解它们在实际中如何运作的示例。\n\n以下是本章涵盖的一些主题：\n\n- **插值示例：** 简要讨论展示插值在金融问题中有效性的示例。\n\
  - **线性插值：** 线性插值是最简单的插值技术之一，它使用可以用线段表示的线性函数。该技术的快速特性使其成为针对难以计算的函数最常用的插值形式之一。\n\n\
  \n\n## 多项式插值\n\n若需要函数的不同部分之间平滑过渡，则无法直接使用线性插值。多项式插值允许使用单个函数，通过一个高次多项式来近似所有给定的点。你将了解如何构造这个多项式，并为定义域的每个值返回所需的函数。\n\
  \n## 线性插值\n\n针对使用线性近似对给定数据点集进行插值的问题，编写解决方案及 C++ 代码。\n\n### 解决方案\n\n插值是根据给定点集，寻找可用于近似未知函数的一个函数（或一组函数）的过程。该过程的输入是您想要插值的点，输出是一个通用函数，可用于计算输入集之外点的未知值。\n\
  \n例如，假设您有一个由一组观测值组成的时间序列。通常需要找到一个生成这些点的未知函数。对该未知函数的估计也可用于计算所需时间点的相应值。\n\n插值已被应用于科学与工程多个领域，作为近似函数的一种方法。这可能是必要的，因为原始函数确实未知（例如经验过程的情况），或者因为该函数很难精确计算。在金融领域，插值也扮演着重要角色，通常是更复杂算法的一部分。例如，在金融时间序列中，插值允许从业者计算难以直接计算的时间序列值，同时只使用未知函数的近似值。此外，在某些应用中，插值还可用于预测值，至少对于短期预测是这样。在此角色中，它也可以作为交易算法中的一个简单预测组件。\n\
  \n本节将介绍如何使用线性函数进行插值。这是对点集进行插值的最简单方法，因为它每次只需要两个点来直接连接输入值。例如，假设您有一组点，如图 8-1 所示。\n\n\
  ![../images/323908_2_En_8_Chapter/323908_2_En_8_Fig1_HTML.jpg](img/323908_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1 第一个示例中点的插值图\n\n```\ny1 = (10,0.6), y2 = (20,0.11), y3 = (30,1.1), y4 = (40,1.62),\
  \ y5 = (49,1.4).\n```\n\n这些点不需要均匀间隔，尽管当需要线性插值时，均匀间隔可能效果更好。利用这些点，可以想象一种简单的插值方法。创建插值的策略是：基于点的第一维度（图\
  \ 8-1 中的 x 轴）对输入点进行排序，然后用一条线连接恰好位于所需 x 值之前和之后的两个点。然后，插值由下图 8-1 之后列表的步骤 4 中的公式给出。\n\
  \n因此，线性插值算法可总结为以下步骤：\n\n1.  读取输入值`(x[i], y[i])`和所需的坐标值`x`。\n2.  按第一个坐标`(x[i])`的递增顺序对输入进行排序。\n\
  3.  计算第一对点`(x[i], y[i])`，`(x[j], y[j])`，使得`j = i + 1`且`x`位于`x[i]`和`x[j]`之间。\n4.\
  \  使用以下方程确定对应于`x`的`y`值：\n\n![$$ y=\\frac{x-{x}_1}{x_0-{x}_1} $$](img/323908_2_En_8_Chapter_TeX_Equa.png)\n\
  \n您可以轻松地在 C++ 中实现此算法，以便为每个`x`值计算函数。我将介绍`LinearInterpolation`作为负责存储必要数据以及使用此插值技术计算点的主类。该类的构造函数旨在减少创建新对象的开销。该类提供了`setPoints`成员函数作为定义已知插值点的方法。该成员函数保留作为参数传递的值。它还确保点按\
  \ x 值递增的顺序存储。这是通过一个简单的算法对 x 值进行排序来实现的（使用标准函数`std::sort`）。\n\n### 完整代码\n\n```cpp\n\
  //\n//  LinearInterpolation.h\n#ifndef __FinancialSamples__LinearInterpolation__\n\
  #define __FinancialSamples__LinearInterpolation__\n#include \nclass LinearInterpolation\
  \ {\npublic:\nLinearInterpolation();\nLinearInterpolation(const LinearInterpolation\
  \ &p);\n~LinearInterpolation();\nLinearInterpolation &operator=(const LinearInterpolation\
  \ &p);\nvoid setPoints(const std::vector &xpoints, const std::vector &ypoints);\n\
  double getValue(double x);\nprivate:\nstd::vector m_x;\nstd::vector m_y;\n};\n#endif\
  \ /* defined(__FinancialSamples__LinearInterpolation__) */\n//\n//  LinearInterpolation.cpp\n\
  #include \"LinearInterpolation.h\"\nLinearInterpolation::LinearInterpolation()\n\
  : m_x(),\nm_y()\n{\n}\nLinearInterpolation::LinearInterpolation(const LinearInterpolation\
  \ &p)\n: m_x(p.m_x),\nm_y(p.m_y)\n{\n}\nLinearInterpolation::~LinearInterpolation()\n\
  {\n}\nLinearInterpolation &LinearInterpolation::operator=(const LinearInterpolation\
  \ &p)\n{\nif (this != &p)\n{\nm_x = p.m_x;\nm_y = p.m_y;\n}\nreturn *this;\n}\n\
  void LinearInterpolation::setPoints(const std::vector &xpoints,\nconst std::vector\
  \ &ypoints)\n{\nm_x = xpoints;\nm_y = ypoints;\n// update points to become sorted\
  \ on x axis.\nstd::sort(m_x.begin(), m_x.end());\nfor (int i=0; i m_x[m_x.size()-1])\n\
  {\nreturn 0; // outside of domain\n}\nfor (int i=0; i= x)\n{\nx1 = m_x[i];\ny1 =\
  \ m_y[i];\nbreak;\n}\n}\nreturn y0 * (x-x1)/(x0-x1) +  y1 * (x-x0)/(x1-x0);\n}\n\
  int main()\n{\ndouble xi = 0;\ndouble yi = 0;\nvector xvals;\nvector yvals;\nwhile\
  \ (cin >> xi)\n{\nif (xi == -1)\n{\nbreak;\n}\nxvals.push_back(xi);\ncin >> yi;\n\
  yvals.push_back(yi);\n}\ndouble x = 0;\ncin >> x;\nLinearInterpolation li;\nli.setPoints(xvals,\
  \ yvals);\ndouble y = li.getValue(x);\ncout << \"interpolation result for value\
  \ \" << x << \" is \" << y << endl;\nreturn 0;\n}\n```\n\n### 运行代码\n\n例如，再次考虑图 8-1\
  \ 所示示例中的点。要计算值 27 的线性插值，您需要执行应用程序并输入以下数据：\n\n```\n./linearInterpolation\n10 0.6\n\
  20 0.11\n30 1.1\n40 1.62\n49 1.4\n\ninterpolation result for value 27 is 0.803\n\
  ```\n\n## 多项式插值\n\n用 C++ 为给定点集构造一个多项式插值。\n\n\n\n### 解决方案\n\n在前一个示例中，你了解了如何通过分段线性方程，利用数据点在连续区间内进行插值。然而，尽管线性插值在大量实际场景中可行，但这种近似方法的问题在于生成的曲线不光滑。这意味着曲线在**不同线段**的交界处会包含表示函数过渡的拐点。从数学上讲，由于这种突然的过渡，这样的函数被认为是**不可微**的。在某些应用中，这种可察觉的变化是不期望的，你可能希望以一种使观测点之间过渡平滑的方式来进行插值。\n\
  \n为了避免使用线性插值所描述的问题，可以采用更复杂的方案，即使用更高次的多项式来平滑过渡。更重要的是，使用这种方法求得的单个多项式可以同时对所有给定数据点进行插值。这种插值的结果是，你只需要一个多项式方程即可为任何所需输入生成值。\n\
  \n多项式插值基于这样一个数学事实：给定一个次数足够高的多项式，可以找到一个对应的多项式函数，该函数恰好通过作为输入提供的那些点。由于多项式的某些已知代数性质，这一点是得到保证的。例如，假设我们有以下点序列（与线性插值示例中使用的点相同）：\n\
  \n```\ny1 = (10,0.6), y2 = (20,0.11), y3 = (30,1.1), y4 = (40,1.62), y5 = (49,1.4).\n\
  ```\n\n多项式插值算法会返回一个基于由一组系数定义的多项式的值。利用这些信息，你可以计算任何中间点，甚至超出给定观测范围的点，因为多项式通常对所有实数都有定义。你还可以使用计算出的多项式来绘制插值函数的值，如图\
  \ 8-2 所示。\n\n![../images/323908_2_En_8_Chapter/323908_2_En_8_Fig2_HTML.jpg](img/323908_2_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2** 使用少量观测值进行插值的多项式函数：请注意，与使用线段的图 8-1 中的解决方案不同，该多项式函数是光滑的\n\n此处用于解决这个多项式插值问题的技术称为**拉格朗日插值算法**。使用拉格朗日插值方法，对于每组\
  \ *n*+1 个点 (*x*<sub>i</sub>, *y*<sub>i</sub>)，你可以创建一个次数为 *n* 且通过这些点的多项式。使用给定的输入点，多项式系数的通用公式如下：\n\
  \n![$$ {L}_k(x)=\\frac{\\left(x\\kern0.5em -\\kern0.5em {x}_0\\right)\\left(x\\\
  kern0.5em -\\kern0.5em {x}_1\\right)\\dots \\left(x\\kern0.5em -\\kern0.5em {x}_{k-1}\\\
  right)\\left(x\\kern0.5em -\\kern0.5em {x}_{k+1}\\right)\\dots \\left(x\\kern0.5em\
  \ -\\kern0.5em {x}_n\\right)}{\\left({x}_k\\kern0.5em -\\kern0.5em {x}_0\\right)\\\
  left({x}_k\\kern0.5em -\\kern0.5em {x}_1\\right)\\dots \\left({x}_k\\kern0.5em -\\\
  kern0.5em {x}_{k-1}\\right)\\left({x}_k\\kern0.5em -\\kern0.5em {x}_{k+1}\\right)\\\
  dots \\left({x}_k\\kern0.5em -\\kern0.5em {x}_n\\right)} $$](img/323908_2_En_8_Chapter_TeX_Equb.png)\n\
  \n注意，该函数跳过了 *x*<sub>k</sub> 的值，以避免分子和分母中出现零项。现在，用于插值输入值 *x*<sub>k</sub> 的完整多项式表示可以使用系数\
  \ *L*<sub>k</sub>(*x*) 写成如下形式：\n\n![$$ P(x)={y}_0{L}_0(x)+\\cdots +{y}_n{L}_n(x)\
  \ $$](img/323908_2_En_8_Chapter_TeX_Equc.png)\n\n这是一个可用于提供任何值的插值的函数，给定 *n*+1 个输入观测值\
  \ (*x*<sub>i</sub>, *y*<sub>i</sub>)。该公式的证明超出了本节的目标，但请注意，当输入值 *x* 是已知的某个 *x*<sub>i</sub>\
  \ 时，除了 *L*<sub>i</sub>(*x*) 项外，所有项都会因为包含分量 *x* – *x*<sub>i</sub> 而结果为零。然而，在那种情况下，分子与分母相同，结果值为\
  \ 1。因此，对于这些值，解正如预期的那样就是 *y*<sub>i</sub>。\n\n使用这个多项式函数，我们可以创建一个 C++ 类，通过模拟期望的多项式来实现插值机制。这通过\
  \ `PolynomialInterpolation` 类来实现。该类的设计与 `LinearInterpolation` 类似，存储通过 `setPoints`\
  \ 成员函数传入的 x 和 y 值。利用这些信息，`PolynomialInterpolation` 能够基于初始点执行必要的计算。\n\n实际工作是在 `getValue`\
  \ 成员函数中计算多项式插值，该函数重写如下：\n\n```\ndouble PolynomialInterpolation::getPolynomial(double\
  \ x)\n{\ndouble polynomialValue = 0;\nfor (size_t i=0; i<m_x.size(); ++i)\n{\n//\
  \ 计算分子\ndouble num = 1;\nfor (size_t j=0; j<m_x.size(); ++j)\n{\nif (j!=i)\n{\n\
  num *= x - m_x[j];\n}\n}\n// 计算分母\ndouble den = 1;\nfor (size_t j=0; j<m_x.size();\
  \ ++j)\n{\nif (j!=i)\n{\nden *= m_x[i] - m_x[j];\n}\n}\n// 第 i 项的值\npolynomialValue\
  \ += m_y[i] * (num/den);\n}\nreturn polynomialValue;\n}\n```\n\n计算以迭代方式进行，在 `for`\
  \ 循环的每一步中，计算其中一个多项式 *L*<sub>k</sub>(*x*) 并将其累加到局部变量 `polynomialValue` 中。循环内部可以分为三部分。第一部分，计算分子，即所有项\
  \ *x – x*<sub>j</sub> 的乘积，当 *i = j* 时该项不参与计算。第二部分是分母的计算，与第一步非常相似，你查看原始公式就能确认。分母的值存储在局部变量\
  \ `den` 中。第三步，将 *y* 的值乘以前两步计算出的分子与分母构成的分数。\n\n前面所述算法的复杂度取决于给定的输入。你提供的输入值越多，该算法执行时间就越长。时间变化与输入值的数量成二次关系，因为对于每个值，我们需要在第二层循环内执行一个\
  \ `for` 循环，并且每个这样的循环运行的次数等于所使用的点数。就计算复杂度而言，这被称为具有 *O*(*n*²) 的时间复杂度。\n\n### 完整代码\n\
  \n\n```cpp\n//\n//\n//  PolymonialInterpolation.h\n#ifndef __FinancialSamples__PolymonialInterpolation__\n\
  #define __FinancialSamples__PolymonialInterpolation__\n#include <vector>\n\nclass\
  \ PolynomialInterpolation {\npublic:\n    PolynomialInterpolation();\n    PolynomialInterpolation(const\
  \ PolynomialInterpolation &p);\n    ~PolynomialInterpolation();\n    PolynomialInterpolation\
  \ &operator=(const PolynomialInterpolation &);\n    void setPoints(const std::vector<double>\
  \ &x, const std::vector<double> &y);\n    double getPolynomial(double x);\n\nprivate:\n\
  \    std::vector<double> m_x;\n    std::vector<double> m_y;\n};\n\n#endif /* defined(__FinancialSamples__PolymonialInterpolation__)\
  \ */\n\n//\n//  PolymonialInterpolation.cpp\n#include \"PolymonialInterpolation.h\"\
  \n\nPolynomialInterpolation::PolynomialInterpolation()\n    : m_x(),\n      m_y()\n\
  {\n}\n\nPolynomialInterpolation::PolynomialInterpolation(const PolynomialInterpolation\
  \ &p)\n    : m_y(p.m_y),\n      m_x(p.m_x)\n{\n}\n\nPolynomialInterpolation::~PolynomialInterpolation()\n\
  {\n}\n\nPolynomialInterpolation &PolynomialInterpolation::operator=(const PolynomialInterpolation\
  \ &p)\n{\n    if (this != &p)\n    {\n        m_x = p.m_x;\n        m_y = p.m_y;\n\
  \    }\n    return *this;\n}\n\nvoid PolynomialInterpolation::setPoints(const std::vector<double>\
  \ &x,\n                                       const std::vector<double> &y)\n{\n\
  \    m_x = x;\n    m_y = y;\n}\n\ndouble PolynomialInterpolation::getPolynomial(double\
  \ x)\n{\n    double polynomialValue = 0;\n    for (size_t i = 0; i < m_x.size();\
  \ i++)\n    {\n        double product = m_y[i];\n        for (size_t j = 0; j <\
  \ m_x.size(); j++)\n        {\n            if (i != j)\n            {\n        \
  \        product = product * ((x - m_x[j]) / (m_x[i] - m_x[j]));\n            }\n\
  \        }\n        polynomialValue += product;\n    }\n    return polynomialValue;\n\
  }\n\n#include <iostream>\n#include <vector>\n\nint main()\n{\n    std::vector<double>\
  \ xvals;\n    std::vector<double> yvals;\n    double xi, yi;\n    while (std::cin\
  \ >> xi)\n    {\n        if (xi == -1)\n        {\n            break;\n        }\n\
  \        xvals.push_back(xi);\n        std::cin >> yi;\n        yvals.push_back(yi);\n\
  \    }\n    double x = 0;\n    std::cin >> x;\n    PolynomialInterpolation pi;\n\
  \    pi.setPoints(xvals, yvals);\n    double y = pi.getPolynomial(x);\n    std::cout\
  \ << \"interpolation result for value \" << x << \" is \" << y << std::endl;\n \
  \   return 0;\n}\n```\n\n### 运行代码\n\n要运行上述代码，首先需要使用 C++ 编译器（如 `gcc`）进行编译。然后可以按如下方式执行代码：\n\
  \n```\n./polyInterpolation\n10 0.6\n20 0.11\n30 1.1\n40 1.62\n49 1.4\n\ninterpolation\
  \ result for value 27 is 0.795433\n```\n\n该代码使用刚刚显示的数据多次执行。图 8-2 展示了结果数据的图示。请注意，图中显示了一个通过输入点集的平滑函数。这证明了上述代码计算的多项式是对给定点集的一个良好且平滑的插值结果。\n\
  \n### 结论\n\n在本章中，你学习了插值法——一种在已知值数据集基础上为函数寻找合理近似的数学技术。插值法在金融数据分析中发挥着重要作用，因为它提供了一种分析和简化复杂函数计算的方法。它还可以让人们对未来价格变化进行简单预测，并有助于更好地理解历史数据。你已看到几个编程示例，它们说明了如何在\
  \ C++ 编程上下文中使用插值法。\n\n最初，你学习了线性插值法，这是一种在仅知道原函数少数几个点时进行插值的简单方法。该技术仅使用线性函数来执行所需的插值。你看到了一个示例\
  \ C++ 类，它可用于为函数定义域内的任意给定值返回插值结果。\n\n接下来，你了解了如何利用多项式提供的更好近似技术来插值函数值。使用多项式，你可以创建一个平滑（可微）的函数，该函数在\
  \ `n+1` 个点上经过给定的点，其中 `n` 是多项式的次数。你学习了一个简单的公式——拉格朗日法，它可用于从任意给定点集创建此类多项式插值。你还学习了如何编写实现该算法的\
  \ C++ 类。我提供了一个完整示例，演示如何使用此类对给定值集生成平滑插值。\n\n在下一章中，你将学习金融应用中使用的另一项重要数学技能。方程求根是一项基础技术，它可以帮助你找到经济和工程领域许多重要问题的解。你将看到如何在\
  \ C++ 中实现和使用方程求根方法。\n\n"
- "# 9. 计算方程的根\n\n解方程是许多工程和科学算法的基石之一。一个典型例子是使用布莱克-舒尔斯模型进行期权和衍生品定价所需的计算。随着金融算法日益复杂，通常需要计算各种方程的结果。这些结果常用于投资分析和新交易策略中。不仅要能解方程，还要能以高效方式计算此类方程的根，这一点非常重要。\n\
  \n在本章中，你将学习一些计算方程根的常用方法。这里提供的代码示例涵盖了计算方程根的不同方法，并解释了它们的工作原理及适用场景。以下是本章涵盖的部分主题：\n\n\
  *   **二分法**：一种探索根附近符号变化的简单方法，易于实现。你将学习二分法的基础知识以及如何在 C++ 中编写其代码。\n*   **割线法**：割线法是对二分法的改进，它尝试利用函数在给定区间内的值来指导根的新近似位置。在许多情况下，割线法可以加速根的搜索过程。\n\
  *   **牛顿法**：该方法有时也称为牛顿/拉夫逊法，它利用函数的导数来指导对方程根的搜索。由于导数决定了函数切线的斜率，其值可用于计算新的近似值。连续迭代值可能收敛到所需的解，并可使用误差参数来决定何时停止搜索。\n\
  \n### 二分法\n\n创建一个实现二分法的类来寻找方程的根。\n\n\n### 解法\n\n求解方程的根，就是找出函数值为零的所有点。在计算数学的发展过程中，人们设计出了多种求解方程根的方法。本章将介绍其中几种最常见的方法。\n\
  \n二分法采用一种简单的策略来寻找方程的根：其思想是观察函数在定义域不同点的符号，并利用这些信息来判断该区间内是否存在根。例如，考虑函数 *f*(*x*) =\
  \ (*x*–1)³。\n\n图 9-1 展示了该函数在区间 -1 到 3 上的图形。\n\n![../images/323908_2_En_9_Chapter/323908_2_En_9_Fig1_HTML.jpg](img/323908_2_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1：区间 -1 到 3 上的函数 (x–1)³\n\n该函数在 `x=1` 处有一个根，并且有两个符号截然不同的区域：当 `x<1` 时，符号为负；当\
  \ `x>1` 时，函数符号为正。若要精确确定函数为零的点，可以从一个函数符号不同的区间开始（本例中可使用区间 -1 到 3），然后寻找函数符号改变的确切位置：那里必定是函数的一个根。\n\
  \n> **注**：此论证仅当所处理的函数是连续函数时才成立。也就是说，函数不存在从一个点突然跳变到另一个点的情况，否则上述论证将失效。连续函数在其定义域内是可微的，因此这是判断函数是否连续的一种方法。经济学、物理学和工程学中的大多数函数都具有这一性质，因此我们假设应用二分法时函数都是连续的。\n\
  \n基于这一直观认识，二分法尝试采用一种系统的方法来确定所测试的区间以及符号发生变化的位置。本质上，该方法是将原始区间一分为二，并判断子区间是否仍然存在符号差异。\n\
  \n例如，仍使用同一函数，假设我们取原始区间为 -1 到 2。该区间的中点是 ½，因此算法将检查 ![$$ \\mathrm{f}\\left(\\frac{1}{2}\\\
  right)={\\left(\\frac{1}{2}-1\\right)}³={\\left(-\\frac{1}{2}\\right)}³=-\\frac{1}{2³}=-\\\
  frac{1}{8} $$](img/323908_2_En_9_Chapter_TeX_IEq1.png) 的符号。现在，考虑初始区间两个端点的符号：\n\n\
  - *f*(–1) = (–1–1)³ = –8，因此符号为负。\n- *f*(2) = (2–1)³ = 1³ = 1，因此符号为正。\n\n这意味着在 *x*\
  \ = –1 和 ![$$ x=\\frac{1}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq2.png) 之间，符号相同。另一方面，在\
  \ ![$$ x=\\frac{1}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq3.png) 和 *x* = 2 之间，符号发生了变化。因此，根必定位于符号变化的位置，即在\
  \ ½ 和 2 之间的某处。\n\n对该过程再迭代一次，计算 ![$$ f\\left(\\frac{5}{4}\\right)={\\left(\\frac{5}{4}-1\\\
  right)}³={\\left(\\frac{1}{4}\\right)}³=1/{4}³ $$](img/323908_2_En_9_Chapter_TeX_IEq4.png)\
  \ 的值，结果为正值。由于 *f*(1/2) 为负，*f*(2) 为正，符号变化必定发生在区间 ![$$ \\frac{1}{2} $$](img/323908_2_En_9_Chapter_TeX_IEq5.png)\
  \ 到 ![$$ \\frac{5}{4} $$](img/323908_2_En_9_Chapter_TeX_IEq6.png) 之间。通过查看图 9-1 中的图形，很容易验证这一点。请注意，此过程将系统性地缩小我们寻找方程根的区间范围。每一步，区间长度都缩减一半，使我们更接近根的位置。经过多次迭代后，你将得到一个与真实根足够接近的数值。因此，当剩余区间的长度小于所需误差时，该算法即可停止。例如，如果区间长度小于\
  \ 0.001，而所需误差为 0.01，则可以停止。\n\n利用刚刚描述的过程，我们现在可以用以下方式描述二分算法的步骤：\n\n1.  定义一个初始区间 `(a,b)`，你希望在该区间内寻找方程的一个或多个根。\n\
  \n2.  计算 *f*(*a*) 和 *f*(*b*) 的值。\n\n3.  确定区间 (*a*,*b*) 的中点 ![$$ c=\\frac{a+b}{2}\
  \ $$](img/323908_2_En_9_Chapter_TeX_IEq7.png) 及其对应的函数值 *f*(*c*)。\n\n4.  如果 *f*(*a*)\
  \ 和 *f*(*c*) 的符号不同，则 (*a*,*c*) 成为算法的新区间。否则，新区间定义为 (*c*,*b*)。\n\n5.  如果新区间的长度小于误差（阈值）*E*，则停止并将\
  \ *c* 报告为解。否则，继续执行步骤 1。\n\n上述算法以迭代方式工作，区间 (*a*,*b*) 的长度不断减半。因此，它将执行的步数上限为 ![$$ {\\\
  log}_2\\frac{\\left(b-a\\right)}{E} $$](img/323908_2_En_9_Chapter_TeX_IEq8.png)。迭代次数与所需近似精度之间存在权衡，这意味着如果你希望误差非常小，则需要更多次的迭代。\n\
  \n上述过程已被编码为 `BisectionSolver` 类的一部分，可用于求解方程的根。`BisectionSolver` 的一个有趣特性是，它可以作为任何连续函数的通用求解器。你只需将函数作为参数传递给该类的构造函数。\n\
  \n为此，我创建了一个名为 `MathFunction` 的类，它不仅在此处有用，也对其他将函数作为参数的类有用。`MathFunction` 类定义了一个所谓的函数对象，即一个行为类似于函数的对象。这对我们的算法很重要，因为它允许我们将该对象像函数一样使用。\n\
  \n要创建一个函数对象，你需要一个实现了 `operator()`（即函数调用运算符）的类。此外，我将 `MathFunction` 类定义为一个模板类，这样你就可以在创建具体实现时传入正确的返回类型。例如，你可能想要定义一个仅针对\
  \ `float` 类型的 `MathFunction` 子类。或者，反过来，你可能有一个定义域为整数集的函数。\n\n\n\n```cpp\n// MathFunction.h\n\
  #ifndef MATHFUNCTION_H_\n#define MATHFUNCTION_H_\ntemplate <typename Res>\nclass\
  \ MathFunction {\npublic:\n    MathFunction();\n    virtual ~MathFunction();\n \
  \   virtual Res operator()(Res value) = 0;\n};\n#endif /* MATHFUNCTION_H_ */\n\n\
  // BisectionMethod.h\n#ifndef BISECTIONMETHOD_H_\n#define BISECTIONMETHOD_H_\ntemplate\
  \ <typename Res>\nclass MathFunction;\nclass BisectionMethod {\npublic:\n    BisectionMethod(MathFunction<double>\
  \ &f);\n    BisectionMethod(const BisectionMethod &p);\n    ~BisectionMethod();\n\
  \    BisectionMethod &operator=(const BisectionMethod &p);\n    double getRoot(double\
  \ x1, double x2);\n\nprivate:\n    MathFunction<double> &m_f;\n    double m_error;\n\
  };\n#endif /* BISECTIONMETHOD_H_ */\n\n// BisectionMethod.cpp\n#include \"BisectionMethod.h\"\
  \n#include \"MathFunction.h\"\n#include <cmath>\n#include <iostream>\nusing std::cout;\n\
  using std::endl;\n\nnamespace {\n    const double DEFAULT_ERROR = 0.001;\n}\n\n\
  BisectionMethod::BisectionMethod(MathFunction<double> &f)\n    : m_f(f),\n     \
  \ m_error(DEFAULT_ERROR)\n{\n}\n\nBisectionMethod::BisectionMethod(const BisectionMethod\
  \ &p)\n    : m_f(p.m_f),\n      m_error(p.m_error)\n{\n}\n\nBisectionMethod::~BisectionMethod()\n\
  {\n}\n\nBisectionMethod &BisectionMethod::operator=(const BisectionMethod &p)\n\
  {\n    if (this != &p)\n    {\n        m_f = p.m_f;\n        m_error = p.m_error;\n\
  \    }\n    return *this;\n}\n\ndouble BisectionMethod::getRoot(double x1, double\
  \ x2)\n{\n    double root = 0;\n    while (std::abs(x1 - x2) > m_error)\n    {\n\
  \        double x3 = (x1 + x2) / 2;\n        root = x3;\n        if (m_f(x1) * m_f(x3)\
  \ < 0)\n        {\n            x2 = x3;\n        }\n        else\n        {\n  \
  \          x1 = x3;\n        }\n        cout << \"root is \" << root << endl;\n\
  \    }\n    return root;\n}\n\n// F1.h\n#ifndef F1_H_\n#define F1_H_\n\n#include\
  \ \"MathFunction.h\"\n\nclass F1 : public MathFunction<double> {\npublic:\n    virtual\
  \ ~F1();\n    virtual double operator()(double value);\n};\n\n#endif /* F1_H_ */\n\
  \n// F1.cpp\n#include \"F1.h\"\n\nF1::~F1()\n{\n}\n\ndouble F1::operator()(double\
  \ x)\n{\n    return (x-1)*(x-1)*(x-1);\n}\n\n// main.cpp\n#include \"BisectionMethod.h\"\
  \n#include \"F1.h\"\n#include <iostream>\nusing std::cout;\nusing std::endl;\n\n\
  int main()\n{\n    F1 f;\n    BisectionMethod bm(f);\n    cout << \" the root of\
  \ the function is \" << bm.getRoot(-100, 100) << endl;\n    return 0;\n}\n```\n\n\
  最后，我希望`MathFunction`仅仅是一个根类，这样只有具体的实现才能被实例化。为了实现这一点，`MathFunction`被定义为一个抽象类，通过在`operator()`的声明后使用`=0`标记来定义。该类的具体子类需要提供该运算符的具体实现。示例代码展示了如何实现这一点。\n\
  \n```cpp\nclass F1 : public MathFunction<double> {\npublic:\n    virtual ~F1() {}\n\
  \    virtual double operator()(double value);\n};\n\ndouble F1::operator()(double\
  \ x)\n{\n    return (x-1)*(x-1)*(x-1);\n}\n```\n\n这是示例函数 *f*(*x*) = (*x*–1)³ 的定义。`getRoot`函数的实现很直接。该函数以给定的区间作为参数开始，并使用二分法定义的准则将其对半分割。\n\
  \n### 完整代码\n\n```cpp\n//\n// MathFunction.h\n#ifndef MATHFUNCTION_H_\n#define MATHFUNCTION_H_\n\
  template <typename Res>\nclass MathFunction {\npublic:\n    MathFunction();\n  \
  \  virtual ~MathFunction();\n    virtual Res operator()(Res value) = 0;\n};\n#endif\
  \ /* MATHFUNCTION_H_ */\n\n//\n// BisectionMethod.h\n#ifndef BISECTIONMETHOD_H_\n\
  #define BISECTIONMETHOD_H_\ntemplate <typename Res>\nclass MathFunction;\nclass\
  \ BisectionMethod {\npublic:\n    BisectionMethod(MathFunction<double> &f);\n  \
  \  BisectionMethod(const BisectionMethod &p);\n    ~BisectionMethod();\n    BisectionMethod\
  \ &operator=(const BisectionMethod &p);\n    double getRoot(double x1, double x2);\n\
  \nprivate:\n    MathFunction<double> &m_f;\n    double m_error;\n};\n#endif /* BISECTIONMETHOD_H_\
  \ */\n\n//\n// BisectionMethod.cpp\n#include \"BisectionMethod.h\"\n#include \"\
  MathFunction.h\"\n#include <cmath>\n#include <iostream>\nusing std::cout;\nusing\
  \ std::endl;\n\nnamespace {\n    const double DEFAULT_ERROR = 0.001;\n}\n\nBisectionMethod::BisectionMethod(MathFunction<double>\
  \ &f)\n    : m_f(f),\n      m_error(DEFAULT_ERROR)\n{\n}\n\nBisectionMethod::BisectionMethod(const\
  \ BisectionMethod &p)\n    : m_f(p.m_f),\n      m_error(p.m_error)\n{\n}\n\nBisectionMethod::~BisectionMethod()\n\
  {\n}\n\nBisectionMethod &BisectionMethod::operator=(const BisectionMethod &p)\n\
  {\n    if (this != &p)\n    {\n        m_f = p.m_f;\n        m_error = p.m_error;\n\
  \    }\n    return *this;\n}\n\ndouble BisectionMethod::getRoot(double x1, double\
  \ x2)\n{\n    double root = 0;\n    while (std::abs(x1 - x2) > m_error)\n    {\n\
  \        double x3 = (x1 + x2) / 2;\n        root = x3;\n        if (m_f(x1) * m_f(x3)\
  \ < 0)\n        {\n            x2 = x3;\n        }\n        else\n        {\n  \
  \          x1 = x3;\n        }\n        cout << \"root is \" << root << endl;\n\
  \    }\n    return root;\n}\n\n//\n// F1.h\n#ifndef F1_H_\n#define F1_H_\n\n#include\
  \ \"MathFunction.h\"\n\nclass F1 : public MathFunction<double> {\npublic:\n    virtual\
  \ ~F1();\n    virtual double operator()(double value);\n};\n\n#endif /* F1_H_ */\n\
  \n//\n// F1.cpp\n#include \"F1.h\"\n\nF1::~F1()\n{\n}\n\ndouble F1::operator()(double\
  \ x)\n{\n    return (x-1)*(x-1)*(x-1);\n}\n\n//\n// main.cpp\n#include \"BisectionMethod.h\"\
  \n#include \"F1.h\"\n#include <iostream>\nusing std::cout;\nusing std::endl;\n\n\
  int main()\n{\n    F1 f;\n    BisectionMethod bm(f);\n    cout << \" the root of\
