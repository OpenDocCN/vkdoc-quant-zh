  \n## 计算期权概率\n\n在本节中，我们将实现一个 C++ 解决方案，用于计算欧式期权事件的概率，例如到期时价格高于行权价、低于行权价，或介于两个给定价格之间。\n\
  \n### 解决方案\n\n期权是一种非常流行的股权衍生品，可以在大多数散户投资账户中购买。通过期权，你支付一笔费用，以换取在有限时间内以特定价格买入或卖出股票的权利，因此得名“期权”，因为你拥有执行交易的选择权，而非义务。\n\
  \n看涨期权赋予以特定价格买入的权利，而看跌期权赋予以特定价格卖出的权利。行权价格称为执行价。根据当前股票价格与执行价之间的关系，期权可以分为以下三类之一：\n\
  \n- **价内期权：** 对于看涨期权，执行价低于当前股价。对于看跌期权，执行价应高于当前股价。\n\n\n\n### 期权定价与概率分析\n\n### 价内、价平与价外期权\n\
  \n- **价外期权（Out of the Money，OTM）**：对于看涨期权，行权价高于当前股票价格。对于看跌期权，行权价低于当前股票价格。\n- **价平期权（At\
  \ the Money，ATM）**：行权价接近标的股票的当前价格。\n\n行权价与股票价格之间的这些不同关系，决定了期权获利的不同概率，我们将在本节剩余部分看到这一点。为了获利，看涨期权需要股票价格上涨超过行权价。当这种情况发生时，头寸的价格由行权价与股票价格之间的差额加上期权可能仍具有的任何时间价值决定。对于看跌期权，这种情况是相反的，当股票价格相对于行权价下跌时，期权变得有利可图。\n\
  \n期权的另一个概念是行权方式（即买入或卖出标的股票）。欧式期权只允许在其目标期结束时行权。而美式期权则允许在任何时刻行权。在本节中，我只考虑欧式期权，因为分析只考虑期权到期时的股票价格。不过，将所解释的技术扩展到处理美式期权并不困难。\n\
  \n图 14-2 展示了一份期权合约的利润曲线。数据假定合约成本为`$5`，行权价为`$90`。在这种情况下，对于任何低于`$90`的标的股票最终价格，期权价格的完全损失得以实现。另一方面，损失是有上限的，投资者不会遭受除合约价格之外的任何损失。当标的资产价格达到`$90`的行权价时，头寸的损失开始减少，在`$95`时达到盈亏平衡点。从该点起，任何额外的价格上涨都代表期权头寸的额外利润，并且收益在上行方向是无限的。\n\
  \n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig2_HTML.jpg](img/323908_2_En_14_Fig2_HTML.jpg)\n\
  \n*图 14-2 看涨期权合约的获利潜力*\n\n### 确定获利概率\n\n在本节中，您将学习如何使用蒙特卡洛技术来确定股票期权的获利概率。如前所述，要找到看涨期权的利润，只需计算标的资产在到期时的价格，并检查最终价格是否高于行权价。对于看跌期权，过程相同，但需要检查最终价格是否低于行权价。\n\
  \n为此问题创建蒙特卡洛模拟的第一步是定义随机过程的参数。期权的定价由所谓的布莱克-舒尔斯模型（Black-Scholes model）定义，其中价格被假定为正态分布。出于这个原因，您将使用具有高斯分布的价格变化随机游走。在此随机过程的每一步，只有两种可能性：价格上涨或下跌，概率各为\
  \ 50%。价格变化随后由正态分布决定，其方差作为输入参数给出。图 14-3 展示了一个高斯随机游走的示例。请注意，与股票的实际数据相比，这看起来与实际价格波动有多么相似。\n\
  \n![../images/323908_2_En_14_Chapter/323908_2_En_14_Fig3_HTML.jpg](img/323908_2_En_14_Fig3_HTML.jpg)\n\
  \n*图 14-3 使用高斯随机游走生成的价格变动示例*\n\n一旦生成了随机游走，就可以开始使用数据进行预测和相关的价格分析。在这种情况下，您希望估计某些事件的概率，例如最终价格高于某一价格水平。要回答这些问题，只需使用标准的蒙特卡洛程序：重复随机游走并存储结果。在多次执行此过程后，可以分析最终价格高于某个目标的结分布。\n\
  \n例如，假设您想回答以下问题：价格最终高于行权价的概率是多少？为此，对大量测试执行随机游走，并计算在这些测试中价格最终高于行权价的百分比。同样的方法可用于收集相关信息，例如价格最终低于行权价的概率，或者价格最终介于两个给定价格之间的概率。\n\
  \n该实现由`OptionsProbabilities`类提供。重要的成员函数如下：\n\n```cpp\ndouble probFinishAboveStrike();\n\
  double probFinishBelowStrike();\ndouble probFinalPriceBetweenPrices(double lowPrice,\
  \ double highPrice);\nstd::vector getWalk();\n```\n\n前三个成员函数计算所需的概率。最后一个成员函数`getWalk`返回一个向量，该向量存储一个样本随机游走以供进一步分析。`OptionsProbabilities`类内部使用`getLastPriceOfWalk`成员函数，该函数返回在高斯游走中观察到的最后一个价格。该价格作为输入存储，用于概率计算。\n\
  \n最后，使用高斯分布计算价格变化。根据此分布生成的随机值使用`gaussianValue`成员函数：\n\n```cpp\ndouble OptionsProbabilities::gaussianValue(double\
  \ mean, double sigma)\n{\nstd::normal_distribution distrib(mean, sigma);\nreturn\
  \ distrib(random_generator);\n}\n```\n\n要了解这些函数如何协同工作，请考虑`probFinishAboveStrike`的实现：\n\
  \n```cpp\ndouble OptionsProbabilities::probFinishAboveStrike()\n{\nint nAbove =\
  \ 0;\nfor (int i=0; i < m_numIterations; i++)\n{\n  double walk = getWalk();\n \
  \ double lastPrice = getLastPriceOfWalk(walk);\n  if (lastPrice >= m_strike)\n \
  \ {\n    nAbove++;\n  }\n}\nreturn nAbove/(double)m_numIterations;\n}\n```\n\n该算法重复由成员变量`m_numIterations`定义的次数。在每次迭代中，您请求一个新的高斯随机游走并存储最后一个观察值。如果该值满足所需属性（在这种情况下高于行权价），则将其计为事件的一次发生。最后，成员函数返回由有利案例百分比定义的经验概率。\n\
  \n### 完整代码\n\n清单 14-3 展示了评估期权概率的随机游走方法。清单末尾给出了一个示例`main`函数，展示了如何调用`OptionsProbabilities`类。\n\
  \n\n\n### 头文件与实现文件\n\n```cpp\n//\n// OptionsProbabilities.h\n#ifndef __FinancialSamples__OptionsProbabilities__\n\
  #define __FinancialSamples__OptionsProbabilities__\n#include \nclass OptionsProbabilities\
  \ {\npublic:\n    OptionsProbabilities(double initialPrice, double strike, double\
  \ avgStep, int nDays);\n    OptionsProbabilities(const OptionsProbabilities &p);\n\
  \    ~OptionsProbabilities();\n    OptionsProbabilities &operator=(const OptionsProbabilities\
  \ &p);\n    void setNumIterations(int n);\n    double probFinishAboveStrike();\n\
  \    double probFinishBelowStrike();\n    double probFinalPriceBetweenPrices(double\
  \ lowPrice, double highPrice);\n    std::vector getWalk();\nprivate:\n    double\
  \ m_initialPrice;\n    double m_strike;\n    double m_avgStep;\n    int m_numDays;\n\
  \    int m_numIterations;\n    double gaussianValue(double mean, double sigma);\n\
  \    double getLastPriceOfWalk();\n};\n#endif /* defined(__FinancialSamples__OptionsProbabilities__)\
  \ */\n```\n\n```cpp\n//\n// OptionsProbabilities.cpp\n#include \"OptionsProbabilities.h\"\
  \n#include \n#include \nusing std::vector;\nusing std::cout;\nusing std::endl;\n\
  \nstatic std::default_random_engine random_generator;\n\nnamespace {\n    const\
  \ int NUM_ITERATIONS = 1000;\n}\n\nOptionsProbabilities::OptionsProbabilities(double\
  \ initialPrice,\n    double strike, double avgStep, int nDays)\n    : m_initialPrice(initialPrice),\n\
  \      m_strike(strike),\n      m_avgStep(avgStep),\n      m_numDays(nDays),\n \
  \     m_numIterations(NUM_ITERATIONS) {\n}\n\nOptionsProbabilities::OptionsProbabilities(const\
  \ OptionsProbabilities &p)\n    : m_initialPrice(p.m_initialPrice),\n      m_strike(p.m_strike),\n\
  \      m_avgStep(p.m_avgStep),\n      m_numDays(p.m_numDays),\n      m_numIterations(p.m_numIterations)\
  \ {\n}\n\nOptionsProbabilities::~OptionsProbabilities() {\n}\n\nOptionsProbabilities\
  \ &OptionsProbabilities::operator=(const OptionsProbabilities &p) {\n    if (this\
  \ != &p) {\n        m_initialPrice = p.m_initialPrice;\n        m_strike = p.m_strike;\n\
  \        m_avgStep = p.m_avgStep;\n        m_numDays = p.m_numDays;\n        m_numIterations\
  \ = p.m_numIterations;\n    }\n    return *this;\n}\n\nvoid OptionsProbabilities::setNumIterations(int\
  \ n) {\n    m_numIterations = n;\n}\n\ndouble OptionsProbabilities::probFinishAboveStrike()\
  \ {\n    int nAbove = 0;\n    for (int i=0; i < m_numIterations; ++i) {\n      \
  \  double lastPrice = getLastPriceOfWalk();\n        if (lastPrice >= m_strike)\
  \ {\n            nAbove++;\n        }\n    }\n    return nAbove / (double)m_numIterations;\n\
  }\n\ndouble OptionsProbabilities::probFinishBelowStrike() {\n    int nBelow = 0;\n\
  \    for (int i=0; i < m_numIterations; ++i) {\n        double lastPrice = getLastPriceOfWalk();\n\
  \        if (lastPrice < m_strike) {\n            nBelow++;\n        }\n    }\n\
  \    return nBelow / (double)m_numIterations;\n}\n\ndouble OptionsProbabilities::probFinalPriceBetweenPrices(double\
  \ lowPrice, double highPrice) {\n    int nBetween = 0;\n    for (int i=0; i < m_numIterations;\
  \ ++i) {\n        double lastPrice = getLastPriceOfWalk();\n        if (lastPrice\
  \ >= lowPrice && lastPrice <= highPrice) {\n            nBetween++;\n        }\n\
  \    }\n    return nBetween / (double)m_numIterations;\n}\n\ndouble OptionsProbabilities::gaussianValue(double\
  \ mean, double sigma) {\n    std::normal_distribution<double> distrib(mean, sigma);\n\
  \    return distrib(random_generator);\n}\n\ndouble OptionsProbabilities::getLastPriceOfWalk()\
  \ {\n    double prev = m_initialPrice;\n    for (int i=0; i < m_numDays; ++i) {\n\
  \        double stepSize = gaussianValue(0, m_avgStep);\n        int r = rand()\
  \ % 2;\n        double val = prev;\n        if (r == 0) val += (stepSize * val);\n\
  \        else val -= (stepSize * val);\n        prev = val;\n    }\n    return prev;\n\
  }\n\nstd::vector<double> OptionsProbabilities::getWalk() {\n    vector<double> walk;\n\
  \    double prev = m_initialPrice;\n    for (int i=0; i < m_numDays; ++i) {\n  \
  \      double stepSize = gaussianValue(0, m_avgStep);\n        int r = rand() %\
  \ 2;\n        double val = prev;\n        if (r == 0) val += (stepSize * val);\n\
  \        else val -= (stepSize * val);\n        walk.push_back(val);\n        prev\
  \ = val;\n    }\n    return walk;\n}\n\nint main() {\n    OptionsProbabilities optP(30,\
  \ 35, 0.01, 100);\n    cout << \" above strike prob: \" << optP.probFinishAboveStrike()\
  \ << endl;\n    cout << \" below strike prob: \" << optP.probFinishBelowStrike()\
  \ << endl;\n    cout << \" between 28 and 32 prob: \" << optP.probFinalPriceBetweenPrices(28,\
  \ 32) << endl;\n    return 0;\n}\n```\n\n**清单 14-3. `OptionsProbabilities` 类**\n\
  \n### 运行代码\n\n要运行清单 14-3 中的代码，你可以使用任何符合标准的 C++ 编译器，如 `gcc`、`llvm` 或 `Visual C++`。编译代码并生成可执行文件后，可以按如下方式运行应用程序（具体数字可能根据使用的随机数而有所不同）：\n\
  \n```\nabove strike prob: 0.055\nbelow strike prob: 0.946\nbetween 28 and 32 prob:\
  \ 0.512\n```\n\n如你所见，该应用程序能够以良好的精度确定价格高于或低于行权价的概率。前两个数值之和接近 100% 的事实证实了这一点。通过增加模拟随机游走的次数，仍然可以进一步改进近似结果。\n\
  \n### 结论\n\n蒙特卡洛方法是一种通用的解决问题方法，它利用随机化来计算那些原本很难精确求解的结果。由于金融市场固有的随机性，蒙特卡洛方法成为金融工程师和软件开发人员手中的重要工具。\n\
  \n在本章中，你已经看到，这种模拟技术可以用于快速求解金融领域中的各种问题。例如，使用蒙特卡洛模拟的一种常见方式是预测由价格变化决定的可能经济情景。虽然这对传统的数学方法来说是一项艰巨的任务，但人们可以轻松设计出诸如随机游走之类的高效算法。这类算法仅利用基于历史行为的少数输入参数，就能提供预测价格的能力。\n\
  \n在第一个编码示例（清单 14-1）中，我们使用蒙特卡洛技术计算了一个一般函数的定积分。尽管存在确定性数值算法可以高效地解决此问题，但该示例展示了蒙特卡洛方法的基本特征，以及如何解释和改进其结果。\n\
  \n在清单 14-2 中，你了解了如何创建一个非常简单的随机游走，这是使用蒙特卡洛方法进行价格模拟的基本工具之一。你看到了如何实现一种价格变化均匀分布的随机游走版本。你还了解了一些标准方法的常见变体，这些变体在应用中经常被使用。\n\
  \n接下来，你学习了如何使用蒙特卡洛方法计算期权的盈利概率。清单 14-3 中的 C++ 类展示了一种易于实现的方案，可用于分析期权及其可能的盈利情景。你已经看到，利用模拟和对价格变化的一些假设，可以轻松确定某只股票在若干天内处于特定价格区间的概率。\n\
  \n本章完成了对金融软件中使用的主要数学工具的讨论。在下一章中，你将开始探索可用于支持创建和维护此类金融应用程序的额外编程技术。你将看到许多示例，展示如何将现有的\
  \ C++ 代码与其他流行的脚本语言（例如 Python 和 Lua）集成。\n\n"
- "# 15. 扩展金融库\n\nC++ 是一种富有表现力的语言，可用于开发一些最复杂的软件，包括银行和其他金融机构中常使用的高性能应用程序。然而，有时使用解释型语言来组合和扩展\
  \ C++ 库是有益的，这可以简化原型和其他非关键应用程序的创建。许多此类解释型语言被用于连接预编译库。其中，Python 和 Lua 是金融行业中最常用的解释型语言之一。\n\
  \n在本章中，我将展示如何使用流行的脚本和扩展语言（如 Lua 和 Python）与 C++ 库交互。接下来几节中讨论的解决方案和算法，允许你在用其他语言开发的应用程序中重用前面章节中介绍的许多\
  \ C++ 组件。在某些情况下，你还可以在自己的 C++ 应用程序中使用从外部语言创建的代码。\n\n以下是本章讨论的一些主题：\n\n*   **用 Python\
  \ 扩展 C++**：Python 语言为开发服务器端应用程序提供了出色的特性。如果你想将 C++ 库用作其他服务的一部分，Python 可能是集成不同库的最佳方式。\n\
  \n\n\n## 用 Lua 扩展 C++\n\nLua 是一种相对较新的语言，以其动态特性的简洁实现而著称。它也被用作一种可嵌入到您自己的大型 C++ 应用程序中的扩展语言。\n\
  \n### 将 C++ 股票处理代码导出到 Python\n\n生成提供将 C++ 股票处理类导出到 Python 能力的代码。\n\n### 解决方案\n\n\
  Python 是一种流行的语言，已被用于多个领域，包括 Web 应用、科学数据探索和金融。Python 最大的优势之一是其能够干净地整合大型编程库集合。这种互操作性的一个非常重要的原因是\
  \ Python 用于与不同语言（尤其是 C 和 C++）交互的简单机制。\n\n在本节中，您将学习 Python 的扩展机制以及如何从您的 C++ 代码中访问它。我为此过程提供了一个金融示例，您将能够访问一个最初使用\
  \ C++ 设计和实现的 `Stock` 类。\n\nPython 在大多数操作系统上作为开源软件提供。您可以在 [`http://python.org`](http://python.org)\
  \ 找到大多数操作系统的源代码和二进制文件。您还会发现 Python 预装在许多类 UNIX 操作系统上，例如 Linux 和 Mac OS X。Python\
  \ 中库扩展的主要机制是模块。模块用于将数据和代码导出到 Python 源文件或其他模块。关键字 `import` 可用于将现有模块加载到内存中。例如：\n\n\
  ```\nimport sys\n```\n\n这是一个用于加载 `sys` 模块的命令，该模块提供对系统相关函数的访问。虽然模块本身可以用 Python 创建，但作为\
  \ C++ 程序员，我们的主要兴趣在于使用 C++ 创建模块。这可以通过 Python 模块创建 API（应用程序编程接口）实现，该 API 可用于 C 和 C++，并且包含在大多数\
  \ Python 安装中。\n\n由于扩展机制是用 C 语言编写的（为了与现有的适用于 Python 的 C 库兼容），因此有必要创建一些 C 函数来封装您的原始\
  \ C++ 类，以实现与 Python 环境的互操作性。\n\n作为这个过程如何工作的示例，请考虑 `Stock` 类，它可以用于对单个股票进行建模。清单 15-1\
  \ 展示了该类的公共接口。\n\n```\nclass Stock {\npublic:\nStock(const std::string &ticker, double\
  \ price, double div);\nStock(const Stock &p);\n~Stock();\nStock &operator=(const\
  \ Stock &p);\nstd::string ticker();\ndouble price();\nvoid setPrice(double price);\n\
  double dividend();\nvoid setDividend(double div);\ndouble dividendYield();\n}\n\
  Listing 15-1\nInterface for Stock Class\n```\n\nPython 的扩展 API 是一组头文件和库，它们将 Python\
  \ 环境暴露给用 C 或 C++ 编写的其他应用程序。要使用扩展 API 将诸如 `Stock` 之类的类导出到 Python，我们需要创建一些将接收并返回 Python\
  \ 解释器发送的请求的函数。这是在 `Stock_Py.cpp` 文件中完成的，该文件包含一个处理 `Stock` 类每个成员的函数列表。\n\n第一个值得关注的函数是\
  \ `stock_create` 函数，其定义如下：\n\n```\nPyObject *stock_create(PyObject *self, PyObject\
  \ *args)\n```\n\n直接从 Python 调用的函数通常具有这样的签名：接收两个 Python 对象并返回一个 Python 对象。每当使用 `object.function()`\
  \ 语法进行调用时，此类函数的第一个参数是作为调用目标的 Python 对象（类似于 C++ 中的 `this` 指针）。第二个参数是一个 Python 列表，存储传递给该函数的所有参数。\n\
  \n这个函数做的第一件事是检索作为参数传递的参数。这可以在 Python API 中通过调用 `PyArg_ParseTuple` 函数来完成，该函数负责检查参数并将其值复制到数据对象中。此函数的第一个参数是表示参数列表的对象。第二个参数是一个字符串，定义了参数列表中每个数据元素的类型。最后，剩余的参数是指向数据应存储位置的指针。\n\
  \n```\nif (!PyArg_ParseTuple(args, \"sdd\", &ticker, &price, &dividend))\nreturn\
  \ NULL;\n```\n\n如果此函数不成功，它将返回 false，这将导致 `stock_create` 返回 `NULL`。向解释器返回 `NULL`\
  \ 表示被调用的函数出于某种原因失败。\n\n一旦输入数据被验证，下一步是创建一个 `Stock` 类的对象并正确初始化它。结果存储在一个使用 `PyCapsule_New`\
  \ 函数创建的 Python 胶囊对象中。此函数调用将析构函数的名称作为最后一个参数，在本例中只是 `stock_destructor`，一个调用 `Stock`\
  \ 对象析构函数的函数。创建 Python 胶囊后，新的 Python 对象将作为函数的结果返回。\n\n对于仅返回单个数据对象的函数示例，请考虑 `stock_ticker`\
  \ 函数，它提供对 `Stock::ticker()` 成员函数的访问：\n\n```\nPyObject *stock_ticker(PyObject *self,\
  \ PyObject *args)\n{\nPyObject *obj;\nif (!PyArg_ParseTuple(args, \"O!\", &PyCapsule_Type,\
  \ &obj))\nreturn NULL;\nStock *stock = getStock(obj);\nreturn Py_BuildValue(\"s\"\
  , stock->ticker().c_str());\n}\n```\n\n在此函数中，第一步是验证输入参数，这使用了 `PyArg_ParseTuple`\
  \ 函数。`PyArg_ParseTuple` 函数接收数据容器和一个确定每个参数类型的字符串作为参数，后跟指向将存储数据的变量的指针。在这种情况下要检索的对象是\
  \ `PyCapsule` 类型，如剩余参数（它们提供了对象类型和指向对象变量的指针）所定义。一旦参数被检索出来，您就可以使用 `getStock` 函数获取\
  \ `Stock` 指针。最后，调用 `ticker()` 成员函数。要将数据返回给 Python 解释器，您需要将结果转换为 Python 对象。这是通过 `Py_BuildValue`\
  \ 函数完成的，该函数使用格式字符串来确定其剩余参数的类型。其他函数类似，它们的主要工作是从参数列表中检索数据并将结果转换为 Python 对象。\n\n注意\n\
  \n即使一个暴露给 Python 的函数不返回任何结果，您仍然需要返回一个有效的 Python 对象。在这种情况下，您可以使用 `Py_None`，它表示一个标准的\
  \ Python 对象，意思是“没有数据”。\n\n最后，我们有 `initstock` 函数。它调用 Python API 中的 `Py_InitModule`\
  \ 函数来确定此模块中暴露的函数。`Py_InitModule` 函数接收模块名称和一个数组作为参数，该数组包含所有函数（称为 `stockMethods`）的列表、它们的名称和描述。当这些信息传递给\
  \ Python 解释器时，每当导入 `stock` 模块时，它就对 Python 开发人员可用。\n\n### 完整代码\n\n清单 15-2 展示了 `Stock`\
  \ 类及其关联的 Python 粘合代码的完整代码。\n\n\n```cpp\n//\n//  Stock.h\n#ifndef __FinancialSamples__Stock__\n\
  #define __FinancialSamples__Stock__\n#include\nclass Stock {\npublic:\nStock(const\
  \ std::string &ticker, double price, double div);\nStock(const Stock &p);\n~Stock();\n\
  Stock &operator=(const Stock &p);\nstd::string ticker();\ndouble price();\nvoid\
  \ setPrice(double price);\ndouble dividend();\nvoid setDividend(double div);\ndouble\
  \ dividendYield();\nprivate:\nstd::string m_ticker;\ndouble m_currentPrice;\ndouble\
  \ m_dividend;\n};\n#endif /* defined(__FinancialSamples__Stock__) */\n//\n//  Stock.cpp\n\
  #include \"Stock.h\"\nStock::Stock(const std::string &ticker, double price, double\
  \ div)\n: m_ticker(ticker),\nm_currentPrice(price),\nm_dividend(div)\n{\n}\nStock::Stock(const\
  \ Stock &p)\n: m_ticker(p.m_ticker),\nm_currentPrice(p.m_currentPrice),\nm_dividend(p.m_dividend)\n\
  {\n}\nStock::~Stock()\n{\n}\nStock &Stock::operator=(const Stock &p)\n{\nif (this\
  \ != &p)\n{\nm_ticker = p.m_ticker;\nm_currentPrice = p.m_currentPrice;\nm_dividend\
  \ = p.m_dividend;\n}\nreturn *this;\n}\ndouble Stock::price()\n{\nreturn m_currentPrice;\n\
  }\nvoid Stock::setPrice(double price)\n{\nm_currentPrice = price;\n}\ndouble Stock::dividend()\n\
  {\nreturn m_dividend;\n}\nvoid Stock::setDividend(double div)\n{\nm_dividend = div;\n\
  }\ndouble Stock::dividendYield()\n{\nreturn  m_dividend / m_currentPrice;\n}\nstd::string\
  \ Stock::ticker()\n{\nreturn m_ticker;\n}\n//\n//  Stock_Py.cpp\n#include \"Stock_Py.h\"\
  \n#include \"Stock.h\"\n#include\n#include\n#include\nnamespace {\nvoid stock_destructor(PyObject\
  \ *capsule)\n{\nprintf(\"调用析构函数\\n\");\nStock *stock = reinterpret_cast(PyCapsule_GetPointer(capsule,\
  \ NULL));\ndelete stock;\n}\nPyObject *stock_create(PyObject *self, PyObject *args)\n\
  {\nchar *ticker;\ndouble price;\ndouble dividend;\nif (!PyArg_ParseTuple(args, \"\
  sdd\", &ticker, &price, &dividend))\nreturn NULL;\nprintf(\"股票代码: %s, 价格: %lf, 股息:\
  \ %lf\\n\", ticker, price, dividend);\nStock *stock = new Stock(ticker, price, dividend);\n\
  PyObject* stockObj = PyCapsule_New(stock, NULL,  stock_destructor);\nreturn stockObj;\n\
  }\nStock *getStock(PyObject *obj)\n{\nif (!PyCapsule_CheckExact(obj))\nprintf(\"\
  错误: 不是股票对象\\n\");\nfflush(stdout);\nreturn reinterpret_cast(PyCapsule_GetPointer(obj,\
  \ NULL));\n}\nPyObject *returnNone()\n{\nPy_INCREF(Py_None);\nreturn Py_None;\n\
  }\nPyObject *stock_ticker(PyObject *self, PyObject *args)\n{\nPyObject *obj;\nif\
  \ (!PyArg_ParseTuple(args, \"O!\", &PyCapsule_Type, &obj))\nreturn NULL;\nStock\
  \ *stock = getStock(obj);\nreturn Py_BuildValue(\"s\", stock->ticker().c_str());\n\
  }\nPyObject *stock_price(PyObject *self, PyObject *args)\n{\nPyObject *obj;\nif\
  \ (!PyArg_ParseTuple(args, \"O!\", &PyCapsule_Type, &obj))\nreturn NULL;\nStock\
  \ *stock = getStock(obj);\nreturn Py_BuildValue(\"d\", stock->price());\n}\nPyObject\
  \ *stock_setPrice(PyObject *self, PyObject *args)\n{\ndouble price;\nPyObject *obj;\n\
  if (!PyArg_ParseTuple(args, \"O!d\", &PyCapsule_Type, &obj, &price))\nreturn NULL;\n\
  Stock *stock = getStock(obj);\nif (!stock)\nreturn NULL;\nstock->setPrice(price);\n\
  return returnNone();\n}\nPyObject *stock_dividend(PyObject *self, PyObject *args)\n\
  {\nPyObject *obj;\nif (!PyArg_ParseTuple(args, \"O!\", &PyCapsule_Type, &obj))\n\
  return NULL;\nStock *stock = getStock(obj);\nif (!stock)\nreturn NULL;\nreturn Py_BuildValue(\"\
  d\", stock->dividend());\n}\nPyObject *stock_setDividend(PyObject *self, PyObject\
  \ *args)\n{\ndouble dividend;\nPyObject *obj;\nif (!PyArg_ParseTuple(args, \"O!d\"\
  , &PyCapsule_Type, &obj, &dividend))\nreturn NULL;\nStock *stock = getStock(obj);\n\
  stock->setDividend(dividend);\nreturn returnNone();\n}\nPyObject *stock_dividendYield(PyObject\
  \ *self, PyObject *args)\n{\nPyObject *obj;\nif (!PyArg_ParseTuple(args, \"O!\"\
  , &PyCapsule_Type, &obj))\nreturn NULL;\nStock *stock = getStock(obj);\nreturn Py_BuildValue(\"\
  d\", stock->dividendYield());\n}\nPyMethodDef stockMethods[] = {\n{\"new\",  stock_create,\
  \ METH_VARARGS, \"创建一个新的股票对象。\"},\n{\"ticker\",  stock_ticker, METH_VARARGS, \"\
  获取股票对象的股票代码。\"},\n{\"price\",  stock_price, METH_VARARGS, \"获取股票的价格。\"},\n{\"setPrice\"\
  ,  stock_setPrice, METH_VARARGS, \"设置股票对象的价格。\"},\n{\"dividend\",  stock_dividend,\
  \ METH_VARARGS, \"获取股票的股息。\"},\n{\"setDividend\",  stock_setDividend, METH_VARARGS,\
  \ \"设置股票对象的股息。\"},\n{\"dividendYield\",  stock_dividendYield, METH_VARARGS, \"获取股票的股息收益率。\"\
  },\n{NULL, NULL, 0, NULL}\n};\n}\nPyMODINIT_FUNC initstock()\n{\nPy_InitModule(\"\
  stock\", stockMethods);\n}\n#\n```\n\n\n### `stock-setup.py`\n\n```\nfrom distutils.core\
  \ import setup, Extension\nsetup(name=\"stock\", version=\"1.0\",\next_modules=[Extension(\"\
  stock\", [\"Stock.cpp\", \"Stock_Py.cpp\"])])\n```\n\n**代码清单 15-2** `Stock` 类的接口与实现\n\
  \n### 运行代码\n\n构建 Python 扩展模块的过程与本书中介绍的其它 C++ 应用程序略有不同。该过程需要创建一个可加载模块，该模块在不同平台上形式各异，例如在\
  \ Windows 上是 `dll`，在众多 UNIX 系统上则是共享对象文件。为了简化这一过程，Python 开发者创建了一个工具，它利用 `setup.py`\
  \ 文件自动执行构建。使用 `setup.py`，你无需查明特定的构建信息，例如包含目录和链接库。如代码清单 15-1 所示，文件 `stock-setup.py`\
  \ 描述了扩展以及构建模块所需的源文件。构建过程（在 Mac OS X 系统上执行）如下所示。如清单所示，C++ 构建过程由 Python 通过 `build_ext`\
