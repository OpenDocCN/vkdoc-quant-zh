  \n## 对修改后 CAP 的扩展\n\n在本节中，我们将对修改后的 CAP 模型进行扩展，使得没有任何一项资产的投资比例超过投资组合的 30%。同时，增加一条规则：黄金和国库券这两类资产至少占投资组合的\
  \ 15%。\n\n### 解决方案\n\n在“投资组合优化”部分，你了解了如何创建一个优化模型，以确定给定投资组合的最优资本配置，从而实现所需的目标收益率，同时最小化由此产生的投资组合的波动性。给定的公式是对\
  \ CAP 中原始方法的修改，该模型是一个二次优化模型。尽管如此，使用该模型的线性规划版本仍然可以快速获得结果。\n\n虽然该模型能够涵盖投资组合构建策略的基础，但你还可以尝试其他有用的变体。例如，前面提到的\
  \ LP 模型的一个常见修改是，为每种资产类型添加最小和最大要求。例如，假设你可能希望通过强制执行每项资产持有的百分比上限来增加投资组合的分散化程度。其主要思想是避免因投资组合集中于少数资产而导致的巨额损失。这样的要求可以通过以下约束轻松添加到模型中：\n\
  \n`x[j] ≤ M`，对于每个`j` ∈ `{1...n}`\n\n这里，`M`是期望的百分比限制。运行时，LP 求解器将使用此约束确保每个百分比不超过给定的`M`值。\n\
  \n类似地，你也可以为每项资产定义最低持有量。在这种情况下，为每项可能的投资分别设置最小值通常很有用。例如，你可能希望在任何时候，投资组合中的国库券至少占 5%。如果我们将所需的最低配置记为`K[j]`，这将导致一个如下类型的约束：\n\
  \n`x[j] ≥ Kj`，对于每个`j` ∈ `{1...n}`\n\n通常，对于资产组合（如国库券和黄金）也可以进行类似的修改。这也适用于更大的资产组，例如为投资组合中所有成长型股票的总数添加最低阈值。如果你有一个股票组`L`和一个相关的限制`K[L]`，那么这个一般约束可以表示为：\n\
  \n![$$ \\sum \\limits_{j\\in L}{x}_j\\ge {K}_L. $$](img/323908_2_En_13_Chapter_TeX_Equp.png)\n\
  \n最后，你也可以利用资产组的概念来定义这些投资中持有百分比的上限。例如，如果你想限制投资组合中科技股的比例，可以将该组记为`U`，将限制记为`K[U]`，从而得到以下约束：\n\
  \n![$$ \\sum \\limits_{j\\in U}{x}_j\\le {K}_U. $$](img/323908_2_En_13_Chapter_TeX_Equq.png)\n\
  \n为简便起见，我提供了一个`ModifiedCAP`类的替代版本，其中包含一个备用的分散化规则（在 37%的水平）以及资产 1 和资产 2（黄金和国库券）组合至少\
  \ 15%的最低要求。新代码在函数`solveExtendedModel`中实现，其定义如下：\n\n```\nvoid solveExtendedModel(std::vector\
  \ &results, double &objVal);\n```\n\n在此编码示例中，类的其余部分保持不变。\n\n### 完整代码\n\n你可以在代码清单\
