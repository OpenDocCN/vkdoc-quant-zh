- fmt: '**Bourquin:** You mentioned Tuesday, Wednesday, and Thursday as being most
    favorable for intraday trades. Let’s say you get a good buy signal for a swing
    trade on a Friday afternoon. Does it concern you that it’s a Friday, or will you
    still take that signal?


    **Berger:** There is certainly a lot more reluctance to take a trade on a Friday
    afternoon. And I will say that’s where a little more of the long-term analysis
    comes into play.


    For example, fall 2011 was, in my opinion, a very difficult time to hold or buy
    things into a weekend because you never knew what news would come over the weekend.
    So, it depends a little bit on the macro and geopolitical backdrop.


    **Bourquin:** So, news is still important to you, to some extent, especially on
    swing trades?


    **Berger:** Yes. It’s certainly important in the swing trades, and it becomes
    even more important in longer-term holdings that I tend to trade around with the
    other two shorter time frames.


    **Bourquin:** That’s interesting. I hear a lot of traders always have longer-term
    positions on, and while they’ll routinely add and subtract from those positions,
    they’re always holding some base amount and trading in and out all the time. Is
    that what you do on longer-term holdings?


    **Berger:** Yes. I think the most alpha we can pick up as traders is by understanding
    the current environment. For example, I like to give the example of [fund manager]
    David Tepper from Appaloosa Management because it’s a very prominent example and
    it’s fabulous. He came out and said that government filings clearly indicated
    that they—the government—would buy Citigroup at “X” price, which was 20 percent,
    30 percent, or I don’t even know how many percentage points above the current
    price level! It was blindly obvious that he needed to buy the stock.


    At the same time, it was also very clear that the liquidity injections were basically
    forcing investors to buy equities. Now, understand that was the most important
    thing in 2009\. Valuations didn’t matter. All of the bearish news didn’t matter.
    The only thing that mattered was the liquidity injections, and in fact, that actually
    continues today.


    It’s very, very important to understand that sometimes fundamentals matter more.
    And other times, it’s just news flow that matters.


    **Bourquin:** When the government starts to get their hands in the markets, all
    bets are off in terms of technical analysis, because if the Fed wants to inject
    liquidity, that’s going to override any technical signals you have. So, with that
    level of government intervention, you can ignore technical signals.


    **Berger:** Yes, you don’t want to fight that. And whether it’s “Don’t fight the
    Fed,” or more recently, “Don’t fight the ECB,” it’s not something you want to
    do.


    However, technical analysis still works. You just have to understand the current
    situation. It has more or less been very punishing to be short over the past few
    years. If you understood that, then you understood that you basically had to turn
    into a trend follower—for lack of a better term—and buy the dips, which, of course,
    is a philosophy that can change quickly, but that’s the current situation. Technical
    analysis will work, but it’s not going to work for “trend reversal” analysis,
    if you will.


    **Bourquin:** Do you keep track of your win/loss ratio, and can you share that
    with us?


    **Berger:** I do. It depends on the type of trade, of course. The gap trade is
    probably the simplest example I can give, and the percentage of winners there
    is about 75 percent. That’s pretty strong, but the bigger question is in regards
    to my size on any given trade. I can tell you that I am 75 percent profitable
    on those trades, which is true, but what really matters is how I size it.


    **Bourquin:** Right. If you’re sizing small on the winners and bigger on the losers.


    **Berger:** Exactly. That’s actually a big thing that some people don’t understand.
    They are very happy to get a “tip” about a stock, but they don’t know what size
    the other person is using—and to me, that’s the most important thing.


    **Bourquin:** Did you find the end of 2011 and 2012 to be a more difficult environment
    to trade because of all the news, or just as good a trading environment as any?


    **Berger:** From a trader’s perspective, it was very difficult, to be honest.
    Largely because of the lack of volatility. In early 2012, it was very difficult
    to see the magnitude of what was happening with the European Central Bank injecting
    money back in December for the first time. It was clear to me that there was going
    to be a rally, but it was very surprising to see it go so far.


    I think it’s been more difficult to trade, especially since late August through
    September. October 2011 was a beautiful time because of the volatility.


    **Bourquin:** Yes, low volatility always makes it tougher. Because you’re following
    the ECB and other central banks, are you trading currency futures at all?


    **Berger:** No. I don’t trade currency futures. And the main reason I stick with
    the asset classes I mentioned is because I think it gets too difficult to keep
    track of things. As I said earlier, I used to be a fixed-income guy and traded
    a lot of credit default swaps, corporate bonds, and even sovereign bonds, but
    it’s just too much to keep track of.


    Nowadays, with the advent of ETFs, if I want to get a general trade on, say, the
    euro or the Australian dollar, I can trade that using ETFs. Of course, I’m giving
    up some fees here and there, but I’m happy to just take it as a macro trade and
    not have to worry about the intricacies of dealing with foreign exchange and corporate
    bonds, because I’d then need different brokers and everything else.


    **Bourquin:** Yeah, you’re right. With so many ETFs these days, it makes it much
    simpler to initiate a position on any bias you may have.


    As we finish up here, let’s talk about any important lessons you learned that
    really helped you become more profitable and more confident in your trading. Is
    there something you can share that really helped you along the way?


    **Berger:** Well, you always hear about the importance of simply taking your losses.
    There is nothing more humbling than that. It’s an overused phrase, but it’s very
    true. To me, it’s all about discipline. The more I stick to my rules and don’t
    focus on the P&L aspect, like we mentioned before, the easier I find it to make
    money.


    The other thing—and this is just as important—is not to overtrade. Again, this
    is a commonly used adage, but it is true, and that’s why it is such a common thread
    among traders. There is such propensity to overtrade—especially in near-term time
    frames, and especially when execution is as easy as hitting a button. Most of
    the time, that will do more harm than good.


    **Bourquin:** I totally agree with that, and I’ve experienced it in my own trading.
    I took a stride forward when I realized that even if I wasn’t actively in the
    market at that moment, or even if I hadn’t made a trade that entire day, I was
    still trading. Trading does not mean simply that you’re in the market. Trading
    can also mean that you’re standing by while waiting for the right setup to emerge.


    **Berger:** Exactly. The two best traders I know probably trade half as much as
    I do. Quite frankly, I don’t trade that much myself.


    Setups occur around the opening gap relatively frequently, but that’s not typical.
    It’s all about waiting for the right opportunity and then acting on it.


    The problem is that, as human beings, our mind is always working, and it’s difficult
    to turn it off. I’ve even gotten to the point where I’ve been doing yoga and some
    meditation just to make sure I can stay calm and focused. Alternatively, we can
    look to sports, or anything to keep calm and not jump the gun.'
