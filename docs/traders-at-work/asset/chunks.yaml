    # 采访记录：交易策略与职业生涯


    我开始了寻找“圣杯”的旅程，就像每个交易员在职业生涯的某个阶段都会经历的那样。我们都在寻找一种神奇的设置或神奇的方法论，希望它能适用于所有市场和所有时间框架。当然，这并不存在，但你仍然必须找到一种适合你个人风格和风险承受能力的策略和方法。在找到我当前的方法论之前，我苦苦搜寻了整整几年。


    我真的付出了很多努力，才从交易动量转向基于图表的、更技术性的交易层面。关键是，你需要更加技术性地交易外汇，因为它更像是一场棋局，而不是与对手（专家）打一场拳击赛，而这正是当日交易股票的特点。


    **Bourquin：** 我知道在某个时候你选择了艾略特波浪理论。那是何时发生的？


    **Gordon：** 那发生在我刚加入 `[FOREX.com](http://FOREX.com)` 的早期。我对它有一些了解，而且我们可以接触到大量投资银行的研究报告。`[FOREX.com](http://FOREX.com)`
    和货币市场中的其他外汇公司会与大型投资银行对冲其业务，而我们当时是瑞银、巴克莱、高盛和雷曼等公司的大客户（如果你能相信的话）。正因为这种关系，我们能获得银行的研究报告，并且每家银行都有几位我密切关注的专家。


    瑞银有一位名叫 `Jim Short` 的人做艾略特波浪分析。高盛也有一个人做艾略特波浪分析，我每天都会观看和阅读他们的文章。我给他们发邮件，不停地用关于艾略特波浪的问题打扰他们。我读了所有的书。那是我在
    `[FOREX.com](http://FOREX.com)` 的早期时光，我花了大量时间阅读那些银行的研究报告。这些人在做出别人都没有的预测和分析。他们的分析非常精准，我发现自己不停地问他们各种问题，想了解他们是如何进行分析的。我开始寻找关于艾略特波浪计数的所有可用信息，并阅读了我能找到的关于这门手艺的一切。


    **Bourquin：** 一旦你通过交易进入了对冲基金团队，你的薪酬是如何运作的？和以前一样——全是利润分成——还是你有一些基本工资？


    **Gordon：** 因为我身兼二职，并且仍然在研究部门，所以我写研究报告是有薪水的，然后我从为资产管理团队交易中赚取一定比例的利润。


    **Bourquin：** 好吧，这有点像混合模式。你既是自营交易员，又是研究撰稿人，所以你一个人干了所有活。


    **Gordon：** 是的。那真是一份很酷的工作。`[FOREX.com](http://FOREX.com)` 是我人生中一段美好的时光，我有机会与一群非常优秀的人共事，并撰写一份很棒的研究报告。我不是说一开始质量就很高，但我做得很开心。这也让我能够通过将策略公之于众来厘清它们。一旦发布出去，就无法隐藏或收回。在那段时间里，我对自己的交易获得了巨大的信心。


    随后，我与世界各地的客户建立了许多良好的联系。随着研究报告的发布，我的知名度也在上升。我明确表示，我在“每日策略”报告中提出的交易和分析，我会在对冲基金中投入相当大的规模。这让我们的合规部门抓狂！他们非常讨厌我，因为我总是尽可能通过谈论我交易的真实金额来挑战底线。我快把他们逼疯了，但公平地说，美国国家期货协会（NFA）在
    `[FOREX.com](http://FOREX.com)` 的办公室设有办事处，他们当时正在严厉打击外汇行业。`[FOREX.com](http://FOREX.com)`
    一直非常保守，希望确保他们始终合规。


    **Bourquin：** 让他们抓狂的事情之一是你如何从头到尾概述真实交易，对吗？


    **Gordon：** 对。我总是挑战自己，尽可能透明地展示我在市场中的交易和操作。我给合规部门写了封信，说我想为 2008 年 2 月在纽约举行的交易员博览会做点什么。我说我想完整地核算一下上个月基金中我的三笔最佳交易和三笔最差交易。我想让“每日策略”报告的读者和我的客户看到当月的确切损益表。我做到了，而且我想我给你看过那个
    PPT。


    **Bourquin：** 是的，我记得看过。没有多少人愿意分享他们赚了多少或赔了多少。


    **Gordon：** 我忘了具体的明细了，但我在三笔最佳和三笔最差交易中净赚了 `$25,000` 或 `$27,000`，并且我一步一步地带客户回顾了这些交易。我向他们精确展示了我是如何操作交易设置的。我向他们展示了从开始到结束的交易时间顺序。我冒了个险，如此公开这些信息，结果奏效了。我作为分析师和交易员的可信度持续增长。


    **Bourquin：** 我几乎从一开始就在读“每日策略”，我认为它之所以与众不同，之所以如此迅速地受到欢迎，是因为很多在聊天室和新闻简报中的人都会对交易做出预测，如果交易变糟了，你就再也听不到后续了。他们转向下一个预测，永远不会回头说：“我在这个交易上搞砸了。”而你会回过头来说：“嗯，显然美元交易的结果不太好。这是我认为它失败的原因，以及我现在关注的重点。”我认为这种可信度和正当性非常罕见，而且我认为人们尊重这一点。


    **Gordon：** 绝对如此。在交易行业的网络上有很多人试图吸引眼球，而我始终觉得这是最好的方式。在交易行业，很少有人愿意做到百分之百的透明。对于交易员来说，没有秘密，也没有轻松的成功之路。市场上存在一些极其误导人的营销，让交易员——尤其是新手交易员——觉得自己可以有
    90%的正确率。这不是市场的现实。如果你有 58%的正确率，并且你的平均值显示你在这些亏损交易中平均亏损 `48` 点，但在盈利交易中平均盈利 `82` 点，这是一个不错的业绩记录。这足以在市场中谋生。


    我想我的使命就是向人们展示交易的真实情况，因为在我的职业生涯中，我遇到过很多非常优秀的交易员，我要告诉你：在他们的一生中，很少有人（如果有的话）的正确率能超过
    60%。这个现实需要与大家分享。我受够了那些胡说八道的营销。太荒谬了。当然，作为交易员你可以赚钱，但这需要时间、专注和努力。


    **Bourquin：** 所以艾略特波浪理论让你达到了那个胜率，但我听说数浪并不容易。你必须以特定的方式数浪，这需要一些练习。你花了多久才对那个策略真正有信心？

    '
- fmt: '**Gordon:** 我大概会说需要四到五年。任何能够带来超过50%胜率的技能组合（就像一套好的交易方法论所能做到的那样），都需要付出大量的努力。我以前的滑雪教练总是说：“如果事情很简单，那每个人都能参加世界杯了。”这句话很简单，但我一直铭记于心。艾略特波浪理论是一种方法论，它让你能够量化市面上所有五花八门的传统技术形态。比如突破、跌破、旗形、楔形、双顶、双底等等。实际上，艾略特波浪理论会告诉你，在趋势或回调的哪个阶段，你可能会看到这些修正或形态的出现。当你把斐波那契数列叠加在它上面，它就能给你提供趋势和回调的预期起点，这就变成了你的入场点和出场点。


    但从更宏观的层面来看，艾略特波浪理论是什么？它所做的仅仅是帮助你“解读盘口”，帮助你理解是什么样的大众心理在驱动市场，仅此而已。驱动价格变化的是羊群效应和大众心理，而不是基本面。驱动价格变化的是人们对未来会发生什么的信念。艾略特波浪理论就像一张“作弊小抄”，告诉你在一系列趋势的每个阶段，你可能会预期到什么样的大众心理特征。


    当你能够退后一步并说，“根据我认为我们目前所处的波浪计数位置，我预期大众会有某种特定的感觉”，这感觉非常酷。你拿起报纸，打开电视，就能感受到人们在想什么、在说什么。你将这些感受与你寻找的、在趋势或回调各个阶段应该具备的特征进行叠加，然后你就能知道我们在这个过程和波浪计数中处于什么位置。接着，你就可以根据你的有效或无效判定点，着手进行交易了。所以，它不过是大众心理学的一张“作弊小抄”。一旦你树立起数浪的信心，市场就会变得更具可预测性。它总是有效吗？当然不是，但它能让你更好地感知市场潮起潮落中的位置。


    **Bourquin:** 你提到基本面在你的交易中并不占主要地位。当你基于你的艾略特波浪计数进行交易时，举个例子，就像我们正在进行这次访谈的今天，非农就业数据报告刚刚发布，你会在意这些吗？你会在意这些事件，还是会不理会它们而继续交易？


    **Gordon:** 如果艾略特波浪计数足够强劲，我整天都会无视这些事件进行交易。比如，今天我们持有澳元多头头寸，这是我们本周三建立的。在数据公布前，我们了结了部分头寸获利。今天我们带着澳元多头头寸进入非农数据公布时段，这通常与股市上涨相关。因为艾略特波浪计数显示我们正处于一个强势的第3浪突破过程中，所以我说：“我们要带着这个头寸挺过非农数据。”我知道，即使是一个糟糕的报告，澳元无论如何也还是会走高。在非农经济报告公布前，澳元正逼近一个高点，但仅仅因为我们所处的波浪计数位置，我就很放心地保留了部分头寸。


    有时候，波浪计数的力量强大到可以压倒任何其他新闻。当我们处于牛市时，市场会抛开盘面利空消息，继续遵循更长周期的趋势。请记住，艾略特波浪是市场心理的一个写照。即使一份经济报告对市场是灾难性的，如果我们处于牛市且波浪计数强劲，市场仍会走高。艾略特波浪理论可以告诉我们什么时候处于牛市，以及市场什么时候愿意忽略糟糕的数据。所以，是的，我们整天都在看基本面。但我们交易的不是基本面。我们交易的是人们对基本面的预期反应——而这正是关键的区别所在。


    **Bourquin:** 这太有意思了。所以这对我来说意味着，你对艾略特波浪理论如此自信，以至于你愿意忽视哪怕是一个重大的经济报告。你愿意因为你在图表上看到的艾略特波浪形态而穿越这个数据报告进行交易？


    **Gordon:** 你有多少次看到一份报告数据偏弱，但市场却上涨了？你又有多少次看到一份强劲的报告，但市场却下跌，走势与你预期的完全相反？这种情况一直在发生。必定有比那一瞬间的数据所显示的更强大的力量在起作用。我们验证或强化艾略特波浪理论的方法，是进行大量的相关性分析。我们寻找相关的市场。显然，大宗商品和股票市场与澳元高度相关。所以，我们会对相关联的市场进行波浪计数，并反过来验证我们在澳元上的分析。因此，如果大宗商品、国际股市和国内股市都处于“风险偏好”状态，并且我们在这些模式上都看到了良好的波浪计数，那么我根本不在乎会发布什么样的数据。如果市场看涨且大众在寻求风险，这些市场就会走高。


    **Bourquin:** 让我们再把时间线跳回你离开FOREX.com并创办自己企业的时候。谈谈那个决定以及它是怎么发生的。


    **Gordon:** 为自己工作并拥有自己的公司一直是我的梦想。我有幸与您Tim以及交易者博览会的同仁共事过，并且我在交易这个行业，与零售客户打交道，已经有很长一段时间了。通过这些关系，我认识了许多交易员，他们既交易自己的账户，也拥有自己的企业。我并不确定那是否是我想要的。我曾考虑过走投资银行的路线。我本可以在几家投行的技术研究部门谋得职位，但我最终还是选择了零售端，直接与客户合作，并拥有自己的研究业务。到目前为止，这太棒了，我对自己现在的状态非常满意。我热爱它。我真的很喜欢与交易员们一起工作，看着他们学习，并和他们并肩交易。这有助于我提高自己的交易水平。


    在我的职业生涯中，我一直与我大学毕业后的第一任老板戴夫·弗洛伊德保持着联系。戴夫经营阿斯彭交易公司已经有一段时间了。我开始与FOREX.com的人谈我自己出去创业的想法。他们知道这一直是我的目标，并且我已经越来越接近实现它了。我和他们商讨了很长一段时间，讨论如何以一种对双方都有利的方式进行过渡。我们找到了一个我可以这样做的方法——我不会称之为退出计划——但我们就我独立创业的事情，可能制定了一个长达约六个月的规划。我与他们密切合作。


    我与他们保持着非常良好的联系，并在几个项目上与他们会作。我对他们给予我的机会感激不尽，这些机会让我磨练了作为交易员的技能，并在网上建立了一定的关注度。那次离职非常愉快，并且我得到了他们的全力支持。他们待我非常好，那是一段很棒的经历。他们祝福我跟随戴夫去独立创业，我们一年半前重新启动了阿斯彭交易公司。这是我人生中最精彩的部分，与此同时，在那段时期我还结婚了。那是我永远不会忘记的两年。我现在正在做我一直想做的事：交易并与客户分享我的分析。


    **Bourquin:** 而且你现在做的事情，和你在FOREX.com时做的有些类似。你在阿斯彭交易公司为客户做研究，交易你自己的账户，同时你也在交易一个基金，对吗？'
  raw: '**Gordon:** I would say about four to five years. Anything that’s a skill
    set that can yield a better-than 50 percent win rate, which is what a good trading
    methodology can yield, will take a lot of work. My old ski coach would always
    say, “If it were easy, everyone would be on the World Cup.” It’s a simple saying,
    but it always stuck with me. Elliott Wave is a methodology that allows you to
    quantify all the varied traditional technical patterns out there. There’s a lot
    of breakouts, breakdowns, flags, wedges, double tops, double bottoms, and so forth.
    Elliott will actually tell you at what point of the trend or correction you’d
    expect to see these corrections come in or these patterns come in. You overlay
    Fibonacci on top of it and it’ll give you expected starting points for trends
    and corrections, so that becomes your entries and exits.


    But on a more macro level, what is Elliott Wave? All it’s doing is helping you
    “tape read” and helping you understand what crowd psychology is driving the markets,
    and that’s all it really is. It’s herd mentality, crowd psychology that drives
    price change, not fundamentals. It’s people’s belief of what’s going to happen
    in the future. Elliott Wave gives you a kind of a “cheat sheet” of what crowd
    psychological characteristics you would expect at each stage of the trend in a
    sequence.


    It’s so cool when you can step back and say, based on where I think we are on
    the wave count, I expect the crowd to be feeling a certain way. You pick up the
    newspaper and you turn on the TV, and you get a feel of what people are thinking
    and saying. You overlay that with the characteristics you look for at each stage
    of a trend or correction, and then you know where we are in the process and in
    the wave count. Then you go to work putting the trade on based on your validation
    or invalidation points. So, it’s nothing more than a cheat sheet of crowd psychology.
    Once you gain confidence in counting the waves, the market becomes much more predictable.
    Does it always work? Of course not, but it gives you a better feel for where we
    are in the ebb and flow of the markets.


    **Bourquin:** You mentioned that fundamentals don’t figure much into your trading.
    When you place a trade based on your Elliott Wave counts, do you care, for instance,
    that on the day that we’re doing this interview, the nonfarm payrolls [NFP] economic
    report has come out? Do you care about those events, or do you trade regardless
    of them?


    **Gordon:** I trade through them all day long if the Elliott Wave count is strong
    enough. For example, today we had a long Australian dollar position that we put
    on this past Wednesday. We took half our position off for a profit before the
    announcement. We came into NFP today with a long Aussie dollar position, which
    would correlate to higher stock prices. Because the Elliott Wave count said we
    were in the middle of a good wave 3 breakout, I said, “We’re carrying this position
    through NFP.” I knew that, even if it were a poor report, the Aussie dollar would
    have gone higher anyway. The Australian dollar was nearing a high before the NFP
    economic report, but just because of where we were on the wave count, I was comfortable
    staying in half the position.


    There are times that the wave count is so strong that it will override any other
    news. When we’re in a bull market, markets will push aside bearish news and continue
    with the longer-term trend. Remember, Elliott Wave is a picture of the psychology
    of the markets. Even if an economic report is terrible for the markets, if we’re
    in a bull market and the wave counts are strong, the market will head higher.
    Elliott Wave can tell you when we are in a bull market and when the market is
    willing to push aside poor data. So, yes, we look at fundamentals all day long.
    But we don’t trade the fundamentals. We’ll trade people’s expected reactions to
    the fundamentals—and that’s the key difference.


    **Bourquin:** That’s fascinating. So what that says to me is that you were so
    confident in the Elliott Wave that you’re willing to disregard even a huge economic
    report. You’re willing to trade through it because of what you see on the chart
    with the Elliott Wave?


    **Gordon:** How many times have you seen a report that comes in on the weak side
    but then the market rallies? How many times have you seen a strong report but
    the market sells off and does the reverse of what you thought it would? It happens
    all the time. There’s got to be greater forces at work than what the data was
    [showing] in that exact second. The way we substantiate it, or the way we fortify
    Elliott, is we do a lot of correlation analyses. We look for related markets.
    Obviously, commodities and equities are very highly correlated to the Australian
    dollar. So, what we’ll do is we’ll do wave counts on correlated markets and substantiate
    our analysis in the Australian dollar. So, if “risk is on” across commodities,
    international equities, and domestic equities, and we have good wave counts across
    the pattern, I don’t care what data piece comes out. If markets are bullish and
    the crowd is seeking risk, those markets are going higher.


    **Bourquin:** Let’s jump back again in the timeline from when you left [FOREX.com](http://FOREX.com)
    to open your own business. Talk about that decision and how that came about.


    **Gordon:** It was always my dream to work for myself and own my own company.
    I’ve had the luxury to work with you, Tim, and the Traders Expo, and I’ve been
    around this business, this industry of trading, working with retail customers,
    for a long period. Through those relationships, I met a lot of traders who traded
    their own accounts but also had their own businesses. I wasn’t sure that’s what
    I wanted to do. I thought about going the investment banking route. I could have
    taken a job at one or two investment banks on the technical research side, but
    I chose to go with the retail side and work with clients directly and own my own
    research business. It’s been terrific so far, and I’m really happy with where
    I am. I love it. I really enjoy working with traders, watching them learn, and
    trading alongside them. It helps me improve my own trading.


    During my career, I kept in contact with Dave Floyd, my first boss out of college.
    Dave had been running Aspen Trading for a while, and I started to talk with people
    at [FOREX.com](http://FOREX.com) about going out on my own. They knew it had always
    been a goal of mine and that I was getting closer to making it happen. I talked
    to them for a long period of time about how I could transition in a way that would
    work for both of us. We worked out a way I could do this—I wouldn’t call it an
    exit plan—but we worked on probably a six-month long plan for me to move out on
    my own. I worked very closely with them.


    I maintain really good contact with them and work with them on several projects.
    I am incredibly grateful for the opportunities they gave me to build my skills
    as a trader and build a following online. It was a really nice departure and I
    had their full support. They treated me really well and it was a great experience.
    They gave me their blessing to go out on my own with Dave, and we relaunched Aspen
    Trading a year and a half ago. It’s been the most amazing part of my life, in
    addition to getting married during that same period. It’s been two years that
    I’ll never forget. I’m doing exactly what I’ve always wanted to do: trade and
    share my analysis with clients.


    **Bourquin:** And you’re kind of doing something similar to what you were already
    doing at [FOREX.com](http://FOREX.com). You’re doing research for clients on Aspen,
    trading your own account, and then you’re also trading a fund as well, right?'
