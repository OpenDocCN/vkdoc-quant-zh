    # 访谈：交易员的日常与策略


    尽管交易已变得全球化，信息也全天候发布，但这并不意味着我们需要以牺牲生活方式为代价持续监控头寸。作为新手交易员，你完全可以保留全职工作并兼职交易。如果你想成为全职交易员，那当然可以，但你必须以相当规模的账户资金起步。这笔资金比大多数人想象的要更多。


    **布尔昆：** 说得好。想尝试全职交易，一个人需要多少启动资金？


    **戈登：** 你至少需要六位数。如果你想在这方面有所成就，我认为你的交易账户里需要有 20 万到 25 万美元。这还不包括可用于支付账单的储蓄账户。我还建议你先兼职交易几年，积累所需的经验和必须树立的信心。


    **布尔昆：** 嗯，那如果我只有 7.5 万美元，但拥有四倍杠杆呢？这算数吗，还是说需要现金？


    **戈登：** 不，不，不。绝对不行。你需要的是现金。在考虑辞职以交易为生所需资金时，杠杆不应纳入考量。你需要足够的资本，这样才能做出明智的交易决策，而不必承担过度的风险。资金太少等于压力太大，因为你不得不持续承担超出合理范围的风险。如果你只有
    7.5 万美元，每笔交易承担的风险占整体账户的比例会让你感到不安，最终你可能会遭遇亏损，被迫重操旧业。人在极度不安时，很难做出正确决策。你需要尽可能将自己置于最佳状态。


    需要知道的是，我们并不鼓励大多数客户立刻去全职交易，即便他们拥有我提到的账户规模。这是一种压力极大的处境，很少有人能应付得来。我们的交易风格和业务模式，是为那些喜欢每天花两三个小时进行交易，但同时拥有全职工作或在生活中有其他事务的人设计的。成为一名成功的交易员，并不意味着你必须单干，全职投入。如果你有足够的资金、时间，且生活方式允许你以交易为生，我会说：太好了，去做吧。但这并不适合所有人。


    **布尔昆：** 你认为你每天花在纯粹研究上的时间有多少小时？


    **戈登：** 我大约在美国东部标准时间早上 6:00 到 6:15 醒来。我会从卧室长途跋涉，穿过厨房，进入我的交易办公室——这段通勤路程大约 12 秒，可能和你上班的路程差不多。


    **布尔昆：** 没错。这是拥有自己生意的一大好处！


    **戈登：** 毫无疑问。喝完第一杯咖啡后，我从大约早上 6:30 开始工作。我和戴夫一直保持联系，我们会进行研究工作直到中午左右。所以，在白天大约五个半小时的时间里，我会密切关注市场——我们的图表以及任何正在交易的头寸，然后我们会处理业务行政事务，一直持续到纽约收盘。接下来，在纽约收盘时段，我们会再进行一到两个小时的研究。总的来说，我每天大约花七到八个小时做研究，四到五个小时处理日常业务运营。


    **布尔昆：** 那么，实际执行交易只需要几分钟。我想，所有精力都投入在前期研究中了。


    **戈登：** 没错。艰苦的工作是在那些研究时间里完成的。实际建仓是我一天中最微不足道的部分。我还要花些时间为我在 CNBC 的亮相做准备。拥有像戴夫这样的商业伙伴的好处之一就在这里。为了一档节目，CNBC
    可能会占用很多准备时间，这时候我可以离开，由戴夫来管理业务。这对我们这个小公司来说是很好的曝光机会，而且我个人也很享受。


    **布尔昆：** CNBC 的这个机会是怎么来的呢？


    **戈登：** 同样，还是通过[FOREX.com](http://FOREX.com)。我获得了做一些嘉宾访谈的机会，提供货币评论，因为[FOREX.com](http://FOREX.com)是赞助商并在电视上播放广告。制作《Money
    in Motion》节目的制片人看到了我的访谈和我的市场观点，于是给了我试镜《Money in Motion》节目的机会，也就是我现在每周五参与的那个环节。我大概经历了三四轮选拔，我想他们可能面试了三四十人，我是最终入选该节目的前三名之一。


    **布尔昆：** 再次证明，你作为交易员的坦诚性格帮了你大忙！你在节目上谈论的策略，和你每天在自己的账户以及基金里实际交易的策略有何不同？还是说它们是一样的？


    **戈登：** 和我每天为自己的账户、基金以及客户所研究的策略是一样的。当我在电视上发言时，我的研究客户们会确切知道我在说什么，因为我一整天或一整周都在和他们沟通这些。不过，在一档周播节目里，要真正把我希望交易员们理解的信息传递出去是很困难的，因为它显然只是一档周播节目，而市场每天都在变化。但就交易的“入场形态”以及我想要建立头寸的原因而言，它们完全就是我研究报告中所运用的那类交易思路。但一个明显的区别是，我无法像对待研究客户那样，对电视观众进行后续跟进和头寸管理。


    **布尔昆：** 作为交易员、教育者和分析师，你身兼数职。你觉得自己几年后会是什么样子？在你的交易策略或个人风格方面，有什么想要改进的地方吗？


    **戈登：** 总会有可以改进的地方。这是市场中唯一的确定性。但我对我们目前的交易状况以及业务的进展感到非常满意。现在，我和戴夫正与两位量化分析师合作，他们正在分析我们所有的交易结果。我们想了解我们的策略表现如何，以及我们在更长时期内执行该策略的能力如何。目前，我们的胜率非常高。大约
    63%的交易是盈利的，但我要告诉你，这个比例太高了。


    **布尔昆：** 太高了？没这回事！你是什么意思？


    **戈登：** 我知道这听起来很疯狂，但原因如下。目前，我们平均每笔亏损的金额与平均每笔盈利的金额过于接近。这意味着我需要降低对正确率的依赖，但必须在每笔盈利交易中赚取更多的平均点数。进一步说，我必须加大对盈利交易的头寸规模，对它们更有耐心，让它们为我们创造更多利润。


    这正是我和戴夫作为商业伙伴和交易员能够良好合作的地方。我们两个人的想法会集中到一笔交易上。我们必须用更大的头寸规模去推进盈利交易，同时要冒着因被止损而拉低平均入场价格的风险。这会使我们的正确率——即“命中率”——略有下降，但这会拉开我们平均盈利与平均亏损之间的差距。所以，对于那些我们确实做对的交易，我需要降低对正确率的追求，而是要在这些交易中赚取更多的美元。本质上，我希望我们的盈利远远大于亏损，而为了实现这一点，我们的胜率需要适当下降。


    **布尔昆：** 这很有意思。为什么不止损设得更近一些呢？你可能会更频繁地被止损，但每次亏损会更少，而盈利的头寸则可以任其运行？

    '
- fmt: '# 对话记录：Gordon 与 Bourquin 的交易策略探讨


    **Gordon:** 这是个好问题，我们也考虑过。我们不这样做，是因为我们的策略需要有更大的止损空间，才能给它足够的时间发挥作用。我是个不错的交易者，但很多时候，我们入场后，行情并不会立刻朝对我们有利的方向发展。很多时候，如果我们设置更紧的止损，我们会因为过早地被扫出局，而错过那些我们相信，只要有足够时间，最终会成功的交易。


    我们需要做的是，在交易显示出它正在有效运转后，进行良好的管理，然后在其生效后迅速将止损点上移。我们还需要加仓那些表现良好、且仍有空间沿着我们看好的方向继续前进的头寸。所以，我们会移动止损，并在交易中增加仓位，然后让交易自行发展——这将为每笔盈利的交易创造更多的收益。


    如果我们把止损设置得太紧，就有可能无法看到行情的后续发展。但我们需要在盈利的交易上更加积极，这基本上意味着，一旦交易开始盈利，就要向它们追加资金。我们会做所有这些事，同时仍然严格遵守我们的风险纪律。这一点不能改变。我们不愿意在每笔交易上都增加风险，然后仅仅指望它带来更大的收益。自市场诞生以来，很多交易者都是这样被消灭的。


    **Bourquin:** 这恰恰说明了你对自己作为交易者的了解有多深刻，也说明了为什么胜率超过 50% 并不意味着你就能赚钱。我认为很多交易者都在挣扎，他们不明白自己为什么无法进步，也许因为他们有
    60% 的胜率，但他们对自己的盈利头寸太没有耐心，过早地平仓，导致盈利无法以正确的比例覆盖亏损。


    **Gordon:** 这一点也很容易看出来。对于我的个人账户，我会把所有交易记录在 Excel 电子表格中，跟踪每一笔交易，并且偶尔把盈利和亏损相加，以追踪盈亏比和净利润。有一件事我还没提，那就是我会根据我对某个特定想法的确信程度，给每笔交易打分。这是我在入场前，就确定自己对这个交易最终能成功的信心程度的方法。


    我有一个四级确信体系。从第一级（最强）到第四级（不那么强），我会计算每级交易的平均值——只是计算简单的平均盈利规模、平均亏损规模——针对每一个确信级别。这都只是非常简单的电子表格操作。交易结束后，记录每笔交易的信息不应该超过一分钟。然后我会回顾，看看我确信度最高的第一级交易是否赚了最多的钱。有时候是这样，并且情况总是在改善。


    作为交易者，你能为自己做的最好的事情之一，就是回顾并审视自己的交易结果。令人惊讶的是，有很多交易者不这样做，但对我来说，这能带来天壤之别。这源于很久以前，我在
    [FOREX.com](http://FOREX.com) 撰写“每日策略”研究报告的时候。如果我经历了一段交易表现不佳的时期，我会回过头去看看那些交易顺利的时期，然后努力找出我当时做了哪些不同的事情。我会重读我那段时间写下的内容，审视我的语气，并观察当时的市场状况。我也会看我当时交易的是哪些模式。通常，我会发现一些我在顺风顺水时做过、但后来不再做的事情，或者是市场已经发生了变化，而我未能做出相应的调整。


    我建议交易者们为他们的朋友或家人撰写研究报告，因为这恰恰是记录你交易背后逻辑的绝佳方式，也能让你对自己坦诚，清楚自己为什么会有这些交易行为。拥有所有这些“每日策略”报告的存档对我帮助巨大，并且为我在未来数年的交易定下了基调。退一万步说，哪怕只是保持一个简单的电子表格，记录下交易参数——你最初冒了多少风险，你在交易中赚了多少，以及这背后的原因。把它保存好，存储起来，然后当你经历低谷时，回顾一下你在成功时期的所作所为。你从中领悟到的东西会让你惊叹。


    **Bourquin:** 你提到“每日策略”报告让你对自己诚实，因为你是把它公之于众的。你无法事后反悔说：“嗯，我其实不是那么想的”或者“我没做那笔交易”。报告就在那里，如果你试图否认，订阅者们会毫不留情地批评你。


    **Gordon:** 哦，蒂姆，我的客户们把那份报告读得可仔细了。如果我在报告里打错了一个字，比如我们说某个出场价格，但实际上那个价格偏离了十个点，我立刻就会收到人们的来信，说：“不，你实际上是在这个价格出场的。”我的意思是，他们让我对每一点都完全诚实。但这对我有好处。作为交易者，没有什么比这更能让你保持纪律并建立对自己信念的信心了。


    **Bourquin:** 所以，别的先不说，这些策略对你的客户来说当然很棒，但听起来，这也是你个人取得成功的一大关键因素，对吗？


    **Gordon:** 这是我作为交易者成长过程中至关重要的一部分。我认为没有更好的学习方法了。你知道，你能做的最好的事情就是，召集五到七个交易伙伴，建立一个邮件群组，然后把你自己的策略和你正在关注的交易机会通过邮件发给他们。当你把这些东西落在纸上，并试图以符合逻辑的格式把它们组织起来，以便别人能理解时，你对自己变得诚实，效果会令人惊讶。你要对自己的交易负责，你不会再说：“我认为
    XYZ 会发生，所以我打算做一笔交易。”如果你无法用简单的语言解释你交易背后的逻辑，那么很可能存在问题，你会一直亏钱。但如果你必须用合理的论据来支持你的想法，那么当你对交易背后的逻辑不确定时，这真的会让你三思而后行。我过去是面对全世界成千上万的人做这件事，但你可以只在一个小群里朋友中做。你会因此成为更好的交易者。


    后来，我达到了这样的程度：根据我的交易规则，除非一笔交易被写进了“每日策略”报告，否则我不会在对冲基金中投入超过我允许仓位 50% 的资金。我经历过足够多的这种情况，或者只是发现，那些我写进研究报告并公开的交易，是我表现最好的交易。那些没被写进报告的交易，则是我表现最差的，很可能是因为我一开始就没有向自己、向读者证明我为什么要做这些交易。有趣的是，事实就是这样。


    ## 章节


    # Linda Raschke


    ***Linda Bradford Raschke*** *自 1981 年以来一直是全职专业交易者。她最初是**股票期权的做市商**，并曾在两家交易所担任会员和场内交易员。20
    世纪 90 年代初，Raschke 成为注册商品交易顾问 (CTA)，并创立了 LBRGroup, Inc.，一家专业的资金管理公司。除了运营成功的 CTA
    项目外，她曾担任多个对冲基金的首席交易员，并管理过商业对冲项目。她曾被收录在 Jack Schwager 的著作《新金融怪杰》(John Wiley & Sons,
    1992) 以及 Sue Herera 的著作《华尔街的女性》(John Wiley & Sons, 1997) 中。*'
  raw: '**Gordon:** It’s a good point, and we’ve considered it. We don’t do that because
    our strategy needs to have that wiggle room of a larger stop in order to give
    it time to work. I’m a good trader, but there are a lot of times where we’ll get
    into a trade and it just doesn’t immediately go in our favor. A lot of times,
    if we put a tighter stop loss, we will be knocking ourselves out of a trade too
    quickly that we believe, given enough time, will ultimately work out.


    What we need to do is manage the trade well after the trade has shown evidence
    that it’s working, and then quickly move the stop up behind us after it’s working.
    We also need to add to the positions that are working well and still show room
    to continue in the direction we favor. So, we’ll trail the stop behind and get
    more size on in the trade, and then allow the trade to work—and that’s going to
    create more dollars made per winning trade.


    If we kept our stop too tight, we’d risk not being able to see the trade follow
    through. But we need to be more aggressive with our winning trades, and that basically
    comes down to adding money to them once they are profitable. We’d do all of that
    and still stay within our strict risk discipline. That can’t change. We aren’t
    willing to increase our risk on every trade and just hope it results in bigger
    gains. Traders have been slaughtered that way since the beginning of the markets.


    **Bourquin:** That just shows how well you know yourself as a trader and why having
    a better than 50/50 win rate doesn’t mean you’ll make money as a trader. I think
    a lot of traders struggle and they can’t understand why they can’t get ahead,
    because maybe they are at a 60 percent win rate, but they are so impatient with
    their winners that they close them too early and they don’t outweigh the losers
    in the right proportion.


    **Gordon:** It’s really simple to see, too. For my personal account, I write down
    all of my trades in an Excel spreadsheet, keep track of every trade, and I’ll
    simply add up winners and losers occasionally to keep track of the win/loss ratio
    and net profits. One thing I didn’t mention is that I rate each trade based on
    the conviction I have for that specific idea. It’s my way of determining, before
    I put on the trade, the amount of confidence that I have in it working out favorably.


    I have our four-tier convictions. We have a tier one [strongest] through four
    [not as strong], and I’ll add up the averages for each trade—just doing the simple
    average win size, average loss size—for each conviction tier. Just very simple
    Excel stuff. After the trade is over, it shouldn’t take any more than one minute
    to record that information on each trade. I then look back to see if my tier one
    convictions are making the most money. Sometimes they do, and it’s always improving.


    One of the best things you can do for yourself as a trader is go back and look
    at your trading results. It is amazing how many traders don’t do it, but for me
    it makes all the difference. It started for me way back when I was writing those
    “Strategy of the Day” research reports at [FOREX.com](http://FOREX.com). If I
    were going through a period of poor trading, I would go back and look at times
    that I was trading well and then try to figure out what I was doing differently.
    I’d read what I wrote when I was trading well, I’d look at my tone, and I’d look
    at the market conditions during that time. I’d also look at what setups I was
    trading. Usually I would see something that I was doing during those good times
    that I had stopped doing, or the market had just changed and I failed to make
    the adjustment.


    I’d recommend traders write research reports for their friends or family, simply
    because it’s an excellent way to document your reasoning behind trades and keep
    yourself honest to yourself about why you are taking the trades you are taking.
    Having all those back editions of the “Strategy of the Day” report helped me tremendously
    and really set the tone for my trading for years. If nothing else, just keep a
    simple spreadsheet and put the trade parameters in—how much you originally risked,
    how much you made on the trade, and the rationale behind it. Keep it, store it,
    and then when you’re going through a down period, look back in time to see what
    you were doing during a successful period. It’s amazing what you’ll glean from
    that.


    **Bourquin:** You’ve mentioned that the “Strategy of the Day” report kept you
    honest because you’re putting it out there to the world. There’s no going back
    and saying, “Well, I didn’t really think that way” or “Take that trade.” It’s
    out there, and the subscribers will hammer you if you try to back away from it.


    **Gordon:** Oh, I had clients reading that thing so closely, Tim, that if I wrote
    in the report via a typo, saying we got out one price and it was actually ten
    pips away from that actual price, I’d have people writing in immediately and saying,
    “No, it was actually this price you got out.” I mean, they had me honest to the
    pip. But it was good for me. There’s no better way to stay disciplined and develop
    confidence in your convictions as a trader.


    **Bourquin:** So if nothing else, certainly the strategies were great for your
    clients, but it sounds like that was a huge part of making yourself successful
    as well?


    **Gordon:** It was a huge part of my evolution as a trader. I don’t think there
    is a better way to learn. You know, the best thing you can do is get maybe five
    or seven of your trading buddies together and just come up with an e-mail circle
    and e-mail out to your friends what your strategies are and what you are looking
    at in terms of opportunities. If you put them to paper and try to get them in
    a logical format so that somebody else can understand them, it’s amazing how much
    more honest you become. You’re accountable to your trade and you’re not going
    to just say, “I think XYZ is going to happen, so I’m going to put on a trade.”
    If you can’t explain in simple terms the reasoning behind your trades, then there
    is likely a problem and you’ll lose money all day long. But if you have to back
    up your ideas with a reasonable argument, it’s really going to make you think
    twice about taking a trade if you’re unsure of the rationale. I was doing it with
    thousands of people all over the world, but you can do it with a small group of
    friends. You’ll be a better trader for it.


    It got to the point where I wouldn’t put a trade on in the hedge fund that was
    any bigger than 50 percent of my allowed size, per my trading rules, unless it
    was in the “Strategy of the Day” report. I went through this enough or just found
    out the trades that I put in my research and made public were my best trades.
    The ones that didn’t make it into the report were my worst, probably because I
    didn’t justify to myself, to my readers, why I was getting into it in the first
    place. Funny how it worked that way.


    CHAPTER


    Linda Raschke


    ***Linda Bradford Raschke*** *has been a full-time professional trader since 1981\.
    She began as a market maker* *in equity options and was a member and floor trader
    on two exchanges. In the early 1990s, Raschke became a registered Commodity Trading
    Advisor (CTA)* *and started LBRGroup, Inc., a professional money management firm.
    In addition to running successful CTA programs**, she has been principal trader
    for several hedge funds* *and has run commercial hedging programs. She was recognized
    in Jack Schwager’s book,* The New Market Wizards *(John Wiley & Sons, 1992), and
    in Sue Herera’s book,* Women of the *Street (John Wiley & Sons, 1997).*'
  trans: '

    # 对话记录：Gordon 与 Bourquin 的交易策略探讨


    **Gordon:** 这是个好问题，我们也考虑过。我们不这样做，是因为我们的策略需要有更大的止损空间，才能给它足够的时间发挥作用。我是个不错的交易者，但很多时候，我们入场后，行情并不会立刻朝对我们有利的方向发展。很多时候，如果我们设置更紧的止损，我们会因为过早地被扫出局，而错过那些我们相信，只要有足够时间，最终会成功的交易。


    我们需要做的是，在交易显示出它正在有效运转后，进行良好的管理，然后在其生效后迅速将止损点上移。我们还需要加仓那些表现良好、且仍有空间沿着我们看好的方向继续前进的头寸。所以，我们会移动止损，并在交易中增加仓位，然后让交易自行发展——这将为每笔盈利的交易创造更多的收益。


    如果我们把止损设置得太紧，就有可能无法看到行情的后续发展。但我们需要在盈利的交易上更加积极，这基本上意味着，一旦交易开始盈利，就要向它们追加资金。我们会做所有这些事，同时仍然严格遵守我们的风险纪律。这一点不能改变。我们不愿意在每笔交易上都增加风险，然后仅仅指望它带来更大的收益。自市场诞生以来，很多交易者都是这样被消灭的。


    **Bourquin:** 这恰恰说明了你对自己作为交易者的了解有多深刻，也说明了为什么胜率超过 50% 并不意味着你就能赚钱。我认为很多交易者都在挣扎，他们不明白自己为什么无法进步，也许因为他们有
    60% 的胜率，但他们对自己的盈利头寸太没有耐心，过早地平仓，导致盈利无法以正确的比例覆盖亏损。


    **Gordon:** 这一点也很容易看出来。对于我的个人账户，我会把所有交易记录在 Excel 电子表格中，跟踪每一笔交易，并且偶尔把盈利和亏损相加，以追踪盈亏比和净利润。有一件事我还没提，那就是我会根据我对某个特定想法的确信程度，给每笔交易打分。这是我在入场前，就确定自己对这个交易最终能成功的信心程度的方法。


    我有一个四级确信体系。从第一级（最强）到第四级（不那么强），我会计算每级交易的平均值——只是计算简单的平均盈利规模、平均亏损规模——针对每一个确信级别。这都只是非常简单的电子表格操作。交易结束后，记录每笔交易的信息不应该超过一分钟。然后我会回顾，看看我确信度最高的第一级交易是否赚了最多的钱。有时候是这样，并且情况总是在改善。


    作为交易者，你能为自己做的最好的事情之一，就是回顾并审视自己的交易结果。令人惊讶的是，有很多交易者不这样做，但对我来说，这能带来天壤之别。这源于很久以前，我在
    [FOREX.com](http://FOREX.com) 撰写“每日策略”研究报告的时候。如果我经历了一段交易表现不佳的时期，我会回过头去看看那些交易顺利的时期，然后努力找出我当时做了哪些不同的事情。我会重读我那段时间写下的内容，审视我的语气，并观察当时的市场状况。我也会看我当时交易的是哪些模式。通常，我会发现一些我在顺风顺水时做过、但后来不再做的事情，或者是市场已经发生了变化，而我未能做出相应的调整。


    我建议交易者们为他们的朋友或家人撰写研究报告，因为这恰恰是记录你交易背后逻辑的绝佳方式，也能让你对自己坦诚，清楚自己为什么会有这些交易行为。拥有所有这些“每日策略”报告的存档对我帮助巨大，并且为我在未来数年的交易定下了基调。退一万步说，哪怕只是保持一个简单的电子表格，记录下交易参数——你最初冒了多少风险，你在交易中赚了多少，以及这背后的原因。把它保存好，存储起来，然后当你经历低谷时，回顾一下你在成功时期的所作所为。你从中领悟到的东西会让你惊叹。


    **Bourquin:** 你提到“每日策略”报告让你对自己诚实，因为你是把它公之于众的。你无法事后反悔说：“嗯，我其实不是那么想的”或者“我没做那笔交易”。报告就在那里，如果你试图否认，订阅者们会毫不留情地批评你。


    **Gordon:** 哦，蒂姆，我的客户们把那份报告读得可仔细了。如果我在报告里打错了一个字，比如我们说某个出场价格，但实际上那个价格偏离了十个点，我立刻就会收到人们的来信，说：“不，你实际上是在这个价格出场的。”我的意思是，他们让我对每一点都完全诚实。但这对我有好处。作为交易者，没有什么比这更能让你保持纪律并建立对自己信念的信心了。


    **Bourquin:** 所以，别的先不说，这些策略对你的客户来说当然很棒，但听起来，这也是你个人取得成功的一大关键因素，对吗？


    **Gordon:** 这是我作为交易者成长过程中至关重要的一部分。我认为没有更好的学习方法了。你知道，你能做的最好的事情就是，召集五到七个交易伙伴，建立一个邮件群组，然后把你自己的策略和你正在关注的交易机会通过邮件发给他们。当你把这些东西落在纸上，并试图以符合逻辑的格式把它们组织起来，以便别人能理解时，你对自己变得诚实，效果会令人惊讶。你要对自己的交易负责，你不会再说：“我认为
    XYZ 会发生，所以我打算做一笔交易。”如果你无法用简单的语言解释你交易背后的逻辑，那么很可能存在问题，你会一直亏钱。但如果你必须用合理的论据来支持你的想法，那么当你对交易背后的逻辑不确定时，这真的会让你三思而后行。我过去是面对全世界成千上万的人做这件事，但你可以只在一个小群里朋友中做。你会因此成为更好的交易者。


    后来，我达到了这样的程度：根据我的交易规则，除非一笔交易被写进了“每日策略”报告，否则我不会在对冲基金中投入超过我允许仓位 50% 的资金。我经历过足够多的这种情况，或者只是发现，那些我写进研究报告并公开的交易，是我表现最好的交易。那些没被写进报告的交易，则是我表现最差的，很可能是因为我一开始就没有向自己、向读者证明我为什么要做这些交易。有趣的是，事实就是这样。


    ## 章节


    # Linda Raschke


    ***Linda Bradford Raschke*** *自 1981 年以来一直是全职专业交易者。她最初是**股票期权的做市商**，并曾在两家交易所担任会员和场内交易员。20
    世纪 90 年代初，Raschke 成为注册商品交易顾问 (CTA)，并创立了 LBRGroup, Inc.，一家专业的资金管理公司。除了运营成功的 CTA
    项目外，她曾担任多个对冲基金的首席交易员，并管理过商业对冲项目。她曾被收录在 Jack Schwager 的著作《新金融怪杰》(John Wiley & Sons,
    1992) 以及 Sue Herera 的著作《华尔街的女性》(John Wiley & Sons, 1997) 中。*

