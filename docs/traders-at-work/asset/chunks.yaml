  trans: '**Bourquin：** 你提到周二、周三和周四是日内交易最有利的时间。假设你在周五下午收到了一个不错的波段买入信号。你会因为是周五而感到担忧，还是会照常按信号操作？


    **Berger：** 在周五下午进行交易，我肯定会更加犹豫。我得说，这时候就需要多一些长期分析来发挥作用了。


    例如，在我看来，2011 年秋季，持仓或买入股票熬过周末都非常困难，因为你永远不知道周末会出什么消息。所以，这多少取决于宏观和地缘政治背景。


    **Bourquin：** 这么说，在某种程度上，消息面对你来说仍然很重要，尤其是在波段交易中？


    **Berger：** 是的。消息面在波段交易中当然很重要，而且在我倾向于利用另外两个较短时间框架进行交易的长期持仓中，它甚至更为重要。


    **Bourquin：** 这很有趣。我听说很多交易员总是持有长期头寸，他们会定期对这些头寸进行增减，但始终保留一定的基础仓位，并不断进行短线进出。这就是你对长期持仓的做法吗？


    **Berger：** 是的。我认为作为交易员，我们能获取的最大阿尔法（Alpha）就是理解当前的市场环境。例如，我喜欢举 Appaloosa Management
    的基金经理大卫·泰珀的例子，因为这个例子非常典型且精彩。他曾公开表示，政府文件明确表明他们（政府）会以“X”价格购买花旗集团的股票，而这个价格比当时的市场价格高了
    20%、30%，甚至我都不知道高了多少个百分点！他需要买入这只股票，这简直是显而易见的。


    同时，同样非常清楚的是，流动性注入基本上是在强迫投资者购买股票。现在要明白，那是 2009 年最重要的事情。估值不重要。所有利空消息都不重要。唯一重要的是流动性注入，而事实上，这种情况至今仍在持续。


    理解某些时候基本面更重要，而另一些时候仅仅消息面才是关键，这一点非常非常重要。


    **Bourquin：** 当政府开始介入市场时，所有的押注在技术分析层面都失效了，因为如果美联储想注入流动性，这就会凌驾于你拥有的任何技术信号之上。所以，在这种程度的政府干预下，你可以忽略技术信号。


    **Berger：** 是的，你不想与之对抗。无论是“不要与美联储作对”，还是最近常说的“不要与欧洲央行作对”，都不是你想做的事。


    不过，技术分析仍然有效。你只需要理解当前形势。过去几年里，做空基本上都会受到重创。如果你理解这一点，那么你就明白，你基本上必须变成一个趋势跟踪者——姑且这么说——然后逢低买入，当然，这种思维模式可能会迅速改变，但这就是当前的情况。技术分析会有效，但如果你愿意，它不会对“趋势反转”分析有效。


    **Bourquin：** 你会跟踪你的盈亏比吗？可以和我们分享一下吗？


    **Berger：** 我会。当然，这取决于交易类型。缺口交易可能是我能给出的最简单的例子，其胜率大约在 75%。这相当高了，但更重要的问题是关于我在任何特定交易上的仓位大小。我可以告诉你，在这些交易中，我有
    75%的成功率，这是事实，但真正关键的是我如何配置仓位的大小。


    **Bourquin：** 对。如果你在盈利的交易上仓位小，而在亏损的交易上仓位大（那就糟了）。


    **Berger：** 没错。这实际上是一些人不理解的一个大问题。他们很高兴得到一个关于某只股票的“内幕消息”，但他们不知道提供消息的人用了多大仓位——而对我而言，这才是最重要的。


    **Bourquin：** 你发现 2011 年底和 2012 年由于各种消息面，交易环境变得更困难了，还是说和其他时期一样好？


    **Berger：** 从交易员的角度来看，说实话，那段时间非常困难。很大程度上是因为缺乏波动性。在 2012 年初，很难看清欧洲央行在去年 12 月首次注入资金的真正影响有多大。我当时很清楚市场会有一波反弹，但看到反弹幅度如此之大，确实非常令人惊讶。


    我认为交易变得更困难了，尤其是从 8 月下旬到 9 月这段时间。2011 年 10 月倒是一个美妙的时间段，因为波动性很大。


    **Bourquin：** 是的，低波动性总是让交易更难。既然你关注欧洲央行和其他央行的动向，你有交易外汇期货吗？


    **Berger：** 没有。我不交易外汇期货。我坚持做我之前提到的那些资产类别，主要原因是我认为（如果交易太多）很难跟踪所有东西。正如我之前所说，我以前是做固收的，交易过很多信用违约互换、公司债券，甚至主权债券，但要跟踪的东西实在太多了。


    如今，随着 ETF 的出现，如果我想做一个大概的交易，比如做多欧元或澳元，我可以通过交易 ETF 来实现。当然，这样我会在手续费上有所损失，但我很乐意仅仅把它当作一个宏观交易来做，而不用担心处理外汇和公司债券的复杂性，因为那样我需要不同的经纪商以及其他一切东西。


    **Bourquin：** 是的，你说得对。如今 ETF 这么多，根据你持有的任何倾向建仓都变得简单多了。


    在我们访谈尾声，我们来谈谈你学到的一些重要经验，这些经验真正帮助你在交易中提高了盈利能力和自信心。你能分享一些在交易道路上真正对你有帮助的东西吗？


    **Berger：** 嗯，你总是听到关于及时止损的重要性。没有什么比这更能让人保持谦逊了。这是一句被用滥了的话，但确实千真万确。对我来说，关键在于纪律。我越是坚持自己的规则，不去关注盈亏方面（就像我们之前提到的），我就越发现赚钱很容易。


    另一件事——同样重要——就是不要过度交易。再说一遍，这也是一句常被引用的格言，但它是真的，这也是为什么它在交易员中如此普遍。人们有很强的过度交易倾向——尤其是在短线时间框架中，尤其是当执行交易跟按下一个按钮一样简单时。大多数时候，这都弊大于利。


    **Bourquin：** 我完全同意，而且我自己的交易中也经历过。当我意识到即使我当时没有积极地在市场中，甚至一整天都没有做任何交易，我实际上仍然在“交易”时，我取得了进步。交易不仅仅意味着你身处市场中。交易也可以意味着你在一旁坚守，等待合适的交易机会出现。


    **Berger：** 没错。我认识的两个最优秀的交易员，他们的交易量可能只有我的一半。坦率地说，我自己交易得也不算多。


    交易机会在开盘缺口附近相对频繁地出现，但这并不典型。关键在于等待正确的机会，然后果断行动。


    问题在于，作为人类，我们的思绪总是在运转，很难让它停下来。我甚至已经到了通过做瑜伽和冥想，来确保自己能保持冷静和专注的程度。或者，我们也可以借助运动，或者任何能让我们保持冷静、不轻举妄动的方法。'
- fmt: '# Bourquin: I agree that something outside of trading is critical, almost
    no matter what it is. It can be basket weaving, or sports, or some hobby to take
    your mind off the markets. That’s very key.


    **Berger:** Drinking tends not to be the best thing! But yeah, you need something
    to help detach your mind from the markets.


    **Bourquin:** Yeah, drinking is probably not the answer! Let’s talk about some
    recent trades. Maybe a good one and one that didn’t turn out so well, and what
    you learned from it.


    **Berger:** I can give you very good one on the `S&P 500`. If you look at the
    `S&P 500` from a swing perspective, we had a low on February 16, 2012, and made
    a high just a few days later on February 21 in the overnight session. The market
    was very overbought at that point, and it then retraced 61.8 percent, almost to
    the tick. Of course, that’s a very key Fibonacci support area and one we mentioned
    before.


    We had lateral support. We had the momentum oscillators overbought, and, in fact,
    already showing signs of divergences. We had European credit start to tighten.
    Sure enough, we ended up reaching our 23.6 percent extension target at around
    1375 just about a week later.


    **Bourquin:** Wow, so that’s a case where everything lined up and worked exactly
    the way it should.


    **Berger:** Exactly. When things are so overbought, everyone understands it needs
    to pull back, but as a trader, you can’t “be the ball.” What I mean by that is
    the market can remain irrational for a long time, and much, much longer than we
    may think. To some extent, we all have the disease of short-termism, and from
    that perspective, it’s very important to be able to disconnect your emotions.


    **Bourquin:** And finally, the losing trade. What didn’t go your way in that scenario?


    **Berger:** Well, I like to leg into positions—swing positions especially—at the
    top or bottom of major swings. At the time, Apple was a big headline story, having
    busted right through the `$500` level and now, at the time of our interview, tickling
    `$550`.


    I went short using slightly out-of-the-money calls as we went up to that `$500`
    level. Of course, now that we’re at `$550`, that position is hurting. If you analyze
    it, however, there’s a couple of very important things to be learned.


    One of them is that I didn’t short the stock. I instead shorted out-of-the-money
    calls, which gives me much more leeway. Those calls are several months in the
    future, so they give me more room to play with. I would then go in and short more
    stock once I see a major turnaround, but as we speak, that’s a losing position.
    But important points to consider are that it was sized right and structured right,
    which gives me more room for error.


    **Bourquin:** A lot of traders have really been hurt trying to find that top in
    Apple, and it just doesn’t seem to be coming anytime soon. At what point would
    you be willing to buy the stock if it continues to not go your way, or at what
    point will you just get out?


    **Berger:** That’s a very good question. I strongly believe that stocks that go
    vertical—like Apple has been—inevitably come back some. Now, it doesn’t have to
    be 30 percent, but a lot of them will come back between 5 percent and 10 percent,
    and that happens quite quickly.


    If I see Apple go well above `$570` in this specific case, I will start to take
    some losses on those short calls and then watch it a little bit more. But stocks
    that go vertical have a very, very high probability—in fact, it’s almost 100 percent—of
    coming back. You can look at Google back in 2007 when it top ticked, or look at
    Netflix in 2011. Netflix rallied more than 60 percent vertical at the beginning
    of the year, and then cratered. That’s an extreme case, but the point is that
    stocks that go vertical don’t last. It’s just a matter of when they’re going to
    come back.


    With Apple, it’s not even the fundamental case. Now, I’m not a fundamental guy
    as much as I am a technical trader, but it’s not a fundamental case that’s going
    against Apple. Think about why Apple is going vertical. It’s going vertical because
    of the momentum funds in there.


    I have a lot of friends who are running momentum hedge funds, and they have good
    years and they have horrible years. Right now, Apple is being pushed up by momentum
    funds, and they will all leave on the same day. Again, that doesn’t mean the stock
    has to crash into the abyss, but there is a very high likelihood of at least a
    5 percent to 10 percent decline in Apple stock over a time frame of a couple of
    months or so.


    ## CHAPTER


    ### Alex Foster


    *Trading began as a hobby for* **Alex Foster**, but after soaking up knowledge
    of countless technical indicators and settling on three that best suited his style
    of trading, he has since made the leap to managing client money as head of Georgia-based
    `AF Capital Management, LLC`. His journey spans tumultuous market conditions,
    including the devastating crash of 2007, where his ability to remain safe and
    profitable not only confirmed the validity of his option-focused methods but ultimately
    paved the way for a move into the formal business of trading—a venture only some
    of the more experienced and battle-tested traders consider during their careers.


    While Foster may defy some conventional market wisdom, his track record and longevity
    shows that indicators don’t have to be piled high and complex to be effective,
    and that attention to risk and a propensity for keeping things simple can help
    anyone achieve unthinkable heights as a trader.


    **Tim Bourquin:** Alex, let’s start by talking about the type of trader you are—day
    trader or swing trader—and what markets you trade.


    **Alex Foster:** I would say I’m more of a trend follower because I don’t make
    day trades as often as I make multiweek or multimonth trades, and generally with
    options.


    **Bourquin:** That’s within the realm of swing trading, and weekly and monthly
    is how I trade as well. Let’s talk about how you make decisions. Are you a technical
    or fundamental trader?


    **Foster:** I use both, and I don’t really think of them as being mutually exclusive,
    but I do tend to put more weight on the technical side because I see those changing
    more often than the fundamentals. I’d say the fundamentals influence me somewhat,
    maybe for broader trends, but when it comes down to making trades, it’s almost
    always on a technical basis.


    **Bourquin:** How do you like to conduct your technical analysis?


    **Foster:** I use trend lines significantly and I am big into moving averages
    and `Williams %R`. I don’t see a lot of people using that anymore, but it has
    worked for me for years and I have stuck with it.


    **Bourquin:** I haven’t heard a lot of people talking about `Williams %R` recently,
    either. So, how do you use that?


    **Foster:** It’s basically an overbought/oversold indicator, and people often
    aren’t familiar with how the graph looks. The upper range is overbought, and that’s
    generally seen as the 0 to –20 range, and the oversold is –80 to –100.


    Now, I use both fourteen- and twenty-eight-day indicators to get a variety of
    time periods, and watching that tends to smooth it out. The fourteen-day gives
    me an early indication of what’s going on, and the twenty-eight-day indicator
    generally gives me confirmation.


    So, for any trend that goes into the overbought area—like in the `S&P 500`, for
    example—it might stay up there for weeks at a time. Simply getting into that overbought
    range is not a trade signal, but when it moves out—when it moves below overbought
    or above the oversold range—that’s when there is a trade signal or a change in
    sentiment.


    **Bourquin:** Interesting. So, a potential topping signal is when the `Williams
    %R` is showing overbought, and when it comes out of the overbought range is when
    you have confirmation that the market or asset in question is headed back down?'
