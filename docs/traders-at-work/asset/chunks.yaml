- fmt: 'I draw trend lines along the highs and lows, trying to identify price levels
    that have been respected from one side or the other. For example, I’ll pay attention
    to a prior support level that has become resistance, or vice versa.


    One of my favorite plays involves recent momentum and then a little bit of a rest
    phase with some compression in price. It’s a wedge-type look following a big momentum
    move, and that’s really just a breather that helps me to identify a potential
    secondary move in the stock. I try to note any instances of those patterns and
    take a close look at the risk/reward profile each time.


    Then, the final step for me is to determine whether the stock looks like it’s
    ready to move right away. If it’s starting to lean on a trend line, or if volume
    is starting to perk up and price is showing a bit more commitment, in terms of
    where it closed on the bar, those would be favorable signals for me.


    For example, if I see a stock moving higher and approaching an overhead trend
    line amid increasing volume, and I also notice that price is finishing at or near
    the top of that bar. That suggests to me that the stock is getting ready to make
    a move.


    A few ideas like that will make up my trade plan for the following day, and I
    always want to walk in with a plan so I never have to hurry up and find something
    to trade. I have my trade ideas and the important levels that go with them in
    mind already, and from there, it’s just a matter of execution. I feel less emotion
    during the day when I come in prepared, and I feel much less guilt if ever I miss
    a market move—as long as I followed my trading plan.


    **Bourquin:** That makes for built-in discipline and helps ensure you are only
    taking trades that match your risk profile and your trading strategy. Too many
    traders just try to chase whatever is moving that day, and that’s often risky
    and tough to do.


    **White:** It sure is. It also requires very quick decision making, and while
    you sometimes have to think quickly in the market, that’s not a habit I want to
    cultivate, because it can lead to mistakes and a lack of discipline.


    **Bourquin:** Do you trade differently on days where there are more setups, and
    how do you react on days where opportunities are thin?


    **White:** On days where a lot of setups are prevalent, I know I have to be very
    focused and a little more aggressive, because there are more opportunities there.
    It’s my belief and has been my experience throughout my career that as long as
    I manage my entries and exits well, being aggressive on these days will work in
    my favor.


    When there are fewer setups, however, that’s my signal to back off, trade less,
    and wait for the market to generate more favorable signals. I’m especially conscious
    not to force trades under these conditions, and I’ll lower my expectations and
    be patient, instead of trying to find setups when they may not be there at the
    time.


    **Bourquin:** Wealthy traders seem to understand that being successful isn’t only
    about trading. It’s about finding the right trades, and sometimes that means waiting
    for setups and not trading at all. Those traders won’t simply dive in because
    they feel the need to be in the market at all times.


    **White:** Absolutely. That actually brings up the cocktail party discussions
    again. A lot of people think being a trader means constant action and excitement,
    but I tell them that the fact of the matter is that there’s a lot more watching
    and waiting involved than most think.


    I honestly don’t want to feel constant adrenaline when trading. There will be
    a few times each year that are that way, but most of the time, it’s much more
    monotonous and just a matter of exercising patience. Impatient traders are the
    ones who don’t last very long, and it’s not that they are impatient in terms of
    their time frame for a position. It’s that they are unwilling or unable to sit
    and wait. That definitely takes practice, but those who pick their spots and wait
    for the market conditions that best suit their style are going to have much greater
    success.


    **Bourquin:** You mentioned earlier that you are always learning and studying,
    and I love to ask professional traders to talk about the things they can still
    learn or improve upon. What are you still working on when it comes to your trading?


    **White:** Well, for me, it’s all about finding ways to stay in my good trades
    longer. I’m very good at cutting losses, but letting winners run is the part of
    the discipline equation that I have a hard time with. To get better at that, I
    try to scale out of winning positions so I can satisfy the urge to book some profits
    but also stay involved in the trade if the move should continue.


    In terms of overall trading skills, I have always been an equities trader. I have
    dabbled a little bit in futures and options, but I never really added those to
    my core skill set as a trader. Lately I have been educating myself in options
    just to round out my abilities a little further.


    I don’t want to become stagnant and have only one market I can trade. Even though
    I’ve come this far trading only equities, I feel it’s important to keep moving
    and growing. I’m not looking to make a major shift in my approach, and I’m not
    walking away from something I have always done, either. I’m just looking to integrate
    a little more of something new.


    **Bourquin:** Finally, Jeff, how do you pay yourself? Do you take money out from
    your profits, write yourself a salary check, or maybe even trade through a corporation?


    **White:** I’ve set up a combination entity through a traders’ accounting firm
    that has some very good tax advantages, in terms of the deductions I’m able to
    take as a full-time trader, as opposed to being relegated to investor status.


    From there, it’s based on how much I want to pull out of my account at the end
    of the year. I factor in how much I need to live on and whether I have some money
    left over from the prior year in my personal account, because that might allow
    me to leave more in my trading account to grow the following year. It’s just a
    constant give and take, but there is no set salary that I’m paying myself.


    My wife and I are both very frugal people, so I never feel like I have to maintain
    a certain lifestyle through my trading, and that quite possibly has given me more
    peace of mind than anything else in all my years of doing this full-time. Obviously,
    I want to be highly successful, and some years are better than others, but I don’t
    feel added pressure as it relates to money.


    CHAPTER


    Patrick Hemminger


    *Spread trader* **Patrick Hemminger** began trading agricultural futures when
    the number of favorable trade opportunities in equities began diminishing as a
    result of more highly correlated global equity markets. Although it was borne
    out of necessity, Hemminger’s switch to agricultural futures has proven a defining
    move in his career and shows that traders must be attentive and quick to respond
    to changing market conditions.'
