- fmt: '**Bourquin:** That’s why some traders are right a lot of the time but aren’t
    making money and can’t figure out why. It’s probably because they’re not managing
    trades properly.


    **Schimming:** Obviously, we don’t want to be wrong half the time, but honestly,
    if you can control your losers and keep them smaller than your winners, you can
    be wrong half the time or more and still be profitable.


    Managing a winning trade is fairly simple, it’s a lot of fun, and it’s why we
    trade to begin with. However, it’s how we handle the inevitable mistakes that’s
    ultimately the key to long-term success.


    You show me someone who can be disciplined and consistently manage mistakes, and
    I’ll show you someone I can teach to make money trading. The problem is that the
    right decisions often go against our natural instincts, but the most effective
    traders will learn how to consistently win that psychological battle.


    ## CHAPTER


    ### Peter Brandt


    Since getting his start as a commodities floor trader in the 1970s, **Peter Brandt**
    has happily made the transition to electronic trading, authored two highly acclaimed
    books—including *Diary of a Professional Commodity Trader* (Wiley, 2011)—and was
    regarded as one of the “30 most influential persons in the world of finance” by
    esteemed author, economist, and money manager Barry Ritholz. By placing his emphasis
    on classical chart patterns and longer-term time frames—and in the process de-emphasizing
    often misleading short-term or intraday price swings—Brandt has been able to take
    fewer trades without compromising his profit potential. His career spans multiple
    decades and ever-changing market conditions, but the pillars of his overall strategy—patience,
    discipline, and sound money management—are timeless and applicable for traders
    across all markets and time frames.


    **Tim Bourquin:** Peter, let’s first talk about the type of trader you are—a short-term
    trader or a swing trader—and how you look at the markets.


    **Peter Brandt:** I’m kind of a mongrel! It’s tough to really pigeonhole the way
    I trade, but if you are looking at it from a time frame basis, I tend to be a
    swing trader *and* a position trader.


    When I take new positions, I take them with the intention of being a swing trader
    on half and a position trader on half, but even though I live in both worlds,
    I don’t have separate programs for swing trading and position trading. When I
    enter the market, I enter both swing and position trades at the same time; I simply
    exit them differently.


    **Bourquin:** And since your background is in commodities, is that the market
    you trade most often?


    **Brandt:** Yes, I was born and raised, so to speak, as a corn trader on the floor,
    so commodities are where I’m most comfortable. I like the futures market and I
    understand it well, but I will also dabble from time to time in stocks and ETFs.


    I like being short the stock market, so I trade stocks on the short side, and
    I also trade Forex. Having started in the futures world, part of my history there
    was in currency futures, and I still trade them sometimes, but I also trade currencies
    in the spot Forex market.


    **Bourquin:** I love talking to former floor traders about how they made the transition
    to electronic trading. For some, it was tough to go from the floor to the screen.
    How was the transition for you?


    **Brandt:** Mine was surprisingly smooth, maybe because I always wanted to be
    an off-floor trader to begin with!


    I was a niche trader on the floor, focusing on the September to December corn
    spread. I lived that spread. I knew rail, FOB, and barge rates, and I knew how
    much grain was being stored in Toledo and in Chicago. I was working the belts
    for Continental Grain Company at that time, and that was the door through which
    I entered the business, but even then I knew that my goal was to be an independent
    trader.


    All the while, I watched all markets, and in the 1970s, I wound up getting involved
    in the sugar mills. That’s what took me off the floor to trade, and I’ve never
    been back. I made the transition smoothly because off the floor was where I wanted
    to go all along.


    **Bourquin:** It seems that one of the biggest differences between retail and
    professional floor traders is that the pros find one approach to the markets and
    just do it over, and over, and over again, while retail traders are always looking
    for new strategies. Do you still feel that the repetitive, “cookie cutter” approach
    is the best way to be successful in trading?


    **Brandt:** Well, I would answer that in two ways. The first would be that every
    successful trader I know, from the most skilled traders on the floor in Chicago
    down to the finest electronic traders, all have a niche and understand it instinctively
    in their minds. Sometimes they aren’t good at articulating precisely what it is,
    but they have found a way to understand the market as it applies to their own
    character and personality traits, and it’s unique to them.


    I know of no successful trader who has become that way just by mirroring the actions
    of another. Every successful trader I know has figured out a way to do it themselves.
    They borrow here and there, and they take select ideas from others, but they end
    up putting together their own collage, and that’s how they operate.


    So, first off, every successful trader I know, be it on or off the floor, has
    a niche. But, that niche can change, and that niche can be modified.


    Markets have a way of taking some niches away, but good traders find a way to
    modify their niche and morph into something different. For example, those who
    traded successfully in the 1970s and 1980s but continued on with exactly the same
    strategy couldn’t stay at the top of the game and inevitably encountered frustration.


    Markets change, and traders have to identify that and be flexible whenever it
    happens. That has been especially true in recent years, with the increase in high-frequency
    and algorithmic trading, plus twenty-four-hour markets, electronic exchanges,
    and the quant world.


    Even though the nature of the markets has changed, however, I would say for the
    most part that I’m still in the same niche now that I was in 1980. But there are
    subtleties within that niche—money management, most notably—that I have changed
    over time in response to changes in the markets.


    **Bourquin:** Let’s talk about that niche. How do you describe it when someone
    asks you, “Peter, how do you trade?”


    **Brandt:** I’m a pure chart trader, but because there are a lot of people out
    there who trade charts, that means something different to everyone. I identify
    with what I call “classical charting principles,” which are basically those laid
    out initially by Richard W. Schabacker in the early 1930s and then picked up in
    the Edwards and Magee book, *Technical Analysis of Stock Trends*, which was initially
    published in the 1940s.


    That book has been referred to as the Bible of classical charting, and it is that
    for me. I have a worn and torn copy, and I refer to it daily. I’m a classical
    charter in every sense.


    **Bourquin:** Can you describe what “classical charting” means? Is pattern recognition
    the essence of it?


    **Brandt:** Yes. I’m a pattern trader, and that’s become controversial these days,
    because some of the new quant traders are saying that classical charting doesn’t
    work anymore. Now, I’m not sure exactly why they are saying that, because classical
    charting still works. It just works in slightly different ways and for slightly
    different reasons.'
  raw: '**Bourquin:** That’s why some traders are right a lot of the time but aren’t
    making money and can’t figure out why. It’s probably because they’re not managing
    trades properly.


    **Schimming:** Obviously, we don’t want to be wrong half the time, but honestly,
    if you can control your losers and keep them smaller than your winners, you can
    be wrong half the time or more and still be profitable.


    Managing a winning trade is fairly simple, it’s a lot of fun, and it’s why we
    trade to begin with. However, it’s how we handle the inevitable mistakes that’s
    ultimately the key to long-term success.


    You show me someone who can be disciplined and consistently manage mistakes, and
    I’ll show you someone I can teach to make money trading. The problem is that the
    right decisions often go against our natural instincts, but the most effective
    traders will learn how to consistently win that psychological battle.


