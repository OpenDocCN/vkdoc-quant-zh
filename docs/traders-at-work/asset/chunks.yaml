    of volatility, or which moving average (fifty-, twenty-, or ten-period SMA) I
    use, depending on the level of momentum. Those discretionary elements I have to
    interchange on the fly, because every day is just a little bit different.


    **Bourquin:** Just like Elliott wave requires that you learn where to start the
    wave count, with Fibonacci, you’ve got to pick the proper high and low in order
    to draw the lines correctly. How did you get good at that?


    **Baiynd:** Well, here’s the interesting thing: as long as you draw a high-low
    of any visible wave, Fibonacci is going to deliver a level that you can use to
    trade. And “clear wave action” means, for example, that the market came up into
    a high, reversed and came down into a low, and then reversed higher again. In
    cases like that, it doesn’t matter which wave you use if you’re trading the trend
    from one level to the other.


    Now, that’s a very bizarre concept to some, because people want things to be very
    rigid, but it really doesn’t have to be that way. The market is fractal, so much
    so that it doesn’t matter which wave we use, because there are going to be workable
    levels for trading there.


    I determine which ones are workable by looking at the Fibonacci extensions and
    then looking to the left to try to match them with support and resistance. If
    I find support and resistance there, I know that particular Fibonacci level is
    a workable one. If there’s nothing there, I throw it out and start again somewhere
    else.


    It really can be as simple as looking to the left at support and resistance, though,
    and if it matches, then you can step through the trade just like that.


    **Bourquin:** Do you trade all day, every day, and how many trades do you typically
    take in any one day?


    **Baiynd:** If you would have asked me that eighteen months ago, I would have
    had the craziest number for you. I was trading about two hundred round-trip trades
    back then, but now it’s typically ten round trips—or twenty, at the most.


    **Bourquin:** What markets do you trade right now?


    **Baiynd:** I trade oil, I trade futures, and then I trade the big three: Apple,
    Amazon, and Google. I look to see which is behaving the best for the day, and
    that’s where I’ll focus.'
  trans: '

    **布尔昆：** 你会关注那些人的博客吗？


    **白因德：** 嗯，`彼得·雷兹尼切克`在`thinkorswim`平台做过一个节目，那是我用的交易平台。他提到了“市场内部指标之王”，虽然我一开始不知道他在说什么，但当他调出一张图表时，我就看明白了。


    听他利用市场内部指标来把握市场时机后，我想看看自己能否成功地将市场内部指标融入我现有的策略中。我发现，有一个市场内部指标，即`上涨量减去下跌量 [UVOL-DVOL]`，对于判断当天趋势的走向非常有效。


    至于`布莱恩·香农`，我以前经常看他的博客每日回顾，并注意到他会从多个时间框架来观察事物，比如五分钟和三十分钟或小时线——甚至日线和周线框架。这会从更广阔的视角提供对市场状况完全不同的看法，于是我也开始尝试这样做。


    在这两个例子中，我都借鉴了外部的想法和观念，并尝试将它们与我现有的系统相结合。我坚信，许多交易者之所以失败，是因为他们只是简单地把大量技术指标堆砌在一起，而这并不是一个好的交易系统该做的。一个好的交易系统拥有少数几个能够相互补充的指标，这样当这些指标出现冲突时，背后是有真正原因的。


    **布尔昆：** 交易者刚开始的时候，有海量的信息可用，博客上有那么多人在发表观点，还有那么多服务、那么多课程，他们往往不知道从何入手。你是如何知道要从移动平均线和斐波那契开始学起的？


    **白因德：** 说实话，我当时在寻找一些我能理解的、真正简单的东西。我首先学习了`简单移动平均线 [SMA]`，它让我意识到，如果我的 K 线实体收在移动平均线下方，我可能应该做空。反过来，如果
    K 线实体收在移动平均线上方，我可能应该做多。就是这么简单的概念让我从那里开始了。


    在那之后，我尝试了各种各样不同的技术指标，我经常说，我在试图找到那个“欺骗我最少”的指标。最终，除了那个移动平均线，我确定了另外几个指标，但这真的是通过反复试错找到的。


    我把每一个指标都试了一遍：`MACD`、`RSI`、`威廉 %R`，你能想到的都有。有趣的是，我最终每天花二十个小时来做这件事，而不是我在猎头行业工作时每天十二个小时的时长！


    我每天花那么多时间只是研究和筛选指标，直到我找到一套适合自己的组合。我需要一些东西来清晰地指导我的交易。


    **布尔昆：** 谈谈你是怎么学习斐波那契的，以及现在是如何用它来寻找好的交易机会的？


    **白因德：** 嗯，我是以数学家的身份学习斐波那契的，所以我知道这个数列只是一组相互关联的比率。当我最初开始研究斐波那契与交易的关系时，我只是打开一张图表，然后从一个高点画到一个低点。我当时对波浪运动毫无概念，但随着我持续观察图表，我开始看到了它们。


    然后我开始测量这些波浪，并且能够预期潜在的转折点位置。有时我会在预期出现转折时入场交易，但在几次被止损出局后，我学会了在入场前等待确认。


    再说一次，这只是通过反复试错，我进行了一些实盘交易，并做了几百个小时的模拟交易，就是为了看看自己能否从机制上理解波浪运动是如何运作的。


    **布尔昆：** 你在分析中使用的是艾略特波浪理论吗？


    **白因德：** 不，我只是观察图表，不做任何波浪计数。我试过研究艾略特波浪，但我发现它非常繁琐。一切都取决于你从哪里开始数浪，如果你起始点选错了，那这个方法对你就不适用。


    我只是试图简单地去看，并一遍又一遍地识别那些重复出现的模式。例如，一个回调后立即反转向上，形成一个双顶形态，然后再度回调并向上突破，这标志着波浪延伸。这告诉我买方涌入，卖方被压制。现在卖方已不见踪影，这就是我做多的机会。


    我之所以选择统计学背景，恰恰是因为我一生都非常擅长模式识别。这是我带入交易的一项技能，我觉得它确实帮助我取得了突破。


    **布尔昆：** 自从将斐波那契确定为主要方法后，你是在不断地调整方法，还是你的策略保持不变？


    **白因德：** 我总是在调整。我的目标是识别市场的微小变化并有效应对。例如，`127.2% 斐波那契回撤位`曾经是一个非常严格固定的数值，但在最近几个月，我注意到变化倾向于`138.2%
    这个水平`。我总是在寻找这样的变化，然后相应地调整。


    我必须时刻提醒自己，市场是流动的、有生命的。它永远不会完全按照我们预期的方向发展。这就是为什么我关注行为上的变化，但其他大部分东西——波浪计数、我绘制波浪的方式以及我的入场触发条件——都始终保持不变。


    唯一可能改变的是我的止损位设置，取决于波动率水平，或者我使用的移动平均线（`50 周期`、`20 周期`或`10 周期 SMA`），取决于动能水平。这些需要斟酌的元素我必须灵活切换，因为每一天都有点不同。


    **布尔昆：** 就像艾略特波浪理论需要你学会从哪里开始数浪，使用斐波那契，你也必须选取恰当的波段高点和低点才能正确画线。你是如何擅长这个的？


    **白因德：** 嗯，有趣的是：只要你画出任何清晰可见波浪的高点到低点，斐波那契就会给出一个你可以用来交易的水平。而“清晰的波浪运动”指的是，例如，市场上涨到一个高点，反转并下跌到一个低点，然后再次反转上涨。在这种情况下，如果你是在从一个水平到另一个水平交易趋势，那么你使用哪个波浪并不重要。


    对某些人来说，这是一个非常奇怪的概念，因为人们希望事情非常严格，但实际上不必如此。市场是分形的，以至于我们使用哪个波浪并不重要，因为总是会存在可用于交易的水平。


    我通过观察斐波那契扩展位，然后向左看，尝试将它们与支撑位和阻力位匹配，来确定哪些水平是可用的。如果我在那里找到了支撑和阻力，我就知道那个特定的斐波那契水平是可用的。如果那里什么都没有，我就放弃它，从别处重新开始。


    不过，这真的可以简单到向左看支撑和阻力，如果匹配上了，你就可以直接按照那个信号入场交易了。


    **布尔昆：** 你每天从开盘交易到收盘吗？你通常一天做多少笔交易？


    **白因德：** 如果你是在 18 个月前问我这个问题，我会给你一个疯狂的数字。那时我每天大约做两百笔来回交易，但现在通常是十笔来回交易——最多二十笔。


    **布尔昆：** 你现在交易哪些市场？


    **白因德：** 我交易原油，交易期货，然后还交易“三巨头”：苹果、亚马逊和谷歌。我会观察当天哪个品种表现最好，那就是我重点关注的交易对象。

