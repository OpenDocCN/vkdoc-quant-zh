  trans: '

    大玩家会卖出足够的数量，促使价格突破你的**痛点**——每个人都有自己的痛点。每个人都有一个痛苦阈值，所以你需要知道自己的痛点在哪里，因为一旦触及那个点，你就会开始变得不理性。要知道你的痛点在哪里。大玩家知道，只要把价格比你的痛点再推高一两个最小变动价位，他们就能触发你的止损单。这种情况经常发生。这就是他们的操作方式，而且他们用算法来执行这种操作。


    我们必须记住，图表上的线条仅仅代表人们在市场上的行为。无论有多少算法在活跃，都是人在编写算法，并在全天开启和关闭它们——而且他们整天都在不断地切换算法。同样的算法并不会全天持续运行。


    伯奎因：这是否意味着只要利用图表上的支撑位和阻力位区域，而不用担心时间与销售数据，因为它反正都会是虚假突破？


    梅纳克：时间与销售数据并不是虚假的。事实上，时间与销售数据对我来说非常重要。我在迷你标普 500 指数期货上像鹰一样紧盯着时间与销售数据，不幸的是，这些数据滚动得非常快，所以你必须使用过滤器。


    如果出现大量卖盘成交，你可能会认为这是市价卖出订单。但是，假设价格只下跌了一个最小变动价位。假设过去五分钟内有一万份合约在买盘价位成交，但价格只下跌了一个最小变动价位。这告诉我，很可能在交易的对面有一个大规模的被动挂单。如果这一切恰好与我的图表上的一个重要区域重合，并且我看到市场内部指标出现了一些有趣的动向，我可能会在那一刻决定变得活跃并开仓交易。


    对我来说，订单流非常重要。时间与销售数据从来不是虚假的。时间与销售数据能说明真相。只是它们难以组织、理解和解读，因为它们一直在变动，流动得极快。


    伯奎因：至少时间与销售数据是实际的成交记录。它不像二级行情那样，订单出现一瞬间就消失了。


    梅纳克：没错。我现在不怎么交易股票了，部分原因是我认为看二级行情实际上也没什么优势。我主要交易股指期货。


    我认为，在我们现在所处的这种环境中，有大量高频交易者和算法，要在非常小、非常短的时间框架内，这里赚几个最小变动价位、那里赚几个最小变动价位，真的很难。对于如今在家用电脑试图抢帽子交易的人来说，几乎是不可能的，因为你会被电脑抢了帽子。相反，我发现我们必须拉长我们的时间框架，去寻找更大的行情波动。例如，除非我的目标至少是四五个点——甚至更多，否则我不会轻易交易迷你标普
    500 指数期货。


    我不是为了赚一两个点而交易，因为如果那样做，我就直接在和算法竞争了，那是它们的赛场。算法确实能在附近几个最小变动价位上推动市场，但它们无法把迷你标普 500
    指数期货推高十个或十五个点。算法做不到，尽管它们也参与这样的行情波动。


    实际情况是，一些算法会触发另一个行情波动，那个行情波动又触发另一个，这样连锁反应下去，然后人们看到了，就蜂拥而入，突然间市场移动了十二个点，而最初触发这一切的是早些时候的一些算法。但算法本身并不会说：“嘿，我们让市场上涨十二个点吧。”人们需要明白，算法所做的全部就是执行订单。它们不会做出推高或推低市场的决策。


    伯奎因：让我问问你关于你刚才提到的四五个点。我一直很好奇人们是如何设定他们的风险回报比的。你如何判断一笔交易是否有潜力获得四五个点的利润？

    '
- fmt: '**Menaker:** 我大量使用成交量分布分析，所以我会寻找某个区域。如果我发现某个价格上方或下方有过大量或少量成交，这对我就可能是一个目标区域。但如果这个区域离我的入场点太近，那对我来说风险回报比就不理想。


    不过我得说，我可能和很多交易者不太一样。如果我感觉到市场处于一个非常强劲的趋势日，并且我们似乎还处于一波行情早期——或者至少看起来有这个潜力——我有时会直接跳入市场。我不会担心我的风险回报比，因为我最大的交易收益都出现在我当天尽早抓住趋势并持有相当一段时间的时候。我希望尽可能多地拥有大赚的日子，如果我只通过风险回报比来看每一笔交易，这会阻止我在那些日子入场。


    **Bourquin:** 如果你抓住了趋势并且它正在运行，你会持续加仓吗？


    **Menaker:** 当然会。但这并不适合所有人，因为大多数人买入的突破不会成功，卖出的跌破也不会成功。跟随动量入场是很棘手的。不幸的是，这里我要戴上心理学家的帽子说一句，这恰恰与人类作为生物体所拥有的许多弱点完美契合。假设我们错过了早上所有的交易，或者被止损了。当价格开始大幅波动时，我们会觉得又要错过了，所以我们最好赶紧跳进去。我们不想再次被套牢而赔钱，所以你看，不幸的是，动量交易让你变得脆弱。


    大多数人之所以不成功，是因为他们会跳进太多的行情里。但根据我自己的交易经验以及我多年来认识的许多交易者的经验来看，动量交易正是很多更成功的交易者所擅长的领域。要么是动量交易，要么是试图接飞刀，要么是试图抄底摸顶。


    话虽如此，如果当天明显是一个震荡区间日，并且`NYSE TICK`指标没有出现任何极端读数，无论高低，那么这种日子我的交易方式就会大不相同。我显然不会仅仅买入上涨的东西或卖出下跌的东西。我会在关键位置反向交易。我实际上会寻找一个区间并在此区间内进行高抛低吸。


    **Bourquin:** 听起来你是在寻找那些成交量看起来有点疲软或温吞，但价格仍在上涨的行情。我这样理解对吗？


    **Menaker:** 是的，这是其中一种方式。还有不同的标准。我必须记住，`ES`（标普500指数期货）反映了底层市场，也就是`标普500指数`。我会去看`标普500指数`，分析它的强项和弱项。它的主要成分股是什么？它的前五或前十——甚至前二十或三十——大成分股是什么？我会观察这些成分股的表现如何，它们的成交量如何，它们的价格行为如何，因为这些将引领市场。


    我观察这些，`NYSE TICK`指标，以及某些风险偏好和风险规避板块。如果金融板块（`XLF`）和运输板块都高于前一日高点，而`ES`处于其波动范围的中段，表面上看`ES`可能不会有什么大动作。但是，你看，底层股票市场显示出一些强势！我会寻找更多的迹象，看看这是否可能在午盘酝酿成一次潜藏突破。


    描述我的交易风格最好的方式是，我试图尽可能接近订单流和社会背景，这样我就能选择我的交易时机。


    **Bourquin:** 社会背景包括看新闻了解他们在谈论什么吗？大多数人会说：“不，我不会看`CNBC`，因为那全都是废话。”但如果我们谈论的是社会动态，新闻可能是寻找社会背景的最佳场所之一。


    **Menaker:** 这是个非常好的问题，我自己多年来也反复纠结过——是关注新闻还是不关注新闻——我认为人们无论选择哪种方式都能成功。不过我要告诉你的是，有一些对冲基金正在抓取社交媒体，比如`Twitter`甚至`Facebook`，它们也在抓取`CNBC`和`彭博社`的关键词和情绪。然后他们会将这些信息应用到自动化交易系统中。


    这种情况越来越普遍。我六月在日本参加一个对冲基金会议时，遇到了一位东京大学的教授，他是一名金融工程师。他向我展示了他和其他一些人如何利用我刚才解释的模型启动了一个对冲基金，并且他们以为他们是第一个这么做的。我说：“实际上，不是的，据我所知美国已经有六到七家基金在过去三四年里一直在这么做，而且可能还不止这六七家。我自己知道的也只有六七家。”


    **Bourquin:** 有一个网站可以实际做到这一点。我知道创始人是谁，`James Ross`。他创立了`HedgeChatter.com`，该网站也正是做这个的。这类信息开始对个人交易者开放了。


    **Menaker:** 是的。追踪市场情绪非常重要，而且我认为它会变得越来越重要。


    让我们看看我们现在所处的位置。在我们谈话的2012年末，`标普500指数`和`ES`接近1400点。回溯到2009年3月，我们跌到了接近600点的低点。现在的经济状况是2009年的两倍好吗，因为标普指数是两倍高？不，不是这样的，那么区别是什么？


    **Bourquin:** 任何时候我试图证明经济与股市的相关性或把它们联系起来，这都不是一件好事，因为如果你试图那样做，它永远说不通。这就是为什么你在《华尔街日报》上看到那么多文章问：“这轮反弹能信吗？”这对我来说毫无意义。反弹就是反弹——市场要么上涨，要么下跌。仅仅因为它发生在一个糟糕的经济环境中，并不意味着它没有发生。我认为试图让这两者协调一致是非常困难的。


    **Menaker:** 没错，我百分百同意你。我想补充一下你所说的。那种认为“哦，我们需要成交量。我们过去三四年看到了成交量下降，这就是为什么整个反弹值得怀疑”的观点。但事情是这样的：我们并不需要高成交量来支撑更高的价格。我们已经有了三四年更高的价格。对于更高的价格——或者甚至是更低的价格，因为这在价格两端都适用——我们需要记住的是，市场是一个拍卖过程。这就是我理解市场的方式，这也回到了交易的社会背景。


    什么是拍卖？拍卖是一个买卖双方汇聚在一起达成交易的场所。将要发生的是，价格会向上拍卖——有时我们甚至称之为价格发现——并且随着越来越多的人愿意出价购买他们想买的东西，价格会继续上涨，对吗？但是一旦那些出价者感到疲倦，并且有足够多的卖家产生兴趣开始卖出，价格上涨就会停止。现在，这种情况的发生与成交量的大小或活跃程度无关。


    这种情况，再加上自动化交易的引入，已经改变了成交量的性质以及成交量被衡量和计算的方式。市场上正在发生一些奇怪的数学现象。但是因为过去三四年成交量在减少，同时市场却在上涨，很多人对此表示怀疑。我希望这些人没有都持有空头头寸。'
  raw: '**Menaker:** Well, I use a lot of volume profiling, so I’m looking for an
    area. If I see an area where there has been a lot of volume or a small amount
    of volume above or below a certain price, that could represent a target area for
    me. If it’s too close to where my entry is, however, that just doesn’t represent
    a favorable ratio for me.


    I will say that I’m probably a little different than a lot of traders out there.
    If I’m sensing that we’re in a really strong directional day and it seems like
    we’re still pretty early in a move—or at least it seems like that’s the potential—I
    will sometimes just jump in the market. I’m not going to worry about my risk-reward
    ratio, because my biggest days occur when I catch the trend early on in the day
    and ride it for a good part of that day. I want to have as many big days as possible,
    and if I’m only looking at each trade through a risk-reward ratio, it’s going
    to keep me from jumping in on those days.


    **Bourquin:** If you catch the trend and it’s working, will you keep adding to
    your position?


    **Menaker:** Definitely. But it’s not for everybody, because most people buy breakouts
    that don’t work and sell breakdowns that don’t work. Jumping in with momentum
    is tricky. Unfortunately, and here’s where I put on my psychologist hat for a
    second, it just dovetails too perfectly with a lot of the vulnerabilities that
    we have as human beings. Let’s say that we’ve missed out on all the morning’s
    trades or have been stopped out. When price beginsto make a big move, we feel
    like we’re going to miss out again, so we had better jump in. We don’t want to
    be burned again and lose out, so you can see, unfortunately, that momentum trading
    makes you vulnerable.


    Most people don’t succeed at it because they’re going to be jumping on too many
    moves. But from what I’ve seen in my own trading and in that of a lot of traders
    who I’ve known over the years is that momentum trading is where a lot of the more
    successful traders are from. It’s either that, or trying to catch a falling knife,
    or trying to pick reversals.


    Now, having said that, if we’re in a day that’s clearly a rotational range day
    and the NYSE TICK is not putting out any extreme prints, high or low, that’s the
    kind of day where I will trade a lot differently. I’m obviously not just going
    to buy something that’s going up and sell something that’s going down. I will
    fade levels. I will actually look for a range and fade it.


    **Bourquin:** It sounds like you’re looking for moves where volume seems a little
    meek or tepid, but yet you still have price moving up. Have I characterized that
    correctly?


    **Menaker:** Yes, that’s one way. There are different criteria. I have to remember
    that the ES are a reflection of the underlying market, which is the S&P 500\.
    I go to the S&P 500, and I want to look at its strengths and weaknesses. What
    are its big components? What are its top five or ten—or even twenty or thirty—components?
    I will be looking at those to see how they are behaving, what their volume is
    like, and what their price action is like, because that’s going to lead the market.


    I look at that, the NYSE TICK, and certain risk-on and risk-off sectors. If financials,
    XLF, and transports are all above the prior day’s high and the ES is in the middle
    of its range, it might look on the surface that the ES is not going to do much.
    But, look, the underlying equity market is showing some strength! I’m going to
    look for additional signs that maybe this could be a sneaky breakout brewing for
    midday.


    The best way to describe my style of trading would be that I try and get as close
    to the order flow and the social context as possible so that I can pick my trading
    spots.


    **Bourquin:** Does social context include watching the news to see what they are
    talking about? Most people say, “No, I’m not going to watch CNBC, because it’s
    a bunch of nonsense anyway.” But if we’re talking about social moves, the news
    might be one of the best places to find social context.


    **Menaker:** That’s a really good question, and I’ve personally gone back and
    forth on that myself over the years—paying attention to the news or not paying
    attention to the news—and I think people can succeed going both ways. What I will
    tell you, though, is that there are hedge funds that are scraping social media,
    like Twitter and even Facebook, and they are scraping CNBC and Bloomberg for keywords
    and sentiment. Then they will apply that to an automated trading system.


    That’s happening more and more. I was in Japan in June for a hedge fund conference,
    and I met a Tokyo University professor there who’s a financial engineer. He showed
    me how he and some other guys were starting up a hedge fund using this model that
    I just explained, and they thought they were the first to do this. And I said,
    “Actually, no, there are six or seven funds in the United States that I know of
    that have already been doing that in the last three or four years, and there are
    probably more than those six or seven. I just know of only six or seven myself.”


    **Bourquin:** There’s a web site where you can actually do that. I know who the
    founder is, James Ross. He started [HedgeChatter.com](http://HedgeChatter.com),
    which does exactly that, too. That kind of information is starting to be made
    available to the individual.


    **Menaker:** It is. Going after market sentiment is really important, and I think
    it’s going to become more and more important.


    Let’s look at where we are today. As we’re talking in late 2012, we are near 1,400
    in the S&P 500 and ES. Back in March 2009, we bottomed out close to six hundred.
    Is the economy twice as good now as it was back in 2009 because the S&P is twice
    as high? No, it’s not, and what’s the difference?


    **Bourquin:** Any time that I try to justify or correlate the economy with the
    stock market, it’s never a good thing, because it never makes sense if you try
    to do it that way. That’s why you see so many articles in the *Wall Street Journal*
    saying, “Can this rally be trusted?” That doesn’t make any sense to me. A rally
    is a rally—either the market is going up, or it is going down. Just because it’s
    happening within a crappy economy doesn’t mean that it’s not happening. I think
    that trying to make the two of those jibe together is very difficult.


    **Menaker:** Exactly, and I agree with you 100 percent. I will just add to what
    you were saying. The idea that, “Oh, we need volume. We have seen decreasing volume
    in the last three or four years, and that’s why this whole rally is suspect.”
    Well, here’s the thing: we don’t need to have high volume to support higher prices.
    We’ve had higher prices for three or four years. All that we need for higher prices—or
    even lower prices, since this works on both sides of the spectrum—is to remember
    that the market is an auction. This is how I approach markets, and this goes back
    to the social context of trading.


    What is an auction? Well, an auction is a marketplace where buyers and sellers
    come together to strike a deal. What’s going to happen is that price is going
    to auction up—sometimes we even call it a price discovery—and it keeps going up
    as more people are willing to bid up whatever it is that they’re willing to buy,
    right? But it will stop going up as soon as those bidders get tired and enough
    sellers get interested and start selling. Now, that happens regardless of the
    amount of volume or the amount of activity.


    That, combined with the introduction of automated trading, has changed the nature
    of volume and the way that volume is measured and calculated. There are some strange
    mathematical things going on in the markets. But because the last three or four
    years have shown a decrease in volume at the same time that the markets have moved
    up, a lot people are suspicious. I hope that those people are not all holding
    onto short positions.'
