    On the other hand, I haven’t seen any evidence that a mutual fund manager can
    make 15 percent or 20 percent compound annual real returns over twenty-five years.
    If you know of any, then maybe you could tell me. But it’s just hard to deny the
    long-term performance of some of these managed futures guys.


    **Bourquin:** At some point along the way, you started managing money, correct?


    **German:** I did. I started managing some money, got a handful of investors,
    got my web site going, completed my documents, and started taking in some investor
    money. But, honestly, with all of the new regulations and scrutiny that money
    managers are facing these days, I am not sure that I want to continue going down
