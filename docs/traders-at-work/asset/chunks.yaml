    edge. Nobody that I had access to really did any computer trading or any long-term
    trading. I learned about trend following from independent study—essentially by
    reading every book I could find on trading over twenty years. Perhaps I got lucky
    that I focused on trend following and it has been working.


    **Bourquin:** Let’s talk a little bit about risk management, in terms of the size
