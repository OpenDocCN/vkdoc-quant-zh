- fmt: '### 排版后的文本


    You can have expectations, because that’s how you control risk. But you can’t
    sit there and say, “I’m *going to* make `$100` a day in the market,” because there
    are going to be days that you don’t. It can actually be limiting, too, because
    there could be a trade where just trailing a stop could make you `$1,000` that
    day.


    Actually, I think the best thing to do is go into a market knowing how much risk
    you’re going to take and with no upside expectancy. To me, that’s the best frame
    of mind to be in.


    **Bourquin:** It sounds like, after that experience, you sold some assets to replenish
    your trading account and get started again.


    **Carter:** I did. I actually took about four or five months off and came across
    Mark Douglas’ book, *The Disciplined Trader* [New York Institute of Finance, 1990],
    and that helped me a lot. I talked to my broker, and I ended up going and sitting
    next to a twenty-year veteran trader at his desk for about a week and struck up
    a friendship with him. At that point, I realized that I could do this. I just
    had made a stupid mistake, and I really vowed not to do that again.


    I sold two properties and some coins, because I didn’t want to start with `$10,000`
    and try to build up from there. I put a `$75,000` stake back in, which was enough,
    and my goal at that point was just to trade for another year or so. I built it
    back up to right around that `$150,000` level, and that was the time when I quit
    my job to trade full-time.


    My wife was working, too, and she had a good job, so it was a good and calculated
    risk to me at that point. Of course, the worst-case scenario would be that it
    didn’t work out, and I could always get a job again, though that’s certainly not
    what I wanted to do.


    **Bourquin:** This was probably right around the time when all those internet
    and tech stocks started to take off. Did you make money during that period?


    **Carter:** That was interesting, because I honestly didn’t know that there was
    an internet bubble at the time. I was just doing my trades. But I’d sit there
    and buy call options on Yahoo!, and it would spike up `$30` a share, so of course
    the options would quintuple in price.


    Just from history, I was very distrustful of that whole thing, and while I didn’t
    rush in and start shorting, I wasn’t super aggressive, either. I remember my skepticism
    actually caused me to miss some amazing moves, but at the same time, I was also
    able to live through the crash very nicely.


    **Bourquin:** Right. One thing I didn’t ask you about that is often an interesting
    topic is how your spouse reacted when you left your steady, six-figure income
    to trade full-time.


    **Carter:** She was good, and although she was a little nervous about it, she
    also had the experience where I traded her student loan money and made her even
    more.


    Her family always stressed getting a good job, though, and that’s why I think
    she was nervous about it. In the back of her mind, she may have thought that I
    would just try it for a year and then go back and get another job.


    **Bourquin:** Besides money, of course, what were you using to measure your success
    as a trader and make sure you were continually moving forward?


    **Carter:** I set up two accounts, because trading is largely about keeping drawdowns
    to a minimum. I aimed to keep one account at a consistent level, like `$150,000`,
    and my goal was simply to pull profits out of it every week. If I lost money,
    then my goal became to trade and build it back up to the point where I could take
    money out again.


    I was just very conscious that I never wanted to put myself into a big hole again.
    But it was nice trading small in a big account, because there’s a lot of flexibility—not
    because I could really push it and try to double the account, but because I had
    extra wiggle room if a position went quickly against me.


    For example, if I bought ten option contracts and the position got hammered right
    away, that gave me the flexibility to buy ten more. I would do that sometimes
    and then look for a `38.2%` Fibonacci retracement rally and get out of the trade
    with a much smaller loss—or maybe even get back to breakeven on that trade.


    My measure of success, however, was being able to pull money out of that first
    account, and then my other account was strictly for swing trades. I didn’t want
    to take money out of it and was just steadily trying to grow it by taking stock
    trades and some others. That was only a steady growth account aimed at keeping
    drawdowns to a minimum, and part of that meant taking breaks and not staring at
    charts all the time.


    **Bourquin:** What did your friends and family say about your trading lifestyle?
    Did you get a lot of questions about what you were doing and if you could teach
    them to do it, too?


    **Carter:** I did, and people would expect to sit down for three days and learn
    everything. But I knew what an excruciating road it is for new traders, so I actually
    tried to discourage them or at least say that it takes five years of ups and downs
    to learn to trade, and you can’t just quit your job and start making money trading.


    **Bourquin:** Let’s talk about technical analysis, Fibonacci, and some of the
    other tools and how you began to use them every day in your trading.


    **Carter:** One of the main tools I use today is called “the squeeze,” and it’s
    a measure between the Bollinger Bands and the Keltner Channels. I find that it
    gives me a lot of extremely helpful information about a stock, so I like that
    one quite a bit. Essentially, it measures the volatility—or the lack of volatility—in
    the market.


    For most markets, and no matter what time frame you’re looking at, sometimes they’re
    quiet, and sometimes they’re extremely volatile. The mistake I made in the beginning
    was looking for volatile markets and then jumping in on them. But I eventually
    realized that if I get into these markets when they are quiet and then sell to
    people like me when they get volatile, I can make a living doing this. That’s
    essentially what I do, even to this day. I know that when a market pops up and
    is volatile, there’s going to be a lot of people rushing into it, and I’m happy
    to hand off my position to them.


    **Bourquin:** Did you learn technical analysis by reading books, or was it more
    about trial and error?


    **Carter:** I read some books, but I think learning technical analysis is a lot
    like learning to play golf. If you’ve never picked up a golf club, you can go
    read the ten best books on how to hit a golf ball. But when you ultimately go
    try to hit one, you are still going to suck at it! You can’t learn how to hit
    a golf ball by reading a book, and I think the same thing is true with technical
    analysis and trading.


    One of my favorite books was Nicholas Darvas’ *How I Made $2,000,000 in the Stock
    Market* [BN Publishing, 2007], because it really hit home and resonated with me,
    in terms of when to stick with a position and when not to stick with a position.
    A lot of the other books I came across just seemed to be different renditions
    of the same things, and while I could study them and get some ideas, there wasn’t
    anything there that changed my life or anything.


    I think learning about technical analysis and trading is just a matter of talking
    to other traders and trying things, and the irony is that you actually don’t need
    a lot. I’ve heard it said before that you can pick one market, one time frame,
    and one indicator, and—using only that—you can figure out a way to make a living
    within three months. I really believe that to be true.


    In trading, you don’t want to be the master of all trades. You just want to pick
    a couple of niches and focus on them. That’s really beneficial, because you get
    to know the setup, you get to know the time frame, and you become an expert in
    that area of the market. You don’t need to know everything else that’s out there.'
