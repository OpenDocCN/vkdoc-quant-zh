- fmt: '**Lund:** That goes back to what I was talking about when I said that doctors
    are generally not good at poker or trading. Trading is one of the most counterintuitive
    things that you can do. Everything we’ve ever been taught goes against a proper
    trading mindset.


    If you go to buy a new refrigerator at the store, you want to buy the refrigerator
    that is on sale. The cheaper it is, the better it is for you. But a refrigerator
    is a wasting asset. That’s why your mindset works in that situation, because we’re
    conditioned to think that cheaper is better.


    A stock is not a wasting asset. If a stock is getting cheaper and cheaper, it
    means that nobody wants it. You want a stock that is getting more and more expensive.


    People just can’t accept it when you tell them that they’re going to lose most
    of the time in trading. They go, “I don’t understand that.” It’s funny, though,
    because they accept the same notion in baseball. If somebody hits .300 in baseball,
    they’re a great player. But if someone bats 30 percent in trading, they feel like
    they are a failure.


    It is possible to lose 70 percent of the time, but if you have good risk-reward
    ratios, you can lose that often or even more and still be profitable.


    **Bourquin:** Let me ask you one more question about risk-reward ratios. What
    risk-reward ratio do you favor, and how do you determine what that ratio should
    be on any given trade?


    **Lund:** I try to use a 1:3 risk-reward ratio, and here’s the way I work: I’ll
    look at a chart, and I’ll say to myself, “Okay, here’s where I’m going to enter
    the trade.” I’ll look at where my stop is going to be, and then I’ll plot where
    I think my target is going to be. Then I’ll say, “Okay, I’m willing to risk *x*
    amount of money on this trade.”


    Let’s say I’m willing to risk $500 in a trade. I’ll take the spread between my
    entry price and where I know I’ll stop, and I’ll divide that into the $500\. Let’s
    say I’m going to get into a stock at $100, but if it drops to $99.50, I’ll get
    out. My spread, then, is 50 cents. Next, I’ll divide 50 cents into the $500 that
    I’m willing to risk, which will size my position at one thousand shares. This
    way, I know for sure that if I hit my max stop, I’ll lose my maximum dollar risk.


    In this theoretical trade, I’m looking for a target of $1,500\. I’m risking one
    times R, which is my risk of $500, and I’m looking for three times R, which is
    a reward of $1,500\. Basically, I’m just reverse-engineering the size of my trades.


    A lot of people arbitrarily pick a position size and say, “Ah, I’m going to go
    in with one thousand shares.” That doesn’t make any sense to me. You have to have
    a sizing methodology and a risk methodology that works with the chart and the
    patterns you’re looking at.


    **Bourquin:** In the final chapter of this book, “Twenty Habits of Wealthy Traders,”
    I talk about that exact same thing. When I ask any good trader about their typical
    share size, they say, “Well, you’ve got to give me more information than that.
    You’ve got to tell me what I’m trading and how volatile it is. I don’t do one
    thousand shares on everything.”


    **Lund:** Yes, and not to disparage anyone, but when you hear someone say, “Well,
    I traded one thousand shares,” that’s usually the mark of an amateur. It’s usually
    the mark of someone who doesn’t really understand risk-reward ratios in the market.


    CHAPTER


    Michael Toma


    *Professional risk manager* **Michael Toma** *actively trades US-based equity
    index* *and index futures market* *s, as well as the equity markets in mainland
    China. He also trades bond futures*, which is an area that is often overlooked
    by short-term traders*. In terms of his trading strategy, Toma uses a combination
    of technical analysis* *and stringent risk parameters to help him make consistently
    profitable trading decisions in the markets.


    Through speaking engagements and in his role as the vice president of operations
    at Pelagon Trading, Toma de-emphasizes the monetary aspect of trading, instead
    focusing on functions such as risk management*, psychology*, effective journaling*,
    and data-driven analytics*. His methods are sought-after by fund managers* *and
    other professionals who want to improve their trading performance, as well as
    by new traders who are in search of consistency and a more transparent approach
    to the markets. Toma has authored two books on trading and risk management and
    received the designation of Certified Risk Manager (CRM)* *in 2007.*


    **Tim Bourquin:** Mike, talk about the kind of trader you are and what you trade.


    **Michael Toma:** For the most part, I’m an E-mini S&P futures [ES] trader, but
    I dabble in bond trading and bond futures, as well as in some other areas, like
    options and exchange-traded funds [ETFs].


    **Bourquin:** Bond traders are rare. For whatever reason, you don’t hear about
    a lot of short-term traders using bonds. Perhaps many just don’t feel like they
    know that market well enough. What made you decide to trade the bond market?


    **Toma:** I didn’t know the bond market very well, either. I was at a Traders
    Expo and attended a bond seminar, and I thought that the setups were pretty good,
    and the trades looked clean. I require clean order flow and clean price action
    in any markets I trade, so I did some backtesting and subscribed to data feeds
    for bond futures after that. It’s not my favorite market, and I’m still getting
    comfortable with it, but I track a lot of my trading activity, and the numbers
    are there. I just trade smaller lots as a result.


    The ES often trade in small, choppy ranges, and when you have bond announcements
    about ten-year Treasury bills and Treasury notes, bond trading can rock. It kind
    of replaces some of the midday doldrums in ES trading for me.


    **Bourquin:** There’s some massive volume in bonds, and that’s what the big boys
    are trading most of the time, so you’ve got a tremendous chance to get in and
    out quickly. Of course, massive volume and rapid-fire trades are not the first
    things many people think of when it comes to bonds, but you certainly can do that
    in the bond market.


    **Toma:** Absolutely. One of the things you learn the hard way—as I did—is how
    the professionals trade: where they’re going to be probing stops and where they’re
    going to be looking at support and resistance.


    Especially on announcement days, be very careful. Stay away and just monitor the
    market at first. Each market has its own style, and a lot of ES traders like that
    market because they understand its style and how it trades. Well, the bond market
    is unique in its own way, too. There’s a learning curve, but now that I’m more
    comfortable with it, I would say that about 25 percent of my overall trading activity
    is on the ZB bond futures contract.


    **Bourquin:** And are the setups you trade for bond futures the same as the ones
    you use when trading ES?


    **Toma:** Yeah, for the most part. I use the same basic setups in both markets.
    I will adjust stops to get a little more wiggle room and risk/reward potential
    when trading ES, but I will widen my target as well.


    **Bourquin:** What’s the prototypical ES trade setup for you, and what characteristics
    do you like to see on the chart?


    **Toma:** Well, I try to keep ten setups, and I think of those setups like horses
    in my stable. I monitor the market activity and my trade performance through all
    ten setups, and if they keep performing, I use them more frequently and at a higher
    contract level.


    For those that don’t, however, I either stop using them or move them off my list,
    potentially in favor of another setup that I may develop through my continuing
    research or elsewhere.'
  raw: '**Lund:** That goes back to what I was talking about when I said that doctors
    are generally not good at poker or trading. Trading is one of the most counterintuitive
    things that you can do. Everything we’ve ever been taught goes against a proper
    trading mindset.


    If you go to buy a new refrigerator at the store, you want to buy the refrigerator
    that is on sale. The cheaper it is, the better it is for you. But a refrigerator
    is a wasting asset. That’s why your mindset works in that situation, because we’re
    conditioned to think that cheaper is better.


    A stock is not a wasting asset. If a stock is getting cheaper and cheaper, it
    means that nobody wants it. You want a stock that is getting more and more expensive.


    People just can’t accept it when you tell them that they’re going to lose most
    of the time in trading. They go, “I don’t understand that.” It’s funny, though,
    because they accept the same notion in baseball. If somebody hits .300 in baseball,
    they’re a great player. But if someone bats 30 percent in trading, they feel like
    they are a failure.


    It is possible to lose 70 percent of the time, but if you have good risk-reward
    ratios, you can lose that often or even more and still be profitable.


    **Bourquin:** Let me ask you one more question about risk-reward ratios. What
    risk-reward ratio do you favor, and how do you determine what that ratio should
    be on any given trade?


    **Lund:** I try to use a 1:3 risk-reward ratio, and here’s the way I work: I’ll
    look at a chart, and I’ll say to myself, “Okay, here’s where I’m going to enter
    the trade.” I’ll look at where my stop is going to be, and then I’ll plot where
    I think my target is going to be. Then I’ll say, “Okay, I’m willing to risk *x*
    amount of money on this trade.”


    Let’s say I’m willing to risk $500 in a trade. I’ll take the spread between my
    entry price and where I know I’ll stop, and I’ll divide that into the $500\. Let’s
    say I’m going to get into a stock at $100, but if it drops to $99.50, I’ll get
    out. My spread, then, is 50 cents. Next, I’ll divide 50 cents into the $500 that
    I’m willing to risk, which will size my position at one thousand shares. This
    way, I know for sure that if I hit my max stop, I’ll lose my maximum dollar risk.


    In this theoretical trade, I’m looking for a target of $1,500\. I’m risking one
    times R, which is my risk of $500, and I’m looking for three times R, which is
    a reward of $1,500\. Basically, I’m just reverse-engineering the size of my trades.


    A lot of people arbitrarily pick a position size and say, “Ah, I’m going to go
    in with one thousand shares.” That doesn’t make any sense to me. You have to have
    a sizing methodology and a risk methodology that works with the chart and the
    patterns you’re looking at.


    **Bourquin:** In the final chapter of this book, “Twenty Habits of Wealthy Traders,”
    I talk about that exact same thing. When I ask any good trader about their typical
    share size, they say, “Well, you’ve got to give me more information than that.
    You’ve got to tell me what I’m trading and how volatile it is. I don’t do one
    thousand shares on everything.”


    **Lund:** Yes, and not to disparage anyone, but when you hear someone say, “Well,
    I traded one thousand shares,” that’s usually the mark of an amateur. It’s usually
    the mark of someone who doesn’t really understand risk-reward ratios in the market.


    CHAPTER


    Michael Toma


    *Professional risk manager* ***Michael Toma*** *actively trades US-based equity
    index* *and index futures market* *s, as well as the equity markets in mainland
    China. He also trades bond futures**, which is an area that is often overlooked
    by short-term traders**. In terms of his trading strategy, Toma uses a combination
    of technical analysis* *and stringent risk parameters to help him make consistently
    profitable trading decisions in the markets.*


    *Through speaking engagements and in his role as the vice president of operations
    at Pelagon Trading, Toma de-emphasizes the monetary aspect of trading, instead
    focusing on functions such as risk management**, psychology**, effective journaling**,
    and data-driven analytics**. His methods are sought-after by fund managers* *and
    other professionals who want to improve their trading performance, as well as
    by new traders who are in search of consistency and a more transparent approach
    to the markets. Toma has authored two books on trading and risk management and
    received the designation of Certified Risk Manager (CRM)* *in 2007.*


    **Tim Bourquin:** Mike, talk about the kind of trader you are and what you trade.


    **Michael Toma:** For the most part, I’m an E-mini S&P futures [ES] trader, but
    I dabble in bond trading and bond futures, as well as in some other areas, like
    options and exchange-traded funds [ETFs].


    **Bourquin:** Bond traders are rare. For whatever reason, you don’t hear about
    a lot of short-term traders using bonds. Perhaps many just don’t feel like they
    know that market well enough. What made you decide to trade the bond market?


    **Toma:** I didn’t know the bond market very well, either. I was at a Traders
    Expo and attended a bond seminar, and I thought that the setups were pretty good,
    and the trades looked clean. I require clean order flow and clean price action
    in any markets I trade, so I did some backtesting and subscribed to data feeds
    for bond futures after that. It’s not my favorite market, and I’m still getting
    comfortable with it, but I track a lot of my trading activity, and the numbers
    are there. I just trade smaller lots as a result.


    The ES often trade in small, choppy ranges, and when you have bond announcements
    about ten-year Treasury bills and Treasury notes, bond trading can rock. It kind
    of replaces some of the midday doldrums in ES trading for me.


    **Bourquin:** There’s some massive volume in bonds, and that’s what the big boys
    are trading most of the time, so you’ve got a tremendous chance to get in and
    out quickly. Of course, massive volume and rapid-fire trades are not the first
    things many people think of when it comes to bonds, but you certainly can do that
    in the bond market.


    **Toma:** Absolutely. One of the things you learn the hard way—as I did—is how
    the professionals trade: where they’re going to be probing stops and where they’re
    going to be looking at support and resistance.


    Especially on announcement days, be very careful. Stay away and just monitor the
    market at first. Each market has its own style, and a lot of ES traders like that
    market because they understand its style and how it trades. Well, the bond market
    is unique in its own way, too. There’s a learning curve, but now that I’m more
    comfortable with it, I would say that about 25 percent of my overall trading activity
    is on the ZB bond futures contract.


    **Bourquin:** And are the setups you trade for bond futures the same as the ones
    you use when trading ES?


    **Toma:** Yeah, for the most part. I use the same basic setups in both markets.
    I will adjust stops to get a little more wiggle room and risk/reward potential
    when trading ES, but I will widen my target as well.


    **Bourquin:** What’s the prototypical ES trade setup for you, and what characteristics
    do you like to see on the chart?


    **Toma:** Well, I try to keep ten setups, and I think of those setups like horses
    in my stable. I monitor the market activity and my trade performance through all
    ten setups, and if they keep performing, I use them more frequently and at a higher
    contract level.


    For those that don’t, however, I either stop using them or move them off my list,
    potentially in favor of another setup that I may develop through my continuing
    research or elsewhere.'
  trans: '

    **伦德：** 这又回到了我之前说过的，医生通常不擅长打牌或交易这一点。交易是你所能从事的最反直觉的事情之一。我们被教导的一切都与正确的交易心态背道而驰。


    如果你去商店买一台新冰箱，你想买一台打折的冰箱。价格越便宜，对你越好。但冰箱是一种消耗性资产。这就是为什么你的思维模式在该情境下管用的原因，因为我们被条件化了，认为越便宜越好。


    股票不是消耗性资产。如果一只股票越来越便宜，意味着没人想要它。你想要的是越来越贵的股票。


    当你告诉人们他们大部分时间会在交易中亏损时，他们就是无法接受。他们会说：“我不明白。”不过，这很有趣，因为他们却接受了棒球中同样的概念。如果有人棒球击球率达到三成，他就是伟大的球员。但如果某人在交易中胜率仅为三成，他们就会觉得自己是个失败者。


    面对可能七成时间都在亏损的情况，如果你拥有良好的风险回报比，你甚至可以在输得那么频繁或更频繁的情况下仍能盈利。


    **伯奎因：** 让我再问你一个关于风险回报比的问题。你青睐什么样的风险回报比？对于任何给定的交易，你如何确定这个比率应该是多少？


    **伦德：** 我尝试使用 1:3 的风险回报比。我的工作方式是这样的：我会查看图表，然后对自己说：“好，我打算在这里入场。”我会看我的止损位设定在哪里，然后判断我认为的目标位会在哪里。接着我会说：“好，我愿意在这笔交易中承担
    X 数额的风险。”


    假设我愿意在一笔交易中承受 500 美元的风险。我会计算入场价和我知道要止损的价格之间的价差，然后用这 500 美元除以这个价差。假设我打算以 100 美元买入一只股票，但如果跌到
    99.50 美元，我就离场。那么，我的价差就是 50 美分。接着，我用我愿意冒风险的 500 美元除以这 50 美分，这样我的仓位规模就是 1000 股。这样，我就能确定，如果触及我的最大止损，我将恰好损失我设定的最大风险敞口金额。


    在这个理论交易中，我追求 1500 美元的目标。我冒一笔‘R’的风险，即 500 美元的风险，我寻求三倍‘R’的回报，即 1500 美元的收益。基本上，我只是逆向推导我的交易规模。


    很多人随意地选择仓位规模，说：“啊哈，我要用 1000 股入场。”这对我来说毫无意义。你必须有一个与你所观察的图表和模式相匹配的仓位规模设定方法和风险管理方法。


    **伯奎因：** 在本书的最后一章《富有的交易者的二十个习惯》中，我谈到的正是这一点。当我问任何一位优秀的交易者他们通常的持仓规模时，他们会说：“嗯，你得给我比这更多的信息。你得告诉我我交易的是什么以及它的波动性如何。我不会对什么都用
    1000 股。”


    **伦德：** 是的，无意冒犯任何人，但当你听到某人说“嗯，我交易了 1000 股”，这通常是业余人士的标志。通常是那些不完全了解市场中风险回报比的人的特征。


    ---


    **章节**


    **迈克尔·托马**


    *专业风险经理***迈克尔·托马***积极交易美国股指*和*股指期货市场*，以及中国大陆的股票市场*。他还交易债券期货*，这是*短线交易者*经常忽视的领域*。就交易策略而言，托马结合了技术分析*和严格的风险参数*，帮助他在市场中持续做出盈利的交易决策*。


    通过演讲活动以及担任 Pelagon Trading 运营副总裁的职务，托马淡化了交易的金钱方面，转而关注风险管理*、心理学*、有效交易日志*和数据驱动分析*等功能*。他的方法受到基金经理*和其他希望提高交易表现的专业人士，以及寻求稳定性和更透明市场视角的新手交易者的追捧*。托马撰写了两本关于交易和风险管理的书籍，并于
    2007 年获得注册风险管理师（CRM）*资格认证*。


    **蒂姆·伯奎因：** 迈克，谈谈你是哪种类型的交易者，以及你交易什么。


    **迈克尔·托马：** 大部分时候，我是 E-迷你标普 500 指数期货（ES）的交易者，但我也涉足债券交易和债券期货，以及其他一些领域，比如期权和交易所交易基金（ETF）。


    **伯奎因：** 债券交易者很少见。不知为何，你很少听说有短线交易者使用债券。也许很多人只是觉得他们不够了解那个市场。是什么让你决定交易债券市场的？


    **托马：** 我最初也不太了解债券市场。有一次我在交易者博览会上参加了一个债券研讨会，我觉得那些形态相当不错，交易看起来也很清晰。我要求在我交易的任何市场都有清晰的订单流和清晰的价格行为，所以在那之后我进行了一些回测，并订阅了债券期货的数据源。这不是我最喜欢的市场，我仍在逐渐适应它，但我追踪自己大量的交易活动，数据摆在那里。因此，我只是交易较小的手数。


    ES 期货常常在窄幅、震荡的区间内交易，而当有关于十年期国债和国库票据的债券公告时，债券交易可能会剧烈波动。这对我来说，在某种程度上弥补了 ES 交易中下午时段的沉闷。


    **伯奎因：** 债券领域有巨大的成交量，大型机构大部分时间都在交易这些，所以你有极好的机会快速进出。当然，提及债券，许多人首先想到的并不是巨大的成交量和快速交易，但你确实可以在债券市场中做到这一点。


    **托马：** 绝对正确。专业人士是如何交易的：他们会在哪里试探止损，会关注什么支撑和阻力位——这是你必须通过艰难方式——就像我一样——学到的事情之一。


    尤其是在公告发布日，要非常小心。首先远离市场，只做监控。每个市场都有自己的风格，很多 ES 交易者喜欢那个市场是因为他们了解它的风格和交易方式。而债券市场也有其独特之处。这是一个学习曲线，但现在我已经更适应了，我会说，我总交易活动的大约
    25%是 ZB 债券期货合约。


    **伯奎因：** 那么，你交易债券期货的形态和你交易 ES 时使用的形态是一样的吗？


    **托马：** 是的，大部分情况是这样。我在两个市场使用相同的基本形态。当交易 ES 时，我会调整止损以获得稍微多一点的回旋余地和风险/回报潜力，但同时我也会放宽我的目标价位。


    **伯奎因：** 对你来说，典型的 ES 交易形态是什么样的？你希望在图表上看到哪些特征？


    **托马：** 嗯，我努力维持十个形态，我把这些形态想象成我马厩里的马。我通过所有这十个形态来监控市场活动和我自己的交易表现；如果它们持续表现良好，我就会更频繁地使用它们，并提高合约数量。


    但对于那些表现不佳的形态，我则要么停止使用，要么将它们从我的清单中移除，可能会转而采用我通过持续研究或其他途径开发出的其他形态。

    '
- fmt: '# Interview with Toma: Trading Setups and Strategies


    Since I started doing this about three years ago, my number one setup is one I
    call the “Secretariat,” because it just continues to perform month after month.
    It’s relatively simple, and I use it predominantly in the `ES`, but it can be
    used in bonds as well.


    Basically, I use a nine-period exponential moving average (`EMA`) and a thirty-period
    weighted moving average (`WMA`) on a 1,224-tick chart. I have a couple of other
    indicators on it now, too, but when you’re beginning to learn this setup, it’s
    best to just monitor `EMA` and `WMA` and not clutter up the chart with other data
    or indicators.


    I’m looking for a cross of the fast moving average, so I’ll look for instances
    where the nine-period `EMA` crosses the thirty-period `WMA` on the upside, for
    example. That way, I’m going to be looking only for long-entry opportunities.
    Then, once it breaks out of that range, I’m expecting a pullback into that zone
    between the nine and the thirty and will aim to get in long and hopefully catch
    the resumption of that uptrend.


    **Bourquin:** How did you figure out that this setup worked?


    **Toma:** A lot of practice and a lot of backtesting. I’m a risk manager by trade,
    and while I consider myself to be a decent trader, I’m a really good risk manager.
    As a result of that, I’m very data driven. I do a lot of backtesting, I sample
    with different types of bar and tick charts, and I measure the ones that have
    the optimal return, given my level of risk.


    I backtest everything rigorously, and for a setup to get on my top-ten list, it
    has to produce results in all different kinds of markets and work on both the
    long side and the short side. Then, even once it makes my list, I’ll start trading
    that setup only one contract at a time.


    **Bourquin:** Do you screen for your ten setups automatically using your trading
    software?


    **Toma:** At this point, I can tell with just a quick glimpse when one of these
    setups is developing, but I also have alerts on my screen to show when the moving
    averages are crossing. That serves as the initial indication that a particular
    setup may be forming.


    **Bourquin:** Mike, you’ve got ten setups, but if the Secretariat works best,
    why not just throw as much size as possible at that one and forget about all the
    others?


    **Toma:** That’s a great question, and the straight answer is because price action
    doesn’t always allow for the setup to occur. Especially with the 1,224-tick charts
    I use, a lot of times a trend can just continue and never pull back to that “sweet
    spot,” where I want to get in.


    Now, I could just buy at the high and hope that it goes higher, but my whole mantra
    is not just to trade my setups, but also to get the best price. If I can’t get
    it, then many times I’ll just let it go.


    I’ve passed on a lot of trades. There are probably more that I miss than I actually
    get, but when I do get them, I get a really good price. Even if it doesn’t work
    and I get stopped out, my risk is limited because I got in at such a good price.


    To summarize, the same setups don’t always occur, especially on certain trend
    days—or even during specific times of the day. For example, I only target the
    Secretariat setup from the open (9:30 a.m. eastern time) until about 11:00 a.m.
    eastern time, and then from 2:45 p.m. eastern time to the close (4:00 p.m. eastern
    time) because those are the peak times for that setup.


    **Bourquin:** I like the fact that you’re “missing trades,” only in the sense
    that you’re not chasing them and are very strict about waiting for the required
    pullback before getting in.


    **Toma:** That’s one of my rules, and sometimes I look at it and wonder if it’s
    a little too strict. It’s easy to think, “Well, maybe I won’t be getting in at
    the best price, but I’d be missing a lot by passing on it altogether.”


    Honestly, though, I have other setups that I can use, and I’m in a position now
    where I really don’t want to take more than one trade at one time. I remember
    the last time we spoke, and we were talking about taking eight trades a day. Now
    I’m lucky if I can do four. I would say that 80 percent of my trades use only
    three of my ten setups.


    **Bourquin:** Do you have each of the ten setups on a single chart, or do you
    use multiple charts that show a couple of setups on each one?


    **Toma:** I have two or three charts on my main platform. I’ll have my number
    one setup, the Secretariat, on one chart, because that’s my bread and butter,
    and I don’t want to miss that. My second setup is on another chart, and then I’ll
    use one more chart with the other two or three setups that I’m constantly monitoring.
    I’ll have alerts set up on those. I’m not really watching them closely at all
    times, but during non-peak hours, like the 10:00 a.m. to 2:00 p.m. eastern lunchtime
    hours, there are some other setups I’m looking at. When the time is right, I’ll
    have those under the screen, and I’ll blow them up and predominantly look at them
    while keeping an alert on my primary trade.


    **Bourquin:** Let’s talk about your second favorite setup. What’s a good close
    second to the Secretariat?


    **Toma:** I have a basic setup that relies only on the moving average convergence/divergence
    (`MACD`) indicator. Another one of my rules is that I must be on the proper side
    of the momentum, and I think the `MACD` is a really good way to do that.


    I’ve actually taught my young nephew how to spot this setup and color coded it
    for him so that he can see when the `MACD` starts to reverse. I also showed him
    some basic rules and opened a little trading account for him, and the kid once
    had a week with seven wins and two losses and was up twelve points.


    That made me think that traders as a whole, including myself, sometimes make this
    very, very difficult. Seeing it through his eyes, I came to understand that the
    kid has no fear. He looks at it as a game—he actually calls it “the game”—and
    he doesn’t connect any monetary value to it. Maybe we all need to do that.


    **Bourquin:** Sure. When you’re paper trading, you’re not dealing with real money,
    and you’re free to trade like a kid, in a sense, because you’re not worried about
    money. Some traders would say that they need the element of tension that real
    money brings, but most people would do much better if they didn’t have to worry
    about that.


    **Toma:** And that’s very powerful, because 90 percent of the people who enter
    this business don’t make money, but most of them would if they traded in a simulator.
    You can gain a psychological edge by taking the money aspect out of it. I look
    at a little eight-year-old kid doing it, and his biggest problem is that he hops
    up and leaves whenever SpongeBob comes on TV!


    Personally, I don’t put any profit and loss indicators on my screen. While that’s
    still a challenge for me, I want to put myself in the state of mind where it’s
    not about money; it’s about implementing my trade plan.


    **Bourquin:** A lot of successful traders talk about making the goal of their
    trading anything but money, but at the end of the day, we all know that it’s about
    money. So, how do you set non-monetary goals for yourself?


    **Toma:** My ultimate goal is just to follow my trade plan, so I have metrics
    that measure how well I do that. I’m pretty confident that my setups are going
    to be there and allow me to achieve my desired lifestyle, but it’s a question
    of whether I implement my plan as efficiently as possible.'
