  trans: '

    # 高级文档工程师排版结果


    而另一些人——主要是本书中的受访者——则认为，确实没有他人无法学会的秘密。如今，全球流动性最强的市场比以往任何时候都更大，没有任何一个交易群体能对其产生实质性的重大影响。否则，最终所有交易者都会趋同于相同的移动平均线，比如
    50 日和 200 日移动平均线，这些线将成为完美的支撑位和阻力位，让他们每次都能轻松获利。但我们都知道，事实并非如此。


    我采访过的一些交易者持仓时间只有几分钟，一天之内进行数百次甚至数千次交易。另一些交易者则每月寻找一两次“大型猎物”式的交易机会；他们愿意为这些交易持仓数周甚至数月，直到理想的盈利机会出现。他们所有人，无一例外，都精通风险管理艺术，绝不允许亏损超出预定范围。他们并非一直如此自律。有些人向我讲述了账户爆仓的经历，他们在赔光每一分钱后，才最终明白自律是留在游戏中的关键。


    通过这数百次采访——有些是电话采访，有些是当面采访——我精选出了十六位顶尖交易者，形成了您正在阅读的这本书。让交易者敞开心扉谈论他们的策略、背景、挣扎和最终成功并非易事。交易者是一个奇特的群体；有时他们会秘密守护自己的方法，有时又开放透明，因为他们明白，作为一名独立交易者，赚钱并无真正的秘诀。对于短期交易者来说，努力工作和自律才是成功的真正关键。


    我还开始注意到一种模式。在听他们谈论如何在市场中谋生之后，我开始听到他们以相似的方式描述自己如何对待每一笔交易。当那些年收入都超过 20 万美元的交易者说出相同的话时，我会仔细聆听。作为交易者本人，我也在寻找一丁点智慧，能帮助我做出更好的决策，并最终赚取更多的钱。


    我整理了一份清单，列出了二十个我所交谈过的几乎所有富有交易者共同的习惯。有些你可能会感到熟悉，另一些则可能让你惊讶。无论如何，我希望你能找到至少一两个习惯，可以加入到自己的交易计划中，从而在你所交易的各种市场中，更持续地赚取更多利润。


    让我们开始吧！


    ## 1. 富有的交易者对盈利的交易有耐心，对亏损的交易毫无耐心


    这第一个习惯直接来自丹尼斯·加特曼（`TheGartmanLetter.com`）的交易手册。大多数交易者对盈利的交易感到非常焦虑，因为他们不想让盈利变成亏损。这本来是好事——直到他们的不耐烦迫使他们过早退出盈利仓位，把利润留在市场里。另一方面，你有多少次对自己说过：“我再让这笔亏损的交易多持有一会儿，看看它是否会反转。”？你刚刚对一笔亏损的交易保持了耐心，却对盈利的交易毫无耐心。


    富有的交易者则反过来思考，做得完全相反。当他们有一笔交易进展顺利并盈利时，他们会保持耐心，看看它能走多远。当他们有一笔交易逆势而行时，他们会立即退出以限制损失，并开始寻找下一个机会。如果你设定了止损，永远不要抱希望于交易会反转而移动它；它很少会反转，你只会增加当天的亏损。开始对盈利的交易保持耐心，对亏损的交易毫无耐心。这样做是迈向跻身少数富有交易者行列的第一步。


    ## 2. 富有的交易者明白，赚钱比正确更重要


    希望我们对市场的假设和预测是正确的，这是人之常情。我们都希望相信自己正确解读了市场数据，并且做出了做多或做空市场的正确选择。但富有的交易者在市场开盘或进入交易之前，很少对市场抱有偏见。此外，在他们确实做出错误交易决策而导致亏损的情况下，他们会毫不犹豫地立即反向开仓。


    我采访过一些成功的交易者，他们早上形成偏见，并且整天只按这个偏好的方向交易，但这样的人很少。大多数富有的交易者不会试图将自己的观点强加给市场，也不执着于证明自己正确；一旦市场告诉他们该转变方向，他们会立刻转变立场——即使当天他们“确信”市场会往另一个方向走。正确并不重要——增加他们的交易账户和净资产才是最重要的。


    ## 3. 富有的交易者将技术分析视为交易者聚集买入和卖出的位置图


    许多交易者将移动平均线、斐波那契和趋势线视为价格预期转向并反向运动的精确指标，但成功的交易者并不这样看待技术分析。富有的交易者将图表视为交易者聚集买入或卖出的快照。他们看到的不是
    K 线、线条和云图，而是交易者下达订单以作为止损点或入场点进入和退出市场的价格点位。股票、期权或期货合约本身并不知道支撑位或阻力位在哪里。正如经验丰富的交易者所知，是市场参与者决定了这些水平，因此成功的交易者会将自己的订单布设在这些水平周围，以利用那
    95%亏损交易者的劣势。


    ## 4. 在进入每笔交易之前，富有的交易者就知道他们将在哪里止盈或止损


    我们都听说过，交易时应该使用止损单来避免重大亏损。然而，很少有交易者在进入交易前就真正知道自己会将止损和止盈目标设在何处。富有的交易者不让任何事听天由命，在进入市场之前就完整规划好每一笔交易。


    你书面的交易计划应该包括止损位应设在何处以及你在哪里获利了结的客观衡量标准。在进入交易后不知道或仅仅猜测这些价格点位，可能会导致犹豫不决，或使价格目标超出你所交易证券的平均波动范围。当这个市场的平均波动范围只有两个点时，为什么要设定一个三个点的任意盈利目标呢？


    此外，富有的交易者设定的仓位大小和止损位，几乎总是基于他们对任何特定交易的风险承受能力。例如，如果单笔交易的最大风险是交易账户的 2%，他们会在开仓之前计算将要交易的股数（基于股价）以及一个合理的止损位。我很少听到一位富有的交易者说他们的仓位是
    1000 股。他们通常告诉我，这完全取决于他们交易的是什么品种。他们从能接受的最大亏损额出发，反向推导出符合这一客观标准的止损位和仓位大小。


    ## 5. 富有的交易者带着与前四笔亏损交易相同的信念去执行第五笔交易

    '
- fmt: '我们都有过那种一连串糟糕交易的经历，这让我们对自己认为在市场中拥有的“优势”信心动摇。我们的交易设定再次出现，但我们没有进行那第五次交易，而是犹豫不决，不想再承受一次亏损的交易。当然，那第五次交易最终表现得非常好，它不仅弥补了之前的四次亏损，还能让我们当天实现净盈利。如果我们真的相信自己的策略是可靠的，并且市场没有迹象表明情况发生了变化，那么当交易设定出现时，就没有理由犹豫。


    即使是自动化系统交易者也会告诉你，在回测中出现超出正常回撤范围的一连串亏损交易是正常的。当然，关键是要知道，何时你的“优势”不再是“优势”，何时你只是经历了一系列统计上未能成功的交易。


    富有的交易者能够摆脱亏损交易的影响，并以与进行第一笔交易时相同的热情和信心进入下一笔交易。坦帕湾光芒队的全明星棒球运动员埃文·朗格利亚的队友们经常将他的击球成功描述为他能够忘记之前糟糕的挥棒或错过的投球，并专注于朝自己飞来的下一个球。同样，富有的交易者已经掌握了忘记上一笔交易，全神贯注于下一个机会的能力。


    你的交易计划应该包含某种针对一连串亏损交易的应对措施。就我个人而言，在连续四次亏损交易之后，我会强迫自己只交易一股股票，直到我对自己的交易决策重新恢复信心。是的，佣金会吞噬掉一股股票的任何利润，但我宁愿支付佣金，也不愿因试图将我的意志强加于市场而遭受巨大损失。


    6. 富有的交易者使用“裸”图表


    当我刚开始交易时，我想在进入交易前尽可能多地看到来自各种指标的确认。我在图表上添加了如此多的线条、弧线和水平位，以至于我几乎看不清下方的价格柱。随着我作为交易者逐渐成熟，我开始剥离这些指标，并最终更倾向于使用只包含价格柱、成交量以及代表前期高点和低点的枢轴点的图表。我采访过的几乎所有富有的交易者都告诉我，他们在图表上只关注一件事：价格。我所说的“裸”图表是指那些去除了所有指标，只显示价格，或许还有每个价格水平成交量的图表。


    在每个交易者职业生涯的某个时刻，他们都会意识到，无论多么努力去寻找，都不存在神奇的指标。唯一重要的是价格——以及在该价格上的供求关系。如果你有一个自己认为能让你对未来价格走势有更深刻洞察的指标，那很好。只要知道，对任何一个或一组指标过度迷信，迟早会失败。富有的交易者坚信“价格说了算”这句话，并且能够仅凭价格信息和该价格上的市场需求进行交易。


    7. 富有的交易者能够基于不完整的信息做出决策


    我在“交易者博览会”等活动中交谈过的许多交易者都谈到，希望达到交易变得更容易、更舒适的境界。他们渴望有朝一日能够在交易时感到放松，并持续稳定地赚钱。不幸的是，我不得不告诉他们，即使是最优秀的交易者在坐到交易平台前时也会感到些许不适。尽管富有的交易者已经习惯了我们都会有那种纠结的感觉——即我们是在基于不完整和不完美的数据做决策——但你很可能永远无法对自己的交易决策感到完全舒适，因为你永远不会有足够的信息来绝对确定自己会站在市场正确的一边。


    富有的交易者已经接受了这个事实，并且能够克服坐在椅子上的那种不适感，做出良好的交易决策。他们承认这一点，却仍然能够根据自己所知和所见做出清晰的决策。交易变得“容易”的那一天永远不会到来，然而他们仍然能够通过交易市场积累惊人的财富。


    8. 富有的交易者早已不再试图抄底摸顶


    我交谈过的大多数仍在努力寻找自己市场“优势”的交易者，都在试图抄底摸顶。无论他们使用的是 1 分钟图还是日线图，大多数交易者都在使用他们能找到的每一个指标和技术分析工具，来寻找价格将要反转并朝另一个方向运行的区域。富有的交易者不会去预测顶部或底部。他们等待反转发生，然后在趋势启动后抓住“肉段”，即行情的中段。他们问的问题是：“新的方向得到确认了吗？”而不是像大多数交易者那样问：“趋势准备好反转了吗？”


    富有的交易者意识到，趋势的中段才是赚钱的地方，因此没有必要去捕捉每一个最小的波动，或者完美地把握顶底时机。当大多数交易者害怕买入历史新高或卖出历史新低时，富有的交易者知道这些才是最好的买入或卖出点。一个趋势继续的可能性远大于反转的可能性，那么为什么大多数交易者要试图寻找那个转折点，而不是顺着现有方向买入或卖出呢？当然，这并不意味着如果市场真的转向了你不需要保护自己，但试图在价格下跌前捕捉最后那一个向上的跳动是一个傻瓜的游戏。富有的交易者不会这么做，你也不应该。


    9. 富有的交易者不认为市场是“昂贵”或“便宜”的


    随便看一会儿任何商业电视频道，你就会听到评论员将某只股票或石油市场在某个价格水平上说成“昂贵”或“便宜”。绝大多数市场参与者会因为一只股票已经经历了一段长期的上涨行情而认为它“昂贵”。距离到期还有一周且远价外、价格为
    25 美分的看涨期权是“便宜”的，因为你最多损失 25 美分，对吧？富有的交易者不这样看待价格。


    对成功的交易者来说，唯一重要的事情是：根据他们的时间框架，五分钟后、一小时后或一天后，是否会有人出更高或更低的价格来买这只股票？如果有人在 30 分钟后愿意出
    651 美元买入，那么定价 650 美元的谷歌股票并不昂贵。同样，仙股很不错，因为你可以用一个小账户买入很多股票，但如果明天它们只值 1.50 美元，那么
    2.00 美元真的是个好买入价吗？


    靠买卖为生的成功短线交易者只关心能否在持有期内从特定证券上获利。把关于 150 美元的石油在当前政治背景下是否被荒谬高估的争论，留给长期投资者和电视上的评论员们吧。如果我相信有人在两小时后愿意以
    505 美元买入石油期货，那么我会整天都去买 500 美元的石油。


    在富有的交易者眼中，没有“便宜”或“昂贵”。


    10. 富有的交易者在顺风顺水时敢于加大仓位，在状态不佳时则保持谨慎'
  raw: 'We’ve all had that run of bad trades that shakes our confidence in the “edge”
    we think we have in the markets. Our setup appears again and instead of taking
    that fifth trade, we hesitate, not wanting to endure another losing trade. Of
    course, that fifth trade ends up working beautifully, and not only would it have
    made up for our previous four losses, but it also would have put us net-positive
    for the day. If we truly believe our strategy is solid and the market has not
    indicated that something has changed, there’s no reason to hesitate if the trade
    setup presents itself.


    Even automated system traders will tell you that a run of losing trades that goes
    beyond the normal drawdown in backtests is normal. The key, of course, is knowing
    the difference between when your “edge” is no longer an “edge” and when you’ve
    simply had a statistical run of trades that just haven’t worked out.


    Wealthy traders are able to shrug off losing trades and enter the next trade with
    the same enthusiasm and confidence they had on the first trade. Teammates of Evan
    Longoria, an All-Star baseball player for the Tampa Bay Rays, often describe his
    batting success as his ability to forget about the previous bad swing or missed
    pitch and focus solely on the next pitch coming toward him. Similarly, wealthy
    traders have mastered the ability to forget about the previous trade and focus
    exclusively on the next opportunity.


    Your trading plan should include some sort of consequence for a string of losing
    trades. For me personally, after four losing trades in a row, I force myself to
    trade a single share of stock until I feel confident in my trading decisions again.
    Yes, commissions will wipe out any profit on a single share of stock, but I would
    much rather pay a commission than take a large loss trying to force my will on
    the market.


    6\. Wealthy traders use “naked” charts


    When I first began trading, I wanted to see confirmation from as many indicators
    as possible before entering a trade. I put so many lines, arcs, and levels on
    my charts that I could barely see the price bars beneath. As I matured as a trader,
    I began peeling off those indicators and eventually began to prefer charts with
    nothing more than price bars, volume, and pivot points that represented previous
    highs and lows. Nearly every wealthy trader I interview tells me that they watch
    one thing on their charts: price. By “naked” charts I mean those that are barren
    of indicators and show just price and perhaps volume at each price level.


    At some point in every trader’s career, they realize there is no magic indicator,
    no matter how hard they look for it. The only thing that matters is price—and
    supply and demand at that price. If you have an indicator you feel gives you greater
    insight into future price movement, excellent. Just know that too much faith inany
    one or combination of indicators is sure to fail at some point. Wealthy traders
    firmly believe in the phrase, “Price pays” and are able to trade with nothing
    but information on price and the demand in the market at that price.


    7\. Wealthy traders are comfortable making decisions with incomplete information


    Many traders I speak with at events like the Traders Expo talk about getting to
    the point where trading is easier and comfortable. They yearn for the day when
    they are relaxed while trading and make money on a consistent basis. Unfortunately,
    I have to inform them that even the best traders are slightly uncomfortable sitting
    in that chair in front of their trading platform. While wealthy traders have become
    comfortable with that gnawing feeling we all get—that we are making decisions
    based on incomplete and imperfect data—it’s likely you’ll never be totally comfortable
    with your trading decisions because you’ll never have enough information to know
    absolutely that you’ll be on the right side of the market.


    Wealthy traders have come to terms with this fact and have been able to make good
    trading decisions in spite of that uncomfortable feeling in the chair. They acknowledge
    it, and yet they are able to make clear decisions based on what they know and
    see. The day when trading is “easy” never comes, yet they are still able to acquire
    incredible wealth by trading the markets.


    8\. Wealthy traders stopped trying to pick tops and bottoms long ago


    Most of the traders I talk to who are still struggling to find their “edge” in
    the markets are trying to pick tops and bottoms. Whether they are working with
    a one-minute chart or a daily chart, most traders are using every indicator and
    technical analysis tool they can find to spot those areas where price is going
    to reverse course and head in the other direction. Wealthy traders don’t try to
    anticipate the top or bottom. They wait for it to happen and then capture the
    “meat,” or the middle of the move, after it has started. The question they ask
    is, “Has the new direction been confirmed?” as opposed to most traders, who ask,
    “Is the trend ready to turn?”


    Wealthy traders realize that the middle of the trend is where the money is made,
    so there’s no need to capture every last tick or perfectly time the top or bottom.
    While most traders are afraid to buy all-time highs and sell all-time lows, wealthy
    traders know those are the best places to buy or sell. A trend is much more likely
    to continue than it is to reverse, so why are most traders trying to find that
    turning point instead of buying or selling the existing direction? Of course,
    this doesn’t mean you don’t protect yourself if the market does turn, but trying
    to capture that final upward tick before it heads lower is a fool’s game. Wealthy
    traders don’t do it, and neither should you.


    9\. Wealthy traders don’t think of the market as “expensive” or “cheap”


    Watch any business television channel for a while and you’ll hear commentators
    refer to a stock or the oil market as looking “expensive” or “cheap” at given
    price levels. The vast majority of market participants will look at a stock and
    judge it to be “expensive” simply because it has had a long run to the upside.
    Twenty-five-cent call options that are far out of the money a week before expiration
    are “cheap” because the maximum you can lose is a quarter, right? Wealthy traders
    don’t view price that way.


    The only thing that matters to successful traders is this: is someone going to
    pay more or less for this stock five minutes from now, an hour from now, or a
    day from now, depending on their time frame? Google stock that is priced at $650
    isn’t expensive if someone is willing to pay $651 for it in thirty minutes. Likewise,
    penny stocks are great because you can buy a lot of shares in a small account,
    but is $2.00 really a good buy if tomorrow they are only worth $1.50?


    Successful short-term traders who make their living buying and selling only care
    about being able to profit on a given security during its holding period. Leave
    the arguments about whether $150 oil is ridiculously overvalued in the context
    of the current political climate for the long-term investors and talking heads
    on TV. If I believe someone will be willing to buy oil futures at $505 in two
    hours, I’ll buy $500 oil all day long.


    There is no “cheap” or “expensive” in the eyes of a wealthy trader.


    10\. Wealthy traders are aggressive with size when they are doing well, and modest
    when they are not'
  trans: '

    我们都有过那种一连串糟糕交易的经历，这让我们对自己认为在市场中拥有的“优势”信心动摇。我们的交易设定再次出现，但我们没有进行那第五次交易，而是犹豫不决，不想再承受一次亏损的交易。当然，那第五次交易最终表现得非常好，它不仅弥补了之前的四次亏损，还能让我们当天实现净盈利。如果我们真的相信自己的策略是可靠的，并且市场没有迹象表明情况发生了变化，那么当交易设定出现时，就没有理由犹豫。


    即使是自动化系统交易者也会告诉你，在回测中出现超出正常回撤范围的一连串亏损交易是正常的。当然，关键是要知道，何时你的“优势”不再是“优势”，何时你只是经历了一系列统计上未能成功的交易。


    富有的交易者能够摆脱亏损交易的影响，并以与进行第一笔交易时相同的热情和信心进入下一笔交易。坦帕湾光芒队的全明星棒球运动员埃文·朗格利亚的队友们经常将他的击球成功描述为他能够忘记之前糟糕的挥棒或错过的投球，并专注于朝自己飞来的下一个球。同样，富有的交易者已经掌握了忘记上一笔交易，全神贯注于下一个机会的能力。


    你的交易计划应该包含某种针对一连串亏损交易的应对措施。就我个人而言，在连续四次亏损交易之后，我会强迫自己只交易一股股票，直到我对自己的交易决策重新恢复信心。是的，佣金会吞噬掉一股股票的任何利润，但我宁愿支付佣金，也不愿因试图将我的意志强加于市场而遭受巨大损失。


    6. 富有的交易者使用“裸”图表


    当我刚开始交易时，我想在进入交易前尽可能多地看到来自各种指标的确认。我在图表上添加了如此多的线条、弧线和水平位，以至于我几乎看不清下方的价格柱。随着我作为交易者逐渐成熟，我开始剥离这些指标，并最终更倾向于使用只包含价格柱、成交量以及代表前期高点和低点的枢轴点的图表。我采访过的几乎所有富有的交易者都告诉我，他们在图表上只关注一件事：价格。我所说的“裸”图表是指那些去除了所有指标，只显示价格，或许还有每个价格水平成交量的图表。


    在每个交易者职业生涯的某个时刻，他们都会意识到，无论多么努力去寻找，都不存在神奇的指标。唯一重要的是价格——以及在该价格上的供求关系。如果你有一个自己认为能让你对未来价格走势有更深刻洞察的指标，那很好。只要知道，对任何一个或一组指标过度迷信，迟早会失败。富有的交易者坚信“价格说了算”这句话，并且能够仅凭价格信息和该价格上的市场需求进行交易。


    7. 富有的交易者能够基于不完整的信息做出决策


    我在“交易者博览会”等活动中交谈过的许多交易者都谈到，希望达到交易变得更容易、更舒适的境界。他们渴望有朝一日能够在交易时感到放松，并持续稳定地赚钱。不幸的是，我不得不告诉他们，即使是最优秀的交易者在坐到交易平台前时也会感到些许不适。尽管富有的交易者已经习惯了我们都会有那种纠结的感觉——即我们是在基于不完整和不完美的数据做决策——但你很可能永远无法对自己的交易决策感到完全舒适，因为你永远不会有足够的信息来绝对确定自己会站在市场正确的一边。


    富有的交易者已经接受了这个事实，并且能够克服坐在椅子上的那种不适感，做出良好的交易决策。他们承认这一点，却仍然能够根据自己所知和所见做出清晰的决策。交易变得“容易”的那一天永远不会到来，然而他们仍然能够通过交易市场积累惊人的财富。


    8. 富有的交易者早已不再试图抄底摸顶


    我交谈过的大多数仍在努力寻找自己市场“优势”的交易者，都在试图抄底摸顶。无论他们使用的是 1 分钟图还是日线图，大多数交易者都在使用他们能找到的每一个指标和技术分析工具，来寻找价格将要反转并朝另一个方向运行的区域。富有的交易者不会去预测顶部或底部。他们等待反转发生，然后在趋势启动后抓住“肉段”，即行情的中段。他们问的问题是：“新的方向得到确认了吗？”而不是像大多数交易者那样问：“趋势准备好反转了吗？”


    富有的交易者意识到，趋势的中段才是赚钱的地方，因此没有必要去捕捉每一个最小的波动，或者完美地把握顶底时机。当大多数交易者害怕买入历史新高或卖出历史新低时，富有的交易者知道这些才是最好的买入或卖出点。一个趋势继续的可能性远大于反转的可能性，那么为什么大多数交易者要试图寻找那个转折点，而不是顺着现有方向买入或卖出呢？当然，这并不意味着如果市场真的转向了你不需要保护自己，但试图在价格下跌前捕捉最后那一个向上的跳动是一个傻瓜的游戏。富有的交易者不会这么做，你也不应该。


    9. 富有的交易者不认为市场是“昂贵”或“便宜”的


    随便看一会儿任何商业电视频道，你就会听到评论员将某只股票或石油市场在某个价格水平上说成“昂贵”或“便宜”。绝大多数市场参与者会因为一只股票已经经历了一段长期的上涨行情而认为它“昂贵”。距离到期还有一周且远价外、价格为
    25 美分的看涨期权是“便宜”的，因为你最多损失 25 美分，对吧？富有的交易者不这样看待价格。


    对成功的交易者来说，唯一重要的事情是：根据他们的时间框架，五分钟后、一小时后或一天后，是否会有人出更高或更低的价格来买这只股票？如果有人在 30 分钟后愿意出
    651 美元买入，那么定价 650 美元的谷歌股票并不昂贵。同样，仙股很不错，因为你可以用一个小账户买入很多股票，但如果明天它们只值 1.50 美元，那么
    2.00 美元真的是个好买入价吗？


    靠买卖为生的成功短线交易者只关心能否在持有期内从特定证券上获利。把关于 150 美元的石油在当前政治背景下是否被荒谬高估的争论，留给长期投资者和电视上的评论员们吧。如果我相信有人在两小时后愿意以
    505 美元买入石油期货，那么我会整天都去买 500 美元的石油。


    在富有的交易者眼中，没有“便宜”或“昂贵”。


    10. 富有的交易者在顺风顺水时敢于加大仓位，在状态不佳时则保持谨慎

    '
- fmt: '# 富裕交易者的习惯


    丹尼斯·加特曼（Dennis Gartman）因告诉交易者“多做有效的事，少做无效的事”而闻名。这看起来很简单，但你会惊讶地发现，有多少交易者试图通过简单地将仓位规模翻倍，同时使用最初导致他们亏损的完全相同的策略来弥补亏损。他们还未能立即从快速盈利的头寸中获利，反而在富裕交易者会加倍持仓时焦虑地平仓。再一次，缺乏经验的交易者做了与富裕交易者完全相反的事。


    富裕交易者是精通于在自己交易顺利且感觉能正确解读市场数据时大幅增加仓位的行家。他们也擅长在市场表现不佳时大幅削减仓位。他们不是试图通过增加仓位来弥补亏损，而是迅速缩减到极小仓位，直到他们能更自信地“解读”市场。


    我采访过的几乎每一位富裕交易者都告诉我，每个月只有一两笔交易成就了他们的月份。有些人甚至说，每年只有一两笔交易成就了他们的年份。想象一下，为了等待那些特殊的交易，每个月或每年需要多大的耐心。富裕交易者拥有这种耐心。


    他们能迅速识别出那些“成就月度”的交易，并在初始仓位显示盈利后迅速加仓。他们用正常仓位交易，有时盈利，有时亏损。但当他们感觉非常强烈的一两笔交易出现时，他们会以巨大的信心大幅加仓。他们将“让利润奔跑”发挥到极致，并能亲眼目睹那笔“伟大交易”变成现实。


    这并不意味着他们将风险参数抛之脑后。相反，他们的风险容忍度一如既往地遵守纪律。但他们认识到，不利用眼前的机会同样会让他们付出代价。知道那些交易何时出现，是经验和对交易系统信心的体现。


    ## 11. 富裕交易者明白市场明天还会开盘


    新交易者总是让我感到惊讶的一件事是，他们常常因为错过一笔交易而比因交易亏损而承受更多自责。这真的很荒谬。当他们的交易账户保持不变时，他们比账户因参与了一笔未按计划进行的交易而缩水时更加沮丧。


    富裕交易者明白，他们的工作不是无论市场环境如何都时刻活跃交易。相反，他们的工作是等待*正确*的交易出现，并在*正确*的市场环境中积极管理仓位。我看到很多辞去常规工作成为全职交易者的人都有这种情况。如果他们在任何其他工作中整天坐在显示器前，他们会被贴上懒惰或低效的标签，甚至可能被解雇。因此，合理地认为，如果你的工作是交易，你就必须一直交易，对吧？错。有经验的交易者善于“按兵不动”，直到合适的交易机会出现。


    人们很容易陷入这样一种心态：某笔交易是千载难逢的机会，你绝不能错过，因为再也不会有机会从中获利了。这种想法完全错误。总会有另一个机会以110美元买入苹果（Apple）或以275美元做空奈飞（Netflix）。也许这个机会不会具体出现在这些股票上，但市场总会给你另一个赚钱交易的机会。放松下来，为下一笔交易做好准备；它总会发生的。当你错过你认为是一笔绝佳交易时，不要自责。庆幸你的交易账户是稳定的，并且你没有因为强行参与一笔非赢利的交易而赔钱。另一个机会就在眼前。


    ## 12. 富裕交易者*从不*加仓亏损头寸


    这一点其实根本不需要解释，但我还是会提供进一步的评论来支持它。


    如果说有什么比其他任何因素更能摧毁交易账户，那就是加仓亏损头寸或让交易超出止损位。富裕交易者绝不会加仓一笔亏损的交易，句号。然而，他们常常会加仓盈利的头寸。许多交易者为了“弥补”一笔他们“确信”会反转的亏损交易，而做了完全相反的事。不要落入这个陷阱。加仓盈利的头寸，并对你的亏损头寸毫不留情地缺乏耐心（参见习惯#1）。


    这条规则的唯一例外——我甚至不愿提及，怕它会给你一个破坏规则的理由——是当拥有***非常庞大***账户的经验丰富的交易者，有一个在特定证券上建立长期交易的巨大仓位的具体计划时。只有那时，他们才可能需要“分步建仓”，以便在第一笔入场亏损时也能建立完整仓位。当然，他们只会在该仓位尚未触及止损位的情况下这么做。


    对于99%的零售交易者来说，如果你从不加仓亏损头寸，你将避免那个导致更多全职在家交易者重返朝九晚五工作的陷阱。记住丹尼斯·加特曼的建议：“多做有效的事……”（只加仓盈利头寸），“……少做无效的事”（永不加仓亏损头寸）。


    ## 13. 富裕交易者不以金钱作为判断交易成功的标准


    我们进入这个游戏都是为了赚钱，并希望在做自己喜欢的事中变得富有。富裕交易者并非为了好玩而交易。金钱是最终目标，任何说不是的人都是傻瓜。然而，金钱腐蚀了我们的决策过程，因为我们无法在交易过程中剔除对财富的情感和渴望。


    富裕交易者深知这一点，并将金钱之外的任何东西作为他们交易的目标。例如，我交谈过的一位富裕交易者，他判断自己成功的方式是看他能否不违反自己制定的十条书面规则中的任何一条，其中一些规则可能就包含在这二十个习惯中！他知道，如果他不违反规则，并将遵守规则作为每个交易日的目标，那么金钱自然会作为严格纪律的副产品随之而来。


    那些为自己设定每天在市场上赚取100美元、500美元或1000美元目标的交易者，注定会为了达成这个愿望而过度交易并强行进行糟糕的交易。有些时候，市场就是不愿意给你这份利润。你的特定交易策略可能无法每天都达到你的日目标，而你将不得不在接下来的日子里承担更多风险来弥补。这从来都行不通。


    相反，为自己设定一些目标，如果严格遵循，这些目标将转化为实际赚取的美元。无论目标是什么，无论它是在形态发展过程中识别出特定模式，还是为你的交易找到坚实的入场价格，把它设定为金钱之外的任何东西，利润自然会随之而来。


    ## 14. 富裕交易者阅读关于暴民、骚乱和人类心理学的书籍


    市面上有数百本优秀的交易书籍。（迈克尔·C·托梅特著的`Bloomberg Visual Guide to Candlestick Charting` [彭博出版社，2012]
    是我目前正在阅读的一本。）富裕交易者也会阅读这些书，有些人甚至自己写一本。但我交谈过的许多富裕交易者，在交易生涯早期就意识到，市场是由人类的贪婪、恐惧和恐慌驱动的——正是这些相同的情感驱使暴民掀翻汽车、砸碎商店橱窗。'
  raw: 'Dennis Gartman is famous for telling traders, “Do more of what is working
    and less of what is not.” It seems simplistic, but you’d be surprised how many
    traders try to make up for losses by simply doubling their share size while using
    the exact same strategy that resulted in their losses in the first place. They
    also fail to capitalize immediately on fast-gaining positions and instead anxiously
    sell their positions just when the wealthy trader would be doubling his or her
    position. Once again, the inexperienced trader does the exact opposite of what
    a wealthy trader would do.


    Wealthy traders are masters of piling on huge size when they are trading well
    and feel like they are interpreting market data properly. They are also experts
    at dramatically reducing position size when they are not faring well in the markets.
    Instead of attempting to make up for losses by adding size, they quickly scale
    back to tiny positions until they are “reading” the market with more confidence.


    Almost every wealthy trader I have interviewed has told me that just one or two
    trades a month make their month. Some have said that one or two trades a year
    make their year. Imagine the patience it must take to wait for those special trades
    every month or year. Wealthy traders possess that patience.


    They are quick to recognize those “make-my-month” trades and quickly scale in
    with extra size once their initial positions show profits. They trade normal position
    size and make some, then lose some. But when those one or two trades come along
    that they feel very strongly about, they scale in big and with enormous confidence.
    They take “letting their winners run” to the extreme and are able to see that
    “great trade” materialize before their eyes.


    This doesn’t mean they throw their risk parameters out the window. On the contrary,
    their risk tolerance remains as disciplined as ever. But they realize that not
    taking advantage of the opportunity at hand can also cost them money. Knowing
    when those trades come along is a matter of experience and confidence in their
    trading system.


    11\. Wealthy traders realize the market will be open again tomorrow


    One thing that always surprises me about new traders is that they often give themselves
    more grief for missing a trade than for taking a loss on a trade. It’s absurd,
    really. They are more upset when their trading account remains flat than they
    are when it has decreased because they were in a trade that didn’t work out as
    planned.


    Wealthy traders understand that their job is not to be actively trading at all
    times, regardless of the market environment. Instead, their job is to wait for
    the *right* trades to come along and actively manage their positions during the
    *right* market environment. I see this a lot with traders who have quit their
    regular jobs to become full-time traders. If they sat in front of their monitors
    all day at any other job, they’d be branded as lazy or unproductive, and would
    probably get fired. Therefore, it’s reasonable to think that if your job is trading,
    you must be trading at all times, right? Wrong. And experienced traders are fine
    “sitting on their hands” until the right trade presents itself.


    It’s easy to get caught up in the mindset that a certain trade is a once-in-a-lifetime
    opportunity that you can’t afford to miss because there will never be another
    chance to capitalize on it. That’s simply incorrect. There will always be another
    chance to buy an Apple at $110 or short a Netflix at $275\. Perhaps the opportunity
    won’t be in those stocks specifically, but the market will offer you another chance
    at a money-making trade. Relax and get ready for the next trade; it will happen.
    Don’t beat yourself up when you miss what you think was a terrific trade. Rejoice
    in the fact that your trading account is stable and you didn’t lose money forcing
    a trade that wasn’t a winner. Another opportunity is just around the corner.


    12\. Wealthy traders *never* add to a losing position


    This one really shouldn’t need any explanation at all, but I will back it up with
    further commentary anyway.


    If there is one thing that decimates trading accounts more than anything else,
    it’s adding to losing positions or letting trades go beyond their stop losses.
    Wealthy traders do not add to a losing trade, period. They will often add to winning
    positions, however. Many traders do the exact opposite in order to “make up” for
    a losing trade they “just know” is going to turn around. Don’t fall into this
    trap. Add to winners and be ruthlessly impatient with your losers (See Habit #1).


    The only exception to this rule—and I hate to even mention it for fear it will
    give you an excuse to break the rule—is when experienced traders with ***very
    large*** accounts have a specific plan to build an enormous position for a longer-term
    trade in a particular security. Only then might they need to “leg in” to a position
    to get the full size in place even when their first entry is losing. And they
    will only do so if it has not hit their stop loss, of course.


    For 99 percent of all retail traders, if you never add to a losing position, you
    will avoid the pitfall that has sent more full-time, at-home traders back to their
    day jobs than any other mistake. Remember Dennis Gartman’s advice: “Do more of
    what is working …” (only add to winners), “… and less of what is not” (never add
    to losers.)


    13\. Wealthy traders judge their trading success on anything but money


    We are all in this game to make money and hopefully become wealthy doing what
    we love. Wealthy traders didn’t get that way by trading for fun. Money is the
    end game and anyone who says otherwise is a fool. However, money corrupts our
    decision-making process because it is impossible to remove our emotions and desires
    for riches from the process of trading.


    Wealthy traders know this and make anything other than money the goal of their
    trading. For example, one wealthy trader I spoke with judged his ­success by his
    ability to refrain from breaking a single one of his ten written rules, some of
    which may be in these twenty habits! He knew that if he didn’t break his rules
    and made adherence to his rules the goal of each trading day, the money would
    simply follow as a by-product of strict discipline.


    Traders who set a goal for themselves of making $100, $500, or $1,000 per day
    in the market are destined to overtrade and force bad trades in an effort to achieve
    that desire. Some days the markets just aren’t willing to give you that profit.
    Your specific trading strategy just may not yield your daily goal every day, and
    you’ll end up taking on more risk the following days to make up for it. That never
    works.


    Instead, set goals for yourself that, if followed strictly, will result in dollars
    earned. Whatever the goal, no matter whether it is spotting a particular pattern
    while it is developing or getting solid entry prices for your trades, make it
    anything but money and the profits will come to you as a result.


    14\. Wealthy traders read about mobs, riots, and human psychology


    There are hundreds of terrific trading books out there. (*Bloomberg Visual Guide
    to Candlestick Charting*, by Michael C. Thomsett [Bloomberg Press, 2012], is one
    that I’m reading at the moment.) Wealthy traders read them too and some may even
    write one themselves. But many of the wealthy traders I talked with realized early
    on in their trading careers that the markets are driven by human greed, fear,
    and panic—the same emotions that drive rioters to overturn cars and break store
    windows.'
  trans: '

    # 富裕交易者的习惯


    丹尼斯·加特曼（Dennis Gartman）因告诉交易者“多做有效的事，少做无效的事”而闻名。这听起来很简单，但你会惊讶地发现，有多少交易者试图通过简单地将仓位规模翻倍，同时使用最初导致他们亏损的完全相同的策略来弥补亏损。他们还未能立即从快速盈利的头寸中获利，反而在富裕交易者会加倍持仓时焦虑地平仓。再一次，缺乏经验的交易者做了与富裕交易者完全相反的事。


    富裕交易者是精通于在自己交易顺利且感觉能正确解读市场数据时大幅增加仓位的行家。他们也擅长在市场表现不佳时大幅削减仓位。他们不是试图通过增加仓位来弥补亏损，而是迅速缩减到极小仓位，直到他们能更自信地“解读”市场。


    我采访过的几乎每一位富裕交易者都告诉我，每个月只有一两笔交易成就了他们的月份。有些人甚至说，每年只有一两笔交易成就了他们的年份。想象一下，为了等待那些特殊的交易，每个月或每年需要多大的耐心。富裕交易者拥有这种耐心。


    他们能迅速识别出那些“成就月度”的交易，并在初始仓位显示盈利后迅速加仓。他们用正常仓位交易，有时盈利，有时亏损。但当他们感觉非常强烈的一两笔交易出现时，他们会以巨大的信心大幅加仓。他们将“让利润奔跑”发挥到极致，并能亲眼目睹那笔“伟大交易”变成现实。


    这并不意味着他们将风险参数抛之脑后。相反，他们的风险容忍度一如既往地遵守纪律。但他们认识到，不利用眼前的机会同样会让他们付出代价。知道那些交易何时出现，是经验和对交易系统信心的体现。


    ## 11. 富裕交易者明白市场明天还会开盘


    新交易者总是让我感到惊讶的一件事是，他们常常因为错过一笔交易而比因交易亏损而承受更多自责。这真的很荒谬。当他们的交易账户保持不变时，他们比账户因参与了一笔未按计划进行的交易而缩水时更加沮丧。


    富裕交易者明白，他们的工作不是无论市场环境如何都时刻活跃交易。相反，他们的工作是等待*正确*的交易出现，并在*正确*的市场环境中积极管理仓位。我看到很多辞去常规工作成为全职交易者的人都有这种情况。如果他们在任何其他工作中整天坐在显示器前，他们会被贴上懒惰或低效的标签，甚至可能被解雇。因此，合理地认为，如果你的工作是交易，你就必须一直交易，对吧？错。有经验的交易者善于“按兵不动”，直到合适的交易机会出现。


    人们很容易陷入这样一种心态：某笔交易是千载难逢的机会，你绝不能错过，因为再也不会有机会从中获利了。这种想法完全错误。总会有另一个机会以 110 美元买入苹果（Apple）或以
    275 美元做空奈飞（Netflix）。也许这个机会不会具体出现在这些股票上，但市场总会给你另一个赚钱交易的机会。放松下来，为下一笔交易做好准备；它总会发生的。当你错过你认为是一笔绝佳交易时，不要自责。庆幸你的交易账户是稳定的，并且你没有因为强行参与一笔非赢利的交易而赔钱。另一个机会就在眼前。


    ## 12. 富裕交易者*从不*加仓亏损头寸


    这一点其实根本不需要解释，但我还是会提供进一步的评论来支持它。


    如果说有什么比其他任何因素更能摧毁交易账户，那就是加仓亏损头寸或让交易超出止损位。富裕交易者绝不会加仓一笔亏损的交易，句号。然而，他们常常会加仓盈利的头寸。许多交易者为了“弥补”一笔他们“确信”会反转的亏损交易，而做了完全相反的事。不要落入这个陷阱。加仓盈利的头寸，并对你的亏损头寸毫不留情地缺乏耐心（参见习惯#1）。


    这条规则的唯一例外——我甚至不愿提及，怕它会给你一个破坏规则的理由——是当拥有***非常庞大***账户的经验丰富的交易者，有一个在特定证券上建立长期交易的巨大仓位的具体计划时。只有那时，他们才可能需要“分步建仓”，以便在第一笔入场亏损时也能建立完整仓位。当然，他们只会在该仓位尚未触及止损位的情况下这么做。


    对于 99%的零售交易者来说，如果你从不加仓亏损头寸，你将避免那个导致更多全职在家交易者重返朝九晚五工作的陷阱。记住丹尼斯·加特曼的建议：“多做有效的事……”（只加仓盈利头寸），“……少做无效的事”（永不加仓亏损头寸）。


    ## 13. 富裕交易者不以金钱作为判断交易成功的标准


    我们进入这个游戏都是为了赚钱，并希望在做自己喜欢的事中变得富有。富裕交易者并非为了好玩而交易。金钱是最终目标，任何说不是的人都是傻瓜。然而，金钱腐蚀了我们的决策过程，因为我们无法在交易过程中剔除对财富的情感和渴望。


    富裕交易者深知这一点，并将金钱之外的任何东西作为他们交易的目标。例如，我交谈过的一位富裕交易者，他判断自己成功的方式是看他能否不违反自己制定的十条书面规则中的任何一条，其中一些规则可能就包含在这二十个习惯中！他知道，如果他不违反规则，并将遵守规则作为每个交易日的目标，那么金钱自然会作为严格纪律的副产品随之而来。


    那些为自己设定每天在市场上赚取 100 美元、500 美元或 1000 美元目标的交易者，注定会为了达成这个愿望而过度交易并强行进行糟糕的交易。有些时候，市场就是不愿意给你这份利润。你的特定交易策略可能无法每天都达到你的日目标，而你将不得不在接下来的日子里承担更多风险来弥补。这从来都行不通。


    相反，为自己设定一些目标，如果严格遵循，这些目标将转化为实际赚取的美元。无论目标是什么，无论它是在形态发展过程中识别出特定模式，还是为你的交易找到坚实的入场价格，把它设定为金钱之外的任何东西，利润自然会随之而来。


    ## 14. 富裕交易者阅读关于暴民、骚乱和人类心理学的书籍


    市面上有数百本优秀的交易书籍。（迈克尔·C·托梅特著的`Bloomberg Visual Guide to Candlestick Charting` [彭博出版社，2012]
    是我目前正在阅读的一本。）富裕交易者也会阅读这些书，有些人甚至自己写一本。但我交谈过的许多富裕交易者，在交易生涯早期就意识到，市场是由人类的贪婪、恐惧和恐慌驱动的——正是这些相同的情感驱使暴民掀翻汽车、砸碎商店橱窗。

    '
- fmt: '# 交易智慧的启示：从经典著作到市场心理学


    有几本非常优秀的交易书籍，虽然实际上根本不是关于交易的，但会给你带来深刻的洞察，了解在各种情境下是什么驱动着人类行为。我最喜欢的一本是詹姆斯·苏罗维茨基（James
    Surowiecki）的《群体的智慧》（*The Wisdom of Crowds*）（Doubleday，2004）。另一本是阿维纳什·迪克西特（Avinash
    Dixit）和巴里·奈尔伯夫（Barry Nalebuff）的《策略的艺术》（*The Art of Strategy*）（W. W. Norton & Company，2008）。最后，我推荐的第三本书是罗伯特·门舍尔（Robert
    Menschel）的《市场、暴民与疯狂》（*Markets, Mobs, and Mayhem*）（Wiley，2002）。


    涉及人类本性基本前提的书籍，会为你提供一个全新的视角，让你理解任何市场中的供需如何推动价格变动——而价格才是王道。有些交易员甚至坚持认为，价格，也只有价格才是最重要的。新闻、技术分析和市场深度屏幕只会分散我们对市场真正唯一重要的事物的注意力：价格行为。


    无论你是否相信这一点，学习群体心理学的知识，你将能更好地理解如何从市场的疯狂中获利。这是富有的交易员用来从经验不足的交易员那里榨干资金的秘密技巧——他们通过站在交易对手方来实现。


    ## 15. 富有的交易员将自己视为做市商


    从严格意义上讲，他们可能不是“做市商”，但富有的交易员擅长做一件所有官方做市商都会做的事情：他们为市场提供流动性。换句话说，他们通过用自己的头寸提供交易量来寻找在市场中获利的方法。这是一个微妙的观点，理解起来有点令人困惑，所以让我用几个假设性的例子来说明这一点。


    假设羊奶是杂货店的热门商品。当地财经新闻网络正在报道杂货店里羊奶是最畅销的产品，食品博客也都在谈论羊奶的最新价格走势。你决定要参与这场羊奶热潮，于是前往当地的商店。你走到商店后面，打开冰箱门，拿了两加仑羊奶。你回到商店前面，和其他所有购物车里装满羊奶的人一起排队，这表明你和其他排队的人一样，都是一个新手交易员。


    富有的交易员听说了羊奶热潮，也去了一趟超市。但他没有像其他人一样去冰箱那里购买羊奶，而是直接走到收银台，拍了拍店员的肩膀说：“去休息一下吧，我来替你看一会儿收银机。”接着，富有的交易员接手促成羊奶的交易，为羊奶做市，并从中获利。


    你看出区别了吗？再来一个例子。


    在美国，每年冬季假期前后，总会有一款每个孩子都想要的热门玩具。家长们不惜一切代价为孩子寻找并购买这款玩具，支付正常价格的两倍甚至三倍，只为给他们所爱的人买到那个闪亮的新东西。富有的交易员可不会这样。


    富有的交易员会去找两三个热门玩具，并与卖家协商以获得最优惠的价格。她不会把玩具送给自己的孩子，而是直接上架到`eBay`，以高于进价50%的价格挂牌。她为那个玩具创造了一个市场，并为那些急于购买的家长们提供了流动性。


    富有的交易员在交易时只有非常细微的视角差异，然而正是他们独特的视角，在如何接近市场以及寻找盈利交易方面产生了巨大的影响。


    像做市商一样思考，而不仅仅是一个交易员——富有的交易员就是这样做的，你也应该如此。


    ## 16. 富有的交易员练习阅读图表的右侧，而非左侧


    阅读图表的左侧很容易。即使是一个全新的交易员也能识别出上个月或去年发生的“头肩顶”蜡烛图形态。我们都能在“熊旗”或“牛三角”形态发生很久之后迅速识破它们。


    诀窍在于在这些形态正在发生时就看出来。盈利来自于在形态仍在发展时就进行交易，而不是两周后。要想通过图表形态来定位自己以获利，只有当你成为阅读图表右侧——即尚未出现的那部分——的专家时才有可能。


    我并不是说富有的交易员能预测未来。恰恰相反，他们看到的数据和你我看到的完全一样。不同之处在于，富有的交易员能够在下一根K线在图表上打印出来之前，就将其可视化，并看到更后面的K线。他们在图表形态正在形成时就识别出来，并能够在形态完成之前就进场交易，在其他人意识到并涌入市场之前就赚到钱。


    能够实时识别正在发展的图表形态需要经验。你必须花费数月，有时甚至是数年的时间，观察同一证券的图表发展，直到你熟悉了该证券的行为，并能判断出形态何时正在形成。你可以通过在下一根K线实际出现在图表之前，就想象它将在哪里打印出来，来达到这种熟练程度。令人惊讶的是，你对某只特定股票、`ETF`或股指期货练习得越多，你就越能在其他市场参与者之前发现图表形态。


    努力练习阅读图表的右侧，而不是左侧。你可能是这个星球上最好的左侧图表阅读者，但这不会让你赚到一分钱。图表的右侧才是所有财富等待你的地方。


    ## 17. 富有的交易员在市场中有“优势”


    在电影《城市滑头》（*City Slickers*）中，杰克·帕兰斯（Jack Palance）饰演的角色“卷毛”（Curly）告诉比利·克里斯托（Billy
    Crystal）饰演的“米奇”（Mitch），生活的秘诀在于“一件事”。当米奇问那是什么时，卷毛说：“这你得自己弄清楚。”每个富有的交易员都为自己的账户发现了那“一件事”是什么。这就是他们在市场中的“优势”。在市场中没有某种客观的优势，你纯粹是在猜测，而靠猜测做交易不是一项长期策略。它偶尔会奏效，也能在短期内有效，但如果你想让交易成为一项终身事业，你必须培养自己的优势。


    优势到底是什么？它是指任何你认为能让你有超过50%的可能性去判断价格未来方向的东西。如果你问100个富有的交易员他们的优势是什么，你会得到100个不同的答案。大多数交易员都在不断寻找那个“圣杯”交易策略或系统。虽然“圣杯”交易系统确实存在，但它不是一种“一刀切”的市场方法。它是在你经过一段时间后发现对你有效的东西，能够让你每天都有超过50%的机会进入一笔盈利的交易。


    一个交易员的优势可能来自于结合支撑位和阻力位，这些位置由图表上的前期高点和低点表示。另一个交易员可能通过将“威廉%R”（`Williams %R`）指标与周线或月线价格图上绘制的趋势线相结合，在市场中占得先机。关键在于，你的“优势”对你来说是独一无二的，因为你必须能够识别出最佳环境，将你的策略应用于市场——这对每个人来说都是独特的。


    有些交易员在高波动时期表现出色，例如盈利惊喜在几小时内将市场上下撕扯。另一些交易员则在缓慢而稳定的大盘指数`ETF`中表现出色，其每日的正常波动范围只有几个点。你必须找到你的“那件事”，并在你的风险承受范围内，尽可能地利用其来放大交易规模。


    没有优势，你注定会失败，只能成为一个靠猜测的交易员。


    ## 18. 富有的交易员基于风险，而非整数来确定头寸规模'
  raw: 'There are several excellent trading books that aren’t actually about trading
    at all but nevertheless will give you insight into what drives human behavior
    in a variety of situations. One my favorites is *The Wisdom of Crowds*, by James
    Surowiecki (Doubleday, 2004). Another is *The Art of Strategy*, by Avinash Dixit
    and Barry Nalebuff (W. W. Norton & Company, 2008). And finally, a third book I
    recommend is *Markets, Mobs, and Mayhem*, by Robert Menschel (Wiley, 2002).


    Books that address the basic premises of human nature will give you a new perspective
    on how supply and demand in any market move prices—and price is king. Some traders
    even insist that price, and only price, is what matters. News, technical analysis,
    and depth of market screens only serve to distract us from the only thing that
    truly matters to the markets: price action.


    Whether you believe that or not, educate yourself on crowd mentality and you’ll
    better understand how to profit from the madness of the markets. It’s the secret
    trick that wealthy traders use to drain the accounts of less experienced traders
    by taking the other side of their trades.


    15\. Wealthy traders see themselves as market makers


    They may not be “market makers” in the strictest sense of the term, but wealthy
    traders do one thing well that all official market makers do: they provide liquidity
    to the markets. In other words, they find ways to profit in the market by providing
    trading volume with their positions. This is a nuanced point and a bit confusing
    to understand, so let me use a few hypothetical examples to illustrate this point.


    Let’s say goat milk is the hot commodity at the grocery store. The local financial
    news network has stories from the grocery store about how goat milk is the most
    popular item being sold, and food blogs are all talking about the latest price
    movement in goat milk. You decide you want to be a part of the goat milk craze
    and head down to your local store. You make your way to the back of the store,
    open the refrigerator door, and grab two gallons of goat milk. You return to the
    front of the store and get in line with everyone else who has their carts loaded
    with goat milk, signifying that you are a newbie trader along with everyone else
    in line.


    The wealthy trader hears about the goat milk craze and also takes a trip to the
    supermarket. But instead of heading to the refrigerator to buy goat’s milk along
    with everyone else, he goes straight to the checkout line and taps the store employee
    on the shoulder. “Go ahead and take a break, I’ll handle the register for a while.”
    The wealthy trader then steps in to facilitate the goat’s milk transactions and
    makes a market in goat’s milk, profiting each time.


    Do you see the difference? How about one more example.


    In the United States, every year around the winter holiday season, there is a
    hot toy that every child wants. Parents go to extreme lengths to find and purchase
    the toy for their children, paying double or triple the normal price just to get
    the bright, shiny object for their loved ones. Not the wealthy trader.


    The wealthy trader will go find two or three of the popular toys and negotiate
    with the seller to get the best price for the item. Instead of giving the toy
    to her children, she proceeds straight to eBay and lists the toy with a 50 percent
    markup from what she paid for it. She makes a market for that toy and provides
    liquidity to the parents desperate to buy it.


    Wealthy traders have only a very slightly different outlook when it comes to trading,
    yet their unique perspective makes a huge difference in how they approach the
    markets and look for money-making trades.


    Think like a market maker, not just a trader—wealthy traders do and so should
    you.


    16\. Wealthy traders practice reading the right side of a chart, not the left


    It’s easy to read the left side of the chart. Even a brand-new trader can spot
    the “head-and-shoulders” candlestick pattern that happened last month or last
    year. We can all quickly pick out the “bear flag” or “bull pennant” pattern long
    after it has occurred.


    The trick is seeing those patterns as they are happening. The money is made trading
    that pattern while it is still developing, not two weeks later. Positioning yourself
    to profit from chart patterns is only possible if you become an expert at reading
    the right side of a chart—the part that isn’t there yet.


    I’m not saying that wealthy traders can predict the future. On the contrary, they
    see the same exact data you and I see. The difference is that wealthy traders
    are able to visualize the next bar and the next after that—before it prints on
    the chart. They see the chart patterns as they are forming and are able to position
    themselves in a trade ahead of a pattern’s completion, and make money before everyone
    else catches on and dives into the markets.


    Being able to spot chart patterns as they are developing in real time takes experience.
    You’ve got to watch charts develop for months, sometimes years, in the same security
    until you become familiar with the behavior of that security and can tell when
    a pattern is forming. You can achieve this level of acumen by visualizing where
    the next bar will print before it actually appears on the chart. Surprisingly,
    the more you do it for a specific stock, ETF, or index future, the better you
    will become at spotting chart patterns before your fellow market participants.


    Make an effort to practice reading the right side of the chart, not the left.
    You can be the best left-side chart reader on the planet and it won’t make you
    a penny. The right side of the chart is where all the money is waiting for you.


    17\. Wealthy traders have an “edge” in the market


    In the movie *City Slickers*, Jack Palance’s character, Curly, tells Billy Crystal’s
    character, Mitch, that the secret to life is “one thing.” When Mitch asks what
    it is, Curly says, “That’s what you gotta figure out.” Every wealthy trader has
    discovered what that “one thing” is for their own account. It’s their “edge” in
    the markets. Without some sort of objective edge in the market, you are simply
    guessing, and guessing on your trades is not a long-term strategy. It may work
    occasionally and for short periods of time, but if you want to make trading a
    lifelong career, you must develop an edge.


    What exactly is an edge? It is anything that you feel gives you a greater-than-50-percent
    chance of determining the future direction of price. If you ask 100 wealthy traders
    what their edge is, you will get 100 different answers. Most traders are constantly
    searching for the one “Holy Grail” trading strategy or system. And while the “Holy
    Grail” trading system does exist, it’s not a one-size-fits-all approach to the
    markets. It’s whatever you find works for you over time to give you a greater-than-50-percent
    chance of entering a winning trade every day.


    One trader’s edge may come from combining areas of support and resistance, represented
    by previous highs and lows on a chart. Another trader might get a leg up in the
    markets by combining the “Williams %R” indicator with trend lines drawn on weekly
    or monthly price charts. The point is, your “edge” is going to be unique to you
    because you have to be able to spot the best environment to apply your strategy
    to the market—and that’s unique to everyone.


    Some traders thrive in periods of high volatility, where earnings surprises rip
    a market up and down within a matter of hours. Other traders excel in slow and
    steady large-cap index ETFs, where the normal range per day is a few points. You
    have to find your “one thing” and capitalize on it with as much size as you can
    within your risk tolerance.


    Without an edge, you are doomed to failure as a guessing trader.


    18\. Wealthy traders determine position size based on risk, not round numbers'
  trans: '

    # 交易智慧的启示：从经典著作到市场心理学


    有几本非常优秀的交易书籍，虽然实际上根本不是关于交易的，但会给你带来深刻的洞察，了解在各种情境下是什么驱动着人类行为。我最喜欢的一本是詹姆斯·苏罗维茨基（James
    Surowiecki）的《群体的智慧》（*The Wisdom of Crowds*）（Doubleday，2004）。另一本是阿维纳什·迪克西特（Avinash
    Dixit）和巴里·奈尔伯夫（Barry Nalebuff）的《策略的艺术》（*The Art of Strategy*）（W. W. Norton & Company，2008）。最后，我推荐的第三本书是罗伯特·门舍尔（Robert
    Menschel）的《市场、暴民与疯狂》（*Markets, Mobs, and Mayhem*）（Wiley，2002）。


    涉及人类本性基本前提的书籍，会为你提供一个全新的视角，让你理解任何市场中的供需如何推动价格变动——而价格才是王道。有些交易员甚至坚持认为，价格，也只有价格才是最重要的。新闻、技术分析和市场深度屏幕只会分散我们对市场真正唯一重要的事物的注意力：价格行为。


    无论你是否相信这一点，学习群体心理学的知识，你将能更好地理解如何从市场的疯狂中获利。这是富有的交易员用来从经验不足的交易员那里榨干资金的秘密技巧——他们通过站在交易对手方来实现。


    ## 15. 富有的交易员将自己视为做市商


    从严格意义上讲，他们可能不是“做市商”，但富有的交易员擅长做一件所有官方做市商都会做的事情：他们为市场提供流动性。换句话说，他们通过用自己的头寸提供交易量来寻找在市场中获利的方法。这是一个微妙的观点，理解起来有点令人困惑，所以让我用几个假设性的例子来说明这一点。


    假设羊奶是杂货店的热门商品。当地财经新闻网络正在报道杂货店里羊奶是最畅销的产品，食品博客也都在谈论羊奶的最新价格走势。你决定要参与这场羊奶热潮，于是前往当地的商店。你走到商店后面，打开冰箱门，拿了两加仑羊奶。你回到商店前面，和其他所有购物车里装满羊奶的人一起排队，这表明你和其他排队的人一样，都是一个新手交易员。


    富有的交易员听说了羊奶热潮，也去了一趟超市。但他没有像其他人一样去冰箱那里购买羊奶，而是直接走到收银台，拍了拍店员的肩膀说：“去休息一下吧，我来替你看一会儿收银机。”接着，富有的交易员接手促成羊奶的交易，为羊奶做市，并从中获利。


    你看出区别了吗？再来一个例子。


    在美国，每年冬季假期前后，总会有一款每个孩子都想要的热门玩具。家长们不惜一切代价为孩子寻找并购买这款玩具，支付正常价格的两倍甚至三倍，只为给他们所爱的人买到那个闪亮的新东西。富有的交易员可不会这样。


    富有的交易员会去找两三个热门玩具，并与卖家协商以获得最优惠的价格。她不会把玩具送给自己的孩子，而是直接上架到`eBay`，以高于进价 50%的价格挂牌。她为那个玩具创造了一个市场，并为那些急于购买的家长们提供了流动性。


    富有的交易员在交易时只有非常细微的视角差异，然而正是他们独特的视角，在如何接近市场以及寻找盈利交易方面产生了巨大的影响。


    像做市商一样思考，而不仅仅是一个交易员——富有的交易员就是这样做的，你也应该如此。


    ## 16. 富有的交易员练习阅读图表的右侧，而非左侧


    阅读图表的左侧很容易。即使是一个全新的交易员也能识别出上个月或去年发生的“头肩顶”蜡烛图形态。我们都能在“熊旗”或“牛三角”形态发生很久之后迅速识破它们。


    诀窍在于在这些形态正在发生时就看出来。盈利来自于在形态仍在发展时就进行交易，而不是两周后。要想通过图表形态来定位自己以获利，只有当你成为阅读图表右侧——即尚未出现的那部分——的专家时才有可能。


    我并不是说富有的交易员能预测未来。恰恰相反，他们看到的数据和你我看到的完全一样。不同之处在于，富有的交易员能够在下一根 K 线在图表上打印出来之前，就将其可视化，并看到更后面的
    K 线。他们在图表形态正在形成时就识别出来，并能够在形态完成之前就进场交易，在其他人意识到并涌入市场之前就赚到钱。


    能够实时识别正在发展的图表形态需要经验。你必须花费数月，有时甚至是数年的时间，观察同一证券的图表发展，直到你熟悉了该证券的行为，并能判断出形态何时正在形成。你可以通过在下一根
    K 线实际出现在图表之前，就想象它将在哪里打印出来，来达到这种熟练程度。令人惊讶的是，你对某只特定股票、`ETF`或股指期货练习得越多，你就越能在其他市场参与者之前发现图表形态。


    努力练习阅读图表的右侧，而不是左侧。你可能是这个星球上最好的左侧图表阅读者，但这不会让你赚到一分钱。图表的右侧才是所有财富等待你的地方。


    ## 17. 富有的交易员在市场中有“优势”


    在电影《城市滑头》（*City Slickers*）中，杰克·帕兰斯（Jack Palance）饰演的角色“卷毛”（Curly）告诉比利·克里斯托（Billy
    Crystal）饰演的“米奇”（Mitch），生活的秘诀在于“一件事”。当米奇问那是什么时，卷毛说：“这你得自己弄清楚。”每个富有的交易员都为自己的账户发现了那“一件事”是什么。这就是他们在市场中的“优势”。在市场中没有某种客观的优势，你纯粹是在猜测，而靠猜测做交易不是一项长期策略。它偶尔会奏效，也能在短期内有效，但如果你想让交易成为一项终身事业，你必须培养自己的优势。


    优势到底是什么？它是指任何你认为能让你有超过 50%的可能性去判断价格未来方向的东西。如果你问 100 个富有的交易员他们的优势是什么，你会得到 100 个不同的答案。大多数交易员都在不断寻找那个“圣杯”交易策略或系统。虽然“圣杯”交易系统确实存在，但它不是一种“一刀切”的市场方法。它是在你经过一段时间后发现对你有效的东西，能够让你每天都有超过
    50%的机会进入一笔盈利的交易。


    一个交易员的优势可能来自于结合支撑位和阻力位，这些位置由图表上的前期高点和低点表示。另一个交易员可能通过将“威廉%R”（`Williams %R`）指标与周线或月线价格图上绘制的趋势线相结合，在市场中占得先机。关键在于，你的“优势”对你来说是独一无二的，因为你必须能够识别出最佳环境，将你的策略应用于市场——这对每个人来说都是独特的。


    有些交易员在高波动时期表现出色，例如盈利惊喜在几小时内将市场上下撕扯。另一些交易员则在缓慢而稳定的大盘指数`ETF`中表现出色，其每日的正常波动范围只有几个点。你必须找到你的“那件事”，并在你的风险承受范围内，尽可能地利用其来放大交易规模。


    没有优势，你注定会失败，只能成为一个靠猜测的交易员。


    ## 18. 富有的交易员基于风险，而非整数来确定头寸规模

    '
- fmt: '我曾经问一位非常富有的交易员，他一次买入多少股股票。他直视着我的眼睛说：“这是我听过的最愚蠢的问题。”看到我脸上的表情后，他笑着解释了原因。他的意思是，关于仓位大小的问题就像问品酒师他们喜欢哪种酒一样。他们会告诉你，这完全取决于晚餐吃什么。这个问题本身不完整，没有更多信息就无法回答。


    你交易的是每股650美元的谷歌股票，还是每股13美元的迪恩食品股票？只有在了解了这些信息后，富有的交易员才能告诉你他们的仓位大小。这是因为他们的仓位大小完全基于其风险管理参数。他们首先决定在交易中愿意承受多少风险以及交易标的的波动性，然后反向推导出他们将要买入或卖出的股票数量。


    高价股票的平均交易区间很可能远大于低价股票。因此，高价股票的仓位大小可能会低得多，因为交易者将不得不忍受那只股票更多的“震荡”。一千股谷歌的波动性很可能与一千股迪恩食品截然不同。当然，你可以为你的谷歌交易设置0.25美元的止损，但除非交易立即朝对你有利的方向发展且一去不回头，否则你很可能会在交易有足够时间运转之前就被止损出局。谷歌的波动性实在太大，无法常规设置0.25美元的止损。


    富有的交易员不会在每次交易时都自动交易500股。他们会计算愿意承担的风险金额和标的的平均交易区间，然后根据这两个因素来确定仓位大小。一个漂亮的整数理论上听起来不错，但它可能让你承担远超自身承受能力的风险，或者低于你应该承担的风险，从而限制了你的利润。


    经验丰富的交易员可能有更复杂的公式，但这里有一个简单的起始公式可用于仓位大小计算：用你愿意承担风险的账户最大百分比，除以能给交易留出运转空间的止损。


    让我们用一个漂亮的整数来举例。如果你的交易账户有10,000美元，并且你在任何单笔交易中承担的最大风险是账户的2%，那么你的最大亏损就是200美元。如果你的入场价格是10美元，止损价是9美元，那么你每股承担的风险是1美元。现在，使用仓位大小计算公式，我们可以购买的股票数量等于我们的最大亏损（200美元）除以我们的止损大小（1美元）。因此，你可以购买200股。


    如果股票的波动性较小，并且你觉得可以将止损收紧到0.5美元而不会被提前洗出局，那么你可以购买400股（200美元除以0.5美元）。无论哪种情况，如果股票触及我们的止损位，我们必须退出交易，我们就知道不会损失超过整个交易账户的2%。


    对于拥有复杂策略的经验丰富的交易员来说，这可能过于简化，但对于几乎所有零售交易员而言，这是一种客观的方法，可以确保你在任何单笔交易中都不会承担过大风险。富有的交易员这样做，你也应该这样做。


    你可以在`http://oak.ucc.nau.edu/del/stockcalcs/sizer.aspx`找到一个在线仓位大小计算器。


    ## 19. 富有的交易员买入强势市场，卖出弱势市场


    许多交易员执迷于寻找市场的转折点。你会听到交易员在推特和论坛上不断谈论“交易反转”以及寻找“顶部”和“底部”。然而，请打印出任何股票、ETF、指数或期货合约的图表，拿一支铅笔。请配合我做这个小实验。在主要方向（上涨或下跌）反转点的前后各画一条垂直线。现在，这张图表中有多少是由反转构成的，又有多少是单一方向的趋势？我敢打赌，图表的绝大部分——至少80%——都位于反转之间的区域，也就是市场沿单一方向趋势运行的区域。那么，为什么大多数交易员试图在仅占图表20%的区域赚钱呢？难道你不想尝试交易那占图表80%、呈单一方向趋势的区域吗？


    富有的交易员早就放弃了寻找顶部和底部，转而专注于构成趋势的那80%的图表区域。如果你发现给定图表中超过20%的部分由反转构成，或者你甚至无法决定在哪里画你的垂直线，那么你可能根本不应该交易那个标的。找一个更容易交易的图表。


    富有的交易员坚持买入强势的上升趋势，卖出强势的下降趋势。如果你作为一名交易员正在为赚钱而苦苦挣扎，我建议你做一件事：买入52周新高，卖空52周新低。我可以向你保证，这些交易的成功概率可能远高于你现在所做的交易。停止在创新高时寻找反转，只需顺应趋势交易（当然，要根据你的风险承受能力使用正确的仓位大小），直到趋势改变。


    如果富有的交易员正在买入强势股票、卖出弱势股票，那你为什么不这样做呢？


    ## 20. 富有的交易员交易市场反应，而非新闻


    你一次又一次地看到这种情况。一家公司财报大幅超出预期，股东们却因股价突然下跌而“受赏”。也许好消息还不够好。也许股价在预期好消息时已经大幅上涨，现在交易员正在获利了结。无论原因是什么，在市场向你展示其意愿之前，预测任何消息对股票的实际反应都是极其困难的。


    富有的交易员知道，试图根据影响标的的新闻来预测其走势是极其困难的。然而，在初始波动发生后，交易市场对该新闻的反应，结合简单的技术分析，是一种有效的策略。


    此外，对任何新闻的初始反应几乎总是一种过度反应，一旦市场回调，这种力量就会减弱。这可能是富有的交易员在短期交易中寻找反转、顶部或底部的少数时刻之一。


    ## 结论


    希望富有的交易员的这些习惯中，至少有一两个能引起你的共鸣，并且你会将它们加入自己的交易规则中。让所有这些都成为你自己的习惯，你就更有可能加入精英交易员的行列，按照自己的方式在市场中过上体面的生活。


    这些只是富有的交易员遵循的少数几个习惯。我相信你还能想到一些可以添加到这个列表中的习惯。遵循这些习惯并将其内化为己用的交易员，为自己创造了最大的致富机会。忽视它们，你的成功之路将会漫长得多，而你的交易账户价值也会小得多。


