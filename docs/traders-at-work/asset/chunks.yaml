  raw: 'I once asked a very wealthy trader how many shares of stock he bought at a
    time. He looked me straight in the eyes and said, “That’s the dumbest question
    I’ve ever heard.” After he saw the look on my face, he laughed and explained why.
    What he meant was that the question about position sizing was like asking wine
    connoisseurs what kind of wine they like. They will tell you that it depends entirely
    on what is being served for dinner. The question is incomplete and cannot be answered
    without more information.


    Are you trading Google stock at $650 per share or Dean Foods stock at $13? Only
    then can wealthy traders tell you what their position size would be. This is because
    their position sizing is based entirely on their risk management parameters. They
    decide how much they are willing to risk in the trade and the volatility of the
    instrument, and then work their way backward to come up with the number of shares
    they will buy or sell.


    The average trading range for higher-priced stocks is likely to be far larger
    than it is for a lower-priced stock. Therefore, the position size for a higher-priced
    stock will likely be much lower because the trader will have to endure more “wobble”
    in that stock. One thousand shares of Google is likely to have a much different
    volatility than one thousand shares of Dean Foods. Of course, you could place
    a $0.25 stop loss on your Google trade, but unless the trade immediately goes
    in your favor and never looks back, you’ll likely be stopped out every time before
    the trade has time to work. Google is simply too volatile a stock to have a $0.25
    stop on a regular basis.


    Instead of automatically trading 500 shares every time they place a trade, wealthy
    traders calculate the amount of risk they are willing to take on and the average
    trading range of the instrument, and then they determine the position size based
    on those two factors. A nice round number sounds great in theory, but it can cause
    you to take on much more risk than you are able to absorb, or less than you should,
    thereby limiting your profits.


    Experienced traders will likely have more complex formulas, but here’s a simple
    starting formula you can use for position sizing: take the maximum percentage
    of your account that you are willing to risk, and divide it by the stop loss that
    will give the trade time to work.


    Let’s use nice, even numbers as an example. If your trading account is $10,000
    and you are risking a maximum of 2 percent of your account on any single trade,
    your maximum loss would be $200\. If your entry price is $10 and your stop loss
    is $9, you are risking $1 per share. Now, to use the position sizing formula,
    the number of shares we can purchase is equal to our maximum loss ($200) divided
    by our stop loss size ($1). You can therefore purchase 200 shares.


    If the stock is less volatile and you feel you can tighten the stop to $0.50 without
    getting washed out before the trade has time to work, you could purchase 400 shares
    ($200 divided by $0.50). In either case, if the stock reaches our stop loss and
    we have to exit the trade, we know we’re not going to lose more than 2 percent
    of our total trading account.


    This may be an over-simplification for experienced traders with complex strategies,
    but for nearly all retail traders, it is an objective way to ensure that you are
    never taking on too much risk in any single trade. Wealthy traders do it and so
    should you.


    You can find an online position-sizing calculator at [http://oak.ucc.nau.edu/del/stockcalcs/sizer.aspx](http://oak.ucc.nau.edu/del/stockcalcs/sizer.aspx).


    19\. Wealthy traders buy strong markets and sell weak markets


    Many traders have an obsession with finding turning points in the market. You’ll
    hear traders on Twitter and on message boards constantly talking about “trading
    reversals” and finding “tops” and “bottoms.” Yet print out a chart of any stock,
    ETF, index, or futures contract and grab a pencil. Humor me with this little experiment.
    Draw a vertical line just before and just after major reversals of direction,
    either up or down. Now, how much of that chart is made up of reversals and how
    much of it is made up of a one-directional trend? I’ll bet that the majority of
    the chart—at least 80 percent—is in the area between the reversals and where the
    market is trending in one direction. So why do most traders try to make money
    in 20 percent of the chart? Wouldn’t you rather try trading in the 80 percent
    of the chart that is trending in one direction?


    Wealthy traders stopped trying to pick tops and bottoms long ago and instead focus
    on the 80 percent of the chart that make up the trends. If you find that more
    than 20 percent of a given chart consists of reversals or you can’t even decide
    where to draw your vertical lines, you probably shouldn’t be trading that instrument.
    Look for an easier chart to trade.


    Wealthy traders stick to buying strong uptrends and selling strong downtrends.
    If you’re struggling to make money as a trader, I’d suggest doing one thing: buy
    52-week highs and sell short 52-week lows. I can assure you that those are probably
    much higher-probability trades than you are taking now. Stop looking for reversals
    at new highs and just trade along with the trend (using your proper position sizing
    according to your risk tolerance, of course) until that trend changes.


    If wealthy traders are buying strong stocks and selling weak ones, why aren’t
    you?


    20\. Wealthy traders play the reaction, not the news


    You’ve seen it time and time again. A company beats earnings estimates heartily
    and shareholders are rewarded by a sudden move to the downside. Perhaps the good
    news wasn’t good enough. Perhaps it had a nice run-up in earnings in anticipation
    of the good news and now traders are taking profits. Whatever the reason, it is
    extremely difficult to predict what the actual reaction to any news will be on
    a stock until the market shows you what it wants to do.


    Wealthy traders know that trying to predict movement of any instrument based on
    the news affecting it is exceedingly difficult. However, trading the reaction
    to that news after the initial move is made is an effective strategy when combined
    with simple technical analysis.


    Also, the initial reaction to any news is almost always an overreaction that fades
    in strength once the market snaps back. This may be one of the only times wealthy
    traders hunt for that turn, top, or bottom on a short-term trade.


    Conclusion


    Hopefully at least one or two of these habits of wealthy traders will resonate
    with you and you’ll add them to your own trading rules. Make all of them habits
    of your own and you are much more likely to join the ranks of elite traders who
    make a nice living on their own terms in the market.


    These are just a few of the habits that wealthy traders follow. I’m sure you can
    think of a few to add to this list. Traders who follow these and make them habits
    of their own give themselves the best chance of becoming wealthy themselves. Disregard
    them, and your path to success will be much longer and the value of your trading
    account will be much smaller.


