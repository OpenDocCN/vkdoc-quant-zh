- fmt: '**Bourquin:** So your theory is that if the market gaps up or gaps down from
    one day to the next, you’ll take the opposite side of the move in hopes that it
    closes that gap?


    **Berger:** Exactly. To some extent, it’s a mean-reversion trade, if you will.


    **Bourquin:** Right. Which slow stochastics do you use?


    **Berger:** It’s actually just the basic setup: 8, 20, 10, and 10. So, it’s a
    slow moving average.


    **Bourquin:** And what candlesticks are you looking for either on the close or
    on the open to indicate that, in confluence with those stochastics, the market
    may fill its gap?


    **Berger:** The candlestick will always be something to look for at the open or
    within, say, the first thirty minutes of the day, and we’re mostly looking for
    extreme candles. Most will have very long tails and small bodies, for example,
    or very big bodies that fully engulf a previous candlestick. We’re looking for
    something that gives a very clear signal about reversion of the trend, and we
    can then go in and place a trade in the opposite direction.


    **Bourquin:** You mentioned how you scale out upon a half-gap fill, but how do
    you decide how much position size to put on initially?


    **Berger:** I consider the day and seasonal factors when determining position
    size, and the day is actually more important. For example, I will size a position
    much larger on a Tuesday, Wednesday, or Thursday than I would on a Monday or Friday
    simply because of the number of false signals I tend to get on Mondays and Fridays.


    Regarding seasonality, I trade much less size around any US or European public
    holidays, and I trade less size in August, December, and January due to lower
    volume. The rest of the time, it’s really the type of market environment that
    dictates size. For example, it is not the time to trade big size when there are
    central bank announcements. In fact, that’s likely not the time to trade at all.
    In essence, I am looking to trade size only when there is tremendous volume and
    few planned economic announcements in view.


    **Bourquin:** Your biggest trades are midweek. What would be a typical position
    size on a Tuesday, Wednesday, or Thursday, in terms of number of contracts?


    **Berger:** Well, I do this for funds, so quite frankly, it depends on the size
    of the fund, but it could be as little as ten contracts and as high as two hundred
    contracts.


    **Bourquin:** You’ve explained your method for locking in profits when the gap
    fills halfway, but how about the second half of the position? When would you take
    that off?


    **Berger:** That’s a very important point. Using our S&P example from before,
    when you get to that closing level from the previous day (1200), I would more
    than likely close the entire position. However, if it looks like there is a trend
    in place that could potentially move the market much further—maybe to 1220 in
    our example—I would keep about a quarter of the position open in hopes of capitalizing
    on that move.


    One way I determine if such a trend could be in place is by looking at the Advance/Decline
    (A/D) line. If the A/D line has staged a major turnaround, that’s a strong signal.
    Also, the strength of the candlestick reversal: a very long tail followed by a
    very strong candle to the upside, for example, is an extremely favorable signal
    that a stronger and more sustainable trend is at hand for that day.


    **Bourquin:** What are the time frames you are using to measure those intraday
    trends?


    **Berger:** I’m looking at a five-minute chart, a fifteen-minute chart, and a
    400-tick chart.


    **Bourquin:** Different traders tend to favor all kinds of different tick charts,
    from 612 to 340, and your preference is 400. Why do you prefer the 400-tick chart?


    **Berger:** Honestly, that just came through trial and error over the years, and
    we’ve had to change it as the amount of trades per tick changed, but I think 400
    gives you enough to be very fast without being too quick.


    **Bourquin:** Let’s jump over to the swing trading side of things and how you
    find those types of trades. If your intraday trades are based on gaps in the S&P
    500, on what factors do you base your swing trades?


    **Berger:** Swing trades depend on the underlying asset, first of all. So, for
    example, let’s consider a basic underlying: a mid- to large-cap equity with a
    decent beta. In other words, an equity that has enough movement and for which
    swing trades are mostly based on breakouts and major reversals. So, when trading
    breakouts, we would just use basic laterals or any sort of trend lines or pennants
    coupled with momentum oscillators, and this is mostly done using daily candlestick
    charts.


    We also use a lot of Fibonacci retracements, and we really try to focus on 50
    percent and 61.8 percent, specifically 61.8 percent, because it has been a very
    good indicator for swing trades. In terms of profit targets, we tend to go as
    high as a 23.6 percent Fibonacci extension.


    **Bourquin:** I don’t think traders rely enough on extensions to help them when
    setting profit targets. We didn’t talk about stop losses on the intraday trade.
    How do you set the stop loss on your intraday trades?


    **Berger:** Well, going back to our gap trade example, I can only emphasize that
    as a very high-probability trade. I have friends whose funds are running entirely
    on just that strategy. I think you can make a lot of money trading that strategy,
    and extending beyond that to where you’re not just trading the close of the gap
    because there are a lot of trades around it. For example, if you get a trending
    day like we mentioned before.


    With the stop loss, typically I tend to put it literally just a couple of ticks
    below the major reversal point that we hopefully have gotten that day as a buy
    or sell trigger. Sometimes you get a fake out and the market will go back below
    that before going higher, but then again, on a five-minute chart, we will have
    another chance to re-enter that position.


    **Bourquin:** Right, so if you do get stopped out because the market comes down
    and grabs your stop, you’ll get back in again as long as everything is still telling
    you that it’s probably going to fill the gap?


    **Berger:** As long as we have a confirmation candle that is just as strong as
    the one we had initially, yes.


    **Bourquin:** Going back to the swing trade on a breakout, what time frame chart
    are you watching for that setup?


    **Berger:** On swing trades, it’s mostly a daily chart. I find that a daily chart
    gives me a lot more certainty than an intraday chart, plus it gives a lot fewer
    signals. I want to wait until there has been a clear daily confirmation—like a
    candle coupled with a momentum oscillator or stochastics—and I wait for a daily
    signal most of the time.


    **Bourquin:** And you said the momentum oscillator you use in that case is the
    slow stochastics?


    **Berger:** Yes. I typically use slow stochastics.


    My entire philosophy on swing trades is based on the concept of “the simpler,
    the better.” I have traded for a long time and even worked at an institutional
    desk and so forth. I have met a lot of people who have very sophisticated models,
    and they work. I have just found that keeping it simple and sticking to profit
    and stop targets is just as profitable and sometimes easier to follow.


    **Bourquin:** When you are looking for an underlying to break out on a daily chart,
    do you want to see an entire candle close above, say, a channel or a level where
    it’s been consolidating before you will take the trade? So, for example, you might
    see the breakout signal one day, and then the next day you will take the trade?


    **Berger:** I’ll take the trade at the end of the day, within fifteen minutes
    to close. That’s generally our window for a swing trade.


    There are rare cases when, even if price hasn’t really made that move but there
    is a very strong trend in—say, the oscillators and Fibonacci support lines—I will
    take the trade and just keep a tight stop.'
