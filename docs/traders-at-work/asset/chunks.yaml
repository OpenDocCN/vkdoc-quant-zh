- fmt: '**Bourquin:** Do you still worry about it, Don? We still don’t know what happened
    at MF Global. They are still trying to figure it out. A few months later, Peregrine
    Financial Group [PFG] went out of business, and it seems as though the money is
    not there. Who knows what’s going to happen with those investors? Are you concerned
    that it’s going to happen again? I know people that moved from MF Global to PFG,
    and it did happen to them again. It was incredible.


    **Miller:** I have substantially reduced my exposure on the futures side. I now
    have enough capital to provide the necessary backing for the transactions that
    I engage in. The money in a futures account should be safer than the money in
    a bank account.


    The analogy I give everybody is this: take a group of six people who are all holding
    hands in a circle, and put a safe right in the middle. Ask each of these six people
    if they would be willing to store their money in that safe. They look around and
    see that a bunch of protections are in place, so they say, “Of course we would.”
    What happened in the cases of MF Global and PFG was the safe was broken into,
    ransacked, and burned beyond recognition without anyone ever realizing it.


    That’s how ridiculous this whole scenario was. There were so many protections
    and regulatory structures, rules, and laws in place to protect us—well beyond
    even having money in a bank that will pay you a small amount of insurance to cover
    losses up to a certain amount. What happened is everybody fell down. The regulators
    fell down, too. They didn’t catch this in time, and when it finally did go down,
    everybody with a vested interest started pointing fingers at everybody else. The
    CFTC says, “Not me.” MF Global says, “Not me.” It’s like a Family Circus cartoon.


    What we’ve done over the past year is work very, very hard to hold people accountable,
    and that’s one of the reasons that bond prices have floated up the way that they
    did. It is also one of the reasons that we got our money back sooner rather than
    later.


    But I am concerned, yes. Will I ever have as much money as I had in the futures
    market? No. Will it stop me from engaging in business? Of course not. What do
    they say? “Fool me once, shame on you. Fool me twice, shame on me.”


    As I wrote in one of my blog posts recently, I don’t intend on being Dick Van
    Dyke, the guy who trips over the ottoman every time. I plan on being the guy that
    walks around the ottoman next time.


    # CHAPTER


    # Charles German


    *While his career began more than twenty years ago on the floor of the Chicago
    Board of Trade,* `Charles German` *explains that his adoption of a trend-following
    strategy in 2005 was what ultimately led him to reach new heights in trading.
    He now uses an automated trading system* *that combs the markets for setups, places
    entry and stop orders, and executes with little or no human interaction required.*


    *While fully automated trading may be a dream for many traders, it was only through
    thousands of hours of meticulous backtesting and some costly, difficult lessons
    learned along the way that German made it a reality. By requiring that his strategy
    work in all markets and market conditions, he eliminates the need to chase trades
    or the flavor-of-the-day setup or strategy. German is an independent trader* *and
    trading coach at California-based [CharlesGermanTrading.com](http://CharlesGermanTrading.com).*


    **Tim Bourquin:** How do you classify yourself? Are you a swing trader or a day
    trader? How do you classify the type of trading you engage in?


    **Charles German:** I would definitely be classified as a trend follower.


    **Bourquin:** Being a trend follower can mean somewhat different things to different
    people. What does it mean to you?


    **German:** Trend following to me means basically using a systematic approach
    to trade a basket of markets and attempt to catch any meaningful trends that develop
    in any of the markets I trade.


    **Bourquin:** Are you mostly following daily charts?


    **German:** Yes. I do more of a mid- to long-term following program. For day traders,
    my time frames would seem more like light years, but usually my trades last from
    five days to three or four months.


