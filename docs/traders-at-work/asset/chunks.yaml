    I was growing up. Not that he was a trader by any means, but he followed the markets.
    Then, when I was living in San Francisco, I applied to a bunch of different brokerage
    firms to become a stockbroker because I thought that would be a great entrée into
    the markets. Of course, as you can imagine, a twenty-one-year-old female, “fresh
    out of school,” got turned down by all of them, so thank goodness for that. I
    never became a stockbroker.


    I did get a job outside of the financial industry, and the office was right across
    the street from the Pacific Coast Stock Exchange, so I could see in the morning
    the people streaming in and out of this old classical building, wearing their
    colorful trading coats and their ID badges. I befriended one of them, and that’s
    ultimately how I got into the business.


    **Bourquin:** Was trading in the pits a whole lot different from how you trade
    on a screen now?


    **Raschke:** In some ways, it was. Obviously, you have a different dynamic in
    terms of watching the order flow physically in front of you, so that’s something
    that’s very different. You see the traders buying and selling, so you get a feel
    for the momentum of the markets. Once upon a time, there was an edge in the pits,
    especially doing options arbitrage, because you could use that sense of momentum
    as an edge. But that doesn’t exist anymore. There’s no edge to options at all
    because the market is so efficient now with electronic trading. But what really
    has remained the same for me was the approach of taking one day at a time and
    developing a routine for my trading.


    In my case, my day starts 6:30 or 7:00 a.m. eastern, when I begin looking at the
    overall markets. I’m trying to always fit my views into a larger “macro” context,
    looking to see where we are in the one- to two-week cycle that the market always
    seems to repeat.


    When I was trading equity options, it was a little bit more of a strategic game
    than one would be doing, for example, in a bond pit or an S&P pit, where you’re
    “flipping the paper” and buying and selling for a quick profit on a move. With
    equity options, you definitely had to be very strategic in your positioning. So,
    it wasn’t like we were making money buying an option and flipping it out a quarter
    point higher. It was constantly looking at the option Greeks and thinking, “The
    Gamma number is this and Delta is this. If I’m long calls and long puts, that’s
    a positive Gamma trade, and now I need to trade the stock actively against that
    position in order to make money.” So, you were forced to trade the stock back
    and forth against your position to pay for the cost of carrying the option position.


    There are so many moving parts with profitable option trading. It is much more
    analogous to playing bridge or chess, where you have to think strategically a
    couple jumps ahead. Whereas I would equate a trader in the futures pit with more
    of a faster, blackjack type of game. Traders have to decide which type of trading
    they are best at and go trade that market.


    **Bourquin:** Did you have somebody teach you how to trade in the pits?


    **Raschke:** It’s funny. There was a series of tapes that we could watch upstairs
    at the clearing firm that discussed the model for pricing options so that you
    could understand the theory behind it. You can’t learn to trade from videotapes,
    of course, but it gave you the theory. Then it’s like somebody throwing you into
    the open ocean and saying, “Sink or swim!” Nobody teaches you how to trade other
    than the mechanics of how you’re going to bid or how you’re going to offer. It’s
    very much a “learn by doing” thing. So, I really have to say that, other than
    somebody explaining an initial pricing model, everything was pretty much learned
    by doing it.


    It’s pretty much the same thing today. A new trader obviously can be introduced
    to different concepts, like market profile or other theories that help them understand
    how pricing works in a free market, but the people I think that will make it in
    this business today have to find their own method and strategy to make money long-term.
    Successful traders need to find their own game and their own way, and I think
    it’s pretty much through experience and trial-and-error trading where that happens.
    Everyone has to find their own edge in the market, and that can only come from
    just trading an account.


    **Bourquin:** Do you think the people that start out trading behind the screen,
    who don’t have that experience in the pits, are at a disadvantage because they
    don’t really understand where pricing comes from in the same way you saw it happen?


    **Raschke:** No, I don’t think it makes a big difference. And honestly, of the
    people that were on trading floor, I would say that probably 85 percent of them
    have had an extremely difficult time making the transition to the screen, and
    the majority of them have not been able to make the transition to the screen at
    all. So, I don’t think it matters much. Trading in the pits is just a different
    way of making money, and it is slowly dying.


    I think that the learning curve for traders today is more about finding out what
    style works for them. Are they going to do spread trading or are they going to
    try and make money short-term, scalping for nickels and dimes, which I think is
    very difficult. Making a living scalping isn’t my style, but some traders can
    do it and make a nice living. Most new traders may be able to pay the bills as
    a scalper, but I don’t think they’re ever going to get rich doing that. But there’s
    always a certain sort of person that has an exceptional affinity toward doing
    that. Of course, how you trade is also going to be dependent on the capital that
    you’ve built up.'
  trans: '

    *拉施克多年来一直活跃于市场技术分析师协会，并在超过 30 个国家举办过讲座。她与合著者劳伦斯·康纳斯合著的书籍* `Street Smarts: High
    Probability Short-Term Trading Strategies` *（M. Gordon Publishing Group, 1996
    年）* 广为人知。


    **蒂姆·布尔昆：** 琳达，你以交易为生多久了？


    **琳达·拉施克：** 三十一年了。我是在交易所场内起步的。幸运的是，当时有人资助我，所以我直接跳进了交易池，在那里交易了六年。我最初交易的是股票期权，但现在我
    98%的交易都是在期货市场进行的。


    **布尔昆：** 你是什么时候决定离开交易大厅的？


    **拉施克：** 嗯，其实是因为我出了个意外，肩膀和胳膊都吊着绷带，实在没法再在交易池里站下去了。在交易池里，你需要用胳膊打手势表示买卖，所以我搬到了楼上。当时我所在的结算公司是第一期权芝加哥公司。那时候，我们还没有现在这样的电脑，所以我只能靠着一台老式的
    Quotron 屏幕交易，然后打电话把下单指令传到楼下交易大厅。


    **布尔昆：** 你刚开始的时候，芝加哥的交易池里有很多女性吗？


    **拉施克：** 不多，但我曾在两个不同的交易所待过：太平洋海岸证券交易所和费城证券交易所。我也有很多同事在芝加哥期权交易所（CBOE）的交易池里。那些交易大厅里总是会有几位女性。就交易员来说，我记得我刚到太平洋海岸证券交易所时，那里大概有四位女性交易员。不过，还有很多女性从事文秘支持类的工作，所以并不像你想象的那样性别比例严重失衡。只是女性交易员确实不多。


    **布尔昆：** 你是在学校里学会交易的吗？或者是谁带你进入交易池的？


    **拉施克：** 都不是。其实我根本不知道交易所场内还有这样的环境，虽然我一直对市场很感兴趣。我在大学主修经济学，而且从小到大，我爸爸的办公桌上总是放着图表书籍。倒不是说他是交易员，但他确实关注市场。后来，当我住在旧金山时，我向很多不同的经纪公司投了简历，想成为一名股票经纪人，因为我觉得那是进入市场的一个绝佳途径。当然，你可以想象，一个“刚出校门”的
    21 岁女性，被所有的公司都拒绝了。所以，谢天谢地，我一直没当成股票经纪人。


    我确实找到了一份金融行业以外的工作，办公室正好在太平洋海岸证券交易所的街对面，所以早上我能看到人们穿着五颜六色的交易外套，戴着身份徽章，在那栋古典建筑里进进出出。我和其中一个人交上了朋友，最终就是这样进入了这一行。


    **布尔昆：** 在交易池里交易和你现在在屏幕前交易有很大不同吗？


    **拉施克：** 在某些方面是有的。显然，在观察你面前真实的订单流方面，动态完全不同，这是非常不同的一点。你能看到交易员们买入卖出，所以你能感受到市场的动量。曾几何时，在交易池里是有优势的，尤其是做期权套利时，因为你可以利用那种对动量的感知作为优势。但那种优势现在已经不存在了。期权现在毫无优势可言，因为电子化交易使得市场非常高效。但对我来说，真正保持不变的是那种“活在当下”、为我的交易建立常规方法的态度。


    就我而言，我的一天从美国东部时间早上 6:30 或 7:00 开始，这时我开始审视整个市场。我总是试图将自己的观点融入一个更大的“宏观”背景中，看看我们处于市场似乎总在重复的一到两周周期的哪个位置。


    当我交易股票期权时，与在债券交易池或标普指数期货交易池里“倒卖合约”、通过价差快速买卖获利相比，这更像是一场策略游戏。交易股票期权时，你绝对需要在持仓上非常有策略性。所以，我们不是通过买入期权然后加价四分之一个点卖出获利。而是要不断查看期权的希腊值，思考：“Gamma
    值是这个，Delta 值是那个。如果我做多看涨期权又做多看跌期权，那是一个正 Gamma 的交易，现在我需要积极交易标的股票来对冲那个头寸才能赚钱。” 因此，你被迫来回交易股票以对冲头寸，从而支付持有期权头寸的成本。


    盈利的期权交易涉及太多变数。这更像是在打桥牌或下国际象棋，你需要提前几步进行策略性思考。而我会把期货交易池里的交易员比作速度更快的二十一点游戏。交易员必须决定自己最擅长哪种类型的交易，然后去交易那个市场。


    **布尔昆：** 当时有人教你在交易池里如何交易吗？


    **拉施克：** 说来有趣。在结算公司楼上，我们可以看一系列录像带，它们讲解期权定价模型，这样你就能理解其背后的理论。当然，你不可能从录像带里学会交易，但它能给你理论。然后，就像有人把你扔进汪洋大海，说：“要么学会游泳，要么淹死！”
    除了教你如何进行出价或报价的机制外，没有人教你如何交易。这很大程度上是一件“在做中学”的事情。所以，我真的要说，除了有人解释了一个初始的定价模型之外，其他所有东西基本上都是在实践中学会的。


    现在的情况也差不多。一个新手交易员当然可以被介绍不同的概念，比如市场轮廓或其他理论，这些理论帮助他们理解自由市场中的定价机制，但我认为，那些能够在这一行取得成功的人，必须找到自己长期盈利的方法和策略。成功的交易员需要找到自己的游戏和方式，而我认为这很大程度上是通过经验和试错交易来实现的。每个人都需要在市场中找到自己的优势，而这只能通过实际交易账户获得。


    **布尔昆：** 你认为那些一开始就在屏幕前交易、没有交易池经验的人，是否因为不像你那样亲眼见证价格的形成过程，而处于劣势？


    **拉施克：** 不，我不认为这有太大区别。而且老实说，在我认识的交易大厅里出来的人中，我估计大概有 85%在向屏幕交易转型时遇到了极大的困难，其中大部分根本没能成功转型。所以，我认为这没什么大不了的。在交易池里交易只是另一种赚钱的方式，而且这种方式正在慢慢消亡。


    我认为，如今交易员的学习曲线更多地在于发现哪种风格适合自己。他们是打算做价差交易，还是试图短线赚钱，像“剥头皮”一样赚取蝇头小利？我认为后者非常困难。靠剥头皮谋生不是我的风格，但有些交易员能做到，并且过得不错。大多数新手交易员或许能靠剥头皮付清账单，但我认为他们永远无法靠这个致富。不过，总会有那么一类人对做这种事有特别的天赋。当然，如何交易也取决于你积累了多少资本。

    '
- fmt: '# 交易策略与经验访谈


    大多数场内交易员只做一件事，并且做得极其出色，然后反复操作，每月都能获利。零售交易员则必须更具策略性，规划交易，并根据当前市场周期使用不同的方法。他们需要从宏观视角审视市场，并理解所有部分如何相互配合。


    **布尔昆：** 过去三十一年，你的交易方式发生了怎样的变化？


    **拉施克：** 我只想说，在过去的二十年里，我的交易已经进化到能够同时交易大量市场、持有多个头寸并管理多种策略。刚起步时，我必须专注于一两件事，并成为那一两件事的专家。这是一个自然的进化过程。当你刚开始时，你需要精通一个市场——学会良好地执行，并专注于做一件事。随着时间的推移，你开始积累资本，并在几个市场中建立多个头寸。也许一个股票交易者会拓展业务，开始更积极地交易货币、黄金和原油。对我来说也是一样。大多数专业交易者会同时在许多市场进行交易。要在市场中长期真正成功，交易者需要能够积累这种经验。


    **布尔昆：** 你是在家交易还是在办公室交易？


    **拉施克：** 我有一个家庭办公室。不过，我更喜欢去办公室，所以当我住在佛罗里达时，我在离我家二十英尺的地方建了一个独立的办公室。在那之前，我在泽西，实际上建了一个与房子相连的独立办公室。但当我在屏幕前或在办公室里时，我就像离家一百英里一样，因为我完全专注于交易。


    **布尔昆：** 听起来，把工作和生活分开对你来说很重要。


    **拉施克：** 我认为很大程度上这只是在过滤干扰。所以，干扰可能来自孩子、宠物或任何让你从手头工作中分心的事物。我只是觉得你需要把自己抽离出来，或者让自己进入游戏空间，在那里你可以集中精力，完全专注于市场。


    **布尔昆：** 你在家庭办公室使用什么样的工具进行交易？什么样的代码和软件之类的东西？


    **拉施克：** 我总是有三台独立的电脑。一台专门用于我的执行平台。我认为这非常重要。我不想在我运行图表程序、技术程序或其他可能占用内存并导致延迟问题从而拖慢订单的电脑上运行我的执行软件。在另外两台电脑上，我有两个独立的软件程序，基本上是冗余备份。除了各自拥有独立的数据源和独立的网络连接外，两台电脑看起来一模一样，这样如果其中一个出现数据延迟问题，也不会干扰我正在做的事情。


    **布尔昆：** 你是否曾在交易过程中遇到两条网络连接都断掉的情况？


    **拉施克：** 我什么都遇到过。你能想到的——我都经历过。飓风、卫星天线掉落、网线和电话线被施工挖断。这就是为什么每个交易者都要解决技术上的薄弱环节，并足智多谋地思考：“我的业务中有哪些‘阿喀琉斯之踵’？我怎样才能建立某种类型的冗余或备份？”如今我持有相当大的头寸，如果我的数据或执行系统崩溃，代价可能会非常高昂。


    **布尔昆：** 你会如何描述你的整体交易理念？你是纯粹的技术派，还是也会关注基本面？


    **拉施克：** 完全是技术图表解读和盘口解读。我从未能够从基本面中获利。


    **布尔昆：** 你做哪种类型的技术分析？


    **拉施克：** 呃，蒂姆，我讨厌这么说，但真的是非常基础。归结为支撑、阻力和跟随趋势，就这些。要么是交易进入一个支撑位或阻力位，要么你处于一个动量、趋势环境中，要么你处于一个交易区间环境中。对于我的交易风格，我主要关注的技术指标始终是前一个波段高点和波段低点。价格就是一切，过去价格反转的区域很可能会再次反转。


    我关注的其他价格区域包括开盘价、前一日的高点和低点，以及两者之间的波段高点和低点。我所有的交易都基于此。当市场开盘时，我也会做一些成交量评估，因为这将为当天的交易定下基调。如果没有足够的成交量来支撑，市场很难将价格推向任何极端。否则，这只会是一个成交量低迷、波动有限、没有明确方向的交易日。


    我使用一个非常简单的系统，一些交易者觉得难以置信，但它就是有效。没有理由把这行搞得太复杂。


    **布尔昆：** 你说得对。我交谈过的大多数经验丰富的交易者可能都有最简单的系统。当我开始听到零售交易者谈论更复杂的系统时，这通常表明他们在市场中经验不足。他们的策略越复杂，成功的可能性就越小，因为他们一直在寻找那个神奇的策略。


    **拉施克：** 嗯，别误会我的意思。我从1992年就开始做建模和研究，我能理解复杂的机械系统。


    在摩尔研究中心的史蒂夫·摩尔过去一直为我做所有的测试和建模，然后我总是有内部员工坐在那里，反复琢磨，围绕这些想法创建系统。但我就是还没能创建或使用任何我感觉舒适且自信交易、并且足够耐用和稳健的机械系统。


    然而，这仍然是交易中“提出问题”方法的一部分，我认为这非常有价值。如果你能根据特定情况下发生的事情找到市场中的模式，了解这些总是好的。例如，在一个上涨趋势的市场中，连续上涨三天后，第二天会发生什么？或者，如果我们在第二小时突破了第一小时的低点，会发生什么？或者，如果我们在下午突破了第一小时的高点，会发生什么？这是否会导致收盘价更高？如果是，发生的频率有多高？因此，正是这种不断提问的方式驱动着成功的交易。你可以问自己这些问题，并建立一个想法库，有些人会根据结果构建自动化系统。对我来说，这只是我在交易日中记住的又一条信息。


    **布尔昆：** 你主要交易期货。你喜欢交易哪种类型的期货合约？


    **拉施克：** 我一直交易`E-mini S&P 500`期货。事实上，从它们上市的第一天起，我就开始交易`S&P E-mini`期货，并且从那以后几乎每天都交易。所以，我一直交易指数期货。我也交易金属——我喜欢黄金、白银和铜。我还交易能源期货、原油和天然气。我也一直交易谷物和货币期货。最后，我仍然交易“软性商品”，比如糖、可可和咖啡，而我还是那些仍然交易肉类的傻瓜之一！


    **布尔昆：** 你会持有多个隔夜头寸吗？


    **拉施克：** 是的。我几乎总是持有某种货币的头寸，而且我通常倾向于持有五到六个隔夜头寸。其中一些头寸会持有两天到两周不等。


    **布尔昆：** 听起来你愿意交易任何当时看起来有吸引力、正在波动或你觉得提供良好机会的品种。'
  raw: 'Most pit traders do one thing extremely well and do it over and over again
    to make money each month. Retail traders have to be more strategic and plan trades
    and use different methods based on the current market cycle. They need to take
    a macro view of the markets and understand how all the pieces fit together.


    **Bourquin:** How has your trading changed over the last thirty-one years?


    **Raschke:** I would just say that over the last twenty years, my trading has
    evolved to where I’m now able to trade a lot of markets and carry a lot of positions
    and manage several strategies at one time. When I began, I had to focus on one
    or two things and become an expert at those one or two things. It’s a natural
    evolution. When you start out, you need to get good at one market—learn to do
    your execution well and specialize in doing one thing. Over time, you start to
    build up your capital and to put on multiple positions in several markets. Perhaps
    a stock trader will branch out and start trading currencies, gold, and crude a
    little more aggressively. It’s been that same way for me. Most professional traders
    will make trades in many markets at the same time. To really succeed in the markets
    long-term, traders need to be able to accumulate that experience.


    **Bourquin:** Do you trade from home or do you trade in an office?


    **Raschke:** I have a home office. I prefer going to an office, though, so when
    I was living in Florida, I built a separate office twenty feet away from my house.
    Before that, I was in Jersey and actually built a separate office that was attached
    to the house. But when I’m in front of my screen or in my office, I might as well
    be one hundred miles away from my house because I’m so focused on my trading.


    **Bourquin:** It sounds like separating home from work is important to you.


    **Raschke:** I think a lot of it is just filtering out distractions. So, it could
    be distractions from kids or distractions from pets or from anything that pulls
    your mind away from the job at hand. I just think you need to remove yourself
    or put yourself into your game space, where you can concentrate and have total
    focus on the markets.


    **Bourquin:** What kind of tools do you use in your home office for trading? What
    kind of codes and software, that sort of thing?


    **Raschke:** I always have three separate computers. One is dedicated just to
    my execution platform. I think that’s really important. I don’t want to be running
    my execution software on the same computer that I’m running charting programs,
    or technical programs, or things that might hog up memory and risk having latency
    issues that slow down my orders. On the other two computers, I have two separate
    software programs that are basically redundant for backup. One looks exactly like
    the other, except both have separate data feeds and separate internet connections
    so that if there’s a data latency issue on one, it’s not going to interfere with
    what I’m doing.


    **Bourquin:** Have you ever had both of your internet connections go down while
    you were in the middle of a trade?


    **Raschke:** I’ve had everything happen. You name it—it’s happened to me. Hurricanes,
    satellite dishes falling, having our internet and phone lines dug up by construction.
    That’s why it’s very important for each trader to address areas of weakness in
    technology and be resourceful and say, “Where are the Achilles’ heels in my operations,
    and how can I build in some type of redundancy or backup?” I have positions of
    significant size these days, and if my data or execution went down, it could be
    very expensive.


    **Bourquin:** How would you describe your overall philosophy in trading? Are you
    purely technical, or do you watch fundamentals as well?


    **Raschke:** It’s all technical chart-reading and tape reading. I’ve never been
    able to capitalize on the fundamentals.


    **Bourquin:** What kinds of technical analysis do you do?


    **Raschke:** Well, I hate to say it, Tim, but it’s pretty darn basic. It comes
    down to support, resistance, and following the trend, and that’s about it. There’s
    either a support level or a resistance level to trade into. And you’re either
    in a momentum, trending environment, or you’re in a trading range environment.
    For my style of trading, the main technicals I follow are always the previous
    swing high and swing low. Price is everything, and areas where price has turned
    in the past are likely areas where it will turn again.


    Other price areas I watch are the opening price, the previous day’s high and low,
    and the swing highs and lows in between. All of my trading is based on that. I
    also do a little bit of volume assessment when the market opens because that’s
    going to set the tone of trading for the day. It’s kind of hard for the market
    to push the price to any extreme if you don’t have decent volume in there to support
    the move. Otherwise, it’s just going to be a light-volume, choppy day, without
    much direction.


    I use a very simple system, which some traders find hard to believe, but it just
    works. There’s no reason to overcomplicate this business.


    **Bourquin:** You’re right. The most experienced traders I talk to probably have
    the simplest of systems. When I start to hear retail traders talk about more complicated
    systems, that’s typically a sign that they don’t have a lot of experience in the
    markets. The more complicated their strategy, the less success they’ve had because
    they are looking for that magic strategy.


    **Raschke:** Well, don’t get me wrong. I’ve been doing modeling and research since
    1992, and I can appreciate the complex mechanical systems.


    Steve Moore at a place called the Moore Research Center used to do all my testing
    and modeling for me, and then I always had in-house staff that would sit there
    and grind stuff away to create a system around the ideas. But I just haven’t yet
    been able to create or use any mechanical system that I felt comfortable or confident
    trading and that was going to be durable and robust.


    But it’s still part of the “asking questions” approach to trading, which I think
    is extremely valuable. If you can find patterns in the market based on what happens
    in certain situations, that’s always good to know. For example, what happens the
    day after we’ve had three up days in a row in an uptrending market? Or, what happens
    if we take out the first hour’s low in the second hour? Or, what if we take out
    the first hour’s high in the afternoon? Does that lead to a higher close? If so,
    how often? So, it’s always that type of question asking that drives successful
    trading. You can ask yourself these questions and build a base of ideas, and some
    people build automated systems based on the results. For me it’s just another
    piece of information I keep in mind during the trading day.


    **Bourquin:** You trade mostly futures. What types of futures contracts do you
    like to trade?


    **Raschke:** I’ve always traded the E-mini S&P 500 futures. In fact, I have traded
    the S&P E-mini futures since the very first day that they were listed, and I’ve
    traded them almost every day since. So, I’ve always traded the index futures.
    I also trade the metals—I love gold and silver and copper. I also trade energy
    futures, crude, and natural gas. I’ve always traded the grains and currency futures,
    too. And, finally, I still trade the “soft commodities,” like sugar, cocoa, and
    coffee, and I’m one of the idiots out there that still trades the meats!


    **Bourquin:** Do you carry multiple positions overnight?


    **Raschke:** Yes. I almost always have positions on in one currency or another,
    and I usually tend to carry five or six positions overnight. Some of those positions
    stay on anywhere from two days to two weeks.


    **Bourquin:** It sounds like you’re willing to trade whatever seems to be looking
    attractive at the time, or is moving, or you feel offers good opportunities.'
