- fmt: '*Raschke has been active with the Market Technicians Association for many
    years and has lectured in over 30 countries. She is well-known for her book with
    co-author Laurence Connors,* `Street Smarts: High Probability Short-Term Trading
    Strategies` *(M. Gordon Publishing Group, 1996).*


    **Tim Bourquin:** Linda, how long have you been trading for a living?


    **Linda Raschke:** Thirty-one years. I started off on the exchange floor. I was
    fortunate that somebody else backed me, so I jumped into the pits right away and
    traded there for six years. I started off trading equity options but now 98 percent
    of my trades are in the futures market.


    **Bourquin:** When did you decide to leave the trading floor?


    **Raschke:** Well, I had actually had an accident and my shoulder and arm were
    in a sling, so I really couldn’t stand down in the pits anymore. You need to be
    able to use your arms for buy and sell signs in the pit, so I moved upstairs.
    This was at the clearing firm First Options of Chicago. In those days, we didn’t
    have the computers that we have now, so I was trading off of an old Quotron screen
    and calling my orders down to the floor.


    **Bourquin:** Were there many women in the Chicago trading pits when you started?


    **Raschke:** There weren’t, but I was on two different floors: the Pacific Coast
    Stock Exchange and the Philadelphia Stock Exchange. I also had a lot of colleagues
    on the Chicago options floor—the CBOE—and there were always a few women down on
    those trading floors. In terms of traders, I remember there were about four females
    on the Pacific Coast Stock Exchange when I started down there. But there were
    still a lot of other females in clerical support-type jobs, so it was not so one-sided
    as you would think. Just not so many female traders.


    **Bourquin:** Did you learn about trading in school, or who introduced you to
    the trading pits?


    **Raschke:** No. I actually didn’t even know that this environment existed on
    the exchange floors, although I had always been interested in the markets. I was
    an economics major in college and my dad always had chart books on his desk when
    I was growing up. Not that he was a trader by any means, but he followed the markets.
    Then, when I was living in San Francisco, I applied to a bunch of different brokerage
    firms to become a stockbroker because I thought that would be a great entrée into
    the markets. Of course, as you can imagine, a twenty-one-year-old female, “fresh
    out of school,” got turned down by all of them, so thank goodness for that. I
    never became a stockbroker.


    I did get a job outside of the financial industry, and the office was right across
    the street from the Pacific Coast Stock Exchange, so I could see in the morning
    the people streaming in and out of this old classical building, wearing their
    colorful trading coats and their ID badges. I befriended one of them, and that’s
    ultimately how I got into the business.


    **Bourquin:** Was trading in the pits a whole lot different from how you trade
    on a screen now?


    **Raschke:** In some ways, it was. Obviously, you have a different dynamic in
    terms of watching the order flow physically in front of you, so that’s something
    that’s very different. You see the traders buying and selling, so you get a feel
    for the momentum of the markets. Once upon a time, there was an edge in the pits,
    especially doing options arbitrage, because you could use that sense of momentum
    as an edge. But that doesn’t exist anymore. There’s no edge to options at all
    because the market is so efficient now with electronic trading. But what really
    has remained the same for me was the approach of taking one day at a time and
    developing a routine for my trading.


    In my case, my day starts 6:30 or 7:00 a.m. eastern, when I begin looking at the
    overall markets. I’m trying to always fit my views into a larger “macro” context,
    looking to see where we are in the one- to two-week cycle that the market always
    seems to repeat.


    When I was trading equity options, it was a little bit more of a strategic game
    than one would be doing, for example, in a bond pit or an S&P pit, where you’re
    “flipping the paper” and buying and selling for a quick profit on a move. With
    equity options, you definitely had to be very strategic in your positioning. So,
    it wasn’t like we were making money buying an option and flipping it out a quarter
    point higher. It was constantly looking at the option Greeks and thinking, “The
    Gamma number is this and Delta is this. If I’m long calls and long puts, that’s
    a positive Gamma trade, and now I need to trade the stock actively against that
    position in order to make money.” So, you were forced to trade the stock back
    and forth against your position to pay for the cost of carrying the option position.


    There are so many moving parts with profitable option trading. It is much more
    analogous to playing bridge or chess, where you have to think strategically a
    couple jumps ahead. Whereas I would equate a trader in the futures pit with more
    of a faster, blackjack type of game. Traders have to decide which type of trading
    they are best at and go trade that market.


    **Bourquin:** Did you have somebody teach you how to trade in the pits?


    **Raschke:** It’s funny. There was a series of tapes that we could watch upstairs
    at the clearing firm that discussed the model for pricing options so that you
    could understand the theory behind it. You can’t learn to trade from videotapes,
    of course, but it gave you the theory. Then it’s like somebody throwing you into
    the open ocean and saying, “Sink or swim!” Nobody teaches you how to trade other
    than the mechanics of how you’re going to bid or how you’re going to offer. It’s
    very much a “learn by doing” thing. So, I really have to say that, other than
    somebody explaining an initial pricing model, everything was pretty much learned
    by doing it.


    It’s pretty much the same thing today. A new trader obviously can be introduced
    to different concepts, like market profile or other theories that help them understand
    how pricing works in a free market, but the people I think that will make it in
    this business today have to find their own method and strategy to make money long-term.
    Successful traders need to find their own game and their own way, and I think
    it’s pretty much through experience and trial-and-error trading where that happens.
    Everyone has to find their own edge in the market, and that can only come from
    just trading an account.


    **Bourquin:** Do you think the people that start out trading behind the screen,
    who don’t have that experience in the pits, are at a disadvantage because they
    don’t really understand where pricing comes from in the same way you saw it happen?


    **Raschke:** No, I don’t think it makes a big difference. And honestly, of the
    people that were on trading floor, I would say that probably 85 percent of them
    have had an extremely difficult time making the transition to the screen, and
    the majority of them have not been able to make the transition to the screen at
    all. So, I don’t think it matters much. Trading in the pits is just a different
    way of making money, and it is slowly dying.


    I think that the learning curve for traders today is more about finding out what
    style works for them. Are they going to do spread trading or are they going to
    try and make money short-term, scalping for nickels and dimes, which I think is
    very difficult. Making a living scalping isn’t my style, but some traders can
    do it and make a nice living. Most new traders may be able to pay the bills as
    a scalper, but I don’t think they’re ever going to get rich doing that. But there’s
    always a certain sort of person that has an exceptional affinity toward doing
    that. Of course, how you trade is also going to be dependent on the capital that
    you’ve built up.'
