    my eyes open to see if we will be switching back to the other at some point that
    day, because I have two different ways of trading. If we’re looking at a trend
    day or the possibility of a trend day, I am going to want to go for a ride with
    the momentum. But if it’s looking like a rotational range day, then I’m going
    to want to fade the levels that I’m looking at.


    **Bourquin:** Do you decide what type of day it is based on the charts you’re
    using to look at the ES?


    **Menaker:** Yes, and I use a lot of market profiling and volume profiling, so
    I’m looking for responsive and initiative activity. I’m a psychologist, so when
    I see levels on a chart that some people might call supply and demand, what I
    see is emotionally charged areas on the chart.


    In other words, everyone else is saying, “Hey, here’s a trend line,” and while
    I might look at that as well, I’m going to see it differently. To me, it’s not
    just a line on a chart. To me, it represents an area of a lot of emotion, and
    when price gets back to that area, I’m going to want to look really closely at
    internals. How many stocks are ticking at their high of the day? How many stocks
    are ticking at their low of the day? How many stocks are above or below their
    volume-weighted average price [VWAP]? I’ll look at stuff like that as we come
    into an important area, and how price and internals behave at that area will tell
    me what to do. I listen to the market and want to get as close to the market as
    possible in my trading.


    **Bourquin:** Let’s talk about that, because, as a psychologist, you think that
    the way to alleviate some of the problems that high-frequency traders are bringing
    to the market is through trading psychology. Talk about why that is and how to
    use trading psychology to get around this.


    **Menaker:** Sure. I’ll give you a really specific example of trading ES. Let’s
    say that a big player in the ES market knows that there’s support at twenty-eight,
    because they look at their charts and they can see the same levels that everyone
    else can. Now, they can afford to sell five thousand contracts at twenty-eight
    and then offer another two thousand at twenty-seven. While you and a hundred other
    small traders are busy covering your long positions at twenty-six and twenty-five,
    that big player is covering his short positions—and he is even buying those twenty-fives
    back from you.'
  trans: '

    **Bourquin：** 这引出了一个问题：那些已经弄明白的人，到底比其他人做对了什么？


    **Menaker：** 这个问题问得很好。我认为他们之所以能弄明白，是因为他们发现市场的社交属性比人们意识到的更强。我觉得人们很容易忘记市场仍然具有社交属性，毕竟我们在
    CNBC 上看到、在*华尔街日报*上读到那么多关于自动化交易的争论。


    我们来打个扑克的比方。我有一个好朋友，他既是交易员，也曾是职业扑克玩家。有一天我问他：“如果一桌高赌注牌局上，每个人的能力水平都差不多，而且每个人对牌的各种概率都了然于心，那为什么有些职业玩家总能比其他职业玩家赚更多的钱？”


    他说，从表面上看，扑克像是一场数字和概率的游戏，某种程度上也确实如此。但真正的优势在于读懂牌桌、能够虚张声势，以及识破别人的虚张声势。我认为市场完全是一样的道理。


    作为交易员，我们盯着屏幕，很容易就忘记了屏幕上闪烁的灯光、移动的线条和颜色，这些都只是其他东西的表象。那其他的东西，就是正在激烈博弈的买方和卖方。所以，回答你的问题，我认为那些弄明白的人，是真正理解了是人在推动市场。


    换个方式说：如果你今天买了`XYZ`股票，那么这只股票在一小时、一天、一周或一年后上涨，全世界只有一个原因。只有一个原因：人们愿意并且会继续以更高的价格买入，无论出于什么理由。他们可能会说原因是喜欢这家公司，或者对经济感到乐观。但原因是什么并不重要。重要的是行动。所需的行动就是其他人必须支付更高的价格。一旦其他人——基金经理、对冲基金，不管是谁——决定不再支付更高的价格，`XYZ`股票就不会再涨了。


    为了预测市场，那些真正搞懂游戏规则的人，预测的是人。我可以告诉你，一些更成功的对冲基金明白这一点。他们看待市场，不主要是通过基本面分析和技术分析。他们试图去*感知*市场。他们想要预测人们会做什么。


    我告诉你，几年前加州理工学院发表了一项非常有趣的研究。这项研究是由一些金融工程师进行的——这些人是量化专家，对吧，他们是数学家——他们安排了两组交易员。一组是有经验的交易员，另一组是彻头彻尾的新手。当他们让这两组人相互交易时，有经验的组当然表现更好。但接着他们做了一件有趣的事。他们给新手交易员提供了一些培训。他们教新手如何解读或评估他人的想法和意图。换句话说，他们教他们如何读懂别人。然后他们让这些受过培训的新手交易员，带着学到的技巧，在有经验的交易员面前进行交易竞赛。


    研究人员发现，在这些新手接受培训后，他们能够与更有经验的交易员打成平手，甚至常常战胜他们。你可能会觉得这只是侥幸。实际上，他们把这个相同的实验重复了大约十二次，每次得到的结果都一样。


    **Bourquin：** 我认为这是人们反对高频交易的主要论点之一。他们说：“你看，我能读懂供需关系，我能看清二级市场的买卖订单，我看到一些虚假订单进进出出，试图让我误以为那里有供给或需求，但实际上并没有。”但我认为他们实际上很难读懂这些东西。


    **Menaker：** 完全正确。首先，没错，算法被大量用于执行交易，而且不仅仅是被高频交易员使用。即使是非高频交易员也在使用算法，这多少会打乱队列，让情况看起来不一样。


    这里有一个有趣的小细节：在趋势日或强方向日，当市场几乎一整天都朝一个方向剧烈运动时，高频交易员和算法通常会被打得落花流水。那些日子对他们来说不太妙。他们通常在区间震荡日、轮动日，以及交易在众所周知的关键水平之间来回的日子表现非常好。那些日子是他们的好日子。但他们不是每天都赚钱。他们也会亏钱，他们表现不好的日子就是趋势日。


    **Bourquin：** 我想那些日子应该是主观交易员大展拳脚的时候吧。也许这里得到的教训就是，在区间震荡日应该离场？


    **Menaker：** 这取决于你的风格。就我的交易风格而言，我早上的工作就是不断试图搞清楚当天会是一个方向性趋势日还是一个震荡日。如果我判断是其中一种，我会睁大眼睛观察，看看当天某个时刻是否会发生切换，因为我有两种不同的交易方式。如果我们面对的是一个趋势日，或者有趋势日的可能，我会想顺着势头走。但如果看起来像是一个轮动震荡日，那么我就会想在我关注的关键水平上反向操作。


    **Bourquin：** 你是根据你用来观察 ES 的图表来判断当天是什么类型的日子吗？


    **Menaker：** 是的，我使用了很多市场轮廓和成交量轮廓分析，所以我关注的是主动型和反应型活动。我算是个心理学家，所以当我在图表上看到一些人称之为供给和需求的水平时，我看到的其实是图表上充满情绪的区域。


    换句话说，其他人会说：“嘿，这里有一条趋势线。” 我可能也会看到这条线，但我的看法不同。对我来说，它不仅仅是图表上的一条线。对我来说，它代表了一个情绪激烈的区域。当价格回到那个区域时，我会非常仔细地观察内盘数据。今天有多少股票在创日内新高？今天有多少股票在创日内新低？有多少股票高于或低于它们的成交量加权平均价格（VWAP）？当价格进入一个重要区域时，我会观察这些数据，价格和内盘数据在那个区域的表现会告诉我该怎么做。我会倾听市场的声音，并希望在交易中尽可能地贴近市场。


    **Bourquin：** 我们来谈谈这个。作为一名心理学家，你认为减轻高频交易给市场带来的一些问题的方法是交易心理学。请谈谈为什么以及如何利用交易心理学来规避这些问题。


    **Menaker：** 没问题。我给你举一个交易 ES 的非常具体的例子。假设 ES 市场的一个大户知道 28 点有支撑，因为他们看了图表，能看到和其他人一样的水平。现在，他们有能力在
    28 点卖出 5000 张合约，然后再在 27 点卖出 2000 张。当你和其他一百个散户忙着在 26 点和 25 点平掉你的多头头寸时，那个大户正在平掉他的空头头寸——他甚至可能是在从你手里买回那些
    25 点的合约。

    '
- fmt: 'The big player will sell enough to get price to go past your pain point—and
    everyone has a pain point. Everyone has a pain threshold, so you need to know
    what your pain point is, because once you reach that point, that’s when you start
    to get irrational. Know what your pain point is. The big player knows that if
    they can just push it one or two ticks past your pain point, of course, they can
    set off your stops. This happens a lot. This is how they operate, and they use
    algos to do this kind of execution.


    We have to remember that the lines on a chart just represent what people are doing
    out there. No matter how many algos are active, it’s people who are responsible
    for writing the algos and turning them off and on throughout the day—and they’re
    always switching algos in all day long. The same algos do not constantly run throughout
    the day.


    Bourquin: Does this argue to just use areas of support and resistance on the chart,
    and don’t worry about time and sales, because it’s just going to be a fake out
    anyway?


    Menaker: Time and sales is not a fake out. In fact, time and sales is really important
    to me. I watch time and sales like a hawk on the ES, and, unfortunately, time
    and sales scrolls by pretty darn quickly, so you have to use filters.


    If there were a ton of volume hitting the bid, you’d think that they are market
    sell orders. But, let’s say price only ticks down one tick. Let’s say ten thousand
    contracts have hit the bid in the last five minutes, but price is only ticking
    down by one. That tells me that it’s quite possible there is a large, passive
    resting order on the other side of the trade. And if this is all coinciding with
    an important area on my chart and I see internals doing something interesting,
    I might decide to get active at that point and put on a trade.


    To me, order flow is really important. Time and sales is never a fake out. Time
    and sales tells the tale. It’s difficult to organize, understand, and interpret
    it, because it’s constantly moving. It flows past really quickly.


    Bourquin: At least time and sales is the actual sales. It’s not orders up there
    for a split second and then gone again, like a Level II might be.


    Menaker: Right. I don’t really trade stocks anymore, partly because I think that
    there is really no advantage to looking at Level II anyway. I mostly trade index
    futures.


    I think, when we’re in the environment that we’re in now, with a lot of high-frequency
    traders and algos, it’s really difficult to trade really small, short time frames
    for a few ticks here and there. I think, for people who are trying to scalp the
    market nowadays from home on their computer, it’s almost impossible, because you’re
    going to get scalped by the computers. Instead, what I have found is that we have
    to lengthen out our time frames and look for bigger moves. For instance, I’m not
    going to come out and trade in the ES unless my target is at least four or five
    points away—hopefully more.


    I’m not trading for just a point or two because, if I do, I’m directly competing
    with the algos, because that’s their playing field. Algos can really push the
    market around a few ticks here and there, but they’re not going to push the ES
    up ten or fifteen points. Algos can’t do that, although they are involved in a
    move like that.


    What happens is that some algos will trigger another move, which triggers another
    move, which triggers another move, and then people see it. They jump on, and all
    of a sudden, the market moves twelve points, and what set it off was some algos
    earlier. But algos themselves didn’t say, “Hey, let’s move the market up twelve
    points.” People need to understand that all algos do is execute orders. They don’t
    make the decision to move the market up or down.


    Bourquin: Let me ask you about those four or five points you mentioned earlier.
    I’m always curious as to how people set up their risk-to-reward ratios. How do
    you decide whether or not a trade has the potential to have four or five points
    in it?'
