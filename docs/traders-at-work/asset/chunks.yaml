    **罗伯·威尔逊**

    '
- fmt: '# Trade with the Strict Discipline of a Naval Commander


    Many part-time traders naturally draw on skills that serve them well in their
    day jobs, but perhaps none are more fascinating than **Rob Wilson**, whose role
    as a commander for the British Royal Navy requires unwavering discipline and strict
    adherence to protocol. Wilson’s military training has instilled in him the importance
    of quick, confident decision-making in the face of often limited or imperfect
    information. Whether he is at sea or in the markets, he knows that indecisiveness
    at the moment of action can have disastrous consequences.


    By trading only the `EUR/USD` currency pair, Wilson eliminates the need for extensive
    market research and analysis, and his ultra-short time frame and very tight risk
    parameters help him carve out small but steady profits while trading for only
    four hours each early morning before reporting for duty. His success and approach
    to the markets may serve as inspiration to any new or part-time traders who are
    looking to find their way and strike the proper balance between trading and the
    other important facets of their lives.


    **Tim Bourquin:** Rob, you have a military background and an interesting story
    about how you got into trading. Let’s start by talking about your military training.


    **Rob Wilson:** I joined the Royal Navy as an officer cadet at the age of eighteen,
    and while I wouldn’t call myself a high school dropout, I was the nearest thing
    to it. I managed to scrape by with the minimum qualifications and went to sea,
    and I never really came back. Here I am, twenty-four years later, still doing
    it, albeit I’m about to move to Australia and transfer to the Australian Navy.


    My ambition was always to command warships, and I managed to achieve that when
    I was thirty-four and took command of my first one. I left my last command in
    2009, when I was thirty-nine years old.


    I attended Dartmouth Royal Naval College in the southwest of Britain and started
    my career watchkeeping on the bridge. I then learned to control fast jets using
    a radar and voice circuit, and I spent two years with the French Navy on the aircraft
    carriers Clemenceau and Foch. Afterwards, I returned to the United Kingdom and
    conducted my warfare training proper, then went back to sea, running the ops room
    on a warship, before I was finally ready to take command. I drove a minehunter
    initially, and was later promoted and took command of a destroyer.


    **Bourquin:** Are you still in the Royal Navy?


    **Wilson:** I am still serving, albeit on secondment to the US Navy while I’m
    instructing at their war college in Newport.


    **Bourquin:** And how did the trading bug get to you?


    **Wilson:** My father was trading indices and introduced me to it, but I wanted
    to pick a different instrument that I could really get to know and that was volatile
    enough for me to trade on a short-term basis. I really wanted to appeal to the
    side of my character that had been honed throughout my Navy training.


    That was what led me to Forex, and from there, I got acquainted with Rob Booker,
    who actually came to trade with me on the destroyer at one time.


    I wasn’t happy trading on the one-hour or four-hour timescales because I couldn’t
    generate the sort of discipline I wanted. I needed to trade on an even shorter-term
    timescale that was more in tune with what I was doing in the Navy.


    **Bourquin:** Right. And because you were obviously working full-time, Forex was
    probably a good fit because you can trade it off hours. Is that part of what drew
    you to it initially?


    **Wilson:** Actually, no. It was just the fact that I could see more than enough
    potential for profit in one pair, and that would take away the need for me to
    research and data mine. I could just focus on getting to know the personality
    of one currency pair, and that was really what made me choose Forex.


    I didn’t have a chance to start trading actively during the day until we moved
    to America, and then, all of a sudden, it opened up a window for me to trade between
    3:00 a.m. eastern time [when the London Stock Exchange opens] and the time I went
    to work, and that’s what I decided to do. I would get up at 2:30 in the morning,
    trade through until 7:30, and then go to work—and, actually, I still do that.


    **Bourquin:** Wow. So let’s back up. You said Rob Booker visited you to trade
    right from the destroyer?


    **Wilson:** Yeah, it was great! In fact, we were just coming out of dock from
    a big refit, so Rob spent about three days with me in dock. Then we sailed the
    ship, and I took him down the River Thames and dropped him off at the head of
    the river to attend a few meetings in London from there.


    We put him in a fast launch and went straight onto the beach, and much to the
    amazement of the bathers, Rob just peeled off his waterproofs, walked off the
    bridge, and never looked back. It was fantastic!


    **Bourquin:** That’s awesome! I know Rob and I can’t wait to talk to him about
    that. That’s probably a whole interview in and of itself that I should do with
    him!


    So, after getting involved with currency trading, what were some of the things
    you tried initially to find good trades, and were you looking only at technical
    analysis?


    **Wilson:** I started by stripping everything off my chart and trying to understand
    not necessarily what drove the market, but where I could identify opportunities
    to trade. I really started to make progress when it dawned on me that the currency
    market was a market just like any other. I saw on the chart where price points
    had turned and at least questioned the prevailing sentiment for whatever reason.


    I then started testing very short-term reaction trades against those price points,
    and I found that I could make a very consistent profit from those, and that’s
    really how I started trading.


    Although I was using a chart, I was essentially placing market orders where I
    saw even the beginnings of a reversal pattern developing at those key price points.
    If price blew through those price points, then I would just trade them in the
    other direction.


    That really chimed with my personality and the way I learned to work in the Navy,
    which was to be prepared to make a decision based on the best information I had
    at the time, but also to be prepared to reverse that decision if an event came
    about that proved my initial determination incorrect.


    I loved the idea of being able to profit from being wrong, and you can do that
    just by adjusting your leverage. By using careful money or risk management, you
    can pop in a pilot trade at one of these points and look to take a few pips.


    For me, I’ll take fifteen pips, which will generate a 0.3 percent return, and
    I’m happy with that. If that trade doesn’t come off, however, then my further
    aim is to learn from that and trade with what I now perceive to be the correct
    direction, only at a larger size.


    Essentially, my aim is to get out of every session with a net profit, and that’s
    all I’m trying to do. If I can earn anything north of 0.3 percent a day, I’m more
    than happy with that. The challenge is to be able to achieve that every day, though.


    **Bourquin:** What are the time frames that you ultimately determined work the
    best in your trading?


    **Wilson:** Well, I profile the session on a fifteen-minute chart and a five-minute
    chart, but I trade from the one-minute chart.


    **Bourquin:** And in those four hours each morning that you trade before going
    to work, how many opportunities do you typically find on any given day?


    **Wilson:** If I could get to where I want to be, it would be between six and
    ten. There’s certainly that much energy in the market, and swings tend to be between
    fifteen and forty pips at any one time, but it really depends on what sort of
    market you profile going in.'
