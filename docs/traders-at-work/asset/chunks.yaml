- fmt: '**Gordon:** Yes, exactly. Just taking the same business model I’ve found success
    in previously. If we put out a research trade call, we will have supported it
    with hours of chart analysis, correlations, and reasoning. Our research clients
    are not at all surprised when we put on a trade, because we have typically been
    walking them through the background of the trade for several hours or even days
    prior. Dave and I also started a money management business called `FGP` [Floyd,
    Gordon & Partners], and we have some investors, so we’ll execute our trading ideas
    there as well.


    Our feeling has always been that if we’re going to put out research and trading
    ideas to clients, there’s no reason not to be confident enough in those ideas
    to place real trades on them. We have a tremendous amount of confidence in our
    research, so it just makes sense to actually trade them. We make money for our
    investors and add another level of credibility to our research side of the business.


    I’m sure there are people out there who talk one way to clients and then trade
    another way in their accounts. I like to sleep at night and have a clear conscience.
    If I’m talking about it to our clients, I should be willing to put my own money
    behind those ideas.


    **Bourquin:** I think that a lot of people are doing newsletters and putting out
    calls on Twitter or blogs, and they may be putting out a call and telling you
    what they’re trading, but they don’t give you the reasoning behind it. Maybe because
    they’re afraid that if they tell their followers what their “secret sauce” is,
    a client or a subscriber won’t stay. But you don’t seem to have that issue. You
    explain exactly the reasoning behind it and why you’re doing the trade.


    **Gordon:** It reminds me of the movie *Blue Chips*, starring Nick Nolte. Did
    you ever see that movie? In it, Nick Nolte is the basketball coach and he’s giving
    a pep talk to his team. He tells his team that, as far as he is concerned, he
    can walk over to the opposing coach and hand him their playbook and entire strategy
    for winning the game. It doesn’t matter, because the plan and the strategy isn’t
    the important part. The execution and implementation of the plan is all that matters.
    The skill of putting the plan into place is where the game is won. There is no
    Holy Grail in trading. There is no strategy that is unique or hasn’t been tried.
    There is nothing new under the sun in terms of strategies, trust me. It’s all
    about your skill, your discipline, and your execution.


    I would love for every one of my research clients to know exactly what I know
    in terms of our style of trading, but it’s not going to make them the best trader.
    They have to have discipline and execution skills, and that’s something that only
    comes with tons of repetition and practice.


    **Bourquin:** A lot of traders out there who are trading their own accounts dream
    of doing it full-time or trading for a hedge fund. Do you trade differently when
    you’re trading with a fund than you would in your personal account?


    **Gordon:** That’s an interesting question. I’ve heard that some traders are more
    careful with funds they manage and take more risk in their personal accounts.
    But for me, my strategy is my strategy, and the risk doesn’t change just because
    I’m trading the fund or my own money. Now, of course, I trade significantly larger
    size in the hedge fund. But the risk and methods are exactly the same as my own
    account. To me, if you believe in your trading ideas and have proven that they
    work, there’s no reason to take on any more or any less risk in different accounts
    you trade. It’s just a numbers game. If your strategy says you are risking 2 percent
    on a trade, all that changes is the dollars that 2 percent represents in the different
    sized accounts—personal or hedge fund.


    We have a whole school of thought for what we call “T rankings” for our clients.
    We help them set up a risk profile for themselves and their trading accounts.
    We help them determine their goals in the market and then figure out a strategy
    that will yield a percent risk they will take on in their trades. It’s just a
    numbers game. You execute the same way. It doesn’t matter if you have a large
    amount of capital or a small amount of capital, it’s all based on what your goals
    are in trading and what your percent risk is on each trade. Then you simply execute
    on that strategy.


    **Bourquin:** What advice do you have for somebody who is starting out in trading
    and wants to cut their learning curve down from five years? Is there a way to
    do that? I don’t want to say “shortcut,” because I don’t know that there are any
    real shortcuts, but are there things that you would do differently if you started
    out right now?


    **Gordon:** No, I wouldn’t change anything. Trading is a game of skill. The only
    way to improve any skill is with practice, discipline, and lots of repetition.
    It’s something that is going to take you a while to get better at, and everyone
    who wants to make money consistently has to understand that. There are no “born”
    traders. Some people may pick it up faster than others, but no one just picks
    it up and is instantly wealthy. It’s just like learning chess: it’s going to take
    you a couple of years with a lot of dedication to compete with the best in the
    field, just like any skill game out there. Unfortunately, there are no shortcuts.


    On the other hand, you can become good at this with good old hard work. It’s a
    lot of fun, but it’s a process. The only thing I would say to people is, don’t
    come in here and, pardon the expression, half-ass it. If you want to be a good
    trader, dedicate yourself, study consistently, and get after it. This isn’t something
    you can pay someone to do for you. The best chat room or stock-picking service
    in the world can’t turn you into a good trader if you aren’t willing to put in
    the hard work—at least for a couple of hours a day. If you want to trade for entertainment,
    fine, but if you want to get good at it and make a living or career in the markets,
    just like anything else, you have to work at it.


    **Bourquin:** Talk about a typical day of trading for you. Forex is tough because
    it trades twenty-four hours a day for five and a half days. Lifestyle-wise, that’s
    got to be tough.


    **Gordon:** Yes, you can trade all day and night in foreign exchange trading,
    but our trading style means we don’t have to do that. If you’re a day trader,
    scalping in and out and trading London, Asia, and New York sessions, you might
    not get a lot of sleep. But these days, many things outside of currency trade
    around the clock. Maybe you’re into stock index futures, trading the `DAX` and
    the `S&P`, and then the `Nikkei` during the Asian sessions. We certainly don’t
    stay up late at night trading.


    In our positions, we’ll hold trades anywhere from half a session up to two to
    three sessions. For example, we’ve been in this Australian dollar trade since
    Wednesday. It’s now Friday and we’re going to carry a piece of it over the weekend.
    If we have a big trade on, maybe I’ll get up at night to just check on it. I’ll
    set an alarm for myself, so if the price gets to a certain point it will wake
    me up. But maybe one out of ten or fifteen trading nights, am I actually up looking
    at the markets. We have our stops and profit targets in place, so I don’t obsess
    over the positions. We set our trades up so that they transcend intraday price
    action. We put our stops far enough away, and it’s built into the risk profile
    so that a data report overnight is not going to really impact our trade.'
  raw: '**Gordon:** Yes, exactly. Just taking the same business model I’ve found success
    in previously. If we put out a research trade call, we will have supported it
    with hours of chart analysis, correlations, and reasoning. Our research clients
    are not at all surprised when we put on a trade, because we have typically been
    walking them through the background of the trade for several hours or even days
    prior. Dave and I also started a money management business called FGP [Floyd,
    Gordon & Partners], and we have some investors, so we’ll execute our trading ideas
    there as well.


    Our feeling has always been that if we’re going to put out research and trading
    ideas to clients, there’s no reason not to be confident enough in those ideas
    to place real trades on them. We have a tremendous amount of confidence in our
    research, so it just makes sense to actually trade them. We make money for our
    investors and add another level of credibility to our research side of the business.


    I’m sure there are people out there who talk one way to clients and then trade
    another way in their accounts. I like to sleep at night and have a clear conscience.
    If I’m talking about it to our clients, I should be willing to put my own money
    behind those ideas.


    **Bourquin:** I think that a lot of people are doing newsletters and putting out
    calls on Twitter or blogs, and they may be putting out a call and telling you
    what they’re trading, but they don’t give you the reasoning behind it. Maybe because
    they’re afraid that if they tell their followers what their “secret sauce” is,
    a client or a subscriber won’t stay. But you don’t seem to have that issue. You
    explain exactly the reasoning behind it and why you’re doing the trade.


    **Gordon:** It reminds me of the movie *Blue Chips*, starring Nick Nolte. Did
    you ever see that movie? In it, Nick Nolte is the basketball coach and he’s giving
    a pep talk to his team. He tells his team that, as far as he is concerned, he
    can walk over to the opposing coach and hand him their playbook and entire strategy
    for winning the game. It doesn’t matter, because the plan and the strategy isn’t
    the important part. The execution and implementation of the plan is all that matters.
    The skill of putting the plan into place is where the game is won. There is no
    Holy Grail in trading. There is no strategy that is unique or hasn’t been tried.
    There is nothing new under the sun in terms of strategies, trust me. It’s all
    about your skill, your discipline, and your execution.


    I would love for every one of my research clients to know exactly what I know
    in terms of our style of trading, but it’s not going to make them the best trader.
    They have to have discipline and execution skills, and that’s something that only
    comes with tons of repetition and practice.


    **Bourquin:** A lot of traders out there who are trading their own accounts dream
    of doing it full-time or trading for a hedge fund. Do you trade differently when
    you’re trading with a fund than you would in your personal account?


    **Gordon:** That’s an interesting question. I’ve heard that some traders are more
    careful with funds they manage and take more risk in their personal accounts.
    But for me, my strategy is my strategy, and the risk doesn’t change just because
    I’m trading the fund or my own money. Now, of course, I trade significantly larger
    size in the hedge fund. But the risk and methods are exactly the same as my own
    account. To me, if you believe in your trading ideas and have proven that they
    work, there’s no reason to take on any more or any less risk in different accounts
    you trade. It’s just a numbers game. If your strategy says you are risking 2 percent
    on a trade, all that changes is the dollars that 2 percent represents in the different
    sized accounts—personal or hedge fund.


    We have a whole school of thought for what we call “T rankings” for our clients.
    We help them set up a risk profile for themselves and their trading accounts.
    We help them determine their goals in the market and then figure out a strategy
    that will yield a percent risk they will take on in their trades. It’s just a
    numbers game. You execute the same way. It doesn’t matter if you have a large
    amount of capital or a small amount of capital, it’s all based on what your goals
    are in trading and what your percent risk is on each trade. Then you simply execute
    on that strategy.


    **Bourquin:** What advice do you have for somebody who is starting out in trading
    and wants to cut their learning curve down from five years? Is there a way to
    do that? I don’t want to say “shortcut,” because I don’t know that there are any
    real shortcuts, but are there things that you would do differently if you started
    out right now?


    **Gordon:** No, I wouldn’t change anything. Trading is a game of skill. The only
    way to improve any skill is with practice, discipline, and lots of repetition.
    It’s something that is going to take you a while to get better at, and everyone
    who wants to make money consistently has to understand that. There are no “born”
    traders. Some people may pick it up faster than others, but no one just picks
    it up and is instantly wealthy. It’s just like learning chess: it’s going to take
    you a couple of years with a lot of dedication to compete with the best in the
    field, just like any skill game out there. Unfortunately, there are no shortcuts.


    On the other hand, you can become good at this with good old hard work. It’s a
    lot of fun, but it’s a process. The only thing I would say to people is, don’t
    come in here and, pardon the expression, half-ass it. If you want to be a good
    trader, dedicate yourself, study consistently, and get after it. This isn’t something
    you can pay someone to do for you. The best chat room or stock-picking service
