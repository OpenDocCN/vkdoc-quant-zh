- fmt: '**Raschke:** Yes. Trading is all about going where the volatility and liquidity
    are. Volatility and liquidity point me to the opportunities, and then, for me,
    it’s just a matter of keeping the ideas that have worked and dumping the rest.
    I know that if I have eight positions on, perhaps five of them will be working,
    and I simply get rid of the ones that aren’t working or just aren’t hitting it
    right. It’s like when you’re dealt a hand of cards, you get rid of the crappy
    ones first and you keep the stuff that’s working for you. Managing those “hands
    of cards” [trades] quickly and without hesitation is where success is had in the
    markets.


    **Bourquin:** When you get into a trade, do you have an idea in terms of your
    profit targets and stop losses?


    **Raschke:** I always have an idea of risk, and I always know where my trade is
    going to be “wrong.” But I am just not a believer in looking at profit targets
    and deciding right away where I want to exit. I will watch the position, of course,
    to see how it reacts when it is near a previous high or a previous low. But once
    it has cleared those highs or lows, or it’s trending, I just absolutely do not
    believe in putting a limit on my profits. Sure, I have rough guidelines, but why
    would I tell myself I’m only going to make “X amount and then I’m out” if the
    market is going to give me more? The market tells me when it is time to exit.
    That’s not something I think a trader should tell the market.


    **Bourquin:** Do you scale into and out of positions?


    **Raschke:** No. I don’t scale into trades as a strict rule, especially if they
    are losers. I do not average losing trades. I might “nibble” a position and buy
    a small amount in a certain type of market. If that position holds well, I might
    buy a little more. But I never scale into trades that are going against me. So,
    I’ll nibble if what I am trading is in a range, and build up a position that way.
    I might have a spot where I’m very aggressive in adding to get to a full trade.
    More often than not, however, I’ll try to put my entire position on at once.


    **Bourquin:** How about exiting a position? Will you scale out or will you take
    it all out at once?


    **Raschke:** That depends on the market I’m trading and why I made the trade in
    the first place. Usually, if it’s just a short time-frame trade, what I would
    call a scalp, I don’t scale out. For quick trades, I’m all in and I’m all out
    when I see a spot where I believe the trade is finished. But there are other cases
    when our models suggest scaling out would be a good strategy and we want to lock
    in some profit, but I’m not entirely convinced the move is over. In these instances,
    I’ll put in a trailing stop and take some of the position off. Overall, though,
    I like to keep things simple and just go all in and all out at once.


    **Bourquin:** Do you have a “favorite” type of trade you like to take whenever
    possible?


    **Raschke:** Everything is so unique and fluid. No two trades are exactly alike.
    It bothers me that the industry talks about, for example, “bull flags” or “bear
    flags,” like they are perfect chart patterns that are easily recognized each time.
    The markets just don’t work like that. I like to think of patterns in terms of
    “bull traps” and “bear traps.” A bull trap would be something like when markets
    flush out of a trading range and people get a little bullish on the false breakouts.
    Then, when they start to come back toward the range, they tend to create little
    vacuums as traders who were fooled by the false breakout start to rush to close
    their positions. Experienced traders can be very aggressive on those types of
    trades.


    Even trades that look great don’t always work out. I feel very, very lucky recently
    that I did exit some trades and didn’t get nailed on a snapback or give back too
    much profit. A great trade for me is not so much that it worked perfectly because
    I got a perfect entry and perfect exit. I kind of look at my great trades as,
    “Did I dodge any bullets in getting out on a timely basis?” There have been a
    couple of times where I have fabulous profits in the bonds and I didn’t take my
    trade off because my model was still saying there should be a continuation and
    it didn’t happen, so I gave back profit.


    What you have to keep in mind is that you really can’t look at any individual
    trade as perfect. I think it’s more important that you understand that whatever
    you do, do it consistently.


    If you’re going to trail stops, trail stops on every position and do it consistently
    the same way on every trade. If you’re going to exit when it looks like the markets
    are getting choppy and take your trade off because you feel it has reached a climax,
    do that every time. But then don’t cry when it goes up another ten days and leaves
    you in the dust. Success in trading is a progression—not trying to find the perfect
    trade every time.


    I know I’m going to have good trades and not-so-good trades, and I never know
    which days will be winners and losers. What I do know is if I play my game consistently,
    then a certain percentage of the time I’ll make profitable trades. I can’t tell
    you how many trades I’ve gotten out of way, way too early and how many trades
    I’ve gotten out of a little bit too late. That’s just the way trading works. Be
    consistent with your strategy, and over time you can make money.


    All you can do is position yourself where there are opportunities and do it the
    same way every time.


    **Bourquin:** Do you make most of your money trading on just a few trades each
    month?


    **Raschke:** Sure. I probably make 80 percent of my money on 20 percent of my
    trades. Even for short-term scalpers I think that’s the case. I was talking to
    a couple floor traders lately, and even when you’re a pit trader on the floor
    of an exchange, maybe 80 percent of your year comes from just two or three good
    months. There are certain periods in the market when there is exceptional volume
    or volatility, and you just happen to be in sync with it and you’ve positioned
    yourself to profit from that opportunity. There will be other times when you just
    have no idea what’s going on. It’s those times where you have a good feel for
    the market and it is giving you those great opportunities that you make the bulk
    of your profits.


    **Bourquin:** You’ve mentioned models for your trading a few times. Are you talking
    about computer models to help you find good trades?


    **Raschke:** Yes, I always like to quantify everything just so that I know that
    my mind is not playing tricks on me because, trust me, as traders we all tend
    to see what we want to see in the markets. The computer models quantify things
    for me to make sure that I am reading things correctly. It’s not some sort of
    automated program that buys and sells for me. It just helps me identify the things
    I should be monitoring.


    It also helps put things in a historical context. For example, a model might show
    me that we’ve just traded three days low to high and it’s still in a range. What
    are the odds that we’re going to have another day of trading between the low and
    the high in a range? It might be time to watch for a breakout or breakdown outside
    of that range. Or, if I’m bullish on silver and it’s had a huge up day, what are
    the odds that we’re going to get a second, back-to-back big up day in silver again?
    It’s probably going to be pretty remote. The models just keep me in check, and
    on a daily basis they help me read the markets.


    **Bourquin:** You trade a lot of different markets. Do you find something to trade
    in at least one of them every day?'
