  trans: '**布尔昆：** 最近和某人聊天时，他对我说，如果大多数交易者能坚持自己已经掌握的方法——而不是试图在各类市场、指标、图表或时间框架之间来回跳跃——他们最终很可能赚到钱。


    问题在于，当他们尝试了几笔交易却没赚到钱时，就会转向其他东西，接着又是另一个，又一个……你是否同意，如果大多数人只专注于精通一件事，他们最终就能成功？


    **卡特：** 当然同意，我也正是这么认为的。实际情况就是如此。他们就像不停地追逐下一个闪闪发光的新事物，却没有先建立自己的交易哲学基础，也不清楚自己到底想做什么。


    其实，仅凭一条二十一周期移动平均线这样简单的工具，你就能谋生。你可以用它在五个不同的市场上观察，这完全没问题。然而，如果你用某个方法赚不到钱，然后试图在别的市场如法炮制，猜猜会怎样？你在那里同样赚不到钱。


    **布尔昆：** 考虑到互联网泡沫崩盘等因素，过去八九年里，你的交易方法有没有发生很大变化？还是说，你仍然沿用着大部分同样的策略？


    **卡特：** 天哪，这是个好问题。基于市场本身的性质，方法并没有太大变化，尽管我们没再经历像上世纪九十年代那样的大牛市。不过，我发现我持仓的时间没那么长了。现在，我觉得六周在交易中就算很长了，再往后就属于更短期的交易了。此外，我现在更积极地止盈离场。


    随着时间的推移，我发现我其实不太在意自己交易的是什么品种了。我不会想：“嗯，我看涨原油，所以我要买入获利。” 关键在于寻找从市场中获利的机会，而这很大程度上取决于你所见到的行情。例如，如果我看到一个市场急剧下跌，我知道很可能有很多人正在被洗出局。我会寻找那里的机会，抓住它，然后离场。我可以告诉你，我日内交易时大约有
    75%的时间是空仓的，只是在等待。


    **布尔昆：** 我们来谈谈你会执行的一笔常规交易。什么因素会促使你进行这笔交易？


    **卡特：** 我最近在万事达卡上做了一笔教科书式的交易，我真的非常喜欢。我会寻找股票，比如在财报或其他新闻公布之后。万事达卡在财报后跳空高开并创出高点，然后开始回调。那时，我就在等待该股掉头向上，试图再次测试并突破近期高点。


    我一直等到该股开始转向走高，然后开始分批建仓。之后，我寻找从财报后近期高点至回调低点这一波行情的 127.2%斐波那契扩展位。在这个例子中，这大约是一个 3
    到 4 美元的波动，而对我来说，这就是一笔稳定盈利的交易。


    接下来发生的是，我买入并隔夜持仓，第二天，股价推高，突破了前一日的高点，一路涨到那个 127.2%扩展位，我就在那里离场了。后来它其实又涨了十个点，但那就是我设定的形态和目标位，所以我很乐意放弃后面多余的利润。


    同样的策略既适用于上涨也适用于下跌，我之所以喜欢它，是因为你不用一直坐着，持仓好几天，心里还琢磨着它会往哪儿走。你有明确的入场形态和明确的目标，只需要决定用多少合约来交易就行了。


    **布尔昆：** 你会纯粹因为技术形态而交易一只股票吗？即使你完全不了解这家公司是做什么的，他们的财报如何，以及其他基本面因素怎么样？


    **卡特：** 这是个好问题，但我很难回答，因为我交易的股票大部分我都不陌生。说实话，我重点关注的主要股票包括苹果、谷歌、Priceline，以及其他交易非常活跃、走势迅猛、期权流动性充足的股票。


    我想，在过去，股票是什么并不重要，但我现在不会在盘中筛选，只为了找出当天创下新高的股票或其他类似的东西。我关注的股票池只有大约十只，而且我对它们已经非常熟悉了。我观察它们的小时图、十五分钟图和五分钟图，仅在这个范围内就有很多机会。


    **布尔昆：** 你是在家里交易还是在办公室？


    **卡特：** 我有一个办公室。我在家交易过一段时间，后来我妻子得了种奇怪的“病”——开始生孩子了！我们现在有三个小孩，分别是六岁、四岁和两岁。我其实喜欢在家工作，有时候还怀念那段日子，但我发现，加上孩子们在屋里跑来跑去的吵闹，很难进行交易。


    现在我有三套公寓，离家只有四英里，其中一套我用来交易。另外两套用来运营我们的网站：[TradeTheMarkets.com](http://TradeTheMarkets.com)
    和 [SimplerOptions.com](http://SimplerOptions.com)。我们目前雇佣了一个大约十人的团队，他们负责网站维护、客户服务，还有几个帮我分析交易。


    不过，大多数情况下，我都是自己独立交易我的账户，并与他人合作进行一些联合项目——我们共同操作一个账户，这种组合很不错。作为一名交易员，不仅有独立操作自己账户的自由，同时还能与他人合作共事，这是很有价值的。而且，这也很有趣。


    **布尔昆：** 说到交易的业务层面，你有没有考虑过管理资金？


    **卡特：** 你问得真巧，因为我实际上刚刚启动了一隻商品交易顾问基金，叫做 Razor Trading，同时还推出了一项期权自动交易服务。就我个人而言，我不介意在自己的账户上承担大量风险，尽管投资者一开始总会说，尽管为他们照做不误，但他们一看到首次回撤就会开始恐慌。所以，你真的必须预料到这一点，并准备好应对随之而来的所有电话和邮件。


    然而，当我想到外面有多少人的钱放在银行里收益率为零时，它其实不需要是一个非常庞大的基金。即使是一个每年赚取 20%的小基金，对于那些投资者来说也是有价值的服务，而且从商业角度来看，也是一个不错的额外收入来源。


    **布尔昆：** 让我们再回到你的交易方法上，你晚上会做功课吗？在非交易时段，你花了多少时间做与交易相关的事情？


    **卡特：** 少得惊人。我过去常常花好几个小时看图表，但现在我每天收盘后只花大约 45 分钟——很多时候，我会把这段时间录下来，作为晚间新闻简报的一部分。


    我发现，回报与你盯着图表的时间并不成正比，这很奇怪，因为传统观点认为，你做的研究越多，赚的钱就越多。但在交易中，这并不成立。


    真正成立的是，那些以开放心态、不带预期进入市场的人，更有机会赚钱。我认为，拥有这种心态更为重要，所以我总是提倡锻炼以及其他远离市场的活动，这样你才能带着休息好、放松的状态回来，随时准备开始交易，可以这么说。'
- fmt: '**Bourquin:** Earlier, you mentioned the five-year learning curve for new
    traders, but how long did it take you to feel confident enough in your strategy,
    your methods, and your ability as a trader that you could consistently make money
    doing this?


    **Carter:** It probably took me a little more than five years. There are some
    things you can’t really learn about in books and have to experience them instead.
    You’ve got to get “kicked in the teeth,” as they say, and you’ve got to get into
    some situations that you didn’t plan for. Through it all, the trick is not to
    get too cautious, because that’s even worse than being too courageous. The fine
    line between caution and courage is a trader’s ideal state of mind.


    **Bourquin:** Do you still go through trading slumps?


    **Carter:** Sure, and anytime I do, it means there’s something serious going on,
    or it could be caused by outside factors in my life.


    The single worst trade I took in 2011 was taken right before I got on a plane
    and went away for a couple of weeks. I had a great six months before that, but
    in that case, I got careless. When you don’t pay attention to the garden, that’s
    when it grows weeds, and the same can be true in trading.


    Maybe sometimes those trades work out really well, but if ever I find myself getting
    a little too blasé about trades, I’ve got to reel back in and be disciplined.
    You always want to have a healthy discipline, a healthy fear, and a healthy respect
    for the market when trading.


    **Bourquin:** Was that $142,000 loss you sustained early on the biggest one of
    your career?


    **Carter:** My accounts have grown a lot since then, so I’ve actually had bigger
    dollar losses than that. But percentage-wise, I’ve never again been on the wrong
    side of a move as big and nasty as that one.


    **Bourquin:** How about the best trade you’ve ever had? How much did you make
    on that one?


    **Carter:** Well, the most I’ve ever made in one day was in an option trade on
    Goldman Sachs. That ended up being about a $250,000 up day.


    It was a day that SEC news came out, and the stock dropped by about $20 per share.
    I saw it and just started loading up on options. At one point, I think I had five
    hundred option contracts on it. It was one of those trades that was right there,
    so I got focused and trailed a stop, and the result was a fantastic trade that
    happened very quickly.


    **Bourquin:** When you start dealing with numbers that size, do you still get
    nervous while you’re trading, or can you remain comfortable, even when dealing
    in such big volume?


    **Carter:** I’m actually fairly comfortable, but I do get extremely focused. If
    it’s a big trade, I’m not going to get up or leave the computer, but I won’t be
    freaking out while I’m trading, either.


    I always equate P&L management to exercise. The first time you do a bench press,
    you may be able to do one hundred pounds, and maybe a month later, you can go
    to one hundred and ten, and then one hundred and thirty, and so on. It’s the same
    thing with trading. The first time I lost $1,000, I threw up, but the next time,
    it wasn’t that bad. Then, the first time you lose $10,000, you might throw the
    keyboard against the wall, but the next time, it’s not that bad. You actually
    build up your intestinal fortitude and what you can and can’t handle as a trader.


    The John Paulsons of the world are managing huge sums of money and dealing with
    fluctuations in the hundreds of millions of dollars, but they’re just kind of
    used to it.


    Today, if I’m taking a smaller trade, like ten contracts, or playing around with
    a couple thousand dollars, to me, that’s as close to unemotional as I can get,
    because it really isn’t going to have an impact on me. But for somebody else,
    who’s just starting out, that could be their entire life. It’s interesting to
    think of it that way, but it’s just going to be different for everybody.


    **Bourquin:** Should that be the goal for everybody: to try to get to the point
    where, regardless of the amount of money that is on the table, it doesn’t trigger
    emotions, butterflies, or dreaded gut feelings?


    **Carter:** That actually is the goal, and the reason everybody does well when
    trading a demo account is because they have no emotion in it. When trading real
    money, however, the emotions we feel are usually proportionate to the size of
    the trade.


    I still consider that to this day. If I start feeling overly anxious about a trade
    and keep checking quotes, I’ll sell a third of the position. Then, suddenly, I’m
    much calmer and more objective, which is where I need to be to trade well and
    avoid emotional mistakes.


    **Bourquin:** Let’s briefly turn our attention to the business side of things
    and `TradeTheMarkets.com` and `SimplerOptions.com`. How did you come to decide
    that there was an opportunity to start teaching people how to trade?


    **Carter:** It was because we had reached a point where many people were struggling.
    Everybody looked like a genius during the tech bubble, but for many, it all changed
    after that. We still felt that it was a great trading environment, though, so
    we started posting ideas and showing people how to short something or buy puts.
    For some, it was the first time they had ever heard about that.


    **Bourquin:** There’s this idea in the trading industry that if you’re really
    a good trader, there’s no reason why you should have a service, because you could
    just make all your money trading. How do you feel about that?


    **Carter:** That’s true, and the usual question is, “Well, if you’re so good at
    this, why are you teaching it?” I believe that’s a valid question. There are people
    out there who are believable teachers but have never actually traded, and that’s
    what I think makes it a legitimate question.


    To me, the honest answer is because it’s a great business. It’s very scalable,
    it’s repeatable, and if you can provide quality content and help people, they’re
    going to stick around.


    **Bourquin:** When it comes to those who teach and don’t trade, sometimes the
    concern is that maybe the stuff they’re teaching worked five years ago, but it
    doesn’t work anymore, and that’s why they’re not trading.


    **Carter:** I’ve seen that, too, and I think if you’re going to teach, you absolutely
    have to stay current, and you have to be trading. The only way to be able to adapt
    and understand the markets is if you’re actually trading yourself. This is why
    I teach all of my courses in the context of live markets and not with PowerPoint
    decks that look back on the markets in hindsight. I execute real trades in my
    own account during these courses, and my students can see my P&L. If I held a
    course where nothing I did worked and every trade I made lost money, I wouldn’t
    have a reason to teach anymore.


    **Bourquin:** Certainly aside from paying thousands of dollars for a course that
    promises to make great traders overnight, is there any way for new traders to
    legitimately shorten the learning curve and achieve results faster?


    **Carter:** You’re exactly right that the answer is *not* buying some $5,000 educational
    course. Nothing against those courses, but there is no shortcut, in terms of a
    course.


    The shortcut is this: Treat *every* trade like a professional trader would. By
    that, I mean that you should size the position correctly, cut your losses fast,
    and let your winners run. That is the mindset of a professional, and new traders
    who follow it *without exception* can shorten the learning curve. Actually, they
    can do well from day one.


    Unfortunately, the market is very good at reinforcing bad habits, and it often
    requires difficult lessons to learn what’s right and what’s wrong. Removing a
    stop may work the first time, so the new trader will keep doing that, but it’s
    a bad habit that could come back and ruin them at some point.'
  raw: '**Bourquin:** Earlier, you mentioned the five-year learning curve for new
    traders, but how long did it take you to feel confident enough in your strategy,
    your methods, and your ability as a trader that you could consistently make money
    doing this?


    **Carter:** It probably took me a little more than five years. There are some
    things you can’t really learn about in books and have to experience them instead.
    You’ve got to get “kicked in the teeth,” as they say, and you’ve got to get into
    some situations that you didn’t plan for. Through it all, the trick is not to
    get too cautious, because that’s even worse than being too courageous. The fine
    line between caution and courage is a trader’s ideal state of mind.


    **Bourquin:** Do you still go through trading slumps?


    **Carter:** Sure, and anytime I do, it means there’s something serious going on,
    or it could be caused by outside factors in my life.


    The single worst trade I took in 2011 was taken right before I got on a plane
    and went away for a couple of weeks. I had a great six months before that, but
    in that case, I got careless. When you don’t pay attention to the garden, that’s
    when it grows weeds, and the same can be true in trading.


    Maybe sometimes those trades work out really well, but if ever I find myself getting
    a little too blasé about trades, I’ve got to reel back in and be disciplined.
    You always want to have a healthy discipline, a healthy fear, and a healthy respect
    for the market when trading.


    **Bourquin:** Was that $142,000 loss you sustained early on the biggest one of
    your career?


    **Carter:** My accounts have grown a lot since then, so I’ve actually had bigger
    dollar losses than that. But percentage-wise, I’ve never again been on the wrong
    side of a move as big and nasty as that one.


    **Bourquin:** How about the best trade you’ve ever had? How much did you make
    on that one?


    **Carter:** Well, the most I’ve ever made in one day was in an option trade on
    Goldman Sachs. That ended up being about a $250,000 up day.


    It was a day that SEC news came out, and the stock dropped by about $20 per share.
    I saw it and just started loading up on options. At one point, I think I had five
    hundred option contracts on it. It was one of those trades that was right there,
    so I got focused and trailed a stop, and the result was a fantastic trade that
    happened very quickly.


    **Bourquin:** When you start dealing with numbers that size, do you still get
    nervous while you’re trading, or can you remain comfortable, even when dealing
    in such big volume?


    **Carter:** I’m actually fairly comfortable, but I do get extremely focused. If
    it’s a big trade, I’m not going to get up or leave the computer, but I won’t be
    freaking out while I’m trading, either.


    I always equate P&L management to exercise. The first time you do a bench press,
    you may be able to do one hundred pounds, and maybe a month later, you can go
    to one hundred and ten, and then one hundred and thirty, and so on. It’s the same
    thing with trading. The first time I lost $1,000, I threw up, but the next time,
    it wasn’t that bad. Then, the first time you lose $10,000, you might throw the
    keyboard against the wall, but the next time, it’s not that bad. You actually
    build up your intestinal fortitude and what you can and can’t handle as a trader.


    The John Paulsons of the world are managing huge sums of money and dealing with
    fluctuations in the hundreds of millions of dollars, but they’re just kind of
    used to it.


    Today, if I’m taking a smaller trade, like ten contracts, or playing around with
    a couple thousand dollars, to me, that’s as close to unemotional as I can get,
    because it really isn’t going to have an impact on me. But for somebody else,
    who’s just starting out, that could be their entire life. It’s interesting to
    think of it that way, but it’s just going to be different for everybody.


    **Bourquin:** Should that be the goal for everybody: to try to get to the point
    where, regardless of the amount of money that is on the table, it doesn’t trigger
    emotions, butterflies, or dreaded gut feelings?


    **Carter:** That actually is the goal, and the reason everybody does well when
    trading a demo account is because they have no emotion in it. When trading real
    money, however, the emotions we feel are usually proportionate to the size of
    the trade.


    I still consider that to this day. If I start feeling overly anxious about a trade
    and keep checking quotes, I’ll sell a third of the position. Then, suddenly, I’m
    much calmer and more objective, which is where I need to be to trade well and
    avoid emotional mistakes.


    **Bourquin:** Let’s briefly turn our attention to the business side of things
    and [TradeTheMarkets.com](http://TradeTheMarkets.com) and [SimplerOptions.com](http://SimplerOptions.com).
    How did you come to decide that there was an opportunity to start teaching people
    how to trade?


    **Carter:** It was because we had reached a point where many people were struggling.
    Everybody looked like a genius during the tech bubble, but for many, it all changed
    after that. We still felt that it was a great trading environment, though, so
    we started posting ideas and showing people how to short something or buy puts.
    For some, it was the first time they had ever heard about that.


    **Bourquin:** There’s this idea in the trading industry that if you’re really
    a good trader, there’s no reason why you should have a service, because you could
    just make all your money trading. How do you feel about that?


    **Carter:** That’s true, and the usual question is, “Well, if you’re so good at
    this, why are you teaching it?” I believe that’s a valid question. There are people
    out there who are believable teachers but have never actually traded, and that’s
    what I think makes it a legitimate question.


    To me, the honest answer is because it’s a great business. It’s very scalable,
    it’s repeatable, and if you can provide quality content and help people, they’re
    going to stick around.


    **Bourquin:** When it comes to those who teach and don’t trade, sometimes the
    concern is that maybe the stuff they’re teaching worked five years ago, but it
    doesn’t work anymore, and that’s why they’re not trading.


    **Carter:** I’ve seen that, too, and I think if you’re going to teach, you absolutely
    have to stay current, and you have to be trading. The only way to be able to adapt
    and understand the markets is if you’re actually trading yourself. This is why
    I teach all of my courses in the context of live markets and not with PowerPoint
    decks that look back on the markets in hindsight. I execute real trades in my
    own account during these courses, and my students can see my P&L. If I held a
    course where nothing I did worked and every trade I made lost money, I wouldn’t
    have a reason to teach anymore.


    **Bourquin:** Certainly aside from paying thousands of dollars for a course that
    promises to make great traders overnight, is there any way for new traders to
    legitimately shorten the learning curve and achieve results faster?


    **Carter:** You’re exactly right that the answer is *not* buying some $5,000 educational
    course. Nothing against those courses, but there is no shortcut, in terms of a
    course.


    The shortcut is this: Treat *every* trade like a professional trader would. By
    that, I mean that you should size the position correctly, cut your losses fast,
    and let your winners run. That is the mindset of a professional, and new traders
    who follow it *without exception* can shorten the learning curve. Actually, they
    can do well from day one.


    Unfortunately, the market is very good at reinforcing bad habits, and it often
    requires difficult lessons to learn what’s right and what’s wrong. Removing a
    stop may work the first time, so the new trader will keep doing that, but it’s
    a bad habit that could come back and ruin them at some point.'
  trans: '

    **Bourquin：** 此前，你提到新交易员需要五年的学习曲线，但你自己花了多久才对自己的策略、方法以及作为交易员的能力建立起足够信心，从而能持续稳定盈利？


    **Carter：** 我大概花了五年多的时间。有些东西是书本上学不到的，必须亲身经历。就像人们说的，你得“被踢到牙齿”，得遇到一些计划外的状况。关键在于，面对这一切时，不能变得过于谨慎，因为过于谨慎比过于勇敢更糟糕。谨慎与勇气之间的那条微妙界线，才是交易员最理想的心态。


    **Bourquin：** 你现在还会经历交易低谷吗？


    **Carter：** 当然会，而且每当我遇到低谷，就意味着要么出了什么严重的问题，要么是生活中的外部因素在影响我。


    2011 年我做的最糟糕的一笔交易，就在我登机外出一两周之前。在那之前的六个月我做得很好，但那一次，我粗心了。当你疏于打理花园时，杂草就会丛生，交易也是如此。


    也许有时候那些交易结果还不错，但一旦我发现自己对交易有点过于漫不经心，我就必须收敛回来，保持自律。做交易时，你始终要对市场保持一种健康的纪律、健康的畏惧和健康的尊重。


    **Bourquin：** 早年那次亏损 14.2 万美元是你职业生涯中最大的一笔亏损吗？


    **Carter：** 自那以后我的账户规模增长了很多，所以实际的美元亏损额其实更大。但从百分比来看，我再也没有像那次一样，在如此巨大且恶劣的行情中站在错误的一方。


    **Bourquin：** 那么你做过的最棒的一笔交易呢？那次赚了多少？


    **Carter：** 嗯，我单日赚得最多的一次是做高盛的期权交易。那天最终盈利大约 25 万美元。


    那天美国证券交易委员会（SEC）发布了一则消息，股价每股下跌了约 20 美元。我看到了，就开始大量买入期权。有那么一刻，我记得我手里有 500 份该股票的期权合约。那是一笔机会就在眼前的交易，于是我集中精力，设置并跟踪了止损，结果就是一次极其迅速的精彩交易。


    **Bourquin：** 当你开始操作如此大规模的资金时，交易中还会紧张吗？还是即便处理这么大的交易量，也能保持从容？


    **Carter：** 实际上我相当从容，但会变得极度专注。如果是笔大交易，我不会起身或者离开电脑，但也不会在交易时惊慌失措。


    我总是把盈亏管理比作锻炼身体。你第一次做卧推，可能只能推 100 磅，一个月后，你能推到 110 磅，然后是 130 磅，以此类推。交易也是同样的道理。我第一次亏掉
    1000 美元时，直接就吐了，但下一次，就没那么糟了。然后，当你第一次亏掉 1 万美元时，你可能会把键盘摔到墙上，但下一次，也没那么糟了。实际上，你是在逐步建立起自己的“胆量”，以及作为一个交易员所能承受和不能承受的极限。


    像约翰·保尔森这样的人管理着巨额资金，应对着数亿美元的波动，但他们只是习惯了而已。


    如今，如果我做一笔小交易，比如 10 手合约，或者拿几千美元玩玩，对我来说，这已经接近毫无情绪的状态了，因为这笔钱真的不会对我产生什么影响。但对于一个刚刚起步的人来说，这可能就是他的全部身家。从这个角度想挺有意思的，但对每个人来说，情况都不同。


    **Bourquin：** 这是否应该成为每个人的目标：努力达到一个境界，无论桌上的金额多大，都不会引发情绪波动、心慌或令人生畏的直觉？


    **Carter：** 这确实是目标。每个人在模拟盘交易时表现良好的原因，就是因为他们不带感情。然而，当交易真金白银时，我们感受到的情绪通常与交易规模成正比。


    直到今天我仍然遵循这一点。如果我对某笔交易感到过度焦虑，不停查看报价，我就会卖出三分之一仓位。然后，我突然就冷静多了，也客观多了，这正是我需要达到的状态，以便做好交易并避免情绪化错误。


    **Bourquin：** 让我们简单谈谈业务层面，以及`TradeTheMarkets.com`和`SimplerOptions.com`。你是如何认定存在一个机会，可以开始教人们如何做交易的？


    **Carter：** 是因为我们到了很多人都挣扎求存的阶段。在科技泡沫期间，每个人都看起来像个天才，但对许多人来说，那之后一切都变了。不过我们仍然觉得那是一个很好的交易环境，于是我们开始发布想法，教别人如何做空或买入看跌期权。对一些人来说，那是他们头一回听说这些。


    **Bourquin：** 交易行业里有这样一种观点：如果你真的是一个好交易员，你就没有理由去做教学服务，因为你完全可以通过交易赚到所有的钱。你对此怎么看？


    **Carter：** 没错，常见的问题就是：“嗯，如果你在这行这么厉害，为什么还要教别人呢？” 我认为这是个合理的问题。确实有一些看似可信的导师，但他们从未真正交易过，我认为这正是这个问题的合理之处。


    对我来说，诚实的答案是，因为这是一门很好的生意。它非常具有可扩展性，可重复性强，而且如果你能提供高质量的内容并帮助到别人，他们就会留下来。


    **Bourquin：** 谈到那些只教学却不做交易的人，有时大家担心的是，也许他们教的东西五年前有效，但现在已经不灵了，这正是他们自己不交易的原因。


    **Carter：** 我也见过这种情况。我认为如果你打算教别人，你绝对必须紧跟市场，并且自己必须亲自交易。能够适应和理解市场的唯一方法，就是你自己实际上在做交易。这就是为什么我所有的课程都是在实时市场环境下进行的，而不是用那些事后回顾市场的
    PPT 幻灯片。在这些课程中，我会用我自己的账户执行真实的交易，我的学生可以看到我的盈亏状况。如果我搞了一堂课，里面我做的每件事都不奏效，每笔交易都亏钱，那我也就没有理由再教下去了。


    **Bourquin：** 当然，除了花几千美元报一个承诺能一夜之间培养出优秀交易员的课程之外，有没有什么方法能让新交易员合法地缩短学习曲线，更快取得成果？


    **Carter：** 你说得完全正确，答案*不是*去买什么 5000 美元的教育课程。我对这些课程没有意见，但就课程本身而言，没有捷径可走。


    捷径是这样的：像专业交易员一样对待*每一笔*交易。我的意思是，你应该正确配置仓位，迅速止损，让利润奔跑。这就是专业人士的心态，而*毫无例外*地遵循这一点的交易新兵，确实可以缩短学习曲线。事实上，他们从第一天起就能做得好。


    不幸的是，市场非常擅长强化坏习惯，并且通常需要付出惨痛的学习代价才能明白什么是对的，什么是错的。第一次取消止损可能管用，于是新交易员会继续这么做，但这是一个坏习惯，它迟早会回过头来毁掉他们。

