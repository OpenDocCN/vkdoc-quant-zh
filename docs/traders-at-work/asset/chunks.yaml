- fmt: '# 交易策略与市场分析


    有时市场上不会有太多动能或波动性，你等待四个小时的机会可能也不会出现。在其他时候，机会则会多得多。


    关键在于对市场进行画像：如果市场处于趋势行情中，我会使用动态支撑位或阻力位；如果我认为市场处于区间盘整或下跌行情，我更倾向于使用静态或水平支撑位和阻力位进行交易。


    **Bourquin：** “动态”支撑位和阻力位与“静态”的有何不同？


    **Wilson：** 动态支撑位和阻力位是通过移动平均线或布林带等技术指标来确定的——基本上是那些能够动态追踪价格走势的工具。


    关键在于让自己处于这样一种情境：如果交易失败，你能从中了解一些市场情绪。如果你试图在盘整区间的中间位置交易动态支撑位或阻力位，那么你的交易可能会失败，而你实际上对市场情绪一无所知。


    **Bourquin：** 很多在交易的同时还要兼顾工作的交易者，如果交易信号正好在他们交易时段结束时、即将上班前出现，他们往往难以决定该如何操作。你会在离开前平掉所有交易吗？对于这种临结束前出现的交易，你如何决定是否入场？


    **Wilson：** 嗯，我大部分交易的持仓时间最多半小时。到那时，市场就已经证明我是对是错了。所以，只要我至少有30分钟的空闲，我就会做这笔交易。但不管发生什么，一旦到了该离开操作终端的时间，我会平掉所有交易的头寸。


    **Bourquin：** 这是一种强制性的自律，无论是及时止损，还是见好就收并放弃获取更多收益的可能性。


    **Wilson：** 没错，我绝不想以一个亏损甚至是一笔赔钱的交易来结束一个交易时段。所以，如果我已经有一两笔盈利的交易在手，我就不会做那最后一笔交易，无论它看起来有多好。


    **Bourquin：** 你有最喜欢关注的几个货币对吗？


    **Wilson：** 我只关注一个货币对——欧元/美元（`EUR/USD`）——这是有原因的：它流动性最强，因此能让我最清晰地透视市场心理，而我认为我交易的实际就是市场心理。


    无论`EUR/USD`的报价是`1.3150`还是`1.4150`，对我来说真的没什么区别。我所做的只是绘制关键的支撑位和阻力位，围绕它们进行交易，如果这些位置被突破，我就有机会调整甚至反转头寸，转向另一个方向。


    这听起来简单得有些荒谬，但我认为其背后的哲学思想相当强大，而且它确实能带来盈利。


    **Bourquin：** 你做的是现货市场，而不是货币期货，对吗？


    **Wilson：** 对。


    **Bourquin：** 那么，对于一笔典型的交易，你通常交易多少单位？


    **Wilson：** 目前，我通常每点交易大约20美元。


    **Bourquin：** 既然1个基点等于1个点，那这基本上就是两个标准合约。


    在确定动态支撑位和阻力位时，你有偏好使用特定类型的布林带或某条移动平均线吗？


    **Wilson：** 我使用标准设置的布林带，也就是22期；同时我还使用62期指数移动平均线（`EMA`），它在趋势行情中的价格表现似乎很不错。


    **Bourquin：** 我好像没听过多少交易者说他们使用62期`EMA`。你是怎么想到用这个参数的？


    **Wilson：** 我直接就用了，因为Rob在1小时时间框架上使用这个参数，于是我把它应用到1分钟图上，看看效果如何。


    **Bourquin：** 你实际上是如何决定入场交易的？你是喜欢看到价格触及某个位置才下订单，还是在价格接近那个区域时就行动？


    **Wilson：** 我会尽量让我的入场时间贴近K线收盘的时刻。只要价格没有跌破那条线——只要它正好触及，或者即便只是在附近——我都会入场。只有K线收盘价跌破我正在关注的水平，才会使信号失效。


    我还使用参数为8、3、3的随机指标（`stochastic`）来辅助判断入场时机，信不信由你，尽管它不是领先指标，但它也能帮助你预测可能出现的背离情况。


    **Bourquin：** 你通常在哪里以及如何设置止损？


    **Wilson：** 有些人可能觉得有点疯狂，但我只给每笔交易10个点的空间。我就像用手术刀一样精确地切入市场。


    **Bourquin：** 哇，那必须是立刻就见效啊。止损设置得这么紧，你的胜率是多少？


    **Wilson：** 对于首次交易，我的胜率大约在60%到64%之间。


    **Bourquin：** 那么，这个策略相当可靠了。你是双向交易吗，即在顶部做空、在底部做多？


    **Wilson：** 是的，我对方向完全没有偏见。考虑到有利的胜率，并且我实际上只给市场10个点的空间，在15个点处止盈，这足以让我获得我所寻求的优势。


    **Bourquin：** 即使你觉得行情还有空间继续发展，你也会在15个点处止盈吗？例如，如果你在布林带下轨附近做反弹，而这个反弹看起来可能会超过15个点，你会让它继续运行吗？


    **Wilson：** 当然会*，这很大程度上取决于驱动因素的强度。最近有一次，我根据62期`EMA`入场，价格启动得非常快，于是我把目标利润扩大到30个点。那波行情最终在回撤前涨到了大约34或40个点。


    我必须牢记，我是根据1分钟图上的信号进行交易，经过大量的回溯测试，我发现盈利交易的平均波幅大约是30个点。虽然你并不总能拿到30个点，但你几乎总能拿到15个点，这就是我通常在那里止盈的原因。不过，如果市场在上述条件下非常迅速地朝对我有利的方向移动，我当然可能会把止盈设在15个点以上。


    为了那个特定的交易信号，我等了整个上午，那是我当天做的唯一一笔交易。我在这笔交易中赚了30个点，并且因为我对这个设置相对有信心，恰好是用了双倍仓位进去的。那次交易占了我资金的`1.2%`，我对这个结果非常满意。


    **Bourquin：** 有些人——就像你自己——对自己的职业生涯很满意，并不打算辞职去全职交易，而另一些人则非常希望这么做。你有没有考虑过全职交易，或者你更喜欢现在这种平衡两者的生活方式？


    **Wilson：** 我设想有朝一日可能会全职交易。例如，目前我正在指导一小群人，他们希望达到我现在的水平，我喜欢这种人际接触。


    我决定搬到澳大利亚的原因之一是我可以在晚上交易，并且我对以交易为生的前景持开放态度。在我的职业生涯中，如果幸运的话，可能还有一次出海的机会，但我想在四十多岁的时候变得目标清晰，那个时候我很可能会成为一名全职交易者。不过，目前我喜欢同时做这两件事所带来的多样性和纪律性，我享受现状。


    **Bourquin：** 我欣赏很多人能将职业和交易分开并保持双重生活的方式。我经常告诫那些告诉我他们想辞职去全职交易的人。我认为拥有一份工作和稳定的收入，会让我们不太可能、也减少焦虑地去承担不必要的风险。你同意这个观点吗？


    **Wilson：** 我同意。对我来说，交易是一种娱乐，我喜欢它的低风险，并且它需要纪律性和适应性才能每天坚持不懈。'
  raw: 'Sometimes there won’t be much energy or much volatility, and an opportunity
    that you spend four hours waiting for still won’t come along. On other occasions,
    there will be many more.


    The key is profiling the market: If we’re in a trending market, I’ll use dynamic
    support or resistance, and if I perceive that we’re in a range bear market, I’m
    far more likely to trade from static or horizontal support and resistance.


    **Bourquin:** How do “dynamic” support and resistance areas differ from “static”
    ones?


    **Wilson:** Dynamic support and resistance would be determined using moving averages
    or Bollinger bands, for example—basically something that tracks price in a dynamic
    fashion.


    It’s critical to put yourself in a situation where you’re learning something about
    sentiment if the trade fails. If you try to trade dynamic support or resistance
    in the middle of a range, your trade can fail and you will have actually learned
    nothing about sentiment.


    **Bourquin:** A lot of traders who balance a career at the same time that they
    are trading can have difficulty deciding what to do if a trade setup emerges at
    the end of their session, right before they have to go to work. Do you close out
    all your trades before you step away, and how do you decide whether or not to
    take those trades that come in right at the end like that?


    **Wilson:** Well, I stay in most of my trades for a maximum of half an hour. The
    market will have proven me right or wrong by then. So, as long as I’ve got half
    an hour available, I’ll take the trade. But regardless of what happens, once it’s
    time to walk away from the terminal, I’ll close the book on any and all trades.


    **Bourquin:** That’s a kind of forced discipline to take the loss, if that’s what
    it is at that time, or take a profit and eliminate the possibility for further
    gains.


    **Wilson:** That’s right, and I never want to end a session on a loss or even
    with a losing trade. So, if I’ve got one or two in the bag already, I won’t take
    that last trade, no matter how good it looks.


    **Bourquin:** Are there several currency pairs that you like to follow most?


    **Wilson:** There’s only one currency pair I follow—the Euro/Dollar [EUR/USD]—and
    there’s a reason for that: It’s the most liquid market, so it’s giving me the
    clearest possible window on the psychology of the market, which is what I perceive
    I’m actually trading.


    Whether the EUR/USD is trading at 1.3150 or 1.4150 really doesn’t make any difference
    to me. All I’m doing is mapping key support and resistance points, trading against
    those, and then giving myself the opportunity to revise or even reverse the position
    to go in the other direction if they get taken out.


    It sounds ludicrously simple, but I think the philosophy behind it is pretty strong,
    and it’s certainly profitable.


    **Bourquin:** And you’re trading the spot market, right, not currency futures?


    **Wilson:** Correct.


    **Bourquin:** So, for a typical trade, how many units are you trading?


    **Wilson:** At the moment, I’m normally trading about twenty bucks a point.


    **Bourquin:** And since one pip is equal to one point, that’s essentially two
    standard contracts.


    For determining dynamic support and resistance, is there a certain type of Bollinger
    band or a certain moving average that you like to use?


    **Wilson:** I use the Bollinger bands on the standard setting, so twenty-two,
    and I use the sixty-two-period exponential moving average [EMA], which seems to
    price pretty well in a trend.


    **Bourquin:** I don’t know that I’ve heard a lot of traders say they use the sixty-two
    EMA. How did you arrive at that one?


    **Wilson:** I went right to it because Rob was using that on the one-hour timescale,
    and so I took it down to the one-minute to see how it looked.


    **Bourquin:** How do you actually decide to put a trade on? Do you like to see
    it touch price before you’ll enter an order, or do you trade as it comes to that
    area?


    **Wilson:** I will time my entry so it’s as close as possible to the close of
    the bar. As long as it doesn’t fall through the line—as long as it just touches,
    or even if it’s in the vicinity—I’ll go for it. Only a close of the bar below
    the level I’m watching will invalidate the signal.


    I also use the stochastic on 833 just to help time it a little bit, and believe
    it or not, although it’s not a leading indicator, it can also give you a means
    of anticipating where divergence might exist.


    **Bourquin:** And where and how do you go about setting stop losses?


    **Wilson:** Some think it’s a little crazy, but I only give my trades ten pips
    of room to work. I’m taking a scalpel to the market, really.


    **Bourquin:** Wow, so it’s got to work out right away. With such a tight stop,
    what’s your win/loss percentage?


    **Wilson:** On first trades, I achieve a win percentage of about 60 percent to
    64 percent.


    **Bourquin:** So, it’s pretty reliable then. Will you trade either way, by putting
    on short positions at the top or going long at the bottom?


    **Wilson:** Yes, I have no bias at all with regards to directionality. Given the
    favorable odds, and considering the fact that I only give the market ten pips
    and take profit at fifteen, it’s enough to give me the edge I’m looking for.


    **Bourquin:** Will you take profit at fifteen pips even if you feel like there’s
    room left in the move? For example, if you’re trading a bounce off of the bottom
    Bollinger band that looks like it might continue beyond fifteen pips, would you
    let that run further?


    **Wilson:** Definitely*,* and a lot depends on the strength of the catalyst. I
    recently took a trade off the sixty-two EMA that started to move very quickly,
    so I extended my profit target out to thirty. That move eventually went to about
    thirty-four or forty before it retraced.


    I have to bear in mind that I’m taking a signal for a one-minute chart, and having
    backtested so extensively, I’ve found the average movement of winning trades to
    be about thirty pips. Although you don’t always get thirty, you almost always
    do get fifteen, and that’s why I generally take profit there. However, if the
    market moves very quickly in my favor under those conditions, I may certainly
    extend out beyond fifteen pips.


    I waited all morning for that particular trade to set up, and it was the only
    trade I took on the day. I was in it for thirty pips and happened to have gone
    in at double size because I was relatively confident in the setup. In that case,
    the trade was 1.2 percent of my equity, and I was very happy with that.


    **Bourquin:** Some people—like yourself—are happy with their careers and don’t
    intend to quit in order to pursue trading full-time, while others would love to
    do just that. Did you ever consider trading full-time, or do you like the lifestyle
    you have now, balancing both?


    **Wilson:** I could see trading full-time someday. At the moment, for example,
    I’m mentoring a small group of people who hope to achieve what I have, and I like
    that human contact.


    One of the determinants of my moving to Australia is that I can trade in the evening,
    and I’m open to the prospects of trading for a living. I’m getting to a stage
    in my professional life where I might get one more chance to go to sea if I’m
    lucky, but I want to be clear by the time I’m in my late forties, and that may
    well be the time I become a full-time trader. At the moment, though, I like the
    variety and the discipline that doing both enforces, and I like things just the
    way they are.


    **Bourquin:** I like the separation and the sort of dual lifestyle for a lot of
    people, and I always caution those who tell me they want to quit their job to
    trade full-time. I think having a job and a steady income makes us less likely
    and less anxious to take undue risks. Would you agree with that?


    **Wilson:** I would. For me, it’s recreational, and I like that the risk is small
    and that it requires discipline and adaptability in order to grind it out every
    day.'
