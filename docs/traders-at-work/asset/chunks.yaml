  raw: '**Brandt:** In the case of the Russell trade, we were dealing with a head-and-shoulders
    top that developed over about sixteen weeks. The market confirmed the pattern
    on May 16 by closing below the neckline, and although it nicked that line a few
    times in prior days, I ignored those because of the intraday nature of the trade.


    I like to see those clear, decisive patterns, and I also like trades that have
    the right volume/open interest profile. I love going against conventional wisdom
    and not being part of a big crowd, and I prefer patterns with horizontal boundaries,
    as opposed to diagonal or slanting ones. That’s why I don’t particularly like
    trading wedges, symmetrical triangles, or trend lines.


    Most of my trades happen in the last hour or two of active trading before the
    markets close briefly for settlement. At that time, I look at where the markets
    close, and I will either take action within the last thirty to sixty seconds of
    active trading or I will put in a limit order and trade it when the market reopens.


    **Bourquin:** How do you determine profit targets for head-and-shoulders patterns?
    Are you looking to a previous area, where you believe the trade will be completed?


    **Brandt:** The Edwards and Magee book I mentioned does a pretty good job of laying
    out how to establish targets, and I use that as a general guideline. The rule
    is that the height of a pattern that is projected in the direction of the breakout
    will give you a pretty good estimation of the magnitude of the move.


    The target for this particular Russell trade is just under 710, but I don’t like
    using exact numbers, so my limit order is in at 710 to 720—and that’s the price
    range where I would “ring the cash register,” as they say.


    **Bourquin:** And when getting out, will you scale out of things, even if you
    think it could go a lot further?


    **Brandt:** I do, as a matter of a fact, and I didn’t get into that. I have had
    to battle with something that’s a common concern among swing and position traders,
    and that is, once you get a nice profit in a trade, are you willing to ride that
    into a loser?


    That’s something all traders must think about, and I decided I wanted the best
    of both worlds: While I didn’t want to give back large profits on trades, I also
    wanted to take advantage of continued profit potential. As a result, I strip out
    half of a position, sometimes within a week or two of taking the trade, and that
    gives me sustained power to ride out the other half of the position for the full
    extent of what the move may give me.


    **Bourquin:** I want to circle back with you about something you said early on,
    and that was that you don’t see value in trend line breaks. Can you talk more
    about that?


    **Brandt:** I’m not a big fan of trend lines. I think you can give a monkey a
    chart book, a ruler, and a pen, and pretty soon even he’s going to have a trend
    line that makes sense!


    Technically, I think the violation of a trend line has no significance whatsoever,
    other than as an indication that there has been some change in market behavior.
    But that change can mean a lot of things. It could be a shift from a steady advance
    to a more gradual advance, or from an advance to a sideways congestion phase,
    or any number of other things.


    I’m looking for fewer excuses to trade, not more, and if I added trend lines to
    my arsenal, the number of trading situations that would arise would increase exponentially.
    And because I’m now trying to limit my trading to five, six, or seven trades per
    month, I filter opportunities by using only patterns and pattern boundaries.


    Now, I must qualify my previous statements by saying that if I’m looking at just
    a trend-line break by itself, I’m not interested. There are times, however, when
    a trend line becomes an extremely important technical factor because it combines
    with other developments on the chart. For example, a trend line that is violated
    in the process of completing a pattern or setting up a scenario that fits into
    a larger macro outlook would be a situation I’d be keenly interested in.


    **Bourquin:** A lot of traders feel they have to be in the market at all times,
    trading frenetically and staring at their monitors for eight hours or more every
    day. In the end, it’s about making money, and you’ve proven that by backing off
    your time frame to look at weekly charts and making only five or six trades each
    month, you can still make a good living while also reducing your stress level.
    That’s a very valuable lesson for traders.


    **Brandt:** I could go on and on about that, Tim, and back when I started trading,
    people paid up to $1 million to purchase a Chicago Board of Trade membership so
    they could go on the floor and, in essence, buy the bid and sell the offer. Basically,
    they could own the bid/offer spread, and while there are still bid/offer spreads
    in the markets today, those are owned by high-frequency and algorithmic traders,
    not private speculators—and that includes me.


    When I buy, even if it’s on a limit order, I’m buying at the offer, not the bid.


    That bid/offer spread for active traders can amount to a lot of money over time,
    and because they now give away the bid/offer spread, I think the odds are stacked
    against day traders.


    In those early days of pit trading, day traders who weren’t on the floor were
    a really rare breed, because it was generally assumed that you could only day
    trade if you were an exchange member who had access to exchange rates and could
    buy the bid and sell the offer. Otherwise, the deck was stacked against you. Yet,
    somehow we now trade in a world where some people think they can just start day
    trading and make money like it’s automatic.


    I’ll freely admit that if I sat and stared at my screens while looking at different
    charts and time periods and re-examining things, I would end up sabotaging myself.
    That would cost me money.


    Maybe it’s not true for everybody, but I know it’s true for me that the fewer
    trading decisions I make, the better it’s going to be in the long run. There may
    be individual cases where quick action might be profitable, but over a larger
    number of trades and a longer period of time, I know how I have to trade—and that’s
    by holding positions, not trading them.


    **Bourquin:** I completely agree with that, and I find it to be true in my trading
    as well. I could be following a trade on a weekly chart that is weeks or months
    in the making, but if I look at an hourly chart and perhaps see something there
    that goes against my idea, I could let that discount the quality of my setup on
    the weekly chart. So, along those lines, it makes sense to avoid short-term charts
    on these longer-term trades.


    **Brandt:** I’m a believer in what’s called “the fallen state of the human being,”
    and I think that it is with rare exception that instinctual traders can be successful.
    There may be some who can be profitable in their trading—and perhaps extremely
    so—but I think those traders are the exception, not the rule.


    I’ve had traders tell me that it drives them crazy when they are in a position—and
    it drives them crazy when they are not in one. That’s the kind of double thinking
    that can lead to some pretty substantial losses.


    For me, I think the key to trading is in risk management, not necessarily in signal
    generation. Keeping losses short and letting profits run is an all-too-common
    adage in active trading, but it can be very difficult to do.


