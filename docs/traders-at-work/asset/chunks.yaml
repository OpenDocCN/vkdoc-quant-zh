- fmt: '**Bourquin:** That begs the question: what are the people who have figured
    it out doing differently than everyone else?


    **Menaker:** That’s a great question. I think what’s happened is that they figured
    out that markets are more social than people realize. I think that it’s easy to
    forget that markets are still social, given all the different arguments that we
    see on CNBC and read in the *Wall Street Journal* about automated trading.


    Let’s use a poker analogy. I have a good friend who is a trader and who used to
    be a professional poker player, and I asked him one day, “If everybody at the
    table at a high-stakes game has the same level of ability, and everybody has all
    the same probabilities of cards memorized, why do some pros consistently make
    more money than other pros?”


    What he said was on the surface, poker looks like a game of numbers and probabilities,
    and it is to a certain extent. But where the real edge lies is in reading the
    table, being able to bluff, and reading other people’s bluffs. I think markets
    are the exact same way.


    As traders, we watch our screen, and it’s so easy to forget that the blinking
    lights and the moving lines and the colors that we see on our screens are just
    representations of something else. That something else is the buyers and the sellers
    who are battling it out, so, to your question, I think the people who have figured
    this out really understand that it’s people who move markets.


    Another way to put it is this: if you buy stock `XYZ` today, there’s only one
    reason in the world why stock `XYZ` is going to be higher an hour from now, a
    day from now, a week from now, or a year from now. There’s only one reason: people
    are willing to pay higher prices than you paid and will continue to pay higher
    prices, for whatever reason. They might say the reason is because they like the
    company, or they feel good about the economy. But it doesn’t matter what the reason
    is. The action is what counts. The action that’s required is other people have
    to pay higher prices. As soon as other people—fund managers, hedge funds, whoever
    these people are—decide to not pay higher prices, stock `XYZ` will no longer go
    up.


    In order to predict markets, the people who really figured out the game are predicting
    people, and I can tell you that some of the more successful hedge funds understand
    this. They’re looking at the market not so much through fundamental analysis and
    technical analysis. They are trying to *sense* it. They want to predict what people
    are going to do.


    I’ll tell you, there’s a real interesting piece of research that came out a couple
    of years ago from the California Institute of Technology. The research was conducted
    by some financial engineers—these guys are quants, right, they are mathematicians—and
    they had two groups of traders. They had a group of traders who were experienced
    and another group who were total novices, and when they had them trade against
    each other, of course, the experienced group outperformed the novices. But then
    they did something interesting. They provided some training to the novice group
    of traders. They trained them on how to interpret or assess other people’s thinking
    and their intentions. In other words, they taught them how to read other people,
    and then they had those novice traders apply that training in the competition,
    trading against the more experienced traders.


    After the novices had been trained, what the researchers found was that these
    novices were able to match and often beat the more experienced traders. You might
    think that’s kind of a fluke. Well, they’ve actually done the same study about
    twelve times, and they’ve gotten the same results every time.


    **Bourquin:** I think that’s one of the big arguments that people have against
    high-frequency trading. They say, “Look, I can read supply and demand, and I can
    read Level II buy and sell orders, and I see phantom orders come in and out that
    are trying to fool me into believing that supply or demand is there when it’s
    not.” But I think they actually have a hard time reading those things.


    **Menaker:** Exactly. First of all, yes, algos are used in execution a lot, and
    not just by high-frequency traders. Even non-high-frequency traders are using
    algos, and that kind of throws off the queue and makes things look different.


    Here’s an interesting tidbit: on a trend day or a strong directional day, when
    the markets are really moving in one direction pretty much the whole day, the
    high-frequency traders and algos are generally getting crushed. Those are not
    good days for them. They tend to do really well on the range-bound days, rotational
    days, and days where we’re trading in between some pretty known levels that everyone
    is watching. Those are good days for them. But they don’t make money every day.
    They also lose money, and the days when they don’t do well are trend days.


    **Bourquin:** I imagine those are the days when a discretionary trader should
    be doing well. Maybe the lesson here is to stay away from range-bound days?


    **Menaker:** It depends on your style. For my style of trading, my job in the
    morning involves constantly trying to figure out if the day is shaping up to be
    a directional trend day or a range day. If I think it’s one of the two, I’ll keep
    my eyes open to see if we will be switching back to the other at some point that
    day, because I have two different ways of trading. If we’re looking at a trend
    day or the possibility of a trend day, I am going to want to go for a ride with
    the momentum. But if it’s looking like a rotational range day, then I’m going
    to want to fade the levels that I’m looking at.


    **Bourquin:** Do you decide what type of day it is based on the charts you’re
    using to look at the ES?


    **Menaker:** Yes, and I use a lot of market profiling and volume profiling, so
    I’m looking for responsive and initiative activity. I’m a psychologist, so when
    I see levels on a chart that some people might call supply and demand, what I
    see is emotionally charged areas on the chart.


    In other words, everyone else is saying, “Hey, here’s a trend line,” and while
    I might look at that as well, I’m going to see it differently. To me, it’s not
    just a line on a chart. To me, it represents an area of a lot of emotion, and
    when price gets back to that area, I’m going to want to look really closely at
    internals. How many stocks are ticking at their high of the day? How many stocks
    are ticking at their low of the day? How many stocks are above or below their
    volume-weighted average price [VWAP]? I’ll look at stuff like that as we come
    into an important area, and how price and internals behave at that area will tell
    me what to do. I listen to the market and want to get as close to the market as
    possible in my trading.


    **Bourquin:** Let’s talk about that, because, as a psychologist, you think that
    the way to alleviate some of the problems that high-frequency traders are bringing
    to the market is through trading psychology. Talk about why that is and how to
    use trading psychology to get around this.


    **Menaker:** Sure. I’ll give you a really specific example of trading ES. Let’s
    say that a big player in the ES market knows that there’s support at twenty-eight,
    because they look at their charts and they can see the same levels that everyone
    else can. Now, they can afford to sell five thousand contracts at twenty-eight
    and then offer another two thousand at twenty-seven. While you and a hundred other
    small traders are busy covering your long positions at twenty-six and twenty-five,
    that big player is covering his short positions—and he is even buying those twenty-fives
    back from you.'
