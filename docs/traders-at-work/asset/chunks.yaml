  trans: '

    **Bourquin：** 我想问一下，你当时对那笔交易的利润目标是怎么设定的？你是参考了前期高点，还是如何决定离场的？


    **Lund：** 当我考虑那笔交易的利润目标时，我记得大概设在 18 美元左右，我这么设定的原因是因为它恰好与一个双顶形态之前的低点 pivot 对齐，同时也与一个盘整区域对齐。


    有时候你看图表，上方阻力位在哪里是很明显的。但有时它并不那么明显，更像是一门艺术。我通常会先看最明显的点位，然后稍微调低一点预期。我总是希望自己更保守一些，并且我也告诉别人，分批卖出并没有错。当一只股票出现一波强劲的突破时，它直接一路涨到你目标位的可能性非常小。如果你需要了结部分利润、落袋为安，以便让你能坚持持有到行情结束，这完全没问题。


    **Bourquin：** 你通常一周做多少笔交易？


    **Lund：** 目前，我有一份日常工作。我是一家券商/交易商的战略计划副总裁，所以不幸的是，我不能像自己希望的那样专注于市场。我通常一周交易大概四五次。当我在自己账户交易，并且那是我的唯一工作时，我一周能交易几百次。不幸的是，我现在交易的次数远低于我想要的。


    **Bourquin：** 你同时管理多少个仓位会感到舒服？


    **Lund：** 天哪，我同时处理超过两到三个仓位就会感到不舒服，而这实际上是因为我患有注意力缺陷多动障碍（ADHD）。我被诊断出有这个问题，而且我这辈子都是这样。如果同时有太多事情要处理，我就无法集中注意力。


    很多时候，当人们试图决定如何交易时，他们心中会有自己的形象，以及自己应该如何交易的设想。他们对交易是什么样子的有一个想象，而很多时候，这种想象与他们的性格完全不匹配。我认为，长期来看，成为盈利交易者的关键之一是完全诚实地面对自己，了解自己的优势和劣势，然后以一种能够与这些现实情况相辅相成的风格进行交易——而不是你认为自己*应该*如何交易。


    像我这样交易——限制任何时间点持有的仓位数量，只关注一定数量的股票，并且每周只操作一次——这帮助我应对我的多动症，也让我成为了一个更赚钱的交易者。


    **Bourquin：** 我认为很多交易者也在寻找适合自己的方法。市场上信息太多了。有不同级别的课程，不同的时间框架，还有上百万人认为是“圣杯”的指标——直到他们最终发现根本不是那么回事。你是怎么形成这种交易风格，并认定它适合你的？


    **Lund：** 很久以前，我在一个我以前常看的博客上读到一位叫 Trader-X 的博主写的帖子，他谈到了追逐成功这个概念。他谈到交易者如何开始并说：“我要成为一个缺口交易者”，然后他们开始做一点缺口交易。如果结果不尽如人意，他们就会说：“算了，我要去做波段交易。”


    就这样，许多交易者不断追逐成功的念头，而不是真正精通某一类交易，或者真正精通某一类资产，或者缩小自己的关注范围。很长一段时间，我也那样做，我认为很多人也都那样。我会转向最新、最热的东西，然后，终于，随着我年纪渐长、更加成熟，并且在这行摸爬滚打足够多之后，我意识到重点不在于什么很酷或者什么是最新的东西。重点在于赚钱。这就是交易的全部意义。


    任何能让你在市场交易并赚钱的方式，都是正确的方式。如果那不是你追求的——如果你是想在家庭聚会上有关于交易的精彩故事可讲——那你的出发点就错了。


    **Bourquin：** 你是偶然发现了你寻找的那些形态类型，还是怎么找到它们的？


    **Lund：** 我是通过惨痛教训学到的。当我在 1986 年刚开始交易时，关于交易的信息几乎为零。我甚至不知道什么是技术分析。后来，在 90 年代初，我上了
    Prodigy 的 Money Talk 论坛，认识了一些懂一点技术分析的人。但那时，我对它仍然了解不多。这是一个循序渐进的过程。我不能说有什么醍醐灌顶的时刻告诉我：“这就是我要做的。”
    随着时间的推移，我学到了什么最适合我，然后最终决定坚持这么做。


    **Bourquin：** 是你过去有时间一周交易几百次的时候盈利更多，还是你现在更喜欢没有时间那样做？


    **Lund：** 这很有意思。实际上，我交易次数少了反而赚得更多。我经营自己的生意有二十年，有自己的生意的好处之一就是，如果你想的话，你是有能力进行交易的。我坐在办公桌前，就会交易。然而，日内交易在
    80 年代并不盛行，而且不管怎样，由于我对公司的职责，我不能做日内交易。我转而做波段交易，但当我最终卖掉公司时，我说：“我要做日内交易。那就是我要做的事。那才是重点。”


    回过头来看，我意识到，实际上我做波段交易、交易次数较少的时候，赚的钱比做日内交易的时候多。如果有一个时刻让我觉得，“也许那才是我应该做的”，那就是这个时刻了。


    这让我想起了很久以前读过的一本书中的一个章节。Ed Seykota 谈到他如何在白天设置好他的交易，然后就不管了。他的桌子上没有电脑。他也不监控他的交易。他知道他的止损位在哪里，然后他就在太浩湖边散步，悠哉游哉地等待他的仓位起作用。当然，那是一个不同的时代和不同的交易方式，但那种禅宗式的方法，说着：“这就是我要设置的。这是我的风险参数。我要把它们放进去，然后让交易自行发展。”
    这真的引起了我的共鸣。


    **Bourquin：** 很多人（如果你愿意这么说的话）把他们无法在当今市场找到好的交易机会归咎于高频交易。这个说法有道理吗，还是没有？


    **Lund：** 这真是个非常好的问题。我认为你说得对。我认为很多人把它作为自己无法盈利的借口。毫无疑问，高频交易是存在的。你随时都能看到它。你只需要学会适应它。


    如果你打算交易形态，你必须明白，高频交易和算法交易会在某种程度上扭曲这些形态，以至于你传统上会认为它们被破坏了。也许你会看到一个带柄杯状形态，或者一个双底形态，或者一个半三角形，然后价格会从该形态中跌出。在过去，你会说：“好了，就这样了。形态被破坏了。”
    但随后，神奇的是，价格会重新回到那个形态中，并继续朝着你期望的方向运行。


    对此有一个简单的解释。高频交易被设定为去往订单量最高的地方。它被设定为去往止损位所在的地方，因为其全部目的就是为了获取成交量。但是，每个人都知道止损位在哪里。每个人都能看图表。每个人都知道关键价位在哪里。


    我认为高频交易确实有影响，但我认为如果人们对自己诚实的话，这并不是什么无法适应的事情。

    '
- fmt: '**Bourquin:** Did you ever do anything in your trading career that you felt
    really took you to the next level?


    **Lund:** No, there really was no “Aha!” moment for me. This goes back to the
    question you asked earlier. When I decided that I was trading to make money and
    not to be cool or get in on the action, I stopped chasing different styles of
    trading.


    I originally had this vision of myself as a true trader—a trader that can trade
    anything. In my mind, true traders can trade any equity class, they can trade
    short, and they can trade long. That was a trader to me. Now, I’m sure there are
    people out there who can do that. I have no doubt about that. But that is a quixotic
    view of trading. I think that you should find what you are good at, find the areas
    that you know, and stick with those areas.


    Coming to that realization helped me, but it wasn’t an “Aha!” moment. It’s just
    something that evolved over time.


    **Bourquin:** If you see a symbol that you’re not entirely familiar with, will
    you check if there is earnings or news out before you make a trading decision,
    or will you purely trade the chart?


    **Lund:** No, I never look at fundamentals. The fundamentals play no part in my
    selection process. Around earnings season, I will look to see if something is
    coming up, but I never look at fundamentals. Price and volume are the only things
    I look at.


    **Bourquin:** What about something like nonfarm payrolls or one of the other broad
    economic announcements that affect the overall market?


    **Lund:** I don’t follow that, but I should. In fact, just recently I was taking
    a trade in Lennar Corp., and I wasn’t paying attention to the economic announcements.
    I was actually in a chat room, and somebody said that a report related to the
    housing market was going to be released in five minutes. I remember thinking to
    myself, “I should probably close this trade, even though the stock is going up,”
    and, of course, I didn’t.


    The numbers came out, and they were bad. The stock reversed and stopped me out
    for a loss. Even after twenty-five years of trading, I still make that mistake,
    and I should probably check on macro factors more often than I do. I hate economics.
    I think it’s so open to interpretation, and I don’t even want to get into that
    interpretation game. I’m such a purist when it comes to price and volume. But
    if ignoring economic announcements actually harms me, I should be more aware of
    that.


    **Bourquin:** What do you feel like you still need to improve upon as a trader?
    Maybe paying attention to economic announcements is your one thing?


    **Lund:** I wish it were my only thing. The thing about trading is that there
    is so much that can go wrong at any given moment. It’s like anything that you
    want to do consistently well in life. It’s like being married. People think, “Hey,
    I’ve done all this planning. I went up to the altar, and said, ‘I do.’ That’s
    it. I’m done. I’m married.” But that’s just the beginning of a lifelong process
    of always checking the pulse of that marriage, refining it, making sure you’re
    on the same page, and working at it, just like you work on anything.


    If you get complacent in your trading, so many things can change or go wrong.
    The problem with that is that one bad misstep can wipe out ten great moves. I
    have a lot of things that I always want to keep working on. I never want to get
    too complacent, and I never want to think that I’ve solved every problem, because
    that’s when you put yourself in a really bad position.


    **Bourquin:** You mentioned that your profitable Lennar trade became a negative
    one. Do trades like that make you start thinking about taking off half of your
    position at a certain point? Do you scale in or scale out of trades?


    **Lund:** I do scale in and scale out of trades. With regards to the Lennar trade,
    first I thought I should close it. Then I said to myself, “I should take at least
    half off.” But then, another evil part of me said, “Wait a minute. The stock’s
    moving up. Maybe somebody knows something about this announcement. We’re going
    to get a great move!” That’s why I try to steer clear of fundamentals, because
    if I start playing that game, I’ll just fake myself out.


    I did not manage that trade how I should have, but generally, I will take partial
    profits—especially on really violent moves, like if a stock moves up really fast
    and spikes out of a resistance level. To me, those are the moves that often give
    up and end up turning around. Those are also a hallmark of attempts by high-frequency
    traders to run the stop level. The faster something spikes, the more inclined
    I am to take something off the table. Doing so gives me some room—or at least
    a profitable trade, if it comes back to breakeven.


    **Bourquin:** Do you set an annual or monthly ROI percentage goal for yourself?
    Is there a flat dollar amount that you want to make in your account?


    **Lund:** I’ve wrestled with that over the years, and there are two schools of
    thought. In the first school of thought, you get to a certain amount, and that’s
    good. You don’t want to push it, and so you can shut down your trading, or you
    can bank what you’ve got.


    The other school of thought says that setting specific profit goals limits you.
    In other words, if you hit your profit goal and shut down your trading because
    you’ve made all the money you were expecting to for the day, month, or quarter,
    you may miss out on other trading opportunities.


    The general rule that I follow is to never look at my P&L—at least not too closely.
    Going back to poker, I take a page from Phil Ivey, a great poker player. When
    he was asked how he deals with having $250,000 in the pot, he said something like,
    “You can’t think of that money as a Ferrari. You can’t even think of it in those
    terms, because if you change your perception of what you’re doing, you’ll change
    the way you’re playing.” I try to avoid looking at my P&L as much as I can. Obviously,
    I know where I stand, but I try not to focus on it.


    When I’ve got a trade on, I never look at how much I am up or down dollar-wise
    in that trade. I always look and see what the charts are saying, because the market
    doesn’t care if you’re up $100 or down $100. It will do whatever it wants to,
    based on those charts. I know what my P&L is, but I try not to focus on it, because,
    if I do, it’ll throw me off my trading game.


    **Bourquin:** Lately, I’ve been asked some questions about win/loss ratios, and
    the argument that always seems to crop up is, “Can I be right 30 percent of the
    time and, as long as I let my winners run and cut my losers quickly, still be
    okay?” What are your thoughts on that? Do you keep track of your winning and losing
    trades?


    **Lund:** Yes, I absolutely believe in that. Even theoretically, limiting yourself
    to trades that have a good risk-reward ratio has to be a good thing. If you want
    to get down to the actual technicals of it, you can map it out where, if you’re
    taking trades that have a 1:3 risk-reward ratio, you can be right only 30 percent
    of the time and still be profitable. I really believe in that.


    I think it’s very important from a psychological standpoint. You need to know
    where you’re going to come out on a trade. If you know where you’re going to come
    out and you’re comfortable going into the trade and losing *x* amount of money,
    you’re freed up to manage the trade in a more honest way. You’re also less likely
    to do something that you wouldn’t normally do.


    **Bourquin:** Speaking of psychology, some would say that enduring losing trades
    70 percent of the time is a tough way to make money because of what that does
    to you psychologically—never mind that you’re doing well on 30 percent of your
    trades. What are your thoughts there?'
  raw: '**Bourquin:** Did you ever do anything in your trading career that you felt
    really took you to the next level?


    **Lund:** No, there really was no “Aha!” moment for me. This goes back to the
    question you asked earlier. When I decided that I was trading to make money and
    not to be cool or get in on the action, I stopped chasing different styles of
    trading.


    I originally had this vision of myself as a true trader—a trader that can trade
    anything. In my mind, true traders can trade any equity class, they can trade
    short, and they can trade long. That was a trader to me. Now, I’m sure there are
    people out there who can do that. I have no doubt about that. But that is a quixotic
    view of trading. I think that you should find what you are good at, find the areas
    that you know, and stick with those areas.


    Coming to that realization helped me, but it wasn’t an “Aha!” moment. It’s just
    something that evolved over time.


    **Bourquin:** If you see a symbol that you’re not entirely familiar with, will
    you check if there is earnings or news out before you make a trading decision,
    or will you purely trade the chart?


    **Lund:** No, I never look at fundamentals. The fundamentals play no part in my
    selection process. Around earnings season, I will look to see if something is
    coming up, but I never look at fundamentals. Price and volume are the only things
    I look at.


    **Bourquin:** What about something like nonfarm payrolls or one of the other broad
    economic announcements that affect the overall market?


    **Lund:** I don’t follow that, but I should. In fact, just recently I was taking
    a trade in Lennar Corp., and I wasn’t paying attention to the economic announcements.
    I was actually in a chat room, and somebody said that a report related to the
    housing market was going to be released in five minutes. I remember thinking to
    myself, “I should probably close this trade, even though the stock is going up,”
    and, of course, I didn’t.


    The numbers came out, and they were bad. The stock reversed and stopped me out
    for a loss. Even after twenty-five years of trading, I still make that mistake,
    and I should probably check on macro factors more often than I do. I hate economics.
    I think it’s so open to interpretation, and I don’t even want to get into that
    interpretation game. I’m such a purist when it comes to price and volume. But
    if ignoring economic announcements actually harms me, I should be more aware of
    that.


    **Bourquin:** What do you feel like you still need to improve upon as a trader?
    Maybe paying attention to economic announcements is your one thing?


    **Lund:** I wish it were my only thing. The thing about trading is that there
    is so much that can go wrong at any given moment. It’s like anything that you
    want to do consistently well in life. It’s like being married. People think, “Hey,
    I’ve done all this planning. I went up to the altar, and said, ‘I do.’ That’s
    it. I’m done. I’m married.” But that’s just the beginning of a lifelong process
    of always checking the pulse of that marriage, refining it, making sure you’re
    on the same page, and working at it, just like you work on anything.


    If you get complacent in your trading, so many things can change or go wrong.
    The problem with that is that one bad misstep can wipe out ten great moves. I
    have a lot of things that I always want to keep working on. I never want to get
    too complacent, and I never want to think that I’ve solved every problem, because
    that’s when you put yourself in a really bad position.


