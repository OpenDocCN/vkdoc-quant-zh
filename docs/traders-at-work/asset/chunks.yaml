    I call the “Secretariat,” because it just continues to perform month after month.
    It’s relatively simple, and I use it predominantly in the ES, but it can be used
    in bonds as well.


    Basically, I use a nine-period exponential moving average [EMA] and a thirty-period
    weighted moving average [WMA] on a 1,224-tick chart. I have a couple of other
    indicators on it now, too, but when you’re beginning to learn this setup, it’s
    best to just monitor EMA and WMA and not clutter up the chart with other data
    or indicators.


    I’m looking for a cross of the fast moving average, so I’ll look for instances
    where the nine-period EMA crosses the thirty-period WMA on the upside, for example.
    That way, I’m going to be looking only for long-entry ­opportunities. Then, once
    it breaks out of that range, I’m expecting a pullback into that zone between the
    nine and the thirty and will aim to get in long and hopefully catch the resumption
    of that uptrend.


    **Bourquin:** How did you figure out that this setup worked?


    **Toma:** A lot of practice and a lot of backtesting. I’m a risk manager by trade,
    and while I consider myself to be a decent trader, I’m a really good risk ­manager.
    As a result of that, I’m very data driven. I do a lot of backtesting, I sample
    with different types of bar and tick charts, and I measure the ones that have
    the optimal return, given my level of risk.


    I backtest everything rigorously, and for a setup to get on my top-ten list, it
    has to produce results in all different kinds of markets and work on both the
    long side and the short side. Then, even once it makes my list, I’ll start trading
    that setup only one contract at a time.


    **Bourquin:** Do you screen for your ten setups automatically using your ­trading
    software?


    **Toma:** At this point, I can tell with just a quick glimpse when one of these
    ­setups is developing, but I also have alerts on my screen to show when the moving
    averages are crossing. That serves as the initial indication that a ­particular
    setup may be forming.


    **Bourquin:** Mike, you’ve got ten setups, but if the Secretariat works best,
    why not just throw as much size as possible at that one and forget about all the
    others?


    **Toma:** That’s a great question, and the straight answer is because price action
    doesn’t always allow for the setup to occur. Especially with the 1,224-tick charts
    I use, a lot of times a trend can just continue and never pull back to that “sweet
    spot,” where I want to get in.


    Now, I could just buy at the high and hope that it goes higher, but my whole mantra
    is not just to trade my setups, but also to get the best price. If I can’t get
    it, then many times I’ll just let it go.


    I’ve passed on a lot of trades. There are probably more that I miss than I actually
    get, but when I do get them, I get a really good price. Even if it doesn’t work
    and I get stopped out, my risk is limited because I got in at such a good price.


    To summarize, the same setups don’t always occur, especially on certain trend
    days—or even during specific times of the day. For example, I only target the
    Secretariat setup from the open [9:30 a.m. eastern time] until about 11:00 a.m.
    eastern time, and then from 2:45 p.m. eastern time to the close [4:00 p.m. eastern
    time] because those are the peak times for that setup.


    **Bourquin:** I like the fact that you’re “missing trades,” only in the sense
    that you’re not chasing them and are very strict about waiting for the required
    pullback before getting in.


    **Toma:** That’s one of my rules, and sometimes I look at it and wonder if it’s
    a little too strict. It’s easy to think, “Well, maybe I won’t be getting in at
    the best price, but I’d be missing a lot by passing on it altogether.”


    Honestly, though, I have other setups that I can use, and I’m in a position now
    where I really don’t want to take more than one trade at one time. I remember
    the last time we spoke, and we were talking about taking eight trades a day. Now
    I’m lucky if I can do four. I would say that 80 percent of my trades use only
    three of my ten setups.


    **Bourquin:** Do you have each of the ten setups on a single chart, or do you
    use multiple charts that show a couple of setups on each one?


    **Toma:** I have two or three charts on my main platform. I’ll have my number
    one setup, the Secretariat, on one chart, because that’s my bread and butter,
    and I don’t want to miss that. My second setup is on another chart, and then I’ll
    use one more chart with the other two or three setups that I’m ­constantly monitoring.
    I’ll have alerts set up on those. I’m not really watching them closely at all
    times, but during non-peak hours, like the 10:00 a.m. to 2:00 p.m. eastern lunchtime
    hours, there are some other setups I’m looking at. When the time is right, I’ll
    have those under the screen, and I’ll blow them up and predominantly look at them
    while keeping an alert on my primary trade.


    **Bourquin:** Let’s talk about your second favorite setup. What’s a good close
    second to the Secretariat?


    **Toma:** I have a basic setup that relies only on the moving average ­convergence/divergence
    [MACD] indicator. Another one of my rules is that I must be on the proper side
    of the momentum, and I think the MACD is a really good way to do that.


    I’ve actually taught my young nephew how to spot this setup and color coded it
    for him so that he can see when the MACD starts to reverse. I also showed him
    some basic rules and opened a little trading account for him, and the kid once
    had a week with seven wins and two losses and was up twelve points.


    That made me think that traders as a whole, including myself, sometimes make this
    very, very difficult. Seeing it through his eyes, I came to understand that the
    kid has no fear. He looks at it as a game—he actually calls it “the game”—and
    he doesn’t connect any monetary value to it. Maybe we all need to do that.


    **Bourquin:** Sure. When you’re paper trading, you’re not dealing with real money,
    and you’re free to trade like a kid, in a sense, because you’re not worried about
    money. Some traders would say that they need the element of tension that real
    money brings, but most people would do much better if they didn’t have to worry
    about that.


    **Toma:** And that’s very powerful, because 90 percent of the people who enter
    this business don’t make money, but most of them would if they traded in a simulator.
    You can gain a psychological edge by taking the money aspect out of it. I look
    at a little eight-year-old kid doing it, and his biggest problem is that he hops
    up and leaves whenever SpongeBob comes on TV!


    Personally, I don’t put any profit and loss indicators on my screen. While that’s
    still a challenge for me, I want to put myself in the state of mind where it’s
    not about money; it’s about implementing my trade plan.


    **Bourquin:** A lot of successful traders talk about making the goal of their
    trading anything but money, but at the end of the day, we all know that it’s about
    money. So, how do you set non-monetary goals for yourself?


    **Toma:** My ultimate goal is just to follow my trade plan, so I have metrics
    that measure how well I do that. I’m pretty confident that my setups are going
    to be there and allow me to achieve my desired lifestyle, but it’s a question
    of whether I implement my plan as efficiently as possible.'
  trans: '

    # 专访 Toma：交易形态与策略


    自从大约三年前开始做这件事以来，我最常用的形态就是所谓的“秘书”形态，因为它月复一月地持续表现出色。它相对简单，我主要将其应用于`ES`，但也可以用于债券。


    基本上，我在 1224 跳动图上使用九周期指数移动平均线（`EMA`）和三十周期加权移动平均线（`WMA`）。我现在还加入了其他一些指标，但当你刚开始学习这种形态时，最好只关注`EMA`和`WMA`，不要用其他数据或指标把图表搞得乱七八糟。


    我寻找的是快慢均线的交叉，例如，我会关注九周期`EMA`向上穿越三十周期`WMA`的情况。这样一来，我就只寻找做多入场的机会。然后，一旦价格突破该区间，我预计它会回撤至九周期和三十周期均线之间的区域，并力求在此处做多入场，希望抓住上升趋势的延续。


    **Bourquin：** 你是怎么发现这个形态有效的？


    **Toma：** 大量的练习和回测。我本职是风险管理者，虽然我认为自己是个不错的交易员，但我更是个优秀的风险管理者。正因如此，我非常注重数据驱动。我做了大量回测，用不同类型的条形图和跳动图进行采样，并根据我的风险水平，衡量那些能带来最优回报的图表。


    我对所有策略都进行了严格的回测，要让一个形态进入我的前十名榜单，它必须在各种不同的市场中都能产生效果，并且在多头和空头方向上都适用。然后，即使它上了我的榜单，我也会先从每次只交易一张合约开始。


    **Bourquin：** 你会使用交易软件自动筛选你的这十种形态吗？


    **Toma：** 现在，我只需快速一瞥就能判断出某个形态是否正在形成，但我的屏幕上也会设置提醒，提示均线何时交叉。这作为特定形态可能正在形成的初步信号。


    **Bourquin：** 迈克，你有十种形态，但如果“秘书”形态效果最好，为什么不直接在这一种形态上投入尽可能多的仓位，而放弃其他所有形态呢？


    **Toma：** 这是个好问题，直接的回答是，因为价格行为并不总是允许这种形态出现。尤其是我使用的 1224 跳动图，很多时候趋势可能持续下去，而从不回撤到我想入场的那个“最佳位置”。


    当然，我也可以直接在高点买入，并希望它继续上涨，但我的全部信条不仅仅是交易我的形态，还要获得最优的价格。如果我无法获得最优价格，那么很多时候我就会放弃。


    我放弃过很多交易。我错过的交易可能比实际做成的还要多，但当我真的做成时，我能获得非常理想的价格。即使交易失败，我被止损出场，我的风险也是有限的，因为我是在一个非常好的价位入场的。


    总而言之，同样的形态并不总会发生，尤其是在某些趋势日——甚至是一天中的特定时段。例如，我只在开盘（美国东部时间上午 9:30）到大约美国东部时间上午 11:00，以及从美国东部时间下午
    2:45 到收盘（美国东部时间下午 4:00）这段时间内瞄准“秘书”形态，因为这些是该形态表现最佳的时段。


    **Bourquin：** 我喜欢你“错过交易”这一点，这仅仅意味着你没有追涨，并且在入场前非常严格地等待所要求的回撤。


    **Toma：** 这是我的规则之一，有时我看着它，会想这是不是有点太严格了。很容易就会想，“好吧，也许我无法以最佳价格入场，但如果我完全放弃它，会错过很多机会。”


    不过，老实说，我还有其他的形态可以用，而且我现在处于一种真的不想一次做超过一笔交易的状态。我记得我们上次谈话时，我们讨论的是每天做八笔交易。现在，如果我能做四笔就算运气好了。我得说，我
    80%的交易只用到我十种形态中的三种。


    **Bourquin：** 你是把这十种形态都放在一张图表上，还是使用多张图表，每张显示几种形态？


    **Toma：** 我的主交易平台上放了两三张图表。我会把最常用的形态，也就是“秘书”形态，放在一张图表上，因为这是我的核心盈利策略，我不想错过它。我的第二种形态放在另一张图表上，然后我再使用一张图表来展示我持续监控的其他两三种形态。我会为这些形态设置提醒。我并非一直密切关注它们，但在非高峰时段，比如美国东部时间午餐时间（上午
    10 点到下午 2 点），我会关注一些其他形态。当时机合适时，我会把这些图表放在屏幕下方，然后将它们放大，主要盯着它们看，同时对我主要的交易保持提醒。


    **Bourquin：** 我们来谈谈你第二喜欢的形态吧。哪一种能紧跟在“秘书”形态之后，成为第二好的选择？


    **Toma：** 我有一个只依赖于移动平均线收敛/发散指标（`MACD`）的基础形态。我的另一条规则是，我必须站在动量的正确一边，我认为`MACD`是实现这一点的非常好的方法。


    我实际上教过我年幼的侄子如何识别这种形态，并为他做了颜色编码，这样他就能看到`MACD`何时开始反转。我还向他展示了一些基本规则，为他开了一个小型交易账户，这孩子曾在一周内取得了七胜两负的战绩，盈利了
    12 个点。


    这让我想到，交易员作为一个整体，包括我自己在内，有时把事情搞得非常非常复杂。通过他的视角，我明白了这孩子没有恐惧。他把这看作一场游戏——他实际上称之为“这个游戏”——并且他不会将其与任何金钱价值联系起来。也许我们都需要这样做。


    **Bourquin：** 确实如此。当你进行模拟交易时，你没有使用真金白银，从某种意义上说，你可以像个孩子一样自由交易，因为你不担心钱。一些交易员会说他们需要真实资金带来的那种紧张感，但多数人如果不用为此担心，会做得好得多。


    **Toma：** 这一点非常重要，因为进入这个行业的人有 90%赚不到钱，但如果他们在模拟器中交易，其中大多数人是能赚钱的。通过剔除金钱因素，你可以获得心理上的优势。我看着一个八岁的小孩做着这件事，他最大的问题就是，每当电视上播放《海绵宝宝》时，他就会跳起来离开！


    就我个人而言，我的屏幕上不显示任何盈亏指标。虽然这对我来说仍然是一个挑战，但我希望让自己进入一种心态：重点不是钱，而是执行我的交易计划。


    **Bourquin：** 很多成功的交易员都谈到，要把交易的目标设定为除了钱之外的任何东西，但归根结底，我们都知道交易是为了钱。那么，你如何为自己设定非金钱方面的目标呢？


    **Toma：** 我的最终目标就是遵循我的交易计划，所以我设有衡量我执行情况的指标。我相当自信，我的形态会如期出现，让我实现理想的生活方式，但问题在于我是否能尽可能高效地执行我的计划。

    '
- fmt: 'For example, I’ll never say, “I want to make an average of three points a
    day.” I did that at one point, but it doesn’t really tell me anything. What if
    the market was able to give me fifteen points that day and I only took the three?
    Or, what if the market wasn’t giving me anything and I got the three points, but
    I broke a rule to do so? I’ve learned to just have a good, solid plan that I’m
    comfortable with and focus solely on implementing that.


    One of my key metrics is my average risk/reward ratio for all my trades throughout
    the month. While each one is different, I want it to be at least three-to-one
    on certain setups. If I find that, on average, my ratio was two-to-one, I need
    to look at what I did that month and modify something, because I will consider
    that a rule breaker, even if I’ve still made money in the process.


    Maybe I’m a little neurotic about it, but I actually have penalties, and sometimes
    I have to go on simulation the next trading day if I’ve broken certain rules the
    day before. That’s tough for me, because I’m a professional trader, but it helps
    create the discipline to not make that mistake again.


    **Bourquin:** A lot of traders have a tough time deciding where to place stops
    and profit targets to achieve their desired risk/reward ratio. How do you determine
    those levels?


    **Toma:** Well, my risk manager mentality means I’m really focusing on the risk,
    so I’m not too concerned about my profit target at first. I want to focus on how
    much I can afford to lose and, more importantly, how I’ll know if I’m wrong about
    the trade.


    In years past, I would set arbitrary stops, like six ticks or two points in the
    ES. However, because high volatility and algorithmic trading are so prevalent,
    that really didn’t tell me that I was wrong. It only indicated that my maximum
    risk had been hit, so I needed to get out.


    Here’s one thing that may be contrary to public opinion: A lot of traders want
    to have two-to-one, three-to-one, or five-to-one risk/reward ratios. Well, that’s
    great, but if I have a setup that gives me 70 percent, I don’t mind taking one-to-one
    on that.


    In the case of a setup that may only work 50 percent of the time, though, you’d
    want a two-, three-, or four-to-one risk/reward ratio.


    **Bourquin:** Considering your Secretariat setup, how do you determine your stop
    levels? Is it a certain distance below a moving average line?


    **Toma:** Yes, and in the past, I would have set it right below the thirty-period
    WMA. Now I want to give it more room, and especially on big trend days, I’ll actually
    set a catastrophic stop of three, three-and-a-half points, depending on the day’s
    average true range.


    For the most part, though, my default is three points, and when a five-minute
    bar is broken below that, I’ll know I’m wrong. On the other hand, if it’s contained
    and just sticking within that area—even if it’s two points and it doesn’t look
    good—I’ll know I’m not wrong yet. The six-tick stop players are all out already,
    and the trade hasn’t gone bad.


    Of course, I want to have something in there in case the next five-minute print
    is a ten-point bar caused by a big news announcement. So, the catastrophic stop
    is there for that reason. Once I start reaching those stop levels, I’ll know I’m
    wrong, and I’ll just close out and wait for the next opportunity.


    **Bourquin:** Do you track the winning percentage of all of your setups?


    **Toma:** Yes, I do. I actually have a grid, and I do a monthly report on each
    setup. I try to be accountable for everything and will even have other traders
    review it as part of that accountability.


    I monitor those results, including the total point gain/loss, and I also have
    them broken down within five time periods throughout the regular trading day.
    That helps me find, for example, that a particular setup might be 64 percent accurate
    overall, but it is 76 percent accurate between 10:15 a.m. and noon. Then, after
    1:30 p.m., it may be less than 50 percent accurate.


    I have a big poster in my office highlighting the setups and time periods, and
    I’m always looking at it, so I know the bread-and-butter setups, historically.
    That gives me an edge. Like I said, I may not be the world’s best trader, but
    I recognize edge, I recognize opportunity, and I know, historically, when my setups
    achieve optimum results.


    **Bourquin:** It’s interesting that you mentioned getting “an edge.” I did a recent
    webinar with Corey Rosenbloom about just that. Does being able to match your setups
    with the optimum time of day create your edge, or is there more to it?


    **Toma:** Corey’s work is really good. He and I had coffee at a recent Traders
    Expo, and we were talking about our trading.


    Like Corey, I also look at support and resistance when I do my research prior
    to the market open. I’ll mark down certain pivot points, resistance levels, the
    previous day’s highs and lows, and the overnight price action. These are the areas
    that I want to really focus on and be aware of whenever they’re hit.


    Say, for example, a Secretariat setup is developing right around an area that
    looked like prior support. That’s sweet for me; it’s what I wait for all day.


    One of my rules is that I have to have confluence on each trade, and I’ll use
    pivots or Fibonacci zones to get that confluence. I’m not a big Fib guy, but if
    it’s going to match up with my other support levels, I will become one.


    I do a lot of work with market profile, which isn’t a favorite of many traders,
    primarily because it’s a little difficult to understand, but also—and more importantly—because
    it usually doesn’t come with a lot of the trading platforms out there. I subscribe
    to a service that gives me great levels, so I know when I’m wrong about a trade
    or where I can get in. All of those things help to give me a little extra edge.


    **Bourquin:** The fan base among short-term traders may be growing, but I think
    that in the past, most people thought of market profile as an investing strategy.
    Now short-term traders are seeing that it works on their time frames as well.


    **Toma:** I think of it as part of my overall development. In addition to my trading
    plan and my monthly assessments, I create a development plan every year. I write
    down the things that I want to learn and gain exposure to, and I’ll look into
    them at seminars, expos, and on my own.


    Market profile was one of those items on a past development plan. More recently,
    I’m trying to learn about other facets of the business at the same time that I’m
    learning some new strategies. With algorithmic trading now so prevalent, I’m learning
    more about that.


    **Bourquin:** Can you recall something that came from your development plan that
    helped you reach that next level in your trading?


    **Toma:** Sure. Developing my trade-tracking skills was very important, but the
    thing that has really brought me to the next level was learning to trade more
    like a tactician. I wanted to be like a robot. I found myself getting too involved
    in each setup and following every tick to the point where I’d be exhausted by
    the end of the day.


    I had to make some changes to accommodate a more balanced lifestyle, and that
    became part of my development. When you get too emotionally involved, either you
    miss opportunities because you get scared, or you try to make up for prior losses
    and end up getting killed.


    Being more robotic in trading my plan was a developmental goal of mine a couple
    of years ago, and I’m still working to improve at it. You never really perfect
    that. I’m really a plan-implementation specialist more than a trader, and if I
    can focus intently on just trading my plan, I know I’ll be fine.


    **Bourquin:** So many times I see people feverishly jumping between expo workshops
    like they’re looking for the Holy Grail. You don’t have that same frenetic pace.
    Would you agree that if those people would just focus on learning one thing at
    a time and putting it into practice, they would probably be better off?'
