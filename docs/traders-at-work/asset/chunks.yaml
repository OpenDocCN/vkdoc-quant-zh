    \ 获取。有关如何查找本书源代码的详细信息，请访问 `www.apress.com/source-code/`。\n\n*献给科特妮。你是我梦中的宝贝。*\
    \  \n—蒂姆·伯奎因\n\n献给爸爸妈妈。即使在我自己都不信的时候，你们也始终相信我。永远爱你们。  \n*—尼古拉斯·曼戈*\n\n## 目录\n\n\
    - 前言\n- 关于作者\n- 致谢\n- 第 1 章：托德·戈登\n- 第 2 章：琳达·拉什克\n- 第 3 章：塞尔吉·伯格\n- 第 4 章：亚历克斯·福斯特\n\
    - 第 5 章：德里克·希明\n- 第 6 章：彼得·布兰特\n- 第 7 章：罗布·威尔逊\n- 第 8 章：约翰·卡特\n- 第 9 章：安妮-玛丽·拜因德\n\
    - 第 10 章：杰夫·怀特\n- 第 11 章：帕特里克·海明格\n- 第 12 章：唐·米勒\n- 第 13 章：查尔斯·杰曼\n- 第 14 章：安德鲁·梅纳克博士\n\
    - 第 15 章：布莱恩·伦德\n- 第 16 章：迈克尔·托马\n- 第 17 章：富有交易员的二十个习惯\n- 索引\n\n## 前言\n\n那是令人兴奋的岁月——90\
    \ 年代末；牛市呼啸而来，每个人都想辞掉白天的工作去做日内交易。任何人都可以做到，这似乎是通往财富的捷径。既然能交易，为什么还要工作？然而，他们几乎没有意识到，交易是一门生意——而且是一门艰难的生意。蒂姆·伯奎因深知交易的现实并希望提供帮助，于是他与合伙人吉姆·苏格曼创立了在线交易博览会（现为交易员博览会）。这个博览会是交易员们汇聚一堂、交流想法、会见供应商、发现新工具和新技术、学习并精进技艺的地方。\n\
    \n距离那些牛市的辉煌岁月已经过去很久了。尽管 14 年过去了，标普 500 指数仅比 1998 年的峰值水平略有变化。买入并持有的整个理念已被否定，这让一代期待获得“理应”拥有的\
    \ 10%年化收益的投资者们大失所望。十多年来，一个事实已经变得非常清晰：交易并非不可能或奢侈之事；如果你想在金融市场赚钱，交易是必需的。整个买入并持有的概念从一开始就是个笑话。天下根本没有免费的午餐。投资和交易是工作——是高回报的艰苦工作。\n\
    \n蒂姆和合著者尼克接触过许多交易员，其中包括一些顶尖人物，而这本书汇集了他们在多年中结识的一群交易员的经验集锦。这里有许多想法供好奇的头脑去探索，如果你能从中发现哪怕一个有助于改进你交易思路的想法，像本书这样的资源都将是无价之宝。书中呈现的一些想法可能看似矛盾，这实属正常，因为交易没有唯一的方法。每个交易员的过程都不同，每个交易员都必须找到自己的路。\n"
- fmt: '正如你所料，我经常被问及如何使用布林带进行交易。我通常会通过举例来回答，有些例子来自我自己的交易过程，有些来自他人的交易过程，有些是我正在使用的，还有一些是我知道有价值但自己可能并未使用的。为何如此多样？因为很难知道什么会对某个特定的投资者或交易者产生共鸣。有时，“学生”比“老师”懂得更多。事实上，我从布林带用户那里得到的反馈，其价值常常与建议本身相当，甚至偶尔更胜一筹。原因很清楚：其他人思考过我没有想到的事情，这也是我阅读这类书籍的原因。


    有一点你始终可以确信：无论某种方法被教授得多么具体或清晰，接受它的人都会将其带回家，反复思考，并加以修改以适应自己的需求。这意味着，如果你向100名交易者教授一种交易方法，结果很可能是由不到100名不同的交易者实践出100多种不同的方法，而不是100名交易者使用同一种方法。为什么是100多种方法？因为会有许多变体被尝试。为什么是不到100名交易者？因为老话讲得好：你可以把马牵到水边，但你不能强迫它喝水。


    我的经验表明，当给出的建议不那么具体时，最终结果反而会更加一致。这是因为许多交易问题都有通用的解决方案，这些方案本身就运作良好；非常笼统的建议会促使交易者专注于这些解决方案，而非常具体的建议则会导致交易者寻求变化。这一现象的另一个体现是，多年来，我和我的团队为交易者和投资者开发了许多网站。通常，我认为网站上最有趣和最有用的部分（例如，[www.BBands.com](http://www.BBands.com)
    上的“The Edge”板块）并不是用户感兴趣的部分。事实上，我们的用户经常以我们未曾预料甚至未曾想到的方式来利用这些网站。


    这就引出了那个反复出现的问题的答案：如果公开一个有利可图的交易方法，它难道不会很快因套利而消失吗？对于这个看似简单的问题，实际上有两个答案。首先，如果该方法、工具或方法的优势来自于一个基本且根本的市场机制，那么它很可能会持续有效，直到市场本身发生质变。其次，如果所教授的是针对特定市场或时期的数据挖掘产物，那么它将无法持久；它会失效，而且很可能会在不久后而非更晚失效。这其中包含了一个教训：依赖基本市场机制（如波动性或均值回归）的简单方法，比那些复杂、常进行曲线拟合的同类方法更可能有用且稳健。


    那么，交易者应该怎么做？第一，要忠于自己。待在自己的舒适区内，并且只能循序渐进地拓展边界。第二，学习技术分析的历史。前辈大师们知识渊博，仔细研读市场历史能让你受益匪浅。第三，学习一点数学；不必太多，一些代数和非常基础的统计学知识即可。你将与数字打交道，所以要和它们交朋友。第四，学习一点编程；Python
    是一个不错的起点。如今，大多数交易平台都允许你使用非常高级且易用的语言来自定义其功能。一点点编程知识就能让你的交易员生活轻松得多。第五，要自律。第六，非常重视头寸规模管理。第七，杠杆不是你的朋友。最后，要让交易变得有趣。你很可能会长时间从事交易，所以最好能乐在其中。


    总结一下：有纪律地交易，不要过量交易，并且主要依靠技术分析。


    ——约翰·布林格，CFA，CMT

    [www.BollingerBands.com](http://www.BollingerBands.com)


