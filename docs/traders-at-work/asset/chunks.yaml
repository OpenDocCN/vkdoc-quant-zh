  raw: 'As you might expect, I am often asked how to trade with Bollinger Bands. I
    usually reply with examples, some from my own process, some from the trading processes
    of others, some that I use, and some that I know to be valuable, even though I
    may not be using them. Why the diversity? Because it is hard to know what will
    click with any given investor or trader. Sometimes the “students” know more than
    the “teacher.” In fact, the feedback I get from Bollinger Band users is often
    as valuable as—and occasionally better than—the advice. The reason for this is
    clear: others have thought about things that I haven’t, which is the reason I
    read books like this.


    One thing you can always be sure of is that no matter how specifically or clearly
    a given approach is taught, the person who receives it will take it home, mull
    it over, and modify it to suit his or her needs. That means that if one were to
    teach a trading approach to 100 traders, the result would likely be more than
    100 different approaches traded by less than 100 different traders, not a single
    approach traded by 100 traders. Why more than 100 approaches? Because many variations
    will be tried. Why less than 100 traders? Because, as the old saw suggests, you
    can lead a horse to water, but you can’t make it drink.


    My experience suggests that the final results will be more consistent when the
    advice given is less specific. This is because there are general solutions to
    many trading problems that simply work well, and very general advice will cause
    traders to home in on those solutions, whereas very specific advice will cause
    traders to seek variation. Another reflection of that phenomenon is that, over
    the years, my team and I have developed many web sites for traders and investors.
    Often the sections of the sites that I think are most interesting and useful—“The
    Edge” on [www.BBands.com](http://www.BBands.com), for example—are not the sections
    that our users are interested in. Indeed, our users often find ways of utilizing
    the sites that we had not expected or even thought of.


    Therein lies the answer to one of those questions that comes up again and again:
    If one discloses a profitable trading method, won’t it be quickly arbitraged out
    of existence? There are actually two answers to that seemingly simple question.
    First, if the method, tool, or approach draws its strength from a basic and fundamental
    market mechanism, it will likely prove to be durable until the market itself morphs.
    Second, if what is taught is a data-mined artifact from a specific market or time,
    it will not last; it will fail, and it will do so most likely sooner, rather than
    later. Therein lies a lesson: simple approaches that rely on basic market mechanisms,
    like volatility or mean reversion, are more likely to be useful and robust than
    their complex, often curve-fitted brethren.


    So, what is a trader to do? First, be true to yourself. Stay within your comfort
    zone, and only push the envelope very gradually. Second, study the history of
    technical analysis. The old masters were very knowledgeable, and you can learn
    a great deal from a close reading of market history. Third, study a little math;
    not a lot, just some algebra and very basic statistics. You’re going to be working
    with numbers, so get friendly with them. Fourth, learn a little bit of programming;
    Python is a good place to start. Most trading platforms today allow you to customize
    their functionality with very high-level languages that are easy to use. A little
    bit of programming knowledge can make your life as a trader much easier. Fifth,
    be disciplined. Sixth, pay a lot of attention to position sizing. Seventh, leverage
    is not your friend. Finally, make it fun. You will most likely be doing it a lot,
    so it had better feel good.


    To sum it up: Trade with discipline, not too much, and mostly with technical analysis.


    —John Bollinger, CFA, CMT

    [www.BollingerBands.com](http://www.BollingerBands.com)


