    # 章节


    ## 托德·戈登


    **托德·戈登**是阿斯彭交易集团的创始合伙人兼研究与交易总监，同时也是弗洛伊德、戈登与合伙人投资管理公司的负责人。此前，他曾身兼两职，担任`FOREX.com`的高级技术策略师以及该平台母公司
    GAIN Capital Asset Management 的高级交易员。


    戈登曾是 GAIN Capital Asset Management 六名交易员之一，负责管理超过 1000 万美元的交易资金。他定期亮相 CNBC 的节目*《快钱》*和*《资金流动》*，并曾在彭博社、BNN（商业新闻网络）以及道琼斯在线等媒体上提供全球市场的专业分析。


    在纽约州北部圣劳伦斯大学就读期间，戈登曾参加该校的甲级高山滑雪队，与未来的奥运选手同场竞技。如今，他冬天依然喜欢驰骋雪场。他信奉的座右铭是“计划你的交易，交易你的计划。”


    **蒂姆·布尔昆：** 我听说交易是你大学毕业后的第一份工作。你是在哪里上的大学？


    **托德·戈登：** 前两年我在纽约州北部的圣劳伦斯大学就读。我的专业是经济学，辅修商科。那时，我还没找到自己的激情所在。大学期间，我的重心是高山滑雪速降比赛。圣劳伦斯大学是甲级滑雪学校，所以我努力争取加入了校队，并有机会与队里几位未来的奥运选手切磋交流。说实话，在大学里，我几乎一心只想着如何提升自己的回转技术，仅此而已。因此，在那里比赛了两年后，我告诉自己，是时候专注于工作和规划职业生涯了。我意识到自己不可能靠滑雪谋生。于是，我从圣劳伦斯大学转到了奥尔巴尼州立大学，并在那里完成了学位。不过，我并没有完全放弃竞技滑雪。奥尔巴尼州立大学有一支丙级滑雪队，所以我继续参加比赛，但开始更多地专注于我的商科和经济学课程。正是在那最后两年里，我开始认真考虑将交易员作为自己的职业。


    **布尔昆：** 那时你对成为一名交易员需要具备什么条件了解得多吗？你有没有想过可能会在华尔街工作？


    **戈登：** 从圣劳伦斯大学到后来在奥尔巴尼大学的两年里，我一直有一个电子交易账户。这更像是一种爱好，日内交易股票，恰好是在“日内交易”这个词刚开始出现在新闻里的时候。那时候，我交易基本上就是瞎蒙。我当时还跟着一个叫“东京乔”的聊天室。他是当时最轰动的人物，市场开盘时，他的聊天室里每天都有成千上万的交易者。他推荐一只股票，大家就会盲目买入，根本不知道为什么。那真是一段疯狂的时期。


    **布尔昆：** 他是不是后来被起诉了之类的？


    **戈登：** 是的，当他的整个骗局被揭露后，他最终证明是个骗子。他会在聊天室里炒作股票，所有人都跟着追涨。结果发现，他在推荐前的几天就已经买入了那些股票，然后在建议聊天室里所有人买入后的几分钟内就开始抛售。他的股票推荐，以及那么多会员的跟风操作，确实能迅速影响市场。我记得有一笔交易是做代码为`GEEK`的股票。我记得好像是“互联网美国”这家公司，大约在
    10 分钟内我就每股赚了 10 美元。


    当然，也有很多其他交易做得很糟糕，我经常被止损出局。我确实热爱交易这个游戏，但最终我明白，盲目地追随一个聊天室，却丝毫不了解市场发生了什么，也不明白自己做交易决策的原因，从长远来看是不可持续的。如果运气好，你也许能偶尔赚到钱，但只有基于客观指标构建自己的策略，才是让交易成为全职工作的唯一途径。


    所以，从那时起，我开始真正学习如何独立交易，不再依赖聊天室主持人给出买卖建议。大学期间我读的第一本书是亚历山大·埃尔德写的《以交易为生》[Wiley, 1993]。我知道自己想以此为生，所以觉得这本书是完美的入门读物！那是我第一次学习阅读图表和技术分析，突然间，我学会了如何在图表上画一条简单的趋势线。我开始在图表上到处画趋势线，也就是从那时起，我开始形成某种关于买卖哪些股票的计划。这些简单的趋势线，是我以一种客观方式看待市场、理解何处可以介入优质交易的起点。


    有趣的是，当我学习经济学（当时我认为这在交易领域基本没什么用）的同时，我也开始理解如何做基础的技术分析，并将其应用于我考虑交易的每一只股票。当我看到股票的价格行为以及它们如何在这些趋势线（作为支撑和阻力）处反弹时，我彻底被交易的“虫子”叮咬了，我清楚地知道这就是我想从事的职业生涯。


    结果证明，我的经济学学位并非完全无用。我实际上认为它帮助我更深入地理解了市场，尤其是在我现在交易外汇市场的时候。对全球经济体系运作方式的广泛理解，对我的成功至关重要。


    **布尔昆：** 那时你使用的是什么类型的软件和工具？


    **戈登：** 这很有趣，因为我甚至无法想象今天还在用同样的系统交易。我很早就开始用这家公司的网络账户和电子交易账户进行日内交易了。界面和工具跟现在完全没法比。我的账户里大概有
    5000 美元。我那时用的是慢得离谱的拨号上网进行日内交易。但我骨子里的好胜心让我全心投入，我决心要把它做好，不管我用的工具多么糟糕。我记得我用的 AOL
    拨号上网，那要追溯到按分钟计费的年代，因为上网对我来说算长途电话。当时我 19 岁，待在家里——就是在我父母家晃悠。我妈妈拿着一大笔电话账单来找我，差点没把我打死。股市开盘时，我每天上网大约八个小时。有几次电话账单每张高达一千美元，不用说，我妈气得够呛。


    **布尔昆：** 是啊，我能想象。当你用拨号连接下单时，你点击“买入”按钮，然后等着系统慢悠悠地转几秒钟。我记得那些日子，大约要一分半钟才能收到确认信息，对吧？


    **戈登：** 我甚至都不记得了。肯定是的，但那时我根本没想过我的成交价不是最优的。我对做市商的执行手法和他们玩的把戏一无所知。点差巨大，滑点也糟糕透顶。如果下市价单，你会亏得很惨，因为你最终得到的成交价与你预期的价格相去甚远。软件还老是崩溃。拨号连接也经常断线。真是一团糟。那时，我认为这就是游戏的一部分。我总得从某个起点开始。而且我想，如果能在那种交易环境下赚钱，那在任何地方都能赚钱。


    **布尔昆：** 是的，绝对是这样。如果你没有经历过那段时期，你可能就不会是今天这样的交易员了。所以我认为，即使是糟糕的经历，某种程度上也在增加你作为交易员的经验积累。你大学毕业后，是立刻找到了交易员的工作吗？

    '
- fmt: '**Gordon:** 我立刻开始寻找交易方面的工作。我在 `Monster.com` 上找到了一家位于圣地亚哥的公司。大四那年，我正准备参加最后的期末考试，我拨打了招聘信息上的电话号码。接电话的人后来成了我现在的商业伙伴，`Dave
    Floyd`。


    我在电话里跟他聊了，我说：“我对交易非常感兴趣。我刚大学毕业，很快就要毕业了。”他告诉我他们有交易员的空缺职位，但当然，他需要面试我。他在圣地亚哥，而我在纽约州北部，那时正值考试周前夕。我不确定自己怎么才能做到，但我知道这是一个不容错过的机会。还有谁会考虑雇佣一个刚毕业、唯一的经历就是一个聊天室、几本交易书籍和一个
    `E-Trade` 账户的交易员呢？所以我说：“我稍后给你回电话。”大约半小时后，我给他回了电话，告诉他我周二会到那里。


    我在考试前飞过去见了他，进行了面试，然后立即飞回家参加期末考试。几天后，他给我回电话，说我得到了这份工作，前提是搬到圣地亚哥。当时我在圣地亚哥有很多家人，从纽约州北部寒冷的冬天搬到圣地亚哥阳光明媚的海滩，这是一个轻松的决定。我有机会成为一名交易员，同时生活在天堂。我还能要求什么呢？我住在太平洋海滩，那是一次很棒的搬迁。在毕业后的头几个月里，我从
    `Dave` 那里学到了交易的门道。


    **Bourquin:** 你还记得他在寻找交易员时看重什么吗？他是在寻找特定的品质或特定类型的人吗？你觉得他看中了你什么？


    **Gordon:** 这很有趣，因为大多数交易员都知道，学业成绩并不总能转化为交易员的成功。有时，学业成绩过于出色的人最终会成为糟糕的交易员，这基本上是因为他们不习惯犯错。交易不像工程或数学，你有一个公式，输入数据后，答案要么对要么错。作为一名交易员，你需要非常能够接受在市场上犯错。自信和自我会毁掉一个交易员，如果他认定自己是“对的”，市场会朝他的方向移动。所有经验丰富的交易员都知道一句话：“市场保持非理性的时间可能比你保持偿付能力的时间更长。”这是千真万确的。交易中没有正确答案，你总是在信息不完全的情况下做决策。有些人很难接受这一点。


    所以，我的第一个老板，也是现在的商业伙伴，实际上看中了我的滑雪比赛背景，他知道我来自一个竞争激烈的背景。他对自己说：“这家伙很坚韧，而且在一项个人运动中表现出色。”滑雪运动需要很大的责任心和自律，因为是你自己对抗赛道——而不是真正的对手。所以，我认为他看到了我身上的竞争精神，这个行业里几乎所有人都知道，当你以市场为生时，这是一种重要的品质。他也知道我在期末考试前赶来面试，他说这显示了对工作的投入，以及学习如何做好这件事的决心。


    **Bourquin:** 我喜欢用体育来比喻交易。棒球是我最喜欢的运动，我总能看到它与交易之间的关联。在滑雪方面，我脑海中浮现的是，你总是要向下一个弯道看，预测需要怎样做才能在不摔倒的情况下通过下一个旗门。你认为滑雪和交易之间存在某种联系，帮助你成为成功的交易员吗？


    **Gordon:** 是的，绝对有。这实际上是我在交易者博览会和其他会议上演讲时喜欢讲的一个经典故事，因为它太适用于交易了。如果你在奥运会期间观看滑雪比赛，你会看到选手们以每小时五十英里的速度冲下山坡，但你看不到的是比赛前所有的准备工作。实际上，有一个叫做“赛道勘察”的阶段。他们要做的就是爬到赛道的顶端，然后沿着他们当天晚些时候将要比赛的赛道侧滑下来。


    你要做的是记下心理笔记，并制定一个策略来应对赛道上不同类型的赛况。你要观察太阳照射在雪上的位置，这会造成不一致的雪况。或者，可能某个区域被太阳遮蔽，所以会非常坚硬和结冰。也许赛道上某个地方有一些崎岖的地形。你要考虑所有这些已知的因素，它们会影响你的比赛进程，这样你就可以把它们纳入你的比赛计划。


    滑雪比赛中的准备至关重要，因为当你以每小时四五十英里的速度冲下山坡时，你不会有时间在做出反应之前去思考这些事情。这需要在比赛开始前就融入你的比赛计划中。不可避免地，会出现你事先无法预见的未知变量，所以当你执行比赛计划时，你需要有足够的精力去应对这些因素，并在行进中即时适应和处理它们。


    交易也是同样的事情，尤其是我交易的方式。我会从各个角度审视市场，并不断留意在交易过程中可能出现的任何情况。如果可能，我会在真正下订单之前将这些因素纳入我的交易计划。惊喜越少越好，而且我知道，就我个人而言，如果我有一个书面的交易计划，我在交易中会做出更客观的反应。因为不可避免地，在比赛——或交易——过程中会出现一些情况，你需要全神贯注地做出快速调整。所以，滑雪和交易在准备和执行方面，在交易或比赛过程中，是极其相似的。


    **Bourquin:** 我经常听到非常优秀的专业交易员说，他们很有信心在信息不完整的情况下做出决策。他们并非无所不知，但仍然能够在市场上做出自信的决策。你同意这个观点吗？


    **Gordon:** 我认为 `Paul Tudor Jones` 说得最好，他说一些最好的交易也是最难执行的交易。我认为这意味着需要一种信念的飞跃。我不是说在没做任何研究的情况下盲目地建仓。而是当你已经尽可能多地收集和消化了信息之后，总是会到达一个点。你不可能永远知道所有事情。如果你坚持在执行交易前了解一切，你就会不断地陷入“分析瘫痪”。这是反直觉的。


    作为人类，我们都认为信息越多越好。更多的信息应该意味着更好的决策，这在某种程度上是对的，但你需要能够在不知道结果会是什么的情况下，做出买入或卖出的决定。所以，需要一种信念的飞跃。你可以让概率站在你这边，但不可避免地，还需要发挥直觉的作用。'
  raw: '**Gordon:** I went right to work looking for trading jobs. I found a company
    on [Monster.com](http://Monster.com) based in San Diego. I was just about to take
    my last finals during my senior year, and I called the number in the job listing.
    The guy who answered the phone wound up being my current business partner, Dave
    Floyd.


    I talked to him on the phone, and I said, “I’m really interested in trading. I’m
    just out of college and I’ll graduate here in a little bit.” He told me they had
    open positions for traders, but of course, he needed to interview me. He was in
    San Diego and I was in upstate New York right before finals week. I wasn’t sure
    how I was going to make it happen, but I knew this was an opportunity I shouldn’t
    pass up. Who else was going to even consider hiring a trader right out of college
    whose only experience was a chat room, a few books on how to trade, and an E-Trade
    account? So I said, “Let me call you back.” About a half-hour later, I called
    him back and I told him I would be there on Tuesday.


    I flew out ahead of my tests and met him, interviewed, and immediately flew back
    home to take my finals. A few days later, he called me back and said I had the
    job if I moved to San Diego. I had a lot of family in San Diego at the time, and
    moving from the winters of upstate New York to the sunny beaches of San Diego
    was an easy decision. I had the opportunity to work as a trader and live in paradise.
    What more could I ask for? I lived in Pacific Beach, and it was a great move.
    I learned the ropes of trading from Dave in those first few months out of college.


    **Bourquin:** Do you remember what he was looking for in a trader? Was he looking
    for certain qualities or a specific type of person? What do you think he saw in
    you?


    **Gordon:** It’s funny because most traders know that academic record does not
    always translate into success as a trader. Sometimes, people who have overly impressive
    academic records wind up being terrible traders because, basically, they’re not
    used to being wrong. Trading is not like engineering or mathematics, where you
    have a formula and when you plug in the data, the answer is either right or wrong.
    As a trader, you need to be very okay with being wrong in the markets. Confidence
    and ego can ruin a trader who is determined they are “right” and the market will
    move in their direction. There is a saying all veteran traders know well: “The
    market can stay irrational longer than you can stay solvent.” It is absolutely
    true. There is no right answer in trading, and you are constantly making decisions
    based on incomplete information. Some people have a very hard time with that.


    So, my first boss and current business partner actually looked at my ski racing
    background and understood that I had come from a competitive background. He said
    to himself, “This guy’s tough and did well in an independent sport.” There’s a
    lot of responsibility and self-discipline that goes along with ski racing, because
    it’s you against the course—not really the other team. So, I think he saw the
    competitive spirit in me and almost everyone in this business knows it is an important
    quality when you make your living in the markets. He also knew that I came out
    to the interview right before my finals, which he said showed commitment to the
    job and to learning what it took to do well.


    **Bourquin:** I love sports analogies as they relate to trading, Baseball is my
    favorite sport and I see correlations to trading all the time. In skiing, the
    thing that comes to the top of my mind is that you’re always looking down the
    hill at the next turn and anticipating what it will take to get past that next
    flag without falling. Is there any connection there with skiing that you think
    helped you become successful trader?


    **Gordon:** Yes, absolutely. It’s actually one of the stock stories that I love
    to tell in my speeches at the Traders Expos and other conferences because it’s
    so wildly applicable. If you turn on the Olympics during a ski race, you see the
    guys jamming down the hill at fifty miles an hour, but what you don’t see is all
    the preparation that goes into the race ahead of time. There’s actually a period
    of time called “course inspection.” What they do is go to the top of the course
    and sideslip down the actual course they will be racing on later that day.


    What you’re doing is taking mental notes and developing a strategy to account
    for the different types of terrain on the course. You’re looking at where the
    sun is hitting the snow, which is going to create inconsistent snow conditions.
    Or maybe there’s a certain area that’s shaded from the sun, so it’s going to be
    very hard and icy. And maybe there’s some rough terrain at a certain point on
    the course. You’re taking into account all these known factors that will impact
    the course of your race, so you can build them into your game plan.


    Preparation in ski racing is key because when you’re doing forty or fifty miles
    an hour down the hill, you’re not going to have time to think about these things
    before reacting. This needs to be built into your game plan before you even start
    the race. Inevitably, there will be unknown variables that pop up that you couldn’t
    see ahead of time, so you need to be free while you’re acting on your game plan
    to encounter those factors, and adapt and work through them on the fly.


    Trading is really the same thing, especially the way I trade. I look at the market
    from all angles, and I’m constantly on the lookout for anything that could pop
    up during the course of my trade. If possible, I incorporate those factors into
    my trading plan before I actually place the trade. The fewer surprises, the better,
    and I know that, for me personally, I’m going to react much more objectively while
    I’m in a trade if I’ve already got a written game plan. Because inevitably, there
    will be things that pop up in the course of the race—or the trade—and you’ll need
    to have your full attention to focus and make quick adjustments. So skiing and
    trading are unbelievably close in terms of preparation and execution during the
    course of your trade or a race.


    **Bourquin:** I always hear very good professional traders say that they are confident
    making decisions without 100 percent of the information. They don’t know everything
    there is to know, and yet they’re still able to make a confident decision in the
    markets. Is that something you agree with?


    **Gordon:** I think Paul Tudor Jones said it best when he said that some of the
    best trades are the hardest ones to put on. I think that means there needs to
    be a leap of faith. I’m not talking about blindly putting on a position without
    doing your research. But there’s a point where you have gathered and assimilated
    as much information as you possibly can. You’re never going to know everything.
    If you insist on knowing everything before you execute the trade, you’re going
    to constantly have “paralysis by analysis.” That’s counterintuitive.


    As human beings, we all believe that you can never have too much information.
    More information should equal better decisions, and that’s true to a point, but
    you need to be able to make that decision to buy or sell knowing that you don’t
    know what the outcome will be. So there needs to be a leap of faith. You can have
    the probability stacked in your favor, but there’s inevitably a gut feel part
    that has to come into play.'
