- fmt: '# 关于策略回溯测试的对话


    话虽如此，我不会交易任何未经测试的东西。也许我现在就是这样思考的，因为我从事策略回溯测试已经很久了，这已经成为我的习惯。当有人说他们在市场上做这做那的时候，我总是问他们：“你怎么知道你的策略是有效的？你测试过吗？”如果他们说“没有，我没有测试过”，我会说：“你甚至怎么知道它能用？你怎么能交易它？在经历困难时期时，你怎么可能有任何信念？”


    一般来说，没有对自己的策略进行过回溯测试的人，在遇到回撤时会感到气馁并放弃交易。购买一个系统也是如此。你不能花1000美元买个系统，然后就投入真金白银或寄予厚望。我总是对每一个问我关于回溯测试的人说同样的话：你需要卷起袖子，需要彻底地测试方方面面，上下左右，在所有不同的市场中进行测试。你需要疯狂地测试你的系统，这样在艰难时期你才会有信心。即便如此，也无法保证它在未来一定有效。


    **Bourquin：** 你不仅测试策略，还测试它在哪些特定的市场中表现最佳。这两个测试是一起进行的吗？还是某个策略在一个市场中表现最好？


    **German：** 我尝试了很多不同的趋势跟踪策略，包括独立策略和相互配合的策略。我试图在大约35个不同的期货市场上测试它们，因为我一直交易期货。


    理论是，如果一个策略在所有市场上都不奏效，那么你就做了一些曲线拟合，或者它根本就不靠谱，不够稳健。在我对30多个期货市场进行的所有回溯测试中，有很少一部分——大概六个左右——我的策略在三十多年的时间里没能奏效。但它对所有其他市场中的每一个都有效。


    我不会区分市场，然后说我的策略在这个市场非常有效，所以我只在这里交易。我认为关键是拥有一个市场组合，这样当这十个表现不佳时，那五个表现很好，而这四个则波澜不惊。


    **Bourquin：** 你交易最多的前三个市场是什么？


    **German：** 我没有前三名。我现在在我的投资组合中交易20个不同的市场。说我有交易的最佳市场，就等于说我在猜测今年的趋势会在哪里，但你不能那样做。你拥有所有这些不同的市场，并期望其中一部分会出现趋势。我真的没有偏好的市场。


    **Bourquin：** 我喜欢这个理念，因为如果趋势不在那里，你就不必强行交易。你有一个可以观察的基地，你可以去趋势所在的地方。


    **German：** 完全正确。


    **Bourquin：** 你通常同时在交易多少个头寸？


    **German：** 我可能从零到十到十五个不等。


    **Bourquin：** 我们来谈谈进场和出场。你是如何设置止损和找到进场点的？你能谈谈过去一周或一个月里你做的一笔最近的交易吗？有什么好的、典型的、Charles
    German式的交易可以聊聊？


    **German：** 我最近有一个非常好的月份，那是因为我在一个理想的时机建立了谷物多头头寸。它们正在突破持续了大约六个月的盘整区间。


    我们正处于50年来最严重的干旱之中，玉米、大豆和小麦的价格都一飞冲天。你现在看那张图表可以清楚地看到，有人在某个主要趋势上赚了钱。


    **Bourquin：** 当你谈到某个在区间内盘整了一段时间的东西的突破时，你是希望单日K线收盘价突破，还是希望整个K线都在价格之上？具体来说，你的触发点是什么？


    **German：** 进入交易有不同的方法。有些人要求收盘价高于突破位，有些人要求收盘价高于趋势线，还有其他人要求收盘价高于移动平均线。


    **Bourquin：** 你的入场策略需要很大的信心吗？


    **German：** 是的，坚持整个系统需要巨大的信心。但是，再强调一次，你回到你的回溯测试，我测试了收盘价之上、收盘价之下、以及被*X*个范围或*X*距离突破的情况。我测试了所有不同的入场点，找到了最适合我心理的入场点，并且我对它非常有信心。


    **Bourquin：** 你是用测试来确定止损点，还是使用其他方法？


    **German：** 是的，当然。趋势跟踪者需要测试三样东西：他们的入场、他们的止损和他们的退出。这些是趋势跟踪者的基本工具，你需要同时测试这三个。


    **Bourquin：** 你的止损设置得有多远？


    **German：** 你希望你的止损是动态的，希望它们根据市场情况自动调整。我通常使用平均真实波幅（`ATR`）的函数。我会把止损设置得离我的入场点刚好足够远，以便我的交易有足够的空间运行。我的测试准确地告诉了我那在哪里。


    **Bourquin：** 这很有道理。你不希望把止损设置得太远，以至于你可能遭受重创。


    **German：** 止损的全部前提是截断亏损。我不会把止损设置得太远离我的入场价。如果一个交易开始波动然后立即反转，我就离场。然后我会等待它再次启动。一旦一个交易入场并且没有触及你的止损，你就让它自由发展。


    **Bourquin：** 我认为对于新交易者来说，最难的事情之一就是承担止损，然后准备好一天后或十分钟后，如果同样的信号再次出现，就做完全相同的交易。这最初对你是个问题吗，还是你只是说“测试结果就是这样，所以我就这么做”？


    **German：** 不，我完全知道这个。他们称之为“假突破”（`whipsaw`）。但是，你知道，这是趋势跟踪的一部分。你一直都会遇到假突破。然而，即使你被假突破折腾了十次，只要抓住一个良好的趋势，它就能弥补所有那些小的损失，因为你是在赚大赔小。


    **Bourquin：** 那你的出场点呢？你的利润目标是基于交易突破的区间上方某个前期高点吗？


    **German：** 我想最简单的解释是我使用的是移动止损。随着交易价格上涨，止损点随之移动，你可以使用几十种不同的移动止损方法。我就是用这个来退出盈利交易的。


    **Bourquin：** 我能问一下你进行趋势跟踪和回溯测试时使用什么软件吗？


    **German：** 我使用很多不同的软件。我不想细数我用的所有软件，但我可以说，有几个便宜的选择可以做基本的回溯测试。然而，当你开始考虑数据的清洁性，以及如何为了长期回溯测试而融合不同合约月份和滚动期时，事情就变得棘手了。话虽如此，当我开始的时候，`TradeStation`是最容易学的。你真的只需要它就能开始。


    **Bourquin：** 一旦你进入一个盈利的交易并且趋势持续上涨，你会允许加仓或在现有头寸上增加规模吗？


    **German：** 我不会，因为这对我来说从没测试出好结果。Richard Dennis和著名的海龟交易者曾经每半个`ATR`就增加一次仓位。这对他们有效，但根据我的测试，这不再有效了，所以我不加仓。我会建立一个核心头寸，然后就这样。


    **Bourquin：** 那减仓呢？你是怎么做的？'
  raw: 'That said, I will not trade anything that hasn’t been tested. Maybe I’m just
    wired this way now, because I have been backtesting strategies for so long, and
    it’s kind of engrained in me, but when somebody says they are doing this or that
    in the market, I always ask them, “How do you know your strategy works? Have you
    tested it?” If they say, “No, I haven’t tested it,” I say, “How do you even know
    it works? How can you trade that? How can you have any conviction when you are
    experiencing tough times?”


    Generally, somebody who hasn’t backtested their strategy would get discouraged
    and quit trading when they are in a drawdown. The same thing goes for buying a
    system. You can’t go spend $1,000 on a system and put any real amount of money
    or confidence into it. I always tell anybody who asks me about backtesting the
    same thing: you need to roll up your sleeves. You need to test everything in and
    out, up and down, and in all the different markets. You need to go through your
    system like crazy in order to have confidence when times are tough. Even then,
    there are no guarantees that it will work moving forward.


    **Bourquin:** You test not just a strategy but also the specific markets in which
    it works best. Did two tests come together? Did one strategy work best in one
    market?


    **German:** I tried a lot of different trend-following strategies, including stand-alone
    strategies and strategies that worked in combination with each other. I tried
    to test them over about thirty-five different futures markets, since I have always
    traded futures.


    The theory is that if a strategy doesn’t work across all of the markets, then
    you have done some curve fitting, or it’s just not reliable. It’s not robust.
    In all the backtesting that I did across thirty-plus futures markets, there were
    a small handful—maybe a half-dozen—that my strategy didn’t work on in over thirty
    years. But it worked on every single one of the other markets.


    I don’t segregate the markets and say that my strategy worked really well in this
    market, so I’m only going to trade here. I think the key is having a portfolio
    of markets so that, when these ten are doing poorly, these five are doing great,
    and these four aren’t doing anything.


    **Bourquin:** What are the top three markets that you trade the most?


    **German:** I don’t have a top three. I trade twenty different markets in my portfolio
    right now. To say I have a top market that I trade would be like saying that I’m
    guessing where the trend is going to be this year, and you just don’t do that.
    You have all these different markets, and you are hoping a few of those will trend.
    I really don’t have a favorite market.


    **Bourquin:** I like the idea of that, because you are not trying to force a trade
    if it’s just not there. You have a base of other places to look, and you go where
    the trade is.


    **German:** Exactly.


    **Bourquin:** How many trades do you typically have on at any one time?


    **German:** I could have zero up to probably ten to fifteen.


    **Bourquin:** Let’s talk a little bit about entries and exits. How do you set
    stops and find your entry points? Can you talk about a recent trade that you have
    done in the past week or month? What is a good, garden-variety, Charles German
    trade that you can talk about?


    **German:** I recently had a really good month, and that’s because I had entered
    long positions in the grains at an ideal time. They were breaking out of this
    consolidation that they had been in through six months or so.


    We are in the middle of the worst drought in fifty years, and the prices of corn,
    soybeans, and wheat all went through the roof. You can look at that chart right
    now and clearly see that there is a major trend that somebody is making money
    on.


    **Bourquin:** When you are talking about a breakout of something that’s been in
    a range for a while, do you want a single daily bar to close above it, or do you
    want an entire bar above it? What, exactly, is the trigger for you?


    **German:** There are different ways to enter a trade. Some people require a close
    above a breakout, some require a close above a trend line, and others require
    a close above a moving average.


    **Bourquin:** Does your entry strategy require a lot of confidence?


    **German:** Yes. Sticking to the entire system requires tremendous confidence.
    But, again, you go back to your backtesting, and I have tested a close above,
    a close below, and a breach by *x* number of ranges or *x* distance. I have tested
    all the different entry points, I have found the entry point that works best for
    my psychology, and I have a lot of confidence in it.


    **Bourquin:** Do you use testing to determine your stops, or do you use a different
    method for that?


    **German:** Yes, absolutely. There are three things that trend followers need
    to test: their entry, their stop loss, and their exit. Those are the basic tools
    of a trend follower, and you need to test all three of them at once.


    **Bourquin:** How far away do you set stops?


    **German:** You want your stops to be dynamic. You want them to adjust on their
    own to market conditions. I generally use a function of the average true range
    [ATR]. I will set stops just far enough away from my entry that my trade has enough
    room to work. My testing tells me exactly where that is.


    **Bourquin:** That makes sense. You don’t want to set your stop so far away that
    you could get hurt pretty badly.


    **German:** The whole premise of stops is that you are cutting your losses short.
    I don’t place my stops too far away from my entry price. If a trade starts to
    move and then immediately reverses, I just get out. Then I will wait for it to
    start its move again. Once a trade is in and it hasn’t hit your stop, you just
    let it go.


    **Bourquin:** I think one of the toughest things for newer traders to do is to
    take the stop loss and then be ready to take that exact same trade a day later,
    or ten minutes later, if the same signal approaches. Was that an issue for you
    originally, or did you just say, “This is what the test says, so this is what
    I’m doing”?


    **German:** No, I knew all about that. They call that a whipsaw. But, you know,
    that’s part and parcel of trend following. You get whipsawed all the time. Even
    when you get whipsawed ten times, though, if you have one good trend, it makes
    up for all of those small losses, because you are taking big wins and small losses.


    **Bourquin:** How about your exit point? Is your profit target a function of a
    previous high above the range that a trade is breaking out of?


    **German:** I guess the simplest explanation is that I use a trailing stop. As
    a trade moves higher, the stop trails behind it, and there are dozens of different
    trailing stops you can use. That’s what I use to get out of a profitable trade.


    **Bourquin:** Can I ask what software you use in your trend following and your
    backtesting?


    **German:** I use a bunch of different software. I don’t want to go through all
    the different software that I use, but I can say that there are several inexpensive
    options for doing basic backtesting. It gets tricky, however, when you start to
    think about the cleanliness of your data and how to fuse different contract months
    and rollover periods for longer-term backtesting. That said, when I started, TradeStation
    was the easiest to learn. That’s really all you need to get started.


    **Bourquin:** Once you’re into a green trade and the trend continues to rise,
    do you allow for scaling in more or building up size in an existing trade?


    **German:** I don’t, because it’s never tested out for me. Richard Dennis and
    the famous Turtle Traders used to add positions every half ATR. It worked for
    them, but as far as my testing tells me, it doesn’t work anymore, so I don’t add
    to any positions. I have a core position that I put on, and that’s it.


    **Bourquin:** How about scaling out? What do you do there?'
