- fmt: '# 《交易员访谈：Patrick Hemmingger 谈价差交易策略》


    历史上，玉米、小麦、大豆乃至石油等大宗商品中可靠且利润丰厚的价差，使得`Hemminger`能够应用其不带偏见的技术策略，并作为一名交易员取得了更大的成功。通过关注历史趋势和简单的技术指标，`Hemminger`交易多种时间框架，从长期周期一直到日内波动。他在面对经济新闻和数据时移除止损这一颇为大胆的方法，在有些人看来可能颇具争议，但正如他所解释的，这帮助他避免被当今市场中日益常见的、由过度情绪驱动的波动所止损。`Hemminger`在他的博客[`DirtyArbitrage.com`](http://DirtyArbitrage.com)上分享他的仓位，以及定期的市场见解和交易想法。


    **Tim Bourquin:** `Patrick`，我们来谈谈你的交易策略，以及你如何观察市场、每周寻找好机会。先定义一下你的交易风格。你是哪种类型的交易员？


    **Patrick Hemminger:** 好的。我是一个关系型交易员。我的意思是，我一直在观察价差，以及两种资产之间的价值关系。


    大多数情况下，这些资产的相关性非常高。当涉及到像`E-mini S&P`与`DAX`这样的隐含股票价差时——或者在我目前投入大量研究和精力的领域——我关注的是农产品价差。


    这些可以是期限结构上的价差、日历价差，或者跨商品价差，比如玉米对小麦。但我所有期货端的风险敞口都是基于关系（价差）的。


    **Bourquin:** 好的。那么，当我想到价差交易时，我通常会想到玉米和小麦通常一起波动。但当它们开始背离时，你看到了这个机会，就做多一个、做空另一个，看它们是否会重新收敛。我这么概括还算准确吗？


    **Hemminger:** 是的，我认为这是对价差交易一个很好的概括。你在寻找价值，而机会可能出现在许多不同的时间框架上，包括日内、波段或更长期的季节性周期。


    去年，玉米和小麦曾平价交易。这在历史上是很少见的现象。去年有很多次，我纯粹基于这个价差是历史性事件而卖出玉米、买入小麦。我非常愿意承担风险，并期待这个价差能重新回到小麦价格高于玉米价格的位置，而这正是现在发生的情况。


    **Bourquin:** 为什么会发生这种情况？你会花很多精力去研究背后的原因吗？还是只是说，“它就是这样，我就这么交易了”？


    **Hemminger:** 我更倾向于关注技术面。即使回头看十年、二十年、三十年，也有大量的数据——尤其是在农产品领域——可供参考。你可以从长期的角度去观察。


    我尽量不把基本面偏见掺杂到我的技术分析中。我知道市场上在议论什么，人们在说什么，但过去听从大众的意见让我吃过亏。现在我倾向于坚持自己的框架，规划每一笔交易，清楚我的风险和回报在哪里，并坚持执行计划。


    **Bourquin:** 之前我知道你一直在交易股票指数间的背离——比如你之前提到的道琼斯指数对`DAX`指数。是什么让你转向农产品市场来尝试你的交易方法？


    **Patric Hemminger:** 嗯，这是个好问题。成为一名成功的长期交易员的两个基本原则是：第一，认识到市场已经改变；第二，保持足够的灵活性以随之进化。只会一招鲜并不是长期成功的秘诀，因为从全球宏观角度看，世界在变化。


    我的专长是股票价差，即美国股票指数对欧洲股票指数。因为我的主要基准是`S&P`，我会用它来对`FTSE`、`DAX`、`Euro Stoxx 50`做价差交易。但从2010年中期开始，这些价差中的机会变少了。这些价差中可供参与的日常机会简直大幅减少。当这些价差确实出现背离时，与过去的历史表现相比，它们带来的机会更少，风险却更大。


    **Bourquin:** 是的，我听说过。因为交易已经变得更加全球化，市场之间的相关性比过去高得多，所以背离的情况变少了。我想这也是你的意思。


    **Hemminger:** 完全正确。做多或做空欧洲变得非常困难，因为那些指数以及那里的所有金融期货，包括`Bund`、`BOBL`债务期货、欧元和英镑，都在根据接下来的一条新闻而波动。人们关注着来自希腊的消息，这不利于来回交易。它引发了恐慌。在大多数情况下，恐慌是件好事，但在这个例子中，所有东西都以如此高度相关的方式运动，以至于根本提供不了我所习惯的那种机会。


    2011年初，局势已经很明显了，我知道我们真的需要开始进化我们的交易方法、我们所追随的趋势、我们的交易、我们交易的资产类别等等。我们的进化确实是出于自我保护。


    **Bourquin:** 既然你已经转向了农产品，你最常做的交易是什么？是玉米对小麦吗？


    **Patric Hemminger:** 我现在参与最多的价差主要是单一资产期限结构内部的日历价差。也就是说，我在寻找单个合约中多个到期月份的持仓量和成交量。


    我在寻找期限结构的日历价差中的期内机会，并扫描市场寻找跨品种关系——例如，玉米对大豆、生猪对肉牛。我做的跨品种交易少得多，更多的是期内的期限结构仓位配置。


    **Bourquin:** 你能给我举一个普通交易的例子吗？这样我们就能真正拆解并理解你的交易方法。


    **Patric Hemminger:** 我先从豆类说起，这是我目前正在参与的一笔交易。在这笔交易中，我关注的是`2013年7月`对`2013年11月`的价差。我之所以关注这个价差，是因为它表现出的价格行为非常可靠，并且与过去的历史观察高度相关。


    让我回过头来说。今年年初，我请我的一位挚友开发了一个软件，用来分析历史数据，并识别出那些被证明高度可靠的价差模式。这个软件会将这些价差提醒我，并告诉我平均胜率，以及平均盈利交易和平均亏损交易。


    通过使用我的软件，我意识到从时间周期的角度来看，这个特定的豆类价差在过去五年里是一个胜率60%的策略。因此，从10月中旬到大约12月中旬，我可以预期这个价差的平均盈利交易能赚大约41美分，而平均亏损交易则会亏损5美分。这给了我一个预期收益为1200到1300美元，这正是我在寻找的那种交易。


    **Bourquin:** 那么，是`7月`合约在历史上被高估，而`11月`合约在历史上被低估吗？你实际上在看什么？


    **Hemminger:** 实际上，相对于`2013年11月`大豆合约，现在的`2013年7月`合约是被低估的。从历史上看，10月中旬是买入该价差的可靠时机，你应该在圣诞节前的某个时候卖出该价差，每张合约的平均利润约为1200到1300美元。'
  raw: '*The historically reliable and lucrative spreads in commodities* *like corn,
    wheat, soybeans, and even oil have allowed Hemminger to apply his unbiased technical
    strategy and achieve even greater success as a trader. By focusing on historical
    trends and non-complex technical indicators, Hemminger trades a variety of time
    frames, ranging from longer-term periods right down to intraday moves. His rather
    daring method of removing stops in the face of economic news and data may seem
    controversial to some, but as he explains, it helps him avoid being stopped out
    by the overly emotional market moves that are increasingly common in today’s markets.
    Hemminger shares his positions, as well as regular market insights and trade ideas,
    on his blog, [DirtyArbitrage.com](http://DirtyArbitrage.com).*


    **Tim Bourquin:** Patrick, let’s talk about your trading strategies, and how you
    look at the market and find good opportunities each week. Let’s start by defining
    your trading. What type of trader are you?


    **Patrick Hemminger:** Sure. I’m a relationship trader. What I mean by that is
    I’m constantly looking at spreads and the value between two assets.


    Most cases are very highly correlated. When it comes to an implied equity spread
    of E-mini S&P versus DAX—or in the case where a lot of my research and efforts
    are going right now—I’m looking at agricultural spreads.


    Those could be spreads along a term structure, a calendar spread, or an inter-commodity
    spread, like corn versus wheat. But all of my exposure on the futures side is
    relationship based.


    **Bourquin:** All right. So, when I think of spread trading, I think of corn and
    wheat usually trading together. But when they start to diverge, you see that happen,
    and you go long one and short the other to see if they will come back into convergence
    again. Did I round that out pretty well?


    **Hemminger:** Yes, I think that’s a good broad statement for spreads. You’re
    looking to identify value, and opportunities can appear along many different time
    frames, including intraday, swing, or longer-term, seasonal periods.


    Last year, corn and wheat were trading at par. That’s an historical phenomenon
    that does not occur very often. There were many times last year when I was selling
    corn and buying wheat purely based upon the fact that the spread was an historical
    occurrence. I was more than willing to apply risk and looked for the spread to
    diverge back to the point where wheat was trading above corn, which is what has
    happened now.


    **Bourquin:** And why did that happen? Do you focus much on the reasoning, or
    do you just say, “It is where it is, and I’m trading it”?


    **Hemminger:** I tend to focus more on the technical perspective. Evenlooking
    back ten, twenty, thirty years, there is so much data—especially in agricultures—that
    is available. You can look back from a long-term perspective.


    I try not to mix fundamental bias in with my technicals, as I’m aware of where
    the chatter is and what people are saying, but listening to the crowd has gotten
    me in trouble in the past. Now I tend to stick to my framework, framing out each
    trade, knowing where my risk and reward is, and sticking with the plan.


    **Bourquin:** Now, previously I know you had been trading these divergences in
    equities—the Dow versus the DAX, as you mentioned before. What brought you to
    agricultures to try your trading approach there?


    **Hemminger:** Well, that’s a great question. Two of the basic tenets of being
    a successful longer-term trader are, number one, realizing that markets have changed
    and, number two, being flexible enough to evolve accordingly. Being a one-trick
    pony just is not a formula for long-term success, because, from a global macro
    perspective, the world is changing.


    My specialty in equity spreads was US equity indexes versus European equity indexes.
    Because my main benchmark is the S&P, I would spread that versus FTSE, versus
    DAX, versus Euro Stoxx 50\. But beginning in the middle of 2010, the opportunity
    in those spreads slowed down. There simply were not nearly as many daily opportunities
    to be involved in those spreads. When those spreads did diverge, they presented
    less opportunities and more risk in relation to prior historical performance.


    **Bourquin:** Yes. I’ve heard that. Because trading has become more global, markets
    started to correlate a whole lot more than they had in the past, and there were
    fewer divergences. I think that’s what you’re saying, too.


    **Hemminger:** Exactly, that’s right on. It became very difficult to be long or
    short Europe, as those indexes and all of the financial futures there, including
    the Bund, BOBL debt futures, the euro, and the pound, were moving in relation
    to what the next news item was. People were paying attention to the news that
    was coming out of Greece, and it didn’t make for good back-and-forth trade. It
    made for panic. In most cases, panic is a great thing, but in this case, everything
    moved in such a correlated manner that it just didn’t provide the type of opportunity
    that I had become accustomed to.


    The writing was on the wall at the beginning of 2011, and I knew that we really
    needed to start evolving our trading approach, the trends we followed, our trades,
    the asset classes we traded, and so on. Our evolution was really borne out of
    preservation.


    **Bourquin:** Now that you have moved over to agricultures, what’s your most common
    trade? Is it corn versus wheat?


    **Hemminger:** The most common spreads that I’m participating in right now are
    mainly calendar spreads inside of a one-asset term structure. So, I’m looking
    for open interest and volume along multiple expirations in one single contract.


    I’m looking for intra-term opportunities among calendar spreads of term structures
    and scanning the market for interrelationships—for instance, corn versus soybeans
    and hogs versus cattle. I do much less of inter- and much more intra-term structure
    positioning.


    **Bourquin:** Can you give me an example of a garden-variety trade so that we
    can really break this down and understand your trading approach?


    **Hemminger:** I’ll start with the beans, which is a trade that I’m involved in
    right now. In this trade, I looked at the July 2013 versus the November 2013 spread,
    and the reason I zeroed in on that spread is because it exhibited price action
    that was very reliable and very highly correlated with past historical observations.


    Let me back up. At the beginning of the year, I asked a dear friend of mine to
    develop a piece of software that analyzes historical data and identifies patterns
    in spreads that have proven to be highly reliable. The software brings those spreads
    to my attention and tells me the average win rate, as well as the average winning
    trade and the average losing trade.


    Using my software, I realized that this particular bean spread was a 60 percent
    winner over the last five years from a time-cycle perspective. So, from mid-October
    to approximately mid-December, I can expect an average winning trade in this spread
    to make about forty-one cents and an average losing trade to lose five cents.
    That gives me an expected outcome of $1,200 to $1,300, which is exactly the kind
    of trade I’m looking for.


    **Bourquin:** So, is the July contract historically overvalued while the November
    contract is historically undervalued? What are you actually looking at there?


    **Hemminger:** Actually, the July 2013 contract right now is undervalued in relation
    to the November 2013 soybean contract. Historically, the middle of October is
    a reliable time of year to purchase that spread, and you should look to sell that
    spread somewhere before Christmas for an average profit of about $1,200 to $1,300
    per contract.'
