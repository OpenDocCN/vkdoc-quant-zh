  trans: '**福斯特：** 没错，那就是交易时机，无论是买入还是卖出。我通常按日线周期来使用，但也会参考月线周期。


    每隔几周，我的日历上就会弹出一个提醒，让我查看一张三年期的月线图，我会用 14 个月和 28 个月的指标来观察它们的走势。这能帮助我不至于迷失在短线周期的细节中，而且我发现这种方法也能相当准确地预测长期趋势。


    **布尔昆：** 您是否觉得，之所以在周线或月线周期上交易表现更好，是因为在这些周期以下存在大量噪音，导致您无法获得真正可靠的信号？


    **福斯特：** 是的，完全正确。较长的时间周期确实能滤除噪音，同时你仍然可以看清短期的走势。


    **布尔昆：** 那么，您是如何运用移动平均线的呢？


    **福斯特：** 我会观察所有指标——包括 10 周期、20 周期、50 周期、100 周期和 200 周期的移动平均线——但其中最关键的一点是观察交叉信号。任何时候，只要我看到短期均线向下穿越长期均线，这就是看跌信号。例如，如果
    10 日均线下穿 20 日均线，或者 20 日均线下穿 50 日均线，这都是看跌信号。反之亦然。如果短期均线上穿长期均线——比如在熊市周期结束时可能出现的情况——那就是看涨信号。


    **布尔昆：** 那么举例来说，如果 10 日均线下穿 20 日均线，同时`Williams %R`指标从超买区域回落并开始走低，这两个信号同时出现，对您来说是否就是一个理想的交易信号？


    **福斯特：** 是的，那将是一个理想的交易机会，尤其是当它同时跌破趋势线时。这三个信号同时出现，可以说是绝佳的“三重奏”。


    **布尔昆：** 那么这些信号同时出现的频率如何？


    **福斯特：** 不常出现，但如果你监控的股票池足够大，每个月还是能发现一两支符合这些条件的股票。正是在那些时候，你必须愿意重仓介入，如果行情顺利，甚至还可以加仓。当所有信号都形成共振时，往往能产生一些利润丰厚的大交易。


    **布尔昆：** 那么，您交易的是指数期权还是个股期权？


    **福斯特：** 我主要交易指数期权。偶尔也会操作一些个股，但特别是从 2011 年年中开始，随着所有资产的贝塔值都处于非常低位的状态，我发现指数期权更容易操作。具体来说，我使用多种覆盖小盘、中盘和大盘指数的
    ETF，包括`SPY`、`DIA`、`MDY`和`IWM`。


    **布尔昆：** 在交易指数 ETF 期权时，您会构建特定的跨式或宽跨式组合，还是只买入看涨和看跌期权？


    **福斯特：** 这取决于具体的市场形态，这也是为什么我会同时纳入长期和短期趋势以及移动平均线。如果我观察长期趋势，发现一个持续数周或数月的移动平均线交叉，同时结合一个短期交叉——比如
    10 日均线下穿 20 日均线——我可能会买入看涨期权，看看这波行情能持续多久。


    不过，我的大部分交易都是卖出裸看跌期权。根据我看涨的程度或对市场形态的判断，我可能会卖出价内期权。否则，我的很多交易都是卖出价外期权，只是为了以较低的风险赚取时间价值。


    但正如我所说，这取决于长期趋势。如果我在数月周期的图表上（比如我提到的三年期月线图）看到一个长期交易机会，我更可能在短线交易中卖出价内期权。


    通常，我还是会关注未来一两个月的合约，但如果长期形态支持，我也可能交易更远期的合约。否则，我倾向于小仓位操作，争取每月获得大约 1%的收益，而把大交易留到我看到全面强劲的形态时。


    **布尔昆：** 您通常在什么时候卖出这些裸看跌期权？是会等待它们到期，还是在此之前平仓？


    **福斯特：** 有两种情况我会等待它们到期。第一种是，如果它们仍在接近 ETF 现价的位置交易，并且趋势依然存在；第二种是，如果它们已经远远处于价外，并且趋势仍然强劲。


    这也取决于这笔交易是在我的应税账户还是 IRA 账户中。显然，IRA 账户不能使用保证金，所以我更倾向于在那里平仓并将头寸上移。而在我的应税账户中，我通常会让它们滚动到期，最终变得一文不值。


    **布尔昆：** 在任何时候，您同时持有多少个交易头寸会比较舒适？


    **福斯特：** 在任何时候，我最多可能持有 20 个未平仓头寸。最近，从 2011 年年中开始，我的重点更多地转向了指数，在这种情况下，持有更多最终都回归到同一只标的
    ETF 上的未平仓头寸会更容易。


    所以，我不需要去盯着`孟山都`和`摩根大通`以及市场上其他所有股票，去琢磨当天要交易什么，以及它们背后都有什么新闻。集中交易一个标的上的多个头寸要容易得多。例如，你可能在`SPY`上有一个
    130 美元的裸看跌期权，另一个 135 美元，还有一个 132 美元的看涨期权，然后你只需要监控它们所有。这仍然是盯着同一只 ETF 或标的权益，因此即使所有头寸都相互关联，也更容易管理好更多的全额头寸。


    **布尔昆：** 要同时追踪哪些头寸盈利、哪些亏损以及你的止损位，这工作量不小。我们谈谈您是如何管理止损点和盈利目标的，尤其是在任何时候都有这么多未平仓头寸的情况下。


    **福斯特：** 一切都回归到趋势这个核心，所以这是完全动态的，取决于市场所在的位置，但我用一个基础的 Excel 电子表格来追踪所有信息。


    我喜欢把事情简单化。如我所说，我尽量将指标限制在两到三个——趋势线、移动平均线和`Williams %R`——如果这些指标有任何变化，我就可以快速调整我所有的头寸，这也是为什么我喜欢把所有信息都放在
    Excel 里。


    我始终关注自己有多少底层资产价值处于风险之中，以便在我的应税账户中避免过度使用保证金。在这些账户里很容易过度激进，就像我刚开始交易期权时那样。我相信很多交易者在初入市场时都有过类似经历。


    **布尔昆：** 您是如何发现并最终确定趋势线、移动平均线和`Williams %R`是适合您交易的最佳指标组合的？


    **福斯特：** 在我刚开始学习技术分析时，我阅读了所有我能找到的资料——书籍、博客、网站，你能想到的我都看了。我开始尝试所有不同的指标，而最终就是这三个指标真正适合我。


    现在，这三个指标对我有效，但它们可能并不适用于每个交易者。因此，我的建议是尝试大量的指标，找出哪些对你自己有效，但要意识到，在你开始遇到相互冲突的数据之前，可使用的指标数量是有限度或有一个平衡点的。当一个或两个指标说“买入”，另一个说“卖出”，而另外一两个又说“持有”时，“分析瘫痪”就发生了。到那时，你最终会完全不做任何交易，错失所有方向的机会。


    当我发现这三个指标对我有效时，我就开始剔除其他指标。此外，它们很简单，而一切都回归到保持简单。


    **布尔昆：** 我们之前稍微提及了这一点，但让我们更详细地探讨一下，一旦标的资产基于您这三个指标满足了条件，您是如何决定买入或卖出具体哪些期权的。'
- fmt: '**Foster:** I’m first looking at what the overall long-term trend is by looking
    at a three-year-long monthly chart with multiple moving averages and `Williams
    %R`. If I see that, one—we are in a bullish trend, two—we’re likely to move out
    of oversold conditions, and three—we’ve got the shorter-term moving averages above
    the longer-term, that would lead me to form an underlying thesis that over the
    coming months—with six months being the upper limit of that time horizon—the underlying
    asset is going to be higher than it is currently.


    So, with that as the basis behind all the rest of my trades, I wait for the right
    opportunity where the shorter-term moving averages—ten-day, twenty-day, or fifty-day,
    if trading on a daily basis—are moving in the right direction.


    Once I see that, I might go in the money on a naked put, and that will give me
    a chance to ride it up. And, even if it doesn’t move up before expiration, I’ll
    usually take the assignment so I can get a dividend while I wait for it.


    **Bourquin:** That was going to be my next question! When will you take assignment,
    and when will you avoid it?


    **Foster:** I do take assignments, but it depends where expiration is. If I don’t
    take an assignment, it’s because I’m going to roll the naked put lower.


    For example, say I’m targeting a 135 naked put on `SPY` and it’s in the money.
    A day or so prior to expiration, if `SPY` is working its way closer but I see
    that I’m most likely going to get the assignment, then I will probably let it
    be assigned in that case, unless I see the trend changing.


    If the indicators have yet to move all the way to bearish but I see some wavering,
    like moving averages getting closer or a flattening out of a trend line, I might
    stay invested by selling it out of the money and buying it back by rolling it
    lower and then selling a 133 or 134 naked put. That way I’m still invested in
    `SPY` but at a lower risk or a lower probability of assignment.


    **Bourquin:** Does the actual price point where you’ll be assigned figure into
    your decision? In other words, does it have to be at a price where you don’t mind
    owning the actual underlying asset?


    **Foster:** It does sometimes, and that’s when the fundamental side comes in.
    If it’s moving down and we are at a P/E multiple for the S&P that’s closer to
    eleven or twelve, I might be more likely to take an assignment at that point than
    when the P/E is around fifteen or sixteen because I’m more likely to go long and
    hold it when P/E is low.


    **Bourquin:** How will you trade around important economic reports like nonfarm
    payrolls, or do you trade at all during those times?


    **Foster:** I do trade through them. I used to let them influence my trades more
    often, but with the trend analysis and technical indicators I use, I sometimes—though
    certainly not every time—can get an idea of what’s going to happen in advance.


    Trends do not change based on fundamental input alone, and a lot of the time I
    think the trends tend to trade through it. Occasionally a trend will break, and
    I’m always ready to make a change in those cases. But if it’s Thursday and big
    news or a data release is due out on Friday before the open, I’m usually not going
    to hold back from making a trade unless I believe the data is going to have a
    major influence.


    **Bourquin:** Let me ask you a very market-specific question. Here in early 2012,
    it seems that every day, whether the S&P is up or down, it’s always because of
    Greece. Do you follow that news, and do you care what they say about *why* the
    market is up or down at the time?


    **Foster:** I feel the same way, and yes, I do care what the news is, but so often
    I think they are just filling airtime and trying to create a reason for worry
    or joy that doesn’t really have logic behind it. Like you said, Greece has been
    the reason why the market goes up or goes down, but it’s hard for any one factor
    to be both all the time.


    Most folks who are looking at the underlying problems in Greece understand that
    even if there is a solution, like another gift from the European ministers to
    give aid or to take on debt, the likelihood of it being implemented and austerity
    measures going through is very low.


    It’s just a temporary fix—like a little Band-Aid on a big gash—and because it
    can and does move the markets, I watch it. But I don’t think of it as long-term
    trading information.


    **Bourquin:** Let’s now talk about sizing and how you determine your position
    size when using options.


    **Foster:** It depends on allocation, and for my account versus some of my client
    accounts, I might be more aggressive. I might use more small caps if I think small
    caps are looking strong, or I might use a heavier allocation towards small caps
    because I think I am going to get better performance there than I would with the
    Dow.


    It also depends on my risk tolerance at the time. I’m usually pretty aggressive
    in my trades, but I do factor in current or upcoming events in my personal life
    and may become more hesitant to take risk under certain conditions.


    **Bourquin:** What’s an average option contract size for a trade in your personal
    account?


    **Foster:** I typically only use two contracts at a time, and while I might use
    multiple contracts in a week, in any one day I only use two contracts at once.


    I trade pretty small size and take small bites with most of my trades, and that
    comes back to managing risk. If after expiration I’ve done well and end up with
    a clean plate, and most of my options expired out of the money, I might start
    off building a new position with just a couple in-the-money trades. That way I
    have a lot of upside potential.


    From there, if my position goes down, I’m not fully invested and can manage that
    position appropriately. Sometimes I’ll buy it back, and depending on where I think
    the underlying is headed longer term, sometimes I might close it out. But I’ll
    always start out small and can then keep adding to the position if it’s going
    up.


    An important point, however, is that I generally don’t chase a position with my
    subsequent trades by using more in-the-money options. My third, fourth, and fifth
    trades, and any others from then on, will usually be out of the money.


    **Bourquin:** Let’s talk about trading client accounts versus trading your own
    account. When did you first start managing client money? And was that only after
    you had a successful run trading your own account?


    **Foster:** I started managing client money almost three years ago, and yes. Trading
    was a hobby of mine since after I got out of college. It was always interesting
    to me, so I started studying up on it, and after taking business management, finance,
    and economics classes in college, it just drew me in.


    I started making money investing and then built on it, and I was doing well and
    also talking to friends and other people about what to buy and different market
    models. I had a couple friends who were advisors, and they encouraged me to get
    into managing money, but at that time, I was focused on my own money and I didn’t
    want to take the risk of trading other people’s money.


    The 2007 crash was the turning point for me. I heard so many horror stories about
    people not getting out, and while I’m not saying I got all the way out myself,
    I knew to reduce my exposure and wondered why other people weren’t doing it, too.


    People said to me, “Well, we are in it for the long term,” but my view is that
    the long term is built upon shorter-term trades that can be managed on a long-term
    basis, though more on a tactical scale. So, although the strategic view is focusing
    on the long term, short-term trades can get you there better than just a buy-and-hold
    approach.'
