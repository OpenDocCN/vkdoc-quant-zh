- fmt: '**Foster:** Correct, and that’s the time to trade, whether it’s a buy or a
    sell. I generally use it on a daily time frame, but I’ll also look on a monthly
    basis.


    Every couple weeks, I have a reminder pop up on my calendar to look at a three-year-long
    monthly chart, and I’ll use the fourteen- and twenty-eight-month indicators to
    see how they are moving. That helps me not to get lost in the weeds of shorter-term
    charts, and I find that it pretty accurately predicts longer-term trends as well.


    **Bourquin:** Do you find the reason you’re better at trading on a weekly or monthly
    basis is because there is a lot of noise below those time frames and you’re not
    able to get really good signals?


    **Foster:** Yes, exactly. The longer time frames really cut out the noise and
    you can still see the shorter moves.


    **Bourquin:** And how do you incorporate moving averages?


    **Foster:** I look at everything—including a ten-, twenty-, fifty-, one hundred-,
    and two hundred-period moving average—but the most critical component of them
    is seeing a crossover. Anytime I see a shorter time frame move below a longer
    time frame, it’s bearish. For example, if the ten-day moves below the twenty-day,
    or the twenty-day moves below the fifty-day, that’s bearish. And the same thing
    is true in reverse. If a shorter time frame crosses above a larger one—like it
    might when coming out of a bear cycle—that’s bullish.


    **Bourquin:** So, for instance, if you had a ten-day moving average crossing below
    the twenty-day, and the `Williams %R` coming out of the overbought range and heading
    lower, those two things together would represent an ideal trade signal for you?


    **Foster:** Yes, that would be an ideal trade, especially if it breaks the trend
    line. That’s kind of a trifecta, when those three all come together.


    **Bourquin:** And how often do those tend to line up?


    **Foster:** Not very often, but if the basket of stocks you monitor is large enough,
    you can find one or two a month that do. It’s those times when you really have
    to be willing to put on full size and scale, and even more if it’s going well.
    When everything does align, it can produce some big, profitable trades.


    **Bourquin:** So, are you trading options on the indexes or individual stocks?


    **Foster:** I mainly trade options on indexes. I use some individual stocks occasionally,
    but especially since the middle of 2011, with everything moving in such a low-beta
    setup, I find that options on the indexes have been easier. Specifically, I use
    a variety of small-, mid-, and large-cap index ETFs, including `SPY`, `DIA`, `MDY`,
    and `IWM`.


    **Bourquin:** When trading options on index ETFs, do you have certain straddle
    or strangle positions that you put on, or do you just buy calls and puts?


    **Foster:** It depends on the setup, and this is why I add in both the long-term
    and the short-term trends and moving averages. If I look at the longer-term trend
    and see a multiweek or multimonth moving average crossover coupled with a shorter-term
    crossover—like the ten-day crossing the twenty-day, for example—I might buy a
    call to see how long I can take it.


    The majority of my trades are naked puts, however, and depending on how bullish
    I am or how I read the setup, I might sell in the money. Otherwise, a lot of my
    trades are out of the money just to take the time value at a lower risk.


    Like I said, though, it depends on the longer-term trends. If I see a long setup
    coming up on a multimonth chart, like the three-year-long monthly chart I talked
    about, I’ll be more likely to sell in the money for shorter-term trades.


    Usually, I’m still looking at first- or second-month-out trades, but I might go
    farther out if the long-term setup is there. Otherwise, I try to take smaller
    bites just to get about 1 percent a month and save the bigger trades for when
    I see a strong setup across the board.


    **Bourquin:** When are you selling these naked puts? Will you typically wait for
    them to expire or close your position before that?


    **Foster:** There are two different scenarios where I’d wait for them to expire.
    One, if they’re still trading close to the price of the ETF and the trend is still
    in place, and two, if it’s far enough out of the money and the trend is still
    going strong.


    It also depends if it’s in my taxable account or an IRA. Obviously, an IRA can’t
    have margin, so I’m more likely to close out options there and move them higher.
    In my taxable account, I usually just let them roll and expire worthless.


    **Bourquin:** How many trades are you comfortable having at any one time?


    **Foster:** At any one time, I could have as many as twenty open positions. More
    recently, since the middle of 2011, my focus is more toward indexes, and it’s
    easier to have more open positions that all come back to the same underlying ETF,
    in this case.


    So, I’m not watching `Monsanto` and `JPMorgan Chase` and everything else under
    the sun, trying to figure out what I’m going to trade that day and what news lies
    underneath all of them. It’s easier to trade multiple positions on one asset.
    So, you might have a naked put on `SPY` at 130, another at 135, and then call
    at 132, and you just monitor them all. It’s still watching the same ETF or underlying
    equity, so it’s easier to manage more full positions that way, even if they are
    all related.


    **Bourquin:** That’s a lot to keep track of in terms of what’s profitable, what’s
    not, and where your stops are. Let’s talk about how you manage stops and profit
    targets, especially with so many positions open at any one time.


    **Foster:** It all comes back to the trend, so it’s completely variable and depends
    on where the market is, but I track everything in a basic Excel spreadsheet.


    I like to keep things simple. As I said, I try to limit my indicators to two or
    three—the trend lines, moving averages, and `Williams %R`—and if there is any
    change in those, I can adjust all my positions quickly, which is why I like having
    everything there in Excel.


    I always watch how much underlying value I have at risk so I can keep from going
    too far on margin in my taxable accounts. It’s pretty easy to get ahead of yourself
    in those accounts, like I did when I began trading options. I’m sure a lot of
    traders have experienced that when first starting out.


    **Bourquin:** How did you come across and settle on trend lines, moving averages,
    and `Williams %R` as the best indicator combination for your trading?


    **Foster:** When I first began studying technical analysis, I read everything
    I could get my hands on—books, blogs, web sites, you name it. I began trying all
    the different indicators, and those are just the ones that really stuck for me.


    Now, those three work for me, but they might not work for every trader. So, my
    advice is to work with a bunch of indicators to find out what works for you, but
    recognize there is a limit or middle ground to how many you can use before you
    start finding conflicting data. “Analysis paralysis” happens when one or two indicators
    say “buy,” another one says “sell,” and yet another one or two say “hold.” That’s
    when you end up not making trades at all and miss out in all directions.


    I started cutting other indicators out when I saw that those three worked for
    me. Plus, they are simple, and everything comes back to keeping it simple.


    **Bourquin:** We touched on this a little bit before, but let’s go into more detail
    about which options you decide to buy or sell once the underlying has met your
    criteria based on those three indicators.'
