- fmt: '**Tim Bourquin** is the co-founder of both the Online Trading Expo (now Traders
    Expo) and the Forex Trading Expo. While a police officer with the Los Angeles
    Police Department, Bourquin was trading the stock and currency markets by morning
    and arresting criminals by night. When he went looking for a convention for traders
    to learn more about how other traders were approaching the markets, he couldn’t
    find one. So, in 1999, along with a business partner, Bourquin started an annual
    convention and tradeshow for online traders and investors. Those events, which
    are held each year in New York, Las Vegas, and Los Angeles, continue to be the
    premier conventions for active retail traders.


    After speaking with countless traders throughout the past 14 years, Bourquin realized
    that the best way to learn how to make money trading was to ask those who were
    already doing it every day. Bourquin set out to find the best in the business
    and ask them exactly how they made their money. Some people talked to him and
    others refused, but through persistence, he slowly was able to interview hundreds
    of traders about the strategies they employ, the software they use, and how they
    became confident in the markets. In 2006, Bourquin founded [TraderInterviews.com](http://TraderInterviews.com),
    an online media site featuring those frank discussions.


    ![image](images/9781430244431_unFM-02.jpg)


    **Nicholas Mango** is a freelance writer and editor whose work in the active trading
    community spans more than seven years and numerous web portals and major media
    outlets. As a former Division I collegiate athlete, Mango experienced firsthand
    the need to continually learn and develop skills, the pressure to consistently
    perform at a high level, and the many highs and lows encountered along the way.
    While working his first Traders Expo in 2006, it became clear that traders endure
    a similar journey while facing an adversary that is equally alluring and potentially
    even more unforgiving: the financial markets.


    There began a strong commitment to helping traders find clarity and the answers
    that could form the basis for long-lasting and prosperous careers in the markets.
    Mango has since worked with hundreds of professional traders and industry experts
    to publish their most reliable, clearly stated, and actionable methods and strategies
    for trading a variety of markets and time frames


    ## Acknowledgments


    I wish to thank all of the interviewees in the following chapters who graciously
    and patiently allowed me to ask both “dumb” and complicated questions about how
    they make their living in the markets. Your willingness to talk about your craft
    will undoubtedly help thousands of struggling traders who are trying to find their
    edge. Thanks to Morgan Ertel from Apress, whose patience, encouragement, and motivational
    nudging brought this book to press when it looked like it would never be finished.
    And finally, I want to thank my co-author, Nicholas Mango, who took on the difficult
    task of turning rough transcripts into polished sentences. The only reason you
    are holding this book in your hand today is because Nick said, “Sure, sounds like
    fun!” Thank you, my friend.


    —Tim Bourquin


    For me, this book represents the realization of a lifelong dream, and I owe sincere
    gratitude to all who made it possible, starting with each of the traders, whose
    open, fearless participation produced timeless insights that we hope will entertain,
    inspire, and educate all who read them. Thanks to the team at Apress, including
    Morgan Ertel and Rita Fernando, for your patience, persistence, and enthusiasm
    throughout all stages of this project. Also, thanks to my loving and supportive
    parents, my grandfather, and all my friends. May this book finally quell your
    suspicions that I sit around and play on the computer all day, every day! Finally,
    my most heartfelt thanks to my friend and co-author, Tim Bourquin, whose passion
    for education and devoted leadership has not just shaped my career; it has touched
    my life.'
