- fmt: '# Trading Instinct and Market Feel


    There’s an instinct that can be developed over time by watching the markets enough.
    You can get 80 percent of the way there by studying the markets and learning as
    much as you can about the behavior of a particular stock or option. Then 10 percent
    will be gut feel that you develop as your experience as a trader grows. The final
    10 percent is that information that you just don’t know. You have to be okay with
    that final 10 percent and still make good decisions without it.


    Having all the information is not going to allow you to execute the best trade.
    At some point, you need to just feel when the market is going to make a move.
    I don’t think you can quantify that. The best traders are not the ones that are
    the best researchers. If that were the case, scientists who are great at studying
    data would probably be clobbering us all. In the real world of trading, you gather
    the information you can and then you make a decision.


    **Bourquin:** What markets were you trading when you first started?


    **Gordon:** We were trading stocks at my first company, mostly NYSE-listed stocks—big
    companies. I’m a big advocate of getting to know the personality of a market,
    getting a feel for the market you trade so that you can begin to anticipate reactions
    to news and demand. One of the advantages of trading NYSE stocks was you were
    typically dealing with just one specialist. There’s obviously one guy making the
    big “prints” and price moves on the New York Stock Exchange floor. You’d get to
    know his personality and the way he would handle his bid-ask spread and prints.


    We knew the behavior of a couple of specialists so well that we’d always play
    games in the office and talk about what we thought the guy looked like, what we’d
    say to him if we were to go out for a drink with him after work. We could actually
    feel if one specialist was calmer than another during times of heavy trading.
    These days, with everything going electronic, you don’t get that same feedback.
    But I still believe that with enough experience, you can begin to anticipate moves
    in whatever market you are trading just from watching how it moves day-in and
    day-out.


    We’d also listen to audio from the S&P 500 futures pit. Even though we weren’t
    trading futures, often times we could hear the noise in the pits increasing just
    a few moments before trading sped up on NYSE stocks. So, we would listen to Ben
    Lichtenstein, who does [TradersAudio.com](http://TradersAudio.com) still to this
    day, and this was maybe ten years ago. He would call where the S&P futures were
    going and who was actively buying and selling. He would say, “There’s paper in
    the pit,” or “Paper buys,” and announce where the prints were on the S&P futures.
    He’d announce when institutional sellers were starting to come into the market,
    and so forth. All the while, you could hear the low roar of the pit traders in
    the background, and it would get louder and faster when things were speeding up.


    What would happen is when the S&P futures start to move, obviously the big listed
    stocks that make up the Dow Jones Industrial Average would follow very closely
    behind to catch up to the S&P futures. So, we would hear if there was big movement
    in the pit, and we would almost immediately see that translate over to movement
    in the stocks. The S&P floor noise and information would give us a slight edge
    as to where the big stocks would go. If we heard movement in the pit, and a buyer
    stepped in and pushed the price higher, we would jump in and get a buy order in
    on the New York Stock Exchange, and then watch how the specialists would handle
    the incoming order flow. We would then scalp in and out for ten cents or fifteen
    cents and do that twenty, thirty times a day.


    **Bourquin:** Is the S&P futures pit still a viable leading indicator for short-term
    traders?


    **Gordon:** Yes, to a certain extent, but not in the same way it was back then.
    I think the markets are a lot more complex and more efficient now. The spreads
    are much tighter on stocks because of penny pricing, whereas it used to be in
    fractions. The pit noise in the S&P futures can still be valuable to a trader
    in order to get a feel for the panic buying or selling, but it happens much faster
    now. Plus, now you’ve got algorithmic, high-frequency trading to contend with,
    which has changed things quite a bit. We were operating within seconds to take
    advantage of that delay, but that delay is gone, for the most part. The edge we
    had in those days—where we could get in and get out quickly because the futures
    market was moving ahead of it—is gone.


    We could see the writing on the wall and decided it was time to move into the
    foreign exchange markets and trade currency. It’s “adapt or die” in trading, and
    if you aren’t able to change or tweak your trading methods as times change, you’ll
    eventually stop making money. Nothing works forever.


    Also, when I think of trading, it’s a lifestyle business. To trade short-term
    all day—banging out thirty to fifty trades back and forth every day, trying to
    scalp a nickel or dime every time—after a while, you’ll get burned out on that
    style. There’s a lot of energy that’s required to operate at that level, so from
    a trading lifestyle point of view, I knew eventually I would have to make a change.
    That frenetic pace every day can really start to wear you down.


    **Bourquin:** Most day traders, when you talk about the early days of day trading,
    they started out on SOES [Small Order Execution System] and NASDAQ stocks. But
    you started out trading NYSE stocks. Why?


    **Gordon:** The “SOES bandit” style of trading was popular a few years before
    I got into the markets. Dave Floyd did a lot of NASDAQ trading in the office in
    San Diego before I was hired. He was very active in the NASDAQ. I think Dave would
    tell you, his office had a couple of days where their volume alone represented
    more than 5 or 10 percent of the volume traded on the QQQs. So, in the late nineties,
    they were doing a ton of volume on that NASDAQ ETF. But then, I think after the
    internet bubble burst and all those tech stocks tanked, they started to go to
    New York Stock Exchange stocks because they realized they had a few-seconds edge
    by watching those S&P futures and getting to know the behavior of the specialists.


    It goes back to the fact that with NASDAQ stocks, you’re dealing with tons of
    market makers and ECNs who are providing liquidity. Whereas with the NYSE stocks,
    there’s one guy running the book, which is the specialist, and there was an edge
    to be exploited there because, for a while anyway, it was less efficient.


    **Bourquin:** Were you using any technical analysis when you were doing that,
    or was it just, “Listen to the pits and then go jump in front of it” on the NYSE?


    **Gordon:** I was using charts, but it was very basic technical analysis. On my
    screens, I would have a one-minute and five-minute chart of the S&P futures, and
    a one-minute and five-minute chart of whatever stock I was trading at the time.
    On those charts, we would have Stochastics, Bollinger bands, and maybe a couple
    of moving averages.


    The way we used moving averages was this: we knew the twenty-period moving average
    on both the fifteen-minute and sixty-minute charts was important to the market
    and that other traders were watching that price level. There always seemed to
    be a lot of volume around that area. But we were trading on the five-minute chart,
    so we wanted to monitor that level on our shorter-term charts. Doing a bit of
    math, we realized the 240-period moving average on a five-minute chart showed
    us the equivalent of a twenty-period moving average of a sixty-minute chart; those
    same levels but on our short-term charts.'
  raw: 'There’s an instinct that can be developed over time by watching the markets
    enough. You can get 80 percent of the way there by studying the markets and learning
    as much as you can about the behavior of a particular stock or option. Then 10
    percent will be gut feel that you develop as your experience as a trader grows.
    The final 10 percent is that information that you just don’t know. You have to
    be okay with that final 10 percent and still make good decisions without it.


    Having all the information is not going to allow you to execute the best trade.
    At some point, you need to just feel when the market is going to make a move.
    I don’t think you can quantify that. The best traders are not the ones that are
    the best researchers. If that were the case, scientists who are great at studying
    data would probably be clobbering us all. In the real world of trading, you gather
    the information you can and then you make a decision.


    **Bourquin:** What markets were you trading when you first started?


    **Gordon:** We were trading stocks at my first company, mostly NYSE-listed stocks—big
    companies. I’m a big advocate of getting to know the personality of a market,
    getting a feel for the market you trade so that you can begin to anticipate reactions
    to news and demand. One of the advantages of trading NYSE stocks was you were
    typically dealing with just one specialist. There’s obviously one guy making the
    big “prints” and price moves on the New York Stock Exchange floor. You’d get to
    know his personality and the way he would handle his bid-ask spread and prints.


    We knew the behavior of a couple of specialists so well that we’d always play
    games in the office and talk about what we thought the guy looked like, what we’d
    say to him if we were to go out for a drink with him after work. We could actually
    feel if one specialist was calmer than another during times of heavy trading.
    These days, with everything going electronic, you don’t get that same feedback.
    But I still believe that with enough experience, you can begin to anticipate moves
    in whatever market you are trading just from watching how it moves day-in and
    day-out.


    We’d also listen to audio from the S&P 500 futures pit. Even though we weren’t
    trading futures, often times we could hear the noise in the pits increasing just
    a few moments before trading sped up on NYSE stocks. So, we would listen to Ben
    Lichtenstein, who does [TradersAudio.com](http://TradersAudio.com) still to this
    day, and this was maybe ten years ago. He would call where the S&P futures were
    going and who was actively buying and selling. He would say, “There’s paper in
    the pit,” or “Paper buys,” and announce where the prints were on the S&P futures.
    He’d announce when institutional sellers were starting to come into the market,
    and so forth. All the while, you could hear the low roar of the pit traders in
    the background, and it would get louder and faster when things were speeding up.


    What would happen is when the S&P futures start to move, obviously the big listed
    stocks that make up the Dow Jones Industrial Average would follow very closely
    behind to catch up to the S&P futures. So, we would hear if there was big movement
    in the pit, and we would almost immediately see that translate over to movement
    in the stocks. The S&P floor noise and information would give us a slight edge
    as to where the big stocks would go. If we heard movement in the pit, and a buyer
    stepped in and pushed the price higher, we would jump in and get a buy order in
    on the New York Stock Exchange, and then watch how the specialists would handle
    the incoming order flow. We would then scalp in and out for ten cents or fifteen
    cents and do that twenty, thirty times a day.


    **Bourquin:** Is the S&P futures pit still a viable leading indicator for short-term
    traders?


    **Gordon:** Yes, to a certain extent, but not in the same way it was back then.
    I think the markets are a lot more complex and more efficient now. The spreads
    are much tighter on stocks because of penny pricing, whereas it used to be in
    fractions. The pit noise in the S&P futures can still be valuable to a trader
    in order to get a feel for the panic buying or selling, but it happens much faster
    now. Plus, now you’ve got algorithmic, high-frequency trading to contend with,
    which has changed things quite a bit. We were operating within seconds to take
    advantage of that delay, but that delay is gone, for the most part. The edge we
    had in those days—where we could get in and get out quickly because the futures
    market was moving ahead of it—is gone.


    We could see the writing on the wall and decided it was time to move into the
    foreign exchange markets and trade currency. It’s “adapt or die” in trading, and
    if you aren’t able to change or tweak your trading methods as times change, you’ll
