  trans: '

    # 交易直觉与市场感觉


    通过长期观察市场，可以培养出一种直觉。你可以通过研究市场、尽可能多地了解某只股票或期权的行为特性，掌握其中 80%的诀窍。另外 10%会来自于随着交易经验增长而形成的盘感。最后
    10%则是那些你未知的信息。你必须能坦然接受这最后 10%的缺失，并在缺少这些信息的情况下仍能做出正确的决策。


    掌握所有信息并不能让你执行最佳交易。在某个时刻，你需要单纯地感受市场即将发生的动向。我认为这一点是无法量化的。最优秀的交易者并非最出色的研究者。如果真是这样，那些擅长研究数据的科学家恐怕早就把我们都击败了。在真实的交易世界中，你收集所能获取的信息，然后做出决策。


    **布尔坎：** 你刚开始交易时，主要交易哪些市场？


    **戈登：** 我在第一家公司交易股票，主要是纽交所上市的股票——那些大公司。我十分倡导要了解一个市场的个性，感受你所交易的市场，这样你才能开始预判市场对新闻和需求会作何反应。交易纽交所股票的一个优势在于，你通常只与一个专家（做市商）打交道。在纽约证券交易所的交易大厅里，显然有一个人掌控着大的成交量和价格变动。你会逐渐了解他的个性，以及他处理买卖价差和成交汇报的方式。


    我们对几个专家的行为模式了如指掌，以至于我们经常在办公室里打趣，猜猜那位专家长什么样，如果下班后跟他出去喝一杯会跟他说些什么。我们甚至能感觉到，在交易活跃期，哪个专家比其他专家更镇定。如今，随着一切走向电子化，你无法获得同样的反馈了。但我仍然相信，只要经验足够丰富，你可以仅通过观察市场日复一日的波动方式，就开始预判你所交易的任何市场的动向。


    我们还会收听标普 500 期货交易池的音频。即使我们不交易期货，我们也常常能在纽交所股票交易加速前的片刻，听到交易池中的嘈杂声增大。所以我们会收听本·利希滕斯坦的节目，他至今仍在运营[TradersAudio.com](http://TradersAudio.com)，而这大概是十年前的事了。他会预测标普期货的走向，以及谁在积极买卖。他会说“交易池里有大单”或“大单买入”，并宣布标普期货的成交点位。他会宣布机构卖家何时开始进入市场等等。与此同时，你还能听到背景中交易池交易员低沉的喧闹声，当市场加速时，这声音会变得更大更快。


    接下来会发生的是，当标普期货开始波动时，构成道琼斯工业平均指数的那些大盘股显然会紧随其后，以追赶标普期货的走势。因此，我们会听到交易池里是否有大的波动，然后几乎立刻就能看到这反应到股票走势上。标普交易池的噪音和信息会给我们提供一点优势，让我们预判大盘股可能的方向。如果我们听到交易池里有异动，且某个买家介入推高了价格，我们就会立即行动，在纽交所下一笔买单，然后观察专家如何处理涌入的订单流。接着我们就会快进快出，赚取
    10 美分或 15 美分的差价，一天重复二三十次。


    **布尔坎：** 标普期货交易池对短线交易者来说，仍然是一个有效的领先指标吗？


    **戈登：** 是的，在某种程度上是，但不像过去那样有效了。我认为现在的市场更加复杂，也更加有效。由于实行了美分报价，股票的点差要小得多，而过去是分数报价。标普期货交易池的噪音对于交易者感受恐慌性买入或卖出仍然有价值，但现在的进程快得多了。此外，现在你还得应对算法交易和高频交易，这些已经大大改变了局面。我们过去是利用那个延迟在几秒钟内操作，但这个延迟基本上已经消失了。我们当年拥有的那个优势——因为期货市场领先于股票市场，我们可以快速进出——已经不复存在了。


    我们看到了不祥之兆，并决定是时候转向外汇市场交易货币了。在交易中，“适者生存”，如果你不能随着时代变化而改变或调整你的交易方法，你最终将无法赚钱。没有哪种方法能永远有效。


    此外，我认为交易是一种生活方式。如果整天做短线交易——每天来回做三五十笔交易，试图每次赚取 5 分或 10 分的差价——过不了多久，你就会对这种风格感到精疲力竭。在这种水平上操作需要耗费大量精力，所以从交易生活方式的角度来看，我知道我最终必须做出改变。那种每天疯狂的节奏真的会慢慢耗尽你的精力。


    **布尔坎：** 大多数日内交易者，当谈及早期的日内交易时，他们都是从 SOES（小单执行系统）和纳斯达克股票开始的。但你却是从交易纽交所股票开始的。为什么？


    **戈登：** 在我进入市场前的几年，“SOES 强盗”式的交易风格很流行。在我被聘用之前，戴夫·弗洛伊德在圣地亚哥的办公室做了很多纳斯达克交易。他在纳斯达克非常活跃。我想戴夫会告诉你，他的办公室有过几天，仅他们的交易量就占了
    QQQs 总交易量的 5%甚至 10%以上。所以，在 90 年代末，他们在那个纳斯达克 ETF 上做了大量的交易。但后来，我认为是在互联网泡沫破裂、所有那些科技股暴跌之后，他们开始转向纽约证券交易所的股票，因为他们意识到，通过观察标普期货并了解专家的行为，他们能获得几秒钟的优势。


    这又回到了一个事实：对于纳斯达克股票，你面对的是大量的做市商和提供流动性的 ECN。而纽交所股票则由一个人掌管着订单簿，那就是专家，这里存在一个可以利用的优势，因为至少在那个时候，它的效率较低。


    **布尔坎：** 你在做那些交易时，有没有使用任何技术分析？还是仅仅“听着交易池的动静，然后跳到纽交所前面去交易”？


    **戈登：** 我使用图表，但那是非常基础的技术分析。在我的屏幕上，我会放着标普期货的一分钟和五分钟图表，以及我当时正在交易的股票的一分钟和五分钟图表。在这些图表上，我们会使用随机指标、布林带，可能还有一两条移动平均线。


    我们使用移动平均线的方式是：我们知道十五分钟和六十分钟图表上的 20 周期移动平均线对市场很重要，并且其他交易者也在关注那个价格水平。在那个区域周围似乎总是有大量的成交量。但我们在五分钟图表上进行交易，所以我们想在更短期的图表上监控那个水平。通过做一些简单的计算，我们意识到五分钟图表上的
    240 周期移动平均线等同于六十分钟图表上的 20 周期移动平均线；它们是同样的水平，但显示在我们的短期图表上。

    '
- fmt: '# 交易策略与个人经历访谈


    Ultimately, we wanted to see the twenty-period moving average on multiple time
    frames. That’s where there’d be a lot of volume. So, we looked at the moving average
    to know where volume would be or orders would accumulate, but then we looked at
    the stochastics to just confirm that the market was pulling back. When the stochastics
    began to turn up, we’d jump on board and scalp an upside trade.


    **Bourquin:** Do you remember what your average share size was for a position
    back then?


    **Gordon:** I started really small. When I first started trading, they started
    us with a limit of one hundred to two hundred shares. Once you could prove you
    could make money and be disciplined at that size, you would get bumped up to five
    hundred shares, and then one thousand shares, and then two years down the line
    I was calling our risk management bosses up in San Francisco, trying to get my
    limit upped to two thousand shares. Eventually I pushed it up to five thousand
    and then up to ten thousand shares. So, I would carry five thousand and ten thousand
    share positions for just a few minutes. In order to really make money scalping,
    you had to be trading that kind of size.


    **Bourquin:** How did your salary look back then? Did you have some sort of base
    or draw plus a portion of your profits?


    **Gordon:** There was no salary or draw. It was all based on what you made in
    profit. Back then, the deal was you’d earn 50 percent of what you made, and the
    firm kept the other 50 percent. And then, of course, you had to pay taxes. I was
    making a living, but only trading five hundred shares that first year. It was
    hard to make a living, especially living in San Diego. So, I lived very modestly
    for those first couple years. I think I ate about four to five meals a week at
    In-N-Out Burger, which I never grew tired of. Now that I live in New Jersey, I
    miss In-N-Out Burger! But I definitely paid my dues. Any new trader who thinks
    they are going to sit down at a computer and make big money right away as a trader
    is probably going to be disappointed. But it was worth living lean those first
    few years to learn how to trade.


    **Bourquin:** You mentioned your transition to Forex at some point. What was it
    about your NYSE trading strategy that changed and made you decide to look elsewhere?


    **Gordon:** It was perhaps 2003. I vividly remember the last big day we had trading
    on that style. It was right around the time they arrested Bernie Ebbers from WorldCom.
    I remember we came in the next day and the S&P futures were down maybe fifteen
    points—and this was when the S&P was around 850. As a percentage, that was a big
    move. The volatility was tremendous. I remember that the other traders in the
    office and I just killed it. We made the most money we ever made in one day, scalping
    back and forth. Dave and I actually finished with profits within a couple of hundred
    dollars of each other at the end of the day. That was just about the low in the
    market.


    So, to answer your question, when the market started coming back from that, I
    think it was the 2003 low, the volatility just died. The style of scalping we
    were doing at that time really relied on a lot of volatility. Without the constant
    movement each day, making money as a scalper is extremely difficult. The market
    rallied from there, but the S&P went from trading twenty or thirty handles [index
    points] per day down to maybe eight. When we have no intraday volatility, that’s
    when things really started to get lean for us in terms of trading opportunities,
    and Dave actually started trading the currency markets. So, he got me into it
    at that point and we just started trading the FX markets.


    I really enjoyed trading with that office, but I wanted to expand my experiences
    a bit, so I went up to Los Angeles to work for Larry Connors at [TradingMarkets.com](http://TradingMarkets.com)
    and write about the currency markets. But Dave and I continued to stay in contact,
    and I continued to trade the Forex markets in my own account.


    **Bourquin:** Let’s talk about your next move to [FOREX.com](http://FOREX.com).
    Did you land there as a trader, or were you doing something else there first?


    **Gordon:** I had been on the West Coast for a good three years, and I felt like
    heading home. You forget how bad those winters are after you’re gone for a while,
    so I was ready to come back East. I was first hired to come in and write their
    Learn to Trade Forex courses. There wasn’t a tremendous amount of information
    about Forex trading back then, so I set out to put together a strong intro course
    on how to trade currencies. So, originally, I was not hired as a trader.


    I came on board and developed their first currency trading course. I was also
    doing some institutional sales, helping set up their big Introducing Broker [IB]
    relationships and communicating with money managers about bringing some of their
    money to [FOREX.com](http://FOREX.com). It was during that time that I really
    learned the business side of the spot Forex market and how the Forex brokers worked.


    After a while, I started writing a daily report called “Strategy of the Day” for
    clients. Actually, at the time it was just for internal salespeople, so that they
    could get clear and straightforward analysis of the markets with charts to have
    something to talk about with their clients. Every day I would point out several
    things to watch on various currency pairs and offer some commentary along with
    the technical analysis. Basically, it was simply what I personally was watching
    in the markets in my own account. It served two purposes. First, by writing down
    my thoughts on the market, it really helped me to solidify my strategies in my
    own mind. Second, it helped to educate the sales team so that they could speak
    intelligently about the currency markets when pitching ideas.


    I did that for probably six months or so, and then Mark Galant, the CEO at the
    time, started reading it. He thought it was well done and decided that he wanted
    to make it a research piece that would go out on the trading platform to every
    account holder. From there, “Strategy of the Day” for clients was born. I think
    that was in 2005. That strategy report really helped formulate my ideas, and I
    started to build quite a following from that research.


    From there, I continued to trade my own personal account. I was not trading in
    our asset management program yet [trading firm money], but I was working very
    hard to show I could trade well consistently and get to that point.


    I wrote an e-mail to my boss at the time, Glen Stevens. I had a unique idea as
    a way to get into that side of the business. I asked if I traded my personal account
    for three months and was profitable three months in a row, could I get a shot
    to trade on the hedge fund team? At that point, it was like a $100 million hedge
    fund. He gave that challenge the OK and agreed it was a good way to prove my trading
    ability. So, I worked hard to make profitable trades, was profitable three months
    in a row, and earned a seat on the fund. I think I was the youngest guy on the
    trading team of the hedge fund at the time.


    **Bourquin:** Going from stocks, especially NYSE stocks, to spot Forex is a huge
    jump. What kind of things were you trying early on in that transition to get a
    feel for how to trade that market?


    **Gordon:** That’s a great question, because you can’t scalp FX just because of
    something a specialist or market maker is doing. There’s no central marketplace
    for the spot Forex market, so I only know a few guys who can successfully scalp,
    and then only for short periods of time. It has always been a much more technically-based
    market. When I was at [TradingMarkets.com](http://TradingMarkets.com) and during
    my time at [FOREX.com](http://FOREX.com), I was really studying a lot of different
    methodologies, because I knew short-term momentum trading would not work in the
    FX market. What I really needed to do was hone my technical skills in reading
    charts.'
  raw: 'Ultimately, we wanted to see the twenty-period moving average on multiple
    time frames. That’s where there’d be a lot of volume. So, we looked at the moving
    average to know where volume would be or orders would accumulate, but then we
    looked at the stochastics to just confirm that the market was pulling back. When
    the stochastics began to turn up, we’d jump on board and scalp an upside trade.


    **Bourquin:** Do you remember what your average share size was for a position
    back then?


    **Gordon:** I started really small. When I first started trading, they started
    us with a limit of one hundred to two hundred shares. Once you could prove you
    could make money and be disciplined at that size, you would get bumped up to five
    hundred shares, and then one thousand shares, and then two years down the line
    I was calling our risk management bosses up in San Francisco, trying to get my
    limit upped to two thousand shares. Eventually I pushed it up to five thousand
    and then up to ten thousand shares. So, I would carry five thousand and ten thousand
    share positions for just a few minutes. In order to really make money scalping,
    you had to be trading that kind of size.


    **Bourquin:** How did your salary look back then? Did you have some sort of base
    or draw plus a portion of your profits?


    **Gordon:** There was no salary or draw. It was all based on what you made in
    profit. Back then, the deal was you’d earn 50 percent of what you made, and the
    firm kept the other 50 percent. And then, of course, you had to pay taxes. I was
    making a living, but only trading five hundred shares that first year. It was
    hard to make a living, especially living in San Diego. So, I lived very modestly
    for those first couple years. I think I ate about four to five meals a week at
    In-N-Out Burger, which I never grew tired of. Now that I live in New Jersey, I
    miss In-N-Out Burger! But I definitely paid my dues. Any new trader who thinks
    they are going to sit down at a computer and make big money right away as a trader
    is probably going to be disappointed. But it was worth living lean those first
    few years to learn how to trade.


    **Bourquin:** You mentioned your transition to Forex at some point. What was it
    about your NYSE trading strategy that changed and made you decide to look elsewhere?


    **Gordon:** It was perhaps 2003\. I vividly remember the last big day we had trading
    on that style. It was right around the time they arrested Bernie Ebbers from WorldCom.
    I remember we came in the next day and the S&P futures were down maybe fifteen
    points—and this was when the S&P was around 850\. As a percentage, that was a
    big move. The volatility was tremendous. I remember that the other traders in
    the office and I just killed it. We made the most money we ever made in one day,
    scalping back and forth. Dave and I actually finished with profits within a couple
    of hundred dollars of each other at the end of the day. That was just about the
    low in the market.


    So, to answer your question, when the market started coming back from that, I
    think it was the 2003 low, the volatility just died. The style of scalping we
    were doing at that time really relied on a lot of volatility. Without the constant
    movement each day, making money as a scalper is extremely difficult. The market
    rallied from there, but the S&P went from trading twenty or thirty handles [index
    points] per day down to maybe eight. When we have no intraday volatility, that’s
    when things really started to get lean for us in terms of trading opportunities,
    and Dave actually started trading the currency markets. So, he got me into it
    at that point and we just started trading the FX markets.


    I really enjoyed trading with that office, but I wanted to expand my experiences
    a bit, so I went up to Los Angeles to work for Larry Connors at [TradingMarkets.com](http://TradingMarkets.com)
    and write about the currency markets. But Dave and I continued to stay in contact,
    and I continued to trade the Forex markets in my own account.


    **Bourquin:** Let’s talk about your next move to [FOREX.com](http://FOREX.com).
    Did you land there as a trader, or were you doing something else there first?


    **Gordon:** I had been on the West Coast for a good three years, and I felt like
    heading home. You forget how bad those winters are after you’re gone for a while,
    so I was ready to come back East. I was first hired to come in and write their
    Learn to Trade Forex courses. There wasn’t a tremendous amount of information
    about Forex trading back then, so I set out to put together a strong intro course
    on how to trade currencies. So, originally, I was not hired as a trader.


    I came on board and developed their first currency trading course. I was also
    doing some institutional sales, helping set up their big Introducing Broker [IB]
    relationships and communicating with money managers about bringing some of their
    money to [FOREX.com](http://FOREX.com). It was during that time that I really
    learned the business side of the spot Forex market and how the Forex brokers worked.


    After a while, I started writing a daily report called “Strategy of the Day” for
    clients. Actually, at the time it was just for internal salespeople, so that they
    could get clear and straightforward analysis of the markets with charts to have
    something to talk about with their clients. Every day I would point out several
    things to watch on various currency pairs and offer some commentary along with
    the technical analysis. Basically, it was simply what I personally was watching
    in the markets in my own account. It served two purposes. First, by writing down
    my thoughts on the market, it really helped me to solidify my strategies in my
    own mind. Second, it helped to educate the sales team so that they could speak
    intelligently about the currency markets when pitching ideas.


    I did that for probably six months or so, and then Mark Galant, the CEO at the
    time, started reading it. He thought it was well done and decided that he wanted
    to make it a research piece that would go out on the trading platform to every
    account holder. From there, “Strategy of the Day” for clients was born. I think
    that was in 2005\. That strategy report really helped formulate my ideas, and
    I started to build quite a following from that research.


    From there, I continued to trade my own personal account. I was not trading in
    our asset management program yet [trading firm money], but I was working very
    hard to show I could trade well consistently and get to that point.


    I wrote an e-mail to my boss at the time, Glen Stevens. I had a unique idea as
    a way to get into that side of the business. I asked if I traded my personal account
    for three months and was profitable three months in a row, could I get a shot
    to trade on the hedge fund team? At that point, it was like a $100 million hedge
    fund. He gave that challenge the OK and agreed it was a good way to prove my trading
    ability. So, I worked hard to make profitable trades, was profitable three months
    in a row, and earned a seat on the fund. I think I was the youngest guy on the
    trading team of the hedge fund at the time.


    **Bourquin:** Going from stocks, especially NYSE stocks, to spot Forex is a huge
    jump. What kind of things were you trying early on in that transition to get a
    feel for how to trade that market?


    **Gordon:** That’s a great question, because you can’t scalp FX just because of
    something a specialist or market maker is doing. There’s no central marketplace
    for the spot Forex market, so I only know a few guys who can successfully scalp,
    and then only for short periods of time. It has always been a much more technically-based
    market. When I was at [TradingMarkets.com](http://TradingMarkets.com) and during
    my time at [FOREX.com](http://FOREX.com), I was really studying a lot of different
    methodologies, because I knew short-term momentum trading would not work in the
    FX market. What I really needed to do was hone my technical skills in reading
    charts.'
  trans: '

    # 交易策略与个人经历访谈


    最终，我们希望在多个时间框架上观察二十周期移动平均线。因为那里往往会有大量成交量。所以，我们通过观察移动平均线来判断成交量或订单会在哪里聚集，然后，我们会利用随机指标来确认市场正在回撤。当随机指标开始掉头向上时，我们就会入场进行短线交易，博取上涨利润。


    **布尔昆：** 你还记得当时平均每个仓位你会交易多少股吗？


    **戈登：** 我从小仓位开始。刚开始交易时，公司给我们设定的上限是一百到两百股。一旦你证明自己在这个规模上能够赚钱并且保持纪律，你就会升级到五百股，然后是一千股。两年后，我甚至打电话给我们在旧金山的风控主管，试图将我的上限提高到两千股。最后，我把它推高到五千股，甚至一万股。所以，我会持有五千股或一万股的仓位，但只持几分钟。要想通过超短线交易真正赚钱，你必须达到那样的交易规模。


    **布尔昆：** 你当时的薪资情况如何？是底薪加提成，还是预支薪水再加上利润分成？


    **戈登：** 既没有底薪，也没有预支。完全取决于你赚了多少利润。当时的规定是你赚取利润的 50%，公司留下另外 50%。然后，当然你还要自己缴税。我那时候能维持生计，但第一年只交易五百股。靠这个谋生很难，尤其是在圣地亚哥生活。所以头几年我过得非常节俭。我想我每周大概有四到五顿饭是在
    "In-N-Out" 汉堡店解决的，而且我从未吃腻过。现在住在纽约，我反而很怀念 "In-N-Out" 汉堡！但我确实为我的成长付出了代价。任何新手交易员，如果以为坐在电脑前就能立刻赚大钱，最终很可能会失望。但为了学会交易，头几年过得清贫些是值得的。


    **布尔昆：** 你提到某个时间点你转向了外汇市场。是什么促使你的纽交所股票交易策略发生了改变，让你决定寻找其他市场呢？


    **戈登：** 那大概是 2003 年。我清晰地记得我们采用那种交易风格最后辉煌的一天。就在世界通信公司的伯尼·埃伯斯被捕后不久。我记得第二天我们上班时，标普期货下跌了大约
    15 个点——那时标普指数大约在 850 点左右。按百分比算，这是个很大的波动。市场波动性巨大。我记得办公室里的其他交易员和我在那一天都赚翻了。我们赚到了有史以来单日最高的利润，反复进行短线交易。收盘时，我和戴夫的利润实际上只相差几百美元。那差不多是市场的最低点。


    所以，回答你的问题：当市场从那个低点（我认为是 2003 年的低点）开始反弹时，波动性就消失了。我们当时采用的超短线交易策略，非常依赖高波动性。没有每天持续的价格波动，超短线交易员赚钱就极其困难。市场从那里开始上涨，但标普指数从每天波动二三十个点，降到了只有八个点左右。当盘中波动性较低时，对于我们来说，在交易机会方面日子就开始变得艰难了。实际上，戴夫在那时已经开始交易货币市场了。所以，他把我带进了那个领域，我们开始交易外汇市场。


    我很享受在那个办公室的交易时光，但我想拓宽一下自己的经历，于是去洛杉矶为 [TradingMarkets.com](http://TradingMarkets.com)
    的拉里·康纳斯工作，撰写关于货币市场的文章。但我仍然和戴夫保持联系，并继续用自己的账户交易外汇市场。


    **布尔昆：** 我们来谈谈你下一步加入 [FOREX.com](http://FOREX.com) 的经历。你是直接作为交易员入职的，还是先做了其他工作？


    **戈登：** 我在西海岸已经待了整整三年，感觉是时候回家了。离开一段时间后，你会忘记那里的冬天有多糟糕，所以我准备好回到东部了。一开始我被聘去编写他们的“学习交易外汇”课程。当时关于外汇交易的信息并不多，所以我着手编写了一门关于如何交易货币的扎实入门课程。所以，最初我并不是以交易员的身份被雇用的。


    我入职后开发了他们的第一门货币交易课程。同时，我还做一些机构销售工作，帮助建立他们的大型介绍经纪商关系，并与基金经理沟通，希望能吸引他们的资金到 [FOREX.com](http://FOREX.com)。正是在那段时间，我真正了解了现货外汇市场的业务运作方式以及外汇经纪商是如何工作的。


    过了一段时间，我开始为客户撰写一份名为“当日策略”的每日报告。实际上，当时这份报告只是为内部销售人员准备的，以便他们能获得清晰直接的市场分析以及图表，这样他们与客户沟通时就有话题可谈。每天我都会指出几个在不同货币对上需要关注的点，并提供一些评论以及技术分析。基本上，这只是我个人在自己的账户中关注的市场情况。这有两个目的。首先，通过写下我对市场的看法，帮助我巩固了自己的交易策略。其次，这也有助于培训销售团队，使他们在推销理念时能专业地谈论货币市场。


    我大概做了六个月左右，当时的 CEO 马克·加兰特开始阅读这份报告。他认为写得不错，并决定将其做成一份研究报告，通过交易平台发送给每一位账户持有人。就这样，针对客户的“当日策略”诞生了。我想那是在
    2005 年。这份策略报告极大地帮助我理清思路，我也因此开始积累起相当多的追随者。


    从那以后，我继续交易自己的个人账户。我当时还没有参与公司的资产管理计划，但我非常努力地证明自己能够持续稳定地交易，以便达到那个阶段。


    我给当时的老板格伦·史蒂文斯写了一封邮件。我想出了一个独特的方法，希望能进入资产管理这一块业务。我问，如果我用个人账户交易三个月，并且连续三个月都盈利，我能否有机会加入对冲基金交易团队？当时，那支对冲基金的规模大约有一亿美元。他认可了这个挑战，并同意这是证明我交易能力的好方法。于是，我努力进行盈利交易，连续三个月盈利，最终在基金里赢得了一席之地。我想我应该是当时对冲基金交易团队里最年轻的一个。


    **布尔昆：** 从股票交易，尤其是纽交所股票，跳到现货外汇，这是一个巨大的跨越。在过渡初期，你尝试了哪些方法来感受如何交易这个市场呢？


    **戈登：** 这是个好问题，因为你不能仅仅因为某个做市商或专家的行为就去超短线交易外汇。现货外汇市场没有中央交易市场，所以我只认识少数几个能够成功进行超短线交易的人，而且往往也只能持续很短的时间。外汇市场一直是一个更依赖技术分析的市场。当我在
    [TradingMarkets.com](http://TradingMarkets.com) 和 [FOREX.com](http://FOREX.com)
    工作期间，我确实研究了许多不同的方法论，因为我知道短期动量交易在外汇市场行不通。我真正需要做的是磨练自己阅读图表的技术分析能力。

    '
- fmt: '# 采访记录：交易策略与职业生涯


    我开始了寻找“圣杯”的旅程，就像每个交易员在职业生涯的某个阶段都会经历的那样。我们都在寻找一种神奇的设置或神奇的方法论，希望它能适用于所有市场和所有时间框架。当然，这并不存在，但你仍然必须找到一种适合你个人风格和风险承受能力的策略和方法。在找到我当前的方法论之前，我苦苦搜寻了整整几年。


    我真的付出了很多努力，才从交易动量转向基于图表的、更技术性的交易层面。关键是，你需要更加技术性地交易外汇，因为它更像是一场棋局，而不是与对手（专家）打一场拳击赛，而这正是当日交易股票的特点。


    **Bourquin：** 我知道在某个时候你选择了艾略特波浪理论。那是何时发生的？


    **Gordon：** 那发生在我刚加入`[FOREX.com](http://FOREX.com)`的早期。我对它有一些了解，而且我们可以接触到大量投资银行的研究报告。`[FOREX.com](http://FOREX.com)`和货币市场中的其他外汇公司会与大型投资银行对冲其业务，而我们当时是瑞银、巴克莱、高盛和雷曼等公司的大客户（如果你能相信的话）。正因为这种关系，我们能获得银行的研究报告，并且每家银行都有几位我密切关注的专家。


    瑞银有一位名叫`Jim Short`的人做艾略特波浪分析。高盛也有一个人做艾略特波浪分析，我每天都会观看和阅读他们的文章。我给他们发邮件，不停地用关于艾略特波浪的问题打扰他们。我读了所有的书。那是我在`[FOREX.com](http://FOREX.com)`的早期时光，我花了大量时间阅读那些银行的研究报告。这些人在做出别人都没有的预测和分析。他们的分析非常精准，我发现自己不停地问他们各种问题，想了解他们是如何进行分析的。我开始寻找关于艾略特波浪计数的所有可用信息，并阅读了我能找到的关于这门手艺的一切。


    **Bourquin：** 一旦你通过交易进入了对冲基金团队，你的薪酬是如何运作的？和以前一样——全是利润分成——还是你有一些基本工资？


    **Gordon：** 因为我身兼二职，并且仍然在研究部门，所以我写研究报告是有薪水的，然后我从为资产管理团队交易中赚取一定比例的利润。


    **Bourquin：** 好吧，这有点像混合模式。你既是自营交易员，又是研究撰稿人，所以你一个人干了所有活。


    **Gordon：** 是的。那真是一份很酷的工作。`[FOREX.com](http://FOREX.com)`是我人生中一段美好的时光，我有机会与一群非常优秀的人共事，并撰写一份很棒的研究报告。我不是说一开始质量就很高，但我做得很开心。这也让我能够通过将策略公之于众来厘清它们。一旦发布出去，就无法隐藏或收回。在那段时间里，我对自己的交易获得了巨大的信心。


    随后，我与世界各地的客户建立了许多良好的联系。随着研究报告的发布，我的知名度也在上升。我明确表示，我在“每日策略”报告中提出的交易和分析，我会在对冲基金中投入相当大的规模。这让我们的合规部门抓狂！他们非常讨厌我，因为我总是尽可能通过谈论我交易的真实金额来挑战底线。我快把他们逼疯了，但公平地说，美国国家期货协会（NFA）在`[FOREX.com](http://FOREX.com)`的办公室设有办事处，他们当时正在严厉打击外汇行业。`[FOREX.com](http://FOREX.com)`一直非常保守，希望确保他们始终合规。


    **Bourquin：** 让他们抓狂的事情之一是你如何从头到尾概述真实交易，对吗？


    **Gordon：** 对。我总是挑战自己，尽可能透明地展示我在市场中的交易和操作。我给合规部门写了封信，说我想为2008年2月在纽约举行的交易员博览会做点什么。我说我想完整地核算一下上个月基金中我的三笔最佳交易和三笔最差交易。我想让“每日策略”报告的读者和我的客户看到当月的确切损益表。我做到了，而且我想我给你看过那个PPT。


    **Bourquin：** 是的，我记得看过。没有多少人愿意分享他们赚了多少或赔了多少。


    **Gordon：** 我忘了具体的明细了，但我在三笔最佳和三笔最差交易中净赚了`$25,000`或`$27,000`，并且我一步一步地带客户回顾了这些交易。我向他们精确展示了我是如何操作交易设置的。我向他们展示了从开始到结束的交易时间顺序。我冒了个险，如此公开这些信息，结果奏效了。我作为分析师和交易员的可信度持续增长。


    **Bourquin：** 我几乎从一开始就在读“每日策略”，我认为它之所以与众不同，之所以如此迅速地受到欢迎，是因为很多在聊天室和新闻简报中的人都会对交易做出预测，如果交易变糟了，你就再也听不到后续了。他们转向下一个预测，永远不会回头说：“我在这个交易上搞砸了。”而你会回过头来说：“嗯，显然美元交易的结果不太好。这是我认为它失败的原因，以及我现在关注的重点。”我认为这种可信度和正当性非常罕见，而且我认为人们尊重这一点。


    **Gordon：** 绝对如此。在交易行业的网络上有很多人试图吸引眼球，而我始终觉得这是最好的方式。在交易行业，很少有人愿意做到百分之百的透明。对于交易员来说，没有秘密，也没有轻松的成功之路。市场上存在一些极其误导人的营销，让交易员——尤其是新手交易员——觉得自己可以有90%的正确率。这不是市场的现实。如果你有58%的正确率，并且你的平均值显示你在这些亏损交易中平均亏损`48`点，但在盈利交易中平均盈利`82`点，这是一个不错的业绩记录。这足以在市场中谋生。


    我想我的使命就是向人们展示交易的真实情况，因为在我的职业生涯中，我遇到过很多非常优秀的交易员，我要告诉你：在他们的一生中，很少有人（如果有的话）的正确率能超过60%。这个现实需要与大家分享。我受够了那些胡说八道的营销。太荒谬了。当然，作为交易员你可以赚钱，但这需要时间、专注和努力。


    **Bourquin：** 所以艾略特波浪理论让你达到了那个胜率，但我听说数浪并不容易。你必须以特定的方式数浪，这需要一些练习。你花了多久才对那个策略真正有信心？'
  raw: 'I started doing that “quest” for the Holy Grail, just like every trader does
    at some point in their trading career. We all begin looking for the magic setup
    or a magic methodology that will work in all markets and all time frames. Of course,
    it doesn’t exist, but you still have to find a strategy and method that fits your
    personal style and risk tolerance. I searched high and low for a good couple of
    years before I found my current methodology.


    I really had to work hard to make the switch from trading momentum to trading
    on a more technical level based on charts. The point is you really need to get
    more technical to trade FX, because it’s so much more of a chess game than a boxing
    match with an opponent [the specialist], which is what day trading equities was.


    **Bourquin:** I know that at some point you settled on Elliott Wave. When did
    that happen?


    **Gordon:** That happened early in my time at [FOREX.com](http://FOREX.com). I
    had some knowledge of it, and we had access to a bunch of investment bank research.
    [FOREX.com](http://FOREX.com) and the other Forex companies within the currency
    markets would hedge their business with the big investment banks, and we were
    big clients of companies like UBS, Barclay’s, Goldman Sachs, and Lehman at the
    time, if you can believe it. Because of this relationship, we would get bank research,
    and there were a couple guys at each bank that I followed closely.


    There was a guy at UBS named Jim Short who did Elliott Wave. There was also a
    guy at Goldman who did Elliott Wave analysis, and I would watch and read their
    stuff every day. I e-mailed them and bothered them all the time with questions
    about Elliott Wave. I read all the books. It was the early days in my time at
    [FOREX.com](http://FOREX.com), and I spent a lot of time reading that bank research.
    These guys were making calls and doing analysis that nobody else had. Their analysis
    was spot on, and I found myself asking them all kinds of questions about how they
    were doing their analysis. I began to seek out every piece of information available
    on Elliott Wave counts and read everything I could about the craft.


    **Bourquin:** How did your compensation work once you traded your way onto the
    hedge fund team? Was it the same thing as before—all profit—or did you get some
    sort of base salary?


    **Gordon:** Because I was serving in a dual capacity and was still on the research
    side, I was salaried for writing the research, and then I made a percentage of
    the profits from trading for the asset management team.


    **Bourquin:** Okay. It was kind of a hybrid. You’re a prop trader and a research
    writer, so you were doing it all.


    **Gordon:** Yeah. It was a really cool job. [FOREX.com](http://FOREX.com) was
    a great period of my life, and I got to work with a really good group of people
    and write a great research piece. I’m not saying the quality was great initially,
    but I had a lot of fun doing it. It also enabled me to clarify my strategies by
    putting them on paper for the world to see. There’s no hiding or taking it back
    once it’s been put out there. I gained a ton of confidence in my trading during
    that time.


    Then I made a lot of good contacts with our clients around the world. My profile
    was on the rise there with the research report. I made it very clear that the
    trades and analysis I put in the “Strategy of the Day” report, I put on significant
    size within the hedge fund. It would drive our compliance department nuts! They
    hated me so much because I kept pushing the boundaries as much as I could by talking
    about real dollars that I traded. I drove them out of their minds, but in fairness
    to them, the National Futures Association—the NFA, had an office at the [FOREX.com](http://FOREX.com)
    offices, and they were really cracking down on the Forex industry. [FOREX.com](http://FOREX.com)
    was always very conservative and wanted to make sure they were in compliance at
    all times.


    **Bourquin:** One of the things that drove them crazy was how you outlined actual
    trades from start to finish, right?


    **Gordon:** Right. I always challenged myself to be as transparent as possible
    about what I was trading and doing in the markets. I wrote the compliance department
    and said I wanted to do something for the February Traders Expo in New York in
    2008\. I said I wanted to do a full accounting of my three best trades and my
    three worst trades from the previous month in the fund. I wanted to show readers
    of the “Strategy of the Day” report and my clients the exact P&L for the month.
    I did it, and I think I showed you the PowerPoint.


    **Bourquin:** Yes, I remember seeing that. Not many people are willing to share
    what they made or lost.


    **Gordon:** I forgot exactly what the breakdown was, but I made $25,000 or $27,000
    over my three best and three worst trades, net, and I took clients through it
    step by step. I showed them exactly how I worked the trade setup. I showed them
    the chronology of the trade from start to finish. I took a gamble on being so
    public with the information, and it worked. My credibility as an analyst and trader
    continued to grow.


    **Bourquin:** I read “Strategy of the Day” almost from the very beginning, and
    I think what made it different, why you got so popular with it quickly, is that
    a lot of people in chat rooms and in newsletters make a call on a trade and if
    it goes bad, you never hear about it again. They’ve moved on to the next call
    and they never go back and say, “I screwed up on this one.” You would go back
    and say, “Well, obviously the dollar trade didn’t work out so great. Here’s why
    I think it didn’t work out and here’s what I’m looking at now.” I think that kind
    of credibility and legitimacy is pretty rare, and I think people respect it.


    **Gordon:** Definitely. There are a lot of people on the web in the trading industry
    trying to attract attention, and I always felt this was the best way to do it.
    In the trading industry, there are very few people who are willing to be 100 percent
    transparent. There are no secrets and no easy way to be successful as a trader.
    There is some horribly misleading marketing out there that makes traders—and especially
    new traders—feel like they can be right 90 percent of the time. That’s not reality
    in the markets. If you’re right 58 percent of the time and your average has shown
    you’re losing 48 pips on those trades but you’re making 82 pips, on average, on
    winners, that’s a nice track record. That’s enough to make a living in the markets.


    I guess it was my mission to show people the reality of trading, because I’ve
    met a lot of really good traders in my career, and I’ll tell you what: very few,
    if any, over the course of their lifetime is right more than 60 percent of the
    time. And that reality needs to be shared with people. I’m sick of the BS marketing
    out there. It’s ridiculous. You can make money as a trader, of course, but it
    takes time, dedication, and hard work.


    **Bourquin:** So Elliott Wave has allowed you to get to that winning percentage,
    but I’ve heard counting the waves isn’t easy. You’ve got to count waves in a specific
    way, and it takes some practice. How long did it take you to get really confident
    with that strategy?'
