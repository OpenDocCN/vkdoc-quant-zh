- fmt: 'The training program that I put together, which is called the Jellie program,
    is named for a jellyfish. In order to survive, jellyfish have to adapt. They have
    to be flexible, they have to eat wherever they’re thrown into the ocean, and they
    can’t provide self-momentum, so they’ve got to go with the flow. That’s what it’s
    all about in trading, whether it’s determining which market is best to trade or
    diagnosing the current market environment and adapting accordingly.


    I think those of us who have been fortunate enough to have crossed the line to
    success over the years have figured out that it’s not about us, it’s not about
    our egos, and it’s not about what we think *ought* to happen. It’s about identifying
    and understanding what really is happening and aligning ourselves with that.


    **Bourquin:** Can you give us an overview of your technical analysis?


    **Miller:** I believe in keeping it simple. I really do. It’s interesting, because
    there have been a lot of studies out there that say technical analysis doesn’t
    work. Those studies are actually probably right, but the fallacy in all those
    conclusions is that they look at indicators by themselves.


    For example, a lot has been written about why moving averages, stochastics, moving
    average convergence/divergence [MACD], or support and resistance don’t work. I
    would tend to agree with every one of those comments with the caveat that, by
    themselves, the indicators don’t work. But I and many others who are successful
    view these indicators in combination.


    If you understand that the market is trending and want to know on what time frame
    it is doing so, you can measure that by using technical indicators like moving
    averages, stochastics, and support and resistance points. Really, that’s all you
    need. Throughout the hundreds of different indicators that are out there, you’re
    just looking for a handful. You’re looking for something to define momentum, trend,
    and the points in time where you really have to take action.


    I could rattle off probably a dozen indicators that all measure momentum and a
    dozen indicators that all measure trend. People get caught up on the fanciest
    indicator for this and the fanciest indicator for that. But I keep it simple and
    use only a handful of indicators.


    **Bourquin:** Do you have a favorite indicator for measuring momentum?


    **Miller:** I use stochastics, but I’m sure MACD is fine. There are some custom
    indicators out there that also measure momentum, but I use moving averages, stochastics,
    support and resistance points, and that’s it.


    I also use an indicator called the Three-Line Break, which is a non-time-based
    line chart that is purely focused on price. As such, it helps define trends and
    reversal points. As long as the markets do not retrace below or go above a certain
    price point, the Three-Line Break is a wonderful indicator.


    I also look at everything on multiple time frames. I’ve got a one-minute chart,
    a five-minute chart, a fifteen-minute chart, an hourly chart, and a daily chart.
    I don’t just use technical indicators or technical analysis. I use these tools
    on various time frames to try to understand the time frame that the market is
    cycling in. The market may look flat, but it may just be consolidating a huge
    bull or bear fight in a higher time frame. It may be trending really, really strongly
    on a five-minute chart, but the hourly or daily trend may be substantially down.
    In other words, I make sure that while I’m chopping down trees in the forest,
    the forest is not burning down.


    **Bourquin:** Let me switch gears a little bit and talk about one of the challenges
    that I know you dealt with in your trading career in the past year, and that was
    being a customer of MF Global. Can you talk about that time? How did you first
    find out there was a problem, and what was that like?


    **Miller:** I found out there was a problem when, all of a sudden, I tried to
    place an order, and my order entry platform did not allow me to execute.


    It was Halloween, and I knew something was up. I was flat at the time, and I called
    my broker and said, “What’s going on?” Over the coming hours, everything started
    to filter out, and it turned out that my broker had turned off access to anyone
    with an MF Global account.


    From what I was told, people who were trading on the floor were locked out of
    the building, and people who were trading electronically got turned off, and so
    that’s what happened to me. That began a year-long fight within the industry and
    a very sad and difficult chapter not only in my trading career, but in the life
    of the industry.


    It was just a very, very sad time, in terms of what happened, and then the true
    lack of appropriate action taken over the coming months was sad as well.


    **Bourquin:** And this is a lasting issue. Were you trading at all during that
    time, or were you trying to regain access to your account and recover your money?


    **Miller:** For a short period of time, all the funds were frozen. I forget how
    long that was, but I think it was about a month or so before the trustee actually
    made their first distribution. So, there was a time when I was on a bit of a forced
    vacation.


    During that time, however, I worked harder than I ever had, even as a trader,
    because a number of us banded together right away to try to get the word out about
    how we thought this situation should be handled. For about a month or so, I was
    not able to trade, but then we eventually got about 80 percent of our money back.
    We got the bulk of our money back fairly quickly, but getting the rest of it back
    has really been a battle and a drawn-out process.


    **Bourquin:** You’ve gotten 80 percent back so far?


    **Miller:** Actually, I have since sold my claim. One of the things I learned
    in the process is that it seems like everything on the planet is traded. Even
    bankruptcy claims are traded. There are people who are willing to invest in bankruptcy
    claims because they believe that through the course of time and through settlement
    action, they will ultimately be able to sell those claims. They’re buying wholesale
    and are going to sell those claims at a future date for a better price and make
    something off of that. There’s a market for that, primarily in the bond market.


    While we were advocating for how we thought the situation should be handled and
    continuing our business at the same time, we kept an eye on the prices at which
    these claims were being traded. Even though investors have all gotten 80 percent
    of their money back, based on what the trustee had told the courts and the information
    that had been gathered, we knew that we were ultimately going to be getting all
    of our money back—or close to it—and it was only a matter of time.


    It’s funny, because initially all these vulture funds came out and said, “We will
    buy your claim and we will pay you eighty-two cents on the dollar. Those who really
    didn’t realize what was going on or didn’t understand that most of the money would
    be found once the legal red tape had been sorted out probably sold at those prices,
    much to their regret. But those of us who did know what was going on watched the
    prices go up over time. Once they got to ninety-seven cents on the dollar, I made
    the decision to go ahead and sell my claims, because I could make back the small
    difference that was left in a very, very short period of time.


    After almost a full year, I have put that effort behind me—as much mentally as
    anything else. But I will say that for a short period of time, my passion for
    this business disappeared. My frustrations grew as I tried to get people to understand
    how wonderful this business is and all the protections that were provided to people
    engaged in the futures industry. It was a big, big fight.


    That chapter of my life is now 100 percent behind me. I can actively focus on
    what I need to do from a business perspective, and the passion is coming back.'
