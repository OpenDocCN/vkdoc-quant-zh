  trans: '

    # 排版后的内容


    之后，我与人们交谈，为他们进行交易并提供建议，然后我咨询了一位顾问，他向我解释说，进入这个行业并保持独立是很容易的。我最大的心结之一是不想为大型经纪公司工作，因为我希望拥有更多灵活性，且不必推销自营产品或基金。因此，最终看来，自己单干是顺理成章的选择。


    **布尔昆：** 你在管理他人资金的同时如何赚钱？是按收益百分比收费、收取固定费用，还是其他方式？


    **福斯特：** 对我来说，只是按资产净值收取固定比例的费率，具体比例会根据我在账户中的操作活跃度而有所不同。


    例如，如果客户对更偏向被动管理的账户感兴趣，主要采用买入并持有策略，且只有重大市场变化时才会调整账户中的一小部分资产——那么费率是 1.25%。


    有些账户是完全主动型的，这类客户在大经纪公司拥有更多资金，但他们希望用所谓的“零花钱”让我管理其账户中的一部分。嗯，这个术语挺有意思，能拥有这部分资金固然不错，但它本质上是他们账户中激进操作的部分。这种情况下，我会收取高达
    2%的费用，并且可能每两个月就完全换手整个账户。


    这非常不利于税务效率，但有时这种低效却能奏效，因为要么收益值得，要么亏损的规避弥补了这一点。有时候情况也确实如此。


    **布尔昆：** 回到利润目标的问题，你是否会提前设定平仓区域，或者如何决定何时离场？


    **福斯特：** 不，我不会提前设定。我听说过一些交易员，他们将亏损止损点设为 5%或 8%，将盈利止盈点设为 10%或 15%，但我更愿意让盈利奔跑。在止损方面，我依靠技术信号来帮助我在正确的时间离场。


    这也取决于账户及其风险水平。对于个人退休账户（IRA），我可能会设置更宽泛的界限，以最大化收益并减少交易频率。但在这些账户中，我也会更多地使用价外裸卖空期权。


    如果我认为标普 500 指数在某一年有下跌 10%的可能性，那么我认为在亏损 8%时就卖出并不明智，因为下跌空间可能只剩下 2%。然而，如果技术指标显示应该立即离场，那我就会卖出，尽管希望在承受
    8%的亏损之前，卖出信号就已经出现。


    **布尔昆：** 听到越来越多的交易员讨论不再设定任意利润目标，而是更多地依赖市场本身的信号，这很有趣。


    **福斯特：** 这里有一个很好的例子：如果在 2011 年 12 月初或中旬，当标普 500 指数正在形成短期底部时，我使用了任意止盈点，我就会错过上涨
    10%或 15%的机会。


    仅仅基于数字来截断交易并不值得，而且我从不希望限制上涨潜力。我的看法是，我宁愿在顶部错过 2%到 3%的下跌空间，也不愿过早离场而错过另外 10%的上涨机会。我认为除非运气极好，否则我无法精准地抄底逃顶，但通过使用技术指标，我可以识别出趋势何时改变或动能何时发生转换。


    **布尔昆：** 本质上，你会抓住行情的主要部分，并对这一点感到满意。


    **福斯特：** 没错，只抓住大部分行情就好，并且要意识到，如果你在顶部或底部错过了 2%、3%，甚至偶尔 4%的波动，从长期来看，这与你能在中间部分获得的
    10%或 20%的收益相比微不足道。


    如果你在熊市中做空，并且能把握住哪怕 5%的下跌行情，那么考虑到标普 500 指数在二十或三十年内历史平均年涨幅为 10%或 11%，你不仅抹平了 5%的下跌空间，而且将其转变为
    5%的收益。这就是在市场上长期获得巨大优势的方法。


    # 章节


    # 德里克·席明


    在其长达 25 年的职业生涯的不同阶段，**德里克·席明**曾管理超过 2.75 亿美元的客户资产，师从传奇交易员哈维·霍特金，并为外汇市场开发了开创性的纯价格图表工具。他的交易方法适用于所有市场，尽管拥有丰富的经验和资源，席明却迅速否定了存在
    elusive “交易圣杯”的想法，而是将纪律和适当的交易管理作为成功交易策略的基石。他的理念表明，摆脱多个滞后指标的束缚，在快速变化的市场中保持灵活，并且最重要的是，锁定来之不易的利润并限制亏损，可以为长期成功的交易生涯铺平道路。


    **蒂姆·布尔昆：** 德里克，我们首先谈谈你是哪种类型的交易员——日内交易者还是波段交易者，以及你交易的品种。


    **德里克·席明：** 嗯，从设计和意愿上讲，我肯定更倾向于认为自己是波段交易者或头寸交易者。然而，我认为了近期的市场状况不利于持有较长期的头寸，因此，我会像变色龙一样交易，改变自己和自己的行为，以适应市场环境允许我做的事情。


    我认为交易员的风格取决于他们如何管理头寸。一个完美的入场点就只是完美的入场点，但我如何管理这个头寸以及最终在何处离场，才是真正决定我风格的因素。


    我可能带着一种意图进入一笔交易，但最终完全根据市场的指示以另一种意图结束。简单地调整止损，并声称自己是波段交易者或日内交易者，并不一定能让你成为其中任何一种。这种止损调整与你整体策略无关，它只与如果交易不按你的预期发展时你愿意亏损多少有关。


    我不太喜欢把自己归类到任何一个框框里，因为尽管我确实有基本面分析的背景，但考虑到近期的市场状况，我现在发现自己更多地是进行技术面交易，并且时间框架相当短。


    **布尔昆：** 你具体交易的是现货外汇还是期货？


    **席明：** 我交易现货外汇，因为我认为这个市场为外汇交易者提供了迄今为止最具吸引力的机会。但如果旧轮胎也有图表，并且我能看到价格变动，我也可以做轮胎交易。最终，我认为任何东西都可以交易。


    **布尔昆：** 我想问问你使用的技术分析方法。在时间框架方面，你通常会看什么图表，以及你会在上面添加哪些指标？


    **席明：** 我查看的每一张图表都是纯粹的价格分析视图。我不看基于时间的工具，只关注价格变动。我会基于交易区间来分析事物，而不一定是只看一小时图，然后在十五分钟图上寻找入场点。我的分析技术与那些无关，这使我有别于市场上的大多数其他交易员。

    '
- fmt: '# 排版后的内容


    I do look at a broader pip range to see what’s happening overall, and I call that
    “The Monet Effect,” because you have to step back to really see it. Those familiar
    with Impressionist art know that if you come very close to a Monet, you see all
    the daubs of paint and how incredibly it was made, but you can’t really see the
    picture itself until you step back, and it almost looks like a photograph. That’s
    what’s amazing. To me, trading is much the same. You’ve got to step back and take
    a look at what’s happening overall, and then you can move in closer to see the
    finer details and be able to make your decision.


    Even though the approach I take is fairly simple, it’s difficult for me to put
    myself in any one box and say, “This is precisely what I look at,” although I
    might favor twenty-five- and twenty-pip charts for broad searches, fifteen- and
    twelve-pip charts for looking at the last few days to get more of a swing view,
    if you will, and then a ten-, eight-, or even smaller pip-range study to actually
    take the entry into the market.


    **Bourquin:** What is it about the price that tells you when it’s time to start
    looking for a trade opportunity? Are you watching for price to approach previous
    highs or lows?


    **Schimming:** I am first looking to identify what stage the market is in. That
    doesn’t mean I’m always right about that, but I’m striving to identify where we
    are in the flow of the overall market or in the flow of a particular instrument.
    Only then can I make trading decisions.


    Some typical patterns, like double tops and double bottoms, or breakouts and breakdowns,
    can be very consistent trading patterns for those who know how to analyze and
    trade them properly, but just looking at the simplistic nature of a higher high
    and following the subsequent higher low may create a new entry for me. So too
    might lower highs and lower lows, which are the basic components of a downtrend.
    I hate to make it sound so A-B-C basic, but that’s really what it comes down to.


    From there, it’s just taking disciplined trades based on the patterns and trying
    to put the odds more in my favor, all the while recognizing that I can’t be right
    every time. That’s when patience and discipline really become key.


    **Bourquin:** In speaking with traders who identify themselves as pure price-action
    players, many have said that it takes a while to learn to read the markets and
    get that “feel” you mentioned. How long did it take you to really become confident
    in your trading?


    **Schimming:** This is where I respectfully disagree with the way most people
    feel about that. I think that’s wrong. The only indicator out there that doesn’t
    lag is price, and while so many embark on this never-ending search for the “Holy
    Grail” of trading tools, it just doesn’t exist.


    Too many traders get caught up in putting so much clutter on their charts that
    the only outcome is “paralysis by analysis.” They’re waiting for so many things
    to happen before they buy that I’m already selling to them when they finally decide
    to pull the trigger. The problem is that we want to see so many things line up
    in order to have confidence in a trade, and the reality is, at some point, each
    trader has to be decisive and put their money on the table if they think something
    is going higher or lower.


    What I’m suggesting is that traders should require much less initial confirmation
    and then look for more things to confirm once they’re already in the position.
    A trade doesn’t need to look perfect when I get in, but I need for it to look
    better as I’m holding it, and if it doesn’t, then I should get out. My philosophy
    is that by looking only at the price, I’m able to react much quicker.


    I use only two indicators to qualify my trades, and while there are other things
    I look for as a trade develops, I mainly just deal with mistakes as they happen
    and allow winners to run while cutting the losers short.


    Trading is always easy after the fact, but when we look back in retrospect, traders
    typically get out of winning trades too quickly just to book a profit, and they
    stay in bad trades for too long because they don’t want to admit they were wrong
    and take the loss. It’s unfortunate, but the natural mental cycle is usually telling
    us the wrong things.


    **Bourquin:** You began to mention the two primary qualifiers you look for to
    confirm your trade entries. Let’s talk some more about those.


    **Schimming:** I created a tool called the Currency Strength Index—`CCYX`— and
    there is a lot of documentation on it on the internet, but what it does is disassemble
    the currency pairs. It’s doing cross-currency analysis, but it’s doing it from
    the large liquidity pools in the currency arena and allows me to see what’s happening
    throughout the world, and not just according to one broker.


    Using `CCYX`, I can see what’s happening to the currencies on an individual basis
    and identify some basic trends. I always start here to discover which currencies
    are moving higher, which are moving lower, and which aren’t moving at all.


    Then, if I see, for example, that the yen and the US dollar are moving up while
    the British pound and Aussie are moving down, all of a sudden, my focus list is
    set, and I’ll look at four currency pairs: `GBP/USD` and `GBP/JPY`, as well as
    `AUD/USD` and `AUD/JPY`.


    Next, I’ll take a Monet view of those four pairs and look at what’s happened to
    them over the last few days and last few hours to gauge the cycle we are in. Obviously,
    there are several steps involved in that process, but when I’m ready to actually
    take a trade, I’ll look at price pattern as well as two simple qualifiers: the
    `TFXD` oscillator, which is very similar to moving average convergence/divergence
    (`MACD`), and also a directional movement system, like the average directional
    index (`ADX`). I happen to put those two together just because they are the ones
    that I find most complementary to my style of trading and charting things, but
    that could differ from trader to trader.


    By looking at price movement and patterns, I know which currencies are most—and
    least—in play and can shorten my watch list. Then, when I see a pattern develop—like
    a high that’s looking to go higher following a pullback in the uptrend—I’ll look
    at those qualifiers for confirmation to take that trade.


    Once we’re holding a position, trade management becomes most critical, and obviously,
    we want the earlier indicators, including `CCYX`, `TFXD`, and `ADX` to appear
    even stronger once a trade is on.


    **Bourquin:** You mentioned that you came from a fundamental background. What
    role, if any, does that still play in your trading decisions?


    **Schimming:** That’s a good question, because we’re dealing with currencies,
    not companies, like traders in the equities arena do. Obviously, in equities we
    would look at company data, like P/E ratio and earnings reports, news, and other
    factors to formulate a fundamental impression of a particular company.


    In currencies, we don’t have that information for particular countries, per se,
    but in reality, economic reports, like the Purchasing Managers Index (`PMI`),
    the Producer Price Index (`PPI`), and nonfarm payrolls in the United States, probably
    represent the most substantial news events in any calendar month and provide that
    same kind of useful information.


    I treat each country like a company and assess economic and fundamental data to
    see how it is making the nation’s currency react. Now, I believe that sometimes
    things move fundamentally incorrectly, but the fact that a particular pair is
    moving is really all I care about as a trader.'
  raw: 'I do look at a broader pip range to see what’s happening overall, and I call
    that “The Monet Effect,” because you have to step back to really see it. Those
    familiar with Impressionist art know that if you come very close to a Monet, you
    see all the daubs of paint and how incredibly it was made, but you can’t really
    see the picture itself until you step back, and it almost looks like a photograph.
    That’s what’s amazing. To me, trading is much the same. You’ve got to step back
    and take a look at what’s happening overall, and then you can move in closer to
    see the finer details and be able to make your decision.


