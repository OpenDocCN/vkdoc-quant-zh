  raw: 'I know a lot of people who don’t like to trade nonfarm payroll reports, and
    I was one of them at one time in my career, but ironically, now that I have these
    tools available, nonfarm payrolls is my favorite day of each trading month. More
    often than not, I find trading around nonfarm payrolls to be like shooting fish
    in a barrel, not just because the dollar may tend to move against major currencies,
    but mainly because it means all markets are going to move. Things can happen quickly,
    and there’s going to be plenty of volume and plenty of opportunities for those
    who know how to take advantage of them.


    Again, when looking at pure price, I’m not waiting for a bunch of things to tell
    me what “should” or “could” be happening. I’m using price to tell what *is* happening.
    I make trade decisions and run with them, and I’ll deal with the consequences
    when I’m wrong. The critical part is just to not get hurt too much in the event
    of a bad trade.


    **Bourquin:** Can you recall a recent nonfarm payrolls announcement that serves
    as a good example of how you trade that data?


    **Schimming:** Absolutely. I do the same thing every time, and as a matter of
    fact, the last few have worked out very, very well for us.


    What I do is lay out a schematic that includes the expected figure, the median
    and the average, the previous report’s figure, and how the previous print compared
    to its prior expectation. Next, based on what’s expected for the new report, I
    analyze both potentially positive factors that could lead to more jobs being created,
    and potentially negative factors that could lead to fewer jobs being created.
    I’ll then set some levels for those figures, typically using fairly round numbers.


    You have to anticipate both sides and consider what data might surprise the market,
    as well as what might anger the market. That doesn’t mean traders have to predict
    what’s going to happen, but too many get caught up in that and then fail to take
    notice of what’s really happening.


    As traders, we don’t have to know what’s going to happen tomorrow, but we do have
    to anticipate what the possibilities are and be prepared to react when a move
    materializes.


    On the morning of the report, I’m careful not to jump right in. I allow the news
    to come out and the typical knee-jerk reaction to take place. For example, if
    the news was good, the dollar should be reacting strongly, and currency pairs
    like EUR/USD and GBP/USD should be coming down. But those moves may or may not
    be happening right then.


    We wait for things to settle down and for the trend to ultimately begin, and that
    may mean waiting five minutes or twenty-five minutes, but I can assure you that
    it’s not five seconds. I don’t have my finger on the trigger the moment that report
    comes out.


    **Bourquin:** Do you have an entry point in mind before the report comes out,
    or do you wait to determine that until after you see the data and reaction?


    **Schimming:** I’ll look at ranges of key price areas where I would want to get
    in, but that’s not necessarily going to be the end-all for me.


    The human mind responds to round numbers, but regardless of the financial instrument,
    I never look at the market with one specific price in mind, because that can keep
    you out of trades that are happening as planned just because they didn’t hit a
    certain number.


    An even more common mistake might be when the market passes your specific entry
    point by a little bit and you wait for it to come back. It can be off and running
    from there, and you’ll never have another chance to get in if you stay fixated
    on just one entry point.


    It’s fine to look at one specific price *range* for entries, but never break it
    down to a single price. You just can’t make it that perfect, nor do you have to.
    I can get close and still be effective, and while the goal is to be very close,
    I’m not going to be spot-on at picking tops and bottoms. Nobody is.


    **Bourquin:** Right. You just want to get the meat of the move after the trend
    has started.


    **Schimming:** Yes, I’m not trying to squeeze out every pip from top to bottom.
    Just give me a chunk in the middle.


    How often do we see traders get burned while reaching for “one last pip” or “one
    more dollar”? I can’t tell you how many times I’ve seen reversals happen in those
    situations, and the worst part is that the trader saw their opportunity to exit
    and just didn’t take it.


    Again, the brain works in round numbers, but sometimes that’s the Achilles’ heel
    for traders. I want my stops to be beyond the specific levels of support and resistance,
    beyond a Fib or pivot level, and beyond a high or low so I have stronger protection.
    Then I want my limits to be inside those levels, and I want my ranges to be hit,
    because ultimately, even though I’m not constantly booking the top of a move—or
    even booking profits on every trade—I make consistent profits when trades go my
    way and limit losses when they don’t. It’s much easier to make money overall when
    maintaining that philosophy.


    **Bourquin:** You mentioned placing your stops outside certain levels and your
    limits inside those levels, so let’s expand on that a little bit, because I think
    that probably forms the basis for how you set your profit targets and stop losses,
    right?


    **Schimming:** Absolutely. We can just use some round numbers and a hypothetical
    situation to help visualize this. Let’s assume something is trading just above
    the round number 3,700, and just below that is a pivot level at 3,695.


    We believe it will continue higher and know there is firm support near that 3,700
    figure because of the round number and the nearby pivot for the instrument. If
    we enter fifteen pips above 3,700 and the known pivot level is five pips below
    at 3,695, as I’m taking it long, I need to set my stop so I’ll be protected.


    Some traders could have trouble here if they say, “Well, I use a twenty-pip stop.”
    Personally, I like to use a fixed stop range as well, but mine is not a fixed
    number, be it fifteen, twenty, or fifty pips.


    If I’m taking this trade at fifteen and I think the area of support is twenty
    pips back, in this case, I need to have my stop at ninety pips, because there’s
    defense both at the round number and the pivot point below it.


    Now, I don’t want that hit, and if the instrument were to go below 3,700 and then
    below that pivot point, I would want out anyway. I think it can come down and
    scrape against them, though, so I place my stop according to the specific conditions.
    That’s an example of trading “like a chameleon,” as I mentioned earlier.


    Regarding profit taking, let’s say that 3,750 was the prior high, and as the instrument
    approaches, I want it to get above there. But my philosophy would be to take profits
    on half this trade at 3,740 and book a twenty-five-pip winner.


    After booking those profits, I’ll then bring my stop up somewhere between sixteen
    and twenty, so I’ll put my stop at plus one to plus five. I’m going to see if
    the pair can still get over that previous high range and break out into new ground.
    But if it doesn’t, I’ve already taken risk off the table. I’ve brought my stop
    inside my protection to let the trade move. I’ve set my initial price target based
    on a prior high or resistance point, or a Fib level or pivot.


    There could also be factors that would cause me to exit the trade instead, but
    active management is likely how I would approach that.


    The point I want to emphasize is this: I want my limits hit, so I’ve got them
    exposed where they can get hit. Also, I want my stops protected, and I’ll adjust
    so they are somewhere in the fifteen- to twenty-five-pip range, based on where
    the protection is.


    There is no easier thing to do than eliminate risk on a trade if it’s moving in
    your favor. Myself and the traders in my group follow a written rule that says,
    “Once profitable by fifteen pips or more in any trade, you should never allow
    that trade to go negative.” If we’re talking about trading as an art form, the
    art is really how you manage your trades.'
