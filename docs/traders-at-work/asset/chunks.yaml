    After that, I talked to people about making trades for them and giving advice,
    and then I talked to an advisor who explained to me that it was easy to get into
    business and still be independent. One of my biggest hang-ups was that I didn’t
    want to work for a big brokerage house because I wanted more flexibility and to
    not have to push proprietary products or funds. So, it eventually just made sense
    to go out on my own.


    **Bourquin:** How do you make money while managing other people’s money? Is it
    a percentage of gains, a flat rate, or something else?


    **Foster:** For me, it’s just a straight percentage of assets, and it varies,
    depending on how active I am in the account.


    If, for example, a client is interested in a more passive account that mainly
    employs a buy-and-hold approach and for which major market changes would only
    result in changes to a smaller percentage of the account—that would be a 1.25
    percent fee.


    Some accounts are totally active, where clients have more money with a big brokerage
    house, but they want to manage a portion of their account with me using what they
    call “play money.” Now, that’s quite an interesting term, and it would be nice
    to have that, but it’s essentially the aggressive portion of their account. I
    would take up to 2 percent in those cases, and I might turn over the entire account
    every month or two.


    This is very tax inefficient, but sometimes the inefficiencies work out because
    either the gains are worth it or the avoidance of losses makes up for it. Sometimes
    that’s the case, too.


    **Bourquin:** Going back to profit targets, do you have areas set ahead of time
    where you are going to close out your positions, or how do you decide when it’s
    time to get out?


    **Foster:** No, I don’t figure that out ahead of time. I have heard of traders
    who have a 5 percent or 8 percent cutoff on losses and a 10 percent or 15 percent
    cutoff on gains, but I would rather let my winners run. When it comes to cutting
    losses, I count on the technical signals to help me get out at the right time.


    It also depends on the account and its risk level, and I might set a broader barrier
    for an IRA account to maximize gains and not trade as much. But I will also use
    more out-of-the-money naked puts in those accounts.


    If I think there is a 10 percent downside possibility for the S&P in a given year,
    I don’t believe it’s wise to sell at an 8 percent loss, because there might only
    be 2 percent left in the downfall. If, however, a technical indicator says to
    get out right away, then I would sell, although hopefully the sell signal would
    appear before sustaining an 8 percent loss to begin with.


    **Bourquin:** It’s interesting to hear more traders talk about getting away from
    setting arbitrary profit targets and instead relying more on what the market is
    telling them.


    **Foster:** And here’s a good example: if I had used an arbitrary limit at the
    beginning or middle of December 2011, when the S&P was making a near-term bottom,
    I would have missed out on 10 percent or 15 percent to the upside.


    It’s not really worth cutting a trade off based on numbers alone, and I don’t
    ever want to limit upside potential. The way I look at it, I would rather miss
    2 percent or 3 percent to the downside off the top than get out early and miss
    another 10 percent to the upside. I don’t think I’m going to be able to pick the
    absolute top and bottom unless I’m extremely lucky anyway, but by using technical
    indicators, I can identify when a trend has changed or momentum has shifted.


    **Bourquin:** Essentially you will catch the meat of the move and be comfortable
    with that.


    **Foster:** Exactly, just catch the bulk of it and realize that if there is 2
    percent, 3 percent, or occasionally even 4 percent off the very top or very bottom
    that you miss, that’s small over the longer term compared to the 10 percent or
    20 percent you could get in the middle.


    If you’re trading the short side in a bear market and can ride that for even 5
    percent, then when you consider the S&P is historically going to gain 10 percent
    or 11 percent over twenty or thirty years, on average, you’ve not only erased
    5 percent on the downside, but you’ve flipped it to become 5 percent on the upside.
    That’s how to come out way ahead in the markets over the long term.


    # CHAPTER


    # Derek Schimming


    Through the different stages of his career, which spans 25 years, **Derek Schimming**
    once managed over $275 million in client assets, studied under legendary trader
    Harvey Houtkin, and developed groundbreaking pure price-charting tools for the
    currency markets. His trading methods are applicable to all markets, and despite
    his vast experience and resources, Schimming quickly discounts the idea of an
    elusive “Holy Grail” of trading, instead favoring discipline and proper trade
    management as cornerstones of a successful trading strategy. His philosophy shows
    that breaking away from the confines of multiple lagging indicators, staying nimble
    in fast-moving markets, and above all booking hard-earned profits and limiting
    losses can pave the way for a highly successful and long-lasting trading career.


    **Tim Bourquin:** Derek, let’s start by talking about the type of trader you are—day
    trader or swing trader, and the markets you trade.


    **Derek Schimming:** Well, by design and by desire, I definitely would consider
    myself more of a swing or position trader. However, recent market conditions have
    not been conducive to holding longer-term positions, in my opinion, so as a result,
    I trade like a chameleon, changing myself and my behavior to fit what the market
    environment allows me to do.


    I think a trader’s style is defined by how they manage their trades. A great entry
    is just that, a great entry, but how I manage that trade and where I ultimately
    exit is what will really dictate my style.


    I might come into a trade with one intention and end up with another one entirely
    based on what the markets dictate. Simply adjusting your stop and saying that
    you’re a swing trader or saying that you’re a day trader does not necessarily
    make you either one. That stop adjustment has nothing to do with your overall
    strategy. It only has to do with how much you’re willing to lose if the trade
    doesn’t go in your favor.


    I don’t really like to typecast myself into any one box, because although I do
    come from a fundamental background, given the more recent market conditions, I
    now find myself trading technically and with a fairly short-term time frame.


    **Bourquin:** And are you specifically trading spot Forex or futures?


    **Schimming:** I trade spot Forex because I believe that market has by far the
    most attractive opportunities for currency traders. But if there were charts for
    old tires and I could just see the prices moving, I could trade tires. Ultimately,
    I think anything is tradable.


    **Bourquin:** I want to ask you about the type of technical analysis you do. What
    would be a go-to chart for you, in terms of time frame, and what indicators do
    you put on it?


    **Schimming:** Every chart I look at is a pure price-analysis view. I don’t look
    at time-based instruments, only at the price movement. I’m going to look at things
    based on a trading range and not necessarily just look at a one-hour chart and
    then make my entry on a fifteen-minute chart. My analysis technique has nothing
    to do with that, and that makes me different from the majority of other traders
    in the marketplace.'
