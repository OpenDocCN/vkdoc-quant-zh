    and range sizes, so from day to day, a range might be $5,000 in one market and
    $500 in another. Logically, it’s best to normalize all of the market ticks and
    ranges using a fixed-fractional type of money management sizing algorithm or method.


    **Bourquin:** So you use just a fraction of a portion of the funds that are in
    your overall account?


    **German:** Yes, exactly. You take a fraction of your equity and determine how
    far away your stop will be in dollar terms and how many contracts you can put
