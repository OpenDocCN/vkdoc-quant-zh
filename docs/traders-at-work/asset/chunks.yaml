    \n*For Courtney. You’re my dream baby.*  \n—Tim Bourquin\n\nFor Mom and Dad. You\
    \ always believed, even if I didn’t. Love always.  \n*—Nicholas Mango*\n\n## Contents\n\
    \n- Foreword\n- About the Authors\n- Acknowledgments\n- Chapter 1: Todd Gordon\n\
    - Chapter 2: Linda Raschke\n- Chapter 3: Serge Berger\n- Chapter 4: Alex Foster\n\
    - Chapter 5: Derek Schimming\n- Chapter 6: Peter Brandt\n- Chapter 7: Rob Wilson\n\
    - Chapter 8: John Carter\n- Chapter 9: Anne-Marie Baiynd\n- Chapter 10: Jeff White\n\
    - Chapter 11: Patrick Hemminger\n- Chapter 12: Don Miller\n- Chapter 13: Charles\
    \ German\n- Chapter 14: Dr. Andrew Menaker\n- Chapter 15: Brian Lund\n- Chapter\
    \ 16: Michael Toma\n- Chapter 17: Twenty Habits of Wealthy Traders\n- Index\n\n\
    ## Foreword\n\nThey were heady days, the late 1990s; the bull market was roaring,\
    \ and everyone wanted to quit their day jobs to become day traders. Anyone could\
    \ do it, and it seemed the easy way to riches. Why work when you can trade? Little\
    \ did they realize, however, that trading was a business—and a tough business\
    \ at that. Tim Bourquin knew the realities of trading and wanted to help, so he\
    \ and his partner, Jim Sugarman, founded the Online Trading Expo (now Traders\
    \ Expo). The Expo is a place where traders can come together, exchange ideas,\
    \ meet vendors and suppliers, uncover new tools and techniques, and learn and\
    \ improve their craft.\n\nIt has been a long time since those days of bull market\
    \ glory. The S&P 500 has barely changed from its peak value in 1998, even though\
    \ 14 years have passed. The entire idea of buy and hold has been discredited,\
    \ leaving a generation of investors looking for the 10 percent annual gains they\
    \ were supposedly “entitled” to bitterly disappointed. For more than a decade,\
    \ it has been crystal clear that trading is not an impossibility or a luxury;\
    \ it is a necessity if you want to make money in the financial markets. The whole\
    \ buy-and-hold concept was a joke to begin with. There simply is no free lunch.\
    \ Investing and trading are work—hard work that pays well.\n\nTim and co-author\
    \ Nick have access to a lot of traders, including some of the very best, and this\
    \ book contains the collected experience of a group of traders they both have\
    \ come to know over the years. There are a lot of ideas here for the curious mind\
    \ to explore, and a resource like this book can prove to be invaluable if you\
    \ discover but a single idea that helps improve your process. Some of the ideas\
    \ presented may seem contradictory, which is as it should be, for there is no\
    \ single way to trade. The process is different for each trader, and each trader\
    \ must find his or her own way."
