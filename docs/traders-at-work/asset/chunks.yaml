    Others, primarily the interviewees in this book, felt that there are truly no
    secrets that can’t be learned by others. The most liquid markets, now global and
    bigger than ever, are too large for any one group of traders to affect in any
    meaningful way. Otherwise, eventually every trader would gravitate to the same
    moving averages, perhaps the 50- and 200-day moving averages, which would work
    as perfect support and resistance levels and enable them to make easy money trading
    off of those levels every time. We all know that is not the case.


    Some of the traders I spoke with hold positions for a matter of minutes, making
    hundreds, even thousands of trades in a single day. Others hunt for one or two
    “big game” trades each month; trades that they are willing to hold for several
    weeks or even months until an ideal profit opportunity arises. All of them, without
    exception, have mastered the art of risk management, never allowing their losses
    to extend beyond predetermined levels. They weren’t always that disciplined. Some
    told me stories of blown-up accounts, where they lost every penny before finally
    figuring out that discipline was the key to staying in the game.


    Through those hundreds of interviews, some over the phone and some in person,
    I’ve chosen the top sixteen, resulting in the book you have been reading. Getting
    traders to open up about their strategies, backgrounds, struggles, and ultimate
    successes isn’t easy. Traders are a curious bunch; sometimes they secretively
    guard their methods, and at other times they are open and transparent, understanding
    that there really are no secrets for making money as an independent trader. Hard
    work and discipline are the real keys to success as a short-term trader.


    I also began noticing a pattern. After listening to them talk about how they make
    their living in the markets, I started hearing them say similar things about how
    they approach every trade. When traders who all make over $200,000 per year say
    the same things, I listen closely. As a trader myself, I too am looking for a
    nugget of wisdom that can help me make better decisions and, ultimately, more
    money.


    I compiled a list of twenty habits that are common among almost every wealthy
    trader with whom I have spoken. Some will be familiar to you, others may be surprising.
    Either way, I hope you’ll find at least one or two habits you can add to your
    own trading plan to make more money, more consistently, in whatever markets you
    trade.


    Let’s begin!


    ## 1. Wealthy traders are patient with winning trades and enormously impatient
    with losing trades


    This first habit is straight out of Dennis Gartman’s (`TheGartmanLetter.com`)
    trading playbook. Most traders become very anxious with winning trades because
    they don’t want them to become losing trades. That’s a good thing—until their
    impatience forces them to exit their winning position too early and leave money
    in the market. On the other hand, how many times have you said to yourself, “I’m
    going to let this losing trade go just a little bit longer and see if it turns
    around.”? You’ve just been patient with a losing trade and impatient with your
    winner.


    Wealthy traders flip this thought process around and do exactly the opposite.
    When they have a trade that is going well and is profitable, they remain patient
    and see how far it can really go. When they have a trade going against them, they
    immediately exit to limit the loss and begin looking for the next opportunity.
    If you’ve set a stop loss, never move it in hopes that your trade will turn around;
    it rarely will, and you will only increase your losses for the day. Start being
    patient with your winners and impatient with your losers. Doing so is the first
    step toward joining the minority ranks of wealthy traders.


    ## 2. Wealthy traders realize that making money is more important than being right


    It is human nature to want to be correct in our assumptions and predictions about
    the market. We all want to believe we are interpreting market data properly and
    have made the right choice to go long or short the market. But wealthy traders
    rarely have a bias about the market prior to its open or entering a trade. Furthermore,
    in those cases when they do make the wrong trading decision and their trade becomes
    a loss, they will have no problem immediately making a trade in the other direction.


    I have interviewed successful traders who form a bias in the morning and will
    only trade in the direction of that bias for the entire day, but they are rare.
    Instead of trying to force their opinion on the markets, determined to prove themselves
    correct, most wealthy traders will switch sides at a moment’s notice if the market
    tells them it is time to do so—even if they were “sure” the market was going to
    go the other way that day. Being right is not important—growing their trading
    account and net worth is.


    ## 3. Wealthy traders view technical analysis as a picture of where traders are
    lining up to buy and sell


    Many traders view moving averages, Fibonacci, and trend lines as exact indicators
    of where price is expected to turn and move in the opposite direction, but successful
    traders don’t view technical analysis that way. Wealthy traders see charts as
    snapshots of where traders are lining up to buy or sell. Instead of seeing bars,
    lines, and clouds, wealthy traders see price points where traders have placed
    orders to enter and exit the market either as stop losses or entry points. The
    stock, option, or futures contract has no idea where it will find support or resistance.
    As experienced traders know, it is the market participants who determine these
    levels, and so successful traders will place their own orders around those levels
    to take advantage of the 95 percent of traders who lose money trading.


    ## 4. Before they enter every trade, wealthy traders know where they will exit
    for either a profit or loss


    We’ve all heard that we should be using stops whenever we’re trading to avoid
    large losses. However, very few traders actually know where they will place a
    stop and a profit target before they enter their trades. Wealthy traders leave
    nothing to chance and plan every trade in its entirety before they even enter
    the market.


    Your written trading plan should include objective measures of where your stop
    loss should be placed as well as where you’ll take profits. Not knowing, or simply
    guessing at, where these price points will be after you have entered a trade can
    lead to indecision or price targets outside of the average range of the security
    you are trading. Why set an arbitrary profit target of three points when the average
    range of that market is only two points?


    Furthermore, wealthy traders set position sizes and stop losses that are almost
    always a function of their risk tolerance for any given trade. For example, if
    the maximum risk on any one trade is 2 percent of their trading account, they
    will calculate both the number of shares they will trade (based on the price of
    shares) and a reasonable stop loss before they place the trade. I rarely talk
    with a wealthy trader who says their position size is 1,000 shares. They usually
    tell me it depends entirely on what security they are trading. They take their
    maximum acceptable loss and work backward to find a stop loss and position size
    that matches that objective measure.


    ## 5. Wealthy traders approach trade number five with the same conviction as the
    previous four losing trades'
