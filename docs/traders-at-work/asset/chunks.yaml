- fmt: '**German:** 我一直在尝试一些扩展算法，它们似乎测试得相当不错。但总的来说，我只是基于“一进一出”的原则进行操作。


    **Bourquin:** 听起来你的交易非常数据驱动。你之前的职业生涯也是在数据驱动的行业吗？


    **German:** 没有之前的职业生涯。我在大学暑假期间搬到了芝加哥，19岁时开始在芝加哥期货交易所的交易大厅工作。从那时起，我立刻跳入了技术分析领域，开始通过电话交易各种不同的期货市场，使用的是日线图和技术分析。我交易了大约二十年，经历了不同程度的成功，直到2005年，我才真正掌握了趋势跟踪。


    **Bourquin:** 在这个领域你有导师吗？还是通过读书学习的？你是如何开始接触趋势跟踪的？


    **German:** 我没有导师。我在交易大厅工作，那里的交易员大体上都是黄牛党。他们基本上是在逐点交易，试图获得优势。我接触到的没有人真正做计算机交易或长期交易。我是通过独立学习了解到趋势跟踪的——本质上是在二十年里阅读了所有我能找到的关于交易的书籍。也许我运气好，专注于趋势跟踪，而它一直行之有效。


    **Bourquin:** 让我们谈谈风险管理，特别是关于你的交易规模。作为测试的一部分，你通常会使用什么典型规模？


    **German:** 不。当你交易多个不同的市场时，你不能说你要在所有市场上使用相同的规模，因为债券的一个最小变动单位是31.25美元，而玉米的一个最小变动单位是12.50美元。市场有不同的最小变动单位和波动范围大小，所以每天的波动范围在一个市场可能是5000美元，而在另一个市场可能是500美元。逻辑上，最好使用固定分数类型的资金管理规模算法或方法来标准化所有市场的最小变动单位和波动范围。


    **Bourquin:** 所以你只使用你整体账户中资金的一部分？


    **German:** 是的，完全正确。你取你权益资金的一部分，确定你的止损在美元金额上有多远，以及在保持整体风险水平的情况下，你可以买入多少合约。所以，如果你的风险水平是1000美元，而止损在100美元之外，你可以买入十份合约。


    **Bourquin:** 这个计算是由你的交易平台完成的，还是你自己心算的？


    **German:** 所有事情都由系统计算。这个系统实际上已经高度系统化，你完全可以打开它，然后走开，让它自己运行，它就会自动完成工作。它根本不需要任何决策。


    **Bourquin:** 这对我来说听起来很有吸引力。我必须远离我的交易，因为当我坐在电脑前看着它们时，我表现得很差。你也是这样的吗？


    **German:** 不，因为我没有决策需要做。我可以坐在那里看着数字跳动，但如果我忠于我的系统并且知道自己不会去干预它，那我就无事可做。行情可能上涨或下跌，但这都无关紧要，除非系统发出买入或卖出的信号。


    **Bourquin:** 跟我聊聊你刚开始交易的时候。我知道交易所大厅和屏幕交易有些不同。2005年，当你开始全职进行屏幕交易时，你损失了很多钱吗？还是马上就赚了很多钱？那是一种什么样的经历？


    **German:** 那是一次关于回测的昂贵教训。我曾经110%地拥护趋势跟踪。市场波动很大，我把相当大的一笔钱投入了我的交易账户，我有一套规则系统，但这些规则从未经过测试。那是一套非常合乎逻辑的趋势跟踪规则，但当我开始交易时，情况并不顺利，我遵循这些规则损失了一大笔本金。我对趋势跟踪理论深信不疑，以至于我甚至没有对我的系统进行回测。就在那时，我决定，除非我进行了严格的测试并认定其可行，否则任何东西都不进行交易。


    那是我众多昂贵教训之一。你可以看着图表挑出一些可能有效的交易，但对于我每有的一百个想法，其中能有一个奏效就算幸运了。这就是为什么我又回到了我最初的说法：你必须测试、测试、再测试。如果你不测试，你怎么知道你的系统有效？你又怎么能放心地在里面投入真金白银呢？


    **Bourquin:** 在你那次亏损的经历中，我认为那正是人们要么成长为系统驱动和严格规则驱动的交易者，要么成为自由裁量交易者的时刻。有些人会说，“我是一个自由裁量交易者，它对我一直有效”，但数据派的人会说，“我不知道怎么会有人采用自由裁量交易，因为到头来，自由裁量交易者最终都会亏损。”
    你对此有何看法？使用数据真的是在这个行业取得长期成功的唯一途径吗？


    **German:** 我不知道。你看看那些长期使用趋势跟踪策略的管理期货大佬，他们中的许多人，在二十五或三十年的复利计算下，每年都能获得可观的两位数回报。


    另一方面，我还没有看到任何证据表明，一个共同基金经理能够在二十五年里实现15%或20%的复合年化实际回报。如果你知道有这样的例子，也许你可以告诉我。但很难否认一些管理期货大佬的长期业绩表现。


    **Bourquin:** 在某个时间点，你开始管理资金了，对吗？


    **German:** 是的。我开始管理一些资金，有了一些投资者，建立了我的网站，完成了我的文件，并开始吸收一些投资者的资金。但老实说，如今资金管理者面临所有新的监管和审查，我不确定我是否想继续走这条路。为别人管理资金很难。我想我更愿意按照自己的方式交易，并将我的一些研究成果分享给其他对交易感兴趣的人。


    **Bourquin:** 随着曼氏金融、Peregrine Financial Group[PFG]的丑闻以及其他事件之后出台的监管规定，我确信资金管理将变得非常繁重。如果你没有专人全职处理合规问题，我能理解作为一名资金管理者工作会变得多么困难。


    **German:** 是的，而且我不打算那样做。我不想拥有庞大的员工队伍，也不想处理那些繁文缛节。这甚至是我当初选择趋势跟踪的原因之一。一旦你建立了自己的系统并且相信它，你就可以设置好它并让它运行。这给了你时间去做其他事情。


    **Bourquin:** 让我再多问一些关于你交易中严格的基于规则方面。这些规则是你编程到你的电脑系统里的吗？电脑会寻找特定的机会，并在机会出现时向你触发信号吗？


    **German:** 是的。就像我之前说的，我可以打开系统，然后走开，几个星期都不再看它，它会自动计算我的入场点和出场点在哪里。它会自动计算一切。


    **Bourquin:** 你不是下了单就走开？系统可以为你买入和卖出、开仓和平仓，完成所有这些操作？'
