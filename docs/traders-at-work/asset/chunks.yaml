- fmt: '**Bourquin:** So, you find areas where a futures contract in relationship
    to another expiring contract is over- or undervalued, and then you trade those
    two against each other until they come back into balance. Is that about right?


    **Hemminger:** Yes, exactly. We are just looking to identify contracts that are
    offering an undervalued or overvalued proposition in relation to another contract.
    Then I try to zero in on the time. So, instead of just looking at risk-to-reward
    metrics, I’ve added a time function that gives me an added dimension to my trades.
    It allows me to really dial in, manage down my trades, and mitigate risk to a
    larger degree.


    **Bourquin:** Your soybean trade sounds like it is a longer-term trade that you
    can hold for several months. Do these kinds of relationships or ratios happen
    intraday as much as they do over the course of months?


    **Hemminger:** Yes. The bean spread is a fast mover. It’s a volatile spread, and
    when you’re looking at a forty-one-cent average winner, you have to be willing
    to take a certain amount of risk for that type of higher-reward trade.


    A slower spread trade that I recently wrote about is the July 2013 versus the
    September 2013 spread in wheat. I’m short July and long September. In this trade,
    I’m looking at an average winner of ten cents and an average loser of three cents.
    This trade has a sterling track record in recent years as well.


    In relation to the bean spread, this trade has much lower risk, but as a result,
    the rewards it offers are going to be capped as well. So, these two spreads definitely
    have different personalities. For instance, as the bean spread moves, you can
    see algorithms come in and bid the spread up, giving you an opportunity to scalp
    around your core position. In fact, a basic tenet of my trading strategy is to
    find core positions in agricultural spreads that I want to be in for one to two
    months and then trade around that bias in the direction of the historical pattern
    that I’ve identified.


    **Bourquin:** How many trades or positions do you have on at any given time?


    **Hemminger:** I would say that at any given time I have, on average, five to
    six different agricultural spreads on.


    **Bourquin:** Do you set stop losses and profit targets when you enter these trades?


    **Hemminger:** Yes. By utilizing the software program I mentioned earlier, I can
    get a real quick glimpse into how a certain spread has performed historically
    during a specific time slot each year. As I said earlier, this program provides
    an average loss and an average win, and I combine that information with technical
    indications of momentum, support and resistance, trend lines, and many of the
    other tools that I’ve acquired in the past ten years that I’ve been trading.


    **Bourquin:** Talk about those indicators you are using. What indicators do you
    like to put on a chart in addition to seeing the ratios that your software program
    provides you?


    **Hemminger:** I’ve never been a fan of oscillators. My whole life has been focused
    on keeping things simple and smart. I look at Bollinger bands not from a reversion
    perspective but from a momentum perspective. A group of guys that I traded with
    for three years taught me this way of reading Bollinger bands, and it’s been a
    great addition to some of the other basic technicals that I watch, including trend
    lines, time cycles, and support and resistance.


    I really try to keep things as simple as possible and avoid “quanting things out”
    in a complex way. It makes managing trades much easier.


    **Bourquin:** Did you try a bunch of different things before you came across spread
    trading as something that finally worked for you consistently?


    **Hemminger:** Yes, very much so. My first job was actually trading NASDAQ stocks
    in 2001. I had no idea what I was doing. Growing up, I couldn’t tell you what
    a quote was. I had no idea, but trading really melded with my personality as a
    highly competitive athlete. It gave me a competitive outlet and a “hard way,”
    as one of my friends says, to make an easy living.


    When I first got into trading, I was very much engaged in quick scalp trades.
    I didn’t do poorly, but I didn’t do well. When I found pairs trading in equities,
    however, that was an eye-opening event for me. It gave me the opportunity to be
    a little more patient with my trades, because I was focused on relative value,
    not on whether KLA-Tencor (KLAC) stock was going to go up today or Novellus Systems
    stock was going to go down. Instead, I could trade the relative value in between
    the KLAC–Novellus pair. Those early days of equity statistical arbitrage pairs
    trading has really defined my career up to this point.


    **Bourquin:** What made agricultural pairs trading more attractive to you than
    just straight equity pairs trading?


    **Hemminger:** I enjoy the research process and looking through data, which are
    skills that I have continued to build upon as my career in the financial markets
    has developed and I have gained more confidence. I would say that process really
    started in 2006. As my confidence in relationship-driven trading started to build,
    I began to achieve consistent trading results.


    I was trading along the crude curve, the Brent curve, and Brent oil. I was also
    trading heating oil versus ICE gasoil futures. All of these different relationships
    I was looking at were providing me with multiple trading opportunities. Some of
    the opportunities were based purely on statistical measure, some were based on
    technical measures, and some were based on pattern recognition measures. Regardless,
    each step along the way has equipped me in a different way, and all of those tools
    are what I’m now using to define my trading in the present and going forward.


    **Bourquin:** If somebody wanted to get started in agricultural pairs trading,
    like you’re doing, where is a good place for them to start? What should they be
    watching and monitoring?


    **Hemminger:** The Chicago Mercantile Exchange (CME) obviously is great. That’s
    the number one venue for trading agricultural spreads. For someone who is just
    getting interested or wants to scratch the surface of agriculturals, there is
    a lot of information and educational opportunities on the CME’s web site.


    **Bourquin:** I didn’t ask you what your typical size is when you’re doing these
    spread trades. What do you use to determine how much size you’ll put on?


    **Hemminger:** The number one factor that I use to determine position sizing is
    how much each tick is worth. You want to be very aware of what the margin is for
    the product in question. I go back to a simple average true range (ATR) and look
    back over the last twenty trading days to get an idea of the volatility of the
    spread. Then I bring that margin back to my account size in relation to volatility
    and scale into trades. I use a unit size that is related to volatility, margin,
    and the contract size.


    **Bourquin:** Based on the ATR and other factors, you determine how much size
    you’re going to take, and then scale in if it starts to work for you?


    **Hemminger:** Yes, exactly—and these spreads offer a ton of liquidity. There
    is no lack of liquidity in most of these spreads, so traders should also pay attention
    to liquidity when attempting to trade agricultural spreads.


    **Bourquin:** What if an economic announcement is released while you’re in a longer-term
    trade? Do you leave the trade on? Do you monitor it closely? What do you do?


    **Hemminger:** Obviously, you’re going to monitor your trades during those releases.
    For instance, there is an economic release called WASDE—World Agricultural Supply
    and Demand Expectations—that’s put out by the USDA.'
