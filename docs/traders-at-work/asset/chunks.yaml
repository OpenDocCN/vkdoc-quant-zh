- fmt: '我的目标是在权益曲线上实现非常平稳、向上的斜线走势，这确实能减轻压力，因为如果我能每天只赚0.3%——当然前提是每天都能做到——那么一年下来，权益就能增长100%。


    相比之下，大型金融机构将30%的年化回报率视为所谓的“黄金标准”，如果我能超越这个标准，我会非常满意。


    我主要是在努力让自己的交易操作，既能对我本人起到纪律约束作用，又能让那些可能想要我替他们管理资金的人，觉得我看起来相对有吸引力且行事专业。


    **Bourquin：** 那么，你现在也在为其他人管理资金吗？


    **Wilson：** 是的，我在做。我在美国国家期货协会（NFA）注册，是一名注册商品交易顾问（CTA）。


    **Bourquin：** 你会从这些管理账户中提取资金来支付给自己吗？或者，因为你有一份职业，你是选择将利润再投资，让它持续增长，从而不断扩充你的账户吗？


    **Wilson：** 所有的管理费都在每个月末提取出来，我只是让这些钱在账户之外累积。这感觉挺专业的，就像在给自己发薪水，而且我不会把这些钱再投入交易账户。这只是一笔额外的收入。


    **Bourquin：** 许多交易者都渴望管理资金，并赚取类似的管理费来补充现有收入。对于那些正在考虑这件事的交易者，你有什么建议吗？在这个过程中，你有没有学到什么特别宝贵的经验？


    **Wilson：** 需要牢记的最重要一点是，没有人会把辛苦赚来的资本托付给你，然后指望你在一年内让它翻倍。他们承受不起的是你把它亏掉。


    因此，我的建议是专注于你的权益曲线。尽可能降低波动性，如果这意味着要缩小交易规模，那你就应该这么做。


    例如，我的一个学生，当时在交易一个1万美元的账户，他不明白为什么自己的账户波动这么大。每周都有40%或50%的波动幅度，虽然他对此感到不舒服，但他也渐渐学着去接受了。我向他指出，当他处理的金额是他能够理解并且实际能接触到的时候，这倒没什么问题；但如果一个拥有100万美元的人请他管理那笔钱，突然间，他将要交易的金额是他以前从未设想过的，而这些剧烈的波动对他来说以及对他的客户来说，就完全无法接受了。


    没有哪个认真的投资者指望你能在一夜之间让他们变成百万富翁。没有其他人能做到，凭什么你就能呢？然而，他们无法承受的是资金回撤。所以，我给那些想成为资金管理者的人的建议是，仔细审视波动性，并把它处理好，这样你的权益曲线就能朝着正确的方向，以平稳、审慎的节奏运行。


    **Bourquin：** 即使对那些不管理客户资金的人来说，这也是一个好建议。问问自己：“我用别人的钱来承担同样的风险，我会感到舒服吗？”这可以作为衡量你自己承担了多少风险的一个好标准。如果你的答案是“不会”，那么这就是你需要立刻解决的问题。


    **Wilson：** 绝对同意。外汇教育市场在这方面也难辞其咎，因为它试图让人们相信他们真的可以快速致富。这既荒谬又极其不诚实，因为它掩盖了一个事实：外汇交易者正在一场零和博弈中与一些非常聪明的头脑对抗。


    为什么任何一个坐在家里电脑前的人，就应该能够挑战华尔街那些最聪明、拥有所有可用资源的交易员，并指望能持续胜出？这是完全不现实的，但这就是人们被告知的情况，这就是为什么你会看到人们拿自己的本金去冒一些荒谬的风险。


    如果你真的希望把交易当成你的事业，那么你就应该像对待事业一样对待它，例如，向自己证明，你可以尊重账户里的1000美元，并限制波动性的不利影响。没有人会对时不时出现的向上尖峰感兴趣，如果那个尖峰伴随着同样陡峭的向下尖峰的话。那是不专业的，而且在某个阶段，你肯定会把那个账户亏光。也许不是这周或这个月，但它迟早会发生，因为你无法控制波动性。


    然而，如果你能尊重1000美元，并在两年内把它增长到2000美元，那么，突然间，你就真的在创造一条稳定的权益曲线了。这样一来，你就有能力吸引那些拥有资金可以投资的人，并向他们证明，你尊重风险，并准备好以专业的方式开展业务。


    **Bourquin：** 说得很好。然而，当很多人想到要在两年内把1000美元变成2000美元时，这感觉可能太慢了，令人痛苦。


    **Wilson：** 嗯，听我说，两年内把1000美元变成2000美元，年化回报率仍然是50%，而且当你复利计算时，你远远超过了机构市场的黄金标准。


    **Bourquin：** 没错，毫无疑问。这也引出了关于保证金的概念。那么，你在交易时使用保证金吗？


    **Wilson：** 我使用一点点保证金，我的交易对手方就在交易的另一边。但我发现，任何人抱怨“只有”50:1的最大杠杆都很可笑，因为在50:1的杠杆下，你很快就能把自己搞垮。


    **Bourquin：** 即使在4:1的杠杆下也能搞垮自己。当NFA将美国的最高杠杆降至50:1时，有很多怨言，但真正了解使用杠杆风险的交易者并没有抱怨。


    **Wilson：** 完全正确。我每笔交易的最大风险大约是1%，但那会是第三或第四层加仓。我的初始风险是0.2%，并且在整个交易时段内可能都不会改变。


    **Bourquin：** 我想问你一个关于新闻和数据发布的问题，无论是美国非农就业报告（NFP），还是美联储或欧洲央行（ECB）的利率决议。你会关注新闻吗？它如何影响你的交易？


    **Wilson：** 我关注这些公告发布的时间，因为我知道这可能会激发市场波动。我不在乎最终的数据是什么，我当然不会在数据发布前进行交易。我只会在市场对数据做出反应后才交易。


    **Bourquin：** 那么，当你已知某个经济公告即将发布时，你是会持有一个仓位，还是选择平仓？


    **Wilson：** 在这些时候，我倾向于空仓。不过，我和Rob最近一起交易了一次NFP报告，我在新闻发布大约20分钟后，因为市场流动性薄且我们处在一个阻力位，所以下了一笔逆势单。一旦点差回落，那时就可以交易了，但我当然不会试图去交易新闻本身。


    **Bourquin：** 所以，即使你在62周期EMA上看到了一个很好的入场形态，但如果你知道一个能影响市场的经济公告将在几分钟后发布，你很可能会避开那次交易，等到看后续情况再说？


    **Wilson：** 是的，我在主要经济数据发布时会极度防守，因为我们都知道，新闻可以——而且经常——完全改变市场中占主导地位的情绪。


    **Bourquin：** 最后，Rob，对于正在苦苦挣扎、无法持续稳定盈利的交易者，你有什么建议？'
  raw: 'My aim is to generate a very steady, upwardly sloping equity curve, and that
    really can take the pressure off, because if I can generate just 0.3 percent a
    day—if it were possible to do that every day, that is—that would equate to 100
    percent equity growth over a full year.


    For comparison, the big financial institutions regard 30 percent annual returns
    as their “gold standard,” so to speak, and if I can beat that, I’m more than happy.


    I’m mainly trying to align my trading operation in a way that enforces discipline
    for me and also looks relatively attractive and businesslike from the perspective
    of someone who may want me to manage their capital for them.


    **Bourquin:** And are you managing other people’s money right now as well?


    **Wilson:** Yes, I am. I’m registered with the National Futures Association [NFA],
    and I’m a registered commodity trading advisor [CTA].


    **Bourquin:** Do you take money out of those managed accounts to pay yourself,
    or, because you have a career, do you reinvest and let your profits run and continually
    build your account?


    **Wilson:** All the management fees come out at the end of every month, and I
    just let those accumulate outside the account. It feels professional, like I’m
    paying myself, and I don’t reinvest that money in the trading account. That’s
    just a little additional income.


    **Bourquin:** A lot of traders aspire to manage money and earn similar management
    fees to round out their existing income. Do you have any recommendations for traders
    who are thinking about that, and are there any especially valuable lessons you
    have learned along the way?


    **Wilson:** The most important thing to bear in mind is that nobody who is going
    to trust you with their hard-earned capital is interested in you doubling it in
    a year. What they can’t afford is for you to lose it.


    As a result, my advice would be to focus on your equity curve. Get the volatility
    down as much as possible, and if that means trading a smaller size, then that’s
    what you should do.


    For example, one of my students, who was trading a $10,000 account, couldn’t understand
    why his account was so volatile. There were 40 percent or 50 percent swings on
    a weekly basis, and though he was not comfortable with that, he sort of learned
    to accept it. The point I made to him was that it was all very well while he was
    dealing with an amount of money that he could understand and physically touch,
    but if someone with a million dollars asked him to manage that money, all of a
    sudden, he would be trading a sum of money that he never could have conceived
    before, and those volatile swings would then be completely unacceptable to him
    and his client.


    No serious investor expects you to make them into a millionaire overnight. No
    one else could do it, so why should you? What they cannot cope with, however,
    are drawdowns. So, my advice to would-be money managers is to look carefully at
    volatility and sort it out so that their equity curve is going in the right direction
    and doing so at a steady, measured pace.


    **Bourquin:** That’s good advice even for those who aren’t managing client money.
    Asking yourself, “Would I be comfortable taking the same risk with someone else’s
    money?” can be a good measure of how much risk you are taking, and if you answer
    “No,” then that’s something you need to address right away.


    **Wilson:** Absolutely, and the Forex education market doesn’t help itself there,
    because it tries to convince people that they really can get rich quick. That’s
    both absurd and highly disingenuous, because it masks the fact that Forex traders
    are going up against some very sharp minds in a zero-sum game.


    Why should anyone sitting at home in front of their computer be able to take on
    the sharpest minds on Wall Street, with all the resources those traders have available
    to them, and hope to consistently come out on top? It’s entirely unrealistic,
    but that’s what people are being told, and that’s why you see people take some
    obscene risks with their own capital.


    If you genuinely hope to make this your business, then you should treat it like
    a business and prove to yourself, for example, that you can respect $1,000 in
    your trading account and limit the adverse effects of volatility. No one is interested
    in a spike up every so often if that spike is accompanied by a similarly steep
    downwards spike. That’s unprofessional, and at some stage, you’re going to wipe
    out that account. It might not happen this week or this month, but it’s going
    to happen at some point, because you can’t control the volatility.


    If you can respect $1,000 and grow it into $2,000 over two years, however, then,
    all of a sudden, you’re actually generating a steady equity curve. Now you’re
    in a position to appeal to people who have sums of money to invest and can prove
    to them that you respect risk and are prepared to conduct business in a professional
    manner.


    **Bourquin:** That’s a great point. Yet when many people think of turning $1,000
    into $2,000 over the course of two years, it can seem so agonizingly slow.


    **Wilson:** Well, listen, turning $1,000 into $2,000 in two years is still 50
    percent a year, and when you compound that, you are far outstripping the gold
    standard in the institutional market.


    **Bourquin:** Right, no question. That brings up the idea of margin as well. So,
    do you use margin when you trade?


    **Wilson:** I trade on a tiny bit of margin, and there’s a counterparty on the
    other side of my trades, but I find it laughable that anyone would complain about
    a maximum leverage of “only” 50:1, because you can kill yourself very quickly
    at 50:1 leverage.


    **Bourquin:** You can kill yourself at even 4:1 leverage. When the NFA took the
    maximum leverage in the United States down to 50:1, there was a lot of grumbling,
    but there was no grumbling from traders who really understand the dangers of using
    leverage.


    **Wilson:** Totally. My maximum risk per trade will be about 1 percent, but that
    will be a third or even a fourth leg. My initial risk is 0.2 percent, and that
    might not change throughout the course of a session.


    **Bourquin:** I want to make a point to ask you about news and data announcements,
    be it the US nonfarm payrolls [NFP] report, or interest rate decisions by the
    Federal Reserve or European Central Bank [ECB]. Do you follow news, and how does
    it impact your trading?


    **Wilson:** I’m interested in when the announcements are coming out, because I
    know that’s going to potentially fuel movement in the market. I don’t care what
    the data ultimately is, and I certainly don’t trade ahead of it. I’ll only trade
    the reaction to it.


    **Bourquin:** So, will you be in a trade when you know an economic announcement
    is coming out, or will you look to be flat?


    **Wilson:** I tend to be flat during those times. Rob and I traded a recent NFP
    report together, though, and I threw a countertrend trade out there because it
    was a thin market and we were at a resistance level about twenty minutes after
    the news release. Once the spreads have gone back down, it’s tradable at that
    point, but I certainly don’t try to trade the news itself.


    **Bourquin:** So, even if you’ve got a great setup on your sixty-two-period EMA,
    if you know a market-moving economic announcement is coming out in a few minutes,
    you’ll likely avoid that trade until you see what happens afterwards?


    **Wilson:** Yes, I’m ultra-defensive around major economic data releases because
    we all know that the news can—and often does—completely change prevailing sentiment
    in the markets.


    **Bourquin:** Finally, Rob, what advice do you have for a trader that is struggling
    to make consistent money?'
