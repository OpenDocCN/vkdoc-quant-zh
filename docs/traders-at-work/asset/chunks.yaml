  trans: '

    我持有 WASDE 报告。WASDE 数据每月公布一次，而我的大部分交易持仓时间会略长于三到四周。因此，在这些农产品数据发布时，我通常持有头寸。


    **Bourquin：** 报告的发布有没有因为市场波动太大而让你止损离场？


    **Hemminger：** 我从不愿因为情绪化的市场反应而止损，所以我会移除市场中所有的止损单。我不想因为反常的市场反应，或算法失控人为地将市场推向某个方向而被迫离场。因此，在那些波动性较高的时期，我实际上会移除止损单。过去从未因为这样做而吃过亏，因为当这些数据刚刚公布时，主要引发的是市场的人为反应。


    当然，报告的发布显然可能会影响未来的市场走势。但某种程度上，由于我采取的持仓方式，我给了自己选择权和足够的时间，可以耐心观察市场的变化以及市场如何真正消化这些新闻稿。因此，我倾向于不让这类高波动性事件把我震出交易。


    **Bourquin：** 话说回来，在某个时点移除止损单肯定还是会让人有点担心。也许部分农产品相关的消息已经被市场消化，所以如果出现干旱或收成减少导致蒲式耳产量下降，你也不会完全措手不及。但是，我仍然可以想象，你在没有止损单的情况下操作的那段时间，心情肯定还是会有点紧张。


    **Hemminger：** 是的，确实会。这就像交易非农就业数据一样。每个交易该数据的交易者，无论他们是否持有头寸，内心都会有那么一丝兴奋又焦虑的感觉，并据此做出反应。


    根据我的经验，我发现跟随其他交易者的反应而动，通常并不是一个让我免于被止损出局的好方法。过去，我通过交易经济数据发布以及围绕数据产生的价差，赚过不少钱。因此，我倾向于不因市场最初的条件反射式反应而过于慌乱或过度纠结。我会让市场重新评估它想要到达的位置，然后再做出退出或进入交易的决定。


    ## 唐·米勒


    *期货专家***唐·米勒**是一位顶级基金经理、备受推崇的导师和交易教育家，同时也是芝加哥商业交易所（CME）的会员。米勒采用技术分析方法，结合多个日内时间框架进行交易，学会了识别并买入市场中的价值洼地，他形容自己是一个“流动性提供者”。


    *米勒最初从股票交易起步，后来转向期货市场，通过不断学习和适应，在那里取得了成功。然而，尽管他具备了一位大师级交易员的稳定性和自信，但他也没能逃过 MF Global
    暴雷事件。在成为该丑闻的受害者后，他积极倡导改革，坦诚地讲述了自己的经历和对改革的呼吁，并最终追回了丢失的资金——以及他对交易的热情。如今，成千上万的人关注他的交易日志和博客（[DonMillerBlog.com](http://DonMillerBlog.com)）以及他的教育网站（[DonMillerEducation.com](http://DonMillerEducation.com)）。*


    **蒂姆·布坎：** 我们来谈谈你的交易类型，从你的时间框架——日内交易者还是波段交易者——以及你交易的品种开始吧。


    **唐·米勒：** 我的时间框架主要是日内交易。我交易 E-mini 标普期货，自 2004 年起就是芝加哥商业交易所（CME）的会员了。因此，我想我会把自己的交易风格定义为流动性提供者，在日内批发性买入，然后零售性卖出。


    我的持仓时间通常很短。我非常擅长在极短的时间周期内解读市场，而一天之中充满了批发的机会。我相信“一鸟在手胜过双鸟在林”，这些年来我基本上就是这么交易的。


    **布坎：** 我想请教你提到的几个术语。首先，你说你从事的一种交易方式是提供流动性，这是什么意思？


    **米勒：** 基本上，市场最棒的一点——尤其是 E-mini 市场，这是地球上流动性最强的工具之一——就是当有人想买入或卖出一份期货合同时，这笔交易的对手方需要有人存在，交易才能达成。能够提供流动性的人越多，能够成为交易对手方的人就越多。而交易对手方越多，市场流动性就越强，波动性也就越低。


    向市场提供流动性有稳定市场的好处，而且任何时候有人想买入或卖出，你本质上就充当了交易的对手方。


    显然，除非我们自己也有机会，否则我们不会提供流动性。我们通过利用和预测市场周期、预测那些可能向某一方向过度拉伸的市场、或者预测那些正在朝着新的最小阻力路径移动的市场来寻找机会。总的来说，我们能够以比买入价更好的价格卖出产品。这并非每次都能成功，但这是我们的意图，也是我们的目标。


    **布坎：** 向市场提供流动性与单纯进行方向性交易以获利，两者有何不同？


    **米勒：** 在很细致的层面，我认为区别在于，如果你是挂着买价或在买价下方等待，并允许别人卖给你，那么从技术上讲，你就是在提供流动性。另一方面，如果你决定无论如何都要进场，那么你就会直接以卖价买入。在后一种情况下，是别人在向你提供流动性。


    具体做哪一种，有时界限有点模糊。但总体来说，结果是市场成交量增加，市场参与度提高，从而形成一个更流畅的市场。


    但是，提供流动性包含投机成分吗？你在提供流动性的同时，能否进行方向性交易？当然可以。我最近的一次交易就是个很好的例子。我没有做太多流动性提供，除了在中午市场开始回落的时候，我挂着买价，希望如果有人需要卖出，他们可以卖给我。除了那个非常有限的窗口期，我都在进行方向性交易，进行投机，并让自己进入市场。


    **布坎：** 当你提供流动性并试图在买价买入时，是否会涉及到更短的时间框架？


    **米勒：** 嗯，这真的得看情况。持仓时间取决于当前处于哪个周期。我相信市场在各个时间框架上都是按周期运行的。


    如果时间框架恰好是一个五分钟的盘整期，而更高时间框架在顺风还是逆风方面又不确定，那么持仓时间可能会非常短。另一方面，如果你刚刚突破盘整，或者处于小时级别的清晰动量趋势中，那么持仓时间就可以更长一些。


    持仓时间的长短，实际上并不取决于你是主动进场还是被动进场（即提供流动性）。它真正取决于当时市场所处的周期。


    **布坎：** 那“批发性买入”呢？听起来很棒。我们总想得到折扣或好交易。但它在股票市场是如何运作的？你是如何在买价买入，然后以卖价卖出的？

    '
- fmt: '# 对话：Miller 与 Bourquin


    **Miller:** 当我说“批发”时，这不一定意味着你总是在买入价（`bid`）上购买。如果你仅仅在买入价上买入或卖出价（`ask`）上卖出，那么本质上你总是在与市场的即时方向对着干。如果这就是你做的全部，那很可能会是一条通往“穷农场”的捷径。


    想象一下，如果你进行的每一笔交易，基本上都是在别人卖出时买入，或者在别人买入时卖出。这根本行不通。但通过将这种情况与在必要时机进入市场相结合，机会就在其中。


    所以，当我们谈论“批发”时，我再强调一次，我并不是说你一直守在买入价上，这是你入场的唯一方式。如果市场处于非常明显的上升趋势，或者突破了盘整区间，最小阻力路径已明确转向上涨，而你想进入市场，你会希望能在其突破后回调时入场——但市场可能根本不会回调。


    当我使用“批发”这个词时，我更多的是把它当作一个参考点。我认为的“批发”是与市场未来的位置相比较而言——这可能是五分钟、十分钟或一小时之后。批发意味着以有吸引力、合理且比未来更便宜的价格获得一件产品——无论是`E-mini`指数期货、股票、`Tiddlywinks`游戏棋还是杂货店的香蕉。


    **Bourquin:** 那么，我们是在谈论你认为在短期内被低估的东西吗？这就是我们真正在说的吗？


    **Miller:** 嗯，我主要依据技术分析进行交易。当我说“技术分析”时，我指的是使用一组能准确描述市场流动的指标组合。我的交易基于这些指标，它们帮助构建了当前市场流动和预期的未来方向。基于这些信息，市场将走向何方通常是相当清晰的。


    在使用“价值”这个词时，我想非常谨慎。当我们谈论这个市场上的价值时，价值本质上是由人类情绪创造的。市场上有无数交易者，他们处于不同的时间框架，经验水平各异，根据他们的行为，他们会把市场推向一个走势不可持续的位置。


    假设你有一个疯狂上涨或下跌的失控市场。这种市场长期来看是不可持续的，当你能识别出市场中那些走势不可持续的点时，那么，借助技术分析的框架，你就能够成为一个批发商。


    **Bourquin:** 那么技术分析会告诉你某件事是否不可持续，并准备反转方向或突破原有的某个区间吗？


    **Miller:** 它有助于构建人类情绪。去年我做现场培训时，我正在和某人讨论如何教别人做这件事。他说：“停一下。你刚才说了一句我从没听别人说过的话。你在试图教授市场感觉。”我说：“没错。”他说：“这太疯狂了！感觉是教不会的。”我说：“恕我不能苟同。市场和它提供的机会都是基于感觉的。”


    现在，当我说“感觉”时，我并不是指你醒来后只是“感觉”某样东西要上涨。我说的“感觉”是指你基于经验和技术分析，对市场将要做什么有一种判断。


    一旦你交易了一段时间，技术分析就更多地变成了一种确认。当你一遍又一遍地交易同一个产品时，你就像了解自己的孩子一样去了解这个产品。你会了解它们的习性、个性和节奏。这就是我坚信只交易一个市场的原因。


    当你习惯了那个“孩子”后，你会非常非常了解它。你将能够预测它的节奏。当我说“感觉”时，我指的是技术分析。这就像把一个尺子、一把标尺或某种测量工具放在你非常熟悉的节奏和模式上，并通过技术分析获得确认。


    **Bourquin:** 作为芝加哥商业交易所（`CME`）的会员，这给你的交易带来了什么优势？


    **Miller:** 降低了交易成本。对于那些在一天中进行频繁交易的人来说，我确实如此，为了激励增加市场流动性，交易所允许人们购买交易所的席位，或者像我的情况一样，以非常适度的月租费租赁一个席位。通过这样做，我们能够获得降低的佣金。这无疑有助于我们的业务，改善我们的成本结构。它也提供了更多的成交量、更多的流动性，以及对市场更多的稳定性。


    **Bourquin:** 你仍然使用普通的在线经纪商来执行你的交易吗？


    **Miller:** 当然。


    **Bourquin:** 但因为你是芝加哥商业交易所的会员，他们向你收取的费用更低吗？


    **Miller:** 是的，每个人都从中分一杯羹。芝加哥商业交易所收取他们的费用，你合作的经纪商会得到他们的部分，还有一小部分流向美国全国期货协会（`NFA`）。费用有多种组合，经纪商所得到的金额几乎总是相同的。我确信他们可能会对高交易量的交易者给予折扣，但总的来说，这些部分可能相当固定。


    芝加哥商业交易所有一个折扣费率表，该表基于你与他们的会员类型以及你的交易量。这实际上会设定你的交易价格。你与他们的交易量越大，会员等级越高，你的费用就会越低。


    例如，如果你购买了一个席位，与租赁席位的人相比，你会获得更低的费用。我租赁了一个席位，所以我的交易价格比散户投资者要好，但不如那些实际购买了席位的人。


    **Bourquin:** 但无论你为这个租赁支付多少费用，净效果还是划算的。你每个月都在省钱，因为你做了足够的交易量来弥补租赁成本，对吧？


    **Miller:** 绝对正确。实际上，我引导交易者进行一个非常简单的盈亏平衡分析，即确定你当前支付的费用，以及你一个月需要交易多少合约，才能使租赁费用基本上自我抵消。


    这些年来，租赁价格已经下降了。它们确实已经到了一个价格点，如果你在一天中还算活跃的话，租赁一个席位确实是有意义的。我认为现在的费率大约在每月400到500美元之间，你可以非常非常快地赚回这笔钱。


    **Bourquin:** 谈谈你作为一名交易员的演变过程。在你最终形成目前的方法之前，你刚开始交易时是否尝试过很多不同的东西？


    **Miller:** 我的交易随着时间的推移不断演变，从股票到交易所交易基金（`ETF`），当时我交易的是`NASDAQ`指数、`QQQ`和`SPY`。然后，在2003年，我转向了期货，对我来说，这是最纯粹的交易领域。你在积极地买入和卖出，你真正地自食其力，没有中间方，你直接与交易对手方进行接触。


    这就是我的演变过程，但这确实花了很长很长时间，而且我经历了很多次失败的起步。'
  raw: '**Miller:** When I say “wholesale,” that doesn’t necessarily mean that you
    are always buying on a bid. If you are solely buying on a bid or selling on the
    ask, then what essentially is happening is you are always trading against the
    market’s immediate direction. And if that’s all you do, that’s probably going
    to be a quick route to the poor farm.


    Imagine if every single trade you got in, you were basically buying when others
    were selling, or you were selling when others were buying. That just wouldn’t
    work. But through the mix of that, along with getting yourself in the market when
    you need to, that’s where the opportunity is.


    So, when we talk about wholesale, again, I don’t mean that you’re just sitting
    on the bid all the time, and that’s the only way you’re going to get in. What
    if the market’s in a very clear uptrend or has busted out of a consolidation range,
    the path of least resistance has clearly shifted to the upside, and you want to
    get in the market? You would love to get that market as it is coming down after
    it breaks out—but it may not come down.


    When I use the term “wholesale,” I mean it more as a reference point. I think
    of wholesale as compared to where the market is going to be in the future—and
    that may mean five minutes, ten minutes, or maybe an hour from now. Wholesale
    means getting a product—whether it’s E-minis or stocks, or Tiddlywinks or bananas
    down at the grocery store—at a price that is attractive, reasonable, and less
    expensive than it will be in the future.


    **Bourquin:** So, are we talking about something you feel is undervalued in the
    short term? Is that what we’re really talking about?


    **Miller:** Well, I trade primarily by technical analysis. When I say “technical
    analysis,” I mean using a set of indicators that in combination accurately define
    the flow of the market. And my trades are based on those indicators, which help
    frame the current flow and anticipated future direction of the market. Based on
    that information, it’s usually fairly clear as to where the market is going.


    I want to be really careful when using the term “value.” When we talk value in
    this market, the value essentially is created by human emotion. You’ve got zillions
    of traders in the marketplace in multiple time frames and of varying levels of
    experience, and based on their actions, they’re going to push the market into
    a position where moves are not sustainable.


    Let’s say you have a runaway market to the upside or downside that is just going
    bonkers. That market is not sustainable over the long term, and when you’re able
    to identify those points in the market where moves are not ­sustainable, then,
    as framed by technical analysis, you’re able to become a wholesale provider.


    **Bourquin:** And technical analysis tells you if something is not sustainable
    and is ready to reverse direction or break out of some range that it has been
    in?


    **Miller:** It helps frame the human emotion. When I was doing my live training
    last year, I was talking to somebody about how you would go about teaching someone
    to do this. He said, “Stop for a second. You just said something that I’ve never
    heard anybody else say. You’re trying to teach market feel.” And I said, “That’s
    right.” And he said, “That’s crazy! You can’t teach feel.” And I said, “I beg
    to differ. The market and the opportunities that are provided are all based on
    feel.”


    Now, when I say “feel,” I don’t mean that you’re waking up and just kind of feeling
    that something is going to go up. What I mean by “feel” is that you have a sense,
    based on experience and technical analysis, of what the market is going to do.


    Once you’ve traded for a while, technical analysis becomes more of a confirmation.
    When you trade the same product over and over and over and over again, you’re
    getting to know that product, just like you get to know your children. You get
    to know their tendencies, their personalities, and their rhythms. That’s why I’m
    a strong believer in just trading one market.


    As you get used to that child, if you will, you’re going to know it very, very
    well. You’re going to be able to anticipate its rhythms. When I say “feel,” I
    mean technical analysis. It’s like putting a scale or a ruler or some measuring
    device against a rhythm and a pattern that you’re very familiar with, and you’re
    getting confirmation of that with technical analysis.


    **Bourquin:** How does being a member of the CME give you an advantage in your
    trading?


    **Miller:** Reduced transaction costs. And for those that do engage in frequent
    transactions over the course of the day, which I certainly do, and as an incentive
    to help increase the liquidity in the markets, the exchanges allow people to either
    buy seats on the exchange or, in my case, lease a seat for a very modest monthly
    amount. In doing so, we are able to get reduced commissions. So, it certainly
    helps our business and improves our cost structure. It also provides more volume,
    more liquidity, and more stability to the markets.


    **Bourquin:** Do you still use a regular online broker to execute your trades?


    **Miller:** Absolutely.


    **Bourquin:** But because you’re a member of the CME, they charge you less?


    **Miller:** Yes, everybody gets their piece. The CME gets their fees, the broker
    that you’re dealing with is going to get their piece, and there’s a small piece
    that goes to the National Futures Association [NFA]. There are various bundles,
    and the broker is pretty much always going to get the same amount. I’m sure they
    probably get a reduced amount for high-volume traders, but by and large, those
    pieces are probably fairly constant.


    The CME has a discounted rate schedule that is based on the type of membership
    you have with them and the volume that you trade. That will actually set your
    transaction price. The more you trade with them and the stronger your membership
    with them is, the more reduced your fees will be.


    For example, if you were to purchase a seat, you’d get a more reduced fee as compared
    to even someone who leases a seat. I lease a seat, so I get a better transaction
    price than a retail investor, but my price is not as great as someone who has
    actually purchased a seat.


    **Bourquin:** But whatever you pay for that lease is net-net. You’re saving money
    each month, because you’re doing enough volume to make up for the cost of the
    lease, right?


    **Miller:** Absolutely. Actually, it’s a very simple breakeven analysis that I’m
    walking traders through, in terms of determining what you’re paying now and how
    many contracts you would need to trade over the course of the month so that the
    lease basically pays for itself.


    The price of the lease has come down over the years. They really are at a price
    point where, if you’re fairly active at all over the course of the day, it really
    makes sense to lease a seat. I think the rates right now are in the $400 to $500
    range per month, and you can make that money back very, very quickly.


    **Bourquin:** Talk about your evolution as a trader. Did you try a lot of different
    things when you first started trading before you finally arrived at your current
    method?


    **Miller:** My trading evolved over time from stocks to exchange-traded funds
    [ETFs], when I was trading the NASDAQ, the QQQ, and the SPY. Then, in 2003, I
    migrated to futures, which, to me, is the most pristine realm of ­trading. You
    are actively buying and selling, you truly fend for yourself, there is no middle
    party, and you’re directly engaging with somebody on the other side of the trade.


    That’s what my evolution was, but it really took a long, long time, and I suffered
    a lot of false starts.'
