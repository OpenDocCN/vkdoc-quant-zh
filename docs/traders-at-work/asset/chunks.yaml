    to my trading account, and I had a system and a set of rules in place, but the
    rules had not been tested. It was a very logical set of trend following rules,
    but when I started trading, things did not go very well, and I lost a good chunk
    of capital following those rules. I was so sold on the theory of trend following
    that I did not even backtest my system. That is when I decided that nothing gets
    traded unless I have performed rigorous testing and decided it is viable.


    That was one of many expensive lessons. You can look at a chart and pick out different
    trades that would work, but for every one hundred ideas I have, I am lucky if
    one of them works. That’s why I go back to my original saying: you have to test,
    test, test. If you don’t test, then how do you know your system works? How are
    you going to be able to risk any real money in it?


    **Bourquin:** In that experience, when you were losing money, I think that’s when
    people develop into either systems-driven and strict rules-driven traders or discretionary
    traders. There are some people out there who say, “I’m a discretionary trader,
