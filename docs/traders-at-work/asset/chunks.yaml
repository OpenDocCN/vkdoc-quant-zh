- fmt: '**Lund:** 我正在寻找一个波段交易设置，然后会放大到日内图表——通常是五分钟图。假设我看到一只股票有漂亮的旗形形态。我会在日线图上知道突破可能发生在哪里，但在那一周内，我会在五分钟图和可能的三十分钟图上观察它。经常发生的情况是，如果你在波段图表上有一个突破点，你看着图表就说：“哦，我要买入它。”但突破在达到日线突破点之前，可能在日内图表上已经严重延伸了。这种情况经常会导致失败，所以我希望在小时间框架图表上看到一些良好的设置动作，这些动作基本上与更大波段图表的时间框架同步。


    **Bourquin:** 如果某个标的正在接近一个重要水平区域，但当天已经上涨了很大一段距离，那么它更有可能从日线突破点反弹，而不是直接突破过去，对吗？


    **Lund:** 对。你必须记住，有各种各样的参与者都在观察不同时间框架的图表。有做波段交易的人，有做日内交易的人，有抢帽子的短线客，还有关注指标或移动平均线的基金和投资者。


    我发现，当你能找到一个突破，并且这个突破与尽可能多的不同因素保持一致时——例如，如果你发现某个标的正在触发日内突破，同时处于日线突破，并且还突破了200日移动平均线——这些可能就是你在市场能遇到的最强劲的走势之一。


    **Bourquin:** 我认为很多交易者，尤其是新手，很难把握这种平衡，因为他们希望一切都能得到确认。他们想要大量的汇合点，许多因素都指向同一方向，但我认为他们总是有这个疑问：“多少才算够？两个因素够吗？三个呢？”你自己是如何回答这个问题的？


    **Lund:** 我通常更关注更大级别的设置，也就是波段图表，但我认为你说得对。我不喜欢做赌博和交易的类比，但我是个扑克玩家。在过去五到十年里我注意到一件事——尤其是在网络扑克兴起但还没被封禁的时候——就是你会遇到很多毫无耐心的年轻人。他们基本上在不该全押的时候全押，而实际上他们本可以多等一会儿。那些持有小筹码或中等筹码的老手们只会耐心等待，让别人弃牌，然后等待更好的机会。我认为这在市场中是完全一样的道理。


    我认为很多新交易者过于沉浸在市场波动中，尤其是高频交易加剧了这种波动。他们没有耐心等待机会。我知道这个词被用滥了，但事实是，你交易中赚的大部分钱都来自于“按兵不动”。我认为一些新交易者身上恰恰缺少这种耐心。


    **Bourquin:** 这确实有道理。有很多优秀的交易者同时也是出色的扑克玩家。这其中必有联系，一项技能对另一项有益。我相信你也发现了这一点。


    **Lund:** 关于赌博和交易类比，需要特别说明的是，扑克可能比其他任何赌博活动都更需要技巧。尽管有些人不同意，但它不像玩轮盘赌或那些主要靠运气的游戏。玩扑克需要一些技巧、感觉和资金管理。赌博活动中，只有这一种确实与交易有一些有效的联系。


    **Bourquin:** 嗯，当然。最后一张赌桌上总会有不同的人，而且最终经常出现的不是同一批人。


    **Lund:** 另一个类比是，如果牌桌上有医生，他们通常打得很差，我发现这在交易中也一样。进入交易领域的医生通常也做得很差。抱歉，无意冒犯各位医生！


    有趣的是，一个领域的专长或技能不一定能迁移到另一个领域。你总会遇到一个医生坐下来打扑克，他觉得自己能玩，因为他整天救死扶伤而且受过高等教育，但通常他会输光筹码。我认为这在交易中是一样的。人们带着对自己技能和知识的先入为主的观念进入市场，但市场只会让他们谦卑。这是扑克和交易之间另一个有趣的相似之处。


    **Bourquin:** 你的策略看起来相对简单：你寻找那些从200日移动平均线反弹或创下历史新高的标的。你说起来很简单，好像我们都能做到。但如果是这样，为什么还有那么多交易者亏损？我一直觉得很神奇的是，当我听别人谈论他们的交易策略时，我觉得我自己也能做。但真正要实践的时候，人们却很难做到。这是为什么？


    **Lund:** 我认为这和人们在生活各个领域遇到困难的原因是一样的。想法一文不值。我在交易方面有很多想法。很多和我一起工作的人也有很好的想法，但能够真正执行这些想法并取得成果的人却少之又少。这是因为你需要跟进、专注和投入。


    当你坐在那里交易时，一天中会发生很多事情，很多事会分散你的注意力，不管是交易聊天室还是新闻公告。我认为很多时候人们忘记了交易是枯燥的。你坐在那里，一遍又一遍地重复过程和模式。


    让人们长时间坚持下去是很难的。这和赌博没什么不同。每个人都知道如何玩21点。你甚至可以买策略卡，上面告诉你在任何给定情况下你应该怎么做。如果你严格按照策略卡操作，长期来看你会对庄家拥有一定的优势。但谁会这么做呢？你不想死板地按照规则玩。你想找点乐子，喝点酒，和旁边的人聊聊天！但当你做所有这些事的时候，你就偏离了正轨。同样的情况在交易中也可能以多种方式发生，这很可能就是很多人长期无法盈利的原因。


    **Bourquin:** 有没有最近的一两笔交易可以谈谈，来说明你是如何交易的？


    **Lund:** 这是我最近做的一笔关于摩根士丹利的交易。


    如果你画一条始于2011年初的下行趋势线，你可以看到摩根士丹利开始走出这个下行趋势。然后它两次反弹，在一个支撑区域形成了双底。在反弹并上涨之后，它开始横盘整理——并且就在一个由前高形成的阻力位下方进行整理。


    许多不同的因素汇聚在一起。摩根士丹利正在走出并突破下行趋势，它形成了双底，然后在阻力位下方形成了一个良好的基底。这种形态出现的频率比你想象的要高——不仅在日线图上，在日内图表中也是如此。从这个交易中很容易获得一个不错的风险回报比——也许是1:5的盈亏比——最终这笔交易盈利了。


    再次强调，交易是枯燥的。它不应该像跳伞那样刺激，也不应该像周日下午躺在吊床上那么放松。它既不是非常令人兴奋，也不是非常放松。它应该是枯燥的。就像洗头发——搓泡沫，冲洗，再重复。在交易中，你只是一遍又一遍地寻找同样的形态。'
  raw: '**Lund:** I’m looking for a swing setup, and then I’m going to zoom in on
    an intraday chart—usually a five-minute chart. Let’s say I see a stock that’s
    got a nice flag pattern. I’ll know on the daily chart where I think that breakout
    is going to happen, but during the course of the week, I’ll be looking at it on
    a five-minute and maybe a thirty-minute chart. What will often happen is, if you
    have a breakout point on a swing chart, you just look at the chart and say, “Oh,
    I’m going to buy it.” But the breakout might actually be really extended on the
    intraday chart before it gets to that daily breakout. Often when that happens,
    you fail, so I want to see some good action setting up on the smaller time frame
    chart that basically syncs up with the time frame on the larger swing chart.


    **Bourquin:** If something is reaching an area where there’s an important level,
    but it has already come a long way that day, then the chances are that it’s going
    to bounce off of the daily breakout, rather than go through it, right?


    **Lund:** Right. You have to remember that there are all sorts of participants
    who are watching charts in all different time frames. You’ve got your guys who
    are swing trading, you’ve got your intraday guys, you’ve got your scalpers, and
    you’ve got funds and people who are watching indicators or moving averages.


    I find that when you can get a breakout that lines up with the greatest amount
    of those different factors—for example, if you get something that’s hitting the
    intraday breakout, is on a daily breakout, and is also breaking out of the two
    hundred-day moving average—those can be some of the most powerful moves that you’re
    going to find in the market.


    **Bourquin:** I think a lot of traders, especially the new ones, have a difficult
    time with that balance, because they want things to confirm. They want a lot of
    confluence and a lot of things lining up, but I think they always have this question
    of, “How much is enough? Are two things enough? Three things?” How do you answer
    that question for yourself?


    **Lund:** I usually look at the more macro of the setups, which is usually the
    swing chart, but I think you’re right. I hate to make gambling and trading analogies,
    but I’m a poker player, and something that I’ve noticed in the last five, ten
    years—especially with the rise of Internet poker, before they shut it down—is
    that you would get a lot of young guys who just had no patience. They basically
    would be shoving all in when they didn’t need to and could wait a little bit.
    The veteran guys who had small or mid-size stacks would just wait and wait, let
    people fold, and wait for better opportunities. I think it’s the exact same thing
    in the market.


    I think a lot of the newer traders get so wrapped up in the action, especially
    since the action is ginned up a lot by high-frequency trading. They don’t have
    the patience to wait for stuff. I know it’s a hackneyed term, but the fact of
    the matter is that you make most of your money by “sitting on your hands” in trading.
    I think there is just not enough of that with some new traders.


    **Bourquin:** There’s definitely something to that. There are so many good traders
    who are also excellent poker players. There has to be something to that, where
    one helps the other. I’m sure you’ve found that, too.


    **Lund:** The little asterisk there about gambling and trading analogies is that
    poker probably requires more skill than any other gambling pursuit. Even though
    some wouldn’t agree with that, it’s not like you’re going in there and playing
    roulette or something that is mostly based on chance. There is some skill, feel,
    and money management involved in playing poker. That is the one pursuit of gambling
    that does actually have some valid ties to trading.


    **Bourquin:** Well, sure. There will always be different people at the final table,
    and it’s often not the same guys who always show up there in the end.


    **Lund:** The other analogy is that, if you have doctors at a poker table, they’re
    usually really bad, and I find that the same thing is true in trading. Doctors
    who come into trading are generally really bad as well. Sorry, no offense to the
    doctors out there!


    It’s interesting, because one specialty or skill in one area doesn’t necessarily
    translate to another. You always get the doctor who sits down at the table and
    thinks he can play poker because he’s saving lives all day and is very educated,
    but he usually gets cleaned out. I think it’s the same thing with trading. People
    come in with preconceived ideas about their skills and what they know, but the
    market just humbles them. That is another interesting parallel between poker and
    trading.


    **Bourquin:** Your strategy seems relatively simple: you find things that are
    bouncing off a two hundred-day moving average or reaching an all-time high. When
    you say it, it sounds simple, like we can all do it. If that’s the case, though,
    why do so many traders lose money? I’ve always been fascinated by the fact that
    when I talk to somebody about their trading strategy, I think I can do it myself.
    But when it comes to putting it into practice, people have a tough time. Why is
    that?


    **Lund:** I think it’s the same reason that people have trouble in all different
    areas of life. Ideas are a dime a dozen. I have a lot of ideas when it comes to
    trading. A lot of people who I work with in business have great ideas, too, but
    the people who can actually execute on those ideas and take them to fruition are
    few and far between. That’s because it takes follow-through, focus, and dedication.


    So many things happen throughout the course of a day when you’re sitting there
    and trading. So many things threaten to take your attention away, whether it’s
    a trading chat room or a news announcement. I think a lot of times people forget
    that trading is boring. You’re sitting there and just repeating processes and
    patterns over and over again.


    It’s hard for people to do that over an extended period of time. It’s not unlike
    gambling. Everybody knows how to play blackjack. You can even buy the cards that
    tell you exactly what you’re supposed to do in any given situation, and if you
    do that correctly, you’ll have somewhat of an edge over the house over time. But
    who does that? You don’t want to sit there and play by the book. You want to have
    some fun, have some drinks, and talk to the guy next to you! But when you do all
    that stuff, it gets you off your game. There are so many ways that the exact same
    thing can happen in trading, which probably contributes to the fact that a lot
    of people can’t be profitable in the long run.


    **Bourquin:** Is there a recent trade or two that you could talk about that demonstrates
    how you trade?


    **Lund:** Here’s a trade that I did with Morgan Stanley recently.


    If you drew a downtrend line to the start of 2011, you could see that Morgan Stanley
    was starting to come out of that downtrend. Then it bounced twice and made a double-bottom
    off of a support area. After it bounced and came up, it started to move sideways
    and consolidated—and it consolidated right below a resistance level that had been
    created from a pivot high.


    A number of different factors were lining up. Morgan Stanley was coming out of
    and breaking a downtrend, it had a double-bottom, and then it formed a nice base
    below a resistance level. That pattern happens more often than you would think—and
    not just in daily charts, but in intraday charts, too. It was very easy to get
    a nice risk-reward ratio—maybe a 1:5 risk-reward ratio—off that trade, which ended
    up paying off.


    Once again, trading is boring. It’s not supposed to be like jumping out of a plane,
    and it’s not supposed to be like laying in a hammock on a Sunday afternoon. It’s
    neither super exciting nor super relaxing. It’s supposed to be boring. It’s like
    washing your hair—you lather, rinse, repeat. In trading, you just find the same
    patterns over and over again.'
