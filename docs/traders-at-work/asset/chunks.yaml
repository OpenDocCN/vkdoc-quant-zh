- fmt: '**Wilson:** My advice to a struggling trader would be to commit to learning
    to do one thing well. For me, this meant restricting my focus to one instrument
    and committing to trade it for a set period of time each and every trading day.
    Over time, you will begin to understand how to identify the highest-probability
    trade setups, how much room to give them, and what the expected post-entry movement
    is likely to be. This process will embed in you the traits of discipline, concentration,
    and decisiveness that are present in all successful market operators while reinforcing
    your positive expectancy and self-belief. All of a sudden, you are struggling
    no more. A positive equity curve has been established.


    # CHAPTER


    ## John Carter


    *Having achieved worldwide acclaim for his market expertise,* **John Carter**,
    *author of* Mastering the Trade *(McGraw-Hill, 2012), is a mainstay on TV and
    at industry trade shows, and subscribers follow his insights and analysis each
    day at* [TradeTheMarkets.com](http://TradeTheMarkets.com) *and* [SimplerOptions.com](http://SimplerOptions.com)*.
    Carter is perhaps equally well known, however, for his candid accounts of the
    many thrilling successes—as well as a couple unforgettable missteps—he has experienced
    throughout his career. He primarily trades options using an uncomplicated technical
    approach and has managed to stay consistent and increasingly profitable, despite
    the internet bubble and vastly different market and economic conditions throughout
    the past 20 years. Carter’s story is as inspiring as it is entertaining and features
    clear takeaways that can help new traders develop professional habits and motivate
    experienced traders to refocus on what really works—and eliminate what doesn’t.*


    **Tim Bourquin:** John, let’s start at the beginning and talk about how you got
    involved with trading in the first place.


    **John Carter:** Well, my stepfather, Lance, was a broker with Morgan Stanley,
    and at the time, I was in high school and spending the summer working at the mall
    and making about $4.25 an hour. I remember I had been working for three months
    and had saved around $1,000.


    One Sunday, I come home, and my stepfather and his buddies are sitting around
    the table, looking at *Investor’s Business Daily* and talking about how they were
    going to make some money that week buying call options on Intel. I had no idea
    what they were talking about.


    We made a deal that they would spot me the $1,000, because I obviously had no
    time to open up an account the night before. If we made money, I would keep the
    profits, but if we lost, then I would owe that money.


    They couldn’t promise me that the trade was going to make money, and I hemmed
    and hawed before going ahead with it, but they bought calls on Intel that Monday
    for $1 and sold them on Thursday for $1.80, making me $800 in the process.


    Afterward, I thought about how I had just worked forty hours a week for three
    months to make $1,000—and then did practically nothing and made $800. From then
    on, I was hooked and knew that trading was what I wanted to do.


    **Bourquin:** Do you think that can sometimes be the worst thing that can happen
    for people, though? That’s how people come to think that trading is easy and expect
    that they can just jump in and start making money trading.


    **Carter:** Well, that’s a good point, because there is that problem with beginner’s
    luck. But for me, I think that set the tempo, because I actually didn’t make or
    manage the trade. It was just my first experience in the market, and because it
    was so positive, I saw there was opportunity there. But they were very clear that
    I could just as easily lose money, too.


    It was probably a month later that I had an account funded and was starting to
    do trades. But it’s a whole other story of how long it takes to become consistent
    in trading.


    I simply found that initial spark in knowing that it wasn’t easy, or else everybody
    would be doing it. There were certainly times when you’d get overconfident and
    things would turn against you, but that first trade was really the trigger that
    made me think trading was something that I could do for the rest of my life.


    **Bourquin:** Did you go to college after that?


    **Carter:** Yeah, I did, and after college, I had no desire to be a broker, so
    I became a financial analyst and traded the whole time.


    I traded all through college, too. The girl I was dating had about $15,000 in
    student loans, and they would advance her the money. I took some of that money
    and put it into a stock called Iomega and tripled her account. That same girl
    ended up marrying me one day!


    **Bourquin:** That’s funny. I don’t know if that’s allowed in the loan documentation,
    though!


    **Carter:** It’s not. You’re absolutely not allowed to do that, but trading back
    then was way different than it is now. It was more about buying something and
    holding it for six or eight weeks at that time, and that was fun.


    **Bourquin:** Did trading then become your job in the summers, or did you actually
    get another job?


    **Carter:** I was trading all through college, and I was actually pretty active
    trading options. Then, when I went to work as a financial analyst, I swing traded
    and was watching the markets every day. I focused on the retail sector, watching
    companies like Kmart, Walmart, and Target, and actually got to go into the stores
    and help with inventory. That was how I really got my hands dirty.


    **Bourquin:** Now, for what firm were you working as an analyst?


    **Carter:** It was a small, boutique firm based out of Dallas, but it was later
    absorbed, and now I believe it’s part of a Canadian firm. We had a group of about
    twenty guys, and the main focus was on retail. We actually did financial analysis
    on the companies themselves, but then also provided inventory and other services
    to retailers like Target and Walmart.


    **Bourquin:** That’s interesting. I didn’t know that you had been an analyst.
    Did that knowledge of fundamental measures like inventory help you as a trader?


    **Carter:** No, but it did help with seeing industry trends, and that was valuable.
    For example, changes to a company’s inventory structure or other changes that
    would make for more efficient operations could be reflected in the company’s stock
    price three months later.


    I’m more of a technician at heart, but I like to pay a little attention to fundamentals
    after seeing how certain actions can actually impact earnings—or impact perception
    enough to where the stock price is affected because of it.


    **Bourquin:** Were you allowed to trade those stocks at the same time that you
    were analyzing them?


    **Carter:** There were no rules that said you couldn’t, but I think I was the
    only one who was actively trading. There were people who were working with 401(k)s,
    but it was not a full trading desk as we know them today. A lot of the other analysts
    either didn’t trade or were more focused on providing services to the retailers.


    **Bourquin:** What was it about that job that made you quit and move on with your
    trading?


    **Carter:** That was actually a good job and a good company, but I remember driving
    in one morning and thinking, “If five years from now I’m still making this damn
    commute to this same job, then I will have done something wrong.”


    I really wanted to push myself to take the risk and pursue my dreams of becoming
    a trader. Too many people wake up one day and suddenly realize that they’re forty
    or forty-five and still at the same job. I was very conscious of that.


    I don’t know what the trigger was, exactly, that made me decide to quit, and I
    remember it was actually very difficult to leave that job, because I liked it
    and was part of the team. It was a situation where I could trade and still have
    a regular salary coming in, too, but I believed I’d reached a point where I had
    to make a choice—and I did.'
  raw: '**Wilson:** My advice to a struggling trader would be to commit to learning
    to do one thing well. For me, this meant restricting my focus to one instrument
    and committing to trade it for a set period of time each and every trading day.
    Over time, you will begin to understand how to identify the highest-probability
    trade setups, how much room to give them, and what the expected post-entry movement
    is likely to be. This process will embed in you the traits of discipline, concentration,
    and decisiveness that are present in all successful market operators while reinforcing
    your positive expectancy and self-belief. All of a sudden, you are struggling
    no more. A positive equity curve has been established.


