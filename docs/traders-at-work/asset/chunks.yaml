- fmt: '# I was a struggling professional. I went out there and gave it three years,
    and even though I got better, I wasn’t doing so at the pace that I needed to.
    That’s a grind. It’s a lot of travel and living life out of a suitcase. It means
    long hours and limited pay, especially if you aren’t on television every weekend.
    So, my drive for it diminished, because my results weren’t aligning with my level
    of effort.


    Along the way, however, I had been exposed to the market. My wife and I married
    in 1998, and we had a small amount of savings and no debt, which was a big advantage.
    We decided to invest our savings to build a nest egg, and because we were very
    young, we felt we could really get ahead of the curve, in terms of building wealth
    over time.


    We met with a local broker and invested in some mutual funds in the summer of
    1998, right before the hedge fund Long-Term Capital Management collapsed in August.
    That drove the entire market lower, and with our mutual funds exposed to that
    weakness, we lost some of our savings as a result.


    That didn’t sit well with me, so I decided to take matters into my own hands.
    I started going to Barnes & Noble practically every night and read every investing
    and trading book and magazine I could get my hands on. It wasn’t long before I
    had taken money out of those mutual funds and was watching individual stocks on
    my own.


    Like every new investor or trader, however, I made a lot of mistakes. But in 1999
    and early 2000, throughout that bubble period, the market forgave those mistakes
    because of all the excess strength out there.


    By the time mid-2000 rolled around, I was doing very well in my trading, and that
    was when I decided to transition from playing golf to trading for a living.


    **Bourquin:** I found it very interesting that you characterize life as a touring
    professional as “a grind.” There’s an interesting analogy there between golf and
    trading, and I’m sure you’ve seen it, too. People often think that trading for
    a living is a glamorous lifestyle, just like they imagine traveling and playing
    golf every day is glamorous.


    **White:** Absolutely, and I’m glad that you mentioned that, because there is
    a lot of grinding in both golf and trading. The only real difference is that there’s
    air conditioning in trading!


    I’ve found that there are tough stretches in both. There are times when you put
    in very long hours and don’t get paid for it. The same can often be said in any
    endeavor when you are self-directed and self-employed, though.


    **Bourquin:** Both golf and trading can make you a real hit at cocktail parties,
    too! When you were on tour, did people think you were living the dream life, and
    do they say the same things now, when you tell them that you’re a trader?


    **White:** Yeah. For whatever reason, people find that much more interesting,
    but I can tell you that my life is probably no more interesting than theirs.


    **Bourquin:** Let’s talk about your transition into trading full-time and how
    you went about getting started.


    **White:** I walked into a day trading office in South Texas, where I lived, and
    there were several dozen traders in there. They were using very sophisticated
    software that I had never seen before and had access to leverage that I didn’t,
    and that afforded them some unique advantages over traders like me.


    It was a retail firm. Everyone was trading their own account, but with everyone
    in one big room together, there was a phenomenal exchange of ideas. People would
    be calling out their trades as they were getting in and out, or noting higher
    highs and higher lows in a certain market, or announcing when an economic number
    was about to be released. There were many sets of eyes just watching the market
    from different angles.


    It was an excellent environment that helped me learn and grow as a trader. I had
    been a part-time trader for a couple of years before that, but when getting into
    trading full-time, I had a lot to learn. Even now, many years later, I still have
    much more to learn.


    In a setting like that, you have a lot of traders and a number of different approaches.
    Some are momentum players, others are pullback buyers, and some love to play reversals.
    You also get people on different time frames. Some are day traders, some are swing
    traders, and some are position traders. By having that constant interaction and
    understanding of what strategies work well under certain conditions, it quickly
    multiplied my knowledge and experience level.


    Perhaps more than anything else, though, I learned the most from the mistakes
    that people around me were making. That was a time when the market really changed
    from a roaring bull market into a bear market. With prices moving lower, it required
    people to adapt, because the market would no longer “bail out” bad trades on its
    own.


    I remember one trader in particular who made money every day for about six weeks
    without having a down day. Basically, he was fading extreme news-based momentum,
    so when a stock would ramp higher following a news report, he would start to scale
    into a short position, looking for that “inevitable” initial pullback.


    He had a lot of leverage at his disposal, but to make these trades work, he would
    have to time his entries well, scale in, and keep adding to losing positions whenever
    he didn’t time them well. Inevitably, he would get that pullback, and that would
    bail him out of some deep holes. He might be down $20,000 and ultimately be able
    to close out a $500 winner.


    **Bourquin:** Even though that’s a really bad habit to get into…


    **White:** It certainly is, but every profitable trade simply magnified his confidence.
    It was as if he was playing chicken with the market but somehow just kept on winning.


    One day, that all came to an end, though. He blew out $186,000 in just a couple
    of hours in a biotech stock that went into free-fall mode after a news headline.
    He just kept buying and adding to the position until he ran out of buying power,
    and the brokers in the office had to close his position for him because he was
    out of money.


    It was hard to see someone self-destruct like that, and it taught me a lot about
    the emphasis—or overemphasis—that so many traders place on being “accurate.” Here
    was a guy who was more accurate than anyone I had ever seen, and even he blew
    out his account by being careless with risk and position sizing.


    Many of the approaches I take to this day are rooted in some of my early experiences
    and the lessons I learned from watching other traders, especially in a case like
    that.


    **Bourquin:** In trading, you get exposed to a lot of different methods, and while
    there are people like yourself, who take what they’ve learned and develop their
    own strategy, there are others who are constantly chasing the latest thing. How
    do you find the balance between chasing whatever you think is working at the moment
    and integrating outside information to create your own solid strategy going forward?


    **White:** I think it’s easy to try to learn too much all at once, especially
    when you are a newer trader. You understand that there are many different time
    frames and techniques you can choose from, so you try a little bit of everything
    and constantly switch from one to another. Ultimately, you only find yourself
    getting more confused, and you won’t actually learn or make progress that way.


    I learned to let the market dictate which plays to focus on, and then, naturally,
    you’ll learn what you need to learn over time. That brings greater consistency
    and eliminates the need to learn multiple strategies all at once.


    My advice would be to go to work on what the market is rewarding at the time,
    and keep paying attention when that’s not working quite as well, too, because
    that’s when you may need to adjust and learn something else.


    **Bourquin:** Does that argue for having five or six different strategies at your
    disposal so you have an arsenal to choose from, regardless of the market environment
    at the time?'
