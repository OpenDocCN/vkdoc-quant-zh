- fmt: '当然，我们一直在经历一轮猛烈的上涨，但没有什么能永远上涨。市场迟早会有所回调。但那些说“这不是真的”的人，说真的，那才不现实。


    **Bourquin：** 你之前提到了`VWAP`，我知道很多读者会好奇你是怎么用它。你能谈谈你是如何利用`VWAP`来决定是否进行交易的吗？


    **Menaker：** 使用它的方法有很多种。其一，看看`VWAP`的斜率。假设现在是交易日的第二个小时，`VWAP`到目前为止一直持平。这预示着市场处于区间震荡状态。如果`VWAP`的斜率向上，并且我看到`NYSE
    TICK`的斜率也向上，这表明市场存在买盘偏向，买方可能比卖方更占控制权。


    这些都是我开始留意的一些信号。使用`VWAP`的方法有无数种。有些人把它当作回调入场点。当强劲的价格趋势回调至`VWAP`——或者距离它一个标准差——时，他们会将其作为顺势入场的点位。


    不过，它并非万能的。我绝不会仅仅因为`VWAP`就执行交易。它只是我综合考虑的因素之一。对我来说，关键在看背景。昨天市场在哪里？现在在哪里？我们相对于图表上其他点位处于什么位置？人们的想法和感受是什么？因为我们现在高于昨日的低点，空头今早是不是没有得到任何好处？他们开始紧张了吗？他们会在什么点位投降？市场内部指标看起来如何？


    实际上，我在交易中甚至不使用任何固定的交易规则。我的多数入场点位都是基于我对市场的想法和感觉，临时创造的。


    **Bourquin：** 你谈到了在成交量和价格都很大的区域设置止盈目标。那你的止损呢？你如何决定“我错了，该离场了”？


    **Menaker：** 在交易中，关键在于出场，对吧？决定你赚多少钱——或者亏多少钱——的其实不是入场点。而是我们的出场。我希望能确保在我感觉到自己可能出错时，我的入场点尽可能接近一个离场区域。


    对我来说，如果我认为今天是一个强趋势交易日，我会给交易留出更大的空间。但如果我在一个震荡盘整日进行交易，我的止损就会收得更紧。我的基本、核心目标是尽可能确定我应该使用哪种策略，而我会根据使用的是趋势跟踪策略还是区间震荡策略，来采取不同的止损方法。


    **Bourquin：** 我前几天和John Bollinger聊过，他在过去几年做了很多布林带之外的研究。他正在做的一件事是重新引入等量图，他完全去掉图表中的时间轴，只看价格和成交量。柱体越宽，成交量越大；柱体越窄，该价位上的成交量就越小。


    看起来人们开始仅仅使用成交量和价格了。有些交易者会说，“当然，我一直都是这么做的。”但很多人太习惯于那一分钟、五分钟或十五分钟的图表了。要摆脱这种思维，以不同的视角看待市场，对他们来说很不寻常。在习惯之前，这会让他们觉得不舒服。


    **Menaker：** 没错，我很高兴听到他一直在这么做，因为我认为更多的交易者需要这样做。我自己已经这么做很久了。


    **Bourquin：** 我总是喜欢在访谈结束时，试着找出每次对话中可以带走的一个要点。对我来说，你的核心经验似乎是：“忘记时间——或者降低它的重要性。开始关注在给定价格水平上发生了多少成交量。”我总结得还算到位吗？


    **Menaker：** 我不会完全忽略时间，因为它能让你了解市场的接受和拒绝。当价格非常快速地远离一个区域时，这就是拒绝。如果这是在大量成交中发生的，那它所传达的信息，与价格在该区域附近徘徊并伴随着大量成交所传达的信息是不同的。时间是一个因素，但按优先级排序，我会说成交量和价格更为重要。


    章节


    Brian Lund


    加利福尼亚州的 **Brian Lund** 是一位交易行业高管兼兼职股票交易员，他善于将交易的艺术类比为日常生活的方方面面，这为他赢得了网络和社交媒体上的广泛关注。虽然他对市场的看法有些争议，但Lund通过忽略经济新闻和基本面因素，转而扫描数百只股票，寻找简单、可重复的交易模式，在交易中取得了成功。


    新手和经验丰富的交易者都能从Lund的坦率以及他选择只在一个市场操作的逻辑中获益。他们也能从他在高频交易、盈亏以及那些流行但又常被滥用的交易/扑克类比等话题上毫无保留的坦诚中受益。关注者可以在他的博客
    [BCLund.com](http://BCLund.com) 上阅读Lund关于交易、生活以及两者交汇点的独特见解和评论。


    **Tim Bourquin：** 我总是喜欢问交易者的第一个问题是：你是哪种类型的交易者？你是日内交易者还是波段交易者，你在哪些市场进行交易？


    **Brian Lund：** 我会说我是个混合型交易者。我喜欢寻找那些正在形成波段机会的形态，但同时也会根据这些图表进行日内交易。基本上，我是一个股票交易者。我做一点期权交易，也涉足过一些期货交易，但我会说95%的时间我都专注于股票。


    **Bourquin：** 你每天会关注一篮子股票，还是什么都交易？


    **Lund：** 我总是不停地关注大约350只股票，这个列表是动态变化的。我会根据哪些板块火热来精简或增加，但周末我通常会查看这350只股票，从中挑选出至少十个到十二个思路，作为下周的关注重点。对我来说，如果列表里的股票太多，我就会失去焦点，无法全部跟踪。我会说，在任何一周内，我关注最多的股票数量是20只，但最好是在十到十二只之间。


    **Bourquin：** 从图表上看，你只是快速翻阅图表寻找特定形态吗？


    **Lund：** 是的。我用`TC2000`——我一直在用——我把图表放进去，按空格键，每张图大概只看两三秒。多年来，我已经在图表上画好了支撑位和阻力位，所以它们从我之前查看这只股票时就一直在那儿了。我是在寻找那些跳入眼帘的东西，比如旗形整理、双底、上升三角形，实际上就是任何你学过的基本技术分析形态。


    **Bourquin：** 一旦这些形态中的一个跳入你眼帘，你会如何采取行动？'
  raw: 'Of course, we’ve been going up in a monster rally, but nothing goes up forever.
    Something is going to give at some point. But for people to say, “This is not
    real,” well, that’s just not realistic.


    **Bourquin:** Earlier you mentioned VWAP, and I know a lot of readers will be
    curious as to how you use it. Can you talk about how you use VWAP in deciding
    whether or not you’re going to trade something?


    **Menaker:** There are a lot of different ways to use it. For one, look at the
    slope of VWAP. Let’s say it’s the second hour of the trading day, and VWAP has
    been pretty much flat so far. That’s a sign that we are in a range-bound market.
    If VWAP is sloping up and I see that the NYSE TICK slope is pointing upwards,
    that suggests that there is buying bias and that buyers are perhaps more in control
    than sellers.


    Those are some of the things I start to look for. There are a gazillion ways you
    can use VWAP. Some people use it as a pullback place. When a strong price trend
    pulls back to VWAP—or maybe one standard deviation away from it—they’ll use that
    as a place to jump on the trend.


    It’s not a be-all and end-all, though. I don’t ever execute a trade just because
    of VWAP. It just goes into the mix. It’s all about context for me. Where was the
    market yesterday? Where is it right now? Where are we in relation to other points
    on the chart? What are people thinking and feeling? Did the shorts not get any
    love this morning because we’re now above yesterday’s lows? Are they getting nervous?
    At what point are they going to puke? What do the internals look like?


    I don’t actually even use any fixed setups with my trading. The majority of my
    entries are created on the fly based on what I’m thinking and feeling about the
    market.


    **Bourquin:** You talked about your profit targets in an area where there has
    been a lot of volume and price. What about your stop? Where do you decide, “I’m
    wrong, it’s time to get out”?


    **Menaker:** In trading, it’s all about the exits, right? It’s not really the
    entries that determine how much money you make—or lose, for that matter. It’s
    about our exits. I want to make sure that I’m entering as close to an exit area
    as possible when something tells me that I’m going to be wrong.


    Now, for me, if I’m thinking that we’re in a strong directional day, I’m going
    to give my trades a lot more room. But if I’m trading on a rotational range day,
    I’m going to be tighter with my stops. My basic, fundamental objective is to try
    and determine which strategy I should be using, and I’ll approach stops differently,
    depending on whether I’m using a trending directional strategy or a range strategy.


    **Bourquin:** I was talking with John Bollinger the other day, and he has done
    a lot of work outside of Bollinger bands in the past few years. One of the things
    he has been doing is bringing back equivolume, where he takes time off the charts
    entirely and is just looking at price and volume. The wider the bar, the bigger
    the volume, and the thinner the bar, the smaller the volume is at that price.


    It seems like people are starting to just use volume and price. Some traders will
    say, “Duh, I’ve been doing that forever.” But a lot of people are so used to that
    one-minute, five-minute, or fifteen-minute chart. To get away from that and look
    at the market a little bit differently is unusual for them. It’s uncomfortable
    for a while, until they get used to it.


    **Menaker:** Right, and I’m glad to hear he’s been doing that, because I think
    that more traders need to be doing that. I have been doing that for a long time.


    **Bourquin:** I always like to finish off an interview by trying to figure out
    the one takeaway from each conversation that I’ve had. It would seem to me that
    your takeaway lesson would be, “Forget about time—or make it less important. Start
    looking at how much volume occurred at a given price level.” Did I sum that up
    pretty well?


    **Menaker:** I wouldn’t completely ignore time, because it gives you an idea of
    acceptance and rejection. When price moves away from an area very quickly, that’s
    rejection. If it does so in the midst of a lot of volume, that says something
    different than if price had stuck around that area in the midst of a lot of volume.
    Time is a factor, but in order of priority, I would say that volume and price
    are more important.


    CHAPTER


    Brian Lund


    *California-based* ***Brian Lund*** *is a trading industry executive and part-time
    equities trader* *whose ability to liken the art of trading to some facets of
    everyday life has earned him a wide following across the web and social media
    sites. While his approach to the markets is somewhat controversial, Lund has found
    success as a trader by ignoring economic news and fundamentals and instead scanning
    a universe of hundreds of stocks in search of simple, repeatable patterns to trade.*


    *New and more experienced traders alike will appreciate Lund’s candor and the
    rationale behind his decision to operate in only one market. They also can benefit
    from his unbridled honesty on subjects like high-frequency trading, P&Ls, and
    those popular yet often overused trading/poker analogies**. Followers may read
    Lund’s unique insights and commentary about trading, life, and the intersection
    of the two on his blog, [*BCLund.com*.](http://BCLund.com)*


    **Tim Bourquin:** The first question I always like to ask traders is: what kind
    of trader are you? Are you a day trader or a swing trader, and what markets do
    you trade?


    **Brian Lund:** I would say that I’m a hybrid trader. I like to look at patterns
    that are setting up for swings but then take intraday trades off of those charts.
    Basically, I am an equities trader. I do a little bit of options trading, and
    I have dabbled in futures here and there, but I’d say that 95 percent of the time
    I’m focused on equities.


    **Bourquin:** Do you have a basket of stocks each day that you’re watching, or
    will you trade anything?


    **Lund:** I’ve got about three hundred and fifty stocks that I’m always looking
    at, and that list ebbs and flows. I pare it down or add to it, depending on what
    sectors are hot, but I generally am looking at about three hundred and fifty stocks
    on the weekends and pulling at least ten to twelve ideas for the week that I want
    to focus on. What happens with me is, if I get too many stocks on my list, I lose
    focus and can’t follow them all. I would say the most stocks that I’m looking
    at during any given week is twenty, but it’s better if it’s somewhere between
    ten and twelve.


    **Bourquin:** Chart-wise, are you just flipping through the charts in search of
    specific patterns?


    **Lund:** Yeah. I use TC2000—I’ve used it forever—and I’ll put the charts in there,
    hit the spacebar, and give them each maybe a two- to three-second look. Over the
    years, I’ve drawn support levels and resistance levels on the charts, so they’re
    already on there from previous times that I was looking at the stock. But I’m
    looking for things that jump out at me, like flags, double-bottoms, ascending
    triangles, and really any of your basic, technical analysis-focused patterns.


    **Bourquin:** Once one of these patterns jumps out at you, how do you act on it?'
