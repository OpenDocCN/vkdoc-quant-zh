    The first thing you need to do is find what really grabs you. If you don’t believe
    in your trading theories—if you don’t believe in your system—then you are dead
    in the water. You are never going to be able to commit enough to make money. You
    need to know what you believe in.


    I give my friends and family Michael Covel’s book, *Trend Following* [Financial
    Times Prentice Hall, 2004]. I say, “Read this book.” Then, if they read it and
    they believe in it, I’ll step them along and say, “OK, now read this book.”


    If you believe in trend following, then learn the lexicon, get some software,
    and get a programmer on board. You can hire a TradeStation programmer and start
    testing some of this stuff, or you can learn the programming language yourself.
    You just have to dive into it and do it.


    **Bourquin:** I know Michael Covel, and he seems to be the guy in trend following.
    He blogs quite a bit about it and talks about it, so I know he is a good resource
    for that.


    **German:** Absolutely.


    **Bourquin:** A lot of traders out there say, “Just show me what works right now.”
    But I like the idea that you have to believe that your trading strategy is going
    to work for a long time—especially if you’re programming software and setting
    up a system to trade on its own. That’s a key point, because you have to believe
    that your system works.


    **German:** It’s not what works right now. It’s what has worked over long periods
    of time.


    There is no way that I’ll trade a strategy that doesn’t work over a portfolio
    of markets or that hasn’t worked for a very long time. Those are my two basic
    requirements.


    **Bourquin:** At the end of the day, no matter what market you’re in, trading
    is about price action. It doesn’t matter if you’re trading corn or wheat or oil.
    It’s all about price action.


    **German:** Yes, for me, it’s about price action. I look at price action only.
    I don’t look at volume. I don’t look at indicators. I don’t look at supply and
    demand. I look at zero fundamentals. How can you sift through all the fundamentals
    and still have time to trade them on a day-to-day basis? The price is what tells
    you what the fundamentals are.


    CHAPTER


    Dr. Andrew Menaker


    *In addition to his own successful futures trading career, psychologist* ***Dr.
    Andrew Menaker*** *has worked as a psychological consultant* *in all corners of
    the trading and financial industries, as well as at the government level with
    the US Department of Defense and Navy**. Professional and retail traders alike
    have enhanced their performance as a result of his coaching.*


    *Menaker believes the markets are ultimately people-driven. He also firmly asserts
    that a solid understanding of the social and behavioral factors that move prices
    can often separate the traders who achieve long-term success from those who fail.
    Psychology, he says, can even help traders overcome the adverse effects of high-frequency
    trading. Menaker offers consulting services, as well as various products and resources,
    on his web site, [AndrewMenaker.com](http://AndrewMenaker.com).*


    **Tim Bourquin:** Andrew, I’d like to start with a very broad question. Is high-frequency
    trading making it tougher for retail traders to make money these days?


    **Dr. Andrew Menaker:** Without a doubt, it’s changed the landscape of the markets.
    There is more automation and more machine-generated volume coming into all markets.


    But I think the impact of high-frequency trading depends on which market you’re
    looking at: stocks, indexes, futures. There are different issues in different
    markets. I will tell you what I see from my own perspective, because I trade my
    own account, work with a lot of traders, and come into contact with a lot of traders
    across a wide spectrum—from people who are trading at banks and hedge funds to
    people who are trading their own account. I hear a lot of people who are looking
    for the easiest or most convenient excuse as to why their performance is poor.
    The most common excuses that people are latching onto nowadays are high-frequency
    trading, automation, algorithms, and things like that. But, like I said, those
    are a reality, and undoubtedly they have changed the way that price action operates.


    I also want to point out that trading has never been easy. There’s that famous
    line that trading is the hardest easy money you’ll ever make, and it’s true. There
    have always been challenges, and I think the current excuses that people are using
    now are the algos and high-frequency trading.


    There are going to be different amounts of high-frequency trading in different
    markets. In June, for instance, about 13.5 percent of all volume on the New York
    Stock Exchange [NYSE] was dark pool volume. But I know that in the E-mini S&P
    futures [ES], which is what I tend to trade a lot, we’re seeing, on average days,
    50 percent to 70 percent—and sometimes even more—of machine-generated volume.


    **Bourquin:** What about the argument that we’re just making the markets more
    liquid? You can now get in faster because we are there and making markets in the
    securities.


    **Menaker:** I am definitely aware of that argument, and to a certain extent,
    that’s a valid argument, right? I’d have to say, though, that high-frequency trading
    does change the landscape, and there is also the argument that high-frequency
    traders are getting in front of everybody for a sliver of a penny.


    I can tell you what’s really interesting, because I’ve been out to a few institutional
    hedge fund conferences. Even the guys and the gals who are trading large size
    for funds, hedge funds, and banks are having a lot of issues with high-frequency
    traders. So, it’s kind of an interesting situation. I don’t know where we are
    going to land or what’s going to happen, but I would say that people need to understand
    that, because the markets have changed and we have more automated volume, we have
    to be even more on top of managing ourselves and have a good approach to trading.


    If you were to look at one thousand random traders and, in that group of one thousand,
    you had a large number of automated systems traders along with a good number of
    discretionary traders, what you would see is that there is a larger percentage
    of profitable traders who are using automated systems. However, there’s a big
    caveat here. The *bigger* winners are in the discretionary camp. In other words,
    it’s harder to become a successful discretionary trader, but once somebody does,
    they tend to outperform the automated system traders.'
