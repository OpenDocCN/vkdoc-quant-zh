    know that I’m not going to mess with it, there is nothing for me to do. It could
    be going up or down, and it doesn’t matter, unless the system says buy or sell.


    **Bourquin:** Talk with me a little bit about when you first got started in trading.
    I know that the floor is a little bit different than screen-based trading. In
    2005, when you started trading full-time behind the screen, did you lose a lot
