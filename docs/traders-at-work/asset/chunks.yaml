- fmt: '**Bourquin:** How many positions are you comfortable having on at any one
    time?


    **Berger:** I tend to have about ten to twenty positions on at once, and I try
    not to keep them in too many sectors. For one, I have a very clear sector focus,
    and it’s mostly based on things I can understand: certain technologies, certain
    consumer cyclicals, and defensive titles. So, ten to twenty open positions is
    my usual range.


    **Bourquin:** Do you have a basket of stocks that you chose from, or would you
    trade anything on the market?


    **Berger:** No, I have a big watch list, and every once in a while something will
    pop up, depending on the environment. Given the European debt situation, there
    have been some European equities I’ve traded more recently because they presented
    good opportunities, but more or less, I have a watch list comprised of stocks
    that I have followed for many years.


    **Bourquin:** Ten to twenty positions can be quite a bit to monitor. How are you
    actually scanning for these? Do you do your homework at night? And what software
    do you use to help you find these opportunities?


    **Berger:** I use a `Bloomberg` terminal, which I still consider to be a great
    tool for cross-asset analysis, as well as for focusing on just one asset.


    I have six big screens on my desk that allow me to monitor positions clearly.
    They’re divided up by sector using different colors. I’m a very visual person,
    so I need a lot of desktop space and a lot of different colors to be able to follow
    everything.


    **Bourquin:** There’s a lot of information there to absorb. In gap trades, you’re
    focusing on S&P 500 futures, but on the stock side, are you just flipping through
    the charts of the stocks in your basket, or are you somehow alerted automatically
    by `Bloomberg` when a condition meets your criteria?


    **Berger:** I flip through the charts every Sunday and look at most of those stocks
    in greater detail. Every day I look at the S&P 500 sectors and their charts and
    I set alerts. I also set alerts on all the stocks on Sunday nights, and once I
    get an alert, I will wait until the end of the day to see if it does what I expected,
    and then I’ll either pull the trigger or not.


    **Bourquin:** Do you have a weekly goal that you set for yourself in terms of
    how much money you want to make?


    **Berger:** I can’t give a dollar amount, but what I can tell you is that the
    goal when trading the opening gap is basically to make between one and two S&P
    500 E-mini futures points. If you do that, you make a very good living.


    **Bourquin:** Right. And how did you go about learning to trade the opening gap?


    **Berger:** I worked at J.P. Morgan as a fixed-income guy, and I always wanted
    to break loose from that and just trade, but I wanted to find something that would
    give me enough certainty of cash flow on a monthly or quarterly basis so I could
    leave, or at least get to a prop desk where I could survive. The gap trade is
    a very high-probability trade that allows me to do that, and that’s really why
    I came around it.


    **Bourquin:** Now, because the S&P may only gap a couple times a week and not
    every day, how often do you find that gap trade?


    **Berger:** Well, even if there isn’t a gap, I will also refer to a major intraday
    reversal as a gap trade. For example, even if the gap has already been filled,
    or if there literally hasn’t been a gap, most of the time you will still get a
    reversal within the first hour or ninety minutes of the trading day that tends
    to go in the opposite direction of the previous day. So, opportunities come a
    lot more often, and even if there isn’t a true gap, it’s essentially the same
    thing as a gap trade, where I am literally just trying to take one to two points
    out of it as the market reverts back to the mean.


    **Bourquin:** As opposed to looking for it to go all the way back to the previous
    high or previous low from the day before?


    **Berger:** Yes, exactly. We’re just trying to hit singles and doubles, and that’s
    really all we’re trying to do.


    **Bourquin:** I was talking to somebody at a seminar about how some of the best
    traders are probably only good at one or two things, but they do it day-in and
    day-out in such a way that, after a while, it almost becomes boring, if you can
    call it that. Do you feel like the best way to trade is when you find something
    that works, you just do it over and over again, almost to the point where trading
    is boring?


    **Berger:** I have a big sticky note on my desk that says, “`Don’t focus on the
    money. Focus on the game`,” and that has helped me to literally forget about looking
    at my P&L on a day-to-day basis. Of course, for some accounts I have to look.
    But I try to separate the money aspect from my emotions because I have found that
    during my best months and best days, all I am doing is focusing on finding those
    intraday or swing-trade setups that I mentioned. And in the end, I won’t even
    realize that I made that much money, and that there were no emotions involved
    at any point.


    **Bourquin:** And that’s one of what I call the “twenty habits of wealthy traders.”
    While we’re all here to make money, when you make your goal something else, you’re
    able to make better decisions and the money comes more naturally as a result.


    **Berger:** Especially if you trade futures. We’ve focused a lot of our discussion
    on the intraday trade on the E-mini futures, and there you have the biggest tendency
    to look at your P&L because you can literally see it tick up and down. There,
    especially, it is all about looking at the chart. If you see a signal that counts,
    take it, and then just take your stop and move on.


    **Bourquin:** Let’s talk a little more about the slow stochastics that you use.
    What do you want to see from the slow stochastics to act as a valid signal? Is
    it as simple as seeing those lines starting to move in conjunction with that candle?


    **Berger:** On intraday trades, I mostly go for extremes. So, a lot of the time
    if we get an up gap, the stochastics will tend to get overbought quite quickly.
    Once those stochastics are extremely overbought on the five-minute chart—and preferably
    even on a fifteen-minute chart—in conjunction with a clear reversal candlestick,
    that will then act as a signal to go short.


    It’s different on a swing trade, and years of experience have taught me to go
    for divergences. If I have a stock that’s making new lows but the stochastics
    are not, and I get other signals, including candlesticks and Fibonacci reports,
    I’ll be much more prone to take that trade than if I have just an overbought situation
    in stochastics.


    **Bourquin:** So, you’re looking for some divergence there to say that price is
    not in line with what you’re seeing on the candlestick chart, and it’s not in
    line with what you’re seeing in the stochastics, so therefore, it’s a good trading
    opportunity?


    **Berger:** Yes, exactly.


    **Bourquin:** And on that reversal candle, at what point will you take the trades
    there? Is it the next candle, or is it at the close of that first candle, when
    you see that it’s obviously going to close a certain way?


    **Berger:** In the case of the intraday trade, I always wait for that candle to
    close. On the swing trade, I wait for the end of the day. I take the trade within
    about fifteen minutes of that day’s close.


    There is a very important distinction here, and I think that’s why candlestick
    analysis is so important. If you’re at the *bottom* of a trend and get a buy signal,
    that buy signal needs a confirmation candle.


    If I get a buy signal on the daily chart with ten minutes to go for that day’s
    session, I don’t just buy. I wait for confirmation to come and give me another
    candle in the direction I want to go. And if I get that, then at the end of the
    day, I’ll get in.


    At the *top* of a trend, you don’t necessarily need that. If there is a lot more
    room for a strong signal at the top, that might be enough to start going short.'
