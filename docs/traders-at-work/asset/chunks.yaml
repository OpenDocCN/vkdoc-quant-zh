    I’m at my trading desk by 5:00 a.m. eastern time, doing my analysis, and then
    I’ll be prepared if one is going to break from whatever important level is nearby.
    If nothing looks good, or if they just stay flat, then I’ll sit on my hands while
    I read or study something else.


    **Bourquin:** When you first got into trading, it was partly because you were
    working crazy hours and didn’t have much time for yourself. Has trading given
    you relief from that lifestyle pattern, or are you right back in it?


    **Baiynd:** Well, I was definitely right back in it when I was learning and struggling—and
    even once I went back and was learning and getting it. Now my life is a little
    bit more in balance.


    Early on, I used to look at fifty different instruments and just chase all kinds
    of things. Now I’m so structured that even though I still get up very early to
    study the market, I am usually finished trading by 11:30 a.m. or noon eastern
    time.


    I might stick around and help my students or strategize for some kind of swing
    trade or longer-term investment after that, but I’ll be done physically trading
    at that point.


    **Bourquin:** A lot of readers could be at that stage where you once were, sitting
    in a chair at a beginner’s seminar, and others may not have even reached that
    point yet. What advice do you have for those people to ease their transition into
    trading? And if you had to start over again, what would you do differently?


    **Baiynd:** If I had to start over again, I would acknowledge and accept right
    away that my skill level was very light, if not practically nonexistent. Just
    because I was successful in one career didn’t mean that I could just jump right
    in, start trading, and achieve great results.


    People often think that there’s a 50/50 chance that they’ll win or lose, so they’re
    overanxious just to play, and they think, “Well, how hard could it be?”


    Trading, of course, is an extremely difficult occupation, and it’s important to
    size up the playing field, realize where your skill level *actually* is, and then
    try to find a mentor or someone who knows what they’re doing to help walk you
    through. I’ve actually done that for many, many people myself.


    Another piece of advice would be that throughout your search for information,
    there is still so much more that you do not know. Work hard to get a clearly defined
    system in place, and then find someone to help you battle the inevitable challenges
    you’ll face each day.


    **Bourquin**: To be a trader, you have to be comfortable being alone, but the
    desire for interaction with other traders during the day has given rise to thousands
    of chat rooms out there. What advice would you share with people who use them?


    **Baiynd:** Well, retail trading is a very isolationist game, and that was especially
    true before we had Twitter and chat rooms. When I started trading, there wasn’t
    a ton of that around, but now there is.


    It is my belief that you are doing yourself a great disservice if you choose a
    chat room that just spits out *where* the trades are. In order to be a good trader,
    you must also understand *why* you are doing something. You really don’t need
    to understand precisely how a stochastic momentum indicator comes up with its
    level, but you do need to know how to read it and what it means when it’s sitting
    in a certain space.


    So, when looking for a chat room, look for someone who’s willing to share precisely
    what they are doing. Frankly, that’s very difficult, because chat room operators
    are often concerned about their revenue and worry that you’ll find what you need
    and then move on. That’s why a lot of chat rooms just reveal the trades and not
    the logic behind them. If you can get into a room that explains the logic, however,
    you will get a much better understanding of where your skill level actually is
    at that point, as well as learn more of the things you need to know to trade well
    consistently.


    **Bourquin:** What do you tell people who aspire to quit their jobs to trade full-time,
    or maybe those who are retiring and looking to earn extra income trading?


    **Baiynd:** For anyone trying to make it a career change, it’s important to get
    as much education as possible before stepping into the space. Now, I believe that
    a new trader can learn to swing trade in a much more relaxed fashion than they
    can with day trading. The amount of pressure is totally different, but the mechanics
    and the psychological impact of making a bad trade are exactly the same.


    Before making that first trade, however, make sure you have a good basis in your
    education and have come across a system that you want to implement. From there,
    just start slowly and move forward.


    So many folks who try to make trading into a career come in so undercapitalized
    that they want to double and triple those small accounts—but that requires tremendous
    exposure to risk. That’s a dangerous formula, because their skill level is low
    and risk exposure is high, and the common result is that new traders often blow
    out their accounts and can no longer trade.


    Before making this a career, it’s important to realize that there are tons of
    lessons you have to learn before you can be successful, and there really are very
    few shortcuts when learning to trade the markets.


    The best thing to do is practice. Open a paper trading account, size up the market
    to find good trades, then take and work through those trades. If you can’t make
    money in a paper trading account, you won’t be able to do it with a real account,
    either—no doubt about it.


    **Bourquin:** And along those same lines, even if you are able to make money in
    a paper trading account, that’s no guarantee that you’ll make money in a real
    account, right?


    **Baiynd:** Exactly. There is a different feel when trading with real money, as
    well as the added psychological stress, and that’s the real kicker.


    **Bourquin:** Some people say paper trading isn’t worthwhile, because it doesn’t
    indicate that you’ll be successful when trading with real money. Yet, there’s
    a lot of education to be gained there, and you really have to do it.


    **Baiynd:** Yes, absolutely. It’s important for understanding the rhythm of the
    market. But new traders must also understand that there’s all kinds of slippage
    that occurs when trading real money that you don’t see in a paper trading account.


    Mechanically, however, if you are making the right trading decisions, you will
    really reap the rewards when you move to a real account, as opposed to not understanding
    the mechanics and immediately jumping in and trading real money.


    ## CHAPTER


    ## Jeff White


    *After completing a standout amateur golf career and spending several years playing
    professionally,* ***Jeff White*** *made the transition to trading full-time in
    mid-2000*. Having found some fascinating parallels between the two professions,
    White knows better than most that being successful is “a grind”—not the glamorous
    and leisurely lifestyle that many imagine. As a day trader and swing trader who
    is focused almost exclusively on equities, White looks for simple, repeatable
    patterns and uses only price and volume signals to isolate the most favorable
    trading opportunities. Still, he believes that good traders must continually build
    their knowledge and understanding of alternate strategies to stay nimble in fast-moving
    market conditions. White posts daily market analysis, commentary, and trade ideas
    on his blog, [TheStockBandit.com](http://TheStockBandit.com).


    **Tim Bourquin:** Jeff, before you ever got into the business of trading, you
    were an NCAA collegiate golfer, and you later turned professional. Let’s start
    out by talking about that.


    **Jeff White:** I played college golf starting in 1993 until I graduated in 1997.
    I had some success in college and was an All-American. I was improving each year
    and wanted to give the tour a try, so I went out on one of the mini-tours.'
