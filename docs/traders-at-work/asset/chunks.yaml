- fmt: '**Raschke:** I trade every single day. I’m not saying it’s a great opportunity
    every single day, but again, I’m just positioning myself consistently to take
    advantage of opportunity.


    **Bourquin:** Was there something you learned or did in your evolution as a trader
    that you really felt helped you accelerate your learning curve?


    **Raschke:** With any business, you have to pay your dues. Even though anyone
    can open an account and start trading, there’s a long learning curve. Even if
    you’re going to become a doctor, or a radiologist, or an anesthesiologist, or
    something like that, it takes years of seeing different patterns and different
    environments with different pathologies to become experienced at recognizing problems.
    It’s the same thing if you are set on becoming a professional golfer. You have
    to play in different weather, on different courses, and with different equipment
    until you find what works for you.


    Trading is no different. If you want to be successful, then you need to engross
    yourself in the business and do your research. I’ve probably done over ten thousand
    hours of research, constantly studying charts, price action, and just thinking
    about different approaches to trading. There are no shortcuts.


    **Bourquin:** How about monetary goals for your trading. Do you try to achieve
    a certain level of profit for your yearly trading?


    **Raschke:** No. I don’t believe in that at all. I think that’s the most harmful
    thing a trader can do to their trading account. First of all, you can have all
    kinds of challenging market environments, and the trading opportunities might
    just not be there. Then, if you start falling short of your goal, you may start
    to place trades in a particular market environment that doesn’t favor your game
    plan. Maybe your trading strategy is to play in certain volatility conditions.
    Maybe you’re a seller of volatility and you like the market to stay in a contained
    range. Maybe you are a breakout trader and you like the market to turn. If those
    conditions don’t exist and you trade anyway, you’re setting yourself up for failure.


    The best thing you can do is to keep positioning yourself in the right environment,
    and when the opportunity presents itself, you need to be able to recognize it
    and get teed up to hit it big. That’s not something that you can do if you’ve
    only been in the market for two or three years. It takes a great deal of confidence
    and control to just say, “I’m waiting for that one opportunity where I can go
    in and really kill it.”


    Think of it like a tennis game. You keep the ball in play. You keep on hitting
    the ball back and forth and back and forth across the net, staying in the game.
    Then, if your opponent makes an error or is drawn off the court wide, that’s when
    you go in and you hit the winner. You can’t force your opponent to make that error.
    You can only position yourself to be ready when it happens and make that killer
    return.


    I think setting monetary goals is totally inappropriate. I think a better thing
    to do would be to set goals for yourself to not make unforced errors. Keep yourself
    consistent and don’t make spontaneous trades outside of your rules just because
    you think you should be in the market. Make consistency in your decisions the
    goal, not money. If you do that, the money will follow.


    **Bourquin:** Are there areas of your trading that you are actively working to
    improve? Are there things that you want to do better in your trading, even after
    thirty-one years?


    **Raschke:** Always. Every day. I’ll never be satisfied. That’s like asking a
    concert pianist, “Do you think you could play that piece a little better?” People
    who are good at what they do are never satisfied with the status quo.


    One of the things I am working on is more complex trade management strategies
    that are automated. I want to be able to see certain ways to take advantage of
    little inefficiencies in the markets that I am missing now. That’s what makes
    this game fun. There are boundless opportunities to come up with your own little
    nuances on your methods to make them just a little better.


    The minute you think you’ve found the key to trading, I promise you the markets
    will change the lock.


    ## CHAPTER


    ## Serge Berger


    `Serge Berger` has been an active trader since 1998. During his career, he has
    been a financial analyst, dealt in fixed-income instruments at J.P. Morgan, and
    was a proprietary trader in equities, equity options, and futures. Exposure to
    a range of different asset classes has allowed Berger to identify which asset
    classes and strategies best fit his goal of achieving consistent profits.


    Over the years, Berger has created a trading methodology that divides markets
    into different time frames and characters, allowing him to more clearly and without
    emotions determine which strategies to apply in given situations. His account
    and those of his clients continue to grow during all market environments because
    he focuses only on the highest probability setups and follows strict rules. At
    Berger’s web site, [TheSteadyTrader.com](http://TheSteadyTrader.com), he goes
    to great lengths each day to give subscribers only the best high-probability trading
    setups available and offers a friendly environment where questions are welcome
    any time.


    **Tim Bourquin:** Serge, let’s begin by talking about the type of trader you are—day
    trader or swing trader—and what markets you focus on.


    **Serge Berger:** I use more of a swing trader’s philosophy, but I trade on multiple
    time frames, which, of course, includes intraday time frames. So there is a day
    trading aspect to it as well.


    **Bourquin:** So some trades are day trades, while some trades are swing trades.
    When you swing trade, is the duration of the trade a couple of days or a couple
    of weeks?


    **Berger:** I divide my trades into buckets, and swing trades comprise bucket
    two. A swing trade is typically on for between two days and three weeks.


    **Bourquin:** In what markets do you trade?


    **Berger:** Again, it primarily depends on the time frame, but everything is based
    on US equity indices via futures and/or options.


    **Bourquin:** Sounds like a little bit of everything there. Let’s talk about your
    overall strategy as a trader. Are you a technical trader? Do you look at fundamentals?
    What are the things that you look at to find good trades?


    **Berger:** It depends on the time frame, but I would say the narrower the time
    frame, the more technical it gets. Certainly for intraday and swing trades, it
    gets very technical, but there is a fundamental backdrop to it in terms of a macro
    view and based on economic data. All in all, however, near-term trading is certainly
    much more technical than trading on the longer-term time frames that we use.


    **Bourquin:** As an example, what is your smallest time frame, and what technical
    tools do you use to trade it?


    **Berger:** The smallest time frame would be intraday. Even something as quick
    as the opening gap in the S&P 500 E-mini futures. The technical tools we use there
    are candlesticks and basic, slow stochastic oscillators. What I tend to do there
    is go for a half-gap close followed by a potential full gap.


    **Bourquin:** Can you explain what you mean by a “half gap” and “full gap”?


    **Berger:** Sure. Let’s say the S&P 500 closes at 1200 on Monday night and opens
    at 1190 on Tuesday morning. You have a ten-point difference there, so what I would
    do is buy the market at the opening once I get a signal based on candlesticks
    and some oscillators. Then, once the gap closes or the S&P goes back half way
    to the previous day’s closing price, I will then take profits and keep the remaining
    position open until the gap closes fully.'
