- fmt: 'I hold the WASDE. WASDE numbers come out every month, and most of my trades
    are going to go a little bit longer than three to four weeks. So, I constantly
    have positions on during those agricultural data releases.


    **Bourquin:** Has the release ever stopped you out because the movement was so
    great?


    **Hemminger:** I would never want to stop out on the emotional response, so I
    remove all my stops from the market. I wouldn’t want an erratic market reaction
    or an algorithm going crazy and pushing the market one way artificially. So, during
    those times of higher volatility, I will actually remove my stops. I have never
    had an instance where that has gone against me, because when those numbers initially
    come out, they mainly elicit an artificial reaction in the markets.


    Now, the release may obviously influence future market movements. But in some
    ways, thanks to the way that I position myself, I’m giving myself the option and
    the time to patiently look and see what’s happening and how the market is truly
    digesting the news release. So, I tend not to allow those types of high-volatility
    events to take me out of a trade.


    **Bourquin:** Now, it’s got to be a little worrisome at some point to remove your
    stops. Perhaps some of the news is built in with agricultures, and so you won’t
    be totally shocked if there is a drought or bushels come out less in harvest.
    But, still, I would imagine that the time you spend operating without stops has
    got to be a little tense.


    **Hemminger:** Yes, it can be. It’s similar to trading nonfarm payrolls. Every
    trader who is trading that release, regardless of whether they are taking a position
    or not, gets that little feeling of excited anxiety in their gut, and they react
    in accordance.


    In my experience, I’ve found that reacting to what other traders are reacting
    to is usually not a good formula for stopping me out of position. In the past,
    I’ve made a decent amount of money by trading both economic releases and the spreads
    around them, and so I tend not to get too flustered or dwell too much upon the
    market’s initial knee-jerk reaction. I let the market reevaluate where it wants
    to be before making any decisions to exit or enter a trade.


    ## Don Miller


    *Futures specialist* **Don Miller** *is a top-ranked fund manager, highly renowned
    mentor and trading educator, and member of the Chicago Mercantile Exchange (CME).
    Using a technical approach and multiple intraday time frames for his trades, Miller
    has learned to identify and buy pockets of value within the market and describes
    himself as a “liquidity provider.”*


    *After starting out trading equities, Miller later gravitated to futures, where
    he found success through constant learning and adaptability. Despite achieving
    the consistency and confidence of a master trader, however, not even he was safe
    from the MF Global debacle. Having fallen victim to the scandal, he worked as
    an advocate, spoke candidly about his experience and the need for reform, and
    later recovered his missing funds—as well as his passion for trading. Thousands
    now follow his trade journal and blog at [DonMillerBlog.com](http://DonMillerBlog.com)
    and his educational site at [DonMillerEducation.com](http://DonMillerEducation.com).*


    **Tim Bourquin:** Let’s talk about the type of trader you are, in terms of your
    time frames—day trader or swing trader—and then about the markets you trade.


    **Don Miller:** My time frame is primarily intraday. I trade the E-mini S&P futures,
    and I’ve been a member of the Chicago Mercantile Exchange [CME] since 2004. As
    such, I guess I would define my style of trading as liquidity providing, buying
    wholesale intraday, and selling retail.


    My holding times are usually pretty tight. I am fairly good about reading the
    markets on a very short-term basis, and there are wholesale opportunities throughout
    the course of the day. I believe a bird in the hand is worth two in the bush,
    and that’s typically how I have traded over the years.


    **Bourquin:** Let me ask you about a couple of those terms that you mentioned.
    First, when you say that one type of trading that you engage in is liquidity providing,
    what do you mean?


    **Miller:** Basically, one of the great things about the markets—and especially
    the E-mini market, which is one of the most liquid vehicles on the planet—is that,
    when somebody wants to buy or sell a futures contract, there needs to be someone
    on the other side of that transaction to allow it to take place. The more people
    that are able to provide liquidity, the more people that are able to be on the
    other side of that trade. And the more people on the other side of that trade,
    the more liquid the market, and you’re going to see less volatility.


    There is a stabilization benefit of providing liquidity to the market, and you
    also essentially serve as the party on the other side of a transaction any time
    somebody wants to buy or sell.


    Obviously, we won’t provide liquidity unless there is an opportunity for us as
    well, and we find our opportunities by taking advantage of and anticipating market
    cycles and markets that may get stretched one way or another, or markets that
    are moving toward a new path of least resistance. By and large, we’re able to
    sell product at a better price than we purchased it. It doesn’t happen all the
    time, but that’s the intention. That’s the goal.


    **Bourquin:** How is providing liquidity to the market different from just making
    a directional play for profit?


    **Miller:** At a very detailed level, I suppose the differentiation is that, if
    you are sitting on the bid or under the bid and you’re allowing somebody to sell
    to you, then you are technically providing liquidity. On the other hand, if you
    decide that you want to get in the market, no matter what the price is, then you
    will go ahead and buy on the ask. In this latter case, someone else is providing
    liquidity to you.


    It’s a little bit of a gray area, in terms of when you’re doing one versus the
    other, but overall, what happens is that the volume in the market increases, the
    participation in the market increases, and it makes for a more fluid market.


    But is there speculation involved in liquidity providing? Can you engage in directional
    plays while you’re providing liquidity? Absolutely. My most recent session was
    a good example. I didn’t do much liquidity providing, except for at midday, when
    the market started coming in, and I was sitting on the bid and hoping that if
    people needed to sell, they could sell to me. Aside from that very limited window,
    I was making directional plays, speculating, and getting myself in the market.


    **Bourquin:** Are shorter time frames involved in plays where you’re providing
    liquidity and trying to buy at the bid?


    **Miller:** Well, it really depends. The holding time depends on what cycle is
    in play. I believe that the market moves in a cycle on various time frames.


    If the time frame happens to be a little five-minute consolidating time period
    and higher time frames really are questionable, in terms of whether you have wind
    at your back or not, the holding can appear to be fairly tight. On the other hand,
    if you are just busting out of consolidation or you’re in a clear momentum trend
    on an hourly cycle, then the holding time can be a bit longer.


    The holding period really doesn’t depend on whether you are getting in proactively
    or you are getting in passively, in terms of providing liquidity. It really depends
    on the cycle in play at the time.


    **Bourquin:** What about “buying wholesale”? That sounds great. We always want
    to get a discount or a good deal. But how does that work in the stock market?
    How do you buy on the bid and sell on the offer?'
