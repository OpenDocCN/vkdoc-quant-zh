- fmt: '**Bourquin:** In talking to somebody recently, they said to me that if most
    traders would just stick with what they already do—instead of trying to jump around
    between markets, indicators, charts, or time frames—eventually they’d be likely
    to make money.


    The problems start when they try a few trades and don’t make money, so they move
    on to something else, and then another, and another… Do you agree that if most
    people just tried to master one thing, they would eventually get it?


    **Carter:** Absolutely, I do, and that’s exactly what happens. It’s like they’re
    continually moving toward the next bright and shiny object without first having
    a base or understanding of their trading philosophy and what they are trying to
    do.


    You can make a living with something as simple as a twenty-one-period moving average.
    You could actually look at that on five different markets, and that would be fine.
    If you’re not making money with one thing, however, and then you go try to do
    the same thing in some other market, guess what? You’re not going to make money
    there, either.


    **Bourquin:** Has your trading changed much over the past eight or nine years,
    considering the dot-com crash and everything else, or are you still doing much
    of the same thing?


    **Carter:** Gosh, that’s a good question. It hasn’t changed much, based only on
    the nature of the market, even though we don’t have a huge bull run like we did
    in the 1990s. I find I don’t hold positions as long, though. I now consider six
    weeks a long time to be in a trade, and from there, it is even shorter-term trading.
    Also, I’m more aggressive now about pulling money out of the market.


    I’ve found over time that I actually care much less about what I’m trading. I
    don’t think, “Well, I’m bullish on crude oil, so I’ll buy this to capitalize.”
    It’s all about looking for opportunities to take money out of the market, and
    a lot of that simply has to do with what you see. For example, if I see a market
    coming down really hard, I know there’s likely a lot of people getting flushed
    out of that market. I would look for an opportunity there, take it, and then get
    out. I can tell you that about 75 percent of the time I’m day trading, I am flat
    and am just waiting.


    **Bourquin:** Let’s talk about a garden-variety trade that you’d put on. What
    factors would lead you to take the trade?


    **Carter:** I recently took a textbook trade on MasterCard, which I really, really
    like. I look for stocks, say, after earnings or other news. MasterCard popped
    and made highs after earnings and then started to pull back. At that point, I
    was looking for the stock to turn around, try to retest, and break through the
    recent highs.


    I waited until the stock began to turn higher and then started scaling into that
    position. From there, I looked for a 127.2 percent Fibonacci extension of the
    move from the recent high to the retracement low after earnings. In this case,
    that was a potential $3 to $4 move, and that, to me, is a bread-and-butter trade.


    What happened next was I bought in and held the position overnight, and the next
    day, it pushed up, broke the previous day’s high, rallied up to that 127.2 percent
    extension, and that was where I got out. Now, it actually went up another ten
    points from there, but that was the setup and the move I wanted, so I’m happy
    to leave the extra money on the table.


    This same strategy works to the upside and the downside, and what I like about
    it is that you’re not sitting there, holding on for days while wondering where
    it’s going to go. You’ve got a specific setup and a specific target, and you only
    need to decide how many contracts you want to use to trade it.


    **Bourquin:** Will you take a trade on a stock purely for the technical setup,
    even if you have no idea what the company does, how their earnings look, and how
    other fundamental factors are shaping up?


    **Carter:** That’s a good question, but one that’s tough for me to answer, because
    I don’t trade a lot of stocks that I don’t know. Really, the top stocks in my
    universe include Apple, Google, Priceline, and other very actively traded, fast-moving
    stocks with plenty of liquidity in the options.


    I think, back in the day, it didn’t matter what the stock was, but I don’t run
    screens during the day just to find whatever stocks are making new highs that
    day or anything like that. I’ve got a universe of only about ten stocks, and I’ve
    gotten to know them very well. I watch them on an hourly chart, a fifteen-minute
    chart, and a five-minute chart, and there are plenty of opportunities just in
    that window.


    **Bourquin:** Do you trade from home or in an office setting?


    **Carter:** I have an office. I traded at home for a while, and then my wife had
    this weird affliction where she started having children! We have three small kids
    now, ages six, four, and two. I actually like working at home, and I miss it at
    times, but I found it difficult to trade with the chaos of children running around
    the house added to the mix.


    Now I have three apartments that are just four miles from home, and there’s one
    where I trade. The two others are where we operate our web sites, [TradeTheMarkets.com](http://TradeTheMarkets.com)
    and [SimplerOptions.com](http://SimplerOptions.com). We employ a team of about
    ten people now, and they’ll help out with the sites, they’ll do customer service,
    and a couple even help me out with analyzing trades.


    For the most part, though, I trade my accounts on my own and work on joint ventures
    with others, where we’ll combine forces to trade an account, and that’s a nice
    mix. It’s valuable as a trader to not only have the independence of trading your
    own account, but at the same time be involved and work with other human beings.
    It can be fun, too.


    **Bourquin:** Speaking of the business aspect of trading, have you ever thought
    about managing money?


    **Carter:** It’s funny you asked that, because I actually just started a commodity
    trading advisor [CTA] fund, called Razor Trading, as well as an options auto-trading
    service. Personally, I don’t mind taking a lot of risk in my own account, and
    even though investors will initially always say to go ahead and do the same for
    them, they’ll start freaking out as soon as they see the first drawdown. So, you
    really have to expect that and be prepared to deal with all the phone calls and
    e-mails that will come with it.


    When I think about how many people out there have money making 0 percent at their
    bank, however, it doesn’t have to be a huge fund. Even a small one that was making
    20 percent a year would be a valuable service for those folks, as well as a nice
    additional income stream, from a business point of view.


    **Bourquin:** Shifting back to your approach to trading again, do you do homework
    at night, and how much of your time is spent outside of market hours doing trading-related
    activities?


    **Carter:** Surprisingly little. I used to look at charts for hours upon hours,
    but now I just spend about forty-five minutes at the end of the day doing it—and
    a lot of times I record that as part of a nightly newsletter.


    I found that the reward is not proportional to the amount of time you spend staring
    at charts, which is strange, because conventional wisdom suggests that the more
    research you do, the more money you’re going to make. But that’s just not true
    in trading.


    What is true is that those who come in open minded and with no expectations about
    the market have a better chance of making money. I think it’s more important to
    have that going for you, so I always advocate things like exercise and other time
    away from the market so you can come back rested, relaxed, and ready to go, so
    to speak.'
  raw: '**Bourquin:** In talking to somebody recently, they said to me that if most
    traders would just stick with what they already do—instead of trying to jump around
    between markets, indicators, charts, or time frames—eventually they’d be likely
    to make money.


    The problems start when they try a few trades and don’t make money, so they move
    on to something else, and then another, and another… Do you agree that if most
    people just tried to master one thing, they would eventually get it?


    **Carter:** Absolutely, I do, and that’s exactly what happens. It’s like they’re
    continually moving toward the next bright and shiny object without first having
    a base or understanding of their trading philosophy and what they are trying to
    do.


    You can make a living with something as simple as a twenty-one-period moving average.
    You could actually look at that on five different markets, and that would be fine.
    If you’re not making money with one thing, however, and then you go try to do
    the same thing in some other market, guess what? You’re not going to make money
    there, either.


    **Bourquin:** Has your trading changed much over the past eight or nine years,
    considering the dot-com crash and everything else, or are you still doing much
    of the same thing?


    **Carter:** Gosh, that’s a good question. It hasn’t changed much, based only on
    the nature of the market, even though we don’t have a huge bull run like we did
    in the 1990s. I find I don’t hold positions as long, though. I now consider six
    weeks a long time to be in a trade, and from there, it is even shorter-term trading.
    Also, I’m more aggressive now about pulling money out of the market.


    I’ve found over time that I actually care much less about what I’m trading. I
    don’t think, “Well, I’m bullish on crude oil, so I’ll buy this to capitalize.”
    It’s all about looking for opportunities to take money out of the market, and
    a lot of that simply has to do with what you see. For example, if I see a market
    coming down really hard, I know there’s likely a lot of people getting flushed
    out of that market. I would look for an opportunity there, take it, and then get
    out. I can tell you that about 75 percent of the time I’m day trading, I am flat
    and am just waiting.


    **Bourquin:** Let’s talk about a garden-variety trade that you’d put on. What
    factors would lead you to take the trade?


    **Carter:** I recently took a textbook trade on MasterCard, which I really, really
    like. I look for stocks, say, after earnings or other news. MasterCard popped
    and made highs after earnings and then started to pull back. At that point, I
    was looking for the stock to turn around, try to retest, and break through the
    recent highs.


    I waited until the stock began to turn higher and then started scaling into that
    position. From there, I looked for a 127.2 percent Fibonacci extension of the
    move from the recent high to the retracement low after earnings. In this case,
    that was a potential $3 to $4 move, and that, to me, is a bread-and-butter trade.


    What happened next was I bought in and held the position overnight, and the next
    day, it pushed up, broke the previous day’s high, rallied up to that 127.2 percent
    extension, and that was where I got out. Now, it actually went up another ten
    points from there, but that was the setup and the move I wanted, so I’m happy
    to leave the extra money on the table.


    This same strategy works to the upside and the downside, and what I like about
    it is that you’re not sitting there, holding on for days while wondering where
    it’s going to go. You’ve got a specific setup and a specific target, and you only
    need to decide how many contracts you want to use to trade it.


    **Bourquin:** Will you take a trade on a stock purely for the technical setup,
    even if you have no idea what the company does, how their earnings look, and how
    other fundamental factors are shaping up?


    **Carter:** That’s a good question, but one that’s tough for me to answer, because
    I don’t trade a lot of stocks that I don’t know. Really, the top stocks in my
    universe include Apple, Google, Priceline, and other very actively traded, fast-moving
    stocks with plenty of liquidity in the options.


    I think, back in the day, it didn’t matter what the stock was, but I don’t run
    screens during the day just to find whatever stocks are making new highs that
    day or anything like that. I’ve got a universe of only about ten stocks, and I’ve
    gotten to know them very well. I watch them on an hourly chart, a fifteen-minute
    chart, and a five-minute chart, and there are plenty of opportunities just in
    that window.


    **Bourquin:** Do you trade from home or in an office setting?


    **Carter:** I have an office. I traded at home for a while, and then my wife had
    this weird affliction where she started having children! We have three small kids
    now, ages six, four, and two. I actually like working at home, and I miss it at
    times, but I found it difficult to trade with the chaos of children running around
    the house added to the mix.


    Now I have three apartments that are just four miles from home, and there’s one
    where I trade. The two others are where we operate our web sites, [TradeTheMarkets.com](http://TradeTheMarkets.com)
    and [SimplerOptions.com](http://SimplerOptions.com). We employ a team of about
    ten people now, and they’ll help out with the sites, they’ll do customer service,
    and a couple even help me out with analyzing trades.


    For the most part, though, I trade my accounts on my own and work on joint ventures
