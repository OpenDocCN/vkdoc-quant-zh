- fmt: '**Bourquin:** 当你提交辞呈时，他们强烈挽留。他们并未生气，而是希望你留下，甚至愿意提供晋升和迁居到国内其他地区的机会来留住你。听到这话，你犹豫了几周，但最终坚持了自己的决定，显然你一点也不后悔。那一步迈得很好，但当时做出这个决定确实非常艰难。


    **Carter:** 对，放弃有保障的收入，转而投入毫无保障的全职交易，是非常重大的一步。你还记得你是在哪一年做出这个转变的吗？


    **Bourquin:** 大约是1997年。


    **Carter:** 那是在整个互联网泡沫出现之前。我们聊聊你开始独立交易的头几天吧。感觉怎么样？


    **Bourquin:** 有点紧张。我记得第一天就亏了钱，部分原因是我过度兴奋了。我坐在电脑前，面前就开着`CNBC`，我以为自己能对新闻做出即时反应，但就是行不通。


    实际上，头几个星期相当难熬，所以我退后一步，重新专注于之前确实有效的方法，也就是以期权为中心的波段交易。


    从那时起，挑战在于如何在交易的同时学会这样做，因为以前，我下了单就去上班，所以不会每天盯着图表看。成为全职交易者的一个重要部分，就是学会不让不可避免的情绪搅乱你的交易。


    **Carter:** 没错。在这种情况下，交易者很容易在交易进行时开始摆弄止损或止盈目标。我发现，当我下了单之后离开电脑，反而赚得更多。


    那么，你一开始是做期权。从那时起，你是从期权转向了其他品种，还是仍然交易期权？


    **Bourquin:** 我整个交易生涯都专注于期权，但我也交易一些股票和期货。主要是，如果我做日内交易，我会专注于期货。但如果我建立一个计划持有更长时间的交易——哪怕只是两三天——我就会用期权。


    **Carter:** 在你转向全职交易之前，你是否先希望在账户里积累一定数额的资金？


    **Bourquin:** 是的，这是一个痛苦的故事。我当时认为10万到20万美元是我的理想数字，并且一度确实达到了15万美元。那是经历了很多起伏，赚了很多钱又都亏回去之后的结果。


    那一次，我有15万美元，并且保持了大约六个月。每周结束时，我都会取出利润。如果是2000美元，我就取出来；如果是1万美元，我也取出来。如果我有一周表现不佳并亏了钱，那么我必须先交易回15万美元，然后才能再次开始取出利润。


    我当时状态很好，而且我和未婚妻住在明尼苏达州，因为我在公司内部得到了晋升。那是一月份，我们被困在公寓里，外面大概零下八十度，我的未婚妻，她以前从未见过雪，对我说：“伙计，如果你不给我们弄一栋带暖车库的房子，我就走人！”


    于是，我找到了一栋带暖车库的房子，并决定支付3万美元的首付。这笔钱必须从我的交易账户里出，因为那时，我把大部分交易利润都用来收集老硬币了。即使到今天，我仍然是个狂热收藏家，但我买的是旧银元或金币，它们流动性不强。你必须持有它们好几年，即便如此，买卖价差也相当大。事后看来，那并不是最好的投资。


    就在我打算从交易账户里取出那笔钱的大约一周前，我坐在那里思考这件事，决定做几笔激进的交易，把我的账户做到18万美元。这样，我就可以从账户里取出3万美元，同时还能保留15万美元的余额。


    我只有一个星期的时间，第二天，我看到股市上涨到了一个非常关键的压力位，于是我买了一些`OEX`期权，并把账户里一半的资金都投入了这笔交易。嗯，它马上就见效了，我在五分钟内就赚了大约8000美元！我当时想：“太好了，这事很快就能搞定了。”


    然后市场再次飙升，而期权价格跌到了7.50美元。因为我第一批是以8美元买入的，我想：“哇，这价格真不错”，于是又买了100份，并打算就此退出交易。我交易的时间已经够长了，知道如果这笔交易在收盘时对我不利，我就会离场，甚至不考虑持仓过夜。


    收盘时，我赚了大约1万到1.1万美元，我想：“太好了，只要开盘能稍微好一点，我就离场，钱就到手了。” 结果，第二天早上，道琼斯指数跳空高开150点，然后整天横盘整理。它收盘时创下了历史最高点，在接下来的四天里，市场猛烈上涨。我几乎不记得那四天了，但感觉糟透了。


    我只记得，突然间，就到了我们本应为房子过户的前一天，我需要钱，所以我不得不打电话给经纪商，平掉了那笔交易。我的账户从15万美元跌到了大约8000美元。期权价格从大约8美元跌到了70美分。太惨烈了。几乎整个账户都亏光了。


    在那个时候，我绝不可能告诉我未婚妻我做了什么，于是我去了银行，刷爆了所有信用卡，刚好凑够了首付，我们最终买下了那栋房子。但那是一件非常严重的事情，真的让我开始反思。


    幸运的是，我积累了一些硬币，也买了一些房产，所以我能够变现一些资产，为另一个交易账户注资，但我真的必须坐下来问问自己：“你到底在干什么？” 那是一次痛彻心扉的经历，因为在我非常需要钱的时候，我亏掉了它。


    **Carter:** 哇，所以这基本上是一个价值14.2万美元的教训，告诉你为什么永远不要在亏损的交易上加仓，或者不设置止损。在那之后，你就成为一名日内交易者了吗？


    **Bourquin:** 令人惊讶的是，没有。我认识到，在那个特定情况下，我交易只是为了赚3万美元来付房款。我并没有像应该做的那样去交易交易设置。所以，给我的教训不是要害怕市场，也不是我不应该持仓过夜。教训就是，要始终保持专注，只交易交易设置。


    你不能坐在那里，试图从市场中榨取特定数额的钱。如果你这样做了，就可能会犯那种错误。


    如果当时我做那笔`OEX`交易时只开10张合约，即使走势对我不利，我也只会被止损出局，那也没关系。但相反，我试图赚3万美元，这是我压倒一切的考虑。这也正是毁掉一切的原因。


    即使经历了那次事件，我的交易风格也完全没有改变。但我绝对明白了，你不能坐在那里，试图从市场中提取特定数额的钱。


    **Bourquin:** 你会对那些进入市场，甚至设定每天只赚100美元目标的人说，他们的方法错了吗？


    **Carter:** 是的。它行不通的原因是你不会把它看作每天100美元。人们开始把这个数字推演到一年。他们说：“好吧，我只想每天赚100美元，或者每天赚500美元”，然后他们就想：“哇，那一年就是10万美元！”
    突然间，他们想着每年10万美元，当他们遇到一笔正在亏损的交易时，这真的会搞砸他们。'
  raw: 'When I put in my notice, they came back pushing hard. They weren’t mad, but
    they wanted me to stay, and they were willing to offer a promotion and even relocation
    to another part of the country to keep me. After hearing that, I waffled for a
    couple weeks about the decision, but I ended up sticking to my guns, and I obviously
    don’t regret it at all. It was a great move, but it was very difficult at the
    time to take that step.


    **Bourquin:** Sure, walking away from guaranteed income and trading full-time,
    where nothing is guaranteed, is a very big step. Do you remember what year it
    was when you made the transition?


    **Carter:** It was right around 1997.


    **Bourquin:** That’s before the whole internet bubble came to be. Let’s talk about
    the first couple of days you spent trading on your own. What was it like?


    **Carter:** It was a little nerve-racking. I remember I lost money on the first
    day, partly because I was overexcited. I had CNBC on right in front of me while
    I sat at my computer, and I thought I could just react to the news, but that just
    didn’t work.


    Actually, the first couple of weeks were pretty tough, so I took a step back and
    recommitted to doing what I was doing before that *was* working, which was centered
    on swing trading with options.


    From there, the challenge was to learn how to do that while trading, because before,
    I would place a trade and then go to work, so I wouldn’t stare at the chart every
    day. A big part of becoming a full-time trader is learning not to let the inevitable
    emotions screw up your trades.


    **Bourquin:** Right. It’s common for traders to start fiddling with stops or profit
    targets while trades are going on under those conditions. I’ve found that when
    I walk away from a trade after I have put it on, I actually make more money.


    Now, you started out with options. Did you switch over from options to other things
    at that point, or do you still trade options?


    **Carter:** I’ve been focused on options throughout my entire trading career,
    but I do trade some stocks and futures as well. Primarily, if I’m day trading,
    I focus on futures. But if I set up a trade that I plan to be in for longer—even
    if it’s just two to three days—I’ll use options.


    **Bourquin:** Before you made the move to trading full-time, did you first want
    to build up a certain amount of money in your account?


    **Carter:** Yes, and this is a painful story. I thought between $100,000 and $200,000
    was the magic number for me, and at one point, I did get up to $150,000\. That
    was after many ups and downs, and after making a lot of money and giving it back.


    This particular time, I had $150,000, and I kept it for about six months or so.
    At the end of every week, I’d take out profits. If it was $2,000, I’d take it
    out, or if it was $10,000, I’d take it out. If I had a down week and lost money,
    then I had to trade back up to that $150,000 before I could start taking profits
    out again.


    I was in a nice groove, and at the time, my fiancée and I were living in Minnesota,
    after I’d been promoted within the company. It was January, we were stuck in our
    apartment, it was about eighty degrees below zero outside, and my fiancée, who
    had never seen snow before, said to me, “Dude, if you don’t get us a house with
    a heated garage, I’m out of here!”


    So, I found a house with a heated garage and decided to put $30,000 down on it.
    The money was going to have to come out of my trading account, because back then,
    I put much of my trading profits toward collecting old coins. Even to this day,
    I’m still an avid collector, but I’d buy old silver dollars or gold coins, and
    they weren’t really liquid. You had to hold on to them for years, and even then,
    the bid-ask spread was pretty wide. In retrospect, that wasn’t really the best
    investment.


    About a week before I was going to take that money out of my trading account,
    I was sitting there, thinking about it, and decided to take a couple of aggressive
    trades to build up my account to $180,000\. That way, I could pull $30,000 out
    of the account and still keep the $150,000 balance.


    I only had a week to work with, and the next day, I saw the stock market rallying
    up to a very key resistance point, so I bought some OEX options and put half my
    account into this trade. Well, it immediately started working out, and I was up
    about $8,000 within five minutes! I was thinking, “Great, this is going to work
    out fairly quickly.”


    Then the market spiked back up again, and the options dropped to $7.50\. Since
    I had bought the first batch at $8, I thought, “Wow, that’s a great price,” so
    I bought another hundred and figured I’d be out of the trade. I had been trading
    long enough to know that if this trade went against me into the close, I’d get
    out and not even consider holding it overnight.


    At the close, I was up about $10,000 or $11,000, and I thought, “Great, if we
    just get a nice little open, I’m out of here, and I’ve got my money.” Well, the
    next morning, the Dow gapped up 150 points and traded sideways all day. It closed
    at its highest level ever, and for the next four days, the market rallied hard.
    I barely even remember those four days, but it was horrible.


    I do remember that, suddenly, it was the day before we were supposed to close
    on the house, and I needed money, so I had to call the broker and just get out
    of that trade. My account went from $150,000 down to about $8,000\. The options
    went down from around eight bucks to seventy cents. It was brutal. Nearly the
    entire account was gone.


    At that point, there was no way I was going to tell my fiancée what I had just
    done, so I went to the bank, maxed out all of my credit cards, had just enough
    money for the down payment, and we ended up getting the house. But that was some
    serious stuff that really made me do some soul searching.


    I was fortunate in that I had accumulated some coins and bought some real estate,
    so I could liquidate some assets and fund another trading account, but I really
    had to sit there and ask myself, “What the hell are you doing?” That was a gut-wrenching
    experience, because I lost money at a time when I really needed it.


    **Bourquin:** Wow, so that was basically a $142,000 lesson in why you should never
    add to a losing trade or run your stops. Did you just become a day trader after
    that?


    **Carter:** Surprisingly, no. I recognized that in that particular instance, I
    was trading only to make $30,000 for a house payment. I wasn’t trading the setup
    like I should’ve been. So, the lesson for me wasn’t to be scared of the market,
    and it wasn’t that I shouldn’t hold overnight. It was just to stay focused only
    on trading the setup.


    You can’t sit there and try to extract a specific amount of money from the market,
    and if you do, those are the kinds of mistakes that can happen.


    If I would have taken that OEX trade and put on ten contracts, even if it went
    against me, I just would have been stopped out, and that would’ve been fine. Instead,
    I was trying to make $30,000, and that was my overriding concern. That’s also
    what destroyed everything.


    Even after that experience, my trading style didn’t change at all. But I definitely
    came away knowing that you can’t sit there and try to pull specific sums of money
    out of the market.


    **Bourquin:** Would you tell people who come in targeting even $100 a day in the
    market that they’re going about it the wrong way?


    **Carter:** Yes. The reason it doesn’t work is because you don’t think of it as
    $100 a day. People start to extrapolate that over the course of a year. They say,
    “Okay, all I want to do is make $100 a day, or $500 a day,” and then they think,
    “Wow, that’s like $100,000 a year!” Suddenly, they’re thinking about $100,000
    a year, and when they’re having a losing trade, that can really screw them up.'
