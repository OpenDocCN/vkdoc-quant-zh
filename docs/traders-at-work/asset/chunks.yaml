  trans: '

    # 我曾是一名苦苦挣扎的职业选手。我投身其中整整三年，虽然有所进步，但进步的速度远未达到我的预期。那真是一种煎熬。这意味着大量的旅行和四海为家的生活，意味着长时间的工作和有限的收入，尤其是如果你不能每个周末都出现在电视上的话。因此，我的动力消退了，因为我的付出并没有换来相应的成果。


    然而，在这一路上，我接触到了市场。我和妻子在 1998 年结婚，当时我们有一些积蓄，没有债务，那是一个巨大的优势。我们决定用这笔储蓄投资，建立一个应急基金。因为我们很年轻，觉得假以时日，真的可以在财富积累上领先于曲线。


    我们在 1998 年夏天，就在对冲基金长期资本管理公司在八月崩溃之前，与一位本地经纪人见面，投资了一些共同基金。那次崩盘拖累了整个市场走低，我们的共同基金也因此受到波及，损失了我们一部分储蓄。


    这件事让我很不舒服，于是我决定亲自上阵。我几乎每晚都去巴诺书店，如饥似渴地阅读我能找到的所有投资和交易方面的书籍与杂志。没过多久，我就把钱从那些共同基金里撤了出来，开始自己跟踪个股。


    然而，就像每一位新手投资者或交易员一样，我犯了很多错误。但在 1999 年和 2000 年初，在整个互联网泡沫时期，市场因为过分强劲而原谅了这些错误。


    到了 2000 年年中，我的交易做得相当成功，就在那时，我决定从打高尔夫球转为以交易为生。


    **布尔昆：** 我觉得你把巡回赛职业球员的生活形容为“煎熬”很有趣。高尔夫和交易之间存在着一种有趣的类比，我相信你也看到了。人们通常以为以交易为生是一种光鲜亮丽的生活方式，就像他们想象旅行和每天打高尔夫球很风光一样。


    **怀特：** 完全正确，我很高兴你提到了这一点，因为高尔夫和交易都有很多需要“磨砺”的地方。唯一真正的区别是，交易的时候有空调！


    我发现两者都有艰难时期。有时候，你投入了很长的时间却没有任何报酬。不过，在任何自主导向和自雇的事业中，也常常会出现类似的情况。


    **布尔昆：** 高尔夫和交易也能让你在鸡尾酒会上成为真正的主角！当你在巡回赛时，人们是否认为你在过着梦幻般的生活？现在，当你告诉他们你是一名交易员时，他们是否也这么说？


    **怀特：** 是的。不知为何，人们觉得这有趣得多，但我可以告诉你，我的生活可能并不比他们的更有趣。


    **布尔昆：** 我们来谈谈你转型为全职交易员的过程，以及你是如何开始起步的。


    **怀特：** 我走进了一家在我居住的南得克萨斯的日内交易公司，里面有好几十位交易员。他们使用的软件非常复杂，我从未见过，而且他们能使用我无法获得的杠杆，这让他们获得了比我这种交易员更独特的优势。


    那是一家零售交易公司。每个人都在交易自己的账户，但大家同在一个大房间里，交流思想的氛围绝佳。人们会在建仓或平仓时喊出自己的交易，或者指出某个市场正在形成更高的高点和更高的低点，又或者宣布即将发布某个经济数据。有很多双眼睛从不同角度观察着市场。


    那是一个极好的环境，帮助我作为交易员学习和成长。在那之前，我已经做了几年的兼职交易员，但进入全职交易时，我还有很多东西要学。即使是很多年后的今天，我仍有更多的东西要学。


    在那种环境中，你接触到很多交易员和许多不同的交易方法。有些是动量交易者，有些是回调买入者，还有一些喜欢做反转交易。你还会遇到不同时间周期的人。有些是日内交易者，有些是波段交易者，还有些是头寸交易者。通过持续互动并理解哪些策略在特定条件下有效，我的知识和经验水平迅速提升。


    不过，也许最重要的是，我从周围人犯的错误中学到了最多的东西。那是一个市场从强劲牛市转变为熊市的时期。随着价格走低，这要求人们去适应，因为市场不再会自己“拯救”糟糕的交易。


    我特别记得一位交易员，他大约连续六周每天都赚钱，没有一天是亏损的。基本上，他是在逆着极端的新闻驱动动量操作。所以，当一只股票在新闻报道后飙升时，他就会开始逐步建立空头头寸，等待那“必然”的初始回调。


    他可以动用大量杠杆，但要让这些交易成功，他必须精准地把握入场时机，逐步加仓，并且在他时机把握不好时，不断向亏损的头寸加仓。最终，他总会等到那个回调，这能帮他摆脱一些深套。他可能亏损了两万美元，最后却能平掉一笔只赚五百美元的单子。


    **布尔昆：** 尽管这真的是一个非常坏的习惯……


    **怀特：** 确实如此，但每一笔盈利的交易只会放大他的信心。他仿佛是在和市场玩“胆小鬼游戏”，但不知怎地，却总能赢。


    然而，有一天，这一切都结束了。他在一只生物科技股上，仅仅几个小时就亏掉了十八万六千美元。那只股票在一条新闻标题出现后开始自由落体式下跌。他不停地买入加仓，直到耗尽所有购买力，办公室的经纪人不得不因为他的账户里没钱了而帮他平仓。


    看到有人这样自我毁灭是令人难以接受的，这件事让我学到了很多东西，关于许多交易员对“准确率”的重视——或者说过度重视。这是一个比我见过的任何人都更“准确”的家伙，然而就连他也因为对风险和仓位控制掉以轻心而爆仓了。


    我如今采用的许多方法，都根植于我早期的经验以及我从观察其他交易员，尤其是像这样类似案例中学到的教训。


    **布尔昆：** 在交易中，你会接触到很多不同的方法。虽然有些人像你一样，会吸收所学并发展出自己的策略，但也有其他人，总是在追逐最新潮的东西。你如何平衡追逐当下看来有效的方法，以及吸收外部信息来创建自己未来可靠策略之间的关系？


    **怀特：** 我认为人们很容易试图一次性学习太多东西，尤其是当你是一个较新的交易员时。你明白有许多不同的时间周期和技术可供选择，所以你每样都尝试一点，并不断地从一个切换到另一个。最终，你只会让自己更加困惑，这样你实际上无法学习或取得进步。


    我学会了让市场来决定应该关注哪些交易机会，然后，自然而然地，随着时间的推移，你会学到你需要学的东西。这会带来更大的一致性，并且消除了同时学习多种策略的必要性。


    我的建议是，着手去做当时市场正在回报的交易，同时也要留意当这种交易不再有效的时候，因为那时你可能需要调整并学习新东西了。


    **布尔昆：** 这是否意味着你应该掌握五六种不同的策略，以便无论当时市场环境如何，你都有一个武器库可供选择？

    '
- fmt: '**White:** 当然，但你需要随着时间的推移逐步建立这种能力。即使只有少数几种策略也足够了。你只是不想成为一个“只会一招”的交易者。


    市场不会永远奖励同一种策略，当市场条件发生变化而你的策略没有改变时，你只有两个选择：亏损并感到沮丧，或者在场外观望，无限期地等待市场回到适合你单一策略的状态。


    当市场条件变化时，拥有可以切换的其他策略将带来巨大的好处。仅仅三、四或五种你偏爱的交易手法听起来可能不多，但如果它们彼此之间有足够的差异，就能让你在任何市场条件下灵活操作、游刃有余。


    **Bourquin:** 有时交易者在用某一种策略连续交易几次失利后，就很难再执行下一笔交易。你怎么知道市场条件已经改变，并且是时候切换策略了？例如，从动量策略切换到区间交易策略。


    **White:** 对我来说，这是一种感觉，我没有固定的公式来告诉我条件何时改变。我首先必须对每个头寸保持客观，持续评估价格和成交量行为，看看这些信号是否仍然支持我持有该头寸。


    此外，我还必须对整体市场环境保持客观，了解我们是处于趋势行情、动量行情、区间震荡，还是完全缺乏方向。然后，根据当前条件，我需要明白哪些策略将表现最佳。


    连续亏损四、五笔交易是会发生的。这是交易的一部分。不过，当这种情况发生时，重要的是迅速采取行动，通过适当缩减头寸来保护你的信心和账户。然后，你应该退后一步，识别大局以及导致亏损交易的原因。不要仅仅因为连续亏损就认为你的策略失效了。


    **Bourquin:** 关于你在那家交易公司工作的经历，最后想问一下，你是何时决定离开那个环境，开始独立交易的？


    **White:** 当圣安东尼奥的办公室关闭时，这个决定几乎是被迫做出的。我2000年在那里开始工作时，大约有四十名交易员，但到2002年我离开时，只剩下我们几个人了。


    这是一场市场主导的淘汰过程。显然，可交易的股票范围大幅缩小，动量消退了，迫使交易员们去适应。许多人亏光了钱，其他人则耗尽了时间。因为他们不再盈利，所以不得不回去做其他工作。


    那间办公室关闭后，我通勤到他们在奥斯汀的一个办公室，因为我仍然希望和其他交易员待在一起。我喜欢那种团队情谊。我喜欢互动和思想交流。这又持续了几年，但那个团队也逐渐缩减了。


    在那之前，我一直对在家交易感到不安，因为我对自己的设备缺乏信心。但到了那个时候，互联网的速度和可靠性已经大幅提升，这让我可以在家交易，同时还能在一天中与其他交易员保持沟通。所以，在2004年，我停止了通勤，成为了一名居家交易者。


    **Bourquin:** 尽管技术和工具和你之前在办公室环境中使用的相同，但在不再有其他交易员围绕的情况下，这种转变感觉如何？


    **White:** 这很艰难，与其说是纪律或保持交易专注力方面的困难，不如说是我怀念那种互动。


    交易是一项非常孤独的职业，我怀念与人交流的机会，哪怕只是一起吃个午饭。然而，与此同时，那段时间无疑让我作为交易员得到了学习和成长。


    **Bourquin:** 现在我们来谈谈策略。首先，当你转向居家交易时，你的策略有没有发生变化？


    **White:** 我的交易大约在那段时间确实发生了变化，但这并非基于我的地点，而是因为市场本身已经改变了。正如我提到的，可供交易的股票范围小了很多，我发现为了达到期望的回报水平而承担的风险也发生了实质性的变化。


    最初，我可以用承担1单位风险来赚取3或4单位收益，并且做得很好。随着市场被压缩，日内价格波动不再那么剧烈，我发现我不得不开始拉长我的时间框架。


    在那之后，我开始做更多的波段交易，我会隔夜持有头寸，寻找持续数天的行情，而不是只在大约两小时内进出的短线情境交易。这对我来说绝对是一个巨大的转变。


    **Bourquin:** 那么，你会不会说你现在更像一个寻求更大、更长期走势的波段交易者，而不是一个日内交易者？


    **White:** 是的，我更像一个波段交易者，但我仍然会做日内交易。我喜欢在不同的时间框架操作，因为我觉得那里总有机会。


    我更喜欢波段交易，因为我倾向于过度管理股票。例如，在做日内交易时，我自然会关注逐笔成交的细节，这让我更难持有盈利的头寸，因为我无法像做波段交易那样，设置好挂单后就不再干预，直到价格触及我的参数。


    在这两种时间框架下，我在止损方面都非常自律，但能够更好地管理盈利头寸，这正是我偏爱波段交易而非日内交易的原因。


    **Bourquin:** 你能大致介绍一下你是如何安排交易日的吗？在市场收盘后，你如何进行“功课”？你寻找哪些信号来发现好的交易机会？


    **White:** 因为我住在德克萨斯州，市场每天在中央时间下午3:00收盘，所以收盘后我会立即回顾当天做的交易，看看哪些地方做得好，并总结当天行情带来的教训，以便未来改进。


    然后，我会把注意力转向研究和翻看图表，为第二天的交易做准备。我从指数开始，主要关注`NASDAQ`和`S&P 500`，但也会看看`Russell 2000`，偶尔也看`Dow`。


    我想知道大盘在做什么，重要的价位在哪里，以及我们处于怎样的市场环境中。例如，是否存在动量？我会识别出这一点，然后判断市场方向，因为我知道个股与整体市场之间存在相关性。


    我会翻阅大量图表，并在价格和成交量方面保持一些非常基本的筛选标准。我喜欢交易价格至少在两位数、且日均成交量在50万股或以上的股票。这会过滤掉许多低价和低成交量的股票，留下流动性更强、更有可能波动的股票。


    我每天花大量时间手动查看几百张图表。软件让这个过程变得容易得多，但我实际上很享受寻找优良交易形态的过程，并且觉得通过这种方式进行研究，能让我对当时整体市场的潜在强势、弱势或犹豫有更好的感觉。


    在初步筛选时，我会把任何看起来有趣的图表单独放一边，这通常会留下一份包含三四十只股票的短名单。随后，我会回头仔细研究这些股票，同时尝试识别形态、关键价位以及任何潜在的交易机会。在这个阶段，我会思考在何处入场建立特定头寸，以及在何处我需要退出。


    **Bourquin:** 你会使用前期高点和低点、枢轴点，还是其他方法来决定入场和出场点？


    **White:** 我会画很多趋势线，但就指标而言，我的图表非常简洁和基础。我真正看重的是价格和成交量，所以我使用的任何指标都仅仅源自于它们。'
  raw: '**White:** Absolutely, but you build up to that over time. Even a handful
    of strategies can be enough. You just don’t want to be a one-trick pony.


    The market isn’t going to reward the same strategy forever, and when conditions
    change and your strategy doesn’t, you only have two choices: lose money and become
    frustrated, or sit on the sidelines and wait indefinitely until the market comes
    back around to suit your lone strategy.


    Having something else to roll into when conditions change can be an incredible
    benefit. Just three, four, or five favorite plays may not sound like much, but
    if they differ enough from one another, they can enable you to maneuver and navigate
    any market condition.


    **Bourquin:** Sometimes traders have trouble taking the next trade after a string
    of trades they’ve made with one type of strategy goes against them. How do you
    know that market conditions have changed and it’s time to switch, for example,
    from a momentum strategy to a range-trading strategy?


    **White:** For me, it’s a feel thing, and I don’t have a set formula that tells
    me when conditions have changed. I must first be objective about each position,
    continually evaluating the price and volume action to see if those signals still
    warrant staying with that position.


    Also, I have to be objective about the overall market environment and understand
    whether we’re trending, momentum-based, caught in a range, or if there is complete
    indecision. Then, depending on the current conditions, I need to understand which
    strategies will work the best.


    Having four or five losing trades in a row will happen. That’s part of this business.
    When it does happen, though, it’s important to act quickly to protect your confidence—and
    your account—by scaling back on your positions a bit. Then you should step back
    to identify the big picture and what’s causing the losing trades. Don’t take a
    losing streak alone as a sign that your strategy is no longer working.


    **Bourquin:** To close the loop on your time spent working at that trading firm,
    when did you decide to leave that environment and start trading on your own?


    **White:** That decision was almost made for me when the office in San Antonio
    closed. I started there in 2000, when there were about forty traders, but by the
    time I left in 2002, there were only a few of us left.


    It was a process of elimination by the market. Obviously, the universe of tradable
    stocks really shrunk, and momentum died down, forcing traders to adapt. Many lost
    their money, and others just ran out of time. Since they weren’t making money
    anymore, they needed to go back to other work.


    After that office closed, I commuted to one of their offices in Austin, because
    I still wanted to be around other traders. I loved that camaraderie. I loved the
    interaction and the flow of ideas. That lasted for another couple of years, but
    that group also dwindled down.


    Until that point, I had been uncomfortable trading from home because I wasn’t
    confident in my equipment. By that time, though, the speed and reliability of
    the internet was much improved, and that allowed me to trade at home and still
    communicate with other traders throughout the day. So, in 2004, I stopped commuting
    and became a home-based trader.


    **Bourquin:** Even though the technology and tools were the same as the ones you
    had before in the office setting, how was the transition, in terms of not having
    other traders around you anymore?


    **White:** It was tough, not so much in terms of discipline or my ability to stay
    focused on trading, but I missed the interaction.


    Trading is a very solitary occupation, and I missed having the opportunity to
    interact with people, even if it was just having lunch together. At the same time,
    however, that was definitely a time that made me learn and grow as a trader.


    **Bourquin:** Let’s talk strategy now. First of all, did your strategy change
    at all when you made the transition to home-based trading?


    **White:** My trading did change around that time, but it wasn’t based on my location.
    Instead, it was because the market itself had changed. As I mentioned, there was
    a much smaller universe of stocks to trade, and I found that the risk I was putting
    on to achieve the desired level of reward had really changed.


    Initially, I could risk one to make three or four, and I had done very well with
    that. As the market got compressed and intraday prices weren’t fluctuating as
    much, I found that I had to start zooming out on my time frame.


    After that, I began doing a lot more swing trading, and I would hold positions
    overnight and look for multiday moves instead of just situational trades I could
    enter and exit within the span of about two hours. That was definitely a big shift
    for me.


    **Bourquin:** So, would you say that you’re now more of a swing trader who looks
    for bigger, long-term moves, as opposed to a day trader?


    **White:** Yes, I’m more of a swing trader, but I still day trade, too. I like
    to operate on different time frames, because I feel there is always opportunity
    there.


    I prefer the swing trades, because my tendency is to micromanage stocks. For example,
    when day trading, I’m naturally watching the tick-by-tick action, and it’s tougher
    for me to stay in winning trades because I can’t just bracket orders and leave
    the trade alone until it hits my parameters, like I would with a swing trade.


    I’m very disciplined with cutting losses in both time frames, but the ability
    to better manage winning positions is why I favor swing trades over day trades.


    **Bourquin:** Can you give a general idea of how you structure your trading day?
    How do you go about your “homework” when the market is closed, and what do you
    look for to signal good trading opportunities?


    **White:** Being located in Texas, the market closes each day at 3:00 p.m. central
    time, so right after the close, I review the trades I took that day to see what
    I did well and brush up on any lessons I need to take from the day’s action to
    improve my results going forward.


    I then turn my attention toward research and dig through charts to help my planning
    for the following day. I start with the indices, and I primarily look at the NASDAQ
    and S&P 500, but I’ll also look over the Russell 2000 and occasionally the Dow.


    I want to know what the broad market is doing, where the important levels are,
    and what type of environment we are in. For example, is there a presence or an
    absence of momentum? I’ll identify that and then determine what direction we are
    heading, because I know there is going to be a correlation between individual
    stocks and the overall market.


    I look through a lot of charts and maintain some very basic criteria, in terms
    of price and volume. I like trading stocks that are at least double digits in
    price and have an average daily volume of a half-million shares or more. That
    filters out many low-priced and low-volume stocks, leaving those that are more
    liquid and likely to move.


    I spend considerable time every day looking through several hundred charts and
    manually reviewing them. Software makes the process much easier, but I actually
    enjoy hunting for great setups and feel like doing the research this way gives
    me a better feel for the underlying strength, weakness, or indecision in the overall
    market at the time.


    I set aside any charts that look interesting on my initial pass, and that usually
    leaves a short list of thirty or forty stocks I’ll then go back over while trying
    to identify patterns, key levels, and any potential trade opportunities. At this
    stage, I’m thinking about where to enter a particular position and where I’d need
    to get out.


    **Bourquin:** Do you use previous highs and lows, pivots, or some other method
    for determining entry and exit points?


    **White:** I draw a lot of trend lines, but my charts are very clean and basic,
    in terms of indicators. I really like price and volume, so any indicators I use
    are derived just from those.'
