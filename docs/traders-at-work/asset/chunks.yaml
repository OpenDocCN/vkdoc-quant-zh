  trans: '**戈登：** 没错，正是如此。我只是沿用之前让我取得成功的那套商业模式。如果我们发布一个研究性交易建议，我们必定会用数小时的图表分析、相关性和推理来支持它。我们的研究客户在看到我们执行交易时丝毫不会感到惊讶，因为在此之前，我们通常已经花费数小时甚至数天，一步步向他们阐明交易背后的来龙去脉。我和戴夫还创办了一家名为`FGP`的资产管理公司
    [弗洛伊德、戈登与合伙人]，我们有一些投资者，所以我们也会在那里执行我们的交易思路。


    我们始终认为，既然要向客户提供研究和交易思路，就没有理由不对这些思路怀有足够的信心，并据此进行实盘交易。我们对自己的研究充满信心，因此实际执行这些交易是合情合理的。我们为投资者赚钱，同时也为我们业务的研究方面增添了另一层可信度。


    我确信，有些人在客户面前是一套说辞，在自己的账户里却是另一套操作。我想晚上能睡个安稳觉，问心无愧。如果我对客户宣讲某个观点，那我就应该愿意把自己的钱投在这些想法后面。


    **布尔昆：** 我认为很多人都在做投资通讯，并在推特或博客上发布交易建议。他们可能会发布一个建议，告诉你他们在交易什么，但却不给你解释背后的理由。也许是因为他们担心，如果告诉追随者自己的“独家秘诀”，客户或订阅者就会流失。但你似乎没有这个问题。你会精确地解释其背后的理由，以及你为什么要做这笔交易。


    **戈登：** 这让我想起了尼克·诺特主演的电影《火爆教头》。你看过那部电影吗？片中，尼克·诺特饰演篮球教练，正在给他的球队做赛前动员。他告诉队员，在他看来，他可以走到对方教练面前，把他们的战术手册和赢得比赛的整个策略都交给对方。这都没关系，因为计划和策略并不是最重要的部分。计划和策略的执行与实施才是关键。把计划落实到位的能力才是赢得比赛的关键。交易中没有圣杯。没有哪种策略是独一无二或从未被尝试过的。相信我，在策略方面，天底下没有什么新鲜事。一切都关乎你的技能、你的纪律和你的执行力。


    我真希望我的每一位研究客户都能确切了解我所知道的交易方式，但这并不会让他们成为最优秀的交易员。他们必须具备纪律性和执行技巧，而这只有通过大量的重复和实践才能获得。


    **布尔昆：** 很多自己交易账户的交易员都梦想着全职交易，或者为对冲基金交易。当你用基金交易时，与你用自己的个人账户交易相比，交易方式会有所不同吗？


    **戈登：** 这是个有趣的问题。我听说有些交易员在管理基金时会更加谨慎，而在自己的个人账户里会承担更多风险。但对我来说，我的策略就是我的策略，风险不会因为我是用基金还是自己的钱交易而改变。当然，我在对冲基金中交易的规模要大得多。但风险和方法与我的个人账户完全相同。对我来说，如果你相信自己的交易思路，并且已经证明它们有效，那就没有理由在你交易的不同账户中承担更多或更少的风险。这只是一个数字游戏。如果你的策略规定你在一笔交易中承担
    2%的风险，那么所有改变的是这 2%在不同规模账户（个人或对冲基金）中所代表的美元金额。


    我们为我们的客户有一套完整的“T 评级”思想体系。我们帮助他们为他们自己和他们的交易账户建立一个风险档案。我们帮助他们确定他们在市场中的目标，然后找出一种策略，该策略将产生他们在交易中愿意承担的百分比风险。这只是一个数字游戏。你以同样的方式执行。无论你拥有大量资金还是少量资金，这都无关紧要，一切都基于你在交易中的目标以及你在每笔交易中的百分比风险。然后，你只需执行该策略即可。


    **布尔昆：** 对于刚刚开始交易并希望将学习曲线从五年缩短的人，你有什么建议？有办法做到吗？我不想说“捷径”，因为我不知道是否真的存在捷径，但如果你现在重新开始，你会有什么不同的做法吗？


    **戈登：** 不，我不会改变任何事情。交易是一项技能游戏。提高任何技能的唯一方法就是练习、纪律和大量的重复。你需要一段时间才能变得更好，每个想要持续赚钱的人都必须明白这一点。没有“天生的”交易员。有些人可能比其他人学得快，但没有人一上手就能立刻暴富。这就像学下棋一样：你需要投入数年时间，付出大量努力，才能与这个领域的顶尖高手一较高下，就像任何技能游戏一样。不幸的是，没有捷径。


    另一方面，你可以通过勤奋努力变得擅长此事。这很有趣，但这是一个过程。我只想对人们说，不要，请原谅我的措辞，不要半途而废。如果你想成为一个好的交易员，就要全心投入，持续学习，并努力去追求。这不是你能花钱请人替你做的事情。如果你不愿意付出努力——至少每天几个小时——世界上最好的聊天室或选股服务也无法把你变成一个优秀的交易员。如果你想为了娱乐而交易，那没问题，但如果你想做得好，并以此为生或在市场中开创一番事业，那就像其他任何事情一样，你必须为之努力。


    **布尔昆：** 谈谈你典型的一天交易情况。外汇市场很艰难，因为它每周五天半、每天二十四小时都在交易。从生活方式的角度来看，这一定很艰难。


    **戈登：** 是的，在外汇交易中你可以不分昼夜地交易，但我们的交易方式意味着我们不必那样做。如果你是一个日内交易者，快进快出，交易伦敦、亚洲和纽约时段，你可能睡不了多少觉。但如今，除了货币之外，许多东西都在全天候交易。也许你热衷于股指期货，交易`DAX`和`S&P`，然后在亚洲时段交易`Nikkei`。我们当然不会熬夜交易。


    在我们的头寸中，我们会持有交易，时间从半个交易时段到两三个交易时段不等。例如，我们自周三以来一直在做澳元交易。现在是周五，我们打算将其中一部分头寸持仓过周末。如果我们有一笔大交易，我可能会在晚上起床查看一下。我会给自己设个闹钟，这样如果价格达到某个点位，它就会叫醒我。但实际上，可能十到十五个交易日的晚上，我才会有一次真正起来看看市场。我们已经设置了止损和获利目标，所以我不会痴迷于头寸。我们设置交易的方式是让它们超越盘中价格走势。我们把止损设得足够远，并且这已经内置在风险档案中，这样一夜之间的数据报告就不会真正影响我们的交易。'
- fmt: '# 访谈：交易员的日常与策略


    While trading has become more global and information is released around the clock,
    this doesn’t mean we need to be constantly monitoring positions in a way that
    adversely affects our lifestyle. As a new trader, you can certainly carry a full-time
    job and trade part-time. If you want to go full-time in trading, fine, but you
    need to start with a significant size of account. More than most people realize.


    **Bourquin:** Good point. How much money does somebody need to start with to try
    to trade full time?


    **Gordon:** You definitely need at least six figures. If you want to try to make
    a go at this, I’d say you need $200,000 to $250,000 in your trading account. That’s
    separate from a savings account you can use to pay bills. I’d also recommend you
    trade part-time for several years first to get the experience you need and the
    confidence you must have.


    **Bourquin:** Well, what if I had $75,000, but I had four times leverage? Does
    that count, or do I need cash in that?


    **Gordon:** No, no, no. Absolutely not. You need that in cash. Leverage does not
    come into the equation when thinking about the money you’ll need to quit your
    job and trade for a living. You need enough capital so that you can make smart
    trading decisions and not take an inordinate amount of risk. Too little capital
    equals too much stress because you constantly have to take on more risk than you
    should. If you’re at seventy-five grand, you’re taking a percent risk per trade
    of your overall account that is going to make you uncomfortable, and ultimately
    you’ll have a loss that forces you back to your old job. People just don’t make
    good decisions when they’re very uncomfortable. You need to put yourself in the
    best situation possible to do that.


    It’s important to know that we don’t encourage most of our clients to go out and
    trade full-time immediately, even if they do have the account size I mentioned.
    It’s a highly stressful situation that few people can handle. Our trading style
    and our business is set up to cater to the people that like to work two to three
    hours a day on their trading, but they carry full-time jobs or they have other
    things going on in their life. Being a successful trader does not mean you need
    to go out on your own and do this full-time. If you have the means, the time,
    and the lifestyle that allows you to trade for a living, I would say, great—do
    it. But it’s not for everybody.


    **Bourquin:** How many hours a day do you think you spend on pure research?


    **Gordon:** I wake up right around 6:00 to 6:15 a.m. eastern standard. I’ll make
    the long trip from my bedroom over there through the kitchen and into my trading
    office, which is about a twelve-second commute—probably the same commute distance
    that you have.


    **Bourquin:** Yep. It’s one of the great things about owning your own business!


    **Gordon:** No question. I’ll work from about 6:30 a.m. after that first cup of
    coffee. Dave and I are in constant contact, and we will do research up until about
    noon. So, for about five and a half hours during the day, I’ll monitor the markets
    closely—what our charts and any positions in play are, and then we’ll move into
    the business administrative stuff and carry that into the New York close. Then
    we’ll do another hour or two of research in the New York close. All in all, I’d
    say about seven to eight hours of research and about four to five of running the
    day-to-day business operations.


    **Bourquin:** And so putting the actual trades on takes mere minutes. It’s all
    the research that goes into it, I guess.


    **Gordon:** Right. The hard work is done during those hours of research. Actually
    implementing the positions is the smallest part of my day. I also spend some time
    getting ready for my appearances on CNBC. That’s one of the great things about
    having a business partner like Dave. CNBC can take a lot of time in order to get
    ready for a show, and I’ll take off and Dave will run the business. It’s good
    exposure for our small company, but I also really enjoy it.


    **Bourquin:** How did the CNBC gig come about?


    **Gordon:** Again, that was through [FOREX.com](http://FOREX.com). I got the ability
    to do some guest spots, providing currency commentary, because [FOREX.com](http://FOREX.com)
    was a sponsor and ran TV commercials. The producers who run *Money in Motion*
    saw my spots and my opinions on the market and gave me the opportunity to try
    out for the *Money in Motion* show, which is the segment I’m on every Friday now.
    I probably went through three or four rounds of tryouts, and I think they probably
    brought thirty or forty people in, and I was one of the top three that made it
    for the show.


    **Bourquin:** Once again, your transparent nature as a trader served you well!
    Are your strategies any different from what you talk about on CNBC, or are those
    the same kind of strategies you’re trading every day in your own account and the
    fund?


    **Gordon:** It’s the same kind of strategy I am researching every day for my own
    account, the fund, and our clients. My research clients will know exactly what
    I’m talking about when I get on the air because I have been talking about it to
    them all day or all week. But it’s difficult on a weekly show to really get the
    information out that I want traders to understand, because it’s obviously just
    a weekly show, and markets change every day. But as far as the setups for the
    trade, the reason I’ll want to be in a trade, they’re the exact types of trading
    ideas that I do on the research reports. But the obvious difference is that I
    can’t follow up and manage the trade with TV viewers as we can with the research
    clients.


    **Bourquin:** You’ve got a lot on your plate as a trader, educator, and analyst.
    Where do you see yourself in a couple of years? Are there things in your trading
    strategy or personal style that you want to improve?


    **Gordon:** There are always things that you can improve. That’s the only certainty
    in the markets. But I’m really happy where our trading is right now and how the
    business is coming along. Right now, Dave and I are at this point where we’re
    working with two quant guys who are analyzing all of our trading results. We want
    to understand how our strategy performs and how good we are at implementing it
    over a longer period of time. Currently, our win rate is very good. Around 63
    percent of our trades are winners, and I’ll tell you what, it’s too high.


    **Bourquin:** Too high? There’s no such thing! What do you mean?


    **Gordon:** I know it sounds crazy, but here’s the reasoning behind that. Currently,
    our average losing dollar amount is too close to the dollar amount of our average
    winning trade. That means I have to be right less, but I have to be right for
    more average points per trade. Taking that another step further, I have to press
    winning trades more, be more patient with them, and allow them to work harder
    for us.


    This is where Dave and I do well together as business partners and traders. Both
    of our collective thoughts go into one trade. We have to press our winning trades
    more with bigger size, risking being stopped out by hurting our average entry
    price. That’s going to make our percent right—our “hit rate”—come down a bit,
    but that’s going to separate the size of our average winner and average loser.
    So, I need to be right less on the trades that we do get right, and we need to
    be right for more dollars. Essentially, I want our winners to be much bigger than
    our losers, and in order to do so, our win percentage is going to come down some
    to make that happen.


    **Bourquin:** That’s interesting. Why not just move your stops closer? You may
    get stopped out more, but it’d be for less and then the winners will just run?'
