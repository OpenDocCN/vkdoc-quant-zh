    **Bourquin:** Is that calculated for you in your trading platform, or is that
    something you do in your head?


    **German:** Everything is calculated by the system. The system is actually so
    systematized that you can literally turn it on, walk away, and just let it run,
    and it will do its thing. It doesn’t take any decision making at all.


    **Bourquin:** That sounds pretty attractive to me. I have to walk away from my
    trades, because I am just no good when I am sitting in front of the computer,
