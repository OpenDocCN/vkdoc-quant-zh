- fmt: '# 交易策略与图表分析


    我主要关注周线图。我从未想过要做日内交易者，所以对小时图、五分钟图、分时图或其他日内图表不感兴趣。我的思维没有那么快，因此我使用周线图和月线图进行市场分析和识别广义技术主题，而日线图仅用于市场信号。


    **Bourquin：** “市场信号”是指你如何找到好的入场点吗？


    **Brandt：** 是的，我正在寻找突破点。我不喜欢在形态内部交易形态。我认为这是在市场启动之前亏损并耗尽精力的好方法。


    具体来说，我喜欢在周线图上清晰可见且持续时间至少为十二到十四周的形态，并且我只基于经典信号进行判断。我喜欢矩形形态和具有平坦颈线的头肩形态。我不太喜欢对称三角形，但它们有对角线边界线以及我关注的其他一些形态，因此我会考虑交易对称三角形。


    我讨厌趋势线，并且根本不喜欢交易它们。对我来说，趋势线的突破毫无意义。


    作为一名期货交易者，我通常寻求交易那些我认为每合约能产生约3000到4000美元甚至更高收益的行情。我对每合约只能波动300或500美元的市场不感兴趣，因为其中的利润不足以证明风险是合理的。


    我追求的是大幅行情，比如标普指数上涨100点，或黄金上涨50到100美元。不过，在2011年，我做了一笔黄金交易，涨了300美元。这些大幅行情只能从周线图和月线图中涌现出来。


    **Bourquin：** 你是否认为日线图和日内图表（如小时图和十五分钟图）噪音太大，以至于交易者很难识别并抓住行情中的一大段利润？


    **Brandt：** 噪音太大了，其中很多行情来自高频交易者。在我交易的一些市场中，高频交易在某些日子占据交易量的50%到60%。


    我认为市场波动性更大，而日内图表的突破中有更多最终在收盘时未能持续。所以，我根本不关心交易时段内发生了什么。我只关心每日收盘价，因为那是人们必须追加保证金的价格。


    当市场收盘并在正常日间交易结束时产生结算价，这个价格会发送到清算公司。这就是结算价，人们需要据此在隔夜补充保证金。当你只处理收盘价时，你可以过滤掉高频交易者和日内交易者，从而消除大量噪音，实现更清晰的价格发现。


    更进一步说，每周最重要的单一价格是周五收盘价，这就是为什么我不仅关注开盘价或最高价柱状图，还关注收盘价图表。


    我没有太多时间研究K线图，尽管它们往往是当今许多交易者关注的热门图表。我也会做一些点数图分析，这非常老派，但我主要对最高/最低价柱状图和收盘价图表感兴趣。我经常通过收盘价以及我认为是正统低点的位置绘制边界线。


    我寻找的是大型形态，我的目标非常简单：在年底，当我回顾我所交易的40个左右的市场时，我希望能够挑选出大约20个最符合纯粹、经典图表原则的形态——这意味着它们清晰、突破干净利落，并且运行到了目标价位。然后我希望查看我的买入和卖出（`P&S`）数据，确保我至少50%的交易都集中在这20个形态上，并且我抓住了每个行情中至少50%的波动。


    **Bourquin：** 因为你在较长的时间框架内交易，你是否需要更加耐心，等待周线图上的形态完全发展后再入场？


    **Brandt：** 是的，我常常在这种张力中挣扎。我是一名主观交易者，而不是系统化交易者，因此，我总是在与自己想在特定的时间参与市场的本能作斗争。


    我认为大多数主观交易者在他们意志薄弱的时刻都会承认，情绪是获取最大利润的真正障碍。我们的情绪往往会告诉我们在错误的时间做错误的事情，而且通常不可信。至少就我而言，我认为我不能相信自己的情绪。


    因为我关注长期图表并交易长期情景，我经常在形态完成前数周甚至数月就看到机会。有一种强烈的冲动想要参与其中，而对我来说，克制自己、提醒自己报酬来自于持仓而非频繁交易，是一场持续的战斗。


    有时需要数周或数月的时间才能形成我感兴趣的大幅价格波动，而要从这些波动中获利，不仅需要有等待形态完成的耐心，还需要有耐心等待市场在交易建立后走完它的过程。然后，你还需要有纪律来设置合适的仓位大小，并运用良好的资金管理规则。


    **Bourquin：** 你在任何时候愿意持有多少仓位？


    **Brandt：** 我并不真正关注在任何给定时间我持有多少仓位。只要我有好的信号，我就会建立交易。


    然而，我倾向于低杠杆交易，我简直无法相信大多数新手交易者使用的杠杆。非常优秀的交易者很少在任何一笔交易中冒超过其资本1%到2%的风险，而新手交易者通常冒3%、4%、5%甚至10%的风险。这是结束你交易生涯的一种快速方式。


    我认识很多非常优秀的交易者，他们每次入场交易时都将风险限制在资本的0.5%甚至0.25%，而作为一般规则，我处于1%左右的水平。


    在我们说话的2012年5月底，今年到目前为止我进行了29笔交易，目前持有6笔未平仓交易，这并不让我担心。它们可能都对我不利，我最终摆脱它们之前可能会经历10%的回撤。


    我确实关注保证金与资本比率，或者保证金与权益比率，试图将其限制在15%。我很少允许超过15%的交易资产用于保证金。


    **Bourquin：** 你交易的标准止损区域是多少？


    **Brandt：** 嗯，我专注于美元风险，并将每笔交易限制在我资本的1%。因此，考虑一个500万美元的账户，当我入场时，我在那笔交易上冒的风险不会超过5万美元。实际上，我今天刚刚根据这些规则做空了罗素指数，尽管那笔交易目前对我不利。


    我想在图表上的一个逻辑位置入场，这样我之后可以回顾并识别出完成形态的收盘价。我还想将我的保护性止损设置在一个自然障碍位，在那里我会认为我的分析被证明是错误的，而不是随意使用资金管理止损。


    我也通过这种方式来确定仓位大小：考虑美元风险以及我根据图表本身需要承担的风险。有了这两个数字，我就可以决定交易多少合约。虽然这通常会因市场突破的方式而异，但作为一般规则，在交易标普期货、黄金或大豆等市场时，我每拥有10万到15万美元的资本就交易1个合约。


    **Bourquin：** 对于你提到的那个罗素指数交易，你在图表上看到了什么形态，以及你是如何确定入场点的？'
  raw: 'I look specifically at weekly charts. Being a day trader has never even crossed
    my mind, so I’m not interested in intraday charts, like hourly charts, five-minute
    charts, tick charts, or any of the others. My mind doesn’t work that fast, so
    I like weekly and monthly charts for market analysis and for identifying broad
    technical themes, and I use daily charts only for market signaling.


    **Bourquin:** Is “market signaling” how you find good entry points in the market?


    **Brandt:** Yes, I’m looking to find the breakout. I don’t like trading patterns
    within the patterns. I think that’s a good way to lose money and get worn out
    by a market before it moves.


    Specifically, I like patterns that are clear on a weekly chart and are at least
    twelve to fourteen weeks in duration, and I base that only on classical signals.
    I like rectangles and head-and-shoulders patterns with flat necklines. I don’t
    really like symmetrical triangles, but they have diagonal boundary lines and a
    number of other patterns that I look at, so I will consider trading symmetrical
    triangles.


    I hate trend lines and don’t like the idea of trading them at all. To me, a break
    of a trend line doesn’t mean anything.


    As a futures trader, I’m generally looking to trade moves that I think can make
    somewhere in the area of $3,000 to $4,000 per contract and up. I’m not interested
    in a market that’s going to move $300 or $500 per contract, because there isn’t
    enough money in there to justify the risk.


    Substantial moves, like one hundred points in the S&P or $50 to $100 in gold,
    are what I’m after. Although, in 2011, I had a gold trade that was a $300 mover.
    Those are the substantial moves that can only be launched out of weekly and monthly
    charts.


    **Bourquin:** Do you think that the daily and intraday charts, like hourly and
    fifteen-minute charts, just have too much noise to really allow traders to identify
    and get a good chunk of a move?


    **Brandt:** There is way too much noise, and a lot of those moves come from high-frequency
    traders. In some of the markets I trade, high-frequency trading [HFT] represents
    50 percent to 60 percent of the volume on some days.


    I think there is more volatility and far more intraday chart breakouts that end
    up *not* being sustained by the time the markets close. So, I really don’t care
    what takes place during the market session. I only care about the daily closing
    price, because that’s where people have to margin up.


    When the markets close and create a settlement price at the end of the normal
    daytime hours, that’s the price that goes to the clearing corporation. That’s
    the settlement price, where people need to put up margin overnight. When you are
    dealing with only closing prices, you can wash out the high-frequency traders
    and the day traders, thereby removing a lot of the noise and enabling clearer
    price discovery.


    Even beyond that, the single most important price each week is the Friday close,
    and that’s why I’m interested in looking at not only open or high bar charts,
    but closing price charts as well.


    I don’t have a lot of time for candlestick charts, although they tend to be the
    hot ones that many traders look at today. I also do some point-and-figure charting,
    which is really old school, but I’m mostly interested in high/low bar charts and
    closing charts. Oftentimes, I will draw boundary lines through both closing prices
    and what I consider to be orthodox lows.


    I’m looking for big patterns, and my goal is really simple: at the end of the
    year, when I look back over the forty or so markets I trade, I want to be able
    to pick out maybe twenty patterns that are the best examples of pure, classical
    charting principles—meaning that they were clear, they broke out cleanly, and
    they ran to their targets. I want to then be able to look at my purchase and sale
    [P&S] data and see that at least 50 percent of my trading was in these twenty
    patterns and that I caught at least 50 percent of each move.


    **Bourquin:** Because you trade on a longer time frame, do you have to be even
    more patient and wait for the patterns to fully develop on the weekly chart before
    you get in?


    **Brandt:** Yes, and I tend to struggle with that tension. I’m a discretionary
    trader, not a systematic trader, and as such, I’m always battling the human urge
    to be involved on my own time.


    I think most discretionary traders will admit in their weaker moments that their
    emotions are a real hurdle to maximum profit. Our emotions tend to tell us to
    do the wrong thing at the wrong time and often can’t be trusted. In my case, at
    least, I don’t believe I can trust mine.


    Because I look at long-term charts and trade long-term scenarios, I will often
    see things weeks or even months before the pattern is completed. There is a real
    urge to want to be involved, and for me, it’s a constant battle to sit on my hands
    and remind myself that my paycheck comes from holding positions, not by actively
    trading them.


    It sometimes takes weeks or months to develop the big price moves I’m interested
    in, and profiting from these moves requires having not only the patience to wait
    for a pattern to complete, but also the patience to wait for the market to run
    its course once a trade is on. Then, you still have to have the discipline to
    put on the proper size, as well as use sound money-management rules.


    **Bourquin:** How many positions are you comfortable having on at any one time?


    **Brandt:** I don’t really pay attention to the number of positions I have on
    at any given time. I will have on as many trades as I have good signals.


    I tend to trade underleveraged, however, and I can’t believe the leverage that
    most novice traders use. It’s remarkable that really good traders seldom risk
    more than one or two percent of their capital on any one trade, while novice traders
    routinely risk three, four, five, or even ten percent. That’s one way to end your
    trading career very quickly.


    I know a lot of very good traders who limit risk to a half or even a quarter of
    one percent on each trade they enter, and as a general rule, I’m in the 1 percent
    area.


    As we speak at the end of May 2012, I’ve put on twenty-nine trades so far this
    year, and I currently have six trades open, which doesn’t bother me. They could
    all go against me, and I would probably experience a 10 percent drawdown before
    I finally scrambled out of them.


    I do pay attention to margin-to-capital ratio, or margin-to-equity ratio, trying
    to limit that to 15 percent. Seldom do I allow more than 15 percent of my trading
    assets to be committed to margin.


    **Bourquin:** What would be a standard stop-loss area for your trades?


    **Brandt:** Well, I focus on dollar risk and limiting trades to 1 percent of my
    capital. So, considering a $5 million account, when I enter a position I’m risking
    no more than $50,000 on that trade. Actually, I just went short the Russell using
    those rules today, although that trade has gone against me so far.


    I want to enter at a logical place on the chart, where I can look back after the
    fact and identify the closing price that completed the pattern. I also want to
    put my protective stop at a natural barrier, where I would believe my analysis
    had been proven wrong, instead of arbitrarily using a money-management stop.


    I also back myself into position sizing that way, by considering dollar risk and
    how much I have to risk based on the chart itself. With those two figures in mind,
    I can determine how many contracts to trade. While that can oftentimes vary, depending
    on how a market breaks out, as a general rule, when trading markets like S&P futures,
    gold, or soybeans, I trade one contract for every $100,000 to $150,000 in capital.


    **Bourquin:** For that Russell trade you mentioned, what was the pattern that
    you saw on the chart, and how did you determine your entry point for that one?'
