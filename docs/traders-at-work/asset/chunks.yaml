- fmt: '**Toma:** Yes. I see it all the time. People come running up to me, asking
    if I can teach them a few setups, and I say, “Honestly, that’s the easy part!”
    It’s not about the setups; it’s about building a lifestyle and building a business.


    I think the biggest difference between amateur traders and those who trade successfully
    is the latter group’s psychological edge. The most successful traders treat trading
    like a business. My best work is done when the markets aren’t open. It’s about
    preparedness and learning from others. I’m still learning, and I will be as long
    as I’m trading.


    I feel for those people, because I used to be one of them. I was fortunate to
    have a mentor when I started out, and I owe so much to him. That got me on the
    right track, but if I would have left it at that, I never would have survived
    in this profession.


    **Bourquin:** I always tell people attending a Traders Expo that, in addition
    to the speakers, some of the best traders in the country—or even the world—are
    in the hallways of the expo, walking around, just like us, which is awesome. I’ve
    picked up a ton of information over the years from talking to those people.


    Mike, high-frequency trading [HFT] was an issue that we wanted to talk about.
    What adjustments have you made in response to HFT this year?


    **Toma:** I was at a Traders Expo the first time that I heard someone mention
    algorithmic trading. I literally scribbled that on a piece of paper and didn’t
    even know what it meant, but I knew I needed to look into it further.


    I went to some local seminars in New York, and in talking to some quant traders,
    I found out that 70 percent of all market activity is driven by algorithmic program
    trading. The computers come in and probe an area below what retail traders consider
    support and then reverse back. That makes the retail guys get scared and cover
    their positions, and then the quant guys can ride the wave up.


    In the past, I generally used arbitrary stops of two points or six ticks, which
    were usually below confluence support. So, for me to be stopped out, price had
    to break through what I considered to be multiple layers of support. With HFT,
    I found that price was being hit, reversing, and then going with the original
    direction more often.


    As a result, I’ve had to adjust some of my stops. I’ve made them a little wider,
    but at the same time, I’ve had to learn how to piggyback on these quant trades.
    Sometimes it’s difficult to detect when they’re happening, but I’m using time
    and sales more to look at big block trades—especially at points of new highs or
    lows and areas where the average retail trader would have their stop.


    Ironically, I just had one such trade that ran 10 points, although I was on it
    only for four. I need to keep looking at the way I handle those trades, but I
    could see the impact of HFT reflected in my numbers and had to be responsive.


    **Bourquin:** So, you’re now thinking like a quantitative trader, setting your
    stops further out so they’re protected, and even trading on the side of the quants
    and buying their stops?


    **Toma:** In my normal setups, I have moved my stops lower, so I’ve had to increase
    my target to maintain the same risk/reward ratio. I know very quickly if I’m on
    the wrong side of the trade. If I’m stopped out, I’ll just move on to the next.


    After some thorough backtesting, I added a new setup that capitalizes on this
    retail panic, and it is actually now my number three performer and the fastest-growing
    profit engine I have. It’s tough to implement a new strategy like this, and now
    here I am, buying new lows. I never thought I would do that.


    **Bourquin:** Can you describe that new setup and give an overview of how it works?


    **Toma:** Sure. I’ll use a breakout trade as an example. It doesn’t happen all
    the time, but if, on an intraday basis, you have a high and a low, and the market
    comes down to test those lows, people would either buy at the lows or sell short
    once it broke the new lows.


    A lot of times you’ll see big blocks coming in until the new lows are hit, and
    then it will go down a few ticks before making a sudden reversal. I have my time
    and sales figures on the screen during those times, and while retail traders are
    there holding one or two short contracts, all of a sudden, it’ll start to reverse.


    When you see these big blocks of ES contracts—a hundred and up—coming in on the
    buy side, and now the market reverses a point or a point-and-a-half, the retail
    traders have their stops at six ticks or maybe two points, and once those start
    hitting, the algorithms will ride that wave. I try to jump on that, too.


    **Bourquin:** Will you wait for those blocks to show up before you actually buy,
    or do you try and get in while the one- and two-contract orders are going through?


    **Toma:** I’ll actually see those blocks coming in, and the price may not jump
    immediately, but when you start seeing that reversal of about one point or a point-and-a-half,
    you have to know the average retail trader is going to start to panic. Once they
    do, they’re going to start covering those shorts, and then you’re just waiting
    and can ride that wave to your target once the panic sets in.


    In a sense, it’s taking advantage of the impulses of newer traders, but when it
    isn’t going to work, you’ll know right away and can get out quickly, so you don’t
    have to risk a lot.


    This setup required a psychological change, because I never thought like that.
    I was always an average retail trader, using three to five contracts, but now,
    with HFT, I have to think like the big boys. After talking to some of the quant
    traders and hedge fund guys about algorithmic trading, I realized that they’re
    playing a totally different game, and the average retail trader is just a little
    fish in a very big pond.


    **Bourquin:** You mentioned catching only four points of that ten-point move.
    Was four points your target, or did certain conditions make you exit that trade
    early?


    **Toma:** Actually, one of my rules requires me to take smaller targets on my
    first trades each day, just to get some green in my account that I can play with
    for the rest of the day. If that were another type of setup or another time of
    day, I would’ve let it run. But since this was right near the open, I wanted to
    be more conservative.


    The first half hour can be a little hectic, so I just took my profits and got
    out with no regrets. I traded my plan just as I wanted, and then I just moved
    on to the next one.


    # Twenty Habits of Wealthy Traders


    In the course of interviewing hundreds of wealthy stock, option, and futures traders
    over the past year, I’ve had the privilege of hearing from some of the best independent
    traders in the world. I’ve asked them how they entered the trading business and
    how they learned how to make money consistently as a trader. I even asked how
    much money they make each year, and then hoped they wouldn’t hang up on me or
    throw something heavy in my direction. None of them did, though only one has allowed
    me to actually publish the answer to that question in this book. Nearly all of
    them graciously answered my direct, probing, and sometimes very personal questions.


    Not everyone was comfortable talking openly about their trading business and lifestyle.
    For some, the years they spent struggling with and studying the markets were difficult
    times, and they were unwilling to give a shortcut to the rest of the world by
    discussing their current trading methods. While I knew they were successful traders,
    they just weren’t willing to transparently discuss their strategies. Though they
    agreed to be interviewed, their answers were short and guarded, and my relentless
    prying did little to crack their shell. I don’t blame them. After years of highs
    and lows, in the markets and in their trading accounts, they had finally come
    across a strategy that worked for them and did not want to share it for fear that
    the method would become saturated by thousands of other traders.'
