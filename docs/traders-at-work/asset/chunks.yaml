- fmt: '**Bourquin:** And would you follow those guys on their blogs?


    **Baiynd:** Well, `Peter Reznicek` did a show on `thinkorswim`, which was where
    I had my platform. He referenced the “king of market internals,” and although
    I didn’t know initially what he was talking about, when he pulled up a chart,
    I could see it.


    After listening to him time the market using market internals, I thought I’d see
    if I could successfully integrate market internals into my existing strategy.
    I found out that one market internal in particular, the `up volume minus down
    volume [UVOL-DVOL]`, was a very good indicator of where the trend was heading
    on the day.


    As far as `Brian Shannon` goes, I used to watch his daily blog recap and noticed
    that he would look at things on multiple time frames, like five minutes and thirty
    minutes or hourly—or even on the daily and weekly time frames. That gives an entirely
    different view of what’s happening from a broader perspective, and so I began
    to work with that as well.


    In both cases, I borrowed outside ideas and notions and tried to combine them
    within my existing system. I am a firm believer that many traders fail because
    they simply jam a lot of technical indicators together, and that’s not what a
    good trading system does. A good trading system has a few indicators that complement
    each other, so when those indicators conflict, there’s a real reason why.


    **Bourquin:** When traders first start out, they have so much information available,
    and there are so many people out there blogging, so many services, and so many
    classes, that they rarely know where to start. How did you know to start with
    moving averages and Fibonacci?


    **Baiynd:** Truthfully, I was looking for something really simple that I could
    understand. I started with the `simple moving average [SMA]`, which helped me
    realize that if my candlesticks were printing underneath the moving average, I
    should probably be short. Conversely, if the candlesticks were printing above
    the moving average, I should probably be long. Just that simple notion made me
    start there.


    I went through all kinds of different technical indicators after that, however,
    and I commonly said I was trying to find the indicator that “lies to me the least.”
    I finally settled on a couple of them outside of that moving average, but it was
    really by trial and error.


    I went through every single one of them: `MACD`, `RSI`, `Williams %R`, you name
    it. Interestingly enough, I ended up working twenty-hour days doing that, instead
    of the twelve-hour days I was working while in the recruiting business!


    I spent that many hours each day just studying and shuffling through indicators
    until I settled on something that meshed for me. I needed something to clearly
    guide me in my trading.


    **Bourquin:** Talk about how you learned Fibonacci and how you now use it to find
    good trades.


    **Baiynd:** Well, I learned Fibonacci as a mathematician, and so I understood
    that the sequence was just a set of ratios that are interrelated. Now, when I
    first started looking at Fibonacci as it relates to trading, I would just open
    up a chart and go from high to low. I had no understanding of wave action, but
    as I kept looking at the charts, I began to see them.


    I then started to measure the waves and got to where I could anticipate the location
    of a potential rollover. Sometimes I would take the trade in anticipation of the
    rollover, but after getting blown out of those a few times, I learned to wait
    for confirmation before getting in.


    Again, it was just by trial and error, and I did a little bit of live trading
    and many hundreds of hours of paper trading just to see if I could understand
    mechanically how the wave action works.


    **Bourquin:** Is it Elliott wave that you’re using in your analysis?


    **Baiynd:** No, I’m just looking at the chart without doing any wave counting.
    I’ve tried to look at Elliott wave, but I found it to be very cumbersome. Everything
    is so contingent upon where you actually start the wave count, and if you start
    in the wrong place, it’s just not going to work for you.


    I just was trying to look at it simply and identify the repeatable patterns over
    and over again. For example, a pullback that reverses right back up and makes
    a double-top action before pulling back and again making a break to the upside
    signifies a wave extension. That tells me that the buyers rushed in, and the sellers
    were overcome. Now sellers are nowhere to be found, and that’s my chance to go
    long.


    The very reason I chose a background in statistics was because I’d been very,
    very good at pattern recognition all my life. That is the one skill that I brought
    into trading that I feel has really helped me to get over the top.


    **Bourquin:** Since settling on Fibonacci as your primary method, are you continuously
    adapting how you do it, or does your strategy remain constant?


    **Baiynd:** I’m always adapting. I aim to identify small market shifts and effectively
    respond to them. For instance, the `127.2 percent Fibonacci retracement level`
    was once a very hard and fast number, but in recent months, I’ve noticed a shift
    in favor of the `138.2 percent level`. I’m always looking for shifts like that
    and then adapting accordingly.


    I must always remind myself that the market is fluid and alive. It’s never going
    to do what we expect all the time. That’s why I watch for changes in behavior,
    but most everything else—the wave count, the way I draw the waves, and my triggers—stays
    exactly the same.


    The only things that may change would be my stop placement, depending on the level
    of volatility, or which moving average (`fifty-`, `twenty-`, or `ten-period SMA`)
    I use, depending on the level of momentum. Those discretionary elements I have
    to interchange on the fly, because every day is just a little bit different.


    **Bourquin:** Just like Elliott wave requires that you learn where to start the
    wave count, with Fibonacci, you’ve got to pick the proper high and low in order
    to draw the lines correctly. How did you get good at that?


    **Baiynd:** Well, here’s the interesting thing: as long as you draw a high-low
    of any visible wave, Fibonacci is going to deliver a level that you can use to
    trade. And “clear wave action” means, for example, that the market came up into
    a high, reversed and came down into a low, and then reversed higher again. In
    cases like that, it doesn’t matter which wave you use if you’re trading the trend
    from one level to the other.


    Now, that’s a very bizarre concept to some, because people want things to be very
    rigid, but it really doesn’t have to be that way. The market is fractal, so much
    so that it doesn’t matter which wave we use, because there are going to be workable
    levels for trading there.


    I determine which ones are workable by looking at the Fibonacci extensions and
    then looking to the left to try to match them with support and resistance. If
    I find support and resistance there, I know that particular Fibonacci level is
    a workable one. If there’s nothing there, I throw it out and start again somewhere
    else.


    It really can be as simple as looking to the left at support and resistance, though,
    and if it matches, then you can step through the trade just like that.


    **Bourquin:** Do you trade all day, every day, and how many trades do you typically
    take in any one day?


    **Baiynd:** If you would have asked me that eighteen months ago, I would have
    had the craziest number for you. I was trading about two hundred round-trip trades
    back then, but now it’s typically ten round trips—or twenty, at the most.


    **Bourquin:** What markets do you trade right now?


    **Baiynd:** I trade oil, I trade futures, and then I trade the big three: Apple,
    Amazon, and Google. I look to see which is behaving the best for the day, and
    that’s where I’ll focus.'
