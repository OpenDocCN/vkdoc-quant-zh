- fmt: '**Bourquin:** Let me ask you about your profit target on that. Were you looking
    at a previous high, or how did you decide to get out?


    **Lund:** When I was looking at the profit target on that, I think I had it around
    eighteen, and the reason I had it at eighteen was because it lined up with a pivot
    low before it double-topped. It also lined up with a congestion area.


    Sometimes you look at a chart, and it’s very obvious where overhead resistance
    is. Sometimes it’s not so obvious and it’s more of an art. I usually look at what
    the most obvious point is, and then I cheap it down a little bit. I always want
    to be a little more conservative, and I also tell people that there’s nothing
    wrong with parceling out. When you get a nice strong break in a stock, the chances
    that it’s going to go straight up to your target are pretty slim. If you need
    to take some profit off and book it to allow you to stay for the rest of the move,
    there’s nothing wrong with that.


    **Bourquin:** How many trades a week do you typically take?


    **Lund:** Right now, I have a day job. I’m the vice president of strategic initiatives
    for a broker/dealer, so, unfortunately, I don’t get to concentrate on the market
    as much as I would like. I’m usually trading maybe four, five times a week. When
    I was trading my own account and that was my only job, I was trading hundreds
    of times a week. I’m trading a lot less than I would like to right now, unfortunately.


    **Bourquin:** How many positions are you comfortable handling at any one time?


    **Lund:** Boy, I am not comfortable handling more than maybe two or three positions,
    and really, that is a function of the fact that I have attention-deficit hyperactivity
    disorder [ADHD]. I have been diagnosed that way, and I have been that way my whole
    life. If I have too much going on at one time, I just can’t focus.


    A lot of times, when people are trying to decide how they are going to trade,
    they have an image of themselves and how they think they should trade. They have
    an image of what trading is about, and a lot of the time, that image doesn’t fit
    their personality at all. I think one of the keys to becoming a profitable trader
    over the long haul is to be perfectly honest with yourself, understand your strengths
    and weaknesses, and then trade in a style that complements those realities—not
    how you think you *should* be trading.


    Trading the way that I do—limiting the number of positions I am in at any one
    time, only watching a certain amount of stocks, and doing it once a week—helps
    me deal with my ADHD and makes me a more profitable trader.


    **Bourquin:** I think a lot of traders are also searching for what works for them.
    There is so much out there. There are different classes, there are different time
    frames, and there are a million indicators that people think are the Holy Grail—until
    they eventually find out that they are not. How did you come to this style of
    trading and settle upon it as something that works for you?


    **Lund:** I read a post on a blog that I used to follow a long time ago by a blogger
    called Trader-X, and he talked about the concept of chasing success. He talked
    about how traders would start and say, “I am going to be a gap trader,” and then
    they’d start doing gap trading a little bit. If it didn’t work out for them the
    way they wanted, they’d say, “Forget it. I’m going to do swing trading.”


    In this way, many traders are constantly chasing this notion of success, instead
    of getting really good at one type of trading, or getting really good at one asset
    class, or narrowing their focus. For a long time, I did that, and I think a lot
    of people do that. I would change to the newest, hottest thing, and then, finally,
    as I got older and more mature, and had been around the block enough times, I
    realized that it’s not about what’s cool or what the newest thing is. It’s about
    making money. That’s all this is about.


    Whatever way you can trade the markets that makes you money is the right way.
    If that’s not what you’re looking for—if you’re looking to tell great stories
    about trading at your family reunion—then you’re in it for the wrong reason.


    **Bourquin:** Did you accidentally stumble upon the types of patterns that you
    look for, or how did you come to find them?


    **Lund:** I learned the hard way. When I first started trading back in 1986, there
    was hardly any information out there about trading. I didn’t even know what technical
    analysis was. Then, in the early nineties, I was on the Money Talk bulletin boards
    for Prodigy, and I got connected with some guys who knew a little bit about technical
    analysis. At that time, though, I still didn’t know that much about it. It’s been
    an evolution. I can’t say that there was any illuminating moment that told me,
    “This is what I’m going to do.” Over time, I learned what works best for me, and
    then I finally decided to stick with that.


    **Bourquin:** Were you more profitable when you had the time to trade hundreds
    of times a week, or do you like not having the time to do it in that manner anymore?


    **Lund:** It’s funny. I actually make more money when I trade less. I had my own
    business for twenty years, and one of the nice things about having your own business
    is that you have the ability to trade if you want. I was at a desk, and I would
    trade. Day trading was not big back in the eighties, however, and anyway, because
    of my responsibilities with my company, I couldn’t day trade. I was swing trading
    instead, but when I eventually sold my company, I said, “I am going to day trade.
    That’s what I’m going to do. That’s where it’s at.”


    Looking back, I realized that I actually made more money when I was swing trading—and
    trading less—than I did when I was day trading. If there was a moment that I thought,
    “Maybe that’s what I should do,” that was it.


    It reminds me of a chapter in a book that I read a long time ago. Ed Seykota was
    talking about how he would set up his trades during the day, and then that was
    it. He didn’t have a computer on at his desk. He wasn’t monitoring his trades.
    He knew what his stops were, and he was walking along the banks of Lake Tahoe,
    hanging out while his positions worked. Granted, it was a different time and a
    different way of trading, but that Zen-like approach, saying, “This is what I
    am going to set up. These are my risk parameters. I am going to put them in, and
    I am going to let the trade work.” That really resonated with me.


    **Bourquin:** A lot of people are using high-frequency trading as an excuse, if
    you will, for why they are not able to find good trades in today’s markets. Is
    there validity to that, or no?


    **Lund:** That’s a really good question. I think you are right. I think a lot
    of people are using it as an excuse for why they’re not profitable. There’s no
    doubt that high-frequency trading is out there. You see it all the time. You just
    have to learn to adapt to it.


    If you are going to trade patterns, you have to understand that high-frequency
    trading and algorithmic trading are going to distort those patterns to a point
    where you traditionally would have thought they were broken. Maybe you will see
    a cup with a handle, or maybe you will see a double-bottom, or maybe you will
    see a semi-triangle, and price will drop out of that pattern. In the past, you
    would say, “Okay, that’s it. The pattern is broken.” But then, miraculously, price
    will come back into that pattern and continue the way that you wanted.


    There’s a simple explanation for this. High-frequency trading is set up to go
    where the highest amount of orders are. It’s set up to go where stop levels are,
    because the whole point is to get volume. But everyone knows where the stop levels
    are. Everyone can look at a chart. Everyone knows what price points are there.


    I think high-frequency trading does have an impact, but I don’t think it’s anything
    that people can’t adapt to if they are honest with themselves.'
  raw: '**Bourquin:** Let me ask you about your profit target on that. Were you looking
    at a previous high, or how did you decide to get out?


    **Lund:** When I was looking at the profit target on that, I think I had it around
    eighteen, and the reason I had it at eighteen was because it lined up with a pivot
    low before it double-topped. It also lined up with a congestion area.


    Sometimes you look at a chart, and it’s very obvious where overhead resistance
    is. Sometimes it’s not so obvious and it’s more of an art. I usually look at what
    the most obvious point is, and then I cheap it down a little bit. I always want
    to be a little more conservative, and I also tell people that there’s nothing
    wrong with parceling out. When you get a nice strong break in a stock, the chances
    that it’s going to go straight up to your target are pretty slim. If you need
    to take some profit off and book it to allow you to stay for the rest of the move,
    there’s nothing wrong with that.


    **Bourquin:** How many trades a week do you typically take?


    **Lund:** Right now, I have a day job. I’m the vice president of strategic initiatives
    for a broker/dealer, so, unfortunately, I don’t get to concentrate on the market
    as much as I would like. I’m usually trading maybe four, five times a week. When
    I was trading my own account and that was my only job, I was trading hundreds
    of times a week. I’m trading a lot less than I would like to right now, unfortunately.


    **Bourquin:** How many positions are you comfortable handling at any one time?


