    **蒂姆·布尔昆**是线上交易博览会（现为交易者博览会）和外汇交易博览会的联合创始人。作为洛杉矶警察局的一名警官，布尔昆白天上午交易股票和货币市场，晚上追捕罪犯。当他想要寻找一个能让交易者了解其他人如何参与市场的行业盛会时，却发现没有这样的活动。于是，1999
    年，布尔昆与一位商业伙伴共同创办了面向线上交易者和投资者的年度大会及展览会。这些每年在纽约、拉斯维加斯和洛杉矶举办的活动，至今仍是面向活跃的零售交易者的顶级盛会。


    在过去 14 年间与无数交易者交流后，布尔昆意识到，学习交易赚钱的最佳方式就是向那些每天都在从事交易的人请教。他开始寻找行业内的佼佼者，并详细询问他们是如何赚钱的。有些人愿意与他交谈，而有些人则拒绝了，但凭借坚持不懈的努力，他慢慢地采访了数百名交易者，内容涉及他们采用的策略、使用的软件以及如何建立对市场的信心。2006
    年，布尔昆创立了 [TraderInterviews.com](http://TraderInterviews.com)，这是一个以坦诚对话为特色的在线媒体网站。


    ![图片](img/9781430244431_unFM-02.jpg)


    **尼古拉斯·曼戈**是一位自由撰稿人和编辑，他在活跃交易社区的工作已持续七年多，并涉及众多门户网站和主流媒体。作为一名前一级大学运动员，曼戈亲身体验了不断学习和提高技能的必要性，以及长久保持高水平表现的压力和其中的起起落落。2006
    年，在他第一次参与交易者博览会时，他清楚地意识到，交易者们也经历着类似的旅程，面对着一个同样迷人、甚至可能更加无情的对手：金融市场。


    从那时起，他便坚定地致力于帮助交易者找到清晰的方向和答案，这些答案可以成为他们在市场中建立持久而繁荣事业的基础。此后，曼戈与数百名专业交易者和行业专家合作，发布了他们在不同市场和时间框架下进行交易的最可靠、最清晰且最可行的方法和策略。


    ## 致谢


    我要感谢后续章节中所有受访者，他们慷慨且耐心地允许我询问关于他们如何在市场中谋生的各种“愚蠢”和复杂的问题。你们乐于谈论自己技艺的态度，无疑将帮助成千上万正在寻找自身优势的挣扎交易者。感谢
    Apress 出版社的摩根·厄特尔，是他的耐心、鼓励和激励性的推动，让这本书在看似永远无法完成之际得以付梓。最后，我要感谢我的合著者尼古拉斯·曼戈，他承担了将粗糙采访记录修改成精炼语句的艰巨任务。你今天能拿到这本书的唯一原因，就是尼克说了句：“当然，听起来很有趣！”谢谢你，我的朋友。


    ——蒂姆·布尔昆


    对我而言，这本书代表了一个毕生梦想的实现，我衷心感谢所有使之成为可能的人，首先是每一位交易者，他们开放无畏的参与产生了跨越时间的洞见，我们希望这些洞见能给所有读者带来乐趣、启发和教育。感谢
    Apress 出版团队的摩根·厄特尔和丽塔·费尔南多，感谢你们在这个项目的各个阶段所给予的耐心、坚持和热情。同时，也要感谢我充满爱意和支持的父母、我的祖父以及我所有的朋友。希望这本书最终能平息你们的疑虑——我并非整天无所事事地坐在电脑前玩！最后，我最衷心地感谢我的朋友和合著者蒂姆·布尔昆，他对教育的热情和卓越的领导力不仅塑造了我的职业生涯，更触动了我的生命。

    '
- fmt: '—Nicholas Mango


    # CHAPTER


    ## Todd Gordon


    **Todd Gordon** is a founding partner and director of research and trading at
    Aspen Trading Group, as well as a principal in the money management company Floyd,
    Gordon & Partners. Formerly, he served a dual role as the senior technical strategist
    at `FOREX.com` as well as senior trader for GAIN Capital Asset Management, the
    parent company of `FOREX.com`.


    Gordon was one of six traders at GAIN Capital Asset Management responsible for
    trading capital in excess of $10 million. He is a regular contributor on the CNBC
    shows *Fast Money* and *Money in Motion* and he has provided his expert analysis
    of the global market on Bloomberg, BNN (Business News Network), and Dow Jones
    Online, among others.


    While attending St. Lawrence University in upstate New York, Gordon competed on
    their Division I alpine ski team, racing against future Olympians, and he continues
    to enjoy hitting the slopes in the winter. He lives by the mantra “plan your trade,
    trade your plan.”


    **Tim Bourquin:** I heard trading was your first job right out of college. Where
    did you go to school?


    **Todd Gordon:** I went to St. Lawrence University in upstate New York for my
    first two years. I was an economics major and business minor and at that point,
    I hadn’t quite found my passion. My focus in college was downhill ski racing.
    St. Lawrence was a Division 1 ski school, so I fought to make the team and got
    to rub elbows with some future Olympians who were also on the team. Honestly,
    in college I was almost entirely focused on improving my slalom turn and that
    was about it. So after racing there for two years, I told myself it was time to
    focus on work and what I wanted to do as a career. I could see that my living
    wasn’t going to be made on the ski slopes. So I switched from St. Lawrence to
    Albany State and finished my degree there. I didn’t give up competitive skiing
    entirely, though. Albany State had a Division 3 ski team, so I continued to race,
    but I began to focus more on my business and economics degrees. It was during
    those last two years that I began to seriously consider a career as a trader.


    **Bourquin:** Did you know much about what it took to have a career as a trader
    at that time? Did you think you might work on Wall Street?


    **Gordon:** I had an E-Trade account all the way through St. Lawrence and then
    my next two years at Albany, and it was more of just a hobby, day trading stocks
    just as the term “day trading” began appearing in the news. Back then, I was just
    throwing darts at a wall with my trades. I followed a chat room back then by a
    guy named “Tokyo Joe.” He was the biggest sensation and had thousands of traders
    in his chat room every day while the market was open. He’d put up a stock pick
    and everyone would just go buy it without really knowing why. It was a crazy time.


    **Bourquin:** Didn’t he get indicted or something?


    **Gordon:** Yeah, he wound up being a crook when his whole scheme was uncovered,
    but he would pump stocks in his chat room and everyone would go chase the stocks.
    Turns out he had bought those stocks a few days before and would literally start
    selling minutes after he recommended that everyone in the chat room buy the stock.
    His stock picks, and the number of members he had who would act on them, could
    really move the market quickly. I remember one trade I made was in the symbol
    `GEEK`. I think it was Internet America, and I think I made $10 per share in like
    10 minutes.


    Of course, there were a ton of other trades that went badly and I was stopped
    out all the time. I certainly loved the game of trading, but ultimately I knew
    that following a chat room blindly without any understanding of what’s going on
    or why I was making certain trading decisions wasn’t sustainable over the long
    run. You may make money here and there if you’re lucky, but constructing your
    own strategy based on objective measures is the only way to make trading a full-time
    gig.


    So that’s when I began my quest to really learn how to trade on my own without
    having to rely on some chat room host to spit out buy and sell recommendations.
    One of the first books I read in college was Alexander Elder’s *Trading for a
    Living* [Wiley, 1993]. I knew I wanted to trade for a living, so I figured that
    was the perfect book to start with! It was the first time I learned about reading
    charts and technical analysis, and all of a sudden I was learning how to draw
    a simple trend line on a chart. I began drawing trend lines all over and that’s
    when I started to formulate some kind of plan about which stocks I was going to
    buy or sell. Those simple trend lines were the beginning of an objective way to
    look at the market and understand where good trades might be entered.


    The funny thing was, while I was learning about economics, which I thought back
    then was going to be essentially useless in the trading world, I was starting
    to understand how to do basic technical analysis and applied it to every stock
    I was considering. When I saw how stocks behaved and bounced off these trend lines
    as support and resistance, that’s when I got bitten by the trading bug completely,
    and I just knew it was what I wanted to do as a career.


    It turned out my economics degree wasn’t totally useless. I actually think it
    helps me understand the markets in a deeper way, especially now that I trade the
    currency markets. That broad understanding of how world economies work has been
    important to my success.


    **Bourquin:** What kind of software and tools were you using back then?


    **Gordon:** It’s funny, because I can’t even imagine trying to trade on that same
    system today. I was day trading with a web-based account and an E-Trade account
    very early on in that company’s life. The interface and tools are nothing like
    they are today. I think I had five grand in the account. I was day trading on
    a ridiculously slow dial-up internet connection. But the competitor in me really
    got into it, and I was determined to be good at it, regardless of the crappy tools
    I was using. I remember I was on AOL dial-up, and it was way back at the time
    when you had to pay per minute because it was a long distance call for me to be
    on the internet. I was nineteen and at home—just hanging out at my parents’ house.
    My mom came to me with this huge phone bill and she almost killed me. I was on
    the internet around eight hours a day while the stock market was open. There were
    a few phone bills that were a thousand dollars each, and needless to say, my Mom
    was pissed.


    **Bourquin:** Yeah, I’ll bet. When you were placing trades on a dial-up connection,
    you clicked the Buy button, and you let the thing spin for a few seconds. I remember
    those days, and it was like a minute and a half before you got a confirmation,
    right?


    **Gordon:** I don’t even remember. It must have been, but back then it didn’t
    even occur to me that I wasn’t getting the best price. I didn’t have any knowledge
    of execution practices by the market makers and the games they would play. The
    spreads were huge and the slippage was terrible. You’d get crushed if you put
    in a market order because the price you’d get was nowhere near what you thought
    it was going to be. The software crashed all the time. You’d get disconnected
    from the dial-up connection. It was a mess. Back then, I thought that was just
    part of the game. I had to start somewhere. And I suppose that if you could make
    money in that trading environment, you could make money anywhere.


    **Bourquin:** Yeah, absolutely. If you didn’t go through that, you probably wouldn’t
    be the trader you are today. So even bad experiences, I think, somehow add to
    your education as a trader. When you graduated from college, did you get a job
    as a trader right away?'
