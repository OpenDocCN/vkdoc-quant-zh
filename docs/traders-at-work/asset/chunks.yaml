- fmt: '**Bourquin:** Looking back over the course of your trading career so far,
    is there anything you would have done differently?


    **Carter:** I think I would’ve favored the idea of scaling out more often, taking
    some money out of a trade, locking in a stop loss, and then just letting the rest
    go and checking on it once a day. Those are the times you can really catch some
    incredible moves without having to constantly stare at a chart.


    You never know exactly what’s going to happen in the markets, but I think I could
    have continued participating in some fantastic moves by leaving just one contract
    on—although that would’ve meant giving up the mental closure that comes with being
    completely out of a position.


    **Bourquin:** John, in closing, is now as good a time as any to be a trader?


    **Carter:** I think this is a trader’s market, and it’s a fantastic time to be
    trading. For retail traders, the dirty little secret is this: Especially in markets
    like futures and options, there aren’t a lot of huge hedge funds trading those
    markets, because there’s not enough liquidity for them there.


    The big funds have to create synthetic positions that simulate millions of shares,
    but those are created off the books at Goldman Sachs or elsewhere and aren’t transactions
    that we see as retail traders.


    As a result, there is plenty of opportunity for smaller traders in markets like
    crude oil and gold, as well as in equity options, where big funds aren’t active
    because of the lower liquidity.


    I think there’s probably more opportunity in trading today than at any other time.
    People always think the heyday for active trading was the late nineties and throughout
    the internet bubble, because anything you bought went up. But that was not trading.
    That was like having a surfboard, catching a seventy-foot wave, and just riding
    it all the way in.


    Again, success goes back to having discipline. But even new traders can adopt
    that professional mindset, starting with their very next trade. Doing that can
    put them well on the proper path.


    # CHAPTER


    ## Anne-Marie Baiynd


    After being inspired by an introductory seminar on technical trading, `Anne-Marie
    Baiynd` made a daredevil’s leap from corporate president to rookie technical trader
    in early 2005. Her expansive mathematics background and passion for analysis would
    later serve her well, but did not provide her immunity from the market’s unkind
    initiation and substantial early losses. Undeterred, she worked tirelessly to
    simplify her process, methodically learning and testing technical indicators to
    produce a noncluttered, clearly defined strategy that breeds confidence and positive
    results. She is regarded today as a leading expert in Fibonacci analysis and momentum
    trading, and while always aiming to continue her own quest for knowledge, Baiynd
    educates fellow traders at live seminars nationwide, as well as in her daily chat
    room. She is the author of `The Trading Book` (McGraw-Hill, 2011) and is regarded
    as one of the Top 25 Traders on Twitter.


    **Tim Bourquin:** Anne-Marie, let’s start by talking about how you got into trading,
    because your career was in something else initially, wasn’t it?


    **Anne-Marie Baiynd:** That’s exactly right. I had spent the last twelve years
    in a recruiting role and was the president of a small recruiting company. We called
    it a “boutique firm” because we only looked for certain types of very technical
    individuals.


    I was tired of working one hundred–hour weeks and felt I had come to a crossroads
    in my career. Fortunately, I was in a space where I could choose what I wanted
    to do next.


    It was late 2004 or early 2005, and although I didn’t want to, my husband urged
    me to go to this `SUCCESS` Magazine seminar on technical trading. So, we went,
    and I loved listening to this gentleman describe the technique. Because of my
    degrees and my past, I really love analysis, and I like to think really hard.
    I found that presentation to be very, very entertaining. So, after I went home,
    I started investigating from there.


    **Bourquin:** Was technical analysis brand new to you at that time, or had you
    ever studied financial charts before?


    **Baiynd:** Technical analysis was brand new to me, and I could barely spell “stock
    market” when I began looking at it! I really had no interest in finance or the
    market, per se, but the technician in me was very eager to explore it.


    **Bourquin:** Did you end up taking more courses they offered?


    **Baiynd:** Only the introductory course. My husband wanted to take it, so we
    went, but they upsell in everything they do, and so it was pretty much only the
    surface layer of what the market is about. From there, if you really wanted to
    know more, then you had to go through their entire program.


    I thought I learned better on my own anyway, so I just began investigating the
    markets. If it turned out I needed more education, I would take it from there.


    **Bourquin:** Was your next step to start reading books about technical analysis?


    **Baiynd:** Actually, I did something absolutely crazy: I just went for it and
    started trading—which was a very bad mistake!


    **Bourquin:** Wow, let’s talk about what you were doing and why it didn’t work.


    **Baiynd:** Well, in everything I’ve chosen to do before, I’ve simply focused
    and dedicated myself to becoming good at it and then worked hard to get it done.
    I thought this would be no different, but when I started trading, I had no idea
    what was going on! I had the introductory `Investools` book in front of me, and
    I was looking at it and the technicals.


    My background as a mathematician means I can understand the basis of technical
    measures like stochastics, but as far as reading and interpreting them, I had
    no clue. Honestly, I was a tremendous gunslinger, and the only reason I stand
    here today is because I started with so much money that I was able to lose vast
    quantities.


    Eventually, though, my husband convinced me that I had to stop trading and figure
    out what was going on first. Although I didn’t want to sit out and not trade,
    that turned out to be the best advice I ever got.


    So, I began paper trading, and I went from simple to mildly complex concepts,
    working through them piece by piece. I started by learning moving averages, and
    from there I fell into Fibonacci after seeing it on a Twitter feed. I knew what
    the Fibonacci sequence was already, and when I started looking at it, the wave
    retracements made so much sense to me. All of a sudden, I began to see the market
    in a whole new way!


    From there, I spent about six months developing a system that would work for me.
    Now, the system had to be simple, and it had to be direct, because I was very
    prone to second-guessing myself, and with so much emotional capital already depleted
    from the massive losses I sustained early on, I really didn’t trust myself in
    any form or fashion.


    As a result, I vowed only to trade a particular setup, and doing that helped me
    to build up my confidence. That was how I started back in the market.


    Even today, once I understand something, I try to expand upon it, and every day
    I look at the market, I learn something new. I’m always looking at it in a different
    way and trying not to box myself in, and that’s why I never wanted to learn to
    trade from anyone else.


    That doesn’t mean that I ignored outside ideas, though. I went on to study multiple
    time frames after Brian Shannon inspired me to, and I looked at market internals
    because Peter Reznicek used them. Other than that, though, everything was of my
    own creation and is very natural to me.'
