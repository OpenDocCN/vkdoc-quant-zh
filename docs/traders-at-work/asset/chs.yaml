  - 关于作者\n- 致谢\n- 第 1 章：托德·戈登\n- 第 2 章：琳达·拉什克\n- 第 3 章：塞尔吉·伯格\n- 第 4 章：亚历克斯·福斯特\n\
  - 第 5 章：德里克·希明\n- 第 6 章：彼得·布兰特\n- 第 7 章：罗布·威尔逊\n- 第 8 章：约翰·卡特\n- 第 9 章：安妮-玛丽·拜因德\n\
  - 第 10 章：杰夫·怀特\n- 第 11 章：帕特里克·海明格\n- 第 12 章：唐·米勒\n- 第 13 章：查尔斯·杰曼\n- 第 14 章：安德鲁·梅纳克博士\n\
  - 第 15 章：布莱恩·伦德\n- 第 16 章：迈克尔·托马\n- 第 17 章：富有交易员的二十个习惯\n- 索引\n\n## 前言\n\n那是令人兴奋的岁月——90\
  \ 年代末；牛市呼啸而来，每个人都想辞掉白天的工作去做日内交易。任何人都可以做到，这似乎是通往财富的捷径。既然能交易，为什么还要工作？然而，他们几乎没有意识到，交易是一门生意——而且是一门艰难的生意。蒂姆·伯奎因深知交易的现实并希望提供帮助，于是他与合伙人吉姆·苏格曼创立了在线交易博览会（现为交易员博览会）。这个博览会是交易员们汇聚一堂、交流想法、会见供应商、发现新工具和新技术、学习并精进技艺的地方。\n\
  \n距离那些牛市的辉煌岁月已经过去很久了。尽管 14 年过去了，标普 500 指数仅比 1998 年的峰值水平略有变化。买入并持有的整个理念已被否定，这让一代期待获得“理应”拥有的\
  \ 10%年化收益的投资者们大失所望。十多年来，一个事实已经变得非常清晰：交易并非不可能或奢侈之事；如果你想在金融市场赚钱，交易是必需的。整个买入并持有的概念从一开始就是个笑话。天下根本没有免费的午餐。投资和交易是工作——是高回报的艰苦工作。\n\
  \n蒂姆和合著者尼克接触过许多交易员，其中包括一些顶尖人物，而这本书汇集了他们在多年中结识的一群交易员的经验集锦。这里有许多想法供好奇的头脑去探索，如果你能从中发现哪怕一个有助于改进你交易思路的想法，像本书这样的资源都将是无价之宝。书中呈现的一些想法可能看似矛盾，这实属正常，因为交易没有唯一的方法。每个交易员的过程都不同，每个交易员都必须找到自己的路。\n\
  \n\n\n正如你所料，我经常被问及如何使用布林带进行交易。我通常会通过举例来回答，有些例子来自我自己的交易过程，有些来自他人的交易过程，有些是我正在使用的，还有一些是我知道有价值但自己可能并未使用的。为何如此多样？因为很难知道什么会对某个特定的投资者或交易者产生共鸣。有时，“学生”比“老师”懂得更多。事实上，我从布林带用户那里得到的反馈，其价值常常与建议本身相当，甚至偶尔更胜一筹。原因很清楚：其他人思考过我没有想到的事情，这也是我阅读这类书籍的原因。\n\
  \n有一点你始终可以确信：无论某种方法被教授得多么具体或清晰，接受它的人都会将其带回家，反复思考，并加以修改以适应自己的需求。这意味着，如果你向 100 名交易者教授一种交易方法，结果很可能是由不到\
  \ 100 名不同的交易者实践出 100 多种不同的方法，而不是 100 名交易者使用同一种方法。为什么是 100 多种方法？因为会有许多变体被尝试。为什么是不到\
  \ 100 名交易者？因为老话讲得好：你可以把马牵到水边，但你不能强迫它喝水。\n\n我的经验表明，当给出的建议不那么具体时，最终结果反而会更加一致。这是因为许多交易问题都有通用的解决方案，这些方案本身就运作良好；非常笼统的建议会促使交易者专注于这些解决方案，而非常具体的建议则会导致交易者寻求变化。这一现象的另一个体现是，多年来，我和我的团队为交易者和投资者开发了许多网站。通常，我认为网站上最有趣和最有用的部分（例如，[www.BBands.com](http://www.BBands.com)\
  \ 上的“The Edge”板块）并不是用户感兴趣的部分。事实上，我们的用户经常以我们未曾预料甚至未曾想到的方式来利用这些网站。\n\n这就引出了那个反复出现的问题的答案：如果公开一个有利可图的交易方法，它难道不会很快因套利而消失吗？对于这个看似简单的问题，实际上有两个答案。首先，如果该方法、工具或方法的优势来自于一个基本且根本的市场机制，那么它很可能会持续有效，直到市场本身发生质变。其次，如果所教授的是针对特定市场或时期的数据挖掘产物，那么它将无法持久；它会失效，而且很可能会在不久后而非更晚失效。这其中包含了一个教训：依赖基本市场机制（如波动性或均值回归）的简单方法，比那些复杂、常进行曲线拟合的同类方法更可能有用且稳健。\n\
  \n那么，交易者应该怎么做？第一，要忠于自己。待在自己的舒适区内，并且只能循序渐进地拓展边界。第二，学习技术分析的历史。前辈大师们知识渊博，仔细研读市场历史能让你受益匪浅。第三，学习一点数学；不必太多，一些代数和非常基础的统计学知识即可。你将与数字打交道，所以要和它们交朋友。第四，学习一点编程；Python\
  \ 是一个不错的起点。如今，大多数交易平台都允许你使用非常高级且易用的语言来自定义其功能。一点点编程知识就能让你的交易员生活轻松得多。第五，要自律。第六，非常重视头寸规模管理。第七，杠杆不是你的朋友。最后，要让交易变得有趣。你很可能会长时间从事交易，所以最好能乐在其中。\n\
  \n总结一下：有纪律地交易，不要过量交易，并且主要依靠技术分析。\n\n——约翰·布林格，CFA，CMT\n[www.BollingerBands.com](http://www.BollingerBands.com)\n\
  \n关于作者\n\n![image](img/9781430244431_unFM-01.jpg)\n\n\n\n**蒂姆·布尔昆**是线上交易博览会（现为交易者博览会）和外汇交易博览会的联合创始人。作为洛杉矶警察局的一名警官，布尔昆白天上午交易股票和货币市场，晚上追捕罪犯。当他想要寻找一个能让交易者了解其他人如何参与市场的行业盛会时，却发现没有这样的活动。于是，1999\
  \ 年，布尔昆与一位商业伙伴共同创办了面向线上交易者和投资者的年度大会及展览会。这些每年在纽约、拉斯维加斯和洛杉矶举办的活动，至今仍是面向活跃的零售交易者的顶级盛会。\n\
  \n在过去 14 年间与无数交易者交流后，布尔昆意识到，学习交易赚钱的最佳方式就是向那些每天都在从事交易的人请教。他开始寻找行业内的佼佼者，并详细询问他们是如何赚钱的。有些人愿意与他交谈，而有些人则拒绝了，但凭借坚持不懈的努力，他慢慢地采访了数百名交易者，内容涉及他们采用的策略、使用的软件以及如何建立对市场的信心。2006\
  \ 年，布尔昆创立了 [TraderInterviews.com](http://TraderInterviews.com)，这是一个以坦诚对话为特色的在线媒体网站。\n\
  \n![图片](img/9781430244431_unFM-02.jpg)\n\n**尼古拉斯·曼戈**是一位自由撰稿人和编辑，他在活跃交易社区的工作已持续七年多，并涉及众多门户网站和主流媒体。作为一名前一级大学运动员，曼戈亲身体验了不断学习和提高技能的必要性，以及长久保持高水平表现的压力和其中的起起落落。2006\
  \ 年，在他第一次参与交易者博览会时，他清楚地意识到，交易者们也经历着类似的旅程，面对着一个同样迷人、甚至可能更加无情的对手：金融市场。\n\n从那时起，他便坚定地致力于帮助交易者找到清晰的方向和答案，这些答案可以成为他们在市场中建立持久而繁荣事业的基础。此后，曼戈与数百名专业交易者和行业专家合作，发布了他们在不同市场和时间框架下进行交易的最可靠、最清晰且最可行的方法和策略。\n\
  \n## 致谢\n\n我要感谢后续章节中所有受访者，他们慷慨且耐心地允许我询问关于他们如何在市场中谋生的各种“愚蠢”和复杂的问题。你们乐于谈论自己技艺的态度，无疑将帮助成千上万正在寻找自身优势的挣扎交易者。感谢\
  \ Apress 出版社的摩根·厄特尔，是他的耐心、鼓励和激励性的推动，让这本书在看似永远无法完成之际得以付梓。最后，我要感谢我的合著者尼古拉斯·曼戈，他承担了将粗糙采访记录修改成精炼语句的艰巨任务。你今天能拿到这本书的唯一原因，就是尼克说了句：“当然，听起来很有趣！”谢谢你，我的朋友。\n\
  \n——蒂姆·布尔昆\n\n对我而言，这本书代表了一个毕生梦想的实现，我衷心感谢所有使之成为可能的人，首先是每一位交易者，他们开放无畏的参与产生了跨越时间的洞见，我们希望这些洞见能给所有读者带来乐趣、启发和教育。感谢\
  \ Apress 出版团队的摩根·厄特尔和丽塔·费尔南多，感谢你们在这个项目的各个阶段所给予的耐心、坚持和热情。同时，也要感谢我充满爱意和支持的父母、我的祖父以及我所有的朋友。希望这本书最终能平息你们的疑虑——我并非整天无所事事地坐在电脑前玩！最后，我最衷心地感谢我的朋友和合著者蒂姆·布尔昆，他对教育的热情和卓越的领导力不仅塑造了我的职业生涯，更触动了我的生命。\n\
  \n\n\n—尼古拉斯·曼戈\n\n## 章节\n\n### 托德·戈登\n\n**托德·戈登**是阿斯彭交易集团的创始合伙人兼研究与交易总监，同时也是弗洛伊德、戈登与合伙人投资管理公司的负责人。此前，他曾身兼两职，担任`FOREX.com`的高级技术策略师以及该平台母公司\
  \ GAIN Capital Asset Management 的高级交易员。\n\n戈登曾是 GAIN Capital Asset Management 六名交易员之一，负责管理超过\
  \ 1000 万美元的交易资金。他定期亮相 CNBC 的节目*《快钱》*和*《资金流动》*，并曾在彭博社、BNN（商业新闻网络）以及道琼斯在线等媒体上提供全球市场的专业分析。\n\
  \n在纽约州北部圣劳伦斯大学就读期间，戈登曾参加该校的甲级高山滑雪队，与未来的奥运选手同场竞技。如今，他冬天依然喜欢驰骋雪场。他信奉的座右铭是“计划你的交易，交易你的计划。”\n\
  \n**蒂姆·布尔昆：** 我听说交易是你大学毕业后的第一份工作。你是在哪里上的大学？\n\n**托德·戈登：** 前两年我在纽约州北部的圣劳伦斯大学就读。我的专业是经济学，辅修商科。那时，我还没找到自己的激情所在。大学期间，我的重心是高山滑雪速降比赛。圣劳伦斯大学是甲级滑雪学校，所以我努力争取加入了校队，并有机会与队里几位未来的奥运选手切磋交流。说实话，在大学里，我几乎一心只想着如何提升自己的回转技术，仅此而已。因此，在那里比赛了两年后，我告诉自己，是时候专注于工作和规划职业生涯了。我意识到自己不可能靠滑雪谋生。于是，我从圣劳伦斯大学转到了奥尔巴尼州立大学，并在那里完成了学位。不过，我并没有完全放弃竞技滑雪。奥尔巴尼州立大学有一支丙级滑雪队，所以我继续参加比赛，但开始更多地专注于我的商科和经济学课程。正是在那最后两年里，我开始认真考虑将交易员作为自己的职业。\n\
  \n**布尔昆：** 那时你对成为一名交易员需要具备什么条件了解得多吗？你有没有想过可能会在华尔街工作？\n\n**戈登：** 从圣劳伦斯大学到后来在奥尔巴尼大学的两年里，我一直有一个电子交易账户。这更像是一种爱好，日内交易股票，恰好是在“日内交易”这个词刚开始出现在新闻里的时候。那时候，我交易基本上就是瞎蒙。我当时还跟着一个叫“东京乔”的聊天室。他是当时最轰动的人物，市场开盘时，他的聊天室里每天都有成千上万的交易者。他推荐一只股票，大家就会盲目买入，根本不知道为什么。那真是一段疯狂的时期。\n\
  \n**布尔昆：** 他是不是后来被起诉了之类的？\n\n**戈登：** 是的，当他的整个骗局被揭露后，他最终证明是个骗子。他会在聊天室里炒作股票，所有人都跟着追涨。结果发现，他在推荐前的几天就已经买入了那些股票，然后在建议聊天室里所有人买入后的几分钟内就开始抛售。他的股票推荐，以及那么多会员的跟风操作，确实能迅速影响市场。我记得有一笔交易是做代码为`GEEK`的股票。我记得好像是“互联网美国”这家公司，大约在\
  \ 10 分钟内我就每股赚了 10 美元。\n\n当然，也有很多其他交易做得很糟糕，我经常被止损出局。我确实热爱交易这个游戏，但最终我明白，盲目地追随一个聊天室，却丝毫不了解市场发生了什么，也不明白自己做交易决策的原因，从长远来看是不可持续的。如果运气好，你也许能偶尔赚到钱，但只有基于客观指标构建自己的策略，才是让交易成为全职工作的唯一途径。\n\
  \n所以，从那时起，我开始真正学习如何独立交易，不再依赖聊天室主持人给出买卖建议。大学期间我读的第一本书是亚历山大·埃尔德写的《以交易为生》[Wiley, 1993]。我知道自己想以此为生，所以觉得这本书是完美的入门读物！那是我第一次学习阅读图表和技术分析，突然间，我学会了如何在图表上画一条简单的趋势线。我开始在图表上到处画趋势线，也就是从那时起，我开始形成某种关于买卖哪些股票的计划。这些简单的趋势线，是我以一种客观方式看待市场、理解何处可以介入优质交易的起点。\n\
  \n有趣的是，当我学习经济学（当时我认为这在交易领域基本没什么用）的同时，我也开始理解如何做基础的技术分析，并将其应用于我考虑交易的每一只股票。当我看到股票的价格行为以及它们如何在这些趋势线（作为支撑和阻力）处反弹时，我彻底被交易的“虫子”叮咬了，我清楚地知道这就是我想从事的职业生涯。\n\
  \n结果证明，我的经济学学位并非完全无用。我实际上认为它帮助我更深入地理解了市场，尤其是在我现在交易外汇市场的时候。对全球经济体系运作方式的广泛理解，对我的成功至关重要。\n\
  \n**布尔昆：** 那时你使用的是什么类型的软件和工具？\n\n**戈登：** 这很有趣，因为我甚至无法想象今天还在用同样的系统交易。我很早就开始用这家公司的网络账户和电子交易账户进行日内交易了。界面和工具跟现在完全没法比。我的账户里大概有\
  \ 5000 美元。我那时用的是慢得离谱的拨号上网进行日内交易。但我骨子里的好胜心让我全心投入，我决心要把它做好，不管我用的工具多么糟糕。我记得我用的 AOL\
  \ 拨号上网，那要追溯到按分钟计费的年代，因为上网对我来说算长途电话。当时我 19 岁，待在家里——就是在我父母家晃悠。我妈妈拿着一大笔电话账单来找我，差点没把我打死。股市开盘时，我每天上网大约八个小时。有几次电话账单每张高达一千美元，不用说，我妈气得够呛。\n\
  \n**布尔昆：** 是啊，我能想象。当你用拨号连接下单时，你点击“买入”按钮，然后等着系统慢悠悠地转几秒钟。我记得那些日子，大约要一分半钟才能收到确认信息，对吧？\n\
  \n**戈登：** 我甚至都不记得了。肯定是的，但那时我根本没想过我的成交价不是最优的。我对做市商的执行手法和他们玩的把戏一无所知。点差巨大，滑点也糟糕透顶。如果下市价单，你会亏得很惨，因为你最终得到的成交价与你预期的价格相去甚远。软件还老是崩溃。拨号连接也经常断线。真是一团糟。那时，我认为这就是游戏的一部分。我总得从某个起点开始。而且我想，如果能在那种交易环境下赚钱，那在任何地方都能赚钱。\n\
  \n**布尔昆：** 是的，绝对是这样。如果你没有经历过那段时期，你可能就不会是今天这样的交易员了。所以我认为，即使是糟糕的经历，某种程度上也在增加你作为交易员的经验积累。你大学毕业后，是立刻找到了交易员的工作吗？\n\
  \n\n**Gordon:** 我立刻开始寻找交易方面的工作。我在 `Monster.com` 上找到了一家位于圣地亚哥的公司。大四那年，我正准备参加最后的期末考试，我拨打了招聘信息上的电话号码。接电话的人后来成了我现在的商业伙伴，`Dave\
  \ Floyd`。\n\n我在电话里跟他聊了，我说：“我对交易非常感兴趣。我刚大学毕业，很快就要毕业了。”他告诉我他们有交易员的空缺职位，但当然，他需要面试我。他在圣地亚哥，而我在纽约州北部，那时正值考试周前夕。我不确定自己怎么才能做到，但我知道这是一个不容错过的机会。还有谁会考虑雇佣一个刚毕业、唯一的经历就是一个聊天室、几本交易书籍和一个\
  \ `E-Trade` 账户的交易员呢？所以我说：“我稍后给你回电话。”大约半小时后，我给他回了电话，告诉他我周二会到那里。\n\n我在考试前飞过去见了他，进行了面试，然后立即飞回家参加期末考试。几天后，他给我回电话，说我得到了这份工作，前提是搬到圣地亚哥。当时我在圣地亚哥有很多家人，从纽约州北部寒冷的冬天搬到圣地亚哥阳光明媚的海滩，这是一个轻松的决定。我有机会成为一名交易员，同时生活在天堂。我还能要求什么呢？我住在太平洋海滩，那是一次很棒的搬迁。在毕业后的头几个月里，我从\
  \ `Dave` 那里学到了交易的门道。\n\n**Bourquin:** 你还记得他在寻找交易员时看重什么吗？他是在寻找特定的品质或特定类型的人吗？你觉得他看中了你什么？\n\
  \n**Gordon:** 这很有趣，因为大多数交易员都知道，学业成绩并不总能转化为交易员的成功。有时，学业成绩过于出色的人最终会成为糟糕的交易员，这基本上是因为他们不习惯犯错。交易不像工程或数学，你有一个公式，输入数据后，答案要么对要么错。作为一名交易员，你需要非常能够接受在市场上犯错。自信和自我会毁掉一个交易员，如果他认定自己是“对的”，市场会朝他的方向移动。所有经验丰富的交易员都知道一句话：“市场保持非理性的时间可能比你保持偿付能力的时间更长。”这是千真万确的。交易中没有正确答案，你总是在信息不完全的情况下做决策。有些人很难接受这一点。\n\
  \n所以，我的第一个老板，也是现在的商业伙伴，实际上看中了我的滑雪比赛背景，他知道我来自一个竞争激烈的背景。他对自己说：“这家伙很坚韧，而且在一项个人运动中表现出色。”滑雪运动需要很大的责任心和自律，因为是你自己对抗赛道——而不是真正的对手。所以，我认为他看到了我身上的竞争精神，这个行业里几乎所有人都知道，当你以市场为生时，这是一种重要的品质。他也知道我在期末考试前赶来面试，他说这显示了对工作的投入，以及学习如何做好这件事的决心。\n\
  \n**Bourquin:** 我喜欢用体育来比喻交易。棒球是我最喜欢的运动，我总能看到它与交易之间的关联。在滑雪方面，我脑海中浮现的是，你总是要向下一个弯道看，预测需要怎样做才能在不摔倒的情况下通过下一个旗门。你认为滑雪和交易之间存在某种联系，帮助你成为成功的交易员吗？\n\
  \n**Gordon:** 是的，绝对有。这实际上是我在交易者博览会和其他会议上演讲时喜欢讲的一个经典故事，因为它太适用于交易了。如果你在奥运会期间观看滑雪比赛，你会看到选手们以每小时五十英里的速度冲下山坡，但你看不到的是比赛前所有的准备工作。实际上，有一个叫做“赛道勘察”的阶段。他们要做的就是爬到赛道的顶端，然后沿着他们当天晚些时候将要比赛的赛道侧滑下来。\n\
  \n你要做的是记下心理笔记，并制定一个策略来应对赛道上不同类型的赛况。你要观察太阳照射在雪上的位置，这会造成不一致的雪况。或者，可能某个区域被太阳遮蔽，所以会非常坚硬和结冰。也许赛道上某个地方有一些崎岖的地形。你要考虑所有这些已知的因素，它们会影响你的比赛进程，这样你就可以把它们纳入你的比赛计划。\n\
  \n滑雪比赛中的准备至关重要，因为当你以每小时四五十英里的速度冲下山坡时，你不会有时间在做出反应之前去思考这些事情。这需要在比赛开始前就融入你的比赛计划中。不可避免地，会出现你事先无法预见的未知变量，所以当你执行比赛计划时，你需要有足够的精力去应对这些因素，并在行进中即时适应和处理它们。\n\
  \n交易也是同样的事情，尤其是我交易的方式。我会从各个角度审视市场，并不断留意在交易过程中可能出现的任何情况。如果可能，我会在真正下订单之前将这些因素纳入我的交易计划。惊喜越少越好，而且我知道，就我个人而言，如果我有一个书面的交易计划，我在交易中会做出更客观的反应。因为不可避免地，在比赛——或交易——过程中会出现一些情况，你需要全神贯注地做出快速调整。所以，滑雪和交易在准备和执行方面，在交易或比赛过程中，是极其相似的。\n\
  \n**Bourquin:** 我经常听到非常优秀的专业交易员说，他们很有信心在信息不完整的情况下做出决策。他们并非无所不知，但仍然能够在市场上做出自信的决策。你同意这个观点吗？\n\
  \n**Gordon:** 我认为 `Paul Tudor Jones` 说得最好，他说一些最好的交易也是最难执行的交易。我认为这意味着需要一种信念的飞跃。我不是说在没做任何研究的情况下盲目地建仓。而是当你已经尽可能多地收集和消化了信息之后，总是会到达一个点。你不可能永远知道所有事情。如果你坚持在执行交易前了解一切，你就会不断地陷入“分析瘫痪”。这是反直觉的。\n\
  \n作为人类，我们都认为信息越多越好。更多的信息应该意味着更好的决策，这在某种程度上是对的，但你需要能够在不知道结果会是什么的情况下，做出买入或卖出的决定。所以，需要一种信念的飞跃。你可以让概率站在你这边，但不可避免地，还需要发挥直觉的作用。\n\
  \n\n#### 交易直觉与市场感觉\n\n通过长期观察市场，可以培养出一种直觉。你可以通过研究市场、尽可能多地了解某只股票或期权的行为特性，掌握其中 80%的诀窍。另外\
  \ 10%会来自于随着交易经验增长而形成的盘感。最后 10%则是那些你未知的信息。你必须能坦然接受这最后 10%的缺失，并在缺少这些信息的情况下仍能做出正确的决策。\n\
  \n掌握所有信息并不能让你执行最佳交易。在某个时刻，你需要单纯地感受市场即将发生的动向。我认为这一点是无法量化的。最优秀的交易者并非最出色的研究者。如果真是这样，那些擅长研究数据的科学家恐怕早就把我们都击败了。在真实的交易世界中，你收集所能获取的信息，然后做出决策。\n\
  \n**布尔坎：** 你刚开始交易时，主要交易哪些市场？\n\n**戈登：** 我在第一家公司交易股票，主要是纽交所上市的股票——那些大公司。我十分倡导要了解一个市场的个性，感受你所交易的市场，这样你才能开始预判市场对新闻和需求会作何反应。交易纽交所股票的一个优势在于，你通常只与一个专家（做市商）打交道。在纽约证券交易所的交易大厅里，显然有一个人掌控着大的成交量和价格变动。你会逐渐了解他的个性，以及他处理买卖价差和成交汇报的方式。\n\
  \n我们对几个专家的行为模式了如指掌，以至于我们经常在办公室里打趣，猜猜那位专家长什么样，如果下班后跟他出去喝一杯会跟他说些什么。我们甚至能感觉到，在交易活跃期，哪个专家比其他专家更镇定。如今，随着一切走向电子化，你无法获得同样的反馈了。但我仍然相信，只要经验足够丰富，你可以仅通过观察市场日复一日的波动方式，就开始预判你所交易的任何市场的动向。\n\
  \n我们还会收听标普 500 期货交易池的音频。即使我们不交易期货，我们也常常能在纽交所股票交易加速前的片刻，听到交易池中的嘈杂声增大。所以我们会收听本·利希滕斯坦的节目，他至今仍在运营[TradersAudio.com](http://TradersAudio.com)，而这大概是十年前的事了。他会预测标普期货的走向，以及谁在积极买卖。他会说“交易池里有大单”或“大单买入”，并宣布标普期货的成交点位。他会宣布机构卖家何时开始进入市场等等。与此同时，你还能听到背景中交易池交易员低沉的喧闹声，当市场加速时，这声音会变得更大更快。\n\
  \n接下来会发生的是，当标普期货开始波动时，构成道琼斯工业平均指数的那些大盘股显然会紧随其后，以追赶标普期货的走势。因此，我们会听到交易池里是否有大的波动，然后几乎立刻就能看到这反应到股票走势上。标普交易池的噪音和信息会给我们提供一点优势，让我们预判大盘股可能的方向。如果我们听到交易池里有异动，且某个买家介入推高了价格，我们就会立即行动，在纽交所下一笔买单，然后观察专家如何处理涌入的订单流。接着我们就会快进快出，赚取\
  \ 10 美分或 15 美分的差价，一天重复二三十次。\n\n**布尔坎：** 标普期货交易池对短线交易者来说，仍然是一个有效的领先指标吗？\n\n**戈登：**\
  \ 是的，在某种程度上是，但不像过去那样有效了。我认为现在的市场更加复杂，也更加有效。由于实行了美分报价，股票的点差要小得多，而过去是分数报价。标普期货交易池的噪音对于交易者感受恐慌性买入或卖出仍然有价值，但现在的进程快得多了。此外，现在你还得应对算法交易和高频交易，这些已经大大改变了局面。我们过去是利用那个延迟在几秒钟内操作，但这个延迟基本上已经消失了。我们当年拥有的那个优势——因为期货市场领先于股票市场，我们可以快速进出——已经不复存在了。\n\
  \n我们看到了不祥之兆，并决定是时候转向外汇市场交易货币了。在交易中，“适者生存”，如果你不能随着时代变化而改变或调整你的交易方法，你最终将无法赚钱。没有哪种方法能永远有效。\n\
  \n此外，我认为交易是一种生活方式。如果整天做短线交易——每天来回做三五十笔交易，试图每次赚取 5 分或 10 分的差价——过不了多久，你就会对这种风格感到精疲力竭。在这种水平上操作需要耗费大量精力，所以从交易生活方式的角度来看，我知道我最终必须做出改变。那种每天疯狂的节奏真的会慢慢耗尽你的精力。\n\
  \n**布尔坎：** 大多数日内交易者，当谈及早期的日内交易时，他们都是从 SOES（小单执行系统）和纳斯达克股票开始的。但你却是从交易纽交所股票开始的。为什么？\n\
  \n**戈登：** 在我进入市场前的几年，“SOES 强盗”式的交易风格很流行。在我被聘用之前，戴夫·弗洛伊德在圣地亚哥的办公室做了很多纳斯达克交易。他在纳斯达克非常活跃。我想戴夫会告诉你，他的办公室有过几天，仅他们的交易量就占了\
  \ QQQs 总交易量的 5%甚至 10%以上。所以，在 90 年代末，他们在那个纳斯达克 ETF 上做了大量的交易。但后来，我认为是在互联网泡沫破裂、所有那些科技股暴跌之后，他们开始转向纽约证券交易所的股票，因为他们意识到，通过观察标普期货并了解专家的行为，他们能获得几秒钟的优势。\n\
  \n这又回到了一个事实：对于纳斯达克股票，你面对的是大量的做市商和提供流动性的 ECN。而纽交所股票则由一个人掌管着订单簿，那就是专家，这里存在一个可以利用的优势，因为至少在那个时候，它的效率较低。\n\
  \n**布尔坎：** 你在做那些交易时，有没有使用任何技术分析？还是仅仅“听着交易池的动静，然后跳到纽交所前面去交易”？\n\n**戈登：** 我使用图表，但那是非常基础的技术分析。在我的屏幕上，我会放着标普期货的一分钟和五分钟图表，以及我当时正在交易的股票的一分钟和五分钟图表。在这些图表上，我们会使用随机指标、布林带，可能还有一两条移动平均线。\n\
  \n我们使用移动平均线的方式是：我们知道十五分钟和六十分钟图表上的 20 周期移动平均线对市场很重要，并且其他交易者也在关注那个价格水平。在那个区域周围似乎总是有大量的成交量。但我们在五分钟图表上进行交易，所以我们想在更短期的图表上监控那个水平。通过做一些简单的计算，我们意识到五分钟图表上的\
  \ 240 周期移动平均线等同于六十分钟图表上的 20 周期移动平均线；它们是同样的水平，但显示在我们的短期图表上。\n\n\n\n#### 交易策略与个人经历访谈\n\
  \n最终，我们希望在多个时间框架上观察二十周期移动平均线。因为那里往往会有大量成交量。所以，我们通过观察移动平均线来判断成交量或订单会在哪里聚集，然后，我们会利用随机指标来确认市场正在回撤。当随机指标开始掉头向上时，我们就会入场进行短线交易，博取上涨利润。\n\
  \n**布尔昆：** 你还记得当时平均每个仓位你会交易多少股吗？\n\n**戈登：** 我从小仓位开始。刚开始交易时，公司给我们设定的上限是一百到两百股。一旦你证明自己在这个规模上能够赚钱并且保持纪律，你就会升级到五百股，然后是一千股。两年后，我甚至打电话给我们在旧金山的风控主管，试图将我的上限提高到两千股。最后，我把它推高到五千股，甚至一万股。所以，我会持有五千股或一万股的仓位，但只持几分钟。要想通过超短线交易真正赚钱，你必须达到那样的交易规模。\n\
  \n**布尔昆：** 你当时的薪资情况如何？是底薪加提成，还是预支薪水再加上利润分成？\n\n**戈登：** 既没有底薪，也没有预支。完全取决于你赚了多少利润。当时的规定是你赚取利润的\
  \ 50%，公司留下另外 50%。然后，当然你还要自己缴税。我那时候能维持生计，但第一年只交易五百股。靠这个谋生很难，尤其是在圣地亚哥生活。所以头几年我过得非常节俭。我想我每周大概有四到五顿饭是在\
  \ \"In-N-Out\" 汉堡店解决的，而且我从未吃腻过。现在住在纽约，我反而很怀念 \"In-N-Out\" 汉堡！但我确实为我的成长付出了代价。任何新手交易员，如果以为坐在电脑前就能立刻赚大钱，最终很可能会失望。但为了学会交易，头几年过得清贫些是值得的。\n\
  \n**布尔昆：** 你提到某个时间点你转向了外汇市场。是什么促使你的纽交所股票交易策略发生了改变，让你决定寻找其他市场呢？\n\n**戈登：** 那大概是 2003\
  \ 年。我清晰地记得我们采用那种交易风格最后辉煌的一天。就在世界通信公司的伯尼·埃伯斯被捕后不久。我记得第二天我们上班时，标普期货下跌了大约 15 个点——那时标普指数大约在\
  \ 850 点左右。按百分比算，这是个很大的波动。市场波动性巨大。我记得办公室里的其他交易员和我在那一天都赚翻了。我们赚到了有史以来单日最高的利润，反复进行短线交易。收盘时，我和戴夫的利润实际上只相差几百美元。那差不多是市场的最低点。\n\
  \n所以，回答你的问题：当市场从那个低点（我认为是 2003 年的低点）开始反弹时，波动性就消失了。我们当时采用的超短线交易策略，非常依赖高波动性。没有每天持续的价格波动，超短线交易员赚钱就极其困难。市场从那里开始上涨，但标普指数从每天波动二三十个点，降到了只有八个点左右。当盘中波动性较低时，对于我们来说，在交易机会方面日子就开始变得艰难了。实际上，戴夫在那时已经开始交易货币市场了。所以，他把我带进了那个领域，我们开始交易外汇市场。\n\
  \n我很享受在那个办公室的交易时光，但我想拓宽一下自己的经历，于是去洛杉矶为 [TradingMarkets.com](http://TradingMarkets.com)\
  \ 的拉里·康纳斯工作，撰写关于货币市场的文章。但我仍然和戴夫保持联系，并继续用自己的账户交易外汇市场。\n\n**布尔昆：** 我们来谈谈你下一步加入 [FOREX.com](http://FOREX.com)\
  \ 的经历。你是直接作为交易员入职的，还是先做了其他工作？\n\n**戈登：** 我在西海岸已经待了整整三年，感觉是时候回家了。离开一段时间后，你会忘记那里的冬天有多糟糕，所以我准备好回到东部了。一开始我被聘去编写他们的“学习交易外汇”课程。当时关于外汇交易的信息并不多，所以我着手编写了一门关于如何交易货币的扎实入门课程。所以，最初我并不是以交易员的身份被雇用的。\n\
  \n我入职后开发了他们的第一门货币交易课程。同时，我还做一些机构销售工作，帮助建立他们的大型介绍经纪商关系，并与基金经理沟通，希望能吸引他们的资金到 [FOREX.com](http://FOREX.com)。正是在那段时间，我真正了解了现货外汇市场的业务运作方式以及外汇经纪商是如何工作的。\n\
  \n过了一段时间，我开始为客户撰写一份名为“当日策略”的每日报告。实际上，当时这份报告只是为内部销售人员准备的，以便他们能获得清晰直接的市场分析以及图表，这样他们与客户沟通时就有话题可谈。每天我都会指出几个在不同货币对上需要关注的点，并提供一些评论以及技术分析。基本上，这只是我个人在自己的账户中关注的市场情况。这有两个目的。首先，通过写下我对市场的看法，帮助我巩固了自己的交易策略。其次，这也有助于培训销售团队，使他们在推销理念时能专业地谈论货币市场。\n\
  \n我大概做了六个月左右，当时的 CEO 马克·加兰特开始阅读这份报告。他认为写得不错，并决定将其做成一份研究报告，通过交易平台发送给每一位账户持有人。就这样，针对客户的“当日策略”诞生了。我想那是在\
  \ 2005 年。这份策略报告极大地帮助我理清思路，我也因此开始积累起相当多的追随者。\n\n从那以后，我继续交易自己的个人账户。我当时还没有参与公司的资产管理计划，但我非常努力地证明自己能够持续稳定地交易，以便达到那个阶段。\n\
  \n我给当时的老板格伦·史蒂文斯写了一封邮件。我想出了一个独特的方法，希望能进入资产管理这一块业务。我问，如果我用个人账户交易三个月，并且连续三个月都盈利，我能否有机会加入对冲基金交易团队？当时，那支对冲基金的规模大约有一亿美元。他认可了这个挑战，并同意这是证明我交易能力的好方法。于是，我努力进行盈利交易，连续三个月盈利，最终在基金里赢得了一席之地。我想我应该是当时对冲基金交易团队里最年轻的一个。\n\
  \n**布尔昆：** 从股票交易，尤其是纽交所股票，跳到现货外汇，这是一个巨大的跨越。在过渡初期，你尝试了哪些方法来感受如何交易这个市场呢？\n\n**戈登：**\
  \ 这是个好问题，因为你不能仅仅因为某个做市商或专家的行为就去超短线交易外汇。现货外汇市场没有中央交易市场，所以我只认识少数几个能够成功进行超短线交易的人，而且往往也只能持续很短的时间。外汇市场一直是一个更依赖技术分析的市场。当我在\
  \ [TradingMarkets.com](http://TradingMarkets.com) 和 [FOREX.com](http://FOREX.com)\
  \ 工作期间，我确实研究了许多不同的方法论，因为我知道短期动量交易在外汇市场行不通。我真正需要做的是磨练自己阅读图表的技术分析能力。\n\n\n\n#####\
  \ 采访记录：交易策略与职业生涯\n\n我开始了寻找“圣杯”的旅程，就像每个交易员在职业生涯的某个阶段都会经历的那样。我们都在寻找一种神奇的设置或神奇的方法论，希望它能适用于所有市场和所有时间框架。当然，这并不存在，但你仍然必须找到一种适合你个人风格和风险承受能力的策略和方法。在找到我当前的方法论之前，我苦苦搜寻了整整几年。\n\
  \n我真的付出了很多努力，才从交易动量转向基于图表的、更技术性的交易层面。关键是，你需要更加技术性地交易外汇，因为它更像是一场棋局，而不是与对手（专家）打一场拳击赛，而这正是当日交易股票的特点。\n\
  \n**Bourquin：** 我知道在某个时候你选择了艾略特波浪理论。那是何时发生的？\n\n**Gordon：** 那发生在我刚加入 `[FOREX.com](http://FOREX.com)`\
  \ 的早期。我对它有一些了解，而且我们可以接触到大量投资银行的研究报告。`[FOREX.com](http://FOREX.com)` 和货币市场中的其他外汇公司会与大型投资银行对冲其业务，而我们当时是瑞银、巴克莱、高盛和雷曼等公司的大客户（如果你能相信的话）。正因为这种关系，我们能获得银行的研究报告，并且每家银行都有几位我密切关注的专家。\n\
  \n瑞银有一位名叫 `Jim Short` 的人做艾略特波浪分析。高盛也有一个人做艾略特波浪分析，我每天都会观看和阅读他们的文章。我给他们发邮件，不停地用关于艾略特波浪的问题打扰他们。我读了所有的书。那是我在\
  \ `[FOREX.com](http://FOREX.com)` 的早期时光，我花了大量时间阅读那些银行的研究报告。这些人在做出别人都没有的预测和分析。他们的分析非常精准，我发现自己不停地问他们各种问题，想了解他们是如何进行分析的。我开始寻找关于艾略特波浪计数的所有可用信息，并阅读了我能找到的关于这门手艺的一切。\n\
  \n**Bourquin：** 一旦你通过交易进入了对冲基金团队，你的薪酬是如何运作的？和以前一样——全是利润分成——还是你有一些基本工资？\n\n**Gordon：**\
  \ 因为我身兼二职，并且仍然在研究部门，所以我写研究报告是有薪水的，然后我从为资产管理团队交易中赚取一定比例的利润。\n\n**Bourquin：** 好吧，这有点像混合模式。你既是自营交易员，又是研究撰稿人，所以你一个人干了所有活。\n\
  \n**Gordon：** 是的。那真是一份很酷的工作。`[FOREX.com](http://FOREX.com)` 是我人生中一段美好的时光，我有机会与一群非常优秀的人共事，并撰写一份很棒的研究报告。我不是说一开始质量就很高，但我做得很开心。这也让我能够通过将策略公之于众来厘清它们。一旦发布出去，就无法隐藏或收回。在那段时间里，我对自己的交易获得了巨大的信心。\n\
  \n随后，我与世界各地的客户建立了许多良好的联系。随着研究报告的发布，我的知名度也在上升。我明确表示，我在“每日策略”报告中提出的交易和分析，我会在对冲基金中投入相当大的规模。这让我们的合规部门抓狂！他们非常讨厌我，因为我总是尽可能通过谈论我交易的真实金额来挑战底线。我快把他们逼疯了，但公平地说，美国国家期货协会（NFA）在\
  \ `[FOREX.com](http://FOREX.com)` 的办公室设有办事处，他们当时正在严厉打击外汇行业。`[FOREX.com](http://FOREX.com)`\
  \ 一直非常保守，希望确保他们始终合规。\n\n**Bourquin：** 让他们抓狂的事情之一是你如何从头到尾概述真实交易，对吗？\n\n**Gordon：**\
  \ 对。我总是挑战自己，尽可能透明地展示我在市场中的交易和操作。我给合规部门写了封信，说我想为 2008 年 2 月在纽约举行的交易员博览会做点什么。我说我想完整地核算一下上个月基金中我的三笔最佳交易和三笔最差交易。我想让“每日策略”报告的读者和我的客户看到当月的确切损益表。我做到了，而且我想我给你看过那个\
  \ PPT。\n\n**Bourquin：** 是的，我记得看过。没有多少人愿意分享他们赚了多少或赔了多少。\n\n**Gordon：** 我忘了具体的明细了，但我在三笔最佳和三笔最差交易中净赚了\
  \ `$25,000` 或 `$27,000`，并且我一步一步地带客户回顾了这些交易。我向他们精确展示了我是如何操作交易设置的。我向他们展示了从开始到结束的交易时间顺序。我冒了个险，如此公开这些信息，结果奏效了。我作为分析师和交易员的可信度持续增长。\n\
  \n**Bourquin：** 我几乎从一开始就在读“每日策略”，我认为它之所以与众不同，之所以如此迅速地受到欢迎，是因为很多在聊天室和新闻简报中的人都会对交易做出预测，如果交易变糟了，你就再也听不到后续了。他们转向下一个预测，永远不会回头说：“我在这个交易上搞砸了。”而你会回过头来说：“嗯，显然美元交易的结果不太好。这是我认为它失败的原因，以及我现在关注的重点。”我认为这种可信度和正当性非常罕见，而且我认为人们尊重这一点。\n\
  \n**Gordon：** 绝对如此。在交易行业的网络上有很多人试图吸引眼球，而我始终觉得这是最好的方式。在交易行业，很少有人愿意做到百分之百的透明。对于交易员来说，没有秘密，也没有轻松的成功之路。市场上存在一些极其误导人的营销，让交易员——尤其是新手交易员——觉得自己可以有\
  \ 90%的正确率。这不是市场的现实。如果你有 58%的正确率，并且你的平均值显示你在这些亏损交易中平均亏损 `48` 点，但在盈利交易中平均盈利 `82` 点，这是一个不错的业绩记录。这足以在市场中谋生。\n\
  \n我想我的使命就是向人们展示交易的真实情况，因为在我的职业生涯中，我遇到过很多非常优秀的交易员，我要告诉你：在他们的一生中，很少有人（如果有的话）的正确率能超过\
  \ 60%。这个现实需要与大家分享。我受够了那些胡说八道的营销。太荒谬了。当然，作为交易员你可以赚钱，但这需要时间、专注和努力。\n\n**Bourquin：**\
  \ 所以艾略特波浪理论让你达到了那个胜率，但我听说数浪并不容易。你必须以特定的方式数浪，这需要一些练习。你花了多久才对那个策略真正有信心？\n\n\n\n**Gordon:**\
  \ 我大概会说需要四到五年。任何能够带来超过 50%胜率的技能组合（就像一套好的交易方法论所能做到的那样），都需要付出大量的努力。我以前的滑雪教练总是说：“如果事情很简单，那每个人都能参加世界杯了。”这句话很简单，但我一直铭记于心。艾略特波浪理论是一种方法论，它让你能够量化市面上所有五花八门的传统技术形态。比如突破、跌破、旗形、楔形、双顶、双底等等。实际上，艾略特波浪理论会告诉你，在趋势或回调的哪个阶段，你可能会看到这些修正或形态的出现。当你把斐波那契数列叠加在它上面，它就能给你提供趋势和回调的预期起点，这就变成了你的入场点和出场点。\n\
  \n但从更宏观的层面来看，艾略特波浪理论是什么？它所做的仅仅是帮助你“解读盘口”，帮助你理解是什么样的大众心理在驱动市场，仅此而已。驱动价格变化的是羊群效应和大众心理，而不是基本面。驱动价格变化的是人们对未来会发生什么的信念。艾略特波浪理论就像一张“作弊小抄”，告诉你在一系列趋势的每个阶段，你可能会预期到什么样的大众心理特征。\n\
  \n当你能够退后一步并说，“根据我认为我们目前所处的波浪计数位置，我预期大众会有某种特定的感觉”，这感觉非常酷。你拿起报纸，打开电视，就能感受到人们在想什么、在说什么。你将这些感受与你寻找的、在趋势或回调各个阶段应该具备的特征进行叠加，然后你就能知道我们在这个过程和波浪计数中处于什么位置。接着，你就可以根据你的有效或无效判定点，着手进行交易了。所以，它不过是大众心理学的一张“作弊小抄”。一旦你树立起数浪的信心，市场就会变得更具可预测性。它总是有效吗？当然不是，但它能让你更好地感知市场潮起潮落中的位置。\n\
  \n**Bourquin:** 你提到基本面在你的交易中并不占主要地位。当你基于你的艾略特波浪计数进行交易时，举个例子，就像我们正在进行这次访谈的今天，非农就业数据报告刚刚发布，你会在意这些吗？你会在意这些事件，还是会不理会它们而继续交易？\n\
  \n**Gordon:** 如果艾略特波浪计数足够强劲，我整天都会无视这些事件进行交易。比如，今天我们持有澳元多头头寸，这是我们本周三建立的。在数据公布前，我们了结了部分头寸获利。今天我们带着澳元多头头寸进入非农数据公布时段，这通常与股市上涨相关。因为艾略特波浪计数显示我们正处于一个强势的第\
  \ 3 浪突破过程中，所以我说：“我们要带着这个头寸挺过非农数据。”我知道，即使是一个糟糕的报告，澳元无论如何也还是会走高。在非农经济报告公布前，澳元正逼近一个高点，但仅仅因为我们所处的波浪计数位置，我就很放心地保留了部分头寸。\n\
  \n有时候，波浪计数的力量强大到可以压倒任何其他新闻。当我们处于牛市时，市场会抛开盘面利空消息，继续遵循更长周期的趋势。请记住，艾略特波浪是市场心理的一个写照。即使一份经济报告对市场是灾难性的，如果我们处于牛市且波浪计数强劲，市场仍会走高。艾略特波浪理论可以告诉我们什么时候处于牛市，以及市场什么时候愿意忽略糟糕的数据。所以，是的，我们整天都在看基本面。但我们交易的不是基本面。我们交易的是人们对基本面的预期反应——而这正是关键的区别所在。\n\
  \n**Bourquin:** 这太有意思了。所以这对我来说意味着，你对艾略特波浪理论如此自信，以至于你愿意忽视哪怕是一个重大的经济报告。你愿意因为你在图表上看到的艾略特波浪形态而穿越这个数据报告进行交易？\n\
  \n**Gordon:** 你有多少次看到一份报告数据偏弱，但市场却上涨了？你又有多少次看到一份强劲的报告，但市场却下跌，走势与你预期的完全相反？这种情况一直在发生。必定有比那一瞬间的数据所显示的更强大的力量在起作用。我们验证或强化艾略特波浪理论的方法，是进行大量的相关性分析。我们寻找相关的市场。显然，大宗商品和股票市场与澳元高度相关。所以，我们会对相关联的市场进行波浪计数，并反过来验证我们在澳元上的分析。因此，如果大宗商品、国际股市和国内股市都处于“风险偏好”状态，并且我们在这些模式上都看到了良好的波浪计数，那么我根本不在乎会发布什么样的数据。如果市场看涨且大众在寻求风险，这些市场就会走高。\n\
  \n**Bourquin:** 让我们再把时间线跳回你离开 FOREX.com 并创办自己企业的时候。谈谈那个决定以及它是怎么发生的。\n\n**Gordon:**\
  \ 为自己工作并拥有自己的公司一直是我的梦想。我有幸与您 Tim 以及交易者博览会的同仁共事过，并且我在交易这个行业，与零售客户打交道，已经有很长一段时间了。通过这些关系，我认识了许多交易员，他们既交易自己的账户，也拥有自己的企业。我并不确定那是否是我想要的。我曾考虑过走投资银行的路线。我本可以在几家投行的技术研究部门谋得职位，但我最终还是选择了零售端，直接与客户合作，并拥有自己的研究业务。到目前为止，这太棒了，我对自己现在的状态非常满意。我热爱它。我真的很喜欢与交易员们一起工作，看着他们学习，并和他们并肩交易。这有助于我提高自己的交易水平。\n\
  \n在我的职业生涯中，我一直与我大学毕业后的第一任老板戴夫·弗洛伊德保持着联系。戴夫经营阿斯彭交易公司已经有一段时间了。我开始与 FOREX.com 的人谈我自己出去创业的想法。他们知道这一直是我的目标，并且我已经越来越接近实现它了。我和他们商讨了很长一段时间，讨论如何以一种对双方都有利的方式进行过渡。我们找到了一个我可以这样做的方法——我不会称之为退出计划——但就我就独立创业的事情，可能制定了一个长达约六个月的规划。我与他们密切合作。\n\
  \n我与他们保持着非常良好的联系，并在几个项目上与他们会作。我对他们给予我的机会感激不尽，这些机会让我磨练了作为交易员的技能，并在网上建立了一定的关注度。那次离职非常愉快，并且我得到了他们的全力支持。他们待我非常好，那是一段很棒的经历。他们祝福我跟随戴夫去独立创业，我们一年半前重新启动了阿斯彭交易公司。这是我人生中最精彩的部分，与此同时，在那段时期我还结婚了。那是我永远不会忘记的两年。我现在正在做我一直想做的事：交易并与客户分享我的分析。\n\
  \n**Bourquin:** 而且你现在做的事情，和你在 FOREX.com 时做的有些类似。你在阿斯彭交易公司为客户做研究，交易你自己的账户，同时你也在交易一个基金，对吗？\n\
  \n\n**戈登：** 没错，正是如此。我只是沿用之前让我取得成功的那套商业模式。如果我们发布一个研究性交易建议，我们必定会用数小时的图表分析、相关性和推理来支持它。我们的研究客户在看到我们执行交易时丝毫不会感到惊讶，因为在此之前，我们通常已经花费数小时甚至数天，一步步向他们阐明交易背后的来龙去脉。我和戴夫还创办了一家名为`FGP`的资产管理公司\
  \ [弗洛伊德、戈登与合伙人]，我们有一些投资者，所以我们也会在那里执行我们的交易思路。\n\n我们始终认为，既然要向客户提供研究和交易思路，就没有理由不对这些思路怀有足够的信心，并据此进行实盘交易。我们对自己的研究充满信心，因此实际执行这些交易是合情合理的。我们为投资者赚钱，同时也为我们业务的研究方面增添了另一层可信度。\n\
  \n我确信，有些人在客户面前是一套说辞，在自己的账户里却是另一套操作。我想晚上能睡个安稳觉，问心无愧。如果我对客户宣讲某个观点，那我就应该愿意把自己的钱投在这些想法后面。\n\
  \n**布尔昆：** 我认为很多人都在做投资通讯，并在推特或博客上发布交易建议。他们可能会发布一个建议，告诉你他们在交易什么，但却不给你解释背后的理由。也许是因为他们担心，如果告诉追随者自己的“独家秘诀”，客户或订阅者就会流失。但你似乎没有这个问题。你会精确地解释其背后的理由，以及你为什么要做这笔交易。\n\
  \n**戈登：** 这让我想起了尼克·诺特主演的电影《火爆教头》。你看过那部电影吗？片中，尼克·诺特饰演篮球教练，正在给他的球队做赛前动员。他告诉队员，在他看来，他可以走到对方教练面前，把他们的战术手册和赢得比赛的整个策略都交给对方。这都没关系，因为计划和策略并不是最重要的部分。计划和策略的执行与实施才是关键。把计划落实到位的能力才是赢得比赛的关键。交易中没有圣杯。没有哪种策略是独一无二或从未被尝试过的。相信我，在策略方面，天底下没有什么新鲜事。一切都关乎你的技能、你的纪律和你的执行力。\n\
  \n我真希望我的每一位研究客户都能确切了解我所知道的交易方式，但这并不会让他们成为最优秀的交易员。他们必须具备纪律性和执行技巧，而这只有通过大量的重复和实践才能获得。\n\
  \n**布尔昆：** 很多自己交易账户的交易员都梦想着全职交易，或者为对冲基金交易。当你用基金交易时，与你用自己的个人账户交易相比，交易方式会有所不同吗？\n\n\
  **戈登：** 这是个有趣的问题。我听说有些交易员在管理基金时会更加谨慎，而在自己的个人账户里会承担更多风险。但对我来说，我的策略就是我的策略，风险不会因为我是用基金还是自己的钱交易而改变。当然，我在对冲基金中交易的规模要大得多。但风险和方法与我的个人账户完全相同。对我来说，如果你相信自己的交易思路，并且已经证明它们有效，那就没有理由在你交易的不同账户中承担更多或更少的风险。这只是一个数字游戏。如果你的策略规定你在一笔交易中承担\
  \ 2%的风险，那么所有改变的是这 2%在不同规模账户（个人或对冲基金）中所代表的美元金额。\n\n我们为我们的客户有一套完整的“T 评级”思想体系。我们帮助他们为他们自己和他们的交易账户建立一个风险档案。我们帮助他们确定他们在市场中的目标，然后找出一种策略，该策略将产生他们在交易中愿意承担的百分比风险。这只是一个数字游戏。你以同样的方式执行。无论你拥有大量资金还是少量资金，这都无关紧要，一切都基于你在交易中的目标以及你在每笔交易中的百分比风险。然后，你只需执行该策略即可。\n\
  \n**布尔昆：** 对于刚刚开始交易并希望将学习曲线从五年缩短的人，你有什么建议？有办法做到吗？我不想说“捷径”，因为我不知道是否真的存在捷径，但如果你现在重新开始，你会有什么不同的做法吗？\n\
  \n**戈登：** 不，我不会改变任何事情。交易是一项技能游戏。提高任何技能的唯一方法就是练习、纪律和大量的重复。你需要一段时间才能变得更好，每个想要持续赚钱的人都必须明白这一点。没有“天生的”交易员。有些人可能比其他人学得快，但没有人一上手就能立刻暴富。这就像学下棋一样：你需要投入数年时间，付出大量努力，才能与这个领域的顶尖高手一较高下，就像任何技能游戏一样。不幸的是，没有捷径。\n\
  \n另一方面，你可以通过勤奋努力变得擅长此事。这很有趣，但这是一个过程。我只想对人们说，不要，请原谅我的措辞，不要半途而废。如果你想成为一个好的交易员，就要全心投入，持续学习，并努力去追求。这不是你能花钱请人替你做的事情。如果你不愿意付出努力——至少每天几个小时——世界上最好的聊天室或选股服务也无法把你变成一个优秀的交易员。如果你想为了娱乐而交易，那没问题，但如果你想做得好，并以此为生或在市场中开创一番事业，那就像其他任何事情一样，你必须为之努力。\n\
  \n**布尔昆：** 谈谈你典型的一天交易情况。外汇市场很艰难，因为它每周五天半、每天二十四小时都在交易。从生活方式的角度来看，这一定很艰难。\n\n**戈登：**\
  \ 是的，在外汇交易中你可以不分昼夜地交易，但我们的交易方式意味着我们不必那样做。如果你是一个日内交易者，快进快出，交易伦敦、亚洲和纽约时段，你可能睡不了多少觉。但如今，除了货币之外，许多东西都在全天候交易。也许你热衷于股指期货，交易`DAX`和`S&P`，然后在亚洲时段交易`Nikkei`。我们当然不会熬夜交易。\n\
  \n在我们的头寸中，我们会持有交易，时间从半个交易时段到两三个交易时段不等。例如，我们自周三以来一直在做澳元交易。现在是周五，我们打算将其中一部分头寸持仓过周末。如果我们有一笔大交易，我可能会在晚上起床查看一下。我会给自己设个闹钟，这样如果价格达到某个点位，它就会叫醒我。但实际上，可能十到十五个交易日的晚上，我才会有一次真正起来看看市场。我们已经设置了止损和获利目标，所以我不会痴迷于头寸。我们设置交易的方式是让它们超越盘中价格走势。我们把止损设得足够远，并且这已经内置在风险档案中，这样一夜之间的数据报告就不会真正影响我们的交易。\n\
  \n\n##### 访谈：交易员的日常与策略\n\n尽管交易已变得全球化，信息也全天候发布，但这并不意味着我们需要以牺牲生活方式为代价持续监控头寸。作为新手交易员，你完全可以保留全职工作并兼职交易。如果你想成为全职交易员，那当然可以，但你必须以相当规模的账户资金起步。这笔资金比大多数人想象的要更多。\n\
  \n**布尔昆：** 说得好。想尝试全职交易，一个人需要多少启动资金？\n\n**戈登：** 你至少需要六位数。如果你想在这方面有所成就，我认为你的交易账户里需要有\
  \ 20 万到 25 万美元。这还不包括可用于支付账单的储蓄账户。我还建议你先兼职交易几年，积累所需的经验和必须树立的信心。\n\n**布尔昆：** 嗯，那如果我只有\
  \ 7.5 万美元，但拥有四倍杠杆呢？这算数吗，还是说需要现金？\n\n**戈登：** 不，不，不。绝对不行。你需要的是现金。在考虑辞职以交易为生所需资金时，杠杆不应纳入考量。你需要足够的资本，这样才能做出明智的交易决策，而不必承担过度的风险。资金太少等于压力太大，因为你不得不持续承担超出合理范围的风险。如果你只有\
  \ 7.5 万美元，每笔交易承担的风险占整体账户的比例会让你感到不安，最终你可能会遭遇亏损，被迫重操旧业。人在极度不安时，很难做出正确决策。你需要尽可能将自己置于最佳状态。\n\
  \n需要知道的是，我们并不鼓励大多数客户立刻去全职交易，即便他们拥有我提到的账户规模。这是一种压力极大的处境，很少有人能应付得来。我们的交易风格和业务模式，是为那些喜欢每天花两三个小时进行交易，但同时拥有全职工作或在生活中有其他事务的人设计的。成为一名成功的交易员，并不意味着你必须单干，全职投入。如果你有足够的资金、时间，且生活方式允许你以交易为生，我会说：太好了，去做吧。但这并不适合所有人。\n\
  \n**布尔昆：** 你认为你每天花在纯粹研究上的时间有多少小时？\n\n**戈登：** 我大约在美国东部标准时间早上 6:00 到 6:15 醒来。我会从卧室长途跋涉，穿过厨房，进入我的交易办公室——这段通勤路程大约\
  \ 12 秒，可能和你上班的路程差不多。\n\n**布尔昆：** 没错。这是拥有自己生意的一大好处！\n\n**戈登：** 毫无疑问。喝完第一杯咖啡后，我从大约早上\
  \ 6:30 开始工作。我和戴夫一直保持联系，我们会进行研究工作直到中午左右。所以，在白天大约五个半小时的时间里，我会密切关注市场——我们的图表以及任何正在交易的头寸，然后我们会处理业务行政事务，一直持续到纽约收盘。接下来，在纽约收盘时段，我们会再进行一到两个小时的研究。总的来说，我每天大约花七到八个小时做研究，四到五个小时处理日常业务运营。\n\
  \n**布尔昆：** 那么，实际执行交易只需要几分钟。我想，所有精力都投入在前期研究中了。\n\n**戈登：** 没错。艰苦的工作是在那些研究时间里完成的。实际建仓是我一天中最微不足道的部分。我还要花些时间为我在\
  \ CNBC 的亮相做准备。拥有像戴夫这样的商业伙伴的好处之一就在这里。为了一档节目，CNBC 可能会占用很多准备时间，这时候我可以离开，由戴夫来管理业务。这对我们这个小公司来说是很好的曝光机会，而且我个人也很享受。\n\
  \n**布尔昆：** CNBC 的这个机会是怎么来的呢？\n\n**戈登：** 同样，还是通过[FOREX.com](http://FOREX.com)。我获得了做一些嘉宾访谈的机会，提供货币评论，因为[FOREX.com](http://FOREX.com)是赞助商并在电视上播放广告。制作《Money\
  \ in Motion》节目的制片人看到了我的访谈和我的市场观点，于是给了我试镜《Money in Motion》节目的机会，也就是我现在每周五参与的那个环节。我大概经历了三四轮选拔，我想他们可能面试了三四十人，我是最终入选该节目的前三名之一。\n\
  \n**布尔昆：** 再次证明，你作为交易员的坦诚性格帮了你大忙！你在节目上谈论的策略，和你每天在自己的账户以及基金里实际交易的策略有何不同？还是说它们是一样的？\n\
  \n**戈登：** 和我每天为自己的账户、基金以及客户所研究的策略是一样的。当我在电视上发言时，我的研究客户们会确切知道我在说什么，因为我一整天或一整周都在和他们沟通这些。不过，在一档周播节目里，要真正把我希望交易员们理解的信息传递出去是很困难的，因为它显然只是一档周播节目，而市场每天都在变化。但就交易的“入场形态”以及我想要建立头寸的原因而言，它们完全就是我研究报告中所运用的那类交易思路。但一个明显的区别是，我无法像对待研究客户那样，对电视观众进行后续跟进和头寸管理。\n\
  \n**布尔昆：** 作为交易员、教育者和分析师，你身兼数职。你觉得自己几年后会是什么样子？在你的交易策略或个人风格方面，有什么想要改进的地方吗？\n\n**戈登：**\
  \ 总会有可以改进的地方。这是市场中唯一的确定性。但我对我们目前的交易状况以及业务的进展感到非常满意。现在，我和戴夫正与两位量化分析师合作，他们正在分析我们所有的交易结果。我们想了解我们的策略表现如何，以及我们在更长时期内执行该策略的能力如何。目前，我们的胜率非常高。大约\
  \ 63%的交易是盈利的，但我要告诉你，这个比例太高了。\n\n**布尔昆：** 太高了？没这回事！你是什么意思？\n\n**戈登：** 我知道这听起来很疯狂，但原因如下。目前，我们平均每笔亏损的金额与平均每笔盈利的金额过于接近。这意味着我需要降低对正确率的依赖，但必须在每笔盈利交易中赚取更多的平均点数。进一步说，我必须加大对盈利交易的头寸规模，对它们更有耐心，让它们为我们创造更多利润。\n\
  \n这正是我和戴夫作为商业伙伴和交易员能够良好合作的地方。我们两个人的想法会集中到一笔交易上。我们必须用更大的头寸规模去推进盈利交易，同时要冒着因被止损而拉低平均入场价格的风险。这会使我们的正确率——即“命中率”——略有下降，但这会拉开我们平均盈利与平均亏损之间的差距。所以，对于那些我们确实做对的交易，我需要降低对正确率的追求，而是要在这些交易中赚取更多的美元。本质上，我希望我们的盈利远远大于亏损，而为了实现这一点，我们的胜率需要适当下降。\n\
  \n**布尔昆：** 这很有意思。为什么不止损设得更近一些呢？你可能会更频繁地被止损，但每次亏损会更少，而盈利的头寸则可以任其运行？\n\n\n\n#####\
  \ 对话记录：Gordon 与 Bourquin 的交易策略探讨\n\n**Gordon:** 这是个好问题，我们也考虑过。我们不这样做，是因为我们的策略需要有更大的止损空间，才能给它足够的时间发挥作用。我是个不错的交易者，但很多时候，我们入场后，行情并不会立刻朝对我们有利的方向发展。很多时候，如果我们设置更紧的止损，我们会因为过早地被扫出局，而错过那些我们相信，只要有足够时间，最终会成功的交易。\n\
  \n我们需要做的是，在交易显示出它正在有效运转后，进行良好的管理，然后在其生效后迅速将止损点上移。我们还需要加仓那些表现良好、且仍有空间沿着我们看好的方向继续前进的头寸。所以，我们会移动止损，并在交易中增加仓位，然后让交易自行发展——这将为每笔盈利的交易创造更多的收益。\n\
  \n如果我们把止损设置得太紧，就有可能无法看到行情的后续发展。但我们需要在盈利的交易上更加积极，这基本上意味着，一旦交易开始盈利，就要向它们追加资金。我们会做所有这些事，同时仍然严格遵守我们的风险纪律。这一点不能改变。我们不愿意在每笔交易上都增加风险，然后仅仅指望它带来更大的收益。自市场诞生以来，很多交易者都是这样被消灭的。\n\
  \n**Bourquin:** 这恰恰说明了你对自己作为交易者的了解有多深刻，也说明了为什么胜率超过 50% 并不意味着你就能赚钱。我认为很多交易者都在挣扎，他们不明白自己为什么无法进步，也许因为他们有\
  \ 60% 的胜率，但他们对自己的盈利头寸太没有耐心，过早地平仓，导致盈利无法以正确的比例覆盖亏损。\n\n**Gordon:** 这一点也很容易看出来。对于我的个人账户，我会把所有交易记录在\
  \ Excel 电子表格中，跟踪每一笔交易，并且偶尔把盈利和亏损相加，以追踪盈亏比和净利润。有一件事我还没提，那就是我会根据我对某个特定想法的确信程度，给每笔交易打分。这是我在入场前，就确定自己对这个交易最终能成功的信心程度的方法。\n\
  \n我有一个四级确信体系。从第一级（最强）到第四级（不那么强），我会计算每级交易的平均值——只是计算简单的平均盈利规模、平均亏损规模——针对每一个确信级别。这都只是非常简单的电子表格操作。交易结束后，记录每笔交易的信息不应该超过一分钟。然后我会回顾，看看我确信度最高的第一级交易是否赚了最多的钱。有时候是这样，并且情况总是在改善。\n\
  \n作为交易者，你能为自己做的最好的事情之一，就是回顾并审视自己的交易结果。令人惊讶的是，有很多交易者不这样做，但对我来说，这能带来天壤之别。这源于很久以前，我在\
  \ [FOREX.com](http://FOREX.com) 撰写“每日策略”研究报告的时候。如果我经历了一段交易表现不佳的时期，我会回过头去看看那些交易顺利的时期，然后努力找出我当时做了哪些不同的事情。我会重读我那段时间写下的内容，审视我的语气，并观察当时的市场状况。我也会看我当时交易的是哪些模式。通常，我会发现一些我在顺风顺水时做过、但后来不再做的事情，或者是市场已经发生了变化，而我未能做出相应的调整。\n\
  \n我建议交易者们为他们的朋友或家人撰写研究报告，因为这恰恰是记录你交易背后逻辑的绝佳方式，也能让你对自己坦诚，清楚自己为什么会有这些交易行为。拥有所有这些“每日策略”报告的存档对我帮助巨大，并且为我在未来数年的交易定下了基调。退一万步说，哪怕只是保持一个简单的电子表格，记录下交易参数——你最初冒了多少风险，你在交易中赚了多少，以及这背后的原因。把它保存好，存储起来，然后当你经历低谷时，回顾一下你在成功时期的所作所为。你从中领悟到的东西会让你惊叹。\n\
  \n**Bourquin:** 你提到“每日策略”报告让你对自己诚实，因为你是把它公之于众的。你无法事后反悔说：“嗯，我其实不是那么想的”或者“我没做那笔交易”。报告就在那里，如果你试图否认，订阅者们会毫不留情地批评你。\n\
  \n**Gordon:** 哦，蒂姆，我的客户们把那份报告读得可仔细了。如果我在报告里打错了一个字，比如我们说某个出场价格，但实际上那个价格偏离了十个点，我立刻就会收到人们的来信，说：“不，你实际上是在这个价格出场的。”我的意思是，他们让我对每一点都完全诚实。但这对我有好处。作为交易者，没有什么比这更能让你保持纪律并建立对自己信念的信心了。\n\
  \n**Bourquin:** 所以，别的先不说，这些策略对你的客户来说当然很棒，但听起来，这也是你个人取得成功的一大关键因素，对吗？\n\n**Gordon:**\
  \ 这是我作为交易者成长过程中至关重要的一部分。我认为没有更好的学习方法了。你知道，你能做的最好的事情就是，召集五到七个交易伙伴，建立一个邮件群组，然后把你自己的策略和你正在关注的交易机会通过邮件发给他们。当你把这些东西落在纸上，并试图以符合逻辑的格式把它们组织起来，以便别人能理解时，你对自己变得诚实，效果会令人惊讶。你要对自己的交易负责，你不会再说：“我认为\
  \ XYZ 会发生，所以我打算做一笔交易。”如果你无法用简单的语言解释你交易背后的逻辑，那么很可能存在问题，你会一直亏钱。但如果你必须用合理的论据来支持你的想法，那么当你对交易背后的逻辑不确定时，这真的会让你三思而后行。我过去是面对全世界成千上万的人做这件事，但你可以只在一个小群里朋友中做。你会因此成为更好的交易者。\n\
  \n后来，我达到了这样的程度：根据我的交易规则，除非一笔交易被写进了“每日策略”报告，否则我不会在对冲基金中投入超过我允许仓位 50% 的资金。我经历过足够多的这种情况，或者只是发现，那些我写进研究报告并公开的交易，是我表现最好的交易。那些没被写进报告的交易，则是我表现最差的，很可能是因为我一开始就没有向自己、向读者证明我为什么要做这些交易。有趣的是，事实就是这样。\n\
  \n## 章节\n\n### Linda Raschke\n\n***Linda Bradford Raschke*** *自 1981 年以来一直是全职专业交易者。她最初是**股票期权的做市商**，并曾在两家交易所担任会员和场内交易员。20\
  \ 世纪 90 年代初，Raschke 成为注册商品交易顾问 (CTA)，并创立了 LBRGroup, Inc.，一家专业的资金管理公司。除了运营成功的 CTA\
  \ 项目外，她曾担任多个对冲基金的首席交易员，并管理过商业对冲项目。她曾被收录在 Jack Schwager 的著作《新金融怪杰》(John Wiley & Sons,\
  \ 1992) 以及 Sue Herera 的著作《华尔街的女性》(John Wiley & Sons, 1997) 中。*\n\n\n\n*拉施克多年来一直活跃于市场技术分析师协会，并在超过\
  \ 30 个国家举办过讲座。她与合著者劳伦斯·康纳斯合著的书籍* `Street Smarts: High Probability Short-Term Trading\
  \ Strategies` *（M. Gordon Publishing Group, 1996 年）* 广为人知。\n\n**蒂姆·布尔昆：** 琳达，你以交易为生多久了？\n\
  \n**琳达·拉施克：** 三十一年了。我是在交易所场内起步的。幸运的是，当时有人资助我，所以我直接跳进了交易池，在那里交易了六年。我最初交易的是股票期权，但现在我\
  \ 98%的交易都是在期货市场进行的。\n\n**布尔昆：** 你是什么时候决定离开交易大厅的？\n\n**拉施克：** 嗯，其实是因为我出了个意外，肩膀和胳膊都吊着绷带，实在没法再在交易池里站下去了。在交易池里，你需要用胳膊打手势表示买卖，所以我搬到了楼上。当时我所在的结算公司是第一期权芝加哥公司。那时候，我们还没有现在这样的电脑，所以我只能靠着一台老式的\
  \ Quotron 屏幕交易，然后打电话把下单指令传到楼下交易大厅。\n\n**布尔昆：** 你刚开始的时候，芝加哥的交易池里有很多女性吗？\n\n**拉施克：**\
  \ 不多，但我曾在两个不同的交易所待过：太平洋海岸证券交易所和费城证券交易所。我也有很多同事在芝加哥期权交易所（CBOE）的交易池里。那些交易大厅里总是会有几位女性。就交易员来说，我记得我刚到太平洋海岸证券交易所时，那里大概有四位女性交易员。不过，还有很多女性从事文秘支持类的工作，所以并不像你想象的那样性别比例严重失衡。只是女性交易员确实不多。\n\
  \n**布尔昆：** 你是在学校里学会交易的吗？或者是谁带你进入交易池的？\n\n**拉施克：** 都不是。其实我根本不知道交易所场内还有这样的环境，虽然我一直对市场很感兴趣。我在大学主修经济学，而且从小到大，我爸爸的办公桌上总是放着图表书籍。倒不是说他是交易员，但他确实关注市场。后来，当我住在旧金山时，我向很多不同的经纪公司投了简历，想成为一名股票经纪人，因为我觉得那是进入市场的一个绝佳途径。当然，你可以想象，一个“刚出校门”的\
  \ 21 岁女性，被所有的公司都拒绝了。所以，谢天谢地，我一直没当成股票经纪人。\n\n我确实找到了一份金融行业以外的工作，办公室正好在太平洋海岸证券交易所的街对面，所以早上我能看到人们穿着五颜六色的交易外套，戴着身份徽章，在那栋古典建筑里进进出出。我和其中一个人交上了朋友，最终就是这样进入了这一行。\n\
  \n**布尔昆：** 在交易池里交易和你现在在屏幕前交易有很大不同吗？\n\n**拉施克：** 在某些方面是有的。显然，在观察你面前真实的订单流方面，动态完全不同，这是非常不同的一点。你能看到交易员们买入卖出，所以你能感受到市场的动量。曾几何时，在交易池里是有优势的，尤其是做期权套利时，因为你可以利用那种对动量的感知作为优势。但那种优势现在已经不存在了。期权现在毫无优势可言，因为电子化交易使得市场非常高效。但对我来说，真正保持不变的是那种“活在当下”、为我的交易建立常规方法的态度。\n\
  \n就我而言，我的一天从美国东部时间早上 6:30 或 7:00 开始，这时我开始审视整个市场。我总是试图将自己的观点融入一个更大的“宏观”背景中，看看我们处于市场似乎总在重复的一到两周周期的哪个位置。\n\
  \n当我交易股票期权时，与在债券交易池或标普指数期货交易池里“倒卖合约”、通过价差快速买卖获利相比，这更像是一场策略游戏。交易股票期权时，你绝对需要在持仓上非常有策略性。所以，我们不是通过买入期权然后加价四分之一个点卖出获利。而是要不断查看期权的希腊值，思考：“Gamma\
  \ 值是这个，Delta 值是那个。如果我做多看涨期权又做多看跌期权，那是一个正 Gamma 的交易，现在我需要积极交易标的股票来对冲那个头寸才能赚钱。” 因此，你被迫来回交易股票以对冲头寸，从而支付持有期权头寸的成本。\n\
  \n盈利的期权交易涉及太多变数。这更像是在打桥牌或下国际象棋，你需要提前几步进行策略性思考。而我会把期货交易池里的交易员比作速度更快的二十一点游戏。交易员必须决定自己最擅长哪种类型的交易，然后去交易那个市场。\n\
  \n**布尔昆：** 当时有人教你在交易池里如何交易吗？\n\n**拉施克：** 说来有趣。在结算公司楼上，我们可以看一系列录像带，它们讲解期权定价模型，这样你就能理解其背后的理论。当然，你不可能从录像带里学会交易，但它能给你理论。然后，就像有人把你扔进汪洋大海，说：“要么学会游泳，要么淹死！”\
  \ 除了教你如何进行出价或报价的机制外，没有人教你如何交易。这很大程度上是一件“在做中学”的事情。所以，我真的要说，除了有人解释了一个初始的定价模型之外，其他所有东西基本上都是在实践中学会的。\n\
  \n现在的情况也差不多。一个新手交易员当然可以被介绍不同的概念，比如市场轮廓或其他理论，这些理论帮助他们理解自由市场中的定价机制，但我认为，那些能够在这一行取得成功的人，必须找到自己长期盈利的方法和策略。成功的交易员需要找到自己的游戏和方式，而我认为这很大程度上是通过经验和试错交易来实现的。每个人都需要在市场中找到自己的优势，而这只能通过实际交易账户获得。\n\
  \n**布尔昆：** 你认为那些一开始就在屏幕前交易、没有交易池经验的人，是否因为不像你那样亲眼见证价格的形成过程，而处于劣势？\n\n**拉施克：** 不，我不认为这有太大区别。而且老实说，在我认识的交易大厅里出来的人中，我估计大概有\
  \ 85%在向屏幕交易转型时遇到了极大的困难，其中大部分根本没能成功转型。所以，我认为这没什么大不了的。在交易池里交易只是另一种赚钱的方式，而且这种方式正在慢慢消亡。\n\
  \n我认为，如今交易员的学习曲线更多地在于发现哪种风格适合自己。他们是打算做价差交易，还是试图短线赚钱，像“剥头皮”一样赚取蝇头小利？我认为后者非常困难。靠剥头皮谋生不是我的风格，但有些交易员能做到，并且过得不错。大多数新手交易员或许能靠剥头皮付清账单，但我认为他们永远无法靠这个致富。不过，总会有那么一类人对做这种事有特别的天赋。当然，如何交易也取决于你积累了多少资本。\n\
  \n\n\n#### 交易策略与经验访谈\n\n大多数场内交易员只做一件事，并且做得极其出色，然后反复操作，每月都能获利。零售交易员则必须更具策略性，规划交易，并根据当前市场周期使用不同的方法。他们需要从宏观视角审视市场，并理解所有部分如何相互配合。\n\
  \n**布尔昆：** 过去三十一年，你的交易方式发生了怎样的变化？\n\n**拉施克：** 我只想说，在过去的二十年里，我的交易已经进化到能够同时交易大量市场、持有多个头寸并管理多种策略。刚起步时，我必须专注于一两件事，并成为那一两件事的专家。这是一个自然的进化过程。当你刚开始时，你需要精通一个市场——学会良好地执行，并专注于做一件事。随着时间的推移，你开始积累资本，并在几个市场中建立多个头寸。也许一个股票交易者会拓展业务，开始更积极地交易货币、黄金和原油。对我来说也是一样。大多数专业交易者会同时在许多市场进行交易。要在市场中长期真正成功，交易者需要能够积累这种经验。\n\
  \n**布尔昆：** 你是在家交易还是在办公室交易？\n\n**拉施克：** 我有一个家庭办公室。不过，我更喜欢去办公室，所以当我住在佛罗里达时，我在离我家二十英尺的地方建了一个独立的办公室。在那之前，我在泽西，实际上建了一个与房子相连的独立办公室。但当我在屏幕前或在办公室里时，我就像离家一百英里一样，因为我完全专注于交易。\n\
  \n**布尔昆：** 听起来，把工作和生活分开对你来说很重要。\n\n**拉施克：** 我认为很大程度上这只是在过滤干扰。所以，干扰可能来自孩子、宠物或任何让你从手头工作中分心的事物。我只是觉得你需要把自己抽离出来，或者让自己进入游戏空间，在那里你可以集中精力，完全专注于市场。\n\
  \n**布尔昆：** 你在家庭办公室使用什么样的工具进行交易？什么样的代码和软件之类的东西？\n\n**拉施克：** 我总是有三台独立的电脑。一台专门用于我的执行平台。我认为这非常重要。我不想在我运行图表程序、技术程序或其他可能占用内存并导致延迟问题从而拖慢订单的电脑上运行我的执行软件。在另外两台电脑上，我有两个独立的软件程序，基本上是冗余备份。除了各自拥有独立的数据源和独立的网络连接外，两台电脑看起来一模一样，这样如果其中一个出现数据延迟问题，也不会干扰我正在做的事情。\n\
  \n**布尔昆：** 你是否曾在交易过程中遇到两条网络连接都断掉的情况？\n\n**拉施克：** 我什么都遇到过。你能想到的——我都经历过。飓风、卫星天线掉落、网线和电话线被施工挖断。这就是为什么每个交易者都要解决技术上的薄弱环节，并足智多谋地思考：“我的业务中有哪些‘阿喀琉斯之踵’？我怎样才能建立某种类型的冗余或备份？”如今我持有相当大的头寸，如果我的数据或执行系统崩溃，代价可能会非常高昂。\n\
  \n**布尔昆：** 你会如何描述你的整体交易理念？你是纯粹的技术派，还是也会关注基本面？\n\n**拉施克：** 完全是技术图表解读和盘口解读。我从未能够从基本面中获利。\n\
  \n**布尔昆：** 你做哪种类型的技术分析？\n\n**拉施克：** 呃，蒂姆，我讨厌这么说，但真的是非常基础。归结为支撑、阻力和跟随趋势，就这些。要么是交易进入一个支撑位或阻力位，要么你处于一个动量、趋势环境中，要么你处于一个交易区间环境中。对于我的交易风格，我主要关注的技术指标始终是前一个波段高点和波段低点。价格就是一切，过去价格反转的区域很可能会再次反转。\n\
  \n我关注的其他价格区域包括开盘价、前一日的高点和低点，以及两者之间的波段高点和低点。我所有的交易都基于此。当市场开盘时，我也会做一些成交量评估，因为这将为当天的交易定下基调。如果没有足够的成交量来支撑，市场很难将价格推向任何极端。否则，这只会是一个成交量低迷、波动有限、没有明确方向的交易日。\n\
  \n我使用一个非常简单的系统，一些交易者觉得难以置信，但它就是有效。没有理由把这行搞得太复杂。\n\n**布尔昆：** 你说得对。我交谈过的大多数经验丰富的交易者可能都有最简单的系统。当我开始听到零售交易者谈论更复杂的系统时，这通常表明他们在市场中经验不足。他们的策略越复杂，成功的可能性就越小，因为他们一直在寻找那个神奇的策略。\n\
  \n**拉施克：** 嗯，别误会我的意思。我从 1992 年就开始做建模和研究，我能理解复杂的机械系统。\n\n在摩尔研究中心的史蒂夫·摩尔过去一直为我做所有的测试和建模，然后我总是有内部员工坐在那里，反复琢磨，围绕这些想法创建系统。但我就是还没能创建或使用任何我感觉舒适且自信交易、并且足够耐用和稳健的机械系统。\n\
  \n然而，这仍然是交易中“提出问题”方法的一部分，我认为这非常有价值。如果你能根据特定情况下发生的事情找到市场中的模式，了解这些总是好的。例如，在一个上涨趋势的市场中，连续上涨三天后，第二天会发生什么？或者，如果我们在第二小时突破了第一小时的低点，会发生什么？或者，如果我们在下午突破了第一小时的高点，会发生什么？这是否会导致收盘价更高？如果是，发生的频率有多高？因此，正是这种不断提问的方式驱动着成功的交易。你可以问自己这些问题，并建立一个想法库，有些人会根据结果构建自动化系统。对我来说，这只是我在交易日中记住的又一条信息。\n\
  \n**布尔昆：** 你主要交易期货。你喜欢交易哪种类型的期货合约？\n\n**拉施克：** 我一直交易`E-mini S&P 500`期货。事实上，从它们上市的第一天起，我就开始交易`S&P\
  \ E-mini`期货，并且从那以后几乎每天都交易。所以，我一直交易指数期货。我也交易金属——我喜欢黄金、白银和铜。我还交易能源期货、原油和天然气。我也一直交易谷物和货币期货。最后，我仍然交易“软性商品”，比如糖、可可和咖啡，而我还是那些仍然交易肉类的傻瓜之一！\n\
  \n**布尔昆：** 你会持有多个隔夜头寸吗？\n\n**拉施克：** 是的。我几乎总是持有某种货币的头寸，而且我通常倾向于持有五到六个隔夜头寸。其中一些头寸会持有两天到两周不等。\n\
  \n**布尔昆：** 听起来你愿意交易任何当时看起来有吸引力、正在波动或你觉得提供良好机会的品种。\n\n\n\n**拉施克：** 是的。交易的关键在于追随波动性和流动性的所在。波动性和流动性为我指明机会，而对我来说，接下来只需要保留那些奏效的思路，抛弃其余的。我知道，如果我持有八个头寸，也许其中五个会表现良好，我只需剔除那些表现不佳或走势不对劲的。这就像你拿到一手牌，先扔掉烂牌，留下对你有用的牌。快速且毫不犹豫地管理好这些“手中的牌”（交易），就是在市场中取得成功的关键。\n\
  \n**布尔昆：** 当你进场交易时，你对利润目标和止损有明确的设想吗？\n\n**拉施克：** 我始终对风险有概念，并且永远知道我的交易会在什么情况下“出错”。但我不相信要盯着利润目标，立刻决定在何处离场。我当然会观察头寸，看它接近前期高点或低点时如何反应。但一旦它突破了这些高点或低点，或者正在形成趋势，我绝对不相信要给自己的利润设置上限。当然，我会有大致的指引，但如果市场能给我更多，我为什么要告诉自己“我只赚\
  \ X 金额然后就离场”呢？市场会告诉我何时该离场。我认为这不是交易者应该告诉市场的事情。\n\n**布尔昆：** 你会在建仓和平仓时分批操作吗？\n\n**拉施克：**\
  \ 不会。作为一条严格规则，我不会分批建仓，尤其是在亏损的情况下。我不会对亏损的交易进行平均成本加仓。我可能会“小额试探”一个头寸，在某种特定市场先买入少量。如果这个头寸表现良好，我可能会再加一点。但我从不会对不利于我的交易进行分批加仓。因此，如果我所交易的东西处于震荡区间，我可能会小额试探，并以此方式逐步建立头寸。有时我会在某个位置非常激进地加仓以达到满仓状态。但更多时候，我会设法一次性全仓进场。\n\
  \n**布尔昆：** 那么平仓呢？你是分批平仓还是一次性全部平仓？\n\n**拉施克：** 这取决于我交易的市场以及当初建仓的原因。通常，如果只是一个短时间框架的交易，我称之为“剥头皮”，我不会分批平仓。对于快速交易，我全仓进入，当我认为交易结束的时机出现时，我便全仓离场。但在其他情况下，当我们的模型建议分批平仓是个好策略，我想锁定部分利润，但我又不完全确信行情已经结束时，我会设置一个追踪止损，并平掉部分头寸。不过，总的来说，我喜欢保持简单，一次性全仓进、全仓出。\n\
  \n**布尔昆：** 你有没有一种“最喜欢”的交易类型，只要有机会就会去做？\n\n**拉施克：** 每件事都如此独特且富于变化。没有两笔交易是完全相同的。业内总谈论什么“牛市旗形”或“熊市旗形”，好像它们每次都能被轻易识别出来的完美图表形态，这让我很困扰。市场并非如此运作。我倾向于从“多头陷阱”和“空头陷阱”的角度来看待形态。一个多头陷阱的例子是：当市场从交易区间突破时，人们因为虚假突破而有点看多。然后，当价格开始回落到该区间时，那些被虚假突破欺骗的交易者急于平仓，往往会造成小小的“真空地带”。有经验的交易者可以非常激进地利用这类交易机会。\n\
  \n即使是看起来绝佳的交易，也并非总能成功。最近我非常、非常幸运地及时平掉了一些交易，没有在价格回弹时被套牢，也没有回吐过多利润。对我来说，一笔精彩的交易并不完全因为它执行得完美（因为我获得了完美的进场和出场）。我审视自己精彩交易的方式更像是问：“我是否及时离场，躲过了‘子弹’？”\
  \ 有几次，我在债券上获得了巨大的利润，但我没有平仓，因为我的模型仍然指示行情应该延续，但事实并非如此，于是我回吐了利润。\n\n你必须记住的是，你真的不能把任何单笔交易看作完美的。我认为更重要的是要明白，无论你做什么，都要始终如一地去做。\n\
  \n如果你要使用追踪止损，那么就在每个头寸上都用，并且每次交易都以完全相同、一致的方式执行。如果你打算在市场看起来变得波动不居时离场，感觉行情已经达到顶点，那么就每次都这样做。但之后当市场又持续上涨了十天，把你远远甩在身后时，也不要抱怨。交易的成功是一个渐进的过程——而不是每次都试图找到那个完美的交易。\n\
  \n我知道我会有好的交易和不太好的交易，并且我永远不知道哪一天会赢、哪一天会输。我所知道的是，如果我始终如一地执行我的策略，那么在某个百分比的时间里，我就能做出盈利的交易。我无法告诉你，我过早离场的有多少笔，又过晚离场的又有多少笔。交易就是这样运作的。坚持你的策略，长期下来，你就能赚钱。\n\
  \n你所能做的就是把自己置于机会面前，并且每次都采用同样的方式。\n\n**布尔昆：** 你大部分盈利是否来自每月仅有的几笔交易？\n\n**拉施克：** 当然。我大概\
  \ 80%的利润来自于我 20%的交易。即使对于短线剥头皮交易者来说，我认为也是如此。我最近和几位场内交易员聊过，即使你是交易所场内的交易员，你一年中可能 80%的利润也仅仅来自两三个好月份。市场中会有某些时期出现非同寻常的成交量或波动性，而你恰好与之同步，并且你已将自己置于能从该机会中获利的位置。而在其他时候，你完全不知道市场在干什么。正是在那些你对市场有良好感觉、它又给你提供绝佳机会的时候，你赚取了大部分的利润。\n\
  \n**布尔昆：** 你几次提到了用于交易的“模型”。你指的是帮助寻找好交易的计算机模型吗？\n\n**拉施克：** 是的，我总是喜欢量化一切，以确保我的大脑没有在跟我玩把戏，因为，相信我，作为交易者，我们往往倾向于在市场里看到我们想看到的东西。计算机模型为我量化数据，确保我准确地解读市场信息。它不是某种为我自动买卖的程序。它只是帮助我识别那些我应该关注的东西。\n\
  \n它也帮助我把事物置于历史背景中。例如，一个模型可能会告诉我，我们刚刚连续三天在高低点之间交易，并且仍处在一个区间内。那么我们再在这个区间的高低点之间交易一天的可能性有多大？也许该是关注该区间向上突破或向下跌破的时候了。或者，如果我做多白银，而它今天暴涨了一天，那么白银连续第二天再次迎来大幅上涨的可能性有多大？这种可能性可能微乎其微。这些模型只是让我保持清醒，并在每天的交易中帮助我解读市场。\n\
  \n**布尔昆：** 你交易很多不同的市场。你是否每天至少能在其中一个市场里找到可交易的机会？\n\n\n\n**拉施克：** 我每天都在交易。我并不是说每天都有大机会，但我的意思是，我持续调整自己的位置，以便抓住机会。\n\
  \n**布尔昆：** 在你成长为交易员的过程中，有没有什么你学到或做到的，让你感觉确实帮助加速了学习曲线？\n\n**拉施克：** 任何行业都需要付出代价。尽管任何人都可以开户开始交易，但学习曲线很长。即使你想成为一名医生、放射科医生或麻醉师之类的，也需要花费数年时间观察不同的模式、不同的环境及不同的病理，才能积累经验以识别问题。如果你想成为职业高尔夫球手也是一样。你必须在不同的天气、不同的球场、使用不同的设备进行练习，直到找到适合你的方法。\n\
  \n交易也不例外。如果你想成功，就需要全身心投入这个行业并进行研究。我可能已经做了超过一万小时的研究，不断研究图表、价格行为，思考不同的交易方法。没有捷径可走。\n\
  \n**布尔昆：** 那你交易的资金目标呢？你会为年度交易设定一个特定的盈利目标吗？\n\n**拉施克：** 不。我完全不认同这种想法。我认为这是交易员对自己的交易账户能做的最有害的事情。首先，你会遇到各种具有挑战性的市场环境，交易机会可能根本不存在。然后，当你开始觉得达不到目标时，就可能在一个不利于你计划的市场环境中进行交易。也许你的交易策略是在特定的波动条件下操作。也许你是一个波动率卖方，喜欢市场维持在一个区间内。也许你是一个突破交易者，喜欢市场转向。如果这些条件不存在，而你仍然交易，那你就是在自取失败。\n\
  \n你能做的最好的事情就是持续将自己置于正确的环境中，当机会出现时，你能够识别它并准备好大干一场。如果你只进入市场两三年，是做不到这一点的。你需要极大的自信和自控力，才能说出：“我正在等待那个我能进场并真正大赚一笔的机会。”\n\
  \n把它想象成一场网球比赛。你让球保持在场内。你不断地把球打过网，来回击球，保持在比赛当中。然后，当你的对手失误或被拉开到场地边缘时，那就是你进攻并打出制胜球的时候。你无法强迫对手出现失误。你只能调整好自己，准备好当它发生时打出致命一击。\n\
  \n我认为设定资金目标完全不合适。更好的做法是为自己设定目标，避免非受迫性失误。让自己保持一致，不要仅仅因为觉得自己应该进入市场，就违反规则进行冲动交易。让决策的一致性成为你的目标，而不是金钱。如果你做到了，金钱自然会随之而来。\n\
  \n**布尔昆：** 在你的交易中，有没有你正在积极努力改进的领域？即使已经过了三十一年，有没有你希望在交易中做得更好的事情？\n\n**拉施克：** 一直在努力。每一天。我永远不会满足。这就像问一位音乐会钢琴家：“你觉得能把这首曲子弹得再好一点吗？”擅长自己工作的人永远不会满足于现状。\n\
  \n我正在努力的一件事是更复杂的、自动化的交易管理策略。我希望能够看到一些利用市场中细微无效率之处的方法，而这些是我目前错过的。这才让这个游戏变得有趣。有无限的机会让你为自己的方法加入些许巧思，让它们变得更好一点。\n\
  \n在你认为找到了交易钥匙的那一刻，我向你保证，市场会换一把锁。\n\n## 章节\n\n### 谢尔盖·伯杰\n\n`谢尔盖·伯杰` 自 1998 年起成为一名活跃的交易员。在他的职业生涯中，他担任过金融分析师，在摩根大通处理过固定收益工具，也曾是一名从事股票、股票期权和期货的自营交易员。接触不同资产类别让他能够识别哪些资产类别和策略最适合他实现持续盈利的目标。\n\
  \n多年来，伯杰创建了一套交易方法论，将市场划分为不同的时间框架和特性，使他能够更清晰、不带情绪地决定在特定情况下应用哪种策略。由于他只关注最高概率的建仓机会并严格遵守规则，他的账户以及客户的账户在所有市场环境中都持续增长。在伯杰的网站\
  \ [TheSteadyTrader.com](http://TheSteadyTrader.com) 上，他每天都尽力为订阅者提供最好的、高概率的交易建仓机会，并提供一个友好的环境，随时欢迎提问。\n\
  \n**蒂姆·布尔昆：** 谢尔盖，让我们先谈谈你是哪种类型的交易者——日间交易者还是波段交易者——以及你关注哪些市场。\n\n**谢尔盖·伯杰：** 我更多地采用波段交易者的理念，但我会在多个时间框架内交易，这当然包括了日内时间框架。所以也包含日间交易的部分。\n\
  \n**布尔昆：** 所以有些交易是日间交易，而有些是波段交易。当你做波段交易时，交易的持续时间是几天还是几周？\n\n**伯杰：** 我把我的交易分到不同的篮子中，波段交易属于第二个篮子。一个典型的波段交易持续两天到三周。\n\
  \n**布尔昆：** 你在哪些市场进行交易？\n\n**伯杰：** 同样，这主要取决于时间框架，但所有交易都基于通过期货和/或期权操作的美国股指。\n\n**布尔昆：**\
  \ 听起来像是每个都涉及一点。我们来谈谈你作为交易员的总体策略。你是技术派交易者吗？你关注基本面吗？你寻找好交易时会看哪些东西？\n\n**伯杰：** 这取决于时间框架，但我认为时间框架越短，技术性越强。当然，对于日内和波段交易来说，技术性很强，但从宏观视角和基于经济数据来看，也有其基本面的背景。然而，总的来说，短期交易肯定比我们使用的更长期限时间框架的交易更具技术性。\n\
  \n**布尔昆：** 举个例子，你使用的最小时间框架是什么？你用什么技术工具来交易它？\n\n**伯杰：** 最小的时间框架是日内交易。甚至像标普 500 E-mini\
  \ 期货的开盘缺口这样迅速的机会。我们在那里使用的技术工具是 K 线图和基本的慢速随机震荡指标。我在那通常会做的是，先实现半个缺口的回补，然后争取实现整个缺口的回补。\n\
  \n**布尔昆：** 你能解释一下你说的“半个缺口”和“整个缺口”是什么意思吗？\n\n**伯杰：** 当然。假设标普 500 指数周一收盘于 1200 点，周二上午开盘于\
  \ 1190 点。这里有 10 个点的差距。那么我会做的是，一旦我根据 K 线图和某些震荡指标收到信号，就在开盘时买入。然后，当缺口回补一半，或者标普指数回到前一日收盘价的一半时，我就会获利了结，并保留剩余的头寸，直到缺口完全回补。\n\
  \n\n\n**Bourquin：** 那么你的理论是，如果市场在相邻交易日之间出现跳空高开或低开，你会逆势操作，希望它能回补缺口？\n\n**Berger：**\
  \ 完全正确。从某种程度来说，这可以算是一种均值回归交易。\n\n**Bourquin：** 好的。你使用的是哪种慢速随机指标？\n\n**Berger：**\
  \ 实际上就是最基本的设置：8，20，10 和 10。所以，它是一个慢速移动平均线。\n\n**Bourquin：** 那么在收盘或开盘时，你关注哪些 K 线形态，来与这些随机指标共同指示市场可能会回补缺口？\n\
  \n**Berger：** 我们总是在开盘时或开盘后，比如，当天的前 30 分钟内寻找 K 线信号，我们主要寻找的是极端 K 线。例如，大多数会是带有很长影线和很小实体的\
  \ K 线，或者实体非常大、完全吞没前一根 K 线的形态。我们在寻找能够清晰给出趋势反转信号的形态，然后我们就可以入场，进行反向交易。\n\n**Bourquin：**\
  \ 你提到了在缺口回补一半时如何减仓，但最初你是如何决定初始仓位大小的？\n\n**Berger：** 在决定仓位大小时，我会考虑日期和季节性因素，其中日期因素实际上更为重要。例如，我会在周二、周三或周四建立比周一或周五大得多的仓位，仅仅是因为我在周一和周五往往会收到更多虚假信号。\n\
  \n关于季节性，我在任何美国或欧洲公共假期前后交易的规模都会小很多，并且在八月、十二月和一月由于成交量较低，也会减少交易规模。其余时间，真正决定仓位大小的是市场环境类型。例如，在有央行公告的时候，不是交易大仓位的时候。事实上，那可能根本就不是交易的时候。本质上，我只在市场成交量巨大且预计经济公告很少的时候才寻求大仓位交易。\n\
  \n**Bourquin：** 你最大的交易都在周中。就合约数量而言，周二、周三或周四的典型仓位是多少？\n\n**Berger：** 嗯，我是为基金做这个的，所以坦率地说，这取决于基金的规模，但可能少至\
  \ 10 手，多至 200 手。\n\n**Bourquin：** 你解释过当缺口回补一半时的获利锁定方法，那另一半仓位呢？你会在什么时候平掉它？\n\n**Berger：**\
  \ 这一点非常重要。用我们之前标普指数的例子来说，当价格达到前一天的收盘水平（1200）时，我极有可能平掉整个仓位。然而，如果看起来存在一个趋势，可能推动市场进一步大幅上涨——在我们的例子中可能到\
  \ 1220——我会保留大约四分之一的仓位，以期从这波上涨中获利。\n\n我判断是否存在这种趋势的一个方法是观察涨跌比（A/D）线。如果 A/D 线出现了重大转折，那就是一个强劲信号。另外，K\
  \ 线反转的强度也是一个指标：例如，一根非常长的下影线之后紧跟着一根非常强劲的阳线，这是一个极为有利的信号，表明当天可能出现更强劲、更可持续的趋势。\n\n**Bourquin：**\
  \ 你用什么时间框架来衡量这些日内趋势？\n\n**Berger：** 我看的是五分钟图、十五分钟图和一个 400 跳的 Tick 图。\n\n**Bourquin：**\
  \ 不同的交易者倾向于使用各种不同的 Tick 图，从 612 到 340，而你偏好 400。你为什么偏好 400 Tick 图？\n\n**Berger：**\
  \ 说实话，这是多年来通过反复试错得出的，并且随着每 Tick 交易量的变化，我们也不得不调整它。但我认为 400 跳能让你足够迅速，而又不至于反应过快。\n\n\
  **Bourquin：** 让我们转到波段交易这方面，以及你是如何寻找这类交易的。如果你的日内交易基于标普 500 指数的缺口，那么你的波段交易是基于哪些因素呢？\n\
  \n**Berger：** 波段交易首先取决于标的资产。所以，举个例子，我们考虑一个基本的标的：一只中等至大盘市值的股票，且贝塔系数适中。换句话说，就是一只具有足够波动性、其主要波段交易基于突破和主要反转的股票。因此，在交易突破时，我们只会使用基本的水平线、任何形式的趋势线或三角旗形态，并配合动量振荡指标，这主要是在日\
  \ K 线图上进行。\n\n我们还大量使用斐波那契回调位，并且我们真正专注于 50% 和 61.8% 这两个水平，特别是 61.8%，因为它对波段交易来说是一个非常有效的指标。在获利目标方面，我们倾向于使用高达\
  \ 23.6% 的斐波那契扩展位。\n\n**Bourquin：** 我认为交易者在设定获利目标时，对扩展位的依赖还不够。我们还没有谈到日内交易的止损。你是如何设置日内交易止损的？\n\
  \n**Berger：** 嗯，回到我们缺口交易的例子，我只能强调这是一个高概率的交易。我有朋友管理的基金完全只依赖这个策略。我认为用这个策略可以赚很多钱，并且可以扩展到不仅仅交易缺口回补，因为围绕它还有很多交易机会。例如，如果我们之前提到的那种趋势日行情。\n\
  \n关于止损，我通常的习惯是，把它恰好设置在比当天我们期望得到的、作为买入或卖出触发信号的主要反转点低几个 Ticks 的位置。有时候会出现假突破，市场会先回落到该点位下方再走高，但话又说回来，在五分钟图上，我们会再次得到重新入场的机会。\n\
  \n**Bourquin：** 对，所以如果你的止损被触发，是因为市场下跌并扫掉了你的止损单，但只要所有信号仍然告诉你缺口可能会被回补，你就会重新入场？\n\n\
  **Berger：** 只要出现一个和我们最初入场信号一样强劲的确认 K 线，是的。\n\n**Bourquin：** 回到基于突破的波段交易，你观察什么时间框架的图表来寻找这个交易设置？\n\
  \n**Berger：** 对于波段交易，主要是看日线图。我发现日线图比日内图能给我带来更高的确定性，而且信号也少得多。我希望等待一个明确的日线确认——比如一根\
  \ K 线配合动量振荡指标或随机指标——大多数时候我都会等待日线信号。\n\n**Bourquin：** 你说在这种情况使用的动量振荡指标是慢速随机指标？\n\n\
  **Berger：** 是的。我通常使用慢速随机指标。\n\n我关于波段交易的整个理念都基于“越简单越好”这个概念。我交易了很长时间，甚至在机构交易台工作过，等等。我见过很多人拥有非常复杂的模型，而且它们确实有效。我只是发现，保持简单、坚持止损和止盈目标，同样能够获利，有时甚至更容易执行。\n\
  \n**Bourquin：** 当你在日线图上寻找某个标的的突破时，你是希望看到整根 K 线收盘价位于，比如说，一个通道或者它之前盘整的区域之上，然后才会进行交易吗？举个例子，你可能在某天看到突破信号，然后在第二天再入场交易？\n\
  \n**Berger：** 我通常会在当天收盘前 15 分钟内进行交易。这通常是我们进行波段交易的时间窗口。\n\n在少数情况下，即使价格并未真正形成突破走势，但存在非常强劲的趋势——例如，振荡指标和斐波那契支撑线——我也会入场交易，但会设置一个紧密的止损。\n\
  \n\n\n**Bourquin：** 你通常同时持有多少个仓位会觉得比较舒适？\n\n**Berger：** 我倾向于同时持有大约十到二十个仓位，并且尽量不让它们集中在太多行业板块。首先，我的行业板块聚焦非常明确，主要基于我能理解的领域：某些科技股、某些周期性消费股以及防御性股票。因此，十到二十个未平仓合约是我的常规范围。\n\
  \n**Bourquin：** 你有一个可供挑选的股票篮子，还是市场上的任何股票你都会交易？\n\n**Berger：** 不，我有一个很大的观察清单，每隔一段时间，根据市场环境的变化，总会有一些机会浮现。鉴于欧洲的债务情况，我最近交易了一些欧洲股票，因为它们提供了很好的机会。但总体来说，我的观察清单主要由我关注多年的股票组成。\n\
  \n**Bourquin：** 要监控十到二十个仓位，工作量可不小。你具体是如何扫描它们的？你会在晚上做功课吗？以及你使用什么软件来帮助发现这些机会？\n\n\
  **Berger：** 我使用一个`彭博`终端，我仍然认为它是跨资产分析以及聚焦单一资产的绝佳工具。\n\n我的办公桌上有六个大屏幕，可以让我清晰地监控仓位。它们按行业板块用不同颜色进行划分。我是一个视觉化思维很强的人，所以我需要很大的桌面空间和多种颜色才能跟踪所有信息。\n\
  \n**Bourquin：** 那里有大量信息需要吸收。在缺口交易中，你关注的是标普 500 期货，但在股票方面，你是仅仅逐一翻看你股票篮子里的图表，还是当某个条件符合你的标准时，`彭博`会以某种方式自动提醒你？\n\
  \n**Berger：** 我每周日会翻阅一遍图表，并更详细地查看大部分股票。每天我都会查看标普 500 各行业板块及其图表，并设置提醒。我还会在周日晚上为所有股票设置提醒，一旦收到提醒，我会等到交易日结束时，看看它是否如我所料，然后我再决定是否扣动扳机。\n\
  \n**Bourquin：** 你每周会为自己设定一个赚钱的具体金额目标吗？\n\n**Berger：** 我不能给出具体的美元金额，但我可以告诉你，交易开盘缺口的目标基本上就是赚取一到两个标普\
  \ 500E-迷你期货的点差。如果你能做到这一点，就能过上非常优渥的生活。\n\n**Bourquin：** 对。那么，你是如何学会交易开盘缺口的呢？\n\n\
  **Berger：** 我以前在摩根大通做固定收益方面的工作，我一直想摆脱那个领域，专心做交易，但我想找到一种能让我在月度或季度基础上获得足够稳定的现金流的方法，这样我才能离职，或者至少能去一个自营交易部门生存下来。缺口交易是一种成功率很高的交易方式，让我能够实现这个目标，这也正是我接触它的原因。\n\
  \n**Bourquin：** 现在，因为标普指数可能一周只有几次缺口，而不是每天都有，你发现这种缺口交易的频率有多高？\n\n**Berger：** 嗯，即使没有缺口，我也会将主要的日内反转视为一种缺口交易。例如，即使缺口已经被回补，或者实际上根本没有出现缺口，在大多数情况下，你仍然会在交易日的第一个小时或一个半小时内看到一个走势反转，这个反转往往与前一交易日的方向相反。所以，机会出现的频率要高得多，即使不是一个真正的缺口，其本质也与缺口交易相同——我实际上只试图在市场回归均值的过程中，从中获取一到两个点差。\n\
  \n**Bourquin：** 而不是期望它一路完全回到前一交易日的最高点或最低点？\n\n**Berger：** 没错，完全正确。我们只想打出安打和本垒打，这真的是我们唯一想做的事。\n\
  \n**Bourquin：** 我在一个研讨会上和某人聊过，一些最优秀的交易员可能只精通一两件事，但他们日复一日地这样做，以至于过了一段时间，这几乎变得枯燥，如果可以这么说的话。你是否觉得最好的交易方式就是，当你发现某种有效的方法时，你就一遍又一遍地重复做，直到交易变得乏味为止？\n\
  \n**Berger：** 我的办公桌上贴着一张很大的便利贴，上面写着：“`别盯着钱，要专注游戏`”，这帮助我真正做到了在每天的交易中不去看我的盈亏情况。当然，对于某些账户我不得不看。但我努力将金钱因素与我的情绪分开，因为我发现，在我表现最好的月份和最棒的日子里，我所做的全部就是专注于寻找我提到的那种日内交易或波段交易的设置。最终，我甚至意识不到自己赚了那么多钱，而且在任何时刻都没有情绪波动。\n\
  \n**Bourquin：** 这就是我所说的“富有交易员的二十个习惯”之一。虽然我们都是为了赚钱而来，但当你把目标设定为其他东西时，你就能做出更好的决策，金钱反而会随之自然而来。\n\
  \n**Berger：** 尤其是当你交易期货时更是如此。我们讨论的重点很多都放在 E-迷你期货的日内交易上，在这种情况下，你最容易盯着盈亏看，因为你真的能看到它随着价格跳动而上下变化。尤其在这种情况下，关键就是看图表。如果你看到一个有效的信号，就去做，然后设置好止损，继续前进。\n\
  \n**Bourquin：** 让我们再多聊聊你使用的慢速随机指标。你需要看到慢速随机指标出现什么情况，才能将其视为一个有效信号？是不是简单地看到那些指标线开始与\
  \ K 线配合移动就可以了？\n\n**Berger：** 在日内交易中，我主要寻找极端状态。所以，很多时候，如果出现向上跳空缺口，随机指标往往会很快进入超买区域。一旦这些随机指标在五分钟图上（最好在十五分钟图上也是）处于极度超买状态，同时伴随着一个明确的反转\
  \ K 线形态，那么这个组合就会作为一个做空的信号。\n\n在波段交易中情况则不同，多年的经验告诉我应该寻找背离。如果有一只股票创出新低，但随机指标却没有，并且我还得到了其他信号，包括\
  \ K 线形态和斐波那契分析结果，那么与仅仅遇到随机指标超买的情况相比，我会更倾向于进行这笔交易。\n\n**Bourquin：** 所以，你是在寻找某种背离，说明价格与你从\
  \ K 线图上看到的并不一致，也与你在随机指标上看到的不一致，因此，这就构成了一个很好的交易机会？\n\n**Berger：** 是的，没错。\n\n**Bourquin：**\
  \ 对于反转 K 线，你会在什么时点建仓？是在下一根 K 线出现时，还是在这第一根 K 线收盘时，当你看到它明显将要以某种方式收盘时？\n\n**Berger：**\
  \ 对于日内交易，我总是等待那根 K 线收盘。对于波段交易，我会等到交易日结束。我会在该交易日收盘前后十五分钟内进场。\n\n这里有一个非常重要的区别，我认为这就是为什么\
  \ K 线分析如此重要。如果你处于一个趋势的*底部*并收到买入信号，这个买入信号需要一根确认 K 线。\n\n如果我在日线图上离当天交易时段结束还有十分钟时收到一个买入信号，我不会立即买入。我会等待确认信号出现，给我一根指向我期望方向的\
  \ K 线。如果我得到了确认，那么我会在当天收盘时进场。\n\n在趋势的*顶部*，则不一定需要这样。如果顶部区域有足够空间来形成一个强烈的信号，那么这个信号本身可能就足以让我开始做空。\n\
  \n\n**Bourquin：** 你提到周二、周三和周四是日内交易最有利的时间。假设你在周五下午收到了一个不错的波段买入信号。你会因为是周五而感到担忧，还是会照常按信号操作？\n\
  \n**Berger：** 在周五下午进行交易，我肯定会更加犹豫。我得说，这时候就需要多一些长期分析来发挥作用了。\n\n例如，在我看来，2011 年秋季，持仓或买入股票熬过周末都非常困难，因为你永远不知道周末会出什么消息。所以，这多少取决于宏观和地缘政治背景。\n\
  \n**Bourquin：** 这么说，在某种程度上，消息面对你来说仍然很重要，尤其是在波段交易中？\n\n**Berger：** 是的。消息面在波段交易中当然很重要，而且在我倾向于利用另外两个较短时间框架进行交易的长期持仓中，它甚至更为重要。\n\
  \n**Bourquin：** 这很有趣。我听说很多交易员总是持有长期头寸，他们会定期对这些头寸进行增减，但始终保留一定的基础仓位，并不断进行短线进出。这就是你对长期持仓的做法吗？\n\
  \n**Berger：** 是的。我认为作为交易员，我们能获取的最大阿尔法（Alpha）就是理解当前的市场环境。例如，我喜欢举 Appaloosa Management\
  \ 的基金经理大卫·泰珀的例子，因为这个例子非常典型且精彩。他曾公开表示，政府文件明确表明他们（政府）会以“X”价格购买花旗集团的股票，而这个价格比当时的市场价格高了\
  \ 20%、30%，甚至我都不知道高了多少个百分点！他需要买入这只股票，这简直是显而易见的。\n\n同时，同样非常清楚的是，流动性注入基本上是在强迫投资者购买股票。现在要明白，那是\
  \ 2009 年最重要的事情。估值不重要。所有利空消息都不重要。唯一重要的是流动性注入，而事实上，这种情况至今仍在持续。\n\n理解某些时候基本面更重要，而另一些时候仅仅消息面才是关键，这一点非常非常重要。\n\
  \n**Bourquin：** 当政府开始介入市场时，所有的押注在技术分析层面都失效了，因为如果美联储想注入流动性，这就会凌驾于你拥有的任何技术信号之上。所以，在这种程度的政府干预下，你可以忽略技术信号。\n\
  \n**Berger：** 是的，你不想与之对抗。无论是“不要与美联储作对”，还是最近常说的“不要与欧洲央行作对”，都不是你想做的事。\n\n不过，技术分析仍然有效。你只需要理解当前形势。过去几年里，做空基本上都会受到重创。如果你理解这一点，那么你就明白，你基本上必须变成一个趋势跟踪者——姑且这么说——然后逢低买入，当然，这种思维模式可能会迅速改变，但这就是当前的情况。技术分析会有效，但如果你愿意，它不会对“趋势反转”分析有效。\n\
  \n**Bourquin：** 你会跟踪你的盈亏比吗？可以和我们分享一下吗？\n\n**Berger：** 我会。当然，这取决于交易类型。缺口交易可能是我能给出的最简单的例子，其胜率大约在\
  \ 75%。这相当高了，但更重要的问题是关于我在任何特定交易上的仓位大小。我可以告诉你，在这些交易中，我有 75%的成功率，这是事实，但真正关键的是我如何配置仓位的大小。\n\
  \n**Bourquin：** 对。如果你在盈利的交易上仓位小，而在亏损的交易上仓位大（那就糟了）。\n\n**Berger：** 没错。这实际上是一些人不理解的一个大问题。他们很高兴得到一个关于某只股票的“内幕消息”，但他们不知道提供消息的人用了多大仓位——而对我而言，这才是最重要的。\n\
  \n**Bourquin：** 你发现 2011 年底和 2012 年由于各种消息面，交易环境变得更困难了，还是说和其他时期一样好？\n\n**Berger：**\
  \ 从交易员的角度来看，说实话，那段时间非常困难。很大程度上是因为缺乏波动性。在 2012 年初，很难看清欧洲央行在去年 12 月首次注入资金的真正影响有多大。我当时很清楚市场会有一波反弹，但看到反弹幅度如此之大，确实非常令人惊讶。\n\
  \n我认为交易变得更困难了，尤其是从 8 月下旬到 9 月这段时间。2011 年 10 月倒是一个美妙的时间段，因为波动性很大。\n\n**Bourquin：**\
  \ 是的，低波动性总是让交易更难。既然你关注欧洲央行和其他央行的动向，你有交易外汇期货吗？\n\n**Berger：** 没有。我不交易外汇期货。我坚持做我之前提到的那些资产类别，主要原因是我认为（如果交易太多）很难跟踪所有东西。正如我之前所说，我以前是做固收的，交易过很多信用违约互换、公司债券，甚至主权债券，但要跟踪的东西实在太多了。\n\
  \n如今，随着 ETF 的出现，如果我想做一个大概的交易，比如做多欧元或澳元，我可以通过交易 ETF 来实现。当然，这样我会在手续费上有所损失，但我很乐意仅仅把它当作一个宏观交易来做，而不用担心处理外汇和公司债券的复杂性，因为那样我需要不同的经纪商以及其他一切东西。\n\
  \n**Bourquin：** 是的，你说得对。如今 ETF 这么多，根据你持有的任何倾向建仓都变得简单多了。\n\n在我们访谈尾声，我们来谈谈你学到的一些重要经验，这些经验真正帮助你在交易中提高了盈利能力和自信心。你能分享一些在交易道路上真正对你有帮助的东西吗？\n\
  \n**Berger：** 嗯，你总是听到关于及时止损的重要性。没有什么比这更能让人保持谦逊了。这是一句被用滥了的话，但确实千真万确。对我来说，关键在于纪律。我越是坚持自己的规则，不去关注盈亏方面（就像我们之前提到的），我就越发现赚钱很容易。\n\
  \n另一件事——同样重要——就是不要过度交易。再说一遍，这也是一句常被引用的格言，但它是真的，这也是为什么它在交易员中如此普遍。人们有很强的过度交易倾向——尤其是在短线时间框架中，尤其是当执行交易跟按下一个按钮一样简单时。大多数时候，这都弊大于利。\n\
  \n**Bourquin：** 我完全同意，而且我自己的交易中也经历过。当我意识到即使我当时没有积极地在市场中，甚至一整天都没有做任何交易，我实际上仍然在“交易”时，我取得了进步。交易不仅仅意味着你身处市场中。交易也可以意味着你在一旁坚守，等待合适的交易机会出现。\n\
  \n**Berger：** 没错。我认识的两个最优秀的交易员，他们的交易量可能只有我的一半。坦率地说，我自己交易得也不算多。\n\n交易机会在开盘缺口附近相对频繁地出现，但这并不典型。关键在于等待正确的机会，然后果断行动。\n\
  \n问题在于，作为人类，我们的思绪总是在运转，很难让它停下来。我甚至已经到了通过做瑜伽和冥想，来确保自己能保持冷静和专注的程度。或者，我们也可以借助运动，或者任何能让我们保持冷静、不轻举妄动的方法。\n\
  \n\n#### 布尔昆：我认同交易之外拥有其他爱好至关重要，几乎无论是什么爱好都行。可以是编织篮子、体育运动，或是某种能让你暂时忘却市场的消遣。这一点非常关键。\n\
  \n**伯杰：** 喝酒通常不是最好的选择！但没错，你需要一些能帮你把思绪从市场中抽离出来的事情。\n\n**布尔昆：** 是啊，喝酒可能不是最佳答案！我们来谈谈最近的一些交易吧。或许可以聊一笔成功的交易和一笔不太顺利的交易，以及你从中学到了什么。\n\
  \n**伯杰：** 我可以给你讲一笔在`标普 500`指数上非常成功的交易。如果你从波段交易的角度看`标普 500`指数，它在 2012 年 2 月 16 日创下低点，随后仅在几天后的\
  \ 2 月 21 日的隔夜交易中便创下高点。当时市场已严重超买，然后它回调了 61.8%，几乎精确到最小波动点位。当然，这是一个非常关键的斐波那契支撑区域，也是我们之前提到过的。\n\
  \n我们有横向支撑。动量震荡指标显示超买，实际上，已经开始出现背离迹象。欧洲信贷也开始收紧。果然，大约一周后，我们就达到了 23.6%的扩展目标位，大约在 1375\
  \ 点附近。\n\n**布尔昆：** 哇，所以这是一个所有因素都吻合、走势完全符合预期的案例。\n\n**伯杰：** 完全正确。当市场严重超买时，所有人都明白它需要回调，但作为交易员，你不能“成为那个球”。我的意思是，市场可能长期保持非理性，而且可能会比我们想象的持续长得多的时间。从某种程度上说，我们都患有短视的毛病，从这个角度来看，能够切断自己的情绪至关重要。\n\
  \n**布尔昆：** 最后，谈谈那笔亏损的交易吧。在那个情形下，哪里出了问题？\n\n**伯杰：** 嗯，我喜欢在主要波动的顶部或底部建立头寸——特别是波段头寸。当时，苹果公司是一个重大新闻热点，股价刚刚突破`$500`美元大关，而在我们这次访谈时，已经触及`$550`美元。\n\
  \n当股价上涨到`$500`美元水平时，我通过使用轻微价外看涨期权做空。当然，现在股价到了`$550`美元，这个头寸正在亏损。然而，如果你分析一下，其中有几点非常重要的教训需要吸取。\n\
  \n其中之一是，我没有直接做空股票，而是做空了价外看涨期权，这给了我更大的回旋余地。这些期权是几个月后到期的，所以给了我更多操作空间。如果我看到市场出现重大反转，我会再入场做空更多股票，但现在看来，这是一个亏损的头寸。但需要考虑的关键点是，这个头寸的规模和结构都是合理的，这给了我更大的容错空间。\n\
  \n**布尔昆：** 很多交易员试图在苹果股票上寻找顶部，结果损失惨重，而这个顶部似乎短期内并不会出现。如果行情继续逆势而行，你会在什么价位愿意买入股票？或者，你会在什么价位选择平仓离场？\n\
  \n**伯杰：** 这个问题问得很好。我坚信，像苹果这样垂直上涨的股票，最终必然会有所回落。当然，不一定非要是 30%，但很多这类股票会回落 5%到 10%，而且这种情况发生得相当快。\n\
  \n在这个具体案例中，如果我看到苹果股价远远突破`$570`美元，我就会开始在这些空头看涨期权上承担一些损失，然后进一步观察。但垂直上涨的股票有非常非常高的概率——实际上几乎是\
  \ 100%——会回落。你可以看看 2007 年触顶时的谷歌，或者 2011 年的奈飞。奈飞在年初垂直上涨超过 60%，然后暴跌。那是一个极端的例子，但关键是，那些垂直上涨的股票不会持久。问题只在于它们何时会回落。\n\
  \n对于苹果来说，这甚至不完全是基本面问题。现在，我与其说是一个基本面分析师，不如说是一个技术派交易员，但苹果的情况并非基本面情况恶化。想想为什么苹果会垂直上涨。它上涨是因为其中的趋势动量基金。\n\
  \n我有很多朋友在管理动量对冲基金，他们有的年份业绩出色，有的年份则非常糟糕。现在，苹果是被动量基金推高的，而他们都会在同一天离场。再次强调，这并不意味着股价必须崩跌至深渊，但苹果的股价在几个月左右的时间框架内，有极高的可能性至少下跌\
  \ 5%到 10%。\n\n## 章节\n\n### 亚历克斯·福斯特\n\n*交易起初只是* **亚历克斯·福斯特** *的一个爱好*，但在吸收了无数技术指标的知识，并最终确定了最适合自己交易风格的三个指标后，他成功地迈出了管理客户资金的一步，成为佐治亚州`AF\
  \ Capital Management, LLC`的负责人。他的历程跨越了动荡的市场环境，包括 2007 年的毁灭性崩盘，在那次危机中，他能够保持安全并盈利，不仅证实了他以期权为核心的方法的有效性，最终还为他过渡到正式的交易业务铺平了道路——这是一项只有部分经验更丰富、经受过市场考验的交易员才会在其职业生涯中考虑的冒险。\n\
  \n尽管福斯特可能违背了一些传统的市场智慧，但他的业绩记录和持久的职业生涯表明，指标不必堆砌得又多又复杂才能有效；关注风险以及保持事情简单的倾向，可以帮助任何人作为一名交易员达到难以想象的高度。\n\
  \n**蒂姆·布尔昆：** 亚历克斯，我们首先来谈谈你是哪种类型的交易员——日内交易员还是波段交易员——以及你交易哪些市场。\n\n**亚历克斯·福斯特：**\
  \ 我认为自己更偏向趋势跟踪者，因为相对于日内交易，我更常进行数周或数月的交易，并且通常使用期权。\n\n**布尔昆：** 这属于波段交易的范畴，周线和月线交易也是我的交易方式。我们来谈谈你是如何做决策的。你是技术派还是基本面派交易员？\n\
  \n**福斯特：** 我两者都用，而且我并不认为它们是互斥的，但我确实更偏向技术面，因为我看到技术面的变化比基本面更频繁。我会说基本面在某种程度上影响我，可能是在更宽泛的趋势上，但具体到执行交易时，几乎总是基于技术面分析。\n\
  \n**布尔昆：** 你喜欢如何进行你的技术分析？\n\n**福斯特：** 我大量使用趋势线，并且非常看重移动平均线和`威廉指标%R`。我注意到现在很少有人用这个指标了，但它对我多年有效，所以我一直坚持使用它。\n\
  \n**布尔昆：** 我最近也没听多少人谈论`威廉指标%R`了。那么，你是怎么使用它的？\n\n**福斯特：** 它本质上是一个超买/超卖指标，人们通常不了解它的图形如何显示。上方区域是超买，通常被视为\
  \ 0 到-20 的范围，而超卖区域是-80 到-100。\n\n现在，我同时使用十四天和二十八天周期的指标来获得不同的时间段，观察它们往往能平滑指标曲线。十四天指标让我对行情有早期预判，而二十八天指标通常会给我提供确认信号。\n\
  \n所以，对于任何进入超买区域（例如像`标普 500`指数）的趋势，它可能会在那个区域停留数周之久。仅仅进入超买区域并不是一个交易信号，但当它离开该区域时——当它跌破超买区或升破超卖区时——这才意味着一个交易信号或市场情绪发生了变化。\n\
  \n**布尔昆：** 有意思。那么，一个潜在的见顶信号是当`威廉指标%R`显示超买，而当它脱离超买区域时，你就确认了所关注的标的或资产即将再次下跌？\n\n\n\
  **福斯特：** 没错，那就是交易时机，无论是买入还是卖出。我通常按日线周期来使用，但也会参考月线周期。\n\n每隔几周，我的日历上就会弹出一个提醒，让我查看一张三年期的月线图，我会用\
  \ 14 个月和 28 个月的指标来观察它们的走势。这能帮助我不至于迷失在短线周期的细节中，而且我发现这种方法也能相当准确地预测长期趋势。\n\n**布尔昆：**\
  \ 您是否觉得，之所以在周线或月线周期上交易表现更好，是因为在这些周期以下存在大量噪音，导致您无法获得真正可靠的信号？\n\n**福斯特：** 是的，完全正确。较长的时间周期确实能滤除噪音，同时你仍然可以看清短期的走势。\n\
  \n**布尔昆：** 那么，您是如何运用移动平均线的呢？\n\n**福斯特：** 我会观察所有指标——包括 10 周期、20 周期、50 周期、100 周期和\
  \ 200 周期的移动平均线——但其中最关键的一点是观察交叉信号。任何时候，只要我看到短期均线向下穿越长期均线，这就是看跌信号。例如，如果 10 日均线下穿 20\
  \ 日均线，或者 20 日均线下穿 50 日均线，这都是看跌信号。反之亦然。如果短期均线上穿长期均线——比如在熊市周期结束时可能出现的情况——那就是看涨信号。\n\
  \n**布尔昆：** 那么举例来说，如果 10 日均线下穿 20 日均线，同时`Williams %R`指标从超买区域回落并开始走低，这两个信号同时出现，对您来说是否就是一个理想的交易信号？\n\
  \n**福斯特：** 是的，那将是一个理想的交易机会，尤其是当它同时跌破趋势线时。这三个信号同时出现，可以说是绝佳的“三重奏”。\n\n**布尔昆：** 那么这些信号同时出现的频率如何？\n\
  \n**福斯特：** 不常出现，但如果你监控的股票池足够大，每个月还是能发现一两支符合这些条件的股票。正是在那些时候，你必须愿意重仓介入，如果行情顺利，甚至还可以加仓。当所有信号都形成共振时，往往能产生一些利润丰厚的大交易。\n\
  \n**布尔昆：** 那么，您交易的是指数期权还是个股期权？\n\n**福斯特：** 我主要交易指数期权。偶尔也会操作一些个股，但特别是从 2011 年年中开始，随着所有资产的贝塔值都处于非常低位的状态，我发现指数期权更容易操作。具体来说，我使用多种覆盖小盘、中盘和大盘指数的\
  \ ETF，包括`SPY`、`DIA`、`MDY`和`IWM`。\n\n**布尔昆：** 在交易指数 ETF 期权时，您会构建特定的跨式或宽跨式组合，还是只买入看涨和看跌期权？\n\
  \n**福斯特：** 这取决于具体的市场形态，这也是为什么我会同时纳入长期和短期趋势以及移动平均线。如果我观察长期趋势，发现一个持续数周或数月的移动平均线交叉，同时结合一个短期交叉——比如\
  \ 10 日均线下穿 20 日均线——我可能会买入看涨期权，看看这波行情能持续多久。\n\n不过，我的大部分交易都是卖出裸看跌期权。根据我看涨的程度或对市场形态的判断，我可能会卖出价内期权。否则，我的很多交易都是卖出价外期权，只是为了以较低的风险赚取时间价值。\n\
  \n但正如我所说，这取决于长期趋势。如果我在数月周期的图表上（比如我提到的三年期月线图）看到一个长期交易机会，我更可能在短线交易中卖出价内期权。\n\n通常，我还是会关注未来一两个月的合约，但如果长期形态支持，我也可能交易更远期的合约。否则，我倾向于小仓位操作，争取每月获得大约\
  \ 1%的收益，而把大交易留到我看到全面强劲的形态时。\n\n**布尔昆：** 您通常在什么时候卖出这些裸看跌期权？是会等待它们到期，还是在此之前平仓？\n\n\
  **福斯特：** 有两种情况我会等待它们到期。第一种是，如果它们仍在接近 ETF 现价的位置交易，并且趋势依然存在；第二种是，如果它们已经远远处于价外，并且趋势仍然强劲。\n\
  \n这也取决于这笔交易是在我的应税账户还是 IRA 账户中。显然，IRA 账户不能使用保证金，所以我更倾向于在那里平仓并将头寸上移。而在我的应税账户中，我通常会让它们滚动到期，最终变得一文不值。\n\
  \n**布尔昆：** 在任何时候，您同时持有多少个交易头寸会比较舒适？\n\n**福斯特：** 在任何时候，我最多可能持有 20 个未平仓头寸。最近，从 2011\
  \ 年年中开始，我的重点更多地转向了指数，在这种情况下，持有更多最终都回归到同一只标的 ETF 上的未平仓头寸会更容易。\n\n所以，我不需要去盯着`孟山都`和`摩根大通`以及市场上其他所有股票，去琢磨当天要交易什么，以及它们背后都有什么新闻。集中交易一个标的上的多个头寸要容易得多。例如，你可能在`SPY`上有一个\
  \ 130 美元的裸看跌期权，另一个 135 美元，还有一个 132 美元的看涨期权，然后你只需要监控它们所有。这仍然是盯着同一只 ETF 或标的权益，因此即使所有头寸都相互关联，也更容易管理好更多的全额头寸。\n\
  \n**布尔昆：** 要同时追踪哪些头寸盈利、哪些亏损以及你的止损位，这工作量不小。我们谈谈您是如何管理止损点和盈利目标的，尤其是在任何时候都有这么多未平仓头寸的情况下。\n\
  \n**福斯特：** 一切都回归到趋势这个核心，所以这是完全动态的，取决于市场所在的位置，但我用一个基础的 Excel 电子表格来追踪所有信息。\n\n我喜欢把事情简单化。如我所说，我尽量将指标限制在两到三个——趋势线、移动平均线和`Williams\
  \ %R`——如果这些指标有任何变化，我就可以快速调整我所有的头寸，这也是为什么我喜欢把所有信息都放在 Excel 里。\n\n我始终关注自己有多少底层资产价值处于风险之中，以便在我的应税账户中避免过度使用保证金。在这些账户里很容易过度激进，就像我刚开始交易期权时那样。我相信很多交易者在初入市场时都有过类似经历。\n\
  \n**布尔昆：** 您是如何发现并最终确定趋势线、移动平均线和`Williams %R`是适合您交易的最佳指标组合的？\n\n**福斯特：** 在我刚开始学习技术分析时，我阅读了所有我能找到的资料——书籍、博客、网站，你能想到的我都看了。我开始尝试所有不同的指标，而最终就是这三个指标真正适合我。\n\
  \n现在，这三个指标对我有效，但它们可能并不适用于每个交易者。因此，我的建议是尝试大量的指标，找出哪些对你自己有效，但要意识到，在你开始遇到相互冲突的数据之前，可使用的指标数量是有限度或有一个平衡点的。当一个或两个指标说“买入”，另一个说“卖出”，而另外一两个又说“持有”时，“分析瘫痪”就发生了。到那时，你最终会完全不做任何交易，错失所有方向的机会。\n\
  \n当我发现这三个指标对我有效时，我就开始剔除其他指标。此外，它们很简单，而一切都回归到保持简单。\n\n**布尔昆：** 我们之前稍微提及了这一点，但让我们更详细地探讨一下，一旦标的资产基于您这三个指标满足了条件，您是如何决定买入或卖出具体哪些期权的。\n\
  \n\n**福斯特：** 我首先通过观察包含多条移动平均线和 `Williams %R` 的三年期月度图表，来把握整体的长期趋势。如果我发现：第一，我们处于看涨趋势；第二，我们可能即将摆脱超卖状况；第三，短期移动平均线位于长期移动平均线上方，那么我就会形成一个基本判断：在未来几个月（以六个月为时间上限）内，标的资产的价格将高于当前水平。\n\
  \n因此，以此作为我所有其他交易的基础，我会等待合适的时机，即短期移动平均线（如果是日线交易，则为十日、二十日或五十日移动平均线）正在向正确方向移动的时候。\n\
  \n一旦看到这种情况，我可能会买入一份实值的裸看跌期权，这能让我搭上价格上涨的顺风车。而且，即使它在到期前没有上涨，我通常也会接受行权指派，这样我就能在等待期间获得股息。\n\
  \n**布尔昆：** 这正是我下一个想问的问题！你什么时候会接受行权指派，什么时候会避免呢？\n\n**福斯特：** 我确实会接受行权指派，但这取决于到期时的情况。如果我不接受指派，那是因为我打算将裸看跌期权向下滚动。\n\
  \n例如，假设我的目标是`SPY`的 135 裸看跌期权，而且它已经是实值了。在到期前大约一天，如果`SPY`正在逐步接近行权价，但我发现我很可能会收到指派，那么在那种情况下，我可能会让它被指派，除非我看到趋势正在改变。\n\
  \n如果各项指标还未完全转为看跌，但我看到了一些摇摆不定的迹象，比如移动平均线相互靠近或趋势线走平，我可能会通过卖出虚值期权并买回，然后向下滚动卖出 133 或\
  \ 134 的裸看跌期权，来继续保持投资。这样我仍然投资于`SPY`，但降低了风险或被指派的可能性。\n\n**布尔昆：** 你被指派时的实际价格点会影响你的决策吗？换句话说，是否必须是一个你不介意实际拥有该标的资产的价格？\n\
  \n**福斯特：** 有时候会，这就是基本面因素发挥作用的时候。如果价格正在下跌，而标普指数的市盈率接近 11 或 12 倍，我可能更愿意在那个时候接受指派，而不是在市盈率在\
  \ 15 或 16 倍左右的时候。因为当市盈率较低时，我更倾向于做多并持有。\n\n**布尔昆：** 你会如何围绕重要的经济报告（如非农就业数据）进行交易？或者你在那些时段根本不交易？\n\
  \n**福斯特：** 我确实会在此期间进行交易。我以前更常让它们影响我的交易，但借助我使用的趋势分析和技术指标，我有时——当然不是每次都行——能提前对将要发生的事情有所了解。\n\
  \n趋势不会仅仅因为基本面因素而改变，而且很多时候我认为趋势会贯穿这些事件。偶尔趋势会打破，在那些情况下我时刻准备做出改变。但如果周四大新闻或数据要在周五开盘前发布，我通常不会因此放弃交易，除非我认为这些数据会产生重大影响。\n\
  \n**布尔昆：** 让我问你一个非常具体的市场问题。2012 年初，似乎每天，无论标普指数是上涨还是下跌，原因总是希腊。你会关注那条新闻吗？你在意他们当时关于市场*为什么*上涨或下跌的说法吗？\n\
  \n**福斯特：** 我有同感，是的，我确实在意新闻是什么，但很多时候我觉得他们只是在填补广播时间，试图制造一个没有真正逻辑基础的担忧或喜悦的理由。就像你说的，希腊一直是市场涨跌的原因，但很难有一个因素能同时成为所有原因。\n\
  \n大多数关注希腊根本问题的人都明白，即使有解决方案，比如欧洲部长们再次提供援助或承担债务，该方案得以实施以及紧缩措施得以通过的可能性也非常低。\n\n这只是一个临时的解决办法——就像大伤口上贴的小创可贴——因为它能够也确实在影响市场，所以我会关注它。但我不认为它是长期交易信息。\n\
  \n**布尔昆：** 现在让我们谈谈仓位规模，以及你在使用期权时如何确定你的头寸规模。\n\n**福斯特：** 这取决于资金配置，对于我自己的账户和部分客户账户，我可能会更激进一些。如果我认为小盘股看起来强劲，我可能会更多地使用小盘股，或者对它们配置更重的仓位，因为我认为我在小盘股上能获得比道指更好的表现。\n\
  \n这也取决于我当时的风险承受能力。我的交易通常相当激进，但我确实会考虑个人生活中当前或即将发生的事件，在某些条件下可能对承担风险更加犹豫。\n\n**布尔昆：**\
  \ 在你个人账户的一次交易中，平均的期权合约规模是多少？\n\n**福斯特：** 我通常一次只使用两份合约，虽然我一周内可能会使用多份合约，但在任何一天，我一次只使用两份合约。\n\
  \n我的交易规模很小，大多数交易都只小口吃进，这又回到了风险管理上。如果到期后我做得不错，手头清空，而且我的大多数期权都虚值到期，我可能会开始用几笔实值交易建立新的头寸。这样我有很多上涨潜力。\n\
  \n从那时起，如果我的头寸下跌，我不会完全投入，可以适当地管理该头寸。有时我会买回它，根据我认为标的资产长期走势如何，有时我可能会平仓。但我总是从小仓位开始，如果价格上涨，我可以继续加仓。\n\
  \n然而，重要的一点是，我通常不会在我后续的交易中用更多的实值期权去追涨一个头寸。我的第三、第四、第五笔以及之后的任何交易，通常会使用虚值期权。\n\n**布尔昆：**\
  \ 我们来谈谈交易客户账户和交易你自己的账户的区别。你是什么时候开始管理客户资金的？那是在你成功交易自己的账户之后吗？\n\n**福斯特：** 我大约三年前开始管理客户资金，是的。交易从我大学毕业后就成了我的一个爱好。它一直让我很感兴趣，所以我就开始研究它。上了大学里的商业管理、金融和经济学课程后，我就被它吸引了。\n\
  \n我开始通过投资赚钱，然后在此基础上发展。我做得不错，也和朋友以及其他人在谈论买什么以及不同的市场模型。我有几个朋友是顾问，他们鼓励我进入资金管理领域，但那时，我专注于自己的资金，不想承担交易他人资金的风险。\n\
  \n2007 年的崩盘是我的转折点。我听到了太多关于人们没有及时离场的可怕故事，虽然我并不是说自己完全及时脱身了，但我知道要减少自己的风险敞口，并想知道为什么其他人不也这样做。\n\
  \n人们对我说：“嗯，我们是长期投资。” 但我的观点是，长期是由短期交易构建而成的，这些短期交易可以在长期基础上进行管理，尽管更多的是在战术层面。因此，尽管战略观点着眼于长期，但短期交易比单纯的买入并持有策略能更好地帮你达到目标。\n\
  \n\n"
- '# 排版后的内容


  之后，我与人们交谈，为他们进行交易并提供建议，然后我咨询了一位顾问，他向我解释说，进入这个行业并保持独立是很容易的。我最大的心结之一是不想为大型经纪公司工作，因为我希望拥有更多灵活性，且不必推销自营产品或基金。因此，最终看来，自己单干是顺理成章的选择。


  **布尔昆：** 你在管理他人资金的同时如何赚钱？是按收益百分比收费、收取固定费用，还是其他方式？


  **福斯特：** 对我来说，只是按资产净值收取固定比例的费率，具体比例会根据我在账户中的操作活跃度而有所不同。


  例如，如果客户对更偏向被动管理的账户感兴趣，主要采用买入并持有策略，且只有重大市场变化时才会调整账户中的一小部分资产——那么费率是 1.25%。


  有些账户是完全主动型的，这类客户在大经纪公司拥有更多资金，但他们希望用所谓的“零花钱”让我管理其账户中的一部分。嗯，这个术语挺有意思，能拥有这部分资金固然不错，但它本质上是他们账户中激进操作的部分。这种情况下，我会收取高达
  2%的费用，并且可能每两个月就完全换手整个账户。


  这非常不利于税务效率，但有时这种低效却能奏效，因为要么收益值得，要么亏损的规避弥补了这一点。有时候情况也确实如此。


  **布尔昆：** 回到利润目标的问题，你是否会提前设定平仓区域，或者如何决定何时离场？


  **福斯特：** 不，我不会提前设定。我听说过一些交易员，他们将亏损止损点设为 5%或 8%，将盈利止盈点设为 10%或 15%，但我更愿意让盈利奔跑。在止损方面，我依靠技术信号来帮助我在正确的时间离场。


  这也取决于账户及其风险水平。对于个人退休账户（IRA），我可能会设置更宽泛的界限，以最大化收益并减少交易频率。但在这些账户中，我也会更多地使用价外裸卖空期权。


  如果我认为标普 500 指数在某一年有下跌 10%的可能性，那么我认为在亏损 8%时就卖出并不明智，因为下跌空间可能只剩下 2%。然而，如果技术指标显示应该立即离场，那我就会卖出，尽管希望在承受
  8%的亏损之前，卖出信号就已经出现。


  **布尔昆：** 听到越来越多的交易员讨论不再设定任意利润目标，而是更多地依赖市场本身的信号，这很有趣。


  **福斯特：** 这里有一个很好的例子：如果在 2011 年 12 月初或中旬，当标普 500 指数正在形成短期底部时，我使用了任意止盈点，我就会错过上涨 10%或
  15%的机会。


  仅仅基于数字来截断交易并不值得，而且我从不希望限制上涨潜力。我的看法是，我宁愿在顶部错过 2%到 3%的下跌空间，也不愿过早离场而错过另外 10%的上涨机会。我认为除非运气极好，否则我无法精准地抄底逃顶，但通过使用技术指标，我可以识别出趋势何时改变或动能何时发生转换。


  **布尔昆：** 本质上，你会抓住行情的主要部分，并对这一点感到满意。


  **福斯特：** 没错，只抓住大部分行情就好，并且要意识到，如果你在顶部或底部错过了 2%、3%，甚至偶尔 4%的波动，从长期来看，这与你能在中间部分获得的 10%或
  20%的收益相比微不足道。


  如果你在熊市中做空，并且能把握住哪怕 5%的下跌行情，那么考虑到标普 500 指数在二十或三十年内历史平均年涨幅为 10%或 11%，你不仅抹平了 5%的下跌空间，而且将其转变为
  5%的收益。这就是在市场上长期获得巨大优势的方法。


