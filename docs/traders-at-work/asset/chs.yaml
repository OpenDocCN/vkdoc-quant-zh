  ```




  **布尔昆：** 这就是为什么有些交易员正确率很高，却赚不到钱，也搞不清原因。很可能是因为他们没有妥善管理交易。


  **席明：** 显然，我们不想有一半时间是错误的，但老实说，如果你能控制亏损，让亏损小于盈利，那么即使你有一半或更多时间是错误的，仍然可以盈利。


  管理盈利的交易相当简单，也很有趣，这正是我们最初进行交易的原因。然而，如何处理那些不可避免的错误，才是长期成功的关键。


  你告诉我谁能严守纪律，始终如一地处理好失误，我就能告诉你，我可以教会谁在交易中赚钱。问题在于，正确的决定往往违背我们的本能，但最高效的交易者会学会如何持续赢得这场心理战。


  ## 章节


  ### 彼得·布兰特


  自 20 世纪 70 年代开始担任商品场内交易员以来，**彼得·布兰特**已愉快地转型为电子交易员，撰写了两本广受好评的著作——包括《专业商品交易者日记》（Wiley
  出版社，2011 年）——并被著名经济学家、资金管理人巴里·里索尔茨誉为“金融界最具影响力的 30 人”之一。通过将重点放在经典图表形态和较长的时间框架上——并在此过程中淡化那些常常具有误导性的短期或日内价格波动——布兰特能够在不牺牲盈利潜力的情况下减少交易次数。他的职业生涯跨越数十年和市场环境的不断变化，但其整体策略的支柱——耐心、纪律和健全的资金管理——是永恒的，适用于所有市场和时间框架的交易者。


  **蒂姆·布尔昆：** 彼得，我们首先谈谈你是哪种类型的交易者——是短线交易者还是波段交易者——以及你是如何看待市场的。


  **彼得·布兰特：** 我有点像“混血儿”！很难真正对我的交易方式进行分类，但如果从时间框架来看，我倾向于既是一个波段交易者，也是一个头寸交易者。


  当我建立新头寸时，我是本着半仓波段交易、半仓头寸交易的目的建立的。不过，尽管我身处两个世界，但我并没有为波段交易和头寸交易设立不同的操作程序。当我入场时，我会同时建立波段交易和头寸交易的头寸；只是平仓的方式不同。


  **布尔昆：** 既然你的背景是商品领域，那是你交易最多的市场吗？


  **布兰特：** 是的，可以说我是在场内作为玉米交易员“土生土长”的，因此商品市场是我最得心应手的领域。我喜欢期货市场，并且非常了解它，但我也偶尔会涉足股票和
  ETF。


  我喜欢做空股票市场，所以我做空股票，同时也交易外汇。由于我起步于期货领域，那段经历的一部分涉及外汇期货，我有时仍然交易它们，但我也在现货外汇市场交易货币。


  **布尔昆：** 我喜欢和前任场内交易员聊他们是如何转型电子交易的。对一些人来说，从场内转到屏幕前很艰难。对你来说，这个转型如何？


  **布兰特：** 我的转型出奇地顺利，也许是因为我一开始就希望成为场外交易员！


  我在场内是一个细分领域的交易员，专注于 9 月到 12 月的玉米价差。我深入研究这个价差。我了解铁路、离岸价和驳船费率，也知道托莱多和芝加哥储存了多少谷物。那时我为大陆谷物公司工作，那是我进入这个行业的敲门砖，但即使在那时，我也知道我的目标是成为一名独立交易员。


  与此同时，我观察着所有市场，在 20 世纪 70 年代，我最终涉足了糖厂交易。正是这个契机让我离开场内去交易，并且我再也没有回去过。我顺利完成了转型，因为场外才是我一直想去的地方。


  **布尔昆：** 散户和专业场内交易员之间最大的区别之一似乎是，专业人士会找到一种方法，然后一遍、一遍、又一遍地执行，而散户交易员总在寻找新策略。你仍然认为这种重复的、“一刀切”的方法是交易成功的最佳途径吗？


  **布兰特：** 嗯，我会从两个方面来回答。首先，我认识的每一位成功的交易员，从芝加哥场内最熟练的交易员到最优秀的电子交易员，都有一个自己擅长且深入了解的细分领域。有时他们不善于精确地表达它是什么，但他们已经找到了一种方法来理解市场，并将其与自己的性格和个性特征相结合，这种方法是独一无二的。


  我不知道有哪个成功的交易员仅仅是通过模仿他人的行为而成功的。我认识的每一位成功的交易员都找到了自己的方法。他们这里借鉴一点，那里借鉴一点，从别人那里选取一些想法，但最终会拼凑出属于自己的“拼贴画”，这就是他们运作的方式。


  所以，首先，我认识的每一位成功的交易员，无论场内还是场外，都有一个细分领域。但是，这个细分领域可以改变，也可以调整。


  市场会淘汰某些细分领域，但优秀的交易员会找到方法来调整自己的细分领域，并演变成不同的东西。例如，那些在 20 世纪 70 年代和 80 年代交易成功，但继续沿用完全相同策略的人，无法保持在顶尖水平，并不可避免地会遇到挫折。


  市场在变化，交易员必须识别到这一点，并在变化发生时保持灵活。近年来尤其如此，高频交易和算法交易增加，加上全天候市场、电子交易所和量化世界。


  然而，尽管市场的性质已经改变，但我可以说，在大多数情况下，我现在所处的细分领域和我 1980 年时是一样的。但在这个细分领域内，有一些细微之处——最显著的是资金管理——我随着市场的变化而改变了。


  **布尔昆：** 我们来谈谈那个细分领域。当有人问你“彼得，你是怎么交易的？”时，你是如何描述的？


  **布兰特：** 我是一个纯粹的图表交易员，但因为有很多人都在使用图表交易，这对每个人来说意义都不同。我认同我称之为“经典图表分析原则”的方法，这基本上是由理查德·W·沙巴克在
  20 世纪 30 年代初首次提出，然后被爱德华兹和马吉在其最初于 20 世纪 40 年代出版的著作《股市趋势技术分析》中继承和发展。


  那本书被称为经典图表分析的圣经，对我来说也是如此。我有一本磨损破旧的书，我每天都参考它。我完全是一个经典的图表分析者。


  **布尔昆：** 你能描述一下“经典图表分析”是什么意思吗？模式识别是它的核心吗？


  **布兰特：** 是的。我是一个模式交易者，这在当下已经变得有争议了，因为一些新的量化交易者说经典图表分析不再有效了。现在，我不太确定他们为什么这么说，因为经典图表分析仍然有效。只是它起作用的方式和原因略有不同。




  #### 交易策略与图表分析


  我主要关注周线图。我从未想过要做日内交易者，所以对小时图、五分钟图、分时图或其他日内图表不感兴趣。我的思维没有那么快，因此我使用周线图和月线图进行市场分析和识别广义技术主题，而日线图仅用于市场信号。


  **Bourquin：** “市场信号”是指你如何找到好的入场点吗？


  **Brandt：** 是的，我正在寻找突破点。我不喜欢在形态内部交易形态。我认为这是在市场启动之前亏损并耗尽精力的好方法。


  具体来说，我喜欢在周线图上清晰可见且持续时间至少为十二到十四周的形态，并且我只基于经典信号进行判断。我喜欢矩形形态和具有平坦颈线的头肩形态。我不太喜欢对称三角形，但它们有对角线边界线以及我关注的其他一些形态，因此我会考虑交易对称三角形。


  我讨厌趋势线，并且根本不喜欢交易它们。对我来说，趋势线的突破毫无意义。


  作为一名期货交易者，我通常寻求交易那些我认为每合约能产生约 3000 到 4000 美元甚至更高收益的行情。我对每合约只能波动 300 或 500 美元的市场不感兴趣，因为其中的利润不足以证明风险是合理的。


  我追求的是大幅行情，比如标普指数上涨 100 点，或黄金上涨 50 到 100 美元。不过，在 2011 年，我做了一笔黄金交易，涨了 300 美元。这些大幅行情只能从周线图和月线图中涌现出来。


  **Bourquin：** 你是否认为日线图和日内图表（如小时图和十五分钟图）噪音太大，以至于交易者很难识别并抓住行情中的一大段利润？


  **Brandt：** 噪音太大了，其中很多行情来自高频交易者。在我交易的一些市场中，高频交易在某些日子占据交易量的 50%到 60%。


  我认为市场波动性更大，而日内图表的突破中有更多最终在收盘时未能持续。所以，我根本不关心交易时段内发生了什么。我只关心每日收盘价，因为那是人们必须追加保证金的价格。


  当市场收盘并在正常日间交易结束时产生结算价，这个价格会发送到清算公司。这就是结算价，人们需要据此在隔夜补充保证金。当你只处理收盘价时，你可以过滤掉高频交易者和日内交易者，从而消除大量噪音，实现更清晰的价格发现。


  更进一步说，每周最重要的单一价格是周五收盘价，这就是为什么我不仅关注开盘价或最高价柱状图，还关注收盘价图表。


  我没有太多时间研究 K 线图，尽管它们往往是当今许多交易者关注的热门图表。我也会做一些点数图分析，这非常老派，但我主要对最高/最低价柱状图和收盘价图表感兴趣。我经常通过收盘价以及我认为是正统低点的位置绘制边界线。


  我寻找的是大型形态，我的目标非常简单：在年底，当我回顾我所交易的 40 个左右的市场时，我希望能够挑选出大约 20 个最符合纯粹、经典图表原则的形态——这意味着它们清晰、突破干净利落，并且运行到了目标价位。然后我希望查看我的买入和卖出（`P&S`）数据，确保我至少
  50%的交易都集中在这 20 个形态上，并且我抓住了每个行情中至少 50%的波动。


  **Bourquin：** 因为你在较长的时间框架内交易，你是否需要更加耐心，等待周线图上的形态完全发展后再入场？


  **Brandt：** 是的，我常常在这种张力中挣扎。我是一名主观交易者，而不是系统化交易者，因此，我总是在与自己想在特定的时间参与市场的本能作斗争。


  我认为大多数主观交易者在他们意志薄弱的时刻都会承认，情绪是获取最大利润的真正障碍。我们的情绪往往会告诉我们在错误的时间做错误的事情，而且通常不可信。至少就我而言，我认为我不能相信自己的情绪。


  因为我关注长期图表并交易长期情景，我经常在形态完成前数周甚至数月就看到机会。有一种强烈的冲动想要参与其中，而对我来说，克制自己、提醒自己报酬来自于持仓而非频繁交易，是一场持续的战斗。


  有时需要数周或数月的时间才能形成我感兴趣的大幅价格波动，而要从这些波动中获利，不仅需要有等待形态完成的耐心，还需要有耐心等待市场在交易建立后走完它的过程。然后，你还需要有纪律来设置合适的仓位大小，并运用良好的资金管理规则。


  **Bourquin：** 你在任何时候愿意持有多少仓位？


  **Brandt：** 我并不真正关注在任何给定时间我持有多少仓位。只要我有好的信号，我就会建立交易。


  然而，我倾向于低杠杆交易，我简直无法相信大多数新手交易者使用的杠杆。非常优秀的交易者很少在任何一笔交易中冒超过其资本 1%到 2%的风险，而新手交易者通常冒 3%、4%、5%甚至
  10%的风险。这是结束你交易生涯的一种快速方式。


  我认识很多非常优秀的交易者，他们每次入场交易时都将风险限制在资本的 0.5%甚至 0.25%，而作为一般规则，我处于 1%左右的水平。


  在我们说话的 2012 年 5 月底，今年到目前为止我进行了 29 笔交易，目前持有 6 笔未平仓交易，这并不让我担心。它们可能都对我不利，我最终摆脱它们之前可能会经历
  10%的回撤。


  我确实关注保证金与资本比率，或者保证金与权益比率，试图将其限制在 15%。我很少允许超过 15%的交易资产用于保证金。


  **Bourquin：** 你交易的标准止损区域是多少？


  **Brandt：** 嗯，我专注于美元风险，并将每笔交易限制在我资本的 1%。因此，考虑一个 500 万美元的账户，当我入场时，我在那笔交易上冒的风险不会超过
  5 万美元。实际上，我今天刚刚根据这些规则做空了罗素指数，尽管那笔交易目前对我不利。


  我想在图表上的一个逻辑位置入场，这样我之后可以回顾并识别出完成形态的收盘价。我还想将我的保护性止损设置在一个自然障碍位，在那里我会认为我的分析被证明是错误的，而不是随意使用资金管理止损。


  我也通过这种方式来确定仓位大小：考虑美元风险以及我根据图表本身需要承担的风险。有了这两个数字，我就可以决定交易多少合约。虽然这通常会因市场突破的方式而异，但作为一般规则，在交易标普期货、黄金或大豆等市场时，我每拥有
  10 万到 15 万美元的资本就交易 1 个合约。


  **Bourquin：** 对于你提到的那个罗素指数交易，你在图表上看到了什么形态，以及你是如何确定入场点的？




  **布兰特：** 在罗素指数的交易案例中，我们面对的是一个大约历时十六周形成的头肩顶形态。市场于 5 月 16 日收于颈线下方，确认了该形态。尽管在此之前的几天内，价格曾数次触及该颈线，但由于这些触及发生在日内交易时段，我选择了忽略它们。


  我喜欢看到这些清晰、果断的形态，也青睐具有合适成交量/持仓量特征的交易。我乐于逆主流观点而行，不随大流。此外，我偏好具有水平边界的形态，而非斜向或倾斜的边界。这就是为什么我不特别喜欢交易楔形、对称三角形或趋势线。


  我的大部分交易都发生在活跃交易的最后一两小时，即在市场因结算而短暂收盘之前。在那段时间里，我会观察市场的收盘位置，然后在活跃交易的最后三十到六十秒内采取行动，或者下一个限价单，等市场重新开盘时再执行。


  **布尔昆：** 你是如何为头肩顶形态确定盈利目标的？你是参考之前的区域，并认为交易会在那里完成吗？


  **布兰特：** 我提到的爱德华兹和麦基的书，在如何设定目标方面阐述得相当不错，我将其作为一般性指导原则。其规则是：将形态的高度，向突破方向进行投射，就能对行情波动的幅度做出相当准确的估计。


  这个特定的罗素交易的目标位就在 710 下方不远处，但我不喜欢使用精确的数字，所以我的限价单设在 710 到 720 之间——正如他们所说的，这就是我“奏响收银机”的价格区间。


  **布尔昆：** 那么，当你退出时，即便你认为行情可能还会走得更远，你也会分批退出吗？


  **布兰特：** 事实上，我会这么做，只是之前没有提到这一点。我一直在与一个波段交易者和头寸交易者普遍关心的问题作斗争，那就是：一旦你在交易中获得了可观的利润，你是否愿意看着它变成亏损？


  这是所有交易者都必须考虑的问题，而我决定要两全其美：既不想回吐大部分利润，又想利用持续增长的利润潜力。因此，我通常在开仓后的一两周内，就会平掉一半的头寸，这让我有足够的力量去持有另一半头寸，以捕捉行情可能带给我的全部利润。


  **布尔昆：** 我想回过头来，聊聊你早些时候提到的一个观点，那就是你认为趋势线突破没有价值。能详细谈谈吗？


  **布兰特：** 我并不热衷于趋势线。我认为你给一只猴子图表、一把尺子和一支笔，用不了多久，连它都能画出一条有意义的趋势线！


  从技术上讲，我认为趋势线的突破除了表明市场行为发生了一些变化之外，本身毫无意义。但这种变化可能意味着很多事情。它可能代表着从稳步上涨转为缓慢上涨，或者从上涨转为横盘整理阶段，或者任何其他情况。


  我寻求的是更少的交易理由，而非更多。如果我把趋势线加入我的武器库，那么可能出现的交易机会数量会呈指数级增长。由于我现在正努力将每月交易次数限制在五、六、七次，因此我只使用形态和形态边界来筛选机会。


  现在，我必须对我之前的说法加以限定：如果仅仅是一个单独的趋势线突破，我并不感兴趣。然而，有时趋势线会成为极其重要的技术因素，因为它会与图表上的其他发展相结合。例如，在完成一个形态或构建一个符合更宏观市场前景的场景过程中，趋势线被突破，这种情况我会非常有兴趣。


  **布尔昆：** 很多交易者觉得必须时刻待在市场里，疯狂交易，每天盯着监视器八小时或更久。归根结底，交易是为了赚钱，而你证明了，通过将时间框架放宽到周线图，并且每月只做五到六笔交易，你依然可以过上体面的生活，同时还能减轻压力。这对交易者来说是非常宝贵的经验。


  **布兰特：** 我可以就这个话题继续说下去，蒂姆。回想我开始交易的时候，人们要支付高达 100 万美元才能购买芝加哥期货交易所的席位，这样他们才能进入交易大厅，本质上是在买进卖出。基本上，他们可以拥有买卖价差。虽然今天的市场上仍然存在买卖价差，但它们由高频交易者和算法交易者所掌控，而不是私人投机者——这其中也包括我。


  当我买入时，即使是使用限价单，我也是按卖价买入，而非买价。


  对于活跃交易者来说，买卖价差随着时间的推移会累积成一大笔钱。由于如今他们已经放弃了买卖价差，我认为日内交易者的胜算已经大大降低了。


  在早期的大厅交易时代，不在场内的日内交易者是非常罕见的，因为人们普遍认为，只有能够获得交易所费率、拥有买卖价差的交易所会员才能进行日内交易。否则，胜算对你极其不利。然而，不知何故，我们如今生活在一个一些人认为他们可以随便开始日内交易，并且像自动提款机一样轻松赚钱的世界里。


  我坦然承认，如果我坐着盯着屏幕，看着不同的图表和时间周期，反复审视，我最终会搞砸自己。那会让我赔钱。


  也许这对所有人都不适用，但我知道，对我来说，我做出的交易决策越少，长期来看就越好。在某些个别情况下，快速行动可能有利可图，但从更大数量的交易和更长时间跨度来看，我知道自己应该如何交易——那就是持有头寸，而不是频繁交易它们。


  **布尔昆：** 我完全同意这一点，并且我发现这在我的交易中也是如此。我可能会根据周线图跟进一个需要数周或数月时间形成的交易机会，但如果我看了小时图，并且看到了与我思路相悖的东西，我可能会因此降低对周线图上交易设置质量的评价。因此，从这个角度来看，对于这些长线交易，避开短期图表是明智的。


  **布兰特：** 我相信所谓的“人性的堕落状态”。我认为，凭直觉交易就能成功的交易者极为罕见。也许有一些人能在他们的交易中获利——甚至可能获利丰厚——但我认为这些交易者是例外，而不是常态。


  我曾有过交易者告诉我，当他们持有头寸时会抓狂——当他们空仓时也会抓狂。这种矛盾的想法可能会导致相当严重的亏损。


  对我来说，我认为交易的关键在于风险管理，而非信号生成。截断亏损，让利润奔跑，这是活跃交易中一个老生常谈的格言，但真正做起来却非常困难。


  ---


  **章节**


  **罗伯·威尔逊**




  #### 以海军指挥官般的严格纪律进行交易


  许多兼职交易者会自然而然地运用在正职工作中游刃有余的技能，但其中最引人入胜的或许要数**罗布·威尔逊**——他作为英国皇家海军指挥官的角色要求钢铁般的纪律和严格遵守规程。威尔逊的军事训练让他深刻认识到，在面对通常有限或不完整的信息时，迅速而自信地做出决策至关重要。无论身处海上还是市场，他明白行动时刻的优柔寡断都可能导致灾难性后果。


  只交易`EUR/USD`这一货币对，威尔逊省去了广泛市场调研和分析的必要。他采用超短时间框架和极其严格的风险参数，每天清晨在报到上班前仅交易四小时，就能稳步获取小额利润。他的成功及其对待市场的方式，或许能为任何正在寻找方向、力求在交易与生活其他重要方面取得恰当平衡的新手或兼职交易者带来启发。


  **蒂姆·布尔昆：** 罗布，你有军事背景，关于如何踏入交易领域也有一个有趣的故事。我们先从你的军事训练谈起吧。


  **罗布·威尔逊：** 我十八岁以军官学员身份加入皇家海军。虽然我不会称自己为高中辍学生，但也是与之最接近的了。我勉强以最低资格过关，然后出海，之后就再没真正离开过。二十四年后的今天，我依然在从事这项工作，尽管我即将移居澳大利亚并转入澳大利亚海军。


  我的志向一直是指挥军舰，并在三十四岁时实现了这一目标，指挥了我的第一艘军舰。我于 2009 年离开上一个指挥岗位，当时三十九岁。


  我曾在英国西南部的达特茅斯皇家海军学院学习，职业生涯从在舰桥值班开始。之后我学会了使用雷达和语音电路控制高速喷气机，并在法国海军的“克莱蒙梭”号和“福煦”号航空母舰上度过了两年。之后我返回英国，完成了正规的作战训练，然后再次出海，在一艘军舰上负责作战指挥室，最终为担任指挥职务做好准备。我最初驾驶的是扫雷舰，后来晋升并指挥了一艘驱逐舰。


  **布尔昆：** 你现在还在皇家海军服役吗？


  **威尔逊：** 我仍在服役，不过目前是借调到美国海军，在纽波特的战争学院任教。


  **布尔昆：** 那么，交易这“虫子”是怎么叮上你的呢？


  **威尔逊：** 我父亲当时在交易指数，他介绍我入门。但我想选择一种不同的工具，一种我能真正了解、并且波动性足以让我进行短线交易的工具。我真的很想迎合自己性格中那部分通过海军训练磨练出来的特质。


  正是这让我选择了外汇，并由此结识了罗布·布克，他甚至还曾到我的驱逐舰上和我一起交易。


  我不喜欢在一小时或四小时的时间框架上进行交易，因为我无法产生我想要的那种纪律性。我需要在一个更短的时间框架内交易，这样才更符合我在海军的工作节奏。


  **布尔昆：** 没错。而且因为你显然有全职工作，外汇可能很适合，因为它可以在非工作时间交易。这是最初吸引你的部分原因吗？


  **威尔逊：** 其实不是。真正的原因是，我发现仅在一个货币对上就有足够多的盈利潜力，这就不需要我去做研究和数据挖掘。我可以专注于了解一个货币对的特性，这才是让我选择外汇的真正原因。


  在我们搬到美国之前，我没有机会在白天积极交易。搬到美国后，突然之间，我在美国东部时间凌晨 3 点（伦敦证券交易所开盘时间）到上班时间之间有了交易窗口，我决定就利用这个时间。我会凌晨
  2:30 起床，交易到 7:30，然后去上班——实际上，我现在仍然这样。


  **布尔昆：** 哇。那我们回溯一下。你刚才说罗布·布克曾到驱逐舰上和你一起交易？


  **威尔逊：** 是的，那真是太棒了！事实上，我们当时刚结束一次大修从船坞出来，罗布在船坞和我待了大约三天。然后我们启航，我沿着泰晤士河送他，在河流的源头让他上岸，好让他从那里去伦敦参加一些会议。


  我们让他乘坐一艘快艇直接上岸。令海滩上的游客大为惊讶的是，罗布只是脱掉防水服，走下舰桥，头也不回地走了。真是太棒了！


  **布尔昆：** 太酷了！我认识罗布，已经等不及要和他聊聊这事了。这本身可能就是一次完整的访谈，我应该和他做一次！


  那么，在涉足货币交易后，你最初尝试了哪些方法来寻找好的交易机会？你只关注技术分析吗？


  **威尔逊：** 我从清空图表上的所有指标开始，试图理解——不一定是市场的驱动因素——而是我能在哪里识别出交易机会。当我意识到货币市场和其他市场没什么两样时，我才真正开始取得进步。我在图表上看到价格在哪些点位发生了转向，并且至少对那些因某种原因而存在的普遍情绪提出了质疑。


  然后我开始测试针对这些价格点位的极短线反转交易，我发现可以从中获得非常稳定的利润，这就是我交易方式的起点。


  虽然我用图表，但本质上我是在看到那些关键价格点位甚至刚刚形成反转迹象时就下达市价单。如果价格直接突破这些点位，那我就朝相反方向交易。


  这非常契合我的性格和我在海军学到的做事方式：准备好在当时掌握的最佳信息基础上做出决定，同时也准备好，一旦出现证明我最初判断有误的事件，就立刻扭转决定。


  我喜欢能从错误中获利这个想法，而通过调整杠杆就能做到这一点。通过谨慎的资金或风险管理，你可以在这些点位中的一个投入一笔试探性交易，赚取几个点的利润。


  对我来说，赚取 15 个点，能产生 0.3%的回报，我就很满意了。但如果这笔交易不成功，那么我的进一步目标是从中学习，然后以我现在认为正确的方向进行交易，只是仓位要更大。


  本质上，我的目标是每个交易时段结束时都获得净利润，这就是我努力的全部。只要我每天能赚到超过 0.3%的收益，我就非常满意了。不过，挑战在于要每天都能做到这一点。


  **布尔昆：** 你最终确定在交易中最有效的时间框架是什么？


  **威尔逊：** 嗯，我用十五分钟图和五分钟图来研判整个交易时段，但我实际是在一分钟图上进行交易。


  **布尔昆：** 那么在你每天上班前交易的四个小时里，通常一天能找到多少次交易机会？


  **威尔逊：** 如果我能达到理想状态，应该在六到十次之间。市场中确实有这么大的能量，任何一次波动通常在 15 到 40 个点之间，但这实际上取决于你进入市场时面对的是怎样的市场状况。




  #### 交易策略与市场分析


  有时市场上不会有太多动能或波动性，你等待四个小时的机会可能也不会出现。在其他时候，机会则会多得多。


  关键在于对市场进行画像：如果市场处于趋势行情中，我会使用动态支撑位或阻力位；如果我认为市场处于区间盘整或下跌行情，我更倾向于使用静态或水平支撑位和阻力位进行交易。


  **Bourquin：** “动态”支撑位和阻力位与“静态”的有何不同？


  **Wilson：** 动态支撑位和阻力位是通过移动平均线或布林带等技术指标来确定的——基本上是那些能够动态追踪价格走势的工具。


  关键在于让自己处于这样一种情境：如果交易失败，你能从中了解一些市场情绪。如果你试图在盘整区间的中间位置交易动态支撑位或阻力位，那么你的交易可能会失败，而你实际上对市场情绪一无所知。


  **Bourquin：** 很多在交易的同时还要兼顾工作的交易者，如果交易信号正好在他们交易时段结束时、即将上班前出现，他们往往难以决定该如何操作。你会在离开前平掉所有交易吗？对于这种临结束前出现的交易，你如何决定是否入场？


  **Wilson：** 嗯，我大部分交易的持仓时间最多半小时。到那时，市场就已经证明我是对是错了。所以，只要我至少有 30 分钟的空闲，我就会做这笔交易。但不管发生什么，一旦到了该离开操作终端的时间，我会平掉所有交易的头寸。


  **Bourquin：** 这是一种强制性的自律，无论是及时止损，还是见好就收并放弃获取更多收益的可能性。


  **Wilson：** 没错，我绝不想以一个亏损甚至是一笔赔钱的交易来结束一个交易时段。所以，如果我已经有一两笔盈利的交易在手，我就不会做那最后一笔交易，无论它看起来有多好。


  **Bourquin：** 你有最喜欢关注的几个货币对吗？


  **Wilson：** 我只关注一个货币对——欧元/美元（`EUR/USD`）——这是有原因的：它流动性最强，因此能让我最清晰地透视市场心理，而我认为我交易的实际就是市场心理。


  无论`EUR/USD`的报价是`1.3150`还是`1.4150`，对我来说真的没什么区别。我所做的只是绘制关键的支撑位和阻力位，围绕它们进行交易，如果这些位置被突破，我就有机会调整甚至反转头寸，转向另一个方向。


  这听起来简单得有些荒谬，但我认为其背后的哲学思想相当强大，而且它确实能带来盈利。


  **Bourquin：** 你做的是现货市场，而不是货币期货，对吗？


  **Wilson：** 对。


  **Bourquin：** 那么，对于一笔典型的交易，你通常交易多少单位？


  **Wilson：** 目前，我通常每点交易大约 20 美元。


  **Bourquin：** 既然 1 个基点等于 1 个点，那这基本上就是两个标准合约。


  在确定动态支撑位和阻力位时，你有偏好使用特定类型的布林带或某条移动平均线吗？


  **Wilson：** 我使用标准设置的布林带，也就是 22 期；同时我还使用 62 期指数移动平均线（`EMA`），它在趋势行情中的价格表现似乎很不错。


  **Bourquin：** 我好像没听过多少交易者说他们使用 62 期`EMA`。你是怎么想到用这个参数的？


  **Wilson：** 我直接就用了，因为 Rob 在 1 小时时间框架上使用这个参数，于是我把它应用到 1 分钟图上，看看效果如何。


  **Bourquin：** 你实际上是如何决定入场交易的？你是喜欢看到价格触及某个位置才下订单，还是在价格接近那个区域时就行动？


  **Wilson：** 我会尽量让我的入场时间贴近 K 线收盘的时刻。只要价格没有跌破那条线——只要它正好触及，或者即便只是在附近——我都会入场。只有 K 线收盘价跌破我正在关注的水平，才会使信号失效。


  我还使用参数为 8、3、3 的随机指标（`stochastic`）来辅助判断入场时机，信不信由你，尽管它不是领先指标，但它也能帮助你预测可能出现的背离情况。


  **Bourquin：** 你通常在哪里以及如何设置止损？


  **Wilson：** 有些人可能觉得有点疯狂，但我只给每笔交易 10 个点的空间。我就像用手术刀一样精确地切入市场。


  **Bourquin：** 哇，那必须是立刻就见效啊。止损设置得这么紧，你的胜率是多少？


  **Wilson：** 对于首次交易，我的胜率大约在 60%到 64%之间。


  **Bourquin：** 那么，这个策略相当可靠了。你是双向交易吗，即在顶部做空、在底部做多？


  **Wilson：** 是的，我对方向完全没有偏见。考虑到有利的胜率，并且我实际上只给市场 10 个点的空间，在 15 个点处止盈，这足以让我获得我所寻求的优势。


  **Bourquin：** 即使你觉得行情还有空间继续发展，你也会在 15 个点处止盈吗？例如，如果你在布林带下轨附近做反弹，而这个反弹看起来可能会超过 15
  个点，你会让它继续运行吗？


  **Wilson：** 当然会*，这很大程度上取决于驱动因素的强度。最近有一次，我根据 62 期`EMA`入场，价格启动得非常快，于是我把目标利润扩大到 30
  个点。那波行情最终在回撤前涨到了大约 34 或 40 个点。


  我必须牢记，我是根据 1 分钟图上的信号进行交易，经过大量的回溯测试，我发现盈利交易的平均波幅大约是 30 个点。虽然你并不总能拿到 30 个点，但你几乎总能拿到
  15 个点，这就是我通常在那里止盈的原因。不过，如果市场在上述条件下非常迅速地朝对我有利的方向移动，我当然可能会把止盈设在 15 个点以上。


  为了那个特定的交易信号，我等了整个上午，那是我当天做的唯一一笔交易。我在这笔交易中赚了 30 个点，并且因为我对这个设置相对有信心，恰好是用了双倍仓位进去的。那次交易占了我资金的`1.2%`，我对这个结果非常满意。


  **Bourquin：** 有些人——就像你自己——对自己的职业生涯很满意，并不打算辞职去全职交易，而另一些人则非常希望这么做。你有没有考虑过全职交易，或者你更喜欢现在这种平衡两者的生活方式？


  **Wilson：** 我设想有朝一日可能会全职交易。例如，目前我正在指导一小群人，他们希望达到我现在的水平，我喜欢这种人际接触。


  我决定搬到澳大利亚的原因之一是我可以在晚上交易，并且我对以交易为生的前景持开放态度。在我的职业生涯中，如果幸运的话，可能还有一次出海的机会，但我想在四十多岁的时候变得目标清晰，那个时候我很可能会成为一名全职交易者。不过，目前我喜欢同时做这两件事所带来的多样性和纪律性，我享受现状。


  **Bourquin：** 我欣赏很多人能将职业和交易分开并保持双重生活的方式。我经常告诫那些告诉我他们想辞职去全职交易的人。我认为拥有一份工作和稳定的收入，会让我们不太可能、也减少焦虑地去承担不必要的风险。你同意这个观点吗？


  **Wilson：** 我同意。对我来说，交易是一种娱乐，我喜欢它的低风险，并且它需要纪律性和适应性才能每天坚持不懈。




  我的目标是在权益曲线上实现非常平稳、向上的斜线走势，这确实能减轻压力，因为如果我能每天只赚 0.3%——当然前提是每天都能做到——那么一年下来，权益就能增长 100%。


  相比之下，大型金融机构将 30%的年化回报率视为所谓的“黄金标准”，如果我能超越这个标准，我会非常满意。


  我主要是在努力让自己的交易操作，既能对我本人起到纪律约束作用，又能让那些可能想要我替他们管理资金的人，觉得我看起来相对有吸引力且行事专业。


  **Bourquin：** 那么，你现在也在为其他人管理资金吗？


  **Wilson：** 是的，我在做。我在美国国家期货协会（NFA）注册，是一名注册商品交易顾问（CTA）。


  **Bourquin：** 你会从这些管理账户中提取资金来支付给自己吗？或者，因为你有一份职业，你是选择将利润再投资，让它持续增长，从而不断扩充你的账户吗？


  **Wilson：** 所有的管理费都在每个月末提取出来，我只是让这些钱在账户之外累积。这感觉挺专业的，就像在给自己发薪水，而且我不会把这些钱再投入交易账户。这只是一笔额外的收入。


  **Bourquin：** 许多交易者都渴望管理资金，并赚取类似的管理费来补充现有收入。对于那些正在考虑这件事的交易者，你有什么建议吗？在这个过程中，你有没有学到什么特别宝贵的经验？


  **Wilson：** 需要牢记的最重要一点是，没有人会把辛苦赚来的资本托付给你，然后指望你在一年内让它翻倍。他们承受不起的是你把它亏掉。


  因此，我的建议是专注于你的权益曲线。尽可能降低波动性，如果这意味着要缩小交易规模，那你就应该这么做。


  例如，我的一个学生，当时在交易一个 1 万美元的账户，他不明白为什么自己的账户波动这么大。每周都有 40%或 50%的波动幅度，虽然他对此感到不舒服，但他也渐渐学着去接受了。我向他指出，当他处理的金额是他能够理解并且实际能接触到的时候，这倒没什么问题；但如果一个拥有
  100 万美元的人请他管理那笔钱，突然间，他将要交易的金额是他以前从未设想过的，而这些剧烈的波动对他来说以及对他的客户来说，就完全无法接受了。


  没有哪个认真的投资者指望你能在一夜之间让他们变成百万富翁。没有其他人能做到，凭什么你就能呢？然而，他们无法承受的是资金回撤。所以，我给那些想成为资金管理者的人的建议是，仔细审视波动性，并把它处理好，这样你的权益曲线就能朝着正确的方向，以平稳、审慎的节奏运行。


  **Bourquin：** 即使对那些不管理客户资金的人来说，这也是一个好建议。问问自己：“我用别人的钱来承担同样的风险，我会感到舒服吗？”这可以作为衡量你自己承担了多少风险的一个好标准。如果你的答案是“不会”，那么这就是你需要立刻解决的问题。


  **Wilson：** 绝对同意。外汇教育市场在这方面也难辞其咎，因为它试图让人们相信他们真的可以快速致富。这既荒谬又极其不诚实，因为它掩盖了一个事实：外汇交易者正在一场零和博弈中与一些非常聪明的头脑对抗。


  为什么任何一个坐在家里电脑前的人，就应该能够挑战华尔街那些最聪明、拥有所有可用资源的交易员，并指望能持续胜出？这是完全不现实的，但这就是人们被告知的情况，这就是为什么你会看到人们拿自己的本金去冒一些荒谬的风险。


  如果你真的希望把交易当成你的事业，那么你就应该像对待事业一样对待它，例如，向自己证明，你可以尊重账户里的 1000 美元，并限制波动性的不利影响。没有人会对时不时出现的向上尖峰感兴趣，如果那个尖峰伴随着同样陡峭的向下尖峰的话。那是不专业的，而且在某个阶段，你肯定会把那个账户亏光。也许不是这周或这个月，但它迟早会发生，因为你无法控制波动性。


  然而，如果你能尊重 1000 美元，并在两年内把它增长到 2000 美元，那么，突然间，你就真的在创造一条稳定的权益曲线了。这样一来，你就有能力吸引那些拥有资金可以投资的人，并向他们证明，你尊重风险，并准备好以专业的方式开展业务。


  **Bourquin：** 说得很好。然而，当很多人想到要在两年内把 1000 美元变成 2000 美元时，这感觉可能太慢了，令人痛苦。


  **Wilson：** 嗯，听我说，两年内把 1000 美元变成 2000 美元，年化回报率仍然是 50%，而且当你复利计算时，你远远超过了机构市场的黄金标准。


  **Bourquin：** 没错，毫无疑问。这也引出了关于保证金的概念。那么，你在交易时使用保证金吗？


  **Wilson：** 我使用一点点保证金，我的交易对手方就在交易的另一边。但我发现，任何人抱怨“只有”50:1 的最大杠杆都很可笑，因为在 50:1 的杠杆下，你很快就能把自己搞垮。


  **Bourquin：** 即使在 4:1 的杠杆下也能搞垮自己。当 NFA 将美国的最高杠杆降至 50:1 时，有很多怨言，但真正了解使用杠杆风险的交易者并没有抱怨。


  **Wilson：** 完全正确。我每笔交易的最大风险大约是 1%，但那会是第三或第四层加仓。我的初始风险是 0.2%，并且在整个交易时段内可能都不会改变。


  **Bourquin：** 我想问你一个关于新闻和数据发布的问题，无论是美国非农就业报告（NFP），还是美联储或欧洲央行（ECB）的利率决议。你会关注新闻吗？它如何影响你的交易？


  **Wilson：** 我关注这些公告发布的时间，因为我知道这可能会激发市场波动。我不在乎最终的数据是什么，我当然不会在数据发布前进行交易。我只会在市场对数据做出反应后才交易。


  **Bourquin：** 那么，当你已知某个经济公告即将发布时，你是会持有一个仓位，还是选择平仓？


  **Wilson：** 在这些时候，我倾向于空仓。不过，我和 Rob 最近一起交易了一次 NFP 报告，我在新闻发布大约 20 分钟后，因为市场流动性薄且我们处在一个阻力位，所以下了一笔逆势单。一旦点差回落，那时就可以交易了，但我当然不会试图去交易新闻本身。


  **Bourquin：** 所以，即使你在 62 周期 EMA 上看到了一个很好的入场形态，但如果你知道一个能影响市场的经济公告将在几分钟后发布，你很可能会避开那次交易，等到看后续情况再说？


  **Wilson：** 是的，我在主要经济数据发布时会极度防守，因为我们都知道，新闻可以——而且经常——完全改变市场中占主导地位的情绪。


  **Bourquin：** 最后，Rob，对于正在苦苦挣扎、无法持续稳定盈利的交易者，你有什么建议？




  **威尔逊：** 我给陷入困境的交易者的建议是，专注于学会把一件事做好。对我来说，这意味着将我的焦点限制在一个品种上，并承诺在每个交易日固定的时间段内交易它。随着时间的推移，你将开始理解如何识别最高概率的交易设置，该给它们多大的空间，以及预期入场后的走势可能是什么。这个过程将为你注入自律、专注和果断的品质，这些品质是所有成功的市场操作者所共有的，同时也会强化你的正向预期和自信。突然间，你不再挣扎了。一条正向的权益曲线已经建立。


  ## 章节


  ### 约翰·卡特


  *凭借其市场专业知识赢得全球声誉，* **约翰·卡特** *是*《精通交易》*（麦格劳-希尔，2012 年）的作者，他是电视和行业交易展会的中坚力量，订阅者每天在*
  [TradeTheMarkets.com](http://TradeTheMarkets.com) *和* [SimplerOptions.com](http://SimplerOptions.com)
  *关注他的见解和分析。然而，卡特或许同样以其对其职业生涯中经历的许多激动人心的成功——以及几个难忘的失误——的坦诚叙述而闻名。他主要使用一种简单的技术方法来交易期权，并且在过去
  20 年里，尽管经历了互联网泡沫以及 vastly 不同的市场和经济状况，他成功地保持了稳定并日益盈利。卡特的故事既鼓舞人心又富有娱乐性，其中包含清晰的要点，可以帮助新交易者养成专业的习惯，并激励有经验的交易者重新聚焦于真正有效的方法——并摒弃无效的。*


  **蒂姆·布尔昆：** 约翰，让我们从头开始，谈谈你是如何最初涉足交易的。


  **约翰·卡特：** 嗯，我的继父兰斯是摩根士丹利的经纪人，当时我还在上高中，暑假在商场打工，每小时挣大约 4.25 美元。我记得我工作了三个月，攒了大约 1000
  美元。


  一个星期天，我回到家，我的继父和他的朋友们围坐在桌旁，看着《投资者商业日报》，讨论他们那个星期如何通过买入英特尔股票的看涨期权来赚钱。我完全不知道他们在说什么。


  我们达成了一个协议，他们会先借给我那 1000 美元，因为显然我在前一天晚上没有时间开户。如果我们赚钱了，我就保留利润；但如果亏了，我就欠他们那笔钱。


  他们不能向我保证这笔交易一定能赚钱，我犹豫再三才决定去做，但他们那个星期一以 1 美元的价格买入了英特尔的看涨期权，并在星期四以 1.8 美元的价格卖出，让我在这个过程中赚了
  800 美元。


  之后，我想着，我每周工作 40 小时，连续干了三个月才赚了 1000 美元——然后几乎什么都没做就赚了 800 美元。从那时起，我就被迷住了，知道交易就是我想做的事情。


  **布尔昆：** 你认为这对人们来说，有时可能恰恰是最糟糕的事情吗？这就是人们如何开始认为交易很容易，并期望他们可以一头扎进去，然后开始赚钱。


  **卡特：** 嗯，说得有道理，因为确实存在新手运气的问题。但对我来说，我认为那定下了基调，因为我实际上并没有操作或管理那次交易。那只是我在市场的第一次经历，因为它如此积极，我看到了机会所在。但他们也很清楚地告诉我，我同样可能很容易就亏钱。


  大概一个月后，我有了一个存入资金的账户，并开始做交易。但是，要花多长时间才能在交易中变得稳定，这完全是另一个故事了。


  我只是找到了最初的火花，知道这件事并不容易，否则每个人都会去做。当然，有时候你会过于自信，形势会对你不利，但第一笔交易确实是触发点，让我觉得交易是我可以终生从事的事情。


  **布尔昆：** 那之后你上大学了吗？


  **卡特：** 是的，我上了大学。大学毕业后，我毫无做经纪人的意愿，所以我成了一名金融分析师，并一直进行交易。


  我在整个大学期间也一直在交易。当时和我约会的女孩有大约 15000 美元的学生贷款，学校会提前把钱发给她。我拿了其中一部分钱，投到了一只叫 Iomega 的股票上，让她的账户资金翻了三倍。那个女孩后来嫁给了我！


  **布尔昆：** 真有趣。不过，我不知道这在贷款文件里是否允许！


  **卡特：** 不允许。绝对不允许那么做，但那时候的交易和现在截然不同。那时更多的是买入某样东西并持有六到八周，那很有趣。


  **布尔昆：** 那之后交易成了你暑假的工作，还是你实际上找了别的工作？


  **卡特：** 我整个大学期间都在交易，而且我交易期权相当活跃。后来，我去做金融分析师时，进行波段交易，每天关注市场。我专注于零售行业，关注像 Kmart、沃尔玛和
  Target 这样的公司，并且实际上会去门店协助盘点库存。那才是我真正深入了解业务的开始。


  **布尔昆：** 那么，你当时是为哪家公司做分析师？


  **卡特：** 是一家总部在达拉斯的小型精品公司，但后来被收购了，现在我相信它是某家加拿大公司的一部分。我们有一个大约 20 人的团队，主要关注零售业。我们实际上对这些公司本身进行财务分析，但同时也为像
  Target 和沃尔玛这样的零售商提供库存和其他服务。


  **布尔昆：** 这很有趣。我之前不知道你做过分析师。像库存这样的基本指标知识，对作为交易者的你有帮助吗？


  **卡特：** 没有直接帮助，但确实有助于观察行业趋势，这很有价值。例如，公司库存结构的变化或其它提高运营效率的改变，可能会在三个月后反映在公司的股价上。


  我骨子里更像一个技术派，但在看到某些行为如何能够实际影响收益——或者足够影响人们的看法以至于股价因此受到影响之后，我喜欢稍微关注一下基本面。


  **布尔昆：** 你被允许在分析这些股票的同时交易它们吗？


  **卡特：** 没有规定说你不能，但我想我是唯一一个活跃交易的人。有些人在管理 401(k)退休账户，但那里并不是我们今天所知道的完整的交易台。很多其他分析师要么不交易，要么更专注于为零售商提供服务。


  **布尔昆：** 是什么让你辞掉那份工作，转而专注于自己的交易？


  **卡特：** 那其实是一份好工作，也是一家好公司，但我记得有天早上开车的时候想：“如果五年后我还在开着这该死的车上下班做着同样的工作，那我就做错了什么。”


  我真的很想逼自己一把，去冒个险，追求我成为交易员的梦想。太多人有天醒来，突然意识到自己已经四十或四十五岁了，却还在做同样的工作。我对这一点非常清醒。


  我不知道促使我决定辞职的具体触发点是什么，我记得离开那份工作实际上非常困难，因为我喜欢它，并且是团队的一员。那种情况是我可以一边交易，一边还有固定薪水入账，但我相信我已经到了一个必须做出选择的节点——而我做出了选择。




  **Bourquin:** 当你提交辞呈时，他们强烈挽留。他们并未生气，而是希望你留下，甚至愿意提供晋升和迁居到国内其他地区的机会来留住你。听到这话，你犹豫了几周，但最终坚持了自己的决定，显然你一点也不后悔。那一步迈得很好，但当时做出这个决定确实非常艰难。


  **Carter:** 对，放弃有保障的收入，转而投入毫无保障的全职交易，是非常重大的一步。你还记得你是在哪一年做出这个转变的吗？


  **Bourquin:** 大约是 1997 年。


  **Carter:** 那是在整个互联网泡沫出现之前。我们聊聊你开始独立交易的头几天吧。感觉怎么样？


  **Bourquin:** 有点紧张。我记得第一天就亏了钱，部分原因是我过度兴奋了。我坐在电脑前，面前就开着`CNBC`，我以为自己能对新闻做出即时反应，但就是行不通。


  实际上，头几个星期相当难熬，所以我退后一步，重新专注于之前确实有效的方法，也就是以期权为中心的波段交易。


  从那时起，挑战在于如何在交易的同时学会这样做，因为以前，我下了单就去上班，所以不会每天盯着图表看。成为全职交易者的一个重要部分，就是学会不让不可避免的情绪搅乱你的交易。


  **Carter:** 没错。在这种情况下，交易者很容易在交易进行时开始摆弄止损或止盈目标。我发现，当我下了单之后离开电脑，反而赚得更多。


  那么，你一开始是做期权。从那时起，你是从期权转向了其他品种，还是仍然交易期权？


  **Bourquin:** 我整个交易生涯都专注于期权，但我也交易一些股票和期货。主要是，如果我做日内交易，我会专注于期货。但如果我建立一个计划持有更长时间的交易——哪怕只是两三天——我就会用期权。


  **Carter:** 在你转向全职交易之前，你是否先希望在账户里积累一定数额的资金？


  **Bourquin:** 是的，这是一个痛苦的故事。我当时认为 10 万到 20 万美元是我的理想数字，并且一度确实达到了 15 万美元。那是经历了很多起伏，赚了很多钱又都亏回去之后的结果。


  那一次，我有 15 万美元，并且保持了大约六个月。每周结束时，我都会取出利润。如果是 2000 美元，我就取出来；如果是 1 万美元，我也取出来。如果我有一周表现不佳并亏了钱，那么我必须先交易回
  15 万美元，然后才能再次开始取出利润。


  我当时状态很好，而且我和未婚妻住在明尼苏达州，因为我在公司内部得到了晋升。那是一月份，我们被困在公寓里，外面大概零下八十度，我的未婚妻，她以前从未见过雪，对我说：“伙计，如果你不给我们弄一栋带暖车库的房子，我就走人！”


  于是，我找到了一栋带暖车库的房子，并决定支付 3 万美元的首付。这笔钱必须从我的交易账户里出，因为那时，我把大部分交易利润都用来收集老硬币了。即使到今天，我仍然是个狂热收藏家，但我买的是旧银元或金币，它们流动性不强。你必须持有它们好几年，即便如此，买卖价差也相当大。事后看来，那并不是最好的投资。


  就在我打算从交易账户里取出那笔钱的大约一周前，我坐在那里思考这件事，决定做几笔激进的交易，把我的账户做到 18 万美元。这样，我就可以从账户里取出 3 万美元，同时还能保留
  15 万美元的余额。


  我只有一个星期的时间，第二天，我看到股市上涨到了一个非常关键的压力位，于是我买了一些`OEX`期权，并把账户里一半的资金都投入了这笔交易。嗯，它马上就见效了，我在五分钟内就赚了大约
  8000 美元！我当时想：“太好了，这事很快就能搞定了。”


  然后市场再次飙升，而期权价格跌到了 7.50 美元。因为我第一批是以 8 美元买入的，我想：“哇，这价格真不错”，于是又买了 100 份，并打算就此退出交易。我交易的时间已经够长了，知道如果这笔交易在收盘时对我不利，我就会离场，甚至不考虑持仓过夜。


  收盘时，我赚了大约 1 万到 1.1 万美元，我想：“太好了，只要开盘能稍微好一点，我就离场，钱就到手了。” 结果，第二天早上，道琼斯指数跳空高开 150 点，然后整天横盘整理。它收盘时创下了历史最高点，在接下来的四天里，市场猛烈上涨。我几乎不记得那四天了，但感觉糟透了。


  我只记得，突然间，就到了我们本应为房子过户的前一天，我需要钱，所以我不得不打电话给经纪商，平掉了那笔交易。我的账户从 15 万美元跌到了大约 8000 美元。期权价格从大约
  8 美元跌到了 70 美分。太惨烈了。几乎整个账户都亏光了。


  在那个时候，我绝不可能告诉我未婚妻我做了什么，于是我去了银行，刷爆了所有信用卡，刚好凑够了首付，我们最终买下了那栋房子。但那是一件非常严重的事情，真的让我开始反思。


  幸运的是，我积累了一些硬币，也买了一些房产，所以我能够变现一些资产，为另一个交易账户注资，但我真的必须坐下来问问自己：“你到底在干什么？” 那是一次痛彻心扉的经历，因为在我非常需要钱的时候，我亏掉了它。


  **Carter:** 哇，所以这基本上是一个价值 14.2 万美元的教训，告诉你为什么永远不要在亏损的交易上加仓，或者不设置止损。在那之后，你就成为一名日内交易者了吗？


  **Bourquin:** 令人惊讶的是，没有。我认识到，在那个特定情况下，我交易只是为了赚 3 万美元来付房款。我并没有像应该做的那样去交易交易设置。所以，给我的教训不是要害怕市场，也不是我不应该持仓过夜。教训就是，要始终保持专注，只交易交易设置。


  你不能坐在那里，试图从市场中榨取特定数额的钱。如果你这样做了，就可能会犯那种错误。


  如果当时我做那笔`OEX`交易时只开 10 张合约，即使走势对我不利，我也只会被止损出局，那也没关系。但相反，我试图赚 3 万美元，这是我压倒一切的考虑。这也正是毁掉一切的原因。


  即使经历了那次事件，我的交易风格也完全没有改变。但我绝对明白了，你不能坐在那里，试图从市场中提取特定数额的钱。


  **Bourquin:** 你会对那些进入市场，甚至设定每天只赚 100 美元目标的人说，他们的方法错了吗？


  **Carter:** 是的。它行不通的原因是你不会把它看作每天 100 美元。人们开始把这个数字推演到一年。他们说：“好吧，我只想每天赚 100 美元，或者每天赚
  500 美元”，然后他们就想：“哇，那一年就是 10 万美元！” 突然间，他们想着每年 10 万美元，当他们遇到一笔正在亏损的交易时，这真的会搞砸他们。




  ### 排版后的文本


  你可以有所期待，因为这是你控制风险的方式。但你绝不能坐在那里说：“我*要*在市场上每天赚`$100`”，因为总会有赚不到的日子。这种想法实际上也可能限制你，因为有时一笔交易中，仅仅通过移动止损就能让你当天赚到`$1,000`。


  事实上，我认为最好的做法是进入市场时，清楚自己将承担多大风险，而不抱有任何收益预期。对我来说，这才是最好的心态。


  **Bourquin：** 听起来，在那次经历之后，你卖掉了一些资产来补充交易账户，然后重新开始。


  **Carter：** 是的。我实际上休假了大约四到五个月，然后偶然读到了马克·道格拉斯（Mark Douglas）的著作《交易心理分析》（The Disciplined
  Trader，纽约金融学院出版社，1990 年），这本书帮了我大忙。我和我的经纪人谈过，最后我跑去坐在一位有二十年经验的老牌交易员身边，观察了大约一周，并和他建立了友谊。在那一刻，我意识到我可以做到。我之前只是犯了一个愚蠢的错误，我发誓不会再犯。


  我卖掉了两处房产和一些硬币，因为我不想从`$10,000`开始，再一点点积累。我重新投入了`$75,000`的本金，这足够了，那时我的目标就是再交易一年左右。我把账户又赚回了大约`$150,000`的水平，就在那时，我辞掉了工作，成为全职交易员。


  我妻子那时也在工作，而且工作不错，所以对我来说，这是一个经过精心计算的好风险。当然，最坏的情况是这条路走不通，那我总能再找一份工作，尽管那肯定不是我想要的。


  **Bourquin：** 这大概正好是互联网和科技股开始飙升的时期吧。那段时间你赚钱了吗？


  **Carter：** 这很有趣，因为我当时真的不知道存在互联网泡沫。我只是做我的交易。但我坐在那里，买入雅虎的看涨期权，股价会瞬间飙升`$30`一股，期权价格自然就翻了五倍。


  基于过往经验，我对整件事非常不信任，虽然我没有冲进去做空，但也不是特别激进。我记得我的怀疑态度实际上让我错过了一些惊人的行情，但与此同时，我也非常平稳地度过了那次崩盘。


  **Bourquin：** 没错。有一件事我还没问你，这通常是个有趣的话题：当你离开那份稳定的六位数收入工作去全职交易时，你的配偶有什么反应？


  **Carter：** 她表现很好，虽然有点紧张，但她也有过我把她的学生贷款拿去交易并帮她赚了更多钱的经历。


  不过，她的家人总是强调要找份好工作，所以我想这就是她担心的原因。在她内心深处，她可能觉得我只是试一年，之后就会回去再找份工作。


  **Bourquin：** 除了金钱之外，你当时用什么来衡量自己作为交易员的成功，并确保持续进步呢？


  **Carter：** 我设立了俩个账户，因为交易很大程度上在于将回撤控制在最低限度。我的目标是让一个账户保持在稳定的水平，比如`$150,000`，我的目标很简单，就是每周从中提取利润。如果我亏钱了，那么我的目标就变成了交易，把账户重新做到可以再次提取利润的水平。


  我非常清醒，绝不想再让自己陷入大坑。但在一个大账户里做小规模交易感觉很棒，因为有很大的灵活性——不是因为我可以通过重仓让账户翻倍，而是因为如果某个仓位迅速朝着对我不利的方向发展，我有额外的缓冲空间。


  例如，如果我买了十份期权合约，而仓位立刻遭受重创，这给了我再买十份的灵活性。我有时会这样做，然后寻找一个`38.2%`的斐波那契回撤反弹点，以更小的亏损离场——甚至可能在那笔交易上回到盈亏平衡点。


  然而，我衡量成功的标准是能够从第一个账户中提取资金，而我的另一个账户则严格用于波段交易。我不想从那个账户里取钱，只是通过股票交易和其我交易来稳步增值。那只是个追求稳定增长的账户，目标是尽量减少回撤，其中一部分意味着要适时休息，不要一直盯着图表。


  **Bourquin：** 你的朋友和家人对你的交易生活方式怎么看？是不是有很多人问你具体在做什么，以及你能不能教他们？


  **Carter：** 是的，人们会期望坐下来学三天就能掌握一切。但我知道对于新交易员来说这是一条多么艰难的路，所以我实际上试图劝阻他们，或者至少告诉他们需要经历五年的起起伏伏才能学会交易，你不能辞职了就开始靠交易赚钱。


  **Bourquin：** 我们来谈谈技术分析、斐波那契数列以及其些工具吧，然后讲讲你如何在日常交易中开始使用它们的。


  **Carter：** 我今天使用的一个主要工具叫做“挤压指标”（the squeeze），它是衡量布林带（Bollinger Bands）与肯特纳通道（Keltner
  Channels）之间关系的指标。我发现它提供了关于一只股票的许多极其有用的信息，所以我非常喜欢它。本质上，它衡量的是市场的波动性——或者说波动性的缺失。


  对于大多数市场，无论你看什么时间框架，有时它们很平静，有时又极度波动。我一开始犯的错误是寻找波动大的市场，然后一头扎进去。但我最终意识到，如果我在这些市场平静时入场，然后在它们变得波动时卖给像我一样的人，我就能以此为生。直到今天，我基本上还是这样做的。我知道当一个市场突然爆发并剧烈波动时，会有很多人涌入，而我则很乐意把我的头寸交给他们。


  **Bourquin：** 你是通过读书学习的技术分析，还是更多靠试错？


  **Carter：** 我读过一些书，但我认为学习技术分析很像学习打高尔夫球。如果你从没拿起过球杆，你可以去读十本关于如何击球的最佳书籍。但当你最终尝试击球时，你仍然会表现得很糟糕！你不可能通过读书学会如何击打高尔夫球，我认为技术分析和交易也是如此。


  我最喜欢的书之一是尼古拉斯·达瓦斯（Nicholas Darvas）的《我如何在股市赚了 200 万》（How I Made $2,000,000 in the
  Stock Market，BN Publishing，2007 年），因为这本书在何时坚持一个仓位、何时不坚持方面，真的让我深有感触，引起了我的共鸣。我遇到的其他很多书似乎只是相同内容的不同翻版，虽然我可以研读它们并得到一些想法，但没有什么能改变我的生活或带来本质变化。


  我认为学习技术分析和交易，就是要多和其它交易员交流并不断尝试，讽刺的是，你实际上并不需要太多东西。我以前听过一种说法：你可以只选择一个市场、一个时间框架和一个指标，仅凭这些，你就能在三个月内找到谋生之道。我真的相信这是真的。


  在交易中，你不想成为所有交易的全能者。你只需要选择几个你擅长的领域并专注于它们。这非常有益，因为你熟悉了交易形态，熟悉了时间框架，你就成为了那个市场领域的专家。你不需要了解市场上存在的其它一切。



  **布尔昆：** 最近和某人聊天时，他对我说，如果大多数交易者能坚持自己已经掌握的方法——而不是试图在各类市场、指标、图表或时间框架之间来回跳跃——他们最终很可能赚到钱。


  问题在于，当他们尝试了几笔交易却没赚到钱时，就会转向其他东西，接着又是另一个，又一个……你是否同意，如果大多数人只专注于精通一件事，他们最终就能成功？


  **卡特：** 当然同意，我也正是这么认为的。实际情况就是如此。他们就像不停地追逐下一个闪闪发光的新事物，却没有先建立自己的交易哲学基础，也不清楚自己到底想做什么。


  其实，仅凭一条二十一周期移动平均线这样简单的工具，你就能谋生。你可以用它在五个不同的市场上观察，这完全没问题。然而，如果你用某个方法赚不到钱，然后试图在别的市场如法炮制，猜猜会怎样？你在那里同样赚不到钱。


  **布尔昆：** 考虑到互联网泡沫崩盘等因素，过去八九年里，你的交易方法有没有发生很大变化？还是说，你仍然沿用着大部分同样的策略？


  **卡特：** 天哪，这是个好问题。基于市场本身的性质，方法并没有太大变化，尽管我们没再经历像上世纪九十年代那样的大牛市。不过，我发现我持仓的时间没那么长了。现在，我觉得六周在交易中就算很长了，再往后就属于更短期的交易了。此外，我现在更积极地止盈离场。


  随着时间的推移，我发现我其实不太在意自己交易的是什么品种了。我不会想：“嗯，我看涨原油，所以我要买入获利。” 关键在于寻找从市场中获利的机会，而这很大程度上取决于你所见到的行情。例如，如果我看到一个市场急剧下跌，我知道很可能有很多人正在被洗出局。我会寻找那里的机会，抓住它，然后离场。我可以告诉你，我日内交易时大约有
  75%的时间是空仓的，只是在等待。


  **布尔昆：** 我们来谈谈你会执行的一笔常规交易。什么因素会促使你进行这笔交易？


  **卡特：** 我最近在万事达卡上做了一笔教科书式的交易，我真的非常喜欢。我会寻找股票，比如在财报或其他新闻公布之后。万事达卡在财报后跳空高开并创出高点，然后开始回调。那时，我就在等待该股掉头向上，试图再次测试并突破近期高点。


  我一直等到该股开始转向走高，然后开始分批建仓。之后，我寻找从财报后近期高点至回调低点这一波行情的 127.2%斐波那契扩展位。在这个例子中，这大约是一个 3 到
  4 美元的波动，而对我来说，这就是一笔稳定盈利的交易。


  接下来发生的是，我买入并隔夜持仓，第二天，股价推高，突破了前一日的高点，一路涨到那个 127.2%扩展位，我就在那里离场了。后来它其实又涨了十个点，但那就是我设定的形态和目标位，所以我很乐意放弃后面多余的利润。


  同样的策略既适用于上涨也适用于下跌，我之所以喜欢它，是因为你不用一直坐着，持仓好几天，心里还琢磨着它会往哪儿走。你有明确的入场形态和明确的目标，只需要决定用多少合约来交易就行了。


  **布尔昆：** 你会纯粹因为技术形态而交易一只股票吗？即使你完全不了解这家公司是做什么的，他们的财报如何，以及其他基本面因素怎么样？


  **卡特：** 这是个好问题，但我很难回答，因为我交易的股票大部分我都不陌生。说实话，我重点关注的主要股票包括苹果、谷歌、Priceline，以及其他交易非常活跃、走势迅猛、期权流动性充足的股票。


  我想，在过去，股票是什么并不重要，但我现在不会在盘中筛选，只为了找出当天创下新高的股票或其他类似的东西。我关注的股票池只有大约十只，而且我对它们已经非常熟悉了。我观察它们的小时图、十五分钟图和五分钟图，仅在这个范围内就有很多机会。


  **布尔昆：** 你是在家里交易还是在办公室？


  **卡特：** 我有一个办公室。我在家交易过一段时间，后来我妻子得了种奇怪的“病”——开始生孩子了！我们现在有三个小孩，分别是六岁、四岁和两岁。我其实喜欢在家工作，有时候还怀念那段日子，但我发现，加上孩子们在屋里跑来跑去的吵闹，很难进行交易。


  现在我有三套公寓，离家只有四英里，其中一套我用来交易。另外两套用来运营我们的网站：[TradeTheMarkets.com](http://TradeTheMarkets.com)
  和 [SimplerOptions.com](http://SimplerOptions.com)。我们目前雇佣了一个大约十人的团队，他们负责网站维护、客户服务，还有几个帮我分析交易。


  不过，大多数情况下，我都是自己独立交易我的账户，并与他人合作进行一些联合项目——我们共同操作一个账户，这种组合很不错。作为一名交易员，不仅有独立操作自己账户的自由，同时还能与他人合作共事，这是很有价值的。而且，这也很有趣。


  **布尔昆：** 说到交易的业务层面，你有没有考虑过管理资金？


  **卡特：** 你问得真巧，因为我实际上刚刚启动了一隻商品交易顾问基金，叫做 Razor Trading，同时还推出了一项期权自动交易服务。就我个人而言，我不介意在自己的账户上承担大量风险，尽管投资者一开始总会说，尽管为他们照做不误，但他们一看到首次回撤就会开始恐慌。所以，你真的必须预料到这一点，并准备好应对随之而来的所有电话和邮件。


  然而，当我想到外面有多少人的钱放在银行里收益率为零时，它其实不需要是一个非常庞大的基金。即使是一个每年赚取 20%的小基金，对于那些投资者来说也是有价值的服务，而且从商业角度来看，也是一个不错的额外收入来源。


  **布尔昆：** 让我们再回到你的交易方法上，你晚上会做功课吗？在非交易时段，你花了多少时间做与交易相关的事情？


  **卡特：** 少得惊人。我过去常常花好几个小时看图表，但现在我每天收盘后只花大约 45 分钟——很多时候，我会把这段时间录下来，作为晚间新闻简报的一部分。


  我发现，回报与你盯着图表的时间并不成正比，这很奇怪，因为传统观点认为，你做的研究越多，赚的钱就越多。但在交易中，这并不成立。


  真正成立的是，那些以开放心态、不带预期进入市场的人，更有机会赚钱。我认为，拥有这种心态更为重要，所以我总是提倡锻炼以及其他远离市场的活动，这样你才能带着休息好、放松的状态回来，随时准备开始交易，可以这么说。



  **Bourquin：** 此前，你提到新交易员需要五年的学习曲线，但你自己花了多久才对自己的策略、方法以及作为交易员的能力建立起足够信心，从而能持续稳定盈利？


  **Carter：** 我大概花了五年多的时间。有些东西是书本上学不到的，必须亲身经历。就像人们说的，你得“被踢到牙齿”，得遇到一些计划外的状况。关键在于，面对这一切时，不能变得过于谨慎，因为过于谨慎比过于勇敢更糟糕。谨慎与勇气之间的那条微妙界线，才是交易员最理想的心态。


  **Bourquin：** 你现在还会经历交易低谷吗？


  **Carter：** 当然会，而且每当我遇到低谷，就意味着要么出了什么严重的问题，要么是生活中的外部因素在影响我。


  2011 年我做的最糟糕的一笔交易，就在我登机外出一两周之前。在那之前的六个月我做得很好，但那一次，我粗心了。当你疏于打理花园时，杂草就会丛生，交易也是如此。


  也许有时候那些交易结果还不错，但一旦我发现自己对交易有点过于漫不经心，我就必须收敛回来，保持自律。做交易时，你始终要对市场保持一种健康的纪律、健康的畏惧和健康的尊重。


  **Bourquin：** 早年那次亏损 14.2 万美元是你职业生涯中最大的一笔亏损吗？


  **Carter：** 自那以后我的账户规模增长了很多，所以实际的美元亏损额其实更大。但从百分比来看，我再也没有像那次一样，在如此巨大且恶劣的行情中站在错误的一方。


  **Bourquin：** 那么你做过的最棒的一笔交易呢？那次赚了多少？


  **Carter：** 嗯，我单日赚得最多的一次是做高盛的期权交易。那天最终盈利大约 25 万美元。


  那天美国证券交易委员会（SEC）发布了一则消息，股价每股下跌了约 20 美元。我看到了，就开始大量买入期权。有那么一刻，我记得我手里有 500 份该股票的期权合约。那是一笔机会就在眼前的交易，于是我集中精力，设置并跟踪了止损，结果就是一次极其迅速的精彩交易。


  **Bourquin：** 当你开始操作如此大规模的资金时，交易中还会紧张吗？还是即便处理这么大的交易量，也能保持从容？


  **Carter：** 实际上我相当从容，但会变得极度专注。如果是笔大交易，我不会起身或者离开电脑，但也不会在交易时惊慌失措。


  我总是把盈亏管理比作锻炼身体。你第一次做卧推，可能只能推 100 磅，一个月后，你能推到 110 磅，然后是 130 磅，以此类推。交易也是同样的道理。我第一次亏掉
  1000 美元时，直接就吐了，但下一次，就没那么糟了。然后，当你第一次亏掉 1 万美元时，你可能会把键盘摔到墙上，但下一次，也没那么糟了。实际上，你是在逐步建立起自己的“胆量”，以及作为一个交易员所能承受和不能承受的极限。


  像约翰·保尔森这样的人管理着巨额资金，应对着数亿美元的波动，但他们只是习惯了而已。


  如今，如果我做一笔小交易，比如 10 手合约，或者拿几千美元玩玩，对我来说，这已经接近毫无情绪的状态了，因为这笔钱真的不会对我产生什么影响。但对于一个刚刚起步的人来说，这可能就是他的全部身家。从这个角度想挺有意思的，但对每个人来说，情况都不同。


  **Bourquin：** 这是否应该成为每个人的目标：努力达到一个境界，无论桌上的金额多大，都不会引发情绪波动、心慌或令人生畏的直觉？


  **Carter：** 这确实是目标。每个人在模拟盘交易时表现良好的原因，就是因为他们不带感情。然而，当交易真金白银时，我们感受到的情绪通常与交易规模成正比。


  直到今天我仍然遵循这一点。如果我对某笔交易感到过度焦虑，不停查看报价，我就会卖出三分之一仓位。然后，我突然就冷静多了，也客观多了，这正是我需要达到的状态，以便做好交易并避免情绪化错误。


  **Bourquin：** 让我们简单谈谈业务层面，以及`TradeTheMarkets.com`和`SimplerOptions.com`。你是如何认定存在一个机会，可以开始教人们如何做交易的？


  **Carter：** 是因为我们到了很多人都挣扎求存的阶段。在科技泡沫期间，每个人都看起来像个天才，但对许多人来说，那之后一切都变了。不过我们仍然觉得那是一个很好的交易环境，于是我们开始发布想法，教别人如何做空或买入看跌期权。对一些人来说，那是他们头一回听说这些。


  **Bourquin：** 交易行业里有这样一种观点：如果你真的是一个好交易员，你就没有理由去做教学服务，因为你完全可以通过交易赚到所有的钱。你对此怎么看？


  **Carter：** 没错，常见的问题就是：“嗯，如果你在这行这么厉害，为什么还要教别人呢？” 我认为这是个合理的问题。确实有一些看似可信的导师，但他们从未真正交易过，我认为这正是这个问题的合理之处。


  对我来说，诚实的答案是，因为这是一门很好的生意。它非常具有可扩展性，可重复性强，而且如果你能提供高质量的内容并帮助到别人，他们就会留下来。


  **Bourquin：** 谈到那些只教学却不做交易的人，有时大家担心的是，也许他们教的东西五年前有效，但现在已经不灵了，这正是他们自己不交易的原因。


  **Carter：** 我也见过这种情况。我认为如果你打算教别人，你绝对必须紧跟市场，并且自己必须亲自交易。能够适应和理解市场的唯一方法，就是你自己实际上在做交易。这就是为什么我所有的课程都是在实时市场环境下进行的，而不是用那些事后回顾市场的
  PPT 幻灯片。在这些课程中，我会用我自己的账户执行真实的交易，我的学生可以看到我的盈亏状况。如果我搞了一堂课，里面我做的每件事都不奏效，每笔交易都亏钱，那我也就没有理由再教下去了。


  **Bourquin：** 当然，除了花几千美元报一个承诺能一夜之间培养出优秀交易员的课程之外，有没有什么方法能让新交易员合法地缩短学习曲线，更快取得成果？


  **Carter：** 你说得完全正确，答案*不是*去买什么 5000 美元的教育课程。我对这些课程没有意见，但就课程本身而言，没有捷径可走。


  捷径是这样的：像专业交易员一样对待*每一笔*交易。我的意思是，你应该正确配置仓位，迅速止损，让利润奔跑。这就是专业人士的心态，而*毫无例外*地遵循这一点的交易新兵，确实可以缩短学习曲线。事实上，他们从第一天起就能做得好。


  不幸的是，市场非常擅长强化坏习惯，并且通常需要付出惨痛的学习代价才能明白什么是对的，什么是错的。第一次取消止损可能管用，于是新交易员会继续这么做，但这是一个坏习惯，它迟早会回过头来毁掉他们。




  **布尔昆：** 回顾您迄今为止的交易生涯，有什么事情是您希望当初能做得不一样的？


  **卡特：** 我想我会更倾向于分步平仓的做法，先平掉一部分仓位锁定部分利润，设置好止损，然后让剩余仓位继续运行，每天只查看一次。这样，您就能真正捕捉到一些不可思议的行情，而不必时刻盯着图表。


  您永远无法准确预测市场会发生什么，但我认为，通过只保留一张合约的方式，我本可以继续参与一些精彩的行情——尽管这意味着放弃完全平仓所带来的那种心理上的了结感。


  **布尔昆：** 约翰，最后问一句，现在是否仍是成为交易员的好时机？


  **卡特：** 我认为现在是适合交易员的市场，是进行交易的绝佳时机。对于零售交易员来说，有一个不为人知的小秘密：尤其是在期货和期权这类市场，并没有很多大型对冲基金参与交易，因为那里对他们来说流动性不足。


  大型基金必须创建模拟数百万股持仓的合成头寸，但这些头寸是在高盛或其他机构的账外创建的，并非我们这些零售交易员能看到的交易。


  因此，对于较小的交易者来说，在原油、黄金市场以及股票期权市场中，存在着大量的机会，因为这些市场流动性较低，大型基金并不活跃。


  我认为如今交易中的机会可能比以往任何时候都多。人们总认为积极交易的黄金时代是九十年代末和互联网泡沫时期，因为当时买什么都能涨。但那不是交易。那就像抱着冲浪板，抓住一个七十英尺高的巨浪，然后一路顺势滑行而已。


  再次强调，成功最终归结为自律。但即使是新手交易员，也能从他们的下一笔交易开始，采用这种专业心态。这样做能够让他们步入正轨。


  ## 章节


  ### 安妮-玛丽·白永德


  在参加了一次关于技术交易入门研讨会并深受启发后，`安妮-玛丽·白永德`于 2005 年初，大胆地从一家公司总裁一跃成为一名初出茅庐的技术交易员。她深厚的数学背景和对分析的热情日后会让她受益匪浅，但这并未使她免于市场无情的洗礼和早期惨重的亏损。她并未气馁，不知疲倦地努力简化自己的流程，有条不紊地学习和测试技术指标，最终形成了一套清晰明了、定义明确的策略，这套策略带来了信心和积极的成果。如今，她被公认为斐波那契分析和动量交易领域的顶尖专家。在始终致力于自我求知的同时，白永德还在全美的现场研讨会以及她的日常聊天室里指导其他交易员。她是《交易宝典》（麦格劳-希尔出版社，2011
  年）的作者，并被列为推特上排名前 25 位的交易员之一。


  **蒂姆·布尔昆：** 安妮-玛丽，我们首先谈谈您是如何进入交易领域的吧，因为您的职业生涯最初似乎并非此道，对吗？


  **安妮-玛丽·白永德：** 完全正确。我之前在一家小型招聘公司做了十二年的招聘工作，并担任公司总裁。我们称之为“精品公司”，因为我们只寻找特定类型的、技术性很强的人才。


  我厌倦了每周工作一百个小时，感觉自己的职业生涯走到了一个十字路口。幸运的是，我当时所处的境况允许我选择下一步想做什么。


  那是 2004 年底或 2005 年初，尽管我本人并不想去，但在丈夫的催促下，我还是去参加了一个 `SUCCESS` 杂志举办的技术交易研讨会。于是我们去了，我非常喜欢听那位先生描述交易技巧。基于我的学历和过往经历，我非常热爱分析，并且喜欢深入思考。我发现那个演讲非常非常吸引人。所以，回家之后，我就开始从那里入手进行研究了。


  **布尔昆：** 当时技术分析对您来说是全新的概念吗，还是您以前就研究过金融图表？


  **白永德：** 技术分析对我来说完全是新事物，刚开始接触时，我甚至连“股票市场”这几个字都拼不利索！其实我本人对金融或市场并无兴趣，但我技术分析者的内核却非常渴望去探索它。


  **布尔昆：** 您后来是否还去上了他们提供的其他课程？


  **白永德：** 只上了入门课程。我丈夫想上，所以我们去了，但他们处处都在做二次推销，所以课程内容基本只停留在市场的皮毛层面。如果真想了解更多，就必须参加他们的全套课程。


  不过，我觉得自己学习效果更好，所以就开始自己研究市场。如果我后来觉得确实需要更多教育，我会再从那方面着手。


  **布尔昆：** 那您下一步是不是开始阅读关于技术分析的书籍了？


  **白永德：** 实际上，我做了一件极其疯狂的事：我直接上手开始交易——这是一个非常严重的错误！


  **布尔昆：** 哇，那我们谈谈您当时是怎么做的，以及为什么行不通吧。


  **白永德：** 嗯，在我之前选择做的所有事情中，我都是简单地集中精力，全身心投入去把它做好，然后努力去完成。我本以为这次也不例外，但当我开始交易时，我完全不知道是怎么回事！我面前摆着一本入门的
  `Investools` 书籍，我一边看着书，一边看着技术指标。


  我作为数学家的背景意味着我能理解像随机指标这类技术指标的基础原理，但说到如何判读和解释它们，我就一头雾水了。老实说，我当时就是个十足的“快枪手”，今天还能站在这儿说话的唯一原因，就是我开始交易时的本金非常充足，足以让我亏损巨大。


  不过最终，我丈夫说服我必须停止交易，先把情况弄清楚。虽然我不想停下来不交易，但这后来却成了我得到过的最好的建议。


  于是，我开始进行模拟交易，从简单的概念逐步过渡到略微复杂的概念，一点一点地攻克。我从学习移动平均线开始，然后在 Twitter 上看到斐波那契数列后，便对它产生了兴趣。我之前已经知道斐波那契数列，当我开始研究它时，价格波动的回撤对我来说变得非常有意义。突然间，我开始以一种全新的方式看待市场了！


  从那以后，我花了大约六个月的时间来开发一套适合我的系统。这套系统必须简单、直接，因为我非常容易自我怀疑，而且早期巨大亏损已经耗尽了大量的情绪资本，我根本不相信自己的任何判断或方式。


  因此，我发誓只交易某一种特定的形态，这帮助我逐步建立了信心。这就是我重返市场的方式。


  直到今天，一旦我理解了某个东西，我就会尝试在此基础上拓展，而且我每天观察市场，都会学到新的东西。我总是以不同的方式看待它，并努力不让自己被框住，这也是为什么我从来不想向别人学习如何交易。


  但这并不意味着我忽视外界的思想。在布莱恩·香农的启发下，我接着学习了多时间框架分析；我也研究市场内部指标，因为彼得·雷兹尼切克在使用它们。除此之外，所有的一切都是我自己的创造，对我来说非常自然。




  **布尔昆：** 你会关注那些人的博客吗？


  **白因德：** 嗯，`彼得·雷兹尼切克`在`thinkorswim`平台做过一个节目，那是我用的交易平台。他提到了“市场内部指标之王”，虽然我一开始不知道他在说什么，但当他调出一张图表时，我就看明白了。


  听他利用市场内部指标来把握市场时机后，我想看看自己能否成功地将市场内部指标融入我现有的策略中。我发现，有一个市场内部指标，即`上涨量减去下跌量 [UVOL-DVOL]`，对于判断当天趋势的走向非常有效。


  至于`布莱恩·香农`，我以前经常看他的博客每日回顾，并注意到他会从多个时间框架来观察事物，比如五分钟和三十分钟或小时线——甚至日线和周线框架。这会从更广阔的视角提供对市场状况完全不同的看法，于是我也开始尝试这样做。


  在这两个例子中，我都借鉴了外部的想法和观念，并尝试将它们与我现有的系统相结合。我坚信，许多交易者之所以失败，是因为他们只是简单地把大量技术指标堆砌在一起，而这并不是一个好的交易系统该做的。一个好的交易系统拥有少数几个能够相互补充的指标，这样当这些指标出现冲突时，背后是有真正原因的。


  **布尔昆：** 交易者刚开始的时候，有海量的信息可用，博客上有那么多人在发表观点，还有那么多服务、那么多课程，他们往往不知道从何入手。你是如何知道要从移动平均线和斐波那契开始学起的？


  **白因德：** 说实话，我当时在寻找一些我能理解的、真正简单的东西。我首先学习了`简单移动平均线 [SMA]`，它让我意识到，如果我的 K 线实体收在移动平均线下方，我可能应该做空。反过来，如果
  K 线实体收在移动平均线上方，我可能应该做多。就是这么简单的概念让我从那里开始了。


  在那之后，我尝试了各种各样不同的技术指标，我经常说，我在试图找到那个“欺骗我最少”的指标。最终，除了那个移动平均线，我确定了另外几个指标，但这真的是通过反复试错找到的。


  我把每一个指标都试了一遍：`MACD`、`RSI`、`威廉 %R`，你能想到的都有。有趣的是，我最终每天花二十个小时来做这件事，而不是我在猎头行业工作时每天十二个小时的时长！


  我每天花那么多时间只是研究和筛选指标，直到我找到一套适合自己的组合。我需要一些东西来清晰地指导我的交易。


  **布尔昆：** 谈谈你是怎么学习斐波那契的，以及现在是如何用它来寻找好的交易机会的？


  **白因德：** 嗯，我是以数学家的身份学习斐波那契的，所以我知道这个数列只是一组相互关联的比率。当我最初开始研究斐波那契与交易的关系时，我只是打开一张图表，然后从一个高点画到一个低点。我当时对波浪运动毫无概念，但随着我持续观察图表，我开始看到了它们。


  然后我开始测量这些波浪，并且能够预期潜在的转折点位置。有时我会在预期出现转折时入场交易，但在几次被止损出局后，我学会了在入场前等待确认。


  再说一次，这只是通过反复试错，我进行了一些实盘交易，并做了几百个小时的模拟交易，就是为了看看自己能否从机制上理解波浪运动是如何运作的。


  **布尔昆：** 你在分析中使用的是艾略特波浪理论吗？


  **白因德：** 不，我只是观察图表，不做任何波浪计数。我试过研究艾略特波浪，但我发现它非常繁琐。一切都取决于你从哪里开始数浪，如果你起始点选错了，那这个方法对你就不适用。


  我只是试图简单地去看，并一遍又一遍地识别那些重复出现的模式。例如，一个回调后立即反转向上，形成一个双顶形态，然后再度回调并向上突破，这标志着波浪延伸。这告诉我买方涌入，卖方被压制。现在卖方已不见踪影，这就是我做多的机会。


  我之所以选择统计学背景，恰恰是因为我一生都非常擅长模式识别。这是我带入交易的一项技能，我觉得它确实帮助我取得了突破。


  **布尔昆：** 自从将斐波那契确定为主要方法后，你是在不断地调整方法，还是你的策略保持不变？


  **白因德：** 我总是在调整。我的目标是识别市场的微小变化并有效应对。例如，`127.2% 斐波那契回撤位`曾经是一个非常严格固定的数值，但在最近几个月，我注意到变化倾向于`138.2%
  这个水平`。我总是在寻找这样的变化，然后相应地调整。


  我必须时刻提醒自己，市场是流动的、有生命的。它永远不会完全按照我们预期的方向发展。这就是为什么我关注行为上的变化，但其他大部分东西——波浪计数、我绘制波浪的方式以及我的入场触发条件——都始终保持不变。


  唯一可能改变的是我的止损位设置，取决于波动率水平，或者我使用的移动平均线（`50 周期`、`20 周期`或`10 周期 SMA`），取决于动能水平。这些需要斟酌的元素我必须灵活切换，因为每一天都有点不同。


  **布尔昆：** 就像艾略特波浪理论需要你学会从哪里开始数浪，使用斐波那契，你也必须选取恰当的波段高点和低点才能正确画线。你是如何擅长这个的？


  **白因德：** 嗯，有趣的是：只要你画出任何清晰可见波浪的高点到低点，斐波那契就会给出一个你可以用来交易的水平。而“清晰的波浪运动”指的是，例如，市场上涨到一个高点，反转并下跌到一个低点，然后再次反转上涨。在这种情况下，如果你是在从一个水平到另一个水平交易趋势，那么你使用哪个波浪并不重要。


  对某些人来说，这是一个非常奇怪的概念，因为人们希望事情非常严格，但实际上不必如此。市场是分形的，以至于我们使用哪个波浪并不重要，因为总是会存在可用于交易的水平。


  我通过观察斐波那契扩展位，然后向左看，尝试将它们与支撑位和阻力位匹配，来确定哪些水平是可用的。如果我在那里找到了支撑和阻力，我就知道那个特定的斐波那契水平是可用的。如果那里什么都没有，我就放弃它，从别处重新开始。


  不过，这真的可以简单到向左看支撑和阻力，如果匹配上了，你就可以直接按照那个信号入场交易了。


  **布尔昆：** 你每天从开盘交易到收盘吗？你通常一天做多少笔交易？


  **白因德：** 如果你是在 18 个月前问我这个问题，我会给你一个疯狂的数字。那时我每天大约做两百笔来回交易，但现在通常是十笔来回交易——最多二十笔。


  **布尔昆：** 你现在交易哪些市场？


  **白因德：** 我交易原油，交易期货，然后还交易“三巨头”：苹果、亚马逊和谷歌。我会观察当天哪个品种表现最好，那就是我重点关注的交易对象。




  ### 排版后的文本


  我每天早上东部时间 5 点就坐到交易桌前进行分析，这样一旦某个价格接近重要水平并可能出现突破时，我就能做好准备。如果看不出什么机会，或者行情保持平稳，我就会按兵不动，转而读书或研究其他东西。


  **布尔坎：** 你刚进入交易领域时，部分原因是你当时工作时间极长，几乎没有自己的时间。交易让你从那种生活方式中解脱出来了吗，还是说你又陷入了同样的状态？


  **白因德：** 嗯，在我学习和挣扎的那段时期——甚至在我重新学习并逐渐掌握要领之后——我确实又回到了那种状态。不过现在，我的生活稍微平衡了一些。


  早期，我常常关注 50 种不同的交易品种，追逐各种机会。但现在我的条理非常清晰，尽管我仍然很早就起床研究市场，但通常在东部时间上午 11:30 或中午之前就结束交易了。之后我可能会留下来辅导学生，或者为某些波段交易或长期投资制定策略，但具体的交易操作在那时就已经结束了。


  **布尔坎：** 很多读者可能正处于你曾经的那个阶段，坐在初级研讨会的椅子上，而另一些人可能还没到达那个阶段。对于那些希望顺利过渡到交易领域的人，你有什么建议？如果你必须从头再来，你会做哪些不同的事情？


  **白因德：** 如果我必须从头再来，我会立刻承认并接受自己的技能水平非常有限，甚至可以说是几乎为零。仅仅因为在某个职业上取得成功，并不意味着我就能直接跳进交易领域，开始操作并取得巨大成就。


  人们常常认为交易输赢的概率是 50/50，所以他们急于入场，心想：“这能有多难？”


  交易当然是一项极其困难的职业，重要的是要评估好竞争环境，认清自己**实际**的技能水平，然后尝试寻找一位导师或懂行的人来引导你。我自己就曾为很多人做过这件事。


  另一个建议是，在你寻找信息的过程中，要知道还有更多你不知道的东西。努力建立一个清晰明确的交易系统，然后找人帮助你应对每天都会遇到的不可避免的挑战。


  **布尔坎：** 作为一名交易员，你必须适应独处，但白天与其他交易员交流的渴望催生了成千上万的聊天室。对于那些使用聊天室的人，你有什么建议？


  **白因德：** 嗯，零售交易是一项非常孤立的游戏，在推特和聊天室出现之前尤其如此。我开始交易那会儿，这类交流平台还不多，但现在到处都是。


  我认为，如果你选择一个仅仅告诉你交易*点位*的聊天室，那对自己是非常不利的。要成为一名优秀的交易员，你还必须理解你*为什么*要这么做。你不需要精确了解随机动量指标如何得出它的数值，但你需要知道如何解读它，以及当它处于某个区间时意味着什么。


  所以，在寻找聊天室时，要找那些愿意精确分享他们*正在做什么*以及*为什么这么做*的人。坦率地说，这很难，因为聊天室运营者常常担心他们的收入，害怕你找到所需的东西后就离开。这就是为什么很多聊天室只公布交易点位而不解释背后逻辑的原因。然而，如果你能进入一个解释交易逻辑的聊天室，你不仅能更好地了解自己当时的实际技能水平，还能学到更多持续稳定交易所需的知识。


  **布尔坎：** 对于那些渴望辞职成为全职交易员的人，或者那些退休后想通过交易赚取额外收入的人，你会对他们说些什么？


  **白因德：** 对于任何试图将其作为职业转变的人来说，在进入这个领域之前，尽可能多地接受教育至关重要。现在，我认为新交易者学习波段交易的方式可以比日内交易更轻松。两者的压力水平完全不同，但做出错误交易的机制和心理影响却完全相同。


  然而，在做出第一笔交易之前，要确保你具备良好的教育基础，并且找到了一个你想要执行的交易系统。从那以后，慢慢开始，稳步前进。


  很多试图将交易作为职业的人，入市时资金严重不足，他们想把那点小账户翻倍甚至翻三倍——但这需要承受巨大的风险。这是一个危险的等式，因为他们的技能水平低而风险敞口高，常见的结果是新交易者常常爆仓，再也无法交易。


  在将其作为职业之前，重要的是要认识到，在你成功之前，需要学习大量的经验教训，而且学习市场交易真的很少有捷径。


  最好的办法就是练习。开设一个模拟交易账户，评估市场以寻找好的交易机会，然后执行并完成这些交易。如果你不能在模拟账户中赚钱，那么你在真实账户中也做不到——这一点毫无疑问。


  **布尔坎：** 同样，即使你能够在模拟账户中赚钱，也不能保证你在真实账户中也能赚钱，对吗？


  **白因德：** 完全正确。用真金白银交易时感觉完全不同，还伴随着额外的心理压力，这才是真正的关键所在。


  **布尔坎：** 有些人说模拟交易没有价值，因为它不能预示你在用真实资金交易时也能成功。然而，从中可以学到很多东西，而且你确实必须这样做。


  **白因德：** 是的，绝对如此。这对于理解市场节奏非常重要。但新交易者也必须明白，在用真实资金交易时会发生各种滑点，而这些在模拟账户中是看不到的。


  然而，从机制上讲，如果你做出了正确的交易决策，那么当你转向真实账户时，你将会真正收获回报，而不是在不理解机制的情况下，直接跳进去用真金白银交易。


  ## 章节


  ### 杰夫·怀特


  *在结束出色的业余高尔夫生涯并从事了几年职业高尔夫之后，* ***杰夫·怀特*** *于 2000 年中期转向全职交易*。怀特发现这两个职业之间存在一些引人入胜的相似之处，因此他比大多数人都更清楚，成功是一场“苦差事”——而不是许多人想象中的光鲜悠闲的生活方式。作为一名几乎只专注于股票交易的日内交易者和波段交易者，怀特寻找简单、可重复的模式，并仅使用价格和成交量信号来锁定最有利的交易机会。尽管如此，他仍然认为，优秀的交易者必须不断积累对其他策略的知识和理解，以便在快速变化的市场环境中保持灵活。怀特在他的博客
  [TheStockBandit.com](http://TheStockBandit.com) 上发布每日市场分析、评论和交易想法。


  **蒂姆·布尔坎：** 杰夫，在你进入交易行业之前，你曾是 NCAA（全美大学体育协会）的高尔夫球手，后来成为职业选手。我们就从这开始聊吧。


  **杰夫·怀特：** 我从 1993 年开始参加大学高尔夫比赛，直到 1997 年毕业。我在大学取得了一些成功，并入选了全美最佳阵容。我每年都在进步，想尝试一下巡回赛，于是就去参加了一个小型巡回赛。




  '
- '# 我曾是一名苦苦挣扎的职业选手。我投身其中整整三年，虽然有所进步，但进步的速度远未达到我的预期。那真是一种煎熬。这意味着大量的旅行和四海为家的生活，意味着长时间的工作和有限的收入，尤其是如果你不能每个周末都出现在电视上的话。因此，我的动力消退了，因为我的付出并没有换来相应的成果。


  然而，在这一路上，我接触到了市场。我和妻子在 1998 年结婚，当时我们有一些积蓄，没有债务，那是一个巨大的优势。我们决定用这笔储蓄投资，建立一个应急基金。因为我们很年轻，觉得假以时日，真的可以在财富积累上领先于曲线。


  我们在 1998 年夏天，就在对冲基金长期资本管理公司在八月崩溃之前，与一位本地经纪人见面，投资了一些共同基金。那次崩盘拖累了整个市场走低，我们的共同基金也因此受到波及，损失了我们一部分储蓄。


  这件事让我很不舒服，于是我决定亲自上阵。我几乎每晚都去巴诺书店，如饥似渴地阅读我能找到的所有投资和交易方面的书籍与杂志。没过多久，我就把钱从那些共同基金里撤了出来，开始自己跟踪个股。


  然而，就像每一位新手投资者或交易员一样，我犯了很多错误。但在 1999 年和 2000 年初，在整个互联网泡沫时期，市场因为过分强劲而原谅了这些错误。


  到了 2000 年年中，我的交易做得相当成功，就在那时，我决定从打高尔夫球转为以交易为生。


  **布尔昆：** 我觉得你把巡回赛职业球员的生活形容为“煎熬”很有趣。高尔夫和交易之间存在着一种有趣的类比，我相信你也看到了。人们通常以为以交易为生是一种光鲜亮丽的生活方式，就像他们想象旅行和每天打高尔夫球很风光一样。


  **怀特：** 完全正确，我很高兴你提到了这一点，因为高尔夫和交易都有很多需要“磨砺”的地方。唯一真正的区别是，交易的时候有空调！


  我发现两者都有艰难时期。有时候，你投入了很长的时间却没有任何报酬。不过，在任何自主导向和自雇的事业中，也常常会出现类似的情况。


  **布尔昆：** 高尔夫和交易也能让你在鸡尾酒会上成为真正的主角！当你在巡回赛时，人们是否认为你在过着梦幻般的生活？现在，当你告诉他们你是一名交易员时，他们是否也这么说？


  **怀特：** 是的。不知为何，人们觉得这有趣得多，但我可以告诉你，我的生活可能并不比他们的更有趣。


  **布尔昆：** 我们来谈谈你转型为全职交易员的过程，以及你是如何开始起步的。


  **怀特：** 我走进了一家在我居住的南得克萨斯的日内交易公司，里面有好几十位交易员。他们使用的软件非常复杂，我从未见过，而且他们能使用我无法获得的杠杆，这让他们获得了比我这种交易员更独特的优势。


  那是一家零售交易公司。每个人都在交易自己的账户，但大家同在一个大房间里，交流思想的氛围绝佳。人们会在建仓或平仓时喊出自己的交易，或者指出某个市场正在形成更高的高点和更高的低点，又或者宣布即将发布某个经济数据。有很多双眼睛从不同角度观察着市场。


  那是一个极好的环境，帮助我作为交易员学习和成长。在那之前，我已经做了几年的兼职交易员，但进入全职交易时，我还有很多东西要学。即使是很多年后的今天，我仍有更多的东西要学。


  在那种环境中，你接触到很多交易员和许多不同的交易方法。有些是动量交易者，有些是回调买入者，还有一些喜欢做反转交易。你还会遇到不同时间周期的人。有些是日内交易者，有些是波段交易者，还有些是头寸交易者。通过持续互动并理解哪些策略在特定条件下有效，我的知识和经验水平迅速提升。


  不过，也许最重要的是，我从周围人犯的错误中学到了最多的东西。那是一个市场从强劲牛市转变为熊市的时期。随着价格走低，这要求人们去适应，因为市场不再会自己“拯救”糟糕的交易。


  我特别记得一位交易员，他大约连续六周每天都赚钱，没有一天是亏损的。基本上，他是在逆着极端的新闻驱动动量操作。所以，当一只股票在新闻报道后飙升时，他就会开始逐步建立空头头寸，等待那“必然”的初始回调。


  他可以动用大量杠杆，但要让这些交易成功，他必须精准地把握入场时机，逐步加仓，并且在他时机把握不好时，不断向亏损的头寸加仓。最终，他总会等到那个回调，这能帮他摆脱一些深套。他可能亏损了两万美元，最后却能平掉一笔只赚五百美元的单子。


  **布尔昆：** 尽管这真的是一个非常坏的习惯……


  **怀特：** 确实如此，但每一笔盈利的交易只会放大他的信心。他仿佛是在和市场玩“胆小鬼游戏”，但不知怎地，却总能赢。


  然而，有一天，这一切都结束了。他在一只生物科技股上，仅仅几个小时就亏掉了十八万六千美元。那只股票在一条新闻标题出现后开始自由落体式下跌。他不停地买入加仓，直到耗尽所有购买力，办公室的经纪人不得不因为他的账户里没钱了而帮他平仓。


  看到有人这样自我毁灭是令人难以接受的，这件事让我学到了很多东西，关于许多交易员对“准确率”的重视——或者说过度重视。这是一个比我见过的任何人都更“准确”的家伙，然而就连他也因为对风险和仓位控制掉以轻心而爆仓了。


  我如今采用的许多方法，都根植于我早期的经验以及我从观察其他交易员，尤其是像这样类似案例中学到的教训。


  **布尔昆：** 在交易中，你会接触到很多不同的方法。虽然有些人像你一样，会吸收所学并发展出自己的策略，但也有其他人，总是在追逐最新潮的东西。你如何平衡追逐当下看来有效的方法，以及吸收外部信息来创建自己未来可靠策略之间的关系？


  **怀特：** 我认为人们很容易试图一次性学习太多东西，尤其是当你是一个较新的交易员时。你明白有许多不同的时间周期和技术可供选择，所以你每样都尝试一点，并不断地从一个切换到另一个。最终，你只会让自己更加困惑，这样你实际上无法学习或取得进步。


  我学会了让市场来决定应该关注哪些交易机会，然后，自然而然地，随着时间的推移，你会学到你需要学的东西。这会带来更大的一致性，并且消除了同时学习多种策略的必要性。


  我的建议是，着手去做当时市场正在回报的交易，同时也要留意当这种交易不再有效的时候，因为那时你可能需要调整并学习新东西了。


  **布尔昆：** 这是否意味着你应该掌握五六种不同的策略，以便无论当时市场环境如何，你都有一个武器库可供选择？




  **White:** 当然，但你需要随着时间的推移逐步建立这种能力。即使只有少数几种策略也足够了。你只是不想成为一个“只会一招”的交易者。


  市场不会永远奖励同一种策略，当市场条件发生变化而你的策略没有改变时，你只有两个选择：亏损并感到沮丧，或者在场外观望，无限期地等待市场回到适合你单一策略的状态。


  当市场条件变化时，拥有可以切换的其他策略将带来巨大的好处。仅仅三、四或五种你偏爱的交易手法听起来可能不多，但如果它们彼此之间有足够的差异，就能让你在任何市场条件下灵活操作、游刃有余。


  **Bourquin:** 有时交易者在用某一种策略连续交易几次失利后，就很难再执行下一笔交易。你怎么知道市场条件已经改变，并且是时候切换策略了？例如，从动量策略切换到区间交易策略。


  **White:** 对我来说，这是一种感觉，我没有固定的公式来告诉我条件何时改变。我首先必须对每个头寸保持客观，持续评估价格和成交量行为，看看这些信号是否仍然支持我持有该头寸。


  此外，我还必须对整体市场环境保持客观，了解我们是处于趋势行情、动量行情、区间震荡，还是完全缺乏方向。然后，根据当前条件，我需要明白哪些策略将表现最佳。


  连续亏损四、五笔交易是会发生的。这是交易的一部分。不过，当这种情况发生时，重要的是迅速采取行动，通过适当缩减头寸来保护你的信心和账户。然后，你应该退后一步，识别大局以及导致亏损交易的原因。不要仅仅因为连续亏损就认为你的策略失效了。


  **Bourquin:** 关于你在那家交易公司工作的经历，最后想问一下，你是何时决定离开那个环境，开始独立交易的？


  **White:** 当圣安东尼奥的办公室关闭时，这个决定几乎是被迫做出的。我 2000 年在那里开始工作时，大约有四十名交易员，但到 2002 年我离开时，只剩下我们几个人了。


  这是一场市场主导的淘汰过程。显然，可交易的股票范围大幅缩小，动量消退了，迫使交易员们去适应。许多人亏光了钱，其他人则耗尽了时间。因为他们不再盈利，所以不得不回去做其他工作。


  那间办公室关闭后，我通勤到他们在奥斯汀的一个办公室，因为我仍然希望和其他交易员待在一起。我喜欢那种团队情谊。我喜欢互动和思想交流。这又持续了几年，但那个团队也逐渐缩减了。


  在那之前，我一直对在家交易感到不安，因为我对自己的设备缺乏信心。但到了那个时候，互联网的速度和可靠性已经大幅提升，这让我可以在家交易，同时还能在一天中与其他交易员保持沟通。所以，在
  2004 年，我停止了通勤，成为了一名居家交易者。


  **Bourquin:** 尽管技术和工具和你之前在办公室环境中使用的相同，但在不再有其他交易员围绕的情况下，这种转变感觉如何？


  **White:** 这很艰难，与其说是纪律或保持交易专注力方面的困难，不如说是我怀念那种互动。


  交易是一项非常孤独的职业，我怀念与人交流的机会，哪怕只是一起吃个午饭。然而，与此同时，那段时间无疑让我作为交易员得到了学习和成长。


  **Bourquin:** 现在我们来谈谈策略。首先，当你转向居家交易时，你的策略有没有发生变化？


  **White:** 我的交易大约在那段时间确实发生了变化，但这并非基于我的地点，而是因为市场本身已经改变了。正如我提到的，可供交易的股票范围小了很多，我发现为了达到期望的回报水平而承担的风险也发生了实质性的变化。


  最初，我可以用承担 1 单位风险来赚取 3 或 4 单位收益，并且做得很好。随着市场被压缩，日内价格波动不再那么剧烈，我发现我不得不开始拉长我的时间框架。


  在那之后，我开始做更多的波段交易，我会隔夜持有头寸，寻找持续数天的行情，而不是只在大约两小时内进出的短线情境交易。这对我来说绝对是一个巨大的转变。


  **Bourquin:** 那么，你会不会说你现在更像一个寻求更大、更长期走势的波段交易者，而不是一个日内交易者？


  **White:** 是的，我更像一个波段交易者，但我仍然会做日内交易。我喜欢在不同的时间框架操作，因为我觉得那里总有机会。


  我更喜欢波段交易，因为我倾向于过度管理股票。例如，在做日内交易时，我自然会关注逐笔成交的细节，这让我更难持有盈利的头寸，因为我无法像做波段交易那样，设置好挂单后就不再干预，直到价格触及我的参数。


  在这两种时间框架下，我在止损方面都非常自律，但能够更好地管理盈利头寸，这正是我偏爱波段交易而非日内交易的原因。


  **Bourquin:** 你能大致介绍一下你是如何安排交易日的吗？在市场收盘后，你如何进行“功课”？你寻找哪些信号来发现好的交易机会？


  **White:** 因为我住在德克萨斯州，市场每天在中央时间下午 3:00 收盘，所以收盘后我会立即回顾当天做的交易，看看哪些地方做得好，并总结当天行情带来的教训，以便未来改进。


  然后，我会把注意力转向研究和翻看图表，为第二天的交易做准备。我从指数开始，主要关注`NASDAQ`和`S&P 500`，但也会看看`Russell 2000`，偶尔也看`Dow`。


  我想知道大盘在做什么，重要的价位在哪里，以及我们处于怎样的市场环境中。例如，是否存在动量？我会识别出这一点，然后判断市场方向，因为我知道个股与整体市场之间存在相关性。


  我会翻阅大量图表，并在价格和成交量方面保持一些非常基本的筛选标准。我喜欢交易价格至少在两位数、且日均成交量在 50 万股或以上的股票。这会过滤掉许多低价和低成交量的股票，留下流动性更强、更有可能波动的股票。


  我每天花大量时间手动查看几百张图表。软件让这个过程变得容易得多，但我实际上很享受寻找优良交易形态的过程，并且觉得通过这种方式进行研究，能让我对当时整体市场的潜在强势、弱势或犹豫有更好的感觉。


  在初步筛选时，我会把任何看起来有趣的图表单独放一边，这通常会留下一份包含三四十只股票的短名单。随后，我会回头仔细研究这些股票，同时尝试识别形态、关键价位以及任何潜在的交易机会。在这个阶段，我会思考在何处入场建立特定头寸，以及在何处我需要退出。


  **Bourquin:** 你会使用前期高点和低点、枢轴点，还是其他方法来决定入场和出场点？


  **White:** 我会画很多趋势线，但就指标而言，我的图表非常简洁和基础。我真正看重的是价格和成交量，所以我使用的任何指标都仅仅源自于它们。




  我沿着高点与低点绘制趋势线，试图识别那些曾受到单边或双边确认的价格水平。例如，我会关注一个曾经的支撑位现在变成了阻力位，或者反之亦然。


  我最青睐的一种交易模式是，先出现近期的动能行情，随后进入一个带有价格压缩的短暂休整阶段。这类似于在大幅动能行情之后出现的楔形形态，它实际上只是一个喘息期，能帮助我识别股票潜在的二次行情。每次我都尝试留意这些形态的出现，并仔细分析风险/回报比。


  那么，我的最后一步是判断股票是否看起来已经准备好立即启动。如果它开始靠向一条趋势线，或者成交量开始放大，并且价格在 K 线收盘位置上显示出更强的决心，这些对我来说都是有利的信号。


  例如，如果我看到一只股票在成交量放大的情况下走高，并接近上方的趋势线，同时我还注意到价格收在该 K 线的顶部或接近顶部的位置。这向我表明，这只股票正准备发动行情。


  诸如此类的几个想法构成了我次日的交易计划，我总是希望带着计划入场，这样我就永远不会仓促寻找交易标的。我已经心中有数，有了我的交易想法和与之相关的关键水平，剩下的就只是执行了。当我做好准备入场时，我在盘中情绪会更平静，而且即使我错过了一波市场行情，只要我遵循了交易计划，我也几乎不会感到内疚。


  **Bourquin：** 这就会形成固有的纪律，并有助于确保你只进行符合你风险状况和交易策略的交易。有太多交易者只是试图追逐当天波动的任何品种，这通常风险很高且难以操作。


  **White：** 确实如此。这也要求非常快速地做出决策，虽然有时在市场中你必须快速思考，但这并不是我想要培养的习惯，因为它可能导致错误和纪律缺失。


  **Bourquin：** 在交易信号较多的日子里，你的交易方法会有所不同吗？在机会稀少的交易日，你又是如何应对的？


  **White：** 在信号普遍较多的日子里，我知道我必须非常专注，并且要更积极一些，因为那里有更多的机会。我相信，并且在我的整个职业生涯中也一直是这么经历的，只要我管理好入场和出场，在这些日子里保持积极进取将会对我有利。


  然而，当交易信号较少时，那就是我收手、减少交易并等待市场发出更有利信号的信号。在这种情况下，我特别提醒自己不要强行交易。我会降低预期并保持耐心，而不是在可能没有信号的时候试图去寻找它们。


  **Bourquin：** 成功的交易者似乎明白，成功不仅仅关乎交易。它还关乎找到正确的交易，有时这意味着等待交易信号，甚至根本不交易。这些交易者不会仅仅因为觉得需要时刻待在市场里就贸然入场。


  **White：** 绝对正确。这其实又回到了鸡尾酒会上的讨论。很多人认为成为一名交易员意味着不断的行动和刺激，但我告诉他们，事实是，其中涉及到的观察和等待比大多数人想象的要多得多。


  说实话，我不希望交易时肾上腺素持续飙升。每年会有那么几次这种情况，但大多数时候，交易要单调得多，只是一个运用耐心的问题。没有耐心的交易者往往坚持不了多久，而且这并非指他们在持仓时间上缺乏耐心。而是他们不愿意或没有能力坐着等待。这当然需要练习，但那些懂得挑选时机并等待最适合自己风格的市场条件的人，将会取得更大的成功。


  **Bourquin：** 你之前提到你一直在学习和研究，我很喜欢请教专业交易者谈谈他们仍在学习或改进的地方。就你的交易而言，你目前仍在着力于哪些方面？


  **White：** 嗯，对我来说，主要是寻找方法让我能更久地持有好交易。我很擅长止损，但让利润奔跑是我在纪律方程式中比较难处理的部分。为了更好地做到这一点，我尝试分批了结获利仓位，这样既能满足我锁定部分利润的冲动，又能在行情可能延续时继续参与交易。


  就整体交易技能而言，我一直是一名股票交易者。我涉猎过一些期货和期权，但从未真正将它们融入我作为交易者的核心技能中。最近，我一直在自学期权知识，以便进一步拓宽我的能力范围。


  我不想停滞不前，只受限于一个市场进行交易。尽管我仅凭交易股票就走到今天，但我认为持续前进和成长非常重要。我并非要寻求对我的方法进行重大转变，也不会抛弃我一直在做的事情。我只是想融入一些新的东西。


  **Bourquin：** 最后，Jeff，你是如何给自己付报酬的？你是从利润中取钱，给自己开一份薪水支票，还是甚至通过一家公司进行交易？


  **White：** 我通过一家交易者会计事务所设立了一个混合实体，这在扣除方面有一些非常好的税收优势，因为我是一个全职交易者，而不是被归为投资者身份。


  在此基础上，报酬就取决于我年底想从账户里提取多少钱。我会考虑我需要多少生活费用，以及前一年我的个人账户是否还有余钱，因为这可能会让我将更多资金留在交易账户中用于来年的增长。这只是一个持续的权衡过程，但我并没有给自己设定一个固定的薪水。


  我和我的妻子都是非常节俭的人，所以我从不觉得我必须通过交易来维持某种特定的生活方式，这很可能让我在做全职交易这么多年的经历中，获得了比其他任何东西都更多的内心平静。显然，我希望获得巨大的成功，某些年份的收益会比另一些年份更好，但我不会感受到与金钱相关的额外压力。


  章节


  Patrick Hemminger


  *价差交易者***Patrick Hemminger** 开始交易农产品期货，是由于全球股票市场相关性增强导致权益市场中有利的交易机会减少。尽管是出于无奈，但
  Hemminger 转向农产品期货的交易被证明是他职业生涯中的一个决定性举动，也表明交易者必须保持警觉，并对不断变化的市场状况迅速做出反应。




  '
- '# 《交易员访谈：Patrick Hemminger 谈价差交易策略》


  历史上，玉米、小麦、大豆乃至石油等大宗商品中可靠且利润丰厚的价差，使得`Hemminger`能够应用其不带偏见的技术策略，并作为一名交易员取得了更大的成功。通过关注历史趋势和简单的技术指标，`Hemminger`交易多种时间框架，从长期周期一直到日内波动。他在面对经济新闻和数据时移除止损这一颇为大胆的方法，在有些人看来可能颇具争议，但正如他所解释的，这帮助他避免被当今市场中日益常见的、由过度情绪驱动的波动所止损。`Hemminger`在他的博客[`DirtyArbitrage.com`](http://DirtyArbitrage.com)上分享他的仓位，以及定期的市场见解和交易想法。


  **Tim Bourquin:** `Patrick`，我们来谈谈你的交易策略，以及你如何观察市场、每周寻找好机会。先定义一下你的交易风格。你是哪种类型的交易员？


  **Patrick Hemminger:** 好的。我是一个关系型交易员。我的意思是，我一直在观察价差，以及两种资产之间的价值关系。


  大多数情况下，这些资产的相关性非常高。当涉及到像`E-mini S&P`与`DAX`这样的隐含股票价差时——或者在我目前投入大量研究和精力的领域——我关注的是农产品价差。


  这些可以是期限结构上的价差、日历价差，或者跨商品价差，比如玉米对小麦。但我所有期货端的风险敞口都是基于关系（价差）的。


  **Bourquin:** 好的。那么，当我想到价差交易时，我通常会想到玉米和小麦通常一起波动。但当它们开始背离时，你看到了这个机会，就做多一个、做空另一个，看它们是否会重新收敛。我这么概括还算准确吗？


  **Hemminger:** 是的，我认为这是对价差交易一个很好的概括。你在寻找价值，而机会可能出现在许多不同的时间框架上，包括日内、波段或更长期的季节性周期。


  去年，玉米和小麦曾平价交易。这在历史上是很少见的现象。去年有很多次，我纯粹基于这个价差是历史性事件而卖出玉米、买入小麦。我非常愿意承担风险，并期待这个价差能重新回到小麦价格高于玉米价格的位置，而这正是现在发生的情况。


  **Bourquin:** 为什么会发生这种情况？你会花很多精力去研究背后的原因吗？还是只是说，“它就是这样，我就这么交易了”？


  **Hemminger:** 我更倾向于关注技术面。即使回头看十年、二十年、三十年，也有大量的数据——尤其是在农产品领域——可供参考。你可以从长期的角度去观察。


  我尽量不把基本面偏见掺杂到我的技术分析中。我知道市场上在议论什么，人们在说什么，但过去听从大众的意见让我吃过亏。现在我倾向于坚持自己的框架，规划每一笔交易，清楚我的风险和回报在哪里，并坚持执行计划。


  **Bourquin:** 之前我知道你一直在交易股票指数间的背离——比如你之前提到的道琼斯指数对`DAX`指数。是什么让你转向农产品市场来尝试你的交易方法？


  **Patrick Hemminger:** 嗯，这是个好问题。成为一名成功的长期交易员的两个基本原则是：第一，认识到市场已经改变；第二，保持足够的灵活性以随之进化。只会一招鲜并不是长期成功的秘诀，因为从全球宏观角度看，世界在变化。


  我的专长是股票价差，即美国股票指数对欧洲股票指数。因为我的主要基准是`S&P`，我会用它来对`FTSE`、`DAX`、`Euro Stoxx 50`做价差交易。但从
  2010 年中期开始，这些价差中的机会变少了。这些价差中可供参与的日常机会简直大幅减少。当这些价差确实出现背离时，与过去的历史表现相比，它们带来的机会更少，风险却更大。


  **Bourquin:** 是的，我听说过。因为交易已经变得更加全球化，市场之间的相关性比过去高得多，所以背离的情况变少了。我想这也是你的意思。


  **Hemminger:** 完全正确。做多或做空欧洲变得非常困难，因为那些指数以及那里的所有金融期货，包括`Bund`、`BOBL`债务期货、欧元和英镑，都在根据接下来的一条新闻而波动。人们关注着来自希腊的消息，这不利于来回交易。它引发了恐慌。在大多数情况下，恐慌是件好事，但在这个例子中，所有东西都以如此高度相关的方式运动，以至于根本提供不了我所习惯的那种机会。


  2011 年初，局势已经很明显了，我知道我们真的需要开始进化我们的交易方法、我们所追随的趋势、我们的交易、我们交易的资产类别等等。我们的进化确实是出于自我保护。


  **Bourquin:** 既然你已经转向了农产品，你最常做的交易是什么？是玉米对小麦吗？


  **Patrick Hemminger:** 我现在参与最多的价差主要是单一资产期限结构内部的日历价差。也就是说，我在寻找单个合约中多个到期月份的持仓量和成交量。


  我在寻找期限结构的日历价差中的期内机会，并扫描市场寻找跨品种关系——例如，玉米对大豆、生猪对肉牛。我做的跨品种交易少得多，更多的是期内的期限结构仓位配置。


  **Bourquin:** 你能给我举一个普通交易的例子吗？这样我们就能真正拆解并理解你的交易方法。


  **Patrick Hemminger:** 我先从豆类说起，这是我目前正在参与的一笔交易。在这笔交易中，我关注的是`2013 年 7 月`对`2013 年 11
  月`的价差。我之所以关注这个价差，是因为它表现出的价格行为非常可靠，并且与过去的历史观察高度相关。


  让我回过头来说。今年年初，我请我的一位挚友开发了一个软件，用来分析历史数据，并识别出那些被证明高度可靠的价差模式。这个软件会将这些价差提醒我，并告诉我平均胜率，以及平均盈利交易和平均亏损交易。


  通过使用我的软件，我意识到从时间周期的角度来看，这个特定的豆类价差在过去五年里是一个胜率 60%的策略。因此，从 10 月中旬到大约 12 月中旬，我可以预期这个价差的平均盈利交易能赚大约
  41 美分，而平均亏损交易则会亏损 5 美分。这给了我一个预期收益为 1200 到 1300 美元，这正是我在寻找的那种交易。


  **Bourquin:** 那么，是`7 月`合约在历史上被高估，而`11 月`合约在历史上被低估吗？你实际上在看什么？


  **Hemminger:** 实际上，相对于`2013 年 11 月`大豆合约，现在的`2013 年 7 月`合约是被低估的。从历史上看，10 月中旬是买入该价差的可靠时机，你应该在圣诞节前的某个时候卖出该价差，每张合约的平均利润约为
  1200 到 1300 美元。




  **布尔昆：** 所以，你寻找的是某个期货合约相对于另一个到期合约被高估或低估的领域，然后对这两者进行交易，直到它们恢复平衡。是这样吗？


  **赫明格：** 是的，完全正确。我们只是试图找出那些相对于另一个合约提供低估或高估机会的合约。然后我会尝试精确把握时间。因此，不只是看风险回报指标，我还加入了一个时间函数，这给我的交易增加了一个额外的维度。它让我能够真正地深入调整、精细化管控我的交易，并在更大程度上降低风险。


  **布尔昆：** 你提到的大豆交易听起来像是可以持有数月的长期交易。这种关系或比率是在日内出现，还是像持续数月那样频繁出现？


  **赫明格：** 是的。豆类价差是一种快速变动的价差。它波动性很大。当你看着一个平均盈利为 41 美分的交易时，为了获得这种更高回报的交易，你必须愿意承担一定的风险。


  我最近写过的一个较慢的价差交易是 2013 年 7 月与 2013 年 9 月的小麦价差。我做空 7 月合约，做多 9 月合约。在这个交易中，平均盈利是 10
  美分，平均亏损是 3 美分。这个交易近年来的历史记录也很出色。


  与豆类价差相比，这个交易风险低得多，但相应地，它提供的回报也会受到限制。所以，这两个价差肯定有不同的特性。例如，当豆类价差变动时，你会看到算法进场并推高价差，这给了你围绕核心头寸进行短线交易的机会。事实上，我的交易策略的一个基本原则是：找到那些我希望持有
  1 到 2 个月的农产品价差核心头寸，然后在我识别出的历史模式方向上，围绕这个倾向进行交易。


  **布尔昆：** 在任何特定时间，你通常会有多少个交易或头寸？


  **赫明格：** 我想说，在任何特定时间，我平均持有五到六个不同的农产品价差。


  **布尔昆：** 你在进入这些交易时会设置止损和获利目标吗？


  **赫明格：** 是的。通过使用我之前提到的那个软件程序，我可以快速了解某个特定价差在每年特定时间段的历史表现。正如我之前所说，这个程序提供了平均亏损和平均盈利，我将这些信息与动能、支撑位、阻力位、趋势线等技术指标，以及我在过去十年交易生涯中积累的许多其他工具结合起来使用。


  **布尔昆：** 谈谈你正在使用的那些指标。除了你的软件程序提供的比率之外，你还喜欢在图上看哪些指标？


  **赫明格：** 我从来都不喜欢振荡指标。我的整个交易生涯都专注于把事情做得简单而明智。我不是从均值回归的角度来看布林带，而是从动能的角度来看。我和一群交易者一起交易了三年，他们教会了我这种解读布林带的方法，这对我关注的包括趋势线、时间周期、支撑位和阻力位在内的其他一些基础技术分析手段来说，是一个很好的补充。


  我真的试图让事情尽可能简单，避免用复杂的方式“量化一切”。这使得管理交易变得容易得多。


  **布尔昆：** 在发现价差交易这个最终能让你持续稳定盈利的方法之前，你是否尝试过很多不同的东西？


  **赫明格：** 是的，尝试过很多。我的第一份工作实际上是在 2001 年交易纳斯达克股票。我当时完全不知道自己在做什么。在成长过程中，我甚至说不出报价是什么。我完全不知道，但交易确实与我的性格——一个极具竞争力的运动员——非常契合。它给了我一个发挥竞争力的出口，正如我一个朋友所说，也给了我一条“艰难之路”去谋取一份轻松的生活。


  当我刚开始交易时，我热衷于快速短线交易。我做得不算差，但也不算好。然而，当我发现股票配对交易时，那对我来说是一次大开眼界的经历。它让我有机会对交易多一点耐心，因为我关注的是相对价值，而不是
  KLA-Tencor (KLAC) 股票今天会涨还是 Novellus Systems 股票会跌。相反，我可以交易 KLAC 和 Novellus 这对股票之间的相对价值。早期那些股票统计套利配对交易的经历，确实塑造了我迄今为止的交易生涯。


  **布尔昆：** 是什么让农产品配对交易比纯粹的股票配对交易对你更有吸引力？


  **赫明格：** 我喜欢研究过程和查看数据，这些技能是随着我在金融市场的职业生涯发展和自信心的增强而不断积累的。我想这个过程真正开始于 2006 年。随着我对基于关系驱动的交易信心增强，我开始取得持续稳定的交易成绩。


  我当时交易原油曲线、布伦特原油曲线和布伦特原油。我也在交易取暖油与 ICE 柴油期货的价差。我关注的这些不同的关系都给我提供了许多交易机会。有些机会纯粹基于统计度量，有些基于技术度量，还有些基于模式识别度量。无论如何，每一步都让我以不同的方式武装自己，而所有这些工具都是我目前在定义现在和未来的交易时所使用的。


  **布尔昆：** 如果有人想像你一样开始做农产品配对交易，他们应该从哪里入手？他们应该关注和监控什么？


  **赫明格：** 芝加哥商业交易所（CME）显然很棒。那是交易农产品价差的第一场所。对于刚开始感兴趣或想浅尝农产品交易的人来说，CME 的网站上有大量的信息和学习机会。


  **布尔昆：** 我还没有问你，你做这些价差交易时，典型的头寸规模是多少？你用什么来确定你要投入多大的头寸？


  **赫明格：** 我用来决定头寸规模的首要因素是每跳动一个点值多少钱。你需要非常清楚所交易产品的保证金是多少。我会参考简单的平均真实波幅（ATR），并回顾过去
  20 个交易日的表现，以了解价差的波动性。然后，我会将保证金的数额与我的账户规模、波动性联系起来，并逐步建立头寸。我使用的单位规模与波动性、保证金和合约规模相关。


  **布尔昆：** 基于 ATR 和其他因素，你确定要投入的规模，如果交易开始对你有利，就会逐步加仓？


  **赫明格：** 是的，没错——而且这些价差提供了巨大的流动性。这些价差大多数都不缺乏流动性，所以交易者在尝试交易农产品价差时也应该注意流动性。


  **布尔昆：** 如果你在做一个长期交易，恰逢有经济数据公布，你会怎么做？是继续持仓？还是密切监控？你怎么处理？


  **赫明格：** 显然，你会在这些报告发布期间监控你的交易。比如，有一个由美国农业部（USDA）发布的经济报告，叫做 WASDE——世界农业供需展望报告。




  我持有 WASDE 报告。WASDE 数据每月公布一次，而我的大部分交易持仓时间会略长于三到四周。因此，在这些农产品数据发布时，我通常持有头寸。


  **Bourquin：** 报告的发布有没有因为市场波动太大而让你止损离场？


  **Hemminger：** 我从不愿因为情绪化的市场反应而止损，所以我会移除市场中所有的止损单。我不想因为反常的市场反应，或算法失控人为地将市场推向某个方向而被迫离场。因此，在那些波动性较高的时期，我实际上会移除止损单。过去从未因为这样做而吃过亏，因为当这些数据刚刚公布时，主要引发的是市场的人为反应。


  当然，报告的发布显然可能会影响未来的市场走势。但某种程度上，由于我采取的持仓方式，我给了自己选择权和足够的时间，可以耐心观察市场的变化以及市场如何真正消化这些新闻稿。因此，我倾向于不让这类高波动性事件把我震出交易。


  **Bourquin：** 话说回来，在某个时点移除止损单肯定还是会让人有点担心。也许部分农产品相关的消息已经被市场消化，所以如果出现干旱或收成减少导致蒲式耳产量下降，你也不会完全措手不及。但是，我仍然可以想象，你在没有止损单的情况下操作的那段时间，心情肯定还是会有点紧张。


  **Hemminger：** 是的，确实会。这就像交易非农就业数据一样。每个交易该数据的交易者，无论他们是否持有头寸，内心都会有那么一丝兴奋又焦虑的感觉，并据此做出反应。


  根据我的经验，我发现跟随其他交易者的反应而动，通常并不是一个让我免于被止损出局的好方法。过去，我通过交易经济数据发布以及围绕数据产生的价差，赚过不少钱。因此，我倾向于不因市场最初的条件反射式反应而过于慌乱或过度纠结。我会让市场重新评估它想要到达的位置，然后再做出退出或进入交易的决定。


  ### 唐·米勒


  *期货专家***唐·米勒**是一位顶级基金经理、备受推崇的导师和交易教育家，同时也是芝加哥商业交易所（CME）的会员。米勒采用技术分析方法，结合多个日内时间框架进行交易，学会了识别并买入市场中的价值洼地，他形容自己是一个“流动性提供者”。


  *米勒最初从股票交易起步，后来转向期货市场，通过不断学习和适应，在那里取得了成功。然而，尽管他具备了一位大师级交易员的稳定性和自信，但他也没能逃过 MF Global
  暴雷事件。在成为该丑闻的受害者后，他积极倡导改革，坦诚地讲述了自己的经历和对改革的呼吁，并最终追回了丢失的资金——以及他对交易的热情。如今，成千上万的人关注他的交易日志和博客（[DonMillerBlog.com](http://DonMillerBlog.com)）以及他的教育网站（[DonMillerEducation.com](http://DonMillerEducation.com)）。*


  **蒂姆·布坎：** 我们来谈谈你的交易类型，从你的时间框架——日内交易者还是波段交易者——以及你交易的品种开始吧。


  **唐·米勒：** 我的时间框架主要是日内交易。我交易 E-mini 标普期货，自 2004 年起就是芝加哥商业交易所（CME）的会员了。因此，我想我会把自己的交易风格定义为流动性提供者，在日内批发性买入，然后零售性卖出。


  我的持仓时间通常很短。我非常擅长在极短的时间周期内解读市场，而一天之中充满了批发的机会。我相信“一鸟在手胜过双鸟在林”，这些年来我基本上就是这么交易的。


  **布坎：** 我想请教你提到的几个术语。首先，你说你从事的一种交易方式是提供流动性，这是什么意思？


  **米勒：** 基本上，市场最棒的一点——尤其是 E-mini 市场，这是地球上流动性最强的工具之一——就是当有人想买入或卖出一份期货合同时，这笔交易的对手方需要有人存在，交易才能达成。能够提供流动性的人越多，能够成为交易对手方的人就越多。而交易对手方越多，市场流动性就越强，波动性也就越低。


  向市场提供流动性有稳定市场的好处，而且任何时候有人想买入或卖出，你本质上就充当了交易的对手方。


  显然，除非我们自己也有机会，否则我们不会提供流动性。我们通过利用和预测市场周期、预测那些可能向某一方向过度拉伸的市场、或者预测那些正在朝着新的最小阻力路径移动的市场来寻找机会。总的来说，我们能够以比买入价更好的价格卖出产品。这并非每次都能成功，但这是我们的意图，也是我们的目标。


  **布坎：** 向市场提供流动性与单纯进行方向性交易以获利，两者有何不同？


  **米勒：** 在很细致的层面，我认为区别在于，如果你是挂着买价或在买价下方等待，并允许别人卖给你，那么从技术上讲，你就是在提供流动性。另一方面，如果你决定无论如何都要进场，那么你就会直接以卖价买入。在后一种情况下，是别人在向你提供流动性。


  具体做哪一种，有时界限有点模糊。但总体来说，结果是市场成交量增加，市场参与度提高，从而形成一个更流畅的市场。


  但是，提供流动性包含投机成分吗？你在提供流动性的同时，能否进行方向性交易？当然可以。我最近的一次交易就是个很好的例子。我没有做太多流动性提供，除了在中午市场开始回落的时候，我挂着买价，希望如果有人需要卖出，他们可以卖给我。除了那个非常有限的窗口期，我都在进行方向性交易，进行投机，并让自己进入市场。


  **布坎：** 当你提供流动性并试图在买价买入时，是否会涉及到更短的时间框架？


  **米勒：** 嗯，这真的得看情况。持仓时间取决于当前处于哪个周期。我相信市场在各个时间框架上都是按周期运行的。


  如果时间框架恰好是一个五分钟的盘整期，而更高时间框架在顺风还是逆风方面又不确定，那么持仓时间可能会非常短。另一方面，如果你刚刚突破盘整，或者处于小时级别的清晰动量趋势中，那么持仓时间就可以更长一些。


  持仓时间的长短，实际上并不取决于你是主动进场还是被动进场（即提供流动性）。它真正取决于当时市场所处的周期。


  **布坎：** 那“批发性买入”呢？听起来很棒。我们总想得到折扣或好交易。但它在股票市场是如何运作的？你是如何在买价买入，然后以卖价卖出的？




  #### 对话：Miller 与 Bourquin


  **Miller:** 当我说“批发”时，这不一定意味着你总是在买入价（`bid`）上购买。如果你仅仅在买入价上买入或卖出价（`ask`）上卖出，那么本质上你总是在与市场的即时方向对着干。如果这就是你做的全部，那很可能会是一条通往“穷农场”的捷径。


  想象一下，如果你进行的每一笔交易，基本上都是在别人卖出时买入，或者在别人买入时卖出。这根本行不通。但通过将这种情况与在必要时机进入市场相结合，机会就在其中。


  所以，当我们谈论“批发”时，我再强调一次，我并不是说你一直守在买入价上，这是你入场的唯一方式。如果市场处于非常明显的上升趋势，或者突破了盘整区间，最小阻力路径已明确转向上涨，而你想进入市场，你会希望能在其突破后回调时入场——但市场可能根本不会回调。


  当我使用“批发”这个词时，我更多的是把它当作一个参考点。我认为的“批发”是与市场未来的位置相比较而言——这可能是五分钟、十分钟或一小时之后。批发意味着以有吸引力、合理且比未来更便宜的价格获得一件产品——无论是`E-mini`指数期货、股票、`Tiddlywinks`游戏棋还是杂货店的香蕉。


  **Bourquin:** 那么，我们是在谈论你认为在短期内被低估的东西吗？这就是我们真正在说的吗？


  **Miller:** 嗯，我主要依据技术分析进行交易。当我说“技术分析”时，我指的是使用一组能准确描述市场流动的指标组合。我的交易基于这些指标，它们帮助构建了当前市场流动和预期的未来方向。基于这些信息，市场将走向何方通常是相当清晰的。


  在使用“价值”这个词时，我想非常谨慎。当我们谈论这个市场上的价值时，价值本质上是由人类情绪创造的。市场上有无数交易者，他们处于不同的时间框架，经验水平各异，根据他们的行为，他们会把市场推向一个走势不可持续的位置。


  假设你有一个疯狂上涨或下跌的失控市场。这种市场长期来看是不可持续的，当你能识别出市场中那些走势不可持续的点时，那么，借助技术分析的框架，你就能够成为一个批发商。


  **Bourquin:** 那么技术分析会告诉你某件事是否不可持续，并准备反转方向或突破原有的某个区间吗？


  **Miller:** 它有助于构建人类情绪。去年我做现场培训时，我正在和某人讨论如何教别人做这件事。他说：“停一下。你刚才说了一句我从没听别人说过的话。你在试图教授市场感觉。”我说：“没错。”他说：“这太疯狂了！感觉是教不会的。”我说：“恕我不能苟同。市场和它提供的机会都是基于感觉的。”


  现在，当我说“感觉”时，我并不是指你醒来后只是“感觉”某样东西要上涨。我说的“感觉”是指你基于经验和技术分析，对市场将要做什么有一种判断。


  一旦你交易了一段时间，技术分析就更多地变成了一种确认。当你一遍又一遍地交易同一个产品时，你就像了解自己的孩子一样去了解这个产品。你会了解它们的习性、个性和节奏。这就是我坚信只交易一个市场的原因。


  当你习惯了那个“孩子”后，你会非常非常了解它。你将能够预测它的节奏。当我说“感觉”时，我指的是技术分析。这就像把一个尺子、一把标尺或某种测量工具放在你非常熟悉的节奏和模式上，并通过技术分析获得确认。


  **Bourquin:** 作为芝加哥商业交易所（`CME`）的会员，这给你的交易带来了什么优势？


  **Miller:** 降低了交易成本。对于那些在一天中进行频繁交易的人来说，我确实如此，为了激励增加市场流动性，交易所允许人们购买交易所的席位，或者像我的情况一样，以非常适度的月租费租赁一个席位。通过这样做，我们能够获得降低的佣金。这无疑有助于我们的业务，改善我们的成本结构。它也提供了更多的成交量、更多的流动性，以及对市场更多的稳定性。


  **Bourquin:** 你仍然使用普通的在线经纪商来执行你的交易吗？


  **Miller:** 当然。


  **Bourquin:** 但因为你是芝加哥商业交易所的会员，他们向你收取的费用更低吗？


  **Miller:** 是的，每个人都从中分一杯羹。芝加哥商业交易所收取他们的费用，你合作的经纪商会得到他们的部分，还有一小部分流向美国全国期货协会（`NFA`）。费用有多种组合，经纪商所得到的金额几乎总是相同的。我确信他们可能会对高交易量的交易者给予折扣，但总的来说，这些部分可能相当固定。


  芝加哥商业交易所有一个折扣费率表，该表基于你与他们的会员类型以及你的交易量。这实际上会设定你的交易价格。你与他们的交易量越大，会员等级越高，你的费用就会越低。


  例如，如果你购买了一个席位，与租赁席位的人相比，你会获得更低的费用。我租赁了一个席位，所以我的交易价格比散户投资者要好，但不如那些实际购买了席位的人。


  **Bourquin:** 但无论你为这个租赁支付多少费用，净效果还是划算的。你每个月都在省钱，因为你做了足够的交易量来弥补租赁成本，对吧？


  **Miller:** 绝对正确。实际上，我引导交易者进行一个非常简单的盈亏平衡分析，即确定你当前支付的费用，以及你一个月需要交易多少合约，才能使租赁费用基本上自我抵消。


  这些年来，租赁价格已经下降了。它们确实已经到了一个价格点，如果你在一天中还算活跃的话，租赁一个席位确实是有意义的。我认为现在的费率大约在每月 400 到 500
  美元之间，你可以非常非常快地赚回这笔钱。


  **Bourquin:** 谈谈你作为一名交易员的演变过程。在你最终形成目前的方法之前，你刚开始交易时是否尝试过很多不同的东西？


  **Miller:** 我的交易随着时间的推移不断演变，从股票到交易所交易基金（`ETF`），当时我交易的是`NASDAQ`指数、`QQQ`和`SPY`。然后，在
  2003 年，我转向了期货，对我来说，这是最纯粹的交易领域。你在积极地买入和卖出，你真正地自食其力，没有中间方，你直接与交易对手方进行接触。


  这就是我的演变过程，但这确实花了很长很长时间，而且我经历了很多次失败的起步。




  我整理出的这套训练计划名为“水母计划”，得名于水母。为了生存，水母必须适应环境。它们需要灵活应变，无论被冲入海洋的哪个角落都得就地觅食，而且无法自主产生动力，因此只能随波逐流。交易的精髓正在于此——无论是判断哪个市场最适合交易，还是诊断当前市场环境并相应调整策略，道理都是一样的。


  我认为，我们这些多年来有幸跨过成功门槛的人，早已明白一个道理：这无关乎我们自身，无关乎我们的自负，也无关乎我们觉得**应该**发生什么。关键在于识别并理解实际发生的情况，然后让自己顺应这个趋势。


  **布尔昆：** 您能概述一下您的技术分析方法吗？


  **米勒：** 我信奉简单至上。真的。有意思的是，有很多研究都说技术分析没用。这些研究可能确实没错，但所有结论的谬误在于，它们是孤立地看待各种指标。


  例如，有很多文章论述为什么移动平均线、随机指标、指数平滑异同移动平均线（MACD）或支撑位和阻力位不管用。我基本同意这些观点，但附带着一个前提：这些指标单独使用确实无效。但我和其他许多成功人士，都是将这些指标结合起来运用的。


  如果你了解市场正在形成趋势，并想知道它是在哪个时间框架内形成的，你可以通过移动平均线、随机指标以及支撑位和阻力位等技术指标来衡量。真的，你需要的就这些。市面上成百上千种不同的指标中，你只需要寻找少数几个。你寻找的是能定义动量、趋势以及必须采取行动的关键时间点的工具。


  我大概能随口说出十几个衡量动量的指标，以及十几个衡量趋势的指标。人们往往沉迷于这个“最炫”的指标、那个“最高级”的指标。但我就化繁为简，只用少数几个指标。


  **布尔昆：** 您有最喜欢的衡量动量的指标吗？


  **米勒：** 我用随机指标，但我也确信 MACD 也很好用。市面上也有一些自定义指标衡量动量，但我就用移动平均线、随机指标、支撑位和阻力位，仅此而已。


  我还用一个叫“三线突破图”的指标，这是一种不基于时间的线形图，纯粹聚焦于价格。因此，它有助于界定趋势和反转点。只要市场没有回撤跌破或上穿某个特定价位，三线突破图就是一个极好的指标。


  我还会在多个时间框架下审视一切。我有一分钟图、五分钟图、十五分钟图、小时图和日线图。我并非只使用技术指标或技术分析。我在不同的时间框架上运用这些工具，试图理解市场当前所处的周期时间框架。市场看起来可能风平浪静，但它可能只是在更高时间框架内酝酿一场巨大的多头或空头大战后的盘整。在五分钟图上，趋势可能非常强劲，但小时图或日线图的趋势可能实质上是向下的。换句话说，我得确保自己在森林里砍树时，森林本身可没着火。


  **布尔昆：** 我们换个话题，谈谈我知道您过去一年在交易生涯中遇到的一个挑战，那就是成为 MF Global 的客户。能聊聊那段经历吗？您最初是如何发现出了问题的？当时是什么感受？


  **米勒：** 我发现问题时，是突然之间我试图下一笔订单，但我的下单平台却不让我执行交易。


  那天是万圣节，我就知道出事了。我当时是空仓，于是打电话给我的经纪商问：“怎么回事？” 在接下来的几个小时里，消息开始逐渐浮出水面，结果发现我的经纪商已经关闭了所有
  MF Global 账户的访问权限。


  据我所知，在交易大厅交易的人被锁在了大楼外，而像我这样进行电子交易的则被切断了连接。这就是发生在我身上的事。这开启了行业内长达一年的斗争，不仅在我的交易生涯中，也在整个行业的生命里，成为了一段非常悲伤和艰难的篇章。


  就所发生的事情本身而言，那是一段非常非常难熬的时期，而随后几个月里，相关部门未能真正采取应有的行动也同样令人悲哀。


  **布尔昆：** 而且这是个持续存在的问题。那段时间您还在交易吗？还是在试图重新获得账户访问权限并追回资金？


  **米勒：** 在短时期内，所有资金都被冻结了。我忘了具体多久，但大概一个月左右，托管人才进行了第一次分配。所以有一段时间，我算是被迫休假了。


  然而，在那段时间里，我比以往任何时候（甚至作为交易员时）都更加努力地工作，因为我们一群人立刻团结起来，试图就我们认为应如何处理这种情况发出我们的声音。大约一个月左右，我无法交易，但随后我们最终追回了大约
  80% 的资金。我们很快拿回了大部分钱，但要拿回剩下的钱，可真是场持久战。


  **布尔昆：** 您目前已经追回了 80% 吗？


  **米勒：** 实际上，之后我卖掉了我的债权。在这个过程中我学到的一件事是，地球上的一切似乎都可以交易。连破产债权都能交易。有些人愿意投资破产债权，因为他们相信随着时间的推移，通过清算行动，他们最终能够卖掉这些债权。他们低价买入，将来以更好的价格卖出这些债权，从中获利。这背后有一个市场，主要是在债券市场。


  在我们为我们认为应如何处理这一情况而奔走呼吁，并同时继续开展我们业务的同时，我们一直关注着这些债权的交易价格。尽管投资者都拿回了 80% 的资金，但根据托管人向法院陈述的情况以及收集到的信息，我们知道最终我们拿回全部——或接近全部——资金只是时间问题。


  有趣的是，起初所有这些秃鹫基金都冒出来说：“我们买你的债权，每美元付你 82 美分。”那些真的不明白怎么回事，或者不了解一旦法律上的繁琐手续理清后大部分钱就能追回的人，可能就以那样的价格卖掉了，事后想必追悔莫及。但我们这些了解内情的人，则眼看着价格随时间上涨。一旦价格涨到每美元
  97 美分，我就决定卖掉我的债权，因为剩下的那点差额我在很短很短的时间里就能赚回来。


  差不多整整一年后，我已经把那段经历抛诸脑后了——至少在精神层面是这样。但我要说，有那么一小段时间，我对这个行业的热情消失了。当我试图让人们理解这个行业是多么美妙，以及它为从事期货行业的人们提供了多么周全的保护时，我的挫败感与日俱增。那是一场艰苦卓绝的斗争。


  我人生的那一章现在已经彻底翻篇了。我可以全力以赴地专注于从业务角度我需要做的事情，而那份热情也正在回归。




  **Bourquin:** 唐，你还在为此事担忧吗？我们仍然不清楚 MF Global 到底发生了什么，他们还在试图查明真相。几个月后，Peregrine Financial
  Group [PFG] 倒闭了，看起来钱都不见了。谁知道那些投资者会怎样？你担心这类事情会再次发生吗？我认识一些人，他们从 MF Global 转到了 PFG，结果同样的事情又发生在了他们身上。这简直难以置信。


  **Miller:** 我已经大幅减少了我在期货方面的敞口。现在我的资本足够为我参与的交易提供必要的支持了。存放在期货账户里的钱，本应比存在银行账户里的钱更安全。


  我给所有人打的比方是这样的：找六个人手拉手围成一个圈，在圆圈中间放一个保险箱。问这六个人，他们是否愿意把钱存在那个保险箱里。他们环顾四周，看到有很多保护措施，于是说：“我们当然愿意。”
  而在 MF Global 和 PFG 的案例中，实际情况是，保险箱被人撬开、洗劫一空，甚至烧得面目全非，而整个过程却无人察觉。


  整个情况就是这么荒谬。有那么多保护措施、监管架构、规则和法律来保护我们——甚至远超银行提供的、为一定额度损失提供小额保险的保障。结果却是所有人都失职了。监管者同样失职了。他们没有及时发现问题，最终当事情败露时，所有利益相关方开始互相指责。CFTC
  说：“不是我。” MF Global 说：“不是我。” 简直就像《家庭马戏团》漫画里的场景。


  过去一年里，我们非常非常努力地工作，旨在追究相关人员的责任，这也是债券价格像那样上涨的原因之一。同时，这也是我们能够尽早而不是更晚收回资金的原因之一。


  但我确实感到担忧。我的资金还会像以前在期货市场里那么多吗？不会。这会阻止我开展业务吗？当然不会。有句老话怎么说来着？“骗我一次，是你坏；骗我两次，是我蠢。”


  正如我最近在一篇博客文章中写道的那样，我不打算成为每次都会被脚凳绊倒的迪克·范·戴克。我计划下次要成为那个绕过脚凳走的人。


  ## 章节


  ### 查尔斯·杰曼


  *虽然他 20 多年前就在芝加哥期货交易所场内开始了职业生涯，但* `Charles German` *解释说，2005 年他采用趋势跟踪策略，才是最终让他在交易中达到新高度的原因。他现在使用自动化交易系统*
  *来梳理市场寻找交易形态、设置市价单和止损单，并且几乎不需要人工干预即可执行交易。*


  *虽然全自动交易可能是许多交易者的梦想，但杰曼是通过数千小时细致入微的历史回测，以及在此过程中吸取的一些代价高昂的惨痛教训，才将其变为现实的。通过要求他的策略在所有市场和市场条件下都有效，他无需追逐交易或追逐当下热门的形态或策略。杰曼是一位独立交易员*
  *和交易教练，任职于加利福尼亚州的 [CharlesGermanTrading.com](http://CharlesGermanTrading.com)。*


  **Tim Bourquin:** 你如何给自己分类？你是波段交易者还是日内交易者？你如何界定自己从事的交易类型？


  **Charles German:** 我肯定会被归类为趋势跟踪者。


  **Bourquin:** 对不同的人来说，趋势跟踪者可能意味着不同的事情。对你来说，它意味着什么？


  **German:** 对我来说，趋势跟踪基本上意味着使用系统化的方法来交易一篮子市场，并试图捕捉我所交易市场中出现的任何有意义的趋势。


  **Bourquin:** 你主要跟踪日线图吗？


  **German:** 是的。我做的更多是中长期的跟踪项目。对于日内交易者来说，我的时间框架可能感觉像光年那么长，但我的交易通常持续从五天到三四个月不等。


  **Bourquin:** 跨度相当大。我们稍后会聊到是什么触发你的交易入场和离场，但为什么趋势跟踪对你如此有效？


  **German:** 我不太确定为什么趋势跟踪对我来说似乎比其他方法更有效。我想也许是因为它是一个非常严格、基于规则的方法。


  我交易了很长时间，过去总是使用自由裁量权和各种不同的指标试图去抓顶摸底。但当我接触到趋势跟踪这个独立的项目时，它真正巩固了我多年来一直试图做的事情，那就是拥有一套可以在任何市场上进行回测的严格规则。这确实让趋势跟踪成为了我交易的重心。


  **Bourquin:** 当我们谈论趋势跟踪时，我们只是在谈论跟踪一个在数周内处于主要上升或下降趋势的市场吗？一笔交易最初是如何出现在你的“雷达”上的？


  **German:** 我使用小时图、日线图或周线图来确定趋势，这里你可以使用几种不同的方法。你可以使用反转方法，即你总是持有多头或空头头寸；突破方法；动量方法；或者多种方法的组合。例如，一种反转方法是双均线系统。在双均线系统中，当移动平均线交叉时，就会显示趋势是上升还是下降。如果快均线上穿慢均线，你就做多。如果它下穿回去，你就做空。你始终持有头寸。


  关于突破策略，当一个市场突破一个区间时——这个区间可能是五天区间，也可能是五百天区间——你就顺着突破的方向建立头寸，并根据你的测试来微调你的止损点。


  **Bourquin:** 你是一直在回测市场，以找出某些趋势在哪个市场上表现最好吗？还是说你过去已经回测过交易，因此现在知道在特定市场中哪种方法最有效，并能将其应用于未来？


  **German:** 最初，趋势跟踪涉及大量的回测和成千上万次的测试，包括对各类不同市场、采用各种不同趋势跟踪策略以及止损和止盈方法进行的数百万次迭代。有一个初始阶段，你一天要花十个小时进行回测，但之后你会进入一种节奏，基于你的回测结果确定什么有效。


  我在几年的时间里做了大量的回测，这巩固了我想要交易的市场、我想要遵循的程序，以及什么对我来说有效、什么无效。现在，每当我们经历回撤，或者每当我想质疑或测试自己时，我都会做一些回测。但最终，我总是会回到我最初的那套测试结果，而那正是我多年来一直赖以交易的基础。


  **Bourquin:** 你是否需要完全改变你的策略？听起来你找到了适合你的趋势跟踪策略，并且它们多年来一直表现良好。你认为大多数经过回测的策略都是这样吗？


  **German:** 一个经过回测的策略能否长期表现良好，取决于该特定策略的回测方式。一个经过回测的策略在纸面上可能看起来很棒，但在实际交易中却可能赚不到钱。




  #### 关于策略回溯测试的对话


  话虽如此，我不会交易任何未经测试的东西。也许我现在就是这样思考的，因为我从事策略回溯测试已经很久了，这已经成为我的习惯。当有人说他们在市场上做这做那的时候，我总是问他们：“你怎么知道你的策略是有效的？你测试过吗？”如果他们说“没有，我没有测试过”，我会说：“你甚至怎么知道它能用？你怎么能交易它？在经历困难时期时，你怎么可能有任何信念？”


  一般来说，没有对自己的策略进行过回溯测试的人，在遇到回撤时会感到气馁并放弃交易。购买一个系统也是如此。你不能花 1000 美元买个系统，然后就投入真金白银或寄予厚望。我总是对每一个问我关于回溯测试的人说同样的话：你需要卷起袖子，需要彻底地测试方方面面，上下左右，在所有不同的市场中进行测试。你需要疯狂地测试你的系统，这样在艰难时期你才会有信心。即便如此，也无法保证它在未来一定有效。


  **Bourquin:** 你不仅测试策略，还测试它在哪些特定的市场中表现最佳。这两个测试是一起进行的吗？还是某个策略在一个市场中表现最好？


  **German:** 我尝试了很多不同的趋势跟踪策略，包括独立策略和相互配合的策略。我试图在大约 35 个不同的期货市场上测试它们，因为我一直交易期货。


  理论是，如果一个策略在所有市场上都不奏效，那么你就做了一些曲线拟合，或者它根本就不靠谱，不够稳健。在我对 30 多个期货市场进行的所有回溯测试中，有很少一部分——大概六个左右——我的策略在三十多年的时间里没能奏效。但它对所有其他市场中的每一个都有效。


  我不会区分市场，然后说我的策略在这个市场非常有效，所以我只在这里交易。我认为关键是拥有一个市场组合，这样当这十个表现不佳时，那五个表现很好，而这四个则波澜不惊。


  **Bourquin:** 你交易最多的前三个市场是什么？


  **German:** 我没有前三名。我现在在我的投资组合中交易 20 个不同的市场。说我有交易的最佳市场，就等于说我在猜测今年的趋势会在哪里，但你不能那样做。你拥有所有这些不同的市场，并期望其中一部分会出现趋势。我真的没有偏好的市场。


  **Bourquin:** 我喜欢这个理念，因为如果趋势不在那里，你就不必强行交易。你有一个可以观察的基地，你可以去趋势所在的地方。


  **German:** 完全正确。


  **Bourquin:** 你通常同时在交易多少个头寸？


  **German:** 我可能从零到十到十五个不等。


  **Bourquin:** 我们来谈谈进场和出场。你是如何设置止损和找到进场点的？你能谈谈过去一周或一个月里你做的一笔最近的交易吗？有什么好的、典型的、Charles
  German 式的交易可以聊聊？


  **German:** 我最近有一个非常好的月份，那是因为我在一个理想的时机建立了谷物多头头寸。它们正在突破持续了大约六个月的盘整区间。


  我们正处于 50 年来最严重的干旱之中，玉米、大豆和小麦的价格都一飞冲天。你现在看那张图表可以清楚地看到，有人在某个主要趋势上赚了钱。


  **Bourquin:** 当你谈到某个在区间内盘整了一段时间的东西的突破时，你是希望单日 K 线收盘价突破，还是希望整个 K 线都在价格之上？具体来说，你的触发点是什么？


  **German:** 进入交易有不同的方法。有些人要求收盘价高于突破位，有些人要求收盘价高于趋势线，还有其他人要求收盘价高于移动平均线。


  **Bourquin:** 你的入场策略需要很大的信心吗？


  **German:** 是的，坚持整个系统需要巨大的信心。但是，再强调一次，你回到你的回溯测试，我测试了收盘价之上、收盘价之下、以及被*X*个范围或*X*距离突破的情况。我测试了所有不同的入场点，找到了最适合我心理的入场点，并且我对它非常有信心。


  **Bourquin:** 你是用测试来确定止损点，还是使用其他方法？


  **German:** 是的，当然。趋势跟踪者需要测试三样东西：他们的入场、他们的止损和他们的退出。这些是趋势跟踪者的基本工具，你需要同时测试这三个。


  **Bourquin:** 你的止损设置得有多远？


  **German:** 你希望你的止损是动态的，希望它们根据市场情况自动调整。我通常使用平均真实波幅（`ATR`）的函数。我会把止损设置得离我的入场点刚好足够远，以便我的交易有足够的空间运行。我的测试准确地告诉了我那在哪里。


  **Bourquin:** 这很有道理。你不希望把止损设置得太远，以至于你可能遭受重创。


  **German:** 止损的全部前提是截断亏损。我不会把止损设置得太远离我的入场价。如果一个交易开始波动然后立即反转，我就离场。然后我会等待它再次启动。一旦一个交易入场并且没有触及你的止损，你就让它自由发展。


  **Bourquin:** 我认为对于新交易者来说，最难的事情之一就是承担止损，然后准备好一天后或十分钟后，如果同样的信号再次出现，就做完全相同的交易。这最初对你是个问题吗，还是你只是说“测试结果就是这样，所以我就这么做”？


  **German:** 不，我完全知道这个。他们称之为“假突破”（`whipsaw`）。但是，你知道，这是趋势跟踪的一部分。你一直都会遇到假突破。然而，即使你被假突破折腾了十次，只要抓住一个良好的趋势，它就能弥补所有那些小的损失，因为你是在赚大赔小。


  **Bourquin:** 那你的出场点呢？你的利润目标是基于交易突破的区间上方某个前期高点吗？


  **German:** 我想最简单的解释是我使用的是移动止损。随着交易价格上涨，止损点随之移动，你可以使用几十种不同的移动止损方法。我就是用这个来退出盈利交易的。


  **Bourquin:** 我能问一下你进行趋势跟踪和回溯测试时使用什么软件吗？


  **German:** 我使用很多不同的软件。我不想细数我用的所有软件，但我可以说，有几个便宜的选择可以做基本的回溯测试。然而，当你开始考虑数据的清洁性，以及如何为了长期回溯测试而融合不同合约月份和滚动期时，事情就变得棘手了。话虽如此，当我开始的时候，`TradeStation`是最容易学的。你真的只需要它就能开始。


  **Bourquin:** 一旦你进入一个盈利的交易并且趋势持续上涨，你会允许加仓或在现有头寸上增加规模吗？


  **German:** 我不会，因为这对我来说从没测试出好结果。Richard Dennis 和著名的海龟交易者曾经每半个`ATR`就增加一次仓位。这对他们有效，但根据我的测试，这不再有效了，所以我不加仓。我会建立一个核心头寸，然后就这样。


  **Bourquin:** 那减仓呢？你是怎么做的？



