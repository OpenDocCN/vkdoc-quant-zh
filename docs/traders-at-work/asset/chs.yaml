  500 指数`，分析它的强项和弱项。它的主要成分股是什么？它的前五或前十——甚至前二十或三十——大成分股是什么？我会观察这些成分股的表现如何，它们的成交量如何，它们的价格行为如何，因为这些将引领市场。


