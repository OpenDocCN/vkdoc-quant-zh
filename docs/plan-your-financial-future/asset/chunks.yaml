  trans: '

    # 慈善礼品年金


    如果你希望获得与剩余慈善信托相同的收益，但又不想聘请律师，可以考虑设立**慈善礼品年金**（CGA）。这种年金允许你向慈善机构捐赠现金或财产，作为回报，慈善机构将为你提供终身的年度收入流。与
    CRAT 的付款方式类似，CGA 的付款通常按预定的固定金额分配，因此随着通胀上升，你的购买力可能会下降。不过，慈善机构可以为年金购买生活成本附加条款，使你的付款跟上通胀步伐。


    请注意，与其他慈善捐赠一样，为换取 CGA 而进行的资产转让是不可撤销的，这意味着一旦你开始领取收益，就无法回头。此外，请牢记，如果决定实施 CGA，你需要确保年金付款的现值小于未来将转移给合格慈善机构的财产现值。如果两者金额相等，或者你的年金付款现值超过未来将转移给慈善机构的财产现值，你就无权享受慈善所得税扣除。例如，假设美国糖尿病协会已为你购买了
    CGA，你确定从该 CGA 获得的年金付款现值为 50 万美元。那么，你未来转移给美国糖尿病协会的财产现值必须超过 50 万美元。否则，即使你选择逐项扣除，也无权享受慈善所得税扣除。


    ## 致敬，致敬你亲爱的母校


    如果 CRT 和 CGA 都无法引起你推进慈善事业的兴趣，不妨考虑通过**集合收入基金**（PIF）向母校捐赠留本基金。此类基金由作为赞助方的教育机构设立并管理，该机构将你的捐赠与其他捐赠者的资金合并，并以自身名义进行投资。机构和基金经理进行的投资不能包含免税证券（如市政债券），但除这项特殊规定外，集合收入基金的运作方式与标准共同基金非常相似。


    参与集合收入基金的流程相对简单。首先，母校的遗产规划办公室会联系你，向你说明基金的条款和限制。接着，你向基金转移财产（通常为现金），从而获得该基金的终身收益权，而现金或财产的剩余权益将转移给该教育机构。你从基金获得的实际付款金额，取决于你按比例分得的基金经理年度收益份额。然后，你就有权根据基金在你特定年龄和精算预期寿命下的年回报率，享受慈善所得税扣除。


    例如，假设你 55 岁，向母校的集合收入基金转移了 10 万美元现金。该基金由大学管理，年回报率为 6%。查阅相关表格后，你发现原始转移的 10 万美元中，大约
    33%将在你去世后转移给母校。因此，你有权享受 33,000 美元（10 万美元乘以 0.33）的慈善所得税扣除。只要你在捐赠年度的调整后总收入不超过 55,000
    美元（33,000 美元除以 0.60），你就可以扣除全部捐赠额。如果捐赠年度的调整后总收入超过 55,000 美元，你可以将差额结转并在未来扣除，最长结转期限为五年。


    ## 私募基金会


    私募基金会通常由个人或家族设立，形式可以是**非营利组织**（称为**运营型基金会**）或**慈善信托**（称为**非运营型基金会**）。运营型基金会将其大部分收入用于积极运营自身的慈善职能，例如维护博物馆、图书馆或历史建筑。相比之下，非运营型基金会不直接参与或积极运营任何慈善活动，而只是将资金分发给其他慈善机构供其使用。


    当今最著名的私募基金会或许是**比尔及梅琳达·盖茨基金会**。这是一个家族基金会，其目标是“为全球社区带来健康与学习领域的创新”。更具体地说，该基金会致力于关爱非洲受艾滋病毒或艾滋病影响的个人。由于比尔和梅琳达·盖茨亲身参与并投入个人资金推动其慈善活动，比尔及梅琳达·盖茨基金会被归类为运营型基金会，该基金会还吸引了超级投资者沃伦·巴菲特承诺捐赠
    300 亿美元，用于支持其日常运营和既定使命。


    通常，私募基金会通过汇集一笔本金（通常称为**留本基金**）来设立，随后这笔本金被用于投资。只有基金产生的投资收益——而非本金——被用于支出，无论是分发给其他慈善机构，还是服务于基金会自身的慈善工作，而使本金得以增长。基金会不得向其股东支付股息，但可以为其董事、高级职员和员工提供的服务支付合理报酬。根据现行法律，经过一定时期后，基金会必须每年进行符合条件的分配，总额至少为其净投资资产的
    5%。


    向私募基金会捐款的一个主要优点是，捐赠者有权在捐款当年享受所得税扣除。然而，如前文讨论的慈善扣除所得税限制所述，如果是一个非运营型私募基金会，捐赠者的税收扣除通常不得超过其捐款年度调整后总收入的
    30%。此外，对于增值股票或任何其他类型的长期资本收益财产的捐赠，扣除额限于捐赠者在股票中的成本基础，且不得超过其调整后总收入的 20%。


    富有的捐赠者之所以主要对设立私募基金会感兴趣，是因为他们在管理基金会投资基金方面拥有相当大的灵活性。换句话说，私募基金会的捐赠者可以控制基金会资产的投资和分配，同时可以培养其他家族成员，以最终管理基金会的累积财富。捐赠者还可以定制基金会的投资，以满足他们认为其他公共或私人慈善机构未能充分解决的特定慈善目标。


    设立私募基金会适合你或你的家人吗？除非你拥有充足的资金来创建和运营基金会，否则可能并不适合。但这并不意味着，如果你认同某个基金会的目标，就不能向其捐款。如果你确实决定向一个已被美国国税局批准为合格慈善机构的私募基金会捐款，你就有权在捐款当年享受慈善所得税扣除——不过，如果是非运营型私募基金会，扣除金额会比向公共慈善机构捐款的扣除额略低。

    '
- fmt: "# Donor-Advised Funds\n\nAnother possible option to further the philanthropic\
    \ goals of an individual or family is to establish a donor-advised fund (DAF),\
    \ which is an arrangement whereby a donor makes a gift to a giving account that\
    \ is managed by a commercially available mutual fund. A DAF is sometimes called\
    \ a charitable IRA. After contributing to a DAF, the donor can then make recommendations\
    \ as to the fund’s future disbursements to any qualified public charity. However,\
    \ because the donor can only make recommendations, the sponsoring mutual fund\
    \ is under no legal obligation to carry out or implement the donor’s requests.\
    \ Nevertheless, most DAFs do try to implement their donor’s wishes.\n\nDAFs have\
    \ several benefits. First, they offer donors the opportunity to create a low-cost,\
    \ flexible vehicle for charitable giving that is structured as an alternative\
    \ to direct gifting or the creation of a private foundation. There are no setup\
    \ costs to establish a DAF, and annual fees currently run at approximately 0.60\
    \ percent for the DAF and an additional 1 percent or so for expenses associated\
    \ with the management of the mutual fund or funds. Additionally, unlike the minimum\
    \ 5 percent disbursement requirement that is applied to private foundations, DAFs\
    \ are not subject to mandatory distribution rules. Finally, DAFs make it easy\
    \ to involve generations of families in philanthropy. As a result, you can imbue\
    \ in your children the philanthropic mindset of “giving back.”\n\nWhat about the\
    \ tax benefits of establishing a DAF? First, because a DAF is technically an extension\
    \ of a public charity, donors are eligible for the same maximum income-tax deduction\
    \ they would receive were they to contribute directly to a 50 percent organization.\
    \ A donor receives this deduction at the time of contributing to the fund, no\
    \ matter when the fund designates those contributions in the future. Next, current\
    \ tax law affords those who donate appreciated securities to a DAF an income-tax\
    \ deduction for the full fair market value of the donation. In addition, by donating\
    \ appreciated securities to a DAF and then advising the fund to make donations\
    \ to several charities, donors may obtain tax advantages without the necessity\
    \ of transferring these securities in kind to the recipient charities. Moreover,\
    \ donating to a DAF offers a way to avoid capital gains taxes that would otherwise\
    \ be due on the appreciated securities if they were converted to cash before being\
    \ gifted to a charity.\n\nFor example, assume that you are the owner of 1,000\
    \ shares of ABC stock, which has appreciated over the years from $20 per share\
    \ to $100 per share. Further, assume that you are in the highest marginal income-tax\
    \ bracket of 37 percent, which means your capital gains tax rate is 23.8 percent\
    \ in 2018 (including the 3.8 percent Obamacare surtax). You want to donate your\
    \ 1,000 shares of ABC stock to your public charity of choice, and because you\
    \ are aware that the charity is likely to cash in those shares upon their receipt,\
    \ you make the tax mistake of selling the securities yourself first and subsequently\
    \ gifting the cash to the charity. Your net cost in making this charitable gift\
    \ is $82,040, which is computed as follows:\n\n| $100,000 | Cost of donation |\n\
    | + $19,040 | Capital gains tax due (($100,000 less $20,000) times 0.238) |\n\
    | $119,040 | Total cost |\n| − $37,000 | Income tax saved ($100,000 times 0.37)\
    \ |\n| $82,040 | Net cost of gift |\n\nNow, suppose that instead of making your\
    \ charitable gift in this manner, you donate your 1,000 shares of ABC stock to\
    \ a DAF. You then advise the DAF’s managing mutual fund to transfer the cash proceeds\
    \ of the stock to your public charity of choice. Accordingly, your net cost in\
    \ making this charitable gift, using the DAF as a tax-exempt intermediary, is\
    \ only $60,400, which is computed as follows:\n\n| $100,000 | Cost of donation/total\
    \ cost (no capital gains tax due) |\n| − $37,000 | Income tax saved ($100,000\
    \ times 0.37) |\n| $63,000 | Net cost of gift |\n\nIn other words, by avoiding\
    \ the administrative and tax costs that you incur when making the gift of appreciated\
    \ securities directly to your public charity of choice, you effectively save $19,040.\n\
    \nYou must keep one final tax-planning principle in mind if you are planning to\
    \ gift property to a qualified charity. If the property appreciates in value from\
    \ the time you purchase it until the time you plan to gift it to charity, let\
    \ the charity subsequently sell the property. If you proceed in this manner, no\
    \ taxes of any kind will be due, because the charity is a tax-exempt entity. Alternatively,\
    \ if the property depreciates in value from the time you purchase it until the\
    \ time you plan to gift it to charity, you should sell the property before gifting\
    \ it to charity. Doing so permits you to take advantage of the loss in property\
    \ value on your income-tax return. If you do not claim the loss before gifting,\
    \ the allowable loss is lost forever, because the tax-exempt charitable entity\
    \ cannot take it either.\n\nIf you are interested in establishing a DAF, shop\
    \ the idea around first. Different mutual funds charge different annual fees to\
    \ operate, which reduces the amount of monies that can go to the charities you\
    \ wish to benefit.\n\nIn summary, the following are the planning techniques you\
    \ may wish to consider in accomplishing your philanthropic objectives. In all\
    \ cases, at least one tax deduction, and in some cases two or three (income-,\
    \ gift-, and estate-tax) deductions, may be permitted:\n\n* An outright or direct\
    \ gift to charity\n* A charitable remainder annuity trust (CRAT)\n* A charitable\
    \ remainder unitrust (CRUT)\n* A charitable gift annuity (CGA)\n* A pooled-income\
    \ fund\n* A private operating foundation\n* A private nonoperating foundation\n\
    * A donor-advised fund (DAF)\n\nWith this chapter, we have concluded our journey\
    \ of planning for your financial future and, specifically, slowly and consistently\
