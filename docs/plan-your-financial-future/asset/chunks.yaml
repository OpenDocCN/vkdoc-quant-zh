- fmt: '来自投资或商业财产的损失，在两个边际税级中，首先用于抵消任何资本收益；若有剩余损失，则可用于抵减薪资或工资（或任何其他非投资或商业财产收入），每年最高限额为3,000美元。任何超额损失将无限期结转，直至用完。例如，假设您或您的税务申报人报告您在2018年有4,000美元的长期资本收益和5,000美元的长期资本损失。您处于12%的边际所得税
    bracket。因此，您没有长期资本收益（已被长期资本损失完全抵消），但产生了1,000美元的剩余长期资本损失。因此，您可以用这1,000美元的总损失来减少您的薪资或工资（或其他非投资或商业财产收入），因为它低于本年度的3,000美元限额。


    一旦您知道了自己的边际所得税率（您可以通过查阅以往的纳税申报单，将应税收入金额与税率区间对照来确定），下一步就是计算出需要从工资中预扣多少税款以用于未来纳税。您可以通过获取并填写一份IRS表格W-4来完成此操作。填写此表格的目标是预扣相当于您预计在年底欠联邦政府税款的90%。如何做到这一点？IRS表格W-4允许您根据当前年度的预计收入来申请预扣免税额。免税额会减少预扣的税款金额，并增加您的实得工资。因此，申请的免税额越多，您的实得工资就越高；免税额越少，实得工资就越低。


    一些个人，特别是自雇纳税人，需要缴纳预估税款以代替所得税。然而，有些纳税人除了缴纳所得税外，还必须缴纳预估税款。例如，如果您是一名受薪雇员，但有大量额外收入，如租赁房地产收入，您可能需要缴纳这些税款。从退休计划中一次性领取大额分配的退休人员也可能需要缴纳预估税款。如果您是需要估算税款的纳税人，您的首次付款应在当前年度的4月15日之前通过提交IRS表格1040-ES完成，随后在6月15日、9月15日和次年1月15日进行付款。


    ## 社会保障和医疗保险税


    根据《联邦保险缴款法案》（FICA），所有受薪雇员必须缴纳其工资的7.65%（或从其工资中预扣）以资助社会保障和医疗保险社会保险体系。具体来说，在7.65%的总比例中，6.2%代表雇员为资助其自身的社会保障退休或残疾福利所做的贡献，而剩余的1.45%则用于资助医疗保险住院（A部分）项目。此外，一些年收入超过通胀调整后的20万美元（已婚联合申报为25万美元）的雇员，还需额外缴纳0.9%作为用于支付《平价医疗法案》覆盖范围的医疗保险补充税。社会保障预扣税仅针对雇员工资中不超过一定金额的部分（称为应税工资基数：例如，2018年为128,400美元），而医疗保险预扣税则针对雇员的全部工资，金额无上限。


    与州和地方所得税（某些纳税人可在联邦所得税中单独扣除，每年最高限额为10,000美元）不同，社会保障税和医疗保险税不可扣除。这实际上增加了个人支付的总体边际所得税率。例如，如果您处于37%的最高边际所得税
    bracket，由于无法从联邦所得税中扣除这些金额，您实际多支付了10.48%的税款（7.65%加上2.83%（0.37乘以0.0765））。


    ## 常规所得税与个人替代性最低税


    我们刚刚讨论了常规所得税系统最重要的规定——这是大多数纳税人必须防范的、对其累积财富构成持续威胁的税制。然而，某些高收入（以及部分中高收入）纳税人每年必须为另一种税制进行规划。这种税制被称为个人替代性最低税（AMT）。


    AMT是一种平行的税制，最初旨在防止少数高收入纳税人逃避缴纳常规税。在AMT系统下，纳税人需缴纳任何一年中常规税或替代性最低税中较高者。自2018年起，2017年《减税与就业法案》（TCJA）将AMT免税额提高至单身纳税人70,300美元和已婚联合申报夫妇109,900美元。该法案还在2018年后根据通胀对这些金额进行了指数化调整。然而，此免税额存在逐步取消机制，一旦纳税人的收入超过指定的替代性最低应税收入（AMTI）金额，免税额将不再适用。此外，26%或28%的AMT税率并非适用于您的常规应税收入，而是适用于单独计算的AMTI，实际上，它是您的常规应税收入加上常规系统中的某些“加回”项目。在AMT系统下不允许您享有的扣除和其他常规所得税减免项目通常被称为税收优惠项目。这些优惠项目包括：激励性股票期权（ISO）在行权日产生的收入部分、常规标准所得税扣除的禁用，以及学生贷款利息的任何扣除。


    那么，如何避免这一繁重税种的适用呢？首先，要了解什么是税收优惠项目（它们在AMT税表的单独说明中有描述），然后尽量限制此类项目。例如，如果您作为员工福利持有雇主提供的ISO，请尽可能推迟行权（理想情况下，推迟到您总收入相对较低的年份）。其次，尽管听起来很奇怪，您可以考虑将收入加速计入当前年度，以期将您的常规纳税义务提高到超过AMT的水平。最后，推迟那些在AMT中不能扣除的抵扣项至下一个纳税年度。此处面临风险的扣除项包括某些列举扣除项，例如州所得税和财产税的扣除。如果您目前居住在高所得税州，如纽约，您应请会计师或财务规划师单独计算您可能的AMT负债。另请注意，这最后两项AMT规划技巧与您在常规所得税规划中所做的正好相反。因此，AMT规划实质上要求您逆向思考，与您通常试图尽可能减少纳税的做法正好相反。'
  raw: 'Losses from investment or business property in both sets of marginal tax brackets
    are first offset against any capital gains and, if there is any remaining loss,
    are taken against salary or wages (or any other noninvestment or business property
    income) up to a maximum of $3,000 in any given year. Any excess loss is then carried
    forward indefinitely until used up. For example, assume that you or your tax preparer
    have reported that you have a long-term capital gain of $4,000 and a long-term
    capital loss of $5,000 in 2018. You are in the 12 percent marginal income-tax
    bracket. As such, you have no long-term capital gain (it is completely offset
    by the long-term capital loss), but you have incurred a remaining $1,000 long-term
    capital loss. As a result, you can use the total of this loss ($1,000) to reduce
    your salary or wages (or other noninvestment or business property income), because
    it is less than $3,000 in the current year.


    Once you know your marginal income-tax rate (you can determine this by referring
    to past tax returns and checking the amount of taxable income against the bracket
    range), the next step is to figure out how much to withhold from your paycheck
    for future taxes. You do this by obtaining and completing an IRS Form W-4\. Your
    goal in completing this form is to withhold taxes equal to 90 percent of what
    you think you will owe the federal government at the end of the year. How do you
    do this? The IRS Form W-4 lets you claim withholding allowances based on your
    projected income for the current year. An allowance reduces the amount of taxes
    withheld and increases the amount of your take-home pay. Therefore, the greater
    the number of allowances claimed, the higher your take-home pay; and the lower
    the number of allowances, the lower your take-home pay.


    Some individuals, notably self-employed taxpayers, are required to pay estimated
    taxes in lieu of income taxes. However, some taxpayers must pay estimated taxes
    in addition to their income taxes. For example, if, as a salaried individual,
    you have a great deal of additional income, such as rental real-estate income,
    you may have to pay these taxes. Retirees with a large lump-sum distribution from
    their retirement plan also may be required to pay estimated taxes. If you are
    a taxpayer who is subject to estimating your taxes, your first payment is to be
    made by filing IRS Form 1040-ES on April 15 of the current year followed by payments
    on June 15, September 15, and January 15 (of the next year).


    ## Social Security and Medicare Taxes


    Under the Federal Insurance Contributions Act (FICA), all salaried employees have
    to pay (or have withheld from their paycheck) 7.65 percent of their salary to
    fund the Social Security and Medicare social insurance systems. Specifically,
    6.2 percent of the total portion of 7.65 percent represents the employee’s contribution
    to fund their own Social Security retirement or disability benefit, and the remaining
    1.45 percent helps to fund the Medicare hospitalization (Part A) program. Moreover,
    some employees—those earning in excess of an inflation-indexed amount of $200,000
    annually ($250,000 married filing jointly)—pay an additional 0.9 percent as a
    Medicare supplemental tax used to pay for Affordable Care Act coverage. The Social
    Security withholding is assessed only up to a certain amount of the employee’s
    salary (referred to as the taxable wage base: for example, $128,400 in 2018) in
    any calendar year, whereas the Medicare withholding is assessed on an unlimited
    amount of employee salary.


    Unlike state and local income taxes, which some taxpayers can separately deduct
    against their federal income taxes up to an amount of $10,000 annually, Social
    Security and Medicare taxes are not deductible. Effectively, this increases the
    overall marginal income-tax rate that an individual pays. For example, if you
    are in the highest marginal income-tax bracket of 37 percent, you effectively
    pay 10.48 percent more in taxes (7.65 percent plus 2.83 percent (0.37 times .0765)
    because you cannot deduct these amounts from your federal income taxes.


    ## Regular Income Tax vs. Individual Alternative Minimum Tax


    We just discussed the most important provisions of the regular income-tax system—the
    one that most taxpayers must protect against as an ongoing threat to their accumulated
    wealth. However, certain high-income (and some upper-middle-income) taxpayers
    must plan for another tax system each year. This system is referred to as the
    individual alternative minimum tax (AMT) .


    The AMT is a parallel tax system originally designed to prevent a small number
    of high-income taxpayers from avoiding paying regular tax. Under the AMT system,
    taxpayers pay the greater of the regular tax or alternative minimum tax due in
    any given year. Beginning in 2018, the Tax Cuts and Jobs Act of 2017 (TCJA) increased
    the AMT exemption amounts to $70,300 for single taxpayers and $109,900 for married
    couples filing jointly. It also indexed these amounts for inflation after 2018\.
    However, phaseouts do apply, such that once a taxpayer’s income exceeds a specified
    amount of alternative minimum taxable income (AMTI), the exemptions no longer
    apply. Additionally, AMT rates of either 26 percent or 28 percent apply not to
    your regular taxable income, but to a separate computation of AMTI or, effectively,
    your regular taxable income increased by certain “add back” items from the regular
    system. The deductions and other regular income-tax breaks not allowed to you
    under the AMT system are generally referred to as tax preference items. Among
    such preference items is the income portion of an incentive stock option (ISO)
    occurring on the date of exercise of that option, the disallowance of the regular
    standard income-tax deduction, and the disallowance of any interest on student
    loans.


    So how do you avoid the application of this onerous tax? First, understand what
    constitutes a tax preference item (they are described in the separate instructions
    to the AMT tax form), and then try to limit such items. For example, if you hold
    ISOs as an employee benefit from your employer, postpone exercising them for as
    long as possible (ideally, until your total income is relatively low in a given
    year). Next, as curious as it seems, you may wish to consider accelerating income
    into the current year in the hopes of increasing your regular tax liability to
    above that of the AMT. Finally, postpone deductions that you cannot take for AMT
    purposes into the next taxable year. The deductions at risk here include certain
    itemized deductions, including the deduction for state income taxes and property
    taxes. If you currently live in a high income-tax state, such as New York, you
    should ask your accountant or financial planner to separately compute your possible
    AMT liability. Also note that these last two AMT planning techniques are the exact
    opposite of what you would do in regular income-tax planning. As a result, AMT
    planning essentially requires you to think backward with respect to how you would
    otherwise try to minimize taxes.'
  trans: '

    来自投资或商业财产的损失，在两个边际税级中，首先用于抵消任何资本收益；若有剩余损失，则可用于抵减薪资或工资（或任何其他非投资或商业财产收入），每年最高限额为
    3,000 美元。任何超额损失将无限期结转，直至用完。例如，假设您或您的税务申报人报告您在 2018 年有 4,000 美元的长期资本收益和 5,000 美元的长期资本损失。您处于
    12%的边际所得税 bracket。因此，您没有长期资本收益（已被长期资本损失完全抵消），但产生了 1,000 美元的剩余长期资本损失。因此，您可以用这 1,000
    美元的总损失来减少您的薪资或工资（或其他非投资或商业财产收入），因为它低于本年度的 3,000 美元限额。


    一旦您知道了自己的边际所得税率（您可以通过查阅以往的纳税申报单，将应税收入金额与税率区间对照来确定），下一步就是计算出需要从工资中预扣多少税款以用于未来纳税。您可以通过获取并填写一份
    IRS 表格 W-4 来完成此操作。填写此表格的目标是预扣相当于您预计在年底欠联邦政府税款的 90%。如何做到这一点？IRS 表格 W-4 允许您根据当前年度的预计收入来申请预扣免税额。免税额会减少预扣的税款金额，并增加您的实得工资。因此，申请的免税额越多，您的实得工资就越高；免税额越少，实得工资就越低。


    一些个人，特别是自雇纳税人，需要缴纳预估税款以代替所得税。然而，有些纳税人除了缴纳所得税外，还必须缴纳预估税款。例如，如果您是一名受薪雇员，但有大量额外收入，如租赁房地产收入，您可能需要缴纳这些税款。从退休计划中一次性领取大额分配的退休人员也可能需要缴纳预估税款。如果您是需要估算税款的纳税人，您的首次付款应在当前年度的
    4 月 15 日之前通过提交 IRS 表格 1040-ES 完成，随后在 6 月 15 日、9 月 15 日和次年 1 月 15 日进行付款。


    ## 社会保障和医疗保险税


    根据《联邦保险缴款法案》（FICA），所有受薪雇员必须缴纳其工资的 7.65%（或从其工资中预扣）以资助社会保障和医疗保险社会保险体系。具体来说，在 7.65%的总比例中，6.2%代表雇员为资助其自身的社会保障退休或残疾福利所做的贡献，而剩余的
    1.45%则用于资助医疗保险住院（A 部分）项目。此外，一些年收入超过通胀调整后的 20 万美元（已婚联合申报为 25 万美元）的雇员，还需额外缴纳 0.9%作为用于支付《平价医疗法案》覆盖范围的医疗保险补充税。社会保障预扣税仅针对雇员工资中不超过一定金额的部分（称为应税工资基数：例如，2018
    年为 128,400 美元），而医疗保险预扣税则针对雇员的全部工资，金额无上限。


    与州和地方所得税（某些纳税人可在联邦所得税中单独扣除，每年最高限额为 10,000 美元）不同，社会保障税和医疗保险税不可扣除。这实际上增加了个人支付的总体边际所得税率。例如，如果您处于
    37%的最高边际所得税 bracket，由于无法从联邦所得税中扣除这些金额，您实际多支付了 10.48%的税款（7.65%加上 2.83%（0.37 乘以
    0.0765））。


    ## 常规所得税与个人替代性最低税


    我们刚刚讨论了常规所得税系统最重要的规定——这是大多数纳税人必须防范的、对其累积财富构成持续威胁的税制。然而，某些高收入（以及部分中高收入）纳税人每年必须为另一种税制进行规划。这种税制被称为个人替代性最低税（AMT）。


    AMT 是一种平行的税制，最初旨在防止少数高收入纳税人逃避缴纳常规税。在 AMT 系统下，纳税人需缴纳任何一年中常规税或替代性最低税中较高者。自 2018
    年起，2017 年《减税与就业法案》（TCJA）将 AMT 免税额提高至单身纳税人 70,300 美元和已婚联合申报夫妇 109,900 美元。该法案还在
    2018 年后根据通胀对这些金额进行了指数化调整。然而，此免税额存在逐步取消机制，一旦纳税人的收入超过指定的替代性最低应税收入（AMTI）金额，免税额将不再适用。此外，26%或
    28%的 AMT 税率并非适用于您的常规应税收入，而是适用于单独计算的 AMTI，实际上，它是您的常规应税收入加上常规系统中的某些“加回”项目。在 AMT
    系统下不允许您享有的扣除和其他常规所得税减免项目通常被称为税收优惠项目。这些优惠项目包括：激励性股票期权（ISO）在行权日产生的收入部分、常规标准所得税扣除的禁用，以及学生贷款利息的任何扣除。


    那么，如何避免这一繁重税种的适用呢？首先，要了解什么是税收优惠项目（它们在 AMT 税表的单独说明中有描述），然后尽量限制此类项目。例如，如果您作为员工福利持有雇主提供的
    ISO，请尽可能推迟行权（理想情况下，推迟到您总收入相对较低的年份）。其次，尽管听起来很奇怪，您可以考虑将收入加速计入当前年度，以期将您的常规纳税义务提高到超过
    AMT 的水平。最后，推迟那些在 AMT 中不能扣除的抵扣项至下一个纳税年度。此处面临风险的扣除项包括某些列举扣除项，例如州所得税和财产税的扣除。如果您目前居住在高所得税州，如纽约，您应请会计师或财务规划师单独计算您可能的
    AMT 负债。另请注意，这最后两项 AMT 规划技巧与您在常规所得税规划中所做的正好相反。因此，AMT 规划实质上要求您逆向思考，与您通常试图尽可能减少纳税的做法正好相反。

    '
- fmt: '## Basic Tax-Planning Technique #1: Tax Avoidance


    The term `tax avoidance` may be used narrowly, as when a higher-bracket taxpayer
    gives property to a lower-bracket taxpayer, and the lower-bracket taxpayer pays
    the income tax on that property at a reduced rate. Alternatively, the term may
    be used broadly, meaning that the higher-bracket taxpayer does not incur income
    taxes on the income. In the context that the term is used in this book, you should
    think of `tax avoidance` as broadly as possible.


    The most common example of `tax avoidance` is taking full advantage of all income-tax
    deductions to which you are entitled under the tax law. A `tax deduction` is a
    percentage reduction of your taxable income based on your marginal income-tax
    rate. For example, if you are in the 32 percent marginal bracket, you are effectively
    paying tax on only 68 percent (`1 less 0.32`) of your income. Similarly, the `standard
    deduction` available to all taxpayers operates to exclude that specified amount
    of income from taxation. A third example of `tax avoidance` involves attempting
    to qualify for any income-tax credits provided under law. A `tax credit` is a
    dollar-for-dollar reduction against an individual’s income-tax liability and therefore
    is not affected by the taxpayer’s marginal income-tax rate. For example, if you
    have computed your income-tax liability before credits to be `$10,000` this year,
    and you qualify for a credit of `$1,000`, you owe the government only `$9,000`
    (`$10,000` less `$1,000`). In practical effect and as a tax-avoidance technique,
    a credit is worth more to a lower-bracket taxpayer (22 percent rate and below),
    whereas a deduction is worth more to a higher-bracket taxpayer (24 percent and
    above).


    As a regular taxpayer, you are entitled to choose one of two general deductions:
    a specified `standard deduction` under law, based on your filing status, or a
    series of deductions known as `itemized deductions`. You want to choose the higher
    of the two deductions, because doing so will afford you the greatest tax benefit.
    As a practical matter, given the doubling of the `standard deduction` amount in
    `TCJA` of 2017, you will likely choose the `standard deduction`. Only high-income
    homeowners or philanthropists are likely to `itemize deductions`. You may potentially
    be able to take advantage of the following deductions if you elect to itemize:


    * Unreimbursed (by health insurance) medical expenses

    * State and local income and property taxes (limited to a maximum of `$10,000`
    annually)

    * State and local sales taxes in lieu of state and local income taxes (again,
    limited to `$10,000` annually)

    * Home mortgage loan or “acquisition indebtedness” interest payments (limited
    to a home purchase amount of `$750,000`)

    * Charitable contributions


    As mentioned, regardless of whether you take the `standard deduction` or `itemize`,
    certain `tax credits` are allowable for qualified taxpayers. There are two general
    types of credits: `refundable` and `nonrefundable`. A `refundable credit`, such
    as the `earned income-tax credit`, is one that results in money being paid to
    you even though you have no income-tax liability. Conversely, a `nonrefundable
    credit` is one that, at best, reduces your tax liability to zero (in other words,
    you are not separately paid if you do not owe any taxes). Of the two, you should
    maximize the number of `refundable credits` you can take. Unfortunately, however,
    most credits are `nonrefundable`.


    Among the most popular `nonrefundable` (or only partially refundable) credits
    are the following:


    * The child and dependent care tax credit

    * The child tax credit (partially refundable)

    * The adoption credit

    * The credit for the elderly or disabled

    * Certain higher-education expense credits, such as the Lifetime Learning Credit


    As a general strategy to avoid paying as much regular income tax as possible,
    you should accelerate deductions and credits into the current tax year and postpone
    income into the next or subsequent tax years. Salaried taxpayers typically find
    it difficult to postpone income, because they are not in control of when they
    receive it. However, self-employed taxpayers have much more latitude with respect
    to this tax-planning technique. For example, a self-employed taxpayer can choose
    to bill a client early in January of the following year rather than in late December
    of this year, thereby deferring taxes due on the income.


    ### Tax Avoidance vs. Tax Evasion


    While we are on the topic of `tax avoidance`, it is important to distinguish between
    income-tax avoidance planning techniques and `tax evasion`. Avoidance techniques
    are perfectly legal and take advantage of tax benefits, such as deductions and
    credits, that are afforded to you under the tax law. Conversely, `tax evasion`
    is illegal; it means you intended to not comply with the tax law. The most common
    form of `tax evasion` is the failure to report all your taxable income for the
    calendar year.


    If, in filing your tax return for any given year, you intend to break the law,
    the IRS must prove this fact in court. If it does, you will be found guilty of
    a felony offense that is punishable by severe monetary fines or imprisonment in
    a federal penitentiary. Fortunately, imprisonment is rarely the punishment for
    `tax evasion`. Instead, restitution (paying what you should have owed) and fines
    are the preferred recourse of the government. Nevertheless, if you are involved
    in a tax-evasion case, either as the subject of the investigation or as someone
    who knows something about it, you should immediately contact a tax attorney to
    represent you to the IRS Criminal Investigation Division (CID). Do not speak voluntarily
    to the CID, because anything you say may be used against you later.'
