  trans: '

    # 保险公司选择与评级


    在购买任何类型的人寿保险单（即使是定期保单）之前，请先查明承保该保单的保险公司的财务实力。请记住，保单的目的——在你去世时保障你家人的生活——要等到（希望是）遥远的未来才能实现。你希望在你购买保单的公司，在需要支付身故赔偿金时仍然在运营。此外，如果你在生前需要通过当今流行的加速身故赔偿附加条款来获取部分身故赔偿金，你也要确保该公司能够提供这笔资金。


    大多数理财规划师用于评估保险公司财务实力的主要方法是咨询独立的评级机构。目前有五家主要的保险公司评级机构：`A.M. Best`、`Standard & Poor’s`、`Moody’s`、`Fitch
    Ratings` 和 `Weiss Research`。它们的评级字母各不相同，但所有机构都使用 `A+` 或类似变体来评定最高级别的公司，而有些机构则使用
    `F` 作为最低评级。表 4-2 显示了每家机构的最高六个评级以及最低评级。


    **表 4-2.** 保险公司评级机构与评级


    | | `A.M. Best` | `Standard & Poor’s` | `Moody’s` | `Fitch Ratings` | `Weiss Research`
    |

    | --- | --- | --- | --- | --- | --- |

    | 最高评级 | `A ++` | `AAA` | `Aaa` | `AAA` | `A+` |

    | 第二高评级 | `A+` | `AA+` | `Aa1` | `AA+` | `A` |

    | 第三高评级 | `A` | `AA` | `Aa2` | `AA` | `A-` |

    | 第四高评级 | `A-` | `AA–` | `Aa3` | `AA–` | `B+` |

    | 第五高评级 | `B++` | `A+` | `A1` | `A+` | `B` |

    | 第六高评级 | `B+` | `A` | `A2` | `A` | `B–` |

    | 最低评级 | `F` | `D` | `C` | `CCC–` | `F` |


    这些评级机构没有哪家比其他的更值得推荐；它们都提供有价值的信息，并且基本上都会审查每家保险公司的相同数据。然而，了解所引用的是哪家机构的评级至关重要。例如，一家公司被
    `A.M. Best` 评为 `A` 意味着该公司属于第三高质量等级，而同一家公司若被 `Standard & Poor’s` 或 `Fitch Ratings`
    评为 `A`，则仅表示第六高质量等级。无论如何，考虑到当今运营的保险公司数量，你很可能应该只寻找在任何评级标准中达到最高或第二高评级的公司。通常，达到这些评级的公司都是知名且已运营多年的企业。


    最后需要考虑的一点是：一些理财规划师和保险顾问认为，对于计划购买可变寿险或 `VUL` 现金价值保单的人来说，保险公司的财务实力不如对计划购买传统终身寿险或万能寿险保单的人那么重要。这是因为保险公司在应对传统终身寿险或万能寿险的索赔时，使用的是其总资产；但对于可变形式的寿险则不这样做。在后几种类型的保单中，现金价值是在一个独立的子账户中累积的，该账户不受保险公司其他一般债权人索赔的影响。因此，在可变形式的寿险保单上，公司支付你索赔的财务生存能力可能并非那么关键。


    另一种目前非常需要的保险保障形式是健康保险。尽管大多数健康保险（如果有的话）是在团体层面提供的，但“奥巴马医改”的主要重点在于强制个人购买健康保险。（请注意，2017
    年的 `TCJA` 废除了个人必须购买健康保险的规定，但直到 2019 年初才生效。）通过以州健康保险交易所的形式增加保险公司之间的竞争，希望未参保人数能够下降，从而压低健康保险费用。尽管迄今为止这些州健康保险交易所在实际降低成本方面的成功与否存在争议，但下一章将回顾奥巴马医改的主要条款以及
    indemnity 和管理式医疗选项。


    # 5. 保障你的健康与长期护理


    健康保险和健康保险覆盖范围的问题充满争议且政治化，尤其是在个人对全民健康保险与私人支付系统的偏好问题上。然而，对长期护理保险的潜在必要性却远不那么为人所知或讨论。据美国卫生与公众服务部称，年满
    65 岁的人约有 40% 的几率会进入养老院并需要长期监护式护理。需要长期护理的候选者患有慢性或致残性疾病，需要养老院护理或其他持续监护。这种护理的费用可能非常昂贵——甚至对许多个人及其家庭来说是财务上的灾难。


    支付这种护理费用的一种方法是在你仍然健康且足够年轻、符合购买条件时购买长期护理保险。但正如本章后面所讨论的，也存在其他替代方案。我们首先来看看选择个人健康保险政策时应考虑的因素，以及当今市场上可用的保单类型。


    ## 选择健康保险政策时的注意事项


    本节介绍在选择合适的健康保险政策时应牢记的五点一般性考虑因素。


    **没有健康保险代价高昂。** 健康保险费用很高，但没有保险代价更高。完全出于偶然，由于一种用于吸引二战归来退伍军人的招募工具，美国形成了以雇主为基础的健康保险体系。因此，大多数美国人通过雇主提供的团体健康保险计划获得保障。然而，许多自雇人士及其雇员由于保障费用过高而没有健康保险。因经济疲软而被解雇的受薪员工也是如此。


    当涉及到医疗费用时，研究表明，如果一名家庭成员没有健康保险并遭遇事故，由此产生的医疗账单将影响整个家庭未来的经济健康。支付高额医疗账单的义务是当今个人破产申请的首要原因。因此，获得团体或个人保险覆盖非常重要。如果你没有雇主或个人的健康保险计划，请遵循健康倡导者和顾问建议的以下步骤：


    1. 联系你所在州的保险部门，查找一份在你州提供保障的健康保险计划清单。由于未参保者的医疗费用高昂，且部分个人持续无法获得健康保险资格，一些州设立了健康保险池，为高风险个人提供保障。

    2. 联系你州排名靠前的保险计划，详细了解主要医疗手术的保费和费用。

    3. 查明是否有任何既往病史被排除在保障范围之外。如果你之前曾受团体保单保障，1996 年的《健康保险携带和责任法案》（`HIPAA`）可能有助于你获得个人保障，即使你患有保险公司指定的既往病史也是如此。此外，自
    2010 年《患者保护与平价医疗法案》（`PPA`）实施以来，通常禁止保险公司因既往病史而拒绝承保。

