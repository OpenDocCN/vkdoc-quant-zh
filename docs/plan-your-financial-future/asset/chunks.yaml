    # 需考虑的其他保单福利


    许多人寿保险保单都提供额外福利，通常以保单附加条款的形式呈现。以下是一些较为重要的潜在附加福利：


    - **生活费用调整（COLA）附加条款**：该附加条款最常见的形式是在您开始领取福利金后，增加所支付的伤残福利金金额，从而保障您免受通货膨胀的影响。另一种形式则是在您发生伤残之前，每年按特定百分比（通常为
    5%）增加保单福利，以确保您在开始领取福利金后拥有恒定的购买力。

    - **保费返还**：此福利要求保险公司在特定时期内未发生索赔的情况下，退还您部分保费。

    - **保费豁免**：此福利允许您在伤残达到一定期限（通常为 90 天）后，停止支付该保单的保费。

    - **部分伤残附加条款**：当您无法履行自身职业的重要职责，但能够履行足够多的其他职责以使您能够重返兼职工作时，此福利即被触发。在这种情况下，保单将支付部分福利金，例如原本应支付总额的
    50%。

    - **残余伤残附加条款**：该附加条款规定，如果您能够重返全职工作，但由于伤残原因收入低于以往，保单将在福利支付期内支付您以往薪酬与当前薪酬之间的差额。

    - **保证可保性附加条款（也称为福利递增附加条款）**：此附加条款保证您在特定时间点有机会增加保单项下的应付福利金额，无论届时您的身体或精神健康状况如何。获得此附加条款的一个常见要求是，您最初购买的人寿保险保单金额必须至少达到保险公司批准的最高福利金额的
    80%。


    # 保单除外责任


    与其他保险合同一样，了解伤残收入保险不承保哪些内容也至关重要。这些被称为保单除外责任，就伤残收入保险而言，它们指的是可能导致被保险人无法工作的特定伤害或疾病。最常见的除外责任包括由以下原因导致的伤残：


    - 战争或战争行为

    - 怀孕或分娩并发症

    - 被保险人实施或企图实施犯罪行为

    - 被保险人被监禁期间

    - 自残造成的伤害或疾病，包括与饮用酒精饮料或非法使用药物相关或由其引起的伤害或疾病


    请记住，如果您的伤残是由上述任何一种除外责任引起的，保单很可能不会支付福利金。


    # 购买个人伤残收入保险前应询问的问题


    以下是在您购买个人伤残收入保险前应询问的问题：


    - 我的保单中如何定义“伤残”？

    - 我的保单应支付的福利金额是多少？

    - 我需要为这笔福利金缴税吗？

    - 我的福利金可以支付多长时间？

    - 我的福利金是否会根据通货膨胀进行调整（如果是，调整幅度是多少）？

    - 在我开始领取福利金之前，是否有等待期（如果有，等待期是多长）？

    - 有没有办法确保在等待期间也能获得付款？

    - 我是否可以无需体检就续保？

    - 保险公司可以提高我的保单保费吗？

    - 保单的除外责任有哪些，它们对我有影响吗？


    本章结束了对个人风险敞口的探讨。现在，让我们考虑我们大多数人也都面临的一种风险敞口：财产（例如房屋或汽车）遭受损失或损坏的风险。下一章也会讨论针对自雇人士的商业保险。


    # 7. 为您的财产投保


    通常，个人最重要的财产是他们的房屋和汽车。既然您已经了解了如何为您的生命、健康和赚钱能力投保，那么您也希望确保您的房屋和汽车同样免受重大财务损失。


    在准备阅读本章时，请记住，与房屋保险（除非您的抵押贷款机构要求您购买，否则通常不是强制性的）不同，许多州要求购买汽车责任保险。具体而言，各州要求所有驾驶员对因汽车所有权而对他人造成的损害或伤害承担经济责任。每位驾驶员都必须购买责任保险。但是，您不必为您的汽车或财产损失（碰撞险和综合险）购买保险。因此，对于较旧的汽车，您可以选择放弃碰撞险，仅购买综合险（也称为非碰撞险）。这是一个良好的现金流规划，因为为一辆仅值
    1500 美元的汽车购买碰撞险意义不大，而在 500 美元或更高的免赔额之后，这种险种的年保费可能高达 300 美元或更多。


    ## 为您的房屋投保时需要考虑的事项


    房屋保险为您的房屋（在保险单中通常称为“住宅”）以及房屋内的个人财物提供保障。在几乎所有情况下，保险公司都会出具一份一揽子保单，这意味着该保单不仅涵盖房屋本身的损坏，还涵盖您或家人在您的房产上对他人造成伤害的责任。各种类型的房屋保险单根据您拥有的住宅类型为财产提供保障，并且大多数包含以下通用保障形式：


    - **保障 A**：住宅

    - **保障 B**：其他建筑结构

    - **保障 C**：室内物品（个人财产）

    - **保障 D**：使用损失

    - **保障 E**：个人责任

    - **保障 F**：对他人的医疗费用


    您还应该知道，标准房屋保险单通常不承保某些自然灾害造成的损失。值得注意的是，洪水或地震对您的房屋造成的损坏不在承保范围内。但是，您可以通过您的财产和意外伤害保险代理人或经纪人购买联邦洪水保险，该保险作为国家洪水保险计划（NFIP）的一部分承保。如果联邦保单无法满足您的需求，您应考虑从私人保险公司购买超额洪水保险。同样，您可以通过为您标准的房屋保险单购买地震批单来防范地震损失。例如，在加利福尼亚州，必须至少向房主提供地震批单（尽管州法律并不要求必须购买此批单）。

