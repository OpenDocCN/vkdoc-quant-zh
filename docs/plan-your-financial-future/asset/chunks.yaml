- fmt: '### Statement of the Investor’s Objectives


    The formulation and statement of the investor’s objectives are your primary input
    to the statement and should explain your investment goals in terms of investment
    risk and return. A careful analysis of your risk tolerance should precede any
    discussion of return objectives. As we have discussed, you typically will not
    know how to adequately define your risk tolerance; accordingly, this is one of
    the benefits of using a financial planner, who will help assess and clearly specify
    the amount of risk you are willing to assume.


    A person’s return objectives may be stated in terms of a percentage, but they
    also may be stated in words. For example, `capital preservation` means investors
    seek to maintain the purchasing power of their investment—therefore, the necessary
    return must be no less than the rate of annual inflation. Alternatively, `capital
    appreciation` is an appropriate objective when the investor wants to achieve growth
    of their investment through real capital gains (a return considerably more than
    annual inflation). A `current income` objective means the investor wants the manager
    to invest in dividend-paying stocks or interest-earning bonds to generate income.
    Finally, a `total return` strategy implies that the investor seeks to increase
    the value of investments by taking advantage of both capital gains and reinvesting
    any current income back into the investment for future growth of principal.


    ### Statement of Investment Constraints or Limitations


    In this section of the statement, you need to specify your investment time horizon,
    or the time period in which you intend to invest. Concomitant to this time period
    is your need to access the money without a significant loss to principal (also
    known as `liquidity`). Investors with longer investment horizons, such as an investor
    who is saving for retirement, generally require less liquidity and can thus tolerate
    more investment risk. Investors with shorter time horizons, such as an investor
    already in retirement, generally seek greater liquidity and less-risky investments
    because losses cannot be overcome nearly as quickly.


    Additional factors or limitations that you will typically wish to consider when
    developing a policy statement are the current and expected state of the overall
    economy and sectors of the economy in which you may be considering investing (for
    example, technology). The current tax status of any previous investments should
    also be taken into account. For example, an individual who is saving for retirement
    and is taking advantage of the tax-deferred nature of an individual retirement
    account (`IRA`) may engage in more-frequent investment transactions than someone
    who holds these investments in a taxable portfolio where capital gains must be
    recognized at the date of sale.


    A final, often-included limitation covers the unique circumstances or preferences
    of the investor. Here is where you should state any preference to invest only
    in socially responsible companies. Similarly, you should give some thought to
    your current or anticipated cash flow. For example, if one of your goals is to
    purchase a vacation home during a shorter, specified time period, you will need
    to invest in relatively liquid assets. Alternatively, if you expect to receive
    a large inheritance during the time period (thus providing additional money for
    investment), you should discuss what you want to do with this money.


    ### Meeting the Investor’s Objectives and Allocation of Investment Resources


    Although the typical investment policy statement does not indicate specific stocks
    or bonds the investor should purchase or sell, it should provide guidelines with
    respect to which asset classes to include and the relative percentages of each.
    In other words, the investment policy statement should provide an asset allocation
    strategy.


    The assets in which you may wish to invest may not be the same as those of the
    typical investor, based on your risk-tolerance level, desired rate of return,
    and investment time horizon. However, most investment policy statements use only
    three categories or classes of investment assets:


    *   Stocks

    *   Bonds

    *   Cash or cash equivalents (savings accounts, short-term certificates of deposit,
    money-market funds, and any asset that is relatively liquid)


    Investment percentages are assigned to each class.


    **Note:**


    Sometimes a fourth category, referred to as alternative investments, is also used
    as an asset class. These are any assets other than stocks, bonds, and cash (such
    as gold or silver).


    Many methods are used to allocate the investment percentages, including some involving
    computer software. There are also a few rules of thumb. For example, one commonly
    cited rule is that you should subtract your age from 100 to determine the percentage
    amount that should be devoted to stock or stock mutual fund investments. The rest
    should be split between bonds and cash or cash equivalents, with only a relatively
    small percentage allocated to cash, given its lack of relative return. Here are
    four sample asset-allocation scenarios for a young, mid-life, pre-retiree, and
    retired investor of moderate risk tolerance:


    *   Young investor (age 25 to 44): 75 percent stocks, 20 percent bonds, 5 percent
    cash or cash equivalents

    *   Mid-life investor (age 45 to 55): 60 percent stocks, 30 percent bonds, 10
    percent cash or cash equivalents

    *   Pre-retiree investor (age 55 to 64): 50 percent stocks, 35 percent bonds,
    15 percent cash or cash equivalents

    *   Retired investor (age 65 plus): 40 percent stocks, 40 percent bonds, 20 percent
    cash or cash equivalents


    Once the asset-allocation process has been determined, you should consider a mix
    of assets that have the highest probability of meeting your financial goals at
    a level of risk with which you are comfortable. As you get closer to meeting your
    financial goals, you should adjust this asset mix. For example, if you are several
    years away from meeting your goals, safety of principal should become more important
    to you than growth of that principal; accordingly, you should adjust the percentage
    of asset mix toward short-term bonds and cash equivalents and away from stocks.


    Asset allocation generates portfolio diversification, which is the key to reducing
    your investment risk. We will talk more about diversification later in this chapter,
    but for now you should understand that a well-thought-out asset-allocation strategy
    is the foundation of any effective investment policy statement.


    ### Monitoring the Performance of the Investment Plan


    The drafting of a policy statement will assist you in judging the performance
    of your investment manager. Typically, the statement should include a model or
    benchmark portfolio against which the performance of the manager may be judged.
    For example, if you choose to invest in large-capitalization stocks (companies
    that have a large amount of outstanding public stock), you will likely want to
    compare the performance of the manager against the benchmark annual return of
    Standard & Poor’s index of 500 stocks. Alternatively, if you choose to invest
    in smaller-capitalization stocks, a benchmark portfolio of similar stocks, such
    as the Russell 2000 Index, should be used. Because benchmark portfolios set an
    objective performance standard, the investment policy statement acts as a starting
    point for periodic portfolio review and assessment of investment manager performance.'
