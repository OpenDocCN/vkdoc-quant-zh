- fmt: '### Mutual Funds as a Part of Your Portfolio


    Many small investors begin and end their portfolio construction with mutual funds.
    They also work with an investment advisor or financial planner to position these
    funds in an advisory services account. If you are not inclined to work with an
    investment advisor or financial planner but wish to invest in mutual funds (or
    have to invest in such funds as part of a self-directed retirement account, such
    as a `401(k)` plan), consider the following:


    - Try to invest in no-load or low-load funds. These are funds that do not assess
    a sales charge for purchase. Note, however, that most advisory accounts waive
    the sales charge if the fund is held within the account.

    - Try to invest in funds with low maintenance expenses in relation to their peers.
    There is no rule of thumb here except that the lower the annual expenses to operate
    the fund, the better. An alternative is to invest in all index funds, but you
    lose the potential for excess market performance that an excellent mutual fund
    money manager may generate.

    - Try to invest in funds with a relatively low turnover of assets. Investing in
    a fund that does not constantly sell and buy securities is an effective tax-management
    technique, which, as you will see in Chapter [12](#A314864_2_En_12_Chapter.html),
    is a key component to defending the wealth you accumulate.

    - Make sure the fund is investing in securities consistent with its investment
    objective. For example, if the fund states that it is a growth-stock fund, it
    should not be investing in short-term bonds.

    - Understand how much investment risk you are willing to assume, and match your
    risk profile to the investment objective of the fund. This is critical in mutual-fund
    investing. If you are most covetous of income (generally, characteristic of a
    conservative risk profile), many stock funds are not for you. Alternatively, an
    aggressive growth risk profile usually means that investing in a US government
    bond fund is not the most appropriate use of your money.


    In summary, you may wish to invest in a combination of actively managed mutual
    funds and passively managed index funds or `ETF`s. Many investors who have adopted
    this strategy are wealthier for it.


    ## International Investing


    It has frequently been said in recent years that we are becoming a globalized
    economy. What happens financially in one country—particularly in emerging growth
    economies, such as China and India—almost instantaneously impacts the economy
    of the United States as well. Fortunately, a globalized economy presents investment
    opportunities beyond purchasing only domestic stocks, bonds, or mutual funds.
    Unfortunately, however, international investing carries additional risk.


    Currency or exchange-rate risk originates in the uncertainty associated with the
    value of foreign currencies in relation to the US dollar. For example, let’s say
    you invest in a stock of a UK company, and you pay for it in the currency of the
    UK pound. Even if the share value of this stock appreciates, you may still lose
    money if the pound depreciates relative to the US dollar. Conversely, you may
    reap a double benefit, including the appreciation of the UK stock, if the pound
    appreciates with respect to the US dollar.


    How is currency or exchange-rate risk effectively minimized? This question leads
    us to the investment strategy of purchasing foreign stocks by using a financial
    instrument known as an American Depository Receipt (ADR). An `ADR` is a receipt
    issued by a US bank on foreign securities purchased by the bank through a foreign
    representative and held in trust for the benefit of the `ADR` owner. These receipts
    are listed on most US stock exchanges, including the New York Stock Exchange,
    and represent an alternative to direct foreign investment in a stock. The `ADR`
    is denominated in US dollars, meaning you have to worry less about the relationship
    of the foreign currency to its American counterpart.


    Another way of investing internationally is to purchase shares of an international
    or global mutual fund. An international mutual fund invests in securities, either
    stocks or bonds or both, of companies that are located and do business outside
    the United States. Alternatively, a global mutual fund (also known as a world
    fund) invests in securities of international companies and those of US companies.
    There are also region-specific funds, notably in the Pacific Rim countries, such
    as Japan, South Korea, Singapore, and Indonesia.


    You should consider international investing as another way to diversify your portfolio.
    In recent years, international and global investing have generated returns considerably
    in excess of those in the US market; and, depending on future political events
    in foreign countries, global investments are likely to continue to outperform
    domestic funds. This is particularly the case if the relevant country’s currency
    strengthens in relation to the US dollar.


    Now let’s move on to the other major category of investments and wealth accumulation:
    investing your money in real assets or in real property, as discussed in the next
    chapter. After that, we contrast financial and real assets to use assets, with
    the major use asset being your home or personal residence. Historically, many
    people have considered their home as their one primary investment. In Chapter
    [11](#A314864_2_En_11_Chapter.html), we show why that is not how you should think
    of your personal residence in the `PADD` process, because a home, at least for
    most people, has not been proven to be an excellent long-term investment.


    # 10. Investing in Real Assets


    Most individuals own real estate; in fact, approximately 64 percent of Americans
    own their own home as of the year 2017. Moreover, according to Wallet Hacks, an
    online-only management web site, in 2017, approximately 60 percent of the typical
    American’s net worth consisted of the equity in their home. Home equity is defined
    here as the fair market value of a home less any associated liability. Therefore,
    it remains true that home ownership is an integral part of both the American Dream
    and the wealth-accumulation process.


    For most people, owning a home is not an investment in the same sense that owning
    stocks and bonds or rental real estate is an investment. Rather, your home or
    primary residence should be thought of as a use asset and should be listed as
    such on the statement of personal financial position. This is to be contrasted
    with direct investments in real estate, such as the ownership of a rental home,
    a vacation home, or even raw land, and indirect investments in real estate, such
    as a share of a real estate limited partnership (`RELP`) or a real estate investment
    trust (`REIT`).


    ## Direct Investments in Real Estate


    Direct investments in real estate are made primarily by wealthy individuals who
    understand the real estate selection process and are comfortable with riskier
    assets. Many direct investments in real estate are also made for purposes of improving
    an individual’s cash flow (income) and not only for purposes of enjoying the capital
    appreciation of an asset (growth).'
