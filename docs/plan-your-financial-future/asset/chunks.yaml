    # 以谁的名义存钱？


    在开始为高等教育储蓄之前，你需要考虑你的孩子是否有资格获得联邦经济援助。在思考这个问题时，请自问以下几点：


    -   你预计在孩子进入大学时——更准确地说，是在你完成孩子高二第二学期的`免费申请联邦学生援助(FAFSA)`表格时——你的收入会是多少？大多数联邦经济援助是基于需求的；如果孩子的父母收入过高，孩子就不太可能有资格获得援助。

    -   你认为为孩子提供大学教育是你的责任或财务义务吗？你期望孩子在经济上提供帮助，还是承担全部就读费用？

    -   你预期你的孩子会获得学术或体育奖学金来支付大学就读费用吗？要现实一点：尽管我们都相信自己的孩子才华横溢，但更现实的情况是，可能并非如此。

    -   你有亲戚或家庭成员（如祖父母）表示过——或期望——在孩子上大学时提供经济援助吗？


    从根本上说，你对于孩子是否上大学或接受高等教育可能有些矛盾，但请记住这一点：研究表明，在大学毕业生的一生中，其收入会比仅拥有高中文凭的人多出超过一百万美元。


    现在回到以谁的名义为大学储蓄这个问题，如果你预期孩子需要经济援助来支付大学就读费用，这将是一个关键问题。当你填写强制性的`FAFSA`表格时，你需要列出你以及孩子的资产和收入。这是必要的，以便联邦政府能够计算出一个预期的家庭贡献额（`EFC`），用于支付大学就读费用。如果你的孩子需要经济援助，你希望获得的`EFC`数额尽可能低。因此，你应该了解联邦政府用于计算家庭预期贡献额的计算公式。


    这个公式最关键的部分，是孩子名下的资产与父母名下的资产的公允市场价值之比。换句话说，这些资产中有多少百分比预期会被用于支付大学教育费用，因而在公式中应当被计入家庭贡献？答案是：孩子名下的资产为
    35%，而父母名下的资产则低于 6%（准确来说是 5.64%）。仅从公式中的这一项来看，以父母的名义为大学储蓄通常比以孩子的名义要有利得多。如果你决定以自己的名义为孩子的大学教育储蓄，你可能应该开始实施一个`529
    条款`个人储蓄计划。同时，如果你决定以孩子的名义进行储蓄，你可能希望开立一个托管账户，例如`统一赠与未成年人法案`账户或`统一转移给未成年人法案`账户。


    在为大学储蓄时，其他储蓄策略也可能带来收益。具体如下：


    -   首先花掉学生名下的资产。了解这一点很容易，当认识到可计算的孩子资产（35%）与父母资产（约 6%）之间的差异时。

    -   最大化你对退休基金的缴款。虽然每年向你的`401(k)`（或其他）退休计划的缴款会被计入可计算的父母收入中，但退休计划中的既得账户余额并不会被视为可用于支付大学费用的父母可用资产。

    -   考虑使用`罗斯个人退休账户`作为大学储蓄工具。你的孩子需要有劳动收入才能向这种储蓄工具缴款，但由此获得的工作经验对于培养孩子的自律性可能很有价值。

    -   在提交`FAFSA`之前，尽可能多地还清你的信用卡债务和其他无担保债务。这将减少你必须列出的现金或其他资产数额，这些资产在代表你的孩子申请联邦经济援助时会被计入你的资产中。

    -   在申请前，尽量多偿还你的原始抵押贷款。这有两个好处：它可以释放你可能需要用于资助孩子大学教育的现金流，并且在计算家庭预期贡献额时，你房屋的净值不会计入父母的资产中。


    为了确定所需的援助金额，大多数公立大学的助学金办公室会使用联邦政府制定的一个公式，称为联邦方法。该公式在计算`EFC`时不考虑家庭的房屋价值。与此同时，一些私立学院和大学在计算`EFC`时使用一种称为机构方法的公式。在这种公式中，你房屋的净值会被重新加回（因此会被计入你的资产）。如果一所学校要求你提交更详细的`CSS/经济援助档案`以及`FAFSA`表格，你就知道该校正在使用机构方法。与`FAFSA`要求的信息不同，`CSS
    档案`需要父母在孩子大学期间的预期收入，而不仅仅是当前或过去一年的收入。


    作为父母，要注意一些学院或大学用来吸引你的孩子入学的“诱饵调包”策略。虽然这种做法不像以前那么普遍，但有些学校可能会向他们想要招揽的学生提供极其丰厚的助学金方案，但在该学生入学第一年后就减少所提供的助学金金额。如果学生在该校感到不适，他们就会被迫考虑转学（通常面临无法转移学分的劣势），或者留在同一所学校继续学习并尝试解决适应问题。因此，一旦你的孩子从某所学校获得了助学金方案，一定要问清楚助学金官员，当前的助学金方案会持续多久；或者，如果没有明确期限，要问清楚如果你的孩子在该校感到不适，是否能够轻松地将学分转到另一所学校。

    '
- fmt: '### Types of Financial Aid


    The two most common federal need-based loans are the `Perkins` and `Stafford`
    loans. Unlike grants or scholarships that do not need to be repaid, both `Perkins`
    and `Stafford` loans require repayment by the student after graduation.


    The federal `Perkins` loan is a campus-based loan, meaning the school disburses
    the loan proceeds to the student through its financial aid office. The loan may
    be taken out by both undergraduate and graduate students, although the annual
    limit is slightly higher for graduate students than it is for undergraduates.
    Financial need must be demonstrated to qualify for a `Perkins` loan, but repayment
    is not required to begin until nine months after the student graduates from graduate
    or undergraduate school. Interest on the loan does not accrue on the loan principal
    until repayment is required.


    The federal `Stafford` loan (also known as a direct loan) may be subsidized or
    unsubsidized. A subsidized `Stafford` loan means the US Department of Education
    pays the interest on the loan while the student is in undergraduate or graduate
    school, as well as during grace and deferment periods. An unsubsidized `Stafford`
    loan, on the other hand, means the student is responsible for the repayment of
    interest during the life of the loan and should repay the loan interest while
    they are still in school. If the student does not repay the interest as it is
    due, it is simply added to the principal of the loan for repayment at a later
    date. For both subsidized and unsubsidized `Stafford` loans, financial need by
    the student must be demonstrated.


    A third type of federal loan is made available to the parent of a student in the
    parent’s name: the Parent Loan for Undergraduate Students (`PLUS`). This is the
    only type of loan available on behalf of a student for whom financial need is
    not determined under the `FAFSA` formula. As a parent who makes too much money
    or has a significant net worth such that the child cannot qualify for federal
    financial aid, a `PLUS` loan is the only recourse offered by the federal government
    to assist with the child’s college education. Good financial planning dictates
    that you have already planned for the cost of your child’s college attendance;
    but if you have not, the `PLUS` loan will be offered to you. Interest begins to
    accrue immediately on the loan, and repayment begins 60 days after you receive
    the money.


    Need-based government grants, which do not need to be repaid, also may help you
    pay for your child’s college education. The most prevalent grant is the federal
    `Pell Grant`, for which the student is eligible if the family’s `EFC` does not
    exceed a specified amount as determined annually. Scholarship awards do not affect
    student eligibility for the `Pell Grant`, although there is a limit on the amount
    of grant money that any student may receive annually (the maximum is `$5,920`
    for school year 2017–2018). The student must be eligible for the `Pell Grant`
    on the basis of need before they can also qualify to receive federal `Perkins`
    or `Stafford` loans. Furthermore, the `Pell Grant` is available to undergraduate
    students only.


    ## How Do I Save?


    Now, let’s proceed to the important question of in whose name do you save—the
    student or parent—for private school or higher-education expenses.


    ### Custodial Accounts


    Prior to the advent of education savings accounts (`ESAs`) and Section 529 private
    savings plans, custodial accounts were the primary methods of saving for a child’s
    college education. Using this method to save still has advantages, although they
    are likely outweighed by the fundamental disadvantage that the opener of the account
    (usually the parent or grandparent) loses control of the money when the child
    attains the state’s legal age of majority. It is also possible that the custodian
    of the account, such as a parent or grandparent, can roll over a custodial account
    to a Section 529 plan, but the custodian first must sell all of the assets in
    the account and pay taxes on any gains.


    Two types of custodial accounts have been established by all states: the Uniform
    Gifts to Minors Act (`UGMA`) and the Uniform Transfers to Minors Act (`UTMA`).
    In most states, `UTMA` accounts are the norm, because that legislation superseded
    the earlier `UGMA` law. Operationally, however, the two types of accounts are
    the same, except that the `UTMA` allows for a broader range of investments to
    be made on behalf of the child, including a direct or indirect investment in real
    estate. Ownership of both accounts is vested in the child, with the custodian
    (usually the child’s parent or grandparent) managing the account investments on
    behalf of the child.


    As discussed in Chapter [13](#A314864_2_En_13_Chapter.html), anyone can give a
    child up to `$15,000` (`$30,000` for married couples who use the gift-splitting
    planning technique) each year free of federal gift tax. As a result, this amount
    is usually how much is initially transferred to custodial accounts on an annual
    basis. Appreciated securities or expected-to-appreciate securities are a common
    funding mechanism for custodial accounts; but as the child approaches college
    age, the custodian should gravitate toward more conservative and less volatile
    investments, such as bonds or `CDs`, to preserve the principal of the account.
    Keep in mind, however, that disadvantageous taxable implications are associated
    with too much annual unearned income (such as dividends or interest) generated
    from the account on behalf of a child under the age of 18 (or under age 24 if
    a full time-student). Specifically, a separate tax is imposed on such unearned
    income. Colloquially referred to as the `Kiddie Tax`, this tax was introduced
    by Congress to deal with the perceived income tax abuse of using your child as
    a tax shelter by shifting income to them, presumably to be taxed at a lower marginal
    income-tax rate.


    Custodial accounts offer two advantages as compared to `ESAs` or Section 529 plans:


    - The funds held in the `UTMA` or `UGMA` account may be used for anything that
    benefits the child, not just education. But if the funds are used to pay for expenses
    that otherwise constitute an obligation of support of the parent, depending on
    state law, all or part of the earnings on the account may be taxed back to the
    parent.

    - The parent realizes a nominal income-tax benefit if saving in a custodial account.
    Specifically, for children under the age of 19 or a full-time student under the
    age of 24 benefiting from the account, the first `$1,050` of income (in 2018)
    or other specified annual amount is permitted as a standard deduction. The next
    `$1,050` or similar specified amount is then taxed at the child’s marginal tax
    rate—typically, the lowest tax rate of 10 percent. As such, income splitting between
    the parent and child is possible, but only to a limited extent.


    As mentioned, as attractive as these two advantages of custodial accounts may
    be, they are likely outweighed by the accounts’ disadvantages. One has already
    been mentioned: at the legal age of majority, the child can do with the money
    in the account as they wish, including not go to college if the child chooses
    to pursue another path. In addition, several other disadvantages are associated
    with establishing custodial accounts on behalf of your children.'
