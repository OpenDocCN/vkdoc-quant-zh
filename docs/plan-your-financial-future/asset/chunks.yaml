  trans: '

    # 所以，我退休了！然后呢？


    无论你年龄多大，退休都会带来人生的重大转折。在退休后需要考虑的问题中，建立新身份是其中之一，但还有其他与生活方式相关的问题，包括：


    - 你是否会继续工作，即使只是兼职？

    - 你是否计划追求那些全职工作时因太忙而无法考虑的教育机会？

    - 你是否计划旅行？你将进行哪些休闲活动？

    - 或许最重要的是，你如何适应从工作到退休的转变？


    让我们更详细地探讨这些问题。


    ## 未来工作


    在最近的调查中，超过 70%的婴儿潮一代（出生于 1946 年至 1964 年间的人）表示，他们计划在退休后以某种形式继续工作。这一数据可能有些误导性，因为在许多情况下，婴儿潮一代因储蓄习惯不佳且缺乏规划而不得不继续工作，但毫无疑问，这一代人将比前几代人拥有更活跃的退休生活。某种形式的就业，即使是兼职，也可能是有益的，因为它能缓解从职业生涯到悠闲退休时光的过渡。


    如果你打算在退休后继续工作，需要考虑你的收入对领取社会保障福利资格的影响。例如，如果你选择提前领取社会保障退休福利（从 62 岁开始），请注意，在 65 岁或社会保障体系规定的完全退休年龄（`FRA`）之前，存在收入限额。如果你在一个日历年内未达到`FRA`且收入超过特定金额，则超出的部分每赚取
    2 美元，社会保障福利就会扣减 1 美元。此外，这一收入限额与你可能需缴纳的所得税要求是分开的。换句话说，在 62 岁至`FRA`期间，你的社会保障退休福利不仅会减少，而且如果收入超过任一特殊分步税率门槛，你还需要为这些福利缴纳所得税。


    你还应考虑在退休期间自雇的可能性。出于保持活跃的愿望，许多婴儿潮一代已开始创业。根据《彭博商业周刊》的一项调查，婴儿潮一代选择自雇的可能性是前几代退休者的两倍。这对于拥有专业技能（如医生、律师、会计师和理财规划师）的婴儿潮一代尤其如此。此外，从所得税角度来看，自雇通常更有利，因为自雇人士通常比受薪雇员更能从某些税收减免和抵免中受益。


    但请记住，自雇也带来许多风险，其中最主要的是承担与自雇相关的财务风险的意愿。大多数企业至少需要三年才能开始盈利。在此期间，这些企业必须找到办法来覆盖没有盈利年份的开支。因此，许多自雇人士在创业初期会向银行和其他资本来源寻求财务援助。通常，银行要求对任何贷款提供个人还款担保。这往往意味着，如果你选择自雇并需要银行的财务援助，就必须抵押个人资产（如房产）作为贷款担保。风险投资家（私人放贷者）则更加苛刻：他们可能不仅要求个人担保，还要求在企业盈利后获得一定比例的利润。


    除非你自认为是冒险者（任何创业者的首要特质），否则你可能更愿意留在一家大公司工作。例如，沃尔玛以积极招募老年员工而闻名，其他公司也迅速效仿，因为如今的退休人员能为任何企业带来丰富的经验。


    ## 教育


    如果你退休了，想攻读学位或重返大学完成一直想完成的课程，该怎么办？通常，如果你在 59.5 岁之前从传统或罗斯个人退休账户中取款，除了常规所得税外，还需支付
    10%的提前支取罚款（传统 IRA 的供款和收益需缴税，但罗斯 IRA 可能仅对收益征税）。不过，有一个例外：当你将这笔钱用于支付合格的高等教育费用时。如果你是
    59.5 岁以下的退休人员，只要产生的费用用于你本人、配偶、子女或孙辈的教育，且仅包括学位课程中的学费、杂费和书本费，就可以从传统或罗斯 IRA 中取款。同时，如果你超过
    59.5 岁，为教育目的从合格的罗斯 IRA 中提取资金，既无需支付罚款，也无需缴纳所得税。


    第二个建议是效仿越来越多传统大学生的做法：申请助学金。学校或政府提供的助学金项目没有年龄上限。因此，如果你能证明需要这些钱来上学，就像你的子女或孙辈一样，你可能会获得助学金。此外，如果你试图用传统或罗斯
    IRA 为退休后教育提供资金，该账户内的资产在助学金需求分析中是受保护的；换句话说，这些资产不会计入你的收入。


    最后，考虑从雇主赞助的退休计划（如 401(k)条款）中借款来支付教育费用。实际上，你是在向自己借款来资助教育，而且利率极为优惠——通常仅比最优惠利率高一个或两个百分点。从退休计划中借出的资金仍然享受税收递延，借款时无需缴纳所得税。然后，当你偿还资金时，它们会回到你的退休账户中，在此期间你所牺牲的只是如果未借款时该账户可能产生的任何收益。

    '
- fmt: '### Travel and Recreation


    As mentioned in Chapter [16](#A314864_2_En_16_Chapter.html), the standard rule
    of thumb in saving for retirement is to attempt to replace approximately 75 percent
    of your pre-retirement gross income for use during your retirement years. This
    amount comes from the presumptions that you will be saving less, paying a lower
    amount of taxes, and not commuting (or commuting very little) during retirement.
    But what if one of your retirement goals is to travel extensively or spend considerably
    on recreational activities that you postponed while working? In this event, should
    you strive to replace more than 75 percent of your pre-retirement gross income?


    Studies have shown that even with increased expenses for travel and recreation,
    the most you should budget for your retirement is probably 90 percent of your
    pre-retirement gross income. Still, if your pre-retirement gross income averaged
    $100,000 per year, this means you need to save for $90,000 per year in today’s
    dollars (after accounting for the effects of inflation). This is not an insignificant
    sum. Keep in mind, however, that travel and recreation do not usually add substantially
    to the total amount of retirement dollars needed. The expense that most retirees
    typically underestimate is the cost of health care during their retirement years.


    Under federal tax law, some of the travel costs you incur during retirement could
    be income-tax deductible. But these travel expenses must be primarily for and
    essential to medical care. Thus, a trip to an out-of-state specialty facility,
    such as the Mayo Clinic in Minnesota or Sloan-Kettering Medical Center in New
    York City, may be deductible within limits. To remain within these limits, you
    cannot deduct meals on the trip, and the deduction for lodging is restricted to
    an amount that is not lavish or extravagant. Even if you can pass these tests,
    though, you still may not be able to claim a deduction unless the aggregate total
    of your medical expenses exceeds 7.5 percent of your adjusted gross income (`AGI`)
    in 2018, after any health insurance reimbursements. As a result of these limitations,
    the chances are small that you will receive a travel expense deduction in the
    pursuit of most noncatastrophic medical care. Similarly, some taxpayers have tried
    to deduct from their taxes the cost of living in a warm locale during the winter
    after getting a note from their physician that it is advisable to do so for their
    good health. Nice try, but the US Supreme Court has ruled that such expenses are
    primarily personal and not medical, thus denying the claim for the average taxpayer.


    ### Accommodating Change


    For many retirees, the most difficult part of retirement is not what we have discussed
    so far, but rather the simple fact that their daily life has changed. For example,
    before retirement, when you got out of bed each morning, you had somewhere to
    go and something to do! This routine changes considerably when you retire.


    Just as you need to prepare for the financial aspects of retirement, you also
    need to prepare for the lifestyle change that retirement brings. Many seminars
    and workshops are available to help you deal with retirement issues and life as
    a retiree, but the most important lifestyle challenge you will face at retirement
    is establishing a new purpose for your life. This may be as simple as being there
    for your children or grandchildren, or it may involve working part-time. Whatever
    you do, you should strive to maintain good physical health and keep mentally active.
    Keeping mentally active does not necessarily entail writing the next great American
    novel, but it does mean that exercising your mind is an integral part of a fulfilling
    retirement. Also, cultivate as many friendships as possible during your retirement
    years, because studies show that retirees are generally happier when surrounded
    by family and friends.


    If you can accept change and, hopefully, thrive on it, you will probably find
    yourself among the 90 percent of Americans who say they are pleased with their
    retirement and are happy with the lifestyle decisions they have made while in
    it.


    This chapter and the previous one have addressed what is likely everyone’s number-one
    financial goal: personal retirement. But as with life, the personal financial
    process is not so simple, because different people may have different—or other—financial
    planning goals. Among these goals may be starting your own business, buying a
    second home, and eventually selling a substantially appreciated personal residence.
    These goals are the focus of the next chapter.


    # 18. Planning for Other Lifetime Financial Goals


    Although most people’s number-one financial goal is planning for a comfortable
    retirement, you may have other financial goals that you wish to include in your
    wealth-distribution process. Among these may be starting your own business (and
    perhaps subsequently selling that business), buying and selling a personal residence,
    purchasing a second or vacation home, or investing a windfall, such as lottery
    winnings or a substantial inheritance. This chapter considers all these goals
    in turn and, to the extent possible (you cannot really plan to win the lottery),
    discusses how to attain them.


    ## Starting Your Own Business


    The term entrepreneur is defined in `Webster’s Dictionary` as “someone who organizes,
    manages, and assumes the risk of a business.” Does that sound like something you
    would enjoy? If it does, you are not alone, because many individuals of all ages
    (particularly baby boomers who are just beginning retirement) harbor the dream
    of starting their own business. However, according to the Small Business Administration,
    the sad fact is that approximately 56 percent of start-up businesses fail within
    five years. Another 33 percent fail within two years of beginning operation. Therefore,
    your business has an approximately 45 percent chance of being successful.


    Numerous books have been written on the subject of how to avoid becoming a failed
    business owner. To summarize all these ideas, success in starting your own business
    comes down to the same initiative that applies throughout the financial-planning
    and wealth-management process: you have to plan to be successful.


    The following are five commonly agreed-on steps you can use to help ensure your
    success when starting a business:


    1.  Begin a business in a trade, skill, or service that you know.

    2.  Write a business plan.

    3.  Consider your form of business operation. Do you wish to operate as a sole
    proprietor, partnership, corporation, or limited liability company?

    4.  Recruit individuals to the business who possess strengths that are different
    from your own.

    5.  Give some up-front thought to how you will pass on the business to others—usually
    family members—if that is important to you.'
