    under the policy but before any benefit payments are made. In the case of disability
    insurance, an elimination period of 90 days is probably optimal when considering
    the trade-off between covering the required payments from personal funds for a
    number of days and the need for as low an insurance premium as possible. Longer
    elimination periods naturally reduce policy premiums, but the longer this period,
    the greater the need for personal savings or other alternatives to cover the insured’s
    ongoing living expenses.


    A somewhat novel and increasingly popular alternative that insurance agents are
    recommending to cover the elimination period is the separate purchase of a critical
    illness insurance policy . Critical illness insurance is an insurance policy that
    makes a lump sum cash payment if the insured is diagnosed with one of the critical
    illnesses listed in the policy and survives a minimum number of days (typically
    30) from the date of diagnosis. Such a policy may be underwritten to require payment
    for the same illness or condition that prompts the insured to make a claim under
    their disability policy—and to make the payment immediately rather than some 90
    days later.


    The maximum number of months or years that a disability income policy will pay
    a benefit is referred to as the benefit period . Most disability policies written
    today provide benefits until the insured becomes eligible for Medicare or reaches
    age 65\. Nonetheless, some insurance companies will write a policy that ensures
    disability payments are made throughout the life of the insured. Remember: the
    longer the benefit payment period, the higher the insurance policy premium. As
    such, you should think carefully about whether this trade-off is financially worth
    it. During retirement, if you are looking for a financial product to make lifetime
    payments, some form of annuity policy is likely a less expensive way to ensure
    an income stream, rather than an extremely long disability insurance benefit period.


    Finally, what most people are interested in when purchasing a disability income
    policy is the benefit amount that is payable. The general approach in the underwriting
    of all disability income policies is to pay individuals slightly less than their
    net after-tax income if they were able to work, thus encouraging them to return
    to work as soon as possible. This typically works out to a benefit payable of
    somewhere between 50 and 60 percent of an employee’s previous monthly gross pay.
    If you are covered at work by a group long-term disability policy at the time
    you apply for individual coverage, the amount of new disability insurance that
    you can obtain will probably be limited because of underwriting restrictions.
    If this is the case, ask your insurance agent if the company will sell you a rider—an
    addition to the insurance policy with specified benefits or conditions—that allows
    you to increase the benefit amount without having to undergo a qualifying medical
    exam. Or, better yet, purchase and implement an individual disability policy before
    you participate in the group policy; then you can receive both benefits in the
    event that you leave the company.


    You should also consider whether and how much of your disability insurance income
    may be taxable. In other words, how much of this income do you get to keep? Fortunately,
    unless you are self-employed, the answer is relatively simple. If the employer
    pays the disability income insurance premiums on your behalf, the disability income
    payments are taxable. Alternatively, if you pay the disability insurance premiums
    yourself, the disability income payments are income-tax-free. Therefore, when
    coupling a group policy with individual disability coverage, the group payments
    are taxable, whereas those payments made from an individual policy are not. In
    summary, you are now in the same position you would be in if you had been able
    to continue working and were receiving a steady paycheck.


    Let’s now address two other questions you should be sure to ask before purchasing
    an individual disability insurance policy. Each of these questions has to do with
    continuing policy coverage in the future and the price you must pay to obtain
    it.


    ## Policy Continuation Provisions


    The first question you should ask with respect to policy continuation is whether
    the policy can ever be canceled. In contrast to group policies, individual disability
    income policies may be underwritten as noncancellable . This is a guarantee that
    not only can the insurance company not cancel the policy, but it also cannot increase
    the policy premiums unless otherwise provided for in your contract. This kind
    of guarantee does not come cheap, particularly in today’s inflationary society,
    but you want the cash-flow protection if you can get it.


    The second question to ask with respect to policy continuation is whether the
    company can raise your premiums. Certainly, if you have been fortunate enough
    to secure a noncancellable policy, the answer is no. However, what if you cannot
    or do not want to incur the additional cost of a noncancellable policy ? In that
    case, you have another option: you can purchase a guaranteed renewable policy.
    A guaranteed renewable policy allows the insurance company to increase the premiums
    but not to change the terms of the policy once written. The company also guarantees
    that you can renew the policy at the date of expiration as long as you have paid
    the premiums on a timely basis. In addition, the company cannot single you out
    for any rate increase; it may increase the premiums only for an entire class of
    similarly rated insureds.


    Guaranteed renewable policies generally have lower premiums than noncancellable
    policies. Insurance companies are loath to increase the premiums on guaranteed
    renewable policies after they’re issued for fear of creating disgruntled policyholders.
    As such, it may be possible for you to get essentially the same level of protection
    with a guaranteed renewable policy as with a noncancellable policy but at a much
    lower cost.'
