  trans: '

    # 我需要立遗嘱吗？


    关于是否需要立遗嘱，简短的答案是：是的！无论你的个人和财务状况如何，遗嘱都能让你表达希望在去世后如何将财产分配给受益人。同时，立遗嘱也允许你指定自己选择的人来管理你的遗产。


    如果你没有做到以上任何一点，你的遗产不仅很可能按照你去世时所在州的法律意愿进行分配，而且该州还会指定谁来管理你的遗产。这个过程被称为`无遗嘱继承`，可以概括为执行该州已为你写好的遗嘱。如果你不喜欢该州的遗嘱——哪怕你根本不知道它是什么——那么，以你认为合适的方式，通过私人立遗嘱来实现你个人意愿，是一种审慎的遗产规划技巧。


    对于有未成年子女的年轻已婚夫妇来说，立遗嘱尤为关键，因为遗嘱是允许他们有机会为子女指定监护人的主要文件。如果父母一方去世时另一方仍在世，则无需指定监护人。但若父母双方在同一场灾难或事故中不幸同时去世呢？在这种情况下，如果未立遗嘱，法院（在此称为遗嘱认证法院）将指定监护人。如果未成年子女的祖父母或外祖父母仍在世，他们可能是合适的人选。但假如你的父母（即孩子的祖父母或外祖父母）健康状况不佳或与你居住地相距甚远呢？如果是这种情况，法院很可能会寻求由你的兄弟姐妹来担任监护人。如果祖父母、兄弟姐妹（或任何其他家庭成员）都不在身边，甚至不存在，法院会寻找一位值得信赖的朋友或可能的寄养家庭。无论如何，作为年轻的已婚人士，如果你不希望法院来决定你未成年子女的命运，请主动立下一份遗嘱，指定好监护人。


    然而请记住，父母在遗嘱中仅为未成年子女指定监护人是不够的。你的父母或兄弟姐妹或许能够承担起对你未成年子女的监护责任，但如果这个人不善于管理你留给他们用于照顾孩子的钱财，该怎么办？如果是这样，你可能希望考虑在遗嘱中加入一个信托，其目的是代表孩子接收并投资这笔资金，以便日后分配。你需要为这个信托指定一名受托人——但请记住：有效履行受托人法律职责所需的技能，与监护人所需要的技能并不相同。换句话说，一个适合担任监护人的人所具备的共情能力，与一个受托人最重要的财务能力，可能无法在同一个人或家庭成员身上兼备。因此，你可能希望为每个角色指定不同的人。如果这样做，请确保这些人能够有效合作。毕竟，如果你的监护人和受托人不和，你将无法在中间进行调解，而你的未成年子女可能会因此受到影响！


    如果你确实在遗嘱中为子女的福利设立了信托（在遗产规划中称为`或有信托`，因为它仅在父母同时去世这一或有事件发生时生效），那么你需要更改所有受益人指定，将受托人的名字包含在内。特别重要的是，要指定该受托人为你本人寿险保单的或有受益人或次要受益人；否则，保险公司将需要获得遗嘱认证法院的命令，才能将保险金支付给受托人。此外，根据所有州的法律，未成年人不能以自己的名义拥有财产。如果你在遗嘱中给未成年子女留下了财产，却没有指定监护人，法院就必须任命一位监护人代为接收财产。综上所述，在你生前完成遗产规划的必要组成部分，以避免这些后果，要容易得多。


    鉴于其重要性，为何许多人从未立过遗嘱呢？主要有两个原因：


    -   立遗嘱会提醒我们自己终有一死，而这是许多人都不愿考虑的话题。

    -   许多人认为立遗嘱的费用高得令人望而却步。


    关于克服第一个障碍，请考虑一下，如果你不立遗嘱，可能会给你的在世亲人留下怎样的局面。很可能，你的亲人们希望你的离世对他们来说尽可能容易接受——而知道你在遗嘱中已为他们做好安排，会给他们带来极大的安慰。此外，如果你已更进一步在遗嘱中设立了信托，你可以按照自己认为最适合在世亲人的时机，来指示财产的处置。这俗称为“从坟墓里说话”，你在遗产规划文件中给出的指示越多，你的声音就越响亮！


    关于立遗嘱费用的异议，通常可以通过研究你的替代方案来解决。例如，大多数律师为起草遗嘱收取固定费用，该费用根据所需起草的工作量而变化。一份简单的遗嘱，或者不涉及任何遗产税规划的遗嘱，可能只需几百美元——甚至更少，如果它是律师起草的一整套遗产规划文件的一部分的话。此外，现在许多网站都提供标准化的遗嘱和其他遗产规划文件，你也可以考虑使用。

    '
- fmt: '# Leaving Property via Beneficiary Designations


    It is possible to avoid the probate process and leave your property to others
    via beneficiary designations, such as those included with your life insurance
    policy, `IRA`, and retirement plan at work. Although many educated consumers are
    aware of this possibility, what about property for which a beneficiary designation
    is not possible, such as your checking and savings accounts, brokerage accounts,
    and articles of personal or real property? Unfortunately, each of these must be
    considered separately when it comes to distributing property to others.


    Checking and savings accounts may generally be left to others only by a will (or
    your state’s laws of intestate succession). If you are married, you may wish to
    consider titling these accounts in joint tenancy with right of survivorship to
    your spouse. If you title the accounts in such a manner, they will pass directly
    to the other named joint tenant, and not under a will, at your death. However,
    be aware that during your lifetime, each spouse owns 100 percent of the monies
    in the accounts and can do with them as they wish—without the consent of the other
    spouse. If you are not married but nevertheless want a second name on your checking
    and savings accounts, ask your bank to establish a joint account for convenience
    only (otherwise referred to as a convenience account). In most states, titling
    your accounts in this manner means the second party to the account may withdraw
    monies from the checking or savings account—but only for the benefit of the primary
    joint tenant. At death, a convenience account may or may not be left to the second
    party without having to write a will, depending on the law of the particular state.


    Brokerage accounts are usually easier to pass directly to others without writing
    a will. As mentioned in Chapter [14](#A314864_2_En_14_Chapter.html), if you are
    working with a stockbroker, ask them to title the brokerage account by using a
    transfer-on-death (`TOD`) form. As with an `IRA` or retirement plan, you need
    only name a beneficiary for the account and fill out the requisite form for the
    broker or mutual fund family to honor the request. But be aware that if you have
    not completed a `TOD` form for your brokerage account during your lifetime, your
    will or state law will dictate its disposition at death. Note that a bank has
    a similar form, known as a payable-on-death (`POD`) form, to provide for the passing
    of bank accounts directly to a named beneficiary.


    The disposition of personal property articles at death may not be of much concern
    to many decedents. This is because either they do not have significant articles
    of value or they simply wish to leave their personal property for others to sell
    or dispose of. However, if a particular piece of property is an antique or has
    been passed down through several generations of family members, you should attach
    to your will a statement of personal property memorandum to dictate the disposition
    of the item. All states provide for this statement. As long as the statement is
    incorporated by reference in your will, and as long as your will includes certain
    default provisions, you do not need to complete the statement at the time you
    execute your will. Rather, you may subsequently describe the articles you wish
    to leave to others and sign the statement at a later date. In other words, you
    have time to consider future circumstances in deciding how best to dispose of
    valuable items.


    Finally, in most states, individually titled real property (such as your home)
    may be separately distributed via a beneficiary deed. Moreover, you do not have
    to be a resident of the state where the real property is located to use that state’s
    beneficiary deed. The purpose of completing this deed is primarily to avoid the
    necessity of probating the real property or home at your death. As such, the proper
    completion of a beneficiary deed can be a substitute for the execution of a will
    in the disposition of such property. Keep in mind, however, that the state may
    or may not require the filing of the deed for it to be effective, so you should
    check your state laws after completing the deed.


    # Titling Property


    We now move on to what is known as the poor man’s will in estate planning—titling
    all or most of your property jointly so that it may pass to a beneficiary by operation
    of law in the state where you die. Proceeding in this manner means you may not
    have to write a will at all, although, as just discussed, you may wish to do so
    for other reasons. Keep in mind that although titling property jointly with another
    person is a simple and effective method of transferring your property at death,
    you may need to reconsider for estate-tax reasons. After all, leaving property
    via joint tenancy to a surviving tenant who already owns significant amounts of
    property in their own name may add to the survivor’s potential estate-tax liability.


    For example, assume that you own property with a fair market value of $10 million
    jointly with another person at your death. Depending on when the survivor dies
    and the estate-tax exemption amounts at that time, the survivor may end up owing
    a sizable amount of estate tax if they already own $10 million of property in
    their own name prior to receiving your property. Note that this may be a concern
    for both spouses and nonspouses who are the surviving joint tenants of another
    person’s property.


    If you do not believe you will have an estate-tax problem at your death, owning
    property jointly with another person may substitute for the beneficiary designation
    that is possible with other assets. In this case, even if you do write a will
    and leave your property to someone other than the surviving joint tenant, the
    will provision is generally ignored and the property passes by operation of law
    to the surviving tenant.'
