  raw: '# 21. Reaping the Rewards


    This book has introduced you to a new method of ordering your financial life and
    planning for your financial future. It has also developed a novel definition of
    the term wealth —a definition that goes beyond the traditional meaning of accumulating
    enough financial riches to ensure that your current or desired standard of living
    is maintained throughout your working years and subsequent retirement.


    How do you go about ensuring that you are wealthy in the fullest sense of the
    word? This book suggests that this sought-after status may be best achieved by
    following the PADD strategy for wealth accumulation and management:


    *   Protecting yourself, your family, and your property

    *   Accumulating wealth

    *   Defending your wealth

    *   Distributing your wealth during your lifetime and at death


    Broadly, this process may be thought of as following these financial-planning
    steps:


    1.  Insuring yourself, your family, and your property against the possibility
    of significant loss  

    2.  Taking advantage of benefits that are offered by your employer, most notably
    any employer-sponsored retirement plan  

    3.  Investing in financial or real assets—or both  

    4.  Minimizing the effects of inflation on your portfolio as much as possible
     

    5.  Practicing effective tax-planning and tax-management techniques  

    6.  Preparing for your children’s higher education  

    7.  Planning for your retirement years  

    8.  Distributing your estate at death to your intended heirs or beneficiaries
    in as transfer-tax-efficient a manner as possible  


    Maximizing the implementation of these steps is not easy. If it was, this book,
    and many others on the topic of effective personal financial planning, would not
    be necessary. However, it should be comforting to know that you are not alone
    in meeting this challenge! A number of professional advisors, among them Certified
    Financial Planners (CFPs), Certified Public Accountants (CPAs), securities and
    insurance professionals, and estate-planning attorneys, stand ready to assist
    you in meeting your financial-planning and wealth-accumulation goals. Alternatively,
    if you believe you are skilled and disciplined enough to take on this challenge
    yourself, you should by all means do so.


    Attending to your financial life and affairs is analogous to Scarlett O’Hara’s
    famous line in Gone with the Wind: “Oh, fiddle-dee. I’ll think about it tomorrow!”
    In other words, the longer you put off thinking about the financial-planning process,
    the longer it will be before you become wealthy—and the sooner a financially challenging
    tomorrow will arrive! If this book has accomplished nothing else, I hope it has
    provided you with some basic principles and knowledge with which you can begin
    to take control of your financial life. If you adopt the process described in
    its pages, you will reap the greatest reward of all: a financially worry-free
    and independent life that you can enjoy to the fullest with family and friends.


    I wish you good planning.


