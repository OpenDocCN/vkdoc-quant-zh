  raw: '*   The unearned income tax on minors applies after a specified annual amount
    of interest or dividends on the account is generated. Accordingly, when this amount
    is reached (for example, $2,100 in 2018), any further income is taxed to the child
    at the heavily compressed trust and estate income-tax rates. This is the taxable
    result even if the child’s grandparent or other relative funds the account.

    *   For example, assume that your parent (your child’s grandparent) has transferred
    $150,000 over the years to a UTMA established on behalf of your child. Further
    assume that this $150,000 generates a 10 percent return in the account ($15,000
    of unearned income to the child). Thus, the child incurs a tax of $3,159.50 (+$105
    as explained later in this paragraph) on the net taxable income of $12,900, or
    37 percent of the amount in excess of $12,500 plus a base amount of $3,011.50
    using the 2018 trust and estate income-tax rates. Note that you, the parent or
    grandparent, received a nominal income-tax benefit in avoiding tax on the first
    $1,050 of income from the account, with the child subsequently paying only $105
    tax on the next $1,050 of income ($1,050 times 0.10)

    *   As compared to a Section 529 private savings plan, which allows a one-time
    contribution of up to $75,000 to be made in 2018 (or $150,000 for married couples
    who split the gift), the amount that may be contributed annually to the custodial
    account free of any federal gift tax is extremely limited. For example, currently
    no more than $15,000 may be contributed to a custodial account in any one year
    on behalf of any one child without having to report the gift as taxable for federal
    gift-tax purposes.

    *   As a general rule , custodial assets are treated as assets of the child when
    determining qualification for federal financial aid. As a result, these assets
    are usually counted against the child in the amount of 35 percent when computing
    the EFC.


    There is one major exception to the federal financial aid disadvantage incurred
    in saving for college using custodial accounts. Given the recent introduction
    of the much more favorable Section 529 private savings plans, many parents are
    transferring (or should be transferring) UGMA or UTMA monies into Section 529
    plans. The resulting account is known in the financial world as an UGMA/Section
    529 plan or UTMA/Section 529 plan, depending on which type of custodial account
    is possible under state law. Although current financial aid law states that either
    an initially established Section 529 plan or a converted UGMA/Section 529 or UTMA/Section
    529 plan is treated as an asset of the parent if the student is dependent, the
    parent is not permitted to change the beneficiary of a converted custodial account
    (as would be possible with the initially established Section 529 plan).


    ### Education Savings Accounts


    Named after Senator Paul Coverdell of Georgia, who sponsored the initial legislation
    that championed this education savings alternative, a Coverdell education savings
    account (ESA) is an investment account opened with a bank or other financial institution
    and funded with cash. Contributions to an ESA are not income-tax deductible, but
    the earnings generated from the contributions grow tax-free in the account. This
    is the case only so long as distributions made from the account are used to pay
    a child’s educational expenses. If they are not, the earnings are taxed to the
    account owner—usually the parent—along with a 10 percent penalty.


    Contributions to the ESA are permanently limited to no more than $2,000 annually
    for the benefit of a child under the age of 18\. The ability to make account contributions
    is phased out for single taxpayers with an adjusted gross income (AGI) of between
    $95,000 and $110,000 and for married taxpayers filing jointly with an AGI between
    $190,000 and $220,000\. This phaseout does not adjust annually for inflation,
    unlike other similar tax provisions. Thus, Congress elected to “schedule” the
    limit and deny the ability of higher-income individuals to take advantage of the
    ESA planning opportunity.


    A major advantage of funding an ESA, which is the successor to the well-known
    (although not well understood) Education IRA, is that distributions or withdrawals
    from the account may be used not only in payment of college education expenses,
    but also to cover costs associated with attending public or private elementary
    or secondary schools. If you anticipate sending your child to a college-preparatory
    elementary or high school, you may wish to seriously consider saving via an ESA.
    Preparatory school costs may include the expense of school uniforms, computers,
    and even tutoring services, all of which may be paid with ESA money.


    When the beneficiary of an ESA attains age 30 (unless the beneficiary is developmentally
    disabled, otherwise has special needs, or dies prior to that age), the account
    proceeds must be distributed to them within 30 days. But at such time or before
    the child attains the age of 30, the account proceeds may be rolled over, income-tax
    free and penalty-tax free, into an ESA for the benefit of another, younger family
    member. Moreover, beginning in 2018, the provisions of the 2017 TCJA permit a
    rollover to be made from the ESA to a Section 529 plan at any time.


    Finally, what about the financial aid implications of saving using an ESA? The
    answer to this question depends on who is the owner of the account: the child,
    the parent, or the grandparent. If the child is both the owner and the designated
    beneficiary of the ESA, and they are still considered a dependent at the time
    of filing the FAFSA form, none of the ESA assets are counted against financial
    aid. On the other hand, if the child is both the owner and designated beneficiary
    of the ESA, and they are considered independent of their parents, 20 percent of
    assets are counted against financial aid. If the owner of the ESA is a parent,
    5.64 percent of the assets are counted against financial aid. Finally, if the
    ESA owner is a grandparent, none of the assets should count against financial
    aid, because there is no place to report ESA assets owned by people other than
    a parent or the child on the FAFSA form.'
