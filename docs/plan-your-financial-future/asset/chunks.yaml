    \n还要感谢 Apress 商业团队的各位，特别是**摩根·埃特尔**和**丽塔·费尔南多**。你们是最棒的团队！\n\n**目录**\n\n**第一部分：理财规划流程**\
    \  \n第 1 章 理解挑战：启动的必要性 3  \n第 2 章 你需要理财规划师吗？ 19  \n第 3 章 个人理财规划与财富管理流程的要素 31 \
