  trans: '

    ## 基本税务规划技巧#1：避税


    “`tax avoidance`（避税）”一词可狭义理解，例如高税级纳税人将财产赠与低税级纳税人，并由后者以较低税率就该财产缴纳所得税；也可广义理解，指高税级纳税人无需就该收入缴纳所得税。在本书的语境中，你应尽可能从广义上理解“`tax
    avoidance`”。


    最常见的避税案例是充分利用税法允许你享有的所有所得税扣除项。`tax deduction`（税收扣除）是指基于你的边际所得税率，对应纳税所得额进行百分比减免。例如，若你处于
    32%的边际税级，则实际上仅需为收入的 68%（`1 减去 0.32`）纳税。同样，所有纳税人都可获得的`standard deduction`（标准扣除）可使特定金额的收入免于征税。避税的第三个例子是争取符合法律规定的任何所得税抵免资格。`tax
    credit`（税收抵免）是对个人应纳所得税额的等额美元减免，因此不受纳税人边际所得税率的影响。例如，若你计算出今年抵免前的应纳所得税额为`10,000`美元，且符合`1,000`美元的抵免资格，则只需向政府缴纳`9,000`美元（`10,000`美元减`1,000`美元）。在实际效果上，作为一种避税技巧，抵免对低税级纳税人（税率
    22%及以下）更有利，而扣除则对高税级纳税人（税率 24%及以上）更有利。


    作为普通纳税人，你有权选择两种一般扣除项之一：法律根据你的申报状态规定的特定`standard deduction`（标准扣除），或一系列称为`itemized
    deductions`（逐项扣除）的扣除项。你应选择两者中较高的那项，因为这能为你带来最大的税收利益。就实际情况而言，鉴于 2017 年《减税与就业法案》（`TCJA`）将`standard
    deduction`（标准扣除）金额提高了一倍，你很可能选择`standard deduction`（标准扣除）。只有高收入的房主或慈善家才可能进行`itemize
    deductions`（逐项扣除）。若你选择逐项扣除，可能可以利用以下扣除项：


    *   未获（健康保险）报销的医疗费用

    *   州与地方所得税及财产税（每年最高限额`10,000`美元）

    *   替代州与地方所得税的州与地方销售税（同样每年限额`10,000`美元）

    *   住房抵押贷款或“购房债务”利息支付（购房金额限额`750,000`美元）

    *   慈善捐款


    如前所述，无论你选择`standard deduction`（标准扣除）还是`itemize`（逐项扣除），符合条件的纳税人均可享受某些`tax credits`（税收抵免）。抵免通常分为两类：`refundable`（可退还）和`nonrefundable`（不可退还）。`refundable
    credit`（可退还抵免），如`earned income-tax credit`（劳动所得税抵免），是指即使你没有应纳所得税额，政府也会向你支付款项。相反，`nonrefundable
    credit`（不可退还抵免）最多只能将你的应纳税额降至零（换言之，若你不欠税，则不会单独获得退款）。在这两者中，你应最大化你能获取的`refundable
    credits`（可退还抵免）数量。然而不幸的是，大多数抵免都是`nonrefundable`（不可退还）的。


    最流行的`nonrefundable`（不可退还）（或仅部分可退还）抵免包括：


    *   儿童与受抚养人照护税收抵免

    *   儿童税收抵免（部分可退还）

    *   收养抵免

    *   老年人或残疾人抵免

    *   某些高等教育费用抵免，例如终身学习抵免


    作为尽可能少缴纳常规所得税的一般策略，你应将扣除和抵免加速计入当前纳税年度，而将收入递延至下一年度或后续年度。受薪纳税人通常难以递延收入，因为他们无法控制收款时间。然而，自雇纳税人在运用此税务规划技巧方面则拥有更大的自由度。例如，自雇纳税人可以选择在次年
    1 月初而非本年 12 月底向客户开具账单，从而递延该收入的应缴税款。


    ### 避税 vs. 逃税


    既然我们正在讨论`tax avoidance`（避税）这一话题，有必要区分所得税避税规划技巧与`tax evasion`（逃税）。避税技巧完全合法，是利用税法赋予你的诸如扣除和抵免等税收优惠。相反，`tax
    evasion`（逃税）是非法的；它意味着你意图不遵守税法。最常见的`tax evasion`（逃税）形式是未申报你在该日历年度内的全部应税收入。


    如果在申报任何特定年度的纳税申报表时，你意图违法，国税局（IRS）必须在法庭上证明这一事实。若能证明，你将被判犯有重罪，可能面临巨额罚款或联邦监狱监禁。幸运的是，监禁很少作为`tax
    evasion`（逃税）的惩罚。相反，赔偿（补缴应缴税款）和罚款是政府更倾向的追责方式。尽管如此，如果你卷入逃税案件，无论是作为调查对象还是知晓某些情况的人，你应立即联系税务律师，由其在国税局刑事调查处（CID）面前代表你。不要自愿向刑事调查处（CID）发言，因为你说的任何话日后都可能被用来对付你。

    '
- fmt: '## Basic Tax-Planning Technique #2: Tax Deferral


    The most common tax-deferral technique is to contribute to a retirement plan at
    work or to a personal retirement savings plan, such as a traditional `IRA` or
    `Roth IRA`. We have already talked about the importance of contributing to your
    employer’s `401(k)` or `403(b)` retirement plan and taking advantage of any matching
    contributions your employer may offer. However, from a tax-planning perspective,
    you are also deferring the tax on any contributions made to the `401(k)` or `403(b)`
    plan and deferring the tax on any earnings generated from those contributions.
    Because `401(k)` and `403(b)` plans are tax-deferred retirement plans under law,
    you must pay tax on your contributions and earnings beginning in the year after
    you reach the age of 70 and 6 months. In the meantime, you have enjoyed the financial
    advantage of the tax-free compounding of your money. Let’s try to understand the
    importance of this advantage.


    If you were asked, “Would you rather have $1,000 today or $1,000 ten years from
    now?” you would likely intuitively answer, “$1,000 today.” Why? The logic is that
    if you receive $1,000 today, you can invest the lump sum and make even more money
    with it. Assume that you invest your $1,000 in a US Treasury note that returns
    5 percent annually. At the end of ten years, you will have $1,628.89. Alternatively,
    if you were to take the $1,000 ten years from now, the present value of this same
    amount would be only $613.91 in today’s dollars.


    Now let’s look at this question another way. Think of the 5 percent annual rate
    of return as a tax percentage. If you have an income-tax liability this year of
    $1,000 but you can somehow defer that liability for ten years, the present value
    of that liability is now only $613.91 (a savings of more than $386). And, using
    time-value-of-money principles, the longer you postpone that liability, the lower
    your present value and the greater your savings. Moreover, you should be aware
    that by year 40, your $1,000 liability is worth only $142.05 in present value
    dollars—approximately 14 cents on the dollar. You have generated the other 86
    cents on the dollar completely income-tax free, which is the beauty of income-tax
    deferral with respect to retirement plan accumulations of wealth.


    There are also other tax-deferral techniques involving financial products. Notably,
    if you purchase a tax-deferred fixed or variable annuity product, the taxes on
    your earnings from the after-tax contributions to that product are deferred (in
    some cases, until age 100). You can also purchase a tax-deferred annuity with
    a lump-sum distribution that you make from an employer’s retirement plan (such
    as a `401(k)`). However, because those contributions are really made with before-tax
    money (you never paid taxes on it), distributions must be made in the year after
    you reach the age of 70 and 6 months if you want to avoid paying hefty taxes on
    them.


    Another financial product that provides for tax deferral is a cash-value life
    insurance policy. If you do not access the cash surrender amount in this policy
    during your lifetime, the death proceeds from the policy to your named beneficiary
    are completely income-tax free. Alternatively, the earnings on the cash value
    accumulated within a whole life, universal, variable, or variable/universal life
    insurance policy are tax-deferred until you surrender the policy, assuming that
    the cash value you receive is in excess of the premiums paid on the policy at
    the time of surrender. For example, assume that you have owned a whole life insurance
    policy for some time and have accumulated $70,000 of cash-surrender value. During
    the course of the year, you surrender this policy for cash but have paid only
    $50,000 in premiums on the policy to date. The portion of the lump-sum payment
    of $70,000 in excess of the premiums paid of $50,000 ($20,000) is taxable immediately,
    payable at your current marginal income-tax rate.


    ## Basic Tax-Planning Technique #3: Conversion of Income


    Ultimately, every item of income is generally classifiable as either ordinary
    income (such as salary and wages) or capital gains (generally, income deriving
    from the sale or disposition of an investment product, such as a stock or business
    property). As previously noted, significantly different tax rates potentially
    apply to each of these types of income. For example, ordinary income is taxed
    at a maximum rate of 37 percent, whereas long-term capital gains income is taxed
    at a maximum rate of only 20 percent. This rate spread of almost 20 percent suggests
    the prudence of following a tax-planning strategy that converts as much ordinary
    income as possible into capital gains income. It also underscores the importance
    of saving and investing as much as possible, because the appreciation on investment
    assets is taxable at a rate of no higher than 20 percent.


    Assume that you have earned $1,000 in salary and are currently (in the year 2018)
    in the maximum ordinary income-tax bracket of 37 percent. Your after-tax, disposable
    dollars are $630 ($1,000 less $370). If you take this same $1,000 and invest it
    in ABC stock, which you later sell for $2,000 at least one year after you bought
    it, your after-tax, disposable dollars are now $800 ($1,000 less $200). Note that
    you incur only a 20 percent capital gains tax. If you were in the 12-percent-or-lower
    ordinary income-tax bracket, you would not pay any capital gains tax on this sale.


    Since 2003, you can take advantage of capital gain income-tax rates on most investment
    income (dividends) generated from stocks or stock mutual funds. However, keep
    in mind that dividends payable from indirect real-estate investments, such as
    a real estate investment trust (`REIT`), do not typically qualify for this same
    advantage (although, beginning in 2018, there is a reduction in the maximum tax
    rate for some `REIT` dividends). As such, a tax-efficient conversion of income
    is not completely possible with `REIT` investments. There is also a common reverse
    conversion of income that many taxpayers unwittingly commit without realizing
    it. This occurs when a taxpayer invests in mutual funds (or individual stocks
    and bonds) in a retirement plan—either an employer-sponsored plan, such a `401(k)`,
    or a traditional deductible `IRA`. In such cases, what the taxpayer has really
    done is invest in a capital asset, which could potentially be taxed at a lower
    capital gains rate on sale, and then converted it to an asset that requires the
    payment of ordinary income taxes on distribution. This happens because, for income-tax
    purposes, a distribution from a retirement plan or `IRA` is considered a replacement
    for a salary, which would otherwise be taxable as ordinary income. Nonetheless,
    this disadvantageous conversion of income is likely outweighed by the extremely
    favorable, long-term tax deferral of earnings and contributions associated with
    an employer-sponsored retirement plan or `IRA`.'
