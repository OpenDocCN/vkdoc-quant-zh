- fmt: '### Other Methods of Saving for College


    Several other methods are available for saving for your child’s higher education,
    including establishing a trust on their behalf. (See Chapter [13](#A314864_2_En_13_Chapter.html)
    for further discussion of trusts.) All trusts that may be used for this purpose
    are irrevocable, meaning you cannot get the money back, and ultimately the trust
    principal must be distributed to the minor. Perhaps the most popular trust used
    in planning for the college education of a child is the `Section 2503(c)` trust,
    also known as a minor’s trust. This trust must be drafted by an attorney, with
    the trust principal (and any unexpended income) made available to the child when
    they reach age 21. The age of distribution may be extended at your discretion
    by adopting an alternative trust, referred to as a `Section 2503(b)` trust, but
    the income from the `Section 2503(b)` trust must be distributed annually to the
    child, thus resulting in additional Kiddie Tax concerns.


    You can also purchase `Series EE` and inflation-adjusted `Series I US Savings
    Bonds` and dedicate them to the purpose of paying for your child’s college education.
    With both of these alternatives, the bond must be purchased in your name or in
    the name of an adult who is at least 24. Furthermore, adjusted gross income (`AGI`)
    limits apply at the time of redeeming the bonds. For example, if you purchase
    the bond in your name with the intent to use it to pay for the college expenses
    of your child, and your `AGI` is too high (a specified amount under law) when
    the child attends college, you will have to pay income tax on the bond interest
    at the time that you redeem the bond. However, if your `AGI` is below the prescribed
    amount, you will not be taxed on the interest as long as the bond is used in payment
    of qualified higher-education expenses.


    ## Tax Deductions and Credits Available for Paying for College


    This section addresses the benefits provided by the income-tax law to help you
    or your child pay for costs incurred while in college or pursuing some other type
    of higher education. The deductions available are a deduction for interest paid
    on student loans and a qualified higher-education tuition deduction. Important
    credits include the American Opportunity Tax Credit and the Lifetime Learning
    Credit. But since 2001, these deductions and credits cannot be taken together
    in payment of the same expense. As such, the use of each must be planned for carefully
    so as to take maximum advantage of every benefit available to you.


    ### Deduction for Student Loan Interest


    Under current law, the interest paid (never the principal paid) by any individual
    who is obligated to make repayment on a student loan is deductible regardless
    of whether the taxpayer itemizes their deductions. However, the deductible amount
    is limited to a maximum of $2,500 per year, and an income phaseout range applies
    based on the taxpayer’s `AGI` level. Although these phaseout ranges are high,
    particularly for a student borrower, they can operate to deny the deduction for
    high-income taxpayer borrowers, such as parents who opt to take out a `PLUS` loan
    to pay for their child’s education.


    For this deduction to be taken, any debt incurred by the borrower must be used
    solely to pay for qualified higher-education expenses, including tuition, fees,
    books, and room and board. There is no restriction with respect to whether this
    debt is incurred for study toward an undergraduate or a graduate degree, but as
    part of the definition of a qualified higher-education expense, the debt must
    be taken out for study at a qualified educational institution.


    ### Qualified Higher-Education Tuition and Fees Deduction


    This deduction expired at the end of 2016 and was not extended by the `TCJA of
    2017`. Therefore, the deduction is no longer available except if the tuition and
    fees also qualify as an allowable business expense (a `Schedule C` deduction).
    The maximum deduction available under prior law was $4,000 per student per year.


    As we discuss shortly, a parent may also potentially claim a tax credit, such
    as the American Opportunity Tax Credit (`AOTC`) or Lifetime Learning Credit (`LLC`),
    for higher-education tuition and fees expenses. But if they do so, payment of
    tuition and fees expenses, for example, using a `Section 529` plan distribution,
    is not permitted for the same expense for the same student. This presents an interesting
    dilemma if you are a parent with two children in college at the same time. You
    should give some thought as to how to best maximize any tax credit that is allowable
    for one child and any payment of tuition and fees expense for the other. In essence,
    although a two-student parent may mix and match tax credits and payment of tuition
    and fees expense, you cannot double-dip when trying to take advantage of both
    tax breaks for the same student.


    ### Higher-Education Tax Credits


    As discussed in Chapter [12](#A314864_2_En_12_Chapter.html), a tax credit (or
    a dollar-for-dollar reduction in tax due) is a valuable tax-avoidance technique.
    In most cases, if a taxpayer can qualify to take advantage of any tax credit,
    they should structure their financial affairs to do so. When a tax benefit is
    sought in paying for the considerable cost of pursuing higher education, two credits
    are permitted: the American Opportunity Tax Credit (`AOTC`) and the Lifetime Learning
    Credit (`LLC`). Prior to 2009, a third credit—the Hope Scholarship Credit—was
    permitted. It was replaced by the `AOTC` effective for the payment of certain
    higher-education expenses after December 31, 2008.


    #### American Opportunity Tax Credit


    The American Opportunity Tax Credit (`AOTC`) is a modification of the Hope Scholarship
    Credit for tax years beginning after December 31, 2008; it was preserved through
    the year 2025 by the `TCJA of 2017`. The `AOTC` amount is the sum of 100 percent
    of the first $2,000 of qualified tuition and related expenses plus 25 percent
    of the next $2,000 of qualified tuition and related expenses for a maximum credit
    of $2,500 per eligible student. Thus, a maximum of $4,000 in qualifying annual
    expenses may be taken into account in computing the credit. The student may take
    the `AOTC` themselves, if he or she is not claimed as a dependent; otherwise,
    the parent, or someone else, is paying the student’s tuition and takes the credit,
    if claiming the student as a dependent.


    What is a qualifying expense for the purposes of the credit? Unlike the Lifetime
    Learning Credit, for which only tuition and fees may be considered, the American
    Opportunity Tax Credit also includes such expenses as books, school supplies (including
    computers), software, and other class materials.


    The credit is available for the first four years of a student’s undergraduate
    education, but phaseout rules apply. In 2018, the credit amount phases out for
    single taxpayers with annual `AGIs` between $80,000 and $90,000. For married taxpayers
    filing jointly, it phases out between $160,000 and $180,000.'
