  trans: '

    # 示例排版结果


    我们再来看另一个例子。假设你在 2018 年去世，应税遗产为 1120 万美元，并且此前没有进行过任何会减少该金额的生前应税赠与。适用的统一转移税表显示，这
    1120 万美元财产的遗产税为 4,425,800 美元。由于你拥有等额的允许抵免额，你可以用该抵免额减少应纳税额，最终实际应缴税款为零（4,425,800
    美元的暂定遗产税负减去 4,425,800 美元的统一抵免额）。当遗产规划师告诉你，除非你在 2018 年去世时遗产超过 1120 万美元（或适用你去世年份的免税额等值金额），否则无需缴纳遗产税，他们实际上是在说，你有资格获得相当于
    1120 万美元遗产税的统一抵免额。


    以上对遗产税制度复杂性的讨论应该可以让你清楚，你需要了解联邦遗产税制度如何运作，以及可以采取哪些措施来减少去世时的应税遗产。这也是为什么如果你目前是高净值人士或预期将成为高净值人士，你应该联系财务规划师或遗产规划律师的部分原因。尽管如此，你对遗产税和赠与税法律了解得越多，就越能理解可用于最小化这些税款的规划技巧。


    为此，请查看以下两个重要的表格，它们涉及遗产税转移和遗产税规划。表 19-1 反映了 2014–2018 年及以后（或至少到 2025 年，届时 2017
    年《减税与就业法案》将“日落”）适用于应税转移的税率等级和边际税率。表 19-2 则列出了这些年份的统一抵免额和免税额等值金额。


