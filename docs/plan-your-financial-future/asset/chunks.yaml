- fmt: '# Group Medical and Dental Insurance


    In Chapter [5](#A314864_2_En_5_Chapter.html), we discussed what an informed purchaser
    of health care services should take into account before selecting a health insurance
    policy. However, most wage earners have only the option of selecting whatever
    group medical and dental plans are offered by their employer. Historically, the
    most popular type of group medical plan provided by employers has been comprehensive
    major medical coverage, sometimes known as fee-for-service programs. Recently,
    though, managed care health insurance plans such as health maintenance organizations
    (HMOs) and preferred provider organizations (PPOs) have come onto the scene; and
    more recently still, employers have begun to offer a close cousin of the health
    savings account (HSA): the health reimbursement arrangement (HRA).


    An HRA is an employer-sponsored HSA that permits employees to accumulate funds
    for health expenses. Unlike with an HSA, however, there is no limit on the amount
    of money an employer may contribute to the employee’s HRA. Employers offering
    HRAs typically pair them with a high-deductible group health insurance plan in
    order to cover any sizable medical expenses incurred by the employee. Once the
    funds set aside in the HRA by the employer are used up in a given year, the employee’s
    health expenses are then covered by the high-deductible plan after the deductible
    and co-insurance requirements are met. If any funds remain in the HRA at the end
    of the year, these funds may be carried over to the following year, which allows
    employees to “save” for their future medical expenses.


    A major advantage of an HRA from the point of view of the employee is that preventative
    care, such as routine physicals and child immunizations, is not charged against
    the fund. In addition, because of the savings element associated with the arrangement,
    HRA participants have an incentive to use their health care dollars wisely. Employers,
    for their part, like HRAs because they help minimize health-care insurance costs:
    the underlying policy providing coverage has a high deductible, and the policy
    may never be used by relatively healthy employees.


    Unfortunately, most group dental insurance coverage plans have not yet adopted
    the HRA approach to payment of expenses. Most dental insurance uses managed care
    as a model, operating either as an HMO or PPO. If you have a dental HMO, the premium
    payments on your group coverage are sent directly to your dentist or specialist.
    If your plan is structured as a PPO, a network of participating dentists has agreed
    to provide services for a reduced fee to group insureds. You may go out of the
    network to an unaffiliated provider, but you pay a higher deductible and co-payment
    to do so.


    In summary, unless you participate in an HRA at work, your group medical plan
    probably provides you with little incentive to save your health care dollars.
    Further, the high cost of paying for your own medical care will likely dissuade
    you from purchasing an individual policy. As a result, you have to seek ways of
    paying for your share of the group medical costs (deductibles and co-payments)
    in as tax-efficient a way as possible, such as by participating in a flexible
    spending account (FSA). You should also turn your attention to other employment-provided
    benefits that may need to be supplemented with individual coverage, such as life
    insurance and disability income insurance.


    # Group Life Insurance


    The most common form of life insurance offered by employers is group term insurance.
    By its nature, this form of insurance is temporary and covers you only for a specific
    period, normally only as long as you work for the employer that is providing coverage.
    As such, you need to keep in mind that you will probably lose coverage when you
    leave your job. However, at that point in time, you typically will have the opportunity
    to convert your group term coverage into some form of permanent insurance (either
    whole life or universal life) offered by the same insurance company. Generally,
    this conversion privilege is available for only 30 to 60 days following the date
    the employee is no longer employed. But if you take advantage of it, the privilege
    of converting is usually a guaranteed benefit (you cannot be denied coverage regardless
    of your health status at the time).


    Group term life insurance is generally offered to employees as a multiple of their
    salary. For example, the death benefit provided by the policy is one or two times
    the employee’s current salary. Often, however, the employer portion of this benefit
    is capped at a specified amount, usually $50,000. This is because the employee
    is limited to a $50,000 cost-of-coverage exclusion under tax law before the employee
    must be attributed some cost of the protection as a taxable employee benefit.
    Stated another way, if the employer pays for more than $50,000 of group term life
    insurance on your life, then you must report the economic benefit of the extra
    insurance as taxable income. (The benefit amount is typically reported on the
    IRS Form W-2 at the end of the year.) Fortunately, this attributed amount of income
    is relatively small, and the cost that the employer pays for the insurance is
    still probably much less than you would have to pay if you tried to obtain the
    insurance coverage on your own. Plus, as mentioned previously, you probably have
    the right to convert the group term insurance after you have left that employer.


    Nevertheless, even with group term insurance coverage, you should analyze whether
    you have enough life insurance protection. Don’t assume you have enough coverage
    simply with what the insurance provides; and remember, unless you convert, you
    will lose the insurance when you leave the job. Rather, look at the group term
    coverage only as a starting point to be supplemented with individual life insurance,
    either an individual term or a permanent policy—or perhaps both.


    Another commonly provided group insurance is accidental death benefit (ADB) insurance,
    sometimes referred to as double indemnity insurance. Historically, this type of
    insurance has been purchased as a rider to a group life policy and doubles the
    death benefit payable to an employee’s beneficiary if death results from an accident
    while the employee is conducting employer business. Like group term insurance
    coverage, the ADB is typically limited in amount. However, this is to minimize
    employer cost and not to minimize the income-tax consequences for the employee.
    If you have ADB insurance protection, consider yourself one of the lucky few,
    because increasing numbers of employers are dropping such coverage. Moreover,
    it is difficult to envision a situation in which your need for life insurance
    protection is greater in the case of accidental death than it is under normal
    circumstances of death. Therefore, the doubling of the benefit is essentially
    free money that you would not have otherwise provided for your heirs.


    More and more employers are offering group permanent types of life insurance policies
    to their employees—notably, group universal life insurance. A group universal
    life insurance policy is similar in structure and provisions to an individual
    universal life policy, except that the group coverage is provided (up to a policy
    limit) without any evidence of insurability. Therefore, an employee in poor health
    who may not be able to qualify for individual coverage may obtain insurance through
    group underwriting. Also, unlike group term policies, group universal life policies
    are portable, meaning you can take the coverage with you when you leave the job
    (although a higher premium may then be charged).'
