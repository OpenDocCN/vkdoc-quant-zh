  trans: '

    # 债券及其适用时机


    与股票（持有者拥有发行公司的股权）不同，债券属于债务工具。换言之，当你从发行方（通常是企业或政府）购买债券时，你实际上是在向发行方提供贷款，以此换取定期（每半年或每年）从发行方获得利息支付的权利。鉴于债券的利息支付按可预测的时间表进行，你应当在你需要定期获得收入以补充日常现金流的时候，安排购买债券。当然，伴随这笔收入流的预期是：你不需要在未来的某个已知日期（即债券的到期日）之前收回你的原始投资（债券本金）或向发行方提供的贷款。


    通常来说，债券的到期日越长，其利息或票面利率就越高。这是因为你将资金借给发行方的时间更长，因此希望获得更高的利率作为回报（这被称为期限溢价）。但需注意：你实际赚取的利息金额取决于债券的应付利率，而该利率由一系列市场相关因素决定，其衡量指标之一便是所谓的收益率曲线。这条曲线定期刊登在《华尔街日报》等财经报纸上，它大致显示了你将资金长期锁定给债券发行方时，可能获得多少额外的利息。如果该曲线相对平坦，那么你承诺将资金借给发行方更长时间，可能并不会获得任何投资回报。因此，若收益率曲线呈平坦趋势，就不要投资于到期日超过数年的债券。相反，应将资金重新投资于另一期债券，等待长期利率上升——换言之，即等待收益率曲线恢复正常或正斜率状态。


    ## 公司债券


    债券通常由企业或政府发行。企业发行的债券有两种形式：有担保的债务，称为抵押债券；或无担保的承诺，称为信用债券。作为投资者，你可能会担心在债券到期日无法收回全部原始投资（即债券的违约风险），因此你可能希望将购买范围仅限于抵押债券，因为发行公司会以财产作为抵押品，一旦发行人违约，这些抵押品可以被出售。然而，根据投资风险与回报的权衡关系，抵押债券的收益率（即投资回报率）通常低于信用债券，因为你承担的可能违约风险较小。


    企业可能发行可赎回债券以及可转换为股票的债券。如果企业发行了可赎回债券，这意味着它可以在到期日之前提前偿还（即赎回）该债务。这样一来，你会比预期更早收回资金。然而，这种结果并不像看上去那么有吸引力。企业赎回债券的原因很可能是市场利率下降了——对企业来说，偿清原有债券，再以较低的利率（或票面利率）发行新债券更为划算。作为投资者，你现在面临的问题是如何将这些提前收回的债券资金，以当前较低的利率进行再投资。为了保护那些依赖债券固定利息收入的投资者，企业发行的债券通常会附带条款，规定在若干年之内不得赎回。尽管如此，如果你必须在可赎回债券与不可赎回债券之间做出选择，请选择不可赎回债券。


    另一方面，可转换债券既能给投资者带来每半年一次稳定利息收入的确信，又提供了在债券转换为发行公司标的股票时获得可观资本收益的机会。实际上，可转换债券为投资者提供了两种资本增值机会：不仅存在标的股票价格上涨的机会，而且随着股票价值上升，债券的价格也会上涨。例如，假设一张可转换为
    30 股 ABC 公司普通股的债券以 1000 美元发行；发行时，ABC 普通股的交易价格为每股 25 美元。如果 ABC 股票价格上涨至每股 35 美元，那么这张可转换债券的售价将至少为
    1300 美元（1000 美元加上股票增值的 300 美元）。


    可转换债券的主要替代品是标准债券（或称普通债券），它不能转换为发行公司的普通股。标准债券也可能是可赎回的，也可能不是。自 1998 年以来，美国国债必须作为不可赎回债券发行，但这一限制不适用于公司债券。然而，鉴于我们目前正处在历史低利率时期，且利率总体上行空间远大于下行空间，企业实际召回已发行债券的风险较低。尽管如此，不可赎回且不可转换的公司债券仍存在违约的可能性。


    如何将与不可赎回、不可转换的标准公司债券相关的违约风险降到最低？主要方法是只投资于投资级债券。这类债券由几家债券评级机构（特别是标准普尔或穆迪投资者服务公司）评级为最高质量或次高质量。这些评级服务并非无懈可击，但它们能为你提供指导，帮助区分投资级债券与非投资级债券（即高收益债券）。（顺便提一下：高收益债券，或称“垃圾债券”，本身并非必然是糟糕的投资，尽管它确实比投资级债券承担更大的违约风险。）这是因为高收益债券的发行方必须以比投资级债券更高的利率发行债券，这表明其财务稳定性弱于正常的企业。


    你可以参考表 9-1，根据标准普尔和穆迪的评级标准，判断何为投资级债券。一般来说，你应只购买投资级债券，因为根据评级机构的认定，这类债券的违约风险最低。


    **表 9-1. 债券评级**


    | | 标准普尔 | 穆迪 |

    | --- | --- | --- |

    | 投资级 | | |

    | 最高质量 | AAA–AA | Aaa–Aa |

    | 次高质量 | A–BBB | A–Baa |

    | 非投资级 | | |

    | 投机级 | BB–B | Ba–B |

    | 违约级 | CCC–D | Caa–C |

    | 总体范围 | AAA–D | Aaa–C |

    '
- fmt: '### Government Bonds


    US Treasury notes and bonds are debt obligations of the federal government that
    are primarily distinguished by their maturity dates. A Treasury note is a medium-term
    debt security issued with a maturity date of two, three, five, seven, or ten years.
    The minimum denomination is $1,000, but notes may be issued up to a maximum of
    $1 million. A Treasury bond, on the other hand, is a longer-term debt security
    with a fixed maturity date of more than ten years. The Treasury discontinued issuance
    of the long bond (30-year maturity date) in October 2001 but, effective February
    2006, resumed the auctioning of this bond as an additional method to finance the
    ever-expanding federal deficit. Interest from US Treasury notes and bonds is paid
    semiannually to the owner and is exempt from state and local taxes. As with US
    Treasury bills, if the US government issues a note or bond, you do not need to
    be concerned about default risk.


    Several other forms of US Treasury securities are popular with conservative investors,
    but we discuss two here. The first is a form of zero-coupon bond known as a Treasury
    Separate Trading of Registered Interest and Principal of Securities (STRIPS).
    A zero-coupon bond is a bond for which the semiannual interest coupons are not
    attached but instead are omitted, or "stripped off." An interest payment is still
    made on this type of bond, but it is accrued as part of the bond principal and
    payable only at the maturity date. As a potential investor, you would have an
    obligation to pay federal taxes on the accrued interest, but you would not have
    any cash from the bond with which to pay them. So, where is a Treasury STRIPS
    (or any other form of zero-coupon bond, because corporations can also issue them)
    best positioned? In one of two places, and for one of two purposes:


    - If it is a taxable STRIPS, position the bond in a tax-deferred account, such
    as a retirement plan.

    - If it is a tax-exempt STRIPS, include the bond as a part of a college education
    savings program for a child under the age of 19.


    In both cases, you know with absolute certainty when the STRIPS will mature, which
    is the primary attraction of any zero-coupon bond. Further, you also know with
    certainty how much the principal and accrued interest will amount to at maturity.
    As such, you can match the bond''s maturity to the date you need the funds to
    meet your financial goals. This is the beauty of any zero-coupon bond, but particularly
    of the Treasury STRIPS, because, as an obligation of the US government, it also
    has no default risk.


    The second—and an increasingly popular—form of US Treasury security (actually,
    a series of securities) are Treasury Inflation Protected Securities (TIPS). TIPS
    were first issued in 1997 and are now auctioned by the Treasury four times each
    year. They are sold in 5-, 10-, and 30-year maturities and in minimum $1,000 denominations.
    As the name indicates, they are designed to offer protection against the effects
    of inflation. The principal is adjusted semiannually to keep pace with inflation,
    as measured by the Consumer Price Index (CPI) over the previous six-month period,
    but the interest rate remains fixed. At the maturity date, you receive the greater
    of the inflation-adjusted principal value of the security or its face value at
    the time of issue.


    Simply stated, if you invest in TIPS, you are taxed annually on the interest payment
    plus the appreciation in the face value of the security after it''s adjusted for
    inflation. However, you do not receive the inflation-adjusted principal until
    the security is sold or matures (more than likely the latter, because you should
    look at TIPS as a longer-term investment). To avoid this investment vehicle''s
    potentially adverse tax consequences, it is best to hold TIPS in a tax-deferred
    account, such as a retirement plan or a Roth IRA.


    ### Municipal Bonds


    State and local governments typically issue bonds to finance long-term projects,
    such as road improvement or other infrastructure needs. Such bonds come in two
    types: general obligation bonds and revenue bonds, although a third type of hybrid
    bond—a private purpose bond—is increasingly being used to finance football stadiums
    and the like. General obligation and revenue bonds are issued by public municipalities,
    whereas private purpose bonds may be shared with a private developer or sports
    promoter. In addition, general obligation bonds are backed by the taxing authority
    of the municipality and as such are safer than revenue bonds, which must depend
    on the revenue from a specific project to pay the bondholders. As a result of
    their relative safety, general obligation bonds feature a lower interest rate
    than revenue bonds.


    Historically, municipal bonds have been most attractive to high-income taxpayers
    because their semiannual interest payments are generally free from federal income
    tax and may also be free from state and local taxes in some circumstances. You
    can easily compute what your after-tax return from a municipal bond will be if
    you know your marginal income-tax bracket and the coupon rate or nominal yield
    of the municipal bond. Once you have computed your after-tax return, you should
    then compare this return to the return you would receive on a taxable obligation,
    such as a corporate bond, to determine the higher-paying investment.


    For example, assume you are trying to decide whether to purchase a municipal bond
    (only federal-income-tax free) featuring a tax-exempt yield of 5 percent or a
    corporate bond yielding 7 percent. Also assume you are currently paying taxes
    in the highest marginal federal income-tax bracket of 37 percent. To compute your
    after-tax return on the municipal bond, use the following formula:


    ```

    tax-equivalent yield = (Tax-exempt yield) / (1 - marginal tax rate)

    ```


    In this example, your tax-equivalent yield on the municipal bond is 7.93 percent:
    0.05 divided by (1 – 0.37). This compares to the corporate bond yield of 7 percent,
    so you should likely invest in the municipal bond. It also means you probably
    should not purchase the corporate bond until its yield-to-maturity exceeds 7.93
    percent.


    It is also possible to invest in a municipal bond or tax-exempt mutual fund, usually
    as part of a money market mutual fund. However, if you do so, you lose control
    over the time at which you have to recognize capital gains from the sale of bonds.
    This is a distinct disadvantage of investing in bonds via a bond mutual fund.'
  raw: '### Government Bonds


    US Treasury notes and bonds are debt obligations of the federal government that
    are primarily distinguished by their maturity dates. A Treasury note is a medium-term
    debt security issued with a maturity date of two, three, five, seven, or ten years.
    The minimum denomination is $1,000, but notes may be issued up to a maximum of
    $1 million. A Treasury bond , on the other hand, is a longer-term debt security
    with a fixed maturity date of more than ten years. The Treasury discontinued issuance
    of the long bond (30-year maturity date) in October 2001 but, effective February
    2006, resumed the auctioning of this bond as an additional method to finance the
    ever-expanding federal deficit. Interest from US Treasury notes and bonds is paid
    semiannually to the owner and is exempt from state and local taxes. As with US
    Treasury bills, if the US government issues a note or bond, you do not need to
    be concerned about default risk.


    Several other forms of US Treasury securities are popular with conservative investors,
    but we discuss two here. The first is a form of zero-coupon bond known as a Treasury
    Separate Trading of Registered Interest and Principal of Securities (STRIPS).
    A zero-coupon bond is a bond for which the semiannual interest coupons are not
    attached but instead are omitted, or “stripped off.” An interest payment is still
    made on this type of bond, but it is accrued as part of the bond principal and
    payable only at the maturity date. As a potential investor, you would have an
    obligation to pay federal taxes on the accrued interest, but you would not have
    any cash from the bond with which to pay them. So, where is a Treasury STRIPS
    (or any other form of zero-coupon bond, because corporations can also issue them)
    best positioned? In one of two places, and for one of two purposes:


    *   If it is a taxable STRIPS, position the bond in a tax-deferred account, such
    as a retirement plan.

    *   If it is a tax-exempt STRIPS, include the bond as a part of a college education
    savings program for a child under the age of 19.


    In both cases, you know with absolute certainty when the STRIPS will mature, which
    is the primary attraction of any zero-coupon bond. Further, you also know with
    certainty how much the principal and accrued interest will amount to at maturity.
    As such, you can match the bond’s maturity to the date you need the funds to meet
    your financial goals. This is the beauty of any zero-coupon bond, but particularly
    of the Treasury STRIPS, because, as an obligation of the US government, it also
    has no default risk.


    The second—and an increasingly popular—form of US Treasury security (actually,
    a series of securities) are Treasury Inflation Protected Securities (TIPS). TIPS
    were first issued in 1997 and are now auctioned by the Treasury four times each
    year. They are sold in 5-, 10-, and 30-year maturities and in minimum $1,000 denominations.
    As the name indicates, they are designed to offer protection against the effects
    of inflation. The principal is adjusted semiannually to keep pace with inflation,
    as measured by the Consumer Price Index (CPI) over the previous six-month period,
    but the interest rate remains fixed. At the maturity date, you receive the greater
    of the inflation-adjusted principal value of the security or its face value at
    the time of issue.


    Simply stated, if you invest in TIPS, you are taxed annually on the interest payment
    plus the appreciation in the face value of the security after it’s adjusted for
    inflation. However, you do not receive the inflation-adjusted principal until
    the security is sold or matures (more than likely the latter, because you should
    look at TIPS as a longer-term investment). To avoid this investment vehicle’s
    potentially adverse tax consequences, it is best to hold TIPS in a tax-deferred
    account, such as a retirement plan or a Roth IRA.


    ### Municipal Bonds


    State and local governments typically issue bonds to finance long-term projects,
    such as road improvement or other infrastructure needs. Such bonds come in two
    types: general obligation bonds and revenue bonds, although a third type of hybrid
    bond—a private purpose bond—is increasingly being used to finance football stadiums
    and the like. General obligation and revenue bonds are issued by public municipalities,
    whereas private purpose bonds may be shared with a private developer or sports
    promoter. In addition, general obligation bonds are backed by the taxing authority
    of the municipality and as such are safer than revenue bonds, which must depend
    on the revenue from a specific project to pay the bondholders. As a result of
    their relative safety, general obligation bonds feature a lower interest rate
    than revenue bonds.


    Historically, municipal bonds have been most attractive to high-income taxpayers
    because their semiannual interest payments are generally free from federal income
    tax and may also be free from state and local taxes in some circumstances. You
    can easily compute what your after-tax return from a municipal bond will be if
    you know your marginal income-tax bracket and the coupon rate or nominal yield
    of the municipal bond. Once you have computed your after-tax return, you should
    then compare this return to the return you would receive on a taxable obligation,
    such as a corporate bond, to determine the higher-paying investment.


    For example, assume you are trying to decide whether to purchase a municipal bond
    (only federal-income-tax free) featuring a tax-exempt yield of 5 percent or a
    corporate bond yielding 7 percent. Also assume you are currently paying taxes
    in the highest marginal federal income-tax bracket of 37 percent. To compute your
    after-tax return on the municipal bond, use the following formula:


    ![$$ \mathrm{tax}-\mathrm{equivalent}\;\mathrm{yield}=\frac{\mathrm{Tax}-\mathrm{exempt}\;\mathrm{yield}}{\left(1-\mathrm{marginal}\;\mathrm{tax}\;\mathrm{rate}\right)}
    $$](A314864_2_En_9_Chapter_Equa.gif)


    In this example, your tax-equivalent yield on the municipal bond is 7.93 percent:
    0.05 divided by (1 – 0.37). This compares to the corporate bond yield of 7 percent,
    so you should likely invest in the municipal bond. It also means you probably
    should not purchase the corporate bond until its yield-to-maturity exceeds 7.93
    percent.


    It is also possible to invest in a municipal bond or tax-exempt mutual fund, usually
    as part of a money market mutual fund. However, if you do so, you lose control
    over the time at which you have to recognize capital gains from the sale of bonds
    . This is a distinct disadvantage of investing in bonds via a bond mutual fund.'
