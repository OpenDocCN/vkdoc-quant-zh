- fmt: '### Managed Care Policies


    In the mid to late 1990s, managed care became the most popular form of health
    care, and some of its benefits were integrated into major comprehensive medical
    policies. Notably, managed care introduced the concepts of `co-payments` (rather
    than annual deductibles) and the primary care physician, also known as the gatekeeper
    physician, or `PCP`. Another innovation of managed care was the coverage of routine
    physical exams and other forms of preventative care, in furtherance of the belief
    that it is less expensive to treat disease in its early stages of development
    rather than waiting until more extensive treatment is warranted. Managed care
    has three primary approaches: health maintenance organizations (`HMO`s), preferred
    provider organizations (`PPO`s), and point-of-service (`POS`) plans.


    An `HMO` offers medical services to its subscribers for a monthly fee (commonly
    referred to as a capitation fee). The members of the organization must use the
    `HMO`’s on-site doctors unless they are referred to a specialist by their assigned
    primary care physician. The organization provides all medical services and administrates
    all medical claims filed by the insured. As such, an `HMO` is not technically
    an insurance company, because there is no third party to whom the insurance risk
    is transferred. Rather, the organization provides only prepaid medical services.


    A `PPO`, on the other hand, is most often administered by an insurance company
    that is acting as an intermediary between medical care providers and the health
    care consumer. Generally, the various providers affiliated with the `PPO`, referred
    to as in-network providers, accept reduced fees in exchange for the insurance
    company paying their fee more rapidly and for guaranteeing payment. Many `PPO`s
    allow consumers to receive care outside the network of preferred providers; however,
    if an out-of-network provider is used, the insured pays a higher co-payment or
    deductible.


    Finally, a `POS` plan combines attributes of the `HMO` and `PPO`. If contracted
    providers in a `POS` plan are used, their services are available for a low co-payment
    or are covered completely (as with an `HMO`). However, if an out-of-network provider
    is used, the insured pays a higher co-payment, and some preventative care may
    not be covered (as with a `PPO`). Newly enrolled policyholders are required to
    choose a primary care physician to direct their medical treatment. This physician
    becomes the insured’s point of service and is chosen from a list of preapproved
    physicians in the plan’s medical care network.


    ### Health Savings Accounts


    The `HSA`, a policy that any individual who does not participate in an employer-sponsored
    plan may establish separately, is the latest entry in the health insurance marketplace.
    An employer may also contribute to an `HSA` that was established by an employee
    if it so chooses. Today, many `HSA`s offer investment options, ranging from money
    market accounts to mutual funds to individual stocks. Most of these investment
    options are currently underutilized because participants have historically favored
    only cash to fund `HSA`s.


    An `HSA` is set up more or less like an individual retirement account (`IRA`),
    except that the tax-deductible contributions made to an `HSA` may be used only
    to reimburse the account owner for qualifying medical expenses. If they are not
    used for this purpose prior to the owner reaching the age of 65, a 20 percent
    penalty is imposed. As in an `IRA`, earnings generated by `HSA` investments accumulate
    income-tax-free. Therefore, if the distributions from the `HSA` are used to pay
    for qualified medical expenses (including long-term care insurance premiums),
    the account is never taxed—not when contributions are made, not while these contributions
    are generating earnings, and not when the contributions and earnings are withdrawn.


    Generally, any individual below Medicare age (age 65) who is not covered by any
    group or individual health plan can establish an `HSA`. A high deductible is required
    on the health insurance policy, and limitations are specified on the annual amount
    of tax-deductible contributions that may be made to the account. However, unlike
    with an `IRA`, there are no income caps for individuals claiming the `HSA` deduction,
    nor is the claiming of the deduction dependent on whether the individual itemizes
    their tax deductions at year-end.


    Who should implement an `HSA`? Certainly, any younger, healthier individual who
    is unlikely to have large medical bills in the near future and does not participate
    in an employer plan should consider the option. In addition, older, self-employed
    individuals who will not have the advantage of retiree health insurance should
    look closely at the savings opportunities presented by the `HSA`. Upper-income
    and relatively healthy persons may also find `HSA`s attractive if they switch
    to a high-deductible insurance policy and then take advantage of the deduction
    for contributions to offset their taxable income. An often-overlooked benefit
    of establishing an `HSA` is that you can roll over money from an `IRA` to an `HSA`
    without incurring income tax and avoid a tax bill altogether if you then use the
    money for qualifying medical expenses.


    ## Continuation of Health Insurance Coverage After You Have Left Your Job


    Many health care consumers are not aware that if they lose their job, voluntarily
    or involuntarily, they can continue their previous group health insurance coverage.
    Under the federal `COBRA` law, employers with 20 or more employees must let you
    remain enrolled in their policy at your own expense. Typically, this right must
    be afforded for a period of up to 18 months after you leave your job.


    Although it may require some new cash-flow planning to pay not only your previous
    share of the employer group policy premiums but the employer’s share as well,
    it is still probably wise to pursue your `COBRA` rights. Most group policies (including
    those of your potential new employers) have waiting periods before you are entitled
    to coverage. In some cases, the waiting period may be as long as six months. (Of
    course, with the implementation of the prohibition on waiting periods beyond 90
    days under Obamacare, this has changed since 2014.) Taking this into consideration,
    as well as the possibility that it may take you some time to find another job,
    flexing your `COBRA` rights is prudent cash-flow management.


    Other `COBRA` qualifying events include the death of a covered spouse, divorce
    or legal separation that causes an employee’s spouse or dependent children to
    lose coverage, and attaining Medicare age. In these events, the term of coverage
    afforded under `COBRA` may be as long as 36 months after the so-called triggering
    event.'
