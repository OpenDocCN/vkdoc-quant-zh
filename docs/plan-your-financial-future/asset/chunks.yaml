- fmt: '# A


    A.B.L.E. account: A tax-advantaged savings account for a disabled individual created
    by the Achieving a Better Life Experience Act of 2014.


    `accelerated death benefit rider`: An additional provision to a life insurance
    contract that permits the owner/insured to receive all or a portion of the proceeds
    of the contract before death so as to cover, for example, the costs of a last
    illness.


    `accidental death benefit` (`ADB`): Also known as a double indemnity benefit;
    a provision in some life insurance contracts that pays twice the face value of
    the policy in the event of the accidental death of the insured.


    `amortization schedule`: A schedule of monthly payments made by a borrower to
    pay off debt—typically, a mortgage obligation on a personal residence. The schedule
    includes both interest and principal paid over the term of the mortgage.


    `annuity`: An insurance product that features an equal stream of payments over
    the owner’s/annuitant’s lifetime. An important retirement-planning technique,
    because the product ensures against the risk of superannuation, or the risk of
    a retiree outliving their accumulated retirement monies.


    `asset allocation`: A method of allocating, or dividing up, an individual’s collection
    of assets or portfolio among several asset classes, usually cash or cash equivalents,
    stocks, and bonds. Such allocations also include agreed-on percentages of assets
    among specified asset classes and are a staple of a properly prepared investment
    policy statement used by many financial advisors.


    # B


    `basis` (or `cost basis`): An income-tax term meaning, first and foremost, the
    amount of money contributed by a taxpayer in the purchase of any real or financial
    asset. Sometimes alternatively referred to as an individual’s cost basis in property,
    it is used to determine the amount of taxable gain or loss in the sale of assets.
    There are, however, other types of basis referred to in income-tax and accounting
    rules.


    `behavioral finance`: A branch of finance that studies the interrelationship of
    psychology and investor behavior; an alternative to the traditional theory of
    corporate finance that assumes efficient markets and rational investor behavior.
    An important precept of behavior finance is prospect theory, which essentially
    posits that investors fear losses more than they value gains.


    `beneficiary`: The individual named in a legal document, such as a trust, who
    benefits in the event of the writer’s or creator’s death.


    `bonds`: A type of financial instrument commonly issued by corporations or governments
    to raise capital for needed projects or functions. Sometimes just referred to
    as debt or debt obligations, because the issuer borrows money from the holder
    of the bond and must repay the bond holder at the time the debt obligation reaches
    maturity.


    # C


    `capital gain`: An income-tax and financial term meaning the increase in value
    or appreciation of the asset from the date of purchase to the date of sale. If
    such assets are owned for a requisite period of time before they are sold (or
    long-term), currently more than one year from the date of purchase, a favorable
    tax rate is awarded by the taxing authorities.


    `capitalization rate`: A percentage rate or number applied to the future income
    from property (typically, real property) to determine its current value. For example,
    if the net operating income from an apartment complex is $500,000 and a capitalization
    rate of 20 percent is applied or divided into that income, the current value of
    the complex is estimated at $2,500,000.


    `cash value insurance`: A type of life insurance that builds on the owner’s behalf
    a cash reserve that may be accessed by the owner during their lifetime. Common
    types of cash value insurance include whole life insurance, universal insurance,
    variable insurance, and variable universal life insurance.


    `charitable lead trust` (`CLT`): An irrevocable trust used in estate planning
    that is designed to provide either a fixed or variable income stream annually
    to a qualified charity for a certain period of time, with the remainder of the
    property left to a noncharitable beneficiary, usually the donor’s child or children.


    `charitable remainder trust` (`CRT`): An irrevocable trust used in estate planning
    that is designed to provide either a fixed or variable income stream annually
    for a certain period of time to a noncharitable beneficiary (typically, the donor),
    with the remainder of the property left to a qualified charity.


    `child tax credit`: An income tax credit or dollar-for-dollar reduction against
    a taxpayer’s income-tax liability that results from having a child or children
    currently under the age of 17. The maximum amount of the credit is established
    by tax law: for example, $2,000 per eligible child.


    `College Board`: A not-for-profit membership organization committed to excellence
    and equity in education, particularly higher education. This organization also
    provides students an avenue to college opportunities, including financial support
    and scholarships.


    `Commissioner’s Individual Disability Table A`: A 1985 table published by the
    government that provides data on the probability of an individual becoming disabled
    during their lifetime.


    `common law property system`: One of two property law systems (the other being
    the community property system) that permits the titling of property individually,
    even in the event of marriage. Currently, this is the system of property law in
    41 of the 50 states.


    `community property system`: One of two property law systems (the other being
    the common law property system) that does not permit the titling of property individually
    while married; any property acquired by either spouse during marriage generally
    belongs to “the community” and not the individual separately. Currently, this
    is the system of property law in 9 of the 50 states, most notably California and
    Texas, although Alaska permits community property on an elective basis among spouses.


    `contingent trust` (for minors): A trust created in each parent’s will specifying
    a trustee and provisions for the parent’s property in the event of the simultaneous
    death of the parents. It is important that the trustee work in concert with the
    parent’s named guardian for the sake of the children who benefit from the trust
    property. Sometimes also used synonymously with the term contingent family trust.


    `correlation`: A measure of the movement of two variables, such as financial assets,
    in relation to each other. For example, if one financial asset declines in value
    at the same time another increases in value, the assets are said to exhibit negative
    correlation. The use of correlation is a key factor in the proper diversification
    of a portfolio of assets.


    `cost basis`: See `basis`.


    `coupon rate`: The percentage rate of interest on a bond; for example, 6 percent.
    If multiplying the rate times the stated or par value of the bond (typically,
    $1,000), it is possible to determine the annual cash payment received by the bondholder
    or owner.


    `custodial account`: A type of account, commonly used in planning for a child’s
    higher education, in which monies are set aside on behalf of a minor child but
    are managed by the child’s parent or custodian. Such accounts are permitted in
    all 50 states, either in the form of a `Unified Gifts to Minors Act` (`UGMA`)
    account or a `Unified Transfers to Minors Act` (`UTMA`) account.'
