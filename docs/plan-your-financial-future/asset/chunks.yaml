    the estate-tax charitable deduction . They are unlimited in amount, as is also
    the case for transfers to a spouse or qualified charity during an individual’s
    lifetime for gift-tax purposes. However, both types of property transfers need
    to be left in a qualifying form before the deduction is permitted. Specifically,
    property transfers to a spouse at death must be left without restriction, and
    property transfers to a qualified charity must generally be left in the form of
    a charitable trust.


    Assume that you leave all your property outright (with no restrictions) to your
    spouse at your date of death under your will or by beneficiary designation. This
    is acceptable and qualifies the full amount of transferred assets for the unlimited
    estate-tax marital deduction . However, if you left your property to your spouse
    only for their lifetime use or for a term of years (in other words, with restrictions),
    the transfer typically does not qualify for the unlimited marital deduction. Next,
    assume that you leave property in remainder interest to a qualified charity but
    reserve the right to the income from the property during your lifetime through
    a charitable remainder trust (CRT) . The remainder interest left to charity at
    the time of your death qualifies for the unlimited estate-tax charitable deduction.
    But if you tried to accomplish this same transfer during your lifetime without
    establishing a trust, the unlimited charitable deduction would likely not be allowed.


    Several credits also are available in estate-tax planning, the most useful of
    which is the unified credit . The unified credit is equal to a certain amount
    of property that may be transferred estate-tax free at death. However, as with
    income tax, this credit is applied only after computing the total tax liability.
    For example, in 2018, the amount of estate tax on $11.2 million of taxable estate
    property is $4,425,800\. To that amount, you must apply the allowable unified
    credit (assuming you made no previous lifetime taxable gifts) of $4,425,800, so
    your net estate-tax liability is zero. When you hear that you may transfer up
    to $11.2 million in property free of estate tax (actually more, if your only beneficiary
    is your spouse or a qualified charity), you know it to be true, because you have
    an allowable unified credit of $4,425,800 to offset the tax due on that amount.


    But you need to be aware of one circumstance that reduces the $4,425,800 unified
    credit at death. Because the gift- and estate-tax systems are linked (which is
    where the term unified comes from), any taxable gifts that you make during your
    lifetime in excess of the gift-tax annual exclusion impact the amount of unified
    credit that is available to your estate at your death. As such, if you make any
    taxable gifts during your lifetime, the credit amount that you use to offset that
    gift-tax liability reduces your allowable unified credit at death. For example,
    assume that you die with a taxable estate of $11.2 million in 2018 and you leave
    it all equally to your two children. During your lifetime, however, you made taxable
    gifts of $75,000 to each of those children. In operational effect, this means
    you have a tentative tax base of $11.35 million, leaving you with an estate tax
    due of $60,000 ($150,000 excess over the $11.2 million exempted amount times the
    applicable marginal estate-tax rate of 40 percent). Looked at another way, you
    have reduced your allowable unified credit by $60,000 and thus have available
    at your death only an allowable unified credit of $4,365,800 ($4,425,800 less
    $60,000).


    ## Tax Rates and the Possible Repeal of the Death Tax


    In recent years, one of the transfer taxes—the estate tax—has become somewhat
    of a political football . Specifically, some legislators have urged the repeal
    of what they believe to be an unnecessary and even punitive tax, while others
    are worried about the revenue effects of eliminating this tax. However, the ongoing
    debate over the estate tax was likely settled—at least for now—with the doubling
    of the estate-tax (and gift-tax) exemption from $5 million to $10 million, as
    indexed for inflation, in the 2017 TCJA. This provision is effective for estates
    of decedents dying after December 31, 2017, but the exemption amount will revert
    back to the $5 million indexed amount after 2025 unless amended by a subsequent
    Congress.


    Moreover, the American Taxpayer Relief Act of 2012 included a permanent extension
    of the portability of exclusion amounts between married couples. Specifically,
    portability allows the estate of a decedent who is survived by a spouse to make
    an election to permit the surviving spouse to apply the decedent’s unused exclusion
    to the surviving spouse’s own transfers during life and at death. In effect, to
    the extent that the decedent’s spouse’s $11.2 million exclusion is not used at
    all during their lifetime or at death, the married couple enjoys a joint $22.4
    million ($11.2 million times 2) exclusion amount before any transfer tax is payable
    in 2018\. However, note that to take advantage of portability of the unused exclusion,
    an estate-tax return needs to be filed for the first spouse regardless of whether
    any estate tax is due for that spouse.'
