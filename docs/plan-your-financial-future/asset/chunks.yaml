  trans: '

    ### 阶梯投资法


    你可以通过多种方式对固定收益投资（例如债券或定期存单）的到期日进行阶梯化或错期安排。最流行的方法是确定你愿意承担的最长和最短到期期限，然后在这两个到期日之间按顺序进行购买。


    例如，如果你有 `$50,000` 可供投资，并且希望投资于期限不超过十年、不低于一年的债券，那么可以考虑进行十笔 `$5,000` 的债券购买，其到期日分别为从第一年年底到第十年年底的每一年。这样做的效果是最大限度地减少因利率波动导致的债券价格变化（即利率风险）的影响。此外，随着短期债券到期，其本金随后可以按市场利率（可能更高）进行再投资。


    你可以对银行的定期存单采用同样的方法，并享受每个存单的联邦存款保险公司（FDIC）保险优势，前提是你在每家银行和每种存单的总持有额不超过每位储户 `$250,000`。


    ### 买入并持有


    描述买入并持有投资策略的另一个说法是被动投资组合管理。换句话说，投资者不打算在其投资组合中积极交易股票、债券或其他资产，而是选择相对长期地持有这些投资。买入并持有策略，结合平均成本法，是实现普通投资者储蓄退休财务规划目标的常见财富积累策略。


    买入并持有策略有几个优点：


    *   你可以最大限度地减少证券交易中的收购和交易成本，随着时间的推移，这将带来可观的节省。

    *   它将有助于你管理所得税义务。例如，如果你在某一年未出售证券，则无需在所得税申报表上确认资本利得或损失。

    *   学术研究表明，证券市场中最显著的收益是在一年中的几个交易日中实现的；买入并持有策略确保在这些交易日你不会远离市场。


    一个警告：许多人声称自己是买入并持有型投资者，而实际上他们并非如此。我们大多数人都会让不断变化的市场状况影响我们的买入和卖出交易决策。换句话说，我们让短期情绪干扰了我们的长期投资决策。超级投资者沃伦·巴菲特让他的投资者变得富有，部分原因就在于他不允许情绪支配他的投资理念。如果你是一个纯粹的买入并持有型投资者，你将在市场中长期持有，对市场波动不大在意。


    ### 市场择时


    市场择时在行为上与买入并持有策略相反。它试图预测证券市场的总体方向，并利用市场的波动性，无论这个总体方向是上涨（牛市）还是下跌（熊市）。


    不应将市场择时与本章前面讨论的再平衡策略相混淆。你应该对投资组合进行再平衡，以随着时间的推移保持一致的资产配置百分比。然而，当你进行再平衡时，你是在响应你自己制定的规则和条件——通过包含在投资政策声明中的资产配置策略，该策略旨在最终实现你的财务目标。而市场择时是对外部市场状况的响应——由市场建立的规则和条件——这些是你无法控制的。在实践中，投资组合再平衡是主动的，而市场择时是被动的。


    市场择时有效吗？可能没有效，主要原因如前所述：投资者需要全年都留在市场中进行投资，才能获得最大的收益。尽管如此，如果操作得当，市场择时可能具有价值。例如，作为投资者，你应该关注那些显示大量市场择时者是在几周内买入还是卖出的报告。这可能会让你对整体市场情绪（以及据此判断未来市场是可能上涨还是下跌）有一些看法。


    ### 价值型投资与成长型投资


    价值型投资和成长型投资只是同一枚投资硬币的不同两面。在这种情况下，这枚投资硬币就是股票的市盈率。


    价值型投资是一种关注股票市场价格的投资策略：具体来说，就是寻找当前被市场低估的股票。因此，实践价值型投资的投资者试图寻找具有高股息收益率和低市盈率的股票。这种策略假设股票当前的市盈率低于其合理水平（或根据当前市场状况应有的水平），并且有效的市场将很快修正这种差异，从而推高股票价格。


    另一方面，成长型投资则关注发行股票公司的潜在盈利能力。因此，成长型投资者寻找成长型股票——即那些已被证明能够快速高效地开发产品且市场竞争最小的公司的股票。此类股票通常具有卓越的盈利增长率（通常为每年
    10%或更高）、低股息收益率以及高于平均水平的市盈率。


    有一些实践证据表明，在牛市中，成长型投资策略往往优于价值型投资策略。相反，在下跌或波动的市场中，价值型投资可能更合适。作为投资者，你可能应该将这两种策略视为积累财富的适当方法。

    '
- fmt: '# Investing in Real Estate


    Most Americans have made an investment in real estate—whether they realize it
    or not—in the form of their own home. Is your home a good investment? Although
    the answer to this question depends on many factors, not the least of which is
    the geographical location of your home, studies have shown that the average annual
    real (after inflation) return on residential real estate historically lags that
    of stocks and bonds. According to a Fidelity Research Institute report, which
    used data obtained from Global Financial Data and Winans International that predated
    the Great Recession of 2007–2009, the average annual ten-year real (after inflation)
    rate of return on residential real estate is only 1.62 percent. This compares
    to an average annual real rate of return of 5.85 percent for stocks and 3.18 percent
    for bonds over the same period. Indeed, experts say to expect only a future, annual
    real return on homes of one-quarter to one-half percentage point greater than
    the annual inflation rate.


    Despite this low rate of real return, home ownership is important in our society
    because it allows the investor-homeowner to build equity, which is the difference
    between the fair market value of their home and the amount the investor-homeowner
    owes on it. In addition, the financial obligation of making mortgage payments
    may make the investor or homeowner a better saver than an individual who rents.
    The ability to save (or, more accurately, the exercise of financial self-discipline)
    is an important trait for any effective wealth builder. As a result, studies show
    that the net worth of homeowners is some eight times greater on average than that
    of renters, regardless of age or income level.


    In Chapter [9](#A314864_2_En_9_Chapter.html) and Chapter [10](#A314864_2_En_10_Chapter.html)
    of this book, when discussing the accumulation step in the PADD approach to wealth,
    we will cover in more detail investing in financial vs. real assets. However,
    as noted in the Fidelity Research report, the average investor should be wary
    of over-investing in real estate. This is especially true when certain financial
    assets, such as stocks and bonds, have proven their superiority as wealth-building
    vehicles over time.


    We have now covered the basics of the financial-planning process. Next we will
    go into detail about the specified subject-matter areas of the process, beginning
    with the protection of your lifetime earning capacity, your family, and your property.


    # Part II

    Protecting Yourself, Your Family, and Your Property


    # 4. Insuring Yourself and Your Family


    This section of this book introduces the first step in the PADD approach to accumulating
    and managing wealth: protecting yourself against the risk of catastrophic financial
    loss. In this chapter, we discuss the most important form of risk management:
    insuring your life (and protecting your loved ones from the resulting loss of
    income at death) by purchasing life insurance.


    Before we begin, you should keep in mind the following guiding principles with
    respect to purchasing any type of insurance:


    - Never risk more than you can afford to lose. Buy only the amount of insurance
    required to ensure that you and your family will be restored to the before-loss
    status quo.

    - Do not buy insurance you don’t need. This is particularly important when considering
    the purchase of an annuity, an insurance product providing for lifetime income,
    but also including a death benefit. If you do not need the death benefit, think
    twice before purchasing the annuity, because there are less expensive ways to
    provide for a lifetime income stream.


    ## Do I Need Life Insurance? How Much?


    Few financial questions are likely to be more troublesome than, “Do I need life
    insurance?” This is in part because it prompts the asker to confront his or her
    own mortality. In addition, the need for life insurance is a philosophical issue
    for some individuals. For example, historically, farmers and people who make their
    living off the land and intend to pass this land down to their families do not
    believe that a financial product such as life insurance can substitute for something
    God did not create.


    Let’s accept for a moment that we are all going to die someday. Once you have
    accepted your mortality, figure out what you want to have happen in the event
    of your death. Most people with spouses and children want to protect the financial
    lifestyle of their heirs. In other words, they do not want their families to have
    to suffer financially because they have lost a source of income. It makes sense,
    then, that the amount of life insurance you need is primarily determined by how
    much income needs to be replaced after your death.


    As a rule of thumb, many life insurance agents say that you should purchase a
    life insurance death benefit to replace between five and seven times your annual
    gross income. For instance, if your annual gross income is `$100,000`, you should
    purchase between `$500,000` and `$700,000` of life insurance coverage. But, like
    most rules of thumb (and contrary to the financial-planning process that should
    guide your decision), nowhere in this rule is any consideration given to financial
    goals or particular individual needs and family circumstances. As such, two primary
    methods are used by most financial planners to determine the amount of life insurance
    that an individual should purchase.


    The first of these two methods is the **human life value approach**. This approach
    estimates the amount of income your family would need, based on the financial
    loss they would incur, if you were to die today, anticipating the number of possible
    working years that remained. This amount is then adjusted downward for what you
    would have personally consumed or paid in taxes (referred to as the **family’s
    share of earnings**). Utilizing a rate of return known as a **discount rate**,
    the present value of your life to your family is estimated. For example, let’s
    say you currently make `$70,000` per year in salary and have approximately 20
    years left in your working career. Your amount of personal consumption and taxes
    due on this income is `$20,000`, resulting in a family’s share of earnings of
    `$50,000` (`$70,000` less `$20,000`). By applying a rate of return to these earnings
    of 5 percent annually and using a financial function calculator or software program,
    we can determine a life insurance need of approximately `$625,000`.


    The human life value approach focuses only on your income-earning potential and
    the income loss to your survivors resulting from your death. As such, it is a
    relative method that assumes that your life has value only as it impacts the financial
    life of your survivors. It does not consider the recurring nature of your dependents’
    expenses or any unusual expenses that may result from your death, such as the
    future need for college education for minor children. Rather, these expenses are
    part of the alternative computation known as the **needs approach** to life insurance
    planning.'
