    ### 创建个人资产负债表


    您应至少每年监控并追踪一次净资产的增长（或减少）情况。（许多人会在年底计算这一数字。）那么，如何追踪并确定这一重要数字呢？通过编制您应保存于重要财务记录中的两份个人财务报表中的第一份：个人财务状况表，通常称为个人资产负债表。一般来说，您应至少每年编制一次个人财务状况表，以记录您在财富增长方面的进展情况。


    表 1-1 展示了一份个人财务状况表的示例。在仔细查看该表之前，您在编制和解读此类报表时应注意以下几点：


    1.  务必以当前公允市场价值列出所有资产，且不要因反映任何未偿债务而降低其价值；例如，按您认为可在当地市场出售的价格列出个人住宅，而无需考虑您目前可能欠下的抵押贷款余额。

    2.  将您的资产分为现金等价物、投资资产和使用资产。现金等价物是指那些您可以快速获取以支付日常开支（账单），或在发生财务紧急情况时，无需担心其价值低于购买时价值的资产。而投资资产则是期限较长（到期或持有期超过一年）且日常价值可能波动的资产。

    3.  按当前余额列出负债，即截至该时间点您欠债权人的金额。


    在编制您的财务状况表时，没有绝对的正确或错误答案。当然，随着您沿着财富积累之路前进，目标是使您的资产价值超过负债余额（从而增加您的净资产），但您在编制第一份报表时，不要对自己过于苛责。风险在于您会变得气馁（甚至放弃），这与您最初编制该报表的原因——作为帮助您评估当前财务状况以及您希望未来达成的目标的工具——背道而驰。


    表 1-1.


    个人财务状况表（截至 2017 年 12 月 31 日）


    | 资产 | | 负债与净值 | |

    | --- | --- | --- | --- |

    | 现金等价物 | | 负债 | |

    | 手头现金 | `$______` | 主要住宅抵押贷款 | `$______` |

    | 支票账户 | `$______` | 度假屋抵押贷款 | `$______` |

    | 储蓄账户 | `$______` | 房地产投资抵押贷款 | `$______` |

    | 货币市场账户或基金 | `$______` | 汽车贷款余额 | `$______` |

    | 存款证（期限不足一年） | `$______` | 个人贷款 | `$______` |

    | | | 学生贷款 | `$______` |

    | | | 401(k) 贷款 | `$______` |

    | 人寿保险现金价值 | `$______` | 信用卡余额 | `$______` |

    | 现金等价物合计 | `$______` | 租金 | `$______` |

    | | | 其他（例如，赡养费或子女抚养费） | `$______` |

    | 投资资产 | | 负债合计 | `$______` |

    | 股票 | `$______` | | |

    | 债券 | `$______` | | |

    | 共同基金余额 | `$______` | | |

    | 存款证（期限一年及以上） | `$______` | | |

    | 房地产投资 | `$______` | | |

    | 既得雇主养老金福利 | `$______` | | |

    | 参与型个人退休账户（IRA） | `$______` | | |

    | 转存型个人退休账户（IRA） | `$______` | | |

    | 401(k) 账户 | `$______` | | |

    | 其他 | `$______` | | |

    | 投资资产合计 | `$______` | 净值（资产 – 负债） | `$______` |

    | | | | |

    | 使用资产 | | | |

    | 主要住宅 | `$______` | | |

    | 度假屋 | `$______` | | |

    | 汽车 | `$______` | | |

    | 家居陈设 | `$______` | | |

    | 珠宝首饰 | `$______` | | |

    | 艺术品 | `$______` | | |

    | 使用资产合计 | `$______` | | |

    | 资产总计 | `$______` | 负债与净值总计 | `$_______` |


    在规划您的遗产时，在个人财务状况表上注明每项资产的所有权归属将很有帮助。例如，如果您的首要住宅由您和您的配偶以联合共有权（附有生存者取得权）的形式持有，请在“主要住宅”旁标注“`JT`”以表示联合共有。但请注意，退休账户（例如个人退休账户，简称
    IRA）可能仅能由个人单独拥有，即使在加州或德州等夫妻共同财产州也是如此。

    '
- fmt: '# 创建现金流量表


    除了准备个人财务状况表外，您还需要跟踪您的持续支出和收入来源。第二份参考文档，即个人现金流量表或工作表，应至少每季度完成一次（如果可能，最好每月完成一次）。原因如下：


    * 现金流量表让您了解资金的去向。（它将告诉您是否入不敷出。）

    * 它让您了解自己的储蓄能力。

    * 它指出了您在当前生活水平下的财务优势和劣势。

    * 它可以作为未来现金流管理预算编制的练习文档。（现金流量表回顾过去的财务表现，即回顾过去，而预算则展望未来。）


    正如个人财务状况表包含三个主要类别（资产、负债和净资产）一样，个人现金流量表也是如此。在现金流量表中，您应分别标识现金流入（收入来源）、现金流出（持续支出）以及任何由此产生的现金盈余或现金赤字。现金盈余或赤字仅仅是您的现金流入与现金流出之间的差额。当然，您在季度（或月度）末希望得到的是现金盈余，有时也称为可自由支配收入，因为这笔金额可用于储蓄。一个帮助您储蓄的小技巧：在“现金流出”列的第一行包含一个固定的储蓄金额或收入百分比。换句话说，先支付给自己，并将这笔储蓄金额视同任何其他固定支出。您应努力每月储蓄至少占您总收入10%的金额。


    关于编制现金流量表的一个持续争议是，是否将所得税和社会保障税列为一项单独的支出或现金流出（或者，您可以在现金流入中显示税后金额，因为您的工资单已经反映了这一点）。更好的做法是将这些税项列为现金流出，因为（再次强调）现金流量表的目的之一是展示您的资金去向。在现金流出中单独列出一项所得税和社会保障税，会迫使您核算这笔可能原本不可见的支出。


    表[1-2](#A314864_2_En_1_Chapter.html#Tab2)是一份编制得当的个人现金流量表示例。


    **表 1-2. 个人现金流量表（2017年）**


