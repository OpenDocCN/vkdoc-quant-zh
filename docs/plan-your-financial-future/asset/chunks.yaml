    \ your COBRA rights, you have to incur the portion of the group health insurance\
    \ previously paid by your employer), it is still much better than going without\
    \ coverage. As mentioned earlier, no single event can threaten your future economic\
    \ security or that of your family more than incurring substantial medical bills\
    \ for which you have no individual, employer-provided, or government-mandated\
    \ insurance."
  raw: '### Consider Participating in Your Employer’s Plan


    If your employer offers a group health plan, you are likely better off participating
    in that plan than purchasing individual health insurance. This can be a tough
    lesson to learn if you are young and healthy. As a young person in good health
    covered by a group plan, you may be overinsured, given that you are paying for
    a great deal of coverage that you may never use. You can minimize this cost by
    selecting as high a deductible and co-payment as the plan permits. You are still
    probably ahead cost-wise by participating in the group plan rather than purchasing
    individual coverage. In addition, you need to establish coverage under a group
    plan so as to exercise certain continuation rights that may be necessary in the
    event that you change or lose your job (otherwise known as COBRA rights, after
    the Consolidated Omnibus Budget and Reconciliation Act of 1985 that provided for
    these rights).


    ### Carefully Review Plan Details


    Review the co-payment and deductible provisions under health insurance plans carefully.
    Under most managed care plans—including health maintenance organizations (HMOs)
    and preferred provider organizations (PPOs))—the insured pays a fixed charge each
    time they see a medical doctor or fill a covered prescription. This is known as
    a co-payment and should be distinguished from co-insurance, through which the
    plan provider and the insured share the cost of covered medical expenses after
    the plan deductible has been met. Generally, you want the co-payment to be as
    small as possible, unless you do not anticipate using the insurance policy heavily
    during the year (if you are young and healthy, for example). In this case, you
    may want to opt for as high a co-payment as possible, which in turn should reduce
    your premium cost.


    Many health care plans, particularly in recent years as the cost of health insurance
    has skyrocketed, require each insured to retain a certain portion of their health
    care expense risk in the form of a deductible. This is an out-of-pocket amount
    that the insured must pay before any insurance coverage is afforded. Once the
    covered medical expenses equal the plan deductible (usually on an individual or
    family basis), further expenses then qualify for the co-insurance provision. Typically,
    after the co-insurance provision is triggered, the insured must then pay 20 percent
    of the expenses until a certain maximum amount is reached (known as a stop-loss),
    at which point the insurance company pays 100 percent of the excess.


    If your employer offers a flexible spending account (FSA) to help you with the
    payment of any deductibles or co-payments associated with its health insurance
    plan, put as much money into this account as you can afford or as allowed under
    current law. An FSA is a special form of employee benefit that allows you to pay
    for certain medical expenses (such as deductibles and co-payments) with before-tax
    dollars, thus reducing your taxable income. We will talk more about FSAs later;
    but as a general rule of tax planning, whenever you can pay for an expense with
    before-tax rather than after-tax dollars, doing so will usually prove advantageous.


    ### Flexibility Costs Money


    The more flexibility you have in selecting health care providers, the more the
    plan will cost you. Many insureds do not need to concern themselves with this
    fact, because their employer has already taken this flexibility away from them.
    For example, employers who offer only HMO enrollment to their employees have substantially
    restricted the employees’ right to choose their own primary care physicians and
    specialists. But insureds who participate in other forms of health insurance plans,
    such as PPO plans, may typically see either an in-network physician or one who
    does not participate in the network (an out-of-network provider). This same concept
    also applies to participating and nonparticipating hospitals. If you want to see
    an out-of-network doctor or hospital, you will likely pay more for the privilege,
    but at least your choice is preserved.


    As a result, if you are participating in a PPO managed care plan, one of the questions
    you should research is whether your preferred doctor or hospital is a member of
    the plan’s network of medical providers. Usually, you can check out the network
    physicians and hospitals participating in the plan before signing up.


    ### Know Your Rights


    Make sure you know your legal rights if you leave your job (and the employer-provided
    coverage). In the past, two legislative acts—the Consolidated Omnibus Reconciliation
    Act of 1985 (COBRA) and the Health Insurance Portability and Accountability Act
    of 1996 (HIPAA)—have gone a long way to ensure continuing health insurance coverage
    for individuals who once had health insurance protection. Unfortunately, neither
    of these acts do much to address the ongoing problem of the uninsured or, just
    as important, the rising cost of health insurance premiums.


    Note


    See the subsequent discussion in this chapter of the 2010 Patient Protection and
    Affordable Care Act, sometimes referred to as Obamacare, which was passed in part
    to address the problem of the uninsured and rising health care costs.


    We will talk in more detail about the COBRA and HIPPA acts shortly, but you should
    be aware that if you once had health insurance coverage but lost or changed jobs,
    it is relatively easy to continue that coverage for a period of time. Although
    your share of the health insurance premium may increase (if you exercise your
    COBRA rights, you have to incur the portion of the group health insurance previously
    paid by your employer), it is still much better than going without coverage. As
    mentioned earlier, no single event can threaten your future economic security
    or that of your family more than incurring substantial medical bills for which
    you have no individual, employer-provided, or government-mandated insurance.'
  trans: "\n### 考虑加入雇主提供的保险计划\n\n如果你的雇主提供团体健康保险，加入该计划通常比购买个人健康保险更划算。如果你年轻且健康，这一点可能需要付出代价才能学会。作为一位身体健康的年轻人，加入团体保险计划后，你可能会发现自己被过度保险，因为你支付了大量可能永远用不上的保障费用。你可以通过选择计划允许的最高免赔额和共付额来最小化这笔成本。即便如此，从成本角度考虑，加入团体计划通常仍比购买个人保险更划算。此外，你需要加入团体计划以建立保险覆盖，从而行使某些在更换或失去工作时可能必需的延续权利（即\
    \ COBRA 权利，源于 1985 年《综合预算协调法案》中规定的这些权利）。\n\n### 仔细审查计划细节\n\n仔细审查健康保险计划中的共付额和免赔额条款。在大多数管理型医疗计划中——包括健康维护组织（HMO）和优选医疗机构（PPO）——被保险人在每次看医生或支付承保处方药费用时，需支付固定费用。这被称为共付额，应与共保相区分；共保是指计划提供方和被保险人在满足计划免赔额后，共同承担承保医疗费用的成本。通常，你希望共付额尽可能低，除非你预计当年不会频繁使用保险（例如，如果你年轻且健康）。在这种情况下，你可能希望选择尽可能高的共付额，从而相应降低你的保费成本。\n\
    \n许多健康保险计划（尤其是近年来健康保险费用飙升的情况下）要求每位被保险人以免赔额的形式承担部分医疗费用风险。这是一笔必须由被保险人自付的金额，之后才会获得保险赔付。一旦承保医疗费用达到计划免赔额（通常按个人或家庭计算），后续费用才符合共保条款。通常，在触发共保条款后，被保险人需支付费用的\
    \ 20%，直至达到特定最高限额（称为止损额），此后保险公司支付 100%的超额费用。\n\n如果你的雇主提供灵活支出账户（FSA）来帮助你支付与健康保险相关的任何免赔额或共付额，请尽可能将你能承担或现行法律允许的金额存入该账户。FSA\
    \ 是一种特殊的员工福利形式，允许你用税前美元支付某些医疗费用（如免赔额和共付额），从而减少你的应税收入。我们稍后会详细讨论 FSA；但作为税务规划的一般原则，只要你能用税前而非税后美元支付费用，这样做通常是有利的。\n\
    \n### 灵活性需要成本\n\n你在选择医疗提供者方面拥有的灵活性越大，计划成本就越高。许多被保险人无需担心这一点，因为他们的雇主已经剥夺了这种灵活性。例如，仅向员工提供\
    \ HMO 注册的雇主，极大地限制了员工选择自己初级保健医生和专科医生的权利。但参与其他形式健康保险计划（如 PPO 计划）的被保险人，通常既可以选择网络内医生，也可以选择网络外医生。同样的概念也适用于参与计划和不参与计划的医院。如果你希望看网络外医生或去网络外医院，你可能需要为此特权支付更高费用，但至少你的选择权得以保留。\n\
    \n因此，如果你参与的是 PPO 管理型医疗计划，你应研究的问题之一便是：你偏好的医生或医院是否是该计划医疗提供者网络的成员。通常，你可以在注册前查询参与计划的网络医生和医院。\n\
    \n### 了解你的权利\n\n确保你了解离职（以及失去雇主提供的保险覆盖）时的法律权利。过去，有两项立法——1985 年《综合预算协调法案》（COBRA）和\
    \ 1996 年《健康保险携带与责任法案》（HIPAA）——在确保曾拥有健康保险保障的个人能继续享有医疗覆盖方面发挥了重要作用。不幸的是，这两项法案在解决无保险者持续存在的问题或同样重要的健康保险保费上涨问题上，作用有限。\n\
    \n> **注意**  \n> 请参阅本章后续关于 2010 年《患者保护与平价医疗法案》（有时被称为奥巴马医改）的讨论，该法案的通过部分旨在解决无保险者和医疗成本上升的问题。\n\
    \n我们稍后会详细讨论 COBRA 和 HIPPA 法案，但你应该意识到：如果你曾拥有健康保险保障但因失去或更换工作而中断，相对容易在一段时间内延续该保障。尽管你可能需要承担更多健康保险保费份额（若行使\
    \ COBRA 权利，你必须承担此前由雇主支付的团体健康保险部分费用），但这仍然远比没有任何保障要好。如前所述，没有任何单一事件比产生巨额医疗账单且没有个人、雇主提供或政府强制保险保障，更能威胁你或家人的未来经济安全。\n"
- fmt: '# Patient Protection and Affordable Care Act of 2010


    On March 23, 2010, US President Barack Obama signed into law the Patient Protection
    and Affordable Care Act (or `PPA`). It is also commonly known as Obamacare. The
    purpose of this act was to assist consumers, particularly those with preexisting
    conditions, in purchasing health insurance coverage through the individual insurance
    marketplace. As a result, the group insurance marketplace was left largely unchanged.
    Among `PPA`''s most important provisions are the following:


    - A mandate requiring all individuals and certain employers to maintain or offer
    a minimum essential amount of health care insurance or face a penalty. The constitutionality
    of this mandate (as a penalty tax) was upheld in the US Supreme Court case of
    *National Federation of Independent Business, et al. v. Sebelius, Secretary of
    Health and Human Services*, et al. (decided June 28, 2012) and was effective beginning
    January 1, 2014. The requirement of automatic enrollment provisions for all employees
    covered under group health insurance, subject to certain specified opt-out rights,
    was also effective beginning January 1, 2014, and impacts all employers who employ
    more than 50 full-time equivalent (`FTE`) employees. Even part-time employees
    who work 30 hours or more per week are counted among the 50 `FTE`s. As mentioned
    in the last chapter, the individual mandate (not the employer mandate) is repealed
    by the 2017 `TCJA` for years beginning after 2018.

    - The prohibition of waiting periods to be covered under a health insurance policy
    of more than 90 days, effective January 1, 2014.

    - The prohibition of preexisting condition exclusions, first made effective in
    2010 for children under the age of 19, and subsequently made effective for all
    individuals beginning January 1, 2014.

    - The requirement that all new policies issued cover preventive services, such
    as cancer screening, with no out-of-pocket costs to the insured, effective for
    policies with plan years beginning on or after September 23, 2010.

    - Extended coverage for dependents up to age 26, effective for policies with plan
    years beginning on or after September 23, 2010.

    - A cap on health care contributions to `FSA`s of $2,500 per year beginning January
    1, 2013, which is indexed for inflation thereafter.


    The `PPA` also includes several provisions to help finance health care reform.
    Among the most important of these is an increase in the threshold for medical
    expense deductions from 7.5 percent to 10 percent of a taxpayer’s adjusted gross
    income (`AGI`) for individuals under the age of 65; a new 3.8 percent surtax on
    unearned income (such as dividends and interest) for taxpayers with annual modified
    adjusted gross income (`MAGI`) over $200,000 (single filer) and $250,000 (joint
    filers); and an increase in the Medicare payroll tax from 1.45 percent to 2.35
    percent for taxpayers with an annual gross income over $200,000 (single filers)
    and $250,000 (joint filers). All of these provisions became effective January
    1, 2013, although the 2017 `TCJA` reduced the threshold for medical expense deductions
    from 10 percent to 7.5 percent of `AGI` for all taxpayers temporarily for the
    2018 tax year.


    ## Types of Health Insurance Policies


    Historically, there have been only two basic types of health insurance policies:
    indemnity (or fee-for-service) policies and managed care policies. In recent years,
    however, a third type of health insurance coverage—the health savings account
    (`HSA`)—has come onto the scene, spurred by Congressional legislation. The first
    two types of policies dominate the employer-provided range of coverage, whereas
    the `HSA` represents a new way of looking at the individual health insurance problem.
    The `HSA` is designed to make the individual—rather than their employer—the party
    responsible for making financial decisions related to health. For this reason,
    the `HSA` and its predecessor, the medical savings account (`MSA`), are part of
    what is now referred to as consumer-driven health care.


    ### Indemnity (Fee-for-Service) Policies


    True indemnity policies do not include a deductible or co-payment and as such
    are sometimes referred to as first-dollar coverage (because they pay from the
    first dollar of medical expenses incurred). Over time, indemnity policies, which
    historically have included separate first-dollar coverage for hospital, surgical,
    and physician’s expenses (often known as basic medical insurance), have evolved
    into the comprehensive major medical policy. The major med policy, as it has come
    to be called, includes both a deductible and a co-insurance provision, as well
    as a maximum dollar limitation of coverage, which usually amounts to at least
    $1 million in lifetime medical expenses.


    As a rule, indemnity policies, including major med, cover only accidents and illnesses
    and do not cover preventative care. In addition, they pay a benefit based only
    on the usual, customary, and reasonable (`UCR`) rates in your area, not on the
    actual bill or expenses incurred. Individuals insured under indemnity policies
    are often billed by their medical providers, submit claims to the insurance company,
    and are subsequently reimbursed for expenses. Insureds usually have complete freedom
    with respect to which medical providers they use, thereby driving up costs for
    both the insured and the employer-sponsor. Primarily because of the cost implications,
    indemnity policies have largely been replaced by managed care policies in recent
    years.'
