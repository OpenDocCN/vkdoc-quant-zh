  trans: "\n### 不合格递延薪酬\n\n本章最后，我们将介绍一种仅适用于少数精英——许多企业与公司最高层管理人员的员工福利。这种福利即不合格递延薪酬协议，通常通过人寿保险或仅支付给高管及其家属的证券来提供资金。\n\
    \n不合格递延薪酬与我们许多人参与的雇主资助退休计划相差并不远。这两种安排实际上都是将当期薪酬留待以后（通常是在员工退休时）支付的形式。然而，雇主资助的退休计划通常必须适用于所有员工，无论其薪酬水平和就业状况如何（根据劳动法，属于豁免或非豁免员工）。相比之下，不合格安排可以倾向于雇主选择的任何人。通常，这些受青睐的员工是公司的首席执行官和高级管理人员。\n\
    \n如果你足够幸运，获得了多种形式的不合格递延薪酬（例如`拉比信托`）中的任何一种，请务必不要为了当前的税收优惠而牺牲未来的福利保障。例如，尽管雇主仅承诺在未来某个时间支付你的递延薪酬确实能实现税收递延，但如果雇主未来破产，你将不必要地牺牲了当期薪酬的支付。幸运的是，有些方法可以同时实现这两个目标。\n\
    \n大多数递延薪酬安排必须由经验丰富的法律顾问起草。因此，作为一位有价值的高管，你未能得到公司法律部门或外部律师事务所充分保护的风险相对较小。尽管如此，始终要牢记很重要的一点：公司法律部门主要代表企业利益；它只是次要地代表你作为员工的利益。因此，你可能希望聘请自己的律师和财务规划师，就如何最好地进行操作提供建议。\n\
    \n本章结束我们对财务规划过程的`PADD`第一部分的探讨：即保护你自己、你的家人和你的财产。现在，我们进入该过程的第二部分：积累财富，并首先考虑投资于股票、债券和共同基金等金融资产的优缺点。\n\
    \n# 第三部分  \n积累财富\n\n# 9. 投资金融资产\n\n投资资产有两大类：金融资产和实物资产。然而，就本章而言，我们将讨论大多数人提及“投资”这个词时所想到的内容：即以美元计价和交易的金融资产，如股票和债券。为了在金融资产中实现适当的多元化，许多财务规划师建议，除了持有更传统的投资之外，还应适当涉足海外市场或以当地（非美元）货币计价和交易的资产。但即使投资者投资于外国股票的美国存托凭证（`ADR`），他们也需要了解，在将外国股票的收益兑换成美元时，存在货币或汇率风险。这是在通过金融资产积累财富时所承担的其他系统性风险之外的风险。\n\
    \n既然有本章讨论的所有固有风险，为什么还要投资于金融资产呢？原因很简单：要产生投资回报，你必须承担某种形式的投资风险。例如，一些投资者认为，如果他们囤积现金并将其塞进地下室的床垫里，就可以免受投资风险——但这并非事实。由于通货膨胀（也称为购买力风险），当投资者多年后准备花这些现金时，他们将没有（当初）刚把现金塞进床垫时那么多的钱（购买力）。\n\
    \n投资金融资产和积累财富的关键，通常是在尽可能承担较小投资风险的同时，尽可能产生较大的投资回报。做到这一点所需的方法是另一本书（可能好几本书）的主题，但任何认真的投资者都应该理解风险/回报关系，并据此构建自己的投资组合。\n\
    \n## 现金投资及其使用时机\n\n你可能认为自己了解“现金”一词的含义——即，在美国，现金是绿色且有形的（你能看到并触摸到它）。然而，在投资和财务规划领域，现金有特定的含义。它指的是具有高度流动性、本金（你最初投资的金额）几乎无风险或风险极低的投资。许多规划师使用术语`现金等价物`来区分现金投资与更通用的“绿色且有形”的定义。\n\
    \n通常，现金投资是短期（到期日不超过 12 个月）的附息证券和存款账户。因此，现金投资不仅包括银行存款，如储蓄账户、短期定期存款（`CDs`）和货币市场存款账户，还包括在货币市场进行的投资，如货币市场共同基金、公司商业票据和美国国库券（`T-bills`）。有时，非流通性投资，如购买美国政府的\
    \ EE 系列储蓄债券，也被归入现金等价物之列。这些投资均不能产生很高的投资回报，但它们具有流动性，而流动性正是现金等价物的基本属性。\n"
- fmt: '### Bank Deposits


    Many conservative investors do not venture away from bank deposits as an investment
    strategy. This is likely because they prefer the assurance of knowing that these
    deposits (up to a certain limit) are insured by the Federal Deposit and Insurance
    Corporation (FDIC). As a result of relatively recent legislation, all non-IRA
    bank deposits are now insured up to an amount of `$250,000` per account (up from
    `$100,000` previously). IRAs are also insured up to an amount of `$250,000` per
    depositor per bank.


    Certificates of deposit (CDs) are probably the most popular form of bank deposit.
    Also known as time deposits, short-term CDs are monies deposited with a bank for
    a specified period of time, usually anywhere from 3 to 12 months. The bank typically
    pays a fixed rate of interest for the term of the certificate, with rates increasing
    with the length of the term. If you redeem the CD and convert it to cash prior
    to its stated expiration or maturity date, a penalty is imposed by the bank in
    the form of a one-time fee or a lower overall interest rate.


    If you have a substantial amount of money to invest (for example, a lump-sum distribution
    from a retirement plan), you may wish to purchase multiple CDs rather than investing
    in only one certificate. In addition, in order to obtain as much FDIC insurance
    as possible, you may wish to purchase each of these multiple CDs at a different
    bank. A viable investment strategy is to sequence, or ladder, the maturity dates
    of the multiple certificates to take advantage of interest-rate fluctuations.
    For example, if interest rates increase, dividing an investment into two 6-month
    certificates (rather than one 12-month certificate) may be prudent. As each 6-month
    certificate matures, you can then reinvest it at a higher interest rate without
    penalty.


    Many people are unaware that banks also offer money market deposit accounts (MMDAs)
    in addition to standard savings accounts. An MMDA generally pays a higher rate
    of interest than a savings account, but it also requires a minimum deposit and
    account balance to avoid bank fees. Typically, six pre-authorized transfers are
    permitted from the account each month, up to three of which may be by personal
    check. Unlike a money market mutual fund, an MMDA is federally insured and for
    that reason may offer a slightly lower interest rate accrual than the money market
    fund.


    Although many investors purchase Series EE bonds through payroll deduction plans
    at their places of employment, you can also obtain these bonds at banking institutions.
    Also known as savings bonds, Series EE bonds are cash investments that must be
    purchased at 50 percent of their face amount and that range in denomination from
    `$50` to `$10,000`. The value of the bond is guaranteed to double after 20 years,
    after which time it may be extended for another 10 years at a fixed rate of interest.
    An advantage of a savings bond is that the interest earned is not taxable until
    maturity or when the investor redeems the bond, unless the investor elects to
    accrue the interest annually. As discussed in Chapter [15](#A314864_2_En_15_Chapter.html),
    when funding your child’s college education, there is a special type of EE bond
    for which the interest is entirely income-tax-free if the bond’s proceeds are
    used to pay qualified educational expenses, provided the parents’ income does
    not exceed a certain annual amount.


    ### Money Market Deposits


    The term money market is used in the investment world to refer to the market in
    which short-term securities are borrowed and reloaned by financial institutions.
    The money market is contrasted to the capital market, which generally involves
    the trading of securities with longer-term maturities or no maturity date at all
    (like a stock). Banks and bank deposits are part of the money market, but the
    term is used here to refer to cash investments obtained through brokerage firms
    and mutual fund companies.


    Most investors are familiar with money market mutual funds, if for no other reason
    than because they use such funds as emergency assets and as a conduit to park
    money before it is invested somewhere else. An investor who works with an investment
    advisor or financial planner to establish a separate, fee-based account of securities
    typically uses a money market mutual fund to “sweep” money from one investment
    to another.


    Money market mutual funds are offered by mutual fund companies that invest in
    high-quality, short-term investments, such as T-bills, corporate commercial paper,
    bank repurchase agreements, and large CDs. The typical minimum investment in the
    fund is `$1,000`, and funds may be withdrawn at any time by telephone or if the
    investor has check-writing privileges on the account. Most funds also offer owners
    the ability to wire-transfer money from the fund to a separate bank account.


    Although money market mutual funds lack FDIC insurance protection, they are safe,
    primarily due to the quality of the assets in which they are invested. You can
    also put your money into a tax-exempt money market fund that invests only in short-term
    municipal securities that are backed by the full faith and credit and taxing power
    of the municipality. This backing not only increases the potential safety of the
    fund, but may also increase your after-tax return, because interest from municipal
    securities is typically exempt from federal taxes (and may be exempt from state
    and city taxes as well, if you are a resident of the state and city that issued
    the security).


    Another type of money market deposit that you may wish to consider as a separate
    cash investment is a Treasury bill. T-bills are sold on a discount-from-face-value
    basis, and the interest portion (the difference between the issue value and the
    face value) is exempt from state and local taxes. T-bills are offered by the US
    Treasury in denominations of `$1,000` and have maturity dates of 4, 13, 26, and
    52 weeks. Most investors find it easier to purchase T-bills through a local bank,
    but they can also be purchased online at [`www.treasurydirect.gov`](http://www.treasurydirect.gov).
    The primary T-Bill market is an auction by mail.


    T-Bills are important as a reference for the benchmark short-term interest rate
    from which all other short-term rates are established, including bank CDs. Because
    the US government stands behind the issuing of all Treasury securities, including
    the short-term Treasury bill, T-bills are often said to be default-risk free.
    As such, the investor assumes no credit risk when purchasing the obligation. This
    is not the case with other debt obligations, such as corporate bonds (or even
    bank CDs in excess of the FDIC limit). Thus, if you want to determine what short-term
    interest rate you will receive on your cash investment, start with the 13-week
    T-bill rate and add a half-percentage point or so for a credit risk premium.


    Like any serious investor, you should invest in securities beyond what is included
    in the money market. However, in the wealth-accumulation process, you should make
    sure you always maintain some money (known in the investment world as a position)
    in a money market fund. As mentioned earlier, this is primarily to protect yourself
    in the event of a financial emergency, but it is also because you may be waiting
    on the sidelines until broader capital market conditions improve. Regardless,
    remember that the money market is for short-term cash investments, whereas the
    capital market is for longer-term security investments!'
