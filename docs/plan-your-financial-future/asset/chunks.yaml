  trans: '

    # 团体医疗与牙科保险


    在第五章中，我们讨论了明智的医疗保健服务购买者在选择健康保险政策前应考虑的因素。然而，大多数工薪阶层只能选择雇主提供的团体医疗和牙科计划。从历史上看，雇主提供的最流行的团体医疗计划类型是综合重大医疗保险，有时也称为按服务收费计划。但近年来，管理式医疗健康保险计划（如健康维护组织
    HMO 和优选医疗机构 PPO）已进入视野；而更近期，雇主开始提供健康储蓄账户的近亲：健康报销安排。


    健康报销安排（HRA）是一种由雇主资助的 HSA，允许员工积累资金用于医疗费用。但与 HSA 不同的是，雇主向员工 HRA 缴纳的金额没有限制。提供 HRA
    的雇主通常将其与高免赔额团体健康保险计划搭配，以覆盖员工可能产生的任何大额医疗费用。一旦雇主在 HRA 中预留的资金在给定年度内用完，员工在满足免赔额和共保要求后，其医疗费用将由高免赔额计划覆盖。如果
    HRA 在年底仍有剩余资金，这些资金可结转至下一年，从而使员工能够为未来的医疗费用“储蓄”。


    从员工角度来看，HRA 的一个主要优势是预防性护理（如常规体检和儿童免疫接种）不会从基金中扣除。此外，由于该安排涉及储蓄要素，HRA 参与者有动力明智地使用他们的医疗资金。雇主方面则喜欢
    HRA，因为它们有助于最大限度地降低医疗保险成本：提供保障的底层保单具有高免赔额，且相对健康的员工可能永远用不到该保单。


    遗憾的是，大多数团体牙科保险计划尚未采用 HRA 方式来支付费用。多数牙科保险以管理式医疗为模式，要么作为 HMO 运营，要么作为 PPO 运营。如果你拥有牙科
    HMO，你的团体保险保费将直接支付给你的牙医或专科医生。如果你的计划是 PPO 结构，则有一个参与牙医网络同意为团体投保人提供优惠服务。你也可以选择网络外的非附属服务提供者，但这需要支付更高的免赔额和共付额。


    总之，除非你参与了工作中的 HRA，否则你的团体医疗计划可能几乎不为你提供节省医疗资金的动力。此外，自付医疗费用的高昂成本很可能会阻止你购买个人保单。因此，你必须寻找尽可能节税的方式来支付你应承担的团体医疗费用份额（免赔额和共付额），例如参与灵活支出账户。你还应关注雇主提供的其他福利，这些福利可能需要通过个人保险来补充，如人寿保险和伤残收入保险。


    # 团体人寿保险


    雇主提供的最常见的人寿保险形式是团体定期保险。就其性质而言，这种保险是暂时的，仅在一定时期内保障你，通常只在你为提供保障的雇主工作期间有效。因此，你需要记住，离职时你很可能会失去保障。不过，在离职时，你通常有机会将团体定期保险转换为同一保险公司提供的某种形式的永久保险（无论是终身寿险还是万能寿险）。通常，这种转换特权仅在员工不再受雇之日起
    30 至 60 天内有效。但如果你利用这一特权，转换权通常是一项有保障的福利（无论当时你的健康状况如何，都不能拒绝你的保险申请）。


    团体定期寿险通常按员工工资的倍数提供。例如，保单提供的死亡保险金是员工当前工资的一倍或两倍。但通常，雇主承担的这一福利部分有上限，通常为 50,000 美元。这是因为根据税法，员工在必须将部分保障成本作为应税雇员福利计入之前，只能享受
    50,000 美元的保障成本免除额。换句话说，如果雇主为你支付了超过 50,000 美元的团体定期寿险，那么你必须将超出部分保险的经济利益作为应税收入申报。（该福利金额通常在年底的
    IRS 表格 W-2 上报告。）幸运的是，这一应计收入金额相对较小，而且雇主为保险支付的费用仍然很可能远低于你自行购买保险所需支付的费用。此外，如前所述，你在离开该雇主后可能有权将团体定期保险进行转换。


    然而，即使拥有团体定期寿险保障，你也应分析自己是否有足够的人寿保险保障。不要仅仅因为保险提供了保障就自以为足够；并且记住，除非你进行转换，否则离职时你将失去该保险。相反，应将团体定期保障仅视为一个起点，并用个人寿险进行补充，无论是个人定期保单还是永久保单——或者两者兼有。


    另一种常见的团体保险是意外死亡保险，有时称为双重赔偿保险。历史上，这种保险是作为团体寿险保单的附加险购买的，如果员工在执行雇主业务时因意外死亡，则向员工受益人支付的死亡保险金将加倍。与团体定期寿险一样，意外死亡保险的金额通常有限。但这主要是为了最小化雇主成本，而不是为了最小化员工的所得税影响。如果你拥有意外死亡保险保障，请将自己视为少数幸运儿，因为越来越多的雇主正在取消此类保障。此外，很难想象在意外死亡情况下对人寿保险保障的需求会大于正常死亡情况下的需求。因此，双倍的保险金基本上是免费的钱，否则你无法为你的继承人提供这笔资金。


    越来越多的雇主开始向员工提供团体永久型人寿保险——尤其是团体万能寿险。团体万能寿险的结构和条款与个人万能寿险相似，区别在于团体保险（在保单限额内）无需提供可保性证明即可获得。因此，健康状况不佳、可能无法获得个人保险的员工可以通过团体承保获得保险。此外，与团体定期保单不同，团体万能寿险是可携带的，这意味着离职时你可以带走保障（尽管之后可能会收取更高的保费）。

