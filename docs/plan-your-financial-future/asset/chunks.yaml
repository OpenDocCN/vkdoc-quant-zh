  trans: '

    ### 医疗保健费用


    几乎所有人都知道，美国正面临一场医疗保健危机。这场危机对退休人员尤其严峻，其中许多人依赖固定收入来维持退休生活。据富达投资称，2017 年退休的一对 65
    岁夫妇在停止工作后，需要大约 25 万美元来支付医疗费用——而这笔费用超出了医疗保险的覆盖范围，医疗保险通常覆盖 65 岁及以上个人的重大疾病费用。更糟糕的是，对于
    2017 年之后退休的个人，超出医疗保险覆盖范围的医疗费用所需金额更高，因为医疗成本持续上涨。


    退休期间，应对不断上涨的医疗费用最佳策略是什么？除非有幸能从前雇主那里获得退休人员健康保险，否则最佳计划就是在工作期间储蓄更多。例如，本章前面提到的 35
    岁工薪族应计划储蓄超过退休所需的 260 万美元一次性资本；至少，他们需要大约 25 万美元（实际上更多，因为所提及的金额尚未考虑未来 30 多年的通胀增长）用于未来的医疗费用。另一种选择是在符合医疗保险资格后的前六个月内申请医疗保险补充计划，以帮助支付这些费用。最后，第三种选择，至少对于自雇人士而言，是通过健康储蓄账户（`HSA`）为当前和未来的医疗费用进行储蓄。


    请注意，这笔预估的 25 万美元医疗费用并不包括可能的长期护理费用。与普遍认知相反，医疗保险并不覆盖监护护理的费用。因此，在您仍有资格且负担得起的情况下，考虑购买一份合格的长期护理保险政策至关重要。对于
    35 岁的人来说，考虑购买此类保单可能还为时过早（除非是为其父母购买），但一旦他们达到 50 岁左右，调查购买个人长期护理保险（或参与雇主的团体保险，如有）应成为首要的财务规划目标。


    ## 退休的财务风险


    与第 9 章讨论的一般投资风险类似，退休人员面临若干特殊的财务风险。具体如下：


    - **通货膨胀或购买力风险**：任何依赖固定收入的退休者每天面临的风险。简而言之，可以断言固定金额的美元未来的购买力低于今天。

    - **长寿或超龄退休风险**：退休者在去世前花光所有钱的风险。正是这种风险让普通退休者最为恐惧，也是年金成为重要退休规划工具的主要原因。

    - **市场风险**：投资股票或债券市场的一般风险。有时被称为波动性风险，因为这些投资的价值会每日波动。

    - **投资者行为风险**：投资者不理性且易受从众心理影响的风险。例如，他们倾向于在市场顶部买入今日的热门股票，然后在市场底部卖出同一只股票。因此，许多投资者无法获得最优甚至平均的回报。一个全新的金融领域——行为金融学——已经兴起，专门研究此类风险。

    - **时点或序列风险**：退休者在市场低迷时期开始退休，并最初提取过多资金，从而加剧超龄退休风险的风险。


    这些风险中最重要的是长寿风险——即活得比钱久的风险。避免这种风险只有一种可靠的方法，那就是购买即期固定或可变年金。但许多退休者对购买年金持怀疑态度，原因有二：他们不喜欢花掉投入年金的钱；他们担心做出如此大额的投资后不久便去世，从而将钱损失给保险公司。当然有办法解决或至少最大限度减少这些担忧，但管理长寿风险的另一种方法是设定从退休储蓄中提取固定比例，并坚持按年通胀调整后的这一比例，直至去世。


    退休者应提取的固定年百分比是多少？许多研究试图回答这个问题，但大多数学者和财务规划从业者的共识是每年提取初始账户余额的 4%到 5%，然后在考虑通胀后逐年提高这一百分比。换句话说，您在任何一年实际花费的金额应为退休时储蓄总额的
    4%到 5%，并根据随后几年的通胀影响进行调整。然而，务必记住，这一百分比取决于整个退休期间市场保持相对稳定（价值不显著下跌）。


    假设您 65 岁，在工作期间一直勤奋储蓄，并积累了 150 万美元的退休储蓄。在退休的第一年，您将提取 67,500 美元（即初始账户余额的 4.5%）。假设当年通胀率为
    3%，下一年您将提取 69,525 美元（67,500 美元乘以 1.03），并在整个退休期间以此类推。据估计，通过这种方式，您在 30 年退休期内没钱花的概率大约为
    90%。


    这一策略面临两大挑战：


    - 在享受退休生活的同时，您需要实现年均税后回报率超过 4.5%，否则将侵蚀您的退休储蓄本金。

    - 如果您在市场低迷时期开始这一策略，每年提取超过 4.5%的金额将使您的账户余额比正常情况下更快耗尽。换句话说，您并非仅靠利息生活，因此在退休期结束时，留给继承人的资金将更少——如果有的话。您可以在之后几年通过获得高于假设的年均投资回报来弥补这一不足。但如果您未能达到预期回报率甚至亏损怎么办？例如，如果您的投资组合从前一年的
    4%回报率下跌 2%，这在数学上就是 50%的亏损。要挽回这一损失或回到盈亏平衡点，您现在需要赚回那损失的 2%，即实现 100%的数学收益。


    将时点风险与长寿风险联系起来至关重要。实际上，这意味着您退休时的投资环境很重要。您希望在退休的头几年享受到上涨的市场——或至少是相对稳定的市场环境。您也不希望过度投资于固定收益证券，如债券和现金等价物，否则您可能无法获得等于或超过通胀率的税后回报。因此，财务规划师和投资顾问建议在整个退休期间保持大约
    60%的股权/40%的债券和现金组合。'
- fmt: '## The “Three-Legged Stool” of Retirement Savings


    Historically, financial planners have tended to view saving for retirement as
    consisting of three legs of a retirement “stool”:


    - Pension income from an employer-sponsored retirement plan, such as the traditional
    defined-benefit plan

    - Personal savings income from either a tax-deferred personal savings plan, such
    as an IRA, or a taxable mutual fund account

    - Social Security income


    Recently, however, given the rapid increase in defined-contribution plans, wherein
    investment risk is transferred to the employee or participant, a fourth leg of
    retirement-period earnings has also been included among retirement savings. As
    such, the stool is really more like a table—one that needs to be “set” more and
    more by your own retirement-plan contributions.


    ### Employer-Sponsored Retirement Plans


    Most medium- to large-size employers now offer their employees the opportunity
    to participate in an employer-sponsored retirement plan. Generally speaking, most
    employer-sponsored retirement plans today fall under the classification of defined-contribution
    retirement plans (sometimes lumped together under the heading of profit-sharing
    plans). The plan of choice in this category is often a `Section 401(k)` plan,
    which is a type of profit-sharing plan wherein the employer may choose at its
    discretion whether to make a separate, matching contribution in any given year.


    Unfortunately, though, according to a recent survey by the American Benefits Council,
    almost 21 percent of eligible employees do not participate in their employer-sponsored
    `401(k)` plans. Even though this percentage should decline in the future, with
    the popularity of automatic contribution plans through which employer contributions
    are made in the absence of an employee “opt out,” as a society, we still have
    a long way to go in retirement education planning. Particularly when the employer
    matches all or a portion of the employee’s before-tax contribution, the employee
    is essentially leaving found money on the retirement-savings table. Moreover,
    even if the employer does not match a portion of employee contributions to the
    plan, the employee is still contributing to a `401(k)` plan with before-tax dollars.
    As a result, not only does contributing to a `401(k)` plan represent an opportunity
    for the employee to save for retirement, but it also allows them to reduce their
    current income taxes at the same time.


    As a substitute for defined-contribution plans, employers may elect to offer their
    employees a second category of retirement plans known as a defined-benefit retirement
    plan (or traditional pension plan). But as has generally been well-documented,
    defined-benefit plans are a dying breed of employer-sponsored retirement plans
    because of their complexity and cost. According to a Bureau of Labor Statistics
    report in 2013, only about 16 percent of private sector workers participate in
    a traditional pension plan—and for workers now in their 20s, the outlook is even
    worse. It is likely that 10 percent or fewer of those workers will receive a monthly
    pension check. For employers, this is a positive trend; but for employees, it
    is not so favorable, because those employees assume sole responsibility for funding
    their retirement. Hence, in addition to the lack of a promised retirement benefit,
    the now-predominant defined-contribution plan requires considerable investment
    expertise on the part of the employee—a trait that many do not possess.


    The retirement outlook for younger workers, the vast majority of whom will not
    be offered a defined-benefit plan during their working years, is not all bad,
    however. Certain defined-contribution plans dictate that employer contributions
    are not discretionary. For example, a governmental `Section 401(a)` plan requires
    mandatory employer contributions equal to a percentage of employee salary, plus
    investment of those contributions on behalf of the employee at their direction.
    Furthermore, because of the 2001 law that equated the percentage deduction of
    a mandatory-contribution employer plan, such as a money-purchase plan, to that
    of a discretionary-contribution plan, such as a `Section 401(k)` plan, profit-sharing
    plans have become much more popular. You should respond in one of two ways:


    - Participate in and contribute to a defined-contribution plan in whatever amount
    you can afford. Remember, the lump-sum amount you need to accumulate for a comfortable
    retirement is substantial.

    - Educate yourself as much as possible about the concepts of investment risk and
    return. Know the minimum amount of risk you are willing to assume for the maximum
    possible amount of return you wish to achieve.


    Contribute to your employer-sponsored retirement plans first and before you attempt
    to separately contribute to any personal tax-deferred savings (such as an IRA)
    or taxable investments. In this manner, you can best take advantage of any matching
    contributions your employer may choose to make to encourage you to save for your
    retirement.'
