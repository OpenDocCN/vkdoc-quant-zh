    # 受抚养人护理援助


    您的雇主可以向您提供大额的受抚养人护理援助，作为一项无需纳税的附加福利。目前，您每个家庭每年最多可以享受 `$5,000` 的此类福利（如果收入较低配偶的薪资金额低于
    `$5,000`，则以其全额为准），而无需将这笔援助计入您的应税收入。如果您的雇主不提供受抚养人护理援助，您也可以选择减少自己的薪资，并自行向 `FSA`
    缴纳 `$5,000`。这么做的两个主要原因如下：


    -   您可以利用此账户支付受抚养人护理费用，例如全日制托儿、课后日托或请保姆的费用，并获得免税报销。

    -   您无需为向账户缴纳的金额支付任何所得税或社会保障税；也就是说，您是从薪水中以税前基础向此账户供款。


    在考虑是否设立 `FSA` 以支付儿童护理费用时，您还需要了解两个相关的所得税后果：


    -   您不能就任何已从该账户获得报销的儿童护理费用，申请儿童与受抚养人护理税收抵免（换言之，这是一种二选一的方案）。

    -   任何缴入账户但未在当年用于与工作相关的儿童护理费用的金额，您都将失去。与 `HSA`（可用作后续多年储蓄工具）不同，`FSA` 的供款遵循“用或废”原则。


    通常而言，您的应税收入越高，使用 `FSA` 薪资减免来支付儿童护理费用对您就越有利。相反，您的应税收入越低，薪资减免的优势就越小，而儿童与受抚养人护理税收抵免的价值就越高。


    不要忽略为不止年幼子女提供的受抚养人护理援助的可能性。根据现行法律，税收排除不仅适用于为 13 岁以下受抚养子女产生的费用，也适用于任何身体或精神上无法自理、且在一年中超过六个月与被赡养人同住其主要住所的个人。因此，`$5,000`
    的收入排除也潜在可用于帮助支付您作为主要照顾者的受抚养年长父母或受抚养配偶的护理费用。


    # 雇主教育援助


    一些雇主，尤其是那些需要高技能员工的雇主，会向其员工提供教育援助福利。在大多数情况下，根据雇主的报销规定，雇主仅对与工作相关的教育费用提供补助。然而，根据现行税法，允许每年从员工收入中永久排除最多
    `$5,250` 的教育援助，即使是与非工作相关的教育课程也可适用。此外，此项排除并不限于继续教育项目；雇主的支付可以报销本科或研究生学位课程的费用。因此，您或许能够获得并报销那个您一直向往的“水下编篮”博士学位课程的费用。


    在 2018 年之前，税法中还有一项相关的教育福利，无需雇主参与。这是一项针对您为职业发展而支付的、未获报销的教育费用的列举扣除（受限于调整后总收入 `AGI`
    的 2% 的“门槛”）。与收入排除条款不同，这项教育扣除必须与您的职业相关。例如，如果您是一名会计师，攻读会计硕士学位就属于与工作相关的教育。对许多快速发展的年轻员工来说，这里的主要问题是：攻读工商管理硕士学位的教育成本是否符合这项税收优惠的条件。一般来说，答案是肯定的；然而，如果您当前的工作与传统商业活动显著无关（例如，您是一名职业音乐家），您可能会发现很难有力地论证应允许此项扣除。这项教育费用的列举扣除预计将在
    2025 年之后，随着 2017 年《减税与就业法案》（`TCJA`）相关条款的“日落”而恢复。


    # 通过雇主赞助计划为退休储蓄


    近年来，旨在为退休提供保障的雇主资助计划发生了重大变化。历史上，只要员工完成规定的服务年限，雇主就会承诺在员工达到一定年龄（通常是 65 岁）时向其提供养老金。因此，雇主承担了所预留退休资金的投资业绩风险，并意图履行其养老金承诺。


    从 20 世纪 90 年代开始，为员工退休提供保障的方法开始从有保障的雇主提供养老金，转变为由员工对自己的财务未来负责的模式。换句话说，**固定缴款型退休计划**——即退休福利金额不受保障，而是取决于员工自身的投资能力来积累所需储蓄——变得占主导地位。根据波士顿学院退休研究中心的统计，1980
    年，在拥有退休计划的员工中，83% 享有传统的雇主提供养老金。据估计，2017 年，仅有 11% 的私营部门员工参与了养老金计划。然而，在公共部门员工（如警察和消防部门雇员）中，这一比例要高得多（约为
    84%）。尽管如此，从养老金计划向固定缴款计划转变的过程中出现了一个主要问题：大多数员工不具备为自身退休进行最优规划所需的投资专业知识。时至今日，情况依然如此。近期通过的立法旨在让雇主更容易协助员工做出退休投资决策，但员工普遍仍未接受足够的教育来承担做出退休计划投资选择的责任。希望读完本书后，您能更从容地做出此类选择。如果仍然感到困惑，我强烈建议您寻求注册理财规划师或其他退休规划专业人士的帮助。

    '
- fmt: '### Section 401(k) Retirement Plans


    Many employees today are participating in one or more types of defined-contribution
    retirement plans at work, but the Section 401(k) plan has become the savings plan
    of choice. Although many employees believe that employers match a percentage of
    their 401(k) plan contributions primarily for altruistic reasons, this is not
    usually the employers’ motivation. Rather, special nondiscrimination tests must
    be met before the employer can offer and maintain a 401(k) plan on behalf of any
    employee, including highly compensated employees, whose job satisfaction and performance
    are usually the employer’s primary concern. Because highly compensated employees
    are the kind of employees most likely to already contribute to a Section 401(k)
    plan, the employer needs to motivate non-highly compensated employees to contribute
    to satisfy nondiscrimination tests under law. As a result, employers typically
    encourage non-highly compensated employees to contribute via a matching-of-employee-contributions
    program.


    According to Vanguard Investments in its `How America Saves 2016` report, the
    average 401(k) plan contribution (or salary deferral percentage) in the year 2015
    was only 6.8 percent of income. Moreover, only approximately 75 percent of employees
    participate in 401(k) plans, per the Center for Retirement Research at Boston
    College. This means the net employee-only savings rate was only 5.1 percent (6.8
    percent times 75 percent). Even with a 3 percent employer match of employee contributions
    (the most common matching-of-employee contributions in the United States is 50
    percent of the first 6 percent of salary deferrals), the aggregate, total employer-plus-employee
    savings rate is only 7.35 percent (6.8 percent plus 3 percent times 75 percent).
    This is not nearly enough for most 401(k) plan participants to live adequately
    during their retirement years. Instead, the rate should be between a 10 and 15
    percent annual aggregate savings rate.


    If you are lucky enough to work for an employer that sponsors a Section 401(k)
    plan, the first thing you must do is participate. You should then elect to defer
    on a pretax basis as much of your salary as possible into the 401(k) plan. Certainly,
    you should be deferring at least 3 percent of your salary (or whatever percentage
    your particular employer will match), because doing so results in a guaranteed
    100 percent investment return on your money. But beyond that, a total annual contribution
    of at least 10 percent of your own money should be your goal. If you are closer
    to retirement and have wasted the prime saving years of your 30s and 40s, you
    will need to save an even greater percentage of your current income to fund retirement.
    Either that, or you will need to consider one of two unpleasant alternatives:
    1) work longer and extend your planned retirement date, or 2) reduce your post-retirement
    standard of living.


    **Note**


    Although there are annual dollar limits on how much of your salary you can defer
    into a 401(k) plan, these limits are usually important only for highly compensated
    employees, such as corporate executives.


    As a result of the Pension Protection Act (PPA) of 2006, many 401(k) plans are
    adopting automatic enrollment plans. This alternative, also known as a negative
    election, allows an employer to enroll employees in its Section 401(k) plan without
    the employee’s consent, as long as the employee has the right to opt out of contributing.
    Some employers are also supplementing the automatic enrollment with a progressive
    savings feature, meaning they automatically increase an employee’s savings deferral
    percentage by a set amount (for example, 1 percent, each year that the employee
    participates in the plan). These two features, when used together, may go a long
    way in helping employees—and particularly those who have opted out in the past—save
    for their own retirement.


    As an incentive for offering automatic enrollment, the PPA of 2006 included relief
    from employer liability if the employer provides investment advice to 401(k) plan
    participants. To be eligible for this relief, however, the employer’s investment
    advice arrangement must include an unbiased computer model certified by an independent
    expert that creates a recommended portfolio for a participant’s consideration.
    As a result, life-cycle investment funds or target-date retirement funds are now
    being adopted as an employer’s default investment option for employees who are
    automatically enrolled. Overall, this is not a bad thing, particularly if you
    are an employee who would not save otherwise. But if you are at all serious about
    saving for your own retirement (you’re reading this book, aren’t you?), you can
    probably invest your retirement plan contributions more wisely than the default
    option. At the very least, you—or your financial advisor—should try!'
