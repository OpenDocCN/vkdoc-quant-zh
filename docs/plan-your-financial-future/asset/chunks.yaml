- fmt: '# Insurance Company Selection and Ratings


    Before purchasing any type of life insurance policy, even a term policy, find
    out the financial strength of the insurance company underwriting (or insuring)
    it. Remember, the purpose of the policy—to provide for your family members in
    the event of your death—will not be realized until sometime in the (hopefully)
    distant future. You want the company from whom you buy the policy to be in business
    when it comes time for the death benefit to be paid. Moreover, should you need
    to access a portion of the death benefit during your life through one of the popular
    accelerated death benefit riders available today, you want to ensure that the
    company will be there to provide it.


    The primary measure that most financial planners use to assess the financial strength
    of an insurance company is to consult an independent rating service. There are
    five primary insurance company rating organizations: `A.M. Best`, `Standard &
    Poor’s`, `Moody’s`, `Fitch Ratings`, and `Weiss Research`. Their rating letters
    are different, but all use `A+` or some variation thereof to rate the highest
    companies, and several use `F` as the lowest rating. Table [4-2](#A314864_2_En_4_Chapter.html#Tab2)
    shows the top six ratings from each organization, as well as the lowest ratings.


    **Table 4-2.** Insurance Company Rating Agencies and Ratings


    | | `A.M. Best` | `Standard & Poor’s` | `Moody’s` | `Fitch Ratings` | `Weiss Research`
    |

    | --- | --- | --- | --- | --- | --- |

    | Highest Rating | `A ++` | `AAA` | `Aaa` | `AAA` | `A+` |

    | Second-highest rating | `A+` | `AA+` | `Aa1` | `AA+` | `A` |

    | Third-highest rating | `A` | `AA` | `Aa2` | `AA` | `A-` |

    | Fourth-highest rating | `A-` | `AA–` | `Aa3` | `AA–` | `B+` |

    | Fifth-highest rating | `B++` | `A+` | `A1` | `A+` | `B` |

    | Sixth-highest rating | `B+` | `A` | `A2` | `A` | `B–` |

    | Lowest rating | `F` | `D` | `C` | `CCC–` | `F` |


    None of these ratings organizations is any more preferable than the others; they
    all provide valuable information and basically review the same data on each insurance
    company. However, it is important to understand which organization’s ratings are
    being cited. For example, a company rated `A` by `A.M. Best` means the company
    is of the third-highest quality, whereas the same company rating provided by either
    `Standard & Poor’s` or `Fitch Ratings` indicates a level of only the sixth-highest
    quality. Regardless, with the number of insurance companies in business today,
    you should likely seek out only those of the highest or second-highest rating,
    using any rating measure. Typically, companies that deserve those ratings are
    well-known and have been conducting business for many years.


    One final point to consider: some financial planners and insurance advisors believe
    that an insurance company’s financial strength is not as important a consideration
    for those who plan to purchase a variable life or `VUL` cash value policy as it
    is for those who plan to purchase a traditional whole life or universal life policy.
    This is because the insurance company uses its general assets to stand behind
    a claim filed with respect to a traditional whole life or universal life policy
    but does not with the variable forms of life insurance. In these latter types
    of policies, the cash value accumulates in a separate subaccount that is not subject
    to the claims of the insurance company’s other general creditors. As such, the
    financial viability of the company to pay your claim on a variable form of life
    insurance policy may not be quite as critical.


    Another form of insurance protection—much in need today—is that of health insurance.
    Whereas most health insurance is offered, if at all, on a group level basis, the
    primary emphasis of "Obamacare" is directed toward the mandatory purchase of health
    insurance at the individual level. (Note that the 2017 `TCJA` repealed the individual
    mandate to purchase health insurance, but not effective until the beginning of
    year 2019.) By providing for increased competition among insurers in the form
    of state health insurance exchanges, it is hoped that the number of uninsured
    individuals will decline, thus forcing down health insurance costs. Although the
    success of these state health insurance exchanges to date is arguable in actually
    reducing costs, the next chapter reviews the major provisions of Obamacare as
    well as indemnity and managed care options.


    # 5. Insuring Your Health and Long-Term Care


    The issues of health insurance and health insurance coverage are controversial
    and politically charged, particularly given individual preferences about national
    health insurance vs. a private-payer system. The potential necessity for long-term
    care insurance, however, is not nearly as well-known or discussed. According to
    the US Department of Health and Human Services, individuals reaching the age of
    65 have an approximately 40 percent chance of entering a nursing home and requiring
    chronic, custodial care. Candidates for long-term care suffer from chronic or
    disabling conditions that require nursing-home care or other constant supervision.
    The cost of this care can be expensive—even financially catastrophic—for many
    individuals and their families.


    One way to provide for the cost of this care is to purchase long-term care insurance
    while you are still healthy and young enough to qualify for it. But other alternatives
    exist, as discussed later in this chapter. Let’s look first at the factors that
    should be considered in selecting an individual health insurance policy and the
    types of policies available in today’s marketplace.


    ## Considerations in Selecting a Health Insurance Policy


    This section presents five general considerations to keep in mind when selecting
    the right health insurance policy.


    **Not Having Health Insurance Is Expensive.** Health insurance costs a lot, but
    not having it costs a great deal more. Quite by accident, as a result of a recruitment
    tool used to entice veterans returning from World War II, the United States has
    an employer-based health insurance system. Accordingly, a majority of Americans
    are covered through group health insurance policies provided by their employers.
    However, many self-employed individuals and their employees do not have health
    insurance, given the prohibitive cost of coverage. The same is true for salaried
    individuals who are laid off as a result of a weak economy.


    When it comes to health care expenses, studies show that if one family member
    is not covered by health insurance and suffers an accident, the resulting medical
    bills will have an impact on the future economic health of the entire family.
    The obligation to pay high medical bills is the number-one reason for personal
    bankruptcy filings today. As such, the need for group or individual coverage is
    important. If you are not covered by an employer or individual health plan, follow
    these steps as recommended by health care advocates and consultants:


    1. Get in touch with your state’s insurance department to find a list of health
    care plans that provide coverage in your state. Because of the extensive cost
    of health care to the uninsured, and the continuing inability of some individuals
    to qualify for health insurance, some states have established health insurance
    pools that offer coverage for high-risk individuals.

    2. Contact the top-ranked plans in your state for details regarding premiums and
    costs for major medical procedures.

    3. Find out whether any preexisting conditions are excluded from coverage. If
    you have previously been covered by a group policy, the Health Insurance Portability
    and Accountability Act of 1996 (`HIPAA`) may assist you in obtaining individual
    coverage, even if you have a preexisting condition as specified by the insurance
    carrier. Moreover, since the implementation of the Patient Protection and Affordable
    Care Act of 2010 (`PPA`), an insurance carrier is generally prohibited from denying
    coverage based on a preexisting condition.'
