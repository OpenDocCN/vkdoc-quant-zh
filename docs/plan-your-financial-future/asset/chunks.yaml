- fmt: '### Laddering


    You can go about laddering, or staggering, the maturity of fixed income investments,
    such as bonds or certificates of deposit, in a number of ways. The most popular
    is to figure out the longest- and shortest-term maturities you want to assume
    and then sequence your purchases between those maturity dates.


    For example, if you have `$50,000` to invest, and you want to invest in bonds
    with a maturity of no longer than ten years and no shorter than one year, consider
    ten purchases of bonds in `$5,000` increments with a maturity date each year from
    the end of year one to the end of year ten. This has the effect of minimizing
    the impact of the price changes in the bonds due to interest-rate fluctuations,
    also known as interest-rate risk. In addition, as the short-term bonds mature,
    their principal may subsequently be invested at potentially higher market interest
    rates.


    You can adopt the same approach with respect to bank certificates of deposit and
    obtain the advantage of Federal Deposit Insurance Corporation (FDIC) insurance
    on each certificate, as long as the total ownership in each bank and certificate
    does not exceed `$250,000` per depositor.


    ### Buy and Hold


    Another phrase that describes the buy-and-hold investment strategy is passive
    portfolio management. In other words, the investor does not intend to actively
    trade the stocks, bonds, or other assets in their portfolio and instead chooses
    to own those investments for a relatively long time. Buy and hold, coupled with
    dollar-cost averaging, is a common strategy for building wealth to meet the average
    investor’s saving-for-retirement financial-planning goal.


    The buy-and-hold strategy has several advantages:


    * You can minimize your acquisition and trading costs in the trading of securities,
    leading to considerable savings over time.

    * It will assist you in managing your income-tax obligations. For example, if
    you do not sell a security in a given year, you do not need to recognize a capital
    gain or loss on your income-tax return.

    * Academic studies have shown that the most significant gains in the securities
    markets are made during several trading days throughout the year; a buy-and-hold
    strategy ensures that you will not be out of the market during those days.


    A warning: many individuals say they are buy-and-hold investors when, in fact,
    they are not. Most of us allow changing market conditions to influence our buy-and-sell
    trading decisions. In other words, we let short-term emotions get in the way of
    our long-term investment decisions. Mega-investor Warren Buffett has made his
    investors rich in part by not permitting emotions to dictate his investment philosophy.
    If you are a pure buy-and-hold investor, you will remain in the market for a long
    time with little concern for market volatility.


    ### Market Timing


    Market timing is the behavioral opposite of the buy-and-hold strategy. It is an
    attempt to predict the overall direction of the securities market and to take
    advantage of the market’s volatility, whether that general direction is up (a
    bull market) or down (a bear market).


    Market timing should not be confused with the rebalancing strategy discussed earlier
    in this chapter. You should rebalance your portfolio to maintain consistent asset-allocation
    percentages over time. However, when you rebalance, you are responding to rules
    and conditions that you have established—through an asset-allocation strategy,
    included in an investment policy statement, that is intended to culminate in the
    meeting of your financial goals. Market timing responds to external market circumstances—rules
    and conditions that have been established by the market—over which you have no
    control. In practice, portfolio rebalancing is proactive, whereas market timing
    is reactive.


    Does market timing work? Probably not, largely for the reason mentioned earlier:
    an investor needs to stay invested in the market all year long to experience the
    greatest gains. Nevertheless, if done properly, market timing can have value.
    For example, as an investor, you should pay attention to reports that indicate
    whether a large number of market timers are either buying or selling over a period
    of several weeks. This may give you some perspective with respect to overall market
    sentiment (and, accordingly, whether the market in the future is likely to go
    up or down).


    ### Value vs. Growth Investing


    Value and growth investing are just different sides of the same investment coin.
    In this case, the investment coin is the price-to-earnings (P/E) ratio of stocks.


    Value investing is an investment strategy that is concerned with the market price
    of stocks: specifically, finding stocks that are currently undervalued by the
    market. Thus, investors who practice value investing attempt to find stocks with
    high dividend yields and low P/E ratios. This strategy assumes that the current
    P/E ratio of the stock is below its proper level (or what the ratio should be,
    given current market conditions) and that an efficient market will soon accommodate
    for this discrepancy and drive up the price of the stock.


    Growth investing, on the other hand, focuses on the potential earnings of the
    company issuing the stock. As a result, growth investors look for growth stocks—stocks
    of a company that has shown a proven ability to develop products quickly and efficiently
    with a minimum of marketplace competition. Such stocks usually have a superior
    rate of earnings growth (typically 10 percent a year or more), low dividend yields,
    and an above-average P/E ratio.


    There is some practical evidence that, in a bull market, a growth investing strategy
    tends to outperform a value investing approach. Conversely, in a declining or
    fluctuating market, value investing may be more appropriate. As an investor, you
    should likely consider both strategies as appropriate methods of building wealth.'
