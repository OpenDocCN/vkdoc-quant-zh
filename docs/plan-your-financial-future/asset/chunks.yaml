  raw: '## Donor-Advised Funds


    Another possible option to further the philanthropic goals of an individual or
    family is to establish a donor-advised fund (DAF), which is an arrangement whereby
    a donor makes a gift to a giving account that is managed by a commercially available
    mutual fund. A DAF is sometimes called a charitable IRA . After contributing to
    a DAF, the donor can then make recommendations as to the fund’s future disbursements
    to any qualified public charity. However, because the donor can only make recommendations,
    the sponsoring mutual fund is under no legal obligation to carry out or implement
    the donor’s requests. Nevertheless, most DAFs do try to implement their donor’s
    wishes.


    DAFs have several benefits. First, they offer donors the opportunity to create
    a low-cost, flexible vehicle for charitable giving that is structured as an alternative
    to direct gifting or the creation of a private foundation. There are no setup
    costs to establish a DAF, and annual fees currently run at approximately 0.60
    percent for the DAF and an additional 1 percent or so for expenses associated
    with the management of the mutual fund or funds. Additionally, unlike the minimum
    5 percent disbursement requirement that is applied to private foundations, DAFs
    are not subject to mandatory distribution rules. Finally, DAFs make it easy to
    involve generations of families in philanthropy. As a result, you can imbue in
    your children the philanthropic mindset of “giving back.”


    What about the tax benefits of establishing a DAF? First, because a DAF is technically
    an extension of a public charity, donors are eligible for the same maximum income-tax
    deduction they would receive were they to contribute directly to a 50 percent
    organization. A donor receives this deduction at the time of contributing to the
    fund, no matter when the fund designates those contributions in the future. Next,
    current tax law affords those who donate appreciated securities to a DAF an income-tax
    deduction for the full fair market value of the donation. In addition, by donating
    appreciated securities to a DAF and then advising the fund to make donations to
    several charities, donors may obtain tax advantages without the necessity of transferring
    these securities in kind to the recipient charities. Moreover, donating to a DAF
    offers a way to avoid capital gains taxes that would otherwise be due on the appreciated
    securities if they were converted to cash before being gifted to a charity.


    For example, assume that you are the owner of 1,000 shares of ABC stock, which
    has appreciated over the years from $20 per share to $100 per share. Further,
    assume that you are in the highest marginal income-tax bracket of 37 percent,
    which means your capital gains tax rate is 23.8 percent in 2018 (including the
    3.8 percent Obamacare surtax). You want to donate your 1,000 shares of ABC stock
    to your public charity of choice, and because you are aware that the charity is
    likely to cash in those shares upon their receipt, you make the tax mistake of
    selling the securities yourself first and subsequently gifting the cash to the
    charity. Your net cost in making this charitable gift is $82,040, which is computed
    as follows:


    | $100,000 | Cost of donation |

    | + $19,040 | Capital gains tax due (($100,000 less $20,000) times 0.238) |

    | $119,040 | Total cost |

    | − $37,000 | Income tax saved ($100,000 times 0.37) |

    | $82,040 | Net cost of gift |


    Now, suppose that instead of making your charitable gift in this manner, you donate
    your 1,000 shares of ABC stock to a DAF. You then advise the DAF’s managing mutual
    fund to transfer the cash proceeds of the stock to your public charity of choice.
    Accordingly, your net cost in making this charitable gift, using the DAF as a
    tax-exempt intermediary, is only $60,400, which is computed as follows:


    | $100,000 | Cost of donation/total cost (no capital gains tax due) |

    | − $37,000 | Income tax saved ($100,000 times 0.37) |

    | $63,000 | Net cost of gift |


    In other words, by avoiding the administrative and tax costs that you incur when
    making the gift of appreciated securities directly to your public charity of choice,
    you effectively save $19,040.


    You must keep one final tax-planning principle in mind if you are planning to
    gift property to a qualified charity. If the property appreciates in value from
    the time you purchase it until the time you plan to gift it to charity, let the
    charity subsequently sell the property. If you proceed in this manner, no taxes
    of any kind will be due, because the charity is a tax-exempt entity. Alternatively,
    if the property depreciates in value from the time you purchase it until the time
    you plan to gift it to charity, you should sell the property before gifting it
    to charity. Doing so permits you to take advantage of the loss in property value
    on your income-tax return. If you do not claim the loss before gifting, the allowable
    loss is lost forever, because the tax-exempt charitable entity cannot take it
    either.


    If you are interested in establishing a DAF, shop the idea around first. Different
    mutual funds charge different annual fees to operate, which reduces the amount
    of monies that can go to the charities you wish to benefit.


    In summary, the following are the planning techniques you may wish to consider
    in accomplishing your philanthropic objectives. In all cases, at least one tax
    deduction, and in some cases two or three (income-, gift-, and estate-tax) deductions,
    may be permitted:


    *   An outright or direct gift to charity

    *   A charitable remainder annuity trust (CRAT)

    *   A charitable remainder unitrust (CRUT)

    *   A charitable gift annuity (CGA)

    *   A pooled-income fund

    *   A private operating foundation

    *   A private nonoperating foundation

    *   A donor-advised fund (DAF)


    With this chapter, we have concluded our journey of planning for your financial
    future and, specifically, slowly and consistently becoming wealthy in that future.
    It is now time to summarize the PADD process and reap the rewards! That is the
    focus of the final chapter of this book.


    # Part VII

    Summarizing the Personal Financial-Planning Process'
  trans: "\n# 捐赠人建议基金\n\n为进一步实现个人或家庭的慈善目标，另一种可选方案是设立捐赠人建议基金（DAF）。这是一种捐赠人向由商业共同基金管理的捐赠账户捐赠资金的安排。DAF\
    \ 有时也被称为慈善个人退休账户。向 DAF 捐款后，捐赠人可以就基金未来向任何合格公共慈善机构的拨款提出建议。然而，由于捐赠人只能提出建议，管理该基金的共同基金在法律上没有义务执行或落实捐赠人的请求。尽管如此，大多数\
    \ DAF 确实会尽力实现捐赠人的意愿。\n\nDAF 有几个优点。首先，它为捐赠人提供了一个低成本、灵活的慈善捐赠工具，作为直接捐赠或设立私人基金会的替代方案。设立\
    \ DAF 无需启动成本，目前年费约为 DAF 资金的 0.60%，另加约 1% 用于管理共同基金的相关费用。其次，与私人基金会适用的最低 5% 年度支出要求不同，DAF\
    \ 不受强制分配规则的约束。最后，DAF 让多代家庭参与慈善变得简单，因此您可以向子女灌输“回馈社会”的慈善理念。\n\n设立 DAF 的税收优惠有哪些？首先，由于\
    \ DAF 在技术上是公共慈善机构的延伸，捐赠人有资格获得与直接向 50% 组织捐款相同的最高所得税扣除额。捐赠人在向基金捐款时即可享受此项扣除，无论基金将来何时指定这些捐款的用途。其次，现行税法允许向\
    \ DAF 捐赠增值证券的捐赠人，就其捐赠证券的全部公平市场价值进行所得税扣除。此外，通过向 DAF 捐赠增值证券，并建议基金向多个慈善机构捐款，捐赠人可在无需将这些证券实物转移给受捐慈善机构的情况下获得税收优惠。更重要的是，向\
    \ DAF 捐赠可以避免在增值证券变现后捐赠给慈善机构时本应缴纳的资本利得税。\n\n例如，假设您拥有 1000 股 ABC 公司的股票，该股票多年来已从每股\
    \ 20 美元增值至每股 100 美元。再假设您处于 37% 的最高边际所得税率等级，这意味着您 2018 年的资本利得税率为 23.8%（包含 3.8%\
    \ 的奥巴马医保附加税）。您想将这 1000 股 ABC 股票捐赠给选定的公共慈善机构，但意识到该机构很可能在收到股票后立即变现，于是您犯了个税务错误：自己先卖出股票，然后将现金捐赠给慈善机构。这样做的净成本为\
    \ 82,040 美元，计算如下：\n\n| 100,000 美元 | 捐赠成本 |\n| + 19,040 美元 | 应缴资本利得税（（100,000 美元减去\
    \ 20,000 美元）乘以 0.238） |\n| 119,040 美元 | 总成本 |\n| − 37,000 美元 | 节省的所得税（100,000\
    \ 美元乘以 0.37） |\n| 82,040 美元 | 捐赠净成本 |\n\n现在，假设您不采用这种方式进行慈善捐赠，而是将这 1000 股 ABC 股票捐赠给\
    \ DAF。然后您建议 DAF 的管理共同基金将股票变现后的现金转给您选定的公共慈善机构。因此，利用 DAF 作为免税中介，这次捐赠的净成本仅为 63,000\
    \ 美元，计算如下：\n\n| 100,000 美元 | 捐赠成本/总成本（无需缴纳资本利得税） |\n| − 37,000 美元 | 节省的所得税（100,000\
    \ 美元乘以 0.37） |\n| 63,000 美元 | 捐赠净成本 |\n\n换句话说，通过避免将增值证券直接捐赠给选定的公共慈善机构所产生的管理和税务成本，您实际上节省了\
    \ 19,040 美元。\n\n如果您计划向合格慈善机构捐赠财产，必须牢记最后一条税务规划原则：如果财产从您购买之时到计划捐赠给慈善机构之时已经增值，请让慈善机构随后出售该财产。这样操作，任何税款都无需缴纳，因为慈善机构是免税实体。相反，如果财产在您购买之时到计划捐赠给慈善机构之时已经贬值，则应在捐赠前先出售该财产。这样做可以让您在所得税申报表中利用财产价值的损失。如果您在捐赠前未申报损失，那么允许的损失将永远丧失，因为免税的慈善实体也无法承担该损失。\n\
    \n如果您有兴趣设立 DAF，请先多方比较。不同的共同基金收取不同的年运营费，这会减少最终能流向您希望资助的慈善机构的资金。\n\n总之，以下是您在实现慈善目标时可能希望考虑的规划技巧。在所有情况下，至少允许一项税收扣除，在某些情况下可能允许两项或三项（所得税、赠与税和遗产税）扣除：\n\
    \n*   直接捐赠给慈善机构\n*   慈善剩余年金信托（CRAT）\n*   慈善剩余单一信托（CRUT）\n*   慈善赠与年金（CGA）\n*  \
    \ 集合收入基金\n*   私人运营基金会\n*   私人非运营基金会\n*   捐赠人建议基金（DAF）\n\n通过本章，我们结束了规划您财务未来的旅程，特别是如何缓慢而持续地在未来变得富有。现在是时候总结\
    \ PADD 流程并收获回报了！这是本书最后一章的重点。\n\n# 第七部分  \n总结个人财务规划流程\n"
- fmt: '# 21. Reaping the Rewards


    This book has introduced you to a new method of ordering your financial life and
    planning for your financial future. It has also developed a novel definition of
    the term wealth—a definition that goes beyond the traditional meaning of accumulating
    enough financial riches to ensure that your current or desired standard of living
    is maintained throughout your working years and subsequent retirement.


    How do you go about ensuring that you are wealthy in the fullest sense of the
    word? This book suggests that this sought-after status may be best achieved by
    following the `PADD` strategy for wealth accumulation and management:


    - Protecting yourself, your family, and your property

    - Accumulating wealth

    - Defending your wealth

    - Distributing your wealth during your lifetime and at death


    Broadly, this process may be thought of as following these financial-planning
    steps:


    1. Insuring yourself, your family, and your property against the possibility of
    significant loss

    2. Taking advantage of benefits that are offered by your employer, most notably
    any employer-sponsored retirement plan

    3. Investing in financial or real assets—or both

    4. Minimizing the effects of inflation on your portfolio as much as possible

    5. Practicing effective tax-planning and tax-management techniques

    6. Preparing for your children''s higher education

    7. Planning for your retirement years

    8. Distributing your estate at death to your intended heirs or beneficiaries in
    as transfer-tax-efficient a manner as possible


    Maximizing the implementation of these steps is not easy. If it was, this book,
    and many others on the topic of effective personal financial planning, would not
    be necessary. However, it should be comforting to know that you are not alone
    in meeting this challenge! A number of professional advisors, among them Certified
    Financial Planners (`CFP`s), Certified Public Accountants (`CPA`s), securities
    and insurance professionals, and estate-planning attorneys, stand ready to assist
    you in meeting your financial-planning and wealth-accumulation goals. Alternatively,
    if you believe you are skilled and disciplined enough to take on this challenge
    yourself, you should by all means do so.


    Attending to your financial life and affairs is analogous to Scarlett O''Hara''s
    famous line in *Gone with the Wind*: "Oh, fiddle-dee. I''ll think about it tomorrow!"
    In other words, the longer you put off thinking about the financial-planning process,
    the longer it will be before you become wealthy—and the sooner a financially challenging
    tomorrow will arrive! If this book has accomplished nothing else, I hope it has
    provided you with some basic principles and knowledge with which you can begin
    to take control of your financial life. If you adopt the process described in
    its pages, you will reap the greatest reward of all: a financially worry-free
    and independent life that you can enjoy to the fullest with family and friends.


    I wish you good planning.


