  trans: '

    # 年金在退休规划中的运用


    根据麦肯锡消费者退休调查，认为缺乏有保障的退休收入是极其重要风险的美国适龄劳动人口比例，从 2004 年的 28%上升至 2009 年的 61%。自 2009
    年以来，这一比例很可能只增不减。事实上，钱不够花是大多数退休人员表达的首要退休规划顾虑。因此，在退休时带有终身`GWB`附加条款的即期定额或变额年金的重要性日益增加。这反映了在退休规划中使用年金的主要优势：年金能让您拥有一项安全投资，并带来有保障的终身收入流。换言之，作为年金领取人，您不会出现钱不够花的情况。


    年金在为退休财务方面做规划时还提供其他优势：


    *   如果您购买递延变额年金，您就有机会通过投资年金子账户中的共同基金来增加账户余额。此类年金也可以购买`GMIB`附加条款，确保您的资金获得最低限额的保证投资回报。

    *   您可以规划收入领取时机，以利用您处于较低税级年份的优势。

    *   如果您购买了非合格年金，例如不可扣除个人退休账户（IRA），在分配时只需为年金中累积的收益缴税。

    *   您永远无需从非合格年金中进行规定的最低分配，因此可以在去世时将整个账户余额留给您的继承人。


    您何时应考虑购买年金作为终身财富积累和分配过程的一部分？当您希望获得以下保障时：


    *   保证您在退休期间不会钱不够花（换言之，您规避了长寿风险）

    *   有机会在延税的基础上增长任何投资资金

    *   作为传统或罗斯个人退休账户（IRA）的替代或补充，允许无限额的年度供款

    *   在雇主赞助的退休计划或传统可扣除个人退休账户（IRA）缴款最大化之外的另一种选择


    但作为一般规则，在您每年以税前形式向雇主赞助计划或可扣除个人退休账户（IRA）缴纳所有可能的金额之前，不应考虑购买非合格年金或任何税后退休规划储蓄工具。


    # 退休期间每年应提取多少钱？


    借用多年前一个热门游戏节目的名称，这个 64,000 美元的问题是：“退休期间每年应该提取多少钱？”在回答之前，您需要先问三个相关的问题：


    1.  我的退休资金预期应该持续多长时间？

    2.  我应该投资哪些资产才能使钱不够花的概率最小？

    3.  一旦开始提取，为了最有效地减少应缴所得税，我应该先动用哪些退休资金？


    关于第一个问题，多项学术研究已确定，每年提取 4.5%并每年根据通货膨胀调整，为退休人员提供了最大可能避免钱不够花的概率。因此，您应该假设退休分配期约为 30
    年，提取率为扣除通胀后的 4.5%。具体来说，研究表明，使用最优的 4.5%提取率，您在该期间内钱不够花的概率大约只有 10%。


    第二个问题引出您在退休前阶段应投资什么，以优化避免钱不够花的几率。实证表明，在退休储蓄组合中保持大约 60%股票和 40%债券及现金或现金等价物的恒定资产配置，为您提供了最大可能避免钱不够花的机会。具体来说，我建议您的退休投资组合应包括
    40%的大盘混合股票或共同基金（混合意味着价值型和成长型股票的组合），20%的国际股票，30%的中期投资级债券，以及 10%的现金或现金等价物。


    一旦您开始每年进行退休提取，一条基本经验法则可以最大限度地减少这些提取所产生的所得税：


    *   首先从应税账户提取资金，从而尽可能减少您未来的税单。

    *   其次，从延税退休账户中提取资金，例如传统的可扣除个人退休账户（IRA），该账户从 70 岁零 6 个月开始适用`RMD`要求。

    *   最后，动用罗斯个人退休账户（Roth IRA）的资金，因为从这些账户进行的合格分配无需缴税。


    总结一下规划退休财务需求的过程：在您的投资组合中保持 60%股票和 40%债券及现金或现金等价物的恒定配置，并按照应税、延税和罗斯个人退休账户的顺序，每年仅从该投资组合中提取
    4.5%的实际收益率。如果您遵循此规则，那么您有很高的概率（大约 90%）不会花完为退休储蓄的钱。


    现在，让我们转向退休规划的其他非财务方面，例如您将在哪里居住以及如何度过一个丰盛的退休生活。


    # 退休生活方式需求规划


    既然您已经决定了如何为退休提供资金，您就需要考虑退休期间将在哪里居住以及做些什么。对于许多退休人员来说，选择居住地相当简单：他们继续住在退休前购买的房子里。但关于居住地，您有许多选择，包括您将居住的设施类型，稍后会讨论。然而，退休后要做什么则更为复杂。


    许多工作了 35 到 40 年的新退休人员，在退休后需要找到新的身份定位。这并不容易。当您在工作和思考退休时，大多数普通熟人首先会问您停止工作后打算做什么。本章的一部分内容旨在帮助您退休后回答这个问题。


    ## 退休人员的住房选择


    新退休人员至少有 11 种住房选择：


    *   独栋住宅

    *   联排别墅

    *   公寓

    *   出租公寓

    *   与一个或多个子女同住

    *   独立生活社区

    *   辅助生活社区

    *   记忆护理单元

    *   持续护理退休社区（CCRCs）

    *   专业护理机构

    *   传统养老院


    最近，这份选择清单中又增加了几种住房类型，包括排屋和阁楼公寓，但这些可能更吸引您的子女或年轻一代。

    '
- fmt: '### Single-Family Dwellings


    Many members of the baby boomer generation grew up with plentiful single-family
    dwelling choices, many of which could be found in planned communities. As boomers
    have advanced in their careers, they have typically purchased larger and more
    expensive houses.


    Upon retirement, at least some boomers—particularly those with children who are
    now independent—wish to downsize their homes, meaning they seek smaller and less
    expensive ones. Builders are well aware of this trend and are attempting to meet
    the lifestyle needs of retirees looking to downsize. This strategy may permit
    boomers and other newly retired individuals to access the equity in their homes,
    which are typically the single largest financial asset they own. If they are lucky
    enough to receive sufficient funds for this equity, boomers may even be able to
    pay off their mortgages, one of the financial keys to a prosperous retirement.


    As a retiree, if you choose to remain in a single-family dwelling during retirement,
    you should determine where you want to live. In addition to the choice of the
    subdivision or community where you will buy, you must also decide in which region
    of the country and state you would like to live. These decisions are often relatively
    easy to make, because retirees generally choose to live close to one or more of
    their children and grandchildren. You should also consider the income-tax status
    of the state you choose. Some states, notably Florida, Texas, and Arizona, do
    not have state income taxes, which contributes to their allure as retirement havens.
    Others, including California and New York, are known for relatively high state
    income taxes. Still others, such as Colorado, provide partial exclusions for income
    derived from pensions. If the tax implications of where you live are important
    to you (remember, inflation and taxes are the two biggest threats to your accumulated
    wealth), you should consider carefully the state in which you will live during
    retirement.


    If you wish to live in a single-family dwelling, even one you have downsized to,
    you should be aware that you will need to continue maintaining and improving that
    dwelling. As you advance in age, depending on your health, this may become a burden.
    If you are unable to maintain your home, you will have to call on your children
    for help (if they live close by) or pay someone to do certain necessary daily
    and weekly chores. The next two options—town homes and condominiums—may provide
    a resolution to this problem.


    ### Town Homes


    According to Webster’s dictionary, a town home is “usually a single-family dwelling
    of two or three stories that is connected to a similar house by a common sidewall,
    thus forming a continuous group.” The town-home owner also owns the land on which
    the town home sits. In essence, this means a purchaser of a town home owns their
    own individual unit but may be surrounded on both sides or above and below by
    other owners.


    Residing in a town home may not be how you envision retirement living, but if
    it is, be aware that, unlike with an apartment, you own rather than rent. If you
    have a mortgage on your town home, you are entitled to deduct the interest on
    that mortgage for tax purposes, just as a single-family dwelling owner can. Town-home
    owners also typically pay a monthly maintenance fee to a homeowner’s association.
    The amount of this fee varies greatly, depending on the location and quality of
    the property, but it usually covers maintenance of the common areas of the development.
    A town home is appropriate for a retiree who does not want the burden of property
    maintenance and does not mind living closely with multiple neighbors.


    ### Condominiums


    Condominiums are much like town homes, with two significant differences: the owner
    owns not only their individual unit, but also an additional percentage of the
    surrounding property; and the condo unit may be on any floor, not just from the
    ground up. The condo owner does not own the ground on which the condo is located.
    Furthermore, because they own an additional percentage of the surrounding property
    of their condo, condo owners typically face more homeowner restrictions than do
    town-home owners.


    As with town homes, condo owners have to pay a monthly maintenance fee, although
    this fee may cover more property-maintenance and upkeep features. For example,
    balcony and patio repair may be covered by fee payments made by condo owners,
    whereas town-home owners may have to pay for these repairs themselves. As such,
    condos are best for retirees who want others to maintain the exterior of their
    property and reside and interact with other owners.


    ### Apartments


    Apartments may be thought of in several ways for retirees (for instance, retirees
    may reside in apartments in independent-living, assisted-living, or continuing-care
    facilities), but the important feature to understand is that the apartment dweller
    usually rents rather than owns. As such, you are not entitled to favorable income-tax
    treatment, such as being able to deduct any portion of your rent as an itemized
    deduction. Most renters take advantage of the standard deduction and do not itemize
    their deductions when they file their tax returns.


    ### Living with One or More of Your Children


    For many retirees, living with one or more of their children is the least favorable
    of all the housing options. However, whether because of poor health or lack of
    funds, they often have no other choice. If you live with one or more of your children,
    try not to be a burden to them. Help out around the house and offer to pay your
    fair share of the rent or mortgage. If you are in poor health, make sure your
    child can adequately attend to your daily needs. If your son or daughter works,
    they may not be able to care for you, so you might want to consider investigating
    the option of adult day care.


    Another frequently overlooked consequence of living with your child is that, if
    the child is married, their spouse must also approve of your residing in the house
    or apartment. Many marriages of adult children can be strained (some to the point
    of divorce) if the child and their spouse do not agree on how to take care of
    the parent.


    ### Independent-Living Communities


    Independent-living communities are designed for retirees who are fully capable
    of attending to their daily living needs without assistance. Usually, an independent-living
    community is age-restricted and may even be gated or feature restricted entry.
    Sometimes, considerable amenities, such as the use of golf courses and tennis
    courts, may be offered in exchange for the payment of homeowner’s fees by community
    residents. Homeowner’s fees also generally cover lawn service. Accommodations
    include single-family dwellings, town homes, and apartments.'
