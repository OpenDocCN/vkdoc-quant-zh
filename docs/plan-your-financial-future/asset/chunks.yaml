    *   Accumulate wealth through investments.

    *   Defend that wealth through prudent income-tax planning and management.

    *   Distribute that wealth for your retirement and as part of your estate at death.


    First, however, because of their importance in the overall financial-planning
    process as the “engine” in generating substantial wealth, we need to spend some
    time discussing investments and investment strategies. This begins with the need
    for a well-thought-out investment policy statement.


    ## The Need for an Investment Policy Statement


    Many planners refer to the investment policy statement (IPS) as the third mandatory
    personal financial statement (in addition to the statement of personal financial
    position and the cash-flow statement discussed in Chapter [1](#A314864_2_En_1_Chapter.html)).
    The IPS helps the investor specify realistic investment goals while also forcing
    them to consider the risks and costs of investing. For example, specifying that
    you wish to obtain an average 15 percent annual rate of return on an investment
    in an individual stock begs the question of whether you also expect the stock
    to increase in price by this same amount consistently every year. If so, you need
    to engage in a reality check! Such thinking ignores the risk of stock investing,
    because the market price of stocks can fluctuate dramatically from year to year.
    This is known as volatility , which you need to understand and accept as a risk
    prior to investing in the stock market.


    Any well-developed investment policy statement has four basic sections. With allowances
    for the specific wording of any customized statement, these sections are as follows:


    *   Statement of the investor’s objectives

    *   Statement of investor constraints or limitations

    *   Meeting the investor’s objectives and allocation of investment resources

    *   Monitoring the performance of the investment plan'
  trans: '

    # 下一章将探讨个人财务规划与财富管理流程。财富管理是个人财务规划的延伸，专注于高收入和高净值客户。财富管理还强调财务规划中的投资过程，因为高收入客户通常比中等收入投资者拥有更多的可支配收入。本书旨在向你展示如何通过增加当前财富来达到更高净值个人的地位。


    # 3. 个人财务规划与财富管理流程的要素


    学术研究表明，遵循财务计划比不遵循计划能更快地积累财富。这是因为财务计划强制自律，而自律正是未来任何财富积累的关键。年收入在 5 万至 10 万美元之间且遵循财务计划的人，其储蓄额通常是同收入阶层但没有财务计划的人的两倍。对于那些年收入超过
    10 万美元且遵循财务计划的人来说，其储蓄率比同龄人高出约 60%。显然，坚持某种形式的财务计划——无论是书面的，还是非正式地使储蓄习惯与预定财务目标相匹配——都具有显著优势。说到底：你必须说服自己有理由去储蓄，否则很可能就不会这么做。本书的目的之一就是为你提供这些理由。


    ## 个人财务规划与财富管理


    个人财务规划这一职业有着一段有趣且颇为复杂的历史。尽管财务规划始终是关于确定个人能否以及如何通过妥善管理财务资源来实现其财务目标的过程，但规划师有时会偏离正轨，过分关注定义中的“资源”部分，而忽略了“过程”部分。换句话说，那些用于实施规划过程所必需的金融产品——例如一只诱人的股票或最新的保险产品——反而成了主导。


    另一种情况是，一些财务规划师更倾向于将自己视为财富构建者或财富管理者，以将自己与业务的产品方区分开来，并希望能吸引收入或净值更高的客户。在个人财务规划过程中，没有哪门学科比其他学科更重要，但那些主要将自己视为财富构建者的规划师，往往更强调投资选择和投资管理。因此，这些规划师只愿意与高净值客户合作，并设定最低可投资资产额度（通常为几十万甚至上百万美元），这些资产可以立即投入资本市场运作。但财富管理者和财务规划师实际上是从同一个起点出发的：客户的财务目标。只是客户为实现目标所能调用的财务资源数量，区分了财务规划师与财富构建者或财富管理者。


    无论这些财务专业人士更倾向于将自己视为财富管理者还是规划师，他们通常为客户提供六大主要服务：


    *   保险与风险管理

    *   员工福利（通常简称为附加福利）

    *   投资

    *   所得税规划与管理

    *   退休规划

    *   遗产规划


    我建议你使用这些通用类别来审视和回顾自己的财务生活。请记住，每个领域内都有许多问题需要处理。确定自己在每个类别中的状况，可能有助于你开始进行记录保存。此外，专业的财务规划师会围绕这些领域展开工作，有些还会在其中一个或多个领域展现出专长。


    我列出财务规划这些通用领域的顺序是否重要？从思考财务生活的角度来看，是的，很重要！你的就业状况决定了你是否需要考虑员工福利，但请将这些福利视为一个临时的安全网，你可以用它来保护自己的财务健康。当你换工作时，这些福利可能可以转移，也可能不可以转移（很可能不可转移）。这就是为什么最好建立一个永久性的安全网，它由你自己购买的个人人寿保险和其他福利构成，旨在伴随你一生，无论你的就业状况如何。由于临时和永久性福利主要是为了提供对未来潜在财务损失的保护，因此在财务规划过程中，它们应被顺次视为首要考虑因素。


    PADD 财富构建与管理方法将个人财务规划的通用类别置于一个现实生活情境中，可作为实现财务独立的蓝图：


    *   保护（Protect）自己免受灾难性财务损失的风险。

    *   通过投资积累（Accumulate）财富。

    *   通过审慎的所得税规划与管理来捍卫（Defend）财富。

    *   将财富用于退休以及在去世后作为遗产的一部分进行分配（Distribute）。


    然而，首先，由于投资在整体财务规划过程中作为创造巨额财富的“引擎”具有重要性，我们需要花些时间讨论投资和投资策略。这始于一份深思熟虑的投资政策声明的必要性。


    ## 投资政策声明的必要性


    许多规划师将投资政策声明（`IPS`）称为第三份强制性个人财务报表（除了第 1 章中讨论的个人财务状况表和现金流量表之外）。`IPS` 帮助投资者设定切合实际的投资目标，同时迫使他们考虑投资的风险和成本。例如，指定你希望从对某只个股的投资中获得平均每年
    15%的回报率，这就引出了一个问题：你是否也期望该股票每年价格都能稳定上涨同样的幅度？如果是这样，你需要进行现实检验！这种想法忽视了股票投资的风险，因为股票的市场价格每年都可能剧烈波动。这就是所谓的波动性，你需要理解并接受这是投资股市前的一种风险。


    任何完善的`投资政策声明`都包含四个基本部分。考虑到定制声明的具体措辞，这些部分如下：


    *   投资者目标陈述

    *   投资者约束或限制陈述

    *   实现投资者目标与投资资源分配

    *   监控投资计划的绩效

