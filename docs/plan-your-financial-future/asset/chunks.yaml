  trans: '

    ### 商业房地产


    通常，考虑到投资风险，只有经验丰富的投资者才会购买商业房地产。因此，您可能希望完全避开此类投资机会。然而，如果您确实希望投资商业地产，很可能是出于以下两个原因之一：获取年度收入，或在最终出售前持有此类房产以期获得资本增值。


    大多数参与商业房地产市场的投资者都是为了创收，因为投资土地的主要原因之一是实现资本增值。如果您希望通过商业地产获取收入，首先需要确定为其支付多少金额。幸运的是，您可以使用一种相对简单的计算方式，即净营业收入（`NOI`）公式。`NOI`的计算公式如下（如果您聘请评估师协助做出投资决策，评估师可能会为您计算`NOI`）：


    *   物业的总租金收入

    *   + 物业的非租金或其他额外收入

    *   = 潜在总收入

    *   – 空置及租金收取损失

    *   = 有效总收入

    *   – 运营费用（不含利息和折旧）

    *   = 净营业收入（`NOI`）


    由于`NOI`是商业地产的现金流计算，因此您为购买该物业而产生的任何融资费用（如贷款利息）以及税务相关费用（如折旧）都不会计入该计算。


    一旦您或您的评估师计算出商业地产的`NOI`，您需要将其除以当前的市场资本化率（资本化率），以确定您应为该物业支付多少金额。这个资本化率并不容易确定，但可以将其视为您希望从该物业获得的年复利回报率。它也是该物业收回投资成本所需年数的倒数。例如，标准资本化率为
    12%，意味着您希望在略高于 8 年的时间内收回初始投资（100 除以 12 等于 8.33 年）。同样，若希望从该物业获得 20%的回报率，则需在 5 年内收回初始购买价格（100
    除以 20 等于 5）。当然，请记住，在后一种情况下，您采取了更激进的策略，因此与 12%的资本化率相比，采用 20%的资本化率意味着您的初始投资面临更高的风险。


    ### 未开发土地


    马克·吐温有句名言：“买地吧，因为土地不再是造的了。”这句话没错，但对于试图决定在哪里购买土地的投资者来说，它并没有提供太多指导。最有价值的土地或未开发房地产，很可能是指毗邻已开发或即将开发的住宅或商业地产的土地。鉴于其“最高最佳用途”已不再是农田、草地或其他闲置土地，邻近物业很可能会在不久后也被开发。因此，当您随后出售这块土地时，很可能获得可观的资本增值。


    不过，请记住，购买任何未开发土地都伴随着一些重大的投资风险。这些风险包括：


    *   土地可能被重新划分用途，产生不利影响。例如，为住宅开发目的购买的土地，可能会被市或县重新规划为商业用途。

    *   您可能无法从县、市或镇获得按您（或开发商）的意图在该土地上建造建筑的许可证。

    *   通往您土地的通道可能会受到相邻土地所有者财产或财产权的限制。

    *   您所预期的该区域人口增长可能不会发生。


    因此，许多对未开发土地的投资风险极高。如果您借款购买土地（即所谓的杠杆投资），您必须找到一种方式，利用除原始购买之外的收入或资产来偿还债务。否则，您将被迫在计划时间之前很久就出售这块土地。


    ## 房地产的间接投资


    间接投资房地产有两种基本方式：作为有限合伙人持有房地产有限合伙（`RELP`）的权益，或作为股东持有房地产投资信托基金（`REIT`）。我们先来看`REIT`，因为它通常是这两种投资中更具市场流动性的一种。


    ### 房地产投资信托基金


    `REIT`类似于共同基金，但其份额并不总是按资产净值（`NAV`）计价。相反，它们在公开交易所交易，价格相对于`NAV`存在溢价或折价。在大多数情况下，`REIT`投资于能产生收入的房地产物业，例如公寓楼、购物中心、写字楼园区、酒店以及（越来越普遍的）退休社区。一些被称为抵押型`REIT`的基金，也投资于房地产项目的融资。


    只要`REIT`实体每年将其年度收入的至少 90%分配给股东，就无需缴纳联邦所得税。因此，许多`REIT`将其年度收入的 100%分配给股东。然后由股东对收到的股息（类似于股票或股票型共同基金）以及任何转嫁的资本利得缴纳税款。根据之前的税法，`REIT`股息通常不被视为合格股息，这意味着它们没有资格享受优惠的长期资本利得税率。因此，此类股息可能按之前最高
    39.6%的边际税率征税。然而，根据 2017 年的《减税与就业法案》（`TCJA`），对于有资格享受 20%“穿透扣除”的个人投资者，此类股息的实际税率降至
    29.6%（新的最高边际税率 37%乘以 80%）。因此，许多纳税人获得`REIT`股息的吸引力应该会增加。


    `REIT`份额的价格走势与典型股票或股票型共同基金的价格走势之间相关性相对较低。因此，对于潜在投资者而言，其主要优势在于有机会通过购买`REIT`来进一步分散投资组合。`REIT`的其他优势包括：


    *   相对稳定的股息收入

    *   高股息收益率

    *   实现显著资本增值的可能性

    *   流动性

    *   获得专业物业管理服务


    `REIT`的长期总回报率（定义为股息收入加上基础房地产投资的资本增值）可能低于表现优异、风险较高的成长型股票，但高于风险较低的投资级债券的回报率。


    在您投资`REIT`（例如，相对于投资共同基金）之前，必须首先确定您希望投资房地产物业。然后，您必须决定希望以何种方式投资这些物业——是直接还是间接投资。如果您决定以`REIT`的形式进行间接投资，您需要决定是投资于公开交易的`REIT`还是非公开交易的`REIT`。


    最后，您应该投资哪种类型的`REIT`？共有三种类型：


    *   **权益型`REIT`**：通常收购能产生收入的房地产物业。

    *   **抵押型`REIT`**：提供建筑贷款，或以其他方式投资于房地产项目的融资。

    *   **混合型`REIT`**：既拥有物业，也提供融资贷款。


    一般来说，抵押型`REIT`的风险略高于权益型`REIT`，因为抵押型`REIT`没有已建成的物业来为投资者产生稳定的收入流。然而，您从抵押型`REIT`获得的最终回报率可能会高于权益型`REIT`。

    '
- fmt: '### Real Estate Limited Partnerships


    如果你想要一种高风险、能产生收入且有可能获得高回报的房地产投资，那么购买`RELP`的权益可能适合你。`RELP`通常被构建为一种房地产联合组织，由一个或多个普通合伙人或房地产开发商作为普通合伙人，以及其他投资者作为有限合伙人。有限合伙人对房地产投资的管理或控制，以及对相关地产何时出售，没有发言权。


    与`REIT`不同，`RELP`允许将亏损转嫁给其有限合伙人投资者。然而，由于一系列被称为“被动活动规则”的所得税规定，你作为有限合伙人投资者，是否能在年度所得税申报表中申报这笔亏损是存疑的。通常，在普通合伙人或联合组织者出售产生亏损的合伙地产之前，你无法申报这笔亏损——并且请注意，作为有限合伙人，你无法合法地强迫他们这样做。


    `RELP`通常不是一个公开交易实体，因此，要以接近你购买成本的价格变现你的权益即使不是不可能，也是相当困难的。一些`RELP`以“业主有限合伙”（`MLP`）的形式组织并进行公开交易，但交易量很小，并且税法通常会限制你在所得税申报表中申报任何亏损。因此，在`RELP`中持有的权益通常既缺乏流动性，又相对难以销售。


    那么，为什么要投资`RELP`？你这样做几乎总是因为你想要收入，并且相信联合组织者有能力通过开发和销售相关地产来获得可观的利润。此外，你能够以相对较少的资金投资于商业和住宅房地产，并且作为债权人，你的潜在责任仅限于你的投资金额。


    ### 房地产投资中杠杆的运用


    杠杆的财务概念是指使用借入资金来增加你在房地产投资上的利润。这个概念也可以用于金融资产，最显著的是通过使用保证金（从经纪人那里借钱购买更多股票），但实物资产常被提及的优点之一就是能够有效运用杠杆。


    例如，假设你直接投资了`$100,000`在一处住宅房地产上。进一步假设该房地产位于黄金地段，并以每年`10%`的速度增值。在第一年年底，你的投资增长到`$110,000`，在第二年年底，该房产价值`$121,000`。你在这处房产上赚取了`$21,000`的利润。现在，假设你用`$100,000`作为首付购买了一块价值`$500,000`的住宅地块，并向银行以低利率借入了剩余的`$400,000`。同样，该房产以每年`10%`的速度增值。然而，这次在第一年年底，你的投资增长到`$550,000`，在第二年年底，该房产价值`$605,000`。因此，你的美元利润从`$21,000`增加到了`$84,000`（`$105,000`减去`$21,000`）。这是你原始利润的四倍，或者说在计算你需要向银行支付的借入资金的本金和利率之前，总回报率为`400%`。


    你作为房地产投资者如何将杠杆概念付诸实践？你应该在那些未来几年有很强增值可能性的房产上支付最低首付。通常，对于除购买主要住宅以外的任何房地产购买，银行会要求你至少支付初始投资的`20%`作为首付。如果你能找到一家银行允许你支付更低的首付，并且你相对确定你感兴趣的房产将会升值，那么你应该能够理解使用他人的钱来积累财富的好处。这就是杠杆！


    然而，请注意，如果房产价值下跌，杠杆也会放大你的美元损失。使用之前的两个例子，如果没有使用杠杆，两年后你最终会损失`$19,000`。因为你处理的是住宅租赁房产，根据你第二年年底的调整后总收入，你也许能够、也许不能在纳税申报表中申报全部亏损。另一方面，如果你使用了杠杆，你的损失将是`$95,000`，相差`$76,000`（`$95,000`减去`$19,000`）。无论你的调整后总收入是多少，你肯定无法为了所得税目的而承担全部亏损，因为在任何给定年份，你的申报额上限为`$25,000`。此外，你仍然需要向银行支付两年期间贷款产生的任何利息。


    总而言之，如果你打算运用杠杆，请远离那些位于不太理想地区的、有问题的房产购买！正如第[1](#A314864_2_En_1_Chapter.html)章所提到的，既有良性债务也有不良债务。不良债务是在预期投资时间范围内可能贬值的房产所产生的任何债务。杠杆的滥用一再证明了这一论断的正确性。


    ### 相关性


    在金融领域，相关性衡量的是两种投资资产之间关系的方向和程度。然而，你也可以利用这个概念来分散你的投资组合并积累财富。


    相关性是如何运作的？`+1.0`的相关性意味着两种资产完全同向变动，而`-1.0`的相关性意味着两种资产完全反向变动——当一个上涨时，另一个下跌。与此同时，`0.0`的相关性意味着两种资产之间完全没有关系——它们彼此独立变动。


    以下列表显示了从`1965`年到`2012`年（这个时间段涵盖了无数的市场周期）各种金融资产类别和房地产与标普`500`指数股票的相关性：


    *   美国大盘股：`0.96`

    *   发达国际股票：`0.90`

    *   新兴市场国际股票：`0.82`

    *   大宗商品：`0.50`

    *   黄金：`0.10`

    *   美国国债：`–0.30`

    *   美元：`–0.60`


    这些数据来自沃顿商学院著名金融学教授兼投资评论员杰里米·西格尔。


    一个多元化的投资组合由低正相关性资产或（理想情况下）负相关性资产组成。从历史情况来看，黄金一直是一个很好的分散化工具。然而，近年来，另一个历史上良好的分散化工具——国际股票——与美国大盘股的联系变得更加紧密。相比之下，房地产，特别是美国`REITs`，其相关性有所下降——从此前的`0.52`降至`0.40`（来源：美国房地产投资信托协会，或称`Nareit`，根据其网站）。'
  raw: '### Real Estate Limited Partnerships


    If you want a high-risk, income-generating, real-estate investment with the possibility
    of a high return, purchasing an interest in a RELP may be for you. A RELP is most
    commonly structured as a real-estate syndication with one or more general partners
    or real-estate developers and other investors as limited partners. The limited
    partners have no say in the management or control of the real property investments
    or in when the underlying properties may be sold.


    Unlike a REIT, a RELP is permitted to pass on losses to its limited partner investors.
    However, because of a series of income-tax rules known as the passive activity
    rules, it is doubtful that you, as a limited partner investor, can claim this
    loss on your annual income-tax return. Typically, you cannot claim this loss until
    the general partner or syndicator sells the partnership property that has generated
    the loss—and be aware that, as a limited partner, you cannot legally force them
    to do so.


    A RELP usually is not a publicly traded entity, so cashing in your interest at
    something close to what you paid for it is difficult, if not impossible. Some
    RELPs are organized and publicly traded in the form of master limited partnerships
    (MLPs), but the trading is thin, and tax rules generally restrict the claiming
    of any losses on your income-tax return. Thus, an interest held in a RELP is generally
    both illiquid and relatively unmarketable.


    So why invest in a RELP ? You would do so almost always because you want income
    and believe in the ability of the syndicator to develop and sell the underlying
    real properties for a significant profit. In addition, you are able to invest
    in commercial and residential real-estate properties for a relatively small amount
    and are limited in your potential liability as a creditor only to the extent of
    your investment.


    ## The Use of Leverage in Real-Estate Investing


    The financial concept of leveraging is the use of borrowed money to increase your
    profit on a real-estate investment. The concept may also be used with financial
    assets, most notably through the use of margin (borrowing money from your broker
    to purchase more stock), but one of the oft-cited advantages of real assets is
    the ability to employ leverage effectively.


    For example, assume that you have directly invested $100,000 in a residential
    real-estate property. Further, assume that this real estate is in a good location
    and appreciates at a rate of 10 percent annually. At the end of year one, your
    investment has grown to $110,000, and at the end of year two, the property is
    worth $121,000\. You have earned a $21,000 profit in the property. Now let’s assume
    that you have put down $100,000 on a $500,000 tract of residential real property
    and have borrowed the remaining $400,000 from a bank at a low interest rate. Again,
    the property appreciates at the rate of 10 percent annually. Now, however, at
    the end of year one, your investment has grown to $550,000, and at the end of
    year two, the property is worth $605,000\. Thus you have increased your dollar
    profit from $21,000 to $84,000 ($105,000 less $21,000). That is four times your
    original profit, or a total percentage return of 400 percent before figuring in
    the dollars and percentage rate you have to pay to the bank for borrowing the
    money.


    How do you put the concept of leveraging into practice as a real-estate investor?
    You do this by putting the minimum down on real property that has a strong likelihood
    of appreciating in future years. Generally, on any real-estate purchase other
    than primary home purchases, the bank will ask you to put down at least 20 percent
    on the initial investment. If you can find a bank that will let you put down less,
    and you are relatively sure that the property you are interested in will go up
    in value, you should be able to understand the benefits of using someone else’s
    money to accumulate wealth. That is leverage!


    However, be aware that leveraging also compounds your dollar loss if the property
    goes down in value. Using the previous two examples, if leverage is not used,
    you end up with a $19,000 loss after two years. Because you are dealing with residential
    rental property, you may or may not be able to claim all of that loss on your
    tax return, depending on your AGI at the end of year two. If you used leverage,
    on the other hand, your loss is $95,000, a difference of $76,000 ($95,000 less
    $19,000). Regardless of your AGI, you definitely cannot take all of that loss
    for income-tax purposes, because you are limited to no more than $25,000 in any
    given year. In addition, you still have to pay the bank for any interest incurred
    on the loan during the two years.


    In summary, if you are going to employ leverage, stay away from purchasing questionable
    properties in less-than-desirable areas! As mentioned in Chapter [1](#A314864_2_En_1_Chapter.html),
    there is both good debt and bad debt. Bad debt is any debt incurred on property
    that is likely to depreciate in value over the anticipated time frame of the investment.
    The misuse of leveraging proves the truth of that statement many times over.


    ## Correlation


    In the financial world, correlation measures the direction and extent of a relationship
    between two investment assets. However, you can also use this concept to diversify
    your portfolio and accumulate wealth.


    How does correlation work? A correlation of +1.0 means two assets move exactly
    together in one direction, whereas a correlation of –1.0 means the two assets
    move in the exact opposite direction of each other— when one goes up, the other
    goes down. Meanwhile, a correlation of 0.0 means there is no relationship whatsoever
    between the two assets— they move independently of each other.


    The following list shows the correlations of various financial asset classes and
    real estate to the Standard & Poor’s index of 500 stocks for the time period extending
    from 1965 through 2012, a duration that encompasses numerous market cycles:


    *   Large-cap US stocks: 0.96

    *   Developed international stocks: 0.90

    *   Emerging-market international stocks: 0.82

    *   Commodities: 0.50

    *   Gold: 0.10

    *   US Treasury notes: –0.30

    *   US Dollar: –0.60


    These figures come from Jeremy Siegel, noted Wharton finance professor and investment
    commentator.


    A diversified portfolio is one that consists of low positively correlated assets,
    or, optimistically, negatively correlated assets. As has historically been the
    case, gold continues to be a good diversifier. However, in recent years, international
    stocks, another historically good diversifier, have become more interconnected
    with U.S. large cap stocks. In contrast, real estate, specifically US REITs, have
    declined in correlation—to 0.40 from a previous correlation of 0.52 (source: National
    Association of Real Estate Investment Trusts, or Nareit(per their website)).'
