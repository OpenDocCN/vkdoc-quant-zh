  trans: '

    # 医疗保险的便携性


    “医疗保险的便携性”这个说法其实有些名不副实。它并不意味着你可以将之前雇主的团体保单直接转到新雇主那里。然而，根据 HIPAA（健康保险携带与责任法案）的规定，只要你在团体保单下已投保达到规定时间，保险公司就不能拒绝为你提供保险，即使在此期间你患上了重病。具体来说，HIPAA
    规定，如果满足以下条件，新保险公司不得执行既往症条款：


    - 你在前雇主的健康保险计划中至少已参保 12 个月。

    - 自你失去前雇主计划保障以来，时间未超过 63 天。


    不过，同样地，随着奥巴马医改法案普遍禁止因既往症而拒绝任何人的保险，这些限制已变得不那么重要。


    你如何知道自己已失去了前雇主计划的保障？你的前雇主必须向你提供一份承保证明，上面列明你的保险期限以及你失去保障的日期。请务必保管好这份证明！如果你加入的新团体健康保险计划适用既往症除外条款，那么之前的承保证明通常能确保你免于此条款的限制。不幸的是，HIPAA
    并未对保费成本进行监管，因此无法保证你能负担得起法律赋予你的新保险！


    ## 联邦医疗保险与补充医疗保险


    联邦医疗保险（Medicare）是一项联邦政府健康保险计划，覆盖年满 65 岁的人群。历史上，联邦医疗保险由两大主要部分组成：A 部分，即住院保险；以及 B
    部分，即补充医疗保险。2003 年，国会通过了联邦医疗保险的第三大部分：D 部分，即处方药保险。D 部分于 2006 年 1 月 1 日全面生效，但与计划的
    A 部分和 B 部分不同，D 部分的保障并未包含在传统的联邦医疗保险计划中。相反，受益人必须从私营保险公司提供的数百种 D 部分计划中选择一种参保，美国政府则为这些保单提供保费补贴。


    联邦医疗保险 A 部分的保障对符合条件的参与者免费提供，涵盖四大类：


    - 最长 90 天的住院治疗。患者需支付前 60 天的自付额，60 天后至 90 天上限期间需支付共同保险金。

    - 专业护理福利。

    - 居家健康服务。

    - 为临终患者（定义为预期寿命六个月或更短的人）提供的临终关怀。


    联邦医疗保险 A 部分保障中最容易被误解的一点是，它不提供长期护理院的保障（在大多数长期护理保险保单中称为“监护护理”）。相反，它提供的是被称为“专业护理福利”的短期有限利益。虽然可能需要监护护理，但联邦医疗保险仅支付
    100 天的护理费用，且必须是在住院之后。值得注意的是，专业护理福利意味着患者必须在因严重疾病连续住院三天以上出院后的 30 天内，遵照医嘱入住专业护理机构。


    这就引出了一个问题：如何从经济上照顾需要持续护理的年迈父母？我们将在本章后面讨论长期护理替代方案时解决这个问题；但作为一个亲身与这个问题斗争过的人，这里有三个基本选择：


    - 你可以尝试自筹资金，使用自己或父母的钱。

    - 你可以调查你的父母是否仍有可能符合长期护理保险保单的承保条件。

    - 你可以尝试利用严格的条件，让父母符合医疗补助计划（Medicaid）的援助资格。


    实际问题在于，我们大多数人要么没有足够的钱来自筹护理费用，要么等待时间太长，以至于父母不再符合长期护理保单的资格或无力购买。因此，为自己或年迈父母购买长期护理保险单正日益成为健全财富管理的基石。


    与 A 部分不同，联邦医疗保险 B 部分的保障对参与者来说并非免费；相反，它要求被保险人每月支付特定的保费，并且是经过收入调查的，这意味着收入越高的人支付越高的保费。此外，被保险人还需要在任何日历年度内支付自付额，并对承保费用支付共同保险。目前，这一共同保险比例与大多数补偿性医疗保险计划的比例一致，即政府承担
    80%，被保险人承担 20%。你可以选择退出联邦医疗保险 B 部分，但在你有资格加入联邦医疗保险 A 部分时，你必须告知社会保障管理局（该局也管理联邦医疗保险），你不想参与
    B 部分。


    你大概可以理解，符合联邦医疗保险资格的个人可能承担着超出承保费用的大量医疗费用。正是为了报销这些超额费用，你（或你的父母）才应该购买一份联邦医疗保险补充健康保险单，俗称
    Medigap 保单。


    Medigap 保单包括 14 种补充保单，这些保单已由联邦立法标准化，并根据所提供的福利类型用字母 A 到 N 进行标识。（自 2010 年 6 月 1
    日起，E、H、I、J 计划已不再销售，但在此日期前购买的保单仍然有效。）通常，在购买 Medigap 保单之前，你必须同时拥有联邦医疗保险的 A 部分和 B
    部分保障。根据法律规定，老年人（此处定义为 65 岁及以上的个人）一次只能被销售一份 Medigap 保单。该保单必须在获得联邦医疗保险资格后的头六个月内接受所有申请人，无论其是否有任何既往症。Medigap
    保单可以通过多种公司和组织获得，包括最受欢迎的来源——总部位于华盛顿特区的美国退休人员协会。


    老年人们可能还想考虑联邦医疗保险的第二种形式：联邦医疗保险优惠计划（Medicare Advantage plan）。这是一种由联邦政府补贴的私营保险，提供与联邦医疗保险相同的基本保障，但同时也包含
    Medigap 保单最重要的特征。联邦医疗保险优惠计划有两种类型：包含管理式护理计划属性的计划，以及私人按服务收费计划（或 PFFS 计划），其特点是开放获取医疗服务提供者且限制极少。PFFS
    计划目前是替代性联邦医疗保险覆盖中增长最快的类型，并依据 1965 年《联邦医疗保险法》C 部分提供。

    '
- fmt: "# The Importance of Long-Term Care Insurance in Protecting Your Wealth\n\n\
    The need for long-term care can mean different things to different people, but\
    \ generally it results from any chronic or disabling condition that requires nursing-home\
    \ care or constant medical supervision. Long-term care insurance policy provisions\
    \ cover not only care in a nursing-home facility, but also nursing care in your\
    \ own home. Payment for care received in your own home is the number one reason\
    \ you may want to consider purchasing a long-term care insurance policy for yourself\
    \ or your parent.\n\nLong-term care is expensive, no matter where you or your\
    \ aging parent resides, and most people cannot afford to cover the cost of this\
    \ care for long. For example, the average cost of a nursing home for a private\
    \ room in the United States in 2018 is approximately $96,000 per year—and it may\
    \ be considerably higher, depending on the level of care received and the location\
    \ of the nursing home. Fortunately, the average stay in a nursing home is less\
    \ than three years (2.7 years, to be exact), but this is the average. You or your\
    \ parent may reside in such a home for much longer than three years, sometimes\
    \ even as long as 15 to 20 years. You should keep this statistic in mind when\
    \ deciding how long a benefit period you wish to purchase as part of a long-term\
    \ care policy. As a general rule, the greater the benefit period, the higher the\
    \ long-term care insurance policy premium.\n\nSince 1996, when the `HIPAA` legislation\
    \ was passed, most long-term care policies have been issued as qualified policies.\
    \ Although the primary advantages of a qualified long-term care policy are the\
    \ accompanying income-tax benefits, another real advantage is the fact that it\
    \ must be guaranteed renewable. This means you have the right to continue the\
    \ policy for as long as the premiums are paid. Thus, the insurance company cannot\
    \ cancel the policy if your health declines, nor can it increase the policy premiums,\
    \ unless it does so for all members of the same class of insureds covered by the\
    \ policy. In addition, long-term care policies may be issued on a noncancellable\
    \ basis, meaning they must have a fixed, guaranteed level premium throughout your\
    \ lifetime. However, given the rapidly increasing cost of providing long-term\
    \ care, no insurance company is currently underwriting a policy for which the\
    \ premiums cannot be increased. Indeed, in recent years, some big insurance companies,\
    \ such as Met Life, have stopped underwriting long-term care insurance entirely!\n\
    \nIf a long-term care policy is tax-qualified, premiums paid by the policyholder\
    \ are deductible as itemized medical expenses up to a dollar limit that depends\
    \ on the policy owner’s age. Also, benefits paid from a qualified policy are income-tax-free\
    \ without limit. If an employer pays for long-term care insurance coverage for\
    \ its employees (a group long-term care policy), the premiums are tax-deductible\
    \ to the employer and are not considered to be taxable income to the employee.\n\
    \n**Note**\n\nA non-tax-qualified form of long-term care policy also exists that\
    \ does not provide any tax advantages. However, nonqualified plans require only\
    \ “medical necessity” as an acceptable condition to be eligible for benefits,\
    \ whereas tax-qualified plans require “the failure to perform certain activities\
    \ of daily living (ADLs)” for benefit eligibility.\n\nFrom an income-tax standpoint,\
    \ it has just been mentioned that qualified long-term care premiums are deductible\
    \ as medical expenses within certain limits. What is this limitation? Specifically,\
    \ all medical expenses are deductible only to the extent that they exceed 7.5\
    \ percent of AGI floor effective only for 2018; beginning in 2019, goes back to\
    \ 10 percent of AGI floor. This means that you probably will not be able to deduct\
    \ the premium until after you enter a nursing home and begin incurring substantial\
    \ medical expenses. The primary advantage the policy affords you is the income-tax-free\
    \ nature of the benefits paid. Remember, though, that most long-term care benefits\
    \ received are likely to be paid in reimbursement of medical expenses and therefore\
    \ are not subject to income tax under current law.\n\nEight basic types of coverage\
    \ are afforded by a qualified long-term care policy, only a few of which (such\
    \ as skilled nursing care) are covered under Medicare. Even so, the qualifying\
    \ conditions under the policy are likely to be much more favorable than those\
    \ under Medicare law. In addition, as mentioned, the major benefit of custodial\
    \ care coverage in a long-term care policy is not included among Medicare coverage\
    \ provisions. The basic types of long-term coverage (in order of level of care)\
    \ are as follows:\n\n*   **Skilled nursing care**: This is the highest level of\
    \ medical care available and is provided in traditional nursing homes on a daily\
    \ basis, typically to those individuals recovering from a severe life-threatening\
    \ illness such as a stroke. Such rehabilitative care has to be given at the direction\
    \ of a physician.\n*   **Memory care**: Arguably, this is as high a level of care\
    \ as skilled nursing care. Memory care is specialized care for those with severe\
    \ dementia, Alzheimer’s disease, and other forms of brain-related memory conditions.\
    \ Such care is typically provided in an assisted-living environment.\n*   **Intermediate\
    \ nursing care**: This is similar to skilled nursing care, except that the care\
    \ is provided only occasionally and not on a daily basis.\n*   **Custodial care**:\
    \ This is traditional nursing-home care and does not have to be ordered by a physician.\
    \ It is provided to individuals with a chronic health condition that does not\
    \ permit them to take care of themselves.\n*   **Assisted living**: These are\
    \ facilities that provide apartment-style housing (often including meals) and\
    \ support services for individuals who need only intermittent assistance with\
    \ the tasks of daily living.\n*   **Home health care**: This is care that allows\
    \ the patient to remain at home and receive part-time skilled nursing care or\
    \ other rehabilitative assistance.\n*   **Hospice care**: This is care for terminally\
    \ ill patients (generally, within six months of expected date of death) and may\
    \ be administered daily or less frequently. The care usually occurs at the patient’s\
    \ home, but it may also be delivered at a hospice care center.\n*   **Adult day\
    \ care**: This care is provided for persons who need assistance and supervision\
    \ during the day at home and whose spouse or family members work outside the home.\n\
    \nMost long-term care policies have two criteria that must be met before benefits\
    \ are payable. The insured must meet either one of these two criteria:\n\n1. \
    \ The insured must be chronically ill as defined in the policy. Chronically ill\
    \ is defined as being unable to perform, without substantial assistance, two of\
    \ the six activities of daily living (ADLs) for at least 90 days. The six ADLs\
    \ are as follows:\n    *   Eating\n    *   Bathing\n    *   Dressing\n    *  \
    \ Transferring from bed to chair\n    *   Using the toilet\n    *   Maintaining\
    \ continence\n2.  Substantial services are required to protect the insured from\
    \ threats to health and safety because of brain damage resulting from, for example,\
    \ strokes, dementia, or Alzheimer’s disease."
