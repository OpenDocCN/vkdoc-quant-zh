- fmt: '# Financial or Real Assets: Which Are Better?


    A great amount of wealth has been created (the accumulation part of the PADD process)
    by individuals investing in financial and real assets. Nevertheless, this process
    is not a zero-sum game. The wealth-accumulation techniques involved with each
    type of asset are not mutually exclusive.


    Some investors prefer to invest in either financial assets or real assets, but
    not both. The general reason is that those investors are investing in assets they
    understand (or someone has convinced them they understand), or they are comfortable
    with only one of the two general categories of assets. If you understand your
    ability to assume differing amounts of risk, however, you may wish to invest in
    both financial and real assets. History has shown that adding real assets to a
    predominantly financial portfolio improves diversification and reduces overall
    risk. Remember: the goal of wealth accumulation is not only to achieve as great
    an annual percentage of return as possible, but also to do so with as little risk
    as possible! As such, you might consider investing in real-estate investments
    that look more like financial investments (for example, a `REIT` is a mutual fund
    that invests in real estate and real-estate properties). Alternatively, you can
    invest in securities issued by real-estate development companies and home builders.


    Regardless of whether you decide to invest solely in financial assets, solely
    in real assets, or in both, do not forget this fundamental rule of investing:
    if you do not understand a potential investment, you should not be investing your
    hard-earned money in it! Prior to the most recent recession that began in December
    2007, some investors ignored this basic rule and piled money into exotic derivative
    investments, such as credit-default swaps, whose underlying risk they did not
    appreciate and whose complexities they did not understand.


    Now let’s move on to a topic of great interest to investors and noninvestors alike:
    how to buy a home and take best advantage of use assets in accumulating wealth.
    The effective management of use assets is the focus of the next chapter and concludes
    our look at the second step in the PADD process: techniques to accumulate wealth.
    After that, we take up the defense of that hard-earned wealth by using effective
    tax management.


    # Investing in Use Assets


    If you think back in the financial-planning process to when you first prepared
    your personal financial statement, you will notice that your home and automobile
    were properly listed as use assets and not as investments. Although a profit motive
    may attach to some use assets (particularly luxury automobiles or antique collectibles),
    generally such assets are purchased so you can make efficient and enjoyable use
    of them.


    ## Your Home as an Investment


    Your home likely means a lot of things to you, not the least of which is adequate
    and enjoyable shelter. Further, owning your own home is an integral part of the
    American Dream. One of the things your primary residence or home should not be,
    however, is an investment—or, as many baby boomers are relying on, a retirement-planning
    vehicle.


    As noted in Chapter [3](#A314864_2_En_3_Chapter.html), studies have shown that
    the average annual real rate of return on residential real estate is only 1.62
    percent after considering the costs of maintenance and improvement. Moreover,
    it is generally not good financial planning to have too much of your net worth
    tied up in any one asset, such as your home. We discussed in Chapter [9](#A314864_2_En_9_Chapter.html)
    and Chapter [10](#A314864_2_En_10_Chapter.html) the importance of diversification
    when investing in financial and real assets, yet millions of individuals now,
    and when they retire, will hold approximately 60 percent of their net worth in
    just one asset: the equity in their home.


    According to the *Wall Street Journal*, homeowners can easily spend up to three
    times the purchase price of a home in additional costs, such as mortgage interest,
    property taxes, and major home improvements. For example, today’s buyer of a $300,000
    single-family dwelling who finances with a 30-year fixed-rate mortgage will end
    up paying the price of the dwelling over again just in mortgage interest. Then
    add 30 years of property taxes, ongoing maintenance of the home, and several major
    home repairs or improvements, and the total cost of buying the home could approach
    $1 million.


    Does this mean you should not buy a home and should instead rent? No, not at all!
    Since the nationwide collapse of the housing market that began in 2007, and the
    subsequent historic reduction in mortgage rates, it is now less expensive in some
    parts of the country to buy than to rent. However, the cost of home ownership
    does argue for a new method of analyzing why you bought your home in the first
    place.


    A house is one of the few assets that does not violate the basic rule of debt
    management: go into debt only for an asset that is likely to appreciate in value.
    Notwithstanding the current housing crisis in many cities, over the long term,
    depending on their location, houses generally do increase in value. As mentioned,
    you may have already spent your initial purchase several times over; so, as the
    *Wall Street Journal* suggests, think of the sales proceeds from your home as
    a rebate of the money you spent on it. In other words, some of the thousands of
    dollars you spent on upkeep and improvements to your house are returned to you
    when you eventually sell it.


    Let’s look at the average cost of home ownership over the 30-year period ending
    in 2007, according to an Office of Federal Housing Enterprise Oversight (`OFHEO`)
    study. The `OFHEO` assumes a purchase price of $50,000 for a single-family home
    in 1977 (not much above the national median home price of $48,800 at that time).
    It then takes the total cost of owning the home by financing its purchase with
    a 30-year fixed-rate mortgage and compares it with the total cost of an all-cash
    purchase of the home. According to the `OFHEO`, the house would have appreciated
    to a value of $290,500 by the year 2007 at a nominal annual compounded rate of
    return of approximately 6.04 percent. (Note that, according to the Federal Home
    Mortgage Corporation, or `Freddie Mac`, the average annual compounded rate of
    return for home ownership declined to 3.60 percent for the period from 1983–2013.)
    The average mortgage interest rate for a 30-year fixed-rate mortgage in 1977 was
    8.72 percent, and the homeowner is assumed to be in a 33 percent marginal income-tax
    bracket. Table [11-1](#A314864_2_En_11_Chapter.html#Tab1) shows the cost of owning
    this home.


    ```

    Table 11-1.

    Average Cost of Home Ownership Over 30 Years (1977–2007)

