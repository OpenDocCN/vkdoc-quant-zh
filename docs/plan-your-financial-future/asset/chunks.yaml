    # 隔代传承的意外风险


    许多高净值人士并未意识到，赠与和遗产如果跳过一代人（例如祖父母赠与孙辈），还会面临第三种转移税。这种附加税被称为隔代转移税（`GSTT`）。


    有关隔代转移的规定很复杂，但以下是避免`GSTT`所需了解的关键信息：


    -   该税旨在征收相当于中间一代（即父母一代）原本需为该转移支付的赠与税或遗产税。

    -   该税是在遗产税或赠与税之外额外征收的；因此，它只会加重本已可观的转移税负担。

    -   该税按隔代转移发生时的最高遗产税税率以统一税率评估。它不像其他生前或遗嘱转移（例如，2018 年，任何隔代转移均适用统一的 40%税率）那样存在累进税率。

    -   该税可能适用于两种情形：祖父母在世时直接赠与孙辈（称为直接隔代转移）；或祖父母去世时通过信托方式，使孙辈受益而排除父母一代（也称为应纳税终止或间接隔代转移）。

    -   该税可能适用于无血缘关系的两个人（转让人与受让人）之间的赠与，只要受让人比转让人年轻至少 37.5 岁。

    -   根据隔代转移的类型不同，纳税责任由不同的人承担。


    幸运的是，大多数人即使进行了隔代转移，也能比较轻松地规避缴纳`GSTT`。这是因为转让人拥有 1120 万美元（2018 年）的免税额，可以将其分配给该转移以避免征税。这项可由转让人或其遗产酌情使用的免税额，与之前讨论的遗产税免税额相一致。祖父母在世期间，符合年度赠与税免税额（2018
    年为 15000 美元）条件的直接赠与孙辈的礼物，也无需缴纳此税。


    举例来说，假设在 2018 年，一位富有的祖父直接将价值 1121.5 万美元的增值股票赠予成年的孙女。如果他选择将全部 1120 万美元的隔代转移免税额用于此次转移（15000
    美元的年度赠与税免税额是自动适用的，无需选择），则无需缴纳`GSTT`。但请注意，隔代转移免税额现已完全使用，祖父去世时无法再用于抵减其他任何隔代转移。此外，不仅直接赠与可能适用`GSTT`，在
    2018 年，捐赠人每年向受赠人转移超过 15000 美元的任何部分，还可能适用联邦赠与税。


    总而言之，通过稍作规划，`GSTT`是很容易避免的。如果你的遗嘱或信托是在 1987 年（该税生效年份）之前设立的，你应该请你的遗产规划律师或财务规划师进行审查，以确定该税是否适用。如果该税确实可能适用，请修改你的遗嘱，以保护你辛苦赚来的财富。如果你有幸在遗产规划中避免了此项税收，也请意识到`GSTT`对财富的代际积累与传承构成了意外风险。


    现在，为了结束本书的这一部分，让我们来看看可能威胁毕生财富积累的常见事件。其中包括已婚夫妇的离婚，以及当今经济形势下意外的失业。危及财富的生活事件是下一章的主题和焦点。


    # 14. 危及财富的生活事件


    在人生旅途中，有时你会经历一些危及或威胁到你已积累财富数量的事件。我们已经讨论过在身体残疾情况下获得个人伤残收入保险的重要性，并且将在本章后面讨论如何为你自身可能的精神失能进行规划。但具体来说，我们针对六种可能造成财务毁灭性打击的生活事件，指出了重要的规划考量，包括离婚、长期失业、配偶或终身伴侣去世、父母罹患衰弱性疾病、照顾发育障碍的孩子，以及身体或精神失能。


    ## 离婚


    统计数据显示，每两段婚姻中就有一例以离婚（婚姻的法律终止）或分居（建立与配偶不同且独立的生活方式）告终。如何在财务上从离婚或分居中获得最佳结果（并希望能从中恢复）？


    你的律师或财务规划师可能和你在离婚最终敲定前或财产分割后立即着手处理的首个财务任务，可能是分割你和配偶的资产与负债。你需要准备新的个人财务状况表。与以往可以将资产和负债在一份报表中列为共同或单独所有不同，你现在可能需要准备三份个人财务报表：他的、她的和共同的。如果你居住在社区财产州，例如加州或德克萨斯州，资产和负债的分割会更容易，因为所有婚姻财产必须在配偶之间平均分配。但在非社区财产州（也称为普通法州），情况可能并非如此。尽管如此，在所有州准备单独的财务报表仍然是审慎的离婚规划措施。


    一旦你确定并书面记录了你和配偶的总资产和负债，你们各自都需要准备独立的收入或现金流报表。这样做将有助于确定在离婚最终敲定前是否可能获得临时赡养费或子女抚养费，并且还有助于确定未来可能需要支付的任何金额。作为一般规则，许多正在办理离婚的配偶并不完全了解离婚后他们的生活开支将如何变化。因此，前配偶通常低估了他们维持离婚前生活水平所需的资金。这个规则的一个显著例外是名人离婚，在这些案例中，离婚的配偶通常会高估他们未来的收入需求。


    分居的配偶应仔细考虑大多数离婚或分居协议中的三个基本条款：


    -   一方配偶向另一方支付赡养费的金额及必要性

    -   如果有婚姻期间生育的未成年子女，子女抚养费的金额

    -   婚姻期间积累的财产的分割（也称为财产分割协议）


    如果配偶在离婚时拥有房产，还应关注如何最好地分割这项重要资产中的权益。

