    ### 公共慈善机构


    公共慈善机构是指那些获得广泛公众支持，且并非由私人设立的机构。公共慈善机构的例子包括美国红十字会、联合之路、救世军以及美国心脏协会。公共慈善机构还可以包括地方教堂，以及由宗教团体或市政当局运营、出于所得税目的而属于非营利性质的医院。此外，教育机构也属于公共慈善机构——而且它们无需服务于特定人群即可被视为此类机构。考虑到许多人支付的高额学费和杂费，你可能不会立即将你的母校视为符合资格的慈善机构，但事实确实如此！无论该学院或大学是公立还是私立运营，接受捐赠的教育机构都被视为公共慈善机构。


    所有公共慈善机构允许捐赠者在任一纳税年度中，扣除最高相当于其`AGI`（调整后总收入）50%的所得税（在 2018-2025 年期间，现金捐赠情况下为 60%）。超出
    50%或 60%限额的捐赠额，通常允许结转并在最多五年内扣除，但前提是不超过后续年度的“上限”。然而，根据捐赠给慈善机构的财产类型，这个百分比额度可能会受到进一步限制。例如，如果你向公共慈善机构捐赠了增值股票，你可能仅能扣除捐赠当年`AGI`的
    30%。这里强调“*可能*”一词，是因为你实际能获得的扣除额取决于你最终选择扣除股票的全部公允市场价值，还是仅扣除你的股票成本基础。这里存在一个权衡：如果你选择从应税收入中扣除股票的全部公允市场价值，那么你在捐赠当年的扣除额上限为`AGI`的
    30%。或者，如果你选择仅扣除股票的成本基础，则你可以扣除高达`AGI`的 50%（具体取决于该基础是否等于当年`AGI`的 50%）。


    例如，假设你先前支付了 40,000 美元购买了 500 股 XYZ 公司的股票。这些股票的价值已升值至 50,000 美元，你因此获得了 10,000 美元的潜在资本收益。你希望在`AGI`为
    90,000 美元的那一年将这些股票捐赠给救世军。你有两种选择：


    *   你可以随后扣除股票的增值后公允市场价值（50,000 美元），并在捐赠当年扣除 27,000 美元（90,000 美元乘以 0.30）。然后，你可以将剩余的
    23,000 美元允许的慈善捐赠扣除额（50,000 美元减去 27,000 美元）结转到自捐赠之日起不超过五年的时期内。

    *   你可以在捐赠当年扣除你对这些股票的成本基础 40,000 美元。这个金额低于你`AGI`的 50%（90,000 美元），因此允许全额扣除 40,000
    美元。但如果你做出这个选择，你就不能再扣除与这些股票相关的任何额外增值部分，即剩余的 10,000 美元（50,000 美元减去 40,000 美元）。


    在大多数情况下，选择第一个选项对你更有利，因为你避免了如果出售而非捐赠这些增值股票所需要缴纳的资本利得税。然而，这个基本规则有一个例外，即当所捐赠的股票从你购买到捐赠给慈善机构期间并未经历大幅增值时。在这种情况下，对于所得税目的而言，选择扣除成本基础更为可取。


    对于在捐赠给慈善机构后的任何有形个人财产（例如一幅画），你能获得的所得税扣除额也有限制。这些限制被称为“与用途相关”和“与用途无关”的所得税规则，它们不仅基于所捐赠财产的类型，还基于慈善机构在收到财产后对其的使用方式。根据这些规则，如果慈善机构对该财产的使用与其原定用途相符，则该财产可被视为“与用途相关”，你可以扣除其全部公允市场价值。尽管如此，在捐赠当年仍适用
    30%的`AGI`限额，除非纳税人选择仅扣除其在捐赠财产中的成本基础。另一方面，如果慈善机构没有以该财产可能被期望的方式使用它，则该财产被视为“与用途无关”，捐赠者获得的慈善扣除总额不得超过其为该财产支付的金额。作为进一步的限制，如果你是位艺术家，并且在将画作捐赠给慈善机构之前亲自创作了它，除了你创作该画作所耗费的材料成本外，你不得进行任何所得税扣除。


    例如，假设你作为一名美术收藏家，将一幅你购买的画作捐赠给了当地一所大学。尽管该大学有一个艺术博物馆，但它打算将这幅捐赠的画作展示在其行政楼内。因此，该大学是以“与用途无关的方式”使用这幅画作。相应地，作为捐赠者，你的慈善扣除额被限制在不超过你购买这幅画所支付的金额。相反，如果该大学将这幅画作陈列在其艺术博物馆中，那么你将有权获得相当于该画作当前公允市场价值的慈善扣除，因为该大学以“与用途相关的方式”展示了这幅画作。请注意，如果你是这幅画的原作者，你只能获得用于创作这幅画的材料成本的慈善扣除。无论该大学如何使用这幅画，这都是税务上的结果。


    正如上述讨论所明确的，关于慈善所得税扣除的税务规则极其复杂。因此，你应该在咨询税务顾问或财务规划师之后再进行慈善捐赠。

    '
- fmt: '### Private Charities


    A private charity is best described as any charity that is not considered to qualify
    as a public charity. In practice, a private charity or private foundation is any
    charity other than a church, an educational organization, a hospital, or a governmental
    unit. Examples of well-known private charities include the Bill and Melinda Gates
    Foundation, the Ford Foundation, and the Rockefeller Foundation.


    The tax rules permitting an income-tax deduction for contributions to private
    charities are similar to those for contributions to public charities, except that
    the percentage of AGI limitations are even further restricted. The percentage
    amount permitted also depends on whether the private charity is an operating or
    nonoperating foundation. For example, a gift of appreciated stock to a private
    nonoperating foundation is subject to a deduction of only 20 percent of a donor’s
    AGI in the year of contribution, as opposed to the 30 percent deduction that donors
    to private operating foundations are eligible to receive. This is also the case
    when a gift of use-related tangible personal property is made and the donor does
    not elect to claim only their basis in the property as the allowable total deduction.
    Meanwhile, a gift of cash to a private charity is generally restricted to a contribution-year
    deduction of only 30 percent of AGI, as opposed to the 60 percent deduction that
    applies to a public charity donee.


    Table [20-1](#A314864_2_En_20_Chapter.html#Tab1) documents the most important
    deduction limits with respect to gifts made to charity during the lifetime of
    a donor.


    **Table 20-1.** Charitable Contribution Deduction Limitations


    | Type of Property | Allowable Total Deduction Amount | Percentage AGI Limitation
    if Public Charity (and private operating foundation) | Percentage AGI Limitation
    if Private Charity (private nonoperating foundation) |

    | --- | --- | --- | --- |

    | Cash | Fair market value (FMV) | 60% of AGI | 30% of AGI |

    | Appreciated stocks and bonds (securities) | FMV election Basis election | 30%
    of AGI 50% of AGI | 20% of AGI 20% of AGI |

    | Tangible use-related personal property | FMV election Basis election | 30% of
    AGI 50% of AGI | 20% of AGI 20% of AGI |

    | Tangible use-unrelated personal property | Basis in property only | 50% of AGI
    | 20% of AGI |


    ### Substantiation Requirements


    As a taxpayer, after you have determined what type of property to give to which
    form of charity and in what amount, you need to be concerned about proving what
    you gave or substantiating the amount to the IRS. The law used to be that the
    donor had to obtain a written receipt from the charity only if their cash gift
    exceeded $250 in the year of contribution. For gifts of tangible property, the
    donor did not need a qualified appraisal establishing the fair market value of
    the gift unless it was reasonably estimated that the property exceeded $5,000
    in value.


    These rules changed, however, beginning with charitable contributions made in
    2007. Now, regardless of whether they constitute cash or property, all contributions
    of any amount that are made to a public or private charity must be substantiated.
    In practical terms, this means unless you can produce either a bank record (such
    as a cancelled check) or a written communication from the charity (a “contemporaneous
    acknowledgement”) indicating the amount of the contribution, the date of the contribution,
    and the name of the charity, your charitable income-tax deduction may be disallowed.
    If a donated item is valued at more than $5,000, and the item is neither cash
    nor a publicly traded security, the donor must obtain an appraisal (and attach
    it to his or her tax return).


    ## Gifts to Charity Using Trusts and Annuities


    Gifts made to charity in qualifying split-income form for income-tax deduction
    purposes must generally be made either in the form of a trust or in exchange for
    an annuity from the charitable institution. The following discussion provides
    the specifics for each form.


    ### Charitable Trusts


    There are two prevalent types of charitable trusts: the charitable lead trust
    (CLT) and the charitable remainder trust (CRT). A CLT makes payments of income
    interest to a charity during its term. Then, at the end of the trust’s term, the
    remainder of its assets are passed to a noncharitable beneficiary in an attempt
    to zero out any estate taxes that may be due from the donor’s estate.


    For example, assume that you have established a CLT as part of the provisions
    of your last will and testament. At death, you direct that $1 million be placed
    in this trust to benefit first the American Humane Society and subsequently your
    two adult children equally. From this bequest of $1 million, the Humane Society
    is to receive a payment of $80,000 for the next 20 years. Using a table to determine
    the present value of your total future bequest to the Humane Society, the executor
    of your estate determines that the estate is entitled to a charitable deduction
    of approximately $997,000. As a result, you have effectively zeroed out the value
    of the subsequent transfer of the trust property to your two children, as well
    as any potential estate tax that may be assessed on this same transfer. In other
    words, your two children receive the trust property estate-tax-free.


    The second (and more popular) type of charitable trust is a CRT, which pays the
    donor (or another beneficiary) income during the donor’s lifetime and then, at
    the time of the donor’s death, transfers all remaining assets to the donor’s charity
    of choice. This type of trust comes in two basic forms: a CRT that provides a
    fixed annuity payment to you throughout your lifetime (otherwise known as a charitable
    remainder annuity trust, or CRAT); and a CRT that provides a fixed percentage
    of the trust assets, as revalued annually, to you during your lifetime (otherwise
    known as a charitable remainder unitrust, or CRUT).


    There are additional requirements for both CRATs and CRUTs to qualify for income-,
    gift-, and estate-tax deductions. But it is important to recognize that if you,
    as the donor, establish either trust during your lifetime, you are afforded two
    deductions:


    - An income-tax charitable deduction during your lifetime for the present value
    of your future bequest to charity

    - An unlimited estate-tax charitable deduction at your death for when the gifted
    property eventually passes to charity


    As such, if you intend to benefit a qualified charity at your death, you should
    likely establish a remainder trust now and take advantage of the double tax benefit
    for income- and estate-tax purposes.


    Both CRATs and CRUTs are irrevocable trusts, but have two basic differences. First,
    whereas a CRAT’s fixed annuity payments may eventually cause your purchasing power
    to decline as inflation rises, a CRUT is capable of keeping pace with or exceeding
    the annual inflation rate. Because the CRUT guidelines include an annual income
    payment based on a fixed percentage of trust assets, as revalued annually, you
    may be able to keep ahead of inflation and preserve the future purchasing power
    of your trust payments. Second, unlike a CRAT, for which no additional contributions
    of property may be made after the trust has been established, a CRUT permits subsequent
    gifts of property.


    Because both CRATs and CRUTs are customized, privately drafted documents, it is
    necessary to seek the assistance of a competent estate-planning attorney in drafting
    them. If you are worried about the out-of-pocket costs involved in the implementation
    of either document, you should ask the attorney to estimate the amount of money
    you will save in income and estate taxes by forming a CRT. Then compare this figure
    on a present value basis to the attorney’s fee. In most instances, the present
    value of the tax savings will more than exceed the cost of establishing and maintaining
    the trust throughout your lifetime.'
