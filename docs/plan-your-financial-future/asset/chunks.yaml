- fmt: '# D


    `defined-benefit retirement plan`: A tax-qualified employer pension plan that
    guarantees a specified benefit amount or level at the date of the participant’s
    retirement; commonly offered only by large corporations and government entities.


    `defined-contribution retirement plan`: A tax-qualified employer profit-sharing
    (or other type of) plan that establishes an individual account for each plan participant.
    Plan benefits consist of the amount accumulated in each account at the participant’s
    retirement or the termination of their employment. The most common and popular
    type of defined-contribution plan is a Section `401(k)` retirement plan.


    `dependent care credit`: An income tax credit or dollar-for-dollar reduction against
    a taxpayer’s income-tax liability because the taxpayer has incurred child-care
    expenses for a child under the age of 13. The maximum amount of credit is determined
    by tax law on a sliding-credit basis, with the maximum capped under law, regardless
    of the number of children receiving dependent care.


    `disclaimer trust`: A type of trust used in estate planning that allows individual(s)
    to benefit from property that is otherwise refused, or disclaimed, by the named
    beneficiary or heir.


    `durable power of attorney (DPOA)`: A type of power of attorney (granted by the
    principal to the agent) that continues even in the event of the principal’s or
    author’s legal incapacity or inability to act; currently permitted by all 50 states
    in some form.


    # E


    `education savings account (ESA)`: Properly known as the Coverdell education savings
    account and the successor to the education IRA. A trust or custodial account created
    exclusively for the purpose of paying qualified educational expenses of the designated
    beneficiary of the account. Currently, certain taxpayers, not subject to phaseout
    limits, may deposit cash of up to $2,000 per year into the account for a child
    under the age of 18.


    `expected family contribution (EFC)`: The amount of money that a family is expected
    to contribute to pay for a child’s higher education as determined by completing
    the Free Application for Student Financial Aid (FAFSA) form provided by the federal
    government.


    # F


    `401(k) plan`: A type of tax-qualified profit-sharing plan that provides for before-tax
    salary-reduction contributions (known as elective deferrals) to be made by the
    employee. Such plans must not only be generally nondiscriminatory (all eligible
    employees must be permitted to participate), but also must meet special nondiscrimination
    rules if the employer matches employee contributions with additional monies.


    `family foundation`: A type of private charitable foundation that is funded primarily
    by one family. Such foundations may be either operating or nonoperating in nature.
    An operating family foundation uses the bulk of its income to actively run the
    daily operations of the fund, whereas a nonoperating family foundation only disburses
    monies to other charities for their own use.


    `flexible spending account (FSA)`: A type of cafeteria plan—a plan under which
    employees may choose between cash and nontaxable fringe benefits—that is funded
    through salary reductions elected by employees each year. Among other provisions
    of the Patient Protection and Affordable Care Act of 2010, employee salary reductions
    used to provide for health-care reimbursement from an FSA are capped at $2,500
    annually beginning in 2013 and indexed for inflation thereafter.


    `floater`: An insurance term used to describe personal property that travels with
    the insured and remains insured wherever the insured is currently traveling. Commonly
    used in conjunction with the term personal articles and indicates insurance on
    property, such as jewelry or personal keepsakes.


    # G


    `grantor`: The individual who creates or establishes a revocable or irrevocable
    trust. This term is also used in tax terminology to mean the individual who could
    be taxed on income generated from trust property as determined under a series
    of rules collectively referred to as the grantor trust rules.


    # H


    `highly compensated employee (HCE)`: A specific definition of certain employees
    who are the focus of the nondiscrimination rules determining, in part, whether
    a retirement plan is “tax-qualified” or granted certain tax advantages. Specifically,
    to be qualified for tax purposes, the plan cannot discriminate in favor of HCEs.
    An HCE is either an individual who owns a certain nominal percentage of the business
    (such as more than 5 percent) or an employee who makes in excess of a specified
    amount of annual salary.


    # I


    `immediate fixed annuity`: A popular form of retirement insurance product whereby
    the retiree turns over to the insurance company a lump sum of money in exchange
    for a fixed payment that begins immediately (or, typically, within 30 days of
    his or her retirement date).


    `intestate succession`: A series of state laws that specifies who inherits property
    at a decedent’s death when the decedent dies without having written a last will
    and testament.


    `irrevocable life insurance trust (ILIT)`: A trust whereby the owner of a life
    insurance policy irrevocably relinquishes those ownership rights to a designated
    third party, the trustee of the trust. The death proceeds from the life insurance
    policy are removed from the owner’s gross estate, and a trustee is chosen who
    can provide needed liquidity to pay taxes and other expenses incurred in the administration
    of a decedent’s estate.


    # J


    `joint tenancy with right of survivorship (JTWROS)`: Also referred to as owning
    property jointly. A type of property ownership (most commonly found in common
    law property states) that is distinguished by automatic survivorship rights upon
    the death of the first joint tenant. The primary advantage of JTWROS property
    is that title passes automatically to the survivor without the necessity of the
    probate process.


    # L


    `Lloyds of London`: A specialist insurance market, located in London, England,
    where syndicated members join together to insure risks. Most commonly known for
    insuring hard-to-insure or unique risks, such as Betty Grable’s legs or famous
    baseball pitchers’ throwing arms.


    # M


    `managed care health insurance plans`: A type of health insurance plan noted for
    its emphasis on preventative medicine and characterized by such features as a
    network of physicians and copayments by insureds. Examples of managed care plans
    are health maintenance organizations (HMOs) and preferred provider organizations
    (PPOs).


    `marginal income-tax bracket`: The rate on a specified amount of the taxpayer’s
    next dollar of income. Important for income-tax planning purposes, because it
    affects tax decision-making.


    `master limited partnership (MLP)`: A type of limited partnership investment that
    is publicly traded (as contrasted to a private limited partnership, which is not
    publicly traded and does not have an active market if the owner wishes to sell
    their interest in the partnership).


    `mutual fund`: More properly known as an open-ended investment company. A type
    of company that pools money from shareholders and invests in a variety of securities,
    including stocks, bonds, and money-market securities. Mutual funds generally continuously
    offer new shares to investors and redeem old shares.'
