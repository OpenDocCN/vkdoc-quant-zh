- fmt: '# 15. Planning for Your Child’s Higher Education


    We now move to the last step in the PADD process of wealth accumulation and management:
    distributing your wealth. Toward that end, this section of the book focuses on
    the distribution of wealth during your lifetime and considers the common financial
    goals of saving and planning for your child’s higher education and your own retirement.
    It also discusses how to save and plan for other lifetime financial goals you
    may have, such as starting your own business. Then, the last section of the book
    takes up the process of distributing your wealth at death.


    If you are married and have children, one of your first goals when evaluating
    how to distribute wealth during your lifetime is probably to afford your family
    members the best opportunity to pursue a profitable career—and that requires,
    at a minimum these days, a college degree. There are many colleges and universities,
    public and private, and your children’s costs of attendance will vary dramatically
    based on their eventual choice. The common thread to whatever choice they make
    is that college is expensive—and getting more expensive by the year. According
    to the College Board, over the ten-year period of 2017–2018, tuition at public
    four-year institutions increased by an average of 5.1 percent per year nationally
    (tuition increases at private four-year institutions averaged 4.6 percent per
    year nationally over the same period). This compared to an average annual inflation
    rate of only 1.9 percent over the same period. For the 2017–2018 school year,
    the total annual cost of attending a four-year public college or university for
    an in-state student was approximately $20,000 ($36,000 for an out-of-state student)
    and close to $47,000 at a private institution. It is closer to $66,000 annually
    at an Ivy League institution.


    Fortunately, the availability of financial aid increased during this same ten-year
    period, although most of this aid is based on financial need, with the amount
    necessary to qualify decided by the school and other factors beyond the control
    of the average middle-class parent. The key thing to keep in mind, then, is that
    it is important to plan for your child’s higher education as early as possible.


    ## How Much Will I Need?


    As with any financial-planning goal that may be quantified, the first question
    to answer with respect to planning for your child’s higher education is how much
    money you will need. The answer depends on several factors, including how many
    children you have and whether you wish for them to attend public or private colleges
    or universities. In 2018, private-college Ivy League institutions (elite institutions),
    such as Harvard and Yale, are among the most expensive to attend, with tuition,
    fees, and room and board costs averaging at least $66,000 per year. Meanwhile,
    private liberal arts schools throughout the country are not far behind in cost.
    Finally, the cost of attendance at public schools varies greatly, but for planning
    purposes, using the average of the current cost of attending a public university
    for an in-state and out-of-state student—or $28,000 annually—is not unreasonable.


    The first step in computing the cost of your child’s education is to inflate,
    or calculate in today’s dollars, what the current cost of attendance—say, $28,000
    annually—will be when your child is ready to attend college. To do this, you need
    to assume an annual increase in costs of a certain amount—say, 6 percent annually—to
    account for additional future increases. You can input these numbers into a web-based
    calculator (for example, at `www.tvmcalcs.com`), or you can enter them on a financial
    function calculator. Here is an example using the Hewlett-Packard 10BII financial
    function calculator illustrated at the cited web site:


    1. Enter $28,000 as the present value (`PV`). Note: With this calculator, you
    need to enter this amount as a negative number so the calculator can distinguish
    between the `PV` amount you are entering and the future value amount (`FV`) for
    which you are solving.

    2. Enter 6 as the projected annual percentage increase (`I/YR`).

    3. Enter the number of years (`N`) until your child enters college; for instance,
    if your child is 3 years of age, enter 15, because 18 is the typical age for beginning
    college.

    4. Solve for the `FV` of the cost of one year of attendance: in this case, the
    cost would be $67,104 per year.


    Once you have completed this calculation, you need to determine the present value
    of the total sum that will be required to fund your child’s college education
    for their estimated four years of attendance. The steps are as follows:


    1. Shift your calculator into `BEGIN` mode (you will need the money at the beginning
    of the period when your child enters college at age 18).

    2. Enter $67,104 as a payment (`PMT`). Note: You may need to enter this amount
    as a negative number because it is a cash outflow to you, depending on what calculator
    you are using.

    3. Enter 4 as the number of years (`N`) of college attendance.

    4. Enter an inflation-adjusted annual rate of return (`I/YR`) on the monies set
    aside to fund the education; for example, if you believe you can make a 10 percent
    annual before-tax rate of return on your investments, the number you will enter
    is 3.7736 (1.10 divided by 1.06 less 1 times 100).

    5. Solve for the `PV` or lump-sum amount needed to pay for the cost of a four-year
    college education in today’s dollars. Using the assumed numbers, the amount is
    $254,127.


    The third and final step (after you’ve picked yourself up off the floor!) is to
    determine the amount of annual savings required to accumulate a lump sum of $254,127.
    The steps are as follows, assuming that you intend to save monthly in order to
    accumulate this sum:


    1. Enter $254,127 as a `FV` amount, because you are solving for the amount of
    monthly payment needed today, while the child is 3 years old.

    2. Multiply 15 years by 12 months (180) for the payments you need to make over
    the period you are saving. Enter this as `N`.

    3. Divide the 10 percent annual assumed before-tax rate of return by 12 to convert
    to a monthly rate, and enter this as `I/YR` (here, 0.8333).

    4. Solve for the monthly payment or savings amount needed: $608.09 per month ($613.16
    if you do not save this amount until the end of each month). Annually, this is
    a savings of $7,271.22 or $7,998.34, respectively.


    A word of caution as you consider the challenge before you: many people do not
    have the financial resources to accumulate this amount of money quickly. The important
    point is not to focus on the end of the process, but rather the beginning. In
    other words, begin to save some amount, even if it is not the amount that you
    should be saving. Probably the worst planning alternative is to do nothing, because
    you will quickly find other ways to spend the required savings. As part of the
    “pay yourself first” savings strategy, at least do what you can to provide for
    your child’s college education.


    The next concern relates to whose name you should use to save for this education:
    your child’s or your own?'
