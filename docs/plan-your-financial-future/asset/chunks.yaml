    | --- | --- |

    | 薪资 | $_________ |

    | 奖金 | $_________ |

    | 自雇收入 | $_________ |

    | 利息收入 | $_________ |

    | 股息收入 | $_________ |

    | 资本利得（资产出售） | $_________ |

    | 租金和版税 | $_________ |

    | 养老金和年金 | $_________ |

    | 社会保障 | $_________ |

    | 其他收入 | $_________ |

    | 现金流入总额 | $_________ |

    | **现金流出** |  |

    | 储蓄 | $_________ |

    | 租金/按揭还款 | $_________ |

    | 维修、保养、改善 | $_________ |

    | 公用事业费 | $_________ |

    | 汽车贷款还款 | $_________ |

    | 信用卡还款 | $_________ |

    | 食品 | $_________ |

    | 服装 | $_________ |

    | 保险费： |  |

    | 人寿保险 | $_________ |

    | 健康保险 | $_________ |

    | 长期护理保险 | $_________ |

    | 残疾保险 | $_________ |

    | 汽车保险 | $_________ |

    | 房屋保险（如未包含在按揭还款中） | $_________ |

    | 综合责任险 | $_________ |

    | 保险费总额 | $_________ |

    | 医疗费用 | $_________ |

    | 房产税（如未包含在按揭还款中） | $_________ |

    | 所得税 | $_________ |

    | 社会保障和医疗保险税 | $_________ |

    | 育儿费用 | $_________ |

    | 娱乐休闲 | $_________ |

    | 其他费用 | $_________ |

    | 现金流出总额 | $_________ |

    | **现金盈余（或赤字）** | $___________ |


    您可能想知道这两份报表（个人财务状况表和个人现金流量表）如何相互关联。现金流量表中年度末（或您选择列出收入和支出的任何时间段）的现金盈余将增加您在个人财务状况表中反映的净资产。反之，现金赤字则会减少您的净资产。净资产的增加是一种财务优势，而净资产的减少（特别是如果这种减少持续很长一段时间）则是一种财务劣势。换句话说，如果现金赤字持续存在（您的支出超过收入），您需要采取行动来扭转局面。如果不这样做，您未来积累财富的财务目标就不可能实现。


    # 预算编制


    对许多人来说，制定并坚持执行预算是一项生活中的小负担。有时，限制支出（从而限制生活方式）的想法会让人觉得受到威胁，以至于人们甚至拒绝考虑编制预算。我曾听到有人说：“什么预算？我挣多少花多少，这就是我的预算！”然而，没有预算的生活会损害您的长期财务健康。将预算视为一个证明您自身财务自律性的机会。您甚至可以在每月预算有结余并向自己证明能够量入为出时，奖励自己（并将钱存入储蓄）。随着时间的推移，这种做法将显著增加您的净资产。


    如前所述，预算着眼于未来，它是您计划支出的基准。可能需要几个月的时间才能把预算做好，但如果您想积累财富，就必须把它做好！如果您刚开始编制（并遵守）预算，那么在做假设时要保守一些。例如，任何预算的一个基本假设是您当前的工作是稳定的；如果不是这样（如果您预计会换工作或被裁员），您可能需要留出更多的储蓄并减少支出。这将帮助您建立一个应急基金——这是对您长期财务健康至关重要的另一项财务规划实践。


    通常，预算的编制分几个步骤。首先，确定您的财务目标以及实现这些目标所需的储蓄金额会很有帮助。其次，在估算您未来收入并预测预算期间的预期支出时，要尽可能现实。最后，一份编制良好的预算应具有足够的灵活性，以应对财务紧急情况或一次性大额支出（因此需要应急基金）。


    附录B中提供了一个详细预算的示例，但请记住这一点：只有您打算使用它，预算才有价值。如果您不使用它，那么通过专注于其他规划技巧（例如，寄希望于中彩票！）来尝试实现短期和长期财务目标，可能对您更有利。'
  raw: '### Creating a Cash-Flow Statement


    In addition to preparing a statement of personal financial position, you need
    to track your ongoing expenses and sources of income. A second reference document,
    the personal cash-flow statement or worksheet, should be completed at least quarterly
    (better done monthly, if possible). Here are the reasons:


    *   The cash-flow statement lets you see where you are spending your money. (It
    will tell you whether you are living within or beyond your means.)

    *   It gives you an idea of your ability to save.

    *   It pinpoints your financial strengths and weakness with respect to your current
    standard of living.

    *   It can serve as a practice document before preparing a budget for future cash-flow
    management. (The cash-flow statement reviews past financial performance, or looks
    backward, whereas the budget looks forward.)


    Just as the statement of personal financial position has three general categories
    (assets, liabilities, and net worth), so does the personal cash-flow statement.
    On the cash-flow statement, you should separately identify cash inflows (sources
    of income), cash outflows (ongoing expenses), and any resulting cash surplus or
    cash deficit. A cash surplus or deficit is merely the difference between your
    cash inflows and cash outflows. Of course, what you want at the end of the quarter
    (or month) is a cash surplus, sometimes known as discretionary income , because
    that amount is available for saving. A little mental trick to help you save: include
    a fixed savings amount or percentage of income on the first line of the Cash Outflows
    column. In other words, pay yourself first, and treat the savings amount the same
    as you would any other fixed expense. You should strive to save at least 10 percent
    of your gross income monthly.


    An ongoing issue with respect to the preparation of the cash-flow statement is
    whether to show income and Social Security taxes as a separate expense or cash
    outflow (alternatively, you would show the after-tax amount among your cash inflows
    because your paychecks reflect this). The better practice is to list these taxes
    as a cash outflow, because (again) one of the purposes of the cash-flow statement
    is to show how you are spending your money. Including a separate line item for
    income and Social Security taxes among the cash outflows forces you to account
    for what may be an otherwise invisible expense.


    Table [1-2](#A314864_2_En_1_Chapter.html#Tab2) is an example of a properly prepared
    personal cash-flow statement.


    Table 1-2.


    Personal Cash-Flow Statement (for 2017)


    | CASH INFLOWS |   |

    | --- | --- |

    | Salaries | $_________ |

    | Bonuses | $_________ |

    | Self-Employment Income | $_________ |

    | Interest Received | $_________ |

    | Dividends Received | $_________ |

    | Capital Gains (from sale of assets) | $_________ |

    | Rents and Royalties | $_________ |

    | Pension and Annuities | $_________ |

    | Social Security | $_________ |

    | Other Income | $_________ |

    | Total Cash Inflows | $_________ |

    | CASH OUTFLOWS |   |

    | Savings | $_________ |

    | Rent/Mortgage Payments | $_________ |

    | Repairs, Maintenance, Improvements | $_________ |

    | Utilities | $_________ |

    | Auto Loan Payments | $_________ |

    | Credit Card Payments | $_________ |

    | Food | $_________ |

    | Clothing | $_________ |

    | Insurance Premiums: |   |

    | Life | $_________ |

    | Health | $_________ |

    | Long-Term Care | $_________ |

    | Disability | $_________ |

    | Auto | $_________ |

    | Homeowner (if not included in mortgage payment) | $_________ |

    | Umbrella Liability | $_________ |

    | Total Insurance Premiums | $_________ |

    | Medical Expenses | $_________ |

    | Property Taxes (if not included in mortgage payment) | $_________ |

    | Income Taxes | $_________ |

    | Social Security and Medicare Taxes | $_________ |

    | Child-Care Expenses | $_________ |

    | Recreation and Entertainment | $_________ |

    | Other Expenses | $_________ |

    | Total Cash Outflows | $_________ |

    | CASH SURPLUS (OR DEFICIT) | $___________ |


    You may be wondering how both statements (the statement of personal financial
    position and the personal cash-flow statement) tie together. A cash surplus from
    the cash-flow statement at the end of the year (or for whatever period you choose
    to list your income and expenses) increases your net worth, as reflected on the
    statement of personal financial position. Conversely, a cash deficit decreases
    your net worth. Increasing net worth is a financial strength, whereas decreasing
    net worth (particularly if the decrease continues over a long period of time)
    is a financial weakness. In other words, if a cash deficit continues (you are
    spending more than you are earning), you need to do something to reverse the situation.
    If you don’t, your financial goal of future wealth accumulation is impossible.


    ### Budgeting


    For many people, putting together and sticking to a budget is one of life’s little
    burdens. Sometimes the thought of limiting their spending (and therefore their
    lifestyle) is so threatening that people refuse to even think about preparing
    a budget. I have heard it said, “What budget? I spend what I make, so that’s my
    budget!” However, living without a budget damages your long-term financial health.
    Look at a budget as an opportunity to prove your own financial self-discipline.
    You could even pay yourself (and add to your savings) if you come in under budget
    each month and show that you can live within your means. Over time, that practice
    will significantly increase your net worth.


    As mentioned, a budget looks forward and is a benchmark for what you plan to spend.
    It may take you a few months to get it right, but get it right you must if you
    want to accumulate wealth! If you are just starting to prepare (and comply with)
    a budget, be conservative in the assumptions you make. For example, an underlying
    assumption of any budget is that your current employment is secure; if it is not
    (if you anticipate a job change or layoff), you probably need to set aside even
    more savings and spend even less. This will help you build up an emergency or
    contingency fund—another financial-planning practice that is critical to your
    long-term financial well-being.


    Normally, a budget is developed in several steps. First, it is helpful to have
    determined your financial goals and the amount of savings necessary to accomplish
    them. Next, be as realistic as you can when estimating your future income and
    forecasting your anticipated expenses for the budget period. Finally, a well-developed
    budget should be flexible enough to accommodate financial emergencies or one-time
    major expenses (hence the need for the emergency fund).


    A sample of a detailed budget is included in Appendix B, but take this to heart:
    a budget has value only if you intend to use it. If you do not use it, you are
    likely better off attempting to meet your short- and long-term financial goals
    by focusing on some other planning technique (say, by hoping to win the lottery)!'
