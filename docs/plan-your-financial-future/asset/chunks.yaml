- fmt: 'To determine your taxable gain, you must subtract your basis in the home from
    its sales price minus all costs and commissions. This computation process underscores
    the importance of keeping good records, because your basis in a home is generally
    equal to what you paid for it plus any improvements made while you owned it. For
    example, assume that you paid $250,000 for your home ten years ago. While you
    owned it, you finished the basement at a cost of $30,000. Your adjusted basis
    in the home is now $280,000 ($250,000 plus the $30,000 in improvements). Also
    assume that you recently sold the home for $370,000 with the assistance of a real-estate
    broker. You must pay your broker a commission of 6 percent of the sales price.
    Therefore, your sales price for determining any capital gains tax due is $347,800
    ($370,000 less the $22,200 broker’s commission). Accordingly, your total, potentially
    taxable gain is $67,800 ($347,800 net sales price less $280,000 basis); but if
    you qualify for the $250,000 exclusion, you do not have any recognized gain for
    tax purposes. In other words, you do not owe any income tax if you take advantage
    of the available exclusion.


    To qualify for the $250,000 or $500,000 exclusion, you must meet both an ownership
    test and a use test. Specifically, you must have


    * Owned the residence for at least two out of the five years prior to when you
    sold it

    * Used the home as your primary residence for this same period of time


    If you are married and file jointly at the time of sale, either you or your spouse
    can meet the ownership requirement, but you both must meet the use requirement.
    This may be a particularly difficult requirement for divorced or divorcing couples
    in which one partner vacates the home before sale. If you fail to meet these tests
    due to a change in employment (for example, if your employer transfers you to
    a new location) or as a result of other unforeseen circumstances, you can exclude
    the fraction of the $250,000 or $500,000 exclusion that is equal to the fraction
    of the two-year period in which these tests were met.


    For example, assume that you purchased a home on January 1, 2017, and on January
    2, 2018, your employer transferred you to another city. You have owned your home
    for at least 12 months and, as a single taxpayer, are entitled to exclude up to
    $125,000 of any gain on the sale ($250,000 times 0.50, or 12 divided by 24). Finally,
    as with any other personal asset, losses on the sale of a home used as a personal
    residence are not allowed for income-tax purposes.


    ## Automobiles: Do You Really Need That New Lamborghini?


    Unlike houses, which have historically appreciated in value, no other use assets
    depreciate in value more quickly than automobiles. From a debt-management perspective,
    you should think twice before borrowing to purchase a new luxury automobile. Remember,
    borrowing to buy a depreciating asset does not make financial sense. Nevertheless,
    in most places in America, an automobile is not a discretionary purchase, but
    a necessity for getting around. What are some tips for taking the most advantage
    of this necessary tool of daily living?


    * If you can suffer what is, for some, an indignity, purchase only a quality used
    automobile. An automobile broker or referencing an online web site can assist
    you in finding one. Then, as with a house, do not overpay for it.

    * Do some research before you buy. For example, if you have decided on a pre-owned
    car, consult the Kelley Blue Book to determine what you should be paying as the
    retail price. If you are purchasing a new car, you can consult online services
    to find out the dealer’s invoice cost. Start your negotiation with the dealer
    about 2 percent above that cost, and try to work down from there.

    * Before you buy, try to determine whether the car you are interested in is likely
    to become a classic model. For example, individuals who were fortunate enough
    to buy a 1957 Chevrolet or a 1965 Ford Mustang transformed a depreciating asset
    (a car) into a collector’s item (a classic automobile).

    * Buy only one quality automobile at a time, and keep it for at least ten years
    or 100,000 miles. Fortunately, automobiles are improving in quality all the time,
    so this should not be too difficult.

    * Keep your car in good repair and up-to-date on maintenance. It has been proven
    that well-tuned cars conserve gasoline and thus, in the longer term, save you
    money.


    Another decision you may need to make with respect to an automobile is whether
    to buy or lease the car. Generally, when a high percentage of the car’s use is
    for business purposes, it may be more advantageous to lease instead of buy. Not
    only can the business portion of the lease payments be deducted for income-tax
    purposes, but the business portion of the interest on the loan may be deducted.
    Further, depreciation of the leased vehicle, within certain limits, is also a
    tax deduction. Finally, if the vehicle you are purchasing is to be used for primarily
    personal purposes, buying and owning the car for a significant period of time
    is preferable. This is particularly the case if the lease agreement does not provide
    for an option to purchase the car at its depreciated value at the lease’s expiration
    date (known as a closed-end automobile lease agreement).'
