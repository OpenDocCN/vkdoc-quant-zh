- fmt: '## Required Minimum Distributions


    By April 1 of the year following the year in which you reach the age of 70 and
    6 months, you must generally begin to take taxable distributions from either an
    employer-sponsored retirement plan or a traditional IRA. Note that an exception
    to this rule exists for some workers who have not yet retired as of age 70 and
    6 months. In that instance, a required minimum distribution does not have to be
    made until April 1 of the year following the year in which the worker retires.
    For each subsequent year after your required beginning date, you must withdraw
    a required minimum distribution by December 31 of that year.


    Because the amount of distribution you must take in a given year is established
    by tax law, these distributions are often referred to as required minimum distributions
    (RMDs). The RMD for any given year is computed by dividing your account balance
    in the employer plan or traditional IRA as of December 31 of the preceding year
    by an applicable divisor or distribution period. This divisor or distribution
    period is determined by referencing your age as of December 31 of the distribution
    year in an IRS table known as the Uniform Lifetime Table. Table [16-2](#A314864_2_En_16_Chapter.html#Tab2)
    shows a portion of that table for participants age 70 through age 80.


    **Table 16-2. Uniform Lifetime Table**


    | Participant’s Age | Applicable Divisor or Distribution Period |

    | --- | --- |

    | 70 | 27.4 |

    | 71 | 26.5 |

    | 72 | 25.6 |

    | 73 | 24.7 |

    | 74 | 23.8 |

    | 75 | 22.9 |

    | 76 | 22.0 |

    | 77 | 21.2 |

    | 78 | 20.3 |

    | 79 | 19.5 |

    | 80 | 18.7 |


    Once you begin distributions, each subsequent divisor goes down by a factor of
    approximately one. This is because you are getting older and your life expectancy
    is, accordingly, reduced. For example, assume you were born in June 1948 and are
    age 70.5 as of year-end 2018. Further, assume that the account balance in your
    traditional IRA was $500,000 as of year-end 2017. (Remember, you have to use the
    previous year’s account balance in computing the necessary RMD.) Your RMD for
    2018 is $18,248 ($500,000 divided by 27.4). You may delay this distribution until
    April 15, 2019, but doing so requires you to take two distributions for that year
    (one for 2018 and one for 2019). Next, in 2019, you divide your year-end 2018
    traditional IRA account balance by 26.5 (because, by year-end 2019, you will have
    reached age 71). All things considered, you are probably better off from a tax
    standpoint if you take the first distribution in 2018 and the second in 2019.
    If you do not take any distribution or fail to take the correct amount of RMD,
    the IRS will penalize you in the amount of 50 percent of the difference (that
    is, what you should have taken as an RMD and the amount of distribution you actually
    made).


    The Uniform Lifetime Table is used for all situations and individuals with one
    exception: if you are married and your spouse or beneficiary is more than ten
    years younger than you, a different table is used. This second table, known as
    the Joint and Last Survivor Table, is based on the actual joint life expectancies
    of the respective spouses. Although the Joint and Last Survivor Table also reflects
    a divisor that begins when you turn age 70 and 6 months (or age 70 as shown on
    the table), the applicable divisor is a greater number, thus allowing for a smaller
    taxable RMD.


    There are also post-death RMDs that must be made when a plan participant or IRA
    account owner (including a Roth IRA owner) dies before the entire account balance
    has been distributed. The application of these rules is based on, among other
    factors, the individual named as the designated beneficiary of the plan or IRA.
    If the spouse is named as the beneficiary, they are a favored subsequent owner
    and may therefore roll over the remaining account balance to their own IRA, free
    of income tax. It is important to note, however, that as of 2007, a nonspousal
    beneficiary of an employer-sponsored plan may also take advantage of the rollover
    provisions to an IRA. Accordingly, as a plan participant, if you name a child
    as the beneficiary of your Section 401(k) plan, they may now transfer the money
    accumulated in that account directly into a properly titled inherited IRA and
    stretch the distributions over their own lifetime. To title this IRA properly,
    it must read as follows: "John Doe IRA (deceased 00-00-07 or later) for the benefit
    of Mary Doe, adult daughter."


    Be careful. According to recently issued IRS notices, an employer-sponsored retirement
    plan does not have to allow a nonspouse beneficiary to make a direct transfer
    to an inherited IRA. Further, a nonspouse beneficiary who inherited funds from
    an employer-sponsored plan before 2006 cannot take advantage of the direct-rollover
    opportunity. If you inherit a retirement plan account balance from someone other
    than your spouse, the first step is to check with the plan administrator to see
    if the plan has accorded you the opportunity of a direct rollover.


    ### No Loopholes


    You may wonder if there is a planning technique you can adopt to avoid making
    a taxable RMD from your employer-sponsored retirement plan or traditional IRA.
    In other words, as a higher-income retiree, you may not need the money and not
    want to pay taxes on the distribution. Unfortunately, there is no longer a planning
    technique that precludes the necessity of an RMD. One of the most popular alternative
    planning techniques to avoid making an RMD used to be as follows: in years when
    you did not wish to take an RMD, you transferred the previous year-end account
    balance from a traditional IRA to a Roth IRA before December 31 of the required
    distribution year. Then, after January 1 of the next year, you transferred (or
    recharacterized) the money back to the traditional IRA. Thus, the previous year''s
    traditional IRA account balance was zero, and no RMD was necessary for the distribution
    year.


    Under current federal tax rules, however, this technique does not work. Rather,
    as the owner of a traditional IRA, you must make an adjustment to the previous
    year-end balance of the account to reflect the return of any recharacterized Roth
    IRA transfers. You must look back and add the money that you subsequently transferred
    to the Roth IRA to the traditional IRA account balance of zero. If you refuse
    to do so, the IRS will penalize you in the amount of 50 percent on any difference
    or shortfall. Bottom line: do not do this, or you will unnecessarily deplete your
    hard-earned accumulation of wealth.


    It is interesting to note that, beginning in 2018, all recharacterizations, whether
    attempting to implement the just-discussed technique or otherwise, are prohibited
    by the TCJA of 2017.'
