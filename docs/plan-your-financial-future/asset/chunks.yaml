- fmt: '# In Whose Name Do I Save?


    Before you begin to save for higher education, you need to consider whether your
    child is likely to qualify for federal financial aid. As you ponder this issue,
    ask yourself the following questions:


    - What do you expect your income to be at the time that the child enters college—or,
    more precisely, when you complete the `Free Application for Student Aid (FAFSA)`
    form in the second semester of your child’s junior year of high school? Most federal
    financial aid is need-based; and if the child’s parent makes too much money, the
    child is unlikely to qualify for the aid.

    - Do you believe it is your responsibility or financial obligation to provide
    the child with a college education? Do you expect the child to assist financially
    or cover the complete cost of attendance?

    - Do you anticipate that your child will receive an academic or athletic scholarship
    to cover the cost of college attendance? Be realistic: although we all believe
    our children are uniquely talented, more realistically, this is probably not the
    case.

    - Do you have relatives or family members such as grandparents who have offered—or
    expect to offer—financial assistance when the child goes to college?


    Fundamentally, you may be somewhat ambivalent about whether your child attends
    college or pursues higher education, but remember this: studies have shown that
    over the course of a lifetime, a college graduate will earn in excess of a million
    dollars more than an individual who receives only a high-school diploma.


    Let’s return to the question of in whose name you should save for college, which
    is a critical concern if you anticipate that your child will need financial assistance
    to cover the cost of college attendance. As you complete the mandatory `FAFSA`
    form, you are asked to list your assets and income as well as those of the child.
    This is necessary so the federal government can determine an amount of expected
    family contribution (`EFC`) toward the cost of college attendance. If your child
    needs financial aid, you want to achieve an `EFC` determination that is as low
    as possible. Accordingly, you should know the formula the federal government uses
    to compute the amount that the family is expected to contribute.


    The most critical component of this formula is the fair market value of the assets
    held in the name of the child vs. those that are held in the name of the parent.
    In other words, what percentage of these assets is expected to be contributed
    to the cost of a college education and should therefore be counted against the
    family in the formula? The answer is 35 percent for the child and less than 6
    percent (5.64 percent, to be exact) for the parent. Just from this entry into
    the formula alone, it is generally much more advantageous to save for college
    in the name of the parent rather than in the name of the child. If you decide
    to save for your child’s college education in your own name, you should probably
    embark on a Section 529 private savings plan. Meanwhile, if you have decided to
    save for your child’s college education under their name, you may want to open
    a custodial account, such as a `Uniform Gifts to Minors` or `Uniform Transfers
    to Minors` account.


    Other savings strategies may also reap dividends when you are saving for college.
    They are as follows:


    - Spend down the student’s assets first. This may easily be understood when recognizing
    the disparity in countable children’s assets (35 percent) vs. parental assets
    (approximately 6 percent).

    - Maximize contributions to your retirement fund. Whereas annual contributions
    to your `401(k)` (or other) retirement plan are included in the computation of
    countable parental income, the vested account balance in a retirement plan is
    not counted among available parental assets that may be used to help pay for college
    costs.

    - Consider the use of a `Roth IRA` as a college savings vehicle. Your child will
    need earned income to contribute to this type of savings vehicle, but the work
    experience gained may be valuable in teaching the child discipline.

    - Pay off as much as possible of your credit card and other unsecured debt before
    filing the `FAFSA`. This will reduce the amount of cash or other assets that you
    must list and that are counted against you when applying for federal financial
    aid on behalf of your child.

    - Try to pay down your original mortgage as much as possible before applying.
    This yields two benefits: it can free up cash flow that you may need to fund your
    child’s college education, and the amount of equity in your home is not included
    among parental assets when computing the expected family contribution.


    To determine the amount of assistance required, most publicly funded college financial
    aid offices use a formula determined by the federal government known as the federal
    methodology. This formula does not consider the value of a family’s home in arriving
    at the `EFC`. Meanwhile, some private colleges and universities use a formula
    known as the institutional methodology when computing the `EFC`. In this formula,
    the amount of equity in your home is added back (and is thus counted against you).
    You know that a school is using the institutional methodology if it asks you to
    file the more detailed `CSS/Financial Aid Profile` along with the `FAFSA` form.
    Unlike the information requested on the `FAFSA`, the `CSS Profile` requires the
    parent’s expected income during the child’s college years and not just your current
    or past year’s income.


    As a parent, be aware of a bait-and-switch tactic used by some colleges or universities
    in enticing your child to attend their institution. Although this practice is
    not as prevalent as it once was, some schools may offer an extremely lucrative
    financial aid package to a student whom they want to attend the institution, only
    to reduce the amount of financial aid given to that student after their first
    year of attendance. If the student is not comfortable at the school, they are
    then forced to consider transferring to another school (often with the disadvantage
    of not being able to transfer credit hours) or continuing studies at the same
    school and trying to resolve acclimation problems. As a result, once your child
    has obtained a financial aid package from a school, be sure to ask the financial
    aid officer how long the current aid package will be offered or, absent that,
    whether your child can easily transfer credit hours to another school if they
    become uncomfortable at the institution.'
