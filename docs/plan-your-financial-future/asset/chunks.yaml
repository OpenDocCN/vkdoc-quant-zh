  trans: '

    ### 合格个人住宅信托


    接下来，我们来看第二种涉及度假屋的规划技术：合格个人住宅信托（`QPRT`）。在`QPRT`中，度假屋必须作为第二套个人住宅使用。因此，你在一年内的任何时间段都不能将度假屋出租。如此一来，如果你随后设立了`QPRT`并将度假屋作为其信托财产或本金的一部分，你就有可能将住宅的公允市场价值从总遗产中剔除，并避免就该价值缴纳遗产税。


    `QPRT`技术的运作机制如下：


    1.  在遗产规划律师的协助下设立一个`QPRT`。

    2.  将度假屋的所有权重新登记到`QPRT`受托人的名下。

    3.  规定你在若干年内享有该住宅的使用权。请注意：如果你在拥有使用权期间去世，去世时该住宅的价值将被计入并作为你总遗产的一部分进行征税。

    4.  在保留使用权期限结束时，将住宅所有权转移给信托条款中指定的一个或多个受益人（通常是你的成年子女）。


    你也可以约定，信托受益人在保留期结束后将度假屋回租给你。在这种情况下，尽管住宅的价值将从你的总遗产中剔除，但信托受益人将需要申报应纳税的租赁收入。不过，你可以通过支付租金进一步减少你的总遗产金额。例如，假设你
    65 岁，处于较高的遗产税边际税率等级，并设立了一个`QPRT`，将一套度假屋作为信托财产注入。你保留了 15 年的度假屋使用权，即直到你 80 岁。如果你在
    80 岁之前去世，住宅的公允市场价值将计入你的总遗产。但如果你在信托期限后仍然健在，住宅的价值将完全从你的总遗产中剔除。此外，如果你仍希望使用该住宅，可以在
    80 岁时与作为信托受益人的家庭成员签订一项公平的租赁协议。


    请仔细考虑设立`QPRT`的实际后果。如果你设立了信托但未能存活过信托期限，你的税务状况并不会比什么都不做更糟。因此，仅凭设立信托的成本，你就有可能享受到可观的潜在遗产税节省。此外，你还保护了你的财富，使其免于承受对其在你去世时进行分配的常见主要威胁之一：税收的征收。


    ## 投资意外之财：假如你中了彩票！


    除了中彩票，你还有其他方式获得意外之财或经历一笔意外收入。其中包括获得一笔巨额遗产、收到一笔意外的奖金，或在一场大额诉讼中胜诉获得赔偿。不过，当大多数人听到“意外之财”这个词时，他们想到的还是中了彩票。当你得知自己仅花了一两美元的投资，却持有了幸运中奖号码后，你会怎么做？


    以下是管理意外财富的三条实用建议：


    *   **不要告诉任何人——最重要的是，不要告诉媒体！** 这能让你在不受他人指使的情况下，就如何投资这笔意外之财做出重要的财务决策。这条规则的一个明显例外是，你确实需要咨询金融和法律专业人士，了解如何最好地进行投资。

    *   **决定如何最好地接收这笔钱——也就是，一次性领取还是分期领取。** 如果你倾向于挥霍，那就选择分期领取的方式。反之，如果你认为自己是一个相当不错的投资者和储蓄者，你可能希望一次性领取。无论如何，这两种付款方式都需要立即缴纳所得税，因此你实际到手的税后金额会大幅减少。

    *   **至少暂时将这笔钱投资于货币市场共同基金或储蓄账户**，这样你可以轻松动用，又不必担心损失本金。这能让你有时间与财务专家会面，商讨如何根据你的短期和长期需求进行投资。此外，这有助于避免你在突然获得巨款、兴奋得可能影响判断力时，立即做出糟糕的投资决策。


    记住一条债务管理的基本原则：**立即偿还高息债务**，例如信用卡利息。有了这么一大笔意外之财，你应该能够彻底还清信用卡，并为未来的所有支出支付现金。


    本章结束了本书中关于如何在生前分配积累财富的章节。当然，每个人一生中仍有一个不可避免的事件：死亡。这便引出了本书的下一部分，内容涵盖如何在去世时分配财富，以及遗产规划的主题。


    # 第六部分

    去世时的财富分配


    # 19. 遗产规划


    现在，我们来到了一个人财务生活（以及就此而言，物质生活）的最后阶段：死亡。在本章中，我们将讨论如何在你去世时将财富分配给配偶、家庭成员或其他指定的个人或慈善机构。遗产规划以及个人去世时资产的分配，最好被视为
    PADD 流程最后一步的第二个组成部分：在你去世时分配你一生积累的财富，以使他*人受益。


    大多数人将遗产规划视为毕生致力于避免可能产生的巨额（有人会说是惩罚性的）遗产税的任务，但遗产规划的意义远不止于此。更准确地说，这个过程可以被描述为在适当的时间，以适当的数量，将个人的财产有效地分配给其继承人或受益人。在这里，“适当的数量”通常意味着在你继承人之间进行最理想的分配；然而，对于高净值人士而言，这个术语具有特殊含义，他们必须以一种对转让税有效的方式来分配其遗产资产。与此同时，“适当的时间”不仅指被继承*人去世时，也指他们仍然在世的时候。生前赠与是一种审慎且有效的方式，可以试分配你的财富，观察你预期的继承人如何管理和使用你给予他们的财产。如果你不喜欢预期受益人使用你赠与资产的方式，在大多数情况下，你都有机会修改你的遗产计划。


    一般来说，无论人们是否认为自己在去世时需要缴纳遗产税，每个人都应该准备好某些遗产规划文件。几乎所有个人都应该拥有的遗产规划文件包括：


    *   一份最后遗嘱与遗嘱证明

    *   一份财务持久授权书

    *   一份医疗或健康护理持久授权书（也称为医疗保健代理人委托书）

    *   一份关于医疗和外科治疗的声明（通常称为生前遗嘱）

    *   一份个人指示信


    我们从最后遗嘱与遗嘱证明开始，具体讨论这些文件，并总体介绍遗产规划流程。

    '
- fmt: '# Do I Need a Will?


    The short answer to the question of whether you need a will is yes! Regardless
    of your personal and financial circumstances, a last will and testament allows
    you to express how you wish your property to be distributed to your beneficiaries
    when you die. The writing of a will also permits you to name an individual of
    your choosing to administer your estate at your death.


    If you do not do either of these things, your estate will probably be distributed
    not only how the state in which you reside when you die wants it to be, but also
    by whom this state chooses to administer your estate. This process, known as `intestate
    succession`, can be summarized as the execution of the will that the state has
    already written for you. If you do not like the state’s will—to the extent that
    you even know what that is—the private writing of a will to carry out your personal
    wishes in the manner you deem fit is a prudent estate-planning technique.


    The writing of a will is particularly critical for a young married couple with
    minor children, because a will is the primary document that allows them the opportunity
    to name a guardian for their children. It is not necessary to name a guardian
    if one of the natural parents is still living when the other dies. But what about
    the unfortunate circumstance in which both natural parents die in a common disaster
    or accident? In that event, the court (known here as the probate court) names
    a guardian if a will is not in place. If either set of grandparents of the minor
    children is alive, they may be a likely choice. But what if your parents (the
    children’s grandparents) are in poor health or do not reside close to you at your
    death? If this is the case, the court will probably look to a sibling to assume
    the guardianship role. If neither a grandparent nor a sibling (or any other family
    member) is close by, or even exists, the court will look to a trusted friend or
    perhaps a foster family. Regardless, as a young married individual, if you do
    not wish for the court to decide the fate of your minor children, be proactive
    and write a will providing for a guardian.


    Keep in mind, however, that parents must do more than just name a guardian for
    minor children in their will. Your parent or sibling may be able to assume the
    guardianship role for your minor children, but what if this individual is not
    good at handling the money you leave them for the children’s care? If this is
    the case, you may wish to consider including a trust in your will for the purposes
    of receiving and investing the money on behalf of the children for later distribution.
    You need to name a trustee for this trust—but remember: the skills necessary to
    effectively perform the legal duty of a trustee are not the same as those of a
    guardian. In other words, the empathetic skills of a person suited to be a guardian
    and the financial skills most important for a trustee may not be present in the
    same person or family member. As such, you may wish to name a separate individual
    for each role. If you do, make sure these individuals can work together effectively.
    After all, you will not be there to serve as a go-between if your guardian and
    trustee do not get along, and your minor children may suffer the consequences!


    If you do include a trust in your will for the benefit of your children (known
    in estate planning as a `contingent trust`, because it takes effect only on the
    contingency of the simultaneous death of both parents), you need to change all
    your beneficiary designations to include the name of the trustee. It is particularly
    important to name the trustee as the contingent or secondary beneficiary of a
    life insurance policy on your life; otherwise, the insurance company will need
    to obtain a probate court order allowing it to pay out the proceeds to the trustee.
    Moreover, under the laws of all states, a minor cannot take title to property
    in their own name. If you have left property to a minor child in your will and
    have not named a guardian, the court must appoint a guardian to receive the property
    on the child’s behalf. All things considered, it is much easier to complete the
    necessary components of estate planning while you are alive so as to avoid these
    consequences.


    Given its importance, why do many individuals never write a will? For two primary
    reasons:


    - Writing a will reminds us of our own mortality, a topic that many people do
    not wish to consider.

    - Many people believe the writing of a will is prohibitively expensive.


    With respect to overcoming the first objection, consider the situation in which
    you may leave your survivors if you do not write a will. More than likely, your
    survivors will want your passing to be as easy as possible on them—and knowing
    that they have been provided for in your will give them great comfort. Further,
    if you have gone so far as to establish a trust in your will, you may direct the
    disposition of your property at a time when you believe it will be most appropriate
    for your survivors. This is colloquially known as “speaking from the grave,” and
    the more direction you give in your estate-planning documents, the louder you
    speak!


    The cost objection to writing a will is often resolved by investigating your alternatives.
    For example, most attorneys charge a flat fee for drafting a will, with this charge
    varying according to the amount of drafting that must be done. A simple will,
    or one that does not involve any estate-tax planning, may not cost more than several
    hundred dollars—or even less, if it is part of a package of estate-planning documents
    drafted by the attorney. In addition, many web sites now have standardized wills
    and other estate-planning documents that you may wish to consider using.'
