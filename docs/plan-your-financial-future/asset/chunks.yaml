  trans: '

    # 金融资产与实物资产：哪个更胜一筹？


    通过投资金融资产和实物资产，个人创造了大量财富（即 PADD 流程中的积累环节）。然而，这一过程并非零和博弈。每种资产类型所涉及的财富积累技巧并不相互排斥。


    有些投资者倾向于只投资金融资产或只投资实物资产，而非两者兼顾。普遍原因是这些投资者投资于自己理解的资产（或有人让他们相信自己理解了），或者他们只对这两大类资产中的某一类感到安心。然而，如果你了解自己承担不同风险的能力，你可能会希望同时投资金融资产和实物资产。历史表明，在主要以金融资产组成的投资组合中加入实物资产，可以改善多元化并降低整体风险。请记住：财富积累的目标不仅是实现尽可能高的年化收益率，还要在尽可能低的风险下实现这一目标！因此，你可以考虑投资那些看起来更像金融资产的房地产投资（例如，`REIT`就是一种投资于房地产及物业的共同基金）。或者，你也可以投资由房地产开发公司和住宅建筑商发行的证券。


    无论你决定只投资金融资产、只投资实物资产，还是两者都投，都不要忘记这条基本的投资原则：如果你不了解一项潜在投资，就不应该用自己辛苦赚来的钱去投资它！在始于
    2007 年 12 月的上一次经济衰退之前，一些投资者忽视了这条基本规则，将资金大量投入诸如信用违约互换之类的奇异衍生品投资，他们既未认识到其潜在风险，也不理解其复杂性。


    现在，让我们转向一个投资者和非投资者都非常感兴趣的话题：如何购买住房并充分利用使用资产来积累财富。有效管理使用资产是下一章的重点，并以此结束我们对 PADD
    流程第二步（财富积累技巧）的探讨。之后，我们将通过有效的税务管理来捍卫这些来之不易的财富。


    # 投资于使用资产


    如果你回想财务规划过程中首次编制个人财务报表的时刻，你会注意到你的住房和汽车被正确地列为使用资产，而非投资。尽管某些使用资产（尤其是豪华汽车或古董收藏品）可能带有盈利动机，但购买此类资产通常是为了让你能够高效且愉快地使用它们。


    ## 将住房视为投资


    你的住房对你而言可能意义重大，其中最重要的便是提供充足且舒适的住所。此外，拥有自己的住房是美国梦的重要组成部分。然而，你的主要居所或住房不应被视为一项投资——也不应像许多婴儿潮一代所依赖的那样，成为退休规划的工具。


    如第 3 章所述，研究表明，在考虑维护和改善成本后，住宅房地产的年均实际回报率仅为 1.62%。此外，将过多的净资产集中于某一项资产（如你的住房）通常并非明智的财务规划。我们在第
    9 章和第 10 章讨论了投资金融资产和实物资产时多元化的重要性，然而，现在及退休时，仍有数以百万计的个人将其净资产的约 60%仅押注于一项资产：即其住房的权益。


    据《华尔街日报》报道，房主在购房成本之外，很容易再花费高达购房价格三倍的额外费用，例如按揭利息、房产税以及主要的房屋改善工程。举例来说，如今一位购房者以 30
    年期固定利率按揭贷款购买一套价值 30 万美元的独栋住宅，仅按揭利息一项最终就会支付相当于房屋价格本身的金额。再加上 30 年的房产税、持续的房屋维护以及几次重大的房屋维修或改善，购房的总成本可能接近
    100 万美元。


    这是否意味着你不该买房而该租房？不，绝非如此！自 2007 年开始的全国性房地产市场崩盘以及随后的历史性按揭利率下调以来，如今美国部分地区买房比租房更便宜。然而，房屋所有权的成本确实促使我们需要用一种新的方法来分析当初为何购房。


    房屋是少数不违反债务管理基本规则的资产之一：只为可能增值的资产而负债。尽管许多城市目前面临住房危机，但从长期来看，取决于地理位置，房屋的价值通常确实会上涨。如前所述，你可能已经多次支付了初始购房款；因此，正如《华尔街日报》所建议的，将出售房屋所得的款项视为你所花费资金的一种返还。换句话说，你花在房屋维护和改善上的数千美元中的一部分，最终在出售房屋时得以收回。


    让我们根据联邦住房企业监管办公室（`OFHEO`）的一项研究，看看截至 2007 年的 30 年期间房屋所有权的平均成本。`OFHEO`假设 1977 年一栋独栋住宅的购买价格为
    5 万美元（略高于当时全国房价中位数 4.88 万美元）。然后，它计算了通过 30 年期固定利率按揭贷款融资购房的总成本，并将其与全现金购房的总成本进行比较。根据`OFHEO`的数据，到
    2007 年，该房屋的名义年复合回报率约为 6.04%，价值已增值至 29.05 万美元。（请注意，根据联邦住房贷款抵押公司，即`Freddie Mac`的数据，1983
    年至 2013 年期间，房屋所有权的年均复合回报率下降至 3.60%。）1977 年 30 年期固定利率按揭贷款的平均利率为 8.72%，并假设房主处于 33%的边际所得税等级。表
    11-1 显示了拥有这栋房屋的成本。


    ```

    表 11-1.

    30 年（1977–2007 年）房屋所有权平均成本

    ```

    '
- fmt: '|   | Mortgage Financing | All Cash |

    | --- | --- | --- |

    | Down payment/cash price | $10,000 (20% down) | $50,000 |

    | Principal of loan | $40,000 | -0- |

    | Interest at 8.72%: $112,796 total less $40,000 principal = $72,976 interest
    | $50,000 ($72,976 times (1 – 0.33, or 0.67))(rounded up) | -0- |

    | Taxes and insurance ($3,000 per year) | $90,000 | $90,000 |

    | Ongoing maintenance ($150 per month) | $54,000 | $54,000 |

    | Major repairs and home improvements | $150,000 | $150,000 |

    | Total Costs | $394,000 | $344,000 |

    | Sale value | $290,500 | $290,500 |

    | Net Profit/(Loss) | ($103,500) | ($53,500) |


    There are several striking facts to recognize when analyzing this table. The first
    is that even an all-cash purchaser suffered a dollar loss over the 30-year period
    of home ownership (although not as much as the borrower, after itemizing their
    mortgage interest deduction). The second is that the net loss in both instances
    could have been turned into a net profit if not nearly as much money was expended
    on major repairs and home improvements. This speaks to the next major point we
    need to make with respect to home ownership: exercise as much financial discipline
    as possible over the controllable aspects of the purchase and ongoing ownership
    of your home.


    Specifically, as a prospective home purchaser and owner, you have control over
    two significant home-owning costs: the amount of interest you pay and the extent
    of home improvements you make. Under the new tax law, beginning after December
    31, 2017 and before January 1, 2026, the deduction for mortgage interest is limited
    to underlying "acquisition indebtedness" of up to $750,000 (down from the previous
    $1 million). So, that is still a good tax break for most of us! However, if you
    make your scheduled mortgage payments only in accordance with the amortization
    schedule, you are making little progress on paying down the loan principal on
    the typical 30-year loan. Thus, doubling up on payments and paying off the mortgage
    as quickly as you can results in considerable savings. Another option, if you
    can afford it, is to finance the purchase of the home with a 15-year fixed-rate
    mortgage rather than the standard 30-year note.


    Limiting the number of home improvements you make is even more challenging, but
    the fact is that few improvements will pay off for you at the time of sale. Studies
    have shown that a new kitchen or bathroom returns the greatest rebate at the time
    of sale, but even those improvements do not often return all of the money expended.
    In addition, beware the temptation to add a backyard swimming pool or dog run
    to your home. The next buyer of your house may not have children or a dog, so
    these additions can be disadvantageous at the time of sale, not advantageous.
    Furthermore, a swimming pool can be an "attractive nuisance" to neighborhood kids,
    and if one of them falls in the pool and is injured, you will likely be sued,
    particularly if you did not enclose the pool.


    In addition to accelerating your mortgage payments and limiting the extent of
    your home improvements, you can adopt several other planning strategies with respect
    to managing your home as a use asset:


    * Adopt a different attitude. Treat your home like any other consumer purchase,
    and buy it at as low a price as possible. Monitor price trends in your local housing
    market closely, and when there is a dip in the market, consider houses to be on
    sale. Buy then if you can. When tracking home values, web sites such as [`www.zillow.com`](http://www.zillow.com)
    can be helpful.

    * Stay put as long as possible. Be a "buy-and-hold" home purchaser as long as
    possible. The average homeowner lives in their home only seven years before moving
    on, usually to a more expensive residence. Depending on your area and market conditions,
    this probably is not long enough to ensure a net profit when you eventually sell.

    * Pay as much cash as possible. If you can afford an all-cash purchase, doing
    so is preferable; but absent that, make as much of a down payment as you can.
    A large down payment limits the amount of principal you have to borrow and interest
    you have to pay.

    * Be careful about refinancing. Yes, if you refinance, you will lower your monthly
    payment, but you also extend the time of your loan and thus add to your total
    interest payments. If you are going to refinance, consider going from a 30-year
    fixed-rate mortgage to a 15-year fixed-rate mortgage (especially as you grow closer
    to your planned retirement date).

    * Stay away from interest-only mortgages. This is not so much a cash-management
    tool as it is straightforward, practical advice. Many individuals who finance
    their home purchases with interest-only mortgages buy more house than they can
    afford and thus probably pay too much. Interest-only mortgages contradict the
    first strategy of paying as little for the house as you can.

    * Diversify, diversify, diversify! After accelerating your mortgage payments,
    take whatever money you have left and make sure you are contributing as much as
    possible to your employer''s 401(k) retirement plan and any personal retirement
    savings vehicles, such as traditional or Roth IRAs. But don''t go overboard: if
    you can pay off your house before you retire, you will increase your cash flow
    considerably and enjoy your retirement years that much more.'
