  trans: '

    ### 旅行与休闲


    正如第 16 章 所述，为退休储蓄的标准经验法则是，争取积累相当于退休前总收入的约 75%，以供退休后使用。这一数字基于以下假设：退休后您的储蓄会减少、税负会降低，并且不再需要通勤（或极少通勤）。但如果在您的退休目标中，包括了频繁旅行或大量投入因工作而推迟的休闲活动，那么您是否应该争取积累超过退休前总收入
    75% 的储蓄呢？


    研究表明，即使旅行和休闲的开销有所增加，您为退休生活所作预算的上限，很可能也应控制在退休前总收入的 90% 以内。即便如此，如果退休前您的年收入平均达到 10
    万美元，这意味着您需要（在考虑通胀因素后）按今天的购买力，为每年 9 万美元的开销进行储蓄。这可不是一笔小数目。但请记住，通常情况下，旅行和休闲并不会大幅增加退休所需的资金总额。大多数退休人员最常低估的开支，其实是退休期间的医疗保健费用。


    根据联邦税法，您在退休期间产生的一些旅行费用或许可以抵扣所得税。但这些旅行开支必须主要用于医疗护理，且是其必要组成部分。因此，前往州外专业医疗机构（如明尼苏达州的梅奥诊所或纽约市的斯隆-凯特琳纪念医学中心）的旅行费用，可能在一定限额内获得抵扣。为了符合这些限额，您不能扣除旅途中的餐费，并且住宿费用的扣除额也限制在非奢侈、非铺张的范围内。然而，即使您能通过这些测试，仍可能无法申请抵扣，除非您的医疗费用总额（在扣除任何健康保险报销后）在
    2018 年超过了您调整后总收入（`AGI`）的 7.5%。鉴于这些限制，您在寻求大多数非灾难性医疗护理时，能获得旅行费用抵扣的可能性很小。类似地，一些纳税人曾试图从税款中扣除冬季在温暖地区居住的费用，理由是他们的医生建议这样做有益健康。想法不错，但美国最高法院已裁定这类费用主要属于个人性质而非医疗性质，从而驳回了普通纳税人的此类抵扣请求。


    ### 适应变化


    对许多退休人员来说，退休最困难的部分并非我们目前讨论的内容，而是一个简单的事实：他们的日常生活改变了。例如，退休前，每天早上起床，你都有地方可去，有事可做！退休后，这种日常作息会发生巨大的变化。


    就像你需要为退休的经济方面做准备一样，你也需要为退休带来的生活方式变化做好准备。有许多研讨会和讲习班可以帮助你处理退休问题和作为退休人员的生活，但你在退休时面临的最重要的生活方式挑战，是为你的生活建立一个新的目标。这可能很简单，比如为你的子女或孙辈提供支持，也可能涉及从事兼职工作。无论你做什么，你都应该努力保持良好的身体健康并保持思维活跃。保持思维活跃并不一定意味着要写出下一部伟大的美国小说，但它确实意味着锻炼你的心智是充实退休生活不可或缺的一部分。同时，在退休岁月里，请尽可能多地培养友谊，因为研究表明，有家人和朋友围绕的退休人员通常会感到更快乐。


    如果你能接受变化，并有望从中获益，你很可能就会成为那 90% 的美国人中的一员——他们表示对自己的退休生活感到满意，并且对退休后所做出的生活方式选择感到幸福。


    本章和前一章讨论了可能每个人都最关心的财务目标：个人退休。但就像生活一样，个人理财过程并非如此简单，因为不同的人可能有不同——或其他的——理财规划目标。这些目标可能包括创办自己的企业、购买第二套住房，以及最终出售一套大幅增值的个人住宅。这些目标将是下一章的重点。


    # 18. 规划其他终身财务目标


    尽管大多数人的首要财务目标是规划舒适的退休生活，但您可能还有其他希望在财富分配过程中实现的财务目标。这些目标可能包括创办自己的企业（并可能在之后出售该企业）、购买和出售个人住宅、购买第二套住房或度假屋，或者投资一笔意外之财，例如彩票奖金或巨额遗产。本章将依次探讨所有这些目标，并在可能的范围内（您实际上无法计划赢得彩票）讨论如何实现它们。


    ## 创办自己的企业


    企业家一词在《`韦氏词典`》中定义为“组织、管理并承担企业风险的人”。这听起来像是您会喜欢的事情吗？如果是，那您并不孤单，因为许多不同年龄段的人（尤其是刚刚开始退休的婴儿潮一代）都怀有创办自己企业的梦想。然而，根据美国小企业管理局的数据，一个令人遗憾的事实是，大约
    56% 的初创企业在五年内倒闭。另有 33% 在开始运营的两年内失败。因此，您的企业成功的机会大约为 45%。


    关于如何避免成为失败的企业主，已有众多著作。总结所有这些观点，成功创办自己的企业归结于贯穿理财规划和财富管理全过程的那句老生常谈：您必须为成功做好规划。


    以下是被普遍认同的五个步骤，您可以在创业时参考，以助力成功：


    1.  在您了解的行业、技能或服务领域创业。

    2.  撰写商业计划书。

    3.  考虑您的企业经营形式。您希望以独资企业、合伙企业、公司还是有限责任公司的形式运营？

    4.  招募那些具有与您不同优势的人加入企业。

    5.  如果传承企业（通常是传给家人）对您很重要，请提前考虑好如何将企业传递给他人。

    '
- fmt: '### Begin a Business with What You Already Know


    According to a study by the Kaufmann Foundation, a center for research and education
    for entrepreneurs, people ages 55 to 64 are more likely than those in any other
    age group to start their own business. In part, this is because these individuals
    are retiring or getting close to retiring from the workforce and are preparing
    for their retirement years. It is also because people of this age group have readily
    transferable skills that can help them start and grow their own business.


    For example, if you have worked for all or the majority of your career in product
    development, who knows more than you about that particular product and how it
    may be adapted to the broader consumer market? Alternatively, if you have worked
    in sales for the duration of your career, who knows better than you how to sell
    this or some other product? Meanwhile, if you are younger than 55, starting your
    own business may be more difficult, because you probably have not accumulated
    sufficient financial resources and expertise to do so.


    Regardless of your specific area of expertise, all successful entrepreneurs share
    several common characteristics. Among these are a take-charge attitude, organizational
    skills, and enormous self-confidence in their own abilities. In addition, for
    lack of a better description, entrepreneurs are skilled at thinking outside the
    box. They are able to think creatively about other potential uses for a given
    product or service. Bill Gates, for instance, was told many times that consumers
    would have no need for personal computers (PCs), yet he persisted in his vision
    that consumers would accept and subsequently demand access to this technology.
    In essence, what Bill Gates saw was not the physical box that was to become the
    PC, but rather what that box could do for people to make their lives easier. As
    such, he proved his ability to think outside the box and is among the richest
    men in the world because of it.


    ### Write a Business Plan


    A critical mistake that many young entrepreneurs make is failing to write a business
    plan before they open the doors of their new business. Just as it is troublesome
    to structure your personal finances without first having written a forward-looking
    budget, it is terribly difficult to operate a business profitably if you do not
    anticipate where that business is going—and what risks you have to assume to get
    it there.


    Not only is a well-thought-out business plan key to operational success, but it
    is also an important document for raising business capital. It is unlikely that
    you will be able to fully finance your start-up and its first few years of business
    operation out of your own pocket, particularly if you are young. Instead, you
    will probably have to seek capital from friends or family or—more likely—a bank.
    And guess what? Most banks will not lend you the necessary money before they have
    seen and analyzed your business plan. Similarly, if you seek financing from a
    venture capitalist or a private equity group of investors, they are exceedingly
    likely to ask you to prove to them in writing how you intend to grow the business
    and what untapped niche your product or service will fill in the marketplace.
    A business plan forces you to think about the answers to these questions.


    The components of a business plan are up to you, but among the more common parts
    are the following:


    *   A detailed description of your product or service

    *   A marketing plan and strategy

    *   The management team you plan to assemble

    *   Financial plans and projections

    *   Timelines for accomplishing certain metrics

    *   An analysis of the potential problems and risks you will encounter when bringing
    your product or service to market, including a competitive SWOT (strengths, weaknesses,
    opportunities, and threats) analysis


    Estimates of start-up costs and profit-and-loss projections for the next three
    to five years should also be included, as should a break-even financial analysis.
    Many web sites and books are available to assist you in drafting and implementing
    a business plan, so refer to them often and before you begin business operations.


    After you take the time to write a thorough and complete business plan, you may
    decide that you don''t want to start the business after all. In that case, the
    business plan served its purpose: it convinced you that the time is not right
    to begin your business and that perhaps you should think again before pursuing
    your entrepreneurial dream.


    ### Consider the Form of Business Operation


    Often, business plans outline the form of operation that the business will take.
    This is particularly true if you plan to start the business with partners. Under
    law, if a business is to have two or more owners, it cannot take the form of a
    sole proprietorship (the most common form of business operation today). Instead,
    a multiple-owner business must be a partnership, a regular (also known as a C)
    corporation, an S corporation, or the increasingly popular limited liability company
    (LLC), which is now permitted in all 50 states. Note that all states also permit
    the formation of a one-member LLC in lieu of a sole proprietorship.


    Commonly, any potential business owner should consider three primary formational
    issues before beginning business operations:


    *   The possibility of incurring personal liability for any business acts or operations

    *   The ease of the business entity''s formation and its ability to assist the
    owner in raising capital

    *   The income-tax consequences of operating the business in a particular form


    Briefly, the following three sections detail concepts to think about with respect
    to each of these issues.


    #### Possibility of Personal Liability


    In both the regular and S corporation forms of doing business, as well as in the
    LLC form, the business owner''s liability is limited to the amount they have invested
    in the business. Conversely, in the sole-proprietorship and general-partnership
    forms of conducting business, the owner or partner retains unlimited personal
    liability for all acts of the business; in other words, no distinction is made
    between the business entity and the business owner or owners. As a result, the
    business''s creditors (including the bank) may foreclose on the owner''s personal
    assets to satisfy any outstanding obligations.


    It is currently possible in all states to operate your business like a sole proprietorship
    but otherwise limit your personal liability. This may be done by structuring a
    one-owner business as a single-member LLC. The LLC entity may be formed relatively
    easily by filing standard documents with your Secretary of State or other prescribed
    office and declaring that you wish to operate as a single-member LLC. Alternatively,
    a business attorney can advise you of the consequences of conducting your business
    in this form.'
  raw: '### Begin a Business with What You Already Know


    According to a study by the Kaufmann Foundation, a center for research and education
    for entrepreneurs, people ages 55 to 64 are more likely than those in any other
    age group to start their own business. In part, this is because these individuals
    are retiring or getting close to retiring from the workforce and are preparing
    for their retirement years. It is also because people of this age group have readily
    transferable skills that can help them start and grow their own business.


    For example, if you have worked for all or the majority of your career in product
    development, who knows more than you about that particular product and how it
    may be adapted to the broader consumer market? Alternatively, if you have worked
    in sales for the duration of your career, who knows better than you how to sell
    this or some other product? Meanwhile, if you are younger than 55, starting your
    own business may be more difficult, because you probably have not accumulated
    sufficient financial resources and expertise to do so.


    Regardless of your specific area of expertise, all successful entrepreneurs share
    several common characteristics. Among these are a take-charge attitude, organizational
    skills, and enormous self-confidence in their own abilities. In addition, for
    lack of a better description, entrepreneurs are skilled at thinking outside the
    box. They are able to think creatively about other potential uses for a given
    product or service. Bill Gates, for instance, was told many times that consumers
    would have no need for personal computers (PCs), yet he persisted in his vision
    that consumers would accept and subsequently demand access to this technology.
    In essence, what Bill Gates saw was not the physical box that was to become the
    PC, but rather what that box could do for people to make their lives easier. As
    such, he proved his ability to think outside the box and is among the richest
    men in the world because of it.


    ### Write a Business Plan


    A critical mistake that many young entrepreneurs make is failing to write a business
    plan before they open the doors of their new business. Just as it is troublesome
    to structure your personal finances without first having written a forward-looking
    budget, it is terribly difficult to operate a business profitably if you do not
    anticipate where that business is going—and what risks you have to assume to get
    it there.


    Not only is a well-thought-out business plan key to operational success, but it
    is also an important document for raising business capital. It is unlikely that
    you will be able to fully finance your start-up and its first few years of business
    operation out of your own pocket, particularly if you are young. Instead, you
    will probably have to seek capital from friends or family or—more likely—a bank.
    And guess what? Most banks will not lend you the necessary money before they have
    seen and analyzed your business plan. Similarly, if you seek financing from a
    venture capitalist or a private equity group of investors, they are exceedingly
    likely to ask you to prove to them in writing how you intend to grow the business
    and what untapped niche your product or service will fill in the marketplace.
    A business plan forces you to think about the answers to these questions.


    The components of a business plan are up to you, but among the more common parts
    are the following:


    *   A detailed description of your product or service

    *   A marketing plan and strategy

    *   The management team you plan to assemble

    *   Financial plans and projections

    *   Timelines for accomplishing certain metrics

    *   An analysis of the potential problems and risks you will encounter when bringing
    your product or service to market, including a competitive SWOT (strengths, weaknesses,
    opportunities, and threats) analysis


    Estimates of start-up costs and profit-and-loss projections for the next three
    to five years should also be included, as should a break-even financial analysis.
    Many web sites and books are available to assist you in drafting and implementing
    a business plan, so refer to them often and before you begin business operations.


    After you take the time to write a thorough and complete business plan, you may
    decide that you don’t want to start the business after all. In that case, the
    business plan served its purpose: it convinced you that the time is not right
    to begin your business and that perhaps you should think again before pursuing
    your entrepreneurial dream.


    ### Consider the Form of Business Operation


    Often, business plans outline the form of operation that the business will take.
    This is particularly true if you plan to start the business with partners. Under
    law, if a business is to have two or more owners, it cannot take the form of a
    sole proprietorship (the most common form of business operation today). Instead,
    a multiple-owner business must be a partnership, a regular (also known as a C)
    corporation, an S corporation, or the increasingly popular limited liability company
    (LLC), which is now permitted in all 50 states. Note that all states also permit
    the formation of a one-member LLC in lieu of a sole proprietorship.


    Commonly, any potential business owner should consider three primary formational
    issues before beginning business operations:


    *   The possibility of incurring personal liability for any business acts or operations

    *   The ease of the business entity’s formation and its ability to assist the
    owner in raising capital

    *   The income-tax consequences of operating the business in a particular form


    Briefly, the following three sections detail concepts to think about with respect
    to each of these issues.


    #### Possibility of Personal Liability


    In both the regular and S corporation forms of doing business, as well as in the
    LLC form, the business owner’s liability is limited to the amount they have invested
    in the business. Conversely, in the sole-proprietorship and general-partnership
    forms of conducting business, the owner or partner retains unlimited personal
    liability for all acts of the business; in other words, no distinction is made
    between the business entity and the business owner or owners. As a result, the
    business’s creditors (including the bank) may foreclose on the owner’s personal
    assets to satisfy any outstanding obligations.


    It is currently possible in all states to operate your business like a sole proprietorship
    but otherwise limit your personal liability. This may be done by structuring a
    one-owner business as a single-member LLC. The LLC entity may be formed relatively
    easily by filing standard documents with your Secretary of State or other prescribed
    office and declaring that you wish to operate as a single-member LLC. Alternatively,
    a business attorney can advise you of the consequences of conducting your business
    in this form.'
  trans: '

    ### 用你已有的知识开启事业


    根据考夫曼基金会（一家致力于企业家研究和教育的机构）的研究，55 岁至 64 岁的人群比任何其他年龄段的人更有可能创办自己的企业。这部分是因为这些人正在退休或即将退出劳动力市场，并为退休生活做准备。此外，这个年龄段的人通常拥有易于转换的技能，可以帮助他们创办并发展自己的企业。


    例如，如果你在职业生涯中全部或大部分时间都从事产品开发工作，那么还有谁比你更了解该特定产品，以及如何使其适应更广泛的消费市场？或者，如果你整个职业生涯都在从事销售工作，那么还有谁比你更懂得如何销售这个或某个其他产品？与此同时，如果你小于
    55 岁，创业可能会更加困难，因为你可能尚未积累足够的财务资源和专业知识。


    无论你的具体专业领域是什么，所有成功的企业家都有几个共同特征。其中包括掌控全局的态度、组织能力以及对自身能力的巨大自信。此外，借用一句恰当的描述，企业家们擅长跳出固有思维模式。他们能够创造性地思考某个特定产品或服务的其他潜在用途。例如，比尔·盖茨曾多次被告知消费者不需要个人电脑（PC），但他坚持自己的远见，认为消费者会接受并随后需求这项技术。本质上，盖茨看到的不是将要成为
    PC 的那个物理盒子，而是那个盒子能为人们做些什么，从而使他们的生活更便捷。因此，他证明了自己跳出固有思维模式的能力，并因此成为世界上最富有的人之一。


    ### 撰写商业计划书


    许多年轻企业家犯的一个关键错误是，在开启新业务之前没有撰写商业计划书。正如不先制定前瞻性的预算就难以安排个人财务一样，如果你不预判企业的发展方向——以及为实现这一目标必须承担的风险——就很难实现盈利运营。


    一份深思熟虑的商业计划书不仅是运营成功的关键，也是筹集商业资本的重要文件。你很可能无法完全自掏腰包来为初创企业及其最初几年的运营提供资金，尤其是当你还年轻时。相反，你可能需要向朋友或家人寻求资金，或者更可能的是向银行贷款。你猜怎么着？大多数银行在查看并分析你的商业计划书之前，不会借给你所需的资金。同样，如果你寻求风险资本家或私募股权投资者的融资，他们极有可能要求你以书面形式证明你打算如何发展业务，以及你的产品或服务将填补市场中哪个尚未开发的利基。商业计划书迫使你去思考这些问题的答案。


    商业计划书的组成部分可由你自己决定，但比较常见的部分包括：


    *   对你的产品或服务的详细描述

    *   营销计划和策略

    *   你计划组建的管理团队

    *   财务计划和预测

    *   完成特定指标的时间表

    *   对将产品或服务推向市场时可能遇到的潜在问题和风险的分析，包括竞争性的 SWOT（优势、劣势、机会和威胁）分析


    还应包括对启动成本的估算以及未来三到五年的损益预测，以及盈亏平衡财务分析。有许多网站和书籍可以帮助你起草和实施商业计划书，因此在开始业务运营之前，请经常参考它们。


    在你花时间撰写了详尽完整的商业计划书之后，你可能会决定根本不想创业了。在这种情况下，商业计划书已经达到了它的目的：它让你相信，现在不是创业的合适时机，或许在追求你的创业梦想之前，你应该再考虑一下。


    ### 考虑企业运营形式


    通常，商业计划书会概述企业将采取的运营形式。如果你计划与他人合伙创业，这一点尤其重要。根据法律，如果一个企业有两个或以上的所有者，它就不能采取独资企业（当今最常见的企业运营形式）的形式。相反，多所有者企业必须是合伙企业、普通公司（也称为
    C 类公司）、S 类公司，或者日益流行的有限责任公司（LLC），后者如今在美国所有 50 个州都允许设立。请注意，所有州也允许成立单一成员有限责任公司，以替代独资企业。


    通常，任何潜在的企业主在开始业务运营之前都应考虑三个主要的组建问题：


    *   因任何商业行为或运营而产生个人责任的可能性

    *   商业实体组建的便利性及其帮助所有者筹集资金的能力

    *   以特定形式运营企业所涉及的所得税后果


    简而言之，以下三个小节详细阐述了关于每个问题需要思考的概念。


    #### 个人责任的可能性


    无论是在普通公司、S 类公司形式下，还是在 LLC 形式下，企业主的责任都仅限于他们在企业中的投资额。相反，在独资企业和普通合伙企业形式下，所有者或合伙人对企业的所有行为承担无限个人责任；换句话说，商业实体与企业所有者之间没有区别。因此，企业的债权人（包括银行）可以没收所有者的个人资产来偿还任何未偿债务。


    目前，在所有州，你都可以像经营独资企业一样运营你的业务，但又能限制你的个人责任。这可以通过将一人企业构建为单一成员 LLC 来实现。通过向你的州务卿或其他指定办公室提交标准文件，并声明你希望以单一成员
    LLC 的形式运营，就可以相对容易地组建 LLC 实体。或者，商业律师可以就以此种形式运营业务的后果为你提供建议。

    '
- fmt: '#### Ease of Formation and Ability to Raise Capital


    The `sole-proprietorship` approach to conducting business is the easiest to form.
    No formal documents are required by the state, and you may simply hang out a sign
    and open your doors to business (although in some cases you may need a state license
    to conduct the business). However, the relative ease with which you can form a
    sole proprietorship should be balanced against the assumption of personal liability
    that is inherent in operating your business in this manner.


    There is also no written agreement necessary to conduct your business as a general
    partnership. Nonetheless, it is generally prudent to spell out the obligations
    and capital contributions of each partner before the partnership begins operation.
    At some point in the future, the partnership may dissolve and dispose of partnership
    assets and obligations, and this process generally proceeds much more smoothly
    if the possibility was considered at the time of commencing business operations.


    The regular and S corporation forms of doing business both require the filing
    of articles of incorporation with the state. Note that an S corporation is simply
    a regular corporation that has elected to be taxed as a partnership for income-tax
    reasons. If you plan to do business as a corporation, you need to seek the services
    of an attorney. Although it is possible to form a corporation or LLC on your own
    without legal assistance, consulting with an attorney before you do so is generally
    advisable.


    With respect to raising capital for the business, there is one clear winner among
    the various forms of business operation: the regular or C corporation. That is
    because this type of corporation may issue both common and preferred stock shares
    and solicit financing from the public through the sale of such shares (an initial
    public offering, or IPO). Nonetheless, given the complexity of forming a business
    as a regular or C corporation, not to mention the double taxation of corporate
    income, most start-up businesses shy away from corporate organization, at least
    initially. It is interesting to speculate, however, given the sizable reduction
    in C corporation tax rates in the 2017 TCJA (from a maximum rate of 35 percent
    to 21 percent) how many entrepreneurial businesses may choose to incorporate anyway
    beginning in 2018.


    #### Income-Tax Consequences


    Fortunately, all business entities, with the exception of the regular corporation,
    may be categorized as flow-through entities for income-tax purposes. This means
    all business income and losses are reported on the owner’s individual tax return—not
    through the filing of a separate tax return. Because most start-up businesses
    experience losses in their first few years of operation, the impact of added business
    income on your individual tax return probably will not be significant. But the
    attribution of tax losses that you can take as a business owner on your tax return
    may assist greatly with your cash-flow needs. Remember, in many cases the cash
    flow of the business and of the business owner are one and the same. Unlike capital
    losses, which are restricted to no more than a $3,000 income-tax deduction in
    any one calendar year, ordinary businesses losses are fully deductible without
    limitation. As such, a loss may be incurred by the business in one year and offset
    against the business owner’s other taxable income in that same year.


    For example, assume that you have elected to conduct business as a sole proprietorship
    and experience a business loss of $10,000 in your first year of operations (after
    considering any income you received from the business). You report all of this
    loss on Schedule C of IRS Form 1040 and offset any other nonbusiness income by
    the $10,000 loss. You can do this regardless of whether you itemize your deductions
    for income-tax purposes.


    The one exception to flow-through tax rules is the regular or C corporation form
    of doing business. If you conduct business this way, a separate tax return, with
    the application of a separate set of tax brackets, is required. As with individual
    tax rates and brackets, corporate tax rates are progressive in nature. As such,
    it is possible to have some corporate income taxed at a lower marginal tax rate
    than that of the corporation’s shareholders. Keep in mind, however, that this
    advantage is usually offset by the fact that corporate income is double taxed:
    once at the corporate entity level and again when it is paid out in the form of
    a dividend to shareholders. In addition, business losses may be taken by only
    the separate corporate taxable entity and may not be applied against the owner’s
    individual taxable income.


    ### Recruit Individuals with Different Strengths


    It is unlikely that you (or any other potential business owner, for that matter)
    possess the myriad skills necessary to conduct and grow your business in the way
    you anticipated when you first drafted your business plan. In reality, you probably
    need the services of others to ensure the success of your business. As such, you
    should try to recruit individuals to your business with strengths and skills that
    are different from your own, to fill any gaps that may arise as you develop and
    operate your business. For example, if you possess strengths in product development,
    you should hire someone with the marketing skills to sell that product. If you
    can sell, you need to ensure that the product you are selling is of the utmost
    quality, so seek out someone who is skilled at product development.


    ### Plan for Business Succession


    It is estimated that 70 percent of family businesses do not survive the transition
    from the original founder or founders to a second generation of family members.
    Why? Because most business founders fail to plan for the succession of their business.
    Although the failure to plan for succession may be due in part to the founder’s
    temperament (for example, when the founder acts as if they are immortal and succession
    will never occur), perhaps the major reason founders fail to plan for the succession
    of their business is that they just do not wish to talk about the possibility
    of their eventual death or disability.


    One way to preemptively address the eventual succession of your business is to
    include provisions for possible successor owners in your business plan before
    you begin operations. Doing so has the advantage of forcing you to think about
    how you will pass on the business to others without the attendant pressure of
    developing a formal estate plan. The most probable successor owner is a family
    member who either previously worked in the business or has indicated an interest
    in taking it over. But a trusted non-family-member employee with many years of
    experience in the business is also potentially a worthy successor.


    Regardless, if you want the business to continue after your death or disability,
    you must develop a business-succession plan. This should be accomplished in as
    tax-efficient a manner as possible for the sake of the business seller (usually
    a senior family member) and the buyer (usually a junior or younger-generation
    family member). Accountants and tax attorneys may provide an invaluable service
    in this regard and should be consulted as early as possible in the business-succession
    process.


    ## Buying a Personal Residence


    The tax implications of buying and selling a personal residence were addressed
    in Chapter [11](#A314864_2_En_11_Chapter.html). The discussion here focuses on
    saving enough money to buy a home (particularly a first home) and the types of
    mortgages available to finance such a large purchase.'
