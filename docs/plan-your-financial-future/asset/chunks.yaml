- fmt: '## Your Own Physical or Mental Incapacity


    `Disability` and `incapacity` are frequently used interchangeably, but the terms
    differ. `Disability` refers to a contractual status, whereas `incapacity` is a
    legal status. You are typically disabled if a contractual definition, such as
    that included in a disability income insurance policy, says you are. However,
    you are incapacitated or incompetent to act only if the law says you are.


    An example of a legally incapacitated person is a minor or child who has not yet
    reached the age of legal majority. Such an individual cannot take legal title
    to property and can execute only what is known as a `voidable contract`, meaning
    that when they turn 18 (or reach the state’s legal age of majority), the child
    can revoke the terms of any contract that was previously signed. For this reason,
    financial and other institutions often require a parent’s co-signature on any
    contract entered into with a minor.


    An individual who suffers from Alzheimer’s disease would also be considered legally
    incapacitated. Such an individual may be physically fine, at least for some period
    of time after the initial diagnosis is made, but mentally they may not have the
    legal capacity to act. Someone must act on their behalf. Typically, this surrogate
    is a close family member (usually the spouse) who was granted `power of attorney`
    by the Alzheimer’s patient while they were still competent. This leads to an important
    point in planning for your own or your parent’s possible legal incapacity: the
    `power of attorney` must be executed while the author (or principal) is still
    legally competent. How do you determine legal competence? Usually, it is done
    by asking the author’s primary physician to render an oral or written opinion
    that the author is legally competent at the time of granting the power. Absent
    a positive affirmation from a physician, or if a `power of attorney` is never
    completed, the family must ask the local court to appoint someone as the legal
    guardian of their incapacitated loved one.


    Is one type of `power of attorney` preferable to another? Yes. Under the property
    laws of every state, the principal’s authority to grant someone else the right
    to act on their behalf terminates at the date the principal becomes legally incapacitated
    (for example, they become so severely demented that they do not readily understand
    the consequences of their actions). What’s more, when the principal most needs
    their `power of attorney` (or agent) to act, the individual with `power of attorney`
    is legally prohibited from doing so. To avoid these consequences, you should always
    seek to execute a `durable power-of-attorney` form, which specifically includes
    in its language that the power of the agent to act continues even after the principal
    is declared legally incompetent. Again, if this language is not included in the
    `power-of-attorney` form, family members will be forced to request court intervention.


    If you execute a `durable power-of-attorney` form for yourself or your parent,
    you have a choice with respect to the date that you request your agent to act
    on your behalf. You can grant the agent the right to act immediately (a `nonspringing
    durable power of attorney`) or postpone this right until you, the principal, are
    declared legally incompetent (a `springing durable power of attorney`). Although
    many authors or principals are concerned about giving someone else the ability
    to act immediately with respect to their financial affairs, as a practical matter,
    the agent named is almost always a close family member. Typically, if you are
    married at the time of executing the power, your spouse is named as the agent.
    Many authors therefore draft a `nonspringing durable power` and continue conducting
    their own affairs as if the power was never granted. This avoids the inherent
    problem presented in the drafting of any `springing durable power`, where someone
    (usually, the concurring opinion of two physicians) must determine when you have
    become legally incompetent.


    You may want to execute a `durable power of attorney` to plan for your own possible
    legal incapacity, but there is often a practical problem with third-party acceptance
    of the document. This is particularly the case with financial institutions that
    either want you to execute their own `durable power-of-attorney` form or refuse
    to recognize an outdated form. To avoid this issue, you should adopt the following
    two measures:


    - Have an attorney draft the broadest possible `durable power-of-attorney` form
    in the hopes that all conceivable actions that the financial institution may require
    of your agent are covered by the power.

    - Periodically (every three years or so) reexecute the `durable power-of-attorney`
    signature page; this ensures that the form is executed while you are still legally
    competent to grant the power.


    Most states provide for the execution of two `durable power-of-attorney` forms:
    a `general durable power-of-attorney` form for property or financial management,
    and a `medical or health care durable power-of-attorney` form. This second form
    is intended for you to grant authority to an agent (again, usually a close family
    member) to give informed consent to any needed medical procedure on your behalf
    if you are unable to do so. Some states allow the inclusion of `living-will` provisions
    in the `medical durable power-of-attorney` form, whereas others require two separate
    documents. However, of the two documents (`living will` and `medical durable power-of-attorney`),
    the `medical durable power` is likely the more important, because it is much broader
    and covers additional health-care situations in which terminal illness is not
    the diagnosis. A sample `general durable power-of-attorney` form is included in
    Appendix C. You may wish to adopt it or discuss adopting it with your attorney.


    We now move on to planning for the distribution of wealth to others, including
    yours via the retirement-planning process. The next chapter considers wealth distribution
    via a similarly important financial goal for many parents: planning for your child’s
    higher or post-secondary education.


    # Part V

    Distributing Wealth During Your Lifetime'
  raw: '## Your Own Physical or Mental Incapacity


    Disability and incapacity are frequently used interchangeably, but the terms differ.
    Disability refers to a contractual status, whereas incapacity is a legal status.
    You are typically disabled if a contractual definition, such as that included
    in a disability income insurance policy, says you are. However, you are incapacitated
    or incompetent to act only if the law says you are.


    An example of a legally incapacitated person is a minor or child who has not yet
    reached the age of legal majority. Such an individual cannot take legal title
    to property and can execute only what is known as a voidable contract , meaning
    that when they turn 18 (or reach the state’s legal age of majority), the child
    can revoke the terms of any contract that was previously signed. For this reason,
    financial and other institutions often require a parent’s co-signature on any
    contract entered into with a minor.


    An individual who suffers from Alzheimer’s disease would also be considered legally
    incapacitated. Such an individual may be physically fine, at least for some period
    of time after the initial diagnosis is made, but mentally they may not have the
    legal capacity to act. Someone must act on their behalf. Typically, this surrogate
    is a close family member (usually the spouse) who was granted power of attorney
    by the Alzheimer’s patient while they were still competent. This leads to an important
    point in planning for your own or your parent’s possible legal incapacity: the
    power of attorney must be executed while the author (or principal) is still legally
    competent. How do you determine legal competence? Usually, it is done by asking
    the author’s primary physician to render an oral or written opinion that the author
    is legally competent at the time of granting the power. Absent a positive affirmation
    from a physician, or if a power of attorney is never completed, the family must
    ask the local court to appoint someone as the legal guardian of their incapacitated
    loved one.


    Is one type of power of attorney preferable to another? Yes. Under the property
    laws of every state, the principal’s authority to grant someone else the right
    to act on their behalf terminates at the date the principal becomes legally incapacitated
    (for example, they become so severely demented that they do not readily understand
    the consequences of their actions). What’s more, when the principal most needs
    their power of attorney (or agent) to act, the individual with power of attorney
    is legally prohibited from doing so. To avoid these consequences, you should always
    seek to execute a durable power-of-attorney form, which specifically includes
    in its language that the power of the agent to act continues even after the principal
    is declared legally incompetent. Again, if this language is not included in the
    power-of-attorney form, family members will be forced to request court intervention.


    If you execute a durable power-of-attorney form for yourself or your parent, you
    have a choice with respect to the date that you request your agent to act on your
    behalf. You can grant the agent the right to act immediately (a nonspringing durable
    power of attorney) or postpone this right until you, the principal, are declared
    legally incompetent (a springing durable power of attorney). Although many authors
    or principals are concerned about giving someone else the ability to act immediately
    with respect to their financial affairs, as a practical matter, the agent named
    is almost always a close family member. Typically, if you are married at the time
    of executing the power, your spouse is named as the agent. Many authors therefore
    draft a nonspringing durable power and continue conducting their own affairs as
    if the power was never granted. This avoids the inherent problem presented in
    the drafting of any springing durable power, where someone (usually, the concurring
    opinion of two physicians) must determine when you have become legally incompetent.


    You may want to execute a durable power of attorney to plan for your own possible
    legal incapacity, but there is often a practical problem with third-party acceptance
    of the document. This is particularly the case with financial institutions that
    either want you to execute their own durable power-of-attorney form or refuse
    to recognize an outdated form. To avoid this issue , you should adopt the following
    two measures:


    *   Have an attorney draft the broadest possible durable power-of-attorney form
    in the hopes that all conceivable actions that the financial institution may require
    of your agent are covered by the power.

    *   Periodically (every three years or so) reexecute the durable power-of-attorney
    signature page; this ensures that the form is executed while you are still legally
    competent to grant the power.


    Most states provide for the execution of two durable power-of-attorney forms:
    a general durable power-of-attorney form for property or financial management,
    and a medical or health care durable power-of-attorney form. This second form
    is intended for you to grant authority to an agent (again, usually a close family
    member) to give informed consent to any needed medical procedure on your behalf
    if you are unable to do so. Some states allow the inclusion of living-will provisions
    in the medical durable power-of-attorney form, whereas others require two separate
    documents. However, of the two documents (living will and medical durable power-of-attorney),
    the medical durable power is likely the more important, because it is much broader
    and covers additional health-care situations in which terminal illness is not
    the diagnosis. A sample general durable power-of-attorney form is included in
    Appendix C. You may wish to adopt it or discuss adopting it with your attorney.


    We now move on to planning for the distribution of wealth to others, including
    yours via the retirement-planning process. The next chapter considers wealth distribution
    via a similarly important financial goal for many parents: planning for your child’s
    higher or post-secondary education.


    # Part V

    Distributing Wealth During Your Lifetime'
  trans: '

    ## 个人身体或精神上的无行为能力


    `Disability`（伤残）和`incapacity`（无行为能力）常被互换使用，但二者有所不同。`Disability`指合同状态，而`incapacity`是法律状态。如果合同定义（如伤残收入保险单中的规定）认定你伤残，你通常就属于伤残状态。然而，只有法律认定你无行为能力或无法自主行事时，你才属于法律上的无行为能力。


    法律上无行为能力的典型例子是尚未达到法定成年年龄的未成年人或儿童。此类个体无法合法拥有财产所有权，只能签署所谓的`可撤销合同`，这意味着当他们年满 18 岁（或达到所在州的法定成年年龄）时，可以撤销此前签署的任何合同条款。正因如此，金融机构及其他机构在与未成年人签订合同时，往往要求父母共同签署。


    患有阿尔茨海默病的人也会被视为法律上无行为能力。此类个体可能在身体上无大碍（至少在最初确诊后的一段时间内），但在精神上可能不具备合法的行为能力。必须有人代为行事。通常，这一代理人是由阿尔茨海默病患者在其尚具行为能力时授予了`授权委托书`的直系亲属（一般是配偶）。这引出了在为自己或父母的潜在法律无行为能力做规划时的一个重要要点：`授权委托书`必须在委托人（或授权人）仍具法律行为能力时签署。如何判定法律行为能力？通常的做法是请委托人的主治医生出具口头或书面意见，表明委托人在授权时具有法律行为能力。若无医生的明确确认，或从未签署过`授权委托书`，则家属必须请求当地法院指定某人为其无行为能力的亲人担任法定监护人。


    不同类型的`授权委托书`是否有优劣之分？答案是肯定的。根据各州的财产法，委托人授权他人代为行事的权利，在委托人被依法宣告无行为能力之时（例如，严重痴呆导致无法理解自身行为后果）即告终止。此外，当委托人最需要其`授权委托书`（或代理人）行事时，持有`授权委托书`的人在法律上却被禁止这样做。为避免这些后果，你应始终力求签署一份`持久授权委托书`，其条款明确载明：即使委托人被宣告无法律行为能力，代理人的授权依然持续有效。再次强调，如果`授权委托书`表格中未包含此条款，家属将被迫请求法院介入。


    如果你为自己或父母签署了`持久授权委托书`，你可以选择要求代理人代为行事的生效日期。你可以授权代理人立即行事（`即时生效的持久授权委托书`），也可以将这一权利推迟到委托人（即你本人）被宣告无法律行为能力之时（`附条件生效的持久授权委托书`）。尽管许多委托人担心让其他人立刻有权处理自己的财务事务，但实际操作中，指定的代理人几乎总是直系亲属。通常，如果你在签署委托书时已婚，配偶会被指定为代理人。因此，许多委托人会起草一份`即时生效的持久授权委托书`，同时继续自行处理事务，仿佛从未授权过，从而避免了起草任何`附条件生效的持久授权委托书`时固有的问题——即需要有人（通常是两位医生的共同意见）来判断你何时已丧失法律行为能力。


    你可能希望通过签署`持久授权委托书`为自己可能的无法律行为能力做规划，但在第三方认可文件方面常常存在实际问题。金融机构尤其如此，它们要么要求你签署其自有的`持久授权委托书`表格，要么拒绝承认过时的表格。为避免这一问题，你应采取以下两项措施：


    - 请律师起草一份尽可能广泛的`持久授权委托书`，以期涵盖金融机构可能要求代理人执行的所有可预见的行动。

    - 定期（大约每三年）重新签署`持久授权委托书`的签字页；这可确保在你仍然具有法律行为能力时完成签署。


    大多数州允许签署两种`持久授权委托书`表格：一种是用于财产或财务管理的`普通持久授权委托书`，另一种是`医疗或健康护理持久授权委托书`。第二种表格旨在让你授权代理人（同样通常是直系亲属）在你无法自行同意时，代为对任何必要的医疗程序做出知情同意。有些州允许在`医疗持久授权委托书`表格中包含`生前遗嘱`条款，而其他州则要求两份独立文件。然而，在这两份文件（`生前遗嘱`和`医疗持久授权委托书`）中，`医疗持久授权委托书`可能更为重要，因为它适用范围更广，涵盖了不属于绝症诊断的其他医疗保健情况。附录
    C 中包含了一份`普通持久授权委托书`样本。你可以考虑采用它，或与你的律师讨论采用事宜。


    下面，我们将转向通过退休规划过程向他人（包括通过你自身）分配财富的规划。下一章将探讨许多父母的另一项同等重要的财务目标：为孩子的高等教育或中学后教育做规划的财富分配方式。


    # 第五部分

    在有生之年分配财富

