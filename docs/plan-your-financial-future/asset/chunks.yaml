    于 20xx 年 ____ 月 ____ 日，________，经本人（或通过令本人满意的证据）确认为上述文件中提及之人，亲自出现在本人面前，本人系在上述州和县内执业之公证员，其承认自愿并根据文件中所述目的自由签署了该文件。


    本人任期至：____________


    （印章）


