    # 现金流与债务管理


    出于财务审慎原则，你应设立一笔应急或备用基金以应对意外支出。该基金应持有流动资产（即可快速变现且价值不会大幅缩水的资产），金额相当于三至六个月的生活开支。（例如，若你每月平均支出为
    5000 美元，你应在支票账户、储蓄账户、货币市场账户或共同基金中持有至少 15000 美元——即 5000 美元乘以 3——的应急基金。）该基金的规模取决于你的职业性质以及收入的稳定性（或波动性）。对于没有雇主提供福利（如病假或个人事假）作为安全保障的自雇人士，应考虑设立更大规模的基金来弥补收入损失。


    然而，设立应急基金时存在一种投资权衡。这种权衡体现在：资金若以更保守的现金等价物形式持有，将获得较低的投资回报率。因此，你可考虑向银行申请无担保信贷额度或房屋净值信贷额度，作为应急基金资产的替代方案。请注意：若采用此方案，必须在财务危机发生前就安排好信贷额度。例如，若你（因任何原因）失业，银行不太可能再为你提供任何信贷。此外，若你将信贷额度用作应急基金，并在失业后需要动用该额度，你将背负更多债务——这很可能是在你失去收入来源时最不想面对的事。


    接下来让我们谈谈一个要么是巨大悲剧、要么是成功故事（取决于你如何看待它）的话题——普通消费者的债务水平。


    我们在媒体上经常读到许多美国人储蓄率为负的报道。这很糟糕吗？这取决于具体情况。债务分为良性债务和不良债务。良性债务通常是指为购买可能增值的资产而承担的任何债务——例如，你的住房或美国部分地区的不动产。更具体地说，良性债务是指你为某项资产借款时，所承担的利率低于该资产能带来的投资回报率。另一个例子（在股市上涨期间）是：为购买个股或共同基金而产生的保证金利息，而你从该项投资中可能获得的回报远高于需向经纪人支付的费用。


    不良债务是指为购买可能贬值的资产而承担的任何债务，例如新车或汽车。另一种不良债务是信用卡债务，它不仅利率极高（平均年利率 18%至 21%），而且会逐月"循环"，导致难以完全清偿。汽车贷款和信用卡债务都存在所得税方面的劣势：由于它们被视为个人或消费债务，所支付的利息通常不可抵扣，因此不会减少你的年度所得税负债。


    那么该如何减少不良债务呢？显而易见的答案是首先避免承担此类债务（例如用现金购买新车），但这往往不切实际。以下是一些经过验证的减债技巧：


    -   专注于一种不良债务，暂不考虑其他。例如，制定一个还清信用卡债务的还款计划与金额——并坚持执行！将其视为另一种形式的自我投资：若信用卡年利率为 18%，则相当于获得
    18%的投资回报率。（但这并不意味着信用卡是好的投资工具。）

    -   合并或重组你的债务。最常见的例子是大学生或研究生将多笔小额贷款合并为一笔大额贷款。虽然这并不能消除债务，但通常能减少总债务偿还额（利息）。

    -   从你的现金价值人寿保险或`401(k)`计划中借款。这些替代方案的优势在于，你本质上是向自己借钱。但请谨慎行事：你需要及时偿还这笔钱，否则将减少未来可支付的人寿保险金额和退休计划福利。若你在人寿保险单贷款尚未还清时去世，保险公司将仅向指定受益人支付保单收益减去未偿还贷款余额后的金额。同样，若你在离职时仍有未还清的`401(k)`贷款余额，公司通常只会在你的最后工资或遣散费中支付净额，或者要求你在发放最终工资前先清偿贷款余额。

    -   改用借记卡。借记卡的操作方式与 ATM 机非常相似，因为资金会立即从你的支票账户中扣除。虽然借记卡不能阻止你过度消费，但它能让你比使用传统信用卡时更迅速地面对现金流的后果。


    最后，需要反复强调：糟糕的现金流与债务管理可能使你走向财务崩溃。幸运的是，信用咨询师和一些理财规划师可以帮助你减轻债务负担。如果你认为自己存在债务问题，那么很可能确实如此！如果你无法解决这个问题，本书中讨论的财富积累技巧将需要更长的时间才能为你发挥作用——如果它们能起作用的话。

    '
- fmt: '# Monitor Your Progress and Life-Cycle Planning


    How often you review your financial progress depends on your age and the time
    frame you have specified to meet your financial goals. In most cases, an annual
    review is sufficient. This may be done with or without the assistance of a professional
    financial planner. (The question of whether you need a financial planner is addressed
    in the next chapter.) If you go it alone, ask yourself the following questions:


    - What life cycle or life stage are you in? Are your short- and long-term goals
    representative of peers in the same financial-planning cycle or stage? In other
    words, are your financial goals realistic?

    - Have these goals remained the same throughout the review period?

    - Are you living at or below your means?

    - How much money did you save during the review period?

    - With respect to your savings, are you earning the investment rates of return
    you need to meet your goals?

    - Has anything changed in your personal and financial situation that may cause
    you to reconsider either the priority of the financial goals you established or
    the time frame in which you anticipate meeting them?


    It is generally agreed that there are four financial-planning life cycles. Although
    there are no hard-and-fast ages at which an individual transitions from one life
    cycle to the next, certain financial goals are typically more important than others
    during each stage.


    The first of these stages is the accumulation stage (between ages 25 and 45 for
    most consumers). In this stage, individuals are usually in the early-to-middle
    years of their employment career and often raising young children. Typically,
    their net worth is relatively small, and their debt load may be excessive, normally
    due to student or personal loan obligations. Their major financial goals are likely
    to be reducing their debt, buying a house, and beginning the financing of their
    children’s higher education.


    The next of the financial-planning life cycles is the consolidation stage (ages
    45 to 62 or other normal retirement age). In this stage, individuals are typically
    past the midpoint of their careers and are likely approaching their peak wage-earning
    years. Most, if not all, of their debts have been paid off and their net worth
    is growing rapidly. Their children are in college or graduate school, and those
    expenses have also been satisfied or are in the course of payment. Financial goals
    for individuals in the consolidation stage of life are likely to include making
    home improvements, taking a dream vacation, buying a luxury car or vacation home,
    and minimizing income taxes.


    The third life-cycle stage, the spending phase (ages 62 to 90), is sometimes combined
    with the fourth phase, the gifting phase. The spending phase is characterized
    by the individual’s approaching retirement or the early years of retirement. In
    this phase, their peak earning years have likely concluded and, from an investment
    perspective, the focus turns from growth to income. The individual’s children
    have likely begun their own careers and have moved from the family home. Financial
    goals for individuals in the spending stage shift to early retirement, retirement
    with adequate income, and, perhaps, the starting of their own business.


    Finally, the fourth and final life-cycle phase, the gifting phase, is synonymous
    with an individual’s retirement years. Excess assets, if any, may be used to benefit
    family members during life or in the event of the individual’s death. Estate planning
    becomes important in this phase, and as such a primary financial goal is the minimization
    of transfer (estate and gift) taxes. Also characteristic of this phase is a conservative
    investment approach and withdrawal rate, due to the fear of outliving the amount
    of retirement monies the individual has saved.


    Now, let’s proceed to an often-asked question: Do I need a professional financial
    planner to help me get control of my financial life, or can I do it myself? The
    answer to this question is the focus of the next chapter.


    # Do You Need a Financial Planner?


    Often, the first question in the personal financial-planning process is, “Do I
    need help (that is, should I engage the services of a personal financial planner)?”
    or, alternatively, “Can I complete the process myself?” The answer to this latter
    question is sometimes “Yes,” simply because of the desire to avoid the anticipated
    expense involved in securing the help of a professional planner. But is this the
    best decision? This chapter describes the types of financial planners, and questions
    to ask them when deciding to seek assistance, as well as factors to be considered
    should you choose the do-it-yourself option.'
