- fmt: 'If you are unable to self-fund the payment of your long-term care, you might
    consider turning to Medicaid, which is a joint federally and state-funded program
    for low-income and low-net-worth individuals providing for both health and long-term
    care. To qualify for coverage, applicants must meet income and asset tests as
    determined by the state where they live.


    Some relatively wealthy individuals have attempted to deliberately qualify for
    long-term Medicaid coverage by “spending down” their assets and income to the
    specified level. However, a series of laws dating back to the 1980s have curtailed
    this activity, notably through the implementation of a look-back period in which
    most assets that are gifted to others (“spent down”) are not ignored. For example,
    individuals who transfer assets to family members (usually members other than
    their spouse) during a period of 60 months prior to applying for Medicaid may
    find themselves penalized and prohibited from receiving Medicaid assistance for
    a significant period of time. For this reason, if you can afford to self-fund
    your long-term care, relying on government assistance to help you with these expenses
    may not be the most prudent planning alternative. On the other hand, if you have
    otherwise been attempting to qualify for Medicaid assistance but find that you
    must unexpectedly enter a nursing home, consider purchasing a long-term care insurance
    policy to cover the requisite look-back period. This means that the applicable
    benefit period of the policy will likely have to be at least five years before
    you apply for Medicaid coverage.


    As a final alternative to long-term care insurance, check to see if your state
    of residence has adopted a so-called filial support law with respect to long-term
    care expenses. Such a law may be used to require reimbursement by a patient’s
    family for unpaid long-term care expenses incurred by a family member. Currently,
    30 states have such a law, but the laws are becoming more prevalent, given the
    rapidly increasing Medicaid expenses paid out by states on behalf of insured individuals.


    This leads us back to the possible purchase of a long-term care insurance policy.
    If you believe that family or personal circumstance might warrant the purchase
    of such a policy, here are some factors you should consider:


    - When (at what age) should I buy the policy? The guideline is that you should
    purchase a long-term care policy while you are still relatively healthy and young,
    but not so young as to pay premiums for an inordinate period of time. Generally,
    the optimal time to purchase a long-term care insurance policy is around age 55,
    as you are approaching your retirement years but can still qualify for policy
    coverage without major health questions.

    - What type of long-term care are you likely to need? Certainly, skilled nursing
    care is not desired by anyone, but payment for home health care services is likely
    an objective of most prospective purchasers. You may wish to purchase a long-term
    care insurance policy just to provide for this possibility.

    - How much can you afford to pay for long-term care? The answer to this question
    usually determines what the elimination period under the policy will be and how
    long you can make payments before the private insurance coverage becomes effective.

    - What is your attitude with respect to leaving an estate for your spouse or children?
    Nothing can decimate the size and distribution of your accumulated estate to others
    more quickly than a prolonged stay in a nursing-home facility. Accordingly, the
    purchase of a long-term care insurance policy may be thought of as a stopgap measure
    to preserve at least some portion of your estate.


    We have now covered one of the biggest potential threats to your ability to accumulate
    wealth: unanticipated medical expenses for which you have no means of payment.
    The next chapter deals with another major threat to your ability to become wealthy:
    the threat of losing your earning power. This type of risk can be managed by the
    purchase of an individual disability policy, likely among the most needed form
    of insurance in today’s marketplace.


    # 6. Insuring Your Earning Power


    Ask any financial planner or insurance agent what the most neglected or underinsured
    financial risk is, and they are likely to say the risk of losing your ability
    to earn a living. Most individuals do not give sufficient attention to this possibility
    and, if they do, believe that they are adequately covered. They believe they will
    never lose their earning power! However, according to the Commissioner’s Individual
    Disability Table A, one in three working Americans will suffer some form of disability
    that lasts at least 90 days before they reach the age of 65. In addition, one
    in seven employees will be disabled for five or more years prior to their retirement.
    You are two to three times more likely to become disabled during your working
    career than you are to die during this same period. These are impressive (and
    somewhat frightening) numbers.


    Many individuals believe they are adequately insured against the loss of future
    earning power because they are covered by a group disability income policy at
    their place of employment. However, this belief has two major flaws:


    - Most employer policies replace only 50–60 percent of your monthly income.

    - The replacement income provided by this benefit is likely income-taxable, because
    the employer paid the cost of the insurance premium while you were working. In
    turn, this means you will receive less than the 50–60 percent of monthly income
    promised to you.


    How can this often-forgotten risk be adequately covered? Most commonly through
    the purchase of an individual disability income policy.'
