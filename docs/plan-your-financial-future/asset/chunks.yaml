    # 13. 转移税规划与管理


    当个人积累财富后，他们在财务规划过程中的动机不仅转向如何保护或捍卫这些财富，还包括如何分配财富。因此，本章将解释赠与行为及其在转移税规划与管理中的优势。许多人认为转移税（赠与税和遗产税）规划只与超高净值纳税人相关，但事实并非如此。例如，你是否知道每年可以赠与每位受赠人
    `$15,000`，无论你的净资产有多少，且无需提交联邦赠与税申报表 `IRS Form 709`？同样重要的是，你是否知道一旦超过这个 `$15,000`
    限额，法律通常要求你提交联邦赠与税申报表？没错，如果你在同年早些时候已经用完了 `$15,000` 的限额，那么即使圣诞节礼物也需要包含在该申报表中。


    本章还探讨了如何在去世时最大限度地减少应税遗产。尽管美国国会曾就废除遗产税（有时被称为死亡税）进行过大量讨论，但它依然存在——并且在未来数年很可能以某种形式继续存在。我们将在本书第
    5 部分更详细地讨论财富分配，但生前赠与的妙处在于它能一次性完成 PADD 流程中的两个步骤：通过转移税来捍卫财富，以及为了他人（通常是配偶和子女）的利益分配财富。


    ## 生前赠与的优势


    你可能出于多种原因进行赠与。其中包括个人原因，例如帮助有紧急财务需求的家庭成员或密友。你也可能有税务方面的动机进行赠与。虽然生前赠与（慈善捐赠除外）不能产生所得税扣除，但它确实能将赠与财产所产生的收入转移给他人。许多税务规则限制将收入直接转让给他人，但如果你赠与的是能产生收入的资产（如股票、债券或房地产），那么未来就该资产收益缴纳所得税的是受赠人，而非你本人。


    根据赠与税规则，有三种方式可以向他人赠与而无需担心缴纳赠与税。第一种已经提及：自 2018 年起，你每年可以向任意数量的受赠人每人赠与最多 `$15,000`。严格来说，每位受赠人的
    `$15,000` 免税额被称为**赠与税年度免税额**。例如，如果你有十个子女，每年最多可以赠与 `$150,000`（`$15,000` 乘以 10），而无需向联邦政府报告这些赠与。但需谨慎：信不信由你，有些纳税人过于关注减少所得税和遗产税负债，以至于在做出赠与前忘了问一个基本问题——我能否在不牺牲自身未来财务安全的前提下承担这笔赠与？


    第二种进行生前赠与的方式是将资产或财产转移给你的配偶或合格慈善机构。与赠与其他人不同，你可以向配偶或合格慈善机构进行价值无限的赠与。尤其是在涉及遗产税规划的情况下，向配偶或合格慈善机构赠与可能在财务上有利，因为赠与的财产将完全从你去世时的应税遗产中移除。然而，正如你将在本章后面看到的，如果你的配偶是受赠人，且他们自身已经拥有高净值（或预计很快会如此），这可能会给他们带来进一步的遗产税问题。


    第三种谨慎的生前赠与方式是支付亲人的教育或医疗费用。但此类赠与款项需直接支付给教育机构或医疗服务提供者，而非间接通过受赠人转交。如果受赠人是中间人，则适用
    `$15,000` 或其他按年通胀调整的限额，而非直接支付给机构或提供者时的无限额可能。


    如果你通常每年向任何受赠人赠与超过 `$15,000` 的金额，法律要求你提交赠与税申报表，并将超出部分抵扣至 2018 年底总额为 `$11.2` 百万（指数化后的
    `$10` 百万）的终身免税额。做出超过年度允许限额的赠与会产生两个后果：


    - 你开始消耗总计 `$11.2` 百万的终身免税额。一旦终身应税赠与超过 `$11.2` 百万，你将需要自掏腰包缴纳联邦赠与税。

    - 你所作赠与的赠与税价值（赠与时的财产公平市场价值）将作为调整后的应税赠与纳入遗产税计算，即增加你去世时的潜在应税遗产额。


    例如，假设你在 2018 年将增值股票赠与成年儿子。赠与时的股票公平市场价值为 `$100,000`。因此，你做出了 `$85,000`（`$100,000`
    减去 `$15,000`）的应税赠与，需要提交联邦赠与税申报表。这样一来，你的终身免税额还剩 `$11,115,000`（`$11.2` 百万减去 `$85,000`）。这笔
    `$85,000` 的应税赠与也会在你去世时加入应税遗产。但好消息是，这笔赠与的应税价值被锁定在该金额，不会增长到去世时的公平市场价值（因为你不再拥有该股票）！换句话说，你已将赠与财产未来的任何增值从应税遗产中移除。在此例中，假设你赠与儿子的
    `$100,000` 股票在 20 年后你去世时增值至 `$600,000`。那么 `$500,000`（`$600,000` 减去 `$100,000`）的增值金额已永远从你遗产未来的转移税中移除。


    你应注意，2017 年的《减税与就业法案》（TCJA）将终身赠与免税额从指数化的 `$5.6` 百万翻倍至 `$11.2` 百万，自 2018 年起生效。绝大多数人可能永远无需缴纳联邦赠与税。但事实依然是，高净值人群，尤其是小企业主，最有可能向家庭成员进行赠与；实际上，这类人群正是国会最初征收赠与税（及遗产税）的目标群体！


    让我们回到如何最大化利用 `$15,000` 年度赠与税免税额。在先前的例子中，十个子女每人受赠 `$15,000`，赠与人立即从应税遗产中移除了 `$150,000`，且无需提交赠与税申报表或担心减少其
    2018 年的 `$11.2` 百万终身免税额。这种策略在遗产规划中被称为**系统性年度赠与计划**，旨在尽可能利用多个赠与税年度免税额，向尽可能多的受赠人赠与，以减少赠与人的应税遗产。因此，作为转移税规划技术，你应首先考虑采用系统性赠与计划，在每个日历年年初根据自身能力进行尽可能多的年度免税额赠与。'
- fmt: '## Gifts to Minors


    If you are going to make gifts to a minor (someone who is under the state-specified
    age of legal majority, usually 18), you have to be concerned not only about gift-tax
    laws, but also about state property laws. Minors cannot take title to property
    in the same way individuals of legal majority—adults—can. Instead, minors must
    take title through custodial arrangements as specified by each state. Historically,
    custodial arrangements have also been a common method of saving for a child’s
    college education, as discussed in Chapter [15](#A314864_2_En_15_Chapter.html).


    There are two basic types of custodial arrangements: those provided by the Uniform
    Gifts to Minors Act (`UGMA`) and those provided by the Uniform Transfers to Minors
    Act (`UTMA`). In many states, `UTMA` has superseded the previously enacted `UGMA`
    and is now the approved form for making property transfers to minors. Under both
    uniform laws, the minor is given title to property, but the property is managed
    by a custodian, usually the parent or grandparent of the minor. This custodian
    then invests and manages the gifted property on behalf of the minor and does not
    own the property in any respect. As such, the custodial arrangement is similar
    to a trust on behalf of the minor, but it lacks the complexity and cost of implementing
    the trust document.


    All states have simple forms to title property gifted to a minor in a custodial
    arrangement, but be aware that custodial gifts to minors are completed gifts for
    federal gift-tax purposes. In other words, the gift becomes the minor’s property,
    and not yours, if you are the donor. As a result, at the state-specified legal
    age of majority, the child can do whatever they want with the gifted property.
    Even if the gift was intended to finance the child’s future educational expenses,
    they are under no obligation to go to college or pursue higher education. Meanwhile,
    income used for your minor child’s maintenance and support is taxable to you if
    you are the child’s parent, even though you may not be the named custodian of
    the custodial arrangement. This is because, under all state property laws, as
    the child’s parent you have the legal obligation to support and raise that child
    until they attain the legal age of majority.


    Fortunately, as discussed in Chapter [15](#A314864_2_En_15_Chapter.html), Congress
    has legislated a much better technique for saving for college than custodial arrangements.
    Called a private savings plan, this approach for funding a child’s future educational
    expenses is made possible under Section 529 of the Internal Revenue Code.


    ## A Basic Primer on the Use of Trusts


    A trust is an arrangement to which there are three parties:


    - The individual who establishes the trust (known as the creator or grantor)

    - The trustee of the trust

    - The individual or individuals for whose benefit the trust is established (known
    as the trust beneficiary or beneficiaries)


    In any trust arrangement, the trustee must act solely and exclusively on behalf
    of the trust beneficiaries. The trustee has the legal title to the trust assets,
    but the beneficiaries have what is known in the law as equitable title to the
    assets.


    Trusts carry many advantages when they are used in transfer-tax planning and management,
    as well as in estate planning generally. Among these are the following:


    - The ability to benefit one or more specified beneficiaries

    - The ability to afford the expertise of a professional or other skilled individual
    in the management of the investment of trust assets

    - The ability to provide asset protection

    - The ability to avoid probate

    - The ability to achieve income- and transfer-tax savings


    There are many types of trusts, including those established on behalf of minors,
    but all may be categorized from a transfer-tax perspective as either revocable
    or irrevocable trusts.


    ### Revocable Trusts


    A revocable trust is created during your lifetime, and you retain the power to
    revoke, or take back, the trust assets. Accordingly, you do not make a completed
    gift, nor do you lose the right to the income from the trust assets. However,
    if you appoint someone else the beneficiary of the trust, a gift does occur at
    that time. When you die, if you have not revoked the trust, the trust becomes
    irrevocable and can operate in lieu of a will to distribute your assets.


    A revocable trust offers two major advantages, neither of which involves transfer-tax
    savings:


    - If you transfer assets to the trust during your lifetime and retitle them in
    the name of the trustee (which is typically you), the trust assets avoid the probate
    process in the state where you die.

    - If you become mentally incompetent (for example, if you contract Alzheimer’s
    disease), the successor trustee of the trust can assume the management of your
    financial and personal affairs.


    Additionally, you can reduce the beneficiary’s estate tax by using a revocable
    trust—when it becomes irrevocable at your death—if the trust is drafted properly.


    Keep in mind that because you keep complete control over the trust and its assets,
    the assets are included in your gross estate. However, if you are below the estate-tax
    allowable exemption amount (`$11.2 million in 2018`), you should not be concerned
    about this disadvantage. Furthermore, generally the advantages that trusts provide
    far outweigh the lack of transfer-tax savings your estate will suffer from the
    revocable trust at the time of your death.


    Revocable trusts, which are also known as living trusts when property is retitled
    in the name of the trustee, are heavily promoted by trust sponsors and marketing
    firms as the panacea to all estate-tax problems. Although this is decidedly not
    the case, living trusts can be an effective estate-planning tool, particularly
    for individuals who own a vacation home or other real estate in a state other
    than their primary residence. For owners of out-of-state vacation homes, a second,
    or ancillary, probate proceeding is required in the state where the vacation home
    is located. By transferring the title of the vacation home to the trustee of the
    revocable trust, your estate can avoid multiple probate proceedings.'
