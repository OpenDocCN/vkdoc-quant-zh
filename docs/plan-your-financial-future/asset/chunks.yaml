    later. The appreciation amount of $500,000 ($600,000 less $100,000) is now forever
    removed from possible future transfer taxation in your estate.


    You should note that the 2017 TCJA doubled the lifetime gift exemption limit from
    an indexed amount of $5.6 million to $11.2 million, effective for the year 2018\.
    The overwhelming majority of individuals likely will never have to pay federal
    gift tax. However, the fact remains that high-net-worth individuals, particularly
    small business owners, are most likely to make gifts to family members; indeed,
    this group of individuals is the intended Congressional target of the gift (and
    estate) tax initially!


    Let’s go back to taking maximum advantage of the $15,000 annual gift-tax exclusion.
    In the example given previously, wherein each of ten children is the donee of
    $15,000, the person who gave the gift immediately removed $150,000 from their
    taxable estate and did not have to file a gift-tax return or worry about reducing
    their overall $11.2 million exemption limit in 2018\. This strategy is known in
    estate planning as a systematic annual gifting program and takes advantage of
    as many gift-tax annual exclusion amounts as possible, to as many donees as possible,
    to reduce the donor’s taxable estate. Therefore, as a transfer-tax planning technique,
    you should look first into adopting a systematic gifting program by making as
    many annual exclusion gifts as you can afford at the beginning of each calendar
    year .'
