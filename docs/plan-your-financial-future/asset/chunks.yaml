  trans: '

    ### 第 401(k)条退休计划


    如今，许多员工在工作单位参加了至少一种固定缴款型退休计划，而第 401(k)条计划已成为储蓄计划的首选。尽管许多员工认为雇主匹配其 401(k)缴款比例主要是出于利他原因，但这通常并非雇主的动机。实际上，雇主必须通过特殊的非歧视测试，才能代表任何员工（包括高薪员工）提供并维持
    401(k)计划，而高薪员工的工作满意度和绩效通常是雇主最关心的。由于高薪员工最有可能已经向第 401(k)条计划缴款，因此雇主需要激励非高薪员工参与缴款，以满足法律规定的非歧视测试。因此，雇主通常通过员工缴款匹配计划来鼓励非高薪员工进行缴款。


    根据先锋投资集团在其`How America Saves 2016`报告中的数据，2015 年 401(k)计划的平均缴款率（或工资递延百分比）仅为收入的
    6.8%。此外，根据波士顿学院退休研究中心的统计，仅有约 75%的员工参与了 401(k)计划。这意味着纯员工净储蓄率仅为 5.1%（6.8%乘以 75%）。即使加上雇主对员工缴款的
    3%匹配（美国最常见的员工缴款匹配方式是：对员工前 6%的工资递延部分匹配 50%），雇主与员工的总储蓄率也仅为 7.35%（6.8%加上 3%乘以 75%）。对于大多数
    401(k)计划参与者来说，这远远不足以让他们在退休后过上体面的生活。相反，每年的总储蓄率应达到 10%至 15%之间。


    如果你足够幸运，为一家提供第 401(k)条计划的雇主工作，那么你首先要做的就是参与其中。然后，你应该选择在税前基础上，将尽可能多的工资递延到 401(k)计划中。当然，你至少应该递延工资的
    3%（或你的特定雇主愿意匹配的任何比例），因为这能保证你的资金获得 100%的投资回报。但除此之外，你的目标应该是每年从自己的收入中至少缴存 10%。如果你已接近退休年龄，却浪费了
    30 岁和 40 岁这段黄金储蓄期，那么你需要将当前收入的更大比例用于储蓄，以保障退休生活。否则，你就需要考虑两种令人不快的选择之一：1) 延长工作年限，推迟原定的退休日期；或
    2) 降低退休后的生活水平。


    **注意**


    尽管你每年可以向 401(k)计划递延的工资有年度金额上限，但这些限制通常只对高薪员工（如企业高管）比较重要。


    由于 2006 年《养老金保护法案》（PPA）的出台，许多 401(k)计划开始采用自动注册方案。这种方案也被称为"消极选择"，它允许雇主在未经员工同意的情况下将其纳入第
    401(k)条计划，但前提是员工有权选择退出缴款。一些雇主还在自动注册的基础上增加了渐进式储蓄功能，这意味着他们会自动按照固定比例（例如，员工参与该计划的每一年增加
    1%）来提高员工的储蓄递延比例。这两个功能结合使用时，可能极大地帮助员工（特别是那些过去选择退出的员工）为自己的退休生活进行储蓄。


    作为提供自动注册的激励措施，2006 年《养老金保护法案》规定，如果雇主向 401(k)计划参与者提供投资建议，则可免除雇主的某些责任。然而，要符合此项免责条件，雇主的投资建议安排必须包含一个由独立专家认证的、无偏见的计算机模型，该模型会为参与者生成一个推荐的投资组合供其考虑。因此，生命周期投资基金或目标日期退休基金现在正被雇主用作自动注册员工的默认投资选项。总体而言，这并非坏事，特别是对于那些原本不会储蓄的员工来说。但是，如果你确实认真对待退休储蓄（你正在读这本书，不是吗？），你很可能比默认选项更明智地投资你的退休计划缴款。至少，你自己或你的财务顾问应该尝试做出更好的选择！

    '
- fmt: '### Section 403(b) Retirement Plans


    The `Section 403(b)` plan, also referred to as a tax-sheltered annuity, is the
    functional equivalent of the `Section 401(k)` plan for employees who work for
    specified not-for-profit employers, such as public or private schools, churches,
    and some hospitals. The maximum annual salary reduction contributions for the
    `403(b)` plan are generally the same as those allowable for the `Section 401(k)`
    plan, as are the nondiscrimination rules that must be met by the employer. Today,
    more and more not-for-profit employers are matching the salary reduction contributions
    made by their employees (historically, many `403(b)` plans were funded solely
    by employee salary reductions with no employer matching).


    However, the `403(b)` and `401(k)` retirement plans differ. Only certain not-for-profit
    employers (called `501(c)(3)` organizations after the Internal Revenue Code section
    of the same number) may implement a `403(b)` plan. As mentioned, these employers
    include schools and churches, so if you are a public school elementary or secondary
    school teacher, you probably have a `403(b)` plan and not a `401(k)` plan. I use
    the word probably here because increasing numbers of not-for-profit employers
    have been implementing a `Section 401(k)` plan, or the alternative `Section 401(a)`
    plan, and adding it to or substituting it for a `Section 403(b)` plan.


    Why are not-for-profit employers increasingly adopting `Section 401(k)` plans
    in lieu of `Section 403(b)` plans? For starters, a `Section 401(k)` plan generally
    has more investment choices than the `Section 403(b)` offering. For example, a
    `Section 403(b)` plan must be invested in either a fixed or variable annuity or
    mutual funds. It cannot be invested in individual stocks or bonds. Therefore,
    if you are a qualifying not-for-profit employee who likes to "play the market,"
    a `Section 403(b)` plan limits your investment options. Another advantage of the
    `Section 401(k)` plan is that it grants participants the ability to elect a special
    income-tax treatment if they choose to take a lump-sum distribution. This special
    election, known as ten-year averaging tax treatment, allows `401(k)` plan participants
    born before 1936 to pay income taxes on a lump-sum distribution in one year as
    if they were paying it over ten years, thereby significantly lowering their tax
    bill. This option is not available for `Section 403(b)` plan participants.


    With the exception of these two advantages of the `401(k)` plan, the `403(b)`
    is probably the more favorable of the two. We will not discuss the other technical
    reasons why this is so, but the `403(b)` plan generally beats the `401(k)` for
    one big reason: you can contribute more money to the `403(b)` plan, the closer
    you are to your planned retirement date. For example, if, as a not-for-profit
    employee, you have worked for the same or another qualifying employer for at least
    15 years, you may be able to contribute as much as `$15,000` per year to the plan
    in addition to the normal contribution limits. As such, you can attempt to make
    up for those years in your 30s and 40s when you did not or were not able to adequately
    save for your own retirement. You cannot do this with the `401(k)` plan, because
    the special catch-up annual contribution exception does not apply.


    ### Other Retirement Plans


    Chapter [16](#A314864_2_En_16_Chapter.html) discusses other employer-sponsored
    retirement plans and IRAs, when we address distributing your wealth at the time
    of retirement; but some employers offer plans in addition to the `Section 401(k)`
    and `Section 403(b)` plans. If they do, they may permit you to make contributions
    to these plans on an after-tax basis. These are commonly referred to as designated
    Roth accounts. This may not seem like something you want to do, particularly if
    you have already maxed out your before-tax contributions to the `401(k)` or `403(b)`
    plan, but consider this: if you contribute after-tax money to any employer-sponsored
    plan, you do not have to pay income taxes on any distribution the plan makes of
    those same funds, including earnings to you. Moreover, the contribution limit
    to a designated Roth account is considerably greater than the limit for contribution
    to a Roth IRA. As a result, if you have the opportunity to make after-tax contributions
    to an employer-sponsored plan and can afford to do so, you should.


    ## Company Stock Purchase Plans


    There are two basic types of company stock purchase plans: employee stock ownership
    plans (ESOPs) and employee stock purchase plans (ESPPs). Both plans permit employees
    to purchase and own employer stock, although, as the name implies, only the ESOP
    permits controlling ownership to be transferred to the employees.


    If you work for a corporation or incorporated business, the employer may have
    established an ESOP. An unincorporated business, on the other hand, such as a
    sole proprietorship or partnership, cannot have an ESOP, because the business
    has no stock.


    So, what is an ESOP? It is a retirement plan designed to invest primarily in employer
    stock. Some closely held (non-publicly traded) corporations also establish ESOPs
    to provide a market for employer stock that would otherwise not be very marketable.
    Thus, when a company establishes an ESOP, its employees become the market and
    ultimately the owners of the closely held business.


    Aside from the perk of becoming a partial owner of the company for which you work,
    there is another major advantage to contributing to an ESOP: you now have a tax-favored
    retirement plan in which to save for your own retirement. Moreover, once the employer
    stock is distributed to you at the time of retirement, you do not have to pay
    any capital gains tax on the appreciation of the stock—technically known as net
    unrealized appreciation (NUA) —until you sell the shares. Any further amount of
    appreciation is then taxed at favorable long-term capital gains rates if you have
    owned the stock for at least a year.


    In contrast to an ESOP, an ESPP is simply a means for you to own stock in your
    employer under favorable terms. Typically not structured as a retirement plan,
    but rather as an employee investment option, an ESPP gives the employee the right
    to buy company stock on a future date for an amount that is no higher than its
    current, publicly traded value. If the stock price increases between the time
    this right is granted and the time the employee purchases the stock, the employee
    may choose to buy the stock at the lower or discounted price. The tax advantages
    for ESPPs are generally the same as those for ESOPs.


    Although company stock purchase plans can offer employees plenty of perks, there
    is a fundamental disadvantage to owning too much employer stock, as part of either
    an ESOP or an ESPP. This disadvantage is the inherent lack of portfolio diversification
    that accompanies ESOPs and ESPPs, so that if the company''s financial prospects
    decline (or, as was case with Enron, liquidation occurs), you are left with an
    asset of little value. To avoid this problem, you should return to the basic asset-allocation
    principles discussed in Chapter [3](#A314864_2_En_3_Chapter.html) and make sure
    you have diversified into other assets in addition to your employer''s stock.
    If you suspect you are not as diversified as you should be and are holding too
    much of your employer''s stock as a total percentage of your portfolio (say, over
    half of your net worth), I advise you to see your investment advisor as soon as
    possible.'
  raw: '### Section 403(b) Retirement Plans


    The Section 403(b) plan, also referred to as a tax-sheltered annuity , is the
    functional equivalent of the Section 401(k) plan for employees who work for specified
    not-for-profit employers, such as public or private schools, churches, and some
    hospitals. The maximum annual salary reduction contributions for the 403(b) plan
    are generally the same as those allowable for the Section 401(k) plan, as are
    the nondiscrimination rules that must be met by the employer. Today, more and
    more not-for-profit employers are matching the salary reduction contributions
    made by their employees (historically, many 403(b) plans were funded solely by
    employee salary reductions with no employer matching).


    However, the 403(b) and 401(k) retirement plans differ. Only certain not-for-profit
    employers (called 501(c)(3) organizations after the Internal Revenue Code section
    of the same number) may implement a 403(b) plan. As mentioned, these employers
    include schools and churches, so if you are a public school elementary or secondary
    school teacher, you probably have a 403(b) plan and not a 401(k) plan. I use the
    word probably here because increasing numbers of not-for-profit employers have
    been implementing a Section 401(k) plan, or the alternative Section 401(a) plan,
    and adding it to or substituting it for a Section 403(b) plan.


    Why are not-for-profit employers increasingly adopting Section 401(k) plans in
    lieu of Section 403(b) plans? For starters, a Section 401(k) plan generally has
    more investment choices than the Section 403(b) offering. For example, a Section
    403(b) plan must be invested in either a fixed or variable annuity or mutual funds.
    It cannot be invested in individual stocks or bonds. Therefore, if you are a qualifying
    not-for-profit employee who likes to “play the market,” a Section 403(b) plan
    limits your investment options. Another advantage of the Section 401(k) plan is
    that it grants participants the ability to elect a special income-tax treatment
    if they choose to take a lump-sum distribution. This special election, known as
    ten-year averaging tax treatment, allows 401(k) plan participants born before
    1936 to pay income taxes on a lump-sum distribution in one year as if they were
    paying it over ten years, thereby significantly lowering their tax bill. This
    option is not available for Section 403(b) plan participants.


    With the exception of these two advantages of the 401(k) plan, the 403(b) is probably
    the more favorable of the two. We will not discuss the other technical reasons
    why this is so, but the 403(b) plan generally beats the 401(k) for one big reason:
    you can contribute more money to the 403(b) plan, the closer you are to your planned
    retirement date. For example, if, as a not-for-profit employee, you have worked
    for the same or another qualifying employer for at least 15 years, you may be
    able to contribute as much as $15,000 per year to the plan in addition to the
    normal contribution limits. As such, you can attempt to make up for those years
    in your 30s and 40s when you did not or were not able to adequately save for your
    own retirement. You cannot do this with the 401(k) plan, because the special catch-up
    annual contribution exception does not apply.


    ### Other Retirement Plans


