    # 发育障碍儿童


    抚养一名发育障碍儿童在财富积累和管理方面会带来特殊的挑战。具体而言，为抚养一名发育障碍儿童直至其独立所涉及的巨额开支，最佳支付方式是什么？


    此处无法详尽阐述所有可能用到的规划技巧，但一种普遍的策略是为该儿童的利益设立一个特殊需要信托。要妥善设立并维持此类信托，该儿童必须首先符合社会保障对残疾的定义，尽管通常情况下，公共援助福利是由州或地方政府而非联邦政府支付的。


    特殊需要信托的目的是让该儿童保持有资格获得某些公共援助福利，例如补充保障收入 (SSI) 或医疗补助 (Medicaid)，同时为其提供政府未提供的必要服务。信托文件必须声明，信托收益和本金仅用于为该儿童提供超出政府福利之外的、护理、抚养和教育所需的额外服务。如果文件未作此声明或包含类似措辞，州政府可能会扣押已转入信托的资产，以支付其提供必要护理的费用。


    对于残疾儿童，特殊需要信托会产生高昂成本，另一种替代方案是 **A.B.L.E. 账户**（根据 2014 年《实现更美好生活体验法案》设立）。**A.B.L.E.
    账户** 是一种为残疾人士设立的税收优惠储蓄账户，其模式类似于规划子女高等教育需求时的第 529 节私人储蓄计划。（关于第 529 节账户的更多信息，请参见第
    15 章。）虽然 2018 年向 **A.B.L.E. 账户** 的年缴款额（不超过 15,000 美元）在联邦层面不可抵扣所得税，但一些州确实允许缴款人进行州所得税抵扣。该账户的受益人是账户所有者，账户产生的收入无需纳税。


    为什么要设立 **A.B.L.E. 账户**？与特殊需要信托类似，但成本低得多，**A.B.L.E. 账户** 能够保持残疾人士获得公共援助福利的资格。获得这些福利的资格要求残疾人士持有的现金储蓄（包括退休基金）不超过
    2,000 美元。**A.B.L.E. 储蓄账户** 不影响这些公共福利的资格（这些资金不会被计入），并且允许为残疾人士产生的各种其他费用提供资金。


    至少，如果您是一名发育障碍儿童的家长，您应该考虑开设一个 **A.B.L.E. 账户**。除此之外，您还需要考虑，如果您本人或您的配偶去世或丧失行为能力，将由谁来照顾这个孩子。根据法律，父母只是子女的自然监护人，直至子女年满
    18 岁或州法律规定的其他法定成年年龄。因此，如果您的残疾孩子在 18 岁后仍需要照顾，您可能希望向法院申请成为您孩子的法定监护人。此外，如果您本人去世或丧失行为能力，您可能希望您的配偶接替您担任这一职务。在您的遗嘱中，您应指定一名监护人，很可能首先是您的配偶，如果夫妇二人同时去世，则指定一位愿意且有能力承担此任的家庭成员。如果您未能这样做，法院通常会为您的孩子指定一名监护人，但您将无权决定此人是谁，也无权决定您去世后您的孩子将在何处生活。


    在所有未成年子女可能失去亲生父母的情况下，设立备用家庭信托都很重要，但当其中一名或多名子女为发育障碍儿童时，这一点则更为关键。为您孩子指定的监护人与备用家庭信托的受托人很可能是同一个人，但您应仔细考虑每项职责所需的不同技能。监护人对您残疾孩子的持续需求需要有极大的同理心和同情心，而受托人则需要财务敏锐度。家庭成员拥有其中一套技能，并不意味着他也拥有另一套。此外，虽然您的第一反应可能是您的父母（孩子的祖父母）是最佳人选，但您认为在祖父母晚年要求他们承担起第二个家庭（特别是其中还有一个残疾孩子）的责任，这公平吗？只有您自己才能判断处理这种情况的正确方式，但请不要忽视对它的思考。

