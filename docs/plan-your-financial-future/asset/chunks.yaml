- fmt: '# Using Your Home to Fund Retirement: Reverse Mortgages


    You are likely familiar with the terms mortgage and mortgage note, because you
    probably had to execute such a note to help finance the purchase of your house.
    You might also have mortgage insurance, which lenders generally require if you
    cannot make a down payment of at least 20 percent of the purchase price of your
    home. Seniors may now have another option involving a mortgage note: a reverse
    mortgage, with the term reverse coming from the fact that instead of you paying
    the lender, the lender pays you.


    A reverse mortgage is a means of accessing the equity in your home, and seniors
    are the most likely candidates for such mortgages, because they usually have considerable
    equity built up in their homes. With a reverse mortgage, the homeowner is able
    to remain in the home and usually receives a monthly payment from the lender based
    on a percentage of the principal due on the home. In some cases, this payment
    may take the form of a lump sum instead of a periodic monthly payment; but if
    the senior is looking for an income stream during retirement, a monthly payment
    is the preferred alternative. Under law, the minimum age to qualify for a reverse
    mortgage is 62, and the senior cannot take a mortgage for more than the home is
    worth at the time of the loan. If the home has an existing mortgage, it must first
    be paid off with the proceeds of the reverse mortgage.


    Here is an example of how a reverse mortgage is structured and how you may be
    able to use it. Assume that you are at least age 62 and otherwise qualify for
    a $150,000 reverse mortgage (there are no income or health-status requirements
    with a reverse mortgage). You have an existing mortgage of $100,000 on your house.
    You will have enough money from the reverse mortgage to both pay off your existing
    mortgage and benefit from $50,000 in cash to use in whatever manner you wish.
    A reverse mortgage is even more advantageous if you have no original mortgage,
    because then you have the full $150,000 available for your use.


    If you do qualify, does this sound too good to be true? There are some facts to
    consider before entering into a reverse-mortgage arrangement:


    - No monthly payments are due on the mortgage while it is outstanding. However,
    when you die or sell the house, the loan must be repaid. If you are married at
    the time of your death, the loan typically does not have to be repaid until the
    death of your surviving spouse, but it then must come out of the spouse’s estate,
    thereby reducing the amount that subsequently passes to your children or other
    heirs.

    - Like a home-equity loan, you may receive the proceeds from a reverse mortgage
    over a set term, in lifetime payout, or via a line of credit. If you take the
    proceeds in a line of credit, a growth feature is built into most reverse mortgages
    that benefits you if your home appreciates in value over the years (in other words,
    your payments from the reverse mortgage may increase).

    - In general, the amount of money you receive from a reverse mortgage depends
    on your age. The older you are, the more money you will receive.

    - A reverse mortgage does not affect your receipt of Social Security or Medicare
    benefits, and the payments are not taxable or treated as taxable income (for example,
    the 50 percent or 85 percent special step-rate thresholds in Social Security taxation
    do not apply).

    - Because of the closing costs associated with a reverse mortgage, you should
    not enter into the arrangement if you intend to sell your home within two to three
    years after you begin to receive the proceeds. You will not financially be able
    to recover the closing costs in such a short period of time.


    This last point speaks to an important consideration you should be aware of before
    executing a reverse mortgage: such mortgages are relatively expensive. There may
    be other, less expensive ways to access the equity in your home, such as a home-equity
    loan or line of credit. These should be investigated before committing yourself
    to the drawbacks of a reverse mortgage.


    # Do I Need Life Insurance During Retirement?


    When you retire and your children become independent, you may wonder why you need
    life insurance. This is particularly the case if you are divorced or separated
    from your spouse. If you are thinking about ditching your life insurance policy,
    though, you may need to think again, particularly if you have a high net worth
    (say, $10 million or more) and are involved in estate-planning and estate tax–reduction
    techniques. After all, life insurance remains an effective way to pay both any
    estate taxes you may owe at death and the final expenses associated with settling
    your estate, because it is purchased with considerably discounted dollars from
    what your estate will receive in death benefits.


    For example, assume that you purchase a $250,000 annual renewable-term life insurance
    policy and die during the term of the policy’s coverage. Depending on numerous
    factors (including your age and health at the time of purchase), the premiums
    you paid for coverage may be extremely low. If you assume a total premium payment
    at your time of death of $25,000, your estate receives a discounted dollar benefit
    of $225,000 ($250,000 less $25,000). In addition, your heirs receive a total dollar,
    income-tax-free benefit of $250,000 upon receipt of the life insurance proceeds.


    Be careful here. If you do not properly title or arrange for the purchase of the
    $250,000 term life insurance policy, the death proceeds from the policy will be
    included in your gross estate for estate-tax purposes, thus adding to your estate-tax
    problems. The simple way around this, of course, is to title the policy in your
    spouse’s or adult child’s name. But if you do this, you add to the spouse’s or
    child’s gross estate. Further, what if the new owner does not make the premium
    payments on the policy? The policy will then lapse, and your intended beneficiaries
    will lose the insurance protection on your life. The better way to arrange for
    the titling of life insurance is to establish an irrevocable life insurance trust
    (ILIT).


    If you are married at the time you enter into retirement and are entitled to a
    pension, you have a different problem, commonly referred to as the pension dilemma.
    Specifically, under current law, if you are to receive a pension (not a lump-sum
    distribution from a Section 401(k) plan), you must provide for a survivorship
    payment on the pension to your spouse. When you do this, your own annuity or pension
    payment is reduced, which may potentially impact your future cash flow.


    For example, assume you are 65, married, and entitled to a pension payment from
    your company’s pension (defined-benefit) plan of $5,000 per month, or $60,000
    per year. This amount is payable to you in a single life annuity form, meaning
    when you die, the pension terminates, which also means your spouse must replace
    $60,000 of lost income. To avoid this possibility, you must elect under law—unless
    your spouse elects to waive it—a joint and survivor payout so that your spouse
    is protected upon your death. However, because your pension payment must now be
    spread over two lives instead of one, it is reduced, sometimes by as much as 30
    percent. Using the numbers in this example, this means your pension payment is
    now $42,000 ($60,000 times 0.70). Taken over a 25-year life expectancy, you sacrifice
    approximately $450,000 of lifetime benefits that may otherwise have been payable
    to you ($18,000 per year difference in payments times 25). Of course, the sacrificed
    benefit becomes even larger, the greater the pension payment is.'
