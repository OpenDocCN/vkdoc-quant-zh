    \ www.springeronline.com。Apress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。\n\
    \n谨以此书献给薇薇安·路易丝，她是我个人财富管理与积累的动力源泉。\n\n# 第一版前言\n\n我很荣幸为我的朋友兼同事基思·费弗利（MBA、法学博士、律师、税法硕士、注册金融理财师）所著的《规划你的财务未来》撰写前言。我在科罗拉多州格林伍德村经营着自己的成功理财公司\
    \ Integra Financial，管理着 4000 万美元的资产【编者注：截至 2018 年 3 月已超过 5000 万美元】。每天，Integra\
    \ Financial 都为一批中上阶层和上流家庭处理并解决本书中基思所讨论的理财问题。从他在注册金融理财师课程中教授理财规划的能力，到他在分析复杂投资、退休和遗产税问题上的精湛技艺，基思的专业知识无与伦比。他能将复杂问题提炼简化，并用我们的客户——也包括您——都能理解的语言加以阐述。\n\
    \n在本书中，基思描述了一种新颖的个人理财规划分析与实施方法，他称之为 PADD 流程。该流程的第一步是保护你自己、你的家人和你的财产。接下来是积累财富，这一部分可能最能引起广大消费者以及为实现财务独立而进行理财规划的人们的兴趣。第三，基思探讨了已积累财富的防御，特别是讨论了所得税规划——税收是财富的两大“篡夺者”之一（另一个是通货膨胀的影响）。最后，基思探讨了理财规划中的“乐趣”部分：个人生前积累财富的分配，特别是退休规划，以及去世时的遗产分配——这是大多数遗产规划技术关注的核心时点。基思还在书末提供了一份理财规划术语表，并在各章中以**粗体**形式交叉引用这些术语。\n\
    \n尽管生活中没有绝对的保证，尤其是在当今动荡的经济市场中，但如果你遵循本书概述的流程，你将有更大可能在有生之年积累并保全财富。\n\n我们希望本书能让你对自己的财务未来感到安心。我喜欢说，我那些已退休且无负债的客户，不仅与那些财务拮据的人生活在不同的社区，甚至生活在不同的星球上。无论有无优秀的理财顾问协助，运用本书提出的策略，都能帮助你与其他少数真正实现财务成功的人一起，生活在那个不同的星球上。这在当今市场中堪称罕见的成就！\n\
    \n> 威利斯·G·阿什比，注册金融理财师  \n> Integra Financial 公司  \n> 科罗拉多州格林伍德村\n\n# 前言\n\n自 2013\
    \ 年《规划你的财务未来：提升个人净资产的全面指南》第一版出版以来，发生了许多事件，其中最引人注目的是 2016 年唐纳德·J·特朗普当选为新一任美国总统。与此相应，特朗普总统于\
    \ 2017 年 12 月 22 日签署了一项重大的新税收法案并使其成为法律：《2017 年减税与就业法案》，本书中简称为“2017 TCJA”或“2017\
    \ 年 TCJA”。第二版全面更新了内容，以反映 2017 年 TCJA 带来的相关变化，以及另一项重大立法——《2010 年患者保护与平价医疗法案》（PPA，俗称“奥巴马医改”）实施至今的经验。\n\
    \n与之前一样，本书面向受过教育的消费者以及理财规划或服务专业人士。如果你正在进行个人理财规划（即“受过教育的消费者”），你会发现本书内容在寻求建立和增长财富方面具有无价的价值。另一方面，如果你是理财规划师或顾问（即“理财规划或服务专业人士”），你会发现本书内容有助于你为所服务的客户提供咨询。你甚至可能觉得有必要让你的客户在规划和建议过程中购买本书！如果是这样，可以在\
    \ Apress 网站 [`www.apress.com`](http://www.apress.com) 或亚马逊网站在线购买。\n\n此外，与原版一样，我在书末提供了一份理财规划术语表，并在各章中以**粗体**形式交叉引用相关术语。\n\
    \n最后，我尽了最大努力来捕捉并消除本版（以及原版）中的任何技术错误和语法错误。然而，我对本版中可能仍然存在的任何错误承担全部责任。为此，敬请见谅！\n\n\
    基思·费弗利，法学博士、注册金融理财师  \n科罗拉多州森特尼尔  \n2018 年 3 月\n\n# 致谢\n"
