    ## The Importance of Durable Powers of Attorney


    Although many people use the terms disability and incapacity interchangeably,
    they are not the same thing. In the context of understanding and applying powers
    of attorney, it is important to recognize that their use is triggered only in
    the event of legal incapacity (or incompetency). In other words, the individual
    granting the power of attorney may be physically disabled and still be legally
    competent to conduct their financial and health-related affairs.


    Let’s review some of what we discussed in Chapter [14](#A314864_2_En_14_Chapter.html)
    in considering how to plan for your own physical or mental incapacity. First,
    there are two parties to a power of attorney: the principal, or the individual
    granting the power; and the agent (also known as the attorney-in-fact ), or the
    individual responsible for carrying out the duties of the power. It is essential
    for the principal to be legally competent when granting power of attorney to the
    agent; if they are not, the power cannot be effective. Moreover, unless the power
    of attorney is specifically written to continue in the event of the principal’s
    incompetency (a durable power of attorney), the power of the agent to act on behalf
    of the principal will terminate on the date of the principal’s incompetency. In
    other words, a nondurable power of attorney is not effective just when it is needed
    most—on the date of the principal’s inability to act!


    There are two types of powers of attorney. The first is used for the management
    of the principal’s property, including their financial accounts, subsequent to
    the principal’s incompetency. This is frequently referred to as a financial or
    general durable power of attorney (DPOA), because it covers a multitude of financial
    situations in which the agent may act on behalf of the principal. It is also possible
    to limit the power of the agent to act through the writing of a special or limited
    DPOA.


    A DPOA becomes effective in one of two instances: either immediately (at the time
    that the principal grants powers to the agent) or in the future (when the principal
    becomes legally incompetent). If the power becomes effective immediately, it is
    referred to as a regular or nonspringing DPOA. If the power does not become effective
    until the principal becomes incompetent, it is referred to as a springing DPOA.
    If the power is springing, there must be some method of determining when the principal
    has become legally incompetent. Normally, legal incompetence is determined by
    the mutual agreement of at least two physicians that the principal cannot act
    on his or her own behalf and needs the assistance of the agent. Because a principal
    may derive comfort from knowing that they have not relinquished immediate control
    over their property, many times they execute a springing DPOA. However, this concern
    is exaggerated in the majority of cases: typically, the designated agent is a
    trusted family member and is exceedingly unlikely to act until it is clear that
    the principal cannot do so.


    The second type of durable power of attorney provides for a surrogate or substitute
    to make decisions with respect to the principal’s health. This type of power commonly
    goes by the name of a medical durable or durable power of attorney for health
    care (DPOAHC), although it may have a different name in your state (for example,
    a medical proxy). In contrast to the general DPOA, the DPOAHC is always springing
    in effect. In other words, as long as the principal is able to give informed consent
    with respect to their own health care, the medical community will look to the
    principal to do so. It is only in the event that the principal is not able to
    give consent that the advice of the agent is sought.'
