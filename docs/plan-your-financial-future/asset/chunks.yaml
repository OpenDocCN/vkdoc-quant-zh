    The key takeaway from this discussion is this: if you are involved in a divorce,
    do not try to represent yourself. The potential damaging consequences to your
    accumulated wealth are much too significant to forego seeking the assistance of
    competent legal and financial counsel.'
  trans: '

    ### 财产分割协议


    最终敲定财产分割协议时，最重要的原则是对配偶双方都公平。在共有财产制州，婚姻期间获得的财产由夫妻双方各拥有一半，因此平均分配相对容易。然而，一个显著的例外情况是，当一方将一项已经蓬勃发展的生意带入婚姻，但在夫妻离婚或合法分居时，这项生意的价值已大幅增长。此时便产生一个问题：婚姻期间生意的增值应如何最佳处理？答案因各州共有财产法而异，但通常，创立生意的那一方配偶除了获得生意在婚后的另一半增值外，还会获得其在结婚时带来的生意价值。非创始配偶则获得增值的另一半。


    假设你住在加利福尼亚州，并刚刚创办了一家电脑软件公司。你结婚时，公司价值 100 万美元。八年后，你们离婚了，离婚时公司价值 1000 万美元。法院很可能会判决你获得与公司相关的
    550 万美元——这是你在婚前拥有的公司原始价值 100 万美元，加上婚姻期间公司增值的 450 万美元。你现在需要拿出另外 450 万美元来买断你配偶的权益，或者干脆卖掉整个生意来支付所需款项。（现在你能明白为什么离婚会对你的累积财富造成毁灭性的财务打击了吗？）


    美国目前有八个共有财产州，第九个州——威斯康星州——有一种类似形式的财产法，称为婚姻财产法。两个最大的共有财产州——加利福尼亚州和得克萨斯州——为大多数美国人所相对熟知。其他六个实行共有财产法律体系的州如下：


    - 亚利桑那州

    - 爱达荷州

    - 路易斯安那州

    - 内华达州

    - 新墨西哥州

    - 华盛顿州


    此外，阿拉斯加州允许已婚夫妇在可选择的基础上建立共有财产。


    其余所有州（在计入威斯康星州对共有财产形式的变体后，共 41 个州）在财产法中被统称为普通法财产州或个人财产州。在这些州，丈夫或妻子（即使对于婚姻期间获得的财产）都可以将财产产权登记在个人名下。然而，那些认为这在离婚时进行不均衡或不平等的财产分割方面可能是一种优势的人，请三思！大多数——如果不是全部——普通法财产州在财产分割中遵循一个被称为“公平分配”的概念。在这种模式下，每对配偶在婚姻期间对他方的收入以及用这些收入获得的资产享有合法权利。因此，对于婚姻期间获得的财产，普通法州最终与共有财产州的实质结果相同：在离婚或分居时，通常由配偶双方各分得一半。


    财产分割谈判中最具争议的部分通常是，如何公平地分割一方当前或未来的退休福利。如果这个问题与你有关，你应该在离婚时对你（或你配偶）当前的`401(k)`或其他退休计划余额进行评估。一旦有了这个估值，如果你是收款方配偶，请确保从法院获得一份所谓的合格家庭关系令（`QDRO`）。该令授予你与计划参与者在`401(k)`或其他退休计划下本应享有的相同权利，包括选择自己投资的权利。


    作为离婚配偶，如果满足以下条件，你也可以基于前配偶的工作记录领取当前或未来的社会保障福利：


    - 你与前配偶的婚姻至少持续了十年。

    - 你尚未再婚。

    - 你至少年满 62 岁。

    - 你的前配偶至少年满 62 岁，并且有权领取退休或残障福利。


    请注意，如果你在年满 62 岁后再婚，你基于前配偶工作记录领取社会保障福利的资格不受影响。


    ### 主要住所


    通常，大多数夫妻离婚时拥有的主要资产就是他们的房子或主要住所。由于大多数夫妻共同承担房屋抵押贷款的义务，因此离异配偶支付的每笔抵押贷款中，一半可能符合可扣除赡养费的条件。抵押贷款支付的另一半则由留下的配偶根据正常的抵押贷款利息扣除规则进行扣除；换句话说，留下的配偶应在单独提交的所得税申报表中逐项列出他们的扣除项。然而，请谨慎行事。请记住，根据赡养费税收规则，任何构成可扣除赡养费的付款都不能被指定为除赡养费以外的其他任何项目。因此，如果你是离异配偶，并需承担一半的抵押贷款，那么请在您需支付的赡养费中增加足够的金额，以覆盖您每月应承担的抵押贷款利息部分。


    例如，假设你和你的妻子正在办理离婚。你同意每月支付她 3000 美元的赡养费。你每月的抵押贷款还款额是 1000 美元，其中 600 美元是利息。你仍需承担你那一半的抵押贷款。因此，将抵押贷款利息的一半（即
    300 美元）增加或重新定性为可扣除的赡养费，这样总的赡养费就变成了每月 3300 美元（原有的 3000 美元加上重新定性的 300 美元）。


    如果你是离异配偶，并且独自承担抵押贷款还款义务，情况会变得更加复杂。尽管你被认为支付了全部月抵押贷款利息，但你并不一定有权获得全部逐项列出的利息扣除额。相反，一旦你搬离了房子，该房子就不再是你的主要住所（正如你从第
    11 章中所知，如果你的前配偶立即卖掉房子，或者你在房子出售前没有在里面居住至少两年，这可能会产生严重的税务影响）。你可以尝试将该房屋申报为第二住所并以此方式扣除抵押贷款利息。然而，这种策略的陷阱在于，你必须让你的前配偶免费居住在该主要住所中。一些配偶不愿意这样做，尤其是在离婚过程不愉快的情况下。


    本讨论的关键要点是：如果你卷入离婚诉讼，切勿尝试自己代表自己。因为你可能对自身累积财富造成的潜在破坏性后果过于严重，以至于不能放弃寻求合格法律和财务顾问的帮助。'
- fmt: '# Loss of Employment


    Beyond the major psychological trauma of losing your job, particularly if you
    were terminated “for cause,” are the financial consequences that should be considered
    in the aftermath of such an event. Chief among these is how to immediately reduce
    your ongoing living expenses. If you have not done so already, consider refinancing
    your current mortgage to obtain a lower interest rate. Although refinancing extends
    the life of the mortgage obligation, your monthly payment is reduced. What’s more,
    refinancing usually frees up cash that can be used for any reason, including the
    payment of living expenses until you can find new employment. Note that this is
    not the case with a home-equity loan or line of credit under the 2017 TCJA: beginning
    in 2018, those proceeds may be used only for purposes of home improvements.


    Another key issue involved in managing job loss is the reevaluation of your and
    your family’s health insurance needs. As discussed in Chapter [5](#A314864_2_En_5_Chapter.html),
    remember that you can exercise your COBRA rights after losing your job. Yes, you
    will likely have to pay your previous employer’s share of the group medical insurance,
    but this option is probably much less expensive than purchasing an individual
    health insurance policy. Alternatively, cost savings may result from funding a
    health savings account (`HSA`) and purchasing a high-deductible individual health
    insurance policy. In addition, current tax rules stipulate that, as a former employee,
    you may take distributions from your IRA to pay health insurance premiums while
    unemployed without being subject to a 10 percent early distribution penalty. However,
    unless you own a Roth IRA—and have done so for a specified period of time—you
    must pay ordinary income tax on the distribution.


    Should you file for unemployment benefits after you have lost your job? There
    are several considerations to keep in mind. The first is psychological: do you
    feel embarrassed, or are you reluctant to file? Some workers, particularly those
    who have been terminated from a management position, simply cannot bear to file
    for unemployment benefits. Nevertheless, you should be aware that, in most cases,
    unemployment is available regardless of the position you left and your job status
    at your former employer. Your former employer has paid a tax under the Federal
    Unemployment Tax Act (`FUTA`) for just this reason.


    The second consideration with respect to unemployment benefits is a more practical
    one: are you eligible to receive benefits? The answer depends on why you left
    your former employer. Assuming that you earned enough money to qualify for unemployment
    benefits during the previous 12-month period, you must, then, have left your job
    for one or more of the following reasons:


    *   You were terminated (laid off) through no fault of your own.

    *   You voluntarily quit your job for good reason.

    *   You were involuntarily terminated, but not because of embezzlement, violating
    the company’s drug policy, or anything else unrelated to poor job performance.


    The biggest uncertainty in any of these reasons is what constitutes “good reason”
    for you to voluntarily leave your job. Unfortunately, you do not get to make this
    determination; your local unemployment agency caseworker does (sometimes along
    with your former supervisor). As a result, if you left your job voluntarily and
    file for unemployment benefits, carefully document in writing why you left before
    speaking with your caseworker, and justify that it was for reasons unrelated to
    personal preference or desires for another career.


    # Death of a Spouse or Life Partner


    As with job loss, psychological and financial issues are associated with the premature
    death of a spouse or life partner. Unlike with job loss, however, assuming that
    the life of the spouse or partner is adequately insured, the psychological aspects
    of overcoming the loss are probably paramount.


    Normally, countless financial questions confront the survivor of the spouse or
    partner, including these:


    *   Do I pay off or pay down the mortgage now while remaining in the house?

    *   Do I sell the house and move?

    *   If I am not retired, do I retire now (or as soon as financially possible)?

    *   Do I continue to work?

    *   Am I entitled to retirement or life insurance benefits?

    *   How do I distribute any retirement or life insurance benefits to which I am
    entitled?

    *   Can I afford to live in the same lifestyle to which I am accustomed?

    *   Should I seek the assistance of a financial advisor?


    None of these questions is easy to answer, particularly during the grieving process.
    Nevertheless, they need to be addressed—and sooner, rather than later—to avoid
    damaging the lifetime wealth you accumulated together.


    Not only is the surviving spouse or life partner the beneficiary of all or most
    of a decedent’s estate, but they are also often the named executor or administrator
    of that estate. Legally, the difference between an executor and an administrator
    depends on whether the decedent dies with or without a will. If the decedent dies
    after having written a will (or dies testate), the individual named to handle
    the decedent’s financial affairs is referred to as the executor. If the decedent
    dies without a will (or dies intestate), the individual appointed by the court
    to handle the decedent’s financial affairs is said to be the administrator of
    the estate. In either case, if the spouse or partner survives, he or she is normally
    the named executor or appointed administrator of the estate.


    This raises the question of whether the surviving spouse, as the named executor
    or administrator, should take a fee for the rendering of services. Under the probate
    code of most states, the surviving spouse is entitled to such a fee, but they
    should consider the usual circumstances of most estates. In most circumstances,
    the surviving spouse or executor is also the primary (if not sole) beneficiary
    of the deceased spouse’s property. Furthermore, under federal transfer tax, property
    that is inherited by the spouse or any other beneficiary is not income taxable.
    However, if the surviving spouse or executor collects a fee for administration
    services associated with the estate, that fee is income taxable. As a result,
    by accepting a fee, the surviving spouse converts nontaxable income into taxable
    income. The better option, clearly, is for the executor to receive all (or their
    share) of the decedent’s property at death in the form of an inheritance and not
    reduce this amount by an after-tax payment of executor fees.


    As is discussed further in Part 5 of this book, whether a court becomes involved
    in administering your estate depends on whether your estate goes through probate,
    which is a legal proceeding administered by the local court to verify title to
    a decedent’s assets and distribute them to your heirs at death. Generally speaking,
    many individuals do not like the potential costs and delays inherent in the probate
    process and search for ways to plan around it. There are three primary means of
    doing this, and we will examine each in turn:


    *   Title all your assets jointly (in joint tenancy with right of survivorship)
    with someone else, such as your spouse or life partner.

    *   Use beneficiary designations on as many assets as permitted by law.

    *   Establish a revocable living trust and transfer as many assets as you can
    into it during your lifetime.'
