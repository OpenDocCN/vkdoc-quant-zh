- fmt: '# Additional Policy Benefits to Consider


    Many individual disability policies offer additional benefits, usually in the
    form of a policy rider. Here are some of the more important possible additional
    benefits:


    - **Cost-of-living adjustment (COLA) rider** : The most common form of this rider
    increases the disability benefit paid after you start to collect benefits, thus
    protecting you against inflation. Another form increases the policy benefits by
    a specified percentage (usually five percent) each year before you become disabled,
    thus ensuring your constant purchasing power after you begin to draw benefits.

    - **Return of premium**: This benefit requires the insurance company to refund
    a portion of your premium if no claims are made for a specified period of time.

    - **Waiver of premium**: This benefit allows you to stop paying the premium on
    the policy if you are disabled for a period of time, usually 90 days.

    - **Partial disability rider** : This benefit is triggered when you are unable
    to perform important duties of your own occupation but are able to perform enough
    other duties to allow you to return to work part-time. In this event, the policy
    pays a partial benefit, such as 50 percent, of the total that would otherwise
    be payable.

    - **Residual disability rider** : This rider provides that if you are able to
    return to work full-time but at lesser pay than before due to a disability, the
    policy will pay the difference between your former pay and the current pay for
    the benefit period.

    - **Guaranteed insurability rider (also known as an increase-in-benefits rider)**
    : This rider guarantees you the opportunity to increase the benefit amount payable
    under the policy at specified time periods, regardless of your physical or mental
    health at the time. A usual requirement to obtain this rider is that you must
    have initially purchased a disability policy that is at least 80 percent of the
    maximum benefit amount that the insurance company would approve.


    # Policy Exclusions


    Just as with other insurance contracts, it is important to know what is not covered
    under a disability income policy. These are known as policy exclusions and, with
    respect to disability income policies, refer to particular injuries or illnesses
    that may result in the insured not being able to work. Those that are most frequently
    encountered are disabilities resulting from the following:


    - War or an act of war

    - Pregnancy or complications from childbirth

    - The insured committing or attempting to commit a crime

    - A period when the insured was incarcerated

    - An injury or disease that was self-inflicted, including those related to or
    caused by drinking alcoholic beverages or the illegal use of drugs


    Remember, if your disability results from any one of these exclusions, the policy
    will likely not pay benefits.


    # Questions to Ask Before Purchasing an Individual Disability Income Policy


    The following are questions you should ask before buying an individual disability
    income policy:


    - What is the definition of disability in my policy?

    - What is the amount of benefit payable from my policy?

    - Do I have to pay taxes on that benefit?

    - How long are my benefits payable?

    - Is my benefit adjusted for inflation (and if so, in what amount)?

    - Is there an elimination, or waiting, period before I can begin to receive my
    benefit (and if so, how long is it)?

    - Is there a way I can ensure that payments are made during this waiting period?

    - Can I renew my policy without undergoing a medical examination?

    - Can the company increase my policy premiums?

    - What are the policy exclusions, and do they affect me?


    This chapter concludes our look at personal risk exposures. Now, let’s consider
    a risk exposure that most of us also have: the risk of loss or damage to our property,
    such as a home or automobile. Business insurance for self-employed individuals
    is also addressed in the next chapter.


    # 7. Insuring Your Property


    Typically, an individual’s most important possessions are their home and automobile.
    Now that you have learned how to insure your life, health, and earning power,
    you want to be sure that your home(s) and automobile(s) are protected against
    significant financial loss as well.


    As you prepare to read this chapter, keep in mind that, unlike homeowner’s insurance,
    which generally is not mandatory unless you are required to purchase it by your
    mortgage lender, automobile liability insurance is required by many states. Specifically,
    states require all drivers to be financially responsible for damages or injuries
    caused to others as a result of automobile ownership. Liability insurance must
    be carried by every driver. However, insurance reimbursement for damage to your
    car or property (collision and comprehensive insurance) need not be carried. As
    such, you may choose to drop collision coverage and obtain only comprehensive
    (also known as other-than-collision) insurance for older automobiles. This is
    good cash-flow planning, because it makes little sense to insure a car that is
    worth only $1,500 for collision coverage when the annual premiums for such coverage
    may be $300 or more after a $500 or more deductible.


    ## What to Consider When Insuring Your Home


    Homeowner’s insurance insures your home (commonly referred to as “the dwelling”
    in the insurance policy) and the personal belongings that are in the home. In
    almost all cases, insurance companies write a package policy, meaning the policy
    covers not only damages to the home but also liability for any injuries you or
    family members cause to others while they are on your property. Various types
    of homeowner policies insure property based on the kind of dwelling you own, and
    most include the following general forms of coverage:


    - **Coverage A**: dwelling

    - **Coverage B**: other structures

    - **Coverage C**: contents (personal property)

    - **Coverage D**: loss of use

    - **Coverage E**: personal liability

    - **Coverage F**: medical payments to others


    You should also be aware that damage from some natural disasters is commonly excluded
    in the standard homeowner’s policy. Notably, damages caused to your home by flooding
    or earthquakes are not covered. However, federal flood insurance, underwritten
    as part of the National Flood Insurance Program (NFIP), may be purchased through
    your property and casualty insurance agent or broker. If the federal policy is
    insufficient for your needs, you should consider buying excess flood coverage
    from a private insurance company. Similarly, you can insure against earthquake
    damage by purchasing an earthquake endorsement to your standard homeowner’s policy.
    For example, in the state of California, an earthquake endorsement must at least
    be offered to the homeowner (although purchase of the endorsement is not required
    under state law).'
