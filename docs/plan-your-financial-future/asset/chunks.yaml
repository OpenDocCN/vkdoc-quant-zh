    ## Pension Maximization


    One option that allows you to retain those benefits is to have your spouse consent
    in writing (signed in front of a notary) to waiving the joint and survivor benefit.
    But if you proceed with this option, you are right back to where you started:
    leaving your spouse without loss-of-income protection at your death. Therein lies
    the pension dilemma.


    A preferable option is to elect the single life annuity from the pension and then
    purchase a life insurance policy for the amount of the sacrificed benefit if paid
    in the joint-and-survivor form (in the example, $450,000) and name your spouse
    as the policy beneficiary. Doing so has the advantage of partially converting
    potentially taxable pension benefits to your spouse to nontaxable insurance proceeds.
    In the financial world, this is known as the *pension-maximization planning technique*,
    founded on the idea that you use some of the additional pension payment you receive
    ($18,000 per year, in the example) to pay the premiums on the life insurance policy
    in order to keep the policy in force until the time of your death. Indeed, you
    can likely purchase much more coverage than $450,000 with an $18,000 annual premium.


    This technique works particularly well when the plan participant’s spouse is in
    poor health. In such instances, the cost for the amount of insurance needed to
    provide income for the poor-health spouse for their remaining life (assuming the
    plan participant predeceases the spouse) may often be less than the cost of providing
    the survivor benefit from the retirement plan.


    Why doesn’t everyone entitled to a pension payment from an employer-sponsored
    plan take advantage of the pension-maximization technique? A primary reason is
    that the 65-year-old, soon-to-be-retired individual may not be able to qualify
    for life insurance coverage because of poor health. Another is that life insurance
    is simply too expensive at that age. Finally, there is always the risk that premiums
    will not be paid and the insurance will not be there when needed.


    You need to look closely at a number of factors—including health, age, cost, and
    whether the pension payment is adjusted for cost of living each year—and see whether
    the pension-maximization technique is right for you. Hopefully, you will do this
    with the assistance of a competent financial advisor or life insurance agent.


    ## Retiree Health Insurance


    Health insurance coverage for retired individuals is becoming less common. Among
    businesses with 200–999 employees in 2017, approximately only 23 percent of them
    provide retiree health insurance, according to a study by the Kaiser Family Foundation.
    The statistics are even worse among businesses with fewer than 200 employees.
    Studies have shown that no more than 5 percent of these small businesses can afford
    to offer retiree health insurance.


    What should you do if you want to be insured against poor health during retirement?
    It depends on your age and whether you are working enough hours to be eligible
    for your employer’s group health insurance policy. Once you reach age 65, you
    probably will not be concerned about private health insurance coverage, because
    you will be eligible for Medicare. However, if you are newly retired, but not
    yet 65, you do not have a great many options.


    ### Option 1: COBRA Rights


    Your first option is to exercise your COBRA rights. Under the Consolidated Omnibus
    Reconciliation Act (COBRA) law of 1985, after you leave your job—as long as you
    were not terminated for gross misconduct—you may remain on your previous employer’s
    group health insurance coverage for a period of up to 18 months. To do so, as
    noted in Chapter [5](), you must pay your former employer’s share of the group
    premium as well as your own previous share. But you should not overlook the opportunity
    to take advantage of these rights if you retire before age 65. Alternatively,
    once you reach age 65 and qualify for Medicare, your younger spouse or dependent
    children may continue group coverage under the COBRA law for a period of up to
    36 months.


    ### Option 2: Health Savings Account (HSA)


    A second option is to begin to fund a health savings account (HSA), which is established
    much like the traditional or Roth IRA forms of saving for retirement but includes
    a high-deductible individual health insurance plan. You may make a tax-deductible
    annual cash contribution to your HSA and then use this contribution, plus its
    earnings, to reimburse yourself for medical expenses income-tax free. Moreover,
    once you become eligible for Medicare, you may draw on your HSA funds tax-free
    to pay your share of monthly premiums for Medicare Part B and any other co-insurance
    you share with the government under the Medicare system.


    ### Option 3: Individual Health Insurance Policy


    A third option is to purchase an individual health insurance policy. Although
    such policies are relatively expensive, you can save money by being a prudent
    shopper of policies, remaining healthy, and taking advantage of certain techniques.
    For example, if you are between ages 55 and 64, consider separating your coverage
    from that of your family at the time of application. Typically, individual health
    insurance is underwritten by companies according to the age of the oldest participant
    in the plan. Thus, if you have a younger spouse, you may be able to classify them
    for separate coverage under the plan and then combine their age with yours for
    a more favorable overall rating. You may also wish to consider titling the health
    insurance policy in the name of the younger spouse to ensure that they continue
    to have coverage after you become eligible for Medicare.


    ### Option 4: Health Maintenance Organization (HMO)


    Another idea that is similar to paying premiums on individual health insurance
    coverage is to pay a monthly fee for service to a health maintenance organization
    (HMO). In return for the payment of this fee, you can receive the services of
    medical professionals for any medical condition that may present as you age. There
    will be some months (hopefully many months) when you do not need health care–related
    services, but it is nice to know that treatment will be provided at little or
    no additional cost when you do need it. The same idea applies for direct-payment
    medical services now being offered by a number of private physicians (so-called
    *medical concierge practices*).


    ### Option 5: State-Guaranteed Policies


    If you find individual health insurance premiums or monthly service fees to be
    so high that they are prohibitive, investigate state-guaranteed policies. Typically,
    these types of policies are efforts by state governments to cover the uninsured
    or those who are so unhealthy that no insurance company will provide coverage.
    To become eligible for state risk pools, you must be rated as a high-risk, unhealthy
    individual, and you must have been rejected by private insurers. If you can withstand
    the blow to your ego with respect to being classified in such a manner, you may
    be able to obtain relatively inexpensive coverage.


    ## Medicare and Medicare Supplemental Insurance (Medigap)


    Both Medicare and Medicare supplemental policies (Medigap) were discussed in Chapter
    [5]() as part of the first step in the PADD approach to wealth accumulation and
    management—protecting yourself, your family, and your property. However, you might
    find it helpful to be reminded of the considerable gaps in Medicare Part A and
    Part B coverage. Once you become eligible for Medicare, you should purchase the
    standardized Medigap policy that is most relevant to your needs and health status
    at the time. I hope you have heeded the advice in this book with respect to your
    possible long-term health care needs and have been (or will be) paying the premiums
    on a long-term care insurance policy. Remember, neither Medicare nor private Medigap
    policies cover long-term care expenses, except in a limited manner, so it is up
    to you to provide for such coverage.'
