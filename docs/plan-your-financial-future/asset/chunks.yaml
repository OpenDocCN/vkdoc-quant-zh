    ### 债券作为投资组合的一部分


    一种常见的误解是，随着人们年龄增长，他们会变得更保守，这意味着本金的安全性和本金带来的可靠收入至关重要。精明的投资者——即使是退休人员——都明白，保护购买力以及实现超过通货膨胀的税后回报（所谓的实际回报）与本金安全性和保留原始投资价值同样重要。正如我们在第
    3 章讨论资产配置时提到的，有理由支持在任何退休人员的投资组合中包含股票和股票型共同基金。然而，债券也扮演着重要的多元化角色。


    当然，在投资单只债券之前，你必须理解的一个基本关系是：债券价格与市场利率呈反向变动。因此，如果你认为未来利率可能会下降，你应该持有债券，因为很可能会获得可观的资本利得。这一点在
    2007 年末至 2009 年中的熊市中得到了证明，当时利率同时下降，债券回报率显著超过了股票。此外，如果利率很可能下降，你还应该购买长期债券，因为它们的价格上涨幅度会超过短期债券。


    除此之外，随着股市表现出波动性——看似随机的价格涨跌——债券会与股票争夺投资者的资金。如果股市价格下跌，投资者会寻求正回报，更重要的是，寻求安全性——除了现金，没有比美国国库券、票据或债券更安全的投资了。反之，如果股市长期持续增值，投资者更青睐股票的高回报，尽管股票承担了更高的投资风险。尽管如此，无论你年龄多大，你都可能应该在投资组合中加入一些债券或债券基金，因为没有人，包括备受尊敬、经验丰富的证券分析师，能够绝对确定地预测股市在任何一天是涨还是跌。


    在探索债券投资选择时，你可能需要决定是投资单只债券还是债券型共同基金，但要注意它们具有不同的特点。对于单只债券，如果你持有至到期，你几乎总能拿回初始投资本金加利息。然而，对于债券型共同基金，你的总回报率是不确定的，因为该基金的价值会不断波动。


    ## 股票及其使用时机


    股票代表对一家公司的所有权或股权。作为股东，你从公司支付了包括债券持有人在内的所有债权人后的收益中获得回报。这种回报可以来自公司董事会每年宣布的股息，来自股份在公司将收益再投资后的资本增值，或者两者兼有。如果股息在某一年被宣布并且你收到了，那么作为股东，你需要为其纳税。另一方面，资本增值在出售股份之前无需纳税——而且即使到那时，如果你自购买之日起持有股份超过一年，很可能还能以优惠税率纳税。


    股票有两种形式：普通股和优先股。最广泛持有的是普通股，它可能提供也可能不提供股息，这取决于公司董事会当年是否宣布派息。普通股的市场流通性很好，因为它们通常可以在纽约证券交易所等公开交易交易所轻松买卖。然而，它们的流动性并不强，因为投资者可能收回也可能收不回他们的初始投资。事实上，普通股的价值在单个交易日中就可能发生显著变化。因此，普通股可能带来巨大的市场风险——这种风险可以通过适当的资产配置和投资组合多元化来最小化，但无法完全消除。


    持有普通股而非债券的一个主要优势是，在诸如选举公司董事会等重大公司事务上拥有投票权。然而，那些持股数量不足以达到控制地位（超过已发行股份总数的 50%）的股东，必须联合成一个整体才能影响公司未来的行动方向。即便如此，如果多数股东或控股股东持有不同意见，少数股东的观点也不太可能被考虑。


    大多数人，尤其是年轻投资者，购买普通股并非为了其收入潜力，而是为了其显著资本增值的可能性。相比之下，大多数投资者购买优先股的原因与购买单只债券非常相似：为了产生收入。优先股中的“优先”一词意味着，如果公司董事会宣布派息，优先股股东将在向普通股股东支付任何款项之前优先获得。在公司清算的情况下，优先股股东也比普通股股东优先获得偿付。


    公开交易的股票可以有多种分类方式，但最常根据其市场行为、所属的板块或行业以及发行公司的规模来进行归类。根据市场行为对股票进行分类的例子包括以下几种：


    -   收益型股票：这类股票持续向投资者支付高额股息。

    -   成长型股票：这类股票表现出显著的资本增值。

    -   价值型股票：这类股票被认为当前价格相对于其市场同行被低估。

    -   防御型股票：这类股票在熊市中下跌幅度小于其他股票。

    -   周期型股票：这类股票对当前的经济和市场状况很敏感。

    -   蓝筹股：这是规模最大、历史最悠久的公司的股票，其中包括许多道琼斯工业平均指数——最常被引用的市场活动指数——的成分股。

    '
- fmt: '标普评级服务公司将股票分为11个市场板块，并在这些板块内进一步划分出更多行业。总体而言，科技、医疗和金融通常属于增长最快的市场板块，而日常消费和公用事业则更为稳定。其他一些板块，例如非必需消费板块，往往具有周期性特征。


    发行股票的公司的规模被称为其市值，计算方式为每股价格乘以公司已发行的普通股数量。每股价格越高，已发行股票数量越多，发行该股票的公司的市值就越大。根据这一衡量标准，股票通常分类如下：


    *   大盘股：市值超过50亿美元的公司的股票

    *   中盘股：市值在10亿美元至50亿美元之间的公司的股票

    *   小盘股：市值低于10亿美元的公司的股票


    评估是否应该买入某只个股的方法有很多，但最常见的一种是相对估值技术，称为市盈率。这种价值估算方法基于一个前提，即股票的价值与发行公司产生的每股收益存在某种关联。这一前提得到以下事实的支持：无论是以股息还是资本增值的形式，投资者的回报率均源自公司在支付所有其他债权人后的剩余收益。


    例如，假设`ABC`股票在证券交易所的交易价格为每股40美元，许多投资者认为它是一只价值股。`ABC`在未来12个月期间的每股收益预计为2.50美元，并且你已经确定该股票的适用市盈率为20。因此，使用市盈率方法，`ABC`股票在12个月后的交易价格应为每股50美元（2.50美元乘以20）。由于其当前售价仅为每股40美元，`ABC`被低估了。如果你是一位价值投资者，你应该尽早买入该股票。


    ### 股票作为投资组合的一部分


    自1926年以来，普通大盘股的年复合收益率略高于12%。通货膨胀率平均为3%，因此实际税前收益率为9%，这是一个相当不错的长期表现，尽管近年来股市表现惨淡！然而，如果你查看风险金字塔，你会发现普通个股位于其顶端。这意味着该投资伴随着巨大的波动性（市场风险），其风险程度肯定高于投资级债券。因此，如果你打算将个股纳入你的投资组合，你需要在购买前仔细研究该股票（或者，让你的财务顾问来做这件事）。幸运的是，在做出潜在购买决策之前，你可以使用各种印刷服务（如`Value
    Line`）和在线参考资料。


    如果你决定将个股作为投资组合的一部分，那么你所选股票的类型取决于你的投资风格或投资取向。例如，如果你主要是一位成长型投资者，你可能会选择具有超平均盈利潜力的股票。如果你主要是一位价值型投资者，你会青睐那些相对于其行业或板块同行被低估的股票。为了实现适当的多元化，你的投资组合应由大约25只股票组成，分散在五到六个市场板块中。特别是对于股票，你应该是一个长期投资者，即买入并持有。虽然通过购买热门股票可能在短期内暴富，但股票通常只有在长期内才会升值。如果你在买入股票前做了充分的研究，并且相信发行该公司的财务前景，那么买入并持有对你来说应该不是一个有问题的投资策略。'
  raw: 'The Standard & Poor’s rating service divides stocks into 11 market sectors
    and into many more industries within those sectors. In general, however, technology,
    health care, and financials tend to be the fastest-growing market sectors, whereas
    consumer staples and utilities tend to be more stable. Some other sectors, such
    as the consumer discretionary sector, tend to be cyclical in nature.


    The size of the company issuing the stocks is referred to as its market capitalization
    , which is computed as the price per share of a company multiplied by the number
    of common shares it has outstanding. The higher the price per share and the more
    the number of outstanding shares, the greater is the market capitalization of
    the company issuing the stock. With reference to this measurement, stocks are
    generally classified as follows:


    *   Large capitalization (large-cap): The stocks of companies with market capitalizations
    of more than $5 billion

    *   Medium capitalization (mid-cap): The stocks of companies with market capitalizations
    of between $1 billion and $5 billion

    *   Small capitalization (small-cap): The stocks of companies with market capitalizations
    of less than $1 billion


    There are many ways to value whether you should buy an individual stock, but the
    most common is a relative valuation technique known as a price-to-earnings (P/E)
    ratio . This estimation of value relies on the premise that the stock’s value
    bears some relationship to the earnings per share generated by the issuing company
    or corporation. This premise is supported by remembering that the rate of return
    to the investor, whether in the form of dividends or capital appreciation, derives
    from the corporation’s residual earnings after all other creditors have been paid.


    For example, assume that ABC stock is trading on the stock exchange for $40 per
    share. It is perceived by many investors as a value stock. ABC’s earnings over
    the next 12-month period are estimated to be $2.50 per share, and you have determined
    that the relevant P/E ratio for the stock is 20\. Therefore, using the P/E ratio
    approach, ABC stock should be trading for $50 per share ($2.50 times 20) in 12
    months. Because it is currently selling for only $40 per share, ABC is undervalued,
    and, if you are a value investor, you should buy the stock at your earliest opportunity.


    ### Stocks as a Part of Your Portfolio


    Since 1926, the average large stock has generated a compounded annual rate of
    return of slightly more than 12 percent. Inflation has averaged 3 percent, so
    that is a 9 percent real, before-tax rate of return, which is a pretty good track
    record, notwithstanding the gloomy results of the stock market in recent years!
    However, if you were to look at a risk pyramid, you would find individual common
    stocks near the top. That means a great deal of volatility or market risk is associated
    with the investment—certainly more so than with investment-grade bonds. If you
    are going to include an individual stock in your portfolio, then, you need to
    research the stock carefully before you purchase it (either that, or let your
    financial advisor do it). Fortunately, you can use various print services, such
    as Value Line, and online reference sources before making a potential purchase.


    If you decide you want to include individual stocks as a part of your portfolio,
    the types of stocks you select depends on your style of or orientation to investing.
    For example, if you are primarily a growth investor, you will probably select
    stocks with above-average earnings potential. If you are primarily a value investor,
    you will prize a stock that is undervalued in relation to its industry or sector
    peers. To be properly diversified, your portfolio should consist of approximately
    25 stocks spread across five or six market sectors. Particularly with stocks,
    you should be a long-term, or buy-and-hold , investor. Although you may be able
    to make a killing in a short period of time from purchasing a hot stock, usually
    stocks increase in price only over long periods of time. Buy-and-hold should not
    be a problematic investment strategy for you if you did sufficient research before
    you bought the stock and you believe in the financial prospects of the company
    issuing it.'
