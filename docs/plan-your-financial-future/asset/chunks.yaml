    # Part I

    The Financial-Planning Process


    # 1. Understanding the Challenge: The Need to Begin


    The process of personal financial planning is both a challenge and an opportunity.
    A challenge because of the need to sometimes perform rigorous financial calculations,
    and an opportunity because of the ability to grow, often significantly, your wealth
    (or, in financial-planning language, your net worth). This chapter introduces
    a new way to engage in personal financial planning: the Protect Accumulate Defend
    Distribute (PADD) process. More broadly, the book describes, in depth, the challenge
    of the process and the opportunity that comes from effectively engaging in it.


    ## Wealth and the PADD Approach


    You need to understand one thing up front: this is not a book about how to get
    rich quickly (although if you follow the advice given in these pages, you may
    very well become rich). Rather, this is a book about slowly and consistently becoming
    wealthy.


    Wealthy, as defined by Merriam-Webster’s Collegiate Dictionary, is the state of
    “having wealth” or becoming “extremely affluent.” There is no mention of actual
    money in this definition, but most people can’t become wealthy without also being
    rich. In other words, the number of dollars you have (either in your pocket or
    invested in financial or real assets) is equivalent to wealth. This book attempts
    to go beyond the standard definition of monetary accumulation (or what most people
    think of when they hear the word rich) to characterize wealth as a process of
    achievement involving not only financial independence, but also an emotional and
    psychological state of looking forward to and being comfortable with the future.
    Indeed, when we substitute the word successful for wealthy, we see that what most
    individuals want is a successful and fulfilling future that involves much more
    than purely monetary riches!


    So how do you achieve wealth? This question has both a hard (monetary) and a soft
    (psychological) answer, but certainly having financial affairs that are not in
    order complicates the summative belief that you’ve achieved a wealthy life. Thus,
    implementing a financial plan to manage the future is important. If you have not
    assembled such a plan, or even if you have not thought about how best to manage
    the future, don’t worry—you’re not alone! Americans are notoriously bad planners
    (and notoriously good procrastinators), but the important point to understand
    is that financial planning and wealth accumulation are a journey and not a destination!


    You need to begin the financial-planning process and then (hopefully) continue
    it as best as possible, with or without professional assistance. This book is
    designed to help you do both—that is, as a do-it-yourself planner (as many individuals
    are inclined to be, either by conscious decision or by default of circumstances)
    or by becoming an educated consumer when seeking the help of a financial planner.
    In addition, the book introduces you to a simple way of thinking about the financial-planning
    process: the PADD approach to achieving lifetime wealth. The steps in this approach
    are as follows:


    *   Protect your assets.

    *   Accumulate monetary wealth.

    *   Defend your wealth.

    *   Distribute this wealth during your lifetime for the benefit of yourself and
    your family (and for the benefit of your heirs after your death).


    Let’s begin!'
