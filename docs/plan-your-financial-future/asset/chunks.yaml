  trans: '

    要计算应缴税的收益，您需要从售价（减去所有费用和佣金）中减去房屋的成本基础。这一计算过程凸显了妥善保留记录的重要性，因为房屋的成本基础通常等于您的购买价加上持有期间所做的任何改善。例如，假设您十年前以
    25 万美元购买了房屋。在持有期间，您花了 3 万美元装修地下室。现在，您房屋的调整后成本基础为 28 万美元（25 万美元加上 3 万美元的改善费用）。再假设您近期在房地产经纪人的帮助下以
    37 万美元出售了该房屋。您必须支付经纪人相当于售价 6% 的佣金。因此，用于计算任何应缴资本利得税的售价为 34.78 万美元（37 万美元减去 2.22
    万美元的经纪人佣金）。据此，您总的潜在应税收益为 6.78 万美元（34.78 万美元的净售价减去 28 万美元的成本基础）；但如果您符合 25 万美元的免税额条件，则用于税务目的，您没有任何已确认的收益。换句话说，如果您利用可用的免税额，您就无需缴纳任何所得税。


    要符合 25 万美元或 50 万美元的免税额条件，您必须同时满足所有权测试和使用权测试。具体而言，您必须：


    *   在出售前的五年中，至少拥有该住宅满两年

    *   在同一时期将该住宅用作您的主要居所


    如果您在出售时已婚并提交联合申报表，您或您的配偶中任何一方均可满足所有权要求，但双方都必须满足使用权要求。对于离婚或正在办理离婚的夫妇来说，如果一方在出售前搬离了住宅，这可能是一个特别难以满足的要求。如果您因工作变动（例如，您的雇主将您调往新地点）或其他不可预见的情况而未能满足这些测试，您可以按满足这些测试的年限占两年期的比例，来适用
    25 万美元或 50 万美元的免税额。


    例如，假设您于 2017 年 1 月 1 日购买了一套房屋，并于 2018 年 1 月 2 日被雇主调往另一个城市。您拥有该房屋已至少 12 个月，作为单身纳税人，您有权在出售收益中排除最高
    12.5 万美元的税款（25 万美元乘以 0.50，即 12 除以 24）。最后，与任何其他个人资产一样，出售用作个人居所的房屋所产生的损失，在所得税方面是不允许抵扣的。


    ## 汽车：你真的需要那辆新的兰博基尼吗？


    与历史上价值增值的房屋不同，没有其他使用资产的贬值速度比汽车更快。从债务管理的角度来看，您在借款购买一辆新的豪华汽车之前应该三思。请记住，借钱购买贬值的资产在财务上并不明智。然而，在美国大部分地区，汽车并非可随意选择购买的物品，而是出行的必需品。那么，充分利用这一日常生活必需工具有哪些技巧呢？


    *   如果您能忍受（对某些人来说）有失体面的事情，那就只购买一辆优质的二手汽车。汽车经纪人或参考在线网站可以帮助您找到合适的。然后，就像买房子一样，不要为此支付过高的价格。

    *   购买前做一些研究。例如，如果您决定买一辆二手车，请查阅《凯利蓝皮书》来确定您应该支付的零售价。如果您要购买新车，可以咨询在线服务以了解经销商的发票成本。从比该成本高约
    2% 的价格开始与经销商谈判，并尝试从该点往下谈。

    *   在购买前，尝试判断您感兴趣的汽车是否有可能成为经典车型。例如，那些有幸购买了 1957 年款雪佛兰或 1965 年款福特野马的人，将一项贬值资产（汽车）转变为了收藏品（经典汽车）。

    *   每次只购买一辆优质汽车，并至少保留十年或行驶十万英里。幸运的是，汽车的质量一直在提高，所以这应该不太困难。

    *   保持您的汽车处于良好维修状态并及时进行保养。事实证明，调校良好的汽车更省油，因此从长远来看，能为您省钱。


    在汽车方面您可能需要做出的另一个决定是购买还是租赁汽车。通常，当汽车用于商业目的的比例很高时，租赁可能比购买更有利。不仅租赁付款中用于商业的部分可以在所得税中扣除，贷款利息中用于商业的部分也可以扣除。此外，在特定限额内，租赁车辆的折旧也是税收抵扣项。最后，如果您要购买的车辆主要用于个人目的，那么长期购买并拥有这辆汽车是更可取的。特别是当租赁协议没有规定在租期结束时可以选择以汽车的折旧价值购买该车（即所谓的封闭式汽车租赁协议）时，情况更是如此。

    '
- fmt: '## Tangible Personal Property and Collectibles


    Tangible personal property, such as art, stamps, and coins, may be transformed
    from a use asset to an investment based on the rarity and quality of the property.
    Likewise, a hobby, such as stamp collecting, may turn into a business depending
    on whether the collector intends to earn a profit from the activity as determined
    by the IRS and the courts.


    Examples of popular investment-quality collectibles include artwork, gemstones,
    rare coins, antique dolls and furniture, and even baseball cards. All share certain
    attributes—notably, rarity and popularity within a sizable market. But collectibles
    generally do not provide any current income to the owner and are best held for
    capital appreciation. Once disposed of, the items are taxed at a special long-term
    capital gain rate of 28 percent.


    Although there is a market for collectibles, in most cases it is not an organized
    market. As a result, both buyers and sellers are at a disadvantage, because unless
    they are very skilled, they are unlikely to know what constitutes a fair price
    for the item. As with so many other consumer purchases, the Internet and a multiplicity
    of web sites (particularly eBay) have improved access to reliable information
    about collectibles. Still, by and large, the market for collectibles is inefficient.


    Another problem with tangible personal property that may become a collectible
    is that the market may be temporary. For example, several years back, Cabbage
    Patch Kids dolls were a heavily sought-after item that demanded high retail prices.
    Today, however, the craze has passed, and the price has returned to a more normal
    level. This is bad news if you bought at the top of the market, intended to make
    a subsequent profit, and now have no practical use for the dolls.


    It is possible to obtain insurance coverage for valuable tangible personal property.
    If you own standard-use property, you need to schedule or endorse the property
    for an agreed-on value with the insurance company, as mentioned in Chapter [7](#A314864_2_En_7_Chapter.html).
    If, on the other hand, your property is truly a collectible with a recognized
    and sustainable market, you must enter into insurance negotiations with a specialized
    underwriter, such as those found at the Lloyds of London insurance market.


    The next few chapters take up the defense of accumulated wealth, most notably
    from the harmful effect of income taxes. It is well understood by effective wealth
    managers that inflation and taxes are the two primary threats to wealth accumulation.
    However, only one of these threats—taxes—can be managed by the average individual.
    The purpose of the next section of the book is to show you how to manage taxes
    and leave more money in your pocket rather than adding to the fisc of Uncle Sam!


    ## Part IV: Defending Wealth


    ## Chapter 12: Income-Tax Planning and Management


    Now that we have discussed how to use the PADD process to protect and accumulate
    your wealth, we move on to the defense or preservation of that wealth. Specifically,
    this chapter focuses on income-tax planning and management, with subsequent chapters
    addressing transfer-tax (gift- and estate-tax) planning and life events that threaten
    wealth, such as divorce or loss of a job.


    You must effectively manage two primary threats in order to defend your wealth:
    inflation and taxes. Unfortunately, the rate of inflation is largely out of your
    individual control. However, you can be proactive when it comes to effective tax
    management, and the first step is to become familiar with the basic provisions
    of the income-tax system.


    ### Basics of Income-Tax Rates, Withholding, and Estimated Taxes


    A basic rule of wealth accumulation and management is to determine not only how
    much income you have to spend or save, but also how much of this income you get
    to keep. To maximize how much of your income you get to keep, you need to know
    your federal income-tax rate. Keep in mind that you should also know what your
    state income-tax rate is if you work in a state that imposes an income tax. However,
    because of the wide variation in state laws with respect to income taxes, only
    the basics of the federal system are discussed here.


    There are two types of federal income-tax rates: effective and marginal. Your
    effective, or average, tax rate is the total tax payable divided by your taxable
    income as reported on your federal income-tax return. Normally, though, when someone
    asks what your tax rate is, they are referring to your marginal income-tax rate,
    which is the percentage of tax applying to your next dollar of taxable income.


    As of the year 2018 and extending through the year 2025, seven federal marginal
    income-tax rates apply to salaries and wages (and most other income other than
    capital gains income): 10, 12, 22, 24, 32, 35, and 37 percent. These seven rates
    clearly are more than the two income-tax rates (15 percent and 28 percent) implemented
    by the Tax Reform Act of 1986. But historically, seven is still a relatively small
    number of income-tax rates. Moreover, as a result of the Tax Cuts and Jobs Act
    of 2017 (TCJA of 2017), the bracket of income to which the top rate applies is
    significantly increased, beginning at $500,000 for single individuals and $600,000
    for married couples filing jointly.


    Income is taxed in each of these rates according to a range of income known as
    an income-tax bracket. Your bracket depends on the amount of taxable income you
    make in a year and the filing status you use to report this income (for example,
    single or jointly filed with your spouse). As a tax-management technique, you
    want to do everything legally possible to not progress into the next-higher marginal
    tax bracket, where all remaining income is then taxed at a greater percentage.


    One strategy for minimizing your marginal tax rate involves holding investment
    or business property for a required length of time (currently, more than one year)
    before selling it. This is known as long-term capital gain property, and the tax
    rate that is assessed depends on your marginal income-tax rate. For example, if
    you are in the 10 or 12 percent marginal tax bracket, long-term capital gains
    are now permanently not taxed at all (a rate of 0 percent). Meanwhile, if your
    annual taxable income exceeds $425,800 for single taxpayers and $479,000 for joint
    filers (that is, you are in the top two individual tax brackets of 35 and 37 percent),
    long-term capital gains are taxed at a rate of 20 percent. In addition, a surtax
    of 3.8 percent (the purpose of which is to finance the future health insurance
    coverage provisions of the Patient Protection and Affordable Care Act of 2010)
    is charged on capital gain/investment income for single taxpayers with annual
    modified adjusted gross income (MAGI) over $200,000 for single filers and $250,000
    for joint filers. All numbers are adjusted for inflation.'
