- fmt: '# Group Disability Insurance


    Individuals with disability insurance generally receive it through their employer
    in the form of group long-term coverage. (As has been discussed, if your employer
    does not offer you disability insurance, you are unemployed, or you are self-employed,
    the purchase of an individual disability income insurance policy is probably one
    of the best moves you can make to protect your future wealth.) A group long-term
    disability policy normally has an elimination period of 30 to 180 days before
    you can draw benefits, but this period may be even longer if the policy is coupled
    with short-term disability coverage. Therefore, you need to find some way to cover
    your expenses while you wait for the long-term benefits to take effect, ideally
    by maintaining an adequate emergency or contingency fund.


    If you are fortunate, your employer also offers short-term disability coverage.
    This coverage may have an elimination period that is as short as seven days for
    illness and one day for injury. If written to cover illness, short-term policies
    generally function as a kind of sick leave from your job insofar as they pay you
    a specified dollar amount that is not tied to a percentage of your monthly compensation—as
    is the norm with long-term coverage. If written to cover injury or disability,
    the short-term definition of disability that is used is usually that of total
    disability, which precludes payment if you are only partially disabled or temporarily
    experience a loss of income.


    Group disability coverage is often less expensive than individual coverage. However,
    it is important to realize that you cannot customize coverage in a group policy
    nearly as effectively as you can with an individual policy. For example, in an
    individual disability policy, you can purchase coverage that will pay when you
    are unable to perform your own occupation. This is generally not possible with
    a group long-term policy that uses a combination of `Any Occupation` and `Modified
    Any Occupation` definitions of disability. See Chapter [6](#A314864_2_En_6_Chapter.html)
    for more on disability. Additionally, the group policy may not provide you with
    a cost-of-living increase in benefits as is possible with the purchase of a rider
    to an individual policy. Finally, you pay taxes on any disability benefits received
    from the policy if the employer pays the cost of the policy premiums during your
    employment years.


    # Group Long-Term Care Insurance


    The offering of group long-term care insurance by employers is a relatively new
    phenomenon. As a result of the rising cost of long-term care (and the relative
    paucity of government-provided benefits to assist in the payment of this cost),
    more employers are encouraging their employees to plan for this need and are helping
    them do so through group insurance plans.


    There are essentially three types of group long-term care plans, and the one that
    is right for you depends on the status of your current health. The most liberal
    and favorable type of these group long-term care policies, but also the most expensive,
    is a true group policy. This type of policy is underwritten as guaranteed issue,
    meaning no employee can be denied coverage, even if they already have a debilitating
    health condition that would preclude them from otherwise obtaining coverage. The
    price for this coverage is high, in part to discourage what is known in the insurance
    industry as adverse selection—meaning the sickest and most disabled employees
    are most likely to want coverage.


    A secondary form of true group long-term care policy is known as a modified guaranteed
    issue policy. This type of policy uses no medical underwriting but asks one or
    more disqualifying questions intended to eliminate the sickest and most disabled
    employees from the plan. The premiums are lower on modified guaranteed issue policies,
    and if you are relatively healthy (and could otherwise qualify for individual
    coverage), a policy of this nature may prove preferable to a true group policy.


    The third type of group long-term care plan—the individual long-term care plan—is
    offered to employers for group coverage to their employees on a discounted basis
    (typically, anywhere from 5 to 15 percent below the individual plan premium).
    Although these types of plans are medically underwritten (in other words, they
    are neither guaranteed issue nor modified guaranteed issue), they allow for more
    benefit options for employees. Employers like to “carve out” these policies for
    a select group of employees (usually executives), because the benefits are significant
    but the policies cost much less than true group policies. If you are an executive
    in a company, a discounted individual long-term care plan is probably best for
    you.


    If you currently do not have a group long-term care policy available to you as
    an employee, ask your human resources department to investigate the possibility
    of offering such a benefit. It is possible to offer a group policy on a ten-year
    paid-up basis—something that is generally not available with an individually obtained
    policy. Oh, and one last thing: the frequency of claims made on individual long-term
    care policies is relatively high—so high that many insurance companies are choosing
    not to enter the long-term care market or are getting out of the business of underwriting
    individual long-term care policies altogether. Accordingly, that is all the more
    reason you should be investigating whether your employer will offer a group policy
    for the benefit of all employees.'
