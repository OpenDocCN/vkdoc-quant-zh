    ## Appendix E: Sample Personal Letter of Instruction


    WRITTEN BY: __________________________________


    This is a personal letter of instruction, written by me, to be referenced by my
    personal representative (as named in my will) at my date of death. Although this
    letter does not have the binding effect of law, it does fairly represent my wishes
    at my date of death, and I ask that it be honored by my personal representative.


    THIS LETTER IS TO BE READ BY MY PERSONAL REPRESENTATIVE IMMEDIATELY AFTER MY DEATH.


    1.  Full legal name: __________  

    2.  Maiden name, if female: __________  

    3.  My date of birth: __________  

    4.  My place of birth: __________  

    5.  Parents’ legal names: __________  

    6.  My citizenship: __________  

    7.  My Social Security Number: __________  

    8.  Military service information, if applicable, including location of any discharge
    papers: __________  

    9.  Marital status at date of death: __________  

    10.  Name, address, and phone number of spouse or partner: __________  

    11.  Names, addresses, and phone numbers of any children: __________  

    12.  Names, addresses, and phone numbers of any brothers and sisters: __________
     

    13.  Names, addresses, and phone numbers of any friends or business associates
    to be contacted: __________  

    14.  Existence and location of advance medical directives (medical durable power
    of attorney, medical proxy, living will): __________  

    15.  Existence and location of financial power of attorney: __________  

    16.  Organ tissue and/or bodily donation information: __________  

    17.  Religious affiliation, if applicable: __________  

    18.  Designated preference of funeral home and/or other burial information: __________
     

    19.  Type of disposition of bodily remains (burial or cremation): __________  

    20.  Location of any burial plot or crypt: __________  

    21.  Preferable memorial donations, if any: __________


    ## Glossary'
  trans: '

    ### 解剖、遗体捐赠及遗骸处置


    在法律允许的范围内，我授权我的代理人将我的部分或全部遗体用于医疗目的进行解剖捐赠，授权进行解剖，并指示遗骸的处置方式。


    ### 指定备用代理人


    若被指定为我的代理人无法履职或无法联系，我特此指定以下人员作为我的备用代理人，根据本文件授权代我做出医疗保健决策。


    备用代理人：________________________


    地址：________________________


    电话：________________________


    与我的关系（如有）：________________________


    ### 指定监护人与财产管理人


    若需为我指定人身监护人，我提名我的代理人（其次为备用代理人）担任我的监护人。若法院有必要为我的财产指定财产管理人，兹此作出与监护人相同的提名及指定顺序。


    ## 一般规定


    ### 免责与第三方信赖


    所有善意执行本文件条款与规定的个人（包括主治医生）或实体，均不对我本人、我的遗产、继承人或受让人因该等行为引发的任何损害或索赔承担责任。然而，若任何人恶意质疑我代理人的权限，或故意违背本文件的任何条款，我的遗产不承担任何责任，也无义务支付因代理人代表我所采取行动而产生的任何费用或开支。


    ### 可分割性


    若本文件的任何条款被认定为无效，该无效性不影响其他条款的效力，其他条款可在不包含该无效条款的情况下继续生效。为此，本文件中的指示具有可分割性。


    ### 意向声明


    我的意图是使本文件具有法律约束力和效力。若法律不承认本文件具有法律约束力和效力，则我意图将本文件视为一份正式声明，陈述我在无法做出医疗保健决策期间，希望他人代我做出此类决策的方式。本授权书旨在提交的任何司法管辖区内均有效。


    ### 条款不一致


    若《医疗持续性授权书》与《医疗或手术治疗声明（生前预嘱）》的条款存在不一致，应以《医疗持续性授权书》为准。


    ### 撤销先前的授权


    我特此撤销任何先前的医疗保健授权书，并重申上述之意图。


    ### 适用法律


    所有与本文件的有效性、解释及管理相关的问题，均应根据 ________ 州的法律确定。


    我已阅读并理解本文件的内容以及授予我代理人此等权力的效力。我于情感及心智上均具备作出此声明的能力。


    于 20xx 年 ____ 月 ____ 日签署。


    签字：________________________


    本人


    本人姓名：________________________


    本人地址：________________________


    本人社保号：________________________


    本人生日：________________________


    ## 见证人声明


    上述文件由 ________（本人姓名）______（本人）签署并声明为其关于医疗或手术治疗的声明及医疗持续性授权书。我们在其面前、彼此面前，并应 ________（本人姓名）______
    的要求，作为见证人在下方签署姓名，并声明：据我们所知所信，签署本文件时，________（本人姓名）______ 心智健全，未受任何胁迫、欺诈或不当影响。见证人均不是
    ________（本人姓名）______ 的主治医生或任何其他医生、主治医生或 ________（本人姓名）______ 就诊的医疗机构的雇员、在签署声明时对
    ________（本人姓名）______ 去世后的遗产任何部分享有债权的人、或者知道或相信自己有权在 ________（本人姓名）______ 去世后获得其遗产任何部分的人（无论是作为签署声明时已存在遗嘱的受益人，还是作为法定继承人）。见证人也不是本文件指定的代理人。见证人不是医疗或住宿护理服务的提供者或其雇员。


    见证人


    签字：________________________


    姓名：________________________


    地址：________________________


