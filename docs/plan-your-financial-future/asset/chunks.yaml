- fmt: '# The Use of Annuities in Retirement Planning


    According to the McKinsey Consumer Retirement Surveys, the proportion of US working-age
    adults who consider the lack of a guaranteed retirement income to be an extremely
    important risk increased from 28 percent in 2004 to 61 percent in 2009. This percentage
    has likely only increased from 2009. Indeed, outliving one’s money is the number
    one retirement planning concern expressed by a majority of retirees. As such,
    immediate fixed or variable annuities with a lifetime `GWB` rider at the time
    of retirement have increased in importance. This reflects the primary advantage
    of using an annuity in retirement planning: annuities allow you to own a safe
    investment with a guaranteed lifetime income stream. In other words, as the annuitant,
    or person receiving the annuity payments, you cannot outlive your money.


    Annuities offer other advantages in planning for the financial aspects of retirement:


    * If you purchase a deferred variable annuity, you have the opportunity to grow
    your account balance through investment in mutual funds as part of the annuity’s
    subaccounts. It is also possible to purchase a `GMIB` rider with this form of
    annuity, ensuring a minimum amount of guaranteed investment return on your money.

    * You can plan the timing of income receipt to take advantage of years when you
    are in a lower tax bracket.

    * If you have purchased a nonqualified annuity, such as a nondeductible IRA, you
    have to pay tax only on the earnings accumulated in the annuity at the time of
    distribution.

    * You never have to make required minimum distributions from a nonqualified annuity
    and therefore can leave the entire account balance to your heirs at your death.


    When should you consider purchasing an annuity as part of the lifetime wealth-accumulation
    and distribution process? When you want the following:


    * A guarantee that you cannot outlive your money during the retirement period
    (in other words, you avoid longevity risk)

    * An opportunity to grow any invested funds on a tax-deferred basis

    * An alternative or supplement to a traditional or Roth IRA that permits unlimited
    annual contributions

    * An alternative beyond maximizing contributions to an employer-sponsored retirement
    plan or a traditional deductible IRA


    But as a general rule, you should not consider the purchase of a nonqualified
    annuity or any after-tax retirement-planning savings vehicle until after you have
    annually contributed all that you can on a pretax basis to your employer-sponsored
    plan or deductible IRA.


    # How Much Should I Withdraw Annually During Retirement?


    To steal the name of a popular game show from many years back, the $64,000 question
    is, “How much should I withdraw annually during retirement?” Before you can answer,
    you need to ask three corollary questions:


    1. Over what time frame should my retirement money be expected to last?

    2. In what assets should I invest to have the least probability of outliving my
    retirement money?

    3. Once I begin making withdrawals, what retirement monies should I access first
    to most effectively minimize income tax due?


    With respect to the first question, several academic studies have determined that
    a 4.5 percent annual withdrawal rate, adjusted for inflation each year, provides
    the greatest chance that a retiree will not outlive their money. Therefore, you
    should assume a retirement distribution period of approximately 30 years with
    a 4.5 percent after-inflation withdrawal rate. Specifically, studies have shown
    that you have only about a 10 percent chance of outliving your money over that
    period using the optimal 4.5 percent withdrawal rate.


    The second question begs the issue of what you should invest in during your pre-retirement
    period to optimize your chances of not outliving your money. Empirically, it has
    been shown that a constant asset allocation of approximately 60 percent equities
    and 40 percent bonds and cash or cash equivalents in your retirement savings portfolio
    affords you the greatest chance of not outliving your money. Specifically, I suggest
    that your retirement portfolio should consist of a 40 percent allocation to large
    capitalization, blended stocks, or mutual funds (blended means a combination of
    value and growth stocks), a 20 percent allocation to international stocks, a 30
    percent allocation to intermediate-term investment-grade bonds, and a 10 percent
    allocation to cash or cash equivalents.


    Once you begin making annual retirement withdrawals, a basic rule of thumb can
    minimize income tax on those withdrawals:


    * Withdraw money first from taxable accounts, thus reducing your future tax bills
    as much as possible.

    * Next, withdraw funds from tax-deferred retirement accounts, such as a traditional
    deductible IRA, where `RMD` requirements apply beginning at age 70 and 6 months.

    * Last, tap Roth IRA monies, because no taxes are paid on qualified distributions
    made from those accounts.


    To summarize the process of planning for your financial needs in retirement: keep
    a constant allocation of 60 percent equities and 40 percent bonds and cash or
    cash equivalents in your portfolio, and withdraw only a real rate of 4.5 percent
    annually from a portfolio of taxable, tax-deferred, and Roth IRA accounts, in
    that order. If you follow this rule, you will have a high probability (approximately
    90 percent) of not outliving the money you have saved for retirement.


    Now let’s move on to other, nonfinancial aspects of planning for retirement, such
    as where you will live and what you will do to experience a prosperous retirement.


    # Planning for the Lifestyle Needs of Retirement


    Now that you have decided how you will finance your retirement, you need to consider
    where you will live and what you will do during your retirement. For many retirees,
    the choice of where to live is fairly simple: they continue living in the home
    they purchased prior to retirement. But you have many choices to make regarding
    where you will live, including the type of facility you will live in, as discussed
    shortly. What you will do in your retirement, however, is more complicated.


    Many newly retired individuals, who worked for 35 to 40 years, need to find a
    new identity after they retire. This is not easy. While you are working and thinking
    about retiring, the first thing most casual acquaintances ask is what you will
    do when you stop working. Part of this chapter is dedicated to helping you answer
    that question when you are retired.


    ## Housing Options for Retirees


    Newly retired individuals have at least 11 housing options:


    * Single-family dwellings

    * Town homes

    * Condominiums

    * Apartments

    * Living with one or more of your children

    * Independent-living communities

    * Assisted-living communities

    * Memory care units

    * Continuing-care retirement communities (CCRCs)

    * Skilled nursing-care facilities

    * Traditional nursing homes


    Recently, several more types of housing have been added to this list of options,
    including row homes and lofts, but these are likely to be of more interest to
    your children or younger generations.'
