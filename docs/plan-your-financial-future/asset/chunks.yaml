    maintained your home and you incur a loss, you are not covered.)

    *   Losses caused by war.

    *   Losses resulting from a nuclear hazard.

    *   Any damage resulting from an intentional act of the insured. (If you burn
    down your house, the insurance company will not cover this loss.)


