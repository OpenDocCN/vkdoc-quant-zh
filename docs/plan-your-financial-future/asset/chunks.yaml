    # 通过指定受益人方式传承财产


    通过指定受益人（例如人寿保险单、`IRA` 及工作单位退休计划中的受益人指定）可以避免遗嘱认证程序，将财产留给他人。尽管许多具备相关知识的消费者都知晓这一可能性，但对于无法指定受益人的财产（例如支票账户、储蓄账户、经纪账户以及个人或不动产物品）又该如何处理？遗憾的是，在向他人分配财产时，每一项财产都必须单独考量。


    一般来说，支票账户和储蓄账户只能通过遗嘱（或您所在州的无遗嘱继承法）留给他人。如果您已婚，不妨考虑将这些账户设为与配偶的共同共有账户，并享有生存者继承权。若以此方式设立账户，您去世后，账户将直接转移给另一位列名的共同共有人，而无需依据遗嘱处理。但请注意，在您有生之年，配偶双方均拥有账户内资金的
    100%所有权，并可在未经另一方同意的情况下自行处置。如果您未婚，但仍希望在支票账户和储蓄账户上添加第二个名字，请要求银行设立一个仅为方便之用的联合账户（也称为便利账户）。在大多数州，以此方式设立账户意味着账户的第二方可以支取支票或储蓄账户中的资金——但仅限于为第一共同共有人的利益。去世后，便利账户可能无需立遗嘱即可留给第二方，也可能不行，具体取决于特定州的法律。


    经纪账户通常更容易在无需立遗嘱的情况下直接转移给他人。如第 14 章所述，如果您与股票经纪人合作，请要求他们使用“死亡转移”（`TOD`）表格来设立经纪账户。与`IRA`或退休计划一样，您只需为账户指定受益人，并填写经纪人或者共同基金家族要求的表格，即可实现此请求。但请注意，如果您在有生之年未为经纪账户填写`TOD`表格，那么您去世后，其处置将依据您的遗嘱或所在州的法律。值得注意的是，银行有类似的“死亡即付”（`POD`）表格，用于将银行账户直接转移给指定受益人。


    许多被继承人对去世后个人物品的处置可能并不十分在意。这要么是因为他们没有多少珍贵物品，要么是只想将个人物品留给他人出售或处理。然而，如果某件物品是古董或已传了几代人，您应在遗嘱后附上一份个人财产备忘录声明，以规定该物品的处置方式。所有州都认可此声明。只要该声明在遗嘱中被引用，并且遗嘱包含某些默认条款，您就无需在签署遗嘱时完成此声明。相反，您可以随后描述您希望留给他人的物品，并在日后签署该声明。换句话说，您有时间根据未来情况考虑如何最好地处置贵重物品。


    最后，在大多数州，个人名下的不动产（如您的住宅）可通过受益人契据单独分配。此外，您不必是房产所在州的居民，即可使用该州的受益人契据。完成此契据的主要目的是避免您去世后对不动产或住宅进行遗嘱认证。因此，正确填写受益人契据可以替代遗嘱，用于处置此类财产。但请记住，该契据是否需要备案才能生效，各州规定可能不同，因此您在完成契据后应查询所在州的法律。


    # 财产共有登记


    现在我们来看一下遗产规划中所谓的“穷人的遗嘱”——将您的全部或大部分财产登记为共同共有，以便在您去世的州，这些财产依法转移给受益人。这样做意味着您可能根本不需要立遗嘱，尽管如上所述，您可能出于其他原因希望立遗嘱。请记住，虽然与他人共同登记财产是您去世后转移财产的一种简单有效的方法，但出于遗产税方面的考虑，您可能需要重新考量。毕竟，将财产以共同共有方式留给一个已经以自己名义拥有大量财产的生存共有人，可能会增加该幸存者潜在的遗产税负担。


    例如，假设您去世时与他人共同拥有一项公允市场价值为 1000 万美元的财产。根据幸存者去世的时间以及当时的遗产税免税额，如果该幸存者在接收您的财产之前，已以自己名义拥有
    1000 万美元的财产，那么他们最终可能欠下巨额遗产税。请注意，对于作为他人财产幸存共有人的配偶和非配偶来说，这可能都是一个需要关注的问题。


    如果您认为去世时不会面临遗产税问题，那么与他人共同拥有财产可以替代其他资产上可能的受益人指定。在这种情况下，即使您确实立有遗嘱并将财产留给非生存共有人的人，遗嘱条款通常也会被忽略，财产将依法转移给生存的共有人。

    '
- fmt: '# Should I Avoid the Probate Process at Death?


    As discussed in Chapter [14](#A314864_2_En_14_Chapter.html), the probate process
    can best be described as the act or process of proving the legal validity of a
    will. But this entails numerous steps and court intervention, which may lead to
    both excessive cost and delay in distributing your property to heirs. For these
    reasons, among others, many decedents wish to avoid the process entirely.


    Individuals can avoid probate via three primary methods:


    - You may use a beneficiary designation whenever possible to leave specific property
    to a named individual or individuals.

    - You may title property with survivorship rights. In most states, this means
    titling property jointly with another person; but even in community-property states,
    such as California and Texas, it is possible to elect rights of survivorship with
    respect to property acquired during a marriage.

    - You may establish and transfer assets to a revocable living trust.


    Because of its popularity, the revocable living trust (RLT) deserves additional
    explanation. In order for the assets in an RLT to avoid probate, they must be
    transferred out of the individual names of the owners and retitled in the name
    of the trustee. It is possible, however, and common, for the original owner to
    also name himself or herself trustee of their RLT. To do so, the owner must simply
    prepare and file a quitclaim deed that transfers the title to the property from
    their individual name to their name as the trustee. For this to occur properly,
    a trust document must exist at the time the title is transferred. If no such document
    exists, the retitling from individual owner to trustee is not legally valid, and
    all relevant property must be probated.


    Even if you write an RLT document, keep in mind that only the property that is
    actually retitled in the name of the trustee may avoid probate. Accordingly, many
    individuals couple the drafting of an RLT with a pour-over will, which is executed
    for the express purpose of transferring forgotten and after-acquired property
    into the RLT. In other words, the will "pours over" this property to the RLT at
    the decedent''s death and distributes it according to the terms of the trust.
    Because certain pieces of property are still owned by the decedent in their name
    at the moment of death, the property passing via the will is subject to the probate
    process. Nonetheless, the fair market value of this property is typically so nominal
    that many state laws provide for an exemption.


    We have now discussed the reasons for avoiding probate and the primary methods
    available to individuals who wish to do so. But this discussion begs the question:
    should you avoid the probate of assets at your death? After all, probate has several
    advantages. It provides a mechanism to clear title to the decedent''s property,
    and it also implements the provisions of the decedent''s will. Another frequently
    overlooked advantage of the probate process is that it protects the decedent from
    an untimely filing of claims by their lifetime creditors. For example, let''s
    say you own a small business and have many creditors at the time of your death.
    If your interest in the small business undergoes probate, the business creditors
    must file their claims against the estate within nine months of your death—or
    another specified period under state law—or they are forever barred. As such,
    should you anticipate the filing of some unknown creditor''s claim at your death,
    forcing these creditors into a time-specific period to make their intentions known
    is prudent estate planning.


    Ultimately, the only person who can make a decision about whether you want your
    estate to avoid probate is you! You should recognize the advantages of having
    your property probated at death and keep in mind that probate''s frequently cited
    disadvantages—cost, the potential for delay, and the public nature of the process—may
    not be so important that you should skip the process altogether.


    # Estate Taxes


    Estate taxes may be assessed at both the federal and state levels (for example,
    New York has an estate tax), but typically only the federal tax rates are of concern
    to most decedents. Regardless, be aware that your state may have a lower exemption
    level than federal law for the taxation of gross estates, so you may end up owing
    estate tax at the state level even if you are not required to file a return or
    pay tax at the federal level. If federal or state estate taxes are likely to be
    due on either your or your spouse''s estate, you may want to include some tax-planning
    measures in your will or trust. The inclusion of these measures initially makes
    the writing of a will or trust more costly, but the planning will pay for it many
    times over in estate taxes saved.


    Estate taxes at the federal level are part of what is known as the unified transfer
    tax system. In practical effect, this means the tax rates and brackets are the
    same regardless of whether you make a lifetime gift of property to others or transfer
    this property to others at your death. Thus, operationally, any lifetime taxable
    gift you make reduces the amount of property you can leave to your heirs or beneficiaries
    at death.


    Assume, for example, that in 2018 you make a taxable gift of $1 million to someone
    other than your spouse (if to your spouse, an unlimited deduction applies). Although
    you pay no federal gift taxes—an allowance of $11.2 million is permitted before
    any gift tax is due—you have reduced your current aggregate $11.2 million estate-tax
    exemption to only $10.2 million. If you die with a tentative tax base (after adding
    back in the lifetime gift) of $11,200,001 in 2018, that $1 of additional property
    is taxed at a marginal tax rate of 40 percent.


    Note that the reduction of your exemption for estate-tax purposes does not mean
    you should avoid lifetime gifting. Rather, this means, first, that you should
    take advantage of the annual gift-tax exclusion ($15,000 per person in 2018),
    because this exclusion is applied before you begin to calculate tax liability
    on a taxable gift; and second, and perhaps even more important, you may be able
    to exclude the subsequent appreciation of gifted property from your estate. For
    instance, in the example, let''s say you do not die until 2020, and the property
    gifted in 2018 appreciates 50 percent over the course of those two years. Because
    you previously gifted the property, you will avoid estate taxes on $500,000 (or
    the 50 percent of appreciation).


    Once your taxable estate has been computed at your death, your executor may apply
    a specified amount of credit—known in estate-tax language as the unified credit—against
    your tentative estate tax due. As with income tax, a credit is a dollar-for-dollar
    reduction against taxes, so what you should really be concerned about is the amount
    of that credit in the year of your death. In turn, that credit equates to an amount
    of property that may be transferred estate-tax-free to others at your death (hence
    the term exemption equivalent or applicable exclusion amount). For example, in
    2018, the amount of allowable unified credit is $4,425,800, which is equivalent
    to an exempted property amount of $11.2 million.'
