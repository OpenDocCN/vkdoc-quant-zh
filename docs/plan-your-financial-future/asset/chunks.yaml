  trans: '

    ## 多元化投资组合的基本原理


    多元化投资组合应在两个层面实现分散：一是资产类别之间，二是资产类别内部。因此，除了将资产配置于股票、债券和现金等价物之外，你还需要在这三大类资产内部进行混合投资。成功做到这一点的关键在于，找出那些在不同市场条件下可能表现各异的投资标的。例如，你应该找到一支在下跌市场（即熊市）中不会下跌（或跌幅较小）的股票。寻找表现如此稳定的股票——这一过程也称为`相关性`——并不容易；本质上，找到这样的股票正是投资组合经理赚钱的方式。公立图书馆里的投资教科书可以大致告诉你实现这一目标的方法。不过，在此要奉劝一句：把专业的事交给专业人士！如果你试图自行挑选低正相关或负相关的股票，很快就会发现需要耗费大量研究时间，可能还要损失资金，而且最终很可能还是选不对股票。


    由于实现有效分散并非易事，你可能更愿意购买多只共同基金。共同基金是一种由投资公司挑选、专业管理的资产类型，它汇集众多投资者的资金，投资于股票、债券和金融资产。这类基金让个人投资者轻松拥有大量投资组合中的一小部分。但需注意：投资共同基金并不一定就能立刻实现分散化。例如，某只共同基金可能只投资于同一行业公司发行的股票（称为`sector
    fund`，即行业基金）。因此，如果你购买了一只行业共同基金，你在资产类别之间实现了分散，但在资产类别内部并未分散。一只只投资于科技公司股票的共同基金，并未参与包含更多类型公司和行业的更广泛市场。


    还有一些方法可以根据你的年龄和人生阶段，购买自动实现分散化的共同基金。`生命周期基金`是一种多元化共同基金，它会随着未来特定年份（即目标日期）的临近，自动转向更为保守的投资组合（更多债券、更少股票）。得益于
    2006 年通过的养老金计划立法，生命周期基金被那些倾向于持有预先打包好数量的投资以实现财务目标（通常是为退休储蓄）的投资者广泛使用。该基金的管理者负责所有关于资产配置、分散化和再平衡的决策。这类基金很容易识别，因为它们的名称中通常包含一个目标退休日期（如
    2030 年、2035 年、2040 年等）。


    ## 再平衡的基本原理


    再平衡是初始资产配置决策中的基本环节，对于使投资组合回归初始资产配置比例或百分比是必不可少的。为什么需要进行再平衡？随着时间的推移，你的一些投资和资产类别会比其他资产类别增长更快（或下跌更多），从而偏离你在投资政策声明中指定的初始百分比。


    假设股市经历了一个“好年景”（即大多数股票资产价值上涨的年份）。结果，你最初 60%的股票配置现在已增至总组合的 75%。这也意味着你配置在债券和现金等价物上的比例下降了。假设你希望忠实于制定投资政策声明时所确立的资产配置比例，那么你将面临两种选择：要么卖出部分股票投资，要么从债券和现金或现金等价物资产类别中购买更多投资。这并非坏事。财务规划流程中常常未能做好的步骤之一便是第
    6 步：计划的监控部分。投资组合再平衡是一种自动触发机制，将有助于你实际完成这一步骤。


    你应该多久对投资组合进行一次再平衡？如同财务规划和财富积累中的许多其他问题一样，这个问题也没有明确的答案。如果你聘请了投资顾问或专业财务规划师的服务，并且已设立独立账户来持有你的资产，那么顾问会在需要再平衡时通知你。反之，如果你自行操作，这个决定由你自己做出，不过按年度进行再平衡可能是审慎的做法。无论时间框架如何，在再平衡投资组合之前，请考虑再平衡可能产生的任何交易费用或所得税影响。


    如果你投资于应税账户，并且股票或债券价值遭受了损失，可以考虑现在就卖出这些资产，并用这笔损失抵扣你的所得税。这样做还可以避免普通投资者常犯的最大错误之一：拒绝放手！有些证券永远无法恢复其原始价值。即使能恢复，也想想在此期间你的资金本可以赚取多少收益。普通投资者很少会考虑本可以用这笔资金去做——但实际却没有做——所带来的机会成本。


    ## 投资策略


    可以用来积累财富的投资策略数量，可能仅受限于你自身的想象力和证券法规，但让我们来谈谈几种最常见的策略。

    '
- fmt: '### Dollar-Cost Averaging and Share Averaging


    `Dollar-cost averaging` is sometimes euphemistically referred to as “the poor
    man’s method of saving.” Using `dollar-cost averaging`, an investor purchases
    additional shares of stock in a mutual fund at regular intervals, usually in equal
    amounts, regardless of market conditions. Often, this is done through the use
    of an automatic withdrawal plan offered by the stock issuer or mutual fund company.
    When withdrawals are made from your paycheck in order to make `401(k)` plan contributions,
    you are essentially pursuing a `dollar-cost averaging` strategy.


    The practical result of `dollar-cost averaging` is to gradually increase the number
    of mutual fund shares you own over a long period of time. In the event that the
    current price of the fund is below its previous price, you have succeeded in purchasing
    more shares of the investment. Because more shares are acquired when the price
    of the fund declines, this has the effect of reducing the average cost per share.
    Subsequently, if the price of the fund rises, you earn more profits on lower-priced
    shares, thereby increasing your overall rate of percentage return.


    For example, assume that you purchased a $5,000 portion of `ABC` mutual fund in
    January 2018, when its share price was $20. You purchased a total of 250 shares
    ($5,000 divided by $20). Now, instead, assume that you made five separate purchases
    of `ABC` mutual fund during 2018 using this same $5,000, but you did so in $1,000
    increments, when the price of the fund fluctuated as follows:


    | Month | Share Price | # of Shares Purchased |

    | --- | --- | --- |

    | March 2018 | $22.00 | 45.45 |

    | May 2018 | $19.50 | 51.28 |

    | July 2018 | $18.00 | 55.55 |

    | September 2018 | $17.50 | 57.14 |

    | December 2018 | $20.25 | 49.38 |

    | | | Total: 258.80 |


    Further assume that you plan to sell all the separately purchased `ABC` shares
    in January 2020, when `ABC`’s per share price is estimated to be $24. Your total
    sale price will be $6,211.20 ($24 times 258.80 shares), and you will have recognized
    a gain of $1,211.20 ($6,211.20 less $5,000). What if you had sold your original
    January 2018 shares? Your gain would have been only $1,000 ($6,000 less $5,000).
    Using `dollar-cost averaging`, you increased your annual compounded rate of return
    by almost 2 percent (from 9.54 percent to 11.46 percent).


    As the previous example illustrates, `dollar-cost averaging` works best when markets
    are declining or fluctuating. It does not work well when the market is steadily
    increasing; in that event, you are better off buying as many shares as possible,
    as soon as possible, when the price per share is lower. If an experienced investor
    learns one lesson throughout their years of investing, it is that markets rarely
    go straight up or straight down. Rather, fluctuation in share values is the rule
    and not the exception. Therefore, `dollar-cost averaging` should be a valuable
    wealth-building strategy for you, as it has been for millions of other investors.


    A variation of the `dollar-cost averaging` technique is `share averaging`. When
    an investor `dollar-cost averages`, the number of dollars spent on stock or mutual
    fund purchases at regular intervals is held constant, but the number of shares
    purchased with these dollars varies. Conversely, when an investor `share averages`,
    the number of shares purchased remains constant, but the number of dollars spent
    to make those purchases varies. With `share averaging`, the investor purchases
    a fixed number of shares, regardless of how low the price falls. Thus, they do
    not obtain the reduction in the average cost of the shares to the same extent
    as is possible with `dollar-cost averaging`. This is why, as a wealth-building
    technique, more investors implement `dollar-cost averaging` than `share averaging`.


    ### Averaging Down


    As you can see from our example involving `dollar-cost averaging`, an investor
    can leverage their gain by buying more shares when the price of a certain asset
    declines (as long as the price eventually goes back up before the investor sells).
    Is there a strategy that results in buying additional shares only when the price
    goes down? Yes. It is referred to as `averaging down`. In our example, you would
    have bought `ABC` shares only in May 2018, July 2018, and September 2018, when
    the share price fell below the original $20 purchase price, and not in March 2018
    and December 2018, when the price was more than $20.


    Is pursuing this strategy a good idea? The answer depends on whether you are more
    interested in purchasing the stock or the company issuing the stock. If you are
    interested only in the stock, `averaging down` may not be a good strategy, because
    (as with `dollar-cost averaging`) the ability to make a profit ultimately depends
    on the share price increasing. If the share price does not increase, you will
    have purchased more shares of a stock that you likely should have considered selling
    in the first place. In other words, you will now have more shares of a losing
    stock. Alternatively, if you are purchasing the company issuing the stock, presumably
    you have researched the prospects of that company and the industry in which it
    does business. Accordingly, you should have greater confidence in the possibility
    for an increase in the price of that company’s stock, as well as reasonable assurance
    that a decline in price is only temporary. Therefore, if you are using the strategy
    in this manner, `averaging down` may make more sense as a long-term investment
    technique.


    In any event, proceed carefully! Unless you are an experienced investor, `averaging
    down` is an investment strategy you should not try without the help of a professional.


    ### Dividend Reinvestment Programs


    Unlike `averaging down`, which is for only experienced investors, stocks that
    offer a `dividend reinvestment program` (`DRIP`) should be considered by any investor.
    With a `DRIP`, dividends declared are automatically reinvested in the stock, adding
    to the investor’s overall ownership share. If you want to build an ownership percentage
    in a company, this is the way to do it!


    `DRIPs` offer other advantages. If the dividends are reinvested automatically—instead
    of paid directly to the shareholder—the investor purchases the additional shares
    of company stock without having to incur a broker’s commission. Also, because
    the company tracks your purchases and keeps records of the purchase price, it
    can easily provide you with cost basis information in the event that you want
    to sell.


    Many mutual funds have similar programs. If you are working with an investment
    advisor or financial planner who has positioned your holdings in some form of
    advisory account, ask them whether you can opt to reinvest any capital gain or
    dividend distributions (or both) into the purchase of additional shares of the
    fund. If this option is available, consider taking advantage of a `DRIP` as an
    easy way to save and build wealth.'
