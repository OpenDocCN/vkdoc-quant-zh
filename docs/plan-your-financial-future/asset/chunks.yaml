    because of the wide variation in state laws with respect to income taxes, only
    the basics of the federal system are discussed here.


    There are two types of federal income-tax rates : effective and marginal. Your
    effective, or average, tax rate is the total tax payable divided by your taxable
    income as reported on your federal income-tax return. Normally, though, when someone
    asks what your tax rate is, they are referring to your marginal income-tax rate,
    which is the percentage of tax applying to your next dollar of taxable income.


    As of the year 2018 and extending through the year 2025, seven federal marginal
    income-tax rates apply to salaries and wages (and most other income other than
    capital gains income): 10, 12, 22, 24, 32, 35, and 37 percent. These seven rates
    clearly are more than the two income-tax rates (15 percent and 28 percent) implemented
    by the Tax Reform Act of 1986\. But historically, seven is still a relatively
    small number of income-tax rates. Moreover, as a result of the Tax Cuts and Jobs
    Act of 2017 TCJA of 2017, the bracket of income to which the top rate applies
    is significantly increased, beginning at $500,000 for single individuals and $600,000
    for married couples filing jointly.


    Income is taxed in each of these rates according to a range of income known as
    an income-tax bracket. Your bracket depends on the amount of taxable income you
    make in a year and the filing status you use to report this income (for example,
    single or jointly filed with your spouse). As a tax-management technique, you
    want to do everything legally possible to not progress into the next-higher marginal
    tax bracket, where all remaining income is then taxed at a greater percentage.


    One strategy for minimizing your marginal tax rate involves holding investment
    or business property for a required length of time (currently, more than one year)
    before selling it. This is known as long-term capital gain property , and the
    tax rate that is assessed depends on your marginal income-tax rate. For example,
    if you are in the 10 or 12 percent marginal tax bracket, long-term capital gains
    are now permanently not taxed at all (a rate of 0 percent). Meanwhile, if your
    annual taxable income exceeds $425,800 for single taxpayers and $479,000 for joint
    filers (that is, you are in the top two individual tax brackets of 35 and 37 percent),
    long-term capital gains are taxed at a rate of 20 percent. In addition, a surtax
    of 3.8 percent (the purpose of which is to finance the future health insurance
    coverage provisions of the Patient Protection and Affordable Care Act of 2010)
    is charged on capital gain/investment income for single taxpayers with annual
    modified adjusted gross income (MAGI) over $200,000 for single filers and $250,000
    for joint filers. All numbers are adjusted for inflation.'
  trans: '

    ## 有形个人财产与收藏品


    有形个人财产，例如艺术品、邮票和钱币，可能会因其稀缺性和品质而从使用资产转变为投资品。同样，像集邮这样的爱好，也可能转变为一项生意，这取决于收藏者是否意图从中获利，具体由美国国税局和法院裁定。


    常见的具有投资价值的收藏品包括艺术品、宝石、稀有钱币、古董玩偶和家具，甚至棒球卡。它们都具有某些共同属性——尤其在可观的市场上具有稀缺性和受欢迎程度。但收藏品通常不会为所有者带来任何当期收入，最适合作为资本增值的持有对象。一旦出售，这些物品将按
    28%的特别长期资本利得税率征税。


    尽管收藏品存在市场，但在大多数情况下，它并非一个有序的市场。因此，买卖双方都处于不利地位，因为除非他们非常专业，否则很难知道什么才是该物品的公允价格。与许多其他消费者购买行为一样，互联网和众多网站（尤其是
    eBay）改善了获取收藏品可靠信息的途径。尽管如此，收藏品市场总体上仍是低效的。


    有形个人财产可能成为收藏品的另一个问题是，其市场可能是暂时的。例如，几年前，卷心菜娃娃玩偶还是备受追捧的商品，零售价格高昂。然而如今，这股热潮已经过去，价格已回落到更正常的水平。如果你在市场的顶峰买入，意图随后获利，而现在对这些玩偶又没有实际用途，那这就是个坏消息。


    可以为有价值的有形个人财产购买保险。如果你拥有的是标准用途的财产，你需要与保险公司约定该财产的价值，并在保单中列出或附加批单，正如第 7 章所述。另一方面，如果你的财产确实是一件具有公认且可持续市场的收藏品，则必须与专业的承保人进行保险谈判，例如伦敦劳合社保险市场中的那些承保人。


    接下来的几章将讨论如何捍卫积累的财富，尤其要防范所得税的有害影响。高效的财富管理者都深知，通货膨胀和税收是财富积累的两大主要威胁。然而，在这两种威胁中，只有税收——是普通人可以管理的。本书下一部分的目的是向你展示如何管理税收，让你的口袋里留下更多钱，而不是充实山姆大叔的国库！


    ## 第四部分：捍卫财富


    ## 第 12 章：所得税规划与管理


    既然我们已经讨论了如何使用 PADD 流程来保护和积累你的财富，现在我们转向财富的防御或保值。具体而言，本章重点介绍所得税的规划与管理，随后的章节将涉及转让税（赠与税和遗产税）规划以及威胁财富的生活事件，如离婚或失业。


    为了捍卫你的财富，你必须有效管理两大主要威胁：通货膨胀和税收。不幸的是，通货膨胀率在很大程度上不受个人控制。然而，在有效的税务管理方面，你可以主动出击，第一步就是熟悉所得税制度的基本规定。


    ### 所得税税率、预扣税和预估税基础知识


    财富积累和管理的一个基本规则是，不仅要确定你有多少收入可以用于支出或储蓄，还要确定你能保留其中多少收入。为了最大化你能保留的收入，你需要知道你的联邦所得税税率。请记住，如果你在有州所得税的州工作，你也应该知道你的州所得税税率。然而，由于各州所得税法律差异很大，这里仅讨论联邦税制的基本知识。


    联邦所得税税率有两种：有效税率和边际税率。你的有效税率，或平均税率，是应纳税总额除以你在联邦所得税申报表上报告的应纳税所得额。不过，通常当有人问你的税率是多少时，他们指的是你的边际所得税税率，即适用于你下一美元应纳税所得额的税收百分比。


    自 2018 年至 2025 年，共有七个联邦边际所得税税率适用于薪金和工资（以及除资本利得收入外的大多数其他收入）：10%、12%、22%、24%、32%、35%和
    37%。这七个税率显然多于 1986 年《税制改革法案》实施的两个所得税税率（15%和 28%）。但从历史上看，七个仍然是一个相对较少的所得税税率数量。此外，由于
    2017 年《减税与就业法案》的实施，适用最高税率的收入区间显著增加，单身个人从 50 万美元起，已婚联合申报夫妻从 60 万美元起。


    收入根据一个称为所得税税级的收入范围，按这些税率中的每一个进行征税。你的税级取决于你在一年中获得的应纳税所得额以及你用来申报该收入的申报身份（例如，单身或与配偶联合申报）。作为一种税务管理技巧，你要在法律允许的范围内尽一切可能，避免进入下一个更高的边际税级，因为在该税级中，所有剩余收入都将按更高的百分比征税。


    将边际税率降至最低的一种策略是，在出售投资或商业财产之前，将其持有达到法定的时间长度（目前为一年以上）。这被称为长期资本利得财产，其适用的税率取决于你的边际所得税税率。例如，如果你处于
    10%或 12%的边际税级，长期资本利得目前永久免税（税率为 0%）。与此同时，如果你的年应纳税所得额单身纳税人超过 425,800 美元，联合申报人超过
    479,000 美元（即你处于最高的两个个人税级，即 35%和 37%），长期资本利得按 20%的税率征税。此外，对于单身纳税人年调整后总收入超过 20 万美元、联合申报人超过
    25 万美元的，其资本利得/投资收入还需征收 3.8%的附加税（其目的是为 2010 年《患者保护与平价医疗法案》的未来医疗保险覆盖条款提供资金）。所有数字均按通货膨胀进行了调整。

