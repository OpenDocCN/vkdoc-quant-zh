    \ coverage. In addition, you need to establish coverage under a group plan so\
    \ as to exercise certain continuation rights that may be necessary in the event\
    \ that you change or lose your job (otherwise known as COBRA rights, after the\
    \ Consolidated Omnibus Budget and Reconciliation Act of 1985 that provided for\
    \ these rights).\n\n### Carefully Review Plan Details\n\nReview the co-payment\
    \ and deductible provisions under health insurance plans carefully. Under most\
    \ managed care plans—including health maintenance organizations (HMOs) and preferred\
    \ provider organizations (PPOs)—the insured pays a fixed charge each time they\
    \ see a medical doctor or fill a covered prescription. This is known as a co-payment\
    \ and should be distinguished from co-insurance, through which the plan provider\
    \ and the insured share the cost of covered medical expenses after the plan deductible\
    \ has been met. Generally, you want the co-payment to be as small as possible,\
    \ unless you do not anticipate using the insurance policy heavily during the year\
    \ (if you are young and healthy, for example). In this case, you may want to opt\
    \ for as high a co-payment as possible, which in turn should reduce your premium\
    \ cost.\n\nMany health care plans, particularly in recent years as the cost of\
    \ health insurance has skyrocketed, require each insured to retain a certain portion\
    \ of their health care expense risk in the form of a deductible. This is an out-of-pocket\
    \ amount that the insured must pay before any insurance coverage is afforded.\
    \ Once the covered medical expenses equal the plan deductible (usually on an individual\
    \ or family basis), further expenses then qualify for the co-insurance provision.\
    \ Typically, after the co-insurance provision is triggered, the insured must then\
    \ pay 20 percent of the expenses until a certain maximum amount is reached (known\
    \ as a stop-loss), at which point the insurance company pays 100 percent of the\
    \ excess.\n\nIf your employer offers a flexible spending account (FSA) to help\
    \ you with the payment of any deductibles or co-payments associated with its health\
    \ insurance plan, put as much money into this account as you can afford or as\
    \ allowed under current law. An FSA is a special form of employee benefit that\
    \ allows you to pay for certain medical expenses (such as deductibles and co-payments)\
    \ with before-tax dollars, thus reducing your taxable income. We will talk more\
    \ about FSAs later; but as a general rule of tax planning, whenever you can pay\
    \ for an expense with before-tax rather than after-tax dollars, doing so will\
    \ usually prove advantageous.\n\n### Flexibility Costs Money\n\nThe more flexibility\
    \ you have in selecting health care providers, the more the plan will cost you.\
    \ Many insureds do not need to concern themselves with this fact, because their\
    \ employer has already taken this flexibility away from them. For example, employers\
    \ who offer only HMO enrollment to their employees have substantially restricted\
    \ the employees’ right to choose their own primary care physicians and specialists.\
    \ But insureds who participate in other forms of health insurance plans, such\
    \ as PPO plans, may typically see either an in-network physician or one who does\
    \ not participate in the network (an out-of-network provider). This same concept\
    \ also applies to participating and nonparticipating hospitals. If you want to\
    \ see an out-of-network doctor or hospital, you will likely pay more for the privilege,\
    \ but at least your choice is preserved.\n\nAs a result, if you are participating\
    \ in a PPO managed care plan, one of the questions you should research is whether\
    \ your preferred doctor or hospital is a member of the plan’s network of medical\
    \ providers. Usually, you can check out the network physicians and hospitals participating\
    \ in the plan before signing up.\n\n### Know Your Rights\n\nMake sure you know\
    \ your legal rights if you leave your job (and the employer-provided coverage).\
    \ In the past, two legislative acts—the Consolidated Omnibus Reconciliation Act\
    \ of 1985 (COBRA) and the Health Insurance Portability and Accountability Act\
    \ of 1996 (HIPAA)—have gone a long way to ensure continuing health insurance coverage\
    \ for individuals who once had health insurance protection. Unfortunately, neither\
    \ of these acts do much to address the ongoing problem of the uninsured or, just\
    \ as important, the rising cost of health insurance premiums.\n\n> **Note**  \n\
    > See the subsequent discussion in this chapter of the 2010 Patient Protection\
    \ and Affordable Care Act, sometimes referred to as Obamacare, which was passed\
    \ in part to address the problem of the uninsured and rising health care costs.\n\
    \nWe will talk in more detail about the COBRA and HIPPA acts shortly, but you\
    \ should be aware that if you once had health insurance coverage but lost or changed\
    \ jobs, it is relatively easy to continue that coverage for a period of time.\
