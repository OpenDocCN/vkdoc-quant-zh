    ## 赠与未成年人的礼物


    如果您打算向未成年人（即未达到州法律规定的法定成年年龄，通常为 18 岁的人）赠予礼物，则不仅需要考虑赠与税法律，还需要考虑州财产法。未成年人不能像法定成年人那样取得财产所有权。相反，未成年人必须按照各州规定的托管安排来取得所有权。历史上，托管安排也是为孩子大学教育储蓄的一种常见方法，如第
    15 章所述。


    托管安排有两种基本类型：一种是《统一未成年人赠予法》（`UGMA`）规定的安排，另一种是《统一未成年人财产转移法》（`UTMA`）规定的安排。在许多州，`UTMA`已取代先前颁布的`UGMA`，成为向未成年人转移财产的批准形式。在这两部统一法律下，未成年人获得财产所有权，但财产由托管人（通常是未成年人的父母或祖父母）管理。该托管人随后代表未成年人投资和管理受赠财产，并且不以任何方式拥有该财产。因此，这种托管安排类似于代表未成年人设立的信托，但缺乏执行信托文件的复杂性和成本。


    所有州都有简单的表格，用于将赠与未成年人的财产置于托管安排下的所有权，但请注意，出于联邦赠与税目的，向未成年人的托管赠与属于完成的赠与。换句话说，如果您是捐赠人，该赠与即成为未成年人的财产，而非您的财产。因此，当未成年人达到州规定的法定成年年龄时，他们可以对受赠财产做任何他们想做的事情。即使该赠与旨在资助孩子未来的教育费用，他们也没有义务上大学或接受高等教育。与此同时，如果您是未成年子女的父母，用于该子女抚养和维持生计的收入需要向您课税，即使您可能不是该托管安排的指定托管人。这是因为，根据所有州的财产法，作为孩子的父母，您有法律义务抚养和养育该孩子，直至其达到法定成年年龄。


    幸运的是，如第 15 章所述，国会已立法规定了一种比托管安排更好的大学储蓄方法。这种被称为私人储蓄计划的方法，依据《国内收入法》第 529 条，为资助孩子未来的教育费用提供了可能。


    ## 信托使用基础入门


    信托是一种涉及三方的安排：


    - 设立信托的个人（称为创设人或授予人）

    - 信托的受托人

    - 为其利益设立信托的个人（称为信托受益人或受益人）


    在任何信托安排中，受托人必须完全且排他地为信托受益人的利益行事。受托人拥有信托资产的法定所有权，但受益人拥有法律上所称的资产衡平法所有权。


    信托在用于转移税筹划和管理以及总体遗产规划中具有许多优势。其中包括：


    - 能够使一个或多个指定的受益人受益

    - 能够借助专业或其他技能人士的专业知识管理信托资产的投资

    - 能够提供资产保护

    - 能够避免遗嘱认证

    - 能够实现所得税和转移税的节省


    信托有多种类型，包括为未成年人设立的那些信托，但从转移税的角度来看，所有信托都可以归类为可撤销信托或不可撤销信托。


    ### 可撤销信托


    可撤销信托是在您生前设立的，并且您保留撤销或收回信托资产的权利。因此，您并未完成赠与，也未丧失从信托资产中获得收入的权利。但是，如果您指定他人为信托受益人，则届时确实会发生赠与。当您去世时，如果您尚未撤销信托，则该信托变为不可撤销，并可以替代遗嘱来分配您的资产。


    可撤销信托提供两大主要优势，但这两者都不涉及转移税的节省：


    - 如果您在生前将资产转移给信托，并以受托人（通常为您本人）的名义重新登记所有权，则信托资产可避免您去世所在州的遗嘱认证程序。

    - 如果您变得精神无行为能力（例如，您罹患阿尔茨海默病），信托的继任受托人可以接管您的财务和个人事务的管理。


    此外，如果信托起草得当，您可以通过使用可撤销信托来减少受益人的遗产税——当该信托在您去世后变为不可撤销时。


    请记住，因为您对该信托及其资产保持完全控制，所以这些资产将被计入您的总遗产中。但是，如果您的财产低于遗产税允许的免税额（`2018 年为 1120 万美元`），则无需担心这一不利之处。此外，通常信托提供的优势远远超过您的遗产在您去世时因可撤销信托而遭受的转移税节省的缺失。


    当财产以受托人名义重新登记时，可撤销信托也被称为生前信托，信托赞助商和营销公司大力宣传其为解决所有遗产税问题的万能药。尽管这绝非事实，但生前信托可以是一种有效的遗产规划工具，特别是对于在主要居所以外的州拥有度假屋或其他房地产的个人而言。对于拥有外州度假屋的业主而言，需要在度假屋所在州进行第二次或辅助性的遗嘱认证程序。通过将度假屋的所有权转移给可撤销信托的受托人，您的遗产可以避免多重遗嘱认证程序。

    '
- fmt: '### Irrevocable Trusts


    An irrevocable trust, which may be created during your lifetime or at the time
    of your death, can result in estate-tax savings when you—the creator of the trust—die.
    The term irrevocable means just what it implies: you cannot change, revoke, or
    amend the trust in any way after you create it. This disadvantage alone is incentive
    enough for many trust creators to shy away from even considering the implementation
    of an irrevocable trust—with one or two notable exceptions.


    The first reason you may wish to create an irrevocable trust has to do with the
    usual motivations of individuals who purchase life insurance policies. Most individuals
    purchase a life insurance policy for death-motivated reasons: that is, to protect
    their survivors from the loss of income resulting from their death. Given the
    at-death motivation and the fact that a low gift-tax value is associated with
    most policies, the life insurance policy is usually an excellent asset to transfer
    to an irrevocable trust. As such, funding a trust with only a life insurance policy,
    otherwise known as creating an irrevocable life insurance trust (ILIT), is a commonly
    used estate-planning technique.


    The second reason you may wish to create an irrevocable trust is for asset protection
    from creditors. This type of trust, which is particularly popular among doctors
    and lawyers and other professionals who are frequently the target of lawsuits,
    is known as a foreign situs or offshore trust. Be careful, though: the offshore
    trust is controversial, and the IRS monitors its operation carefully. In part,
    this is because the income generated from property transferred to the trust is
    still taxable to its creator, or grantor. As a result, unless the trust is drafted
    skillfully and for appropriate estate-planning reasons, the trust may be rendered
    void on its face in violation of the state fraudulent conveyance laws of its creator.


    ## Components and Valuation of the Gross Estate


    Thus far in this chapter, I have mentioned the estate tax on a few occasions,
    but what, exactly, is the estate tax? This tax is ultimately assessed on an amount
    known as the tentative tax base, which is your taxable estate plus any adjusted
    taxable gifts made during your lifetime; but the computation begins with assets
    that make up the taxpayer’s gross estate. The gross estate is similar to gross
    income under income-tax law, but with one major difference: in income-tax law,
    tax is assessed on your annual income, whereas in estate-tax law, tax is assessed
    on the fair market value of your lifetime assets as of the date of your death.
    Operationally, the income tax is a government levy on the inflow items you show
    on your personal cash-flow statement; conversely, the estate tax is a government
    levy on the asset items you show on your statement of personal financial position.


    The gross estate consists of not only assets you die owning, but also certain
    lifetime transfers (gifts) over which you retain control or from which you enjoy
    benefits at the time of your death. For example, if you make a gift to an irrevocable
    lifetime trust but at your death are an income beneficiary of that trust, the
    total fair market value of the trust assets at your date of death is taxed. Similarly,
    if you have previously gifted an out-of-state vacation home to your favorite child,
    but you retain by agreement with that child the right to use the home whenever
    you want, the fair market value of that home at your date of death is taxed. For
    example, assume that you live in North Dakota but own a winter home in Florida.
    In 2018, you transfer the title to the Florida home to your oldest son but, per
    an oral agreement with him, are permitted to use the home whenever you want. If
    you die still holding this power, the fair market value of the Florida home is
    included in your gross estate, as if you had never transferred the title to your
    son in the first place.


    Property is included in your estate at its fair market value as of the date of
    your death. You should contrast this with gifted property, which is valued at
    its fair market value as of the date of the gift. Most of the time, the date-of-death
    fair market value of property can be easily established. For example, publicly
    traded stock is valued based on the average of the highest and lowest trading
    price on the decedent’s date of death. Real estate can also be relatively easily
    valued by referencing comparable sales in the neighborhood or area. However, if
    a decedent is the owner of a small, family, or closely held business, the value
    of their business interest may not be so easily determined. Many factors must
    be considered when establishing this value, not the least of which is whether
    the owner owns a controlling or minority interest in the business at the time
    of their death. If you are an owner of a closely held business, it is best to
    contact a qualified appraiser to help you value it properly for estate- or gift-tax
    purposes.


    One final comment with respect to the assets included in the gross estate and
    their respective value: if you die owning or having incidents of ownership with
    respect to a life insurance policy, you have to include the death proceeds or
    face value of that policy in your gross estate. This is a much greater amount
    than the fair market value of the policy, which, depending on its type, is usually
    relatively small. For example, if you own a cash-value type of life insurance
    policy, its fair market value is close to its accumulated cash value. Meanwhile,
    if you own a term policy that has no cash value, its fair market value is close
    to zero. This is all the more reason to consider making a lifetime gift of a life
    insurance policy to a beneficiary: if you gift it, the policy has a small value,
    whereas if you die owning it, the policy has a large value. Assume, for example,
    that you die owning a whole life insurance policy with a face value of $500,000
    and that the accumulated cash value in this policy at your date of death is $80,000.
    For estate-tax purposes, the policy is included in your gross estate at a value
    of $500,000. If you had previously gifted it, the policy value for gift-tax purposes
    would be no more than $80,000 (and probably less, because the policy would not
    have accumulated the same amount of cash value at your death years later).'
