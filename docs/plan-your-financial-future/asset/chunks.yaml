    This book is dedicated to Vivian Louise, my own personal reason for wealth management
    and accumulation. Foreword to the First Edition


    It is my pleasure to write this foreword to Plan Your Financial Future by my friend
    and associate Keith Fevurly, MBA, JD, Esq., LLM (Taxation), CFP. I have my own
    successful financial-planning firm, Integra Financial, in Greenwood Village, Colorado,
    and have $40 million of assets under management [editor note: now over $50 million
    as of March 2018]. Every day, Integra Financial addresses and solves the financial-planning
    issues discussed by Keith in this book for a roster of upper-middle-class and
    upper-class families. From his ability to teach financial planning in CFP classes
    to his prowess at analyzing complex investment, retirement, and estate-tax issues,
    Keith’s expertise is unsurpassed. He boils down complex issues and explains them
    in terms that both our clients and you can understand.


    In this book, Keith describes a novel way of analyzing and putting into place
    the personal financial-planning process, which he entitles the PADD process. The
    first step in this process is protecting yourself, your family, and your property.
    Next comes accumulating wealth, a section that will likely be of the most interest
    to a broad range of consumers and those who are engaged in financial planning
    in order to achieve financial independence. Third, Keith looks at the defense
    of accumulated wealth, notably discussing income-tax planning, with taxes being
    one of the two great “usurpers” of wealth (the other being the impact of inflation).
    Finally, Keith takes up the “fun” part of the financial-planning process: the
    distribution of accumulated wealth during an individual’s lifetime, notably retirement,
    as well as at death, which is the date of focus for most estate-planning techniques.
    Keith also provides a glossary of financial-planning terms at the conclusion of
    the book and cross-references these terms in each chapter by boldfacing them.
    Although there are no guarantees in life, particularly in today’s volatile economic
    marketplace, if you follow the process outlined in this book, you will have a
    more-likely-than-not chance of accumulating and preserving wealth during your
    lifetime.


    It is our hope that this book will give you a level of comfort about your financial
    future. I like to say that my retired and debt-free clients live not only in different
    neighborhoods than those who are struggling financially but on different planets.
    Using the strategies presented in this book, with or without a good financial
    advisor, can help you to live on a different planet with the few others who actually
    achieve financial success. That is a rare feat in today’s marketplace!


    > Willis G. Ashby, CFP Integra Financial, Inc. Greenwood Village, Colorado


    Preface


    A number of events have occurred since the publishing of the first edition of
    Plan Your Financial Future: a Comprehensive Guidebook to Growing Your Net Worth
    in 2013, most notably the election of a new President of the United States, Donald
    J. Trump, in 2016\. In that vein, major new tax legislation was passed and signed
    into law by President Trump on December 22, 2017: the Tax Cuts and Jobs Act of
    2017, identified in this edition by the abbreviation TCJA of 2017 or 2017 TCJA
    . The second edition fully updates the content to reflect relevant changes made
    by the TCJA of 2017 as well as experience to date with the implementation of another
    piece of major legislation, the Patient Protection and Affordable Care Act of
    2010 (PPA), commonly known as Obamacare .


    As before, this book is intended for the educated consumer as well as the financial-planning
    or services professional. If you are engaged in your own personal financial planning
    (the “educated consumer”), you will find the contents of the book invaluable as
    you seek to establish and grow your wealth. Alternatively, if you are a financial
    planner or advisor (the “financial-planning or services professional”), you will
    find the content to be helpful in assisting clients whom you are advising. You
    may even see the need to have your client purchase the book in the planning and
    advising process! If so, the book can be purchased online at the Apress web site,
    [`www.apress.com`](http://www.apress.com) , or at the Amazon web site.


    Also, as in the original edition, I provide a glossary of financial-planning terms
    at the conclusion of the book and cross-reference these terms in each chapter
    by boldfacing the applicable term.


    Finally, I have attempted diligently to catch and remove any technical and grammatical
    errors in this (and the original) edition. However, I bear sole responsibility
    for any errors that may still be present in this edition. To that end, I beg your
    indulgence!


    Keith Fevurly, Esq., CFP


    Centennial, Colorado


    March 2018


    Acknowledgments'
