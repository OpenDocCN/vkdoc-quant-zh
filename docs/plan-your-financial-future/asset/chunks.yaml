    # 是否应避免死后遗产认证程序？


    如第 14 章所述，遗产认证程序可定义为验证遗嘱法律效力的行为或过程。但这涉及众多步骤和法院干预，可能导致费用过高且延迟向继承人分配财产。基于这些及其他原因，许多被继承人希望完全避免该程序。


    个人可通过三种主要方法避免遗产认证：


    - 尽可能使用受益人指定方式，将特定财产留给某个或多个指定个人。

    - 以生存者权益方式登记财产所有权。在大多数州，这意味着与他人共同登记财产所有权；即便在加州和德克萨斯州等夫妻共同财产州，也可就婚姻期间获得的财产选择生存者权益。

    - 设立可撤销生前信托并将资产转入其中。


    由于广受欢迎，可撤销生前信托（RLT）值得进一步说明。为使 RLT 中的资产避免遗产认证，必须将其从所有者的个人名下转移出来，重新登记为受托人名义。但原所有者同样可以指定自己为
    RLT 的受托人，这种做法很常见。为此，所有者只需准备并提交一份**免责转让契据**，将财产所有权从其个人名下转移至其受托人身份名下。要正确完成此操作，在所有权转移时必须存在信托文件。若不存在此类文件，从个人所有者到受托人的重新登记在法律上无效，所有相关财产都必须经过遗产认证。


    即便您起草了 RLT 文件，也请记住只有实际重新登记为受托人名义的财产才能避免遗产认证。因此，许多人会将 RLT 起草与**倾倒遗嘱**结合使用，该遗嘱的明确目的就是将遗忘及后续获得的财产转入
    RLT。换言之，遗嘱在被继承人死亡时将这些财产"倾倒"至 RLT，并根据信托条款进行分配。由于某些财产在死亡时仍以被继承人名义持有，通过遗嘱转移的财产仍需经过遗产认证程序。不过，这些财产的公允市场价值通常很低，许多州的法律为此规定了豁免条款。


    至此，我们已经讨论了避免遗产认证的原因以及希望如此行事的个人可采用的主要方法。但这引出一个问题：您是否应避免死后资产遗产认证？毕竟，遗产认证具有若干优势。它提供了厘清被继承人财产所有权的机制，并执行被继承人遗嘱的条款。另一个常被忽视的优点是，遗产认证程序保护被继承人免受在世债权人逾期索赔的影响。例如，假设您拥有一个小型企业，去世时有许多债权人。如果您在该小型企业中的权益经过遗产认证，商业债权人必须在您去世后九个月内（或州法规定的其他期限内）向遗产提出索赔，否则将永久丧失权利。因此，如果您预期去世时会有某些未知债权人提出索赔，强制这些债权人在特定期限内表明意图是审慎的遗产规划。


    最终，只有您自己才能决定是否希望遗产避免认证。您应当认识到死后进行财产遗产认证的优势，并谨记遗产认证常被提及的缺点——成本、潜在延误以及过程的公开性——可能并不重要到让您完全忽略该程序。


    # 遗产税


    遗产税可能在联邦和州两级征收（例如纽约州有遗产税），但通常大多数被继承人只需关注联邦税率。不过请注意，您的州可能对总遗产的征税门槛低于联邦法律，因此即便您无需提交联邦申报表或缴纳联邦税，仍可能需要在州级缴纳遗产税。如果联邦或州遗产税可能对您或配偶的遗产产生，建议在遗嘱或信托中加入一些税务规划措施。这些措施的纳入最初会增加起草遗嘱或信托的成本，但该规划将在节省的遗产税中得到数倍回报。


    联邦级别的遗产税属于统一转移税制的一部分。实际上，这意味着无论您是在世时向他人赠与财产，还是在去世时转移财产，其税率和级距都是相同的。因此，从操作层面看，您任何在世时的应税赠与都会减少您去世时能留给继承人或受益人的财产额。


    假设 2018 年您向配偶以外的某人（若给配偶则适用无限额扣除）进行了 100 万美元的应税赠与。虽然您无需缴纳联邦赠与税（在需缴赠与税前有 1120 万美元的免税额），但您当前总额为
    1120 万美元的遗产税免税额将降至 1020 万美元。如果您在 2018 年去世时的暂定税基（加回生前赠与后）为 11,200,001 美元，那么这额外
    1 美元的财产将按 40%的边际税率征税。


    请注意，遗产税免税额的减少并不意味着您应避免生前赠与。相反，这首先意味着您应充分利用年度赠与税免税额（2018 年每人 15,000 美元），因为该免税额在计算应税赠与的纳税义务前适用；其次，或许更重要的是，您可以将赠与财产的后续增值部分排除在遗产之外。例如，假设您直到
    2020 年才去世，而 2018 年赠与的财产在这两年间增值了 50%。由于您已提前赠与了该财产，您将避免对 50 万美元（即 50%的增值部分）缴纳遗产税。


    在您去世时计算出应税遗产后，您的遗嘱执行人可申请特定金额的抵免额（遗产税术语中称为**统一抵免额**）来抵扣暂定应缴遗产税。与所得税一样，抵免额是等额减少税款，因此您真正应关注的是去世当年该抵免额的金额。该抵免额对应着可免遗产税转移给他人的财产额（因此称为**免税额等值**或**适用排除额**）。例如，2018
    年允许的统一抵免额为 4,425,800 美元，相当于 11,200,000 美元的免税财产额。

