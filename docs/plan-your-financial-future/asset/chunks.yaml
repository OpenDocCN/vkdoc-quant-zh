- fmt: '### Commercial Real Estate


    Typically, given the investment risk, only experienced investors purchase commercial
    real estate. Accordingly, you may wish to avoid this investment opportunity entirely.
    However, if you do wish to invest in commercial properties, you will probably
    do so for one of two reasons: to receive annual income or to hold such properties
    for capital appreciation before eventual sale.


    Most investors who participate in the commercial real-estate market do so to generate
    income, because a primary reason to invest in raw land is capital appreciation.
    If you are after income from a commercial property, you first need to determine
    how much to pay for it. For that, fortunately, you can use a relatively easy computation
    known as the net operating income (`NOI`) formula. The formula for `NOI` is as
    follows (if you hire an appraiser to help you with the investment decision, the
    appraiser will likely compute the `NOI` for you):


    *   Gross rental receipts from the property

    *   + Nonrental or other additional income from the property

    *   = Potential gross income

    *   – Vacancy and collection of receipts losses

    *   = Effective gross income

    *   – Operating expenses (excluding interest and depreciation)

    *   = Net operating income (`NOI`)


    Because `NOI` is a cash-flow computation from the commercial property, any charges
    you have incurred to finance the purchase of the property (such as interest on
    a loan) and tax-related charges (such as depreciation) do not enter into the computation.


    Once you or your appraiser have computed the commercial property’s `NOI`, you
    need to divide that by a prevailing capitalization rate (cap rate) to determine
    how much you should pay for the property. This cap rate is not easy to determine,
    but think of it as the rate of annual compounded return you would like to receive
    from the property. It is also the reciprocal of the number of years it will take
    for the property to pay for itself. For example, a standard cap rate is 12 percent,
    meaning you want your original investment back in slightly more than 8 years (100
    divided by 12 = 8.33 years). Similarly, to achieve a 20 percent return from the
    property, you want your original purchase price back in 5 years (100 divided by
    20 = 5). Of course, keep in mind that in this latter case, you are being more
    aggressive, so factor in a higher risk for your initial investment with a 20 percent
    cap rate than with a 12 percent cap rate.


    ### Raw or Unimproved Land


    Mark Twain is famous for saying, “Buy land; they’re not making it anymore.” This
    is true, but it does not provide a great deal of guidance if you are an investor
    trying to decide where to buy land. The most valuable land or unimproved real
    estate is probably land that is adjacent to already-developed or soon-to-be-developed
    residential or commercial property. It is likely that, before long, the adjacent
    property will also be developed, given that its “highest and best use” is no longer
    as farmland, grassland, or other land lying fallow. As a result, you will probably
    enjoy significant capital appreciation from this land when you subsequently sell
    it.


    Keep in mind, though, that certain significant investment risks are associated
    with the purchase of any undeveloped land. Among these risks are the following:


    *   The land may be adversely rezoned. For example, property bought for residential
    development purposes may be rezoned by the city or county for commercial purposes.

    *   You may not be able to obtain permits from the county, city, or township to
    build on the land in the manner that you (or the developer) intend.

    *   Access to your land may be restricted by an adjacent landowner’s property
    or property rights.

    *   The population growth that you anticipate in the area may not occur.


    As a result, many investments in undeveloped land are extremely risky. If you
    have borrowed money to buy the land (known as leveraging your investment), you
    must find a way to service the debt from income or assets other than your original
    purchase. Otherwise, you will be forced into a position to sell the land well
    before you otherwise intended.


    ## Indirect Investments in Real Estate


    There are two basic ways to indirectly invest in real estate: as a limited partner
    owning an interest in a real estate limited partnership (`RELP`) or as a shareholder
    in a real estate investment trust (`REIT`). Let’s look at the `REIT` first, because
    it is generally the more marketable of the two investments.


    ### Real Estate Investment Trusts


    A `REIT` is like a mutual fund, except that its shares are not always valued at
    net asset value (`NAV`). Instead, they are traded at a premium or discount to
    `NAV` on a publicly traded exchange. In most cases, the `REIT` invests in income-producing
    real-estate properties, such as apartment buildings, shopping centers, office
    parks, hotels, and, increasingly, retirement communities. Some `REITs`, known
    as mortgage `REITs`, also invest in the financing of real-estate properties.


    The `REIT` entity is not subject to federal income tax as long as it distributes
    at least 90 percent of its annual income to shareholders each year. As a result,
    many `REITs` distribute 100 percent of their annual income to shareholders. Taxes
    are then paid by the shareholders on dividends received (like stocks or stock
    mutual funds) and any passed-through capital gains. Under previous tax law, `REIT`
    dividends were generally not treated as qualified dividends, meaning they were
    not eligible for preferential long-term capital gains treatment. Thus, such dividends
    were potentially taxable at the previous maximum marginal rate of 39.6 percent.
    However, under the 2017 `TCJA`, the effective tax rate on such dividends for an
    individual investor eligible for the 20 percent “pass-through deduction” is reduced
    to 29.6 percent (the new 37 percent maximum marginal tax rate times 80 percent).
    As a result, the attractiveness of receiving a `REIT` dividend should increase
    for many taxpayers.


    There is a relatively low correlation between the price movement of `REIT` shares
    and that of a typical stock or stock mutual fund. A primary advantage to you,
    as a potential investor, then, is the opportunity to further diversify your portfolio
    with the purchase of a `REIT`. Other advantages of `REITs` include the following:


    *   Relatively stable dividend income

    *   High dividend yields

    *   The possibility of significant capital appreciation

    *   Liquidity

    *   Access to professional management of the property


    The long-term total return (defined as dividend income plus capital appreciation
    of the underlying real-estate investment) of a `REIT` is likely less than a high-performing,
    higher-risk growth stock, but more than the return of a lower-risk investment-grade
    bond.


    Before you invest in a `REIT` vs., for example, a mutual fund, you must first
    decide that you want to invest in real-estate properties. Then you must decide
    in what manner you wish to invest in those properties—directly or indirectly.
    If you decide that you want to invest indirectly in the form of a `REIT`, you
    must decide whether you wish to invest in a publicly traded or non-publicly-traded
    `REIT`.


    Finally, in what type of `REIT` should you invest? There are three types:


    *   Equity `REIT` : Generally acquires income-producing real properties

    *   Mortgage `REIT` : Makes construction loans and otherwise invests in the financing
    of real-estate ventures

    *   Hybrid `REIT` : Both owns properties and makes financing loans


    As a general rule, a mortgage `REIT` is a bit riskier than an equity `REIT`, because
    the mortgage `REIT` does not have established properties from which to generate
    an income stream to the investor. However, your ultimate rate of return from a
    mortgage `REIT` may be greater than that from an equity `REIT`.'
