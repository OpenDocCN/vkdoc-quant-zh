  raw: '### Autopsy, Anatomical Gifts, Disposition of Remains


    I authorize my Agent, to the extent permitted by law, to make anatomical gifts
    of part or all of my body for medical purposes, authorize an autopsy, and direct
    the disposition of my remains.


    ### Designation of Alternate Agent


    If the person designated as my Agent is not available or unable to act, I designate
    the following person to serve as my Alternate Agent to make health care decisions
    for me as authorized by this document.


    Alternate Agent: __________________


    Address: __________________


    Phone: __________________


    Relation, if any: __________________


    ### Nomination of Guardian and Conservator


    If a Guardian of my person is to be appointed for me, I nominate my Agent (and,
    then, Alternate Agent) to serve as my Guardian. If it becomes necessary for a
    court to appoint a Conservator for my estate, the same nomination and order as
    for Guardian is hereby made.


    ## General Provisions


    ### Hold Harmless and Third-Party Reliance


    All persons, including attending physicians, or entities who in good faith endeavor
    to carry out the terms and provisions of this document shall not be liable to
    me, my estate, my heirs, or assigns for any damages or claims arising because
    of their action. However, if any person shall endeavor to challenge the authority
    of my agent in bad faith, or intentionally contradict any provision of this document,
    my estate shall not be liable and is not obligated to pay any fees or expenses
    arising out of the action or actions of my agent acting on my behalf.


    ### Severability


    If any provision of this document is held to be invalid, such invalidity shall
    not affect the other provisions, which can be given effect without the invalid
    provision, and to this end the directions in this document are severable.


    ### Statement of Intentions


    It is my intent that this document be legally binding and effective. If the law
    does not recognize this document as legally binding and effective, it is my intent
    that this document is taken as a formal statement of my desire concerning the
    method by which any health care decisions should be made on my behalf during any
    period in which I am unable to make such decisions. This power of attorney is
    intended to be valid in any jurisdiction in which it is presented.


    ### Inconsistency in Provisions


    In the event of an inconsistency in provisions between the Medical Durable Power
    of Attorney and My Declaration as to Medical or Surgical Treatment (Living Will),
    the Medical Durable Power of Attorney shall control.


    ### Revocation of Prior Powers


    I hereby revoke any prior power of attorney for health care and restate my intentions
    as specified above.


    ### Applicable Law


    All questions pertaining to the validity, interpretation, and administration of
    this document shall be determined under the laws of the State of _____(State)_____.


    I have read and understand the contents of this document and the effect of this
    grant of powers to my Agent. I am emotionally and mentally competent to make this
    declaration.


    Signed on this _____day of____________________, 20xx.


    Signature: ___________________________________


    PRINCIPAL


    Name of Principal: __________________


    Address of Principal: __________________


    SSN of Principal: __________________


    Birth Date of Principal: __________________


    ## Statement of Witness


    The foregoing instrument was signed and declared by _____(Principal’s Name) _____
    , PRINCIPAL, to be his/her Declaration as to Medical or Surgical Treatment and
    Medical Durable Power of Attorney in the presence of us, who, in his/her presence,
    in the presence of each other, and at _____ (Principal’s Name) _____ ’s request,
    have signed our names below as witnesses, and we declare, that at the time of
    the execution of this instrument, _____ (Principal’s Name)_____, according to
    our best knowledge and belief, was of sound mind and under no constraint, fraud,
    or undue influence. Neither of the witnesses is _____ (Principal’s Name)_____’s
    attending physician or any other physician, an employee of the attending physician
    or health care facility in which _____ (Principal’s Name)_____ is a patient, a
    person who has a claim against any portion of the estate of _____ (Principal’s
    Name)_____ at his/her death at the time the declaration is signed, or a person
    who knows or believes that he/she is entitled to any portion of the estate of
    _____(Principal’s Name)_____ upon his/her death, either as a beneficiary of a
    will in existence at the time the declaration is signed, or as an heir at law.
    Neither witness is a person appointed as agent by this document. Neither witness
    is a provider of health or residential care or an employee of a provider thereof.


    Witness


    Signature: ___________________________________


    Name: ___________________________________


    Address: ___________________________________


    ____________________________________


    Date: _____________


    Witness


    Signature: ___________________________________


    Name: ___________________________________


    Address: ___________________________________


    ____________________________________


    Date: _____________


    State of _______________


    County of ______________


    On this ________ day of _______________, 20xx, _________________ , known to me
    (or satisfactorily proven) to be the person named in the foregoing instrument,
    personally appeared before me, a Notary Public, within and for the said State
    and County, and acknowledged that he/she freely and voluntarily executed the same
    for the purposes stated in the document.


    My commission expires: _________________


    (SEAL)


