  trans: '

    # 房主保险类型（以及你需要的哪种）


    虽然了解各类房主保险单及其各自的保障范围（保险术语中称为“风险”）很重要，但了解哪些情况不在保障之列同样关键。我们已经提到过两种最常见的除外责任：洪水或地震造成的损失。此外，还有六种常见的除外责任（换句话说，就是你的财产不在潜在损失保障范围内的情况）：


    -   如果你的住宅被判定为危房，或不符当地建筑规范而必须重建或拆除。

    -   因电力故障或公用事业公司供电中断导致的损失。

    -   因被保险人疏忽导致的损失。（如果你未能合理维护房屋并因此遭受损失，则不在保障范围内。）

    -   战争造成的损失。

    -   核危害造成的损失。

    -   被保险人故意行为造成的任何损失。（如果你纵火烧毁自己的房子，保险公司将不承担此损失。）


    现在，我们来谈谈标准房主保险（HO）保单所保障的风险。这正是不同类型保单的差异所在——例如，标准 `HO-1` 保单仅保障特定的基本风险，而 `HO-2`
    保单则将保障范围扩大到额外的特定广义风险。


    基本风险是指因下列原因造成的财产损失：


    -   火灾

    -   雷击

    -   大风（龙卷风或飓风）

    -   冰雹

    -   暴动或民众骚乱

    -   飞行器撞击

    -   车辆撞击

    -   烟雾

    -   故意破坏或恶意行为

    -   爆炸

    -   盗窃

    -   火山喷发


    在上述基本风险基础上，广义房主保险还增加了因以下原因造成的财产损失保障：


    -   坠落物体（例如，树枝）

    -   冰、雪或雨夹雪的重量

    -   消防喷淋系统、供暖或空调系统的意外漏水

    -   热水箱或空调、供暖、消防喷淋系统的突发意外损坏

    -   管道、供暖、空调或消防喷淋系统冻结

    -   人工产生的电流（例如，发电机）造成的突发意外损坏


    作为房主，一般来说，你不希望购买指定了列明风险的 `HO-1` 或 `HO-2` 保单。相反，你应该要求购买 `HO-3` 类型的保单，它提供特殊风险或开放风险保障。开放风险保障意味着你受到保护，可免于所有损失（即使是未知风险造成的损失），除非该损失原因被保单条款明确排除在外。此外，许多公司为
    `HO-3` 保单提供附加条款（称为 `HO-15` 批单），通过此条款，你还可以为你住宅内的所有个人财产提供开放风险保障。还有一些公司将 `HO-3` 保单和
    `HO-15` 批单合并为一份标准的 `HO-5` 保单。如果你所在的州能买到 `HO-5` 保单，那就去买，因为它能让你每花一美元保费都获得最大程度的保障。


    你还应该知道，许多签发财产保险单的保险公司并不按照保险服务处（`ISO`）制定的标准将其称为 `HO-1`、`HO-2` 等，而是以它们自己的专有名称进行销售。尽管如此，所有房主保险单都遵循上述提及的保障范围和限制。如果你有疑问，请让你的保险代理人列举你受到保护的风险类型或损失原因，然后对照本章中的列表进行核对。


    如果你租房居住（公寓或独栋房屋），你应该确保自己有一份 `HO-4` 保单（租客保险）。如果你是共管公寓或合作公寓的业主，那么 `HO-6` 保单更为合适。


    如果一座拥有数百年历史的老宅被毁，保险赔付通常会受到限制。这是因为使用新的建筑材料和工艺重建房屋的成本很可能超过房屋的重置成本。因此，当今市场上只有一种经过修改的保险单，即
    `HO-8` 保单，可供选择。如果你居住在一座非常古老的房屋里，你应该确保自己拥有这种类型的房主保单。


    表 `7-1` 列出了各类房主保险单，并按所保障损失的种类和程度（基本、广义或开放风险）进行了分类。


    **表 7-1.** 标准房主保险单类型对比


    | | `HO-1` | `HO-2` | `HO-3` | `HO-4` | `HO-5` | `HO-6` | `HO-8` |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 保障 A：住宅 | 基本 | 广义 | 开放风险 | 不适用 | 开放风险 | 广义 | 基本 |

    | 保障 B：其他建筑 | 基本 | 广义 | 开放风险 | 不适用 | 开放风险 | 不适用 | 基本 |

    | 保障 C：个人财产 | 基本 | 广义 | 广义* | 广义 | 开放风险 | 广义 | 基本 |

    | 保障 D：使用损失 | 基本 | 广义 | 开放风险 | 广义 | 开放风险 | 广义 | 基本 |


    *可与 `HO-15` 批单结合，为住宅内的所有个人财产提供开放风险保障。


    ## 汽车保险时需要考虑什么


    与房主保险类似，当今保险市场上有很多种汽车保险形式。然而，大多数保险类型都源自一种被称为个人汽车保单（`PAP`）的标准化保单格式。`PAP` 提供四项通用的保障：


    -   保障 A：个人责任

    -   保障 B：医疗费用

    -   保障 C：未投保驾驶员险

    -   保障 D：车辆损坏或损失险


    大多数州的法律要求驾驶员必须购买一定金额的个人责任保险。然而，这些金额越来越普遍地被视为不够充分。如果你只购买了州规定的最低责任保险金额，那么你很可能保障不足。解决这种情况的一种方法是在你现有保单的基础上购买额外的责任险。但另一个常被忽视的解决方案是，从为你承保汽车险、房屋险（或两者都保）的同一家公司购买一份个人综合责任险（umbrella
    liability policy）。

    '
- fmt: '### Coverage A: Personal Liability


    Personal liability limits are quoted on the basis of either a split-liability
    limit or single-limit liability. If the liability limit is specified using a split
    liability and you are at fault in an accident, the maximum amount that is paid
    by your insurance company is partitioned among several individual limits of coverage.
    For example, if you are quoted a policy with liability coverage limits of `50/100/25`,
    it means you have protection of up to `$50,000` for injuries to one individual
    resulting from an automobile accident, up to `$100,000` for injuries to all individuals
    per accident, and up to `$25,000` per accident for property damages to the car
    you hit and for which you were at fault. Alternatively, if the liability limit
    is a single limit, one maximum amount applies to all bodily injuries and property
    damages per accident, without regard to a per person maximum. In either instance,
    if the injured party has expenses over and above your policy’s personal liability
    limits, generally they must sue you and hope you have sufficient assets to cover
    those expenses.


    A common question about liability insurance concerns for whom this personal liability
    coverage is provided. For example, is liability coverage provided if someone borrows
    your car with your permission? Yes, and it applies whether the injured party is
    related to you or not. For instance, if you lend your car to your employer, who
    then is involved in an accident, your employer is covered under your policy for
    damages to another person or property. However, if your employer injures another
    person or damages property while using your car as a delivery vehicle (for a business
    reason), it is likely that the insurance company will deny coverage under a prevailing
    liability exclusion in the personal automobile policy. A commercial liability
    policy would be required in this instance.


    Another frequently asked question about liability coverage concerns what qualifies
    as a covered automobile for the purposes of liability protection. The standard
    `PAP` defines a covered vehicle as follows:


    - Any vehicle shown in the declaration page of the policy (that is, your car or
    cars)

    - A newly acquired vehicle—however, normally only for a period of 30 days (in
    other words, you need to let the insurance company know to extend insurance coverage
    within 30 days of acquiring the new car)

    - Any trailer owned by the insured

    - Any car that is being used as a temporary substitute automobile (such as a rental
    car or loaner)


    Be careful! Your insurance company may have a different, lesser time period under
    which it insures a newly acquired vehicle for collision coverage (for example,
    only 14 days). As a result, it is good practice to notify your insurance company
    agent or broker as soon as you purchase a new car and ask how to optimally insure
    the car in your state.


    ### Coverage B: Medical Payments


    This type of coverage pays your medical bills and those of your family or any
    other occupant of the car if you are hurt in an automobile accident. It also covers
    any medical expenses that you may incur as a result of being struck by an automobile
    while you are a pedestrian. However, any payments that are made to you as a result
    of the liability coverage of another driver who is at fault reduce your medical
    payments coverage. Furthermore, if you collect under your employer’s group or
    individual health insurance policy, doing so may reduce pro rata the amount of
    benefits you can collect under Coverage B.


    ### Coverage C: Uninsured Motorist’s Coverage


    Uninsured motorist’s insurance is an agreement that pays the amount the insured
    could have collected from the insurance company of a negligent driver if the driver
    had maintained automobile insurance. Logically, given state laws requiring personal
    liability insurance on the part of all drivers, uninsured motorist’s coverage
    makes little sense. Nevertheless, practically, such coverage is necessary for
    your or your family’s adequate protection. The persons insured under uninsured
    motorist’s coverage might be you, your family members, and any other occupant
    of your vehicle at the time of an accident.


    Like Coverage A of the `PAP`, the higher the bodily injury limits under Coverage
    C, the better. As a recommended limit, if you are quoted a split-liability policy,
    you should obtain at least `$250,000` per individual and `$500,000` per accident
    of uninsured motorist’s coverage. If you are quoted a single-liability policy,
    the higher limit of `$500,000` is preferable. Given the fact that uninsured motorist’s
    coverage essentially acts as a secondary liability policy, many insureds use their
    personal liability limits as the limit for uninsured motorist’s protection (without
    the property damage component).


    ### Coverage D: Physical Damage or Loss Coverage


    Physical damage protection for your car is available through two separate types
    of coverage under the `PAP`:


    - Collision coverage applies whenever your car hits another car, a fence, a telephone
    pole, a tree, or a building (essentially, any inanimate object). Collision coverage
    pays for damages to your car regardless of who was at fault in an accident.

    - Other-than-collision, or comprehensive, coverage is for property damage to your
    car that results from something other than collision, such as a broken windshield,
    damage from fire or hail, theft, or damage from collision with animals (any moving
    object).


    Depending on the company issuing the policy, physical damage coverage may or may
    not apply for rental cars. Typically, for short-term rentals (less than 30 days),
    coverage is afforded; however, the issue is much less clear for longer-term rentals.
    You should check with your insurance company before renting a car for longer than
    a month, because you likely are not covered. As a substitute (unless you are renting
    a car in certain foreign countries), you may be able to obtain coverage if you
    rent the car with a major credit card, such as `MasterCard`, `Visa`, or `American
    Express`.


    You can reduce your car insurance premium substantially if you choose the highest
    deductible available with respect to collision and comprehensive coverage. Better
    yet, if you can afford the loss of a car damaged beyond repair (“totalled”), purchasing
    physical damage coverage of any form probably is not wise. However, if your car
    is financed and pledged as collateral for a loan, the lender generally requires
    physical damage coverage, regardless of its estimated salvage value.


    ## No-Fault Insurance


    The traditional method of settling claims resulting from an automobile accident
    is through the tort system of state law. A tort is a civil wrong wherein one driver
    generally is found to be at fault in an accident. (Negligence is the most common
    example of a tortuous act.) Under the tort system of liability, the at-fault driver’s
    insurance carrier is required to pay for damages suffered by the other parties
    to the accident. This means that if you are the driver at fault in an accident,
    your insurance company will likely either raise your premiums or, worse, cancel
    any further coverage.


    An alternative method of settling claims is the no-fault insurance system. In
    this system, the insured’s insurance company pays the insured for their damages
    and then seeks reimbursement from the at-fault driver and their insurer. Most
    states that employ a no-fault system have adopted a modified form that permits
    a lawsuit by the injured party only when the insured’s policy limits are exceeded.
    However, to combat the rising costs of premiums, many states are abandoning the
    no-fault system altogether and returning to the tort liability system.'
