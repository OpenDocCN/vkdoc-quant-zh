  trans: '

    ## 最低强制分配


    在你年满 70 岁零 6 个月后的次年的 4 月 1 日之前，你通常必须开始从雇主赞助的退休计划或传统个人退休账户中提取应税分配。请注意，对于某些截至 70
    岁零 6 个月尚未退休的劳动者，存在一项例外规定。在这种情况下，最低强制分配可以推迟到该劳动者退休次年的 4 月 1 日。在你的强制起始日之后的每一年，你必须在当年的
    12 月 31 日之前提取最低强制分配。


    由于你在特定年份必须提取的分配金额由税法规定，因此这些分配通常被称为最低强制分配（RMDs）。任何给定年份的 RMD 是通过将你在雇主计划或传统 IRA 中截至上一年
    12 月 31 日的账户余额，除以一个适用的除数或分配周期来计算的。这个除数或分配周期是通过参照美国国税局（IRS）表格（称为统一终身表）中你在分配年份 12
    月 31 日的年龄来确定的。表 16-2 显示了该表中年龄在 70 岁至 80 岁之间的参与者部分数据。


    **表 16-2. 统一终身表**


    | 参与者年龄 | 适用除数或分配周期 |

    | --- | --- |

    | 70 | 27.4 |

    | 71 | 26.5 |

    | 72 | 25.6 |

    | 73 | 24.7 |

    | 74 | 23.8 |

    | 75 | 22.9 |

    | 76 | 22.0 |

    | 77 | 21.2 |

    | 78 | 20.3 |

    | 79 | 19.5 |

    | 80 | 18.7 |


    一旦你开始分配，随后每年的除数大约会减少一个因子。这是因为你年龄增长，预期寿命相应缩短。例如，假设你出生于 1948 年 6 月，到 2018 年底时年龄为
    70.5 岁。再假设你传统 IRA 中的账户余额在 2017 年底为 500,000 美元。（请记住，在计算必要的 RMD 时，你必须使用上一年度的账户余额。）你
    2018 年的 RMD 是 18,248 美元（500,000 美元除以 27.4）。你可以将这次分配推迟到 2019 年 4 月 15 日，但这样做会要求你在那一年进行两次分配（一次用于
    2018 年，一次用于 2019 年）。接下来，在 2019 年，你需要将你 2018 年底的传统 IRA 账户余额除以 26.5（因为到 2019 年底，你将年满
    71 岁）。综合考虑，从税务角度来看，如果你在 2018 年进行第一次分配，在 2019 年进行第二次分配，情况可能对你更有利。如果你未进行任何分配，或未能提取正确金额的
    RMD，国税局将对你处以差额（即，你应该提取的 RMD 金额与你实际提取的分配金额之间的差额）50%的罚款。


    统一终身表适用于所有情况和个人，但有一个例外：如果你已婚，且你的配偶或受益人的年龄比你小十岁以上，则使用另一张不同的表格。这第二张表格被称为“联合与最后生存者表”，它基于配偶双方实际联合预期寿命计算。尽管联合与最后生存者表也反映了一个从你年满
    70 岁零 6 个月（或如表所示的 70 岁）开始的除数，但适用的除数更大，从而允许较小的应税 RMD。


    此外，当计划参与者或 IRA 账户所有者（包括罗斯 IRA 所有者）在全部账户余额分配完毕之前去世时，还存在必须进行的死后 RMD。这些规则的适用基于，除其他因素外，计划或
    IRA 指定受益人具体是谁。如果指定配偶为受益人，则他们将作为受青睐的后续所有者，可以将其余的账户余额转入他们自己的 IRA，且免缴所得税。然而，重要的是要注意，自
    2007 年起，雇主赞助计划的非配偶受益人也可以利用向 IRA 转存的规定。因此，作为计划参与者，如果你指定你的孩子作为你的第 401(k)节计划的受益人，他们现在可以将该账户中累积的资金直接转入一个名称正确的继承
    IRA，并可以在其有生之年延长分配时间。要正确命名此 IRA，其必须显示为：“John Doe IRA（逝于 00-00-07 或之后）由成年女儿 Mary
    Doe 受益”。


    请小心谨慎。根据美国国税局近期发布的通知，雇主赞助的退休计划不必允许非配偶受益人直接向继承 IRA 转账。此外，在 2006 年之前从雇主赞助计划继承资金的非配偶受益人无法利用直接转存的机会。如果你从非配偶处继承了退休计划的账户余额，第一步是向计划管理员核实该计划是否为你提供了直接转存的机会。


    ### 无漏洞可钻


    你可能想知道是否可以采用某种规划技巧来避免从你的雇主赞助退休计划或传统 IRA 中提取应税 RMD。换句话说，作为高收入退休人员，你可能不需要这笔钱，也不想为分配缴税。不幸的是，不再有任何规划技巧可以免除
    RMD 的必要性。过去，避免提取 RMD 最流行的替代规划技巧之一是：在你希望避免提取 RMD 的年份，你在强制分配年份的 12 月 31 日之前，将传统
    IRA 中的上一财年末账户余额转入罗斯 IRA。然后，在次年 1 月 1 日之后，你再将这笔钱转回（或重新定性）到传统 IRA。这样，传统 IRA 上一年度的账户余额为零，因此该分配年份就不再需要
    RMD 了。


    然而，根据现行的联邦税收规则，这种技巧是行不通的。相反，作为传统 IRA 的所有者，你必须对账户的上一年度余额进行调整，以反映任何重新定性的罗斯 IRA 转账的返还。你必须追溯，并将你其后转入罗斯
    IRA 的资金加回到传统 IRA 的零账户余额中。如果你拒绝这样做，国税局将对任何差额或短缺处以 50%的罚款。底线是：不要这样做，否则你将不必要地耗尽你辛苦积累的财富。


    有趣的是，从 2018 年开始，无论是试图实施刚刚讨论的技巧还是其他情况，所有的重新定性行为都被 2017 年的《减税与就业法案》（TCJA）所禁止。

