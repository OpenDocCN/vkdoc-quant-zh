  trans: '

    # 房地产投资


    大多数美国人都以自有住房的形式进行了房地产投资——无论他们是否意识到这一点。你的房子是一项好投资吗？尽管这个问题的答案取决于许多因素，尤其是房屋的地理位置，但研究表明，从历史来看，住宅房地产的平均年化实际（扣除通胀后）收益率低于股票和债券。根据富达研究所的一份报告（该报告使用了来自全球金融数据和
    Winans International 的数据，这些数据可追溯至 2007-2009 年大衰退之前），住宅房地产的十年期平均年化实际（扣除通胀后）收益率仅为
    1.62%。相比之下，同期股票和债券的平均年化实际收益率分别为 5.85%和 3.18%。事实上，专家表示，预计未来房屋的年化实际收益率仅比年通胀率高 0.25
    到 0.5 个百分点。


    尽管实际收益率如此之低，但自有住房在我们的社会中依然重要，因为它能让作为投资者的房主积累净值——即房屋的公允市场价值与房主所欠金额之间的差额。此外，承担抵押贷款还款的财务义务，可能使投资者或房主比租房者更善于储蓄。储蓄能力（或者更准确地说，践行财务自律）是任何高效财富积累者的重要特质。因此，研究表明，无论年龄或收入水平如何，房主的平均净资产大约是租房者的八倍。


    在本书的第 9 章和第 10 章中，在讨论 PADD 财富积累法中的积累步骤时，我们将更详细地探讨对金融资产与实物资产的投资。然而，正如富达研究报告所指出的，普通投资者应警惕对房地产的过度投资。尤其当某些金融资产（如股票和债券）已证明其作为长期财富积累工具的优越性时，这一点更为重要。


    至此，我们已经介绍了财务规划流程的基础知识。接下来，我们将详细探讨该流程的各个特定主题领域，从保护你一生的赚钱能力、你的家庭以及你的财产开始。


    # 第二部分

    保护你自己、你的家人和你的财产


    # 4. 为你自己和你的家人投保


    本书的这一部分介绍了 PADD 财富积累与管理方法的第一步：保护自己免受灾难性财务损失的风险。在本章中，我们将讨论最重要的风险管理形式：通过购买人寿保险来为你的生命投保（并保护你所爱的人免受因你去世而导致的收入损失）。


    在开始之前，关于购买任何类型的保险，你应牢记以下指导原则：


    -   切勿冒险超过你能承受的损失。只购买足以确保你和家人能恢复到损失前状态的保险金额。

    -   不要购买你不需要的保险。在考虑购买年金（一种提供终身收入并包含身故赔偿金的保险产品）时，这一点尤其重要。如果你不需要身故赔偿金，请在购买年金前三思，因为存在更便宜的方式来提供终身收入流。


    ## 我需要人寿保险吗？需要多少？


    很少有财务问题能比“我需要人寿保险吗？”更令人困扰。这在一定程度上是因为它促使提问者直面自己终将死亡的事实。此外，对某些人来说，对人寿保险的需求是一个哲学问题。例如，从历史上看，农民以及那些以土地为生并打算将土地传给后代的人认为，像人寿保险这样的金融产品无法替代上帝所创造的东西。


    让我们暂且接受我们终有一天都会离开人世这一事实。一旦你接受了自身的终局，就请设想一下你希望在自己去世后发生什么。大多数有配偶和孩子的人都希望保护其继承人的财务生活方式。换句话说，他们不希望自己的家庭因失去收入来源而遭受经济上的困苦。那么，合乎逻辑的是，你需要的人寿保险金额主要取决于你去世后需要替代多少收入。


    根据经验法则，许多寿险代理人表示，你应该购买的身故赔偿金为你年总收入的五到七倍。例如，如果你的年总收入是`100,000 美元`，那么你应该购买`500,000
    美元`到`700,000 美元`的人寿保险。但是，与大多数经验法则一样（并且与应指导你决策的财务规划流程相反），这条法则完全没有考虑财务目标或特定的个人需求及家庭状况。因此，大多数财务规划师使用两种主要方法来确定个人应购买的人寿保险金额。


    这两种方法中的第一种是**人生价值法**。这种方法根据你如果今天去世，你的家人将遭受的财务损失，并预估你可能剩下的工作年限，来估算你的家人所需的收入金额。然后，这个金额会减去你个人消费或缴税的部分（称为**家庭应得份额**）。利用被称为**折现率**的回报率，可以估算出你对家庭的生命的现值。例如，假设你目前的年薪为`70,000
    美元`，距离退休还有大约 20 年。你在这份收入上的个人消费和应缴税款为`20,000 美元`，从而得出家庭应得份额为`50,000 美元`（`70,000
    美元`减去`20,000 美元`）。通过对这些收入应用 5%的年回报率，并使用财务函数计算器或软件程序，我们可以确定大约需要`625,000 美元`的人寿保险。


    人生价值法只关注你的创收潜力以及你的去世给幸存者带来的收入损失。因此，它是一种相对的方法，假设你的生命价值仅在于它如何影响你幸存者的财务生活。它没有考虑受抚养人支出的经常性性质，或因你去世可能产生的任何特殊支出，例如未成年子女未来的大学教育费用。相反，这些支出是另一种计算方法的一部分，即人寿保险规划的**需求法**。

    '
- fmt: '# The Needs Approach to Life Insurance


    The needs approach to determining the optimal amount of life insurance an individual
    should purchase is sophisticated and usually computed via a computer software
    program. Briefly, the approach considers your marital status, whether your spouse
    is employed outside the home, the size of your family, and any separate income
    earned by your dependents (children or elderly parents). For example, an individual
    who is single and has no dependents has little need for life insurance coverage.
    As a result, life insurance for this person may be necessary only to repay debts
    and expenses related to their death. A married person or single working parent
    who supports dependents has a need for life insurance to continue the flow of
    income to these dependents in the event of the person’s death. The needs approach
    is suitable to determine the amount of this need.


    Here are some of the typical needs of an insured person and their family in the
    event of death:


    * Burial or cremation expenses, including funeral costs

    * An adjustment fund, which is a short-term fund intended to cover one-time expenses
    incurred by the family as it adjusts to the loss of the primary (or other) wage-earner

    * An income continuation fund, including an amount for mortgage payoff (if the
    insured’s house is not paid off by the time of death)

    * An educational fund for the college education of minor children

    * An amount to provide a lifetime income for the surviving spouse, the need for
    which arises if the spouse is unemployed and does not have the necessary skills
    to enter the workforce or cannot otherwise earn sufficient income to replace the
    insured’s income


    As the potential insured of a single-income family, you should consider that even
    if your surviving spouse could generate sufficient income to cover the loss of
    your earnings, your spouse’s entry into the workforce might not be preferable
    to purchasing additional life insurance for this need. In other words, do you
    intend to require your spouse to work? The answer depends on your agreements with
    your spouse, but if you do not wish to have this discussion, you should purchase
    the necessary additional life insurance.


    ## Term vs. Cash Value Insurance


    Many life insurance companies offer various life insurance policies. All these
    policies generally consist of only two basic methods of providing life insurance:
    term (also known as temporary life insurance) and cash value (also known as permanent
    life insurance). Term insurance protects you only for a specific period; if you
    die during this period and are current in your premium payments, the company will
    pay your family the contractual death benefit that is due. Cash value insurance
    protects you for life and offers a savings component in the form of a cash value
    buildup. Types of term life insurance policies include annual renewable term,
    level premium term, and decreasing term insurance. Types of permanent life insurance
    policies featuring a cash value buildup include traditional whole life, universal
    life, variable life, and variable universal life (VUL) coverage.


    Both term and cash value life insurance can be valuable in protecting yourself
    and your family. You should not think of either term or cash value insurance as
    an all-or-nothing proposition; many thoughtful individuals purchase both forms
    of coverage. But generally, as you age, term insurance coverage will become more
    expensive, whereas the cost of cash value coverage will remain fixed. The reason
    is that cash value expenses are front-loaded as part of the policy structure,
    because some of the premium expenses (beyond the pure mortality cost associated
    with any life insurance policy) go to build a cash reserve or cash fund that you
    can potentially access for emergency needs.


    Just as in determining the amount of life insurance that may be needed, rules
    of thumb pertain to whether it is best to purchase term or cash value insurance.
    One of the most common is to “buy term insurance and invest the difference.” In
    other words, given the fact that term is at least initially less expensive than
    cash value (the younger you are, the longer your life expectancy and the less
    the mortality costs associated with term insurance), take the savings and invest
    it in higher-yielding financial investments, such as mutual funds. Although the
    appeal of this strategy is obvious, permanent insurance advocates counter that
    the buy-term-and-invest-the-difference concept depends on several flawed assumptions:


    * The difference will always be diligently invested every year the insured owns
    term insurance, regardless of the insured’s personal financial circumstances or
    ongoing standard of living.

    * The alternative investment will always be financially superior to the incremental
    cash value buildup.

    * Somehow the need for insurance will magically disappear as the insured ages.


    Ultimately, the final decision of how to best meet your life insurance needs is
    yours. In providing for these needs, you should remember that life insurance should
    be purchased to protect yourself and your family; investments, on the other hand,
    should be purchased to accumulate wealth. Although cash value policies have some
    investment characteristics (particularly the newer forms of universal and variable
    universal life), life insurance is first and foremost a risk-management product
    and, generally, not a product designed to generate significant investment growth.


    ### Types of Term Insurance


    Today, most buyers of term insurance purchase either annual renewable term or
    level premium term. Historically, decreasing term insurance has been a popular
    form of temporary protection and has been used as a mortgage-payoff vehicle at
    the insured’s death. However, decreasing term has fallen out of favor in recent
    years, primarily because it does not reduce protection at the same rate as the
    typical mortgage balance, thus resulting in an unnecessary premium cost to the
    insured. With annual renewable term, you pay the premium each year, and the policy
    remains in force. As you age, the cost to the insurance company increases, and
    the premium goes up each year. But the level of protection—the death benefit—afforded
    your family remains constant.


    Level premium term insurance, on the other hand, initially costs more per year
    than annual renewable term, but the premium remains level for a fixed period of
    time (generally anywhere from 5 to 30 years). Thus, as you age, presuming you
    still want a relatively inexpensive temporary life insurance policy, you should
    probably consider replacing annual renewable term with level premium term. But
    beware: as you approach the expiration date of your level term policy, you should
    begin to set aside additional funds for premium payments after the policy expires.
    Typically, depending on your age, health, and the length of your original level
    term policy, you will experience a significant increase in premiums when you purchase
    a new term policy.


    An attractive feature of some term policies is the ability to convert from term,
    or temporary, coverage to cash value, or permanent, life insurance protection
    without evidence of insurability. This means you can obtain permanent protection
    without having to pass a medical examination. Accordingly, the opportunity to
    convert is particularly valuable for insureds whose health may have declined during
    the term. As such, if your health has changed for the worse and you currently
    own a term policy, you should probably consider converting to a cash value policy
    as soon as possible, because it is unlikely that you will be able to qualify for
    permanent coverage at a later date.'
  raw: 'The needs approach to determining the optimal amount of life insurance an
    individual should purchase is sophisticated and usually computed via a computer
    software program. Briefly, the approach considers your marital status, whether
    your spouse is employed outside the home, the size of your family, and any separate
    income earned by your dependents (children or elderly parents). For example, an
    individual who is single and has no dependents has little need for life insurance
    coverage. As a result, life insurance for this person may be necessary only to
    repay debts and expenses related to their death. A married person or single working
    parent who supports dependents has a need for life insurance to continue the flow
    of income to these dependents in the event of the person’s death. The needs approach
    is suitable to determine the amount of this need.


    Here are some of the typical needs of an insured person and their family in the
    event of death:


    *   Burial or cremation expenses, including funeral costs

    *   An adjustment fund, which is a short-term fund intended to cover one-time
    expenses incurred by the family as it adjusts to the loss of the primary (or other)
    wage-earner

    *   An income continuation fund, including an amount for mortgage payoff (if the
    insured’s house is not paid off by the time of death)

    *   An educational fund for the college education of minor children

    *   An amount to provide a lifetime income for the surviving spouse, the need
    for which arises if the spouse is unemployed and does not have the necessary skills
    to enter the workforce or cannot otherwise earn sufficient income to replace the
    insured’s income


    As the potential insured of a single-income family, you should consider that even
    if your surviving spouse could generate sufficient income to cover the loss of
    your earnings, your spouse’s entry into the workforce might not be preferable
    to purchasing additional life insurance for this need. In other words, do you
    intend to require your spouse to work? The answer depends on your agreements with
    your spouse, but if you do not wish to have this discussion, you should purchase
    the necessary additional life insurance .


