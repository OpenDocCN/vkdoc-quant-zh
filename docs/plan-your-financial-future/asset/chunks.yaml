- fmt: '# Umbrella Liability Insurance


    Umbrella liability policies are extended personal liability insurance—that is,
    they supplement, or add to, your existing, or underlying, personal liability coverage
    under your homeowner’s or automobile policy. For example, if you are sued for
    negligence in an automobile accident and the plaintiff wins a verdict of $1 million
    in damages, an umbrella policy will cover you for this amount, even though the
    underlying maximum limit on your personal automobile policy for injuries to all
    individuals is only $300,000.


    An umbrella liability policy may not only increase your liability coverage amounts,
    but also broaden such coverage. Most automobile and homeowner’s policies exclude
    the risks of libel or slander from liability protection; in contrast, an umbrella
    policy typically includes them. Additional risks may be covered by an umbrella
    policy; however, because most policies are customized to the needs of the insured,
    the covered risks may vary. Keep in mind that the nature of an umbrella policy
    limits the number of claims that the insurance company experiences and potentially
    has to pay.


    The premiums charged for umbrella coverage are relatively inexpensive. This is
    primarily because an umbrella policy is written on an excess basis—the policy
    pays only when the underlying coverage limits from your automobile or homeowner’s
    policy or both have been used up. When the umbrella policy is the only coverage
    for a claim (for example, if slander is alleged and proven), the policy typically
    has its own deductible or self-insured retention amount, which may be as high
    or low as the insured chooses. Alternatively, if the liability claim is covered
    by one of the underlying policies (for example, automobile negligence), the deductible
    for the underlying policy is also effectively the deductible for the umbrella.


    You should think of an umbrella policy exactly as the name implies. The excess
    coverage provided by the “umbrella” protects you against sizable damage amounts
    that may be awarded as a result of litigation. Purchasing umbrella coverage is
    particularly important for individuals who are often the subject of lawsuits,
    including professionals (lawyers, doctors, accountants, engineers, and so on)
    and any person of higher net worth. Be aware that any claim arising out of a business
    activity in which you or any other insured are engaged is not covered under an
    umbrella policy; rather, to be protected against these types of claims, a professional
    liability policy (typically, a malpractice or errors-and-omissions policy) is
    necessary.


    # Business Property Insurance


    There are two types of business property insurance: a commercial package policy
    (`CPP`) and a business owner’s policy (`BOP`). The type of policy you purchase
    depends on the size and organizational form of your business. For example, the
    `CPP` is usually required by larger businesses, typically corporations, whereas
    the `BOP` is designed for small to medium businesses, usually operating in an
    unincorporated form as a sole proprietorship or partnership.


    The `CPP` combines commercial property, liability, and business automobile coverage
    into a single policy. As a result, each part of the `CPP` specifies covered business
    property, an applicable deductible, valuation provisions, and a requisite cause
    of loss. In practical effect, these types of property coverage are similar to
    a homeowner’s policy, but they are much broader and comprehensive in scope. Hence,
    the advantage of listing and insuring business property in this manner is that
    there are fewer gaps in coverage. In addition, you may achieve administrative
    savings that can lead to lower premiums.


    The general liability portion of the `CPP` protects the business against legal
    liability arising from business activities, excepting injuries incurred by employees
    while on the job, for which separate worker’s compensation insurance is needed.
    Typically, the `CPP` includes additional coverage for business automobile liability,
    but all claims arising out of employee injury must be handled as part of the worker’s
    compensation policy that most businesses are required to maintain by state law.
    It is also possible to write a separate policy for commercial general liability,
    although this may result in additional cost to the business.


    The `BOP`, on the other hand, is specifically designed for the needs of small-
    to medium-sized businesses and covers all business-related real and personal property
    without a separate listing. This policy has two forms: basic and special. The
    basic form covers the possibility of loss from all listed perils, and the special
    form covers loss from all perils not excluded. All forms of the `BOP` cover liability
    for bodily injury and property damage caused by employees while engaged in an
    activity on behalf of the business.


    If you are business owner, you should be aware that another type of policy protects
    business property while that property is in transit to another location. This
    is known as an inland marine policy and covers domestic goods while they are being
    moved from one location to another, mobile equipment and property, and certain
    types of property that are still in the dealer’s store (such as inventory). The
    term inland marine has nothing to do with water or oceanic activities, as the
    name may seem to imply.


    We have now concluded our look at personal and property risk exposures and how
    to insure them. However, if you are employed, additional forms of insurance benefits
    may be available to you in group form. Such forms, along with other benefits commonly
    offered by an employer, are the subject of our next chapter.


    # Optimizing Your Employment Benefits


    Our discussion on how to protect your wealth concludes with this chapter on how
    best to take advantage of benefits offered by your employer. Unlike the humorous
    television commercial, benefits offered by your employer do not come from France
    (“French benefits”) but rather are commonly referred to as fringe benefits. The
    nature and amount of fringe benefits you receive from your workplace depends on
    your employer, its current and future cash flow, and its attitude toward providing
    (usually) tax-free benefits to its employees. Typically, employers offer fringe
    benefits not only for competitive reasons, but also because they receive an income-tax
    deduction for doing so, which thereby assists them with the management of their
    future cash flow.


    Perhaps the most popular benefit for employees that has evolved throughout the
    years is employer-provided group medical and dental insurance. Other common benefits
    are group term life insurance coverage, accidental death insurance coverage, group
    long-term disability coverage, dependent care assistance (usually through some
    form of flexible spending account), educational assistance, and group long-term
    care insurance. In addition, many employers have implemented retirement savings
    options, such as the `Section 401(k)` retirement plan (so-named after the Internal
    Revenue Code section of the same number). Finally, executives of companies may
    have special or discriminatory benefits established to encourage performance goals.


    This chapter considers how you, as a valued employee, can best take advantage
    of these benefits to help meet your financial goals.'
