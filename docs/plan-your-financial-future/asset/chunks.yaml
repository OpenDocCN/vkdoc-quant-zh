    如果您每月能存下 500 美元，并且这些储蓄能获得 6%的税前回报率，那么大约 53 个月后您将拥有 3 万美元。然而，如果您能获得 12%的税前回报率（即收益率翻倍），您将提前六个月，在大约
    47 个月后实现 3 万美元的储蓄目标。当然，如果您每月能存下超过 500 美元，您就能更快地攒够所需首付。请记住，有些抵押贷款允许您支付低于购房价格 20%的首付，但传统抵押贷款市场要求最低
    20%的首付。


    与任何其他财务目标一样，要储蓄购房所需资金，您必须制定计划。这又回到了本书第一部分讨论的财务规划基本要素：您必须制定储蓄策略并付诸实施。如果需要编制预算来积累必要储蓄，那就去做。您必须具备储蓄的自律性，否则无法积累财富。


    # 了解抵押贷款类型


    从历史上看，面向购房者主要有四种抵押贷款类型，尽管最近第五种——**仅付利息抵押贷款**——也被纳入其中。以下列表逐一讨论了每种类型，以及选择最适合您的类型前需要考虑的一些因素。请记住，无论选择哪种抵押贷款，它们都体现了投资房地产的一个主要优势：利用借入资金进行杠杆投资，从而在您的资金上获得更高回报。


    -   **传统抵押贷款**：这是一种贷款期限内的固定利率抵押贷款——通常为 15 年或 30 年——向借款人保证利率不会上涨。这类抵押贷款适用于现金流稳定且预期未来几年这种稳定性将持续的个人。

    -   **可调利率抵押贷款 (ARM)**：此类抵押贷款的利率可能根据指定的指数或基准（例如十年期美国国债的当前收益率）每月或每年变动。ARM 适用于希望月供较低且不打算长期居住在该房屋中的个人。

    -   **联邦住房管理局 (FHA) 抵押贷款**：此类抵押贷款的偿付由联邦政府担保，因此其利率通常低于传统抵押贷款。低首付也是该贷款的一个特点。FHA
    抵押贷款通常仅适用于低收入房主。

    -   **退伍军人管理局 (VA) 抵押贷款**：此类抵押贷款具有与 FHA 抵押贷款相同的联邦还款担保，但仅适用于武装部队的退伍军人。该贷款的一个特点是无需支付首付。

    -   **仅付利息抵押贷款**：在这种抵押贷款形式中，借款人在指定年限内仅支付贷款利息。贷款本金几乎无法减少，从而有效阻止借款人在房屋中建立大量（如果有的话）权益。在办理仅付利息抵押贷款时，借款人预期房屋的公允市场价值将从购买价格升值，从而可以用任何销售收益还清抵押贷款余额。就其性质而言，仅付利息抵押贷款只应由风险偏好相对较高的个人办理。


    # 购买和使用度假屋


    购买度假屋是一种直接的房地产投资形式。虽然有时度假屋或第二套房屋会被出租并为购买者产生租金收入，但更多情况下，此类房屋是作为购买者及其家人的私人度假场所购买的。因此，将房屋视为一种创收投资（以替代收益型股票或固定收益债券组合）很可能并非购买者的首要考量。此外，如果购买者每年将度假屋出租超过
    14 天，国税局 (IRS) 将对其按租赁房产征税。这可能会将购买者推入更高的边际所得税等级，从而导致总体所得税增加。


    假设作为购买者，您购买度假屋供自己或家人私人使用，您可以使用几种技巧来最大限度地利用税法。第一种，俗称**同类交换**或**第 1031 条交换**，可能允许您推迟缴纳因出售度假屋而实现的资本利得税。第二种，称为**合格个人住宅信托
    (QPRT)**，是一种遗产或赠与税规划技巧，如果满足特定条件，它允许您将度假屋的公允市场价值从您的总遗产中排除征税。


    ## 同类交换


    让我们首先讨论同类交换。根据所得税法第 1031 条，可以将一项投资物业（如房地产或度假屋）与另一项投资物业进行免税交换。您应注意，根据 2017 年《减税与就业法案》(TCJA)
    的规定，自 2017 年 12 月 31 日后，为投资而持有的个人财产的交换不再符合免税资格。但是，如果不动产是用于个人用途，则无法进行同样的交换。因此，如果您计划每年使用度假屋超过
    14 天（这很可能是事实，因为您购买该房屋很可能是为了个人使用），那您肯定不走运，因为它将不符合免税或同类交换的资格。


    另一种情况是，假设无论出于何种原因，您计划每年仅使用度假屋一周。在这种情况下，您可以主张该度假屋严格作为投资物业持有，因此进行免税交换处理是可能的。然而，这里的关键词是“可能**”，因为关于交换度假屋（其中每栋房屋业主每年使用时间少于
    14 天）的税务结果，法律并不明确。这无疑是激进的税务规划，但如果实际情况合适，它可能会奏效。


    如果您是将度假屋出租而非自住，则第 1031 条免税交换处理要清晰得多。在这种情况下，假设您将度假屋的个人使用时间控制在每年 14 天或更少，那么它很可能符合同类交换的资格，任何已实现的收益都将被递延。但请记住，递延收益的代价是需要每年将该房屋的所有收入作为租赁房产进行申报。

