- fmt: '### Section 4: Ratification; Use of Photocopy; Revocation of Prior Powers:
    Construction of Instrument


    4.01: I hereby ratify, allow, acknowledge, and hold valid all acts taken by my
    attorney-in-fact pursuant to this power.


    4.02: I hereby authorize the use of a photocopy of this General Power of Attorney,
    in lieu of the original copy executed by me, for the purpose of effectuating the
    terms and provisions hereof.


    4.03: I hereby revoke, annul, and cancel any and all durable general and financial
    powers of attorney previously executed by me, and the same shall be of no further
    force and effect. However, the preceding sentence shall not have the effect of
    revoking any powers of attorney that are directly related to my health care that
    have been signed and executed by me.


    4.04: This General Power of Attorney is executed and delivered in the State of
    `_____(State of Domicile)_____`, and the laws of the State of `_____(State of
    Domicile)_____` shall govern all questions as to the validity of this power and
    to the construction of its provisions.


    4.05: This instrument is to be construed and interpreted as a general power of
    attorney. The enumeration of specific powers herein is not intended to, nor does
    it, limit or restrict the general powers herein granted to my attorney-in-fact.


    4.06: Pursuant to `_____(Applicable State Statute)_____`, any person or organization
    that “arbitrarily or without reasonable cause” fails to honor this Power of Attorney,
    or fails to comply with the directions of my attorney-in-fact, shall be subject
    to costs, expenses, and reasonable attorney’s fees required to effectuate the
    terms and provisions of this instrument.


    IN WITNESS WHEREOF, I have executed this General Power of Attorney this `______`
    day of `_________________`, `20xx`.


    _______________________________


    PRINCIPAL


    WITNESS:


    ______________________________


    Witness


    ______________________________


    Witness


    STATE OF `_________________`


    COUNTY OF `________________`


    The foregoing instrument was acknowledged before me this `_____` day of `_______________`,
    `20xx` by `________________` , Principal, and the above stated witnesses, for
    the purposes therein stated.


    Witness my hand and official seal.


    (SEAL)


    _____________________________


    Notary Public


    My commission expires: `________________`


    SPECIMEN SIGNATURE OF ATTORNEY-IN-FACT:


    _______________________________________


    ATTORNEY-IN-FACT


    SPECIMEN SIGNATURE OF SUCCESSOR ATTORNEY-IN-FACT:


    ________________________________________


    SUCCESSOR ATTORNEY-IN-FACT


    ## Appendix D: Declaration as to Medical or Surgical Treatment and Medical Durable
    Power of Attorney


    ## Declaration as to Medical or Surgical Treatment


    I, `_____(Declarant)_____`, currently of `_____(City and State)_____`, being of
    sound mind and at least eighteen years of age, direct that my life shall not be
    artificially prolonged under the circumstances set forth below and hereby declare
    that:


    ### Life-Sustaining Procedures


    If at any time my attending physician and one other qualified physician certify
    in writing that:


    I have an injury, a disease, or an illness which is not curable or reversible,
    and which, in their judgment is a terminal condition, and I have been unconscious,
    comatose, or otherwise incompetent so as to make or communicate responsible decisions
    concerning my person, then I direct that, in accordance with `_____(State of Domicile)_____`
    law, life-sustaining procedures shall be withdrawn and withheld pursuant to the
    terms of this declaration. It is understood that life-sustaining procedures shall
    not include any medical procedure or intervention for nourishment considered necessary
    by the attending physician to provide comfort or alleviate pain.


    Moreover, it is my request that the term “terminal condition” be interpreted to
    include a state of permanent unconsciousness (permanent vegetative state).


    ### Artificial Nourishment


    If the only procedure that I am being provided is artificial nourishment, I direct
    that artificial nourishment shall also be immediately discontinued when it is
    the only procedure being provided. Notwithstanding any direction with respect
    to the discontinuance of artificial nourishment, if my attending physician has
    determined that pain results from such discontinuance, such physician may order
    that artificial nourishment be provided to me, but only to the extent necessary
    to alleviate such pain.


    ### Other Specific Requests:


    Note to user


    Common requests may include use or non-use of CPR (cardiopulmonary resuscitation)
    and possible organ donation.


    ## Medical Durable Power of Attorney


    ### Designation of Health Care Agent


    I, `_____(Principal)_____`, currently of `_____(City and State)_____`, do hereby
    appoint:


    Agent Name: `__________________`


    Address: `__________________`


    Phone: `__________________`


    Relation, if any: `__________________`


    as my Agent to make health care and personal decisions for me if I become unable
    to make such decisions for myself, except to the extent I state otherwise in this
    document.


    The term “health care” as used in this document includes all medical treatment,
    the provision, withholding, or withdrawal of any health care medical procedure,
    including surgery, cardiopulmonary resuscitation, or service to maintain, diagnose,
    treat, or provide for a patient’s physical or mental health or personal care,
    unless such authority is otherwise limited by this document.


    ### Creation of Medical Durable Power of Attorney


    By this document I also intend to create a Medical Durable Power of Attorney.
    This Durable Power of Attorney shall take effect only upon my inability to give
    informed consent, disability, incapacity, or incompetency, and shall continue
    during such inability to give informed consent, disability, incapacity, or incompetency.
    I have prepared this document while still legally competent and of sound mind.
    If these instructions create a conflict with the desires of my relatives, with
    hospital policies, or with the principles of those providing care, I ask that
    my instructions prevail.


    ### General Statement of Authority Granted


    Subject to any limitations in this document, I grant to my Agent full power and
    authority to make health care decisions for me to the same extent that I could
    make such decisions for myself if I had the capacity to do so. This authority
    shall also include all acts related to my personal care and any residential placement
    and/or medical treatment. In making any decision, my Agent shall attempt to discuss
    the proposed decision with me to determine my desires if I am able to communicate
    in any way.


    In exercising this authority, my Agent shall make health care decisions that are
    consistent with my desires as stated in this document or otherwise made known
    to my Agent. If my wishes regarding a particular health care decision are not
    known to my Agent, then my Agent shall make the decision for me based upon what
    my Agent believes to be in my best interests.


    ### Access to Medical Records


    My Agent shall have complete access to my protected health information, as the
    personal representative of my estate, for all purposes under the HIPPA Act of
    1996 (`45 C.F.R. Sec. 164.502 (g) (1) and (2)`), and pursuant to `_____(Applicable
    State Law)_____` state law (State Statute `_____(Applicable State Statute)_____`).
    There is no limitation on the information I authorize to be disclosed, and there
    is no limitation on the period of time for which information may be requested
    or disclosed.


    ### Advance Medical Directive


    My Agent shall be permitted to execute an advance medical directive with respect
    to the administration of cardiopulmonary resuscitation (CPR) in accordance with
    the provisions of `_____(Applicable State Statute)_____` if determining, after
    conferring with my attending physician, that a CPR directive is appropriate.'
