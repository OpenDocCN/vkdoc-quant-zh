  trans: '如果您无法自行承担长期护理费用，可以考虑申请**医疗补助计划**（Medicaid），这是由联邦和州共同出资、面向低收入和低资产个人提供的健康及长期护理项目。要获得覆盖资格，申请人必须满足其居住州规定的收入和资产测试标准。


    一些相对富裕的人曾试图通过将资产和收入“花销至”指定水平来获取长期医疗补助资格。然而，自 20 世纪 80 年代以来的一系列法律限制了这种行为，尤其是通过设立**追溯期**，在此期间大多数赠与他人的资产（即“花销”部分）不会被豁免。例如，在申请医疗补助前
    60 个月内将资产转移给家庭成员（通常不包括配偶）的个人，可能会被处以罚金，并在很长一段时间内被禁止接受医疗补助援助。因此，如果您有能力自行承担长期护理费用，依赖政府援助来支付这些开支可能并非最审慎的规划选择。另一方面，如果您原本一直试图获得医疗补助资格，却不得不意外入住养老院，可以考虑购买一份长期护理保险，以覆盖所需的追溯期。这意味着保单的适用受益期至少需要覆盖您申请医疗补助前的五年。


    作为长期护理保险的最后一个替代方案，请查看您所在的州是否已通过所谓的**赡养法**（filial support law），涉及长期护理费用的支付。这类法律可能被用来要求患者的家属偿还家庭成员产生的未付长期护理费用。目前有
    30 个州通过了此类法律，但由于各州为参保人员支付的医疗补助费用迅速增加，这类法律正变得越来越普遍。


    这让我们回到是否购买长期护理保险的问题上。如果您认为家庭或个人情况可能有必要购买此类保单，以下是一些需要考虑的因素：


    - **我应在何时（多少岁时）购买保单？** 指导原则是，您应在相对健康且年轻的时候购买长期护理保险，但又不能太年轻，以免在过长的时间内支付保费。通常，购买长期护理保险的最佳年龄是
    55 岁左右，此时您接近退休年龄，但仍能无需解决重大健康问题就获得保单覆盖。

    - **您可能需要哪种类型的长期护理？** 当然，没有人希望接受专业护理服务，但支付居家护理服务费用很可能是大多数潜在购买者的目标。您可能只想购买一份长期护理保险来应对这种可能性。

    - **您能为长期护理支付多少费用？** 这个问题的答案通常决定了保单的**免赔期**有多长，以及在私人保险生效前您需要支付多长时间的款项。

    - **您对为配偶或子女留下遗产持何种态度？** 没有什么比长期入住养老院设施更能迅速耗尽您积累的遗产规模及其分配。因此，购买长期护理保险可被视为一种应急措施，以至少保留部分遗产。


    至此，我们已经涵盖了积累财富能力所面临的重大潜在威胁之一：无法支付且无法预见的医疗费用。下一章将讨论影响您致富能力的另一个主要威胁：**失去赚钱能力的风险**。这类风险可以通过购买个人伤残保险来管理，这很可能是当前市场上最被需要的保险形式之一。


    # 6. 为您的赚钱能力投保


    如果你问任何一位理财规划师或保险代理人，最被忽视或保障不足的财务风险是什么，他们很可能会说是**失去谋生能力**的风险。大多数人对这种可能性没有给予足够重视，即便考虑了，也认为自己已获得充分保障。他们相信自己永远不会失去赚钱能力！然而，根据《专员个人伤残表
    A》（Commissioner''s Individual Disability Table A），每三位在职美国人中就有一位在 65 岁之前会遭遇某种形式的残疾，且持续至少
    90 天。此外，每七名员工中就有一人在退休前会残疾五年或更久。您在工作生涯中致残的可能性是同期死亡可能性的两到三倍。这些数字令人印象深刻（也有点令人恐惧）。


    许多人认为，由于工作单位提供了团体伤残收入保险，他们已经为未来赚钱能力的丧失做好了充分保障。然而，这种看法存在两个重大缺陷：


    - 大多数雇主提供的保单仅能替代您月收入的 50%–60%。

    - 这项福利提供的替代收入很可能需要**缴纳所得税**，因为雇主在您工作期间支付了保费。这意味着您实际到手的金额将低于承诺的月收入 50%–60%。


    那么，这种常被遗忘的风险如何才能得到充分保障？最常见的方式是通过购买**个人伤残收入保险**。'
- fmt: '# Is the Loss of Your Earning Power Already Adequately Covered?


    There are other forms of insurance that you may rely on to protect your earning
    power in the event that you are unable to work. Among these is supplemental income
    insurance, which is designed to pay your living expenses while you are disabled.
    The best known of these policies is issued by American Family Life Assurance Company—better
    known as `AFLAC`. Quack, quack!


    In addition to supplemental policies, employee benefits from your employer are
    typically available, as mentioned previously. For short-term illness, your employer
    may provide sick leave, short-term disability income protection, or both. Furthermore,
    all employers are mandated by the state to provide worker’s compensation benefits
    in the event of a serious injury while on the job. Keep in mind, however, that
    most employers provide only group long-term disability policies. Benefits from
    these types of policies begin when short-term benefits, if there are any, stop.
    Long-term benefits then generally continue until you reach age 65 (the Medicare
    age for receiving benefits) or until you return to work. Group policies include
    a cap, or limitation, on the amount they will pay—usually no more than 60 percent
    of your monthly income. Plus, as with most employee benefits, when you leave your
    current place of employment, the disability income coverage is terminated.


    `Social Security` income protection, on the other hand, is a disability benefit
    provided under the `Social Security` system, but qualifying for it is not easy.
    Specifically, to qualify for a disability benefit under `Social Security`, you
    must:


    - Have been disabled for at least five full calendar months

    - Have a disability expected to last at least 12 months or end in death

    - Be unable to engage in any substantial gainful occupation, and not just your
    own occupation, at the time your disability begins


    As with funding possible long-term care needs, many individuals (if they have
    given any thought to their chances of becoming disabled) attempt to self-fund
    for disability through investment. To determine what you would need to self-fund
    for this possibility, review the basics of what we have discussed so far—most
    notably, how to prepare and analyze a personal cash-flow statement—and see what
    your monthly expenses are. Then multiply this amount by 12 and determine the amount
    of your total annual expenses. Doing so gives you some idea of the funds needed
    to take you through one year of disability. Most long-term disabilities last more
    than a year, so you should now be able to appreciate the actual amount of savings
    needed to cover the risk of loss to your earning power. Most people cannot afford
    to self-fund for long, which brings us back to considering the purchase of an
    individual disability income insurance policy.


    ## Definitions of Disability


    The most important part of any disability income insurance policy (and the single
    most important consideration for you) is the language used by the policy to define
    disability. Fortunately, there are only three definitions:


    - **Own Occupation (Own Occ)**: This is the most favorable definition of disability
    from the point of view of the insured. The definition states that the insured
    is considered totally disabled (and therefore eligible for benefits payments)
    if they are unable to engage in the primary duties of their own occupation. For
    example, a medical surgeon would be unable to engage in their own occupation if
    they suffered an injury to the hands. This would be the case even if the surgeon
    were still able to diagnose illnesses as a general practitioner of medicine.

    - **Modified Any Occupation (Modified Any Occ)**: This definition is slightly
    less restrictive than the `Any Occupation` definition but not as liberal as the
    `Own Occ` definition. `Modified Any Occ` defines disability as the insured’s inability
    to engage in any occupation for which they are reasonably suited by education
    or experience and for which they could easily become qualified. Applying this
    definition to the medical surgeon example, if the surgeon could become a general
    practitioner reasonably easily after the injury to their hands, the policy probably
    would not pay a benefit.

    - **Any Occupation (Any Occ)**: This is the practical opposite of the `Own Occ`
    definition and requires the insured to be unable to perform the duties relating
    to any gainful occupation before they are considered to be totally disabled. It
    is not unlike the `Social Security` definition of disability, except that there
    is no five-month waiting period and expected length of disability. The `Any Occ`
    definition is usually limited to blue-collar workers, although white-collar workers
    and professionals may also obtain a policy with this definition. The reason these
    individuals would want to do so is to achieve premium cost savings.


    Group long-term disability policies usually use a combination of the `Own Occ`
    and `Modified Any Occ` definitions (called a split-definition policy). Such policies
    permit the insured to receive benefits for a period of months or years under the
    `Own Occ` criteria; then, after the insured has been retrained for another position,
    the policies apply the stricter `Modified Any Occ` definition. Why? By design,
    the split definition encourages the worker to return to work and remain with the
    company, even though it may be in a new position or occupation.


    It is also possible to write an individual disability income policy with a loss-of-income
    definition. With this kind of policy, the type of disability is not defined; rather,
    if, as a result of injury or sickness, the insured suffers a loss of income, benefits
    based on that loss are payable regardless of whether the insured returns to work
    in the same or a related occupation. Given that it does not usually provide as
    great a benefit, the loss-of-income policy is not as popular among professionals
    or other workers as the `Own Occ` definition. But insurance companies like the
    loss-of-income standard because it establishes a simple benchmark from which to
    measure the amount of benefits payable.'
