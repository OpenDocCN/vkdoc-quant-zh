    a minimum essential amount of health care insurance or face a penalty. The constitutionality
    of this mandate (as a penalty tax) was upheld in the US Supreme Court case of
    National Federation of Independent Business, et al. v. Sebelius, Secretary of
    Health and Human Services , et al. (decided June 28, 2012) and was effective beginning
    January 1, 2014\. The requirement of automatic enrollment provisions for all employees
    covered under group health insurance, subject to certain specified opt-out rights,
    was also effective beginning January 1, 2014, and impacts all employers who employ
    more than 50 full-time equivalent (FTE) employees. Even part-time employees who
    work 30 hours or more per week are counted among the 50 FTEs. As mentioned in
    the last chapter, the individual mandate (not the employer mandate) is repealed
    by the 2017 TCJA for years beginning after 2018.

    *   The prohibition of waiting periods to be covered under a health insurance
    policy of more than 90 days, effective January 1, 2014.

    *   The prohibition of preexisting condition exclusions, first made effective
    in 2010 for children under the age of 19, and subsequently made effective for
    all individuals beginning January 1, 2014.

    *   The requirement that all new policies issued cover preventive services, such
    as cancer screening, with no out-of-pocket costs to the insured, effective for
    policies with plan years beginning on or after September 23, 2010.

    *   Extended coverage for dependents up to age 26, effective for policies with
    plan years beginning on or after September 23, 2010.

    *   A cap on health care contributions to FSAs of $2,500 per year beginning January
    1, 2013, which is indexed for inflation thereafter.


    The PPA also includes several provisions to help finance health care reform. Among
    the most important of these is an increase in the threshold for medical expense
    deductions from 7.5 percent to 10 percent of a taxpayer’s adjusted gross income
    (AGI) for individuals under the age of 65; a new 3.8 percent surtax on unearned
    income (such as dividends and interest) for taxpayers with annual modified adjusted
    gross income (MAGI) over $200,000 (single filer) and $250,000 (joint filers);
    and an increase in the Medicare payroll tax from 1.45 percent to 2.35 percent
    for taxpayers with an annual gross income over $200,000 (single filers) and $250,000
    (joint filers). All of these provisions became effective January 1, 2013, although
    the 2017 TCJA reduced the threshold for medical expense deductions from 10 percent
    to 7.5 percent of AGI for all taxpayers temporarily for the 2018 tax year.


    ## Types of Health Insurance Policies


    Historically, there have been only two basic types of health insurance policies:
    indemnity (or fee-for-service) policies and managed care policies. In recent years,
    however, a third type of health insurance coverage—the health savings account
    (HSA)—has come onto the scene, spurred by Congressional legislation. The first
    two types of policies dominate the employer-provided range of coverage, whereas
    the HSA represents a new way of looking at the individual health insurance problem.
    The HSA is designed to make the individual—rather than their employer—the party
    responsible for making financial decisions related to health. For this reason,
    the HSA and its predecessor, the medical savings account (MSA), are part of what
    is now referred to as consumer-driven health care .


    ### Indemnity (Fee-for-Service) Policies


    True indemnity policies do not include a deductible or co-payment and as such
    are sometimes referred to as first-dollar coverage (because they pay from the
    first dollar of medical expenses incurred). Over time, indemnity policies, which
    historically have included separate first-dollar coverage for hospital, surgical,
    and physician’s expenses (often known as basic medical insurance), have evolved
    into the comprehensive major medical policy . The major med policy , as it has
    come to be called, includes both a deductible and a co-insurance provision, as
    well as a maximum dollar limitation of coverage, which usually amounts to at least
    $1 million in lifetime medical expenses.


    As a rule, indemnity policies, including major med, cover only accidents and illnesses
    and do not cover preventative care. In addition, they pay a benefit based only
    on the usual, customary, and reasonable (UCR) rates in your area, not on the actual
    bill or expenses incurred. Individuals insured under indemnity policies are often
    billed by their medical providers, submit claims to the insurance company, and
    are subsequently reimbursed for expenses. Insureds usually have complete freedom
    with respect to which medical providers they use, thereby driving up costs for
    both the insured and the employer-sponsor. Primarily because of the cost implications,
    indemnity policies have largely been replaced by managed care policies in recent
    years.'
