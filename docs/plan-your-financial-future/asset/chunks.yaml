  trans: '

    # 购房与租房


    可以说，通过抵押贷款买房只是另一种形式的租房。与向房东支付租金不同，作为支付利息的房主，你是在向抵押贷款机构付款。诚然，如果你采用列举扣除法，为抵押贷款利息支付的部分能享受税收减免；但在标准的
    30 年期抵押贷款中，大约要到第 20 年之前，你的利息支付对减少本金的作用都不大。因此，如果你在购房后不久就搬家，只会损害自己的财务健康。正如刚才所讨论的，这就是为什么尽快加速偿还抵押贷款如此重要。


    下面提供一个购房与租房的比较分析工作表样本。


    ## 购房还是租房分析


    ### 购房成本


    1.  年度抵押贷款还款额（12 乘以每月抵押贷款还款额）

    2.  房产税

    3.  房主保险

    4.  维护费用

    5.  首付和交易成本利息的税后成本（`$`乘以`%`的税后回报率）

    6.  总成本（第 1 至 5 行之和） 减去：

    7.  抵押贷款本金减少额（来自摊销计划表）

    8.  因列举抵押贷款利息扣除带来的税收节省（抵押贷款还款中的利息部分乘以边际所得税率）

    9.  因列举房产税扣除带来的税收节省（第 2 行乘以边际所得税率）

    10. 总减少额与扣除额（第 7 至 9 行之和） 等于：

    11. 拥有房屋的年税后成本（第 6 行减去第 10 行） 加上：

    12. 预计房屋公允市值的年增值额（如有）（房屋价格百分比） 等于：购房总成本（第 11 行减去第 12 行）


    ### 租房成本


    1.  年度租金成本（12 乘以月租金）

    2.  租客保险


    等于：租房总成本（第 1 行加第 2 行）


    购房的一个重要积极因素对租房者而言并不存在：即房屋价值的预估年增值。这凸显了刚才讨论的内容：作为潜在房主，仔细研究当地市场、切勿为房产支付过高价格至关重要！如果你支付了过高的价格，就会限制房屋价值的潜在增值空间。如果你碰巧买在了错误的区域或错误的时间，那么一开始选择租房反而可能更明智。


    至于租房，一个常被忽视的保障策略是为租客购买财产保险单。几乎每份租约都包含免责条款，即房东对租客个人财产的损坏或被盗不承担责任。租客保险单可提供此项保障，同时还包括对可能在房产内受伤的客人的责任险。该保单还能保护租客免受其自身伤害行为（无论发生在何处）带来的后果。


    除了购买财产保险单，租客还应务必核实房东要求的任何押金状态。一些房东为了吸引租客，会为租客投资这笔押金，并在长期租约结束时支付利息。然而，更常见的情况是，房东仅将这笔押金保留在托管账户中，并在租约到期且租赁单元保持良好物理状态时退还给租客。作为潜在租客，你希望押金尽可能低，并希望自己的资金能以受保护的场所和房东及时维护的形式获得回报。


    # 出售你的房屋


    出售房屋时涉及的大部分问题都与所得税相关，但你不应忽视一些实际问题，比如是自行出售还是使用房地产经纪人。在当今精通互联网的社会，越来越多的人选择自行挂牌和出售房屋。然而，尽管避免使用房地产经纪人的成本看似很有吸引力，但如果你选择自行出售房屋，请考虑以下几点：


    -   你必须为房屋设定一个合理价格。尽管如今可比市场数据广泛可得，这看似容易，但你需要尽可能现实地评估房屋的价值。因此，你必须摒弃情感因素以及索要更高价格（而非更低价格）的自然倾向。要尽可能客观。

    -   你需要推销你的房屋。这远不止是在前院插一块“房主自售”的牌子那么简单。你需要将房屋列入当地的 multiple-listing service (MLS)（多重挂牌服务）。根据全国房地产经纪人协会的数据，超过
    60%的房屋销售是在买方代理的协助下完成的（相比之下，房地产代理人或经纪人通常只为卖方服务）。尝试与这样的代理人挂牌，他们通常作为网络的一部分工作，并代表众多合格买家。

    -   你需要区分认真的潜在买家和仅仅出于好奇的人。邻居们经常仅仅因为想看你要价多少就拿走销售手册或传单，这是众所周知的。相反，请你的邻居推荐任何可能在寻找新居的朋友或家人。然后，你应该对认真的买家进行资格预审，以免浪费时间和那些抵押贷款机构不会批准的人讨价还价。

    -   你必须完成交易！这是许多“房主自售”卖家容易失败的地方。许多买家精于谈判艺术，力求获得绝对最低价（有时甚至是低于市场的价格）。因此，作为卖家，你必须清楚自己愿意接受的价格，同时认识到这是当时市场所能承受的最高价格。


    假设你或你的房地产经纪人成功为你的房屋争取到了公平价格，那么你现在需要报告出售所得的任何收益的税款。幸运的是，任何主要居所出售的收益都被视为资本资产的销售收益。根据你的所得税等级以及你是否拥有该房屋至少一年，该收益通常按
    0%或 15%的边际税率征税。更重要的是，如果你满足特定条件，房屋出售的任何收益仅在其超过 25 万美元（如果夫妻联合报税则为 50 万美元）的部分才需要纳税。这
    25 万美元或 50 万美元的免税额每两年可使用一次。

