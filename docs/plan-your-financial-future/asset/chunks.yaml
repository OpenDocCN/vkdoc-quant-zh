  trans: '

    ## 退休储蓄的“三脚凳”


    从历史上看，理财规划师倾向于将退休储蓄视为退休“凳子”的三条腿：


    - 来自雇主赞助的退休计划的养老金收入，例如传统的固定收益计划

    - 来自税收递延个人储蓄计划（如 IRA）或应税共同基金账户的个人储蓄收入

    - 社会保障收入


    然而，近些年来，由于固定缴款计划迅速增加（其中投资风险转移给了员工或参与者），退休储蓄中又多了一条退休收入的腿。因此，这个凳子实际上更像是一张桌子——一张越来越需要你通过自己的退休计划缴款来“摆好”的桌子。


    ### 雇主赞助的退休计划


    现在，大多数中型到大型雇主都为其员工提供了参加雇主赞助退休计划的机会。总的来说，如今大多数雇主赞助的退休计划都属于固定缴款退休计划（有时被统称为利润分享计划）。这类计划中最常见的选择通常是`第
    401(k)条`计划，这是一种利润分享计划，雇主可以自行决定在任何一年是否进行单独的匹配缴款。


    然而，不幸的是，根据美国福利委员会最近的一项调查，几乎有 21%的合格员工没有参加其雇主赞助的`401(k)`计划。尽管随着自动缴款计划的普及（在员工未选择“退出”的情况下，雇主会自动为其缴款），这一比例未来应该会下降，但作为一个社会，我们在退休教育规划方面仍有很长的路要走。特别是当雇主匹配员工全部或部分的税前缴款时，员工基本上就是白白放弃了放在退休储蓄桌上的钱。此外，即使雇主不匹配员工的缴款，员工向`401(k)`计划缴款时使用的也是税前资金。因此，向`401(k)`计划缴款不仅为员工提供了退休储蓄的机会，同时也让他们能够减少当前的所得税。


    作为固定缴款计划的替代方案，雇主可以选择为其员工提供第二类退休计划，即固定收益退休计划（或称传统养老金计划）。但诚如大量文献所述，由于其复杂性和成本，固定收益计划正逐渐成为雇主赞助退休计划中的一种“濒危物种”。根据美国劳工统计局
    2013 年的一份报告，只有大约 16%的私营部门员工参与了传统的养老金计划——而对于现在二十多岁的员工来说，前景甚至更为暗淡。这些人中，很可能只有 10%或更少的人能每月领到养老金支票。对雇主而言，这是一个积极的趋势；但对员工来说，这就不那么有利了，因为这些员工需要独自承担为其退休生活提供资金的全部责任。因此，除了缺乏有保障的退休福利外，目前占主导地位的固定缴款计划还要求员工具备相当的投资专业知识——而这是许多人都不具备的特质。


    然而，对于年轻员工（其中绝大多数在工作期间将无法获得固定收益计划）来说，退休前景也并非一片黯淡。某些固定缴款计划规定雇主缴款并非随意决定。例如，政府的`第
    401(a)条`计划要求雇主强制缴款，数额等于员工薪资的一定百分比，并且按照员工的指示以他们的名义投资这些缴款。此外，由于 2001 年的一项法律将强制缴款雇主计划（如资金购买计划）的百分比扣除额与自主缴款计划（如`第
    401(k)条`计划）等同起来，利润分享计划因此变得更加流行。你应该采取以下两种方式之一来应对：


    - 尽可能多地参与固定缴款计划并为自己负担得起的任何金额进行缴款。记住，你需要积累的用于舒适退休生活的总金额是相当可观的。

    - 尽可能多地学习有关投资风险和回报的概念。了解你愿意为实现最大可能的回报而愿意承担的最低风险程度。


    首先，先向你雇主赞助的退休计划缴款，然后再尝试向任何个人税收递延储蓄（如 IRA）或应税投资进行独立缴款。通过这种方式，你可以最好地利用雇主可能提供的任何匹配缴款，这些缴款旨在鼓励你为退休进行储蓄。

    '
- fmt: '### Personal Savings Plans


    If you wish to supplement the retirement savings you are accumulating in an employer-sponsored
    retirement plan, you may want to consider allocating additional money into either
    a tax-deferred or a taxable personal savings plan. Tax-deferred personal savings
    plans include the traditional deductible `IRA`, the traditional nondeductible
    `IRA`, and the `Roth IRA` (although qualifying `Roth IRA` distributions are actually
    tax-free). There are also rollover `IRAs`, which are used as receptacles for lump-sum
    distributions from employer-sponsored (defined-benefit and defined-contribution)
    retirement plans. All these types of `IRAs` may be established without the assistance
    of your employer, although other types of `IRAs`—notably the `Simplified Employee
    Pension (SEP) IRA` and the `Savings Incentive Match Plan for Employees (SIMPLE)
    IRA`—must be established and contributed to by the employer on behalf of the participating
    employee.


    The traditional deductible `IRA` is the oldest and best-known type of `IRA`. The
    annual amount that may be contributed to this type of `IRA` is established by
    law, but whether this same contribution amount may be deducted on the owner’s
    income-tax return depends on various factors:


    - If neither spouse is an active participant in an employer-sponsored plan, such
    as a `Section 401(k)`, or if a single taxpayer is not an active participant, then
    contributions to the traditional `IRA` are deductible without regard to the participant’s
    adjusted gross income (`AGI`) in the year of contribution.

    - If one spouse is an active participant in an employer-sponsored plan but the
    other spouse is not—for example, one spouse stays at home—then the nonparticipant
    spouse may deduct contributions to their traditional `IRA` as long as the couple’s
    `AGI` is less than a specified annual amount in the year of contribution.

    - If both spouses are active participants, or if a single taxpayer is an active
    participant in an employer-sponsored plan, then the deduction is phased out if
    their income exceeds a separate, specified annual `AGI` ranges in the year of
    contribution.


    The important point to take away from these complex rules is that if you are a
    relatively high-wage earner and participate in a retirement plan offered by your
    employer, you are likely prohibited from deducting your contribution to a traditional
    deductible `IRA`. As such, you have only two other options to personally save:
    either take advantage of a traditional nondeductible `IRA` or elect to open a
    `Roth IRA`.


    Traditional deductible `IRA` contributions may be invested in any type of asset,
    with three specific exceptions:


    - You cannot invest `IRA` contributions in collectibles such as stamps, coins,
    and antiques.

    - You cannot invest `IRA` contributions in life insurance policies (although annuities
    are permitted).

    - You cannot write yourself a promissory note and invest in that manner; that
    is a form of borrowing, and borrowing of any type is strictly prohibited from
    an `IRA`.


    An individual or a married couple may also make traditional nondeductible `IRA`
    contributions up to the same specified annual amount as those of a traditional
    deductible `IRA`. But there are no complex rules or `AGI` limitations associated
    with nondeductible traditional `IRA` contributions. If you are a high-income wage
    earner and cannot otherwise contribute to a `Roth IRA`, you should consider contributing
    to a nondeductible `IRA`. Note, however, that you should do this only after fully
    maximizing whatever contributions you can make to an employer-sponsored plan,
    because those contributions are fully deductible from your taxable income without
    regard to how much you earn.


    For example, assume that you are making $200,000 annually and that your employer
    offers a `Section 401(k)` plan. Because you make too much money, you are prohibited
    from deducting your contributions to a traditional `IRA`. Therefore, you should
    first contribute as much of your salary as you can afford and is permitted under
    law on a pretax basis to your employer’s `Section 401(k)` plan. You should then
    make a contribution to a traditional `IRA`—in this case, a traditional nondeductible
    `IRA`—even though you cannot deduct the contribution in the current year.


    A second option to consider in the event that you cannot make a deductible contribution
    to a traditional `IRA` is to make this same contribution to a `Roth IRA`. The
    `Roth IRA` was introduced in 1997 and for the most part is still an extremely
    underutilized personal-savings retirement plan. It does have its own annual `AGI`
    contribution limits, meaning that very high-income wage earners (like the taxpayer
    in the previous example) cannot contribute. For most of us, however, a `Roth IRA`
    is an effective personal retirement tool if you do not distribute the funds you
    put into it until at least five years after its establishment and are at least
    59.5 years old. Why? Because if you meet these requirements (a qualified distribution),
    the withdrawal made from the `Roth IRA` is completely income-tax free. In addition,
    unlike with either form of traditional `IRA`, you can make contributions to a
    `Roth IRA` after you have reached the age of 70 and 6 months, meaning that throughout
    your retirement, assuming you are within the `AGI` limits, you may continue to
    accumulate wealth.


    The major disadvantage of the `Roth IRA` is that your annual contributions are
    never income-tax deductible, meaning you cannot deduct those contributions on
    your income-tax return. But in exchange for this disadvantageous tax treatment
    going in, distributions from a `Roth IRA` that has been owned for more than five
    years are taxed extremely favorably going out. Specifically, not only are the
    earnings generated from `Roth IRA` investments income-tax free at the time of
    distribution, but so are the contributions. This is not the case with the traditional
    deductible `IRA`, in which only the earnings, not the contributions, are income-tax
    free.'
  raw: '### Personal Savings Plans


    If you wish to supplement the retirement savings you are accumulating in an employer-sponsored
    retirement plan, you may want to consider allocating additional money into either
    a tax-deferred or a taxable personal savings plan. Tax-deferred personal savings
    plans include the traditional deductible IRA, the traditional nondeductible IRA,
    and the Roth IRA (although qualifying Roth IRA distributions are actually tax-free).
    There are also rollover IRAs, which are used as receptacles for lump-sum distributions
    from employer-sponsored (defined-benefit and defined-contribution) retirement
    plans. All these types of IRAs may be established without the assistance of your
    employer, although other types of IRAs—notably the Simplified Employee Pension
    (SEP) IRA and the Savings Incentive Match Plan for Employees (SIMPLE) IRA—must
    be established and contributed to by the employer on behalf of the participating
    employee.


    The traditional deductible IRA is the oldest and best-known type of IRA. The annual
    amount that may be contributed to this type of IRA is established by law, but
    whether this same contribution amount may be deducted on the owner’s income-tax
    return depends on various factors:


    *   If neither spouse is an active participant in an employer-sponsored plan,
    such as a Section 401(k), or if a single taxpayer is not an active participant,
    then contributions to the traditional IRA are deductible without regard to the
    participant’s adjusted gross income (AGI) in the year of contribution.

    *   If one spouse is an active participant in an employer-sponsored plan but the
    other spouse is not—for example, one spouse stays at home—then the nonparticipant
    spouse may deduct contributions to their traditional IRA as long as the couple’s
    AGI is less than a specified annual amount in the year of contribution.

    *   If both spouses are active participants, or if a single taxpayer is an active
    participant in an employer-sponsored plan, then the deduction is phased out if
    their income exceeds a separate, specified annual AGI ranges in the year of contribution.


    The important point to take away from these complex rules is that if you are a
    relatively high-wage earner and participate in a retirement plan offered by your
    employer, you are likely prohibited from deducting your contribution to a traditional
    deductible IRA. As such, you have only two other options to personally save: either
    take advantage of a traditional nondeductible IRA or elect to open a Roth IRA.


    Traditional deductible IRA contributions may be invested in any type of asset,
    with three specific exceptions:


    *   You cannot invest IRA contributions in collectibles such as stamps, coins,
    and antiques.

    *   You cannot invest IRA contributions in life insurance policies (although annuities
    are permitted).

    *   You cannot write yourself a promissory note and invest in that manner; that
    is a form of borrowing, and borrowing of any type is strictly prohibited from
    an IRA.


    An individual or a married couple may also make traditional nondeductible IRA
    contributions up to the same specified annual amount as those of a traditional
    deductible IRA. But there are no complex rules or AGI limitations associated with
    nondeductible traditional IRA contributions. If you are a high-income wage earner
    and cannot otherwise contribute to a Roth IRA, you should consider contributing
    to a nondeductible IRA. Note, however, that you should do this only after fully
    maximizing whatever contributions you can make to an employer-sponsored plan,
    because those contributions are fully deductible from your taxable income without
    regard to how much you earn.


    For example, assume that you are making $200,000 annually and that your employer
    offers a Section 401(k) plan. Because you make too much money, you are prohibited
    from deducting your contributions to a traditional IRA. Therefore, you should
    first contribute as much of your salary as you can afford and is permitted under
    law on a pretax basis to your employer’s Section 401(k) plan. You should then
    make a contribution to a traditional IRA—in this case, a traditional nondeductible
    IRA—even though you cannot deduct the contribution in the current year.


    A second option to consider in the event that you cannot make a deductible contribution
    to a traditional IRA is to make this same contribution to a Roth IRA. The Roth
    IRA was introduced in 1997 and for the most part is still an extremely underutilized
    personal-savings retirement plan. It does have its own annual AGI contribution
    limits, meaning that very high-income wage earners (like the taxpayer in the previous
    example) cannot contribute. For most of us, however, a Roth IRA is an effective
    personal retirement tool if you do not distribute the funds you put into it until
    at least five years after its establishment and are at least 59.5 years old. Why?
    Because if you meet these requirements (a qualified distribution), the withdrawal
    made from the Roth IRA is completely income-tax free . In addition, unlike with
    either form of traditional IRA, you can make contributions to a Roth IRA after
    you have reached the age of 70 and 6 months, meaning that throughout your retirement,
    assuming you are within the AGI limits, you may continue to accumulate wealth.


    The major disadvantage of the Roth IRA is that your annual contributions are never
    income-tax deductible, meaning you cannot deduct those contributions on your income-tax
    return. But in exchange for this disadvantageous tax treatment going in, distributions
    from a Roth IRA that has been owned for more than five years are taxed extremely
    favorably going out. Specifically, not only are the earnings generated from Roth
    IRA investments income-tax free at the time of distribution, but so are the contributions.
    This is not the case with the traditional deductible IRA, in which only the earnings,
    not the contributions, are income-tax free.'
  trans: '

    ### 个人储蓄计划


    如果您希望补充在雇主资助的退休计划中积累的退休储蓄，可以考虑将额外资金分配到递延纳税或应税的个人储蓄计划中。递延纳税个人储蓄计划包括传统的可抵扣`IRA`、传统的不可抵扣`IRA`以及`罗斯
    IRA`（尽管符合条件的`罗斯 IRA`分配实际上是免税的）。此外还有转存`IRA`，用于接收雇主资助（固定收益和固定缴款）退休计划的一次性分配。所有此类`IRA`无需雇主协助即可设立，但其他类型的`IRA`——特别是`简化员工养老金（SEP）IRA`和`员工储蓄激励匹配计划（SIMPLE）IRA`——必须由雇主代表参与员工设立并缴款。


    传统的可抵扣`IRA`是最古老且最广为人知的`IRA`类型。每年可向此类`IRA`缴款的金额由法律设定，但该缴款额是否能在所有人所得税申报表中抵扣，取决于多种因素：


    - 如果配偶双方均未积极参与雇主资助计划（例如`第 401(k)条款`计划），或者单身纳税人并非积极参与者，则向传统`IRA`的缴款可全额抵扣，不受参与者在缴款年度调整后总收入（`AGI`）的影响。

    - 如果配偶一方积极参与雇主资助计划，而另一方未参与（例如一方在家），则未参与方配偶可抵扣其向传统`IRA`的缴款，前提是该夫妇在缴款年度的`AGI`低于指定的年度金额。

    - 如果配偶双方均为积极参与者，或者单身纳税人是雇主资助计划的积极参与者，则当其收入超过缴款年度另行指定的单独年度`AGI`范围时，抵扣额将逐步取消。


    从这些复杂规则中应记住的关键点是，如果您是收入相对较高的工薪阶层，并参与了雇主提供的退休计划，您很可能无法抵扣向传统可抵扣`IRA`的缴款。因此，您只有另外两个个人储蓄选项：利用传统的不可抵扣`IRA`，或选择开设`罗斯
    IRA`。


    传统可抵扣`IRA`的缴款可投资于任何类型的资产，但有三项具体例外：


    - 您不能将`IRA`缴款投资于收藏品，例如邮票、硬币和古董。

    - 您不能将`IRA`缴款投资于人寿保险单（尽管年金是允许的）。

    - 您不能为自己出具本票并以这种方式进行投资；这是一种借贷形式，而任何形式的借贷都严格禁止用于`IRA`。


    个人或已婚夫妇也可向传统的不可抵扣`IRA`缴款，最高金额与传统可抵扣`IRA`指定的年度金额相同。但与不可抵扣的传统`IRA`缴款相关的并无复杂规则或`AGI`限制。如果您是高收入工薪阶层且无法向`罗斯
    IRA`缴款，则应考虑向不可抵扣`IRA`缴款。但请注意，只有在您已最大限度地向雇主资助计划缴款之后才应这样做，因为那些缴款可完全从您的应税收入中扣除，无论您收入多少。


    例如，假设您的年收入为 20 万美元，且您的雇主提供了`第 401(k)条款`计划。由于您收入过高，您无法抵扣向传统`IRA`的缴款。因此，您首先应尽您所能且在法律允许的税前基础上，将尽可能多的薪资缴入雇主的`第
    401(k)条款`计划。然后，您再向传统`IRA`（在本例中为传统的不可抵扣`IRA`）缴款——尽管您不能在当年抵扣该缴款。


    在您无法向传统`IRA`进行可抵扣缴款的情况下，第二个可考虑的选项是将同等金额缴入`罗斯 IRA`。`罗斯 IRA`于 1997 年推出，并且至今在很大程度上仍是一种未被充分利用的个人储蓄退休计划。它有其自身的年度`AGI`缴款限制，这意味着极高收入的工薪阶层（如上一示例中的纳税人）无法缴款。然而，对于我们大多数人来说，如果您在`罗斯
    IRA`设立后至少五年内不提取投入的资金，并且年龄至少达到 59.5 岁，那么`罗斯 IRA`是一种有效的个人退休工具。为什么？因为如果您满足这些要求（合格分配），从`罗斯
    IRA`提取的资金是完全免税的。此外，与任何一种传统`IRA`不同，您可以在年满 70 岁零 6 个月后继续向`罗斯 IRA`缴款，这意味着在整个退休期间，只要您处于`AGI`限制范围内，就可以持续积累财富。


    `罗斯 IRA`的主要缺点是您的年度缴款永远不能从所得税中抵扣，这意味着您无法在所得税申报表中扣除这些缴款。但作为这种初始不利税务处理的交换，对于持有超过五年的`罗斯
    IRA`，其分配在取出时享有极为优惠的税率。具体来说，不仅`罗斯 IRA`投资产生的收益在分配时免税，缴款本金也同样免税。而传统的可抵扣`IRA`并非如此，只有收益（而非缴款本金）是免税的。

    '
- fmt: '### Social Security


    If you want to get into a political discussion quickly with a business colleague
    or friend, just ask them their opinion of the Social Security system. Many people,
    particularly younger individuals, do not believe that Social Security benefits
    will be available for them when they retire. They believe this even though they
    have paid into the system for most—if not all—of their working years. To view
    Social Security in this way is probably a mistake: your ability to receive a benefit
    under the system is a contract between you and the federal government. Thus, despite
    all the political hand-wringing over the Social Security system, Congress is likely
    to do whatever it takes to shore up the system and make good on its part of the
    contract.


    Who is eligible to receive Social Security retirement payments? Anyone who is
    fully insured under the system. A fully insured individual is any worker who has
    earned 40 quarterly credits (worked for ten years) before their full retirement
    age under the system. A nominal amount of income must be earned each quarter for
    a credit to be awarded, but most of us easily exceed this amount and have no problem
    qualifying for retirement benefits. Once you are fully insured, you—and, usually,
    your surviving spouse—are entitled to Social Security retirement benefits at a
    certain age. Many people think the age at which they will receive retirement benefits
    under the system is 65, but your full retirement age (`FRA`) depends on your date
    of birth. For instance, if you were born in 1962 or after, your `FRA` is age 67,
    not age 65. Table [16-1](#A314864_2_En_16_Chapter.html#Tab1), which is also included
    in Social Security publications, will help you determine your `FRA` and when you
    and your spouse are entitled to unreduced retirement benefits under Social Security.


    **Table 16-1** Social Security Full Retirement Ages


    | FRA for Retired Worker | Year of Birth | FRA for Surviving Spouse |

    | :--- | :--- | :--- |

    | 65 | Before 1938 | 65 |

    | 65 and 2 months | 1938 | 65 |

    | 65 and 4 months | 1939 | 65 |

    | 65 and 6 months | 1940 | 65 and 2 months |

    | 65 and 8 months | 1941 | 65 and 4 months |

    | 65 and 10 months | 1942 | 65 and 6 months |

    | 66 | 1943 | 65 and 8 months |

    | 66 | 1944 | 65 and 10 months |

    | 66 | 1945–54 | 66 |

    | 66 and 2 months | 1955 | 66 |

    | 66 and 4 months | 1956 | 66 |

    | 66 and 6 months | 1957 | 66 and 2 months |

    | 66 and 8 months | 1958 | 66 and 4 months |

    | 66 and 10 months | 1959 | 66 and 6 months |

    | 67 | 1960 | 66 and 8 months |

    | 67 | 1961 | 66 and 10 months |

    | 67 | 1962 and after | 67 |


    The third column of the table shows the `FRA` for the surviving spouse when they
    are entitled to retirement benefits from your employment record. It is also possible
    for the spouse to be entitled to retirement benefits as a result of their own
    employment and earned credits under the system. In that case, the spouse is entitled
    to the greater of the retirement benefits computed under your employment record
    or those determined using their own employment history.


    Unlike Medicare, it is also possible for a retired worker under the Social Security
    system to receive retirement benefits before age 65 or the otherwise applicable
    `FRA`. If you are fully insured, you may elect to receive permanently reduced
    benefits as early as the first full month after your 62nd birthday, regardless
    of your date of birth. Whether you should elect to do so is the subject of the
    next section of this chapter.


    ## When Should I Elect to Begin Receiving Social Security Retirement Benefits?


    According to Social Security Administration figures, approximately 70 percent
    of all beneficiaries are collecting reduced benefits because of early retirement.
    Is this the correct decision?


    The choice to receive Social Security retirement benefits early is a complex one
    and should take into account several factors. Certainly, if you are in poor health
    at age 62 or have an unfavorable family history with regard to your expected future
    health, it is prudent to elect to receive Social Security benefits early. Given
    a number of reasonable assumptions, the break-even point between making an early
    election and delaying the receipt of benefits until you reach your `FRA` under
    the system is approximately age 81 or later. As a result, if you believe you will
    live beyond age 81, you are generally better off delaying the receipt of Social
    Security retirement benefits until your `FRA`.


    Individuals who are fortunate enough to decide between the early receipt of Social
    Security benefits vs. delaying the receipt of those benefits may be categorized
    into two groups: those who can or want to continue working after age 62, and those
    who do not need to work after age 62 because they can fund their retirement years
    through personal retirement savings and/or an employer-sponsored retirement plan.
    If you plan to continue working after age 62, you need to be aware that your Social
    Security benefits will be reduced by $1 for every $2 received in excess of a specified
    amount (for example, $17,040 annually in 2018). As a result, if you anticipate
    making more than this amount at whatever post-retirement job you decide to take,
    it will prove beneficial for you to delay the collection of your benefits until
    your `FRA`, when no benefit penalty exists.


    The actual percentage reduction suffered by a 62-year-old recipient depends on
    their date of birth and how far they are from the `FRA`. Benefits are reduced
    on a sliding scale, ranging from a total of 20 percent for individuals born before
    1938 who retired at age 62 to 30 percent for individuals born in 1960 or later
    who elect to take early benefits. For more information, you may wish to consult
    the reference table found on the US Social Security Administration web site (`www.ssa.gov`),
    which lists the percentage reduction you will suffer for early receipt of benefits,
    depending on your date of birth.


    Your other option is to postpone collecting benefits until you turn 70. If you
    do so and reach your `FRA` on or after 2018, the increase in retirement benefits
    for each month of delay is two-thirds of 1 percent of your otherwise-payable normal
    retirement benefit. This works out to an increase in benefits of 6 to 8 percent
    for each year you delay—a relatively reasonable rate of annual return, particularly
    in a volatile stock market.


    How should you decide what to do? Should you take benefits early at age 62, delay
    until your `FRA` under the system, or postpone your receipt of benefits until
    you are 70? Perhaps the simplest way to make this decision is to ignore alternative
    uses of the money and plot the percentage reductions and increases based on your
    monthly retirement benefit payable at `FRA`. You can determine the amount of your
    otherwise-payable monthly benefit by contacting the `SSA` or referencing the projected
    payment estimates found on the statement at the `SSA` website, `www.ssa.gov/`.
    Then run the numbers on a spreadsheet and determine which decision gives you the
    maximum gross benefit over your anticipated life expectancy. When you apply actuarial
    life-expectancy tables, if you live exactly as long as the tables predict, you
    should have the same amount of gross benefit, regardless of which option you choose.'
  raw: '### Social Security


    If you want to get into a political discussion quickly with a business colleague
    or friend, just ask them their opinion of the Social Security system. Many people,
    particularly younger individuals, do not believe that Social Security benefits
    will be available for them when they retire. They believe this even though they
    have paid into the system for most—if not all—of their working years. To view
    Social Security in this way is probably a mistake: your ability to receive a benefit
    under the system is a contract between you and the federal government. Thus, despite
    all the political hand-wringing over the Social Security system, Congress is likely
    to do whatever it takes to shore up the system and make good on its part of the
    contract.


    Who is eligible to receive Social Security retirement payments? Anyone who is
    fully insured under the system. A fully insured individual is any worker who has
    earned 40 quarterly credits (worked for ten years) before their full retirement
    age under the system. A nominal amount of income must be earned each quarter for
    a credit to be awarded, but most of us easily exceed this amount and have no problem
    qualifying for retirement benefits. Once you are fully insured, you—and, usually,
    your surviving spouse—are entitled to Social Security retirement benefits at a
    certain age. Many people think the age at which they will receive retirement benefits
    under the system is 65, but your full retirement age (FRA) depends on your date
    of birth. For instance, if you were born in 1962 or after, your FRA is age 67,
    not age 65\. Table [16-1](#A314864_2_En_16_Chapter.html#Tab1), which is also included
    in Social Security publications, will help you determine your FRA and when you
    and your spouse are entitled to unreduced retirement benefits under Social Security.


    Table 16-1.


    Social Security Full Retirement Ages


    | FRA for Retired Worker | Year of Birth | FRA for Surviving Spouse |

    | --- | --- | --- |

    | 65 | Before 1938 | 65 |

    | 65 and 2 months | 1938 | 65 |

    | 65 and 4 months | 1939 | 65 |

    | 65 and 6 months | 1940 | 65 and 2 months |

    | 65 and 8 months | 1941 | 65 and 4 months |

    | 65 and 10 months | 1942 | 65 and 6 months |

    | 66 | 1943 | 65 and 8 months |

    | 66 | 1944 | 65 and 10 months |

    | 66 | 1945–54 | 66 |

    | 66 and 2 months | 1955 | 66 |

    | 66 and 4 months | 1956 | 66 |

    | 66 and 6 months | 1957 | 66 and 2 months |

    | 66 and 8 months | 1958 | 66 and 4 months |

    | 66 and 10 months | 1959 | 66 and 6 months |

    | 67 | 1960 | 66 and 8 months |

    | 67 | 1961 | 66 and 10 months |

    | 67 | 1962 and after | 67 |


    The third column of the table shows the FRA for the surviving spouse when they
    are entitled to retirement benefits from your employment record. It is also possible
    for the spouse to be entitled to retirement benefits as a result of their own
    employment and earned credits under the system. In that case, the spouse is entitled
    to the greater of the retirement benefits computed under your employment record
    or those determined using their own employment history.


    Unlike Medicare, it is also possible for a retired worker under the Social Security
    system to receive retirement benefits before age 65 or the otherwise applicable
    FRA . If you are fully insured, you may elect to receive permanently reduced benefits
    as early as the first full month after your 62nd birthday, regardless of your
    date of birth. Whether you should elect to do so is the subject of the next section
    of this chapter.


    ## When Should I Elect to Begin Receiving Social Security Retirement Benefits?


    According to Social Security Administration figures, approximately 70 percent
    of all beneficiaries are collecting reduced benefits because of early retirement.
    Is this the correct decision?


    The choice to receive Social Security retirement benefits early is a complex one
    and should take into account several factors. Certainly, if you are in poor health
    at age 62 or have an unfavorable family history with regard to your expected future
    health, it is prudent to elect to receive Social Security benefits early. Given
    a number of reasonable assumptions, the break-even point between making an early
    election and delaying the receipt of benefits until you reach your FRA under the
    system is approximately age 81 or later. As a result, if you believe you will
    live beyond age 81, you are generally better off delaying the receipt of Social
    Security retirement benefits until your FRA.


    Individuals who are fortunate enough to decide between the early receipt of Social
    Security benefits vs. delaying the receipt of those benefits may be categorized
    into two groups: those who can or want to continue working after age 62, and those
    who do not need to work after age 62 because they can fund their retirement years
    through personal retirement savings and/or an employer-sponsored retirement plan.
    If you plan to continue working after age 62, you need to be aware that your Social
    Security benefits will be reduced by $1 for every $2 received in excess of a specified
    amount (for example, $17,040 annually in 2018). As a result, if you anticipate
    making more than this amount at whatever post-retirement job you decide to take,
    it will prove beneficial for you to delay the collection of your benefits until
    your FRA, when no benefit penalty exists.


    The actual percentage reduction suffered by a 62-year-old recipient depends on
    their date of birth and how far they are from the FRA. Benefits are reduced on
    a sliding scale, ranging from a total of 20 percent for individuals born before
    1938 who retired at age 62 to 30 percent for individuals born in 1960 or later
    who elect to take early benefits. For more information, you may wish to consult
    the reference table found on the US Social Security Administration web site (
    [`www.ssa.gov`](http://www.ssa.gov) ), which lists the percentage reduction you
    will suffer for early receipt of benefits, depending on your date of birth.


    Your other option is to postpone collecting benefits until you turn 70. If you
    do so and reach your FRA on or after 2018, the increase in retirement benefits
    for each month of delay is two-thirds of 1 percent of your otherwise-payable normal
    retirement benefit. This works out to an increase in benefits of 6 to 8 percent
    for each year you delay—a relatively reasonable rate of annual return, particularly
    in a volatile stock market.


    How should you decide what to do? Should you take benefits early at age 62, delay
    until your FRA under the system, or postpone your receipt of benefits until you
    are 70? Perhaps the simplest way to make this decision is to ignore alternative
    uses of the money and plot the percentage reductions and increases based on your
    monthly retirement benefit payable at FRA. You can determine the amount of your
    otherwise-payable monthly benefit by contacting the SSA or referencing the projected
    payment estimates found on the statement at the SSA website, [`www.ssa.gov/`](http://www.ssa.gov/)
    . Then run the numbers on a spreadsheet and determine which decision gives you
    the maximum gross benefit over your anticipated life expectancy. When you apply
    actuarial life-expectancy tables, if you live exactly as long as the tables predict,
    you should have the same amount of gross benefit, regardless of which option you
    choose.'
  trans: '

    ### 社会保障


    如果你想快速与商业伙伴或朋友展开一场政治讨论，只需问问他们对社会保障体系的看法。许多人，尤其是年轻人，不相信自己退休时能领到社会保障福利。尽管他们在大部分（如果不是全部）工作年限中都向该体系缴了费，他们仍然持这种看法。这样看待社会保障很可能是个错误：你从该体系领取福利的能力，是你与联邦政府之间的一份契约。因此，尽管政界对社会保障体系忧心忡忡，国会仍可能不遗余力地巩固该体系并履行这份契约中属于它的部分。


    谁有资格领取社会保障退休金？任何在该体系下获得完全保险的人。完全保险的个体是指，在达到该体系规定的完全退休年龄之前，已累积满 40 个季度积分（即工作满十年）的劳动者。每个季度必须赚取名义上的一定收入才能获得积分，但大多数人轻松超过这个数额，并且符合领取退休福利的资格没有任何问题。一旦你获得完全保险，你——通常还有你的未亡配偶——就有权在特定年龄领取社会保障退休福利。许多人认为该体系下领取退休福利的年龄是
    65 岁，但你的完全退休年龄（`FRA`）取决于你的出生年份。例如，如果你出生于 1962 年或之后，你的`FRA`是 67 岁，而不是 65 岁。表 16-1（同样收录于社会保障出版物中）将帮助你确定你的`FRA`，以及你与配偶有权领取未扣减社会保障退休福利的年龄。


    **表 16-1** 社会保障完全退休年龄


    | 退休职工的 FRA | 出生年份 | 未亡配偶的 FRA |

    | :--- | :--- | :--- |

    | 65 岁 | 1938 年之前 | 65 岁 |

    | 65 岁零 2 个月 | 1938 年 | 65 岁 |

    | 65 岁零 4 个月 | 1939 年 | 65 岁 |

    | 65 岁零 6 个月 | 1940 年 | 65 岁零 2 个月 |

    | 65 岁零 8 个月 | 1941 年 | 65 岁零 4 个月 |

    | 65 岁零 10 个月 | 1942 年 | 65 岁零 6 个月 |

    | 66 岁 | 1943 年 | 65 岁零 8 个月 |

    | 66 岁 | 1944 年 | 65 岁零 10 个月 |

    | 66 岁 | 1945–1954 年 | 66 岁 |

    | 66 岁零 2 个月 | 1955 年 | 66 岁 |

    | 66 岁零 4 个月 | 1956 年 | 66 岁 |

    | 66 岁零 6 个月 | 1957 年 | 66 岁零 2 个月 |

    | 66 岁零 8 个月 | 1958 年 | 66 岁零 4 个月 |

    | 66 岁零 10 个月 | 1959 年 | 66 岁零 6 个月 |

    | 67 岁 | 1960 年 | 66 岁零 8 个月 |

    | 67 岁 | 1961 年 | 66 岁零 10 个月 |

    | 67 岁 | 1962 年及之后 | 67 岁 |


    表格的第三列显示了当未亡配偶有权根据你的工作记录领取退休福利时的`FRA`。配偶也有可能因自身就业并根据该体系累积的积分而有权领取退休福利。在这种情况下，配偶有权领取根据你的工作记录计算出的退休福利，与根据其自身就业记录确定的那笔福利中金额较大的一笔。


    与医疗保险不同，社会保障体系下的退休职工也有可能在 65 岁或其他适用的`FRA`之前领取退休福利。如果你是完全保险，无论你的出生日期为何，你最早可以选择在你
    62 岁生日后的第一个完整月份开始领取永久性扣减的福利。是否应该选择这么做，是本章下一节的主题。


    ## 我应该在何时选择开始领取社会保障退休福利？


    根据社会保障管理局的数据，大约 70%的受益人因提前退休而领取的是扣减后的福利。这个决定正确吗？


    选择提前领取社会保障退休福利是一个复杂的问题，需要考虑多个因素。当然，如果你在 62 岁时健康状况不佳，或者家族病史对未来健康状况预期不利，那么选择提前领取社会保障福利是明智的。基于若干合理假设，选择提前领取与将领取福利延迟至该体系下的`FRA`之间的盈亏平衡点大约在
    81 岁或之后。因此，如果你认为自己会活过 81 岁，那么通常最好还是将社会保障退休福利的领取推迟至你的`FRA`。


    幸运地需要在提前领取社会保障福利与延迟领取之间做抉择的人，可以分为两类：一类是能在 62 岁后继续工作或想要继续工作的人，另一类是 62 岁后无需工作、因为他们可以通过个人退休储蓄和/或雇主资助的退休计划来资助退休生活的人。如果你计划在
    62 岁后继续工作，你需要知道，你的社会保障福利将按每超出规定数额（例如，2018 年为每年 17,040 美元）2 美元，减少 1 美元福利的比例被扣减。因此，如果你预计在退休后的任何工作中收入会超过这个数额，那么将福利领取延迟至没有福利罚款的`FRA`对你是有利的。


    一位 62 岁领取者实际遭受的福利扣减百分比取决于其出生日期，以及他距`FRA`有多远。福利按照一个滑动比例进行扣减，范围从 1938 年之前出生、62 岁退休的个人总共扣减
    20%，到 1960 年或之后出生、选择提前领取福利的个人扣减 30%。如需更多信息，你可以查阅美国社会保障管理局网站（`www.ssa.gov`）上的参考表，该表列出了根据你的出生日期，因提前领取福利将遭受的扣减百分比。


    你的另一个选择是将领取福利推迟到 70 岁。如果你这样做，并且在 2018 年或之后达到你的`FRA`，那么每延迟一个月，你的退休福利将增加你本应领取的正常退休福利的
    1%的三分之二。这相当于每延迟一年，福利增加 6%到 8%——这是一个相对合理的年回报率，尤其是在动荡的股市中。


    你应该如何决定怎么做？你该在 62 岁提前领取福利，还是推迟到该体系下的`FRA`，抑或是将福利领取推迟到 70 岁？做出这个决定最简单的方法，或许是忽略资金的其他用途，并根据你在`FRA`可领取的每月退休福利，绘制出扣减和增加的百分比图。你可以通过联系`SSA`，或参考`SSA`网站（`www.ssa.gov/`）上对账单中显示的预计付款估算，来确定你本应领取的每月福利金额。然后在电子表格上计算这些数字，并确定哪个决定能在你预期的寿命内为你带来最大的总福利。当你应用精算生命预期表时，如果你活得恰好和表格预测的一样长，那么无论你选择哪个选项，你得到的总福利金额应该是一样的。

    '
- fmt: '你需要考虑一个与社会保障退休福利领取相关的因素。对于大多数社会保障受益人来说，福利金是免税的；但对于年收入相对适中的纳税人来说，高达85%的已领取福利金必须作为收入计入联邦所得税。这里适用特殊的阶梯税率门槛。第一个门槛要求将50%的福利金计入收入，第二个门槛则要求计入85%。目前，这两个基于调整后总收入（AGI）的门槛值如下，具体取决于纳税人的申报身份：


    -   单一纳税人：25,000美元和34,000美元

    -   已婚联合申报夫妇：32,000美元和44,000美元

    -   已婚单独申报夫妇：0美元


    在计算社会保障福利税所需的调整后总收入（AGI）时，务必记住，你必须在常规的`AGI`基础上加回你可能拥有的任何免税利息收入。因此，如果退休人员的投资组合主要由市政债券或市政债券共同基金构成，他们在报税时缴纳的税款可能会比投资组合中股票占比较高的退休人员多。这也是退休人员应继续在股票、公司债券以及现金或现金等价物资产类别之间分散投资组合的又一个理由。


    ## 理解雇主资助退休计划的分配选项


    根据计划条款，当员工离职或退休时，雇主资助的退休计划参与者通常有以下四种基本选择：


    -   从计划中一次性领取全额分配款。

    -   从计划中领取年金或其他定期分配款。

    -   将分配款转入个人退休账户（IRA）或新雇主的退休计划。

    -   将累积资金留在原雇主的计划中。


    最后一个选项很少提供，因为大多数提供计划的过往雇主不希望承担持续管理和投资你退休资金的责任。在剩下的三个选项中，如果可行，大多数参与者会选择一次性领取全额分配款。推测其原因，是大多数参与者认为他们至少能和计划受托人一样擅长投资这笔退休资金。然而，实际上，许多人选择一次性领取是因为他们认为自己需要这笔钱。这很不幸，因为考虑到税收递延复利的强大作用，参与者越年轻，将分配款转入个人退休账户（IRA）并继续享受税收递延就越有利。反之，如果你选择一次性领取分配款，你必须先为总额缴纳所得税，然后只能将净额用于个人需求。


    对于即将退休或已退休的参与者来说，选择年金或其他定期分配方式是最常见且最谨慎的做法。选择雇主资助计划中年金选项的主要优势在于，你不可能耗尽计划中的资金。但这并不意味着雇主为你承保了年金。相反，许多雇主在你退休时，会将未来投资业绩和负债的风险转移给保险公司。因此，他们会代表参与者购买一份商业年金，用以支付其退休福利义务。


    许多雇主使用员工的退休金购买符合税收规定的年金，这一事实引发了一个问题：你是否更适合一次性领取分配款并自行购买年金？这不是一个简单的问题，并且是关于在退休中使用年金的另一项单独讨论的主题。但这里提供一些通用指导原则，以帮助你做出决定：


    -   如果你在从大多数雇主资助计划中领取年金时处于已婚状态，根据法律，该计划必须为你的配偶提供至少50%的联合和遗属年金，除非配偶以书面形式放弃遗属年金权。这种对配偶的保护会相应降低你每月的年金支付额，不过也有其他选择可以在确保你获得更高月付额的同时，为配偶提供保障。

    -   如果你自行购买年金，应调查至少包含向遗属支付保证的付款期限选项：例如，带有保底期间的终身年金。这可以确保如果你在保底期间（例如20年）结束前去世，你的遗属将在该期限的剩余时间内领取款项。

    -   如果你需要尽快开始领取年金，可以考虑购买即期固定年金。相反，如果你不是急需用钱，可以考虑购买带有终身保证提领福利附加条款或保证最低收入利益附加条款的低成本可变年金。

    -   尽量不在你的有生之年耗尽年金本金，而是依靠年金基础投资产生的收益生活。这将确保年金账户价值或死亡赔付金中的较高者能够传承给你的继承人。

    -   年金可能很昂贵，因此要尽可能寻找低成本的年金。

    -   如果你所考虑的年金提供的年回报率不高于雇主将为你购买的年金，那么你最好让雇主来提供这项福利。在做出决定前，请向雇主人力资源部门询问其年金的内部回报率。换句话说，他们使用什么假设贴现率来确定你每月年金支付的现值？


    由于越来越多的雇主提供固定缴款退休计划，一次性支付选项可能成为你唯一的分配选择。另一方面，如果你有幸有权从雇主的计划中领取养老金，那么年金支付或其他定期分配方式很可能是你可选的分配方案之一。假设年金支付是可用的，如果你担心与退休相关的长寿风险，你应该仔细考虑这种支付方式的优势。'
  raw: 'You need to consider one other factor with respect to receiving Social Security
    retirement benefits. Benefits are income-tax free for the majority of Social Security
    beneficiaries; but for taxpayers with relatively modest annual incomes, up to
    85 percent of all benefits received must be included as income for federal income-tax
    purposes. Special step-rate thresholds apply. The first of these thresholds requires
    inclusion of 50 percent of all benefits, and the second threshold mandates an
    85 percent inclusion. Currently, these two thresholds of modified AGI are as follows,
    depending on taxpayer filing status:


    *   Single taxpayer: $25,000 and $34,000

    *   Married couple filing jointly: $32,000 and $44,000

    *   Married couple filing separately: $0


    When computing modified AGI for the purposes of Social Security benefit taxation,
    it is important to keep in mind that you must add back to your regular AGI any
    tax-exempt interest income you may have. Thus, a retiree whose investment portfolio
    consists primarily of municipal bonds or municipal bond mutual funds will likely
    pay more when filing their return than a retiree whose portfolio is heavily weighted
    with stocks. This is all the more reason a retiree should continue to diversify
    their portfolio among equities, corporate bonds, and cash or cash-equivalent asset
    classes.


    ## Understanding Distribution Options from an Employer-Sponsored Retirement Plan


    Depending on plan provisions, four basic options are available to a participant
    in an employer-sponsored retirement plan when you terminate employment or retire:


    *   Take a lump-sum distribution from the plan.

    *   Receive an annuity or other periodic distribution from the plan.

    *   Roll over the distribution to an IRA or to your new employer’s retirement
    plan.

    *   Leave the accumulated funds in the employer’s plan.


    This last option is infrequently offered, because most sponsoring, past employers
    do not want the responsibility of continuing to manage and invest your retirement
    monies. Of the three remaining options, most participants choose a lump-sum distribution
    if it is available. Presumably, this is because most participants believe they
    can invest the retirement monies at least as well as the plan trustee. In reality,
    though, many people choose the lump-sum option because they think they need the
    money. This is unfortunate, because, given the power of tax-deferred compounding,
    the younger the participant, the more advantageous it is to roll the distribution
    into an IRA and continue the tax deferral. Alternatively, if you elect to receive
    the distribution in a lump sum, you must first pay income taxes on the total and
    then may use only the net amount for your personal needs.


    The decision to receive an annuity or other periodic distribution option is the
    most common and prudent course of action for a retiring or soon-to-be retired
    participant. The primary advantage of selecting the annuity option from an employer-sponsored
    plan is that you cannot outlive their money from the plan. But this does not mean
    the employer is underwriting the annuity for you. Rather, many employers transfer
    the risk of future investment performance and liability to an insurance company
    at the time that you retire. Thus, they buy a commercial annuity on behalf of
    the participant to fund their retirement payment obligation.


    The fact that many employers purchase a tax-qualified annuity with the employee’s
    retirement monies raises the issue of whether you are better off taking a lump-sum
    distribution and purchasing the annuity yourself. This is not a simple question
    and is the subject of a separate discussion with respect to the use of annuities
    in retirement, but here are some general guidelines to assist you in making this
    decision:


    *   If you are married at the time of taking an annuity payout from most employer-sponsored
    plans, under law, the plan must provide for at least a 50 percent joint and survivor
    annuity for your spouse unless your spouse waives the survivor annuity in writing.
    This protection for your spouse in turn reduces your monthly annuity payment,
    although alternatives can provide for your spouse while also ensuring that your
    monthly payment amount is higher.

    *   If you purchase the annuity yourself, investigate a payment term with at least
    a guarantee of payment to your survivor: for example, a life annuity with a period
    certain. This ensures that if you die before the end of the period (for example,
    20 years), your survivor will receive payments for the remainder of the term.

    *   Consider the purchase of an immediate fixed annuity if you need to begin annuity
    payments as soon as possible. Conversely, if you do not need the money immediately,
    consider a low-cost variable annuity (VA) with a lifetime guarantee withdrawal
    benefit (GWB) rider or guaranteed minimum income benefit (GMIB) rider.

    *   Try not to annuitize the annuity (use up the principal of the annuity) during
    your lifetime, but live off the earnings from the annuity’s underlying investments.
    This will ensure that the greater of the annuity’s account value or death benefit
    will pass on to your heirs.

    *   Annuities can be expensive, so look for as low-cost an annuity as possible.

    *   If the annuity you are considering does not provide as high an annual return
    as the annuity your employer will otherwise purchase for you, you are better off
    letting the employer provide the benefit. Before you make this decision, ask your
    employer’s human resource office what the internal rate of return on their annuity
    will be. In other words, what assumed discount rate is used to determine the present
    value of your monthly annuity payment?


    Because more and more defined-contribution retirement plans are being offered
    by employers, a lump-sum payment option may be your only choice of distribution.
    If, on the other hand, you are fortunate enough to be entitled to a pension from
    your employer’s plan, an annuity payout or other periodic distribution will likely
    be among your distribution options. Assuming an annuity payout is available, you
    should carefully consider the advantages of that payout if you are concerned about
    the longevity risk associated with retirement.'
  trans: '

    你需要考虑一个与社会保障退休福利领取相关的因素。对于大多数社会保障受益人来说，福利金是免税的；但对于年收入相对适中的纳税人来说，高达 85%的已领取福利金必须作为收入计入联邦所得税。这里适用特殊的阶梯税率门槛。第一个门槛要求将
    50%的福利金计入收入，第二个门槛则要求计入 85%。目前，这两个基于调整后总收入（AGI）的门槛值如下，具体取决于纳税人的申报身份：


    -   单一纳税人：25,000 美元和 34,000 美元

    -   已婚联合申报夫妇：32,000 美元和 44,000 美元

    -   已婚单独申报夫妇：0 美元


    在计算社会保障福利税所需的调整后总收入（AGI）时，务必记住，你必须在常规的`AGI`基础上加回你可能拥有的任何免税利息收入。因此，如果退休人员的投资组合主要由市政债券或市政债券共同基金构成，他们在报税时缴纳的税款可能会比投资组合中股票占比较高的退休人员多。这也是退休人员应继续在股票、公司债券以及现金或现金等价物资产类别之间分散投资组合的又一个理由。


    ## 理解雇主资助退休计划的分配选项


    根据计划条款，当员工离职或退休时，雇主资助的退休计划参与者通常有以下四种基本选择：


    -   从计划中一次性领取全额分配款。

    -   从计划中领取年金或其他定期分配款。

    -   将分配款转入个人退休账户（IRA）或新雇主的退休计划。

    -   将累积资金留在原雇主的计划中。


    最后一个选项很少提供，因为大多数提供计划的过往雇主不希望承担持续管理和投资你退休资金的责任。在剩下的三个选项中，如果可行，大多数参与者会选择一次性领取全额分配款。推测其原因，是大多数参与者认为他们至少能和计划受托人一样擅长投资这笔退休资金。然而，实际上，许多人选择一次性领取是因为他们认为自己需要这笔钱。这很不幸，因为考虑到税收递延复利的强大作用，参与者越年轻，将分配款转入个人退休账户（IRA）并继续享受税收递延就越有利。反之，如果你选择一次性领取分配款，你必须先为总额缴纳所得税，然后只能将净额用于个人需求。


    对于即将退休或已退休的参与者来说，选择年金或其他定期分配方式是最常见且最谨慎的做法。选择雇主资助计划中年金选项的主要优势在于，你不可能耗尽计划中的资金。但这并不意味着雇主为你承保了年金。相反，许多雇主在你退休时，会将未来投资业绩和负债的风险转移给保险公司。因此，他们会代表参与者购买一份商业年金，用以支付其退休福利义务。


    许多雇主使用员工的退休金购买符合税收规定的年金，这一事实引发了一个问题：你是否更适合一次性领取分配款并自行购买年金？这不是一个简单的问题，并且是关于在退休中使用年金的另一项单独讨论的主题。但这里提供一些通用指导原则，以帮助你做出决定：


    -   如果你在从大多数雇主资助计划中领取年金时处于已婚状态，根据法律，该计划必须为你的配偶提供至少 50%的联合和遗属年金，除非配偶以书面形式放弃遗属年金权。这种对配偶的保护会相应降低你每月的年金支付额，不过也有其他选择可以在确保你获得更高月付额的同时，为配偶提供保障。

    -   如果你自行购买年金，应调查至少包含向遗属支付保证的付款期限选项：例如，带有保底期间的终身年金。这可以确保如果你在保底期间（例如 20 年）结束前去世，你的遗属将在该期限的剩余时间内领取款项。

    -   如果你需要尽快开始领取年金，可以考虑购买即期固定年金。相反，如果你不是急需用钱，可以考虑购买带有终身保证提领福利附加条款或保证最低收入利益附加条款的低成本可变年金。

    -   尽量不在你的有生之年耗尽年金本金，而是依靠年金基础投资产生的收益生活。这将确保年金账户价值或死亡赔付金中的较高者能够传承给你的继承人。

    -   年金可能很昂贵，因此要尽可能寻找低成本的年金。

    -   如果你所考虑的年金提供的年回报率不高于雇主将为你购买的年金，那么你最好让雇主来提供这项福利。在做出决定前，请向雇主人力资源部门询问其年金的内部回报率。换句话说，他们使用什么假设贴现率来确定你每月年金支付的现值？


    由于越来越多的雇主提供固定缴款退休计划，一次性支付选项可能成为你唯一的分配选择。另一方面，如果你有幸有权从雇主的计划中领取养老金，那么年金支付或其他定期分配方式很可能是你可选的分配方案之一。假设年金支付是可用的，如果你担心与退休相关的长寿风险，你应该仔细考虑这种支付方式的优势。

