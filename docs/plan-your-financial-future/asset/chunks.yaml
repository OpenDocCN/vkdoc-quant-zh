  trans: '

    ### 保险责任 A： dwelling 房屋


    一些房主只根据房屋的公允市场价值来投保，这是一个巨大的错误。实际上，你的保单应覆盖房屋在遭受严重损坏或毁坏时的重建成本，这被称为按重置成本为房屋投保。为了充分享受此类保障的益处，你需要为房屋投保至少相当于其重置成本
    80%的保额。否则，你的房屋很可能只能获得实际现金价值（`ACV`）的赔付，即重置成本减去保险公司根据房屋年龄和状况计算的折旧费。换句话说，如果适用实际现金价值，你只能获得房屋损坏或部分损失金额的一定比例。只要损失金额在保单的保险限额内，全损赔付则不受此限制。


    一些保险公司提供扩展保单，而非保证重置成本保障。扩展保单会支付一个特定限额——通常高于房屋公允市场价值的 25%至 30%——用于重建目的。例如，如果你房屋的公允市场价值是
    50 万美元，扩展保单将支付最高 62.5 万美元（50 万美元乘以 1.25）的重建费用。


    如何确定你房屋的重置成本？通常，当地的建筑商或建筑专家可以提供估算的重建成本。有时，当地房产评估可能有帮助，但要小心：为财产税目的而进行的房产评估可能被低估或高估，这取决于你所在社区的财政收入需求。你也可以上网，在诸如
    [`www.hmfacts.com`](http://www.hmfacts.com) 等网站上获取重置成本的估算值。此外，作为你应与财产及意外险代理人进行的年度保险检查的一部分，请询问代理人他们所显示的你家房屋的重置成本是多少。


    ### 保险责任 B： 其他建筑物


    这第二种房主保险的保额是 dwelling 房屋保险（保险责任 A）的 10%，用于为你房产上的附属建筑投保，例如独立的车库或储物棚。举例来说，如果你的 dwelling
    房屋投保了 50 万美元，你将看到保单中对单独建筑（有时称为 dwelling 延伸保障）的保额为 5 万美元（50 万美元乘以 0.10）。通常，这个金额能提供足够的保障，不过，如果你在主房之外建造了相当规模的建筑物（比如一间客房），你可能需要考虑购买更高额度的保障。


    ### 保险责任 C： 室内财产或个人财产


    这种保障类型为家中所有个人财产提供保险，除非该财产被特别排除或保额受限。保额通常是保险责任 A 的 50%，并且，除非你支付更高的保费并获得个人财产的重置成本保障，否则保单将仅按财产的实际现金价值（或折旧价值）进行赔付。


    特别贵重的物品通常无法在标准的房主保单中得到充分保障。例如，珠宝和皮草如果被盗，通常每件丢失物品的赔付限额不超过 2500 美元。任何价值超过保单规定限额的物品，应通过房主保单的批单，或通过一份称为个人财产浮动保单（`PAF`）的独立保单来获得保障。如果你不清楚个人财产的重置成本，但怀疑其远高于当前的保单限额，请在购买保障前先对财产进行评估。


    浮动保单的优势在于，列明的财产按其评估价值投保损坏或损失，且通常不适用任何免赔额。然而，一旦某件物品通过浮动保单投保，它就不再受到保险责任 C 基本限额的保障。因此，例如，如果你的珠宝评估价为
    10,000 美元（并以此金额“列明”），若珠宝被盗，你不会获得 12,500 美元（10,000 美元加 2,500 美元）的赔付；相反，保障将仅限于 10,000
    美元。


    如果你的房屋被火烧毁，你能记住自己所有的个人财产吗？大多数人都做不到。为此，花些时间和金钱来记录你的财物，并将录像单独保存在个人电脑上，是值得的。把这份录像放在家中的防火保险箱里，再复制一份放在银行保险箱中。你会庆幸自己这么做了！


    ### 保险责任 D： 使用损失


    如果你的房屋因火灾或标准房主保单中列明的其他风险而受损，保险责任 D 会在修缮或重建房屋所需期间支付你的生活开支。通常，金额为保险责任 A 的 30%，或者根据保单类型有时是保险责任
    C 的 30%。你通常希望将此限额与保险责任 A 挂钩，因为这样会导致赔付金额高得多。


    ### 保险责任 E： 个人责任


    保险责任 E 为特定的责任风险提供保障，包括受邀客人在你的房产上受伤的情况，无论受伤发生时你是否在家。如果受伤者并非受邀客人，根据大多数州的法律，你无需承担责任。尽管如此，你获得的责任险保额通常很重要。许多人只为每次事故维持最高
    10 万美元的个人责任限额。然而，在当今诉讼频发的社会，这个数额通常不够，特别是如果你是一名专业人士，比如医生或律师。为了获得额外的补充责任险保障（称为雨伞责任险），许多保险公司要求你在房主保单和汽车保单中，为每次事故维持至少
    30 万美元的基础责任保额。我们将在本章后面讨论获取雨伞险来保护你和家人的可能性。


    ### 保险责任 F： 对他人的医疗费用支付


    这类保障旨在支付非你家庭成员、经你许可进入房屋范围内并受伤的人的医疗费用。对于不在你房屋范围内，但因你家宠物（例如，一只暂时离开房屋范围外出的狗）的行为而受伤的个人，也可能支付其医疗费用。该保障通常限制在每次事故
    1000 美元，但鉴于当今医疗费用不断上涨，看到更高限额（有些高达每次事故 5000 美元）的情况也并不罕见。某些州，如科罗拉多州，现在法律要求对他人的医疗费用支付有一个最低限额。

    '
- fmt: '# Types of Homeowner’s Policies (and the One You Want)


    Although it is important to understand the various types of homeowner’s policies
    and what each insures you against (known as a peril in insurance language), it
    is equally important to know what is not covered. We have already mentioned the
    two most common exclusions: damages caused by flooding or earthquakes. There are
    six other, common exclusions (in other words, when your property is not covered
    against potential loss):


    - If your dwelling is condemned or does not comply with local building codes and
    has to be replaced or destroyed.

    - Losses resulting from power failure or interruption of power from the utility
    company.

    - Losses resulting from neglect by the insured. (If you have not reasonably maintained
    your home and you incur a loss, you are not covered.)

    - Losses caused by war.

    - Losses resulting from a nuclear hazard.

    - Any damage resulting from an intentional act of the insured. (If you burn down
    your house, the insurance company will not cover this loss.)


    Now, let’s mention the perils that are covered under the standard homeowner’s
    (HO) policy. This is where the types of policies diverge—for example, a standard
    `HO-1` policy covers only specified basic perils, whereas an `HO-2` policy extends
    this coverage to additional and specified broad perils.


    Basic perils are losses to your property resulting from the following:


    - Fire

    - Lightning

    - Wind (tornado or hurricane)

    - Hail

    - Riot or civil commotion

    - Aircraft collision

    - Vehicle collision

    - Smoke

    - Vandalism or malicious mischief

    - Explosion

    - Theft

    - Volcanic eruption


    To these basic perils, the broad form of homeowner’s coverage adds losses to your
    property resulting from the following:


    - Falling objects (for example, tree limbs)

    - Weight of ice, snow, or sleet

    - Accidental discharge from a sprinkler, heating, or air-conditioning system

    - Sudden and accidental damage to a hot-water tank or air-conditioning, heating,
    or sprinkler system

    - Freezing of a plumbing, heating, air-conditioning, or sprinkler system

    - Sudden and accidental damage from an artificially generated electrical current
    (for example, an electrical generator)


    As a homeowner, generally, you do not want either an `HO-1` or `HO-2` policy that
    specifies named perils. Rather, you should ask for an `HO-3` type of policy that
    provides for special, or open peril, coverage. Open peril coverage means you are
    protected against all losses (even from unknown perils) unless the cause of that
    loss is specifically excluded under the terms of the policy. In addition, many
    companies offer a rider to an `HO-3` policy (known as an `HO-15` endorsement)
    whereby you can also provide for open peril coverage on all the personal property
    included within your dwelling. Still other companies have combined the `HO-3`
    policy and `HO-15` endorsement into one standard `HO-5` policy. If you can obtain
    an `HO-5` policy in your state, do so, because it provides you with the most protection
    for each premium dollar you expend.


    You should also be aware that many insurance companies that write property insurance
    policies do not call them `HO-1`, `HO-2`, and so on, as developed by the Insurance
    Services Office (`ISO`), but instead market them under their own proprietary names.
    Nonetheless, all homeowner’s policies track the coverage and limitations that
    have been mentioned. If you are in doubt, ask your insurance agent to enumerate
    the types of perils or causes of loss against which you are protected, and then
    check them off from the lists in this chapter.


    If you rent an apartment or home, you should ensure that you have an `HO-4` (renter’s
    insurance) policy. If you are an owner of a condominium or co-op property, an
    `HO-6` policy is preferable.


    If a centuries-old, historic home is destroyed, insurance coverage is often limited.
    This is because the cost to rebuild the home by using new construction materials
    and methods will likely exceed the home’s replacement cost. As such, only a modified
    insurance coverage policy, known as an `HO-8` policy, is available in today’s
    marketplace. If you live in a much older home, you should make sure you have this
    type of homeowner’s policy.


    Table `7-1` lists the types of homeowner’s policies, categorized by the kind and
    extent of losses covered (basic, broad, or open peril).


    **Table 7-1.** Comparing Types of Standard Homeowner’s Policies


    | | `HO-1` | `HO-2` | `HO-3` | `HO-4` | `HO-5` | `HO-6` | `HO-8` |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | Coverage A: Dwelling | Basic | Broad | Open peril | N/A | Open peril | Broad
    | Basic |

    | Coverage B: Other Structures | Basic | Broad | Open peril | N/A | Open peril
    | N/A | Basic |

    | Coverage C: Personal Property | Basic | Broad | Broad* | Broad | Open peril
    | Broad | Basic |

    | Coverage D: Loss of Use | Basic | Broad | Open peril | Broad | Open peril |
    Broad | Basic |


    *Can be combined with an `HO-15` endorsement to provide for open peril coverage
    on all personal property located within the dwelling.


    ## What to Consider When Insuring Your Automobile


    Like homeowner’s insurance, many forms of automobile coverage are available in
    today’s insurance market. However, most types of coverage derive from a standardized
    form of policy known as the personal automobile policy (`PAP`). The `PAP` has
    four general coverages for which it provides protection:


    - Coverage A: personal liability

    - Coverage B: medical payments

    - Coverage C: uninsured motorist coverage

    - Coverage D: physical damage or loss coverage


    Most states have laws that require drivers to obtain a certain amount of personal
    liability insurance. Increasingly, however, these amounts are not generally viewed
    as sufficient. If you have obtained only the state-minimum amount of liability
    insurance, you likely are underinsured. One way to remedy this situation is to
    purchase additional liability insurance as a part of your current policy. But
    another, often-overlooked solution is to purchase an umbrella liability policy
    from the same company that insures your car, your home, or both.'
