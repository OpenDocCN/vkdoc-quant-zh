- fmt: '### Section 529 Savings Plans


    Two types of savings plans are described in Internal Revenue Code Section 529
    (from which the savings plans get their popular name). The first is a qualified
    prepaid tuition plan (`QTP`) that may have been established by your state to assist
    your child financially while they attend college. A `QTP` allows the contributor
    (typically the parent) to prepay tuition at a particular school using today’s
    tuition price. As such, the parent is protected from future increases in the annual
    cost of the child attending college. In addition, the earnings made on the prepaid
    tuition grow income-tax deferred. If the parent withdraws the accumulated contributions
    and earnings in a `QTP` (or a private-savings type of Section 529 plan, which
    we discuss shortly) only for payment of higher-education expenses, the entire
    distribution is free of income tax.


    The problem with a `QTP`, however, is that the child is restricted in choosing
    where they will attend college. For example, the state of Florida may dictate
    that the prepaid tuition feature is valid only if your child attends a publicly
    funded institution in that state. If your child attends a private school in Florida
    or another state, or a public college or university outside Florida, you may not
    be able to use the money accumulated in the `QTP`. This is also the result if
    your child is unfortunate enough to be denied entrance to the qualifying public
    school under the provisions of the state plan. Another problem associated with
    a `QTP` is that most plans cover only tuition, fees, and books at the qualifying
    institution and not room and board.


    As a result of the disadvantages associated with the `QTP`, in 2001 Congress adopted
    a second type of Section 529 plan: the private savings plan. This plan is similar
    to a private investment account, but unlike the `QTP`, a private savings plan
    does not lock in future college tuition payment at today’s prices. Rather, the
    private savings plan affords the contributor the opportunity to earn a rate of
    return on funds invested that hopefully exceeds the annual increase in college
    tuition (currently, averaging 5 to 6 percent annually). Earnings in the account
    grow income-tax free as long as distributions are used to pay college education
    expenses, including room and board. In addition, although contributions to a private
    savings plan are not federal-income-tax deductible, some states permit a state
    income-tax deduction for contributions offered by their state for state residents.
    Generally, however, Section 529 private savings plans are open to investors from
    any state.


    In addition to possible state income-tax deductibility for contributions, another
    major advantage of a Section 529 private savings plan is the significant amount
    that may be contributed to the plan on a one-time basis every five years. In 2018,
    this one-time amount is `$75,000` for a single donor (or five times the annual
    gift-tax exclusion of `$15,000`) and `$150,000` if the contribution is made jointly
    by a married couple. There is also a maximum amount that may be accumulated in
    each of these plans, usually `$300,000`, on behalf of each plan beneficiary. A
    relatively unknown but significant estate-planning technique is that the donor
    may establish a Section 529 private savings plan on behalf of each family member
    beneficiary and exclude as much as `$300,000` per family member from their gross
    estate. This can be achieved even though the donor controls the distribution of
    these funds until the date of their death.


    Another significant advantage of a Section 529 private savings plan is that it
    is funded with your own money. Thus, for federal financial-aid purposes, it is
    counted among parental assets at a much lower percentage when computing the `EFC`
    than if a custodial account was established on behalf of the child. Most private
    savings plans permit you to change the beneficiary of a Section 529 private savings
    plan at any time, as long as the account proceeds are transferred to a member
    of the beneficiary’s family (a sibling, a cousin, a grandparent, or even back
    to the parent). Therefore, you can take money back from a 529 plan, although you
    must then use it only for your own higher education or you will pay taxes plus
    a 10 percent penalty on the distribution. There are no age limits associated with
    the distribution of money from a Section 529 private savings plan, unlike with
    custodial accounts or the Coverdell ESA. Finally, the 2017 TCJA allows for tax-free
    plan distributions, up to a maximum of `$10,000` annually, in payment of K-12
    private school tuition. Previously, before 2018, 529 plan distribution could be
    used only in payment of higher or post-secondary education expenses.


    If this all sounds too good to be true, it isn’t—but Section 529 private savings
    plans have one minor disadvantage. In any Section 529 private savings plan, you
    cannot directly manage the invested money yourself. Instead, you must choose an
    investment manager who then decides where the money is to be invested, just as
    would happen if you were making a contribution to a mutual fund. To minimize the
    effects of this disadvantage, many plans have increased the number of investment
    choices (typically, mutual funds) in which you can invest. Furthermore, states
    have been careful in selecting whom they choose to manage investors’ monies. Usually,
    only major brokerage houses or mutual fund companies are chosen.


    So, what should you look for when selecting among the many choices offered in
    Section 529 private savings plans? Here are among the most important factors:


    - Look for a plan that offers a variety of good investment choices—typically,
    mutual funds. Ask the same questions you would ask before investing in any mutual
    fund, such as what its investment objective is, how much investment risk you will
    assume, and what the fund’s longer-term, risk-adjusted investment performance
    has been.

    - Try to choose a plan with relatively low expenses. Some of this total amount
    depends on the mutual-fund manager in charge of the assets, but the higher the
    fund expenses, the more the manager must beat the market. And remember, the market
    in this instance is the ever-increasing annual cost of attending college.

    - Consider the possible availability of a state income-tax deduction for contributions
    made to the plan. A top-performing fund of another state plan may offset the loss
    of the deduction from not investing in your own state’s plan, but you should at
    least consider the advantage of the possible state income-tax deduction.

    - Approach an investment in a private savings plan as you would an investment
    in any mutual fund. If you like the manager and the funds in the fund family,
    you may wish to invest in the plan of the state where the fund company is responsible
    for managing the plan investments. If not, consider another state’s plan.'
