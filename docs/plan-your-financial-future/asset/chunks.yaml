    # 监控你的进度与生命周期规划


    你审视自身财务进展的频率取决于你的年龄以及为实现财务目标所设定的时间框架。多数情况下，每年审视一次便已足够。这项工作可以寻求专业理财规划师的协助，也可以独立完成。（关于是否需要理财规划师的问题，将在下一章讨论。）如果你选择独立操作，请自问以下问题：


    -   你处于哪个生命周期或生活阶段？你的短期与长期目标与处于相同理财规划周期或阶段的同龄人是否具有代表性？换句话说，你的财务目标现实吗？

    -   在审视期内，这些目标是否始终如一？

    -   你的生活支出是否等于或低于你的收入水平？

    -   在审视期内你存下了多少钱？

    -   就你的储蓄而言，你是否获得了实现目标所需的投资回报率？

    -   你的个人状况或财务状况是否发生了任何变化，导致你需要重新考虑已确立的财务目标的优先级，或是你预期达成这些目标的时间框架？


    人们普遍认为，理财规划存在四个生命周期。尽管一个人从一个生命周期过渡到下一个生命周期并没有严格而快速的年龄界限，但在每个阶段，某些财务目标通常比其它目标更为重要。


    第一个阶段是积累阶段（对大多数消费者而言，年龄在 25 岁至 45 岁之间）。在此阶段，个人通常处于职业生涯的早期到中期，并且常常养育着年幼的孩子。通常，他们的净资产相对较少，债务负担可能较高（通常是由于学生贷款或个人贷款义务）。他们的主要财务目标很可能是减少债务、购买房屋，并开始为子女的高等教育筹措资金。


    理财规划的第二个生命周期是巩固阶段（年龄在 45 岁至 62 岁，或其它通常的退休年龄之间）。在此阶段，个人通常已过职业生涯的中点，并可能接近其收入高峰时期。他们的大部分债务（如果不是全部的话）已经偿清，净资产正在快速增长。他们的子女正在上大学或研究生院，这些费用也已解决或正在支付中。处于生命巩固阶段个人的财务目标可能包括：进行家居改善、实现梦想中的度假、购买豪华汽车或度假屋，以及最大限度地减少所得税。


    第三个生命周期阶段是支出阶段（年龄在 62 岁至 90 岁之间），有时会与第四个阶段（赠与阶段）合并。支出阶段的特点是个人即将退休或处于退休初期。在此阶段，其收入高峰期可能已经结束，从投资角度来看，焦点从增长转向收入。个人的子女可能已开始自己的职业生涯并搬离父母家。处于支出阶段个人的财务目标转向提前退休、拥有充足收入的退休生活，或许还包括创办自己的事业。


    最后，是第四个也是最后一个生命周期阶段——赠与阶段，它与个人的退休岁月紧密相连。多余的资产（如有）可在生前或去世后用于惠及家庭成员。遗产规划在此阶段变得重要，因此一个主要的财务目标是最大限度地减少转移（遗产及赠与）税。该阶段的另一个特点是采取保守的投资方式和提取率，因为担心自己积攒的退休金不够用。


    现在，让我们转向一个经常被问到的问题：我需要一位专业的理财规划师来帮助我掌控财务生活吗？还是可以自己做？这个问题的答案将是下一章的重点。


    # 你需要理财规划师吗？


    通常，个人理财规划过程中的第一个问题是：“我需要帮助吗（即，我是否应该聘请个人理财规划师的服务）？”或者换个说法：“我能自己完成这个过程吗？”对后一个问题的答案有时是“是的”，这仅仅是因为希望避免聘请专业规划师所涉及的预期费用。但这是最好的决定吗？本章将介绍理财规划师的类型、在决定寻求帮助时应向他们提出的问题，以及如果你选择“自己动手”方案时需要考虑的因素。

    '
- fmt: '# A Word About Self-Help


    Now that you know about the basics of the financial-planning process, do you think
    you can do it yourself? Only you can answer that question, but here are several
    important factors to consider as you attempt to do so:


    * Financial planning is a lot like preparing your own income-tax return. As a
    matter of fact, income-tax planning is one of the subjects covered by the `Certified
    Financial Planner` (`CFP`) certification examination, so `CFP` certificants must
    demonstrate competence in that area. Like income-tax planning, financial planning
    is a dynamic process that requires the planner to stay abreast of many laws and
    regulations that may impact the planning result.

    * Retirement income (and other) computations require knowledge and application
    of time value of money (present and future value) principles. Although you can
    learn how to apply these principles with the use of a financial function calculator
    or computer software program, a learning curve is still involved for the average
    consumer.

    * Certain financial planners, like `CFP`s, must comply with a professional code
    of ethics that requires them to act at all times in your exclusive best interest.
    Of course, you will not hesitate to act at all times in your own best interest,
    but without extensive knowledge of the economic, legal, and regulatory environment
    in which we all live and work, you may not be aware of what your best interest
    is.

    * Finally, as with a New Year’s resolution, many individuals vow to get their
    financial life in order, but because of common, everyday pressures, fail to do
    it. Will you be the exception to the rule?


    Assuming you have made the decision to seek the assistance of a professional financial
    planner, the question becomes a matter of when you should seek assistance. That
    question, like so many others in financial planning, has no definitive answer,
    but one determining factor is the complexity of your financial life. Generally,
    the more money people make, the more complicated their financial life is. This
    is certainly true of corporate executives and self-employed individuals. In addition,
    higher-net-worth individuals (such as business owners) are more likely to recognize
    the need to have a financial planner as part of their advisory team.


    Beyond all that, middle-income America is quickly appreciating the need for more
    detailed guidance with respect to their financial lives. As you will learn, the
    two biggest obstacles to a lifetime of wealth accumulation and distribution are
    inflation and taxes. Although the former is a fact of economic life that the average
    Joe (or Jane) can do little to prevent, a professional financial planner can help
    minimize the deteriorating effect of inflation on your overall portfolio return.
    The latter (income taxes) can also be managed with the assistance of a skilled
    professional, such as a `Certified Public Accountant` (`CPA`).


    One significant warning: seeking professional assistance does not absolve you
    of responsibility for your own financial future. It is your financial life, and
    the goals you establish are your financial goals. A financial planner can ideally
    direct you on a path to wealth in the fullest sense of the term, but you must
    still make the necessary decisions with respect to your financial well-being.


    # Types of Financial Planners


    You should seek a financial planner you trust and with whom you can establish
    a rapport. From a compensation standpoint, there are three types of planners in
    today’s marketplace.


    The first type of planner is paid solely by commission from the sale of financial
    products. These products include insurance (usually life insurance), mutual funds,
    stocks and bonds, and fixed and variable annuities. Typically, the commission
    received by the planner is taken off the top of these products and, at least to
    you, is invisible. However, it does add to the cost of the product you are buying.
    Commission-only planners are prevalent at banks, broker/dealers (securities firms),
    and insurance agencies.


    A great deal of controversy exists within the financial-planning profession with
    respect to whether a commission-only planner can be objective. In other words,
    “Does the planner have an inherent conflict of interest?” After all, the more
    the planner sells of a particular product, regardless of whether it is actually
    suitable for your needs, the more money they make. This question has no definitive
    answer (inherently, just because a planner is paid by commission only, that does
    not automatically mean the planner is not acting in your best interest), but it
    is something to consider as you decide which type of planner to work with.


    The second type of planner is a fee-and-commission planner, sometimes referred
    to as a fee-based planner. These planners are paid in two ways. First, for their
    planning activities (an example would be the preparation of a statement of personal
    financial position), the planner charges an hourly or fixed fee. In addition,
    they receive a commission for any products you buy from them, such as mutual funds
    with a service charge or load. Some fee-and-commission planners offer investment
    advisory services based on a percentage of the amount of money they manage for
    you. This fee, known as a `wrap fee` or `advisory fee` in the trade, typically
    ranges from 1 percent to 2.5 percent of the money managed annually. Although arguably
    the fee is not a commission, because it is paid by you to the planner and does
    not come off the top like a product sale, you will likely think of it as constituting
    a commission all the same.


    The third (and rapidly growing) type of planner is a fee-only planner. These planners
    typically do business independently and accept no commissions. Rather, they charge
    an hourly fee for financial-planning advice and, usually, a fixed fee for developing
    a comprehensive financial plan. Like fee-based planners, they also charge an annual
    percentage fee for assets under management (again, 1 to 2.5 percent annually),
    but they do not sell securities and are not normally employed by or associated
    with a broker/dealer. As such, the fee-only planner works only for the client.
    Often, fee-only planners are (or work for) a `Registered Investment Advisor` (`RIA`).
    Historically, this type of planner has tended to work primarily with high-net-worth
    or higher-income clients, but recently these planners are reaching out to more
    middle-income clients.


    As you will see in the list of questions to ask a financial planner provided later
    in this chapter, one of the things you want to know before engaging the services
    of a planner is how they are paid. However, more important than this is your level
    of comfort with the planner and defining the scope or range of services they will
    provide. Many a professional engagement or relationship has been made more difficult
    by not reaching a clear initial understanding of the respective responsibilities
    of the client and the planner. Remember, this is your financial life and future,
    so use the planner as an advisor and not as a substitute decision-maker.'
