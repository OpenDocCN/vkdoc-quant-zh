- fmt: '# Charitable Gift Annuities


    If you want to obtain the same benefits offered by a CRT without having to hire
    an attorney, you may want to establish a charitable gift annuity (CGA), which
    allows you to donate cash or property to a charity in exchange for the charity
    providing you with a lifetime stream of annual income. Like CRAT payments, CGA
    payments are often distributed in a predetermined, fixed amount and thus may cause
    your purchasing power to diminish as inflation rises. However, it is possible
    for the charity to purchase a cost-of-living rider on the annuity so that your
    payments keep pace with inflation.


    Be aware that, as with other charitable transfers, the transfer of assets in exchange
    for a CGA is irrevocable, meaning after you begin to receive benefits, there is
    no turning back. In addition, keep in mind that if you decide to implement a CGA,
    you need to ensure that the present value of your annuity payments is less than
    the present value of the future property that will pass on to the qualified charity.
    If these amounts are equal, or if the present value of your annuity payments exceeds
    the present value of the future property that will pass on to charity, you are
    not entitled to a charitable income-tax deduction. For example, assume that the
    American Diabetes Association has purchased a CGA on your behalf, and you have
    determined that the present value of the annuity payments you receive from this
    CGA is $500,000. The present value of the future property you pass on to the American
    Diabetes Association must exceed $500,000. Otherwise, you are not entitled to
    a charitable income-tax deduction—even if you itemize your deductions.


    ## Hail, Hail to Your Dear Old Alma Mater


    If neither CRTs nor CGAs interest you as vehicles to advance your philanthropic
    endeavors, you may want to consider contributing endowment funds to your alma
    mater through a pooled-income fund (PIF). Such a fund is created and maintained
    by a sponsoring educational institution, which then commingles your contribution
    with those of other donors and invests the sum total on its own behalf. The investments
    made by the institution and fund manager cannot include tax-exempt securities,
    such as municipal bonds, but aside from this special provision, the pooled-income
    fund operates much like a standard mutual fund.


    The mechanics of participating in a pooled-income fund are relatively simple.
    First, you are contacted by your alma mater’s planned-giving office, which explains
    to you the terms and restrictions of the fund. Next, you transfer property (usually
    cash) to the fund, which gives you an income interest in the fund for life, with
    the remainder interest in the cash or property passing to the educational institution.
    Your actual payment to the fund is determined by your pro rata share of the annual
    earnings generated by the fund manager. You are then entitled to a charitable
    income-tax deduction based on the annual return of the fund for your particular
    age and actuarial life expectancy.


    For example, assume that you are 55 and transfer $100,000 in cash to your alma
    mater’s pooled-income fund. The fund, as managed by the university, generates
    an annual return of 6 percent. When consulting the applicable table, you find
    that approximately 33 percent of your original $100,000 transfer will pass to
    your alma mater upon your death. As such, you are entitled to a charitable income-tax
    deduction of $33,000 ($100,000 times 0.33). As long as your AGI in the year of
    contribution does not exceed $55,000 ($33,000 divided by 0.60), you are entitled
    to deduct your entire contribution. If your AGI in the year of contribution is
    more than $55,000, you are entitled to carry over the difference and deduct it
    in the future, up to a maximum period of five years.


    ## Private Foundations


    A private foundation is usually established by an individual or family as either
    a not-for-profit organization (known as an operating foundation) or a charitable
    trust (known as a nonoperating foundation). An operating foundation uses the bulk
    of its income to actively run its own charitable functions, as in the maintenance
    of a museum, library, or historical property. In contrast, a nonoperating foundation
    does not engage in or actively run any charitable activity directly, but rather
    only disburses funds to other charities for their own use.


    Perhaps the best-known private foundation in existence today is the Bill and Melinda
    Gates Foundation, a family foundation whose objective is to “bring innovations
    in health and learning to the global community.” More specifically, the foundation
    is dedicated to caring for individuals in Africa who have been afflicted with
    HIV or AIDS. Categorized as an operating foundation, because Bill and Melinda
    Gates personally engage in and use their own money to further its charitable activities,
    the Bill and Melinda Gates Foundation has also attracted a pledge of $30 billion
    from mega-investor Warren Buffett to assist in its day-to-day operation and stated
    mission.


    Typically, a private foundation is established by the pooling together of a principal
    fund of money—commonly referred to as an endowment—that is subsequently invested.
    Only the investment income generated from the fund—and not the principal—is spent,
    either as disbursements to other charities or to service the charitable works
    of the foundation, leaving the principal to grow. The foundation must not pay
    dividends to its shareholders, although it may pay reasonable compensation for
    services rendered by its directors, officers, and employees. Under current law,
    after a certain period of time, the foundation must make qualifying annual distributions
    totaling at least 5 percent of its net investment assets.


    A major advantage of contributing to a private foundation is that the donor is
    entitled to an income-tax deduction in the year when the contribution is made.
    However, as with the charitable deduction income-tax limitations previously discussed,
    the donor’s tax deduction is generally limited to no more than 30 percent of their
    AGI in the year of contribution if it is a private nonoperating foundation. Additionally,
    the deduction for contributions of appreciated stock or any other type of long-term
    capital gain property is limited to the donor’s cost basis in the stock, which
    cannot exceed 20 percent of their AGI.


    Wealthy donors are primarily interested in establishing private foundations because
    of the considerable flexibility that is afforded to them with respect to the management
    of the foundation’s investment funds. In other words, the donor of a private foundation
    may control the investment and distribution of the foundation’s assets, as well
    as train other family members to eventually manage the wealth that is accumulated
    in the foundation. The donor may also customize the investments of the foundation
    to meet any specific charitable objectives they believe are not being adequately
    addressed by other public or private charities.


    Is the establishment of a private foundation right for you or your family? Unless
    you have substantial funds at your disposal to create and operate the foundation,
    it probably is not. But that does not mean you are precluded from making a contribution
    to such a foundation if you agree with its objectives. If you do decide to make
    a contribution to a private foundation that has been approved by the IRS as a
    qualified charity, you are entitled to a charitable income-tax deduction in the
    year of contribution—although, if a private nonoperating foundation, in a somewhat
    reduced amount than that afforded by a contribution to a public charity.'
