- fmt: '### Public Charities


    A public charity is one that receives broad public support and is not established
    by a private individual. Examples of public charities are the American Red Cross,
    the United Way, the Salvation Army, and the American Heart Association. Public
    charities can also include local churches, as well as hospitals operated by a
    religious order or municipality that are not-for-profit for income-tax purposes.
    In addition, educational institutions are public charities—and they need not serve
    a particular demographic to be considered as such. Given the amount of tuition
    and fees that many pay for higher education, you may not immediately think of
    your alma mater as a qualifying charitable institution, but that is indeed the
    case! It makes no difference whether the college or university is publicly supported
    or privately operated; the educational institution to which contributions are
    made is considered a public charity.


    All public charities afford the donor an income-tax deduction of up to 50 percent
    of your `AGI` in any one tax year (60 percent in the event of cash contributions)
    in 2018-2025. Contributions exceeding the 50 or 60 percent limit are generally
    allowed to be carried forward and deducted for up to five years so long as not
    exceeding the later year’s “ceiling.” However, depending on the type of property
    given to the charity, this percentage amount may be further limited. For instance,
    if you make a gift of appreciated stock to a public charity, you may be limited
    to a deduction of no more than 30 percent of your `AGI` in the year of contribution.
    The word *may* here is emphasized, because the actual deduction you can take depends
    on whether you ultimately choose to deduct the full fair market value of the stock
    or only your cost basis in the stock. There is a trade-off: if you choose to deduct
    the full fair market value of the stock from your taxable income, you are limited
    to a deduction of 30 percent of your `AGI` in the year of contribution. Alternatively,
    if you choose to deduct only your cost basis in the stock, you may deduct up to
    50 percent of your `AGI` (depending on whether this basis equals 50 percent of
    your `AGI` for that year).


    For example, assume that you previously paid $40,000 for 500 shares of XYZ stock.
    The value of these shares has appreciated to $50,000, giving you a potential capital
    gain of $10,000. You wish to give the shares to the Salvation Army in a year in
    which your `AGI` is $90,000. You have two choices:


    *   You can subsequently deduct the appreciated fair market value of the shares
    ($50,000) and deduct $27,000 ($90,000 times 0.30) in the year of contribution.
    You can then carry over the remaining $23,000 of allowable charitable deduction
    ($50,000 less $27,000) to a period not exceeding five years from the date of the
    contribution.

    *   You can deduct your cost basis of $40,000 in the shares in the year of contribution.
    This amount is less than 50 percent of your `AGI` ($90,000), so the full $40,000
    deduction is permitted. But if you make this choice, you are not permitted to
    deduct any additional appreciation with respect to the shares or the remaining
    $10,000 ($50,000 less $40,000).


    In most instances, it is to your benefit to elect the first option, because you
    avoid the capital gains tax that would be imposed on you if you sold the appreciated
    stock rather than gifting it to charity. An exception to this basic rule, however,
    occurs when the gifted stock has not experienced much appreciation from the time
    you bought it until the time you donate it to charity. In such cases, the basis
    election is preferable for income-tax purposes.


    There are also restrictions on the income-tax deduction you may take for any tangible
    personal property, such as a painting, after it is given to charity. These restrictions,
    known as use-related and use-unrelated income-tax rules, are based not only on
    the type of property given, but also on the use the charity makes of the property
    after it is received. According to these rules, if the charity’s use of the property
    matches that for which it was intended, the property can be considered use-related,
    and you may take a deduction for its full fair market value. Nevertheless, the
    30 percent `AGI` limit applies in the year of contribution unless the taxpayer
    elects to deduct only their basis in the donated property. On the other hand,
    if the charity does not use the property in the way it was likely intended, the
    property is considered use-unrelated, and the donor is limited to a total charitable
    deduction of no more than the amount paid for the property. As a further limitation,
    if you are an artist and created a painting yourself before gifting it to charity,
    you are not permitted to take any income-tax deduction whatsoever, save for the
    cost of the materials you expended to create the painting.


    For example, assume that you, as a collector of fine art, gift to a local university
    a painting you purchased. Although the university has an art museum, it intends
    to show the donated painting in its administration building. As a result, the
    university is making use of the painting in a “use-unrelated manner.” Accordingly,
    as the donor, you are limited to a charitable deduction of no more than what you
    paid for the painting. Alternatively, if the university featured the painting
    in its art museum, you would be entitled to a charitable deduction for the current
    fair market value of the painting, because the university featured the painting
    in a use-related manner. Note that if you were the original painter of the painting,
    you would be entitled to a charitable deduction only for the cost of the materials
    you used to create the painting. This is the tax result regardless of the use
    the university made of the painting.


    As the previous discussion makes clear, the tax rules with respect to charitable
    income-tax deductions are extremely complex. As a result, you should make gifts
    to charity only after consulting with a tax advisor or financial planner.'
