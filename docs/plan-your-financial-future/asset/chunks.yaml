    **合格教育机构**：联邦税法中广泛使用的术语，涉及允许纳税人享受特定扣除和抵免。该术语也用于美国教育部管理的学生财政援助项目。它几乎适用于所有经过认证的公立、非营利和营利性高等院校，特别是根据后来重新授权的《1965
    年高等教育法》第四章规定有资格发放财政援助的机构。


    **合格个人住宅信托 (QPRT)**：一种不可撤销信托，通过该信托，委托人将其个人住宅（或度假屋）的所有权转让给他人，但保留在特定期限内居住该住宅的权利。期满后，该住宅的所有权转移给信托受益人。


    ### R


    **拉比信托**：为持有用于资助递延补偿计划的财产而设立的信托，其中预留的资金在雇主破产时需用于偿付雇主的债权人。因此，该信托为代表受益人/公司高管的预留资金实现了所得税递延。


    **房地产投资信托 (REIT)**：一种持有房地产投资组合的投资工具（通常以公开交易信托的形式存在）。


    **已确认**：会计师常用的所得税术语，用于描述因经济事件（如资产出售）而产生的应税收入。


    **可退还的**：通常用于描述一种税收抵免，即纳税人即使很少或没有缴纳应税收入的税款，也能从税务机关获得“退款”。与**不可退还的抵免**相对，后者是指利用该抵免的纳税人不会收到任何付款。


    **可撤销生前信托 (RLT)**：一种重要的遗产规划技术，允许委托人避免去世时的遗嘱认证程序，但仍能控制并享受其生前财产的利益。与**不可撤销信托**相对，后者可能实现转移税节省，但会导致委托人在其有生之年失去对其财产的控制。


    **罗斯 401(k)**：一种相对较新的雇主赞助退休计划，是系列所谓**指定罗斯账户**的一部分，兼具`401(k)`缴款和罗斯账户在分配时的优势。罗斯缴款在缴纳时计入参与者的总收入，但在分配时通常不计入参与者的总收入。


    **罗斯 IRA**：一种个人退休账户，允许在指定限额内，以税后或不可扣除的基础上进行缴款。在满足特定要求的前提下，从`罗斯 IRA`中提取的资金是免税的。`罗斯
    IRA`是为帮助退休储蓄而提供的第二种个人储蓄计划，另一种是传统的可抵扣`IRA`。


    **72 法则**：一个简单的规则，用于估算一笔给定本金或存款价值翻倍所需的时间，方法是用投资回报率除 72。例如，如果投资者实现 8%的税前年复利回报率，则该笔资金大约需要
    9 年时间价值翻倍（72 除以 8 等于 9）。

    '
- fmt: '## S


    Section 529 private savings plan : A form of college savings plan, governed under
    Section 529 of the Internal Revenue Code, whereby the account owner contributes
    cash to the plan for a beneficiary, and the contribution is then invested according
    to the terms of the plan. When the beneficiary attends college, the funds in the
    account plus all the earnings may be used to pay for the beneficiary’s tuition
    and other college expenses income-tax free.


    Special needs trust : A type of trust established by clients who have children
    who are mentally or physically disabled and are entitled to receive supplemental
    Social Security Income (`SSI`) benefits or other types of governmental assistance.
    If structured properly, such a trust may permit the parents to furnish benefits
    to the developmentally disabled child without disqualifying the child from receiving
    governmental assistance.


    Standard homeowner’s (`HO`) policy : A type of homeowner’s insurance policy that
    follows Insurance Services Office (`ISO`) format and is written on an open perils
    basis. It ensures that losses to the home are covered, regardless of the peril
    or cause of the loss, unless specifically excluded under the terms of the policy.


    Stock : An evidence of ownership of a corporation. A major attribute of stock
    ownership is the ability to vote for the Board of Directors of the corporation
    that issued the stock.


    ## T


    Tax Cuts and Jobs Act of 2017 (`TCJA of 2017` or `2017 TCJA`) : A major piece
    of tax legislation signed into law by President Trump on December 22, 2017 with
    an official title, but popularly known as the `TCJA of 2017` or `2017 TCJA`. The
    Act includes major tax changes for individuals and corporations, including the
    lowering of marginal tax rates generally. Most provisions of the law are in effect
    from 2018 through the year 2025, when the Act is scheduled to “sunset,” or expire.


    Tax-qualified annuity : A tax term referring to the purchase of an annuity by
    the sponsor of a qualified retirement plan on behalf of the plan participant.
    Such annuities are characterized by the lack of any tax basis in the plan, thus
    making the entire annuity payment income-taxable to the participant at the time
    of payment or distribution. Contrasted to a nonqualified annuity that includes
    after-tax premium dollars contributed to the annuity product, resulting in a tax
    basis.


    Term insurance : A type of life insurance that is characterized by its temporary
    nature. In other words, for the insured’s beneficiary to receive the insurance
    proceeds or death benefit, the insured must die within the stated term of the
    policy.


    Time value of money : A finance theory that posits a “dollar is worth more today
    than in the future,” given that this dollar can be invested to generate additional
    monies.


    Traditional deductible IRA : An individual retirement account or individual retirement
    annuity under which deductible contributions, up to certain limits, and investment
    earnings are tax deferred. Interest earned and gains received while inside the
    protection of the traditional IRA are free of federal income tax until withdrawn.
    IRAs can also be offered on a nondeductible basis for individuals who cannot qualify
    for a deductible contribution.


    Transfer-on-death (`TOD`) form : A form used by securities firms to specify who
    is to receive the individually titled account upon the owner’s death. The form’s
    primary advantage in estate planning is that it permits the transferred funds
    to pass automatically to the named beneficiary without the necessity of the probate
    process.


    Trust : A legal arrangement whereby property is transferred or set aside on behalf
    of a beneficiary, and the distribution of that property is postponed or delayed
    by the grantor until some point in the future. Used for a wide variety of purposes
    in estate and financial planning, but particularly to pass property to family
    members either during the grantor’s lifetime (inter vivos) or at their death (testamentary).


    Trustee : The legal owner of the property transferred into trust by the grantor.
    The trustee has a legal duty, known as a fiduciary duty, to act in the best interests
    of the trust beneficiary(ies) at all times.


    ## U


    Umbrella liability insurance : An alternative to increasing personal liability
    limits in either an automobile or homeowner’s insurance policy. Generally, the
    umbrella policy has high individual liability limits and can also protect the
    insured from personal risks, such as the risk of libel or slander, that are not
    typically covered under the underlying policies. A necessary part of protection
    planning for high-net-worth individuals.


    ## V


    Variable annuity (`VA`) : A popular form of (typically) pre-retirement insurance
    product whereby the investor turns over to the insurance company a lump sum of
    money in exchange for a variable payment, usually beginning at the time of the
    investor’s retirement. The product also usually features certain guarantees, such
    as a minimum income benefit or percentage amount of annual withdrawal.


    Volatility : A commonly used term to describe the daily movements of the financial
    markets. For example, if the market index averages are significantly different
    today than they were yesterday, the market is said to be extremely volatile.


    ## W


    Wealth replacement trust : A type of irrevocable life insurance trust (`ILIT`)
    that is used to replace the value of property left to a qualified charity at the
    grantor’s death but that would otherwise pass to an heir or family member of the
    grantor. In such trusts, a life insurance policy is purchased on the life of the
    grantor, with a family member named as the beneficiary.'
