    | Universal Life | Cash value accumulation; flexible cost | Permanent | Adjustable
    (may increase) | Flexible with minimum payment | Conservative investor |

    | Variable Life | Cash value accumulation based on investment performance | Permanent
    | Guaranteed minimum (fluctuates) | Level for insured’s lifetime | Risk-tolerant
    investor |

    | Variable Universal Life (VUL) | Features of both variable and universal life
    policies | Permanent | Adjustable with guaranteed minimum | Flexible with minimum
    payment | Risk-tolerant investor |


    Now that we have considered the types of life insurance policies available for
    purchase, let’s move on to choosing an insurance company.'
  trans: '

    ### 现金价值保险的类型


    现金价值保单主要有三种基本类型：传统终身寿险、万能寿险和投资型寿险。第四种类型是投资万能寿险（`VUL`），它结合了万能寿险和投资型寿险的特点。


    传统终身寿险是标准形式的现金价值保险，人寿保险公司已提供多年。其特点是保单存续期内保费固定，同时包含一个以递延纳税方式增长的储蓄部分。该保单初期相对昂贵，除非您持续缴纳保费，否则保单将失效，可能导致您失去保障。此外，在您身故时，受益人只能获得保单应支付的身故保险金，而无法获得累积的现金价值。如果您希望在有生之年动用现金价值或储蓄部分，则必须通过保单贷款或提取的方式进行，而这会相应减少所支付的身故保险金金额。


    其次，万能寿险将“购买定期寿险并投资差额”的概念引向了新方向。是的，您可以将超过纯定期保障部分所收取的保费金额进行投资，以产生额外收益，但您必须投资于保险公司为您选择的工具——这些工具通常是保守型的固定收益产品，例如投资级债券。因此，万能寿险保单产生的收益虽然高于传统终身寿险，但仍落后于投资型寿险保单——后者的主要投资形式是股权（普通股）。万能寿险保单的主要优势在于保费缴纳的灵活性。除保单首年外，保单保费并非固定，也不与所购买的身故保险金额度挂钩。保费会存入一个累积基金，保险公司从中按月扣除死亡成本。只有当累积基金接近零时，才需要缴纳最低保费以维持保单效力。只要投保人持续具备可保资格，还可以增加万能寿险保单的身故保险金。


    第三种现金价值保险是投资型寿险，它与传统终身寿险和万能寿险的主要区别在于：由您（而非保险公司）负责投资选择。投资型寿险保单允许您投资于股票、债券和共同基金的各种组合，并设有子账户，您可以在其中分配资产（类似于可变年金形式的保险产品）。虽然投资型寿险保单应缴的保费是固定的（如传统终身寿险），但身故保险金以及保单子账户内累积的现金价值都可能会增加。最后，`VUL`
    保单通过结合投资选择、递增的身故保障以及灵活缴纳保费的能力，将这一概念又向前推进了一步。


    这些现金价值人寿保险形式中哪一种最好？这几乎总是取决于您对承担投资风险的适应程度。如果您认为自己是一个中等激进或激进的投资者（请记住，与理财规划师合作的一个主要优势是，规划师能帮助您确定自身的风险承受水平），那么投资型寿险或
    `VUL` 保单可能更适合您。如果您对承担投资风险相对不适应，或者不喜欢做投资决策，那么传统终身寿险或万能寿险保单可能更合您的意。


    表 4-1 总结了可用的定期寿险和现金价值保单的类型，以帮助您权衡选项。


    **表 4-1. 人寿保险的类型**


    | 保单类型 | 描述 | 保险需求 | 身故保险金 | 保费结构 | 适合购买人群 |

    | --- | --- | --- | --- | --- | --- |

    | 年度可续期定期寿险 | 纯人寿保险，无现金价值 | 临时 | 固定 | 每年递增 | 资金有限的被保险人 |

    | 均衡保费定期寿险 | 纯人寿保险，无现金价值 | 临时 | 固定 | 在数年内保持均衡，之后递增 | 资金有限的被保险人 |

    | 传统终身寿险 | 累积现金价值；可预测的最高成本 | 永久 | 固定 | 被保险人一生中保持均衡 | 需要可预测储蓄的被保险人 |

    | 万能寿险 | 累积现金价值；灵活的成本 | 永久 | 可调整（可能增加） | 灵活，有最低缴费要求 | 保守型投资者 |

    | 投资型寿险 | 基于投资表现累积现金价值 | 永久 | 保证最低额（会波动） | 被保险人一生中保持均衡 | 风险承受型投资者 |

    | 投资万能寿险 (VUL) | 兼具投资型与万能寿险保单的特点 | 永久 | 可调整，有保证最低额 | 灵活，有最低缴费要求 | 风险承受型投资者 |


    既然我们已经考虑了可供购买的人寿保险保单类型，接下来让我们转向选择保险公司。

