    \ 章 遗产规划 287  \n第 20 章 慈善捐赠 303  \n\n**第七部分：总结个人理财规划流程**  \n第 21 章 收获回报 319  \n\
    \n附录 A：样本数据收集表 321  \n附录 B：样本预算 333  \n附录 C：授权委托书 335  \n附录 D：关于医疗或外科治疗声明及医疗永久授权书\
    \ 341  \n附录 E：样本个人指导信 349  \n术语表 351  \n索引 365  \n关于作者\n\n# 第一部分  \n理财规划流程\n\n\
    ## 1. 理解挑战：启动的必要性\n\n个人理财规划流程既是挑战也是机遇。说挑战，是因为有时需要执行严格的财务计算；说机遇，是因为它能让你有能力增长财富（用理财规划的语言来说，就是你的净资产），而且往往增长显著。本章介绍一种参与个人理财规划的新方法：保护、积累、守护、分配（PADD）流程。更广泛地说，本书深入探讨了这一流程的挑战以及有效参与其中所带来的机遇。\n\
    \n### 财富与 PADD 方法\n\n你需要一开始就明白一件事：这不是一本关于如何快速致富的书（尽管如果你遵循本书的建议，你很可能会变得富有）。相反，这是一本关于如何缓慢而持续地走向富裕的书。\n\
    \n据《韦氏大学词典》定义，“富裕”是指“拥有财富”或变得“极其富足”的状态。这个定义中没有提及实际的金钱，但大多数人如果不富有，就无法变得富裕。换句话说，你拥有的美元数量（无论是在口袋里，还是投资于金融或实物资产）等同于财富。本书试图超越金钱积累的标准定义（或者大多数人听到“有钱”这个词时所想到的），将财富描述为一个成就过程，不仅涉及财务独立，还涉及一种期待未来并对未来感到安心的情感与心理状态。事实上，当我们用“成功”替代“富裕”时，会发现大多数人想要的是一个成功且充实的人生，而这远不止是纯粹的金钱财富！\n\
    \n那么，你该如何获得财富呢？这个问题既有硬性的（金钱方面）答案，也有软性的（心理方面）答案。但可以肯定的是，如果财务状况混乱，就会让你难以坚定地相信自己已经实现了富足的生活。因此，制定一个理财规划来管理未来至关重要。如果你还没有制定这样的计划，甚至还没有思考过如何最好地管理未来，别担心——你并非孤例！美国人向来是不善于规划（且极其善于拖延）的典型，但重要的是要明白：理财规划和财富积累是一场旅程，而非终点！\n\
    \n你需要启动理财规划流程，然后（希望如此）尽可能地坚持下去，无论是否有专业人士的协助。本书旨在帮助你做到这两点——既可作为自助规划指南（因为许多人要么有意识地选择，要么因环境所迫而倾向于自己做规划），也可帮助你在寻求理财规划师帮助时成为一位明智的消费者。此外，本书还向你介绍了一种思考理财规划流程的简单方法：实现终生财富的\
    \ PADD 方法。该方法的步骤如下：\n\n- 保护你的资产。\n- 积累金钱财富。\n- 守护你的财富。\n- 在生前为自身及家人的利益分配这些财富（并在身后为继承人的利益进行分配）。\n\
    \n让我们开始吧！\n"
- fmt: '## Steps in the Financial-Planning Process


    As put forward in the Certified Financial Planner Board of Standards Financial
    Planning Practice Standards, there are six steps in the personal financial-planning
    process:


    1.  Establishing and defining the relationship with the financial-planning client

    2.  Gathering client data and determining goals and expectations

    3.  Determining the client’s financial status by analyzing and evaluating client
    information

    4.  Developing and presenting the financial plan

    5.  Implementing the financial plan

    6.  Monitoring the financial plan


    Although these steps are intended for the professional Certified Financial Planner
    (CFP) certificant, there are several tasks that you, as an individual intent on
    beginning the financial-planning process, should also undertake.


    The first task is to gather your financial and personal records. Appendix A includes
    a formal, detailed data-gathering form and personal financial-planning questionnaire
    to help you with this undertaking. Keeping good personal records has one obvious
    advantage: it lets you know where and how you are currently spending your money.
    In turn, these records will assist you in constructing a budget for your monthly
    income and expenses—a critical money-management tool for most individuals. (We
    talk about budgets shortly.) Record keeping also assists you in determining where
    you are financially today. You can’t begin the journey of personal financial planning
    without knowing your starting point.


    What type of financial and personal records should you keep, and for how long
    should you keep them? In most instances, there is no single answer to these questions,
    because the type and number of records you need depends on personal preference.
    Some of us keep everything (for as far back as we can imagine), whereas others
    try to rid ourselves of paper almost as soon as we receive it. However, documents
    such as copies of insurance policies, brokerage account statements, mortgage statements,
    deeds and leases, notes receivable, and current statements of vested amounts in
    `401(k)` plans or other company-sponsored retirement plans should be kept indefinitely.
    Moreover, it is important to keep personal income-tax returns for at least three
    years.


    No single document can tell you more about your financial life than your annual
    income-tax return. Think about it: this return forces you to not only disclose
    the amount of your income, but also identify the source of that income—an extremely
    important part of the budgeting and financial-planning process. Under law, you
    are required to keep (unless you’re committing fraud) your income-tax return and
    supporting details for only three years from April 15th of any given year. However,
    because of the wealth of information provided by the return and its importance
    as a guide to your financial past, you may wish to consider retaining it for much
    longer.


    Once you have determined what type of financial and personal records you should
    keep, the next step is to determine where to keep them. Again, there is no single
    answer to this question, but I tell my estate-planning clients (for more on wills
    and estate-planning documents, see Chapter `19`) to keep these documents somewhere
    in their home where they can easily be obtained in the event of an emergency.
    The reason that I advise them in this way is to encourage them to consider the
    disadvantages of a safe-deposit box. In addition to the often high fees charged
    for safe-deposit box rentals, many individuals make the mistake of listing only
    their name as a signatory for access to the box. In the event of an unanticipated
    injury or death, no other individual can access the important documents stored
    in it. You should consider instead a locked desk or fireproof case kept in your
    house or apartment for storing all your important records.


    Another critically important task to launch you on the path toward financial independence
    is to specify in writing your long-term (more than ten years), medium-term (five
    to ten years), and short-term (one to five years) financial goals. Be as specific
    as you can with respect to these goals. For example, “to become wealthy” not only
    is hard to quantify for most people but, as mentioned previously, may not even
    mean the accumulation of actual dollars. If monetary wealth is important to you
    (as it is for many people), determine how many dollars you need to accumulate
    in order to satisfy your written financial goals.


    Here are some of the most common financial goals mentioned to financial planners:


    - To retire early or at normal retirement age with an adequate level of income

    - To fund a child’s (or children’s) college education

    - To buy a house or vacation home

    - To make home improvements

    - To take a dream vacation

    - To reduce debt service (for example, to pay off credit cards with an outstanding
    balance)

    - To buy a luxury car

    - To minimize income or transfer (estate) taxes

    - To start my own business


    You may add other objectives to this list, depending on your own personal and
    financial situation, but it is important to recognize that these goals should
    be quantified and monitored. In other words, you should establish a plan to meet
    these goals and then track how you are doing. As with determining an investor’s
    time horizon, it is important to match your goals to a specified time frame and
    categorize them according to a long-term, medium-term, or short-term planning
    period.


    What about the possibility that your goals cannot be achieved with your current
    financial resources? In that event, you have one of three (or a combination of
    three) choices:


    - You can prioritize away the meeting of some financial goals (in other words,
    recognize that only some, but not all, of your specified financial goals are achievable
    in the specified time frame).

    - You can attempt to increase cash inflows (your income potential).

    - You can reduce your cash outflows (adjust your standard of living).


    Until you have determined your financial goals and specified a time frame for
    their achievement, you likely won’t know how to begin planning, which may keep
    you from planning at all!


    ## Determine Where You Are Now


    One of the primary assumptions of the financial-planning and wealth-building process
    is that your net worth (assets minus liabilities) should experience a steady increase
    as you continue to invest. There is no benchmark percentage increase (or dollar
    amount) by which your net worth should grow annually, only the suggestion that
    you should strive for as great a percentage increase as possible given your current
    financial resources. For example, if you are in your peak wage-earning years (typically
    age 45 to 55), you should establish a goal of at least a 10 percent increase in
    your net worth annually. When we apply the Rule of 72 to this increase (72 divided
    by 10), your net worth will double in a period of only 7.2 years.'
