    Let’s look at another example. Assume that you die with a taxable estate of $11.2
    million in 2018 and have made no previous lifetime taxable gifts that operate
    to reduce this amount. The applicable unified transfer tax table indicates that
    the estate-tax liability on this $11.2 million of property is $4,425,800. Because
    you have an allowable credit equal to that same amount, you may reduce your tax
    liability by the allowable credit, resulting in an actual tax due of zero ($4,425,800
    tentative tax liability less the $4,425,800 unified credit amount). When you hear
    estate planners say that you will not pay any estate taxes unless you die with
    property in excess of $11.2 million in 2018 (or the otherwise applicable exemption
    equivalent for the year of your death), what they are really telling you is that
    you qualify for a unified credit that is equal to the estate tax due on $11.2
    million.


    The preceding discussion of the complexities of the estate-tax system should make
    clear that you need to understand how the federal estate-tax system works and
    what measures you may adopt to reduce the amount of your taxable estate at death.
    This is in part why you should contact a financial planner or estate-planning
    attorney if you are currently or expect to be a high-net-worth individual. Nevertheless,
    the more you can educate yourself with respect to the estate- and gift-tax laws,
    the better you will understand the planning techniques you may undertake to minimize
    those taxes.


