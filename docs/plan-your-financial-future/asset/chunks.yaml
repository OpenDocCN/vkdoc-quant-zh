  trans: '

    ### 投资者目标的陈述


    投资者目标的制定与陈述，是我们为您撰写投资策略说明书的**核心输入**，您需要从投资风险与回报的角度，阐明自己的投资目标。在讨论回报目标之前，必须对您自身的风险承受能力进行细致分析。正如我们之前讨论过的，您通常无法准确界定自身的风险承受能力；因此，这正是聘请理财规划师的益处之一——他能够帮助您评估并明确界定您愿意承担的风险水平。


    个人的回报目标可以用百分比来表示，也可以用文字描述。例如，`资本保值`意味着投资者希望维持其投资的购买力——因此，必要的回报率不得低于年通货膨胀率。或者，当投资者希望通过实际资本利得（即远高于年通胀率的回报）来实现投资增长时，`资本增值`就是一个恰当的目标。`当前收益`目标则意味着投资者希望基金经理投资于派息股票或付息债券以产生收入。最后，`总回报`策略意味着投资者旨在通过同时利用资本利得和将当前收益再投资以促进本金未来增长，来提升投资的价值。


    ### 投资约束或限制条件的陈述


    在这一部分，您需要明确您的投资时间范围，即您计划进行投资的时间期限。与此时间范围相伴的是您对资金在不会遭受重大本金损失的情况下可取用的需求（这也被称为`流动性`）。投资期限较长的投资者（例如为退休储蓄的投资者）通常对流动性的需求较低，因而能够承受更多的投资风险。而投资期限较短的投资者（例如已退休的投资者）通常寻求更高的流动性和风险更低的投资，因为损失无法很快得到弥补。


    在制定政策说明书时，您通常需要考虑的其他因素或限制条件包括：当前及预期的宏观经济状况，以及您可能考虑投资的特定经济部门（例如科技行业）。任何既有投资的当前税务状况也应被纳入考量。例如，一个利用个人退休账户（`IRA`）税收递延特性为退休储蓄的人，其投资交易频率可能会高于那些持有应税投资组合（在该组合中，资本利得必须在出售之日确认）的人。


    最后一项经常被纳入的限制条件涵盖了投资者的特殊状况或偏好。您应该在此处说明是否偏好只投资于对社会负责的公司。同样，您也需要对当前或预期的现金流状况进行考量。例如，如果您的目标之一是在较短的特定时间内购买一套度假别墅，那么您就需要投资于流动性相对较高的资产。或者，如果您预计在此期间将获得一笔巨额遗产（从而为投资提供额外资金），您应该说明您希望如何使用这笔资金。


    ### 实现投资者目标与投资资源分配


    尽管典型的投资政策说明书不会指明投资者应购买或出售的具体股票或债券，但它应提供关于应纳入哪些资产类别以及各类别的相对配置比例的指导原则。换言之，投资政策说明书应提供一项资产配置策略。


    根据您的风险承受水平、预期回报率和投资时间范围，您希望投资的资产可能与典型投资者不尽相同。然而，大多数投资政策说明书只使用三类投资资产：


    *   股票

    *   债券

    *   现金或现金等价物（储蓄账户、短期定期存单、货币市场基金以及任何流动性相对较高的资产）


    每一类资产都会被分配投资百分比。


    **注意：**


    有时，第四类被称为另类投资的资产也会被列为一种资产类别。这些是指除股票、债券和现金之外的任何资产（例如黄金或白银）。


    分配投资百分比的方法有很多，其中一些涉及计算机软件。也有几条经验法则。例如，一个常被引用的法则是：用 100 减去您的年龄，得出的百分比应投入股票或股票共同基金投资。剩余部分则在债券与现金或现金等价物之间分配，考虑到现金的相对回报率较低，其配置比例应相对较小。以下是针对风险承受能力中等、处于青年、中年、退休前和退休阶段投资者的四种资产配置示例方案：


    *   青年投资者（25 至 44 岁）：75%股票，20%债券，5%现金或现金等价物

    *   中年投资者（45 至 55 岁）：60%股票，30%债券，10%现金或现金等价物

    *   退休前投资者（55 至 64 岁）：50%股票，35%债券，15%现金或现金等价物

    *   退休投资者（65 岁及以上）：40%股票，40%债券，20%现金或现金等价物


    一旦确定了资产配置流程，您就应该考虑一个资产组合，该组合在您感到舒适的风险水平上，最有可能实现您的财务目标。当您越来越接近实现财务目标时，您应该调整这个资产组合。例如，如果您距离实现目标还有几年时间，本金的安全性就应比本金的增长更为重要；因此，您应该调整资产配置比例，增加短期债券和现金等价物，减少股票。


    资产配置实现了投资组合的多元化，这是降低投资风险的关键。我们将在本章后面部分进一步讨论多元化，但就目前而言，您应该理解，一个深思熟虑的资产配置策略是任何有效投资政策说明书的基石。


    ### 监控投资计划的表现


    政策说明书的起草将有助于您评估投资经理的表现。通常，该说明书应包含一个基准投资组合模型，用以评判经理的表现。例如，如果您选择投资于大盘股（拥有大量已发行公开股票的公司），您很可能希望将经理的表现与标准普尔
    500 股票指数的年度基准回报率进行比较。或者，如果您选择投资于小盘股，则应使用类似股票的基准投资组合，例如罗素 2000 指数。由于基准投资组合设定了客观的表现标准，投资政策说明书便成为了定期审查投资组合和评估投资经理表现的起点。

    '
- fmt: '## The Basics of a Diversified Portfolio


    A diversified portfolio should be diversified in two respects: between asset classes
    and within asset classes. Therefore, in addition to allocating your assets among
    stocks, bonds, and cash equivalents, you need to mix your investments within each
    of these three asset classes. The key to doing this successfully is to identify
    investments that may perform differently under different market conditions. For
    example, you should locate a stock that does not go down (or does not go down
    much) in a declining, or bear, market. The search for a stock that behaves in
    this manner, also known as `correlation`, is not easy; in essence, finding such
    a stock is how portfolio managers earn their money. Investment textbooks available
    at public libraries can tell you outline broadly how this can be done. A word
    of advice, however: leave this to the pros! If you choose to go about trying to
    select lower positively correlated or negatively correlated stocks on your own,
    you will quickly expend a lot of research time and possibly money and probably
    still not pick the stocks correctly.


    Because achieving effective diversification is not easy, you may prefer to purchase
    numerous mutual funds. Mutual funds are a type of professionally managed asset,
    selected by an investment company, that pools money from many investors and invests
    in stocks, bonds, and financial assets. Such a fund makes it easy for the individual
    investor to own a small portion of a great number of investments. However, be
    careful: a mutual fund investment does not necessarily guarantee instant diversification.
    For example, the mutual fund may be investing only in stocks issued by companies
    involved in the same industry (called a `sector fund`). Thus, if you purchase
    a sector mutual fund, you have diversified between asset classes but not within
    asset classes. A mutual fund investing only in the stocks of technology companies
    is not participating in the broader market, which includes the stocks of many
    more types of companies and industries.


    There are also ways to purchase mutual funds that are automatically diversified
    based on your age and life stage. A `life-cycle fund` is a diversified mutual
    fund that automatically shifts toward a more conservative mix of investments (more
    bonds, fewer stocks) as it approaches a particular year in the future, known as
    its target date. Given a considerable boost by pension plan legislation passed
    in 2006, life-cycle funds are frequently used by investors who prefer to hold
    a prepackaged number of investments to meet their financial goal—usually, saving
    for retirement. The managers of life-cycle funds make all decisions with respect
    to the asset allocation, diversification, and rebalancing of the fund. Such funds
    are easy to recognize, because they usually have a target retirement date (the
    year 2030, 2035, 2040, and so on) included in their name.


    ## The Basics of Rebalancing


    Rebalancing is a fundamental aspect of the initial asset-allocation decision and
    is necessary to bring your portfolio back to its original asset mix or percentages.
    Why is this required? Over time, some of your investments and asset classes will
    grow more quickly (or decline more) than other classes, thus deviating from the
    original percentages you specified as a part of your investment policy statement.


    Let''s say the stock market had a "good year" (a year in which the asset values
    of the majority of stocks increased in price). As a result, your initial stock
    allocation of 60 percent has now increased to 75 percent of your total portfolio.
    This also means your percentage allocations to bonds and cash equivalents have
    decreased. You are faced with either selling off some of your stock investments
    or purchasing more investments from the bonds and cash or cash equivalent asset
    classes, assuming that you wish to remain true to the asset allocation you established
    when the investment policy statement was prepared. This is not a bad thing. One
    of the steps in the financial-planning process that often is not done well is
    step 6: the monitoring part of the plan. Portfolio rebalancing is an automatic
    trigger that will assist you in the practical accomplishment of this step.


    How often should you rebalance your portfolio? Like many other questions in financial
    planning and wealth building, this one has no definitive answer. If you have engaged
    the services of an investment advisor or professional financial planner, and a
    separate account has been established to hold your assets, the advisor should
    notify you when it is time to rebalance. Alternatively, if you are proceeding
    on your own, this decision is yours to make, although an annual rebalancing is
    likely prudent. Whatever the time frame, before you rebalance your portfolio,
    consider any transaction fees or income-tax consequences that may result from
    the rebalancing.


    If you have invested in a taxable account and experienced a loss on the value
    of your stocks or bonds, consider selling those assets now and using the loss
    against your income taxes. By doing so, you also avoid one of the biggest mistakes
    of the average investor: refusing to let go! Some securities will never return
    to their original value. Even if they do, think of what you could have made with
    your money in the meantime. The opportunity cost of what you could have done with
    your money—but did not—is rarely considered by the average investor.


    ## Investment Strategies


    The number of investment strategies that may be pursued to build your wealth is
    probably limited only by the constraints of your own imagination and securities
    law, but let''s talk about a few of the most common strategies.'
