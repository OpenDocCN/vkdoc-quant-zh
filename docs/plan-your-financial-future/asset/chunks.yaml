- fmt: '# Cash Flow and Debt Management


    As a matter of financial prudence, you should maintain an emergency or contingency
    fund for unanticipated expenses. This fund should be kept in liquid assets (those
    that may be converted quickly to cash without a significant loss in value) and
    equal in amount to three to six months of expenses. (For example, if your monthly
    expenses average $5,000, you should have a contingency fund of at least $15,000—$5,000
    times 3—in a checking, savings, or money market account or mutual fund.) The size
    of this fund will vary depending on the nature of your employment and the constancy
    (or variability) of your income. A self-employed individual who has no employer
    to provide benefits (such as sick or personal days) to serve as a safety net should
    consider an even larger fund to compensate for lost income.


    An investment trade-off exists, however, when establishing a contingency fund.
    This trade-off is a lower investment rate of return from money kept in more conservative
    cash equivalents. For this reason, you may wish to consider establishing an unsecured
    line of credit with a bank or a home-equity line of credit to substitute as emergency
    fund assets. Be careful: if you do this, you must arrange for the credit line
    before the financial emergency occurs. For example, if you lose your job (for
    whatever reason), the bank is unlikely to extend you any credit. Plus, if you
    are using a credit line as your emergency fund and you need to access the line
    after you have lost your job, you will incur even more debt—probably the last
    thing you need when you are no longer employed.


    Let’s move on to a great tragedy or success story (depending on how you look at
    it)—the amount of debt carried by the average consumer.


    We read a great deal in the media about the negative savings rate of many Americans.
    Is that bad? It depends. There is both good and bad debt. Good debt is generally
    any debt incurred for the purchase of an asset that is likely to appreciate—for
    example, your home or real estate in some parts of this country. More specifically,
    good debt is any interest rate assumed on an obligation where you are paying less
    than what you can make, in terms of investment return, on the asset for which
    you have borrowed the money. Another example (in a rising stock market) is the
    margin interest incurred on the purchase of an individual stock or mutual fund
    from which you can potentially earn a far greater return than what you must pay
    the broker to make the purchase.


    Bad debt is any debt incurred on an asset that is likely to depreciate in value,
    such as a new car or automobile. Another type of bad debt is credit card debt,
    which not only carries extremely high rates of interest (18 to 21 percent annually,
    on average), but also “revolves” from month to month so that it is difficult to
    completely satisfy the obligation. Both automobile and credit card debt share
    the income-tax disadvantage: because they are considered personal or consumer
    debt, the interest paid generally is not deductible and therefore won’t reduce
    your annual income-tax liability.


    So how do you go about reducing bad debt? The obvious answer is not to incur it
    in the first place (by paying cash for a new car, for example), but often this
    is impractical. Here are some tried-and-true debt-reduction techniques:


    - Focus on one type of bad debt to the exclusion of others. For instance, adopt
    a payment schedule and amount to pay off on your credit card debt—and stick to
    it! Consider it another form of paying yourself: if the interest rate on the card
    is 18 percent annually, it is similar to earning 18 percent on an investment.
    (That does not mean, however, that credit cards are a good investment.)

    - Consolidate or restructure your debt. The most common example of this is a college
    or graduate student who consolidates several smaller loans into one larger loan.
    Although this does not eliminate the debt, it often reduces the total amount of
    debt service (interest).

    - Borrow from your cash-value life insurance or `401(k)` plan. The advantage of
    these alternatives is that you are, in essence, borrowing from yourself. But be
    careful: you need to repay this money in a timely manner, or you will reduce the
    amount of your life insurance coverage and retirement plan benefits payable in
    the future. If you die and still owe a balance on the life insurance policy loan,
    the insurance company will pay only the policy proceeds less the outstanding loan
    balance to your named beneficiary or beneficiaries. Similarly, if you leave your
    employer with an outstanding `401(k)` loan balance, the company will likely pay
    only a net amount in your final paycheck or severance payment. Alternatively,
    the company will require payment of the outstanding loan balance before it remits
    your final paycheck.

    - Switch to debit cards. Debit cards work much like ATM machines, because the
    money comes out of your checking account immediately. Although a debit card does
    not stop you from excessive spending, it does make you account for the cash-flow
    consequences much more quickly than would a traditional credit card.


    Finally, it cannot be stressed enough that poor cash-flow and debt management
    can put you on the path to financial ruin. Fortunately, credit counselors and
    some financial planners can assist you in reducing your debt load. If you think
    you have a problem with debt, you probably do! If you can’t solve the problem,
    the wealth-building techniques discussed in this book will take much longer to
    work for you—if they work at all.'
  raw: '## Cash Flow and Debt Management


    As a matter of financial prudence, you should maintain an emergency or contingency
    fund for unanticipated expenses. This fund should be kept in liquid assets (those
    that may be converted quickly to cash without a significant loss in value) and
    equal in amount to three to six months of expenses. (For example, if your monthly
    expenses average $5,000, you should have a contingency fund of at least $15,000—$5,000
    times 3—in a checking, savings, or money market account or mutual fund.) The size
    of this fund will vary depending on the nature of your employment and the constancy
    (or variability) of your income. A self-employed individual who has no employer
    to provide benefits (such as sick or personal days) to serve as a safety net should
    consider an even larger fund to compensate for lost income.


    An investment trade-off exists, however, when establishing a contingency fund.
    This trade-off is a lower investment rate of return from money kept in more conservative
    cash equivalents. For this reason, you may wish to consider establishing an unsecured
    line of credit with a bank or a home-equity line of credit to substitute as emergency
    fund assets. Be careful: if you do this, you must arrange for the credit line
    before the financial emergency occurs. For example, if you lose your job (for
    whatever reason), the bank is unlikely to extend you any credit. Plus, if you
    are using a credit line as your emergency fund and you need to access the line
    after you have lost your job, you will incur even more debt—probably the last
    thing you need when you are no longer employed.


    Let’s move on to a great tragedy or success story (depending on how you look at
    it)—the amount of debt carried by the average consumer.


    We read a great deal in the media about the negative savings rate of many Americans.
    Is that bad? It depends. There is both good and bad debt. Good debt is generally
    any debt incurred for the purchase of an asset that is likely to appreciate—for
    example, your home or real estate in some parts of this country. More specifically,
    good debt is any interest rate assumed on an obligation where you are paying less
    than what you can make, in terms of investment return, on the asset for which
    you have borrowed the money. Another example (in a rising stock market) is the
    margin interest incurred on the purchase of an individual stock or mutual fund
    from which you can potentially earn a far greater return than what you must pay
    the broker to make the purchase.


    Bad debt is any debt incurred on an asset that is likely to depreciate in value,
    such as a new car or automobile. Another type of bad debt is credit card debt,
    which not only carries extremely high rates of interest (18 to 21 percent annually,
    on average), but also “revolves” from month to month so that it is difficult to
    completely satisfy the obligation. Both automobile and credit card debt share
    the income-tax disadvantage: because they are considered personal or consumer
    debt, the interest paid generally is not deductible and therefore won’t reduce
    your annual income-tax liability.


    So how do you go about reducing bad debt? The obvious answer is not to incur it
    in the first place (by paying cash for a new car, for example), but often this
    is impractical. Here are some tried-and-true debt-reduction techniques:


    *   Focus on one type of bad debt to the exclusion of others. For instance, adopt
    a payment schedule and amount to pay off on your credit card debt—and stick to
    it! Consider it another form of paying yourself: if the interest rate on the card
    is 18 percent annually, it is similar to earning 18 percent on an investment.
    (That does not mean, however, that credit cards are a good investment.)

    *   Consolidate or restructure your debt. The most common example of this is a
    college or graduate student who consolidates several smaller loans into one larger
    loan. Although this does not eliminate the debt, it often reduces the total amount
    of debt service (interest).

    *   Borrow from your cash-value life insurance or 401(k) plan. The advantage of
    these alternatives is that you are, in essence, borrowing from yourself. But be
    careful: you need to repay this money in a timely manner, or you will reduce the
    amount of your life insurance coverage and retirement plan benefits payable in
    the future. If you die and still owe a balance on the life insurance policy loan,
    the insurance company will pay only the policy proceeds less the outstanding loan
    balance to your named beneficiary or beneficiaries. Similarly, if you leave your
    employer with an outstanding 401(k) loan balance, the company will likely pay
    only a net amount in your final paycheck or severance payment. Alternatively,
    the company will require payment of the outstanding loan balance before it remits
    your final paycheck.

    *   Switch to debit cards. Debit cards work much like ATM machines, because the
    money comes out of your checking account immediately. Although a debit card does
    not stop you from excessive spending, it does make you account for the cash-flow
    consequences much more quickly than would a traditional credit card.


    Finally, it cannot be stressed enough that poor cash-flow and debt management
    can put you on the path to financial ruin. Fortunately, credit counselors and
    some financial planners can assist you in reducing your debt load. If you think
    you have a problem with debt, you probably do! If you can’t solve the problem,
    the wealth-building techniques discussed in this book will take much longer to
    work for you—if they work at all.'
