    # 利用你的住房为退休提供资金：反向抵押贷款


    你可能熟悉抵押贷款和抵押票据这两个术语，因为你很可能曾签署过此类票据来为购买房屋提供资金。你可能还购买了抵押贷款保险，如果你无法支付至少相当于房屋购买价 20%的首付款，贷款机构通常会要求购买这种保险。如今，老年人可能有了另一种涉及抵押票据的选择：反向抵押贷款，其中“反向”一词源于这样一个事实：不是你向贷款机构付款，而是贷款机构向你付款。


    反向抵押贷款是一种获取住房净值的方式，老年人是最有可能申请此类贷款的人群，因为他们通常在住房中积累了相当可观的净值。通过反向抵押贷款，房主能够继续住在房子里，并且通常会根据房屋所欠本金的百分比，每月从贷款机构收到一笔款项。在某些情况下，这笔款项可能以一次性付款的形式支付，而不是定期每月支付；但如果老年人在退休期间寻求稳定的收入来源，每月付款是更理想的选择。根据法律规定，有资格申请反向抵押贷款的最低年龄是
    62 岁，而且老年人所能获得的贷款金额不能超过贷款时房屋的价值。如果房屋已有未偿还的抵押贷款，则必须先用反向抵押贷款的资金还清。


    以下是关于反向抵押贷款如何运作以及你如何利用它的一个例子。假设你至少 62 岁，并且符合获得 15 万美元反向抵押贷款的其他条件（反向抵押贷款没有收入或健康状况方面的要求）。你的房子上还有一笔
    10 万美元的现有抵押贷款。你将能从反向抵押贷款中获得足够资金来还清现有抵押贷款，并同时获得 5 万美元的现金，这笔钱你可以按任意方式使用。如果你没有原始抵押贷款，反向抵押贷款则更具优势，因为这样你就有整整
    15 万美元可供使用。


    如果你确实符合条件，这听起来是不是好得令人难以置信？在签订反向抵押贷款协议之前，有一些事实需要考虑：


    -   在贷款未偿还期间，无需每月支付贷款款项。然而，当你去世或出售房屋时，贷款必须偿还。如果你在去世时已结婚，通常情况下，贷款直到你的未亡配偶去世后才需要偿还，但届时必须从配偶的遗产中支付，从而减少了随后留给子女或其他继承人的遗产数额。

    -   如同房屋净值贷款一样，你可以通过反向抵押贷款在固定期限内、以终身领取方式或通过信用额度获得资金。如果你通过信用额度获取资金，大多数反向抵押贷款都包含一项增值功能，如果你的房屋价值在多年间升值，你会从中受益（换句话说，你从反向抵押贷款中获得的付款可能会增加）。

    -   通常，你从反向抵押贷款中获得的金额取决于你的年龄。年龄越大，你获得的金额就越多。

    -   反向抵押贷款不会影响你领取社会保障或医疗保险福利，而且这些款项无需纳税，也不被视为应税收入（例如，社会保障税中 50%或 85%的特殊阶梯税率门槛不适用）。

    -   由于反向抵押贷款涉及成交费用，如果你打算在开始收款后的两到三年内出售房屋，则不应签订此协议。在如此短的时间内，你在财务上无法收回成交费用。


    这最后一点涉及你在办理反向抵押贷款前应了解的一个重要考量因素：此类贷款相对昂贵。可能还有其他成本较低的方式来获取住房净值，例如房屋净值贷款或信用额度。在承担反向抵押贷款的弊端之前，应先对这些方式进行研究。


    # 退休期间我需要人寿保险吗？


    当你退休、子女独立后，你可能会想为什么还需要人寿保险。如果你与配偶离婚或分居，情况尤其如此。然而，如果你正考虑取消你的人寿保险单，你可能需要三思，特别是如果你拥有高净值（比如
    1000 万美元或更多），并且正在参与遗产规划和遗产税减免策略。毕竟，人寿保险仍然是支付你去世时可能欠下的任何遗产税以及解决遗产相关的最终费用的有效方式，因为购买保险所支付的保费相比你的遗产将获得的死亡赔偿金而言，是打了相当大的折扣的。


    例如，假设你购买了一份 25 万美元的年度可续期定期人寿保险，并且在保单的保障期内去世。根据多种因素（包括你购买保险时的年龄和健康状况），你为保障所支付的保费可能极低。假设你去世时支付的总保费为
    2.5 万美元，那么你的遗产将获得 22.5 万美元的折价收益（25 万美元减去 2.5 万美元）。此外，你的继承人在收到人寿保险赔款时，将获得总计 25
    万美元的免税美元收益。


    这里需要小心。如果你没有正确设定所有权或安排购买这份 25 万美元的定期人寿保险单，那么该保单的死亡赔偿金将包含在你的总遗产中用于遗产税计算，从而加剧你的遗产税问题。当然，解决这个问题的简单方法是将保单的所有权放在你的配偶或成年子女名下。但如果你这样做，就会增加配偶或子女的总遗产。此外，如果新的保单所有人没有支付保费怎么办？那么保单将会失效，你指定的受益人将失去对你生命的保险保障。安排人寿保险所有权的更好方法是建立一个不可撤销的人寿保险信托（ILIT）。


    如果你在进入退休期时已婚，并且有权领取养老金，你会遇到另一个不同的问题，通常被称为养老金困境。具体来说，根据现行法律，如果你要领取养老金（而非来自第 401(k)计划的
    lump-sum 分配），你必须为配偶提供养老金遗属补偿金。当你这样做时，你自己的年金或养老金支付额就会减少，这可能会影响你未来的现金流。


    例如，假设你 65 岁，已婚，有权从公司养老金（固定收益）计划中每月领取 5000 美元，即每年 6 万美元。这笔金额以个人终身年金的形式支付给你，意味着你去世后，养老金即告终止，这也意味着你的配偶必须弥补
    6 万美元的收入损失。为了避免这种可能性，根据法律规定，你必须选择（除非你的配偶选择放弃）一种联合和遗属支付方式，以便你的配偶在你去世后得到保障。然而，由于你的养老金现在必须分摊到两个人的寿命上，而不是一个人，因此金额会减少，有时甚至高达
    30%。使用本例中的数字，这意味着你的养老金现在变成了 4.2 万美元（6 万美元乘以 0.70）。按照 25 年的预期寿命计算，你牺牲了原本可能支付给你的大约
    45 万美元的终身福利（每年支付差额 1.8 万美元乘以 25 年）。当然，养老金支付额越高，牺牲的福利就越大。

