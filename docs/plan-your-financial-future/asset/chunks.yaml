- fmt: '# The Selection of an Agent for Medical Decisions


    The selection of an agent to make medical decisions on a principal’s behalf should
    be considered even more carefully than the selection of an agent of a `DPOA`.
    Although some individuals may not be overly concerned about their financial affairs
    or who takes over these responsibilities in the event of their incompetency, the
    same probably cannot be said when it comes to their health. It is essential that
    the principal give considerable thought to the individual whom they choose to
    make medical decisions on their behalf. Note, too, that the individual named as
    the power of attorney for a principal’s health need not be the same individual
    named to manage the principal’s money or property.


    ## Planning for Your Own Incompetency


    How should you proceed with planning for your own possible incompetency? Do you
    need one or both of these powers of attorney? Yes, and you preferably should draft
    both documents—even if you do not see the need for a separate last will and testament.
    Statistics show that your chances of becoming incompetent at any given time in
    your life are much greater than your chances of dying, so the importance of writing
    durable powers of attorney cannot be stressed enough. To assist you in the writing
    and implementation of these documents, samples of the general `DPOA` and `DPOAHC`
    are included in Appendixes C and D. Alternatively, you may wish to seek out an
    estate-planning or elder-care law attorney to aid you in the drafting of these
    documents.


    ## Potential Problems with Durable Powers of Attorney


    Durable powers of attorney are a simple and, by and large, effective way to plan
    for incompetency, but their use presents several potential problems. First, if
    the powers are dated (say, more than five years old), the third party to whom
    the power is presented may not recognize its validity. Moreover, this third party
    (typically a financial institution) may ask the principal to execute their own
    durable power of attorney form in order to protect itself from possible liability
    when honoring the power. This is particularly a concern if, between the time the
    original `DPOA` was written and the time the power is needed, the principal becomes
    incompetent. As a general rule, you should ask the third party how long it is
    likely to recognize the validity of a general `DPOA` before executing one.


    The other problem with a `DPOA`, whether related to a principal’s finances or
    to his or her health care, is that, under law, the power terminates on the death
    of the principal. As a result, in cases where minor children depend on the principal
    to act on their behalf, a `DPOA` could present a problem if the principal dies.
    Fortunately, one of the advantages of writing a revocable living trust (`RLT`)
    as part of your estate-planning process is that doing so may serve as an effective
    method of planning for your own incompetency. Specifically, in contrast to a `DPOA`
    or `DPOAHC`, the power of a successor trustee to act on behalf of the grantor
    of an `RLT` does not terminate on the death of the grantor. Instead, a successor
    trustee may continue to act without impunity. In some states, because of this
    feature, many financial institutions prefer to recognize the legal validity of
    an `RLT` rather than that of a `DPOA`.


    ### Example Scenario


    For example, assume that you granted a general `DPOA` on behalf of your oldest
    son ten years ago. Given the datedness of the general `DPOA`, some financial institutions
    may refuse to recognize its validity while you are still alive. Next, let’s say
    you become incompetent while the general `DPOA` is in effect. In this case, your
    son may not be able to act on your behalf as power of attorney. Finally, let’s
    say you die tomorrow. Upon your death, the power of your son to act on your behalf
    will be effectively terminated. All of these problems may be avoided if instead
    of, or in conjunction with, the `DPOA`, you execute a revocable living trust naming
    your son as the successor trustee.


    # Living Wills


    Unlike a `DPOAHC`, which can take effect in a variety of medical situations, a
    living will takes effect only in the event of a terminal illness. In other words,
    you must be in a terminal condition and not expected to recover for a living will
    to go into effect. Due to recent medical advances, hospitals and other types of
    health care facilities can keep terminally ill patients alive for days, weeks,
    or months by allowing a respirator to breathe for them or feeding them intravenously—or
    both. As a result, in most states, you are permitted to execute a living will
    that directs health care facilities to act in one of three ways in the event that
    you become terminally ill:


    - The health care facility must maintain an artificial means of life for you for
    an indeterminate amount of time.

    - The health care facility must immediately discontinue the artificial means of
    life after you are pronounced terminal by two or more physicians.

    - The health care facility must maintain the artificial means of life for a period
    of days—usually seven to ten—at your discretion.


    Many individuals select the third option, but there is no proof that, after spending
    a certain number of days or weeks on life support, you will partially or fully
    recover. Usually the result is the opposite: if you have not recovered after a
    specified period of time, you are probably not going to recover. Unfortunately,
    this makes the execution of a living will that much more difficult, because most
    people do not wish to consider that they may find themselves in a terminal condition.


    ## Differences Between a Living Will and a DPOAHC


    Unlike a `DPOAHC`, which names a substitute decision-maker with respect to health
    care matters, a living will is a personal directive from you to your physician
    specifying how you wish to be treated if you are terminally ill. As a matter of
    procedure, after executing a living will, you should give a copy to your family
    doctor and other physicians. Fortunately, the process of writing a living will
    is made easier by the publication in most states of a preprinted form that you
    can fill out prior to entering the hospital. Early completion of this form permits
    you to discuss with your physician the ramifications and possible unintended consequences
    of your decision.


    Should you execute a living will? If you have not written a `DPOAHC` or medical
    proxy, you should. If you have already written a `DPOAHC`, you should check to
    see whether any living-will provisions are already included in that document.
    Some states permit an individual to dictate in a `DPOAHC` both living-will directions
    and to whom the durable power of attorney for health care should be given. As
    a result, you need complete only one document, instead of two, to address any
    conceivable medical decision that may need to be made in the case of your incompetence.
    Keep in mind, though, that this course of action may make it more difficult for
    your physician to determine what type of medical treatment you would prefer to
    receive. Consequently, it is all the more important (whether you have both a living
    will and a `DPOAHC` or one all-inclusive document) that you also communicate orally
    to your spouse or other close family member what should happen in the event you
    suffer a life-threatening condition.


    A sample copy of a living will—sometimes referred to by its proper name of Declaration
    as to Medical or Surgical Treatment—and a `DPOAHC` are included in Appendix D.'
