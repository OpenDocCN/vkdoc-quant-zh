    # 2010 年《患者保护与平价医疗法案》


    2010 年 3 月 23 日，美国总统巴拉克·奥巴马签署了《患者保护与平价医疗法案》（简称`PPA`），该法案通常也被称为“奥巴马医改”。该法案旨在帮助消费者，尤其是那些已有健康状况的消费者，通过个人保险市场购买医疗保险。因此，团体保险市场基本保持不变。`PPA`最重要的条款包括：


    - 一项强制要求，规定所有个人和特定雇主必须维持或提供最低基本水平的医疗保险，否则将面临罚款。此项强制要求（作为罚款税）的合宪性在美国最高法院审理的*全国独立企业联合会等诉西贝柳斯（卫生与公众服务部部长）等*一案（2012
    年 6 月 28 日裁决）中得到了支持，并于 2014 年 1 月 1 日起生效。关于所有受团体健康保险覆盖的员工自动参保的规定，还需满足特定的选择退出权利，该规定也于
    2014 年 1 月 1 日起生效，并影响到所有雇用超过 50 名全职等效（`FTE`）员工的雇主。即使每周工作 30 小时或以上的兼职员工也计入这 50
    名`FTE`中。如上一章所述，2017 年的`TCJA`废除了针对 2018 年后纳税年度的个人强制令（而非雇主强制令）。

    - 禁止医疗保险等待期超过 90 天，自 2014 年 1 月 1 日起生效。

    - 禁止排除已有健康状况的承保，该规定最初于 2010 年对 19 岁以下儿童生效，随后于 2014 年 1 月 1 日起对所有人生效。

    - 要求所有新签发的保单必须覆盖预防性服务（如癌症筛查），且被保险人无需自付费用，该规定适用于保单计划年度在 2010 年 9 月 23 日或之后开始的保单。

    - 将受抚养人的承保范围延长至 26 岁，适用于保单计划年度在 2010 年 9 月 23 日或之后开始的保单。

    - 自 2013 年 1 月 1 日起，对`FSA`的医疗保健缴款设置每年 2500 美元的上限，此后按通货膨胀指数调整。


    `PPA`还包括若干条款以帮助为医疗改革提供资金。其中最重要的包括：将 65 岁以下纳税人的医疗费用扣除门槛从调整后总收入（`AGI`）的 7.5%提高到
    10%；对年调整后总收入（`MAGI`）超过 20 万美元（单身申报者）和 25 万美元（联合申报者）的纳税人的非劳动收入（如股息和利息）征收新的 3.8%附加税；以及将年总收入超过
    20 万美元（单身申报者）和 25 万美元（联合申报者）的纳税人的医疗保险工资税率从 1.45%提高到 2.35%。所有这些条款均于 2013 年 1 月
    1 日生效，尽管 2017 年的`TCJA`在 2018 纳税年度临时将所有纳税人的医疗费用扣除门槛从`AGI`的 10%降至 7.5%。


    ## 医疗保险单类型


    历史上，医疗保险单基本上只有两种类型：补偿型（或称按服务收费）保单和管理式医疗保单。然而，近年来，在国会立法的推动下，第三种医疗保险类型——健康储蓄账户（`HSA`）——应运而生。前两种保单在雇主提供的保险范围中占主导地位，而`HSA`代表了一种看待个人医疗保险问题的新方式。`HSA`旨在让个人（而非其雇主）成为负责做出与健康相关的财务决策的主体。因此，`HSA`及其前身医疗储蓄账户（`MSA`）都是如今所谓的消费者驱动型医疗保健的一部分。


    ### 补偿型（按服务收费）保单


    真正的补偿型保单不包括免赔额或共付额，因此有时被称为“第一美元保障”（因为它们从产生的第一美元医疗费用开始支付）。随着时间的推移，历史上包含独立的住院、手术和医生费用第一美元保障（通常称为基础医疗保险）的补偿型保单，已演变为综合性大病医疗保险。这种通常被称为大病医疗保单的保险，既包括免赔额和共同保险条款，也包括最高保额限制，通常终身医疗费用至少为
    100 万美元。


    通常，包括大病医疗在内的补偿型保单仅覆盖意外和疾病，不覆盖预防性护理。此外，它们仅根据您所在地区的常规、习惯和合理（`UCR`）费率支付保险金，而非根据实际账单或产生的费用。投保补偿型保单的个人通常由医疗服务提供者向其开具账单，然后向保险公司提交索赔，随后获得费用报销。被保险人在选择医疗服务提供者方面通常拥有完全的自由，这从而推高了被保险人和雇主赞助方的成本。主要出于成本考虑，近年来补偿型保单已基本上被管理式医疗保单所取代。

