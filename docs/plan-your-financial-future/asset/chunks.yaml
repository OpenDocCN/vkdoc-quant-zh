    #### 终身学习抵税额度


    与希望奖学金或美国机会抵税额度（AOTC）不同，终身学习抵税额度（LLC）的适用范围要广泛得多，因此也适用于更多家长。此项抵税额度可用于支付与本科、研究生或专业学位项目相关的学杂费。此外，它不像
    AOTC 那样要求最低注册学分（即学生必须至少半日制注册）。申请终身学习抵税额度的全部条件是：学生产生了相关费用，而您（申请该抵税额度的纳税人）的收入低于相应的逐步取消收入区间。


    每年每个家庭可享受的终身学习抵税额度最高为**2000 美元**。因此，取决于您当时正在上大学的孩子数量以及他们所处的年级，按家庭计算的这项限额可能有利，也可能不利。如果您有两个孩子正在读本科，且您的收入低于逐步取消区间，AOTC
    每年可为您的家庭提供最高 5000 美元的抵税额（2500 美元乘以 2），而终身学习抵税额度则仅提供 2000 美元。不过，除了这种有限的情况外，如果您必须在两者之间做出选择（请记住，同一笔费用不能同时申请两项抵税），那么申请终身学习抵税额度会更划算。


    与 AOTC 不同，LLC 可以无限期地每年申请。即使您是一名员工，希望通过修读一门或多门不导向最终学位的课程来提升工作技能，也可以利用这一额度。


    最后，终身学习抵税额度的可用性也受到逐步取消规则的限制。例如，在 2018 年，对于单身申报者，当调整后总收入（AGI）达到 55,000 美元时，LLC
    开始逐步取消，当 AGI 达到 65,000 美元时，则完全无法申请。对于已婚联合申报者，这些门槛分别为 110,000 美元和 130,000 美元。


    ## 税务协调规则：为什么我不能这样做？


    矛盾的是，国会并不希望您过度利用一项优惠——这里的“优惠”指的是通过对同一笔费用同时使用允许的税收抵免和税前扣除来“双重获益”。但您可能预期从大学储蓄账户（特别是第
    529 节私人储蓄计划）中取款的情况呢？请记住，第 529 节私人计划的主要优势之一是，如果您使用这些取款来支付大学学杂费，其收益部分可免缴所得税。


    这个问题的答案是，国会已经永久性地关闭了这样的机会：即使用第 529 节私人储蓄计划中的免税取款来支付大学学杂费，然后又为同一笔费用申请 AOTC 或终身学习抵税额度。从技术上讲，这项禁止规定被包含在税法中的税务协调规则条款里。


    然而，如果您仔细阅读了本章内容，您会知道第 529 节私人储蓄计划的取款可用于支付食宿费、书籍和学校用品费，以及学杂费。这与任何允许的税收抵免形成对比，后者仅能用于支付学杂费（或相关费用）。因此，您已经得到了关于如何最大限度地利用这两项税收优惠的答案：使用第
    529 节私人储蓄计划为大学储蓄，随后从该计划中取款支付除学杂费以外的大学教育费用。然后，在同一个纳税年度，根据您孩子上大学时您的调整后总收入，您可以在支付孩子大学学杂费时，申请
    LLC 或 AOTC 中的一项。


    ## 使用罗斯个人退休账户资助大学教育


    许多人只有在规划自己退休（这是接下来两章的主题）时才会想到罗斯个人退休账户。但这一工具也可以有效地用作大学储蓄技巧。尽管大多数退休储蓄计划和账户只能以参与者或所有人的名义持有，但可以将罗斯个人退休账户以未成年子女的名义开设——这样就无需再为该账户指定监护人。不过，请记住，罗斯个人退休账户要求孩子在能够缴款之前，必须积累一定的
    earned income（根据税法的定义）。同样的规则也适用于您或孩子的传统税前个人退休账户的缴款。


    在为孩子的大学费用做规划时，可以考虑雇佣您的孩子做家务，并支付给他们至少相当于罗斯个人退休账户允许的最高年缴款额（2018 年，50 岁以下纳税人为每年 5500
    美元）。在您的孩子计划上大学前至少五年这样做，那么孩子就可以提取这些税后缴款及其收益，用于大学用途而无需缴纳所得税。或者，如果孩子没有上大学，或者您已经以其他方式储蓄来支付这些费用，那么孩子现在拥有一个强大的财富积累工具。例如，如果您在孩子
    10 岁到 13 岁期间，每年向孩子的罗斯个人退休账户缴款最高额 5500 美元，此后不再缴款，并假设这笔钱能获得 8%的年化税前回报率，那么当孩子 65
    岁时，该账户将拥有超过 140 万美元（确切地说是 1,464,278.30 美元）。


    现在，让我们进入大多数人财务规划的首要目标，这个主题您可能一直在期待或规划已久：退休。在接下来的两章中，我们将从两个方面来探讨这个广泛的领域：规划退休的财务方面，以及规划退休后的生活方式需求。


    # 16. 规划退休的财务方面


    关于何时开始规划退休最合适，众说纷纭，但最佳策略是尽早开始。作为 PADD 流程的一部分，要认识到积累足够的资金以舒适地退休应是您的第一财务目标。如果您在计划退休时已婚并育有子女，拥有充足的退休基金将有助于避免成为家庭的负担，从而使您的退休生活更加惬意。充足的退休资金还能防止您过度依赖社会保障体系——该体系在缺乏国会干预的情况下正面临财务困境。

    '
- fmt: "## How Much Will I Need?\n\nSimilar to the lifetime distribution of your wealth\
    \ in planning for your child’s higher education, the first question in planning\
    \ for the financial aspects of retirement is how much you will need. Generally,\
    \ we can say you will need a lot of money, but a specific computation using a\
    \ financial function calculator can give you a more approximate amount. Let’s\
    \ use the following example to describe the steps: assume that you are 35 and\
    \ make $100,000 a year. You should anticipate that you will need approximately\
    \ 75 percent of your before-tax income in today’s dollars to retire comfortably,\
    \ or $75,000 annually. As part of your retirement-planning assumptions, you anticipate\
    \ that inflation will average 3 percent annually prior to and during your retirement\
    \ and that you can earn a 7 percent after-tax return on your investments. You\
    \ plan to retire 30 years from now at age 65 and plan to be in retirement for\
    \ 20 years.\n\n> **Note:** All amounts are calculated using a Hewlett-Packard\
    \ 10BII financial function calculator, such as that illustrated at [`www.tvmcalcs.com`](http://www.tvmcalcs.com).\n\
    \nFollow these steps to figure out the amount you will need for retirement:\n\n\
    1.  Compute your annual retirement income need in today’s dollars until your planned\
    \ date of retirement:\n    *   `PV = $75,000` (Enter this as a negative number\
    \ if using the HP 10BII calculator.)\n    *   `I/YR = 3`\n    *   `N = 30`\n \
    \   *   Solve for `FV = $182,045`\n2.  Compute the lump-sum capital needed to\
    \ generate this annual income during the period of retirement:\n    *   `PMT =\
    \ $182,045` (You need to be in BEGIN mode if using the HP 10BII calculator, and\
    \ the amount needs to be entered as a negative number.)\n    *   `I/YR = 3.8835`\
    \ (This is an inflation-adjusted rate of return, so enter `1.07 divided by 1.03`,\
    \ less 1, times 100 on your calculator.)\n    *   `N = 20`\n    *   Solve for\
    \ `PV = $2,596,849`\n3.  Compute the annual amount of savings needed to accumulate\
    \ this lump sum (assuming you have not already begun a retirement savings program\
    \ and have not accumulated any invested assets for retirement):\n    *   `FV =\
    \ $2,596,849` (Round to $2.6 million. If using the HP 10BII calculator, you now\
    \ need to convert back to END mode.)\n    *   `I/YR = 7`\n    *   `N = 30`\n \
    \   *   Solve for annual savings deposit required or payment = `$27,524.65`\n\n\
    Again, as in education funding, the important action to take here is to begin\
    \ to save some amount now. The amount that needs to be set aside from your salary\
    \ is intimidating — over 25 percent of your gross pay, and not your take-home\
    \ pay (from which the percentage to be saved would be even greater). Nevertheless,\
    \ do not fixate on the required annual savings or total lump-sum amount as much\
    \ as on the financial goal of beginning to save for your retirement.\n\nIf you\
    \ do not want to purchase a financial function calculator or would rather not\
    \ compute a retirement needs analysis yourself, a number of financial calculators\
    \ and worksheets are available online (for example, at [`www.tvmcalcs.com`](http://www.tvmcalcs.com))\
    \ that can assist you. In addition, helpful charts are available in financial\
    \ magazines that, given certain assumptions, tell you how much money you will\
    \ need to accumulate at a certain age in order to retire comfortably.\n\nThere\
    \ are three basic methods to saving for retirement:\n\n*   Contributing to employer-sponsored\
    \ retirement plans, such as Section 401(k) plans\n*   Contributing to personal\
    \ tax-deferred savings plans, such as traditional deductible IRAs or after-tax\
    \ Roth IRAs\n*   Contributing in the form of payroll taxes to the Social Security\
    \ system\n\nEven after maximizing all these retirement savings methods, you will\
    \ likely also have to set aside money in a taxable account to accumulate the necessary\
    \ amount for retirement. When you do so, follow the investment strategy of dollar-cost\
    \ averaging discussed in Chapter [3](#A314864_2_En_3_Chapter.html) and, if investing\
    \ solely or primarily in mutual funds, try to choose funds with low expenses and\
    \ tax-efficient investments.\n\n## Other Questions to Ask When Planning for Retirement\n\
    \nYou have not only financial questions to answer when planning for retirement,\
    \ but also questions that are softer in nature. In other words, you must also\
    \ determine where you will live and what you will do when you stop working. Questions\
    \ such as these are the focus of the next chapter, but you need to consider two\
    \ more financially related issues when planning for retirement:\n\n*   Is my mortgage\
    \ paid off (or at least paid down to a manageable amount)?\n*   How will I cover\
    \ major expenses during retirement, particularly the rising cost of health care\
    \ expenses?\n\n### Mortgage Expenses\n\nThe possibility of using a reverse mortgage\
    \ to generate additional income during your retirement period is discussed in\
    \ detail in the next chapter. Regardless, studies have shown that individuals\
    \ who have been able to free up cash by paying off as much of their mortgage balance\
    \ as possible prior to retirement tend to be much happier. Certainly, if you can\
    \ remove your monthly mortgage payment from your list of fixed expenses, you will\
    \ have that much more cash to live on and enjoy during retirement.\n\nIt is true\
    \ that there is a debate about whether you should pay off your mortgage early,\
    \ given the corresponding loss of the mortgage interest deduction when itemizing\
    \ deductions for income-tax purposes. However, you should keep in mind that, at\
    \ most, you are receiving a 37 percent offset from your ability to deduct any\
    \ mortgage interest. Further, depending on the type of mortgage you signed, you\
    \ may be accumulating little — if any — equity in your home. For example, if you\
    \ signed an interest-only mortgage, you probably are not reducing your mortgage\
    \ principal (and thus are relying only on the possibility of your home appreciating\
    \ over time). As a result, paying off as much of your mortgage as possible before\
    \ you retire will likely prove to be wise financial planning.\n\nThere is also\
    \ the issue of refinancing your mortgage prior to retiring, to lower your monthly\
    \ fixed expenses. Although refinancing may prove to be a good decision, the disadvantage\
    \ of doing so is that you have probably extended your mortgage payment term to\
    \ a greater number of years. For example, assume you have a 15-year mortgage and\
    \ are planning to retire in 3 years. The remaining term on this mortgage is 10\
    \ years. In an effort to free up needed cash and reduce your monthly payment,\
    \ you refinance your mortgage at a lower interest rate and take out another 15-year\
    \ mortgage. Thus, you have an additional 12 years of mortgage payments to make\
    \ during your retirement period instead of only an additional 2 years after you\
    \ retire. Similarly, if you signed a new 30-year mortgage instead of another 15-year\
    \ one, you would have an additional 27 years of mortgage payments to deal with.\n\
    \nOne way to avoid this consequence of refinancing is to sign a mortgage with\
    \ a shorter repayment term, such as ten years. The trade-off for doing this is\
    \ that your monthly mortgage payment goes up and not down. Accordingly, unless\
    \ you have budgeted for such a situation, the increased mortgage amount may result\
    \ in cash-flow pressures throughout the remaining seven years of the mortgage\
    \ term after you retire."
