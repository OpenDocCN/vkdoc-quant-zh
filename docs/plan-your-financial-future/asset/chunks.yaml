  trans: '

    ### 度假住宅


    据*美国人口统计*杂志报道，约 70% 的美国人将购买度假住宅视为个人积累财富的首要标志。此外，作为这一事实的部分体现，大约 60% 的美国人表示他们希望拥有一套度假住宅。尽管这是一个常见的财务目标，但对许多人来说并非至关重要，因为购买度假住宅超出了他们的经济能力。不过，如果你有兴趣购买度假住宅，应考虑三个主要因素：


    - 住宅的地理位置

    - 与购买和维护房产相关的融资成本

    - 你计划持有该住宅的时间，包括你最终希望如何处置所有权


    任何房地产购买中的标准规则同样适用于度假住宅：最重要的因素就是位置、位置、位置！截至 2013 年，根据*市场观察*网站的数据，除佛罗里达州奥兰多（迪士尼世界）外，所有最受欢迎的十大第二套住宅购买地点均靠近海洋或山区，且紧邻大型城市或为其一部分。可以肯定的是，这些地段的房价很高，并且可能缺乏有吸引力的度假房产供应。


    因此，你可能希望采取不同的策略。寻找那些被多家纸质出版物或网站描述为“新兴”的地区。例如，近年来，墨西哥东西海岸的房产对退休和度假的美国人越来越有吸引力。哥斯达黎加的情况也是如此。如果你专注于那些尚未被富人和渴望致富的人熟知的地区，就不太可能在市场高点买入，从而可以预期你的第二套住宅未来会升值，而这种升值在更成熟的地点可能无法实现。


    为第二套住宅融资始终是个问题，特别是如果你在第一套住宅或主要居所中没有太多净资产。大多数贷款机构要求你在成交前至少支付第二套住宅公平市场价值的 20%。将住宅出租是回收部分首付的好方法，但如果你这样做，收取的租金应比你的月供高出约
    10% 到 20%，以支付维护费用。你很可能还需要聘请一位物业经理，尤其是当第二套住宅离你的主要居所较远或位于其他国家时。如果可能，尽量避免动用第一套住宅的净资产来支付第二套住宅的首付。如果你的第一套住宅房产价值下跌，要恢复损失的净资产将更加困难。如果你使用了仅付利息的可调利率抵押贷款（ARM）为第一套住宅融资，这也会带来现金流挑战。


    不要指望你的度假住宅能立即收回成本。从长远来看，度假住宅可以自我维持（特别是当你不使用它时将其出租），但前提是你进行了谨慎的财务规划。与大多数实物资产一样，你持有度假住宅的时间越长，其实现大幅资本增值的机会就越大。最终，你必须决定是现在还是去世后将度假住宅传给家人，或者希望出售它并获得（希望是）可观的回报率。正如你将在第
    19 章中看到的，一套大幅升值的度假住宅的价值可能是一个重要的遗产规划问题，尽管一位称职的遗产或财务规划师可以帮助你从应税遗产中剔除或降低该住宅的价值。


    ### 出租住宅


    大多数人成为房东的方式有两种：一种是出于自觉决定购买房屋并将其出租给他人；另一种是因为他们的主要居所未能在预期的时限内售出，从而将其转变为出租房产。成为房东的一个明显的实际劣势是，除非你聘请物业经理，否则必须与租户打交道。然而，出租住宅也伴随着税收优势。值得注意的是，作为房东，你可以对房屋进行折旧，并且至少在一定程度上，如果你的年度调整后总收入被认为不是太高，你可以申报年度经营亏损。


    根据现行税法，出租活动被视为被动活动，或涉及纳税人不实质性参与的任何贸易或经营活动。但存在一个较低的参与标准——主动参与——许多人在其出租房地产活动中很容易达到这一标准。如果个人参与出租房产的管理决策，或安排其他人（例如物业经理）提供出租房产服务，则满足主动参与标准。如果满足这一较低标准，你每年最多可以从出租房地产活动中扣除
    25,000 美元的亏损，前提是你当年的调整后总收入（`AGI`）不超过 100,000 美元。如果你超过此门槛，则 25,000 美元的最高扣除额将减少，减少金额为你的
    `AGI` 超过 100,000 美元部分的 50%。一旦你的 `AGI` 达到 150,000 美元，则完全不允许进行亏损扣除。


    例如，假设你拥有一栋公寓楼，由一位现场物业经理管理。你经常与物业经理会面，并就改善房产做出所有决定。因此，就出租房地产亏损扣除而言，你属于主动参与。再假设你
    2018 年的 `AGI` 为 110,000 美元，当年该建筑产生了 26,000 美元的亏损。你 2018 年的所得税申报表只允许扣除 20,000 美元的这些亏损，因为最高扣除额为
    25,000 美元，而该最高扣除额减少了 5,000 美元（110,000 美元超过 100,000 美元的部分——即 10,000 美元——乘以 0.50
    等于 5,000 美元）。


    正如我们在第 11 章讨论作为使用资产的主要居所时你将了解到的，出售该居所（你的家）时通常不允许申报所得税亏损。然而，税法中一项有利的收益排除条款适用于出售先前已转为出租房产的个人住宅。出租住宅的出售按照正常的资本利得和亏损规则征税（记住，你已将房屋转变为投资），但如果你符合条件，则还有每年高达
    25,000 美元亏损规定的额外税收优惠。这甚至可能是足够的回报，以补偿你忍受租户所带来的日常麻烦！

