- fmt: '### Coverage A: Dwelling


    Some homeowners make a huge mistake by covering only the fair market value of
    their home. Instead, your policy should cover the cost of rebuilding in the event
    of severe damage or destruction, which is otherwise known as insuring your home
    for its replacement cost. To receive the full benefit of such coverage, you need
    to cover your home for at least 80 percent of its replacement cost. Otherwise,
    you will likely be paid only the actual cash value (`ACV`) for your home, which
    is its replacement cost less a depreciation charge that the insurance company
    figures in based on the house’s age and condition. In other words, if actual cash
    value applies, you are paid only a percentage of the damage or partial loss to
    your home. A total loss is paid without reference to this limitation as long as
    the loss is within the coverage limits of your policy.


    Some insurance companies offer an extended policy rather than guaranteed replacement
    cost coverage. An extended policy pays a certain limit—generally, 25 to 30 percent
    over and above the fair market value of your home—for the purpose of rebuilding.
    For example, if the fair market value of your home is $500,000, an extended policy
    would pay to rebuild your home up to a cost of $625,000 ($500,000 times 1.25).


    How do you determine the replacement cost of your home? Generally, a local developer
    or construction expert can provide an estimated rebuilding cost. Sometimes local
    property appraisals may help, but be careful: appraisals of your property for
    property-tax purposes may be undervalued or overvalued, depending on the need
    for revenue in your particular community. You can also go online to obtain an
    estimate of replacement cost at web sites such as [`www.hmfacts.com`](http://www.hmfacts.com).
    Moreover, as part of the annual insurance checkup that you should be doing with
    your property and casualty agent, ask the agent what they show as the replacement
    cost for your home.


    ### Coverage B: Other Structures


    This second type of homeowner’s coverage amounts to 10 percent of the dwelling
    coverage (Coverage A) and insures outbuildings on your property, such as an unattached
    garage or storage shed. For example, if your dwelling is insured for $500,000,
    you will see separate structure (sometimes referred to as dwelling extensions)
    coverage in the policy of $50,000 ($500,000 times 0.10). Typically, this amount
    provides adequate coverage, although if you have built a considerable structure
    not attached to your home but still on the property, such as a guesthouse, you
    may wish to consider purchasing a higher amount of coverage.


    ### Coverage C: Contents or Personal Property


    This type of coverage insures all the personal property included in your home
    unless the property is specifically excluded or limited in the amount of coverage.
    Coverage is generally 50 percent of Coverage A, and, unless you pay a higher premium
    and obtain replacement cost for personal property items, the policy will pay you
    only the actual cash value (or depreciated value) of the property.


    Particularly valuable items usually are not adequately covered in a typical homeowner’s
    policy. For example, jewelry and furs, if stolen, are typically limited to a value
    of no more than $2,500 per article lost. Any item that is worth more than the
    limits specified in the policy should be covered with an endorsement to the homeowner’s
    policy or through a separate policy known as a personal articles floater (`PAF`).
    If you do not know the replacement cost of the personal property but suspect it
    is considerably more than your current policy limits, have the property appraised
    before purchasing coverage.


    The advantage of a floater is that the listed property is insured at the appraised
    value for damage or loss, often without any deductible applied. However, once
    an item is insured via a floater, it is no longer covered under the basic limits
    of Coverage C. Therefore, if your jewelry is appraised at $10,000 (and “scheduled”
    for this amount), for example, you would not receive a reimbursement of $12,500
    ($10,000 plus $2,500) if the jewelry was stolen; rather, coverage would be limited
    to only $10,000.


    Would you remember all your personal property items if your home were destroyed
    by fire? Most people would not. For this reason, it is time and money well spent
    to record your belongings and separately store the video footage on a personal
    computer. Put this video in a fireproof safe in your home and another copy in
    a safe-deposit box. You will be glad you did!


    ### Coverage D: Loss of Use


    If your home is damaged by fire or one of the other listed perils in the standard
    homeowner’s policy, Coverage D pays your living expenses during the time required
    to repair or rebuild your house. Usually, the amount is 30 percent of Coverage
    A or sometimes Coverage C, depending on the type of policy. You typically want
    the limitation tied to Coverage A, because it will result in a much higher reimbursement
    amount.


    ### Coverage E: Personal Liability


    Coverage E insures certain liability risks, including in the event of an invited
    guest being injured on your property, regardless of whether you are home at the
    time of the injury. If the injured individual was not an invited guest, under
    most state laws you are relieved from liability. Regardless, the amount of liability
    coverage you obtain is usually important. Many people maintain a maximum of only
    $100,000 per occurrence for personal liability. In today’s litigious society,
    however, this amount generally is not enough, particularly if you are a professional,
    such as a physician or lawyer. To obtain additional supplemental liability coverage
    (referred to as umbrella liability insurance), many companies require you to maintain
    underlying liability coverage of at least $300,000 per occurrence in your homeowner
    and automobile policies. We discuss the possibility of obtaining umbrella coverage
    to protect you and your family later in this chapter.


    ### Coverage F: Medical Payments to Others


    This type of coverage is designed to pay the medical costs of individuals who
    are not residents of your home but are on the premises with your permission and
    are injured. Medical costs may also be paid for individuals who reside away from
    your premises but are injured by the actions of your pets (for example, a dog
    that has temporarily left the premises). The coverage is usually limited to $1,000
    per occurrence, but with today’s rising medical costs, it is not unusual to see
    higher limits (some as high as $5,000 per occurrence). Some states, such as Colorado,
    now require a minimum level of medical payments to others under law.'
