  trans: '

    # 失业


    失业带来的不仅是重大的心理创伤，尤其是当你“因故”被解雇时，还需考虑由此产生的财务后果。其中首要问题是，如何立即降低你持续的生活开支。如果你还没这样做，可以考虑对你的现有抵押贷款进行再融资以获得更低的利率。虽然再融资延长了抵押贷款的期限，但你的月供会减少。此外，再融资通常能释放出现金，这些现金可用于任何用途，包括在找到新工作前支付生活开销。但请注意，根据
    2017 年《减税与就业法案》，房屋净值贷款或信贷额度的情况并非如此：从 2018 年开始，这些资金仅能用于房屋改善。


    应对失业的另一个关键问题是重新评估你和你家人的健康保险需求。如第 5 章所述，记住，你在失业后可以行使你的 COBRA 权利。是的，你可能需要支付前雇主在团体医疗保险中承担的那部分费用，但这个选择可能比购买个人健康保险政策便宜得多。或者，通过为健康储蓄账户（`HSA`）供款并购买高免赔额个人健康保险政策，也可能节省成本。此外，现行税收规定指出，作为前雇员，你可以在失业期间从你的个人退休账户中提取资金用于支付健康保险保费，而无需缴纳
    10%的提前支取罚金。然而，除非你拥有罗斯个人退休账户并且持有达到规定时间，否则你仍需为这笔提取的资金缴纳普通所得税。


    失业后你是否应该申请失业救济金？有几点需要考虑。首先是心理因素：你会感到难为情，或是不愿意申请吗？一些工作者，尤其是那些从管理岗位被解雇的人，可能根本无法忍受去申请失业救济金。尽管如此，你应该意识到，在大多数情况下，无论你离开的职位是什么，也无论你在前雇主的职位高低，你通常都有资格获得失业救济。你的前雇主正是为此目的缴纳了《联邦失业税法》（`FUTA`）规定的税款。


    关于失业救济金的第二个考虑更为实际：你是否符合领取资格？答案取决于你离开前雇主的原因。假设在过去 12 个月期间，你赚取的工资足以满足领取失业救济金的资格要求，那么你离职的原因必须符合以下一项或多项：


    *   你因非自身过错而被终止雇佣（裁员）。

    *   你出于充分理由自愿离职。

    *   你被非自愿终止雇佣，但并非因为贪污、违反公司的毒品政策，或其他与工作表现不佳无关的原因。


    这些原因中最大的不确定性在于，什么是你自愿离职的“充分理由”。不幸的是，这个决定权不在你手上；而是由你当地失业机构的个案工作者（有时会同你的前主管一起）来决定。因此，如果你自愿离职并申请失业救济金，在与个案工作者交谈之前，请仔细书面记录下你离职的原因，并证明这些原因与个人偏好或对另一职业的渴望无关。


    # 配偶或生活伴侣去世


    与失业一样，配偶或生活伴侣的早逝也伴随着心理和财务问题。然而，与失业不同的是，假设配偶或伴侣的生命得到了充分的保险保障，那么克服失去之痛的心理层面问题可能更为重要。


    通常，配偶或伴侣的遗属会面临无数财务问题，包括：


    *   我是应该继续住在房子里，现在就还清或还部分抵押贷款吗？

    *   我应该卖掉房子搬家吗？

    *   如果我还未退休，我现在（或在财务上尽可能快的情况下）退休吗？

    *   我继续工作吗？

    *   我是否有资格获得退休金或人寿保险金？

    *   我如何分配我有资格获得的任何退休金或人寿保险金？

    *   我能否负担得起我习惯的同样生活方式？

    *   我应该寻求财务顾问的帮助吗？


    这些问题没有一个容易回答，尤其是在哀悼过程中。尽管如此，它们都需要被处理——并且宜早不宜迟——以避免损害你们共同积累的终生财富。


    幸存的配偶或生活伴侣不仅是死者全部或大部分遗产的受益人，而且通常也是该遗产的指定执行人或管理人。从法律上讲，执行人与管理人的区别取决于死者去世时是否留有遗嘱。如果死者立有遗嘱后去世（即留有遗嘱去世），被指定处理死者财务事务的人称为执行人。如果死者未立遗嘱去世（即未留遗嘱去世），由法院指定处理死者财务事务的人则被称为遗产管理人。无论哪种情况，如果配偶或伴侣在世，他/她通常就是指定的执行人或任命的遗产管理人。


    这就引出了一个问题：作为指定执行人或管理人的幸存配偶，是否应该因提供服务而收取费用？根据大多数州的遗嘱认证法规，幸存配偶有权收取此类费用，但他们应考虑大多数遗产的通常情况。在大多数情况下，幸存配偶或执行人也是已故配偶财产的主要（即使不是唯一）受益人。此外，根据联邦遗产与赠与税规定，由配偶或任何其他受益人继承的财产无需缴纳所得税。但是，如果幸存配偶或执行人因提供与遗产相关的管理服务而收取费用，则该费用需要缴纳所得税。因此，通过接受费用，幸存配偶将免税收入变成了应税收入。显然，更好的选择是，执行人以遗产继承的形式获得死者去世时的全部（或其应得份额）财产，而不用在税后支付执行人费用来减少这笔金额。


    正如本书第五部分将进一步讨论的，法院是否会参与到管理你的遗产中，取决于你的遗产是否要经过遗嘱认证。遗嘱认证是由地方法院执行的法律程序，用于核实死者资产的所有权，并在其去世时将这些资产分配给继承人。一般来说，许多人不喜欢遗嘱认证过程中固有的潜在成本和延误，并寻找规避它的方法。主要有三种方法可以实现这一点，我们将逐一审视：


    *   将你所有的资产与其他人（例如你的配偶或生活伴侣）共同持有（以具有生存者获取权的联合租赁形式）。

    *   在法律允许的范围内，尽可能多地使用受益人指定。

    *   建立一个可撤销生前信托，并在你有生之年将尽可能多的资产转入其中。

    '
- fmt: '### Titling Assets Jointly


    Titling all your assets in joint tenancy with right of survivorship (JTWROS) with
    someone else is sometimes referred to as "the poor man''s way of avoiding probate,"
    because it does not involve the drafting of a trust or acquiring any other assets
    for which a beneficiary designation is possible, such as a life insurance policy.
    Typically, only spouses title assets jointly, although such titling was heavily
    used by same-sex domestic partners in states where the marital relationship was
    not legally recognized.


    `Joint tenancy` titling may be both a blessing and a curse, because it provides
    an easy way to dispose of property at death while avoiding probate, but it can
    be relatively inflexible from a transfer-tax standpoint. Specifically, if a surviving
    spouse already has significant property of their own, leaving even more property
    to them by operation of law only adds to an existing taxable estate. Fortunately,
    under current tax law, it is possible for a surviving spouse (or other surviving
    joint tenant) to refuse, or disclaim, the receipt of this additional property.
    However, the survivor must do so within nine months of the decedent''s death and
    in a certain manner, referred to as a `qualified disclaimer`. Otherwise, the survivor
    is considered to have made a subsequent gift to whoever receives the property
    in their stead.


    For example, assume that you are a joint tenant at your death with your already-ultra-wealthy
    spouse (particularly, given the increased estate-tax exemption from 2018–2025).
    To avoid potential additional estate taxes at their death, your spouse should
    refuse the property within nine months of your death by making a qualified disclaimer.
    They must do this before accepting any benefits from the disclaimed property and
    without separately directing to whom the property should now pass. If you have
    children, they normally receive any disclaimed property under state law. If you
    do not have children, your closest blood relative (or relatives) receive the property.


    ### Using Beneficiary Designations


    Beneficiary designations are typically contractual agreements used to leave property
    to others upon the death of the owner. Common examples of assets for which beneficiary
    designations are used are life insurance policies, employer-sponsored retirement
    plans (such as `401(k)` plans), and `IRAs`. It is also possible to use a beneficiary
    designation to avoid probate on brokerage or advisory accounts.


    Given that you should access taxable brokerage or advisory accounts before accessing
    any tax-deferred accounts during your lifetime, you may have few or no assets
    to pass in this manner. Nevertheless, you can avoid the probate process on these
    types of accounts by asking your broker or financial advisor for a transfer-on-death
    (`TOD`) form. Fill out that form for each of your brokerage or advisory accounts,
    and ask that it be sent back to the broker-dealer with whom you established the
    account. If you are investing online, ask whatever company or mutual fund family
    you are investing with to send you the comparable form. By proceeding in this
    manner, you should be able to avoid the probate process on those particular assets
    in the state of residence where your estate is potentially subject to court administration.
    Note that the same result may be accomplished with individual bank accounts, but
    the form used in this instance is referred to as a payable-on-death (`POD`) form.


    ### Establishing and Funding a Revocable Living Trust


    As discussed, revocable living trusts are frequently promoted for several reasons,
    but the most prevalent of these is their ability to avoid probate. Be careful,
    though: many grantors or creators of revocable living trusts believe all that
    is necessary to avoid probate is to purchase the trust document from the promoter.
    This is not correct! Rather, to avoid probate, your assets must be transferred
    into the name of the trust before your death and while you are still legally competent
    to know the ramifications of that action. If the assets (or any assets you may
    have acquired after establishing the trust) are not in the name of the trustee
    of the trust at your death, they do not avoid probate.


    If you are electing to establish a revocable living trust and pass on all your
    assets via the trust outside probate, you must fund the trust during your lifetime.
    Alternatively, if you are not concerned about the delay or cost of probate, you
    can use the trust only to distribute your assets in a transfer-tax-efficient manner
    subsequent to your death. As a third option, you may elect to pass on all your
    property by using joint-tenancy titling or beneficiary designations and use the
    trust only as a standby document in the event that you become mentally incompetent
    during your lifetime.


    For example, assume that you and your spouse own most of your property jointly,
    including your house, checking and savings accounts, and investment accounts.
    In addition, let''s say your retirement plans and life insurance policies name
    your spouse as the primary beneficiary, and you are not concerned about having
    your estate or that of your spouse subject to transfer tax at death. Under such
    circumstances, you may wish to establish a revocable living trust to be used to
    manage your assets only in the event of your own mental incapacity. If this event
    occurs, you can name your spouse as the successor trustee or, if they are not
    able to serve in such a capacity, someone else (such as, perhaps, your favorite
    brother). Because you will be legally incompetent at the onset of your mental
    incapacity, you must also give your spouse a durable power of attorney to transfer
    property to the trust and avoid probate. (`Durable powers of attorney` are discussed
    later in this chapter.)


    Now let''s proceed to a common issue confronting many members of the baby-boom
    generation: how to pay for the long-term care expenses of a dependent parent.'
