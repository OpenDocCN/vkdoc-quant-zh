    # 遗产可获得的扣除与税收抵免


    与所得税制度类似，遗产在转让税方面也可获得某些扣除和税收抵免。然而，与你在所得税制度下可以申报的扣除不同，这些扣除和抵免通常没有金额限制。


    最实用且最常申报的两项遗产税扣除，是针对遗产在去世时转移给你的配偶或合格慈善机构的部分。它们分别被称为遗产税婚姻扣除和遗产税慈善扣除。这两项扣除均没有金额上限，这与个人在世期间为赠与税目的而向配偶或合格慈善机构进行的财产转移情况相同。然而，这两类财产转移必须符合特定形式，才能获得扣除许可。具体来说，去世时转移给配偶的财产必须无限制地留下，而转移给合格慈善机构的财产通常必须以慈善信托的形式留下。


    假设你通过遗嘱或受益人指定，在你去世之日将全部财产（无任何限制）直接留给你的配偶。这是可以接受的，且转移的资产全额符合无限制遗产税婚姻扣除的条件。但是，如果你仅将财产留给配偶终身使用或一段固定年限（换言之，附有限制条件），则此类转移通常不符合无限制婚姻扣除的条件。接下来，假设你将财产的剩余权益留给一家合格慈善机构，但通过设立“慈善剩余信托”（`CRT`），保留你终身享有该财产收益的权利。在你去世时，留给慈善机构的剩余权益符合无限制遗产税慈善扣除的条件。但如果你试图在生前不设立信托就完成同样的财产转移，那么无限制慈善扣除很可能不被允许。


    在遗产税规划中还存在若干税收抵免，其中最实用的是统一抵免额。统一抵免额相当于一定数额的财产，这部分财产在去世时可以免缴遗产税进行转移。然而，与所得税一样，这项抵免是在计算出总税负之后才适用的。例如，2018
    年，对 1120 万美元的应税遗产财产征收的遗产税金额为 4,425,800 美元。针对此金额，你需适用允许的统一抵免额 4,425,800 美元（假设你此前未进行过应纳赠与税的生前赠与），因此你的净遗产税负债为零。当你听说你可以转移高达
    1120 万美元的财产而免缴遗产税（如果你的唯一受益人是配偶或合格慈善机构，实际免税额度更高）时，你知道这是真的，因为你有允许的 4,425,800 美元的统一抵免额来抵消就该金额应缴纳的税款。


    但你需要意识到一种会减少去世时 4,425,800 美元统一抵免额的情况。由于赠与税与遗产税制度是相关联的（“统一”一词即源于此），你在生前进行的、超过赠与税年度免税额的任何应纳税赠与，都会影响你去世时遗产可使用的统一抵免额。因此，如果你在生前进行了任何应纳税赠与，那么你用来抵消该赠与税负的抵免额，会减少你去世时允许的统一抵免额。例如，假设你在
    2018 年去世时留有 1120 万美元的应税遗产，并将其平均留给你的两个孩子。然而，你在生前曾向每个孩子进行了 75,000 美元的应纳税赠与。实际操作中，这意味着你的初步税基为
    1135 万美元，导致你需缴纳 60,000 美元的遗产税（超出 1120 万美元免税额度部分的 150,000 美元，乘以适用的遗产税边际税率 40%）。换个角度看，你的允许统一抵免额减少了
    60,000 美元，因此你去世时可用的允许统一抵免额仅为 4,365,800 美元（4,425,800 美元减去 60,000 美元）。


    # 税率与死亡税的可能废除


    近年来，一种转让税——遗产税——在某种程度上已成为政治皮球。具体而言，一些立法者主张废除他们认为是非必要甚至是惩罚性的税收，而另一些人则担心取消此税种对财政收入的影响。然而，围绕遗产税的持续争论很可能已经尘埃落定——至少目前是这样——随着
    2017 年《减税与就业法案》将遗产税（和赠与税）免税额，在根据通货膨胀调整后，从 500 万美元翻倍至 1000 万美元，该争论得以平息。这项规定对 2017
    年 12 月 31 日之后去世的被继承人遗产生效，但除非后续国会修订，否则免税额将在 2025 年后恢复为经指数化调整后的 500 万美元。


    此外，2012 年的《美国纳税人 relief 法案》包含了永久延长已婚夫妇之间免税额可携带性的条款。具体而言，可携带性允许有配偶存活的被继承人的遗产，可以选择让未亡配偶在生前和去世时，将被继承人未使用的免税额用于未亡配偶自身的财产转移。实际上，若被继承人的配偶在生前或去世时完全未使用其
    1120 万美元的免税额，那么在 2018 年，该夫妇在需缴纳任何转让税之前，共同享有 2240 万美元（1120 万美元乘以 2）的免税额。但请注意，为了利用未使用免税额的可携带性，无论第一任配偶是否需要缴纳任何遗产税，都必须为其提交一份遗产税申报表。

    '
- fmt: '# Do I Really Want to Leave It All to My Spouse or Charity?


    As we have discussed, the deduction available for transfers made at death to a
    spouse or charity is unlimited in amount. But as a planning technique, do you
    really want to take full advantage of either deduction?


    Although the tax law allows you and your spouse to leave each other all property
    free from estate tax, you may end up increasing or overfunding your spouse’s estate
    if you leave everything to them. This is particularly the case if your net worth
    is already at or near the estate-tax exemption equivalent of tax-free property
    ($11.2 million in 2018). If your spouse is much younger than you (and thus there
    is considerable time for your bequeathed assets to grow in value), it may not
    be the best idea to leave it all to them.


    This possibility is one of the major problems with titling all your property in
    joint tenancy with right of survivorship (`JTWROS`) with your spouse: from a planning
    perspective, `JTWROS` titling limits your flexibility, because all property passes
    directly to your spouse. It may result in too-great-an-amount of property taxable
    in the surviving spouse’s gross estate, a problem commonly referred to as overfunding
    the estate.


    Insofar as federal transfer-tax law is concerned, there is, since the 2015 US
    Supreme Court decision of *Obergefell v. Hodges*, no debate about who constitutes
    a spouse for the purposes of taking advantage of the unlimited marital deduction
    allowance; the spouse may be a member of either the opposite or the same sex.
    As a result, gay and lesbian individuals who enter into marriage must be recognized
    as a lawful union by all States. This entitles such individuals to several important
    estate-tax benefits, chief among them the use of the unlimited marital deduction
    for the making of lifetime gifts and transfers at death. The titling of property
    among gay and lesbian individuals in joint tenancy with right of survivorship
    also remains as a planning alternative.


    If your estate or the combined estate of you and your spouse is currently equal
    to or expected to be more than the allowable exemption equivalent, you may wish
    to consider seeking the counsel of an estate-planning attorney relatively soon.


    You may also wish to do so if you have questions about the possible application
    of the portability exclusion election. When and if you do seek assistance, ask
    the attorney about including in your estate plan a disclaimer trust, which will
    allow your spouse or estate executor to do some after-death planning and legally
    refuse the amount of your property that may overfund their estate. It will save
    your ultimate estate beneficiaries a great deal of money in the long run.


    In contrast to property left to your spouse, you do not need to be concerned about
    possibly overfunding a charity. If the charity is tax-qualified, it is a tax-exempt
    entity and does not pay any income or transfer taxes on bequeathed property. You
    do, however, need to take into account how best to take care of family members
    who have otherwise been disinherited because their portion of your estate went
    to a charity. In most states, your surviving spouse may elect against your will
    to take the portion of your estate that they normally would have been entitled
    to—usually half of all your property at death—but your children, siblings, and
    close friends are not permitted this election.


    There are several ways to benefit, or “re-inherit,” your children or other disadvantaged
    heirs. The most popular is to buy a life insurance policy and name your children
    as its beneficiaries. If you buy a policy in the name of an `ILIT`, the death
    proceeds from the policy are removed from your gross estate for transfer-tax purposes.
    However, because the proceeds are paid from a life insurance policy, they are
    not taxable to your children or other beneficiary for income-tax purposes. In
    estate-planning terminology, setting up an `ILIT` in this manner, and for the
    reason of making up an inheritance otherwise lost to charity, is known as a wealth
    replacement trust.


    For example, assume that, as an unmarried individual with two adult children,
    you wish to benefit the American Cancer Society (`ACS`) with the majority of your
    $11.2 million estate in 2018. As a result, you make a bequest in your will of
    $10 million to the `ACS`. Meanwhile, at the time you write your will, you also
    establish an `ILIT` and name your two adult children as the trust beneficiaries.
    You then have the `ILIT` purchase a $10 million life insurance policy on your
    life. Accordingly, you get the benefit of both claiming the estate-tax charitable
    deduction and accomplishing your philanthropic goals. Plus, you meet these objectives
    without disadvantaging your children, who would otherwise expect to be the beneficiaries
    of your estate.'
