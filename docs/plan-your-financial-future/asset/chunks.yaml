- fmt: '# A Developmentally Disabled Child


    A developmentally disabled child presents special challenges in wealth accumulation
    and management. Specifically, what is the optimal way to pay for the tremendous
    expenses associated with raising a developmentally disabled child to independence?


    The numerous planning techniques that may be used cannot be fully explained here,
    but certainly a prevalent strategy is to establish a special needs trust for the
    benefit of the child. To properly establish and maintain such a trust, the child
    must first meet the Social Security definition of disability, even though, typically,
    public assistance benefits are paid at the state or local level rather than from
    the federal government.


    The purpose of the special needs trust is to allow the child to maintain eligibility
    for certain public assistance benefits, such as Supplemental Security Income (SSI)
    or Medicaid, while at the same time providing for needed services that are not
    available from the government. The trust document must state that the trust income
    and principal are to be used only to provide for extra services required to care
    for, maintain, and educate the child beyond those government-provided benefits.
    If the document does not state this or include similar language, the state may
    attach the assets transferred to the trust to pay for its cost of providing required
    care.


    An alternative to the substantial cost incurred with a special needs trust for
    a disabled child is an A.B.L.E. account (created by the Achieving a Better Life
    Experience Act of 2014). An A.B.L.E. account is a tax-advantaged savings account
    for a disabled individual modeled after the Section 529 private savings plans
    when planning for a child’s higher education needs. (See Chapter [15](#A314864_2_En_15_Chapter.html)
    for more on Section 529 accounts.) Whereas contributions to the A.B.L.E. account
    of not more than $15,000 annually in 2018 are not federally income-tax deductible,
    some States do afford the contributor a State income-tax deduction. The beneficiary
    of the account is the account owner, and income earned by the account is not taxed.


    Why establish an A.B.L.E. account? Like a special needs trust, but at much less
    cost, an A.B.L.E. account preserves the disabled individual’s eligibility for
    public assistance benefits. Eligibility for these benefits requires that a disabled
    individual retain no more than $2,000 in cash savings, including retirement funds.
    A.B.L.E. savings accounts do not affect eligibility for these public benefits
    (they are not counted) and permit funding for the wide range of other expenses
    incurred by the disabled individual.


    At a minimum, if you are the parent of a developmentally disabled child, you should
    consider the implementation of an A.B.L.E. account. Beyond that, you also need
    to consider who will care for the child in the event of your or your spouse’s
    death or incompetency. Under law, parents are the natural guardians of their child
    only until the child reaches age 18 or the otherwise-specified state age of legal
    majority. Hence, if your disabled child needs care after the age of 18, you may
    wish to seek court appointment as your child’s legal guardian. Further, in the
    event of your death or incompetency, you may wish to have your spouse succeed
    you in this capacity. In your will, you should provide for the naming of a guardian,
    likely first your spouse and, in the event of a joint death, a willing and competent
    family member or members. If you fail to do so, the court will normally appoint
    a guardian for your child, but you will have no say with respect to whom this
    person is or where your child will live subsequent to your death.


    The need for the implementation of a contingent family trust is important in all
    cases in which a minor child may be left without their natural parents, but it
    is even more important when one or more children are developmentally disabled.
    The guardian named for your child and the trustee of the contingent family trust
    will probably be the same individual, but you should give careful consideration
    to the different skill sets required for each duty. A guardian needs to possess
    considerable empathy and compassion for your disabled child’s ongoing needs, whereas
    a trustee needs financial acumen. Just because a family member has one set of
    these skills does not mean they have the other. Moreover, although your first
    thought may be that your parent (the child’s grandparent) is the perfect choice,
    do you think it is fair to ask your parent to take on a second family, particularly
    one involving a disabled child, late in their life? Only you can gauge the correct
    way to deal with this situation, but do not overlook considering it.'
