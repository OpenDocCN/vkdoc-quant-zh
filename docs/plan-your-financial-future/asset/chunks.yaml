    # 我是否真的想把一切都留给配偶或慈善机构？


    正如我们之前讨论的，在死亡时转移给配偶或慈善机构的财产所能享受的扣除额是无限的。但作为一种规划策略，你真的想充分利用这两种扣除中的任意一种吗？


    尽管税法允许你和配偶相互继承所有财产而免于遗产税，但如果你把所有财产都留给对方，最终可能会导致配偶的遗产过度增加或超额注资。尤其当你的净资产已经达到或接近遗产税免税额度（2018
    年为 1120 万美元）时更是如此。如果你的配偶比你年轻得多（因此你的遗赠资产有相当长的时间增值），把所有财产都留给他们可能并非最佳选择。


    这种可能性是当你将所有财产以"生存者继承权联合共有"（`JTWROS`）的形式与配偶共有时面临的主要问题之一：从规划角度看，`JTWROS`形式限制了你的灵活性，因为所有财产都直接转移给配偶。这可能导致在生存配偶的总遗产中产生过高的应税财产，这个问题通常被称为遗产超额注资。


    就联邦转移税法而言，自 2015 年美国最高法院对*Obergefell 诉 Hodges*案作出裁决以来，关于谁构成"配偶"以享受无限婚姻扣除优惠已无争议；配偶可以是异性或同性。因此，缔结婚姻的同性恋者必须在所有州被承认为合法结合。这使得此类人群有资格享受几项重要的遗产税优惠，其中最主要的是在生前赠与和死亡时转移中利用无限婚姻扣除。对于同性恋者，以生存者继承权联合共有形式持有财产仍然是规划选择之一。


    如果你的遗产或你与配偶的合并遗产目前等于或预计超过允许的免税额，你可能需要考虑尽快寻求遗产规划律师的咨询。


    如果你对可能适用的"可转移性免税额选择"有疑问，也建议你这样做。当你寻求帮助时，询问律师是否可以在你的遗产计划中加入一份"放弃信托"，这将允许你的配偶或遗产执行人在死后进行一些规划，并合法拒绝可能导致其遗产超额注资的那部分财产。从长远来看，这将为你的最终遗产受益人节省大量资金。


    与留给配偶的财产不同，你无需担心可能向慈善机构超额注资。如果慈善机构符合税收资格，它是免税实体，无需就遗赠财产缴纳任何所得税或转移税。然而，你确实需要考虑如何最好地照顾那些因你所留遗产份额流向慈善机构而被剥夺继承权的家庭成员。在大多数州，你的健在配偶可以选择违背你的遗嘱，索取他们通常有权继承的遗产份额——通常是你在死亡时全部财产的一半——但你的子女、兄弟姐妹和亲密朋友不允许有这种选择权。


    有几种方法可以让你的子女或其他被剥夺继承权的继承人受益，或"重新继承"。最流行的方法是购买一份人寿保险，并指定你的子女为受益人。如果你以`ILIT`（不可撤销人寿保险信托）的名义购买保单，保单的死亡赔付金额将从你的总遗产中扣除，不计入转移税。然而，由于赔付金来自人寿保险单，你的子女或其他受益人无需为此缴纳所得税。在遗产规划术语中，通过这种方式设立`ILIT`以弥补因捐赠而损失的继承权，被称为"财富替代信托"。


    例如，假设你是一位单身人士且有两个成年子女，在 2018 年希望将 1120 万美元遗产中的大部分捐给美国癌症学会（`ACS`）。因此，你在遗嘱中向`ACS`遗赠了
    1000 万美元。同时，在撰写遗嘱时，你还设立了一个`ILIT`，并指定你的两个成年子女为信托受益人。然后，你让`ILIT`以你的生命为标的购买一份 1000
    万美元的人寿保险。这样一来，你既能享受遗产税慈善扣除，又能实现慈善目标。此外，你在实现这些目标的同时不会让子女处于不利地位——否则他们本应是你遗产的受益人。

    '
- fmt: '# The Unintended Danger of Generation-Skipping Transfers


    Many high-net-worth individuals are unaware that there is a third transfer tax
    on gifts and estates that skip a generation, such as those made by a grandparent
    to a grandchild. The additional tax that is assessed on this transfer is known
    as the generation-skipping transfer tax (`GSTT`).


    The rules with respect to skip transfers are complex, but here is what you need
    to know to avoid the `GSTT`:


    - The tax is designed to impose the equivalent of the gift or estate tax that
    the intervening generation (or the parent’s generation) would have paid for the
    transfer.

    - The tax is imposed in addition to either the estate or gift tax; thus, the tax
    can only add to an otherwise sizable transfer-tax burden.

    - The tax is assessed at the maximum estate-tax rate in a flat rate at the time
    of a generation-skipping transfer. There is no progressivity leading up to this
    maximum rate as there is with other lifetime or testamentary transfers (for example,
    in 2018, a flat 40 percent rate applies to any generation-skipping transfer).

    - The tax potentially applies to a gift made either directly from grandparent
    to grandchild during the grandparent’s lifetime (known as a direct skip) or at
    the time of the grandparent’s death via a trust, wherein the grandchild is benefited
    to the exclusion of the parent (otherwise referred to as a taxable termination
    or indirect skip).

    - The tax potentially applies to a gift made from one unrelated individual (transferor)
    to another (transferee), where the transferee is at least 37.5 years younger than
    the transferor.

    - The liability for paying the tax falls on different individuals depending on
    the type of generation-skipping transfer made.


    Fortunately, most individuals can escape the payment of the `GSTT`—even if they
    do make a generation-skipping transfer—rather easily. This is because the transferor
    has an $11.2 million exemption (in 2018) that they can allocate to the transfer
    to avoid the imposition of the tax. This allowable exemption, to be used on an
    elective basis by the transferor or their estate, tracks the estate-tax exemption
    equivalent or exclusion that was previously discussed. Direct gifts to grandchildren
    that qualify for the gift-tax annual exclusion ($15,000 in 2018) during the grandparent’s
    lifetime also are not subject to the tax.


    Let’s say, for example, that in 2018, a wealthy grandfather makes a direct gift
    of $11,215,000 in appreciated stock to his adult granddaughter. If he elects to
    allocate his full $11.2 million generation-skipping exemption to the transfer
    (the $15,000 gift-tax annual exclusion is automatic and does not need to be elected),
    no `GSTT` is imposed. However, be aware that the generation-skipping tax exemption
    amount is now fully allocated and may not be used to offset any additional generation-skipping
    transfers at the time of the grandfather’s death. Also, not only may the `GSTT`
    apply to the direct gift, but so potentially does the federal gift tax on any
    transfers made from a donor to a donee in excess of $15,000 annually in 2018.


    In summary, the `GSTT` may be easily avoided with a little planning. If your will
    or trust was drafted before 1987, when this tax came into effect, you should ask
    your estate-planning attorney or financial planner to review it to see whether
    the tax applies. If the tax does potentially apply, amend your will so as to defend
    your hard-earned wealth. If you are fortunate enough to avoid the imposition of
    the tax in your estate planning, be aware that the `GSTT` constitutes an unintended
    danger to the accumulation and distribution of wealth from one generation to the
    next.


    Now, to conclude this section of the book, let’s look at common events that may
    threaten the accumulation of lifetime wealth. Among these are the divorce of married
    couples and the unexpected loss of employment in today’s economy. Life events
    that endanger wealth are the title and focus of the next chapter.


    # 14. Life Events that Endanger Wealth


    As you go through life, you sometimes experience events that endanger or threaten
    the amount of wealth that you have accumulated. We have already discussed the
    importance of obtaining an individual disability income policy in the event of
    physical disability, and we will discuss how to plan for your own possible mental
    incapacity later in this chapter. Specifically, however, we identify important
    planning considerations with respect to six potentially financially devastating
    life events, including divorce, the loss of a job for an extended period of time,
    the death of a spouse or life partner, a parent incurring a debilitating condition,
    caring for a developmentally disabled child, and physical or mental incapacity.


    ## Divorce


    Statistics indicate that one out of every two marriages ends in divorce (the legal
    ending of a marriage) or separation (the establishment of a separate and independent
    lifestyle from that of your spouse). How do you financially make the best of (and
    hopefully recover from) divorce or separation?


    Likely the first financial task that you, your attorney, or your financial planner
    should undertake—either before the divorce is finalized or immediately after property
    settlement—is to separate your and your spouse’s assets and liabilities. You need
    to prepare new statements of personal financial position. Unlike before, when
    assets and liabilities could be listed as joint or individually owned on one statement,
    you now potentially need to prepare three personal financial statements: his,
    hers, and ours. If you live in a community property state, such as California
    or Texas, the division of assets and liabilities is easier, because all marital
    property must be divided equally between spouses. This may not be the case in
    non-community-property states, also referred to as common law states. Nevertheless,
    the preparation of separate financial statements is still prudent divorce planning
    in all states.


    Once you have identified and reduced to writing your and your spouse’s total assets
    and liabilities, each of you needs to prepare separate income or cash-flow statements.
    Doing so will assist you in determining whether temporary alimony or child support
    is possible before the divorce is finalized, and it also will help you establish
    any future amounts that may need to be paid. As a general rule, many divorcing
    spouses do not fully understand how their living expenses will change after divorce.
    As a result, ex-spouses typically underestimate how much money they will need
    to sustain their pre-divorce standard of living. The notable exception to this
    rule is a celebrity divorce, wherein divorcing spouses typically overestimate
    their future income needs.


    Three basic provisions of most divorce or separation agreements should be carefully
    considered by separating spouses:


    - The amount and necessity of alimony payments from one spouse to the other

    - The amount of child support payments, if there are minor children from the marriage

    - The division of property accumulated during the marriage (otherwise known as
    the property settlement agreement)


    If the spouses own a home at the time of the divorce, attention should also be
    given to how best to divide equity in that important asset.'
