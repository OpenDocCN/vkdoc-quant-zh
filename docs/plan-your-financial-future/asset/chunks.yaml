    # 养老金最大化与退休人员健康保险


    ## 养老金最大化


    一种允许您保留这些福利的选择是，让您的配偶以书面形式（在公证人面前签名）同意放弃联合与遗属抚恤金。但如果您采取此选项，您将回到起点：让您的配偶在您去世后失去收入保护。这便是养老金的困境所在。


    一个更可取的选择是，从养老金中选择终身年金，然后购买一份人寿保险，其保额相当于您若选择联合与遗属形式（例如，45 万美元）所放弃的福利金额，并将您的配偶指定为保单受益人。这样做的好处是，可以将本应纳税给配偶的养老金福利部分转换为免税的保险金。在金融领域，这被称为*养老金最大化规划技术*，其核心理念是，您利用额外获得的养老金支付额（例如，每年
    18,000 美元）的一部分来支付人寿保险的保费，以确保保单在您去世前一直有效。事实上，您很可能用每年 18,000 美元的保费购买到远超过 45 万美元的保额。


    当计划参与者的配偶健康状况不佳时，该技术尤为有效。在这种情况下，为健康状况不佳的配偶提供其剩余寿命所需收入（假设计划参与者先于配偶去世）的保险成本，通常可能低于从退休计划中提供遗属抚恤金的成本。


    为什么并非所有有权从雇主资助计划领取养老金的人都利用养老金最大化技术呢？一个主要原因是，一位 65 岁、即将退休的人可能因健康状况不佳而无法获得人寿保险资格。另一个原因是，在该年龄段，人寿保险过于昂贵。最后，始终存在保费无法支付、需要时保险失效的风险。


    您需要仔细考量多个因素——包括健康状况、年龄、成本，以及养老金支付额是否每年根据生活成本进行调整——并判断养老金最大化技术是否适合您。希望您能在称职的财务顾问或寿险代理人的协助下完成这一评估。


    ## 退休人员健康保险


    为退休人员提供健康保险已变得越来越不常见。根据凯撒家庭基金会的一项研究，2017 年，在拥有 200 至 999 名员工的企业中，仅约 23%提供退休人员健康保险。在员工少于
    200 人的企业中，这一数据更为糟糕。研究表明，这些小企业中，能够负担得起提供退休人员健康保险的比例不超过 5%。


    如果您希望在退休期间获得健康保障，应该怎么做？这取决于您的年龄，以及您的工作时长是否达到有资格享受雇主团体健康保险的标准。一旦您年满 65 岁，您可能无需担心私人健康保险，因为您将有资格享受联邦医疗保险。然而，如果您刚刚退休但未满
    65 岁，可选择方案并不多。


    ### 方案一：COBRA 权利


    您的第一个选择是行使 COBRA 权利。根据 1985 年的《综合预算协调法案》，在您离职后——只要您并非因严重不当行为被解雇——您可以在最长 18 个月内继续享受前雇主的团体健康保险。如第[5]章所述，为此您需要支付前雇主承担的团体保费部分以及您自己之前承担的份额。但如果您在
    65 岁前退休，不应忽视利用这些权利的机会。另外，一旦您年满 65 岁并符合联邦医疗保险资格，您较年轻的配偶或受抚养子女可根据 COBRA 法律继续享受团体保险，期限最长可达
    36 个月。


    ### 方案二：健康储蓄账户


    第二个选择是开始为一个健康储蓄账户供款，该账户的设立方式与传统或罗斯个人退休账户类似，但包含一个高免赔额的个人健康保险计划。您每年可向健康储蓄账户进行可抵税的现金缴款，然后使用这笔缴款及其收益，免税报销自己的医疗费用。此外，一旦您有资格享受联邦医疗保险，您可以免税从健康储蓄账户中提取资金，用于支付您应承担的联邦医疗保险
    B 部分月度保费份额，以及您在联邦医疗保险体系下与政府共同承担的任何其他共保费用。


    ### 方案三：个人健康保险保单


    第三个选择是购买个人健康保险保单。尽管此类保单相对昂贵，但通过精明选购、保持健康并利用某些技巧，您可以节省费用。例如，如果您年龄在 55 至 64 岁之间，考虑在申请时将您本人的保险与家人的保险分开。通常，个人健康保险会根据计划中最年长参与者的年龄由保险公司承保。因此，如果您有较年轻的配偶，您可以选择将他们纳入计划下的独立保险，然后将他们的年龄与您的年龄合并，以获得更有利的整体评级。您也可以考虑将健康保险保单以较年轻配偶的名义持有，以确保在您有资格享受联邦医疗保险后，他们能继续享有保障。


    ### 方案四：健康维护组织


    另一个与支付个人健康保险保费类似的想法是，向健康维护组织按月支付服务费。作为支付该费用的回报，您可以获得医疗专业人士的服务，以应对您随着年龄增长可能出现的任何医疗状况。有些月份（希望有很多个月份）您可能不需要医疗服务，但知道在您真正需要时，只需很少或无需额外费用就能获得治疗，这令人安心。这一理念同样适用于许多私人医生目前提供的直接付费医疗服务（即所谓的*医疗管家服务*）。


    ### 方案五：州政府担保保单


    如果您发现个人健康保险保费或月度服务费高得令人望而却步，可以研究州政府担保的保单。通常，这类保单是州政府为覆盖未参保者或健康问题严重到无保险公司愿意承保的人群所做的努力。要获得州风险池的资格，您必须被评定为高风险、不健康个体，并且必须曾被私人保险公司拒保。如果您能承受被如此归类对自尊心造成的打击，您或许能获得相对便宜的保险。


    ## 联邦医疗保险与联邦医疗保险补充保险


    联邦医疗保险和联邦医疗保险补充保单均已在第[5]章中讨论过，作为财富积累与管理的 PADD 法（保护自己、家人和财产）第一步的一部分。然而，提醒您注意联邦医疗保险
    A 部分和 B 部分保障中存在的巨大缺口，可能会对您有所帮助。一旦您有资格享受联邦医疗保险，您应购买当时最符合您需求和健康状况的标准化 Medigap 保单。希望您已采纳本书关于您潜在长期护理需求的建议，并且已经（或将要）支付长期护理保险的保费。请记住，无论是联邦医疗保险还是私人
    Medigap 保单，除有限情况外，均不覆盖长期护理费用，因此这部分保障需要您自行安排。

