  trans: '

    ### 联名持有资产


    以生存者继承权联名共有（JTWROS）的方式与他人共同持有所有资产，有时被称为“穷人的遗嘱认证规避法”，因为这无需起草信托，也无需购置任何可通过指定受益人处置的资产（例如人寿保险单）。通常只有配偶会采用联名持有资产的方式，不过在婚姻关系未获法律承认的州，同性伴侣也曾广泛使用这种方式。


    `联名持有`权既是福音也是诅咒，因为它提供了一种在去世时无需经过遗嘱认证即可轻松处置财产的方式，但从转让税的角度来看，这种方式相对缺乏灵活性。具体而言，如果健在配偶已经拥有大量个人财产，那么通过法律操作再留给其更多财产，只会增加其应税遗产。幸运的是，根据现行税法，健在配偶（或其他健在的联名持有人）可以拒绝或放弃接受这笔额外财产。但幸存者必须在被继承人去世后九个月内，以特定方式（称为`合格放弃声明`）完成这一操作。否则，幸存者将被视为向实际接收该财产的其他人进行了后续赠与。


    例如，假设你去世时与已经极其富有的配偶是联名持有人（尤其考虑到 2018-2025 年间遗产税免税额的提高）。为避免配偶去世时可能产生的额外遗产税，你的配偶应在你去世后九个月内通过提交合格放弃声明来拒绝接收该财产。他们必须在接受被放弃财产的任何收益之前完成此操作，且不得单独指示该财产应转给谁。如果你有子女，根据州法律，他们通常将继承被放弃的财产。如果你没有子女，则由你的近亲接收该财产。


    ### 使用受益人指定


    受益人指定通常是用于在财产所有者去世后将财产留给他人的合同协议。常见的适用受益人指定的资产包括人寿保险单、雇主资助的退休计划（如`401(k)`计划）以及`IRAs`。此外，也可以通过受益人指定来避免券商账户或咨询账户的遗嘱认证。


    鉴于你在生前应优先动用应税的券商账户或咨询账户，而非递延纳税账户，因此你可能只有很少或没有资产能以这种方式传承。尽管如此，你仍可要求券商或财务顾问提供一份“去世后转账”（`TOD`）表格，从而避免这些账户的遗嘱认证流程。为你的每个券商或咨询账户填写该表格，并要求将其寄回给与你开设账户的券商交易商。如果你是在线投资，请向其投资的公司或共同基金家族索取类似的表格。通过这种方式，你应能避免在你遗产可能受法院管理的居住州，对这些特定资产进行遗嘱认证。请注意，个人银行账户也可实现相同效果，但在此情况下使用的表格称为“去世后付款”（`POD`）表格。


    ### 设立并资助可撤销生前信托


    如前所述，可撤销生前信托之所以被广泛推广，有多个原因，但其中最主要的是其规避遗嘱认证的能力。不过要小心：许多可撤销生前信托的委托人（或设立人）认为，只需从推广者处购买信托文件即可避免遗嘱认证。这种想法是错误的！实际上，要避免遗嘱认证，你的资产必须在你去世前、且你仍具有法律能力知晓该行为后果时，转入信托名下。如果资产（或你设立信托后获得的任何资产）在你去世时不在信托受托人名下，则无法规避遗嘱认证。


    如果你选择设立可撤销生前信托，并通过信托在遗嘱认证之外传承所有资产，你必须在生前为信托注入资金。或者，如果你不介意遗嘱认证的延迟或费用，可以仅在去世后以转让税务高效的方式通过信托分配资产。第三种选择是，你可以选择通过联名持有或受益人指定来传承所有财产，而仅将信托作为你在生前可能丧失心智能力时的备用文件。


    例如，假设你和配偶联名拥有大部分财产，包括房屋、支票账户、储蓄账户和投资账户。此外，假设你的退休计划和人寿保险单均指定配偶为主要受益人，并且你不担心你或配偶的遗产在去世时需缴纳转让税。在这种情况下，你可能希望设立一个可撤销生前信托，仅用于在你自己心智丧失时管理资产。若发生此情况，你可指定配偶为继任受托人，若配偶无法胜任，则可指定其他人（比如你最喜欢的兄弟）。由于你在心智丧失时将失去法律行为能力，你还必须授予配偶一份持久授权书，以便将财产转移至信托并规避遗嘱认证。（`持久授权书`将在本章后续讨论。）


    现在我们来看看婴儿潮一代面临的共同问题：如何支付父母的长护费用。'
- fmt: '# Dependent Parents


    Certainly, more issues are involved in caring for dependent parents other than
    paying for their long-term care expenses. (As a reminder, long-term care is defined
    in this context as daily care provided in a nursing home for a chronic medical
    condition.) Nevertheless, the payment of the ongoing expenses of a parent who
    cannot live alone independently or whom you, as a concerned child, cannot care
    for properly is a significant threat to your accumulated wealth. This is not to
    mention the additional emotional burden that taking care of a formerly able-bodied
    and responsible parent entails.


    As you know from the discussion of Medicare and Medicaid in Chapter [5](#A314864_2_En_5_Chapter.html),
    Medicare provides only a limited benefit for skilled nursing facility care; and
    although Medicaid does cover long-term care, qualifying is extremely difficult.
    Remember also that some states have filial statutes that may require you to take
    care of your parents’ long-term care expenses. In the absence of such a statute
    in your state, you are faced with the following options:


    1. The best option is that your parent or parents are financially educated enough
    to recognize the need for long-term care insurance and have previously purchased
    a long-term care policy. Unfortunately, many seniors do not recognize this need
    before they can no longer qualify for the coverage or the protection is so prohibitively
    expensive that they cannot afford it.

    2. The next best option, if your parents are likely to need long-term care but
    are unable to pay for the cost of the insurance themselves, is for you to buy
    the policy for them. The risk of this approach is that your parents may never
    need long-term care, and the expended premium dollars are lost forever.

    3. A close alternative to the second option is that you set aside money to pay
    for your parents’ long-term care needs. This option gives you more flexibility,
    because you do not lose the money if your parents do not need long-term care,
    but it means an added monthly or other periodic expense for which you have to
    budget.

    4. The least-best option is that you do nothing and then the need arises for long-term
    care for your parents. In this instance, you are likely to see the wealth your
    parents accumulated (and your potential inheritance) slowly depleted over the
    years, at the end of which Medicaid is the only option.


    As noted, the preferable option is that your parent does not place the burden
    of funding their long-term care on you. If they do, you should purchase a long-term-care
    insurance policy for your parent while they can still qualify for the coverage.
    You also need to consider how long an insurance benefit period you should purchase.
    Remember, the longer the benefit period, the greater the premium costs associated
    with the policy.


    You may wish to purchase a lifetime benefit period for your parent to be absolutely
    sure that proper long-term care will be there for them when they need it. You
    may also wish to purchase a higher-than-normal daily benefit as part of the policy
    (currently, the average cost of nursing-home care for a semiprivate room is approximately
    $270 per day). If you do purchase a high daily benefit (beyond the average $270
    per day), it is possible that you can make money from the policy. This is because
    you can pocket the higher daily benefit paid under the policy in excess of the
    actual daily cost charged by the facility. However, before you purchase such a
    high benefit, check with the insurance company or issuer of the policy, because
    such a motivation may be frowned on in your particular state.


    You also need to consider what Medicare will and will not cover when your parent
    reaches age 65. For example, although Part D of Medicare has been fully implemented
    and now covers the cost of most prescription drugs for your elderly parent, a
    privately owned policy may provide better coverage. In addition, many deductibles
    and co-insurance payments are associated with Medicare Part A (hospital insurance)
    and Medicare Part B (physician’s care) that you need to provide for.


    The preferable way to cover these costs is to purchase a supplementary health
    insurance policy, commonly referred to as a Medigap policy. All Medigap policies
    are standardized according to federal law, with Medigap Policy A constituting
    the least expensive and least comprehensive form of coverage, and Medigap Policy
    F constituting the most expensive and most comprehensive coverage. As such, the
    purchase of a Medigap policy means you or your parent are protected by federal
    regulations with respect to supplementary medical care, a fact that may be of
    some comfort to you. It is also important to note that you may purchase only one
    Medigap policy for your parent at any given time under current law. In addition,
    your parent may not be turned down for supplemental coverage, regardless of any
    preexisting, potentially disqualifying medical conditions, as long as they apply
    for such coverage within six months of reaching age 65.


    ## Claiming Your Parent as a Dependent for Income-Tax Purposes


    Under the provisions of the 2017 TCJA, a new credit of $500 is permitted, beginning
    in 2018, when caring for a dependent parent. The dependency rules are the same
    as that for the child tax credit just discussed. However, unlike the child tax
    credit, which is partially refundable, the dependent parent or nonchild dependent
    care credit is nonrefundable.'
