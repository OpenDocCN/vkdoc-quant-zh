  trans: '

    ### 银行存款


    许多保守型投资者将银行存款作为投资策略，不敢越雷池一步。这很可能是因为他们更倾向于相信，这些存款（在一定限额内）由联邦存款保险公司（FDIC）承保。由于近期的立法改革，所有非个人退休账户（IRA）的银行存款，每个账户的保险限额现已提高至
    `$250,000`（此前为 `$100,000`）。个人退休账户（IRA）的保险限额也为每位储户、每家银行 `$250,000`。


    存单（CD）可能是最流行的银行存款形式。存单也称为定期存款，短期存单是指将资金存入银行一段特定时间，通常为 3 到 12 个月不等。银行通常会为整个存单期限支付固定利率，且利率随期限延长而增加。如果您在存单规定的到期日之前将其赎回并兑换为现金，银行会以一次性费用或降低总利率的形式收取罚金。


    如果您有一大笔资金要投资（例如，从退休计划中获得的一次性分配），您可能希望购买多张存单，而不是只投资于一张存单。此外，为了获得尽可能多的 FDIC 保险，您可能希望在不同的银行分别购买这些存单。一种可行的投资策略是，对这些存单的到期日进行排序或梯次配置，以利用利率波动获利。例如，如果利率上升，将一笔投资分成两份
    6 个月期的存单（而不是一份 12 个月期的存单）可能是明智之举。当每份 6 个月期存单到期时，您就可以将其以更高的利率再投资，且无需支付罚金。


    许多人不知道，除了标准的储蓄账户外，银行还提供货币市场存款账户（MMDA）。货币市场存款账户的利率通常高于储蓄账户，但它也要求最低存款额和账户余额，以避免银行收费。通常，每月允许从该账户进行六次预先授权的转账，其中最多三次可以通过个人支票进行。与货币市场共同基金不同，货币市场存款账户受联邦保险，因此其应计利率可能略低于货币市场基金。


    尽管许多投资者通过其工作单位的工资扣款计划购买 EE 系列债券，但您也可以在银行机构购买这些债券。EE 系列债券又称储蓄债券，属于现金投资，必须按其面值的
    50% 购买，面值从 `$50` 到 `$10,000` 不等。该债券的价值保证在 20 年后翻倍，之后可以按固定利率再延长 10 年。储蓄债券的一个优势是，其所赚取的利息在到期或投资者赎回债券之前无需纳税，除非投资者选择按年计息。正如第
    15 章所讨论的，在为孩子的大学教育提供资金时，有一种特殊类型的 EE 债券，如果债券收益用于支付合格的教育费用，且父母的收入不超过特定的年度金额，则其利息完全免缴所得税。


    ### 货币市场存款


    在投资领域，“货币市场”一词指的是金融机构之间借入和贷出短期证券的市场。货币市场是与资本市场相对而言的，资本市场通常涉及期限较长或根本没有到期日的证券（如股票）的交易。银行和银行存款属于货币市场的一部分，但此处使用该术语是指通过经纪公司和共同基金公司获得的现金投资。


    大多数投资者都熟悉货币市场共同基金，哪怕仅仅是因为他们将这些基金用作应急资产，以及在资金投向其他领域之前作为中转站。与投资顾问或财务规划师合作，设立独立的、按资产收费的证券账户的投资者，通常会使用货币市场共同基金在不同投资之间进行资金“划转”。


    货币市场共同基金由共同基金公司提供，这些公司投资于高质量的短期投资工具，例如短期国库券、商业票据、银行回购协议和大额存单。基金的典型最低投资额为 `$1,000`，投资者可以随时通过电话提取资金，或者如果投资者拥有账户的支票签发权，也可以通过签发支票提取。大多数基金还允许所有者将资金从基金电汇至单独的银行账户。


    尽管货币市场共同基金缺乏 FDIC 的保险保障，但它们仍然是安全的，这主要是因为其所投资的资产质量很高。您也可以将资金投入免税货币市场基金，这类基金只投资于以市政当局的全部信用和征税权为后盾的短期市政证券。这种支持不仅提高了基金的潜在安全性，还可能增加您的税后回报，因为市政证券的利息通常免征联邦税（如果您是发行该证券的州或城市的居民，也可能免征州和地方税）。


    另一种您可能希望作为独立现金投资来考虑的货币市场存款是美国短期国库券（T-bill）。短期国库券以面值折价的方式出售，其利息部分（发行价值与面值之间的差额）免征州和地方税。短期国库券由美国财政部发行，面值为
    `$1,000`，到期期限分别为 4 周、13 周、26 周和 52 周。大多数投资者发现通过当地银行购买短期国库券更为便捷，但也可以在 [`www.treasurydirect.gov`](http://www.treasurydirect.gov)
    网站上在线购买。一级短期国库券市场是通过邮寄方式进行拍卖的。


    短期国库券作为基准短期利率的重要参考，其他所有短期利率（包括银行存单的利率）都是在此基础上确定的。由于美国政府为所有国债的发行（包括短期国库券）提供担保，因此人们常说短期国库券没有违约风险。因此，投资者在购买该债券时无需承担信用风险。但其他债务工具，如公司债券（甚至超出
    FDIC 限额的银行存单），情况则并非如此。因此，如果您想确定您的现金投资将获得何种短期利率，可以从 13 周短期国库券利率开始，然后为其加上大约半个百分点的信用风险溢价。


    与任何严肃的投资者一样，您不应仅局限于投资货币市场中的证券。然而，在财富积累过程中，您应确保始终在货币市场基金中保留一些资金（在投资界称为头寸）。如前所述，这主要是为了在发生财务紧急状况时保护自己，但也可能是因为您在场外观望，等待更广泛的资本市场条件改善。无论如何，请记住，货币市场用于短期现金投资，而资本市场则用于长期证券投资！

    '
- fmt: '# Bonds and When to Use Them


    Unlike stocks, in which you own an equity interest in the company issuing the
    stock, bonds are debt obligations. In other words, when you purchase a bond from
    an issuer—usually a corporation or government—you are making a loan to the issuer
    in exchange for the right to receive semiannual or annual interest payments from
    that issuer. Given that interest payments from bonds are paid on a predictable
    schedule, you should time the purchase of bonds to coincide with when you are
    interested in receiving regular income payments to assist with your ongoing cash
    flow. Of course, concomitant to this stream of income is the expectation that
    you do not need back your original investment (the principal of the bond) or loan
    to the issuer until some known date in the future, otherwise referred to as the
    maturity date of the bond.


    Generally speaking, the longer the time until the maturity date of the bond, the
    higher the interest or coupon rate of payment. This is because you are loaning
    your money to the issuer for a longer period of time and thus want a higher interest
    rate for doing so (known as a maturity premium). But be careful: the amount of
    interest you will earn depends on the interest rate payable by the bond, which
    is determined by a number of market-related factors, a measure of which is represented
    by something known as the yield curve. This curve is published regularly in financial
    newspapers such as the Wall Street Journal and tells you roughly how much more
    interest you are likely to receive the longer you commit your money to the issuer
    of the debt or bond. If this curve is relatively flat, you probably will not receive
    any investment reward for promising the issuer the use of your money for a longer
    period of time. As such, if the trend is a flat yield curve, do not invest in
    bond obligations with a maturity date of more than several years. Instead, reinvest
    your money in another bond issue when longer-term interest rates have increased—in
    other words, when the yield curve has turned normal or positive.


    ## Corporate Bonds


    Bonds are usually issued by a corporation or government. Corporations issue bonds
    in the form of a secured obligation, known as a mortgage bond, or an unsecured
    promise, known as a debenture. As an investor who may be concerned about not getting
    all of your original investment back at the bond’s maturity date (referred to
    as the bond’s default risk), you may want to limit your purchases only to mortgage
    bonds, because the corporation pledges property as collateral that may be sold
    in the event of the issuer’s default. However, commensurate with the investment
    risk/investment return trade-off, the yield on the bond (essentially, the income
    rate of return) is less on a mortgage bond than on a debenture, because you are
    assuming less risk of possible default.


    Corporations may issue bonds that are callable and convertible into stock. If
    the corporation issues a callable bond, that means it can pay off, or call, the
    obligation before its maturity date. Thus, you will get your money back sooner
    rather than later. However, this result is not as attractive as it may appear.
    The corporation has likely called the bond because market interest rates declined,
    meaning it is less expensive for the corporation to pay off the existing bond
    and issue another one at a lower interest, or coupon, rate of payment. As an investor,
    you are now confronted with reinvesting the bond proceeds at the current, lower
    interest rate. To protect investors who are relying on the security of a fixed
    payment from the bond, corporations usually issue bonds with a provision that
    they may not be called until a certain number of years have passed. Nevertheless,
    if you have to choose between a callable bond and one that is not, choose the
    noncallable bond.


    A convertible bond, on the other hand, gives an investor both the certainty of
    semiannual income payments and the opportunity for significant capital gains if
    the bond is converted into the underlying stock of the issuer. Actually, a convertible
    bond provides the investor with two opportunities for capital gains: not only
    is there the opportunity for underlying stock price appreciation, but as the stock
    increases in value, so does the price of the bond. For example, assume that a
    bond convertible into 30 shares of ABC common stock is issued at $1,000; and,
    at the time of issuance, ABC common stock is trading for $25 per share. If the
    price of ABC stock increases to $35 per share, the convertible bond now sells
    for at least $1,300 ($1,000 plus the $300 of appreciation in the value of the
    stock shares).


    The primary alternative to a convertible bond is a standard, or plain vanilla,
    bond, which is not convertible into the common stock of the issuer. A standard
    bond also may or may not be callable. Since 1998, Treasury bonds must be issued
    as noncallable, but this restriction does not apply to corporate bonds. However,
    given the fact that we are in a period of historically low interest rates, and
    interest rates generally have nowhere to go but up, the risk of a corporation
    actually calling a previously issued bond is low. Still, a noncallable and nonconvertible
    corporate bond carries the possibility of default.


    How do you minimize the default risk associated with noncallable and nonconvertible
    standard corporate bonds? The primary way is to invest only in investment-grade
    bonds, which are bonds of the highest quality or next-to-highest quality, as rated
    by one of several bond-rating organizations—notably, Standard & Poor’s or Moody’s
    Investors Service. These rating services are not infallible, but they can give
    you guidance in differentiating an investment-grade bond from a non-investment-grade,
    or high-yield, bond. (By the way: a high-yield, or “junk,” bond is not, by definition,
    a bad investment, although it does involve greater default risk than an investment-grade
    bond.) This is because the issuer of a high-yield bond has to offer the bond at
    a higher interest rate than an investment-grade bond, indicating that the issuer’s
    financial stability is weaker than that of a normal corporation.


    You can use Table [9-1](#A314864_2_En_9_Chapter.html#Tab1) to help determine what
    is and is not an investment-grade bond, according to Standard & Poor’s and Moody’s.
    Generally, you should purchase only investment-grade bonds, because they have
    the lowest default risk as determined by the rating agencies.


    **Table 9-1. Bond Ratings**


    | | Standard & Poor’s | Moody’s |

    | --- | --- | --- |

    | Investment grade | | |

    | Highest quality | AAA–AA | Aaa–Aa |

    | Next-to-highest quality | A–BBB | A–Baa |

    | Non-investment-grade | | |

    | Speculative | BB–B | Ba–B |

    | Default | CCC–D | Caa–C |

    | Overall range | AAA–D | Aaa–C |'
