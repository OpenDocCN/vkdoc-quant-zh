    ## 附录 E：个人指示信样本


    编写人：________________________


    这是由我本人编写的一份个人指示信，供我的个人代表（按我遗嘱指定）在我去世之日参考。虽然本信函不具有法律约束力，但它确实公平地代表了我去世之时的意愿，我请求我的个人代表予以尊重。


    此信函须在我的个人代表在我去世后立即阅读。


