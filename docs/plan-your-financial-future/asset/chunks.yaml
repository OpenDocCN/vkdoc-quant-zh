- fmt: '### Bonds as a Part of Your Portfolio


    It is a common misconception that as people age, they become more financially
    conservative, meaning that safety of principal and reliable income from that principal
    are paramount. Savvy investors—even retirees—know that protection of purchasing
    power and achieving an after-tax return in excess of inflation (a so-called real
    return) are just as important as safety of principal and preserving the value
    of the original investment. As mentioned when we discussed asset allocation in
    Chapter [3](#A314864_2_En_3_Chapter.html), an argument can be made for the inclusion
    of stocks and stock mutual funds in any retiree’s portfolio. However, bonds also
    play an important diversification role.


    Certainly, a primary relationship that you must understand before investing in
    an individual bond is that bond prices move in the opposite direction of market
    interest rates. Hence, if you believe that interest rates will probably decline
    in the future, you should have a position in bonds, because sizable capital gains
    are likely. This was proven in the bear market of late 2007 to mid-2009, when
    bond returns significantly exceeded that of stocks as interest rates declined
    at the same time. Moreover, if interest rates are likely to decline, you should
    also buy long-term bonds, because they will appreciate more in price than shorter-term
    issues.


    Beyond that, as the stock market exhibits volatility—seemingly random price movements
    up and down—bonds compete with stocks for investors’ money. If the stock market
    declines in price, investors seek a positive return and, more important, safety—and
    next to cash, there is no safer investment than a US Treasury security bill, note,
    or bond. Conversely, if the stock market increases in value consistently over
    time, investors prefer the higher returns of stocks, even though stocks carry
    more investment risk. Nevertheless, no matter your age, you should probably include
    some bonds or bond funds in your portfolio, because no one, including esteemed
    security analysts with many years of experience, can predict with absolute certainty
    whether the stock market is going to be up or down on any given day.


    As you explore your bond investment choices, you will probably need to decide
    between an investment in individual bonds and bond mutual funds, but be aware
    that they exhibit different characteristics. With an individual bond, if you hold
    the bond to maturity, you almost always get back your original amount invested
    plus interest. However, with a bond mutual fund, your total rate of return is
    uncertain, because the value of that fund constantly fluctuates.


    ## Stocks and When to Use Them


    Stocks represent an ownership or equity interest in a corporation. As a shareholder,
    you realize a return from a corporation’s earnings after it has paid all its creditors,
    including its bondholders. This return can come from a declaration of dividends
    each year by the corporation’s board of directors, from capital appreciation of
    the shares once the earnings are reinvested back into the corporation, or from
    both. Dividends are taxable to you, the shareholder, if they are declared for
    any given year and you receive them. Capital appreciation, on the other hand,
    is not taxable until you sell shares—and even then it is likely taxable at favorable
    rates if you have owned the shares for more than one year from the date you bought
    them.


    There are two forms of stock: common and preferred. The most widely held is common
    stock, which may or may not provide dividends, depending on whether a dividend
    is declared for that year by the corporation’s board of directors. Common stocks
    are highly marketable, because they can generally be bought and sold easily on
    publicly traded exchanges, such as the New York Stock Exchange. However, they
    are not very liquid, because the investor may or may not receive back their original
    investment. In fact, the value of common stocks may change significantly during
    the course of a single trading day. As a result, common stock can carry a significant
    amount of market risk—risk that can be minimized but not entirely eliminated by
    proper asset allocation and portfolio diversification.


    A major advantage of owning common stocks rather than bonds is the right to vote
    with respect to significant company matters, such as the election of the company’s
    board of directors. However, shareholders who do not own enough shares to be in
    a controlling position (more than 50 percent of the total outstanding shares)
    must join together as a block to influence the course of future action by the
    corporation. Even then, if the majority or the controlling shareholders think
    differently, it is unlikely that the minority shareholders’ views will be considered.


    Most individuals, particularly younger investors, do not purchase common stock
    for its income potential, but rather for its possibility of significant capital
    appreciation. In contrast, most investors purchase preferred stock for much the
    same reason that they purchase individual bonds: to generate income. The term
    preferred in preferred stock means that if a dividend is declared by the corporation’s
    board of directors, shareholders of preferred stock are first in line before any
    payment is made to the common shareholders. The preferred shareholder also receives
    payment before the common shareholder in the event of the corporation’s liquidation.


    Publicly traded stocks may be thought of in various ways, but most frequently
    they are categorized in terms of their market behavior, the sector or industry
    in which they are situated, and the size of the issuing company. Examples of categorizing
    stocks on the basis of their market behavior include the following:


    - Income stocks: These types of stocks consistently pay high dividends to the
    investor.

    - Growth stocks: These stocks exhibit considerable capital appreciation.

    - Value stocks: These stocks are perceived as currently undervalued in terms of
    price compared to their marketplace peers.

    - Defensive stocks: These stocks do not decline as much in a bear market as other
    stocks.

    - Cyclical stocks: These stocks are sensitive to current economic and market conditions.

    - Blue-chip stocks: These are stocks of the largest and oldest companies, including
    many of those on the Dow Jones Industrial Average—the most frequently quoted index
    of market activity.'
