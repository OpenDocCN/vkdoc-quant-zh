  trans: '

    ### 第 403(b)条退休计划


    `第 403(b)条`计划，也被称为避税年金，是`第 401(k)条`计划在功能上的等效版本，适用于在特定非营利雇主处工作的员工，例如公立或私立学校、教会及部分医院。`403(b)`计划允许的最高年度薪资减额供款通常与`第
    401(k)条`计划的规定相同，雇主必须遵守的非歧视规则也基本一致。如今，越来越多的非营利雇主开始匹配员工做出的薪资减额供款（从历史上看，许多`403(b)`计划仅由员工薪资减额提供资金，而无雇主匹配）。


    然而，`403(b)`和`401(k)`退休计划也存在差异。只有特定的非营利雇主（根据相同编号的《国内税收法》章节，称为`501(c)(3)`组织）才能实施`403(b)`计划。如上所述，这些雇主包括学校和教会，因此，如果你是公立中小学的教师，你很可能拥有的是`403(b)`计划，而非`401(k)`计划。我在这里用了“很可能”一词，是因为越来越多的非营利雇主开始实施`第
    401(k)条`计划，或替代性的`第 401(a)条`计划，并将其添加到`第 403(b)条`计划中，或直接替代它。


    为什么非营利雇主越来越多地采用`第 401(k)条`计划来替代`第 403(b)条`计划？首先，`第 401(k)条`计划通常比`第 403(b)条`计划提供更多的投资选择。例如，`第
    403(b)条`计划必须投资于固定或可变年金或共同基金，不能投资于个股或债券。因此，如果你是一名符合条件的非营利员工，并且喜欢“炒市场”，`第 403(b)条`计划会限制你的投资选择。`第
    401(k)条`计划的另一个优势是，它允许参与者在选择一次性领取分配款时，享受特殊的所得税处理方式。这种被称为十年平均税率处理的特殊选择，允许 1936 年之前出生的`401(k)`计划参与者，将一年内一次性分配款的所得税负担，视为分十年支付，从而显著降低其税单。此选项不适用于`第
    403(b)条`计划的参与者。


    除了`401(k)`计划的这两项优势外，`403(b)`可能是两者中更有利的。我们不会讨论其他技术原因，但`403(b)`计划通常因一个主要原因而胜过`401(k)`：你越接近计划的退休日期，你就能向`403(b)`计划存入更多的钱。例如，如果你作为非营利员工，在同一家或其他符合条件的雇主处工作至少
    15 年，你除了正常的缴款限额外，每年还可能向该计划额外缴款高达`$15,000`。这样一来，你可以尝试弥补在你 30 多岁和 40 多岁时那些你没有或未能为退休做足储蓄的年份。你无法通过`401(k)`计划做到这一点，因为特殊的年度补缴例外条款并不适用。


    ### 其他退休计划


    第 16 章在我们讨论退休时分配财富时，会探讨其他雇主赞助的退休计划和个人退休账户（IRA）；但有些雇主会提供除`第 401(k)条`和`第 403(b)条`计划之外的其他计划。如果他们确实提供，可能会允许你以税后基础向这些计划供款。这些通常被称为指定罗斯账户。这看起来可能不是你想做的事，特别是如果你已经用尽了`401(k)`或`403(b)`计划的税前供款额度，但请考虑这一点：如果你向任何雇主资助计划存入税后资金，那么你无需为该计划分配的任何这些资金（包括收益）缴纳所得税。此外，指定罗斯账户的供款限额远高于罗斯
    IRA 的供款限额。因此，如果你有机会向雇主资助计划进行税后供款并且有能力这样做，你应该去做。


    ## 公司股票购买计划


    公司股票购买计划主要有两种类型：员工持股计划（ESOP）和员工股票购买计划（ESPP）。这两种计划都允许员工购买并拥有雇主的股票，不过，顾名思义，只有员工持股计划（ESOP）才允许将控股权转移给员工。


    如果你为一家公司或企业实体工作，雇主可能已经设立了员工持股计划。另一方面，非法人企业，例如独资企业或合伙企业，则不能设立员工持股计划，因为这类企业没有股票。


    那么，什么是员工持股计划（ESOP）？它是一种旨在主要投资于雇主股票的退休计划。一些封闭持股（非公开交易）的公司也会设立员工持股计划，为原本流动性不强的雇主股票提供一个市场。因此，当一家公司设立员工持股计划时，其员工就成为了这个市场，并最终成为这家封闭持股企业的所有者。


    除了成为自己所服务公司部分所有者的福利之外，向员工持股计划供款还有另一个主要优势：你现在拥有一个税收优惠的退休计划，可以为自己的退休生活储蓄。此外，一旦在退休时雇主股票分配给你，在你出售这些股票之前，你无需为股票的增值额（技术上称为未实现净增值，简称
    NUA）缴纳任何资本利得税。此后任何进一步的增值，如果你持有该股票至少一年，则按优惠的长期资本利得税率征税。


    与员工持股计划（ESOP）不同，员工股票购买计划（ESPP）仅仅是一种让你在优惠条件下拥有雇主股票的方式。员工股票购买计划通常不被设计为退休计划，而是作为一种员工投资选择，赋予员工在未来某个日期以不高于当前公开交易价格的价格购买公司股票的权利。如果在该项权利授予之时与员工购买股票之时股票价格上涨，员工可以选择以较低或折扣的价格购买股票。员工股票购买计划在税收优惠方面通常与员工持股计划相同。


    尽管公司股票购买计划能为员工提供诸多福利，但作为员工持股计划或员工股票购买计划的一部分，持有过多雇主股票存在一个根本性的劣势。这个劣势是伴随员工持股计划和员工股票购买计划而来的内在缺乏投资组合多样化，因此，如果公司的财务前景下滑（或者像安然公司那样发生清算），你将剩下价值极低的资产。为避免这个问题，你应该回到第
    3 章讨论的基本资产配置原则，确保除了雇主的股票外，你还将投资分散到了其他资产中。如果你怀疑自己并未达到应有的多元化程度，并且持有的雇主股票占你投资组合的总比例过高（例如，超过你净资产的一半），我建议你尽快咨询你的投资顾问。

    '
- fmt: '# Stock Options and Other Forms of Incentive Compensation


    This last section about optimizing your employment benefits probably best pertains
    to corporate executives, because they are most likely to be offered employer stock
    options and other forms of incentive compensation. If you are such an individual,
    you should know that two main types of stock options are used to compensate executives:


    - Incentive stock options (`ISOs`)

    - Nonstatutory, or regular, stock options (also known as nonqualified stock options,
    or `NQSOs`)


    Both are primarily used by larger, publicly traded corporations. Neither `ISOs`
    nor `NQSOs` are used much by closely held corporations, including family businesses
    operated as corporations, because the few owners of a closely held corporation
    typically do not want unrelated outsiders, or even executives, as additional owners.


    An `ISO` plan is a tax-favored, written arrangement for compensating executives
    by awarding options to buy employer stock. Unlike regular stock options, `ISOs`
    generally do not result in regular taxable income to the executive either at the
    time of the grant or at the time the executive exercises the option (purchases
    the employer stock for which the option was granted). In other words, there is
    no regular taxable consequence to the executive until they sell the employer stock,
    the timing of which is completely at the executive’s discretion.


    The favorable income-tax consequence associated with `ISOs` is not available with
    `NQSOs`, which are much more prevalent than `ISOs`. When the executive exercises
    a regular stock option (purchases the employer stock), they have taxable compensation
    income to the extent of the difference between the fair market value of the shares
    at the date of purchase and the greatly discounted option price. This is known
    as the bargain element. At this time, the employer must also withhold and pay
    Social Security tax and Medicare tax with respect to this compensation income.


    Why, if the tax consequences are much more favorable for the executive with an
    `ISO` than a regular stock option, is the regular stock option much more prevalent?
    There are two reasons:


    - At the time of exercising the `ISO`, the executive incurs an individual alternative
    minimum tax (`AMT`) consequence—an exceedingly disadvantageous tax requiring the
    taxpayer to pay a greater amount than the already high regular tax liability.

    - Unless extraordinary circumstances occur, the employer or company that grants
    the `ISO` to an executive does not ever receive a corporate income-tax deduction
    for the compensation, thereby potentially disrupting the cash flow of the company.


    If you are an executive holding a regular stock option or numerous options, you
    can anticipate that, at the date of exercising these options, there will be income
    tax due. So, what do you do if you do not have the cash or other liquid assets
    necessary to pay this tax? A viable planning strategy is to undertake what is
    known as a cashless exercise of options, which takes place in three steps:


    1. Exercise the regular option or options at the specified date, and borrow from
    a stockbroker the money needed to exercise the options.

    2. Simultaneously sell at least the number of shares necessary to cover any costs,
    including taxes due on the exercise of the options and any broker’s commission
    that is charged on the sale of the shares.

    3. Ask your employer to pay you the net amount remaining after the sale of the
    shares in cash or stock and then retain any additional shares for a subsequent
    sale date of your own choosing.


    Another planning alternative is to defer the taxation of these options by combining
    the options with a subsequent agreement entered into with your employer that restricts
    your access to the shares purchased until a later time, such as your planned retirement
    date.


    ## Restricted Stock


    Recently, more executives have been receiving incentive compensation in the form
    of restricted stock instead of employer stock options. This trend is taking place
    partially because of the corporate abuses that have occurred with options, including
    the backdating of the exercise date of options to a more favorable time for the
    recipient. There is also a more technical reason for this trend: under general
    accounting rules, corporations must now account for the value of these options
    (known as expensing the options) on their income statements. In turn, this reduces
    corporate earnings and, ultimately, perhaps the value of the company’s publicly
    traded stock to its shareholders. As a result, if you are an executive, do not
    be surprised if you are now offered a restricted stock incentive-based compensation
    arrangement instead of employer stock options. Employers may also adopt a restricted
    stock plan to keep you from going to work for a competitor, specifically providing
    that if you leave the company for a rival business, your right to receive the
    stock at little or no cost is lost.


    The taxation of restricted stock to an executive is essentially similar to that
    of the exercise of a regular stock option. When the restriction expires, the difference
    between the fair market value of the stock when substantially vested and what
    was paid for it, if anything, is taxable compensation income. However, there is
    something you can do immediately to limit the amount of tax you might end up owing
    when you exercise the restricted stock. If you make a special tax election (commonly
    referred to as a `Section 83(b) election` after the Internal Revenue Code section
    of the same number) to recognize income as of the date you receive the restricted
    stock rather than when the restriction expires, any subsequent appreciation in
    the value of the stock is treated as capital gains income and is potentially taxable
    at a much lower rate.


    For example, assume that you received restricted stock in the year 2014, when
    its publicly traded value was $35 per share. You paid nothing for this stock.
    Further, assume that you anticipate that, with your efforts, the value of this
    stock will be $85 per share five years from now (in 2019), which is also the date
    when the restriction of the stock expires. If you make the `Section 83(b) election`,
    you will have $35 of compensation income in 2014, but $50 of capital gains income
    ($85 less $35) in 2019, which is taxable at a much lower rate (currently, no more
    than 20 percent). Compare this to $85 of compensation income in 2019, which is
    currently taxable at a rate as high as 37 percent, and you can see why making
    a `Section 83(b) election` may be a prudent planning technique.


    But be careful! What happens if you leave the company and forfeit the stock before
    2019 but previously had made the `Section 83(b) election` in 2014? In that case,
    you are not permitted to go back and amend your 2014 tax return to claim a $35
    per share loss. That’s right: you are gambling that the stock will increase in
    value from the date you make the election and that you will not leave the company
    prior to the restriction expiring!'
