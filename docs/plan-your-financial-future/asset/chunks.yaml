  trans: '

    # 个人指示函


    一份常常被忽视但可在你去世后协助分配遗产的重要文件，便是个人指示函。这是一份你写给遗嘱执行人的非正式文件，提醒他们在你去世后联系特定人士并完成某些事项。此类信函通常还会指引执行人找到你遗嘱的原件、你所设立的任何信托文件、授权委托书表格以及生前预嘱。信中还应说明你希望如何处理身后事，以及任何其他特殊愿望，例如器官捐赠。


    需要明确的是，你无需采用任何特定格式起草个人指示函，也无需聘请律师代为起草。实际上，信函的形式和内容仅受限于你当前及可预见的情况（或许还有你的创意能力）。附录
    E 中附有一份律师在其财务与遗产规划实践中使用的个人指示函范本。


    ## 何时应修改我的遗产规划？


    你应定期审视遗产规划文件，以考虑目标是否有所改变。作为本章结尾，以下是一些可能促使你考虑修改遗产计划、修订现有遗嘱或信托、或完全重写这些文件的重要事件：


    - 你从一个州搬迁至另一个州。在此情况下，最好让新居住州的持牌律师审查你的遗嘱或任何其他遗产规划文件。

    - 你的家庭状况发生重大变化，例如新子女出生或指定或预期的遗产受益人死亡。

    - 你选择的遗产执行人或监护人无法继续履职。

    - 你属于高净值人士，且自遗产计划实施后，遗产税或赠与税法发生了重大变化。

    - 在起草遗产规划文件后，你获得了大额遗产（或应税财产数量发生其他重大变化）。

    - 自首次实施计划以来，任何其他重要的分配或遗产规划目标发生了改变。


    在修改计划或文件时，明智的做法是寻求财务规划师或遗产规划律师（或两者）的帮助。


    现在让我们转向慈善捐赠的技巧，这是许多人（尤其是高净值人士）常见的遗产规划目标。慈善与慈善规划主题十分广泛，值得单独用一章来探讨。我们首先从如何选择受益于你慷慨捐赠的慈善机构的角度来审视这一话题。然后，讨论如何最佳地构建生前赠与或遗嘱遗赠以使该慈善机构受益。


    # 20. 慈善捐赠


    我们以探讨许多人（尤其是无子女的已婚夫妇或未婚人士）常见的财务规划目标来结束对财富积累与管理的讨论：即在去世时或生前，使所选慈善机构受益。


    在开始这一重要讨论之前，请允许我提一个警示：大多数纳税人知道，政府对纳税人生前进行的慈善捐赠提供所得税扣除。虽然利用这项扣除是一种有价值的避税技巧，但你不应让减税的欲望压倒实际的现金流管理。换言之，即使允许慈善所得税扣除，但如果此笔转赠会危及你维持生活水平的能力，你也不应向慈善机构进行转赠。你的分析应恰恰相反：如果在任何一年中你无力进行慈善捐赠，就不要做这样的捐赠。此外，尽管你可能认为这并非公平的税收政策，但法律规定，你必须在能够列举所得税扣除项目后，才能扣除任何慈善捐赠。即使在
    2017 年《减税与就业法案》通过后，情况依然如此。如果你无法逐项列举扣除额，那么你只能从向所选慈善机构捐赠中获得内心的满足。


    ## 选择受益的慈善机构


    就所得税而言，合格的慈善组织分为两类：公共慈善机构（亦称 50%限额慈善机构）和私人慈善机构（亦称 30%限额慈善机构）。这些慈善机构的百分比名称来源于你作为捐赠人，在捐赠当年可从调整后总收入（AGI）中扣除的最高限额比例。例如，假设你决定在当前纳税年度向美国红十字会捐赠
    5 万美元，以救助近期飓风的受害者。但你在 IRS 表格 1040 上申报的当年 AGI 仅为 8 万美元。因此，你在本纳税年度允许的这项捐赠的逐项扣除额上限仅为
    4 万美元（8 万美元乘以 0.50）。剩余的 1 万美元必须结转到后续年度扣除，最长可达五年，但前提是结转年度的 AGI 至少为 2 万美元（2 万美元乘以
    0.50）。


    另一方面，就转让税而言，无论你受益于哪类慈善机构，均无应税差异。无论慈善机构是公共还是私人性质，你都可获得无限额扣除，扣除额等于你在死亡时或生前转移给指定慈善机构的财产价值。但请记住，如果你希望在将财产转让给慈善机构之前，也先让非慈善受益人（例如你自己）受益，你必须通过税法规定的特定形式来实现。这种类型的转让被称为分割利益赠与。如果你未以批准的形式进行此类转让，则不允许享受转让税的慈善扣除。


    例如，假设你希望在去世时通过捐赠产生收入的财产来使母校受益。但在你生前，你需要这些财产的收入来维持当前的生活水平。根据现行税法，你必须以仅有的几种允许方式之一来构建这种分割利益转让，包括私人信托转让（通常称为慈善剩余信托）或通过母校先前设立的资金池（通常称为集合收入基金）。

