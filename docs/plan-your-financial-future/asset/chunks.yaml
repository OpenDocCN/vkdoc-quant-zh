- fmt: '### QPRT


    Now let’s move on to the second planning technique involving a vacation home:
    the Qualified Personal Residence Trust (`QPRT`). In a `QPRT`, the vacation home
    must definitely be used as a second personal residence. As such, you cannot rent
    out the vacation home for any period of time during the year. As a result, if
    you subsequently establish a `QPRT` and make the vacation home part of its corpus
    or principal, you may potentially exclude the fair market value of the home from
    your gross estate and avoid estate tax on that value.


    The mechanics of the `QPRT` technique are as follows:


    1.  Establish a `QPRT` with the assistance of an estate-planning attorney.

    2.  Retitle the vacation home in the name of the trustee of the `QPRT`.

    3.  Provide for your right to use the home for a period of years. Be aware: if
    you die during the period of time when you have the right to use the home, the
    value of the home at your death will be included and taxed as part of your gross
    estate.

    4.  Transfer the title to the home at the end of this period of reserved use to
    a separately named trust beneficiary or beneficiaries (typically, your adult child
    or children).


    It is also possible to stipulate that the trust beneficiary lease the vacation
    home back to you at the end of the reserved period. In this instance, although
    the value of the home will be excluded from your gross estate, the trust beneficiary
    will have to report taxable lease income. Nevertheless, you can further reduce
    your gross estate by the amount of the lease payments you are making. For example,
    assume that you are 65, are in a high marginal estate-tax bracket, and establish
    a `QPRT`, funding it with a vacation home as the corpus of the trust. You reserve
    the right to use the vacation home for a period of 15 years, or until you turn
    80. If you die before age 80, the fair market value of the home is included in
    your gross estate. But if you survive the term of the trust, the value of the
    home is totally excluded from your gross estate. In addition, if you still wish
    to use the home, you can enter into an arm’s-length rental arrangement with a
    family member as the trust beneficiary when you turn 80.


    Carefully consider the practical consequences of establishing a `QPRT`. If you
    establish the trust and do not outlive the trust term, you are in no worse taxable
    shape than you would be if you had done nothing. Therefore, for only the cost
    of establishing the trust, you can possibly enjoy a sizable potential estate-tax
    savings. In addition, you have also defended your wealth from one of the often-cited
    primary threats to its distribution at your death: the imposition of taxes.


    ## Investing a Windfall: So You Won the Lottery!


    There are ways you could come into unexpected money or experience a windfall other
    than winning the lottery. Among these is the receipt of a substantial inheritance,
    the awarding of an unexpected bonus, or the settlement of a sizable lawsuit in
    your favor. Still, when most people hear the term windfall, they think of winning
    the lottery. What do you do after you learn that you hold the lucky winning numbers
    resulting from an investment of only a dollar or two?


    The following are three commonsense tips to be used in managing unexpected wealth:


    *   Do not tell anyone—most of all, do not tell the media! This will allow you
    to make important financial decisions about how to invest the windfall without
    everyone telling you what you should do with the money. The obvious exception
    to this rule is that you do want to consult with financial and legal professionals
    about how best to invest the money.

    *   Decide how best to receive the money—that is, in a lump sum or over time.
    If you tend to be a spendthrift, structure the payment so it is received over
    time. Alternatively, if you consider yourself a pretty good investor and saver,
    you may wish to take the lump sum. Regardless, both forms of payment are immediately
    income-taxable, so you will receive a greatly reduced after-tax amount.

    *   Invest the money, at least for the time being, in a money market mutual fund
    or savings account that you can easily access without fear of losing any principal.
    This will enable you to meet with a financial expert with respect to how you should
    invest the money for both your short-term and long-term needs. Further, it should
    help you avoid making any immediate bad investment decisions when your judgment
    may be clouded by the excitement of coming into so much money.


    Remember a basic rule of debt management: pay off high-interest debt immediately,
    such as credit card interest. With such a significant windfall of money, you should
    be able to get rid of your credit cards entirely and pay cash for all future expenses.


    This chapter concludes the section of this book that discusses how to distribute
    your accumulated wealth during your lifetime. Of course, one inevitable event
    remains in anyone’s lifetime: their death. This brings us to the next section
    of the book, which covers distributing your wealth at death, and the topic of
    estate planning.


    # Part VI

    Distributing Wealth at Death


    # 19. Estate Planning


    We have now reached the last stage in a person’s financial life (and physical
    life, for that matter): death. In this chapter, we discuss how to distribute wealth
    to your spouse, family members, or other specified individuals or charities when
    you die. Estate planning and the distribution of an individual’s assets at death
    may best be thought of as the second component in the last step of the PADD process:
    distributing your lifetime accumulation of wealth at death so as to benefit others.


    Most people think of estate planning as a lifetime mission to avoid the possible
    imposition of sizable (some would say punitive) estate taxes, but estate planning
    is much more than that. More properly, the process can be described as the efficient
    distribution of an individual’s property to the person’s heirs or beneficiaries
    in the proper amount at the proper time. The proper amount in this context means
    generally whatever distribution among your heirs is the most preferable; however,
    the term takes on special meaning for high-net-worth individuals, who must distribute
    the assets of their estate in a transfer-tax-efficient manner. Meanwhile, the
    proper time is not only at the decedent’s death, but also when they are still
    alive. Lifetime gifting is a prudent and effective way to distribute your wealth
    on a trial basis to see how your intended heirs manage and use the property you
    give them. If you do not like the way your intended beneficiaries are using the
    assets you have gifted them, in most cases you have the opportunity to amend your
    estate plan.


    As a general rule, everyone should prepare certain estate-planning documents regardless
    of whether they believe they will owe any estate taxes at death. Among the estate-planning
    documents that almost all individuals should have are these:


    *   A last will and testament

    *   A financial durable power of attorney

    *   A medical or health care durable power of attorney (also known as a health
    care proxy)

    *   A declaration as to medical and surgical treatment (commonly referred to as
    a living will)

    *   A personal letter of instructions


    We begin our discussion of these documents specifically and the estate-planning
    process generally with the last will and testament.'
