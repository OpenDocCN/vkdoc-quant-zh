- fmt: "### Nonqualified Deferred Compensation\n\nWe end this chapter with an employee\
    \ benefit that is available only to a select few—the very top echelon of many\
    \ corporations and businesses. This benefit is a nonqualified deferred compensation\
    \ agreement, commonly funded with life insurance or securities made payable only\
    \ to the executive or their family.\n\nNonqualified deferred compensation is not\
    \ that far removed from the employer-sponsored retirement plans in which many\
    \ of us participate. Both arrangements are really forms of setting aside current\
    \ compensation to be paid out later, typically at the employee’s retirement date.\
    \ However, employer-sponsored retirement plans generally have to be available\
    \ to all employees, regardless of compensation level and employment status (an\
    \ exempt or nonexempt employee for purposes of labor law). In contrast, nonqualified\
    \ arrangements may discriminate in favor of whomever the employer chooses. Usually,\
    \ these favored employees are the CEO and senior management of the company.\n\n\
    If you are lucky enough to be offered any of the several forms of nonqualified\
    \ deferred compensation, such as a `rabbi trust`, be sure you do not sacrifice\
    \ your future benefit security for a current tax advantage. For example, although\
    \ a mere promise from an employer that it will pay your deferred compensation\
    \ at some point in the future achieves tax deferral, you will have sacrificed\
    \ payment of your current compensation needlessly if the employer goes out of\
    \ business in the future. Fortunately, there are ways to accomplish both objectives.\n\
    \nMost deferred-compensation arrangements must be drafted by skilled legal counsel.\
    \ The risk that you, as a valued executive, will not be adequately protected by\
    \ your corporate legal office or an outside law firm is, therefore, relatively\
    \ small. Nevertheless, it is always important to remember that the corporate legal\
    \ office primarily represents the business; it represents you as an employee only\
    \ secondarily. As such, you may wish to secure your own attorney and financial\
    \ planner to advise you on how best to proceed.\n\nThis chapter concludes our\
    \ look at the first part of the `PADD` process of financial planning: that of\
    \ protecting yourself, your family, and your property. We now move on to the second\
    \ part of the process, accumulating wealth, and begin by considering the advantages\
    \ and disadvantages of investing in financial assets such as stocks, bonds, and\
    \ mutual funds.\n\n# Part III  \nAccumulating Wealth\n\n# 9. Investing in Financial\
    \ Assets\n\nThere are two basic categories of investment assets: financial assets\
    \ and real assets. For the purposes of this chapter, however, we will be discussing\
    \ what most people think of when the term investment is mentioned: financial assets,\
    \ such as stocks and bonds denominated and traded in US dollars. To be properly\
    \ diversified in financial assets, many financial planners recommend some exposure\
    \ to foreign markets or assets denominated and traded in local (non-US-dollar)\
    \ currencies in addition to maintaining holdings in more traditional investments.\
    \ But even if investors invest in an American Depository Receipt (`ADR`) of foreign\
    \ stock, they need to understand that there is a currency or exchange risk when\
    \ converting the proceeds from a foreign stock into US dollars. This is in addition\
    \ to other systematic risks that are assumed when accumulating wealth via financial\
    \ assets.\n\nWhy, with all the inherent risks we discuss in this chapter, should\
    \ you invest in financial assets? The reason is simple: to generate an investment\
    \ return, you have to assume some form of investment risk. For example, some investors\
    \ believe that if they hoard cash and stuff it in a mattress in their basement,\
    \ they are immune to investment risk—but this is not true. Because of inflation\
    \ (also known as purchasing power risk), when the investor is ready to spend the\
    \ cash years later, they will not have as much money (purchasing power) as when\
    \ the cash was first stuffed in the mattress.\n\nThe key to investing in financial\
    \ assets and to accumulating wealth generally is to assume as little investment\
    \ risk as possible in order to generate as great an investment return as possible.\
    \ The methods required to do this are the subject of another book—probably several\
    \ books—but any serious investor should understand the risk/return relationship\
    \ and structure their portfolio accordingly.\n\n## Cash Investments and When to\
    \ Use Them\n\nYou may think you know what is meant by the term cash—namely, that,\
    \ in the United States, it is green and tangible (you can see and touch it). However,\
    \ in the investment and financial-planning world, cash has a specific meaning.\
    \ It refers to investments that possess a high degree of liquidity with little\
    \ or no risk to principal (the sum of money that you originally invest). Many\
    \ planners use the term `cash equivalents` to differentiate a cash investment\
    \ from the more general “green and tangible” definition.\n\nIn general, cash investments\
    \ are short-term (not more than 12 months in maturity) interest-bearing securities\
    \ and deposit accounts. As such, cash investments include not only bank deposits,\
    \ such as savings accounts, short-term certificates of deposit (`CDs`), and money\
    \ market deposit accounts, but also investments that are made in the money market,\
    \ including money market mutual funds, corporate commercial paper, and US Treasury\
    \ bills (`T-bills`). Sometimes, nonmarketable investments, such as the purchase\
    \ of US government Series EE bonds, are also included among cash equivalents.\
    \ None of these investments generate a great deal of investment return, but they\
    \ are liquid, which is a fundamental attribute of cash equivalents."
