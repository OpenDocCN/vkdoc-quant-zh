- fmt: '# Durable General and Financial Power of Attorney


    I, `_____(Name)_______`, currently of `__(City and State)___`, do hereby execute
    this durable general (and financial) power of attorney with the intention that
    the attorney-in-fact hereinafter named shall be able to act in my place in all
    matters.


    ## Section 1: Designation of Attorney-in-Fact


    1.01: I constitute and appoint `_____(Name) _____`, currently of `_____(City and
    State)_____`, to be my attorney-in-fact to act for me, in my name and for my benefit.


    1.02: In the event that `_____(Name) _____` for any reason shall fail to act or
    continue as my attorney-in-fact, I constitute and appoint `_____(Name) _____`,
    currently of `_____(City and State)_____`, to act as my attorney-in-fact.


    ## Section 2: Effective Date of Power of Attorney


    2.01: This General Power of Attorney shall be effective immediately, and shall
    not be affected by my disability or lack of mental competence, except as may be
    provided otherwise by an applicable state statute.


    2.02: This General Power of Attorney shall not be affected by my incapacity or
    disability, it being my specific intention that my attorney-in-fact shall continue
    to act as such, even though I may not be competent to ratify the actions of my
    attorney-in-fact.


    2.03: Third parties may rely on the representations of my attorney-in-fact as
    to all matters relating to any power granted to my attorney-in-fact, and no person
    who may act in reliance upon the representation of my attorney-in-fact shall incur
    any liability to me or my estate as a result of permitting my attorney-in-fact
    to exercise any power. Further, I authorize my attorney-in-fact to indemnify and
    hold harmless any third party who accepts and acts under this document.


    2.04: This power is revocable, provided that insofar as any governmental agency,
    bank, depository, trust company, insurance company, other corporation, transfer
    agent, investment banking company, or other person is concerned, who shall rely
    on this power, may justifiably rely on the power. This power may be revoked only
    by a notice in writing executed by me or my attorney-in-fact and delivered to
    such person or institution.


    2.05: This power shall not be revoked or otherwise become ineffective in any way
    by the mere passage of time, but rather shall remain in full force and effect
    until revoked by me or my attorney-in-fact in writing, as provided in paragraph
    2.04 hereof.


    ## Section 3: Powers


    3.01: My attorney-in-fact shall have all of the powers, discretions, elections,
    and authorities granted by statute, by common law, and under any rule of Court.
    In addition thereto, and not in limitation thereof, my attorney-in-fact shall
    also have the powers set forth below.


    3.02: My attorney-in-fact may collect and receive, without the institution of
    a legal cause of action, all debts, monies, gifts, objects, interest, dividends,
    annuities, and demands that now are due or may hereinafter become due, owing or
    otherwise payable to or belonging to me. My attorney-in-fact may use and take
    all lawful actions in my name or otherwise to recover the same or to compromise
    the same.


    3.03: My attorney-in-fact may sell, convey, lease, exchange, mortgage, pledge,
    release, or otherwise deal with, dispose of, exchange, or encumber any of my property,
    either real or personal. This shall include the power to borrow money or otherwise
    obtain credit, upon such terms, conditions, and covenants as my attorney-in-fact
    considers as appropriate.


    3.04: My attorney-in-fact may appear on my behalf in any litigation in which I
    am or may become a party during the duration of this General Power of Attorney.


    3.05: My attorney-in-fact may give discharges, releases, consent, and receipts
    on my behalf.


    3.06: My attorney-in-fact shall have the power to deposit funds in my name in
    any banking or savings institution or in any money market account, whether or
    not insured.


    3.07: My attorney-in-fact shall have the power to pay any and all bills, accounts,
    claims, and demands now due by me or becoming due by me subsequent to the execution
    of this General Power of Attorney.


    3.08: My attorney-in-fact may endorse all checks drawn to my order for deposit
    in any account in which I have funds on deposit or in any new account opened in
    my name.


    3.09: My attorney-in-fact shall have the right to make gifts of cash or property
    in kind to any person or institution in connection with any estate planning that
    needs to be completed or to carry out any beneficial intent of mine as he/she
    may understand it.


    3.10: My attorney-in-fact shall have the power to transfer or surrender any securities
    that I may own. In connection therewith, my attorney-in-fact may execute in my
    name or on my behalf any stock power or other instrument in order to implement
    any such transfer or surrender.


    3.11: My attorney-in-fact shall have the power to enter into or renew any agency
    or custodian agreement with any bank or trust company at my expense for the investment
    or safekeeping of any property.


    3.12: My attorney-in-fact shall have unrestricted access to, and the right to
    enter into, any safety deposit box, vault, or other depository that I may own
    or may be registered in my name.


    3.13: My attorney-in-fact shall have the power to prepare, make, execute, and
    file any and all Federal, State, local, or other tax returns, claims for refunds,
    or declarations of estimated tax. This power shall include the power to represent
    me (directly or indirectly through other agents) in any matter before the Internal
    Revenue Service or any other Federal, State, or local agency.


    3.14: My attorney-in-fact shall have the power to execute, seal, acknowledge,
    and deliver any instruments, documents, or papers deemed necessary, advisable,
    or expedient with respect to any property.


    3.15: My attorney-in-fact shall have the power to hold, invest, reinvest, and
    otherwise deal with and manage all property in which I may have any interest and
    wherever situated.'
  raw: '## Durable General and Financial Power of Attorney


    I, _____(Name)_______, currently of __(City and State)___, do hereby execute this
    durable general (and financial) power of attorney with the intention that the
    attorney-in-fact hereinafter named shall be able to act in my place in all matters.


    ### Section 1: Designation of Attorney-in-Fact


    1.01: I constitute and appoint _____(Name) _____, currently of _____(City and
    State)_____, to be my attorney-in-fact to act for me, in my name and for my benefit.


    1.02: In the event that _____(Name) _____ for any reason shall fail to act or
    continue as my attorney-in-fact, I constitute and appoint _____(Name) _____, currently
    of _____(City and State)_____, to act as my attorney-in-fact.


    ### Section 2: Effective Date of Power of Attorney


    2.01: This General Power of Attorney shall be effective immediately, and shall
    not be affected by my disability or lack of mental competence, except as may be
    provided otherwise by an applicable state statute.


    2.02: This General Power of Attorney shall not be affected by my incapacity or
    disability, it being my specific intention that my attorney-in-fact shall continue
    to act as such, even though I may not be competent to ratify the actions of my
    attorney-in-fact.


    2.03: Third parties may rely on the representations of my attorney-in-fact as
    to all matters relating to any power granted to my attorney-in-fact, and no person
    who may act in reliance upon the representation of my attorney- in-fact shall
    incur any liability to me or my estate as a result of permitting my attorney-in-fact
    to exercise any power. Further, I authorize my attorney-in-fact to indemnify and
    hold harmless any third party who accepts and acts under this document.


    2.04: This power is revocable, provided that insofar as any governmental agency,
    bank, depository, trust company, insurance company, other corporation, transfer
    agent, investment banking company, or other person is concerned, who shall rely
    on this power, may justifiably rely on the power. This power may be revoked only
    by a notice in writing executed by me or my attorney-in-fact and delivered to
    such person or institution.


    2.05: This power shall not be revoked or otherwise become ineffective in any way
    by the mere passage of time, but rather shall remain in full force and effect
    until revoked by me or my attorney-in-fact in writing, as provided in paragraph
    2.04 hereof.


    ### Section 3: Powers


    3.01: My attorney-in-fact shall have all of the powers, discretions, elections,
    and authorities granted by statute, by common law, and under any rule of Court.
    In addition thereto, and not in limitation thereof, my attorney-in-fact shall
    also have the powers set forth below.


    3.02: My attorney-in-fact may collect and receive, without the institution of
    a legal cause of action, all debts, monies, gifts, objects, interest, dividends,
    annuities, and demands that now are due or may hereinafter become due, owing or
    otherwise payable to or belonging to me. My attorney-in-fact may use and take
    all lawful actions in my name or otherwise to recover the same or to compromise
    the same.


    3.03: My attorney-in-fact may sell, convey, lease, exchange, mortgage, pledge,
    release, or otherwise deal with, dispose of, exchange, or encumber any of my property,
    either real or personal. This shall include the power to borrow money or otherwise
    obtain credit, upon such terms, conditions, and covenants as my attorney-in-fact
    considers as appropriate.


    3.04: My attorney-in-fact may appear on my behalf in any litigation in which I
    am or may become a party during the duration of this General Power of Attorney.


    3.05: My attorney-in-fact may give discharges, releases, consent, and receipts
    on my behalf.


    3.06: My attorney-in-fact shall have the power to deposit funds in my name in
    any banking or savings institution or in any money market account, whether or
    not insured.


    3.07: My attorney-in-fact shall have the power to pay any and all bills, accounts,
    claims, and demands now due by me or becoming due by me subsequent to the execution
    of this General Power of Attorney.


    3.08: My attorney-in-fact may endorse all checks drawn to my order for deposit
    in any account in which I have funds on deposit or in any new account opened in
    my name.


    3.09: My attorney-in-fact shall have the right to make gifts of cash or property
    in kind to any person or institution in connection with any estate planning that
    needs to be completed or to carry out any beneficial intent of mine as he/she
    may understand it.


    3.10: My attorney-in-fact shall have the power to transfer or surrender any securities
    that I may own. In connection therewith, my attorney-in-fact may execute in my
    name or on my behalf any stock power or other instrument in order to implement
    any such transfer or surrender.


    3.11: My attorney-in-fact shall have the power to enter into or renew any agency
    or custodian agreement with any bank or trust company at my expense for the investment
    or safekeeping of any property.


    3.12: My attorney-in-fact shall have unrestricted access to, and the right to
    enter into, any safety deposit box, vault, or other depository that I may own
    or may be registered in my name.


    3.13: My attorney-in-fact shall have the power to prepare, make, execute, and
    file any and all Federal, State, local, or other tax returns, claims for refunds,
    or declarations of estimated tax. This power shall include the power to represent
    me (directly or indirectly through other agents) in any matter before the Internal
    Revenue Service or any other Federal, State, or local agency.


    3.14: My attorney-in-fact shall have the power to execute, seal, acknowledge,
    and deliver any instruments, documents, or papers deemed necessary, advisable,
    or expedient with respect to any property.


    3.15: My attorney-in-fact shall have the power to hold, invest, reinvest, and
    otherwise deal with and manage all property in which I may have any interest and
    wherever situated.'
  trans: '

    # 持久性一般及财务授权委托书


    本人，`_____（姓名）_______`，现居于`__（城市及州）___`，特此签署此持久性一般（及财务）授权委托书，旨在使下文指定的代理人能够在所有事务中代为行事。


    ## 第 1 节：代理人的指定


    1.01：本人特此指定并任命`_____（姓名）_____`（现居于`_____（城市及州）_____`）为我的代理人，代表我、以我的名义并为我的利益行事。


    1.02：若`_____（姓名）_____`因任何原因未能履行或继续担任我的代理人，本人特此指定并任命`_____（姓名）_____`（现居于`_____（城市及州）_____`）担任我的代理人。


    ## 第 2 节：授权委托书的生效日期


    2.01：本一般授权委托书自签署之日起立即生效，且不因本人的伤残或心智能力缺失而受影响，但相关州法规另有规定者除外。


    2.02：本一般授权委托书不因本人的丧失行为能力或伤残而受影响，本人明确意图是，即使本人可能无法追认代理人的行为，代理人仍应继续以此身份行事。


    2.03：第三方可依赖代理人就授予代理人的任何权力相关所有事宜所作的陈述，任何因依赖代理人陈述而行事的人，均不因允许代理人行使任何权力而向本人或本人的遗产承担任何责任。此外，本人授权代理人赔偿并保护任何接受并依据本文件行事的第三方免受损害。


    2.04：本授权可撤销，但就任何依赖本授权的政府机构、银行、存管机构、信托公司、保险公司、其他公司、过户代理人、投资银行公司或其他个人或机构而言，其可合理信赖本授权。本授权仅可通过本人或代理人签署的书面通知，并送达该等个人或机构后方可撤销。


    2.05：本授权不因时间的推移而被撤销或以任何方式失效，而应继续完全有效，直至根据本协议第 2.04 段规定由本人或代理人以书面形式予以撤销。


    ## 第 3 节：权力


    3.01：我的代理人应享有法规、普通法及任何法院规则授予的所有权力、酌情权、选择权及权限。除此之外，且不限于此，我的代理人也应享有下述各项权力。


    3.02：我的代理人可以无需提起法律诉讼即可收取和接收所有目前到期或此后到期、应付或归属于我的债务、款项、赠予、物品、利息、股息、年金及索偿。我的代理人可以以我的名义或以其他方式采取所有合法行动来追讨或和解上述款项。


    3.03：我的代理人可以出售、转让、租赁、交换、抵押、质押、解除或以其他方式处理、处分、交换或使我的任何财产（无论是动产还是不动产）承受产权负担。这应包括按照代理人认为适当的条款、条件和约定借款或以其他方式获得信贷的权力。


    3.04：在本一般授权委托书有效期间，若本人成为或可能成为任何诉讼的当事人，我的代理人可代表本人出庭。


    3.05：我的代理人可代表本人给予解除、豁免、同意及收据。


    3.06：我的代理人有权以我的名义在任何银行或储蓄机构或任何货币市场账户中存入资金，无论该账户是否投保。


    3.07：我的代理人有权支付本人在签署本一般授权委托书之时或之后到期应付的任何及所有账单、账户、索赔及要求。


    3.08：我的代理人可为存入任何存有本人资金的账户或任何以本人名义开立的新账户而背书所有以本人为收款人的支票。


    3.09：我的代理人有权就任何需要完成的遗产规划，或为执行其可能理解的本人的任何有利意图，向任何个人或机构作出现金或实物财产的赠与。


    3.10：我的代理人有权转让或交出本人可能拥有的任何证券。与此相关，代理人可以本人的名义或代表本人签署任何股权授权书或其他文书，以实施任何此类转让或交出。


    3.11：我的代理人有权代表本人与任何银行或信托公司签订或续签任何代理或保管协议，费用由本人承担，用于任何财产的投资或保管。


    3.12：我的代理人有权不受限制地进入本人可能拥有或以本人名义注册的任何保管箱、保险库或其他存放处。


    3.13：我的代理人有权准备、制定、签署和提交任何及所有联邦、州、地方或其他税务申报表、退税申请或预估税款申报书。此权力应包括在涉及美国国内税务局或任何其他联邦、州或地方机构的任何事务中代表本人（直接或通过其他代理人间接）的权力。


    3.14：我的代理人有权就任何财产签署、盖章、确认和交付任何被认为必要、可取或适当的文书、文件或凭证。


    3.15：我的代理人有权持有、投资、再投资，并以其他方式处理和管理所有本人可能拥有权益且无论位于何处的财产。

