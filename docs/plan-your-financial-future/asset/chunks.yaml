  trans: "  \n## 我需要多少钱？  \n\n与规划子女高等教育时对财富终身分布情况的考量类似，规划退休财务的首要问题便是你需要多少钱。一般来说，我们可以说你需要一大笔钱，但通过金融函数计算器进行具体计算，可以得出更接近实际的金额。我们通过以下示例说明步骤：假设你现在\
    \ 35 岁，年收入 10 万美元。你预计退休后需要达到当前税后收入约 75%的水平才能舒适生活，即每年 7.5 万美元。作为退休规划的前提假设，你预计退休前后年均通胀率为\
    \ 3%，投资可获得的税后回报率为 7%。你计划 30 年后（65 岁）退休，退休期持续 20 年。  \n\n> **注意：** 所有金额均使用惠普 10BII\
    \ 金融函数计算器计算，该计算器示例见[`www.tvmcalcs.com`](http://www.tvmcalcs.com)。  \n\n按以下步骤计算退休所需金额：\
    \  \n\n1.  计算按今日美元价值折算的退休年度收入需求，直至计划退休日：  \n    *   `PV = $75,000`（若使用 HP 10BII\
    \ 计算器，请输入负值）  \n    *   `I/YR = 3`  \n    *   `N = 30`  \n    *   求解 `FV = $182,045`\
    \  \n2.  计算退休期间产生该年度收入所需的一次性资本总额：  \n    *   `PMT = $182,045`（若使用 HP 10BII 计算器，需设为\
    \ BEGIN 模式，且金额需输入为负值）  \n    *   `I/YR = 3.8835`（此为通胀调整后回报率，计算器操作：`1.07 除以 1.03`，减\
    \ 1，再乘以 100）  \n    *   `N = 20`  \n    *   求解 `PV = $2,596,849`  \n3.  计算为积累该笔资金所需的年度储蓄额（假设你尚未开始退休储蓄计划，也未积累任何退休投资资产）：\
    \  \n    *   `FV = $2,596,849`（四舍五入至 260 万美元。若使用 HP 10BII 计算器，需切换回 END 模式）  \n\
    \    *   `I/YR = 7`  \n    *   `N = 30`  \n    *   求解年度储蓄存款额或付款额 = `$27,524.65`\
    \  \n\n与教育资金规划同理，这里的关键行动是立即开始储蓄。需从工资中留出的金额令人望而生畏——超过总收入的 25%，且非税后收入（实际储蓄比例会更高）。但请勿过分纠结于年度储蓄额或一次性总金额，而应聚焦于开始为退休储蓄这一财务目标。\
    \  \n\n若你不想购买金融函数计算器或自行计算退休需求分析，可借助在线金融计算器和工作表（例如[`www.tvmcalcs.com`](http://www.tvmcalcs.com)提供的工具）。此外，财经杂志中也有实用图表，根据特定假设告知你需在特定年龄积累多少资金才能舒适退休。\
    \  \n\n退休储蓄有三种基本方法：  \n\n*   参与雇主资助的退休计划，如 401(k)计划  \n*   参与个人递延税款储蓄计划，如传统可抵扣\
    \ IRA 或税后罗斯 IRA  \n*   通过工资税向社会保障体系供款  \n\n即使最大化利用所有退休储蓄方法，你很可能仍需在应税账户中留出资金，以积累退休所需金额。此时，请遵循第\
    \ 3 章讨论的定投策略。若仅投资或主要投资于共同基金，请尽量选择低费用且税收高效的投资产品。  \n\n## 退休规划中的其他问题  \n\n规划退休时，你不仅要解决财务问题，还需回答一些更偏个人化的问题。换言之，你必须确定退休后的居住地及如何安排生活。这些问题是下一章的重点，但在退休规划中还需考虑两个财务相关问题：\
    \  \n\n*   我的房贷是否已还清（或至少降至可管理金额）？  \n*   退休期间如何应对大额支出，尤其是不断上涨的医疗费用？  \n\n### 房贷支出\
    \  \n\n下一章将详细讨论利用反向抵押贷款在退休期间增加收入的可行性。研究表明，在退休前尽可能还清房贷、释放现金流的人往往更幸福。如果能从固定支出清单中移除月供，退休后将有更多现金用于生活与享受。\
    \  \n\n关于是否应提前还清房贷存在争议，因为会损失房贷利息的所得税抵扣项。但请注意，房贷利息抵扣最多只能抵消 37%的税负。此外，根据你签署的贷款类型，你可能在房屋中积累的净资产微乎其微——甚至为零。例如，若你签署的是纯利息贷款，你可能并未减少房贷本金（仅依赖房屋随时间升值）。因此，退休前尽可能还清房贷很可能是明智的财务规划。\
    \  \n\n退休前重新贷款以降低月固定支出也是一个选项。虽然重新贷款可能是良策，但其弊端在于可能延长房贷还款年限。例如，假设你原有 15 年期房贷，计划\
    \ 3 年后退休，剩余还款期为 10 年。为释放现金流并降低月供，你以较低利率重新贷款并签署新的 15 年期房贷。这样，你在退休期间需额外偿还 12 年房贷，而非仅退休后的\
    \ 2 年。同理，若你签署 30 年期而非 15 年期新贷款，退休期间需偿还的房贷年限将增加 27 年。  \n\n避免此后果的方法之一是签署较短还款期限的贷款（如\
    \ 10 年期）。但代价是月供会上升而非下降。因此，除非已做好预算规划，否则增加的房贷金额可能在退休后剩余 7 年还款期内造成现金流压力。  \n"
- fmt: '### Health Care Expenses


    As almost everyone is aware, there is a health care crisis in the United States.
    This crisis is particularly acute for retirees, many of whom are relying on a
    fixed income to pay for their retirement years. According to Fidelity Investments,
    a 65-year-old couple who retired in 2017 will need approximately $250,000 to cover
    medical costs after they stop working—and this amount is in excess of Medicare
    coverage, which typically covers catastrophic expenses of an individual age 65
    or older. To make matters worse, for individuals retiring after 2017, the amount
    needed to cover medical costs in excess of Medicare coverage is even greater,
    because health care costs have continued to rise.


    What is the best strategy to cover the rising costs of health care during retirement?
    Short of being fortunate enough to be provided with retiree health insurance from
    your prior employer, the best plan is to save even more while you are working.
    For example, the 35-year-old wage earner noted earlier in this chapter should
    plan to save more than the $2.6 million lump-sum capital needed for retirement;
    at the very least, they need approximately $250,000 (actually more, because the
    noted amount has not been inflated for 30 more years of growth) for their future
    health care costs. Another option is to apply for Medigap coverage within the
    first six months of qualifying for Medicare, to assist with the payment of these
    expenses. Finally, a third option, at least for self-employed individuals, is
    to establish and save for current and future medical costs via a health savings
    account (`HSA`).


    Note that this estimated $250,000 cost of medical care does not include possible
    long-term care expenses. Contrary to common knowledge, Medicare does not cover
    the cost of custodial care. As such, it is critical that you consider the purchase
    of a qualified long-term-care insurance policy while you still qualify for coverage
    and can afford it. It is probably too early for a 35-year-old individual to consider
    purchasing such a policy (unless it is for their parent), but once they reach
    the age of 50 or so, investigating the purchase of an individual long-term-care
    policy (or participating in an employer’s group policy, if available) should be
    a top financial-planning goal.


    ## The Financial Risks of Retirement


    Similar to the general investment risks discussed in Chapter [9](A314864_2_En_9_Chapter.html),
    retirees face several special financial risks. Specifically, these are as follows:


    - **Inflation or purchasing-power risk**: A daily risk of any retiree living on
    a fixed income. Succinctly, it may be asserted that the purchasing power of fixed
    dollars is less in the future than it is today.

    - **Longevity or the risk of superannuation**: The risk that a retiree will run
    out of money before they die. It is this type of risk that most frightens the
    average retiree and is the primary reason that annuities are important retirement-planning
    vehicles.

    - **Market risk**: The general risk of investing in the stock or bond market.
    It is sometimes referred to as volatility risk because the values of those investments
    fluctuate daily.

    - **Investor behavior risk**: The risk that investors are irrational and subject
    to herd mentality. For example, they tend to purchase today’s hot stock at the
    top of the market and then sell that same stock at the bottom of the market. Thus,
    many investors are not positioned for optimal, or even average, returns. A whole
    new field of finance has arisen, known as behavioral finance, to study just this
    type of risk.

    - **Point-in-time or sequential risk**: The risk that a retiree begins retirement
    during a market downturn and then withdraws too much money initially, thus accentuating
    the risk of superannuation.


    The most important of these risks is likely longevity risk—the risk of outliving
    your money. There is only one surefire way to avoid this risk, and that is to
    purchase an immediate fixed or variable annuity. But many retirees are dubious
    about purchasing annuities, for two reasons: they do not like the idea of spending
    down the money invested in the annuity; and they fear making such a large investment,
    dying shortly thereafter, and losing their money to the insurance company. There
    certainly are ways to resolve or at least minimize these concerns, but another
    way of managing longevity risk is to establish the withdrawal of a fixed percentage
    of retirement savings and then adhere to that percentage, adjusted for annual
    inflation, until your death.


    What fixed annual percentage should a retiree withdraw? Many studies have been
    conducted in an attempt to answer this question, but the consensus of most academics
    and financial-planning practitioners is to annually withdraw 4 to 5 percent of
    your initial account balance, and then step up this percentage each year after
    accounting for inflation. In other words, the actual dollars you spend in any
    year should be 4 to 5 percent of the total amount you have saved at the time of
    retirement, adjusted for the effect of inflation in the subsequent years. It is
    important to keep in mind, however, that this percentage is dependent on the market
    remaining relatively stable (not significantly decreasing in value) throughout
    your retirement period.


    Assume that you are 65, have been a diligent saver throughout your working years,
    and have accumulated retirement savings of $1.5 million. In your first year of
    retirement, you would withdraw $67,500 (or 4.5 percent of your initial account
    balance). Assuming that inflation for that year is 3 percent, in the next year
    you would withdraw $69,525 ($67,500 times 1.03), and so on throughout your retirement
    period. In such a manner, it is estimated that you have approximately a 90 percent
    chance of not outliving your money over a 30-year retirement period.


    Two big challenges are associated with this strategy:


    - As you enjoy your retirement years, you need to average an after-tax return
    of more than 4.5 percent annually, or you will invade the principal of your retirement
    savings.

    - If you have begun this strategy in a down market, your withdrawal of more than
    4.5 percent annually will deplete your account balance much more quickly than
    it otherwise would. In other words, you are not living off the interest and will
    not have as much—if any—money to leave to your heirs at the end of your retirement
    period. You can make up this deficiency in later years by earning more annual
    investment returns than you have otherwise assumed. But what happens if you do
    not achieve your expected rate of return or even lose money? For example, if you
    lose 2 percent from your portfolio from a previous return of 4 percent, that is
    a mathematical loss of 50 percent. To recover that loss or get back to even, you
    now need to earn back that lost 2 percent or achieve a mathematical gain of 100
    percent.


    It is critical that you associate point-in-time risk with longevity risk. Practically,
    this means the investment climate at the point in time when you retire is important.
    You want the first few years of your retirement to be enjoyed in an up market—or
    at least in a market environment that is relatively stable. You also do not want
    to be overly invested in fixed-income securities, such as bonds and cash equivalents,
    or you probably will not achieve an after-tax return that is equal to or more
    than the inflation rate. Accordingly, that is why financial planners and investment
    advisors recommend approximately a 60 percent equity / 40 percent bond and cash
    mix throughout retirement.'
  raw: '### Health Care Expenses


    As almost everyone is aware, there is a health care crisis in the United States.
    This crisis is particularly acute for retirees, many of whom are relying on a
    fixed income to pay for their retirement years. According to Fidelity Investments,
    a 65-year-old couple who retired in 2017 will need approximately $250,000 to cover
    medical costs after they stop working—and this amount is in excess of Medicare
    coverage, which typically covers catastrophic expenses of an individual age 65
    or older. To make matters worse, for individuals retiring after 2017, the amount
    needed to cover medical costs in excess of Medicare coverage is even greater,
    because health care costs have continued to rise.


    What is the best strategy to cover the rising costs of health care during retirement?
    Short of being fortunate enough to be provided with retiree health insurance from
    your prior employer, the best plan is to save even more while you are working.
    For example, the 35-year-old wage earner noted earlier in this chapter should
    plan to save more than the $2.6 million lump-sum capital needed for retirement;
    at the very least, they need approximately $250,000 (actually more, because the
    noted amount has not been inflated for 30 more years of growth) for their future
    health care costs. Another option is to apply for Medigap coverage within the
    first six months of qualifying for Medicare, to assist with the payment of these
    expenses. Finally, a third option, at least for self-employed individuals, is
    to establish and save for current and future medical costs via a health savings
    account (HSA).


    Note that this estimated $250,000 cost of medical care does not include possible
    long-term care expenses. Contrary to common knowledge, Medicare does not cover
    the cost of custodial care. As such, it is critical that you consider the purchase
    of a qualified long-term-care insurance policy while you still qualify for coverage
    and can afford it. It is probably too early for a 35-year-old individual to consider
    purchasing such a policy (unless it is for their parent), but once they reach
    the age of 50 or so, investigating the purchase of an individual long-term-care
    policy (or participating in an employer’s group policy, if available) should be
    a top financial-planning goal.


    ## The Financial Risks of Retirement


    Similar to the general investment risks discussed in Chapter [9](#A314864_2_En_9_Chapter.html),
    retirees face several special financial risks. Specifically, these are as follows:


    *   Inflation or purchasing-power risk : A daily risk of any retiree living on
    a fixed income. Succinctly, it may be asserted that the purchasing power of fixed
    dollars is less in the future than it is today.

    *   Longevity or the risk of superannuation: The risk that a retiree will run
    out of money before they die. It is this type of risk that most frightens the
    average retiree and is the primary reason that annuities are important retirement-planning
    vehicles.

    *   Market risk: The general risk of investing in the stock or bond market. It
    is sometimes referred to as volatility risk because the values of those investments
    fluctuate daily.

    *   Investor behavior risk: The risk that investors are irrational and subject
    to herd mentality. For example, they tend to purchase today’s hot stock at the
    top of the market and then sell that same stock at the bottom of the market. Thus,
    many investors are not positioned for optimal, or even average, returns. A whole
    new field of finance has arisen, known as behavioral finance, to study just this
    type of risk.

    *   Point-in-time or sequential risk: The risk that a retiree begins retirement
    during a market downturn and then withdraws too much money initially, thus accentuating
    the risk of superannuation.


    The most important of these risks is likely longevity risk—the risk of outliving
    your money. There is only one surefire way to avoid this risk, and that is to
    purchase an immediate fixed or variable annuity. But many retirees are dubious
    about purchasing annuities, for two reasons: they do not like the idea of spending
    down the money invested in the annuity; and they fear making such a large investment,
    dying shortly thereafter, and losing their money to the insurance company. There
    certainly are ways to resolve or at least minimize these concerns, but another
    way of managing longevity risk is to establish the withdrawal of a fixed percentage
    of retirement savings and then adhere to that percentage, adjusted for annual
    inflation, until your death.


    What fixed annual percentage should a retiree withdraw? Many studies have been
    conducted in an attempt to answer this question, but the consensus of most academics
    and financial-planning practitioners is to annually withdraw 4 to 5 percent of
    your initial account balance, and then step up this percentage each year after
    accounting for inflation. In other words, the actual dollars you spend in any
    year should be 4 to 5 percent of the total amount you have saved at the time of
    retirement, adjusted for the effect of inflation in the subsequent years. It is
    important to keep in mind, however, that this percentage is dependent on the market
    remaining relatively stable (not significantly decreasing in value) throughout
    your retirement period.


