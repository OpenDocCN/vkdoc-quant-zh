  trans: '

    ### 私人慈善机构


    私人慈善机构的最佳定义是任何不符合公共慈善机构资格的慈善机构。在实践中，私人慈善机构或私人基金会是指除教堂、教育组织、医院或政府单位之外的任何慈善机构。知名的私人慈善机构包括比尔及梅琳达·盖茨基金会、福特基金会和洛克菲勒基金会。


    允许对私人慈善机构捐款进行所得税扣除的税收规则，与对公共慈善机构捐款的规则类似，不同之处在于对调整后总收入（AGI）的百分比限制更为严格。允许的百分比金额还取决于私人慈善机构是运营型基金会还是非运营型基金会。例如，向私人非运营基金会捐赠已增值股票，在捐款年度内，可从捐赠人的
    AGI 中扣除的额度仅为 20%，而向私人运营基金会捐款的捐赠人则有资格获得 30%的扣除额。当捐赠与用途相关的有形个人财产，且捐赠人未选择仅以其在财产中的计税基础作为允许的总扣除额时，情况也是如此。与此同时，向私人慈善机构捐赠现金，通常仅限于在捐款年度扣除
    AGI 的 30%，而向公共慈善机构捐款则适用 60%的扣除额。


    表 20-1 记录了与捐赠人生前向慈善机构捐赠相关的最重要的扣除限额。


    **表 20-1.** 慈善捐赠扣除限额


    | 财产类型 | 允许的总扣除金额 | 若为公共慈善机构（及私人运营基金会）的 AGI 百分比限额 | 若为私人慈善机构（私人非运营基金会）的 AGI 百分比限额
    |

    | --- | --- | --- | --- |

    | 现金 | 公允市场价值（FMV） | AGI 的 60% | AGI 的 30% |

    | 已增值股票和债券（证券） | FMV 选择 计税基础选择 | AGI 的 30% AGI 的 50% | AGI 的 20% AGI 的 20% |

    | 与用途相关的有形个人财产 | FMV 选择 计税基础选择 | AGI 的 30% AGI 的 50% | AGI 的 20% AGI 的 20% |

    | 与用途无关的有形个人财产 | 仅限财产的计税基础 | AGI 的 50% | AGI 的 20% |


    ### 凭证要求


    作为纳税人，在你确定了捐赠何种类型的财产、选择哪种形式的慈善机构以及捐赠金额之后，你需要关注如何证明你所捐赠的内容，或向国税局（IRS）证实扣除金额。以往的法律规定，只有当捐赠人的现金捐赠在捐款年度超过
    250 美元时，才需要从慈善机构获得书面收据。对于有形财产的捐赠，除非合理估计该财产价值超过 5,000 美元，否则捐赠人不需要提供证明捐赠物公允市场价值的合格评估。


    然而，自 2007 年的慈善捐款开始，这些规则发生了变化。如今，无论捐赠的是现金还是财产，所有向公共或私人慈善机构捐赠的任何金额都必须有凭证支持。实际上，这意味着除非你能提供一份银行记录（如已注销的支票）或一份来自慈善机构的书面文件（“同期确认函”），其中注明捐款金额、捐款日期以及慈善机构名称，否则你的慈善所得税扣除可能会被拒绝。如果捐赠物品的价值超过
    5,000 美元，且该物品既非现金也非公开交易的证券，捐赠人必须获得一份评估报告（并将其附在纳税申报表中）。


    ## 利用信托和年金向慈善机构捐赠


    为了获得所得税扣除资格而采用合格的分割利益形式向慈善机构捐赠，通常必须采用信托形式或从慈善机构换取年金。以下讨论分别提供了每种形式的具体细节。


    ### 慈善信托


    有两种常见的慈善信托：慈善主导信托（CLT）和慈善剩余信托（CRT）。CLT 在其存续期间向慈善机构支付利息收益。然后，在信托期限结束时，其剩余资产将转移给非慈善受益人，以试图清零捐赠人遗产可能应缴的任何遗产税。


    例如，假设你在遗嘱条款中设立了一个 CLT。你去世后，指示将 100 万美元放入该信托，首先惠及美国人道协会，然后是你的两个成年子女，每人平分。根据这 100
    万美元的遗赠，人道协会将在未来 20 年内每年收到 80,000 美元的付款。通过使用表格确定你未来对人道协会的总遗赠的现值，你的遗产执行人确定该遗产有权获得约
    997,000 美元的慈善扣除。因此，你实际上已将后续转移给两个孩子的信托财产价值清零，同时也清除了可能对该同一转移征收的任何潜在遗产税。换句话说，你的两个孩子将免税获得该信托财产。


    第二种（也更受欢迎的）慈善信托类型是 CRT，它在捐赠人有生之年向捐赠人（或其他受益人）支付收益，然后在捐赠人死亡时，将所有剩余资产转移给捐赠人选择的慈善机构。这种信托有两种基本形式：一种是在你有生之年向你提供固定年金支付的
    CRT（也称为慈善剩余年金信托，即 CRAT）；另一种是在你有生之年每年向你提供信托资产（按年度重新估值）的固定百分比的 CRT（也称为慈善剩余单一信托，即
    CRUT）。


    要使 CRAT 和 CRUT 有资格获得所得税、赠与税和遗产税扣除，还有额外的要求。但重要的是要认识到，如果你作为捐赠人在有生之年设立了任一信托，你将获得两项扣除：


    -   在有生之年，对慈善机构未来遗赠的现值享有所得税慈善扣除

    -   在你去世时，当捐赠财产最终转移给慈善机构时，享有无限的遗产税慈善扣除


    因此，如果你打算在去世时惠及一家合格的慈善机构，你现在就应该设立一个剩余信托，并利用所得税和遗产税的双重税收优惠。


    CRAT 和 CRUT 都是不可撤销的信托，但有两个基本区别。首先，虽然 CRAT 的固定年金支付可能会随着通货膨胀上升而导致你的购买力下降，但 CRUT
    能够跟上或超过年通货膨胀率。由于 CRUT 的指导原则包括基于信托资产固定百分比的年度收益支付（按年度重新估值），因此你可能能够领先于通货膨胀，并保持你信托付款的未来购买力。其次，与
    CRAT（信托设立后不得再追加财产捐赠）不同，CRUT 允许后续的财产捐赠。


    由于 CRAT 和 CRUT 都是定制的、私人起草的文件，因此在起草时有必要寻求称职的遗产规划律师的帮助。如果你担心实施任一文件所涉及的现款费用，你应该请律师估算通过设立
    CRT 你将在所得税和遗产税上节省的金额。然后，将这个数字按现值与律师费进行比较。在大多数情况下，税收节省的现值将远远超过在你一生中设立和维护该信托的成本。

