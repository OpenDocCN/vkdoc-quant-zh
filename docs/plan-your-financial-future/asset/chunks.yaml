    Here are some of the most common financial goals mentioned to financial planners:


    *   To retire early or at normal retirement age with an adequate level of income

    *   To fund a child’s (or children’s) college education

    *   To buy a house or vacation home

    *   To make home improvements

    *   To take a dream vacation

    *   To reduce debt service (for example, to pay off credit cards with an outstanding
    balance)

    *   To buy a luxury car

    *   To minimize income or transfer (estate) taxes

    *   To start my own business


    You may add other objectives to this list, depending on your own personal and
    financial situation, but it is important to recognize that these goals should
    be quantified and monitored. In other words, you should establish a plan to meet
    these goals and then track how you are doing. As with determining an investor’s
    time horizon, it is important to match your goals to a specified time frame and
    categorize them according to a long-term, medium-term, or short-term planning
    period.


    What about the possibility that your goals cannot be achieved with your current
    financial resources? In that event, you have one of three (or a combination of
    three) choices:


    *   You can prioritize away the meeting of some financial goals (in other words,
    recognize that only some, but not all, of your specified financial goals are achievable
    in the specified time frame).

    *   You can attempt to increase cash inflows (your income potential).

    *   You can reduce your cash outflows (adjust your standard of living).


    Until you have determined your financial goals and specified a time frame for
    their achievement, you likely won’t know how to begin planning, which may keep
    you from planning at all!


    ## Determine Where You Are Now


    One of the primary assumptions of the financial-planning and wealth-building process
    is that your net worth (assets minus liabilities) should experience a steady increase
    as you continue to invest. There is no benchmark percentage increase (or dollar
    amount) by which your net worth should grow annually, only the suggestion that
    you should strive for as great a percentage increase as possible given your current
    financial resources. For example, if you are in your peak wage-earning years (typically
    age 45 to 55), you should establish a goal of at least a 10 percent increase in
    your net worth annually. When we apply the Rule of 72 to this increase (72 divided
    by 10), your net worth will double in a period of only 7.2 years.'
  trans: '

    ## 财务规划流程的步骤


    根据注册财务策划师委员会制定的《财务规划实务准则》，个人财务规划流程包含以下六个步骤：


    1.  与财务规划客户建立并明确合作关系

    2.  收集客户数据并确定目标与期望

    3.  通过分析评估客户信息，判断其财务状况

    4.  制定并提交财务规划方案

    5.  执行财务规划方案

    6.  监督财务规划方案


    虽然这些步骤专为专业注册财务策划师（CFP）持证人设计，但作为有意开启财务规划流程的个人，你同样需要完成若干项任务。


    首要任务是收集你的财务与个人记录。附录 A 提供了一份正式且详尽的数据收集表以及个人财务规划问卷，可协助你完成此项工作。保持良好的个人记录有一个显著优势：它能让你清楚了解自己当前的资金流向与用途。反过来，这些记录将帮助你为每月的收支制定预算——这是对大多数人而言至关重要的理财工具。（我们稍后会讨论预算。）记录保存还能助你确定自己当前的财务位置。若不知起点在何处，你便无法开启个人财务规划之旅。


    你应该保存哪些类型的财务与个人记录？又该保存多久？通常情况下，这些问题没有标准答案，因为所需记录的类别和数量取决于个人偏好。有些人会保存所有能追溯到的记录，而另一些人则恨不得刚收到纸张就立刻处理掉。然而，诸如保险单副本、经纪账户对账单、抵押贷款对账单、契约与租约、应收票据、`401(k)`计划或其他公司赞助的退休计划中既得权益的当前对账单等文件，应永久保存。此外，保留至少三年的个人所得税申报表也至关重要。


    没有任何一份文件能像年度所得税申报表那样，全面揭示你的财务生活。试想：这份申报表不仅迫使你披露收入金额，还要说明收入来源——这是预算和财务规划流程中极其重要的一环。根据法律规定，除欺诈情形外，你只需将每年的所得税申报表及其支持文件从该年
    4 月 15 日起保存三年。然而，鉴于申报表所蕴含的丰富信息及其作为财务历史指南的重要性，你或许应考虑将其保存更长时间。


    一旦确定了应保存的财务与个人记录类型，下一步就是决定存放地点。同样，这个问题也没有唯一答案，但我通常会告诉我的遗产规划客户（关于遗嘱和遗产规划文件的更多内容，请参阅第`19`章），将这些文件存放在家中容易在紧急情况下取用的地方。我之所以这样建议，是为了让他们考虑到保险箱的弊端。除了保险箱租赁费用通常较高之外，许多人还犯了一个错误：仅将自己的名字列为保险箱的授权签署人。一旦发生意外伤害或死亡，其他人便无法取出其中存放的重要文件。你应考虑使用家中或公寓里带锁的书桌或防火箱来保存所有重要记录。


    另一项至关重要的任务，是为你开启通往财务独立之路：以书面形式明确你的长期（十年以上）、中期（五至十年）和短期（一至五年）财务目标。对这些目标，要尽可能具体。例如，“变得富有”对大多数人来说不仅难以量化，而且如前所述，甚至可能不代表实际金钱的积累。如果金钱财富对你很重要（如同对许多人一样），那么就应确定你需要积累多少资金才能实现你写下的财务目标。


    以下是向财务规划师提及的一些最常见财务目标：


    -   在正常退休年龄或提前退休，并拥有充足的收入

    -   资助一个或多个孩子的大学教育

    -   购买房屋或度假别墅

    -   进行房屋改造

    -   实现梦想中的度假旅行

    -   减少债务支出（例如，还清有未结余额的信用卡）

    -   购买一辆豪车

    -   尽量减少所得税或赠与税（遗产税）

    -   创办自己的企业


    根据你个人的财务状况，你还可以在此列表中添加其他目标。但重要的是，必须认识到这些目标应当被量化并加以监控。换言之，你应制定计划来实现这些目标，然后追踪自己的进展。与确定投资者的时间跨度一样，将目标与具体时间框架相匹配，并按长期、中期或短期规划周期进行分类至关重要。


    如果你的目标在当前财力下无法实现，该怎么办？在这种情况下，你有三种选择（或组合选择）：


    -   你可以优先放弃某些财务目标的实现（换句话说，认识到在特定时间框架内，只有部分而非全部既定财务目标是可实现的）。

    -   你可以尝试增加现金流入（即提高收入潜力）。

    -   你可以减少现金流出（即调整生活水平）。


    在你确定财务目标并设定实现它们的时间框架之前，你很可能不知道如何开始规划，这可能会让你根本无法开始规划！


    ## 确定你当前的财务状况


    财务规划与财富积累过程的一个基本假设是，随着你持续投资，你的净资产（资产减去负债）应经历稳步增长。净资产每年的增长速度并无基准百分比（或具体金额）的规定，只是建议你在现有财务资源下，尽可能追求更高的百分比增长。例如，如果你正处于收入高峰期（通常为
    45 至 55 岁），你应设定每年净资产至少增长 10%的目标。若将 72 法则应用于此增长率（72 除以 10），你的净资产将在短短 7.2 年内翻番。

    '
- fmt: '### Creating a Personal Balance Sheet


    You should monitor and track the increase (or decrease) in your net worth at least
    once a year. (Many individuals calculate this number at year-end). How do you
    go about tracking and determining this important number? By preparing the first
    of two personal financial statements that you should keep among your important
    financial records: the statement of personal financial position, commonly referred
    to as the personal balance sheet. Generally, you should prepare a statement of
    personal financial position at least annually to keep track of how you are doing
    in increasing your wealth.


    An example of a statement of personal financial position is produced in Table
    [1-1](#A314864_2_En_1_Chapter.html#Tab1). Before you examine it closely, you should
    keep a few considerations in mind when preparing and interpreting such a statement:


    1.  Be sure to list all assets at their current fair market value without reducing
    them to reflect any outstanding indebtedness; for example, list your personal
    residence at the value you believe it will sell for in the local market without
    taking into account the mortgage balance you may currently owe.

    2.  Break down your assets into cash equivalents, investments, and use assets.
    Cash equivalents are those assets that you can access quickly to pay ongoing expenses
    (bills) or, in the event of a financial emergency, without fear that they may
    be worth less than when you purchased them. Alternatively, investments are longer-term
    assets (greater than one year in maturity or holding period) that may experience
    a fluctuation in daily value.

    3.  List liabilities at their current balance or what you owe to the creditor
    as of that given point in time.


    There is no right or wrong answer when preparing your statement of financial position.
    Certainly, as you proceed along the path of wealth building, the objective is
    that the value of your assets will exceed the balance of your liabilities (thereby
    increasing your net worth), but do not become too judgmental of yourself as you
    construct your first statement. The danger is that you will become discouraged
    (or even give up), which runs counter to the reasons for preparing the statement
    in the first place—as a tool to help you assess your current financial situation
    and what you want to see happen in the future.


    Table 1-1.


    Statement of Personal Financial Position (as of 12/31/2017)


    | ASSETS | | LIABILITIES AND NET WORTH | |

    | --- | --- | --- | --- |

    | Cash Equivalents | | Liabilities | |

    | Cash on Hand | `$______` | Primary Residence Mortgage | `$______` |

    | Checking Account | `$______` | Vacation Home Mortgage | `$______` |

    | Savings Account | `$______` | Real Estate Investment Mortgage | `$______` |

    | Money Market Accounts or Funds | `$______` | Auto Loans Balance | `$______`
    |

    | Certificates of Deposit (less than one year maturity) | `$______` | Personal
    Loans | `$______` |

    | | | Student Loans | `$______` |

    | | | 401(k) Loans | `$______` |

    | Cash Value of Life Insurance | `$______` | Credit Card Balances | `$______`
    |

    | Total Cash Equivalents | `$______` | Rent | `$______` |

    | | | Other (for example, alimony or child support) | `$______` |

    | Investments | | Total Liabilities | `$______` |

    | Stocks | `$______` | | |

    | Bonds | `$______` | | |

    | Mutual Funds Balance | `$______` | | |

    | Certificates of Deposit (one year or more maturity) | `$______` | | |

    | Real Estate Investments Vested Employer Pension | `$______` | | |

    | Benefits | `$______` | | |

    | Participant IRAs | `$______` | | |

    | Rollover IRAs | `$______` | | |

    | 401(k) Account | `$______` | | |

    | Other | `$______` | | |

    | Total Investments | `$______` | Net Worth (Assets – Liabilities) | `$______`
    |

    | (Assets – Liabilities) | `$______` | | |

    | Use Assets | | | |

    | Primary Residence | `$______` | | |

    | Vacation Home | `$______` | | |

    | Automobiles | `$______` | | |

    | Home Furnishings | `$______` | | |

    | Jewelry | `$______` | | |

    | Artwork | `$______` | | |

    | Total Use Assets | `$______` | | |

    | Total Assets | `$______` | Total Liabilities and Net Worth | `$_______` |


    When planning your estate, it is helpful to identify on the statement of personal
    financial position how each asset is titled. For example, if your primary residence
    is held in joint tenancy with right of survivorship between you and your spouse,
    place a `JT` for joint tenancy next to Primary Residence. Note, however, that
    retirement accounts, such as individual retirement accounts (IRAs), may be owned
    only individually, even in community-property states such as California or Texas.'
