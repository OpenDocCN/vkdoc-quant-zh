  trans: '

    #### 成立难易度与融资能力


    采用`个人独资企业`的方式进行经营是最容易成立的。州政府不要求任何正式文件，你只需挂出招牌、开门营业即可（尽管在某些情况下可能需要获得州执照才能开展业务）。然而，与成立个人独资企业相对容易这一点相权衡的，是以这种方式经营企业所固有的个人责任承担问题。


    以普通合伙形式经营企业也不需要书面协议。尽管如此，在合伙企业开始运营之前，明确各方合伙人的义务和出资额通常是明智的。在未来的某个时候，合伙企业可能会解散并处理企业资产和债务，如果在开始经营时就考虑到了这种可能性，这个过程通常会更顺利地进行。


    常规公司（C corporation）和 S 公司这两种经营形式都需要向州政府提交公司章程。请注意，S 公司只是一个为了所得税目的而选择按合伙企业方式纳税的常规公司。如果你计划以公司形式经营，则需要寻求律师的服务。虽然在没有法律帮助的情况下自己成立公司或有限责任公司是可能的，但在这样做之前咨询律师通常是可取的。


    关于为企业筹集资金，在各种企业运营形式中有一个明显的赢家：常规公司或 C 公司。这是因为这种类型的公司可以发行普通股和优先股，并通过向公众出售此类股票（即首次公开募股，IPO）来募集资金。然而，鉴于将企业组建为常规公司或
    C 公司的复杂性，更不用说公司所得税的双重征税问题，大多数初创企业都回避这种公司组织形式，至少在初期是这样。不过，有趣的是，考虑到 2017 年《减税与就业法案》中
    C 公司税率的大幅降低（从最高 35%降至 21%），从 2018 年开始，有多少创业企业可能会选择注册为公司呢？


    #### 所得税影响


    幸运的是，除常规公司外，所有企业实体在所得税方面都可以被归类为穿透实体（flow-through entities）。这意味着所有企业收入和亏损都在所有者的个人纳税申报表上报告，而不是通过提交单独的纳税申报表。由于大多数初创企业在运营的头几年都会经历亏损，因此增加的营业收入对您个人纳税申报表的影响可能不大。但作为企业主，您可以在纳税申报表中扣除的税务亏损，可能会极大地帮助您满足现金流需求。请记住，在许多情况下，企业及其所有者的现金流是同一回事。与资本损失不同（资本损失在任何日历年度内被限制在不超过
    3,000 美元的所得税扣除额），普通经营损失可以全额扣除，没有限制。因此，企业一年内产生的亏损可以用来抵扣同一纳税年度企业主的其他应税收入。


    例如，假设你选择以个人独资企业形式经营，并在第一年经营中发生了 10,000 美元的经营亏损（在考虑了您从企业获得的任何收入之后）。您在 IRS 1040
    表格的附表 C 中报告了所有这些亏损，并用这 10,000 美元的亏损抵消了任何其他非营业收入。无论您是否为所得税目的而逐项列举扣除额，您都可以这样做。


    穿透税制规则的一个例外是常规公司或 C 公司这种经营形式。如果您以这种方式经营，则需要提交单独的纳税申报表，并适用一套单独的税率等级。与个人税率和税级一样，公司税率本质上是累进的。因此，有可能部分公司收入以低于其股东边际税率的税率纳税。然而，请记住，这一优势通常被公司收入被双重征税的事实所抵消：一次是在公司实体层面，另一次是在以股息形式支付给股东时。此外，经营亏损只能由单独的应税公司实体扣除，不能用于抵扣所有者的个人应税收入。


    ### 招募拥有不同优势的人才


    你（或任何其他潜在的企业主）不太可能拥有您在初次起草商业计划时所设想的那样，为了按预期经营和发展企业所必需的众多技能。实际上，您可能需要他人的服务来确保企业的成功。因此，您应该努力招募那些拥有与您自身不同的优势和技能的人才到您的企业，以填补您在发展和经营企业过程中可能出现的任何空白。例如，如果您在产品开发方面有优势，您应该聘请具有营销技能的人来销售该产品。如果您擅长销售，您需要确保您销售的产品具有最高质量，所以要寻找一位擅长产品开发的人。


    ### 规划企业传承


    据估计，70%的家族企业无法完成从最初创始人到第二代家族成员的过渡。为什么？因为大多数企业创始人未能为企业传承做好规划。虽然未能规划传承可能部分归因于创始人的性格（例如，创始人表现得仿佛自己长生不老，传承永远不会发生），但创始人未能规划企业传承的主要原因可能是他们根本不想谈论自己最终死亡或丧失能力这种可能性。


    预先处理企业最终传承问题的一种方法是在开始运营之前，就在您的商业计划中加入关于可能的继任所有者的条款。这样做的好处是迫使您思考如何将企业传递给他人，而无需承受制定正式遗产计划的压力。最可能的继任所有者是那些以前在企业工作过或表示有兴趣接手的家族成员。但是，一位在企业拥有多年经验、值得信赖的非家族成员员工也可能是一位有价值的继任者。


    无论如何，如果您希望企业在您去世或丧失能力后继续存在，您必须制定一份企业传承计划。为了企业出售方（通常是年长的家族成员）和购买方（通常是年轻的或下一代的家族成员）的利益，应尽可能以节税的方式完成这一计划。在这方面，会计师和税务律师可以提供宝贵的服务，并应在企业传承过程中尽早咨询他们。


    ## 购买个人住宅


    买卖个人住宅的税务影响已在第 11 章中讨论过。此处的讨论聚焦于储蓄足够的资金来购买房屋（尤其是首套住房），以及可用于为如此大额购买融资的抵押贷款类型。

    '
- fmt: '# 为购房储蓄


    购房成本取决于当地市场状况，但您应努力储蓄至少相当于购房价格20%的首付，以避免额外支付私人抵押贷款保险费用。让我们来看一个例子。


    假设您正考虑购买一套价格为15万美元的 Starter Home（入门级住宅）。在这种情况下，您应努力储蓄至少3万美元作为20%的首付。积累3万美元需要多长时间？答案取决于您每月能存下多少钱，以及这些储蓄能带来的回报率。


    如果您每月能存下500美元，并且这些储蓄能获得6%的税前回报率，那么大约53个月后您将拥有3万美元。然而，如果您能获得12%的税前回报率（即收益率翻倍），您将提前六个月，在大约47个月后实现3万美元的储蓄目标。当然，如果您每月能存下超过500美元，您就能更快地攒够所需首付。请记住，有些抵押贷款允许您支付低于购房价格20%的首付，但传统抵押贷款市场要求最低20%的首付。


    与任何其他财务目标一样，要储蓄购房所需资金，您必须制定计划。这又回到了本书第一部分讨论的财务规划基本要素：您必须制定储蓄策略并付诸实施。如果需要编制预算来积累必要储蓄，那就去做。您必须具备储蓄的自律性，否则无法积累财富。


    # 了解抵押贷款类型


    从历史上看，面向购房者主要有四种抵押贷款类型，尽管最近第五种——仅付利息抵押贷款——也被纳入其中。以下列表逐一讨论了每种类型，以及选择最适合您的类型前需要考虑的一些因素。请记住，无论选择哪种抵押贷款，它们都体现了投资房地产的一个主要优势：利用借入资金进行杠杆投资，从而在您的资金上获得更高回报。


    - **传统抵押贷款**：这是一种贷款期限内的固定利率抵押贷款——通常为15年或30年——向借款人保证利率不会上涨。这类抵押贷款适用于现金流稳定且预期未来几年这种稳定性将持续的个人。

    - **可调利率抵押贷款 (ARM)**：此类抵押贷款的利率可能根据指定的指数或基准（例如十年期美国国债的当前收益率）每月或每年变动。ARM 适用于希望月供较低且不打算长期居住在该房屋中的个人。

    - **联邦住房管理局 (FHA) 抵押贷款**：此类抵押贷款的偿付由联邦政府担保，因此其利率通常低于传统抵押贷款。低首付也是该贷款的一个特点。FHA 抵押贷款通常仅适用于低收入房主。

    - **退伍军人管理局 (VA) 抵押贷款**：此类抵押贷款具有与 FHA 抵押贷款相同的联邦还款担保，但仅适用于武装部队的退伍军人。该贷款的一个特点是无需支付首付。

    - **仅付利息抵押贷款**：在这种抵押贷款形式中，借款人在指定年限内仅支付贷款利息。贷款本金几乎无法减少，从而有效阻止借款人在房屋中建立大量（如果有的话）权益。在办理仅付利息抵押贷款时，借款人预期房屋的公允市场价值将从购买价格升值，从而可以用任何销售收益还清抵押贷款余额。就其性质而言，仅付利息抵押贷款只应由风险偏好相对较高的个人办理。


    # 购买和使用度假屋


    购买度假屋是一种直接的房地产投资形式。虽然有时度假屋或第二套房屋会被出租并为购买者产生租金收入，但更多情况下，此类房屋是作为购买者及其家人的私人度假场所购买的。因此，将房屋视为一种创收投资（以替代收益型股票或固定收益债券组合）很可能并非购买者的首要考量。此外，如果购买者每年将度假屋出租超过14天，国税局
    (IRS) 将对其按租赁房产征税。这可能会将购买者推入更高的边际所得税 bracket，从而导致总体所得税增加。


    假设作为购买者，您购买度假屋供自己或家人私人使用，您可以使用几种技巧来最大限度地利用税法。第一种，俗称同类交换或第1031条交换，可能允许您推迟缴纳因出售度假屋而实现的资本利得税。第二种，称为合格个人住宅信托
    (QPRT)，是一种遗产或赠与税规划技巧，如果满足特定条件，它允许您将度假屋的公允市场价值从您的总遗产中排除征税。


    ## 同类交换


    让我们首先讨论同类交换。根据所得税法第1031条，可以将一项投资物业（如房地产或度假屋）与另一项投资物业进行免税交换。您应注意，根据2017年《减税与就业法案》(TCJA)
    的规定，自2017年12月31日后，为投资而持有的个人财产的交换不再符合免税资格。但是，如果不动产是用于个人用途，则无法进行同样的交换。因此，如果您计划每年使用度假屋超过14天（这很可能是事实，因为您购买该房屋很可能是为了个人使用），那您肯定不走运，因为它将不符合免税或同类交换的资格。


    另一种情况是，假设无论出于何种原因，您计划每年仅使用度假屋一周。在这种情况下，您可以主张该度假屋严格作为投资物业持有，因此进行免税交换处理是可能的。然而，这里的关键词是“可能**”，因为关于交换度假屋（其中每栋房屋业主每年使用时间少于14天）的税务结果，法律并不明确。这无疑是激进的税务规划，但如果实际情况合适，它可能会奏效。


    如果您是将度假屋出租而非自住，则第1031条免税交换处理要清晰得多。在这种情况下，假设您将度假屋的个人使用时间控制在每年14天或更少，那么它很可能符合同类交换的资格，任何已实现的收益都将被递延。但请记住，递延收益的代价是需要每年将该房屋的所有收入作为租赁房产进行申报。'
  raw: '### Saving for a Home


    The cost of a home depends on local market conditions, but you should attempt
    to save at least 20 percent of the purchase price so as to avoid the additional
    cost of private mortgage insurance. Let’s consider an example.


    Assume that you are considering the purchase of a starter home for $150,000\.
    In this case, you should attempt to save at least $30,000 as a 20 percent down
    payment on the home. How long will it take you to accumulate $30,000? The answer
    depends on how much money you can save each month, as well as the rate of return
    you can earn on those savings.


    If you can put away $500 per month and earn a 6 percent before-tax rate of return
    on those savings, you will have $30,000 after approximately 53 months of saving.
    However, if you can earn a 12 percent before-tax rate of return (in other words,
    double your rate of earnings), you will achieve $30,000 in savings six months
    earlier, after approximately 47 months. Of course, if you can save more than $500
    per month, you can achieve the needed down payment even sooner. Keep in mind that
    some mortgages allow you to put down less than 20 percent of the home’s purchase
    price, but the conventional mortgage marketplace requires 20 percent as a minimum.


    Just as with any other financial goal, to save the funds necessary to buy a home,
    you have to plan to do so. This goes back to the financial-planning fundamentals
    discussed in the first section of the book: you must establish a savings strategy
    and then implement it. If you need to prepare a budget to allow you to accumulate
    the necessary savings, then you should do so. You must have the discipline to
    save, or you will not accumulate wealth.


    ### Understanding Types of Mortgages


    Historically, four primary types of mortgages have been offered to home-buyers,
    although recently a fifth—the interest-only mortgage—has been added to the mix.
    Each is discussed in turn in the following list, along with some factors to consider
    before choosing which is most appropriate for you. Keep in mind that regardless
    of which type of mortgage you choose, all demonstrate a primary advantage of investing
    in real estate: the use of borrowed money to leverage an investment and thereby
    achieve a greater return on your money.


    *   Conventional mortgage : This is a fixed-rate mortgage for the term of the
    loan—usually 15 or 30 years—that gives the borrower a guarantee that the interest
    rate will not increase. These types of mortgages are for individuals who have
    a stable cash flow and anticipate this stability to continue in future years.

    *   Adjustable rate mortgage (ARM) : With this type of mortgage, the interest
    rate charged may change on a monthly or yearly basis according to a specified
    index or benchmark, such as the current yield on the ten-year US Treasury note.
    ARMs are for individuals who want lower monthly payments and do not anticipate
    remaining in the home for a considerable period of time.

    *   Federal Housing Administration (FHA) mortgage : The payment of this mortgage
    is guaranteed by the federal government and as such normally has a lower interest
    rate than a conventional mortgage. A low down payment is also a feature of the
    loan. FHA mortgages are usually available only to lower-income homeowners.

    *   Veterans Administration (VA) mortgage : This type of mortgage features the
    same federal guarantee of repayment as that for FHA mortgage but is for veterans
    of the armed services only. A feature of the loan is that no down payment is required.

    *   Interest-only mortgage : In this form of mortgage, the borrower pays only
    the interest on the loan for a specified number of years. Little reduction of
    loan principal is possible, thereby effectively preventing the borrower from building
    much, if any, equity in the home. When executing an interest-only mortgage, the
    borrower is anticipating that the fair market value of the home will appreciate
    from the purchase price, allowing a payoff of the mortgage balance from any sale
    proceeds. By their nature, interest-only mortgages should be executed only by
    relatively risk-aggressive individuals.


    ## Purchasing and Using a Vacation Home


    Purchasing a vacation home is a direct form of real-estate investment. Although
    sometimes a vacation or second home is rented out and generates rental income
    for the purchaser, more times than not such a home is purchased as a private getaway
    for the purchaser and their family. As a result, treating the home as an income-producing
    investment in lieu of an income stock or fixed-income bond portfolio probably
    is not foremost in the purchaser’s mind. Moreover, if the purchaser does rent
    out the vacation home for more than 14 days per year, the IRS will tax it as a
    rental. This could push the purchaser into the next marginal income-tax bracket,
    resulting in higher overall income taxes.


    Presuming that you, as the purchaser, are buying a vacation home for your own
    private use or that of your family, you can use several techniques to take maximum
    advantage of the tax laws. The first, known colloquially as a like-kind exchange
    or Section 1031 exchange , may allow you to defer taxes on the gains realized
    from the sale of the vacation home. The second, known as a qualified personal
    residence trust (QPRT) , is an estate- or transfer-tax planning technique that
    allows you, if certain conditions are met, to exclude the fair market value of
    the vacation home from taxation in your gross estate.


    ### Like-Kind Exchanges


    Let’s first discuss like-kind exchanges . Under Section 1031 of the income tax
    code, it is possible to execute a nontaxable exchange of one investment property
    for another investment property, such as real estate or a vacation home. You should
    note that, under the provisions of the 2017 TCJA, exchanges of personal property
    held for investment no longer qualify as nontaxable after December 31, 2017\.
    However, it is not possible to execute this same exchange if real property is
    held for personal use. As a result, if you plan to use your vacation home for
    more than 14 days during the year (which is likely, because you probably bought
    the home for personal use), you are definitely out of luck, because it will not
    qualify as a nontaxable or like-kind exchange.


    Alternatively, assume that, for whatever reason, you plan to use your vacation
    home for only one week during the year. In this case, you could argue that the
    vacation home is strictly held as an investment property, and nontaxable exchange
    treatment should be possible. The key word here, though, is possible, because
    the law is unclear with respect to the taxable result of an exchange of vacation
    homes wherein each home is used by the owner for fewer than 14 days out of the
    year. This is certainly aggressive tax planning, but it may work if the facts
    are right.


    Section 1031 nontaxable exchange treatment is much more clear-cut if you rent
    out your vacation home instead of owning it for personal use. In that case, assuming
    that you keep your personal use of the vacation home limited to 14 days or fewer
    during the year, it probably will qualify as a like-kind exchange, and any realized
    gain will be deferred. Remember, though, that the trade-off for the deferral of
    gain is the annual reporting of all income from the home as a rental property.'
