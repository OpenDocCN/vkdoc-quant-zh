    (NAV) , which is computed by dividing the value of the fund’s total net assets
    by the number of shares outstanding. As a general practice, the NAV is computed
    at the end of each market trading day and is the price at which you must buy and
    sell shares.


    A mutual fund is a type of professionally managed asset . Practically, this means
    you deposit a sum of money with the fund along with thousands (or millions) of
    other investors. In turn, the fund’s professional money manager buys stocks, bonds,
    or other securities with that money. In this way, mutual funds are for the small
    investor, because they allow the “little guy” to purchase a percentage ownership
    in securities that they may not otherwise be able to afford. Mutual funds also
    allow investors to achieve instant portfolio diversification, because they now
    own a small piece of many stocks or bonds across many market sectors or industries.
    As a final bonus, investors do not have to keep track of all their holdings in
    the fund or the cost basis of purchasing the shares, because the fund company
    usually assumes these responsibilities.


    There are thousands of mutual funds, including money market funds; but practically,
    they can be segregated into stock funds and bond funds or a combination of both
    stocks and bonds, known as a balanced fund . You can also purchase funds that
    invest only in foreign stocks or bonds, called international funds , or those
    that invest in foreign and US stocks or bonds, called global funds .


    There are three basic types of stock mutual funds:


    *   Growth fund : This fund invests primarily in stocks that offer potentially
    significant capital appreciation. A subcategory of this type of fund is an aggressive
    growth fund, which invests in stocks of considerable risk and offers the possibility
    for maximum capital appreciation.

    *   Income fund : An income fund invests primarily in stocks that pay higher-than-average
    dividends, such as utility stocks. The name can also be used to describe a fund
    that invests a high percentage of assets in bonds.

    *   Growth-and-income fund : There are many names for this type of fund, including
    equity income and total return fund. Operationally, a growth-and-income fund invests
    in stocks that aim to achieve both long-term capital appreciation and current
    income. It is here that you find a concentration of value stocks that are of primary
    interest to the value style of investor.


    There are also three basic types of bond mutual funds:


    *   Corporate bond fund : This fund invests in either short-term bonds (generally
    not more than a five-year maturity date) or longer-term bonds or both, as issued
    by corporations. Usually these bonds are investment-grade, but not always. A clue
    that the bond fund is investing in non-investment-grade bonds is if the name of
    the fund includes the phrase high-yield. Historically, that type of fund has been
    referred to as a junk-bond fund, although the term junk is likely a bit extreme,
    because you can find good investments among the fund’s holdings.

    *   US government bond fund : This fund invests in US Treasury securities, typically
    Treasury notes or bonds. As mentioned, the securities in the fund are free of
    default risk, which is a major safety advantage but also an attribute that results
    in a lower yield than that of corporate funds.

    *   Municipal bond fund : This is also known as a tax-exempt fund , because it
    invests primarily in bonds issued by cities and states. Dividends paid by municipal
    funds are free from federal taxes; and if the purchaser is a resident of the state
    or city that issues the bond, the dividends are typically free of state and local
    taxes.


    There are many mutual funds and many mutual fund companies. In fact, mutual funds
    and professionally managed assets are among the subjects of a previous book that
    I authored, The Handbook of Professionally Managed Assets (Apress, 2013). However,
    if you are looking for large and well-known mutual fund companies that offer a
    wide variety of mutual funds (or families of mutual funds), the two largest companies
    are Vanguard Investments of Valley Forge, Pennsylvania, and Fidelity Investments
    of Boston, Massachusetts.


    ### Index Funds


    An index fund is a mutual fund that attempts to replicate the performance of a
    particular market index, such as the Standard & Poor’s index of 500 stocks. As
    such, the fund implements what is known as a passive management investment style:
    the fund manager has no actual intent to attempt to exceed the return of a specified
    market index. Additionally, index funds are fairly income-tax efficient, given
    that little selling of securities occurs within the fund, the tax consequences
    of which are passed along to the investor in the form of capital gains distributions.


    In contrast to an index fund, most stock and bond mutual funds are actively managed.
    As such, there is an effort on the part of the mutual fund’s money manager to
    outperform the market or some appropriate market index on a risk-adjusted basis.
    However, academic studies have shown that, on average, approximately 95 percent
    of all mutual fund money managers fail to outperform the Standard & Poor’s index
    of 500 stocks on a long-term basis. This means that as a potential investor, you
    should seek out mutual funds with relatively low expenses that have achieved above-average
    market performance over at least ten years. Fortunately, this is not too difficult,
    given the thousands of mutual funds available in the marketplace.


    ### Exchange Traded Funds


    In recent years, a variation of the mutual fund investment has been introduced
    to the financial markets. Called exchange-traded funds (ETFs), these funds occupy
    a relatively small part of the investment marketplace. Nevertheless, they are
    growing in popularity, particularly among tax-savvy investors.


    What are ETFs? Essentially, they are index funds that trade like stocks. Instead
    of being priced at net asset value at the end of the day, like traditional mutual
    funds, ETFs trade throughout the day based on market supply and demand. This can
    be important in a volatile market. Most ETFs are designed to match the performances
    of various market benchmarks, such as the Standard & Poor’s index of 500 stocks,
    and have interesting nicknames such as SPDRs, Diamonds, Qubes, and iShares. Other
    ETFs try to match the performance of a market sector, such as technology, energy,
    or finance. Still others are engaged in the trading of international securities
    or currencies.


    You should be interested in ETFs as possible wealth-accumulation vehicles for
    two primary reasons:


    *   Because they act like index mutual funds, ETFs are passively managed, and
    therefore the expenses of operating the funds are low—sometimes even lower than
    they would be for an index mutual fund.

    *   ETFs trade equivalent securities, or what are known as in-kind trades. According
    to the IRS, this exchange of essentially similar securities does not constitute
    a taxable event, and thus no capital gains or losses are incurred. Thus, ETFs
    are income-tax efficient. Alternatively, a traditional mutual fund must trade
    its securities in the open market, with the investor paying taxes on those gains.'
