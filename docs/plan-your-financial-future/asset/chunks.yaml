- fmt: '### Property Settlements


    The overriding issue in finalizing a property settlement agreement is to be fair
    to both spouses. In community property states, where both spouses own half of
    all property acquired during the marriage, an equal division is relatively easy.
    However, a notable exception occurs when one spouse brings an already-thriving
    small business to the marriage, but the business is worth considerably more at
    the time of the couple’s divorce or legal separation. The question then arises:
    how is the appreciation of the business during the couple’s marriage best handled?
    The answer varies depending on state community-property law, but generally, the
    founder-of-the-business spouse is awarded the value of the business at the time
    they brought it to the marriage in addition to half of the appreciation in the
    business thereafter. The nonfounder spouse receives the other half of the appreciation.


    Assume that you live in California and recently started a computer software business.
    It is worth $1 million when you marry your spouse. Eight years later, you get
    divorced, and at the time of your divorce, the business is worth $10 million.
    It is likely that the court will award you a settlement of $5.5 million with respect
    to the business—your original $1 million for your interest in the business prior
    to your marriage and another $4.5 million for the appreciation of your business
    during your marriage. You now have to come up with another $4.5 million to buy
    out your spouse’s interest or sell the business entirely to make the required
    payment. (Can you see why divorce can be financially devastating to your accumulated
    wealth?)


    There are currently eight community property states in the United States, and
    a ninth—Wisconsin—has a similar form of property law known as marital property.
    The two largest community property states—California and Texas—are relatively
    well known to most Americans. The other six states with community property law
    systems are as follows:


    - Arizona

    - Idaho

    - Louisiana

    - Nevada

    - New Mexico

    - Washington


    In addition, Alaska allows for the establishment of community property among married
    couples on an elective basis.


    All the remaining states (41, after accounting for Wisconsin’s variation of the
    community property form) are referred to in property law as common law property
    or individual property states. In these states, either the husband or wife (even
    with property acquired during the marriage) can title property in their individual
    name. However, for those who think this may be an advantage when it comes to making
    an inordinate or unequal division of property at the time of divorce, think again!
    Most—if not all—common-law property states follow a concept in property settlements
    known as equitable distribution. Under this model, each spouse has a legal right
    during marriage to the other spouse’s earnings and to the assets acquired with
    those earnings. As a result, common-law states end up in essentially the same
    place as community property states with respect to property acquired during the
    marriage: it is typically split in half between each of the spouses at the time
    of divorce or separation.


    Often, the most contentious part of property-settlement negotiations is how to
    fairly divide one spouse’s present or future retirement benefits. If this issue
    pertains to you, you should obtain a valuation of your (or your spouse’s) current
    `401(k)` or other retirement plan balance at the time of divorce. Once you have
    this valuation, make sure, if you are the payee spouse, that you obtain what is
    known as a qualified domestic relations order (`QDRO`) from the court. This order
    awards you the same rights that the plan participant would have had under the
    `401(k)` or other retirement plan, including the right to choose your own investments.


    As a divorcing spouse, you can also receive current or future Social Security
    benefits based on your former spouse’s employment record if the following conditions
    are met:


    - You were married to your former spouse for at least ten years.

    - You are not remarried.

    - You are at least 62 years old.

    - Your former spouse is at least 62 years old and entitled to retirement or disability
    benefits.


    Note that if you remarry after you have attained the age of 62, your eligibility
    for Social Security benefits based on your former spouse’s employment record is
    not affected.


    ### Principal Residence


    Typically, the major asset that most couples own at the time of divorce is their
    house or primary residence. Because most couples are jointly obligated on the
    home mortgage, half of each mortgage payment may qualify as deductible alimony
    by the departing spouse. The other half of the mortgage payment is deductible
    by the remaining spouse under normal mortgage interest deduction rules; in other
    words, the remaining spouse should itemize their deductions on a separately filed
    income-tax return. Proceed carefully, however. Remember, under the alimony tax
    rules, any payment that constitutes deductible alimony may not be specified as
    anything other than alimony. Therefore, if you are the departing spouse and will
    be responsible for half the mortgage, add a sufficient amount to your required
    alimony payments to cover your portion of the monthly mortgage interest liability.


    For example, assume that you and your wife are getting a divorce. You have agreed
    to pay her alimony of $3,000 per month. Your mortgage payment each month is $1,000,
    and $600 of that amount is interest. You remain obligated for your half of the
    mortgage payment. As such, add or recharacterize half—or $300—of the mortgage
    interest payment as deductible alimony, resulting in a total alimony payment of
    $3,300 per month (the $3,000 original amount plus the additional $300 recharacterized
    amount).


    It gets even more complicated if you, as the departing spouse, are solely responsible
    for the mortgage payment. Although you are considered to have paid all the monthly
    interest on the mortgage, you are not necessarily entitled to the full itemized
    interest deduction. Rather, once you have moved out of the house, the house is
    no longer your primary residence (which, as you know from Chapter 11, can have
    serious tax implications if your ex-spouse sells the house immediately or if you
    did not live in it for at least two years before it is sold). You may be able
    to claim the house as a secondary residence and deduct the mortgage interest in
    that manner. The catch in this strategy, however, is that you must let your ex-spouse
    remain in the primary residence rent-free. Some spouses do not want to do this,
    particularly if it is a bitter divorce proceeding.


    The key takeaway from this discussion is this: if you are involved in a divorce,
    do not try to represent yourself. The potential damaging consequences to your
    accumulated wealth are much too significant to forego seeking the assistance of
    competent legal and financial counsel.'
