- fmt: '### Alimony


    Alimony, if it is to be paid, is often the most contentious aspect of any divorce
    proceeding. This is complicated by the fact that the payer of the alimony receives
    an income-tax deduction for payments made, thereby encouraging them to allocate
    as much of the total payments from the divorce to alimony as possible. To prevent
    this abuse, some years ago Congress added a provision to the Internal Revenue
    Code known as excess front-loading alimony rules, commonly referred to as alimony
    recapture. If violated, these rules make the payer go back and include in their
    income statement some portion of the alimony paid and deducted.


    For example, assume that a husband made an alimony payment of $50,000 in the first
    year subsequent to a divorce and nothing thereafter. Under the alimony recapture
    rules, at the end of the third year after the divorce, the husband is required
    to file an amended income-tax return and include a portion of the $50,000 first-year
    payment in his income. This excess payment is referred to as disguised alimony
    because, inevitably, the real intent of the payment was as part of a property
    settlement agreement between the husband and wife. This payment could also have
    been intended as child support in the event that the couple had minor children
    at the time of the divorce.


    The payee, for their part, must include in their income any alimony paid by the
    payer. Although not technically income in the sense of salary or wages, alimony
    constitutes earned income as characterized by a traditional IRA contribution.
    This means a stay-at-home ex-wife receiving alimony from her husband may contribute
    and deduct up to the specified annual amount for IRA savings and her own eventual
    retirement.


    To qualify as tax-deductible alimony, payments stipulated in the divorce or separation
    agreement cannot be designated as something other than alimony (such as child
    support, for example). In addition, the payments cannot be scheduled to continue
    after the death of the payee spouse and must be made in cash or its equivalent.
    As such, transferring appreciated securities to an ex-spouse does not constitute
    alimony. However, payments made to a third party on behalf of the payee—such as
    life insurance premiums payable on the life of the payer—do constitute alimony.


    For example, assume that a wife receives a sizable alimony award as a result of
    her divorce from her physically ailing husband. She is very concerned about how
    these alimony payments will be made if her husband predeceases her. Accordingly,
    as a part of the divorce decree, she mandates that the husband continue his premium
    payments on his life insurance policy and retain her as the irrevocable beneficiary.
    These premium payments constitute qualifying, deductible alimony for income-tax
    purposes.


    In this example, what happens if the husband fails to make the premium payments
    on his life insurance policy, leaving the wife without income protection? The
    husband may be held in contempt of court and punished with jail time. This complicates
    the wife’s situation even further, though, because if the husband is in jail,
    it is extremely unlikely that he will resume making life insurance premium payments.
    There is a better way.


    As a planning technique in the context of this example, consider having the wife
    own the life insurance policy and make the premium payments. This prevents changes
    from being made to the policy without her knowledge. In addition, if the wife
    can afford it, have her buy life insurance that can build cash value on the life
    of the husband (for example, a whole life, universal life, variable life, or variable/universal
    life policy). The cash account in this policy is now hers to do with as she pleases,
    and she may even borrow against the policy for her own retirement if she so chooses.
    If any new life insurance is needed as a result of her changed financial circumstances
    after the divorce, the wife should apply for the insurance before the divorce
    is final. Then, if the husband cannot qualify for the life insurance (for example,
    because of poor health), the wife may still modify the final divorce decree to
    make up for the loss of the insurance proceeds. The treatment of alimony for tax
    purposes changes in the year 2019. Specifically, under the 2017 TCJA, alimony
    paid by one spouse to the other is not deductible, and the spouse receiving the
    alimony no longer pays taxes on the alimony amount. This creates a unique set
    of planning circumstances in the year 2018. The alimony-seeking spouse has an
    incentive to delay the divorce until 2019, whereas the alimony-paying spouse has
    an incentive to accelerate the making of the payment to the year 2018. It will
    be interesting to observe how divorce attorneys consider these competing goals.


    ### Child Support


    Each state has applicable guidelines with respect to the amount of child support
    that may be appropriate in any divorce agreement. If you are working with a divorce
    attorney or financial planner, they will be familiar with these guidelines. However,
    as with any cash-flow issue, be sure you, as the payer, can afford the minimum
    recommended child-support payment. For most divorcing individuals, the question
    is not whether child support should be paid, but rather how much should be paid.
    As such, be sure you are comfortable with the amount specified by the court—and
    pay it! Although it is against the law for an employer to fire you because you
    are not current with child-support payments, there is no prohibition against garnishing
    your wages to pay back-due amounts. If this happens, the employer may use other
    reasons to terminate your employment, notwithstanding that the real reason was
    your failure to assume the parental responsibility of supporting your children.


    Child-support payments are neither deductible by the payer spouse nor taxable
    as income to the payee spouse. However, sometimes there is a question as to whether
    a payment is, indeed, child support or disguised alimony. Here is the standard
    rule you can use to tell the difference: if any portion of the agreed-on payment
    may be reduced because of circumstances related to the child, it is child support
    for income-tax purposes. For example, if the payment is reduced after the child
    goes to college, it is treated as nondeductible and nontaxable child support.
    This differentiation is likely important to high-income divorcing couples, where
    the higher-wage earner wants as much of the payment as possible treated as deductible
    alimony. This is in marked contrast to the lower-income earner, who probably is
    not nearly as concerned with the tax treatment of the payment.


    #### Child Tax Credit


    One other consideration in divorce also becomes important in light of 2017 TCJA
    changes: qualifying for the increased child tax credit of $2,000, up to which
    $1,400 is potentially refundable.


    The definition of a qualifying child for taking advantage of the child tax credit
    is the same as that for claiming a dependency tax exemption except that the child
    must not have attained the age of 17 by the end of the year. As such, whether
    the child may be claimed as a dependent by either one of the divorced spouses
    is critical to clarify in the making of the divorce settlement. Typically, the
    dependency exemption for a child who is qualifying child for purposes of also
    claiming the child tax credit will accrue to the parent who has primary custody
    of the child for the current taxable year. However, the custodial parent can waive
    the exemption, thereby permitting the noncustodial parent to claim the qualifying
    child for purposes of the credit. As a result, the determination of the custodial
    parent for purposes of the child tax credit (and the increased amount) should
    now be considered more carefully in light of the 2017 TCJA changes.'
