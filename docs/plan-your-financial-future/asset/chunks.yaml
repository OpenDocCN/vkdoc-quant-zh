    retirement plans and IRAs, when we address distributing your wealth at the time
    of retirement; but some employers offer plans in addition to the Section 401(k)
    and Section 403(b) plans. If they do, they may permit you to make contributions
    to these plans on an after-tax basis. These are commonly referred to as designated
    Roth accounts . This may not seem like something you want to do, particularly
    if you have already maxed out your before-tax contributions to the 401(k) or 403(b)
    plan, but consider this: if you contribute after-tax money to any employer-sponsored
    plan, you do not have to pay income taxes on any distribution the plan makes of
    those same funds, including earnings to you. Moreover, the contribution limit
    to a designated Roth account is considerably greater than the limit for contribution
    to a Roth IRA. As a result, if you have the opportunity to make after-tax contributions
    to an employer-sponsored plan and can afford to do so, you should.


    ## Company Stock Purchase Plans


    There are two basic types of company stock purchase plans: employee stock ownership
    plans (ESOPs) and employee stock purchase plans (ESPPs). Both plans permit employees
    to purchase and own employer stock, although, as the name implies, only the ESOP
    permits controlling ownership to be transferred to the employees.


    If you work for a corporation or incorporated business, the employer may have
    established an ESOP. An unincorporated business, on the other hand, such as a
    sole proprietorship or partnership, cannot have an ESOP, because the business
    has no stock.


    So, what is an ESOP? It is a retirement plan designed to invest primarily in employer
    stock. Some closely held (non-publicly traded) corporations also establish ESOPs
