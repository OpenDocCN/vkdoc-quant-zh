  trans: '

    # 医疗决策代理人的选择


    选择代理人为委托方做出医疗决策，甚至比选择`持久授权书`的代理人更需要谨慎考虑。尽管有些人可能不太在意自己的财务事务，或是在自己丧失行为能力时由谁来接管这些责任，但当涉及自身健康时，情况恐怕就不同了。委托人必须对自己选择代为做出医疗决策的人选进行深思熟虑。同样需要注意，被指定为委托人医疗事务授权代理人的人，不必与被指定管理委托人资金或财产的人是同一人。


    ## 为自身丧失行为能力做规划


    你应如何着手规划自身可能丧失行为能力的情况？你需要这两类授权书中的一种还是两种？答案是肯定的，而且你最好将这两份文件都起草好——即使你认为暂时不需要单独的遗嘱。统计数据显示，你在人生任何特定时刻丧失行为能力的几率远高于死亡的几率，因此，书写持久授权书的重要性怎么强调都不为过。为协助你书写和执行这些文件，附录
    C 和 D 中提供了通用的`DPOA`和`DPOAHC`样本。或者，你也可以寻求遗产规划或老年护理律师的帮助，来起草这些文件。


    ## 持久授权书的潜在问题


    持久授权书是一种简单且总体有效的为失能情况做规划的方式，但其使用也存在几个潜在问题。首先，如果授权书已经过时（例如，超过五年），被出示授权书的第三方可能不承认其有效性。此外，该第三方（通常是金融机构）可能会要求委托人签署他们自己格式的持久授权书，以便在履行授权时保护自己免受潜在责任。如果在原始`DPOA`签署之时与需要行使授权之时之间，委托人丧失了行为能力，这一问题尤为令人担忧。作为一般规则，你在签署通用`DPOA`之前，应询问第三方他们可能在多长时间内承认其有效性。


    `DPOA`的另一个问题，无论是涉及委托人的财务还是医疗保健，在于根据法律规定，该授权在委托人死亡时终止。因此，在未成年子女依赖委托人代为行事的情况下，如果委托人死亡，`DPOA`可能会带来问题。幸运的是，将可撤销生前信托作为遗产规划过程的一部分来书写，其优点之一就是它可作为为自身失能做规划的有效方法。具体来说，与`DPOA`或`DPOAHC`不同，`RLT`的继任受托人代表委托人行事之权力，在委托人死亡时并不会终止。相反，继任受托人可以继续行事而无需承担责任。在某些州，由于这一特点，许多金融机构更倾向于承认`RLT`的法律效力，而非`DPOA`。


    ### 示例场景


    例如，假设你在十年前授予了你的长子一份通用的`DPOA`。鉴于这份通用`DPOA`已经过时，在你仍然在世时，一些金融机构可能会拒绝承认其有效性。接下来，假设当这份通用`DPOA`仍然有效时，你丧失了行为能力。在这种情况下，你的儿子可能无法作为授权代理人代你行事。最后，假设你明天去世了。在你的死亡发生时，你儿子代你行事的权力将有效终止。如果你签署一份可撤销生前信托，并指定你的儿子为继任受托人，以替代`DPOA`或与`DPOA`结合使用，那么所有这些潜在问题都可以避免。


    # 生前遗嘱


    与可在多种医疗情况下生效的`DPOAHC`不同，生前遗嘱仅在罹患绝症的情况下生效。换句话说，你必须处于绝症状态且预期无法康复，生前遗嘱才能生效。由于近年来的医学进步，医院和其他类型的医疗护理机构可以通过让呼吸机为绝症患者呼吸、或通过静脉注射喂养他们（或两者并用），使他们存活数天、数周甚至数月。因此，在大多数州，你被允许签署一份生前遗嘱，指示医疗护理机构在你罹患绝症时，采取以下三种方式之一行事：


    -   医疗护理机构必须无限期地为你维持人工生命支持手段。

    -   在两名或以上医生宣布你为绝症状态后，医疗护理机构必须立即停止人工生命支持手段。

    -   根据你的意愿，医疗护理机构必须维持人工生命支持手段一段时间——通常为七到十天。


    许多人选择第三种选项，但并没有证据表明，在依靠生命支持系统度过一定天数或周数后，你会部分或完全康复。通常结果恰恰相反：如果你在规定时间后仍未康复，你很可能不会康复了。不幸的是，这使得签署生前遗嘱变得更加困难，因为大多数人都不愿考虑自己可能陷入绝症状态。


    ## 生前遗嘱与 DPOAHC 的区别


    与指定一名医疗保健事务替代决策者的`DPOAHC`不同，生前遗嘱是你直接向医生发出的个人指令，明确说明如果你罹患绝症，你希望得到何种治疗。作为程序上的要求，在签署生前遗嘱后，你应该将一份副本交给你的家庭医生和其他医生。幸运的是，大多数州都发布了预先印制的表格，你可以在入院前填写，这使得书写生前遗嘱的过程变得更为容易。提前填写这份表格，让你能与医生讨论你的决定所带来的后果以及可能意想不到的负面影响。


    你应该签署生前遗嘱吗？如果你尚未书写`DPOAHC`或医疗授权委托书，那么你应该签署。如果你已经书写了`DPOAHC`，则应检查该文件是否已包含生前遗嘱的条款。一些州允许个人在`DPOAHC`中同时指示生前遗嘱的方向，以及指定医疗保健持久授权书应授予何人。因此，你只需完成一份文件，而非两份，即可应对在你失能情况下可能需要做出的任何可预见的医疗决策。不过，请记住，这种操作方式可能会使你的医生更难确定你更愿意接受哪种类型的医疗照顾。因此，无论你是同时拥有生前遗嘱和`DPOAHC`，还是拥有一份涵盖所有内容的综合文件，你都必须与你的配偶或其他近亲口头沟通，在你遭遇危及生命的情况时应当如何处理，这一点至关重要。


    生前遗嘱——有时其正式名称为“医疗或外科治疗声明书”——以及一份`DPOAHC`的样本副本均包含在附录 D 中。

    '
- fmt: '# Personal Letter of Instructions


    A final, often-overlooked document that you can use to aid in the distribution
    of your wealth upon your death is a personal letter of instructions. This letter
    is an informal writing from you to the executor of your will, reminding them to
    contact certain individuals and perform certain tasks in the event of your death.
    Such a letter often also includes directions as to where the executor may find
    the original copies of your last will and testament, information on any trusts
    you have executed, forms specifying powers of attorney, and living wills. The
    letter should also specify how you wish to have your body handled subsequent to
    your death, as well as any other special wishes, such as organ donation.


    It is important to understand that you do not have to draft a personal letter
    of instructions in any particular form, nor do you need to consult an attorney
    to draw one up for you. Rather, the form of and the inclusions in the letter are
    limited only by your current and anticipated circumstances (and perhaps by your
    creative skills). A sample personal letter of instructions as used by an attorney
    in his financial- and estate-planning practice is included in Appendix E.


    ## When Should I Change My Estate Plan?


    You should periodically review your estate-planning documents to consider whether
    your objectives have changed. To conclude this chapter, the following are some
    important events that may cause you to consider changing your estate plan, amending
    your current will or trusts, or rewriting those documents entirely:


    - You have moved from one state to another. In this case, it is good practice
    to have your will or any other estate-planning document reviewed by an attorney
    who is licensed in your new state of residence.

    - You have had a significant change in family circumstances, such as the birth
    of a new child or the death of a named or intended beneficiary to your estate.

    - The executor or guardian you have selected for your estate can no longer serve.

    - You are a high-net-worth individual, and there has been a substantial change
    in the estate- or gift-tax laws subsequent to the implementation of your estate
    plan.

    - You have come into a substantial inheritance (or another significant change
    in the amount of property that may be taxed) after the writing of your estate-planning
    documents.

    - Any other important distribution or estate-planning objective has changed since
    you first implemented your plan.


    In amending your plan or documents, it is prudent to seek the assistance of a
    financial planner or estate-planning attorney or both.


    Now let’s move on to techniques for engaging in philanthropy, which is a common
    estate-planning objective of many individuals, particularly those of high net
    worth. The topic of charities and charitable planning is so vast that it warrants
    a separate chapter. We look at the topic first from the standpoint of how to choose
    a charity to benefit from your largesse. Then we discuss how to best structure
    the gift or testamentary bequest to benefit that charity.


    # 20. Philanthropy


    We conclude our look at wealth accumulation and management by considering a common
    financial-planning goal of many individuals, particularly married couples without
    children or those who are unmarried: benefitting, either at death or during their
    lifetime, the charity of their choice.


    Before we begin this important discussion, allow me a note of caution: most taxpayers
    are aware that the government offers taxpayers an income-tax deduction for charitable
    gifts made during their lifetime. Although taking advantage of this deduction
    is a valuable tax-avoidance technique, you should not let your desire to reduce
    your taxes outweigh practical cash-flow management. In other words, just because
    the charitable income-tax deduction is permitted does not mean you should make
    a transfer to charity if this transfer will jeopardize your ability to maintain
    your standard of living. Your analysis should be quite the contrary: if you cannot
    afford to make a gift to charity during any given year, do not make such a gift.
    Furthermore, although you might consider it unfair tax policy, it is the law that
    you must be able to itemize your income-tax deductions before deducting any contributions
    to charity. This is still the case even after passage of the 2017 TCJA. If you
    are unable to itemize your deductions, you must take only internal satisfaction
    in giving to the charity of your choice.


    ## Choosing a Charity to Benefit


    For income-tax purposes, there are two types of qualifying charitable organizations:
    a public (also known as a 50 percent) charity and a private (also known as a 30
    percent) charity. Each of these charities gets its percentage name from the respective
    maximum limitation that you, as the donor, may deduct as a percentage of your
    adjusted gross income (AGI) in the year when you make a charitable contribution.
    For example, assume that you have decided that during the current tax year, you
    wish to make a sizable gift of $50,000 to the American Red Cross to benefit the
    victims of recent hurricanes. However, your AGI for this year as reported on your
    IRS Form 1040 is only $80,000. Thus, you are limited to an allowable itemized
    deduction of only $40,000 for this gift ($80,000 times 0.50) during this tax year.
    The remaining $10,000 must be carried over and deducted in a subsequent year,
    for up to a period of five years, when your AGI for that year is at least $20,000
    ($20,000 times 0.50).


    For transfer-tax purposes, on the other hand, there is no taxable difference with
    respect to which type of charity you benefit. Regardless of whether the charity
    is public or private, you receive an unlimited deduction equal to the amount of
    property that passes from you to the named charity at your death or during your
    lifetime. Keep in mind, though, that if you care to also benefit a noncharitable
    beneficiary, such as yourself, before transferring the property to charity, you
    must do so through the use of a specific form under tax law. This type of transfer
    is known as a split-interest gift. If you do not make this type of transfer in
    an approved form, the transfer-tax charitable deduction will not be permitted.


    For example, assume that you are interested in benefiting your alma mater with
    a charitable gift of income-producing property at your death. But during your
    lifetime, you need the income from this property to maintain your current standard
    of living. Under current tax law, you must structure this split-interest transfer
    in one of only a few allowable ways, including a private transfer in trust (commonly
    known as a charitable remainder trust) or via a fund that has been previously
    established by your alma mater (commonly known as a pooled income fund).'
  raw: '## Personal Letter of Instructions


    A final, often-overlooked document that you can use to aid in the distribution
    of your wealth upon your death is a personal letter of instructions . This letter
    is an informal writing from you to the executor of your will, reminding them to
    contact certain individuals and perform certain tasks in the event of your death.
    Such a letter often also includes directions as to where the executor may find
    the original copies of your last will and testament, information on any trusts
    you have executed, forms specifying powers of attorney, and living wills. The
    letter should also specify how you wish to have your body handled subsequent to
    your death, as well as any other special wishes, such as organ donation.


    It is important to understand that you do not have to draft a personal letter
    of instructions in any particular form, nor do you need to consult an attorney
    to draw one up for you. Rather, the form of and the inclusions in the letter are
    limited only by your current and anticipated circumstances (and perhaps by your
    creative skills). A sample personal letter of instructions as used by an attorney
    in his financial- and estate-planning practice is included in Appendix E.


    ## When Should I Change My Estate Plan?


    You should periodically review your estate-planning documents to consider whether
    your objectives have changed. To conclude this chapter, the following are some
    important events that may cause you to consider changing your estate plan, amending
    your current will or trusts, or rewriting those documents entirely:


    *   You have moved from one state to another. In this case, it is good practice
    to have your will or any other estate-planning document reviewed by an attorney
    who is licensed in your new state of residence.

    *   You have had a significant change in family circumstances, such as the birth
    of a new child or the death of a named or intended beneficiary to your estate.

    *   The executor or guardian you have selected for your estate can no longer serve.

    *   You are a high-net-worth individual, and there has been a substantial change
    in the estate- or gift-tax laws subsequent to the implementation of your estate
    plan.

    *   You have come into a substantial inheritance (or another significant change
    in the amount of property that may be taxed) after the writing of your estate-planning
    documents.

    *   Any other important distribution or estate-planning objective has changed
    since you first implemented your plan.


    In amending your plan or documents, it is prudent to seek the assistance of a
    financial planner or estate-planning attorney or both.


    Now let’s move on to techniques for engaging in philanthropy, which is a common
    estate-planning objective of many individuals, particularly those of high net
    worth. The topic of charities and charitable planning is so vast that it warrants
