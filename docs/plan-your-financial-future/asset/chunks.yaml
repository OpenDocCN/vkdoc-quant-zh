  trans: '

    ### 其他大学储蓄方式


    还有几种其他方式可以为孩子的高等教育储蓄，包括以孩子的名义设立信托。（关于信托的进一步讨论，请参阅第 13 章。）所有可用于此目的的信托都是不可撤销的，这意味着您无法取回资金，并且信托本金最终必须分配给未成年人。在规划孩子大学教育时，最常用的信托或许是`Section
    2503(c)`信托，也称为未成年人信托。该信托必须由律师起草，信托本金（以及任何未支出的收益）将在孩子年满 21 岁时提供给他们。您可以根据自己的判断，采用另一种称为`Section
    2503(b)`信托的替代信托来延长分配年龄，但`Section 2503(b)`信托的收益必须每年分配给该儿童，从而引发额外的“儿童税”问题。


    您还可以购买`Series EE`债券和经过通胀调整的`Series I US Savings Bonds`，并将其专用于支付孩子的大学教育费用。对于这两种选择，债券必须以您的名义或至少
    24 岁的成年人名义购买。此外，在赎回债券时，还需适用调整后总收入（`AGI`）限额。例如，如果您以您的名义购买债券，并打算将其用于支付孩子的大学费用，而当孩子上大学时，您的`AGI`过高（超过法律规定的特定金额），则您在赎回债券时需就债券利息缴纳所得税。但是，如果您的`AGI`低于规定金额，并且该债券用于支付合格的高等教育费用，则您无需为这部分利息缴税。


    ## 可用于支付大学费用的税收减免和抵免


    本节讨论所得税法提供的福利，旨在帮助您或您的孩子支付大学期间或接受其他类型高等教育所产生的费用。可用的税前扣除项目包括学生贷款利息的扣除和合格高等教育学费的扣除。重要的税收抵免包括美国机会税收抵免和终身学习抵免。但自
    2001 年以来，这些扣除和抵免不能同时用于支付同一笔费用。因此，必须仔细规划每一项的使用，以便最大限度地利用您可获得的每一项福利。


    ### 学生贷款利息扣除


    根据现行法律，任何有义务偿还学生贷款的个人所支付的利息（绝非本金），无论纳税人是否逐项列举扣除，均可予以扣除。然而，可扣除金额每年最高不超过 2,500 美元，并且根据纳税人的`AGI`水平适用收入逐步淘汰范围。尽管这些逐步淘汰范围很高，尤其是对于学生借款人而言，但它们可能会导致高收入纳税人借款人（例如选择使用`PLUS`贷款支付子女教育费用的父母）无法享受此项扣除。


    要享受此项扣除，借款人产生的任何债务必须仅用于支付合格的高等教育费用，包括学费、杂费、书本费以及食宿费。对于该债务是用于攻读本科学位还是研究生学位，没有限制，但作为合格高等教育费用定义的一部分，该债务必须用于在合格教育机构学习。


    ### 合格高等教育学费及杂费扣除


    该扣除项目于 2016 年底到期，且未被《2017 年减税与就业法案》（`TCJA`）延长。因此，除非学费和杂费也符合可允许的商业费用（即`Schedule
    C`扣除项目）的条件，否则此项扣除不再适用。根据先前的法律，每位学生每年可享受的最高扣除额为 4,000 美元。


    正如我们稍后将讨论的，父母也可能有可能针对高等教育学费和杂费申请税收抵免，例如美国机会税收抵免（`AOTC`）或终身学习抵免（`LLC`）。但如果他们这样做，则不允许对同一学生的同一笔费用（例如，使用`Section
    529`计划的分配来支付学费和杂费）同时享受税收抵免。如果您是一位有两个孩子同时上大学的父母，这将带来一个有趣的难题。您应该仔细考虑如何最好地最大化一个孩子可享受的税收抵免，以及另一个孩子的学费和杂费支付所带来的税收优惠。本质上，虽然有两个孩子的父母可以混合搭配税收抵免与学费和杂费支付，但在试图为同一名学生同时利用这两种税收优惠时，不能双重获益。


    ### 高等教育税收抵免


    如第 12 章所述，税收抵免（或等额减少应缴税款）是一种有价值的避税技巧。在大多数情况下，如果纳税人符合申请任何税收抵免的资格，他们应该安排自己的财务事项来充分利用它。在寻求税收优惠以支付高昂的高等教育费用时，允许使用两种抵免：美国机会税收抵免（`AOTC`）和终身学习抵免（`LLC`）。在
    2009 年之前，还允许使用第三种抵免——希望奖学金抵免。自 2008 年 12 月 31 日之后，该抵免被`AOTC`取代，用于支付某些高等教育费用。


    #### 美国机会税收抵免


    美国机会税收抵免（`AOTC`）是对 2008 年 12 月 31 日之后开始的纳税年度的希望奖学金抵免的修改；它由《2017 年减税与就业法案》（`TCJA`）保留至
    2025 年。`AOTC`的金额相当于合格学费及相关费用的前 2,000 美元的 100%加上接下来的 2,000 美元合格学费及相关费用的 25%之和，每名符合条件的学生每年最高抵免额为
    2,500 美元。因此，在计算抵免额时，最多可考虑每年 4,000 美元的合格费用。如果学生未被申报为被抚养人，可以自行申请`AOTC`；否则，由支付学生学费的父母（或其他人）在将该学生申报为被抚养人时申请此项抵免。


    就本抵免而言，什么算作合格费用？与仅考虑学费和杂费的终身学习抵免不同，美国机会税收抵免还包括书本费、学校用品（包括电脑）、软件和其他课堂材料等费用。


    该抵免适用于学生本科教育的前四年，但适用逐步淘汰规则。2018 年，对于年度`AGI`在 80,000 美元至 90,000 美元之间的单身纳税人，抵免额开始逐步减少。对于联合申报的已婚纳税人，该抵免额在
    160,000 美元至 180,000 美元之间逐步减少。

