- fmt: '# So, I am Retired! Now What?


    You experience a significant life change when you retire, no matter your age.
    Among the issues you should consider when you retire is the need to establish
    a new identity, but there are also other lifestyle-related issues. Among these
    are the following:


    - Will you continue to work, even if it is only part-time?

    - Do you plan to pursue educational opportunities that you were too busy to consider
    while you were employed full-time?

    - Do you plan to travel? What will you do for recreational activities?

    - Perhaps most important, how do you accommodate the change from employment to
    retirement?


    Let’s consider these issues in more detail.


    ## Future Work


    In recent surveys, over 70 percent of baby boomers (individuals born between 1946
    and 1964) said that they planned to continue working in some capacity during retirement.
    This statistic may be somewhat misleading, because in many instances boomers will
    have to continue working due to poor savings habits and lack of planning, but
    there is no doubt that the members of this generation will be more active in their
    retirement than previous generations were. Employment of some kind, even if part-time,
    may be useful, because it eases the transition from a working career to the more
    leisurely time of retirement.


    If you will continue to work after you are retired, you need to consider the impact
    of your earnings on your eligibility to receive Social Security benefits. For
    example, if you elect to receive Social Security retirement benefits early (beginning
    at age 62), be aware that an earnings limit applies until you are 65 or until
    your otherwise specified full retirement age (`FRA`) under the Social Security
    system. If you are under your `FRA` throughout a given calendar year and earn
    more than a specified amount, then $1 of Social Security benefits is withheld
    for every $2 you earn in excess of this limitation. Further, this earnings limit
    is separate and apart from any income-tax requirements to which you may be subject.
    In other words, between the age of 62 and your `FRA`, not only will your Social
    Security retirement benefits be reduced, but you will have to pay income taxes
    on those benefits if your income exceeds either of the special step-rate thresholds.


    You should also consider the possibility of self-employment during retirement.
    As part of their desire to stay active, many boomers have started their own businesses.
    According to a survey by Bloomberg’s Business Week magazine, boomers are twice
    as likely to pursue self-employment than the generations that retired before them.
    This is particularly true for boomers with professional skills, such as medical
    doctors, lawyers, accountants, and financial planners. Moreover, it is generally
    advantageous from an income-tax perspective to become self-employed, because self-employed
    individuals usually are better able to benefit from certain tax deductions and
    credits than are salaried employees.


    Keep in mind, however, that self-employment also carries many risks, chief among
    them the willingness to assume the financial risk associated with becoming self-employed.
    Most businesses do not generate a profit until at least three years after the
    business was started. In the meantime, these businesses must find a way to cover
    expenses during the years when a profit was not generated. Hence, many self-employed
    individuals seek financial assistance from banks and other sources of capital
    to run the business in its formative years. Typically, banks require a personal
    guarantee of repayment on any monies loaned. This often means that if you become
    self-employed and require the bank’s financial assistance, you must pledge personal
    assets, such as your house, as collateral for the loan. Venture capitalists—private
    money lenders—are even more demanding: they may require not only a personal guarantee,
    but also a percentage of the profits after the business becomes profitable.


    Unless you consider yourself a risk-taker—the primary attribute of any entrepreneur—you
    may wish to remain in the employ of a larger company. For instance, Walmart has
    become known for aggressively seeking senior workers, and other companies are
    quickly doing the same, given the wealth of experience that today’s retirees bring
    to any business.


    ## Education


    What should you do if you are retired and want to pursue a degree or return to
    the college coursework you always meant to finish? Normally, if you withdraw money
    from a traditional or Roth IRA before you reach the age of 59.5, you pay a 10
    percent early distribution penalty in addition to regular income tax (you would
    pay tax on the contributions and earnings from a traditional IRA, but probably
    only on the earnings from a Roth IRA). There is an exception to this penalty when
    you use the money in payment of qualified higher-educational expenses, however.
    If you are a retiree under the age of 59.5, you can withdraw money from your traditional
    or Roth IRA if the expenses incurred are for the education of you, your spouse,
    your children, or your grandchildren and include only tuition, fees, and books
    used in a degree program. Meanwhile, if you are over age 59.5, you pay neither
    a penalty nor income tax on a qualified Roth IRA distribution made for purposes
    of education.


    A second suggestion is to do what increasing numbers of traditional college students
    are doing: request financial aid. There is no age maximum on financial-aid packages
    offered by schools or the government. As a result, if you can demonstrate a need
    for the money to attend school, just like your children or grandchildren, you
    may be awarded financial aid. In addition, if you are attempting to fund your
    post-retirement education from your traditional or Roth IRA, the assets accumulated
    within that account are sheltered from the financial-aid need analysis; in other
    words, they are not counted against you.


    Finally, consider borrowing for your education from an employer-sponsored retirement
    plan, such as a Section 401(k). In practical effect, you are borrowing from yourself
    to fund your education, but you are doing so at an extremely favorable interest
    rate—usually only a percentage point or two above the prime rate. The funds you
    borrow from a retirement plan are still tax-deferred and are not subject to income
    tax when you borrow them. Then, when you pay the funds back, they return to your
    retirement account, and all you have sacrificed in the meantime are any earnings
    that could have been made on the account if you had not taken the loan.'
