    must agree to assume a fiduciary duty under law, meaning they must act at all
    times in the exclusive and best interest of the client. In addition, a planner
    who achieves this credential must participate in mandatory continuing education
    in the specified subject areas of financial planning, as well as complete a separate
    refresher course in the principles and rules of the ethics code. CFP planners
    must also have graduated from college, have at least three years of financial-planning
    experience, complete a formal education program covering specified financial-planning
    topics (including, beginning in 2012, comprehensive case studies), and successfully
    pass a rigorous, comprehensive, six-hour examination in these topics.


    Another meaningful credential for a financial planner is the Chartered Financial
    Consultant (ChFC). This designation is awarded by the American College of Financial
    Services in Bryn Mawr, Pennsylvania, to individuals who have completed an eight-course
    curriculum, some of which can substitute for the CFP educational program requirement.
    The American College was originated and first funded by the life insurance industry,
    so its education probably tends to emphasize insurance matters more than broad-based
    financial planning. However, the designation is well respected among financial
    planners generally.


    A third highly recognized financial-planning professional designation is one available
    only to Certified Public Accountants (CPAs) and is offered by the American Institute
    of Certified Public Accountants (AICPA). A CPA who also holds the designation
    of Personal Financial Specialist (PFS) has passed a written examination covering
    the personal financial-planning subject matter and has practical experience in
    the area. Currently, only approximately 11,000 CPAs have this designation, although
    personal financial planning is a much-sought-after service requested by clients
    of CPAs.


    In addition to these three broad-based financial-planning credentials, several
    other specialized credentials exist in today’s marketplace. These other credentials
    indicate that the financial planner has completed a particular course of instruction
    and commands specialized experience, such as in retirement or estate planning.


    You may wish to consider including a CFP certificant or other financial-planning
    professional among a team of financial advisors. (High-net-worth individuals and
    small business owners have been doing this for years.) Specifically, financial
    advising teams have traditionally consisted of a financial planner, a life insurance
    or property and casualty insurance agent, an accountant (usually a CPA), an estate-planning
    attorney, and, sometimes, a bank trust officer. Each fulfills the following roles:


    *   Financial planner : Typically, this individual has the broadest knowledge
    of your financial life and, as such, is often considered the quarterback of the
    financial advising team. They often prepare paperwork and financial documents
    used by other members of the team in properly advising you, the client. The financial
    planner also normally handles money management and investments for the client.

    *   Life insurance, or property and casualty, agent: Because separate state licenses
    are required to sell life insurance and homeowner/automobile insurance policies,
    you often need to contact two different professionals to buy each respective policy.
    The life insurance agent or broker can obtain needed life insurance protection,
    and the property/casualty agent can do the same with respect to protecting your
    important property. Sometimes insurance agents have both state licenses, but not
    often.

    *   Accountant : Normally, the accountant performs income tax–related tasks, including
    the preparation of your annual income-tax return. However, this professional can
    also work closely with your financial planner in advising how best to organize
    and operate a small business and when it may be most appropriate to sell assets
    in a tax-efficient manner (such as appreciated stock and mutual funds).

    *   Estate-planning attorney : The role this professional fulfills as a member
    of the financial advising team is indicated in their title. The estate-planning
    attorney is responsible for the proper drafting of wills, trusts, and power-of-attorney
    documents with respect to your financial life, as well as certain business-planning
    documents if you are also a small business owner.

    *   Bank trust officer : This member of the financial advising team is generally
    involved only in the event that you (a) have drafted a trust with the assistance
    of the estate-planning attorney/team member and (b) have elected to use a professional
    trustee to manage and distribute the trust assets. However, you may also be the
    beneficiary of a trust established by someone else and might interact with the
    bank trust officer in this manner.


    It is possible that any of these professionals may perform several roles. For
    example, many accountants not only advise clients with respect to taxes, but also
    have broadened their services to include traditional financial-planning advice.
    To provide both services, they may hold and maintain not only the CPA state license,
    but also the CFP professional credential.


    ## Questions to Ask a Financial Planner


    As you can likely appreciate by now, if you choose to work with a financial planner,
    selecting the planner is not an easy task. This is complicated by the fact that,
    unlike that for doctors and lawyers, there is no formal licensing, and accompanying
    regulation, of financial planners. Right now, anyone can call themselves a financial
    planner—even a taxicab driver in New York City. If you work with an unqualified
    advisor, your financial future may be at risk, so be careful!


    How do you protect yourself against this possibility? One answer is to work only
    with someone who demonstrates considerable financial services experience and expertise,
    such as an individual with an advanced business degree or a well-respected financial-planning
    designation. However, in addition to this preliminary screen, you should also
    ask the planner or advisor certain basic questions, such as those listed next
    from the Financial Planning Association (FPA), the major professional association
    of personal financial planners. The FPA’s web site is [`www.fpanet.org`](http://www.fpanet.org)
    .


    The FPA suggests that you ask the following ten questions of any prospective financial
    planner with whom you are considering working. I have added commentary to each
    to assist you even further in deciding which planner might be best for you:'
  trans: '

    # 注册金融理财师及其他理财规划资质


    尽管其他理财规划师在当今市场上凭借一种或多种专业资质脱颖而出，但最广为人知的理财规划认证当属`CFP`持证人。获得此认证的人士必须遵守由专业审查委员会（负责颁发`CFP`执照的
    CFP 标准委员会下属机构）强制执行的《道德准则与行为标准》。根据该准则，理财规划师必须依法承担受托责任，这意味着他们必须始终以客户的唯一最大利益为出发点行事。此外，获得此认证的理财规划师必须参加理财规划特定领域的强制性继续教育，并完成关于道德准则原则与规则的独立复习课程。`CFP`持证人还必须具备大学学历、至少三年的理财规划经验、完成涵盖特定理财规划主题（自
    2012 年起包括综合案例研究）的正规教育课程，并成功通过这些主题的严格、全面的六小时考试。


    另一项对理财规划师具有重要意义的资质是特许金融顾问（`ChFC`）。该认证由位于宾夕法尼亚州布林莫尔的美国金融服务学院授予已完成八门课程学习的个人，其中部分课程可替代`CFP`的教育要求。美国金融服务学院最初由寿险行业创办并资助，因此其教育内容可能更侧重于保险事务，而非广义的理财规划。但总体而言，该资质在理财规划师群体中备受尊敬。


    第三个备受认可的理财规划专业资质仅向注册会计师（`CPA`）开放，由美国注册会计师协会（`AICPA`）颁发。同时持有个人财务专家（`PFS`）资格的`CPA`，需通过涵盖个人理财规划主题的笔试，并具备该领域的实践经验。目前，尽管个人理财规划是`CPA`客户非常追捧的服务，但仅有约
    11000 名`CPA`持有此资质。


    除了这三项基础广泛的理财规划认证外，当今市场上还存在其他几项专业认证。这些认证表明理财规划师已完成特定课程学习并拥有专业经验，例如在退休或遗产规划领域。


    您或许会考虑将`CFP`持证人或其他理财规划专业人士纳入您的财务顾问团队。（高净值人士和小企业主多年来一直这样做。）具体而言，财务顾问团队传统上由理财规划师、寿险或财产险代理人、会计师（通常为`CPA`）、遗产规划律师，以及有时包括银行信托官员组成。每位成员履行以下职责：


    - **理财规划师**：通常，此人对自己财务状况的了解最为全面，因此常被视为财务顾问团队的“四分卫”。他们负责准备团队其他成员用以向客户提供恰当建议所需的文书和财务文件。理财规划师通常还负责客户的资金管理和投资。

    - **寿险或财产险代理人**：由于销售寿险和房主/汽车保险单需要分别获得州级执照，您通常需要联系两位不同的专业人士来购买各自的保单。寿险代理人或经纪人可为您获得所需的人寿保险保障，而财产险代理人则可为您的重要财产提供相似保障。有时保险代理人同时持有两种州级执照，但这种情况并不常见。

    - **会计师**：通常，会计师执行与所得税相关的任务，包括准备您的年度所得税申报表。不过，这位专业人士也可以与您的理财规划师密切合作，就如何最好地组织运营一家小企业、以及何时以税务高效的方式（如出售增值股票和共同基金）出售资产最为合适提供建议。

    - **遗产规划律师**：这位专业人士作为财务顾问团队一员所扮演的角色已在其头衔中体现。遗产规划律师负责就您的财务状况恰当起草遗嘱、信托和授权委托书等文件，如果您还是小企业主，还涉及某些商业规划文件。

    - **银行信托官员**：此财务顾问团队成员通常仅在以下两种情况下介入：(a) 您在遗产规划律师/团队成员的协助下设立了信托，且 (b) 您选择使用专业受托人来管理和分配信托资产。然而，您也可能是他人设立的信托的受益人，并因此与银行信托官员打交道。


    这些专业人士中的任何一位都可能兼任多种角色。例如，许多会计师不仅就税务问题为客户提供建议，还将服务范围扩展到传统的理财规划建议。为了提供这两种服务，他们可能不仅持有`CPA`州级执照，还拥有并维持着`CFP`专业资质。


    ## 向理财规划师提问的问题


    到目前您可能已经意识到，如果您选择与理财规划师合作，挑选合适的规划师并非易事。这其中的复杂性在于，与医生和律师不同，理财规划师没有正式的执业许可及相应的监管。目前，任何人都可以自称理财规划师——甚至纽约市的出租车司机也不例外。如果您与不合格的顾问合作，您的财务未来可能面临风险，因此务必谨慎！


    如何保护自己免受这种可能性的影响？一个答案是只与那些展现出显著金融服务经验和专业知识的人合作，例如拥有高级商科学位或广受尊敬的理财规划资质的人士。然而，除了这种初步筛选外，您还应该向规划师或顾问询问某些基本问题，例如下面列出的来自理财规划协会（`FPA`）的问题——`FPA`是个人理财规划师的主要专业协会。`FPA`的网站是
    [www.fpanet.org](http://www.fpanet.org)。


    `FPA`建议您向任何正在考虑合作的准理财规划师提出以下十个问题。我对每个问题添加了评论，以进一步帮助您决定哪位规划师最适合您。

    '
- fmt: "1. **你有哪些经验？**  \n   任何行业或专业的经验都很重要，但在快速变化的金融服务领域，这种经验尤为宝贵。如果理财规划师为客户提供咨询和合作的时间不足五年，你可能需要继续寻找更合适的人选。\n\
    \n2. **你具备哪些资质？**  \n   资质指的是值得信赖的教育背景和专业资格，能够体现其在财务规划流程中的专业能力。\n\n3. **你提供哪些服务？**\
    \  \n   大多数情况下，理财规划师在为客户实施财务计划时会提供投资咨询服务。因此，他们必须持有`Series 65`或`Series 66`金融业监管局（`FINRA`）证券执照，或通过获得经批准的资格（如`CFP`认证）免除此要求。此外，多数规划师还提供其他可能需要单独州级或联邦许可的服务。\n\
    \n4. **能否提供书面服务协议？**  \n   专业理财规划师个人财务规划流程的第一步是建立并明确客户与规划师的关系。作为这一步骤的一部分，规划师应以书面形式向你说明服务范围——即规划师与客户共同认为必要且适当、且规划师有资格并愿意提供的全部服务。`CFP`持证人必须以书面形式明确服务范围。在共同确定此范围时，客户与规划师可以仅约定财务规划的某些部分（分段财务规划或特定目标规划），或完成一份全面的财务计划。\n\
    \n5. **你的财务规划方法是什么？**  \n   这个问题通常涉及对规划师投资方法的讨论（例如，规划师在为客户投资时是采取更保守还是更激进的方法？），但有些规划师比其他人更倾向于采用财务生活规划方法。财务生活规划难以明确定义，但通常试图预测生活事件，并比传统财务规划更早地为这些事件做准备。财务生活规划还更全面地探索金钱心理学，并试图更充分地融合个人的财务目标与生活方式需求。\n\
    \n6. **你将是唯一与我合作的人吗？**  \n   像任何专业人士一样，执业理财规划师通常有在同一办公室工作的员工。这些人可能不具备与规划师同等的专业水平，更不用说与你建立同样的融洽关系。如果这是你关心的问题，你应该询问规划师他们个人会在你的特定案例上投入多少时间。此外，如果规划师作为财务规划咨询团队的成员工作，你可能希望询问其他团队成员的姓名，并调查他们的资质和背景。\n\
    \n7. **你们通常收费多少？**  \n   理财规划师收取的服务总费用取决于这些服务的性质和范围。尽管如此，规划师应能向你提供其惯例中的小时费率（如果按此方式收费）、固定费用、佣金百分比或管理资产规模的百分比。\n\
    \n8. **你们如何获得报酬？**  \n   如前所述，理财规划师的报酬方式包括纯佣金制、费用加佣金制或纯费用制。作为规划师应在关系建立之初提供的书面协议的一部分，规划师应说明他们的报酬方式。一些规划师还会提供应付费用或佣金总额的估算。\n\
    \n9. **你在职业生涯中是否曾因任何非法或不道德行为受到过公开处分？**  \n   这是一个需要提出的重要问题。虽然规划师的公开处分有记录可查，但你很可能不知道如何查找这些信息。如果你知道（或询问）规划师持有哪些执照，你可以查询相关监管机构或部门的记录，但更好的办法是与规划师就直接对话，了解其过去是否有过纪律处分问题。如果规划师反对这种对话，可能正是因为他/她确实曾受到监管处罚。如果规划师提供投资建议并在美国证券交易委员会（`SEC`）或州证券委员会注册为投资顾问，根据证券法，他们必须向你提供一份名为`SEC\
    \ Form ADV Part II`或州等效表格的披露文件。如果规划师受雇于一家注册为投资顾问的证券公司，则必须向你提供该公司的披露表格。\n\n10.\
    \ **除了我之外，还有其他人能从你的建议中获益吗？（换句话说：你有任何潜在或当前的利益冲突吗？）**  \n    另一个重要问题！这甚至可能比公开处分调查更重要。如果规划师存在当前的利益冲突（例如，他们是你在考虑购买股票的公司的董事会成员），则应在一开始就向你披露——最好以书面形式。此外，如果在服务过程中规划师出现了潜在利益冲突，也应当向你披露。与`CFP`持证人合作的一个优势是，根据其适用的道德准则，当前和潜在的利益冲突都必须以书面形式向你披露。然后由你决定是否希望开始与（或继续与）该`CFP`持证人合作。除了这些问题，我还会再问两个：\n\
    \n11. **你的客户典型净资产和年收入水平是多少？**  \n    不幸的是，许多理财规划师和投资顾问更愿意与已经拥有相当财富或积累了大量资产、并希望进一步提高年收入或净资产的个人合作。如果你不是这种情况，不要绝望！越来越多的规划师开始关注中等收入的美国人及其对财务安全的需求。在寻找理财规划师时，请让你考虑的候选人描绘一下其客户的平均收入水平和净资产状况。你可能还想询问典型客户的财务目标和生命周期状况，并将他们的情况与你的进行比较。如果存在巨大差距，或者你在某些方面感到不如意，你可以考虑另寻规划师。\n\
    \n12. **你们为客户构建投资风险档案吗？如果构建，你能用简单术语解释你们如何评估和使用这个档案吗？**  \n    很可能你与规划师首先要讨论的问题之一是如何通过投资实物资产或金融资产（或两者）来积累财富。为了正确分析这个问题，有必要确定你对承担投资风险的容忍度（你的风险承受能力）。对许多人来说，这是一个复杂的判定。许多人认为自己是保守型投资者，并期望他们的投资顾问知道这意味着什么。经验丰富的理财规划师和投资顾问知道如何通过提供投资情境的真实示例，并询问你如果遇到这些情况会如何反应，来探究“保守”（及其对立面“激进”）一词的真正含义。例如，考虑这个问题：“如果你在股票市场投资了5万美元，你能够容忍损失其中多少钱——以及在多长时间内——并且仍然能安然入睡？”如果答案是无或非常小的金额，你很可能是一位保守型投资者。然而，请注意，这个答案意味着你的投资回报（风险补偿）也可能大大降低。通常，随着年龄增长，我们在投资前景上会变得更加保守，尽管正如你稍后将了解到的，这并不意味着你应该完全避免投资风险。实际上，投资风险有多种形式，仅仅因为你可能避免了投资本金损失的风险，却可能因通货膨胀而承担未来购买力下降的损失。一位经验丰富的理财规划师可以帮助你确定你适合哪个水平的投资风险，并据此确定你晚上能睡得多好。自2007–2009年股市严重下跌和大萧条以来，许多投资者已经更恰当地认识到自己所承担的风险水平。直到2007年12月，许多年轻投资者从未经历过证券市场价值持续下跌成为常态的市场。因此，一些投资者正在重新评估其投资组合的配置，并将资金转移到被认为“更安全”的金融资产（在投资者心目中通常定义为短期美国政府证券）。"
  raw: '1.  What experience do you have? Experience in any industry or profession
    is important, but in the rapidly changing world of financial services, such experience
    is invaluable. If the planner has not spent at least five years advising and working
    with clients, you may wish to keep searching until you find a planner who has.
     

    2.  What are your qualifications? Qualifications mean educational and professional
    designations that you can trust with respect to expertise in the financial-planning
    process.  

    3.  What services do you offer? In most instances, a financial planner offers
    investment advisory services when implementing the financial plan for a client.
    Therefore, they must either have a Series 65 or Series 66 Financial Industry Regulatory
    Association (FINRA) securities license or have been waived from this requirement
    by virtue of earning an approved designation, such as the CFP certification. In
    addition, most planners offer other services that may require separate state or
    federal licensing.  

    4.  Can I have your engagement agreement in writing? The first step in the personal
    financial-planning process for the professional planner is to establish and define
    the client-planner relationship. As a part of this step, the planner should offer
    to define for you in writing the scope of the engagement, which is the totality
    of services that the planner and client agree is necessary and appropriate, and
    that the planner is qualified and willing to provide. A CFP certificant must define
    the scope of the engagement in writing. In mutually defining this scope, the client
    and planner may agree to only parts of the financial-planning process (segmented
    financial planning or goal-specific planning) or the completion of a comprehensive
    financial plan.  

    5.  What is your approach to financial planning? This question usually involves
    a discussion of the planner’s investment approach (for example, does the planner
    adopt a more conservative or aggressive approach when investing a client’s money?),
    but some planners adopt more of a financial life planning approach than others.
    Financial life planning is difficult to define but generally tries to anticipate
    life events and prepare for them at a point much earlier in time than does traditional
    financial planning. Financial life planning also explores more fully the psychology
    of money and attempts to complement more completely the merging of an individual’s
    financial goals and lifestyle needs.  

    6.  Will you be the only person working with me? Like any professional, the practicing
    financial planner usually has staff who work in the same office. These individuals
    may or may not have the same expertise as the planner, not to mention the same
    rapport with you. If this is a concern to you, you should ask the planner how
    much time they will personally spend on your particular case file. In addition,
    if the planner works as a member of a financial-planning advisory team, you may
    wish to ask for the names of the other team members and investigate their qualifications
    and background.  

    7.  How much do you typically charge? The total amount that the financial planner
    will charge for their services depends on the nature and extent of those services.
    Nevertheless, the planner should be able to provide you with an hourly fee (if
    they charge in that manner) or flat fee or the percentage of commissions or investment
    assets under management that is standard for their practice.  

    8.  How are you paid? As discussed, financial planners are paid on a commission-only,
    fee-and-commission, or fee-only basis. As a part of the written engagement letter
    that the planner should provide at the beginning of the relationship, the planner
    should explain how they are paid. Some planners also provide an estimate of the
    total amount of fees or commissions that will be due.  

    9.  Have you ever been publicly disciplined for any unlawful or unethical actions
    in your professional career? This is an important question to ask. Although public
    discipline of a planner is a matter of record, you probably do not know where
    to find such information. If you know (or ask) what licenses are maintained by
    the planner, you can check the records of those particular regulatory bodies or
    agencies, but it is better to have a simple conversation with the planner about
    any past disciplinary problems. If the planner objects to this conversation, it
    may be because he or she has, indeed, incurred regulatory sanctions. If the planner
    provides investment advice and is registered as an investment advisor with the
    U.S. Securities and Exchange Commission (SEC) or the state securities commission,
    under securities law they must provide you with a disclosure form entitled SEC
    Form ADV Part II or the state equivalent. If the planner is employed by a securities
    firm that is registered as an investment advisor, the firm’s disclosure form must
    be given to you.  

    10.  Can anyone other than me benefit from your recommendations? (Stated another
    way: Do you have any potential or current conflicts of interest?) Another big
    question! This is perhaps even more important than the public discipline inquiry.
    If a planner has a current conflict of interest (for example, if they are on the
    board of directors of a company whose stock you are considering purchasing), it
    should be disclosed to you initially—preferably, in writing. In addition, if during
    the course of the engagement a potential conflict of interest arises for the planner,
    it should be disclosed to you as well. An advantage of working with a CFP certificant
    is that, under their applicable code of ethics, both current and potential conflicts
    of interest must be disclosed to you in writing. It is then your decision whether
    you wish to begin working with (or continue working with) the CFP certificant.
    In addition to these questions, I would ask two more:  

    11.  What is the typical net worth and annual income level of your clients? Unfortunately,
    many financial planners and investment advisors prefer to work with individuals
    who have already made considerable money or accumulated a sizable amount of assets
    and want to increase their annual income or net worth even further. If this is
    not you, do not despair! More and more planners are focusing on middle-income
    Americans and their need for financial security. When searching for a financial
    planner, ask the candidates you are considering to draw you a mental picture of
    their clients with respect to their average income level and net worth. You may
    want to ask about the financial goals and life-cycle status of a typical client
    and compare their situation to yours. If there is a great disparity, or you feel
    inferior in some manner, you may wish to consider another planner.  

    12.  Do you construct an investment risk profile for your clients? And, if so,
    can you explain to me in simple terms how you evaluate and use this profile? It
    is likely that among the first issues you will address with the planner is how
    to build your wealth through investment in real or financial assets or both. To
    properly analyze this issue, it is necessary to determine your tolerance for assuming
    investment risk (your risk tolerance). This is a complicated determination for
    many individuals. Many people consider themselves conservative investors and expect
    their investment advisor to know what this means. Skilled financial planners and
    investment advisors know how to probe for the real meaning of the term conservative
    (and its polar opposite, aggressive) by providing real examples of investment
    situations and asking how you would react if these situations happened to you.
    For example, consider this question: “If you had $50,000 invested in the stock
    market, how much of this amount could you tolerate losing—and over what time period—and
    still sleep at night?” If the answer is none or a very small amount, you are likely
    a conservative investor. However, be aware that this answer means your investment
    return (reward for risk) is also likely to be greatly reduced. Generally, as we
    age, we become more conservative in our investment outlook, although as you will
    learn later, this does not mean you should avoid investment risk altogether. Indeed,
    there are many forms of investment risk, and just because you may avoid the risk
    of loss to the principal of an investment, you may instead assume the loss of
    future purchasing power due to inflation. A skilled financial planner can assist
    you in determining what level of investment risk you are comfortable with and,
    accordingly, how well you are able to sleep at night. Since the severe decline
    in the stock market and Great Recession of 2007—2009, many investors have come
    to more properly appreciate their assumed level of risk. Until December 2007,
    many younger investors had never experienced a market in which a consistent decline
    in the market value of securities was the norm. As a result, some investors are
    reevaluating the allocation of their portfolio and moving into financial assets
    that are deemed to be “safer” (commonly defined in the investor’s mind as shorter-term
    US government securities).'
  trans: "\n1. **你有哪些经验？**  \n   任何行业或专业的经验都很重要，但在快速变化的金融服务领域，这种经验尤为宝贵。如果理财规划师为客户提供咨询和合作的时间不足五年，你可能需要继续寻找更合适的人选。\n\
    \n2. **你具备哪些资质？**  \n   资质指的是值得信赖的教育背景和专业资格，能够体现其在财务规划流程中的专业能力。\n\n3. **你提供哪些服务？**\
    \  \n   大多数情况下，理财规划师在为客户实施财务计划时会提供投资咨询服务。因此，他们必须持有`Series 65`或`Series 66`金融业监管局（`FINRA`）证券执照，或通过获得经批准的资格（如`CFP`认证）免除此要求。此外，多数规划师还提供其他可能需要单独州级或联邦许可的服务。\n\
    \n4. **能否提供书面服务协议？**  \n   专业理财规划师个人财务规划流程的第一步是建立并明确客户与规划师的关系。作为这一步骤的一部分，规划师应以书面形式向你说明服务范围——即规划师与客户共同认为必要且适当、且规划师有资格并愿意提供的全部服务。`CFP`持证人必须以书面形式明确服务范围。在共同确定此范围时，客户与规划师可以仅约定财务规划的某些部分（分段财务规划或特定目标规划），或完成一份全面的财务计划。\n\
    \n5. **你的财务规划方法是什么？**  \n   这个问题通常涉及对规划师投资方法的讨论（例如，规划师在为客户投资时是采取更保守还是更激进的方法？），但有些规划师比其他人更倾向于采用财务生活规划方法。财务生活规划难以明确定义，但通常试图预测生活事件，并比传统财务规划更早地为这些事件做准备。财务生活规划还更全面地探索金钱心理学，并试图更充分地融合个人的财务目标与生活方式需求。\n\
    \n6. **你将是唯一与我合作的人吗？**  \n   像任何专业人士一样，执业理财规划师通常有在同一办公室工作的员工。这些人可能不具备与规划师同等的专业水平，更不用说与你建立同样的融洽关系。如果这是你关心的问题，你应该询问规划师他们个人会在你的特定案例上投入多少时间。此外，如果规划师作为财务规划咨询团队的成员工作，你可能希望询问其他团队成员的姓名，并调查他们的资质和背景。\n\
    \n7. **你们通常收费多少？**  \n   理财规划师收取的服务总费用取决于这些服务的性质和范围。尽管如此，规划师应能向你提供其惯例中的小时费率（如果按此方式收费）、固定费用、佣金百分比或管理资产规模的百分比。\n\
    \n8. **你们如何获得报酬？**  \n   如前所述，理财规划师的报酬方式包括纯佣金制、费用加佣金制或纯费用制。作为规划师应在关系建立之初提供的书面协议的一部分，规划师应说明他们的报酬方式。一些规划师还会提供应付费用或佣金总额的估算。\n\
    \n9. **你在职业生涯中是否曾因任何非法或不道德行为受到过公开处分？**  \n   这是一个需要提出的重要问题。虽然规划师的公开处分有记录可查，但你很可能不知道如何查找这些信息。如果你知道（或询问）规划师持有哪些执照，你可以查询相关监管机构或部门的记录，但更好的办法是与规划师就直接对话，了解其过去是否有过纪律处分问题。如果规划师反对这种对话，可能正是因为他/她确实曾受到监管处罚。如果规划师提供投资建议并在美国证券交易委员会（`SEC`）或州证券委员会注册为投资顾问，根据证券法，他们必须向你提供一份名为`SEC\
    \ Form ADV Part II`或州等效表格的披露文件。如果规划师受雇于一家注册为投资顾问的证券公司，则必须向你提供该公司的披露表格。\n\n10.\
    \ **除了我之外，还有其他人能从你的建议中获益吗？（换句话说：你有任何潜在或当前的利益冲突吗？）**  \n    另一个重要问题！这甚至可能比公开处分调查更重要。如果规划师存在当前的利益冲突（例如，他们是你在考虑购买股票的公司的董事会成员），则应在一开始就向你披露——最好以书面形式。此外，如果在服务过程中规划师出现了潜在利益冲突，也应当向你披露。与`CFP`持证人合作的一个优势是，根据其适用的道德准则，当前和潜在的利益冲突都必须以书面形式向你披露。然后由你决定是否希望开始与（或继续与）该`CFP`持证人合作。除了这些问题，我还会再问两个：\n\
    \n11. **你的客户典型净资产和年收入水平是多少？**  \n    不幸的是，许多理财规划师和投资顾问更愿意与已经拥有相当财富或积累了大量资产、并希望进一步提高年收入或净资产的个人合作。如果你不是这种情况，不要绝望！越来越多的规划师开始关注中等收入的美国人及其对财务安全的需求。在寻找理财规划师时，请让你考虑的候选人描绘一下其客户的平均收入水平和净资产状况。你可能还想询问典型客户的财务目标和生命周期状况，并将他们的情况与你的进行比较。如果存在巨大差距，或者你在某些方面感到不如意，你可以考虑另寻规划师。\n\
    \n12. **你们为客户构建投资风险档案吗？如果构建，你能用简单术语解释你们如何评估和使用这个档案吗？**  \n    很可能你与规划师首先要讨论的问题之一是如何通过投资实物资产或金融资产（或两者）来积累财富。为了正确分析这个问题，有必要确定你对承担投资风险的容忍度（你的风险承受能力）。对许多人来说，这是一个复杂的判定。许多人认为自己是保守型投资者，并期望他们的投资顾问知道这意味着什么。经验丰富的理财规划师和投资顾问知道如何通过提供投资情境的真实示例，并询问你如果遇到这些情况会如何反应，来探究“保守”（及其对立面“激进”）一词的真正含义。例如，考虑这个问题：“如果你在股票市场投资了\
    \ 5 万美元，你能够容忍损失其中多少钱——以及在多长时间内——并且仍然能安然入睡？”如果答案是无或非常小的金额，你很可能是一位保守型投资者。然而，请注意，这个答案意味着你的投资回报（风险补偿）也可能大大降低。通常，随着年龄增长，我们在投资前景上会变得更加保守，尽管正如你稍后将了解到的，这并不意味着你应该完全避免投资风险。实际上，投资风险有多种形式，仅仅因为你可能避免了投资本金损失的风险，却可能因通货膨胀而承担未来购买力下降的损失。一位经验丰富的理财规划师可以帮助你确定你适合哪个水平的投资风险，并据此确定你晚上能睡得多好。自\
    \ 2007–2009 年股市严重下跌和大萧条以来，许多投资者已经更恰当地认识到自己所承担的风险水平。直到 2007 年 12 月，许多年轻投资者从未经历过证券市场价值持续下跌成为常态的市场。因此，一些投资者正在重新评估其投资组合的配置，并将资金转移到被认为“更安全”的金融资产（在投资者心目中通常定义为短期美国政府证券）。\n"
- fmt: '# The next chapter addresses personal financial planning and the wealth-management
    process. Wealth management is an extension of personal financial planning and
    focuses on high-income and high-net-worth clients. Wealth management also emphasizes
    the investment process within financial planning, because high-income clients
    typically have a larger amount of discretionary income than middle-income investors.
    This book is designed to show you how to reach the status of a higher-net-worth
    individual by increasing your current wealth.


    # 3. Elements of Personal Financial Planning and the Wealth-Management Process


    Academic studies have shown that following a financial plan will help you build
    wealth more rapidly than is possible without one. This is because a financial
    plan enforces self-discipline, the key to any future accumulation of wealth. People
    earning between $50,000 and $100,000 per year who follow a financial plan typically
    have up to twice as much savings as those in the same income bracket who have
    no financial plan. For those earning more than $100,000 per year and following
    a financial plan, the savings rate is some 60 percent greater than that of their
    peers. Clearly, people who adhere to some form of a financial plan—either in writing
    or informally by matching their savings practice to a predetermined set of financial
    goals—have a significant advantage. Bottom line: you have to convince yourself
    of reasons to save, or you will probably not do it. One of the purposes of this
    book is to provide you with those reasons.


    ## Personal Financial Planning and Wealth Management


    The profession of personal financial planning has had an interesting and somewhat
    complicated past. Although financial planning has always been about the process
    of determining whether and how individuals can meet their financial goals through
    the proper management of financial resources, planners have occasionally been
    sidetracked and focus too much on the resources component of the definition instead
    of the process component. In other words, financial products—such as an attractive
    stock or the newest insurance product—that are necessary to implement the planning
    process become predominant.


    Alternatively, some financial planners prefer to think of themselves as wealth
    builders or wealth managers to differentiate themselves from the product side
    of the business and, hopefully, attract the client with a higher net income or
    net worth. No academic subject in the personal financial-planning process is likely
    more important than the others, but planners who think of themselves as primarily
    wealth builders tend to emphasize investment selection and investment management.
    As a result, those planners prefer to work only with high-net-worth clients and
    specify a minimum amount of investable assets (usually in the high six figures
    or even in the low seven figures) that can immediately be put to work in the capital
    markets. But wealth managers and financial planners are really beginning at the
    same place: the client’s financial goals. It is only the amount of financial resources
    a client can bring to bear in accomplishing their goals that distinguishes a financial
    planner from a wealth builder or wealth manager.


    Regardless of whether these financial professionals think of themselves more as
    wealth managers or planners, they typically provide six main services for their
    clients:


    *   Insurance and risk management

    *   Employment benefits (often simply referred to as fringe benefits)

    *   Investments

    *   Income-tax planning and management

    *   Planning for retirement

    *   Estate planning


    I suggest that you use these general categories to examine and review your own
    financial life. Keep in mind that numerous issues need to be addressed within
    each of these areas. Determining your own status in each category may help you
    begin the process of record keeping. Additionally, a professional financial planner
    will orient their work around each of these areas, and some will demonstrate a
    specialty in one or more of the subjects.


    Is there any importance to the order in which I have listed the general areas
    of financial planning? In terms of thinking about your financial life, yes, there
    is! Your employment status determines whether you have any employment benefits
    to consider, but think of these benefits as nothing more than a temporary safety
    net that you can use to protect your financial well-being. When you change jobs,
    these benefits may or may not be portable (they probably will not be). This is
    why it is much better to build a permanent safety net constructed from individual
    life insurance and other benefits that you purchase on your own and are intended
    to remain with you throughout your lifetime, regardless of your employment status.
    Because both temporary and permanent benefits are primarily obtained so as to
    provide protection against possible future financial loss, they should be thought
    of sequentially as first in the financial-planning process.


    The PADD approach to building and managing wealth places the general categories
    of personal financial planning in a real-life context that can be used as a blueprint
    to financial independence:


    *   Protect yourself against the risk of catastrophic financial loss.

    *   Accumulate wealth through investments.

    *   Defend that wealth through prudent income-tax planning and management.

    *   Distribute that wealth for your retirement and as part of your estate at death.


    First, however, because of their importance in the overall financial-planning
    process as the “engine” in generating substantial wealth, we need to spend some
    time discussing investments and investment strategies. This begins with the need
    for a well-thought-out investment policy statement.


    ## The Need for an Investment Policy Statement


    Many planners refer to the investment policy statement (`IPS`) as the third mandatory
    personal financial statement (in addition to the statement of personal financial
    position and the cash-flow statement discussed in Chapter [1](#A314864_2_En_1_Chapter.html)).
    The `IPS` helps the investor specify realistic investment goals while also forcing
    them to consider the risks and costs of investing. For example, specifying that
    you wish to obtain an average 15 percent annual rate of return on an investment
    in an individual stock begs the question of whether you also expect the stock
    to increase in price by this same amount consistently every year. If so, you need
    to engage in a reality check! Such thinking ignores the risk of stock investing,
    because the market price of stocks can fluctuate dramatically from year to year.
    This is known as volatility, which you need to understand and accept as a risk
    prior to investing in the stock market.


    Any well-developed investment policy statement has four basic sections. With allowances
    for the specific wording of any customized statement, these sections are as follows:


    *   Statement of the investor’s objectives

    *   Statement of investor constraints or limitations

    *   Meeting the investor’s objectives and allocation of investment resources

    *   Monitoring the performance of the investment plan'
