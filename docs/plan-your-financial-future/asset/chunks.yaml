  trans: '

    ### 经济援助类型


    最常见的两种联邦需求型贷款是`珀金斯`贷款和`斯塔福德`贷款。与无需偿还的助学金或奖学金不同，`珀金斯`和`斯塔福德`贷款均要求学生毕业后进行还款。


    联邦`珀金斯`贷款是一种校园贷款，意味着学校通过其经济援助办公室将贷款资金发放给学生。本科生和研究生均可申请此项贷款，但研究生的年度限额略高于本科生。申请`珀金斯`贷款必须证明经济需求，但还款在学生从研究生院或本科院校毕业九个月后才开始。在此之前，贷款本金不会产生利息。


    联邦`斯塔福德`贷款（也称为直接贷款）可分为补贴型和非补贴型。补贴型`斯塔福德`贷款意味着美国教育部在学生本科或研究生在读期间，以及宽限期和延期还款期内，为其支付贷款利息。而非补贴型`斯塔福德`贷款则意味着学生需承担贷款存续期间的利息偿还责任，并应在校期间就偿还贷款利息。如果学生未能按时偿还到期利息，该利息将直接计入贷款本金，留待日后一并偿还。无论申请补贴型还是非补贴型`斯塔福德`贷款，学生都必须证明其经济需求。


    第三种联邦贷款是以学生家长的名义提供的：本科生家长贷款（`PLUS`）。这是唯一一类以学生名义发放、且无需依据`FAFSA`公式判定经济需求的贷款。对于那些因收入过高或净资产较多导致子女无法获得联邦经济援助的家长来说，`PLUS`贷款是联邦政府为帮助其子女完成大学教育所提供的唯一途径。良好的财务规划要求您已为子女的大学教育费用做好准备；但若尚未准备，`PLUS`贷款将是您的选择。此类贷款从发放之日起即开始计息，并在您收到款项
    60 天后开始还款。


    无需偿还的需求型政府助学金也可能帮助您支付子女的大学教育费用。最常见的助学金是联邦`佩尔助学金`，家庭`EFC`（预期家庭贡献）不超过政府每年规定金额的学生均有资格申请。奖学金不会影响学生获得`佩尔助学金`的资格，但每位学生每年可获得的助学金总额存在上限（2017-2018
    学年的最高金额为`5,920 美元`）。学生必须先基于经济需求获得`佩尔助学金`资格，才有资格申请联邦`珀金斯`或`斯塔福德`贷款。此外，`佩尔助学金`仅面向本科生开放。


    ## 如何储蓄？


    现在，我们来探讨一个重要问题：为私立学校或高等教育费用储蓄时，应以学生还是家长的名义进行？


    ### 托管账户


    在教育储蓄账户（`ESA`）和第 529 条私人储蓄计划出现之前，托管账户是为子女大学教育储蓄的主要方式。使用此方法储蓄仍具优势，但其根本劣势很可能更为突出：账户开立人（通常是父母或祖父母）在子女达到该州法定成年年龄后，将失去对资金的控制权。此外，账户托管人（如父母或祖父母）可将托管账户转入第
    529 条计划，但托管人必须首先出售账户中的所有资产，并对任何收益纳税。


    所有州都设立了两种托管账户：《未成年人统一赠与法》（`UGMA`）和《未成年人统一转移法》（`UTMA`）。在大多数州，`UTMA`账户是常规选择，因为该法案取代了早期的`UGMA`法律。然而，在操作上，两种账户基本相同，区别仅在于`UTMA`允许代表子女进行更广泛的投资，包括直接投资或间接投资房地产。两种账户的所有权均归属于子女，由托管人（通常是子女的父母或祖父母）代表子女管理账户投资。


    正如第 13 章所述，任何人每年可向子女赠与最高`15,000 美元`（对于使用赠予分割规划技巧的已婚夫妇，则为`30,000 美元`），且无需缴纳联邦赠与税。因此，这通常是每年初始转入托管账户的金额。增值证券或预期增值证券是托管账户常见的注资方式；但随着子女接近大学入学年龄，托管人应转向更保守、波动性更小的投资，如债券或`CD`（定期存单），以保值账户本金。然而需注意，若账户代表未满
    18 岁（或未满 24 岁的全日制学生）的子女产生过多年度非劳动收入（如股息或利息），将产生不利的税务影响。具体而言，此类非劳动收入需缴纳单独的税种。通俗地称为`儿童税`，该税种由国会引入，旨在解决利用子女作为税收庇护所，通过将收入转移给子女以期按较低边际所得税率纳税的税务滥用行为。


    与`ESA`或第 529 条计划相比，托管账户具有两大优势：


    -   `UTMA`或`UGMA`账户中的资金可用于任何有益于子女的用途，而不仅限于教育。但如果资金用于支付本应由父母承担的抚养义务支出，根据各州法律，账户的全部或部分收益可能会被转回至父母名下征税。

    -   通过在托管账户储蓄，家长可享受名义上的所得税优惠。具体而言，对于受益于该账户的未满 19 岁子女或未满 24 岁的全日制学生，其收入的前`1,050
    美元`（2018 年数据）或其他指定的年度金额可作为标准扣除。接下来的`1,050 美元`或类似指定金额，则按子女的边际税率——通常是最低的 10%税率——征税。因此，家长与子女之间在一定程度上可以实现收入分割，但仅限于有限范围。


    如前所述，尽管托管账户的这两大优势颇具吸引力，但它们很可能被其劣势所抵消。其中一点已提及：在法定成年年龄时，子女可随意支配账户中的资金，包括选择不上大学而去追求其他发展道路。此外，代表子女设立托管账户还伴随其他几项劣势。

    '
- fmt: '### 未成年人非劳动收入税


    -   未成年人非劳动收入税在账户产生特定年度金额的利息或股息后适用。因此，当达到此金额时（例如，2018年为2,100美元），任何额外收入都将按严重压缩的信托和遗产所得税率对儿童征税。即使儿童的祖父母或其他亲属为账户提供了资金，也会产生此应税结果。

    -   例如，假设您的父母（您孩子的祖父母）多年来已向以您孩子名义设立的`UTMA`账户转移了15万美元。再假设这15万美元在账户中产生了10%的回报（即给孩子的1.5万美元非劳动收入）。因此，孩子需就12,900美元的净应税收入缴纳3,159.50美元的税款（再加上如本段后面所述的105美元），即超出12,500美元部分的37%加上3,011.50美元的基本税额（使用2018年信托和遗产所得税率）。请注意，您（父母或祖父母）因免除了账户前1,050美元收入的税款而获得了名义上的所得税优惠，而孩子随后仅需为接下来的1,050美元收入缴纳105美元的税款（1,050美元乘以0.10）。

    -   相比之下，`Section 529`私人储蓄计划允许在2018年一次性缴款高达7.5万美元（或对于分割赠与的已婚夫妇为15万美元），而每年可向托管账户缴纳且免于联邦赠与税的金额则极其有限。例如，目前在任何一年中，为任何单个孩子向托管账户缴纳的金额不得超过1.5万美元，否则必须将该赠与作为应税赠与申报，用于联邦赠与税目的。

    -   作为一般规则，在确定联邦财政援助资格时，托管资产被视为孩子的资产。因此，在计算`EFC`时，这些资产通常会按35%的比例计入孩子一方。


    使用托管账户为大学储蓄而导致的联邦财政援助不利影响有一个主要例外。鉴于更有利的`Section 529`私人储蓄计划近期引入，许多家长正在（或应该）将`UGMA`或`UTMA`资金转入`Section
