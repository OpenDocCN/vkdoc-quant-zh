    for your parents’ long-term care needs. This option gives you more flexibility,
    because you do not lose the money if your parents do not need long-term care,
    but it means an added monthly or other periodic expense for which you have to
    budget.  

    4.  The least-best option is that you do nothing and then the need arises for
    long-term care for your parents. In this instance, you are likely to see the wealth
    your parents accumulated (and your potential inheritance) slowly depleted over
    the years, at the end of which Medicaid is the only option.


    As noted, the preferable option is that your parent does not place the burden
    of funding their long-term care on you. If they do, you should purchase a long-term-care
    insurance policy for your parent while they can still qualify for the coverage.
    You also need to consider how long an insurance benefit period you should purchase.
    Remember, the longer the benefit period, the greater the premium costs associated
    with the policy.


    You may wish to purchase a lifetime benefit period for your parent to be absolutely
    sure that proper long-term care will be there for them when they need it. You
    may also wish to purchase a higher-than-normal daily benefit as part of the policy
    (currently, the average cost of nursing-home care for a semiprivate room is approximately
    $270 per day). If you do purchase a high daily benefit (beyond the average $270
    per day), it is possible that you can make money from the policy. This is because
    you can pocket the higher daily benefit paid under the policy in excess of the
    actual daily cost charged by the facility. However, before you purchase such a
    high benefit, check with the insurance company or issuer of the policy, because
    such a motivation may be frowned on in your particular state.


    You also need to consider what Medicare will and will not cover when your parent
    reaches age 65\. For example, although Part D of Medicare has been fully implemented
    and now covers the cost of most prescription drugs for your elderly parent, a
    privately owned policy may provide better coverage. In addition, many deductibles
    and co-insurance payments are associated with Medicare Part A (hospital insurance)
    and Medicare Part B (physician’s care) that you need to provide for.


    The preferable way to cover these costs is to purchase a supplementary health
    insurance policy, commonly referred to as a Medigap policy. All Medigap policies
    are standardized according to federal law, with Medigap Policy A constituting
    the least expensive and least comprehensive form of coverage, and Medigap Policy
    F constituting the most expensive and most comprehensive coverage. As such, the
    purchase of a Medigap policy means you or your parent are protected by federal
    regulations with respect to supplementary medical care, a fact that may be of
    some comfort to you. It is also important to note that you may purchase only one
    Medigap policy for your parent at any given time under current law. In addition,
    your parent may not be turned down for supplemental coverage, regardless of any
    preexisting, potentially disqualifying medical conditions, as long as they apply
    for such coverage within six months of reaching age 65.


    ### Claiming Your Parent as a Dependent for Income-Tax Purposes


    Under the provisions of the 2017 TCJA, a new credit of $500 is permitted, beginning
    in 2018, when caring for a dependent parent. The dependency rules are the same
    as that for the child tax credit just discussed. However, unlike the child tax
    credit, which is partially refundable, the dependent parent or nonchild dependent
    care credit is nonrefundable.'
