    |   | 按揭贷款 | 全款现金 |

    | --- | --- | --- |

    | 首付/现金购房款 | 10,000 美元（20%首付） | 50,000 美元 |

    | 贷款本金 | 40,000 美元 | 0 美元 |

    | 利率 8.72%：总还款额 112,796 美元减去 40,000 美元本金 = 利息 72,976 美元 | 50,000 美元（72,976 美元
    × (1 – 0.33, 即 0.67)）（四舍五入） | 0 美元 |

    | 税费与保险（每年 3,000 美元） | 90,000 美元 | 90,000 美元 |

    | 日常维护（每月 150 美元） | 54,000 美元 | 54,000 美元 |

    | 大修与房屋改造 | 150,000 美元 | 150,000 美元 |

    | **总成本** | **394,000 美元** | **344,000 美元** |

    | 出售价值 | 290,500 美元 | 290,500 美元 |

    | **净利润/（亏损）** | **（103,500 美元）** | **（53,500 美元）** |


    分析此表格时，有几个惊人事实值得注意。首先，即使是全款购房者，在 30 年的房屋所有权期间也遭受了金钱损失（尽管在逐项列出按揭利息扣除后，损失比借款者少）。其次，如果在重大维修和房屋改造方面没有花费那么多钱，这两种情况下的净亏损本都可以转化为净利润。这引出了我们要说的关于房屋所有权的下一个要点：在购房及持续持有房屋的可控方面，尽可能保持财务纪律。


    具体而言，作为未来的购房者和房主，你在两项重要的房屋持有成本上拥有控制权：你支付的利息金额和你进行的房屋改造规模。根据新税法，自 2017 年 12 月 31
    日之后、2026 年 1 月 1 日之前，按揭利息的扣除额上限为不超过 75 万美元的“收购债务本金”（此前上限为 100 万美元）。因此，这对我们大多数人来说仍然是不错的税收减免！然而，如果你只按还贷计划表进行定期还款，那么在典型的
    30 年期贷款中，你在偿还贷款本金方面进展甚微。因此，加倍还款并尽快还清按揭贷款，可以节省大量资金。另一个选择是，如果你负担得起，可以申请 15 年期固定利率按揭贷款来为购房融资，而不是标准的
    30 年期贷款。


    限制你进行的房屋改造数量更具挑战性，但事实是，很少有改造能在出售房屋时为你带来回报。研究表明，新的厨房或浴室在出售时能带来最高的价值回报，但即使是这些改造，也往往无法收回全部花费。此外，要警惕为你的家增加后院游泳池或宠物跑道的诱惑。你房子的下一个买家可能没有孩子或狗，因此这些附加设施在出售时可能不利，而非有利。此外，游泳池可能对邻居的孩子构成“吸引人的滋扰”，如果其中一人掉进游泳池受伤，你很可能会被起诉，尤其是如果你没有将游泳池围起来的话。


    除了加快按揭还款速度和限制房屋改造规模，你还可以采取其他几种规划策略，将你的房屋作为使用资产进行管理：


    *   **转变心态。** 将你的房子视作任何其他消费品的购买，并尽可能以低价购入。密切监控当地房地产市场的价格趋势，当市场出现下跌时，将房屋视为正在打折出售。如果可以的话，趁那时购入。在追踪房屋价值时，像[`www.zillow.com`](http://www.zillow.com)这样的网站可能会有所帮助。

    *   **尽可能长期持有。** 尽可能做一名“买入并持有”的购房者。普通房主在搬离前（通常换到更贵的住所）平均只在自己房子中居住七年。根据你所在的地区和市场状况，这段时间可能不足以确保你最终出售时获得净利润。

    *   **尽可能多付现金。** 如果你能负担全款购房，那是更好的选择；但若不能，则应尽可能多付首付。高额首付限制了你需要借贷的本金金额和必须支付的利息。

    *   **谨慎对待再融资。** 是的，如果进行再融资，你的月供会降低，但你也延长了贷款期限，从而增加了总利息支出。如果你打算再融资，考虑从 30 年期固定利率按揭贷款转为
    15 年期固定利率按揭贷款（尤其是当你越来越接近计划退休日期时）。

    *   **远离只付息按揭贷款。** 这与其说是一种现金管理工具，不如说是直截了当的实用建议。许多通过只付息按揭贷款为购房融资的人，买了超出他们负担能力的房子，因此可能支付了过高的价格。只付息按揭贷款与“尽可能少付房款”的首要策略相矛盾。

    *   **分散投资，分散投资，再分散投资！** 在加快按揭还款之后，将你剩余的钱尽可能多地投入到雇主的 401(k)退休计划以及任何个人退休储蓄工具（如传统
    IRA 或罗斯 IRA）中。但不要过度：如果你能在退休前还清房贷，你将显著增加现金流，从而更好地享受退休生活。'
- fmt: '# Buying vs. Renting a Home


    It can be argued that buying a home with a mortgage is just another form of renting.
    Instead of paying the rent to a landlord, however, as a homeowner paying interest,
    you are paying the mortgage lender. Sure, you get a tax deduction for paying mortgage
    interest if you itemize your deductions; but until about the 20-year point in
    a standard 30-year mortgage, your interest payments are not doing much to reduce
    your principal. As such, you are only compromising your financial well-being when
    you move soon after purchasing your home. As just discussed, this is why it is
    so important to accelerate the payment of your mortgage as quickly as possible.


    A sample home buy-vs.-rent analysis worksheet is provided next.


    ## Home Buy-Or-Rent Analysis


    ### Cost of Buying


    1. Annual mortgage payments (12 times monthly mortgage payment)

    2. Property taxes

    3. Homeowner’s insurance

    4. Maintenance

    5. After-tax cost of interest on down payment and closing costs ( `$` times `%`
    after-tax rate of return)

    6. Total costs (sum of lines 1 to 5) Less:

    7. Principal reduction in mortgage loan balance (from amortization schedule)

    8. Tax savings due to itemized mortgage-interest deduction (interest portion of
    mortgage payments times marginal income-tax rate)

    9. Tax savings due to itemized property-tax deduction (line 2 times marginal income-tax
    rate)

    10. Total reduction and deductions (sum of lines 7 to 9) Equals:

    11. Annual after-tax cost of home ownership (line 6 less line 10) Plus:

    12. Anticipated annual appreciation in fair market value of home, if any (percentage
    of price of home) Equals: Total Cost of Buying (line 11 less line 12)


    ### Cost of Renting


    1. Annual rental costs (12 times monthly rental rate)

    2. Renter’s or tenant’s insurance


    Equals: Total Cost of Renting (line 1 plus line 2)


    One important positive component of buying a home is not an issue for renters:
    the estimated annual appreciation in the value of the home. This underscores what
    was just discussed: it is critical that, as a prospective homeowner, you research
    the local market carefully and do not overpay for the property! If you do overpay,
    you limit the amount of potential appreciation in your home’s value. If you happen
    to buy in the wrong area or at the wrong time, you may have been better off renting
    in the first place.


    As for renting, an oft-overlooked protection strategy for the renter is the purchase
    of a tenant’s property insurance policy. Almost every lease includes exculpatory
    language whereby the landlord bears no liability for damage to or theft of the
    tenant’s personal property. A tenant’s policy provides for this protection plus
    liability coverage for guests who may be injured while on the property. The policy
    also protects the tenant from the consequences of their own injurious acts, wherever
    they may occur.


    In addition to securing a property insurance policy, a tenant should be sure to
    check on the status of any security deposit required by the landlord. Some landlords,
    in an attempt to attract tenants, invest this deposit for the tenant and pay them
    the interest at the end of a long-term lease. However, more commonly this deposit
    is simply maintained in escrow by the landlord and refunded to the tenant at the
    expiration of the lease, provided the rental unit is left in good physical condition.
    As a prospective tenant, you want as low a security deposit as possible and a
    return on your money in the form of protected premises and timely landlord maintenance.


    # Selling Your Home


    Most of the issues involving the sale of your home are income-tax related, but
    you should not overlook practical questions, such as whether to sell the home
    yourself or use a real-estate broker. With today’s Internet-savvy society, increasing
    numbers of individuals are opting to list and sell their homes themselves. However,
    as attractive as it might seem to avoid the cost of using a real-estate broker,
    consider the following if you choose to sell your home on your own:


    - You must establish a reasonable price for your home. Although this may appear
    easy given the widespread availability of comparable market data these days, you
    need to be as realistic as you can about what your home may be worth. As such,
    you must separate emotion and the natural tendency to ask for more money rather
    than less. Be as objective as possible.

    - You need to market your home. This involves much more than simply sticking a
    For Sale by Owner sign in the front yard. You need your house listed in your area’s
    multiple-listing service (MLS). According to the National Association of Realtors,
    over 60 percent of home sales occur with the assistance of a buyer’s agent (in
    contrast, real-estate agents or brokers typically work only for the seller). Try
    to list your house with such an agent, who typically works as part of a network
    and represents any number of qualified buyers.

    - You need to separate the serious prospects from the merely curious. Neighbors
    are notorious for taking sales brochures or flyers simply because they want to
    see what you are asking for your house. Instead, ask your neighbors to refer any
    friends or family who may be looking for a new home. You should then prequalify
    the serious buyers so as not to waste your time negotiating a price with someone
    the mortgage lender will not approve.

    - You have to close the deal! This is where many for-sale-by-owner sellers stumble.
    Many buyers are skilled in the art of negotiating for the absolute lowest price
    (or sometimes even a below-market price). Hence, as a seller, you have to know
    what price you will accept while recognizing that it is the most the market will
    bear at that particular time.


    Assuming that you or your real estate agent have been successful in getting a
    fair price for your home, you now have to report the tax on any gain from that
    sale. Fortunately, the gain from the sale of any primary residence is considered
    a gain on the sale of a capital asset. Depending on your income-tax bracket and
    whether you have owned the house for at least one year, the gain is generally
    taxed at either a 0 percent or a 15 percent marginal rate. More important, if
    you meet certain conditions, any gain on the sale of a home is taxable only to
    the extent that it exceeds $250,000 (or $500,000, if you file a joint return).
    This $250,000 or $500,000 exclusion may be used as often as once every two years.'
