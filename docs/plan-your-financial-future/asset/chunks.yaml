  trans: '

    ### 独栋住宅


    许多婴儿潮一代在成长过程中拥有丰富的独栋住宅选择，其中许多位于规划完善的社区。随着这一代人职业发展，他们通常会购买更大、更昂贵的房子。


    退休后，至少部分婴儿潮一代（尤其是那些子女已独立的）希望缩小住房规模，即寻找更小、更便宜的房子。建筑商深知这一趋势，正试图满足寻求缩小住房规模的退休人员的生活方式需求。这一策略或许能让婴儿潮一代及其他新近退休者动用其房屋资产净值——这通常是他们拥有的最大单一金融资产。如果他们足够幸运，能从中获得足够资金，甚至可能还清抵押贷款，而这正是实现富足退休生活的关键财务要素之一。


    作为退休人员，如果你选择在退休后继续住在独栋住宅里，应该确定你想住在哪里。除了选择购买房产的片区或社区，你还必须决定想住在哪个国家地区或州的哪个区域。这些决定通常相对容易做出，因为退休人员通常会选择离一个或多个子女及孙辈较近的地方居住。你还应考虑所选州的所得税状况。有些州，如佛罗里达州、得克萨斯州和亚利桑那州，不征收州所得税，这使其成为颇具吸引力的退休天堂。其他州，如加利福尼亚州和纽约州，则以相对较高的州所得税闻名。还有一些州，如科罗拉多州，对养老金收入提供部分减免。如果居住地的税务影响对你很重要（请记住，通货膨胀和税收是积累财富的两大威胁），你应仔细考虑退休后将在哪个州生活。


    如果你想住在独栋住宅中，即使是缩小了面积的住宅，也需意识到需要持续维护和改善该住宅。随着年龄增长，取决于你的健康状况，这可能会成为一种负担。如果你无法维护房屋，将不得不向子女求助（如果他们住在附近）或付费请人完成某些必要的日常和每周杂务。接下来的两种选择——联排别墅和公寓——或许能解决这一问题。


    ### 联排别墅


    根据韦氏词典的定义，联排别墅是“通常有两到三层、通过共用侧墙与类似房屋相连从而形成连续建筑群的独户住宅”。联排别墅的业主也拥有房屋所占的土地。从本质上讲，这意味着联排别墅的购买者拥有自己的独立单元，但可能两侧或上下方均有其他业主。


    住在联排别墅里可能不是你想象中的退休生活方式，但如果是，请注意这与公寓不同：你是业主而非租客。如果你有联排别墅的抵押贷款，你可以像独栋住宅业主一样，为税务目的扣除该抵押贷款的利息。联排别墅业主通常还需按月向业主协会缴纳维护费。这笔费用金额差异很大，取决于房产的位置和质量，但通常涵盖小区公共区域的维护。联排别墅适合那些不想承担物业维护负担、且不介意与多位邻居紧邻而居的退休人员。


    ### 公寓


    公寓与联排别墅非常相似，但有两大显著区别：业主不仅拥有自己的独立单元，还拥有周边物业的额外份额；且公寓单元可以位于任何楼层，而不仅限于底层。公寓业主不拥有公寓所占的地面。此外，由于他们拥有公寓周边物业的额外份额，公寓业主通常比联排别墅业主面临更多的业主限制。


    与联排别墅一样，公寓业主也需支付月度维护费，尽管这笔费用可能涵盖更多物业维护和保养项目。例如，阳台和露台的维修可能由公寓业主缴纳的费用覆盖，而联排别墅业主则可能需要自行承担这些维修费用。因此，公寓最适合那些希望他人维护自己房产外部、且愿意与其他业主共同居住和交往的退休人员。


    ### 公寓（租赁型）


    公寓对于退休人员而言有几种不同的理解方式（例如，退休人员可能居住在独立生活、辅助生活或持续护理设施中的公寓里），但需要理解的关键特征是，公寓居住者通常是租客而非业主。因此，你不享有优惠的所得税待遇，例如无法将租金中的任何部分作为列举扣除额进行扣除。大多数租客在报税时会采用标准扣除额，而非列举扣除。


    ### 与一个或多个子女同住


    对许多退休人员来说，与一个或多个子女同住是所有住房选择中最不理想的。然而，无论是由于健康不佳还是资金不足，他们往往别无选择。如果你与一个或多个子女同住，尽量不要成为他们的负担。帮忙做家务，并主动分担公平份额的房租或抵押贷款。如果你健康状况不佳，请确保子女能充分照顾你的日常需求。如果你的儿子或女儿有工作，他们可能无法照顾你，因此你不妨考虑调查成人日间护理这一选择。


    与子女同住的另一个常被忽视的后果是：如果子女已婚，其配偶也必须同意你住在房子里或公寓里。如果子女及其配偶在如何照顾父母的问题上意见不合，许多成年子女的婚姻可能会因此紧张（有些甚至走到离婚的地步）。


    ### 独立生活社区


    独立生活社区专为那些完全能够自理日常生活需求、无需他人帮助的退休人员设计。通常，独立生活社区有年龄限制，甚至可能设有门禁或限制性入口。有时，社区居民通过缴纳业主费，可以享受诸如使用高尔夫球场和网球场等相当可观的配套设施。业主费通常也涵盖草坪护理服务。住宿形式包括独栋住宅、联排别墅和公寓。

    '
- fmt: '### Assisted-Living Communities


    `Assisted-living` communities generally combine the attributes of independent-living
    communities with limited nursing-home benefits. Assistance is provided for bathing,
    dressing, and other activities of daily living (`ADLs`). Assistance in administering
    medications to retirees or seniors is also typical. Lodging in such a community
    varies from small cottages or apartments to larger-scale housing.


    Confusion often arises about the attributes of assisted-living and those of a
    nursing home (discussed next). An easy point of differentiation is that an assisted-living
    community is more “home-like,” whereas nursing home care is more “hospital-like.”
    Each is also commonly regulated differently among states. The monthly cost to
    the elderly recipient for both facilities, however, may be approximately the same
    (although generally nursing-home costs tend to be more because of 24/7 care).


    An important point to understand if you or your parent moves into an assisted-living
    community is that you are likely eligible to receive benefits under a long-term
    care insurance policy. Long-term care eligibility usually requires the inability
    to satisfy at least two of six `ADLs`. For example, not being able to dress or
    bathe independently is typically enough to qualify for benefits, as is needing
    assistance with eating, transferring from a bed to a chair, and using the toilet.
    `Medicaid` assistance from the state may also be available if you qualify.


    ### Memory Care Units


    Memory care can be a unit located within a traditional nursing home or an assisted-living
    facility. Typically, the unit is “locked down” (restricted entry) and is available
    to individuals with profound dementia or Alzheimer’s disease. These units also
    usually have a common sitting area and/or dining facilities.


    `Medicare` may cover memory care, but only for 100 days following a hospital stay.
    `Medicare` will also pay for home health care for up to 35 hours a week, but the
    individual must be certified as “homebound.” Alzheimer’s patients may or may not
    qualify for home care benefits, because home health care is not supposed to be
    for a long-term need. Finally, because `Medicare` covers only mental conditions
    from which the patient is expected to improve, a diagnosis of severe dementia
    or Alzheimer’s disease does not qualify for long-term coverage. Alternatively,
    `Medicaid` does cover some patients in facilities providing long-term memory-care
    services, but some facilities do not accept `Medicaid` patients.


    ### Continuing-Care Retirement Communities


    Continuing-care retirement communities (`CCRCs`) combine the independent-living,
    assisted-living nursing-home, and memory-care approaches to retirement living
    in that they segregate retirees according to the level of care they require. Generally,
    a fairly hefty fee is required for entry into a `CCRC`. In addition, residents
    are expected to pay ongoing monthly maintenance fees, which vary in amount based
    on the level of care needed. Some `CCRCs` charge a fixed amount for maintenance
    rather than a varying fee, although you may be disadvantaged by this method if
    you require only independent living. The type of `CCRC` may be distinguished by
    whether any portion of the entry fee is refundable, as well as whether the monthly
    maintenance fee is fixed or flexible.


    `CCRCs` are becoming more popular, in part because the retiree does not have to
    move residences as their health deteriorates and they require more care. However,
    `CCRCs` are not available in all states and, if they are permitted, are usually
    lightly regulated. As with assisted-living coverage, individuals who need nursing-home
    care or memory care can access the benefits of a long-term care insurance policy,
    provided they meet the eligibility requirements of the policy (for example, the
    inability to perform two or more `ADLs`). `Medicare` coverage may also assist
    with the first 100 days of care.


    ### Skilled Nursing-Care Facilities


    Skilled nursing-care facilities and nursing homes are sometimes thought of synonymously,
    but `Medicare` makes a differentiation between the two. Basically, a skilled nursing-care
    facility provides acute (short-term) care, whereas nursing homes are designed
    to meet chronic (longer-term) care needs. Both skilled nursing-care facilities
    and nursing homes provide 24-hour assistance by a registered nurse or other medical
    professional. Keep in mind, though, that nursing-home care is more long-term in
    nature, and nursing-home residents typically do not require as much daily attention
    as those in need of skilled nursing care. `Medicare` pays a limited benefit for
    skilled nursing-care attention, but it does not cover nursing-home or custodial
    care.


    The requirements that must be met in order for `Medicare Part A` to cover skilled
    nursing-care facility expenses are as follows:


    *   You must have been hospitalized for at least a three-day period.

    *   You must enter the facility within 30 days of hospitalization at a physician’s
    direction. You do not need to go directly from the hospital to the facility to
    be covered by `Medicare`, but you do need to enter the facility within the 30-day
    period.

    *   You must be making improvement as certified by your doctor or other medical
    specialist; in other words, if you are not making either mental or physical improvement
    during the period of `Medicare` coverage, payment of expenses will not be afforded
    (for example, payment of expenses for Alzheimer’s disease is not a qualifying
    condition, because mental deterioration is inevitable).


    If you meet these three requirements, `Medicare` will pay for 100 percent of your
    expenses during your first 20 days of residence at a skilled nursing-care facility.
    After that, you are subject to a government-specified daily patient co-payment
    through day 100 of your stay. After you have received 100 days of skilled nursing-care
    benefits, `Medicare Part A` will no longer provide coverage in a given benefit
    period.


    ### Nursing-Home Care


    Traditional nursing-home care is continual or chronic in nature, which is one
    of the reasons it is referred to as custodial care, and you pay a sizable monthly
    fee for coverage. For example, as of 2018, the average monthly expense for nursing-home
    care in a private room is approximately $8,000 per month, or $96,000 per year.
    Depending on the state in which the nursing home is located, the monthly expense
    may be much higher.


    There is no precise way to determine when you or your parent should enter a nursing
    home, but usually a logical progression occurs, wherein seniors move from independent
    living to assisted living to a nursing home. Adult children who have to make the
    decision to move their parent or parents into a nursing home typically experience
    a great deal of angst before and after the decision is made. Sometimes, if more
    than one child is involved in the discussion, disagreement arises over the best
    time to take such a step. Furthermore, if the senior is mentally competent, there
    may be troubling discussions with them before they enter the nursing home. The
    living-with-a-child option is frequently tried in the interim.


    There are three ways to pay for nursing-home care, although impoverishing yourself
    to achieve `Medicaid` coverage (the third way) is not much of an option. The other
    two ways are from your own savings—private pay—or via receipt of long-term care
    insurance benefits. You should be aware that, at $96,000 annually, it may not
    take you or your parent long to deplete all private savings and then have to turn
    to other alternatives, such as the children paying for the parent’s care out of
    their own pockets. If you do not want this to happen and you can qualify, buy
    a tax-qualified long-term care insurance policy or life insurance policy with
    a long-term care benefit rider.'
  raw: '### Assisted-Living Communities


    Assisted-living communities generally combine the attributes of independent-living
    communities with limited nursing-home benefits. Assistance is provided for bathing,
    dressing, and other activities of daily living (ADLs). Assistance in administering
    medications to retirees or seniors is also typical. Lodging in such a community
    varies from small cottages or apartments to larger-scale housing.


    Confusion often arises about the attributes of assisted-living and those of a
    nursing home (discussed next). An easy point of differentiation is that an assisted-living
    community is more “home-like,” whereas nursing home care is more “hospital-like.”
    Each is also commonly regulated differently among states. The monthly cost to
    the elderly recipient for both facilities, however, may be approximately the same
    (although generally nursing-home costs tend to be more because of 24/7 care).


    An important point to understand if you or your parent moves into an assisted-living
    community is that you are likely eligible to receive benefits under a long-term
    care insurance policy. Long-term care eligibility usually requires the inability
    to satisfy at least two of six ADLs. For example, not being able to dress or bathe
    independently is typically enough to qualify for benefits, as is needing assistance
    with eating, transferring from a bed to a chair, and using the toilet. Medicaid
    assistance from the state may also be available if you qualify.


    ### Memory Care Units


    Memory care can be a unit located within a traditional nursing home or an assisted-living
    facility. Typically, the unit is “locked down” (restricted entry) and is available
    to individuals with profound dementia or Alzheimer’s disease. These units also
    usually have a common sitting area and/or dining facilities.


    Medicare may cover memory care, but only for 100 days following a hospital stay.
    Medicare will also pay for home health care for up to 35 hours a week, but the
    individual must be certified as “homebound.” Alzheimer’s patients may or may not
    qualify for home care benefits, because home health care is not supposed to be
    for a long-term need. Finally, because Medicare covers only mental conditions
    from which the patient is expected to improve, a diagnosis of severe dementia
    or Alzheimer’s disease does not qualify for long-term coverage. Alternatively,
    Medicaid does cover some patients in facilities providing long-term memory-care
    services, but some facilities do not accept Medicaid patients.


    ### Continuing-Care Retirement Communities


    Continuing-care retirement communities (CCRCs) combine the independent-living,
    assisted-living nursing-home, and memory-care approaches to retirement living
    in that they segregate retirees according to the level of care they require. Generally,
    a fairly hefty fee is required for entry into a CCRC. In addition, residents are
    expected to pay ongoing monthly maintenance fees, which vary in amount based on
    the level of care needed. Some CCRCs charge a fixed amount for maintenance rather
    than a varying fee, although you may be disadvantaged by this method if you require
    only independent living. The type of CCRC may be distinguished by whether any
    portion of the entry fee is refundable, as well as whether the monthly maintenance
    fee is fixed or flexible.


    CCRCs are becoming more popular, in part because the retiree does not have to
    move residences as their health deteriorates and they require more care. However,
    CCRCs are not available in all states and, if they are permitted, are usually
    lightly regulated. As with assisted-living coverage, individuals who need nursing-home
    care or memory care can access the benefits of a long-term care insurance policy,
    provided they meet the eligibility requirements of the policy (for example, the
    inability to perform two or more ADLs). Medicare coverage may also assist with
    the first 100 days of care.


    ### Skilled Nursing-Care Facilities


    Skilled nursing-care facilities and nursing homes are sometimes thought of synonymously,
    but Medicare makes a differentiation between the two. Basically, a skilled nursing-care
    facility provides acute (short-term) care, whereas nursing homes are designed
    to meet chronic (longer-term) care needs. Both skilled nursing-care facilities
    and nursing homes provide 24-hour assistance by a registered nurse or other medical
    professional. Keep in mind, though, that nursing-home care is more long-term in
    nature, and nursing-home residents typically do not require as much daily attention
    as those in need of skilled nursing care. Medicare pays a limited benefit for
    skilled nursing-care attention, but it does not cover nursing-home or custodial
    care.


    The requirements that must be met in order for Medicare Part A to cover skilled
    nursing-care facility expenses are as follows:


    *   You must have been hospitalized for at least a three-day period.

    *   You must enter the facility within 30 days of hospitalization at a physician’s
    direction. You do not need to go directly from the hospital to the facility to
    be covered by Medicare, but you do need to enter the facility within the 30-day
    period.

    *   You must be making improvement as certified by your doctor or other medical
    specialist; in other words, if you are not making either mental or physical improvement
    during the period of Medicare coverage, payment of expenses will not be afforded
    (for example, payment of expenses for Alzheimer’s disease is not a qualifying
    condition, because mental deterioration is inevitable).


    If you meet these three requirements, Medicare will pay for 100 percent of your
    expenses during your first 20 days of residence at a skilled nursing-care facility.
    After that, you are subject to a government-specified daily patient co-payment
    through day 100 of your stay. After you have received 100 days of skilled nursing-care
    benefits, Medicare Part A will no longer provide coverage in a given benefit period.


    ### Nursing-Home Care


    Traditional nursing-home care is continual or chronic in nature, which is one
    of the reasons it is referred to as custodial care, and you pay a sizable monthly
    fee for coverage. For example, as of 2018, the average monthly expense for nursing-home
    care in a private room is approximately $8,000 per month, or $96,000 per year.
    Depending on the state in which the nursing home is located, the monthly expense
    may be much higher.


    There is no precise way to determine when you or your parent should enter a nursing
    home, but usually a logical progression occurs, wherein seniors move from independent
    living to assisted living to a nursing home. Adult children who have to make the
    decision to move their parent or parents into a nursing home typically experience
    a great deal of angst before and after the decision is made. Sometimes, if more
    than one child is involved in the discussion, disagreement arises over the best
    time to take such a step. Furthermore, if the senior is mentally competent, there
    may be troubling discussions with them before they enter the nursing home. The
    living-with-a-child option is frequently tried in the interim.


    There are three ways to pay for nursing-home care, although impoverishing yourself
    to achieve Medicaid coverage (the third way) is not much of an option. The other
    two ways are from your own savings—private pay—or via receipt of long-term care
    insurance benefits. You should be aware that, at $96,000 annually, it may not
    take you or your parent long to deplete all private savings and then have to turn
    to other alternatives, such as the children paying for the parent’s care out of
    their own pockets. If you do not want this to happen and you can qualify, buy
    a tax-qualified long-term care insurance policy or life insurance policy with
    a long-term care benefit rider.'
  trans: '

    ### 辅助生活社区


    `辅助生活`社区通常融合了独立生活社区的特点与有限的护理院福利。其服务涵盖洗澡、穿衣及其他日常生活活动（`ADLs`）的协助。为退休人员或老年人提供用药管理服务也很常见。此类社区的住宿形式多样，从小型别墅或公寓到较大规模的住宅不等。


    人们常对辅助生活社区与护理院（下文讨论）的属性感到混淆。一个简单的区分点是：辅助生活社区更偏向“居家式”，而护理院护理则更偏向“医院式”。此外，各州对这两类设施的监管通常也各不相同。然而，老年居住者在这两类设施中的月花费可能大致相同（不过，由于提供全天候护理，护理院的费用通常更高）。


    需了解的重要一点是，如果您或您的父母搬入辅助生活社区，您很可能有资格获得长期护理保险单下的福利。长期护理的资格通常要求无法完成六项`ADLs`中的至少两项。例如，无法独立穿衣或洗澡通常就足以满足领取福利的条件，同样需要帮助进食、从床上移动到椅子上以及使用厕所也符合条件。如果您符合资格，也可能获得州政府的`医疗补助`援助。


    ### 记忆护理单元


    记忆护理可以是一个设在传统护理院或辅助生活设施内的单元。通常，该单元是“封闭式”的（限制出入），为患有重度痴呆症或阿尔茨海默病的人士提供服务。这些单元通常还设有公共休息区及/或用餐设施。


    `医疗保险`可能覆盖记忆护理，但仅限于住院后的 100 天内。`医疗保险`也会支付每周最多 35 小时的居家健康护理费用，但个人必须被认证为“居家不出”。阿尔茨海默病患者不一定符合居家护理福利的资格，因为居家健康护理不应针对长期需求。最后，由于`医疗保险`仅覆盖预计患者病情会改善的精神状况，重度痴呆症或阿尔茨海默病的诊断不符合长期覆盖条件。另一方面，`医疗补助`确实覆盖部分在提供长期记忆护理服务的设施中的患者，但一些设施不接受`医疗补助`患者。


    ### 持续护理退休社区


    持续护理退休社区（`CCRCs`）融合了独立生活、辅助生活护理院和记忆护理等多种退休生活方式，根据所需护理等级对退休人员进行分类。通常，进入`CCRC`需要缴纳一笔相当可观的费用。此外，居民需支付持续的月度维护费，其金额根据所需护理等级而变化。一些`CCRCs`收取固定维护费而非浮动费用，但如果您仅需独立生活，这种方式可能对您不利。`CCRC`的类型可通过其入门费是否部分可退，以及月度维护费是固定还是灵活来区分。


    `CCRCs`正变得越来越受欢迎，部分原因在于，当退休人员健康状况恶化并需要更多护理时，他们无需搬离住所。然而，并非所有州都有`CCRCs`，即使允许设立，监管也通常较为宽松。与辅助生活覆盖范围类似，需要护理院护理或记忆护理的个人，只要满足保单的资格要求（例如，无法完成两项或以上`ADLs`），即可获得长期护理保险的福利。`医疗保险`的覆盖也可能协助支付前
    100 天的护理费用。


    ### 专业护理机构


    专业护理机构和护理院有时被视为同义词，但`医疗保险`对两者进行了区分。基本上，专业护理机构提供急性（短期）护理，而护理院旨在满足慢性（长期）护理需求。两者都由注册护士或其他医疗专业人员提供
    24 小时协助。但请记住，护理院护理本质上是更长期的，且护理院居民通常不像需要专业护理的人那样需要每日高度关注。`医疗保险`为专业护理提供有限的福利，但不覆盖护理院或日常看护护理。


    要让`医疗保险 A 部分`覆盖专业护理机构的费用，必须满足以下要求：


    *   您至少需要住院三天。

    *   您必须在医生指导下，在出院后 30 天内入住该机构。您无需直接从医院进入机构即可获得`医疗保险`覆盖，但必须在 30 天内入住。

    *   您必须由医生或其他医疗专家证明病情正在好转；换句话说，如果在`医疗保险`覆盖期间，您的精神或身体状况没有改善，则费用将不予支付（例如，阿尔茨海默病的治疗费用不符合条件，因为其精神衰退是不可避免的）。


    如果您满足这三个要求，`医疗保险`将在您入住专业护理机构的前 20 天内支付您 100%的费用。此后，在您入住第 100 天之前，您需要按政府规定的每日患者共付额支付费用。在您享受了
    100 天的专业护理福利后，`医疗保险 A 部分`将不再在给定的福利期内提供覆盖。


    ### 护理院护理


    传统的护理院护理本质上是持续或慢性的，这也是其被称为日常看护护理的原因之一，您需要支付相当高的月费以获得覆盖。例如，截至 2018 年，单人间护理院护理的平均月费约为每月
    8,000 美元，即每年 96,000 美元。根据护理院所在州的不同，月费可能更高。


    并没有精确的方法来确定您或您的父母何时应入住护理院，但通常存在一个逻辑递进过程，即老年人从独立生活过渡到辅助生活，最后到护理院。需要做出决定将父母送进护理院的成年子女，在决策前后通常会经历极大的焦虑。有时，如果讨论涉及多个子女，就可能对采取此步骤的最佳时机产生分歧。此外，如果老年人精神上有能力，在入住护理院之前可能会与他们进行一些令人烦恼的讨论。与子女同住的选项通常会被作为过渡尝试。


    支付护理院费用有三种方式，尽管让自己陷入贫困以获得`医疗补助`覆盖（第三种方式）并不可取。另外两种方式是通过自有储蓄——自费支付——或通过领取长期护理保险福利。您应该意识到，按照每年
    96,000 美元的费用，您或您的父母可能很快就能耗尽所有私人储蓄，然后不得不转向其他选择，例如由子女自掏腰包支付父母的护理费用。如果您不希望这种情况发生，并且您符合资格，可以购买一份税收合格的长期护理保单或带有长期护理利益附加条款的人寿保险。

