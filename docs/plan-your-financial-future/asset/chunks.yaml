- fmt: '#### Lifetime Learning Credit


    In contrast to the Hope Scholarship or the AOTC, the Lifetime Learning Credit
    (LLC) is much broader in application and may therefore be used by more parents.
    This credit is available for tuition and fees incurred for expenses associated
    with an undergraduate, a graduate, or a professional degree program. Furthermore,
    there are no credit-hour enrollment requirements, as is the case with the AOTC,
    where the student must be enrolled at least half-time. All that is necessary to
    claim the Lifetime Learning Credit is that the student incur the expense and that
    you, the taxpayer claiming the credit, are below an applicable income-phaseout
    range.


    The maximum amount of Lifetime Learning Credit that may be taken in any year is
    $2,000 per family. Therefore, depending on the number of children you have attending
    college at any given time and what year of school they are in, the per family
    limitation may or may not be an advantage. If you have two children in their undergraduate
    years of college and you are under the income-phaseout range, the AOTC may afford
    you a maximum annual credit of $5,000 ($2,500 times 2), whereas the Lifetime Learning
    Credit yields a credit of only $2,000. With this limited exception, however, if
    you have to choose between the two credits (remember, you cannot take both credits
    for the same expense), you are better off claiming the Lifetime Learning Credit.


    Unlike the AOTC, the LLC may be claimed for an unlimited number of years. You
    may even take advantage of it as an employee looking to improve your job skills
    by taking a single or several courses not leading to an eventual degree.


    Finally, there are also phaseout rules associated with the availability of the
    Lifetime Learning Credit. For example, in 2018, for single filers, the LLC begins
    to phase out at $55,000 of AGI and disappears completely at $65,000 of AGI. For
    married couples filing jointly, these thresholds are $110,000 and $130,000, respectively.


    ## The Tax-Coordination Rules: Why Can’t I Do That?


    Paradoxically, Congress does not want you to take too much advantage of a good
    thing—the “thing” here being double-dipping by using allowable tax credits and
    deductions in payment of the same expense. But what about withdrawals that you
    may anticipate making from your college savings accounts—notably, the Section
    529 private savings plan? Remember that one of the major advantages of the Section
    529 private plan is that, if you use those withdrawals to pay college tuition
    and fees, the earnings on them are income-tax free.


    The answer to that question is that Congress has permanently shut down the opportunity
    to pay college tuition expenses and fees with tax-free Section 529 private savings
    plan withdrawals and then subsequently claim the AOTC or Lifetime Learning Credit
    for the same expenses. Technically, this prohibition is included in the tax law
    under the tax-coordination rules.


    However, if you have been reading this chapter closely, you know that a Section
    529 private savings plan withdrawal may be used to pay for room and board expenses,
    books and school supplies, and tuition and fees. This is in contrast to any of
    the permitted credits, which may be used only in payment of tuition and fees (or
    related expenses). Therefore, you have your answer with respect to how best to
    maximize both tax benefits: save for college with a Section 529 private savings
    plan, and subsequently make withdrawals from that plan to pay for college education
    expenses other than tuition and fees. In the same taxable year, then, depending
    on your AGI at the time your child attends college, you can also claim either
    the LLC or AOTC when you pay for your child’s college tuition and fees.


    ## Using a Roth IRA in College Funding


    Many individuals think of a Roth IRA only in conjunction with planning for their
    own retirement (the subject of the next two chapters). But this vehicle may also
    be effectively used as a college savings technique. Although most retirement savings
    plans and accounts may be titled only in the name of the participant or owner,
    it is possible to title a Roth IRA in the name of a minor child—therefore avoiding
    the need to also name a custodian for the account. Keep in mind, though, that
    Roth IRAs require that the child accumulate some earned income (as defined in
    the Tax Code) before contributions are possible. The same rule applies before
    contributions may be made to either your or a child’s deductible traditional IRA.


    In planning for your child’s college expenses, consider hiring your child to perform
    household duties, and pay them at least the maximum amount of annual contributions
    permitted to a Roth IRA (in 2018, $5,500 per year for taxpayers less than age
    50). Do this at least five years before your child is planning to attend college,
    and the child can withdraw the after-tax contributions and earnings income-tax
    free for college use. Alternatively, if the child does not go to college or if
    you have otherwise saved to pay for those expenses, the child now has a wealth-accumulation
    vehicle that is powerful. For example, if you contribute the maximum amount of
    $5,500 per year to a child’s Roth IRA between the years the child turns age 10
    and 13 and make no further contributions, and assuming you can earn an 8 percent
    annual before-tax return on that money, the child will have over $1.4 million
    in the account ($1,464,278.30, to be exact) when they reach age 65.


    Now let’s proceed to most individuals’ number-one financial planning goal, the
    topic you probably have been waiting for or planning for most: retirement. We
    discuss this broad area in two ways over the next two chapters: planning for the
    financial aspects of retirement, and planning for the lifestyle needs of your
    retirement years.


    # 16. Planning for the Financial Aspects of Retirement


    There are many opinions as to when it is best to start planning for your retirement,
    but the best strategy is to do so as soon as possible. As part of the PADD process,
    recognize that accumulating sufficient funds to retire comfortably should be your
    number-one financial goal. If you are married with children at the time of your
    planned retirement, having sufficient retirement funds will help you avoid becoming
    a burden to your family, and, as a result, will make your retirement years that
    much more enjoyable. Adequate retirement monies will also prevent you from becoming
    overly dependent on the Social Security system, which is heading for financial
    difficulty absent Congressional action.'
