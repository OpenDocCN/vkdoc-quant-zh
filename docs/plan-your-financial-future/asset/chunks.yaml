- fmt: "# IRA Rollovers and Conversions\n\nA rollover is a direct or indirect income-tax-free\
    \ transfer of all or part of the participant’s account balance from one employer-sponsored\
    \ retirement plan, such as a Section `401(k)`, to another employer-sponsored plan\
    \ or IRA. Thus, continued tax deferral of the plan assets and earnings is achieved,\
    \ at least until the participant reaches age `70.5` and is required to start taking\
    \ an `RMD`. An additional advantage of this planning technique is that, if you\
    \ roll over the account balance to your IRA, you are still in control of the money\
    \ and can direct your investment decisions yourself.\n\nThe mechanics of an IRA\
    \ rollover are relatively simple: you take the money or distribution from your\
    \ employer’s retirement plan and transfer it to a previously established or newly\
    \ established IRA on your behalf. But these mechanics can be deceiving and troublesome\
    \ if you do not properly transfer the money. For example, after you receive the\
    \ distribution from the employer plan, you have only `60` days in which to roll\
    \ over or deposit the funds into your IRA. If you exceed this time frame, you\
    \ must pay income taxes on the amount that you failed to roll over. Further, if\
    \ you have the distribution check made out in your name, under law, the employer\
    \ must withhold `20` percent from the amount you are due. As such, you net and\
    \ roll over only `80` percent of the total account balance to which you are entitled.\
    \ You can get this `20` percent withholding tax back when you file your income-tax\
    \ return the next year, but why wait? There is a better way.\n\nTo get around\
    \ the `20` percent withholding tax, ask that your employer directly roll over\
    \ the distribution to your new employer’s retirement plan (if the plan will accept\
    \ the money) or your individual IRA. The easiest way to do this is to have your\
    \ employer’s human resources department make the distribution check payable to\
    \ the trustee of your new employer’s plan or the custodian of your IRA. Have your\
    \ employer cut the check on your behalf, otherwise known as an `FBO` check (`FBO`\
    \ stands for \"for the benefit of\"). In this way, you avoid the application of\
    \ the `20` percent withholding tax.\n\nFor example, assume that you are `45` and\
    \ have recently changed jobs. You have an account balance of `$200,000` in your\
    \ previous employer’s Section `401(k)` plan and are entitled to a lump-sum distribution\
    \ from the plan, because you have separated from service. To avoid the `20` percent\
    \ withholding tax, you have two planning options:\n\n- If your new employer has\
    \ a Section `401(k)` plan that will accept the `$200,000` account balance, ask\
    \ your previous employer to make the distribution check out to the new employer’s\
    \ plan trustee on your behalf.\n- Roll over the distribution into your previously\
    \ established or newly established traditional IRA with a check made payable to\
    \ the IRA custodian on your behalf.\n\nIn this example, assuming that you have\
    \ both choices—a new `401(k)` or a new IRA—which is preferable? This is a common\
    \ question confronting many Section `401(k)` participants who either do not need\
    \ the money from the `401(k)` plan or wish to continue the tax deferral. Consider\
    \ this: if you directly roll over the distribution to the new Section `401(k)`\
    \ and then subsequently leave your new employer when you reach age `55`, you may\
    \ take the total `401(k)` balance without the imposition of the `10` percent premature-disposition\
    \ penalty that otherwise applies to employer-sponsored retirement plans. Alternatively,\
    \ this is not possible if you roll over the distribution to your own traditional\
    \ IRA; in that case, you must generally wait until the year in which you reach\
    \ age `59` and `6` months to take the money without penalty. Furthermore, if you\
    \ choose the new `401(k)` plan option and like the investment choices offered\
    \ to you under that plan, you may self-direct those investments and perhaps achieve\
    \ a greater return than the IRA.\n\nWhatever choice you make, the younger you\
    \ are at the time you receive the distribution, the more advantageous it is for\
    \ you to roll over the money and continue the tax deferral.\n\n## IRA Conversions\n\
    \nPrior to `2010`, it was the law that you could not convert your traditional\
    \ IRA to a Roth IRA if your `AGI` exceeded `$100,000` in the year of conversion.\
    \ However, now there is no income limit, providing a potential planning opportunity\
    \ for those who are willing to pay the income tax due on the proceeds at the time\
    \ of conversion. There are two reasons for converting your IRA to a Roth IRA:\n\
    \n- You believe you will be in a higher income-tax bracket at retirement than\
    \ you are currently and will pay no subsequent tax when you distribute the account\
    \ balance from the Roth IRA.\n- You plan to keep the converted assets in the Roth\
    \ IRA for a considerable period of time (generally, more than ten years) and will\
    \ make up the dollars expended in payment of taxes due at the time of the conversion.\
    \ To ensure that this will be the result, you should pay the up-front tax from\
    \ assets other than those in the traditional IRA. Doing so will permit you to\
    \ invest an even greater amount in the Roth IRA.\n\nConverting your traditional\
    \ IRA to a Roth IRA raises the possibility of an intriguing—and potentially profitable—income-tax\
    \ strategy:\n\n1. If you have not done so already, establish a nondeductible traditional\
    \ IRA.  \n2. Make the maximum allowable annual contributions to this nondeductible\
    \ IRA for as many years as possible before conversion.  \n3. Just prior to your\
    \ planned retirement, convert the entire account to a Roth IRA.  \n\nWhat is the\
    \ result? Well, remember that you have already paid taxes on the money that you\
    \ have contributed to the nondeductible traditional IRA—in other words, you made\
    \ those contributions with after-tax dollars. Therefore, the only tax you owe\
    \ on the nondeductible account when you make the conversion to the Roth IRA is\
    \ on the earnings generated from the nondeductible account. In return for this\
    \ relatively small amount of income tax due, your new Roth IRA will grow income-tax\
    \ free forever. Although it does not get any better than this when it comes to\
    \ accumulating and growing your personal wealth, there is one catch: you should\
    \ have only one traditional IRA (deductible or nondeductible) at the time of conversion.\
    \ If you have more than one IRA, the IRS will assume that the conversion is coming\
    \ pro rata from each IRA, and thus you will owe more tax.\n\nFor example, assume\
    \ that at the time you convert your nondeductible IRA to a Roth IRA in `2018`,\
    \ you also own a traditional deductible IRA. The nondeductible IRA has an account\
    \ balance of `$50,000`, and the deductible IRA has an account balance of `$250,000`.\
    \ Further, assume that you have made after-tax contributions of `$40,000` to the\
    \ nondeductible IRA and must pay tax on `$10,000` of earnings (`$50,000` less\
    \ `$40,000`). Because the converted amounts will be distributed pro rata from\
    \ both the deductible and nondeductible IRAs, you must treat a total of `$300,000`\
    \ (`$250,000` plus `$50,000`) as potentially subject to tax. As a result, you\
    \ owe taxes on `$42,000`, not just `$10,000`, in `2018`.\n\n**Note:** The `$42,000`\
    \ is determined by multiplying the fraction of (`$50,000` divided by `$250,000`)\
    \ times `$250,000`—or `$50,000`—and subtracting the product of (`0.20` times `$10,000`)—or\
    \ `$2,000`—from the `$10,000` of earnings—or `$8,000`.\n\nIf you want to contribute\
    \ to a nondeductible IRA, you are probably ineligible to take advantage of a deductible\
    \ IRA in the first place because of `AGI` limitations and active-participation\
    \ requirements. However, if you do have a traditional deductible IRA and participate\
    \ in a Section `401(k)` or other employer-sponsored plan, ask your employer if\
    \ you can do what is called a *reverse rollover*. That is, roll over your deductible\
    \ IRA account balance to the Section `401(k)` plan, leaving you with only the\
    \ one nondeductible IRA—and without the worry of the pro rata rule."
  raw: '## IRA Rollovers and Conversions


    A rollover is a direct or indirect income-tax-free transfer of all or part of
    the participant’s account balance from one employer-sponsored retirement plan,
    such as a Section 401(k), to another employer-sponsored plan or IRA. Thus, continued
    tax deferral of the plan assets and earnings is achieved, at least until the participant
    reaches age 70.5 and is required to start taking an RMD. An additional advantage
    of this planning technique is that, if you roll over the account balance to your
    IRA, you are still in control of the money and can direct your investment decisions
    yourself.


    The mechanics of an IRA rollover are relatively simple: you take the money or
    distribution from your employer’s retirement plan and transfer it to a previously
    established or newly established IRA on your behalf. But these mechanics can be
    deceiving and troublesome if you do not properly transfer the money. For example,
    after you receive the distribution from the employer plan, you have only 60 days
    in which to roll over or deposit the funds into your IRA. If you exceed this time
    frame, you must pay income taxes on the amount that you failed to roll over. Further,
    if you have the distribution check made out in your name, under law, the employer
    must withhold 20 percent from the amount you are due. As such, you net and roll
    over only 80 percent of the total account balance to which you are entitled. You
    can get this 20 percent withholding tax back when you file your income-tax return
    the next year, but why wait? There is a better way.


    To get around the 20 percent withholding tax, ask that your employer directly
    roll over the distribution to your new employer’s retirement plan (if the plan
    will accept the money) or your individual IRA. The easiest way to do this is to
    have your employer’s human resources department make the distribution check payable
    to the trustee of your new employer’s plan or the custodian of your IRA. Have
    your employer cut the check on your behalf, otherwise known as an FBO check (FBO
    stands for for the benefit of). In this way, you avoid the application of the
    20 percent withholding tax.


    For example, assume that you are 45 and have recently changed jobs. You have an
    account balance of $200,000 in your previous employer’s Section 401(k) plan and
    are entitled to a lump-sum distribution from the plan, because you have separated
    from service. To avoid the 20 percent withholding tax, you have two planning options:


    *   If your new employer has a Section 401(k) plan that will accept the $200,000
    account balance, ask your previous employer to make the distribution check out
    to the new employer’s plan trustee on your behalf.

    *   Roll over the distribution into your previously established or newly established
    traditional IRA with a check made payable to the IRA custodian on your behalf.


    In this example, assuming that you have both choices—a new 401(k) or a new IRA—which
    is preferable? This is a common question confronting many Section 401(k) participants
    who either do not need the money from the 401(k) plan or wish to continue the
    tax deferral. Consider this: if you directly roll over the distribution to the
    new Section 401(k) and then subsequently leave your new employer when you reach
    age 55, you may take the total 401(k) balance without the imposition of the 10
    percent premature-disposition penalty that otherwise applies to employer-sponsored
    retirement plans. Alternatively, this is not possible if you roll over the distribution
    to your own traditional IRA; in that case, you must generally wait until the year
    in which you reach age 59 and 6 months to take the money without penalty. Furthermore,
    if you choose the new 401(k) plan option and like the investment choices offered
    to you under that plan, you may self-direct those investments and perhaps achieve
    a greater return than the IRA.


    Whatever choice you make, the younger you are at the time you receive the distribution,
    the more advantageous it is for you to roll over the money and continue the tax
    deferral.


    ### IRA Conversions


    Prior to 2010, it was the law that you could not convert your traditional IRA
    to a Roth IRA if your AGI exceeded $100,000 in the year of conversion. However,
    now there is no income limit, providing a potential planning opportunity for those
    who are willing to pay the income tax due on the proceeds at the time of conversion.
    There are two reasons for converting your IRA to a Roth IRA:


    *   You believe you will be in a higher income-tax bracket at retirement than
    you are currently and will pay no subsequent tax when you distribute the account
    balance from the Roth IRA.

    *   You plan to keep the converted assets in the Roth IRA for a considerable period
    of time (generally, more than ten years) and will make up the dollars expended
    in payment of taxes due at the time of the conversion. To ensure that this will
    be the result, you should pay the up-front tax from assets other than those in
    the traditional IRA. Doing so will permit you to invest an even greater amount
    in the Roth IRA.


    Converting your traditional IRA to a Roth IRA raises the possibility of an intriguing—and
    potentially profitable—income-tax strategy:


    1.  If you have not done so already, establish a nondeductible traditional IRA.
     

    2.  Make the maximum allowable annual contributions to this nondeductible IRA
    for as many years as possible before conversion.  

    3.  Just prior to your planned retirement, convert the entire account to a Roth
    IRA.  


    What is the result? Well, remember that you have already paid taxes on the money
    that you have contributed to the nondeductible traditional IRA—in other words,
    you made those contributions with after-tax dollars. Therefore, the only tax you
    owe on the nondeductible account when you make the conversion to the Roth IRA
    is on the earnings generated from the nondeductible account. In return for this
    relatively small amount of income tax due, your new Roth IRA will grow income-tax
    free forever. Although it does not get any better than this when it comes to accumulating
    and growing your personal wealth, there is one catch: you should have only one
    traditional IRA (deductible or nondeductible) at the time of conversion. If you
    have more than one IRA, the IRS will assume that the conversion is coming pro
    rata from each IRA, and thus you will owe more tax.


    For example, assume that at the time you convert your nondeductible IRA to a Roth
    IRA in 2018, you also own a traditional deductible IRA. The nondeductible IRA
    has an account balance of $50,000, and the deductible IRA has an account balance
    of $250,000\. Further, assume that you have made after-tax contributions of $40,000
    to the nondeductible IRA and must pay tax on $10,000 of earnings ($50,000 less
    $40,000). Because the converted amounts will be distributed pro rata from both
    the deductible and nondeductible IRAs, you must treat a total of $300,000 ($250,000
    plus $50,000) as potentially subject to tax. As a result, you owe taxes on $42,000,
    not just $10,000, in 2018.


    Note


    The $42,000 is determined by multiplying the fraction of ($50,000 divided by $250,000)
    times $250,000—or $50,000—and subtracting the product of (0.20 times $10,000)—or
    $2,000—from the $10,000 of earnings—or $8,000.


    If you want to contribute to a nondeductible IRA, you are probably ineligible
    to take advantage of a deductible IRA in the first place because of AGI limitations
    and active-participation requirements. However, if you do have a traditional deductible
    IRA and participate in a Section 401(k) or other employer-sponsored plan, ask
    your employer if you can do what is called a reverse rollover . That is, roll
    over your deductible IRA account balance to the Section 401(k) plan, leaving you
    with only the one nondeductible IRA—and without the worry of the pro rata rule.'
  trans: '

    # 个人退休账户（IRA）的转存与转换


    转存是指将参与者账户余额的全部或部分，从雇主资助的退休计划（例如`401(k)`条款）直接或间接地、以免缴所得税的方式转移至另一雇主资助的退休计划或个人退休账户（IRA）。由此，计划资产和收益得以持续实现税收递延，至少直到参与者年满
    `70.5` 岁并开始领取`RMD`。这一规划策略的另一个优势在于，如果你将账户余额转存至你的 IRA，你仍然掌控着这笔资金，并可以自行决定你的投资决策。


    IRA 转存的操作相对简单：你从雇主的退休计划中取出资金或分配款，并将其转移至为你设立（无论是之前已设立还是新设立）的 IRA 中。但如果你没有正确转移资金，这些操作可能会具有欺骗性并带来麻烦。例如，在你收到雇主计划的分配款后，你只有
    `60` 天的时间将资金转存或存入你的 IRA。如果超过这个时限，你必须为未能转存的金额缴纳所得税。此外，如果分配支票是以你的名义开具，根据法律，雇主必须从你应得的金额中预扣
    `20%`。这样一来，你实际净得并转存的金额仅为你应得总账户余额的 `80%`。你可以在次年提交所得税申报表时拿回这 `20%` 的预扣税款，但何必等待呢？有一个更好的方法。


    为了避免这 `20%` 的预扣税，你可以要求你的雇主将分配款直接转存到你新雇主的退休计划（如果该计划接受该资金）或你的个人 IRA 中。最简单的做法是让你雇主的人力资源部门将分配支票开具给你新雇主计划的受托人或你
    IRA 的托管人。让你的雇主代表你开具支票，这也被称为 `FBO` 支票（`FBO` 代表“受益人为”）。通过这种方式，你可以避免适用 `20%` 的预扣税。


    例如，假设你 `45` 岁，最近换了工作。你在前雇主的 `401(k)` 条款计划中拥有 `$200,000` 的账户余额，并且由于你已离职，你有权从该计划中获得一次性分配款。为了避免
    `20%` 的预扣税，你有两个规划方案可选：


    - 如果你的新雇主有一个`401(k)`条款计划，并且该计划愿意接收这 `$200,000` 的账户余额，那么请要求你的前雇主代表你将分配支票开具给新雇主的计划受托人。

    - 将分配款转存到你之前已设立或新设立的传统 IRA 中，支票需代表你开具给 IRA 托管人。


    在这个例子中，假设你两种选择都有——新的`401(k)`或新的 IRA——哪一个更可取？这是许多面临`401(k)`条款的参与者常问的问题，他们要么不需要`401(k)`计划中的这笔钱，要么希望继续享受税收递延。考虑这一点：如果你将分配款直接转存到新的`401(k)`条款，随后在
    `55` 岁时离开新雇主，你可以提取全部`401(k)`余额，而无需缴纳通常适用于雇主资助退休计划的 `10%` 提前支取罚金。相反，如果你将分配款转存到你自己的传统
    IRA 中，则无法做到这一点；在这种情况下，你通常需要等到你年满 `59` 岁零 `6` 个月的那一年才能无罚金地取款。此外，如果你选择了新的`401(k)`计划方案，并且喜欢该计划提供的投资选择，你可以自行指导这些投资，或许能获得比
    IRA 更高的回报。


    无论你做出何种选择，你在收到分配款时越年轻，将资金转存并继续税收递延对你越有利。


    ## 个人退休账户（IRA）转换


    在`2010`年之前，法律规定如果你的`AGI`在转换当年超过 `$100,000`，你就不能将你的传统 IRA 转换为罗斯 IRA。然而，现在没有收入限制，这为那些愿意在转换时缴纳应缴所得税的人提供了一个潜在的规划机会。将你的
    IRA 转换为罗斯 IRA 有两个原因：


    - 你相信退休时你处于比现在更高的所得税级，并且当你从罗斯 IRA 中分配账户余额时，将无需再缴税。

    - 你计划将转换后的资产在罗斯 IRA 中保留相当长的时间（通常超过十年），并且能弥补转换时为缴纳税款而支出的资金。为了确保达到这一结果，你应该使用传统 IRA
    之外的资产来支付这笔前期税款。这样做可以让你在罗斯 IRA 中投资更多的金额。


    将你的传统 IRA 转换为罗斯 IRA 引发了一种有趣且可能盈利的所得税策略的可能性：


    1. 如果你还没有这样做，先设立一个不可抵税的传统 IRA。

    2. 在转换前的尽可能多的年份里，向这个不可抵税 IRA 缴纳每年允许的最大额度的供款。

    3. 就在你计划退休之前，将整个账户转换为罗斯 IRA。


    结果会怎样？嗯，请记住，你已经为你向不可抵税传统 IRA 供款的资金缴纳了税款——换句话说，你是用税后资金进行的这些供款。因此，当你在向罗斯 IRA 进行转换时，你对这个不可抵税账户唯一需要缴纳的税款，是该账户所产生的收益。作为这笔相对较小的应缴所得税的回报，你的新罗斯
    IRA 将永远免税增长。虽然就积累和增长个人财富而言，这再好不过了，但有一个问题：在转换时，你应该只拥有一个传统 IRA（无论是可抵税的还是不可抵税的）。如果你拥有多个
    IRA，美国国税局（IRS）会假定转换是按比例从每个 IRA 中进行的，因此你将欠更多的税。


    例如，假设你在`2018`年将你的不可抵税 IRA 转换为罗斯 IRA 时，你同时还拥有一个传统的可抵税 IRA。不可抵税 IRA 的账户余额为 `$50,000`，可抵税
    IRA 的账户余额为 `$250,000`。此外，假设你已向不可抵税 IRA 缴纳了 `$40,000` 的税后供款，并且必须为 `$10,000` 的收益（`$50,000`
    减去 `$40,000`）缴税。由于转换金额将从可抵税和不可抵税 IRA 中按比例分配，你必须将总共 `$300,000`（`$250,000` 加 `$50,000`）视为可能需缴税的金额。结果，你在`2018`年欠缴的税款是基于
    `$42,000` 计算的，而不仅仅是 `$10,000`。


    **注意：** `$42,000` 的计算方式是：将分数（`$50,000` 除以 `$250,000`）乘以 `$250,000`（得到 `$50,000`），然后从
    `$10,000` 的收益中减去（`0.20` 乘以 `$10,000`）即 `$2,000` 的乘积，得到 `$8,000`。


    如果你想向不可抵税 IRA 供款，你可能原本就因为`AGI`限制和积极参与要求而没有资格享受可抵税 IRA。但是，如果你确实拥有传统的可抵税 IRA，并且参与了`401(k)`条款或其他雇主资助的计划，请问你的雇主你是否可以进行所谓的*反向转存*。也就是说，将你的可抵税
    IRA 账户余额转存到`401(k)`条款计划中，这样就只留下你唯一的一个不可抵税 IRA——从而无需担心按比例分配规则。

