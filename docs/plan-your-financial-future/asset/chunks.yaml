    ### 共同基金：你投资组合的一部分


    许多小型投资者从共同基金开始并结束其投资组合的构建。他们也会与投资顾问或财务规划师合作，将这些基金配置到咨询服务账户中。如果你不打算寻求投资顾问或财务规划师的帮助，但希望投资共同基金（或者必须作为自管理退休账户的一部分来投资此类基金，例如
    `401(k)` 计划），请考虑以下建议：


    -   尽量投资于免佣或低佣基金。这些基金在购买时不收取销售费用。但请注意，大多数咨询账户如果持有该基金，会免除销售费用。

    -   尽量投资于管理费用低于同行的基金。这里没有硬性规则，只是运营基金的年费越低越好。另一种选择是投资于全指数基金，但这样你会失去优秀共同基金经理可能创造的超额市场表现的潜力。

    -   尽量投资于资产周转率相对较低的基金。投资于一个不频繁买卖证券的基金是一种有效的税务管理技巧，正如你将在第 12 章中看到的，这是保护你积累财富的关键组成部分。

    -   确保基金投资的证券与其投资目标一致。例如，如果该基金声明自己是成长型股票基金，它就不应该投资于短期债券。

    -   了解你愿意承担多大的投资风险，并将你的风险状况与基金的投资目标相匹配。这在共同基金投资中至关重要。如果你对收入最为看重（通常是保守型风险状况的特征），那么许多股票基金并不适合你。反之，激进型成长风险状况通常意味着投资美国政府债券基金并非资金的最佳用途。


    总之，你可能希望将资金分散投资于主动管理型基金和被动管理型指数基金或 `ETF`。许多采用这一策略的投资者因此变得更加富有。


    ## 国际投资


    近年来，我们常听到一种说法：全球经济正在一体化。一个国家发生的金融事件——特别是在新兴增长经济体，如中国和印度——几乎会立刻影响到美国的经济。幸运的是，全球经济一体化带来了投资机会，而不仅仅是购买国内股票、债券或共同基金。但不幸的是，国际投资也带来了额外的风险。


    货币或汇率风险源于外币相对于美元价值的不确定性。例如，假设你投资了一家英国公司的股票，并用英镑支付。即使该股票的价值上涨，如果英镑相对于美元贬值，你仍然可能亏钱。反之，如果英镑相对于美元升值，你可能会获得双重收益，包括英国股票的增值。


    如何有效降低货币或汇率风险？这个问题引出了通过一种被称为美国存托凭证（ADR）的金融工具来购买外国股票的投资策略。`ADR` 是美国银行发行的一种凭证，代表该银行通过外国代表购买的、并为了
    `ADR` 所有者的利益而信托持有的外国证券。这些凭证在美国大多数证券交易所上市，包括纽约证券交易所，是直接投资外国股票的一种替代方式。`ADR` 以美元计价，这意味着你无需过多担心外币与美元之间的关系。


    另一种国际投资方式是购买国际型或全球型共同基金的份额。国际型共同基金投资于位于美国境外并在境外开展业务的公司的证券，可以是股票、债券或两者兼有。而全球型共同基金（也称为世界基金）则投资于国际公司和美国公司的证券。还有一些特定地区基金，尤其是在环太平洋国家，如日本、韩国、新加坡和印度尼西亚。


    你应该将国际投资视为分散投资组合的另一种方式。近年来，国际和全球投资的回报率显著超过美国市场；并且，取决于外国未来的政治事件，全球投资很可能继续跑赢国内基金。尤其是在相关国家货币相对于美元走强的情况下。


    现在，让我们转向投资和财富积累的另一个主要类别：将资金投资于实物资产或不动产，这将在下一章中讨论。之后，我们将对比金融资产、实物资产与使用资产，其中主要的使用资产就是你的住房或居所。从历史上看，许多人将他们的房子视为首要投资。在第
    11 章中，我们将阐述为什么在 `PADD` 流程中你不应这样看待你的个人居所，因为房子（至少对大多数人而言）并未被证明是一项出色的长期投资。


    # 10. 投资实物资产


    大多数人都拥有房地产；事实上，截至 2017 年，大约 64% 的美国人拥有自己的住房。此外，根据在线理财网站 Wallet Hacks 的数据，2017
    年，典型美国人净资产的约 60% 来自其房屋净值。此处房屋净值定义为房屋的公允市场价值减去任何相关负债。因此，房屋所有权仍然是美国梦和财富积累过程中不可或缺的一部分。


    对大多数人来说，拥有住房与拥有股票、债券或出租房地产作为投资的意义不同。相反，你的房子或主要居所应被视为一项使用资产，并应作为使用资产列入个人财务状况报表中。这有别于对房地产的直接投资，例如拥有出租屋、度假屋甚至荒地，以及对房地产的间接投资，例如持有房地产有限合伙（`RELP`）或房地产投资信托（`REIT`）的份额。


    ## 房地产直接投资


    房地产直接投资主要由了解房地产选择过程且能接受较高风险资产的富裕人士进行。许多房地产直接投资的目的也是为了改善个人的现金流（收入），而不仅仅是为了享受资产的价值增值（增长）。

    '
- fmt: '### Vacation Homes


    According to *American Demographics* magazine, approximately 70 percent of Americans
    view the purchase of a vacation home as the number-one indication that an individual
    has accumulated wealth. Further, partly as a reflection of this fact, some 60
    percent of Americans anecdotally say they would like to own a vacation home. Although
    this is a common financial goal, it is not of tantamount importance for many people,
    because buying a vacation home is beyond their financial means. However, if you
    are interested in purchasing a vacation home, you should take three major factors
    into consideration:


    - The location of the home

    - The financing costs associated with buying and maintaining the property

    - How long you plan to own the home, including how you may wish to ultimately
    divest yourself of ownership


    A standard rule in any purchase of real estate applies when buying a vacation
    home: the most important factor is location, location, location! As of 2013, according
    to the *Market Watch* web site, with the exception of Orlando, Florida (Disney
    World), all of the top-ten preferred locations for buying a second home were near
    the ocean or in the mountains. They were also close to or part of a major city.
    You can bet that those locations demand premium prices and are probably suffering
    from a paucity of attractive vacation properties.


    As such, you may wish to take a different approach. Look for areas that more than
    one print publication or web site describe as "up-and-coming." For example, in
    recent years, properties along both coasts of Mexico have become more attractive
    to retiring and vacationing Americans. The same can be said of Costa Rica. If
    you concentrate on areas that are not yet well-known to the wealthy and those
    who are aspiring to be wealthy, you are less likely to buy at the top of the market
    and can thus anticipate that your second home will enjoy future appreciation that
    may not be possible in more established locations.


    Financing a second home, particularly if you do not have much equity in your first
    home or primary residence, is always an issue. Most lenders expect you to put
    down at least 20 percent of the second home''s fair market value before closing.
    Renting out the home is a good way to recover some of this down payment, but if
    you do so, charge a rent that is approximately 10 to 20 percent higher than your
    mortgage payment to take care of maintenance expenses. You will also likely need
    to hire a property manager, particularly if the second home is some distance from
    your primary residence or in another country. If you can avoid it, try not to
    tap into the equity of your first home to make the down payment on the second.
    If the property value of your first home declines, it will be all the more difficult
    to recover the lost equity. It will also present a cash-flow challenge if you
    used an interest-only adjustable-rate mortgage (ARM) to finance the first home.


    Do not expect your vacation home to pay for itself immediately. Over the long
    term, a vacation home can be self-sustaining (particularly if you are renting
    it out when you are not there), but only if you exercise careful financial planning.
    As with most real assets, the longer you own the vacation home, the greater the
    chances of its significant capital appreciation. Ultimately, you must determine
    whether you wish to pass your vacation home on to family members now or at your
    death, or whether you wish to sell it and realize a (hopefully) sizable percentage
    return. As you will see in Chapter [19](#A314864_2_En_19_Chapter.html), the value
    of a highly appreciated vacation home may be a significant estate-planning issue,
    although a competent estate or financial planner can assist you in removing or
    reducing the value of the home from your taxable estate.


    ### Rental Homes


    Most individuals become landlords in one of two ways: as a result of a conscious
    decision to buy homes and rent them to others, or because their primary residence
    does not sell in the time frame they anticipate and they convert the residence
    to a rental property. The obvious practical disadvantage of becoming a landlord
    is that, unless you hire a property manager, you have to deal with tenants. However,
    there are tax advantages associated with rental homes. Notably, as a landlord,
    you can depreciate the home and, at least to a limited extent, take an annual
    operating loss if your annual adjusted gross income is not deemed to be too high.


    Under current tax law, a rental activity is treated as a passive activity, or
    one that involves the conduct of any trade or business in which the taxpayer does
    not materially participate. But there is a lesser standard of participation—active
    participation—that many individuals can easily meet with respect to their rental
    real-estate activities. An individual meets the active-participation standard
    if they participate in making management decisions with respect to the rental
    property or arrange for others (for example, a property manager) to provide rental
    property services. If this lesser standard is met, you can deduct up to $25,000
    of losses annually from your rental real-estate activities, provided your adjusted
    gross income (`AGI`) for that year does not exceed $100,000. If you pass this
    threshold, the `$25,000` maximum is then reduced by 50 percent of the amount by
    which your `AGI` exceeds `$100,000`. Once you reach `$150,000` of `AGI`, no loss
    deduction is permitted at all.


    For example, assume that you own an apartment building that is managed by an on-site
    property manager. You meet frequently with the property manager and make all decisions
    with respect to improving the property. As such, you actively participate for
    purposes of the rental real-estate loss deduction. Further, assume that your `AGI`
    for the year 2018 is `$110,000`, and the building generates `$26,000` in losses
    during that year. You are allowed to deduct only `$20,000` of these losses on
    your 2018 income-tax return, because the maximum deduction is `$25,000`, and the
    maximum deduction is reduced by `$5,000` (the portion of `$110,000` in excess
    of `$100,000`—or `$10,000`—times 0.50 equals `$5,000`).


    As you will learn when we discuss the primary residence as a use asset in Chapter
    [11](#A314864_2_En_11_Chapter.html), generally you are never allowed to take an
    income-tax loss when selling that residence (your home). However, a favorable
    exclusion-of-gain provision in the tax code applies to the sale of a personal
    residence previously converted into rental property. The sale of a rental home
    is taxed in accordance with the normal capital-gain and -loss rules (remember,
    you have turned your home into an investment), but there is the additional tax
    benefit of the up-to-`$25,000` annual loss provision, if you qualify. This may
    even be enough reward to compensate you for the daily hassles of putting up with
    tenants!'
