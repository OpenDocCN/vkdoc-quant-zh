  trans: '

    # 生命保险的需求导向法


    确定个人应购买的寿险最优保额的需求导向法十分精密，通常通过计算机软件程序计算。简言之，该方法会考虑您的婚姻状况、配偶是否在外工作、家庭规模以及受抚养人（子女或年迈父母）的任何独立收入。例如，单身且无受抚养人的个人对寿险保障的需求很小。因此，此人的寿险可能只需用于偿还与其死亡相关的债务和费用。而供养受抚养人的已婚人士或单亲在职父母，则需要在自身去世时继续为这些受抚养人提供收入流，因此有寿险需求。需求导向法适用于确定这一需求的金额。


    以下是受保人及其家人在其去世时的一些典型需求：


    *   安葬或火化费用，包括丧葬费

    *   调整基金，这是一种短期基金，旨在覆盖家庭因适应主要（或其他）养家糊口者离世而产生的一次性费用

    *   收入延续基金，包括用于偿还抵押贷款的金额（若受保人去世时房屋尚未还清）

    *   未成年子女的大学教育基金

    *   为未亡配偶提供终身收入的金额，若该配偶失业、缺乏进入劳动力市场的必要技能或无法获得足以替代受保人收入的收入，则会产生此需求


    作为单收入家庭的潜在受保人，您应该考虑到，即使您的未亡配偶能够产生足够的收入来弥补您收入的损失，让配偶进入劳动力市场可能也不如为此需求购买额外的寿险来得可取。换句话说，您是否打算要求您的配偶去工作？答案取决于您与配偶的约定，但如果您不想进行此讨论，您就应该购买必要的额外寿险。


    ## 定期寿险 vs. 现金价值寿险


    许多寿险公司提供各种人寿保险单。所有这些保单通常只包含两种基本的寿险提供方式：定期寿险（也称为临时寿险）和现金价值寿险（也称为终身寿险）。定期寿险仅保障您特定时期；如果您在此期间去世并按时缴纳保费，公司将向您的家人支付合同规定的应付死亡保险金。现金价值寿险为您提供终身保障，并具有以现金价值积累形式存在的储蓄成分。定期寿险的类型包括年度可续保定期寿险、均衡保费定期寿险和递减定期寿险。具有现金价值积累功能的终身寿险保单类型包括传统终身寿险、万能寿险、可变寿险和可变万能寿险。


    定期寿险和现金价值寿险在保护您和您的家人方面都很有价值。您不应将定期或现金价值寿险视为非此即彼的选择；许多考虑周全的人会同时购买这两种保障。但一般而言，随着年龄增长，定期寿险的保费会变得更贵，而现金价值寿险的费用则保持固定。原因在于现金价值寿险的费用被前置到保单结构中，因为部分保费支出（超出了任何寿险保单相关的纯死亡率成本）被用于建立现金储备或现金基金，您有可能在紧急需要时动用这笔资金。


    正如在确定可能需要的寿险保额时一样，经验法则也适用于购买定期寿险还是现金价值寿险的最佳选择。最常见的一条是“购买定期寿险，并将差额进行投资”。换句话说，考虑到定期寿险至少在一开始比现金价值寿险便宜（您越年轻，预期寿命越长，与定期寿险相关的死亡率成本就越低），将省下的钱投资于收益更高的金融产品，例如共同基金。尽管这种策略的吸引力显而易见，但终身寿险的倡导者反驳说，“购买定期并投资差额”的概念依赖于几个有缺陷的假设：


    *   无论受保人的个人财务状况或当前生活水平如何，该差额每年都会在受保人持有定期寿险期间被勤勉地用于投资。

    *   替代投资在财务上总是优于渐进的现金价值积累。

    *   随着受保人年龄增长，对保险的需求会神奇地消失。


    最终，如何最好地满足您的寿险需求的最终决定权在您手中。在满足这些需求时，您应记住，购买寿险是为了保护您自己和您的家人；而购买投资产品则是为了积累财富。尽管现金价值保单具有一些投资特性（尤其是较新形式的万能寿险和可变万能寿险），寿险首先且首要是一种风险管理产品，通常不是旨在产生显著投资增长的产品。


    ### 定期寿险的类型


    如今，大多数定期寿险购买者会选择年度可续保定期寿险或均衡保费定期寿险。历史上，递减定期寿险曾是一种流行的临时保障形式，并被用作受保人身故时的抵押贷款清偿工具。然而，近年来递减定期寿险已失宠，主要是因为其保障减少的速度与典型抵押贷款余额的减少速度不一致，导致受保人支付了不必要的保费成本。对于年度可续保定期寿险，您每年支付保费，保单持续有效。随着您年龄增长，保险公司的成本增加，保费每年上升。但您家人获得的保障水平——即死亡保险金——保持不变。


    另一方面，均衡保费定期寿险每年的初始成本高于年度可续保定期寿险，但保费在固定期间（通常为 5 到 30 年不等）内保持不变。因此，随着您年龄增长，假设您仍然希望拥有一份相对便宜的临时寿险保单，您可能应考虑用均衡保费定期寿险替换年度可续保定期寿险。但请注意：当您接近均衡保费定期寿险保单的到期日时，您应开始为保单到期后的保费支付预留额外资金。通常，根据您的年龄、健康状况以及原始均衡保费定期保单的期限，当您购买新定期保单时，保费会大幅上涨。


    一些定期保单的一个吸引人特性是，可以无需提供可保性证明就能将定期（或临时）保障转换为现金价值（或终身）寿险保障。这意味着您无需通过体检即可获得永久保障。因此，转换机会对于在定期期间健康状况可能恶化的受保人来说尤其宝贵。同样，如果您的健康状况恶化且目前拥有定期保单，您可能应考虑尽快转换为现金价值保单，因为您日后很可能无法获得永久保障的资格。

    '
- fmt: '### Types of Cash Value Insurance


    There are three basic types of cash value policies: traditional whole life, universal
    life, and variable life. A fourth type, variable universal life (`VUL`), combines
    the features of universal and variable policies.


    Traditional whole life is the standard form of cash value insurance that has been
    offered by life insurance companies for many years. It features a fixed premium
    for the life of the policy as well as a savings component that grows on a tax-deferred
    basis. The policy is initially relatively expensive and, unless you continue to
    make premium payments, will lapse, potentially causing you to lose coverage. In
    addition, at your death, your beneficiaries will receive only the death benefit
    payable from the policy and not the accumulated cash value. If you choose to access
    the cash value or savings portion during your lifetime, you must do so through
    a policy loan or withdrawal, which in turn reduces the amount of the death benefit
    paid.


    Next, universal life takes the concept of "buy term and invest the difference"
    in a new direction. Yes, you are able to invest the premium amounts charged in
    excess of pure term coverage and generate additional return, but you must do so
    by investing in what the insurance company chooses for you—which are usually conservative,
    fixed-income vehicles, such as investment-grade bonds. Thus, the return generated
    by a universal life policy, although higher than that of a traditional whole life
    policy, still lags that of a variable life policy, in which equities (common stocks)
    are the primary form of investment. The primary advantage of a universal life
    policy is its flexibility with respect to premium payments. The policy premium
    is not fixed or tied to the amount of death benefit protection purchased, except
    in the first year of the policy. The premiums are then deposited into an accumulation
    fund from which the insurance company withdraws monthly mortality charges. A minimum
    payment is required to keep the policy in force only when the accumulation fund
    is close to zero. The policyholder, subject to their continued insurability, may
    increase the death benefit of a universal life policy.


    The third kind of cash value insurance, variable life insurance, differs from
    traditional whole life and universal life in one primary respect: you (and not
    the insurance company) are in charge of your investment choices. Variable life
    policies allow you to invest in various combinations of stocks, bonds, and mutual
    funds and feature subaccounts in which you can allocate your assets (similar to
    the variable annuity form of insurance product). Although the premium payments
    due on a variable life policy are fixed (as in traditional whole life), the death
    benefit may increase, as can the underlying cash value accumulated within the
    policy subaccounts. The `VUL` policy, finally, takes this concept one step further
    by combining a choice of investments and increasing death benefit protection with
    the ability to make flexible premium payments.


    Which of these cash value life insurance forms is best? It almost invariably depends
    on your comfort level with assuming investment risk. If you consider yourself
    to be a moderately aggressive or aggressive investor (remember, a primary advantage
    of working with a financial planner is that the planner helps you determine your
    risk-tolerance level), a variable life or `VUL` policy may be preferable. If you
    are relatively uncomfortable with assuming investment risk or you do not like
    making investment decisions, a traditional whole life or universal life policy
    may be more to your liking.


    Table [4-1](#A314864_2_En_4_Chapter.html#Tab1) summarizes the types of term and
    cash value policies available, to help you weigh your options.


    **Table 4-1. Types of Life Insurance**


    | Type of Policy | Description | Insurance Need | Death Benefit | Premium Structure
    | Who Should Buy It? |

    | --- | --- | --- | --- | --- | --- |

    | Annual Renewable Term | Pure life insurance with no cash value | Temporary |
    Fixed | Increases each year | Insured with limited funds |

    | Level Premium Term | Pure life insurance with no cash value | Temporary | Fixed
    | Level for period of years and then increases | Insured with limited funds |

    | Traditional Whole Life | Cash value accumulation; predictable maximum cost |
    Permanent | Fixed | Level for insured''s lifetime | Insured with need for predictable
    savings |

    | Universal Life | Cash value accumulation; flexible cost | Permanent | Adjustable
    (may increase) | Flexible with minimum payment | Conservative investor |

    | Variable Life | Cash value accumulation based on investment performance | Permanent
    | Guaranteed minimum (fluctuates) | Level for insured''s lifetime | Risk-tolerant
    investor |

    | Variable Universal Life (VUL) | Features of both variable and universal life
    policies | Permanent | Adjustable with guaranteed minimum | Flexible with minimum
    payment | Risk-tolerant investor |


    Now that we have considered the types of life insurance policies available for
    purchase, let''s move on to choosing an insurance company.'
