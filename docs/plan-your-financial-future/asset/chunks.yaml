  trans: '

    ## 基本税务筹划技巧 #2：延迟纳税


    最常见的延迟纳税技巧是向工作单位的退休计划或个人退休储蓄计划（例如传统的 `IRA` 或 `Roth IRA`）缴款。我们已经讨论过向雇主的 `401(k)`
    或 `403(b)` 退休计划缴款，并充分利用雇主可能提供的任何匹配缴款的重要性。然而，从税务筹划的角度来看，你也在延迟缴纳对 `401(k)` 或 `403(b)`
    计划缴款所产生的税款，并延迟缴纳这些缴款所产生任何收益的税款。由于 `401(k)` 和 `403(b)` 计划是法律规定的税收递延退休计划，你必须在年满
    70 岁零 6 个月后的那一年开始为你的缴款和收益纳税。在此期间，你享受了资金免税复利增长带来的财务优势。让我们试着理解这一优势的重要性。


    如果有人问你：“你更愿意今天拥有 1000 美元，还是十年后拥有 1000 美元？”你的直觉可能会回答：“今天就要 1000 美元。”为什么？逻辑是，如果你今天收到
    1000 美元，你可以一次性投资，赚取更多收益。假设你将 1000 美元投资于年回报率为 5% 的美国国债。十年后，你将拥有 1628.89 美元。反之，如果你十年后才拿到这
    1000 美元，这笔钱按现值计算仅相当于今天的 613.91 美元。


    现在，我们换个角度来看这个问题。将 5% 的年回报率视为税率百分比。如果你今年有一笔 1000 美元的所得税负债，但你可以通过某种方式将这笔负债延迟十年，那么这笔负债的现值仅为
    613.91 美元（节省了超过 386 美元）。而且，根据货币时间价值原理，你推迟这笔负债的时间越长，其现值就越低，你的节省就越多。此外，你应该意识到，到第
    40 年时，你那 1000 美元的负债按现值计算仅值 142.05 美元——大约是每美元只值 14 美分。另外的每美元 86 美分完全是免税产生的，这正是在退休计划财富积累中运用所得税延迟的妙处所在。


    还有其他涉及金融产品的延迟纳税技巧。值得注意的是，如果你购买了税收递延型固定或可变年金产品，那么你用税后资金购买该产品所获得的收益，其税款将被递延（在某些情况下，可递延至
    100 岁）。你也可以用从雇主退休计划（例如 `401(k)`）中一次性领取的分配金来购买税收递延年金。但是，由于这些缴款实际上是用税前资金缴纳的（你从未为此缴过税），如果你想避免为这些分配金缴纳高额税款，则必须在年满
    70 岁零 6 个月后的那一年开始领取分配金。


    另一种提供税收递延的金融产品是现金价值人寿保险单。如果你在生前没有动用这张保单的现金退保金额，那么保单支付给你指定受益人的死亡赔偿金是完全免税的。或者，在万能寿险、可变寿险或可变/万能寿险保单内累积的现金价值的收益，在你退保之前都是税收递延的，前提是退保时你收到的现金价值超过了为该保单已支付的保费。例如，假设你拥有一份终身寿险保单已有一段时间，并累积了
    70,000 美元的现金退保价值。在这一年中，你退保获得了现金，但迄今为止你只为该保单支付了 50,000 美元的保费。一次性支付的 70,000 美元中，超过已支付保费
    50,000 美元的部分（即 20,000 美元）需要立即纳税，按你当前的边际所得税率缴纳。


    ## 基本税务筹划技巧 #3：收入转换


    归根结底，每一项收入通常都可以分为普通收入（例如薪金和工资）或资本利得（通常指来自出售或处置投资产品（如股票或商业财产）的收入）。如前所述，这些类型的收入可能适用截然不同的税率。例如，普通收入的最高税率为
    37%，而长期资本利得收入的最高税率仅为 20%。这近 20% 的税率差表明，采取尽可能将普通收入转换为资本利得收入的税务筹划策略是明智的。这也凸显了尽可能储蓄和投资的重要性，因为投资资产的增值部分，其税率最高不超过
    20%。


    假设你赚了 1000 美元的薪水，并且目前（在 2018 年）处于 37% 的最高普通所得税档位。你的税后可支配收入是 630 美元（1000 美元减去 370
    美元）。如果你将这 1000 美元投资于 ABC 公司的股票，并在购买至少一年后以 2000 美元卖出，那么你的税后可支配收入将是 800 美元（1000
    美元减去 200 美元）。请注意，你只需要缴纳 20% 的资本利得税。如果你处于 12% 或更低的普通所得税档位，那么你这次出售股票将无需缴纳任何资本利得税。


    自 2003 年以来，你可以对来自股票或股票共同基金的大部分投资收入（股息）享受资本利得所得税率。但是，请记住，来自间接房地产投资（例如房地产投资信托基金
    (`REIT`)）的应付股息通常不符合享受同样优惠的条件（尽管从 2018 年开始，某些 `REIT` 股息的最 高税率有所降低）。因此，用 `REIT`
    投资来实现税收高效的收入转换并不完全可行。还有一种常见的反向收入转换，许多纳税人无意中犯了错误却没有意识到。这种情况发生在纳税人在退休计划（无论是雇主发起的计划，如
    `401(k)`，还是传统的可抵扣 `IRA`）中投资共同基金（或个股和债券）时。在这种情况下，纳税人实际上做的是投资一项资本资产（出售时可能按较低的资本利得税率征税），然后将其转换为一项在分配时需要缴纳普通所得税的资产。之所以会发生这种情况，是因为出于所得税目的，来自退休计划或
    `IRA` 的分配被视为薪水的替代品，而薪水本应作为普通收入纳税。尽管如此，这种不利的收入转换很可能被与雇主发起的退休计划或 `IRA` 相关的、极其有利的长期税收递延（针对收益和缴款）优势所抵消。

    '
- fmt: '## Tax-Smart Investing


    Now that we have discussed both investing and income taxes, we need to combine
    the two. In other words, which type of account—tax-deferred or taxable—is most
    efficient to position a given type of financial asset?


    Tax-deferred accounts, such as retirement plans, allow taxpayers to grow their
    assets over many years without having to pay taxes on the earnings. Therefore,
    it makes sense to position those investments that are not income-tax efficient
    in retirement plans. An example of such an investment is a zero-coupon bond, which
    generates taxable phantom income each year but does not distribute any corresponding
    cash to the bond holder. Other similarly income-tax-inefficient investments you
    may wish to position in retirement plans are individual corporate, investment-grade
    bonds and bond mutual funds, as well as Treasury Separate Trading of Registered
    Interest and Principal of Securities (STRIPS) and Treasury Inflation Protected
    Securities (TIPS). Conversely, one type of financial asset you should generally
    not position in a tax-deferred account is a municipal bond or municipal bond fund.
    Interest from a municipal bond is tax-exempt, so if you position it in a tax-deferred
    account, you are converting its tax-free status to a taxable status after it is
    withdrawn from the retirement plan. It is important to note that in recent years,
    the tax-exempt yield generated from a municipal bond—as compared to a taxable
    corporate bond—was so advantageous that it made economic sense to modify this
    strategy. However, you are generally better off refraining from positioning municipal
    bonds and municipal bond funds in a tax-deferred account as an income-tax strategy.


    What about taxable accounts? As a general rule, individual stocks and stock mutual
    funds belong in these types of accounts, because they are more tax-efficient than
    bonds and bond mutual funds. Index funds or exchange-traded funds (ETFs) are also
    good choices for taxable accounts, because they are passively managed and generally
    income-tax efficient. However, with respect to stocks and stock mutual funds,
    an argument may be made that, given their growth potential and the total compounded
    dollars they have earned at the time of withdrawal, they may also optimally fit
    into a tax-deferred portfolio. If you are working with a financial planner or
    investment advisor, ask them to give you perspective with regard to this argument.


    ## What You Can Learn From Your Own Tax Return


    Although most taxpayers do not prepare their own tax returns, they should understand
    the entries so as to plan more effectively for the coming years. The following
    points provide a brief explanation of some of the basics of filing a tax return:


    - What is your filing status? If you are married and living together throughout
    the year, you should file your return jointly with your spouse, because generally
    you will be taxed more favorably. Alternatively, if you are a single parent with
    a dependent child or children, you should investigate filing your return by using
    the advantageous head-of-household status.

    - Should you itemize or take advantage of the standard deduction? Given that the
    standard deduction for single or married-filing-jointly taxpayers has been effectively
    doubled under the 2017 TCJA, it is likely that many fewer individuals will elect
    to itemize. However, if you are a homeowner with a sizable mortgage, or make a
    great number of annual charitable contributions, it may be to your advantage to
    itemize deductions.

    - Should your investment interest be taxable or tax-exempt? As discussed, the
    higher your marginal income-tax rate, the greater the advantage to you of investing
    in tax-exempt assets, such as municipal bonds or municipal bond funds.

    - Do you have any self-employment income? If you do (to be reported on IRS Form
    1040, Schedule C), you may be entitled to a number of business deductions that
    you would not otherwise be able to claim.

    - Do you have capital losses (losses from the sale of any investment or business
    property)? As a tax-planning technique, you should recognize capital losses in
    years when you have capital gains. These losses can offset capital gains and further
    offset ordinary income to the extent of `$3,000` per year.

    - Are you required to make required minimum distributions from your IRA this year?
    Just as with distributions from employer-sponsored retirement plans, you have
    to begin taking distributions from a traditional deductible IRA (not a Roth IRA)
    no later than April 1 of the year after you reach the age of 70 and 6 months.

    - Can you contribute to and deduct contributions to your IRA this year? The answer
    is somewhat complicated and depends on your filing status, but if your income
    is low enough, you can both contribute to and deduct a specified amount annually
    from your IRA.

    - Do you have unreimbursed employee expenses? The 2017 TCJA disallows a deduction
    for unreimbursed employee expenses. Thus, if your business expenses are not being
    reimbursed, you should ask your employer to establish a reimbursable, or accountable,
    plan.

    - What is your taxable income? Depending on your filing status, this amount determines
    what marginal income-tax bracket you are in and your applicable marginal income-tax
    rate.

    - Do you qualify for any additional tax credits this year? All allowable credits
    have qualifying conditions or limitations. However, if you qualify, a credit affords
    you a dollar-for-dollar tax reduction.

    - Do you owe household employment taxes? Generally, you are responsible for paying
    Social Security and Medicare taxes if you employ a household domestic worker,
    such as a nanny. This is one of the most overlooked sections of income tax law
    and has resulted in the imposition of tax penalties for many salaried and self-employed
    workers.

    - Did you pay tax or receive a tax refund? A goal of many taxpayers is to receive
    as big a refund as possible when they file their tax return, but think about it:
    if you receive a refund, you have just given the federal government an interest-free
    loan for the entirety of the previous tax year. Alternatively, you do not want
    to withhold so little tax that penalties are imposed for the previous year. Your
    goal should be a small tax payment with the filing of your individual income-tax
    return (for example, a payment of no more than `$100`).


    We now move on to the other major tax that can quickly reduce your accumulated
    wealth: the transfer tax imposed under federal tax law. The transfer tax, which
    includes estate and gift taxes, is most relevant in estate planning and will be
    referred to again in Chapter [19](#A314864_2_En_19_Chapter.html). Regardless,
    the next chapter provides important information with respect to the provisions
    and application of federal estate-tax and gift-tax law in planning for your financial
    future.'
  raw: '## Tax-Smart Investing


    Now that we have discussed both investing and income taxes, we need to combine
    the two. In other words, which type of account—tax-deferred or taxable—is most
    efficient to position a given type of financial asset?


    Tax-deferred accounts, such as retirement plans, allow taxpayers to grow their
    assets over many years without having to pay taxes on the earnings. Therefore,
    it makes sense to position those investments that are not income-tax efficient
    in retirement plans. An example of such an investment is a zero-coupon bond, which
    generates taxable phantom income each year but does not distribute any corresponding
    cash to the bond holder. Other similarly income-tax-inefficient investments you
    may wish to position in retirement plans are individual corporate, investment-grade
    bonds and bond mutual funds, as well as Treasury Separate Trading of Registered
    Interest and Principal of Securities (STRIPS) and Treasury Inflation Protected
    Securities (TIPS). Conversely, one type of financial asset you should generally
    not position in a tax-deferred account is a municipal bond or municipal bond fund.
    Interest from a municipal bond is tax-exempt, so if you position it in a tax-deferred
    account, you are converting its tax-free status to a taxable status after it is
    withdrawn from the retirement plan. It is important to note that in recent years,
    the tax-exempt yield generated from a municipal bond—as compared to a taxable
    corporate bond—was so advantageous that it made economic sense to modify this
    strategy. However, you are generally better off refraining from positioning municipal
    bonds and municipal bond funds in a tax-deferred account as an income-tax strategy.


    What about taxable accounts? As a general rule, individual stocks and stock mutual
    funds belong in these types of accounts, because they are more tax-efficient than
    bonds and bond mutual funds. Index funds or exchange-traded funds (ETFs) are also
    good choices for taxable accounts, because they are passively managed and generally
    income-tax efficient. However, with respect to stocks and stock mutual funds,
    an argument may be made that, given their growth potential and the total compounded
    dollars they have earned at the time of withdrawal, they may also optimally fit
    into a tax-deferred portfolio. If you are working with a financial planner or
    investment advisor, ask them to give you perspective with regard to this argument
    .


    ## What You Can Learn From Your Own Tax Return


    Although most taxpayers do not prepare their own tax returns, they should understand
    the entries so as to plan more effectively for the coming years. The following
    points provide a brief explanation of some of the basics of filing a tax return
    :


    *   What is your filing status? If you are married and living together throughout
    the year, you should file your return jointly with your spouse, because generally
    you will be taxed more favorably. Alternatively, if you are a single parent with
    a dependent child or children, you should investigate filing your return by using
    the advantageous head-of-household status.

    *   Should you itemize or take advantage of the standard deduction? Given that
    the standard deduction for single or married-filing-jointly taxpayers has been
    effectively doubled under the 2017 TCJA, it is likely that many fewer individuals
    will elect to itemize. However, if you are a homeowner with a sizable mortgage,
    or make a great number of annual charitable contributions, it may be to your advantage
    to itemize deductions.

    *   Should your investment interest be taxable or tax-exempt? As discussed, the
    higher your marginal income-tax rate, the greater the advantage to you of investing
    in tax-exempt assets, such as municipal bonds or municipal bond funds.

    *   Do you have any self-employment income? If you do (to be reported on IRS Form
    1040, Schedule C), you may be entitled to a number of business deductions that
    you would not otherwise be able to claim.

    *   Do you have capital losses (losses from the sale of any investment or business
    property)? As a tax-planning technique, you should recognize capital losses in
    years when you have capital gains. These losses can offset capital gains and further
    offset ordinary income to the extent of $3,000 per year.

    *   Are you required to make required minimum distributions from your IRA this
    year? Just as with distributions from employer-sponsored retirement plans, you
    have to begin taking distributions from a traditional deductible IRA (not a Roth
    IRA) no later than April 1 of the year after you reach the age of 70 and 6 months.

    *   Can you contribute to and deduct contributions to your IRA this year? The
    answer is somewhat complicated and depends on your filing status, but if your
    income is low enough, you can both contribute to and deduct a specified amount
    annually from your IRA.

    *   Do you have unreimbursed employee expenses? The 2017 TCJA disallows a deduction
    for unreimbursed employee expenses. Thus, if your business expenses are not being
    reimbursed, you should ask your employer to establish a reimbursable, or accountable,
    plan.

    *   What is your taxable income? Depending on your filing status, this amount
    determines what marginal income-tax bracket you are in and your applicable marginal
    income-tax rate.

    *   Do you qualify for any additional tax credits this year? All allowable credits
    have qualifying conditions or limitations. However, if you qualify, a credit affords
    you a dollar-for-dollar tax reduction.

    *   Do you owe household employment taxes? Generally, you are responsible for
    paying Social Security and Medicare taxes if you employ a household domestic worker,
    such as a nanny. This is one of the most overlooked sections of income tax law
    and has resulted in the imposition of tax penalties for many salaried and self-employed
    workers.

    *   Did you pay tax or receive a tax refund? A goal of many taxpayers is to receive
    as big a refund as possible when they file their tax return, but think about it:
    if you receive a refund, you have just given the federal government an interest-free
    loan for the entirety of the previous tax year. Alternatively, you do not want
    to withhold so little tax that penalties are imposed for the previous year. Your
    goal should be a small tax payment with the filing of your individual income-tax
    return (for example, a payment of no more than $100).


    We now move on to the other major tax that can quickly reduce your accumulated
    wealth: the transfer tax imposed under federal tax law. The transfer tax, which
    includes estate and gift taxes, is most relevant in estate planning and will be
    referred to again in Chapter [19](#A314864_2_En_19_Chapter.html). Regardless,
    the next chapter provides important information with respect to the provisions
    and application of federal estate-tax and gift-tax law in planning for your financial
    future.'
  trans: '

    ## 节税型投资


    既然我们已经讨论了投资和所得税，就需要将两者结合起来。换句话说，对于特定类型的金融资产，哪种账户——是延税型还是应税型——配置效率最高？


    退休计划等延税型账户，允许纳税人在多年内积累资产而无需为收益缴税。因此，将那些所得税效率不高的投资放在退休计划中是合理的。此类投资的例子是零息债券，它每年会产生应税的“影子收入”，但不会向债券持有人分配任何对应的现金。其他您可能希望配置在退休计划中的类似所得税低效投资包括：单一公司投资级债券和债券共同基金，以及美国国债本息分离交易证券和通胀保护国债。相反，一种通常不应配置在延税型账户中的金融资产是市政债券或市政债券基金。市政债券的利息是免税的，因此如果您将其配置在延税型账户中，就等于在从退休计划中取出时，将其免税状态转变为应税状态。值得注意的是，近年来，市政债券产生的免税收益率——与应税公司债券相比——优势如此之大，以至于从经济角度考虑，修改这一策略是合理的。然而，作为所得税策略，通常您最好避免将市政债券和市政债券基金配置在延税型账户中。


    那么应税账户呢？一般而言，个股和股票共同基金属于这类账户，因为它们比债券和债券共同基金更具税收效率。指数基金或交易所交易基金也是应税账户的不错选择，因为它们是被动管理的，通常所得税效率较高。但是，对于股票和股票共同基金，有一种观点认为，鉴于它们的增长潜力以及在提取时所产生的总复利金额，它们也可能非常适合配置在延税型投资组合中。如果您有财务规划师或投资顾问，请让他们就此观点为您提供见解。


    ## 您能从自己的纳税申报表中学到什么


    尽管大多数纳税人不自己准备纳税申报表，但他们应该理解其中的条目，以便更有效地为未来几年做规划。以下几点简要说明了填写纳税申报表的一些基本要素：


    -   您的申报身份是什么？如果您已婚并在整个年度内共同生活，您应与配偶共同申报，因为通常这样纳税会更有利。或者，如果您是有一位或多位受抚养子女的单身父母，您应考虑使用更有利的户主身份进行申报。

    -   您是选择逐项扣除还是利用标准扣除？由于在 2017 年《减税与就业法案》下，单身或已婚联合申报纳税人的标准扣除额实际上已翻倍，因此选择逐项扣除的人可能会少得多。但是，如果您是拥有大额抵押贷款的房主，或者每年进行大量慈善捐款，那么逐项扣除可能对您更有利。

    -   您的投资利息应该是应税还是免税？如前所述，您的边际所得税率越高，投资于免税资产（如市政债券或市政债券基金）对您的优势就越大。

    -   您有自雇收入吗？如果有（需在 IRS 表格 1040 的附表 C 中报告），您可能有资格享受许多否则无法申报的商业扣除。

    -   您有资本损失（出售任何投资或商业财产的损失）吗？作为一项税务规划技巧，您应在有资本收益的年度确认资本损失。这些损失可以抵消资本收益，并进一步每年最多抵消`3,000
    美元`的普通收入。

    -   您今年是否必须从您的个人退休账户中提取最低分配额？与雇主资助的退休计划分配一样，您最迟必须在年满 70 岁零 6 个月后的次年 4 月 1 日开始从传统的可扣除
    IRA（而非罗斯 IRA）中提取分配。

    -   您今年能否向您的 IRA 缴款并扣除这些缴款？答案有些复杂，取决于您的申报身份，但如果您的收入足够低，您可以每年向 IRA 缴款并扣除指定金额。

    -   您有未报销的员工费用吗？2017 年《减税与就业法案》不允许扣除未报销的员工费用。因此，如果您的业务费用未得到报销，您应要求您的雇主建立可报销的或实报实销的计划。

    -   您的应税收入是多少？根据您的申报身份，这一数额决定了您所处的边际所得税等级以及适用的边际所得税税率。

    -   您今年有资格获得任何额外的税收抵免吗？所有允许的抵免都有资格条件或限制。但是，如果您符合条件，抵免将为您带来等额的税额减免。

    -   您欠家庭雇佣税吗？通常，如果您雇佣了家庭佣工（如保姆），您有责任支付社会保障税和医疗保险税。这是所得税法中最容易被忽视的部分之一，已导致许多工薪族和自雇人士被处以税务罚款。

    -   您是支付了税款还是收到了退税？许多纳税人的目标是在提交纳税申报表时获得尽可能多的退税，但请思考一下：如果您收到退税，您就等于在上一个纳税年度里给了联邦政府一笔无息贷款。另一方面，您也不希望预扣税款过少而导致对上一年的罚款。您的目标应该是提交个人纳税申报表时支付少量税款（例如，支付不超过`100
    美元`）。


    我们现在转向另一种能迅速减少您积累财富的主要税种：联邦税法规定的赠与及遗产转移税。转移税包括遗产税和赠与税，在遗产规划中最为相关，并将在第 19 章中再次提及。无论如何，下一章将提供关于联邦遗产税和赠与税法规定及其在规划您的财务未来中的应用的重要信息。

    '
- fmt: '# 13\. Transfer-Tax Planning and Management


    Once an individual has accumulated wealth, their motivations in the financial-planning
    process turn to not only how to protect or defend this wealth, but also how to
    distribute it. For this reason, this chapter explains gifts and the advantages
    of making gifts in transfer-tax planning and management. Many individuals think
    that transfer-tax (gift- and estate-tax) planning is relevant for only very high-net-worth
    taxpayers, but this is not true. For example, did you know that you can give away
    `$15,000` per year, regardless of the amount of your net worth, to donees without
    having to file a federal gift-tax return, `IRS Form 709`? Just as important, did
    you know that once you exceed this `$15,000` limit, you are generally required
    by law to file a federal gift-tax return? Yes, you will also have to include Christmas
    gifts on that tax return if you have given away the full `$15,000` limit earlier
    in the same year.


    This chapter also considers how to minimize your taxable estate at death. Although
    there has been a great deal of discussion in Congress about the repeal of the
    estate tax (sometimes referred to as the death tax), it is still with us—and likely
    will be in some form for years to come. We talk more about the distribution of
    wealth in Part 5 of this book, but the beauty of lifetime gifting is that it accomplishes
    two steps of the PADD process at once: the defense of your wealth against transfer
    taxes and the distribution of that wealth for the benefit of others (typically,
    your spouse and children).


    ## The Advantages of Lifetime Gifting


    You may have many reasons for making gifts. Among these may be personal reasons,
    such as assisting a family member or close friend in immediate financial need.
    You may also have tax reasons for gifting. Whereas lifetime gifting (other than
    to charity) does not generate an income-tax deduction, it does shift the income
    generated from the gifted property onto someone else. Numerous tax rules restrict
    the outright assignment of income to others, but if you gift them an income-producing
    asset, such as a stock, a bond, or real estate, the donee—and not you—will pay
    the future income tax on the gains that asset generates.


    Under the gift-tax rules, there are three ways to make gifts to others without
    worrying about paying a gift tax. The first has already been mentioned: as of
    2018, you can give up to `$15,000` per year to as many donees as you like. Technically,
    this `$15,000` allowance per donee is known as the gift-tax annual exclusion amount.
    For example, if you have ten children, you can give up to `$150,000` per year
    (`$15,000` times 10) without concerning yourself with reporting these gifts to
    the federal government. But be careful: some taxpayers, believe it or not, are
    so concerned about reducing their income- and estate-tax liability that they forget
    to ask a basic question before making a gift—can I afford to make this gift without
    sacrificing my own future financial security?


    The second method of making a lifetime gift is to transfer assets or property
    to your spouse or a qualified charity. Unlike gifts to others, you can make a
    gift of unlimited value to your spouse or a qualified charity. Particularly as
    the situation relates to estate-tax planning, it may be financially beneficial
    to make gifts to your spouse or a qualified charity, because the gifted property
    is now completely removed from your taxable estate at death. However, as you will
    see later in this chapter, if your spouse is the recipient of your gift, you may
    be causing a further estate-tax problem for them if they are already of high net
    worth in their own right (or expect to be shortly).


    The third method of prudent lifetime gifting is to pay the educational or medical
    expenses of a loved one. However, the payment of such gifts needs to be made directly
    to the educational institution or medical provider, not indirectly through the
    donee, who would then pay the institution or provider. If the donee is the intermediary,
    the `$15,000` or other indexed-for-annual-inflation limit applies, rather than
    the unlimited amount that is possible if the institution or provider is the payee.


    If you generally give more than `$15,000` annually to any donee, you are legally
    required to file a gift-tax return and apply the excess amount against an overall
    lifetime exemption limit of `$11.2` million (a `$10` million indexed amount) through
    the end of calendar year 2018. Making a gift that is larger than the annually
    permitted limit has two consequences:


    - You begin to use up your overall lifetime limit of `$11.2` million. Once you
    exceed `$11.2` million in lifetime taxable gifts, you pay federal gift tax out
    of pocket.

    - The gift-tax value of the gift you make (the property’s fair market value at
    the time you gift it) is included in the estate-tax computation as an adjusted
    taxable gift, meaning it adds to your potential taxable estate at death.


    For example, assume that you make a gift of appreciated stock to your adult son
    in 2018. The fair market value of this stock at the time you give it is `$100,000`.
    Thus, you have made a taxable gift of `$85,000` (`$100,000` less `$15,000`) for
    which you must file a federal gift-tax return. As a result, you now have only
    `$11,115,000` (`$11.2` million less `$85,000`) of your lifetime exemption limit
    left. This taxable gift of `$85,000` is also added to your taxable estate at your
    date of death. The good news, however, is that your gift is frozen in taxable
    value at that amount and cannot increase to a date-of-death fair market value
    (because you don’t own the stock anymore)! In other words, you have removed any
    future appreciation of the gifted property from your taxable estate. In this example,
    let’s say the `$100,000` in stock that you gave your son appreciates to `$600,000`
    at your death 20 years later. The appreciation amount of `$500,000` (`$600,000`
    less `$100,000`) is now forever removed from possible future transfer taxation
    in your estate.


    You should note that the 2017 TCJA doubled the lifetime gift exemption limit from
    an indexed amount of `$5.6` million to `$11.2` million, effective for the year
    2018. The overwhelming majority of individuals likely will never have to pay federal
    gift tax. However, the fact remains that high-net-worth individuals, particularly
    small business owners, are most likely to make gifts to family members; indeed,
    this group of individuals is the intended Congressional target of the gift (and
    estate) tax initially!


    Let’s go back to taking maximum advantage of the `$15,000` annual gift-tax exclusion.
    In the example given previously, wherein each of ten children is the donee of
    `$15,000`, the person who gave the gift immediately removed `$150,000` from their
    taxable estate and did not have to file a gift-tax return or worry about reducing
    their overall `$11.2` million exemption limit in 2018. This strategy is known
    in estate planning as a systematic annual gifting program and takes advantage
    of as many gift-tax annual exclusion amounts as possible, to as many donees as
    possible, to reduce the donor’s taxable estate. Therefore, as a transfer-tax planning
    technique, you should look first into adopting a systematic gifting program by
    making as many annual exclusion gifts as you can afford at the beginning of each
    calendar year.'
