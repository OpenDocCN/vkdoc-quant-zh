    ### 政府债券


    美国国库票据和债券是联邦政府的债务凭证，其主要区别在于到期期限。国库票据是一种中期债务证券，发行期限为两年、三年、五年、七年或十年。最低面额为 1000 美元，但票据最高可发行至
    100 万美元。而国库债券则是一种长期债务证券，固定到期期限超过十年。财政部于 2001 年 10 月停止发行长期债券（30 年期），但自 2006 年 2
    月起，为筹集资金以应对不断扩大的联邦赤字，重新开始拍卖此类债券。美国国库票据和债券的利息每半年向持有者支付一次，并且免征州税和地方税。与美国国库券一样，如果美国政府发行票据或债券，您无需担心违约风险。


    其他几种形式的美国国债也受到保守型投资者的青睐，但我们在此仅讨论两种。第一种是零息债券的一种形式，称为**国债本息分离交易证券**（STRIPS）。零息债券是指每半年的利息息票未被附上，而是被省略或“剥离”的债券。此类债券仍然支付利息，但利息作为债券本金的一部分累积，仅在到期日支付。作为潜在投资者，您有义务为应计利息缴纳联邦税，但您无法从债券中获得任何现金来支付这些税款。那么，国债
    STRIPS（或任何其他形式的零息债券，因为公司也可以发行）最适合放置在何处？有两个地方，出于两个目的：


    -   如果是应税 STRIPS，请将债券置于递延纳税账户中，例如退休计划。

    -   如果是免税 STRIPS，可将该债券作为 19 岁以下子女大学教育储蓄计划的一部分。


    在这两种情况下，您都能绝对确定 STRIPS 何时到期，这是任何零息债券的主要吸引力。此外，您还能确切知道到期时本金和应计利息的总金额。因此，您可以将债券的到期日与您需要资金来实现财务目标的时间相匹配。这就是任何零息债券的美妙之处，尤其是国债
    STRIPS，因为作为美国政府的债务，它也没有违约风险。


    第二种——也是日益流行的一种——美国国债形式（实际上是一系列证券）是**通胀保值国债**（TIPS）。TIPS 于 1997 年首次发行，现在每年由财政部拍卖四次。它们以
    5 年、10 年和 30 年期出售，最低面额为 1000 美元。顾名思义，它们旨在提供抵御通货膨胀影响的保护。本金每半年根据过去六个月的消费者价格指数（CPI）衡量的通胀率进行调整，但利率保持不变。到期时，您将获得证券经通胀调整后的本金价值或发行时面值中的较大者。


    简而言之，如果您投资于 TIPS，您每年需要为利息支付以及证券面值在通胀调整后的增值部分缴纳税款。但是，在证券被出售或到期之前（更可能是后者，因为您应将 TIPS
    视为长期投资），您不会收到通胀调整后的本金。为避免这种投资工具潜在的负面税务影响，最好将 TIPS 持有在递延纳税账户中，例如退休计划或罗斯个人退休账户。


    ### 市政债券


    州和地方政府通常发行债券来为长期项目融资，例如道路改善或其他基础设施需求。此类债券有两种类型：一般责任债券和收益债券，尽管第三种混合型债券——私人用途债券——正越来越多地被用于为足球场等项目融资。一般责任债券和收益债券由公共市政当局发行，而私人用途债券则可能与私人开发商或体育推广商共同发行。此外，一般责任债券由市政当局的征税权作为担保，因此比收益债券更安全，后者必须依赖特定项目的收入来支付债券持有人。由于其相对安全性，一般责任债券的利率低于收益债券。


    从历史上看，市政债券对高收入纳税人最具吸引力，因为其每半年的利息支付通常免征联邦所得税，并且在某些情况下也可能免征州税和地方税。如果您知道自己的边际所得税等级和市政债券的票面利率或名义收益率，您可以轻松计算出市政债券的税后回报。计算出税后回报后，您应将该回报与您在应税债务（例如公司债券）上获得的回报进行比较，以确定哪个投资回报更高。


    例如，假设您正决定是购买一种收益率为 5%的免税市政债券（仅免联邦所得税），还是购买一种收益率为 7%的公司债券。同时假设您目前按最高联邦边际所得税率 37%纳税。要计算您的市政债券税后回报，请使用以下公式：


    ```

    税收等价收益率 = 免税收益率 / (1 - 边际税率)

    ```


    在此例中，您的市政债券税收等价收益率为 7.93%：0.05 除以(1 – 0.37)。相比之下，公司债券收益率为 7%，因此您很可能应该投资于市政债券。这也意味着，在公司债券的到期收益率超过
    7.93%之前，您可能不应购买它。


    您也可以投资于市政债券或免税共同基金，通常是作为货币市场共同基金的一部分。但是，如果您这样做，您将失去对债券出售时确认资本利得时间的控制。这是通过债券共同基金投资债券的一个明显劣势。

