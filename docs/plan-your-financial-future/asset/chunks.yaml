- fmt: '# Dependent Care Assistance


    Your employer can provide you with a substantial amount of dependent care assistance
    as a nontaxable fringe benefit. Currently, you can take advantage of up to `$5,000`
    per year of such benefits per family (or the total amount of the lower-paid spouse’s
    salary, if less than `$5,000`) without having to include this assistance in your
    taxable income. If your employer does not provide you with dependent care assistance,
    you may alternatively wish to reduce your salary and contribute `$5,000` to an
    `FSA` on your own behalf. Two primary reasons for doing so are as follows:


    - You can pay dependent care costs, such as full-time child care, after-school
    day care, or the cost of a nanny, out of this account and receive reimbursement
    on a tax-free basis.

    - You never pay any income or Social Security tax on the amount you contribute
    to the account; as such, you are contributing to the account from your paycheck
    on a pretax basis.


    You also need to be aware of two related income-tax consequences as you consider
    whether to fund an `FSA` in order to pay for child care expenses:


    - You may not claim the child and dependent care tax credit for any child-care
    cost that is reimbursed out of the account (in other words, it is an either/or
    proposition).

    - You lose any amount contributed to the account that is not spent on employment-related
    child-care costs during the year. Unlike an `HSA`, which you can use as a savings
    vehicle for the next and subsequent years, an `FSA` is contributed to on a use-it-or-lose-it
    basis.


    As a general rule, the higher your taxable income, the more advantageous it is
    for you to use the `FSA` salary reduction in the payment of child-care expenses.
    Conversely, the lower your taxable income, the less advantageous the salary reduction
    and the more valuable is the child and dependent care tax credit.


    Do not overlook the possibility of dependent care assistance for more than your
    young child or children. Under current law, the tax exclusion is available not
    only for expenses incurred on behalf of a dependent child under the age of 13,
    but also for any individual who is physically or mentally incapable of caring
    for themselves and who resides with the taxpayer in their principal place of residence
    for more than six months out of the year. Therefore, the `$5,000` exclusion from
    income is also potentially available to help pay for dependent elderly parents
    or a dependent spouse for whom you are the primary caregiver.


    # Employer Educational Assistance


    Some employers, particularly those who need highly skilled employees, offer educational
    assistance benefits to their workers. In most instances, under employer rules
    to achieve reimbursement, employers offer payment assistance only for educational
    expenses that are job-related. However, under current tax law, an exclusion from
    employee income of up to `$5,250` per year for educational assistance is permanently
    allowed, even for non-job-related educational courses. Further, the exclusion
    is not limited to continuing education programs; the employer payment may be in
    reimbursement for either undergraduate or graduate degree courses. As a result,
    you may be able to obtain and be reimbursed for that doctoral degree in underwater
    basket-weaving you have always wanted.


    Previous to 2018, a second related educational benefit in tax law was available
    without getting your employer involved. This was an itemized tax deduction (subject
    to a 2 percent of `AGI` “floor”) for unreimbursed educational expenses that you
    pursue in advancement of your career. Unlike the exclusion provision, this education
    deduction must have been related to your career. For example, if you are an accountant,
    pursuing a master’s degree in accounting qualifies as job-related education. The
    major issue here for many young fast-track employees is whether educational costs
    expended for a master’s degree in business administration qualify for the tax
    break. Generally, the answer is yes; however, if your current job is significantly
    unrelated to traditional business activities (say, you are a professional musician),
    you may find it difficult to make a strong argument that the deduction should
    be permitted. The itemized deduction for education is scheduled to come back into
    the law after the year 2025 with the “sunset” of the 2017 `TCJA`.


    # Saving for Retirement Through Employer-Sponsored Plans


    In recent years, employer-provided plans designed to provide for retirement have
    undergone major changes. Historically, employers promised their employees a pension
    at a certain age (usually 65) as long as the employee completed a specified number
    of years of service. As such, the employer assumed the risk of investment performance
    on the retirement monies that were set aside, with the intention of making good
    on its pension promise.


    Beginning in the 1990s, the methodology of providing for an employee’s retirement
    began to change from a guaranteed employer-provided pension to one in which employees
    were made responsible for their own financial future. In other words, defined
    contribution retirement plans —in which the amount of retirement benefit is not
    guaranteed but rather depends on the employee’s own investment expertise to accumulate
    the needed savings—became predominant. According to Boston College’s Center for
    Retirement Research, among workers with retirement plans, 83 percent had traditional
    employer-provided pensions in 1980. It is estimated that, in 2017, only 11 percent
    of private sector workers participated in a pension plan. This percentage, however,
    is much greater (approximately 84 percent) among public sector workers, such as
    police and fire department employees. Nevertheless, a major problem occurred in
    the shift away from pensions and toward defined-contribution plans: most employees
    did not possess the investment expertise to optimally plan for their own retirement.
    This is still the case today. Recent legislation has been passed to make it easier
    for employers to assist employees with their retirement investment decisions,
    but employees generally are not yet well-educated enough to take on the responsibility
    of making retirement plan investment choices. Hopefully, after finishing this
    book, you will feel more comfortable about making such choices. If not, I strongly
    urge you to seek the assistance of a Certified Financial Planner or other retirement
    planning professional.'
