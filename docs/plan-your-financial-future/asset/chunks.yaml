    January 2018, when its share price was $20\. You purchased a total of 250 shares
    ($5,000 divided by $20). Now, instead, assume that you made five separate purchases
    of ABC mutual fund during 2018 using this same $5,000, but you did so in $1,000
    increments, when the price of the fund fluctuated as follows:


    | Month | Share Price | # of Shares Purchased |

    | --- | --- | --- |

    | March 2018 | $22.00 | 45.45 |

    | May 2018 | $19.50 | 51.28 |

    | July 2018 | $18.00 | 55.55 |

    | September 2018 | $17.50 | 57.14 |

    | December 2018 | $20.25 | 49.38 |

    |   |   | Total: 258.80 |


    Further assume that you plan to sell all the separately purchased ABC shares in
    January 2020, when ABC’s per share price is estimated to be $24\. Your total sale
    price will be $6,211.20 ($24 times 258.80 shares), and you will have recognized
    a gain of $1,211.20 ($6,211.20 less $5,000). What if you had sold your original
    January 2018 shares? Your gain would have been only $1,000 ($6,000 less $5,000).
    Using dollar-cost averaging, you increased your annual compounded rate of return
    by almost 2 percent (from 9.54 percent to 11.46 percent).


    As the previous example illustrates, dollar-cost averaging works best when markets
    are declining or fluctuating. It does not work well when the market is steadily
    increasing; in that event, you are better off buying as many shares as possible,
    as soon as possible, when the price per share is lower. If an experienced investor
    learns one lesson throughout their years of investing, it is that markets rarely
    go straight up or straight down. Rather, fluctuation in share values is the rule
    and not the exception. Therefore, dollar-cost averaging should be a valuable wealth-building
    strategy for you, as it has been for millions of other investors.


    A variation of the dollar-cost averaging technique is share averaging. When an
    investor dollar-cost averages , the number of dollars spent on stock or mutual
    fund purchases at regular intervals is held constant, but the number of shares
    purchased with these dollars varies. Conversely, when an investor share averages,
    the number of shares purchased remains constant, but the number of dollars spent
    to make those purchases varies. With share averaging, the investor purchases a
    fixed number of shares, regardless of how low the price falls. Thus, they do not
    obtain the reduction in the average cost of the shares to the same extent as is
    possible with dollar-cost averaging. This is why, as a wealth-building technique,
    more investors implement dollar-cost averaging than share averaging .


    ### Averaging Down


    As you can see from our example involving dollar-cost averaging, an investor can
    leverage their gain by buying more shares when the price of a certain asset declines
    (as long as the price eventually goes back up before the investor sells). Is there
    a strategy that results in buying additional shares only when the price goes down?
    Yes. It is referred to as averaging down. In our example, you would have bought
    ABC shares only in May 2018, July 2018, and September 2018, when the share price
    fell below the original $20 purchase price, and not in March 2018 and December
    2018, when the price was more than $20.


    Is pursuing this strategy a good idea? The answer depends on whether you are more
    interested in purchasing the stock or the company issuing the stock. If you are
    interested only in the stock, averaging down may not be a good strategy, because
    (as with dollar-cost averaging) the ability to make a profit ultimately depends
    on the share price increasing. If the share price does not increase, you will
    have purchased more shares of a stock that you likely should have considered selling
    in the first place. In other words, you will now have more shares of a losing
    stock. Alternatively, if you are purchasing the company issuing the stock, presumably
    you have researched the prospects of that company and the industry in which it
    does business. Accordingly, you should have greater confidence in the possibility
    for an increase in the price of that company’s stock, as well as reasonable assurance
    that a decline in price is only temporary. Therefore, if you are using the strategy
    in this manner, averaging down may make more sense as a long-term investment technique.


    In any event, proceed carefully! Unless you are an experienced investor, averaging
    down is an investment strategy you should not try without the help of a professional.


    ### Dividend Reinvestment Programs


    Unlike averaging down, which is for only experienced investors, stocks that offer
    a dividend reinvestment program (DRIP) should be considered by any investor. With
    a DRIP, dividends declared are automatically reinvested in the stock, adding to
    the investor’s overall ownership share. If you want to build an ownership percentage
    in a company, this is the way to do it!


    DRIPs offer other advantages. If the dividends are reinvested automatically—instead
    of paid directly to the shareholder—the investor purchases the additional shares
    of company stock without having to incur a broker’s commission. Also, because
    the company tracks your purchases and keeps records of the purchase price, it
    can easily provide you with cost basis information in the event that you want
    to sell.


    Many mutual funds have similar programs. If you are working with an investment
    advisor or financial planner who has positioned your holdings in some form of
    advisory account, ask them whether you can opt to reinvest any capital gain or
    dividend distributions (or both) into the purchase of additional shares of the
    fund. If this option is available, consider taking advantage of a DRIP as an easy
    way to save and build wealth .'
  trans: '

    ### 平均成本法与股票平均法


    `美元成本平均法`有时会被委婉地称为“穷人的储蓄方法”。采用`美元成本平均法`的投资者会定期（通常以等额方式）买入一只共同基金的额外股份，无论市场状况如何。这通常是通过股票发行方或共同基金公司提供的自动扣款计划来实现的。当你从薪水中扣除款项以缴纳`401(k)`计划供款时，你实际上就是在执行一项`美元成本平均法`策略。


    `美元成本平均法`的实际结果是，在很长一段时间内逐步增加你持有的共同基金份额。如果基金的当前价格低于其之前的价格，你就成功购入了更多投资份额。由于在基金价格下跌时买入了更多份额，这会产生降低每股平均成本的效果。随后，如果基金价格上涨，你就能在低价购买的份额上赚取更多利润，从而提高你的整体百分比收益率。


    例如，假设你在 2018 年 1 月以每股 20 美元的价格购买了 5000 美元的`ABC`共同基金。你总共购买了 250 股（5000 美元除以 20
    美元）。现在，反过来假设你在 2018 年期间用同样的 5000 美元分五次购买了`ABC`共同基金，但每次购买 1000 美元，且基金价格波动如下：


    | 月份 | 股价 | 购买股数 |

    | --- | --- | --- |

    | 2018 年 3 月 | $22.00 | 45.45 |

    | 2018 年 5 月 | $19.50 | 51.28 |

    | 2018 年 7 月 | $18.00 | 55.55 |

    | 2018 年 9 月 | $17.50 | 57.14 |

    | 2018 年 12 月 | $20.25 | 49.38 |

    | | | 总计：258.80 |


    再假设你计划在 2020 年 1 月卖出所有分批购买的`ABC`股票，此时`ABC`的每股预估价格为 24 美元。你的总售价将为 6,211.20 美元（24
    美元乘以 258.80 股），你将获得 1,211.20 美元的收益（6,211.20 美元减去 5,000 美元）。如果你卖出的是最初 2018 年 1
    月购买的股票呢？你的收益将只有 1,000 美元（6,000 美元减去 5,000 美元）。通过使用`美元成本平均法`，你将年化复合收益率提高了近 2%（从
    9.54%提高到 11.46%）。


    如前例所示，`美元成本平均法`在市场下跌或波动时效果最佳。当市场持续上涨时，该策略效果不佳；在这种情况下，趁每股价格较低时尽可能快地买入尽可能多的股票对你更有利。如果一位经验丰富的投资者在其多年的投资生涯中学到了什么，那就是市场很少会直线上升或直线下降。相反，股价波动是常态而非例外。因此，`美元成本平均法`应该是一项有价值的财富积累策略，正如它对数百万其他投资者一样。


    `美元成本平均法`的一种变体是`股票平均法`。当投资者采用`美元成本平均法`时，定期用于购买股票或共同基金的美元金额保持不变，但用这些美元购买到的股票数量会变化。相反，当投资者采用`股票平均法`时，购买的股票数量保持不变，但用于购买这些股票所花费的美元金额会变化。采用`股票平均法`时，无论价格跌到多低，投资者都会购买固定数量的股票。因此，他们无法像采用`美元成本平均法`那样，在同等程度上降低股票的平均成本。这就是为什么作为一种财富积累技术，更多投资者采用`美元成本平均法`而非`股票平均法`。


    ### 向下摊平法


    从我们关于`美元成本平均法`的例子中可以看到，当某项资产价格下跌时（只要价格在投资者卖出前最终回升），投资者可以通过买入更多份额来放大收益。有没有一种策略只在价格下跌时买入更多份额呢？有。这被称为`向下摊平法`。在我们的例子中，你只会在
    2018 年 5 月、2018 年 7 月和 2018 年 9 月购买`ABC`股票，因为当时股价跌破了 20 美元的原始买入价，而不会在 2018 年 3
    月和 2018 年 12 月股价高于 20 美元时购买。


    追求这一策略是个好主意吗？答案取决于你更感兴趣的是购买股票本身，还是这家发行股票的公司。如果你只对股票感兴趣，`向下摊平法`可能不是一个好策略，因为（与`美元成本平均法`一样）获利能力最终取决于股价上涨。如果股价不涨，你将持有更多你一开始或许就应该考虑卖出的股票。换句话说，你现在会持有一只亏损股票的更多份额。相反，如果你是在买入这家发行股票的公司，那么想必你已经研究过该公司的前景及其所处行业。因此，你应该对公司股价上涨的可能性有更大信心，并合理地确信价格下跌只是暂时的。因此，如果你以这种方式使用该策略，`向下摊平法`作为一项长期投资技术可能更有意义。


    无论如何，谨慎行事！除非你是一位经验丰富的投资者，否则在没有专业人士帮助的情况下，你不应尝试`向下摊平法`这一投资策略。


    ### 股息再投资计划


    与仅适合经验丰富的投资者的`向下摊平法`不同，任何投资者都应考虑提供`股息再投资计划`的股票。通过`股息再投资计划`，宣布的股息会自动再投资于该股票，增加投资者的总持股比例。如果你想建立在一家公司中的持股比例，这就是实现这一目标的方法！


    `股息再投资计划`还有其他优势。如果股息自动再投资（而非直接支付给股东），投资者购买额外的公司股票就无需支付经纪人佣金。此外，由于公司会追踪你的购买记录并保留购买价格记录，如果你想要卖出，它可以轻松为你提供成本基础信息。


    许多共同基金也有类似计划。如果你正在与一位投资顾问或理财规划师合作，且你的持仓以某种形式托管在咨询账户中，请询问他们你是否可以选择将任何资本收益或股息分配（或两者）再投资于购买该基金的额外份额。如果该选项可用，请考虑利用`股息再投资计划`作为一种便捷的储蓄和财富积累方式。

