- fmt: '### N


    **net unrealized appreciation (NUA)**：一种有利的所得税优惠，适用于合格退休计划中雇主股票的分配。具体来说，从缴款日到分配日期间雇主股票的增值部分在出售之前无需缴税。出售时，仅按优惠的长期资本利得税率征税。


    **nondiscrimination tests**：退休法中的一项通用测试，要求税收合格计划不得偏向于特定的高薪雇员。某些类型的税收合格计划（如传统`401(k)`计划）还必须满足特殊的非歧视测试，才能保持其企业所得税目的上的“合格”状态。


    ### O


    **ordinary income**：所得税规划中使用的术语，用于区分工资薪金所得与资产出售所得（即资本利得或损失）的税收处理。目前，工资薪金（普通收入）的最高边际税率为37%，但历史上曾高达90%。


    **overfund**：遗产规划中的通用术语，指不当使用了转移税中的婚姻扣除。例如，如果第二任去世配偶的遗产被过度注资，意味着第一任去世配偶转移了过多财产给他们。这样，夫妻双方无法作为一个整体进行有效的遗产税规划。


    ### P


    **passive portfolio management**：一种投资组合管理理论，旨在复制整体市场表现（或特定市场指数，如标准普尔500股票指数），且涉及底层投资组合中极少资产交易。与**主动型投资组合管理**（有时称为选股）相对。


    **Patient Protection and Affordable Care Act of 2010**：俗称**奥巴马医改**，由美国总统巴拉克·奥巴马于2010年3月23日签署成为法律。该法旨在为超过3200万未投保或投保不足的美国人提供保险。该法改革了`Medicare`、`Medicaid`及其他政府计划；改革了保险市场；并建立了新的州级交易所。为资助医疗费用，该法对保险公司、雇主和个人征收不同水平的税收。它还实施了一项个人强制令，要求所有个人从2014年起必须拥有健康保险，否则将面临罚款。


    **payable-on-death (POD) form**：用于银行支票和储蓄账户的一种表格，指定账户所有者在去世后，个人名义账户的款项应支付给谁。该表格在遗产规划中的主要优势在于，允许转移的资金自动转给指定受益人，无需经过遗嘱认证程序。


    **personal automobile policy (PAP)**：保险公司签发的最常见的汽车保险单形式，基于**保险服务局 (ISO)** 的表格。它包含责任险、人身伤害险、财产损失险、医疗支付险和碰撞险等部分。


    **pooled income fund (PIF)**：通常由公共慈善机构（如公立或私立大学、非营利医院）创建和维护的信托。用于遗产规划，既可为捐赠者提供终身慈善所得税扣除，又可在捐赠者去世后使该公共慈善机构受益。


    **portfolio diversification**：一种基本的投资技术，用于降低资本市场投资相关的风险。该技术的特点是购买资产类别内部和跨资产类别的证券，例如股票和债券，或股票和债券共同基金。


    **pour-over will**：与可撤销生前信托结合使用的遗嘱，用于将委托人生前未以信托名义持有的任何资产，或委托人在首次信托重命名后获得的任何资产，分配（即“注入”）给该信托。


    **price-to-earnings (P/E) ratio**：用于估算股票合理价值的倍数，即用该倍数乘以预期每股收益。有时也称为**盈利乘数**。


    ### Q


    **qualified charity**：符合所得税目的的慈善机构，意味着它满足特定要求，允许捐赠者向该慈善机构捐款后享受所得税扣除。该慈善机构可以是公共的，也可以是私人的。


    **qualified educational institution**：联邦税法中广泛使用的术语，涉及允许纳税人享受特定扣除和抵免。该术语也用于美国教育部管理的学生财政援助项目。它几乎适用于所有经过认证的公立、非营利和营利性高等院校，特别是根据后来重新授权的《1965年高等教育法》第四章规定有资格发放财政援助的机构。


    **qualified personal residence trust (QPRT)**：一种不可撤销信托，通过该信托，委托人将其个人住宅（或度假屋）的所有权转让给他人，但保留在特定期限内居住该住宅的权利。期满后，该住宅的所有权转移给信托受益人。


    ### R


    **rabbi trust**：为持有用于资助递延补偿计划的财产而设立的信托，其中预留的资金在雇主破产时需用于偿付雇主的债权人。因此，该信托为代表受益人/公司高管的预留资金实现了所得税递延。


    **real estate investment trust (REIT)**：一种持有房地产投资组合的投资工具（通常以公开交易信托的形式存在）。


    **recognized**：会计师常用的所得税术语，用于描述因经济事件（如资产出售）而产生的应税收入。


    **refundable**：通常用于描述一种税收抵免，即纳税人即使很少或没有缴纳应税收入的税款，也能从税务机关获得“退款”。与**不可退还的抵免**相对，后者是指利用该抵免的纳税人不会收到任何付款。


    **revocable living trust (RLT)**：一种重要的遗产规划技术，允许委托人避免去世时的遗嘱认证程序，但仍能控制并享受其生前财产的利益。与**不可撤销信托**相对，后者可能实现转移税节省，但会导致委托人在其有生之年失去对其财产的控制。


    **Roth 401(k)**：一种相对较新的雇主赞助退休计划，是系列所谓**指定罗斯账户**的一部分，兼具`401(k)`缴款和罗斯账户在分配时的优势。罗斯缴款在缴纳时计入参与者的总收入，但在分配时通常不计入参与者的总收入。


    **Roth IRA**：一种个人退休账户，允许在指定限额内，以税后或不可扣除的基础上进行缴款。在满足特定要求的前提下，从`Roth IRA`中提取的资金是免税的。`Roth
    IRA`是为帮助退休储蓄而提供的第二种个人储蓄计划，另一种是传统的可抵扣`IRA`。


    **Rule of 72**：一个简单的规则，用于估算一笔给定本金或存款价值翻倍所需的时间，方法是用投资回报率除72。例如，如果投资者实现8%的税前年复利回报率，则该笔资金大约需要9年时间价值翻倍（72除以8等于9）。'
  raw: '## N


    net unrealized appreciation (NUA) : A r favorable income-tax advantage given to
    the distribution of employer shares in a qualified retirement plan. Specifically,
    tax is not imposed on the appreciation of employer shares from the date of contribution
    to the date of distribution until the date of sale of those shares. Then, upon
    that sale, tax is imposed only at favorable long-term capital gains rates.


    nondiscrimination tests : In retirement law, a general test that a tax-qualified
    plan cannot discriminate in favor a separately defined highly compensated employee
    . There are also special nondiscrimination tests that certain types of tax-qualified
    plans, such as a traditional 401(k) plan, must satisfy to remain “qualified” for
    business income-tax purposes.


    ## O


    ordinary income : A term used in income-tax planning to distinguish the taxation
    of salary and wages from that of the sale of assets (or capital gains or losses).
    Currently, the highest marginal tax rate on salary and wages (ordinary income)
    is 37 percent, but historically it has been as high as 90 percent.


    overfund : A generic term used in the context of estate planning to indicate that
    improper use of the transfer-tax marital deduction has occurred. For example,
    if the second deceased spouse’s estate is overfunded, it means too much property
    has been transferred to them from the first deceased spouse’s estate. As such,
    the couple cannot engage in efficient estate-tax planning as a unit.


    ## P


    passive portfolio management : A theory of portfolio management that attempts
    to replicate overall market performance (or a specified market index, such as
    the Standard & Poor’s 500 index of stocks) and involves little trading of assets
    in the underlying portfolio. Contrasted to active portfolio management , sometimes
    known as stock picking .


    Patient Protection and Affordable Care Act of 2010 : Otherwise colloquially known
    as Obamacare , an act signed into law by US President Barack Obama on March 23,
    2010\. The law is designed to provide coverage to over 32 million uninsured or
    underinsured Americans. The law reforms Medicare, Medicaid, and other government
    programs; reforms insurance markets; and establishes new state-based exchanges.
    To finance the cost of health care, the law imposes varying levels of taxes on
    insurers, employers, and individuals. It also implements an individual mandate
    that all individuals must have health insurance beginning in 2014 or incur a penalty
    tax.


    payable-on-death (POD) form : A form used with bank checking and savings accounts
    that specifies who is to receive the individually titled account at the death
    of the owner. The form’s primary advantage in estate planning is that it permits
    the transferred monies to pass automatically to the named beneficiary without
    the necessity of the probate process.


    personal automobile policy (PAP) : The most common form of automobile policy issued
    by insurance companies, as based on Insurance Services Offices (ISO) forms . It
    includes parts such as liability, bodily injury, property damages, medical payments,
    and collision.


    pooled income fund (PIF) : A trust generally created and maintained by a public
    charity, such as a public or private university or not-for-profit hospital. Used
    in estate planning both to provide a lifetime charitable income-tax deduction
    and to benefit the public charity at the donor’s death.


    portfolio diversification : A fundamental investment technique used to reduce
    the risk associated with capital market investing. This technique is characterized
    by the purchase of securities both within and across asset classes, such as stocks
    and bonds or stock and bond mutual funds.


    pour-over will : A will used in conjunction with a revocable living trust that
    distributes, or “pours over,” to the trust any assets that have not been titled
    in the name of the trust during the grantor’s lifetime or any assets that the
    grantor may have acquired after the trust retitling first occurred.


    price-to-earnings (P/E) ratio : The number by which the expected earnings per
    share on a stock investment is multiplied to estimate the stock’s proper value.
    Also sometimes referred to as the earnings multiplier .


    ## Q


    qualified charity : A charity that is qualified for income-tax purposes, meaning
    it has met certain requirements that allow contributors to take advantage of an
    income-tax deduction after a contribution is made to the charity. The charity
    can be either public or private.


    qualified educational institution : A ubiquitous term used throughout federal
    tax law with respect to allowance of certain taxpayer deductions and credits.
    This term is also used in student financial aid programs administered by the US
    Department of Education. It applies to virtually all accredited public, nonprofit,
    and proprietary post-secondary institutions and, specifically, institutions eligible
    to disburse financial aid under Title IV of the Higher Education Act of 1965,
    as subsequently reauthorized.


    qualified personal residence trust (QPRT) : An irrevocable trust whereby the grantor
    of the trust transfers ownership of their personal residence (or vacation home)
    to another but retains the right to occupy the residence for a period of years,
    at which time title to the residence passes to the beneficiaries of the trust.


    ## R


    rabbi trust : A trust established to hold property used for financing a deferred-compensation
    plan, in which the funds set aside are subject to the employer’s creditors in
    the event of employer bankruptcy. As a result, the trust achieves an income-tax
    deferral of funds set aside on behalf of the beneficiary/corporate executive.


    real estate investment trust (REIT) : An investment (usually in the form of a
    publicly traded trust) that holds portfolios of real estate investments.


    recognized : An income tax term often used by accountants to describe taxable
    income resulting from an economic event (such as the sale of an asset).


    refundable : Typically used to describe a type of tax credit whereby the taxpayer
    will receive a “refund” from the taxing authorities, even though that taxpayer
    has paid little, if any, taxes on taxable income. Contrasted to a nonrefundable
    credit, whereby no payment is received by the taxpayer taking advantage of the
    credit.


    revocable living trust (RLT) : An important estate-planning technique that permits
    the grantor to avoid the probate process at death but still control and enjoy
    the benefits from their lifetime property. Contrasted with an irrevocable trust,
    which may achieve transfer-tax savings but cause the grantor to lose control of
    their property during their lifetime.


    Roth 401(k) : A relatively recent type of employer-sponsored retirement plan,
    part of a series of so-called designated Roth accounts , that features the combined
    advantages of 401(k) contributions and Roth accounts at the time of distribution.
    The Roth contributions are included in the participant’s gross income when they
    are made but generally are not included in the participant’s gross income when
    they are distributed.


    Roth IRA : A type of individual retirement account (IRA) under which contributions
    may be made up to a specified limit on an after-tax or nondeductible basis. Withdrawals
    from Roth IRAs are tax free, presuming certain requirements are satisfied. A Roth
    IRA is the second form of personal savings plan available to help fund retirement,
    with the other being a traditional deductible IRA.


    Rule of 72 : A simple rule that may be used to estimate how long it will take
    for a given sum or deposit of money to double in value by dividing the rate of
    return into the numerator of 72. For example, if an investor achieves a before-tax
    rate of return of 8 percent compounded annually, it will take approximately nine
    years for the given sum of money to double in value (72 divided by 8 = 9).'
