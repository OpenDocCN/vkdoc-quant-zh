  trans: "\n# 长期护理保险在保护财富中的重要性\n\n长期护理的需求对不同的人可能意味着不同的事情，但通常它源于任何需要疗养院护理或持续医疗监护的慢性或失能状况。长期护理保险的保单条款不仅涵盖疗养院内的护理，也包括在家中的护理。在家中接受护理的费用，是您可能考虑为自己或父母购买长期护理保险的首要原因。\n\
    \n无论您或您年迈的父母住在哪里，长期护理的费用都很昂贵，而大多数人都无法长期承担这笔开销。例如，2018 年美国疗养院单人间的平均费用约为每年 96,000\
    \ 美元——根据护理级别和疗养院所在地的不同，费用可能还会更高。幸运的是，在疗养院的平均居住时间不到三年（确切地说是 2.7 年），但这只是平均值。您或您的父母在疗养院的居住时间可能远超三年，有时甚至长达\
    \ 15 到 20 年。在决定长期护理保单中购买的福利期时长时，您应牢记这一数据。一般来说，福利期越长，长期护理保险的保费就越高。\n\n自 1996 年《健康保险便携性和责任法案》（`HIPAA`）立法通过以来，大多数长期护理保单都被作为合格保单发行。虽然合格长期护理保单的主要优势在于其附带的所得税优惠，但另一个真正的优势在于它必须保证可续保。这意味着只要您持续支付保费，您就有权继续持有该保单。因此，如果您的健康状况恶化，保险公司不能取消保单，也不能提高保费，除非它对保单覆盖的同一风险类别中的所有被保险人都这样做。此外，长期护理保单也可能以不可撤销方式发行，这意味着其保费水平在您一生中必须是固定的、有保证的。然而，鉴于提供长期护理的成本迅速增加，目前没有一家保险公司正在承保保费不可增加的保单。事实上，近年来，一些大型保险公司，如大都会人寿，已完全停止承保长期护理保险！\n\
    \n如果长期护理保单符合税收优惠条件，投保人支付的保费可作为分项医疗费用进行扣除，但扣除额有上限，该上限取决于保单持有人的年龄。此外，从合格保单中获得的福利金无需缴纳所得税，且无上限。如果雇主为其员工支付长期护理保险费用（团体长期护理保单），则保费对雇主而言可税前扣除，且不被视为员工的应税收入。\n\
    \n**注意**\n\n还存在一种不符合税收优惠条件的长期护理保单，它不提供任何税收优惠。然而，不符合税收优惠条件的计划仅要求“医疗必要性”作为符合条件的受益条件，而符合税收优惠条件的计划则要求“无法执行某些日常生活活动”才能获得福利资格。\n\
    \n从所得税的角度来看，刚才提到符合条件的长期护理保费在一定限额内可作为医疗费用进行扣除。这个限额是多少？具体而言，所有医疗费用仅在超过调整后总收入（AGI）下限的一定比例时才能扣除：该比例在\
    \ 2018 年为 7.5%；从 2019 年开始，恢复到 AGI 下限的 10%。这意味着，在您进入疗养院并开始产生大量医疗费用之前，您可能无法扣除保费。保单为您提供的主要优势在于所支付福利金的免税性质。不过请记住，所获得的大部分长期护理福利金很可能是以报销医疗费用的形式支付的，因此根据现行法律无需缴纳所得税。\n\
    \n一份合格的长期护理保单提供八种基本保障类型，其中只有少数几种（如专业护理）属于医疗保险的覆盖范围。即便如此，保单下的合格条件很可能比医疗保险法规定的条件更为有利。此外，如前所述，长期护理保单中监护护理的主要福利并不在医疗保险的覆盖条款之内。长期护理的基本类型（按护理级别排序）如下：\n\
    \n*   **专业护理**：这是最高级别的医疗护理，通常在传统疗养院中每日提供，主要针对从中风等严重危及生命的疾病中恢复的患者。此类康复护理必须在医生的指导下进行。\n\
    *   **记忆护理**：可以说，这与专业护理的级别相同。记忆护理是为患有严重痴呆症、阿尔茨海默病及其他与大脑相关的记忆问题的人提供的专门护理。此类护理通常在辅助生活环境中提供。\n\
    *   **中级护理**：这与专业护理类似，不同之处在于护理只是偶尔提供，而非每日进行。\n*   **监护护理**：这是传统的疗养院护理，无需医生开具医嘱。它提供给因慢性健康状况而无法自理的人。\n\
    *   **辅助生活**：这类设施提供公寓式住房（通常包含餐食）和支持服务，面向那些在日常生活中仅需要间歇性帮助的人。\n*   **家庭保健**：这种护理允许患者留在家中，接受兼职的专业护理服务或其他康复协助。\n\
    *   **临终关怀**：这是为临终患者（通常在预期死亡日期前六个月内）提供的护理，可能每日进行，也可能频率更低。护理通常发生在患者家中，但也可能在临终关怀中心进行。\n\
    *   **成人日托**：这种护理提供给那些白天在家需要帮助和监督，而其配偶或家人需外出工作的人。\n\n大多数长期护理保单在支付福利金之前有两个必须满足的条件。被保险人必须满足以下两个条件之一：\n\
    \n1.  被保险人必须如保单所定义的那样患有慢性疾病。“慢性疾病”被定义为在无重大协助的情况下，无法完成六项日常生活活动中的两项，且持续时间至少 90 天。这六项日常生活活动如下：\n\
    \    *   进食\n    *   沐浴\n    *   穿衣\n    *   从床移动到椅子\n    *   如厕\n    *   控制大小便\n\
    2.  需要实质性的服务来保护被保险人免受因脑损伤（例如由中风、痴呆或阿尔茨海默病引起）而对其健康和安全造成的威胁。\n"
- fmt: '通常，在证明您符合这些条件之一时，需要一名或多名医生出具书面证明，但有些保单会在提交理赔申请并进行内部调查后支付保险金（无需医生证明信）。


    现在，我们来谈谈在购买长期护理保单之前您应该了解的一些比较常见的福利除外责任和限制条款。其中最重要的如下：


    - **每日保额**：每份保单通常会根据护理机构提供的护理水平，保证一个每日赔付的保额或金额。确定这个金额的一个好起点是查看您所在地区养老院的每日费用。您可能需要考虑添加通货膨胀附加条款，以应对未来费率的上涨。

    - **等待期（或免赔期）**：这是指在保单开始支付保险金之前，您必须等待的天数。在此期间，您必须用自己的私人资金或家庭资金来支付所接受的护理费用。可以预见，等待期越短，长期护理保险费就越高。大多数保单的标准等待期为
    90 天。

    - **给付期**：如前所述，在养老院机构平均停留的时间是 2.7 年。因此，您可能需要考虑三年或更短的给付期。由于这是养老院的平均停留时间，您也可能需要考虑更长的期限。市场上有终身给付的保单，但给付期越长，保单保费越高。

    - **既往病史限制**：既往病史是指在保险生效日期前六个月内，医生推荐过医疗治疗的状况。一些长期护理保单包含既往病史限制。如果包含，则意味着与医疗建议相关的长期护理费用将不予支付（可以找到没有既往病史限制的保单，但它们的价格更高）。

    - **保单除外责任**：最常见的除外责任是因酒精或药物成瘾而需要的长期护理。几乎所有的保单都不承保这种情况。


    ## 长期护理保险的替代方案


    关于长期护理保险替代方案，首先想到的问题是您一生中是否可能需要长期护理。对一些人来说，答案相对简单，基于不良的家庭病史或当前健康状况不佳。对其他人来说，答案则不那么明确。然而，统计数据表明，大约每十个65岁或以上的人中，就有四个在人生的某个阶段需要长期护理帮助。这是一个相当高的概率！因此，问题变得不仅仅是要不要，而是何时需要长期护理，以及如何支付其费用。


    历史上，在支付长期护理费用方面有三种选择：


    - 自己支付护理费用，或依赖家庭成员的经济资源。

    - 尝试申请政府援助，即医疗补助计划（Medicaid）。

    - 购买长期护理保险单。


    最近，出现了第四种方法，即通过购买人寿保险中的“加速死亡给付”或“生存给付”附加条款。如果被保险人患上绝症或变成慢性病，该附加条款会加速支付死亡保险金。换句话说，被保险人必须由医生证明，在无人协助下无法完成某些日常生活活动。


    使用此附加条款兑换保单，在所得税处理上存在差异。如果被保险人患有绝症（通常定义为从疾病发作之日起预计在24个月内死亡），他们可以在有生之年将收益用于任何目的。因此，对于绝症患者个人来说没有应税收益。然而，如果被保险人仅仅是慢性病，他们必须将收益仅用于长期护理，以避免对收益（定义为保单的现金价值减去迄今为止支付的所有保费）征税。


    例如，假设您患有绝症，但之前购买了一份保额为25万美元的万能人寿保险，并附加了加速死亡给付条款。迄今为止，您已支付了5万美元保费，保单累计现金价值为7.5万美元。您有2.5万美元（7.5万美元减去5万美元）的潜在应税收益（普通收入，而非资本利得）。由于您患有绝症，您可以免收入税将这7.5万美元的现金价值用于任何目的。但是，如果您仅仅是慢性病，您必须将这7.5万美元的现金价值仅用于长期护理费用，才能避免为那2.5万美元的收益纳税。


    许多人——无论是有意为之还是出于财务状况——选择自行承担长期护理费用。储蓄或投资计划可能会帮助您做到这一点。然而，这个选项需要财务自律，而这是我们中许多人并不充分具备的品质。您也可以依靠房屋净值来支付长期护理费用。例如，您可以缩小居住空间，搬到更便宜的房子里，用省下的钱来支付可能的长期护理费用；或者您可以办理反向抵押贷款，贷款方会根据您房屋净值的一定比例，每月向您支付一笔收入。但鉴于全国许多地区住宅房地产市场的变幻莫测，这个选项也伴随着一些风险。'
  raw: 'Usually, in proving that you meet either of these criteria, written verification
    by one or more physicians is required, but some policies will pay benefits upon
    the submission of a claim and an internal investigation (no doctor’s letter is
    required).


    Let’s now address some of the more common exclusions and limitations on benefits
    that you should be aware of before purchasing a long-term care policy. The most
    important of these are the following:


    *   Daily benefit amount : Each policy typically guarantees a daily benefit amount,
    or dollar amount, payable per day based on the level of care being provided by
    the facility. A good place to begin in determining what this amount should be
    is to check the daily rate of nursing homes in your area. You may wish to consider
    an inflation rider to account for future increases in this rate.

    *   The elimination, or waiting, period: This period is the number of days you
    must wait before benefits are paid under the policy. During this time, you have
    to pay for the cost of care you receive out of your own private funds or those
    of your family. As may be expected, the shorter the elimination period, the greater
    the long-term care insurance period. The standard elimination period for most
    policies is 90 days.

    *   The benefit period: As mentioned earlier, the average time spent in a nursing-home
    facility is 2.7 years. As such, you may wish to consider a three-year benefit
    period or less. Because this is the average time spent in a nursing-home facility,
    you may also wish to consider a longer period. Policies are available for lifetime
    benefit, but the longer the benefit period, the higher the policy premium.

    *   Preexisting-condition limitation : A preexisting condition is a condition
    for which a physician recommended medical treatment within six months before the
    effective date of insurance coverage. Some long-term care policies include a preexisting
    condition limitation. If they do, it means benefits will not be payable for long-term
    care related to the medical recommendation. (It is possible to find policies without
    any preexisting condition limitations, but they are more expensive.)

    *   Policy exclusions: The most common exclusion is for long-term care that is
    necessary because of alcohol or drug addiction. Almost uniformly, policies do
    not cover this condition.


    ## Alternatives to Long-Term Care Insurance


    The first question that should come to mind with respect to long-term care insurance
    alternatives is whether you are likely to require long-term care during your lifetime.
    For some people, the answer is relatively simple, based on problematic family
    medical history or current poor health. For others, the answer is much less clear-cut.
    However, statistics bear out that approximately four out of ten people aged 65
    or over will require long-term care assistance at some point during their lifetimes.
    These are relatively good odds! Thus, the question becomes not so much a matter
    of if, but rather when long-term care will be needed, and how it will be paid
    for.


    Historically, three choices have been available with respect to paying for long-term
    care:


    *   Pay for such care yourself or rely on the financial resources of family members.

    *   Attempt to qualify for government assistance in the form of Medicaid.

    *   Purchase a long-term care insurance policy.


    Recently, a fourth method has become available in the form of the purchase of
    an accelerated death benefits or living benefits rider as part of your life insurance
    coverage. This rider accelerates payment of the death benefit if the insured contracts
    a terminal disease or becomes chronically ill. In other words, the insured must
    be certified by a physician as unable to perform, without assistance, certain
    ADLs.


    There is a difference in the income-tax treatment of a policy cashed in using
    this rider. If an insured is terminally ill (generally defined as being expected
    to die within 24 months from the date of the onset of disease), they can use the
    proceeds for any purpose during their lifetime. Thus, there is no taxable gain
    to a terminally ill insured individual. However, if the insured is only chronically
    ill, they must use the proceeds only for long-term care to avoid taxation on the
    gain (defined as the cash value of the policy less any premiums paid to date).


    For example, assume you are terminally ill but previously purchased a $250,000
    universal life insurance policy with an accelerated benefits rider. To date, you
    have paid $50,000 in premiums, and the policy has accumulated a cash value of
    $75,000\. You have $25,000 ($75,000 less $50,000) of potentially taxable gain
    (ordinary income and not capital gain). Because you are terminally ill, you can
    use the $75,000 cash value for any purpose free of income tax. However, if you
    are only chronically ill, you must use the cash value of $75,000 only for long-term
    care expenses if you want to avoid paying taxes on the $25,000 gain.


    Many individuals—either intentionally or by reason of financial circumstances—choose
    to self-fund the payment of long-term care. A savings or investment plan may help
    you do so. However, this option requires financial self-discipline, a trait that
    some of us do not possess in considerable quantity. You may also rely on the equity
    in your home to cover your long-term care costs. For example, you can either downsize
    to a less expensive home and use the savings to fund possible long-term care costs,
    or you can enter into a reverse mortgage , whereby the lender pays you a monthly
    income based on a percentage of the amount of equity in your home. But given the
    vicissitudes of residential real estate markets in many areas of the country,
    this option entails some risk as well.'
  trans: '

    通常，在证明您符合这些条件之一时，需要一名或多名医生出具书面证明，但有些保单会在提交理赔申请并进行内部调查后支付保险金（无需医生证明信）。


    现在，我们来谈谈在购买长期护理保单之前您应该了解的一些比较常见的福利除外责任和限制条款。其中最重要的如下：


    - **每日保额**：每份保单通常会根据护理机构提供的护理水平，保证一个每日赔付的保额或金额。确定这个金额的一个好起点是查看您所在地区养老院的每日费用。您可能需要考虑添加通货膨胀附加条款，以应对未来费率的上涨。

    - **等待期（或免赔期）**：这是指在保单开始支付保险金之前，您必须等待的天数。在此期间，您必须用自己的私人资金或家庭资金来支付所接受的护理费用。可以预见，等待期越短，长期护理保险费就越高。大多数保单的标准等待期为
    90 天。

    - **给付期**：如前所述，在养老院机构平均停留的时间是 2.7 年。因此，您可能需要考虑三年或更短的给付期。由于这是养老院的平均停留时间，您也可能需要考虑更长的期限。市场上有终身给付的保单，但给付期越长，保单保费越高。

    - **既往病史限制**：既往病史是指在保险生效日期前六个月内，医生推荐过医疗治疗的状况。一些长期护理保单包含既往病史限制。如果包含，则意味着与医疗建议相关的长期护理费用将不予支付（可以找到没有既往病史限制的保单，但它们的价格更高）。

    - **保单除外责任**：最常见的除外责任是因酒精或药物成瘾而需要的长期护理。几乎所有的保单都不承保这种情况。


    ## 长期护理保险的替代方案


    关于长期护理保险替代方案，首先想到的问题是您一生中是否可能需要长期护理。对一些人来说，答案相对简单，基于不良的家庭病史或当前健康状况不佳。对其他人来说，答案则不那么明确。然而，统计数据表明，大约每十个
    65 岁或以上的人中，就有四个在人生的某个阶段需要长期护理帮助。这是一个相当高的概率！因此，问题变得不仅仅是要不要，而是何时需要长期护理，以及如何支付其费用。


    历史上，在支付长期护理费用方面有三种选择：


    - 自己支付护理费用，或依赖家庭成员的经济资源。

    - 尝试申请政府援助，即医疗补助计划（Medicaid）。

    - 购买长期护理保险单。


    最近，出现了第四种方法，即通过购买人寿保险中的“加速死亡给付”或“生存给付”附加条款。如果被保险人患上绝症或变成慢性病，该附加条款会加速支付死亡保险金。换句话说，被保险人必须由医生证明，在无人协助下无法完成某些日常生活活动。


    使用此附加条款兑换保单，在所得税处理上存在差异。如果被保险人患有绝症（通常定义为从疾病发作之日起预计在 24 个月内死亡），他们可以在有生之年将收益用于任何目的。因此，对于绝症患者个人来说没有应税收益。然而，如果被保险人仅仅是慢性病，他们必须将收益仅用于长期护理，以避免对收益（定义为保单的现金价值减去迄今为止支付的所有保费）征税。


    例如，假设您患有绝症，但之前购买了一份保额为 25 万美元的万能人寿保险，并附加了加速死亡给付条款。迄今为止，您已支付了 5 万美元保费，保单累计现金价值为
    7.5 万美元。您有 2.5 万美元（7.5 万美元减去 5 万美元）的潜在应税收益（普通收入，而非资本利得）。由于您患有绝症，您可以免收入税将这 7.5
    万美元的现金价值用于任何目的。但是，如果您仅仅是慢性病，您必须将这 7.5 万美元的现金价值仅用于长期护理费用，才能避免为那 2.5 万美元的收益纳税。


    许多人——无论是有意为之还是出于财务状况——选择自行承担长期护理费用。储蓄或投资计划可能会帮助您做到这一点。然而，这个选项需要财务自律，而这是我们中许多人并不充分具备的品质。您也可以依靠房屋净值来支付长期护理费用。例如，您可以缩小居住空间，搬到更便宜的房子里，用省下的钱来支付可能的长期护理费用；或者您可以办理反向抵押贷款，贷款方会根据您房屋净值的一定比例，每月向您支付一笔收入。但鉴于全国许多地区住宅房地产市场的变幻莫测，这个选项也伴随着一些风险。

