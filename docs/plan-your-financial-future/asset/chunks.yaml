- fmt: '# Portability of Health Insurance Coverage


    The phrase portability of health insurance coverage is a bit of a misnomer. It
    does not mean that you can literally transfer the same group policy from your
    previous employer to your new employer. However, it does mean that, under HIPAA,
    as long as you have been covered under a group policy for a specified period of
    time, an insurance company cannot deny you coverage, even if you have become seriously
    ill in the meantime. Specifically, HIPAA states that there cannot be enforcement
    of a preexisting medical condition clause by the new insurance company if the
    following are true:


    - You were covered by a prior employer’s health insurance plan for at least 12
    months.

    - Fewer than 63 days have elapsed since you lost coverage under the prior employer’s
    plan.


    Again, however, these limitations have become less important with the general
    prohibition of refusing coverage to anyone because of preexisting conditions under
    the provisions of Obamacare.


    How do you know that you have lost coverage under your prior employer’s plan?
    Your previous employer must provide you with a certificate of coverage that states
    the length of your insurance coverage and the date when you lost it. Keep this
    certificate! Should you enroll in a new group health insurance plan that applies
    a preexisting condition exclusion, proof of prior coverage often guarantees that
    you can avoid the application of this exclusion. Unfortunately, HIPAA does not
    regulate premium costs, so there is no guarantee that you will be able to afford
    the new insurance to which you are legally entitled!


    ## Medicare and Medigap


    Medicare is a federal government health insurance plan that covers individuals
    when they reach the age of 65. Historically, Medicare consisted of two major parts:
    Part A, hospital insurance; and Part B, supplementary medical insurance. In 2003,
    Congress passed a third major part of Medicare: Part D, prescription drug coverage.
    Part D became fully effective on January 1, 2006, but unlike Parts A and B of
    the plan, Part D coverage is not included within the traditional Medicare program.
    Instead, beneficiaries must elect to enroll in one of many hundreds of Part D
    plans offered by private insurance companies, with the US government providing
    premium support to these policies.


    Medicare Part A coverage is provided at no premium cost to eligible participants
    and covers four broad categories:


    - In-patient hospital care up to 90 days. The patient pays a deductible for the
    first 60 days and a co-payment after 60 days, up to the 90-day maximum.

    - Skilled nursing care benefits.

    - Home health services.

    - Care in a hospice for the terminally ill (defined as a person with a life expectancy
    of six months or less).


    Perhaps the most misunderstood part of Medicare Part A coverage is that long-term
    nursing-home coverage (referred to as custodial care under most long-term care
    insurance policies) is not provided. Rather, a short-term limited benefit known
    as the skilled nursing care benefit is available. While custodial care may be
    required, Medicare will pay for only 100 days of care, and it must be following
    a hospital stay. Notably, the skilled nursing care benefit means the patient must
    enter a skilled nursing facility at the direction of a medical doctor within 30
    days after leaving a hospital where the patient was treated for a serious illness
    for three or more consecutive days.


    This leads to the question of how to financially provide for an aging parent who
    needs continuing care. We will address this issue when we discuss long-term care
    alternatives later in this chapter; but, speaking as someone who has personally
    wrestled with the problem, there are three basic choices:


    - You can attempt to self-fund, using either your own money or that of your parent.

    - You can investigate whether it is still possible for your parent to qualify
    for coverage under a long-term care insurance policy.

    - You can attempt to take advantage of the strict requirements to qualify the
    parent for Medicaid assistance.


    The practical problem is that most of us either do not have the money to self-fund
    the coverage or wait so long that our parent no longer qualifies for or can afford
    the purchase of a long-term care policy. Thus, the purchase of a long-term care
    insurance policy for yourself or for aging parents is increasingly becoming a
    cornerstone of proper wealth management.


    In contrast to Part A, Medicare Part B coverage is not free to the participant;
    rather, it entails the payment of a specified monthly premium by the insured and,
    further, is means tested, meaning those with higher incomes pay a higher premium.
    Moreover, a deductible must be paid by the insured as well as co-insurance toward
    covered expenses in any calendar year. Currently, this co-insurance percentage
    is coordinated with the percentage share of most indemnity medical plans, or 80
    percent on the part of the government and 20 percent on the part of the insured.
    You can opt out of Medicare Part B coverage, but at the time you qualify for Medicare
    Part A coverage, you must tell the Social Security Administration (which also
    administers Medicare) that you do not wish to participate in Part B coverage.


    As you can likely appreciate, individuals who are eligible for Medicare may have
    substantial medical costs for which they are responsible in excess of the covered
    expenses. The reimbursement of these excess expenses is why you (or your parent)
    should purchase a Medicare supplemental health insurance policy, colloquially
    referred to as a Medigap policy.


    Medigap policies consist of 14 supplemental policies that have been standardized
    by federal legislation and are identified by the letters A through N for the types
    of benefits provided. (Effective June 1, 2010, Plans E, H, I, and J are no longer
    sold, although if purchased before this date, they are still valid.) Generally,
    you must have both Part A and Part B coverage under Medicare before a Medigap
    policy may be purchased. Under law, seniors (defined here as individuals aged
    65 or over) may be sold only one Medigap policy at a time. The policy must accept
    all applicants within the first six months of qualification for Medicare, regardless
    of any preexisting conditions. Medigap policies can be obtained through a variety
    of companies and organizations, including the most popular source, the American
    Association of Retired Persons (AARP), which is headquartered in Washington, DC.


    Seniors may also wish to consider a second form of Medicare coverage: the Medicare
    Advantage plan, which is private insurance subsidized by the federal government
    that offers the same basic coverage provided by Medicare but also includes the
    most important features of Medigap policies. There are two types of Medicare Advantage
    plans: those that include the attributes of managed care plans as well as private
    fee-for-service plans (or PFFS plans), featuring open access to health care providers
    with few restrictions. PFFS plans are currently the fastest growing type of alternative
    Medicare coverage and are provided for under Part C of the Medicare Act of 1965.'
