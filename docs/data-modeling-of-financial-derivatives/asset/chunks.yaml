    and `entity–relationship diagram` (ERD) modeling notation developed by Harry Ellis
    and Richard Barker.[¹](#9781430265894_Ch01.xhtml#Fn1) After joining Oracle Corporation,
    Barker further developed and extended the CASE methodology, which was marketed
    as the Oracle Custom Development Method (CDM). To this day, Oracle’s CASE Tools
    enable users to model using Barker’s notation.[²](#9781430265894_Ch01.xhtml#Fn2)
    I developed every data model in this book using Barker’s modeling notation and
    the Oracle SQL Developer Data Modeler (Release 3.1.4)—henceforth shortened to
    `Oracle Data Modeler`.


    I confined myself to `Oracle Data Modeler` in the making of this book not to showcase
    a particular CASE product but because I found it to be the best tool to create
    ERDs that are easily understood, unambiguous, intuitive, and user-friendly. Every
    model presented in this book is a conceptual-level model. This requirement called
    for a data modeling product with a prebuilt library of industry-recognized, conceptual-level
    data modeling structures that readers could easily identify and understand. The
    `Oracle Data Modeler` has a prebuilt, out-of-the-box library of various conceptual
    modeling structures that perfectly suits the criteria for this book. For instance,
    the way the product displays supertype and subtype entities is very intuitive
    and highly detailed. Exclusivity arc, another feature I require, is readily available
    and has a high level of usability.


    Similarly, I use Barker’s notation because it is intuitive and easy to follow.
    In the course of my career, I have come to the conclusion that ERDs created using
    this particular system of notation are the easiest ones for nontechnical users
    to interpret. By `Barker’s notation` I mean not only the notation itself but also
    Barker’s method of spatially organizing data models (Barker’s `positional convention`).
    When you put all of these ingredients together, the outcome is diagrams that are
    concise and easy to read, interpret, and understand—as they must be to serve a
    useful function in the financial sector. Consequently, [Chapter 2](#9781430265894_Ch02.xhtml)
    is devoted to Barker’s ERD notation and methodology. If you are already familiar
    with Barker’s methodology, feel free to skim through [Chapter 2](#9781430265894_Ch02.xhtml).
    Even so, I recommend that you at least briefly review this chapter, because it
    is an excellent place to refresh your knowledge.


    [Chapter 3](#9781430265894_Ch03.xhtml) introduces users to the world of financial
    contracts. It is important that you understand this chapter well, because it introduces
    key ideas and essential modeling patterns used throughout the book.


    [Chapters 4](#9781430265894_Ch04.xhtml) through [8](#9781430265894_Ch08.xhtml)
    discuss various financial instruments and coach you on how to model them. Each
    chapter is filled with modeling diagrams that explain each instrument in a clear
    and intuitive way. [Chapter 9](#9781430265894_Ch09.xhtml) puts the finishing touches
    on some of the key ideas and themes that recur throughout this book. The chapters
    build successively on each other and should be read in sequence.


    ## The Benefits of Data Modeling Patterns


    The ability to recognize and apply modeling patterns comes with practice and experience.
    In the first book of data modeling patterns, David Hay described their importance
    as follows[³](#9781430265894_Ch01.xhtml#Fn3):


    > *If you’re going after things that are of fundamental importance to the business,
    you’ll come up with things that are common across all businesses—people, organization,
    products, contracts are pretty standard in the world of commerce. If you use these
    as the basis of your organizing, you’ll come up with a model which is concrete
    enough that people will recognize and understand it.*


    A successful data model is one that answers the specific business questions posed
    today, yet is generic enough to anticipate the various changes that may happen
    tomorrow. Data modeling patterns provide you with the ability to create robust
    designs that are easy to extend and modify. A knowledge of modeling patterns leads
    to a more generic and stable data modeling design, one that anticipates changes.
    Anticipating changes when data modeling usually leads to designs that last longer
    and require less invasive alterations. If you model data, you are probably well
    aware of the fact that it is much easier to add a row to a classification table
    than to realize at some point after production deployment that a new supertype
    is required and an extensive recoding process is necessary.


    If you build your models with the end customer rather than the technology in mind,
    you will notice how dramatically different your resulting models become. The progenitor
    of this approach, William Edwards Deming, was not a data modeler, but his core
    principles may be applied to data modeling as well as many other disciplines.


    Deming (1900–1993) was an American statistician and business consultant best known
    for his “Plan-Do-Check-Act” cycle, more commonly called the Deming cycle. At General
    Douglas MacArthur’s behest, he taught top management in postwar Japan how to apply
    statistical methods to improve manufacturing design, product quality testing,
    and sales in global markets. Deming correctly predicted that Japan would rapidly
    become an exporting nation of the most reliable and dependable products and services
    on the world market.


    One of Deming’s key principles was to delight paying customers with quality products
    and make them come back for more. His principles are built on common sense and
    go against today’s prevalent short-term, “results now” approach. Deming preached
    that producers should build their products correctly right from the start, planning
    and developing products in a thoughtful and sensible manner before taking action.
    Once quality is in place, people will come back to make future purchases because
    they know that you deliver quality products. Companies in Japan stuck with Deming’s
    principles and were greatly rewarded.


    How can you apply Deming’s principles to data modeling? If you have designed your
    model properly—generalizing and specializing when you have to, relying on data
    modeling patterns and best design principles whenever possible—your design will
    withstand the test of time and will not require any drastic alterations, leaving
    your customers happy and satisfied and leaving you rewarded and proud.


    Think about the following: on a typical corporate project, time allocated to data
    model development (including end user interviews and documentation) is usually
    substantially less than the time dedicated to coding and testing the resulting
    system. No matter how brilliant the system code is, if the database is poorly
    designed, the resulting application will run slowly. End users tend to stay away
    from slow systems, so such systems are either retired prematurely or become candidates
    for major overhauls. Don’t make this mistake by not allocating the proper amount
    of time to developing and fine-tuning the resulting data model. In the long run,
    you will be greatly rewarded.


    ## The Conceptual Models Used in This Book'
