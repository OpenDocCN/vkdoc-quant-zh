  trans: '

    # 本书中的数据类型


    本书提供的数据模型均为*概念级数据模型*，所有超类型和子类型实体均保留原样。这种方法可确保物理级设计能够响应利益相关方批准的业务需求。业务键、备用键、主键的识别以及子类型/超类型的转换，都完全依赖于最终用户的业务规则。若在本著作中包含业务键和备用键等概念，反而会使核心概念复杂化，并可能误导读者。我的意图是尽可能深入地进行数据建模练习，同时为您留下独立探索的空间。请记住，唯有通过不断的实验与实践，我们才能真正学到东西。


    将本书的数据模型保持在概念层面的另一个原因，是为了使其与特定数据库管理系统（DBMS）的实现解耦。您的组织为特定项目采用的 DBMS 将拥有众多独特功能，这些功能可能倾向于某种特定的实现方法。作为一名顾问，我曾与众多
    DBMS 打交道，它们的独特功能在很大程度上影响了我将概念模型转化为逻辑模型及最终物理模型时所做的决策。这些决策与概念数据模型无关，概念数据模型需要保持中立，不依赖于各种实现方法。尽管我职业生涯的大部分时间都在使用
    Oracle DBMS，但我的概念模型始终保持数据库中立。本书也遵循同样的原则。


    ## 实践与专注


    怎样才能进入卡内基音乐厅？唯有通过实践与专注。要精通数据建模亦是如此。要掌握新的数据建模技术，你需要刻苦练习、反复实践。在生活中，你可能会遇到一些看似对数据建模了如指掌，但却鲜有实际技能展示的从业者。他们无意中成了被动的观察者或乘客，只是对他们所见的事物进行建模，没有运用任何创造力和想象力。被动建模确实有效，但其局限性很大，因为它会导致模型僵化，难以应对变化。相反，创造性数据建模则能产生易于修改的模型，因为设计者在构建时就考虑到了变化。通过提问、并且勇于提问来实践创造性建模。通过提问，你能更深入地理解主题领域，并且相比被动建模者，你凭借新鲜的视角和无偏见的观点而占据优势。


    实践之所以加倍重要，是因为它能为你提供业务利益相关方的反馈，并鼓励你尝试不同方法。缺乏实践，你的技能就会衰退甚至消亡。通过实践，你将能够将建模技能提升到更具创造性和创新性的水平。单凭知识和实践本身并不足以产生最佳成果。缺乏热情的实践只会带来平庸乏味的结果。要在你所做的事情上做到最好，你需要对工作充满热情。热情将驱使你成为所在领域的佼佼者，并始终以最佳状态投入工作。


    ## 提出正确的问题


    大多数项目都包含一些不熟悉的元素。通常，项目的这一小部分会与截止日期和其他压力相关联。有些人能够迎接挑战，而另一些人则表现不佳。在这种情况下，你需要认识到，如果没有对底层业务规则的正确理解，你就无法交付高质量的解决方案。你的项目中总会有人能够回答你的问题。通常情况下，作为数据建模师，你的任务就是找到这些领域专家，与他们面谈，并挖掘出尽可能多的信息。从人那里获取信息是一门艺术，你应该尽可能多地实践。


    首先，向领域专家承认你在某个特定主题领域的知识有限，这是完全可以接受的；这种坦诚通常能缓和对方的情绪，使他们更同情你的需求，感觉到自己的重要性，从而更健谈。


    当你与领域专家访谈时，要尽量减少会导致简单“是”或“否”答案的*封闭式问题*，因为它们会阻碍富有成效的对话交流。相反，应该提出旨在鼓励充分披露和有意义讨论的*开放式问题*。例如，请领域专家解释一个特定的业务流程，将有助于促成高质量且富有成效的讨论。


    ## 结论


    本章讨论了各种主题，从本书的整体结构到识别和应用各种建模模式的重要性。它强调了：如果希望在行业中取得成功，学习的渴望和获取新信息的意愿都是关键品质，被动接收信息是不够的。只有通过反复的实际知识应用，我们才能学到东西并取得成功。当涉及到提问时，要无所畏惧，这样我们才能掌握任何特定的业务领域。最后，要么满怀热情地去做，要么就干脆不做！


    ## 推荐阅读


    Date, C.J. *深入理解数据库：面向实践者的关系理论*。O''Reilly Media, 2005.


    Halpin, Terry, and Tony Morgan. *信息建模与关系数据库*，第 2 版。Morgan Kaufmann, 2008.


    ¹ Richard Barker, *CASE 方法：实体关系建模*。Addison-Wesley Longman, 1990.


    ² Oracle 最初的工具 Oracle Designer 已被 Oracle SQL Developer Data Modeler 取代。近年来，Embarcadero
    ER/Studio 和 Sybase PowerDesigner 提供了 Barker 表示法。


    ³ David C. Hay, *数据模型模式：思维的惯例*。Dorset House, 1995.


    # 第 2 章


    # Barker 表示法


    *将每个困难分解成尽可能多、且必要且可行的部分来解决。*


    —— 勒内·笛卡尔，《谈谈方法》


    本章介绍 Barker 的计算机辅助软件工程（CASE）方法，强调其要点，总结其关键策略，并着重说明美学惯例的重要性。鉴于该方法论是本书的基础而非主要焦点，本章不会深入不必要的内容。本章为您提供必要的基础知识，使您能够轻松理解书中所使用的各种概念图。第一部分阐述了一些基本定义，并解释了
    Barker 表示法的一些关键特性。


    ## 不同类型的数据模型


    从业者将数据建模分为两大分支：*概念数据建模*和*结构数据建模*。本书中的实体关系图（ERD）均属于概念数据建模的范畴。用于创建 ERD 的实体关系建模技术由彼得·陈首创。¹


    概念数据模型执行以下功能：


    *   描述企业本身，而不考虑可能用于实现数据库的技术类型

    *   描述对企业具有重要意义的实体及它们之间的关系，这些关系被特意命名，以代表关于企业性质的一对清晰表述


    结构数据模型在软件工程中用于以图形方式表示数据库结构及其之间的各种关系。这种数据建模类型又细分为两个子类型：

    '
- fmt: "# Data Models Overview\n\n- The *logical data model* describes data in terms\
    \ of the data management technology that will be used: relational tables and columns,\
    \ object-oriented classes and attributes, XML tags, and so forth.\n- The *physical\
    \ data model* specifically describes how data will be stored on various storage\
    \ media.\n\nEvery data model consists of three aspects: *entities*, *attributes*,\
    \ and the *relationships* among them. These aspects are considered in the following\
    \ sections.\n\n## Entity\n\nAn *entity* is “a thing of significance about which\
    \ an enterprise wishes to hold information.” It is something that is of the uttermost\
    \ importance to a business, something the business values and cherishes. It may\
    \ be the product the business produces or the service the business performs. Whereas\
    \ an entity is a thing of interest, an *entity type* is a defined set of entities.\n\
    \nIn Barker’s notation, an entity should be shown with the following specifications:\n\
    \n1. A rectangle with rounded corners\n2. Entity name in uppercase letters\n3.\
    \ Entity name not in singular (not plural) form\n4. Entity name inside the entity\
    \ rectangle\n\n![9781430265894_Fig02-01.jpg](images/9781430265894_Fig02-01.jpg)\n\
    \n*Figure 2-1*. Two sample entities represented according to Barker’s specifications\n\
    \nIf an entity represents something of importance to an organization, then an\
    \ *entity instance* is a row that is stored within the entity. In *Figure 2-1*,\
    \ a `PERSON` is an entity and the specific record stored within it (with `Last\
    \ Name = “Smith”` and `First Name = “Billy”`) is the entity instance.\n\n## Subtypes\
    \ and Supertypes\n\nYou will often encounter entity types whose instances are\
    \ also instances of a more general type as well. In the data modeling world, the\
    \ first group of instances is called a *subtype* of the second group. The second\
    \ group is called a *supertype.* This is represented in the Barker’s notation\
    \ by a subtype being shown *inside* its supertype. When you make a supertype,\
    \ you artificially create a container for the like things.\n\n### Representing\
    \ Subtypes/Supertypes in a Data Model\n\n*Figure 2-2* shows an example of a supertype/subtype\
    \ structure. The diagram shows `ORGANIZATION`, which for the purposes of this\
    \ exercise we define as “a collection of people who have gathered to accomplish\
    \ a purpose.” Here we assert that each `ORGANIZATION` must be one of the following:\n\
    \n- `DEPARTMENT`\n- `COMPANY`\n- `GOVERNMENT`\n- `GOVERNMENT AGENCY`\n- `PROFESSIONAL\
    \ SOCIETY`\n- `OTHER ORGANIZATION`\n\n![9781430265894_Fig02-02.jpg](images/9781430265894_Fig02-02.jpg)\n\
    \n*Figure 2-2*. An Organization supertype\n\nNote that this diagram also asserts\
    \ that by definition, each instance of a `DEPARTMENT` must be also an instance\
    \ of an `ORGANIZATION`, each instance of a `COMPANY` must be also an instance\
    \ of an `ORGANIZATION`, and so forth.\n\nIn *Figure 2-3*, subtypes `PERSON` and\
    \ `ORGANIZATION` are contained within the supertype `PARTY`. The ability to create\
    \ hierarchies of various levels (or depths) in a conceptual data model is a powerful\
    \ tool that adds flavor and meaning to the design. With the help of supertype/subtype\
    \ entities, we are able to articulate certain relationships and display certain\
    \ business rules that would otherwise be difficult to show in a conceptual model.\
    \ The ability to establish hierarchical relationships between various entities\
    \ not only simplifies the design but improves the articulation of the underlying\
    \ business rules and makes the model less ambiguous and more meaningful.\n\n![9781430265894_Fig02-03.jpg](images/9781430265894_Fig02-03.jpg)\n\
    \n*Figure 2-3*. Example of a simple hierarchy\n\nNote that attributes and relationships\
    \ of the supertype apply to all of its subtypes. Every subtype *inherits* these\
    \ common attributes and relationships. On the other hand, any attributes and relationships\
    \ shown for a subtype are unique to that subtype. These unique attributes and\
    \ relationships are not shared among the subtypes, nor do they apply to the supertype.\n\
    \nIn general, a supertype/subtype structure should not contain only one subtype,\
    \ implying identity. If there might be other subtypes, you can say that with a\
    \ second indeterminate subtype. In *Figure 2-4*, for example, an `ASSET TYPE`\
    \ is shown to be either a `CURRENCY ASSET CLASS TYPE` or an `OTHER ASSET TYPE`.\n\
    \n![9781430265894_Fig02-04.jpg](images/9781430265894_Fig02-04.jpg)\n\n*Figure\
    \ 2-4*. Subtypes/supertypes in a data model\n\n### Subtype/Supertype Rules\n\n\
    1. Every entity instance of a supertype must be an instance of one of its subtypes\
    \ (*exhaustive rule*).\n2. Every entity instance of a supertype must be an instance\
    \ of only one entity subtype (*mutually exclusive rule*).\n\n## Attributes\n\n\
    An attribute is a property of an entity type that describes a particular characteristic\
    \ of that entity type. The property takes a value for each instance of that entity\
    \ type. Attributes cannot exist by themselves and should be discussed within the\
    \ context of an associated entity. An attribute will be one of three types:\n\n\
    1. Unique identifier (UID), which uniquely identifies an entity instance. UIDs\
    \ are implemented as primary keys.\n2. Mandatory attributes, which cannot be `NULL`.\n\
    3. Nonmandatory or optional attributes.\n\n![9781430265894_Fig02-05.jpg](images/9781430265894_Fig02-05.jpg)\n\
    \n*Figure 2-5*. Entity attributes\n\nAccording to the conventions supported by\
    \ Barker’s notation:\n\n1. A *column name* is preceded by a special symbol:\n\
    \   - `#` denotes a key attribute\n   - `*` denotes a mandatory attribute\n  \
    \ - `o` denotes an optional (nonmandatory) attribute\n2. Column Name is written\
    \ with the first letter of each word in uppercase.\n\nTry to avoid any ambiguities\
    \ when creating column names. Column names should be nonambiguous and readable;\
    \ thus, avoid extreme abbreviations.\n\n## Relationships\n\nEach *relationship*\
    \ represents two strong assertions about the two entity types involved. The relationship\
    \ names are defined so that the relationships in each direction can be read as\
    \ a common English statement. Specifically, the resulting sentences have the following\
    \ structure:\n\nEach `<subject entity type name>`  \nMust be (If the half-line\
    \ next to the subject entity type is *solid*)  \n(or)  \nMay be (If the half-line\
    \ next to the subject entity type is *dashed*)  \n`<relationship name>`  \nOne\
    \ or more (…if there is a “crow’s foot” (`>`) next to the object entity type)\
    \  \n(or)  \nOne and only one (. . . if there is no “crow’s foot” next to the\
    \ object entity type)  \n`<object entity type name>`\n\nIn *Figure 2-6*, we establish\
    \ a relationship between `PARTY` and `PARTY ADDRESS` entities. In Barker’s notation,\
    \ a mandatory relationship is depicted by a solid line; a nonmandatory relationship\
    \ is described by a dashed line. The relationship in *Figure 2-6* states that:\n\
    \n- “Each `PARTY` may be *located in* one or more `PARTY ADDRESSES`.”\n- “Each\
    \ `PARTY ADDRESS` must be *for* one and only one `PARTY`.”\n\n![9781430265894_Fig02-06.jpg](images/9781430265894_Fig02-06.jpg)\n\
    \n*Figure 2-6*. A sample relationship\n\nDavid C. Hay underscores the importance\
    \ of selecting appropriate relationship names."
