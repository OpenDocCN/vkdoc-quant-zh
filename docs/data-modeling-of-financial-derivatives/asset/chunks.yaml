    # 本书采用了哈利·埃利斯和理查德·巴克开发的`计算机辅助软件工程`（CASE）方法论以及`实体关系图`（ERD）建模记号法。¹ 巴克在加入甲骨文公司后，进一步发展和扩展了这套
    CASE 方法论，并将其作为 Oracle 定制开发方法（CDM）推向市场。时至今日，Oracle 的 CASE 工具仍能使用户通过巴克的记号法进行建模。²
    我运用巴克的建模记号法和 Oracle SQL Developer Data Modeler（3.1.4 版）——以下简称`Oracle Data Modeler`——开发了本书中的每一个数据模型。


    在本书的撰写过程中，我限定自己使用`Oracle Data Modeler`，并非为了展示某一特定的 CASE 产品，而是因为我发现它是创建易于理解、无歧义、直观且用户友好的
    ERD 图的最佳工具。本书呈现的每一个模型都是概念层模型。这一需求要求数据建模产品具备一个预置的、行业公认的概念层数据建模结构库，以便读者能够轻松识别和理解。`Oracle
    Data Modeler`恰好拥有一个开箱即用的、包含多种概念建模结构的预置库，完美契合本书的标准。例如，该产品展示超类型和子类型实体的方式就非常直观且高度详细。我需要的另一个特性——互斥弧——也随时可用，并具有很高的易用性。


    同样，我之所以采用巴克的记号法，是因为它直观且易于掌握。在我的职业生涯中，我得出结论：使用这种特定记号法系统创建的 ERD 图，对于非技术用户来说是最容易解读的。所谓`巴克的记号法`，我不仅指记号法本身，也包括巴克在空间上组织数据模型的方法（巴克的`位置约定`）。当你将这些要素结合在一起时，得到的图表将简洁明了、易于阅读、解读和理解——这正是它们在金融领域发挥有效作用所必需的。因此，第
    2 章专门介绍了巴克的 ERD 记号法和方法论。如果你已经熟悉巴克的方法论，可以快速浏览第 2 章。即便如此，我仍建议你至少简要回顾一下这一章，因为它是重温知识的好地方。


    第 3 章向读者介绍了金融合约的世界。充分理解这一章很重要，因为它介绍了贯穿全书的关键概念和基本建模模式。


    第 4 章至第 8 章讨论了各种金融工具，并指导你如何为它们建模。每章都配有清晰的建模图，以直观易懂的方式解释每种工具。第 9 章则为贯穿本书的一些关键思想和主题画上了点睛之笔。各章内容循序渐进，应按顺序阅读。


    ## 数据建模模式的益处


    识别和应用建模模式的能力来自实践和经验。在数据建模模式的第一本书中，大卫·海伊这样描述它们的重要性³：


    > *如果你要追求对业务至关重要的事物，你会发现所有企业都有共通之处——人员、组织、产品、合同在商业世界中是相当标准的。如果你以此作为组织的基础，你最终得到的模型将足够具体，以至于人们能够识别并理解它。*


    一个成功的数据模型，既能回答今天提出的具体业务问题，又足够通用，能够预测明天可能发生的各种变化。数据建模模式使你能够创建易于扩展和修改的稳健设计。掌握建模模式能带来更通用、更稳定的数据建模设计，一个能够预见变化的设计。在数据建模中预见变化，通常能产生使用寿命更长、所需侵入性改动更少的设计。如果你从事数据建模工作，你很可能清楚，向分类表中添加一行远比在系统生产部署后才发现需要一个新超类型并需要进行大规模重编码过程要容易得多。


    如果你在构建模型时始终以最终客户而非技术为中心，你会注意到最终模型会有多么显著的不同。这种方法的鼻祖威廉·爱德华兹·戴明并非数据建模师，但他的核心原则同样可以应用于数据建模及许多其他学科。


    戴明（1900–1993）是一位美国统计学家和商业顾问，以其“计划-执行-检查-行动”循环（即通常所说的戴明环）而闻名。应道格拉斯·麦克阿瑟将军的请求，他在战后的日本教授高层管理人员如何应用统计方法来改进制造业设计、产品质量测试以及在全球市场的销售。戴明准确预测到日本将迅速成为一个向世界市场出口最可靠、最值得信赖的产品和服务的国家。


    戴明的一个关键原则是用优质的产品取悦付费客户，并让他们成为回头客。他的原则建立在常识之上，与当今盛行的短视、“即刻见效”的做法背道而驰。戴明主张生产者应从一开始就正确地构建产品，在行动之前以深思熟虑和明智的方式规划和开发产品。一旦质量到位，人们会因为知道你提供的是优质产品而回来再次购买。日本的许多公司坚持戴明的原则并获得了巨大回报。


    你如何将戴明的原则应用于数据建模？如果你正确地设计了自己的模型——在必要时进行概括和特化，尽可能依赖数据建模模式和最佳设计原则——那么你的设计将经受住时间的考验，无需进行任何重大的改动，这会让你的客户满意，也让你自己感到欣慰和自豪。


    思考以下问题：在一个典型的企业项目中，分配给数据模型开发（包括最终用户访谈和文档编写）的时间通常远少于分配给编码和测试最终系统的时间。无论系统代码多么出色，如果数据库设计糟糕，最终应用程序的运行速度也会很慢。最终用户往往会避开运行缓慢的系统，因此这类系统要么过早退役，要么成为重大改造的对象。不要因为未能分配足够的时间来开发和微调最终的数据模型而犯下这个错误。从长远来看，你将获得巨大的回报。


    ## 本书中使用的概念模型

    '
- fmt: '# The Data Models in This Book


    The data models provided in this book are *conceptual-level data models*, with
    all of the supertype and subtype entities left intact. This approach ensures that
    physical-level designs are responsive to stakeholder-approved business requirements.
    The identification of business keys, alternate keys, primary keys, and subtype/supertype
    transformations are all very dependent on the end user business rules. Including
    notions such as business keys and alternate keys in this work would complicate
    the main concepts and might mislead readers. My intention is to proceed with data
    modeling exercises as far as possible while leaving you space to experiment on
    your own. Remember, it is only through experimentation and practice that we really
    learn.


    Another reason to keep the data models in this book on a conceptual level is to
    decouple them from any dependency on a particular database management system (DBMS)
    implementation. The DBMS that your organization adopts for your particular project
    will have numerous unique features that may favor a particular implementation
    approach. As a consultant, I have worked with numerous DBMSs, and their unique
    functionalities have dictated some of the decisions I’ve made when translating
    my conceptual models into logical and eventually physical models. These decisions
    have nothing to do with the conceptual data model, which needs to stay neutral
    with respect to and independent of various implementation methods. Even though
    a majority of my career was spent working with the Oracle DBMS, my conceptual
    models have stayed database-neutral. This book is built on the same precept.


    ## Practice and Dedication


    How do you get to Carnegie Hall? Only through practice and dedication. The same
    should be said about becoming proficient in data modeling. To master new data
    modeling techniques, you need to practice and practice hard. In life you may come
    across data modeling practitioners who seem to know a great deal about data modeling
    but do little to show their skills. Inadvertently, they become passive observers
    or passengers, simply modeling the things they see without applying any creativity
    and imagination. Passive modeling does work, but it is very limiting because it
    leads to rigid models that are resistant to change. Creative data modeling, on
    the other hand, leads to models that are easy to modify because their designers
    have built them with change in mind. Practice creative modeling by asking questions
    and by not being afraid to ask questions. By asking questions you gain a deeper
    understanding of the subject area and an advantage over passive modelers that
    comes from your fresh eyes and unbiased opinions.


    Practice is doubly important because it provides you with business stakeholder
    feedback and encourages you to try different things. Without practice, your skills
    diminish and perish. With practice you will be able to take your modeling skills
    to even more creative and innovative levels. Knowledge and practice are not enough
    by themselves to produce the best results. Practice without passion produces results
    that are lackluster and ordinary. To be the best at what you do, you need to have
    a passion for the job. Passion will drive you to be the best at what you do and
    always perform at your peak level.


    ## Asking the Right Questions


    Most projects involve some element of the unfamiliar. Typically, this small chunk
    of the project is associated with deadlines and other pressures. Some people rise
    to the challenge, but others underperform. In situations like these, you need
    to realize that you cannot deliver a quality solution without a proper understanding
    of the underlying business rules. There will always be someone on your project
    who has the answers to your questions. Quite often your task as a data modeler
    is to find these subject matter experts, interview them, and ferret out as much
    information as possible. Getting information from people is an art, and you should
    practice it as often as possible.


    First, it is okay to admit to subject matter experts that your knowledge in a
    particular subject area is limited; this kind of admission typically disarms the
    other party, making them feel more sympathetic to your needs, more important,
    and thus more talkative.


    When you interview subject matter experts, minimize *close-ended questions* that
    lead to quick yes or no answers, because they impede the flow of fertile conversational
    exchange. Instead, ask *open-ended questions* fashioned to encourage full disclosure
    and meaningful discussion. For instance, asking a subject matter expert to explain
    a particular business process will facilitate a high-quality and productive discussion.


    ## Conclusion


    This chapter discussed a variety of topics, ranging from the overall structure
    of this book to the importance of being able to recognize and apply various modeling
    patterns. It emphasized that an eagerness to learn and a desire to gain new information
    are both key qualities if one hopes to find success in this industry, and that
    passively receiving information is not enough. Only through repeated practical
    applications of knowledge can we learn things and become successful. By being
    fearless when it comes to asking questions, we are able to master any particular
    business area. Finally, do it with passion or not at all!


    ## Recommended Reading


    Date, C.J. *Database in Depth: Relational Theory for Practitioners*. O’Reilly
    Media, 2005.


    Halpin, Terry, and Tony Morgan. *Information Modeling and Relational Databases*,
    2nd ed. Morgan Kaufmann, 2008.


    [¹](#9781430265894_Ch01.xhtml#_Fn1) Richard Barker, *CASE Method: Entity Relationship
    Modelling.* Addison-Wesley Longman, 1990.


    [²](#9781430265894_Ch01.xhtml#_Fn2) Oracle’s original tool, Oracle Designer, has
    been replaced by the Oracle SQL Developer Data Modeler. In recent years, Embarcadero
    ER/Studio and Sybase PowerDesigner have made Barker’s notation available.


    [³](#9781430265894_Ch01.xhtml#_Fn3) David C. Hay, *Data Model Patterns: Conventions
    of Thought*. Dorset House, 1995.


