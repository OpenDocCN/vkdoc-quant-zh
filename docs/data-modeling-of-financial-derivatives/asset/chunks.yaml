    # 互换合约与远期利率合约


    互换合约与远期利率合约在场外衍生品市场中扮演着重要角色。本章沿用惯例：先定义每种合约类型，解释其基础业务规则，然后进行建模。


    ## 定义互换


    **互换合约**是一种约定在未来按照预定时间表交换现金流的协议。该协议规定了现金流交换日期及现金流计算方法。


    第 4 章中讨论的远期合约是简单互换合约的一个实例。考虑以下假设情况：A 公司与 B 公司签订一份远期合约，约定在 2014 年 12 月 31 日以每盎司
    50 美元的价格买入 200 盎司铜。合约起始日为 2013 年 12 月 31 日。在合约到期日（2014 年 12 月 31 日），A 公司将收到 B
    公司的 200 盎司铜，并支付 10,000 美元（200 × 50 美元）。


    A 公司可采取的策略之一，是在当日以铜现货价格立即卖出这批铜。盈亏将由当日铜的现货价格决定。然而在实际操作中，远期合约的交割机制会被简化，最终以现金结算：铜的总数量（200
    盎司）乘以铜的现货价格与合约远期价格（每盎司 50 美元）的差额。请注意：现金流交换仅发生一次，即在远期合约的到期日。


    相比之下，互换合约则会在多个预定日期进行现金流交换。最流行的两种互换合约类型是：


    - 普通型利率互换

    - 固定对固定货币互换


    ## 普通型利率互换


    以下简单示例说明了**普通型利率互换**合约的运作方式。


    ![image](img/sq.jpg) **示例** 假设 A 公司有 10,000 美元可投资，当前利率为 4%。A 公司的财务主管可能认为利率近期会下跌，因此同意与
    B 公司按以下安排交换现金流：


    在两年期内，每半年一次，A 公司将按浮动利率支付利息，B 公司将按固定利率（例如 3.8%）支付利息，两者均基于相同的名义本金（10,000 美元）。两年期内的半年支付将产生四次支付交换。


    在普通型利率互换中，所用利率通常是 LIBOR。表 8-1 显示了该示例的假设支付计划，包括资金流入与流出。请注意，在互换合约存续期间，固定利率始终保持不变。


    表 8-1. 假设支付计划


    | ![9781430265894_Table08-01.jpg](img/9781430265894_Table08-01.jpg) |


    ## 固定对固定货币互换


    **固定对固定货币互换**实际上是一种将某国投资转换为另一国投资的机制。通过一个假设示例可以最好地解释其原理。


    ![image](img/sq.jpg) **示例** 假设 A 公司认为美元兑英镑将升值，因此决定投资美元。B 公司则持相反观点并投资英镑。同时，假设 A
    公司为美国公司，B 公司为英国公司。这两家公司可以约定一个本金（例如 800 万英镑和 1500 万美元），并按照预定时间表向对方支付固定金额（故称**固定对固定**）。在本例中，A
    公司将收到 800 万英镑，并支付 5%的固定利率利息。B 公司将收到 1500 万美元，并同意按此本金的 4.5%支付利息。在固定对固定货币互换结束时，本金加上剩余现金流将进行交换。


    固定对固定货币互换有助于企业更好地管理其对利率波动的风险敞口，并利用国内企业通常相对于外国企业所拥有的利率优势，获得更有利的利率。


    ## 国际互换与衍生品协会


    构成互换合约基础的文档称为**确认书**。标准的**确认协议**由国际互换与衍生品协会（ISDA, `www.isda.org`）设计，该确认书构成了场外市场每份互换协议的基础。确认协议及其结构将在“对
    ISDA 文档和确认书进行建模”一节中讨论。


    ## 对互换合约类型进行子类型化


    开始互换合约建模任务时，可以先进行一个相对简单的练习：对`合约类型`进行适当的子类型化（从而扩展），以涵盖`互换合约类型`。如您所知，`互换合约类型`可进一步细分为`固定对固定货币互换类型`和`普通型利率互换类型`（图
    8-1），从而深化您的`合约类型`层次结构。该模型看似简单，但日后将为您带来显著优势。通过将`合约`与特定的`合约类型`关联，可使合约继承用户能够理解并欣赏的特定业务规则。


    ![9781430265894_Fig08-01.jpg](img/9781430265894_Fig08-01.jpg)


    图 8-1. 将合约子类型化为互换类型


    ## 利率与利率类型


    第 6 章中期权合约估值的讨论将 LIBOR（伦敦银行间同业拆借利率）视为变量。在本节中，我们将偏离该做法，显式创建`利率`和`利率类型`实体。`利率类型`将进一步细分为`LIBOR
    利率类型`和`无风险利率类型`（图 8-2）。`利率类型`表示特定组织可能交易的利率类型，应视为通用蓝图。而`利率`则是特定日期观察到的实际利率。之所以显式建模这些实体，是因为在互换合约下，能够明确指定给定`合约`中特定`当事方`应负责哪种利率至关重要。


    ![9781430265894_Fig08-02.jpg](img/9781430265894_Fig08-02.jpg)


    图 8-2. 利率与利率类型

