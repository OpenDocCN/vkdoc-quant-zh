    with types. This is done by design; in metadata modeling, your job is to explain
    the internal constitution of the metadata in terms of types (or blueprints) rather
    than in terms of the actual embodiment of these types. The [Figure 7-2](#9781430265894_Ch07.xhtml#Fig2)
    model accommodates the more complex scenarios developed in the following sections.


    Bull Spreads


    If an investor feels that the price of a particular stock will rise modestly in
    the time span between time 1 and time 2, he may choose to implement a *bull spread
    strategy*. This strategy allows the investor to make a small profit when market
    conditions become favorable and protects him against excessive losses when conditions
    become unfavorable, thus limiting risk. For instance, an investor who has a call
    option with the strike price S1 might decide to give up potential future profit
    if the price increases to S2 to limit his risk.


    A bull spread strategy is executed by the following steps:


    1.  Buying a call option on a stock with a certain strike price (S1)

    2.  Selling a call option on the same stock with a higher strike price (S2, where
    S2 > S1). The hope here is that the stock price will go up during this time.

    3.  Both options expiring in the same month.


    To accommodate the bull spread strategy to the [Figure 7-2](#9781430265894_Ch07.xhtml#Fig2)
    data model, focus on the business rule specifying that the strike price S2 must
    be greater than the strike price S1 and that the options under consideration should
    expire in the same month. This business rule is our bull spread SPECIFICATION.


    The first metadata entry in the TRADING STRATEGY deals with the first contract
    metadata specification:


    *   CONTRACT TYPE**:** call

    *   ASSET TYPE: stock option asset type

    *   ROLE TYPE: buyer

    *   CLASSIFICATION TYPE**:** bull spread


    The second **en**try in the TRADING STRATEGY deals with the second contract specification:


    *   CONTRACT TYPE: call

    *   ASSET TYPE**:** stock option asset type

    *   ROLE TYPE: seller

    *   CLASSIFICATION TYPE**:** bull spread


    By following the same overall pattern, we can specify any trading strategy, including
    *bear spreads*, discussed in the next section.


    Bear Spreads


    If an investor anticipates that a particular stock price will go down, but not
    by much, he or she may choose to pursue a *bear spread strategy*. This strategy
    is executed through the following steps:


    1.  Buying a put option at a certain strike price (S1)

    2.  Selling a put option with another strike price (S2), where S1 > S2

    3.  Both options expiring in the same month.


    Here, the investor purchases the put option with the strike price S1 and decides
    to give up any potential profit at price S2, resulting in an intricately constructed
    mechanism designed to protect against excessive risk exposure. For this strategy
    to function properly, both contracts need to expire in the same month.


    The business rule specifying that the strike price S1 has to be greater than S2
    and that both contracts should expire in the same month is the bear spread SPECIFICATION.


    The first metadata entry in the TRADING STRATEGY deals with the first contract
    metadata specification:


    *   CONTRACT TYPE: put

    *   ASSET TYPE: stock option asset type

    *   ROLE TYPE: buyer

    *   CLASSIFICATION TYPE**:** BEAR SPREAD


    The second entry in the TRADING STRATEGY deals with the second contract specification:


    *   CONTRACT TYPE: put

    *   ASSET TYPE: stock option asset type

    *   ROLE TYPE: seller

    *   CLASSIFICATION TYPE: BEAR SPREAD


    In [Figure 7-3](#9781430265894_Ch07.xhtml#Fig3), the CLASSIFICATION TYPE supertype
    is widened by the addition of the BEAR SPREAD subtype.


    ![9781430265894_Fig07-03.jpg](images/9781430265894_Fig07-03.jpg)


    [Figure 7-3](#9781430265894_Ch07.xhtml#_Fig3). Extending the CLASSIFICATION TYPE
    and introducing the BEAR SPREAD subtype


    Revisiting the Contract Structure Entity


    As you know, the main purpose of the CONTRACT STRUCTURE and CLASSIFICATION TYPE
    entities is to assemble a pattern out of a collection of seemingly dispersed contracts
    (see [Figure 7-4](#9781430265894_Ch07.xhtml#Fig4)). You can easily query these
    two tables and retrieve the contracts that form the backbone of a particular trading
    strategy. By examining these contracts, you can determine:


    *   Where you stand in terms of execution of a specific trading strategy

    *   What work still needs to be done

    *   Whether any of the required offsetting contracts is absent


    ![9781430265894_Fig07-04.jpg](images/9781430265894_Fig07-04.jpg)


    [Figure 7-4](#9781430265894_Ch07.xhtml#_Fig4). Revisiting contract structure


    For instance, you expect to find two contracts in the CONTRACT STRUCTURE to account
    for a particular BULL SPREAD trading strategy. Any deviation from the expected
    results would be reason to investigate the data in question.


    In fact, by running queries against the CONTRACT STRUCTURE (and associated entities)
    you can perform various data forensics and can easily spot data anomalies related
    to a specific trading strategy. Once you spot data anomalies in the CONTRACT STRUCTURE,
    it is a relatively straightforward process to obtain the detailed information
    regarding who might be responsible for the questionable contracts. How do we do
    that? CONTRACT PARTICIPATION is a good place to start.


    The diagram in [Figure 7-5](#9781430265894_Ch07.xhtml#Fig5) ties together the
    by now familiar concepts of CONTRACT, CONTRACT STRUCTURE, and CONTRACT PARTICIPATION**,**
    enabling you to answer a variety of questions related to a particular CONTRACT,
    including those related to contract delivery, contract participation, and various
    other contract activities.


    ![9781430265894_Fig07-05.jpg](images/9781430265894_Fig07-05.jpg)


    [Figure 7-5](#9781430265894_Ch07.xhtml#_Fig5). Tying together contract participation
    and contract structure


    Conclusion


    This chapter showed the application of many concepts you learned in previous chapters
    to the practical tasks of modeling how financial engineers combine various contracts
    to produce unique and useful profit patterns. I urge you to practice as many data
    modeling tasks as possible. After all, practice makes perfect. A systematic application
    of your newly learned concepts will guarantee you success and recognition. Passive
    learning guarantees you nothing.


    Recommended Reading


    Robert L. McDonald, *Derivatives Markets*, 3rd ed. Prentice Hall, 2009.


    CHAPTER


    Swaps and Forward Rate Agreements


    *An optimist may see a light where there is none, but why must the pessimist always
    run to blow it out?*


    —Michel de Saint-Pierre'
