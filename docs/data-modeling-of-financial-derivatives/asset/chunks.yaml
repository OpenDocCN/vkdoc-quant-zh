    Rules Governing Relationships


    Following are the rules governing relationships when using Barker’s notation:


    *   A relationship may exist between a maximum of two entities.

    *   An entity may have a relationship with itself (called a recursive relationship).

    *   A relationship has two perspectives.

    *   Each perspective of a given relationship should be labeled.


    Relationships between Subtypes


    [Figure 2-7](#9781430265894_Ch02.xhtml#Fig7) emphasizes how subtypes themselves
    can participate in various relationships. For instance, a subtype of the PARTY
    called a PERSON participates in the relationship with the PARTY EDUCATION. The
    ability to diagrammatically create relationships between subtypes and other entities
    is an important aid to a data specialist and is a tool widely used in the industry.


    ![9781430265894_Fig02-07.jpg](images/9781430265894_Fig02-07.jpg)


    [Figure 2-7](#9781430265894_Ch02.xhtml#_Fig7). Recording subtype relationships


    A more complicated and nuanced situation that often confuses novice modelers is
    depicted in [Figure 2-8](#9781430265894_Ch02.xhtml#Fig8). Here we have established
    relationships between two subtypes of the same supertype. A PERSON and an ORGANIZATION
    form an employment relationship (represented in the model by an entity called
    EMPLOYMENT). But what if your business requirement allows for an ORGANIZATION
    to participate in an employment relationship with another ORGANIZATION? This situation
    may arise in the real world, where one company subcontracts with another company
    to do work. In this case, the relationship between the EMPLOYMENT and PERSON entities
    should be modified to a relationship between the EMPLOYMENT and PARTY entities
    to make the relationship more generic.


    ![9781430265894_Fig02-08.jpg](images/9781430265894_Fig02-08.jpg)


    [Figure 2-8](#9781430265894_Ch02.xhtml#_Fig8). Relationship between subtypes


    What about a business rule that states that under certain circumstances a PARTY
    may employ another PARTY? In such a case, we would probably want to establish
    two relationships between PARTY and EMPLOYMENT, thus allowing any subtype of a
    PARTY to participate in an employment relationship with another PARTY.


