  raw: 'At this point you have seen two approaches that deal with interest rate maintenance
    and tracking. In the previous chapters you’ve learned how to accomplish such a
    task by using dynamic variables. This section shows you how to implement the same
    functionality with the use of INTEREST RATE and INTEREST RATE TYPE entities. The
    entity approach is more explicit, direct, and easy to understand. However, implementation
    through the use of variables can be an excellent solution when you don’t want
    to hard-code something and you need a more flexible and dynamic approach.


    Fixed and Floating Rate Player Roles


    The foregoing discussion of swap contracts introduces two new ROLE TYPES into
    our modeling toolbox ([Figure 8-3](#9781430265894_Ch08.xhtml#Fig3)):


    *   A FIXED RATE PLAYER

    *   A FLOATING RATE PLAYER


    ![9781430265894_Fig08-03.jpg](images/9781430265894_Fig08-03.jpg)


    [Figure 8-3](#9781430265894_Ch08.xhtml#_Fig3). Fixed and floating rate player
    roles


    Being able to precisely identify each party’s role in a given swap contract is
    essential from the business requirement’s point of view and is often a technical
    necessity. The model in [Figure 8-3](#9781430265894_Ch08.xhtml#Fig3) may look
    relatively simple, but within the context of a larger data model it will better
    articulate the underlying business rules and improve communication with your end
    users.


    Modeling Swap Contract Participation


    [Figure 8-4](#9781430265894_Ch08.xhtml#Fig4) diagrams the swap contract’s participation
    subject area. To keep the starting model simple and focused, ROLE TYPE is subtyped
    into only:


    *   A FIXED RATE PLAYER

    *   A FLOATING RATE PLAYER


    ![9781430265894_Fig08-04.jpg](images/9781430265894_Fig08-04.jpg)


    [Figure 8-4](#9781430265894_Ch08.xhtml#_Fig4). Modeling swap contract participation


    The BUYER and SELLER subtypes are removed deliberately, because these role types
    are not applicable to our current situation.


    FIXED-FOR-FIXED CURRENCY SWAP TYPE contracts involve at least two participants,
    each playing a FIXED RATE PLAYER role. PLAIN VANILLA INTEREST RATE SWAP TYPE contracts,
    on the other hand, involve at least two contract participants, each playing either
    a FIXED RATE PLAYER role or a FLOATING RATE PLAYER role. The relationship between
    the CONTRACT and CONTRACT PARTICIPATION entities is mandatory on both sides. As
    mentioned previously, make sure that in your documentation you clearly specify
    the reasoning behind why the relationship is mandatory on both sides and the business
    rule that this relationship attempts to enforce. CONTRACT and CONTRACT PARTICIPATION
    will have to be populated together as part of the same database transaction.


    Modeling Swap Contract Asset Allocation and Payoff Schedules


    Parties that participate in a swap agreement may either physically exchange principal
    amounts (a practice that rarely occurs) or agree to these amounts on paper. Because
    the principal amount rarely changes hands, it is called a *notional principal*
    . The amount that each party agrees to pay the other according to a specific schedule
    (which is the function of the contract-specific interest rate) should be treated
    as a paper asset unless physical delivery is made.


    CONTRACT ASSET ALLOCATION ([Figure 8-5](#9781430265894_Ch08.xhtml#Fig5)) associates
    an ASSET or an ASSET TYPE with a given PARTY within the context of a given swap
    CONTRACT. Here we will specify the mutually agreed-on principal amounts. Note
    that the model displays the ASSET entity on the CONTRACT ASSET ALLOCATION level
    because your business requirements may require you to account for the fact that
    the principal amounts may physically change hands. Remember, though, that a notional
    principal amount never changes hands.


    ![9781430265894_Fig08-05.jpg](images/9781430265894_Fig08-05.jpg)


    [Figure 8-5](#9781430265894_Ch08.xhtml#_Fig5). Modeling a swap contract asset
    allocation and payoff schedule (full version)


    Consider a swap contract between investor A and investor B. Presume that this
    particular contract was signed on July 1, 2013, and lasts for two years. The first
    exchange of payments occurs on January 1, 2014\. The notional principal amount
    is set to US$10,000, and the payments are exchanged semi-annually. During the
    life of this swap contract, investor A agrees to pay a flat 5 percent rate per
    annum (a fixed amount) on the notional principal and investor B agrees to pay
    the six-month LIBOR rate (a variable amount) on the same notional principal.


    This contract is classified as a plain vanilla interest rate swap type. Investor
    A would be considered a fixed rate player and investor B a floating rate player.
    Both parties agree on the notional principal amount (meaning that this amount
    never changes hands), which is of the USD TYPE (a subtype of the CURRENCY ASSET
    CLASS TYPE). CONTRACT ASSET ALLOCATION stores a record for each party; in this
    case both parties are associated with the ASSET TYPE of USD TYPE and a CONTRACT
    ASSET ALLOCATION amount equal to 10,000\. The hypothetical swap contract will
    last for two years and payments will be made semi-annually, thus resulting in
    four overall payments. The SWAP PARTY RATE TYPE SCHEDULE will store four rows
    for each investor, explicitly specifying when a particular payment from each party
    is due. Investor A (the fixed rate player) is associated with the FIXED RATE TYPE,
    where the actual interest rate can be easily specified (5 percent in this case).
    Investor B (the floating rate player) is associated with the LIBOR RATE TYPE,
    where the actual interest rate is set to the six-month LIBOR rate prevalent six
    months prior to the first payment date. Investors A and B both know well in advance
    the first LIBOR rate that investor B will have to pay. Subsequent six-month LIBOR
    rates will be unknown and will be observed on each scheduled payment date.


    There are several choices available for populating the SWAP PARTY RATE TYPE SCHEDULE
    table with data. The first option involves populating the SWAP PARTY RATE TYPE
    SCHEDULE one row at a time, whenever an unknown interest rate becomes widely available.
    The second option involves pre-populating all rows for each party well in advance
    and maintaining an unknown interest rate in a nullable field. Once the unknown
    interest rate data becomes available, it can be inserted into the SWAP PARTY RATE
    TYPE SCHEDULE to keep it up to date.


    Unfortunately, the diagram in [Figure 8-5](#9781430265894_Ch08.xhtml#Fig5) contains
    too many entities and has become difficult to read and interpret. For instance,
    to save space the INTEREST RATE entity has to be depicted without any of its underlying
    subtypes. To rectify this, a simplified version of this model is displayed in
    [Figure 8-6](#9781430265894_Ch08.xhtml#Fig6). This new diagram makes things clearer
    and less ambiguous because it contains fewer entities.


    ![9781430265894_Fig08-06.jpg](images/9781430265894_Fig08-06.jpg)


    [Figure 8-6](#9781430265894_Ch08.xhtml#_Fig6). Modeling a swap contract asset
    allocation and payoff schedule (simplified version)


    Note that the exclusivity arc around the CONTRACT ASSET ALLOCATION entity indicates
    that the principal amounts may actually change hands. Once again, this doesn’t
    happen very often. If, per your underlying business rules, you don’t expect this
    to happen, you can simplify the resulting model and remove the ASSET entity (and
    the associated relationships). Additionally, notice the presence of the relationship
    between the SWAP PARTY RATE TYPE SCHEDULE and the ASSET TYPE; it indicates that
    the scheduled payments (implemented via the SWAP PARTY RATE TYPE SCHEDULE) are
    treated as paper assets. The relationship between the SWAP PARTY RATE TYPE SCHEDULE
    and the INTEREST RATE (the actual observed interest rate) is nonmandatory on both
    sides because these data will only become available at a later point.


