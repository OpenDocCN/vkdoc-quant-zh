- fmt: 'Consider an example: investor A enters into a forward contract that begins
    in one month (time `T1`) and lasts for one year (contract expiration date `T2`)
    to buy British pounds sterling (`GBP`) for a certain price (`S1`). At the same
    time the same investor enters into another forward contract, where the contract
    start date is `T1` and the contract expiration date is `T2`, to sell British pounds
    sterling (`GBP`) for a certain price (`S2`). Cases like these occur frequently
    in practice, so it is important to learn how to model them.


    The [Figure 4-10](#9781430265894_Ch04.xhtml#Fig10) diagram keeps track of the
    overall contract strategy while ensuring that the modeler can easily track any
    `CONTRACT` dependencies and identify a group of related contracts (achieved through
    the `CLASSIFICATION TYPE`). Depending on your business requirements, you most
    likely will be asked to trace various contract dependencies and generate various
    historical data reports. The model, depicted in [Figure 4-10](#9781430265894_Ch04.xhtml#Fig10),
    can easily accommodate requests like these. The `CLASSIFICATION TYPE` entity will
    be discussed further in subsequent chapters. Note the presence of the `transaction
    ID` attribute (a `CONTRACT STRUCTURE` entity). Its purpose is to link all related
    contracts together that are part of the same classification type.


    ![9781430265894_Fig04-10.jpg](images/9781430265894_Fig04-10.jpg)


    [Figure 4-10](#9781430265894_Ch04.xhtml#_Fig10). Maintaining contract dependency


    [Figure 4-11](#9781430265894_Ch04.xhtml#Fig11) presents a simpler variation on
    the structure depicted in [Figure 4-10](#9781430265894_Ch04.xhtml#Fig10) that
    will allow you to keep track of various dependencies between several `CONTRACTS`
    by modeling contract dependency using a simple hierarchy. Before putting this
    model to use, however, make sure you are aware of its limitations. The structure
    implemented in [Figure 4-10](#9781430265894_Ch04.xhtml#Fig10) (using the many-to-many
    recursive relationship) will give you a far better level of flexibility than what
    can be obtained with a simple hierarchy (as with [Figure 4-11](#9781430265894_Ch04.xhtml#Fig11)).
    I recommend that you keep your options open and, when the time comes, be ready
    to present multiple solutions to the same problem.


    ![9781430265894_Fig04-11.jpg](images/9781430265894_Fig04-11.jpg)


    [Figure 4-11](#9781430265894_Ch04.xhtml#_Fig11). Maintaining contract dependency
    using a simple hierarchy


    ## Forward Contract Termination


    The main assumption behind forward contracts is that contract participants will
    retain their positions until the completion of the contract when completion delivery
    is made, payments are received, and the given contract is successfully closed.
    However, there are situations when one party would like to close out his or her
    position prior to contract termination. In cases like this, that party is taking
    an opposite position in a forward contract with the same underlying asset type
    and a similar expiration date. The forward price, however, will probably be different.
    An example will serve to illustrate this type of situation.


    ![image](images/sq.jpg) **Example**  Investor A enters into a soybean forward
    contract on the following terms:


    *   Starts on June 1, 2014

    *   Terminates on December 1, 2014

    *   The agreed-on quantity is 100 pounds

    *   Forward price is US$1,000


    ![image](images/sq.jpg) **Note**  Note  On June 15, 2014, investor A decides to
    terminate this forward contract early and enters into an offsetting soybean forward
    contract to sell 100 pounds of soybeans for $1,100 on December 15, 2014. If you
    carefully analyze these transactions, you will realize that investor A simply
    limits his losses by locking in the December soybean price. If everything goes
    as planned, on December 1, 2014, investor A:


    *   Pays $1,000

    *   Obtains 100 pounds of soybeans


    ![image](images/sq.jpg) **Note**  Note  On December 15, 2014, the same investor
    A (with a net gain of $100):


    *   Delivers 100 pounds of soybeans

    *   Receives $1,100 in return


    Note that the forward contract termination can be tracked and maintained using
    `CONTRACT STRUCTURE` and `CLASSIFICATION TYPE` entities modeled in [Figure 4-10](#9781430265894_Ch04.xhtml#Fig10).


    ## Lawsuits and Violations


    There will always a fear on the part of your end user that a party to the contract
    may need to default on his or her contractual obligation. Typically, the consequences
    of this default will be a lengthy lawsuit. Aside from lawsuits, a given contract
    may also be the subject of various `REGULATIONS` (`FEDERAL REGULATIONS` and `STATE
    REGULATIONS`). The [Figure 4-12](#9781430265894_Ch04.xhtml#Fig12) diagram depicts
    how the `CONSEQUENCE` entity may be modeled.


    ![9781430265894_Fig04-12.jpg](images/9781430265894_Fig04-12.jpg)


    [Figure 4-12](#9781430265894_Ch04.xhtml#_Fig12). Modeling lawsuits and violations


    In the [Figure 4-12](#9781430265894_Ch04.xhtml#Fig12) model, the `CONSEQUENCES`
    are tracked on a `CONTRACT` level. You are always free to fine-tune this model
    and track the `CONSEQUENCES` on a `CONTRACT ACTIVITY` level. Indeed, sometimes
    it’s not the contract itself but the actions performed on behalf of a given contract
    (represented by the `CONTRACT ACTIVITY`) that could be the subject of a lawsuit.
    The [Figure 4-13](#9781430265894_Ch04.xhtml#Fig13) diagram extends the original
    “lawsuits and violations” model by relating `CONSEQUENCE` to `CONTRACT ACTIVITY`.
    Please note that the relationship between `CONSEQUENCE` and `CONTRACT ACTIVITY`
    is nonmandatory on both sides.


    ![9781430265894_Fig04-13.jpg](images/9781430265894_Fig04-13.jpg)


    [Figure 4-13](#9781430265894_Ch04.xhtml#_Fig13). Modeling lawsuits and violations
    (a more complicated model)


    ## Conclusion


    This chapter introduced you to the complex world of forward contracts by discussing
    and modeling various business requirements ranging from forward contract delivery
    to forward contract consequences. The core building blocks used in this chapter
    were constructed and discussed in the previous chapters. This chapter focused
    on implementation, identifying a set of business rules, and creating various starter
    models by following those rules. After all, a contract is a contract, and once
    you know how to model it, you should be able to create a good starter model for
    any basic type. Once your starter model is complete, use your business rules to
    shape and mold it as required. Accommodate future changes preemptively through
    generalization, and don’t sacrifice robustness and stability for ease of programming;
    you''ll seldom be happy with the outcome.


    CHAPTER


    # Modeling Futures Contracts


    *When it is not in our power to follow what is true, we ought to follow what is
    most probable.*


    —René Descartes, *Le Discours de la Méthode*


    Most of the modeling principles we learned in the last chapter are applicable
    to the subject of this chapter: *futures contracts* (aka *futures*). Futures share
    many features with forward contracts, but a fundamental difference between them
    is how each one approaches the risk factor. Forward contracts are risky, with
    the shadow of a default always looming. Futures contracts, on the other hand,
    are deemed to be less risky because they are traded on exchanges. Exchange-imposed
    rules buffer investors against some of the risk because they make default events
    less likely. Every major exchange has implemented a set of intricate rules that
    all concerned parties must follow and obey. Moreover, each exchange’s enforcement
    of these rules guarantees that a contract has a good chance of being honored by
    each contract participant.'
