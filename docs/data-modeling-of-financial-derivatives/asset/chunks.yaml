    # About the Author


    ![image](images/9781430265894_unFM-01.jpg)


    **Robert Mamayev** is president of `BinaryCurve.com`. He has 15 years of experience
    as a data modeling, data warehousing, and data architect lead in the pharmaceutical,
    financial and government sectors. He is a trainer and developer of instructional
    materials in the field of data modeling. He is a certified Oracle Professional
    and holds a BS in computer science from Queens College.


    # Acknowledgments


    I am profoundly grateful for the love, support, and constant encouragement of
    my amazing family, without whom this work would not have been possible.


    I would like to express my great appreciation to the many other people who provided
    me support, encouragement, and advice during the writing of this book. I am especially
    grateful to Rebecca Stout and Joseph Licata for helping me edit the manuscript
    and to David C. Hay for reviewing and improving significant portions of the manuscript.


    # Preface


    *Endeavor always to conquer yourself rather than fortune.*


    —René Descartes, *Le Discours de la Méthode*


    Recently I witnessed an argument between two close friends, both of them data
    modeling practitioners. At issue was whether data modeling is an art form. One
    argued that successful data modelers are a select and unique breed of software
    professionals whose skills cannot be taught; you’re either born with them or you’re
    out of luck. The other argued that practically anyone can be taught data modeling
    and become a successful data modeling practitioner.


    I didn’t take part in this discussion, preferring to stay out of it. As a dedicated
    student of Dale Carnegie, I know that the best way to “win friends and influence
    people” is to avoid such arguments altogether. But now is the occasion for me
    to open up and express what I feel on the subject. I do not consider data modeling
    to be an innate art. To me, data modeling is a learned skill that gets better
    and better with experience. Data modeling, like any other profession, requires
    dedication, practice, and passion. Most knowledge is perishable and diminishes
    with the passage of time unless continually refreshed and exercised. To become
    good at something and stay good at it, you need to practice and practice hard.
    It is through practice and action that you really learn things and become confident
    in whatever it is you are doing.


    # Chapter 1: Introduction


    *It is not enough to have a good mind; the main thing is to use it well.*


    —René Descartes, *Le Discours de la Méthode*


    ## The Purpose of This Book


    The purpose of this book is twofold. On one hand, it introduces readers to the
    fascinating world of financial derivatives from the data modeling perspective
    and explains various rules that govern the world of financial engineering. On
    the other hand, this book stresses the importance of data modeling patterns and
    points out how to recognize, apply, and reuse them. This book is not intended
    just for those with a background in finance but for anyone with an interest in
    data modeling and business analysis. Data modeling patterns and the various strategies
    discussed in this book are widely applicable elsewhere, and the lessons learned
    here can be applied to projects in many industries besides finance, such as pharmaceuticals.


    ## The Audience for This Book


    This book is designed for two types of readers:


    *   Professionals knowledgeable about derivatives who are interested in techniques
    for representing and dealing with the complexity of their logic

    *   People experienced in conceptual data modeling who would like to use the analytical
    skills they have acquired to learn about derivatives


    Prior knowledge of derivative instruments is not a prerequisite to read this book.
    I thoroughly explain every financial topic before I model it. Although you should
    have had at least some prior exposure to conceptual data modeling as a practitioner,
    a deep knowledge of data modeling is not required either. [Chapter 2](#9781430265894_Ch02.xhtml)
    will teach you all the techniques of data modeling that will be applied throughout
    the book to generate the models. Even if you are experienced in modeling derivative
    instruments, this book will teach you unfamiliar modeling strategies that you
    can begin applying in your own work right away.


    Whatever your occupation and industry, if you can recognize and manipulate data
    modeling patterns, your career will benefit. Data modeling patterns are the industry-approved
    solutions to common problems found across various industries. These solutions
    have been tested and refined to the point that they are robust, simple, and intuitive.
    This book identifies the most important data modeling patterns and shows you how
    to apply them in practice. A knowledge of data modeling patterns, coupled with
    a thorough understanding of the underlying business rules, will result in high-quality
    and effective solutions that can be delivered quickly and on budget.


    ## Book Structure'
