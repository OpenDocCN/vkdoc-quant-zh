    terminology and discusses the basics of financial contracts.


    What Is a Contract?


    A *contract* is a binding agreement between two or more parties to exchange specified
    goods or services on specified terms. At least two parties must be engaged if
    there is to be a valid contract: a party that proposes something and a party that
    accepts that something ([Figure 3-1](#9781430265894_Ch03.xhtml#Fig1)). An agreement
    to sell and buy a particular product or service at a certain point in time and
    at a particular price is an example of a simple contract. Besides the offeror
    and the offeree, additional parties may participate in a given contract in various
    capacities, such as joint offerees, agents, receivers, referenced subsidiaries,
    and executors. For instance, one party may draft a particular contract and another
    party may supervise it. Your organization will identify the participants it wants
    to store and maintain well in advance, most likely based on the roles these parties
    play in the underlying contract.


    ![9781430265894_Fig03-01.jpg](images/9781430265894_Fig03-01.jpg)


    [Figure 3-1](#9781430265894_Ch03.xhtml#_Fig1). Model of a basic contract


    A party may play multiple roles in any given contract. The CONTRACT entity, the
    way it is modeled in [Figure 3-1](#9781430265894_Ch03.xhtml#Fig1), must be associated
    with at least two other PARTIES (identified by the “offers service” and “consumes
    service” relationships), with the “endorser of” relationship being optional. One
    limitation of this model is immediately obvious: it cannot be easily extended
    in terms of role specification. For instance, a PARTY may play the role of a “legal
    advisor” or a “contract draftee” for the underlying CONTRACT, and the model may
    need to account for this. Remember that a contract (especially a financial one)
    may contain a significant number of details; it is a legal document, and each
    aspect of it may need to be represented in the model. Faced with such a need,
    it is reasonable to consider extending (or widening) the CONTRACT entity by appending
    attributes to it, but this solution is not very elegant and is highly rigid. By
    resorting to this approach, we are limiting ourselves to extending our model only
    through a *data definition language* (DDL), which eventually might require us
    to alter our programming logic. Anyone who has attempted this approach will tell
    you that it is a nightmare for both project architects and code developers.


    Another feature the plain vanilla model in [Figure 3-1](#9781430265894_Ch03.xhtml#Fig1)
    lacks is the ability to create party roles dynamically. Your organization may
    identify a pool of roles they are interested in storing and maintaining. Even
    if this pool is approved by upper management, there is no guarantee that the list
    won’t be altered. One option would be to hard code these party roles; another
    option would be to introduce a new entity, a ROLE TYPE, resulting in an elegant
    and creative solution to the problem ([Figure 3-2](#9781430265894_Ch03.xhtml#Fig2)).


    ![9781430265894_Fig03-02.jpg](images/9781430265894_Fig03-02.jpg)


    [Figure 3-2](#9781430265894_Ch03.xhtml#_Fig2). Model of contract participation


    Note the solid (mandatory) relationship line between the CONTRACT and CONTRACT
    PARTICIPATION. Typically, you should approach mandatory-on-both-ends relationships
    (including one-to-many relationships) with caution. This doesn’t mean that such
    configurations don’t exist or that they should always be avoided. Mandatory-on-both-ends
    relationships do exist, albeit not very often, and they serve a particular purpose
    and emphasize a unique business rule.


    In our example, the mandatory-on-both-ends relationship emphasizes a business
    rule which states that the entries in the CONTRACT and CONTRACT PARTICIPATION
    entities must be populated within the same transaction. For instance, your programming
    logic will have to ensure that for each contract you have at least two contract
    participants, with one playing the buyer and one playing the seller role. Note
    that a given contract may be associated with other roles (and not solely those
    of buyer and seller), and a business rule should be developed that clearly specifies
    the role types that are critical within the context of a given contract.


    Note that the CONTRACT PARTICIPATION entity has not been designed to store and
    maintain historical data. As mentioned previously, modelers are often obligated
    (from a legal perspective) to maintain and keep track of every alteration to the
    contract’s data. To maintain an accurate contract participation history, I suggest
    creating a new entity called HISTORICAL CONTRACT PARTICIPATION, discussed next.


    Maintaining a Contract Participation History


    The diagram in [Figure 3-3](#9781430265894_Ch03.xhtml#Fig3) models a solution
    to the problem posed in the preceding section: how to create and maintain a proper
    contract participation history. The purpose of the HISTORICAL CONTRACT PARTICIPATION
    entity in this example is to maintain and store all of the changes (insertions,
    updates, and deletions) that were made to the CONTRACT PARTICIPATION records.
    Typically, in a large database one will find a set of “HIST_” prefixed tables
    that are intended to store and maintain the history of the underlying tables.
    Whenever a record gets altered in the source table, a database trigger fires and
    propagates the necessary changes to the underlying “HIST_” tables. A *database
    trigger* is a piece of code that is attached to a table and executed in response
    to certain predefined events.


    ![9781430265894_Fig03-03.jpg](images/9781430265894_Fig03-03.jpg)


    [Figure 3-3](#9781430265894_Ch03.xhtml#_Fig3). Example of a properly maintained
    contract participation history


    Differentiating between a Contract and a Contract Type


    The model in [Figure 3-4](#9781430265894_Ch03.xhtml#Fig4) introduces another entity
    called a CONTRACT TYPE. A CONTRACT TYPE represents a catalog or blueprint of all
    available contracts. A CONTRACT, on the other hand, represents a legal entity—a
    physical embodiment of a contract type—to which at least two parties have agreed
    and signed on a particular date. If we adopt the *object-oriented* (OO) terminology,
    we say that a CONTRACT TYPE A (a subtype of a CONTRACT TYPE) is a base class that
    can be instantiated. An instance of a CONTRACT TYPE A base class is the actual
    CONTRACT.


    ![9781430265894_Fig03-04.jpg](images/9781430265894_Fig03-04.jpg)


    [Figure 3-4](#9781430265894_Ch03.xhtml#_Fig4). Differentiating between a contract
    and a contract type'
