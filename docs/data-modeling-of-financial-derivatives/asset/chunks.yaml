    根据您的模型，`CONTRACT STRUCTURE`可能依赖也可能不依赖`CONTRACT TYPE STRUCTURE`。实际上，您可以强制要求这种关系，以强制执行每条`CONTRACT
    STRUCTURE`必须由一个且仅由一个`CONTRACT TYPE STRUCTURE`指定的规则。通常，您的业务需求将指导您如何塑造最终的数据模型以适应当前客户的需求。


    以下假设示例将有助于阐明`CONTRACT STRUCTURE`与`CONTRACT TYPE STRUCTURE`之间的区别。假设您的组织发布了一份官方允许的合同类型列表，以及一份描述这些合同类型应如何组合（包括其特定顺序）的相应规范。此列表非常适合存储在`CONTRACT
    TYPE STRUCTURE`中。现在考虑一位投资者，他决定签订多份实体合同以创建某种特定的支付函数。我们的投资者签订的实体合同列表应存储在`CONTRACT
    STRUCTURE`中。如果要强制该投资者在签订实体合同前查阅`CONTRACT TYPE STRUCTURE`数据，则`CONTRACT STRUCTURE`与`CONTRACT
    TYPE STRUCTURE`之间的关系应修改为强制性关系（在`CONTRACT STRUCTURE`一方）。


    ## 合同变量及其分配


    通常，建模衍生合同涉及将这些合同与各种参数或*变量*关联起来。这些变量的重要性巨大；它们常常几乎独自决定给定金融合同的结果。维护这些变量对金融数据建模者来说至关重要，其设计应极为谨慎。例如，以下变量可能会被用到：


    *   特定地理区域的降水量

    *   特定地理区域的周、月或日平均温度

    *   隐含波动率值

    *   `LIBOR`¹ 和无风险利率


    您可能会疑惑投资者为何对了解温度和降水量感兴趣。如果投资者参与的是农业合同，他或她将非常有兴趣知道特定区域是否预期会出现干旱，以及其庄稼可能受影响的百分比。


    作为将这些变量硬编码到应用程序代码中的一种替代方案，图 3-9 中描绘的模型以更优雅、动态的方式解决了这个问题。² 特定`CONTRACT`与`VARIABLE`之间的多对多关系通过`VARIABLE
    ASSIGNMENT`交集实体得以解决。在这里，我们可以动态指定用于评估合同并确定其结果的变量。


    ![9781430265894_Fig03-09.jpg](img/9781430265894_Fig03-09.jpg)


    图 3-9. 建模变量


    一个建议的`SUGGESTED VARIABLE ASSIGNMENT`交集实体解决了`VARIABLE`与`CONTRACT TYPE`之间的多对多关系。此实体的目的是建议特定合同类型可能需要的变量。您可以将其视为建议，因为`SUGGESTED
    VARIABLE ASSIGNMENT`与`VARIABLE ASSIGNMENT`之间的关系在双方都是非强制性的。您的需求将指导您如何建模此关系。如有必要，您可以强制此关系为强制性关系，以强制执行每条变量分配必须由一条建议的变量分配来建议的业务规则。`VARIABLE
    OBSERVATION`实体存储了在特定日期和时间记录的实际变量观测值。从`VARIABLE OBSERVATION`出发的两条关系是互斥的，因为您只能实际观测到合同分配的变量（通过`VARIABLE
    ASSIGNMENT`）或通过`SUGGESTED VARIABLE ASSIGNMENT`指定的变量。


    ## 业务策略


    本节考虑一个名为`BUSINESS STRATEGY`的实体（参见图 3-10）。*业务策略*概述了一系列旨在维持公司竞争优势的行动。或者，它也可以被视为公司可能用来改善其利润底线的方法。通常，从业者必须在特定金融合同的上下文中对业务策略进行建模。`SETTLEMENT
    STRATEGY`和`CONTRACT MARKET ASSESSMENT`是业务策略的两个示例。执行特定`BUSINESS STRATEGY`所需的一系列行动项在`BUSINESS
    STRATEGY ACTION ITEMS`中概述。这些规则通常成为一套*标准操作程序*（SOP），指导企业在特定条件下如何推进以及采取哪些步骤。


    ![9781430265894_Fig03-10.jpg](img/9781430265894_Fig03-10.jpg)


    图 3-10. 介绍业务策略与业务策略行动项


    以`SETTLEMENT STRATEGY`为例。`BUSINESS STRATEGY ACTION ITEMS`可能概述了组织必须执行的终止特定合同的必要步骤，包括接受入境交付所需的步骤。接受交付是一个极其复杂的过程，需要众多方的合作。例如，为了接受对手方的交付，组织必须：


    *   安排资产运输到最终目的地。

    *   确定负责特定活动的个人。


    这些细节必须提前规划好，以使组织准备好接受外部来源的交付。


    作为每个业务的关键组成部分，业务策略在实施前必须获得批准。`BUSINESS STRATEGY AUTHORIZATION`列出了已授权特定`BUSINESS
    STRATEGY`的各相关方以及授权发生的对应日期。


    ## 抵押品

    '
- fmt: '为了最大限度地降低违约风险，参与金融合同的各方通常需要向第三方存入一笔“抵押品”存款。然而，抵押品存款并非强制要求，需要双方同意。有时，只有信用评级较低的一方有义务进行存款。谁存款、存款的金额和形式将由签订合同的双方协商确定。抵押品用于保护合同参与者免受违约损失。最简单的抵押品方案仅要求合同参与者在合同生效日存入一次款项，无需任何额外存款。更复杂的抵押品方案可能涉及衡量市场波动，并要求合同参与者追加存款（有时甚至每日追加）以反映市场变化。


    [Figure 3-11](#9781430265894_Ch03.xhtml#Fig11) 描述了一个基础抵押品数据模型。为保持重点突出且简洁，该图仅列出对当前讨论有意义的实体。需要注意的是，`COLLATERAL`（抵押品）与实际的物理资产相关。`PARTY`（参与方）与`COLLATERAL`（抵押品）之间的关系有助于我们识别任何可能暂时持有合同中引用的物理资产的第三方。根据我们的模型，第三方可以是`PERSON`（个人）或`ORGANIZATION`（组织）。


    ![9781430265894_Fig03-11.jpg](images/9781430265894_Fig03-11.jpg)


    [Figure 3-11](#9781430265894_Ch03.xhtml#_Fig11)。远期合同抵押品模型


    考虑以下假设示例。两家公司 A 和 B 已同意签订一份金融合同并存入抵押品。该合同的条款如下：


    *   A 公司同意以 10,000 美元的价格从 B 公司购买一吨铜。

    *   合同生效日为 2014 年 6 月 1 日，合同到期日为 2014 年 12 月 1 日。

    *   双方公司同意在 2014 年 6 月 1 日至 2014 年 12 月 1 日期间，向第三方 C 公司各存入 10,000 美元（作为抵押品存款）。


    在此案例中，选择了最简单的抵押品方案，抵押品付款仅存入一次。


    ## 合同交付（Contract Delivery）


    合同交付建模（[Figure 3-12](#9781430265894_Ch03.xhtml#Fig12)）涉及`DELIVERY`（交付）实体及其关联的子类型，包括：


    *   `OUTBOUND DELIVERY`（出库交付）

    *   `INBOUND DELIVERY`（入库交付）

    *   `CASH SETTLEMENT`（现金结算）


    ![9781430265894_Fig03-12.jpg](images/9781430265894_Fig03-12.jpg)


    [Figure 3-12](#9781430265894_Ch03.xhtml#_Fig12)。交付子类型


    当一方为履行合同（无论是全部还是部分）而交付资产时，即构成“出库交付”。当一方接收用于履行合同（无论是全部还是部分）的资产时，即构成“入库交付”。“现金结算”是交付的另一种子类型，在金融合同结算中扮演着重要角色。很大比例的金融合同只能以现金结算。请注意，在所有情况下（无论是现金结算还是入库/出库交付），至少会收到一项物理资产。


    对交付实体划分子类型的最重要原因是法律上的考虑。当对特定交付方法的合法性产生疑问时，将特定合同与交付子类型关联起来就显得尤为重要。所有合同，尤其是金融合同，都可能产生法律后果。模型应反映并能够重建每一个法律细节，无论其多么微小。交付主题领域是法律难题的关键部分，应谨慎描述和建模。


    交付主题领域的另一个有趣方面是“部分交付”的概念。当买方仅收到约定数量的部分物品时，就会发生部分交付。例如，投资者 A 可能预期在某个日期前收到 10 吨铝棒。对手方投资者
    B 可能在该日期前只能交付 9 吨铝棒。在大多数情况下，投资者 A 会推迟向投资者 B 付款，直到全部数量（10 吨）交付完毕。


    您的基础业务规则可能允许部分交付，在这种情况下，您可能需要对它们进行建模。[Figure 3-13](#9781430265894_Ch03.xhtml#Fig13)
    中的模型展示了如何使用现在应该已经熟悉的一对多递归关系来建模部分交付。（为了简洁，从该模型中移除了`CASH SETTLEMENT`子类型。）部分交付在实践中并不常见的主要原因是仓储和运输成本高昂。现代经济学理论告诉我们，没有“免费的午餐”，总得有人为此买单（而大多数金融合同参与者都不愿意这样做）。


    ![9781430265894_Fig03-13.jpg](images/9781430265894_Fig03-13.jpg)


    [Figure 3-13](#9781430265894_Ch03.xhtml#_Fig13)。部分交付建模


    [Figure 3-14](#9781430265894_Ch03.xhtml#Fig14) 对合同的交付主题领域进行了建模。（为清晰简洁起见，图中未包含与当前讨论无关的实体。）代表特定合同执行的那些活动存储在`CONTRACT
    ACTIVITY`（合同活动）中。这些合同活动由`BUSINESS STRATEGY ACTION ITEMS`（业务战略行动项）指定，而这些行动项又由`BUSINESS
    STRATEGY`（业务战略）标识。`SETTLEMENT STRATEGY`（结算策略）是`BUSINESS STRATEGY`（业务战略）的一个子类型，专门用于处理合同的结算，并概述了实现该结算所需的必要步骤。`SETTLEMENT
    RELATED ACTIVITY`（结算相关活动）是`CONTRACT ACTIVITY`（合同活动）的一个子类型，它将代表特定`CONTRACT`（合同）执行的所有结算活动分组在一起。


    ![9781430265894_Fig03-14.jpg](images/9781430265894_Fig03-14.jpg)


    [Figure 3-14](#9781430265894_Ch03.xhtml#_Fig14)。合同交付


    `SETTLEMENT RELATED ACTIVITIES`（结算相关活动）可能导致物理资产的实际`DELIVERY`（交付）。在特定合同的背景下，“交付”可能意味着多种情况。最熟悉的例子是资产交换的发生：一方交付一吨铜（一种资产）并收到另一种资产作为回报（例如现金）。有时，特定合同会导致现金结算。在现金结算下，一方根据合同约定金额与资产当前市场价格（称为资产的“现货价格”）之间的价差，向对手方支付一定数额的现金。


    与`DELIVERY`（交付）关联的`SITE`（地点）可以是物理地址（从而指定交付地址）。例如，当一方将玉米交付到特定仓库时，`SITE`（地点）将标识其位置（或物理地址）。


    ## 合同监管（Contract Regulations）


    合同是一种承诺，而承诺常常被违背。违背承诺的潜在最终结果是一场旷日持久的诉讼（[Figure 3-15](#9781430265894_Ch03.xhtml#Fig15)）。


    ![9781430265894_Fig03-15.jpg](images/9781430265894_Fig03-15.jpg)


    [Figure 3-15](#9781430265894_Ch03.xhtml#_Fig15)。合同监管建模


    考虑以下场景。农场主 A 决定从农场主 B 处购买一头牛，他们签署了一份合同。农场主 A 检查了农场主 B 的牛群，双方农场主就某一头牛达成一致。此外，双方农场主均同意该牛是不育的，并以书面形式就以下条款达成一致：


    *   支付方式（现金）

    *   支付金额（每磅 0.90 美元）

    *   交付日期'
  raw: 'To minimize the risk of a default, parties participating in a financial contract
    are usually required to make a *collateral* deposit with a third party. A collateral
    deposit is not a requirement, however, and both parties have to agree to it. Sometimes
    only one party, the party with the lower credit rating, will be obligated to make
    a deposit. Who makes a deposit and the amount and form of that deposit will be
    negotiated by the parties entering into the contract. Collateral is used to protect
    contract participants against a default. The simplest collateral schema obliges
    contract participants to deposit money only once, on the contract start date,
    without any additional deposits required. A more complicated collateral schema
    may involve measuring market fluctuations and requiring the contract participants
    to make additional deposits, sometimes even daily, to reflect any market shifts.


    [Figure 3-11](#9781430265894_Ch03.xhtml#Fig11) depicts a basic collateral data
    model. To keep it focused and simple, this figure lists only those entities that
    contribute meaning to the current discussion. The important thing to note is that
    the COLLATERAL is related to the actual physical assets. The relationship between
    the PARTY and the COLLATERAL helps us identify any third party who might be temporarily
    holding any physical assets referenced in the contract. According to our model,
    the third party may be either a PERSON or an ORGANIZATION.


    ![9781430265894_Fig03-11.jpg](images/9781430265894_Fig03-11.jpg)


    [Figure 3-11](#9781430265894_Ch03.xhtml#_Fig11). Model of forward contract collateral


    Consider the following hypothetical example. Two companies, A and B, have agreed
    to enter into a financial contract and make collateral deposits. The terms of
    this contract are as follows:


    *   Company A agrees to purchase a ton of copper from company B for US$10,000.

    *   The contract start date is June 1, 2014, and the contract expiration date
    is December 1, 2014.

    *   Both companies agree to deposit US$10,000 each (the collateral deposit) with
    a third company, C, for the time period between June 1, 2014, and December 1,
    2014.


    In this case the simplest collateral schema is chosen, and the collateral payments
    are deposited only once.


    Contract Delivery


    Modeling contract delivery ([Figure 3-12](#9781430265894_Ch03.xhtml#Fig12)) involves
    the DELIVERY entity and its associated subtypes, including the following:


    *   OUTBOUND DELIVERY

    *   INBOUND DELIVERY

    *   CASH SETTLEMENT


    ![9781430265894_Fig03-12.jpg](images/9781430265894_Fig03-12.jpg)


    [Figure 3-12](#9781430265894_Ch03.xhtml#_Fig12). Subtyping delivery


    Whenever one delivers an asset to fulfill a given contract (either fully or partially),
    one makes an *outbound delivery*. Whenever one receives an asset that fulfills
    (either fully or partially) a given contract, one accepts an *inbound delivery*
    ***.*** *Cash settlement* is another subtype of delivery that plays an important
    role in settling financial contracts. A large percentage of financial contracts
    can only be settled in cash. Note that in all of these cases (whether cash settlements
    or inbound/outbound deliveries), at least one physical asset is received.


    The most important reason for subtyping the delivery entity is legal. The association
    of a given contract with a delivery subtype is pertinent when questions arise
    regarding the legality of certain delivery methods. All contracts, especially
    financial ones, may have legal repercussions. Models should reflect and enable
    reconstruction of every legal nuance, no matter how minor. Delivery subject area
    is a critical piece of the legal puzzle, and great care should be taken to describe
    and model it properly.


    Another interesting aspect of the delivery subject area is the concept of *partial
    deliveries*. Partial deliveries occur when the buyer receives only a part of the
    agreed-upon quantity of items. For example, investor A might expect to receive
    10 tons of aluminum bars by a certain date. The counterparty, investor B, may
    only be able to deliver nine tons of aluminum bars by that date. In most cases,
    investor A will hold off paying investor B until the full quantity (10 tons) has
    been delivered.


    Your underlying business rule may allow for partial deliveries, in which case
    you may be called on to model them. The model in [Figure 3-13](#9781430265894_Ch03.xhtml#Fig13)
    shows you how partial deliveries may be modeled by using what should by now be
    the familiar one-to-many recursive relationship. (Note that the CASH SETTLEMENT
    subtype from this model is removed to keep things simple.) The main reason partial
    deliveries are not that common in practice is that warehouse and transportation
    costs are high. Modern economic theory teaches that there’s no such thing as a
    "free lunch" and someone always has to pick up the resulting tab (and most financial
    contract participants are reluctant to do so).


    ![9781430265894_Fig03-13.jpg](images/9781430265894_Fig03-13.jpg)


    [Figure 3-13](#9781430265894_Ch03.xhtml#_Fig13). Modeling partial deliveries


    [Figure 3-14](#9781430265894_Ch03.xhtml#Fig14) models the contract’s delivery
    subject area. (For clarity and simplicity, entities not related to the current
    discussion are not included in the figure.) Those activities executed on behalf
    of a given contract are stored in the CONTRACT ACTIVITY. These contract activities
    are specified by BUSINESS STRATEGY ACTION ITEMS, which in turn are identified
    by a BUSINESS STRATEGY. The SETTLEMENT STRATEGY, a subtype of the BUSINESS STRATEGY,
    is explicitly dedicated to dealing with the contract’s settlement, and outlines
    the necessary steps to effectuate that settlement. SETTLEMENT RELATED ACTIVITY,
    a subtype of the CONTRACT ACTIVITY, groups together all of the settlement activities
    performed on behalf of the given CONTRACT.


    ![9781430265894_Fig03-14.jpg](images/9781430265894_Fig03-14.jpg)


    [Figure 3-14](#9781430265894_Ch03.xhtml#_Fig14). Contract delivery


    SETTLEMENT RELATED ACTIVITIES may result in the actual DELIVERY of the physical
    assets. *Delivery*, within the context of a given contract, may mean a number
    of things. The most familiar example is when an exchange of assets takes place:
    one party delivers a ton of copper (an asset) and receives another asset in return
    (cash, for instance). Sometimes a given contract results in a cash settlement.
    Under a cash settlement, one party pays its counterparty a certain amount of cash
    based on the price difference between the amount agreed upon in the contract and
    asset’s current market price (called the asset’s spot price).


    A SITE associated with a DELIVERY may be a physical address (thus specifying a
    delivery address). For example, when a party delivers corn to a particular warehouse,
    the SITE will identify its location (or a physical address).


    Contract Regulations


    A contract is a promise, and promises are often broken. A potential end result
    of a broken promise is a lengthy lawsuit ([Figure 3-15](#9781430265894_Ch03.xhtml#Fig15)).


    ![9781430265894_Fig03-15.jpg](images/9781430265894_Fig03-15.jpg)


    [Figure 3-15](#9781430265894_Ch03.xhtml#_Fig15). Modeling contract regulations


    Consider the following scenario. Farmer A decides to purchase a cow from farmer
    B, and they sign a contract. Farmer A inspects farmer B''s cattle and both farmers
    agree on a particular cow. Moreover, both farmers agree that the cow in question
    is sterile and settle in writing on the following terms:


    *   Method of payment (cash)

    *   Payment amount ($0.90 per pound)

    *   Delivery date'
