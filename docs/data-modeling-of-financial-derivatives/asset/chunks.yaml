    [Figure 4-1](#9781430265894_Ch04.xhtml#_Fig1). Consumption and investment assets/asset
    types


    Reversing a position or canceling a forward contract is very difficult and one
    of the most significant shortcomings of the OTC market. Upon expiration, a forward
    contract results in one of the following outcomes:


    1.  Physical delivery of an asset

    2.  Cash settlement

    3.  Default of one of the parties'
