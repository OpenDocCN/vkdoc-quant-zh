    ## 合同交付（Contract Delivery）


    合同交付建模（图 3-12）涉及`DELIVERY`（交付）实体及其关联的子类型，包括：


    *   `OUTBOUND DELIVERY`（出库交付）

    *   `INBOUND DELIVERY`（入库交付）

    *   `CASH SETTLEMENT`（现金结算）


    ![9781430265894_Fig03-12.jpg](img/9781430265894_Fig03-12.jpg)


    图 3-12。交付子类型


    当一方为履行合同（无论是全部还是部分）而交付资产时，即构成“出库交付”。当一方接收用于履行合同（无论是全部还是部分）的资产时，即构成“入库交付”。“现金结算”是交付的另一种子类型，在金融合同结算中扮演着重要角色。很大比例的金融合同只能以现金结算。请注意，在所有情况下（无论是现金结算还是入库/出库交付），至少会收到一项物理资产。


    对交付实体划分子类型的最重要原因是法律上的考虑。当对特定交付方法的合法性产生疑问时，将特定合同与交付子类型关联起来就显得尤为重要。所有合同，尤其是金融合同，都可能产生法律后果。模型应反映并能够重建每一个法律细节，无论其多么微小。交付主题领域是法律难题的关键部分，应谨慎描述和建模。


    交付主题领域的另一个有趣方面是“部分交付”的概念。当买方仅收到约定数量的部分物品时，就会发生部分交付。例如，投资者 A 可能预期在某个日期前收到 10 吨铝棒。对手方投资者
    B 可能在该日期前只能交付 9 吨铝棒。在大多数情况下，投资者 A 会推迟向投资者 B 付款，直到全部数量（10 吨）交付完毕。


    您的基础业务规则可能允许部分交付，在这种情况下，您可能需要对它们进行建模。图 3-13 中的模型展示了如何使用现在应该已经熟悉的一对多递归关系来建模部分交付。（为了简洁，从该模型中移除了`CASH
    SETTLEMENT`子类型。）部分交付在实践中并不常见的主要原因是仓储和运输成本高昂。现代经济学理论告诉我们，没有“免费的午餐”，总得有人为此买单（而大多数金融合同参与者都不愿意这样做）。


    ![9781430265894_Fig03-13.jpg](img/9781430265894_Fig03-13.jpg)


    图 3-13。部分交付建模


    图 3-14 对合同的交付主题领域进行了建模。（为清晰简洁起见，图中未包含与当前讨论无关的实体。）代表特定合同执行的那些活动存储在`CONTRACT ACTIVITY`（合同活动）中。这些合同活动由`BUSINESS
    STRATEGY ACTION ITEMS`（业务战略行动项）指定，而这些行动项又由`BUSINESS STRATEGY`（业务战略）标识。`SETTLEMENT
    STRATEGY`（结算策略）是`BUSINESS STRATEGY`（业务战略）的一个子类型，专门用于处理合同的结算，并概述了实现该结算所需的必要步骤。`SETTLEMENT
    RELATED ACTIVITY`（结算相关活动）是`CONTRACT ACTIVITY`（合同活动）的一个子类型，它将代表特定`CONTRACT`（合同）执行的所有结算活动分组在一起。


    ![9781430265894_Fig03-14.jpg](img/9781430265894_Fig03-14.jpg)


    图 3-14。合同交付


    `SETTLEMENT RELATED ACTIVITIES`（结算相关活动）可能导致物理资产的实际`DELIVERY`（交付）。在特定合同的背景下，“交付”可能意味着多种情况。最熟悉的例子是资产交换的发生：一方交付一吨铜（一种资产）并收到另一种资产作为回报（例如现金）。有时，特定合同会导致现金结算。在现金结算下，一方根据合同约定金额与资产当前市场价格（称为资产的“现货价格”）之间的价差，向对手方支付一定数额的现金。


    与`DELIVERY`（交付）关联的`SITE`（地点）可以是物理地址（从而指定交付地址）。例如，当一方将玉米交付到特定仓库时，`SITE`（地点）将标识其位置（或物理地址）。


    ## 合同监管（Contract Regulations）


    合同是一种承诺，而承诺常常被违背。违背承诺的潜在最终结果是一场旷日持久的诉讼（图 3-15）。


    ![9781430265894_Fig03-15.jpg](img/9781430265894_Fig03-15.jpg)


    图 3-15。合同监管建模


    考虑以下场景。农场主 A 决定从农场主 B 处购买一头牛，他们签署了一份合同。农场主 A 检查了农场主 B 的牛群，双方农场主就某一头牛达成一致。此外，双方农场主均同意该牛是不育的，并以书面形式就以下条款达成一致：


    *   支付方式（现金）

    *   支付金额（每磅 0.90 美元）

    *   交付日期

