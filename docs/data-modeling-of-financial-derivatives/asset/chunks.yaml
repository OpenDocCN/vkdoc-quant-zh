- fmt: '# Swap Contracts and Forward Rate Contracts


    Swap contracts and forward rate contracts play prominent roles in the OTC derivatives
    market. This chapter follows the now-familiar pattern by defining each contract
    type, explaining its underlying business rules, and then proceeding to model it.


    ## Defining a Swap


    A *swap contract* is an agreement to exchange cash flows at some time in the future,
    according to a predetermined schedule. The agreement specifies the cash flow exchange
    dates and the cash flow calculation method.


    The forward contract, discussed in [Chapter 4](#9781430265894_Ch04.xhtml), is
    an example of a simple swap contract. Consider the following hypothetical case:
    company A enters into a forward contract with company B to buy 200 ounces of copper
    at US$50 per ounce on December 31, 2014. The contract start date is December 31,
    2013. At the expiration date of this contract (December 31, 2014), company A will
    receive from company B 200 ounces of copper and will pay $10,000 (200 × $50).


    One strategy available to company A is to sell the copper right away at the spot
    price of copper on that particular day. The loss or profit will be dictated by
    the spot price of copper on that day. In actuality, however, the delivery mechanism
    of the forward contract will be simplified, resulting in a cash settlement in
    which the total quantity of copper (200 ounces) will be multiplied by the difference
    between the copper’s spot price and the contract’s underlying forward price ($50
    per ounce). Take note: cash flow exchanges occur only once, at the expiration
    date of the forward contract.


    Swap contracts, on the other hand, result in an exchange of cash flows on a number
    of predefined dates. The two most popular swap contract types are:


    - Plain vanilla interest rate swaps

    - Fixed-for-fixed currency rate swaps


    ## Plain Vanilla Interest Rate Swaps


    A simple example illustrates how a *plain vanilla interest rate swap* contract
    works.


    ![image](images/sq.jpg) **Example** Assume that company A has US$10,000 to invest
    and the current interest rate is 4 percent. Company A''s treasurer may feel that
    the interest rate will fall in the near future and thus might agree to exchange
    cash flows with company B, according to the following schedule:


    Every six months for a period of two years, company A will pay interest at a floating
    rate and company B will pay interest at a fixed rate (say, 3.8 percent) on the
    same notional principal ($10,000). Semi-annual payments, for a period of two years,
    will lead to four payment exchanges.


    Typically, the rate in plain vanilla interest rate swaps is the LIBOR. [Table
    8-1](#9781430265894_Ch08.xhtml#Tab1) shows a hypothetical schedule of payments
    for the example, together with the payment inflow and outflow. Note that during
    the course of a swap contract, a fixed interest rate always remains the same.


    [Table 8-1](#9781430265894_Ch08.xhtml#_Tab1). Hypothetical Schedule of Payments


    | ![9781430265894_Table08-01.jpg](images/9781430265894_Table08-01.jpg) |


    ## Fixed-for-Fixed Currency Rate Swaps


    *Fixed-for-fixed currency rate swaps* are in effect mechanisms for transforming
    an investment in one country into an investment in another country. They are best
    explained by a hypothetical example.


    ![image](images/sq.jpg) **Example** Consider a company A that feels that the value
    of the US dollar will strengthen against the British pound (GBP) and consequently
    invests in US dollars. Company B feels the opposite and invests in GBP. Also,
    assume that company A is a US-based company and company B is UK-based. These two
    companies could agree on a principal amount (say, 8 million GBP and US$15 million)
    and pay each other the fixed amount (hence the term *fixed-for-fixed*) on a predefined
    schedule. In our case, company A would receive 8 million GBP and pay out a fixed
    5 percent rate of interest. Company B would receive US$15 million and agree to
    pay 4.5 percent interest off this principal amount. At the end of the fixed-for-fixed
    currency rate swap, the principal amounts plus the remaining cash flows would
    be exchanged.


    Fixed-for-fixed currency rate swaps help companies better manage their exposure
    to fluctuations in interest rates and secure better interest rates by leveraging
    the interest-rate advantage that domestic firms usually have over foreign firms.


    ## International Swaps and Derivative Organization


    The document that forms the basis of a swap contract is called a *confirmation*.
    The standard *confirmation agreement* was designed by the International Swap and
    Derivative Organization (ISDA, `www.isda.org`), and this confirmation forms the
    backbone of every swap agreement in the OTC market. Confirmation agreements and
    their structure are discussed in the “Modeling ISDA Documentation and Confirmations”
    section.


    ## Subtyping the Swap Agreement Type


    Begin your swap contract modeling task with a relatively simple exercise: properly
    subtyping (and thus widening) the `CONTRACT TYPE` to account for the `SWAP CONTRACT
    TYPE`. As you’ve already learned, a `SWAP CONTRACT TYPE` can be further subtyped
    into a `FIXED-FOR-FIXED CURRENCY RATE SWAP TYPE` and a `PLAIN VANILLA INTEREST
    RATE SWAP TYPE` ([Figure 8-1](#9781430265894_Ch08.xhtml#Fig1)), thus deepening
    your `CONTRACT TYPE` hierarchy structure. The model may look simple, but it will
    give you a significant advantage later on. By linking the `CONTRACT` to the specific
    `CONTRACT TYPE`, you allow the contract to inherit specific business rules that
    your users will understand and appreciate.


    ![9781430265894_Fig08-01.jpg](images/9781430265894_Fig08-01.jpg)


    [Figure 8-1](#9781430265894_Ch08.xhtml#_Fig1). Subtyping a contract into a swap
    type


    ## Interest Rate and Interest Rate Type


    The discussion of option contract valuations in [Chapter 6](#9781430265894_Ch06.xhtml)
    treated the LIBOR (London Interbank Offered Rate) rate as a variable. In this
    section we deviate from that approach and explicitly create `INTEREST RATE` and
    `INTEREST RATE TYPE` entities. The `INTEREST RATE TYPE` will be further subtyped
    into the `LIBOR RATE TYPE` and the `RISK FREE RATE TYPE` ([Figure 8-2](#9781430265894_Ch08.xhtml#Fig2)).
    The `INTEREST RATE TYPE` represents a rate type that a particular organization
    may trade in and should be treated as a general blueprint. `INTEREST RATE`, on
    the other hand, is the actual interest rate observed on a particular day. The
    reason these entities are modeled explicitly is because under a swap contract
    it is of paramount importance to be able to specify clearly which interest rate
    a particular `PARTY` in a given `CONTRACT` is responsible for.


    ![9781430265894_Fig08-02.jpg](images/9781430265894_Fig08-02.jpg)


    [Figure 8-2](#9781430265894_Ch08.xhtml#_Fig2). Interest rate and interest rate
    type'
