    PARTY is responsible for within the context of a given option CONTRACT. This model
    maintains and stores physical assets, not asset types. Once both parties enter
    into an option contract, you should relate the CONTRACT ASSET ALLOCATION to the
    physical ASSETS because by that time the option has been purchased and the physical
    assets have been exchanged (cash for the stock certificate, for example).


    ![9781430265894_Fig06-06.jpg](images/9781430265894_Fig06-06.jpg)


    [Figure 6-6](#9781430265894_Ch06.xhtml#_Fig6). Modeling option asset allocations'
