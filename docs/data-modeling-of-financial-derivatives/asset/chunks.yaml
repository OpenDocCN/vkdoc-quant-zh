- fmt: '至此，您已经看到了两种处理利率维护和追踪的方法。在之前的章节中，您学习了如何使用动态变量来完成此类任务。本节将向您展示如何使用`INTEREST RATE`和`INTEREST
    RATE TYPE`实体来实现相同的功能。实体方法更加明确、直接且易于理解。然而，当您不想硬编码某些内容，并且需要更灵活、动态的方法时，通过变量实现则是一个极佳的解决方案。


    ## 固定利率与浮动利率参与方角色


    上述关于掉期合约的讨论，在我们的建模工具箱中引入了两种新的`ROLE TYPE`（参见[图8-3](#9781430265894_Ch08.xhtml#Fig3)）：


    *   `FIXED RATE PLAYER`

    *   `FLOATING RATE PLAYER`


    ![9781430265894_Fig08-03.jpg](images/9781430265894_Fig08-03.jpg)


    [图8-3](#9781430265894_Ch08.xhtml#_Fig3). 固定利率与浮动利率参与方角色


    从业务需求的角度来看，能够精确识别每个参与方在特定掉期合约中的角色至关重要，并且这通常是技术上的必要条件。[图8-3](#9781430265894_Ch08.xhtml#Fig3)
    中的模型可能看起来相对简单，但在更大的数据模型上下文中，它将更好地阐明底层业务规则，并改善与最终用户的沟通。


    ## 建模掉期合约参与


    [图8-4](#9781430265894_Ch08.xhtml#Fig4) 展示了掉期合约参与主题域。为了保持初始模型简单且重点突出，`ROLE TYPE`仅被子类型化为：


    *   `FIXED RATE PLAYER`

    *   `FLOATING RATE PLAYER`


    ![9781430265894_Fig08-04.jpg](images/9781430265894_Fig08-04.jpg)


    [图8-4](#9781430265894_Ch08.xhtml#_Fig4). 建模掉期合约参与


    `BUYER`和`SELLER`子类型被刻意移除，因为这些角色类型不适用于当前情况。


    `FIXED-FOR-FIXED CURRENCY SWAP TYPE`合约涉及至少两个参与方，每个参与方扮演`FIXED RATE PLAYER`角色。另一方面，`PLAIN
    VANILLA INTEREST RATE SWAP TYPE`合约涉及至少两个合约参与方，每个参与方扮演`FIXED RATE PLAYER`角色或`FLOATING
    RATE PLAYER`角色。`CONTRACT`和`CONTRACT PARTICIPATION`实体之间的关系在两端都是强制的。如前所述，请确保在文档中明确说明为什么该关系在两端都是强制的，以及该关系试图执行的业务规则。`CONTRACT`和`CONTRACT
    PARTICIPATION`必须作为同一数据库事务的一部分，一起填充。


    ## 建模掉期合约资产分配与支付计划


    参与掉期协议的各方可以实际交换本金金额（这种做法很少发生），也可以在纸上达成这些金额的协议。由于本金金额很少易手，因此被称为*名义本金*。各方根据特定计划（该计划是合约特定利率的函数）同意支付给对方的金额，应被视为纸质资产，除非实际交付发生。


    `CONTRACT ASSET ALLOCATION`（[图8-5](#9781430265894_Ch08.xhtml#Fig5)）在特定掉期`CONTRACT`的上下文中，将一个`ASSET`或`ASSET
    TYPE`与一个给定的`PARTY`关联起来。在这里，我们将指定双方同意的本金金额。请注意，模型在`CONTRACT ASSET ALLOCATION`层级上显示了`ASSET`实体，因为您的业务需求可能会要求您考虑本金金额可能实际易手的情况。但请记住，名义本金金额永远不会易手。


    ![9781430265894_Fig08-05.jpg](images/9781430265894_Fig08-05.jpg)


    [图8-5](#9781430265894_Ch08.xhtml#_Fig5). 建模掉期合约资产分配与支付计划（完整版）


    考虑投资者A和投资者B之间的一个掉期合约。假设此特定合约签署于2013年7月1日，为期两年。第一次支付交换发生在2014年1月1日。名义本金金额设定为10,000美元，支付每半年交换一次。在此掉期合约的生命周期内，投资者A同意按年利率5%（固定金额）支付名义本金的利息，投资者B则同意按六个月期LIBOR利率（浮动金额）支付相同名义本金的利息。


    该合约被归类为普通型利率掉期。投资者A将被视为固定利率参与方，投资者B为浮动利率参与方。双方均同意名义本金金额（意味着该金额永不实际易手），该金额为`USD
    TYPE`（`CURRENCY ASSET CLASS TYPE`的一个子类型）。`CONTRACT ASSET ALLOCATION`为每个参与方存储一条记录；在此例中，两个参与方都与`ASSET
    TYPE`为`USD TYPE`以及`CONTRACT ASSET ALLOCATION`金额等于10,000相关联。这个假设的掉期合约将持续两年，支付每半年进行一次，因此总共产生四次支付。`SWAP
    PARTY RATE TYPE SCHEDULE`将为每位投资者存储四行数据，明确指定每一方每次付款的到期日。投资者A（固定利率参与方）与`FIXED RATE
    TYPE`关联，其中实际利率可以轻松指定（此例中为5%）。投资者B（浮动利率参与方）与`LIBOR RATE TYPE`关联，其中实际利率设置为首次支付日期前六个月当时流行的六个月期LIBOR利率。投资者A和B都提前清楚地知道投资者B需要支付的第一个LIBOR利率。后续的六个月期LIBOR利率将是未知的，并将在每个预定支付日期观察得到。


    填充`SWAP PARTY RATE TYPE SCHEDULE`表的数据有几种选择。第一种选择是，每当某个未知利率变得广泛可用时，就逐行填充`SWAP PARTY
    RATE TYPE SCHEDULE`。第二种选择是，提前为每个参与方预填充所有行，并将未知的利率维护在一个可为空的字段中。一旦未知利率数据变得可用，就可以将其插入到`SWAP
    PARTY RATE TYPE SCHEDULE`中，以保持其最新状态。


    不幸的是，[图8-5](#9781430265894_Ch08.xhtml#Fig5) 中的图表包含了太多实体，变得难以阅读和解释。例如，为了节省空间，`INTEREST
    RATE`实体必须在不显示其任何底层子类型的情况下进行描绘。为了纠正这一点，该模型的简化版本显示在[图8-6](#9781430265894_Ch08.xhtml#Fig6)中。这个新图表使事情更清晰、更明确，因为它包含的实体更少。


    ![9781430265894_Fig08-06.jpg](images/9781430265894_Fig08-06.jpg)


    [图8-6](#9781430265894_Ch08.xhtml#_Fig6). 建模掉期合约资产分配与支付计划（简化版）


    请注意，`CONTRACT ASSET ALLOCATION`实体周围的排他弧表示本金金额可能会实际易手。再次说明，这种情况并不经常发生。如果根据您的底层业务规则，您预期这种情况不会发生，您可以简化生成的模型并移除`ASSET`实体（以及相关的关联关系）。此外，请注意`SWAP
    PARTY RATE TYPE SCHEDULE`与`ASSET TYPE`之间存在关系；这表明计划中的支付（通过`SWAP PARTY RATE TYPE
    SCHEDULE`实现）被视为纸质资产。`SWAP PARTY RATE TYPE SCHEDULE`与`INTEREST RATE`（实际观察到的利率）之间的关系在两端都是非强制的，因为这些数据只有在稍后才可用。


