    # 互换合约中的交割


    互换合约中的交割（图 8-7）由`SWAP PARTY RATE TYPE SCHEDULE`控制，并与实物资产（例如现金）相关联。


    ![9781430265894_Fig08-07.jpg](img/9781430265894_Fig08-07.jpg)


    图 8-7. 互换合约支付


    在上一节开发的示例中，投资者 A 对 10,000 美元的名义本金支付 5%的年固定利率（或每半年支付 2.5%）。因此，投资者 A 计划进行四次利息支付，每次
    250 美元。投资者 B 则计划支付在首次支付交换日期前六个月观察到的六个月的伦敦银行同业拆借利率（LIBOR）（基于 10,000 美元名义本金）。因此，首笔浮动利率支付的金额不应让人意外，因为双方都清楚应支付的金额。假设原始六个月
    LIBOR 利率在 2013 年 7 月 1 日观察为 2.6%，那么投资者 B 将需要支付 260 美元。在支付交换时，会对六个月 LIBOR 利率进行实际观察，并将其值存储在`SWAP
    PARTY RATE TYPE SCHEDULE`中。这是投资者 B 在下一个计划支付日期需负责的 LIBOR 利率。表 8-2 列出了支付的时间表，以及从两位投资者视角出发的资金流出情况。日期列显示了将观察六个月
    LIBOR 利率的日期。对应的六个月 LIBOR 利率存储在`LIBOR Rate`列中。


    表 8-2. 假设支付时间表（互换合约支付）


    | ![9781430265894_Table08-02.jpg](img/9781430265894_Table08-02.jpg) |


    再次强调，模型的大致形态和感觉应当熟悉，但尽管基础可能相同，请注意我们是如何根据底层业务规则对其进行塑造的。


    ## 远期利率协议


    *远期利率协议*（FRA）是一种场外交易合约，规定在未来某个时间点，对某一特定本金金额的借款或贷款适用某一特定利率。其主要假设是借款或贷款以 LIBOR 利率进行。本金金额仅在书面载明，很少实际交换，因此成为名义本金金额。一个假设示例将阐明
    FRA 背后的原理。


    ![image](img/sq.jpg) **示例** 假设投资者 A 同意在时间`T1`至`T2`之间向投资者 B 支付基于本金`P`的`Int_A`%利率，其中`T1`和`T2`均为未来日期。投资者
    B 同意在`T1`至`T2`之间向投资者 A 支付基于相同本金`P`的`Int_B`%利率。假设`Int_A`%为 LIBOR 利率，可以看出 FRA 是对冲
    LIBOR 利率风险敞口的完美工具。时间`T1`将提前设定，且`T1`至`T2`的时间跨度将明确指定。支付通常在时间`T1`发生，届时覆盖`T1`至`T2`时间跨度的远期
    LIBOR 利率已知，付款将从时间`T2`折现至`T1`。


    可以看出，FRA 背后的概念与互换合约相似，唯一区别在于 FRA 的现金流交换仅发生一次。


    ### FRA 合约类型


    与 FRA 合约建模相关的首要任务是定义`FRA CONTRACT TYPE`，并在模型中明确展示（图 8-8）。为简单起见，`CONTRACT TYPE`被子类型化为：


    * `FORWARD RATE AGREEMENT TYPE`（远期利率协议类型）

    * `OTHER TYPE`（其他类型）


    请记住，一旦将合约关联到特定的合约类型，就允许其继承该类型特有的特定业务规则。这在此阶段看似多余，但在更大的数据模型背景下，这种子类型化有助于沟通并消除不必要的歧义。


    ![9781430265894_Fig08-08.jpg](img/9781430265894_Fig08-08.jpg)


    图 8-8. 为纳入 FRA 合约类型而对合约类型进行子类型化


    ### 建模 FRA 合约参与方


    FRA 涉及一个固定利率方，其在时间`T1`至`T2`之间支付固定利率；以及一个浮动利率方，其在时间`T1`至`T2`之间支付市场实现的利率（通常为 LIBOR
    利率）（图 8-9）。图 8-9 中的模型看起来类似于图 8-4 中的互换合约参与方示意图。这种相似性示例说明了通过理解合约的底层业务规则并将其与一般的合约建模知识相结合，可以多么容易地创造出新事物。请注意，`CONTRACT`（合约）与`CONTRACT
    PARTICIPATION`（合约参与方）之间的关系在双方都是强制性的。


    ![9781430265894_Fig08-09.jpg](img/9781430265894_Fig08-09.jpg)


    图 8-9. FRA 合约参与方


    ### 建模 FRA 资产配置与偿付计划


    FRA 合约的资产配置与偿付计划建模可以采用类似于建模互换合约的方式。事实上，这两种合约类型有许多相似之处，之前讨论的几个概念在此同样适用。


    类似于“建模互换合约资产配置与偿付计划”一节中的`SWAP PARTY RATE TYPE SCHEDULE`实体，这里对应的是`FRA PARTY RATE
    TYPE SCHEDULE`，它同样明确列出了每一方的偿付计划。为保持清晰明确，我们可以将这两个实体泛化为一个共同的超类型，称为`PARTY RATE TYPE
    SCHEDULE`（图 8-10）。


    ![9781430265894_Fig08-10.jpg](img/9781430265894_Fig08-10.jpg)


    图 8-10. FRA 资产配置与利率偿付计划


    特定 FRA 合约下的本金金额很少实际易手。为保持最终模型简单，我们声明在 FRA 合约下，本金金额从不实际易手，因此是名义本金金额。这种简化导致从最终的合约资产配置模型中移除了实物资产。一个假设示例将阐明如何使用图
    8-9 中的模型。


    ![image](img/sq.jpg) **示例** 假设投资者 A（固定利率方）同意支付基于 10,000 美元名义本金的 5%固定利率。该 FRA 合约签订于
    2014 年 5 月 1 日，未来起始日期设定为 2015 年 7 月 1 日（时间`T1`），未来结束日期设定为 2016 年 1 月 2 日（时间`T2`）。投资者
    B（浮动利率方）同意支付基于 10,000 美元名义本金的、在 2015 年 7 月 1 日（`T1`）至 2016 年 1 月 1 日（`T2`）之间市场实现的六个月
    LIBOR 利率。实际支付将在 2015 年 7 月 1 日（时间`T1`）发生，届时覆盖`T1`至`T2`时间段的六个月 LIBOR 利率可获取。为反映这些事实，我们首先填充`CONTRACT
    ASSET ALLOCATION`（合约资产配置）。涉及的基础资产是纸质资产（名义本金金额），这就是我们将`CONTRACT ASSET ALLOCATION`关联到`ASSET
    TYPE`（资产类型）的原因。双方商定的名义本金金额以美元计价，因此`ASSET TYPE`被指定为`USD TYPE`（美元类型）。因此，你在`CONTRACT
    ASSET ALLOCATION`中存储并维护两条记录（每位投资者一条`CONTRACT ASSET ALLOCATION`记录）。

