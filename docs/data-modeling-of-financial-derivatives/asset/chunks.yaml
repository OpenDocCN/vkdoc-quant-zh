- fmt: 'The following is a list of prominent exchanges where futures contracts are
    regularly traded: the *Chicago Board of Trade* (CBOT, `www.cbot.com`), *Chicago
    Board Options Exchange* (CBOE, `www.cboe.com`), *New York Stock Exchange* (NYSE,
    `www.nyse.com`), and *Chicago Mercantile Exchange* (CME, `www.cme.com`). A futures
    contract’s underlying asset is either a commodity (pork bellies, crude oil, copper,
    etc.) or a financial asset (stocks, Treasury bonds, and so forth). [Table 5-1](#9781430265894_Ch05.xhtml#Tab1)
    lists hypothetical grain futures quotes in the form provided by the CBOE.


    [Table 5-1](#9781430265894_Ch05.xhtml#_Tab1). CBOE Grain Futures Quotes (Hypothetical)


    | ![9781430265894_Table05-01.jpg](images/9781430265894_Table05-01.jpg) |


    A party that agrees to buy an asset at some point in the future holds a long position
    in a futures contract, and the party that agrees to sell an asset at some point
    in the future holds a short position. As discussed in previous chapters, the item
    the seller has agreed to sell should be treated as a paper asset. A promise to
    sell something is only a promise, and until someone delivers that physical asset
    to the buyer, it should be treated as a paper asset. How can you prove that you
    physically own a particular asset? Physical ownership is represented by possession
    of a stock certificate, a deed of purchase, an option certificate, or even a register
    receipt. Thus, a futures contract remains a promise and its underlying paper assets
    shouldn’t be counted toward or against a physical asset inventory (the asset portfolio).


    Another important detail to keep in mind is that a futures contract’s delivery
    is a very rare event—so rare that many industry professionals have little or no
    experience in handling the deliveries. To avoid making (or accepting) a delivery,
    an investor must close out his or her position, resulting in his or her entering
    into a contract on the same asset type with an opposite position compared to that
    of the original contract (that is, the buyer becomes a seller).


    **Example**  An investor in Seattle decides that the price of crude oil will rise
    over the next six months. On April 15, 2014, this investor enters into a crude
    oil futures contract with the delivery date set for September 15, 2014\. (The
    investor is holding a long position in this contract.) To avoid accepting a crude
    oil delivery, the investor will need to sell (or take a short position in) his
    current contract sometime in June to close out his futures position. The investor
    who sold the original September 15, 2014, futures contract can close out his short
    position by buying (or taking a long position in) the September 15, 2014, futures
    crude oil contract in either July or August 2014\. The investor’s total gain or
    loss will be determined by the difference in crude oil price between April 15,
    2014, and the time at which the futures contract is closed out.


    The *first notice day* signifies the first day an investor may submit a *notice
    of intent* to an exchange. Once a notice of intent is submitted, delivery can
    take place. This means that the two parties will need to prepare themselves for
    the delivery. The *last notice day* is the last day when such a notice of intent
    may be submitted to an exchange. Even the delivery of a futures contract could
    result in a cash settlement. For example, a futures contract on the S&P 500 typically
    will result in a cash settlement (otherwise one of the contract participants will
    have to physically deliver stock certificates, which is impractical and unrealistic).


    Because futures contracts are regulated by official stock exchanges, great care
    is taken to unambiguously specify a valid list of *commodity grades* that will
    satisfy any given futures contract. Typically, financial assets are well defined
    and unambiguous. Commodities, on the other hand, have to be defined in detail,
    owing to significant variation of quality and appearance within the commodity
    class. If the delivered asset’s grade falls outside of the exchange-specified
    grade range, then a specific discount must be applied. The following example illustrates
    the application of the concept to a futures contract, analogously to the example
    of the corn forward contract in [Chapter 4](#9781430265894_Ch04.xhtml).


    **Example**  Deliverable grades of wheat shall contain a minimum of a 15 percent
    protein level. However, protein levels of less than 15 percent, but equal to or
    greater than 12.6 percent, are deliverable at a five-cent (5¢) discount to the
    contract price. Protein levels of less than 12.6 percent are not deliverable.
    As an investor, you expect to receive wheat of a certain quality. That quality
    may be described by a number of parameters, and the protein content is only one
    of them. If the protein content of the delivered goods is below the expected level,
    the investor will experience a loss when he or she attempts to resell the wheat.
    The exchange prevents this type of issue from happening by clearly and unambiguously
    specifying the quality of the expected assets and indicating what will happen
    if the asset quality falls outside of the exchange-specified range. In the example,
    a protein level of less than 12.6 percent is not acceptable and will be rejected
    by the investor and the exchange. The wheat with a protein level between 15 percent
    and 12.6 percent will be discounted from the agreed-on futures price.


    Another essential feature of futures contracts is the *daily settlement procedure*
    . Consider an investor who wants to purchase two futures copper contracts. Each
    contract is for the purchase of 150 ounces of copper, so the investor purchases
    two contracts to obtain 300 ounces of copper. The current futures price of copper
    is US$100 per ounce. On September 1, 2014, the price of copper declines from $100
    to $98.11\. A decline in price means that the investor who is contracted to buy
    the copper at $100 per ounce is losing money. The investor’s first day loss is:


    `300 * (−1.89) = $567`


    To ensure that this investor will not default, the exchange will instruct him
    to maintain a *margin account*. Assume that the investor is directed to deposit
    $2,500 into his margin account per each contract (or $5,000 for the two contracts).
    Because the price of copper went down on September 1, the investor’s margin account
    goes down by (see [Table 5-2](#9781430265894_Ch05.xhtml#Tab2)):


    `$5,000 − $567 = $4,433`


    [Table 5-2](#9781430265894_Ch05.xhtml#_Tab2). Margin Account in Action


    | ![9781430265894_Table05-02.jpg](images/9781430265894_Table05-02.jpg) |


    The exchange also determines the additional margin, called a *maintenance margin*
    , which acts as a trigger indicating that the investor should put more money into
    his margin account, up to the *initial margin*.


    Because the contract requirements dictate and constrain the ultimate design (and
    not the other way around), they are the business rules that will shape and mold
    the starter data models. (Bear in mind that, as usual in this book, the models
    are broken into multiple subject areas to keep the diagrams more focused and concise).
    The basic requirements of a futures contract are the following:


    *   Futures contracts involve at least two parties:


    *   A party that wants to purchase or sell an asset at some point in the future.
    (The asset specified in the futures contract is a paper asset.)

    *   A broker working for an exchange, holding an opposite position (long or short).
    (Once again, these assets should be treated as paper assets.)'
