    # 填充`合同资产分配`后


    填充`合同资产分配`后，你需要处理实际支付时间表。尽管远期利率协议（FRA）合同只有一个支付日期，但其建模方式与对应的`掉期支付时间表`类似。`FRA 参与方利率类型时间表`会为每个投资者存储并维护一个支付时间表日期。当`T1`和`T2`之间的实际六个月期`LIBOR`利率可用时，该利率将被存储，支付日期则设为`T1`时刻。


    ## 对 FRA 资产交割建模


    控制实际 FRA 合同交割的实体是`FRA 参与方利率类型时间表`（图 8-11）。在给定 FRA 合同的现金流交换之前，必须进行利率观测。适用的`LIBOR`利率必须记录在`FRA
    参与方利率类型时间表`中，以便确定实际支付金额。在交割阶段，实际资产（如现金）在合同参与者之间进行交换；因此，`交割`实体与实际`资产`之间建立了关系。


    ![9781430265894_Fig08-11.jpg](img/9781430265894_Fig08-11.jpg)


    图 8-11. FRA 与资产交割


    ## 对 ISDA 文件与确认书建模


    场外交易（OTC）市场中的大多数衍生品合约（包括掉期和 FRA）都基于 ISDA 文件。ISDA 文件极为复杂且技术性强。这种复杂性的原因在于需要考虑 OTC
    市场中潜在的合约风险。在本节中，我们将研究 ISDA 文件的结构并识别其主要组成部分。¹


    ISDA 文件的主要组成部分是`ISDA 主协议`（图 8-12）。一旦双方签署此协议，它将管辖双方之间所有未来的交易。ISDA 主协议可分为两类：`多币种跨境主协议`和`单一币种单一司法管辖区主协议`。


    - `多币种跨境主协议`适用于位于不同司法管辖区的双方，交易通常涉及不同币种。

    - `单一币种单一司法管辖区主协议`适用于位于同一司法管辖区的双方，交易通常涉及同一币种。


    ![9781430265894_Fig08-12.jpg](img/9781430265894_Fig08-12.jpg)


    图 8-12. 对 ISDA 文件结构建模


    `ISDA 主协议`包含两个部分：`标准条款`和`附录`。`标准条款`涉及净额结算、违约事件、提前终止、适用法律等内容。这些是双方需要谈判并达成一致的标准条款和定义。`附录`部分引用了标准条款及其商定的定义。此外，附录还列出了对`标准条款`所做的每一项修订。


    通常，双方通过电话商定衍生品合约。他们达成的口头协议条款记录在`确认书`中。流程很简单：一方将交易的所有组成部分书面记录，并发送给对方以供接受。ISDA 提供一份标准的、单纯的`确认书`，这是一份包含业务条款的简短文件。如果特定交易无法用单纯的确认书覆盖（有时称为*结构化交易*），双方必须创建满足自身需求的定制确认书。最终，`确认书`成为`附录`的一部分，而`附录`又成为`ISDA
    主协议`的一部分（图 8-13）。


    ![9781430265894_Fig08-13.jpg](img/9781430265894_Fig08-13.jpg)


    图 8-13. 对 ISDA 文件结构建模（含确认书）


    当`附录`中的数据与`ISDA 主协议`冲突时会发生什么？在这种情况下，根据*不一致规则*，`附录`中的数据胜出。原因很简单；附录部分是所有微调发生的地方，因此它覆盖了`ISDA
    主协议`中出现的通用数据。如果`附录`中的数据与`确认书`不一致怎么办？再次根据不一致规则，`确认书`中的数据胜出。


    至此，你可能已经猜到，模型中用“文件套文件”结构表示的`ISDA 主协议`文件的内部结构，可以使用第 3 章中介绍的多对多递归关系来建模（图 8-14）。`文件结构`使我们能够对
    ISDA 主协议文件复杂结构所体现的复杂的“文件套文件”关系进行建模。²


    ![9781430265894_Fig08-14.jpg](img/9781430265894_Fig08-14.jpg)


    图 8-14. ISDA 文件结构的通用表示


    ## 结论


    本章讨论了掉期和远期利率协议两种合约类型，它们在 OTC 衍生品市场非常流行，并受类似的一套业务规则管辖。像往常一样，我通过重新利用前几章开发的建模模式，以适应这些特定合约的业务规则，来对这些合约类型进行了建模。


    ¹ Tan Sin Liang, *“场外衍生品文件”* (2001), `http://www.lawgazette.com.sg/2001-4/April01-focus.htm`。


    ² 参见 David C. Hay 在《数据模型模式：思维惯例》（Dorset House 出版社，1995 年；同上，*数据模型模式：元数据图谱*（Morgan
    Kaufmann 出版社，2006 年））中对诸如物质安全数据表和临床试验观察等复杂主题领域中文件元数据及文件结构建模的描述。


    ---


    # 章节


    ## 临别感言


    *没有什么比常识分配得更公平：没有人会觉得自己需要的比已有的多。*


    ——勒内·笛卡尔，《方法论》


    我希望你阅读这本书的乐趣与我写作时一样多。在最后一章中，我将提供一些实用的建议，这些建议在你的数据建模职业生涯中可能会派上用场。


    ### 陷入困境时该怎么办


    我们都曾遇到过问题看起来过于复杂和棘手而难以应对的情况。你试图从多个角度解决问题，但想不出任何好的解决方案。大多数情况下，当你试图一次性解决整个问题并最终使其过于复杂时，就会出现这种情况。一个更好且可能更明智的方法是，将问题这个庞然大物分解成更小的部分，然后分别处理。这种分而治之的方法在我的整个职业生涯中都产生了奇效。这种方法之所以有效，在于通过将较大的问题分解成较小的块，你使它们更易于管理和解决。此外，较小的问题更容易与你之前成功使用和应用的现有建模模式相匹配，从而产生更健壮、更合理的解决方案。


    分而治之方法是一种策略范例。了解合理可行的策略并具备灵活应用这些策略的能力，是优秀建模者的标志。如果某种策略无效，那就停下来，重新评估并相应调整；否则你最终会浪费你自己和用户的宝贵时间。


    ### 在物理数据模型中实现子类型/超类型

    '
- fmt: '# Data Modeling: Supertype/Subtype Transformations


    In addition to dividing and conquering, being able to generalize problems is another
    of the more useful and fundamental strategies in data modeling. When done properly,
    conceptual-level generalizations improve the overall model quality and facilitate
    a better articulation of the various business rules.


    The time will come, however, when you have to decide how to propagate these subtype/supertype
    entities from conceptual data models to physical ones. Data modeling practitioners
    historically have agreed on a number of practical methodologies that deal with
    subtype/supertype transformations, as discussed in this section.


    The main reason we transform supertype/subtype entities in a physical layer is
    the simple fact that most *relational databases* (RDBs) simply cannot handle them
    directly. Some databases do provide built-in functionality that indirectly supports
    subtype/supertype concepts (for instance, Oracle’s nested tables). However, this
    functionality comes with a price; your design may become too difficult to develop,
    implement, and query.


    Because there are multiple ways of transforming subtype/supertypes in a physical
    data model, you should maintain accurate documentation regarding the reasoning
    behind performing a particular transformation. At times you may have to backtrack
    to your conceptual data model, review the reasoning behind a particular transformation,
    and propose new ways of transforming the supertype/subtype modeling structures.


    [Figure 9-1](#9781430265894_Ch09.xhtml#Fig1) displays the familiar `PARTY` supertype
    with two subtypes: `PERSON` and `ORGANIZATION`.


    ![9781430265894_Fig09-01.jpg](images/9781430265894_Fig09-01.jpg)


    [Figure 9-1](#9781430265894_Ch09.xhtml#_Fig1). Party supertype


    The transformation of this supertype structure into a physical layer can be accomplished
    in several ways, as detailed in the next three sections.


    ## Rolling Down Supertype Structure into the Associated Subtypes


    In the approach to transforming this supertype structure into a physical layer
    that involves rolling down the supertype structure into the associated subtypes,
    an entity called a `PARTY` (a supertype) simply ceases to exist. All of the attributes
    of that `PARTY` are inherited by its subtypes (in this case, `PERSON` and `ORGANIZATION`).
    In addition to the attributes, each subtype inherits all of the relationships
    from the associated supertype (an essential detail that novice modelers tend to
    forget).


    ![image](images/sq.jpg) **Caution** The finality of the phrase “cease to exist”
    declares why it is important to maintain the original conceptual model, especially
    in the event you need to backtrack to the original design.


    ## Rolling Up Subtypes into the Associated Supertype


    The transformation that rolls up subtypes into the associated supertype drops
    `PERSON` and `ORGANIZATION` subtypes and rolls up their attributes and relationships
    into a `PARTY` table as optional (or nullable). To identify the instances of each
    discarded subtype, a type column typically is added to separate the person from
    the organization.


    If you decide to follow this approach, you may choose to supplement your solution
    with database views. These database views can present each subtype independently
    using SQL `SELECT` statements. For instance, in the present example you might
    choose to implement two views: `PERSON_VW` and `ORGANIZATION_VW` (where the suffix
    `VW` stands for the *view*), each reconstructing a subtype version of the model.


    ## Preserving Supertype/Subtype Structures in a Physical Model


    A third viable transformation is to model all supertype/subtype structures as
    tables in your physical model. The reasoning behind this decision should be well
    documented because the resulting structures may lead to confusion or misunderstanding.


    ## Which Option Should You Choose?


    Some data modeling practitioners preach the use of one particular transformation
    methodology and ignore others. I believe this is too restrictive and recommend
    instead that you keep your eyes and options open. A hybrid approach often provides
    the most satisfactory results. For instance, you may end up implementing only
    some of the subtypes and rolling up others. In addition, your particular database
    platform (and database version) may influence your final decision on how to implement
    supertype/subtype entities in a physical layer.


    ## Ways to Treat Derived Data


    In general, I don’t recommend storing and maintaining data that may be easily
    derived from other, already existing data. First, these data are redundant and
    take up disk space. Second, the data may be the subject of various data anomalies
    associated with unnormalized data. The first argument is becoming less important
    as disk space becomes cheaper. However, various data anomalies can pose serious
    threats to the integrity of your data and should not be taken lightly. An update—a
    *data manipulation language* (DML) operation—to one column may trigger myriad
    updates to other, dependent columns to keep the data in sync. You will have to
    make sure that these multiple updates are executed as part of a single database
    transaction, with a single commit in the end (meaning that either all the updates
    are successful, or none of them are), if you hope to keep your data consistent.
    Before you decide on how to store redundant data, do your research and explore
    all of the available options.


    For instance, a good place to calculate derived data is in database views. Database
    views are lightweight database objects that may be viewed as named database objects
    pointing to precompiled SQL `SELECT` statements. The benefit of this approach
    is that derived data can then be calculated dynamically, on the fly. Its main
    drawback is the fact that some calculations are extremely resource-intensive and
    time-consuming. And time-consuming calculations often are reason enough to precalculate
    and store any derived data in the physical tables. Although this conclusion may
    seem ambivalent, the topic of derived data is extremely complex, and there are
    no easy answers regarding its storage in a database.


    Don’t be afraid to deviate from conventional wisdom and come up with unorthodox
    solutions. What is appropriate in one case may be damaging in another. My suggestion
    is to try multiple solutions in the staging area. If a particular approach is
    too time-consuming and impractical, document it and try other options. Carefully
    research your database platform, because it may already contain features that
    you require. For instance, the Oracle database provides materialized views that
    allow you to preload and refresh (either incrementally or fully) your data, including
    derived data.


    ## Taking Action


    You’ve probably heard people say that information is power. I don’t know about
    you, but to me information by itself is inert. To make information powerful, you
    need to act on it. Only with action does information become powerful. We all know
    from experience that people tend to forget what they don’t use. Find a way to
    apply the knowledge you''ve acquired by reading this book. Skills that successful
    data modelers have acquired are a product of hard work and years of dedication.
    All of us can acquire these skills if we put enough time and passion into studying
    and practicing them.


    ## Conclusion


    Various transformations used in translating conceptual/logical models in a physical
    layer present their own challenges, and you should carefully weigh your options
    before committing to a particular design decision. Maintain accurate and up-to-date
    documentation regarding your conceptual/logical data models, because this documentation
    will come in handy when you have to backtrack and reexamine your earlier design
    decisions—especially those made during the translation phase.'
