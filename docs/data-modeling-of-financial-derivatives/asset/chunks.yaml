    # 关于作者


    ![图片](img/9781430265894_unFM-01.jpg)


    **罗伯特·马马耶夫** 是 `BinaryCurve.com` 的总裁。他在制药、金融和政府领域拥有 15 年数据建模、数据仓库和数据架构领导经验。他是数据建模领域的培训师和教材开发者，持有
    Oracle 专业认证，并在皇后学院获得计算机科学学士学位。


    # 致谢


    我由衷感谢我非凡的家人给予的爱、支持和持续鼓励，没有他们，这部作品不可能完成。


    我要向本书写作期间给予我支持、鼓励和建议的众多人士表达谢意。特别感谢 **丽贝卡·斯托特** 和 **约瑟夫·利卡塔** 协助我编辑手稿，感谢 **大卫·C·海**
    审阅并改进手稿的重要部分。


    # 前言


    *永远努力征服自己，而非命运。*


    ——勒内·笛卡尔，《方法论》


    最近我目睹了两位好友间的争论，两人均为数据建模从业者。争论焦点在于数据建模是否是一门艺术形式。一方认为成功的数据建模师是软件专业人士中精挑细选的特殊群体，其技能无法传授；要么天生具备，要么无缘此道。另一方则认为几乎任何人都能学习数据建模并成为成功的从业者。


    我未参与讨论，宁愿置身事外。作为戴尔·卡耐基的忠实学生，我知道“赢得朋友并影响他人”的最佳方式就是完全避免这类争论。但现在，我借此机会敞开心扉表达对此主题的看法。我不认为数据建模是与生俱来的艺术。对我而言，数据建模是一种习得的技能，会随着经验积累不断提升。像任何其他职业一样，数据建模需要投入、练习和热情。大多数知识都会随时间流逝而消亡，除非不断更新和运用。要精通并保持某项技能，你需要刻苦练习。正是通过练习和行动，你才能真正学习并对自己所做的事充满信心。


    # 第 1 章：引言


    *拥有良好的头脑还不够，关键在于善用它。*


    ——勒内·笛卡尔，《方法论》


    ## 本书目的


    本书旨在达成两个目标。一方面，它从数据建模视角向读者介绍金融衍生品的迷人世界，并解释主导金融工程领域的各种规则。另一方面，本书强调数据建模模式的重要性，并指出如何识别、应用和复用它们。本书不仅面向有金融背景的读者，也面向所有对数据建模和业务分析感兴趣的人。本书讨论的数据建模模式及各种策略广泛适用于其他领域，学到的经验也可应用于金融以外的多个行业项目，如制药业。


    ## 目标读者


    本书适合两类读者：


    *   了解衍生品、并对表达和处理其逻辑复杂性的技术感兴趣的专业人士

    *   具备概念数据建模经验、希望运用已掌握的分析技能学习衍生品知识的人士


    阅读本书无需预先了解衍生工具知识。在建模之前，我会对每个金融主题进行详尽解释。虽然您最好至少具备一些概念数据建模的从业经验，但本书也不需要您有深厚的数据建模知识。第
    2 章将教授全书建模所需的所有数据建模技术。即使您有丰富的衍生品建模经验，本书也会教您不熟悉的建模策略，您可以立即在自己的工作中加以应用。


    无论您的职业和行业是什么，只要能识别并运用数据建模模式，您的职业生涯都将受益。数据建模模式是业界认可的解决方案，可解决各行业常见问题。这些方案经过测试和完善，已变得稳健、简单且直观。本书将识别最重要的数据建模模式，并向您展示如何在实际中应用它们。掌握数据建模模式，加上对底层业务规则的透彻理解，将产生高质量、高效的解决方案，并能快速、在预算内交付。


