    请注意，在[图 7-2](#9781430265894_Ch07.xhtml#Fig2) 的模型中，无法指定合约的物理顺序。有时，指定合约顺序的能力非常重要。为了纳入这一需求，你可以向`TRADING
    STRATEGY`实体添加`order identifier`属性。该属性（以及最终的列）将指定`TRADING STRATEGY`中记录的物理顺序。


