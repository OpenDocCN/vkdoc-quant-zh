  raw: 'For instance, assume that the “located in” relationship between ORGANIZATION
    and COUNTRY is replaced with the “country of origin” relationship. It is possible
    that a given company was founded in country A and later was purchased by another
    party based in country B. The company in question may want to preserve the country
    of origin information to reconstruct its past history. In this case, the “country
    of origin” relationship represents a valuable piece of business information and
    should be preserved.


    In general, before removing anything from your data model (including any relationships),
    consult with the project stakeholders and subject matter experts regarding the
    validity of the relationship in question. Make sure your model and the underlying
    documentation have properly captured the meaning of each and every relationship
    (including the one in question). Only once a redundant relationship has been confirmed
    by all involved parties (aka *stakeholders*—the various subject matter experts,
    business analysts, and so forth) may you safely remove it from your data model
    and the underlying documentation.


    In every diagram up to this point, the entities on the “many” end of each relationship
    (your typical “transactional” entities) have been positioned either to the left
    or above the reference entities. I have constructed the models in this way because
    this *positional convention* forms the crux of Barker’s positional convention
    methodology. I discuss this convention further a little later in this chapter.


    Exclusivity Arc


    Consider the following business requirement as one you might have to model:


    *A pier must be owned either by a seaport authority (SA) or by a charter boat
    association (CBA). Both a seaport authority and a charter boat association may
    own more than one pier. Once owned by a party, a pier cannot be resold.*


    Your first attempt to model this requirement will be through the use of subtype/supertype
    entities ([Figure 2-15](#9781430265894_Ch02.xhtml#Fig15)). However, the subtype/supertype
    approach would not be useful here because neither a SEAPORT AUTHORITY nor a CHARTER
    BOAT ASSOCIATION can be generalized into a PIER. Similarly, a SEAPORT AUTHORITY
    is not a specialization of a PIER. You may safely conclude, then, that the model
    presented in [Figure 2-15](#9781430265894_Ch02.xhtml#Fig15) would be unusable
    because it doesn’t show a valid hierarchy, which is necessary to create a subtype/supertype
    relationship.


    ![9781430265894_Fig02-15.jpg](images/9781430265894_Fig02-15.jpg)


    [Figure 2-15](#9781430265894_Ch02.xhtml#_Fig15). Illogical subtype (incorrect
    approach)


    An alternative approach is modeled in [Figure 2-16](#9781430265894_Ch02.xhtml#Fig16).
    According to the diagram, a PIER must be owned either by a SEAPORT AUTHORITY or
    a CHARTER BOAT ASSOCIATION, but not both. An *exclusivity arc* allows you to show
    in the model without any ambiguity a business rule clearly indicating that only
    one of these multiple relationships will be valid at any one time.


    ![9781430265894_Fig02-16.jpg](images/9781430265894_Fig02-16.jpg)


    [Figure 2-16](#9781430265894_Ch02.xhtml#_Fig16). Example of an exclusivity arc


    An entity to which an exclusivity arc relationship applies is called a *target
    entity* . In the example, PIER is the target entity. An exclusivity arc should
    intersect at a minimum of two relationships. Your target entity will store the
    foreign keys that point back to the entities affected by the exclusivity arc.
    In our case, PIER will end up storing the foreign keys for the SEAPORT AUTHORITY
    and CHARTER BOAT ASSOCIATION entities.


    Barker’s Positional Convention


    Barker’s *positional convention* methodology addresses how it is easier to read
    ERDs when all of the reference entities are located to the right of the associated
    transactional entities and all of the entities on the “many side” of the crow’s
    feet (the so-called transactional entities) are located either above or to the
    left of the associated reference entities. Essentially, this type of spatial organization
    allows the viewer to begin processing data models from the right side, beginning
    with the reference entities and eventually moving toward the transactional entities.
    Discipline yourself to follow Barker’s positional convention, and you will soon
    realize that this style results in a much cleaner, crisper design. These highly
    readable designs make it easier for your end users to identify various problem
    areas and logical flaws in the data model. Moreover, nontechnical folks tend to
    prefer Barker’s positional convention because it is easier to follow; reviewers
    are less likely to get lost in a spider web of entity relationships. Keep in mind
    that many subject matter experts who will review your models will not be familiar
    with ERD modeling concepts and theory. Follow the rules outlined here and you
    will be able to engage your nontechnical audience and perhaps extract some useful
    information from them along the way.


    [Figure 2-17](#9781430265894_Ch02.xhtml#Fig17) displays a sample model that observes
    Barker’s positional rules, whereby the reference entities are located to the right
    of the associated transactional entities, and all of the *transaction-type* entities
    (on the *many* side of crow’s feet) are located either above or to the left of
    the reference entities. Don’t worry about the fine details of this model right
    now; these will be taken up in later chapters.


    ![9781430265894_Fig02-17.jpg](images/9781430265894_Fig02-17.jpg)


    [Figure 2-17](#9781430265894_Ch02.xhtml#_Fig17). Example of Barker’s positional
    conventions


