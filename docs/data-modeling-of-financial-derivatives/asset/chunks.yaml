    例如，假设 `ORGANIZATION` 和 `COUNTRY` 之间的“位于（located in）”关系被替换为“原籍国（country of origin）”关系。一家公司可能成立于
    A 国，后来被位于 B 国的另一方收购。该公司可能希望保留原籍国信息，以重构其过往历史。在这种情况下，“原籍国”关系代表了一条宝贵的业务信息，应当被保留。


    通常，在从数据模型中删除任何内容（包括任何关系）之前，请就所涉关系的有效性咨询项目利益相关者和领域专家。确保您的模型及底层文档已正确捕获每个关系（包括所涉关系）的含义。只有当所有相关方（即*利益相关者*——包括各领域专家、业务分析师等）确认某个关系确实冗余后，您才能安全地将其从数据模型和底层文档中删除。


    到目前为止的每一个图表中，每个关系“多”端（即典型的“事务性”实体）的实体都被放置在参考实体的左侧或上方。我之所以这样构建模型，是因为这种*位置惯例*构成了
    Barker 位置惯例方法论的核心。我将在本章稍后部分进一步讨论这个惯例。


    ## 互斥弧


    考虑以下可能需要建模的业务需求：


    *一个码头必须由某个海港管理局 (SA) 或某个包船协会 (CBA) 拥有。海港管理局和包船协会都可以拥有多个码头。一旦被一方拥有，码头不得转售。*


    您对这个需求建模的首次尝试可能会使用子类型/父类型实体（图 2-15）。然而，子类型/父类型方法在这里并不适用，因为无论是`海港管理局（SEAPORT AUTHORITY）`还是`包船协会（CHARTER
    BOAT ASSOCIATION）`都不能被概括为`码头（PIER）`。同样，`海港管理局`也不是`码头`的一种特化。因此，可以安全地得出结论，图 2-15
    中展示的模型是不可用的，因为它没有展示一个有效的层次结构，而这是创建子类型/父类型关系所必需的。


    ![9781430265894_Fig02-15.jpg](img/9781430265894_Fig02-15.jpg)


    图 2-15。不合逻辑的子类型（错误方法）


    图 2-16 中建模了一种替代方法。根据此图，一个`码头`必须由`海港管理局`或`包船协会`拥有，但不能同时由两者拥有。*互斥弧*允许您在模型中明确无误地展示一条业务规则，该规则清晰地表明在任何一个时间点，这些多个关系中只有一个是有效的。


    ![9781430265894_Fig02-16.jpg](img/9781430265894_Fig02-16.jpg)


    图 2-16。互斥弧的示例


    应用了互斥弧关系的实体被称为*目标实体*。在示例中，`码头`是目标实体。一个互斥弧应至少与两个关系相交。您的目标实体将存储指向受互斥弧影响的实体的外键。在我们的例子中，`码头`最终将存储指向`海港管理局`和`包船协会`实体的外键。


    ## Barker 的位置惯例


    Barker 的*位置惯例*方法论阐述了，当所有参考实体都位于相关事务性实体的右侧，并且所有位于“多端”的实体（即所谓的事务性实体）都位于相关参考实体的上方或左侧时，阅读
    ERD 会变得更加容易。本质上，这种空间组织方式允许查看者从右侧开始处理数据模型，从参考实体开始，最终转向事务性实体。请严格要求自己遵循 Barker 的位置惯例，您很快会意识到这种风格能产生更清晰、更简洁的设计。这些高度可读的设计使最终用户更容易识别数据模型中的各种问题区域和逻辑缺陷。此外，非技术背景的人员往往更偏好
    Barker 的位置惯例，因为它更易于理解；评审者不太容易迷失在实体关系的“蜘蛛网”中。请记住，许多将评审您模型的领域专家可能不熟悉 ERD 建模概念和理论。遵循此处概述的规则，您将能够吸引非技术受众的注意，并有可能在此过程中从他们那里获取一些有用的信息。


    图 2-17 展示了一个遵循 Barker 位置规则的示例模型，其中参考实体位于相关事务性实体的右侧，并且所有*事务型*实体（位于“多”端）都位于参考实体的上方或左侧。现在不必担心这个模型的细节；这些将在后续章节中介绍。


    ![9781430265894_Fig02-17.jpg](img/9781430265894_Fig02-17.jpg)


    图 2-17。Barker 位置惯例示例


    ## 结论


    Barker 的 CASE 方法论提供了一套强大的数据建模技术，受到全球建模者的使用和赞赏。如果您严格要求自己遵循 Barker 的指导方针，您的数据模型将变得更加用户友好、错误更少，并且您可能会发现自己比以往更能有效地吸引受众。Barker
    的方法论不仅使设计更清晰、更简洁，而且还促进了表达更清晰、组织更良好的设计。


    本书中的所有图表都基于 Barker 的理念。如果这是您第一次接触 Barker 的 CASE 方法，我强烈建议您查阅此处推荐的阅读材料。


