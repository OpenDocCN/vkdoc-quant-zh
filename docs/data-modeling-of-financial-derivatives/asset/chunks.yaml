- fmt: '# Once You’ve Populated the `CONTRACT ASSET ALLOCATION`


    Once you’ve populated the `CONTRACT ASSET ALLOCATION`, you need to account for
    the actual payoff schedule. Even though an FRA contract only involves one payoff
    date, it is modeled similarly to the corresponding `SWAP PAYOFF SCHEDULE`. The
    `FRA PARTY RATE TYPE SCHEDULE` stores and maintains a payoff schedule date for
    each investor. The actual six-month `LIBOR` rate applicable between times `T1`
    and `T2` will be stored whenever this value becomes available, with the payoff
    date set to the time `T1`.


    ## Modeling FRA Asset Delivery


    An entity that controls an actual FRA contract delivery is a `FRA PARTY RATE TYPE
    SCHEDULE` ([Figure 8-11](#9781430265894_Ch08.xhtml#Fig11)). Before the cash flows
    behind a given FRA contract are exchanged, an interest rate observation must take
    place. The applicable `LIBOR` rate must be recorded in the `FRA PARTY RATE TYPE
    SCHEDULE` so that the actual payoff amount can be determined. During the delivery
    phase, physical assets (such as cash) are exchanged between the contract participants;
    hence, a relationship is established between the `DELIVERY` entity and the physical
    `ASSET`.


    ![9781430265894_Fig08-11.jpg](images/9781430265894_Fig08-11.jpg)


    [Figure 8-11](#9781430265894_Ch08.xhtml#_Fig11). FRA and asset delivery


    ## Modeling ISDA Documentation and Confirmations


    Most derivative contracts (including swaps and FRAs) in the OTC market are based
    on the ISDA documentation. ISDA documentation is extremely complex and technical.
    The reason for this complexity is the necessity of accounting for the underlying
    contractual risk in the OTC market. In this section we examine the structure of
    the ISDA documentation and identify its major components.[¹](#9781430265894_Ch08.xhtml#Fn1)


    The main component of the ISDA documentation is the `ISDA MASTER AGREEMENT` ([Figure
    8-12](#9781430265894_Ch08.xhtml#Fig12)). Once the parties sign this agreement,
    it will govern all future transactions between them. ISDA master agreements can
    be classified into two types: `MULTICURRENCY CROSS BORDER MASTER AGREEMENTS` and
    `LOCAL CURRENCY SINGLE JURISDICTION MASTER AGREEMENTS`.


    - `MULTICURRENCY CROSS BORDER MASTER AGREEMENTS` deal with parties located in
    different jurisdictions, where transactions typically involve different currencies.

    - `LOCAL CURRENCY SINGLE JURISDICTION MASTER AGREEMENTS` deal with parties located
    in the same jurisdiction, where transactions typically involve the same currency.


    ![9781430265894_Fig08-12.jpg](images/9781430265894_Fig08-12.jpg)


    [Figure 8-12](#9781430265894_Ch08.xhtml#_Fig12). Modeling an ISDA document structure


    An `ISDA MASTER AGREEMENT` consists of two sections: the `STANDARD TERMS` and
    the `SCHEDULE`. The `STANDARD TERMS` deal with things such as netting, events
    of default, early termination, governing laws, and so forth. These are the standard
    terms and definitions meant to be negotiated and agreed on by both parties. The
    `SCHEDULE` section references the standard terms and their agreed-on definitions.
    In addition, the schedule lists every amendment applied to the `STANDARD TERMS`.


    Typically, parties agree to a derivative contract over the phone. The terms of
    the oral agreement they reach are documented in the `CONFIRMATION`. The process
    is simple: one of the parties documents on paper all of the components of the
    transaction and forwards it to the counterparty for acceptance. The ISDA provides
    a standard, plain vanilla `CONFIRMATION`, which is a short document containing
    the business terms. If a particular transaction cannot be covered by a plain vanilla
    confirmation (sometimes called a *structured deal*), the parties must create their
    own confirmation that is tailored to their needs. In the end, the `CONFIRMATION`
    becomes part of the `SCHEDULE`, which in turn becomes part of the `ISDA MASTER
    AGREEMENT` ([Figure 8-13](#9781430265894_Ch08.xhtml#Fig13)).


    ![9781430265894_Fig08-13.jpg](images/9781430265894_Fig08-13.jpg)


    [Figure 8-13](#9781430265894_Ch08.xhtml#_Fig13). Modeling an ISDA document structure
    (with confirmation)


    What happens when data in the `SCHEDULE` section conflict with the `ISDA MASTER
    AGREEMENT`? In this case, the data in the `SCHEDULE` section win, according to
    the *inconsistency rule*. The reason for this is simple; the schedule section
    is where all of the fine-tuning takes place, and thus it overrides the general
    data that appear in the `ISDA MASTER AGREEMENT`. What if data in the `SCHEDULE`
    section disagree with the `CONFIRMATION`? Once again, according to the inconsistency
    rule, the data in the `CONFIRMATION` section win out.


    At this point, you may have already guessed that the internal structure of the
    `ISDA MASTER AGREEMENT` document, represented in the model by a document-within-a-document
    structure, may be modeled using a many-to-many recursive relationship as presented
    in [Chapter 3](#9781430265894_Ch03.xhtml) ([Figure 8-14](#9781430265894_Ch08.xhtml#Fig14)).
    The `DOCUMENT STRUCTURE` allows us to model the complicated document-within-a-document
    relationship exemplified by the convoluted structure of the ISDA master agreement
    document.[²](#9781430265894_Ch08.xhtml#Fn2)


    ![9781430265894_Fig08-14.jpg](images/9781430265894_Fig08-14.jpg)


    [Figure 8-14](#9781430265894_Ch08.xhtml#_Fig14). Generic representation of an
    ISDA document structure


    ## Conclusion


    This chapter discussed swaps and forward rate agreements, two contract types that
    are highly popular in the OTC derivatives market and governed by similar sets
    of business rules. As usual, I modeled these contract types by repurposing modeling
    patterns developed in previous chapters to these contract-specific business rules.


    [¹](#9781430265894_Ch08.xhtml#_Fn1) Tan Sin Liang, *“Documentation of Over-the-Counter
    Derivatives”* (2001), `http://www.lawgazette.com.sg/2001-4/April01-focus.htm`.


    [²](#9781430265894_Ch08.xhtml#_Fn2) See the descriptions of document metadata
    and the modeling of document structure in such complicated subject areas as Material
    Safety Data Sheets and clinical trials observations in David C. Hay, *Data Model
    Patterns: Conventions of Thought* (Dorset House, 1995; ibid., *Data Model Patterns:
    A Metadata Map* (Morgan Kaufmann, 2006).


    ---


    # CHAPTER


    ## Parting Thoughts


    *Nothing is more fairly distributed than common sense: no one thinks he needs
    more of it than he already has.*


    —René Descartes, *Le Discours de la Méthode*


    I hope that you enjoyed reading this book as much as I enjoyed writing it. In
    this last chapter I give a few practical pointers that you may find useful in
    your data modeling career.


    ### What to Do When You Get Stuck


    We’ve all been in situations in which a problem has looked too complex and daunting
    to tackle. You try to approach the problem from multiple angles but can’t come
    up with any good solutions. In most cases, situations like these arise when you
    try to solve an entire problem all at once and end up overcomplicating it. A better
    and probably more sensible approach is to break the problem-monolith into smaller
    parts and tackle them separately. This divide-and-conquer approach has worked
    wonders for me throughout my career. The effectiveness of this method lies in
    the fact that by breaking larger problems into smaller chunks, you make them more
    manageable and easier to solve. Moreover, smaller problems can be more easily
    fitted into already existing modeling patterns you’ve successfully used and applied
    before, resulting in more robust and sensible solutions.


    The divide-and-conquer approach is an example of a strategy. Knowledge of sound,
    workable strategies and ability to be agile in applying them are the trademarks
    of an excellent modeler. If a strategy does not work, then stop, reassess, and
    alter it accordingly; otherwise you''ll end up wasting your and your users'' valuable
    time.


