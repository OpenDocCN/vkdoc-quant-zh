    [Figure 2-12](#9781430265894_Ch02.xhtml#_Fig12). Recursive one-to-one relationship


    # Redundant Relationships


    In some cases, a spot check of your model may show a relationship derived from
    another already-existing relationship in the model. This relationship is called
    a *redundant relationship*; it should be removed from your model, along with any
    associated documentation that you may have created.


    [Figure 2-13](#9781430265894_Ch02.xhtml#Fig13) shows a redundant "located in"
    relationship between the `ORGANIZATION` and the `COUNTRY` entity; this relationship
    is redundant because the same information can be deduced from the relationships
    between the `ORGANIZATION` and `CITY` and the `CITY` and `COUNTRY` entities.


    ![9781430265894_Fig02-13.jpg](images/9781430265894_Fig02-13.jpg)


    [Figure 2-13](#9781430265894_Ch02.xhtml#_Fig13). Example of a redundant relationship
    (before the change)


    [Figure 2-14](#9781430265894_Ch02.xhtml#Fig14) shows the same information as before,
    with the redundant relationship removed. Make sure to properly document your reasoning
    and findings before physically removing any relationship.


    ![9781430265894_Fig02-14.jpg](images/9781430265894_Fig02-14.jpg)


    [Figure 2-14](#9781430265894_Ch02.xhtml#_Fig14). Example with redundant relationship
    removed


    Situations may arise where a relationship you need to remove is semantically different
    and thus cannot be logically deduced from an already-existing relationship. In
    general, semantics is a subfield of linguistics that studies the meanings of words.
    In addition, *semantics* has been widely adopted as a term used in theoretical
    computer science to refer to the meaning of languages, as opposed to that language''s
    form (*syntax*). This book uses *semantics* in the linguistic sense of a word
    in reference to precisely defining the meanings of the words used in models.'
