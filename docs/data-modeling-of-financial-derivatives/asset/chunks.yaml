    # 哈利·埃利斯与理查德·巴克的洞见


    哈利·埃利斯和理查德·巴克带给这个领域的重要洞见并非符号表示法（尽管它确实是最佳的），而是这样一种理念：模型本质上是对一组关于企业本质的自然语言陈述的图形化表示。图形仅仅是做笔记的一种方式。如果你能巧妙地创建关系名称（顺便说一句，这并不是一个微不足道的细节），你就能得到一组领域专家必须表示同意或反对的陈述。


    # 关系规则


    以下是使用巴克表示法时管控关系的规则：


    *   一个关系最多只能存在于两个实体之间。

    *   一个实体可以与自身建立关系（称为递归关系）。

    *   一个关系有两个视角。

    *   给定关系的每个视角都应被标注。


    # 子类型之间的关系


    图 2-7 强调了子类型本身如何能够参与各种关系。例如，`PARTY` 的一个名为 `PERSON` 的子类型参与与 `PARTY EDUCATION` 的关系。以图形方式在子类型与其他实体之间创建关系的能力，是数据专家的重要辅助工具，也是业界广泛使用的一种手段。


    ![9781430265894_Fig02-07.jpg](img/9781430265894_Fig02-07.jpg)


    图 2-7. 记录子类型关系


    图 2-8 描绘了一种更复杂且微妙的、常常令新手建模者感到困惑的情况。这里我们在同一超类型的两个子类型之间建立了关系。一个 `PERSON` 和一个 `ORGANIZATION`
    形成雇佣关系（在模型中由名为 `EMPLOYMENT` 的实体表示）。但如果你的业务需求允许一个 `ORGANIZATION` 与另一个 `ORGANIZATION`
    参与雇佣关系呢？这种情况在现实世界中可能发生，例如一家公司分包给另一家公司完成工作。在这种情况下，`EMPLOYMENT` 与 `PERSON` 实体之间的关系应修改为
    `EMPLOYMENT` 与 `PARTY` 实体之间的关系，以使关系更具通用性。


    ![9781430265894_Fig02-08.jpg](img/9781430265894_Fig02-08.jpg)


    图 2-8. 子类型之间的关系


    如果有业务规则规定在某些情况下一个 `PARTY` 可以雇佣另一个 `PARTY` 呢？在这种情况下，我们可能希望建立两个 `PARTY` 与 `EMPLOYMENT`
    之间的关系，从而允许 `PARTY` 的任何子类型与另一个 `PARTY` 参与雇佣关系。


    # 建模递归关系


    自引用关系在数据建模中非常重要。它们被分为三大类：


    *   递归多对多关系

    *   递归一对多关系

    *   递归一对一关系


    ## 递归一对多关系


    一个简单的递归（图 2-9）通常通过让一个外键引用同一实体的主键来实现。这种类型的递归称为*层次结构*。


    ![9781430265894_Fig02-09.jpg](img/9781430265894_Fig02-09.jpg)


    图 2-9. 一对多递归关系示例


    图 2-9 中的递归关系可以理解为：


    *   每个员工可以管理一名或多名员工

    *   每个员工只能被一名且仅被一名员工管理


    在数据库管理系统中实现一对多递归关系相对直接。表 2-1 通过让一个外键引用同一实体的主键来展示一个解决方案。


    表 2-1. 实现一对多递归关系


    | **Employee id** | **Name** | **Manager id** |

    | --- | --- | --- |

    | 1 | Joe |  |

    | 2 | Tony | 1 |

    | 3 | Robert | 1 |

    | 4 | Richard | 2 |

    | 5 | Jane | 2 |

    | 6 | Lisa | 3 |

    | 7 | Alex | 3 |

    | 8 | Ben | 5 |

    | 9 | Mark | 5 |

    | 10 | Lan | 6 |


    ## 递归多对多关系


    在数据建模中另一种非常重要的递归关系类型是递归*多对多*（M:N）关系。这种关系的结构在图 2-10 中进行了说明。


    ![9781430265894_Fig02-10.jpg](img/9781430265894_Fig02-10.jpg)


    图 2-10. 多对多递归关系示例


    该图最初可能看起来令人困惑，但当你记住每个 `DOCUMENT` 可以由其他 `DOCUMENTS`（或子文档）组成时，它就很容易解释了。那么每个 `DOCUMENT`（包含任意数量的子文档）本身也可能是一组文档的一部分，这些文档共同构成另一个更大的
    `DOCUMENT`。


    递归多对多关系通常无法由现代数据库管理系统直接处理，而必须使用一个 `STRUCTURE` 实体将其转换为两个常见的一对多关系。图 2-11 中的图表描绘了使用
    `STRUCTURE` 实体解决递归 M:N 关系的一般方案。请注意，图 2-11 中的模型通常被称为*物料清单*（BOM）结构。


    ![9781430265894_Fig02-11.jpg](img/9781430265894_Fig02-11.jpg)


    图 2-11. 使用结构实体解决多对多递归关系


    这里，借助一个 `DOCUMENT STRUCTURE` 实体，一个递归多对多关系被转换为两个一对多关系。请注意，来自 `DOCUMENT STRUCTURE`
    实体的这两个关系是强制性的。


    ## 递归一对一关系


    递归*一对一*关系被称为*链*（图 2-12），其中一个实体实例在任一方向上最多只能与另一个实体实例关联。


    ![9781430265894_Fig02-12.jpg](img/9781430265894_Fig02-12.jpg)


    图 2-12. 递归一对一关系


    # 冗余关系


    在某些情况下，对你的模型进行抽查可能会发现某个关系可以从模型中已有的另一个关系推导出来。这种关系被称为*冗余关系*；它应该从你的模型中移除，连同你可能已经创建的任何相关文档。


    图 2-13 展示了 `ORGANIZATION` 与 `COUNTRY` 实体之间一个冗余的“位于”关系；该关系是冗余的，因为相同的信息可以从 `ORGANIZATION`
    与 `CITY` 以及 `CITY` 与 `COUNTRY` 实体之间的关系中推导出来。


    ![9781430265894_Fig02-13.jpg](img/9781430265894_Fig02-13.jpg)


    图 2-13. 冗余关系示例（修改前）


    图 2-14 展示了与之前相同的信息，但移除了冗余关系。在物理删除任何关系之前，请确保妥善记录你的推理和发现。


    ![9781430265894_Fig02-14.jpg](img/9781430265894_Fig02-14.jpg)


    图 2-14. 移除冗余关系后的示例


    可能会出现你需要移除的关系在语义上不同，因此无法从已有关系中逻辑推导出来的情况。通常，语义学是语言学的一个子领域，研究词语的含义。此外，*语义*作为一个术语已被广泛应用于理论计算机科学中，指代语言的含义，与之相对的是语言的形式（*语法*）。本书使用*语义*一词的语言学含义，旨在一丝不苟地精确定义模型中使用的词语含义。

