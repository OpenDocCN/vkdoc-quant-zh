- fmt: '# Futures Contract Modeling


    Each contract may be closed out prior to its expiration date, leading to another
    futures contract with an opposite position compared to the original contract.
    Futures contracts may result in physical delivery. Each party engaged in a futures
    contract is usually asked to maintain an exchange-controlled margin account. Great
    care is usually taken to unambiguously specify a valid range of commodity grades
    that will satisfy a particular consumption asset in the scope of a given futures
    contract. The modeler’s job is to store and maintain this range and associate
    it with a proper `variable`.


    This list of futures contract requirements bears a resemblance to those of other
    financial contracts—especially forward contracts. Granted, the mechanics that
    govern the inner workings of futures contracts are more complex than those of
    other contract types owing to the imposition of exchange regulations. But breaking
    down the exchange-imposed business rules into smaller and more manageable steps
    facilitates the task of applying the principles you’ve already learned and shaping
    them to meet your current business needs.


    ## Modeling Employment


    Let’s begin our futures contract modeling exercise with a simple task: modeling
    the employment relationship. You may be wondering why we discuss employment within
    the context of futures contracts. The answer is simple: futures contracts are
    exchange-driven and always involve a broker on one side of the contract.


    In general, employment is modeled as a relationship between two parties: a `PERSON`
    and an `ORGANIZATION` ([Figure 5-1](#9781430265894_Ch05.xhtml#Fig1)). Can one
    person employ another person, or can organization employ another organization?
    It all depends on the underlying business requirements. You may have to account
    for the fact that a person may employ another person. In such cases, draw two
    generic relationships between the `PARTY` and `EMPLOYMENT` entities.


    ![9781430265894_05-01.jpg](images/9781430265894_05-01.jpg)


    *[Figure 5-1](#9781430265894_Ch05.xhtml#_Fig1). Modeling an employment relationship*


    An interesting feature of the `EMPLOYMENT` entity (a relationship that is modeled
    as an entity) is that it looks similar to the `CONTRACT`. In fact, `EMPLOYMENT`
    may be viewed as a type of contract between a `PERSON` and an `ORGANIZATION`,
    for which the `start date` attribute signifies the beginning of the employment
    and the `end date` attribute signifies the ending of it. Incidentally, the marriage
    relationship is modeled similarly, involving a relationship between one `PERSON`
    and another `PERSON`.


    ## Subtyping Futures Contracts


    Let’s proceed to another simple exercise: subtyping the `CONTRACT TYPE` (a supertype)
    into the following two subtypes ([Figure 5-2](#9781430265894_Ch05.xhtml#Fig2)):


    * `FUTURES CONTRACT TYPE`

    * `OTHER TYPE`


    ![9781430265894_05-02.jpg](images/9781430265894_05-02.jpg)


    *[Figure 5-2](#9781430265894_Ch05.xhtml#_Fig2). Futures contract subtype*


    This subtyping allows us to neatly specify the type of contract we are modeling
    to avoid any ambiguities and conflicts later in the context of a larger data model.
    Keep in mind that each contract type supports a specific set of business requirements
    and rules. By explicitly associating a specific `CONTRACT TYPE` with a `CONTRACT`,
    we implicitly specify the underlying business rules and end user understanding.
    Business professionals working in the financial sector will understand these business
    rules as long as they can clearly and unambiguously identify a given contract
    type.


    Simplicity and clarity should be your top priority when creating conceptual data
    models. The end goal for your modeling exercises is to be understood and gain
    support among your peers and various user groups. Paying close attention to details
    such as proper subtype use will keep your model presentations concise, simple,
    and unambiguous. I highly recommend that you follow this approach because in the
    long run this thoroughness will pay off and save you time.


    ## Modeling Futures Contracts Participation


    [Figure 5-3](#9781430265894_Ch05.xhtml#Fig3) assembles and displays some of the
    building blocks we’ve just learned, including:


    * An `EMPLOYMENT` entity

    * A properly subtyped `CONTRACT TYPE`

    * The relationship between the `CONTRACT` and a proper contract type (namely,
    a `FUTURES CONTRACT TYPE`)


    ![9781430265894_05-03.jpg](images/9781430265894_05-03.jpg)


    *[Figure 5-3](#9781430265894_Ch05.xhtml#_Fig3). Associating parties with a futures
    contract*


    Note that the relationship between the `CONTRACT PARTICIPATION` and `CONTRACT`
    entities is mandatory on both sides. As mentioned twice previously, mandatory-on-both-sides
    relationships occur infrequently in practice and should be examined with great
    care. Typically, they are drawn to emphasize a specific business rule. In our
    model we are emphasizing the following business rule: one cannot have a valid
    contract without corresponding contract participation, and one cannot have contract
    participation without a contract. To account for this, make sure that `CONTRACT
    PARTICIPATION` entity instances are populated together with the `CONTRACT` and
    packaged within the same transaction. In addition, you should document that `CONTRACT
    PARTICIPATION` must contain at least two entity instances: one for the employee/party
    playing the `BUYER` role, and another for the employee/party playing the `SELLER`
    role. The `EMPLOYMENT` entity signifies that on one side of a futures contract
    we always have a broker who represents a particular financial exchange.


    Why are buyer and seller attributes not stored on the contract level in [Figure
    5-3](#9781430265894_Ch05.xhtml#Fig3)? You may have noticed that the way this starter
    model is designed, it can easily be adjusted to accommodate any new roles that
    the business may identify. For instance, imagine that you’ve been asked to model
    the following business scenario: investor A and investor B have signed a simple
    barter contract and agree to exchange a ton of wheat for a ton of soybeans exactly
    60 days from now. In a situation like this, you will either be forced to call
    one party a buyer even though this party is not technically a buyer, or keep on
    adding contract attributes to account for these new contract roles. In a generic
    model such as [Figure 5-3](#9781430265894_Ch05.xhtml#Fig3), all you have to do
    is to extend the `ROLE TYPE` supertype (thus widening it) and specify any additional
    contract roles. Extensive redesign will not be required because your original
    design gracefully accommodates these types of changes. The ability to accommodate
    change is one of the criteria that characterize a superior data model.


    ## Associating Futures Contracts with Paper Assets (Asset Types)


    [Figure 5-4](#9781430265894_Ch05.xhtml#Fig4) models the relationship between a
    `CONTRACT` and an `ASSET TYPE`, resulting in the creation of a new entity called
    `CONTRACT ASSET ALLOCATION`. The purpose of the `CONTRACT ASSET ALLOCATION` entity
    is to associate parties through the `CONTRACT PARTICIPANT` with a specific `ASSET
    TYPE` that they are responsible for in the context of a given futures contract.
    Here you will store and maintain the following nonmandatory attributes (whichever
    one is applicable in the current context), either `amount` or `quantity`. A `UNIT
    OF MEASURE` entity helps you associate a specific unit of measure with the `quantity`.
    The relationship between the `UNIT OF MEASURE` and the `CONTRACT ASSET ALLOCATION`
    is nonmandatory on both sides. This is by design because the unit of measure specification
    (in the context of the `CONTRACT ASSET ALLOCATION`) depends on the nature of the
    `ASSET TYPE` and may be entirely optional. You saw a similar model in the context
    of forward contracts and are familiar with most of its features by now.


    ![9781430265894_05-04.jpg](images/9781430265894_05-04.jpg)


    *[Figure 5-4](#9781430265894_Ch05.xhtml#_Fig4). Associating futures contracts
    with paper assets (asset types)*'
