- fmt: 'Apress business books provide essential information and practical advice,
    each written for practitioners by recognized experts. Busy managers and professionals
    in all areas of the business world—and at all levels of technical sophistication—look
    to our books for the actionable ideas and tools they need to solve problems, update
    and enhance their professional skills, make their work lives easier, and capitalize
    on opportunity.


    Whatever the topic on the business spectrum—entrepreneurship, finance, sales,
    marketing, management, regulation, information technology, among others—Apress
    has been praised for providing the objective information and unbiased advice you
    need to excel in your daily work life. Our authors have no axes to grind; they
    understand they have one job only—to deliver up-to-date, accurate information
    simply, concisely, and with deep insight that addresses the real needs of our
    readers.


    It is increasingly hard to find information—whether in the news media, on the
    Internet, and now all too often in books—that is even-handed and has your best
    interests at heart. We therefore hope that you enjoy this book, which has been
    carefully crafted to meet our standards of quality and unbiased coverage.


    We are always interested in your feedback or ideas for new titles. Perhaps you’d
    even like to write a book yourself. Whatever the case, reach out to us at `editorial@apress.com`
    and an editor will respond swiftly. Incidentally, at the back of this book, you
    will find a list of useful related titles. Please visit us at `www.apress.com`
    to sign up for newsletters and discounts on future purchases.


    *The Apress Business Team*


    To all the people who believed in me and encouraged me to publish this work!


