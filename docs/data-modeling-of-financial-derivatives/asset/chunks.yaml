- fmt: '[Figure 6-9](#9781430265894_Ch06.xhtml#_Fig9). Modeling an option’s exercise
    type


    The purpose of the `threshold amount` attribute (of the `AUTOMATIC EXERCISE TYPE`
    subtype) is to specify by how much a given option has to be in the money to initiate
    an automatic exercise. Note that the relationship between the `CONTRACT` and `EXERCISE
    RULE TYPE` entities is nonmandatory on both sides. The reason for this is simple:
    in the OTC market the necessity to specify the proper `EXERCISE RULE TYPE` becomes
    less prominent because the onus is on each individual investor to properly terminate
    a given option. Your specific business requirements will guide you on how to proceed,
    so study them carefully.


    ## Closing Out Option Contract


    To close out a position in a given option contract, an investor can issue an `offsetting
    order` on the same option. For example, assume that an investor has bought an
    option. He can close out his position by issuing an offsetting order to sell the
    same option.


    In [Figure 6-10](#9781430265894_Ch06.xhtml#Fig10), an `OFFSETTING ORDER STRATEGY`
    (a subtype of the `BUSINESS STRATEGY`) and the associated `BUSINESS STRATEGY ACTION
    ITEMS` identify how, according to the business, any offsetting orders should be
    handled. `CONTRACT ACTIVITY` identifies a set of all `BUSINESS STRATEGY ACTION
    ITEMS` executed on behalf of a given `CONTRACT`.


    ![9781430265894_Fig06-10.jpg](images/9781430265894_Fig06-10.jpg)


    [Figure 6-10](#9781430265894_Ch06.xhtml#_Fig10). Closing out an option contract


    Once the `OFFSETTING ORDER STRATEGY` has been chosen by the investor, the resulting
    contracts (both the original and the offsetting contract) should be stored in
    the `CONTRACT STRUCTURE`. Note that both contracts should share the same unique
    transaction identifier. Moreover, the `CLASSIFICATION TYPE` entity should help
    the modeler further categorize a set of contracts grouped together by the same
    transaction identifier. In the case of offsetting orders, the `BASIC OFFSETTING
    ORDER` should be used to classify the offsetting orders in the `CONTRACT STRUCTURE`.


    ## Naked Options


    When an option contract is not combined with an offsetting position in the underlying
    stock, the option strategy is called a `naked option` strategy. The following
    hypothetical example should explain the mechanics behind a naked option.


    ![image](images/sq.jpg) **Example** Investor A writes a European-style call option
    for US$50 and agrees to sell on December 31, 2014, one Intel option standardized
    contract for $20 per share, without actually owning the underlying Intel stock.
    Note that the above-mentioned scenario is often classified as writing a naked
    call. Assume that today is June 1, 2014, and investor B has purchased the option
    contract from investor A for $50. As we have already learned, one option contract
    typically requires the purchase of 100 shares. On December 31, 2014, upon the
    contract''s expiration, the Intel stock price ends up being $25; investor B exercises
    his purchasing right. To honor this contract, investor A will have to purchase
    the Intel shares on the spot market for $25 per share and deliver them to the
    investor B, which will culminate in the following loss:


    ```

    (100 x ($25 – $20)) – $50 = $450

    ```


    Note that we subtract $50 because this is the amount that investor A received
    from investor B for writing the call option.


    Can you imagine investor A’s losses if, instead of writing a call option on one
    standardized contract, he had specified 10 standardized contracts? His losses
    would have multiplied, all due to his unnecessarily risky naked option strategy.


    Of course, writing a naked call option might look more tempting in retrospect
    if the December 31, 2014, Intel stock spot price happened to be $15. In that case,
    investor B would walk away from the deal because he could purchase the same shares
    for a lower price on the spot market, allowing investor A to pocket the original
    option payment of $50. Regardless of the outcome, however, writing a naked call
    is very risky and frowned on by most regulators.


    Let’s review the model in [Figure 6-10](#9781430265894_Ch06.xhtml#Fig10) to see
    how it can help us identify a naked option strategy. Again, contracts that are
    part of the same overall strategy should be grouped together by a common transaction
    identifier and classified according to a common `CLASSIFICATION TYPE`. Assume
    that investor A alters his trading strategy and executes the following trading
    steps:


    1.  He enters into one December forward contract to purchase 100 Intel shares.

    2.  He writes a December-expiring call option to sell these 100 Intel shares.


    As a result, we would group together the contracts that form the backbone of the
    trading strategy and allow them to share the same transaction identifier and the
    same `CLASSIFICATION TYPE`. Incidentally, the `CLASSIFICATION TYPE` for this particular
    trading strategy could be called `WRITING A COVERED CALL`. By examining the `CONTRACT
    STRUCTURE` and the `CONTRACT` data, we can easily spot anomalous contracts and
    identify the parties responsible for them.


    ## Modeling an Option’s Delivery Subject Area


    [Figure 6-11](#9781430265894_Ch06.xhtml#Fig11) models an option’s delivery subject
    area. Assume that an investor takes a long position in a call option to purchase
    one share of Microsoft stock. The option in question is targeted for physical
    settlement and expires on December 31, 2013. Upon the option''s expiration, if
    the market conditions are favorable, the investor will be able to exercise this
    option. Option exercise, in general, may be considered an `asset-transforming`
    event. Here, the investor transforms the actual stock option and cash into one
    Microsoft stock certificate. The main reason for this type of transaction is the
    investor’s intention to keep that specific stock for the long term for speculative
    purposes.


    ![9781430265894_Fig06-11.jpg](images/9781430265894_Fig06-11.jpg)


    [Figure 6-11](#9781430265894_Ch06.xhtml#_Fig11). Modeling an option contract''s
    delivery


    At the end of the transaction, the party who writes the call option will have
    to deliver the underlying stock (the physical asset). Upon completion of the delivery,
    the option ceases to exist and the underlying paper asset is transformed into
    a physical one (the stock certificate).


    The model in [Figure 6-11](#9781430265894_Ch06.xhtml#Fig11) does not reflect certain
    steps that you, as the modeler, will have to consider. Once delivery is complete,
    your application logic will have to remove the expired option from your physical
    asset pool. In a physical database, it is rarely considered preferable to physically
    delete data; it is generally considered more sensible to flag deleted rows by
    applying a so-called `soft delete` (aka `logical delete`). Removing one physical
    asset (the stock option) from the inventory pool and adding another physical asset
    (the stock) is a process and thus cannot be shown directly in the data model;
    these tasks must be modeled separately by process architects.


    ## FLEX Options


    `Flexible exchange-traded options` (FLEX) were introduced by the CBOE in 1993.
    These are option contracts without specifically set terms, meaning that these
    contracts are nonstandard. Here, one party may set the overall structure of a
    contract and specify a particular exercise date or strike price. As one could
    expect, it takes time and effort to find a counterparty who will agree to the
    structure of the underlying FLEX contract. FLEX contracts take a relatively long
    time to negotiate and purchase, resulting in their being less liquid compared
    to standardized option contracts. However, they can be useful for profiting from
    the OTC option market. [Figure 6-12](#9781430265894_Ch06.xhtml#Fig12) diagrams
    one way to model FLEX option contracts.


    ![9781430265894_Fig06-12.jpg](images/9781430265894_Fig06-12.jpg)


    [Figure 6-12](#9781430265894_Ch06.xhtml#_Fig12). Modeling FLEX contract options'
  raw: '[Figure 6-9](#9781430265894_Ch06.xhtml#_Fig9). Modeling an option’s exercise
    type


    The purpose of the threshold amount attribute (of the AUTOMATIC EXERCISE TYPE
    subtype) is to specify by how much a given option has to be in the money to initiate
    an automatic exercise. Note that the relationship between the CONTRACT and EXERCISE
    RULE TYPE entities is nonmandatory on both sides. The reason for this is simple:
    in the OTC market the necessity to specify the proper EXERCISE RULE TYPE becomes
    less prominent because the onus is on each individual investor to properly terminate
    a given option. Your specific business requirements will guide you on how to proceed,
    so study them carefully.


    Closing Out Option Contract


    To close out a position in a given option contract, an investor can issue an *offsetting
    order* on the same option. For example, assume that an investor has bought an
    option. He can close out his position by issuing an offsetting order to sell the
    same option.


    In [Figure 6-10](#9781430265894_Ch06.xhtml#Fig10), an OFFSETTING ORDER STRATEGY
    (a subtype of the BUSINESS STRATEGY) and the associated BUSINESS STRATEGY ACTION
    ITEMS identify how, according to the business, any offsetting orders should be
    handled. CONTRACT ACTIVITY identifies a set of all BUSINESS STRATEGY ACTION ITEMS
    executed on behalf of a given CONTRACT.


    ![9781430265894_Fig06-10.jpg](images/9781430265894_Fig06-10.jpg)


    [Figure 6-10](#9781430265894_Ch06.xhtml#_Fig10). Closing out an option contract


    Once the OFFSETTING ORDER STRATEGY has been chosen by the investor, the resulting
    contracts (both the original and the offsetting contract) should be stored in
    the CONTRACT STRUCTURE. Note that both contracts should share the same unique
    transaction identifier. Moreover, the CLASSIFICATION TYPE entity should help the
    modeler further categorize a set of contracts grouped together by the same transaction
    identifier. In the case of offsetting orders, the BASIC OFFSETTING ORDER should
    be used to classify the offsetting orders in the CONTRACT STRUCTURE.


    Naked Options


    When an option contract is not combined with an offsetting position in the underlying
    stock, the option strategy is called a *naked option* strategy. The following
    hypothetical example should explain the mechanics behind a naked option.


    ![image](images/sq.jpg) **Example**  Investor A writes a European-style call option
    for US$50 and agrees to sell on December 31, 2014, one Intel option standardized
    contract for $20 per share, without actually owning the underlying Intel stock.
    Note that the above-mentioned scenario is often classified as writing a naked
    call. Assume that today is June 1, 2014, and investor B has purchased the option
    contract from investor A for $50\. As we have already learned, one option contract
    typically requires the purchase of 100 shares. On December 31, 2014, upon the
    contract''s expiration, the Intel stock price ends up being $25; investor B exercises
    his purchasing right. To honor this contract, investor A will have to purchase
    the Intel shares on the spot market for $25 per share and deliver them to the
    investor B, which will culminate in the following loss:


    (100 x ($25 – $20)) – $50 = $450


    Note that we subtract $50 because this is the amount that investor A received
    from investor B for writing the call option.


    Can you imagine investor A’s losses if, instead of writing a call option on one
    standardized contract, he had specified 10 standardized contracts? His losses
    would have multiplied, all due to his unnecessarily risky naked option strategy.


    Of course, writing a naked call option might look more tempting in retrospect
    if the December 31, 2014, Intel stock spot price happened to be $15\. In that
    case, investor B would walk away from the deal because he could purchase the same
    shares for a lower price on the spot market, allowing investor A to pocket the
    original option payment of $50. Regardless of the outcome, however, writing a
    naked call is very risky and frowned on by most regulators.


    Let’s review the model in [Figure 6-10](#9781430265894_Ch06.xhtml#Fig10) to see
    how it can help us identify a naked option strategy. Again, contracts that are
    part of the same overall strategy should be grouped together by a common transaction
    identifier and classified according to a common CLASSIFICATION TYPE. Assume that
    investor A alters his trading strategy and executes the following trading steps:


    1.  He enters into one December forward contract to purchase 100 Intel shares.

    2.  He writes a December-expiring call option to sell these 100 Intel shares.


    As a result, we would group together the contracts that form the backbone of the
    trading strategy and allow them to share the same transaction identifier and the
    same CLASSIFICATION TYPE. Incidentally, the CLASSIFICATION TYPE for this particular
    trading strategy could be called WRITING A COVERED CALL. By examining the CONTRACT
    STRUCTURE and the CONTRACT data, we can easily spot anomalous contracts and identify
    the parties responsible for them.


    Modeling an Option’s Delivery Subject Area


    [Figure 6-11](#9781430265894_Ch06.xhtml#Fig11) models an option’s delivery subject
    area. Assume that an investor takes a long position in a call option to purchase
    one share of Microsoft stock. The option in question is targeted for physical
    settlement and expires on December 31, 2013\. Upon the option''s expiration, if
    the market conditions are favorable, the investor will be able to exercise this
    option. Option exercise, in general, may be considered an *asset-transforming*
    event. Here, the investor transforms the actual stock option and cash into one
    Microsoft stock certificate. The main reason for this type of transaction is the
    investor’s intention to keep that specific stock for the long term for speculative
    purposes.


    ![9781430265894_Fig06-11.jpg](images/9781430265894_Fig06-11.jpg)


    [Figure 6-11](#9781430265894_Ch06.xhtml#_Fig11). Modeling an option contract''s
    delivery


    At the end of the transaction, the party who writes the call option will have
    to deliver the underlying stock (the physical asset). Upon completion of the delivery,
    the option ceases to exist and the underlying paper asset is transformed into
    a physical one (the stock certificate).


    The model in [Figure 6-11](#9781430265894_Ch06.xhtml#Fig11) does not reflect certain
    steps that you, as the modeler, will have to consider. Once delivery is complete,
    your application logic will have to remove the expired option from your physical
    asset pool. In a physical database, it is rarely considered preferable to physically
    delete data; it is generally considered more sensible to flag deleted rows by
    applying a so-called *soft delete* (aka *logical delete*). Removing one physical
    asset (the stock option) from the inventory pool and adding another physical asset
    (the stock) is a process and thus cannot be shown directly in the data model;
    these tasks must be modeled separately by process architects.


    FLEX Options


    *Flexible exchange-traded options* (FLEX) were introduced by the CBOE in 1993\.
    These are option contracts without specifically set terms, meaning that these
    contracts are nonstandard. Here, one party may set the overall structure of a
    contract and specify a particular exercise date or strike price. As one could
    expect, it takes time and effort to find a counterparty who will agree to the
    structure of the underlying FLEX contract. FLEX contracts take a relatively long
    time to negotiate and purchase, resulting in their being less liquid compared
    to standardized option contracts. However, they can be useful for profiting from
    the OTC option market. [Figure 6-12](#9781430265894_Ch06.xhtml#Fig12) diagrams
    one way to model FLEX option contracts.


    ![9781430265894_Fig06-12.jpg](images/9781430265894_Fig06-12.jpg)


    [Figure 6-12](#9781430265894_Ch06.xhtml#_Fig12). Modeling FLEX contract options'
  trans: '

    图 6-9  期权行权类型的建模


    `门限金额`属性（属于`自动行权类型`子类型）的作用是指定某期权需要达到多大的实值程度才能触发自动行权。请注意，`合约`与`行权规则类型`实体之间的关系在双方都是非强制性的。原因很简单：在场外交易市场中，指定适当的`行权规则类型`的必要性变得不那么突出，因为妥善终止某期权的责任落在了每个投资者个人身上。您的具体业务需求将指导您如何进行操作，因此请仔细研究这些需求。


    ## 了结期权合约


    为了了结某个期权合约中的头寸，投资者可以对同一期权发出`对冲订单`。例如，假设一位投资者买入了一份期权。他可以通过发出卖出同一期权的对冲订单来了结头寸。


    在图 6-10 中，一个`对冲订单策略`（`业务策略`的一个子类型）以及相关联的`业务策略行动项`标识了根据业务规则应如何处理任何对冲订单。`合约活动`标识了代表特定`合约`执行的所有`业务策略行动项`的集合。


    ![9781430265894_Fig06-10.jpg](img/9781430265894_Fig06-10.jpg)


    图 6-10  了结期权合约


    一旦投资者选择了`对冲订单策略`，所产生的合约（包括原始合约和对冲合约）应存储在`合约结构`中。请注意，这两个合约应共享同一个唯一交易标识符。此外，`分类类型`实体应帮助建模者进一步归类由同一交易标识符分组的一组合约。在对冲订单的情况下，应使用`基本对冲订单`来对`合约结构`中的对冲订单进行分类。


    ## 裸期权


    当期权合约未与标的股票中的对冲头寸相结合时，该期权策略被称为`裸期权`策略。以下假设示例将解释裸期权背后的机制。


    ![image](img/sq.jpg) **示例** 投资者 A 卖出一份价格为 50 美元的欧式看涨期权，并同意在 2014 年 12 月 31 日以每股
    20 美元的价格卖出一份英特尔期权标准合约，而实际上他并未持有标的英特尔股票。请注意，上述情况通常被归类为卖出裸看涨期权。假设今天是 2014 年 6 月
    1 日，投资者 B 以 50 美元的价格从投资者 A 处购入了该期权合约。正如我们已经了解到的，一份期权合约通常要求购买 100 股。到 2014 年 12
    月 31 日期权到期时，英特尔股票的最终价格为 25 美元；投资者 B 行使了他的购买权。为了履行此合约，投资者 A 将不得不在现货市场上以每股 25 美元的价格买入英特尔股票，并将其交付给投资者
    B，这将导致如下损失：


    ```

    (100 x ($25 – $20)) – $50 = $450

    ```


    请注意，我们减去了 50 美元，因为这是投资者 A 因卖出看涨期权而从投资者 B 处获得的金额。


    您能想象，如果投资者 A 不是卖出一份标准合约的看涨期权，而是卖出了 10 份标准合约，他的损失会是多少吗？他的损失将会成倍增加，这全都要归咎于他那种不必要的、高风险的裸期权策略。


    当然，如果事后看来，2014 年 12 月 31 日英特尔股票的现货价格恰好是 15 美元，那么卖出裸看涨期权看起来可能会更具诱惑力。在这种情况下，投资者
    B 会放弃交易，因为他可以在现货市场上以更低的价格购买相同的股票，从而让投资者 A 赚取原先的 50 美元期权费。然而，无论结果如何，卖出裸看涨期权都是非常危险的，并且受到大多数监管机构的反对。


    让我们回顾一下图 6-10 中的模型，看看它如何帮助我们识别裸期权策略。同样，属于同一总体策略的合约应通过一个公共交易标识符分组，并根据公共的`分类类型`进行分类。假设投资者
    A 改变了他的交易策略，并执行了以下交易步骤：


    1.  他签署了一份 12 月份到期的远期合约，购买 100 股英特尔股票。

    2.  他卖出了一份 12 月份到期的看涨期权，出售这 100 股英特尔股票。


    因此，我们将把这些构成交易策略基础的合约分组在一起，并让它们共享相同的交易标识符和相同的`分类类型`。顺便提一下，此特定交易策略的`分类类型`可以称为`卖出备兑看涨期权`。通过检查`合约结构`和`合约`数据，我们可以轻松发现异常合约，并确定对其负责的当事方。


    ## 期权交割主题域的建模


    图 6-11 对期权交割主题域进行了建模。假设一位投资者持有一份看涨期权的多头头寸，以购买一股微软股票。该期权旨在进行实物交割，并于 2013 年 12 月
    31 日到期。在期权到期时，如果市场条件有利，投资者将能够行使此期权。通常而言，期权行权可以被视为一个`资产转换`事件。在这里，投资者将实际的股票期权和现金转换为一份微软股票凭证。进行此类交易的主要原因在于投资者意图出于投机目的长期持有该特定股票。


    ![9781430265894_Fig06-11.jpg](img/9781430265894_Fig06-11.jpg)


    图 6-11  期权合约交割的建模


    在交易结束时，卖出看涨期权的一方必须交付标的股票（实物资产）。交割完成后，期权不复存在，且标的纸质资产转换为实物资产（股票凭证）。


    图 6-11 中的模型并未反映您作为建模者必须考虑的某些步骤。一旦交割完成，您的应用程序逻辑必须从您的实物资产池中移除已到期的期权。在物理数据库中，物理删除数据很少被认为是可取的；通常更合理的做法是通过应用所谓的`软删除`（又名`逻辑删除`）来标记已删除的行。从库存池中移除一项实物资产（股票期权）并添加另一项实物资产（股票）是一个过程，因此无法直接在数据模型中展示；这些任务必须由流程架构师单独建模。


    ## FLEX 期权


    `灵活交易所交易期权`（FLEX）由 CBOE 于 1993 年引入。这些是未设置特定条款的期权合约，这意味着这些合约是非标准的。在此，一方可以设定合约的整体结构，并指定特定的行权日或行权价格。可以预见，找到同意基础
    FLEX 合约结构的交易对手需要时间和精力。FLEX 合约的谈判和购买时间相对较长，导致其流动性比标准化期权合约差。然而，它们可以用来在场外期权市场中获利。图
    6-12 图示了一种对 FLEX 期权合约进行建模的方式。


    ![9781430265894_Fig06-12.jpg](img/9781430265894_Fig06-12.jpg)


    图 6-12  FLEX 合约期权的建模

