    I have dedicated the very last section of this book to the importance of taking
    action. Passively studying something is not enough. Only by practicing and constantly
    applying knowledge will you gain confidence and recognition in any field.


    ## Recommended Reading


    Ralph Kimball and Margy Ross. *The Data Warehouse Toolkit: The Complete Guide
    to Dimensional Modeling*, 2nd ed. Wiley, 2002.


    Richard W. Scamell, and Narayan S. Umanath. *Data Modeling and Database Design*.
    Cengage Learning, 2007.


