    ## 维护合同参与历史


    [图3-3](#9781430265894_Ch03.xhtml#Fig3)中的图表对前一节提出的问题建模了一个解决方案：如何创建和维护一个恰当的合同参与历史。此示例中`HISTORICAL
    CONTRACT PARTICIPATION`实体的目的是维护和存储对`CONTRACT PARTICIPATION`记录所做的所有更改（插入、更新和删除）。通常，在大型数据库中，您会发现一组以`HIST_`为前缀的表，旨在存储和维护基础表的历史。每当源表中的记录被更改时，数据库触发器就会触发并将必要的更改传播到基础`HIST_`表中。*数据库触发器*是一段附加到表上的代码，用于响应某些预定义事件而执行。


