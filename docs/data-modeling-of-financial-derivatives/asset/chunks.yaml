- fmt: '一旦两个记录存储在`CONTRACT ASSET ALLOCATION`中，您便可以随时返回并重建您的合同条款，以列出所有相关方及其对应角色、所涉及的资产类型以及负责这些资产的相关方。


    ## 合同结构与合同类型结构


    通常，您的需求可能要求创建*复杂合同*——即由其他合同组成的合同。例如，基础业务策略可能涉及在时间`T1`签订一份合同，然后在时间`T2`签订另一份合同，最后在时间`T3`签订第三份合同以抵消前两份合同。听起来复杂吗？它们确实可能很复杂，但这些令人费解的数据结构（[图
    3-8](#9781430265894_Ch03.xhtml#Fig8)）在实践中非常常见；明智的做法是在早期阶段就熟悉它们。解释`CONTRACT TYPE
    STRUCTURE`实体含义的一种方法是，思考各种合同类型可以相互组合的多种方式，从而创建出比基本合同类型所允许的更复杂的结构。将各种实体合同组合成定义良好的模式的能力，产生了由`CONTRACT
    TYPE STRUCTURE`指定的`CONTRACT STRUCTURE`。


    ![9781430265894_Fig03-08.jpg](images/9781430265894_Fig03-08.jpg)


    [图 3-8](#9781430265894_Ch03.xhtml#_Fig8). 合同结构与合同类型结构


    在金融工程中，给定的金融合同通常与其他合同组合打包，以创建具有特定支付函数的金融工具。这种组合使得基础业务规则更加复杂。然而，一旦您熟悉了基本构建块并理解了这些复杂结构的含义，您就能毫无困惑或犹豫地应用您的知识。


    根据您的模型，`CONTRACT STRUCTURE`可能依赖也可能不依赖`CONTRACT TYPE STRUCTURE`。实际上，您可以强制要求这种关系，以强制执行每条`CONTRACT
    STRUCTURE`必须由一个且仅由一个`CONTRACT TYPE STRUCTURE`指定的规则。通常，您的业务需求将指导您如何塑造最终的数据模型以适应当前客户的需求。


    以下假设示例将有助于阐明`CONTRACT STRUCTURE`与`CONTRACT TYPE STRUCTURE`之间的区别。假设您的组织发布了一份官方允许的合同类型列表，以及一份描述这些合同类型应如何组合（包括其特定顺序）的相应规范。此列表非常适合存储在`CONTRACT
    TYPE STRUCTURE`中。现在考虑一位投资者，他决定签订多份实体合同以创建某种特定的支付函数。我们的投资者签订的实体合同列表应存储在`CONTRACT
    STRUCTURE`中。如果要强制该投资者在签订实体合同前查阅`CONTRACT TYPE STRUCTURE`数据，则`CONTRACT STRUCTURE`与`CONTRACT
    TYPE STRUCTURE`之间的关系应修改为强制性关系（在`CONTRACT STRUCTURE`一方）。


    ## 合同变量及其分配


    通常，建模衍生合同涉及将这些合同与各种参数或*变量*关联起来。这些变量的重要性巨大；它们常常几乎独自决定给定金融合同的结果。维护这些变量对金融数据建模者来说至关重要，其设计应极为谨慎。例如，以下变量可能会被用到：


    *   特定地理区域的降水量

    *   特定地理区域的周、月或日平均温度

    *   隐含波动率值

    *   `LIBOR`¹ 和无风险利率


    您可能会疑惑投资者为何对了解温度和降水量感兴趣。如果投资者参与的是农业合同，他或她将非常有兴趣知道特定区域是否预期会出现干旱，以及其庄稼可能受影响的百分比。


    作为将这些变量硬编码到应用程序代码中的一种替代方案，[图 3-9](#9781430265894_Ch03.xhtml#Fig9) 中描绘的模型以更优雅、动态的方式解决了这个问题。²
    特定`CONTRACT`与`VARIABLE`之间的多对多关系通过`VARIABLE ASSIGNMENT`交集实体得以解决。在这里，我们可以动态指定用于评估合同并确定其结果的变量。


    ![9781430265894_Fig03-09.jpg](images/9781430265894_Fig03-09.jpg)


    [图 3-9](#9781430265894_Ch03.xhtml#_Fig9). 建模变量


    一个建议的`SUGGESTED VARIABLE ASSIGNMENT`交集实体解决了`VARIABLE`与`CONTRACT TYPE`之间的多对多关系。此实体的目的是建议特定合同类型可能需要的变量。您可以将其视为建议，因为`SUGGESTED
    VARIABLE ASSIGNMENT`与`VARIABLE ASSIGNMENT`之间的关系在双方都是非强制性的。您的需求将指导您如何建模此关系。如有必要，您可以强制此关系为强制性关系，以强制执行每条变量分配必须由一条建议的变量分配来建议的业务规则。`VARIABLE
    OBSERVATION`实体存储了在特定日期和时间记录的实际变量观测值。从`VARIABLE OBSERVATION`出发的两条关系是互斥的，因为您只能实际观测到合同分配的变量（通过`VARIABLE
    ASSIGNMENT`）或通过`SUGGESTED VARIABLE ASSIGNMENT`指定的变量。


    ## 业务策略


    本节考虑一个名为`BUSINESS STRATEGY`的实体（参见[图 3-10](#9781430265894_Ch03.xhtml#Fig10)）。*业务策略*概述了一系列旨在维持公司竞争优势的行动。或者，它也可以被视为公司可能用来改善其利润底线的方法。通常，从业者必须在特定金融合同的上下文中对业务策略进行建模。`SETTLEMENT
    STRATEGY`和`CONTRACT MARKET ASSESSMENT`是业务策略的两个示例。执行特定`BUSINESS STRATEGY`所需的一系列行动项在`BUSINESS
    STRATEGY ACTION ITEMS`中概述。这些规则通常成为一套*标准操作程序*（SOP），指导企业在特定条件下如何推进以及采取哪些步骤。


    ![9781430265894_Fig03-10.jpg](images/9781430265894_Fig03-10.jpg)


    [图 3-10](#9781430265894_Ch03.xhtml#_Fig10). 介绍业务策略与业务策略行动项


    以`SETTLEMENT STRATEGY`为例。`BUSINESS STRATEGY ACTION ITEMS`可能概述了组织必须执行的终止特定合同的必要步骤，包括接受入境交付所需的步骤。接受交付是一个极其复杂的过程，需要众多方的合作。例如，为了接受对手方的交付，组织必须：


    *   安排资产运输到最终目的地。

    *   确定负责特定活动的个人。


    这些细节必须提前规划好，以使组织准备好接受外部来源的交付。


    作为每个业务的关键组成部分，业务策略在实施前必须获得批准。`BUSINESS STRATEGY AUTHORIZATION`列出了已授权特定`BUSINESS
    STRATEGY`的各相关方以及授权发生的对应日期。


    ## 抵押品'
  raw: 'Once the two records are stored in the CONTRACT ASSET ALLOCATION, you can
    always return and reconstruct the terms of your contract to list all of the involved
    parties and their corresponding roles, the asset types involved, and the parties
    responsible for them.


    Contract Structure and Contract Type Structure


    Often, your requirements may call for the creation of a *complex contract*—one
    that is made up of other contracts. For instance, the underlying business strategy
    may involve entering into one contract at time T1, then entering into another
    contract at time T2, and finally entering into a third contract to offset the
    first two contracts at time T3\. Sound complicated? They can be, but these brain-teasing
    data structures ([Figure 3-8](#9781430265894_Ch03.xhtml#Fig8)) occur quite frequently
    in practice; it would be wise to familiarize yourself with them at this early
    stage. One way of interpreting the meaning of the CONTRACT TYPE STRUCTURE entity
    is to think of the numerous ways that various contract types can be combined with
    one another to create something more complicated than the basic contract type
    would allow. The ability to combine various physical contracts into a well-defined
    pattern leads to a CONTRACT STRUCTURE, which may be specified by a CONTRACT TYPE
    STRUCTURE.


    ![9781430265894_Fig03-08.jpg](images/9781430265894_Fig03-08.jpg)


    [Figure 3-8](#9781430265894_Ch03.xhtml#_Fig8). Contract structure and contract
    type structure


    In financial engineering, a given financial contract is often combined and packaged
    with other contracts to create a financial instrument with a specific payoff function.
    This combination makes the underlying business rules more complex. However, once
    you are familiar with the basic building blocks and understand the meanings of
    these complex structures, you will be able to apply your knowledge without confusion
    or hesitation.


    According to your model, the CONTRACT STRUCTURE may or may not depend on the CONTRACT
    TYPE STRUCTURE. You can, in fact, make this relationship mandatory to enforce
    the rule that each CONTRACT STRUCTURE must be specified by one and only one CONTRACT
    TYPE STRUCTURE. Typically, your business requirements will guide you on how to
    shape your resulting data model to fit the needs of your client.


    The following hypothetical example will help clarify the difference between CONTRACT
    STRUCTURE and CONTRACT TYPE STRUCTURE. Imagine that your organization has published
    an official list of allowed contract types and a corresponding specification that
    describes exactly how these contract types should be combined, including their
    specific order. This list is a perfect candidate for storage in the CONTRACT TYPE
    STRUCTURE. Now consider an investor who decides to enter into a number of physical
    contracts to create some specific payoff function. The list of physical contracts
    that our investor enters into should be stored in the CONTRACT STRUCTURE. If this
    investor is to be forced to consult with the CONTRACT TYPE STRUCTURE data before
    entering into a physical contract, the relationship between the CONTRACT STRUCTURE
    and the CONTRACT TYPE STRUCTURE should be altered to be mandatory (on the CONTRACT
    STRUCTURE side).


    Contract Variables and Their Assignment


    Quite often modeling derivative contracts involves associating those contracts
    with a variety of parameters or *variables*. The importance of these variables
    is immense; often they almost single-handedly decide the outcome of a given financial
    contract. Maintaining these variables is of paramount importance to financial
    data modelers, and their design should be approached with great care. For instance,
    the following variables may be of use:


    *   Particular geographic region precipitation level

    *   Particular geographic region average weekly, monthly, or daily temperature

    *   Implied volatility values

    *   LIBOR[¹](#9781430265894_Ch03.xhtml#Fn1) and risk-free interest rate


    You may be wondering why an investor would be interested in knowing temperature
    and precipitation levels. If the investor is involved in an agricultural contract,
    he or she will be very interested to know whether a drought is expected in a particular
    region and what percentage of his or her crop may be affected.


    As an alternative to hard coding these variables into the application code, the
    model depicted in [Figure 3-9](#9781430265894_Ch03.xhtml#Fig9) solves this problem
    with a more elegant, dynamic approach.[²](#9781430265894_Ch03.xhtml#Fn2) The many-to-many
    relationship between a given CONTRACT and a VARIABLE is resolved with the help
    of a VARIABLE ASSIGNMENT intersection entity. Here we can dynamically specify
    the variables to be used to valuate our contract and determine its outcome.


    ![9781430265894_Fig03-09.jpg](images/9781430265894_Fig03-09.jpg)


    [Figure 3-9](#9781430265894_Ch03.xhtml#_Fig9). Modeling variables


    A SUGGESTED VARIABLE ASSIGNMENT intersection entity resolves the many-to-many
    relationship between a VARIABLE and a CONTRACT TYPE. The purpose of this entity
    is to suggest variables that a given contract type might require. You can treat
    the entity as a suggestion because the relationship between the SUGGESTED VARIABLE
    ASSIGNMENT and the VARIABLE ASSIGNMENT is nonmandatory on both sides. Your requirements
    will direct you on how to model this relationship. If necessary, you may make
    this relationship a mandatory one to enforce the business rule that each variable
    assignment must be suggested by a suggested variable assignment. A VARIABLE OBSERVATION
    entity stores the actual variable observations recorded at a specific date and
    time. The two relationships coming out of the VARIABLE OBSERVATION are mutually
    exclusive, as you may only physically observe either a contract-assigned variable
    (via a VARIABLE ASSIGNMENT) or a variable specified via a SUGGESTED VARIABLE ASSIGNMENT.


    Business Strategy


    This section considers an entity called BUSINESS STRATEGY (see [Figure 3-10](#9781430265894_Ch03.xhtml#Fig10)).
    A *business strategy* outlines a set of actions directed toward maintaining a
    given company’s competitive advantage. Alternatively it may be viewed as a method
    a company might use to improve its bottom line. Quite often, practitioners must
    model a business strategy within the context of a particular financial contract.
    A SETTLEMENT STRATEGY and a CONTRACT MARKET ASSESSMENT are two examples of business
    strategies. The set of action items required to execute a particular BUSINESS
    STRATEGY are outlined in the BUSINESS STRATEGY ACTION ITEMS. These rules often
    become a set of *standard operating procedures* (SOPs) that guide businesses on
    how to proceed and which steps to take under certain conditions.


    ![9781430265894_Fig03-10.jpg](images/9781430265894_Fig03-10.jpg)


    [Figure 3-10](#9781430265894_Ch03.xhtml#_Fig10). Introducing business strategy
    and business strategy action items


    Consider the SETTLEMENT STRATEGY. BUSINESS STRATEGY ACTION ITEMS may outline the
    necessary steps an organization must perform to terminate a particular contract,
    including the steps required to accept an inbound delivery. Accepting a delivery
    is an extremely complicated process, requiring the cooperation of numerous parties.
    For instance, to accept delivery from a counterparty, an organization must:


    *   Arrange the transportation of assets to a final destination.

    *   Identify the individuals who are to be responsible for certain activities.


    These details must be outlined well in advance to prepare the organization to
    accept deliveries from outside sources.


    As a critical piece of every business, a business strategy must be authorized
    before it is implemented. The BUSINESS STRATEGY AUTHORIZATION lists the parties
    who have authorized a particular BUSINESS STRATEGY and the dates corresponding
    to when such authorizations took place.


    Collateral'
