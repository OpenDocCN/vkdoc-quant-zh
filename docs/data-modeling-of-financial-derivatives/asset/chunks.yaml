    ## Recursive Many-to-Many Relationships


    Another type of recursive relationship that is very important in data modeling
    is the recursive *many-to-many* (M:N) relationship. The structure of this relationship
    is illustrated in [Figure 2-10](#9781430265894_Ch02.xhtml#Fig10).


    ![9781430265894_Fig02-10.jpg](images/9781430265894_Fig02-10.jpg)


    [Figure 2-10](#9781430265894_Ch02.xhtml#_Fig10). Example of a many-to-many recursive
    relationship


    The diagram may initially appear confusing, but it is easy to interpret when you
    remember that each `DOCUMENT` may consist of other `DOCUMENTS` (or subdocuments).
    Then each `DOCUMENT` (incorporating any number of subdocuments) may itself be
    part of a set of documents making up another, larger `DOCUMENT`.


    Recursive many-to-many relationships typically cannot be handled directly by modern
    DBMS and must be translated instead into two familiar one-to-many relationships
    using a `STRUCTURE` entity. The diagram in [Figure 2-11](#9781430265894_Ch02.xhtml#Fig11)
    depicts a general solution to the recursive M:N relationship using the `STRUCTURE`
    entity. Note that the model in [Figure 2-11](#9781430265894_Ch02.xhtml#Fig11)
    is often called a *bill of materials* (BOM) structure*.*


    ![9781430265894_Fig02-11.jpg](images/9781430265894_Fig02-11.jpg)


