- fmt: '# Standard Option Contracts and FLEX Options


    Standard option contracts have a set of already defined terms, such as the strike
    price and expiration date. `FLEX` option contracts, on the other hand, allow investors
    to fine-tune the following terms to their specific needs:


    - Option contract strike price

    - Expiration date

    - Option style type (typically American or European)

    - Contract size

    - Option type (call or put)

    - Settlement calculation (which is based either on the opening settlement value
    or the closing settlement value)


    ## Conclusion


    This chapter discussed the option contract basics, studied the underlying business
    rules, and created various starter data models. The starter models I designed
    and built in this chapter using familiar building blocks should help you get some
    insight into the inner workings of option contracts. The next chapter will discuss
    advanced option trading strategies and ways to model them, gradually expanding
    our knowledge and reusing the concepts we learned in this chapter.


    [¹](#9781430265894_Ch06.xhtml#_Fn1) In 1997, Robert Merton and Myron Scholes received
    the Nobel Prize for their contribution to economics and financial engineering.
    (Fischer Black passed away in 1995 and therefore wasn’t able to be awarded the
    Nobel Prize.)


    # Chapter: Modeling Advanced Options Strategies


    *Cogito, ergo sum.*

    —René Descartes, *Principia Philosophiae*


    This chapter shows how financial engineers combine various contracts to produce
    unique and useful profit patterns. Previous chapters were primarily concerned
    with a singular contract, which you learned how to model with the help of specific
    business rules. This chapter explains the profit patterns and mechanics of compound
    contracts and demonstrates the ways they can be modeled. The discussion begins
    with a simple strategy involving one stock and one option.


    ## A Simple Strategy Involving One Stock and One Option


    [Chapter 6](#9781430265894_Ch06.xhtml) acquainted you with the dangers of the
    naked option strategy. Recall that selling a call option on an asset that you
    don’t physically own is called writing a naked call. This risky strategy may backfire,
    leading to significant losses and damage to the seller’s reputation. This section
    discusses the opposite strategy and ways to protect yourself against the dangers
    of the naked call.


    Consider the following simple example of the strategy of *writing a covered call*,
    whereby an investor takes a long position in a stock and a short position in a
    call option.


    ![image](images/sq.jpg) **Example** Assume that investor A simultaneously enters
    into two contracts. The first contract is a forward contract to buy 100 shares
    of Oracle stock on November 1, 2014. The second contract is an option contract
    to sell the same 100 Oracle shares on November 4, 2014. Notice that the expiration
    dates of these contracts are not exactly the same but are relatively close to
    each other. Overall, these two contracts will eventually (more or less) offset
    each other, resulting in a much better risk-management strategy than the naked
    call.


    Careful analysis of this strategy shows that the long position in the stock protects
    the investor against a stock price hike that would negatively affect the investor’s
    short position in the call option. Do you see why? Assume that an investor sells
    a call option on one Intel share at US$20. Upon the option’s expiration, the investor
    delivers the Intel share, as promised, even though the Intel spot price on the
    delivery day is $29. Instead of selling the Intel share on the spot market at
    a profit, the investor suffers a loss and delivers it to his counterparty for
    $20. In general, as a call writer, you would want the underlying asset price to
    go down.


    Traders can adopt other payoff patterns involving one stock and one option, including
    the following:


    - Taking a short position in a stock and a long position in a call option (the
    *reverse of writing a covered call*)

    - Purchasing a put option on a stock and the stock itself (sometimes called a
    *protective put*)

    - Taking a short position in a put option and a short position in the stock itself
    (called the *reverse of a protective put*)


    To model these four alternatives, the `TRADING CLASSIFICATION TYPE` supertype
    is widened to include the following subtypes:


    - `WRITING A COVERED CALL`

    - `REVERSE OF WRITING A COVERED CALL`

    - `PROTECTIVE PUT`

    - `REVERSE OF A PROTECTIVE PUT`


    These subtypes enable the modeler to properly classify and group a particular
    trading strategy and identify each physical contract forming the backbone of a
    specific trading strategy.


    The diagram in [Figure 7-1](#9781430265894_Ch07.xhtml#Fig1) illustrates the expansion
    of an already familiar `CLASSIFICATION TYPE` supertype.


    ![9781430265894_Fig07-01.jpg](images/9781430265894_Fig07-01.jpg)


    [Figure 7-1](#9781430265894_Ch07.xhtml#_Fig1). Expanding the `CLASSIFICATION TYPE`
    supertype


    Note that each trading strategy mentioned above can easily be accommodated by
    the `CONTRACT STRUCTURE` ([Figure 7-4](#9781430265894_Ch07.xhtml#Fig4)).


    ## Option Strategy Metadata Modeling


    This section detours from payoff profit patterns to discuss *metadata modeling*.
    Such models allow us the ability to describe, store, and maintain the data behind
    a particular trading strategy. Once you understand how to model trading strategy
    metadata, you should be able to apply these principles and shape and mold them
    according to your specific business requirements.


    Let’s assume you are working with a financial engineer who has asked you to come
    up with some data structures that will allow him to store and maintain a particular
    trading strategy, along with the corresponding business steps required to carry
    it out. Eventually these structures may develop into a library of all of the company-wide
    preapproved trading strategies coupled with their corresponding trading steps.
    Before you start modeling *metadata*—data that describe other data—you need to
    understand the underlying business steps. In this case, you will rely on your
    financial engineer to provide the trading strategy and corresponding list of trading
    steps.


    Assume that the financial engineer is interested in storing and maintaining the
    metadata behind writing a covered call. The first contract (the long position
    in the stock) requires the investor to take the long position in the forward contract
    to purchase the specific underlying asset (say, a share of Microsoft stock). The
    second contract (the short position in the call option) requires the investor
    to write the call option on the same underlying asset (the Microsoft stock). Both
    contracts should have relatively similar expiration dates and involve identical
    assets.


    [Figure 7-2](#9781430265894_Ch07.xhtml#Fig2) displays the solution to the problem
    of modeling a particular trading strategy together with its metadata. This section
    examines how this model enables you to store and maintain your covered call option
    metadata.


    ![9781430265894_Fig07-02.jpg](images/9781430265894_Fig07-02.jpg)


    [Figure 7-2](#9781430265894_Ch07.xhtml#_Fig2). Option strategy metadata modeling


    At the heart of the [Figure 7-2](#9781430265894_Ch07.xhtml#Fig2) model are the
    `TRADING STRATEGY` and `SPECIFICATION` entities. The `TRADING STRATEGY` stores
    and maintains each `ASSET TYPE`, `CONTRACT TYPE`, and `ROLE TYPE` (`BUYER`/`SELLER`)
    required to implement the covered call option strategy. The `SPECIFICATION` entity,
    as its name implies, lists detailed specifications for each strategy. For this
    example, the covered call option strategy specification might say that both contracts
    should be applied to the same stock and both contracts should expire in the same
    month.


    The writing a covered call strategy involves two contracts; your model needs to
    explain the structure of these contracts and associated entities.'
