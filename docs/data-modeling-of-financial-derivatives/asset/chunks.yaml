    # 排版后的文档


    ## 结算策略


    通常，结算策略是一个复杂的机制，包含许多活动部件，其中一个活动的成功依赖于其他精心规划活动的顺利完成。任何偏离计划的情况都可能耗费时间和金钱。为满足合同中的`SETTLEMENT
    STRATEGY`而实际执行的`BUSINESS STRATEGY ACTION ITEMS`存储在`CONTRACT ACTIVITY`中，并归入`SETTLEMENT
    RELATED ACTIVITIES`（请参见[图4-6](#9781430265894_Ch04.xhtml#Fig6)）。


    ## 远期合同与交割


    远期合同的结果要么是实物交割或现金结算（正向结果），要么是违约（负向结果，通常会导致各种诉讼）。在本节中，我们模拟一种正向结果：当某个远期合同导致实物交割时的情况。本节讨论并模拟了与金融资产相关的交割机制。商品交割机制更为复杂，将在[第5章](#9781430265894_Ch05.xhtml)中讨论。


    由于商品资产的质量参数存在显著差异，消费资产的定义带来了一些挑战。合同中通常会格外谨慎地精确标识每种公开交易的消费资产，以消除交割时产生误解或混淆的可能性。例如，特定玉米合同可能会指定买方期望收到的特定蛋白质含量范围。如果交割资产的蛋白质含量超出此批准范围，可能会发生几种不同情况。例如，待交割的产品可能会被取消资格，或者合同价格可能会因此降低以反映蛋白质含量的减少。


    [图4-7](#9781430265894_Ch04.xhtml#Fig7)很好地展示了如何在远期合同背景下对交割进行建模。如[第3章](#9781430265894_Ch03.xhtml)所述，`DELIVERY`被细分为`OUTBOUND
    DELIVERY`和`INBOUND DELIVERY`。这种细分允许我们明确追踪交割类型、交割的具体内容、时间及由谁执行。出于法律和监管目的，准确追踪给定合同下各方交割的内容非常重要。不要错误地将交割简单地视为收取物品并支付（现金）的过程——这过于简单化了。相反，交割应被视为一种资产转换，其中一种实物资产（现金）转换为另一种实物资产（金、铂、原油等）。这种资产转换的原因有很多，包括便利性和必要性。例如，一家工厂可能需要持续的原油供应；因此，确保原油持续供应对企业至关重要。在这种情况下，用现金换取原油是出于必要。请注意，根据我们的模型，交割与实物资产相关，而非纸面资产（或资产类型）。这是有意为之。在交割阶段，投资者交换的是实物资产而非纸面资产。交割完成后，您可以从您的实物资产库存中增加或扣除这些资产。


    ![9781430265894_Fig04-07.jpg](images/9781430265894_Fig04-07.jpg)


    [图4-7](#9781430265894_Ch04.xhtml#_Fig7). 远期合同交割建模


    您是否注意到，根据主键选择的不同，这个交割模型可以适应部分交割？例如，该模型允许您指定投资者A在特定某天向地点A交割了100桶原油，并在另一天向地点B交割了200桶原油。这共交割的300桶原油满足了一个给定合同（假设该合同要求300桶原油），这或许是可以接受的，除非投资者B提出异议并坚持要求投资者A将其全部交割到一个地点。由于仓储和运输成本过高，可能不允许进行部分交割。您的基础业务需求将指导您如何操作，并在主键确定中发挥重要作用。


    ## 远期合同与现金结算


    当交割标的资产变得不切实际时，远期合同可能会以现金结算。例如，场外远期合同可能涉及标普500指数，需要一方交割包含500只股票的投资组合。在这种情况下，特定合同可能改为以现金结算。以下是一个假设示例以澄清问题。


    ![image](images/sq.jpg) **示例** 投资者A签订一份远期合同，约定在60天后以1000美元购买一份国库券（T-bill，一种纸面资产）。投资者A在基础远期合约中持有**多头**头寸。投资者B承诺出售一份国库券，并在基础合约中持有**空头**头寸。如果在结算日，国库券的价格为1020美元，投资者B可与投资者A同意以现金结算基础合约，向投资者A支付20美元（此时为实物资产）。对于投资者A而言，这个特定远期合约的*正价值*为20美元。另一方面，如果在结算日国库券的价格为990美元，投资者A则需向投资者B支付10美元。在这种情况下，对于投资者A，该远期合约的*负价值*为10美元。


    此示例中的行为可以概括如下。如果在结算日，资产的现货价格高于远期价格，则持有**多头**头寸的投资者将收到付款。另一方面，如果在结算日资产的现货价格低于远期价格，则持有**空头**头寸的投资者将收到付款。


    为了对远期合同现金结算主题域进行建模，应将`CASH SETTLEMENT`视为`DELIVERY`的一个子类型。如[第3章](#9781430265894_Ch03.xhtml)所述，要实现此指定，必须将`DELIVERY`细分为以下之一（[图4-8](#9781430265894_Ch04.xhtml#Fig8)，复现了[图3-12](#9781430265894_Ch03.xhtml#Fig12)）：


    - `CASH SETTLEMENT`

    - `INBOUND DELIVERY`

    - `OUTBOUND DELIVERY`


    ![9781430265894_Fig04-08.jpg](images/9781430265894_Fig04-08.jpg)


    [图4-8](#9781430265894_Ch04.xhtml#_Fig8). 交割与现金结算


    [图4-9](#9781430265894_Ch04.xhtml#Fig9)描绘了远期合同现金结算机制应如何建模。该模型类似于[图4-7](#9781430265894_Ch04.xhtml#Fig7)中我们对远期合同交割主题域的建模。请注意`DELIVERY`实体与`SITE`实体之间存在的强制关系（在`DELIVERY`端是强制的）。该特定关系强制执行了业务规则，即`CASH
    SETTLEMENT`应与特定的`SITE`关联。


    ![9781430265894_Fig04-09.jpg](images/9781430265894_Fig04-09.jpg)


    [图4-9](#9781430265894_Ch04.xhtml#_Fig9). 远期合同现金结算


    ## 冲销远期合同


    投资者可以通过同时签订两份远期合同来冲销远期合同的风险：一份是卖出某种资产类型，另一份是买入相同的资产类型（例如，外币）。

    '
  raw: 'In general, the settlement strategy is a complicated mechanism with many moving
    parts, where one activity depends on the successful completion of other, well-planned
    activities. Any deviation from the plan will probably cost both time and money.
    The actual BUSINESS STRATEGY ACTION ITEMS that were implemented to meet the contract’s
    SETTLEMENT STRATEGY are stored in the CONTRACT ACTIVITY, grouped under the SETTLEMENT
    RELATED ACTIVITIES (see [Figure 4-6](#9781430265894_Ch04.xhtml#Fig6)).


    Forward Contracts and Delivery


    A forward contract results either in a physical delivery or cash settlement (a
    positive outcome) or in a default (a negative outcome, typically leading to various
    lawsuits). In this section we model a positive outcome: when a given forward contract
    results in physical delivery. This section discusses and models the delivery mechanism
    linked to a financial asset. The delivery mechanism behind commodities is more
    complicated and is discussed in [Chapter 5](#9781430265894_Ch05.xhtml).


    The definition of a consumption asset poses certain challenges due to significant
    variation in the quality parameters of the named asset. Special care is usually
    taken in contracts to precisely identify each publicly traded consumption asset
    to remove the possibility of misunderstanding or confusion at the time of delivery.
    For instance, a particular corn contract might specify a specific protein content
    range a buyer expects to receive. If the protein content of the delivered asset
    falls outside of this approved range, a few different things might occur. For
    instance, the product marked for delivery might be disqualified, or the resulting
    contract price might be reduced to reflect the reduced protein content.


    [Figure 4-7](#9781430265894_Ch04.xhtml#Fig7) gives you a good idea of how deliveries
    can be modeled within the context of forward contracts. As discussed in [Chapter
    3](#9781430265894_Ch03.xhtml), DELIVERY is subtyped into OUTBOUND and INBOUND
    DELIVERIES. This subtyping allows us to explicitly track the type of delivery,
    what exactly was delivered, when, and by whom. It is important to keep track of
    exactly what each party under a given contract delivers, for both legal and regulatory
    purposes. Don’t make the mistake of simply viewing delivery as the process of
    receiving something and paying (cash) for it—this is too simplistic. Delivery
    should instead be viewed as a type of asset transformation, in which one physical
    asset (cash) is transformed into another physical asset (gold, platinum, crude
    oil, etc.). There are numerous reasons for this asset transformation, including
    convenience and necessity. For instance, a factory plant might depend on a constant
    supply of crude oil; thus, it would be essential for the business to make sure
    that crude oil is in constant supply. In a case like this, the exchange of crude
    oil for cash would be done out of necessity. Note that according to our model,
    delivery is related to the physical assets, not to paper assets (or asset types).
    This is done by design. During the delivery phase, investors exchange physical
    assets and not paper assets. Once delivery is complete, you may add or subtract
    these assets to or from your physical asset inventory.


    ![9781430265894_Fig04-07.jpg](images/9781430265894_Fig04-07.jpg)


    [Figure 4-7](#9781430265894_Ch04.xhtml#_Fig7). Modeling forward contract delivery


    Have you noticed that this delivery model can accommodate partial deliveries,
    depending on your primary key selection? For instance, this model allows you to
    specify that investor A has delivered 100 barrels of crude oil to site A on a
    specific day, and 200 barrels of crude oil to site B on a different day. The 300
    delivered barrels of crude oil satisfies a given contract (assuming that this
    contract was for 300 barrels of crude oil), which may be fine unless investor
    B objects and insists that investor A deliver them all to one location. Partial
    deliveries may not be allowed due to the excessive warehousing and transportation
    costs. Your underlying business requirements will guide you on how to proceed
    and will play a significant role in your primary key determination


    Forward Contracts and Cash Settlements


    A forward contract may result in a cash settlement in those situations where it
    becomes impractical to deliver the underlying asset. For instance, an OTC forward
    contract may involve the S&P 500 and entail one party delivering a portfolio of
    500 stocks. In a situation like this, a given contract might instead be settled
    in cash. A hypothetical example to clarify the issue.


    ![image](images/sq.jpg) **Example**  Investor A enters into a forward contract
    to purchase one Treasury bill (T-bill, a paper asset) 60 days from now for US$1,000\.
    Investor A takes a long position in the underlying forward contract. Investor
    B promises to sell one T-bill and is taking a short position in the underlying
    contract. If, on the settlement date, the price of the T-bill turns out to be
    $1,020, investor B may agree with investor A to settle the underlying contract
    in cash by delivering him $20 (a physical asset at this point). This particular
    forward contract has a *positive value* of $20 for investor A. If, on the other
    hand, the price of the T-bill on the settlement date turned out to be $990, investor
    A would have to pay $10 to investor B. In this case, a forward contract would
    have a *negative value* of $10 for investor A.


    The behavior in this example may be generalized as follows. If, on the settlement
    date, the asset’s spot price is above the forward price, an investor with a long
    position would receive payment. If, on the other hand, on the settlement date
    the asset’s spot price is below the forward price, an investor with a short position
    would receive payment.


    To model a forward contract cash settlement subject area, one should treat the
    CASH SETTLEMENT as a DELIVERY subtype. As discussed in [Chapter 3](#9781430265894_Ch03.xhtml),
    to implement this designation, you must subtype the DELIVERY into one of the following
    ([Figure 4-8](#9781430265894_Ch04.xhtml#Fig8), reproducing [Figure 3-12](#9781430265894_Ch03.xhtml#Fig12)):


    *   CASH SETTLEMENT

    *   INBOUND DELIVERY

    *   OUTBOUND DELIVERY


    ![9781430265894_Fig04-08.jpg](images/9781430265894_Fig04-08.jpg)


    [Figure 4-8](#9781430265894_Ch04.xhtml#_Fig8). Delivery and cash settlement


    [Figure 4-9](#9781430265894_Ch04.xhtml#Fig9) depicts how a forward contract cash
    settlement mechanism may be modeled. This model is similar to the one depicted
    in [Figure 4-7](#9781430265894_Ch04.xhtml#Fig7), where we modeled a forward contract’s
    delivery subject area. Note the presence of the mandatory relationship between
    the DELIVERY entity and the SITE (mandatory on the DELIVERY side). This particular
    relationship enforces the business rule that the CASH SETTLEMENT should be associated
    with a specific SITE.


    ![9781430265894_Fig04-09.jpg](images/9781430265894_Fig04-09.jpg)


    [Figure 4-9](#9781430265894_Ch04.xhtml#_Fig9). Forward contract cash settlement


    Offsetting Forward Contracts


    An investor can offset the risk of a forward contract by simultaneously entering
    into two forward contracts: one to sell an asset type, and the other to buy the
    same asset type (for instance, a foreign currency).'
