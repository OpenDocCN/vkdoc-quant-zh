    [Figure 8-1](#9781430265894_Ch08.xhtml#_Fig1). Subtyping a contract into a swap
    type


    Interest Rate and Interest Rate Type


    The discussion of option contract valuations in [Chapter 6](#9781430265894_Ch06.xhtml)
    treated the LIBOR (London Interbank Offered Rate) rate as a variable. In this
    section we deviate from that approach and explicitly create INTEREST RATE and
    INTEREST RATE TYPE entities. The INTEREST RATE TYPE will be further subtyped into
    the LIBOR RATE TYPE and the RISK FREE RATE TYPE ([Figure 8-2](#9781430265894_Ch08.xhtml#Fig2)).
    The INTEREST RATE TYPE represents a rate type that a particular organization may
    trade in and should be treated as a general blueprint. INTEREST RATE, on the other
    hand, is the actual interest rate observed on a particular day. The reason these
    entities are modeled explicitly is because under a swap contract it is of paramount
    importance to be able to specify clearly which interest rate a particular PARTY
    in a given CONTRACT is responsible for.


    ![9781430265894_Fig08-02.jpg](images/9781430265894_Fig08-02.jpg)


    [Figure 8-2](#9781430265894_Ch08.xhtml#_Fig2). Interest rate and interest rate
