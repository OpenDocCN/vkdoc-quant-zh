    # 期货合约保证金账户模型


    图 5-8 描述了期货合约保证金账户的模型。一个`ACCOUNT`（账户）实体被建模为交易所员工与`PARTY`（参与方，可以是`PERSON`个人或`ORGANIZATION`组织）之间的合约。交易所员工（经纪人）与投资者合作，协助他们开设新账户。一个账户拥有“创建日期”和“关闭日期”属性。一个`ACCOUNT`必须基于一个`ACCOUNT
    TYPE`（账户类型），该类型可细分为：


    * `MARGIN ACCOUNT TYPE`（保证金账户类型）

    * `CASH ACCOUNT TYPE`（现金账户类型）。


    ![9781430265894_05-08.jpg](img/9781430265894_05-08.jpg)


    图 5-8. 期货合约保证金账户模型


    `CONTRACT ACCOUNT`（合约账户）成为特定期货合约的保证金账户。以下是通常与保证金账户相关的一系列属性：


    1.  开始日期

    2.  结束日期

    3.  初始保证金

    4.  维持保证金


    `ACCOUNT ACTIVITY`（账户活动）的目的是追踪与特定保证金账户相关的所有事件，并根据`ACCOUNT EVENT TYPES`（账户事件类型）对其进行分类。


    ## 期货合约交割


    正如本章开头所述，期货合约极少导致实际实物交割。事实上，交割如此罕见，以至于大多数交易员对如何处理它们只有一个模糊的概念。通常，期货合约的头寸会在该合约到期日之前很久就被平仓。


    图 5-9 对期货合约交割进行了建模。与往常一样，该模型仅描绘与当前讨论相关的实体。例如，由于期货合约交割仅涉及实物资产，任何相应的`ASSET TYPE`（资产类型）实体均未在模型中显示。


    ![9781430265894_05-09.jpg](img/9781430265894_05-09.jpg)


    图 5-9. 期货合约交割模型


    通常，组织会提前很久确定并详细说明关键的业务策略。在本节中，我们讨论交割主题领域，因此，我们将正在处理的`BUSINESS STRATEGY`（业务策略）称为`SETTLEMENT
    STRATEGY`（结算策略）。`BUSINESS STRATEGY ACTION ITEM`（业务策略行动项）实体将潜在的多项活动与特定的`BUSINESS
    STRATEGY`关联起来；而`CONTRACT ACTIVITY`（合约活动）实体则将这些`BUSINESS STRATEGY ACTION ITEMS`与特定的`CONTRACT`（合约）关联起来。例如，“交割意向”活动是`BUSINESS
    STRATEGY ACTION ITEM`的一个实例；如果此活动是为某个特定合约执行的，它将被存储在`CONTRACT ACTIVITY`中，并归入`SETTLEMENT
    RELATED ACTIVITY`（结算相关活动）组下。


    如果确实发生了实物交割，我们必须确保交割的实物资产满足合约特定的质量标准。这时，我们初始化的变量和观测到的变量（以及我们的赋值范围）就派上了用场。图 5-10
    描绘了一个模型，该模型将“标记为待交割”的实物资产与变量关联起来，并将结果赋值存储在`DELIVERY VARIABLE ASSIGNMENT`（交割变量赋值）实体中。一旦赋值完成，这些变量可以被观测并存储在`VARIABLE
    OBSERVATION`（变量观测）实体中。这些`VARIABLE OBSERVATIONS`应与交易所批准的`ASSIGNMENT RANGE`（赋值范围）核对，以确保它们满足必要的质量标准。实际的数据验证过程无法在我们的模型中展示，将由流程架构师另行设计。


    ![9781430265894_05-10.jpg](img/9781430265894_05-10.jpg)


    图 5-10. 期货合约与交割变量赋值模型


    ## 期货合约展期


    有时，需要对一个比任何可交易合约的交割日期更远的未来日期进行对冲。例如，一个投资者可能希望在 10 年后锁定一定数量铜的价格。假设任何公开交易合约的最长交割日期最远可达六年。在这种情况下，投资者可以通过平掉一个合约，并在另一个交割日期更晚的期货合约中建立相同头寸来滚动对冲。这个过程可以重复多次，直到达到所需的未来日期。请注意，在完美执行的*展期*方案下，平仓指令和开仓指令之间不应存在时间间隙（或时间滑点）。滑点会导致利润损失，应予以避免。


    展期方案可以通过使用`CONTRACT STRUCTURE`（合约结构）实体来实现（图 5-11）。这里的挑战在于追踪所有参与展期方案的合约，并能够从第一个合约开始（一直到最后一个）理清整个方案。展期只是你应该能够存储和分类的众多交易策略方案之一。


    ![9781430265894_05-11.jpg](img/9781430265894_05-11.jpg)


    图 5-11. 期货合约展期模型


    图 5-12 中的图表介绍了`CLASSIFICATION TYPE`（分类类型）实体，我们在前一章中简要讨论过它。分类类型使我们能够轻松地分组和分类相关的`CONTRACT
    STRUCTURE`实体实例。`ROLLING FORWARD`（展期）分类子类型可用于理清成为展期交易方案一部分的整组期货合约。当然，属于同一展期方案的所有期货合约将共享相同的交易方案交易标识符，以便模型用户知道它们是属于一起的。这些当然是实现细节，通常取决于您独特的业务规则和需求。


    ![9781430265894_05-12.jpg](img/9781430265894_05-12.jpg)


    图 5-12. 对合约结构进行分类


    ## 期货与远期合约的差异总结


    远期合约和期货合约是两种重要的对冲策略，它们在许多方面既相互对比又相互补充，如表 5-3 所示。


    表 5-3. 期货与远期合约对比


    | ![9781430265894_Table05-03.jpg](img/9781430265894_Table05-03.jpg) |


    ## 结论


    在本章中，我们讨论了一种重要且广受欢迎的衍生品合约类型——期货合约。我们将期货合约与远期合约进行了对比，并指出了它们的相似之处和不同之处。期货合约受交易所监管，因此风险较低。交易所通过一种称为保证金账户的功能以及某些相关的内置触发机制来降低违约风险。


    本章使用的基本构建模块已在其他地方讨论过。本章汇集了前几章讨论的数据建模构建模块，并根据期货合约的具体业务需求对其进行塑造或调整。下一章将相同的策略应用于期权。通过帮助您的模型管理复杂性并适应变化和变更，建模模式使您作为建模者的工作变得更加轻松。


    *白利糖度值*标识产品中糖固形物的百分比，并以重量百分比表示溶液的强度。

    '
- fmt: '[²](#9781430265894_Ch05.xhtml#_Fn2) The models in [Figures 5-5](#9781430265894_Ch05.xhtml#Fig5)
    through [5-7](#9781430265894_Ch05.xhtml#Fig7) are based on Hay’s models demonstrating
    how variables can be initialized and observed within the context of “the laboratory,”
    as presented in David C. Hay, *Data Model Patterns: Conventions of Thought*, Dorset
    House, 1995; and idem, *Data Model Patterns: A Metadata Map*, Morgan Kaufmann,
    2006.


    # CHAPTER


    # Modeling Options


    *We have now indicated the two operations of our understanding, intuition and
    deduction, on which alone we have said we must rely in the acquisition of knowledge.*


    —René Descartes, *Regulae ad Directionem Ingenii*


    Previous chapters familiarized you with futures and forward contracts, which allow
    investors to lock in future asset prices either in the OTC market (as in forward
    contracts) or in an exchange-controlled environment (as in futures contracts).
    You learned how their respective business requirements should be modeled and how
    to design data structures to accommodate their respective business rules. This
    chapter follows the same overall pattern in modeling another important derivative
    instrument: the option.


    An *option*, in lay terms, is a type of insurance that gives an investor a right
    but not an obligation to buy or sell the underlying paper asset. If market conditions
    become unfavorable, the investor who purchases an option can safely walk away
    from the deal. Options are traded on financial exchanges and in the OTC markets.
    For example, the CBOE is the largest options exchange in the world.


    There are two types of option contracts ([Figure 6-1](#9781430265894_Ch06.xhtml#Fig1)):


    *   A *call* option allows an investor to buy the underlying asset for a certain
    price.

    *   A *put* option allows an investor to sell the underlying asset for a certain
    price.


    ![9781430265894_Fig06-01.jpg](images/9781430265894_Fig06-01.jpg)


    [Figure 6-1](#9781430265894_Ch06.xhtml#_Fig1). Modeling option types


    All the call options or all the put options of a particular underlying asset are
    said to belong to the same *option class*. For instance, Oracle Corporation (ORCL)
    call options belong to one option class and ORCL put options belong to another
    option class.


    The underlying asset price in a given option contract is called the *strike price*
    and indicates the price at which an investor can purchase the underlying asset
    (such as a stock) on a particular date. The date when the option contract expires
    is called the *expiration date*, meaning that after this date the option contract
    becomes worthless and ceases to exist.


    On an exchange, options are packaged and sold in units called *contracts* (aka
    *standardized contracts*). Each standardized stock option contract typically contains
    100 shares. For example, an investor who purchases 10 standardized Apple call
    option contracts has acquired a right (again, not an obligation) to purchase 1,000
    Apple shares at some point in the future at a preset strike price. Of course,
    the investor in question may choose not to exercise his or her purchasing right
    if market conditions become unfavorable.


    At what point should an investor exercise the right to purchase the underlying
    asset? It all depends on the *option style* type ([Figure 6-2](#9781430265894_Ch06.xhtml#Fig2)).
    One option style is called the *European*. This particular style can only be exercised
    upon the option expiration date. Alternatively, *American options* can be exercised
    at any time prior to the expiration date. An American option style is the most
    popular because it provides the most flexibility. *Bermudan options* may be exercised
    on a preapproved range of dates. (The geographic names of the option styles are
    arbitrary, except that “Bermudan” is a play on blending American and European.)


    ![9781430265894_Fig06-02.jpg](images/9781430265894_Fig06-02.jpg)


    [Figure 6-2](#9781430265894_Ch06.xhtml#_Fig2). Modeling options and option style
    types


    Note that the `OPTION STYLE TYPE` is related to the `OPTION TYPE` (a paper asset).
    The `OPTION EXERCISE SPECIFICATION` stores detailed specifications regarding when
    the option in question may be exercised. For example, a Bermudan option exercise
    specification might say that the buyer may exercise the option only on the first
    or the fifteenth days of each month.


    Options provide investors with the ability to purchase something. However, investors
    don’t have to exercise their right to buy this something. The option’s owner may
    safely walk away from the deal if the market conditions become unfavorable. The
    downside is that an investor has to purchase an option contract beforehand. Here
    you should be able to spot the difference between futures or forward contracts
    and option contracts: it costs nothing to get into futures or forward contracts.
    Option contracts, on the other hand, cost money from the start.


    An option contract’s underlying assets are paper assets. An option is directly
    linked with (or points to) a specific asset type (for simplicity’s sake we discuss
    stock option contracts here and assume that the underlying asset is a specific
    stock). This asset type is classified as a paper asset and shouldn’t be counted
    toward or against a physical asset inventory. Transformation of these underlying
    asset types into actual, physical assets occurs when the options get exercised
    and physical assets are exchanged. (An option’s delivery mechanism is examined
    in the “Modeling an Option’s Delivery Subject Area” section.)


    A simple example serves to illustrate how option contracts work.


    ![image](images/sq.jpg) **Example** Assume that today is December 1, 2014. An
    investor is interested in purchasing Apple Corporation shares and is convinced
    that the price of these shares will dramatically increase by June 2015. The investor
    purchases one European-style option contract for $150 (the cost of the option),
    which allows him to purchase 100 Apple Corporation shares for US$200 (per share).
    Please note that $150 is the option price and has to be paid up front. The option
    contract expires on June 1, 2015. The investor who has purchased this option is
    taking a long position. On the opposite end of this contract is an investor who
    has agreed to sell 100 Apple shares on June 1, 2015, for $200 per share. The investor
    who sold this option took a short position.


    Assume that on June 1, 2015, the Apple shares go up in price with each share costing
    $220 on the spot market. The first investor decides to exercise his right to purchase
    the Apple shares and buys 100 Apple shares for $200 (per share) when the market
    price (or the spot price) of each share is $220. The first investor (with a long
    position in this option contract) has just made a profit of [($220 – $200) * 100]
    – $150 = $1,850. Note that we subtract $150 from our profit calculations because
    this is what investor A paid up front to obtain the option.


    Consider the alternative scenario of an inverse variation on the second paragraph
    of preceding example.


    ![image](images/sq.jpg) **Same Example with Variation** Suppose the price of the
    Apple stock plunges to $180 on June 1, 2015. In this case the investor has the
    right to purchase 100 Apple shares for $200, even though their market spot price
    is just $180 per share. The option gives the investor the ability to simply walk
    away from the deal, thus costing him only the original $150 he spent on the option.


    ## Option Positions


    There are four types of option positions:


    *   Call buyer (requires a long position in a call option)

    *   Put buyer (requires a long position in a put option)

    *   Call seller (requires a short position in a call option)

    *   Put seller (requires a short position in a put option)


    Option buyers hold *long positions*. Option sellers hold *short positions*. Selling
    an option is sometimes called *writing an option*.


