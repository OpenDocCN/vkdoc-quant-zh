- fmt: '# Futures Contract Margin Account Model


    [Figure 5-8](#9781430265894_Ch05.xhtml#Fig8) diagrams a futures contract margin
    account. An `ACCOUNT` entity is modeled as a contract between an employee (of
    an exchange) and a `PARTY` (which may be either a `PERSON` or an `ORGANIZATION`).
    An exchange employee (a broker) works with investors, assisting them with opening
    new accounts. An account has “date created” and “date closed” attributes. An `ACCOUNT`
    must be based on an `ACCOUNT TYPE`, which can be subtyped into:


    * `MARGIN ACCOUNT TYPE`

    * `CASH ACCOUNT TYPE`.


    ![9781430265894_05-08.jpg](images/9781430265894_05-08.jpg)


    [Figure 5-8](#9781430265894_Ch05.xhtml#_Fig8). Futures contract margin account
    model


    The `CONTRACT ACCOUNT` becomes the margin account for a given futures contract.
    Here is a list of attributes typically associated with a margin account:


    1. Start Date

    2. End Date

    3. Initial Margin

    4. Maintenance Margin


    The purpose of the `ACCOUNT ACTIVITY` is to trace all the events associated with
    a given margin account and classify them according to `ACCOUNT EVENT TYPES`.


    ## Futures Contracts Delivery


    As mentioned at the outset of this chapter, futures contracts very rarely result
    in actual physical delivery. In fact, deliveries are so rare that most traders
    have only a vague idea of how to handle them. Typically, a position in a futures
    contract is closed out well before that contract’s expiration date.


    [Figure 5-9](#9781430265894_Ch05.xhtml#Fig9) models futures contract delivery.
    As usual, the model depicts only entities relevant to the current discussion.
    For instance, because futures contract deliveries only involve physical assets,
    any corresponding `ASSET TYPE` entity is not shown in the model.


    ![9781430265894_05-09.jpg](images/9781430265894_05-09.jpg)


    [Figure 5-9](#9781430265894_Ch05.xhtml#_Fig9). Model of futures contract delivery


    Typically, an organization will identify and specify critical business strategies
    well in advance. In this section, we discuss delivery subject area and, thus,
    we’ll call the `BUSINESS STRATEGY` we’re working with the `SETTLEMENT STRATEGY`.
    The `BUSINESS STRATEGY ACTION ITEM` entity associates potentially multiple activities
    with a given `BUSINESS STRATEGY`; the `CONTRACT ACTIVITY` entity, in turn, associates
    these `BUSINESS STRATEGY ACTION ITEMS` with a given `CONTRACT`. For example, the
    `intent to deliver` activity is an example of a `BUSINESS STRATEGY ACTION ITEM`;
    if this activity is executed on behalf of a given contract, it will be stored
    in the `CONTRACT ACTIVITY`, grouped under the `SETTLEMENT RELATED ACTIVITY`.


    If physical delivery does happen, we have to make sure that the delivered physical
    asset satisfies the contract-specific quality criteria. This is where our initialized
    and observed variables (along with our assignment range) come in handy. [Figure
    5-10](#9781430265894_Ch05.xhtml#Fig10) depicts a model that relates “marked for
    delivery” physical assets with variables, storing the resulting assignment in
    the `DELIVERY VARIABLE ASSIGNMENT` entity. Once the assignment is complete, these
    variables can be observed and stored in the `VARIABLE OBSERVATION` entity. These
    `VARIABLE OBSERVATIONS` should be checked against the exchange-approved `ASSIGNMENT
    RANGE` to make sure they satisfy the necessary quality criteria. The actual process
    of data validation cannot be shown in our model and will be designed separately
    by process architects.


    ![9781430265894_05-10.jpg](images/9781430265894_05-10.jpg)


    [Figure 5-10](#9781430265894_Ch05.xhtml#_Fig10). Futures contract and delivery
    variable assignment model


    ## Rolling Forward Futures Contracts


    Sometimes a hedge is needed on a date that is further in the future than the delivery
    date of any of the tradable contracts. For instance, an investor might like to
    lock in the price of a certain amount of copper 10 years from now. Imagine that
    the maximum delivery date of any of the publicly tradable contracts goes forward
    up to six years. In a case like this, the investor may roll the hedge forward
    by closing one contract and taking the same position in another futures contract
    with a later delivery date. This process may be repeated numerous times until
    the desired future date is reached. Note that under a perfectly executed *rolling
    forward* scheme, there should be no time gap (or time slippage), between a closing
    order and an opening order. Slippages cause a loss of profit and should be avoided.


    A rolling forward scheme can be implemented by using a `CONTRACT STRUCTURE` entity
    ([Figure 5-11](#9781430265894_Ch05.xhtml#Fig11)). The challenge here is to track
    all of the contracts that participated in the rolling forward scheme and be able
    to unravel an entire scheme from the first contract (and all the way up to the
    last). Rolling forward is just one of the many trading strategy schemes that you
    should be able to store and classify.


    ![9781430265894_05-11.jpg](images/9781430265894_05-11.jpg)


    [Figure 5-11](#9781430265894_Ch05.xhtml#Fig11). Model of a rolling forward futures
    contract


    The diagram in [Figure 5-12](#9781430265894_Ch05.xhtml#Fig12) introduces the `CLASSIFICATION
    TYPE` entity, which we discussed briefly in the previous chapter. The classification
    type allows us to easily group and classify related `CONTRACT STRUCTURE` entity
    instances. The `ROLLING FORWARD` classification subtype may be used to unravel
    entire sets of futures contracts that became part of the rolling forward trading
    scheme. Of course, all of the futures contracts that are part of the same rolling
    forward scheme will share the same trading scheme transaction identifier so that
    users of the model will know that they belong together. These are, of course,
    implementation details, which typically are dependent on your unique business
    rules and needs.


    ![9781430265894_05-12.jpg](images/9781430265894_05-12.jpg)


    [Figure 5-12](#9781430265894_Ch05.xhtml#Fig12). Classifying contract structure


    ## Summary of the Differences between Futures and Forward Contracts


    Forward and futures contracts are two important hedging strategies that in many
    respects contrast with and complement each other, as summarized in the [Table
    5-3](#9781430265894_Ch05.xhtml#Tab3).


    [Table 5-3](#9781430265894_Ch05.xhtml#_Tab3). Contrasting futures and forward
    contracts


    | ![9781430265894_Table05-03.jpg](images/9781430265894_Table05-03.jpg) |


    ## Conclusion


    In this chapter we discussed the important and hugely popular derivative contract
    type called a futures contract. We contrasted futures contracts with forward contracts
    and identified their similarities and differences. Futures contracts are exchange-regulated
    and hence less risky. The exchange mitigates the risk of default with a feature
    called a margin account and certain associated built-in triggers.


    The basic building blocks used in this chapter have been discussed elsewhere.
    This chapter assembled the data modeling building blocks discussed in previous
    chapters and shaped or molded them according to the specific business requirements
    of futures contracts. The next chapter applies the same strategy to options. By
    helping your models manage complexity and accommodate variation and change, modeling
    patterns make your life as a modeler easier.


    *Brix value* identifies the percent of sugar solids in a product and represents
    the strength of the solution as percentage by weight.'
