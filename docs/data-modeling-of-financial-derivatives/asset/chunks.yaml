- fmt: '# 排版后的文本


    I emphasize again that, on the `CONTRACT ASSET ALLOCATION` level, futures contracts
    should be related to `ASSET TYPES` and not physical `ASSETS`. Relating futures
    contracts to physical assets would mean that the underlying assets in question
    could be counted toward or against an investor’s asset portfolio. This is wrong,
    as futures contracts should be viewed as promises and, unless you’ve already accepted
    an inbound physical delivery or a cash settlement, I strongly recommend that you
    treat the underlying assets of futures contracts as paper assets.


    ## Futures Contracts and Variable Assignment (Complete Model)


    An interesting challenge arises when we have to model and account for an exchange’s
    ability to specify a range of values for a variable that is associated with a
    given asset type—in the present instance, a commodity asset type.


    Consider, for example, an investor who enters into a frozen concentrated orange
    juice (`FCOJ`) futures contract holding a long position on the following terms:


    *   The contract size is 15,000 pounds of orange juice solids.

    *   The underlying asset’s grade is specified as “US Grade A with a `Brix` value[¹](#9781430265894_Ch05.xhtml#Fn1)
    between 35 and 55 degrees.”


    Considering how important it is to be able to store and assign a range of values
    to certain contract variables, let’s build the starter data model so that it accounts
    for this critical business requirement. Assume that the allocation of variables
    (including the range specification) is specified either generically by an exchange
    or at the contract level. Your underlying business requirements will guide you
    on how to model particular variable assignments. Once you know the general pattern
    of the variable assignment model, it will be relatively easy for you to shape
    and mold your own models according to your specific business rules.


    [Figure 5-5](#9781430265894_Ch05.xhtml#Fig5) depicts a futures contract variable
    assignment starter data model. According to the model, an `ASSET TYPE` may play
    a role in the variable assignment. The relationship between the `VARIABLE ASSIGNMENT`/`ASSET
    TYPE` and the `SUGGESTED VARIABLE ASSIGNMENT`/`ASSET TYPE` is nonmandatory on
    both sides. The reasoning behind this design decision is best explained through
    the use of a few examples. For instance, an `FCOJ` futures contract will always
    require us to account for the `Brix` variable. However, to valuate a given futures
    contract, one should store and maintain an interest rate (such as the `LIBOR`),
    which has no bearing on the underlying asset type. To generalize, an `ASSET TYPE`
    may play a role in the `VARIABLE ASSIGNMENT`**/**`SUGGESTED VARIABLE ASSIGNMENT`,
    but its presence is not required (depending on the context).


    ![9781430265894_05-05.jpg](images/9781430265894_05-05.jpg)


    [Figure 5-5](#9781430265894_Ch05.xhtml#_Fig5). Futures contract variable assignment
    and range specification (complete model)


    `ASSIGNMENT RANGE` allows us to attach a range of suitable values to a particular
    `VARIABLE`. For example, if the specified `Brix` value is between 35 and 55 degrees,
    we should first create a variable with the name set to `Brix`. Its range specification
    will be stored in the `ASSIGNMENT RANGE` with the *from* and *to* values set to
    35 and 55, respectively. Incidentally, in our hypothetical example the `Brix`
    value is a percent and doesn’t have a true unit of measure. According to our model,
    the `VARIABLE` must be characterized by a `UNIT OF MEASURE`. To solve this, we
    may add a “Not Applicable” entry into the `UNIT OF MEASURE` to account for cases
    like these. Another solution would be to update the relationship between the `UNIT
    OF MEASURE` and the `VARIABLE` and make it nonmandatory on both sides. In general,
    your particular business requirements will guide you on how to proceed.


    According to the proposed model, the exchange-suggested `VARIABLE ASSIGNMENT`
    is mandatory for a `VARIABLE` and a `CONTRACT TYPE` and nonmandatory for an `ASSET
    TYPE`. You may interpret the `SUGGESTED VARIABLE ASSIGNMENT` as something that
    is recommended or suggested by a specific ruling body.


    `VARIABLE ASSIGNMENT`, on the other hand, is performed on an individual `CONTRACT`
    level and is mandatory for a `CONTRACT` and a `VARIABLE` and nonmandatory for
    an `ASSET TYPE`. `SUGGESTED VARIABLE ASSIGNMENT` may influence contract-specific
    `VARIABLE ASSIGNMENTS`, but according to our model this relationship is nonmandatory.


    `VARIABLE OBSERVATION` stores the `VARIABLE` values observed at a certain point
    in time. According to our model, `VARIABLE OBSERVATIONS` are either performed
    according to a generic `SUGGESTED VARIABLE ASSIGNMENT` or on a contract-specific
    `VARIABLE ASSIGNMENT` level. Note that some variables don’t have to be observed
    and just need to be initialized. For instance, once the contract’s `Brix` variable
    is initialized using the `ASSIGNMENT RANGE`, we don’t anticipate someone needing
    to make periodic `VARIABLE OBSERVATIONS` of it. The underlying asset type’s price
    volatility, on the other hand, may be observed daily, and this is where the `VARIABLE
    OBSERVATION` comes in handy.


    ## Futures Contracts and Variable Assignment (Simplified Model)


    [Figure 5-6](#9781430265894_Ch05.xhtml#Fig6) depicts a simplified version of the
    futures contract variable assignment model. It assumes that the ruling body has
    no input into the variable assignment and the variables are assigned on a per-contract
    level. By this point, you should be fairly familiar with the requirements of this
    model. I leave it to you to decide whether to keep the “measured by” relationship
    between the `VARIABLE` and the `UNIT OF MEASURE` as mandatory. Remember that some
    variables simply do not have a true unit of measure. In such cases, either make
    the relationship nonmandatory or create a catchall “Not Available” entry in the
    `UNIT OF MEASURE`.


    ![9781430265894_05-06.jpg](images/9781430265894_05-06.jpg)


    [Figure 5-6](#9781430265894_Ch05.xhtml#_Fig6). Futures contract variable assignment
    and range specifications (simplified model)


    ## Futures Contracts and Variable Observations


    Some of the variables associated with a given contract (either through the `VARIABLE
    ASSIGNMENT` or `SUGGESTED VARIABLE ASSIGNMENT`) are typically observed throughout
    the life of that contract. The resulting observations should be stored in an entity
    called `VARIABLE OBSERVATION` ([Figure 5-7](#9781430265894_Ch05.xhtml#Fig7); see
    also [Figures 5-5](#9781430265894_Ch05.xhtml#Fig5) and [5-6](#9781430265894_Ch05.xhtml#Fig6)).
    Prudent investors often like to valuate their contracts daily. To do so, one needs
    daily to record variables such as the asset type’s spot price and the interest
    rate (the `LIBOR` or the risk-free interest rate, for instance). Being able to
    observe and store market variables on a daily basis opens a number of possibilities,
    from computing asset price volatilities to extrapolating future interest rate
    movements based on existing historical data.[²](#9781430265894_Ch05.xhtml#Fn2)


    ![9781430265894_05-07.jpg](images/9781430265894_05-07.jpg)


    [Figure 5-7](#9781430265894_Ch05.xhtml#_Fig7). Futures contracts and variable
    observations


    ## Margin Accounts


    A margin account is a safety mechanism used by an exchange to make sure that a
    given party does not default. Margin accounts have built-in triggers that alert
    each party when funds are at a dangerously low level and have to be replenished.
    Once a trigger has been fired, an account owner has to act quickly and add more
    funds to his or her margin account. An inability to do so in a speedy manner typically
    results in various fines and penalties. The mechanics behind a given margin account
    are rather straightforward, as shown by the example given in [Table 5-2](#9781430265894_Ch05.xhtml#Tab2)).'
