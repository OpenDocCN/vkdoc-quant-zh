    # 排版后的文档


    ## 结算策略


    通常，结算策略是一个复杂的机制，包含许多活动部件，其中一个活动的成功依赖于其他精心规划活动的顺利完成。任何偏离计划的情况都可能耗费时间和金钱。为满足合同中的`SETTLEMENT
    STRATEGY`而实际执行的`BUSINESS STRATEGY ACTION ITEMS`存储在`CONTRACT ACTIVITY`中，并归入`SETTLEMENT
    RELATED ACTIVITIES`（请参见图 4-6）。


    ## 远期合同与交割


    远期合同的结果要么是实物交割或现金结算（正向结果），要么是违约（负向结果，通常会导致各种诉讼）。在本节中，我们模拟一种正向结果：当某个远期合同导致实物交割时的情况。本节讨论并模拟了与金融资产相关的交割机制。商品交割机制更为复杂，将在第
    5 章中讨论。


    由于商品资产的质量参数存在显著差异，消费资产的定义带来了一些挑战。合同中通常会格外谨慎地精确标识每种公开交易的消费资产，以消除交割时产生误解或混淆的可能性。例如，特定玉米合同可能会指定买方期望收到的特定蛋白质含量范围。如果交割资产的蛋白质含量超出此批准范围，可能会发生几种不同情况。例如，待交割的产品可能会被取消资格，或者合同价格可能会因此降低以反映蛋白质含量的减少。


    图 4-7 很好地展示了如何在远期合同背景下对交割进行建模。如第 3 章所述，`DELIVERY`被细分为`OUTBOUND DELIVERY`和`INBOUND
    DELIVERY`。这种细分允许我们明确追踪交割类型、交割的具体内容、时间及由谁执行。出于法律和监管目的，准确追踪给定合同下各方交割的内容非常重要。不要错误地将交割简单地视为收取物品并支付（现金）的过程——这过于简单化了。相反，交割应被视为一种资产转换，其中一种实物资产（现金）转换为另一种实物资产（金、铂、原油等）。这种资产转换的原因有很多，包括便利性和必要性。例如，一家工厂可能需要持续的原油供应；因此，确保原油持续供应对企业至关重要。在这种情况下，用现金换取原油是出于必要。请注意，根据我们的模型，交割与实物资产相关，而非纸面资产（或资产类型）。这是有意为之。在交割阶段，投资者交换的是实物资产而非纸面资产。交割完成后，您可以从您的实物资产库存中增加或扣除这些资产。


    ![9781430265894_Fig04-07.jpg](img/9781430265894_Fig04-07.jpg)


    图 4-7. 远期合同交割建模


    您是否注意到，根据主键选择的不同，这个交割模型可以适应部分交割？例如，该模型允许您指定投资者 A 在特定某天向地点 A 交割了 100 桶原油，并在另一天向地点
    B 交割了 200 桶原油。这共交割的 300 桶原油满足了一个给定合同（假设该合同要求 300 桶原油），这或许是可以接受的，除非投资者 B 提出异议并坚持要求投资者
    A 将其全部交割到一个地点。由于仓储和运输成本过高，可能不允许进行部分交割。您的基础业务需求将指导您如何操作，并在主键确定中发挥重要作用。


    ## 远期合同与现金结算


    当交割标的资产变得不切实际时，远期合同可能会以现金结算。例如，场外远期合同可能涉及标普 500 指数，需要一方交割包含 500 只股票的投资组合。在这种情况下，特定合同可能改为以现金结算。以下是一个假设示例以澄清问题。


    ![image](img/sq.jpg) **示例** 投资者 A 签订一份远期合同，约定在 60 天后以 1000 美元购买一份国库券（T-bill，一种纸面资产）。投资者
    A 在基础远期合约中持有**多头**头寸。投资者 B 承诺出售一份国库券，并在基础合约中持有**空头**头寸。如果在结算日，国库券的价格为 1020 美元，投资者
    B 可与投资者 A 同意以现金结算基础合约，向投资者 A 支付 20 美元（此时为实物资产）。对于投资者 A 而言，这个特定远期合约的*正价值*为 20 美元。另一方面，如果在结算日国库券的价格为
    990 美元，投资者 A 则需向投资者 B 支付 10 美元。在这种情况下，对于投资者 A，该远期合约的*负价值*为 10 美元。


    此示例中的行为可以概括如下。如果在结算日，资产的现货价格高于远期价格，则持有**多头**头寸的投资者将收到付款。另一方面，如果在结算日资产的现货价格低于远期价格，则持有**空头**头寸的投资者将收到付款。


    为了对远期合同现金结算主题域进行建模，应将`CASH SETTLEMENT`视为`DELIVERY`的一个子类型。如第 3 章所述，要实现此指定，必须将`DELIVERY`细分为以下之一（图
    4-8，复现了图 3-12）：


    - `CASH SETTLEMENT`

    - `INBOUND DELIVERY`

    - `OUTBOUND DELIVERY`


    ![9781430265894_Fig04-08.jpg](img/9781430265894_Fig04-08.jpg)


    图 4-8. 交割与现金结算


    图 4-9 描绘了远期合同现金结算机制应如何建模。该模型类似于图 4-7 中我们对远期合同交割主题域的建模。请注意`DELIVERY`实体与`SITE`实体之间存在的强制关系（在`DELIVERY`端是强制的）。该特定关系强制执行了业务规则，即`CASH
    SETTLEMENT`应与特定的`SITE`关联。


    ![9781430265894_Fig04-09.jpg](img/9781430265894_Fig04-09.jpg)


    图 4-9. 远期合同现金结算


    ## 冲销远期合同


    投资者可以通过同时签订两份远期合同来冲销远期合同的风险：一份是卖出某种资产类型，另一份是买入相同的资产类型（例如，外币）。


