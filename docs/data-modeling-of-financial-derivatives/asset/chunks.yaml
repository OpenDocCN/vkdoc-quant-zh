- fmt: '# Forward Contract Termination


    The section "Forward Contract Termination" discusses various strategies that investors
    might use to early terminate a forward contract to protect themselves from an
    unfavorable outcome.


    The discussion in this chapter makes the following assumptions:


    1. At least two parties participate in a given forward contract. In particular,
    one party holds a long position (the buyer) and its counterparty holds a short
    position (the seller).

    2. Long and short positions are nontransferable.

    3. Other parties may participate in a forward contract, and from a legal perspective
    it is important to store and maintain this data.

    4. Assets involved in a forward contract have to be explicitly listed and explicitly
    associated with the parties that are responsible for them.

    5. Forward contracts may generate multiple business activities that should be
    tracked for regulatory purposes.

    6. Forward contracts result in delivery, cash settlement, or default.


    Forward contracts are modeled in this chapter according to the specific subject
    areas and in a succession of steps. Diagrams modeled in this way are easier to
    read, manage, and interpret because they contain less noise.


    ## Subtyping Contract Type


    [Figure 4-2](#9781430265894_Ch04.xhtml#Fig2) depicts (among other things) the
    subtyping of `CONTRACT TYPE` into `FORWARD CONTRACT TYPE` and `OTHER TYPE`. Your
    organization may deal with various other contract types (swaps and futures, for
    example). If this is the case, make sure that you add each of these contract types
    as subtypes in addition to your already existing forward contract type.


    ![9781430265894_Fig04-02.jpg](images/9781430265894_Fig04-02.jpg)


    [Figure 4-2](#9781430265894_Ch04.xhtml#_Fig2). Subtyping contract type


    [Figure 4-2](#9781430265894_Ch04.xhtml#Fig2) exemplifies the basic principle of
    data model display management: keep things simple, focused, and concise. Keeping
    superfluous details out of your data models makes them easily understandable by
    your technical and nontechnical end users and makes your presentations more productive.


    ## Forward Contract Data Modeling Basics


    [Figure 4-3](#9781430265894_Ch04.xhtml#Fig3) represents the first step in the
    construction of a forward contract''s data model. The model at this point still
    lacks certain major pieces identified in the beginning of this chapter, which
    will be incrementally added in ensuing sections.


    ![9781430265894_Fig04-03.jpg](images/9781430265894_Fig04-03.jpg)


    [Figure 4-3](#9781430265894_Ch04.xhtml#_Fig3). Forward contract’s data modeling
    basics


    The `CONTRACT PARTICIPATION` entity is designed to store and maintain an act of
    participation of a certain party or parties, along with the roles that they may
    play in a given forward contract. Your organization will help you identify these
    contract participation roles. Risk always plays a major role in financial contracts,
    and forward contracts are no exception. Trading in an unregulated and uncontrolled
    environment is risky because there is always a possibility of one party defaulting
    on a promise or contract. From a regulatory point of view, your organization may
    be obligated to keep track of each contract participant. In any event, at least
    two entity instances (or entries) in the `CONTRACT PARTICIPATION` entity will
    be mandatory; these are the parties who play the roles of `BUYER` and `SELLER`.
    Incidentally, this particular business rule cannot be shown directly in the diagram.
    Note the presence of the mandatory (on both sides) relationship between the `CONTRACT`
    and `CONTRACT PARTICIPATION`. Again, approach relationships that are mandatory
    on both sides with care. After all, relationships that are mandatory on both sides
    force us to answer a "chicken or egg" causality dilemma. Even though a true relationship
    that is mandatory on both sides occurs infrequently in practice, it does happen,
    and you have every right to question its validity. In our case, the mandatory
    relationship between the `CONTRACT` and the `CONTRACT PARTICIPATION` signifies
    that these entities should be populated as part of the same transaction. In other
    words, whenever you populate `CONTRACT` data, make sure to insert at least two
    records—namely, a `BUYER` and a `SELLER`—into the `CONTRACT PARTICIPATION`.


    `CONTRACT` stores contract-specific information, such as contract start date,
    expiration dates, and contract create date. `CONTRACT TYPE` specifies a particular
    contract template, along with the corresponding business rules that a given contract
    implicitly inherits.


    Most of its features and components of the [Figure 4-3](#9781430265894_Ch04.xhtml#Fig3)
    data model are familiar because they were already discussed in [Chapter 3](#9781430265894_Ch03.xhtml).
    Many of the modeling pieces and concepts presented there recur throughout this
    book, because they supply models that incorporate the capacity to accommodate
    change. Hastily building models from scratch is anathema in most fields, especially
    in the realm of financial data modeling. Modeling patterns are designs that have
    been tested and approved by the general modeling community. They have been successfully
    deployed on multiple platforms and are generic enough to accommodate various changes.
    By recognizing a particular modeling pattern and applying it to solve a particular
    business problem, you will markedly enhance the overall quality of your design
    and improve your communication of it to end users because industry-approved design
    patterns are generally intuitive and simple to implement.


    ## Associating Forward Contracts with Asset Types


    [Figure 4-3](#9781430265894_Ch04.xhtml#Fig3) lacks associations with asset types
    (or paper assets). This deficiency is remedied in the [Figure 4-4](#9781430265894_Ch04.xhtml#Fig4)
    model.


    ![9781430265894_Fig04-04.jpg](images/9781430265894_Fig04-04.jpg)


    [Figure 4-4](#9781430265894_Ch04.xhtml#_Fig4). Forward contract and contract asset
    allocation


    The purpose of the `CONTRACT ASSET ALLOCATION` entity is to keep track of which
    underlying `ASSET TYPE` each `PARTY` (implemented through `CONTRACT PARTICIPATION`)
    is responsible for within the context of a given `CONTRACT`. For example, assume
    that:


    - Investor A agrees to purchase 100 barrels of crude oil from investor B for US$10,000,

    - Contract start date is January 1, 2014, and

    - Contract expiration date is July 1, 2014.'
