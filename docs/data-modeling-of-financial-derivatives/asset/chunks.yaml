- fmt: "# 排版后的内容\n\n![image](images/sq.jpg) **Example**  \nAssume that today is June\
    \ 1, 2014. Investor B writes a US$5 option and agrees to sell one Intel stock\
    \ for $20 on December 1, 2014. Investor A agrees to pay $5 and obtains this stock\
    \ option. In this example, our option contract has two participants: investor\
    \ A and investor B, where investor A plays the buyer and investor B plays the\
    \ call writer. Investor B will be paid $5 and subsequently will provide investor\
    \ A with the option certificate (the physical asset). The stock option in question\
    \ (the physical asset) is derived from the stock option asset type, with the specific\
    \ stock type (the paper asset) being an instrument in the underlying option. In\
    \ this example, the `CONTRACT ASSET ALLOCATION` will store and maintain the following\
    \ two records to account for the above-mentioned facts: the first record will\
    \ associate investor A (who is the option buyer) with $5 in cash (the amount).\
    \ The second record will associate investor B (who is the option seller) with\
    \ the stock option and will set the quantity equal to one. Using these `CONTRACT\
    \ ASSET ALLOCATION` records (together with the `CONTRACT PARTICIPATION`, `OPTION\
    \ EXERCISE SCHEDULE`, and `ROLE TYPE`), you can easily reconstruct the original\
    \ structure of the option and explain who was responsible for what, as well as\
    \ the original cost of the given option.\n\nAccording to the model, the `OPTION\
    \ TYPE` is further categorized according to the `OPTION STYLE TYPE` supertype.\
    \ Moreover, the `OPTION STYLE TYPE` supertype is subtyped into items such as:\n\
    \n- `AMERICAN` (options that may be exercised at any time prior to option expiration)\n\
    - `EUROPEAN` (options that may be exercised only at the expiration date)\n- `BERMUDAN`\
    \ (similar to an American option in that they may be exercised before the expiration\
    \ of the option, but similar to a European option in that they may be exercised\
    \ only on predefined dates)\n\n## The Importance of Mathematical Models\n\nMany\
    \ mathematical models have been developed to explain how to calculate option prices\
    \ and understand what direction these prices may take in the near (and not so\
    \ near) future. One of these,—the *Black-Scholes-Merton* model—is widely accepted\
    \ and extremely popular in academia.[¹](#9781430265894_Ch06.xhtml#Fn1) The Black-Scholes-Merton\
    \ model, taught in most MBA programs worldwide, is used to calculate European-style\
    \ option prices.\n\nThe main assumptions and simplifications used in the Black-Scholes-Merton\
    \ model are the following:\n\n- An option can be only exercised upon expiration.\n\
    - Interest rates are constant.\n- Underlying stocks don’t pay dividends.\n- Future\
    \ market directions cannot be predicted.\n- Commissions are not charged during\
    \ the transaction.\n- Volatility is constant over time.\n- Asset price follows\
    \ a geometric Brownian motion with a constant drift.\n\n![image](images/sq.jpg)\
    \ **Caution**  \nThe Black-Scholes-Merton assumptions tend to introduce certain\
    \ inaccuracies into option pricing calculations if not used correctly, and thus\
    \ may subject traders to excessive risk.\n\nThe most significant limitations of\
    \ the Black-Scholes-Merton model are as follows:\n\n- It produces incorrect results\
    \ for stocks that pay high dividends.\n- In real life, interest rates are never\
    \ constant.\n- Volatility cannot be constant over time.\n- The assumption that\
    \ dividends are only paid upon option expiration is not always plausible.\n- The\
    \ model assumes that large jumps in stock prices do not occur.\n- The model cannot\
    \ correctly predict the true value of American options; it undervalues them due\
    \ to the following assumption: options can be only exercised upon expiration.\
    \ American-type options may be exercised at any time prior to the option expiration\
    \ date.\n\nDespite its limitations, the Black-Scholes-Merton model remains popular\
    \ in academia and among traders because of its simplicity. Even though the model\
    \ introduces various inaccuracies in option price calculations, it still produces\
    \ adequate approximate results if used prudently.\n\nA variation of the Black-Scholes-Merton\
    \ model is called *autoregressive conditional heteroskedasticity* (ACH). The main\
    \ assumption under this model is that volatility is not constant but random. Most\
    \ financial shops have developed their own models, incorporating even more complex\
    \ models of volatility.\n\n## Calculating Volatility from Historical Data\n\n\
    The *volatility* of a stock is a measurement of investor uncertainty (or risk)\
    \ regarding the stock’s future return. Because stock price volatility plays such\
    \ an important role in options price derivations, we provide an example of a calculation\
    \ based on historical stock price data. Our assumption is that the stock in question\
    \ doesn’t pay any dividends, as this will help simplify our calculation.\n\n[Table\
    \ 6-1](#9781430265894_Ch06.xhtml#Tab1) estimates the volatility of `ORCL` stock\
    \ based on the assumption that there are 252 trading days in a year (the closing\
    \ price data are simulated, even though it is close to the real-life data.) The\
    \ “day” column specifies when the stock price was observed and the “ORCL Closing\
    \ Price (USD)” column specifies the closing price (in USD) of the stock on that\
    \ particular day. In this example, the stock price was observed for 20 consecutive\
    \ days. The best approach, most practitioners agree, is to calculate stock price\
    \ volatility on a daily schedule based on closing day prices. According to our\
    \ sample calculation, the standard deviation of the daily return based on the\
    \ simulated Oracle closing stock price data between February 20, 2013, and March\
    \ 20, 2013, is 0.011587 or 1.1587%. Based on this value, the estimated volatility\
    \ per annum (assuming that there are 252 trading days in a year) is 0.183938 or\
    \ approximately 18.4%.\n\n[Table 6-1](#9781430265894_Ch06.xhtml#_Tab1). Calculating\
    \ Volatility from Historical Data\n\n| ![9781430265894_Table06-01.jpg](images/9781430265894_Table06-01.jpg)\
    \ |\n\nAs you can see, the calculation of stock price volatility over a specific\
    \ period of time is relatively straightforward. However, you should keep in mind\
    \ that as the sample size increases, the computational process becomes more complicated.\
    \ Most financial shops will perform these types of calculations on numerous stocks\
    \ over extended periods of time; performance becomes the primary issue.\n\n##\
    \ Option Contract Variable Assignment\n\nFinancial analysts are very interested\
    \ in certain market variables (otherwise known as *measures*) when valuating option\
    \ contracts and deciding whether to exercise them. A business interested in finding\
    \ an option’s worth will use market variables to perform various statistical calculations.\
    \ Typically, options are valuated daily and the results of these calculations\
    \ are stored in a database. For instance, assume that a financial firm owns an\
    \ American-style option, which can be exercised at any time prior to the maturity\
    \ of the option contract. These analysts will be interested in knowing whether\
    \ they should hold on to this particular American option or early-exercise their\
    \ option to get rid of it on any given day.\n\nIncidentally, a good strategy is\
    \ to early-exercise an American-style option right before the dividend date. The\
    \ reason for this is that dividends reduce the intrinsic value of stocks. Once\
    \ the stock price is expected to go down, the value of the call option is expected\
    \ to decline. The value of the put option, on the other hand, is expected to increase.\n\
    \nYour organization may favor a specific set of statistical models designed to\
    \ approximate future option price movements. These models and their underlying\
    \ formulas depend on a number of market variables. Thus, it is very important\
    \ to model these variables properly (and by “properly” we mean adding these important\
    \ variables dynamically, on demand, and without performing much recoding)."
  raw: '![image](images/sq.jpg) **Example**   Assume that today is June 1, 2014\.
    Investor B writes a US$5 option and agrees to sell one Intel stock for $20 on
    December 1, 2014\. Investor A agrees to pay $5  and obtains this stock option.
    In this example, our option contract has two participants: investor A and investor
    B, where investor A plays the buyer and investor B plays the call writer. Investor
    B will be paid $5 and subsequently will provide investor A with the option certificate
    (the physical asset). The stock option in question (the physical asset) is derived
    from the stock option asset type, with the specific stock type (the paper asset)
    being an instrument in the underlying option. In this example, the CONTRACT ASSET
    ALLOCATION will store and maintain the following two records to account for the
    above-mentioned facts: the first record will associate investor A (who is the
    option buyer) with $5 in cash (the amount). The second record will associate investor
    B (who is the option seller) with the stock option and will set the quantity equal
    to one. Using these CONTRACT ASSET ALLOCATION records (together with the CONTRACT
    PARTICIPATION, OPTION EXERCISE SCHEDULE, and ROLE TYPE), you can easily reconstruct
    the original structure of the option and explain who was responsible for what,
    as well as the original cost of the given option.


    According to the model, the OPTION TYPE is further categorized according to the
    OPTION STYLE TYPE supertype. Moreover, the OPTION STYLE TYPE supertype is subtyped
    into items such as:


    *   AMERICAN (options that may be exercised at any time prior to option expiration)

    *   EUROPEAN (options that may be exercised only at the expiration date)

    *   BERMUDAN (similar to an American option in that they may be exercised before
    the expiration of the option, but similar to a European option in that they may
    be exercised only on predefined dates)


    The Importance of Mathematical Models


    Many mathematical models have been developed to explain how to calculate option
    prices and understand what direction these prices may take in the near (and not
    so near) future. One of these,—the *Black-Scholes-Merton* model—is widely accepted
    and extremely popular in academia.[¹](#9781430265894_Ch06.xhtml#Fn1) The Black-Scholes-Merton
    model, taught in most MBA programs worldwide, is used to calculate European-style
    option prices.


    The main assumptions and simplifications used in the Black-Scholes-Merton model
    are the following:


    *   An option can be only exercised upon expiration.

    *   Interest rates are constant.

    *   Underlying stocks don’t pay dividends.

    *   Future market directions cannot be predicted.

    *   Commissions are not charged during the transaction.

    *   Volatility is constant over time.

    *   Asset price follows a geometric Brownian motion with a constant drift.


    ![image](images/sq.jpg) **Caution**   The Black-Scholes-Merton assumptions tend
    to introduce certain inaccuracies into option pricing calculations if not used
    correctly, and thus may subject traders to excessive risk.


    The most significant limitations of the Black-Scholes-Merton model are as follows:


    *   It produces incorrect results for stocks that pay high dividends.

    *   In real life, interest rates are never constant.

    *   Volatility cannot be constant over time.

    *   The assumption that dividends are only paid upon option expiration is not
    always plausible.

    *   The model assumes that large jumps in stock prices do not occur.

    *   The model cannot correctly predict the true value of American options; it
    undervalues them due to the following assumption: options can be only exercised
    upon expiration. American-type options may be exercised at any time prior to the
    option expiration date.


    Despite its limitations, the Black-Scholes-Merton model remains popular in academia
    and among traders because of its simplicity. Even though the model introduces
    various inaccuracies in option price calculations, it still produces adequate
    approximate results if used prudently.


    A variation of the Black-Scholes-Merton model is called *autoregressive conditional
    heteroskedasticity* (ACH). The main assumption under this model is that volatility
    is not constant but random. Most financial shops have developed their own models,
    incorporating even more complex models of volatility.


    Calculating Volatility from Historical Data


    The *volatility* of a stock  is a measurement of investor uncertainty (or risk)
    regarding the stock’s future return. Because stock price volatility plays such
    an important role in options price derivations, we provide an example of a calculation
    based on historical stock price data. Our assumption is that the stock in question
    doesn’t pay any dividends, as this will help simplify our calculation.


    [Table 6-1](#9781430265894_Ch06.xhtml#Tab1) estimates the volatility of ORCL stock
    based on the assumption that there are 252 trading days in a year (the closing
    price data are simulated, even though it is close to the real-life data.) The
    “day” column specifies when the stock price was observed and the “ORCL Closing
    Price (USD)” column specifies the closing price (in USD) of the stock on that
    particular day. In this example, the stock price was observed for 20 consecutive
    days. The best approach, most practitioners agree, is to calculate stock price
    volatility on a daily schedule based on closing day prices. According to our sample
    calculation, the standard deviation of the daily return based on the simulated
    Oracle closing stock price data between February 20, 2013, and March 20, 2013,
    is 0.011587 or 1.1587%. Based on this value, the estimated volatility per annum
    (assuming that there are 252 trading days in a year) is 0.183938 or approximately
    18.4%.


    [Table 6-1](#9781430265894_Ch06.xhtml#_Tab1). Calculating Volatility from Historical
    Data


    | ![9781430265894_Table06-01.jpg](images/9781430265894_Table06-01.jpg) |


    As you can see, the calculation of stock price volatility over a specific period
    of time is relatively straightforward. However, you should keep in mind that as
    the sample size increases, the computational process becomes more complicated.
    Most financial shops will perform these types of calculations on numerous stocks
    over extended periods of time; performance becomes the primary issue.


    Option Contract Variable Assignment


    Financial analysts are very interested in certain market variables (otherwise
    known as *measures*) when valuating option contracts and deciding whether to exercise
    them. A business interested in finding an option’s worth will use market variables
    to perform various statistical calculations. Typically, options are valuated daily
    and the results of these calculations are stored in a database. For instance,
    assume that a financial firm owns an American-style option, which can be exercised
    at any time prior to the maturity of the option contract. These analysts will
    be interested in knowing whether they should hold on to this particular American
    option or early-exercise their option to get rid of it on any given day.


    Incidentally, a good strategy is to early-exercise an American-style option right
    before the dividend date. The reason for this is that dividends reduce the intrinsic
    value of stocks. Once the stock price is expected to go down, the value of the
    call option is expected to decline. The value of the put option, on the other
    hand, is expected to increase.


    Your organization may favor a specific set of statistical models designed to approximate
    future option price movements. These models and their underlying formulas depend
    on a number of market variables. Thus, it is very important to model these variables
    properly (and by “properly” we mean adding these important variables dynamically,
    on demand, and without performing much recoding).'
  trans: "\n# 排版后的内容\n\n![image](img/sq.jpg) **示例**  \n假设今天是 2014 年 6 月 1 日。投资者 B\
    \ 卖出一份 5 美元的期权，并同意在 2014 年 12 月 1 日以 20 美元的价格出售一股英特尔股票。投资者 A 同意支付 5 美元，从而获得这份股票期权。在本例中，我们的期权合约有两个参与者：投资者\
    \ A 和投资者 B，其中投资者 A 扮演买方，投资者 B 扮演看涨期权卖方。投资者 B 将获得 5 美元，随后向投资者 A 提供期权凭证（实物资产）。所讨论的股票期权（实物资产）来源于股票期权资产类型，其具体股票类型（纸质资产）是基础期权中的一种工具。在此示例中，`CONTRACT\
    \ ASSET ALLOCATION` 将存储并维护以下两条记录，以说明上述事实：第一条记录将投资者 A（期权买方）与 5 美元现金（金额）关联起来。第二条记录将投资者\
    \ B（期权卖方）与股票期权关联起来，并将数量设置为 1。利用这些 `CONTRACT ASSET ALLOCATION` 记录（连同 `CONTRACT\
    \ PARTICIPATION`、`OPTION EXERCISE SCHEDULE` 和 `ROLE TYPE`），您可以轻松重建期权的原始结构，并说明谁负责什么，以及给定期权的原始成本。\n\
    \n根据该模型，`OPTION TYPE` 根据 `OPTION STYLE TYPE` 超类型进一步分类。此外，`OPTION STYLE TYPE` 超类型又细分为以下项目：\n\
    \n- `AMERICAN`（可在期权到期前的任何时间行权的期权）\n- `EUROPEAN`（只能在到期日行权的期权）\n- `BERMUDAN`（类似于美式期权，可在到期前行权；但也类似于欧式期权，只能在预定日期行权）\n\
    \n## 数学模型的重要性\n\n为了解释如何计算期权价格并理解这些价格在近期（及远期）可能的走向，人们开发了许多数学模型。其中，*布莱克-斯科尔斯-默顿*模型被广泛接受，在学术界非常流行。¹\
    \ 布莱克-斯科尔斯-默顿模型在全球大多数 MBA 课程中都有教授，用于计算欧式期权价格。\n\n布莱克-斯科尔斯-默顿模型使用的主要假设和简化条件如下：\n\
    \n- 期权只能在到期时行权。\n- 利率是恒定的。\n- 标的股票不支付股息。\n- 无法预测未来市场走向。\n- 交易过程中不收取佣金。\n- 波动率随时间保持恒定。\n\
    - 资产价格遵循具有恒定漂移项的几何布朗运动。\n\n![image](img/sq.jpg) **注意**  \n如果使用不当，布莱克-斯科尔斯-默顿模型的假设往往会为期权定价计算引入某些不准确性，从而使交易者面临过度风险。\n\
    \n布莱克-斯科尔斯-默顿模型最显著的局限性如下：\n\n- 对于支付高股息的股票，会得出不正确的结果。\n- 在实际生活中，利率从来不是恒定的。\n- 波动率不可能随时间保持恒定。\n\
    - 股息仅在期权到期时支付的假设并非总是合理的。\n- 该模型假设股票价格不会出现大幅跳空。\n- 该模型无法正确预测美式期权的真实价值；由于其假设期权只能在到期时行权，因此会低估美式期权的价值。而美式期权可在期权到期日之前的任何时间行权。\n\
    \n尽管存在局限性，但由于其简便性，布莱克-斯科尔斯-默顿模型在学术界和交易者中仍然很受欢迎。即使该模型在期权价格计算中引入了各种不准确性，但如果谨慎使用，它仍然能产生足够近似的计算结果。\n\
    \n布莱克-斯科尔斯-默顿模型的一个变体称为*自回归条件异方差性*（ACH）模型。该模型的主要假设是波动率不是恒定的，而是随机的。大多数金融公司都开发了自己的模型，其中融入了更为复杂的波动率模型。\n\
    \n## 根据历史数据计算波动率\n\n股票的*波动率*是衡量投资者对该股票未来回报的不确定性（或风险）的指标。由于股票价格波动率在期权价格推导中起着重要作用，我们提供了一个基于历史股票价格数据进行计算的示例。我们的假设是所讨论的股票不支付任何股息，因为这将有助于简化我们的计算。\n\
    \n表 6-1 基于假设一年有 252 个交易日（收盘价数据是模拟的，尽管接近真实数据）来估算 `ORCL` 股票的波动率。“日期”列指定了观察股票价格的时间，“ORCL\
    \ 收盘价 (USD)”列指定了该股票在特定日期的收盘价（以美元计）。在本例中，连续观察了 20 天的股票价格。大多数从业者都认同，最佳方法是基于每日收盘价来计算股票价格的日波动率。根据我们的样本计算，基于\
    \ 2013 年 2 月 20 日至 2013 年 3 月 20 日期间模拟的甲骨文（Oracle）股票收盘价数据，日收益率的标准差为 0.011587，即\
    \ 1.1587%。基于此值，年化波动率估计值（假设一年有 252 个交易日）为 0.183938，即大约 18.4%。\n\n表 6-1. 根据历史数据计算波动率\n\
    \n| ![9781430265894_Table06-01.jpg](img/9781430265894_Table06-01.jpg) |\n\n正如您所见，计算特定时间段内的股票价格波动率相对简单。但您应牢记，随着样本量的增加，计算过程会变得更加复杂。大多数金融公司会在很长一段时间内对大量股票执行此类计算；性能因此成为主要问题。\n\
    \n## 期权合约变量赋值\n\n金融分析师在评估期权合约并决定是否行权时，对某些市场变量（也称为*指标*）非常感兴趣。希望确定期权价值的企业将利用市场变量进行各种统计计算。通常，期权每天估值一次，计算结果的存储于数据库中。例如，假设一家金融公司持有一份美式期权，该期权可在期权合约到期前的任何时间行权。这些分析师将有兴趣了解，他们是否应该在任何一个给定的交易日继续持有这份特定的美式期权，还是提前行权以将其脱手。\n\
    \n顺便提一下，一个不错的策略是在股息支付日之前提前行权美式期权。原因在于，股息会降低股票的内在价值。一旦预期股价下跌，看涨期权的价值预计也会下降。另一方面，看跌期权的价值预计则会上升。\n\
    \n您的组织可能偏好一套特定的统计模型，这些模型旨在近似预测未来的期权价格变动。这些模型及其基础公式依赖于许多市场变量。因此，正确地对这些变量进行建模至关重要（这里所说的“正确地”是指按需动态地添加这些重要变量，并且无需进行大量重编码）。\n"
- fmt: '# Figure 6-7 模型


    [Figure 6-7](#9781430265894_Ch06.xhtml#Fig7) 对合约中的“变量赋值”（`VARIABLE ASSIGNMENT`）和相应的“建议变量赋值”（`SUGGESTED
    VARIABLE ASSIGNMENT`）实体进行了建模，并专门针对我们的期权合约类型进行了定制。`SUGGESTED VARIABLE ASSIGNMENT`
    存储并维护在“合约类型”（`CONTRACT TYPE`）层级上分配的变量。这些数据可能由特定的金融机构或其他重要的监管机构建议提供。


    ![9781430265894_Fig06-07.jpg](images/9781430265894_Fig06-07.jpg)


    [Figure 6-7](#9781430265894_Ch06.xhtml#_Fig7). 期权合约变量赋值


    在合约层级上存储和维护的变量，顾名思义，是合约特定的。请注意，`VARIABLE ASSIGNMENT` 对 `SUGGESTED VARIABLE ASSIGNMENT`
    的依赖关系在双方都是非强制性的。然而，您可能需要审视这种关系，并将其设为强制性的（至少在 `VARIABLE ASSIGNMENT` 一侧）。像几乎总是发生的情况一样，您的具体业务需求将指导您如何进行。


    由此产生的“变量观测”（`VARIABLE OBSERVATION`，在特定日期实际进行的观测）要么基于更通用的 `SUGGESTED VARIABLE ASSIGNMENT`，要么基于合约特定的
    `VARIABLE ASSIGNMENT`，但不会同时基于两者。


    # 期权合约结算类型


    期权合约的“结算类型”（`SETTLEMENT TYPE`）明确指定了特定合约（`CONTRACT`）将如何结算，其可能的取值如下（[Figure 6-8](#9781430265894_Ch06.xhtml#Fig8)）：


    *   `PHYSICAL SETTLEMENT`：一方将实际交付标的资产。

    *   `CASH SETTLEMENT`


    ![9781430265894_Fig06-08.jpg](images/9781430265894_Fig06-08.jpg)


    [Figure 6-8](#9781430265894_Ch06.xhtml#_Fig8). 期权合约结算类型


    在 [Figure 6-8](#9781430265894_Ch06.xhtml#Fig8) 中，特定的期权合约（`CONTRACT`）将根据 `SETTLEMENT
    TYPE`（其子类型为 `CASH SETTLEMENT` 和 `PHYSICAL SETTLEMENT`）进行结算。


    在现金结算类型下，期权持有者将以现金形式获得期权的利润。在这种情况下，只有一种实物资产易手：现金。现金结算的主要原因是实用性；有时很难甚至无法交付标的资产（例如，S&P
    500 指数期权）。事实上，几乎所有指数期权都以现金结算，使其成为一种有价值的结算类型。现金结算期权的主要缺点是，期权所有者在行权后无法收到标的商品。如果您因业务需要（例如，保持工厂机器运转）而期望获得商品资产，请确保您计划购买的期权不是以现金结算的。


    # 自动行权


    如果标的资产的价格高于看涨期权的行权价，该期权通常被称为“价内”（*in the money*）期权。作为看涨期权买方，您希望标的资产的价格相对于期权的行权价上涨。一旦期权被执行并且您获得了目标资产，您可以随时在现货市场上将其出售，从而获得即时收益。


    如果标的资产的价格低于看涨期权的行权价，该期权通常被称为“价外”（*out of money*）期权。


    一些交易所会对手中价内 $0.01 或以上的任何到期看涨或看跌期权自动行权。通常，对到期价内期权进行自动行权被称为“例外行权”（*exercise by exception*）。然而，例外行权协议可能会被任何明确指示其经纪人如何行权（或不行权）特定到期期权的个人投资者所覆盖。一旦做出指令，自动行权就不再是自动的，而是完全取决于投资者的具体指令。


    [Figure 6-9](#9781430265894_Ch06.xhtml#Fig9) 对“行权规则类型”（`EXERCISE RULE TYPE`）超类型及其子类型进行了建模：


    *   `MANUAL EXERCISE TYPE`

    *   `AUTOMATIC EXERCISE TYPE`


    ![9781430265894_Fig06-09.jpg](images/9781430265894_Fig06-09.jpg)'
  raw: '[Figure 6-7](#9781430265894_Ch06.xhtml#Fig7) models the contract VARIABLE
    ASSIGNMENT and the corresponding SUGGESTED VARIABLE ASSIGNMENT entities, specifically
    tailored to our option contract type. The SUGGESTED VARIABLE ASSIGNMENT stores
    and maintains the variables that were assigned on the CONTRACT TYPE level. These
    data could be suggested by a particular financial organization or by another important
    ruling body.


    ![9781430265894_Fig06-07.jpg](images/9781430265894_Fig06-07.jpg)


    [Figure 6-7](#9781430265894_Ch06.xhtml#_Fig7). Option contract variable assignment


    Variables that are stored and maintained on the contract level are, as their name
    implies, contract-specific. Note that the dependency of the VARIABLE ASSIGNMENT
    on the SUGGESTED VARIABLE ASSIGNMENT is nonmandatory on both sides. However, you
    may have to review this relationship and make it mandatory (at least on the VARIABLE
    ASSIGNMENT side). As is nearly always the case, your underlying business requirements
    will guide you on how to proceed.


    The resulting VARIABLE OBSERVATION (physically made on a particular date) is either
    based on a more generic SUGGESTED VARIABLE ASSIGNMENT or a contract-specific VARIABLE
    ASSIGNMENT, but not both.


    Option Contract Settlement Type


    The option contract SETTLEMENT TYPE explicitly specifies how a particular CONTRACT
    will be settled, with the following possible values ([Figure 6-8](#9781430265894_Ch06.xhtml#Fig8)):


    *   PHYSICAL SETTLEMENT, where one party will physically deliver the underlying
    asset

    *   CASH SETTLEMENT


    ![9781430265894_Fig06-08.jpg](images/9781430265894_Fig06-08.jpg)


    [Figure 6-8](#9781430265894_Ch06.xhtml#_Fig8). Option contract settlement type


    In [Figure 6-8](#9781430265894_Ch06.xhtml#Fig8), a particular option CONTRACT
    will be settled according to the SETTLEMENT TYPE (which is subtyped into CASH
    SETTLEMENT and PHYSICAL SETTLEMENT).


    Under the cash settlement type, an option holder will receive the option’s profit
    in cash. In cases like these, only one physical asset changes hands: cash. The
    main reason behind a cash settlement is practicality; sometimes it becomes difficult
    or even impossible to deliver the underlying asset (for instance, the S&P 500
    index options). In fact, almost every index option is settled in cash, making
    it a valuable settlement type. The main disadvantage of the cash settlement option
    is that the option’s owner will not be able to take delivery on the underlying
    commodity upon exercise of the option. If you expect to receive the commodity
    assets out of necessity (for example, to keep your factory machinery running),
    make sure that the option you intend to buy is not settled in cash.


    Automatic Option Exercise


    If the price of the underlying asset is higher than the call option’s strike price,
    the option is often called *in the money*. As a call buyer, you want the price
    of the underlying asset to go up relative to the option’s strike price. Once an
    option is exercised and you obtain the asset in question, you can always turn
    around and sell it on the spot market, thus obtaining an immediate gain.


    If the price of the underlying asset is lower than the call option’s strike price,
    the option is often called *out of money*.


    Some exchanges will automatically exercise any expiring call or put option that
    is $0.01 or more in the money. In general, automatic exercising of the expiring
    in the money option is called *exercise by exception*. However, the exercise by
    exception protocol may be overwritten by any individual investor who explicitly
    instructs his or her broker on how to exercise (or not exercise) the specific
    expiring option. Once the instructions are made, automatic exercise stops being
    automatic and becomes completely dependent on the investor’s specific instructions.


    [Figure 6-9](#9781430265894_Ch06.xhtml#Fig9) models the EXERCISE RULE TYPE supertype
    and its subtypes:


    *   MANUAL EXERCISE TYPE

    *   AUTOMATIC EXERCISE TYPE.


    ![9781430265894_Fig06-09.jpg](images/9781430265894_Fig06-09.jpg)'
