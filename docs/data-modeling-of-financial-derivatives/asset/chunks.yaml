    relationship using a structure entity


    Here, a recursive many-to-many relationship is transformed into two one-to-many
    relationships with the help of a `DOCUMENT STRUCTURE` entity. Note that the two
    relationships coming from the `DOCUMENT STRUCTURE` entity are mandatory.


    ## Recursive One-to-One Relationships


    A recursive *one-to-one* relationship is called a *chain* ([Figure 2-12](#9781430265894_Ch02.xhtml#Fig12)),
    in which one entity instance may be associated with at most one other entity instance
    in either direction.


