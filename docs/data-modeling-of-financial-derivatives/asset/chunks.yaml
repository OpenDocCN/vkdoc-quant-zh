- fmt: '# Assets and Asset Types


    The core difference between an asset and an asset type is similar to the difference
    between a contract and contract type (see [Figure 3-5](#9781430265894_Ch03.xhtml#Fig5)).
    An *asset type* is a blueprint—something that exists only on paper, which you
    cannot hold or touch. An *asset*, on the other hand, is something that holds a
    value and you can physically hold and touch. This distinction between an asset
    and asset type is especially crucial within the context of a financial contract.
    The important thing to remember is this: if you don’t hold it, you don’t own it.
    Unfortunately, some business people treat assets and asset types as one and the
    same and learn the difference the hard way. Train yourself to separate and differentiate
    between paper (an asset type) and physical assets, and model them accordingly.


    ![9781430265894_Fig03-05.jpg](images/9781430265894_Fig03-05.jpg)


    [Figure 3-5](#9781430265894_Ch03.xhtml#_Fig5). Model of asset and asset type


    Another important concept that often confuses novice modelers is the notion that
    a given contract type implicitly embeds within it a discrete set of business rules.
    These underlying business rules are usually quite familiar to the subject matter
    experts, and our job as modelers is often to explicitly associate a given contract
    with a proper contract type. For instance, assume that a financial company will
    deal with two contract types: contract types A and B. Contract type A requires
    participants to exchange physical assets up front; contract type B is the more
    typical type, whereby which physical assets are only exchanged on contract expiration.
    As you can see, associating a given contract with the wrong contract type will
    result in multiple inconsistencies and ambiguities. Imagine what would happen
    if a particular contract is linked to the wrong contract type (for the sake of
    our example, let’s say contract type A). A relationship between our example contract
    and contract type A would imply that the underlying physical assets are to be
    exchanged at the start of the contract. However, this is clearly wrong, and our
    resulting data model would only further confuse our subject matter experts. A
    tarnished data model immediately loses credibility and suffers the consequences
    of being branded irrelevant. Learn to correctly associate your model types with
    the physical embodiment of those types and you will protect yourself from these
    unnecessary ambiguities and misunderstandings.


    # The Importance of Ownership Recognition


    Things that are owned with a recognized level of ownership are considered assets.
    Examples of assets include stocks and precious metals held in an individual’s
    possession. Even though you may have a printout confirming a level of ownership,
    a stock certificate or a grant of deed are legally binding indications of ownership.
    Paper assets are things that you don’t own, at least not in this sense.


    For instance, consider a *debt coupon*. Here, someone has borrowed a physical
    asset (in this case, cash) and made a promise to return payment via a debt coupon
    (a paper asset, at this point). Unfortunately, a debt coupon is just a piece of
    paper that confirms a debt. Try taking it to a grocery store and offering it to
    a store clerk in exchange for groceries. In all likelihood, the sales clerk may
    not even understand what you are offering. You can bet that he will refuse to
    let you leave with your groceries. The debt coupon will remain yours to deal with
    until your counterparty pays back the owed amount.


    A *stock option* is another example of an asset that points to a paper asset.
    An option is the paper record of a promise to allow the bearer to buy a stock
    at some point in the future (a paper asset) at a specific price. Unless you exercise
    your right to buy the specified stock, you don’t own the stock and it cannot be
    counted toward a portfolio of physical assets.


    These examples demonstrate the notion that physical assets and asset types are
    different and shouldn’t be confused. Each performs a separate function and should
    be used in a proper context. In most cases (there are a few exceptions, of course),
    financial contracts will point to paper assets (or asset types) to signify that
    the contractually promised things are to be viewed as promises.


    # Modeling Contract Asset Allocations


    The diagram in [Figure 3-6](#9781430265894_Ch03.xhtml#Fig6) models a `CONTRACT
    ASSET ALLOCATION` entity and the associated relationships. As you can see, a physical
    asset is not even displayed in the starter data model. The reason for this is
    that each asset listed in the underlying financial contract is a paper asset (or
    an asset type). Paper assets refer to things that can be held but are held by
    someone else. The primary on the contract merely has a claim to a promise that
    someone else has made. When someone promises to deliver a ton of aluminum in one
    month, the actual asset type under consideration is a paper asset (an aluminum
    asset type). As everybody knows, promises are meant to be broken. Don’t treat
    contractually promised things as assets, because they are paper assets (or asset
    types). Only once your counterparty delivers the assets will those assets be counted
    toward (or against) a physical asset inventory.


    ![9781430265894_Fig03-06.jpg](images/9781430265894_Fig03-06.jpg)


    [Figure 3-6](#9781430265894_Ch03.xhtml#_Fig6). Model of the relationships between
    contract and asset type


    A `CONTRACT ASSET ALLOCATION` specifies which paper assets each `PARTY` is responsible
    for within the context of the financial `CONTRACT`. Financial contracts typically
    involve two assets. For example, if an investor promises a delivery of copper
    in exchange for a specific amount of cash, two asset types come into play: a copper
    asset type and a cash asset type. This brings us to an interesting point: a financial
    contract can be viewed as a mechanism that transforms, upon completion of delivery,
    one asset into another. In the copper-for-cash example, one asset (cash) is transformed
    on completion of the delivery into another (copper). Consider a hypothetical example
    of how a `CONTRACT ASSET ALLOCATION` is used.


    ![image](images/sq.jpg) **Example**  Assume that today is January 1, 2014. Investor
    A signs a contract with investor B and agrees to purchase 10 tons of aluminum
    for US$10,000 on July 1, 2014. The result is a very simple contract involving
    two parties—investor A and investor B—with a contract expiration date of July
    1, 2014. Note that the contract in question involves two asset types: a `CASH
    ASSET TYPE` (for the sake of simplicity we assume here that investor A will pay
    with cash) and an `ALUMINUM ASSET TYPE`. Inasmuch as a contract is a promise,
    its underlying assets should be treated as paper assets. Thus, we need to store
    two records in the `CONTRACT ASSET ALLOCATION`: one associating investor A with
    the `CASH ASSET TYPE` (a subtype of the `FINANCIAL` asset type) and a set amount
    equal to $10,000; the other record will associate investor B with an `ALUMINUM
    ASSET TYPE` (a subtype of the `COMMODITY ASSET TYPE`) and set the quantity equal
    to 10 tons.


    The model in [Figure 3-6](#9781430265894_Ch03.xhtml#Fig6) provides no means of
    specifying units of measure (here, tons). The diagram in [Figure 3-7](#9781430265894_Ch03.xhtml#Fig7)
    clarifies this issue and shows how to associate a `UNIT OF MEASURE` with a `CONTRACT
    ASSET ALLOCATION`. Note that the relationship between the `CONTRACT ASSET ALLOCATION`
    and the `UNIT OF MEASURE` is nonmandatory on both sides. This is done by design,
    because not every asset type will have a true unit of measure.


    ![9781430265894_Fig03-07.jpg](images/9781430265894_Fig03-07.jpg)


    [Figure 3-7](#9781430265894_Ch03.xhtml#_Fig7). Model of the relationship between
    contract asset allocation and unit of measure'
