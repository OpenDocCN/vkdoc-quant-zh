    7-2](#9781430265894_Ch07.xhtml#Fig2) 的模型能够容纳后续章节中开发的更复杂的场景。


    ## 牛市价差


    如果投资者认为某只特定股票的价格在时间 1 到时间 2 的时间跨度内会适度上涨，他可能会选择实施*牛市价差策略*。该策略允许投资者在市场条件有利时获得小额利润，并在条件不利时保护其免受过度损失，从而限制风险。例如，持有一个执行价格为`S1`的看涨期权的投资者，可能会决定放弃价格上涨至`S2`时的潜在未来利润，以限制其风险。


    牛市价差策略通过以下步骤执行：


    1.  以某个执行价格（`S1`）买入一份股票的看涨期权。

    2.  以更高的执行价格（`S2`，其中`S2 > S1`）卖出一份同一股票的看涨期权。这里希望股票价格在此期间上涨。

    3.  两份期权在同一月份到期。


    为了将牛市价差策略适配到[图 7-2](#9781430265894_Ch07.xhtml#Fig2) 的数据模型中，重点关注指定执行价格`S2`必须大于执行价格`S1`，并且所考虑的期权应在同一月份到期的业务规则。这条业务规则就是我们的牛市价差`SPECIFICATION`。


    `TRADING STRATEGY`的第一条元数据条目处理第一个合约的元数据规范：


    - `CONTRACT TYPE`：`call`

    - `ASSET TYPE`：`stock option asset type`

    - `ROLE TYPE`：`buyer`

    - `CLASSIFICATION TYPE`：`bull spread`


    `TRADING STRATEGY`的第二条条目处理第二个合约的规范：


    - `CONTRACT TYPE`：`call`

    - `ASSET TYPE`：`stock option asset type`

    - `ROLE TYPE`：`seller`

    - `CLASSIFICATION TYPE`：`bull spread`


    通过遵循相同的整体模式，我们可以指定任何交易策略，包括下一节讨论的*熊市价差*。


    ## 熊市价差


    如果投资者预期某只特定股票的价格会下跌，但不会下跌太多，他或她可能会选择实施*熊市价差策略*。该策略通过以下步骤执行：


    1.  以某个执行价格（`S1`）买入一份看跌期权。

    2.  以另一个执行价格（`S2`）卖出一份看跌期权，其中`S1 > S2`。

    3.  两份期权在同一月份到期。


    在这里，投资者以执行价格`S1`买入看跌期权，并决定放弃在价格`S2`时的任何潜在利润，从而形成一个精心构建的机制，旨在防止过度风险暴露。为了让该策略正常运行，两份合约需要在同一月份到期。


    指定执行价格`S1`必须大于`S2`且两份合约应在同一月份到期的业务规则就是熊市价差`SPECIFICATION`。


    `TRADING STRATEGY`的第一条元数据条目处理第一个合约的元数据规范：


    - `CONTRACT TYPE`：`put`

    - `ASSET TYPE`：`stock option asset type`

    - `ROLE TYPE`：`buyer`

    - `CLASSIFICATION TYPE`：`BEAR SPREAD`


    `TRADING STRATEGY`的第二条条目处理第二个合约的规范：


    - `CONTRACT TYPE`：`put`

    - `ASSET TYPE`：`stock option asset type`

    - `ROLE TYPE`：`seller`

    - `CLASSIFICATION TYPE`：`BEAR SPREAD`


    在[图 7-3](#9781430265894_Ch07.xhtml#Fig3) 中，`CLASSIFICATION TYPE`超类型通过添加`BEAR SPREAD`子类型而得以扩展。


    ![9781430265894_Fig07-03.jpg](images/9781430265894_Fig07-03.jpg)


    **图 7-3.** 扩展`CLASSIFICATION TYPE`并引入`BEAR SPREAD`子类型


    ## 重新审视合约结构实体


    如您所知，`CONTRACT STRUCTURE`和`CLASSIFICATION TYPE`实体的主要目的是从一系列看似分散的合约中组装出一个模式（参见[图
    7-4](#9781430265894_Ch07.xhtml#Fig4)）。您可以轻松查询这两个表，并检索构成特定交易策略骨干的合约。通过检查这些合约，您可以确定：


    - 您在特定交易策略执行方面所处的位置

    - 哪些工作仍需完成

    - 任何所需的抵销合约是否缺失


    ![9781430265894_Fig07-04.jpg](images/9781430265894_Fig07-04.jpg)


    **图 7-4.** 重新审视合约结构


    例如，您期望在`CONTRACT STRUCTURE`中找到两份合约来解释特定的`BULL SPREAD`交易策略。任何与预期结果的偏差都将成为调查相关数据的理由。


    事实上，通过对`CONTRACT STRUCTURE`（及关联实体）运行查询，您可以执行各种数据取证，并轻松发现与特定交易策略相关的数据异常。一旦您在`CONTRACT
    STRUCTURE`中发现数据异常，获取关于谁可能对可疑合约负责的详细信息就是一个相对直接的过程。我们如何做到这一点？`CONTRACT PARTICIPATION`是一个很好的起点。


    [图 7-5](#9781430265894_Ch07.xhtml#Fig5) 中的图表将现已熟悉的`CONTRACT`、`CONTRACT STRUCTURE`和`CONTRACT
    PARTICIPATION`概念联系在一起，使您能够回答与特定`CONTRACT`相关的各种问题，包括与合约交付、合约参与以及其他各种合约活动相关的问题。


    ![9781430265894_Fig07-05.jpg](images/9781430265894_Fig07-05.jpg)


    **图 7-5.** 连接合约参与和合约结构


    ## 结论


    本章展示了如何将您在先前章节中学到的许多概念应用于建模金融工程师如何组合各种合约以产生独特且有用的盈利模式这一实际任务。我敦促您尽可能多地练习数据建模任务。毕竟，熟能生巧。系统性地应用您新学到的概念将保证您获得成功和认可。被动学习则保证不了任何事情。


