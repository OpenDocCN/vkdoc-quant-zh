    # Barker’s Notation


    *Divide each difficulty into as many parts as is feasible and necessary to resolve
    it.*


    — René Descartes, *Le Discours de la Méthode*


    This chapter introduces Barker’s computer-aided software engineering (CASE) methodology,
    stressing its main points, summarizing its key strategies, and emphasizing the
    importance of aesthetic conventions. It will not go into unnecessary depth, in
    as much as the methodology is the foundation but not the main focus of this book.
    This chapter equips you with the basic knowledge you will need to feel comfortable
    using the various conceptual diagrams presented throughout the book. The first
    section lays out some basic definitions and an explanation of some of the key
    features of Barker’s notation.


    ## Different Types of Data Models


    Practitioners split data modeling into two branches: *conceptual data modeling*
    and *structural data modeling*. The entity–relation diagrams (ERDs) in this book
    all belong to the realm of conceptual data modeling. The entity–relationship modeling
    techniques for creating ERDs were pioneered by Peter Chen.[¹](#9781430265894_Ch02.xhtml#Fn1)


    Conceptual data modeling performs the following functions:


    *   Describes the enterprise without regard for the kinds of technology that might
    be used to implement a database

    *   Describes the entities of significance to the enterprise and the relationships
    among them, specifically named to represent pairs of clear assertions about the
    nature of the enterprise


    Structural data modeling is used in software engineering to graphically represent
    database structures and the various relationships between them. This data modeling
    type is subdivided into two subtypes:'
