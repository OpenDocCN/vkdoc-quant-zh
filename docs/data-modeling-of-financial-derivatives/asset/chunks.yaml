- fmt: '# Modeling Option Contracts and Asset Types


    The `CONTRACT PARTICIPATION` entity keeps track of all of the parties that participate
    in a given option contract, along with the corresponding `ROLES` they might play.
    Note the presence of the mandatory relationship between the `CONTRACT PARTICIPATION`
    and `CONTRACT` entities. A valid option contract must involve at least two participants:
    the party that has purchased an option contract (the party holding a long position)
    and the party that has sold an option contract (the party holding a short position).
    We may also treat an option as insurance and say that a given option contract
    will always have an investor who has purchased insurance and an investor who has
    sold this insurance.


    As discussed in previous chapters, the mandatory relationship between the `CONTRACT
    PARTICIPATION` entity and the `CONTRACT` entity implies that these entities have
    to be populated within the same transaction.


    With the current design, you can easily describe and eventually reconstruct any
    type of option position (put buyer, call seller, and so forth) and the associated
    exercise dates.


    ## Modeling an Option Asset Type


    This and the following sections examine the internal anatomy of an option, peeling
    away layers of functionality to expose the inner workings of its intricate mechanism.


    To repeat, it is advisable to treat an option’s underlying asset as an asset type
    (paper asset). By itself, a stock option is insurance that is associated with
    (or points to) a specific asset type. The link between the option and the option’s
    underlying specific asset type is always present. When purchased, options provide
    investors with the ability to buy a specific physical asset (Intel stock, for
    instance) at a future date. Unless the option is exercised, it should always point
    to a specific `ASSET TYPE`. Upon exercise, a physical `ASSET` is received and
    that asset should be counted toward or against the overall portfolio. If an option
    is left unexercised it expires, worthless. Once purchased, a stock option by itself
    is an asset and should be accounted for in your organization’s accounting books.
    Moreover, options are subjected to stringent tax regulations and should be tracked
    very carefully.


    [Figure 6-4](#9781430265894_Ch06.xhtml#Fig4) models the `STOCK OPTION ASSET TYPE`
    as a paper asset. Do you remember how to differentiate between an asset and an
    asset type? An asset is something that you own, something you can hold in your
    hand: an option certificate, a register receipt, a platinum bar, a wad of cash,
    a stock certificate, and so on. An asset type, on the other hand, is a blueprint
    for a thing—something that you don’t own and cannot hold or show to prove that
    it is yours. The opportunity to purchase a stock option may be modeled as illustrated
    in [Figure 6-4](#9781430265894_Ch06.xhtml#Fig4), a `STOCK OPTION ASSET TYPE` (a
    subtype of the `FINANCIAL ASSET TYPE`) that points to a specific `STOCK TYPE`
    (another subtype of the `FINANCIAL ASSET TYPE`).


    ![9781430265894_Fig06-04.jpg](images/9781430265894_Fig06-04.jpg)


    [Figure 6-4](#9781430265894_Ch06.xhtml#_Fig4). Model of an option asset type


    A hypothetical example should help clarify things. Let’s say an investor writes
    a call option with the following characteristics:


    *   Underlying asset quantity: one.

    *   Option style type: European.

    *   Contract start date: July 1, 2014.

    *   Option price: US$6.

    *   Underlying asset type: Intel stock type.

    *   Strike price: $20.


    This yet-to-be-purchased call option that the investor hopes to sell is treated
    as a paper asset and is modeled in [Figure 6-4](#9781430265894_Ch06.xhtml#Fig4).
    The resulting Intel stock option price depends on numerous things, such as `STOCK
    TYPE PRICE HISTORY` and `DIVIDEND SCHEDULE`. To account for these dependencies,
    we explicitly model the `STOCK TYPE PRICE HISTORY` and the `DIVIDEND SCHEDULE`
    entities and their relationships to the `STOCK TYPE`. The `STOCK TYPE PRICE HISTORY`
    contains not just the current open and closing numbers but also the historical
    data. In this model, the `STOCK TYPE PRICE HISTORY` and `DIVIDEND SCHEDULE` are
    related to the `STOCK TYPE` (a paper asset). This makes sense because the stock
    price has no bearing on the actual asset ownership.


    ## Modeling Options as Physical Assets


    Once an investor takes a long position in a call option, he or she obtains a physical
    asset (an option certificate) and a promise from the seller to sell the underlying
    asset (a paper asset at this point) (see the diagram in [Figure 6-5](#9781430265894_Ch06.xhtml#Fig5)).
    Once purchased, the option in question is transformed from an `ASSET TYPE` into
    an `ASSET`, and its new owner obtains an option certificate (meaning that the
    new option may be sold together with other valuable physical assets; it remains
    an asset until it either is exercised or expires and thus becomes worthless).


    ![9781430265894_Fig06-05.jpg](images/9781430265894_Fig06-05.jpg)


    [Figure 6-5](#9781430265894_Ch06.xhtml#_Fig5). Model of an option as a physical
    asset


    Suppose an investor considers purchasing (or taking a long position in) an option
    on one share of Microsoft Corporation stock. Unless this investor pays money for
    it, the option in question is treated as a paper asset (of the stock option asset
    type) that is related to (or points to) another paper asset: a stock type (specifically,
    a Microsoft stock type). When the investor purchases this option, he obtains the
    physical asset, the actual stock option in the form of the option certificate.
    This specific stock option will continue to point to the specific stock type (again,
    a paper asset). When the investor exercises this option, he obtains the physical
    asset (the Microsoft stock certificate) in return.


    ## Modeling Option Asset Allocation


    At the heart of the option’s contract asset allocation subject area is the `CONTRACT
    ASSET ALLOCATION` entity ([Figure 6-6](#9781430265894_Ch06.xhtml#Fig6)). The main
    purpose of the `CONTRACT ASSET ALLOCATION` is to keep track of which `ASSET` each
    `PARTY` is responsible for within the context of a given option `CONTRACT`. This
    model maintains and stores physical assets, not asset types. Once both parties
    enter into an option contract, you should relate the `CONTRACT ASSET ALLOCATION`
    to the physical `ASSETS` because by that time the option has been purchased and
    the physical assets have been exchanged (cash for the stock certificate, for example).


    ![9781430265894_Fig06-06.jpg](images/9781430265894_Fig06-06.jpg)


    [Figure 6-6](#9781430265894_Ch06.xhtml#_Fig6). Modeling option asset allocations'
