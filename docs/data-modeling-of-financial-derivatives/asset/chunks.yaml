- fmt: '# DELIVERY in Swap Contracts


    DELIVERY ([Figure 8-7](#9781430265894_Ch08.xhtml#Fig7)) in a swap contract is
    controlled by the `SWAP PARTY RATE TYPE SCHEDULE` and is associated with physical
    assets (cash, for instance).


    ![9781430265894_Fig08-07.jpg](images/9781430265894_Fig08-07.jpg)


    [Figure 8-7](#9781430265894_Ch08.xhtml#_Fig7). Swap contract payments


    In the example we developed in the previous section, investor A pays a flat 5
    percent rate per annum (or 2.5 percent semi-annually) on the US$10,000 notional
    principal. As a result, investor A is scheduled to make four interest payments
    of $250 each. Investor B is scheduled to pay the six-month LIBOR rate (on the
    $10,000 notional principal) that was observed six months prior to the first payment
    exchange date. Hence, the amount of the first variable rate payment shouldn’t
    be a surprise because both parties are well aware of what the amount should be.
    Assuming that the original six-month LIBOR rate, observed on July 1, 2013, is
    2.6 percent, investor B will be scheduled to pay $260. At the time the payments
    are exchanged, a physical observation of the six-month LIBOR rate will be made
    and its value stored in the `SWAP PARTY RATE TYPE SCHEDULE`. This is the LIBOR
    rate that investor B will be responsible for on the next scheduled payment date.
    [Table 8-2](#9781430265894_Ch08.xhtml#Tab2) depicts a schedule of payments, together
    with a payment outflow from the perspectives of both investors. The date column
    depicts the date when the six-month LIBOR rate will be observed. The underlying
    six-month LIBOR rate is stored in the `LIBOR Rate` column.


    [Table 8-2](#9781430265894_Ch08.xhtml#_Tab2). Hypothetical Schedule of Payments
    (Swap Contract Payments)


    | ![9781430265894_Table08-02.jpg](images/9781430265894_Table08-02.jpg) |


    Once again, the general shape and feel of the model should be familiar, but although
    the foundation may be the same, take note of how we’ve shaped it according to
    the underlying business rules.


    ## Forward Rate Agreements


    A *forward rate agreement* (FRA) is an OTC contract specifying that a certain
    interest rate will be applied either to the borrowing or lending of a certain
    principal amount at some point in the future. The main assumption is that the
    borrowing or lending is done at the LIBOR rate. The principal amounts are specified
    on paper and rarely exchanged, thus becoming notional principal amounts. A hypothetical
    example will clarify the principles underlying a FRA.


    ![image](images/sq.jpg) **Example** Assume that investor A agrees to pay investor
    B an interest rate of `Int_A` percent on a principal amount `P` between times
    `T1` and `T2`, where `T1` and `T2` are both dates in the future. Investor B agrees
    to pay investor A the interest rate of `Int_B` percent on the same principal amount
    `P` between `T1` and `T2`. Assuming that `Int_A` percent is the LIBOR rate, you
    can see that an FRA is a perfect tool to hedge against LIBOR rate exposure. Time
    `T1` will be set well in advance, and the time span between `T1` and `T2` will
    be clearly specified. Payoff typically will occur at the time `T1`, when the forward
    LIBOR rate underlying the time span between `T1` and `T2` becomes well known,
    with the payment discounted from the time `T2` to `T1`.


    As you can see, the concepts behind an FRA are similar to those behind a swap
    contract, with the only difference being that an FRA cash flow exchange occurs
    only once.


    ### FRA Contract Type


    The first task related to FRA contract modeling is to define the `FRA CONTRACT
    TYPE` and unambiguously show it in the model ([Figure 8-8](#9781430265894_Ch08.xhtml#Fig8)).
    To keep things simple, the `CONTRACT TYPE` is subtyped into:


    * A `FORWARD RATE AGREEMENT TYPE`

    * `OTHER TYPE`


    Remember that once you relate your contract to a particular contract type, you
    allow it to inherit specific business rules unique to this particular type. It
    may seem superfluous at this point, but within the context of a larger data model
    this subtyping improves communication and removes unnecessary ambiguities.


    ![9781430265894_Fig08-08.jpg](images/9781430265894_Fig08-08.jpg)


    [Figure 8-8](#9781430265894_Ch08.xhtml#_Fig8). Subtyping contract type to account
    for an FRA contract type


    ### Modeling FRA Contract Participation


    An FRA involves a fixed rate player who pays a fixed interest rate between times
    `T1` and `T2`, and a floating rate player who pays a market realized interest
    rate (presumably the LIBOR rate) between times `T1` and `T2` ([Figure 8-9](#9781430265894_Ch08.xhtml#Fig9)).
    The model in [Figure 8-9](#9781430265894_Ch08.xhtml#Fig9) looks similar to the
    swap contract participation diagram in [Figure 8-4](#9781430265894_Ch08.xhtml#Fig4).
    This similarity exemplifies how readily you can create something new by understanding
    the underlying business rules of a contract and combining them with your knowledge
    of contract modeling in general. Note that the relationship between the `CONTRACT`
    and the `CONTRACT PARTICIPATION` is mandatory on both sides.


    ![9781430265894_Fig08-09.jpg](images/9781430265894_Fig08-09.jpg)


    [Figure 8-9](#9781430265894_Ch08.xhtml#_Fig9). FRA contract participation


    ### Modeling FRA Asset Allocation and Payoff Schedules


    FRA contract asset allocation and payoff schedule modeling can be approached in
    a fashion analogous to modeling swap contracts. Indeed, these two contract types
    share many similarities, and several of the concepts discussed previously serve
    here as well.


    Analogous to the `SWAP PARTY RATE TYPE SCHEDULE` entity in the “Modeling Swap
    Contract Asset Allocation and Payoff Schedules” section is the `FRA PARTY RATE
    TYPE SCHEDULE`, which likewise explicitly lists each party’s payoff schedule.
    To keep things unambiguous and clear, we can generalize these two entities into
    a common supertype called a `PARTY RATE TYPE SCHEDULE` ([Figure 8-10](#9781430265894_Ch08.xhtml#Fig10)).


    ![9781430265894_Fig08-10.jpg](images/9781430265894_Fig08-10.jpg)


    [Figure 8-10](#9781430265894_Ch08.xhtml#_Fig10). FRA asset allocation and rate
    payoff schedule


    The principal amounts underlying a specific FRA contract rarely change hands.
    To keep our resulting model simple, we state that under the FRA contract the principal
    amounts never change hands, and thus are notional principal amounts. This simplification
    results in removing the physical assets from the resulting contract asset allocation
    model. A hypothetical example will clarify how to use our model in [Figure 8-9](#9781430265894_Ch08.xhtml#Fig9).


    ![image](images/sq.jpg) **Example** Assume that investor A, a fixed rate player,
    has agreed to pay a fixed 5 percent rate on a US$10,000 notional principal amount.
    This FRA contract is signed on May 1, 2014, with a future start date set to July
    1, 2015 (time `T1`), and a future end date set to January 2, 2016 (time `T2`).
    Investor B (the floating rate player) has agreed to pay the market-realized six-month
    LIBOR rate between July 1, 2015 (`T1`), and January 1, 2016 (`T2`) on the $10,000
    notional principal. The actual payoff will occur on July 1, 2015 (time `T1`),
    once the six-month LIBOR rate covering the time periods between `T1` and `T2`
    becomes available. To account for these facts, we begin by populating the `CONTRACT
    ASSET ALLOCATION`. The underlying assets in question are paper assets (the notional
    principal amounts), and that is why we relate the `CONTRACT ASSET ALLOCATION`
    to the `ASSET TYPE`. Mutually agreed-on notional principal amounts are quoted
    in US dollars, so the `ASSET TYPE` is specified as a `USD TYPE`. As a result,
    you store and maintain two records in the `CONTRACT ASSET ALLOCATION` (or one
    `CONTRACT ASSET ALLOCATION` record per investor).'
