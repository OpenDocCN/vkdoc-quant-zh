    # 合同基础


    为了为本书后续内容奠定基础，本章定义了相关术语并讨论了金融合同的基础知识。


    ## 什么是合同？


    *合同*是两个或更多方之间具有约束力的协议，约定以特定条款交换指定商品或服务。若要形成有效合同，至少必须有两方参与：提出某事的一方和接受该事的一方（图 3-1）。在特定时间点以特定价格买卖特定产品或服务的协议就是一个简单合同的例子。除了要约人和受要约人之外，其他方也可以以各种身份参与给定合同，例如联合受要约人、代理人、接收人、被引用的子公司和执行人。例如，一方可能起草特定合同，另一方可能对其进行监督。您的组织将提前确定其希望存储和维护的参与者，这很可能基于这些方在基础合同中扮演的角色。


    ![9781430265894_Fig03-01.jpg](img/9781430265894_Fig03-01.jpg)


    图 3-1. 基本合同模型


    一方可以在任何给定合同中扮演多个角色。按图 3-1 建模的`CONTRACT`实体必须与至少两个其他`PARTIES`（通过“提供服务”和“消费服务”关系标识）相关联，而“背书人”关系是可选的。该模型的一个局限性显而易见：它在角色规范方面不易扩展。例如，一个`PARTY`可能为基础`CONTRACT`扮演“法律顾问”或“合同起草人”的角色，模型可能需要考虑到这一点。请记住，合同（尤其是金融合同）可能包含大量细节；它是一种法律文件，其每一个方面可能都需要在模型中表示。面对这种需求，考虑通过向`CONTRACT`实体附加属性来扩展（或拓宽）它是合理的，但这种解决方案既不优雅又高度僵化。通过采用这种方法，我们只能通过*数据定义语言*（`DDL`）来扩展模型，这最终可能需要我们更改编程逻辑。任何尝试过这种方法的人都会告诉您，这对项目架构师和代码开发者来说都是一场噩梦。


    图 3-1 中的普通模型的另一个缺陷是缺乏动态创建角色能力。您的组织可能会确定一个其感兴趣存储和维护的角色池。即使这个角色池已获得高层管理批准，也无法保证该列表不会被更改。一种选择是硬编码这些角色；另一种选择是引入一个新实体`ROLE
    TYPE`，从而为问题提供一个优雅且创造性的解决方案（图 3-2）。


    ![9781430265894_Fig03-02.jpg](img/9781430265894_Fig03-02.jpg)


    图 3-2. 合同参与模型


    请注意`CONTRACT`和`CONTRACT PARTICIPATION`之间的实线（强制）关系。通常，您应谨慎处理两端均为强制的关系（包括一对多关系）。这并不意味着这种配置不存在或应始终避免。两端均为强制的关系确实存在，尽管不常见，但它们服务于特定目的并强调独特的业务规则。


    在我们的示例中，两端均为强制的关系强调了一条业务规则：`CONTRACT`和`CONTRACT PARTICIPATION`实体中的条目必须在同一事务中填充。例如，您的编程逻辑必须确保每个合同至少有两个合同参与者，其中一个扮演买方角色，另一个扮演卖方角色。请注意，给定合同可能与其他角色（不仅仅是买方和卖方）相关联，并且应制定一条业务规则，明确指定在给定合同上下文中至关重要的角色类型。


    请注意，`CONTRACT PARTICIPATION`实体并非设计用于存储和维护历史数据。如前所述，建模者通常有义务（从法律角度看）维护和跟踪对合同数据的每一次更改。为了维护准确的合同参与历史，我建议创建一个名为`HISTORICAL
    CONTRACT PARTICIPATION`的新实体，下文将对此进行讨论。


    ## 维护合同参与历史


    图 3-3 中的图表对前一节提出的问题建模了一个解决方案：如何创建和维护一个恰当的合同参与历史。此示例中`HISTORICAL CONTRACT PARTICIPATION`实体的目的是维护和存储对`CONTRACT
    PARTICIPATION`记录所做的所有更改（插入、更新和删除）。通常，在大型数据库中，您会发现一组以`HIST_`为前缀的表，旨在存储和维护基础表的历史。每当源表中的记录被更改时，数据库触发器就会触发并将必要的更改传播到基础`HIST_`表中。*数据库触发器*是一段附加到表上的代码，用于响应某些预定义事件而执行。


    ![9781430265894_Fig03-03.jpg](img/9781430265894_Fig03-03.jpg)


    图 3-3. 正确维护的合同参与历史示例


    ## 区分合同与合同类型


    图 3-4 中的模型引入了一个名为`CONTRACT TYPE`的新实体。`CONTRACT TYPE`代表所有可用合同的目录或蓝图。另一方面，`CONTRACT`代表一个法律实体——合同类型的物理体现——至少有两方已在特定日期同意并签署该实体。如果采用*面向对象*（`OO`）术语，我们说`CONTRACT
    TYPE A`（`CONTRACT TYPE`的子类型）是一个可以实例化的基类。`CONTRACT TYPE A`基类的一个实例就是实际的`CONTRACT`。


    ![9781430265894_Fig03-04.jpg](img/9781430265894_Fig03-04.jpg)


    图 3-4. 区分合同与合同类型

