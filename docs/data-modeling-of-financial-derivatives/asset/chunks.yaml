    # Modeling Forward Contracts


    *I hope that posterity will judge me kindly, not only as to the things which I
    have explained, but also to those which I have intentionally omitted so as to
    leave to others the pleasure of discovery.*


    —René Descartes, *La Géométrie*


    This chapter examines the specifics, mechanics, and terminology of a vastly popular
    contract type in the *over-the-counter* (OTC) market: the *forward contract* (or
    simply *forward*). The opening section defines a forward contract and describes
    its associated business rules.


    ## Defining a Forward Contract


    A *forward contract* is an agreement between two parties to buy or sell an asset
    for a certain price at a mutually agreed-upon future date. It is often contrasted
    with another relatively simple contact type, called a *spot contract*. A spot
    contract is an agreement between two parties to buy or sell an asset today.


    The forward contract is a *nonstandardized contract*, meaning it is not traded
    on the main financial exchanges and is therefore considered riskier, in the sense
    that there is a greater chance than otherwise that one party might default on
    its obligation to buy or sell. Nonstandardized contracts typically involve large
    financial institutions that can absorb such a level of risk. Because forward contracts
    are nonstandard, they take a relatively long time to negotiate and execute. There
    are organizations that specialize in the creation of the various documents on
    which OTC contracts are based (including forward contracts). These documents are
    templates that may be tailored to the specific needs of the parties involved.
    [Chapter 8](#9781430265894_Ch08.xhtml) discusses these documents and their associated
    structure.


    ## Forward Contract Specifications


    A party that agrees to buy an asset at some point in the future takes a *long*
    position in a given forward contract. A party that agrees to sell an asset at
    some point in the future takes a *short* position in a given forward contract.
    A *spot price* is the price of a given asset right now. It is contrasted with
    a *forward price* (aka *delivery price*), which is a mutually agreed-upon price
    of an asset in the future.


    Consider, for example, an investor who needs to pay back `1,000,000` GBP on January
    1, 2015. Let’s assume that today is January 1, 2014. This private investor has
    a hunch that the USD/GBP exchange rate may go up (thus, it will take more U.S.
    dollars to purchase British pounds). One strategy the investor might consider
    is to agree to an *offer rate* proposed by a bank and enter into a 12-month forward
    contract ([Table 4-1](#9781430265894_Ch04.xhtml#Tab1)). As a result, the investor
    agrees to purchase from the bank in one year `1,000,000` GBP for US$2,039,000.
    Because he has agreed to purchase a particular currency (pounds sterling), the
    private investor is holding a long position in the underlying forward contract.
    The bank, on the other hand, has agreed to sell `1,000,000` GBP for US$2,039,000
    and is holding a short position in the underlying forward contract. The forward
    contract that the private investor and the bank have signed becomes a binding
    agreement which both parties have agreed to honor one year from the date of signature.


    Note that the terms *bid* and *offer* in the [Table 4-1](#9781430265894_Ch04.xhtml#Tab1)
    caption are prices from the standpoint of the financial institution that provides
    them. A bid is the price that the financial institution is prepared to pay to
    purchase a given asset. An offer is the financial institution’s selling price.


    [Table 4-1](#9781430265894_Ch04.xhtml#_Tab1). Bid/Offer Quotes


    | Spot Price | Bid | Offer |

    | --- | --- | --- |

    | 1 Month Forward Contract | 2.0345 | 2.0351 |

    | 6 Month Forward Contract | 2.0312 | 2.0321 |

    | 12 Month Forward Contract | 2.031 | 2.039 |


    An `ASSET` underlying a particular forward contract may be grouped into one of
    the following two categories: an `INVESTMENT ASSET` or a `CONSUMPTION ASSET` ([Figure
    4-1](#9781430265894_Ch04.xhtml#Fig1)). The main purpose of the *consumption asset*
    is to keep business running smoothly—for example, a constant supply of natural
    gas to keep furnaces burning or machine oil to keep planes flying. Without the
    raw materials necessary to do its business, a company risks significant losses,
    work stoppages, and unpaid wages. An *investment asset*, on the other hand, is
    used for speculative purposes (such as stocks and bonds).


