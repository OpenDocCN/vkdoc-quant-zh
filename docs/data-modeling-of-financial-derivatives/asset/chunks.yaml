    to forward contract consequences. The core building blocks used in this chapter
    were constructed and discussed in the previous chapters. This chapter focused
    on implementation, identifying a set of business rules, and creating various starter
    models by following those rules. After all, a contract is a contract, and once
    you know how to model it, you should be able to create a good starter model for
    any basic type. Once your starter model is complete, use your business rules to
    shape and mold it as required. Accommodate future changes preemptively through
    generalization, and don’t sacrifice robustness and stability for ease of programming;
    you''ll seldom be happy with the outcome.


    CHAPTER


    Modeling Futures Contracts


    *When it is not in our power to follow what is true, we ought to follow what is
    most probable.*


    —René Descartes, *Le Discours de la Méthode*


    Most of the modeling principles we learned in the last chapter are applicable
    to the subject of this chapter: *futures contracts* (aka *futures*). Futures share
    many features with forward contracts, but a fundamental difference between them
    is how each one approaches the risk factor. Forward contracts are risky, with
    the shadow of a default always looming. Futures contracts, on the other hand,
    are deemed to be less risky because they are traded on exchanges. Exchange-imposed
    rules buffer investors against some of the risk because they make default events
    less likely. Every major exchange has implemented a set of intricate rules that
    all concerned parties must follow and obey. Moreover, each exchange’s enforcement
    of these rules guarantees that a contract has a good chance of being honored by
    each contract participant.'
  trans: '

    考虑一个示例：投资者 A 签订了一份远期合约，该合约在一个月后（时间`T1`）开始，持续一年（合约到期日`T2`），以特定价格（`S1`）买入英镑（`GBP`）。同时，该投资者又签订了另一份远期合约，合约起始日为`T1`，合约到期日为`T2`，以特定价格（`S2`）卖出英镑（`GBP`）。这类情况在实际中频繁出现，因此学习如何对其建模非常重要。


    图 4-10 的示意图跟踪了整体合约策略，同时确保建模者能够轻松追踪任何`CONTRACT`的依赖关系，并识别一组相关的合约（通过`CLASSIFICATION
    TYPE`实现）。根据您的业务需求，您很可能需要追溯各种合约依赖关系并生成各种历史数据报告。图 4-10 所示的模型可以轻松满足此类需求。`CLASSIFICATION
    TYPE`实体将在后续章节中进一步讨论。请注意`transaction ID`属性（一个`CONTRACT STRUCTURE`实体）的存在，其目的是将所有属于同一分类类型的相关合约链接在一起。


    ![9781430265894_Fig04-10.jpg](img/9781430265894_Fig04-10.jpg)


    图 4-10. 维护合约依赖关系


    图 4-11 展示了图 4-10 所示结构的一个更简单的变体，它允许您通过使用简单层次结构对合约依赖关系进行建模，来跟踪多个`CONTRACTS`之间的各种依赖关系。然而，在将这个模型投入使用之前，请确保您了解其局限性。图
    4-10 中实现的结构（使用多对多递归关系）将提供比简单层次结构（如图 4-11 所示）更好的灵活性。我建议您保持开放的选项，并在时机成熟时，准备好为同一个问题提供多种解决方案。


    ![9781430265894_Fig04-11.jpg](img/9781430265894_Fig04-11.jpg)


    图 4-11. 使用简单层次结构维护合约依赖关系


    ## 远期合约的终止


    远期合约背后主要的假设是，合约参与者将在合约完成、完成交割、收到付款并且给定合约成功结束之前一直保持其头寸。然而，在某些情况下，一方希望在合约终止前了结其头寸。在这种情况下，该方将对具有相同底层资产类型和类似到期日的远期合约采取相反的头寸。不过，远期价格很可能会不同。一个示例将有助于说明这种情况。


    ![image](img/sq.jpg) **示例** 投资者 A 根据以下条款签订了一份大豆远期合约：


    *   开始于 2014 年 6 月 1 日

    *   终止于 2014 年 12 月 1 日

    *   约定数量为 100 磅

    *   远期价格为 1000 美元


    ![image](img/sq.jpg) **注意**  2014 年 6 月 15 日，投资者 A 决定提前终止此远期合约，并签订了一份对冲的大豆远期合约，约定于
    2014 年 12 月 15 日以 1100 美元卖出 100 磅大豆。如果您仔细分析这些交易，您会发现投资者 A 只是通过锁定 12 月份的大豆价格来限制其损失。如果一切按计划进行，在
    2014 年 12 月 1 日，投资者 A：


    *   支付 1000 美元

    *   获得 100 磅大豆


    ![image](img/sq.jpg) **注意**  2014 年 12 月 15 日，同一位投资者 A（净收益为 100 美元）：


    *   交付 100 磅大豆

    *   收到 1100 美元作为回报


    请注意，远期合约的终止可以使用图 4-10 中建模的`CONTRACT STRUCTURE`和`CLASSIFICATION TYPE`实体来跟踪和维护。


    ## 诉讼与违规


    最终用户总是会担心合约一方可能无法履行其合同义务。通常，这种违约的后果将是一场旷日持久的诉讼。除了诉讼之外，给定的合约也可能成为各种`REGULATIONS`（`FEDERAL
    REGULATIONS`和`STATE REGULATIONS`）的约束对象。图 4-12 的示意图描绘了如何对`CONSEQUENCE`实体进行建模。


    ![9781430265894_Fig04-12.jpg](img/9781430265894_Fig04-12.jpg)


    图 4-12. 对诉讼与违规进行建模


    在图 4-12 的模型中，`CONSEQUENCES`是在`CONTRACT`级别上跟踪的。您随时可以微调此模型，并在`CONTRACT ACTIVITY`级别上跟踪`CONSEQUENCES`。确实，有时成为诉讼对象的并非合约本身，而是代表给定合约执行的行为（由`CONTRACT
    ACTIVITY`表示）。图 4-13 的示意图通过将`CONSEQUENCE`与`CONTRACT ACTIVITY`关联起来，扩展了原始的“诉讼与违规”模型。请注意，`CONSEQUENCE`与`CONTRACT
    ACTIVITY`之间的关系在双方都是非强制性的。


    ![9781430265894_Fig04-13.jpg](img/9781430265894_Fig04-13.jpg)


    图 4-13. 对诉讼与违规进行建模（一个更复杂的模型）


    ## 结论


    本章通过讨论和建模从远期合约交割到远期合约后果的各种业务需求，向您介绍了远期合约的复杂世界。本章使用的核心构建模块在前几章中已经构建并讨论过。本章侧重于实现，识别一组业务规则，并按照这些规则创建各种入门模型。毕竟，合约就是合约，一旦您知道如何对其建模，您就应该能够为任何基本类型创建出良好的入门模型。当您的入门模型完成后，请使用您的业务规则根据需要对其进行塑造和调整。通过泛化来主动适应未来的变化，并且不要为了编程的便利而牺牲健壮性和稳定性；通常您不会对这样的结果感到满意。


    章节


    # 对期货合约进行建模


    *当我们无法遵循真实的事物时，我们应该遵循最可能的事物。*


    ——勒内·笛卡尔，《方法论》


    我们在上一章学到的大多数建模原则都适用于本章的主题：*期货合约*（又称*期货*）。期货与远期合约有许多共同特征，但两者之间的一个根本区别在于各自处理风险因素的方式。远期合约存在风险，违约的阴影始终笼罩。另一方面，期货合约被认为风险较低，因为它们是在交易所交易的。交易所强制执行的规则缓冲了投资者面临的部分风险，因为它们降低了违约事件发生的可能性。每个主要交易所都实施了一套复杂的规则，所有相关方都必须遵守和服从。此外，每个交易所对这些规则的执行保证了合约有很高的概率得到每位合约参与者的履行。

